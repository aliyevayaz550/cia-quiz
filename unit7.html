,"cmt_tr": "Yönetişim ve kültür bileşeninin bir ilkesi, kuruluşun yetenekli bireyleri çekmesi, geliştirmesi ve elde tutmasıdır.","cmt_en": "A principle of the governance and culture component of ERM is that the organization attracts, develops, and retains capable individuals. Management is responsible for defining the necessary human capital (needed competencies) to achieve objectives, and the human resources function assists management in developing competency requirements through processes that attract, train, mentor, evaluate, reward, and retain competent individuals. Moreover, contingency plans should be developed to prepare for succession."},{"tr": "İş bağlamının analizi.","en": "Analysis of business context.","cmt_tr": "Strateji ve hedef belirleme bileşeninin bir ilkesi, kuruluşun iş bağlamını ve risk profili üzerindeki etkisini analiz etmesidir.","cmt_en": "A principle of the strategy and objective setting component is that the organization analyzes business context and its effect on the risk profile. Business context pertains to the relationships, events, trends, and other factors that influence the organization’s strategy and business objectives. It includes the organization’s internal and external environments."},{"tr": "Risklerin önceliklendirilmesi.","en": "Prioritization of risks.","cmt_tr": "Performans bileşeninin bir ilkesi, kuruluşun sınırlı kaynaklarını dışarıdan tahsis etmek için tüm seviyelerde riskleri önceliklendirmesidir.","cmt_en": "A principle of the performance component is that the organization prioritizes risks at all levels to allocate limited resources externally."},{"tr": "Hedefleri etkileyen değişikliklerin değerlendirilmesi.","en": "Assessing changes affecting objectives.","cmt_tr": "Gözden geçirme ve revizyon bileşeninin bir ilkesi, kuruluşun strateji ve iş hedeflerini önemli ölçüde etkileyebilecek değişiklikleri belirlemesi ve değerlendirmesidir.","cmt_en": "A principle of the review and revision component is that the organization identifies and assesses changes that may substantially affect strategy and business objectives. Changes in the organization’s business context and culture are most likely to substantially affect strategy and business objectives."}],"answer": 0},{"q_tr": "Temel değerlere bağlılık, COSO kurumsal risk yönetimi (KRY) çerçevesinin hangi bileşeniyle tutarlıdır?","q_en": "Commitment to core values is consistent with which component of the COSO enterprise risk management (ERM) framework?","options": [{"tr": "Gözden geçirme ve revizyon.","en": "Review and revision.","cmt_tr": "Kuruluş, strateji ve iş hedeflerindeki değişikliklere dayalı olarak mevcut KRY yeteneklerini ve uygulamalarını gözden geçirir ve revize eder.","cmt_en": "The organization reviews and revises its current ERM capabilities and practices based on changes in strategy and business objectives."},{"tr": "Performans.","en": "Performance.","cmt_tr": "Performans, kuruluşun değer peşinde koşarken kararlarını destekleyen KRY uygulamalarıyla ilgilidir.","cmt_en": "Performance relates to ERM practices that support the organization’s decisions in pursuit of value. Those practices consist of identifying, assessing, prioritizing, responding to, and developing a portfolio view of risk."},{"tr": "Bilgi, iletişim ve raporlama.","en": "Information, communication, and reporting.","cmt_tr": "Bilgi, iletişim ve raporlamayla ilgili üç ilke: (1) kuruluş KRY'yi desteklemek için bilgi sistemlerinden yararlanır; (2) kuruluş KRY'yi desteklemek için iletişim kanallarını kullanır; ve (3) kuruluş birden çok düzeyde ve kuruluş genelinde risk, kültür ve performans hakkında raporlama yapar.","cmt_en": "Three principles relate to information, communication, and reporting: (1) the organization leverages its information systems to support ERM; (2) the organization uses communication"},{"tr": "Yönetişim ve kültür.","en": "Governance and culture.","cmt_tr": "Yönetişim ve kültür bileşeninin bir ilkesi, kuruluşun temel değerlere bağlılığını göstermesidir. Diğer dört ilke: (1) yönetim kurulunun risk gözetimi uygulaması, (2) faaliyet yapılarının oluşturulması, (3) istenen kültürün tanımlanması ve (4) yetenekli bireylerin çekilmesi, geliştirilmesi ve elde tutulmasıdır.","cmt_en": "A principle of the governance and culture component is that the organization demonstrates commitment to core values. The other four principles are (1) board exercise of risk oversight; (2) establishment of operating structures; (3) definition of the desired culture; and (4) attracting, developing, and retaining capable individuals."}],"answer": 3},{"q_tr": "COSO'nun kurumsal risk yönetimi çerçevesinin (KRY) yönetişim ve kültür bileşeni büyük olasılıkla hangi ilkeyi içerir?","q_en": "The governance and culture component of the COSO’s enterprise risk management framework (ERM) most likely includes which principle?","options": [{"tr": "Risk iştahının tanımlanması.","en": "Definition of risk appetite.","cmt_tr": "Strateji ve hedef belirleme bileşeni, kuruluşun risk iştahını (değer peşinde koşarken kabul etmeye istekli olduğu risk miktarını) tanımladığı ilkesini içerir.","cmt_en": "The strategy and objective setting component includes the principle that the organization defines risk appetite (the amount of risk it is willing to accept in pursuit of value). The organization considers its mission, vision, culture, prior strategies, and risk capacity (the maximum risk it can assume) to set its risk appetite."},{"tr": "Risk ciddiyetinin değerlendirilmesi.","en": "Assessment of risk severity.","cmt_tr": "Performans bileşeni, kuruluşun riskin ciddiyetini değerlendirdiği ilkesini içerir.","cmt_en": "The performance component includes the principle that the organization assesses the severity of risk. Severity is a measure of such considerations as impact, likelihood, and the time to recover from events."},{"tr": "Faaliyet yapılarının oluşturulması.","en": "Establishment of operating structures.","cmt_tr": "Yönetişim ve kültür bileşeni, kuruluşun faaliyet yapılarını oluşturduğu ilkesini içerir. Bunlar kuruluşun nasıl düzenlendiğini ve günlük operasyonlarını nasıl yürüttüğünü tanımlar.","cmt_en": "The governance and culture component includes the principle that the organization establishes operating structures. They describe how the entity is organized and carries out day-to-day operations and generally are aligned with the entity’s legal structure and management structure."},{"tr": "Risk, kültür ve performans hakkında raporlama.","en": "Reporting on risk, culture, and performance.","cmt_tr": "Bilgi, iletişim ve raporlama bileşeni, kuruluşun birden çok düzeyde ve kuruluş genelinde risk, kültür ve performans hakkında raporlama yaptığı ilkesini içerir.","cmt_en": "The information, communication, and reporting component includes the principle that the organization reports on risk, culture, and performance at multiple levels and across the entity."}],"answer": 2},{"q_tr": "Bir kuruluşun riske verdiği yanıt kabulse, risk büyük olasılıkla aşağıdakilerden hangisidir?","q_en": "If an entity’s response to risk is acceptance, the risk most likely is","options": [{"tr": "Kaçınılamaz.","en": "Not avoidable.","cmt_tr": "Risk iştahı, kuruluşun değer peşinde koşarken kabul etmeye istekli olduğu risk miktarı ve türleridir. Kaçınma, riski ortadan kaldırmak için alınan eylemdir.","cmt_en": "Risk appetite is the amount and types of risk the organization is willing to accept in pursuit of value. Avoidance is action taken to remove the risk. Avoidance typically suggests no response would reduce the risk to an acceptable level."},{"tr": "Risk iştahı dahilindedir.","en": "Within the risk appetite.","cmt_tr": "Risk iştahı, kuruluşun değer peşinde koşarken kabul etmeye istekli olduğu risk miktarı ve türleridir. Kabul (benimseme), riskin ciddiyetini değiştirmek için hiçbir eylem yapmaz. Risk, risk iştahı dahilinde olduğunda kabul uygundur.","cmt_en": "Risk appetite is the amount and types of risk the organization is willing to accept in pursuit of value. Acceptance (retention) takes no action to alter the severity of the risk. Acceptance is"},{"tr": "Kuruluşun toleransı dahilinde değildir.","en": "Not within the entity’s tolerance.","cmt_tr": "Tolerans, hedeflere ulaşmayla ilgili kabul edilebilir performans sonuçları aralığıdır.","cmt_en": "Tolerance is the range of acceptable performance results related to achieving objectives."},{"tr": "Hedef risk profilinin dışındadır.","en": "Outside the target risk profile.","cmt_tr": "Risk, hedef risk profilinin dışında olduğunda daha olası yanıtlar (1) kaçınma, (2) azaltma veya (3) paylaşmadır.","cmt_en": "A risk profile is a composite of the types, severity, and interdependencies of risks related to a specific strategy or objective. The more likely responses when the risk is outside the target risk profile are (1) avoidance (removal), (2) reduction (mitigation) to bring the risk within the risk profile and risk appetite, or (3) sharing (transfer) a portion of the risk to another party."}],"answer": 1},{"q_tr": "Kuruluşun portföy risk görünümünün değerlendirilmesi, COSO'nun kurumsal risk yönetimi (KRY) çerçevesinin hangi bileşeninde belirtilen bir ilkeyle ilgilidir?","q_en": "Evaluation of the organization’s portfolio view of risk relates to a principle stated in which component of the COSO’s enterprise risk management (ERM) framework?","options": [{"tr": "Performans.","en": "Performance.","cmt_tr": "Performans bileşenindeki bir ilke, kuruluşun portföy risk görünümünü geliştirdiğini ve değerlendirdiğini belirtir. Risk belirleme, değerlendirme, önceliklendirme ve yanıtın doruk noktası, tam portföy risk görünümüdür.","cmt_en": "A principle in the performance component states that the organization develops and evaluates its portfolio view of risk. The culmination of risk identification, assessment, prioritization, and response is the full portfolio view of risk. A portfolio view is a risk profile related to entity-wide strategy and business objectives and their effects on performance."},{"tr": "Strateji ve hedef belirleme.","en": "Strategy and objective setting.","cmt_tr": "Strateji, kuruluşun misyon, vizyon ve temel değerlerini desteklemelidir.","cmt_en": "Strategy must support the organization’s mission, vision, and core values. The integration of ERM with strategy setting helps to understand the risk profile related to strategy and business objectives."},{"tr": "Gözden geçirme ve revizyon.","en": "Review and revision.","cmt_tr": "Kuruluş, strateji ve iş hedeflerindeki değişikliklere dayalı olarak mevcut KRY yeteneklerini ve uygulamalarını gözden geçirir ve revize eder.","cmt_en": "The organization reviews and revises its current ERM capabilities and practices based on changes in strategy and business objectives."},{"tr": "Bilgi, iletişim ve raporlama.","en": "Information, communication, and reporting.","cmt_tr": "Kuruluş, strateji ve iş hedeflerini etkileyebilecek riskleri belirlemek için zamanında ve ilgili bilgileri yakalamalı, işlemeli, yönetmeli ve iletmelidir.","cmt_en": "The organization must capture, process, manage (organize and store), and communicate timely and relevant information to identify risks that could affect strategy and business objectives."}],"answer": 0},{"q_tr": "Aşağıdakilerden hangisi, COSO'nun KRY çerçevesinin performans bileşeninin bir ilkesidir?","q_en": "Which of the following is a principle of the performance component of the COSO’s ERM framework?","options": [{"tr": "Kuruluş, kuruluş performans sonuçlarını gözden geçirir ve riski dikkate alır.","en": "The organization reviews entity performance results and considers risk.","cmt_tr": "KRY'nin gözden geçirme ve revizyon bileşeninin bir ilkesi, kuruluşun kuruluş performans sonuçlarını gözden geçirmesi ve riski dikkate almasıdır.","cmt_en": "A principle of the review and revision component of ERM is that the organization reviews entity performance results and considers risk."},{"tr": "Kuruluş risk, kültür ve performans hakkında raporlama yapar.","en": "The organization reports on risk, culture, and performance.","cmt_tr": "KRY'nin bilgi, iletişim ve raporlama bileşeninin bir ilkesi, kuruluşun birden çok düzeyde ve kuruluş genelinde risk, kültür ve performans hakkında raporlama yapmasıdır.","cmt_en": "A principle of the information, communication, and reporting component of ERM is that the organization reports on risk, culture, and performance at multiple levels and across the entity."},{"tr": "Risk yanıtlarının belirlenmesi ve seçilmesi.","en": "Identification and selection of risk responses.","cmt_tr": "Kuruluş, riskin yönetilebileceğini ancak ortadan kaldırılamayacağını kabul ederek risk yanıtlarını belirler ve seçer.","cmt_en": "The organization identifies and selects risk responses, recognizing that risk may be managed but not eliminated. Risks should be managed within the business context and objectives, performance targets, and risk appetite."},{"tr": "Kuruluş risk iştahını tanımlar.","en": "The organization defines risk appetite.","cmt_tr": "KRY'nin strateji ve hedef belirleme bileşeninin bir ilkesi, kuruluşun risk iştahını tanımlamasıdır.","cmt_en": "A principle of the strategy and objective setting component of ERM is that the organization defines risk appetite (the risk it is willing to accept in pursuit of value)."}],"answer": 2},{"q_tr": "COSO'nun KRY çerçevesinin strateji ve hedef belirleme bileşenine göre, kuruluş","q_en": "According to the strategy and objective setting component of the COSO’s ERM framework, the organization","options": [{"tr": "Bir stratejinin risk iştahıyla uyumunu değerlendirir.","en": "Evaluates alignment of a strategy with the risk appetite.","cmt_tr": "Kuruluş alternatif stratejileri ve risk profili üzerindeki etkilerini değerlendirir. (1) Stratejinin misyon, vizyon, temel değerler ve risk iştahıyla uyumunu ve (2) seçilen stratejinin sonuçlarını değerlendirmelidir.","cmt_en": "The organization evaluates alternative strategies and their effects on the risk profile. It must evaluate (1) the strategy’s alignment with its mission, vision, core values, and risk appetite, and (2) the implications of the chosen strategy (its risks, opportunities, and effects on the risk profile)."},{"tr": "Riskin ciddiyetini değerlendirir.","en": "Assesses the severity of risk.","cmt_tr": "Performans bileşeni, kuruluşun riskin ciddiyetini değerlendirdiği ilkesini içerir.","cmt_en": "The performance component includes the principle that the organization assesses the severity of risk. Severity is a measure of such considerations as impact, likelihood, and the time to recover from events."},{"tr": "Portföy risk görünümünü geliştirir.","en": "Develops its portfolio view of risk.","cmt_tr": "Performans bileşeni, kuruluşun portföy risk görünümünü geliştirdiği ve değerlendirdiği ilkesini içerir.","cmt_en": "The performance component includes the principle that the organization develops and evaluates its portfolio view of risk. The culmination of risk identification, assessment, prioritization, and response is the full portfolio view of risk."},{"tr": "Strateji ve iş hedeflerini önemli ölçüde etkileyebilecek değişiklikleri belirler ve değerlendirir.","en": "Identifies and assesses changes that may substantially affect strategy and business objectives.","cmt_tr": "Gözden geçirme ve revizyon bileşeni, kuruluşun strateji ve iş hedeflerini önemli ölçüde etkileyebilecek değişiklikleri belirlediği ve değerlendirdiği ilkesini içerir.","cmt_en": "The review and revision component includes the principle that the organization identifies and assesses changes that may substantially affect strategy and business objectives. Changes in the organization’s business context and culture are most likely to substantially affect strategy and business objectives."}],"answer": 0},{"q_tr": "KRY'nin gözden geçirme ve revizyon bileşeni, kuruluşun aşağıdakilerden hangisini yaptığı ilkesini içerir?","q_en": "The review and revision component of ERM includes the principle that the organization","options": [{"tr": "Riskleri önceliklendirir.","en": "Prioritizes risks.","cmt_tr": "Performans bileşeninin bir ilkesi, kuruluşun tüm seviyelerde riskleri önceliklendirmesidir.","cmt_en": "A principle of the performance component is that the organization prioritizes risks at all levels. Risk prioritization enables the organization to optimize the allocation of its limited resources."},{"tr": "Risk yanıtlarını belirler.","en": "Identifies risk responses.","cmt_tr": "Performans bileşeninin bir ilkesi, kuruluşun risk yanıtlarını belirlemesi ve seçmesidir.","cmt_en": "A principle of the performance component is that the organization identifies and selects risk responses, recognizing that risk may be managed but not eliminated. Risks should be managed within the business context and objectives, performance targets, and risk appetite."},{"tr": "KRY'nin iyileştirilmesini takip eder.","en": "Pursues improvement of ERM.","cmt_tr": "Kuruluş, KRY'nin iyileştirilmesini takip eder. Fiili performans hedef performans veya toleransla uyumlu olsa bile tüm seviyelerde KRY'yi sürekli iyileştirmelidir.","cmt_en": "The organization pursues improvement of ERM. It must continually improve ERM at all levels, even if actual performance aligns with target performance or tolerance."},{"tr": "Kültür hakkında raporlama yapar.","en": "Reports on culture.","cmt_tr": "Bilgi, iletişim ve raporlama bileşeninin bir ilkesi, kuruluşun birden çok düzeyde ve kuruluş genelinde risk, kültür ve performans hakkında raporlama yapmasıdır.","cmt_en": "A principle of the information, communication, and reporting component is that the organization reports on risk, culture, and performance at multiple levels and across the entity."}],"answer": 2},{"q_tr": "KRY'nin strateji ve hedef belirleme bileşenine göre, kuruluş","q_en": "According to the strategy and objective setting component of ERM, the organization","options": [{"tr": "Risk gözetimi uygular.","en": "Exercises risk oversight.","cmt_tr": "Yönetişim ve kültür bileşeni, yönetim kurulunun risk gözetimi uyguladığı ilkesini içerir.","cmt_en": "The governance and culture component includes the principle that the board exercises risk oversight."},{"tr": "İstenen kültürü tanımlar.","en": "Defines the desired culture.","cmt_tr": "Yönetişim ve kültür bileşeni, kuruluşun istenen kültürü tanımladığı ilkesini içerir.","cmt_en": "The governance and culture component includes the principle that the organization defines the desired culture."},{"tr": "Faaliyet yapıları oluşturur.","en": "Establishes operating structures.","cmt_tr": "Yönetişim ve kültür bileşeni, kuruluşun faaliyet yapıları oluşturduğu ilkesini içerir.","cmt_en": "The governance and culture component includes the principle that the organization establishes operating structures."},{"tr": "Risk iştahını tanımlar.","en": "Defines risk appetite.","cmt_tr": "Kuruluş, (1) misyon, (2) vizyon, (3) kültür, (4) önceki stratejiler ve (5) risk kapasitesini (üstlenilebilecek maksimum risk) dikkate alarak risk iştahını tanımlar.","cmt_en": "The organization defines risk appetite, i.e., the amount of risk it is willing to accept in pursuit of value, after considering its (1) mission, (2) vision, (3) culture, (4) prior strategies, and (5) risk capacity (the maximum risk it can assume). In setting risk appetite, the optimal balance of opportunity and risk is sought, but risk appetite is rarely set above risk capacity."}],"answer": 3},{"q_tr": "COSO'nun KRY çerçevesinin performans bileşeni, değer peşinde koşarken kararları destekleyen uygulamalarla, özellikle risk analiziyle ilgilidir. Aşağıdaki risk görünümlerinden hangisi en tamamen entegredir?","q_en": "The performance component of the COSO’s ERM framework relates to practices supporting decisions in support of value, particularly the analysis of risk. Which of the following views of risk is the most fully integrated?","options": [{"tr": "Risk profili görünümü.","en": "Risk profile view.","cmt_tr": "Risk profili görünümü kısmen entegredir.","cmt_en": "The risk profile view is partially integrated. Risks are linked to the business objectives they affect, and any dependencies between objectives are identified and assessed. For example, an objective of increased sales may depend on an objective to introduce a new product line."},{"tr": "Portföy görünümü.","en": "Portfolio view.","cmt_tr": "Portföy görünümü tamamen entegredir. Bu bileşik risk görünümü, kuruluş genelinde strateji ve iş hedefleriyle ilgili riskleri ve bunların kuruluş performansı üzerindeki etkisini kapsar.","cmt_en": "The portfolio view is fully integrated. This composite view of risks relates to entity-wide strategy and business objectives and their effect on entity performance. At the top level, greater emphasis is on strategy. Thus, responsibility for business objectives and specific risks cascades through the entity."},{"tr": "Risk görünümü.","en": "Risk view.","cmt_tr": "Risk görünümü minimum düzeyde entegredir. Riskler belirlenir ve değerlendirilir.","cmt_en": "The risk view is minimally integrated. Risks are identified and assessed, and emphasis is on the event, not the business objective."},{"tr": "Risk kategorisi görünümü.","en": "Risk category view.","cmt_tr": "Risk kategorisi görünümü sınırlı entegrasyon derecesine sahiptir.","cmt_en": "The risk category view has a limited degree of integration. Identified and assessed risks are categorized, e.g., based on operating structures."}],"answer": 1}],"SU4 - ISO 31000 Framework": [{"q_tr": "ISO 31000 risk yönetimi sürecine göre, yönetim kurulu aşağıdakilerden hangisinden sorumludur?","q_en": "According to the ISO 31000 risk management process, the board is responsible for","options": [{"tr": "Risk yönetimi sistemi hakkında güvence sağlamak.","en": "Providing assurance regarding the risk management system.","cmt_tr": "İç denetim fonksiyonu, tüm risk yönetimi sistemi hakkında güvence sağlamaktan sorumludur.","cmt_en": "The internal audit function is responsible for providing assurance regarding the entire risk management system. The internal audit function must evaluate the effectiveness and contribute to the improvement of risk management processes."},{"tr": "Riskleri belirlemek ve yönetmek.","en": "Identifying and managing risks.","cmt_tr": "Yönetim, riskleri belirlemek ve yönetmekten sorumludur.","cmt_en": "Management is responsible for identifying and managing risks. Management must focus on risks at all levels of the entity and take the necessary action to manage them."},{"tr": "Risk yönetimini denetlemek.","en": "Overseeing risk management.","cmt_tr": "ISO 31000 risk yönetimi sürecine göre yönetim kurulu, risk yönetimini denetlemekten ve risk yönetimi süreçlerinin mevcut, yeterli ve etkili olmasını sağlamaktan genel olarak sorumludur.","cmt_en": "According to the ISO 31000 risk management process, the board is responsible for overseeing risk management and has overall responsibility for ensuring that risk management processes are in place, adequate, and effective."},{"tr": "Kuruluşun risk tutumunu belirlemek.","en": "Setting the organization’s risk attitude.","cmt_tr": "Yönetim, kuruluşun risk tutumunu belirlemekten sorumludur. ISO bunu \"kuruluşun riski değerlendirme ve nihayetinde takip etme, tutma, üstlenme veya riskten kaçınma yaklaşımı\" olarak tanımlar.","cmt_en": "Management is responsible for setting the organization’s risk attitude, which is defined by ISO as an “organization’s approach to assess and eventually pursue, retain, take, or turn away from risk.” Management also identifies and manages risks."}],"answer": 2},{"q_tr": "ISO 31000'deki rehberlikte yer alan risk yönetimi süreci, aşağıdaki unsurlardan hangisini içerir?","q_en": "The risk management process in the guidance contained in ISO 31000 includes which of the following elements?","options": [{"tr": "Risk yönetimini kapsamlı bir şekilde yapılandırmak ve entegre etmek.","en": "Comprehensively structuring and integrating risk management.","cmt_tr": "ISO 31000 ilkeleri arasında (1) risk yönetimini tüm faaliyetlere entegre etmek ve (2) yapılandırılmış ve kapsamlı bir risk yönetimi yaklaşımı kullanmak yer alır.","cmt_en": "ISO 31000 principles include (1) integrating risk management into all activities and (2) using a structured and comprehensive risk management approach."},{"tr": "Mevcut en iyi bilgiyi ve sınırlılıklarını dikkate almak.","en": "Considering the best available information and its limitations.","cmt_tr": "ISO 31000'in bir ilkesi, risk yönetiminin geçmiş, güncel ve gelecek bilgileri ve bu bilgilerin ilgili sınırlılıklarını dikkate almasıdır.","cmt_en": "A principle of ISO 31000 is that the best available information is obtained when risk management considers past, current, and future information and any related limitations of such information."},{"tr": "Kaynak tahsis etmek ve iletişim kurmak üzere risk yönetimi çerçevesini tasarlamak.","en": "Designing the risk management framework to allocate resources and establish communication.","cmt_tr": "Risk yönetimi çerçevesini tasarlamak, risk yönetimi çerçevesinin altı bileşeninden biridir.","cmt_en": "Designing the risk management framework is one of six components of the risk management framework."},{"tr": "Risk yanıtlarını seçmek ve artık riskin kabul edilebilirliğini belirlemek.","en": "Selecting risk responses and determining the acceptability of residual risk.","cmt_tr": "Risk yönetimi sürecinin unsurlarından biri risk işlemedir. Risk işleme, (1) risk işleme yöntemlerinin seçilmesi, (2) işlemenin uygulanması, (3) işlemenin etkililiğinin değerlendirilmesi, (4) artık riskin kabul edilebilir olup olmadığının belirlenmesi ve (5) birincisi kabul edilemezse başka bir işlemenin benimsenmesinden oluşan tekrarlayan bir süreçtir.","cmt_en": "One element of the risk management process is risk treatment. It is a repetitive process of (1) selecting risk treatments (e.g., such risk responses as acceptance, avoidance, reduction, sharing, and pursuit), (2) implementing the treatment, (3) assessing the treatment’s effectiveness, (4) determining whether the residual risk is acceptable, and (5) adopting another treatment if the first was unacceptable."}],"answer": 3},{"q_tr": "ISO 31000, risk yönetimi sorumluluklarını tanımlar. Örneğin, kuruluşun riski değerlendirme ve riske yanıt verme yaklaşımı aşağıdakilerden hangisinin sorumluluğundadır?","q_en": "ISO 31000 defines the responsibilities for risk management. For example, the organization’s approach to assessing and responding to risk is the responsibility of","options": [{"tr": "Yönetim kurulu.","en": "The board.","cmt_tr": "Yönetim kurulu, risk yönetimini denetlemek ve risklerin yönetilmesini ve risk yönetimi sisteminin etkili olmasını sağlamaktan genel olarak sorumludur.","cmt_en": "The board is responsible for overseeing risk management and has overall responsibility for ensuring that risks are managed and the risk management system is effective."},{"tr": "Denetim komitesi.","en": "The audit committee.","cmt_tr": "Denetim komitesi, yönetim kurulu üyelerinden oluşan bir gruptur, yöneticilerden değil.","cmt_en": "The audit committee is a group of directors, not managers."},{"tr": "Yönetim.","en": "Management.","cmt_tr": "Yönetim, kuruluşun risk tutumunu belirlemekten sorumludur. ISO 31000 bunu kuruluşun riski değerlendirme ve nihayetinde takip etme, tutma, üstlenme veya riskten kaçınma yaklaşımı olarak tanımlar.","cmt_en": "Management is responsible for setting the organization’s risk attitude. It is defined by ISO 31000 as an organization’s approach to assessing and eventually pursuing, retaining, taking, or turning away from risk. Management also identifies and manages risks."},{"tr": "İç denetim fonksiyonu.","en": "The internal audit function.","cmt_tr": "İç denetim fonksiyonu, tüm risk yönetimi sistemi hakkında güvence sağlamaktan sorumludur.","cmt_en": "The internal audit function is responsible for providing assurance regarding the entire risk management system."}],"answer": 2},{"q_tr": "ISO 31000'e göre, aşağıdakilerden hangisi risk yönetiminin bir ilkesidir?","q_en": "According to ISO 31000, which of the following is a principle of risk management?","options": [{"tr": "Liderlik ve bağlılık.","en": "Leadership and commitment.","cmt_tr": "Liderlik ve bağlılık, risk yönetimi çerçevesinin altı bileşeninden biridir.","cmt_en": "Leadership and commitment is one of the six components of a risk management framework."},{"tr": "Risk analizi.","en": "Risk analysis.","cmt_tr": "Risk belirleme, risk analizi ve risk değerlendirme, risk yönetiminin unsurlarından biri olan risk değerlendirmesi sürecindeki faaliyetlerdir.","cmt_en": "Risk identification, risk analysis, and risk evaluation are activities in the process of risk assessment, one of the elements of risk management."},{"tr": "Mevcut en iyi bilgi.","en": "Best available information.","cmt_tr": "ISO 31000, risk yönetimine ilke tabanlı bir yaklaşımdır. İlkeleri, risk yönetiminin temelidir. Ayrıca etkili ve verimli risk yönetiminin özelliklerini, değerini ve amacını iletir. Bir ilke, risk yönetiminin geçmiş, güncel ve gelecek bilgileri ve bu bilgilerin ilgili sınırlılıklarını dikkate almasıdır.","cmt_en": "ISO 31000 is a principles-based approach to risk management. Its principles are the foundation"},{"tr": "İzleme ve gözden geçirme.","en": "Monitoring and review.","cmt_tr": "İzleme ve gözden geçirme, risk yönetimi sürecinin bir unsurudur.","cmt_en": "Monitoring and review is an element of the risk management process."}],"answer": 2},{"q_tr": "Aşağıdakilerden hangisi risk yönetimi faaliyetlerinin en kapsamlı listesidir?","q_en": "Which of the following is the most complete list of risk management activities?","options": [{"tr": "Risklerin önemini ve olasılığını değerlendirmek.","en": "Assessing the significance and likelihood of risks.","cmt_tr": "Risk analizi süreci ayrıca riskin yönetilme araçlarının değerlendirilmesini de içerir.","cmt_en": "The risk analysis process also includes considering the means to manage the risk."},{"tr": "Riskleri belirlemek ve bu riskleri yönetmek.","en": "Identifying risks and managing those risks.","cmt_tr": "Risk analizi süreci ayrıca bir olayın öneminin değerlendirilmesini de içerir.","cmt_en": "The risk analysis process also includes assessing the significance of an event."},{"tr": "Risk yönetimi süreçlerini değerlendirmek ve gerektiğinde iyileştirmeler önermek.","en": "Evaluating risk management processes and recommending improvements as necessary.","cmt_tr": "İç denetçiler risk yönetimi sürecini değerlendirir ve öneriler yapar, ancak bu risk yönetimi sürecinin kendisi değildir.","cmt_en": "Internal auditors evaluate the risk management process and make recommendations, but this is not the risk management process itself."},{"tr": "Risklerin önemini ve olasılığını değerlendirmek ve riski yönetme araçlarını dikkate almak.","en": "Assessing the significance and likelihood of risks and considering the means to manage the risks.","cmt_tr": "Risk analizi süreci, bir olayın öneminin değerlendirilmesi, olayın olasılığının değerlendirilmesi ve riski yönetme araçlarının dikkate alınmasını içerir.","cmt_en": "The risk analysis process involves assessing the significance of an event, assessing the event’s likelihood, and considering the means to manage the risk."}],"answer": 3},{"q_tr": "Risk yönetimi sürecine güvence sağlamanın aşağıdaki yaklaşımlarından hangisi, etkili risk yönetimi süreçlerinin her olgunlaşma aşamasında değer katarak geliştiği ilkesine dayanır?","q_en": "Which of the following approaches to providing assurance on the risk management process is based on the principle that effective risk management processes develop as value is added at each stage of maturation?","options": [{"tr": "Süreç unsurları yaklaşımı.","en": "The process element approach.","cmt_tr": "Süreç unsurları yaklaşımı, belirli unsurların (resmi risk belirleme, resmi risk analizi, risk değerlendirme vb.) uygulanıp uygulanmadığını belirler.","cmt_en": "The process element approach determines whether certain elements (i.e., formal risk identification, formal risk analysis, risk evaluation, etc.) have been implemented."},{"tr": "Temel ilkeler yaklaşımı.","en": "The key principles approach.","cmt_tr": "Temel ilkeler yaklaşımı, risk yönetimi ilkelerinin mevcut olup olmadığını (örneğin entegre, yapılandırılmış, kapsamlı ve özelleştirilmiş) belirler.","cmt_en": "The key principles approach determines whether the risk management principles are in place (e.g., integrated, structured, comprehensive, and customized)."},{"tr": "Olgunluk modeli yaklaşımı.","en": "The maturity model approach.","cmt_tr": "Olgunluk modeli yaklaşımı, etkili risk yönetimi süreçlerinin her olgunlaşma aşamasında değer katarak geliştiği ilkesine dayanır. Buna göre bu yaklaşım, risk yönetiminin olgunluk eğrisinde nerede olduğunu ve (1) beklendiği gibi ilerlediğini, (2) değer kattığını ve (3) kurumsal ihtiyaçları karşılayıp karşılamadığını belirler.","cmt_en": "The maturity model approach is based on the principle that effective risk management processes develop as value is added at each stage of maturation. Accordingly, this approach determines"},{"tr": "Hiçbir cevap doğru değildir.","en": "None of the answers are correct.","cmt_tr": "Cevaplardan biri doğrudur.","cmt_en": "One of the answers is correct."}],"answer": 2},{"q_tr": "Aşağıdakilerden hangisi ISO 31000 modelinin risk yönetimi çerçevesinin bir bileşeni değildir?","q_en": "Which of the following is not a component of the risk management framework of the ISO 31000 model?","options": [{"tr": "Değerlendirme.","en": "Evaluation.","cmt_tr": "Değerlendirme, ISO 31000 modelinin çerçevesinin bir bileşenidir.","cmt_en": "Evaluation is a component of the framework of the ISO 31000 model."},{"tr": "İyileştirme.","en": "Improvement.","cmt_tr": "İyileştirme, ISO 31000 modelinin çerçevesinin bir bileşenidir.","cmt_en": "Improvement is a component of the framework of the ISO 31000 model."},{"tr": "İnsani ve kültürel faktör.","en": "Human and cultural factor.","cmt_tr": "\"İnsani ve kültürel faktör\", ISO 31000 modelinde risk yönetimi çerçevesinin bir bileşeni değil, bir ilkesidir.","cmt_en": "The “human and cultural factor” is a principle, not a component, of the framework of risk management in the ISO 31000 model."},{"tr": "Tasarım.","en": "Design.","cmt_tr": "Tasarım, ISO 31000 modelinin çerçevesinin bir bileşenidir.","cmt_en": "Design is a component of the framework of the ISO 31000 model."}],"answer": 2},{"q_tr": "ISO 31000 modeli, risk yönetimi süreçlerine güvence sağlamanın üç yaklaşımını tanımlar. Aşağıdakilerden hangisi bu yaklaşımlardan biridir?","q_en": "The ISO 31000 model describes three approaches to providing assurance on risk management processes. Which of the following is one of these approaches?","options": [{"tr": "Olgunluk modeli.","en": "Maturity model.","cmt_tr": "Olgunluk modeli yaklaşımı, etkili risk yönetimi süreçlerinin her olgunlaşma aşamasında değer katarak geliştiği ilkesine dayanır.","cmt_en": "The maturity model approach is based on the principle that effective risk management processes develop as value is added at each stage of maturation."},{"tr": "Olumsuz güvence.","en": "Negative assurance.","cmt_tr": "Olumsuz güvence, ISO 31000 modelinde tanımlanan risk yönetimi süreçlerine güvence sağlama konusunda geçerli bir kavram değildir.","cmt_en": "Negative assurance is not a concept applicable to providing assurance on risk management processes described in the ISO 31000 model."},{"tr": "Aşağıdan yukarıya.","en": "Bottom-up.","cmt_tr": "Aşağıdan yukarıya risk yönetimi yaklaşımı, operasyonel düzeyden başlar ve kuruluş içindeki daha üst seviyelere doğru ilerler.","cmt_en": "The bottom-up approach to risk management starts at the operational level and moves up to higher levels within the organization."},{"tr": "Yukarıdan aşağıya.","en": "Top-down.","cmt_tr": "Yukarıdan aşağıya risk yönetimi yaklaşımı, kuruluşun en üst seviyesinden başlar ve üst yönetimin stratejik hedefleri ve temel riskleri belirlemesiyle başlar.","cmt_en": "The top-down approach to risk management starts at the highest level of the organization with top management identifying strategic objectives and key risks."}],"answer": 0},{"q_tr": "Risk yönetimi sürecine güvence sağlamada olgunluk modeli yaklaşımı, aşağıdaki ilkeye dayanır:","q_en": "The maturity model approach to providing assurance on the risk management process is based on the principle that","options": [{"tr": "Etkili risk yönetimi, risk yönetimi ilkelerinin zaman içinde tutarlı bir şekilde izlenmesiyle sağlanır.","en": "Effective risk management is achieved when risk management principles are consistently followed over time.","cmt_tr": "En iyi uygulama risk yönetimi ilkelerini tutarlı bir şekilde izlemek etkili risk yönetimine yol açabilir, ancak bu olgunluk modeli yaklaşımı değildir.","cmt_en": "Consistently following best-practice risk management principles may lead to effective risk management, but it is not the maturity model approach."},{"tr": "Etkili risk yönetimi, risk yönetimi unsurları uygulamaya konuldukça gelişir.","en": "Effective risk management develops as the elements of risk management are put into practice.","cmt_tr": "Risk yönetimi unsurları uygulamaya konuldukça etkili risk yönetimi gelişebilir, ancak olgunluk modeli yaklaşımı her olgunlaşma aşamasında değer katar.","cmt_en": "Effective risk management may develop as the elements of risk management are put into place, but the maturity model approach adds value at each maturation stage."},{"tr": "Etkili risk yönetimi, giriş, büyüme, olgunluk ve düşüş döngüsünü izler.","en": "Effective risk management follows a cycle of introduction, growth, maturity, and decline.","cmt_tr": "Giriş, büyüme, olgunluk ve düşüş döngüsü, risk yönetimi sürecine güvence sağlamada olgunluk modeli yaklaşımı değil, ürün yaşam döngüsünün bir tanımıdır.","cmt_en": "The cycle of introduction, growth, maturity, and decline is a description of the product life cycle, not the maturity model approach to providing assurance on the risk management process."},{"tr": "Etkili risk yönetimi süreçleri zamanla değer katarak gelişir ve iyileşir.","en": "Effective risk management processes develop and improve with time as value is added.","cmt_tr": "Olgunluk modeli yaklaşımı, etkili risk yönetimi süreçlerinin her olgunlaşma aşamasında değer katarak geliştiği ilkesine dayanır. Buna göre bu yaklaşım, risk yönetiminin olgunluk eğrisinde nerede olduğunu ve (1) beklendiği gibi ilerlediğini, (2) değer kattığını ve (3) kurumsal ihtiyaçları karşılayıp karşılamadığını belirler.","cmt_en": "The maturity model approach is based on the principle that effective risk management processes develop as value is added at each stage of maturation. Accordingly, this approach determines where risk management is on the maturity curve and whether (1) it is progressing as expected, (2) adds value, and (3) meets organizational needs."}],"answer": 3},{"q_tr": "ISO 31000'e göre, aşağıdakilerden hangisi risk yönetiminin bir ilkesi değildir?","q_en": "According to ISO 31000, which of the following is not a principle of risk management?","options": [{"tr": "İnsani ve kültürel faktörleri dikkate alır.","en": "Considers human and cultural factors.","cmt_tr": "ISO 31000'e göre risk yönetiminin bir ilkesi, risk yönetiminin insani ve kültürel faktörleri dikkate almasıdır.","cmt_en": "A principle of risk management according to ISO 31000 is that risk management considers human and cultural factors."},{"tr": "Hesap verebilirlik ve yetkiyi devreder.","en": "Delegates accountability and authority.","cmt_tr": "ISO 31000, risk yönetimine ilke tabanlı bir yaklaşımdır. İlkeleri şunlardır: (1) entegre, (2) yapılandırılmış ve kapsamlı, (3) özelleştirilmiş, (4) kapsayıcı, (5) dinamik, (6) mevcut en iyi bilgi, (7) insani ve kültürel faktörler ve (8) sürekli iyileştirme.","cmt_en": "ISO 31000 is a principles-based approach to risk management. Its principles are the foundation for risk management. They also communicate the characteristics, value, and purpose of effective and efficient risk management. Value creation and protection are the purposes of risk management. The principles are the following: (1) integrated, (2) structured and comprehensive, (3) customized, (4) inclusive, (5) dynamic, (6) best available information, (7) human and cultural factors, and (8) continual improvement."},{"tr": "Sürekli iyileştirmeyi teşvik eder.","en": "Promotes continual improvement.","cmt_tr": "ISO 31000'e göre risk yönetiminin bir ilkesi, risk yönetiminin sürekli iyileştirmeyi teşvik etmesidir.","cmt_en": "A principle of risk management according to ISO 31000 is that risk management promotes continuous improvement."},{"tr": "Mevcut en iyi bilgiyi dikkate alır.","en": "Considers the best available information.","cmt_tr": "ISO 31000'e göre risk yönetiminin bir ilkesi, risk yönetiminin mevcut en iyi bilgiyi dikkate almasıdır.","cmt_en": "A principle of risk management according to ISO 31000 is that risk management considers the best available information."}],"answer": 1},{"q_tr": "ISO 31000 risk yönetimi yaklaşımı","q_en": "The ISO 31000 approach to risk management is","options": [{"tr": "Kaynak tabanlıdır.","en": "Resource based.","cmt_tr": "ISO 31000 risk yönetimi yaklaşımı kaynak tabanlı değil, ilke tabanlıdır.","cmt_en": "The ISO 31000 approach to risk management is principles based, not resource based."},{"tr": "Süreç tabanlıdır.","en": "Process based.","cmt_tr": "ISO 31000 risk yönetimi yaklaşımı süreç tabanlı değil, ilke tabanlıdır.","cmt_en": "The ISO 31000 approach to risk management is principles based, not process based."},{"tr": "Hedef tabanlıdır.","en": "Objective based.","cmt_tr": "ISO 31000 risk yönetimi yaklaşımı hedef tabanlı değil, ilke tabanlıdır.","cmt_en": "The ISO 31000 approach to risk management is principles based, not objective based."},{"tr": "İlke tabanlıdır.","en": "Principles based.","cmt_tr": "ISO 31000, risk yönetimine ilke tabanlı bir yaklaşımdır. İlkeleri, risk yönetiminin temelidir.","cmt_en": "ISO 31000 is a principles-based approach to risk management. Its principles are the foundation for risk management. They also communicate the characteristics, value, and purpose of effective and efficient risk management. Value creation and protection are the purposes of risk management. The principles are the following: (1) integrated, (2) structured and comprehensive, (3) customized, (4) inclusive, (5) dynamic, (6) best available information, (7) human and cultural factors, and (8) continual improvement."}],"answer": 3},{"q_tr": "ISO 31000'e göre, risk yönetimi çerçevesinin tasarımı aşağıdakilerden hangisini içerir?","q_en": "According to ISO 31000, the design of a risk management framework involves which of the following?","options": [{"tr": "Uygun bir risk yanıtına karar vermek.","en": "Deciding on an appropriate risk response.","cmt_tr": "ISO 31000'e göre uygun bir risk yanıtına karar vermek, risk yönetimi çerçevesinin tasarımına dahil değildir.","cmt_en": "Deciding on an appropriate risk response is not involved in the design of a risk management framework according to ISO 31000."},{"tr": "Kuruluşu ve bağlamını anlamak.","en": "Understanding the organization and its context.","cmt_tr": "ISO 31000'in bir bileşenine göre, riski yönetmek için bir çerçevenin tasarımı, kuruluşu ve bağlamını anlamayı içerir. Çerçevenin tasarımı şunları içerir: (1) kuruluşu ve bağlamını anlamak, (2) risk yönetimine bağlılığı ifade etmek, (3) tüm seviyelerde risk yönetimi rolleri için yetki, sorumluluk ve hesap verebilirlikleri atamak ve iletmek, (4) kaynakları tahsis etmek ve (5) iletişim ve danışmayı oluşturmak.","cmt_en": "According to a component of ISO 31000, the design of a framework for managing risk involves understanding the organization and its context. The design of the framework involves (1) understanding the organization and its context; (2) articulating commitment to risk management; (3) assigning and communicating authorities, responsibilities, and accountabilities for risk management roles at all levels; (4) allocating resources (e.g., people, experience, processes, and information systems) to support risk management while recognizing the limitations of existing resources; and (5) establishing communication and consultation."},{"tr": "Bir plan geliştirmek.","en": "Developing a plan.","cmt_tr": "ISO 31000'e göre bir plan geliştirmek, risk yönetimi çerçevesinin tasarımına değil, çerçevenin uygulanmasına dahil olan bir adımdır.","cmt_en": "Developing a plan is not involved in the design of a risk management framework according to ISO 31000. It is a step in implementing the framework."},{"tr": "Riskleri belirlemek.","en": "Identifying risks.","cmt_tr": "ISO 31000'e göre riskleri belirlemek, risk yönetimi çerçevesinin tasarımına dahil değildir.","cmt_en": "Identifying risks is not involved in the design of a risk management framework according to ISO 31000."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangisi ISO 31000 risk yönetimi sürecinin bir unsurudur?","q_en": "Which one of the following is an element of the ISO 31000 risk management process?","options": [{"tr": "Risk işleme.","en": "Risk treatment.","cmt_tr": "Risk işleme, ISO 31000 risk yönetimi sürecinin bir unsurudur. Risk işleme, (1) risk işleme yöntemlerinin seçilmesi, (2) işlemenin uygulanması, (3) işlemenin etkililiğinin değerlendirilmesi, (4) artık riskin kabul edilebilir olup olmadığının belirlenmesi ve (5) birincisi kabul edilemezse başka bir işlemenin benimsenmesinden oluşan tekrarlayan bir süreçtir.","cmt_en": "Risk treatment is an element of the ISO 31000 risk management process. Risk treatment is a repetitive process of (1) selecting risk treatments (e.g., accept, avoid, reduce, share, or pursue), (2) implementing the treatment, (3) assessing the treatment’s effectiveness, (4) determining whether the residual risk is acceptable, and (5) adopting another treatment if the first is not acceptable. The ISO 31000 risk management process consists of the following elements: (1) communication and consultation; (2) scope, context, and criteria; (3) risk assessment (including risk identification, risk analysis, and risk evaluation); (4) risk treatment; (5) monitoring and review; and (6) recording and reporting."},{"tr": "Risk kapasitesi.","en": "Risk capacity.","cmt_tr": "Risk kapasitesi, bir kuruluşun üstlenebileceği ve ödeme gücünü koruyabileceği maksimum miktardır. Risk işleme sırasında dikkate alınır ancak unsurlardan biri değildir.","cmt_en": "Risk capacity is the maximum amount an organization is able to bear and remain solvent. It is considered during risk treatment. It is not one of the elements."},{"tr": "Risk iştahı.","en": "Risk appetite.","cmt_tr": "Risk iştahı, kuruluşun kabul etmeye istekli olduğu risk miktarıdır. Risk işleme sırasında dikkate alınır ancak ayrı bir unsur değildir.","cmt_en": "Risk appetite is the amount of risk the organization is willing to accept. It is considered during risk treatment, but is not a separate element."},{"tr": "Risk ortadan kaldırma.","en": "Risk elimination.","cmt_tr": "Risk ortadan kaldırma mümkün değildir ve bu nedenle ISO 31000 risk yönetimi sürecinin bir unsuru değildir.","cmt_en": "Risk elimination is not possible and therefore is not an element of the ISO 31000 risk management process."}],"answer": 0},{"q_tr": "ISO 31000 modeli kapsamında, risk yönetimi sürecinin risk değerlendirme unsuru","q_en": "Under the ISO 31000 model, the risk assessment element of a risk management process","options": [{"tr": "Risk yönetimi sürecinin kapsamını ve risk kriterlerini tanımlar.","en": "Defines the scope of the risk management process and risk criteria.","cmt_tr": "Kapsam, bağlam ve kriterler unsuru, risk yönetimi sürecinin kapsamını tanımlamayı, iç ve dış bağlamını anlamayı ve risk kriterlerini belirlemeyi içerir.","cmt_en": "The scope, context, and criteria element of a risk management process includes defining the scope of the risk management process, understanding its external and internal context, and defining risk criteria."},{"tr": "Belirlenen risk kriterleriyle risk analizi sonuçlarını karşılaştırır.","en": "Compares the established risk criteria with the results of the risk analysis.","cmt_tr": "Risk değerlendirme unsuru, risk belirleme, analiz ve değerleme sürecidir. Risk değerlemesi, tanımlanan risk kriterleriyle risk analizinin sonucunu karşılaştırarak ve herhangi bir eylemin gerekli olup olmadığını belirleyerek karar vermeyi destekler.","cmt_en": "The risk assessment element of a risk management process is the process of identifying, analyzing, and evaluating risk. Risk evaluation supports decision making by comparing the defined risk criteria with the outcome of risk analysis and determining whether any action is required."},{"tr": "Artık riskin kuruluşun risk iştahı dahilinde olup olmadığını belirler.","en": "Determines whether the residual risk is within the organization’s risk appetite.","cmt_tr": "Risk işleme, risk değerlendirmesi değil, (1) bir risk işleme seçme, (2) işlemeyi uygulama, (3) işlemenin etkililiğini değerlendirme, (4) artık riskin kabul edilebilir olup olmadığını belirleme ve (5) birincisi kabul edilemezse başka bir işleme benimsemeden oluşan tekrarlayan bir süreçtir.","cmt_en": "The risk management process consists of (1) communication and consultation; (2) scope, context, and criteria; (3) risk assessment; (4) risk treatment; (5) monitoring and review; and (6) recording and reporting. Risk treatment is a repetitive process of (1) selecting a risk treatment, (2) implementing the treatment, (3) assessing the treatment’s effectiveness, (4) determining whether the residual risk is acceptable, and (5) adopting another treatment if the first was unacceptable. Determining whether the residual risk is within the organization’s risk appetite is included in risk treatment, not risk assessment."},{"tr": "Risk belirleme, risk analizi ve risk işlemeyi içerir.","en": "Includes risk identification, risk analysis, and risk treatment.","cmt_tr": "Risk değerlendirmesi, risk belirleme, analiz ve değerleme sürecidir. Risk işleme, risk değerlendirme unsurundan ayrı bir risk yönetimi süreci unsurudur.","cmt_en": "Risk assessment is the process of identifying, analyzing, and evaluating risk. Risk treatment is an element of a risk management process distinct from the risk assessment element. Risk treatment follows risk assessment."}],"answer": 1},{"q_tr": "ISO 31000, risk yönetimi sürecine güvence sağlamada bir olgunluk modeli yaklaşımını tanımlar. Bu yaklaşımın temel unsuru nedir?","q_en": "ISO 31000 describes a maturity model assurance approach to risk management. An essential element of this approach is","options": [{"tr": "Risk yönetimi çerçevesinin özelleştirme bileşeni.","en": "The customization component of the risk management framework.","cmt_tr": "Özelleştirme temel bir ilkedir. Risk yönetimi çerçevesi ve süreci, kurumsal hedeflere göre özelleştirilmelidir.","cmt_en": "Customization is a foundational principle. The risk management framework and process should be customized to the organizational objectives."},{"tr": "Risk yönetimi sürecinin izleme ve gözden geçirme unsuru.","en": "The monitoring and review element of the risk management process.","cmt_tr": "İzleme ve gözden geçirme, bir güvence yaklaşımının değil, genel risk yönetimi sürecinin bir unsurudur.","cmt_en": "Monitoring and review constitute an element of the overall risk management process, not of an assurance approach. Monitoring and review should occur in all phases of the risk management process to improve its quality and effectiveness."},{"tr": "Risk yönetimi süreçlerinin zamanla iyileşmesi.","en": "Improvement of risk management processes with time.","cmt_tr": "Olgunluk modeli yaklaşımı, etkili risk yönetimi süreçlerinin olgunlaşma sürecinin her aşamasında değer katarak gelişip iyileştiği ilkesine dayanır. Temel ilke, risk yönetiminin değer katması gerektiğidir. Buna göre bu yaklaşım, risk yönetimi sürecinin olgunluk eğrisinde nerede olduğunu ve (1) beklendiği gibi ilerlediğini, (2) değer kattığını ve (3) kurumsal ihtiyaçları karşılayıp karşılamadığını belirler.","cmt_en": "The maturity model approach is based on the principle that effective risk management processes develop and improve with time as value is added at each phase in the maturation process. The basic principle is that risk management must add value. Accordingly, this approach determines where the risk management process is on the maturity curve and evaluates whether it (1) is progressing as expected, (2) adds value, and (3) meets organizational needs."},{"tr": "İnsani ve kültürel faktörlere vurgu.","en": "An emphasis on human and cultural factors.","cmt_tr": "İnsani ve kültürel faktörlere vurgu temel bir ilkedir.","cmt_en": "An emphasis on human and cultural factors is a foundational principle. These factors affect all facets and each level of risk management."}],"answer": 2},{"q_tr": "ISO 31000, aşağıdakileri içeren bir risk yönetimi çerçevesi öngörmektedir:","q_en": "ISO 31000 provides for a risk management framework that includes","options": [{"tr": "Bir liderlik ve bağlılık bileşeni.","en": "A leadership and commitment component.","cmt_tr": "ISO 31000'deki risk yönetimi çerçevesinin altı bileşeni vardır. Örneğin, yönetim kurulu ve üst yönetim (1) çerçevenin bileşenlerini uygulayarak, (2) risk yönetimi planı veya yaklaşımı oluşturan bir politika benimseyerek, (3) risk yönetimine kaynak ayırarak ve (4) her kurumsal düzeyde hesap verebilirlik, yetki ve sorumluluk atayarak liderlik ve bağlılık gösterir.","cmt_en": "The risk management framework in ISO 31000 has six components. For example, the board and senior management demonstrate leadership and commitment by (1) implementing the framework’s components; (2) adopting a policy that establishes a risk management plan or approach; (3) committing resources to risk management; and (4) assigning accountability, authority, and responsibility at each organizational level."},{"tr": "Bir kapsam, bağlam ve kriterler unsuru.","en": "A scope, context, and criteria element.","cmt_tr": "Kapsam, bağlam ve kriterler unsuru, risk yönetimi sürecinin bir parçasıdır.","cmt_en": "A scope, context, and criteria element is part of the risk management process."},{"tr": "Bir optimizasyon seviyesi.","en": "An optimizing level.","cmt_tr": "Optimizasyon seviyesi, yetenek olgunluk modelinin her iki versiyonunda da yer alır.","cmt_en": "An optimizing level is included in both versions of the capability maturity model."},{"tr": "Bir dinamizm ilkesi.","en": "A dynamism principle.","cmt_tr": "ISO 31000'de belirtilen bir ilke, risk yönetiminin dinamik olmasıdır.","cmt_en": "A principle stated in ISO 31000 is that risk management is dynamic. It foresees, recognizes, and reacts to changing risks."}],"answer": 0},{"q_tr": "ISO 31000 risk yönetimine bir yaklaşımdır. Risk yönetimi sürecine güvence sağlayan bir olgunluk modeli tanımlar. Olgunluk modeli yaklaşımı","q_en": "ISO 31000 is an approach to risk management. It describes a maturity model that provides assurance on the risk management process defined by ISO 31000. The maturity model approach","options": [{"tr": "Risk yönetimi ilkelerinin uygulamaya konulup konulmadığını değerlendirir.","en": "Evaluates whether risk management principles have been put into practice.","cmt_tr": "Temel ilkeler yaklaşımı, risk yönetimi ilkelerinin uygulamaya konulup konulmadığını değerlendirir.","cmt_en": "The key principles approach evaluates whether risk management principles have been put into practice."},{"tr": "Risk yönetiminin değer katması gerektiği ilkesine dayanır.","en": "Is based on the principle that risk management must add value.","cmt_tr": "Olgunluk modeli yaklaşımı, etkili risk yönetimi süreçlerinin olgunlaşma sürecinin her aşamasında değer katarak gelişip iyileştiği ilkesine dayanır. Temel ilke, risk yönetiminin değer katması gerektiğidir.","cmt_en": "The maturity model approach is based on the principle that effective risk management processes develop and improve with time as value is added at each phase in the maturation process. The basic principle is that risk management must add value."},{"tr": "Risk yönetimi unsurlarının uygulamaya konulup konulmadığını değerlendirir.","en": "Evaluates whether risk management elements have been put into practice.","cmt_tr": "Süreç unsurları yaklaşımı, risk yönetimi unsurlarının uygulamaya konulup konulmadığını değerlendirir.","cmt_en": "The process element approach evaluates whether risk management elements have been put into practice."},{"tr": "Risk yönetiminin tüm kurumsal faaliyetlere entegre edilip edilmediğini belirler.","en": "Determines whether risk management is integrated into all organizational activities.","cmt_tr": "Risk yönetiminin tüm kurumsal faaliyetlere entegre edilmesi, bir güvence yaklaşımı değil, risk yönetiminin bir ilkesidir.","cmt_en": "A principle of risk management, not an assurance approach, is that risk management is integrated into all organizational activities."}],"answer": 1},{"q_tr": "ISO 31000 risk yönetimi çerçevesine göre, hangi bileşeni büyük olasılıkla risk yönetimi için yetkilerin atanmasını içerir?","q_en": "According to the ISO 31000 risk management framework, which of its components most likely involves assigning authorities for risk management?","options": [{"tr": "Tasarım.","en": "Design.","cmt_tr": "Çerçevenin tasarımı şunları içerir: (1) kuruluşu ve bağlamını anlamak, (2) risk yönetimine bağlılığı ifade etmek, (3) tüm seviyelerde risk yönetimi rolleri için yetki, sorumluluk ve hesap verebilirlikleri atamak ve iletmek, (4) kaynakları tahsis etmek ve (5) iletişim ve danışmayı oluşturmak.","cmt_en": "The design of the framework involves (1) understanding the organization and its context; (2) articulating commitment to risk management; (3) assigning and communicating authorities, responsibilities, and accountabilities for risk management roles at all levels; (4) allocating resources (e.g., people, experience, processes, and information systems) to support risk management while recognizing the limitations of existing resources; and (5) establishing communication and consultation."},{"tr": "Entegre.","en": "Integrated.","cmt_tr": "Entegre, ISO 31000 risk yönetimi çerçevesinin bir ilkesidir. Karşılık gelen bileşeni olan entegrasyon, kuruluşun hedefleri, yapısı, yönetişimi ve kültürü dahil tüm yönlerini içerir. Özellikle risk yönetimi için yetki atamaz.","cmt_en": "Integrated is a principle of the ISO 31000 risk management framework. Its corollary component, integration, involves all facets of an organization, including its objectives, structure, governance, and culture. It does not specifically assign authorities for risk management."},{"tr": "Uygulama.","en": "Implementation.","cmt_tr": "Çerçevenin uygulanması, ISO 31000 risk yönetimi çerçevesinin bir bileşenidir ve bir plan geliştirir, karar verme süreçlerini belirler ve değiştirir ve paydaş katılımını sağlar.","cmt_en": "The implementation of the framework is a component of the ISO 31000 risk management framework that develops a plan, identifies and modifies decision-making processes, and ensures stakeholder engagement with risk management."},{"tr": "Risk değerlendirmesi.","en": "Risk assessment.","cmt_tr": "Risk değerlendirmesi, çerçevenin bir bileşeni değil, risk yönetimi sürecinin bir unsurudur.","cmt_en": "Risk assessment is an element, not a component, of the risk management process. It is the process of identifying, analyzing, and evaluating risk."}],"answer": 0},{"q_tr": "ISO 31000 risk yönetimi sürecinin unsurları şunları içerir:","q_en": "The elements of the ISO 31000 risk management process include","options": [{"tr": "Koruma.","en": "Protection.","cmt_tr": "Koruma, ISO 31000 risk yönetimi sürecinin bir amacıdır.","cmt_en": "Protection is a purpose of the ISO 31000 risk management process."},{"tr": "Entegrasyon.","en": "Integration.","cmt_tr": "Entegrasyon bir bileşendir; entegre ise bir ilkedir.","cmt_en": "Integration is a component, and integrated is a principle."},{"tr": "Değer yaratma.","en": "Value creation.","cmt_tr": "Değer yaratma, risk yönetiminin bir amacıdır.","cmt_en": "Value creation is a purpose of risk management."},{"tr": "İletişim ve danışma.","en": "Communication and consultation.","cmt_tr": "İletişim ve danışma, risk yönetimi sürecinin bir unsurudur. Risk ve alınan kararların anlaşılmasını iyileştirmek için farkındalık oluşturmaya yönelik iletişim ve geri bildirim ve bilgi edinmeye yönelik danışma, paydaşlarla süregelen ve yapılandırılmış koordinasyon gerektirir.","cmt_en": "Communication and consultation is an element of the risk management process. To improve understanding of risks and decisions made, communication to raise awareness and consultation to obtain feedback and information require ongoing, structured coordination with stakeholders."}],"answer": 3},{"q_tr": "ISO 31000 risk yönetimi sürecinin unsurları şunları içerir:","q_en": "The elements of the ISO 31000 risk management process include","options": [{"tr": "Dinamik.","en": "Dynamic.","cmt_tr": "Risk yönetimi sürecinin bir ilkesi, dinamik olmasıdır. Risk yönetimi, değişen riskleri öngörür, tanır ve bunlara tepki verir.","cmt_en": "A principle of the risk management process is that it is dynamic. Risk management foresees, recognizes, and reacts to changing risks."},{"tr": "İyileştirme.","en": "Improvement.","cmt_tr": "İyileştirme, risk yönetimi sürecinin bir bileşenidir. Çerçevenin iyileştirilmesi, değişikliklere yanıt olarak çerçevenin izlenmesi ve güncellenmesi yoluyla gerçekleşir.","cmt_en": "Improvement is a component of the risk management process. The improvement of the framework is through monitoring and updating the framework in response to changes, thereby enhancing organization performance."},{"tr": "Risk işleme.","en": "Risk treatment.","cmt_tr": "Risk işleme, ISO 31000 risk yönetimi sürecinin bir unsurudur. Risk işleme, (1) risk işleme yöntemlerinin seçilmesi, (2) işlemenin uygulanması, (3) işlemenin etkililiğinin değerlendirilmesi, (4) artık riskin kabul edilebilir olup olmadığının belirlenmesi ve (5) birincisi kabul edilemezse başka bir işlemenin benimsenmesinden oluşan tekrarlayan bir süreçtir.","cmt_en": "Risk treatment is an element of the ISO 31000 risk management process. Risk treatment is a repetitive process of (1) selecting risk treatments (e.g., accept, avoid, reduce, share, or pursue), (2) implementing the treatment, (3) assessing the treatment’s effectiveness, (4) determining whether the residual risk is acceptable, and (5) adopting another treatment if the first is unacceptable."},{"tr": "İnsani ve kültürel faktörler.","en": "Human and cultural factors.","cmt_tr": "İnsani ve kültürel faktörler, risk yönetimi sürecinin bir ilkesidir. İnsan davranışı ve kültür, risk yönetiminin tüm yönlerini ve her düzeyini etkiler.","cmt_en": "Human and cultural factors is a principle of the risk management process. Human behavior and culture affect all facets and each level of risk management."}],"answer": 2}]};

const SHEETS = ["SU1 - Risk Mgmt Processes", "SU2 - COSO ERM Overview", "SU3 - COSO ERM Components", "SU4 - ISO 31000 Framework"];
const SHORT_NAMES = {"SU1 - Risk Mgmt Processes": "SU1", "SU2 - COSO ERM Overview": "SU2", "SU3 - COSO ERM Components": "SU3", "SU4 - ISO 31000 Framework": "SU4"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit7";
const HISTORY_KEY = LS_KEY + "_history";
const MAX_HISTORY = 5;

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  // Skip chapters with 0 questions (can happen in mistakes modes)
  while (ci < SHEETS.length && QUIZ[SHEETS[ci]].length === 0) { ci++; }
  if (ci >= SHEETS.length) { showOverall(); return; }
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  if (!qs || qs.length === 0 || curQ >= qs.length) { showChapterSummary(); return; }
  const q    = qs[curQ];
  if (!q) { showChapterSummary(); return; }
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
