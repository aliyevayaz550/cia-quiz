 fonksiyonu, risk yönetimi süreçlerinin etkililiğini değerlendirmeli ve iyileştirilmesine katkıda bulunmalıdır.","cmt_en": "The internal audit function must evaluate the effectiveness and contribute to the improvement of risk management processes. Risk management processes include (1) identification of context, (2) risk identification, (3) risk assessment and prioritization, (4) risk response, and (5) risk monitoring."}],"answer": 0},{"q_tr": "COSO KRY çerçevesine göre, riskin ciddiyeti aşağıdakilerden hangileri açısından ölçülür?","q_en": "According to the COSO ERM framework, the severity of risk is measured in terms of","options": [{"tr": "Politika, yasa ve prosedürlere uyum.","en": "Adherence to policies, laws, and procedures.","cmt_tr": "IIA Sözlüğü, uyumu politikalar, prosedürler, yasalar, düzenlemeler, sözleşmeler veya diğer gerekliliklere bağlılık olarak tanımlar.","cmt_en": "The IIA Glossary defines compliance as adherence to policies, procedures, laws, regulations, contracts, or other requirements."},{"tr": "Disiplin ve yapı.","en": "Discipline and structure.","cmt_tr": "Kontrol ortamı, iç kontrol sisteminin birincil hedeflerine ulaşılması için disiplin ve yapı sağlar.","cmt_en": "The control environment provides the discipline and structure for the achievement of the primary objectives of the system of internal control."},{"tr": "Etki ve olasılık.","en": "Impact and likelihood.","cmt_tr": "IIA Sözlüğü, riski \"belirsizliğin hedefler üzerindeki olumlu veya olumsuz etkisi\" olarak tanımlar. COSO KRY çerçevesinde, riskin ciddiyeti etki (riskin sonucu veya etkisi) ve olasılık (gerçekleşme ihtimali) birleşimidir.","cmt_en": "The IIA Glossary defines risk as the “positive or negative effect of uncertainty on objectives.” In the COSO ERM framework, the severity of risk is a combination of impact (result or effect of the risk) and likelihood (probability of occurrence)."},{"tr": "İç denetimin sorumluluklarını yerine getirme yeteneğini tehdit eden koşullar.","en": "Conditions that threaten internal audit’s ability to carry out its responsibilities.","cmt_tr": "IIA Sözlüğü, bağımsızlığı iç denetim fonksiyonunun iç denetim sorumluluklarını tarafsız bir şekilde yerine getirme yeteneğini bozabilecek koşullardan özgür olma olarak tanımlar.","cmt_en": "The IIA Glossary defines independence as the freedom from conditions that may impair the ability of the internal audit function to carry out internal audit responsibilities in an unbiased manner."}],"answer": 2},{"q_tr": "CAE'nin risk yönetimine ilişkin sorumlulukları aşağıdakilerden hangisini içerir?","q_en": "The CAE’s responsibilities for risk management include which of the following?","options": [{"tr": "İç denetim fonksiyonunun risk yönetimindeki rolünü belirlemek.","en": "Determining the internal audit function’s role in risk management.","cmt_tr": "İç denetim fonksiyonunun risk yönetimindeki rolünü belirlemek, üst yönetim ve yönetim kurulunun sorumluluğundadır. Bu rol, kuruluş kültürü, iç denetim personelinin yetenekleri ve yerel koşullar ve gelenekler gibi faktörlere dayanır.","cmt_en": "Senior management and the board are responsible for determining the internal audit function’s role in risk management. This role is based on factors such as organizational culture, abilities of the internal audit staff, and local conditions and customs."},{"tr": "Sağlam risk yönetimi süreçlerinin işlevsel olmasını sağlamak.","en": "Ensuring sound risk management processes are functioning.","cmt_tr": "Sağlam risk yönetimi süreçlerinin işlevsel olmasını sağlamak yönetimin sorumluluğundadır. Risk yönetimi süreçleri kuruluşun kültürüne, yönetim tarzına ve hedeflerine uygun olarak tasarlanır.","cmt_en": "Management is responsible for ensuring that sound risk management processes are functioning. Risk management processes are designed to fit the organization’s culture, management style, and objectives."},{"tr": "Risk yönetimi yöntemleri ve kontrollerini belirlemek, değerlendirmek ve uygulamak.","en": "Identifying, evaluating, and implementing risk management methods and control.","cmt_tr": "İç denetim fonksiyonu, risk yönetimi süreçlerini incelemek, değerlendirmek, raporlamak veya iyileştirmeler önermek üzere yönlendirilebilir. Ayrıca iç denetim fonksiyonunun risk yönetimi yöntemleri ve kontrollerini belirleme, değerlendirme ve uygulama konusunda danışmanlık rolü vardır.","cmt_en": "The internal audit function may be directed to examine, evaluate, report, or recommend improvements to risk management processes. Additionally, the internal audit function has an advisory role in identifying, evaluating, and implementing risk management methods and control."},{"tr": "Riskleri anlama, yönetme ve izleme yükümlülükleri hakkında yönetim ve yönetim kurulu ile resmi görüşmeler yapmak.","en": "Having formal discussions with management and the board about their obligations for understanding, managing, and monitoring risks.","cmt_tr": "CAE, iç denetim fonksiyonuna ilişkin yönetimin ve yönetim kurulunun beklentilerini anlamalıdır. Bu anlayış, iç denetim fonksiyonu ve yönetim kurulunun yönetmeliklerinde kodlanmıştır. Kuruluşun resmi risk yönetimi süreçleri yoksa, CAE yönetim ve yönetim kurulu ile riskleri anlama, yönetme ve izleme yükümlülükleri hakkında resmi görüşmeler yapar.","cmt_en": "The CAE must understand management’s and the board’s expectations of the internal audit function in risk management. This understanding is codified in the charters of the internal audit function and the board. If the organization has no formal risk management processes, the CAE has formal discussions with management and the board about their obligations for understanding, managing, and monitoring risks."}],"answer": 3},{"q_tr": "Bağımsız bir tedarikçi olan XYZ Corp.'daki son envanter açığı, cari dönemde OPS Corp.'da üretim aksaklıklarına katkıda bulunmuştur. Tedarikçi envanter açıklarından kaynaklanan gelecekteki üretim aksaklıklarını önlemek için en uygun yöntem, OPS'nin aşağıdakilerden hangisini yapmasıdır?","q_en": "A recent inventory shortage at XYZ Corp., an unaffiliated supplier, contributed to production failures at OPS Corp. in the current period. To avoid future production failures because of supplier inventory shortages, the most appropriate method is for OPS to","options": [{"tr": "XYZ'de bir envanter kontrol çerçevesi oluşturmak.","en": "Establish an inventory control framework at XYZ.","cmt_tr": "OPS'nin XYZ'de bir envanter kontrol çerçevesi oluşturma yetkisi yoktur.","cmt_en": "OPS has no authority to establish an inventory control framework at XYZ."},{"tr": "Sipariş büyüklüğünü artırmak.","en": "Increase the size of orders.","cmt_tr": "Sipariş büyüklüğünü artırmak, tedarikçi aksaklıklarının nedenini ele almaz.","cmt_en": "Increasing order size does not address the cause of supplier failures."},{"tr": "Tedarikçilerden satın almak yerine envanter kalemlerini üretmek.","en": "Produce the inventory items instead of purchasing from suppliers.","cmt_tr": "Kurum içi üretim dış tarafları ortadan kaldırsa da, en uygun maliyetli yöntem olmayabilir. Dış tarafın kuruluşun sahip olmadığı maliyet avantajları olabilir.","cmt_en": "Although in-house production will eliminate the external parties, it may not be the most cost- effective method. The external party may have cost advantages the organization does not."},{"tr": "XYZ'ye tedarik aksaklıklarına ilişkin risk iştahını bildirmek.","en": "Inform XYZ about its risk appetite regarding supply failures.","cmt_tr": "Kontrol, genellikle risk iştahı dahilinde riski yönetmek için kullanılır. Risk iştahı, kuruluşun stratejileri ve hedefleri doğrultusunda kabul etmeye istekli olduğu risk türleri ve miktarıdır. Bu nedenle, dış taraflarla risk iştahı hakkında iletişim kurmak, risk yönetiminin önemli bir yönüdür. Kuruluşun farklı hedefleri olabilecek tedarikçilerle çalışma stratejileri geliştirmesine olanak tanır.","cmt_en": "Control often is used to manage risk within the risk appetite, which is the types and amount of risk that an organization is willing to accept in the pursuit of its strategies and objectives.Thus,"}],"answer": 3},{"q_tr": "Risk yönetimi süreçleri risk belirlemeyi içerir. Bir yöntem aşağıdakilerden hangisidir?","q_en": "Risk management processes include risk identification. One method is","options": [{"tr": "Risk modellemesi.","en": "Risk modeling.","cmt_tr": "Risk modellemesi, risk değerlendirmesi ve önceliklendirme yöntemidir. Denetim planındaki görevlerin önceliklerini belirlerken risk önceliklerini sıralar ve doğrular.","cmt_en": "Risk modeling is a method of risk assessment and prioritization. It ranks and validates risk priorities when setting the priorities of engagements in the audit plan."},{"tr": "Senaryo analizi.","en": "Scenario analysis.","cmt_tr": "Senaryo analizi, olası gelecek olayları (örneğin ekonomik koşullar ve teknik gelişmeler) öngörür ve her olay için alternatif stratejiler geliştirir.","cmt_en": "Scenario analysis projects plausible future events (e.g., economic conditions and technical advances) and develops alternative strategies for each event."},{"tr": "Risk haritası.","en": "A risk map.","cmt_tr": "Risk haritaları, bir eksende olasılık ve diğer eksende etki olan bir grafik üzerinde riskleri çizerek oluşturulur.","cmt_en": "Risk maps are created by plotting risks on a chart with likelihood on one axis and impact on the other axis."},{"tr": "Isı haritası.","en": "A heat map.","cmt_tr": "Isı haritaları risk düzeylerini renkle gösterir. (1) Aynı olasılık ve etkiye sahip veya (2) aynı ciddiyet aralığına düşen risklere aynı renk atanır.","cmt_en": "Heat maps present risk levels by color. Risks that (1) have the same likelihood and impact or (2) fall in the same range of severity are assigned the same color."}],"answer": 1},{"q_tr": "Risk yönetimi süreçleriyle ilgili bir güvence görevi gerçekleştirirken, iç denetim fonksiyonu büyük olasılıkla aşağıdakilerden hangisini yapar?","q_en": "When performing an assurance engagement related to risk management processes, the internal audit function most likely","options": [{"tr": "Süreçlerin yönetimine katılır.","en": "Participates in management of the processes.","cmt_tr": "İç denetim fonksiyonunun risk yönetimindeki rolü (1) hiçbir rol, (2) denetim planının bir parçası olarak süreci denetleme, (3) süreçte aktif, sürekli destek ve katılım ve (4) süreci yönetme ve koordine etme olabilir. Ancak yönetim sorumluluklarının üstlenilmesi ve bağımsızlığa yönelik tehdit, tam olarak tartışılmalı ve yönetim kurulu tarafından onaylanmalıdır.","cmt_en": "The internal audit function’s role in risk management may be (1) no role; (2) auditing the process as part of the audit plan; (3) active, continuous support and involvement in the process; and (4) managing and coordinating the process. But assuming management responsibilities and the threat to independence must be fully discussed and board-approved."},{"tr": "Sağlam süreçlerin işlevsel olmasını sağlar.","en": "Ensures that sound processes are functioning.","cmt_tr": "Yönetim, sağlam risk yönetimi süreçlerinin işlevsel olmasını sağlar.","cmt_en": "Management ensures that sound risk management processes are functioning."},{"tr": "Bilgi sistemlerindeki risk maruziyetlerini değerlendirir.","en": "Evaluates risk exposures in information systems.","cmt_tr": "Risk yönetimini anlamak için iç denetim fonksiyonu, kuruluşun önemli riskleri nasıl belirlediğini ve değerlendirdiğini dikkate almalıdır. Bu, kuruluşun (1) finansal ve operasyonel bilgilerin güvenilirliği ve bütünlüğünü, (2) faaliyetlerin ve programların etkililiğini ve verimliliğini, (3) varlıkların korunmasını ve (4) yasa ve düzenlemelere uyumu nasıl belirlediğini ve yönettiğini içerir.","cmt_en": "To understand risk management, the internal audit function must consider how the organization identifies and assesses significant risks, including how the organization identifies and manages (1) the reliability and integrity of financial and operational information, (2) the effectiveness and"},{"tr": "Süreçlerin sürekli izlemesini gerçekleştirir.","en": "Performs ongoing monitoring of the processes.","cmt_tr": "Risk yönetimi süreçleri, devam eden yönetim faaliyetleri, ayrı değerlendirmeler veya her ikisi aracılığıyla izlenir.","cmt_en": "Risk management processes are monitored through ongoing management activities, separate evaluations, or both."}],"answer": 2},{"q_tr": "Risk yönetimi süreçleri, aşağıdakileri içeren risk değerlendirmesi gerektirir:","q_en": "Risk management processes require risk assessment that includes","options": [{"tr": "Bağlamın belirlenmesi.","en": "Identification of context.","cmt_tr": "Bağlamın belirlenmesi, risk belirleme ve risk analizinden önce mutlaka gelmesi gereken bir risk yönetimi sürecidir.","cmt_en": "Identification of context is a risk management process that necessarily precedes risk identification and risk analysis."},{"tr": "Süreç akış analizi.","en": "Process flow analysis.","cmt_tr": "Süreç akış analizi, risk belirleme yöntemidir. Tek bir iş süreci, örneğin satıcı yetkilendirme ve ödeme, girdilerini, görevlerini, sorumluluklarını ve çıktılarını etkileyen olayları belirlemek için ayrı olarak incelenir.","cmt_en": "Process flow analysis is a method of risk identification. A single business process, such as vendor authorization and payment, is studied in isolation to identify the events that affect its inputs, tasks, responsibilities, and outputs."},{"tr": "Kayıp olay verisi yöntemleri.","en": "Loss event data methods.","cmt_tr": "Kayıp olay verisi yöntemleri, risk belirleme yöntemidir. Risk belirleme, geçmiş olayları (eğilimler) ve gelecekteki olasılıkları dikkate almalıdır. Örneğin, geçmişteki olumsuz olaylarla ilişkili kayıplar tahmin yapmak için kullanılabilir.","cmt_en": "Loss event data methods are a method of risk identification. Risk identification should consider past events (trends) and future possibilities. For example, the losses associated with adverse events in the past can be used to make predictions. An example is matching workers’ compensation claims with the frequency of accidents."},{"tr": "Nitel veya nicel yöntemler.","en": "Qualitative or quantitative methods.","cmt_tr": "Risk yönetimi süreçleri, risk değerlendirmesi ve önceliklendirme gerektirir. Risk değerlendirme yöntemleri nitel veya nicel olabilir. Bunlar arasında (1) risk modellemesi, (2) risk sıralaması ve (3) risk haritaları bulunur.","cmt_en": "Risk management processes require risk assessment and prioritization. Risk assessment methods may be qualitative or quantitative. They include (1) risk modeling, (2) risk ranking, and (3) risk maps."}],"answer": 3},{"q_tr": "IIA'nın Üç Hat Modeli'ne göre,","q_en": "According to The IIA’s Three Lines Model,","options": [{"tr": "Yalnızca yönetim organının birinci hat rolleri vardır.","en": "Only the governing body has first line roles.","cmt_tr": "Yönetimin birinci hat (ve ikinci hat) rolleri vardır. Yönetim organını bir \"hat\" üzerinde tanımlamak mantıklıdır, ancak IIA karışıklığı önlemek için bu kuralı kullanmamayı tercih etmiştir.","cmt_en": "Management has first line (and second line) roles. Describing the governing body as on a “line” is logical, but The IIA elected not to use this convention to avoid confusion."},{"tr": "Birinci hat rolleri destek fonksiyonlarını içerir.","en": "First line roles include support functions.","cmt_tr": "Birinci hat rolleri, ön ve arka ofis operasyonları genelinde temel destek fonksiyonları dahil olmak üzere hem operasyonel hem de entegre danışmanlık faaliyetlerini yürüten yönetim fonksiyonlarından oluşur. İkinci hat rolleri gözetim sağlar ve risk yönetimini kolaylaştırırken, üçüncü hat rolleri bu süreçlerde güvence sağlamak üzere iç denetim fonksiyonu tarafından yürütülür.","cmt_en": "First line roles are comprised of management functions that drive both operational and integrated advisory activities, including essential support functions across front and back office operations. Second line roles provide oversight and facilitate risk management, while third line roles are executed by the internal audit function to deliver assurance on these processes."},{"tr": "İkinci hat rolleri müşterilere ürün teslimatını içerir.","en": "Second line roles involve delivery of products to clients.","cmt_tr": "","cmt_en": ""},{"tr": "Üçüncü hat rolleri ağırlıklı olarak dış denetçiler tarafından yerine getirilir.","en": "Third line roles are performed primarily by external auditors.","cmt_tr": "Üçüncü hat rolleri, yönetişim ve risk yönetiminin yeterliliği ve etkililiği konusunda güvence ve tavsiye sağlamak üzere iç denetçiler tarafından yerine getirilir. İç denetim, diğer iç ve dış sağlayıcılardan güvenceyi de değerlendirebilir.","cmt_en": "Third line roles are performed by internal auditors to provide assurance and advice on the adequacy and effectiveness of governance and risk management. Internal audit may consider assurance from other internal and external providers."}],"answer": 1},{"q_tr": "IIA'nın Üç Hat Modeli, bir kuruluşun yönetim organının rollerinin büyük olasılıkla aşağıdakilerden hangisini içerdiğini belirtir?","q_en": "The IIA’s Three Lines Model states that the roles of an organization’s governing body most likely include","options": [{"tr": "Risk yönetimine yardım etmek.","en": "Assisting with risk management.","cmt_tr": "İkinci hat rolleri risk yönetimine yardımcı olur. Yönetim tarafından yerine getirilir veya uzmanlara atanır.","cmt_en": "Second-line roles assist with risk management. They are performed by management or assigned to specialists."},{"tr": "Müşterilere ürün teslim etmek.","en": "Delivering products to clients.","cmt_tr": "Yönetim tarafından yerine getirilen birinci hat rolleri, müşterilere ürün veya hizmet teslimini içerir.","cmt_en": "First-line roles performed by management include delivering products or services to clients."},{"tr": "Kuruluş hedeflerinin paydaşların çıkarlarıyla uyumlu olmasını sağlamak.","en": "Ensuring that organizational objectives align with stakeholders’ interests.","cmt_tr": "Yönetim organı rolleri şunları içerir: (1) etkili yönetişim için yapı ve süreçlerin mevcut olmasını sağlamak; (2) hedeflerin ve faaliyetlerin paydaş çıkarlarıyla uyumlu olmasını sağlamak; (3) yönetime hedeflere ulaşmak ve yasa, düzenleme ve etik kurallara uyum için sorumluluk ve kaynak vermek; ve (4) iç denetim fonksiyonunu kurmak ve denetlemek.","cmt_en": "Governing body roles include (1) ensuring structures and processes exist for effective governance; (2) ensuring objectives and activities align with stakeholder interests; (3) giving management the responsibility and resources to achieve objectives and compliance with laws, regulations, and ethics; and (4) establishing and overseeing the internal audit function."},{"tr": "Güven ve netlik sağlayan güvence ve tavsiye sunmak.","en": "Providing assurance and advice that instills confidence and clarity.","cmt_tr": "Yönetişim; yetkin, tarafsız ve bağımsız bir iç denetim fonksiyonu tarafından güven ve netlik sağlayan ve sürekli iyileştirmeyi kolaylaştıran güvence ve tavsiyelerin sağlanmasını içerir.","cmt_en": "Governance includes enabling assurance and advice by a competent, objective, and independent internal audit function that provides confidence and clarity and facilitates continuous improvement."}],"answer": 2}],"SU2 - COSO ERM Overview": [{"q_tr": "Şirket yönetimi olay belirlemeyi tamamlar ve riskin ciddiyetini değerlendirir. Yönetim daha sonra riskin ciddiyetini değiştirmek için harekete geçer. COSO'nun KRY çerçevesine göre, yönetimin eylemlerinden sonra kalan risk nedir?","q_en": "Company management completes event identification and assesses the severity of risk. Management then acts to alter the severity of risk. According to COSO’s ERM framework, the risk remaining after management’s actions is","options": [{"tr": "Doğal risk.","en": "Inherent risk.","cmt_tr": "Doğal risk, yönetimin ciddiyetini değiştirmek için harekete geçmediği durumda var olan risktir; yani kabul veya izleme şeklinde bir risk yanıtıdır.","cmt_en": "Inherent risk is the risk that exists in the absence of management actions to alter its severity, that is, a risk response in the form of acceptance or pursuit."},{"tr": "Fiili artık risk.","en": "Actual residual risk.","cmt_tr": "Fiili artık risk, yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risktir. Hedeflenen artık riski aşmamalıdır.","cmt_en": "Actual residual risk is the risk that remains after management acts to alter its severity. It should not exceed target residual risk."},{"tr": "Olay riski.","en": "Event risk.","cmt_tr": "COSO, olayı bir olay veya olaylar dizisi olarak tanımlar. Riski, olayların gerçekleşme ve strateji ile iş hedeflerinin gerçekleştirilmesini etkileme olasılığı olarak tanımlar.","cmt_en": "COSO defines an event as an occurrence or set of occurrences. It defines risk as the possibility that events will occur and affect the achievement of strategy and business objectives."},{"tr": "Hedeflenen artık risk.","en": "Target residual risk.","cmt_tr": "Hedeflenen artık risk, kuruluşun yönetimin ciddiyetini değiştirmek için harekete geçtiğini veya geçeceğini bilerek üstlenmeyi tercih ettiği risktir.","cmt_en": "Target residual risk is the risk the entity prefers to assume knowing that management has acted or will act to alter its severity."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangisi risk yanıtlarını içerir?","q_en": "Which of the following includes risk responses?","options": [{"tr": "Artık risk profili.","en": "Residual risk profile.","cmt_tr": "Risk profili, belirli bir strateji veya iş hedefi ile ilgili risklerin türleri, ciddiyetleri ve karşılıklı bağımlılıklarının ve bunların performans üzerindeki etkisinin bileşik bir görünümüdür. Artık risk profili, risk yanıtlarını içerir.","cmt_en": "A risk profile is a composite view of the types, severity, and interdependencies of risks related to a specific strategy or business objective and their effect on performance. A risk profile may be created at any level or aspect of the organization. A residual risk profile includes risk responses."},{"tr": "Doğal risk.","en": "Inherent risk.","cmt_tr": "Doğal risk, yönetimin ciddiyetini değiştirmek için harekete geçmediği durumda var olan risktir.","cmt_en": "Inherent risk is the risk in the absence of management actions to alter its severity."},{"tr": "Risk envanteri.","en": "Risk inventory.","cmt_tr": "Risk envanteri, strateji ve iş hedeflerini etkileyen tüm belirlenmiş risklerden oluşur.","cmt_en": "Risk inventory consists of all identified risks that affect strategy and business objectives."},{"tr": "Risk.","en": "Risk.","cmt_tr": "Risk, olayların gerçekleşme ve strateji ile iş hedeflerinin gerçekleştirilmesini etkileme olasılığıdır.","cmt_en": "Risk is the probability that events will occur and affect the achievement of strategy and business objectives."}],"answer": 0},{"q_tr": "KRY'yi uygulamış bir kuruluşta, KRY'nin genel sorumluluğu kime aittir?","q_en": "In an organization that has implemented ERM, who has overall responsibility for ERM?","options": [{"tr": "Risk komitesi.","en": "The risk committee.","cmt_tr": "Bir risk komitesi doğrudan KRY'yi denetleyebilir, ancak günlük risk yönetiminden yönetim sorumludur.","cmt_en": "A risk committee may directly oversee ERM, but management is responsible for day-to-day risk management."},{"tr": "Merkezileştirilmiş koordinatör.","en": "The centralized coordinator.","cmt_tr": "Bir kuruluş, tüm işletme genelinde risk yönetimini kolaylaştırmak üzere merkezileştirilmiş bir koordinasyon noktası olarak bir risk sorumlusu atayabilir.","cmt_en": "An organization may designate a risk officer as a centralized coordinating point to facilitate risk management across the entire enterprise. This risk officer is commonly referred to as a centralized coordinator."},{"tr": "Risk sorumlusu.","en": "The risk officer.","cmt_tr": "Risk sorumlusu, merkezileştirilmiş koordinatör olarak da bilinir.","cmt_en": "The risk officer is also known as the centralized coordinator."},{"tr": "Yönetim.","en": "Management.","cmt_tr": "Yönetim, KRY'nin genel sorumluluğuna sahiptir ve genellikle riskin günlük yönetiminden, COSO KRY çerçevesinin uygulanması ve geliştirilmesi dahil olmak üzere sorumludur. Yönetim içinde, CEO KRY ve strateji ile iş hedeflerine ulaşma konusunda nihai sorumluluğa sahiptir.","cmt_en": "Management has overall responsibility for ERM and is generally responsible for the day-to-day managing of risk, including the implementation and development of the COSO ERM framework. Within management, the CEO has ultimate responsibility for ERM and achievement of strategy and business objectives."}],"answer": 3},{"q_tr": "COSO'nun KRY çerçevesine göre, doğal risk aşağıdakilerden hangisine eşdeğerdir?","q_en": "According to the COSO’s ERM framework, inherent risk is equivalent to","options": [{"tr": "Risk kapasitesi.","en": "Risk capacity.","cmt_tr": "Risk kapasitesi, kuruluşun üstlenebileceği maksimum risk miktarıdır.","cmt_en": "Risk capacity is the maximum amount of risk the organization can assume."},{"tr": "Artık risk profili.","en": "The residual risk profile.","cmt_tr": "Risk yanıtı, belirlenen riskleri kuruluşun risk iştahı dahiline getirmek için alınan bir eylemdir. Artık risk profili, risk yanıtlarını içerir.","cmt_en": "Risk response is an action taken to bring identified risks within the organization’s risk appetite. A residual risk profile includes risk responses."},{"tr": "Hedeflenen artık risk.","en": "The target residual risk.","cmt_tr": "Hedeflenen artık risk, kuruluşun yönetimin ciddiyetini değiştirmek için harekete geçtiğini veya geçeceğini bilerek üstlenmeyi tercih ettiği risktir.","cmt_en": "Target residual risk is the risk the entity prefers to assume knowing that management has acted or will act to alter its severity."},{"tr": "Ciddiyetini değiştirmek için harekete geçilmediği durumda var olan risk.","en": "Risk absent action to alter its severity.","cmt_tr": "Doğal risk, yönetimin ciddiyetini değiştirmek için harekete geçmediği durumda var olan risktir. Fiili artık risk, yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risktir.","cmt_en": "Inherent risk is the risk in the absence of management actions to alter its severity. Actual residual risk remains after management actions to alter its severity."}],"answer": 3},{"q_tr": "KRY'nin temel öncülü, her kuruluşun paydaşları için değer sağlamak amacıyla var olmasıdır. Kararları etkileyen risk hakkındaki tutum ve anlayış hangi KRY kavramını yansıtır?","q_en": "The premise of ERM is that every organization exists to provide value to its stakeholders. The attitudes and understanding about risk that influence decisions reflect which ERM concept?","options": [{"tr": "Temel değerler.","en": "Core values.","cmt_tr": "Temel değerler, kuruluşun kabul edilebilir veya kabul edilemez olan hakkındaki temel inançlarıdır.","cmt_en": "The core values are the organization’s essential beliefs about what is acceptable or unacceptable."},{"tr": "Misyon.","en": "Mission.","cmt_tr": "Misyon, kuruluşun temel amacıdır.","cmt_en": "The mission is the organization’s core purpose."},{"tr": "Kültür.","en": "Culture.","cmt_tr": "Kültür, \"yönetim ve personelin kararlarını etkileyen ve kuruluşun misyonunu, vizyonunu ve temel değerlerini yansıtan risk hakkındaki olumlu ve olumsuz tutumlar, davranışlar ve anlayışlardan\" oluşur.","cmt_en": "Culture consists of “[t]he attitudes, behaviors, and understanding about risk, both positive and negative, that influence the decisions of management and personnel and reflect the mission, vision, and core values of the organization.”"},{"tr": "Vizyon.","en": "Vision.","cmt_tr": "Vizyon, kuruluşun zaman içinde ulaşmayı amaçladığı hedeflerdir.","cmt_en": "The vision is the organization’s aspirations for what it intends to achieve over time."}],"answer": 2},{"q_tr": "Bir kuruluşun aşağıdaki üyelerinden hangisi kurumsal risk yönetimi konusunda nihai sorumluluğa sahiptir?","q_en": "Which of the following members of an organization has ultimate responsibility for enterprise risk management?","options": [{"tr": "Baş risk sorumlusu.","en": "Chief risk officer.","cmt_tr": "Risk sorumlusu, tüm kuruluş genelinde risk yönetimini kolaylaştırabilir.","cmt_en": "The risk officer may facilitate risk management across the entire organization."},{"tr": "İcra kurulu başkanı (CEO).","en": "Chief executive officer.","cmt_tr": "Yönetim, günlük risk yönetiminin genel sorumluluğuna sahiptir ve KRY çerçevesinin uygulanmasını ve geliştirilmesini içerir. CEO, KRY ve strateji ile iş hedeflerine ulaşma konusunda nihai sorumludur.","cmt_en": "Management has overall responsibility for day-to-day risk management, including implementing and developing the ERM framework. The chief executive officer (CEO) is ultimately responsible for ERM and achievement of strategy and business objectives."},{"tr": "İç denetçiler.","en": "Internal auditors.","cmt_tr": "İç denetçiler KRY'yi değerlendirir ve öneriler sunabilir.","cmt_en": "The internal auditors evaluate the ERM and may provide recommendations."},{"tr": "Mali işler müdürü (CFO).","en": "Chief financial officer.","cmt_tr": "CFO, CEO'ya bağlıdır.","cmt_en": "The CFO is subordinate to the CEO."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangisi kurumsal risk yönetimi (KRY) yerine geleneksel risk yönetimiyle daha yakından ilişkilidir?","q_en": "Which of the following is closely related to traditional risk management instead of enterprise risk management (ERM)?","options": [{"tr": "KRY'nin sürekli iyileştirilmesi.","en": "Continual improvement of ERM.","cmt_tr": "KRY uygulayan bir kuruluş, fiili performans hedefler veya toleransla uyumlu olsa bile tüm seviyelerde KRY'yi sürekli iyileştirir.","cmt_en": "An organization applying ERM continually improves ERM at all levels even if actual performance aligns with targets or tolerance (range of acceptable performance)."},{"tr": "Kuruluş düzeyinde risk görünümü.","en": "Organization-level view of risk.","cmt_tr": "KRY, riski kuruluşun her seviyesini etkilediği şekliyle değerlendirir.","cmt_en": "ERM views risk as it affects every level of an organization."},{"tr": "Belirli fonksiyonlara odaklanma.","en": "Emphasis on specific functions.","cmt_tr": "COSO'nun kurumsal risk yönetimi yaklaşımı, herhangi bir belirli alan veya risk yerine kuruluşu bir bütün olarak ele alır. Tüm risk yönetimi faaliyetlerini koordine etmek ve entegre etmek için bir temeldir.","cmt_en": "The enterprise risk management approach of the Committee of Sponsoring Organizations of the Treadway Commission (COSO) treats an organization as a whole instead of focusing on any specific area or risk. It is a basis for coordinating and integrating all risk management activities."},{"tr": "Hedeflere ulaşma.","en": "Achieving objectives.","cmt_tr": "KRY yaklaşımında, iş hedefleri stratejiyle uyumludur ve onu destekler.","cmt_en": "In an ERM approach, business objectives align with and support strategy."}],"answer": 2},{"q_tr": "Kurumsal risk yönetimi","q_en": "Enterprise risk management","options": [{"tr": "Kuruluş hedeflerine ulaşılacağını garanti eder.","en": "Guarantees achievement of organizational objectives.","cmt_tr": "Risk yönetimi süreçleri hedeflere ulaşılacağını garanti edemez.","cmt_en": "Risk management processes cannot guarantee achievement of objectives."},{"tr": "İç denetçiler tarafından risk ve kontrol faaliyetlerinin oluşturulmasını gerektirir.","en": "Requires establishment of risk and control activities by internal auditors.","cmt_tr": "İç denetçilerin kontrol faaliyetlerinin oluşturulmasına katılımı, bağımsızlık ve tarafsızlıklarını bozar.","cmt_en": "Involvement of internal auditors in establishing control activities impairs their independence and objectivity."},{"tr": "Kuruluş hedefleri üzerinde olumsuz etkisi olan olayların belirlenmesini içerir.","en": "Involves the identification of events with negative impacts on organizational objectives.","cmt_tr": "IIA Sözlüğü, risk yönetimini kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlamak üzere potansiyel olayları veya durumları belirleme, değerlendirme, yönetme ve kontrol etme süreci olarak tanımlar. Dolayısıyla, kurumsal risk yönetimi kuruluş hedeflerinin gerçekleştirilmesini olumsuz etkileyen olayların belirlenmesini içerir.","cmt_en": "The IIA Glossary defines risk management as a process to identify, assess, manage, and control potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives. Thus, enterprise risk management involves the identification of events with negative effects on achievement of organizational objectives."},{"tr": "Kuruluş için en iyi risk yanıtının seçilmesini içerir.","en": "Includes selection of the best risk response for the organization.","cmt_tr": "Kurumsal risk yönetimi en iyi risk yanıtını değil, işletmenin risk toleransları ve iştahı dahilindeki risk yanıtını seçer.","cmt_en": "Enterprise risk management selects not the best risk response but the risk response within the enterprise’s risk tolerances and appetite."}],"answer": 2},{"q_tr": "Doğal risk nedir?","q_en": "Inherent risk is","options": [{"tr": "Strateji ve iş hedeflerinin gerçekleştirilmesini etkileyebilecek potansiyel bir olay.","en": "A potential event that may affect the achievement of strategy and business objectives.","cmt_tr": "Risk olayı, kuruluşu olumsuz etkileyebilecek potansiyel bir olaydır.","cmt_en": "A risk event is a potential event that may affect the organization adversely."},{"tr": "Bir risk yanıtı.","en": "A risk response.","cmt_tr": "Risk yanıtı, belirlenen riskleri kuruluşun risk iştahı dahiline getirmek için alınan bir eylemdir.","cmt_en": "A risk response is an action taken to bring identified risks within the organization’s risk appetite."},{"tr": "Yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risk.","en": "The risk after management takes action to alter its severity.","cmt_tr": "Yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risk, fiili artık risktir.","cmt_en": "The risk remaining after management takes action to alter its severity is actual residual risk."},{"tr": "Yönetimin olumsuz bir olayın etkisini veya olasılığını azaltmak için harekete geçmediği durumda var olan risk.","en": "The risk when management has not taken action to reduce the impact or likelihood of an adverse event.","cmt_tr": "IIA Sözlüğüne göre doğal risk, kontrol altına alınmamış iç ve dış risk faktörlerinin birleşimi veya iç kontrollerin mevcut olmadığı varsayılarak mevcut brüt risktir.","cmt_en": "According to The IIA Glossary, an inherent risk is the combination of internal and external risk factors in their uncontrolled state, or the existing gross risk, assuming no internal controls are in place."}],"answer": 3},{"q_tr": "COSO KRY çerçevesine göre, risk profili aşağıdakiler arasındaki ilişkinin bir görünümüdür:","q_en": "According to the COSO ERM framework, a risk profile is a view of the relationship between","options": [{"tr": "Risk kapasitesi ve risk iştahı.","en": "Risk capacity and risk appetite.","cmt_tr": "Kuruluşun risk kapasitesi üstlenilebilecek maksimum miktardır. Risk iştahı, kuruluşun kabul etmeye istekli olduğu maksimumdur. Her ikisi de risk profilinde görünür. Ancak profilin amacı, riskler ile belirli bir strateji veya iş hedefi arasındaki ilişkiyi ve bunların performans üzerindeki etkisini görmektir.","cmt_en": "An entity’s risk capacity is the maximum that can be assumed. The risk appetite is the maximum the entity is willing to accept. Both appear on the risk profile. But the purpose of the profile is to view the relationship between risks and a specific strategy or business objective and their effect on performance."},{"tr": "Doğal risk ve hedeflenen artık risk.","en": "Inherent risk and target residual risk.","cmt_tr": "Doğal risk, yönetimin ciddiyetini değiştirmek için harekete geçmediği durumda var olan risktir. Hedeflenen artık risk, kuruluşun yönetimin ciddiyetini değiştirmek için harekete geçtiğini bilerek üstlenmeyi tercih ettiği risktir. Ancak risk profili, riski bir strateji veya hedefle ilişkilendirir.","cmt_en": "Inherent risk is the risk in the absence of management actions to alter its severity. Target residual risk is the risk the entity prefers to assume knowing that management has acted to alter its severity. But the risk profile relates risk to a strategy or objective."},{"tr": "Tolerans ve risk iştahı.","en": "Tolerance and risk appetite.","cmt_tr": "Kuruluşun toleransı ve risk iştahı risk profilinde görünebilir. Ancak profil, risk ile strateji veya hedef (ve nihayetinde) performans arasındaki ilişkiyi görüntüler.","cmt_en": "An entity’s tolerance and risk appetite may appear on its risk profile. However, the profile views the relationship between risk and a strategy or objective (and ultimately) performance."},{"tr": "Risk ve performans.","en": "Risk and performance.","cmt_tr": "Risk profili, (1) belirli bir strateji veya iş hedefiyle ilgili risklerin türleri, ciddiyetleri ve karşılıklı bağımlılıkları ile (2) bunların performans üzerindeki etkisinin bileşik bir görünümüdür.","cmt_en": "A risk profile is a composite view of (1) the types, severity, and interdependencies of risks related to a specific strategy or business objective and (2) their effect on performance."}],"answer": 3},{"q_tr": "Bir kuruluşun değer peşinde koşarken kabul etmeye istekli olduğu risk miktarı ve türleri aşağıdakilerden hangisinin tanımıdır?","q_en": "The amount and types of risk an organization is willing to accept in pursuit of value is the definition of","options": [{"tr": "Risk iştahı.","en": "Risk appetite.","cmt_tr": "Risk iştahı, \"bir kuruluşun stratejileri ve hedefleri doğrultusunda kabul etmeye istekli olduğu risk türleri ve miktarıdır.\"","cmt_en": "Risk appetite is “the types and amount of risk that an organization is willing to accept in pursuit of its strategies and objectives.”"},{"tr": "Risk yanıtı.","en": "Risk response.","cmt_tr": "Risk yanıtı, belirlenen bir riskle ilgili yönetimin seçtiği hareket tarzıdır.","cmt_en": "Risk response is management’s chosen course of action in regard to an identified risk."},{"tr": "Risk kabulü.","en": "Risk acceptance.","cmt_tr": "Risk kabulü, riske karşı olası yanıtlardan biridir.","cmt_en": "Risk acceptance is one of the possible responses to risk."},{"tr": "Risk.","en": "Risk.","cmt_tr": "Risk, bir olayın gerçekleşme ve hedeflere ulaşılmasını olumlu veya olumsuz etkileme olasılığıdır.","cmt_en": "Risk is the possibility that an event will occur and positively or negatively affect the achievement of objectives."}],"answer": 0},{"q_tr": "Üst yönetim, menkul kıymet alım satımını yüksek riskli bir faaliyet olarak belirlemiştir. Buna karşılık yeni bir denetim pozisyonu oluşturulmuştur. Her akşam iş günü bitiminde bu denetçi, gün içinde yapılan her işlemi inceler. Bu sistem altında 6 aylık menkul kıymet alım satımının ardından, iç denetim fonksiyonu tarafından raporlanan niceliksel risk nedir?","q_en": "Senior management has identified the trading of marketable securities as a high-risk activity. In response, a new supervisory position was created. Every evening after the close of business, this supervisor reviews every trade made during the day. After 6 months of trading marketable securities under this system, the quantified risk reported by the internal audit function is","options": [{"tr": "Yanıtlanmış risk.","en": "Responded risk.","cmt_tr": "\"Yanıtlanmış risk\" bu bağlamda anlamlı bir terim değildir.","cmt_en": "“Responded risk” is not a meaningful term in this context."},{"tr": "Gerçek risk.","en": "True risk.","cmt_tr": "\"Gerçek risk\" bu bağlamda anlamlı bir terim değildir.","cmt_en": "“True risk” is not a meaningful term in this context."},{"tr": "Yönetilen risk.","en": "Managed risk.","cmt_tr": "Tüm riskler yönetilmelidir. Fiili artık risk, menkul kıymet alım satımı için yönetilen spesifik risk türüdür.","cmt_en": "All risks should be managed. Actual residual risk is the specific type of risk managed for the trading of marketable securities."},{"tr": "Fiili artık risk.","en": "Actual residual risk.","cmt_tr": "Fiili artık risk, yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risktir. Hedeflenen artık riske eşit veya daha az olmalıdır.","cmt_en": "Actual residual risk is the risk remaining after management takes action to alter its severity. It should equal or be less than target residual risk"}],"answer": 3},{"q_tr": "COSO'ya göre, aşağıdakilerden hangisi kurumsal risk yönetiminin (KRY) bir faydasıdır?","q_en": "According to the COSO, which one of the following is a benefit of enterprise risk management (ERM)?","options": [{"tr": "Performans değişkenliğinin azaltılması.","en": "Decreased performance variability.","cmt_tr": "KRY, yönetimin strateji, iş hedefleri ve risk iştahıyla uyumlu performans toleransları belirleyerek performans değişkenliğini azaltmasına yardımcı olur.","cmt_en": "ERM helps management decrease performance variability by setting performance tolerances that align with strategy, business objectives, and risk appetite."},{"tr": "Tüm risklerin ortadan kaldırılması.","en": "Elimination of all risks.","cmt_tr": "KRY risklerin yönetilmesine yardımcı olur, ancak riskleri ortadan kaldırmaz.","cmt_en": "ERM helps to manage risks, but it does not eliminate risks."},{"tr": "Yönetim müdahalesinin önlenmesi.","en": "Prevention of management override.","cmt_tr": "KRY ile yönetim müdahalesi hâlâ mümkündür.","cmt_en": "Management override is still possible with ERM."},{"tr": "Danışıklılık olasılığının ortadan kaldırılması.","en": "Elimination of the possibility of collusion.","cmt_tr": "KRY ile danışıklılık hâlâ mümkündür.","cmt_en": "Collusion is still possible with ERM."}],"answer": 0},{"q_tr": "COSO'ya göre, KRY en iyi şekilde nasıl tanımlanır?","q_en": "According to COSO, ERM is best defined as","options": [{"tr": "Faaliyetler, raporlama ve uyumla ilgili hedeflere ulaşılması konusunda makul güvence sağlamak üzere tasarlanmış, bir kuruluşun yönetim kurulu, yönetimi ve diğer personeli tarafından uygulanan bir süreç.","en": "A process, effected by an entity’s board of directors, management, and other personnel, designed to provide reasonable assurance regarding the achievement of objectives relating to operations, reporting, and compliance.","cmt_tr": "COSO'nun iç kontrol çerçevesi, faaliyetler, raporlama ve uyumla ilgili hedeflere ulaşılması konusunda makul güvence sağlamak üzere tasarlanmış, bir kuruluşun yönetim kurulu, yönetimi ve diğer personeli tarafından uygulanan bir süreçtir. COSO KRY çerçevesi, COSO iç kontrol çerçevesinin bazı kavramlarını tamamlar ve içerir.","cmt_en": "The COSO’s internal control framework is a process, effected by an entity’s board of directors, management, and other personnel, designed to provide reasonable assurance regarding the achievement of objectives relating to operations, reporting, and compliance. The COSO ERM framework complements and incorporates some concepts of, the COSO internal control framework."},{"tr": "Bir bileşenin yalnızca sonraki bileşeni etkilediği sıralı bir süreç.","en": "A serial process in which one component affects only the next component.","cmt_tr": "Bileşenler birbiriyle ilişkilidir. Örneğin, yönetişim ve kültür bileşeni tüm bileşenleri etkiler.","cmt_en": "The components are interrelated. For example, the governance and culture component affects all components."},{"tr": "Kuruluşa kontrol odaklı yaklaşım benimseyen bir süreç.","en": "A process that takes a control-based approach to an organization.","cmt_tr": "COSO KRY çerçevesi, kuruluşa risk odaklı bir yaklaşım benimser.","cmt_en": "The COSO ERM framework takes a risk-based approach to an organization."},{"tr": "Kuruluşların değer yaratma, koruma ve gerçekleştirmede riski yönetmek için dayandığı kültür, yetenekler ve uygulamalar.","en": "The culture, capabilities, and practices that organizations rely on to manage risk in creating, preserving, and realizing value.","cmt_tr": "COSO KRY çerçevesi, bir kuruluşun tüm risk yönetimi faaliyetlerini koordine etmek ve entegre etmek için bir temeldir. Etkili entegrasyon (1) karar vermeyi iyileştirir ve (2) performansı artırır. Kuruluşların değer yaratma, koruma ve gerçekleştirmede riski yönetmek için dayandığı kültür, yetenekler ve uygulamalar olarak tanımlanır.","cmt_en": "The COSO ERM framework is a basis for coordinating and integrating all of an organization’s risk management activities. Effective integration (1) improves decision-making, and (2) enhances performance. It is defined as the culture, capabilities, and practices that organizations rely on to manage risk in creating, preserving, and realizing value."}],"answer": 3},{"q_tr": "COSO'ya göre, aşağıdakilerden hangisi bir kuruluşun kurumsal risk yönetiminin (KRY) gözetimini sağlar?","q_en": "According to COSO, which of the following provides oversight of an entity’s enterprise risk management (ERM)?","options": [{"tr": "Yönetim.","en": "Management.","cmt_tr": "Yönetim, genellikle KRY'nin günlük yönetimi sorumluluğuna sahiptir.","cmt_en": "Management generally has day-to-day responsibility for managing ERM."},{"tr": "Risk sorumlusu.","en": "The risk officer.","cmt_tr": "Bir risk sorumlusu risk yönetimi faaliyetlerini koordine edebilir ancak gözetim sağlamaz.","cmt_en": "A risk officer may coordinate risk management activities but will not provide oversight."},{"tr": "Yönetim kurulu.","en": "The board of directors.","cmt_tr": "Yönetim kurulu, KRY kültürü, yetenekleri ve uygulamalarının risk gözetimini sağlar. Ayrıca bu amaçla yönetim kurulu komiteleri oluşturulabilir, örneğin bir risk komitesi.","cmt_en": "The board provides risk oversight of ERM culture, capabilities, and practices. Also, board committees may be formed for this purpose, e.g., a risk committee."},{"tr": "Mali yöneticiler.","en": "Financial executives.","cmt_tr": "Mali yöneticiler, finansal raporlamaya ilişkin risk yönetimi süreçlerinin etkili bir şekilde işlemesini sağlamak için iç denetim faaliyetiyle daha fazla ilgilenebilir. İç denetim faaliyetiyle olan ilgileri KRY gözetimi değildir.","cmt_en": "Financial executives may be more involved with the internal auditing activity to ensure that risk management processes regarding financial reporting are operating effectively. Their involvement with the internal auditing activity is not oversight of ERM."}],"answer": 2},{"q_tr": "COSO KRY çerçevesinin temel öncülü, her kuruluşun aşağıdakilerden hangisi için var olduğudur?","q_en": "The underlying premise of the COSO ERM framework is that every organization exists to","options": [{"tr": "Kârı maksimize etmek.","en": "Maximize profits.","cmt_tr": "KRY'nin geniş öncülü, sadece kârı maksimize etmek değil, kuruluşun paydaşları için değer yaratmak, korumak ve gerçekleştirmektir.","cmt_en": "ERM’s broad premise is to create, preserve, and realize value for the entity’s stakeholders, not simply to maximize profits."},{"tr": "Riskleri belirlemek ve yönetmek.","en": "Identify and manage risks.","cmt_tr": "Riskler, paydaşlara değer sağlamak için belirlenir ve yönetilir.","cmt_en": "Risks are identified and managed to provide value for stakeholders."},{"tr": "Paydaşlarına değer sağlamak.","en": "Provide value for its stakeholders.","cmt_tr": "KRY, kuruluşların değer yaratma, koruma ve gerçekleştirmede riski yönetmek için dayandığı, strateji belirleme ve performansla entegre kültür, yetenekler ve uygulamalar olarak tanımlanır.","cmt_en": "ERM is defined as the culture, capabilities, and practices, integrated with strategy-setting and performance, that organizations rely on to manage risk in creating, preserving, and realizing value."},{"tr": "Strateji ve iş hedeflerine ulaşmak.","en": "Achieve strategy and business objectives.","cmt_tr": "Strateji ve iş hedefleri, kuruluşun paydaşlarına değer katmayı amaçladığı araçlardır.","cmt_en": "Strategy and business objectives are the means by which the entity intends to add value for its stakeholders."}],"answer": 2},{"q_tr": "İşletme genelinde bir risk yönetimi programının en etkili olabilmesi için aşağıdakilerden hangisi tarafından yönetilmelidir?","q_en": "For an enterprise wide risk management program to be most effective, it should be led by which of the following?","options": [{"tr": "Bir yönetim komitesi.","en": "A management committee.","cmt_tr": "Yönetim riskleri yönetmekten ve CEO nihai olarak KRY'den sorumlu olsa da, bir KRY programı merkezileştirilmiş bir koordinatör tarafından yönetildiğinde en etkilidir.","cmt_en": "Although management is responsible for managing risks and the CEO is ultimately responsible for ERM, an ERM program is most effective when led by a centralized coordinator."},{"tr": "İç denetim yöneticisi.","en": "The chief audit executive.","cmt_tr": "İç denetim yöneticisi (CAE), risk yönetimi sürecini değerlendirmek ve iyileştirmekten sorumlu iç denetim fonksiyonunu yönetir. Bir CAE'nin KRY programı üzerindeki operasyonel sorumluluğu, iç denetim fonksiyonunun tarafsızlığını bozabilir.","cmt_en": "The chief audit executive (CAE) leads the internal audit function, which is responsible for evaluating and improving the risk management process. A CAE’s operational responsibility for an ERM program could impair the objectivity of the internal audit function."},{"tr": "Merkezileştirilmiş bir koordinatör.","en": "A centralized coordinator.","cmt_tr": "Bir kurumsal risk yönetimi (KRY) programı, risk sorumlusu gibi merkezileştirilmiş bir koordinatör tarafından yönetildiğinde en etkilidir. Bu kişi, diğer yöneticilerle kendi sorumluluk alanlarında etkili risk yönetimi oluşturma konusunda çalışarak KRY'yi kolaylaştırır.","cmt_en": "An enterprise risk management (ERM) program is most effective when led by a centralized coordinator, such as a risk officer. This person facilitates ERM by working with other managers in establishing effective risk management in their areas of responsibility."},{"tr": "Denetim komitesi üyeleri.","en": "Audit committee members.","cmt_tr": "Yönetim kurulu üyeleri olarak denetim komitesi üyeleri, yalnızca KRY'nin gözetimini sağlar.","cmt_en": "As directors, audit committee members provide only oversight of ERM."}],"answer": 2},{"q_tr": "COSO KRY çerçevesine göre, doğal risk ile fiili artık risk arasındaki fark, yönetimin aşağıdakilerden hangisinden kaynaklanır?","q_en": "According to the COSO ERM framework, the difference between inherent risk and actual residual risk results because of management’s","options": [{"tr": "Doğal riskin ciddiyetini değiştirmek için aldığı eylemler.","en": "Actions to alter the severity of inherent risk.","cmt_tr": "Doğal risk, yönetimin ciddiyetini değiştirmek için harekete geçmediği durumda var olan risktir. Fiili artık risk, yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risktir.","cmt_en": "Inherent risk is the risk without management actions to alter its severity. Actual residual risk remains after management actions to alter its severity."},{"tr": "Fiili artık riskin ciddiyetini değiştirmek için aldığı eylemler.","en": "Actions to alter the severity of actual residual risk.","cmt_tr": "Fiili artık risk, yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risktir.","cmt_en": "Actual residual risk is the risk that remains after management’s actions to alter its severity."},{"tr": "Doğal riskin ciddiyetini değiştirememesi.","en": "Inability to alter the severity of inherent risk.","cmt_tr": "Fark, yalnızca yönetim eylemleri doğal riskin ciddiyetini değiştirdiğinde ortaya çıkar.","cmt_en": "The difference results only if management actions alter the severity of inherent risk."},{"tr": "Fiili artık riski paylaşamaması.","en": "Inability to share the actual residual risk.","cmt_tr": "Fiili artık riski paylaşamama, doğal risk ile fiili artık risk arasındaki farkı yaratmaz. Paylaşma, doğal riski azaltan bir risk yanıtıdır.","cmt_en": "The inability to share actual residual risk does not create the difference between inherent risk and actual residual risk. Sharing is a risk response reduces inherent risk."}],"answer": 0},{"q_tr": "COSO KRY çerçevesine göre, risk prosedürlerini tasarlama ve uygulama konusunda en uygun pozisyon veya iç birim hangisidir?","q_en": "According to the COSO ERM framework, the position or internal entity that is best suited to devise and execute risk procedures is","options": [{"tr": "İç denetim fonksiyonu.","en": "The internal audit function.","cmt_tr": "İç denetçiler KRY'nin etkililiğini değerlendirmek ve iyileştirmek için en uygun konumdadır, ancak risk prosedürlerini uygulayarak bağımsızlık ve tarafsızlıklarını bozabilirler.","cmt_en": "The internal auditors are best suited to evaluate and improve the effectiveness of ERM, but they may impair their independence and objectivity by executing risk procedures."},{"tr": "İcra kurulu başkanı.","en": "The chief executive officer.","cmt_tr": "CEO, KRY'nin nihai sorumluluğuna sahiptir ancak belirli bir departman için günlük bazda risk prosedürlerini tasarlayıp uygulamaz.","cmt_en": "The CEO has the ultimate responsibility for ERM but does not devise and execute risk procedures for a particular department on a day-to-day basis."},{"tr": "Yönetim.","en": "Management.","cmt_tr": "Yönetim, KRY'nin genel sorumluluğuna ve riskin günlük yönetimine, COSO KRY çerçevesinin uygulanması dahil olmak üzere sahiptir. Yöneticiler, iş hedeflerine ulaşılmasını tehdit eden riskler hakkında en fazla bilgiye sahiptir. Ayrıca prosedürlerin günlük olarak uygulanmasını sağlayabilirler.","cmt_en": "Management has overall responsibility for ERM and day-to-day managing of risk, including implementation of the COSO ERM framework. Managers have the most knowledge of the risks that threaten the achievement of business objectives. Managers also can ensure that the procedures are performed daily."},{"tr": "Denetim komitesi.","en": "The audit committee.","cmt_tr": "Denetim komitesinin KRY ile ilgili gözetim rolü vardır, ancak risk prosedürlerini tasarlamak ve uygulamak için en uygun konumda değildir.","cmt_en": "The audit committee has an oversight role in relation to ERM, but it is not best suited to devise and execute risk procedures."}],"answer": 2},{"q_tr": "COSO KRY çerçevesine göre, strateji ile iş hedefleri arasındaki farkı en iyi tanımlayan aşağıdakilerden hangisidir?","q_en": "According to the COSO ERM framework, which of following best describes the difference between strategy and business objectives?","options": [{"tr": "Strateji, iş hedeflerine ulaşmak için yapılan plandır.","en": "Strategy is the plan to achieve business objectives.","cmt_tr": "Strateji, kuruluşun misyon ve vizyonuna ulaşmak ve temel değerlerini uygulamak için yapılan plandır.","cmt_en": "Strategy is the plan to achieve the organization’s mission and vision and apply its core values."},{"tr": "İş hedefleri, stratejiye ulaşmak için atılan adımlardır.","en": "Business objectives are the steps to achieve strategy.","cmt_tr": "Strateji, kuruluşun misyon ve vizyonuna ulaşmak ve temel değerlerini uygulamak için yapılan plandır. İş hedefleri, kuruluşun stratejisine ulaşmak için atılan ölçülebilir adımlardır.","cmt_en": "Strategy is the plan to achieve the entity’s mission and vision and apply its core values. Business objectives are the measurable steps taken to achieve the entity’s strategy."},{"tr": "Strateji kuruluşun temel amacıdır ve iş hedefleri kuruluşun zaman içinde ulaşmayı amaçladığı şeylerdir.","en": "Strategy is the organization’s core purpose, and business objectives are what the organization aspires to achieve over time.","cmt_tr": "Misyon kuruluşun temel amacıdır, vizyon ise zaman içinde ulaşmayı amaçladığı hedeflerdir.","cmt_en": "Mission is the organization’s core purpose, but vision is its aspirations for what it intends to achieve over time."},{"tr": "İş hedefleri, stratejiden daha geniş kapsamlıdır.","en": "Business objectives are broader in scope than strategy.","cmt_tr": "Strateji, kuruluşun misyon ve vizyonuna ulaşmak için genel plandır. Stratejinin kapsamı iş hedeflerinden daha geniştir.","cmt_en": "Strategy is the overall plan to achieve the organization’s mission and vision. It reflects a broader scope than business objectives."}],"answer": 1},{"q_tr": "COSO KRY çerçevesine göre, aşağıdakilerden hangisi kurumsal risk yönetiminin günlük sorumluluğuna sahiptir?","q_en": "According to the COSO ERM framework, which of the following has day-to-day responsibility for enterprise risk management?","options": [{"tr": "Yönetim.","en": "Management.","cmt_tr": "Yönetim, genellikle riskin günlük yönetimi sorumluluğuna sahiptir. Birinci hesap verebilirlik hattı olan asıl risk sahipleri, strateji ve iş hedeflerine ulaşmak için üstlenilen performansı ve riskleri yönetir.","cmt_en": "Management generally has day-to-day responsibility for managing risk. The principal owners of risk (first line of accountability) manage performance and risks taken to achieve strategy and business objectives."},{"tr": "Yönetim kurulu.","en": "The board of directors.","cmt_tr": "Yönetim kurulu, KRY kültürü, yetenekleri ve uygulamalarının risk gözetiminden sorumludur. Ancak bu sorumluluğu bir yönetim kurulu komitesine (örneğin risk komitesine) devredebilir.","cmt_en": "The board is responsible for risk oversight of ERM culture, capabilities, and practices. But it may delegate that responsibility to a board committee (e.g., a risk committee)."},{"tr": "Dış denetçiler.","en": "External auditors.","cmt_tr": "Dış denetçiler kuruluştan bağımsız olmalı ve bu nedenle yönetim fonksiyonları üstlenmemelidir. Ancak bağımsız bir dış denetim, KRY'nin yönetilmesinde faydalı bilgiler sağlar.","cmt_en": "External auditors must be independent of the entity and therefore must not perform management functions. However, an external, independent audit provides information useful in managing ERM"},{"tr": "İç denetçiler.","en": "Internal auditors.","cmt_tr": "İç denetçilerin güvence fonksiyonu (yönetim hesap verebilirliğinin üçüncü hattı) vardır. Kurumsal bağımsızlığa sahip olmalı ve tarafsız olmalıdırlar.","cmt_en": "Internal auditors have an assurance function (the third line of management accountability). They must have organizational independence and be objective."}],"answer": 0},{"q_tr": "Şirket yönetimi olay belirlemeyi tamamlar ve riskleri analiz eder. Şirket, yönetimin riske verdiği yanıttan sonra riskini değerlendirmek istemektedir. COSO KRY çerçevesine göre, bu durum hangi risk türünü temsil eder?","q_en": "Company management completes event identification and analyzes the risks. The company wishes to assess its risk after management’s response to the risk. According to the COSO ERM framework, which of the following types of risk does this situation represent?","options": [{"tr": "Doğal risk.","en": "Inherent risk.","cmt_tr": "Doğal risk, iç kontrollerin olmadığı durumda doğal olan veya var olan risktir.","cmt_en": "Inherent risk is risk that is natural or that exists in the absence of internal controls."},{"tr": "Fiili artık risk.","en": "Actual residual risk.","cmt_tr": "Yönetimin ilk yanıtından sonra bile kalan risk, fiili artık risktir.","cmt_en": "Risk that remains even after management’s initial response is actual residual risk."},{"tr": "Kontrol riski.","en": "Control risk.","cmt_tr": "Kontrol riski, kontrollerin kontrol edilebilir riskleri etkili bir şekilde yönetememe riskidir.","cmt_en": "Control risk is the risk that controls fail to effectively manage controllable risks."},{"tr": "Tespit riski.","en": "Detection risk.","cmt_tr": "Tespit riski, denetçinin gerçekte önemli hatalar mevcut olduğu halde hata bulunmadığı sonucuna varma riskidir.","cmt_en": "Detection risk is the risk that the auditor will conclude that no material errors are present when in fact there are."}],"answer": 1},{"q_tr": "Fiili artık risk nedir?","q_en": "What is actual residual risk?","options": [{"tr": "Riskin etkisi.","en": "Impact of risk.","cmt_tr": "Riskin etkisi, sonucudur.","cmt_en": "The impact of risk is its consequence."},{"tr": "Hedeflenen artık risk.","en": "Target residual risk.","cmt_tr": "Hedeflenen artık risk, kuruluşun yönetimin ciddiyetini değiştirmek için harekete geçtikten sonra var olacağını varsaydığı risktir.","cmt_en": "Target residual risk is the risk the entity assumes will exist after management acts to alter its severity."},{"tr": "Yönetilmeyen risk.","en": "Risk that is not managed.","cmt_tr": "Fiili artık risk, yönetimin ciddiyetini değiştirmek için harekete geçmesinden sonra kalan risktir. Bu eylem, bir riske yanıt olarak kontrol faaliyetlerini içerir.","cmt_en": "Actual residual risk is the risk remaining after management takes action to alter its severity. Such action includes control activities in responding to a risk."},{"tr": "Ortamda var olan temel risk.","en": "Underlying risk in the environment.","cmt_tr": "Temel risk, doğal risktir.","cmt_en": "The underlying risk is the inherent risk."}],"answer": 2},{"q_tr": "Risk yanıtı, risk yönetimi sürecinin bir unsurudur. Bu nedir?","q_en": "A risk response is an element of the risk management process. It is","options": [{"tr": "Üstlenilebilecek maksimum risk.","en": "The maximum risk that can be assumed.","cmt_tr": "Risk kapasitesi, kuruluşun üstlenebileceği maksimum risk miktarıdır.","cmt_en": "Risk capacity is the maximum amount of risk the organization can assume."},{"tr": "Riski kuruluşun risk iştahı dahiline getiren bir eylem.","en": "An act bringing a risk within the entity’s risk appetite.","cmt_tr": "Risk yanıtı, belirlenen riskleri kuruluşun risk iştahı dahiline getirmek için alınan bir eylemdir. Risk iştahı, kuruluşun değer peşinde koşarken kabul etmeye istekli olduğu risk miktarı ve türlerinden oluşur.","cmt_en": "A risk response is an action taken to bring identified risks within the organization’s risk appetite. The risk appetite consists of the amount and types of risk the organization is willing to accept in pursuit of value."},{"tr": "Değerin gerçekleştirilmesine yönelik yaklaşımları değiştiren bir eylem.","en": "An act altering approaches to the realization of value.","cmt_tr": "Fırsat, değerin yaratılması, korunması veya gerçekleştirilmesi için hedefleri veya yaklaşımları oluşturan veya değiştiren herhangi bir eylem veya potansiyel eylemdir.","cmt_en": "Opportunity is any action or potential action that creates or alters goals or approaches for the creation, preservation, or realization of value."},{"tr": "Değer peşinde koşarken kabul edilebilir risk.","en": "The risk that is acceptable in pursuit of value.","cmt_tr": "Değer peşinde koşarken kabul edilebilir risk, risk iştahıdır.","cmt_en": "The risk that is acceptable in pursuit of value is the risk appetite."}],"answer": 1},{"q_tr": "Bir kuruluşun KRY'sini denetlemek üzere atanan hangi yönetim kurulu komitesi büyük olasılıkla düzenleyiciler tarafından zorunlu kılınmıştır?","q_en": "Which board committee appointed to oversee an organization’s ERM most likely is required by regulators?","options": [{"tr": "Yönetişim komitesi.","en": "Governance committee.","cmt_tr": "Aday gösterme veya yönetişim komitesi, yönetim kurulu üyelerinin ve üst yöneticilerin seçimini denetler ancak yasa veya düzenleme tarafından zorunlu kılınmamıştır.","cmt_en": "A nomination or governance committee oversees selection of directors and executives but is not required by law or regulation."},{"tr": "Risk komitesi.","en": "Risk committee.","cmt_tr": "Bir risk komitesi doğrudan KRY'yi denetleyebilir ancak yasa veya düzenleme tarafından zorunlu kılınmamıştır.","cmt_en": "A risk committee may directly oversee ERM but is not required by law or regulation."},{"tr": "Denetim komitesi.","en": "Audit committee.","cmt_tr": "2002 tarihli Sarbanes-Oxley Yasası, halka açık şirketlerin denetim komiteleri kurmasını zorunlu kılmıştır. Her üye aynı zamanda yönetim kurulu üyesi ve bağımsız olmalıdır. Denetim komitesi, diğer şeylerin yanı sıra, dış denetçiyi atar ve genellikle gerçekleştireceği hizmetleri önceden onaylamalıdır.","cmt_en": "The Sarbanes-Oxley Act of 2002 required public companies to establish audit committees. Each member also must be a member of the board and independent. The audit committee, among other things, appoints the external auditor and ordinarily must preapprove the services it performs. Other board committees, e.g., risk, executive compensation, and nomination or governance, ordinarily are not required."},{"tr": "Ücret komitesi.","en": "Compensation committee.","cmt_tr": "Üst düzey yönetici ücret komitesi genellikle yasa veya düzenleme tarafından zorunlu kılınmamıştır.","cmt_en": "An executive compensation committee ordinarily is not required by law or regulation."}],"answer": 2},{"q_tr": "KRY'yi benimsemiş bir kuruluş, stratejinin risk profili üzerindeki etkisini değerlendirmektedir. Yukarıdaki şekilde Risk Profili'nde,","q_en": "An organization that has adopted ERM considers the effect of strategy on its risk profile. Risk Profile In the figure above,","options": [{"tr": "Risk eğrisi ile risk iştahının kesişimi kabul edilebilir değildir.","en": "The intersection of the risk curve and risk appetite is not acceptable.","cmt_tr": "Tolerans (risk toleransı), performans sonuçlarındaki kabul edilebilir değişim aralığıdır. Risk eğrisi ile risk iştahının kesişimi, kuruluşun risk toleransını aşar.","cmt_en": "Tolerance (risk tolerance) is the range of acceptable variation in performance results. The intersection of the risk curve and risk appetite exceeds the organization’s risk tolerance."},{"tr": "Risk eğrisinde hedefin sağındaki performans kabul edilebilir.","en": "Performance on the risk curve to the right of the target is acceptable.","cmt_tr": "Risk eğrisindeki birçok nokta risk iştahını ve toleransı aşar.","cmt_en": "Many points on the risk curve exceed risk appetite and tolerance."},{"tr": "Fiili performans kabul edilebilir değildir. Eğri üzerinde hedeflenenden daha yüksek bir noktada kesişir.","en": "Actual performance is not acceptable. It intersects with a higher point on the curve than targeted.","cmt_tr": "Fiili performans tolerans dahilinde ve risk iştahının altındadır.","cmt_en": "Actual performance is within tolerance and below risk appetite."},{"tr": "Risk eğrisindeki risk iştahının altındaki tüm noktalar kabul edilebilir.","en": "All points on the risk curve below the risk appetite are acceptable.","cmt_tr": "Eğri üzerinde en azından hedefe eşit olan, tolerans dahilinde olan ve risk iştahının altında kalan noktalar kabul edilebilir.","cmt_en": "Points on the curve that at least equal the target, are within tolerance, and are below the risk appetite are acceptable."}],"answer": 0},{"q_tr": "Aşağıdakilerden hangisi, üst yönetimin kurumsal risk yönetimi (KRY) açısından bir fonksiyonudur?","q_en": "Which of the following is a function of senior management with regard to enterprise risk management (ERM)?","options": [{"tr": "İç denetim yönetmeliğinin risk yönetimiyle ilgili hükümlerini onaylamak.","en": "Approving the provisions of the internal audit charter dealing with risk management.","cmt_tr": "Yönetim, KRY'nin genel sorumluluğuna sahiptir ve genellikle riskin günlük yönetiminden sorumludur. Ancak iç denetim yönetmeliğini onaylamak yönetim kurulunun sorumluluğundadır.","cmt_en": "Management has overall responsibility for ERM and is generally responsible for day-to-day managing of risk, including the implementation and development of the COSO ERM framework. Within management, the CEO has ultimate responsibility for ERM and achievement of strategy and business objectives. But approving the internal audit charter is a responsibility of the board."},{"tr": "Kuruluş genelinde tutarlı bir risk yönetimi felsefesi oluşturmak.","en": "Establishing a consistent risk management philosophy across the whole entity.","cmt_tr": "Üst yönetim tutarlı bir risk yönetimi felsefesi oluşturursa, kuruluşun tüm birimleri riske uygun şekilde yanıt verebilir.","cmt_en": "If senior management establishes a consistent risk management philosophy, all parts of the entity can respond to risk appropriately."},{"tr": "Etkili risk yönetimi uygulamalarıyla tüm riskleri ortadan kaldırmak.","en": "Eliminating all risks through effective risk management practices.","cmt_tr": "Tüm riskler ortadan kaldırılamaz. Bunun yerine, önemli riskler gerçekleşme olasılıklarını ve etki düzeylerini en aza indirmek için yönetilmelidir.","cmt_en": "All risk cannot be eliminated. Rather, significant risks should be managed to minimize the likelihood of their occurrence and the level of their impact."},{"tr": "Kuruluş hedeflerine ulaşılacağına dair makul güvence sağlamak üzere risk yönetimi süreçlerini değerlendirmek.","en": "Evaluating risk management processes to provide reasonable assurance that organizational objectives will be met.","cmt_tr": "Kuruluş hedeflerine ulaşılacağına dair makul güvence sağlamak üzere risk yönetimi süreçlerini değerlendirmek, üst yönetimin değil iç denetim fonksiyonunun sorumluluğundadır.","cmt_en": "Evaluating risk management processes to provide reasonable assurance that organizational objectives will be met is the responsibility of the internal audit function, not senior management."}],"answer": 1}],"SU3 - COSO ERM Components": [{"q_tr": "COSO'nun KRY çerçevesine göre, hangi risk görünümü tamamen entegredir?","q_en": "According to COSO’s ERM framework, which view of risk is fully integrated?","options": [{"tr": "Portföy görünümü.","en": "Portfolio view.","cmt_tr": "Portföy görünümü tamamen entegredir. Kuruluş genelinde strateji ve iş hedefleriyle ilgili risklerin ve bunların kuruluş performansı üzerindeki etkisinin bileşik bir görünümüdür.","cmt_en": "A portfolio view is fully integrated. It is a composite view of the risks related to entity-wide strategy and business objectives and their effect on entity performance."},{"tr": "Risk görünümü.","en": "Risk view.","cmt_tr": "Risk görünümü minimum düzeyde entegredir. Riskler belirlenir ve değerlendirilir.","cmt_en": "A risk view is minimally integrated. Risks are identified and assessed."},{"tr": "Risk profili görünümü.","en": "Risk profile view.","cmt_tr": "Risk profili görünümü kısmen entegredir. Belirli bir strateji veya iş hedefiyle ilgili risklerin türleri, ciddiyetleri ve karşılıklı bağımlılıklarının ve bunların performans üzerindeki etkisinin bileşik bir görünümüdür.","cmt_en": "A risk profile view is partially integrated. It is a composite view of the types, severity, and interdependencies of risks related to a specific strategy or business objective and their effect on performance."},{"tr": "Risk kategorisi görünümü.","en": "Risk category view.","cmt_tr": "Risk kategorisi görünümü sınırlı entegrasyonun sonucudur. Risk görünümünde belirlenen ve değerlendirilen riskler kategorize edilir.","cmt_en": "A risk category results from limited integration. The risks identified and assessed in the risk view (minimal integration) are categorized."}],"answer": 0},{"q_tr": "COSO'ya göre, kurumsal risk yönetiminin (KRY) hangi bileşeni bir kuruluşun faaliyet yapılarını ve temel değerlerini ele alır?","q_en": "According to COSO, which component of enterprise risk management (ERM) addresses an entity’s operating structures and core values?","options": [{"tr": "Gözden geçirme ve revizyon.","en": "Review and revision.","cmt_tr": "Gözden geçirme ve revizyon bileşeni; strateji, performans hedefleri ve toleransı ile KRY uygulamalarındaki gözden geçirme ve değişiklikleri ele alır.","cmt_en": "The review and revision component addresses the review of, and changes in, strategy, performance targets and tolerance, and ERM practices."},{"tr": "Yönetişim ve kültür.","en": "Governance and culture.","cmt_tr": "Yönetişim ve kültür bileşeni; yönetim kurulu sorumlulukları, faaliyet yapıları ve temel değerleri, diğerlerinin yanı sıra ele alır.","cmt_en": "The governance and culture component addresses board responsibilities, operating structures, and core values, among others."},{"tr": "Strateji ve hedef belirleme.","en": "Strategy and objective-setting.","cmt_tr": "Strateji ve hedef belirleme bileşeni; iş bağlamı, risk iştahı, strateji seçimi ve iş hedeflerini ele alır.","cmt_en": "The strategy and objective-setting component addresses business context, risk appetite, strategy selection, and business objectives."},{"tr": "Bilgi, iletişim ve raporlama.","en": "Information, communication, and reporting.","cmt_tr": "Bilgi, iletişim ve raporlama bileşeni; bilgi sistemleri, iletişim kanalları ve raporlamayı (risk, kültür ve performans hakkında) ele alır.","cmt_en": "The information, communication, and reporting component addresses information systems, communication channels, and reporting (on risk, culture, and performance)."}],"answer": 1},{"q_tr": "COSO'nun KRY çerçevesinin performans bileşeninde belirtilen bir ilkeye göre, kuruluş risk yanıtlarını belirler ve seçer. Risk, risk iştahı dahilinde olduğunda en uygun risk yanıtı hangisidir?","q_en": "According to a principle stated in the performance component of the COSO’s ERM framework, the organization identifies and selects risk responses. Which risk response is most appropriate when the risk is within the risk appetite?","options": [{"tr": "Bilgi güvenliğini iyileştirmek.","en": "Improving information security.","cmt_tr": "Azaltma (hafifletme), riskin ciddiyetini hedeflenen artık risk profili ve risk iştahı dahilinde olacak şekilde azaltmak için alınan eylemdir. Örneğin, kuruluş içinde etkili bir bilgi güvenliği fonksiyonu sürdürülerek sistem sızma riski azaltılabilir.","cmt_en": "Reduction (mitigation) is an action taken to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. For example, the risk of systems penetration can be reduced by maintaining an effective information security function within the entity."},{"tr": "İş ortaklarıyla sözleşme yapmak.","en": "Contracting with business partners.","cmt_tr": "Paylaşma (transfer), riskin bir kısmını başka bir tarafa aktararak riskin ciddiyetini azaltmak için alınan eylemdir. Örnekler: (1) sigorta, (2) hedging, (3) ortak girişimler, (4) dış kaynak kullanımı ve (5) müşteriler, satıcılar veya diğer iş ortaklarıyla yapılan sözleşmeler.","cmt_en": "Sharing (transfer) is an action taken to reduce the severity of the risk by transferring a portion of the risk to another party. Examples are (1) insurance; (2) hedging; (3) joint ventures; (4) outsourcing; and (5) contractual agreements with customers, vendors, or other business partners."},{"tr": "Kendi kendini sigortalamak.","en": "Self-insuring.","cmt_tr": "Kabul (benimseme), riskin ciddiyetini değiştirmek için hiçbir eylem yapılmaması sonucunu doğurur. Risk, risk iştahı dahilinde olduğunda kabul uygundur. Bu terim kendi kendini sigortalama ile eş anlamlıdır.","cmt_en": "Acceptance (retention) results in no action to alter the severity of the risk. Acceptance is appropriate when the risk is within the risk appetite. This term is synonymous with self- insurance."},{"tr": "Bir varlığı satmak.","en": "Selling an asset.","cmt_tr": "Kaçınma, riski ortadan kaldırmak için alınan eylemdir. Kaçınma, genellikle hiçbir yanıtın riski kabul edilebilir bir düzeye indiremeyeceğini gösterir.","cmt_en": "Avoidance is an action taken to remove the risk. Avoidance typically suggests no response would reduce the risk to an acceptable level. For example, the risk of pipeline sabotage can be avoided by selling the pipeline."}],"answer": 2},{"q_tr": "KRY çerçevesinin bilgi, iletişim ve raporlama bileşeni, kuruluşun aşağıdakilerden hangisini yaptığı ilkesini içerir?","q_en": "The information, communication, and reporting component of the ERM framework includes the principle that the organization","options": [{"tr": "Kuruluş performans sonuçlarını gözden geçirir.","en": "Reviews entity performance results.","cmt_tr": "Gözden geçirme ve revizyon bileşeninin bir ilkesi, kuruluşun kuruluş performans sonuçlarını gözden geçirmesi ve riski dikkate almasıdır.","cmt_en": "A principle of the review and revision component is that the organization reviews entity performance results and considers risk."},{"tr": "Risk, kültür ve performans hakkında raporlama yapar.","en": "Reports on risk, culture, and performance.","cmt_tr": "Bilgi, iletişim ve raporlama bileşeni, kuruluşun birden çok düzeyde ve kuruluş genelinde risk, kültür ve performans hakkında raporlama yaptığını belirtir. Raporlamanın amacı, personelin (1) risk, kültür ve performans arasındaki ilişkileri anlamasını ve (2) strateji ve hedeflerin belirlenmesi, yönetişim ve günlük operasyonlarla ilgili karar vermeyi desteklemektir.","cmt_en": "The information, communication, and reporting component states that the organization reports on risk, culture, and performance at multiple levels and across the entity. The purpose of reporting is to support personnel in their (1) understanding of the relationships among risk, culture, and performance and (2) decision making related to (a) setting strategy and objectives, (b) governance, and (c) day-to-day operations."},{"tr": "Verileri dönüştürerek KRY'yi desteklemek için iletişim kanallarından yararlanır.","en": "Leverages its communication channels to support ERM by transforming data.","cmt_tr": "Kuruluş, KRY'yi desteklemek için bilgi sistemlerinden yararlanır. Veriler, analiz, kullanım veya referans için toplanabilir ham gerçeklerdir. Bilgi, bir gerçek veya durum hakkında işlenmiş, düzenlenmiş ve yapılandırılmış verilerdir.","cmt_en": "The organization leverages its information systems to support ERM. Data are raw facts collectible for analysis, use, or reference. Information is processed, organized, and structured data about a fact or circumstance. Information systems transform data (e.g., risk data) into relevant information (e.g., risk information)."},{"tr": "Faaliyet yapıları oluşturur.","en": "Establishes operating structures.","cmt_tr": "Yönetişim ve kültür bileşeninin bir ilkesi, kuruluşun faaliyet yapıları oluşturmasıdır.","cmt_en": "A principle of the governance and culture component is that the organization establishes operating structures. They describe how the entity is organized and carries out its day-to-day operations. They generally are aligned with the entity’s legal structure and management structure."}],"answer": 1},{"q_tr": "KRY'nin hangi bileşeni, kuruluşun stratejiyi önemli ölçüde etkileyebilecek değişiklikleri belirlediği ve değerlendirdiği ilkesini içerir?","q_en": "Which component of ERM includes the principle that the organization identifies and assesses changes that may substantially affect strategy?","options": [{"tr": "Bilgi, iletişim ve raporlama.","en": "Information, communication, and reporting.","cmt_tr": "Bilgi, iletişim ve raporlama bileşeni, kuruluşun strateji ve iş hedeflerini etkileyebilecek riskleri belirlemek için zamanında ve ilgili bilgileri yakalaması, işlemesi, yönetmesi ve iletmesi gerektiğini belirtir.","cmt_en": "The information, communication, and reporting component provides that the organization must capture, process, manage (organize and store), and communicate timely and relevant information to identify risks that could affect strategy and business objectives."},{"tr": "Gözden geçirme ve revizyon.","en": "Review and revision.","cmt_tr": "Gözden geçirme ve revizyon bileşeni, kuruluşun strateji ve iş hedeflerini önemli ölçüde etkileyebilecek değişiklikleri belirlediği ve değerlendirdiği ilkesini içerir. Kuruluşun iş bağlamı ve kültüründeki değişikliklerin strateji ve iş hedeflerini önemli ölçüde etkilemesi en olasıdır.","cmt_en": "The review and revision component includes the principle that the organization identifies and assesses changes that may substantially affect strategy and business objectives. Changes in the organization’s business context and culture are most likely to substantially af
