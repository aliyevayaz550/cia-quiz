<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 7</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 7</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">105 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Study Unit 7</span></h1>
    <p id="welcome-desc">4 mövzu, 134 sual — Risk Management, COSO ERM, ISO 31000</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">6</span><span class="ws-label">Mövzu</span></div>
      <div class="ws-item"><span class="ws-num">105</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">420</span><span class="ws-label">İzah</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>

nd payment, is studied in isolation to identify the events that affect its inputs, tasks, responsibilities, and outputs.", "cmt_en": "Process flow analysis is a method of risk identification. A single business process, such as vendor authorization and payment, is studied in isolation to identify the events that affect its inputs, tasks, responsibilities, and outputs."}, {"tr": "Loss event data methods.", "en": "Loss event data methods.", "cmt_tr": "Loss event data methods are a method of risk identification. Risk identification should consider past events (trends) and future possibilities. For example, the losses associated with adverse events in the past can be used to make predictions. An example is matching workers’ compensation claims with the frequency of accidents.", "cmt_en": "Loss event data methods are a method of risk identification. Risk identification should consider past events (trends) and future possibilities. For example, the losses associated with adverse events in the past can be used to make predictions. An example is matching workers’ compensation claims with the frequency of accidents."}, {"tr": "Qualitative or quantitative methods.", "en": "Qualitative or quantitative methods.", "cmt_tr": "Risk management processes require risk assessment and prioritization. Risk assessment methods may be qualitative or quantitative. They include (1) risk modeling, (2) risk ranking, and (3) risk maps.", "cmt_en": "Risk management processes require risk assessment and prioritization. Risk assessment methods may be qualitative or quantitative. They include (1) risk modeling, (2) risk ranking, and (3) risk maps."}], "answer": 3}, {"q_tr": "ccording to The IIA’s Three Lines Model,", "q_en": "ccording to The IIA’s Three Lines Model,", "options": [{"tr": "Only the governing body has first line roles.", "en": "Only the governing body has first line roles.", "cmt_tr": "Management has first line (and second line) roles. Describing the governing body as on a “line” is lo ing the implementation and development of the COSO ERM framework. Within management, the CEO has ultimate responsibility for ERM and achievement of strategy and business objectives. But approving the internal audit charter is a responsibility of the board.", "cmt_en": "Management has overall responsibility for ERM and is generally responsible for day-to-day managing of risk, including the implementation and development of the COSO ERM framework. Within management, the CEO has ultimate responsibility for ERM and achievement of strategy and business objectives. But approving the internal audit charter is a responsibility of the board."}, {"tr": "Establishing a consistent risk management philosophy across the whole entity.", "en": "Establishing a consistent risk management philosophy across the whole entity.", "cmt_tr": "If senior management establishes a consistent risk management philosophy, all parts of the entity can respond to risk appropriately.", "cmt_en": "If senior management establishes a consistent risk management philosophy, all parts of the entity can respond to risk appropriately."}, {"tr": "Eliminating all risks through effective risk management practices.", "en": "Eliminating all risks through effective risk management practices.", "cmt_tr": "All risk cannot be eliminated. Rather, significant risks should be managed to minimize the likelihood of their occurrence and the level of their impact.", "cmt_en": "All risk cannot be eliminated. Rather, significant risks should be managed to minimize the likelihood of their occurrence and the level of their impact."}, {"tr": "Evaluating risk management processes to provide reasonable assurance that organizational objectives will be met.", "en": "Evaluating risk management processes to provide reasonable assurance that organizational objectives will be met.", "cmt_tr": "Evaluating risk management processes to provide reasonable assurance that organizational objectives will be met is the responsibility of the internal audit function, not senior management.", "cmt_en": "Evaluating risk management processes to provide reasonable assurance that organizational objectives will be met is the responsibility of the internal audit function, not senior management."}], "answer": 1}], "SU3 - COSO ERM Components": [{"q_tr": "ccording to COSO’s ERM framework, which view of risk is fully integrated?", "q_en": "ccording to COSO’s ERM framework, which view of risk is fully integrated?", "options": [{"tr": "Portfolio view.", "en": "Portfolio view.", "cmt_tr": "A portfolio view is fully integrated. It is a composite view of the risks related to entity-wide strategy and business objectives and their effect on entity performance.", "cmt_en": "A portfolio view is fully integrated. It is a composite view of the risks related to entity-wide strategy and business objectives and their effect on entity performance."}, {"tr": "Risk view.", "en": "Risk view.", "cmt_tr": "A risk view is minimally integrated. Risks are identified and assessed.", "cmt_en": "A risk view is minimally integrated. Risks are identified and assessed."}, {"tr": "Risk profile view.", "en": "Risk profile view.", "cmt_tr": "A risk profile view is partially integrated. It is a composite view of the types, severity, and interdependencies of risks related to a specific strategy or business objective and their effect on performance.", "cmt_en": "A risk profile view is partially integrated. It is a composite view of the types, severity, and interdependencies of risks related to a specific strategy or business objective and their effect on performance."}, {"tr": "Risk category view.", "en": "Risk category view.", "cmt_tr": "A risk category results from limited integration. The risks identified and assessed in the risk view (minimal integration) are categorized.", "cmt_en": "A risk category results from limited integration. The risks identified and assessed in the risk view (minimal integration) are categorized."}], "answer": 0}, {"q_tr": "ccording to COSO, which component of enterprise risk management (ERM) addresses an entity’s operating structures and core values?", "q_en": "ccording to COSO, which component of enterprise risk management (ERM) addresses an entity’s operating structures and core values?", "options": [{"tr": "Review and revision.", "en": "Review and revision.", "cmt_tr": "The review and revision component addresses the review of, and changes in, strategy, performance targets and tolerance, and ERM practices.", "cmt_en": "The review and revision component addresses the review of, and changes in, strategy, performance targets and tolerance, and ERM practices."}, {"tr": "Governance and culture.", "en": "Governance and culture.", "cmt_tr": "The governance and culture component addresses board responsibilities, operating structures, and core values, among others.", "cmt_en": "The governance and culture component addresses board responsibilities, operating structures, and core values, among others."}, {"tr": "Strategy and objective-setting.", "en": "Strategy and objective-setting.", "cmt_tr": "The strategy and objective-setting component addresses business context, risk appetite, strategy selection, and business objectives.", "cmt_en": "The strategy and objective-setting component addresses business context, risk appetite, strategy selection, and business objectives."}, {"tr": "Information, communication, and reporting.", "en": "Information, communication, and reporting.", "cmt_tr": "The information, communication, and reporting component addresses information systems, communication channels, and reporting (on risk, culture, and performance). Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations", "cmt_en": "The information, communication, and reporting component addresses information systems, communication channels, and reporting (on risk, culture, and performance). Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations"}], "answer": 1}, {"q_tr": "ccording to a principle stated in the performance component of the COSO’s ERM framework, the organization identifies and selects risk responses. Which risk response is most appropriate when the risk is within the risk appetite?", "q_en": "ccording to a principle stated in the performance component of the COSO’s ERM framework, the organization identifies and selects risk responses. Which risk response is most appropriate when the risk is within the risk appetite?", "options": [{"tr": "Improving information security.", "en": "Improving information security.", "cmt_tr": "Reduction (mitigation) is an action taken to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. For example, the risk of systems penetration can be reduced by maintaining an effective information security function within the entity.", "cmt_en": "Reduction (mitigation) is an action taken to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. For example, the risk of systems penetration can be reduced by maintaining an effective information security function within the entity."}, {"tr": "Contracting with business partners.", "en": "Contracting with business partners.", "cmt_tr": "Sharing (transfer) is an action taken to reduce the severity of the risk by transferring a portion of the risk to another party. Examples are (1) insurance; (2) hedging; (3) joint ventures; (4) outsourcing; and (5) contractual agreements with customers, vendors, or other business partners.", "cmt_en": "Sharing (transfer) is an action taken to reduce the severity of the risk by transferring a portion of the risk to another party. Examples are (1) insurance; (2) hedging; (3) joint ventures; (4) outsourcing; and (5) contractual agreements with customers, vendors, or other business partners."}, {"tr": "Self-insuring.", "en": "Self-insuring.", "cmt_tr": "Acceptance (retention) results in no action to alter the severity of the risk. Acceptance is appropriate when the risk is within the risk appetite. This term is synonymous with self- insurance.", "cmt_en": "Acceptance (retention) results in no action to alter the severity of the risk. Acceptance is appropriate when the risk is within the risk appetite. This term is synonymous with self- insurance."}, {"tr": "Selling an asset.", "en": "Selling an asset.", "cmt_tr": "Avoidance is an action taken to remove the risk. Avoidance typically suggests no response would reduce the risk to an acceptable level. For example, the risk of pipeline sabotage can be avoided by selling the pipeline.", "cmt_en": "Avoidance is an action taken to remove the risk. Avoidance typically suggests no response would reduce the risk to an acceptable level. For example, the risk of pipeline sabotage can be avoided by selling the pipeline."}], "answer": 2}, {"q_tr": "he information, communication, and reporting component of the ERM framework includes the principle that the organization", "q_en": "he information, communication, and reporting component of the ERM framework includes the principle that the organization", "options": [{"tr": "Reviews entity performance results.", "en": "Reviews entity performance results.", "cmt_tr": "A principle of the review and revision component is that the organization reviews entity performance results and considers risk.", "cmt_en": "A principle of the review and revision component is that the organization reviews entity performance results and considers risk."}, {"tr": "Reports on risk, culture, and performance.", "en": "Reports on risk, culture, and performance.", "cmt_tr": "The information, communication, and reporting component states that the organization reports on risk, culture, and performance at multiple levels and across the entity. The purpose of reporting is to support personnel in their (1) understanding of the relationships among risk, culture, and performance and (2) decision making related to (a) setting strategy and objectives, (b) governance, and (c) day-to-day operations. Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations", "cmt_en": "The information, communication, and reporting component states that the organization reports on risk, culture, and performance at multiple levels and across the entity. The purpose of reporting is to support personnel in their (1) understanding of the relationships among risk, culture, and performance and (2) decision making related to (a) setting strategy and objectives, (b) governance, and (c) day-to-day operations. Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations"}, {"tr": "Leverages its communication channels to support ERM by transforming data.", "en": "Leverages its communication channels to support ERM by transforming data.", "cmt_tr": "The organization leverages its information systems to support ERM. Data are raw facts collectible for analysis, use, or reference. Information is processed, organized, and structured data about a fact or circumstance. Information systems transform data (e.g., risk data) into relevant information (e.g., risk information).", "cmt_en": "The organization leverages its information systems to support ERM. Data are raw facts collectible for analysis, use, or reference. Information is processed, organized, and structured data about a fact or circumstance. Information systems transform data (e.g., risk data) into relevant information (e.g., risk information)."}, {"tr": "Establishes operating structures.", "en": "Establishes operating structures.", "cmt_tr": "A principle of the governance and culture component is that the organization establishes operating structures. They describe how the entity is organized and carries out its day-to-day operations. They generally are aligned with the entity’s legal structure and management structure.", "cmt_en": "A principle of the governance and culture component is that the organization establishes operating structures. They describe how the entity is organized and carries out its day-to-day operations. They generally are aligned with the entity’s legal structure and management structure."}], "answer": 1}, {"q_tr": "hich component of ERM includes the principle that the organization identifies and assesses changes that may substantially affect strategy?", "q_en": "hich component of ERM includes the principle that the organization identifies and assesses changes that may substantially affect strategy?", "options": [{"tr": "Information, communication, and reporting.", "en": "Information, communication, and reporting.", "cmt_tr": "The information, communication, and reporting component provides that the organization must capture, process, manage (organize and store), and communicate timely and relevant information to identify risks that could affect strategy and business objectives.", "cmt_en": "The information, communication, and reporting component provides that the organization must capture, process, manage (organize and store), and communicate timely and relevant information to identify risks that could affect strategy and business objectives."}, {"tr": "Review and revision.", "en": "Review and revision.", "cmt_tr": "The review and revision component includes the principle that the organization identifies and assesses changes that may substantially affect strategy and business objectives. Changes in the organization’s business context and culture are most likely to substantially affect strategy and business objectives. Such changes may result from changes in the organization’s internal or external environment. Substantial changes in the internal environment include those due to rapid growth, innovation, and turnover of key personnel. Substantial changes in the external environment include those in the economy or regulations.", "cmt_en": "The review and revision component includes the principle that the organization identifies  COSO Framework -- ERM Components and Limitations", "cmt_en": "No direct correlation exists between the severity of a risk and the cost of the response to that risk. Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations"}], "answer": 0}, {"q_tr": "n organization’s risk appetite is generally", "q_en": "n organization’s risk appetite is generally", "options": [{"tr": "Equal to or greater than its risk capacity.", "en": "Equal to or greater than its risk capacity.", "cmt_tr": "An organization’s risk appetite generally is rarely set above risk capacity.", "cmt_en": "An organization’s risk appetite generally is rarely set above risk capacity."}, {"tr": "Determined by its insurance liability limits.", "en": "Determined by its insurance liability limits.", "cmt_tr": "Although insurance liability limits may be a factor to consider when evaluating risk responses, they would not determine risk appetite.", "cmt_en": "Although insurance liability limits may be a factor to consider when evaluating risk responses, they would not determine risk appetite."}, {"tr": "Determined by the internal auditing function.", "en": "Determined by the internal auditing function.", "cmt_tr": "The board and senior management determine an organization’s risk appetite, not the internal auditing function.", "cmt_en": "The board and senior management determine an organization’s risk appetite, not the internal auditing function."}, {"tr": "Less than its risk capacity.", "en": "Less than its risk capacity.", "cmt_tr": "Risk appetite consists of the types and amount of risk the entity is willing to accept in pursuit of value. Among other things, risk appetite should be considered in 1. Setting strategy. 2. Setting business objectives. 3. Prioritizing risks. 4. Implementing risk responses. Risk capacity is the maximum amount of risk an entity is able to bear and remain solvent. The organization considers its mission, vision, culture, prior strategies, and risk capacity to set its risk appetite. In setting risk appetite, the optimal balance of opportunity and risk is sought. Risk appetite is rarely set above risk capacity.", "cmt_en": "Risk appetite consists of the types and amount of risk the entity is willing to accept in pursuit of value. Among other things, risk appetite should be considered in 1. Setting strategy. 2. Setting business objectives. 3. Prioritizing risks. 4. Implementing risk responses. Risk capacity is the maximum amount of risk an entity is able to bear and remain solvent. The organization considers its mission, vision, culture, prior strategies, and risk capacity to set its risk appetite. In setting risk appetite, the optimal balance of opportunity and risk is sought. Risk appetite is rarely set above risk capacity."}], "answer": 3}, {"q_tr": "hich of the following is an example of risk reduction?", "q_en": "hich of the following is an example of risk reduction?", "options": [{"tr": "Purchasing insurance.", "en": "Purchasing insurance.", "cmt_tr": "Purchasing insurance is a form of risk sharing.", "cmt_en": "Purchasing insurance is a form of risk sharing."}, {"tr": "Never beginning the risk-producing activity.", "en": "Never beginning the risk-producing activity.", "cmt_tr": "Never beginning the risk-producing activity is an example of risk avoidance.", "cmt_en": "Never beginning the risk-producing activity is an example of risk avoidance."}, {"tr": "Hiring additional employees to perform routine maintenance checks on machinery.", "en": "Hiring additional employees to perform routine maintenance checks on machinery.", "cmt_tr": "Risk reduction limits the severity of the risk so that it is within the target residual risk and risk appetite. For example, hiring additional employees to perform routine maintenance checks on machinery reduces the risk of a serious break-down of machinery. Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations", "cmt_en": "Risk reduction limits the severity of the risk so that it is within the target residual risk and risk appetite. For example, hiring additional employees to perform routine maintenance checks on machinery reduces the risk of a serious break-down of machinery. Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations"}, {"tr": "After considering all the alternatives and implementing control activities, continuing to engage in the risk-producing activity.", "en": "After considering all the alternatives and implementing control activities, continuing to engage in the risk-producing activity.", "cmt_tr": "After considering all the alternatives and implementing control activities, continuing to engage in the risk-producing activity is an example of risk acceptance.", "cmt_en": "After considering all the alternatives and implementing control activities, continuing to engage in the risk-producing activity is an example of risk acceptance."}], "answer": 2}, {"q_tr": "manufacturing firm identified that it would have difficulty sourcing raw materials locally, so it decided to relocate its production facilities. According to COSO, this decision represents which of the following responses to the risk?", "q_en": "manufacturing firm identified that it would have difficulty sourcing raw materials locally, so it decided to relocate its production facilities. According to COSO, this decision represents which of the following responses to the risk?", "options": [{"tr": "Risk reduction.", "en": "Risk reduction.", "cmt_tr": "Risk reduction (mitigation) reduces the risk so that it is within the target residual risk and risk appetite. By relocating its production facilities, the firm has reduced the risk of having difficulty sourcing materials locally.", "cmt_en": "Risk reduction (mitigation) reduces the risk so that it is within the target residual risk and risk appetite. By relocating its production facilities, the firm has reduced the risk of having difficulty sourcing materials locally."}, {"tr": "Prospect theory.", "en": "Prospect theory.", "cmt_tr": "Prospect theory is not a response to risk according to COSO.", "cmt_en": "Prospect theory is not a response to risk according to COSO."}, {"tr": "Risk sharing.", "en": "Risk sharing.", "cmt_tr": "Risk sharing transfers some loss potential to another party.", "cmt_en": "Risk sharing transfers some loss potential to another party."}, {"tr": "Risk acceptance.", "en": "Risk acceptance.", "cmt_tr": "Risk acceptance takes no action to alter the severity of the risk.", "cmt_en": "Risk acceptance takes no action to alter the severity of the risk."}], "answer": 0}, {"q_tr": "ccording to COSO, the component of enterprise risk management (ERM) that best relates to continuous improvement is", "q_en": "ccording to COSO, the component of enterprise risk management (ERM) that best relates to continuous improvement is", "options": [{"tr": "Monitoring.", "en": "Monitoring.", "cmt_tr": "Monitoring is a component of the COSO internal control framework, not the ERM framework.", "cmt_en": "Monitoring is a component of the COSO internal control framework, not the ERM framework."}, {"tr": "Information, communication, and reporting.", "en": "Information, communication, and reporting.", "cmt_tr": "Although the information, communication, and reporting component addresses how areas for improvement may be communicated and reported, no related principles guide continuous improvement efforts.", "cmt_en": "Although the information, communication, and reporting component addresses how areas for improvement may be communicated and reported, no related principles guide continuous improvement efforts."}, {"tr": "Strategy and objective-setting.", "en": "Strategy and objective-setting.", "cmt_tr": "No principles related to the strategy and objective-setting component guide continuous improvement efforts.", "cmt_en": "No principles related to the strategy and objective-setting component guide continuous improvement efforts."}, {"tr": "Review and revision.", "en": "Review and revision.", "cmt_tr": "A principle related to the review and revision component states that the organization must Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations continually improve ERM at all levels even if actual performance aligns with target performance or tolerance.", "cmt_en": "A principle related to the review and revision component states that the organization must Study Unit 7: Risk Management | Subunit 3: COSO Framework -- ERM Components and Limitations continually improve ERM at all levels even if actual performance aligns with target performance or tolerance."}], "answer": 3}, {"q_tr": "ccording to the COSO ERM Framework, which of the following is the best definition of enterprise risk management?", "q_en": "ccording to the COSO ERM Framework, which of the following is the best definition of enterprise risk management?", "options": [{"tr": "The enterprise-wide process of identifying and assessing significant risks.", "en": "The enterprise-wide process of identifying and assessing significant risks.", "cmt_tr": "Risk management also involves managing risks.", "cmt_en": "Risk management also involves managing risks."}, {"tr": "The practices that organizations rely on to identify, assess, and manage risks.", "en": "The practices that organizations rely on to identify, assess, and manage risks.", "cmt_tr": "The practices that organizations rely on to identify, assess, and manage risks are performed in the risk management process.", "cmt_en": "The practices that organizations rely on to identify, assess, and manage risks are performed in the risk management process."}, {"tr": "The participative and integrated approach to providing reasonable assurance that risks are adequately managed.", "en": "The participative and integrated approach to providing reasonable assurance that risks are adequately managed.", "cmt_tr": "A participative and integrated approach to prov const SHEETS = ["SU1 - Risk Mgmt Processes", "SU2 - COSO ERM Overview", "SU3 - COSO ERM Components", "SU4 - ISO 31000 Framework"];
const SHORT_NAMES = {"SU1 - Risk Mgmt Processes": "SU1", "SU2 - COSO ERM Overview": "SU2", "SU3 - COSO ERM Components": "SU3", "SU4 - ISO 31000 Framework": "SU4"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit7";

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  const q    = qs[curQ];
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang==="tr" ? "en" : "tr";
  document.getElementById("lang-btn").textContent = lang==="tr" ? "EN" : "TR";
  if(!quizStarted) {
    document.getElementById("welcome-desc").textContent =
      lang==="tr"
        ? "6 mövzu, 105 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar"
        : "6 topics, 105 questions — TR/EN bilingual support with explanations";
    return;
  }
  updateProgress();
  // Re-render current question without resetting state
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}

// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
