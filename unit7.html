fect strategy and business objectives. Such changes may result from changes in the organization’s internal or external environment. Substantial changes in the internal environment include those due to rapid growth, innovation, and turnover of key personnel. Substantial changes in the external environment include those in the economy or regulations."},{"tr": "Performans.","en": "Performance.","cmt_tr": "Performans bileşeni, kuruluşun değer peşinde koşarken kararlarını destekleyen KRY uygulamalarıyla ilgilidir.","cmt_en": "The performance component relates to ERM practices that support the organization’s decisions in pursuit of value. Those practices consist of identifying, assessing, prioritizing, responding to, and developing a portfolio view of risk."},{"tr": "Strateji ve hedef belirleme.","en": "Strategy and objective setting.","cmt_tr": "Strateji ve hedef belirleme bileşeni, stratejinin kuruluşun misyon, vizyon ve temel değerlerini desteklemesi gerektiğini vurgular.","cmt_en": "The strategy and objective setting component emphasizes that strategy must support the organization’s mission, vision, and core values. The integration of ERM with strategy setting helps to understand the risk profile related to strategy and business objectives."}],"answer": 1},{"q_tr": "COSO KRY çerçevesine göre, kültür","q_en": "According to the COSO ERM framework, culture","options": [{"tr": "Kuruluşun vizyon ve temel değerlerini yansıtır ancak mutlaka misyonunu değil.","en": "Reflects the vision and core values of the organization but not necessarily the mission.","cmt_tr": "Kültür, kuruluşun vizyon, temel değerler ve misyonunu yansıtır.","cmt_en": "Culture reflects the vision, core values, and mission of the organization."},{"tr": "İş hedeflerini yansıtır.","en": "Reflects business objectives.","cmt_tr": "İş hedefleri, stratejiye ulaşmak için atılan adımlardır. İş hedefleri kuruluşun kültürüyle tutarlı olmalıdır, ancak kültür hedefleri yansıtmaz.","cmt_en": "Business objectives are the steps taken to achieve the strategy. The business objectives should be consistent with the culture of the organization, but culture does not reflect the objectives."},{"tr": "Kuruluşun moralini belirler.","en": "Determines the morale of the organization.","cmt_tr": "Kültür morali önemli ölçüde etkileyebilir, ancak morali etkileyen birçok faktörden yalnızca biridir.","cmt_en": "Culture can significantly influence morale, but it is only one factor among many that affect morale."},{"tr": "Kuruluş içindeki personelin risk hakkındaki istenen davranışları, değerleri ve genel anlayışıyla ilgilidir.","en": "Relates to the desired behaviors, values, and overall understanding about risk held by personnel within the organization.","cmt_tr": "Kültür, yönetim ve personelin kararlarını etkileyen ve kuruluşun misyon, vizyon ve temel değerlerini yansıtan risk hakkındaki olumlu ve olumsuz tutumlar, davranışlar ve anlayışlardan oluşur.","cmt_en": "Culture consists of attitudes, behaviors, and understanding about risk, positive and negative, that influence the decisions of management and personnel and reflect the mission, vision, and core values of the organization."}],"answer": 3},{"q_tr": "Risk yanıtları hakkında aşağıdaki ifadelerden hangisi doğrudur?","q_en": "Which of the following is a true statement about risk responses?","options": [{"tr": "Her kuruluş, risklerin olasılığı ve önemi arasındaki ilişkiyi değerlendirmelidir.","en": "Each organization must assess the relationship between the likelihood and significance of risks.","cmt_tr": "Her kuruluş, risklerin olasılığı ve önemi arasındaki ilişkiyi değerlendirmeli ve uygun kontrolleri tasarlamalıdır. Bazı riskler ayrıntılı kontrol yapıları oluşturmayı gerektirir.","cmt_en": "Each organization must assess the relationship between the likelihood and significance of risks and must design the appropriate controls. Some risks require the creation of elaborate control structures."},{"tr": "Belirlenen riskler kabul edilebilir ve onaylanabilir.","en": "Identified risks can be acknowledged and accepted.","cmt_tr": "Bazı riskler ayrıntılı kontrol yapıları oluşturmayı gerektirirken, diğerleri kabul edilebilir (benimsenebilir).","cmt_en": "Some risks require the creation of elaborate control structures, but others may be accepted (retained)."},{"tr": "Bazı riskler maliyete bakılmaksızın ayrıntılı kontrol yapıları oluşturmayı gerektirir.","en": "Some risks require the creation of elaborate control structures regardless of the cost.","cmt_tr": "Tüm risk yanıtları ve kontroller, maliyetlerinden daha fazla fayda sağlamalıdır. Bu yaygın kısıtlama her zaman tanınmalı ve anlaşılmalıdır.","cmt_en": "All risk responses and controls must have more benefits than costs. This pervasive constraint should always be recognized and understood."},{"tr": "Riskin ciddiyeti ile o riske verilen yanıtın maliyeti doğrudan orantılıdır.","en": "The severity of a risk and the cost of the response to that risk are directly correlated.","cmt_tr": "Riskin ciddiyeti ile o riske verilen yanıtın maliyeti arasında doğrudan bir korelasyon yoktur.","cmt_en": "No direct correlation exists between the severity of a risk and the cost of the response to that risk."}],"answer": 0},{"q_tr": "Bir kuruluşun risk iştahı genellikle","q_en": "An organization’s risk appetite is generally","options": [{"tr": "Risk kapasitesine eşit veya daha büyüktür.","en": "Equal to or greater than its risk capacity.","cmt_tr": "Bir kuruluşun risk iştahı genellikle risk kapasitesinin üzerinde nadiren belirlenir.","cmt_en": "An organization’s risk appetite generally is rarely set above risk capacity."},{"tr": "Sigorta sorumluluk limitleri tarafından belirlenir.","en": "Determined by its insurance liability limits.","cmt_tr": "Sigorta sorumluluk limitleri risk yanıtlarını değerlendirirken dikkate alınacak bir faktör olabilse de, risk iştahını belirlemez.","cmt_en": "Although insurance liability limits may be a factor to consider when evaluating risk responses, they would not determine risk appetite."},{"tr": "İç denetim fonksiyonu tarafından belirlenir.","en": "Determined by the internal auditing function.","cmt_tr": "Yönetim kurulu ve üst yönetim bir kuruluşun risk iştahını belirler, iç denetim fonksiyonu değil.","cmt_en": "The board and senior management determine an organization’s risk appetite, not the internal auditing function."},{"tr": "Risk kapasitesinden küçüktür.","en": "Less than its risk capacity.","cmt_tr": "Risk iştahı, kuruluşun değer peşinde koşarken kabul etmeye istekli olduğu risk türleri ve miktarından oluşur. Risk kapasitesi, bir kuruluşun üstlenebileceği ve ödeme gücünü koruyabileceği maksimum risk miktarıdır. Risk iştahı nadiren risk kapasitesinin üzerinde belirlenir.","cmt_en": "Risk appetite consists of the types and amount of risk the entity is willing to accept in pursuit of value. Among other things, risk appetite should be considered in 1. Setting strategy. 2. Setting business objectives. 3. Prioritizing risks. 4. Implementing risk responses. Risk capacity is the maximum amount of risk an entity is able to bear and remain solvent. The organization considers its mission, vision, culture, prior strategies, and risk capacity to set its risk appetite. In setting risk appetite, the optimal balance of opportunity and risk is sought. Risk appetite is rarely set above risk capacity."}],"answer": 3},{"q_tr": "Aşağıdakilerden hangisi risk azaltmaya bir örnektir?","q_en": "Which of the following is an example of risk reduction?","options": [{"tr": "Sigorta satın almak.","en": "Purchasing insurance.","cmt_tr": "Sigorta satın almak bir risk paylaşma biçimidir.","cmt_en": "Purchasing insurance is a form of risk sharing."},{"tr": "Risk üreten faaliyete hiç başlamamak.","en": "Never beginning the risk-producing activity.","cmt_tr": "Risk üreten faaliyete hiç başlamamak, risk kaçınmasına bir örnektir.","cmt_en": "Never beginning the risk-producing activity is an example of risk avoidance."},{"tr": "Makinelerde rutin bakım kontrolleri yapmak üzere ek çalışan işe almak.","en": "Hiring additional employees to perform routine maintenance checks on machinery.","cmt_tr": "Risk azaltma, riskin ciddiyetini hedeflenen artık risk ve risk iştahı dahilinde olacak şekilde sınırlar. Örneğin, makinelerde rutin bakım kontrolleri yapmak üzere ek çalışan işe almak, ciddi bir makine arızası riskini azaltır.","cmt_en": "Risk reduction limits the severity of the risk so that it is within the target residual risk and risk appetite. For example, hiring additional employees to perform routine maintenance checks on machinery reduces the risk of a serious break-down of machinery."},{"tr": "Tüm alternatifleri değerlendirdikten ve kontrol faaliyetlerini uyguladıktan sonra risk üreten faaliyete devam etmek.","en": "After considering all the alternatives and implementing control activities, continuing to engage in the risk-producing activity.","cmt_tr": "Tüm alternatifleri değerlendirdikten ve kontrol faaliyetlerini uyguladıktan sonra risk üreten faaliyete devam etmek, risk kabulüne bir örnektir.","cmt_en": "After considering all the alternatives and implementing control activities, continuing to engage in the risk-producing activity is an example of risk acceptance."}],"answer": 2},{"q_tr": "Bir üretim firması, yerel olarak hammadde tedarik etmekte zorlanacağını belirlemiş ve üretim tesislerini taşımaya karar vermiştir. COSO'ya göre, bu karar riske verilen hangi yanıtı temsil eder?","q_en": "A manufacturing firm identified that it would have difficulty sourcing raw materials locally, so it decided to relocate its production facilities. According to COSO, this decision represents which of the following responses to the risk?","options": [{"tr": "Risk azaltma.","en": "Risk reduction.","cmt_tr": "Risk azaltma (hafifletme), riskin hedeflenen artık risk ve risk iştahı dahilinde olacak şekilde azaltılmasıdır. Üretim tesislerini taşıyarak firma, yerel malzeme tedarik etmekte zorluk çekme riskini azaltmıştır.","cmt_en": "Risk reduction (mitigation) reduces the risk so that it is within the target residual risk and risk appetite. By relocating its production facilities, the firm has reduced the risk of having difficulty sourcing materials locally."},{"tr": "Beklenti teorisi.","en": "Prospect theory.","cmt_tr": "Beklenti teorisi, COSO'ya göre bir risk yanıtı değildir.","cmt_en": "Prospect theory is not a response to risk according to COSO."},{"tr": "Risk paylaşma.","en": "Risk sharing.","cmt_tr": "Risk paylaşma, bazı kayıp potansiyelini başka bir tarafa aktarır.","cmt_en": "Risk sharing transfers some loss potential to another party."},{"tr": "Risk kabulü.","en": "Risk acceptance.","cmt_tr": "Risk kabulü, riskin ciddiyetini değiştirmek için hiçbir eylem yapmaz.","cmt_en": "Risk acceptance takes no action to alter the severity of the risk."}],"answer": 0},{"q_tr": "COSO'ya göre, sürekli iyileştirmeyle en iyi ilişkilendirilen kurumsal risk yönetimi (KRY) bileşeni hangisidir?","q_en": "According to COSO, the component of enterprise risk management (ERM) that best relates to continuous improvement is","options": [{"tr": "İzleme.","en": "Monitoring.","cmt_tr": "İzleme, KRY çerçevesinin değil, COSO iç kontrol çerçevesinin bir bileşenidir.","cmt_en": "Monitoring is a component of the COSO internal control framework, not the ERM framework."},{"tr": "Bilgi, iletişim ve raporlama.","en": "Information, communication, and reporting.","cmt_tr": "Bilgi, iletişim ve raporlama bileşeni iyileştirme alanlarının nasıl iletilip raporlanabileceğini ele alsa da, sürekli iyileştirme çabalarına rehberlik eden ilgili ilkeler yoktur.","cmt_en": "Although the information, communication, and reporting component addresses how areas for improvement may be communicated and reported, no related principles guide continuous improvement efforts."},{"tr": "Strateji ve hedef belirleme.","en": "Strategy and objective-setting.","cmt_tr": "Strateji ve hedef belirleme bileşeniyle ilgili sürekli iyileştirme çabalarına rehberlik eden ilkeler yoktur.","cmt_en": "No principles related to the strategy and objective-setting component guide continuous improvement efforts."},{"tr": "Gözden geçirme ve revizyon.","en": "Review and revision.","cmt_tr": "Gözden geçirme ve revizyon bileşeniyle ilgili bir ilke, kuruluşun fiili performans hedef performans veya toleransla uyumlu olsa bile tüm seviyelerde KRY'yi sürekli iyileştirmesi gerektiğini belirtir.","cmt_en": "A principle related to the review and revision component states that the organization must"}],"answer": 3},{"q_tr": "COSO KRY Çerçevesine göre, aşağıdakilerden hangisi kurumsal risk yönetiminin en iyi tanımıdır?","q_en": "According to the COSO ERM Framework, which of the following is the best definition of enterprise risk management?","options": [{"tr": "Önemli risklerin belirlenmesi ve değerlendirilmesi ile ilgili kuruluş genelinde süreç.","en": "The enterprise-wide process of identifying and assessing significant risks.","cmt_tr": "Risk yönetimi ayrıca risklerin yönetilmesini de içerir.","cmt_en": "Risk management also involves managing risks."},{"tr": "Kuruluşların riskleri belirlemek, değerlendirmek ve yönetmek için dayandığı uygulamalar.","en": "The practices that organizations rely on to identify, assess, and manage risks.","cmt_tr": "Kuruluşların riskleri belirlemek, değerlendirmek ve yönetmek için dayandığı uygulamalar, risk yönetimi sürecinde gerçekleştirilir.","cmt_en": "The practices that organizations rely on to identify, assess, and manage risks are performed in the risk management process."},{"tr": "Önemli risklerin yeterince yönetildiğine dair makul güvence sağlamaya yönelik katılımcı ve entegre yaklaşım.","en": "The participative and integrated approach to providing reasonable assurance that risks are adequately managed.","cmt_tr": "Önemli risklerin yeterince yönetildiğine dair makul güvence sağlamaya yönelik katılımcı ve entegre yaklaşım, KRY'nin bir yönü olabilir ancak tam bir tanım değildir.","cmt_en": "A participative and integrated approach to providing reasonable assurance that significant risks are being managed may be an aspect of ERM but it is not a complete description of ERM."},{"tr": "Kuruluşların değer yaratma ve korumada riski yönetmek için dayandığı, stratejik yönetimle entegre kültür ve uygulamalar.","en": "The culture and practices integrated with strategic management that organizations rely on to manage risk in creating and preserving value.","cmt_tr": "COSO KRY Çerçevesine göre, KRY her kuruluşun paydaşlarına değer sağlamak için var olduğu öncülüne dayanır. COSO, KRY'yi \"kuruluşların değer yaratma, koruma ve gerçekleştirmede riski yönetmek için dayandığı, strateji belirleme ve performansla entegre kültür, yetenekler ve uygulamalar\" olarak tanımlar.","cmt_en": "According to the COSO ERM Framework, ERM is based on the premise that every organization exists to provide value for its stakeholders. COSO defines ERM as, “the culture, capabilities, and practices, integrated with strategy-setting and performance, that organizations rely on to manage risk in creating, preserving, and realizing value.”"}],"answer": 3},{"q_tr": "Bir kuruluş, mevcut kredisinin değişken faiz oranının yakın gelecekte önemli ölçüde artacağını belirlemiştir. Bu nedenle, kalan kredi dönemi boyunca sabit bir oranı kilitleyerek değişken oranını hedge etmeye karar vermiştir. COSO KRY çerçevesine göre, bu karar riske verilen hangi yanıttır?","q_en": "An organization determined that its variable interest rate on an existing loan will increase significantly in the near future. It therefore decided to hedge its variable rate by locking in a fixed rate over the remaining loan period. According to the COSO ERM framework, this decision is which response to risk?","options": [{"tr": "Azaltma.","en": "Reduction.","cmt_tr": "Azaltma, riskin bir kısmını aktarmadan riskin ciddiyetini düşürür.","cmt_en": "Reduction lowers the severity of the risk without transferring a portion of the risk."},{"tr": "Kabul.","en": "Acceptance.","cmt_tr": "Kabul, riskin ciddiyetini değiştirmek için hiçbir eylem yapmaz.","cmt_en": "Acceptance takes no action to alter the severity of the risk."},{"tr": "Paylaşma.","en": "Sharing.","cmt_tr": "Paylaşma, riskin bir kısmını başka bir tarafa aktararak riskin ciddiyetini azaltır. Örnekler: sigorta; hedging; ortak girişimler; dış kaynak kullanımı ve müşteriler, satıcılar veya diğer iş ortaklarıyla yapılan sözleşmeler.","cmt_en": "Sharing reduces the severity of the risk by transferring some risk to another party. Examples are"},{"tr": "Kaçınma.","en": "Avoidance.","cmt_tr": "Kaçınma, riski ortadan kaldırmak için yapılan eylemdir. Değişken faiz oranı riskini ortadan kaldırmak için bir eylem, krediyi ödemektir, örneğin hedging değil sabit oranlı yeniden finansman.","cmt_en": "Avoidance is action to remove the risk. An action to remove variable interest rate risk is to pay the loan, for example, by refinancing (not hedging) at a fixed rate."}],"answer": 2},{"q_tr": "Bir kuruluş, COSO KRY çerçevesinin hangi bileşeninde risk iştahını tanımlar?","q_en": "An entity defines its risk appetite in which component of the COSO ERM framework?","options": [{"tr": "Performans.","en": "Performance.","cmt_tr": "Risk iştahı kavramı performans bileşeninde uygulanmakla birlikte, strateji ve hedef belirleme bileşeninde tanımlanır.","cmt_en": "Although the risk appetite concept is applied in the performance component, it is defined in the strategy and objective-setting component."},{"tr": "Strateji ve hedef belirleme.","en": "Strategy and objective-setting.","cmt_tr": "Kuruluş, KRY'nin strateji ve hedef belirleme bileşeninde risk iştahını tanımlar. Risk iştahını tanımlarken kuruluş, misyonunu, vizyonunu, kültürünü, önceki stratejilerini ve risk kapasitesini dikkate alır.","cmt_en": "The entity defines risk appetite in the strategy and objective-setting component of ERM. In defining risk appetite, the entity considers its mission, vision, culture, prior strategies, and risk capacity."},{"tr": "Yönetişim ve kültür.","en": "Governance and culture.","cmt_tr": "Kuruluş, KRY'nin strateji ve hedef belirleme bileşeninde risk iştahını tanımlar. Yönetişim ve kültür bileşeni, tüm bileşenlerin temelidir.","cmt_en": "The entity defines its risk appetite in the strategy and objective-setting component of ERM. The governance and culture component is the basis for all of the components."},{"tr": "Kontrol ortamı.","en": "Control environment.","cmt_tr": "Kontrol ortamı, KRY çerçevesinin değil, COSO iç kontrol çerçevesinin bir bileşenidir.","cmt_en": "The control environment is a component of the COSO internal control framework, not the ERM framework."}],"answer": 1},{"q_tr": "Bankalar müşterilerine mutabakat tabloları sağlar. Müşterilerin perspektifinden, bu uygulama nakitle ilişkili riskleri yönetmenin hangi yöntemidir?","q_en": "Banks provide reconciliation statements to their clients. From the clients’ perspective, this practice is a form of which method of managing risks associated with cash?","options": [{"tr": "Azaltma.","en": "Reduction.","cmt_tr": "Risk yanıtları kaçınma, kabul, paylaşma, izleme ve azaltmayı içerebilir. Banka mutabakatlarını kullanarak işletmeler hırsızlık ve zimmete geçirme riskini azaltabilir.","cmt_en": "Risk responses may include avoidance, acceptance, sharing, pursuit, and reduction. By using bank reconciliations, businesses can reduce the risk of theft and misappropriation."},{"tr": "Kabul.","en": "Accepting.","cmt_tr": "Banka mutabakatı kullanmak, nakit hırsızlığıyla ilişkili riski kabul etmez, azaltır.","cmt_en": "Using a bank reconciliation reduces, but does not accept, the risk associated with theft of cash."},{"tr": "Transfer.","en": "Transferring.","cmt_tr": "Risk başka bir tarafa transfer edilmez. Hırsızlık riski bankaya transfer edilmez.","cmt_en": "Risk is not transferred to anyone else. The risk of theft is not being transferred to the bank."},{"tr": "Kaçınma.","en": "Avoiding.","cmt_tr": "Banka mutabakatı kullanılarak hırsızlık riskinden kaçınılmaz.","cmt_en": "The risk of theft is not avoided through use of a bank reconciliation."}],"answer": 0},{"q_tr": "Aşağıdakilerden hangileri COSO KRY çerçevesinin destekleyici yön bileşenleridir?","q_en": "Which of the following components are supporting aspects of the COSO ERM framework?","options": [{"tr": "Yönetişim ve kültür; gözden geçirme ve revizyon.","en": "Governance and culture; review and revision.","cmt_tr": "Gözden geçirme ve revizyon, COSO KRY çerçevesinin ortak süreç bileşenidir.","cmt_en": "Review and revision is a common process component of the COSO ERM framework."},{"tr": "Performans; gözden geçirme ve revizyon.","en": "Performance; review and revision.","cmt_tr": "Performans ve gözden geçirme ve revizyon, COSO KRY çerçevesinin ortak süreç bileşenleridir.","cmt_en": "Performance and review and revision are common process components of the COSO ERM framework."},{"tr": "Yönetişim ve kültür; bilgi, iletişim ve raporlama.","en": "Governance and culture; information, communication, and reporting.","cmt_tr": "COSO KRY çerçevesinin destekleyici yön bileşenleri (1) yönetişim ve kültür ile (2) bilgi, iletişim ve raporlamadır.","cmt_en": "The supporting aspect components of the COSO ERM framework are (1) governance and culture and (2) information, communication, and reporting."},{"tr": "Strateji ve hedef belirleme; performans.","en": "Strategy and objective-setting; performance.","cmt_tr": "Strateji ve hedef belirleme ile performans, COSO KRY çerçevesinin ortak süreç bileşenleridir.","cmt_en": "Strategy and objective-setting and performance are common process components of the COSO ERM framework."}],"answer": 2},{"q_tr": "COSO KRY çerçevesinin performans bileşeni, bir kuruluşun aşağıdakilerden hangisini ele alır?","q_en": "The performance component of the COSO ERM framework addresses an entity’s","options": [{"tr": "Performans hedefleri ve toleransları.","en": "Performance targets and tolerances.","cmt_tr": "İş hedeflerinin formülasyonu, strateji ve hedef belirleme bileşeni içindeki bir risk yönetimi ilkesidir. Performans ölçütleri, hedefler ve toleransların belirlenmesini içerir.","cmt_en": "Formulation of business objectives is a risk management principle within the strategy and objective-setting component. It includes the establishment of performance measures, targets, and tolerances."},{"tr": "Performans sonuçları ve risk değerlendirmesi.","en": "Performance results and consideration of risks.","cmt_tr": "Kuruluş performans sonuçlarının gözden geçirilmesi ve riskin dikkate alınması, gözden geçirme ve revizyon bileşeni içindeki bir risk yönetimi ilkesidir.","cmt_en": "Review of entity performance results and consideration of risk is a risk management principle within the review and revision component."},{"tr": "Risk belirleme, değerlendirme ve önceliklendirme yöntemleri.","en": "Risk identification, assessment, and prioritization methods.","cmt_tr": "Performans bileşeni (1) risk belirleme, değerlendirme ve önceliklendirme; (2) risk yanıtları; ve (3) portföy risk görünümünün geliştirilmesini ele alır.","cmt_en": "The performance component addresses (1) risk identification, assessment, and prioritization; (2) risk responses; and (3) the development of a portfolio view of risk."},{"tr": "Teknolojiden yararlanma yeteneği.","en": "Ability to leverage technology.","cmt_tr": "Bilgi, iletişim ve raporlama bileşeni, bilgi ve teknolojiden yararlanmayı ele alır.","cmt_en": "The information, communication, and reporting component addresses the leveraging of information and technology."}],"answer": 2},{"q_tr": "COSO KRY çerçevesine göre, yönetişim ve kültür bileşeninin temel unsurlarından hangisidir?","q_en": "According to the COSO ERM framework, which of the following is an essential element of the governance and culture component?","options": [{"tr": "İnsan sermayesi.","en": "Human capital.","cmt_tr": "Yönetişim ve kültür bileşeni içindeki bir ilke, kuruluşun yetenekli bireyleri çekmesi, geliştirmesi ve elde tutmasıdır.","cmt_en": "A principle within the governance and culture component is that the organization attract, develop, and retain capable individuals."},{"tr": "Risk ve kültür raporları.","en": "Reports on risk and culture.","cmt_tr": "Risk, kültür ve performans hakkında raporlama, bilgi, iletişim ve raporlama bileşeni içindeki bir ilkedir.","cmt_en": "Reporting on risk, culture, and performance is a principle within the information, communication, and reporting component."},{"tr": "Bilgi sistemleri.","en": "Information systems.","cmt_tr": "Bilgi ve teknolojiden yararlanma, bilgi, iletişim ve raporlama bileşeni içindeki bir ilkedir.","cmt_en": "Leveraging information and technology is a principle within the information, communication, and reporting component."},{"tr": "Risk yanıtları.","en": "Risk responses.","cmt_tr": "Risk yanıtlarının uygulanması, performans bileşeni içindeki bir ilkedir.","cmt_en": "Implementing risk responses is a principle within the performance component."}],"answer": 0},{"q_tr": "COSO KRY çerçevesine göre, iş bağlamıyla ilgili riskin özelliği aşağıdakilerden hangisidir?","q_en": "According to the COSO ERM framework, the characteristic of risk related to the business context is","options": [{"tr": "Ciddiyet.","en": "Severity.","cmt_tr": "Yaygın ciddiyet ölçütleri, riskin etkisi ve olasılığının birleşimleridir.","cmt_en": "Common measures of severity are combinations of a risk’s impact and likelihood."},{"tr": "Hız.","en": "Velocity.","cmt_tr": "Hız, riskin kuruluşu etkileme hızıdır.","cmt_en": "Velocity is the speed at which a risk affects the entity."},{"tr": "Kalıcılık.","en": "Persistence.","cmt_tr": "Kalıcılık, riskin kuruluşu ne kadar süre etkilediğidir; kuruluşun toparlanması için gereken süre dahil.","cmt_en": "Persistence is how long a risk affects an entity, including the time it takes the entity to recover."},{"tr": "Karmaşıklık.","en": "Complexity.","cmt_tr": "İş bağlamı, kuruluşun stratejisini ve iş hedeflerini etkileyen ilişkiler, olaylar, eğilimler ve diğer faktörlerle ilgilidir. İş bağlamı dinamik, öngörülemez ve karmaşık olabilir. Bir bağlam, birçok karşılıklı bağımlılık ve bağlantı varsa karmaşık olabilir.","cmt_en": "Business context pertains to the relationships, events, trends, and other factors that influence the organization’s strategy and business objectives. Accordingly, business context includes the organization’s internal and external environments. Business context may be dynamic, unpredictable, and complex. A context may be complex if it has many interdependencies and interconnections. For example, a transnational company’s context has complexity because it has several operating units around the world, each with unique external environmental factors."}],"answer": 3},{"q_tr": "Aşağıdakilerden hangisi, COSO KRY çerçevesinin gözden geçirme ve revizyon bileşeniyle ilgili bir ilkedir?","q_en": "Which of the following is a principle related to the review and revision component of the COSO ERM framework?","options": [{"tr": "Kuruluş alternatif stratejileri ve risk profili üzerindeki etkilerini değerlendirir.","en": "The organization evaluates alternative strategies and their effects on the risk profile.","cmt_tr": "Bu, strateji ve hedef belirleme bileşeniyle ilgili dört ilkeden biridir.","cmt_en": "“The organization evaluates alternative strategies and their effects on the risk profile” is one of the four principles related to the strategy and objectives setting component of the COSO ERM framework."},{"tr": "Kuruluş portföy risk görünümünü geliştirir ve değerlendirir.","en": "The organization develops and evaluates its portfolio view of risk.","cmt_tr": "Bu, performans bileşeniyle ilgili beş ilkeden biridir.","cmt_en": "“The organization develops and evaluates its portfolio view of risk” is one of the five principles related to the performance component of the COSO ERM framework."},{"tr": "Kuruluş riskin ciddiyetini değerlendirir.","en": "The organization assesses the severity of risk.","cmt_tr": "Bu, performans bileşeniyle ilgili beş ilkeden biridir.","cmt_en": "“The organization assesses the severity of risk” is one of the five principles related to the performance component of the COSO ERM framework."},{"tr": "Kuruluş, strateji ve iş hedeflerini önemli ölçüde etkileyebilecek değişiklikleri belirler ve değerlendirir.","en": "The organization identifies and assesses changes that may substantially affect strategy and business objectives.","cmt_tr": "Bu, gözden geçirme ve revizyon bileşeniyle ilgili üç ilkeden biridir. Gözden geçirme ve revizyon bileşeniyle ilgili üç ilke: kuruluş (1) strateji ve iş hedeflerini önemli ölçüde etkileyebilecek değişiklikleri belirler ve değerlendirir, (2) kuruluş performans sonuçlarını gözden geçirir ve riski dikkate alır ve (3) KRY'nin iyileştirilmesini takip eder.","cmt_en": "“The organization identifies and assesses changes that may substantially affect strategy and business objectives” is one of the three principles related to the review and revision component of the COSO ERM framework. Changes in the organization’s business context and culture are most likely to substantially affect strategy and business objectives. Such changes may result from changes in the organization’s internal or external environment. The three principles related to the review and revision component of the COSO ERM framework are the organization (1) identifies and assesses changes that may substantially affect strategy and business objectives, (2) reviews entity performance results and considers risk, and (3) pursues improvement of ERM."}],"answer": 3},{"q_tr": "COSO KRY çerçevesine göre, bir iş bağlamı aşağıdakilerden hangisi olabilir?","q_en": "According to the COSO ERM framework, a business context may be","options": [{"tr": "Ölçülebilir.","en": "Measurable.","cmt_tr": "COSO KRY çerçevesine göre, iş hedeflerinin bir özelliği ölçülebilir olmalarıdır.","cmt_en": "According to the COSO ERM framework, a characteristic of business objectives is that they are measurable."},{"tr": "Dinamik.","en": "Dynamic.","cmt_tr": "İş bağlamları dinamik, karmaşık veya öngörülemez olabilir. Dinamik bir iş bağlamında, yeni, ortaya çıkan ve değişen riskler her an görünebilir.","cmt_en": "Business contexts may be dynamic, complex, or unpredictable. In a dynamic business context, new, emerging, and changing risks can appear at any time."},{"tr": "Spesifik.","en": "Specific.","cmt_tr": "COSO KRY çerçevesine göre, iş hedeflerinin bir özelliği spesifik olmalarıdır.","cmt_en": "According to the COSO ERM framework, a characteristic of business objectives is that they are specific."},{"tr": "Gözlemlenebilir.","en": "Observable.","cmt_tr": "COSO KRY çerçevesine göre, iş hedeflerinin bir özelliği gözlemlenebilir olmalarıdır.","cmt_en": "According to the COSO ERM framework, a characteristic of business objectives is that they are observable."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangisi, COSO KRY çerçevesinin bilgi, iletişim ve raporlama bileşeniyle ilgili bir ilkedir?","q_en": "Which of the following is a principle related to the information, communication, and reporting component of the COSO ERM framework?","options": [{"tr": "Kuruluş, KRY'nin faaliyetlerini aksatan riskleri belirler.","en": "The organization identifies risks that disrupt operations of the ERM.","cmt_tr": "Performans bileşeniyle ilgili bir ilke, kuruluşun faaliyetleri aksatan ve strateji ile iş hedeflerine ulaşma beklentisini etkileyen riskleri belirlemesidir.","cmt_en": "A principle related to the performance component is that the “organization identifies risks that disrupt operations and affect the reasonable expectation of achieving strategy and business objectives.”"},{"tr": "Kuruluş portföy risk görünümünü geliştirir ve değerlendirir.","en": "The organization develops and evaluates its portfolio view of risk.","cmt_tr": "Portföy risk görünümünün geliştirilmesi ve değerlendirilmesi, performans bileşeniyle ilgili bir ilkedir.","cmt_en": "“The organization develops and evaluates its portfolio view of risk” is a principle related to the performance component."},{"tr": "Kuruluş, kuruluş performans sonuçlarını gözden geçirir ve riski dikkate alır.","en": "The organization reviews entity performance results and considers risk.","cmt_tr": "Bu, gözden geçirme ve revizyon bileşeniyle ilgili bir ilkedir.","cmt_en": "“The organization reviews entity performance results and considers risk” is a principle related to the review and revision component."},{"tr": "Kuruluş, birden çok düzeyde ve kuruluş genelinde risk, kültür ve performans hakkında raporlama yapar.","en": "The organization reports on risk, culture, and performance at multiple levels and across the entity.","cmt_tr": "Birden çok düzeyde ve kuruluş genelinde risk, kültür ve performans hakkında raporlama yapmak, bilgi, iletişim ve raporlama bileşeniyle ilgili bir ilkedir.","cmt_en": "Reporting on risk, culture, and performance at multiple levels and across the entity is a principle related to the information, communication, and reporting component. The purpose of reporting is to support personnel in their (1) understanding of the relationships among risk, culture, and performance and (2) decision making related to setting strategy and objectives, governance, and day-to-day operations. The three principles related to the information, communication, and reporting component are that the organization (1) leverages its information systems to support ERM; (2) uses communication channels to support ERM; and (3) reports on risk, culture, and performance at multiple levels and across the entity."}],"answer": 3},{"q_tr": "Aşağıdakilerden hangisi COSO KRY çerçevesinin strateji ve hedef belirleme bileşeni üzerinde en büyük etkiye sahiptir?","q_en": "Which of the following has the greatest effect on the strategy and objective-setting component of the COSO ERM framework?","options": [{"tr": "Hedef performanstan sapan performans sonuçları.","en": "Performance results that deviate from target performance.","cmt_tr": "Hedef performans veya toleranstan sapan performans sonuçları, belirlenmemiş riskleri, yanlış değerlendirilmiş riskleri, yeni riskleri, daha fazla risk kabul etme fırsatlarını veya hedef performans veya toleransı revize etme ihtiyacını gösterebilir. Bu faktör, gözden geçirme ve revizyon bileşeniyle ilgilidir.","cmt_en": "Performance results that deviate from target performance or tolerance may indicate unidentified risks, improperly assessed risks, new risks, opportunities to accept more risk, or the need to revise target performance or tolerance. This factor relates to the review and revision component."},{"tr": "Sektör emsalleri incelemeleri ve emsal karşılaştırmaları.","en": "Reviews of industry peers and peer comparisons.","cmt_tr": "KRY'nin iyileştirilmesi için alanları belirleme yöntemleri arasında sürekli veya ayrı değerlendirmeler, emsal karşılaştırmaları ve sektör emsalleri incelemeleri bulunur. Bu faktör, gözden geçirme ve revizyon bileşeniyle ilgilidir.","cmt_en": "Methods of identifying areas for improvement of ERM include continual or separate evaluations, peer comparisons, and reviews of industry peers. This factor relates to the review and revision component."},{"tr": "Yükümlülüklere uyum ve beklentilerin karşılanması.","en": "Compliance with obligations and achievement of expectations.","cmt_tr": "Yükümlülüklere uyum ve beklentilerin karşılanması, risk yanıtlarının seçilmesi ve uygulanmasında dikkate alınacak faktörlerden biridir. Bu faktör, performans bileşeniyle ilgilidir.","cmt_en": "Compliance with obligations and achievement of expectations is one of the factors to be considered in selecting and implementing risk responses. This factor relates to the performance component."},{"tr": "Kuruluşun iş bağlamındaki değişiklikler.","en": "Changes in the organization’s business context.","cmt_tr": "COSO KRY çerçevesinin strateji ve hedef belirleme bileşeniyle ilgili bir ilke, kuruluşun iş bağlamını ve risk profili üzerindeki etkisini analiz etmesidir. Bu nedenle, iş bağlamındaki değişiklikler strateji ve hedef belirleme bileşeni üzerinde en büyük etkiye sahiptir.","cmt_en": "A principle related to the strategy and objective-setting component of the COSO ERM framework is that the organization analyzes business context and its effect on the risk profile. Thus, changes in the business context have the greatest effect on the strategy and objective- setting component."}],"answer": 3},{"q_tr": "Hangi risk yanıtı, kabulden paylaşmaya bir değişikliği yansıtır?","q_en": "Which risk response reflects a change from acceptance to sharing?","options": [{"tr": "Bir üretim tesisindeki sigorta poliçesi yenilenmemiştir.","en": "An insurance policy on a manufacturing plant was not renewed.","cmt_tr": "Sigortanın yenilenmemesi, risk paylaşmadan risk kabulüne bir değişikliği temsil eder.","cmt_en": "Not renewing insurance represents a change from risk sharing to risk acceptance."},{"tr": "Yönetim, daha önce sigortalanmamış mülk üzerinde sigorta satın almıştır.","en": "Management purchased insurance on previously uninsured property.","cmt_tr": "COSO KRY modeli kapsamında risk yanıtı kategorileri kaçınma, benimseme (kabul), azaltma, paylaşma ve izlemedir. Yönetim bir binayı sigortalamıyorsa, yanıt kabuldür. Ancak yönetim sigorta satın aldığında, risk dış bir tarafla paylaşılır.","cmt_en": "The categories of risk responses under the COSO ERM model are avoidance, retention (acceptance), reduction, sharing, and exploitation. If management does not insure a building, the response is acceptance. Ordinarily, acceptance is based on a judgment that the cost of another response is excessive. However, once management purchases insurance, the risk is shared with an outside party."},{"tr": "Yönetim bir üretim tesisini satmıştır.","en": "Management sold a manufacturing plant.","cmt_tr": "Mülk satmak, sahipliğin tüm risklerinden kaçınır.","cmt_en": "Selling property avoids all the risks of ownership."},{"tr": "Çalışanlar çok sayıda envanter kalemi çaldıktan sonra, yönetim tüm çalışanlar için zorunlu geçmiş kontrolleri uygulamıştır.","en": "After employees stole numerous inventory items, management implemented mandatory background checks on all employees.","cmt_tr": "Yönetim başlangıçta işe alım öncesi soruşturma uygulamayarak çalışan hırsızlığı riskini kabul etmişti. Tüm çalışanlar üzerinde geçmiş kontrolleri yapmak hırsızlık riskini azaltır.","cmt_en": "Management originally accepted the risk of employee theft by not implementing pre-hire investigation. Conducting background checks on all employees reduces the risk of theft."}],"answer": 1},{"q_tr": "Birçok kuruluş, çek düzenlemek yerine tedarikçilerine ödeme yapmak için elektronik fon transferi kullanmaktadır. Çek düzenlemeyle ilişkili riskler açısından, bu aşağıdaki risk yönetimi tekniklerinden hangisini temsil eder?","q_en": "Many organizations use electronic funds transfer to pay their suppliers instead of issuing checks. Regarding the risks associated with issuing checks, which of the following risk management techniques does this represent?","options": [{"tr": "Kontrol etme.","en": "Controlling.","cmt_tr": "Çeklerin kaldırılması süregelen bir kontrolü temsil etmez.","cmt_en": "Eliminating checks does not represent an ongoing control."},{"tr": "Kabul etme.","en": "Accepting.","cmt_tr": "Çeklerin kaldırılması, ilişkili riski kabul etmek yerine kaçınır.","cmt_en": "Eliminating checks avoids instead of accepts the associated risk."},{"tr": "Transfer etme.","en": "Transferring.","cmt_tr": "Çeklerin kaldırılması riski başka bir tarafa transfer etmez. Risk ortadan kaldırılır.","cmt_en": "Eliminating checks does not transfer risk to anyone else. Risk is eliminated."},{"tr": "Kaçınma.","en": "Avoiding.","cmt_tr": "Risk yanıtları kaçınma, kabul, paylaşma ve azaltmayı içerebilir. Çekleri kaldırarak kuruluş, bunlarla ilişkili tüm risklerden kaçınır.","cmt_en": "Risk responses may include avoidance, acceptance, sharing, and reduction. By eliminating checks, the organization avoids all risk associated with them."}],"answer": 3},{"q_tr": "Aşağıdakilerden hangisi bir risk kaçınma stratejisini temsil eder?","q_en": "Which of the following represents a risk avoidance strategy?","options": [{"tr": "Şirket, yüksek yaralanma sayısı nedeniyle inşaat sektöründen çıkmaya karar vermiştir.","en": "The company has elected to exit the construction industry due to the high number of injuries.","cmt_tr": "Risk kaçınması, riskin kaynağı olan faaliyeti sonlandırır. Sektörden çıkmak, inşaat yaralanmaları riskinden kaçınır.","cmt_en": "Risk avoidance ends the activity from which the risk arises. Exiting the industry avoids the risk of construction injuries."},{"tr": "Yönetim kurulu, yüksek maliyetler nedeniyle işletmenin teslimat bölümünü dış kaynak olarak vermeyi kabul etmiştir.","en": "The board has agreed to outsource the delivery segment of the business because of the high costs.","cmt_tr": "Dış kaynak kullanımı riskleri paylaşır. Risk paylaşma, bazı kayıp potansiyelini başka bir tarafa aktarır.","cmt_en": "Outsourcing shares risks. Risk sharing transfers some loss potential to another party. Other examples are insurance, hedging, and entering into joint ventures."},{"tr": "Yeni yönetici, belirlenen riskleri takip etme sorumluluğuyla görevlendirilmiştir.","en": "The new manager has been tasked with the responsibility of tracking identified risks.","cmt_tr": "Belirlenen riskleri takip etmek, risk izlemedir.","cmt_en": "Tracking identified risks is risk monitoring. Risk monitoring also (1) evaluates current risk response plans, (2) monitors residual risks, and (3) identifies new risks."},{"tr": "Geliri artırmak için satış personeline yeni ürünler konusunda eğitim vermek.","en": "Providing training on new products for sales personnel to increase revenue.","cmt_tr": "Eğitim riski azaltır (hafifletme). Risk azaltma, bir faaliyetle ilişkili risk düzeyini düşürür.","cmt_en": "Training reduces risk (mitigation). Risk reduction lowers the level of risk associated with an activity. For example, providing training to sales personnel for new products reduces the risk of decreased revenues due to lack of product knowledge."}],"answer": 0},{"q_tr": "Şirket, depo ekipmanlarının onarımları için bir fon bulundurmaktadır. Şirket hangi risk yanıt stratejisini kullanmaktadır?","q_en": "The company maintains a fund to pay for repairs to warehouse equipment. Which risk response strategy is the company using?","options": [{"tr": "Risk kaçınması.","en": "Risk avoidance.","cmt_tr": "Risk kaçınması, riskin kaynağı olan faaliyeti sonlandırır. Ancak şirket hâlâ ekipman onarımı riskine maruz kalmaktadır.","cmt_en": "Risk avoidance ends the activity from which the risk arises. However, the company is still exposed to the risk of equipment repairs."},{"tr": "Risk benimsemesi.","en": "Risk retention.","cmt_tr": "Risk benimsemesi, bir faaliyetin riskini kabul eder ve kendi kendini sigortalama ile eş anlamlıdır. Şirket, onarımların bedelini ödemek için bir tür kendi kendini sigortalama (şirket fonu) kullanarak ekipman onarımı riskini kabul eder.","cmt_en": "Risk retention accepts the risk of an activity and is synonymous with self-insurance. The company accepts the risk of equipment repairs by using a form of self-insurance (a company fund) to pay for repairs."},{"tr": "Risk azaltma.","en": "Risk reduction.","cmt_tr": "Risk azaltma (hafifletme), bir faaliyetle ilişkili risk düzeyini düşürür. Ancak şirket hâlâ aynı risk düzeyine maruz kalmaktadır.","cmt_en": "Risk reduction (mitigation) lowers the level of risk associated with an activity. However, the company is still exposed to the same level of risk."},{"tr": "Risk paylaşma.","en": "Risk sharing.","cmt_tr": "Risk paylaşma, bazı kayıp potansiyelini başka bir tarafa aktarır, örneğin bir sigorta poliçesi yaptırmak. Ancak şirket riski yönetmek için bir tür kendi kendini sigortalama kullanmaktadır.","cmt_en": "Risk sharing transfers some loss potential to another party, for example, having an insurance policy. However, the company is using a form of self-insurance to manage the risk."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangileri COSO KRY çerçevesinin ortak süreç bileşenleridir?","q_en": "Which of the following are common process components of the COSO ERM framework?","options": [{"tr": "Yönetişim ve kültür; performans.","en": "Governance and culture; performance.","cmt_tr": "Yönetişim ve kültür, COSO KRY çerçevesinin destekleyici yön bileşenidir.","cmt_en": "Governance and culture is a supporting aspect component of the COSO ERM framework."},{"tr": "Performans; gözden geçirme ve revizyon.","en": "Performance; review and revision.","cmt_tr": "COSO KRY çerçevesinin ortak süreç bileşenleri (1) strateji ve hedef belirleme, (2) performans ve (3) gözden geçirme ve revizyondur.","cmt_en": "The common process components of the COSO ERM framework are (1) strategy and objective- setting, (2) performance, and (3) review and revision."},{"tr": "Bilgi, iletişim ve raporlama; strateji ve hedef belirleme.","en": "Information, communication, and reporting; strategy and objective-setting.","cmt_tr": "Bilgi, iletişim ve raporlama, COSO KRY çerçevesinin destekleyici yön bileşenidir.","cmt_en": "Information, communication, and reporting is a supporting aspect component of the COSO ERM framework."},{"tr": "Gözden geçirme ve revizyon; yönetişim ve kültür.","en": "Review and revision; governance and culture.","cmt_tr": "Yönetişim ve kültür, COSO KRY çerçevesinin destekleyici yön bileşenidir.","cmt_en": "Governance and culture is a supporting aspect component of the COSO ERM framework."}],"answer": 1},{"q_tr": "Bir şirket, kur riskine yanıt olarak döviz vadeli işlemleri satın almaktadır. Ancak artan döviz kuru dalgalanmaları nedeniyle şirket, yabancı ortaklarla ticaret yapmamaya karar vermiştir. Aşağıdakilerden hangisi bu risk yanıtı değişikliğini tanımlar?","q_en": "A company purchases currency futures to respond to currency risk. However, due to increasing exchange rate fluctuations, the company has decided not to trade with foreign partners. Which of the following describes this change in risk response?","options": [{"tr": "Transferden hafifletmeye.","en": "Transfer to mitigation.","cmt_tr": "Hafifletme, riskin ciddiyetini hedeflenen artık risk profili ve risk iştahı dahilinde olacak şekilde azaltmak için alınan eylemdir. Yabancı ortaklarla ticareti durdurmak hafifletme değil, kaçınmadır.","cmt_en": "Mitigation is action to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. Cessation of trading with foreign partners is avoidance, not mitigation."},{"tr": "Azaltmadan kaçınmaya.","en": "Reduction to avoidance.","cmt_tr": "Azaltma, riskin ciddiyetini hedeflenen artık risk profili ve risk iştahı dahilinde olacak şekilde düşüren eylemdir. Döviz vadeli işlemleri satın almak azaltma değil, risk transferidir (paylaşma).","cmt_en": "Reduction is action to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. Purchasing currency futures is risk transfer (sharing), not reduction."},{"tr": "Paylaşmadan kaçınmaya.","en": "Sharing to avoidance.","cmt_tr": "Paylaşma (transfer), riskin bir kısmını başka bir tarafa aktararak riskin ciddiyetini azaltmak için alınan eylemdir. Dolayısıyla, döviz vadeli işlemleri satın almak riski dış bir tarafla paylaşır. Kaçınma, riski ortadan kaldırmak için alınan eylemdir. Yabancı ortaklarla ticareti durdurmak kur riskini ortadan kaldırır ve bu nedenle kaçınmadır.","cmt_en": "Sharing (transfer) is action to reduce the severity of the risk by transferring a portion of the risk to another party. Examples are insurance; hedging; joint ventures; outsourcing; and contractual agreements with customers, vendors, or other business partners. Thus, purchasing currency futures shares the risk with an outside party. Avoidance is action to remove the risk. Avoidance typically suggests no response would reduce the risk to an acceptable level. Cessation of trading with foreign partners removes the currency risk and is therefore avoidance."},{"tr": "Kabulden azaltmaya.","en": "Acceptance to reduction.","cmt_tr": "Kabul, riskin ciddiyetini değiştirmek için hiçbir eylem yapılmaması anlamına gelir. Şirket döviz vadeli işlemleri satın alarak riski kabul etmemiş, paylaşmıştır.","cmt_en": "Acceptance means no action is taken to alter the severity of the risk. The company shared and did not accept the risk by purchasing currency futures. Reduction is action to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. The company avoided and did not merely reduce the risk by cessation of trading with foreign partners."}],"answer": 2},{"q_tr": "Aşağıdakilerden hangisi bir risk yanıt stratejisi kategorisidir?","q_en": "Which of the following is a category of risk response strategies?","options": [{"tr": "Kabul.","en": "Acceptance.","cmt_tr": "Kabul (veya benimseme), riskin ciddiyetini değiştirmek için hiçbir eylem yapmaz. Risk, risk iştahı dahilinde olduğunda uygundur.","cmt_en": "Acceptance (or retention) takes no action to alter the severity of the risk. It is appropriate when the risk is within the risk appetite."},{"tr": "Değerlendirme.","en": "Assessment.","cmt_tr": "Risk yanıtı kategorileri (1) kabul (benimseme), (2) kaçınma, (3) izleme, (4) azaltma (hafifletme) ve (5) paylaşmadır (transfer). Dolayısıyla, değerlendirme bir risk yanıtı kategorisi değildir.","cmt_en": "The categories of risk responses are (1) acceptance (retention), (2) avoidance, (3) pursuit, (4) reduction (mitigation), and (5) sharing (transfer). Accordingly, assessment is not a category of risk responses."},{"tr": "Önceliklendirme.","en": "Prioritization.","cmt_tr": "Risk yanıtı kategorileri (1) kabul (benimseme), (2) kaçınma, (3) izleme, (4) azaltma (hafifletme) ve (5) paylaşmadır (transfer). Dolayısıyla, önceliklendirme bir risk yanıtı kategorisi değildir.","cmt_en": "The categories of risk responses are (1) acceptance (retention), (2) avoidance, (3) pursuit, (4) reduction (mitigation), and (5) sharing (transfer). Accordingly, prioritization is not a category of risk responses."},{"tr": "Uyum.","en": "Compliance.","cmt_tr": "Risk yanıtı kategorileri (1) kabul (benimseme), (2) kaçınma, (3) izleme, (4) azaltma (hafifletme) ve (5) paylaşmadır (transfer). Dolayısıyla, uyum bir risk yanıtı kategorisi değildir.","cmt_en": "The categories of risk responses are (1) acceptance (retention), (2) avoidance, (3) pursuit, (4) reduction (mitigation), and (5) sharing (transfer). Accordingly, compliance is not a category of risk responses."}],"answer": 0},{"q_tr": "Bir kuruluş bir bilgi güvenliği fonksiyonu sürdürmektedir. Hizmeti sağlamak üzere bir güvenlik uzmanıyla sözleşme yaptığında, risk yanıtındaki değişiklik ne olmuştur?","q_en": "An organization maintains an information security function. When it contracted with a security specialist to provide the service, what was the change in risk response?","options": [{"tr": "Hafifletmeden kaçınmaya.","en": "Mitigation to avoidance.","cmt_tr": "Kaçınma riski ortadan kaldırır. Ancak dış kaynak kullanımı veya sözleşme yoluyla paylaşma riski ortadan kaldırmaz.","cmt_en": "Avoidance removes the risk. However, sharing by outsourcing or contract does not eliminate the risk."},{"tr": "İzlemeden transfere.","en": "Pursuit to transfer.","cmt_tr": "İzleme, kabul edilebilir toleransı aşmadan performansı iyileştirmek için artan riski kabul etmek üzere alınan eylemdir. Ancak kurum içi güvenlik fonksiyonu izleme değil, risk azaltmasıdır.","cmt_en": "Pursuit is action taken to accept increased risk to improve performance without exceeding acceptable tolerance (acceptable variation in performance). However, an in-house security function is reduction, not pursuit, of risk."},{"tr": "Azaltmadan paylaşmaya.","en": "Reduction to sharing.","cmt_tr": "Azaltma (hafifletme), riskin ciddiyetini hedeflenen artık risk profili ve risk iştahı dahilinde olacak şekilde düşürmek için alınan eylemdir. Paylaşma (transfer), riskin bir kısmını başka bir tarafa aktararak riskin ciddiyetini azaltmak için alınan eylemdir. Örnekler: (1) sigorta, (2) hedging, (3) ortak girişimler, (4) dış kaynak kullanımı ve (5) müşteriler, satıcılar veya diğer iş ortaklarıyla yapılan sözleşmeler.","cmt_en": "Reduction (mitigation) is action to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. For example, the risk of systems penetration can be reduced by maintaining an effective information security function within the entity. Sharing (transfer) is action taken to reduce the severity of the risk by transferring a portion of the risk to another party. Examples are (1) insurance; (2) hedging; (3) joint ventures; (4) outsourcing; and (5) contractual agreements with customers, vendors, or other business partners."},{"tr": "Kabulden transfere.","en": "Acceptance to transfer.","cmt_tr": "Kabul (benimseme), riskin ciddiyetini değiştirmek için hiçbir eylem yapmaz. Kabul, risk iştahı dahilinde olduğunda uygundur.","cmt_en": "Acceptance (retention) takes no action to alter the severity of the risk. Acceptance is appropriate when the risk is within the risk appetite. This term is synonymous with self-insurance."}],"answer": 2},{"q_tr": "Risk yanıtlarının seçimindeki faktörler büyük olasılıkla aşağıdakilerden hangisini içerir?","q_en": "Factors in the selection of risk responses most likely include","options": [{"tr": "Hız.","en": "Velocity.","cmt_tr": "Hız, riskin kuruluşu etkileme hızıdır.","cmt_en": "Velocity is the speed at which a risk affects the entity."},{"tr": "Kalıcılık.","en": "Persistence.","cmt_tr": "Kalıcılık, riskin kuruluşu ne kadar süre etkilediğidir; kuruluşun toparlanması için gereken süre dahil.","cmt_en": "Persistence is how long a risk affects the entity, including the time it takes the entity to recover."},{"tr": "Karmaşıklık.","en": "Complexity.","cmt_tr": "Karmaşıklık, riskin doğası ve kapsamıdır, örneğin risklerin karşılıklı bağımlılığı.","cmt_en": "Complexity is the nature and scope of a risk, e.g., interdependence of risks."},{"tr": "Ciddiyet.","en": "Severity.","cmt_tr": "Risk yanıtlarını seçme ve uygulamadaki faktörler şunları içerir: (1) iş bağlamı, (2) maliyetlerin ve faydaların riskin ciddiyeti ve önceliğiyle orantılılığı, (3) yükümlülüklere uyum ve beklentilerin karşılanması, (4) risk iştahı ve tolerans ve (5) risk ciddiyeti.","cmt_en": "Factors in selecting and implementing risk responses include (1) business context, (2) proportionality of costs and benefits to the severity and priority of the risk, (3) furtherance of"}],"answer": 3},{"q_tr": "Aşağıdakilerden hangileri COSO KRY çerçevesinin bir destekleyici yön bileşeninin unsurlarıdır?","q_en": "Which of the following are elements of a supporting aspect component of the COSO ERM framework?","options": [{"tr": "Performans ve revizyon.","en": "Performance and revision.","cmt_tr": "Ortak süreç bileşenleri (1) performans ve (2) gözden geçirme ve revizyonu içerir.","cmt_en": "Common process components include (1) performance and (2) review and revision."},{"tr": "Bilgi ve iletişim.","en": "Information and communication.","cmt_tr": "COSO KRY çerçevesi birbiriyle ilişkili beş bileşenden oluşur. Destekleyici yön bileşenleri (1) yönetişim ve kültür ile (2) bilgi, iletişim ve raporlamadır. Ortak süreç bileşenleri (1) strateji ve hedef belirleme, (2) performans ve (3) gözden geçirme ve revizyondur.","cmt_en": "The COSO ERM framework consists of five interrelated components. The supporting aspect components are (1) governance and culture and (2) information, communication, and reporting. The common process components are (1) strategy and objective setting, (2) performance, and (3) review and revision."},{"tr": "Strateji ve kültür.","en": "Strategy and culture.","cmt_tr": "Strateji ve hedef belirleme ortak süreç bileşenidir; yönetişim ve kültür destekleyici yön bileşenidir.","cmt_en": "Strategy and objective setting is a common process component, and governance and culture is a supporting aspect component."},{"tr": "Hedef belirleme ve gözden geçirme.","en": "Objective setting and review.","cmt_tr": "Ortak süreç bileşenleri strateji ve hedef belirleme ile gözden geçirme ve revizyonu içerir.","cmt_en": "Common process components include strategy and objective setting and review and revision."}],"answer": 1},{"q_tr": "Bir kuruluş 6 ay önce iyileştirilmiş kârlılık beklentisiyle bir bileşeni üretmenin artan riskini kabul etmeye karar vermiştir. O zamandan beri bileşenin üretimini dış kaynağa vermeyi seçmiştir. Bu risk yanıtı değişikliği nedir?","q_en": "An organization decided 6 months ago to accept the increased risk of manufacturing a component with the expectation of improved profitability. It has since chosen to outsource production of the component. This change in risk response is","options": [{"tr": "Kabulden hafifletmeye.","en": "Acceptance to mitigation.","cmt_tr": "Azaltma (hafifletme), riskin ciddiyetini hedeflenen artık risk profili ve risk iştahı dahilinde olacak şekilde düşürmek için alınan eylemdir. Kabul (benimseme), riskin ciddiyetini değiştirmek için hiçbir eylem yapmaz.","cmt_en": "Reduction (mitigation) is action to reduce the severity of the risk so that it is within the target residual risk profile and risk appetite. For example, the risk of systems penetration can be reduced by maintaining an effective information security function within the entity. Acceptance (retention) takes no action to alter the severity of the risk. Acceptance is appropriate when the risk is within the risk appetite. This term is synonymous with self-insurance."},{"tr": "İzlemeden kaçınmaya.","en": "Pursuit to avoidance.","cmt_tr": "Kaçınma, riski ortadan kaldırmak için alınan eylemdir.","cmt_en": "Avoidance is action taken to remove the risk. Avoidance typically suggests no response would reduce the risk to an acceptable level. For example, the risk of pipeline sabotage can be avoided by selling the pipeline."},{"tr": "Transferden paylaşmaya.","en": "Transfer to sharing.","cmt_tr": "Transfer ve paylaşma eş anlamlıdır.","cmt_en": "Transfer and sharing are synonymous."},{"tr": "İzlemeden paylaşmaya.","en": "Pursuit to sharing.","cmt_tr": "İzleme, kabul edilebilir toleransı aşmadan performansı iyileştirmek için artan riski kabul etmek üzere alınan eylemdir. Paylaşma (transfer), riskin bir kısmını başka bir tarafa aktararak riskin ciddiyetini azaltmak için alınan eylemdir. Örnekler: (1) sigorta, (2) hedging, (3) ortak girişimler, (4) dış kaynak kullanımı ve (5) müşteriler, satıcılar veya diğer iş ortaklarıyla yapılan sözleşmeler.","cmt_en": "Pursuit is action taken to accept increased risk to improve performance without exceeding acceptable tolerance (acceptable variation in performance). Sharing (transfer) is action taken to reduce the severity of the risk by transferring a portion of the risk to another party. Examples are (1) insurance; (2) hedging; (3) joint ventures; (4) outsourcing; and (5) contractual agreements with customers, vendors, or other business partners."}],"answer": 3},{"q_tr": "Risk modellemesi veya risk analizi genellikle uzun vadeli görev çalışma programlarının geliştirilmesiyle birlikte kullanılır. Risk değerlendirmesindeki temel girdi nedir?","q_en": "Risk modeling or risk analysis is often used in conjunction with development of long-range engagement work schedules. The key input in the evaluation of risk is","options": [{"tr": "Önceki görev sonuçları.","en": "Previous engagement results.","cmt_tr": "Önceki görev sonuçlarının gösterdiği riskin büyüklüğünü değerlendirmek için iç denetçinin bilgilendirilmiş yargısı hâlâ gereklidir.","cmt_en": "The informed judgment of the internal auditor is still required to assess the magnitude of risk indicated by previous engagement results."},{"tr": "Yönetim kaygıları ve tercihleri.","en": "Management concerns and preferences.","cmt_tr": "Yönetim kaygılarının oluşturduğu riski değerlendirmek için iç denetçinin bilgilendirilmiş yargısı gereklidir.","cmt_en": "To assess the risk posed by management concerns, informed judgment of the internal auditor is required."},{"tr": "Mesleki standartların spesifik gereklilikleri.","en": "Specific requirements of professional standards.","cmt_tr": "Mesleki standartlar, risk analizi için temel girdileri belirtmez.","cmt_en": "Professional standards do not specify the basic inputs for a risk analysis."},{"tr": "İç denetçilerin yargısı.","en": "Judgment of the internal auditors.","cmt_tr": "Bir faaliyetin riskini değerlendirmek, çok sayıda faktörün analizi, olası kayıpların olasılık ve tutarlarının tahmini ve risk azaltmanın maliyet-fayda değerlendirmesini içerir. Dolayısıyla, bir risk modelindeki herhangi bir faktörle ilişkili riskin büyüklüğünü değerlendirmede iç denetçinin mesleki yargısı gereklidir.","cmt_en": "Assessing the risk of an activity entails analysis of numerous factors, estimation of probabilities and amounts of potential losses, and an appraisal of the costs and benefits of risk reduction. Consequently, in assessing the magnitude of risk associated with any factor in a risk model, professional judgment by the internal auditor is required."}],"answer": 3},{"q_tr": "Bir iç denetim yöneticisi aşağıdaki kuruluş genelinde risk haritasını incelemektedir: Sınırlı kaynaklar göz önüne alındığında, aşağıdakilerden hangisi risklerin doğru önceliklendirmesidir?","q_en": "A chief audit executive is reviewing the following enterprise-wide risk map: I LIKELIHOOD M Remote Possible Likely P A Critical Risk C C Major Risk B Risk A T Minor Risk D Which of the following is the correct prioritization of risks, considering limited resources in the internal audit function?","options": [{"tr": "Risk B, Risk C, Risk A, Risk D.","en": "Risk B, Risk C, Risk A, Risk D.","cmt_tr": "Risk C ve A, Risk B'den açıkça önceliklidir. Daha yüksek olasılığa ve/veya daha büyük etkiye sahiptirler.","cmt_en": "Risks C and A clearly take precedence over Risk B. They have a higher likelihood and/or a greater impact."},{"tr": "Risk C, Risk A, Risk D, Risk B.","en": "Risk C, Risk A, Risk D, Risk B.","cmt_tr": "Risk B, Risk D'den açıkça daha yüksek önceliğe sahiptir. Daha yüksek olasılığa ve daha büyük etkiye sahiptir.","cmt_en": "Risk B clearly has a higher priority than Risk D. It has a higher likelihood and a greater impact."},{"tr": "Risk C, Risk A, Risk B, Risk D.","en": "Risk C, Risk A, Risk B, Risk D.","cmt_tr": "Risk, bir olayın gerçekleşme olasılığı ve hedeflere etkisidir. Risk, etki (maruziyetler) ve olasılık (ihtimal) açısından ölçülür. Görevlere kaynak tahsisi kararları, risk ve maruziyet tahminlerinin göreceli önemine dayalı olarak önceliklendirme gerektirir. En iyi öncelik sırası (en yüksekten en düşüğe): (1) Risk C (olası-kritik), (2) Risk A (muhtemel-büyük), (3) Risk B (uzak-büyük), (4) Risk D (uzak-küçük).","cmt_en": "Risk is the possibility of an event’s occurrence that could have an effect on the achievement of objectives. Risk is measured in terms of impact (exposures) and likelihood (probability). Prioritizing is needed to make decisions for applying resources to engagements based on the relative significance of their risk and exposure estimates. The best order of priority listed (highest to lowest) is (1) Risk C (likely-critical), (2) Risk A (possible-major), (3) Risk B (remote-major), and (4) Risk D (remote-minor)."},{"tr": "Risk A, Risk B, Risk C, Risk D.","en": "Risk A, Risk B, Risk C, Risk D.","cmt_tr": "Risk C, Risk A ve B'den daha yüksek olasılığa ve daha büyük etkiye sahiptir.","cmt_en": "Risk C has a higher likelihood and a greater impact than Risks A and B."}],"answer": 2},{"q_tr": "Bir iç denetim yöneticisi aşağıdaki kuruluş genelinde risk haritasını incelemektedir: Sınırlı kaynaklar göz önüne alındığında, aşağıdakilerden hangisi risklerin doğru önceliklendirmesidir?","q_en": "A chief audit executive is reviewing the following enterprise-wide risk map: I LIKELIHOOD M Remote Possible Likely P A Critical Risk A Risk B C Major Risk D T Minor Risk C Which of the following is the correct prioritization of risks, considering limited resources in the internal audit function?","options": [{"tr": "Risk B, Risk C, Risk A, Risk D.","en": "Risk B, Risk C, Risk A, Risk D.","cmt_tr": "Risk D, Risk C'den açıkça önceliklidir. Daha yüksek olasılığa ve daha büyük etkiye sahiptir.","cmt_en": "Risk D clearly takes precedence over Risk C. It has a higher likelihood and a greater impact."},{"tr": "Risk A, Risk B, Risk C, Risk D.","en": "Risk A, Risk B, Risk C, Risk D.","cmt_tr": "Risk B, Risk A'dan açıkça daha yüksek önceliğe sahiptir. Daha yüksek olasılığa ve aynı etkiye sahiptir.","cmt_en": "Risk B clearly has a higher priority than Risk A. It has a higher likelihood and the same impact."},{"tr": "Risk D, Risk B, Risk C, Risk A.","en": "Risk D, Risk B, Risk C, Risk A.","cmt_tr": "Risk, bir olayın gerçekleşme olasılığıdır. Risk, etki ve olasılık açısından ölçülür. En iyi öncelik sırası (en yüksekten en düşüğe): (1) Risk D (olası-büyük), (2) Risk B (muhtemel-kritik), (3) Risk C (muhtemel-küçük) ve (4) Risk A (uzak-kritik).","cmt_en": "Risk is the possibility of an event’s occurrence that could have an impact on the achievement of objectives. Risk is measured in terms of impact (exposures) and likelihood (probability). Prioritizing is needed to make decisions for applying resources to engagements based on the relative significance of their risk and exposure estimates. The best order of priority listed"},{"tr": "Risk B, Risk C, Risk D, Risk A.","en": "Risk B, Risk C, Risk D, Risk A.","cmt_tr": "Risk D, Risk C'den daha yüksek olasılığa ve daha büyük etkiye sahiptir.","cmt_en": "Risk D has a higher likelihood and a greater impact than Risk C."}],"answer": 2},{"q_tr": "Üst yönetim kuruluş içinde aşağıdaki risk alanlarını belirlemiştir: Türev alım satımı: Olasılık yüksek, Etki düşük; Malzeme tedariği: Olasılık düşük, Etki düşük; Küçük kasa: Olasılık yüksek, Etki düşük; Tahvil ihracı: Olasılık düşük, Etki yüksek; Ulaşım filosu: Olasılık yüksek, Etki orta. Belirtilen alanların genel risk maruziyeti açısından aşağıdaki ifadelerden hangisi doğrudur?","q_en": "Senior management has identified the following risk areas within the organization: Derivatives trading: Likelihood high, Impact low Materials acquisition: Likelihood low, Impact low Petty cash: Likelihood high, Impact low Bond issue: Likelihood low, Impact high Transportation fleet: Likelihood high, Impact medium Which of the following is a true statement in terms of overall risk exposure of the areas named?","options": [{"tr": "Türev alım satımı, ulaşım filosundan daha az risk maruziyetine sahiptir.","en": "Derivatives trading has less risk exposure than the transportation fleet.","cmt_tr": "Bu risk alanları aynı olasılığa sahiptir, ancak ulaşım filosu daha yüksek etkiye sahiptir.","cmt_en": "Risk exposure is measured in terms of (1) impact on the achievement of the entity’s objectives and (2) the likelihood (probability) of that impact. In this simple model, no values are assigned to impact and likelihood. Thus, one required assumption is that risk exposures for risk areas with the same impact and likelihood can be established only on the basis of professional judgment using factors not given in the question. A related assumption is needed when one risk area has a high (low) likelihood and a low (high) impact, and a second risk area has the opposite characteristics. In this case, professional judgment based on factors not given also is needed to determine which risk area has the higher risk exposure. A third assumption is that the risk area with the greater likelihood (impact) has a higher risk exposure than a second risk area with the same impact (likelihood). Based on the assumptions, derivatives trading has less risk exposure than the transportation fleet. These risk areas have the same likelihood, but the transportation fleet has a higher impact."},{"tr": "Ulaşım filosu, tahvil ihracından daha az risk maruziyetine sahiptir.","en": "The transportation fleet has less risk exposure than the bond issue.","cmt_tr": "Ulaşım filosunun veya tahvil ihracının daha yüksek risk maruziyetine sahip olup olmadığı belirlenemez. Olasılıkları ve etkileri zıt yönlerde farklılık gösterir.","cmt_en": "Given (1) no values for impact and likelihood and (2) the required assumptions for this simple model, it cannot be determined whether the transportation fleet or the bond issue has the higher risk exposure. Their likelihoods and impacts differ in opposite directions. The transportation fleet has the higher likelihood but the lower impact."},{"tr": "Ulaşım filosu, tahvil ihracından daha fazla risk maruziyetine sahiptir.","en": "The transportation fleet has more risk exposure than the bond issue.","cmt_tr": "Ulaşım filosunun veya tahvil ihracının daha yüksek risk maruziyetine sahip olup olmadığı belirlenemez.","cmt_en": "Given (1) no values for impact and likelihood and (2) the required assumptions for this simple model, it cannot be determined whether the transportation fleet or the bond issue has the higher risk exposure. Their likelihoods and impacts differ in opposite directions. The transportation fleet has the higher likelihood but the lower impact."},{"tr": "Malzeme tedariği, küçük kasadan daha fazla risk maruziyetine sahiptir.","en": "Materials acquisition has more risk exposure than petty cash.","cmt_tr": "Malzeme tedariği, küçük kasadan daha düşük olasılığa ve aynı etkiye sahiptir. Dolayısıyla, küçük kasanın risk maruziyeti daha büyüktür.","cmt_en": "Materials acquisition has a lower likelihood than, and the same impact as, petty cash. Thus, petty cash has the greater risk exposure."}],"answer": 0},{"q_tr": "Üst yönetim kuruluş içinde aşağıdaki risk alanlarını belirlemiştir: Türev alım satımı: Olasılık Yüksek, Etki Yüksek; Malzeme tedariği: Olasılık Düşük, Etki Düşük; Küçük kasa: Olasılık Yüksek, Etki Düşük; Tahvil ihracı: Olasılık Düşük, Etki Yüksek; Ulaşım filosu: Olasılık Yüksek, Etki Orta. Belirtilen alanların genel risk maruziyeti açısından aşağıdaki ifadelerden hangisi doğrudur?","q_en": "Senior management has identified the following risk areas within the organization: Likelihood Effect Derivatives trading High High Materials acquisition Low Low Petty cash High Low Bond issue Low High Transportation fleet High Medium Which of the following is a true statement in terms of overall risk exposure of the areas named?","options": [{"tr": "Tahvil ihracı, küçük kasadan daha risklidir.","en": "The bond issue is riskier than petty cash.","cmt_tr": "Tahvil ihracı ve küçük kasanın ikisi de birer yüksek ve birer düşük risk ölçüsüne sahiptir; yani eşdeğer genel risk maruziyetleri vardır.","cmt_en": "The bond issue and petty cash both have one high risk measure and one low risk measure; i.e., they have equivalent overall risk exposure."},{"tr": "Tahvil ihracı, ulaşım filosundan daha risklidir.","en": "The bond issue is riskier than the transportation fleet.","cmt_tr": "Tahvil ihracının olasılığı düşük, ancak ulaşım filosunun olasılığı yüksektir; dolayısıyla ulaşım filosu daha risklidir.","cmt_en": "The bond issue has a low likelihood, but the transportation fleet has a high likelihood, so the transportation fleet is riskier."},{"tr": "Malzeme tedariği, küçük kasadan daha risklidir.","en": "Materials acquisition is riskier than petty cash.","cmt_tr": "Küçük kasa, malzeme tedariğinden daha risklidir.","cmt_en": "Petty cash is riskier than materials acquisition."},{"tr": "Ulaşım filosu, küçük kasadan daha risklidir.","en": "The transportation fleet is riskier than petty cash.","cmt_tr": "Ulaşım filosu (yüksek, orta), küçük kasadan (yüksek, düşük) daha risklidir.","cmt_en": "The transportation fleet (high, medium) is riskier than petty cash (high, low)."}],"answer": 3},{"q_tr": "Büyük bir kâr amacı gütmeyen kuruluşun iç denetim fonksiyonu, üst yönetimin en son kuruluş genelinde risk değerlendirmesinin sonuçlarını incelemektedir. Yönetimin değerlendirmesine göre, iç denetim yöneticisi iç denetim kaynaklarının çoğunu nereye ayırmalıdır?","q_en": "The internal audit function of a large not-for-profit organization is reviewing the following results of senior management’s latest enterprise-wide risk assessment: Fictitious vendors: Likelihood possible, Impact major Internet intrusion: Likelihood likely, Impact major Executive nepotism: Likelihood remote, Impact critical Fraudulent fundraising: Likelihood possible, Impact minor Based on management’s assessment, where should the chief audit executive devote the most internal audit resources?","options": [{"tr": "Hayali satıcılar.","en": "Fictitious vendors.","cmt_tr": "Hayali satıcıların genel risk maruziyeti, internet sızmasından daha düşüktür.","cmt_en": "Fictitious vendors have a lower overall risk exposure than Internet intrusion."},{"tr": "İnternet sızması.","en": "Internet intrusion.","cmt_tr": "Büyük etki ve olası gerçekleşme birleşimiyle internet sızması en büyük genel risk maruziyetine sahiptir ve bu nedenle sınırlı iç denetim kaynaklarının çoğunu almalıdır.","cmt_en": "With a combination of major impact and likely occurrence, Internet intrusion has the greatest overall risk exposure and thus should receive the majority of limited internal audit resources."},{"tr": "Yönetici kayırmacılığı.","en": "Executive nepotism.","cmt_tr": "Yönetici kayırmacılığının genel risk maruziyeti, internet sızmasından daha düşüktür.","cmt_en": "Executive nepotism has a lower overall risk exposure than Internet intrusion."},{"tr": "Hileli bağış toplama.","en": "Fraudulent fundraising.","cmt_tr": "Hileli bağış toplama, belirlenen dört alanın en düşük genel risk maruziyetine sahiptir.","cmt_en": "Fraudulent fundraising has the lowest overall risk exposure of the four identified areas."}],"answer": 1},{"q_tr": "İç denetim, yaklaşan denetim yılı için aşağıdaki risk haritasını hazırlamıştır. İç denetim yöneticisi iç denetim kaynaklarının çoğunu nereye ayırmalıdır?","q_en": "Internal audit has prepared the following risk map for the upcoming audit year: I LIKELIHOOD M Low Medium High P A High Risk M C Medium Risk N Risk K T Low Risk L Where should the chief audit executive devote the most internal audit resources?","options": [{"tr": "Belirlenen tüm risklere eşit kaynak tahsis edilmelidir.","en": "All the identified risks should be allocated equal resources.","cmt_tr": "Risk K ve M, Risk L ve N'den açıkça daha büyük genel risk maruziyetine sahiptir.","cmt_en": "Risks K and M clearly have greater overall risk exposure than Risks L and N."},{"tr": "Verilen bilgilerden belirlenemez.","en": "Cannot be determined from the information given.","cmt_tr": "Risk K ve Risk M'nin her ikisi de birer yüksek ve birer orta risk ölçüsüne sahiptir, bu da onlara aynı genel risk maruziyetini verir. Birine diğerinden daha fazla kaynak ayırmak, verilen bilgiler temelinde haklı gösterilemez.","cmt_en": "Risk K and Risk M both have one high risk measure and one medium risk measure, giving them the same overall risk exposure. Allocating more resources to one over the other cannot be justified based on the information given."},{"tr": "Risk M.","en": "Risk M.","cmt_tr": "Risk M ve Risk K aynı genel risk maruziyetine sahiptir. Birine diğerinden daha fazla kaynak ayırmak, verilen bilgiler temelinde haklı gösterilemez.","cmt_en": "Risk M and Risk K have the same overall risk exposure. Allocating more resources to one over the other cannot be justified based on the information given."},{"tr": "Risk K.","en": "Risk K.","cmt_tr": "Risk K ve Risk M aynı genel risk maruziyetine sahiptir. Birine diğerinden daha fazla kaynak ayırmak, verilen bilgiler temelinde haklı gösterilemez.","cmt_en": "Risk K and Risk M have the same overall risk exposure. Allocating more resources to one over the other cannot be justified based on the information given."}],"answer": 1},{"q_tr": "İç denetçiler, üst yönetimi içeren hile riskini değerlendirmektedir. Bir etki faktörü nedir?","q_en": "The internal auditors are assessing the risk of fraud involving senior management. An impact factor is","options": [{"tr": "Para cezaları ve yaptırımlar.","en": "Fines and penalties.","cmt_tr": "Etki faktörü, bir olayın potansiyel sonucu veya etkisidir. Olumlu veya olumsuz olabilir. Bu olaylar genellikle risk değerlendirmesiyle belirlenir. Örneğin, hilenin sonuçları arasında para cezaları ve yaptırımlar biçiminde doğrudan mali kayıp bulunabilir.","cmt_en": "An impact factor is a potential result or effect of an event. It may be positive or negative. These events usually are identified by risk assessment. For example, the consequences of fraud may include direct financial loss in the form of fines and penalties."},{"tr": "İç kontrollerin yetersizliği.","en": "Inadequacy of internal controls.","cmt_tr": "İç kontrollerin yetersizliği, normalde risk değerlendirmesi sırasında belirlenen bir risktir.","cmt_en": "Inadequacy of internal controls is a risk that normally is identified during risk assessment."},{"tr": "Olağandışı işlemler.","en": "Unusual transactions.","cmt_tr": "Karmaşık veya olağandışı işlemlerin varlığı, normalde risk değerlendirmesi sırasında belirlenen bir risktir.","cmt_en": "The existence of complex or unusual transactions is a risk that normally is identified during risk assessment."},{"tr": "İç kontrollerin potansiyel olarak devre dışı bırakılması.","en": "Potential override of internal controls.","cmt_tr": "Etki faktörü, bir olayın potansiyel sonucudur. İç kontrollerin potansiyel olarak devre dışı bırakılması, normalde risk değerlendirmesi sırasında belirlenen bir olayın nedenidir.","cmt_en": "An impact factor is a potential result of an event. Potential override of internal controls is a cause of an event that normally is identified during risk assessment."}],"answer": 0},{"q_tr": "Risk modellemesi büyük olasılıkla aşağıdakilerden hangisini yapar?","q_en": "Risk modeling most likely","options": [{"tr": "Risk önceliklerini doğrular.","en": "Validates risk priorities.","cmt_tr": "Risk modellemesi, bir risk değerlendirmesi ve önceliklendirme yöntemidir. Denetim planındaki görevlerin önceliklerini belirlerken risk önceliklerini sıralar ve doğrular.","cmt_en": "Risk modeling is a method of risk assessment and prioritization. It ranks and validates risk priorities when setting the priorities of engagements in the audit plan. Risk factors may be weighted based on professional judgments to determine their relative significance, but the weights need not be quantified."},{"tr": "Risk yanıt planlarını değerlendirir.","en": "Evaluates risk response plans.","cmt_tr": "Risk izleme, (1) belirlenen riskleri takip eder, (2) mevcut risk yanıt planlarını değerlendirir, (3) artık riskleri izler ve (4) yeni riskleri belirler.","cmt_en": "Risk monitoring (1) tracks identified risks, (2) evaluates current risk response plans, (3) monitors residual risks, and (4) identifies new risks."},{"tr": "Riskleri yönetmenin bir yoludur.","en": "Is a means of managing risks.","cmt_tr": "Risk yanıtları, kuruluşun bireysel riskleri yönetmeyi seçtiği araçlardır.","cmt_en": "Risk responses are the means by which an organization elects to manage individual risks."},{"tr": "Artık riski belirler.","en": "Determines residual risk.","cmt_tr": "Artık risk, risk yanıtları uygulandıktan sonra kalan risktir.","cmt_en": "Residual risk is the risk that remains after risk responses are executed."}],"answer": 0},{"q_tr": "COSO'nun kurumsal risk yönetimi (KRY) çerçevesine göre, aşağıdakilerden hangisi yönetişim ve kültür bileşeninin bir ilkesiyle tutarlıdır?","q_en": "According to the COSO’s enterprise risk management (ERM) framework, which of the following is consistent with a principle of its governance and culture component?","options": [{"tr": "Yetenekli bireylerin elde tutulması.","en": "Retention of capable individuals."
