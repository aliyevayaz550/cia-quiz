<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CIA Quiz – Unit 7</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-group {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.3);
  margin-left: 10px;
}
.lang-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .5px; padding: 5px 9px; cursor: pointer; border: none;
  background: rgba(255,255,255,.10); color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
}
.lang-btn + .lang-btn { border-left: 1px solid rgba(255,255,255,.15); }
.lang-btn.active { background: var(--gold) !important; color: var(--navy) !important; }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── HISTORY SECTION ─────────────────────────────────── */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 7</div>
    <div id="score-badge">0 / 0</div>
    <div id="lang-group">
      <button class="lang-btn active" onclick="setLang('tr')" data-lang="tr">TR</button>
      <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
    </div>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">134 sual</span>
    </div>
  </div>
</div>

<div id="main">

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Risk Mgmt Processes": [{"q_tr": "Bir kuruluşun üst yönetimi, faaliyet tabanlı maliyetleme (FTM) sisteminin benimsenmesini araştırmak üzere bir ekip oluşturmaya karar verdiğinde, ekibe bir iç denetçi atanmıştır. İç denetçinin dahil edilmesinin en iyi nedeni, iç denetçinin hangi konudaki bilgisidir?","q_en": "When the executive management of an organization decided to form a team to investigate the adoption of an activity-based costing (ABC) system, an internal auditor was assigned to the team. The best reason for including an internal auditor is the internal auditor’s knowledge of","options": [{"tr": "Faaliyetler ve maliyet etkenleri.","en": "Activities and cost drivers.","cmt_tr": "Bir mühendisin faaliyetler ve maliyet etkenleri konusunda iç denetçiden daha fazla bilgisi vardır.","cmt_en": "An engineer has more knowledge than an internal auditor about activities and cost drivers."},{"tr": "Bilgi işleme prosedürleri.","en": "Information processing procedures.","cmt_tr": "Bir bilgi sistemleri uzmanının bilgi ihtiyaçları ve bilgi işleme prosedürleri konusunda iç denetçiden daha fazla bilgisi vardır.","cmt_en": "An information systems expert has more knowledge than an internal auditor about information needs and information processing procedures."},{"tr": "Mevcut ürün maliyet yapıları.","en": "Current product cost structures.","cmt_tr": "Bir yönetim muhasebecisinin kuruluşun mevcut ürün maliyeti konusunda iç denetçiden daha fazla bilgisi vardır.","cmt_en": "A management accountant has more knowledge than an internal auditor about an organization’s current product cost."},{"tr": "Risk yönetimi süreçleri.","en": "Risk management processes.","cmt_tr": "İç denetim fonksiyonunun çalışma kapsamı, kuruluşun risk yönetimi süreçlerinin değerlendirilmesini de içerir. İç denetim fonksiyonu, önemli risk maruziyetlerini belirleyip değerlendirerek ve risk yönetimi ile kontrol sistemlerinin iyileştirilmesine katkıda bulunarak kuruluşa yardımcı olmalıdır.","cmt_en": "The internal audit function’s scope of work extends to evaluating the organization’s risk management processes. The internal audit function should assist the organization by identifying and evaluating significant exposures to risk and contributing to the improvement of risk management and control systems."}],"answer": 3},{"q_tr": "İç denetçiler, aşağıdakilerden kaynaklanan kayıplara karşı varlıkların fiziksel olarak korunma yollarını gözden geçirmelidir:","q_en": "Internal auditors should review the means of physically safeguarding assets from losses arising from","options": [{"tr": "Muhasebe ilkelerinin yanlış uygulanması.","en": "Misapplication of accounting principles.","cmt_tr": "Muhasebe ilkelerinin yanlış uygulanması, fiziksel koruma önlemleriyle değil, bilginin güvenilirliğiyle ilgilidir.","cmt_en": "Misapplication of accounting principles relates to the reliability of information and not physical safeguards."},{"tr": "Maliyet açısından haklı olmayan prosedürler.","en": "Procedures that are not cost justified.","cmt_tr": "Maliyet açısından haklı olmayan prosedürler, faaliyetlerin etkililiği değil, verimliliği ile ilgilidir.","cmt_en": "Procedures that are not cost justified relate to efficiency, not effectiveness, of operations."},{"tr": "Doğa koşullarına maruz kalma.","en": "Exposure to the elements.","cmt_tr": "İç denetim fonksiyonu, etkili bir iç denetim stratejisi ve planı geliştirmek için kuruluşun yönetişim, risk yönetimi ve kontrol süreçlerini anlamalıdır. Bu nedenle fonksiyon, varlıkların korunmasına ilişkin yönetişim, operasyonlar ve bilgi sistemleriyle ilgili risk maruziyetlerini değerlendirmelidir. Örneğin, iç denetçiler hırsızlık, yangın, uygunsuz veya yasa dışı faaliyetler ve doğa koşullarından kaynaklanan risk maruziyetlerini değerlendirir.","cmt_en": "The internal audit function must understand the organization’s governance, risk management, and control processes to develop an effective internal audit strategy and plan. As such, the function must evaluate risk exposures relating to governance, operations, and information systems regarding the safeguarding of assets. For example, internal auditors evaluate risk exposures from theft, fire, improper or illegal activities, and the elements."},{"tr": "Fiziksel tesislerin yetersiz kullanımı.","en": "Underusage of physical facilities.","cmt_tr": "Tesislerin yetersiz kullanımı, faaliyetlerin verimliliğiyle ilgilidir.","cmt_en": "Underusage of facilities relates to efficiency of operations."}],"answer": 2},{"q_tr": "Aşağıdaki kontrol prosedürlerinden hangisini bir iç denetçi, risk yönetimi ve sigortayı değerlendirme görevi sırasında bulmayı bekler?","q_en": "Which of the following control procedures does an internal auditor expect to find during an engagement to evaluate risk management and insurance?","options": [{"tr": "Sigorta kapsamının yeterliliğini değerlendirmek için yürürlükteki poliçe listesinin periyodik iç gözden geçirmesi.","en": "Periodic internal review of the in-force list to evaluate the adequacy of insurance coverage.","cmt_tr": "Sigorta yaptırmak ve periyodik olarak yeterliliğini gözden geçirmek, risk değerlendirmesi bulgularına yönelik yönetim tepkileri arasındadır. Sigorta kapsamı, ilgili değerlendirilen risklerin kuruluşun risk iştahına uygun şekilde yönetilmesini sağlamaya yeterli olmalıdır.","cmt_en": "Obtaining insurance and periodically reviewing its adequacy are among management’s responses to the findings of a risk assessment. Insurance coverage should be sufficient to ensure that the relevant assessed risks are managed in accordance with the organization’s risk appetite."},{"tr": "Tüm yeni sigorta poliçelerinin kuruluşun CEO'su tarafından onaylanması zorunluluğu.","en": "Required approval of all new insurance policies by the organization’s CEO.","cmt_tr": "CEO onayı, genellikle daha alt düzey bir yöneticiye devredilen operasyonel bir karardır.","cmt_en": "CEO approval is an operational decision ordinarily delegated to a lower level manager."},{"tr": "Sigorta giderlerini kaydetmek için tekrarlayan standart yevmiye kayıtları politikası.","en": "Policy of repetitive standard journal entries to record insurance expense.","cmt_tr": "Standart yevmiye kayıtlarına ilişkin bir politika, risk yönetimi ve sigorta kontrolü değil, bir muhasebe kontrolüdür.","cmt_en": "A policy concerning standard journal entries is an accounting control, not a risk management and insurance control."},{"tr": "Sigorta gideri raporlamasına ilişkin kesim prosedürleri.","en": "Cutoff procedures with regard to insurance expense reporting.","cmt_tr": "Sigorta gideri raporlamasına ilişkin kesim prosedürleri, risk yönetimi ve sigorta kontrolü değil, bir muhasebe kontrolüdür.","cmt_en": "Cutoff procedures with regard to insurance expense reporting are an accounting control, not a risk management and insurance control."}],"answer": 0},{"q_tr": "Aşağıdakilerden hangisi, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlamak üzere potansiyel olayları veya durumları belirleme, değerlendirme, yönetme ve kontrol etme sürecini en doğru tanımlayan terimdir?","q_en": "Which of the following is the most accurate term for a process to identify, assess, manage, and control potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives?","options": [{"tr": "İç denetim fonksiyonu.","en": "The internal audit function.","cmt_tr": "İç denetim fonksiyonu risk yönetimine yardımcı olur; risk yönetiminin kendisi değildir.","cmt_en": "The internal audit function assists in risk management; it is not the same thing as risk management."},{"tr": "Kontrol süreci.","en": "Control process.","cmt_tr": "Kontrol süreçleri, riskleri kuruluşun risk toleransı seviyesinde yönetmek üzere tasarlanmış ve işletilen politikalar, prosedürler ve faaliyetlerdir.","cmt_en": "Control processes are the policies, procedures, and activities designed and operated to manage risks to be within the level of an organization’s risk tolerance."},{"tr": "Risk yönetimi.","en": "Risk management.","cmt_tr": "Risk yönetimi, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlamak üzere potansiyel olayları veya durumları belirleme, değerlendirme, yönetme ve kontrol etme sürecidir.","cmt_en": "Risk management is a process that identifies, assesses, manages, and controls potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives."},{"tr": "Danışmanlık hizmeti.","en": "Advisory service.","cmt_tr": "Danışmanlık hizmetleri güvence sağlamaz. Nitelikleri ve kapsamı paydaşlarla (örneğin yönetim) mutabık kalınarak belirlenir.","cmt_en": "Advisory services do not provide assurance. Their nature and scope are agreed with stakeholders (e.g., management)."}],"answer": 2},{"q_tr": "Risk yönetimi süreçlerinin etkililiğini değerlendirirken, iç denetçiler büyük olasılıkla aşağıdakilerden hangisini yapmalıdır?","q_en": "With respect to assessing the effectiveness of risk management processes, internal auditors most likely should","options": [{"tr": "Kuruluşların risk yönetimi için benzer teknikler kullanması gerektiğini kabul etmek.","en": "Recognize that organizations should use similar techniques for managing risk.","cmt_tr": "Risk yönetimi süreçleri, kuruluşun iş faaliyetlerinin büyüklüğüne ve karmaşıklığına göre değişir.","cmt_en": "Risk management processes vary with the size and complexity of an organization’s business activities."},{"tr": "Kuruluşun önemli riskleri nasıl belirlediğini, değerlendirdiğini ve kontrol süreçlerini nasıl seçtiğini dikkate almak.","en": "Consider how the organization identifies and assesses significant risks and selects control processes.","cmt_tr": "İç denetçiler, kuruluşun risk yönetimi süreçlerini anlamalı ve bunların etkili olup olmadığını belirlemelidir. Bu, kuruluşun önemli riskleri nasıl belirlediğini ve değerlendirdiğini ve aşağıdaki temel risk alanlarını nasıl yönettiğini dikkate almayı içerir: • Finansal ve operasyonel bilgilerin güvenilirliği ve bütünlüğü • Faaliyetlerin ve programların etkililiği ve verimliliği • Varlıkların korunması • Yasa ve düzenlemelere uyum","cmt_en": "Internal auditors must understand the organization’s risk management processes and determine whether they are effective. This involves considering how the organization identifies and assesses significant risks and selects control processes, including how it identifies and manages the following key risk areas: • Reliability and integrity of financial and operational information • Effectiveness and efficiency of operations and programs • Safeguarding of assets • Compliance with laws and regulations"},{"tr": "Kuruluşun kabul edebileceği risk düzeyini belirlemek.","en": "Determine the level of risks acceptable to the organization.","cmt_tr": "Üst yönetim ve yönetim kurulu, kabul edilebilir kurumsal risk düzeylerini belirler.","cmt_en": "Senior management and the board determine the level of acceptable organizational risks."},{"tr": "Risk yönetimi süreçlerinin değerlendirilmesini, görevleri planlamak için kullanılan risk analiziyle aynı şekilde ele almak.","en": "Treat the evaluation of risk management processes in the same manner as the risk analysis used to plan engagements.","cmt_tr": "Yönetimin risk süreçlerinin değerlendirilmesi, iç denetçilerin bir görevi planlamak için kullandığı risk değerlendirmesinden farklıdır. Ancak kapsamlı bir risk yönetimi sürecinden elde edilen bilgiler bu planlamada faydalıdır.","cmt_en": "Evaluating management’s risk processes differs from the internal auditors’ risk assessment used to plan an engagement. But information from a comprehensive risk management process is useful in such planning."}],"answer": 1},{"q_tr": "Bir bankanın ayrı bir uyum fonksiyonu sürdürmesinin temel nedeni aşağıdakilerden hangisidir?","q_en": "The primary reason that a bank would maintain a separate compliance function is to","options": [{"tr": "Algılanan yüksek riskleri daha iyi yönetmek.","en": "Better manage perceived high risks.","cmt_tr": "Risk yönetimi süreci, potansiyel risk maruziyetlerini belirler, değerlendirir, yönetir ve kontrol eder. Aracı kurumlar, bankalar ve sigorta şirketleri gibi kuruluşlar, riskleri sürekli gözetim ve izleme gerektirecek kadar kritik görebilir. İç denetim fonksiyonu, yasa, düzenleme, politika, prosedür ve sözleşmelere uyumla ilgili riskleri değerlendirir.","cmt_en": "The risk management process identifies, assesses, manages, and controls potential risk exposures. Organizations such as brokers, banks, and insurance companies may view risks as sufficiently critical to warrant continuous oversight and monitoring. The internal audit function evaluates risks relating to compliance with laws, regulations, policies, procedures, and contracts."},{"tr": "Bankanın yatırımları üzerindeki kontrolleri güçlendirmek.","en": "Strengthen controls over the bank’s investments.","cmt_tr": "Ayrı bir uyum fonksiyonu kontrolleri güçlendirmeye yardımcı olabilir, ancak bu temel amacı değildir.","cmt_en": "A separate compliance function may help strengthen controls, but this is not its primary purpose."},{"tr": "Hat ve üst yönetimin bağımsızlığını sağlamak.","en": "Ensure the independence of line and senior management.","cmt_tr": "Risk yönetimi, yönetimin doğrudan sorumluluğundadır.","cmt_en": "Risk management is the direct responsibility of management."},{"tr": "Hissedar beklentilerine daha iyi yanıt vermek.","en": "Better respond to shareholder expectations.","cmt_tr": "Ayrı bir uyum fonksiyonu hissedar ihtiyaçlarına yanıt vermeye yardımcı olacaktır, ancak bu temel amacı değildir.","cmt_en": "A separate compliance function will help respond to shareholder needs, but this is not its primary purpose."}],"answer": 0},{"q_tr": "Aşağıdakilerden hangisi risk yönetimi sürecine dahildir?","q_en": "Which of the following is included in the risk management process?","options": [{"tr": "Risk eğitimi.","en": "Risk training.","cmt_tr": "Risk eğitimi, risk yönetimi sürecinin bir parçası değildir.","cmt_en": "Risk training is not part of the risk management process."},{"tr": "Risk değerlendirmesi.","en": "Risk assessment.","cmt_tr": "Risk yönetimi, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlamak üzere potansiyel olayları veya durumları belirleme, değerlendirme, yönetme ve kontrol etme sürecidir.","cmt_en": "Risk management is a process that identifies, assesses, manages, and controls potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives."},{"tr": "Risk maruziyeti.","en": "Risk exposure.","cmt_tr": "Risk maruziyeti, risk yönetimi sürecinin bir parçası değildir.","cmt_en": "Risk exposure is not part of the risk management process."},{"tr": "Risk stratejisi.","en": "Risk strategy.","cmt_tr": "Risk stratejisi, risk yönetimi sürecinin bir parçası değildir.","cmt_en": "Risk strategy is not part of the risk management process."}],"answer": 1},{"q_tr": "Risk yönetimi hakkında aşağıdakilerden hangisi doğrudur?","q_en": "Which of the following is true about risk management?","options": [{"tr": "Hedeflere ulaşılmasını etkileyebilecek her risk dikkate alınmalıdır.","en": "Every risk that could affect achievement of objectives must be considered.","cmt_tr": "Hedeflere ulaşılmasını etkileyebilecek her risk dikkate alınmalıdır.","cmt_en": "Every risk that could affect achievement of objectives must be considered."},{"tr": "Risk belirleme, aşağıdan yukarıya yaklaşımla yapılmalıdır.","en": "Risk identification must be performed taking a bottom-up approach.","cmt_tr": "Aşağıdan yukarıya yaklaşımla önce operasyonel düzeyde risklerin belirlenmesi kabul edilebilir. Ancak yukarıdan aşağıya yaklaşım da kabul edilebilir ve genellikle en iyi uygulama olarak kabul edilir.","cmt_en": "Identifying risks at the operational level first using a bottom-up approach is acceptable. But a top- down approach is also acceptable and generally considered best practice."},{"tr": "Bir faaliyet biriminin yöneticisi, algılanan tarafsızlık eksikliği nedeniyle seçilen risk yanıt stratejilerinin etkilerini izlemek için en iyi konumda değildir.","en": "The manager of an operating unit is not in the best position to monitor the effects of the chosen risk response strategies because of a perceived lack of objectivity.","cmt_tr": "Bir faaliyet biriminin yöneticisi, seçilen risk yanıt stratejilerinin etkilerini izlemek için en iyi konumdadır.","cmt_en": "The manager of an operating unit is in the best position to monitor the effects of the chosen risk response strategies."},{"tr": "Risk yönetimi, bir komiteye devredilmeyecek kadar önemlidir.","en": "Risk management is too important to be delegated to a committee.","cmt_tr": "Büyük veya karmaşık kuruluşlarda, yönetim kurulu (1) temel riskleri belirlemek, (2) bunları risk yönetimi süreçleriyle ilişkilendirmek, (3) risk sahiplerine devretmek ve (4) atanan toleransların kuruluşun risk iştahıyla tutarlı olup olmadığını değerlendirmek üzere bir risk komitesi atayabilir.","cmt_en": "In large or complex entities, the board may appoint a risk committee to (1) identify key risks, (2) connect them to risk management processes, (3) delegate them to risk owners, and (4) consider whether assigned tolerances are consistent with the entity’s risk appetite."}],"answer": 0},{"q_tr": "Aşağıdakilerden hangisi risk yönetimi sürecindeki adımların doğru sırasıdır?","q_en": "Which of the following is the correct order of steps in the risk management process?","options": [{"tr": "Bağlamın belirlenmesi, risklerin belirlenmesi, risklerin değerlendirilmesi ve önceliklendirilmesi, risk yanıtlarının oluşturulması, risk yanıtlarının izlenmesi.","en": "Identify context, identify risks, assess and prioritize risks, formulate risk responses, monitor risk responses.","cmt_tr": "Risk yönetimi sürecindeki adımların sırası şöyledir: (1) bağlamın belirlenmesi, (2) risklerin belirlenmesi, (3) risklerin değerlendirilmesi ve önceliklendirilmesi, (4) risk yanıtlarının oluşturulması ve (5) risk yanıtlarının izlenmesi.","cmt_en": "The following is the order of steps in the risk management process: (1) identify context, (2) identify risks, (3) assess and prioritize risks, (4) formulate risk responses, and (5) monitor risk responses."},{"tr": "Risklerin belirlenmesi, risklerin değerlendirilmesi ve önceliklendirilmesi, risk yanıtlarının oluşturulması, risk yanıtlarının izlenmesi, bağlamın belirlenmesi.","en": "Identify risks, assess and prioritize risks, formulate risk responses, monitor risk responses, identify context.","cmt_tr": "Bağlamın belirlenmesi, risklerin belirlenmesinden önce gerçekleşir.","cmt_en": "Identifying context occurs before identifying risks."},{"tr": "Risklerin belirlenmesi, risk yanıtlarının oluşturulması, bağlamın belirlenmesi, risklerin değerlendirilmesi ve önceliklendirilmesi, risk yanıtlarının izlenmesi.","en": "Identify risks, formulate risk responses, identify context, assess and prioritize risks, monitor risk responses.","cmt_tr": "Bağlamın belirlenmesi, risklerin belirlenmesinden önce; risklerin değerlendirilmesi ve önceliklendirilmesi, risk yanıtlarının oluşturulmasından önce gerçekleşir.","cmt_en": "Identifying context occurs before identifying risks; assessing and prioritizing risks occurs before formulating risk responses."},{"tr": "Risklerin belirlenmesi, bağlamın belirlenmesi, risklerin değerlendirilmesi ve önceliklendirilmesi, risk yanıtlarının oluşturulması, risk yanıtlarının izlenmesi.","en": "Identify risks, identify context, assess and prioritize risks, formulate risk responses, monitor risk responses.","cmt_tr": "Bağlamın belirlenmesi, risklerin belirlenmesinden önce gerçekleşir.","cmt_en": "Identifying context occurs before identifying risks."}],"answer": 0},{"q_tr": "Bir faaliyetle ilişkili riski değerlendirirken, iç denetçi aşağıdakilerden hangisini yapmalıdır?","q_en": "When assessing the risk associated with an activity, an internal auditor should","options": [{"tr": "Riskin en iyi nasıl yönetileceğini belirlemek.","en": "Determine how the risk should best be managed.","cmt_tr": "Risk yönetimi, üst yönetim ve yönetim kurulunun temel sorumluluğudur, iç denetçinin değil.","cmt_en": "Risk management is a key responsibility of senior management and the board, not the internal auditor."},{"tr": "Riskin yönetimi konusunda güvence sağlamak.","en": "Provide assurance on the management of the risk.","cmt_tr": "İç denetim fonksiyonu, risk yönetimini incelemek, değerlendirmek, raporlamak veya iyileştirmeler önermek üzere yönlendirilebilir. Ayrıca risk yönetimi yöntemlerini ve kontrollerini belirleme, değerlendirme ve uygulama konusunda danışmanlık rolü de vardır.","cmt_en": "The internal audit function may be directed to examine, evaluate, report, or recommend improvements in risk management. It also has an advisory role in identifying, evaluating, and implementing risk management methods and controls."},{"tr": "Risk maruziyetlerine dayalı olarak risk yönetimi sürecini güncellemek.","en": "Update the risk management process based on risk exposures.","cmt_tr": "Risk yönetimi sürecini tasarlamak ve güncellemek yönetimin rolüdür.","cmt_en": "Designing and updating the risk management process is a role of management."},{"tr": "Belirlenen riskleri azaltmak için kontroller tasarlamak.","en": "Design controls to mitigate the identified risks.","cmt_tr": "Kontrollerin tasarımı ve uygulanması, iç denetimin değil yönetimin sorumluluğundadır.","cmt_en": "The design and implementation of controls is the responsibility of management, not internal audit."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangisi risk yönetimi sorumluluklarının en iyi ifadesini temsil eder?","q_en": "Which of the following represents the best statement of responsibilities for risk management?","options": [{"tr": "Yönetim - Riskten sorumluluk. İç Denetim - Gözetim rolü. Yönetim Kurulu - Danışmanlık rolü.","en": "Management - Responsibility for risk. Internal Auditing - Oversight role. Board - Advisory role.","cmt_tr": "İç denetçiler genellikle güvence ve danışmanlık rolündedir. Yönetim kurulunun gözetim rolü vardır.","cmt_en": "Internal auditors are generally involved in the assurance and advisory role. The board has an oversight role."},{"tr": "Yönetim - Gözetim rolü. İç Denetim - Riskten sorumluluk. Yönetim Kurulu - Danışmanlık rolü.","en": "Management - Oversight role. Internal Auditing - Responsibility for risk. Board - Advisory role.","cmt_tr": "Yönetim, risk yönetiminde uygulama rolünü üstlenir ve yönetim kurulunun gözetim rolü vardır. İç denetçiler genellikle güvence ve danışmanlık rolündedir.","cmt_en": "Management performs the implementation role in risk management, and the board has an oversight role. Internal auditors are generally involved in the assurance and advisory role."},{"tr": "Yönetim - Riskten sorumluluk. İç Denetim - Danışmanlık rolü. Yönetim Kurulu - Gözetim rolü.","en": "Management - Responsibility for risk. Internal Auditing - Advisory role. Board - Oversight role.","cmt_tr": "Risk yönetimi, üst yönetim ve yönetim kurulunun temel sorumluluğudur. İş hedeflerine ulaşmak için yönetim, sağlam risk yönetimi süreçlerinin mevcut ve işlevsel olmasını sağlar. Yönetim kurulları, uygun risk yönetimi süreçlerinin mevcut olduğunu ve bu süreçlerin yeterli ve etkili olduğunu belirlemek üzere gözetim rolü üstlenir. İç denetim fonksiyonu, risk yönetimi konularını planlama, denetleme ve gözden geçirme sürecine sahip olmalıdır. Ayrıca bir alan veya sürecin güvence ve danışmanlık incelemelerinde risk yönetimini değerlendirir.","cmt_en": "Risk management is a key responsibility of senior management and the board. To achieve its business objectives, management ensures that sound risk management processes are in place and functioning. Boards have an oversight role to determine that appropriate risk management processes are in place and that these processes are adequate and effective. The internal audit function should have a process for planning, auditing, and reviewing risk management issues. It also evaluates risk management during assurance and advisory reviews of an area or process. After communications with the board and senior management, the CAE considers their risk appetite, risk tolerance, and risk culture. Moreover, (1) management should be alerted to new risks or those not sufficiently mitigated, (2) recommendations and action plans for risk exposure should be provided, and (3) sufficient information should be obtained to evaluate risk management effectiveness."},{"tr": "Yönetim - Gözetim rolü. İç Denetim - Danışmanlık rolü. Yönetim Kurulu - Riskten sorumluluk.","en": "Management - Oversight role. Internal Auditing - Advisory role. Board - Responsibility for risk.","cmt_tr": "Yönetim, risk yönetiminden sorumludur; yönetim kurulunun üstlendiği gözetim rolünden değil.","cmt_en": "Management is responsible for risk management, not the oversight role performed by the board."}],"answer": 2},{"q_tr": "İç denetim yöneticisinin (CAE) bir sorumluluğu aşağıdakilerden hangisidir?","q_en": "A responsibility of the chief audit executive (CAE) is to","options": [{"tr": "Kuruluş içindeki tüm muhasebe, finans ve denetim faaliyetlerini denetlemek.","en": "Oversee all accounting, finance, and auditing activities within the organization.","cmt_tr": "CAE, muhasebe ve finans değil, iç denetim faaliyetlerini denetler.","cmt_en": "The CAE oversees internal auditing activities, not accounting and finance."},{"tr": "Uygun kapsamı sağlamak ve çakışmayı en aza indirmek için diğer iç ve dış denetim ve danışmanlık hizmeti sağlayıcılarıyla koordinasyon sağlamak.","en": "Coordinate with other internal and external providers of audit and advisory services to ensure proper coverage and minimize duplication.","cmt_tr": "CAE, uygun kapsamı sağlamak ve çabaların tekrarını en aza indirmek için ilgili güvence ve danışmanlık hizmetlerinin diğer iç ve dış sağlayıcılarıyla bilgi paylaşmalı ve faaliyetleri koordine etmelidir.","cmt_en": "The CAE should share information and coordinate activities with other internal and external providers of relevant assurance and advisory services to ensure proper coverage and minimize duplication of efforts."},{"tr": "Kuruluşun risk yönetimi süreçleri sisteminin kurulmasını, yönetimini ve değerlendirmesini denetlemek.","en": "Oversee the establishment, administration, and assessment of the organization’s system of risk management processes.","cmt_tr": "Kuruluşun risk yönetimi süreçleri sisteminin kurulmasını, yönetimini ve değerlendirmesini denetlemek, CAE'nin değil üst yönetimin rolüdür.","cmt_en": "Overseeing the establishment, administration, and assessment of the organization’s system of risk management processes is the role of senior management, not the CAE."},{"tr": "Raporlanan önemli riskler üzerinde uygun yönetim eylemlerini uygulamak.","en": "Implement appropriate management actions on significant reported risks.","cmt_tr": "CAE, raporlanan önemli risklere yönelik önerilen yönetim eylemlerini uygulamaktan sorumlu değildir.","cmt_en": "The CAE is not responsible for implementing recommended management actions of significant reported risks."}],"answer": 1},{"q_tr": "Bir kuruluşun resmi risk yönetimi süreçleri yoksa, iç denetim yöneticisi (CAE) aşağıdakilerden hangisini yapmalıdır?","q_en": "If an organization has no formal risk management processes, the chief audit executive (CAE) should","options": [{"tr": "Sektör normlarına dayalı olarak risk yönetimi süreçleri oluşturmak.","en": "Establish risk management processes based on industry norms.","cmt_tr": "İç denetçilerin risk yönetimi süreçleri oluşturma yetkisi yoktur. Süreçteki rolleri konusunda yönetim ve yönetim kurulundan yönlendirme almalıdırlar.","cmt_en": "Internal auditors have no authority to establish risk management processes. They must seek direction from management and the board as to their role in the process."},{"tr": "Risklerin yönetilmemesinden kaynaklanabilecek olası sonuçların varsayımsal sonuçlarını formüle etmek.","en": "Formulate hypothetical results of possible consequences resulting from risks not being managed.","cmt_tr": "İç denetçilerin, risk yönetimi süreci oluşturulmamasının olası sonuçlarına ilişkin bir risk analizi yapması zorunlu değildir. Ancak böyle bir talep yönetim tarafından yapılabilir.","cmt_en": "Internal auditors are not required to perform a risk analysis of the possible consequences of not establishing a risk management process. However, such a request might be made by management."},{"tr": "Düzenleyicilere kuruluşun bir ihlal suçu işlediğini bildirmek.","en": "Inform regulators that the organization is guilty of an infraction.","cmt_tr": "Belirli bir yasal gereklilik olmadıkça, iç denetçilerin dış taraflara rapor vermesi zorunlu değildir.","cmt_en": "In the absence of a specific legal requirement, internal auditors are not required to report to outside parties."},{"tr": "Yöneticilerle risk yönetimi süreçlerine ilişkin yükümlülüklerini resmi olarak görüşmek.","en": "Formally discuss with the directors their obligations for risk management processes.","cmt_tr": "Kuruluşun resmi risk yönetimi süreçlerinin olmadığı durumlarda, CAE yönetim ve yönetim kurulu ile kuruluş içindeki riskleri anlama, yönetme ve izleme yükümlülüklerini ve gayri resmi olsa bile temel risklerin nasıl yönetildiğine ve izlendiğine ilişkin uygun düzeyde görünürlük sağlayan süreçlerin kuruluş içinde işlediğinden emin olma ihtiyacını resmi olarak görüşür.","cmt_en": "In situations where the organization does not have formal risk management processes, the CAE formally discusses with management and the board their obligations to understand, manage, and monitor risks within the organization and the need to satisfy themselves that there are processes operating within the organization, even if informal, that provide the appropriate level of visibility into the key risks and how they are being managed and monitored."}],"answer": 3},{"q_tr": "Risk yanıtlarının izlenmesine ilişkin aşağıdaki ifadelerden hangisi doğrudur?","q_en": "Which of the following statements regarding monitoring risk responses is true?","options": [{"tr": "Bir faaliyet biriminin yöneticisi, seçilen risk yanıt stratejilerinin etkilerini izlemek için en iyi konumdadır.","en": "The manager of an operating unit is in the best position to monitor the effects of the chosen risk response strategies.","cmt_tr": "Faaliyetlerin kendisine en yakın olanlar, risk yanıtlarının yeterliliğinin süregelen değerlendirmeleri için önemli bir bilgi kaynağıdır. Dolayısıyla, bir faaliyet biriminin yöneticisi, seçilen risk yanıt stratejilerinin etkilerini izlemek için en iyi konumdadır.","cmt_en": "Those closest to the activities themselves are an important source of information for ongoing assessments of the adequacy of risk responses. Consequently, the manager of an operating unit is in the best position to monitor the effects of the chosen risk response strategies."},{"tr": "Risk yanıtlarının yeterliliğinin süregelen değerlendirmeleri için en az önemli iki bilgi kaynağı, faaliyetlerin kendisine en yakın olanlar ve denetim fonksiyonudur.","en": "The two least important sources of information for ongoing assessments of the adequacy of risk responses are those closest to the activities themselves and the audit function.","cmt_tr": "Risk yanıtlarının yeterliliğinin süregelen değerlendirmeleri için en az değil, en önemli iki bilgi kaynağı, faaliyetlerin kendisine en yakın olanlar ve denetim fonksiyonudur.","cmt_en": "The two most, not least, important sources of information for ongoing assessments of the adequacy of risk responses are those closest to the activities themselves and the audit function."},{"tr": "Risklerin ve yanıtların analizi genellikle dış denetçilere ayrılmıştır.","en": "Analyzing risks and responses are generally reserved for the external auditors.","cmt_tr": "İç denetim fonksiyonu, risk yanıtlarının yeterliliğinin süregelen değerlendirmeleri için önemli bir bilgi kaynağıdır. Buna göre, risk ve yanıt analizi iç denetçilerin olağan görevleri arasındadır.","cmt_en": "The internal audit function is an important source of information for ongoing assessments of the adequacy of risk responses. Accordingly, analysis of risks and responses is among the normal duties of internal auditors."},{"tr": "Operasyon yöneticileri genellikle birimlerinin karşı karşıya olduğu riskler konusunda en tarafsız kişilerdir.","en": "Operating managers are generally the most objective about the risks facing their units.","cmt_tr": "Operasyon yöneticileri, özellikle belirli bir yanıt stratejisinin tasarımında payları varsa, birimlerinin karşı karşıya olduğu riskler konusunda her zaman tarafsız olmayabilir.","cmt_en": "Operating managers may not always be objective about the risks facing their units, especially if they had a stake in designing a particular response strategy."}],"answer": 0},{"q_tr": "Risk yönetimi süreçlerinin etkili olup olmadığının belirlenmesi, iç denetçinin aşağıdaki değerlendirmesinden kaynaklanan bir yargıdır:","q_en": "Determining whether risk management processes are effective is a judgment resulting from the internal auditor’s assessment that","options": [{"tr": "Hile riskinin ortadan kaldırılmış olması.","en": "The risk of fraud has been eliminated.","cmt_tr": "Hile riski hiçbir zaman tamamen ortadan kaldırılamaz, ancak mümkün olduğunca en aza indirilmelidir.","cmt_en": "The risk of fraud can never been completely eliminated, but it should be minimized as much as possible."},{"tr": "Tüm risklerin belirlenmiş ve değerlendirilmiş olması.","en": "All risks have been identified and assessed.","cmt_tr": "Tüm önemli risklerin belirlenip değerlendirilmesinin sağlanması verimli ve etkilidir. Tüm olası riskleri belirlemeye ve değerlendirmeye çalışmak, iç denetçilerin zamanının ve becerilerinin en iyi kullanımı değildir.","cmt_en": "Ensuring that all significant risks are identified and assessed is efficient and effective. Trying to identify and assess all possible risks is not the best use of the internal auditors’ time and skills."},{"tr": "Risk bilgilerinin gizli kalması.","en": "Risk information remains confidential.","cmt_tr": "İç denetçi, ilgili risk bilgilerinin kuruluş genelinde zamanında yakalanıp iletilip iletilmediğini değerlendirmelidir.","cmt_en": "The internal auditor should assess whether relevant risk information is captured and communicated in a timely manner across the organization."},{"tr": "Kuruluşun risk iştahı dahilinde uygun risk yanıtlarının seçilmesi.","en": "Appropriate risk responses are selected that are within the organization’s risk appetite.","cmt_tr": "Risk yönetimi süreçlerinin etkili olup olmadığının belirlenmesi, iç denetçinin şu değerlendirmesinden kaynaklanan bir yargıdır: 1. Kuruluş hedeflerinin kuruluşun misyonunu desteklemesi; 2. Önemli risklerin belirlenip değerlendirilmesi; 3. Kuruluşun risk iştahı dahilinde uygun risk yanıtlarının seçilmesi; ve 4. İlgili risk bilgilerinin kuruluş genelinde zamanında yakalanıp iletilmesi, böylece personelin, yönetimin ve yönetim kurulunun sorumluluklarını yerine getirmesinin sağlanması.","cmt_en": "Determining whether risk management processes are effective is a judgment resulting from the internal auditor’s assessment that 1. Organizational objectives support the organization’s mission; 2. Significant risks are identified and assessed; 3. Appropriate risk responses are selected that are within the organization’s risk appetite; and 4. Relevant risk information is captured and communicated in a timely manner across the organization, enabling staff, management, and the board to carry out their responsibilities."}],"answer": 3},{"q_tr": "Üst yönetim, kuruluşun hedeflerine ulaşmasını engelleyebilecek tüm belirlenebilir riskleri hem olasılık hem de potansiyel etki açısından değerlendirmiştir. En olası sonraki adım aşağıdakilerden hangisidir?","q_en": "Senior management has assessed all identifiable risks to the achievement of the organization’s objectives in terms of both probability and potential effect. The most likely next step is to","options": [{"tr": "Süreç kalitesini sağlamak için ISO 9000 çerçevesini benimsemek.","en": "Adopt the ISO 9000 framework to ensure process quality.","cmt_tr": "ISO 9000 çerçevesinin benimsenmesinin uygun olup olmadığı, risk değerlendirmesi tamamlanmadan belirlenemez.","cmt_en": "Whether adoption of the ISO 9000 framework is appropriate cannot be determined until the risk assessment is complete."},{"tr": "Riskleri önceliklendirmek.","en": "Prioritize risks.","cmt_tr": "Kuruluş hedeflerine ulaşılmasını etkileyebilecek tüm riskler belirlenmelidir. Sonraki adım, riskleri önceliklendirmek ve karar alma bilgisi üretmektir; yani olasılık ve potansiyel etkinin birleşimi.","cmt_en": "All risks that could affect the achievement of organizational objectives should be identified. The next step is to prioritize risks and produce decision-making information, i.e., the combination of probability and potential effect."},{"tr": "Kuruluşun en önemli tedarikçileriyle elektronik veri değişimi (EDI) düzenlemeleri yapmak.","en": "Enter into electronic data interchange (EDI) arrangements with the organization’s most important suppliers.","cmt_tr": "EDI'nin uygun olup olmadığı, risk değerlendirmesi tamamlanmadan belirlenemez.","cmt_en": "Whether EDI is appropriate cannot be determined until the risk assessment is complete."},{"tr": "Belirlenen risk alanlarının sıralanması görevini iç denetim fonksiyonuna atamak.","en": "Assign the task of ranking the identified risk areas to the internal audit function.","cmt_tr": "Risk yönetimi, üst yönetim ve yönetim kurulunun temel sorumluluğudur ve devredilemez.","cmt_en": "Risk management is a key responsibility of senior management and the board and cannot be delegated."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangisi, üst yönetim ve yönetim kurulunun risk yönetimi süreçleri hakkında bir bilgi kaynağı olarak iç denetim fonksiyonunu kullanmasına ilişkin doğru bir ifadedir?","q_en": "Which of the following is a true statement about the use by senior management and the board of the internal audit function as a source of information about risk management processes?","options": [{"tr": "İç denetim fonksiyonunun risk yönetimi süreçleri konusunda tarafsız olması beklenemez.","en": "The internal audit function cannot be expected to be objective about risk management processes.","cmt_tr": "İç denetçiler tarafsız, önyargısız bir tutuma sahip olmalı ve herhangi bir çıkar çatışmasından kaçınmalıdır.","cmt_en": "Internal auditors must have an impartial, unbiased attitude and avoid any conflict of interest."},{"tr": "İç denetim fonksiyonu, risk yönetimi süreçlerinin günlük işleyişi hakkında iyi bir bilgi kaynağı değildir.","en": "The internal audit function is not a good source of information about the daily functioning of risk management processes.","cmt_tr": "Operasyonel yönetimin risk yönetimi süreçlerinin günlük işleyişine yakınlığı, onu bunlar hakkında önemli bir bilgi kaynağı yapar. Bununla birlikte, iç denetim fonksiyonu da önemli bir bilgi kaynağıdır.","cmt_en": "Operational management’s proximity to the daily functioning of the risk management processes makes it an important source of information about them. However, the internal audit function is an important source of information as well."},{"tr": "Üst yönetim ve yönetim kurulu bu bilgiye iç denetimin sağlayabileceğinden daha erken ihtiyaç duyar.","en": "Senior management and the board need this information sooner than internal audit can provide it.","cmt_tr": "Yönetim kurulu, iç denetim fonksiyonunun iş planını onaylar.","cmt_en": "The board approves the internal audit function’s workplan."},{"tr": "İç denetim fonksiyonu, devam eden risk yönetimi faaliyetlerinin başarısı hakkında bir bilgi kaynağı olarak kullanılmalıdır.","en": "The internal audit function should be used as a source of information about the success of ongoing risk management activities.","cmt_tr": "Risk yanıtlarının yeterliliğinin (ve risklerin değişen doğasının) süregelen değerlendirmeleri için en önemli iki bilgi kaynağı, faaliyetlerin kendisine en yakın olanlar ve denetim fonksiyonudur. Operasyon yöneticileri, özellikle belirli bir yanıt stratejisinin tasarımında payları varsa, riskler konusunda her zaman tarafsız olmayabilir.","cmt_en": "The two most important sources of information for ongoing assessments of the adequacy of risk responses (and the changing nature of the risks) are those closest to the activities themselves and the audit function. Operating managers may not always be objective about risks, especially if they had a stake in designing a particular response strategy."}],"answer": 3},{"q_tr": "Risk yönetimi hakkında aşağıdakilerden hangisi doğru bir ifadedir? Risk yönetimi süreçleri","q_en": "Which of the following is a true statement about risk management? Risk management processes","options": [{"tr": "Nicel veya öznel olabilir.","en": "May be quantitative or subjective.","cmt_tr": "Risk yönetimi süreçleri nicel veya öznel olabilir.","cmt_en": "Risk management processes may be quantitative or subjective."},{"tr": "Resmi bir süreç olmalıdır.","en": "Must be a formal process.","cmt_tr": "Risk yönetimi süreçleri resmi veya gayri resmi olabilir.","cmt_en": "Risk management processes may be formal or informal."},{"tr": "Merkezileştirilmiş olmalıdır.","en": "Must be centralized.","cmt_tr": "Risk yönetimi süreçleri iş birimlerine gömülü veya merkezileştirilmiş olabilir.","cmt_en": "Risk management processes may be embedded in business units or centralized."},{"tr": "Tamamen dış sağlayıcılara dış kaynak olarak verilebilir.","en": "May be entirely outsourced to external providers.","cmt_tr": "Risk yönetimi süreçleri yönetimin sorumluluğundadır. Dış sağlayıcılar risk yönetimine ilişkin danışmanlık hizmetleri sunabilir, ancak sorumluluk kuruluş içindedir.","cmt_en": "Risk management processes are the responsibility of management. External providers may provide advisory services in regard to risk management, but responsibility resides within the organization."}],"answer": 0},{"q_tr": "Kuruluşun risk yönetimi ve kontrol süreçlerinden kim sorumludur?","q_en": "Who is responsible for the organization’s risk management and control processes?","options": [{"tr": "İç denetçi ve üst yönetim.","en": "The internal auditor and senior management.","cmt_tr": "İç denetçi, bulgular ve öneriler için risk yönetimini değerlendirir. Ancak iç denetçi, süreçlerinin operasyonel yönetiminden sorumlu değildir.","cmt_en": "The internal auditor evaluates risk management as a basis for findings and recommendations. But the internal auditor is not responsible for operational management of its processes."},{"tr": "Üst yönetim ve yönetim kurulu.","en": "Senior management and the board of directors.","cmt_tr": "Risk yönetimi, üst yönetim ve yönetim kurulunun temel sorumluluğudur. İş hedeflerine ulaşmak için yönetim, sağlam risk yönetimi süreçlerinin mevcut ve işlevsel olmasını sağlar. Yönetim kurulları, uygun risk yönetimi süreçlerinin mevcut olduğunu ve bu süreçlerin yeterli ve etkili olduğunu belirlemek üzere gözetim rolü üstlenir. Yönetim ve yönetim kurulu, kuruluşun risk yönetimi ve kontrol süreçlerinden sorumludur.","cmt_en": "Risk management is a key responsibility of senior management and the board. To achieve its business objectives, management ensures that sound risk management processes are in place and functioning. Boards have an oversight role to determine that appropriate risk management processes are in place and that they are adequate and effective. In this role, they may direct the internal audit function to assist them by examining, evaluating, reporting, or recommending improvements in the adequacy and effectiveness of risk management processes. Management and the board are responsible for the organization’s risk management and control processes."},{"tr": "Dış denetçi ve üst yönetim.","en": "The external auditor and senior management.","cmt_tr": "Dış denetim fonksiyonu, kuruluşun risk yönetimi sistemlerinden sorumlu değildir. Yönetim, dış denetçiden kontrol ortamındaki eksiklikleri raporlamasını isteyebilir, ancak sorumluluk yönetimindir.","cmt_en": "The external audit function is not responsible for the organization’s risk management systems. Management may ask the external auditor to report any deficiencies in the control environment, but the responsibility is management’s."},{"tr": "İç denetçi, üst yönetim ve yönetim kurulu.","en": "The internal auditor, senior management, and the board.","cmt_tr": "İç denetçiler, risk yönetimi ve kontrol süreçlerinden birincil olarak sorumlu değildir.","cmt_en": "The internal auditors are not primarily responsible for risk management and control processes."}],"answer": 1},{"q_tr": "İç denetçi, aşağıdakilerden kaynaklanan varlıkların korunmasına ilişkin kontrollerin yeterliliğini değerlendirmelidir:","q_en": "The internal auditor should evaluate the adequacy of controls over the safeguarding of assets from","options": [{"tr": "Güvenilir olmayan finansal bilgiler.","en": "Unreliable financial information.","cmt_tr": "Finansal bilgilerin güvenilirliği, varlıkların korunmasıyla değil, finansal bilgi raporlamasıyla ilgilidir.","cmt_en": "Reliability of financial information relates to reporting financial information, not safeguarding of assets."},{"tr": "Zimmete geçirme planları.","en": "Misappropriation schemes.","cmt_tr": "İç denetçi, zimmete geçirilme riski olan varlıkları belirlemelidir. İç denetim fonksiyonu, etkili bir iç denetim stratejisi ve planı geliştirmek için kuruluşun yönetişim, risk yönetimi ve kontrol süreçlerini anlamalıdır. Buna göre, fonksiyon varlıkların korunmasına ilişkin yönetişim, operasyonlar ve bilgi sistemleriyle ilgili risk maruziyetlerini değerlendirmelidir.","cmt_en": "The internal auditor should identify assets at risk of being misappropriated. The internal audit function must understand the organization’s governance, risk management, and control processes to develop an effective internal audit strategy and plan. Accordingly, the internal audit function must evaluate risk exposures relating to governance, operations, and information systems regarding the safeguarding of assets. For example, internal auditors evaluate risk exposures from theft, fire, improper or illegal activities, and the elements."},{"tr": "İsraf.","en": "Waste.","cmt_tr": "Varlıkların israfı, varlıkların korunmasıyla değil, faaliyetlerin verimliliğiyle ilgilidir.","cmt_en": "Waste of assets relates to efficiency of operations, not safeguarding of assets."},{"tr": "Fiziksel tesislerin yetersiz kullanımı.","en": "Underusage of physical facilities.","cmt_tr": "Tesislerin yetersiz kullanımı, varlıkların korunmasıyla değil, faaliyetlerin verimliliğiyle ilgilidir.","cmt_en": "Underuse of facilities relates to efficiency of operations, not safeguarding of assets."}],"answer": 1},{"q_tr": "Aşağıdakilerden hangisi iç denetim fonksiyonunun güvence rolüdür?","q_en": "Which of the following is an assurance role of the internal audit function?","options": [{"tr": "Risk yönetimi eğitimi vermek.","en": "Providing risk management training.","cmt_tr": "Risk yönetimi eğitimi vermek, güvence görevi değil danışmanlık görevidir.","cmt_en": "Providing risk management training is an advisory engagement, not an assurance engagement."},{"tr": "Risk yönetimi iyileştirme önerilerini uygulamak.","en": "Implementing risk management improvement recommendations.","cmt_tr": "İç denetçiler risk yönetimi iyileştirmelerini uygulamaktan sorumlu değildir. Yönetim sorumludur.","cmt_en": "Internal auditors are not responsible for implementing risk management improvements. Management is responsible."},{"tr": "Risk yönetimi süreçlerinin etkili olup olmadığını belirlemek.","en": "Determining whether risk management processes are effective.","cmt_tr": "Risk yönetimi süreçlerinin etkili olup olmadığının belirlenmesi, iç denetçinin şu değerlendirmesinden kaynaklanan bir yargıdır: (1) kuruluş hedeflerinin kuruluşun misyonunu desteklemesi; (2) önemli risklerin belirlenip değerlendirilmesi; (3) kuruluşun risk iştahı dahilinde uygun risk yanıtlarının seçilmesi; ve (4) ilgili risk bilgilerinin kuruluş genelinde zamanında yakalanıp iletilmesi.","cmt_en": "Determining whether risk management processes are effective is a judgment resulting from the internal auditor’s assessment that (1) organizational objectives support the organization’s mission; (2) significant risks are identified and assessed; (3) appropriate risk responses are selected that are within the organization’s risk appetite; and (4) relevant risk information is captured and communicated in a timely manner across the organization, enabling staff, management, and the board to carry out their responsibilities"},{"tr": "Kuruluşun risk iştahını belirlemek.","en": "Setting the organization’s risk appetite.","cmt_tr": "İç denetim fonksiyonu, bağımsızlığını ve tarafsızlığını tehdit edecek roller üstlenmemelidir; bu nedenle iç denetim fonksiyonu risk iştahını belirlememelidir.","cmt_en": "The internal audit function should not undertake roles that threaten its independence and objectivity; therefore, the internal audit function should not set the risk appetite."}],"answer": 2},{"q_tr": "Aşağıdakilerden hangisi iç denetim fonksiyonunun üstlenmesi gereken bir roldür?","q_en": "Which of the following is a role that the internal audit function should undertake?","options": [{"tr": "Risk yönetimi süreçlerinin gözetimi.","en": "Oversight of risk management processes.","cmt_tr": "İç denetim fonksiyonunun bağımsızlığını ve tarafsızlığını tehdit eden bir risk yönetimi rolü, risk yönetimi süreçlerinin gözetimidir. Yönetim kurulunun gözetim fonksiyonu vardır ve yönetim sağlam risk yönetimi süreçlerinin işlevsel olmasını sağlar.","cmt_en": "A risk management role that threatens the independence and objectivity of the internal audit function is oversight of risk management processes. The board has an oversight function, and management ensures that sound risk management processes are functioning."},{"tr": "Risk yanıtları hakkında karar vermek.","en": "Making decisions on risk responses.","cmt_tr": "Risk yanıtlarına yönetim karar verir.","cmt_en": "Management decides risk responses."},{"tr": "Yönetim adına riskleri yönetmek.","en": "Managing risks on management’s behalf.","cmt_tr": "İç denetim fonksiyonu, yönetim adına risk yanıtlarının uygulanmasında yalnızca danışmanlık rolüne sahip olabilir. İç denetçiler, riskleri fiilen yöneterek herhangi bir yönetim sorumluluğu üstlenmemelidir.","cmt_en": "The internal audit function may have only an advisory role in implementing risk responses on management’s behalf. Internal auditors must not assume any management responsibility by actually managing risks."},{"tr": "Risk yönetimi kontrollerinde iyileştirmeler önermek.","en": "Recommending improvements in risk management controls.","cmt_tr": "İç denetim fonksiyonu, risk yönetimi yöntemleri ve kontrollerini belirleme, değerlendirme, raporlama veya iyileştirmeler önerme konusunda yönlendirilebilir.","cmt_en": "The internal audit function may be directed to identify, evaluate, report, or recommend improvements in risk management methods and controls."}],"answer": 3},{"q_tr": "Aşağıdakilerden hangisi risk yönetiminin en iyi tanımıdır?","q_en": "Which of the following is the best description of risk management?","options": [{"tr": "Kayıp olasılıklarını tahmin etmek ve bu kayıpların beklenen değerlerini hesaplamak.","en": "Estimating probabilities of losses and calculating the expected values of those losses.","cmt_tr": "Olasılıkları kullanarak kayıpların beklenen değerini hesaplamak, risk değerlendirmenin bir yönüdür ve risk yönetiminin eksik bir tanımıdır.","cmt_en": "Calculating the expected value of losses using probabilities is one aspect of assessing risk and an incomplete definition of risk management."},{"tr": "Kuruluş içindeki tüm riskleri belirlemek ve değerlendirmek.","en": "Identifying and assessing all risks within the organization.","cmt_tr": "Tüm riskleri belirlemek, mümkün olsa bile verimsiz ve etkisizdir. Ayrıca, risklerin belirlenmesi risk yönetiminin yalnızca bir bileşenidir.","cmt_en": "It is inefficient and ineffective to identify all risks, even if it were possible. In addition, identifying risks is only one component of risk management."},{"tr": "Hedeflere ulaşıldığına dair makul güvence sağlamak için önemli riskleri belirlemek, değerlendirmek ve yönetmek.","en": "Identifying, assessing, and managing significant risks to provide reasonable assurance that objectives are achieved.","cmt_tr": "Risk yönetimi, herhangi bir düzeyde, (1) önemli risklerin belirlenmesi ve değerlendirilmesi ile (2) ilişkili riskin kuruluşun risk iştahı dahilinde yönetilmesinden oluşur. Risk yönetimi ayrıca kuruluş hedeflerine ulaşıldığına dair makul güvence sağlamalıdır.","cmt_en": "Risk management, at any level, consists of (1) identifying and assessing significant risks and (2) managing the associated risk to be within the organization’s risk appetite. Risk management should also provide reasonable assurance that organizational objectives are achieved."},{"tr": "Öngörülmeyen olayları yönetmek ve mali kayıpları en aza indirmek için sigorta kapsamını optimize etmek.","en": "Optimizing insurance coverage to manage unforeseen events and minimize financial loss.","cmt_tr": "Sigorta kapsamını optimize etmek, riskleri yönetmenin bir yönüdür, ancak risk yönetiminin eksik bir tanımıdır.","cmt_en": "Optimizing insurance coverage is one aspect of managing risks, but it is an incomplete definition of risk management."}],"answer": 2},{"q_tr": "Risk yönetiminin kuruluş hedeflerine ulaşılması konusunda sağlayabileceği güvence düzeyi nedir?","q_en": "The level of assurance that risk management can provide regarding the achievement of entity objectives is","options": [{"tr": "Olumlu.","en": "Positive.","cmt_tr": "Olumlu, bir güvence düzeyi değil, güvence türüdür.","cmt_en": "Positive is a type, not a level, of assurance."},{"tr": "Mutlak.","en": "Absolute.","cmt_tr": "Hiçbir risk yanıtı seti, hedeflere ulaşılacağına dair mutlak güvence sağlayamaz.","cmt_en": "No set of risk responses can provide absolute assurance that objectives will be achieved."},{"tr": "Makul.","en": "Reasonable.","cmt_tr": "Risk yönetimi, kuruluş hedeflerine ulaşıldığına dair makul güvence sağlamalıdır.","cmt_en": "Risk management should provide reasonable assurance that entity objectives are achieved."},{"tr": "Olumsuz.","en": "Negative.","cmt_tr": "Olumsuz, bir güvence düzeyi değil, güvence türüdür.","cmt_en": "Negative is a type, not a level, of assurance."}],"answer": 2},{"q_tr": "Üst yönetim, risk yönetimi konusundaki son müzakerelerinde aşağıdaki adımları gerçekleştirmiştir: 1. Kuruluşun misyonuna ulaşmasını engelleyebilecek tüm riskleri belirlemiştir. 2. Olumsuz etkinin hem önemli hem de olası olduğu alanlardan biri olan fazla ekipmanla ilişkili riskleri azaltmak için yeni prosedürler tasarlamıştır. 3. Fazla ekipman müdürünün yeni prosedürleri anlamasını ve uygulamasını sağlamıştır. 4. İç denetimden yeni prosedürlerin etkililiği hakkında düzenli raporları gözden geçirmiştir. Süreçteki en ciddi eksiklik aşağıdakilerden hangisidir?","q_en": "Senior management performed the following steps during its recent deliberations over risk management: 1. Identified all the risks that might impede the achievement of the organization’s mission. 2. Designed new procedures to mitigate the risks associated with surplus equipment, one of the areas in which the risk of adverse impact was both material and likely. 3. Ensured that the director of surplus management understood and enacted the new procedures. 4. Reviewed regular reports from internal audit about the effectiveness of the new procedures for surplus equipment. The most serious deficiency with the process is that","options": [{"tr": "Üst yönetim, risk yanıtını oluşturmadan önce ekipman yönetimi müdürüne danışmamıştır.","en": "Senior management did not consult with the director of equipment management before formulating the risk response.","cmt_tr": "Bir faaliyete en yakın olanlarla (genellikle en fazla bilgiye sahip olan) istişare edilmemesi en ciddi eksiklik değildir.","cmt_en": "Failing to consult with those closest to an activity (who usually have the most knowledge about it) is not the most serious deficiency."},{"tr": "Üst yönetim, belirlenen riskleri önceliklendirmemiştir.","en": "Senior management did not prioritize the identified risks.","cmt_tr": "Yönetim, diğer belirlenen risklerin potansiyel etkilerini dikkate almadan risk alanlarından birine yönelik risk prosedürleri tasarlamıştır.","cmt_en": "Management designed risk procedures related to one of the risk areas without regard to the potential effects of the other identified risks."},{"tr": "İç denetim sürece çok geç dahil edilmiştir.","en": "Internal audit was involved in the process too late.","cmt_tr": "Risk yönetimi süreci yönetimin sorumluluğundadır. İzleme, risk yönetimi sürecinde iç denetim fonksiyonuna atanabilecek uygun bir faaliyettir.","cmt_en": "The risk management process is management’s responsibility. Monitoring is an appropriate activity within the risk management process to be assigned to the internal audit function."},{"tr": "Yönetim kurulu, baş risk sorumlusu pozisyonu oluşturmamıştır.","en": "The board did not create the position of chief risk officer.","cmt_tr": "Kuruluşun risk yönetimi faaliyetlerini koordine etmek için bir baş risk sorumlusu atanabilir. Ancak tüm kuruluşlar maliyet-fayda değerlendirmesi açısından böyle bir pozisyon oluşturmayı haklı kılamaz.","cmt_en": "A chief risk officer may be appointed to coordinate the organization’s risk management activities. However, not all organizations can justify creating such a position in terms of the cost and benefits tradeoff."}],"answer": 1},{"q_tr": "Yönetim kurulunun risk yönetimi sürecindeki rolü nedir?","q_en": "What is the board’s role in the risk management process?","options": [{"tr": "Risk yönetimi süreçlerini denetlemek.","en": "Oversees risk management processes.","cmt_tr": "Risk yönetimi, üst yönetim ve yönetim kurulunun temel sorumluluğudur. Yönetim kurulları gözetim fonksiyonuna sahiptir ve risk yönetimi süreçlerinin mevcut, yeterli ve etkili olduğunu belirler.","cmt_en": "Risk management is a key responsibility of senior management and the board. Boards have an oversight function and determine that risk management processes are in place, adequate, and effective."},{"tr": "Sağlam risk yönetimi süreçlerinin işlevsel olmasını sağlamak.","en": "Ensures that sound risk management processes are functioning.","cmt_tr": "Yönetim, sağlam risk yönetimi süreçlerinin işlevsel olmasını sağlar. Yönetim, kuruluşun tüm seviyelerindeki risklere odaklanmalı ve bunları yönetmek için gerekli önlemleri almalıdır.","cmt_en": "Management ensures that sound risk management processes are functioning. Management must focus on risks at all levels of the organization and take the necessary action to manage them."},{"tr": "Risk yönetimi yöntemleri ve kontrollerinin uygulanmasında danışmanlık yapmak.","en": "Advise in implementing risk management methods and controls.","cmt_tr": "Güvence rolüne ek olarak, iç denetim fonksiyonunun risk yönetimi yöntemleri ve kontrollerini belirleme, değerlendirme ve uygulama konusunda danışmanlık rolü vardır. Seçilen yöntemlerin kuruluş için kapsamlı ve uygun olduğunu belirler.","cmt_en": "In addition to its assurance role, the internal audit function has an advisory role in identifying, evaluating, and implementing risk management methods and controls. It determines that the methods chosen are comprehensive and appropriate for the organization."},{"tr": "Risk yönetimi süreçlerinin iyileştirilmesine katkıda bulunmak.","en": "Contributes to the improvement of risk management processes.","cmt_tr": "İç denetim
