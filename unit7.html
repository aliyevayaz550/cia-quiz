        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  // Save history entry when quiz is fully completed
  if (!MISTAKES_MODE && !HISTORY_MISTAKES_MODE) {
    saveHistory();
  }

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function updateLangBtns(l) {
  document.querySelectorAll('#lang-group .lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
}

function setLang(l) {
  lang = l;
  updateLangBtns(l);
  if(!quizStarted) {
    const desc = document.getElementById("welcome-desc");
    if(desc && desc.dataset[l]) desc.textContent = desc.dataset[l];
    return;
  }
  updateProgress();
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}


// ── MISTAKES MODE ─────────────────────────────────────────────────────────────
const MISTAKES_MODE = new URLSearchParams(window.location.search).get('mode') === 'mistakes';

if (MISTAKES_MODE) {
  (function() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) { window.location.href = window.location.pathname; return; }
      const data = JSON.parse(raw);
      const sa = data.answered || [];
      const sc = data.correctArr || [];

      // Filter QUIZ to only incorrectly answered questions
      let offset = 0;
      let totalMistakes = 0;
      SHEETS.forEach(sname => {
        const orig = QUIZ[sname];
        const keep = [];
        for (let i = 0; i < orig.length; i++) {
          if (sa[offset + i] && !sc[offset + i]) {
            orig[i]._chosen = undefined;
            keep.push(orig[i]);
          }
        }
        offset += orig.length;
        QUIZ[sname] = keep;
        totalMistakes += keep.length;
      });

      if (totalMistakes === 0) { window.location.href = window.location.pathname; return; }

      // Don't overwrite original progress
      saveProgress = function() {};
      clearProgress = function() {};

      // Update UI for mistakes mode
      const appTitle = document.getElementById("app-title");
      if (appTitle) appTitle.textContent += " — Səhvlər";

      const welc = document.getElementById("welcome");
      if (welc) {
        const h1 = welc.querySelector("h1");
        if (h1) h1.innerHTML = `Səhv Suallar<br><span style="color:var(--gold);font-size:.65em">${appTitle ? appTitle.textContent : ''}</span>`;
        const desc = document.getElementById("welcome-desc");
        if (desc) desc.textContent = totalMistakes + (lang === "tr" ? " səhv sual — yenidən işlə" : " wrong answers — retry them");
        // Update stats
        const statsItems = welc.querySelectorAll(".ws-num");
        if (statsItems.length >= 2) {
          statsItems[0].textContent = SHEETS.filter(s => QUIZ[s].length > 0).length;
          statsItems[1].textContent = totalMistakes;
          if (statsItems[2]) statsItems[2].textContent = totalMistakes * 4;
        }
        // Change buttons
        const mainBtn = document.getElementById("btn-main-start");
        if (mainBtn) mainBtn.textContent = lang === "tr" ? "▶ Səhvləri İşlə" : "▶ Retry Mistakes";
        const freshBtn = document.getElementById("btn-fresh-start");
        if (freshBtn) freshBtn.style.display = "none";
      }

      // Override startOrResume to skip loading saved progress (we already filtered)
      const _origStartOrResume = startOrResume;
      startOrResume = function() {
        initState();
        quizStarted = true;
        document.getElementById("welcome").style.display = "none";
        document.getElementById("chapters-scroll").style.display = "";
        document.getElementById("overall-result").className = "";
        buildChapterTabs();
        goToChapter(0);
      };

      // Override goToMenu to go back without ?mode
      goToMenu = function() { window.location.href = "quiz_menu.html"; };

    } catch(e) { console.error("Mistakes mode error:", e); }
  })();
}


// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
  // Render history on welcome screen
  renderHistory();
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
// ── HISTORY SYSTEM ──────────────────────────────────────────────────────────
function saveHistory() {
  try {
    const tc = totalCorrect();
    const ta = totalAnswered();
    const tq = totalQuestions();
    const pct = tq ? Math.round(tc/tq*100) : 0;

    const chapters = SHEETS.map((sname, ci) => {
      const s = getChapterStats(ci);
      return { name: sname, correct: s.c, wrong: s.t - s.c, total: s.total };
    });

    const mistakeIndices = [];
    for (let i = 0; i < answered.length; i++) {
      if (answered[i] && !correctArr[i]) mistakeIndices.push(i);
    }

    const entry = {
      date: new Date().toISOString(),
      correct: tc,
      wrong: ta - tc,
      total: tq,
      pct: pct,
      chapters: chapters,
      mistakeIndices: mistakeIndices
    };

    let history = [];
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) history = JSON.parse(raw);
    } catch(e) {}

    history.unshift(entry);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) { console.error("saveHistory error:", e); }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function renderHistory() {
  const area = document.getElementById("history-area");
  if (!area) return;
  const history = loadHistory();
  if (history.length === 0) { area.innerHTML = ""; return; }

  const circ = 2 * Math.PI * 18;
  const titleText = lang === "tr" ? "Tarixçə" : "History";

  let html = `<div class="history-title">${titleText}</div>`;

  history.forEach((entry, idx) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(lang === "tr" ? "az-AZ" : "en-US", {
      day: "numeric", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    const fill = circ * (1 - entry.pct / 100);
    const ringColor = entry.pct >= 75 ? "var(--correct)" : entry.pct >= 50 ? "var(--gold)" : "var(--wrong)";
    const hasMistakes = entry.mistakeIndices && entry.mistakeIndices.length > 0;
    const mistakeCount = hasMistakes ? entry.mistakeIndices.length : 0;
    const retryLabel = lang === "tr"
      ? `${mistakeCount} səhv — təkrarla`
      : `${mistakeCount} wrong — retry`;

    html += `
      <div class="history-card">
        <div class="hc-ring">
          <svg viewBox="0 0 44 44">
            <circle class="hc-ring-track" cx="22" cy="22" r="18"/>
            <circle class="hc-ring-fill" cx="22" cy="22" r="18"
              stroke="${ringColor}"
              stroke-dasharray="${circ}" stroke-dashoffset="${fill}"/>
          </svg>
          <div class="hc-ring-label">${entry.pct}%</div>
        </div>
        <div class="hc-info">
          <div class="hc-date">${dateStr}</div>
          <div class="hc-stats">
            <span class="hc-correct">✓ ${entry.correct}</span> ·
            <span class="hc-wrong">✗ ${entry.wrong}</span> ·
            ${entry.total} ${lang === "tr" ? "sual" : "Q"}
          </div>
        </div>
        ${hasMistakes ? `<div class="hc-actions">
          <button class="hc-retry-btn" onclick="retryHistoryMistakes(${idx})">
            ${retryLabel}
          </button>
        </div>` : `<div class="hc-actions" style="font-size:11px;color:var(--correct);font-weight:700">✓ ${lang==="tr"?"Mükəmməl":"Perfect"}</div>`}
      </div>`;
  });

  area.innerHTML = html;
}

function retryHistoryMistakes(histIdx) {
  try {
    const history = loadHistory();
    if (!history[histIdx]) return;
    const entry = history[histIdx];
    const mistakeIndices = new Set(entry.mistakeIndices || []);
    if (mistakeIndices.size === 0) return;

    localStorage.setItem(HISTORY_KEY + "_retry", JSON.stringify(entry.mistakeIndices));
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    window.location.href = baseUrl + "?mode=history_mistakes";
  } catch(e) { console.error("retryHistoryMistakes error:", e); }
}

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
