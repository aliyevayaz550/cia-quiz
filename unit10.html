<script>

// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Fraud: Risks and Types": [{"q_tr": "Hilekârlığı diğer suç veya usulsüzlük türlerinden ayıran temel özellik, hilekârlığın her zaman aşağıdakilerden hangisini içermesidir?", "q_en": "A key feature that distinguishes fraud from other types of crime or impropriety is that fraud always involves the", "options": [{"tr": "Mülkün zorla veya şiddetle ele geçirilmesi.", "en": "Violent or forceful taking of property.", "cmt_tr": "Hile genellikle güç veya şiddet içermez.", "cmt_en": "Fraud usually does not involve force or violence."}, {"tr": "Yönetim düzeyindeki personelin aldatıcı suistimali.", "en": "Deceitful wrongdoing of management-level personnel.", "cmt_tr": "Bir kuruluşun herhangi bir düzeyindeki çalışanlar hile yapabilir.", "cmt_en": "Employees at any level in an organization can commit fraud."}, {"tr": "Failin yasal muhafazasında bulunan mülkün hukuka aykırı dönüştürülmesi.", "en": "Unlawful conversion of property that is lawfully in the custody of the perpetrator.", "cmt_tr": "Failin yasal muhafazasında bulunan mülkün hukuka aykırı dönüştürülmesi, yalnızca bir hile türü olan zimmete geçirmeyi tanımlar.", "cmt_en": "Unlawful conversion of property that is lawfully in the custody of the perpetrator describes embezzlement, which is only one type of fraud."}, {"tr": "Önemli bir gerçeğin yanlış sunulması veya gizlenmesi.", "en": "False representation or concealment of a material fact.", "cmt_tr": "Hile, IIA Sözlüğü'nde \"bireylerin veya kuruluşların haksız ya da yasadışı kişisel veya ticari avantaj elde etmek amacıyla gerçekleştirdiği aldatma, gizleme, sahtekârlık, varlık veya bilgi zimmeti, sahtecilik ya da güven ihlali ile nitelendirilen her türlü kasıtlı eylem\" olarak tanımlanmaktadır.", "cmt_en": "Fraud is defined in The IIA Glossary as “[a]ny intentional act characterized by deceit, concealment, dishonesty, misappropriation of assets or information, forgery, or violation of trust perpetrated by individuals or organizations to secure unjust or illegal personal or business advantage.”"}], "answer": 3}, {"q_tr": "Büyük bir sözleşmenin ihalesini denetlerken, iç denetçi aşağıdakilerden hangisini ihale hilesi planının kırmızı bayrağı olarak değerlendirmelidir?", "q_en": "When auditing the award of a major contract, which of the following should an internal auditor suspect as a red flag for a bidding fraud scheme?", "options": [{"tr": "Sonraki değişiklik emirleri düşük teklif kalemlerinin gereksinimlerini artırmaktadır.", "en": "Subsequent change orders increase requirements for low-bid items.", "cmt_tr": "Düşük teklif kalemlerinin gereksinimlerini artıran sonraki değişiklik emirleri rutin uygulamalardır.", "cmt_en": "Subsequent change orders that increase requirements for low-bid items are routine occurrences."}, {"tr": "Fiili sözleşmedeki önemli şartlar, teklif talebindeki şartlardan farklıdır.", "en": "Material contract requirements are different on the actual contract than on the request for bids.", "cmt_tr": "İç denetim fonksiyonu, hile olasılığını ve kuruluşun hile riskini nasıl yönettiğini değerlendirmelidir. Teklif talebindeki önemli sözleşme şartlarının fiili sözleşmeden farklı olması hiledir. Bu tür hile, teklif talebinde teklif sahipleri için daha uygun koşullar sunarak teklif tutarlarını şişirir.", "cmt_en": "The internal audit function must evaluate the potential for the occurrence of fraud and how the organization manages fraud risk. According to The IIA Glossary, fraud is any illegal act characterized by deceit, concealment, or violation of trust. It is fraudulent for the material contract requirements on the request for bids to differ from the actual contract. This type of fraud inflates bid amounts by having more bidder-friendly requirements on the request for bids than on the actual contract."}, {"tr": "Çalışanların yüksek bir yüzdesi dolaylı hesaplara yüklenmektedir.", "en": "A high percentage of employees are charged to indirect accounts.", "cmt_tr": "Çalışanların yüksek bir yüzdesi, maliyetleri genel gider olarak sınıflandırılan işler yapıyor olabilir.", "cmt_en": "A high percentage of employees may perform work resulting in costs properly classified as overhead."}, {"tr": "Kaybeden teklif sahiplerine geri bildirim verilmemektedir.", "en": "Losing bidders are not given feedback.", "cmt_tr": "Kaybeden teklif sahiplerine geri bildirim vermemek yaygın bir ticari uygulamadır.", "cmt_en": "Not providing losing bidders with feedback is a common business practice."}], "answer": 1}, {"q_tr": "Hileyi diğer çalışan suçlarından ayıran bir faktör, hilenin aşağıdakilerden hangisini içermesidir?", "q_en": "One factor that distinguishes fraud from other employee crimes is that fraud involves", "options": [{"tr": "Kasıtlı aldatma.", "en": "Intentional deception.", "cmt_tr": "Hile, IIA Sözlüğü'nde \"bireylerin veya kuruluşların haksız ya da yasadışı kişisel veya ticari avantaj elde etmek amacıyla gerçekleştirdiği aldatma, gizleme, sahtekârlık, varlık veya bilgi zimmeti, sahtecilik ya da güven ihlali ile nitelendirilen her türlü kasıtlı eylem\" olarak tanımlanmaktadır.", "cmt_en": "Fraud is defined in The IIA Glossary as “[a]ny intentional act characterized by deceit, concealment, dishonesty, misappropriation of assets or information, forgery, or violation of trust perpetrated by individuals or organizations to secure unjust or illegal personal or business advantage.”"}, {"tr": "Failin kişisel kazanç elde etmesi.", "en": "Personal gain for the perpetrator.", "cmt_tr": "Hile, kuruluş yararına veya bencil olmayan nedenlerle de işlenebilir.", "cmt_en": "Fraud may be perpetrated for the organization’s benefit or for otherwise unselfish reasons."}, {"tr": "Kuruluş dışındaki bir tarafla işbirliği.", "en": "Collusion with a party outside the organization.", "cmt_tr": "Bir çalışan tek başına hareket edebilir.", "cmt_en": "An employee may act alone."}, {"tr": "Kötü niyetli güdüler.", "en": "Malicious motives.", "cmt_tr": "Hile, kuruluş yararına veya bencil olmayan nedenlerle de işlenebilir.", "cmt_en": "Fraud may be perpetrated for the organization’s benefit or for otherwise unselfish reasons."}], "answer": 0}, {"q_tr": "Orta ölçekli bölgesel bir firma, marketlere paketlenmiş atıştırmalık dağıtmaktadır. Rutin bir envanter sayımı, dağıtım araçlarından önemli miktarda eksik envanter olduğunu ortaya koymuştur. Aşağıdakilerden hangisi hile fırsatı yaratabilecek bir kontrol zayıflığını göstermektedir?", "q_en": "A medium-sized regional firm distributes packaged snack foods to convenience stores. A routine inventory has revealed significant amounts of inventory missing from the delivery trucks. Which of the following suggests a control weakness that may provide an opportunity for fraud?", "options": [{"tr": "Politika ve prosedür kılavuzu, izin verilen ve yasaklanan eylemleri açıkça tanımlamaktadır.", "en": "The policy and procedure manual clearly defines allowed and prohibited actions.", "cmt_tr": "Ayrıntılı bir politika ve prosedür kılavuzu bir kontrol gücüdür.", "cmt_en": "A detailed policy and procedure manual is a control strength."}, {"tr": "Envanter araçlara yüklenirken dikkatli sayımlar yapılmaktadır.", "en": "Careful counts are made as inventory is loaded on the trucks.", "cmt_tr": "Araçlar yüklenirken yapılan envanter sayımları eksikliklerin yönetimin dikkatine sunulmasına yardımcı olur, ancak bunları önlemez.", "cmt_en": "Inventory counts made at the time the trucks are loaded will help to bring the shortages to management’s attention but will not prevent them."}, {"tr": "Depoya erişim birkaç güvenilir çalışanla sınırlıdır.", "en": "Access to the warehouse is restricted to a few trusted employees.", "cmt_tr": "Depoya erişimi kısıtlamak bir kontrol gücüdür.", "cmt_en": "Restricting access to the warehouse is a control strength."}, {"tr": "Kamyon sürücülerinin istihdam avantajı olarak araçları kişisel amaçlarla kullanmasına ve geceleri eve götürmesine izin verilmektedir.", "en": "Truck drivers are allowed to use the trucks for personal reasons, including taking them home at night, as a benefit of employment.", "cmt_tr": "Araçlara sınırsız erişim, sürücüler tarafından mal hırsızlığı fırsatları yaratmaktadır.", "cmt_en": "Unrestricted access to the trucks creates opportunities for theft of merchandise by the drivers."}], "answer": 3}, {"q_tr": "Bazı kırmızı bayrakları fark ettikten sonra, bir iç denetçinin hile olabileceğine dair farkındalığı artmıştır. Aşağıdakilerden hangisi iç denetçinin sorumluluğunu en iyi tanımlar?", "q_en": "After noting some red flags, an internal auditor has an increased awareness that fraud may be present. Which of the following best describes the internal auditor’s responsibility?", "options": [{"tr": "Bir soruşturma gerekip gerekmediğini belirlemek için faaliyetleri genişletmek.", "en": "Expand activities to determine whether an investigation is warranted.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini değerlendirmek ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermek yer alır.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended."}, {"tr": "Hile olasılığını üst yönetime ve yönetim kuruluna bildirmek ve nasıl devam etmek istediklerini sormak.", "en": "Report the possibility of fraud to senior management and the board and ask them how they would like to proceed.", "cmt_tr": "İç denetçi, hile göstergelerinin soruşturma önermeye yeterli olduğunu belirlemişse kuruluş içindeki uygun makamlara bildirimde bulunmalıdır.", "cmt_en": "The internal auditor should notify the appropriate authorities within the organization if (s)he has determined that the indicators of fraud are sufficient to recommend an investigation."}, {"tr": "İzlenecek yolun belirlenmesi için dış hukuk müşavirine danışmak ve önerilen görev iş programının hukuki açıdan kabul edilebilir olmasını sağlamak.", "en": "Consult with external legal counsel to determine the course of action to be taken, including the approval of the proposed engagement work program to make sure it is acceptable on legal grounds.", "cmt_tr": "İç denetçi, hile göstergelerine uygun yanıtı belirlemekten sorumludur. Hukuk müşaviri yalnızca danışma kapasitesinde hareket edebilir.", "cmt_en": "The internal auditor is responsible for determining the appropriate response to indicators of fraud. Legal counsel can act only in an advisory capacity."}, {"tr": "Konuyu denetim komitesine bildirmek ve olası hileyi araştırmak için dış hizmet sağlayıcılar adına fon talep etmek.", "en": "Report the matter to the audit committee and request funding for outside service providers to help investigate the possible fraud.", "cmt_tr": "İç denetçi, ancak hile göstergelerinin soruşturma önermeye yeterli olduğunu belirlemişse konuyu bildirmeli ve dış hizmet sağlayıcılar için fon talep etmelidir.", "cmt_en": "The internal auditor should report the matter and request funding for outside service providers only if (s)he has determined that the indicators of fraud are sufficient to recommend an investigation."}], "answer": 0}, {"q_tr": "Hilenin önlenmesinden birincil olarak sorumlu ayrı bir birimi olan bir kuruluşta, iç denetim fonksiyonu aşağıdakilerden hangisinden sorumludur?", "q_en": "In an organization with a separate division that is primarily responsible for the prevention of fraud, the internal audit function is responsible for", "options": [{"tr": "O birimin hileyi önlemeye yönelik aldığı önlemlerin yeterliliğini ve etkinliğini incelemek ve değerlendirmek.", "en": "Examining and evaluating the adequacy and effectiveness of that division’s actions taken to prevent fraud.", "cmt_tr": "Kontrol, hileyi önlemenin başlıca aracıdır. Yönetim, kontrolün kurulması ve sürdürülmesinden birincil olarak sorumludur. İç denetçiler, kontrollerin etkinliğini ve verimliliğini değerlendirerek ve sürekli iyileştirmeyi teşvik ederek kuruluşa yardımcı olmalıdır.", "cmt_en": "Control is the principal means of preventing fraud. Management is primarily responsible for the establishment and maintenance of control. Internal auditors must assist the organization by evaluating the effectiveness and efficiency of controls and promoting continuous improvement. Internal auditors should be alert to opportunities that could allow fraud and evaluate the indicators of fraud. For example, internal auditors can evaluate whether management is actively overseeing the fraud risk management programs."}, {"tr": "O birimin iç kontrol sistemini kurmak ve sürdürmek.", "en": "Establishing and maintaining that division’s system of internal control.", "cmt_tr": "Kontrolü kurmak ve sürdürmek yönetimin sorumluluğudur.", "cmt_en": "Establishing and maintaining control is a responsibility of management."}, {"tr": "O birimin hile önleme faaliyetlerini planlamak.", "en": "Planning that division’s fraud prevention activities.", "cmt_tr": "Hile önleme faaliyetlerini planlamak yönetimin sorumluluğudur.", "cmt_en": "Planning fraud prevention activities is a responsibility of management."}, {"tr": "O birimin hile önleme faaliyetlerini kontrol etmek.", "en": "Controlling that division’s fraud prevention activities.", "cmt_tr": "Hile önleme faaliyetlerini kontrol etmek yönetimin sorumluluğudur.", "cmt_en": "Controlling fraud prevention activities is a responsibility of management."}], "answer": 0}, {"q_tr": "Hilekârlıktan şüphelenen bir iç denetçi ne yapmalıdır?", "q_en": "An internal auditor who suspects fraud should", "options": [{"tr": "Bir kayıp oluştuğunu belirlemek.", "en": "Determine that a loss has been incurred.", "cmt_tr": "Kaybın belirlenmesi hile failini uyarabilir. Fail kanıtları yok edebilir veya tehlikeye atabilir.", "cmt_en": "Determining the loss could alert the perpetrator of the fraud. The perpetrator could then destroy or compromise evidence."}, {"tr": "Varlıkların kontrolüne dahil olan kişilerle görüşme yapmak.", "en": "Interview those who have been involved in the control of assets.", "cmt_tr": "Varlıkların kontrolüne dahil olan kişilerle görüşme yapmak hile soruşturmasının bir parçasıdır.", "cmt_en": "Interviewing those who have been involved in the control of assets is part of the fraud investigation."}, {"tr": "Olaya karışmış olabilecek çalışanları tespit etmek.", "en": "Identify the employees who could be implicated in the case.", "cmt_tr": "Olaya karışmış olabilecek çalışanları tespit etmek hile soruşturmasının bir parçasıdır.", "cmt_en": "Identifying the employees who could be implicated in the case is part of the fraud investigation."}, {"tr": "Uygunsa bir soruşturma önermek.", "en": "Recommend an investigation if appropriate.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini değerlendirmek ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermek yer alır.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisinin olası bir hile göstergesi olarak değerlendirilme olasılığı en yüksektir?", "q_en": "Which of the following is most likely to be considered an indication of possible fraud?", "options": [{"tr": "Düşmanca bir devralma sonrasında yönetim ekibinin değiştirilmesi.", "en": "The replacement of the management team after a hostile takeover.", "cmt_tr": "Düşmanca bir devralma sonrasında yönetim ekibinin değiştirilmesi olağandışı değildir.", "cmt_en": "The replacement of the management team after a hostile takeover is not unusual."}, {"tr": "Kuruluşun finans yöneticilerinin hızlı devir hızı.", "en": "Rapid turnover of the organization’s financial executives.", "cmt_tr": "En etkili iç kontrol bile bazen işbirliğiyle atlatılabilir. Bu nedenle denetçi, yüksek personel devir hızı da dahil olmak üzere hilenin varlığına işaret edebilecek koşullara karşı duyarlı olmalıdır. Finans yöneticileri söz konusu olduğunda yüksek devir hızı, kârları şişirme, piyasada avantaj elde etme veya yetersizliği gizleme eğilimine işaret edebilir.", "cmt_en": "Even the most effective internal control can sometimes be circumvented, perhaps by collusion of two or more employees. Thus, an auditor must be sensitive to certain conditions that might indicate the existence of fraud, including high personnel turnover. In the case of financial executives, high turnover may suggest a pattern of inflation of profits to obtain bonuses or other benefits, to secure advantages in the marketplace, or to conceal incompetence or rash actions."}, {"tr": "Yeni pazarlara hızlı genişleme.", "en": "Rapid expansion into new markets.", "cmt_tr": "Yeni pazarlara hızlı genişleme olağandışı değildir.", "cmt_en": "Rapid expansion into new markets is not unusual."}, {"tr": "Kuruluşun vergi beyannamelerinin devlet denetimi.", "en": "A government audit of the organization’s tax returns.", "cmt_tr": "Kuruluşun vergi beyannamelerinin devlet denetimi olağandışı değildir.", "cmt_en": "A government audit of the organization’s tax returns is not unusual."}], "answer": 1}, {"q_tr": "İç denetçiler, görevleri sırasında hilekârlık ve diğer beyaz yakalı suç biçimlerine karşı uyanık olmalıdır. Hilekârlığı diğer beyaz yakalı suç türlerinden ayıran önemli özellik şudur:", "q_en": "In the course of their work, internal auditors must be alert for fraud and other forms of white- collar crime. The important characteristic that distinguishes fraud from other varieties of white- collar crime is that", "options": [{"tr": "Hile; aldatma, gizleme veya güven ihlali ile nitelendirilir.", "en": "Fraud is characterized by deceit, concealment, or violation of trust.", "cmt_tr": "Hile, IIA Sözlüğü'nde \"bireylerin veya kuruluşların haksız ya da yasadışı kişisel veya ticari avantaj elde etmek amacıyla gerçekleştirdiği aldatma, gizleme, sahtekârlık, varlık veya bilgi zimmeti, sahtecilik ya da güven ihlali ile nitelendirilen her türlü kasıtlı eylem\" olarak tanımlanmaktadır.", "cmt_en": "Fraud is defined in The IIA Glossary as “any intentional act characterized by deceit, concealment, dishonesty, misappropriation of assets or information, forgery, or violation of trust perpetrated by individuals or organizations to secure unjust or illegal personal or business advantage.”"}, {"tr": "Diğer beyaz yakalı suçlardan farklı olarak hile her zaman bir dış tarafa karşı işlenir.", "en": "Unlike other white-collar crimes, fraud is always perpetrated against an outside party.", "cmt_tr": "Hile kuruluş içinde de işlenebilir.", "cmt_en": "Fraud may be perpetrated internally."}, {"tr": "Beyaz yakalı suçlar genellikle kuruluş yararına işlenir, ancak hile bireye yarar sağlar.", "en": "White-collar crime is usually perpetrated for the benefit of an organization, but fraud benefits an individual.", "cmt_tr": "Hile, kuruluş yararına veya bencil olmayan nedenlerle de işlenebilir.", "cmt_en": "Fraud may be perpetrated for the organization’s benefit or for otherwise unselfish reasons."}, {"tr": "Beyaz yakalı suçlar genellikle dışarıdan kişiler tarafından kuruluş aleyhine işlenir, ancak hile içeriden kişiler tarafından kuruluş yararına işlenir.", "en": "White-collar crime is usually perpetrated by outsiders to the detriment of an organization, but fraud is perpetrated by insiders to benefit the organization.", "cmt_tr": "Hile hem içeriden hem dışarıdan kişiler tarafından işlenebilir ve kuruluşa hem yararlı hem zararlı olabilir.", "cmt_en": "Fraud may be perpetrated by insiders and outsiders, and it may be either beneficial or detrimental to an organization."}], "answer": 0}, {"q_tr": "İç denetçinin hile konusundaki sorumluluğu nedir?", "q_en": "What is the responsibility of the internal auditor with respect to fraud?", "options": [{"tr": "İç denetçi, hile göstergelerini belirlemek için yeterli bilgiye sahip olmalı, ancak uzman olması beklenmez.", "en": "The internal auditor should have sufficient knowledge to identify the indicators of fraud but is not expected to be an expert.", "cmt_tr": "İç denetçiler, hile riskini ve kuruluş tarafından nasıl yönetildiğini değerlendirmek için yeterli bilgiye sahip olmalıdır. Birincil sorumluluğu hileyi tespit etmek ve araştırmak olan bir kişinin uzmanlığına sahip olmaları beklenmez.", "cmt_en": "Internal auditors must have sufficient knowledge to evaluate the risk of fraud and the manner in which it is managed by the organization. They are not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud."}, {"tr": "İç denetçi, birincil sorumluluğu hileyi tespit etmek ve araştırmak olan bir kişiyle aynı yeteneğe sahip olmalıdır.", "en": "The internal auditor should have the same ability to detect fraud as a person whose primary responsibility is detecting and investigating fraud.", "cmt_tr": "İç denetçinin, birincil sorumluluğu hileyi tespit etmek ve araştırmak olan bir kişinin uzmanlığına sahip olması beklenmez.", "cmt_en": "The internal auditor is not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud."}, {"tr": "Bir iç denetçi, hileyi tespit edebilecek düzeyde yeterli bilgi ve eğitime sahip olmalıdır.", "en": "An internal auditor should have sufficient knowledge and training so that (s)he is able to detect fraud.", "cmt_tr": "Bir iç denetçi, hile göstergelerini belirlemek için yeterli bilgiye sahip olmalıdır; ancak hileyi tespit edebilecek düzeyde bilgi ve eğitime sahip olması zorunlu değildir.", "cmt_en": "An internal auditor must have sufficient knowledge to identify the indicators of fraud but is not required to have sufficient knowledge and training to be able to detect fraud."}, {"tr": "Bir iç denetçinin birincil rolü hileyi tespit etmek ve araştırmaktır.", "en": "An internal auditor’s primary role is to detect and investigate fraud.", "cmt_tr": "Hileyi tespit etmek ve araştırmak bir iç denetçinin birincil rolü değildir.", "cmt_en": "Detecting and investigating fraud is not a primary role of an internal auditor."}], "answer": 0}, {"q_tr": "İç denetçiler, yönetim hilesiyle ilişkili olduğu kanıtlanmış faktörler (kırmızı bayraklar) hakkında bilgi sahibi olmalıdır. Aşağıdaki faktörlerden hangisi genel olarak yönetim hilesiyle ilişkilendirilmiştir?", "q_en": "Internal auditors should have knowledge about factors (red flags) that have proven to be associated with management fraud. Which of the following factors have generally been associated with management fraud?", "options": [{"tr": "Maaş bazlı bir ücretlendirme sistemi.", "en": "A salary-based compensation system.", "cmt_tr": "Maaş bazlı ücretlendirme sistemleri hile ile ilişkilendirilmez. Cömert performansa dayalı ödül sistemleri, daha yüksek yönetim hilesi olasılığı ile ilişkilendirilir.", "cmt_en": "Salary compensation systems are not associated with fraud. Generous performance-based reward systems are associated with a higher probability of management fraud."}, {"tr": "Vizyoner bir CEO.", "en": "A visionary CEO.", "cmt_tr": "Vizyoner bir CEO, baskıcı olmadıkça ve yönetime aşırı baskı uygulamadıkça yönetim hilesiyle doğrudan ilişkilendirilmez.", "cmt_en": "A visionary CEO would not necessarily be associated with management fraud, unless the CEO was domineering and putting excessive pressure on management."}, {"tr": "Fiili sonuçların bütçeyle düzenli karşılaştırılması.", "en": "Regular comparison of actual results with budgets.", "cmt_tr": "Fiili sonuçların bütçeyle düzenli karşılaştırılması bir kontrol prosedürüdür ve yönetim hilesiyle ilişkilendirilmez.", "cmt_en": "Regular comparison of actual results with budgets is a control procedure and is not associated with management fraud."}, {"tr": "Yönetimin artan finansal performansa aşırı odaklanması.", "en": "A management preoccupation with increased financial performance.", "cmt_tr": "Yönetimin artan finansal performansa aşırı odaklanması, yöneticilerin performansı çarpıtması için bir teşvik sağlar.", "cmt_en": "A management preoccupation with increased financial performance provides an incentive for managers to distort performance."}], "answer": 3}, {"q_tr": "Yaklaşan bir iç denetim görevi hile olasılığını içermektedir. Standartlar, iç denetçilerin aşağıdaki becerilerden hangisine sahip olmasını gerektirir?", "q_en": "An upcoming internal audit engagement involves the possibility of fraud. The Standards require the internal auditors to possess which of the following skills?", "options": [{"tr": "Güncel bir Sertifikalı Hile Denetçisi (CFE) sertifikasına sahip olmak.", "en": "To hold a current Certified Fraud Examiner certification.", "cmt_tr": "Standartlar, hile olasılığı bulunan bir görevde hizmet vermek için iç denetçinin CFE sertifikasına sahip olmasını gerektirmez.", "cmt_en": "The Standards do not require an internal auditor to hold a Certified Fraud Examiner certification to serve on an engagement in which possibility of fraud exists."}, {"tr": "Güncel bir Sertifikalı İç Denetçi (CIA) sertifikasına sahip olmak.", "en": "To hold a current Certified Internal Auditor certification.", "cmt_tr": "Standartlar, hile olasılığı bulunan bir görevde hizmet vermek için iç denetçinin CIA sertifikasına sahip olmasını gerektirmez.", "cmt_en": "The Standards do not require an internal auditor to hold a Certified Internal Auditor certification to serve on an engagement in which possibility of fraud exists."}, {"tr": "Hilenin işlenmiş olabileceğine dair göstergeleri belirleyebilmek.", "en": "To be able to identify indicators that fraud may have been committed.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları şunlardır: (1) hilenin işlenmiş olabileceğine dair göstergeleri belirlemek için yeterli bilgiye sahip olmak, (2) hileye olanak tanıyabilecek fırsatlara (örn. kontrol zayıflıkları) karşı uyanık olmak ve (3) hile soruşturması yapılıp yapılmaması gerektiğini belirlemek için hile göstergelerini yeterince değerlendirebilmek.", "cmt_en": "An internal auditor’s responsibilities for the detection of fraud include (1) having sufficient knowledge to identify indicators that fraud may have been committed, (2) being alert to opportunities that could allow fraud (e.g., control weaknesses), and (3) being able to evaluate the indicators of fraud sufficiently to determine whether a fraud investigation should be conducted."}, {"tr": "Bilgisayar korsanlığı gibi belirli bir hile inceleme alanında teknik uzmanlığa sahip olmak.", "en": "To possess technical expertise in a particular area of fraud examination, such as computer hacking.", "cmt_tr": "Standartlar, hile olasılığı bulunan bir görevde hizmet vermek için iç denetçinin belirli bir hile inceleme alanında teknik uzmanlığa sahip olmasını gerektirmez.", "cmt_en": "The Standards do not require an internal auditor to have technical expertise in a particular area of fraud examination to serve on an engagement in which a possibility of fraud exists."}], "answer": 2}, {"q_tr": "Kuruluşun güvenlik şefi, bir pazarlama müdürünün bir medya kuruluşundan komisyon aldığını iddia eden isimsiz bir çağrı almıştır. Bu nedenle pazarlama departmanı olası görev müşterileri listesine alınmıştır. İç denetim fonksiyonuna tüzüğüyle hile soruşturma sorumluluğu verilmiştir. Dış medya kuruluşunun kayıtlarına ve personeline erişim mümkün değilse, pazarlama komisyonları iddiasını araştırmak için iç denetçinin atabileceği en iyi adım nedir?", "q_en": "The chief of an organization’s security received an anonymous call accusing a marketing manager of taking kickbacks from a media outlet. Thus, the marketing department is on the list of possible engagement clients for the coming year. The internal audit function is assigned responsibility for investigating fraud by its charter. If obtaining access to outside media outlet records and personnel is not possible, the best action an internal auditor could take to investigate the allegation of marketing kickbacks is to", "options": [{"tr": "Medya kuruluşlarından kayıt dışı borçları araştırmak.", "en": "Search for unrecorded liabilities from media outlets.", "cmt_tr": "Çalışan komisyon alıyorsa kayıt dışı borçlar oluşturulmamaktadır.", "cmt_en": "If the employee is taking kickbacks, unrecorded liabilities are not being created."}, {"tr": "Onaylı medya kuruluşlarının bir listesini elde etmek.", "en": "Obtain a list of approved media outlets.", "cmt_tr": "Onaylı medya kuruluşlarının listesi komisyonlar hakkında bilgi sağlamayacaktır.", "cmt_en": "A list of approved media outlets would not provide any information about kickbacks."}, {"tr": "Şüphelinin finansal ve davranışsal profilini geliştirmek.", "en": "Develop a financial and behavioral profile of the suspect.", "cmt_tr": "Bir çalışanın yaygın hile göstergelerinden biri finansal durumundaki açıklanamayan değişikliktir. Geliriyle orantılı olmayan yaşam standardı suistimale işaret edebilir. Profil, yasadışı geliri doğrulamaya ve çalışana yapılan yasadışı ödemeleri izlemeye temel oluşturabilir.", "cmt_en": "A common indicator of fraud by an employee is an unexplained change in his or her financial status. A standard of living not commensurate with the employee’s income may signify wrongdoing. The employee’s behavior may also be suspicious (for example, constant association with, and entertainment by, a member of the media outlet’s staff). The profile may help to corroborate illegal income and thereby provide a basis for tracing illegal payments to the employee."}, {"tr": "Geçmişteki önemli alacak terk işlemlerini doğrulamak.", "en": "Vouch any material past charge-offs of receivables.", "cmt_tr": "Komisyon alınmasının alacak hesapları üzerinde herhangi bir etkisi olmayacaktır.", "cmt_en": "The receipt of kickbacks would have no effect on accounts receivable. Fact Pattern: An international nonprofit organization finances medical research. The majority of its revenue and support comes from fundraising activities, investments, and specific grants from an initial sponsoring corporation. The organization has been in operation over 15 years and has a small internal audit department. The organization has just finished a major fundraising drive that raised $500 million for the current fiscal period. The following are selected data from recent financial statements (dollar figures in millions): Current Past Year Year Revenue $500 $425 Investments (average 210 185 balances) Medical research grants made 418 325 Investment income 16 20 Administrative expense 10 6"}], "answer": 2}, {"q_tr": "Denetçiler her zaman hile olasılığına karşı uyanık olmalıdır. Aşağıda listelenen her bir risk üzerindeki kontrollerin marjinal olduğunu varsayın. Aşağıdaki olası hilelerden veya kuruluş varlıklarının kötüye kullanımlarından hangisi en büyük risk alanı olarak değerlendirilmelidir?", "q_en": "Auditors must always be alert for the possibility of fraud. Assume the controls over each risk listed below are marginal. Which of the following possible frauds or misuses of organization assets should be considered the area of greatest risk?", "options": [{"tr": "Başkan, şirketin seyahat ve temsil fonlarını tartışmalı sayılabilecek faaliyetler için kullanmaktadır.", "en": "The president is using company travel and entertainment funds for activities that might be considered questionable.", "cmt_tr": "İdari giderler, cari gelirin %2'sidir (10$ ÷ 500$).", "cmt_en": "Administrative expense is 2% ($10 ÷ $500) of current revenue."}, {"tr": "Satın almalar hayali satıcılardan yapılmaktadır.", "en": "Purchases of supplies are made from fictitious vendors.", "cmt_tr": "Hayali satıcılardan yapılan satın almalar, uygunsuz bağışlardan çok daha küçük risk maruziyetleri içerir.", "cmt_en": "Purchases of supplies from fictitious vendors involve risk exposures that are far smaller than those arising from inappropriate grants."}, {"tr": "Bağışlar, başkanla ilişkili olabilecek kuruluşlara veya kuruluş tüzüğünde belirtilen amaçlar dışında yapılmaktadır.", "en": "Grants are made to organizations that might be associated with the president or are not for purposes dictated in the organization’s charter.", "cmt_tr": "Bağışlar cari gelirin %83,6'sını (418$ ÷ 500$) temsil etmektedir. Bu nedenle hileli bağışlar, listelenen diğer kalemlerden çok daha büyük bir risk maruziyeti oluşturmaktadır.", "cmt_en": "Grants represent 83.6% ($418 ÷ $500) of current revenue. Consequently, fraudulent grants constitute a much greater risk exposure than any of the other items listed."}, {"tr": "Bordro memuru hayali çalışanlar eklemiştir.", "en": "The payroll clerk has added ghost employees.", "cmt_tr": "Bordro memurunun hayali çalışan eklemesi, uygunsuz bağışlardan çok daha küçük risk maruziyetleri içerir.", "cmt_en": "The payroll clerk’s addition of ghost employees involves risk exposures that are far smaller than those arising from inappropriate grants."}], "answer": 2}, {"q_tr": "İç denetçilerin hileyi tespit etme olasılığı, aşağıdaki yeteneklerden hangisini geliştirmeleri/güçlendirmeleri durumunda artar?", "q_en": "Internal auditors are more likely to detect fraud by developing/strengthening their ability to", "options": [{"tr": "Kuruluşlarda meydana gelen değişiklikleri fark etmek ve sorgulamak.", "en": "Recognize and question changes that occur in organizations.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini değerlendirmek ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermek yer alır.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended."}, {"tr": "Hilenin neden işlendiğini öğrenmek için hile faillerini sorgulamak.", "en": "Interrogate fraud perpetrators to discover why the fraud was committed.", "cmt_tr": "Hile faillerinin sorgulanması tespitten sonra gerçekleşir. Hilenin tehlike sinyalleri genellikle olumsuz organizasyonel değişiklikleri içerir.", "cmt_en": "Interrogation of fraud perpetrators occurs after detection. The danger signals of fraud often involve negative organizational changes."}, {"tr": "Hilenin oluşumunu önlemek için iç kontroller geliştirmek.", "en": "Develop internal controls to prevent the occurrence of fraud.", "cmt_tr": "Bahsedilen kontroller önleyici niteliktedir, tespit edici değildir.", "cmt_en": "The controls mentioned are preventive, not detective."}, {"tr": "Bilgisayarlı işletim sistemi programlarını belgelemek.", "en": "Document computerized operating system programs.", "cmt_tr": "İşletim sistemlerinin belgelenmesi iç denetimin kapsamında değildir ve hile tespit becerilerini geliştirmeye çok az katkı sağlar.", "cmt_en": "Documentation of operating systems is not within the scope of internal auditing and would do little to enhance fraud detection skills."}], "answer": 0}, {"q_tr": "Bir iç denetçi, olası hileli durumlarla bağlantılı birden fazla faktör belirlediğinde ve hilenin gerçekleştiğinden şüphelendiğinde ne yapmalıdır?", "q_en": "When an internal auditor identifies multiple factors that have been linked with possible fraudulent conditions and suspects that fraud has taken place, the auditor should", "options": [{"tr": "Derhal üst yönetime ve yönetim kuruluna bildirmek.", "en": "Immediately report to senior management and the board.", "cmt_tr": "İç denetim yöneticisinin üst yönetime ve yönetim kuruluna derhal bildirimi, ancak önemli bir hilenin gerçekleştiğine dair makul kesinlik oluşturmak için yeterli soruşturma yapıldıktan sonra gereklidir.", "cmt_en": "Immediate reporting by the CAE to senior management and the board is required only after a sufficient investigation has been made to establish reasonable certainty that a significant fraud has occurred. Thus, reasonable certainty is necessary before any fraud reporting is made."}, {"tr": "Derhal yönetim kuruluna bildirmek.", "en": "Immediately report to the board.", "cmt_tr": "İç denetim yöneticisinin üst yönetime ve yönetim kuruluna derhal bildirimi, ancak önemli bir hilenin gerçekleştiğine dair makul kesinlik oluşturmak için yeterli soruşturma yapıldıktan sonra gereklidir.", "cmt_en": "Immediate reporting by the CAE to senior management and the board is required only after a sufficient investigation has been made to establish reasonable certainty that a significant fraud has occurred. Thus, reasonable certainty is necessary before any fraud reporting is made."}, {"tr": "Bir soruşturma önermek.", "en": "Recommend an investigation.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini değerlendirmek ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermek yer alır.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended."}, {"tr": "Hilenin boyutunu belirlemek için testleri genişletmek.", "en": "Extend tests to determine the extent of the fraud.", "cmt_tr": "Hilenin boyutunu belirlemek için genişletilmiş testler, hile şüphelenildiğinde değil fiilen belirlendiğinde yapılır.", "cmt_en": "Extended tests to determine the extent of fraud are performed after the fraud has in fact been determined, not suspected."}], "answer": 2}, {"q_tr": "Bir iç denetçi, posta odası memurunun zimmetine para geçirdiğinden şüphelenmektedir. Mesleki özen gösterirken iç denetçi ne yapmalıdır?", "q_en": "An internal auditor suspects that a mailroom clerk is embezzling funds. In exercising due professional care, the internal auditor should", "options": [{"tr": "Memuru başka bir departmana atamak.", "en": "Reassign the clerk to another department.", "cmt_tr": "Personel atamaları yönetimin sorumluluğundadır.", "cmt_en": "Personnel assignments are the responsibility of management."}, {"tr": "Posta odası operasyonları üzerinde daha sıkı kontroller uygulamak.", "en": "Institute stricter controls over mailroom operations.", "cmt_tr": "İç kontrol sistemi yönetimin sorumluluğundadır.", "cmt_en": "The system of internal controls is management’s responsibility."}, {"tr": "Hile göstergelerini değerlendirmek ve daha fazla eylem gerekip gerekmediğine karar vermek.", "en": "Evaluate fraud indicators and decide whether further action is necessary.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini değerlendirmek ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermek yer alır.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended."}, {"tr": "Memurla denetçinin şüpheleri hakkında yüzleşmek.", "en": "Confront the clerk with the auditor’s suspicions.", "cmt_tr": "İç denetçi, uygun makamlar bilgilendirilip uygun eylem belirlenene kadar şüpheliyle yüzleşmemelidir.", "cmt_en": "An internal auditor should not confront a suspect until the proper authorities have been notified and have determined the appropriate action."}], "answer": 2}, {"q_tr": "Bir iç denetçinin saha çalışması, olası bir zimmete geçirmeyi gösteren bir dizi işlemi ortaya çıkarmıştır. İç denetim yöneticisi hangi eylemi almalıdır?", "q_en": "An internal auditor’s field work uncovers a series of transactions that indicate a possible embezzlement. Which of the following actions should the chief audit executive take?", "options": [{"tr": "Olguların doğru olduğunu belirlemek için şüpheli zimmetçiyle yüzleşmek.", "en": "Confront the suspected embezzler to determine that the facts are correct.", "cmt_tr": "İç denetçi şüpheli çalışanlarla yüzleşmekten kaçınmalıdır. Hırsızlık veya hileden şüphelenilen çalışanların, ihlal edildiğinde kuruluşa maliyetli olabilecek belirli hukuki hakları vardır.", "cmt_en": "The internal auditor should avoid confronting suspected employees. Employees suspected of theft or fraud have certain common law and statutory rights that, if infringed upon, can be costly to the organization."}, {"tr": "Çalışanların ek kanıt sağlayıp sağlayamayacaklarını görmek için bulguyu şüphelinin iş arkadaşlarıyla gözden geçirmek.", "en": "Review the finding with the suspect’s fellow workers to see whether the workers can furnish additional evidence.", "cmt_tr": "İş arkadaşları da zimmete geçirmeye dahil olabilir.", "cmt_en": "Fellow workers may also be involved in the embezzlement."}, {"tr": "Bir soruşturma önerip önermemeye karar vermek.", "en": "Decide whether to recommend an investigation.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini değerlendirmek ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermek yer alır.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended."}, {"tr": "Konuyu yönetim kuruluyla tartışmak.", "en": "Discuss the case with the board.", "cmt_tr": "İç denetim yöneticisi, yönetim kuruluna sunmadan önce hilenin boyutunu belirlemelidir.", "cmt_en": "The CAE should determine the extent, if any, of the fraud before presenting it to the board."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, bazı hile göstergelerini fark ettikten sonra bir denetçinin sorumluluğunu en iyi tanımlar?", "q_en": "Which of the following best describes an auditor’s responsibility after noting some indicators of fraud?", "options": [{"tr": "Bir soruşturma gerekip gerekmediğini belirlemek için faaliyetleri genişletmek.", "en": "Expand activities to determine whether an investigation is warranted.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini değerlendirmek ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermek yer alır.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended. For example, the receiving department should not be able to access the purchase order and receiving computer programs. Receiving should record amounts received without knowing the amounts purchased. Such incompatible responsibilities require additional attention by an auditor."}, {"tr": "Hile olasılığını üst yönetime bildirmek ve nasıl devam edileceğini sormak.", "en": "Report the possibility of fraud to senior management and ask how to proceed.", "cmt_tr": "İç denetçi, yalnızca hile göstergelerinin soruşturma önermeye yeterli olduğunu belirlemişse üst yönetimi ve yönetim kurulunu bilgilendirmelidir.", "cmt_en": "The internal auditor should notify senior management and the board only if (s)he has determined that the indicators of fraud are sufficient to recommend an investigation."}, {"tr": "İzlenecek yolun belirlenmesi için dış hukuk müşavirine danışmak.", "en": "Consult with external legal counsel to determine the course of action to be taken.", "cmt_tr": "İç denetçinin dış hukuk müşavirine danışma yetkisi yoktur.", "cmt_en": "The internal auditor does not have the authority to consult with external legal counsel."}, {"tr": "Konuyu denetim komitesine bildirmek ve olası hileyi araştırmak için dış uzmanlar adına fon talep etmek.", "en": "Report the matter to the audit committee and request funding for outside specialists to help investigate the possible fraud.", "cmt_tr": "İç denetçi, yalnızca hile göstergelerinin soruşturma önermeye yeterli olduğunu belirlemişse denetim komitesini bilgilendirmelidir.", "cmt_en": "The internal auditor should notify the audit committee only if (s)he has determined that the indicators of fraud are sufficient to recommend an investigation."}], "answer": 0}, {"q_tr": "Aşağıdaki politikalardan hangisinin hile oluşumuna elverişli bir ortam yaratma olasılığı en yüksektir?", "q_en": "Which of the following policies is most likely to result in an environment conducive to the occurrence of fraud?", "options": [{"tr": "Bütçeyi karşılamaktan sorumlu çalışanların bütçe hazırlığına katkısı.", "en": "Budget preparation input by the employees who are responsible for meeting the budget.", "cmt_tr": "Katılımcı bütçeleme, bütçelere karşı direnci azaltabilir ve bütçeyi karşılamak için uygunsuz araçlara başvurulma olasılığını düşürebilir.", "cmt_en": "Participatory budgeting can reduce resistance to budgets and reduce the likelihood of inappropriate means being taken to meet the budget."}, {"tr": "Gerçekçi olmayan satış ve üretim hedefleri.", "en": "Unreasonable sales and production goals.", "cmt_tr": "Gerçekçi olmayacak kadar yüksek satış veya üretim kotaları, kayıtları tahrif etme veya performans ölçütlerini iyileştirmeye yönelik uygunsuz eylemler için teşvik olabilir.", "cmt_en": "Unrealistically high sales or production quotas can be an incentive to falsify the records or otherwise take inappropriate action to improve performance measures so that the quotas appear to have been met."}, {"tr": "Bölümün işe alım süreci, yeterli eğitimli adayların sıklıkla reddedilmesiyle sonuçlanmaktadır.", "en": "The division’s hiring process frequently results in the rejection of adequately trained applicants.", "cmt_tr": "İşe alım politikaları, yeterli eğitimin yanı sıra adayların kişisel dürüstlüğü gibi faktörlere de dayanmalıdır. Ayrıca, yeterli eğitime sahip tüm adayların işe alınması muhtemelen gerekli değildir.", "cmt_en": "Hiring policies should be based on factors other than adequate training, such as the applicants’ personal integrity. Furthermore, hiring of all adequately trained applicants is unlikely to be necessary."}, {"tr": "Bazı muhasebe kontrollerinin örnekleme bazında uygulanması.", "en": "The application of some accounting controls on a sample basis.", "cmt_tr": "Makul güvence kavramına göre, kontrollerin maliyeti faydalarını aşmamalıdır.", "cmt_en": "Under the reasonable assurance concept, the cost of controls should not exceed their benefits. The cost of applying controls to all relevant transactions rather than a sample may be greater than the resultant savings."}], "answer": 1}, {"q_tr": "Bir bağlı şirket hakkında şu bilgiler mevcuttur: 1. Bağlı şirket birkaç yıldır faaliyet göstermekte ve rakipleri etkileyen resesyona rağmen iyi kâr marjlarına sahiptir. 2. İşletme sermayesi oranı 3:1'den 0,9:1'e düşmüştür. 3. Son yıllardaki personel devri; üç kontrolör, iki alacak hesapları süpervizörü, dört borç hesapları süpervizörü ve diğer finansal pozisyonlarda çok sayıda personeli içermiştir. 4. Satın alma politikası üç teklif gerektirmektedir ancak satın alma süpervizörü tek kaynaklı tedarik politikası uygulamıştır. Bağlı şirketin mali denetimini yaparken iç denetçi ne yapmalıdır?", "q_en": "The following are facts about a subsidiary: 1. The subsidiary has been in business for several years and enjoyed good profit margins although the general economy was in a recession, which affected competitors. 2. The working capital ratio has declined from a healthy 3:1 to 0.9:1. 3. Turnover for the last several years has included three controllers, two supervisors of accounts receivable, four payables supervisors, and numerous staff in other financial positions. 4. Purchasing policy requires three bids. However, the supervisor of purchasing at the subsidiary has instituted a policy of sole-source procurement to reduce the number of suppliers. When conducting a financial audit of the subsidiary, the internal auditor should", "options": [{"tr": "1, 2 veya 3'ü büyük olasılıkla tespit edemez.", "en": "Most likely not detect 1, 2, or 3.", "cmt_tr": "Tanımlanan unsurlar mali denetimdeki olağan prosedürlerle tespit edilebilir.", "cmt_en": "The items described can be detected through usual procedures in a financial audit."}, {"tr": "Ekonomi bu dönemde daralma yaşadığı için 2'yi görmezden gelmek.", "en": "Ignore 2 since the economy had a downturn during this period.", "cmt_tr": "Ekonomi daralma yaşamış olsa da, güçlü kâr marjları ışığında işletme sermayesindeki değişiklik olağandışıdır ve araştırılmalıdır.", "cmt_en": "Although the economy suffered a downturn, the change in working capital is unusual in light of the continuing strong profit margins and should be investigated."}, {"tr": "3'ü normal devir olarak, ancak 2 ve 4'ü hile uyarı sinyalleri olarak değerlendirmek.", "en": "Consider 3 to be normal turnover, but be concerned about 2 and 4 as warning signals of fraud.", "cmt_tr": "İşletme sermayesi oranı, yüksek çalışan devir hızı ve tek kaynaklı tedarik politikasının tümü hile uyarı sinyalleridir.", "cmt_en": "The working capital ratio, the high employee turnover rate, and the sole-source procurement policy are all warning signals of fraud."}, {"tr": "1, 2, 3 ve 4'ü hile uyarı sinyalleri olarak değerlendirmek.", "en": "Consider 1, 2, 3, and 4 as warning signals of fraud.", "cmt_tr": "Rakiplerinin aksine yüksek kâr bildirmek mali tablolarda önemli bir yanlışlığa işaret edebilir. Yetersiz işletme sermayesi çeşitli sorunlara işaret edebilir. Finansal pozisyonlardaki hızlı devir mevcut sorunlara işaret edebilir. Tek kaynaklı tedarik, yeterince gerekçelendirilmediyse potansiyel kayırmacılığa veya komisyona işaret eder.", "cmt_en": "The organization’s reporting of high profits when competitors have not may indicate a material misstatement in the financial statements. Insufficient working capital may indicate such problems as overexpansion, decreases in revenues, transfers of funds to other organizations, insufficient credit, and excessive expenditures. The internal auditor should be alert for the diversion of funds for personal use through such methods as unrecorded sales and falsified expenditures. Rapid turnover in financial positions may signify existing problems with which the individuals feel uncomfortable but that they do not want to disclose. Accountability for funds and other resources should be determined upon termination of employment. Use of sole-source procurement does not encourage competition to ensure that the organization is obtaining the required materials or equipment at the best price. Sole-source procurement, if not adequately justified, indicates potential favoritism or kickbacks."}], "answer": 3}, {"q_tr": "Kuruluş fonlarını zimmetine geçiren failler ile mali tablo hilesi failleri karşılaştırıldığında, mali tablo hilesi yapanların aşağıdakilerden hangisini yapma olasılığı daha düşüktür?", "q_en": "When comparing perpetrators who have embezzled an organization’s funds with perpetrators of financial statement fraud (falsified financial statements), those who have falsified financial statements are less likely to", "options": [{"tr": "Otokratik bir yönetim tarzına maruz kalmış olmak.", "en": "Have experienced an autocratic management style.", "cmt_tr": "Otokratik yönetim tarzları yönetim (mali tablo) hilesiyle ilişkilendirilmiştir.", "cmt_en": "Autocratic management styles have been linked to management (financial statement) fraud."}, {"tr": "Görünür geçim kaynaklarının ötesinde bir yaşam sürmek.", "en": "Be living beyond their obvious means of support.", "cmt_tr": "Gelirin ötesinde yaşam sürmek, mali tablo hilesiyle değil çalışan hilesiyle (zimmet) ilişkilendirilmiştir. Kuruluş yararına işlenen hile suçluya dolaylı olarak fayda sağlarken, kuruluş aleyhine olan hile çalışana doğrudan fayda sağlar.", "cmt_en": "Living beyond one’s means has been linked to employee fraud (embezzlement), not to financial statement fraud. Fraud perpetrated for the benefit of the organization ordinarily benefits the wrongdoer indirectly, whereas fraud that is detrimental to the organization provides immediate, direct benefits to the employee."}, {"tr": "Hileli davranışı meşrulaştırmak.", "en": "Rationalize the fraudulent behavior.", "cmt_tr": "Meşrulaştırma tüm hileler için ortaktır.", "cmt_en": "Rationalization is common to all fraud."}, {"tr": "Kurumsal beklentileri eylem için gerekçe olarak kullanmak.", "en": "Use organizational expectations as justification for the act.", "cmt_tr": "Yüksek beklentiler, genellikle mali tablo hilesi işleyenler tarafından motivasyon faktörü olarak gösterilir.", "cmt_en": "High expectations are often given as a motivating factor by those who have committed financial statement fraud."}], "answer": 1}, {"q_tr": "İç denetçilere, yönetimin hileye karışıp karışmadığını belirlemek için kırmızı bayrakları değerlendirmeleri tavsiye edilmiştir. Aşağıdakilerden hangisi kırmızı bayrakların hile göstergesi olarak kullanılmasındaki bir zorluğu temsil etmez?", "q_en": "Internal auditors have been advised to consider red flags to determine whether management is involved in a fraud. Which of the following does not represent a difficulty in using the red flags as fraud indicators?", "options": [{"tr": "Yaygın kırmızı bayrakların çoğu, hilenin bulunmadığı durumlarla da ilişkilidir.", "en": "Many common red flags are also associated with situations in which no fraud exists.", "cmt_tr": "Kırmızı bayraklar nedensellik analizi ile değil korelasyon analizi ile geliştirilmiştir.", "cmt_en": "Red flags are developed by correlation analysis, not necessarily by causation analysis."}, {"tr": "Bazı kırmızı bayrakları ölçmek veya değerlendirmek zordur.", "en": "Some red flags are difficult to quantify or to evaluate.", "cmt_tr": "Yönetimin tutumu gibi birçok kırmızı bayrağı ölçmek zordur.", "cmt_en": "Many red flags, such as management’s attitude, are difficult to quantify."}, {"tr": "Kırmızı bayrak bilgileri bir görevin normal parçası olarak toplanmaz.", "en": "Red flag information is not gathered as a normal part of an engagement.", "cmt_tr": "İç denetçiler hile göstergelerini belirleyebilmeli ve hileye olanak tanıyabilecek fırsatlara karşı uyanık olmalıdır. Ancak iç denetçiler normalde özellikle kırmızı bayrak bilgilerini toplamak için prosedürler uygulamazlar.", "cmt_en": "Internal auditors should be able to identify fraud indicators and should be alert to opportunities that could allow fraud. However, internal auditors do not normally perform procedures specifically to gather red flag information."}, {"tr": "Kırmızı bayrak literatürü, iç denetim üzerinde olumlu etkiye sahip olacak kadar yeterince yerleşik değildir.", "en": "The red flags literature is not well enough established to have a positive impact on internal auditing.", "cmt_tr": "Kırmızı bayrak literatürünün durumu iç denetimde bir zorluk değil bir yardımdır. Yerleşiktir ve araştırma yapıldıkça gelecekte daha da geliştirilecektir.", "cmt_en": "The state of red flags literature is an aid, not a difficulty, in internal auditing. It is well established and will be refined in the future as research is done."}], "answer": 3}, {"q_tr": "Aşağıdaki durumlarda bir iç denetçi hile olasılığı konusunda endişelenmelidir:", "q_en": "An internal auditor should be concerned about the possibility of fraud if", "options": [{"tr": "Nakit tahsilatlar, küçük kasa türü harcamalar için kullanılan tutarlar düşüldükten sonra günlük olarak bankaya yatırılmaktadır.", "en": "Cash receipts, net of the amounts used to pay petty cash-type expenditures, are deposited in the bank daily.", "cmt_tr": "Nakit tahsilatlardan küçük kasa harcamaları yapmak, yatırılmadan önce nakdin yetkisiz olarak alınmasını kolaylaştırır. Tüm nakit tahsilatlar günlük olarak tam olarak yatırılmalıdır.", "cmt_en": "Making petty cash expenditures from cash receipts facilitates the unauthorized removal of cash before deposit. All cash receipts should be deposited intact daily. Petty cash expenditures should be handled through an imprest fund."}, {"tr": "Aylık banka hesap mutabakatı, sürekli envanter kayıtlarını tutan aynı çalışan tarafından yapılmaktadır.", "en": "The monthly bank statement reconciliation is performed by the same employee who maintains the perpetual inventory records.", "cmt_tr": "Aylık banka mutabakatı mevduat yapan veya çek yazan bir kişi tarafından yapılmamalıdır, ancak envanter memurunun bu tür sorumlulukları yoktur.", "cmt_en": "The monthly bank reconciliation should not be performed by a person who makes deposits or writes checks, but the inventory clerk has no such responsibilities."}, {"tr": "Alacak hesapları yardımcı defteri ve borç hesapları yardımcı defteri aynı kişi tarafından tutulmaktadır.", "en": "The accounts receivable subsidiary ledger and accounts payable subsidiary ledger are maintained by the same person.", "cmt_tr": "Alacak ve borç hesapları yardımcı defterlerine kaydedilen işlemler arasında doğrudan ilişki yoktur; aynı kişinin her ikisini tutması kontrol zayıflığı yaratmaz.", "cmt_en": "There is no direct relationship between the transactions posted to the accounts receivable and accounts payable subsidiary ledgers; having the same person maintain both does not create a control weakness."}, {"tr": "Tek bir kişi küçük kasa fonuna tek başına erişim hakkına sahiptir (süpervizör veya denetçi tarafından ara sıra yapılan sürpriz sayımlar hariç).", "en": "One person, acting alone, has sole access to the petty cash fund (except for a provision for occasional surprise counts by a supervisor or auditor).", "cmt_tr": "Küçük kasa için hesap verebilirlik oluşturmak amacıyla fona yalnızca bir kişi erişebilmelidir.", "cmt_en": "To establish accountability for petty cash, only one person should have access to the fund. Fact Pattern: Randy and John had known each other for many years. They had become best friends in college, where they both majored in accounting. After graduation, Randy took over the family business from his father. His family had been in the grocery business for several generations. When John had difficulty finding a job, Randy offered him a job in the family store. John proved to be a very capable employee. As John demonstrated his abilities, Randy began delegating more and more responsibility to him. After a period of time, John was doing all of the general accounting and authorization functions for checks, cash, inventories, documents, records, and bank reconciliations. (1) John was trusted completely and handled all financial functions. No one checked his work. Randy decided to expand the business and opened several new stores. (2) Randy was always handling the most urgent problem . . . “crisis management” is what his college professors had termed it. John assisted with the problems when his other duties allowed him time. Although successful at work, John had (3) difficulties with personal financial problems. At first, the amounts stolen by John were small. John didn’t even worry about making the accounts balance. But John became greedy. “How easy it is to take the money,” he said. He felt that he was a critical member of the business team (4) and that he contributed much more to the success of the company than was represented by his salary. “It would take two or three people to replace me,” he often thought to himself. As the amounts became larger and larger, (5) he made the books balance. Because of these activities, John was able to purchase an expensive car and take his family on several trips each year. (6) He also joined an expensive country club. Things were changing at home, however. (7) John’s family observed that he was often argumentative and at other times very depressed. The fraud continued for 6 years. Each year, the business performed more and more poorly. In the last year, the stores had a substantial net loss. Randy’s bank required an audit. John confessed when he thought the auditors had discovered his embezzlements. When discussing frauds, the pressures, opportunities, and rationalizations that cause/allow a perpetrator to commit the fraud are often identified. Symptoms of fraud are also studied."}], "answer": 0}, {"q_tr": "1 Numaralı madde, \"John'a tamamen güveniliyordu...\", aşağıdakilerden hangisine bir örnektir?", "q_en": "Number 1, “John was trusted completely . . .,” is an example of a(n)", "options": [{"tr": "Belge semptomu.", "en": "Document symptom.", "cmt_tr": "Belge semptomu, hileyi gizlemek için muhasebe kayıtlarında yapılan herhangi bir tahriftir. Ancak tam güven bir hile işleme fırsatıdır, belge semptomu değildir.", "cmt_en": "A document symptom is any tampering with the accounting records to conceal a fraud. Keeping two sets of books or forcing the books to reconcile are examples. But complete trust is an opportunity to commit a fraud, not a document symptom."}, {"tr": "Durumsal baskı.", "en": "Situational pressure.", "cmt_tr": "Baskı veya teşvik hilenin bir özelliğidir. Ancak tam güven bir hile işleme fırsatıdır, baskı veya teşvik biçimi değildir.", "cmt_en": "Pressure or incentive is a characteristic of fraud. But complete trust is an opportunity to commit a fraud, not a form of pressure or incentive."}, {"tr": "Hile işleme fırsatı.", "en": "Opportunity to commit.", "cmt_tr": "Bir bireye tamamen güvenmek hile işleme fırsatıdır. John'un eylemleri, uygun görev ayrımının olmaması ve mevcut kontrol prosedürlerini geçersiz kılma yeteneği nedeniyle incelenmeden kalmıştır.", "cmt_en": "Complete trust in an individual is an opportunity to commit fraud. John’s actions went unscrutinized because of the absence of an appropriate segregation of functions and his ability to override whatever control procedures were in place."}, {"tr": "Yaşam tarzı semptomu.", "en": "Lifestyle symptom.", "cmt_tr": "Yaşam tarzı semptomu, bir çalışanın sosyal statüsünde veya maddi tüketim düzeyinde açıklanamayan artıştır. Ancak tam güven bir hile işleme fırsatıdır, yaşam tarzı semptomu değildir.", "cmt_en": "A lifestyle symptom is an unexplained rise in an employee’s social status or level of material consumption. John’s lifestyle changed, but complete trust is an opportunity to commit a fraud, not a lifestyle symptom. Fact Pattern: Randy and John had known each other for many years. They had become best friends in college, where they both majored in accounting. After graduation, Randy took over the family business from his father. His family had been in the grocery business for several generations. When John had difficulty finding a job, Randy offered him a job in the family store. John proved to be a very capable employee. As John demonstrated his abilities, Randy began delegating more and more responsibility to him. After a period of time, John was doing all of the general accounting and authorization functions for checks, cash, inventories, documents, records, and bank reconciliations. (1) John was trusted completely and handled all financial functions. No one checked his work. Randy decided to expand the business and opened several new stores. (2) Randy was always handling the most urgent problem . . . “crisis management” is what his college professors had termed it. John assisted with the problems when his other duties allowed him time. Although successful at work, John had (3) difficulties with personal financial problems. At first, the amounts stolen by John were small. John didn’t even worry about making the accounts balance. But John became greedy. “How easy it is to take the money,” he said. He felt that he was a critical member of the business team (4) and that he contributed much more to the success of the company than was represented by his salary. “It would take two or three people to replace me,” he often thought to himself. As the amounts became larger and larger, (5) he made the books balance. Because of these activities, John was able to purchase an expensive car and take his family on several trips each year. (6) He also joined an expensive country club. Things were changing at home, however. (7) John’s family observed that he was often argumentative and at other times very depressed. The fraud continued for 6 years. Each year, the business performed more and more poorly. In the last year, the stores had a substantial net loss. Randy’s bank required an audit. John confessed when he thought the auditors had discovered his embezzlements. When discussing frauds, the pressures, opportunities, and rationalizations that cause/allow a perpetrator to commit the fraud are often identified. Symptoms of fraud are also studied."}], "answer": 2}, {"q_tr": "2 Numaralı madde, \"Randy her zaman en acil sorunla uğraşıyordu...\", aşağıdakilerden hangisine bir örnektir?", "q_en": "Number 2, “Randy was always handling the most urgent . . .,” is an example of a(n)", "options": [{"tr": "Hile işleme fırsatı.", "en": "Opportunity to commit.", "cmt_tr": "Bir yönetici sürekli olarak kuruluşun en acil sorunlarıyla uğraştığında hile yapması için fırsat yaratılır. Uzun vadeli planlama eksikliği hile potansiyeli yaratır.", "cmt_en": "When a manager continually handles the most pressing issues of an organization, an opportunity for the manager to commit fraud is created. The lack of long-range planning creates a potential for fraud because organizational objectives may have been replaced with individual initiatives."}, {"tr": "Analitik semptom.", "en": "Analytical symptom.", "cmt_tr": "Kriz yönetimi hile işleme fırsatı sağlar.", "cmt_en": "Crisis management provides an opportunity to commit fraud."}, {"tr": "Durumsal baskı.", "en": "Situational pressure.", "cmt_tr": "Kriz yönetimi hile işleme fırsatı sağlar.", "cmt_en": "Crisis management provides an opportunity to commit fraud."}, {"tr": "Meşrulaştırma.", "en": "Rationalization.", "cmt_tr": "Kriz yönetimi hile işleme fırsatı sağlar.", "cmt_en": "Crisis management provides an opportunity to commit fraud. Fact Pattern: Randy and John had known each other for many years. They had become best friends in college, where they both majored in accounting. After graduation, Randy took over the family business from his father. His family had been in the grocery business for several generations. When John had difficulty finding a job, Randy offered him a job in the family store. John proved to be a very capable employee. As John demonstrated his abilities, Randy began delegating more and more responsibility to him. After a period of time, John was doing all of the general accounting and authorization functions for checks, cash, inventories, documents, records, and bank reconciliations. (1) John was trusted completely and handled all financial functions. No one checked his work. Randy decided to expand the business and opened several new stores. (2) Randy was always handling the most urgent problem . . . “crisis management” is what his college professors had termed it. John assisted with the problems when his other duties allowed him time. Although successful at work, John had (3) difficulties with personal financial problems. At first, the amounts stolen by John were small. John didn’t even worry about making the accounts balance. But John became greedy. “How easy it is to take the money,” he said. He felt that he was a critical member of the business team (4) and that he contributed much more to the success of the company than was represented by his salary. “It would take two or three people to replace me,” he often thought to himself. As the amounts became larger and larger, (5) he made the books balance. Because of these activities, John was able to purchase an expensive car and take his family on several trips each year. (6) He also joined an expensive country club. Things were changing at home, however. (7) John’s family observed that he was often argumentative and at other times very depressed. The fraud continued for 6 years. Each year, the business performed more and more poorly. In the last year, the stores had a substantial net loss. Randy’s bank required an audit. John confessed when he thought the auditors had discovered his embezzlements. When discussing frauds, the pressures, opportunities, and rationalizations that cause/allow a perpetrator to commit the fraud are often identified. Symptoms of fraud are also studied."}], "answer": 0}, {"q_tr": "3 Numaralı madde, \"Kişisel finansal sorunlarla zorluklar\", aşağıdakilerden hangisine bir örnektir?", "q_en": "Number 3, “Difficulties with personal financial problems,” is an example of a(n)", "options": [{"tr": "Davranışsal semptom.", "en": "Behavioral symptom.", "cmt_tr": "Kişisel finansal sorunlar hile işlemek için durumsal bir baskıdır.", "cmt_en": "Personal financial problems are a situational pressure to commit a fraud."}, {"tr": "Durumsal baskı.", "en": "Situational pressure.", "cmt_tr": "Finansal zorluklar, hileye katkıda bulunabilecek durumsal baskılar veya ayartmalar yaratır. Bu baskılar; yüksek kişisel borçluluk, abartılı yaşam tarzları, kumar sorunları vb. nedenlerden kaynaklanır.", "cmt_en": "Financial difficulties create situational pressures or temptations that may contribute to fraud. These situational pressures result from high personal indebtedness, extravagant lifestyles, gambling problems, etc."}, {"tr": "Meşrulaştırma.", "en": "Rationalization.", "cmt_tr": "Kişisel finansal sorunlar hile işlemek için durumsal bir baskıdır.", "cmt_en": "Personal financial problems are a situational pressure to commit a fraud."}, {"tr": "Hile işleme fırsatı.", "en": "Opportunity to commit.", "cmt_tr": "Kişisel finansal sorunlar hile işlemek için durumsal bir baskıdır.", "cmt_en": "Personal financial problems are a situational pressure to commit a fraud. Fact Pattern: Randy and John had known each other for many years. They had become best friends in college, where they both majored in accounting. After graduation, Randy took over the family business from his father. His family had been in the grocery business for several generations. When John had difficulty finding a job, Randy offered him a job in the family store. John proved to be a very capable employee. As John demonstrated his abilities, Randy began delegating more and more responsibility to him. After a period of time, John was doing all of the general accounting and authorization functions for checks, cash, inventories, documents, records, and bank reconciliations. (1) John was trusted completely and handled all financial functions. No one checked his work. Randy decided to expand the business and opened several new stores. (2) Randy was always handling the most urgent problem . . . “crisis management” is what his college professors had termed it. John assisted with the problems when his other duties allowed him time. Although successful at work, John had (3) difficulties with personal financial problems. At first, the amounts stolen by John were small. John didn’t even worry about making the accounts balance. But John became greedy. “How easy it is to take the money,” he said. He felt that he was a critical member of the business team (4) and that he contributed much more to the success of the company than was represented by his salary. “It would take two or three people to replace me,” he often thought to himself. As the amounts became larger and larger, (5) he made the books balance. Because of these activities, John was able to purchase an expensive car and take his family on several trips each year. (6) He also joined an expensive country club. Things were changing at home, however. (7) John’s family observed that he was often argumentative and at other times very depressed. The fraud continued for 6 years. Each year, the business performed more and more poorly. In the last year, the stores had a substantial net loss. Randy’s bank required an audit. John confessed when he thought the auditors had discovered his embezzlements. When discussing frauds, the pressures, opportunities, and rationalizations that cause/allow a perpetrator to commit the fraud are often identified. Symptoms of fraud are also studied."}], "answer": 1}, {"q_tr": "4 Numaralı madde, \"ve şirketin başarısına çok daha fazla katkıda bulunduğunu...\", aşağıdakilerden hangisine bir örnektir?", "q_en": "Number 4, “and that he contributed much more . . .,” is an example of a", "options": [{"tr": "Meşrulaştırma.", "en": "Rationalization.", "cmt_tr": "Meşrulaştırma, kişinin eylemlerini gerçek ve bilinçaltı güdülerini analiz etmeden rasyonel nedenlere atfetmesidir. Hak edilenden az ücret alındığı hissi, düşük düzeyli hileler için yaygın bir meşrulaştırmadır.", "cmt_en": "Rationalization occurs when a person attributes his or her actions to rational and creditable motives without analysis of one’s true and especially unconscious motives. Feeling that one is not being paid as much as one is worth is a common rationalization for low-level fraud."}, {"tr": "Davranışsal semptom.", "en": "Behavioral symptom.", "cmt_tr": "Ücretlendirmenin yetersiz olduğu inancı usulsüzlükler için olası bir meşrulaştırmadır.", "cmt_en": "The belief that compensation is inadequate is a possible rationalization for improprieties."}, {"tr": "Durumsal baskı.", "en": "Situational pressure.", "cmt_tr": "Ücretlendirmenin yetersiz olduğu inancı usulsüzlükler için olası bir meşrulaştırmadır.", "cmt_en": "The belief that compensation is inadequate is a possible rationalization for improprieties."}, {"tr": "Fiziksel semptom.", "en": "Physical symptom.", "cmt_tr": "Ücretlendirmenin yetersiz olduğu inancı usulsüzlükler için olası bir meşrulaştırmadır.", "cmt_en": "The belief that compensation is inadequate is a possible rationalization for improprieties. Fact Pattern: Randy and John had known each other for many years. They had become best friends in college, where they both majored in accounting. After graduation, Randy took over the family business from his father. His family had been in the grocery business for several generations. When John had difficulty finding a job, Randy offered him a job in the family store. John proved to be a very capable employee. As John demonstrated his abilities, Randy began delegating more and more responsibility to him. After a period of time, John was doing all of the general accounting and authorization functions for checks, cash, inventories, documents, records, and bank reconciliations. (1) John was trusted completely and handled all financial functions. No one checked his work. Randy decided to expand the business and opened several new stores. (2) Randy was always handling the most urgent problem . . . “crisis management” is what his college professors had termed it. John assisted with the problems when his other duties allowed him time. Although successful at work, John had (3) difficulties with personal financial problems. At first, the amounts stolen by John were small. John didn’t even worry about making the accounts balance. But John became greedy. “How easy it is to take the money,” he said. He felt that he was a critical member of the business team (4) and that he contributed much more to the success of the company than was represented by his salary. “It would take two or three people to replace me,” he often thought to himself. As the amounts became larger and larger, (5) he made the books balance. Because of these activities, John was able to purchase an expensive car and take his family on several trips each year. (6) He also joined an expensive country club. Things were changing at home, however. (7) John’s family observed that he was often argumentative and at other times very depressed. The fraud continued for 6 years. Each year, the business performed more and more poorly. In the last year, the stores had a substantial net loss. Randy’s bank required an audit. John confessed when he thought the auditors had discovered his embezzlements. When discussing frauds, the pressures, opportunities, and rationalizations that cause/allow a perpetrator to commit the fraud are often identified. Symptoms of fraud are also studied."}], "answer": 0}, {"q_tr": "5 Numaralı madde, \"defterleri denk getirdi\", aşağıdakilerden hangisine bir örnektir?", "q_en": "Number 5, “he made the books balance,” is an example of a(n)", "options": [{"tr": "Fiziksel semptom.", "en": "Physical symptom.", "cmt_tr": "\"Defterleri den lems. At first, the amounts stolen by John were small. John didn’t even worry about making the accounts balance. But John became greedy. “How easy it is to take the money,” he said. He felt that he was a critical member of the business team (4) and that he contributed much more to the success of the company than was represented by his salary. “It would take two or three people to replace me,” he often thought to himself. As the amounts became larger and larger, (5) he made the books balance. Because of these activities, John was able to purchase an expensive car and take his family on several trips each year. (6) He also joined an expensive country club. Things were changing at home, however. (7) John’s family observed that he was often argumentative and at other times very depressed. The fraud continued for 6 years. Each year, the business performed more and more poorly. In the last year, the stores had a substantial net loss. Randy’s bank required an audit. John confessed when he thought the auditors had discovered his embezzlements. When discussing frauds, the pressures, opportunities, and rationalizations that cause/allow a perpetrator to commit the fraud are often identified. Symptoms of fraud are also studied."}], "answer": 3}, {"q_tr": "6 Numaralı madde, \"Pahalı bir golf kulübüne de üye oldu\", aşağıdakilerden hangisine bir örnektir?", "q_en": "Number 6, “He also joined an expensive country club,” is an example of a", "options": [{"tr": "Meşrulaştırma.", "en": "Rationalization.", "cmt_tr": "Pahalı bir golf kulübüne üye olmak yaşam tarzı semptomuna örnektir.", "cmt_en": "Joining an expensive country club is an example of a lifestyle symptom."}, {"tr": "Yaşam tarzı semptomu.", "en": "Lifestyle symptom.", "cmt_tr": "John gelirinin ötesinde bir yaşam sürüyordu. Yaşam tarzındaki değişiklik hilenin varlığına işaret eden bir semptomdu.", "cmt_en": "John was living beyond his means. The change in lifestyle was a symptom that indicated the presence of fraud."}, {"tr"
