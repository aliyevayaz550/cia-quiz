ion of these documents."}, {"tr": "Seçilen günler için müşteri yemek çeklerinin toplamının günlük banka mevduatlarıyla mutabakatı.", "en": "For selected days, reconciling the total of customer food checks to daily bank deposits.", "cmt_tr": "Müşteri yemek çeklerinin toplamının satış doğrulaması olarak kullanılması, banka mevduatındaki eksikliği tespit ederdi.", "cmt_en": "Using the total of the customer food checks as a confirmation of sales would have detected the shortage in the bank deposit."}], "answer": 3}, {"q_tr": "Bir kuruluş, alım satım amaçlı menkul kıymetlerinin saklanması için bir emanet şirketi kullandığında, hile gizleme olasılığı büyük olasılıkla aşağıdaki durumda azalacaktır:", "q_en": "When an entity uses a trust company as custodian of its trading securities, the possibility of concealing fraud most likely will be reduced if the", "options": [{"tr": "Emanet şirketinin, yatırım muhasebe kayıtlarını tutan kuruluş çalışanlarıyla doğrudan teması yoktur.", "en": "Trust company has no direct contact with the entity employees responsible for maintaining investment accounting records.", "cmt_tr": "Alım satım amaçlı menkul kıymetlerle ilgili hileyi gizlemek için kayıt tutma ve saklama sorumluluğu olanlar arasında işbirliği gereklidir. Sorumlu taraflar arasında doğrudan temas yoksa işbirliği olasılığı azalır.", "cmt_en": "To conceal fraud related to trading securities, collusion between those responsible for record keeping and custody is required. The possibility of collusion is reduced if no direct contact between responsible parties exists."}, {"tr": "Menkul kıymetler kuruluş yerine emanet şirketi adına kayıtlıdır.", "en": "Securities are registered in the name of the trust company rather than the entity itself.", "cmt_tr": "Menkul kıymetler sahibi adına kayıtlı olmalıdır.", "cmt_en": "The securities should be registered in the name of the owner."}, {"tr": "Faiz ve temettü çekleri, menkul kıymet satmaya yetkili bir kuruluş çalışanına doğrudan postalanmaktadır.", "en": "Interest and dividend checks are mailed directly to an entity employee who is authorized to sell securities.", "cmt_tr": "Faiz ve temettüler emanetçi emanet şirketine gönderilmelidir.", "cmt_en": "Interest and dividends should be sent to the trust company custodian."}, {"tr": "Emanet şirketi menkul kıymetleri emanetçinin münhasır kontrolü altında bir banka kasasına yerleştirmektedir.", "en": "Trust company places the securities in a bank safe-deposit vault under the custodian’s exclusive control.", "cmt_tr": "Emanetçinin münhasır kontrolü altında banka kasası kullanmak uygun bir kontroldür ancak işbirliği olasılığını minimize etmez.", "cmt_en": "Use of a bank safe-deposit vault under the custodian’s exclusive control is an appropriate control but does not minimize the possibility of collusion."}], "answer": 0}], "SU2 - Fraud: Controls": [{"q_tr": "İç denetçilerin hileyi caydırmaya yardımcı olma sorumluluğu vardır. Bu sorumluluk genellikle en iyi şekilde nasıl yerine getirilir?", "q_en": "Internal auditors have a responsibility for helping to deter fraud. Which of the following best describes how this responsibility is usually met?", "options": [{"tr": "Olası hilelerin soruşturulmasında güvenlik personeli ve kolluk kuvvetleriyle koordinasyon sağlayarak.", "en": "By coordinating with security personnel and law enforcement agencies in the investigation of possible frauds.", "cmt_tr": "Olası hilelerin soruşturulması caydırma değil tespit ile ilgilidir.", "cmt_en": "Investigating possible frauds involves detection, not deterrence."}, {"tr": "Her görevde hile testi yaparak ve uygun şekilde takip ederek.", "en": "By testing for fraud in every engagement and following up as appropriate.", "cmt_tr": "Her görevde hile testi yapılması zorunlu değildir.", "cmt_en": "Testing for fraud in every engagement is not required."}, {"tr": "Hileyi önlemek için kontrol sistemlerinin tasarımına yardımcı olarak.", "en": "By assisting in the design of control systems to prevent fraud.", "cmt_tr": "Kontrol sistemleri tasarlamak iç denetçinin tarafsızlığını zedeler.", "cmt_en": "Designing control systems impairs an internal auditor’s objectivity."}, {"tr": "Potansiyel maruziyete veya riske orantılı olarak kontrollerin yeterliliğini ve etkinliğini değerlendirerek.", "en": "By evaluating the adequacy and effectiveness of controls in light of the potential exposure or risk.", "cmt_tr": "Kontrol, hileyi önlemenin başlıca aracıdır. Yönetim, kontrolün kurulması ve sürdürülmesinden birincil olarak sorumludur. Güvence görevinde iç denetçiler, risklere karşılık kontrollerin yeterliliğini ve etkinliğini değerlendirerek kuruluşa yardımcı olmalıdır.", "cmt_en": "Control is the principal means of preventing fraud. Management is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks."}], "answer": 3}, {"q_tr": "Satın alma departmanını kapsayan bir görev sırasında, iç denetçi bir satıcının alıcıları alınan siparişlerin büyüklüğüne orantılı olarak ödüllendirdiğini öğrenmiştir. İç denetçi, alıcıların gelecekte bu tür ödülleri kabul etme olasılığını azaltmak için hangi tavsiyede bulunmalıdır?", "q_en": "During an engagement involving the purchasing department, an internal auditor learned that one vendor rewarded buyers in proportion to the size of the orders received. What recommendation should the internal auditor make to reduce the likelihood of future acceptance of such rewards by the buyers?", "options": [{"tr": "Bir çalışan danışmanlık programı oluşturmak.", "en": "Establishing an employee counseling program.", "cmt_tr": "Danışmanlığın dürüst olmayan çalışanların davranışını değiştirmesi pek olası değildir.", "cmt_en": "Counseling is unlikely to change the behavior of dishonest employees."}, {"tr": "Alıcı yaşam tarzlarının periyodik incelenmesi.", "en": "Periodic review of buyer lifestyles.", "cmt_tr": "Bu inceleme, yaşam tarzı değişikliği olmadıkça hileyi ortaya çıkarmayacak bir tespit edici kontroldür.", "cmt_en": "Such review is a detective control that would not uncover fraud unless a lifestyle change occurred."}, {"tr": "Alıcı durumsal baskılarını belirleme ve azaltma politikası.", "en": "A policy of identifying and reducing buyer situational pressures.", "cmt_tr": "Kuruluş dışındaki durumsal baskılar kuruluşun kontrolü dışında olabilir. Kuruluş içindeki baskılar alıcının satıcılardan rüşvet almasına neden olmamalıdır.", "cmt_en": "Situational pressures external to the organization may be beyond its control. Pressures within the organization, e.g., to improve performance, should not cause a buyer to take bribes from vendors."}, {"tr": "Yönetimin kurumsal etiğe bağlılığının güçlü, yazılı bir bildirisi.", "en": "A strong, written statement of management’s commitment to organizational ethics.", "cmt_tr": "Yönetimin yazılı politikalarına, personel uygulamalarına ve etkili kontrole olan ilgisine yansıyan etik davranışa güçlü bağlılığı uygun ortamın oluşturulmasını destekler.", "cmt_en": "A strong commitment by management to ethical conduct reflected in its written policies, personnel practices, interest in effective control, etc., will foster creation of the appropriate environment."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi, iç denetçinin bir kuruluşta hilenin caydırılmasındaki sorumluluklarından birini tanımlar?", "q_en": "Which of the following describes one of the responsibilities of the internal auditor for the deterrence of fraud in an organization?", "options": [{"tr": "Hileyi caydırmak için sistemlerin uygulanması.", "en": "Implementation of systems to discourage fraud.", "cmt_tr": "Sistemleri uygulamak, yönetimin sorumluluğunda olan bir operasyonel fonksiyondur.", "cmt_en": "Implementing systems is an operating function for which management is responsible."}, {"tr": "Hile faillerinin kovuşturulması.", "en": "Prosecuting perpetrators of fraud.", "cmt_tr": "Hile faillerinin kovuşturulması yönetimin sorumluluğundadır.", "cmt_en": "Prosecuting perpetrators of fraud is a responsibility of management."}, {"tr": "Şüpheli hilenin kolluk kuvvetlerine bildirilmesi.", "en": "Reporting suspected fraud to law enforcement personnel.", "cmt_tr": "Şüpheli hilenin kolluk kuvvetlerine bildirilmesi yönetimin sorumluluğundadır.", "cmt_en": "Reporting suspected fraud to law enforcement personnel is a responsibility of management."}, {"tr": "Hileyi önlemeye yönelik kontrollerin yeterliliğinin değerlendirilmesi.", "en": "Evaluating the adequacy of controls to prevent fraud.", "cmt_tr": "Kontrol, hileyi önlemenin başlıca aracıdır. Yönetim kontrolün kurulması ve sürdürülmesinden birincil olarak sorumludur. Güvence görevinde iç denetçiler, risklere karşılık kontrollerin yeterliliğini ve etkinliğini değerlendirerek kuruluşa yardımcı olmalıdır.", "cmt_en": "Control is the principal means of preventing fraud. Management, in turn, is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks."}], "answer": 3}, {"q_tr": "Bir iç denetim görevinden kısa süre sonra önemli bir çalışan hilesi gerçekleşmiştir. İç denetçi, aşağıdakileri fark edip bildirmemekle hile önleme sorumluluğunu gerektiği gibi yerine getirmemiş olabilir:", "q_en": "A significant employee fraud took place shortly after an internal auditing engagement. The internal auditor may not have properly fulfilled the responsibility for the prevention of fraud by failing to note and report that", "options": [{"tr": "Faaliyetleri izleme ve varlıkları korumaya yönelik politika, uygulama ve prosedürlerin düşük riskli alanlarda yüksek riskli alanlara göre daha az kapsamlı olması.", "en": "Policies, practices, and procedures to monitor activities and safeguard assets were less extensive in low-risk areas than in high-risk areas.", "cmt_tr": "Maliyet-fayda nedenleriyle kontroller yüksek riskli alanlarda daha kapsamlı olmalıdır.", "cmt_en": "For cost-benefit reasons, controls should be more extensive in high-risk areas."}, {"tr": "Görev ayrımına dayanan bir kontrol sisteminin üç çalışanın işbirliğiyle atlatılabilmesi.", "en": "A system of control that depended upon separation of duties could be circumvented by collusion among three employees.", "cmt_tr": "En iyi kontrol sistemi bile çoğu zaman işbirliğiyle atlatılabilir.", "cmt_en": "Even the best system of control can often be circumvented by collusion."}, {"tr": "Yasaklanan faaliyetleri ve ihlaller tespit edildiğinde gereken eylemleri tanımlayan yazılı politikaların bulunmaması.", "en": "There were no written policies describing prohibited activities and the action required whenever violations are discovered.", "cmt_tr": "Yönetim iç kontrolü kurmak ve sürdürmekten sorumludur. Hile önleme programının kontrol ortamı unsuru, uygun üst yönetim tonunu belirlemeye yönelik davranış kuralları, etik politikası veya hile politikasını içerir. Ayrıca kuruluşlar etkili hileyle ilgili bilgi ve iletişim uygulamaları oluşturmalıdır.", "cmt_en": "Management is responsible for establishing and maintaining internal control. Thus, management also is responsible for the fraud prevention program. The control environment element of this program includes a code of conduct, ethics policy, or fraud policy to set the appropriate tone at the top. Moreover, organizations should establish effective fraud-related information and communication practices, for example, documentation and dissemination of policies, guidelines, and results."}, {"tr": "Bölüm çalışanlarının yetkilendirme formlarındaki gerçek imzalarla ustaca yapılmış sahte imzaları ayırt etmek üzere uygun şekilde eğitilmemesi.", "en": "Divisional employees had not been properly trained to distinguish between bona fide signatures and cleverly forged ones on authorization forms.", "cmt_tr": "Sahtecilik, tıpkı işbirliği gibi etkili bir kontrolü bile atlatabilir.", "cmt_en": "Forgery, like collusion, can circumvent even an effective control."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi iç denetçilerin hile konusundaki bir sorumluluğudur?", "q_en": "Which of the following is a responsibility of internal auditors regarding fraud?", "options": [{"tr": "Kuruluşun yolsuzlukla mücadele ilkelerini operasyonlar genelinde uygulamak.", "en": "Translating the organization’s anticorruption principles across operations.", "cmt_tr": "Yönetim, iç denetçiler değil, hileyi caydırma ve önlemeye yönelik etkili kontroller kurmak ve sürdürmekten sorumludur.", "cmt_en": "Management, not the internal auditors, is responsible for establishing and maintaining effective controls to deter and prevent fraud. Translating the organization’s corruption prevention principles across operations is a management responsibility."}, {"tr": "Yönetimin etkili bir iç kontrol sistemi uyguladığından emin olmak için gözetim sağlamak.", "en": "Providing oversight to ensure that management has implemented an effective system of internal controls.", "cmt_tr": "İç denetçiler, yönetimin hile önlemeye ilişkin etkili iç kontroller uyguladığından emin olunmasında yönetim kurulu veya denetim komitesi gözetimini desteklemekten sorumludur.", "cmt_en": "Internal auditors are responsible for supporting board or audit committee oversight in ensuring management has implemented effective internal controls regarding fraud prevention."}, {"tr": "Kuruluşun üst düzey mali yöneticilerini kapsayan bir etik kuralına sahip olup olmadığını izlemek.", "en": "Monitoring whether the organization has a code of ethics that covers its senior financial officers.", "cmt_tr": "Kontrol ortamı; (1) uygun üst yönetim tonunu belirlemek için davranış kuralları, etik veya hile politikası; (2) işe alım ve terfi kuralları ve uygulamaları; ve (3) yönetim kurulu gözetimi gibi unsurları içerir.", "cmt_en": "The control environment includes such elements as (1) a code of conduct, ethics policy, or fraud policy to set the appropriate tone at the top; (2) hiring and promotion guidelines and practices; and (3) board oversight. Thus, internal auditors are responsible for monitoring the annual disclosure of whether the organization has a code of ethics that covers its CEO and senior financial officers."}, {"tr": "Güçlü bir etik kültürü aşılamak.", "en": "Instilling a strong ethical culture.", "cmt_tr": "İç denetçiler kuruluş içinde hile farkındalığını artırmaktan, denetim komitesini ve üst yönetimi güçlü bir etik kültür dahil uygun üst yönetim tonunu belirlemeye teşvik etmekten sorumludur.", "cmt_en": "Internal auditors are responsible for raising fraud awareness within the organization, including encouraging the audit committee and senior management to set the proper tone at the top, including a strong ethical culture."}], "answer": 2}, {"q_tr": "Bir hile önleme projesinde güvence görevinde danışman olarak hareket eden iç denetçilerin hile kontrolü konusunda büyük olasılıkla yerine getireceği fonksiyon hangisidir?", "q_en": "Internal auditors acting as consultants in an assurance engagement for a fraud prevention project are most likely to perform which function regarding fraud control?", "options": [{"tr": "Tasarım.", "en": "Design.", "cmt_tr": "Kontrol tasarlamak iç denetçilerin tarafsızlığını ve kurumsal bağımsızlığını zedeleyebilir.", "cmt_en": "Designing controls may impair internal auditors’ objectivity and organizational independence."}, {"tr": "Risk değerlendirmesi.", "en": "Risk assessment.", "cmt_tr": "Güvence görevinde iç denetçiler risklere karşılık kontrollerin yeterliliğini ve etkinliğini değerlendirmelidir. İç denetçiler hile önleme kontrollerini tasarlama ve uygulamadan sorumlu değildir. Ancak danışmanlık rolünde yönetime risk belirleme ve değerlendirmede ve kontrol ortamının yeterliliğini belirlemede yardımcı olabilirler.", "cmt_en": "In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks. Internal auditors are not responsible for designing and implementing fraud prevention controls. However, internal auditors acting in a consulting role can help management identify and assess risk and determine the adequacy of the control environment. Internal auditors are also in a unique position within the organization to recommend changes to improve the control environment."}, {"tr": "Uygulama.", "en": "Implementation.", "cmt_tr": "Hile önleme kontrollerini uygulamak iç denetçilerin değil yönetimin sorumluluğudur.", "cmt_en": "Implementing fraud prevention controls is a management responsibility, not that of internal auditors."}, {"tr": "Yönetim.", "en": "Management.", "cmt_tr": "Yönetim fonksiyonları icra eden iç denetçiler ne bağımsız ne de tarafsızdır.", "cmt_en": "Internal auditors that perform management functions are neither independent nor objective."}], "answer": 1}, {"q_tr": "Hile farkındalık eğitimi hile önlemeyi nasıl destekler?", "q_en": "How does fraud awareness training support fraud prevention?", "options": [{"tr": "Meşrulaştırmayı sınırlar.", "en": "Limits rationalization.", "cmt_tr": "Birey hileli eylemlerini meşrulaştırma yoluyla haklı çıkarır. Hile farkındalık eğitimi; (1) üst yönetimin etik tonunu destekleyerek, (2) hile karşıtı bir ortamı teşvik ederek ve (3) kuruluşun hiçbir türde suistimale tolerans göstermediğini vurgulayarak meşrulaştırmayı en aza indirir.", "cmt_en": "An individual justifies fraudulent actions by rationalization. Fraud awareness training minimizes rationalization by (1) supporting the ethical tone at the top, (2) promoting an anti-fraud environment, and (3) emphasizing that the organization does not tolerate misconduct of any kind."}, {"tr": "Hile işleme fırsatlarını azaltır.", "en": "Reduces opportunities to commit fraud.", "cmt_tr": "Hile farkındalık eğitimi hile işleme fırsatlarını azaltmaz.", "cmt_en": "Fraud awareness training does not reduce opportunities to commit fraud."}, {"tr": "Potansiyel risklere karşı güvenilir yanıtlar geliştirmeye yardımcı olur.", "en": "Helps develop credible responses to potential risks.", "cmt_tr": "Kontroller potansiyel risklere karşı güvenilir yanıtlar geliştirmeye yardımcı olur, hile farkındalık eğitimi değil.", "cmt_en": "Controls help develop credible responses to potential risks, not fraud awareness training."}, {"tr": "Kontrollerin test edilmesini kolaylaştırır.", "en": "Facilitates the testing of controls.", "cmt_tr": "Hile farkındalık eğitimi kontrollerin test edilmesini kolaylaştırmaz.", "cmt_en": "Fraud awareness training does not facilitate the testing of controls."}], "answer": 0}, {"q_tr": "İç denetçilerin hile konusundaki sorumluluğu şunları içerir:", "q_en": "The internal auditors’ responsibility regarding fraud includes", "options": [{"tr": "Kontrol ortamında uygun üst yönetim tonunu belirlemek.", "en": "Setting the appropriate tone at the top in the control environment.", "cmt_tr": "İç denetim kuruluşun kontrol ortamını değerlendirmekten sorumludur. Ancak üst yönetim tonunu yönetim kurulu ve yönetim belirler.", "cmt_en": "Internal auditing is responsible for evaluating the organization’s control environment. However, the board and management set the tone at the top."}, {"tr": "Hilenin gerçekleşmeyeceğini güvence altına almak.", "en": "Ensuring that fraud will not occur.", "cmt_tr": "Kontrol hileyi önlemenin başlıca aracıdır ve yönetim iç kontrolü kurmak ve sürdürmekten sorumludur. Bu nedenle iç denetçiler uyumsuzluk veya hilenin olmadığına dair mutlak güvence veremez.", "cmt_en": "Control is the principal means of preventing fraud, and management is responsible for establishing and maintaining internal control. Thus, internal auditors cannot give absolute assurance that noncompliance or fraud does not exist."}, {"tr": "Hile kontrollerini sürdürmek.", "en": "Maintaining fraud controls.", "cmt_tr": "Kontrolü kurmak ve sürdürmek yönetimin sorumluluğudur.", "cmt_en": "Management is responsible for establishing and maintaining control."}, {"tr": "Kontrol faaliyetlerinin sürekli iyileştirilmesini teşvik etmek.", "en": "Promoting continuous improvement of control activities.", "cmt_tr": "Hileyle ilgili kontrollerin değerlendirilmesi iç denetimin sorumluluğundadır. Kontrollerin etkinliğini ve verimliliğini değerlendirerek ve sürekli iyileştirmeyi teşvik ederek kuruluşun etkili kontrolleri sürdürmesine yardımcı olur.", "cmt_en": "Assessing fraud-related controls is the responsibility of internal auditing. It assists the organization in maintaining effective controls by evaluating their effectiveness and efficiency and promoting continuous improvement."}], "answer": 3}, {"q_tr": "Bir programcının yuvarlama hatalarını daha sonra eriştiği bir hesapta biriktirmesi bir bilgisayar hilesi türüdür. Bu tür hileyi önlemenin en iyi yolu nedir?", "q_en": "A programmer’s accumulation of roundoff errors into one account, which is later accessed by the programmer, is a type of computer fraud. The best way to prevent this type of fraud is to", "options": [{"tr": "Makullük testleriyle muhakeme oluşturmak.", "en": "Build in judgment with reasonableness tests.", "cmt_tr": "Makullük testleri bu usulsüzlüğü tespit etmeyecektir. Bu tür hilede tüm tutarlar denk gelecektir.", "cmt_en": "Reasonableness tests will not detect this irregularity. In this particular type of fraud, all of the amounts will balance."}, {"tr": "Geliştirme sırasında programları bağımsız olarak test etmek ve programlara erişimi sınırlamak.", "en": "Independently test programs during development and limit access to the programs.", "cmt_tr": "Programcılar, işleme sırasında kullanılan programlara erişememeli. Yuvarlama hatalarının bir kişinin hesabında birikmesi programa yazılmış bir prosedürdür. Bir programın bağımsız testi bu programlanmış hileyi ortaya çıkaracaktır.", "cmt_en": "Programmers should not have access to programs used in processing. The accumulation of roundoff errors into one person’s account is a procedure written into the program. Independent testing of a program will lead to discovery of this programmed fraud."}, {"tr": "Sistem geliştirme ve programlama görevlerini ayırmak.", "en": "Segregate duties of systems development and programming.", "cmt_tr": "Sistem geliştirme ve programlama arasındaki görev ayrımı bu tür hatayı önlemez. Programı oluşturmak için gerekli beceriler programcılara aittir.", "cmt_en": "Segregation of duties between systems development and programming would not prevent this type of error. The skills required to construct the program are possessed by programmers."}, {"tr": "Kontrol toplamları kullanmak ve bilgisayar sonuçlarını kontrol etmek.", "en": "Use control totals and check the results of the computer.", "cmt_tr": "Bu tür hile denk kayıtlarla sonuçlanacaktır. Bu nedenle kontrol toplamları hileyi tespit etmez.", "cmt_en": "This particular fraud will result in balanced entries. Thus, control totals would not detect the fraud."}], "answer": 1}, {"q_tr": "Aşağıdaki kontrollerden hangisi, hayali satıcılara satın alma siparişleri göndererek gerçekleştirilen hileyi önlemede en az etkilidir?", "q_en": "Which of the following controls is the least effective in preventing a fraud conducted by sending purchase orders to bogus vendors?", "options": [{"tr": "Tüm satın almaların, sipariş veren kişiden bağımsız olarak tutulan onaylı satıcı listesinden yapılmasını zorunlu kılmak.", "en": "Require that all purchases be made from an authorized vendor list maintained independently of the individual placing the purchase order.", "cmt_tr": "Saygın satıcıların seçimi ve onayını fiili siparişlerin verilmesinden ayırmak, hileyi önlemenin etkili bir yoludur.", "cmt_en": "Segregating the selection and approval of reputable vendors from placement of actual orders is an effective means of preventing fraud."}, {"tr": "Satın almalar için yalnızca onaylı satıcılara ödeme yapılmasını zorunlu kılmak.", "en": "Require that only approved vendors be paid for purchases.", "cmt_tr": "Ödemeyi onaylı satıcılarla sınırlamak hileyi önlemenin etkili bir yoludur.", "cmt_en": "Restricting payment to approved vendors is an effective means of preventing fraud."}, {"tr": "Üretim bileşenlerinin satın alındığı tüm büyük satıcılarla sözleşme yapılmasını zorunlu kılmak.", "en": "Require contracts with all major vendors from whom production components are purchased.", "cmt_tr": "Büyük satıcılarla sözleşme yapılmasını zorunlu kılmak hileyi önlemenin etkili bir yoludur.", "cmt_en": "Requiring contracts with major vendors is an effective means of preventing fraud."}, {"tr": "Bir aylık toplam satın almaların o ay için bütçelenen toplam satın almaları aşmamasını zorunlu kılmak.", "en": "Require that total purchases for a month not exceed the total budgeted purchases for that month.", "cmt_tr": "Bir aylık toplam satın almaların bütçelenen toplam satın almaları aşmamasını zorunlu kılmak toplam harcama tutarını kontrol eder, ancak satın almanın talep ve onay edilip edilmediğini, siparişlerin kime verildiğini veya satın alınan malların teslim alınıp alınmadığını kontrol etmez.", "cmt_en": "Requiring that total purchases for a month not exceed the total budgeted purchases for that month controls the total amount of expenditures, not whether a purchase has been requested and authorized, with whom the purchase orders are placed, or whether goods purchased are received."}], "answer": 3}, {"q_tr": "İç denetim, aşağıdaki yollarla hile önlenmesine yardımcı olmaktan sorumludur:", "q_en": "Internal auditing is responsible for assisting in the prevention of fraud by", "options": [{"tr": "Suistimal şüphelenildiğinde kuruluş içindeki uygun makamlara bilgi vermek ve koşullar gerektirdiğinde gerekli görülen soruşturmayı önermek.", "en": "Informing the appropriate authorities within the organization and recommending whatever investigation is considered necessary in the circumstances when wrongdoing is suspected.", "cmt_tr": "Kuruluş içindeki uygun makamlara bilgi vermek, iç denetçinin hile tespiti yükümlülüğüyle ilgilidir, önleme değil.", "cmt_en": "Informing appropriate authorities in the organization when the internal auditor suspects wrongdoing relates to the internal auditor’s obligation for detecting, not preventing, fraud."}, {"tr": "Kuruluşun yasalara, düzenlemelere ve sözleşmelere uyuma ilişkin yönetişim, operasyonlar ve bilgi sistemlerini kurmak.", "en": "Establishing the organization’s governance, operations, and information systems concerning compliance with laws, regulations, and contracts.", "cmt_tr": "Yönetişim, operasyonlar ve bilgi sistemlerini kurmak yönetimin sorumluluğundadır.", "cmt_en": "Management is responsible for establishing governance, operations, and information systems."}, {"tr": "Kuruluşun operasyonlarının çeşitli bölümlerindeki potansiyel maruziyet veya riskle orantılı olarak kontrolün yeterliliğini ve etkinliğini incelemek ve değerlendirmek.", "en": "Examining and evaluating the adequacy and the effectiveness of control, commensurate with the extent of the potential exposure or risk in the various segments of the organization’s operations.", "cmt_tr": "Kontrol hileyi önlemenin başlıca aracıdır. Yönetim kontrolün kurulması ve sürdürülmesinden birincil olarak sorumludur. Güvence görevinde iç denetçiler, risklere karşılık kontrollerin yeterliliğini ve etkinliğini değerlendirerek kuruluşa yardımcı olmalıdır.", "cmt_en": "Control is the principal means of preventing fraud. Management, in turn, is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks."}, {"tr": "Operasyonel standartların kabul edilebilir olup olmadığını ve karşılanıp karşılanmadığını belirlemek.", "en": "Determining whether operating standards are acceptable and are being met.", "cmt_tr": "Operasyonel standartların kabul edilebilir olup olmadığını ve karşılanıp karşılanmadığını belirlemek, iç denetçinin hile önleme sorumluluğu değil yönetimin fonksiyonudur.", "cmt_en": "Determining whether operating standards are acceptable and are being met is a function of management, not the internal auditor's fraud prevention responsibility."}], "answer": 2}, {"q_tr": "Yeni işe alınan iki çalışan birbirlerine departmanlarının sorumluluklarını açıklamaktadır. İç denetimdeki yeni çalışan, pazarlamadaki yeni çalışana hile konusundaki sorumluluklarının şunları kapsadığını söylemektedir: 1. Kontrol ortamının uygun üst yönetim tonunu belirleyip belirlemediğini tespit etmek, 2. Hilenin gerçekleşmeyeceğini güvence altına almak, 3. Hilenin muhtemel olduğu faaliyetlerin farkında olmak, 4. Kontrol faaliyetlerinin etkinliğini değerlendirmek. İç denetimdeki yeni çalışanın ifadesi doğru mudur?", "q_en": "Two newly hired employees are explaining to each other what their department’s responsibilities are. The new hire in internal auditing says to the new employee in marketing that their responsibility regarding fraud includes 1. Determining whether the control environment sets the appropriate tone at top, 2. Ensuring that fraud will not occur, 3. Being aware of activities in which fraud is likely to occur, and 4. Evaluating the effectiveness of control activities. Is the statement by the new hire in internal auditing correct?", "options": [{"tr": "Hayır, kontrol ortamının uygun üst yönetim tonunu belirleyip belirlemediğini tespit etmek iç denetimin sorumluluğu değildir.", "en": "No, determining whether the control environment sets the appropriate tone at top is not a responsibility of internal auditing.", "cmt_tr": "İç denetim, kuruluşun kontrol ortamını değerlendirmekten sorumludur.", "cmt_en": "Internal auditing is responsible for evaluating the organization’s control environment."}, {"tr": "Hayır, hilenin gerçekleşmeyeceğini güvence altına almak iç denetimin sorumluluğu değildir.", "en": "No, ensuring that fraud will not occur is not a responsibility of internal auditing.", "cmt_tr": "Kontrol hileyi önlemenin başlıca aracıdır ve yönetim iç kontrolü kurmak ve sürdürmekten sorumludur. Bu nedenle iç denetçiler uyumsuzluk veya hilenin olmadığına dair mutlak güvence veremez.", "cmt_en": "Control is the principal means of preventing fraud, and management is responsible for establishing and maintaining internal control. Thus, internal auditors cannot give absolute assurance that noncompliance or fraud does not exist."}, {"tr": "Hayır, hilenin muhtemel olduğu faaliyetlerin farkında olmak iç denetimin sorumluluğu değildir.", "en": "No, being aware of activities in which fraud is likely to occur is not a responsibility of internal auditing.", "cmt_tr": "İç denetçi hile göstergeleri hakkında yeterli bilgiye sahip olmalı ve hileye olanak tanıyabilecek fırsatlara karşı uyanık olmalıdır.", "cmt_en": "The internal auditor should have sufficient knowledge of fraud indicators and be alert to opportunities that could allow fraud."}, {"tr": "Hayır, kontrol faaliyetlerinin etkinliğini değerlendirmek iç denetimin sorumluluğu değildir.", "en": "No, evaluating the effectiveness of control activities is not a responsibility of internal auditing.", "cmt_tr": "İç denetçi hile göstergeleri hakkında yeterli bilgiye sahip olmalı ve hileye olanak tanıyabilecek fırsatlara karşı uyanık olmalıdır. Kontrol faaliyetlerinin etkinliğini değerlendirmek iç denetimin sorumluluğudur.", "cmt_en": "The internal auditor should have sufficient knowledge of fraud indicators and be alert to opportunities that could allow fraud. Evaluating the effectiveness of control activities is indeed a responsibility of internal auditing."}], "answer": 1}, {"q_tr": "Aşağıdaki kontrollerden hangisi bu hileyi önlemede en etkili olurdu?", "q_en": "Which of the following controls would have been most effective in preventing this fraud?", "options": [{"tr": "Tüm mal satın alımlarının yalnızca önceden onaylanmış satıcılar listesinden yapılmasına izin vermek.", "en": "Allowing purchases only from a list of pre-approved vendors.", "cmt_tr": "Olgular satıcının eylemlerinin uygunsuz olduğunu göstermemektedir.", "cmt_en": "The facts do not suggest that the vendor’s actions were inappropriate."}, {"tr": "Tüm mal satın alımlarında önceden numaralandırılmış satın alma siparişlerinin kullanılmasını zorunlu kılmak.", "en": "Requiring the use of prenumbered purchase orders for all purchases of merchandise.", "cmt_tr": "Ön numaralandırma hileyi önlemezdi. Zayıflık yetkilendirme ve teslim alma prosedürlerindedir.", "cmt_en": "Prenumbering would not have prevented the fraud. The weakness is in the authorization and receiving procedures."}, {"tr": "Faturalar ödendiğinde satın alma siparişleri ve teslim alma raporları gibi destekleyici belgelerin iptal edilmesi.", "en": "Canceling supporting documents, such as purchase orders and receiving reports, at the time invoices are paid.", "cmt_tr": "Faturalar ödendiğinde destekleyici belgelerin iptal edilmesi, aynı belgenin iki özdeş ödemeyi desteklemek için kullanılmasını önler, ancak buradaki suistimal bu değildir.", "cmt_en": "Canceling supporting documents when invoices are paid prevents the same document from being used to support two identical payments, but that is not the abuse here."}, {"tr": "Mal siparişi ile teslim alma arasında görev ayrımı oluşturmak.", "en": "Establishing separation of duties between the ordering and receiving of merchandise.", "cmt_tr": "Satın alma ve teslim alma fonksiyonlarını ayırmak iç kontrolü iyileştirirdi. Söz konusu malzemeler kuruluşa gönderilseydi ve teslim alma raporu sipariş veren dışında başka bir çalışan tarafından hazırlansaydı hile gerçekleşemezdi.", "cmt_en": "Separating the purchasing and receiving functions would have improved internal control. If the supplies in question had been sent to the organization, and a receiving report had been prepared by an employee other than the one ordering the goods, the fraud could not have occurred. Moreover, the receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items. Fact Pattern: A purchasing agent acquired items for personal use with the organization’s funds. The organization allowed designated employees to purchase a specified amount per day in merchandise under open-ended contracts. Supervisory approval of the purchases was required, but that information was not communicated to the vendor. Instead of reviewing and authorizing each purchase order, supervisors routinely signed the authorization sheet at the end of the month without reviewing any of the supporting documentation. Because purchases of this nature were not subject to normal receiving policies, the dishonest employee picked up the supplies at the vendor’s warehouse. All purchases were for items routinely ordered by the organization. During the past year, the employee amassed enough merchandise to start a printing and photography business."}], "answer": 3}, {"q_tr": "İç denetçi tarafından gerçekleştirilen aşağıdaki görev prosedürlerinden hangisi bu hileyi tespit etme olasılığı en yüksektir?", "q_en": "Which of the following engagement procedures, performed by the internal auditor, is most likely to detect this fraud?", "options": [{"tr": "Seçilmiş iptal edilmiş çeklerin nakit ödeme günlüğüne ve ilgili satıcı faturalarına izlenmesi.", "en": "Tracing selected canceled checks to the cash payments journal and to the related vendors’ invoices.", "cmt_tr": "Bu hileyle ilgili her nakit ödeme için meşru bir satıcı faturası mevcuttu.", "cmt_en": "A legitimate vendor’s invoice existed for each cash payment related to this fraud."}, {"tr": "2 yıllık dönem için baskı malzemeleri giderlerinin trend analizi yapılması.", "en": "Performing a trend analysis of printing supplies expenses for a 2-year period.", "cmt_tr": "Analitik prosedürlerin uygulanmasının temel öncülü, verilere ilişkin mantıklı ilişkilerin, aksini gösteren bilinen koşullar olmadıkça makul olarak var olması ve devam etmesinin beklenebilmesidir. Bu nedenle 2 yıllık baskı malzemeleri giderlerinin trend analizi aşırı malzeme kullanımını tespit etmelidir.", "cmt_en": "A basic premise underlying the application of analytical procedures is that plausible relationships among data may reasonably be expected to exist and continue in the absence of known conditions to the contrary. Thus, performing a trend analysis of printing supplies expenses for a 2-year period should identify an excess use of supplies."}, {"tr": "Seçilmiş satıcı faturalarındaki fiyat ve miktarların ilgili satın alma siparişlerine izlenmesi.", "en": "Tracing prices and quantities on selected vendors’ invoices to the related purchase orders.", "cmt_tr": "Sorun, müşteri tarafından sipariş edilen miktarların faturalanıp faturalanmadığı değil, işlemlerin yetkilendirilip yetkilendirilmediğidir.", "cmt_en": "The issue is not whether the quantities ordered by the customer were billed but whether the transactions were authorized."}, {"tr": "Seçilmiş satıcı faturalarının indirimler ve satış vergileri dahil aritmetik doğruluğunun yeniden hesaplanması.", "en": "Recomputing the clerical accuracy of selected vendors’ invoices, including discounts and sales taxes.", "cmt_tr": "Sorun faturaların doğru olup olmadığı değil, işlemlerin yetkilendirilip yetkilendirilmediğidir.", "cmt_en": "The issue is not whether the invoices were accurate but whether the transactions were authorized. Fact Pattern: A fraud was perpetrated in a moderate-sized organization when the accounting clerk was delegated too much responsibility. During the year, the organization switched suppliers of a service to a new vendor. The accounting clerk continued to submit fraudulent invoices from the “old supplier.” Because contracting for services and approval of supplier invoices had been delegated to the clerk, it was possible for the clerk to continue billings from the old supplier and deposit the subsequent checks, which the clerk was responsible to mail, into a new account the clerk opened in the name of the old supplier. The clerk was considered an excellent employee and eventually was improperly given the added responsibility of preparing the department budgets. This added responsibility allowed the clerk to budget for the amount of the fraudulent payments."}], "answer": 1}, {"q_tr": "Aşağıdaki kontrollerden hangisinin tanımlanan hileyi önleme veya tespit etme olasılığı en düşüktür?", "q_en": "Which of the following controls would have been least likely to prevent or detect the fraud described?", "options": [{"tr": "Sözleşmeyi müzakere eden kişi dışında başka birinin ödeme onayı vermesini zorunlu kılmak.", "en": "Requiring authorization of payments by someone other than the clerk negotiating the contract.", "cmt_tr": "Hizmet sözleşmesi yapma ve fatura onayını ayırmak hileyi önlerdi.", "cmt_en": "Separating contracting for services and approval of invoices would have prevented the fraud."}, {"tr": "Çek imzalayan kişinin faturaları alınan hizmetlerin bağımsız doğrulamasıyla karşılaştırması.", "en": "Comparison by the person signing checks of invoices with an independent verification of services received.", "cmt_tr": "Çek imzalayan kişi tarafından gözden geçirilen alınan hizmetlerin bağımsız doğrulaması, alınmayan hizmetler için ödemeyi önlerdi.", "cmt_en": "An independent verification of services received reviewed by the check signer would have prevented payment for services not received."}, {"tr": "Sözleşme imzalayan ve ödeme onaylayan kişi dışında başka birinin bütçe hazırlaması.", "en": "Budget preparation by someone other than the person signing contracts and approving payment.", "cmt_tr": "Bağımsız bütçe hazırlaması, bütçe ile fiili karşılaştırmasıyla ödemelerin tespit edilmesine olanak tanırdı.", "cmt_en": "Independent budget preparation would have allowed an actual-with-budget comparison to detect the payments."}, {"tr": "Çek imzalama veya fatura onayından sorumlu kişi dışında başka birinin çekleri postalaması.", "en": "Mailing of checks by someone other than the person responsible for check signing or invoice approval.", "cmt_tr": "Faturalar onaylandıktan ve çekler hazılanıp imzalandıktan sonra bağımsız bir kişinin çekleri postalaması uygunsuz ödemeleri önleme aracı sağlamaz.", "cmt_en": "After invoices have been approved, and checks prepared and signed, the mailing of the check by an independent person provides no means of preventing improper payments. The person responsible for the treasury function should sign the checks, transmit them, and cancel the supporting documents. Fact Pattern: A fraud was perpetrated in a moderate-sized organization when the accounting clerk was delegated too much responsibility. During the year, the organization switched suppliers of a service to a new vendor. The accounting clerk continued to submit fraudulent invoices from the “old supplier.” Because contracting for services and approval of supplier invoices had been delegated to the clerk, it was possible for the clerk to continue billings from the old supplier and deposit the subsequent checks, which the clerk was responsible to mail, into a new account the clerk opened in the name of the old supplier. The clerk was considered an excellent employee and eventually was improperly given the added responsibility of preparing the department budgets. This added responsibility allowed the clerk to budget for the amount of the fraudulent payments."}], "answer": 3}, {"q_tr": "Aşağıdaki görev prosedürlerinden hangisi hileyi tespit etme olasılığı en yüksektir?", "q_en": "Which of the following engagement procedures is most likely to detect the fraud?", "options": [{"tr": "Ödenen faturaların bir örneklemini alıp ilgili departmanlarla hizmetlerin alındığını doğrulamak.", "en": "Take a sample of paid invoices and verify receipt of services by departments involved.", "cmt_tr": "Kullanıcı departmanla ödenen hizmetlerin alınıp alınmadığını doğrulamak hileyi ortaya çıkarırdı.", "cmt_en": "Confirming with the using department the receipt of services that have been paid for would uncover the fraud."}, {"tr": "Hizmetler için onaylanmış faturalara ödenen çeklerin bir örneklemini izlemek.", "en": "Trace a sample of checks disbursed to approved invoices for services.", "cmt_tr": "Hileli faturalar memur tarafından onaylanmıştı ve her çek onaylanmış bir faturayla desteklenmektedir.", "cmt_en": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice."}, {"tr": "Banka mutabakatı yapmak ve tüm ödenmemiş çekleri hesaba katmak.", "en": "Perform a bank reconciliation and account for all outstanding checks.", "cmt_tr": "Hileli faturalar memur tarafından onaylanmıştı. Banka mutabakatı bu hileyi tespit etmezdi.", "cmt_en": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice. A bank reconciliation would not detect this fraud."}, {"tr": "Teslim alma belgelerinin bir örneklemini faturalara ve ödenen çeklere izlemek.", "en": "Trace a sample of receiving documents to invoices and to checks disbursed.", "cmt_tr": "Hileli faturalar memur tarafından onaylanmıştı. Hizmetler hiç alınmadığı için teslim alma belgelerini izlemek bu hileyi tespit etmezdi.", "cmt_en": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice. Tracing receiving documents would not detect this fraud because the services were never received."}], "answer": 0}, {"q_tr": "İç denetim fonksiyonunun hile önlemedeki sorumluluğu nedir?", "q_en": "The internal audit function’s responsibility for preventing fraud is to", "options": [{"tr": "İç kontrolü kurmak.", "en": "Establish internal control.", "cmt_tr": "İç kontrolü kurmak yönetimin sorumluluğundadır.", "cmt_en": "Establishing internal control is management’s responsibility."}, {"tr": "İç kontrolü sürdürmek.", "en": "Maintain internal control.", "cmt_tr": "İç kontrolü sürdürmek yönetimin sorumluluğundadır.", "cmt_en": "Maintaining internal control is management’s responsibility."}, {"tr": "İç kontrol sistemini değerlendirmek.", "en": "Evaluate the system of internal control.", "cmt_tr": "İç denetim fonksiyonu, kontrollerin etkinliğini ve verimliliğini değerlendirerek ve sürekli iyileştirmeyi teşvik ederek kuruluşun etkili kontrolleri (örn. hileyi önleme veya tespit etme) sürdürmesine yardımcı olur.", "cmt_en": "The internal audit function assists the organization in maintaining effective controls (e.g., to prevent or detect fraud) by evaluating their effectiveness and efficiency and by promoting continuous improvement."}, {"tr": "Hile önleme faaliyetleri üzerinde operasyonel yetki kullanmak.", "en": "Exercise operating authority over fraud prevention activities.", "cmt_tr": "Operasyonel yetki bir yönetim fonksiyonudur.", "cmt_en": "Operating authority is a management function."}], "answer": 2}, {"q_tr": "Bordro işleme fonksiyonunu yerine getiren kişinin bordroya hayali çalışan ekleme riski aşağıdakilerden hangisiyle azaltılır?", "q_en": "The risk of the addition of fictitious employees to the payroll by the person performing the payroll processing function is reduced by", "options": [{"tr": "Bordro eklemelerinin kontrolör tarafından onaylanmasını zorunlu kılmak.", "en": "Requiring that payroll additions be approved by the controller.", "cmt_tr": "Bordro eklemeleri, kayıt tutma sorumluluğu olan kontrolör (muhasebe müdürü) tarafından değil, insan kaynakları departmanı tarafından yetkilendirilmelidir.", "cmt_en": "Payroll additions should be authorized by the personnel department, not by the controller (chief accounting officer), an official with record keeping responsibility."}, {"tr": "Aynı çalışanın aylık bordro banka mutabakatını yapmasını zorunlu kılmak.", "en": "Requiring the same employee to perform the monthly payroll bank reconciliation.", "cmt_tr": "Uygun görev ayrımı için mutabakat, bordro işleme görevi olmayan biri tarafından yapılmalıdır.", "cmt_en": "For a proper segregation of functions, the reconciliation should be performed by someone who has no payroll processing duties."}, {"tr": "Bordroda yer alan çalışanların periyodik saha kontrolleri yapmak.", "en": "Performing periodic floor checks of employees on the payroll.", "cmt_tr": "Bordroya hayali kişilerin eklendiğini tespit etmek için kullanılan bir kontrol, denetçinin bordrodaki isimleri çalıştığı gözlemlenen kişilerle periyodik olarak karşılaştırmasıdır.", "cmt_en": "One control used to detect the addition of fictitious persons to the payroll is for the auditor to make a periodic comparison of the names on the payroll with persons observed working for the company. Observation of payroll distribution is such a control."}, {"tr": "Zaman kartları ile ödenen saatler arasındaki mutabakatı zorunlu kılmak.", "en": "Requiring a reconciliation of hours between time cards and hours paid.", "cmt_tr": "Ödemenin geçerliliği değil tutarı doğrulanır.", "cmt_en": "The amount, not the validity, of the payment is verified."}], "answer": 2}, {"q_tr": "Kuruluşun kredi kartlarının hileli kullanımı aşağıdaki iç kontrol prosedürlerinden hangisiyle en aza indirilir?", "q_en": "Fraudulent use of the organization’s credit cards is minimized by which of the following internal control procedures?", "options": [{"tr": "Yetkili çalışanlara kredi kartı düzenlenmesine ilişkin kurumsal politika oluşturmak.", "en": "Establishing an organizational policy on the issuance of credit cards to authorized employees.", "cmt_tr": "Kredi kartı düzenlenmesine ilişkin politika oluşturmak uygun düzenlemeyle ilgilidir, hileli kullanımla değil.", "cmt_en": "Establishing a policy on the issuance of credit cards relates to appropriate issuance, not fraudulent use."}, {"tr": "Yönetici ve operasyonel düzeylerde kredi kartı ihtiyacının geçerliliğinin periyodik olarak gözden geçirilmesi.", "en": "Reviewing the validity of credit card need at executive and operating levels on a periodic basis.", "cmt_tr": "Kredi kartı ihtiyacının geçerliliğinin gözden geçirilmesi uygun düzenlemeyle ilgilidir, hileli kullanımla değil.", "cmt_en": "Reviewing the validity of credit card need at executive and operating levels relates to appropriate issuance of credit cards, not fraudulent use."}, {"tr": "Kredi kartı düzenleyicisinin aylık hesap özetinin, kart sahibinin sunduğu satış makbuz kopyalarıyla mutabakatı.", "en": "Reconciling the monthly statement from the credit card issuer with the submitted copies of the cardholder’s sales receipts.", "cmt_tr": "Mutabakat, kredi kartı düzenleyicilerinin doğru faturalama yapıp yapmadığını test eder. Alacaklılar ve tutarlar şüpheli değilse kişisel veya hileli kullanımı mutlaka tespit etmez.", "cmt_en": "The reconciliation tests correct invoicing by the credit card issuers for credit charges. It would not necessarily detect personal or fraudulent use if the payees and amounts were not suspicious."}, {"tr": "Kredi kartı harcamalarının, düzenli kurumsal gider formlarında kullanılanlarla aynı gider kontrollerine tabi tutulması.", "en": "Subjecting credit card charges to the same expense controls as those used on regular organizational expense forms.", "cmt_tr": "Kuruluşu yetkisiz harcamalarla borçlandırma sorunu, kredi kartı veya nakit olsun her tür gider hesabı için aynıdır. Bu nedenle normal gider kontrolleri çalışanların kredi kartı hilesini önlemelidir.", "cmt_en": "The problem of charging the organization for unauthorized expenditures is the same for any type of expense account, whether credit card or cash. Thus, normal expense controls should preclude credit card fraud by employees."}], "answer": 3}, {"q_tr": "Bir kuruluş, başka bir kuruluştan suistimal iddiasıyla işine son verilmiş, yüksek nitelikli bir borç hesapları müdürü işe almıştır. Altı ay sonra müdür, faturaların yinelenen ödemelerini bir yakınına göndererek 12.000 ABD doları yönlendirmiştir. Bu durumu önleyebilecek kontrol nedir?", "q_en": "An organization hired a highly qualified accounts payable manager who had been terminated from another organization for alleged wrongdoing. Six months later, the manager diverted US $12,000 by sending duplicate payments of invoices to a relative. A control that might have prevented this situation is to", "options": [{"tr": "Tüm yeni çalışanlar için önceki iş geçmişlerini yeterince kontrol etmek.", "en": "Adequately check prior employment backgrounds for all new employees.", "cmt_tr": "Dürüst ve yetkin personel, etkili iç kontrolü teşvik eden bir ortam yaratmaya da yardımcı olur. Buna göre işe alım politikaları ve prosedürleri kritik öneme sahiptir. Geçmiş kontrolü, şüpheli karakterli potansiyel adayları eleyebilir ve hileyi önlemeye hizmet edebilir.", "cmt_en": "Honest and capable personnel also help create an environment promoting effective internal control. Accordingly, hiring policies and procedures are crucial. Background checks, for example, may screen out potential hirees of questionable character and serve to prevent potential fraud."}, {"tr": "İş için aşırı nitelikli görünen bireyleri işe almamak.", "en": "Not hire individuals who appear overqualified for a job.", "cmt_tr": "Aşırı nitelikli olmak kötü karakter göstergesi değildir.", "cmt_en": "Being overqualified is not an indicator of bad character."}, {"tr": "Tüm yeni çalışanlar için eğitim geçmişini doğrulamak.", "en": "Verify educational background for all new employees.", "cmt_tr": "Önceki iş geçmişi kontrolü, önceki hileli davranışı ortaya çıkarma olasılığı daha yüksektir.", "cmt_en": "Checking prior employment is more likely to uncover prior fraudulent behavior."}, {"tr": "Yakın akrabaların satıcılarda çalışıp çalışmadığını kontrol etmek.", "en": "Check to see whether close relatives work for vendors.", "cmt_tr": "Yakın akrabaların satıcılarda çalışıp çalışmadığını kontrol etmek bu senaryoda yeterli bir kontrol değildir.", "cmt_en": "Checking to see whether close relatives work for vendors is not an adequate control in this scenario."}], "answer": 0}, {"q_tr": "İç denetçiler ve yönetim, bilgisayar hilesi konusunda giderek daha fazla endişe duymaktadır. Aşağıdaki kontrol prosedürlerinden hangisi bilgisayar hilesini önlemede en az önemlidir?", "q_en": "Internal auditors and management have become increasingly concerned about computer fraud. Which of the following control procedures is least important in preventing computer fraud?", "options": [{"tr": "Üretim programları ile test programları arasında ayrım yapılmasını gerektiren program değişiklik kontrolü.", "en": "Program change control requiring a distinction between production programs and test programs.", "cmt_tr": "Bir program, kullanımdaki sürüm değil çalışma kopyası kullanılarak yeniden tasarlanmalıdır.", "cmt_en": "A program should be redesigned using a working copy, not the version in use."}, {"tr": "Sistem geliştirme sürecinde yeni uygulamaların kullanıcılar tarafından test edilmesi.", "en": "Testing of new applications by users during the systems development process.", "cmt_tr": "Yeni uygulamaların kullanıcılar tarafından test edilmesi, bilgisayar hilesini önlemeye yardımcı olan en önemli kontrollerden biridir.", "cmt_en": "Testing of new applications by users is one of the most important controls to help prevent computer fraud."}, {"tr": "Uygulama programcısı ile program kütüphanecisi fonksiyonu arasında görev ayrımı.", "en": "Segregation of duties between the applications programmer and the program librarian function.", "cmt_tr": "Program kütüphanecileri belgeler, programlar ve veri depolama ortamları üzerinde kontrol ve hesap verebilirliği sürdürür. Uygulama programcılarının veri merkezi operasyonlarına veya verilere erişimi olmamalıdır.", "cmt_en": "Program librarians maintain control over and accountability for documentation, programs, and data storage media. Applications programmers design, write, test, and document computer programs according to specifications provided by the end users. Application programmers should not have access to data center operations or data."}, {"tr": "Programcı ile sistem analisti arasında görev ayrımı.", "en": "Segregation of duties between the programmer and systems analyst.", "cmt_tr": "Programcılar programları, veri dosyalarını ve kontrolleri değiştirir. Sistem analisti veritabanları ve uygulama programları hakkındaki ayrıntılı bilgisini kullanır. Bu görevler çoğu zaman uygulama programcılarının görevleriyle birleştirilir.", "cmt_en": "Programmers modify programs, data files, and controls. A systems analyst uses his or her detailed knowledge of the organization’s databases and applications programs to determine how an application system should be designed to best serve the users’ needs. Those duties are often combined with those of applications programmers."}], "answer": 3}, {"q_tr": "Bordro çeklerinin uygun şekilde yetkilendirilmiş tutarlar için düzenlenmesini sağlamanın bir yolu nedir?", "q_en": "A means of ensuring that payroll checks are drawn for properly authorized amounts is to", "options": [{"tr": "Bordroda yer alan çalışanların periyodik saha doğrulaması yapmak.", "en": "Conduct periodic floor verification of employees on the payroll.", "cmt_tr": "Çalışanlar bordroda uygun şekilde yer alabilir, ancak ödenen tutarlar yetkisiz olabilir.", "cmt_en": "Employees may be properly included on payroll, but the amounts paid may be unauthorized."}, {"tr": "Teslim edilmemiş çeklerin kasiyere iade edilmesini zorunlu kılmak.", "en": "Require that undelivered checks be returned to the cashier.", "cmt_tr": "Teslim edilmemiş çeklerin kasiyere iade edilmesi çek tutarlarının geçerliliği hakkında bilgi sağlamaz.", "cmt_en": "Returning undelivered checks to the cashier provides no information regarding the validity of the amounts of checks."}, {"tr": "Çalışan zaman kartlarının amirler tarafından onaylanmasını zorunlu kılmak.", "en": "Require supervisory approval of employee time cards.", "cmt_tr": "Zaman kartlarının bölüm amirleri tarafından incelenmesi ve onaylanması uygundur çünkü işin yapılıp yapılmadığını bilmelidirler. Ayrıca maaş çeklerini dağıtmadıkları için sahte şekilde yetkilendirilen çekleri yönlendirme konumunda değildirler.", "cmt_en": "Review and approval of time cards by line supervisors is appropriate because they should know whether work has been performed. Also, because they do not distribute paychecks, they are not in a position to divert falsely authorized checks."}, {"tr": "Bordro çeklerinin dağıtımına tanıklık etmek.", "en": "Witness the distribution of payroll checks.", "cmt_tr": "Bordro dağıtımına tanıklık etmek ödenen tutarların yetkilendirilmiş olduğunu güvence altına almaz.", "cmt_en": "Witnessing a payroll distribution does not assure that the amounts paid are authorized."}], "answer": 2}, {"q_tr": "Bilgisayarlı bordro sistemi üzerinden çalışan bir bordro memuru, iki çalışanın saatlik ücret oranını artırmış ve elde edilen fazla ödemeleri çalışanlarla paylaşmıştır. Bu yasadışı eylemi en iyi şekilde önleyecek olan hangisidir?", "q_en": "A payroll clerk working through a computerized payroll system increased the hourly pay rate of two employees and shared the resulting overpayments with the employees. Which of the following would have best served to prevent this illegal act?", "options": [{"tr": "Ücret kayıtlarındaki tüm değişikliklerin standart bir formda kaydedilmesini zorunlu kılmak.", "en": "Requiring that all changes to pay records be recorded on a standard form.", "cmt_tr": "Standart form zorunluluğu, form olmadan değişiklik yapılabiliyorsa yetkisiz ücret oranı değişikliğini önlemez.", "cmt_en": "Requiring a standard form does not prevent an unauthorized pay rate change if it can be made without the form. The requirement that all changes to pay records be recorded on a standard form does not restrict access to the computer files. Thus, unauthorized changes could still be made."}, {"tr": "Ana bordro kayıtlarına erişimi bordro departmanındaki denetim personeli ile sınırlamak.", "en": "Limiting access to master payroll records to supervisory personnel in the payroll department.", "cmt_tr": "En iyi önleyici kontrol, çalışanların hassas bilgilere erişim yeteneğini kısıtlamaktır. Bu nedenle bilgisayar güvenlik sistemi, yetkisiz bir kişinin saklanan bilgileri değiştirmesini önleyecek önlemler (parola koruması ve cihaz yetkilendirme tabloları gibi) içermelidir.", "cmt_en": "The best preventive control is to restrict the ability of employees to gain access to sensitive information. The computer security system should therefore incorporate measures (such as password protection and device authorization tables) that will prevent an unauthorized person from changing stored information."}, {"tr": "Personel kayıtlarındaki ücret oranlarının bordro sistemindekilerle yıllık olarak mutabakatı.", "en": "Reconciling pay rates per personnel records with those of the payroll system annually.", "cmt_tr": "Personel kayıtlarıyla yıllık ücret oranı mutabakatı önleyici değil tespit edici niteliktedir.", "cmt_en": "Annual reconciliation of pay rates per personnel records with those of the payroll system is detective rather than preventive."}, {"tr": "Bordro maliyetlerinin departman başkanları tarafından aylık izlenmesi.", "en": "Monitoring of payroll costs by department heads on a monthly basis.", "cmt_tr": "Departman başkanları tarafından aylık bordro maliyetlerinin izlenmesi önleyici değil tespit edici niteliktedir.", "cmt_en": "Monitoring of payroll costs by department heads on a monthly basis is detective rather than preventive."}], "answer": 1}, {"q_tr": "İç denetçilerin hilenin caydırılmasındaki rolüne ilişkin aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statement(s) is (are) true regarding the role of internal auditors in the deterrence of fraud?", "options": [{"tr": "İç denetçiler uygun üst yönetim tonunu ve hile risk iştahını belirler.", "en": "Internal auditors set the appropriate tone at the top and the appetite for fraud risk.", "cmt_tr": "Yönetim kurulu uygun üst yönetim tonunu ve hile risk iştahını belirler.", "cmt_en": "The board sets the appropriate tone at the top and the appetite for fraud risk."}, {"tr": "İç denetçiler, yönetime kontrollerin güvenilirliği hakkında bilgi sağlayan iletişim kanalları tasarlar ve uygular.", "en": "Internal auditors design and implement communication channels that provide management with information on the reliability of controls.", "cmt_tr": "Yönetim, iç denetçiler değil, yönetime kontrollerin güvenilirliği hakkında bilgi sağlayan iletişim kanalları tasarlama ve uygulamadan sorumludur.", "cmt_en": "Management, not internal auditors, are responsible for designing and implementing communication channels that provide management with information on the reliability of controls."}, {"tr": "İç denetçiler hile önleme kontrollerini tasarlama ve uygulamadan sorumludur.", "en": "Internal auditors are responsible for designing and implementing fraud prevention controls.", "cmt_tr": "İç denetçiler hile önleme kontrollerini tasarlama ve uygulamadan sorumlu değildir. Kontrolleri kurmak ve sürdürmek birincil olarak yönetimin sorumluluğundadır.", "cmt_en": "Internal auditors are not responsible for designing and implementing fraud prevention controls. Management is primarily responsible for establishing and maintaining controls."}, {"tr": "İç denetçiler kontrollerin yeterliliğini inceleyerek ve değerlendirerek hilenin caydırılmasına yardımcı olmaktan sorumludur.", "en": "Internal auditors are responsible for assisting in the deterrence of fraud by examining and evaluating the adequacy of controls.", "cmt_tr": "Kontroller hileyi önlemenin başlıca aracıdır. İç denetim fonksiyonu, kontrollerin etkinliğini ve verimliliğini değerlendirerek ve sürekli iyileştirmeyi teşvik ederek kuruluşun etkili kontrolleri sürdürmesine yardımcı olur.", "cmt_en": "Controls are the principal means of preventing fraud. The internal audit function assists the organization in maintaining effective controls (e.g., to prevent or detect fraud) by evaluating their effectiveness and efficiency and by promoting continuous improvement. Moreover, internal auditors should determine whether communication channels provide management with reliable information about the effectiveness of controls and the occurrence of unusual transactions. Fact Pattern: During an engagement performed at a smaller division, the internal auditor notes the following regarding the purchasing function: • There are three purchasing agents. Agent 1 is responsible for ordering all large component parts, agent 2 for electric motors, and agent 3 for smaller parts such as fasteners. • There are separate accounts payable and receiving departments. • In order to hold vendors more responsible, all invoices are sent to the purchasing agent placing the order. The purchasing agent matches the vendor invoice, receiving slip, and purchase order. If all match, the purchasing agent sends the documents forward to the accounts payable department. Differences are investigated by the purchasing agent. • Only the accounts payable department has the ability to authorize an item for payment. • All recorded receipts are immediately recorded into a perpetual inventory record by the department to which the goods are transferred after receipt. • The internal auditor interviewed both management and the purchasing agents. Both groups were very satisfied with the current system because it helps maintain vendor accountability and provides sufficient segregation of duties given that only the accounts payable department can authorize an item for payment."}], "answer": 3}, {"q_tr": "İç denetçi, iç kontrolü tespit edilmemiş hileye olanak tanıyıp tanımadığını belirlemek üzere değerlendirmekten sorumludur. Sunulan bilgilere dayanarak, varsa en olası tespit edilmemiş hile nedir?", "q_en": "The internal auditor is responsible for evaluating internal control to determine whether it allows undetected fraud. Based on the information presented, the most likely undetected fraud, if any, is that the", "options": [{"tr": "Satın alma görevlisi, satın alma görevlileri arasında rotasyon zorunlu olmadığı için ürünlerin çoğunu favori bir satıcıdan satın almaktadır.", "en": "Purchasing agent is purchasing the majority of products from a favorite vendor because rotation among purchasing agents is not mandatory.", "cmt_tr": "Malların çoğunu belirli bir satıcıdan satın almak haklı çıkarılabilir.", "cmt_en": "Purchasing most goods from a particular vendor may be justified."}, {"tr": "Satın alma görevlisi hayali bir satıcıya sahte satın alma siparişleri göndermekte, teslim alma fişi eklemekte ve hayali satıcıya ödeme yapılmasını sağlamaktadır.", "en": "Purchasing agent is sending fake purchase orders to a dummy vendor, inserting a receiving slip, and having payments made to the dummy vendor.", "cmt_tr": "İç kontrol, satın alma görevlisinin hilesini tespit etme olasılığı düşüktür çünkü bu kişi usulsüzlükleri işleme ve gizleme konumundadır. Teslim alma belgeleri ve satıcı faturaları satın alma görevlisine değil borç hesaplarına gönderilmelidir.", "cmt_en": "Internal control is unlikely to detect the purchasing agent’s fraud because this individual is in a position to perpetrate and conceal irregularities. Receiving documents and vendors’ invoices should be sent to accounts payable, not to the purchasing agent."}, {"tr": "Teslim alma departmanı teslimatları farklı konumlara yönlendirmekte ve teslim alma raporları oluşturmamaktadır.", "en": "Receiving department is diverting receipts to different locations and failing to create receiving reports.", "cmt_tr": "Bu olası hile, satıcı faturalarını destekleyen teslim alma raporlarının yokluğuyla tespit edilmelidir.", "cmt_en": "This possible fraud should be detected by the absence of receiving reports to support vendors’ invoices."}, {"tr": "Üretim departmanı satın alınan ürünlerin fiyatını düşürmekte ve böylece raporlanan brüt satış marjını artırmaktadır.", "en": "Production department is deflating the price of products purchased and thereby increasing the reported gross margin of sales.", "cmt_tr": "Bu yanıt satın alma ortamıyla ilgili değildir.", "cmt_en": "This response is unrelated to the purchasing environment."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi iç denetçilerin hile önleme, caydırma ve tespitine ilişkin bir sorumluluğudur?", "q_en": "Which of the following is a responsibility of internal auditors regarding fraud prevention, deterrence, and detection?", "options": [{"tr": "Kuruluşun faaliyet gösterdiği her ülkede yolsuzlukla mücadele ilkelerini sürdürmek için kullanabileceği bir yaklaşım geliştirmek.", "en": "Develop an approach the organization can use to sustain antibribery principles in every country in which the organization operates.", "cmt_tr": "Yönetim, iç denetçiler değil, hileyi caydırma ve önlemeye yönelik etkili kontroller kurmak ve sürdürmekten sorumludur.", "cmt_en": "Management, not the internal auditors, is responsible for establishing and maintaining effective controls to deter and prevent fraud. Translating the organization’s corruption prevention principles across operations is a management responsibility."}, {"tr": "Etkili bir iç kontrol sistemi uygulamak.", "en": "Implement an effective system of internal controls.", "cmt_tr": "İç denetçiler, yönetimin hile önlemeye ilişkin etkili iç kontroller uyguladığından emin olunmasında denetim komitesi gözetimini desteklemekten sorumludur. İç kontrolü uygulamak iç denetçinin değil yönetimin sorumluluğundadır.", "cmt_en": "Internal auditors are responsible for supporting audit committee oversight in ensuring management has implemented effective internal controls regarding fraud prevention. Management, not the internal auditor, is responsible for implementing internal controls."}, {"tr": "CEO ve üst düzey mali yöneticileri kapsayan bir etik kuralına sahip olup olmadığına ilişkin yıllık açıklamayı hazırlamak.", "en": "Prepare the annual disclosure of whether the organization has a code of ethics that covers its chief executive officer (CEO) and senior financial officers.", "cmt_tr": "İç denetçiler yıllık açıklamayı hazırlamaktan değil izlemekten sorumludur.", "cmt_en": "Internal auditors are responsible for monitoring, not preparing, the annual disclosure of whether the organization has a code of ethics that covers its CEO and senior financial officers."}, {"tr": "Kuruluş içinde hile farkındalığını artırmak ve denetim komitesini ve üst yönetimi uygun \"üst yönetim tonunu\" belirlemeye teşvik etmek.", "en": "Raise fraud awareness within the organization, including encouraging the audit committee and senior management to set the proper “tone at the top.”", "cmt_tr": "İç denetçiler kuruluş içinde hile farkındalığını artırmaktan ve denetim komitesini ve üst yönetimi uygun \"üst yönetim tonunu\" belirlemeye teşvik etmekten sorumludur.", "cmt_en": "Internal auditors are responsible for raising fraud awareness within the organization, including encouraging the audit committee and senior management to set the proper “tone at the top.”"}], "answer": 3}, {"q_tr": "Bir kuruluşta hile ihbar hattı işletmenin birincil amacı nedir?", "q_en": "The primary purpose of operating a fraud hotline within an organization is to", "options": [{"tr": "Toplam operasyon maliyetlerini azaltmak.", "en": "Reduce total costs of operations.", "cmt_tr": "Kuruluşun toplam operasyon maliyetlerini azaltmak hile ihbar hattının birincil amacı değildir.", "cmt_en": "Reducing total costs of operating the organization is not the primary purpose of a fraud hotline."}, {"tr": "İlgiyi hak eden alanlara yoğunlaşmak.", "en": "Concentrate on areas that deserve attention.", "cmt_tr": "İlgiyi hak eden alanlara yoğunlaşmak hile ihbar hattının birincil amacı değildir.", "cmt_en": "Concentrating on areas that deserve attention and less attention on areas operating as expected is not the primary purpose of a fraud hotline."}, {"tr": "Kişilerin şüpheli usulsüzlükleri bildirmesi için iletişim kanalları oluşturmak.", "en": "Establish channels of communication for people to report suspected improprieties.", "cmt_tr": "Hileyle ilgili bilgi ve iletişim uygulamaları hile riski yönetimini teşvik eder. Örneğin ihbar hatları, çalışanların şüpheli usulsüzlükleri bildirmeleri için uygun bir yoldur.", "cmt_en": "Fraud-related information and communication practices promote fraud risk management. For example, hotlines are a convenient way for employees to report suspected improprieties."}, {"tr": "Organizasyonel birimlerin kuruluşun hedeflerine ne kadar iyi ulaştığını ölçmek.", "en": "Measure how well organizational units are achieving the organization’s goals.", "cmt_tr": "Hile ihbar hattının birincil amacı organizasyonel birimlerin hedeflerine ne kadar iyi ulaştığını ölçmek değildir.", "cmt_en": "The primary purpose of operating a fraud hotline is not to measure how well organizational units are achieving the organization’s goals. Fact Pattern: During an engagement performed at a smaller division, the internal auditor notes the following regarding the purchasing function: • There are three purchasing agents. Agent 1 is responsible for ordering all large component parts, agent 2 for electric motors, and agent 3 for smaller parts such as fasteners. • There are separate accounts payable and receiving departments. • In order to hold vendors more responsible, all invoices are sent to the purchasing agent placing the order. The purchasing agent matches the vendor invoice, receiving slip, and purchase order. If all match, the purchasing agent sends the documents forward to the accounts payable department. Differences are investigated by the purchasing agent. • Only the accounts payable department has the ability to authorize an item for payment. • All recorded receipts are immediately recorded into a perpetual inventory record by the department to which the goods are transferred after receipt. The internal auditor interviewed both management and the purchasing agents. Both groups were very satisfied with the current system because it helps maintain vendor accountability and provides sufficient segregation of duties given that only the accounts payable department can authorize an item for payment."}], "answer": 2}, {"q_tr": "Aşağıdaki kontrollerden hangisi, uygun şekilde uygulanırsa hile olasılığını azaltma olasılığı en yüksektir?", "q_en": "Which of the following controls, if properly implemented, is most likely to decrease the likelihood of fraud?", "options": [{"tr": "Satın almaların farklı satıcılar arasında periyodik rotasyonunu zorunlu kılmak.", "en": "Require periodic rotation of purchases among different vendors.", "cmt_tr": "Satıcı rotasyonu sorunu kısmen hafifletebilir, ancak satın alma görevlisi yeni hayali satıcılar geliştirebilir.", "cmt_en": "Rotation of vendors might partially alleviate the problem, but the purchasing agent could develop new dummy vendors."}, {"tr": "Üç satın alma görevlisi arasında görev rotasyonu zorunlu kılmak.", "en": "Require rotation of duties among the three purchasing agents.", "cmt_tr": "Görev rotasyonu bu ortamda oluşabilecek hile türünü etkilemez. Satın alma görevlisi yeni ürün hattı için başka bir hayali satıcı geliştirebilir.", "cmt_en": "Rotation of duties will not affect the type of fraud that could occur in this environment. The purchasing agent could develop another dummy vendor for the new product line."}, {"tr": "Teslim alma raporlarının doğrudan borç hesaplarına gönderilmesini zorunlu kılmak.", "en": "Require that receiving reports be sent directly to accounts payable.", "cmt_tr": "Bu prosedür değişikliği satın alma görevlisinin teslim alma raporlarını tahrif etmesini önler. Daha da iyi bir prosedür, hem teslim alma raporlarının hem de satıcı faturalarının borç hesaplarına gönderilmesidir.", "cmt_en": "This change in procedures prevents the purchasing agent from falsifying receiving reports. An even better procedure is to have both the receiving reports and the vendors’ invoices sent to accounts payable."}, {"tr": "Sürekli envanter kaydı güncellemelerinin teslim alma departmanı tarafından yapılmasını zorunlu kılmak.", "en": "Require that the updates to the perpetual inventory record be made by the receiving department.", "cmt_tr": "Bu prosedür teslim alma departmanı için ek bir hile fırsatı yaratacaktır.", "cmt_en": "This procedure will create an additional opportunity for fraud by the receiving department."}], "answer": 2}, {"q_tr": "Hilenin önlenmesine ilişkin aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is (are) true regarding the prevention of fraud?", "options": [{"tr": "Hilenin önlenmesi ve tespitinden yalnızca yönetim sorumludur.", "en": "Only management is responsible for the prevention and detection of fraud.", "cmt_tr": "Yönetim hilenin önlenmesi ve tespitinden birincil olarak sorumludur, ancak yönetim kurulu ve iç denetçilerin de rolleri vardır.", "cmt_en": "Management is primarily responsible for the prevention and detection of fraud, but the board and internal auditors also have roles in the prevention and detection of fraud."}, {"tr": "İç denetçiler hileyi önleme ve tespit etmek için tasarlanmış kontrolleri uygular.", "en": "Internal auditors implement the controls designed to prevent and detect fraud.", "cmt_tr": "İç denetçiler hileyi önleme ve tespit etmek için tasarlanmış kontrolleri uygulamaz. Bu yönetimin sorumluluğundadır.", "cmt_en": "Internal auditors do not implement the controls designed to prevent and detect fraud. That is management’s responsibility."}, {"tr": "Etkili iç kontroller hile olasılığını ortadan kaldırabilir.", "en": "Effective internal controls can eliminate the probability of fraud.", "cmt_tr": "İç kontroller hile olasılığını ortadan kaldıramaz.", "cmt_en": "Internal controls cannot eliminate the probability of fraud."}, {"tr": "Hileyi önlemenin birincil aracı, yönetim tarafından kurulan ve sürdürülen iç kontroldür.", "en": "The primary means of preventing fraud is through internal control established and maintained by management.", "cmt_tr": "Kontrol hileyi önlemenin başlıca aracıdır. Yönetim kontrolün kurulması ve sürdürülmesinden birincil olarak sorumludur. İç denetçiler kontrollerin etkinliğini ve verimliliğini değerlendirerek ve sürekli iyileştirmeyi teşvik ederek kuruluşa yardımcı olmalıdır.", "cmt_en": "Control is the principal means of preventing fraud. Management, in turn, is primarily responsible for the establishment and maintenance of control. Internal auditors must assist the organization by evaluating the effectiveness and efficiency of controls and promoting continuous improvement. Internal auditors also should assess the operating effectiveness of fraud-related communication systems and practices, and they should support fraud-related training."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi bilgisayar hilesini önlemeye makul güvence sağlayan önleyici bir kontrol örneğidir?", "q_en": "Which is an example of a preventive control that provides reasonable assurance of preventing computer fraud?", "options": [{"tr": "Uygulama programcısı ile program kütüphanecisi arasında görev ayrımı.", "en": "Segregation of duties between the application programmer and the program librarian.", "cmt_tr": "Bir uygulama programcısının kütüphaneci tarafından kontrol edilen üretimde kullanılan programlara erişimi olmamalıdır. Bu görev ayrımı önleyici kontrol örneğidir.", "cmt_en": "An application programmer should not have access to programs used in production that are controlled by the librarian. This segregation of duties is an example of a preventive control."}, {"tr": "Mevcut kontrollerin gözden geçirilmesi ve değerlendirilmesi.", "en": "Review and assessment of current controls.", "cmt_tr": "Mevcut kontrollerin gözden geçirilmesi ve değerlendirilmesi önleyici değil tespit edici kontroldür.", "cmt_en": "Reviewing and assessing current controls is a detective control, not a preventive control."}, {"tr": "Yazılım yamaları veya değişiklikleri.", "en": "Software patches or modifications.", "cmt_tr": "Yazılım yamaları ve değişiklikleri önleyici değil düzeltici kontrollerdir.", "cmt_en": "Software patches and modifications are corrective controls, not preventive controls."}, {"tr": "Reddedilen partilerin otomatik raporlanması.", "en": "Automated reporting of rejected batches.", "cmt_tr": "Reddedilen partilerin otomatik raporlanması önleyici değil tespit edici kontrol türüdür.", "cmt_en": "Automated reporting of rejected batches is a type of detection control, not a preventive control. Such a report might show identical payment batches which could be redundant, an error, or fraud."}], "answer": 0}, {"q_tr": "İç denetçiler kontrolleri değerlendirerek hile önlemeye yardımcı olur. Bir iç denetçi büyük olasılıkla aşağıdaki görev ayrımlarından hangisinin gereksiz olduğu sonucuna varır?", "q_en": "Internal auditors assist in fraud prevention by evaluating controls. An internal auditor is most likely to conclude that which segregation of duties is unnecessary?", "options": [{"tr": "Elektronik ödeme onaylamak ve bir mal veya hizmetin alındığını doğrulamak.", "en": "Approving an electronic payment and verifying receipt of a good or service.", "cmt_tr": "Mümkün olduğunda görev ayrımı, işlemin kaydedilmesi, yetkilendirilmesi ve ilgili varlıkların saklanması sorumluluğunu ayırır. Ancak çek imzalayan veya elektronik ödeme onaylayan kişiler bir hizmet veya ürünün alındığını doğrulamalıdır.", "cmt_en": "When feasible, segregation of duties divides responsibility for recording of the transaction, authorization, and custody of the assets associated with the transaction. The effect is to minimize the opportunities for a person to be able to perpetrate and conceal fraud or error. However, person(s) responsible for signing checks or approving electronic payments should verify that a service or product was received. Verifying receipt involves commun
