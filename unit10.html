: "Davranışsal semptom.", "en": "Behavioral symptom.", "cmt_tr": "Pahalı bir golf kulübüne üye olmak yaşam tarzı semptomuna örnektir.", "cmt_en": "Joining an expensive country club is an example of a lifestyle symptom."}, {"tr": "Fiziksel semptom.", "en": "Physical symptom.", "cmt_tr": "Pahalı bir golf kulübüne üye olmak yaşam tarzı semptomuna örnektir.", "cmt_en": "Joining an expensive country club is an example of a lifestyle symptom. Fact Pattern: Randy and John had known each other for many years. They had become best friends in college, where they both majored in accounting. After graduation, Randy took over the family business from his father. His family had been in the grocery business for several generations. When John had difficulty finding a job, Randy offered him a job in the family store. John proved to be a very capable employee. As John demonstrated his abilities, Randy began delegating more and more responsibility to him. After a period of time, John was doing all of the general accounting and authorization functions for checks, cash, inventories, documents, records, and bank reconciliations. (1) John was trusted completely and handled all financial functions. No one checked his work. Randy decided to expand the business and opened several new stores. (2) Randy was always handling the most urgent problem . . . “crisis management” is what his college professors had termed it. John assisted with the problems when his other duties allowed him time. Although successful at work, John had (3) difficulties with personal financial problems. At first, the amounts stolen by John were small. John didn’t even worry about making the accounts balance. But John became greedy. “How easy it is to take the money,” he said. He felt that he was a critical member of the business team (4) and that he contributed much more to the success of the company than was represented by his salary. “It would take two or three people to replace me,” he often thought to himself. As the amounts became larger and larger, (5) he made the books balance. Because of these activities, John was able to purchase an expensive car and take his family on several trips each year. (6) He also joined an expensive country club. Things were changing at home, however. (7) John’s family observed that he was often argumentative and at other times very depressed. The fraud continued for 6 years. Each year, the business performed more and more poorly. In the last year, the stores had a substantial net loss. Randy’s bank required an audit. John confessed when he thought the auditors had discovered his embezzlements. When discussing frauds, the pressures, opportunities, and rationalizations that cause/allow a perpetrator to commit the fraud are often identified. Symptoms of fraud are also studied."}], "answer": 1}, {"q_tr": "7 Numaralı madde, \"John'un ailesi onun sık sık tartışmacı olduğunu gözlemledi...\", aşağıdakilerden hangisine bir örnektir?", "q_en": "Number 7, “John’s family observed that he was often argumentative . . .,” is an example of a", "options": [{"tr": "Meşrulaştırma.", "en": "Rationalization.", "cmt_tr": "Tartışmacı olmak davranışsal semptom örneğidir.", "cmt_en": "Being argumentative is an example of a behavioral symptom."}, {"tr": "Yaşam tarzı semptomu.", "en": "Lifestyle symptom.", "cmt_tr": "Tartışmacı olmak davranışsal semptom örneğidir.", "cmt_en": "Being argumentative is an example of a behavioral symptom."}, {"tr": "Davranışsal semptom.", "en": "Behavioral symptom.", "cmt_tr": "Bir çalışanın davranışında dramatik bir değişiklik hilenin varlığına işaret edebilir. Hileyi işleme ve gizlemeyle ilişkili suçluluk ve stres, davranışta belirgin değişikliklere yol açabilir.", "cmt_en": "A drastic change in an employee’s behavior may indicate the presence of fraud. The guilt and the other forms of stress associated with perpetrating and concealing the fraud may induce noticeable changes in behavior."}, {"tr": "Fiziksel semptom.", "en": "Physical symptom.", "cmt_tr": "Tartışmacı olmak davranışsal semptom örneğidir.", "cmt_en": "Being argumentative is an example of a behavioral symptom."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, bir üreticinin yönetimi tarafından işlenen olası mali raporlama hilesinin bir göstergesidir?", "q_en": "Which of the following is an indicator of possible financial reporting fraud being perpetrated by management of a manufacturer?", "options": [{"tr": "Trend analizi (1) satışlarda %50 artış ve (2) satılan malların maliyetinde %25 artış ortaya koymaktadır.", "en": "A trend analysis discloses (1) sales increases of 50% and (2) cost of goods sold increases of 25%.", "cmt_tr": "Satılan malların maliyetindeki artışa oranla çok büyük satış artışı olası hile göstergesidir. Satış artışları genellikle satılan malların maliyetindeki orantılı artışlarla birlikte gerçekleşir.", "cmt_en": "An increase in sales far out of proportion to the increase in cost of goods sold is an indicator of possible fraud. Increases in sales are usually accompanied by close to proportional increases in cost of goods sold. Examples of situations in which increases in sales can be disproportionately larger than increases in cost of goods sold include (1) operations within the realm of economies of scale (increasing returns to scale) and (2) the introduction of a highly accepted fashion item. Cases in which disproportionately large sales increases indicate fraudulent conduct include (1) collusion by the host firm’s sales personnel and the buying firm’s purchasing personnel and (2) collusion by members of two departments within the host firm, such as sales and transportation. Because the internal auditor would not know whether the disproportionately large increase in sales is legitimate, the auditor should view this condition as an indicator of possible fraud."}, {"tr": "Oran analizi, satılan malların maliyetinin satışların %50'si olduğunu ortaya koymaktadır.", "en": "A ratio analysis discloses that cost of goods sold is 50% of sales.", "cmt_tr": "Brüt kâr marjının %50 olması hile göstergesi değildir.", "cmt_en": "A gross profit margin of 50% is not an indicator of fraud. Manufacturers can expect a range of 40-60% for this ratio."}, {"tr": "Ortak ölçekli tabloların kesitsel analizi (1) firmanın satılan mal maliyeti/satış oranının %40 ve (2) sektör ortalamasının %50 olduğunu ortaya koymaktadır.", "en": "A cross-sectional analysis of common size statements discloses that (1) the firm’s percentage of cost of goods sold to sales is 40% and (2) the industry average percentage of cost of goods sold to sales is 50%.", "cmt_tr": "Bu veriler sektör brüt kâr marjının %50 ve firmanın %60 olduğuna işaret eder. Firmanın daha yüksek marjı çeşitli makul nedenlerden kaynaklanabilir.", "cmt_en": "These data indicate an industry gross profit margin of 50% and host firm gross profit margin of 60%. The greater gross profit margin realized by the host firm may result from any number of reasonable causes. These include (1) greater efficiencies exercised by the host firm, (2) greater sales effort (or a more highly accepted product), and (3) measurement errors."}, {"tr": "Ortak ölçekli tabloların kesitsel analizi (1) firmanın satılan mal maliyeti/satış oranının %50 ve (2) sektör ortalamasının %40 olduğunu ortaya koymaktadır.", "en": "A cross-sectional analysis of common size statements discloses that (1) the firm’s percentage of cost of goods sold to sales is 50% and (2) the industry average percentage of cost of goods sold to sales is 40%.", "cmt_tr": "Bu veriler sektör brüt kâr marjının %60 ve firmanın %50 olduğuna işaret eder. Firmanın daha düşük marjı çeşitli nedenlerden kaynaklanabilir.", "cmt_en": "These data indicate an industry gross profit margin of 60% and a host firm gross profit margin of 50%. The lower gross profit margin realized by the host firm may result from such causes as (1) host firm inefficiencies; (2) less acceptance of host firm product, or less sales effort; and (3) measurement errors."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi bir pazarlama departmanında hilenin gerçekleşiyor olabileceğine işaret eder?", "q_en": "Which of the following would indicate that fraud may be taking place in a marketing department?", "options": [{"tr": "Yeni bir satıcıya yapılan bazı büyük harcamalar için belge bulunmamaktadır.", "en": "There is no documentation for some fairly large expenditures made to a new vendor.", "cmt_tr": "Bir yöneticinin aşırı yaşam tarzı ve gevşek kontrol ortamı da olası hile göstergeleridir.", "cmt_en": "A manager’s excessive lifestyle and a loose control environment are also possible fraud indicators."}, {"tr": "Bir yönetici, pazarlama müdürü maaşının karşılayabileceğinin ötesinde bir yaşam tarzı sürdürüyor görünmektedir.", "en": "A manager appears to be living a lifestyle that is in excess of what could be provided by a marketing manager’s salary.", "cmt_tr": "Büyük belgesiz satın almalar ve gevşek kontrol ortamı da olası hile göstergeleridir.", "cmt_en": "Large undocumented purchases and a loose control environment are also possible fraud indicators."}, {"tr": "Kontrol ortamı en iyi şekilde \"çok gevşek\" olarak tanımlanabilir. Ancak bu tutum yönetim tarafından yaratıcılık için gerekli olduğu gerekçesiyle savunulmaktadır.", "en": "The control environment can best be described as “very loose.” However, this attitude is justified by management on the grounds that it is needed for creativity.", "cmt_tr": "Büyük belgesiz satın almalar ve yöneticinin aşırı yaşam tarzı da olası hile göstergeleridir.", "cmt_en": "Large undocumented purchases and a manager’s excessive lifestyle are also possible fraud indicators."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları şunlardır: hilenin işlenmiş olabileceğine dair göstergeleri belirlemek için yeterli bilgiye sahip olmak; hileye olanak tanıyabilecek kontrol zayıflıklarına karşı uyanık olmak; ve hile göstergelerini yeterince değerlendirmek. Bu göstergeler arasında önemli işlemler için zamanında ve uygun belgelerin eksikliği, hile yapabilecek konumdaki çalışanların şüpheli yaşam tarzı özellikleri ve yönetimin iç kontrole karşı uygun tutum sergilememesi sayılabilir.", "cmt_en": "An internal auditor’s responsibilities for the detection of fraud include having sufficient knowledge to identify indicators that fraud may have been committed; being alert to opportunities, such as control weaknesses, that could allow fraud to occur; and evaluating the indicators of fraud sufficiently to determine whether any further action is needed or whether a fraud investigation should be recommended. Among the many such indicators are lack of timely and appropriate documentation (including information about authorization) for material transactions, suspicious lifestyle characteristics of employees in a position to commit fraud, and management’s failure to display and communicate an appropriate attitude toward internal control. Fact Pattern: When an internal auditor followed up on a significant increase in maintenance supplies during the past year, a purchasing agent explained to the internal auditor that the primary reason for the increase was painting services and supplies. The internal auditor found a blanket purchase order without the normal bid or quote documentation. The blanket purchase order is a standing agreement with a vendor to order specific supplies up to a limit without separate purchase orders for each order. The blanket purchase order had been signed by the general manager and named the general manager’s father as the sole contractor for painting services on the organization’s projects. The auditor also found a number of large invoices, authorized for payment by the general manager, that showed the general manager’s father as the person who signed for the receipt of the material at the supplier."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi bu durumda tanımlanan hile semptomlarının en kapsamlı listesidir?", "q_en": "Which of the following is the most comprehensive list of the symptoms of fraud as described in this situation?", "options": [{"tr": "Satın alınan malzeme, kuruluşun tesislerinde yetkili personel tarafından teslim alınmamaktadır.", "en": "Purchased material is not received by authorized organizational personnel at a designated location on the organization’s premises.", "cmt_tr": "Malın kuruluş dışı personel tarafından teslim alınması ve tesis dışında teslim alınması hile semptomlarıdır.", "cmt_en": "The receipt of goods or services by non-organizational personnel is a symptom of fraud. Also, receiving goods offsite is a symptom of fraud."}, {"tr": "Belirli işlemler için rutin kontroller askıya alınmakta ve satın alınan malzeme kuruluşun tesislerinde yetkili personel tarafından teslim alınmamaktadır.", "en": "Routine controls are suspended for certain transactions and purchased material is not received by authorized organizational personnel at a designated location on the organization’s premises.", "cmt_tr": "Normal ve uygun prosedürlerin askıya alınması bir hile göstergesidir. Ayrıca malın kuruluş dışı personel tarafından tesis dışında teslim alınması da hile semptomudur.", "cmt_en": "Suspension of normal and appropriate procedures is a fraud indicator. Also, the receipt of goods by non-organizational personnel offsite is a symptom of fraud."}, {"tr": "Satın alınan malzeme kuruluşun tesislerinde teslim edilmemekte ve açık satın alma emirleri kullanılmaktadır.", "en": "Purchased material is not delivered to a designated location on the organization’s premises and the use of blanket purchase orders.", "cmt_tr": "Malın tesis dışında teslim alınması hile semptomudur. Açık satın alma emirlerinin kullanılması hile semptomu değildir.", "cmt_en": "The receipt of goods or services off-site is a symptom of fraud. The use of blanket purchase orders is not a symptom of fraud."}, {"tr": "Açık satın alma emirleri kullanılmakta ve belirli işlemler için rutin kontroller askıya alınmaktadır.", "en": "The use of blanket purchase orders and routine controls are suspended for certain transactions.", "cmt_tr": "Açık satın alma emirlerinin kullanılması normal bir ticari uygulamadır.", "cmt_en": "Fraud is characterized by intentional deception and can be perpetrated for the benefit or to the detriment of the organization. The use of blanket purchase orders is a normal business practice. Fact Pattern: When an internal auditor followed up on a significant increase in maintenance supplies during the past year, a purchasing agent explained to the internal auditor that the primary reason for the increase was painting services and supplies. The internal auditor found a blanket purchase order without the normal bid or quote documentation. The blanket purchase order is a standing agreement with a vendor to order specific supplies up to a limit without separate purchase orders for each order. The blanket purchase order had been signed by the general manager and named the general manager’s father as the sole contractor for painting services on the organization’s projects. The auditor also found a number of large invoices, authorized for payment by the general manager, that showed the general manager’s father as the person who signed for the receipt of the material at the supplier."}], "answer": 1}, {"q_tr": "Bu senaryoda iç denetçi tarafından fark edilen yaygın hile göstergesi nedir?", "q_en": "What is the common indicator of fraud recognized by the internal auditor in this scenario?", "options": [{"tr": "Analitik prosedürler hesap bakiyelerinde olağanüstü bir artış ortaya koymuştur.", "en": "Analytical procedures revealed an extraordinary increase in account balances.", "cmt_tr": "Analitik prosedürler iç denetçiler tarafından görevlerde toplanan bilgileri değerlendirmek için yaygın olarak uygulanır. Bir hesap bakiyesindeki olağanüstü artış tespit edilmeli ve araştırılmalıdır.", "cmt_en": "Analytical procedures are commonly performed by internal auditors to assess information collected in an engagement. The assessment results from comparing information with expectations identified or developed by the internal auditor. Thus, an extraordinary increase in an account balance should be detected and investigated as the result of applying analytical methods."}, {"tr": "Bir yüklenici için boya ve malzeme satın alınmaktadır.", "en": "Paint and supplies are being purchased for a contractor.", "cmt_tr": "Boya temini bir sorun değildir.", "cmt_en": "The provision of paint is not an issue."}, {"tr": "Satın alma görevlisi yükleniciyi açık satın alma emrine dayanarak seçmektedir.", "en": "The purchasing agent is selecting the contractor on the basis of a blanket purchase order.", "cmt_tr": "Satın alma görevlisi bu sorumluluğu satın alma emri yetkisi çerçevesinde yerine getirmektedir.", "cmt_en": "The purchasing agent is fulfilling this responsibility in accordance with the authority of a purchasing"}, {"tr": "Faturalar genel müdür tarafından ödeme için onaylanmaktadır.", "en": "Invoices are being authorized for payment by the general manager.", "cmt_tr": "Genel müdür ödemeyi uygun şekilde onaylayabilir.", "cmt_en": "The general manager may appropriately authorize payment. Fact Pattern: Bank management suspects that a bank loan officer frequently made loans to fictitious entities, disbursed loan proceeds to personally established accounts, and then let the loans go into default. Some pertinent facts about the loan officer include • Not taking vacations; • An expensive personal car; • Gasoline and repair bills submitted for a car assigned by the bank that are higher than the organization’s average; and • Occasionally showing impatience with questions from internal auditors."}], "answer": 0}, {"q_tr": "Bu durumda aşağıdakilerden hangisi en güçlü hile göstergesidir?", "q_en": "Which of the following is the strongest indicator of fraud in this situation?", "options": [{"tr": "Yıllık izin kullanmamak.", "en": "Not taking an annual vacation.", "cmt_tr": "Yıllık izin kullanmamak, kredi memurunun yokluğunda suistimalin ortaya çıkmasından korktuğunu düşündürmektedir.", "cmt_en": "Not taking an annual vacation suggests that the loan officer fears discovery of wrongdoing in his or her absence."}, {"tr": "Pahalı bir kişisel araç.", "en": "An expensive personal car.", "cmt_tr": "Pahalı bir kişisel araç mutlaka hile göstergesi değildir. Belirli koşullarda gösterge olabilir, ancak bu durumda en güçlü gösterge değildir.", "cmt_en": "An expensive personal car is not necessarily an indicator of fraud. It could be under certain circumstances, but it is not the strongest indicator in this situation."}, {"tr": "İç denetçilerin sorularına karşı ara sıra sabırsızlık göstermek.", "en": "Occasionally showing impatience with questions from internal auditors.", "cmt_tr": "İç denetçilerin sorularına karşı ara sıra sabırsızlık göstermek mutlaka hile göstergesi değildir. İş baskısı gibi diğer faktörlerin göstergesi de olabilir.", "cmt_en": "Occasionally showing impatience with questions from internal auditors is not necessarily an indication of fraud. It could be an indicator, but it could also be an indication of other factors, such as job pressure."}, {"tr": "Şirket ortalamasından yüksek benzin ve tamir faturaları sunmak.", "en": "Submitting gasoline and repair bills that are higher than company average.", "cmt_tr": "Ortalamadan yüksek benzin ve tamir faturaları sunmak, hileli kredi vermeyle ilişkili değildir. Bu faktörler kredi memuru tarafından kontrol edilemez.", "cmt_en": "Submitting gasoline and repair bills that are higher than average is not correlated with making fraudulent loans. These factors are not controllable by the loan officer, so they cannot be indicators of unusual activity by him or her."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi artan hile riski göstergesidir? Kontrolör:", "q_en": "Which of the following is an indicator of increased risk of fraud? The controller", "options": [{"tr": "Tüm izinlerini kullanmakta ve mali işlerden sorumlu başkan yardımcılığına terfi etmeyi kabul etmiştir.", "en": "Takes all vacations and has just accepted a promotion to vice president of finance.", "cmt_tr": "Bu davranış kombinasyonu olağandışı değildir.", "cmt_en": "This combination of behaviors is not unusual."}, {"tr": "İzin kullanmamakta ve mali işlerden sorumlu başkan yardımcılığına terfi etmeyi kabul etmiştir.", "en": "Takes no vacations and has just accepted a promotion to vice president of finance.", "cmt_tr": "Bu davranış kombinasyonu olağandışı değildir.", "cmt_en": "This combination of behaviors is not unusual."}, {"tr": "Tüm izinlerini kullanmakta ve mali işlerden sorumlu başkan yardımcılığına terfiyi reddetmiştir.", "en": "Takes all vacations and has refused promotion to vice president of finance.", "cmt_tr": "Bu davranış kombinasyonu olağandışı değildir.", "cmt_en": "This combination of behaviors is not unusual."}, {"tr": "İzin kullanmamakta ve mali işlerden sorumlu başkan yardımcılığına terfiyi reddetmiştir.", "en": "Takes no vacations and has refused promotion to vice president of finance.", "cmt_tr": "İzin kullanmamak ve terfiyi reddetmek tespit edilme korkusuna işaret edebilir. Görünen hırs eksikliği kontrolörün titizliğiyle tutarsızdır.", "cmt_en": "Not taking vacations and refusing a promotion may indicate a fear of detection. The apparent lack of ambition is inconsistent with the controller’s diligence."}], "answer": 3}, {"q_tr": "Büyük bir tüketim malı depo operasyonundaki yıllık fiziksel envanter sürecinde ortaya çıkan olağandışı envanter eksikliklerini ele almak üzere iç denetim yöneticisi tarafından bir görev planlanmıştır. Depo odasında yılın başında her ay sonu bir ürün hattının tamamını sayma sürecinin yerine bir döngüsel sayım programı kurulmuştur. Döngüsel sayım programı etkili görünmektedir çünkü yıl boyunca birkaç bin farklı ürün için yalnızca dokuz küçük düzeltme yapılmıştır. Depo sorumlusu, 15 depo personelinin her birinin her gün ne kadar verimli sayılabileceğine göre bir ürün seçtiğini açıklamıştır. Depo odasında kontrol sorunları dahil hile fırsatı artmıştır çünkü:", "q_en": "An engagement had been scheduled by the chief audit executive to address unusual inventory shortages revealed in the annual physical inventory process at a large consumer goods warehouse operation. A cycle count program had been installed in the storeroom at the beginning of the year in place of the disruptive process of counting one entire product line at the end of each month. The cycle count program appeared effective because only nine minor adjustments had been made for the entire year on the several thousand different products located in the storeroom. The storeroom supervisor explained that each of the 15 stockroom personnel selected one item each day for cycle count based on how efficiently the item could be counted. The opportunity for control-related problems including fraud has been increased in the stockroom because", "options": [{"tr": "Döngüsel sayım için kalemler depo personeli tarafından seçilmektedir.", "en": "Items for cycle count are selected by stockroom personnel.", "cmt_tr": "Hile fırsatı artmıştır çünkü döngüsel sayım kalemlerini depo personeli seçmektedir (zayıf iç kontrol). Kalemlerin seçimi göreceli değerlere veya toplam işlem hacmiyle ilişkiye dayanmalıdır. Ayrıca saklama veya kayıt tutma sorumlulukları olmayan personel sayımları kontrol etmelidir.", "cmt_en": "The opportunity for fraud has been increased because stockroom personnel select the items for cycle count (poor internal control). Selection of items should be based on relative values or the relationship of an item to the total volume of transactions. Moreover, personnel who do not have custodial or recordkeeping responsibilities should control the counts."}, {"tr": "Daha az verimli bir programın yerine döngüsel sayım programı kurulmuştur.", "en": "A cycle count program has been installed in place of a less efficient program.", "cmt_tr": "Uygun ve etkili bir döngüsel sayım süreci kontrolü iyileştirmelidir.", "cmt_en": "An appropriate and effective cycle count process should improve control."}, {"tr": "Döngüsel sayım süreci sonucunda yalnızca dokuz küçük düzeltme kaydedilmiştir.", "en": "Only nine minor adjustments have been recorded as a result of the cycle count process.", "cmt_tr": "Düzeltme sayısı bu durumda kontrol düzeyinin göstergesi değildir.", "cmt_en": "The number of adjustments is not indicative of the level of control in this situation."}, {"tr": "Depo personeli döngüsel sayım bilgilerini kaydetmektedir.", "en": "Stockroom personnel record cycle count information.", "cmt_tr": "Uygun şekilde kontrol edilen bir döngüsel sayım süreci, sayımların yapılmasında depo personelini dahil edebilir.", "cmt_en": "A properly controlled cycle count process could involve stockroom personnel in performing counts. Fact Pattern: The internal audit function has been assigned to perform an engagement involving a division. Based on background review, the internal auditor knows the following about management policies: • Organizational policy is to rapidly promote divisional managers who show significant success. Thus, successful managers rarely stay at a division for more than 3 years. • A significant portion of division management’s compensation comes in the form of bonuses based on the division’s profitability. The division was identified by senior management as a turnaround opportunity. The division is growing but is not scheduled for a full audit by the external auditors this year. The division has been growing about 7% per year for the past 3 years and uses a standard cost system. During the preliminary review, the internal auditor notes the following changes in financial data compared with the prior year: • Sales have increased by 10%. • Cost of goods sold has increased by 2%. • Inventory has increased by 15%. • Divisional net profit has increased by 8%."}], "answer": 0}, {"q_tr": "Aşağıdaki kalemlerden hangisi iç denetçiyi bölümde hile olasılığı konusunda uyarabilir?", "q_en": "Which of the following items might alert the internal auditor to the possibility of fraud in the division?", "options": [{"tr": "Bölüm bu yıl dış denetime tabi değildir.", "en": "The division is not scheduled for an external audit this year.", "cmt_tr": "Bu yıl dış denetim olmaması önemli bir kırmızı bayrak olarak tanımlanmamıştır. Ayrıca bölüm iç denetim fonksiyonu tarafından incelenmektedir.", "cmt_en": "Lack of an external audit this year has not been identified as a significant red flag. In addition, the division is reviewed by the internal audit function."}, {"tr": "Satışlar %10 artmıştır.", "en": "Sales have increased by 10%.", "cmt_tr": "Satışlar bu bölümde normalde yaklaşık %7 artmaktadır. Bu nedenle %10'luk artış tek başına beklenmedik değildir ve kırmızı bayrak oluşturmaz.", "cmt_en": "Sales have normally been increasing by about 7% at this division. Thus, an increase of 10%, by itself, is not unexpected and does not raise a red flag."}, {"tr": "Yönetim ücretlendirmesinin önemli bir kısmı doğrudan bölümün raporlanan net kârına bağlıdır.", "en": "A significant portion of management’s compensation is directly tied to reported net profit of the division.", "cmt_tr": "İç denetçinin hile tespiti sorumlulukları arasında hile göstergelerini belirlemek için yeterli bilgiye sahip olmak yer alır. Örneğin, terfi ve ücretlendirmenin (örn. primler) kârlılığa bağlı olması nedeniyle performans çarpıtılabilir.", "cmt_en": "The internal auditor’s responsibilities for detecting fraud include having sufficient knowledge of fraud to be able to identify indicators that fraud may have been committed. This knowledge includes the characteristics of fraud, the techniques used to commit fraud, and the types of frauds associated with the activities reviewed. For example, performance may be distorted because promotion and compensation (e.g., bonuses) are tied to profitability."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "Tüm yanıtlar kırmızı bayrak değildir.", "cmt_en": "Not all responses are red flags."}], "answer": 2}, {"q_tr": "Bir iç denetçi, satışlarda, brüt marjda ve kârda olağandışı büyük artış gösteren bir bölümün performansını araştırmaktadır. Aşağıdaki göstergelerden hangisinin bölümde satışla ilgili hile olasılığını işaret etme olasılığı en düşüktür?", "q_en": "An internal auditor is investigating the performance of a division with an unusually large increase in sales, gross margin, and profit. Which of the following indicators is least likely to indicate the possibility of sales-related fraud in the division?", "options": [{"tr": "Bölüm yönetiminin ücretlendirmesinin önemli bir kısmı raporlanan bölüm kârlarına dayanmaktadır.", "en": "A significant portion of divisional management’s compensation is based on reported divisional profits.", "cmt_tr": "Yönetim ücretlendirmesini raporlanan kârlara dayandırmak hile için teşvik yaratır.", "cmt_en": "Basing management compensation on reported profits creates an incentive for fraud."}, {"tr": "Yıl sonundan sonra olağandışı büyük miktarda satış iadesi kaydedilmiştir.", "en": "There is an unusually large amount of sales returns recorded after year end.", "cmt_tr": "Yıl sonundan sonra olağandışı büyük miktarda satış iadesi, yıl sonuna yakın geçersiz satışların kaydedildiğine işaret edebilir.", "cmt_en": "An unusually large amount of sales returns after year end may indicate that invalid sales were recorded near the end of the year."}, {"tr": "İç denetçi satış faturalarından rastgele bir örneklem almış ancak Kasım ve Aralık'ta seçilen bazı satış işlemleri için sevkiyat belgesi bulamamıştır.", "en": "The internal auditor has taken a random sample of sales invoices but cannot locate a shipping document for a number of the sales transactions selected for November and December.", "cmt_tr": "Sevkiyat belgelerinin eksikliği, Kasım ve Aralık'ta geçersiz satışların kaydedildiğine işaret edebilir.", "cmt_en": "The lack of shipping documents may indicate that invalid sales were recorded during November and December."}, {"tr": "Bölümün büyük rakiplerinden biri yıl içinde kapanmıştır.", "en": "One of the division’s major competitors went out of business during the year.", "cmt_tr": "Yıl içinde rakip sayısının azalması, satış ve kâr artışı için potansiyel bir açıklamadır.", "cmt_en": "A decrease in the number of competitors during the year is a potential explanation for the increase in sales and profits."}], "answer": 3}, {"q_tr": "Bir kuruluşta hile olasılığını değerlendirirken aşağıdakilerden hangisi kırmızı bayrak olarak kabul edilir?", "q_en": "When evaluating the likelihood of fraud within an organization, which of the following is considered a red flag?", "options": [{"tr": "Yönetim, belirli bir değerin altındaki satın almaları yapma yetkisini astlara devretmiştir.", "en": "Management has delegated the authority to make purchases under a certain value to subordinates.", "cmt_tr": "Belirli bir değerin altındaki satın alma yetkisini astlara devretmek, riski sınırlandırırken verimliliği teşvik eden kabul edilebilir ve yaygın bir uygulamadır. Tek başına kırmızı bayrak değildir.", "cmt_en": "Delegating the authority to make purchases under a certain value to subordinates is an acceptable and common practice intended to limit risk while promoting efficiency. It is not, by itself, considered a red flag."}, {"tr": "Bir kişi, herhangi bir görev rotasyonu olmaksızın uzun süre aynı nakit işleme işinde kalmıştır.", "en": "An individual has held the same cash-handling job for an extended period without any rotation of duties.", "cmt_tr": "Hassas işlerde görev rotasyonu veya çapraz eğitim eksikliği kırmızı bayraktır. Böyle bir kişinin hile yapma ve gizleme fırsatı daha fazla olabilir.", "cmt_en": "Lack of rotation of duties or cross-training for sensitive jobs is a red flag. Such a person may have a greater opportunity to commit and conceal fraud."}, {"tr": "Bir kişi menkul kıymet satın almaktan sorumludur ve başka bir kişi satın almaları kaydetmektedir.", "en": "One individual is responsible for purchasing securities and another individual records the purchases.", "cmt_tr": "Uygunsuz görev ayrımı tanımlanmış bir kırmızı bayraktır. Ancak bu durumda görev ayrımı uygundur.", "cmt_en": "An inappropriate segregation of duties is an identified red flag. The same person should not authorize, execute, and account for transactions and have custody of the assets. The segregation of duties is appropriate in this situation."}, {"tr": "Kontrolör, alacak hesapları departmanından sorumlu ve hesap verebilirdir.", "en": "The controller is responsible and accountable for the accounts receivable department.", "cmt_tr": "Açık yetki ve hesap verebilirlik çizgileri oluşturmak, hem sorumluluk atamaya yardımcı olur hem de önleyici etkiler yaratır.", "cmt_en": "Establishing clear lines of authority and accountability not only helps to assign culpability but also has preventive effects."}], "answer": 1}, {"q_tr": "Yönetim hilesi için en yaygın motivasyon aşağıdakilerden hangisinin varlığıdır?", "q_en": "The most common motivation for management fraud is the existence of", "options": [{"tr": "Kumar alışkanlığı gibi kötü alışkanlıklar.", "en": "Vices, such as a gambling habit.", "cmt_tr": "Kötü alışkanlıklar, bireyler yararına ve kuruluş aleyhine işlenen hile motivasyonlarına örnektir.", "cmt_en": "Vices are an example of motivators of fraud perpetrated for the benefit of individuals and to the organization’s detriment."}, {"tr": "İş memnuniyetsizliği.", "en": "Job dissatisfaction.", "cmt_tr": "İş memnuniyetsizliği, bireyler yararına ve kuruluş aleyhine işlenen hile motivasyonlarına örnektir.", "cmt_en": "Job dissatisfaction is an example of motivators of fraud perpetrated for the benefit of individuals and to the or"}, {"tr": "Kuruluş üzerindeki finansal baskılar.", "en": "Financial pressures on the organization.", "cmt_tr": "Yönetim hilesi bireylerden çok kuruluşlara yarar sağlar, bu nedenle finansal baskıların varlığı en yaygın motivasyondur. Yönetim failleri, kısıtlayıcı kredi sözleşmeleri, zayıf nakit pozisyonu, önemli müşteri kaybı gibi finansal baskılar nedeniyle mali tablolarını daha çekici göstermeye çalışır.", "cmt_en": "Management fraud benefits organizations rather than individuals, so the existence of financial pressures is the most common motivation. Management perpetrators attempt to make their financial statements appear more attractive because of the financial pressures of restrictive loan covenants, a poor cash position, loss of significant customers, etc."}, {"tr": "Mükemmel suçu işleme meydan okuması.", "en": "The challenge of committing the perfect crime.", "cmt_tr": "Mükemmel suçu işleme meydan okuması, bireyler yararına ve kuruluş aleyhine işlenen hile motivasyonlarına örnektir.", "cmt_en": "The challenge of committing the perfect crime is an example of motivators of fraud perpetrated for the benefit of individuals and to the organization’s detriment."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi mali tablo hilesidir?", "q_en": "Which of the following is a financial statement fraud?", "options": [{"tr": "Bir çalışan kuruluşun müşteri listesini bir rakibe satmaktadır.", "en": "An employee sells an organization’s customer list to a competitor.", "cmt_tr": "Kuruluşun müşteri listesini bir rakibe satmak varlık hırsızlığıdır.", "cmt_en": "The sale of an organization’s customer list to a competitor is theft of assets."}, {"tr": "Bir yüklenici her zaman en son teklif vermekte, en düşük teklifi sunmakta ve düzenli olarak sözleşme almaktadır.", "en": "A contractor always bids last, bids lowest, and regularly receives contracts.", "cmt_tr": "Rüşvet ve yolsuzluk; bir yüklenicinin her zaman en son teklif vermesi, en düşük teklifi sunması ve düzenli olarak sözleşme alması gibi ihale hilelerini içerir.", "cmt_en": "Bribery and corruption include bid rigging, such as one contractor being able to bid last, bid lowest, and regularly receive contracts from an organization."}, {"tr": "Üst yönetim varlıkları olduğundan fazla göstermekte ve borçları gizlemektedir.", "en": "Senior management overstates assets and conceals liabilities.", "cmt_tr": "Hile; aldatma, gizleme veya güven ihlali ile nitelendirilen yasadışı eylemdir. Mali tablo hilesi, mali tablo kullanıcılarını kasıtlı olarak tutarları yanlış göstererek veya gerekli bilgileri tamamen atlayarak aldatmayı içerir.", "cmt_en": "Fraud is any illegal act characterized by deceit, concealment, or violation of trust. The person perpetrates the fraud with the knowledge of possibly receiving some unauthorized benefit. Moreover, fraud can be accomplished by persons outside and inside the organization. Financial statement fraud involves deceiving financial statement users by purposely misstating amounts shown in the financial statements or completely omitting necessary information."}, {"tr": "Bir çalışan kişisel bir satın alma için işverene fatura sunmaktadır.", "en": "An employee submits an invoice to the employer for a personal purchase.", "cmt_tr": "Bir çalışanın kişisel satın alma için işverene fatura sunması hileli ödemedir.", "cmt_en": "An employee’s submission of an invoice to the employer for a personal purchase is fraudulent disbursement."}], "answer": 2}, {"q_tr": "Aşağıdaki faktörlerden hangisi üretim sürecinde hileli faaliyetin olasılığını en iyi şekilde gösterebilir?", "q_en": "Which of the following factors might best indicate the possibility of fraudulent activity in the production process?", "options": [{"tr": "Çalışan fazla mesaisi geçen yıl %50 artmıştır.", "en": "Employee overtime has increased 50 percent during the past year.", "cmt_tr": "Fazla mesai saatleri personel büyüklüğü, son teslim tarihleri, projeler veya diğer faktörler nedeniyle dönemler arasında önemli ölçüde değişebilir.", "cmt_en": "Overtime hours may vary significantly from period to period due to staff size, deadlines, projects, or other factors."}, {"tr": "Hurda üretilmekte ve yeniden kullanılmamakta olmasına rağmen hurda satışlarından gelir bildirilmemektedir.", "en": "Although scrap is generated and not reused, no income is reported from scrap sales.", "cmt_tr": "Varlık zimmeti, nakit veya diğer varlıkların çalınmasını içeren bir hile türüdür. Hurda, üretimden arta kalan malzemedir. Yeniden kullanılmazsa satılır. Bu nedenle hurda satışlarından gelir bildirilmemesi, hurda zimmetinin göstergesidir.", "cmt_en": "Asset misappropriation is a type of fraud that involves the theft of cash or other assets. Scrap consists of leftover material from production. It is sold if not reused. Thus, an indication of scrap misappropriation is a lack of income reported from scrap sales."}, {"tr": "Çalışanlarla yapılan görüşmeler yönetime karşı genel bir memnuniyetsizlik olduğunu göstermektedir.", "en": "Interviews with employees indicate that they have a general dissatisfaction with management and believe that productivity could be greatly improved if management listened to the employees.", "cmt_tr": "Tek başına çalışan memnuniyetsizliği hile göstergesi değildir.", "cmt_en": "By itself, employee dissatisfaction is not an indication of fraud."}, {"tr": "Satılan malların maliyeti artarken envanter azalmıştır.", "en": "Inventory has decreased at the same time that the cost of goods sold has increased..", "cmt_tr": "Envanter azalırken satılan malların maliyeti artmalıdır.", "cmt_en": "As inventory decreases, cost of goods sold should increase."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi kayma (skimming) örneğidir?", "q_en": "Which of the following is an example of skimming?", "options": [{"tr": "Kuruluş haftalık bordro çekleri düzenlemektedir. Ancak nakit akışı sorunları nedeniyle çalışan maaşlarından kesilen tutarları kendi kullanımı için tutmaktadır.", "en": "The organization issued payroll checks weekly. However, due to cash flow issues, the organization kept the amounts withheld from the employee paychecks (federal withholding, Social Security, Medicare, etc.) for its own use.", "cmt_tr": "Verginin yasadışı olarak ödenmemesi veya eksik ödenmesi vergi kaçakçılığı olarak kabul edilir.", "cmt_en": "The illegal nonpayment or underpayment of tax is considered tax evasion. Intentionally falsifying a tax return, failing to remit taxes, and failing to report taxes are examples."}, {"tr": "Denetçi, yöneticilerden birinin kişisel ürünleri kuruluşun haftalık satıcı siparişlerine dahil ettiğini keşfetmiştir.", "en": "The auditor discovered one of the managers was including personal items on the organization’s weekly vendor orders. There was no evidence the manager had reimbursed the organization for the expense.", "cmt_tr": "Ödeme hilesi, hayali mal veya hizmetler için ödeme, faturaların şişirilmesi veya kişisel amaçlarla fatura kullanılmasını içerir.", "cmt_en": "Payment fraud involves payment for fictitious goods or services, overstatement of invoices, or use of invoices for personal reasons. The manager was using the organization, through vendor invoices, to purchase items for his or her personal use."}, {"tr": "Birlikte çalışan iki arkadaş, ilk gelenin her ikisi için de giriş kartını basması ve son ayrılanın her ikisi için çıkış kartını basması şeklinde bir düzenleme yapmıştır.", "en": "Two friends who work together have an arrangement that the first to arrive to work for the day punches in using the time clock for both of them, and the last one to leave punches out for both of them.", "cmt_tr": "Bordro hilesi, tazminat için sahte taleptir. Zaman çizelgelerini tahrif etmeyi, çalışılmayan saatler için fazla mesai talep etmeyi içerebilir.", "cmt_en": "Payroll fraud is a false claim for compensation. It can include, for example, falsifying timesheets, claiming overtime for hours not worked, and payments to fictitious or terminated employees. An employee punching the time clock for another employee is an example of payroll fraud."}, {"tr": "Limuzin sürücülerine teşvik olarak satılan her 250$'lık helikopter turu için 25$ vaat edilmiştir. Müşteri şikayetlerinden sonra müdür, sürücülerden birinin müşterilerden tur başına 300$ aldığını ve farkı cebine attığını keşfetmiştir.", "en": "As an incentive to limo drivers, an organization promised $25 for each $250 helicopter tour sold. After hearing several customer complaints, the manager discovered that one of the drivers was charging the customers $300 per tour and pocketing the difference.", "cmt_tr": "Kayma (skimming), muhasebe kaydı yapılmadan önce nakdin çalınmasıdır. Örnekler arasında müşteriden ödeme kabul edip satışı bildirmemek ve müşteriden fazla ücret alıp farkı cebe atmak yer alır. Kayma, denetim izi olmadığı için tespit edilmesi çok zordur.", "cmt_en": "Skimming is a theft of cash before the accounting entry is recorded. Examples include accepting payment from a customer but not reporting the sale and overcharging the customer for the sale and keeping the difference. Skimming is very difficult to detect as there is no audit trail."}], "answer": 3}, {"q_tr": "Kuruluş, yemek odasında çalışanların satın alması için yiyecek ürünleri temin etmek üzere bir dış satıcıyla sözleşme yapmıştır. Ödeme bir kiosk aracılığıyla ve dürüstlük sistemine dayalı olarak yapılmaktadır. Birkaç haftalık eksiklikten sonra iki çalışan, ödeme yapmadan yiyecek aldıkları için işten çıkarılmıştır. Bu ne tür bir hile örneğidir?", "q_en": "The organization contracted with an outside vendor to maintain food items for employee purchase in the dining room. Payment for food was through a kiosk and was on the honor system. After several weeks of shortages, two employees were fired for taking food without paying for it. This is an example of what type of fraud?", "options": [{"tr": "Gider geri ödeme hilesi.", "en": "Expense reimbursement fraud.", "cmt_tr": "Gider geri ödeme hilesi, hayali veya şişirilmiş giderler için ödeme yapılmasıdır.", "cmt_en": "Expense reimbursement fraud is when payment is made for fictitious or inflated expenses, for example, when an employee submits an expense report that includes personal travel, nonexistent meals, or extra mileage."}, {"tr": "Varlık zimmeti.", "en": "Asset misappropriation.", "cmt_tr": "Varlık zimmeti hilesi, nakit veya envanter, malzeme, ekipman ve bilgi gibi diğer varlıkların çalınmasıdır. Çalışanların ödeme yapmadan yiyecek alması varlık zimmeti hilesi olarak kabul edilir.", "cmt_en": "Asset misappropriation fraud is stealing cash or other assets, such as supplies, inventory, equipment, and information. The theft may be concealed by adjusting records. Employees taking food and not paying for it would be considered asset misappropriation fraud."}, {"tr": "Haksız kullanım.", "en": "Wrongful use.", "cmt_tr": "Gizli veya tescilli bilgilerin haksız kullanımı hileli kabul edilir.", "cmt_en": "Wrongful use of confidential or proprietary information is considered fraudulent. Confidential or proprietary information can often be the organization’s most valued asset. Because of this, employees are routinely asked to sign confidentiality agreements as a condition of their employment."}, {"tr": "Yönlendirme.", "en": "Diversion.", "cmt_tr": "Yönlendirme hilesi üçüncü bir tarafı içerir ve normalde kuruluşa fayda sağlayan bir işlemi bir çalışana veya dışarıdan birine yönlendirir.", "cmt_en": "A diversion fraud involves a third party and redirects to an employee or outsider a transaction that normally benefits the organization. For example, accounts payable receives a phone call from an impostor, pretending to be from one of the organization’s vendors. The impostor gives new payment instructions to accounts payable and redirects future organization payments."}], "answer": 1}, {"q_tr": "Çek takası (check kiting) hakkında aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following statements about check kiting is false?", "options": [{"tr": "Çek takası, müşteri ödemelerine ve alacak hesapları kayıtlarına erişimi olan bir kişinin müşteri ödemesini çalmasıdır.", "en": "Check kiting is theft of a customer’s payment by a person with access to customer payments and accounts receivable records.", "cmt_tr": "Çek takası değil, alacak kayması (lapping), müşteri ödemelerine ve alacak hesapları kayıtlarına erişimi olan bir kişinin müşteri ödemesini çalmasıdır. Çek takası, bir banka hesabına çek yatırma ile çekin bankadan tahsil edilmesi arasındaki gecikmeyi istismar eder.", "cmt_en": "Lapping receivables, not check kiting, is when a person (or persons) with access to customer payments and accounts receivable records steals a customer’s payment. The shortage in that customer’s account is later covered by a subsequent payment from another customer. The process continues until (1) a customer complains about his or her payment not being posted, (2) an absence by the perpetrator allows another employee to discover the fraud, or (3) the perpetrator covers the amount stolen. Check kiting exploits the delay between depositing a check in one bank account and clearing the check through the bank on which it was drawn. Check kiting is when the kiter writes an insufficient funds check from the first bank and deposits the check in a second bank. The second bank immediately credits the account for some or all of the amount of the check, enabling the kiter to write other checks or withdraw cash on the nonexistent balance."}, {"tr": "Çek takası, çekin yatırılması ile bankadan tahsil edilmesi arasındaki boşluk süresini istismar eder.", "en": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank.", "cmt_tr": "Çek takası, çekin yatırılması ile bankadan tahsil edilmesi arasındaki boşluk süresini istismar eder. Bir zamanlar boşluk süreleri 2 ile 10 gün arasında değişiyordu. Teknoloji, boşluk sürelerini büyük ölçüde azaltmıştır.", "cmt_en": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank. At one time, float times ranged from 2 days to 10 days. Technology has resulted in drastically reduced float times."}, {"tr": "Elektronik fon transferi ve diğer ağ bilgisayar güvenlik önlemlerinin yaygın kullanımı nedeniyle elektronik çek takası zordur.", "en": "Electronic check kiting is difficult due to the widespread use of electronic funds transfer and other networked computer safeguards.", "cmt_tr": "Elektronik fon transferi ve diğer ağ bilgisayar güvenlik önlemlerinin yaygın kullanımı elektronik çek takasını zorlaştırmaktadır.", "cmt_en": "The widespread use of electronic funds transfer and other networked computer safeguards make electronic kiting difficult."}, {"tr": "Çek takası süreci, herhangi bir sayıda bankadaki hesaplar arasında döngüsel olarak devam edebilir.", "en": "The check kiting process can proceed in a circle of accounts at any number of banks.", "cmt_tr": "Bir çek takası planı en az iki hesap gerektirir ve genellikle birden fazla bankada birkaç hesabı içerir. Var olmayan nakit sürekli olarak bir bankadan diğerine döngüsel olarak aktarılır.", "cmt_en": "A check kiting scheme requires two accounts and usually involves several accounts at several banks. The nonexistent cash is constantly moved from one bank to another, rotating in a circular fashion."}], "answer": 0}, {"q_tr": "Görev hedefleri geliştirirken iç denetçiler genellikle aşağıdakilerden hangisini dikkate almalıdır?", "q_en": "When developing engagement objectives, internal auditors ordinarily must consider", "options": [{"tr": "Tüm hileleri tespit etmeye yeterli prosedürler.", "en": "Procedures sufficient to detect all fraud.", "cmt_tr": "İç denetçiler tüm hileleri tespit etmekten sorumlu değildir, ancak her zaman hile olasılığına karşı uyanık olmalıdır.", "cmt_en": "Internal auditors are not responsible for the detection of all fraud, but they always must be alert to the possibility of fraud."}, {"tr": "Önemli hile, hata veya uyumsuzluk olasılığı.", "en": "The probability of significant fraud, errors, or noncompliance.", "cmt_tr": "Standart 4.2, denetçilerin mesleki özen göstermesini gerektirir. Hizmetlerinin niteliğini, koşullarını ve gereksinimlerini değerlendirmelidirler. Bu değerlendirme, hedefleri, operasyonları veya kaynakları etkileyebilecek önemli hatalar, hile, uyumsuzluk ve diğer risklerin olasılığını içerir.", "cmt_en": "Standard 4.2 requires auditors to exercise due professional care. They must assess the nature, circumstances, and requirements of their services. For example, this assessment includes the probability of significant errors, fraud, noncompliance, and other risks that might affect objectives, operations, or resources. Internal auditors therefore must consider the probability of fraud when developing engagement objectives."}, {"tr": "Hile tespiti uzmanı tarafından yürütülecek soruşturma.", "en": "The investigation that would be conducted by an expert in fraud detection.", "cmt_tr": "İç denetçiler hile riskini ve yönetilme biçimini değerlendirmek için yeterli bilgiye sahip olmalıdır. Birincil sorumluluğu hileyi tespit etmek ve araştırmak olan bir kişinin uzmanlığına sahip olmaları beklenmez.", "cmt_en": "Internal auditors must have sufficient knowledge to evaluate the risk of fraud and the manner in which it is managed by the organization. They are not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud."}, {"tr": "Hile göstergelerini belirlemek için özel prosedürler uygulamak.", "en": "Performing specific procedures to identify fraud indicators.", "cmt_tr": "İç denetçiler hile göstergelerini (kırmızı bayrakları) belirlemek için yeterli bilgiye sahip olmalıdır. Ancak normalde özellikle kırmızı bayrak bilgilerini toplamak için prosedürler uygulamazlar.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information."}], "answer": 1}, {"q_tr": "İç denetçilerin hile konusundaki olağan rolleri aşağıdakilerden hangisini içerir?", "q_en": "The usual roles of internal auditors regarding fraud include", "options": [{"tr": "Kuruluşun hile riski yönetimini değerlendirmek.", "en": "Evaluating the organization’s management of fraud risk.", "cmt_tr": "İç denetim fonksiyonu hile olasılığını ve kuruluşun hile riskini nasıl yönettiğini değerlendirmelidir.", "cmt_en": "The internal audit function must evaluate the potential for the occurrence of fraud and how the organization manages fraud risk."}, {"tr": "Kırmızı bayrak bilgilerini elde etmek için prosedürler uygulamak.", "en": "Performing procedures to obtain red flag information.", "cmt_tr": "İç denetçiler hile göstergelerini (kırmızı bayrakları) belirlemek için yeterli bilgiye sahip olmalıdır. Ancak normalde özellikle kırmızı bayrak bilgilerini toplamak için prosedürler uygulamazlar.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information."}, {"tr": "Kontrol eksikliklerini gidermek için kontroller tasarlamak.", "en": "Designing controls to replace control deficiencies.", "cmt_tr": "İç denetçiler kontrolleri değerlendirir, tasarlamaz. Kontrol tasarımı değerlendirmesinde ve denetim prosedürlerinin seçiminde hile risklerini dikkate almalıdır.", "cmt_en": "Internal auditors evaluate but do not design controls. Internal auditors should consider the potential for fraud risks in the assessment of control design and the choice of audit procedures."}, {"tr": "Göstergeler mevcut olduğunda hile soruşturması.", "en": "Fraud investigation when indicators are present.", "cmt_tr": "İç denetçiler hile göstergelerini değerlendirmeli ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermelidir. Hileyi soruşturma uzmanlığına sahip olmaları beklenmez.", "cmt_en": "Internal auditors should evaluate the indicators of fraud and decide whether any further action is necessary or whether an investigation should be recommended. Internal auditors are not expected to have the expertise to investigate fraud."}], "answer": 0}, {"q_tr": "İç denetçilerin hile bilgisi aşağıdakilerden hangisini içermelidir?", "q_en": "Internal auditors’ knowledge of fraud should include", "options": [{"tr": "Hileyi tespit etmek için gerekli eğitim.", "en": "The training needed to detect fraud.", "cmt_tr": "İç denetçi hile göstergelerini belirlemek için yeterli bilgiye sahip olmalıdır; ancak hileyi tespit edebilecek düzeyde bilgi ve eğitime sahip olması zorunlu değildir.", "cmt_en": "An internal auditor must have sufficient knowledge to identify the indicators of fraud but is not required to have sufficient knowledge and training to be able to detect fraud."}, {"tr": "Hile önleme faaliyetlerini planlamak.", "en": "Planning fraud prevention activities.", "cmt_tr": "Hile önleme faaliyetlerini planlamak yönetimin sorumluluğudur.", "cmt_en": "Planning fraud prevention activities is a responsibility of management."}, {"tr": "Belirli bir hile inceleme alanında teknik uzmanlık.", "en": "Technical expertise in a particular area of fraud examination.", "cmt_tr": "Standartlar, iç denetçinin belirli bir hile inceleme alanında teknik uzmanlığa sahip olmasını gerektirmez.", "cmt_en": "The Standards do not require an internal auditor to have technical expertise in a particular area of fraud examination to serve on an engagement in which a possibility of fraud exists."}, {"tr": "İncelenen faaliyetlerle ilişkili hile planları.", "en": "Schemes associated with the activities reviewed.", "cmt_tr": "İç denetçiler hile göstergelerini belirlemek için yeterli bilgiye sahip olmalıdır. Bu bilgi (1) hilenin özellikleri, (2) hile yöntemleri ve (3) incelenen faaliyetlerle ilişkili çeşitli hile planlarını içerir.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information. This knowledge includes (1) the characteristics of fraud, (2) the methods used to commit fraud, and (3) the various fraud schemes associated with the activities reviewed."}], "answer": 3}, {"q_tr": "İç denetçilerin hileyi tespit etmek için prosedür uygulama olasılığı en yüksek olan durum hangisidir?", "q_en": "Internal auditors are most likely to perform procedures to detect fraud when", "options": [{"tr": "Bir hile soruşturması başlamıştır.", "en": "A fraud investigation has commenced.", "cmt_tr": "İç denetçiler hile göstergelerini değerlendirmeli ve ek eylem gerekip gerekmediğine ya da soruşturma önerilip önerilmeyeceğine karar vermelidir.", "cmt_en": "Internal auditors should evaluate the indicators of fraud and decide whether any further action is necessary or whether an investigation should be recommended."}, {"tr": "Yönetim hile yönetim programını aktif olarak denetlemektedir.", "en": "Management is actively overseeing the fraud management program.", "cmt_tr": "Hile yönetim programının aktif denetimi, düzeltici önlemler yeterliyse ve izleme planı uygunsa hile riski potansiyelini azaltır.", "cmt_en": "Active oversight of the fraud management program reduces the potential for fraud risk if corrective measures suffice and the monitoring plan is adequate."}, {"tr": "Önemli kontrol eksiklikleri mevcuttur.", "en": "Significant control deficiencies exist.", "cmt_tr": "İç denetçiler kontrol zayıflıkları gibi hileye olanak tanıyabilecek fırsatlara karşı uyanık olmalıdır. Önemli kontrol eksiklikleri tespit edilirse, hilenin gerçekleşip gerçekleşmediğini belirlemek için ek prosedürler uygulanabilir.", "cmt_en": "Internal auditors should be alert to opportunities that could allow fraud, such as control deficiencies. If significant control deficiencies are detected, additional procedures may be performed to determine whether fraud has occurred."}, {"tr": "Hile göstergelerine ilişkin bilgi toplama gereksinimini karşılamak.", "en": "They satisfy the requirement to gather information about fraud indicators.", "cmt_tr": "İç denetçiler hile göstergelerini belirlemek için yeterli bilgiye sahip olmalıdır. Ancak normalde özellikle kırmızı bayrak bilgilerini toplamak için prosedürler uygulamazlar.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information."}], "answer": 2}, {"q_tr": "Hile riski potansiyelini değerlendirirken iç denetçiler:", "q_en": "When considering the potential for fraud risk, internal auditors", "options": [{"tr": "Kontrol eksikliklerinin yeterince düzeltilip düzeltilmediğini değerlendirir.", "en": "Evaluate whether control deficiencies are sufficiently corrected.", "cmt_tr": "İç denetçiler şunları değerlendirmelidir: (1) yönetimin hile riski yönetim programlarını aktif olarak denetleyip denetlemediğini, (2) tespit edilen kontrol eksikliklerine ilişkin zamanında ve yeterli düzeltici önlemlerin alınıp alınmadığını ve (3) programı izleme planının yeterli olup olmadığını.", "cmt_en": "Internal auditors should evaluate whether (1) management is actively overseeing the fraud risk management programs, (2) timely and sufficient corrective measures have been taken with respect to any noted control deficiencies, and (3) the plan for monitoring the program is adequate."}, {"tr": "Yönetimin hile risklerinin değerlendirmesini belgeleyip belgelemediğini belirler.", "en": "Determine whether management has documented the consideration of fraud risks.", "cmt_tr": "Hile risklerinin değerlendirmesi ve bunların belirli denetim çalışmasıyla ilişkisi iç denetçiler tarafından belgelenir.", "cmt_en": "The consideration of fraud risks and their relation to specific audit work are documented by the internal auditors."}, {"tr": "Hileyi tespit etmek için mesleki özen göstermelidir.", "en": "Should exercise due professional care to detect fraud.", "cmt_tr": "İç denetçiler hile riskini ve yönetilme biçimini değerlendirmek için yeterli bilgiye sahip olmalıdır. Birincil sorumluluğu hileyi tespit ve araştırmak olan kişinin uzmanlığına sahip olmaları beklenmez.", "cmt_en": "Internal auditors must have sufficient knowledge to evaluate the risk of fraud and the manner in which it is managed by the organization. They are not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud."}, {"tr": "Hileyi araştırırken mesleki özen göstermelidir.", "en": "Should exercise due professional care when investigating fraud.", "cmt_tr": "Hile soruşturması, iç denetçilerin önerisi üzerine yönetim veya yönetim kurulu tarafından onaylanabilir. Ancak denetçiler yalnızca risk potansiyeline dayalı olarak soruşturma yapmazlar.", "cmt_en": "A fraud investigation may be approved by management or the board after recommendation by internal auditors. However, auditors do not investigate based solely on the potential for risk. Moreover, they conduct investigations only if they have the necessary forensic competencies and are approved by the board to investigate."}], "answer": 0}, {"q_tr": "Çek takası (check kiting):", "q_en": "Check kiting", "options": [{"tr": "Müşteri ödemelerine ve alacak hesapları kayıtlarına erişimi olan bir kişinin müşteri ödemesini çalmasıdır.", "en": "Is theft of a customer’s payment by a person with access to the customer’s payments and accounts receivable records.", "cmt_tr": "Alacak kayması (lapping), müşteri ödemelerine ve alacak hesapları kayıtlarına erişimi olan bir kişinin müşteri ödemesini çalmasıdır. Eksiklik daha sonra başka bir müşterinin ödemesiyle kapatılır.", "cmt_en": "Lapping receivables is theft of a customer’s payment by a person (or persons) with access to customer payments and accounts receivable records. The shortage in that customer’s account is later covered by a subsequent payment from another customer. The process continues until (1) a customer complains about nonposting of payment, (2) an absence by the perpetrator allows another employee to discover the fraud, or (3) the perpetrator covers the amount stolen."}, {"tr": "Çekin yatırılması ile bankadan tahsil edilmesi arasındaki boşluk süresinin olmamasını istismar eder.", "en": "Exploits the lack of float time between the deposit of the check and the check clearing the bank.", "cmt_tr": "Çek takası, çekin yatırılması ile bankadan tahsil edilmesi arasındaki boşluk süresini istismar eder. Bir zamanlar boşluk süreleri 2 ile 10 gün arasında değişiyordu. Günümüz teknolojisi boşluk sürelerini büyük ölçüde azaltmıştır.", "cmt_en": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank. At one time, float times ranged from 2 days to 10 days. Current technology has resulted in drastically reduced float times."}, {"tr": "Ağ bilgisayar sistemlerinin potansiyel hacklenme yoluyla kolaylaştırılan elektronik yöntemlerle gerçekleştirilir.", "en": "Is by electronic means facilitated by the potential hacking of networked computer systems.", "cmt_tr": "Elektronik fon transferi ve diğer ağ bilgisayar güvenlik önlemlerinin yaygın kullanımı elektronik çek takasını zorlaştırmaktadır.", "cmt_en": "The widespread use of electronic funds transfer and other networked computer safeguards make electronic kiting difficult."}, {"tr": "Herhangi bir sayıda bankadaki hesaplar arasında döngüsel olarak devam edebilir.", "en": "Can proceed in a circle of accounts at any number of banks.", "cmt_tr": "Çek takası planı en az iki hesap gerektirir ve genellikle birden fazla bankada birkaç hesabı içerir. Var olmayan nakit sürekli döngüsel olarak bir bankadan diğerine aktarılır. Fail, birinci bankadan karşılıksız çek yazıp ikinci bankaya yatırır.", "cmt_en": "A check kiting scheme requires two accounts and usually involves several accounts at several banks. The nonexistent cash is constantly moved from one bank to another, rotating in a circular fashion. Check kiting exploits the delay between depositing a check in one bank account and clearing the check through the bank on which it was drawn. The kiter writes an insufficient funds check payable by the first bank and deposits the check in a second bank. The second bank immediately credits the account for some or all of the amount of the check, enabling the kiter to write other checks or withdraw cash on the nonexistent balance."}], "answer": 3}, {"q_tr": "Varlık zimmeti en çok kim tarafından işlenir?", "q_en": "Misappropriation of assets is most often perpetrated by", "options": [{"tr": "Çalışanlar.", "en": "Employees.", "cmt_tr": "Varlıklar üzerinde güvene dayalı sorumlulukları olan çalışanların onları çalma olasılığı en yüksektir.", "cmt_en": "Employees who have fiduciary responsibilities for assets are most likely to steal them."}, {"tr": "Müşteriler.", "en": "Customers.", "cmt_tr": "Müşteriler varlık zimmeti yapabilir, ancak işletmelerin çoğu çalışanlar tarafından zimmete karşı daha savunmasızdır.", "cmt_en": "Customers may misappropriate assets, but most businesses are more vulnerable to misappropriation by employees."}, {"tr": "Tedarikçiler.", "en": "Suppliers.", "cmt_tr": "Tedarikçiler varlık zimmeti yapabilir, ancak işletmelerin çoğu çalışanlar tarafından zimmete karşı daha savunmasızdır.", "cmt_en": "Suppliers may misappropriate assets, but most businesses are more vulnerable to misappropriation by employees."}, {"tr": "Denetçiler.", "en": "Auditors.", "cmt_tr": "Bağımsız denetçilerin varlık zimmeti fırsatı veya güdüsü azdır.", "cmt_en": "Independent auditors have little opportunity or motive to misappropriate assets."}], "answer": 0}, {"q_tr": "Ülkenin seyrek nüfuslu bir bölgesinde bulunan bir üretim kuruluşu, iş akışını optimize etmek için hammadde envanter deposunun kapılarını mesai saatlerinde açık bırakma politikası uygulamaktadır. Kontrolör bazı hammadde envanterinin eksik olduğunu fark etmiştir. Hile Üçgeni modelini kullanarak kontrolör, kuruluşun politikasının hile riskini büyük olasılıkla şu şekilde artırdığını belirlemiştir:", "q_en": "A manufacturing entity, located in a sparsely populated region of the country, has a policy of leaving its raw material inventory warehouse doors open during normal business hours to optimize workflow. The controller for the entity has just noticed that some raw material inventory is missing. Using the Fraud Triangle model, the controller has determined that the entity’s policy most likely increases the risk of fraud by", "options": [{"tr": "Çalışanları hile yapmaya teşvik ederek.", "en": "Incentivizing employees to commit the fraud.", "cmt_tr": "Çalışanlar, hırsızlık yoluyla çözülebilecek bir finansal ihtiyaç yaşayarak hile yapmaya teşvik edilir.", "cmt_en": "Employees would be incentivized to commit fraud by experiencing a financial need that could be solved through theft."}, {"tr": "Hileli faaliyetin meşrulaştırılma kolaylığını artırarak.", "en": "Increasing the ease of rationalization of the fraudulent activity.", "cmt_tr": "Meşrulaştırma, kişinin eylemlerini kendi kişisel etik kurallarıyla tutarlı olarak haklı çıkarma yeteneğidir. Açık depodan etkilenmez.", "cmt_en": "Rationalization is a person’s ability to justify actions as consistent with his or her personal code of ethics. It is not affected by an open warehouse."}, {"tr": "Çalışanların finansal ihtiyaç algılamasına yardımcı olarak.", "en": "Assisting employees to perceive a financial need.", "cmt_tr": "Depo kapılarını açık bırakmak çalışanların finansal ihtiyaç algılamasına yardımcı olmaz.", "cmt_en": "Leaving the warehouse doors open would not help employees in perceiving their financial need."}, {"tr": "Hile işleme fırsatını artırarak.", "en": "Increasing the opportunity to commit the fraud.", "cmt_tr": "Hile Üçgeni'nin üç unsuru baskı, fırsat ve meşrulaştırmadır. Fırsat, kişinin hileyi yalnızca işleme değil gizleme yeteneğidir ve denetim eksikliği, yetersiz iç kontroller veya kontrollerin uygulanmaması ile yaratılır. Depo kapılarını açık bırakmak, hile fırsatını artıran yetersiz bir iç kontroldür.", "cmt_en": "The three elements of the Fraud Triangle are pressure, opportunity, and rationalization. Opportunity is the ability of a person not only to perpetrate but also to conceal fraud and is created by an absence of oversight, inadequate internal controls, or the lack of enforcement of controls. Leaving the warehouse doors open represents an inadequate internal control that increases the opportunity to commit fraud."}], "answer": 3}, {"q_tr": "İç kontrollerle azaltılabilecek hile risk faktörü hangisidir?", "q_en": "The fraud risk factor that may be mitigated by internal controls is", "options": [{"tr": "Meşrulaştırma.", "en": "Rationalization.", "cmt_tr": "Meşrulaştırma, potansiyel bir hile failinin zihinsel durumu olduğu için kontrollerden etkilenmez.", "cmt_en": "Rationalization cannot be affected by controls because it is a mental state of a potential perpetrator of a fraud."}, {"tr": "Güdü.", "en": "Motive.", "cmt_tr": "Meşrulaştırma gibi güdü de kontrollerle azaltılamayan bir zihinsel durumdur.", "cmt_en": "Like rationalization, motive is a mental state that cannot be mitigated by controls."}, {"tr": "Baskı.", "en": "Pressure.", "cmt_tr": "Baskı güdüyle ilgilidir ve kontrollerle azaltılamaz.", "cmt_en": "Pressure relates to motive and cannot be mitigated by controls."}, {"tr": "Fırsat.", "en": "Opportunity.", "cmt_tr": "Bireylerin hile işleme fırsatı uygun kontrollerle azaltılabilir. Örnekler arasında uygun denetim, görev ayrımı ve denetim sürecinin kendisi yer alır.", "cmt_en": "The opportunity for individuals to perpetrate a fraud can be mitigated by proper controls. Examples are appropriate oversight, segregation of duties, and the audit process itself."}], "answer": 3}, {"q_tr": "Bir denetçi, aşağıdaki durumlardan hangisini büyük olasılıkla hileli mali raporlamadan kaynaklanan yanlışlıklarla ilgili bir risk faktörü olarak değerlendirir?", "q_en": "Which of the following circumstances would an auditor most likely consider a risk factor relating to misstatements arising from fraudulent financial reporting?", "options": [{"tr": "Birkaç yönetim kurulu üyesi yakın zamanda kuruluşun hisse senetlerinden ek pay satın almıştır.", "en": "Several members of management have recently purchased additional shares of the entity’s stock.", "cmt_tr": "Yöneticiler rutin olarak şirketlerinin hisse senetlerini satın alır.", "cmt_en": "Managers routinely buy their company’s stock."}, {"tr": "Birkaç yönetim kurulu üyesi yakın zamanda kuruluşun hisse senetlerinden pay satmıştır.", "en": "Several members of the board of directors have recently sold shares of the entity’s stock.", "cmt_tr": "Hisse satışları yöneticilerin kuruluştaki finansal çıkarlarını azaltır.", "cmt_en": "Sales of shares reduce the directors’ financial interests in the entity."}, {"tr": "Kuruluş, tutucu işletme sonuçları öngören mali tahminleri mali analistlere dağıtmaktadır.", "en": "The entity distributes financial forecasts to financial analysts that predict conservative operating results.", "cmt_tr": "Tutucu tahminler, yönetim üzerindeki mali sonuçları manipüle etme baskısını artırmak yerine azaltır.", "cmt_en": "Conservative forecasts reduce, rather than increase, pressure on management to manipulate financial results."}, {"tr": "Yönetim, agresif muhasebe uygulamalarını kullanarak kuruluşun kâr trendini sürdürmekle ilgilenmektedir.", "en": "Management is interested in maintaining the entity’s earnings trend by using aggressive accounting practices.", "cmt_tr": "Hile risk faktörleri (1) hileli mali raporlama ve (2) varlık zimmetinden kaynaklanan yanlışlıklarla ilgilidir. Her kategori, hilenin gerçekleştiği üç koşula göre sınıflandırılabilir: (1) teşvikler veya baskılar, (2) fırsatlar ve (3) tutumlar veya meşrulaştırmalar. Örneğin, kârlılık veya trendlere ilişkin üçüncü tarafların beklentilerini karşılamak için aşırı baskı olabilir.", "cmt_en": "Fraud risk factors relate to misstatements arising from (1) fraudulent financial reporting and (2) misappropriation of assets. Each of these categories may be further classified according to the three conditions that ordinarily exist when fraud occurs: (1) incentives or pressures, (2) opportunities, and (3) attitudes or rationalizations. For example, excessive pressure may exist to meet the expectations of third parties (e.g., analysts, investors, and creditors) regarding profitability or trends."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi hileli bir faaliyet olarak kabul edilir?", "q_en": "Which of the following is considered a fraudulent activity?", "options": [{"tr": "Mali tabloların hazırlanmasında muhasebe verilerinin toplanması veya işlenmesinde yapılan bir hata.", "en": "A mistake in gathering or processing accounting data from which financial statements are prepared.", "cmt_tr": "Bir hata kasıtlı değildir.", "cmt_en": "A mistake is not intentional."}, {"tr": "Gözetim veya olguların yanlış yorumlanmasından kaynaklanan hatalı bir muhasebe tahmini.", "en": "An incorrect accounting estimate arising from oversight or misinterpretation of facts.", "cmt_tr": "Kasıtlı olmayan hatalı bir muhasebe tahmini hile değildir.", "cmt_en": "An unintentionally incorrect accounting estimate is not fraud."}, {"tr": "Varlıkların zimmete geçirilmesi.", "en": "Misappropriation of assets.", "cmt_tr": "Hile, aldatma kullanımını içeren ve mali tabloların yanlış beyanına yol açan kasıtlı bir eylemdir. Denetçiyle ilgili iki hile türü: (1) hileli mali raporlamadan kaynaklanan yanlışlıklar ve (2) varlık zimmetinden kaynaklanan yanlışlıklardır.", "cmt_en": "Fraud is an intentional act involving the use of deception that results in misstatement of the financial statements. Two types of fraud that are relevant to the auditor are (1) misstatements arising from fraudulent financial reporting and (2) misstatements arising from misappropriation of assets."}, {"tr": "Muhasebe ilkelerinin tutar, sınıflandırma, sunum biçimi veya açıklama ile ilgili uygulanmasında yapılan bir hata.", "en": "A mistake in the application of accounting principles relating to amount, classification, manner of presentation, or disclosure.", "cmt_tr": "Hile kasıtlıdır. Hatalar kasıtlı değildir.", "cmt_en": "Fraud is intentional. Mistakes are not. Fact Pattern: Management discovers that a supervisor at one of its restaurant locations removes excess cash and resets sales totals throughout the day on the point-of-sale (POS) system. At closing, the supervisor deposits cash equal to the recorded sales on the POS system and keeps the rest. The supervisor forwards the close-of-day POS reports from the POS system along with a copy of the bank deposit slip to the company’s revenue accounting department. The revenue accounting department records the sales and the cash for the location in the general ledger and verifies the deposit slip to the bank statement. Any differences between sales and deposits are recorded in an over/short account and, if necessary, followed up with the location supervisor. The customer food order checks are serially numbered, and it is the supervisor’s responsibility to see that they are accounted for at the end of each day. Customer checks and the transaction journal tapes from the POS system are kept by the supervisor for 1 week at the location and then destroyed."}], "answer": 2}, {"q_tr": "Aşağıdaki kontrollerden hangisi hilenin gerçekleşmesine olanak tanımıştır?", "q_en": "Which of the following controls allowed the fraud to occur?", "options": [{"tr": "Müşteri yemek çeklerinin süpervizör tarafından muhasebeleştirilmesi.", "en": "The accounting for customer food checks by the supervisor.", "cmt_tr": "Süpervizörün müşteri yemek çeklerini muhasebeleştirmesi, tahsilatları yatırması ve gün boyunca POS toplamlarını sıfırlama yeteneğine sahip olması nedeniyle uygunsuz bir görev ayrımı mevcuttu.", "cmt_en": "An inappropriate segregation of duties existed because the supervisor was responsible for accounting for customer food checks and depositing receipts and had the ability to reset POS totals throughout the day."}, {"tr": "Nakit tahsilatların süpervizör tarafından yatırılması.", "en": "The deposit of cash receipts by the supervisor.", "cmt_tr": "Tahsilatların süpervizör tarafından yatırılması sorun değildir. Süpervizörün nakde erişimi ve gün boyunca POS toplamlarını sıfırlama yeteneği hileye olanak tanımıştır.", "cmt_en": "The depositing of receipts by the supervisor is not the problem. The supervisor’s access to cash and ability to reset POS totals throughout the day allowed the fraud."}, {"tr": "Gelir muhasebesi tarafından banka mevduat makbuzlarının banka hesap özetleriyle eşleştirilmesi.", "en": "The matching of the bank deposit slips to the bank statement by revenue accounting.", "cmt_tr": "Süpervizör tarafından yapılan mevduatların bağımsız doğrulaması uygundur.", "cmt_en": "An independent verification of the deposits made by the supervisor is appropriate."}, {"tr": "Gün sonu POS raporlarının gelir muhasebesine iletilmesi.", "en": "The forwarding of the close-of-day POS reports to revenue accounting.", "cmt_tr": "Gün sonu POS raporlarının gelir muhasebesine iletilmesi, satışların bağımsız doğrulama sürecindeki bir adımdır.", "cmt_en": "The forwarding of the close-of-day POS reports to revenue accounting is a step in the process of independently verifying sales. Fact Pattern: Management discovers that a supervisor at one of its restaurant locations removes excess cash and resets sales totals throughout the day on the point-of-sale (POS) system. At closing, the supervisor deposits cash equal to the recorded sales on the POS system and keeps the rest. The supervisor forwards the close-of-day POS reports from the POS system along with a copy of the bank deposit slip to the company’s revenue accounting department. The revenue accounting department records the sales and the cash for the location in the general ledger and verifies the deposit slip to the bank statement. Any differences between sales and deposits are recorded in an over/short account and, if necessary, followed up with the location supervisor. The customer food order checks are serially numbered, and it is the supervisor’s responsibility to see that they are accounted for at the end of each day. Customer checks and the transaction journal tapes from the POS system are kept by the supervisor for 1 week at the location and then destroyed."}], "answer": 0}, {"q_tr": "Aşağıdaki denetim prosedürlerinden hangisi hileyi tespit etmiş olurdu?", "q_en": "Which of the following audit procedures would have detected the fraud?", "options": [{"tr": "Banka mevduat doğrulaması üzerindeki kontrollerin akış şemasının çıkarılması.", "en": "Flowcharting the controls over the verification of bank deposits.", "cmt_tr": "Hile mevduatları değil tahsilatları içeriyordu.", "cmt_en": "The fraud involved receipts, not deposits."}, {"tr": "Gün sonu POS raporlarının bir örnekleminin banka mevduat makbuzlarının kopyalarıyla karşılaştırılması.", "en": "Comparing a sample of the close-of-day POS reports to copies of the bank deposit slips.", "cmt_tr": "Hile, gün boyunca POS sistem toplamlarını sıfırlayarak gün sonu POS raporlarındaki tutarları değiştirmeyi içeriyordu.", "cmt_en": "The fraud involved altering the amounts on the close-of-day POS reports by resetting the POS system totals to zero."}, {"tr": "Test bazında seri numaralı müşteri yemek çeklerinin hesabının yapılıp yapılmadığının doğrulanması.", "en": "On a test basis, verifying that the serial-numbered customer food checks are accounted for.", "cmt_tr": "Bireysel müşteri yemek çeklerinin muhasebeleştirilmesi hileyi tespit etmezdi. Hile bu belgelerin manipülasyonunu içermiyordu.", "cmt_en": "The accounting for individual customer food checks would not have detected the fraud. It did not involve manipulat
