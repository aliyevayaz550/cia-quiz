 appetite for fraud risk.", "en": "Internal auditors set the appropriate tone at the top and the appetite for fraud risk.", "cmt_tr": "The board sets the appropriate tone at the top and the appetite for fraud risk.", "cmt_en": "The board sets the appropriate tone at the top and the appetite for fraud risk."}, {"tr": "Internal auditors design and implement communication channels that provide management with information on the reliability of controls.", "en": "Internal auditors design and implement communication channels that provide management with information on the reliability of controls.", "cmt_tr": "Management, not internal auditors, are responsible for designing and implementing communication channels that provide management with information on the reliability of controls.", "cmt_en": "Management, not internal auditors, are responsible for designing and implementing communication channels that provide management with information on the reliability of controls."}, {"tr": "Internal auditors are responsible for designing and implementing fraud prevention controls.", "en": "Internal auditors are responsible for designing and implementing fraud prevention controls.", "cmt_tr": "Internal auditors are not responsible for designing and implementing fraud prevention controls. Management is primarily responsible for establishing and maintaining controls.", "cmt_en": "Internal auditors are not responsible for designing and implementing fraud prevention controls. Management is primarily responsible for establishing and maintaining controls."}, {"tr": "Internal auditors are responsible for assisting in the deterrence of fraud by examining and evaluating the adequacy of controls.", "en": "Internal auditors are responsible for assisting in the deterrence of fraud by examining and evaluating the adequacy of controls.", "cmt_tr": "Controls are the principal means of preventing fraud. The internal audit function assists the organization in maintaining effective controls (e.g., to prevent or detect fraud) by evaluating their effectiveness and efficiency and by promoting continuous improvement. Moreover, internal auditors should determine whether communication channels provide management with reliable information about the effectiveness of controls and the occurrence of unusual transactions. Fact Pattern: During an engagement performed at a smaller division, the internal auditor notes the following regarding the purchasing function: • There are three purchasing agents. Agent 1 is responsible for ordering all large component parts, agent 2 for electric motors, and agent 3 for smaller parts such as fasteners. • There are separate accounts payable and receiving departments. • In order to hold vendors more responsible, all invoices are sent to the purchasing agent placing the order. The purchasing agent matches the vendor invoice, receiving slip, and Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls purchase order. If all match, the purchasing agent sends the documents forward to the accounts payable department. Differences are investigated by the purchasing agent. • Only the accounts payable department has the ability to authorize an item for payment. • All recorded receipts are immediately recorded into a perpetual inventory record by the department to which the goods are transferred after receipt. • The internal auditor interviewed both management and the purchasing agents. Both groups were very satisfied with the current system because it helps maintain vendor accountability and provides sufficient segregation of duties given that only the accounts payable department can authorize an item for payment.", "cmt_en": "Controls are the principal means of preventing fraud. The internal audit function assists the organization in maintaining effective controls (e.g., to prevent or detect fraud) by evaluating their effectiveness and efficiency and by promoting continuous improvement. Moreover, internal auditors should determine whether communication channels provide management with reliable information about the effectiveness of controls and the occurrence of unusual transactions. Fact Pattern: During an engagement performed at a smaller division, the internal auditor notes the following regarding the purchasing function: • There are three purchasing agents. Agent 1 is responsible for ordering all large component parts, agent 2 for electric motors, and agent 3 for smaller parts such as fasteners. • There are separate accounts payable and receiving departments. • In order to hold vendors more responsible, all invoices are sent to the purchasing agent placing the order. The purchasing agent matches the vendor invoice, receiving slip, and Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls purchase order. If all match, the purchasing agent sends the documents forward to the accounts payable department. Differences are investigated by the purchasing agent. • Only the accounts payable department has the ability to authorize an item for payment. • All recorded receipts are immediately recorded into a perpetual inventory record by the department to which the goods are transferred after receipt. • The internal auditor interviewed both management and the purchasing agents. Both groups were very satisfied with the current system because it helps maintain vendor accountability and provides sufficient segregation of duties given that only the accounts payable department can authorize an item for payment."}], "answer": 3}, {"q_tr": "The internal auditor is responsible for evaluating internal control to determine whether it allows undetected fraud. Based on the information presented, the most likely undetected fraud, if any, is that the", "q_en": "The internal auditor is responsible for evaluating internal control to determine whether it allows undetected fraud. Based on the information presented, the most likely undetected fraud, if any, is that the", "options": [{"tr": "Purchasing agent is purchasing the majority of products from a favorite vendor because rotation among purchasing agents is not mandatory.", "en": "Purchasing agent is purchasing the majority of products from a favorite vendor because rotation among purchasing agents is not mandatory.", "cmt_tr": "Purchasing most goods from a particular vendor may be justified.", "cmt_en": "Purchasing most goods from a particular vendor may be justified."}, {"tr": "Purchasing agent is sending fake purchase orders to a dummy vendor, inserting a receiving slip, and having payments made to the dummy vendor.", "en": "Purchasing agent is sending fake purchase orders to a dummy vendor, inserting a receiving slip, and having payments made to the dummy vendor.", "cmt_tr": "Internal control is unlikely to detect the purchasing agent’s fraud because this individual is in a position to perpetrate and conceal irregularities. Receiving documents and vendors’ invoices should be sent to accounts payable, not to the purchasing agent.", "cmt_en": "Internal control is unlikely to detect the purchasing agent’s fraud because this individual is in a position to perpetrate and conceal irregularities. Receiving documents and vendors’ invoices should be sent to accounts payable, not to the purchasing agent."}, {"tr": "Receiving department is diverting receipts to different locations and failing to create receiving reports.", "en": "Receiving department is diverting receipts to different locations and failing to create receiving reports.", "cmt_tr": "This possible fraud should be detected by the absence of receiving reports to support vendors’ invoices.", "cmt_en": "This possible fraud should be detected by the absence of receiving reports to support vendors’ invoices."}, {"tr": "Production department is deflating the price of products purchased and thereby increasing the reported gross margin of sales.", "en": "Production department is deflating the price of products purchased and thereby increasing the reported gross margin of sales.", "cmt_tr": "This response is unrelated to the purchasing environment.", "cmt_en": "This response is unrelated to the purchasing environment."}], "answer": 1}, {"q_tr": "Which of the following is a responsibility of internal auditors regarding fraud prevention, deterrence, and detection?", "q_en": "Which of the following is a responsibility of internal auditors regarding fraud prevention, deterrence, and detection?", "options": [{"tr": "Develop an approach the organization can use to sustain antibribery principles in every country in which the organization operates.", "en": "Develop an approach the organization can use to sustain antibribery principles in every country in which the organization operates.", "cmt_tr": "Management, not the internal auditors, is responsible for establishing and maintaining effective Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls controls to deter and prevent fraud. Translating the organization’s corruption prevention principles across operations is a management responsibility.", "cmt_en": "Management, not the internal auditors, is responsible for establishing and maintaining effective Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls controls to deter and prevent fraud. Translating the organization’s corruption prevention principles across operations is a management responsibility."}, {"tr": "Implement an effective system of internal controls.", "en": "Implement an effective system of internal controls.", "cmt_tr": "Internal auditors are responsible for supporting audit committee oversight in ensuring management has implemented effective internal controls regarding fraud prevention. Management, not the internal auditor, is responsible for implementing internal controls.", "cmt_en": "Internal auditors are responsible for supporting audit committee oversight in ensuring management has implemented effective internal controls regarding fraud prevention. Management, not the internal auditor, is responsible for implementing internal  the purchasing agent. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls • Only the accounts payable department has the ability to authorize an item for payment. • All recorded receipts are immediately recorded into a perpetual inventory record by the department to which the goods are transferred after receipt. The internal auditor interviewed both management and the purchasing agents. Both groups were very satisfied with the current system because it helps maintain vendor accountability and provides sufficient segregation of duties given that only the accounts payable department can authorize an item for payment.", "cmt_en": "The primary purpose of operating a fraud hotline is not to measure how well organizational units are achieving the organization’s goals. Fact Pattern: During an engagement performed at a smaller division, the internal auditor notes the following regarding the purchasing function: • There are three purchasing agents. Agent 1 is responsible for ordering all large component parts, agent 2 for electric motors, and agent 3 for smaller parts such as fasteners. • There are separate accounts payable and receiving departments. • In order to hold vendors more responsible, all invoices are sent to the purchasing agent placing the order. The purchasing agent matches the vendor invoice, receiving slip, and purchase order. If all match, the purchasing agent sends the documents forward to the accounts payable department. Differences are investigated by the purchasing agent. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls • Only the accounts payable department has the ability to authorize an item for payment. • All recorded receipts are immediately recorded into a perpetual inventory record by the department to which the goods are transferred after receipt. The internal auditor interviewed both management and the purchasing agents. Both groups were very satisfied with the current system because it helps maintain vendor accountability and provides sufficient segregation of duties given that only the accounts payable department can authorize an item for payment."}], "answer": 2}, {"q_tr": "Which of the following controls, if properly implemented, is most likely to decrease the likelihood of fraud?", "q_en": "Which of the following controls, if properly implemented, is most likely to decrease the likelihood of fraud?", "options": [{"tr": "Require periodic rotation of purchases among different vendors.", "en": "Require periodic rotation of purchases among different vendors.", "cmt_tr": "Rotation of vendors might partially alleviate the problem, but the purchasing agent could develop new dummy vendors.", "cmt_en": "Rotation of vendors might partially alleviate the problem, but the purchasing agent could develop new dummy vendors."}, {"tr": "Require rotation of duties among the three purchasing agents.", "en": "Require rotation of duties among the three purchasing agents.", "cmt_tr": "Rotation of duties will not affect the type of fraud that could occur in this environment. The purchasing agent could develop another dummy vendor for the new product line.", "cmt_en": "Rotation of duties will not affect the type of fraud that could occur in this environment. The purchasing agent could develop another dummy vendor for the new product line."}, {"tr": "Require that receiving reports be sent directly to accounts payable.", "en": "Require that receiving reports be sent directly to accounts payable.", "cmt_tr": "This change in procedures prevents the purchasing agent from falsifying receiving reports. An even better procedure is to have both the receiving reports and the vendors’ invoices sent to accounts payable.", "cmt_en": "This change in procedures prevents the purchasing agent from falsifying receiving reports. An even better procedure is to have both the receiving reports and the vendors’ invoices sent to accounts payable."}, {"tr": "Require that the updates to the perpetual inventory record be made by the receiving department.", "en": "Require that the updates to the perpetual inventory record be made by the receiving department.", "cmt_tr": "This procedure will create an additional opportunity for fraud by the receiving department.", "cmt_en": "This procedure will create an additional opportunity for fraud by the receiving department."}], "answer": 2}, {"q_tr": "Which of the following statements is (are) true regarding the prevention of fraud?", "q_en": "Which of the following statements is (are) true regarding the prevention of fraud?", "options": [{"tr": "Only management is responsible for the prevention and detection of fraud.", "en": "Only management is responsible for the prevention and detection of fraud.", "cmt_tr": "Management is primarily responsible for the prevention and detection of fraud, but the board and internal auditors also have roles in the prevention and detection of fraud.", "cmt_en": "Management is primarily responsible for the prevention and detection of fraud, but the board and internal auditors also have roles in the prevention and detection of fraud."}, {"tr": "Internal auditors implement the controls designed to prevent and detect fraud.", "en": "Internal auditors implement the controls designed to prevent and detect fraud.", "cmt_tr": "Internal auditors do not implement the controls designed to prevent and detect fraud. That is management’s responsibility.", "cmt_en": "Internal auditors do not implement the controls designed to prevent and detect fraud. That is management’s responsibility."}, {"tr": "Effective internal controls can eliminate the probability of fraud.", "en": "Effective internal controls can eliminate the probability of fraud.", "cmt_tr": "Internal controls cannot eliminate the probability of fraud. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_en": "Internal controls cannot eliminate the probability of fraud. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls"}, {"tr": "The primary means of preventi ck (authorization of the transaction) should be segregated."}], "answer": 0}, {"q_tr": "An internal auditor’s fraud risk assessment is most likely to determine that which of the following is an inappropriate practice in the purchase function?", "q_en": "An internal auditor’s fraud risk assessment is most likely to determine that which of the following is an inappropriate practice in the purchase function?", "options": [{"tr": "An accounts payable authorized signature list is prepared.", "en": "An accounts payable authorized signature list is prepared.", "cmt_tr": "An accounts payable signature authorization list should be prepared showing the signatures for authorized individuals who may initiate and approve purchase orders.", "cmt_en": "An accounts payable signature authorization list should be prepared showing the signatures for authorized individuals who may initiate and approve purchase orders."}, {"tr": "Purchases are made only from approved vendors.", "en": "Purchases are made only from approved vendors.", "cmt_tr": "Purchases should only be transacted with approved vendors or evidenced by approved contracts.", "cmt_en": "Purchases should only be transacted with approved vendors or evidenced by approved contracts."}, {"tr": "The receiving department uses an approved order for goods stating the amount ordered.", "en": "The receiving department uses an approved order for goods stating the amount ordered.", "cmt_tr": "The receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items. Receiving’s copy of the purchase order omits the quantity so that employees must count the goods to determine the amount to record on the receiving report.", "cmt_en": "The receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items. Receiving’s copy of the purchase order omits the quantity so that employees must count the goods to determine the amount to reco n of documentation.", "cmt_tr": "Falsification of documentation is a means of concealing fraud, not a fraud risk required to be identified.", "cmt_en": "Falsification of documentation is a means of concealing fraud, not a fraud risk required to be identified."}], "answer": 0}], "SU3 - Fraud: Investigation": [{"q_tr": "Which of the following gives the internal auditor the authority to investigate fraud?", "q_en": "Which of the following gives the internal auditor the authority to investigate fraud?", "options": [{"tr": "The Global Internal Audit Standards.", "en": "The Global Internal Audit Standards.", "cmt_tr": "The internal auditor has authority only to recommend an investigation.", "cmt_en": "The internal auditor has authority only to recommend an investigation."}, {"tr": "Common law.", "en": "Common law.", "cmt_tr": "An internal auditor has no authority under common law.", "cmt_en": "An internal auditor has no authority under common law."}, {"tr": "Management.", "en": "Management.", "cmt_tr": "Any fraud investigation undertaken by internal auditors must be authorized by management.", "cmt_en": "Any fraud investigation undertaken by internal auditors must be authorized by management."}, {"tr": "The internal audit mandate.", "en": "The internal audit mandate.", "cmt_tr": "The internal auditor has authority only to recommend an investigation.", "cmt_en": "The internal auditor has authority only to recommend an investigation."}], "answer": 2}, {"q_tr": "Questions used to interrogate individuals suspected of fraud should", "q_en": "Questions used to interrogate individuals suspected of fraud should", "options": [{"tr": "Adhere to a predetermined order.", "en": "Adhere to a predetermined order.", "cmt_tr": "The interviewee’s answer may suggest a follow-up question that should be asked before asking the next planned question.", "cmt_en": "The interviewee’s answer may suggest a follow-up question that should be asked before asking the next planned question."}, {"tr": "Cover more than one subject or topic.", "en": "Cover more than one subject or topic.", "cmt_tr": "This interviewing technique may be confusing for the respondent.", "cmt_en": "This interviewing technique may be confusing for the respondent."}, {"tr": "Move from the general to the specific.", "en": "Move from the general to the specific.", "cmt_tr": "Internal auditors should be skilled in dealing with people and in communicating effectively. One important communications skill is the ability to conduct an effective interview. For example, initial questions in a fraud interview should be broad. In contrast with a directive approach emphasizing narrowly focused questions, this nondirective approach is more likely to elicit clarifications and unexpected observations from employees who are under suspicion.", "cmt_en": "Internal auditors should be skilled in dealing with people and in communicating effectively. One important communications skill is the ability to conduct an effective interview. For example, initial questions in a fraud interview should be broad. In contrast with a directive approach emphasizing narrowly focused questions, this nondirective approach is more likely to elicit clarifications and unexpected observations from employees who are under suspicion."}, {"tr": "Direct the individual to a desired answer.", "en": "Direct the individual to a desired answer.", "cmt_tr": "The interrogator should avoid leading questions, that is, questions that suggest an answer. Study Unit 10: Fraud Risks | Subunit 3: Fraud -- Investigation", "cmt_en": "The interrogator should avoid leading questions, that is, questions that suggest an answer. Study Unit 10: Fraud Risks | Subunit 3: Fraud -- Investigation"}], "answer": 2}, {"q_tr": "After completing an investigation, internal auditing has concluded that an employee has stolen a significant amount of cash receipts. A draft of the proposed communication on this observation should be submitted for review to", "q_en": "After com ounting facts gathered through auditing procedures to legal problems. Thus, forensic auditing focuses heavily on legal issues.", "cmt_en": "Forensic auditing applies accounting facts gathered through auditing procedures to legal problems. Thus, forensic auditing focuses heavily on legal issues."}, {"tr": "Places less emphasis on communication skills.", "en": "Places less emphasis on communication skills.", "cmt_tr": "Although both forensic and internal auditing require written and oral communication skills, these skills are more critical in forensic auditing.", "cmt_en": "Although both forensic and internal auditing require written and oral communication skills, these skills are more critical in forensic auditing."}], "answer": 0}, {"q_tr": "Prior to issuing a final communication on a fraud investigation, the internal auditor should submit a proposed draft for review by the", "q_en": "Prior to issuing a final communication on a fraud investigation, the internal auditor should submit a proposed draft for review by the", "options": [{"tr": "Organization’s legal counsel.", "en": "Organization’s legal counsel.", "cmt_tr": "A draft of the proposed final communications on fraud should be submitted to legal counsel for review. When the internal auditor wants to invoke client privilege, consideration should be given to addressing the report to legal counsel.", "cmt_en": "A draft of the proposed final communications on fraud should be submitted to legal counsel for review. When the internal auditor wants to invoke client privilege, consideration should be given to addressing the report to legal counsel."}, {"tr": "Engagement client’s management.", "en": "Engagement client’s management.", "cmt_tr": "An identifiable auditee does not always exist, and review by such auditee is not always appropriate. Study Unit 10: Fraud Risks | Subunit 3: Fraud -- Investigation", "cmt_en": "An identifiable auditee does not always exist, and review by such auditee is not always appropriate. Stu   const qs = QUIZ[SHEETS[ci]];

  let c=0, t=0;

    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  // Skip chapters with 0 questions (can happen in mistakes modes)
  while (ci < SHEETS.length && QUIZ[SHEETS[ci]].length === 0) { ci++; }
  if (ci >= SHEETS.length) { showOverall(); return; }
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  if (!qs || qs.length === 0 || curQ >= qs.length) { showChapterSummary(); return; }
  const q    = qs[curQ];
  if (!q) { showChapterSummary(); return; }
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  // Save history entry when quiz is fully completed
  if (!MISTAKES_MODE && !HISTORY_MISTAKES_MODE) {
    saveHistory();
  }

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang==="tr" ? "en" : "tr";
  document.getElementById("lang-btn").textContent = lang==="tr" ? "EN" : "TR";
  if(!quizStarted) {
    document.getElementById("welcome-desc").textContent =
      lang==="tr"
        ? "3 mövzu, 111 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar"
        : "3 topics, 111 questions — TR/EN bilingual support with explanations";
    return;
  }
  updateProgress();
  // Re-render current question without resetting state
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}


// ── MISTAKES MODE ─────────────────────────────────────────────────────────────
const MISTAKES_MODE = new URLSearchParams(window.location.search).get('mode') === 'mistakes';

if (MISTAKES_MODE) {
  (function() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) { window.location.href = window.location.pathname; return; }
      const data = JSON.parse(raw);
      const sa = data.answered || [];
      const sc = data.correctArr || [];

      // Filter QUIZ to only incorrectly answered questions
      let offset = 0;
      let totalMistakes = 0;
      SHEETS.forEach(sname => {
        const orig = QUIZ[sname];
        const keep = [];
        for (let i = 0; i < orig.length; i++) {
          if (sa[offset + i] && !sc[offset + i]) {
            orig[i]._chosen = undefined;
            keep.push(orig[i]);
          }
        }
        offset += orig.length;
        QUIZ[sname] = keep;
        totalMistakes += keep.length;
      });

      if (totalMistakes === 0) { window.location.href = window.location.pathname; return; }

      // Don't overwrite original progress
      saveProgress = function() {};
      clearProgress = function() {};

      // Update UI for mistakes mode
      const appTitle = document.getElementById("app-title");
      if (appTitle) appTitle.textContent += " — Səhvlər";

      const welc = document.getElementById("welcome");
      if (welc) {
        const h1 = welc.querySelector("h1");
        if (h1) h1.innerHTML = `Səhv Suallar<br><span style="color:var(--gold);font-size:.65em">${appTitle ? appTitle.textContent : ''}</span>`;
        const desc = document.getElementById("welcome-desc");
        if (desc) desc.textContent = totalMistakes + (lang === "tr" ? " səhv sual — yenidən işlə" : " wrong answers — retry them");
        // Update stats
        const statsItems = welc.querySelectorAll(".ws-num");
        if (statsItems.length >= 2) {
          statsItems[0].textContent = SHEETS.filter(s => QUIZ[s].length > 0).length;
          statsItems[1].textContent = totalMistakes;
          if (statsItems[2]) statsItems[2].textContent = totalMistakes * 4;
        }
        // Change buttons
        const mainBtn = document.getElementById("btn-main-start");
        if (mainBtn) mainBtn.textContent = lang === "tr" ? "▶ Səhvləri İşlə" : "▶ Retry Mistakes";
        const freshBtn = document.getElementById("btn-fresh-start");
        if (freshBtn) freshBtn.style.display = "none";
      }

      // Override startOrResume to skip loading saved progress (we already filtered)
      const _origStartOrResume = startOrResume;
      startOrResume = function() {
        initState();
        quizStarted = true;
        document.getElementById("welcome").style.display = "none";
        document.getElementById("chapters-scroll").style.display = "";
        document.getElementById("overall-result").className = "";
        buildChapterTabs();
        goToChapter(0);
      };

      // Override goToMenu to go back without ?mode
      goToMenu = function() { window.location.href = "quiz_menu.html"; };

    } catch(e) { console.error("Mistakes mode error:", e); }
  })();
}


// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
  // Render history on welcome screen
  renderHistory();
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
// ── HISTORY SYSTEM ──────────────────────────────────────────────────────────
function saveHistory() {
  try {
    const tc = totalCorrect();
    const ta = totalAnswered();
    const tq = totalQuestions();
    const pct = tq ? Math.round(tc/tq*100) : 0;

    const chapters = SHEETS.map((sname, ci) => {
      const s = getChapterStats(ci);
      return { name: sname, correct: s.c, wrong: s.t - s.c, total: s.total };
    });

    const mistakeIndices = [];
    for (let i = 0; i < answered.length; i++) {
      if (answered[i] && !correctArr[i]) mistakeIndices.push(i);
    }

    const entry = {
      date: new Date().toISOString(),
      correct: tc,
      wrong: ta - tc,
      total: tq,
      pct: pct,
      chapters: chapters,
      mistakeIndices: mistakeIndices
    };

    let history = [];
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) history = JSON.parse(raw);
    } catch(e) {}

    history.unshift(entry);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) { console.error("saveHistory error:", e); }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function renderHistory() {
  const area = document.getElementById("history-area");
  if (!area) return;
  const history = loadHistory();
  if (history.length === 0) { area.innerHTML = ""; return; }

  const circ = 2 * Math.PI * 18;
  const titleText = lang === "tr" ? "Tarixçə" : "History";

  let html = `<div class="history-title">${titleText}</div>`;

  history.forEach((entry, idx) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(lang === "tr" ? "az-AZ" : "en-US", {
      day: "numeric", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    const fill = circ * (1 - entry.pct / 100);
    const ringColor = entry.pct >= 75 ? "var(--correct)" : entry.pct >= 50 ? "var(--gold)" : "var(--wrong)";
    const hasMistakes = entry.mistakeIndices && entry.mistakeIndices.length > 0;
    const mistakeCount = hasMistakes ? entry.mistakeIndices.length : 0;
    const retryLabel = lang === "tr"
      ? `${mistakeCount} səhv — təkrarla`
      : `${mistakeCount} wrong — retry`;

    html += `
      <div class="history-card">
        <div class="hc-ring">
          <svg viewBox="0 0 44 44">
            <circle class="hc-ring-track" cx="22" cy="22" r="18"/>
            <circle class="hc-ring-fill" cx="22" cy="22" r="18"
              stroke="${ringColor}"
              stroke-dasharray="${circ}" stroke-dashoffset="${fill}"/>
          </svg>
          <div class="hc-ring-label">${entry.pct}%</div>
        </div>
        <div class="hc-info">
          <div class="hc-date">${dateStr}</div>
          <div class="hc-stats">
            <span class="hc-correct">✓ ${entry.correct}</span> ·
            <span class="hc-wrong">✗ ${entry.wrong}</span> ·
            ${entry.total} ${lang === "tr" ? "sual" : "Q"}
          </div>
        </div>
        ${hasMistakes ? `<div class="hc-actions">
          <button class="hc-retry-btn" onclick="retryHistoryMistakes(${idx})">
            ${retryLabel}
          </button>
        </div>` : `<div class="hc-actions" style="font-size:11px;color:var(--correct);font-weight:700">✓ ${lang==="tr"?"Mükəmməl":"Perfect"}</div>`}
      </div>`;
  });

  area.innerHTML = html;
}

function retryHistoryMistakes(histIdx) {
  try {
    const history = loadHistory();
    if (!history[histIdx]) return;
    const entry = history[histIdx];
    const mistakeIndices = new Set(entry.mistakeIndices || []);
    if (mistakeIndices.size === 0) return;

    localStorage.setItem(HISTORY_KEY + "_retry", JSON.stringify(entry.mistakeIndices));
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    window.location.href = baseUrl + "?mode=history_mistakes";
  } catch(e) { console.error("retryHistoryMistakes error:", e); }
}

</script>
