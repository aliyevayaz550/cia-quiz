<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 10</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── HISTORY SECTION ─────────────────────────────────── */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 10</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">111 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Study Unit 10</span></h1>
    <p id="welcome-desc">3 mövzu, 111 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">3</span><span class="ws-label">Mövzu</span></div>

cess to the warehouse is a control strength.", "cmt_en": "Restricting access to the warehouse is a control strength."}, {"tr": "Truck drivers are allowed to use the trucks for personal reasons, including taking them home at night, as a benefit of employment.", "en": "Truck drivers are allowed to use the trucks for personal reasons, including taking them home at night, as a benefit of employment.", "cmt_tr": "Unrestricted access to the trucks creates opportunities for theft of merchandise by the drivers. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Unrestricted access to the trucks creates opportunities for theft of merchandise by the drivers. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}], "answer": 3}, {"q_tr": "After noting some red flags, an internal auditor has an increased awareness that fraud may be present. Which of the following best describes the internal auditor’s responsibility?", "q_en": "After noting some red flags, an internal auditor has an increased awareness that fraud may be present. Which of the following best describes the internal auditor’s responsibility?", "options": [{"tr": "Expand activities to determine whether an investigation is warranted.", "en": "Expand activities to determine whether an investigation is warranted.", "cmt_tr": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended.", "cmt_en": "An internal auditor’s responsibilities for detecting fraud include evaluating fraud indicators and deciding whether any additional action is necessary or whether an investigation should be recommended."}, {"tr": "Report the possibility of fraud to senior management and the board and ask them how they would like to proceed.", "en": "Report the possibility of fraud to senior management and the board and ask them how they would like to proceed.", "cmt_  responsible for", "q_en": "In an organization with a separate division that is primarily responsible for the prevention of fraud, the internal audit function is responsible for", "options": [{"tr": "Examining and evaluating the adequacy and effectiveness of that division’s actions taken to prevent fraud.", "en": "Examining and evaluating the adequacy and effectiveness of that division’s actions taken to prevent fraud.", "cmt_tr": "Control is the principal means of preventing fraud. Management is primarily responsible for the establishment and maintenance of control. Internal auditors must assist the organization by evaluating the effectiveness and efficiency of controls and promoting continuous improvement. Internal auditors should be alert to opportunities that could allow fraud and evaluate the indicators of fraud. For example, internal auditors can evaluate whether management is actively overseeing the fraud risk management programs.", "cmt_en": "Control is the principal means of preventing fraud. Management is primarily responsible for the establishment and maintenance of control. Internal auditors must assist the organization by evaluating the effectiveness and efficiency of controls and promoting continuous improvement. Internal auditors should be alert to opportunities that could allow fraud and evaluate the indicators of fraud. For example, internal auditors can evaluate whether management is actively overseeing the fraud risk management programs."}, {"tr": "Establishing and maintaining that division’s system of internal control.", "en": "Establishing and maintaining that division’s system of internal control.", "cmt_tr": "Establishing and maintaining control is a responsibility of management. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Establishing and maintaining control is a responsibility of management. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "Planning that division’s fraud prevention nd host firm gross profit margin of 60%. The greater gross profit margin realized by the host firm may result from any number of reasonable causes. These include (1) greater efficiencies exercised by the host firm, (2) greater sales effort (or a more highly accepted product), and (3) measurement errors."}, {"tr": "A cross-sectional analysis of common size statements discloses that (1) the firm’s percentage of cost of goods sold to sales is 50% and (2) the industry average percentage of cost of goods sold to sales is 40%.", "en": "A cross-sectional analysis of common size statements discloses that (1) the firm’s percentage of cost of goods sold to sales is 50% and (2) the industry average percentage of cost of goods sold to sales is 40%.", "cmt_tr": "These data indicate an industry gross profit margin of 60% and a host firm gross profit margin of 50%. The lower gross profit margin realized by the host firm may result from such causes as (1) host firm inefficiencies; (2) less acceptance of host firm product, or less sales effort; and (3) measurement errors. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "These data indicate an industry gross profit margin of 60% and a host firm gross profit margin of 50%. The lower gross profit margin realized by the host firm may result from such causes as (1) host firm inefficiencies; (2) less acceptance of host firm product, or less sales effort; and (3) measurement errors. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}], "answer": 0}, {"q_tr": "Which of the following would indicate that fraud may be taking place in a marketing department?", "q_en": "Which of the following would indicate that fraud may be taking place in a marketing department?", "options": [{"tr": "There is no documentation for some fairly large expenditures made to a new vendor.", "en": "There is no documentation for some fairly large expenditures made to a new vendor.", "cmt_tr": "A manager’s excessive lifestyle ing services on the organization’s projects. The auditor also found a number of large invoices, authorized for payment by the general manager, that showed the general manager’s father as the person who signed for the receipt of the material at the supplier.", "cmt_en": "Fraud is characterized by intentional deception and can be perpetrated for the benefit or to the detriment of the organization. The use of blanket purchase orders is a normal business practice. Fact Pattern: When an internal auditor followed up on a significant increase in maintenance supplies during the past year, a purchasing agent explained to the internal auditor that the primary reason for the increase was painting services and supplies. The internal auditor found a blanket purchase order without the normal bid or quote documentation. The blanket purchase order is a standing agreement with a vendor to order specific supplies up to a limit without separate purchase orders for each order. The blanket purchase order had been signed by the general manager and named the general manager’s father as the sole contractor for painting services on the organization’s projects. The auditor also found a number of large invoices, authorized for payment by the general manager, that showed the general manager’s father as the person who signed for the receipt of the material at the supplier."}], "answer": 1}, {"q_tr": "What is the common indicator of fraud recognized by the internal auditor in this scenario?", "q_en": "What is the common indicator of fraud recognized by the internal auditor in this scenario?", "options": [{"tr": "Analytical procedures revealed an extraordinary increase in account balances.", "en": "Analytical procedures revealed an extraordinary increase in account balances.", "cmt_tr": "Analytical procedures are commonly performed by internal auditors to assess information collected in an engagement. The assessment results from comparing information with expectations identified or developed by t stments had been made for the entire year on the several thousand different products located in the storeroom. The storeroom supervisor explained that each of the 15 stockroom personnel selected one item each day for cycle count based on how efficiently the item could be counted. The opportunity for control-related problems including fraud has been increased in the stockroom because", "options": [{"tr": "Items for cycle count are selected by stockroom personnel.", "en": "Items for cycle count are selected by stockroom personnel.", "cmt_tr": "The opportunity for fraud has been increased because stockroom personnel select the items for cycle count (poor internal control). Selection of items should be based on relative values or the relationship of an item to the total volume of transactions. Moreover, personnel who do not have custodial or recordkeeping responsibilities should control the counts.", "cmt_en": "The opportunity for fraud has been increased because stockroom personnel select the items for cycle count (poor internal control). Selection of items should be based on relative values or the relationship of an item to the total volume of transactions. Moreover, personnel who do not have custodial or recordkeeping responsibilities should control the counts."}, {"tr": "A cycle count program has been installed in place of a less efficient program.", "en": "A cycle count program has been installed in place of a less efficient program.", "cmt_tr": "An appropriate and effective cycle count process should improve control.", "cmt_en": "An appropriate and effective cycle count process should improve control."}, {"tr": "Only nine minor adjustments have been recorded as a result of the cycle count process.", "en": "Only nine minor adjustments have been recorded as a result of the cycle count process.", "cmt_tr": "The number of adjustments is not indicative of the level of control in this situation. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "The number of adjustments is not indicative of the level of control in this situation. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "Stockroom personnel record cycle count information.", "en": "Stockroom personnel record cycle count information.", "cmt_tr": "A properly controlled cycle count process could involve stockroom personnel in performing counts. Fact Pattern: The internal audit function has been assigned to perform an engagement involving a division. Based on background review, the internal auditor knows the following about management policies: • Organizational policy is to rapidly promote divisional managers who show significant success. Thus, successful managers rarely stay at a division for more than 3 years. • A significant portion of division management’s compensation comes in the form of bonuses based on the division’s profitability. The division was identified by senior management as a turnaround opportunity. The division is growing but is not scheduled for a full audit by the external auditors this year. The division has been growing about 7% per year for the past 3 years and uses a standard cost system. During the preliminary review, the internal auditor notes the following changes in financial data compared with the prior year: • Sales have increased by 10%. • Cost of goods sold has increased by 2%. • Inventory has increased by 15%. • Divisional net profit has increased by 8%.", "cmt_en": "A properly controlled cycle count process could involve stockroom personnel in performing counts. Fact Pattern: The internal audit function has been assigned to perform an engagement involving a division. Based on background review, the internal auditor knows the following about management policies: • Organizational policy is to rapidly promote divisional managers who show significant success. Thus, successful managers rarely stay at a division for more than 3 years. • A significant portion of division management’s compensation comes in the form of bonuses based on the division’s profitability. The division was identified by senior management as a turnaround opportunity. The division is growing but is not scheduled for a full audit by the external auditors this year. The division has been growing about 7% per year for the past 3 years and uses a standard cost system. During the preliminary review, the internal auditor notes the following changes in financial data compared with the prior year: • Sales have increased by 10%. • Cost of goods sold has increased by 2%. • Inventory has increased by 15%. • Divisional net profit has increased by 8%."}], "answer": 0}, {"q_tr": "Which of the following items might alert the internal auditor to the possibility of fraud in the division?", "q_en": "Which of the following items might alert the internal auditor to the possibility of fraud in the division?", "options": [{"tr": "The division is not scheduled for an external audit this year.", "en": "The division is not scheduled for an external audit this year.", "cmt_tr": "Lack of an external audit this year has not been identified as a significant red flag. In addition, the division is reviewed by the internal audit function.", "cmt_en": "Lack of an external audit this year has not been identified as a significant red flag. In addition, the division is reviewed by the internal audit function."}, {"tr": "Sales have increased by 10%.", "en": "Sales have increased by 10%.", "cmt_tr": "Sales have normally been increasing by about 7% at this division. Thus, an increase of 10%, by itself, is not unexpected and does not raise a red flag. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Sales have normally been increasing by about 7% at this division. Thus, an increase of 10%, by itself, is not unexpected and does not raise a red flag. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "A significant portion of management’s compensation is directly tied to reported net profit of the division.", "en": "A significant portion of management’s compensation is directly tied to reported net profit of the division.", "cmt_tr": "The internal auditor’s responsibilities for detecting fraud include having sufficient knowledge of fraud to be able to identify indicators that fraud may have been committed. This knowledge includes the characteristics of fraud, the techniques used to commit fraud, and the types of frauds associated with the activities reviewed. For example, performance may be distorted because promotion and compensation (e.g., bonuses) are tied to profitability.", "cmt_en": "The internal auditor’s responsibilities for detecting fraud include having sufficient knowledge of fraud to be able to identify indicators that fraud may have been committed. This knowledge includes the characteristics of fraud, the techniques used to commit fraud, and the types of frauds associated with the activities reviewed. For example, performance may be distorted because promotion and compensation (e.g., bonuses) are tied to profitability."}, {"tr": "All of the answers are correct.", "en": "All of the answers are correct.", "cmt_tr": "Not all responses are red flags.", "cmt_en": "Not all responses are red flags."}], "answer": 2}, {"q_tr": "An internal auditor is investigating the performance of a division with an unusually large increase in sales, gross margin, and profit. Which of the following indicators is least likely to indicate the possibility of sales-related fraud in the division?", "q_en": "An internal auditor is investigating the performance of a division with an unusually large increase in sales, gross margin, and profit. Which of the following indicators is least likely to indicate the possibility of sales-related fraud in the division?", "options": [{"tr": "A significant portion of divisional management’s compensation is based on reported divisional profits.", "en": "A significant portion of divisional management’s compensation is based on reported divisional profits.", "cmt_tr": "Basing management compensation on reported profits creates an incentive for fraud.", "cmt_en": "Basing management compensation on reported profits creates an incentive for fraud."}, {"tr": "There is an unusually large amount of sales returns recorded after year end.", "en": "There is an unusually large amount of sales returns recorded after year end.", "cmt_tr": "An unusually large amount of sales returns after year end may indicate that invalid sales were recorded near the end of the year.", "cmt_en": "An unusually large amount of sales returns after year end may indicate that invalid sales were recorded near the end of the year."}, {"tr": "The internal auditor has taken a random sample of sales invoices but cannot locate a shipping document for a number of the sales transactions selected for November and December.", "en": "The internal auditor has taken a random sample of sales invoices but cannot locate a shipping document for a number of the sales transactions selected for November and December.", "cmt_tr": "The lack of shipping documents may indicate that invalid sales were recorded during November and December.", "cmt_en": "The lack of shipping documents may indicate that invalid sales were recorded during November and December."}, {"tr": "One of the division’s major competitors went out of business during the year.", "en": "One of the division’s major competitors went out of business during the year.", "cmt_tr": "A decrease in the number of competitors during the year is a potential explanation for the increase in sales and profits.", "cmt_en": "A decrease in the number of competitors during the year is a potential explanation for the increase in sales and profits."}], "answer": 3}, {"q_tr": "When evaluating the likelihood of fraud within an organization, which of the following is considered a red flag?", "q_en": "When evaluating the likelihood of fraud within an organization, which of the following is considered a red flag?", "options": [{"tr": "Management has delegated the authority to make purchases under a certain value to subordinates.", "en": "Management has delegated the authority to make purchases under a certain value to subordinates.", "cmt_tr": "Delegating the authority to make purchases under a certain value to subordinates is an acceptable and common practice intended to limit risk while promoting efficiency. It is not, by itself, considered a red flag.", "cmt_en": "Delegating the authority to make purchases under a certain value to subordinates is an acceptable and common practice intended to limit risk while promoting efficiency. It is not, by itself, considered a red flag."}, {"tr": "An individual has held the same cash-handling job for an extended period without any rotation of duties.", "en": "An individual has held the same cash-handling job for an extended period without any rotation of duties.", "cmt_tr": "Lack of rotation of duties or cross-training for sensitive jobs is a red flag. Such a person may have a greater opportunity to commit and conceal fraud.", "cmt_en": "Lack of rotation of duties or cross-training for sensitive jobs is a red flag. Such a person may have a greater opportunity to commit and conceal fraud."}, {"tr": "One individual is responsible for purchasing securities and another individual records the purchases.", "en": "One individual is responsible for purchasing securities and another individual records the purchases.", "cmt_tr": "An inappropriate segregation of duties is an identified red flag. The same person should not authorize, execute, and account for transactions and have custody of the assets. The segregation of duties is appropriate in this situation.", "cmt_en": "An inappropriate segregation of duties is an identified red flag. The same person should not authorize, execute, and account for transactions and have custody of the assets. The segregation of duties is appropriate in this situation."}, {"tr": "The controller is responsible and accountable for the accounts receivable department. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "en": "The controller is responsible and accountable for the accounts receivable department. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_tr": "Establishing clear lines of authority and accountability not only helps to assign culpability but also has preventive effects.", "cmt_en": "Establishing clear lines of authority and accountability not only helps to assign culpability but also has preventive effects."}], "answer": 1}, {"q_tr": "The most common motivation for management fraud is the existence of", "q_en": "The most common motivation for management fraud is the existence of", "options": [{"tr": "Vices, such as a gambling habit.", "en": "Vices, such as a gambling habit.", "cmt_tr": "Vices are an example of motivators of fraud perpetrated for the benefit of individuals and to the organization’s detriment.", "cmt_en": "Vices are an example of motivators of fraud perpetrated for the benefit of individuals and to the organization’s detriment."}, {"tr": "Job dissatisfaction.", "en": "Job dissatisfaction.", "cmt_tr": "Job dissatisfaction is an example of motivators of fraud perpetrated for the benefit of individuals and to the or", "cmt_en": "Job dissatisfaction is an example of motivators of fraud perpetrated for the benefit of individuals and to the or"}, {"tr": "Financial pressures on the organization.", "en": "Financial pressures on the organization.", "cmt_tr": "Management fraud benefits organizations rather than individuals, so the existence of financial pressures is the most common motivation. Management perpetrators attempt to make their financial statements appear more attractive because of the financial pressures of restrictive loan covenants, a poor cash position, loss of significant customers, etc.", "cmt_en": "Management fraud benefits organizations rather than individuals, so the existence of financial pressures is the most common motivation. Management perpetrators attempt to make their financial statements appear more attractive because of the financial pressures of restrictive loan covenants, a poor cash position, loss of significant customers, etc."}, {"tr": "The challenge of committing the perfect crime.", "en": "The challenge of committing the perfect crime.", "cmt_tr": "The challenge of committing the perfect crime is an example of motivators of fraud perpetrated for the benefit of individuals and to the organization’s detriment.", "cmt_en": "The challenge of committing the perfect crime is an example of motivators of fraud perpetrated for the benefit of individuals and to the organization’s detriment."}], "answer": 2}, {"q_tr": "Which of the following is a financial statement fraud?", "q_en": "Which of the following is a financial statement fraud?", "options": [{"tr": "An employee sells an organization’s customer list to a competitor.", "en": "An employee sells an organization’s customer list to a competitor.", "cmt_tr": "The sale of an organization’s customer list to a competitor is theft of assets.", "cmt_en": "The sale of an organization’s customer list to a competitor is theft of assets."}, {"tr": "A contractor always bids last, bids lowest, and regularly receives contracts.", "en": "A contractor always bids last, bids lowest, and regularly receives contracts.", "cmt_tr": "Bribery and corruption include bid rigging, such as one contractor being able to bid last, bid lowest, and regularly receive contracts from an organization.", "cmt_en": "Bribery and corruption include bid rigging, such as one contractor being able to bid last, bid lowest, and regularly receive contracts from an organization."}, {"tr": "Senior management overstates assets and conceals liabilities.", "en": "Senior management overstates assets and conceals liabilities.", "cmt_tr": "Fraud is any illegal act characterized by deceit, concealment, or violation of trust. The person perpetrates the fraud with the knowledge of possibly receiving some unauthorized benefit. Moreover, fraud can be accomplished by persons outside and inside the organization. Financial statement fraud involves deceiving financial statement users by purposely misstating amounts shown in the financial statements or completely omitting necessary information.", "cmt_en": "Fraud is any illegal act characterized by deceit, concealment, or violation of trust. The person perpetrates the fraud with the knowledge of possibly receiving some unauthorized benefit. Moreover, fraud can be accomplished by persons outside and inside the organization. Financial statement fraud involves deceiving financial statement users by purposely misstating amounts shown in the financial statements or completely omitting necessary information."}, {"tr": "An employee submits an invoice to the employer for a personal purchase. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "en": "An employee submits an invoice to the employer for a personal purchase. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_tr": "An employee’s submission of an invoice to the employer for a personal purchase is fraudulent disbursement.", "cmt_en": "An employee’s submission of an invoice to the employer for a personal purchase is fraudulent disbursement."}], "answer": 2}, {"q_tr": "Which of the following factors might best indicate the possibility of fraudulent activity in the production process?", "q_en": "Which of the following factors might best indicate the possibility of fraudulent activity in the production process?", "options": [{"tr": "Employee overtime has increased 50 percent during the past year.", "en": "Employee overtime has increased 50 percent during the past year.", "cmt_tr": "Overtime hours may vary significantly from period to period due to staff size, deadlines, projects, or other factors.", "cmt_en": "Overtime hours may vary significantly from period to period due to staff size, deadlines, projects, or other factors."}, {"tr": "Although scrap is generated and not reused, no income is reported from scrap sales.", "en": "Although scrap is generated and not reused, no income is reported from scrap sales.", "cmt_tr": "Asset misappropriation is a type of fraud that involves the theft of cash or other assets. Scrap consists of leftover material from production. It is sold if not reused. Thus, an indication of scrap misappropriation is a lack of income reported from scrap sales.", "cmt_en": "Asset misappropriation is a type of fraud that involves the theft of cash or other assets. Scrap consists of leftover material from production. It is sold if not reused. Thus, an indication of scrap misappropriation is a lack of income reported from scrap sales."}, {"tr": "Interviews with employees indicate that they have a general dissatisfaction with management and believe that productivity could be greatly improved if management listened to the employees.", "en": "Interviews with employees indicate that they have a general dissatisfaction with management and believe that productivity could be greatly improved if management listened to the employees.", "cmt_tr": "By itself, employee dissatisfaction is not an indication of fraud.", "cmt_en": "By itself, employee dissatisfaction is not an indication of fraud."}, {"tr": "Inventory has decreased at the same time that the cost of goods sold has increased..", "en": "Inventory has decreased at the same time that the cost of goods sold has increased..", "cmt_tr": "As inventory decreases, cost of goods sold should increase. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "As inventory decreases, cost of goods sold should increase. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}], "answer": 1}, {"q_tr": "Which of the following is an example of skimming?", "q_en": "Which of the following is an example of skimming?", "options": [{"tr": "The organization issued payroll checks weekly. However, due to cash flow issues, the organization kept the amounts withheld from the employee paychecks (federal withholding, Social Security, Medicare, etc.) for its own use.", "en": "The organization issued payroll checks weekly. However, due to cash flow issues, the organization kept the amounts withheld from the employee paychecks (federal withholding, Social Security, Medicare, etc.) for its own use.", "cmt_tr": "The illegal nonpayment or underpayment of tax is considered tax evasion. Intentionally falsifying a tax return, failing to remit taxes, and failing to report taxes are examples.", "cmt_en": "The illegal nonpayment or underpayment of tax is considered tax evasion. Intentionally falsifying a tax return, failing to remit taxes, and failing to report taxes are examples."}, {"tr": "The auditor discovered one of the managers was including personal items on the organization’s weekly vendor orders. There was no evidence the manager had reimbursed the organization for the expense.", "en": "The auditor discovered one of the managers was including personal items on the organization’s weekly vendor orders. There was no evidence the manager had reimbursed the organization for the expense.", "cmt_tr": "Payment fraud involves payment for fictitious goods or services, overstatement of invoices, or use of invoices for personal reasons. The manager was using the organization, through vendor invoices, to purchase items for his or her personal use.", "cmt_en": "Payment fraud involves payment for fictitious goods or services, overstatement of invoices, or use of invoices for personal reasons. The manager was using the organization, through vendor invoices, to purchase items for his or her personal use."}, {"tr": "Two friends who work together have an arrangement that the first to arrive to work for the day punches in using the time clock for both of them, and the last one to leave punches out for both of them.", "en": "Two friends who work together have an arrangement that the first to arrive to work for the day punches in using the time clock for both of them, and the last one to leave punches out for both of them.", "cmt_tr": "Payroll fraud is a false claim for compensation. It can include, for example, falsifying timesheets, claiming overtime for hours not worked, and payments to fictitious or terminated employees. An employee punching the time clock for another employee is an example of payroll fraud.", "cmt_en": "Payroll fraud is a false claim for compensation. It can include, for example, falsifying timesheets, claiming overtime for hours not worked, and payments to fictitious or terminated employees. An employee punching the time clock for another employee is an example of payroll fraud."}, {"tr": "As an incentive to limo drivers, an organization promised $25 for each $250 helicopter tour sold. After hearing several customer complaints, the manager discovered that one of the drivers was charging the customers $300 per tour and pocketing the difference.", "en": "As an incentive to limo drivers, an organization promised $25 for each $250 helicopter tour sold. After hearing several customer complaints, the manager discovered that one of the drivers was charging the customers $300 per tour and pocketing the difference.", "cmt_tr": "Skimming is a theft of cash before the accounting entry is recorded. Examples include accepting payment from a customer but not reporting the sale and overcharging the customer for the sale and keeping the difference. Skimming is very difficult to detect as there is no audit trail.", "cmt_en": "Skimming is a theft of cash before the accounting entry is recorded. Examples include accepting payment from a customer but not reporting the sale and overcharging the customer for the sale and keeping the difference. Skimming is very difficult to detect as there is no audit trail."}], "answer": 3}, {"q_tr": "The organization contracted with an outside vendor to maintain food items for employee purchase in the dining room. Payment for food was through a kiosk and was on the honor system. After several weeks of shortages, two employees were fired for taking food without paying for it. This is an example of what type of fraud?", "q_en": "The organization contracted with an outside vendor to maintain food items for employee purchase in the dining room. Payment for food was through a kiosk and was on the honor system. After several weeks of shortages, two employees were fired for taking food without paying for it. This is an example of what type of fraud?", "options": [{"tr": "Expense reimbursement fraud.", "en": "Expense reimbursement fraud.", "cmt_tr": "Expense reimbursement fraud is when payment is made for fictitious or inflated expenses, for Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types example, when an employee submits an expense report that includes personal travel, nonexistent meals, or extra mileage.", "cmt_en": "Expense reimbursement fraud is when payment is made for fictitious or inflated expenses, for Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types example, when an employee submits an expense report that includes personal travel, nonexistent meals, or extra mileage."}, {"tr": "Asset misappropriation.", "en": "Asset misappropriation.", "cmt_tr": "Asset misappropriation fraud is stealing cash or other assets, such as supplies, inventory, equipment, and information. The theft may be concealed by adjusting records. Employees taking food and not paying for it would be considered asset misappropriation fraud.", "cmt_en": "Asset misappropriation fraud is stealing cash or other assets, such as supplies, inventory, equipment, and information. The theft may be concealed by adjusting records. Employees taking food and not paying for it would be considered asset misappropriation fraud."}, {"tr": "Wrongful use.", "en": "Wrongful use.", "cmt_tr": "Wrongful use of confidential or proprietary information is considered later covered by a subsequent payment from another customer. The process continues until (1) a customer complains about his or her payment not being posted, (2) an absence by the perpetrator allows another employee to discover the fraud, or (3) the perpetrator covers the amount stolen. Check kiting exploits the delay between depositing a check in one bank account and clearing the check through the bank on which it was drawn. Check kiting is when the kiter writes an insufficient funds check from the first bank and deposits the check in a second bank. The second bank immediately credits the account for some or all of the amount of the check, enabling the kiter to write other checks or withdraw cash on the nonexistent balance.", "cmt_en": "Lapping receivables, not check kiting, is when a person (or persons) with access to customer payments and accounts receivable records steals a customer’s payment. The shortage in that customer’s account is later covered by a subsequent payment from another customer. The process continues until (1) a customer complains about his or her payment not being posted, (2) an absence by the perpetrator allows another employee to discover the fraud, or (3) the perpetrator covers the amount stolen. Check kiting exploits the delay between depositing a check in one bank account and clearing the check through the bank on which it was drawn. Check kiting is when the kiter writes an insufficient funds check from the first bank and deposits the check in a second bank. The second bank immediately credits the account for some or all of the amount of the check, enabling the kiter to write other checks or withdraw cash on the nonexistent balance."}, {"tr": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank.", "en": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank.", "cmt_tr": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank. At one time, float times ranged from 2 days to 10 days. Technology has resulted in drastically reduced float times. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank. At one time, float times ranged from 2 days to 10 days. Technology has resulted in drastically reduced float times. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "Electronic check kiting is difficult due to the widespread use of electronic funds transfer and other networked computer safeguards.", "en": "Electronic check kiting is difficult due to the widespread use of electronic funds transfer and other networked computer safeguards.", "cmt_tr": "The widespread use of electronic funds transfer and other networked computer safeguards make electronic kiting difficult.", "cmt_en": "The widespread use of electronic funds transfer and other networked computer safeguards make electronic kiting difficult."}, {"tr": "The check kiting process can proceed in a circle of accounts at any number of banks.", "en": "The check kiting process can proceed in a circle of accounts at any number of banks.", "cmt_tr": "A check kiting scheme requires two accounts and usually involves several accounts at several banks. The nonexistent cash is constantly moved from one bank to another, rotating in a circular fashion.", "cmt_en": "A check kiting scheme requires two accounts and usually involves several accounts at several banks. The nonexistent cash is constantly moved from one bank to another, rotating in a circular fashion."}], "answer": 0}, {"q_tr": "When developing engagement objectives, internal auditors ordinarily must consider", "q_en": "When developing engagement objectives, internal auditors ordinarily must consider", "options": [{"tr": "Procedures sufficient to detect all fraud.", "en": "Procedures sufficient to detect all fraud.", "cmt_tr": "Internal auditors are not responsible for the detection of all fraud, but they always must be alert to the possibility of fraud.", "cmt_en": "Internal auditors are not responsible for the detection of all fraud, but they always must be alert to the possibility of fraud."}, {"tr": "The probability of significant fraud, errors, or noncompliance.", "en": "The probability of significant fraud, errors, or noncompliance.", "cmt_tr": "Standard 4.2 requires auditors to exercise due professional care. They must assess the nature, circumstances, and requirements of their services. For example, this assessment includes the probability of significant errors, fraud, noncompliance, and other risks that might affect objectives, operations, or resources. Internal auditors therefore must consider the probability of fraud when developing engagement objectives.", "cmt_en": "Standard 4.2 requires auditors to exercise due professional care. They must assess the nature, circumstances, and requirements of their services. For example, this assessment includes the probability of significant errors, fraud, noncompliance, and other risks that might affect objectives, operations, or resources. Internal auditors therefore must consider the probability of fraud when developing engagement objectives."}, {"tr": "The investigation that would be conducted by an expert in fraud detection.", "en": "The investigation that would be conducted by an expert in fraud detection.", "cmt_tr": "Internal auditors must have sufficient knowledge to evaluate the risk of fraud and the manner in which it is managed by the organization. They are not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud.", "cmt_en": "Internal auditors must have sufficient knowledge to evaluate the risk of fraud and the manner in which it is managed by the organization. They are not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud."}, {"tr": "Performing specific procedures to identify fraud indicators.", "en": "Performing specific procedures to identify fraud indicators.", "cmt_tr": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information."}], "answer": 1}, {"q_tr": "The usual roles of internal auditors regarding fraud include", "q_en": "The usual roles of internal auditors regarding fraud include", "options": [{"tr": "Evaluating the organization’s management of fraud risk.", "en": "Evaluating the organization’s management of fraud risk.", "cmt_tr": "The internal audit function must evaluate the potential for the occurrence of fraud and how the organization manages fraud risk.", "cmt_en": "The internal audit function must evaluate the potential for the occurrence of fraud and how the organization manages fraud risk."}, {"tr": "Performing procedures to obtain red flag information.", "en": "Performing procedures to obtain red flag information.", "cmt_tr": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types flags). However, internal auditors do not normally perform procedures specifically to gather red flag information.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types flags). However, internal auditors do not normally perform procedures specifically to gather red flag information."}, {"tr": "Designing controls to replace control deficiencies.", "en": "Designing controls to replace control deficiencies.", "cmt_tr": "Internal auditors evaluate but do not design controls. Internal auditors should consider the potential for fraud risks in the assessment of control design and the choice of audit procedures.", "cmt_en": "Internal auditors evaluate but do not design controls. Internal auditors should consider the potential for fraud risks in the assessment of control design and the choice of audit procedures."}, {"tr": "Fraud investigation when indicators are present.", "en": "Fraud investigation when indicators are present.", "cmt_tr": "Internal auditors should evaluate the indicators of fraud and decide whether any further action is necessary or whether an investigation should be recommended. Internal auditors are not expected to have the expertise to investigate fraud.", "cmt_en": "Internal auditors should evaluate the indicators of fraud and decide whether any further action is necessary or whether an investigation should be recommended. Internal auditors are not expected to have the expertise to investigate fraud."}], "answer": 0}, {"q_tr": "Internal auditors’ knowledge of fraud should include", "q_en": "Internal auditors’ knowledge of fraud should include", "options": [{"tr": "The training needed to detect fraud.", "en": "The training needed to detect fraud.", "cmt_tr": "An internal auditor must have sufficient knowledge to identify the indicators of fraud but is not required to have sufficient knowledge and training to be able to detect fraud.", "cmt_en": "An internal auditor must have sufficient knowledge to identify the indicators of fraud but is not required to have sufficient knowledge and training to be able to detect fraud."}, {"tr": "Planning fraud prevention activities.", "en": "Planning fraud prevention activities.", "cmt_tr": "Planning fraud prevention activities is a responsibility of management.", "cmt_en": "Planning fraud prevention activities is a responsibility of management."}, {"tr": "Technical expertise in a particular area of fraud examination.", "en": "Technical expertise in a particular area of fraud examination.", "cmt_tr": "The Standards do not require an internal auditor to have technical expertise in a particular area of fraud examination to serve on an engagement in which a possibility of fraud exists.", "cmt_en": "The Standards do not require an internal auditor to have technical expertise in a particular area of fraud examination to serve on an engagement in which a possibility of fraud exists."}, {"tr": "Schemes associated with the activities reviewed.", "en": "Schemes associated with the activities reviewed.", "cmt_tr": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information. This knowledge includes (1) the characteristics of fraud, (2) the methods used to commit fraud, and (3) the various fraud schemes associated with the activities reviewed.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information. This knowledge includes (1) the characteristics of fraud, (2) the methods used to commit fraud, and (3) the various fraud schemes associated with the activities reviewed."}], "answer": 3}, {"q_tr": "Internal auditors are most likely to perform procedures to detect fraud when", "q_en": "Internal auditors are most likely to perform procedures to detect fraud when", "options": [{"tr": "A fraud investigation has commenced.", "en": "A fraud investigation has commenced.", "cmt_tr": "Internal auditors should evaluate the indicators of fraud and decide whether any further action is necessary or whether an investigation should be recommended. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Internal auditors should evaluate the indicators of fraud and decide whether any further action is necessary or whether an investigation should be recommended. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "Management is actively overseeing the fraud management program.", "en": "Management is actively overseeing the fraud management program.", "cmt_tr": "Active oversight of the fraud management program reduces the potential for fraud risk if corrective measures suffice and the monitoring plan is adequate.", "cmt_en": "Active oversight of the fraud management program reduces the potential for fraud risk if corrective measures suffice and the monitoring plan is adequate."}, {"tr": "Significant control deficiencies exist.", "en": "Significant control deficiencies exist.", "cmt_tr": "Internal auditors should be alert to opportunities that could allow fraud, such as control deficiencies. If significant control deficiencies are detected, additional procedures may be performed to determine whether fraud has occurred.", "cmt_en": "Internal auditors should be alert to opportunities that could allow fraud, such as control deficiencies. If significant control deficiencies are detected, additional procedures may be performed to determine whether fraud has occurred."}, {"tr": "They satisfy the requirement to gather information about fraud indicators.", "en": "They satisfy the requirement to gather information about fraud indicators.", "cmt_tr": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information.", "cmt_en": "Internal auditors should have sufficient knowledge of fraud to identify indicators of fraud (red flags). However, internal auditors do not normally perform procedures specifically to gather red flag information."}], "answer": 2}, {"q_tr": "When considering the potential for fraud risk, internal auditors", "q_en": "When considering the potential for fraud risk, internal auditors", "options": [{"tr": "Evaluate whether control deficiencies are sufficiently corrected.", "en": "Evaluate whether control deficiencies are sufficiently corrected.", "cmt_tr": "Internal auditors should evaluate whether (1) management is actively overseeing the fraud risk management programs, (2) timely and sufficient corrective measures have been taken with respect to any noted control deficiencies, and (3) the plan for monitoring the program is adequate.", "cmt_en": "Internal auditors should evaluate whether (1) management is actively overseeing the fraud risk management programs, (2) timely and sufficient corrective measures have been taken with respect to any noted control deficiencies, and (3) the plan for monitoring the program is adequate."}, {"tr": "Determine whether management has documented the consideration of fraud risks.", "en": "Determine whether management has documented the consideration of fraud risks.", "cmt_tr": "The consideration of fraud risks and their relation to specific audit work are documented by the internal auditors.", "cmt_en": "The consideration of fraud risks and their relation to specific audit work are documented by the internal auditors."}, {"tr": "Should exercise due professional care to detect fraud.", "en": "Should exercise due professional care to detect fraud.", "cmt_tr": "Internal auditors must have sufficient knowledge to evaluate the risk of fraud and the manner in which it is managed by the organization. They are not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud.", "cmt_en": "Internal auditors must have sufficient knowledge to evaluate the risk of fraud and the manner in which it is managed by the organization. They are not expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud."}, {"tr": "Should exercise due professional care when investigating fraud.", "en": "Should exercise due professional care when investigating fraud.", "cmt_tr": "A fraud investigation may be approved by management or the board after recommendation by internal auditors. However, auditors do not investigate based solely on the potential for risk. Moreover, they conduct investigations only if they have the necessary forensic competencies and are approved by the board to investigate. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "A fraud investigation may be approved by management or the board after recommendation by internal auditors. However, auditors do not investigate based solely on the potential for risk. Moreover, they conduct investigations only if they have the necessary forensic competencies and are approved by the board to investigate. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}], "answer": 0}, {"q_tr": "Check kiting", "q_en": "Check kiting", "options": [{"tr": "Is theft of a customer’s payment by a person with access to the customer’s payments and accounts receivable records.", "en": "Is theft of a customer’s payment by a person with access to the customer’s payments and accounts receivable records.", "cmt_tr": "Lapping receivables is theft of a customer’s payment by a person (or persons) with access to customer payments and accounts receivable records. The shortage in that customer’s account is later covered by a subsequent payment from another customer. The process continues until (1) a customer complains about nonposting of payment, (2) an absence by the perpetrator allows another employee to discover the fraud, or (3) the perpetrator covers the amount stolen.", "cmt_en": "Lapping receivables is theft of a customer’s payment by a person (or persons) with access to customer payments and accounts receivable records. The shortage in that customer’s account is later covered by a subsequent payment from another customer. The process continues until (1) a customer complains about nonposting of payment, (2) an absence by the perpetrator allows another employee to discover the fraud, or (3) the perpetrator covers the amount stolen."}, {"tr": "Exploits the lack of float time between the deposit of the check and the check clearing the bank.", "en": "Exploits the lack of float time between the deposit of the check and the check clearing the bank.", "cmt_tr": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank. At one time, float times ranged from 2 days to 10 days. Current technology has resulted in drastically reduced float times.", "cmt_en": "Check kiting exploits the float time between the deposit of the check and the check clearing the bank. At one time, float times ranged from 2 days to 10 days. Current technology has resulted in drastically reduced float times."}, {"tr": "Is by electronic means facilitated by the potential hacking of networked computer systems.", "en": "Is by electronic means facilitated by the potential hacking of networked computer systems.", "cmt_tr": "The widespread use of electronic funds transfer and other networked computer safeguards make electronic kiting difficult.", "cmt_en": "The widespread use of electronic funds transfer and other networked computer safeguards make electronic kiting difficult."}, {"tr": "Can proceed in a circle of accounts at any number of banks.", "en": "Can proceed in a circle of accounts at any number of banks.", "cmt_tr": "A check kiting scheme requires two accounts and usually involves several accounts at several banks. The nonexistent cash is constantly moved from one bank to another, rotating in a circular fashion. Check kiting exploits the delay between depositing a check in one bank account and clearing the check through the bank on which it was drawn. The kiter writes an insufficient funds check payable by the first bank and deposits the check in a second bank. The second bank immediately credits the account for some or all of the amount of the check, enabling the kiter to write other checks or withdraw cash on the nonexistent balance.", "cmt_en": "A check kiting scheme requires two accounts and usually involves several accounts at several banks. The nonexistent cash is constantly moved from one bank to another, rotating in a circular fashion. Check kiting exploits the delay between depositing a check in one bank account and clearing the check through the bank on which it was drawn. The kiter writes an insufficient funds check payable by the first bank and deposits the check in a second bank. The second bank immediately credits the account for some or all of the amount of the check, enabling the kiter to write other checks or withdraw cash on the nonexistent balance."}], "answer": 3}, {"q_tr": "Misappropriation of assets is most often perpetrated by", "q_en": "Misappropriation of assets is most often perpetrated by", "options": [{"tr": "Employees.", "en": "Employees.", "cmt_tr": "Employees who have fiduciary responsibilities for assets are most likely to steal them.", "cmt_en": "Employees who have fiduciary responsibilities for assets are most likely to steal them."}, {"tr": "Customers.", "en": "Customers.", "cmt_tr": "Customers may misappropriate assets, but most businesses are more vulnerable to misappropriation by employees. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Customers may misappropriate assets, but most businesses are more vulnerable to misappropriation by employees. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "Suppliers.", "en": "Suppliers.", "cmt_tr": "Suppliers may misappropriate assets, but most businesses are more vulnerable to misappropriation by employees.", "cmt_en": "Suppliers may misappropriate assets, but most businesses are more vulnerable to misappropriation by employees."}, {"tr": "Auditors.", "en": "Auditors.", "cmt_tr": "Independent auditors have little opportunity or motive to misappropriate assets.", "cmt_en": "Independent auditors have little opportunity or motive to misappropriate assets."}], "answer": 0}, {"q_tr": "A manufacturing entity, located in a sparsely populated region of the country, has a policy of leaving its raw material inventory warehouse doors open during normal business hours to optimize workflow. The controller for the entity has just noticed that some raw material inventory is missing. Using the Fraud Triangle model, the controller has determined that the entity’s policy most likely increases the risk of fraud by", "q_en": "A manufacturing entity, located in a sparsely populated region of the country, has a policy of leaving its raw material inventory warehouse doors open during normal business hours to optimize workflow. The controller for the entity has just noticed that some raw material inventory is missing. Using the Fraud Triangle model, the controller has determined that the entity’s policy most likely increases the risk of fraud by", "options": [{"tr": "Incentivizing employees to commit the fraud.", "en": "Incentivizing employees to commit the fraud.", "cmt_tr": "Employees would be incentivized to commit fraud by experiencing a financial need that could be solved through theft.", "cmt_en": "Employees would be incentivized to commit fraud by experiencing a financial need that could be solved through theft."}, {"tr": "Increasing the ease of rationalization of the fraudulent activity.", "en": "Increasing the ease of rationalization of the fraudulent activity.", "cmt_tr": "Rationalization is a person’s ability to justify actions as consistent with his or her personal code of ethics. It is not affected by an open warehouse.", "cmt_en": "Rationalization is a person’s ability to justify actions as consistent with his or her personal code of ethics. It is not affected by an open warehouse."}, {"tr": "Assisting employees to perceive a financial need.", "en": "Assisting employees to perceive a financial need.", "cmt_tr": "Leaving the warehouse doors open would not help employees in perceiving their financial need.", "cmt_en": "Leaving the warehouse doors open would not help employees in perceiving their financial need."}, {"tr": "Increasing the opportunity to commit the fraud.", "en": "Increasing the opportunity to commit the fraud.", "cmt_tr": "The three elements of the Fraud Triangle are pressure, opportunity, and rationalization. Opportunity is the ability of a person not only to perpetrate but also to conceal fraud and is created by an absence of oversight, inadequate internal controls, or the lack of enforcement of controls. Leaving the warehouse doors open represents an inadequate internal control that increases the opportunity to commit fraud.", "cmt_en": "The three elements of the Fraud Triangle are pressure, opportunity, and rationalization. Opportunity is the ability of a person not only to perpetrate but also to conceal fraud and is created by an absence of oversight, inadequate internal controls, or the lack of enforcement of controls. Leaving the warehouse doors open represents an inadequate internal control that increases the opportunity to commit fraud."}], "answer": 3}, {"q_tr": "The fraud risk factor that may be mitigated by internal controls is", "q_en": "The fraud risk factor that may be mitigated by internal controls is", "options": [{"tr": "Rationalization.", "en": "Rationalization.", "cmt_tr": "Rationalization cannot be affected by controls because it is a mental state of a potential perpetrator of a fraud. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Rationalization cannot be affected by controls because it is a mental state of a potential perpetrator of a fraud. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "Motive.", "en": "Motive.", "cmt_tr": "Like rationalization, motive is a mental state that cannot be mitigated by controls.", "cmt_en": "Like rationalization, motive is a mental state that cannot be mitigated by controls."},
