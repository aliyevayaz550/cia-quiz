ication with the person responsible for custody."}, {"tr": "Bir sözleşmeyi müzakere etmek ve ödemeleri onaylamak.", "en": "Negotiating a contract and approving payments.", "cmt_tr": "Sözleşme müzakeresi ve ödeme onayı ayrılmalıdır.", "cmt_en": "Negotiating a contract and approving payments should be segregated. The same person should not approve payment (asset custody) in accordance with contract terms (s)he negotiated (recording of the terms of the transaction)."}, {"tr": "Mal sipariş etmek ve malları teslim almak.", "en": "Ordering goods and receiving the goods.", "cmt_tr": "Sipariş (yetkilendirme) ve teslim alma (saklama) ayrılmalıdır.", "cmt_en": "Ordering (authorization) and receipt (custody) should be segregated."}, {"tr": "Satış siparişi hazırlamak ve müşteriye kredi açılmasını onaylamak.", "en": "Preparing a sales order and approving extension of credit to the custom", "cmt_tr": "Satış siparişi hazırlama (kayıt) ve kredi kontrolü (yetkilendirme) ayrılmalıdır.", "cmt_en": "Preparing a sales order (recording) and a credit check (authorization of the transaction) should be segregated."}], "answer": 0}, {"q_tr": "Bir iç denetçinin hile riski değerlendirmesi, büyük olasılıkla satın alma fonksiyonunda aşağıdaki uygulamalardan hangisinin uygunsuz olduğunu belirler?", "q_en": "An internal auditor’s fraud risk assessment is most likely to determine that which of the following is an inappropriate practice in the purchase function?", "options": [{"tr": "Borç hesapları yetkili imza listesi hazırlanmaktadır.", "en": "An accounts payable authorized signature list is prepared.", "cmt_tr": "Satın alma siparişlerini başlatma ve onaylama yetkisine sahip kişilerin imzalarını gösteren bir borç hesapları imza yetkilendirme listesi hazırlanmalıdır.", "cmt_en": "An accounts payable signature authorization list should be prepared showing the signatures for authorized individuals who may initiate and approve purchase orders."}, {"tr": "Satın almalar yalnızca onaylı satıcılardan yapılmaktadır.", "en": "Purchases are made only from approved vendors.", "cmt_tr": "Satın almalar yalnızca onaylı satıcılardan veya onaylı sözleşmelerle yapılmalıdır.", "cmt_en": "Purchases should only be transacted with approved vendors or evidenced by approved contracts."}, {"tr": "Teslim alma departmanı sipariş edilen miktarı belirten onaylanmış bir sipariş kullanmaktadır.", "en": "The receiving department uses an approved order for goods stating the amount ordered.", "cmt_tr": "Teslim alma departmanı, uygun şekilde onaylanmış satın alma siparişinin kör bir kopyası olmadan mal kabul etmemelidir. Teslim alma kopyasında miktar belirtilmez, böylece çalışanlar teslim alma raporuna kaydedilecek tutarı belirlemek için malları saymak zorundadır.", "cmt_en": "The receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items. Receiving’s copy of the purchase order omits the quantity so that employees must count the goods to determine the amount to record on the receiving report."}, {"tr": "Satıcılardan hediye kabul edilmesini yasaklayan bir politika mevcuttur.", "en": "A policy prohibits receipt of gifts from vendors.", "cmt_tr": "Satıcılardan komisyon, hediye ve diğer değerli eşyaların kabul edilmesini yasaklayan bir politika olmalıdır.", "cmt_en": "A policy should prohibit receipt of kickbacks, gifts, and other items of value from vendors."}], "answer": 2}, {"q_tr": "Geniş kontrol alanları ile az sayıda yönetim kademesine sahip küçük bir halka açık şirkette, aşağıdakilerden hangisi yönetimin kontrolleri geçersiz kılmasını azaltır?", "q_en": "In a small public company that has few levels of management with wide spans of control, which of the following mitigates management override of controls?", "options": [{"tr": "Cömert performansa dayalı ödül sistemi.", "en": "A generous performance-based reward system.", "cmt_tr": "Cömert performansa dayalı ödül sistemi, sistem kontrollerini geçersiz kılarak performansı çarpıtma teşvikleri yaratır.", "cmt_en": "A generous performance-based reward system provides incentives to distort performance by overriding system controls."}, {"tr": "Dürüstlük ve etik değerlere yüksek önem verilen bir kurum kültürü oluşturmak.", "en": "Establishing a corporate culture in which integrity and ethical values are highly appreciated.", "cmt_tr": "Dürüstlük ve etik değerlere bağlılığı kurmak ve göstermek, COSO İç Kontrol çerçevesinin kontrol ortamı bileşeniyle ilgili bir ilkedir. Yönetimin bu bağlılığı kuruluş genelinde iletmesinin en etkili yolu örnek olmaktır.", "cmt_en": "Establishing and demonstrating a commitment to integrity and ethical values is a principle related to the control environment component of the COSO Internal Control framework. The most effective way for management to transmit this commitment throughout an organization is to set the example. Thus, by acting with integrity and abiding by ethical values, management is less likely to override controls."}, {"tr": "Yönetim ve operasyonları önemli ölçüde etkileyen iki görevliye sahip olmak.", "en": "Having two officers who significantly influence management and operations.", "cmt_tr": "Yönetimin kontrolleri geçersiz kılması, yönetimin eylemlerinin yerleşik kontrol faaliyetleriyle tutarsız olması durumunda gerçekleşir. Bu tür etki önemli ve az sayıda kişinin elinde yoğunlaşmışsa yönetimin kontrolleri geçersiz kılma riski artar.", "cmt_en": "Management override of controls occurs when the actions of management (e.g., officers) are not consistent with established control activities. Officers are expected to influence management and operations. However, when such influence is significant and concentrated in the hands of few, the risk of management override of controls is increased."}, {"tr": "Etik dışı davranışlar için katı cezalar uygulayan otoriter bir CEO.", "en": "An authoritarian CEO who has imposed strict penalties for unethical behavior.", "cmt_tr": "Etik dışı davranışlar için katı cezalar uygulayan otoriter bir CEO muhtemelen yönetim geçersiz kılmalarını azaltmaz. Böyle bir CEO muhtemelen sonuçlara odaklı yüksek basınçlı bir ortam yaratır ve yönetim geçersiz kılmaları için teşvik sağlar.", "cmt_en": "An authoritarian CEO who has imposed strict penalties for unethical behavior would likely not mitigate against management overrides. Such a CEO would likely foster a high-pressure environment focused on results, thus providing an incentive for management overrides."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi yönetimin kontrolleri geçersiz kılmasına bir örnektir?", "q_en": "Which of the following is an example of management override?", "options": [{"tr": "Yıl sonu analizlerinin genel ekonomik ortamdaki değişikliklere işaret etmesinin ardından düzeltme kayıtları yapmak.", "en": "Posting adjusting entries after year-end analyses have indicated changes in the overall economic environment.", "cmt_tr": "Yeni bulgulara dayalı düzeltmeler yapmak mutlaka yönetimin kontrolleri geçersiz kılması oluşturmaz. Aksine, uygun şekilde kaydedilmeyebilecek özel koşullarla başa çıkmak için gerekli yönetim müdahalesi olabilir.", "cmt_en": "Making adjustments based on new findings (e.g., changes in the overall economic environment) does not necessarily constitute management override. Rather, it may be an example of management intervention necessary to cope with special circumstances that otherwise may not be appropriately recorded."}, {"tr": "Belirli satıcılar için ödeme sürelerini şirket politikasının izin verdiğinin ötesine uzatmak.", "en": "Extending payment periods for certain vendors beyond those allowed by company policy.", "cmt_tr": "Şirket politikasına aykırı olarak ödemeleri ertelemek yönetimin kontrolleri geçersiz kılmasına bir örnektir.", "cmt_en": "Deferring payments contrary to company policy is an example of management override of a control."}, {"tr": "İç denetçinin önerisi doğrultusunda borç hesapları prosedürlerini değiştirmek.", "en": "Changing accounts payable procedures in response to a recommendation by the internal auditor.", "cmt_tr": "İç denetçinin önerisi doğrultusunda borç hesapları prosedürlerini değiştirmek yönetimin kontrolleri geçersiz kılması değildir.", "cmt_en": "Changing accounts payable procedures in response to a recommendation by the internal auditor is not an example of management override. The recommendation was likely made to improve internal controls, not circumvent controls."}, {"tr": "Dış denetçinin önerisi doğrultusunda muhasebe tahminlerini değiştirmek.", "en": "Changing accounting estimates in response to a recommendation by the external auditor.", "cmt_tr": "Dış denetçinin önerisi doğrultusunda muhasebe tahminlerini değiştirmek yönetimin kontrolleri geçersiz kılması değildir. Meşru olmayan bir amaçla yapılmayan normal bir prosedürdür.", "cmt_en": "Changing accounting estimates in response to a recommendation by the external auditor is not management override of a control. It is a normal procedure, not done for an illegitimate purpose."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi potansiyel bir hile riski olarak tanımlanmalıdır?", "q_en": "Which of the following must be identified as a potential fraud risk?", "options": [{"tr": "Yönetimin kontrolleri geçersiz kılması.", "en": "Management override of controls.", "cmt_tr": "Yönetimin kontrolleri geçersiz kılma riskinin değerlendirilmesi, hile riski değerlendirmesinin bir parçasıdır. Yönetim kurulu veya denetim komitesi bu değerlendirmeyi denetler.", "cmt_en": "Assessing the risk of management override is part of the assessment of fraud risk. The board of directors or audit committee oversees this assessment."}, {"tr": "Uygunsuz gelir muhasebeleştirmesi.", "en": "Improper revenue recognition.", "cmt_tr": "Uygunsuz gelir muhasebeleştirmesinin hile riski olduğu varsayımı çürütülebilir. Ancak çürütme kanıtı belgelenmelidir.", "cmt_en": "The presumption that improper revenue recognition is a fraud risk is rebuttable. However, the evidence for the rebuttal must be documented."}, {"tr": "İşbirliği.", "en": "Collusion.", "cmt_tr": "İşbirliği hileyi gizlemenin bir aracıdır, tanımlanması gereken bir hile riski değildir.", "cmt_en": "Collusion is a means of concealing fraud, not a fraud risk required to be identified."}, {"tr": "Belgelerin tahrif edilmesi.", "en": "Falsification of documentation.", "cmt_tr": "Belgelerin tahrif edilmesi hileyi gizlemenin bir aracıdır, tanımlanması gereken bir hile riski değildir.", "cmt_en": "Falsification of documentation is a means of concealing fraud, not a fraud risk required to be identified."}], "answer": 0}], "SU3 - Fraud: Investigation": [{"q_tr": "Aşağıdakilerden hangisi iç denetçiye hile soruşturma yetkisi verir?", "q_en": "Which of the following gives the internal auditor the authority to investigate fraud?", "options": [{"tr": "Küresel İç Denetim Standartları.", "en": "The Global Internal Audit Standards.", "cmt_tr": "İç denetçi yalnızca soruşturma öneri yetkisine sahiptir.", "cmt_en": "The internal auditor has authority only to recommend an investigation."}, {"tr": "Genel hukuk.", "en": "Common law.", "cmt_tr": "İç denetçinin genel hukuk kapsamında yetkisi yoktur.", "cmt_en": "An internal auditor has no authority under common law."}, {"tr": "Yönetim.", "en": "Management.", "cmt_tr": "İç denetçilerin yürüttüğü herhangi bir hile soruşturması yönetim tarafından yetkilendirilmelidir.", "cmt_en": "Any fraud investigation undertaken by internal auditors must be authorized by management."}, {"tr": "İç denetim yetki belgesi.", "en": "The internal audit mandate.", "cmt_tr": "İç denetçi yalnızca soruşturma öneri yetkisine sahiptir.", "cmt_en": "The internal auditor has authority only to recommend an investigation."}], "answer": 2}, {"q_tr": "Hileden şüphelenilen bireyleri sorgulamak için kullanılan sorular nasıl olmalıdır?", "q_en": "Questions used to interrogate individuals suspected of fraud should", "options": [{"tr": "Önceden belirlenmiş bir sıraya uymalıdır.", "en": "Adhere to a predetermined order.", "cmt_tr": "Görüşme yapılan kişinin cevabı, bir sonraki planlanan soru sorulmadan önce sorulması gereken bir takip sorusu önerebilir.", "cmt_en": "The interviewee’s answer may suggest a follow-up question that should be asked before asking the next planned question."}, {"tr": "Birden fazla konu veya alanı kapsamalıdır.", "en": "Cover more than one subject or topic.", "cmt_tr": "Bu görüşme tekniği yanıtlayan için kafa karıştırıcı olabilir.", "cmt_en": "This interviewing technique may be confusing for the respondent."}, {"tr": "Genelden özele doğru ilerlemelidir.", "en": "Move from the general to the specific.", "cmt_tr": "İç denetçiler, insanlarla ilişki kurma ve etkili iletişim konusunda yetenekli olmalıdır. Örneğin bir hile görüşmesinde ilk sorular geniş kapsamlı olmalıdır. Dar odaklı soruları vurgulayan yönlendirici yaklaşımın aksine, bu yönlendirici olmayan yaklaşımın şüphe altındaki çalışanlardan açıklamalar ve beklenmedik gözlemler elde etme olasılığı daha yüksektir.", "cmt_en": "Internal auditors should be skilled in dealing with people and in communicating effectively. One important communications skill is the ability to conduct an effective interview. For example, initial questions in a fraud interview should be broad. In contrast with a directive approach emphasizing narrowly focused questions, this nondirective approach is more likely to elicit clarifications and unexpected observations from employees who are under suspicion."}, {"tr": "Bireyi istenen bir cevaba yönlendirmelidir.", "en": "Direct the individual to a desired answer.", "cmt_tr": "Sorgulayan, bir cevabı öne süren yönlendirici sorulardan kaçınmalıdır.", "cmt_en": "The interrogator should avoid leading questions, that is, questions that suggest an answer."}], "answer": 2}, {"q_tr": "Bir soruşturmayı tamamladıktan sonra iç denetim, bir çalışanın önemli miktarda nakit tahsilatı çaldığı sonucuna varmıştır. Bu gözleme ilişkin önerilen bildirimin taslağı kimin incelemesine sunulmalıdır?", "q_en": "After completing an investigation, internal auditing has concluded that an employee has stolen a significant amount of cash receipts. A draft of the proposed communication on this observation should be submitted for review to", "options": [{"tr": "Hukuk müşavirine.", "en": "Legal counsel.", "cmt_tr": "İç denetçi, suçlanan çalışanın kuruluşu dava edebileceği bir ifadenin eklenmesi (ve yayılması) olasılığını dikkate almalıdır. Bu nedenle hileye ilişkin önerilen nihai bildirimlerin taslağı hukuk müşavirine inceleme için sunulmalıdır.", "cmt_en": "The internal auditor must be concerned about the possibility of inclusion (and dissemination) of a statement for which the accused employee could sue the organization. Thus, a draft of the proposed final communications on fraud should be submitted to legal counsel for review. If the internal auditor wants to invoke client privilege, consideration should be given to addressing the report to legal counsel."}, {"tr": "Yönetim kuruluna.", "en": "The board.", "cmt_tr": "Yönetim kurulu, hukuk müşaviri tarafından incelenip onaylandıktan sonra raporun nihai taslağını almalıdır.", "cmt_en": "The board should receive a final draft of the report after it has been reviewed and approved by legal counsel."}, {"tr": "Kuruluşun genel müdürüne.", "en": "The chief executive officer of the organization.", "cmt_tr": "Uygunsa genel müdür, hukuk müşaviri tarafından incelenip onaylandıktan sonra raporun nihai taslağını alabilir.", "cmt_en": "If appropriate, the CEO may receive a final draft of the report after it has been reviewed and approved by legal counsel."}, {"tr": "Kuruluşun dış denetçilerine.", "en": "The organization’s outside auditors.", "cmt_tr": "Dış denetçilere tüm iç denetim raporlarının gönderilmesi geleneksel ise, hukuk müşaviri tarafından incelenip onaylanmış nihai taslağı almalıdırlar.", "cmt_en": "If it is customary to send the outside auditors copies of all internal auditing reports, they should receive a final draft that has been reviewed and approved by legal counsel."}], "answer": 0}, {"q_tr": "Bir denetçi, envanterin olduğundan fazla gösterilmesi ve böylece bir bölümün raporlanan kârlarının artırılması planını ortaya çıkarmıştır. Denetçi, bölüm müdürünün planı bildiğine ve onayladığına dair önemli kanıtlara sahiptir. Ayrıca müdürün planın uygulanmasından sorumlu olabileceğine dair bazı kanıtlar da vardır. Denetçi ne yapmalıdır?", "q_en": "An auditor uncovers a plan to overstate inventory and thereby increase reported profits for a division. The auditor has substantial evidence that the divisional manager was aware of and approved the plan to overstate inventory. There is also some evidence that the manager may have been responsible for the implementation of the plan. The auditor should", "options": [{"tr": "Kesin bir dava oluşturulana kadar astlarla görüşmelere devam etmek ve ardından davayı denetim komitesine bildirmek.", "en": "Continue to conduct interviews with subordinates until a definite case is made and then report the case to the audit committee.", "cmt_tr": "İç denetçi hilenin devam ettiğini belirlemiştir. Üst yönetimi ve denetim komitesini bilgilendirmeyi geciktirmek uygunsuz olurdu.", "cmt_en": "The internal auditor has determined that an act of fraud is underway. Delaying the act of informing senior management and the audit committee would be inappropriate."}, {"tr": "Bulguları üst yönetime ve denetim komitesine bildirmek ve olası daha fazla soruşturmayı tartışmak.", "en": "Inform senior management and the audit committee of the findings and discuss possible further investigation.", "cmt_tr": "İç denetçi bir hile eyleminin gerçekleştiğinden tatmin olduğunda, üst yönetime ve denetim komitesine bildirmek ve nasıl devam edileceğini belirlemek uygun eylemdir.", "cmt_en": "Once the internal auditor is satisfied that an act of fraud has occurred, informing senior management and the audit committee and determining how to proceed is the appropriate action."}, {"tr": "Bölüm müdürünü denetçinin şüpheleri hakkında bilgilendirmek ve konuyu daha fazla takip etmeden önce müdürün bulgulara ilişkin açıklamasını almak.", "en": "Inform the divisional manager of the auditor’s suspicions and obtain the manager’s explanation of the findings before pursuing the matter further.", "cmt_tr": "Denetçi bölüm müdürünün hileye dahil olabileceğine inanmak için gerekçeye sahiptir. Bu nedenle denetçinin şüpheleri daha üst düzey bir yönetime bildirilmelidir.", "cmt_en": "The auditor has reason to believe that the divisional manager may be involved in the fraud. Therefore, the auditor’s suspicions must be reported to a higher level of management."}, {"tr": "Davayı kapsamlı bir şekilde belgelemek ve şüpheleri daha fazla inceleme için dış denetçiye bildirmek.", "en": "Document the case thoroughly and report the suspicions to the external auditor for further review.", "cmt_tr": "Denetçinin şüphelerini dış taraflara bildirmek uygunsuz olur.", "cmt_en": "Reporting the auditor’s suspicions to outside parties is inappropriate."}], "answer": 1}, {"q_tr": "Hile soruşturmaları yürütürken iç denetçiler ne yapmalıdır?", "q_en": "When conducting fraud investigations, internal auditors should", "options": [{"tr": "Şüphelileri sorgularken iç denetçilerin hile hakkındaki bilgisinin kapsamını açıkça belirtmek.", "en": "Clearly indicate the extent of the internal auditors’ knowledge of the fraud when questioning suspects.", "cmt_tr": "Her zaman yedek ek kanıt olduğu izlenimini vererek, iç denetçilerin tam ve doğru cevaplar elde etme olasılığı daha yüksektir.", "cmt_en": "By always giving the impression that additional evidence is in reserve, the internal auditors are more apt to obtain complete and truthful answers."}, {"tr": "Mali yılın başında belirlenen görev takvimine uygun olarak soruşturmaya personel atamak.", "en": "Assign personnel to the investigation in accordance with the engagement schedule established at the beginning of the fiscal year.", "cmt_tr": "Hile soruşturmaları genellikle beklenmedik şekilde ortaya çıkar ve önceden planlanamaz. Ayrıca hile soruşturması, başka bir görev ertelenmesi gerekse bile uygun uzmanlığa sahip kişiler tarafından yürütülmelidir.", "cmt_en": "Fraud investigations usually occur unexpectedly and cannot be scheduled in advance. Also, the fraud investigation must be conducted by individuals having the appropriate expertise, even if another engagement must be delayed."}, {"tr": "Soruşturmayı, soruşturmaya dahil olan avukatlar, güvenlik personeli ve kuruluş dışından uzmanlardan bağımsız olarak yürütmek.", "en": "Perform its investigation independently of lawyers, security personnel, and specialists from outside the organization who are involved in the investigation.", "cmt_tr": "İç denetçiler faaliyetlerini yönetim, hukuk müşaviri ve diğer uzmanlarla koordine etmelidir.", "cmt_en": "The internal auditors should coordinate their activities with management, legal counsel, and other specialists."}, {"tr": "Kuruluş içindeki olası dahliyet düzeyini ve kapsamını değerlendirmek.", "en": "Assess the probable level of, and the extent of complicity in, the fraud within the organization.", "cmt_tr": "Hile soruşturmaları yürütürken, iç denetçiler veya diğerleri kuruluş içindeki hileye dahliyet düzeyini ve kapsamını değerlendirmelidir. Bu değerlendirme, (1) kritik kanıtların bozulmamasını veya yok edilmemesini ve (2) hileye dahil olabilecek kişilerden yanıltıcı bilgi alınmamasını sağlamak için kritik olabilir.", "cmt_en": "When conducting fraud investigations, internal auditors or others should assess the level of, and the extent of complicity in, the fraud within the organization. This assessment can be critical to ensuring that (1) crucial evidence is not tainted or destroyed and (2) misleading information is not obtained from persons who may be involved."}], "answer": 3}, {"q_tr": "Hile soruşturmasına ilişkin denetim görevi çalışma kağıdı belgelendirmesi hakkında aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is correct regarding audit engagement workpaper documentation for a fraud investigation?", "options": [{"tr": "Yalnızca suçlayıcı kanıtlar belgelenmelidir.", "en": "Only incriminating evidence should be documented.", "cmt_tr": "Önemli tüm tanıklık kanıtları, varılan sonuçlar için yeterli dayanak sağladığından emin olmak için gözden geçirilmelidir ve şüpheli failiyle yapılan görüşmeler varsa yazılı tutanaklar çalışma kağıtlarına dahil edilmelidir.", "cmt_en": "All important testimonial evidence should be reviewed to ensure that it provides a sufficient basis for the conclusions reached, and if interviews are held with a suspected perpetrator, written transcripts or statements should be included in the workpapers."}, {"tr": "Yalnızca tanıklık kanıtları belgelenmelidir.", "en": "Only testimonial evidence should be documented.", "cmt_tr": "Tüm suçlayıcı kanıtlar çalışma kağıtlarına dahil edilmelidir ve şüpheli failiyle yapılan görüşmeler varsa yazılı tutanaklar dahil edilmelidir.", "cmt_en": "All incriminating evidence should be included in the workpapers, and if interviews are held with a suspected perpetrator, written transcripts or statements should be included in the workpapers."}, {"tr": "Suçlayıcı kanıtlar ve önemli tanıklık kanıtları belgelenmeli, ancak görüşme tutanakları gizli olduğu için belgelenmemelidir.", "en": "Incriminating evidence and important testimonial evidence should be documented, but interview transcripts should not be documented because they are confidential.", "cmt_tr": "Tüm suçlayıcı kanıtlar çalışma kağıtlarına dahil edilmelidir.", "cmt_en": "All incriminating evidence should be included in the workpapers."}, {"tr": "Suçlayıcı kanıtlar, önemli tanıklık kanıtları ve şüpheli faillerle yapılan görüşme tutanakları belgelenmelidir.", "en": "Incriminating evidence, important testimonial evidence, and transcripts of interviews with suspected perpetrators should be documented.", "cmt_tr": "İç denetçiler, sonuçları ve görev sonuçlarını desteklemek için ilgili bilgileri belgelemelidir. Suçlayıcı kanıtlar, önemli tanıklık kanıtları ve şüpheli faillerle yapılan görüşmeler açıkça ilgilidir ve belgelenmelidir.", "cmt_en": "Internal auditors must document relevant information to support the conclusions and engagement results. Incriminating evidence, important testimonial evidence, and interviews with suspected perpetrators are clearly relevant and should be documented."}], "answer": 3}, {"q_tr": "İç denetim fonksiyonu, mali tabloların daha önce yayımlandığı 2 yıl boyunca mali durum ve faaliyet sonuçları üzerinde daha önce keşfedilmemiş önemli olumsuz bir etkiyi ortaya koyan bir hile soruşturmasını tamamlamıştır. İç denetim yöneticisi derhal kimi bilgilendirmelidir?", "q_en": "The internal audit function has concluded a fraud investigation that revealed a previously undiscovered materially adverse impact on the financial position and results of operations for 2 years on which financial statements have already been issued. The chief audit executive should immediately inform", "options": [{"tr": "Keşiften etkilenen mali tablolardan sorumlu dış denetim firmasını.", "en": "The external auditing firm responsible for the financial statements affected by the discovery.", "cmt_tr": "Yönetim dış denetçilerle iletişim kurmalıdır.", "cmt_en": "Management should communicate with the external auditors."}, {"tr": "Uygun devlet veya düzenleyici kurumu.", "en": "The appropriate governmental or regulatory agency.", "cmt_tr": "Yönetim devlet kurumlarıyla iletişim kurmalıdır.", "cmt_en": "Management should communicate with the governmental agencies."}, {"tr": "Üst yönetimi ve yönetim kurulunu.", "en": "Senior management and the board.", "cmt_tr": "İç denetim yöneticisi, önemli bir hile veya güven erozyonu olayını zamanında üst yönetime ve yönetim kuruluna bildirmekten sorumludur. Bu, mali tablolarının daha önce yayımlandığı bir veya daha fazla yıl boyunca mali durum ve faaliyet sonuçları üzerinde daha önce keşfedilmemiş önemli olumsuz etkiyi içerir.", "cmt_en": "The CAE is responsible for timely reporting of any incident of significant fraud or erosion of trust to senior management and the board. This includes a previously undiscovered materially adverse effect on the financial position and results of operations of an organization for 1 or more years on which financial statements have already been issued."}, {"tr": "Düzeltici yevmiye kayıtlarının yapılmasından nihai olarak sorumlu iç muhasebe fonksiyonunu.", "en": "The internal accounting function ultimately responsible for making corrective journal entries.", "cmt_tr": "Yönetim muhasebe fonksiyonuyla iletişim kurmalıdır.", "cmt_en": "Management should communicate with the accounting function."}], "answer": 2}, {"q_tr": "Bir iç denetçi üç kişiyle görüşme yapıyorsa ve bunlardan birinin hile işlediğinden şüpheleniliyorsa, aşağıdakilerden hangisi en az etkili yaklaşımdır?", "q_en": "If an internal auditor is interviewing three individuals, one of whom is suspected of committing a fraud, which of the following is the least effective approach?", "options": [{"tr": "Her bireyden kendi eylemlerini açıklayan yazılı bir ifade hazırlamasını istemek.", "en": "Ask each individual to prepare a written statement explaining the individual’s actions.", "cmt_tr": "Görüşme yapılan kişinin yazılı ifadesi, diğer kanıtlarla tutarsızlıklar açısından karşılaştırılabilecek veya daha fazla soruşturma için başlangıç noktaları sağlayabilecek olgu kabulleri sunar.", "cmt_en": "A written statement by the interviewee provides admissions of fact that may be compared with other evidence for possible inconsistencies or that may provide starting points for further investigation."}, {"tr": "Gerçeği arayan kişi rolünü üstlenmek.", "en": "Take the role of one seeking the truth.", "cmt_tr": "Görüşmeci objektif, duygusuz ve tehdit edici olmayan olmalıdır.", "cmt_en": "The interviewer should be objective, unemotional, and nonthreatening."}, {"tr": "Her görüşme yapılan kişinin söylediklerini dikkatle dinlemek.", "en": "Listen carefully to what each interviewee has to say.", "cmt_tr": "Etkili dinleme birçok durumda hayati bir iletişim becerisidir.", "cmt_en": "Effective listening is a vital communication skill in many situations."}, {"tr": "Şüpheli bireyin itiraf etmesini sağlamaya çalışmak.", "en": "Attempt to get the suspected individual to confess.", "cmt_tr": "İç denetçiler, potansiyel yasal sorumluluk ve uzmanlık eksikliği nedeniyle genellikle güvenlik uzmanlarına bırakmalıdır. İtiraf elde etmeye çalışmak tehdit edicidir, masumiyet karinesine aykırıdır ve görüşme yapılan kişinin güvenini kazanma olasılığı düşüktür.", "cmt_en": "Internal auditors often should defer to security specialists because of potential legal liability and their lack of expertise. An attempt to obtain a confession is threatening, contrary to the presumption of innocence, and not likely to gain the confidence of the interviewee."}], "answer": 3}, {"q_tr": "İç denetim yöneticisinin (CAE) bağlı olduğu başkan yardımcısının etik dışı iş davranışlarının olgusal belgelemesini elde ettikten sonra CAE ne yapmalıdır?", "q_en": "Upon obtaining factual documentation of unethical business conduct by the vice president to whom the chief audit executive (CAE) reports, the CAE should", "options": [{"tr": "Başkan yardımcısının etik dışı eylemlere katılımının kapsamını belirlemek için soruşturma yürütmek.", "en": "Conduct an investigation to determine the extent of the vice president’s involvement in the unethical acts.", "cmt_tr": "CAE, hile veya etik dışı iş davranışına ilişkin bulgularını üst yönetime ve yönetim kuruluna bildirir, onlar da uygun hareket tarzını belirler.", "cmt_en": "The CAE reports his or her findings with regard to fraud or unethical business conduct to senior management and the board, who then determine the appropriate course of action."}, {"tr": "Devam etmeden önce başkan yardımcısıyla olgulara ilişkin yüzleşmek.", "en": "Confront the vice president with the facts before proceeding.", "cmt_tr": "Üst yönetim ve yönetim kurulu uygun hareket tarzını belirler.", "cmt_en": "Senior management and the board determine the appropriate course of action."}, {"tr": "İlgili iş fonksiyonunun denetimini planlamak.", "en": "Schedule an audit of the business function involved.", "cmt_tr": "İç denetim fonksiyonu hile veya etik dışı iş davranışının gerçekleştiğini keşfettikten sonra CAE bu olguları üst yönetime ve yönetim kuruluna bildirir.", "cmt_en": "Once the internal audit function discovers that fraud or unethical business conduct has taken place, the CAE reports these facts to senior management and the board, who determine the appropriate course of action."}, {"tr": "Olguları genel müdüre ve denetim komitesine bildirmek.", "en": "Report the facts to the chief executive officer and the audit committee.", "cmt_tr": "İç denetim fonksiyonu hile veya etik dışı iş davranışının gerçekleştiğini keşfettikten sonra CAE bu olguları üst yönetime ve yönetim kuruluna bildirir.", "cmt_en": "After the internal audit function discovers that fraud or unethical business conduct has taken place, the CAE reports these facts to senior management and the board."}], "answer": 3}, {"q_tr": "Hileden şüphelenilen bir kişiyle görüşme yaparken, görüşmeci ne yapmalıdır?", "q_en": "When interviewing an individual suspected of fraud, the interviewer should", "options": [{"tr": "Görüşme sırasında şüphelinin amirinin hazır bulunmasını sağlamak.", "en": "Ensure the suspect’s supervisor is present during the interview.", "cmt_tr": "Şüphelinin amirinin varlığı, şüphelinin dürüst iletişimini engelleyebilir.", "cmt_en": "The presence of the suspect’s supervisor may inhibit honest communication on the suspect’s part."}, {"tr": "Görüşmeyi kimsenin kesintiye uğratmaması için kapıyı kilitlemek.", "en": "Lock the door to ensure no one will interrupt the interview.", "cmt_tr": "Hile görüşmesinin yapıldığı alan özel olmalıdır, ancak şüpheli hiç kimsenin yardımına gelemeyeceği bir odada olduğunu hissetmemelidir.", "cmt_en": "Although the area in which the fraud interview takes place should be private, the suspect should not feel that (s)he is in a room in which no one can come to his or her aid."}, {"tr": "Şüphelinin sözcük seçimlerine dikkat etmek.", "en": "Pay attention to the wording choices of the suspect.", "cmt_tr": "Sözcük seçimleriyle şüpheli farkında olmadan çok şey ortaya koyabilir. Edilgen çatının veya kişisel olmayan zamirlerin aşırı ve uygunsuz kullanımı konudan uzaklaşma arzusuna işaret edebilir.", "cmt_en": "Through his or her choice of words, a suspect can reveal much without meaning to. Excessive and/or inappropriate use of the passive voice or of impersonal pronouns may indicate a desire to be detached from the topic."}, {"tr": "Şüpheliye hileyi işleyip işlemediğini sormak.", "en": "Ask if the suspect committed the fraud.", "cmt_tr": "Şüpheliye doğrudan hileyi işleyip işlemediğini sormak uygun değildir. Sorgulayan, ilgili tüm olguları zaten bildiği izlenimini vermeli ve şüpheliye hileyi inkâr etme fırsatı vermemelidir.", "cmt_en": "Directly asking the suspect if (s)he committed the fraud is not appropriate. The questioner should appear confident that (s)he already has all the relevant facts and not provide the suspect with an opportunity to deny the fraud."}], "answer": 2}, {"q_tr": "Bir iç denetim yöneticisi (CAE), birkaç çalışanın masaüstü bilgisayarları kişisel kazanç için kullandığından şüphelenmektedir. Soruşturma yürütürken CAE'nin kuruluşun bilgi sistemleri denetçisi yerine adli bilgi sistemleri denetçisi görevlendirmeyi tercih etmesinin birincil nedeni, adli bilgi sistemleri denetçisinin sahip olacağı:", "q_en": "A chief audit executive (CAE) suspects that several employees have used desktop computers for personal gain. In conducting an investigation, the primary reason that the CAE chose to engage a forensic information systems auditor rather than using the organization’s information systems auditor is that a forensic information systems auditor would possess", "options": [{"tr": "Bilgisayar kullanımı ve kötüye kullanımının daha kapsamlı değerlendirmesini sağlayacak bilgi işlem sistemi bilgisi.", "en": "Knowledge of the computing system that would enable a more comprehensive assessment of the computer use and abuse.", "cmt_tr": "Kuruluşun bilgi sistemleri denetçisi muhtemelen adli denetçiden daha fazla kuruluşun bilgi işlem sistemleri bilgisine sahiptir.", "cmt_en": "The organization’s information systems auditor would probably have more knowledge of the organization’s computing systems than a forensic auditor."}, {"tr": "Mahkemede kabul edilebilir kanıt oluşturma bilgisi.", "en": "Knowledge of what constitutes evidence acceptable in a court of law.", "cmt_tr": "Adli denetimin ayırt edici özelliği mahkemede uzman tanık olarak ifade vermek için gerekli bilgidir. Adli denetçi diğer özelliklere de sahip olabilir, ancak kuruluşun bilgi sistemleri denetçisi de bu becerilere sahip olabilir.", "cmt_en": "The distinguishing characteristic of forensic auditing is the knowledge needed to testify as an expert witness in a court of law. Although a forensic auditor may possess the other attributes listed, the organization’s information systems auditor may also possess these skills or knowledge elements."}, {"tr": "Bilgisayar kötüye kullanımının belirlenmesini kolaylaştıracak üstün analitik beceriler.", "en": "Superior analytical skills that would facilitate the identification of computer abuse.", "cmt_tr": "Adli denetçi mutlaka kuruluşun denetçisinden üstün analitik becerilere sahip olmaz.", "cmt_en": "A forensic auditor would not necessarily have analytical skills that are superior to those of the organization’s auditor."}, {"tr": "Bulguların üst yönetime ve yönetim kuruluna sunumunu kolaylaştıracak üstün belgeleme ve organizasyon becerileri.", "en": "Superior documentation and organization skills that would facilitate in the presentation of findings to senior management and the board.", "cmt_tr": "Adli denetçi mutlaka kuruluşun denetçisinden üstün organizasyon becerilerine sahip olmaz.", "cmt_en": "A forensic auditor would not necessarily have organizational skills that are superior to those of the organization’s auditor."}], "answer": 1}, {"q_tr": "Adli denetim iç denetimden farklıdır çünkü adli denetim:", "q_en": "Forensic auditing differs from internal auditing because forensic auditing", "options": [{"tr": "Soruşturma becerilerine daha fazla dayanır.", "en": "Relies more heavily on investigative skills.", "cmt_tr": "Adli denetim, hukuki veya cezai sonuçları olan konularda muhasebe ve denetim bilgi ve becerilerinin kullanılmasıdır. Hile, dava desteği ve uzman tanıklığı içeren görevler buna örnektir. Adli denetim soruşturma ve muhasebe becerileri gerektirir. Soruşturma becerileri adli denetimi iç denetimden ayırır.", "cmt_en": "Forensic auditing is the use of accounting and auditing knowledge and skills in matters having civil or criminal legal implications. Engagements involving fraud, litigation support, and expert witness testimony are examples. Forensic auditing requires investigative and accounting skills. The investigative skills are required to collect, analyze, and evaluate financial evidence. These skills differentiate forensic auditing from internal auditing."}, {"tr": "Hata belirleme ve önlemeye odaklanır.", "en": "Focuses on error identification and prevention.", "cmt_tr": "İç denetim, adli denetim değil, hata belirleme ve önlemeye odaklanır.", "cmt_en": "Internal auditing, not forensic auditing, focuses on error identification and prevention."}, {"tr": "Hukuki konulara daha az yoğunlaşır.", "en": "Concentrates less on legal issues.", "cmt_tr": "Adli denetim, denetim prosedürleriyle toplanan muhasebe olgularını hukuki sorunlara uygular. Bu nedenle hukuki konulara yoğun biçimde odaklanır.", "cmt_en": "Forensic auditing applies accounting facts gathered through auditing procedures to legal problems. Thus, forensic auditing focuses heavily on legal issues."}, {"tr": "İletişim becerilerine daha az önem verir.", "en": "Places less emphasis on communication skills.", "cmt_tr": "Hem adli hem de iç denetim yazılı ve sözlü iletişim becerileri gerektirse de, bu beceriler adli denetimde daha kritiktir.", "cmt_en": "Although both forensic and internal auditing require written and oral communication skills, these skills are more critical in forensic auditing."}], "answer": 0}, {"q_tr": "Bir hile soruşturmasına ilişkin nihai bildirimi yayımlamadan önce, iç denetçi önerilen taslağı kimin incelemesine sunmalıdır?", "q_en": "Prior to issuing a final communication on a fraud investigation, the internal auditor should submit a proposed draft for review by the", "options": [{"tr": "Kuruluşun hukuk müşavirine.", "en": "Organization’s legal counsel.", "cmt_tr": "Hileye ilişkin önerilen nihai bildirimlerin taslağı hukuk müşavirine inceleme için sunulmalıdır. İç denetçi müvekkil ayrıcalığını kullanmak istediğinde raporun hukuk müşavirine hitaben yazılması düşünülmelidir.", "cmt_en": "A draft of the proposed final communications on fraud should be submitted to legal counsel for review. When the internal auditor wants to invoke client privilege, consideration should be given to addressing the report to legal counsel."}, {"tr": "Görev müşterisinin yönetimine.", "en": "Engagement client’s management.", "cmt_tr": "Tanımlanabilir bir denetim muhatabı her zaman mevcut değildir ve böyle bir muhatabın incelemesi her zaman uygun değildir.", "cmt_en": "An identifiable auditee does not always exist, and review by such auditee is not always appropriate."}, {"tr": "Kuruluşun halkla ilişkiler departmanına.", "en": "Organization’s public relations department.", "cmt_tr": "Nihai bildiri tamamlanmadığında tanıtım uygun değildir.", "cmt_en": "Publicity is inappropriate when the final communication has not been completed."}, {"tr": "Yönetim kuruluna.", "en": "Board.", "cmt_tr": "Yönetim kurulu, önerilen taslağı değil nihai bildirimi almalıdır.", "cmt_en": "The board should receive the final communication, not the proposed draft. Fact Pattern: An internal auditor is performing an operational engagement at a division and observes that an unusually large quantity of goods is on hand in the shipping and materials rework areas. The items are labeled as re-ship items. Upon inquiry the internal auditor is told that these are goods that have been returned by customers and have either been repaired and shipped back to the original customer or repaired and shipped out as new products because they are fully warranted."}], "answer": 0}, {"q_tr": "Sonraki soruşturmanın, daha önce yayımlanan mali tabloların uygunsuz gelir muhasebeleştirmesi nedeniyle önemli ölçüde yanlış beyan edildiğini ortaya koyduğunu varsayın. İç denetçinin bir sonraki adımı ne olmalıdır?", "q_en": "Assume that subsequent investigation shows that previously issued financial statements were materially misstated due to the improper recognition of sales. The internal auditor’s next step should be to", "options": [{"tr": "Dış denetçiyi ve bölüm müdürünü derhal bilgilendirmek.", "en": "Immediately inform the external auditor and the divisional manager.", "cmt_tr": "Denetçi üst yönetimi, yönetim kurulunu ve denetim komitesini bilgilendirmelidir.", "cmt_en": "The auditor should inform senior management, the board, and the audit committee."}, {"tr": "Ön gözlemi bölüm yönetimine bildirmek, ancak yönetim kurulunu bilgilendirmek için resmi bir görev bildiriminin yayımlanmasını beklemek.", "en": "Inform divisional management of the preliminary observation, but wait until a formal engagement communication is issued to inform the board.", "cmt_tr": "Denetçi üst yönetimi, yönetim kurulunu ve denetim komitesini bilgilendirmelidir.", "cmt_en": "The auditor should inform senior management, the board, and the audit committee."}, {"tr": "Dış denetçiyi, üst yönetimi ve yönetim kurulunu bilgilendirmek.", "en": "Inform the external auditor, senior management, and the board.", "cmt_tr": "Denetçi üst yönetimi, yönetim kurulunu ve denetim komitesini bilgilendirmelidir.", "cmt_en": "The auditor should inform senior management, the board, and the audit committee."}, {"tr": "Üst yönetimi ve yönetim kurulunu bilgilendirmek.", "en": "Inform senior management and the board.", "cmt_tr": "Bir hile soruşturmasının sonuçları, hilenin mali tablolarının daha önce yayımlandığı bir veya daha fazla yıl boyunca mali durum ve faaliyet sonuçları üzerinde daha önce keşfedilmemiş önemli olumsuz bir etkisi olduğunu gösterebilir. İç denetçiler bu keşfi uygun yönetime ve yönetim kurulunun denetim komitesine bildirmelidir.", "cmt_en": "The results of a fraud investigation may indicate that fraud has had a previously undiscovered materially adverse effect on the financial position and results of operations of an organization for 1 or more years on which financial statements have already been issued. Internal auditors should inform appropriate management and the audit committee of the board of directors of such a discovery."}], "answer": 3}, {"q_tr": "Bir sözleşme incelemesi sırasında iç denetim yöneticisi (CAE), bir tedarikçiye ihale sürecinde haksız avantaj sağlandığından şüphelenmektedir. Şirketin genel müdürünün (CEO) tedarikçinin yönetim kurulu üyesi olduğunu öğrendikten sonra CAE nasıl devam etmelidir?", "q_en": "During a review of contracts, a chief audit executive (CAE) suspects that a supplier was given an unfair advantage in bidding on a contract. After learning that the chief executive officer (CEO) of the company is a member of the supplier’s board of directors, how should the CAE proceed?", "options": [{"tr": "CEO hariç üst yönetime taslak rapor sunmak.", "en": "Submit a draft report to senior management, excluding the CEO.", "cmt_tr": "CEO üst yönetimin bir üyesidir. Üst yönetimin diğer üyeleri hukuk müşaviri tarafından incelenip onaylanmış nihai raporu alabilir.", "cmt_en": "The CEO is a member of senior management. Other members of senior management may receive a final report that has been reviewed and approved by legal counsel."}, {"tr": "Yardım için kuruluşun dış denetçileriyle iletişime geçmek.", "en": "Contact the organization’s external auditors for assistance.", "cmt_tr": "Dış denetçilerle iletişime geçilmemelidir. Dış denetçilere hukuk müşaviri tarafından incelenip onaylanmış nihai rapor verilebilir.", "cmt_en": "External auditors should not be contacted. External auditors may be given a final report that has been reviewed and approved by legal counsel."}, {"tr": "Destekleyici belgeleri elde etmek ve bulguyu denetim komitesi başkanına sunmak.", "en": "Obtain supporting documentation and present the finding to the chair of the audit committee.", "cmt_tr": "Çıkar çatışması, bir işlemde kuruluşu olumsuz etkileyen açıklanmamış kişisel ekonomik çıkardır. Üst düzey bir yöneticinin böyle bir çatışmasının varlığını belirledikten sonra CAE destekleyici belgeleri elde etmeli ve bulguyu denetim komitesi başkanına sunmalıdır.", "cmt_en": "A conflict of interest is an undisclosed, personal economic interest in a transaction that adversely affects the organization. After determining the existence of such a conflict on the part of a senior manager, the CAE should obtain supporting documentation and present the finding to the chair of the audit committee."}, {"tr": "Yönetim kurulunu derhal bilgilendirmek.", "en": "Immediately notify the board of directors.", "cmt_tr": "CAE denetim komitesini veya yönetim kurulunu bilgilendirmeden önce destekleyici belgeleri elde etmelidir.", "cmt_en": "The CAE should obtain supporting documentation before informing the audit committee or the board."}], "answer": 2}]};
const SHEETS = ["SU1 - Fraud: Risks and Types", "SU2 - Fraud: Controls", "SU3 - Fraud: Investigation"];
const SHORT_NAMES = {"SU1 - Fraud: Risks and Types": "SU1", "SU2 - Fraud: Controls": "SU2", "SU3 - Fraud: Investigation": "SU3"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

const LS_KEY = "cia_quiz_unit10";
const HISTORY_KEY = LS_KEY + "_history";
const MAX_HISTORY = 5;

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  // Skip chapters with 0 questions (can happen in mistakes modes)
  while (ci < SHEETS.length && QUIZ[SHEETS[ci]].length === 0) { ci++; }
  if (ci >= SHEETS.length) { showOverall(); return; }
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  if (!qs || qs.length === 0 || curQ >= qs.length) { showChapterSummary(); return; }
  const q    = qs[curQ];
  if (!q) { showChapterSummary(); return; }
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  // Save history entry when quiz is fully completed
  if (!MISTAKES_MODE && !HISTORY_MISTAKES_MODE) {
    saveHistory();
  }

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function updateLangBtns(l) {
  document.querySelectorAll('#lang-group .lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
}

function setLang(l) {
  lang = l;
  updateLangBtns(l);
  if(!quizStarted) {
    const desc = document.getElementById("welcome-desc");
    if(desc && desc.dataset[l]) desc.textContent = desc.dataset[l];
    return;
  }
  updateProgress();
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}


// ── MISTAKES MODE ─────────────────────────────────────────────────────────────
const MISTAKES_MODE = new URLSearchParams(window.location.search).get('mode') === 'mistakes';

if (MISTAKES_MODE) {
  (function() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) { window.location.href = window.location.pathname; return; }
      const data = JSON.parse(raw);
      const sa = data.answered || [];
      const sc = data.correctArr || [];

      // Filter QUIZ to only incorrectly answered questions
      let offset = 0;
      let totalMistakes = 0;
      SHEETS.forEach(sname => {
        const orig = QUIZ[sname];
        const keep = [];
        for (let i = 0; i < orig.length; i++) {
          if (sa[offset + i] && !sc[offset + i]) {
            orig[i]._chosen = undefined;
            keep.push(orig[i]);
          }
        }
        offset += orig.length;
        QUIZ[sname] = keep;
        totalMistakes += keep.length;
      });

      if (totalMistakes === 0) { window.location.href = window.location.pathname; return; }

      // Don't overwrite original progress
      saveProgress = function() {};
      clearProgress = function() {};

      // Update UI for mistakes mode
      const appTitle = document.getElementById("app-title");
      if (appTitle) appTitle.textContent += " — Səhvlər";

      const welc = document.getElementById("welcome");
      if (welc) {
        const h1 = welc.querySelector("h1");
        if (h1) h1.innerHTML = `Səhv Suallar<br><span style="color:var(--gold);font-size:.65em">${appTitle ? appTitle.textContent : ''}</span>`;
        const desc = document.getElementById("welcome-desc");
        if (desc) desc.textContent = totalMistakes + (lang === "tr" ? " səhv sual — yenidən işlə" : " wrong answers — retry them");
        // Update stats
        const statsItems = welc.querySelectorAll(".ws-num");
        if (statsItems.length >= 2) {
          statsItems[0].textContent = SHEETS.filter(s => QUIZ[s].length > 0).length;
          statsItems[1].textContent = totalMistakes;
          if (statsItems[2]) statsItems[2].textContent = totalMistakes * 4;
        }
        // Change buttons
        const mainBtn = document.getElementById("btn-main-start");
        if (mainBtn) mainBtn.textContent = lang === "tr" ? "▶ Səhvləri İşlə" : "▶ Retry Mistakes";
        const freshBtn = document.getElementById("btn-fresh-start");
        if (freshBtn) freshBtn.style.display = "none";
      }

      // Override startOrResume to skip loading saved progress (we already filtered)
      const _origStartOrResume = startOrResume;
      startOrResume = function() {
        initState();
        quizStarted = true;
        document.getElementById("welcome").style.display = "none";
        document.getElementById("chapters-scroll").style.display = "";
        document.getElementById("overall-result").className = "";
        buildChapterTabs();
        goToChapter(0);
      };

      // Override goToMenu to go back without ?mode
      goToMenu = function() { window.location.href = "quiz_menu.html"; };

    } catch(e) { console.error("Mistakes mode error:", e); }
  })();
}


// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
  // Render history on welcome screen
  renderHistory();
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
// ── HISTORY SYSTEM ──────────────────────────────────────────────────────────
function saveHistory() {
  try {
    const tc = totalCorrect();
    const ta = totalAnswered();
    const tq = totalQuestions();
    const pct = tq ? Math.round(tc/tq*100) : 0;

    const chapters = SHEETS.map((sname, ci) => {
      const s = getChapterStats(ci);
      return { name: sname, correct: s.c, wrong: s.t - s.c, total: s.total };
    });

    const mistakeIndices = [];
    for (let i = 0; i < answered.length; i++) {
      if (answered[i] && !correctArr[i]) mistakeIndices.push(i);
    }

    const entry = {
      date: new Date().toISOString(),
      correct: tc,
      wrong: ta - tc,
      total: tq,
      pct: pct,
      chapters: chapters,
      mistakeIndices: mistakeIndices
    };

    let history = [];
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) history = JSON.parse(raw);
    } catch(e) {}

    history.unshift(entry);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) { console.error("saveHistory error:", e); }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function renderHistory() {
  const area = document.getElementById("history-area");
  if (!area) return;
  const history = loadHistory();
  if (history.length === 0) { area.innerHTML = ""; return; }

  const circ = 2 * Math.PI * 18;
  const titleText = lang === "tr" ? "Tarixçə" : "History";

  let html = `<div class="history-title">${titleText}</div>`;

  history.forEach((entry, idx) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(lang === "tr" ? "az-AZ" : "en-US", {
      day: "numeric", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    const fill = circ * (1 - entry.pct / 100);
    const ringColor = entry.pct >= 75 ? "var(--correct)" : entry.pct >= 50 ? "var(--gold)" : "var(--wrong)";
    const hasMistakes = entry.mistakeIndices && entry.mistakeIndices.length > 0;
    const mistakeCount = hasMistakes ? entry.mistakeIndices.length : 0;
    const retryLabel = lang === "tr"
      ? `${mistakeCount} səhv — təkrarla`
      : `${mistakeCount} wrong — retry`;

    html += `
      <div class="history-card">
        <div class="hc-ring">
          <svg viewBox="0 0 44 44">
            <circle class="hc-ring-track" cx="22" cy="22" r="18"/>
            <circle class="hc-ring-fill" cx="22" cy="22" r="18"
              stroke="${ringColor}"
              stroke-dasharray="${circ}" stroke-dashoffset="${fill}"/>
          </svg>
          <div class="hc-ring-label">${entry.pct}%</div>
        </div>
        <div class="hc-info">
          <div class="hc-date">${dateStr}</div>
          <div class="hc-stats">
            <span class="hc-correct">✓ ${entry.correct}</span> ·
            <span class="hc-wrong">✗ ${entry.wrong}</span> ·
            ${entry.total} ${lang === "tr" ? "sual" : "Q"}
          </div>
        </div>
        ${hasMistakes ? `<div class="hc-actions">
          <button class="hc-retry-btn" onclick="retryHistoryMistakes(${idx})">
            ${retryLabel}
          </button>
        </div>` : `<div class="hc-actions" style="font-size:11px;color:var(--correct);font-weight:700">✓ ${lang==="tr"?"Mükəmməl":"Perfect"}</div>`}
      </div>`;
  });

  area.innerHTML = html;
}

function retryHistoryMistakes(histIdx) {
  try {
    const history = loadHistory();
    if (!history[histIdx]) return;
    const entry = history[histIdx];
    const mistakeIndices = new Set(entry.mistakeIndices || []);
    if (mistakeIndices.size === 0) return;

    localStorage.setItem(HISTORY_KEY + "_retry", JSON.stringify(entry.mistakeIndices));
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    window.location.href = baseUrl + "?mode=history_mistakes";
  } catch(e) { console.error("retryHistoryMistakes error:", e); }
}
