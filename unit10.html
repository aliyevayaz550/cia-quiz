{"tr": "Pressure.", "en": "Pressure.", "cmt_tr": "Pressure relates to motive and cannot be mitigated by controls.", "cmt_en": "Pressure relates to motive and cannot be mitigated by controls."}, {"tr": "Opportunity.", "en": "Opportunity.", "cmt_tr": "The opportunity for individuals to perpetrate a fraud can be mitigated by proper controls. Examples are appropriate oversight, segregation of duties, and the audit process itself.", "cmt_en": "The opportunity for individuals to perpetrate a fraud can be mitigated by proper controls. Examples are appropriate oversight, segregation of duties, and the audit process itself."}], "answer": 3}, {"q_tr": "Which of the following circumstances would an auditor most likely consider a risk factor relating to misstatements arising from fraudulent financial reporting?", "q_en": "Which of the following circumstances would an auditor most likely consider a risk factor relating to misstatements arising from fraudulent financial reporting?", "options": [{"tr": "Several members of management have recently purchased additional shares of the entity’s stock.", "en": "Several members of management have recently purchased additional shares of the entity’s stock.", "cmt_tr": "Managers routinely buy their company’s stock.", "cmt_en": "Managers routinely buy their company’s stock."}, {"tr": "Several members of the board of directors have recently sold shares of the entity’s stock.", "en": "Several members of the board of directors have recently sold shares of the entity’s stock.", "cmt_tr": "Sales of shares reduce the directors’ financial interests in the entity.", "cmt_en": "Sales of shares reduce the directors’ financial interests in the entity."}, {"tr": "The entity distributes financial forecasts to financial analysts that predict conservative operating results.", "en": "The entity distributes financial forecasts to financial analysts that predict conservative operating results.", "cmt_tr": "Conservative forecasts reduce, rather than increase, pressure on management to manipulate financial results.", "cmt_en": "Conservative forecasts reduce, rather than increase, pressure on management to manipulate financial results."}, {"tr": "Management is interested in maintaining the entity’s earnings trend by using aggressive accounting practices.", "en": "Management is interested in maintaining the entity’s earnings trend by using aggressive accounting practices.", "cmt_tr": "Fraud risk factors relate to misstatements arising from (1) fraudulent financial reporting and (2) misappropriation of assets. Each of these categories may be further classified according to the three conditions that ordinarily exist when fraud occurs: (1) incentives or pressures, (2) opportunities, and (3) attitudes or rationalizations. For example, excessive pressure may exist to meet the expectations of third parties (e.g., analysts, investors, and creditors) regarding profitability or trends.", "cmt_en": "Fraud risk factors relate to misstatements arising from (1) fraudulent financial reporting and (2) misappropriation of assets. Each of these categories may be further classified according to the three conditions that ordinarily exist when fraud occurs: (1) incentives or pressures, (2) opportunities, and (3) attitudes or rationalizations. For example, excessive pressure may exist to meet the expectations of third parties (e.g., analysts, investors, and creditors) regarding profitability or trends."}], "answer": 3}, {"q_tr": "Which of the following is considered a fraudulent activity?", "q_en": "Which of the following is considered a fraudulent activity?", "options": [{"tr": "A mistake in gathering or processing accounting data from which financial statements are prepared.", "en": "A mistake in gathering or processing accounting data from which financial statements are prepared.", "cmt_tr": "A mistake is not intentional. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "A mistake is not intentional. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "An incorrect accounting estimate arising from oversight or misinterpretation of facts.", "en": "An incorrect accounting estimate arising from oversight or misinterpretation of facts.", "cmt_tr": "An unintentionally incorrect accounting estimate is not fraud.", "cmt_en": "An unintentionally incorrect accounting estimate is not fraud."}, {"tr": "Misappropriation of assets.", "en": "Misappropriation of assets.", "cmt_tr": "Fraud is an intentional act involving the use of deception that results in misstatement of the financial statements. Two types of fraud that are relevant to the auditor are (1) misstatements arising from fraudulent financial reporting and (2) misstatements arising from misappropriation of assets.", "cmt_en": "Fraud is an intentional act involving the use of deception that results in misstatement of the financial statements. Two types of fraud that are relevant to the auditor are (1) misstatements arising from fraudulent financial reporting and (2) misstatements arising from misappropriation of assets."}, {"tr": "A mistake in the application of accounting principles relating to amount, classification, manner of presentation, or disclosure.", "en": "A mistake in the application of accounting principles relating to amount, classification, manner of presentation, or disclosure.", "cmt_tr": "Fraud is intentional. Mistakes are not. Fact Pattern: Management discovers that a supervisor at one of its restaurant locations removes excess cash and resets sales totals throughout the day on the point-of-sale (POS) system. At closing, the supervisor deposits cash equal to the recorded sales on the POS system and keeps the rest. The supervisor forwards the close-of-day POS reports from the POS system along with a copy of the bank deposit slip to the company’s revenue accounting department. The revenue accounting department records the sales and the cash for the location in the general ledger and verifies the deposit slip to the bank statement. Any differences between sales and deposits are recorded in an over/short account and, if necessary, followed up with the location supervisor. The customer food order checks are serially numbered, and it is the supervisor’s responsibility to see that they are accounted for at the end of each day. Customer checks and the transaction journal tapes from the POS system are kept by the supervisor for 1 week at the location and then destroyed.", "cmt_en": "Fraud is intentional. Mistakes are not. Fact Pattern: Management discovers that a supervisor at one of its restaurant locations removes excess cash and resets sales totals throughout the day on the point-of-sale (POS) system. At closing, the supervisor deposits cash equal to the recorded sales on the POS system and keeps the rest. The supervisor forwards the close-of-day POS reports from the POS system along with a copy of the bank deposit slip to the company’s revenue accounting department. The revenue accounting department records the sales and the cash for the location in the general ledger and verifies the deposit slip to the bank statement. Any differences between sales and deposits are recorded in an over/short account and, if necessary, followed up with the location supervisor. The customer food order checks are serially numbered, and it is the supervisor’s responsibility to see that they are accounted for at the end of each day. Customer checks and the transaction journal tapes from the POS system are kept by the supervisor for 1 week at the location and then destroyed."}], "answer": 2}, {"q_tr": "Which of the following controls allowed the fraud to occur?", "q_en": "Which of the following controls allowed the fraud to occur?", "options": [{"tr": "The accounting for customer food checks by the supervisor.", "en": "The accounting for customer food checks by the supervisor.", "cmt_tr": "An inappropriate segregation of duties existed because the supervisor was responsible for accounting for customer food checks and depositing receipts and had the ability to reset POS totals throughout the day.", "cmt_en": "An inappropriate segregation of duties existed because the supervisor was responsible for accounting for customer food checks and depositing receipts and had the ability to reset POS totals throughout the day."}, {"tr": "The deposit of cash receipts by the supervisor.", "en": "The deposit of cash receipts by the supervisor.", "cmt_tr": "The depositing of receipts by the supervisor is not the problem. The supervisor’s access to cash and ability to reset POS totals throughout the day allowed the fraud.", "cmt_en": "The depositing of receipts by the supervisor is not the problem. The supervisor’s access to cash and ability to reset POS totals throughout the day allowed the fraud."}, {"tr": "The matching of the bank deposit slips to the bank statement by revenue accounting.", "en": "The matching of the bank deposit slips to the bank statement by revenue accounting.", "cmt_tr": "An independent verification of the deposits made by the supervisor is appropriate. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "An independent verification of the deposits made by the supervisor is appropriate. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}, {"tr": "The forwarding of the close-of-day POS reports to revenue accounting.", "en": "The forwarding of the close-of-day POS reports to revenue accounting.", "cmt_tr": "The forwarding of the close-of-day POS reports to revenue accounting is a step in the process of independently verifying sales. Fact Pattern: Management discovers that a supervisor at one of its restaurant locations removes excess cash and resets sales totals throughout the day on the point-of-sale (POS) system. At closing, the supervisor deposits cash equal to the recorded sales on the POS system and keeps the rest. The supervisor forwards the close-of-day POS reports from the POS system along with a copy of the bank deposit slip to the company’s revenue accounting department. The revenue accounting department records the sales and the cash for the location in the general ledger and verifies the deposit slip to the bank statement. Any differences between sales and deposits are recorded in an over/short account and, if necessary, followed up with the location supervisor. The customer food order checks are serially numbered, and it is the supervisor’s responsibility to see that they are accounted for at the end of each day. Customer checks and the transaction journal tapes from the POS system are kept by the supervisor for 1 week at the location and then destroyed.", "cmt_en": "The forwarding of the close-of-day POS reports to revenue accounting is a step in the process of independently verifying sales. Fact Pattern: Management discovers that a supervisor at one of its restaurant locations removes excess cash and resets sales totals throughout the day on the point-of-sale (POS) system. At closing, the supervisor deposits cash equal to the recorded sales on the POS system and keeps the rest. The supervisor forwards the close-of-day POS reports from the POS system along with a copy of the bank deposit slip to the company’s revenue accounting department. The revenue accounting department records the sales and the cash for the location in the general ledger and verifies the deposit slip to the bank statement. Any differences between sales and deposits are recorded in an over/short account and, if necessary, followed up with the location supervisor. The customer food order checks are serially numbered, and it is the supervisor’s responsibility to see that they are accounted for at the end of each day. Customer checks and the transaction journal tapes from the POS system are kept by the supervisor for 1 week at the location and then destroyed."}], "answer": 0}, {"q_tr": "Which of the following audit procedures would have detected the fraud?", "q_en": "Which of the following audit procedures would have detected the fraud?", "options": [{"tr": "Flowcharting the controls over the verification of bank deposits.", "en": "Flowcharting the controls over the verification of bank deposits.", "cmt_tr": "The fraud involved receipts, not deposits.", "cmt_en": "The fraud involved receipts, not deposits."}, {"tr": "Comparing a sample of the close-of-day POS reports to copies of the bank deposit slips.", "en": "Comparing a sample of the close-of-day POS reports to copies of the bank deposit slips.", "cmt_tr": "The fraud involved altering the amounts on the close-of-day POS reports by resetting the POS system totals to zero.", "cmt_en": "The fraud involved altering the amounts on the close-of-day POS reports by resetting the POS system totals to zero."}, {"tr": "On a test basis, verifying that the serial-numbered customer food checks are accounted for.", "en": "On a test basis, verifying that the serial-numbered customer food checks are accounted for.", "cmt_tr": "The accounting for individual customer food checks would not have detected the fraud. It did not involve manipulation of these documents.", "cmt_en": "The accounting for individual customer food checks would not have detected the fraud. It did not involve manipulation of these documents."}, {"tr": "For selected days, reconciling the total of customer food checks to daily bank deposits.", "en": "For selected days, reconciling the total of customer food checks to daily bank deposits.", "cmt_tr": "Using the total of the customer food checks as a confirmation of sales would have detected the shortage in the bank deposit. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types", "cmt_en": "Using the total of the customer food checks as a confirmation of sales would have detected the shortage in the bank deposit. Study Unit 10: Fraud Risks | Subunit 1: Fraud -- Risks and Types"}], "answer": 3}, {"q_tr": "When an entity uses a trust company as custodian of its trading securities, the possibility of concealing fraud most likely will be reduced if the", "q_en": "When an entity uses a trust company as custodian of its trading securities, the possibility of concealing fraud most likely will be reduced if the", "options": [{"tr": "Trust company has no direct contact with the entity employees responsible for maintaining investment accounting records.", "en": "Trust company has no direct contact with the entity employees responsible for maintaining investment accounting records.", "cmt_tr": "To conceal fraud related to trading securities, collusion between those responsible for record keeping and custody is required. The possibility of collusion is reduced if no direct contact between responsible parties exists.", "cmt_en": "To conceal fraud related to trading securities, collusion between those responsible for record keeping and custody is required. The possibility of collusion is reduced if no direct contact between responsible parties exists."}, {"tr": "Securities are registered in the name of the trust company rather than the entity itself.", "en": "Securities are registered in the name of the trust company rather than the entity itself.", "cmt_tr": "The securities should be registered in the name of the owner.", "cmt_en": "The securities should be registered in the name of the owner."}, {"tr": "Interest and dividend checks are mailed directly to an entity employee who is authorized to sell securities.", "en": "Interest and dividend checks are mailed directly to an entity employee who is authorized to sell securities.", "cmt_tr": "Interest and dividends should be sent to the trust company custodian.", "cmt_en": "Interest and dividends should be sent to the trust company custodian."}, {"tr": "Trust company places the securities in a bank safe-deposit vault under the custodian’s exclusive control.", "en": "Trust company places the securities in a bank safe-deposit vault under the custodian’s exclusive control.", "cmt_tr": "Use of a bank safe-deposit vault under the custodian’s exclusive control is an appropriate control but does not minimize the possibility of collusion.", "cmt_en": "Use of a bank safe-deposit vault under the custodian’s exclusive control is an appropriate control but does not minimize the possibility of collusion."}], "answer": 0}], "SU2 - Fraud: Controls": [{"q_tr": "Internal auditors have a responsibility for helping to deter fraud. Which of the following best describes how this responsibility is usually met?", "q_en": "Internal auditors have a responsibility for helping to deter fraud. Which of the following best describes how this responsibility is usually met?", "options": [{"tr": "By coordinating with security personnel and law enforcement agencies in the investigation of possible frauds.", "en": "By coordinating with security personnel and law enforcement agencies in the investigation of possible frauds.", "cmt_tr": "Investigating possible frauds involves detection, not deterrence.", "cmt_en": "Investigating possible frauds involves detection, not deterrence."}, {"tr": "By testing for fraud in every engagement and following up as appropriate.", "en": "By testing for fraud in every engagement and following up as appropriate.", "cmt_tr": "Testing for fraud in every engagement is not required.", "cmt_en": "Testing for fraud in every engagement is not required."}, {"tr": "By assisting in the design of control systems to prevent fraud.", "en": "By assisting in the design of control systems to prevent fraud.", "cmt_tr": "Designing control systems impairs an internal auditor’s objectivity.", "cmt_en": "Designing control systems impairs an internal auditor’s objectivity."}, {"tr": "By evaluating the adequacy and effectiveness of controls in light of the potential exposure or risk.", "en": "By evaluating the adequacy and effectiveness of controls in light of the potential exposure or risk.", "cmt_tr": "Control is the principal means of preventing fraud. Management is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks.", "cmt_en": "Control is the principal means of preventing fraud. Management is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks."}], "answer": 3}, {"q_tr": "During an engagement involving the purchasing department, an internal auditor learned that one vendor rewarded buyers in proportion to the size of the orders received. What recommendation should the internal auditor make to reduce the likelihood of future acceptance of such rewards by the buyers?", "q_en": "During an engagement involving the purchasing department, an internal auditor learned that one vendor rewarded buyers in proportion to the size of the orders received. What recommendation should the internal auditor make to reduce the likelihood of future acceptance of such rewards by the buyers?", "options": [{"tr": "Establishing an employee counseling program.", "en": "Establishing an employee counseling program.", "cmt_tr": "Counseling is unlikely to change the behavior of dishonest employees.", "cmt_en": "Counseling is unlikely to change the behavior of dishonest employees."}, {"tr": "Periodic review of buyer lifestyles.", "en": "Periodic review of buyer lifestyles.", "cmt_tr": "Such review is a detective control that would not uncover fraud unless a lifestyle change occurred.", "cmt_en": "Such review is a detective control that would not uncover fraud unless a lifestyle change occurred."}, {"tr": "A policy of identifying and reducing buyer situational pressures.", "en": "A policy of identifying and reducing buyer situational pressures.", "cmt_tr": "Situational pressures external to the organization may be beyond its control. Pressures within the organization, e.g., to improve performance, should not cause a buyer to take bribes from vendors.", "cmt_en": "Situational pressures external to the organization may be beyond its control. Pressures within the organization, e.g., to improve performance, should not cause a buyer to take bribes from vendors."}, {"tr": "A strong, written statement of management’s commitment to organizational ethics.", "en": "A strong, written statement of management’s commitment to organizational ethics.", "cmt_tr": "A strong commitment by management to ethical conduct reflected in its written policies, Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls personnel practices, interest in effective control, etc., will foster creation of the appropriate environment.", "cmt_en": "A strong commitment by management to ethical conduct reflected in its written policies, Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls personnel practices, interest in effective control, etc., will foster creation of the appropriate environment."}], "answer": 3}, {"q_tr": "Which of the following describes one of the responsibilities of the internal auditor for the deterrence of fraud in an organization?", "q_en": "Which of the following describes one of the responsibilities of the internal auditor for the deterrence of fraud in an organization?", "options": [{"tr": "Implementation of systems to discourage fraud.", "en": "Implementation of systems to discourage fraud.", "cmt_tr": "Implementing systems is an operating function for which management is responsible.", "cmt_en": "Implementing systems is an operating function for which management is responsible."}, {"tr": "Prosecuting perpetrators of fraud.", "en": "Prosecuting perpetrators of fraud.", "cmt_tr": "Prosecuting perpetrators of fraud is a responsibility of management.", "cmt_en": "Prosecuting perpetrators of fraud is a responsibility of management."}, {"tr": "Reporting suspected fraud to law enforcement personnel.", "en": "Reporting suspected fraud to law enforcement personnel.", "cmt_tr": "Reporting suspected fraud to law enforcement personnel is a responsibility of management.", "cmt_en": "Reporting suspected fraud to law enforcement personnel is a responsibility of management."}, {"tr": "Evaluating the adequacy of controls to prevent fraud.", "en": "Evaluating the adequacy of controls to prevent fraud.", "cmt_tr": "Control is the principal means of preventing fraud. Management, in turn, is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks.", "cmt_en": "Control is the principal means of preventing fraud. Management, in turn, is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks."}], "answer": 3}, {"q_tr": "A significant employee fraud took place shortly after an internal auditing engagement. The internal auditor may not have properly fulfilled the responsibility for the prevention of fraud by failing to note and report that", "q_en": "A significant employee fraud took place shortly after an internal auditing engagement. The internal auditor may not have properly fulfilled the responsibility for the prevention of fraud by failing to note and report that", "options": [{"tr": "Policies, practices, and procedures to monitor activities and safeguard assets were less extensive in low-risk areas than in high-risk areas.", "en": "Policies, practices, and procedures to monitor activities and safeguard assets were less extensive in low-risk areas than in high-risk areas.", "cmt_tr": "For cost-benefit reasons, controls should be more extensive in high-risk areas.", "cmt_en": "For cost-benefit reasons, controls should be more extensive in high-risk areas."}, {"tr": "A system of control that depended upon separation of duties could be circumvented by collusion among three employees.", "en": "A system of control that depended upon separation of duties could be circumvented by collusion among three employees.", "cmt_tr": "Even the best system of control can often be circumvented by collusion.", "cmt_en": "Even the best system of control can often be circumvented by collusion."}, {"tr": "There were no written policies describing prohibited activities and the action required whenever violations are discovered.", "en": "There were no written policies describing prohibited activities and the action required whenever violations are discovered.", "cmt_tr": "Management is responsible for establishing and maintaining internal control. Thus, management Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls also is responsible for the fraud prevention program. The control environment element of this program includes a code of conduct, ethics policy, or fraud policy to set the appropriate tone at the top. Moreover, organizations should establish effective fraud-related information and communication practices, for example, documentation and dissemination of policies, guidelines, and results.", "cmt_en": "Management is responsible for establishing and maintaining internal control. Thus, management Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls also is responsible for the fraud prevention program. The control environment element of this program includes a code of conduct, ethics policy, or fraud policy to set the appropriate tone at the top. Moreover, organizations should establish effective fraud-related information and communication practices, for example, documentation and dissemination of policies, guidelines, and results."}, {"tr": "Divisional employees had not been properly trained to distinguish between bona fide signatures and cleverly forged ones on authorization forms.", "en": "Divisional employees had not been properly trained to distinguish between bona fide signatures and cleverly forged ones on authorization forms.", "cmt_tr": "Forgery, like collusion, can circumvent even an effective control.", "cmt_en": "Forgery, like collusion, can circumvent even an effective control."}], "answer": 2}, {"q_tr": "Which of the following is a responsibility of internal auditors regarding fraud?", "q_en": "Which of the following is a responsibility of internal auditors regarding fraud?", "options": [{"tr": "Translating the organization’s anticorruption principles across operations.", "en": "Translating the organization’s anticorruption principles across operations.", "cmt_tr": "Management, not the internal auditors, is responsible for establishing and maintaining effective controls to deter and prevent fraud. Translating the organization’s corruption prevention principles across operations is a management responsibility.", "cmt_en": "Management, not the internal auditors, is responsible for establishing and maintaining effective controls to deter and prevent fraud. Translating the organization’s corruption prevention principles across operations is a management responsibility."}, {"tr": "Providing oversight to ensure that management has implemented an effective system of internal controls.", "en": "Providing oversight to ensure that management has implemented an effective system of internal controls.", "cmt_tr": "Internal auditors are responsible for supporting board or audit committee oversight in ensuring management has implemented effective internal controls regarding fraud prevention.", "cmt_en": "Internal auditors are responsible for supporting board or audit committee oversight in ensuring management has implemented effective internal controls regarding fraud prevention."}, {"tr": "Monitoring whether the organization has a code of ethics that covers its senior financial officers.", "en": "Monitoring whether the organization has a code of ethics that covers its senior financial officers.", "cmt_tr": "The control environment includes such elements as (1) a code of conduct, ethics policy, or fraud policy to set the appropriate tone at the top; (2) hiring and promotion guidelines and practices; and (3) board oversight. Thus, internal auditors are responsible for monitoring the annual disclosure of whether the organization has a code of ethics that covers its CEO and senior financial officers.", "cmt_en": "The control environment includes such elements as (1) a code of conduct, ethics policy, or fraud policy to set the appropriate tone at the top; (2) hiring and promotion guidelines and practices; and (3) board oversight. Thus, internal auditors are responsible for monitoring the annual disclosure of whether the organization has a code of ethics that covers its CEO and senior financial officers."}, {"tr": "Instilling a strong ethical culture.", "en": "Instilling a strong ethical culture.", "cmt_tr": "Internal auditors are responsible for raising fraud awareness within the organization, including encouraging the audit committee and senior management to set the proper tone at the top, including a strong ethical culture.", "cmt_en": "Internal auditors are responsible for raising fraud awareness within the organization, including encouraging the audit committee and senior management to set the proper tone at the top, including a strong ethical culture."}], "answer": 2}, {"q_tr": "Internal auditors acting as consultants in an assurance engagement for a fraud prevention project are most likely to perform which function regarding fraud control?", "q_en": "Internal auditors acting as consultants in an assurance engagement for a fraud prevention project are most likely to perform which function regarding fraud control?", "options": [{"tr": "Design.", "en": "Design.", "cmt_tr": "Designing controls may impair internal auditors’ objectivity and organizational independence.", "cmt_en": "Designing controls may impair internal auditors’ objectivity and organizational independence."}, {"tr": "Risk assessment.", "en": "Risk assessment.", "cmt_tr": "In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks. Internal auditors are not responsible for designing and implementing fraud prevention controls. However, internal auditors acting in a consulting role can help management identify and assess risk and determine the adequacy of the control environment. Internal auditors are also in a unique position within the organization to recommend changes to improve the control environment.", "cmt_en": "In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks. Internal auditors are not responsible for designing and implementing fraud prevention controls. However, internal auditors acting in a consulting role can help management identify and assess risk and determine the adequacy of the control environment. Internal auditors are also in a unique position within the organization to recommend changes to improve the control environment."}, {"tr": "Implementation.", "en": "Implementation.", "cmt_tr": "Implementing fraud prevention controls is a management responsibility, not that of internal auditors.", "cmt_en": "Implementing fraud prevention controls is a management responsibility, not that of internal auditors."}, {"tr": "Management. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "en": "Management. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_tr": "Internal auditors that perform management functions are neither independent nor objective.", "cmt_en": "Internal auditors that perform management functions are neither independent nor objective."}], "answer": 1}, {"q_tr": "How does fraud awareness training support fraud prevention?", "q_en": "How does fraud awareness training support fraud prevention?", "options": [{"tr": "Limits rationalization.", "en": "Limits rationalization.", "cmt_tr": "An individual justifies fraudulent actions by rationalization. Fraud awareness training minimizes rationalization by (1) supporting the ethical tone at the top, (2) promoting an anti-fraud environment, and (3) emphasizing that the organization does not tolerate misconduct of any kind.", "cmt_en": "An individual justifies fraudulent actions by rationalization. Fraud awareness training minimizes rationalization by (1) supporting the ethical tone at the top, (2) promoting an anti-fraud environment, and (3) emphasizing that the organization does not tolerate misconduct of any kind."}, {"tr": "Reduces opportunities to commit fraud.", "en": "Reduces opportunities to commit fraud.", "cmt_tr": "Fraud awareness training does not reduce opportunities to commit fraud.", "cmt_en": "Fraud awareness training does not reduce opportunities to commit fraud."}, {"tr": "Helps develop credible responses to potential risks.", "en": "Helps develop credible responses to potential risks.", "cmt_tr": "Controls help develop credible responses to potential risks, not fraud awareness training.", "cmt_en": "Controls help develop credible responses to potential risks, not fraud awareness training."}, {"tr": "Facilitates the testing of controls.", "en": "Facilitates the testing of controls.", "cmt_tr": "Fraud awareness training does not facilitate the testing of controls. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_en": "Fraud awareness training does not facilitate the testing of controls. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls"}], "answer": 0}, {"q_tr": "The internal auditors’ responsibility regarding fraud includes", "q_en": "The internal auditors’ responsibility regarding fraud includes", "options": [{"tr": "Setting the appropriate tone at the top in the control environment.", "en": "Setting the appropriate tone at the top in the control environment.", "cmt_tr": "Internal auditing is responsible for evaluating the organization’s control environment. However, the board and management set the tone at the top.", "cmt_en": "Internal auditing is responsible for evaluating the organization’s control environment. However, the board and management set the tone at the top."}, {"tr": "Ensuring that fraud will not occur.", "en": "Ensuring that fraud will not occur.", "cmt_tr": "Control is the principal means of preventing fraud, and management is responsible for establishing and maintaining internal control. Thus, internal auditors cannot give absolute assurance that noncompliance or fraud does not exist.", "cmt_en": "Control is the principal means of preventing fraud, and management is responsible for establishing and maintaining internal control. Thus, internal auditors cannot give absolute assurance that noncompliance or fraud does not exist."}, {"tr": "Maintaining fraud controls.", "en": "Maintaining fraud controls.", "cmt_tr": "Management is responsible for establishing and maintaining control.", "cmt_en": "Management is responsible for establishing and maintaining control."}, {"tr": "Promoting continuous improvement of control activities.", "en": "Promoting continuous improvement of control activities.", "cmt_tr": "Assessing fraud-related controls is the responsibility of internal auditing. It assists the organization in maintaining effective controls by evaluating their effectiveness and efficiency and promoting continuous improvement.", "cmt_en": "Assessing fraud-related controls is the responsibility of internal auditing. It assists the organization in maintaining effective controls by evaluating their effectiveness and efficiency and promoting continuous improvement."}], "answer": 3}, {"q_tr": "A programmer’s accumulation of roundoff errors into one account, which is later accessed by the programmer, is a type of computer fraud. The best way to prevent this type of fraud is to", "q_en": "A programmer’s accumulation of roundoff errors into one account, which is later accessed by the programmer, is a type of computer fraud. The best way to prevent this type of fraud is to", "options": [{"tr": "Build in judgment with reasonableness tests.", "en": "Build in judgment with reasonableness tests.", "cmt_tr": "Reasonableness tests will not detect this irregularity. In this particular type of fraud, all of the amounts will balance.", "cmt_en": "Reasonableness tests will not detect this irregularity. In this particular type of fraud, all of the amounts will balance."}, {"tr": "Independently test programs during development and limit access to the programs.", "en": "Independently test programs during development and limit access to the programs.", "cmt_tr": "Programmers should not have access to programs used in processing. The accumulation of roundoff errors into one person’s account is a procedure written into the program. Independent testing of a program will lead to discovery of this programmed fraud.", "cmt_en": "Programmers should not have access to programs used in processing. The accumulation of roundoff errors into one person’s account is a procedure written into the program. Independent testing of a program will lead to discovery of this programmed fraud."}, {"tr": "Segregate duties of systems development and programming.", "en": "Segregate duties of systems development and programming.", "cmt_tr": "Segregation of duties between systems development and programming would not prevent this type of error. The skills required to construct the program are possessed by programmers.", "cmt_en": "Segregation of duties between systems development and programming would not prevent this type of error. The skills required to construct the program are possessed by programmers."}, {"tr": "Use control totals and check the results of the computer.", "en": "Use control totals and check the results of the computer.", "cmt_tr": "This particular fraud will result in balanced entries. Thus, control totals would not detect the fraud. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_en": "This particular fraud will result in balanced entries. Thus, control totals would not detect the fraud. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls"}], "answer": 1}, {"q_tr": "Which of the following controls is the least effective in preventing a fraud conducted by sending purchase orders to bogus vendors?", "q_en": "Which of the following controls is the least effective in preventing a fraud conducted by sending purchase orders to bogus vendors?", "options": [{"tr": "Require that all purchases be made from an authorized vendor list maintained independently of the individual placing the purchase order.", "en": "Require that all purchases be made from an authorized vendor list maintained independently of the individual placing the purchase order.", "cmt_tr": "Segregating the selection and approval of reputable vendors from placement of actual orders is an effective means of preventing fraud.", "cmt_en": "Segregating the selection and approval of reputable vendors from placement of actual orders is an effective means of preventing fraud."}, {"tr": "Require that only approved vendors be paid for purchases.", "en": "Require that only approved vendors be paid for purchases.", "cmt_tr": "Restricting payment to approved vendors is an effective means of preventing fraud.", "cmt_en": "Restricting payment to approved vendors is an effective means of preventing fraud."}, {"tr": "Require contracts with all major vendors from whom production components are purchased.", "en": "Require contracts with all major vendors from whom production components are purchased.", "cmt_tr": "Requiring contracts with major vendors is an effective means of preventing fraud.", "cmt_en": "Requiring contracts with major vendors is an effective means of preventing fraud."}, {"tr": "Require that total purchases for a month not exceed the total budgeted purchases for that month.", "en": "Require that total purchases for a month not exceed the total budgeted purchases for that month.", "cmt_tr": "Requiring that total purchases for a month not exceed the total budgeted purchases for that month controls the total amount of expenditures, not whether a purchase has been requested and authorized, with whom the purchase orders are placed, or whether goods purchased are received.", "cmt_en": "Requiring that total purchases for a month not exceed the total budgeted purchases for that month controls the total amount of expenditures, not whether a purchase has been requested and authorized, with whom the purchase orders are placed, or whether goods purchased are received."}], "answer": 3}, {"q_tr": "Internal auditing is responsible for assisting in the prevention of fraud by", "q_en": "Internal auditing is responsible for assisting in the prevention of fraud by", "options": [{"tr": "Informing the appropriate authorities within the organization and recommending whatever investigation is considered necessary in the circumstances when wrongdoing is suspected.", "en": "Informing the appropriate authorities within the organization and recommending whatever investigation is considered necessary in the circumstances when wrongdoing is suspected.", "cmt_tr": "Informing appropriate authorities in the organization when the internal auditor suspects wrongdoing relates to the internal auditor’s obligation for detecting, not preventing, fraud.", "cmt_en": "Informing appropriate authorities in the organization when the internal auditor suspects wrongdoing relates to the internal auditor’s obligation for detecting, not preventing, fraud."}, {"tr": "Establishing the organization’s governance, operations, and information systems concerning compliance with laws, regulations, and contracts.", "en": "Establishing the organization’s governance, operations, and information systems concerning compliance with laws, regulations, and contracts.", "cmt_tr": "Management is responsible for establishing governance, operations, and information systems.", "cmt_en": "Management is responsible for establishing governance, operations, and information systems."}, {"tr": "Examining and evaluating the adequacy and the effectiveness of control, commensurate with the extent of the potential exposure or risk in the various segments of the organization’s operations.", "en": "Examining and evaluating the adequacy and the effectiveness of control, commensurate with the extent of the potential exposure or risk in the various segments of the organization’s operations.", "cmt_tr": "Control is the principal means of preventing fraud. Management, in turn, is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks.", "cmt_en": "Control is the principal means of preventing fraud. Management, in turn, is primarily responsible for the establishment and maintenance of control. In an assurance engagement, internal auditors must assist the organization by evaluating the adequacy and effectiveness of controls in responding to risks."}, {"tr": "Determining whether operating standards are acceptable and are being met.", "en": "Determining whether operating standards are acceptable and are being met.", "cmt_tr": "Determining whether operating standards are acceptable and are being met is a function of management, not the internal auditor's fraud prevention responsibility.", "cmt_en": "Determining whether operating standards are acceptable and are being met is a function of management, not the internal auditor's fraud prevention responsibility."}], "answer": 2}, {"q_tr": "Two newly hired employees are explaining to each other what their department’s responsibilities are. The new hire in internal auditing says to the new employee in marketing that their responsibility regarding fraud includes 1. Determining whether the control environment sets the appropriate tone at top, 2. Ensuring that fraud will not occur, 3. Being aware of activities in which fraud is likely to occur, and 4. Evaluating the effectiveness of control activities. Is the statement by the new hire in internal auditing correct?", "q_en": "Two newly hired employees are explaining to each other what their department’s responsibilities are. The new hire in internal auditing says to the new employee in marketing that their responsibility regarding fraud includes 1. Determining whether the control environment sets the appropriate tone at top, 2. Ensuring that fraud will not occur, 3. Being aware of activities in which fraud is likely to occur, and 4. Evaluating the effectiveness of control activities. Is the statement by the new hire in internal auditing correct?", "options": [{"tr": "No, determining whether the control environment sets the appropriate tone at top is not a responsibility of internal auditing.", "en": "No, determining whether the control environment sets the appropriate tone at top is not a responsibility of internal auditing.", "cmt_tr": "Internal auditing is responsible for evaluating the organization’s control environment.", "cmt_en": "Internal auditing is responsible for evaluating the organization’s control environment."}, {"tr": "No, ensuring that fraud will not occur is not a responsibility of internal auditing.", "en": "No, ensuring that fraud will not occur is not a responsibility of internal auditing.", "cmt_tr": "Control is the principal means of preventing fraud, and management is responsible for establishing and maintaining internal control. Thus, internal auditors cannot give absolute assurance that noncompliance or fraud does not exist.", "cmt_en": "Control is the principal means of preventing fraud, and management is responsible for establishing and maintaining internal control. Thus, internal auditors cannot give absolute assurance that noncompliance or fraud does not exist."}, {"tr": "No, being aware of activities in which fraud is likely to occur is not a responsibility of internal auditing.", "en": "No, being aware of activities in which fraud is likely to occur is not a responsibility of internal auditing.", "cmt_tr": "The internal auditor should have sufficient knowledge of fraud indicators and be alert to opportunities that could allow fraud.", "cmt_en": "The internal auditor should have sufficient knowledge of fraud indicators and be alert to opportunities that could allow fraud."}, {"tr": "No, evaluating the effectiveness of control activities is not a responsibility of internal auditing.", "en": "No, evaluating the effectiveness of control activities is not a responsibility of internal auditing.", "cmt_tr": "The internal auditor should have sufficient knowledge of fraud indicators and be alert to opportunities that could allow fraud. Evaluating the effectiveness of control activities is indeed a responsibility of internal auditing.", "cmt_en": "The internal auditor should have sufficient knowledge of fraud indicators and be alert to opportunities that could allow fraud. Evaluating the effectiveness of control activities is indeed a responsibility of internal auditing."}], "answer": 1}, {"q_tr": "Which of the following controls would have been most effective in preventing this fraud?", "q_en": "Which of the following controls would have been most effective in preventing this fraud?", "options": [{"tr": "Allowing purchases only from a list of pre-approved vendors.", "en": "Allowing purchases only from a list of pre-approved vendors.", "cmt_tr": "The facts do not suggest that the vendor’s actions were inappropriate.", "cmt_en": "The facts do not suggest that the vendor’s actions were inappropriate."}, {"tr": "Requiring the use of prenumbered purchase orders for all purchases of merchandise.", "en": "Requiring the use of prenumbered purchase orders for all purchases of merchandise.", "cmt_tr": "Prenumbering would not have prevented the fraud. The weakness is in the authorization and receiving procedures.", "cmt_en": "Prenumbering would not have prevented the fraud. The weakness is in the authorization and receiving procedures."}, {"tr": "Canceling supporting documents, such as purchase orders and receiving reports, at the time invoices are paid.", "en": "Canceling supporting documents, such as purchase orders and receiving reports, at the time invoices are paid.", "cmt_tr": "Canceling supporting documents when invoices are paid prevents the same document from being used to support two identical payments, but that is not the abuse here.", "cmt_en": "Canceling supporting documents when invoices are paid prevents the same document from being used to support two identical payments, but that is not the abuse here."}, {"tr": "Establishing separation of duties between the ordering and receiving of merchandise.", "en": "Establishing separation of duties between the ordering and receiving of merchandise.", "cmt_tr": "Separating the purchasing and receiving functions would have improved internal control. If the supplies in question had been sent to the organization, and a receiving report had been prepared by an employee other than the one ordering the goods, the fraud could not have occurred. Moreover, the receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items. Fact Pattern: A purchasing agent acquired items for personal use with the organization’s funds. The organization allowed designated employees to purchase a specified amount per day in merchandise under open-ended contracts. Supervisory approval of the purchases was required, but that information was not communicated to the vendor. Instead of reviewing and authorizing each purchase order, supervisors routinely signed the authorization sheet at the end of the month without reviewing any of the supporting documentation. Because purchases of this nature were Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls not subject to normal receiving policies, the dishonest employee picked up the supplies at the vendor’s warehouse. All purchases were for items routinely ordered by the organization. During the past year, the employee amassed enough merchandise to start a printing and photography business.", "cmt_en": "Separating the purchasing and receiving functions would have improved internal control. If the supplies in question had been sent to the organization, and a receiving report had been prepared by an employee other than the one ordering the goods, the fraud could not have occurred. Moreover, the receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items. Fact Pattern: A purchasing agent acquired items for personal use with the organization’s funds. The organization allowed designated employees to purchase a specified amount per day in merchandise under open-ended contracts. Supervisory approval of the purchases was required, but that information was not communicated to the vendor. Instead of reviewing and authorizing each purchase order, supervisors routinely signed the authorization sheet at the end of the month without reviewing any of the supporting documentation. Because purchases of this nature were Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls not subject to normal receiving policies, the dishonest employee picked up the supplies at the vendor’s warehouse. All purchases were for items routinely ordered by the organization. During the past year, the employee amassed enough merchandise to start a printing and photography business."}], "answer": 3}, {"q_tr": "Which of the following engagement procedures, performed by the internal auditor, is most likely to detect this fraud?", "q_en": "Which of the following engagement procedures, performed by the internal auditor, is most likely to detect this fraud?", "options": [{"tr": "Tracing selected canceled checks to the cash payments journal and to the related vendors’ invoices.", "en": "Tracing selected canceled checks to the cash payments journal and to the related vendors’ invoices.", "cmt_tr": "A legitimate vendor’s invoice existed for each cash payment related to this fraud.", "cmt_en": "A legitimate vendor’s invoice existed for each cash payment related to this fraud."}, {"tr": "Performing a trend analysis of printing supplies expenses for a 2-year period.", "en": "Performing a trend analysis of printing supplies expenses for a 2-year period.", "cmt_tr": "A basic premise underlying the application of analytical procedures is that plausible relationships among data may reasonably be expected to exist and continue in the absence of known conditions to the contrary. Thus, performing a trend analysis of printing supplies expenses for a 2-year period should identify an excess use of supplies.", "cmt_en": "A basic premise underlying the application of analytical procedures is that plausible relationships among data may reasonably be expected to exist and continue in the absence of known conditions to the contrary. Thus, performing a trend analysis of printing supplies expenses for a 2-year period should identify an excess use of supplies."}, {"tr": "Tracing prices and quantities on selected vendors’ invoices to the related purchase orders.", "en": "Tracing prices and quantities on selected vendors’ invoices to the related purchase orders.", "cmt_tr": "The issue is not whether the quantities ordered by the customer were billed but whether the transactions were authorized.", "cmt_en": "The issue is not whether the quantities ordered by the customer were billed but whether the transactions were authorized."}, {"tr": "Recomputing the clerical accuracy of selected vendors’ invoices, including discounts and sales taxes.", "en": "Recomputing the clerical accuracy of selected vendors’ invoices, including discounts and sales taxes.", "cmt_tr": "The issue is not whether the invoices were accurate but whether the transactions were authorized. Fact Pattern: A fraud was perpetrated in a moderate-sized organization when the accounting clerk was delegated too much responsibility. During the year, the organization switched suppliers of a service to a new vendor. The accounting clerk continued to submit fraudulent invoices from the “old supplier.” Because contracting for services and approval of supplier invoices had been delegated to the clerk, it was possible for the clerk to continue billings from the old supplier and deposit the subsequent checks, which the clerk was responsible to mail, into a new account the clerk opened in the name of the old supplier. The clerk was considered an excellent employee and eventually was improperly given the added responsibility of preparing the department budgets. This added responsibility allowed the clerk to budget for the amount of the fraudulent payments.", "cmt_en": "The issue is not whether the invoices were accurate but whether the transactions were authorized. Fact Pattern: A fraud was perpetrated in a moderate-sized organization when the accounting clerk was delegated too much responsibility. During the year, the organization switched suppliers of a service to a new vendor. The accounting clerk continued to submit fraudulent invoices from the “old supplier.” Because contracting for services and approval of supplier invoices had been delegated to the clerk, it was possible for the clerk to continue billings from the old supplier and deposit the subsequent checks, which the clerk was responsible to mail, into a new account the clerk opened in the name of the old supplier. The clerk was considered an excellent employee and eventually was improperly given the added responsibility of preparing the department budgets. This added responsibility allowed the clerk to budget for the amount of the fraudulent payments."}], "answer": 1}, {"q_tr": "Which of the following controls would have been least likely to prevent or detect the fraud described?", "q_en": "Which of the following controls would have been least likely to prevent or detect the fraud described?", "options": [{"tr": "Requiring authorization of payments by someone other than the clerk negotiating the contract. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "en": "Requiring authorization of payments by someone other than the clerk negotiating the contract. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_tr": "Separating contracting for services and approval of invoices would have prevented the fraud.", "cmt_en": "Separating contracting for services and approval of invoices would have prevented the fraud."}, {"tr": "Comparison by the person signing checks of invoices with an independent verification of services received.", "en": "Comparison by the person signing checks of invoices with an independent verification of services received.", "cmt_tr": "An independent verification of services received reviewed by the check signer would have prevented payment for services not received.", "cmt_en": "An independent verification of services received reviewed by the check signer would have prevented payment for services not received."}, {"tr": "Budget preparation by someone other than the person signing contracts and approving payment.", "en": "Budget preparation by someone other than the person signing contracts and approving payment.", "cmt_tr": "Independent budget preparation would have allowed an actual-with-budget comparison to detect the payments.", "cmt_en": "Independent budget preparation would have allowed an actual-with-budget comparison to detect the payments."}, {"tr": "Mailing of checks by someone other than the person responsible for check signing or invoice approval.", "en": "Mailing of checks by someone other than the person responsible for check signing or invoice approval.", "cmt_tr": "After invoices have been approved, and checks prepared and signed, the mailing of the check by an independent person provides no means of preventing improper payments. The person responsible for the treasury function should sign the checks, transmit them, and cancel the supporting documents. Fact Pattern: A fraud was perpetrated in a moderate-sized organization when the accounting clerk was delegated too much responsibility. During the year, the organization switched suppliers of a service to a new vendor. The accounting clerk continued to submit fraudulent invoices from the “old supplier.” Because contracting for services and approval of supplier invoices had been delegated to the clerk, it was possible for the clerk to continue billings from the old supplier and deposit the subsequent checks, which the clerk was responsible to mail, into a new account the clerk opened in the name of the old supplier. The clerk was considered an excellent employee and eventually was improperly given the added responsibility of preparing the department budgets. This added responsibility allowed the clerk to budget for the amount of the fraudulent payments.", "cmt_en": "After invoices have been approved, and checks prepared and signed, the mailing of the check by an independent person provides no means of preventing improper payments. The person responsible for the treasury function should sign the checks, transmit them, and cancel the supporting documents. Fact Pattern: A fraud was perpetrated in a moderate-sized organization when the accounting clerk was delegated too much responsibility. During the year, the organization switched suppliers of a service to a new vendor. The accounting clerk continued to submit fraudulent invoices from the “old supplier.” Because contracting for services and approval of supplier invoices had been delegated to the clerk, it was possible for the clerk to continue billings from the old supplier and deposit the subsequent checks, which the clerk was responsible to mail, into a new account the clerk opened in the name of the old supplier. The clerk was considered an excellent employee and eventually was improperly given the added responsibility of preparing the department budgets. This added responsibility allowed the clerk to budget for the amount of the fraudulent payments."}], "answer": 3}, {"q_tr": "Which of the following engagement procedures is most likely to detect the fraud?", "q_en": "Which of the following engagement procedures is most likely to detect the fraud?", "options": [{"tr": "Take a sample of paid invoices and verify receipt of services by departments involved.", "en": "Take a sample of paid invoices and verify receipt of services by departments involved.", "cmt_tr": "Confirming with the using department the receipt of services that have been paid for would uncover the fraud.", "cmt_en": "Confirming with the using department the receipt of services that have been paid for would uncover the fraud."}, {"tr": "Trace a sample of checks disbursed to approved invoices for services.", "en": "Trace a sample of checks disbursed to approved invoices for services.", "cmt_tr": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice.", "cmt_en": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice."}, {"tr": "Perform a bank reconciliation and account for all outstanding checks.", "en": "Perform a bank reconciliation and account for all outstanding checks.", "cmt_tr": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice. A bank reconciliation would not detect this fraud.", "cmt_en": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice. A bank reconciliation would not detect this fraud."}, {"tr": "Trace a sample of receiving documents to invoices and to checks disbursed. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "en": "Trace a sample of receiving documents to invoices and to checks disbursed. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_tr": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice. Tracing receiving documents would not detect this fraud because the services were never received.", "cmt_en": "The fraudulent invoices were approved by the clerk, and each check is therefore supported by an approved invoice. Tracing receiving documents would not detect this fraud because the services were never received."}], "answer": 0}, {"q_tr": "The internal audit function’s responsibility for preventing fraud is to", "q_en": "The internal audit function’s responsibility for preventing fraud is to", "options": [{"tr": "Establish internal control.", "en": "Establish internal control.", "cmt_tr": "Establishing internal control is management’s responsibility.", "cmt_en": "Establishing internal control is management’s responsibility."}, {"tr": "Maintain internal control.", "en": "Maintain internal control.", "cmt_tr": "Maintaining internal control is management’s responsibility.", "cmt_en": "Maintaining internal control is management’s responsibility."}, {"tr": "Evaluate the system of internal control.", "en": "Evaluate the system of internal control.", "cmt_tr": "The internal audit function assists the organization in maintaining effective controls (e.g., to prevent or detect fraud) by evaluating their effectiveness and efficiency and by promoting continuous improvement.", "cmt_en": "The internal audit function assists the organization in maintaining effective controls (e.g., to prevent or detect fraud) by evaluating their effectiveness and efficiency and by promoting continuous improvement."}, {"tr": "Exercise operating authority over fraud prevention activities.", "en": "Exercise operating authority over fraud prevention activities.", "cmt_tr": "Operating authority is a management function.", "cmt_en": "Operating authority is a management function."}], "answer": 2}, {"q_tr": "The risk of the addition of fictitious employees to the payroll by the person performing the payroll processing function is reduced by", "q_en": "The risk of the addition of fictitious employees to the payroll by the person performing the payroll processing function is reduced by", "options": [{"tr": "Requiring that payroll additions be approved by the controller.", "en": "Requiring that payroll additions be approved by the controller.", "cmt_tr": "Payroll additions should be authorized by the personnel department, not by the controller (chief accounting officer), an official with record keeping responsibility. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_en": "Payroll additions should be authorized by the personnel department, not by the controller (chief accounting officer), an official with record keeping responsibility. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls"}, {"tr": "Requiring the same employee to perform the monthly payroll bank reconciliation.", "en": "Requiring the same employee to perform the monthly payroll bank reconciliation.", "cmt_tr": "For a proper segregation of functions, the reconciliation should be performed by someone who has no payroll processing duties.", "cmt_en": "For a proper segregation of functions, the reconciliation should be performed by someone who has no payroll processing duties."}, {"tr": "Performing periodic floor checks of employees on the payroll.", "en": "Performing periodic floor checks of employees on the payroll.", "cmt_tr": "One control used to detect the addition of fictitious persons to the payroll is for the auditor to make a periodic comparison of the names on the payroll with persons observed working for the company. Observation of payroll distribution is such a control.", "cmt_en": "One control used to detect the addition of fictitious persons to the payroll is for the auditor to make a periodic comparison of the names on the payroll with persons observed working for the company. Observation of payroll distribution is such a control."}, {"tr": "Requiring a reconciliation of hours between time cards and hours paid.", "en": "Requiring a reconciliation of hours between time cards and hours paid.", "cmt_tr": "The amount, not the validity, of the payment is verified.", "cmt_en": "The amount, not the validity, of the payment is verified."}], "answer": 2}, {"q_tr": "Fraudulent use of the organization’s credit cards is minimized by which of the following internal control procedures?", "q_en": "Fraudulent use of the organization’s credit cards is minimized by which of the following internal control procedures?", "options": [{"tr": "Establishing an organizational policy on the issuance of credit cards to authorized employees.", "en": "Establishing an organizational policy on the issuance of credit cards to authorized employees.", "cmt_tr": "Establishing a policy on the issuance of credit cards relates to appropriate issuance, not fraudulent use.", "cmt_en": "Establishing a policy on the issuance of credit cards relates to appropriate issuance, not fraudulent use."}, {"tr": "Reviewing the validity of credit card need at executive and operating levels on a periodic basis.", "en": "Reviewing the validity of credit card need at executive and operating levels on a periodic basis.", "cmt_tr": "Reviewing the validity of credit card need at executive and operating levels relates to appropriate issuance of credit cards, not fraudulent use.", "cmt_en": "Reviewing the validity of credit card need at executive and operating levels relates to appropriate issuance of credit cards, not fraudulent use."}, {"tr": "Reconciling the monthly statement from the credit card issuer with the submitted copies of the cardholder’s sales receipts.", "en": "Reconciling the monthly statement from the credit card issuer with the submitted copies of the cardholder’s sales receipts.", "cmt_tr": "The reconciliation tests correct invoicing by the credit card issuers for credit charges. It would not necessarily detect personal or fraudulent use if the payees and amounts were not suspicious.", "cmt_en": "The reconciliation tests correct invoicing by the credit card issuers for credit charges. It would not necessarily detect personal or fraudulent use if the payees and amounts were not suspicious."}, {"tr": "Subjecting credit card charges to the same expense controls as those used on regular organizational expense forms.", "en": "Subjecting credit card charges to the same expense controls as those used on regular organizational expense forms.", "cmt_tr": "The problem of charging the organization for unauthorized expenditures is the same for any type of expense account, whether credit card or cash. Thus, normal expense controls should preclude credit card fraud by employees. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_en": "The problem of charging the organization for unauthorized expenditures is the same for any type of expense account, whether credit card or cash. Thus, normal expense controls should preclude credit card fraud by employees. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls"}], "answer": 3}, {"q_tr": "An organization hired a highly qualified accounts payable manager who had been terminated from another organization for alleged wrongdoing. Six months later, the manager diverted US $12,000 by sending duplicate payments of invoices to a relative. A control that might have prevented this situation is to", "q_en": "An organization hired a highly qualified accounts payable manager who had been terminated from another organization for alleged wrongdoing. Six months later, the manager diverted US $12,000 by sending duplicate payments of invoices to a relative. A control that might have prevented this situation is to", "options": [{"tr": "Adequately check prior employment backgrounds for all new employees.", "en": "Adequately check prior employment backgrounds for all new employees.", "cmt_tr": "Honest and capable personnel also help create an environment promoting effective internal control. Accordingly, hiring policies and procedures are crucial. Background checks, for example, may screen out potential hirees of questionable character and serve to prevent potential fraud.", "cmt_en": "Honest and capable personnel also help create an environment promoting effective internal control. Accordingly, hiring policies and procedures are crucial. Background checks, for example, may screen out potential hirees of questionable character and serve to prevent potential fraud."}, {"tr": "Not hire individuals who appear overqualified for a job.", "en": "Not hire individuals who appear overqualified for a job.", "cmt_tr": "Being overqualified is not an indicator of bad character.", "cmt_en": "Being overqualified is not an indicator of bad character."}, {"tr": "Verify educational background for all new employees.", "en": "Verify educational background for all new employees.", "cmt_tr": "Checking prior employment is more likely to uncover prior fraudulent behavior.", "cmt_en": "Checking prior employment is more likely to uncover prior fraudulent behavior."}, {"tr": "Check to see whether close relatives work for vendors.", "en": "Check to see whether close relatives work for vendors.", "cmt_tr": "Checking to see whether close relatives work for vendors is not an adequate control in this scenario.", "cmt_en": "Checking to see whether close relatives work for vendors is not an adequate control in this scenario."}], "answer": 0}, {"q_tr": "Internal auditors and management have become increasingly concerned about computer fraud. Which of the following control procedures is least important in preventing computer fraud?", "q_en": "Internal auditors and management have become increasingly concerned about computer fraud. Which of the following control procedures is least important in preventing computer fraud?", "options": [{"tr": "Program change control requiring a distinction between production programs and test programs.", "en": "Program change control requiring a distinction between production programs and test programs.", "cmt_tr": "A program should be redesigned using a working copy, not the version in use.", "cmt_en": "A program should be redesigned using a working copy, not the version in use."}, {"tr": "Testing of new applications by users during the systems development process.", "en": "Testing of new applications by users during the systems development process.", "cmt_tr": "Testing of new applications by users is one of the most important controls to help prevent computer fraud.", "cmt_en": "Testing of new applications by users is one of the most important controls to help prevent computer fraud."}, {"tr": "Segregation of duties between the applications programmer and the program librarian function.", "en": "Segregation of duties between the applications programmer and the program librarian function.", "cmt_tr": "Program librarians maintain control over and accountability for documentation, programs, and data storage media. Applications programmers design, write, test, and document computer programs according to specifications provided by the end users. Application programmers should not have access to data center operations or data. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_en": "Program librarians maintain control over and accountability for documentation, programs, and data storage media. Applications programmers design, write, test, and document computer programs according to specifications provided by the end users. Application programmers should not have access to data center operations or data. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls"}, {"tr": "Segregation of duties between the programmer and systems analyst.", "en": "Segregation of duties between the programmer and systems analyst.", "cmt_tr": "Programmers modify programs, data files, and controls. A systems analyst uses his or her detailed knowledge of the organization’s databases and applications programs to determine how an application system should be designed to best serve the users’ needs. Those duties are often combined with those of applications programmers.", "cmt_en": "Programmers modify programs, data files, and controls. A systems analyst uses his or her detailed knowledge of the organization’s databases and applications programs to determine how an application system should be designed to best serve the users’ needs. Those duties are often combined with those of applications programmers."}], "answer": 3}, {"q_tr": "A means of ensuring that payroll checks are drawn for properly authorized amounts is to", "q_en": "A means of ensuring that payroll checks are drawn for properly authorized amounts is to", "options": [{"tr": "Conduct periodic floor verification of employees on the payroll.", "en": "Conduct periodic floor verification of employees on the payroll.", "cmt_tr": "Employees may be properly included on payroll, but the amounts paid may be unauthorized.", "cmt_en": "Employees may be properly included on payroll, but the amounts paid may be unauthorized."}, {"tr": "Require that undelivered checks be returned to the cashier.", "en": "Require that undelivered checks be returned to the cashier.", "cmt_tr": "Returning undelivered checks to the cashier provides no information regarding the validity of the amounts of checks.", "cmt_en": "Returning undelivered checks to the cashier provides no information regarding the validity of the amounts of checks."}, {"tr": "Require supervisory approval of employee time cards.", "en": "Require supervisory approval of employee time cards.", "cmt_tr": "Review and approval of time cards by line supervisors is appropriate because they should know whether work has been performed. Also, because they do not distribute paychecks, they are not in a position to divert falsely authorized checks.", "cmt_en": "Review and approval of time cards by line supervisors is appropriate because they should know whether work has been performed. Also, because they do not distribute paychecks, they are not in a position to divert falsely authorized checks."}, {"tr": "Witness the distribution of payroll checks.", "en": "Witness the distribution of payroll checks.", "cmt_tr": "Witnessing a payroll distribution does not assure that the amounts paid are authorized.", "cmt_en": "Witnessing a payroll distribution does not assure that the amounts paid are authorized."}], "answer": 2}, {"q_tr": "A payroll clerk working through a computerized payroll system increased the hourly pay rate of two employees and shared the resulting overpayments with the employees. Which of the following would have best served to prevent this illegal act?", "q_en": "A payroll clerk working through a computerized payroll system increased the hourly pay rate of two employees and shared the resulting overpayments with the employees. Which of the following would have best served to prevent this illegal act?", "options": [{"tr": "Requiring that all changes to pay records be recorded on a standard form.", "en": "Requiring that all changes to pay records be recorded on a standard form.", "cmt_tr": "Requiring a standard form does not prevent an unauthorized pay rate change if it can be made without the form. The requirement that all changes to pay records be recorded on a standard form does not restrict access to the computer files. Thus, unauthorized changes could still be made.", "cmt_en": "Requiring a standard form does not prevent an unauthorized pay rate change if it can be made without the form. The requirement that all changes to pay records be recorded on a standard form does not restrict access to the computer files. Thus, unauthorized changes could still be made."}, {"tr": "Limiting access to master payroll records to supervisory personnel in the payroll department.", "en": "Limiting access to master payroll records to supervisory personnel in the payroll department.", "cmt_tr": "The best preventive control is to restrict the ability of employees to gain access to sensitive information. The computer security system should therefore incorporate measures (such as password protection and device authorization tables) that will prevent an unauthorized person from changing stored information. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls", "cmt_en": "The best preventive control is to restrict the ability of employees to gain access to sensitive information. The computer security system should therefore incorporate measures (such as password protection and device authorization tables) that will prevent an unauthorized person from changing stored information. Study Unit 10: Fraud Risks | Subunit 2: Fraud -- Controls"}, {"tr": "Reconciling pay rates per personnel records with those of the payroll system annually.", "en": "Reconciling pay rates per personnel records with those of the payroll system annually.", "cmt_tr": "Annual reconciliation of pay rates per personnel records with those of the payroll system is detective rather than preventive.", "cmt_en": "Annual reconciliation of pay rates per personnel records with those of the payroll system is detective rather than preventive."}, {"tr": "Monitoring of payroll costs by department heads on a monthly basis.", "en": "Monitoring of payroll costs by department heads on a monthly basis.", "cmt_tr": "Monitoring of payroll costs by department heads on a monthly basis is detective rather than preventive.", "cmt_en": "Monitoring of payroll costs by department heads on a monthly basis is detective rather than preventive."}], "answer": 1}, {"q_tr": "Which of the following statement(s) is (are) true regarding the role of internal auditors in the deterrence of fraud?", "q_en": "Which of the following statement(s) is (are) true regarding the role of internal auditors in the deterrence of fraud?", "options": [{"tr": "Internal auditors set the appropriate tone at the top and the
