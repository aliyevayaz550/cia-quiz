<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<meta http-equiv="refresh" content="0; url=main.html">
<title>CIA Part 1 – Quiz</title>
<style>
:root {
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --ink:       #0f1923;
  --correct:   #1a6b3c;
  --wrong:     #8b1a1a;
  --font:      -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --r:         12px;
  --shadow:    0 2px 16px rgba(15,25,35,.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 600px; margin: 0 auto;
}
#app-title {
  font-size: 16px; font-weight: 700; letter-spacing: .3px;
  color: #fff;
}
#app-sub {
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,.5);
  margin-left: 8px;
}
#lang-btn {
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}

/* ── HERO ────────────────────────────────────────────── */
#hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 28px 20px 24px;
  text-align: center;
}
#hero h1 {
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -.3px; margin-bottom: 6px;
}
#hero p {
  font-size: 13px; color: rgba(255,255,255,.6);
  margin-bottom: 18px;
}
.hero-stats {
  display: flex; justify-content: center; gap: 24px;
}
.hs-item {
  display: flex; flex-direction: column; align-items: center;
}
.hs-num {
  font-size: 22px; font-weight: 800; color: var(--gold);
  line-height: 1;
}
.hs-label {
  font-size: 11px; color: rgba(255,255,255,.5);
  text-transform: uppercase; letter-spacing: .6px;
  margin-top: 3px;
}

/* ── OVERALL PROGRESS BAR ────────────────────────────── */
#overall-progress {
  background: var(--navy);
  padding: 0 20px 16px;
}
#overall-progress-inner {
  max-width: 600px; margin: 0 auto;
}
#op-bar-bg {
  height: 5px; background: rgba(255,255,255,.15);
  border-radius: 3px; overflow: hidden; margin-bottom: 6px;
}
#op-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 3px;
  transition: width .8s ease;
  width: 0%;
}
#op-label {
  font-size: 11px; color: rgba(255,255,255,.45);
  display: flex; justify-content: space-between;
}

/* ── UNIT LIST ───────────────────────────────────────── */
#unit-list {
  max-width: 600px; margin: 0 auto;
  padding: 16px 14px 40px;
  display: flex; flex-direction: column; gap: 10px;
}

.unit-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  border: 1px solid #e8e2d8;
  overflow: hidden;
  text-decoration: none;
  display: block;
  transition: transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
.unit-card:active { transform: scale(.985); }

.unit-card.locked {
  opacity: .55;
  cursor: default;
  pointer-events: none;
}

.unit-card-inner {
  display: flex; align-items: center;
  padding: 14px 16px; gap: 14px;
}

.unit-num {
  width: 44px; height: 44px;
  background: var(--navy); color: #fff;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800;
  flex-shrink: 0;
}
.unit-card.done   .unit-num { background: var(--correct); }
.unit-card.active .unit-num { background: var(--gold); color: var(--navy); }
.unit-card.locked .unit-num { background: #bbb; }

.unit-info { flex: 1; min-width: 0; }
.unit-title {
  font-size: 15px; font-weight: 700; color: var(--ink);
  margin-bottom: 3px;
}
.unit-sub {
  font-size: 12px; color: #888;
}

.unit-progress {
  display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
  flex-shrink: 0;
}
.unit-pct {
  font-size: 13px; font-weight: 700; color: var(--navy-mid);
}
.unit-pct.done-pct  { color: var(--correct); }
.unit-pct.zero-pct  { color: #bbb; }

.unit-mini-bar {
  width: 60px; height: 4px;
  background: #e8e2d8; border-radius: 2px; overflow: hidden;
}
.unit-mini-fill {
  height: 100%; background: var(--navy-mid);
  border-radius: 2px; transition: width .6s ease;
}
.unit-card.done  .unit-mini-fill { background: var(--correct); }
.unit-card.active .unit-mini-fill { background: var(--gold); }

.unit-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; padding: 3px 8px; border-radius: 20px;
  margin-top: 2px;
}
.badge-ready   { background: #e8f5e9; color: var(--correct); }
.badge-active  { background: #fff8e1; color: #8a6d2e; }
.badge-locked  { background: #eee; color: #999; }
.badge-done    { background: #e8f5e9; color: var(--correct); }

/* Progress bar inside card */
.unit-progress-bar {
  height: 3px; background: #f0ebe3;
}
.unit-progress-bar-fill {
  height: 100%; background: var(--gold);
  transition: width .6s ease;
}
.unit-card.done .unit-progress-bar-fill { background: var(--correct); }

/* ── SECTION HEADER ──────────────────────────────────── */
.section-header {
  max-width: 600px; margin: 0 auto;
  padding: 16px 14px 4px;
  font-size: 11px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999;
}

/* ── FOOTER ──────────────────────────────────────────── */
#footer {
  text-align: center; padding: 20px;
  font-size: 11px; color: #bbb;
}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-inner">
    <button onclick="window.location.href='main.html'" style="background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:600;border-radius:6px;padding:5px 10px;cursor:pointer;margin-right:8px;flex-shrink:0">← Geri</button>
    <div>
      <span id="app-title">CIA Part 1</span>
      <span id="app-sub">Quiz</span>
    </div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>

<div id="hero">
  <h1 id="hero-title">CIA Sınav Quiz</h1>
  <p id="hero-desc">Part 1 — 10 Ünite, Türkcə / İngiliscə</p>
  <div class="hero-stats">
    <div class="hs-item">
      <span class="hs-num">10</span>
      <span class="hs-label" data-tr="Ünite" data-en="Units">Ünite</span>
    </div>
    <div class="hs-item" id="hs-questions">
      <span class="hs-num" id="total-q-num">363+</span>
      <span class="hs-label" data-tr="Sual" data-en="Questions">Sual</span>
    </div>
    <div class="hs-item" id="hs-done">
      <span class="hs-num" id="total-done-num">0</span>
      <span class="hs-label" data-tr="Tamamlandı" data-en="Completed">Tamamlandı</span>
    </div>
  </div>
</div>

<div id="overall-progress">
  <div id="overall-progress-inner">
    <div id="op-bar-bg"><div id="op-bar-fill"></div></div>
    <div id="op-label">
      <span id="op-left">0 sual cavablandı</span>
      <span id="op-right">Ümumi irəliləyiş</span>
    </div>
  </div>
</div>

<div id="unit-list"></div>

<div id="footer">CIA Part 1 Quiz © 2025</div>

<script>
// ── UNIT DEFINITIONS ──────────────────────────────────────────────────────────
const UNITS = [
  { id: 2, title: "Unit 2", titleTr: "Unit 2",
    file: "unit2.html", subunits: 6, questions: 105, lsKey: "cia_quiz_unit2", ready: true },
  { id: 1, title: "Unit 1", titleTr: "Unit 1",
    file: "unit1.html", subunits: 4, questions: 107, lsKey: "cia_quiz_unit1", ready: true },
  { id: 3, title: "Unit 3", titleTr: "Unit 3",
    file: "unit3.html", subunits: 5, questions: 83, lsKey: "cia_quiz_unit3", ready: true },
  { id: 4, title: "Unit 4", titleTr: "Unit 4",
    file: "unit4.html", subunits: 4, questions: 68, lsKey: "cia_quiz_unit4", ready: true },
  { id: 5, title: "Unit 5", titleTr: "Ünite 5",
    file: "unit5.html", subunits: 0, questions: 0, lsKey: "cia_quiz_unit5", ready: false },
  { id: 6, title: "Unit 6", titleTr: "Ünite 6",
    file: "unit6.html", subunits: 0, questions: 0, lsKey: "cia_quiz_unit6", ready: false },
  { id: 7, title: "Unit 7", titleTr: "Ünite 7",
    file: "unit7.html", subunits: 0, questions: 0, lsKey: "cia_quiz_unit7", ready: false },
  { id: 8, title: "Unit 8", titleTr: "Ünite 8",
    file: "unit8.html", subunits: 0, questions: 0, lsKey: "cia_quiz_unit8", ready: false },
  { id: 9, title: "Unit 9", titleTr: "Ünite 9",
    file: "unit9.html", subunits: 0, questions: 0, lsKey: "cia_quiz_unit9", ready: false },
  { id: 10, title: "Unit 10", titleTr: "Ünite 10",
    file: "unit10.html", subunits: 0, questions: 0, lsKey: "cia_quiz_unit10", ready: false },
];

// Sort by id
UNITS.sort((a,b) => a.id - b.id);

let lang = "tr";

// ── READ PROGRESS FROM LOCALSTORAGE ──────────────────────────────────────────
function getUnitProgress(unit) {
  if(!unit.ready) return { answered: 0, correct: 0, total: unit.questions, pct: 0 };
  try {
    const raw = localStorage.getItem(unit.lsKey);
    if(!raw) return { answered: 0, correct: 0, total: unit.questions, pct: 0 };
    const data = JSON.parse(raw);
    const answered = (data.answered||[]).filter(Boolean).length;
    const correct  = (data.correctArr||[]).filter(Boolean).length;
    const total    = unit.questions;
    const pct      = total ? Math.round(answered/total*100) : 0;
    return { answered, correct, total, pct };
  } catch(e) {
    return { answered: 0, correct: 0, total: unit.questions, pct: 0 };
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const list = document.getElementById("unit-list");
  list.innerHTML = "";

  let totalAnswered = 0, totalQ = 0, totalDone = 0;

  // Section: Hazır
  const readyHeader = document.createElement("div");
  readyHeader.className = "section-header";
  readyHeader.textContent = lang === "tr" ? "Hazır Ünitlər" : "Available Units";
  list.appendChild(readyHeader);

  UNITS.forEach(unit => {
    const prog = getUnitProgress(unit);
    totalAnswered += prog.answered;
    totalQ += prog.total;
    if(prog.answered === prog.total && prog.total > 0) totalDone++;

    const isDone   = prog.answered === prog.total && prog.total > 0;
    const isActive = prog.answered > 0 && !isDone;

    const card = document.createElement(unit.ready ? "a" : "div");
    if(unit.ready) card.href = unit.file;

    let cls = "unit-card";
    if(!unit.ready) cls += " locked";
    else if(isDone)  cls += " done";
    else if(isActive) cls += " active";
    card.className = cls;

    const badgeText = !unit.ready
      ? (lang==="tr" ? "Tezliklə" : "Coming Soon")
      : isDone
        ? (lang==="tr" ? "Tamamlandı ✓" : "Completed ✓")
        : isActive
          ? (lang==="tr" ? "Davam edir" : "In Progress")
          : (lang==="tr" ? "Başlamayıb" : "Not Started");

    const badgeCls = !unit.ready ? "badge-locked"
      : isDone ? "badge-done"
      : isActive ? "badge-active"
      : "badge-locked";

    const pctLabel = prog.total === 0 ? ""
      : `${prog.answered}/${prog.total}`;

    const subText = unit.ready
      ? (unit.subunits > 0
          ? `${unit.subunits} ${lang==="tr"?"alt bölüm":"subunits"} · ${unit.questions} ${lang==="tr"?"sual":"questions"}`
          : (lang==="tr" ? "Hazırlanır..." : "In preparation..."))
      : (lang==="tr" ? "Hazırlanır..." : "In preparation...");

    card.innerHTML = `
      <div class="unit-card-inner">
        <div class="unit-num">${unit.id}</div>
        <div class="unit-info">
          <div class="unit-title">${lang==="tr" ? unit.titleTr : unit.title}</div>
          <div class="unit-sub">${subText}</div>
        </div>
        <div class="unit-progress">
          <div class="unit-pct ${isDone?"done-pct":prog.answered===0?"zero-pct":""}">${pctLabel}</div>
          <div class="unit-mini-bar">
            <div class="unit-mini-fill" style="width:${prog.pct}%"></div>
          </div>
          <div class="unit-badge ${badgeCls}">${badgeText}</div>
        </div>
      </div>
      <div class="unit-progress-bar">
        <div class="unit-progress-bar-fill" style="width:${prog.pct}%"></div>
      </div>`;

    list.appendChild(card);
  });

  // Update overall stats
  const overallPct = totalQ ? (totalAnswered/totalQ*100).toFixed(1) : 0;
  document.getElementById("op-bar-fill").style.width = overallPct + "%";
  document.getElementById("op-left").textContent =
    lang==="tr" ? `${totalAnswered} sual cavablandı` : `${totalAnswered} questions answered`;
  document.getElementById("total-done-num").textContent = totalDone;
}

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang === "tr" ? "en" : "tr";
  document.getElementById("lang-btn").textContent = lang === "tr" ? "EN" : "TR";
  document.getElementById("hero-title").textContent =
    lang === "tr" ? "CIA Sınav Quiz" : "CIA Exam Quiz";
  document.getElementById("hero-desc").textContent =
    lang === "tr" ? "Part 1 — 10 Ünite, Türkcə / İngiliscə" : "Part 1 — 10 Units, TR / EN Bilingual";
  document.querySelectorAll("[data-tr]").forEach(el => {
    el.textContent = lang === "tr" ? el.dataset.tr : el.dataset.en;
  });
  document.getElementById("op-right").textContent =
    lang === "tr" ? "Ümumi irəliləyiş" : "Overall progress";
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
