<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 2</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 2</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">105 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Study Unit 2</span></h1>
    <p id="welcome-desc">6 mövzu, 105 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">6</span><span class="ws-label">Mövzu</span></div>
      <div class="ws-item"><span class="ws-num">105</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">420</span><span class="ws-label">İzah</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Assurance Services": [{"q_tr": "İç denetim fonksiyonu bir güvence hizmeti gerçekleştirdiğinde kaç taraf dahil olur?", "q_en": "When the internal audit function performs an assurance engagement, how many parties are involved?", "options": [{"tr": "Bir / One", "en": "One", "cmt_tr": "Güvence hizmetinde yalnızca bir tarafın dahil olması mümkün değildir; her zaman birden fazla taraf gerekir.", "cmt_en": "Any engagement performed by the internal audit function involves more than one party."}, {"tr": "İki / Two", "en": "Two", "cmt_tr": "İki taraf, danışmanlık hizmetlerine özgüdür: iç denetçi (danışman) ve müşteri (danışılan).", "cmt_en": "Two parties apply to advisory engagements: the internal auditor as advisor and the client as advisee."}, {"tr": "Üç / Three", "en": "Three", "cmt_tr": "Güvence hizmetinde üç taraf vardır: süreç sahibi, iç denetçi (değerlendirici) ve değerlendirmeyi kullanan taraf.", "cmt_en": "Three parties are involved: the process owner, the internal auditor (assessor), and the user of the assessment."}, {"tr": "Tüm organizasyon / The entire organization", "en": "The entire organization", "cmt_tr": "Tüm organizasyonun dahil olduğu söylenemez; yalnızca belirli taraflar yer alır.", "cmt_en": "Only certain parties, not the entire organization, are involved in an internal audit assurance engagement."}], "correct": "C"}, {"q_tr": "Güvence hizmetleri ile danışmanlık hizmetleri arasındaki temel fark nedir?", "q_en": "The primary difference between assurance engagements and advisory engagements is the", "options": [{"tr": "Katılımın sağladığı güven düzeyi / Level of confidence the engagement provides", "en": "Level of confidence the engagement provides", "cmt_tr": "Güvence hizmetleri, organizasyonun yönetişim, risk yönetimi ve kontrol süreçlerine güven ve itimat oluşturmak için değerlendirmeler yapar; bu nedenle sağlanan güven düzeyi temel farktır.", "cmt_en": "Assurance services provide objective examinations to help organizations build trust in their governance, risk management, and control processes — making the confidence level the key distinction."}, {"tr": "Danışmanlık tavsiyelerinin etkinliği / Effectiveness of the consulting recommendations", "en": "Effectiveness of the consulting recommendations", "cmt_tr": "Danışmanlık tavsiyelerinin etkinliği, güvence ve danışmanlık arasındaki temel farkı tanımlamaz.", "cmt_en": "The effectiveness of consulting recommendations does not define the primary difference between assurance and advisory engagements."}, {"tr": "Yönetimin performans sorumluluğu düzeyi / Level of management responsibility for performance", "en": "Level of management responsibility for performance", "cmt_tr": "Yönetim sorumluluğu düzeyi her iki hizmet türü için de geçerli bir faktör değildir; iç denetçiler yönetim sorumluluğu üstlenmez.", "cmt_en": "The level of management responsibility is not a distinguishing factor; internal auditors should not take on management responsibility outside the internal audit function."}, {"tr": "Hizmetin maliyeti / Cost to perform the engagement", "en": "Cost to perform the engagement", "cmt_tr": "Maliyet, güvence ile danışmanlık hizmetleri arasındaki temel farkı belirlemez.", "cmt_en": "Cost is not necessarily a distinguishing factor between an advisory engagement and an assurance engagement."}], "correct": "A"}, {"q_tr": "Güvence hizmetleri iç denetçinin neyi içerir?", "q_en": "Assurance services involve an internal auditor's", "options": [{"tr": "Bir fonksiyonun verimliliğinin değerlendirilmesi / Appraisal of the efficiency of a function", "en": "Appraisal of the efficiency of a function", "cmt_tr": "Güvence hizmetleri yalnızca bir işlevi kapsamaz; yasalara uyumluluk değerlendirmesi ve görüş ifadesi de dahildir.", "cmt_en": "Assurance services are not limited to appraising efficiency; they also include assessing compliance with laws and expressing opinions."}, {"tr": "Yasalara uygunluğun değerlendirilmesi / Assessment of conformance with laws", "en": "Assessment of conformance with laws", "cmt_tr": "Güvence hizmetleri yalnızca uyumluluğu değerlendirmekle sınırlı değildir; verimlilik değerlendirmesi ve görüş ifadesi de kapsar.", "cmt_en": "Assurance services are not limited to compliance assessment; they also include appraising efficiency and expressing opinions or conclusions."}, {"tr": "Görüş veya sonuç ifadesi / Expression of opinions or conclusions", "en": "Expression of opinions or conclusions", "cmt_tr": "Güvence hizmetleri yalnızca görüş ifadesiyle sınırlı değildir; verimlilik değerlendirmesi ve uyumluluk değerlendirmesi de dahildir.", "cmt_en": "Assurance services are not limited to expressing opinions; they also include appraising efficiency and assessing conformance with laws."}, {"tr": "Tüm cevaplar doğru / All of the answers are correct", "en": "All of the answers are correct", "cmt_tr": "Güvence hizmetleri üç unsuru birden kapsar: verimlilik değerlendirmesi, yasalara uyumluluk ve görüş veya sonuç ifadesi.", "cmt_en": "Assurance services encompass all three: appraising efficiency, assessing compliance with laws, and expressing opinions or conclusions."}], "correct": "D"}, {"q_tr": "Bir organizasyonun dolandırıcılık önleme sürecinin etkinliğinin değerlendirilmesi hangi tür katılıma örnektir?", "q_en": "An evaluation of the effectiveness of an organization's fraud prevention process is an example of which type of engagement?", "options": [{"tr": "Uyumluluk / Compliance", "en": "Compliance", "cmt_tr": "Uyumluluk güvencesi, organizasyonun yasa, yönetmelik, sözleşme ve politikalara uygunluğunu inceler; dolandırıcılık önlemeyi değil.", "cmt_en": "Compliance assurance reviews controls to ensure adherence to laws, regulations, contractual arrangements, and internal policies — not fraud prevention."}, {"tr": "Operasyonel / Operational", "en": "Operational", "cmt_tr": "Operasyonel güvence, bir işlev veya sürecin verimlilik ve etkinliğini değerlendirir; dolandırıcılık önleme bu kapsamın içindedir.", "cmt_en": "Operational assurance reviews functions or processes to appraise efficiency and effectiveness, and fraud prevention explicitly falls within this scope."}, {"tr": "Bilgi teknolojisi / Information technology", "en": "Information technology", "cmt_tr": "BT güvencesi, bilgisayarlar, altyapı ve bulut bilişim gibi teknoloji sistemlerini inceler; dolandırıcılık önleme süreçlerini değil.", "cmt_en": "IT assurance reviews and tests technology systems such as computers, infrastructure, and cloud computing — not fraud prevention processes."}, {"tr": "Yönetişim / Governance", "en": "Governance", "cmt_tr": "Yönetişim bir güvence katılımı türü değil; yönetim kurulunun organizasyon faaliyetlerini yönetmek için uyguladığı süreç ve yapıların bütünüdür.", "cmt_en": "Governance is not a type of assurance engagement; it is the combination of processes and structures implemented by the board to direct and monitor organizational activities."}], "correct": "B"}, {"q_tr": "Aşağıdakilerden hangisi iç denetçiler tarafından bir güvence hizmeti olarak kabul edilir?", "q_en": "Which of the following activities would be considered an assurance service by the internal auditors?", "options": [{"tr": "Yönetim kurulu yeni şirket satın alımında iç denetçiden borç yapısı hakkında görüş istedi / The board requested the auditor's opinion on the new company's debt structure", "en": "The board requested the auditor's opinion on the new company's debt structure", "cmt_tr": "Güvence hizmetleri, kanıtların nesnel değerlendirmesini içerir. Yönetim kurulunun yeni şirketin borç yapısı hakkında görüş istemesi, üç taraflı yapıyı (süreç sahibi: yeni şirket, iç denetçi, kullanıcı: yönetim kurulu) tam olarak yansıtır.", "cmt_en": "Assurance services involve objective assessment of evidence. The board requesting the auditor's opinion on the new company's debt structure reflects the three-party structure: process owner (new company), internal auditor, and user (board)."}, {"tr": "İç denetim, envanter kontrol prosedürleri konusunda eğitim verdi / Internal audit provided training on inventory control procedures", "en": "Internal audit provided training on inventory control procedures", "cmt_tr": "Eğitim, danışmanlık hizmetleri kapsamında değerlendirilir. İç denetim fonksiyonunun amacı bağımsız ve nesnel güvence ile danışmanlık hizmetleri sunmaktır.", "cmt_en": "Training is considered an advisory service. The purpose of the internal audit function is to provide independent, objective assurance and advisory services — training falls under advisory."}, {"tr": "İç denetim, mülk vergisi beyannamelerinin hazırlanmasında yardımcı oldu / Internal audit assisted in preparing property tax returns", "en": "Internal audit assisted in preparing property tax returns", "cmt_tr": "Muhasebe, defter tutma ve vergi hizmetleri güvence hizmeti olarak kabul edilmez; bunlar bağımsız değerlendirme niteliği taşımaz.", "cmt_en": "Bookkeeping, accounting, and tax services are not considered assurance services; they do not constitute an independent examination of evidence."}, {"tr": "İç denetim, değişimi teşvik etmek için depo yöneticisiyle çalıştı / Internal audit worked with the warehouse manager to promote change", "en": "Internal audit worked with the warehouse manager to promote change", "cmt_tr": "Organizasyonel performansı incelemek amacıyla yönetimle birlikte çalışmak, bir kolaylaştırma hizmetidir ve danışmanlık kapsamında değerlendirilir.", "cmt_en": "Working with the warehouse manager to examine organizational performance for the purpose of promoting change is a facilitation service, which is an advisory engagement."}], "correct": "A"}, {"q_tr": "Bilgi teknolojisi (BT) güvencesinin en iyi tanımı nedir?", "q_en": "What is the best description of information technology (IT) assurance?", "options": [{"tr": "İşgücü yasalarına uyumu odaklayan kontrollerin gözden geçirilmesi / Review of controls focusing on compliance with labor laws", "en": "Review of controls focusing on compliance with labor laws", "cmt_tr": "Uyumluluk güvencesi, çalışma yasaları dahil yasa ve yönetmeliklere uyumu inceler; BT güvencesi değil.", "cmt_en": "Compliance assurance reviews controls focused on conformance with laws and regulations including labor laws — not IT assurance."}, {"tr": "Bilginin bütünlüğünü sağlamak için BT'nin gözden geçirilmesi ve test edilmesi / Review and testing of IT to assure the integrity of information", "en": "Review and testing of IT to assure the integrity of information", "cmt_tr": "BT güvencesi, bilgisayarlar, teknoloji altyapısı, mobil cihazlar ve bulut bilişim dahil BT sistemlerini inceleyerek bilginin bütünlüğünü sağlar.", "cmt_en": "IT assurance is the review and testing of IT — including computers, technology infrastructure, mobile devices, and cloud computing — to assure the integrity of information."}, {"tr": "Yıllık satış büyümesinin muhasebe yöntemleriyle ölçülebilirliğinin belirlenmesi / Determining that year-to-year growth in sales is measurable using accounting methods", "en": "Determining that year-to-year growth in sales is measurable using accounting methods", "cmt_tr": "Satışlardaki yıllık büyümenin ölçülebilirliğini belirlemek, finansal güvencenin konusudur; BT güvencesinin değil.", "cmt_en": "Determining that year-to-year growth in sales is measurable using accounting methods relates to financial assurance, not IT assurance."}, {"tr": "Yalnızca nitelikli müşterilere kredi verilip verilmediğinin incelenmesi / Reviewing credit policies to determine if only qualified customers are granted credit", "en": "Reviewing credit policies to determine if only qualified customers are granted credit", "cmt_tr": "Kredi politikalarının gözden geçirilmesi, operasyonel güvencenin kapsamında yer alır; BT güvencesinin değil.", "cmt_en": "Reviewing credit policies to determine whether only qualified customers are granted favorable credit terms falls under operational assurance, not IT assurance."}], "correct": "B"}, {"q_tr": "Güvence katılımında yer alan taraflara ilişkin aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which one of the following statements is true regarding the parties involved in an assurance engagement?", "options": [{"tr": "İki taraf dahil olur: süreç sahibi ve iç denetçi / Two parties are involved: the process owner and the internal auditor", "en": "Two parties are involved: the process owner and the internal auditor", "cmt_tr": "Süreç sahibi ve iç denetçiden oluşan iki taraflı yapı, danışmanlık katılımlarını tanımlar; güvence için yalnızca bu iki taraf yeterli değildir.", "cmt_en": "Two parties — process owner and internal auditor — describe advisory engagements; assurance requires an additional party (the user of the assessment)."}, {"tr": "Bir taraf dahil olur: iç denetçi / One party is involved: the internal auditor", "en": "One party is involved: the internal auditor", "cmt_tr": "Tek taraflı yapı hiçbir katılım türünü tanımlamaz; iç denetçi her zaman başka taraflarla birlikte çalışır.", "cmt_en": "One party does not define any engagement type; the internal auditor always works with other parties."}, {"tr": "Üç taraf dahil olur: süreç sahibi, iç denetçi ve kullanıcı / Three parties are involved: the process owner, the internal auditor, and the user", "en": "Three parties are involved: the process owner, the internal auditor, and the user", "cmt_tr": "Güvence katılımında üç taraf yer alır: (1) süreç sahibi, (2) iç denetçi ve (3) değerlendirmeyi kullanan kullanıcı.", "cmt_en": "Three parties are involved in an assurance engagement: (1) the process owner, (2) the internal auditor, and (3) the user of the assessment."}, {"tr": "Dört taraf dahil olur: yönetim kurulu, süreç sahibi, iç denetçi ve kullanıcı / Four parties: board, process owner, auditor, and user", "en": "Four parties: board, process owner, auditor, and user", "cmt_tr": "Yönetim kurulu güvence katılımına doğrudan dahil değildir; ancak güvence hizmetlerinden yararlanan kullanıcılar arasında olabilir.", "cmt_en": "The board is not directly involved in the assurance engagement as a fourth party; it may be among the users benefiting from assurance services."}], "correct": "C"}, {"q_tr": "İç denetim tarafından sağlanan güvence hizmetlerinin birincil amacı nedir?", "q_en": "The primary objective of assurance services provided by internal audit is to", "options": [{"tr": "Organizasyonel operasyonları doğrudan yönetmek ve karlılığı artırmak / Directly manage organizational operations and increase profitability", "en": "Directly manage organizational operations and increase profitability", "cmt_tr": "İç denetim, operasyonları doğrudan yönetmez; operasyonları değerlendirir ve yönetim sorumluluğu üstlenmez.", "cmt_en": "Internal audit does not directly manage operations; it evaluates them and does not take on management responsibility."}, {"tr": "Yönetişim, risk yönetimi ve kontrol süreçlerini güçlendirmek için bağımsız değerlendirmeler sunmak / Provide independent assessments to strengthen governance, risk management, and control", "en": "Provide independent assessments to strengthen governance, risk management, and control", "cmt_tr": "Güvence hizmetleri, organizasyonun yönetişim, risk yönetimi ve kontrol süreçlerini bağımsız olarak değerlendirir ve güçlendirir; operasyonların verimliliğine ve varlıkların korunmasına katkı sağlar.", "cmt_en": "Assurance services independently evaluate and strengthen an organization's governance, risk management, and control processes, promoting efficiency and safeguarding assets."}, {"tr": "Organizasyonel gizliliğin asla ihlal edilmemesini sağlamak / Ensure organizational confidentiality is never breached", "en": "Ensure organizational confidentiality is never breached", "cmt_tr": "Gizlilik ve mahremiyetin sağlanması önemlidir; ancak güvence hizmetlerinin birincil amacı değildir.", "cmt_en": "Confidentiality and privacy are important but are not the primary focus of assurance services provided by internal audit."}, {"tr": "Hukuki tavsiye sunmak ve organizasyonu davalardan korumak / Offer legal advice and protect the organization from litigation", "en": "Offer legal advice and protect the organization from litigation", "cmt_tr": "Hukuki tavsiye sunmak iç denetimin güvence hizmetlerinin kapsamı dışındadır.", "cmt_en": "Providing legal advice is outside the typical scope of internal audit's assurance services."}], "correct": "B"}, {"q_tr": "İç denetim güvence katılımları ile dış denetçiler tarafından yapılan denetimler arasındaki temel fark nedir?", "q_en": "What is a key difference between internal audit assurance engagements and those performed by external auditors?", "options": [{"tr": "İç denetim yalnızca finansal tablolara odaklanır / Internal audit focuses solely on financial statements", "en": "Internal audit focuses solely on financial statements", "cmt_tr": "İç denetim, yalnızca finansal tablolara değil; operasyonel süreçler, kontroller ve uyumluluk dahil geniş bir alana odaklanır.", "cmt_en": "Internal audits cover broader operational and control areas beyond just financial statements."}, {"tr": "Dış denetimin kapsamı daha geniştir / External audit has a more comprehensive scope", "en": "External audit has a more comprehensive scope", "cmt_tr": "İç denetimin kapsamı, dış denetimden genellikle daha geniştir; dış denetim ağırlıklı olarak finansal tablolara odaklanır.", "cmt_en": "Internal audits often have a more comprehensive scope compared with the financial statement emphasis of external audits."}, {"tr": "İç denetim iç kontrollerin etkinliğini vurgular / Internal audit emphasizes the effectiveness of internal controls", "en": "Internal audit emphasizes the effectiveness of internal controls", "cmt_tr": "İç denetim katılımları, çeşitli organizasyonel süreçler genelinde iç kontrollerin etkinliğini ve verimliliğini vurgular; finansal tablo doğruluğunun ötesine geçer.", "cmt_en": "Internal audit engagements emphasize evaluating the effectiveness and efficiency of internal controls across various organizational processes, extending beyond financial statements."}, {"tr": "Dış denetçiler öncelikle iç politikalara uyumu doğrular / External auditors primarily verify compliance with internal policies", "en": "External auditors primarily verify compliance with internal policies", "cmt_tr": "Dış denetçiler genellikle finansal tablo güvencesini sağlar; iç politika uyumluluğunu değil.", "cmt_en": "External auditors typically address financial statement assurance rather than verifying compliance with internal policies."}], "correct": "C"}, {"q_tr": "BT güvencesinde iç denetim katılımının birincil amacı nedir?", "q_en": "Which of the following is a primary objective of IT assurance in an internal audit engagement?", "options": [{"tr": "Günlük BT operasyonlarını yönetmek / Managing daily IT operations", "en": "Managing daily IT operations", "cmt_tr": "BT operasyonlarının günlük yönetimi, BT güvencesinin kapsamının dışındadır.", "cmt_en": "Managing daily IT operations is beyond the scope of IT auditing."}, {"tr": "BT sistemlerinin kullanıcı dostluğunu artırmak / Enhancing the user-friendliness of IT systems", "en": "Enhancing the user-friendliness of IT systems", "cmt_tr": "Kullanıcı dostu olmak, BT güvencesinin birincil ilgi alanı değildir; sistem bütünlüğü ve güvenliği ön plandadır.", "cmt_en": "User-friendliness is not the primary concern of IT assurance; integrity and security of information take precedence."}, {"tr": "Bilginin bütünlüğünü sağlamak / Ensuring the integrity of information", "en": "Ensuring the integrity of information", "cmt_tr": "BT güvencesi, BT sistemleri ve süreçlerini inceleyerek bilginin bütünlüğünü ve güvenliğini sağlar; yönetim ve altyapı kontrollerini değerlendirir.", "cmt_en": "IT assurance includes reviewing and testing IT systems and processes to ensure the integrity and security of information, evaluating controls related to IT governance and infrastructure."}, {"tr": "Stratejik BT hedefleri belirlemek / Setting strategic IT goals", "en": "Setting strategic IT goals", "cmt_tr": "Stratejik BT hedefleri, denetçiler tarafından değil; BT yönetimi tarafından belirlenir.", "cmt_en": "Strategic IT goals are set by IT management, not by auditors."}], "correct": "C"}, {"q_tr": "İç denetçiler tarafından yürütülen bir BT güvence denetiminde en az olası unsur hangisidir?", "q_en": "What element is least likely to be included in an IT assurance audit conducted by internal auditors?", "options": [{"tr": "Teknoloji altyapısının değerlendirilmesi / Assessment of technology infrastructure", "en": "Assessment of technology infrastructure", "cmt_tr": "Teknoloji altyapısının değerlendirilmesi, BT güvencesinin temel bileşenidir.", "cmt_en": "Assessment of technology infrastructure is integral to IT assurance."}, {"tr": "BT yönetişiminin değerlendirilmesi / Evaluation of IT governance", "en": "Evaluation of IT governance", "cmt_tr": "BT yönetişiminin değerlendirilmesi, BT denetimlerinin temel bileşenlerinden biridir.", "cmt_en": "Evaluation of IT governance is a core component of IT audits."}, {"tr": "Kullanıcı memnuniyeti anketleri / User satisfaction surveys", "en": "User satisfaction surveys", "cmt_tr": "BT güvencesi, kullanıcı memnuniyetini doğrudan ölçmek yerine sistemlerin bütünlüğünü, güvenilirliğini ve güvenliğini vurgular; bilgi varlıklarının korunması nihai hedeftir.", "cmt_en": "IT assurance emphasizes the integrity, reliability, and security of systems rather than directly assessing user satisfaction; safeguarding information assets is the ultimate objective."}, {"tr": "Bulut bilişim kontrollerinin test edilmesi / Testing of cloud computing controls", "en": "Testing of cloud computing controls", "cmt_tr": "Bulut bilişim kontrollerinin test edilmesi, BT güvencesinin sık rastlanan ve önemli bir parçasıdır.", "cmt_en": "Testing cloud computing controls is a frequent and important part of IT assurance."}], "correct": "C"}, {"q_tr": "İç denetçiler tarafından sağlanan güvence hizmetlerinin birincil amacı nedir?", "q_en": "The primary purpose of assurance services provided by internal auditors is to", "options": [{"tr": "Yönetim danışmanlık hizmetleri sunmak / Provide management advisory services", "en": "Provide management advisory services", "cmt_tr": "Danışmanlık hizmetleri, resmi güvence sağlamaz; tavsiye sunar.", "cmt_en": "Advisory services do not offer formal assurance; they provide advice and recommendations."}, {"tr": "Organizasyonun iç politikalara uymasını sağlamak / Ensure the organization adheres to internal policies", "en": "Ensure the organization adheres to internal policies", "cmt_tr": "Güvence hizmetleri uyumluluğu değerlendirmeyi kapsasa da bu birincil amaç değildir.", "cmt_en": "Assurance services include assessing compliance, but that is not their primary purpose."}, {"tr": "Organizasyonun değer yaratma ve sürdürme kapasitesini güçlendirmek / Strengthen the organization's ability to create and maintain value", "en": "Strengthen the organization's ability to create and maintain value", "cmt_tr": "Güvence hizmetleri, verimli operasyonlar, yasalara uyumluluk, etkin risk yönetimi ve varlıkların korunması yoluyla organizasyonun değer yaratma ve sürdürme kapasitesini güçlendirmek için yapılır.", "cmt_en": "Assurance services are performed to strengthen the organization's ability to create and maintain value through efficient operations, legal compliance, effective risk management, and proper safeguarding of assets."}, {"tr": "Günlük operasyonları verimli şekilde yönetmek / Manage day-to-day operations efficiently", "en": "Manage day-to-day operations efficiently", "cmt_tr": "Operasyonların günlük yönetimi güvence hizmetlerinin ana odağı değildir; hizmetler süreçleri verimlilik açısından değerlendirir.", "cmt_en": "Managing day-to-day operations is not the main focus of assurance services; they assess processes for efficiency and effectiveness."}], "correct": "C"}, {"q_tr": "İç denetçilerin güvence katılımları dış denetimden nasıl ayrılır?", "q_en": "In what way do internal auditors' assurance engagements differ from external audits?", "options": [{"tr": "Yalnızca finansal tablolara uygulanırlar / They apply only to financial statements", "en": "They apply only to financial statements", "cmt_tr": "Finansal tablolara odaklanmak dış denetimle ilgilidir; iç denetim çok daha geniş bir kapsama sahiptir.", "cmt_en": "Focusing on financial statements describes external audits, not internal assurance engagements which cover a much broader scope."}, {"tr": "Kapsamları geniş bir organizasyonel süreç yelpazesini kapsayabilir / Their scope can cover a wide range of organizational processes", "en": "Their scope can cover a wide range of organizational processes", "cmt_tr": "İç denetimin güvence katılımları geniş bir kapsama sahiptir; yönetişim, risk yönetimi ve kontrol süreçleri dahil çeşitli organizasyonel faaliyetleri kapsar.", "cmt_en": "Internal auditors' assurance engagements address various organizational activities and outputs beyond financial statements, including governance, risk management, and control processes."}, {"tr": "Genellikle daha pahalıdırlar / They are typically more expensive", "en": "They are typically more expensive", "cmt_tr": "Göreli maliyet, iç ve dış denetim arasındaki temel ayırt edici faktör değildir.", "cmt_en": "The relative cost is not a distinguishing factor emphasized in the distinction between internal and external audits."}, {"tr": "Dış denetçilerin talimatlarına bağlıdırlar / They adhere to the directions given by external auditors", "en": "They adhere to the directions given by external auditors", "cmt_tr": "İç denetçiler bağımsız değerlendirmeler yapar; dış denetçilerin talimatlarını takip etmez.", "cmt_en": "Internal auditors perform independent assessments and do not follow directions from external auditors."}], "correct": "B"}, {"q_tr": "İç denetim fonksiyonu tarafından sağlanan güvence hizmetlerinin temel amacı nedir?", "q_en": "The main goal of assurance services provided by the internal audit function is to", "options": [{"tr": "Karlılığı artırmak / Enhance profitability", "en": "Enhance profitability", "cmt_tr": "Karlılığı artırmak, güvence hizmetlerinin bir sonucu olabilir; ancak birincil hedef değildir.", "cmt_en": "Enhancing profitability can be a consequence of assurance services but is not their primary goal."}, {"tr": "Yönetişim, risk yönetimi ve kontrol süreçlerini iyileştirmek / Improve governance, risk management, and control processes", "en": "Improve governance, risk management, and control processes", "cmt_tr": "Güvence hizmetleri, organizasyonun yönetişim, risk yönetimi ve kontrol süreçlerini iyileştirmeyi hedefler; paydaşlar arasında güven ve itimat oluşturur.", "cmt_en": "Assurance services are intended to improve an organization's governance, risk management, and control processes, helping establish confidence among stakeholders."}, {"tr": "Pazar payını artırmak / Increase market share", "en": "Increase market share", "cmt_tr": "Pazar payını artırmak, güvence hizmetleri tarafından doğrudan ele alınan bir hedef değildir.", "cmt_en": "Increasing market share is not typically addressed by assurance services."}, {"tr": "Çalışan devir hızını azaltmak / Reduce employee turnover", "en": "Reduce employee turnover", "cmt_tr": "Çalışan devir hızını azaltmak, iyileştirilmiş süreçlerin bir yan etkisi olabilir; ancak güvence hizmetlerinin doğrudan hedefi değildir.", "cmt_en": "Reducing employee turnover may be a side effect of improved processes but is not a direct goal of assurance services."}], "correct": "B"}, {"q_tr": "Operasyonel güvenceyi en iyi tanımlayan hangisidir?", "q_en": "Which of the following best describes operational assurance?", "options": [{"tr": "BT sistemlerinin uyumluluk açısından test edilmesi / Testing IT systems for compliance", "en": "Testing IT systems for compliance", "cmt_tr": "BT sistemlerinin uyumluluk açısından test edilmesi, BT güvencesinin alanına girer; operasyonel güvencenin değil.", "cmt_en": "Testing IT systems for compliance is within the domain of IT assurance, not operational assurance."}, {"tr": "Finansal tablo doğruluğunun değerlendirilmesi / Evaluating financial statement accuracy", "en": "Evaluating financial statement accuracy", "cmt_tr": "Finansal tablo doğruluğunun değerlendirilmesi, dış finansal denetimlerin temel amacıdır; operasyonel güvencenin değil.", "cmt_en": "Evaluating financial statement accuracy is the basic purpose of external financial audits, not operational assurance."}, {"tr": "Operasyonların verimlilik ve etkinliğinin değerlendirilmesi / Appraising the efficiency and effectiveness of operations", "en": "Appraising the efficiency and effectiveness of operations", "cmt_tr": "Operasyonel güvence, bir işlev veya sürecin verimlilik ve etkinliğini değerlendirmeyi kapsar; ürün kalitesi, müşteri hizmetleri ve dolandırıcılık önleme bu kapsamda yer alır.", "cmt_en": "Operational assurance involves reviewing a function or process to determine efficiency and effectiveness, including product quality, customer service, and fraud prevention."}, {"tr": "Etik davranışın değerlendirilmesi / Assessing ethical conduct", "en": "Assessing ethical conduct", "cmt_tr": "Etik davranışın değerlendirilmesi operasyonel güvencenin yalnızca bir hedefidir; tek ve birincil odak noktası değildir.", "cmt_en": "Assessing ethical conduct is only one goal of operational assurance, not the sole or primary focus."}], "correct": "C"}, {"q_tr": "İç denetçilerin bir organizasyonda yürüttüğü güvence hizmetleri büyük olasılıkla ne amaçlamaktadır?", "q_en": "Internal auditor-conducted assurance services performed in an organization are intended to most likely", "options": [{"tr": "Stratejik girişimlere rehberlik sağlamak / Provide guidance on strategic initiatives", "en": "Provide guidance on strategic initiatives", "cmt_tr": "Stratejik rehberlik, genellikle üst yönetim ve yönetim kurulu tarafından sağlanır; güvence hizmetleri tarafından değil.", "cmt_en": "Strategic guidance is typically provided by senior management and the board, not by assurance services."}, {"tr": "Dış denetçilerin iç kontrolleri anlamasına yardımcı olmak / Help external auditors understand internal controls", "en": "Help external auditors understand internal controls", "cmt_tr": "Güvence hizmetleri iç değerlendirmelerdir; dış denetçiler, iç denetimi tamamlayıcı bilgi olarak kullanabilir.", "cmt_en": "Assurance services are internal evaluations; external auditors may use internal audits as supplementary information but that is not their primary intent."}, {"tr": "İç risk yönetimi süreçlerinin etkinliğini değerlendirmek / Evaluate the effectiveness of internal risk management processes", "en": "Evaluate the effectiveness of internal risk management processes", "cmt_tr": "Güvence hizmetleri, iç uygulamaların nesnel incelemesini sağlar; yönetişim, risk yönetimi ve kontrol süreçlerini güçlendirmeye yönelik birincil amaçla tasarlanmıştır.", "cmt_en": "Assurance services provide an objective examination of internal practices to evaluate how well they meet established standards, with the primary goal of strengthening governance, risk management, and control."}, {"tr": "Günlük operasyonları yönetmek ve yönlendirmek / Manage and direct day-to-day operations", "en": "Manage and direct day-to-day operations", "cmt_tr": "Günlük operasyonları yönetmek, güvence hizmetlerinin kapsamı dışındadır; bu hizmetler yönetim değil değerlendirme içerir.", "cmt_en": "Managing daily operations is outside the scope of assurance services, which focus on evaluation rather than management."}], "correct": "C"}, {"q_tr": "İç denetim fonksiyonunda güvence hizmetlerini danışmanlık hizmetlerinden ayıran nedir?", "q_en": "What distinguishes assurance services from advisory services within an internal audit function?", "options": [{"tr": "Güvence hizmetleri tavsiye sunar / Assurance services provide recommendations", "en": "Assurance services provide recommendations", "cmt_tr": "Güvence hizmetleri tavsiyeler sunmak yerine uyumluluk ve etkinliği değerlendirir.", "cmt_en": "Assurance services assess compliance and effectiveness rather than directly providing recommendations."}, {"tr": "Danışmanlık hizmetleri süreçleri belirlenmiş kriterlere göre değerlendirir / Advisory services involve evaluating processes against established criteria", "en": "Advisory services involve evaluating processes against established criteria", "cmt_tr": "Süreçleri belirlenmiş kriterlere göre değerlendirmek, danışmanlık değil güvence hizmetlerinin bir parçasıdır.", "cmt_en": "Evaluating processes against established criteria is a part of assurance services, not advisory."}, {"tr": "Güvence hizmetleri yönetişim, risk ve kontrolü güçlendirmek için objektif değerlendirmelerdir / Assurance services are objective evaluations to enhance governance, risk management, and control", "en": "Assurance services are objective evaluations to enhance governance, risk management, and control", "cmt_tr": "Güvence hizmetleri, iç denetçilerin yönetişim, risk yönetimi ve kontrol süreçlerinin belirlenmiş kriterleri karşıladığından emin olmak amacıyla nesnel değerlendirmeler yapmasını içerir; böylece paydaş güveni artar.", "cmt_en": "Assurance services involve internal auditors conducting objective evaluations to ensure governance, risk management, and control processes meet established criteria, thereby enhancing stakeholder confidence."}, {"tr": "Danışmanlık hizmetleri paydaş güvenini artırır / Advisory services improve stakeholder confidence", "en": "Advisory services improve stakeholder confidence", "cmt_tr": "Paydaş güvenini artırmak, danışmanlık değil güvence hizmetlerinin bir sonucudur.", "cmt_en": "Increasing stakeholder confidence is a result of assurance services, not the primary aim of advisory services."}], "correct": "C"}, {"q_tr": "Bir güvence katılımının kapsam ve niteliğini kim belirler?", "q_en": "The nature and scope of an assurance engagement are determined by the", "options": [{"tr": "Yönetim kurulu / Board", "en": "Board", "cmt_tr": "Yönetim kurulu, organizasyonun faaliyetlerini yönetmek ve denetlemekle görevlidir; güvence katılımının kapsam ve niteliğini belirlemez.", "cmt_en": "The board is charged with the responsibility to direct and oversee the organization's activity, not to determine the nature and scope of assurance engagements."}, {"tr": "İç denetçi / Internal auditor", "en": "Internal auditor", "cmt_tr": "İç denetim yetki belgesi çerçevesinde, iç denetçi nesnel güvence, tavsiye, içgörü ve öngörü sağlama hakkına sahiptir; bu nedenle güvence katılımının kapsam ve niteliğini iç denetçi belirler.", "cmt_en": "In accordance with the internal audit mandate, the internal auditor has the right to provide objective assurance, advice, insight, and foresight — thus the nature and scope of an assurance engagement are determined by the internal auditor."}, {"tr": "Üst yönetim / Senior management", "en": "Senior management", "cmt_tr": "Üst yönetim, organizasyonun günlük sorumluluklarını yönetmekle görevlidir; güvence katılımının kapsam ve niteliğini belirlemez.", "cmt_en": "Senior management is generally tasked with managing day-to-day responsibilities of the organization, not determining the nature and scope of assurance engagements."}, {"tr": "Katılım müşterisi / Engagement client", "en": "Engagement client", "cmt_tr": "Katılım müşterisi, güvence katılımının kapsam ve niteliğini belirlemez. Ancak danışmanlık katılımının kapsam ve niteliği, katılım müşteriyle anlaşmaya tabidir.", "cmt_en": "The engagement client does not determine the nature and scope of an assurance engagement. However, the nature and scope of an advisory engagement are subject to agreement with the engagement client."}], "correct": "B"}], "SU2 - Risk & Ctrl Self-Assess": [{"q_tr": "Kontrol öz-değerlendirmesi (KÖD) hakkında aşağıdakilerden hangisi yanlıştır?", "q_en": "Which of the following statements about control self-assessment (CSA) is false?", "options": [{"tr": "KÖD genellikle gayri resmi ve belgelenmemiş bir süreçtir / CSA is usually an informal and undocumented process", "en": "CSA is usually an informal and undocumented process", "cmt_tr": "KÖD, öz-değerlendirme anketleri ve kolaylaştırılmış çalıştayları kapsayan resmi ve belgelenmiş bir süreçtir; gayri resmi değildir.", "cmt_en": "CSA is a formal and documented methodology encompassing self-assessment surveys and facilitated workshops — it is not informal or undocumented."}, {"tr": "En saf haliyle KÖD, iş hedefleri, riskler ve kontrol süreçlerini entegre eder / In its purest form, CSA integrates business objectives, risks, and control processes", "en": "In its purest form, CSA integrates business objectives, risks, and control processes", "cmt_tr": "KÖD, en saf haliyle iş hedefleri ve riskleri kontrol süreçleriyle entegre eder.", "cmt_en": "CSA does integrate business objectives and risks with control processes in its purest form."}, {"tr": "KÖD aynı zamanda kontrol/risk öz-değerlendirmesi olarak da bilinir / CSA is also known as control/risk self-assessment", "en": "CSA is also known as control/risk self-assessment", "cmt_tr": "KÖD, kontrol/risk öz-değerlendirmesi olarak da bilinir.", "cmt_en": "CSA is also known as control/risk self-assessment — this is correct."}, {"tr": "Çoğu KÖD programı bazı temel özellikleri paylaşır / Most implemented CSA programs share some key features and goals", "en": "Most implemented CSA programs share some key features and goals", "cmt_tr": "Çoğu KÖD programı bazı temel özellikleri ve hedefleri paylaşır.", "cmt_en": "Most implemented CSA programs do share some key features and goals — this statement is correct."}], "correct": "A"}, {"q_tr": "Kolaylaştırılmış takım çalıştayı yaklaşımlarından birini kullanan bir KÖD'ün unsurları nelerdir?", "q_en": "The element(s) of a CSA performed using one of the facilitated team workshop approaches include(s)", "options": [{"tr": "Katılan çalışanlara süreç sahibi olarak davranmak / Treating participating employees as process owners", "en": "Treating participating employees as process owners", "cmt_tr": "Kolaylaştırılmış çalıştay yaklaşımında katılımcılar, süreçle ilgili en çok bilen kişiler olan yönetim ve personelden oluşur; bu kişilere süreç sahibi denir.", "cmt_en": "In the facilitated workshop approach, participants are 'process owners' — management and staff involved with the issues under examination, gathered in a same-time/same-place meeting."}, {"tr": "Çalışanlara riskler ve kontroller hakkında basit evet/hayır anketi uygulamak / Taking a simple yes/no survey of employees regarding risks and controls", "en": "Taking a simple yes/no survey of employees regarding risks and controls", "cmt_tr": "Basit evet/hayır anketi, kolaylaştırılmış çalıştay değil; anket yaklaşımını tanımlar.", "cmt_en": "A simple yes/no survey describes the questionnaire approach, not the facilitated workshop approach."}, {"tr": "Çalışanları ayrı ayrı saha görüşmesi yapmak / Interviewing employees separately in the field", "en": "Interviewing employees separately in the field", "cmt_tr": "Saha görüşmeleri yapmak, kolaylaştırılmış çalıştay değil; ayrı bir yaklaşımı tanımlar.", "cmt_en": "Conducting separate field interviews describes a different approach, not the facilitated workshop approach."}, {"tr": "1, 2 ve 3 / 1, 2, and 3", "en": "1, 2, and 3", "cmt_tr": "Anket ve saha görüşmeleri, kolaylaştırılmış çalıştay yaklaşımıyla zıttır; bu seçenek yanlış unsurları birleştiriyor.", "cmt_en": "Surveys and separate field interviews are contrasted with the facilitated workshop approach — combining them incorrectly describes the facilitated method."}], "correct": "A"}, {"q_tr": "KÖD programlarının üç temel yaklaşımından hangisi, iş birimindeki farklı düzeylerden çalışma ekiplerinden bilgi toplamak için tasarlanmıştır?", "q_en": "Of the three primary approaches of CSA programs, which one is designed to gather information from work teams representing different levels in the business unit?", "options": [{"tr": "Denetçi tarafından üretilen analiz / Auditor-produced analysis", "en": "Auditor-produced analysis", "cmt_tr": "Denetçi tarafından üretilen analiz, KÖD programlarının üç temel yaklaşımından biri değildir.", "cmt_en": "Auditor-produced analysis is not one of the three recognized primary forms of CSA programs."}, {"tr": "Kolaylaştırılmış yaklaşım / Facilitated approach", "en": "Facilitated approach", "cmt_tr": "Kolaylaştırılmış yaklaşım, iş birimi veya fonksiyondaki farklı düzeylerden çalışma ekiplerinden bilgi toplamak için tasarlanmıştır. Format; hedef, risk, kontrol veya süreç odaklı olabilir.", "cmt_en": "The facilitated approach gathers information from work teams representing different levels in the business unit or function. The format may be objective-, risk-, control-, or process-based."}, {"tr": "Anket yaklaşımı / Questionnaire approach", "en": "Questionnaire approach", "cmt_tr": "Anket yaklaşımı, farklı düzeylerden çalışma ekipleri yerine anket formları kullanır.", "cmt_en": "The questionnaire form of CSA uses surveys rather than work teams representing different levels in the business unit or function."}, {"tr": "Öz-sertifikasyon yaklaşımı / Self-certification approach", "en": "Self-certification approach", "cmt_tr": "Öz-sertifikasyon yaklaşımı, farklı düzeylerdeki çalışma ekiplerinden değil; yönetim tarafından üretilen analizlere dayanır.", "cmt_en": "The self-certification approach is based on management-produced analyses, not work teams representing different levels."}], "correct": "B"}, {"q_tr": "KÖD'ün üç temel türünden hangisi, BAY'ın yönetim tarafından sağlanan bilgileri sentezleyerek kontroller hakkındaki anlayışı artırmasına olanak tanır?", "q_en": "Which type of CSA program allows for the CAE to synthesize information provided by management to enhance the understanding about controls?", "options": [{"tr": "Kolaylaştırılmış yaklaşım / Facilitated approach", "en": "Facilitated approach", "cmt_tr": "Kolaylaştırılmış yaklaşım, iş birimindeki farklı düzeylerden çalışma ekiplerinden bilgi toplar; BAY'ın sentezlemesine değil.", "cmt_en": "The facilitated approach gathers information from work teams at different levels in the business unit — it does not specifically enable the CAE to synthesize management's analysis."}, {"tr": "Öz-sertifikasyon yaklaşımı / Self-certification approach", "en": "Self-certification approach", "cmt_tr": "Öz-sertifikasyon yaklaşımında yönetim, seçili iş süreçleri ve kontrol prosedürleri hakkında analizler üretir. İç denetçi bu analizi diğer bilgilerle sentezleyerek iş ve fonksiyonel birim yöneticileriyle paylaşabilir.", "cmt_en": "The self-certification approach is based on management-produced analyses. The internal auditor may synthesize this analysis with other information to enhance understanding and share knowledge with managers."}, {"tr": "Anket yaklaşımı / Questionnaire approach", "en": "Questionnaire approach", "cmt_tr": "Anket yaklaşımı, ağırlıklı olarak evet/hayır sorularından oluşan anketler kullanır; BAY'ın sentezleme sürecini tanımlamaz.", "cmt_en": "The questionnaire approach uses surveys with mostly yes/no or have/have-not questions — it does not describe the CAE's synthesis process."}, {"tr": "Denetçi tarafından üretilen analiz / Auditor-produced analysis", "en": "Auditor-produced analysis", "cmt_tr": "Denetçi tarafından üretilen analiz, KÖD'ün üç temel yaklaşımından biri değildir.", "cmt_en": "Auditor-produced analysis is not one of the three primary forms of CSA programs."}], "correct": "B"}, {"q_tr": "Öz-değerlendirme metodolojilerinden hangi sonuç elde edilebilir?", "q_en": "Which outcome can be derived from self-assessment methodologies?", "options": [{"tr": "Resmi, sert kontroller daha kolay tanımlanır ve değerlendirilir / Formal, hard controls are more easily identified and evaluated", "en": "Formal, hard controls are more easily identified and evaluated", "cmt_tr": "Öz-değerlendirme metodolojileri, resmi sert kontrolleri değil; gayri resmi yumuşak kontrolleri daha kolay tanımlar ve değerlendirir.", "cmt_en": "Self-assessment methodologies more easily identify and evaluate informal, soft controls — not formal, hard controls."}, {"tr": "Yönetim çalışma ekipleri için kolaylaştırıcı, yazman ve raporlayıcı olarak görev yaparak süreçte aktif rol alır / Management will become facilitators, scribes, and reporters for the work teams", "en": "Management will become facilitators, scribes, and reporters for the work teams", "cmt_tr": "İç denetçiler, çalışma ekipleri için kolaylaştırıcı, yazman ve raporlayıcı olarak görev yaparak KÖD sürecinde bilgi kazanır; yönetim değil.", "cmt_en": "Internal auditors, not management, will become involved and knowledgeable about the self-assessment process by serving as facilitators, scribes, and reporters for the work teams."}, {"tr": "Denetçilerin risk yönetimi ve kontrol süreçlerindeki sorumluluğu pekiştirilir / Auditors' responsibility for risk management and control is reinforced", "en": "Auditors' responsibility for risk management and control is reinforced", "cmt_tr": "Öz-değerlendirme, denetçilerin değil; yönetimin risk yönetimi ve kontrol süreçlerindeki sorumluluğunu pekiştirir.", "cmt_en": "Self-assessment reinforces management's (not auditors') responsibility for risk management and control processes, and managers will be less tempted to delegate those activities to specialists."}, {"tr": "İnsanlar kendi birimlerindeki kontrol süreçlerinin sahipliğini almaya motive olur / People are motivated to take ownership of the control processes in their units", "en": "People are motivated to take ownership of the control processes in their units", "cmt_tr": "Öz-değerlendirme metodolojilerinin olası sonuçlarından biri, insanların kendi birimlerindeki kontrol süreçlerinin sahipliğini almaya motive olması ve alınan düzeltici önlemlerin daha etkili ve zamanında olmasıdır.", "cmt_en": "One possible outcome of self-assessment is that people are motivated to take ownership of the control processes in their units and corrective actions taken by work teams are often more effective and timely."}], "correct": "D"}, {"q_tr": "Hangi tür kolaylaştırılmış yaklaşım formatı, bir hedefi başarmayı engelleyebilecek tüm olası engel ve tehditleri listeleyerek başlar?", "q_en": "Which type of facilitated approach format begins by listing all possible barriers, obstacles, threats, and exposures that might prevent achieving an objective?", "options": [{"tr": "Hedef tabanlı format / Objective-based format", "en": "Objective-based format", "cmt_tr": "Hedef tabanlı format, halihazırda yerinde olan kontrolleri tanımlayarak başlar ve ardından artık riskleri belirler; engel listelemeyle değil.", "cmt_en": "The objective-based format begins by identifying controls currently in place and then determines the residual risks — not by listing obstacles."}, {"tr": "Kontrol tabanlı format / Control-based format", "en": "Control-based format", "cmt_tr": "Kontrol tabanlı format, kolaylaştırıcının temel risk ve kontrolleri tanımladığı bir yaklaşımdır; engel listelemeyle başlamaz.", "cmt_en": "The control-based format has the facilitator identifying key risks and controls before the workshop begins — it does not start by listing obstacles."}, {"tr": "Süreç tabanlı format / Process-based format", "en": "Process-based format", "cmt_tr": "Süreç tabanlı format, bir süreç zincirinin unsurları olan seçili faaliyetlere odaklanır.", "cmt_en": "The process-based format focuses on selected activities that are elements of a chain of processes — not on listing obstacles."}, {"tr": "Risk tabanlı format / Risk-based format", "en": "Risk-based format", "cmt_tr": "Risk tabanlı format, bir hedefi başarmayı engelleyebilecek tüm olası engel, tehdit ve maruziyetleri listeleyerek başlar ve ardından bu riskleri yönetmek için kontrol prosedürlerini inceler.", "cmt_en": "The risk-based format begins by listing all possible barriers, obstacles, threats, and exposures that might prevent achieving an objective, then examines control procedures to determine if they are sufficient to manage the key risks."}], "correct": "D"}, {"q_tr": "Bir BT bölümünde KÖD projesi yürütülürken yöneticilerden her belirlenen riski ve ilgili her kontrolü derecelendirmesi isteniyor. Bu uygulamanın en önemli dezavantajı nedir?", "q_en": "While conducting a CSA project in an IT division, an internal auditor asks managers to rate the severity of each risk and strength of each control. What is the most significant disadvantage?", "options": [{"tr": "Harcanan bütçe saatleri somut faydaları aşacak / Budget hours expended will exceed any tangible benefits", "en": "Budget hours expended will exceed any tangible benefits", "cmt_tr": "Ölçülebilir faydaları aşacak bütçe saatleri mümkün olabilir; ancak tüm faydaları aşmak zorunda değildir.", "cmt_en": "Budgeted hours may exceed readily measurable (tangible) benefits but not necessarily all benefits — this is not the most significant disadvantage."}, {"tr": "Bölümdeki sonraki denetimler yapılmayabilir / Subsequent audits of the division may not be conducted", "en": "Subsequent audits of the division may not be conducted", "cmt_tr": "Sonraki denetimlerin yapılıp yapılmaması, bölümün risk değerlendirmesi ve diğer faktörlere bağlıdır; doğrudan bu uygulamanın dezavantajı değildir.", "cmt_en": "Whether subsequent audits occur depends on many other factors including the division's risk assessment — not directly on this exercise."}, {"tr": "Yönetim önemli kontrol zafiyetlerini atlayabilir / Management may omit important control weaknesses", "en": "Management may omit important control weaknesses", "cmt_tr": "KÖD süreci, işletme yöneticilerinden risk ve kontrolleri değerlendirmelerini ister. Ancak kendi değerlendirmesini yapan yöneticiler, risk yönetimi konusunda yeterli beceriye sahip olmayabilir; bu nedenle önemli kontrol zafiyetleri atlanabilir.", "cmt_en": "The CSA process requires operating managers to assess risks and controls. However, managers performing self-assessment may not be skilled in risk management, so relevant risks and controls may not be identified or properly assessed."}, {"tr": "İç denetim fonksiyonu kontrollerden sorumlu tutulacak / The internal audit function will be viewed as responsible for controls", "en": "The internal audit function will be viewed as responsible for controls", "cmt_tr": "Kontroller için sorumluluk, iç denetim değil; yönetim kurulu ve üst yönetimdedir.", "cmt_en": "The board and senior management are responsible for controls — not the internal audit function."}], "correct": "C"}, {"q_tr": "Kolaylaştırılmış yaklaşımların hangi formatı, organizasyonun hedeflerine ulaşmanın en iyi yoluna odaklanır?", "q_en": "Which type of format of CSA facilitated approaches focuses on the best way to accomplish the goals of the organization?", "options": [{"tr": "Süreç tabanlı format / Process-based format", "en": "Process-based format", "cmt_tr": "Süreç tabanlı format, bir süreç zincirinin unsurları olan seçili faaliyetlere odaklanır; organizasyonun hedeflerine ulaşmanın en iyi yoluna değil.", "cmt_en": "The process-based format focuses on selected activities that are elements of a chain of processes — not on the best way to accomplish organizational goals."}, {"tr": "Kontrol tabanlı format / Control-based format", "en": "Control-based format", "cmt_tr": "Kontrol tabanlı format, mevcut kontrollerin ne kadar iyi çalıştığına odaklanır; hedeflere ulaşmanın en iyi yoluna değil.", "cmt_en": "The control-based format focuses on how well the controls in place are working — not on the best way to accomplish a business objective."}, {"tr": "Risk tabanlı format / Risk-based format", "en": "Risk-based format", "cmt_tr": "Risk tabanlı format, bir hedefi başarmaya yönelik riskleri listelemeye odaklanır; hedeflere ulaşmanın en iyi yolunu bulmaya değil.", "cmt_en": "The risk-based format focuses on listing the risks to achieving an objective — not on finding the best way to accomplish goals."}, {"tr": "Hedef tabanlı format / Objective-based format", "en": "Objective-based format", "cmt_tr": "Hedef tabanlı format, bir iş hedefine ulaşmanın en iyi yoluna odaklanır. Çalıştay, halihazırda yerinde olan kontrolleri tanımlayarak başlar ve ardından kalan artık riski belirler.", "cmt_en": "The objective-based format focuses on the best way to accomplish a business objective. The workshop begins by identifying the controls presently in place to support the objective and then determines the residual risk remaining."}], "correct": "D"}, {"q_tr": "Üst yönetim, bir KÖD programını anket yaklaşımı kullanarak benimsemeye karar verdi. Bir sonraki denetim üzerindeki etkisi nedir?", "q_en": "Senior management adopted a CSA program using a questionnaire approach. What is the effect on the next audit?", "options": [{"tr": "Denetim testleri büyük ölçüde ortadan kalkacak / Audit tests will be substantially eliminated", "en": "Audit tests will be substantially eliminated", "cmt_tr": "KÖD programı bazı testleri ortadan kaldırabilir; ancak denetim testlerini tamamen ortadan kaldırmaz.", "cmt_en": "A CSA program may reduce the effort expended, but it does not substantially eliminate all audit tests."}, {"tr": "KÖD anketi iç denetim fonksiyonu tarafından kontrol edilmelidir / The CSA survey must be controlled by the internal audit function", "en": "The CSA survey must be controlled by the internal audit function", "cmt_tr": "KÖD, iç denetim fonksiyonunun denetimi olmaksızın yönetim ve çalışma ekipleri tarafından gerçekleştirilir.", "cmt_en": "CSA is performed by management and work teams without supervision by the internal audit function."}, {"tr": "İç denetçilerin kontrollerin yerinde ve amaçlandığı gibi çalıştığını doğrulaması gerekir / The internal auditors need to verify that the controls are in place and working as intended", "en": "The internal auditors need to verify that the controls are in place and working as intended", "cmt_tr": "KÖD programı bazı çabaları azaltabilir; ancak tanımlanan kontrollerin varlığı ve düzgün işleyişi hâlâ doğrulanmalıdır.", "cmt_en": "A CSA program may reduce effort, but the existence and proper operation of the identified controls must still be verified by internal auditors."}, {"tr": "İç denetim fonksiyonu sonuçları doğrudan alacak / The internal audit function will receive the results directly", "en": "The internal audit function will receive the results directly", "cmt_tr": "Anket sonuçları, iç denetim fonksiyonuna değil; değerlendirilen iş birimlerindeki kişilerin doğrudan yararına yöneliktir.", "cmt_en": "Survey results are for the immediate benefit of people in the business units assessed — not directed to the internal audit function."}], "correct": "C"}, {"q_tr": "KÖD, organizasyonun kontrol sistemini incelemek ve değerlendirmek için bir yöntemdir. Bu yöntem neyi içerir?", "q_en": "Control self-assessment (CSA) is a method for examining and evaluating the organization's system of control, which includes", "options": [{"tr": "Risk analizi / Risk analysis", "en": "Risk analysis", "cmt_tr": "KÖD, yalnızca risk analizini değil; öz-değerlendirme yaklaşımlarını ve geleneksel iç denetim kavramlarını da kapsar.", "cmt_en": "CSA also includes self-assessment approaches and traditional internal auditing concepts — not just risk analysis."}, {"tr": "Öz-değerlendirme yaklaşımları / Self-assessment approaches", "en": "Self-assessment approaches", "cmt_tr": "KÖD, yalnızca öz-değerlendirme yaklaşımlarını değil; risk analizini ve geleneksel iç denetim kavramlarını da kapsar.", "cmt_en": "CSA also includes risk analysis and traditional internal auditing concepts — not just self-assessment approaches."}, {"tr": "Geleneksel iç denetim kavramları / Traditional internal auditing concepts", "en": "Traditional internal auditing concepts", "cmt_tr": "KÖD, yalnızca geleneksel iç denetim kavramlarını değil; risk analizini ve öz-değerlendirme yaklaşımlarını da kapsar.", "cmt_en": "CSA also includes risk analysis and self-assessment approaches — not just traditional internal auditing concepts."}, {"tr": "Tüm cevaplar doğru / All of the answers are correct", "en": "All of the answers are correct", "cmt_tr": "KÖD, geleneksel denetim kavramlarını, risk analizini ve öz-değerlendirme yaklaşımlarını bir araya getirir. Bu üç bilgi türü değerlendirme sürecinde kullanılır.", "cmt_en": "CSA combines traditional auditing concepts, risk analysis, and self-assessment approaches. All three types of information are used while performing this type of assessment."}], "correct": "D"}, {"q_tr": "Kolaylaştırılmış yaklaşımın hangi formatında kolaylaştırıcı, çalıştay başlamadan önce temel kontrolleri belirler?", "q_en": "In which format of the facilitated approach does the facilitator identify the key controls before the beginning of the workshop?", "options": [{"tr": "Kontrol tabanlı format / Control-based format", "en": "Control-based format", "cmt_tr": "Kontrol tabanlı formatta kolaylaştırıcı, çalıştay başlamadan önce temel risk ve kontrolleri belirler. Çalıştay sırasında ekip, kontrollerin riskleri ne ölçüde azalttığını değerlendirir.", "cmt_en": "The control-based format has the facilitator identify key risks and controls before the workshop begins. During the workshop, the work team assesses how well the controls mitigate risks and promote achievement of objectives."}, {"tr": "Hedef tabanlı format / Objective-based format", "en": "Objective-based format", "cmt_tr": "Hedef tabanlı format, halihazırda yerinde olan kontrolleri tanımlayarak başlar ve ardından artık riskleri belirler; kolaylaştırıcı kontrolleri önceden belirlemez.", "cmt_en": "The objective-based format begins by identifying controls currently in place and then determining residual risks — the facilitator does not pre-identify the controls."}, {"tr": "Risk tabanlı format / Risk-based format", "en": "Risk-based format", "cmt_tr": "Risk tabanlı format, bir hedefi başarmayı engelleyebilecek riskleri listelemeye odaklanır.", "cmt_en": "The risk-based format focuses on listing the risks to achieving an objective — not on pre-identifying controls before the workshop."}, {"tr": "Süreç tabanlı format / Process-based format", "en": "Process-based format", "cmt_tr": "Süreç tabanlı format, bir süreç zincirinin unsurları olan seçili faaliyetlere odaklanır.", "cmt_en": "The process-based format focuses on selected activities that are elements of a chain of processes — not on pre-identifying controls."}], "correct": "A"}, {"q_tr": "Hangi kolaylaştırılmış yaklaşım formatının amacı, prosedürlerin etkin çalışıp çalışmadığına karar vermektir?", "q_en": "The aim of which format of the facilitated approach is to decide whether procedures are working effectively?", "options": [{"tr": "Kontrol tabanlı format / Control-based format", "en": "Control-based format", "cmt_tr": "Kontrol tabanlı formatın amacı, kontrollerin nasıl çalıştığı ile yönetimin beklentileri arasındaki boşluğu analiz etmektir; prosedürlerin etkin çalışıp çalışmadığına karar vermek değil.", "cmt_en": "The aim of the control-based format is to produce an analysis of the gap between how controls are working and how well management expects those controls to work — not to decide if procedures are working effectively."}, {"tr": "Hedef tabanlı format / Objective-based format", "en": "Objective-based format", "cmt_tr": "Hedef tabanlı format, bir iş hedefine ulaşmanın en iyi yoluna odaklanır. Amacı, prosedürlerin etkin çalışıp çalışmadığına ve artık riskin kabul edilebilir düzeyde olup olmadığına karar vermektir.", "cmt_en": "The objective-based format focuses on the best way to accomplish a business objective. The aim is to decide whether the procedures are working effectively and whether residual risks are within an acceptable level."}, {"tr": "Süreç tabanlı format / Process-based format", "en": "Process-based format", "cmt_tr": "Süreç tabanlı formatın amacı, sürecin tamamını ve bileşen faaliyetlerini değerlendirmek, güncellemek ve geliştirmektir.", "cmt_en": "The aim of the process-based format is to evaluate, update, validate, improve, and even streamline
