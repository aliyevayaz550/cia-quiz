 the whole process and its component activities."}, {"tr": "Risk tabanlı format / Risk-based format", "en": "Risk-based format", "cmt_tr": "Risk tabanlı formatın amacı, önemli artık riskleri belirlemektir.", "cmt_en": "The aim of the risk-based format is to determine significant residual risks — not to decide if procedures are working effectively."}], "correct": "B"}, {"q_tr": "Yönetim bilgi toplama sürecinde harcanan zaman ve maliyetleri en aza indirmek istiyorsa KÖD'ün hangi yaklaşımı kullanılmalıdır?", "q_en": "Which of the three primary approaches of CSA programs should be used if management wants to minimize the time spent and costs incurred in gathering the information?", "options": [{"tr": "Öz-sertifikasyon yaklaşımı / Self-certification approach", "en": "Self-certification approach", "cmt_tr": "Öz-sertifikasyon yaklaşımı zaman alıcı olabilir; bu nedenle zaman ve maliyet tasarrufu sağlamak isteyen yönetim için en uygun seçenek değildir.", "cmt_en": "The self-certification approach can be time-consuming and therefore is not the best option for management wanting to minimize time and costs."}, {"tr": "Kolaylaştırılmış yaklaşım / Facilitated approach", "en": "Facilitated approach", "cmt_tr": "Kolaylaştırılmış yaklaşım, çalıştay toplantıları gerektirdiğinden zaman alıcı olabilir.", "cmt_en": "The facilitated approach can be time-consuming due to the workshop meetings it requires."}, {"tr": "Denetçi tarafından üretilen analiz / Auditor-produced analysis", "en": "Auditor-produced analysis", "cmt_tr": "Denetçi tarafından üretilen analiz, KÖD'ün üç temel yaklaşımından biri değildir.", "cmt_en": "Auditor-produced analysis is not one of the three primary approaches of CSA programs."}, {"tr": "Anket yaklaşımı / Questionnaire approach", "en": "Questionnaire approach", "cmt_tr": "Anket yaklaşımı, ağırlıklı olarak evet/hayır veya var/yok sorularından oluşan anketler kullanır. Özellikle yanıt verenler çok sayıda ya da geniş bir coğrafyaya dağılmışsa veya organizasyon kültürü açık tartışmaları engelliyorsa tercih edilir.", "cmt_en": "The questionnaire (survey) approach uses mostly yes/no or have/have-not questions. It is preferred when respondents are numerous or dispersed, or when the organizational culture hinders open discussions in workshops."}], "correct": "D"}, {"q_tr": "KÖD sürecinin kontrol tabanlı yaklaşımını en iyi hangi ifade tanımlar?", "q_en": "Which phrase best describes the control-based approach of the control self-assessment process?", "options": [{"tr": "Seçili kontrol süreçlerini değerlendirmek, güncellemek ve düzene sokmak / Evaluating, updating, and streamlining selected control processes", "en": "Evaluating, updating, and streamlining selected control processes", "cmt_tr": "Bu ifade, süreç tabanlı yaklaşımı tanımlar; kontrol süreçlerine özgü olmamakla birlikte.", "cmt_en": "This phrase best describes a process-based approach, although control processes are not the only processes reviewed in that approach."}, {"tr": "Temel riskleri yönetmede kontrollerin ne kadar iyi çalıştığını incelemek / Examining how well controls are working in managing key risks", "en": "Examining how well controls are working in managing key risks", "cmt_tr": "Kontrol tabanlı format, mevcut kontrollerin ne kadar iyi çalıştığına odaklanır. Kolaylaştırıcı, çalıştay öncesinde temel risk ve kontrolleri belirler; ekip ise kontrollerin riskleri azaltıp azaltmadığını değerlendirir.", "cmt_en": "The control-based format focuses on how well the controls in place are working. The facilitator pre-identifies key risks and controls; the team then assesses how well the controls mitigate risks and promote achievement of objectives."}, {"tr": "Kontrol tasarımı ile kontrol çerçeveleri arasındaki boşluğu analiz etmek / Analyzing the gap between control design and control frameworks", "en": "Analyzing the gap between control design and control frameworks", "cmt_tr": "Kontrol tasarımı ile kontrol çerçevelerini karşılaştırmak, kontrol tabanlı süreci yeterince tanımlamaz; bu süreç daha çok kontrol tasarımı ile etkinliği arasındaki boşluğu inceler.", "cmt_en": "Comparing control design and control frameworks does not adequately describe the control-based process, which more likely examines the gap between control design and control effectiveness."}, {"tr": "Kontrollerin maliyet etkinliğini belirlemek / Determining the cost-effectiveness of controls", "en": "Determining the cost-effectiveness of controls", "cmt_tr": "Maliyet etkinliği, kontrol tabanlı KÖD çalıştayında tartışılabilir; ancak birincil odak noktası değildir.", "cmt_en": "Cost-effectiveness could be discussed in a control-based CSA workshop, but it is not the primary focus of this process."}], "correct": "B"}, {"q_tr": "Bir organizasyon neden KÖD'ün anket formunu kullanmalıdır?", "q_en": "Why should an organization use the survey form of control self-assessment (CSA)?", "options": [{"tr": "Az sayıda katılımcı gereklidir / Few respondents are required to respond", "en": "Few respondents are required to respond", "cmt_tr": "Anket formu, az sayıda değil; çok sayıda katılımcı olduğunda kullanılır.", "cmt_en": "The survey form should be used when respondents are numerous, not few."}, {"tr": "Katılımcılar geniş bir alana dağılmamıştır / Respondents are not widely dispersed", "en": "Respondents are not widely dispersed", "cmt_tr": "Anket formu, katılımcılar yakın değil; geniş bir coğrafyaya dağılmışsa kullanılır.", "cmt_en": "The survey form should be used when respondents are widely dispersed — not when they are located nearby."}, {"tr": "Zaman kısıtlaması yoktur / No time constraint is involved", "en": "No time constraint is involved", "cmt_tr": "Anket formu, zaman kısıtlaması yokken değil; yönetim bilgi toplamada zaman ve maliyet tasarrufu sağlamak istediğinde kullanılır.", "cmt_en": "The survey form should be used when management wants to minimize time spent and costs incurred — not when there is no time constraint."}, {"tr": "Organizasyon kültürü açıklığı teşvik etmemektedir / The organizational culture does not encourage openness", "en": "The organizational culture does not encourage openness", "cmt_tr": "Organizasyon kültürü çalıştay ortamında açık tartışmaları engelliyorsa anket formu tercih edilir. Çok sayıda ya da geniş coğrafyaya dağılmış katılımcılar için de uygundur.", "cmt_en": "The survey form is preferred when the organizational culture may hinder open, candid discussions in workshop settings, or when respondents are too numerous or widely dispersed."}], "correct": "D"}, {"q_tr": "Aşağıdakilerden hangileri bir KÖD programının yaklaşımları arasındadır?", "q_en": "Which of the following are approaches to a control self-assessment (CSA) program?", "options": [{"tr": "1 ve 2 / 1 and 2", "en": "1 and 2", "cmt_tr": "Maliyet-fayda, KÖD programlarının üç temel yaklaşımından biri değildir.", "cmt_en": "Cost-benefit is not one of the three primary approaches to a CSA program."}, {"tr": "1 ve 3 / 1 and 3", "en": "1 and 3", "cmt_tr": "Kolaylaştırma ve anket, KÖD'ün iki temel yaklaşımıdır; ancak bu seçenek üçüncü yaklaşım olan öz-sertifikasyonu dışarıda bırakıyor.", "cmt_en": "Facilitation and survey are two of the three approaches to a CSA program, but this option excludes the third approach: self-certification."}, {"tr": "1, 2 ve 4 / 1, 2, and 4", "en": "1, 2, and 4", "cmt_tr": "Maliyet-fayda, KÖD programlarının üç temel yaklaşımından biri değildir.", "cmt_en": "Cost-benefit is not one of the three primary approaches to a CSA program."}, {"tr": "1, 3 ve 4 (Kolaylaştırma, Anket, Öz-Sertifikasyon) / 1, 3, and 4 (Facilitation, Survey, Self-certification)", "en": "1, 3, and 4 (Facilitation, Survey, Self-certification)", "cmt_tr": "KÖD'ün üç temel yaklaşımı: (1) kolaylaştırma, (2) anket ve (3) öz-sertifikasyondur.", "cmt_en": "The three primary approaches of CSA programs are (1) facilitation, (2) survey, and (3) self-certification."}], "correct": "D"}, {"q_tr": "Risk yönetimi ve kontrol süreçlerinin kurulması, yönetilmesi ve değerlendirilmesini denetlemekle hangi grup görevlidir?", "q_en": "Which group is charged with overseeing the establishment, administration, and evaluation of the processes of risk management and control?", "options": [{"tr": "Operasyon yöneticileri / Operating managers", "en": "Operating managers", "cmt_tr": "Operasyon yöneticilerinin sorumluluğu, kendi birimlerindeki risk ve kontrolleri değerlendirmektir; ancak tüm sürecin denetimi üst yönetimdedir.", "cmt_en": "Operating managers are responsible for assessing risks and controls in their units — but the overarching oversight responsibility belongs to senior management."}, {"tr": "İç denetçiler / Internal auditors", "en": "Internal auditors", "cmt_tr": "İç denetçiler, organizasyonun risk yönetimi ve kontrol süreçlerinin etkinlik durumu hakkında çeşitli düzeylerde güvence sağlar; bu süreçleri kurma ve denetleme sorumluluğu taşımazlar.", "cmt_en": "Internal auditors provide varying degrees of assurance about the state of effectiveness of risk management and control processes — they do not oversee the establishment and administration."}, {"tr": "Dış denetçiler / External auditors", "en": "External auditors", "cmt_tr": "Dış denetçiler, organizasyonun risk yönetimi ve kontrol süreçlerinin etkinlik durumu hakkında çeşitli düzeylerde güvence sağlar; bu süreçleri kurma ve denetleme sorumluluğu taşımazlar.", "cmt_en": "External auditors provide varying degrees of assurance about the state of effectiveness of risk management and control processes — they do not oversee the establishment and administration."}, {"tr": "Üst yönetim / Senior management", "en": "Senior management", "cmt_tr": "Üst yönetim, risk yönetimi ve kontrol süreçlerinin kurulması, yönetilmesi ve değerlendirilmesini denetlemekle görevlidir.", "cmt_en": "Senior management is charged with overseeing the establishment, administration, and evaluation of the processes of risk management and control."}], "correct": "D"}, {"q_tr": "KÖD, çalışanları kontrollerin yeterliliğini değerlendirmeye dahil eder. Çalışanların dahil edilmesinin nedenleri nelerdir?", "q_en": "Control self-assessment involves employees in assessing the adequacy of controls. Which of the following are reasons to involve employees in this process?", "options": [{"tr": "1 ve 2 / 1 and 2", "en": "1 and 2", "cmt_tr": "Çalışanlar, kendi işlerini veya performanslarını nesnel olarak değerlendirme perspektifinden genellikle yoksundur.", "cmt_en": "Employees often lack the perspective required to be objective about their jobs or performance."}, {"tr": "3 ve 4 / 3 and 4", "en": "3 and 4", "cmt_tr": "Çalışanlar iç kontrollerin değerlendirmesine katılabilir; ancak bu değerlendirmeler bağımsız değildir.", "cmt_en": "Although employees can be involved in assessing internal controls, their assessments are not independent."}, {"tr": "1 ve 4 (Motivasyon artar; yöneticiler geri bildirim ister) / 1 and 4 (Motivation increases; managers want feedback)", "en": "1 and 4 (Motivation increases; managers want feedback)", "cmt_tr": "Çalışanların katılımı motivasyon üzerinde olumlu etki yaratır; işe bağlılığı ve kişisel memnuniyeti artırır. Ayrıca tam katılım, iki yönlü iletişimi teşvik eder.", "cmt_en": "Participation has a positive effect on motivation, increasing commitment to the job and personal satisfaction. Full participation also requires two-way communication and encourages employee feedback."}, {"tr": "2 ve 4 / 2 and 4", "en": "2 and 4", "cmt_tr": "Çalışanlar, kendi işlerini veya performanslarını nesnel olarak değerlendirme perspektifinden genellikle yoksundur.", "cmt_en": "Employees often lack the perspective required to be objective about their jobs or performance."}], "correct": "C"}, {"q_tr": "Hangi KÖD formları, yöneticilerin ve çalışma ekibi üyelerinin risk ve kontrol kavramlarını anladığını varsayar?", "q_en": "Which forms of control self-assessment assume that managers and members of work teams possess an understanding of risk and control concepts?", "options": [{"tr": "Yalnızca öz-sertifikasyon yaklaşımı / The self-certification approach only", "en": "The self-certification approach only", "cmt_tr": "Yalnızca öz-sertifikasyon yaklaşımı değil; kolaylaştırılmış çalıştaylar ve anketler de yöneticilerin ve çalışma ekiplerinin risk ve kontrol kavramlarını anladığını varsayar.", "cmt_en": "Not only self-certification, but also facilitated team workshops and surveys assume that managers and work team members possess an understanding of risk and control concepts."}, {"tr": "Öz-sertifikasyon ve kolaylaştırılmış yaklaşım / Self-certification and facilitated approach", "en": "Self-certification and facilitated approach", "cmt_tr": "Anketler de yöneticilerin ve çalışma ekiplerinin risk ve kontrol kavramlarını anladığını varsayar.", "cmt_en": "Surveys also assume that managers and members of work teams possess an understanding of risk and control concepts."}, {"tr": "Öz-sertifikasyon ve anket yaklaşımı / Self-certification and questionnaire approach", "en": "Self-certification and questionnaire approach", "cmt_tr": "Kolaylaştırılmış çalıştaylar da yöneticilerin ve çalışma ekiplerinin risk ve kontrol kavramlarını anladığını varsayar.", "cmt_en": "Facilitated team workshops also assume that managers and work team members possess an understanding of risk and control concepts."}, {"tr": "Tüm öz-değerlendirme programları / All self-assessment programs", "en": "All self-assessment programs", "cmt_tr": "Tüm öz-değerlendirme programları, yöneticilerin ve çalışma ekibi üyelerinin risk ve kontrol kavramlarını anlayarak bu kavramları iletişimde kullandığını varsayar.", "cmt_en": "All self-assessment programs assume that managers and members of work teams possess an understanding of risk and control concepts and use those concepts in communications."}], "correct": "D"}, {"q_tr": "Aşağıdakilerden hangisi başarılı bir KÖD çalıştayı için en az gerekli unsurdur?", "q_en": "Which of the following factors is least essential to a successful control self-assessment (CSA) workshop?", "options": [{"tr": "Oylama teknolojisi / Voting technology", "en": "Voting technology", "cmt_tr": "Oylama teknolojisi, katılımcıların görüşlerini anonim olarak iletmesini sağlayarak verimliliği artırabilir; ancak başarı için zorunlu değildir. Manuel kayıt ve geri bildirim yöntemleri de etkilidir.", "cmt_en": "Voting technology can increase efficiency by enabling participants to voice their perceptions anonymously, but it is not essential to success — manual forms of recording views and giving group feedback are also effective."}, {"tr": "Kolaylaştırma eğitimi / Facilitation training", "en": "Facilitation training", "cmt_tr": "KÖD, kolaylaştırma becerileri gerektirir.", "cmt_en": "CSA requires facilitation skills — facilitation training is essential, not optional."}, {"tr": "Ön planlama / Prior planning", "en": "Prior planning", "cmt_tr": "KÖD, dikkatli ön planlama gerektirir.", "cmt_en": "CSA requires careful prior planning — it is essential to a successful workshop."}, {"tr": "Grup dinamikleri / Group dynamics", "en": "Group dynamics", "cmt_tr": "KÖD kolaylaştırıcılarının grup dinamiklerini anlaması ve yönetmesi gerekir.", "cmt_en": "CSA facilitators need to understand and manage group dynamics — this is essential to a successful workshop."}], "correct": "A"}], "SU3 - Third Parties & Contracts": [{"q_tr": "Yeni bir katalog mağazası için yapılan maliyet-artı inşaat sözleşmesini inceleyen iç denetçi hangi riske dikkat etmelidir?", "q_en": "In reviewing a cost-plus construction contract for a new catalog showroom, the internal auditor should be cognizant of the risk that", "options": [{"tr": "Müteahhit, inşaatta kullanılmayan ekipman için ücret talep ediyor olabilir / The contractor could be charging for equipment not used in the construction", "en": "The contractor could be charging for equipment not used in the construction", "cmt_tr": "Maliyet artı sözleşmelerde müteahhit, maliyete sabit bir tutar veya yüzde eklenerek ücret alır. Bu düzenleme, maliyetleri şişirme fırsatı yarattığından denetçi bu riske dikkat etmelidir.", "cmt_en": "Under cost-plus contracts, the contractor receives cost plus a fixed amount or percentage, creating an opportunity to overstate costs — charging for unused equipment is a key risk to monitor."}, {"tr": "İnşaat ekipmanı amortismanıyla ilgili gelir vergileri hatalı hesaplanmış olabilir / Income taxes related to construction equipment depreciation may have been calculated erroneously", "en": "Income taxes related to construction equipment depreciation may have been calculated erroneously", "cmt_tr": "İnşaat ekipmanı amortismanıyla ilgili gelir vergisi hesaplamaları, sözleşme maliyetlerinden kaynaklanmaz; bu nedenle sözleşme denetiminde bir risk oluşturmaz.", "cmt_en": "Income tax provisions related to depreciation charges are not a risk; only charges incurred under the terms of the contract constitute a risk for the internal auditor."}, {"tr": "Müteahhit nakit bütçeleri uygunsuz biçimde hazırlanmış olabilir / Contractor cash budgets could have been inappropriately compiled", "en": "Contractor cash budgets could have been inappropriately compiled", "cmt_tr": "Uygunsuz biçimde hazırlanmış bütçeler, sözleşme maliyetlerini etkilemez; dolayısıyla sözleşme denetimi açısından risk oluşturmaz.", "cmt_en": "Budgets inappropriately compiled do not affect contract costs and therefore do not constitute a risk in the context of contract auditing."}, {"tr": "Bordro vergileri faturalardan uygunsuz biçimde çıkarılmış olabilir / Payroll taxes may have been inappropriately omitted from billings", "en": "Payroll taxes may have been inappropriately omitted from billings", "cmt_tr": "Bordro vergilerinin ihmal edilmesi, sözleşme fazla ödemelerine veya inşaat yetersizliklerine yol açmaz; daha çok gecikmiş ödeme veya eksik ödeme riskiyle ilgilidir.", "cmt_en": "Omitting payroll taxes does not involve a risk of contract overcharges or construction inadequacies — it relates more to delays in payment or underpayments, which are of less concern."}], "correct": "A"}, {"q_tr": "Organizasyonların birden fazla harici iş ilişkisi (EBR) vardır. Bunlar büyük olasılıkla neyi içerir?", "q_en": "Organizations have multiple external (extended) business relationships (EBRs). They most likely involve", "options": [{"tr": "Tedarikçiler / Suppliers", "en": "Suppliers", "cmt_tr": "Tedarikçiler, organizasyona mal veya ekipman satar; tedarik zinciri ortakları değildir. Bu nedenle EBR olarak tanımlanmazlar.", "cmt_en": "Suppliers sell goods and equipment to the organization — they are not supply-side partners to whom a function has been outsourced, so they are not typically described as EBRs."}, {"tr": "Büyük müşteriler / Major customers", "en": "Major customers", "cmt_tr": "Büyük müşteriler, organizasyondan satın alan alıcılardır; lisanslar veya distribütörler gibi talep tarafı ortaklardan farklıdır.", "cmt_en": "Major customers are buyers from the organization — they differ from demand-side partners such as licensees or distributors, and are not the primary EBR category."}, {"tr": "Düzenleyiciler / Regulators", "en": "Regulators", "cmt_tr": "Düzenleyiciler, organizasyondan satın almaz, satmaz veya EBR'nin bir parçası olmaz.", "cmt_en": "Regulators are not buyers from, sellers to, or part of an extended business relationship in the EBR sense."}, {"tr": "Hizmet sağlayıcılar / Service providers", "en": "Service providers", "cmt_tr": "EBR'ler; hizmet sağlayıcıları (bordro işleme, BT hizmetleri), arz tarafı ortakları (üretim veya Ar-Ge dış kaynak kullanımı), talep tarafı ortakları (lisanslar, distribütörler), stratejik ittifaklar ve fikri mülkiyet ortaklarını kapsar.", "cmt_en": "EBRs may involve service providers (e.g., payroll processing, IT services), supply-side partners (e.g., outsourcing production or R&D), demand-side partners (e.g., licensees or distributors), strategic alliances, and intellectual property partners."}], "correct": "D"}, {"q_tr": "Briar Co., fiili maliyet artı %10 formül fiyatı öngören bir devlet inşaat sözleşmesi imzaladı. Fiili maliyetler 1.920.000 dolar oldu. Briar sözleşmeden ne kadar almalıdır?", "q_en": "Briar Co. signed a government construction contract: actual cost plus 10%, sharing half of savings vs $2.2M target. Actual costs were $1,920,000. How much should Briar receive?", "options": [{"tr": "$2.060.000 / $2,060,000", "en": "$2,060,000", "cmt_tr": "Bu tutar, fiili maliyetlerin yüzde 50 artırımı ile hedef fiyatın fiili maliyeti aşan kısmının toplamını yanlış hesaplar.", "cmt_en": "This amount of $2,060,000 incorrectly equals actual costs plus 50% of the excess of the target price over actual costs — not the correct formula."}, {"tr": "$2.112.000 / $2,112,000", "en": "$2,112,000", "cmt_tr": "Bu tutar yalnızca formül fiyatıdır (1.920.000 × %110 = 2.112.000); tasarruf paylaşımı eklenmemiştir.", "cmt_en": "This amount of $2,112,000 is only the formula price (1,920,000 × 110%) — it does not include the savings sharing component."}, {"tr": "$2.156.000 / $2,156,000", "en": "$2,156,000", "cmt_tr": "Formül fiyatı: 1.920.000 × %110 = 2.112.000 dolar. Hedef fiyat ile formül fiyatı arasındaki tasarruf: 2.200.000 – 2.112.000 = 88.000 dolar. Tasarrufun yarısı: 44.000 dolar. Toplam: 2.112.000 + 44.000 = 2.156.000 dolar.", "cmt_en": "Formula price: $1,920,000 × 110% = $2,112,000. Savings vs target: $2,200,000 – $2,112,000 = $88,000. Half of savings: $44,000. Total: $2,112,000 + $44,000 = $2,156,000."}, {"tr": "$2.200.000 / $2,200,000", "en": "$2,200,000", "cmt_tr": "Bu tutar yalnızca hedef fiyattır; fiili maliyet bazlı formül fiyatı ve tasarruf paylaşımı hesaplanmamıştır.", "cmt_en": "This amount of $2,200,000 is only the target price — it does not reflect the formula price based on actual costs or the savings sharing."}], "correct": "C"}, {"q_tr": "Götürü bedellli bir sözleşmede iç denetçinin o kadar kapsamlı incelemesi gerekmeyen husus hangisidir?", "q_en": "Which of the following does the internal auditor of a contracting company not have to review as thoroughly in a lump-sum contract?", "options": [{"tr": "Avans ödemeleri / Progress payments", "en": "Progress payments", "cmt_tr": "İç denetçi, müteahhidin sözleşmeyi karşılamak için harcamaları karşılamak ve tamamlamak üzere ödeme aldığını sağlamalıdır.", "cmt_en": "The internal auditor should ensure that the contractor is receiving appropriate progress payments to meet expenses and complete the contract."}, {"tr": "İşçilik maliyetlerine yapılan düzeltmeler / Adjustments to labor costs", "en": "Adjustments to labor costs", "cmt_tr": "İşçilik maliyetlerine yapılan düzeltmeler, sözleşmenin karlılığını değiştirebilir ve iç denetçi açısından büyük önem taşır.", "cmt_en": "Adjustments to labor costs may change the profitability of the contract and are of great importance to the internal auditor."}, {"tr": "Sözleşmeye uygun olarak tamamlanan iş / Work completed in accordance with the contract", "en": "Work completed in accordance with the contract", "cmt_tr": "Götürü bedelli sözleşmelerde iş sözleşmeye uygun yapıldığında iç denetçinin değerlendirecek az şeyi vardır. Ayrıca teknik uzmanlık eksikliği de söz konusu olabilir.", "cmt_en": "In a lump-sum contract, the internal auditor usually has little to evaluate when the work is performed in accordance with the contract — and may also lack the technical expertise to assess compliance."}, {"tr": "Sözleşmeyle ilgili teşvikler / Incentives associated with the contract", "en": "Incentives associated with the contract", "cmt_tr": "Erken tamamlama için prim gibi teşvikler, sözleşmenin genel karlılığını etkiler ve iç denetçiler tarafından sıklıkla incelenir.", "cmt_en": "Incentives such as a bonus for early completion affect the overall profitability of the contract and are frequently reviewed by the internal auditor."}], "correct": "C"}, {"q_tr": "Yeni bir katalog mağazası için birim fiyatlı inşaat sözleşmesini inceleyen iç denetçi hangi riske dikkat etmelidir?", "q_en": "In reviewing a unit-price construction contract for a new catalog showroom, the internal auditor should be cognizant of the risk that", "options": [{"tr": "Müteahhit, inşaatta kullanılmayan ekipman için ücret talep ediyor olabilir / The contractor could be charging for equipment not used in the construction", "en": "The contractor could be charging for equipment not used in the construction", "cmt_tr": "İnşaatta kullanılmayan ekipman için ücret talep etme riski, maliyet artı sözleşmelerde ortaya çıkar; birim fiyatlı sözleşmelerde değil.", "cmt_en": "The risk of charging for unused equipment arises in a cost-plus contract where the contractor receives cost plus an amount — not in a unit-price contract."}, {"tr": "İnşaat ekipmanı amortismanıyla ilgili gelir vergileri hatalı hesaplanmış olabilir / Income taxes related to construction equipment depreciation may have been calculated erroneously", "en": "Income taxes related to construction equipment depreciation may have been calculated erroneously", "cmt_tr": "Amortisman ile ilgili gelir vergisi hesaplamaları, sözleşme maliyetlerinden kaynaklanmaz; dolayısıyla risk oluşturmaz.", "cmt_en": "Income tax provisions related to depreciation charges do not arise from contract costs and therefore do not constitute a risk for the internal auditor."}, {"tr": "Projeyi tamamlamak için kullanılan adam-saatler abartılmış olabilir / The man-hours used to complete the project are overstated", "en": "The man-hours used to complete the project are overstated", "cmt_tr": "Birim fiyatlı sözleşmelerde fiyat, bir iş ölçüsüne (örneğin adam-saati) göre belirlenir. Müteahhit, kullanılan ölçüyü abartmaya teşvik edilebilir; bu nedenle denetçi bu riski izlemelidir.", "cmt_en": "Under unit-price contracts, the project price is determined using a measure of work such as man-hours. The contractor may be tempted to overstate this measure, so the auditor should monitor this risk."}, {"tr": "Bordro vergileri faturalardan uygunsuz biçimde çıkarılmış olabilir / Payroll taxes may have been inappropriately omitted from billings", "en": "Payroll taxes may have been inappropriately omitted from billings", "cmt_tr": "Bordro vergilerinin ihmal edilmesi, birim fiyatlı sözleşmelerde aşırı ücretlendirme veya inşaat yetersizliği riski oluşturmaz.", "cmt_en": "The omission of taxes does not involve a risk of contract overcharges or construction inadequacies in a unit-price contract."}], "correct": "C"}, {"q_tr": "Bir denetçi, bilgi işlemi harici bir hizmet sağlayıcıya (ESP) dışarıdan temin eden bir organizasyonun bordro kontrollerini denetlemek üzere planlandı. ESP'nin dış denetçisi kontrol raporları yayınladı. Denetçi ne yapmalıdır?", "q_en": "An auditor is scheduled to audit payroll controls for an organization that outsourced its information processing to an ESP. The ESP's external auditor has issued control reports. What action should the auditor take?", "options": [{"tr": "Yalnızca ESP'nin dış denetçisini gözden geçirmek / Review only the ESP's external auditor", "en": "Review only the ESP's external auditor", "cmt_tr": "Yalnızca ESP'nin dış denetçisini incelemek, ESP tarafından yapılan iş hakkında güvence sağlamaz.", "cmt_en": "Reviewing only the ESP's external auditor provides no assurance on the actual work performed by the ESP."}, {"tr": "Yalnızca organizasyonun ESP'ye gönderilen ve alınan veriler üzerindeki kontrollerini gözden geçirmek / Review only the organization's controls over data sent to and received from the ESP", "en": "Review only the organization's controls over data sent to and received from the ESP", "cmt_tr": "Yalnızca organizasyonun kontrollerini incelemek, ESP'deki kontrolleri dışarıda bırakır; oysa her iki taraftaki kontroller birbirleriyle etkileşim halindedir.", "cmt_en": "Reviewing only the organization's controls over data sent to and received from the ESP leaves out the ESP's controls — both sets of controls interact and must be reviewed."}, {"tr": "Kontrol raporlarını gözden geçirmek ve ESP'nin dış denetçisinin güvenilir olduğundan emin olmak / Review the control reports and ensure that the ESP's external auditor is credible and reliable", "en": "Review the control reports and ensure that the ESP's external auditor is credible and reliable", "cmt_tr": "Üçüncü taraflarla ilgili katılımlarda ESP'nin kontrol raporları incelenmeli ve raporları hazırlayan dış denetçinin güvenilirliği değerlendirilmelidir.", "cmt_en": "In engagements involving third parties, the ESP's control reports (e.g., SOC reports) must be reviewed for accuracy and the ESP's external auditor should be evaluated for reliability and credibility."}, {"tr": "İşlem organizasyon dışında yapıldığından katılımı iptal etmek / Cancel the engagement because the processing is being performed outside of the organization", "en": "Cancel the engagement because the processing is being performed outside of the organization", "cmt_tr": "Kontroller nerede bulunursa bulunsun değerlendirilmelidir; işlemin kuruluş dışında gerçekleşmesi katılımı iptal etmeyi gerektirmez.", "cmt_en": "Controls must be evaluated regardless of their location — the fact that processing is performed outside the organization does not justify canceling the engagement."}], "correct": "C"}, {"q_tr": "Bir şirket, 1 yıl ve 4 opsiyon yıllı temizlik hizmetleri için sözleşme yapmak istiyor. Hangi sözleşme türü bu gereksinim için en uygunudur?", "q_en": "A company would like to contract for janitorial services for 1 year with 4 option years. Which contract type is best for this requirement?", "options": [{"tr": "Maliyet-karşılama / Cost-reimbursable", "en": "Cost-reimbursable", "cmt_tr": "Maliyet karşılama sözleşmeleri, gereksinimlerin karmaşık olduğu ve maliyetlerin kolayca tahmin edilemediği durumlarda kullanılır.", "cmt_en": "Cost-reimbursable contracts are used when requirements are complex and costs cannot be easily identified and estimated — not for well-defined, routine services."}, {"tr": "Belirsiz teslimat / Indefinite delivery", "en": "Indefinite delivery", "cmt_tr": "Belirsiz teslimat sözleşmeleri, gelecekteki teslimatların sözleşme imzalandığı anda bilinmediği durumlarda kullanılır.", "cmt_en": "Indefinite delivery contracts are used only when the supplies and/or services of future deliveries are not known at the time of contract award."}, {"tr": "Sabit fiyat / Fixed-price", "en": "Fixed-price", "cmt_tr": "Sabit fiyatlı sözleşmeler, gereksinimler iyi tanımlandığında, belirsizlikler tanımlanabildiğinde ve yeterli rekabet mevcut olduğunda kullanılır. Temizlik hizmetleri bu kriterlere uymaktadır.", "cmt_en": "Fixed-price contracts are used when requirements are well-defined, uncertainties can be identified and costs estimated, and there is adequate competition — janitorial services fit these criteria well."}, {"tr": "Zaman ve malzeme / Time-and-materials", "en": "Time-and-materials", "cmt_tr": "Zaman ve malzeme sözleşmeleri, sözleşme imzalandığında işin süresinin doğru tahmin edilemediği durumlarda kullanılır.", "cmt_en": "Time-and-materials contracts are used when it is not possible to accurately estimate the duration of the work at the time of placing the contract."}], "correct": "C"}, {"q_tr": "Küçük, benzersiz projeler için maliyet artı inşaat sözleşmesinde teşvik olmayabilir. Verimliliği teşvik etmek için uygun bir kontrol nedir?", "q_en": "No incentive for efficiency may exist in a cost-plus construction contract for small, unique projects. An appropriate control to encourage efficiency and economy is", "options": [{"tr": "Sözleşmedeki değişiklik emirlerinin ortadan kaldırılması / Elimination of change orders to the contract", "en": "Elimination of change orders to the contract", "cmt_tr": "Tüm değişiklik emirlerini ortadan kaldırmak gerçekçi değildir ve maliyetleri kontrol etmeye yönelik uygun bir önlem değildir.", "cmt_en": "Eliminating all change orders is unreasonable and is not an appropriate control to encourage economy and efficiency."}, {"tr": "Maksimum maliyet belirlenmesi ve tasarrufların paylaşılması / Provision for maximum costs and sharing any savings", "en": "Provision for maximum costs and sharing any savings", "cmt_tr": "Maliyet artı sözleşmesine maksimum maliyet sınırı ve tasarruf paylaşım hükmü eklenmesi, müteahhidi verimli olmaya teşvik eder.", "cmt_en": "Including a provision for maximum costs and sharing of any savings encourages the contractor to be efficient in a cost-plus contract."}, {"tr": "Her iş birimi için anlaşmalı fiyat kullanılması / Use of an agreed-upon price for each unit of work", "en": "Use of an agreed-upon price for each unit of work", "cmt_tr": "Her iş birimi için anlaşmalı fiyat kullanmak, birim fiyatlı sözleşmeyi tanımlar; maliyet artı sözleşmesini değil.", "cmt_en": "Using an agreed-upon price for each unit of work constitutes a unit-price contract, not a cost-plus contract."}, {"tr": "Sözleşme maliyetlerinin incelenmesinde kontrol listesi yaklaşımı / A checklist approach to the review of contract costs", "en": "A checklist approach to the review of contract costs", "cmt_tr": "Kontrat maliyetlerinin incelenmesinde kontrol listesi yaklaşımı, yüzeysel incelemelerle sonuçlanır; verimliliği teşvik etmez.", "cmt_en": "A checklist approach to reviewing contract costs results in sterile reviews and does not encourage efficiency or economy."}], "correct": "B"}, {"q_tr": "Bilgi işlemini dışarıya outsource eden bir organizasyonun bordro kontrollerini denetlemek üzere planlama yapılıyor. Denetçi ne yapmalıdır?", "q_en": "An auditor is scheduled to audit payroll controls for an organization that outsourced information processing to an ESP. What action should the auditor take?", "options": [{"tr": "Hem organizasyonun hem de ESP'nin bordro kontrollerini gözden geçirmek / Review the controls over payroll in both the organization and the ESP", "en": "Review the controls over payroll in both the organization and the ESP", "cmt_tr": "ESP, organizasyonun bilgi sistemlerinin bir uzantısıdır; dolayısıyla hem organizasyondaki hem de ESP'deki bordro kontrolleri birbirinden etkilenir ve ikisi de incelenmelidir.", "cmt_en": "The ESP is an extension of the organization's information systems, so payroll controls at both the organization and the ESP interact with each other and both must be reviewed."}, {"tr": "Yalnızca organizasyonun ESP'ye gönderilen ve alınan veriler üzerindeki kontrollerini gözden geçirmek / Review only the organization's controls over data sent to and received from the ESP", "en": "Review only the organization's controls over data sent to and received from the ESP", "cmt_tr": "Yalnızca organizasyonun gönderilen ve alınan veriler üzerindeki kontrollerini incelemek, ESP'deki kontrolleri dışarıda bırakır; oysa her iki taraftaki kontroller birbirini etkiler.", "cmt_en": "Reviewing only the organization's controls over data sent and received leaves out the ESP's controls — both sets interact and must be reviewed."}, {"tr": "Yalnızca sözleşmeye dayalı ESP ödemelerinin kontrollerini gözden geçirmek / Review only the controls over payments to the ESP based on the contract", "en": "Review only the controls over payments to the ESP based on the contract", "cmt_tr": "Yalnızca ESP ödemelerinin kontrollerini incelemek, katılımın kapsamını daraltır ve kritik bordro süreçleri kontrollerini dışarıda bırakır.", "cmt_en": "Reviewing only controls over payments to the ESP based on the contract narrows the scope of the engagement and leaves out critical payroll process controls."}, {"tr": "İşlem organizasyon dışında yapıldığından katılımı iptal etmek / Cancel the engagement because the processing is being performed outside of the organization", "en": "Cancel the engagement because the processing is being performed outside of the organization", "cmt_tr": "Kontroller nerede bulunursa bulunsun değerlendirilmelidir; ESP'nin organizasyon dışında olması katılımı iptal etmeyi gerektirmez.", "cmt_en": "Controls must be evaluated regardless of their location — the fact that processing is performed outside the organization does not justify canceling the engagement."}], "correct": "A"}, {"q_tr": "Aşağıdakilerden hangisi sözleşme denetiminin bir işlevini en iyi tanımlar?", "q_en": "Which of the following best describes a function of contract auditing?", "options": [{"tr": "Tehlikeli atık kontrollerinin yeterliliğinin ve etkinliğinin gözden geçirilmesi / Reviewing the adequacy and effectiveness of the controls over hazardous waste", "en": "Reviewing the adequacy and effectiveness of the controls over hazardous waste", "cmt_tr": "Tehlikeli atık kontrollerinin gözden geçirilmesi, çevre denetiminin kapsamındadır; sözleşme denetiminin değil.", "cmt_en": "Reviewing the adequacy and effectiveness of controls over hazardous waste falls under environmental audits, not contract auditing."}, {"tr": "Büyük bir işlem için iş gerekçesinin geçerliliğinin belirlenmesi / Determining whether the business justification for a major transaction is valid", "en": "Determining whether the business justification for a major transaction is valid", "cmt_tr": "Büyük bir işlem için iş gerekçesinin geçerliliğinin belirlenmesi, durum tespiti denetimlerinin kapsamındadır; sözleşme denetiminin değil.", "cmt_en": "Determining whether the business justification for a major transaction is valid falls under due diligence audits, not contract auditing."}, {"tr": "Kişisel bilgilerin güvenliğinin ele alınması / Addressing the security of personal information", "en": "Addressing the security of personal information", "cmt_tr": "Kişisel bilgilerin güvenliğinin ele alınması, gizlilik denetimlerinin kapsamındadır; sözleşme denetiminin değil.", "cmt_en": "Addressing the security of personal information falls under privacy audits, not contract auditing."}, {"tr": "Önemli inşaat sözleşmelerinin izlenmesi ve değerlendirilmesi / Monitoring and evaluating significant construction contracts", "en": "Monitoring and evaluating significant construction contracts", "cmt_tr": "Sözleşme denetimleri, önemli inşaat ve hizmet sözleşmelerini izler ve değerlendirir. Yaygın düzenlemeler: götürü bedelli, maliyet artı ve birim fiyatlı sözleşmelerdir.", "cmt_en": "Contract audits monitor and evaluate significant construction contracts and operating contracts involving services. The usual arrangements are lump-sum (fixed-price), cost-plus, and unit-price contracts."}], "correct": "D"}, {"q_tr": "Yeni bir şube ofisi inşaatı sözleşmesini denetleyen iç denetçi neyi göz önünde bulundurmalıdır?", "q_en": "An internal auditor is conducting an audit of a contract to build a new branch office. The auditor should consider whether the", "options": [{"tr": "1 ve 2 yalnızca / 1 and 2 only", "en": "1 and 2 only", "cmt_tr": "Müteahhidin, organizasyonun sahtekarlık ihbar hattına sahip olması gerekmez; bu sözleşme denetiminin kapsamı dışındadır.", "cmt_en": "Whether the contractor has a fraud hotline is not the contractor's responsibility and is beyond the scope of a contract audit."}, {"tr": "1 ve 3 yalnızca (Malzemelerin standartlara uyması ve programın tutulması) / 1 and 3 only (Materials meet standards and construction is on schedule)", "en": "1 and 3 only (Materials meet standards and construction is on schedule)", "cmt_tr": "Sözleşme denetiminin amacı, müteahhidin sözleşmede belirtildiği şekilde performans gösterip göstermediğini belirlemektir. Kullanılan malzemelerin standartlara uyması ve inşaatın programda olması, bu kapsamın içindedir.", "cmt_en": "The purpose of a contract audit is to determine whether the contractor is performing as specified in the contract — materials meeting contractual standards and construction being on schedule both fall within this scope."}, {"tr": "2 ve 3 yalnızca / 2 and 3 only", "en": "2 and 3 only", "cmt_tr": "Müteahhidin sahtekarlık ihbar hattına sahip olması, organizasyonun ilgi alanı değildir ve sözleşme denetiminin kapsamı dışındadır.", "cmt_en": "Whether the contractor has a fraud hotline is of no concern to the organization and is beyond the scope of a contract audit."}, {"tr": "1, 2 ve 3 / 1, 2, and 3", "en": "1, 2, and 3", "cmt_tr": "Müteahhidin sahtekarlık ihbar hattına sahip olması, sözleşme denetiminin kapsamı dışındadır.", "cmt_en": "Whether the contractor has a fraud hotline is beyond the scope of a contract audit — it is irrelevant to whether the contractor is performing per the contract terms."}], "correct": "B"}, {"q_tr": "Küçük bir start-up şirketinden iş uygulaması sistemi satın almak için bir sözleşmeye dahil edilmesini önermek için en önemli hüküm hangisidir?", "q_en": "Which is the most important provision for an internal auditor to recommend for inclusion in a contract for purchasing a business application system from a small start-up company?", "options": [{"tr": "Kaynak kodu emanet maddesi / Source code escrow clause", "en": "Source code escrow clause", "cmt_tr": "Kaynak kodu emanet maddesi, küçük bir start-up şirketinden iş uygulaması satın alınmasında en kritik hükümdür; şirket iflas etse bile kaynak koduna erişimi güvence altına alır.", "cmt_en": "A source code escrow clause requires the application source code to be held in escrow by a trusted third party and released to the purchaser upon specified events — this is critical for protecting the buyer when purchasing from a small start-up."}, {"tr": "Sorumluluk sınırlaması maddesi / Limitation-of-liabilities clause", "en": "Limitation-of-liabilities clause", "cmt_tr": "Sorumluluk sınırlaması maddesi, alıcı değil; satıcı tarafından sözleşmeye dahil edilmesi muhtemeldir.", "cmt_en": "A limitation-of-liabilities clause is likely to be an inclusion by the seller, not the purchaser — it protects the seller from excessive liability."}, {"tr": "Telif hakkı maddesi / Copyright clause", "en": "Copyright clause", "cmt_tr": "Telif hakkı maddesi, alıcı değil; satıcı tarafından sözleşmeye dahil edilmesi muhtemeldir.", "cmt_en": "A copyright clause is likely to be an inclusion by the seller, not the purchaser — it protects the seller's intellectual property."}, {"tr": "Denetim hakkı maddesi / Right-to-audit clause", "en": "Right-to-audit clause", "cmt_tr": "Denetim hakkı maddesi, devam eden harici iş ilişkilerinde uygun olabilir; ancak tek seferlik satın alma işlemlerinde geçerli değildir.", "cmt_en": "Although an internal auditor might recommend a right-to-audit clause in the context of an ongoing EBR agreement, such a clause is not applicable in a one-time purchase transaction."}], "correct": "A"}, {"q_tr": "Aşağıdaki düzenlemelerden hangisinde iç denetçi, ekonomi ve verimlilik için teşvik eksikliği konusunda en çok endişelenmelidir?", "q_en": "In which of the following arrangements should an internal auditor be most concerned about the lack of an incentive for economy and efficiency?", "options": [{"tr": "Sabit fiyatlı sözleşme / Fixed-price contract", "en": "Fixed-price contract", "cmt_tr": "Sabit fiyatlı sözleşmelerde müteahhit fiyat sabittir; iç denetçinin değerlendirecek az şeyi olabilir ve müteahhidin kendi verimliliğini koruma teşviki vardır.", "cmt_en": "In fixed-price contracts, the contractor has an incentive to control costs since the price is fixed — the internal auditor may have little to evaluate when work is performed per contract."}, {"tr": "Maliyet artı sözleşmesi / Cost-plus contract", "en": "Cost-plus contract", "cmt_tr": "Maliyet artı sözleşmelerinde müteahhit, maliyet artı sabit tutar veya yüzde alır. Bu düzenlemede müteahhitin verimlilik için çok az teşviki olabilir ve iç denetçilerin dikkatli inceleme yapmasını gerektirir.", "cmt_en": "Cost-plus contracts set a price equal to cost plus a fixed amount or percentage. A problem is that the contractor may have little incentive for economy and efficiency, necessitating careful review by internal auditors."}, {"tr": "Birim fiyatlı sözleşme / Unit-price contract", "en": "Unit-price contract", "cmt_tr": "Birim fiyatlı sözleşmelerde temel sorun, yapılan işin doğru ölçülmesidir; verimlilik teşvikinin eksikliği değil.", "cmt_en": "In unit-price contracts, the key issue is the accurate measurement of the work performed — not a lack of incentive for efficiency."}, {"tr": "Kaynak kodu emanet maddesi / Source code escrow clause", "en": "Source code escrow clause", "cmt_tr": "Kaynak kodu emanet maddesi, bir sözleşme hükmüdür; düzenleme türü değildir ve verimlilik teşvikiyle ilgili değildir.", "cmt_en": "A source code escrow clause is a contract provision, not a type of contract arrangement, and is unrelated to incentives for economy and efficiency."}], "correct": "B"}], "SU4 - Quality Auditing": [{"q_tr": "TKY'yi benimsemenin birincil nedeni nedir?", "q_en": "The primary reason for adopting TQM was to achieve", "options": [{"tr": "Daha fazla müşteri memnuniyeti / Greater customer satisfaction", "en": "Greater customer satisfaction", "cmt_tr": "TKY, müşterilerin ihtiyaç, istek ve beklentilerini öngören, karşılayan ve aşan entegre bir sistemdir; birincil amacı müşteri memnuniyetidir.", "cmt_en": "TQM is an integrated system that anticipates, meets, and exceeds customers' needs, wants, and expectations — its primary purpose is greater customer satisfaction."}, {"tr": "Azaltılmış teslimat süresi / Reduced delivery time", "en": "Reduced delivery time", "cmt_tr": "Azaltılmış teslimat süresi, TKY kapsamında iyileştirme gerektiren birçok faaliyetten biridir; birincil amaç değil.", "cmt_en": "Reduced delivery time is one of many potential activities that need improvement under TQM — not the primary purpose."}, {"tr": "Azaltılmış teslimat ücretleri / Reduced delivery charges", "en": "Reduced delivery charges", "cmt_tr": "Azaltılmış teslimat ücretleri, TKY kapsamında iyileştirme gerektiren birçok faaliyetten biridir; birincil amaç değil.", "cmt_en": "Reduced delivery charges is one of many potential activities that need improvement under TQM — not the primary purpose."}, {"tr": "Daha fazla çalışan katılımı / Greater employee participation", "en": "Greater employee participation", "cmt_tr": "Artan çalışan katılımı, TKY'ye ulaşmak için gereklidir; ancak programı kurmanın birincil amacı değildir.", "cmt_en": "Increased employee participation is necessary to achieve TQM, but it is not the primary purpose for establishing the TQM program."}], "correct": "A"}, {"q_tr": "Toplam kalite yönetimi (TKY) yaklaşımında", "q_en": "Under a total quality management (TQM) approach,", "options": [{"tr": "Ölçüm süreç boyunca gerçekleşir ve hatalar kaynakta yakalanıp düzeltilir / Measurement occurs throughout the process, and errors are caught and corrected at the source", "en": "Measurement occurs throughout the process, and errors are caught and corrected at the source", "cmt_tr": "TKY, kaliteyi temel bir organizasyonel işlev olarak vurgular. Temel ilkelerden biri 'ilk seferinde doğru yapmak'tır; dolayısıyla hatalar kaynakta yakalanıp düzeltilmelidir.", "cmt_en": "TQM emphasizes quality as a basic organizational function. One of its basic tenets is doing it right the first time — errors should be caught and corrected at the source throughout the process."}, {"tr": "Kalite kontrolü, üretim sürecinin sonunda uzman denetçiler tarafından yapılır / Quality control is performed by trained inspectors at the end of the production process", "en": "Quality control is performed by trained inspectors at the end of the production process", "cmt_tr": "TKY, bitmiş ürünlerin denetimi değil; süreç boyunca hataların keşfedilmesini vurgular.", "cmt_en": "TQM emphasizes discovering errors throughout the process — not inspecting finished goods at the end of the production process."}, {"tr": "Üst yönetim, ürün ve hizmetlerin kalitesi için birincil sorumluluğu üstlenir / Upper management assumes the primary responsibility for quality", "en": "Upper management assumes the primary responsibility for quality", "cmt_tr": "TKY'de ürün ve hizmetlerin kalitesi için tüm organizasyon üyeleri sorumluluk üstlenir; yalnızca üst yönetim değil.", "cmt_en": "In TQM, all members of the organization assume responsibility for quality — not just upper management."}, {"tr": "En düşük fiyatları elde etmek için çok sayıda tedarikçi kullanılır / A large number of suppliers are used to obtain the lowest possible prices", "en": "A large number of suppliers are used to obtain the lowest possible prices", "cmt_tr": "TKY felsefesi, güçlü ilişkiler kurmak için tedarikçi sayısını sınırlandırmayı önerir; en düşük fiyatı elde etmek için çok sayıda tedarikçi kullanmayı değil.", "cmt_en": "The TQM philosophy recommends limiting the number of suppliers to create a strong relationship — not using a large number of suppliers to obtain the lowest prices."}], "correct": "A"}, {"q_tr": "Modern görüşe göre kalite", "q_en": "According to the modern view, quality", "options": [{"tr": "Standartları karşılamayan ürünlerin tespitini vurgular / Emphasizes the detection of products that do not meet standards", "en": "Emphasizes the detection of products that do not meet standards", "cmt_tr": "Standartları karşılamayan ürünlerin tespitini vurgulayan geleneksel kalite anlayışıdır; modern görüş değil.", "cmt_en": "Emphasizing the detection of products that do not meet standards is the traditional view of quality — not the modern view."}, {"tr": "Yalnızca ürün ve hizmetlerin üretimiyle sınırlıdır / Is limited to the production of goods and services", "en": "Is limited to the production of goods and services", "cmt_tr": "Modern görüş, kaliteyi yalnızca üretimle sınırlamaz; tüm organizasyonel iş süreçlerini kapsar.", "cmt_en": "The modern view extends quality to all of the organization's business processes — not limited to the production of goods and services."}, {"tr": "Ayrı bir iş işlevi olmalıdır / Should be a separate business function", "en": "Should be a separate business function", "cmt_tr": "Modern görüşe göre kalite, ayrı bir iş işlevi değil; tüm süreçlerde gerçekleştirilen değer katan bir faaliyettir.", "cmt_en": "The modern view is that quality is a value-added activity performed throughout all processes — not as a separate business function."}, {"tr": "Değer katan bir faaliyettir / Is a value-adding activity", "en": "Is a value-adding activity", "cmt_tr": "Modern görüş, TKY'nin temelini oluşturur. Kaliteyi birden fazla perspektiften ele alır; bunlardan biri de kalite ve fiyat arasındaki ilişki olan değerdir.", "cmt_en": "The modern view is the basis for TQM. It addresses quality from multiple perspectives, one of which is value — the relation of quality and price."}], "correct": "D"}, {"q_tr": "TKY hakkında aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following statements about TQM is false?", "options": [{"tr": "Bu yaklaşım gelirleri artırabilir ve maliyetleri önemli ölçüde azaltabilir / This approach can increase revenues and decrease costs significantly", "en": "This approach can increase revenues and decrease costs significantly", "cmt_tr": "TKY, gelirleri artırabilir ve maliyetleri önemli ölçüde azaltabilir.", "cmt_en": "TQM can increase revenues and decrease costs significantly — this statement about TQM is correct."}, {"tr": "TKY kaliteye kapsamlı bir yaklaşımdır / TQM is a comprehensive approach to quality", "en": "TQM is a comprehensive approach to quality", "cmt_tr": "TKY, kaliteye kapsamlı bir yaklaşımdır.", "cmt_en": "TQM is a comprehensive approach to quality — this statement is correct."}, {"tr": "TKY dahili tedarikçi gereksinimleriyle başlar / TQM begins with internal suppliers' requirements", "en": "TQM begins with internal suppliers' requirements", "cmt_tr": "TKY, iç tedarikçi gereksinimleriyle değil; dış müşteri gereksinimleriyle başlar. Ardından iç müşteri-tedarikçi ilişkilerini ve gereksinimlerini belirler; son olarak dış tedarikçiler için gereksinimler oluşturur.", "cmt_en": "TQM begins with external customer requirements — not internal suppliers' requirements. It then identifies internal customer-supplier relationships and requirements, and finally establishes requirements for external suppliers."}, {"tr": "TKY kavramları iç denetim fonksiyonunun operasyonlarına da uygulanabilir / TQM concepts are applicable to the operations of the internal audit function itself", "en": "TQM concepts are applicable to the operations of the internal audit function itself", "cmt_tr": "TKY kavramları, iç denetim fonksiyonunun operasyonlarına da uygulanabilir.", "cmt_en": "TQM concepts are applicable to the operations of the internal audit function itself — for example, benchmarking internal audit practices against industry best practices."}], "correct": "C"}, {"q_tr": "TKY, belirli ilkelerin uygulanmasıyla organizasyonel faaliyetlerin her yönünde kalitenin sürekli arayışıdır. Aşağıdakilerden hangisi bu ilkelerden biri değildir?", "q_en": "TQM is the continuous pursuit of quality in every aspect of organizational activities. Which of the following is NOT one of these principles?", "options": [{"tr": "İlk seferinde doğru yapma felsefesi / A philosophy of doing it right the first time", "en": "A philosophy of doing it right the first time", "cmt_tr": "İlk seferinde doğru yapma felsefesi, TKY'nin temel ilkelerinden biridir.", "cmt_en": "A philosophy of doing it right the first time is included in the definition of TQM — it is a core principle."}, {"tr": "Bireysel çalışmayı teşvik etmek / Promotion of individual work", "en": "Promotion of individual work", "cmt_tr": "TKY, bireysel çalışmayı değil; takım çalışmasını teşvik eder. Katı dikey hiyerarşiler yerine farklı uzmanlıklardan oluşan esnek ekipler oluşturmayı savunur.", "cmt_en": "TQM promotes teamwork — not individual work. It advocates replacing rigid vertical hierarchies with flexible groups of specialists from different areas."}, {"tr": "Çalışan eğitimi ve yetkilendirme / Employee training and empowerment", "en": "Employee training and empowerment", "cmt_tr": "Çalışan eğitimi ve yetkilendirme, TKY'nin temel ilkelerinden biridir.", "cmt_en": "Employee training and empowerment is included in the definition of TQM — it is a core principle."}, {"tr": "Süreçlerin iyileştirilmesi / Improvement of processes", "en": "Improvement of processes", "cmt_tr": "Süreçlerin iyileştirilmesi, TKY'nin temel ilkelerinden biridir.", "cmt_en": "Improvement of processes is included in the definition of TQM — it is a core principle."}], "correct": "B"}, {"q_tr": "Müşterilere odaklanmak, yeniliği teşvik etmek, korkuyu ortadan kaldırmak ve kapsamlı eğitim sunmak gibi unsurlar öncelikle neyi hedefler?", "q_en": "Focusing on customers, promoting innovation, driving out fear, and providing extensive training are all elements aimed primarily at", "options": [{"tr": "Daha iyi rekabet edebilmek için lider organizasyonları kopyalamak / Copying leading organizations to better compete with them", "en": "Copying leading organizations to better compete with them", "cmt_tr": "Rekabetçi kıyaslama, TKY uygulaması için yalnızca bir araçtır; birincil amaç değildir.", "cmt_en": "Competitive benchmarking is just one tool for implementing TQM — it is not the primary goal."}, {"tr": "Ürün ve hizmetlerin toplam kalitesine odaklanmak / Focusing on the total quality of products and services", "en": "Focusing on the total quality of products and services", "cmt_tr": "TKY; 'ilk seferinde doğru yapma' felsefesi, çalışan eğitimi ve yetkilendirme, takım çalışması, süreç iyileştirme ve hem iç hem de dış müşterilerin memnuniyetine odaklanmayı kapsar. Bu unsurların tümü, ürün ve hizmetlerin toplam kalitesine odaklanmayı hedefler.", "cmt_en": "TQM encompasses doing it right the first time, employee training and empowerment, teamwork, process improvement, and attention to customer satisfaction — all aimed at focusing on the total quality of products and services."}, {"tr": "Karları dolaylı olarak etkilemek için verimli ve etkili olmak / Being efficient and effective to indirectly affect profits", "en": "Being efficient and effective to indirectly affect profits", "cmt_tr": "TKY'nin birincil odak noktası karlılık değildir; kalite ve müşteri memnuniyetidir.", "cmt_en": "TQM's primary focus is not profitability — it focuses on quality and customer satisfaction, with improved profitability as a potential outcome."}, {"tr": "Düşük maliyetli sağlayıcı olmak için maliyetleri daha iyi yönetmek / Managing costs to become the low-cost provider", "en": "Managing costs to become the low-cost provider", "cmt_tr": "TKY'nin birincil odak noktası maliyet azaltma değildir; kalite ve müşteri memnuniyetidir.", "cmt_en": "TQM's primary focus is not cost reduction — it focuses on quality and customer satisfaction, with cost reduction as a potential benefit."}], "correct": "B"}, {"q_tr": "Üretim ortamında TKY en iyi şekilde nasıl örneklenir?", "q_en": "Total quality management (TQM) in a manufacturing environment is best exemplified by", "options": [{"tr": "Üretim hatalarını satıştan önce belirleyerek yeniden işlemek / Identifying and reworking production defects before sale", "en": "Identifying and reworking production defects before sale", "cmt_tr": "TKY, yeniden işlemeyi değil; önlemeyi vurgular. Yaklaşımı, kaliteyi 'inşa etmek' ve 'tasarlamak'tır; 'düzeltmek' veya 'denetlemek' değil.", "cmt_en": "TQM emphasizes prevention, not rework. The approach is to build in and design in quality — not to fix it in or inspect it in."}, {"tr": "Ürünü hataları en aza indirecek şekilde tasarlamak / Designing the product to minimize defects", "en": "Designing the product to minimize defects", "cmt_tr": "TKY, kaliteyi temel bir organizasyonel işlev olarak vurgular. Temel ilkelerden biri, hataların kaynakta yakalanıp düzeltilmesi ve kalitesinin baştan itibaren tasarlanmasıdır.", "cmt_en": "TQM emphasizes quality as a basic organizational function. One of the basic tenets is that errors should be caught and corrected at the source, and quality should be built in (designed in) from the start."}, {"tr": "Hataları mümkün olduğunca erken izole etmek için denetimler yapmak / Performing inspections to isolate defects as early as possible", "en": "Performing inspections to isolate defects as early as possible", "cmt_tr": "TKY, denetimi değil; önlemeyi vurgular. Kalite, bitmiş ürünlere incelenerek 'aktarılmaz'; baştan itibaren tasarlanır.", "cmt_en": "TQM emphasizes prevention, not inspection. Quality is not 'inspected in' to finished products — it is designed in from the start."}, {"tr": "Hataları azaltmak için makine ayarlarını periyodik olarak yapmak / Making machine adjustments periodically to reduce defects", "en": "Making machine adjustments periodically to reduce defects", "cmt_tr": "TKY, ayarlamayı değil; önlemeyi vurgular. Periyodik makine ayarlamaları, TKY'nin 'ilk seferinde doğru yap' ilkesiyle çelişir.", "cmt_en": "TQM emphasizes prevention, not periodic adjustment. Making machine adjustments periodically to reduce defects contradicts TQM's 'do it right the first time' principle."}], "correct": "B"}, {"q_tr": "Onaylanan kalite yapılarının yerinde olduğuna dair güvence sağlamak kimin sorumluluğundadır?", "q_en": "Providing assurance that the approved quality structures are in place is the responsibility of the", "options": [{"tr": "Denetim komitesi / Audit committee", "en": "Audit committee", "cmt_tr": "İç denetim fonksiyonunun rolü, onaylanan kalite yapılarının yerinde olduğunu ve kalite süreçlerinin amaçlandığı gibi işlediğini doğrulamak için güvence sağlamaktır.", "cmt_en": "The internal audit function's role is to provide assurance that the approved quality structures are in place and quality processes are functioning as intended."}, {"tr": "Üretim müdürü / Production manager", "en": "Production manager", "cmt_tr": "Denetim komitesi, finansal raporlama ve ifşaat konusunda denetim yapan bir yönetim kurulu komitesidir; kalite güvencesi sağlamaz.", "cmt_en": "The audit committee is an operating committee of the board charged with oversight of financial reporting and disclosure — it does not provide quality assurance."}, {"tr": "İç denetim fonksiyonu / Internal audit function", "en": "Internal audit function", "cmt_tr": "Kalite yönetimi yalnızca üretim müdürüyle sınırlı değildir; tüm organizasyonun sorumluluğundadır. Üretim müdürü güvence sağlamaz.", "cmt_en": "Quality management is not limited to the production manager — it is the responsibility of everyone in the organization. The production manager does not provide assurance."}, {"tr": "Baş denetim yöneticisi / Chief audit executive", "en": "Chief audit executive", "cmt_tr": "BAY, iç denetim fonksiyonunu yönetmekten sorumludur; kalite güvencesi sağlamak BAY'ın değil, iç denetim fonksiyonunun rolüdür.", "cmt_en": "The CAE is responsible for effectively managing the internal audit function — providing quality assurance is the role of the internal audit function, not solely the CAE."}], "correct": "C"}, {"q_tr": "Organizasyon TKY uygulamasını değerlendiriyor. Aşağıdakilerden hangisi TKY kararı için en az destekleyici faktördür?", "q_en": "The organization is evaluating whether it should implement TQM. Which would least likely be a supporting factor?", "options": [{"tr": "Ürün kalitesi yönetim için en önemli husustur / Quality of the product is of paramount consideration for management", "en": "Quality of the product is of paramount consideration for management", "cmt_tr": "Kaliteyi temel olarak hatalı ürünlerin yeniden işlenmesiyle iyileştirmeye çalışmak, geleneksel kalite anlayışını yansıtır. TKY ise hataları düzeltmek yerine baştan önlemeye odaklanır.", "cmt_en": "Improving quality mainly through the reworking of defective goods reflects the traditional view of quality. TQM focuses on preventing defects from occurring rather than fixing them after the fact."}, {"tr": "Kalitenin iyileştirilmesi ağırlıklı olarak hatalı ürünlerin yeniden işlenmesiyle sağlanacak / Quality improvement will be achieved mainly through the reworking of defective goods", "en": "Quality improvement will be achieved mainly through the reworking of defective goods", "cmt_tr": "TKY, kaliteyi temel bir organizasyonel işlev olarak ele alır; bu nedenle 'ürün kalitesi yönetim için en önemli husustur' ifadesi TKY'yi destekler.", "cmt_en": "TQM treats the pursuit of quality as a basic organizational function — so 'quality of the product is of paramount consideration for management' is a supporting factor for TQM."}, {"tr": "Tedarikçinin müşteriyle ilişkisi vurgulanacak / The supplier's relationship with the customer will be emphasized", "en": "The supplier's relationship with the customer will be emphasized", "cmt_tr": "TKY, tedarikçinin müşteriyle ilişkisini vurgular ve müşteri ihtiyaçlarını tanımlar; bu nedenle bu ifade TKY'yi destekler.", "cmt_en": "TQM emphasizes the supplier's relationship with the customer and identifies customer needs — so 'the supplier's relationship with the customer will be emphasized' is a supporting factor for TQM."}, {"tr": "Organizasyon sürekli kalite iyileştirmesi için çabalıyor / The organization strives for continuous quality improvement and innovation", "en": "The organization strives for continuous quality improvement and innovation", "cmt_tr": "TKY, organizasyonel faaliyetlerin her yönünde kalitenin sürekli arayışıdır; bu nedenle bu ifade TKY'yi destekler.", "cmt_en": "TQM is the continuous pursuit of quality in every aspect of organizational activities — so 'the organization strives for continuous quality improvement and innovation' is a supporting factor for TQM."}], "correct": "B"}, {"q_tr": "Aşağıdakilerden hangisi TKY'nin bir özelliğidir?", "q_en": "Which of the following is a characteristic of total quality management (TQM)?", "options": [{"tr": "Hedeflere göre yönetim / Management by objectives", "en": "Management by objectives", "cmt_tr": "Hedeflere göre yönetim, agresif sayısal kotaların peşinden giden bir sistemdir; bu, TKY'nin ilkeleriyle çelişir.", "cmt_en": "Management by objectives is a system with an aggressive pursuit of numerical quotas — this conflicts with TQM principles of continuous improvement."}, {"tr": "Diğer işçiler tarafından iş başında eğitim / On-the-job training by other workers", "en": "On-the-job training by other workers", "cmt_tr": "İş arkadaşlarından gayri resmi öğrenme, kötü iş alışkanlıklarını pekiştirme eğilimindedir; TKY ise herkesin uygun şekilde eğitilmesini vurgular.", "cmt_en": "Informal learning from coworkers tends to entrench bad work habits, while TQM stresses proper formal training of everyone."}, {"tr": "Son kontrol yoluyla kalite / Quality by final inspection", "en": "Quality by final inspection", "cmt_tr": "Son denetimle kalite, baştan kalite inşa edilirse gereksiz hale gelir; TKY, kaliteyi baştan tasarlamayı vurgular.", "cmt_en": "Quality by final inspection is unnecessary if quality is built in from the start — TQM emphasizes designing quality in, not inspecting it in."}, {"tr": "Çalışan eğitimi ve yetkilendirme / Employee training and empowerment", "en": "Employee training and empowerment", "cmt_tr": "Çalışan eğitimi ve yetkilendirme, TKY'nin temel özellikleri arasındadır; sürekli iyileştirme herkesin birincil kariyer hedefi olmalıdır.", "cmt_en": "Employee training and empowerment are essential characteristics of TQM — continuous improvement should be everyone's primary career objective."}], "correct": "D"}, {"q_tr": "TKY hangi organizasyonel yapıda en iyi çalışır?", "q_en": "In which of the following organizational structures does total quality management (TQM) work best?", "options": [{"tr": "Hiyerarşik / Hierarchical", "en": "Hierarchical", "cmt_tr": "Hiyerarşik yapı, TKY'yi boğar; açık iletişimi ve ekip çalışmasını engeller.", "cmt_en": "Hierarchical organization stifles TQM — it impedes open communication and teamwork that TQM requires."}, {"tr": "Aynı uzmanlıktan insanlardan oluşan ekipler / Teams of people from the same specialty", "en": "Teams of people from the same specialty", "cmt_tr": "TKY, aynı uzmanlıktan değil; farklı uzmanlıklardan gelen kişilerin bir araya gelmesiyle en iyi sonucu verir.", "cmt_en": "TQM works best when specialists from different areas come together — not when teams consist of people from the same specialty."}, {"tr": "Farklı uzmanlıklardan insanlardan oluşan ekipler / Teams of people from different specialties", "en": "Teams of people from different specialties", "cmt_tr": "TKY, farklı uzmanlıklardan insanlardan oluşan ekipleri savunur. Bu değişiklik, TKY'nin çalışanları güçlendirme ve takım çalışmasına verdiği önemin bir sonucudur.", "cmt_en": "TQM advocates teams of people from different specialties — this follows from TQM's emphasis on empowering employees and promoting teamwork."}, {"tr": "Bireysel çalışan uzmanlar / Specialists working individually", "en": "Specialists working individually", "cmt_tr": "Ekip çalışması, TKY için temel bir gerekliliktir; bireysel çalışma TKY ilkeleriyle çelişir.", "cmt_en": "Teamwork is essential for TQM — specialists working individually contradicts TQM's emphasis on collaboration and shared improvement."}], "correct": "C"}, {"q_tr": "TKY programının uygulanmasının ekipler aracılığıyla daha iyi çalışmasının temel nedenlerinden biri nedir?", "q_en": "One of the main reasons that implementation of a TQM program works better through the use of teams is", "options": [{"tr": "Ekipler daha verimlidir ve organizasyonun personelini azaltmasına yardımcı olur / Teams are more efficient and help an organization reduce its staffing", "en": "Teams are more efficient and help an organization reduce its staffing", "cmt_tr": "Ekipler genellikle verimsiz ve maliyetlidir; ancak bu onları TKY için değerli kılan özellik değildir.", "cmt_en": "Teams are often inefficient and costly — but this is not the characteristic that makes them valuable for TQM implementation."}, {"tr": "Çalışan motivasyonu bireysel katılımcılardan her zaman daha yüksektir / Employee motivation is always higher for team members than for individual contributors", "en": "Employee motivation is always higher for team members than for individual contributors", "cmt_tr": "Yüksek motivasyon, TKY'nin anahtarı olan süreç iyileştirmeyi doğrudan etkilemez.", "cmt_en": "High motivation does not directly affect process improvement, which is the key to quality improvement in TQM."}, {"tr": "Ekipler, fikir paylaşımı için doğal bir araçtır ve bu da süreç iyileştirmeye yol açar / Teams are a natural vehicle for sharing ideas, which leads to process improvement", "en": "Teams are a natural vehicle for sharing ideas, which leads to process improvement", "cmt_tr": "TKY, farklı uzmanlıklardan oluşan esnek ekipler oluşturarak katı dikey hiyerarşileri değiştirir veya ortadan kaldırır. Ekipler, fikir paylaşımını teşvik etmek ve süreç iyileştirme engellerini kaldırmak için mükemmel bir araçtır.", "cmt_en": "TQM promotes teamwork by forming flexible groups of specialists. Teams are an excellent vehicle for encouraging the sharing of ideas and removing process improvement obstacles."}, {"tr": "Ekiplerin kullanılması denetim ihtiyacını ortadan kaldırır / The use of teams eliminates the need for supervision", "en": "The use of teams eliminates the need for supervision", "cmt_tr": "Daha az denetim ile personel azaltma, TKY'nin yan ürünleri olabilir; ancak nihai hedefler değildir.", "cmt_en": "Less supervision and reduced staffing may be by-products of TQM teams, but they are not the ultimate objectives."}], "correct": "C"}, {"q_tr": "Başarılı bir TKY uygulamasının anahtarı nedir?", "q_en": "Which of the following is a key to successful total quality management (TQM)?", "options": [{"tr": "Kalite denetçileri yetiştirmek / Training quality inspectors", "en": "Training quality inspectors", "cmt_tr": "TKY, uzmanlaşmış kalite denetçilerini ön plana çıkarmaz; kalite herkesin sorumluluğudur.", "cmt_en": "TQM de-emphasizes specialized quality inspectors — quality is everyone's responsibility, not just dedicated inspectors."}, {"tr": "Müşteriye yoğun biçimde odaklanmak / Focusing intensely on the customer", "en": "Focusing intensely on the customer", "cmt_tr": "TKY, hem iç hem de dış müşterilerin memnuniyetini vurgular; tedarikçinin müşteriyle ilişkisini, müşteri ihtiyaçlarını ve süreçteki herkesin bir noktada müşteri veya tedarikçi olduğunu tanır.", "cmt_en": "TQM emphasizes satisfaction of customers, both internal and external — it considers the supplier's relationship with the customer, identifies customer needs, and recognizes that everyone is at some time a customer or supplier."}, {"tr": "Verimliliği artırmak için uygun hiyerarşiler oluşturmak / Creating appropriate hierarchies to increase efficiency", "en": "Creating appropriate hierarchies to increase efficiency", "cmt_tr": "Merkezileşmenin azaltılması genellikle TKY sürecinin uygulanması için gereklidir; hiyerarşileri artırmak değil.", "cmt_en": "Centralization often needs to be reduced to implement TQM — not increased with appropriate hierarchies."}, {"tr": "İyi tanımlanmış kalite standardı oluşturmak ve ona odaklanmak / Establishing a well-defined quality standard, then focusing on meeting it", "en": "Establishing a well-defined quality standard, then focusing on meeting it", "cmt_tr": "TKY sürekli iyileştirmeyi kapsar; bir standarda ulaşıldıktan sonra bile bu standart sürekli yeniden değerlendirilmelidir.", "cmt_en": "TQM involves continuous improvement — once a standard is reached, continuous improvement requires its constant reevaluation, not just focusing on meeting a fixed standard."}], "correct": "B"}, {"q_tr": "TKY'nin stratejik bir silah olarak kullanılabilmesinin temel nedenlerinden biri nedir?", "q_en": "One of the main reasons total quality management (TQM) can be used as a strategic weapon is that", "options": [{"tr": "Bir şirketin TKY çabalarından elde ettiği kümülatif iyileşme rakipler tarafından kolayca kopyalanamaz / The cumulative improvement from a company's TQM efforts cannot readily be copied by competitors", "en": "The cumulative improvement from a company's TQM efforts cannot readily be copied by competitors", "cmt_tr": "TKY'nin sürekli iyileştirme özelliği nedeniyle, birikimli iyileştirme süreci rakipler tarafından kolayca kopyalanamaz; bu da TKY'yi güçlü bir stratejik silah yapar.", "cmt_en": "Because TQM affects every aspect of the organization's activities and permeates the organizational culture, the cumulative effect of TQM's continuous improvement process cannot easily be duplicated by competitors."}, {"tr": "Yeni ürünler müşterileri rakiplerden uzaklaştırabilir / Introducing new products can lure customers away from competitors", "en": "Introducing new products can lure customers away from competitors", "cmt_tr": "Yeni ürünler rakipler tarafından hızla kopyalanabilir; dolayısıyla sürekli rekabet avantajı sağlamaz.", "cmt_en": "New products can be quickly copied by competitors and therefore do not provide a sustained competitive advantage — unlike the cumulative effects of TQM."}, {"tr": "Daha iyi kaliteyle ilgili azalan maliyetler daha yüksek temettüyü destekleyebilir / Reduced costs associated with better quality can support higher shareholder dividends", "en": "Reduced costs associated with better quality can support higher shareholder dividends", "cmt_tr": "TKY yalnızca maliyet azaltmaya odaklanmaz; müşteri memnuniyeti, kalite ve sürekli iyileştirmeye odaklanır.", "cmt_en": "TQM does not focus solely on cost reduction — it focuses on customer satisfaction, quality, and continuous improvement."}, {"tr": "TKY bir işletme için kapsamlı bir planlama süreci sağlar / TQM provides a comprehensive planning process for a business", "en": "TQM provides a comprehensive planning process for a business", "cmt_tr": "TKY, stratejik yönetimin yalnızca bir aracıdır; tek başına kapsamlı bir planlama süreci değildir.", "cmt_en": "TQM is only one tool of strategic management — it does not by itself provide a comprehensive planning process for a business."}], "correct": "A"}, {"q_tr": "Aşağıdakilerden hangisi TKY'nin temel ilkesi değildir?", "q_en": "Which one of the following is not a core principle of total quality management (TQM)?", "options": [{"tr": "Müşterilere ve paydaşlara odaklanma / A focus on customers and stakeholders", "en": "A focus on customers and stakeholders", "cmt_tr": "Müşterilere ve paydaşlara odaklanma, TKY'nin temel ilkelerinden biridir; hem iç hem de dış müşterileri kapsar.", "cmt_en": "A focus on customers and stakeholders is a core principle of TQM — it encompasses both internal and external customers."}, {"tr": "Organizasyondaki herkesin katılımı ve ekip çalışması / Participation and teamwork by everyone in the organization", "en": "Participation and teamwork by everyone in the organization", "cmt_tr": "Organizasyondaki herkesin katılımı ve ekip çalışması, TKY'nin temel ilkelerinden biridir.", "cmt_en": "Participation and teamwork by everyone in the organization is a core principle of TQM."}, {"tr": "Süreç odaklı ve sürekli iyileştirme / A process focus supported by continuous improvement and learning", "en": "A process focus supported by continuous improvement and learning", "cmt_tr": "Süreç odaklılık ve sürekli iyileştirme, TKY'nin temel ilkelerinden biridir.", "cmt_en": "A process focus supported by continuous improvement and learning is a core principle of TQM."}, {"tr": "Teknolojik atılımlara odaklanma / A focus on technological breakthroughs", "en": "A focus on technological breakthroughs", "cmt_tr": "Teknolojik atılımlara odaklanma, TKY'nin temel ilkelerinden biri değildir. TKY'nin temel ilkeleri: müşteri odağı, sürekli iyileştirme ve herkesin kaliteyi yakalamaya dahil olmasıdır.", "cmt_en": "A focus on technological breakthroughs is not a core principle of TQM. The core principles are emphasis on the customer, continuous improvement, and engaging every employee in the pursuit of total quality."}], "correct": "D"}, {"q_tr": "Bir TKY sistemi uygulayan firma için aşağıdakilerden hangisi tipiktir?", "q_en": "Which of the following is typical for a firm implementing a system of total quality management (TQM)?", "options": [{"tr": "Tüm yatay iş işlevlerini birleştirmek / Consolidating all horizontal business functions", "en": "Consolidating all horizontal business functions", "cmt_tr": "Tüm yatay iş işlevlerini birleştirmek, TKY için zorunlu değildir; güçlü yatay bağlantılar gerektirir ancak şirket birleşmeleri değil.", "cmt_en": "TQM requires strong horizontal linkages but does not require actual consolidation of all horizontal business functions."}, {"tr": "Kalite yönetimini yalnızca kalite yönetim personeli ve mühendislerle sınırlamak / Limiting quality management to quality management staff, engineers, and production departments", "en": "Limiting quality management to quality management staff, engineers, and production departments", "cmt_tr": "Kalite yönetimini yalnızca kalite personeli ve üretim bölümüyle sınırlamak, TKY'nin herkesin kaliteden sorumlu olduğu ilkesiyle çelişir.", "cmt_en": "Limiting quality management to quality management staff and production departments contradicts TQM's principle that quality is everyone's responsibility."}, {"tr": "Kalite denetimi yapmak / Conducting a quality audit", "en": "Conducting a quality audit", "cmt_tr": "TKY uygulayan bir firma, stratejik kalite iyileştirme planı geliştirmek ve organizasyonun güçlü/zayıf yönlerini belirlemek amacıyla kalite denetimi yapmalıdır.", "cmt_en": "A firm implementing TQM should conduct a quality audit to evaluate the process for gathering information to develop a strategic quality improvement plan and identify the best improvement opportunities."}, {"tr": "Müşteri ve tedarikçi gereksinimlerini belirlemek için boşluk analizi hazırlamak / Preparing a gap analysis to determine customer and supplier requirements", "en": "Preparing a gap analysis to determine customer and supplier requirements", "cmt_tr": "Boşluk analizi, organizasyon ile kalite liderleri arasındaki farkı kapatmak için ne gerektiğini belirler ve stratejik kalite iyileştirme planı için veri tabanı oluşturur.", "cmt_en": "A gap analysis determines what is necessary to close the gap between the entity and quality leaders and to develop a database for a strategic quality improvement plan — it is not what a TQM-implementing firm 'typically does.'"}], "correct": "C"}, {"q_tr": "TKY'yi en iyi tanımlayan ifade hangisidir?", "q_en": "Which statement best describes total quality management (TQM)?", "options": [{"tr": "TKY, denetim maliyetini azaltmayı vurgular / TQM emphasizes reducing the cost of inspection", "en": "TQM emphasizes reducing the cost of inspection", "cmt_tr": "Denetim maliyetini azaltmak, TKY'nin en düşük genel işletme maliyetine ulaşma hedefinin bir detayıdır; ancak TKY'yi en iyi tanımlayan ifade değildir.", "cmt_en": "Reducing the cost of inspection helps achieve the lowest overall business cost — but this is a detail, not the best description of TQM."}, {"tr": "TKY, tüm çalışanların karar alma sürecine katılımını vurgular / TQM emphasizes participation by all employees in the decision-making process", "en": "TQM emphasizes participation by all employees in the decision-making process", "cmt_tr": "Tüm çalışanların karar alma sürecine katılımını vurgulayan yaklaşım, katılımcı yönetimdir; TKY değil.", "cmt_en": "Participative management emphasizes participation by all employees in the decision-making process — this describes participative management, not TQM specifically."}, {"tr": "TKY uygulaması hızlı ve kolaydır / TQM implementation is quick and easy", "en": "TQM implementation is quick and easy", "cmt_tr": "TKY uygulaması, organizasyonun her yönüne dokunduğundan hızlı ve kolay değildir; uzun vadeli bir kültürel dönüşüm gerektirir.", "cmt_en": "TQM implementation is not quick and easy — it involves a long-term cultural transformation that touches every aspect of the organization."}, {"tr": "TKY, kalitenin sürekli arayışıdır / TQM is the continuous pursuit of quality", "en": "TQM is the continuous pursuit of quality", "cmt_tr": "TKY; 'ilk seferinde doğru yapma' felsefesi, çalışan eğitimi ve yetkilendirme, takım çalışması, süreç iyileştirme ve hem iç hem de dış müşterilerin memnuniyetine odaklanmayı kapsayan kalitenin sürekli arayışıdır.", "cmt_en": "TQM is the continuou
