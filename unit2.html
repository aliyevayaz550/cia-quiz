s pursuit of quality through: doing it right the first time, employee training and empowerment, teamwork, process improvement, and attention to satisfaction of customers both internal and external."}], "correct": "D"}, {"q_tr": "Bir şirket müşteri merkezliyse, müşterileri nasıl tanımlanır?", "q_en": "If a company is customer-centered, its customers are defined as", "options": [{"tr": "Yalnızca şirketten satın almış dışarıdaki kişiler / Only people external to the company who have purchased something", "en": "Only people external to the company who have purchased something", "cmt_tr": "Yalnızca şirketten satın almış dış kişileri müşteri olarak tanımlamak yetersizdir; müşteriler hem iç hem de dış olabilir.", "cmt_en": "Defining customers as only external people who have purchased something is insufficient — customers are both internal and external under TQM."}, {"tr": "Yalnızca ürünü doğrudan kullanan şirket içindeki kişiler / Only people internal to the company who directly use its product", "en": "Only people internal to the company who directly use its product", "cmt_tr": "Yalnızca ürünü doğrudan kullanan iç kişileri müşteri olarak tanımlamak yetersizdir; müşteriler hem iç hem de dış olabilir.", "cmt_en": "Defining customers as only internal people who directly use the product is insufficient — customers are both internal and external under TQM."}, {"tr": "Şirket dışındaki herkes ve işini yapmak için ürüne güvenen içeridekiler / Anyone external and those internal who rely on its product to get their job done", "en": "Anyone external and those internal who rely on its product to get their job done", "cmt_tr": "TKY'de müşteri odağı, hem iç hem de dış müşterileri kapsar. İç müşteri, bir başkasının işine güvenerek kendi görevini yerine getiren organizasyon üyesidir.", "cmt_en": "In TQM, customer orientation encompasses both internal and external customers. An internal customer is a member of the organization who relies on another member's work to accomplish their task."}, {"tr": "İş yapan veya yapabilecek şirket dışındaki herkes / Everybody external who is currently doing or may do business with the company", "en": "Everybody external who is currently doing or may do business with the company", "cmt_tr": "Şu anda veya gelecekte iş yapabilecek tüm dış kişileri müşteri olarak tanımlamak, iç müşterileri dışarıda bırakır; oysa TKY hem iç hem de dış müşterileri kapsar.", "cmt_en": "Defining customers as everybody external who is currently doing or may do business with the company excludes internal customers — TQM encompasses both internal and external customers."}], "correct": "C"}, {"q_tr": "Aşağıdakilerden hangisi iç denetimin kapsamı dışındadır?", "q_en": "Which of the following activities is outside the scope of internal auditing?", "options": [{"tr": "Politika, prosedür ve sözleşmelere uyumlulukla ilgili risk maruziyetlerini değerlendirmek / Evaluating risk exposures regarding compliance with policies, procedures, and contracts", "en": "Evaluating risk exposures regarding compliance with policies, procedures, and contracts", "cmt_tr": "İç denetçiler, risk maruziyetlerini değerlendirir; bu değerlendirme politika, prosedür ve sözleşmelere uyumluluğu kapsar. Bu, iç denetimin kapsamı içindedir.", "cmt_en": "Internal auditors must evaluate risk exposures relating to compliance with policies, procedures, and contracts — this is within the scope of internal auditing."}, {"tr": "Varlıkların korunması / Safeguarding of assets", "en": "Safeguarding of assets", "cmt_tr": "Varlıkların korunması operasyonel bir faaliyettir; iç denetim fonksiyonunun kapsamı dışındadır. Ancak iç denetim, varlıkların korunmasına ilişkin kontrollerin yeterliliğini ve etkinliğini değerlendirir.", "cmt_en": "Safeguarding assets is an operational activity and is beyond the scope of the internal audit function. However, internal audit evaluates the adequacy and effectiveness of controls related to safeguarding assets."}, {"tr": "Yasa ve yönetmeliklere uyumlulukla ilgili risk maruziyetlerini değerlendirmek / Evaluating risk exposures regarding compliance with laws and regulations", "en": "Evaluating risk exposures regarding compliance with laws and regulations", "cmt_tr": "İç denetçiler, yasa ve yönetmeliklere uyumlulukla ilgili risk maruziyetlerini değerlendirmelidir. Bu, iç denetimin kapsamı içindedir.", "cmt_en": "Internal auditors must evaluate risk exposures relating to compliance with laws and regulations — this is within the scope of internal auditing."}, {"tr": "Yönetimin hedeflerin başarılıp başarılmadığını belirlemek için kriter oluşturduğu ölçüyü tespit etmek / Ascertaining the extent to which management has established criteria to determine whether objectives have been accomplished", "en": "Ascertaining the extent to which management has established criteria to determine whether objectives have been accomplished", "cmt_tr": "Yönetimin hedeflere ulaşılıp ulaşılmadığını belirlemek için yeterli kriterler oluşturup oluşturmadığını tespit etmek, iç denetimin kapsamı içindedir.", "cmt_en": "Ascertaining the extent to which management has established adequate criteria to determine whether objectives have been accomplished is within the scope of internal auditing."}], "correct": "B"}], "SU5 - Security & Privacy Audits": [{"q_tr": "Bir organizasyonun tüm kritik bilgilerinin güvenilirliği ve bütünlüğünden kim sorumludur?", "q_en": "The reliability and integrity of all critical information of an organization, regardless of the media in which the information is stored, is the responsibility of", "options": [{"tr": "Hissedarlar / Shareholders", "en": "Shareholders", "cmt_tr": "Yönetim, hissedarlara ve diğer paydaşlara karşı bilginin güvenli ve güvenilir olmasını sağlama sorumluluğu taşır.", "cmt_en": "Management has a responsibility to shareholders and other stakeholders to ensure information is secure and reliable — not the shareholders themselves."}, {"tr": "BT departmanı / IT department", "en": "IT department", "cmt_tr": "BT departmanı, bilgiyi kontrol etmek için yönetim tarafından görevlendirilen fonksiyonel birimdir; ancak nihai sorumluluk yönetimdedir.", "cmt_en": "The IT department is generally the functional department charged by management to monitor and ensure information is controlled per company policies — but ultimate responsibility rests with management."}, {"tr": "Yönetim / Management", "en": "Management", "cmt_tr": "İç denetçiler, üst yönetimin ve yönetim kurulunun bilgi güvenilirliği ve bütünlüğünün bir yönetim sorumluluğu olduğunu açıkça anladığını belirlemelidir.", "cmt_en": "Internal auditors determine whether senior management and the board have a clear understanding that information reliability and integrity is a management responsibility — not the IT department's."}, {"tr": "Tüm çalışanlar / All employees", "en": "All employees", "cmt_tr": "Yönetim, çalışanlara karşı da çalışan bilgilerinin (SGK numarası, hesap bilgileri vb.) güvenli ve doğru olmasını sağlama sorumluluğu taşır; ancak nihai sorumluluk yönetimdedir.", "cmt_en": "Management has a responsibility to employees to ensure employee information is secure and accurate — but ultimate accountability for information reliability across the organization rests with management."}], "correct": "C"}, {"q_tr": "İzlemeden özgürlük en iyi şekilde neyi tanımlar?", "q_en": "Freedom from monitoring best defines", "options": [{"tr": "Kişisel gizlilik / Personal privacy", "en": "Personal privacy", "cmt_tr": "Kişisel gizlilik, fiziksel ve psikolojik boyutları kapsar; izlemeden özgürlük değil.", "cmt_en": "Personal privacy is physical and psychological in nature — it does not specifically mean freedom from monitoring."}, {"tr": "Alan gizliliği / Privacy of space", "en": "Privacy of space", "cmt_tr": "Alan gizliliği, gözetimden özgürlük olarak tanımlanır; izlemeden özgürlük değil.", "cmt_en": "Privacy of space is freedom from surveillance — not freedom from monitoring."}, {"tr": "İletişim gizliliği / Privacy of communication", "en": "Privacy of communication", "cmt_tr": "İletişim gizliliği, izlemeden özgürlük olarak tanımlanır. Dört gizlilik türü: kişisel (fiziksel/psikolojik), alan (gözetimden özgürlük), iletişim (izlemeden özgürlük) ve bilgi (kişisel bilgilerin toplanması ve kullanımı).", "cmt_en": "Privacy of communication is defined as freedom from monitoring. The four privacy types are: personal (physical/psychological), space (freedom from surveillance), communication (freedom from monitoring), and information (collection, use, and disclosure of personal information)."}, {"tr": "Bilgi gizliliği / Privacy of information", "en": "Privacy of information", "cmt_tr": "Bilgi gizliliği, kişisel bilgilerin başkaları tarafından toplanması, kullanılması ve ifşa edilmesiyle ilgilidir; izlemeden özgürlük değil.", "cmt_en": "Privacy of information concerns the collection, use, and disclosure of personal information by others — not freedom from monitoring."}], "correct": "C"}, {"q_tr": "Aşağıdaki gizlilik terimlerinden hangisi doğru bir örnekle eşleştirilmiştir?", "q_en": "Which of the following privacy terms is matched with an accurate example of the term?", "options": [{"tr": "Terim: Alan gizliliği. Örnek: Gözetimden özgürlük / Term: Privacy of space. Example: Freedom from surveillance", "en": "Term: Privacy of space. Example: Freedom from surveillance", "cmt_tr": "Alan gizliliği, gözetimden özgürlük olarak doğru tanımlanmıştır.", "cmt_en": "Privacy of space correctly paired with freedom from surveillance — this is the accurate match."}, {"tr": "Terim: Bilgi gizliliği. Örnek: İzlemeden özgürlük / Term: Privacy of information. Example: Freedom from monitoring", "en": "Term: Privacy of information. Example: Freedom from monitoring", "cmt_tr": "Bilgi gizliliği, izlemeden değil; kişisel bilgilerin başkaları tarafından toplanması ve kullanılmasından özgürlük olarak tanımlanır.", "cmt_en": "Privacy of information includes collection, use, and disclosure of personal information by others — not freedom from monitoring."}, {"tr": "Terim: Kişisel gizlilik. Örnek: İzlemeden özgürlük / Term: Personal privacy. Example: Freedom from monitoring", "en": "Term: Personal privacy. Example: Freedom from monitoring", "cmt_tr": "Kişisel gizlilik, fiziksel ve psikolojik boyutları kapsar; izlemeden özgürlük değil.", "cmt_en": "Personal privacy includes physical and psychological dimensions — not freedom from monitoring."}, {"tr": "Terim: İletişim gizliliği. Örnek: Gözetimden özgürlük / Term: Privacy of communication. Example: Freedom from surveillance", "en": "Term: Privacy of communication. Example: Freedom from surveillance", "cmt_tr": "İletişim gizliliği, gözetimden değil; izlemeden özgürlük olarak tanımlanır.", "cmt_en": "Privacy of communication is freedom from monitoring — not freedom from surveillance."}], "correct": "A"}, {"q_tr": "Gizlilik tehditlerine karşı korumada yönetim kurulunun rolünün bir parçası nedir?", "q_en": "Which of the following is part of the board's role in protecting against privacy threats?", "options": [{"tr": "Gizlilik çerçevesi oluşturmak / Establishing a privacy framework", "en": "Establishing a privacy framework", "cmt_tr": "Yönetim kurulu, organizasyonun temel risklerinin tanımlandığını ve uygun kontrollerin uygulandığını sağlamaktan nihai olarak sorumludur; buna organizasyon için gerekli gizlilik çerçevesini oluşturmak ve uygulanmasını izlemek de dahildir.", "cmt_en": "The board is ultimately accountable for ensuring principal risks have been identified and appropriate control processes implemented — including establishing the necessary privacy framework for the organization."}, {"tr": "Organizasyonun topladığı kişisel veya özel bilgileri tanımlamak / Identifying the information gathered that is deemed personal or private", "en": "Identifying the information gathered that is deemed personal or private", "cmt_tr": "Organizasyonun topladığı kişisel veya özel bilgileri tanımlamak, iç denetçilerin görevidir; yönetim kurulunun değil.", "cmt_en": "Identifying the information gathered by the organization that is deemed personal or private is a duty of the internal auditors — not the board."}, {"tr": "Bilgi toplama yöntemlerini tanımlamak / Identifying the methods used to collect information", "en": "Identifying the methods used to collect information", "cmt_tr": "Kullanılan bilgi toplama yöntemlerini tanımlamak, iç denetçilerin görevidir; yönetim kurulunun değil.", "cmt_en": "Identifying the methods used to collect information is a duty of the internal auditors — not the board."}, {"tr": "Toplanan bilgilerin amaçlanan kullanımına uygun olup olmadığını belirlemek / Determining whether the use of information is in accordance with its intended use and the laws", "en": "Determining whether the use of information is in accordance with its intended use and the laws", "cmt_tr": "Toplanan bilgilerin amaçlanan kullanımına ve yasalara uygun olup olmadığını belirlemek, iç denetçilerin görevidir; yönetim kurulunun değil.", "cmt_en": "Determining whether the use of the collected information is in accordance with its intended use and the laws is a duty of the internal auditors — not the board."}], "correct": "A"}, {"q_tr": "Kişisel bilgiler şunları içerebilir: 1. Tıbbi durum, 2. Sosyal durum, 3. Kredi kayıtları, 4. Disiplin cezaları", "q_en": "Personal information may include: 1. Medical status, 2. Social status, 3. Credit records, 4. Disciplinary actions", "options": [{"tr": "1, 2 ve 4 yalnızca / 1, 2, and 4 only", "en": "1, 2, and 4 only", "cmt_tr": "Kredi kayıtları da kişisel bilgiler arasındadır; bu nedenle yalnızca 1, 2 ve 4 seçimi eksiktir.", "cmt_en": "Credit records are also considered personal information — so selecting only 1, 2, and 4 is incomplete."}, {"tr": "Yalnızca 1 / 1 only", "en": "1 only", "cmt_tr": "Yalnızca tıbbi durum seçmek, sosyal durum, kredi kayıtları ve disiplin cezalarını dışarıda bırakır; hepsini kapsamaz.", "cmt_en": "Selecting only medical status leaves out social status, credit records, and disciplinary actions — all of which are personal information."}, {"tr": "1 ve 2 yalnızca / 1 and 2 only", "en": "1 and 2 only", "cmt_tr": "Yalnızca 1 ve 2'yi seçmek, kredi kayıtları ve disiplin cezalarını dışarıda bırakır.", "cmt_en": "Selecting only 1 and 2 leaves out credit records and disciplinary actions — which are also considered personal information."}, {"tr": "1, 2, 3 ve 4 / 1, 2, 3, and 4", "en": "1, 2, 3, and 4", "cmt_tr": "Kişisel bilgiler şunları kapsar: tıbbi durum, sosyal durum, aile ilişkileri, disiplin cezaları, ad, adres, kimlik numaraları, gelir, mali durum, yorumlar, çalışan dosyaları, değerlendirmeler ve kredi kayıtları.", "cmt_en": "Personal information may include: medical status, social status, family relationships, disciplinary actions, name, address, identification numbers, income, financial status, comments, employee files, evaluations, and credit records."}], "correct": "D"}, {"q_tr": "Organizasyonun gizlilik çerçevesinin yönetimini değerlendirirken iç denetçi neyi göz önünde bulundurur?", "q_en": "When evaluating management of the organization's privacy framework, the internal auditor considers", "options": [{"tr": "Gizlilikle ilgili geçerli yasalar / The applicable laws relating to privacy", "en": "The applicable laws relating to privacy", "cmt_tr": "Gizlilik çerçevesini değerlendirirken iç denetçi; ilgili yasaları, kurum içi hukuk danışmanını ve BT uzmanlarını da göz önünde bulundurur.", "cmt_en": "The internal auditor also considers conferring with in-house counsel and information technology specialists — not just the applicable laws."}, {"tr": "Kurum içi hukuk danışmanıyla görüşmek / Conferring with in-house legal counsel", "en": "Conferring with in-house legal counsel", "cmt_tr": "Gizlilik çerçevesini değerlendirirken iç denetçi; geçerli yasaları ve BT uzmanlarını da göz önünde bulundurur.", "cmt_en": "The internal auditor also considers the applicable laws and conferring with information technology specialists — not just in-house legal counsel."}, {"tr": "Bilgi teknolojisi uzmanlarıyla görüşmek / Conferring with information technology specialists", "en": "Conferring with information technology specialists", "cmt_tr": "Gizlilik çerçevesini değerlendirirken iç denetçi; geçerli yasaları ve kurum içi hukuk danışmanını da göz önünde bulundurur.", "cmt_en": "The internal auditor also considers the applicable laws and conferring with in-house legal counsel — not just information technology specialists."}, {"tr": "Tüm cevaplar doğru / All of the answers are correct", "en": "All of the answers are correct", "cmt_tr": "Gizlilik çerçevesinin değerlendirmesinde iç denetçi şunları göz önünde bulundurur: (1) ilgili yargı bölgelerindeki yasalar ve yönetmelikler, (2) kurum içi hukuk danışmanıyla görüşme ve (3) bilgi teknolojisi uzmanlarıyla görüşme.", "cmt_en": "In evaluating the privacy framework, the internal auditor considers: (1) laws and regulations in relevant jurisdictions, (2) conferring with in-house legal counsel, and (3) conferring with information technology specialists."}], "correct": "D"}, {"q_tr": "İç denetim fonksiyonunun bilginin güvenilirliği ve bütünlüğünü değerlendirmek için yeterli kaynaklara sahip olup olmadığını kim belirler?", "q_en": "Who determines whether the internal audit function has access to resources sufficient to evaluate the reliability and integrity of information?", "options": [{"tr": "İcra kurulu başkanı / The chief executive officer", "en": "The chief executive officer", "cmt_tr": "İcra kurulu başkanı değil; BAY, iç denetim fonksiyonunun bilgi güvenilirliğini değerlendirmek için kaynaklara sahip olup olmadığını belirlemelidir.", "cmt_en": "It is the CAE — not the chief executive officer — who must make a determination of whether the internal audit function has the resources to meet its obligations."}, {"tr": "Baş denetim yöneticisi / The chief audit executive", "en": "The chief audit executive", "cmt_tr": "BAY, iç denetim fonksiyonunun bilgi güvenilirliğini ve bütünlüğünü değerlendirmek için yetkin denetim kaynaklarına sahip olup olmadığını veya bunlara erişip erişemediğini belirler.", "cmt_en": "The chief audit executive determines whether the internal audit function possesses, or has access to, competent audit resources to evaluate information reliability and integrity and associated risk exposures."}, {"tr": "Dış denetçi / The external auditor", "en": "The external auditor", "cmt_tr": "Dış denetçi değil; BAY, iç denetim fonksiyonunun kaynak yeterliliğini belirlemekten sorumludur.", "cmt_en": "It is the CAE — not the external auditor — who must make a determination of whether the internal audit function has the resources to meet its obligations."}, {"tr": "Baş operasyon yöneticisi / The chief operating officer", "en": "The chief operating officer", "cmt_tr": "Baş operasyon yöneticisi değil; BAY, iç denetim fonksiyonunun kaynak yeterliliğini belirlemekten sorumludur.", "cmt_en": "It is the CAE — not the chief operating officer — who must make a determination of whether the internal audit function has the resources to meet its obligations."}], "correct": "B"}, {"q_tr": "Bilgi güvenliğine ilişkin aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following statements is false with respect to information security?", "options": [{"tr": "İç denetçiler, bilgi güvenilirliği ve bütünlüğünün iç denetim fonksiyonunun sorumluluğu olduğu konusunda üst yönetim ve yönetim kurulunun net bir anlayışa sahip olduğunu belirlemelidir / Internal auditors should determine that management understands that information reliability is the responsibility of the internal audit function", "en": "Internal auditors should determine that management understands that information reliability is the responsibility of the internal audit function", "cmt_tr": "İç denetçiler, bilgi güvenilirliği ve bütünlüğünün iç denetim fonksiyonunun değil; yönetimin sorumluluğu olduğunu üst yönetim ve yönetim kurulunun anladığını belirlemelidir.", "cmt_en": "Internal auditors determine whether senior management and the board understand that information reliability and integrity is a management responsibility — not the responsibility of the internal audit function."}, {"tr": "BAY, iç denetim fonksiyonunun bilgi güvenliğini değerlendirmek için yetkin denetim kaynaklarına sahip olduğunu belirlemelidir / The CAE should determine that the internal audit function possesses competent auditing resources to evaluate information security", "en": "The CAE should determine that the internal audit function possesses competent auditing resources to evaluate information security", "cmt_tr": "BAY, iç denetim fonksiyonunun bilgi güvenliğini değerlendirmek için yetkin denetim kaynaklarına sahip olduğunu belirlemelidir.", "cmt_en": "The CAE should determine that the internal audit function possesses competent auditing resources to evaluate information security and associated risk exposures — this statement is correct."}, {"tr": "İç denetçiler, organizasyonun bilgi güvenliği uygulamalarını periyodik olarak değerlendirmelidir / Internal auditors should periodically assess the organization's information security practices", "en": "Internal auditors should periodically assess the organization's information security practices", "cmt_tr": "İç denetçiler, organizasyonun bilgi güvenliği uygulamalarını periyodik olarak değerlendirmeli ve uygun olduğu durumlarda yeni kontroller ve güvenlik önlemleri için geliştirmeler önermelidir.", "cmt_en": "Internal auditors should periodically assess the organization's information security practices and recommend enhancements to, or implementation of, controls and safeguards as appropriate — this statement is correct."}, {"tr": "İç denetçiler, geçmiş saldırılara karşı önleyici, tespit edici ve azaltıcı tedbirlerin etkinliğini değerlendirmelidir / Internal auditors should assess the effectiveness of preventive, detective, and mitigative measures against past attacks", "en": "Internal auditors should assess the effectiveness of preventive, detective, and mitigative measures against past attacks", "cmt_tr": "İç denetçiler, geçmiş saldırılara ve gelecekte gerçekleşmesi muhtemel girişimlere karşı önleyici, tespit edici ve azaltıcı tedbirlerin etkinliğini değerlendirmelidir.", "cmt_en": "Internal auditors should assess the effectiveness of preventive, detective, and mitigative measures against past attacks and future attempts deemed likely to occur — this statement is correct."}], "correct": "A"}, {"q_tr": "İç denetçilerin bilgi güvenliği için nihai sorumluluğu nedir?", "q_en": "The internal auditors' ultimate responsibility for information security includes", "options": [{"tr": "İncelenecek teknik yönleri, riskleri, süreçleri ve işlemleri belirlemek / Identifying technical aspects, risks, processes, and transactions to be examined", "en": "Identifying technical aspects, risks, processes, and transactions to be examined", "cmt_tr": "Teknik yönleri, riskleri ve işlemleri tanımlamak, planlama sürecinin parçasıdır; bilgi güvenliği için nihai sorumluluk değildir.", "cmt_en": "Identifying technical aspects, risks, processes, and transactions to be examined is part of the planning process — not the ultimate responsibility for information security."}, {"tr": "Katılım hedeflerine ulaşmak için test kapsamını ve derecesini belirlemek / Determining the scope and degree of testing to achieve engagement objectives", "en": "Determining the scope and degree of testing to achieve engagement objectives", "cmt_tr": "Test kapsamını ve derecesini belirlemek, planlama sürecinin parçasıdır; bilgi güvenliği için nihai sorumluluk değildir.", "cmt_en": "Determining the scope and degree of testing to achieve engagement objectives is part of the planning process — not the ultimate responsibility for information security."}, {"tr": "Bilgi güvenliği uygulamalarını periyodik olarak değerlendirmek / Periodically assessing information security practices", "en": "Periodically assessing information security practices", "cmt_tr": "İç denetçilerin bilgi güvenliği için nihai sorumluluğu, organizasyonun bilgi güvenliği uygulamalarını periyodik olarak değerlendirmek ve uygun önlemlerin alınması için tavsiyeler sunmaktır.", "cmt_en": "Internal auditors' ultimate responsibility for information security is to periodically assess the organization's information security practices and recommend enhancements or new controls and safeguards as appropriate."}, {"tr": "Katılım prosedürlerini belgelemek / Documenting engagement procedures", "en": "Documenting engagement procedures", "cmt_tr": "Katılım prosedürlerini belgelemek, planlama sürecinin parçasıdır; bilgi güvenliği için nihai sorumluluk değildir.", "cmt_en": "Documenting engagement procedures is part of the planning process — not the ultimate responsibility for information security."}], "correct": "C"}, {"q_tr": "Aşağıdakilerden hangisi güvence hizmetleri gerçekleştirirken iç denetim fonksiyonunun rolü değildir?", "q_en": "Which of the following is not a role of the internal audit function in performing assurance services?", "options": [{"tr": "Bilgi sistemleri güvenlik risklerini değerlendirmek / Assessing information systems security risks", "en": "Assessing information systems security risks", "cmt_tr": "Bilgi sistemleri güvenlik risklerini değerlendirmek, güvence hizmetleri açısından iç denetim fonksiyonunun rolünün bir parçasıdır.", "cmt_en": "Assessing information systems security risks is part of the role of the internal audit function with respect to assurance services — it is within scope."}, {"tr": "Kontrolleri uygulamak için bilgi sistemi kullanıcıları ve sistem güvenlik personeli ile çalışmak / Working with information system users and system security personnel to implement controls", "en": "Working with information system users and system security personnel to implement controls", "cmt_tr": "Kontrolleri uygulamak için bilgi sistemi kullanıcıları ve sistem güvenlik personeli ile çalışmak, danışmanlık rolüdür; güvence hizmetleri kapsamında değildir.", "cmt_en": "Working with information system users and systems security personnel to implement controls is an advisory capacity — not a role within assurance services."}, {"tr": "Düzeltici eylemlerin uygulanmasını izlemek / Monitoring the implementation of corrective action", "en": "Monitoring the implementation of corrective action", "cmt_tr": "Düzeltici eylemlerin uygulanmasını izlemek, güvence hizmetleri açısından iç denetim fonksiyonunun rolünün bir parçasıdır.", "cmt_en": "Monitoring the implementation of corrective action is part of the role of the internal audit function with respect to assurance services — it is within scope."}, {"tr": "Güvenlik kontrollerini değerlendirmek / Evaluating security controls", "en": "Evaluating security controls", "cmt_tr": "Güvenlik kontrollerini değerlendirmek, güvence hizmetleri açısından iç denetim fonksiyonunun rolünün bir parçasıdır.", "cmt_en": "Evaluating security controls is part of the role of the internal audit function with respect to assurance services — it is within scope."}], "correct": "B"}, {"q_tr": "Gizlilik denetimi, bir organizasyonun neyi yapma yeteneğine odaklanır?", "q_en": "A privacy audit focuses on an organization's ability to", "options": [{"tr": "Performansı ölçmek ve eksiklikleri analiz etmek / Measure performance and analyze deficiencies", "en": "Measure performance and analyze deficiencies", "cmt_tr": "Performans denetimi, performansı ölçme ve eksiklikleri analiz etme yeteneğini ele alır; gizlilik denetimi değil.", "cmt_en": "A performance audit addresses an organization's ability to measure performance and analyze deficiencies — not a privacy audit."}, {"tr": "Hedeflerine verimli ve etkin biçimde ulaşmak / Achieve its objectives efficiently and effectively", "en": "Achieve its objectives efficiently and effectively", "cmt_tr": "Performans veya operasyonel denetim, hedeflere verimli ve etkin biçimde ulaşma yeteneğini ele alır; gizlilik denetimi değil.", "cmt_en": "A performance or operational audit addresses an organization's ability to achieve its objectives efficiently and effectively — not a privacy audit."}, {"tr": "Özel bilgilerin yönetimi için kontrolleri uygulamak / Implement controls for the management of private information", "en": "Implement controls for the management of private information", "cmt_tr": "Gizlilik denetimi, organizasyonun özel bilgilerin yönetimine yönelik kontrolleri uygulama yeteneğine odaklanır. Gizlilik kontrollerinin eksikliği, hukuki sorunlara, varlık kayıplarına, tüketici güveninin yitirilmesine ve itibar kaybına yol açabilir.", "cmt_en": "A privacy audit focuses on an organization's ability to implement controls for the management of private information. Failure to establish such controls can lead to legal problems, asset loss, loss of consumer trust, and a damaged reputation."}, {"tr": "Kullanıcıların ihtiyaçlarını güvenilir biçimde karşılamak / Meet users' needs reliably", "en": "Meet users' needs reliably", "cmt_tr": "Operasyonel denetim, kullanıcıların ihtiyaçlarını güvenilir biçimde karşılama yeteneğini ele alır; gizlilik denetimi değil.", "cmt_en": "An operational audit addresses the organization's ability to meet users' needs reliably — not a privacy audit."}], "correct": "C"}, {"q_tr": "Alan gizliliği en iyi şekilde nasıl tanımlanır?", "q_en": "Privacy of space is best defined as freedom from", "options": [{"tr": "Fiziksel gizliliğin ihlalinden / Invasion of physical privacy", "en": "Invasion of physical privacy", "cmt_tr": "Kişisel gizlilik, yalnızca fiziksel değil; psikolojik boyutları da kapsar; gözetimden değil, bu iki boyutu kapsar.", "cmt_en": "Personal privacy includes psychological as well as physical privacy — it is not defined as freedom from surveillance."}, {"tr": "İletişimin izlenmesinden / Monitoring of communications", "en": "Monitoring of communications", "cmt_tr": "İletişim gizliliği, izlemeden özgürlük olarak tanımlanır; gözetimden özgürlük değil.", "cmt_en": "Privacy of communication means freedom from monitoring — not freedom from surveillance."}, {"tr": "Gözetimden / Surveillance", "en": "Surveillance", "cmt_tr": "Alan gizliliği, gözetimden özgürlük olarak tanımlanır. Kişisel bilgilerin korunması, hukuki sorumluluk ve itibar kaybı gibi olumsuz sonuçları önler.", "cmt_en": "Privacy of space is defined as freedom from surveillance. Protecting personal information prevents negative organizational consequences such as legal liability and loss of reputation."}, {"tr": "Başkaları tarafından kişisel bilgilerin ifşa edilmesinden / Disclosure of personal information by others", "en": "Disclosure of personal information by others", "cmt_tr": "Bilgi gizliliği, yalnızca ifşadan değil; kişisel bilgilerin başkaları tarafından toplanması ve kullanılmasından özgürlüğü de kapsar.", "cmt_en": "Privacy of information includes freedom from collection and use as well as disclosure of personal information by others — not just disclosure."}], "correct": "C"}, {"q_tr": "Organizasyonun gizlilik çerçevesi için güvence hizmeti sunma konusunda iç denetim fonksiyonu ayrıca ne yapar?", "q_en": "With regard to providing an assurance service for the organization's privacy framework, the internal audit function also", "options": [{"tr": "İlgili yargı bölgelerindeki uygulamaları değerlendirir / Considers practices in relevant jurisdictions", "en": "Considers practices in relevant jurisdictions", "cmt_tr": "İç denetim fonksiyonu, risk tanımlamasının ve bu riskleri azaltan kontrollerin yeterliliğini değerlendirir. Ayrıca ilgili yargı bölgelerindeki yasalar, hukuk danışmanının tavsiyeleri ve BT uzmanlarının güvenlik çalışmaları da göz önünde bulundurulur.", "cmt_en": "The internal audit function assesses the adequacy of management's risk identification and the controls that reduce those risks. It also considers laws and practices in relevant jurisdictions, advice of legal counsel, and security efforts of IT specialists."}, {"tr": "Yönetim kuruluna bilgi güvenliğinin iç denetim fonksiyonunun sorumluluğu olduğunu teyit eder / Confirms to the board that information security is the internal audit function's responsibility", "en": "Confirms to the board that information security is the internal audit function's responsibility", "cmt_tr": "Bilgi güvenilirliği ve bütünlüğü, iç denetim değil; yönetimin sorumluluğudur.", "cmt_en": "Information reliability and integrity is management's responsibility — not the internal audit function's responsibility."}, {"tr": "Bilgi güvenliği protokolleri hakkında tavsiye sunmak için danışmanlık hizmeti gerçekleştirir / Performs an advisory engagement to provide advice on information security protocols", "en": "Performs an advisory engagement to provide advice on information security protocols", "cmt_tr": "Bilgi güvenliği denetimi, iç denetçiler tarafından sunulan güvence hizmetlerinin bir genişlemesidir; danışmanlık hizmeti, güvence hizmetinin bir parçası değildir.", "cmt_en": "Information security auditing is an expansion of the assurance services performed by auditors. An advisory service is not part of an assurance service."}, {"tr": "Kontrolleri tasarlar ve uygular / Devises and implements controls", "en": "Devises and implements controls", "cmt_tr": "İç denetim fonksiyonu, danışmanlık kapasitesinde güvenlik sorunlarını tanımlayarak kullanıcılar ve sistem güvenlik personeli ile kontrolleri tasarlamak ve uygulamak için çalışabilir; ancak bu, güvence hizmetleri kapsamında değildir.", "cmt_en": "The internal audit function may act in an advisory capacity by identifying security issues and working with users and security personnel to devise and implement controls — but this is advisory, not part of the assurance service itself."}], "correct": "A"}, {"q_tr": "İç denetçilerin bir denetim sırasında elde edilen kişisel tanımlanabilir bilgilerin korunmasını göz önünde bulundurması gerekir. Geçerli yasalar büyük olasılıkla", "q_en": "Internal auditors need to consider protection of personally identifiable information obtained during an audit. Applicable laws most likely", "options": [{"tr": "Bir organizasyonun gizlilik kontrolleri uygulaması için gereksinimler oluşturmaz / Do not establish requirements for an organization to implement privacy controls", "en": "Do not establish requirements for an organization to implement privacy controls", "cmt_tr": "Birçok yargı bölgesinde gizlilik kontrolleri yasal gerekliliktir; dolayısıyla bu ifade yanlıştır.", "cmt_en": "Privacy controls are legal requirements in many jurisdictions — so the statement that they do not establish requirements is incorrect."}, {"tr": "Kişisel bilgilerin toplama sırasında bir amacın açıklanması halinde herhangi bir amaç için kullanılmasına izin verir / Permit personal information to be used for any purpose if disclosure was made at collection", "en": "Permit personal information to be used for any purpose if disclosure was made at collection", "cmt_tr": "Birçok yargı bölgesi, kişisel bilgilerin yalnızca toplama amacıyla kullanılmasını zorunlu kılar; bireyin rızası olmaksızın veya yasal zorunluluk dışında başka amaçlarla kullanılmasını yasaklar.", "cmt_en": "Many jurisdictions require organizations to identify the purposes for which personal information is collected and prohibit using it for other purposes without the individual's consent or as required by law."}, {"tr": "Bazı durumlarda kişisel bilgilerin katılım kayıtlarına kaydedilmesini yasaklayabilir / May prohibit recording personal information in engagement records in some cases", "en": "May prohibit recording personal information in engagement records in some cases", "cmt_tr": "Belirli katılımlarda kişisel bilgilere erişmek, incelemek veya kullanmak uygunsuz ya da yasadışı olabilir. Denetçi, kişisel bilgileri katılım kayıtlarına bazı durumlarda kaydedemeyebilir.", "cmt_en": "Accessing or using personal information in conducting certain engagements may be inappropriate or illegal. The internal auditor may not be able to record personal information in engagement records in some situations."}, {"tr": "Dijital ortamda kaydedildiğinde ve saklandığında kişisel bilgilerin şifrelenmesini gerektirir / Require personal information to be encrypted when recorded and stored in digital form", "en": "Require personal information to be encrypted when recorded and stored in digital form", "cmt_tr": "Güvenlik düzenlemelerinin faydaları maliyetleri aşmalıdır. Şifreleme pahalı olabilir; erişim kontrolleri gibi diğer yöntemler, değerlendirilen riske göre daha uygun olabilir.", "cmt_en": "Benefits of security arrangements should exceed costs. Encryption is expensive; other methods such as access controls may be more appropriate relative to the assessed risk."}], "correct": "C"}, {"q_tr": "Bir iç denetçi, organizasyonun veri gizliliği düzenlemelerine uyumunu değerlendiriyor ve müşteri verilerinin yeterli şifreleme olmadan saklandığını buluyor. Bu zafiyetten en çok hangi risk alanı etkilenir?", "q_en": "An internal auditor evaluating compliance with data privacy regulations finds that customer data are stored without sufficient encryption. What area of risk management is most likely to be affected?", "options": [{"tr": "İtibar riski / Reputation risk", "en": "Reputation risk", "cmt_tr": "Yeterli şifreleme olmadan müşteri verilerinin saklanması, itibar riskini açığa çıkarır. Bir veri ihlali yaşanması halinde kamuoyu güvensizliği ve marka/imaj hasarı ortaya çıkabilir.", "cmt_en": "Failure to adequately protect customer data with encryption exposes the organization to reputation risk — if a data breach occurs, it can result in public distrust and damage to the organization's brand and image."}, {"tr": "Operasyonel risk / Operational risk", "en": "Operational risk", "cmt_tr": "Operasyonel süreçler etkilenebilir; ancak birincil sorun kamuoyu algısıyla ilgilidir.", "cmt_en": "Although operational processes could be affected, the primary issue relates to public perception and reputation — not operational risk."}, {"tr": "Finansal risk / Financial risk", "en": "Financial risk", "cmt_tr": "Mali cezalar ortaya çıkabilir; ancak itibar hasarı, güven kaybıyla daha doğrudan bağlantılıdır.", "cmt_en": "Although financial penalties might result from the data breach, reputation damage is more directly linked to the loss of consumer trust."}, {"tr": "Stratejik risk / Strategic risk", "en": "Strategic risk", "cmt_tr": "Stratejik hedefler uzun vadede etkilenebilir; ancak anlık etki itibar riskiyle ilgilidir.", "cmt_en": "Strategic objectives might be affected in the long term, but the immediate and most direct effect is reputational — not strategic risk."}], "correct": "A"}], "SU6 - Performance Audits": [{"q_tr": "Dengeli puan kartı kullanan bir organizasyon, yönetici performansını nasıl değerlendirir?", "q_en": "Using a balanced scorecard, an organization evaluates managerial performance based on", "options": [{"tr": "Artık gelir gibi tek bir nihai operasyon sonucu ölçüsü / A single ultimate measure of operating results, such as residual income", "en": "A single ultimate measure of operating results, such as residual income", "cmt_tr": "Tek bir nihai ölçüm kullanmak, dengeli puan kartı yaklaşımıyla çelişir; bu yaklaşım çoklu ölçütler kullanır.", "cmt_en": "Using a single ultimate measure contradicts the balanced scorecard approach, which uses multiple measures."}, {"tr": "Çoklu finansal ve finansal olmayan ölçütler / Multiple financial and nonfinancial measures", "en": "Multiple financial and nonfinancial measures", "cmt_tr": "Dengeli puan kartı yaklaşımı, birden fazla performans ölçüsü kullanır; böylece bir yöneticinin bazı hedefleri diğerleri pahasına başarıp başarmadığı belirlenebilir. Bu ölçütler finansal veya finansal olmayan nitelikte olabilir.", "cmt_en": "The balanced scorecard uses multiple measures — financial and nonfinancial — to determine whether a manager is achieving certain objectives at the expense of others equally or more important."}, {"tr": "Yalnızca çoklu finansal olmayan ölçütler / Multiple nonfinancial measures only", "en": "Multiple nonfinancial measures only", "cmt_tr": "Dengeli puan kartı yaklaşımı, yalnızca finansal olmayan değil; hem finansal hem de finansal olmayan ölçütler kullanır.", "cmt_en": "The balanced scorecard approach uses both financial and nonfinancial measures — not just nonfinancial ones."}, {"tr": "Yalnızca çoklu finansal ölçütler / Multiple financial measures only", "en": "Multiple financial measures only", "cmt_tr": "Dengeli puan kartı yaklaşımı, yalnızca finansal değil; hem finansal hem de finansal olmayan ölçütler kullanır.", "cmt_en": "The balanced scorecard approach uses both financial and nonfinancial measures — not just financial ones."}], "correct": "B"}, {"q_tr": "Aşağıdaki kriterlerden hangisi, müşteri hizmet grubunun performansını değerlendirmede bir satış departmanı müdürü için en yararlı olacaktır?", "q_en": "Which of the following criteria would be most useful to a sales manager in evaluating the performance of the customer-service group?", "options": [{"tr": "Müşteri her zaman haklıdır / The customer is always right", "en": "The customer is always right", "cmt_tr": "'Müşteri her zaman haklıdır' müşteri odaklılığını ifade eder; ancak sayısallaştırılması güçtür ve performansı doğru ölçmek için yeterince belirgin değildir.", "cmt_en": "Customer orientation is difficult to quantify — 'the customer is always right' is not specific or measurable enough to accurately evaluate performance."}, {"tr": "Müşteri şikayetleri hızla işleme alınmalıdır / Customer complaints should be processed promptly", "en": "Customer complaints should be processed promptly", "cmt_tr": "'Müşteri şikayetleri hızla işleme alınmalıdır' ifadesi belirsizdir; 'hızla' ne kadar süre olduğunu tanımlamaz.", "cmt_en": "The standard 'customer complaints should be processed promptly' is vague — it does not define what 'promptly' means and therefore cannot measure performance accurately."}, {"tr": "Çalışanlar müşterilerle ilgilenirken olumlu tutum sergilemelidir / Employees should maintain a positive attitude when dealing with customers", "en": "Employees should maintain a positive attitude when dealing with customers", "cmt_tr": "Çalışanların 'olumlu tutum' sergilemesi gerektiği ifadesi, olumlu tutumun ölçüm yöntemini belirtmez; sübjektif ve belirsizdir.", "cmt_en": "No measure of a 'positive attitude' has been specified for the employee — this standard is subjective and does not permit accurate measurement of performance."}, {"tr": "Tüm müşteri sorguları alındıktan 7 gün içinde yanıtlanmalıdır / All customer inquiries should be answered within 7 days of receipt", "en": "All customer inquiries should be answered within 7 days of receipt", "cmt_tr": "Tüm müşteri sorgularının alındıktan 7 gün içinde yanıtlanması gerektiği kriteri, nicel ve belirgindir; belirsizlik, öznellik ve kişisel önyargıdan kaçınarak performansı doğru ölçmeye olanak tanır.", "cmt_en": "Requiring all customer inquiries to be answered within 7 days permits accurate measurement of performance — this quantitative and specific standard avoids vagueness, subjectivity, and personal bias."}], "correct": "D"}, {"q_tr": "Dengeli puan kartında hangisi dış tabanlı bir ölçütten ziyade dahili bir süreç ölçüsüdür?", "q_en": "On a balanced scorecard, which is more of an internal process measure than an external-based measure?", "options": [{"tr": "Döngü süresi / Cycle time", "en": "Cycle time", "cmt_tr": "Döngü süresi, bir siparişi tamamlamak için gereken üretim süresidir. Bu nedenle dahili süreçlerle doğrudan ilgilidir; dış faktörlerle değil.", "cmt_en": "Cycle time is the manufacturing time to complete an order — it relates strictly to internal processes and is not dependent on external factors."}, {"tr": "Karlılık / Profitability", "en": "Profitability", "cmt_tr": "Karlılık, iç ve dış faktörlerin bir kombinasyonunu içerir; dolayısıyla salt dahili bir süreç ölçüsü değildir.", "cmt_en": "Profitability is a combination of internal and external considerations — it is not a purely internal process measure."}, {"tr": "Müşteri memnuniyeti / Customer satisfaction", "en": "Customer satisfaction", "cmt_tr": "Müşteri memnuniyeti, müşterilerin ürün veya hizmeti nasıl algıladığıyla ilgilidir; dış faktörleri içerir.", "cmt_en": "Customer satisfaction relates to how customers perceive a product and therefore includes external considerations — it is not a purely internal measure."}, {"tr": "Pazar payı / Market share", "en": "Market share", "cmt_tr": "Pazar payı, rakiplerin tepkisiyle ilgilidir; dış faktörleri içerir.", "cmt_en": "Market share relates to how competitors react and market conditions — it includes external considerations and is not a purely internal measure."}], "correct": "A"}, {"q_tr": "Bir denetçi, organizasyonun performans puan kartı geliştirme planını gözden geçiriyor. Denetçi, hangisinin puan kartından çıkarılmasını önermeli?", "q_en": "An auditor is reviewing an organization's plan for developing a performance scorecard. Which potential performance measure should the auditor recommend excluding?", "options": [{"tr": "Tedarikçilerin pazarlık gücü / Bargaining power of suppliers", "en": "Bargaining power of suppliers", "cmt_tr": "Tedarikçilerin pazarlık gücü, organizasyona özgü bir performans ölçüsü değildir; organizasyonun dışında kalan harici bir faktördür.", "cmt_en": "Bargaining power of suppliers is a factor external to the organization — it is not a performance measure that belongs on a scorecard designed to evaluate management's performance."}, {"tr": "Pazar payı / Market share", "en": "Market share", "cmt_tr": "Pazar payındaki temel sonuçlar, organizasyonun rekabetçi konumundaki değişiklikleri izler; performans puan kartında yer alması uygun bir ölçüttür.", "cmt_en": "Key results in market share track changes in the organization's competitive position — it is an appropriate and common measure on a performance scorecard."}, {"tr": "Müşteri memnuniyeti / Customer satisfaction", "en": "Customer satisfaction", "cmt_tr": "Müşteri memnuniyetindeki temel sonuçlar, gelecekteki satışları öngörmeye yardımcı olur; performans puan kartında yer alması uygun bir ölçüttür.", "cmt_en": "Key results in customer satisfaction help predict future sales — it is an appropriate measure on a performance scorecard."}, {"tr": "Çalışan gelişimi / Employee development", "en": "Employee development", "cmt_tr": "Çalışan gelişimindeki temel sonuçlar, nitelikli çalışanları çekme ve elde tutma kapasitesini öngörmeye yardımcı olur; performans puan kartında yer alması uygun bir ölçüttür.", "cmt_en": "Key results in employee development help predict the ability to attract and retain good employees — it is an appropriate measure on a performance scorecard."}], "correct": "A"}, {"q_tr": "Dengeli puan kartında hangisi müşteri memnuniyet ölçüsü değildir?", "q_en": "On a balanced scorecard, which of the following is NOT a customer satisfaction measure?", "options": [{"tr": "Pazar payı / Market share", "en": "Market share", "cmt_tr": "Pazar payı, müşteri memnuniyetinin makro düzey bir ölçüsüdür.", "cmt_en": "Market share is a macro-level measurement of customer satisfaction — it reflects how well the organization is serving its target customers relative to competitors."}, {"tr": "Ekonomik katma değer (EKD) / Economic value added (EVA)", "en": "Economic value added (EVA)", "cmt_tr": "Ekonomik katma değer (EKD), bir karlılık (finansal) ölçüsüdür; müşteri memnuniyet ölçüsü değildir.", "cmt_en": "Economic value added (EVA) is a profitability (financial) measure — it is not a customer satisfaction measure on the balanced scorecard."}, {"tr": "Yanıt süresi / Response time", "en": "Response time", "cmt_tr": "Yanıt süresi, müşterilerin genel memnuniyetini etkileyen kritik bir hizmet faktörü olabilir.", "cmt_en": "Response time can be a critical service factor in customers' overall satisfaction — it is an appropriate customer satisfaction measure."}, {"tr": "Müşteri tutma / Customer retention", "en": "Customer retention", "cmt_tr": "Müşteri tutma, bir organizasyonun başarısının nihai göstergesidir ve müşteri memnuniyet ölçüsü olarak yer alır.", "cmt_en": "Customer retention is an ultimate indicator of an entity's success and is an appropriate customer satisfaction measure on the balanced scorecard."}], "correct": "B"}, {"q_tr": "Bir performans denetimi katılımı tipik olarak neyi içerir?", "q_en": "A performance audit engagement typically involves", "options": [{"tr": "Çeşitli muhasebe uygulamalarının uygunluğu dahil finansal tablo bilgilerinin gözden geçirilmesi / Review of financial statement information, including the appropriateness of various accounting treatments", "en": "Review of financial statement information, including the appropriateness of various accounting treatments", "cmt_tr": "Finansal katılımlar, finansal bilgilerin incelenmesini içerir; performans denetimi finansal tablo incelemesini kapsamaz.", "cmt_en": "Financial engagements involve review of financial information — performance audits do not focus on reviewing financial statement information."}, {"tr": "Politikalar, prosedürler, yasalar ve yönetmeliklere uyum testleri / Tests of compliance with policies, procedures, laws, and regulations", "en": "Tests of compliance with policies, procedures, laws, and regulations", "cmt_tr": "Uyumluluk katılımları, kontrol prosedürlerini ve bunlara uyumu inceler; performans denetimi değil.", "cmt_en": "Compliance engagements involve examining control procedures and compliance with them — this describes compliance, not performance audits."}, {"tr": "Organizasyonun başarısına temel olan kilit bileşenlerinin stratejik analizi / A strategic analysis of the organization's key components that are essential to success", "en": "A strategic analysis of the organization's key components that are essential to success", "cmt_tr": "Performans denetimi katılımları, dengeli puan kartları, SWOT analizi ve yönetim kontrol değerlendirmesi kullanılarak iş ve kontrol ortamının yanı sıra belirlenen kriterlere karşı temel performans göstergelerinin incelenmesini kapsar.", "cmt_en": "Performance audit engagements involve review of the business and control environment and key performance indicators against set criteria using balanced scorecards, SWOT analysis, and management control evaluation."}, {"tr": "Yönetim kurulunun organizasyon operasyonlarındaki rolünün değerlendirilmesi / An evaluation of the board of directors' role in the operations of the organization", "en": "An evaluation of the board of directors' role in the operations of the organization", "cmt_tr": "Operasyonel katılımlar, organizasyonel ve departman yapılarının gözden geçirilmesini içerir; performans denetimi değil.", "cmt_en": "Operational engagements involve reviewing organizational and departmental structures — this describes operational, not performance audits."}], "correct": "C"}, {"q_tr": "Dahili bir finansal olmayan ölçüt örneği nedir?", "q_en": "For example, an internal nonfinancial measure is", "options": [{"tr": "Pazar payı / Market share", "en": "Market share", "cmt_tr": "Pazar payı, dahili değil; harici bir finansal olmayan ölçüttür.", "cmt_en": "Market share is an external nonfinancial measure — it relates to the organization's position relative to competitors in the marketplace."}, {"tr": "Teslimat performansı / Delivery performance", "en": "Delivery performance", "cmt_tr": "Teslimat performansı, dahili değil; harici bir finansal olmayan ölçüttür; müşterilere ve dış faktörlere bağlıdır.", "cmt_en": "Delivery performance is an external nonfinancial measure — it relates to how the organization serves external customers."}, {"tr": "Müşteri memnuniyeti / Customer satisfaction", "en": "Customer satisfaction", "cmt_tr": "Müşteri memnuniyeti, dahili değil; harici bir finansal olmayan ölçüttür.", "cmt_en": "Customer satisfaction is an external nonfinancial measure — it reflects how external customers perceive the organization's products and services."}, {"tr": "Üretim teslim süresi / Manufacturing lead time", "en": "Manufacturing lead time", "cmt_tr": "Üretim teslim süresi (döngü süresi), dahili bir finansal olmayan ölçüttür. Diğer örnekler: ürün kalitesi ve yeni ürün geliştirme süresi.", "cmt_en": "Manufacturing lead time (cycle time) is an internal nonfinancial measure — other examples include product quality and new product development time."}], "correct": "D"}, {"q_tr": "Organizasyonun sermaye bütçelemesi için karar alma modeli net bugünkü değere, performans değerlendirme modeli ise yıllık bölüm yatırım getirisine dayanmaktadır. Hangisi doğrudur?", "q_en": "An organization uses NPV for capital budgeting but annual divisional ROI for performance evaluation. Which is true?", "options": [{"tr": "Bölüm müdürleri karar alma modelindeki ölçütleri maksimize etme eğilimindedir / Divisional managers are likely to maximize the measures in the decision-making model", "en": "Divisional managers are likely to maximize the measures in the decision-making model", "cmt_tr": "Kendi çıkarları, performans değerlendirme modelindeki ölçütleri maksimize etmek için teşvik sağlar; karar alma modelini değil.", "cmt_en": "Self-interest provides an incentive to maximize the measures used in performance evaluation — not the measures in the decision-making model."}, {"tr": "Bölüm müdürleri performans değerlendirme modelindeki ölçütleri maksimize etme eğilimindedir / Divisional managers are likely to maximize the measures in the performance evaluation model", "en": "Divisional managers are likely to maximize the measures in the performance evaluation model", "cmt_tr": "Etkin yönetim kontrolü, performans ölçümü ve geri bildirim gerektirir. Bu süreç yöneticilerin ücretlendirme ve kariyer kararlarını etkiler; dolayısıyla yöneticiler performans değerlendirme modelindeki ölçütleri optimize etmeye motive olur.", "cmt_en": "Effective management control requires performance measurement and feedback. This affects managers' compensation and advancement, motivating them to optimize the measures in the performance evaluation model."}, {"tr": "Yöneticinin başlangıçta net gelir üzerinde olumsuz etkisi olan pozitif NBD'li bir projeyi kabul etme teşviki vardır / The manager has an incentive to accept a project with a positive NPV that initially has a negative effect on net income", "en": "The manager has an incentive to accept a project with a positive NPV that initially has a negative effect on net income", "cmt_tr": "Yıllık yatırım getirisine göre değerlendirilen bir yönetici, kısa vadeli net geliri maksimize etmeye odaklanır; uzun vadeli net bugünkü değeri değil.", "cmt_en": "A manager evaluated on annual ROI has an interest in maximizing short-term net income — not in accepting projects with positive NPV that initially reduce net income."}, {"tr": "Farklı kriterlere sahip modellerin kullanılması hedef uyumunu teşvik eder / The use of models with different criteria promotes goal congruence", "en": "The use of models with different criteria promotes goal congruence", "cmt_tr": "Karar alma ve performans değerlendirme modelleri senkronize edilmelidir; organizasyonun ve yöneticinin hedefleri uyumlu olsun. Farklı kriterler, hedef uyumsuzluğuna yol açar.", "cmt_en": "The models should be synchronized so that organizational and managerial goals are congruent — using models with different criteria promotes goal incongruence, not congruence."}], "correct": "B"}, {"q_tr": "Hangi tür güvence katılımında denetçi organizasyonel hedeflere odaklanmalıdır?", "q_en": "In which type of assurance engagement should an auditor focus on organizational objectives?", "options": [{"tr": "Finansal denetim katılımı / Financial audit engagement", "en": "Financial audit engagement", "cmt_tr": "Finansal denetim katılımı, finansal raporlama hakkında yönetim ve yönetim kuruluna güvence sağlar; organizasyonel hedeflere odaklanmaz.", "cmt_en": "A financial audit engagement provides assurance about financial reporting to management and the board — not focused on organizational objectives."}, {"tr": "Kalite denetimi katılımı / Quality audit engagement", "en": "Quality audit engagement", "cmt_tr": "Kalite denetimi katılımı, onaylanan kalite yapılarının yerinde olduğunu ve kalite süreçlerinin amaçlandığı gibi işlediğini doğrular; organizasyonel hedeflere odaklanmaz.", "cmt_en": "A quality audit engagement provides assurance that the approved quality structures are in place and quality processes are functioning as intended — not specifically focused on organizational objectives."}, {"tr": "Performans denetimi katılımı / Performance audit engagement", "en": "Performance audit engagement", "cmt_tr": "Performans denetimi katılımında denetçiler, temel performans göstergelerine, yani organizasyonel hedeflerin başarılmasına odaklanarak verimli ve maliyet etkin denetimler gerçekleştirir.", "cmt_en": "In a performance audit engagement, auditors perform efficient and cost-effective audits by focusing on achievement of organizational objectives — that is, key performance indicators."}, {"tr": "Operasyonel denetim katılımı / Operational audit engagement", "en": "Operational audit engagement", "cmt_tr": "Operasyonel denetim katılımı, iç denetçilerin organizasyonun operasyonlarının verimlilik ve etkinliğini değerlendirmesine olanak tanır; organizasyonel hedeflere odaklanmaz.", "cmt_en": "An operational audit engagement allows internal auditors to assess the efficiency and effectiveness of an organization's operations — not specifically focused on organizational objectives."}], "correct": "C"}, {"q_tr": "Çalışan devir hızındaki azalmanın ölçümü, dengeli puan kartının hangi kategorisinde raporlanır?", "q_en": "A measurement of the reduction in employee turnover is reported in which of the categories of a balanced scorecard?", "options": [{"tr": "Dahili / Internal", "en": "Internal", "cmt_tr": "Dahili kategori, işi yönlendiren temel süreçlerin ölçütlerini içerir; çalışan devir hızını değil.", "cmt_en": "The internal category includes measures of the key processes that drive the business — not employee turnover reduction."}, {"tr": "Müşteri / Customer", "en": "Customer", "cmt_tr": "Müşteri kategorisi, müşteri ihtiyaçlarını ve memnuniyetini kapsar; çalışan devir hızını değil.", "cmt_en": "The customer category includes customer needs and satisfaction — not employee turnover reduction."}, {"tr": "Finansal / Financial", "en": "Financial", "cmt_tr": "Finansal ölçütler, sahiplere sağlanan nihai sonuçlardır; çalışan devir hızını değil.", "cmt_en": "Financial measures are ultimate results provided to owners — not employee turnover reduction."}, {"tr": "Öğrenme, büyüme ve yenilik / Learning, growth, and innovation", "en": "Learning, growth, and innovation", "cmt_tr": "Çalışan devir hızı, büyük olasılıkla öğrenme, büyüme ve yenilik kategorisine dahil edilir. Bu ölçütler, gelecekteki başarının temelini oluşturur; insanları ve altyapıyı kapsar.", "cmt_en": "Employee turnover is most likely included in the learning, growth, and innovation category — these measures are the basis for future success and include people and infrastructure."}], "correct": "D"}, {"q_tr": "Dengeli puan kartının hangi perspektifi, hedef pazar segmentlerindeki başarıyı inceler?", "q_en": "Which balanced scorecard perspective examines a company's success in targeted market segments?", "options": [{"tr": "Finansal / Financial", "en": "Financial", "cmt_tr": "Finansal perspektif, satışlar, hisse senedi değeri, karlar ve likidite gibi konuları ele alır; hedef pazar segmentlerindeki başarıyı değil.", "cmt_en": "The financial perspective addresses matters such as sales, fair value of the firm's stock, profits, and liquidity — not success in targeted market segments."}, {"tr": "Müşteri / Customer", "en": "Customer", "cmt_tr": "Hedef pazarın herhangi bir yönünü ele alan kritik başarı faktörü, müşteri perspektifine dahil edilir.", "cmt_en": "Any critical success factor that addresses some aspect of the target market is included in the customer perspective of the balanced scorecard."}, {"tr": "Dahili iş süreci / Internal business process", "en": "Internal business process", "cmt_tr": "Dahili iş süreci perspektifi, pazar payını ele almak için uygun yer değildir.", "cmt_en": "The internal business process perspective would not be the appropriate place to address success in targeted market segments such as market share."}, {"tr": "Öğrenme ve büyüme / Learning and growth", "en": "Learning and growth", "cmt_tr": "Öğrenme ve büyüme perspektifi, pazar payını ele almak için uygun yer değildir.", "cmt_en": "The learning and growth perspective would not be the appropriate place to address success in targeted market segments such as market share."}], "correct": "B"}, {"q_tr": "Dengeli puan kartı konseptinde çalışan memnuniyeti ve tutma, hangi perspektif kapsamında kullanılan ölçütlerdir?", "q_en": "Under the balanced scorecard concept, employee satisfaction and retention are measures used under which perspective?", "options": [{"tr": "Müşteri / Customer", "en": "Customer", "cmt_tr": "Çalışan memnuniyeti ve tutma, müşteri perspektifiyle ilgili değildir.", "cmt_en": "Employee satisfaction and retention does not relate to the customer perspective of the balanced scorecard."}, {"tr": "Dahili iş / Internal business", "en": "Internal business", "cmt_tr": "Çalışan memnuniyeti ve tutma, dahili iş perspektifiyle ilgili değildir.", "cmt_en": "Employee satisfaction and retention does not relate to the internal business perspective of the balanced scorecard."}, {"tr": "Öğrenme ve büyüme / Learning and growth", "en": "Learning and growth", "cmt_tr": "Çalışan memnuniyeti ve tutma düzeyi, öğrenme ve büyüme perspektifiyle doğrudan ilgilidir.", "cmt_en": "The level of employee satisfaction and retention directly relates to the learning and growth perspective of the balanced scorecard."}, {"tr": "Finansal / Financial", "en": "Financial", "cmt_tr": "Çalışan memnuniyeti ve tutma, finansal perspektifle ilgili değildir.", "cmt_en": "Employee satisfaction and retention does not relate to the financial perspective of the balanced scorecard."}], "correct": "C"}, {"q_tr": "Aşağıdakilerden hangisi dengeli puan kartının dört perspektifinden biridir?", "q_en": "Which of the following is one of the four perspectives of a balanced scorecard?", "options": [{"tr": "Tam zamanında üretim / Just in time", "en": "Just in time", "cmt_tr": "Tam zamanında üretim, envanter yönetimi için bir yöntemdir; dengeli puan kartının dört perspektifinden biri değildir.", "cmt_en": "Just in time is a method for managing inventory — it is not one of the four perspectives of the balanced scorecard."}, {"tr": "Yenilik / Innovation", "en": "Innovation", "cmt_tr": "Dengeli puan kartı, şirketin performansını ölçütlerle ilişkilendirir. Kritik başarı faktörleri dört perspektife atanır: finansal, müşteri memnuniyeti, dahili iş süreçleri ve öğrenme ile büyüme. Yenilik, öğrenme ve büyüme perspektifinin bir yönüdür.", "cmt_en": "The balanced scorecard connects the firm's critical success factors with performance measures across four perspectives: financial, customer satisfaction, internal business processes, and learning and growth. Innovation is a facet of the learning and growth perspective."}, {"tr": "Kıyaslama / Benchmarking", "en": "Benchmarking", "cmt_tr": "Kıyaslama, kalite yönetiminde kullanılan bir araçtır; dengeli puan kartının dört perspektifinden biri değildir.", "cmt_en": "Benchmarking is a tool used in quality management involving analysis and measurement of key outputs against best organizations — it is not one of the four perspectives of the balanced scorecard."}, {"tr": "Faaliyet tabanlı maliyetleme / Activity-based costing", "en": "Activity-based costing", "cmt_tr": "Faaliyet tabanlı maliyetleme, ürünlere maliyetleri dağıtmak için kullanılan bir yöntemdir; dengeli puan kartının dört perspektifinden biri değildir.", "cmt_en": "Activity-based costing is a method used to allocate costs to products — it is not one of the four perspectives of the balanced scorecard."}], "correct": "B"}, {"q_tr": "Dengeli puan kartında hangisi bir finansal başarı ölçüsüdür?", "q_en": "Which of the following is a financial measure of success in a balanced scorecard?", "options": [{"tr": "Pazar payı / Market share", "en": "Market share", "cmt_tr": "Pazar payı, finansal değil; finansal olmayan bir başarı ölçüsüdür.", "cmt_en": "Market share is a nonfinancial measure of success — it reflects competitive positioning, not financial results directly."}, {"tr": "Satış büyümesi / Sales growth", "en": "Sales growth", "cmt_tr": "Satış büyümesi, satışların kritik başarı faktörü kapsamında finansal bir başarı ölçüsüdür.", "cmt_en": "Sales growth is a financial measure of success under the critical success factor of sales."}, {"tr": "Döngü süresi / Cycle time", "en": "Cycle time", "cmt_tr": "Döngü süresi, finansal değil; finansal olmayan bir başarı ölçüsüdür.", "cmt_en": "Cycle time is a nonfinancial measure of success — it relates to internal process efficiency, not financial outcomes."}, {"tr": "Personel morali / Staff morale", "en": "Staff morale", "cmt_tr": "Personel morali, kritik bir başarı faktörüdür; ancak finansal değil, finansal olmayan bir ölçümdür.", "cmt_en": "Staff morale is a critical success factor but is a nonfinancial measurement — it relates to the learning and growth perspective."}], "correct": "B"}, {"q_tr": "Hangi performans ölçüm türü finansal performansı, dahili operasyonları, öğrenme ve büyümeyi ve müşteri memnuniyetini entegre eder?", "q_en": "Which type of performance measures integrates financial performance, internal operations, learning and growth, and customer satisfaction?", "options": [{"tr": "Toplam verimlilik / Total productivity", "en": "Total productivity", "cmt_tr": "Toplam verimlilik yalnızca verimlilik düzeyini ölçer; dört perspektifi entegre etmez.", "cmt_en": "Total productivity only measures the productivity level — it does not integrate all four perspectives of financial performance, internal operations, learning and growth, and customer satisfaction."}, {"tr": "Finansal oran analizi / Financial ratio analysis", "en": "Financial ratio analysis", "cmt_tr": "Finansal oran analizi, şirket performansını ölçmek için kullanılır; ancak dört perspektifi entegre etmez.", "cmt_en": "Financial ratio analysis is used to measure company performance — but it does not integrate all four balanced scorecard perspectives."}, {"tr": "Dengeli puan kartı / Balanced scorecard", "en": "Balanced scorecard", "cmt_tr": "Tipik bir dengeli puan kartı, hedefleri dört perspektiften birine sınıflandırır: finansal, müşteri memnuniyeti, dahili iş süreçleri ve öğrenme ile büyüme.", "cmt_en": "A typical balanced scorecard classifies objectives into one of four perspectives: financial, customer satisfaction, internal business processes, and learning and growth — integrating all four dimensions."}, {"tr": "Kıyaslama / Benchmarking", "en": "Benchmarking", "cmt_tr": "Kıyaslama, kalite yönetiminde kullanılan ve kilit çıktıları en iyi organizasyonlarla karşılaştıran bir araçtır; dört perspektifi entegre etmez.", "cmt_en": "Benchmarking is a tool used in quality management that involves analysis and measurement of key outputs against best organizations — it does not integrate the four balanced scorecard perspectives."}], "correct": "C"}, {"q_tr": "Dengeli puan kart konseptinde kritik başarı faktörlerinin ortak gruplandığı dört perspektiften biri değildir?", "q_en": "The balanced scorecard provides an action plan for competitive success. Which is NOT one of the perspectives on the business?", "options": [{"tr": "Rakip iş stratejileri / Competitor business strategies", "en": "Competitor business strategies", "cmt_tr": "Rakip iş stratejileri, dengeli puan kartının dört perspektifinden biri değildir. Tipik dengeli puan kartı: finansal, müşteri memnuniyeti, dahili iş süreçleri ve öğrenme ile büyüme perspektiflerinden oluşur.", "cmt_en": "Competitor business strategies is not one of the four perspectives of the balanced scorecard. A typical balanced scorecard classifies critical success factors into: financial, customer satisfaction, internal business processes, and learning and growth."}, {"tr": "Finansal performans / Financial performance", "en": "Financial performance", "cmt_tr": "Finansal performans ölçütleri, tipik bir dengeli puan kartının araçları arasındadır.", "cmt_en": "Financial performance measures are among the tools used in a typical balanced scorecard — it is a valid perspective."}, {"tr": "Dahili iş süreçleri / Internal business processes", "en": "Internal business processes", "cmt_tr": "Dahili iş süreçleri, dengeli puan kartının dört perspektifinden biridir.", "cmt_en": "Internal business processes is one of the four perspectives commonly used in the balanced scorecard — it is a valid perspective."}, {"tr": "Çalışan yeniliği ve öğrenmesi / Employee innovation and learning", "en": "Employee innovation and learning", "cmt_tr": "Çalışan yeniliği ve öğrenmesi, dengeli puan kartının dört perspektifinden biridir.", "cmt_en": "Employee innovation and learning is one of the perspectives on the business commonly used in a balanced scorecard — it is a valid perspective."}], "correct": "A"}, {"q_tr": "Öğrenme ve yenilik ölçütlerinin iki örneği nedir?", "q_en": "Two examples of the learning and innovation measures of a balanced scorecard are", "options": [{"tr": "Çalışan terfi oranı ve çevresel olay sayısı / Employee promotion rate and number of environmental incidents", "en": "Employee promotion rate and number of environmental incidents", "cmt_tr": "Çalışan terfi oranı ve çevresel olay sayısı, öğrenme ve büyüme için uygun ölçütler değildir; çevresel olaylar yönetimin kontrolünde değildir.", "cmt_en": "Employee promotion rate and number of environmental incidents are not appropriate for learning and growth — environmental incidents are outside of management's control and are not an appropriate measure."}, {"tr": "Çalışan eğitim saatleri ve ürün hata oranları / Employee training hours and product defect rates", "en": "Employee training hours and product defect rates", "cmt_tr": "Ürün hata oranları, öğrenme ve büyüme değil; dahili iş süreçleriyle ilgili kalite ölçütleridir.", "cmt_en": "Product defect rates are quality measures related more to internal business processes — not to learning and innovation measures."}, {"tr": "Çalışan öneri sayısı ve çalışan başına günlük bitmiş ürün / Number of employee suggestions and finished products per day per employee", "en": "Number of employee suggestions and finished products per day per employee", "cmt_tr": "Çalışan başına günlük bitmiş ürün sayısı, öğrenme ve yenilik değil; dahili iş süreçleriyle ilgili bir verimlilik ölçütüdür.", "cmt_en": "Finished products per day per employee is a productivity measure related more to internal business processes — not to learning and innovation measures."}, {"tr": "Çalışan devir hızı ve dahili süreç iyileştirme sayısı / Employee turnover rate and number of internal process improvements", "en": "Employee turnover rate and number of internal process improvements", "cmt_tr": "Öğrenme ve büyüme kritik başarı faktörleri; yeni ürün geliştirme, insan kaynakları geliştirme, moral ve iş gücü yetkinliğini kapsar. Çalışan devir hızı ve dahili süreç iyileştirme sayısı, bu perspektif için uygun ölçütlerdir.", "cmt_en": "Learning and growth critical success factors may include new product development, human resource development, morale, and workforce competence. Both employee turnover rates and number of internal process improvements are appropriate measures for this perspective."}], "correct": "D"}, {"q_tr": "Kritik başarı faktörlerinin tanımını en iyi hangi ifade açıklar?", "q_en": "Which one of the following statements best describes the definition of critical success factors?", "options": [{"tr": "Bir şirketin rekabet performansını izleyen finansal ölçütler / Financial measures that track a company's competitive performance", "en": "Financial measures that track a com
