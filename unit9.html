ynı zamanda hissedar olan tek bir kişi tarafından domine edildiğinde.", "en": "Management is dominated by one individual who is also a shareholder.", "cmt_tr": ". COSO iç kontrol modelinde açıklanan kontrol ortamını etkileyen faktörlerden biri yönetimin felsefesi ve yönetim tarzıdır. Yönetimin finansal raporlamaya yönelik tutum ve eylemleri ile bütçe, kâr ve diğer hedeflere ulaşmaya verdiği önem gibi özellikler, özellikle yönetim bir veya birkaç kişi tarafından domine edildiğinde kontrol ortamı üzerinde önemli bir etkiye sahiptir. Belirli performans hedeflerine ulaşmak için teşvik veya baskılar olduğunda, denetçi hile olasılığına ilişkin endişesini artırmalıdır.", "cmt_en": ". Management’s philosophy and operating style is one factor affecting the control environment as described in the COSO model for internal control. Such characteristics as management’s attitudes and actions toward financial reporting and its emphasis on meeting budget, profit, and other goals have a significant influence on the control environment, especially when management is dominated by one or a few individuals. When incentives or pressures are present to achieve certain performance goals, the auditor should heighten his or her concern about the possibility of fraud."}, {"tr": "İç denetçilerin yönetim kuruluna ve kuruluş yönetimine doğrudan erişimi olduğunda.", "en": "Internal auditors have direct access to the board of directors and entity management.", "cmt_tr": ". Etkili bir iç denetim fonksiyonu, belirli yönetim tutumlarıyla ilişkili riskleri azaltmaya hizmet eder.", "cmt_en": ". An effective internal audit function serves to mitigate the risks associated with certain management attitudes."}], "answer": 2}, {"q_tr": "Bir restoran zincirinin 680'den fazla restoranı vardır. Her restoran için tüm yemek siparişleri, yemek garsonları tarafından verilen tüm siparişleri kaydeden ve siparişi hazırlanmak üzere mutfağa ileten bir elektronik cihaza girilmelidir. Tüm garsonlar kendi siparişlerinin nakit tahsilatından sorumludur ve vardiya sonunda kimlik numaralarına göre sipariş edilen yemeğin satış değerine eşit nakdi teslim etmelidir. Müdür daha sonra gün için alınan nakdi oluşturulan bilgisayarlı yemek sipariş kaydıyla mutabık kılar. Tüm farklar restoran tarafından derhal araştırılır. Kuruluş merkezi, bireysel bir restoranın tüm gelirini kaydetmeyebileceğini ve geçerli nakdi kurumsal merkeze iletmeyebileceğini belirlemek için izleme kontrolleri oluşturmuştur. Aşağıdakilerden hangisi en iyi izleme faaliyeti örneğidir?", "q_en": "A restaurant chain has over 680 restaurants. All food orders for each restaurant are required to be entered into an electronic device that records all food orders by food servers and transmits the order to the kitchen for preparation. All food servers are responsible for collecting cash for all their orders and must turn in cash at the end of their shift equal to the sales value of food ordered for their I.D. number. The manager then reconciles the cash received for the day with the computerized record of food orders generated. All differences are investigated immediately by the restaurant. Organizational headquarters has established monitoring controls to determine when an individual restaurant might not be recording all its revenue and transmitting the applicable cash to the corporate headquarters. Which one of the following is the best example of a monitoring activity?", "options": [{"tr": "Restoran müdürü alınan nakdi bilgisayarda kaydedilen yemek siparişleriyle mutabık kılar.", "en": "The restaurant manager reconciles the cash received with the food orders recorded on the computer.", "cmt_tr": ". Müdürün faaliyeti, mağaza düzeyinde uygulanan bir mutabakat kontrolü örneğidir. İzleme, diğer kontrollerin etkin bir şekilde çalışıp çalışmadığını belirleyen genel bir kontroldür.", "cmt_en": ". The manager’s activity is an example of a reconciliation control applied at the store level. Monitoring is an overall control that determines whether other controls are operating effectively."}, {"tr": "Tüm yemek siparişleri bilgisayara girilmelidir ve garsonlar ile aşçılar arasında görev ayrılığı korunur.", "en": "All food orders must be entered on the computer, and segregation of duties is maintained between the food servers and the cooks.", "cmt_tr": ". Görev bölümü operasyonel bir kontroldür.", "cmt_en": ". The division of duties is an operational control."}, {"tr": "Yönetim mağaza başına ayrıntılı brüt kâr marjı analizi hazırlar ve önemli ölçüde düşük brüt kâr marjı gösteren herhangi bir mağazayı araştırır.", "en": "Management prepares a detailed analysis of gross margin per store and investigates any store that shows a significantly lower gross margin.", "cmt_tr": ". İzleme, iç kontrol kalitesini zaman içinde değerlendiren bir süreçtir. Uygun personel tarafından kontrollerin tasarımının ve işleyişinin değerlendirilmesini ve düzeltici önlem alınmasını içerir. İzleme, sürekli faaliyetler veya ayrı değerlendirmeler yoluyla yapılabilir. Sürekli izleme prosedürleri, kuruluşun normal tekrarlayan faaliyetlerine yerleştirilir ve etkin bir şekilde yerine getirilmeye devam etmelerini sağlamak için düzenli yönetim ve denetim faaliyetlerini içerir. Bu nedenle, brüt kâr marjı verilerinin analizi ve önemli sapmaların araştırılması bir izleme sürecidir.", "cmt_en": ". Monitoring is a process that assesses the quality of internal control over time. It involves assessment by appropriate personnel of the design and operation of controls and the taking of corrective action. Monitoring can be done through ongoing activities or separate evaluations. Ongoing monitoring procedures are built into the normal recurring activities of an entity and include regular management and supervisory activities. Thus, analysis of gross margin data and investigation of significant deviations is a monitoring process."}, {"tr": "Nakit günlük bazda kurumsal merkeze iletilir.", "en": "Cash is transmitted to corporate headquarters on a daily basis.", "cmt_tr": ". Günlük nakit iletimi operasyonel bir kontroldür.", "cmt_en": ". Daily transmission of cash is an operational control."}], "answer": 2}, {"q_tr": "COSO İç Kontrol – Bütünleşik Çerçeve kapsamında, aşağıdaki bileşenlerden hangisi iç kontrollerin etkin bir şekilde çalışmaya devam etmesini sağlamak için tasarlanmıştır?", "q_en": "Within the COSO Internal Control – Integrated Framework, which of the following components is designed to ensure that internal controls continue to operate effectively?", "options": [{"tr": "Kontrol ortamı.", "en": "Control environment.", "cmt_tr": ". Kontrol ortamı kuruluşun tonunu belirler. İç kontrolün diğer tüm bileşenleri için disiplin ve yapı sağlayan temeldir. İç kontrolün süregelen etkinliğinin izlenmesini içermez.", "cmt_en": ". The control environment sets the tone of an organization. It is the foundation for all other components of internal control, providing discipline and structure. It does not involve monitoring the ongoing effectiveness of internal control."}, {"tr": "Risk değerlendirmesi.", "en": "Risk assessment.", "cmt_tr": ". Risk değerlendirmesi, hedeflere ulaşılmasına yönelik ilgili risklerin tanımlanması ve analiz edilmesidir ve risklerin nasıl yönetilmesi gerektiğini belirlemek için bir temel oluşturur.", "cmt_en": ". Risk assessment is the identification and analysis of relevant risks to achievement of the objectives, forming a basis for determining how the risks should be managed."}, {"tr": "Bilgi ve iletişim.", "en": "Information and communication.", "cmt_tr": ". Bilgi ve iletişim, ilgili bilgilerin insanların sorumluluklarını yerine getirmelerine olanak tanıyan bir biçimde ve zaman diliminde tanımlanması, yakalanması ve iletilmesiyle ilgilidir.", "cmt_en": ". Information and communication concerns how pertinent information must be identified, captured, and communicated in a form and time frame that enable people to carry out their responsibilities."}, {"tr": "İzleme.", "en": "Monitoring.", "cmt_tr": ". İzleme, sistemin performans kalitesini zaman içinde değerlendirme sürecidir. İç kontrollerin etkin bir şekilde çalışmaya devam etmesini sağlamak için tasarlanmıştır.", "cmt_en": ". Monitoring is the process of assessing the quality of the system’s performance over time. It is designed to ensure that internal controls continue to operate effectively."}], "answer": 3}, {"q_tr": "COSO iç kontrol çerçevesinde tanımlanan kontrol ortamına aşağıdakilerden hangileri dahildir?", "q_en": "Which of the following are included in the control environment described in the COSO internal control framework?", "options": [{"tr": "Organizasyon yapısı, yönetim felsefesi ve planlama.", "en": "Organizational structure, management philosophy, and planning.", "cmt_tr": ". Planlama kontrol ortamının bir unsuru değildir.", "cmt_en": ". Planning is not an element of the control environment."}, {"tr": "Dürüstlük ve etik değerler, yetki devri ve insan kaynakları politikaları.", "en": "Integrity and ethical values, assignment of authority, and human resource policies.", "cmt_tr": ". Kontrol ortamı aşağıdakileri içeren standartlar, süreçler ve yapılar bütünüdür: 1. Dürüstlük ve etik değerler 2. Personelin yetkinliği 3. Yönetimin felsefesi ve yönetim tarzı 4. Organizasyon yapısı 5. Yetki ve sorumluluk devri 6. İnsan kaynakları politika ve uygulamaları.", "cmt_en": ". The control environment is a set of standards, processes, and structures that includes 1. Integrity and ethical values 2. Competence of personnel 3. Management’s philosophy and operating style 4. Organizational structure 5. Assignment of authority and responsibility 6. Human resource policies and practices"}, {"tr": "Personelin yetkinliği, yedekleme tesisleri, kanunlar ve düzenlemeler.", "en": "Competence of personnel, backup facilities, laws, and regulations.", "cmt_tr": ". Yedekleme tesisleri, kanunlar ve düzenlemeler kontrol ortamının unsurları değildir.", "cmt_en": ". Backup facilities, laws, and regulations are not elements of the control environment."}, {"tr": "Risk değerlendirmesi, sorumluluk devri ve insan kaynakları uygulamaları.", "en": "Risk assessment, assignment of responsibility, and human resource practices.", "cmt_tr": ". Risk değerlendirmesi, iç denetim fonksiyonunun ve belirli görevlerin planlanmasının bir parçasıdır.", "cmt_en": ". Risk assessment is part of planning the internal audit function and specific engagements."}], "answer": 1}, {"q_tr": "COSO çerçevesi iç kontrolü, aşağıdaki kategorilerle ilgili hedeflerin gerçekleştirilmesine ilişkin makul güvence sağlamak üzere tasarlanmış bir süreç olarak ele alır:", "q_en": "The COSO framework treats internal control as a process designed to provide reasonable assurance regarding the achievement of objectives related to", "options": [{"tr": "Operasyonlar.", "en": "Operations.", "cmt_tr": ". COSO çerçevesi ayrıca raporlama ve uyum hedeflerini de belirtir.", "cmt_en": ". The COSO framework also states objectives for reporting and compliance."}, {"tr": "Raporlama.", "en": "Reporting.", "cmt_tr": ". COSO çerçevesi ayrıca operasyonlar ve uyum hedeflerini de belirtir.", "cmt_en": ". The COSO framework also states objectives for operations and compliance."}, {"tr": "Uyum.", "en": "Compliance.", "cmt_tr": ". COSO çerçevesi ayrıca raporlama ve operasyon hedeflerini de belirtir.", "cmt_en": ". The COSO framework also states objectives for reporting and operations."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": ". COSO çerçevesi iç kontrolü, hedeflerin gerçekleştirilmesine ilişkin makul güvence sağlamak üzere tasarlanmış bir süreç olarak ele alır. Hedefler şunlarla ilgilidir: (1) kuruluşun misyonunu gerçekleştirmek için operasyonlar; (2) güvenilir, zamanında ve şeffaf raporlama bilgileri; ve (3) kanun, kural ve düzenlemelere uyum.", "cmt_en": ". The COSO framework treats internal control as a process designed to provide reasonable assurance regarding the achievement of objectives. They relate to (1) operations to achieve the entity’s mission; (2) reporting information that is reliable, timely, and transparent; and (3) compliance with laws, rules, and regulations."}], "answer": 3}, {"q_tr": "Etkinlik ve verimlilik, güvenilirlik ve uyum ile ilgili kontrol hedefleri hangi kontrol çerçevesinin temelini oluşturur?", "q_en": "Control objectives regarding effectiveness and efficiency, reliability, and compliance are the basis of which control framework?", "options": [{"tr": "ITGI.", "en": "ITGI.", "cmt_tr": ". BT Yönetişim Enstitüsü (ITGI), bir BT kontrol çerçevesi olan COBIT'in (Bilgi ve İlgili Teknolojiler için Kontrol Hedefleri) telif hakkına sahip kuruluştur.", "cmt_en": ". IT Governance Institute (ITGI) is the organization that copyrighted COBIT (Control Objectives for Information and Related Technology), which is an IT control framework."}, {"tr": "eSAC.", "en": "eSAC.", "cmt_tr": ". IIA'nın Elektronik Sistemler Güvence ve Kontrolü olan eSAC, bu üç kontrol hedefinin kaynağı değildir.", "cmt_en": ". The IIA’s Electronic Systems Assurance and Control, eSAC, is not the source of these three control objectives."}, {"tr": "COBIT.", "en": "COBIT.", "cmt_tr": ". ITGI'nin Bilgi ve İlgili Teknolojiler için Kontrol Hedefleri olan COBIT, bu üç kontrol hedefinin kaynağı değildir.", "cmt_en": ". COBIT, the ITGI’s Control Objectives for Information and Related Technology, is not the source of these three control objectives."}, {"tr": "COSO.", "en": "COSO.", "cmt_tr": ". ABD'deki en bilinen kontrol çerçevesi muhtemelen COSO'nun İç Kontrol – Bütünleşik Çerçeve'sidir, yaygın olarak COSO iç kontrol çerçevesi olarak adlandırılır. Çerçeve iç kontrolü şöyle tanımlar: Bir kuruluşun yönetim kurulu, yönetimi ve diğer personeli tarafından yürütülen, aşağıdaki kategorilerde hedeflerin gerçekleştirilmesine ilişkin makul güvence sağlamak üzere tasarlanmış bir süreç: • Operasyonların etkinliği ve verimliliği • Finansal raporlamanın güvenilirliği • Geçerli kanun ve düzenlemelere uyum.", "cmt_en": ". Probably the most well-known control framework in the U.S. is COSO’s Internal Control – Integrated Framework, commonly referred to as the COSO internal control framework. The framework defines internal control as A process, effected by an organization’s board of directors, management, and other personnel, designed to provide reasonable assurance regarding the achievement of objectives in the following categories: • Effectiveness and efficiency of operations • Reliability of financial reporting • Compliance with applicable laws and regulations"}], "answer": 3}, {"q_tr": "Bir iç denetçi, bir uyum incelemesi sırasında potansiyel hile faaliyeti keşfettiğinde hangi etik değerlendirmeye öncelik vermelidir?", "q_en": "What ethical consideration should an internal auditor prioritize when discovering potentially fraudulent activity during a compliance review?", "options": [{"tr": "Bulguları derhal dış düzenleyicilere bildirmek.", "en": "Immediately report the findings to external regulators.", "cmt_tr": ". Doğrudan bildirim, iç soruşturmaları tehlikeye atabilir veya gizliliği ihlal edebilir.", "cmt_en": ". Direct reporting could compromise internal investigations or breach confidentiality."}, {"tr": "Açıklama sorumlulukları konusunda rehberlik almak için hukuk danışmanına başvurmak.", "en": "Consult with legal counsel for guidance on disclosure responsibilities.", "cmt_tr": ". Hukuk danışmanına başvurmak, iç denetçinin potansiyel hile faaliyetiyle uğraşırken yasal standartlara ve kurumsal politikalara uymasını sağlar, hem denetçinin sorumluluklarını hem de kuruluşun yasal yükümlülüklerini korur. Bu strateji, denetçileri hassas bilgileri doğru ve etkili bir şekilde ele almaya hazırlar.", "cmt_en": ". Consulting with legal counsel ensures that the internal auditor adheres to legal standards and organizational policies when dealing with potentially fraudulent activity, safeguarding both the auditor’s responsibilities and the organization’s legal obligations. This strategy prepares auditors to handle sensitive information correctly and effectively."}, {"tr": "Olası suç örgütü suçlamalarından kaçınmak için bulguları kamuoyuna açıklamak.", "en": "Publicly disclose the findings to avoid potential racketeering charges.", "cmt_tr": ". Tam olgular yasal olarak doğrulanana kadar kamuya açıklama genellikle uygun değildir.", "cmt_en": ". Public disclosure is generally inappropriate until full facts are confirmed legally."}, {"tr": "Herhangi bir karar vermeden önce meslektaşlardan onay almak.", "en": "Seek confirmation from peers before making any decision.", "cmt_tr": ". Meslektaş onayı doğrulamayı destekler ancak potansiyel hile senaryolarında yasal rehberlikten yoksundur.", "cmt_en": ". Peer confirmation supports validation but lacks legal guidance in potential fraud scenarios."}], "answer": 1}, {"q_tr": "COSO'ya göre, aşağıdakilerden hangisi bir uyum hedefidir?", "q_en": "According to COSO, which of the following is a compliance objective?", "options": [{"tr": "Fazla mesai giderlerini bütçe dahilinde tutmak için yeterli personel kadrosunu sürdürmek.", "en": "To maintain adequate staffing to keep overtime expense within budget.", "cmt_tr": ". Operasyon hedefleri etkinlik ve verimlilikle ilgilidir.", "cmt_en": ". Operations objectives address effectiveness and efficiency."}, {"tr": "Üretim sırasında güvenli bir karbondioksit emisyon seviyesi sürdürmek.", "en": "To maintain a safe level of carbon dioxide emissions during production.", "cmt_tr": ". Uyum hedefleri kanun ve düzenlemelere bağlılıkla ilgilidir. Üretim sırasında güvenli bir karbondioksit emisyon seviyesi sürdürmek bunun bir örneğidir.", "cmt_en": ". Compliance objectives relate to adherence to laws and regulations. Maintaining a safe level of carbon dioxide emissions during production is an example."}, {"tr": "Malzeme fiyat sapmalarını yayınlanmış kılavuzlar dahilinde tutmak.", "en": "To maintain material price variances within published guidelines.", "cmt_tr": ". Operasyon hedefleri etkinlik ve verimlilikle ilgilidir.", "cmt_en": ". Operations objectives address effectiveness and efficiency."}, {"tr": "Genel kabul görmüş muhasebe ilkelerine uygun muhasebe ilkelerini sürdürmek.", "en": "To maintain accounting principles that conform to GAAP.", "cmt_tr": ". Raporlama hedefleri finansal raporlamanın güvenilirliğiyle ilgilidir.", "cmt_en": ". Reporting objectives concern the reliability of financial reporting."}], "answer": 1}, {"q_tr": "Yönetimin kontrol sürdürmedeki bir rolü vardır. Aslında yönetim bazen bir kontroldür. Aşağıdakilerden hangisi bir kontrol olarak yönetsel fonksiyonları içerme olasılığı en yüksek olandır?", "q_en": "Management has a role in the maintenance of control. In fact, management sometimes is a control. Which of the following most likely involves managerial functions as a control?", "options": [{"tr": "Performansın izlenmesi.", "en": "Monitoring performance.", "cmt_tr": ". İzleme iç kontrolün bir bileşenidir. Sistemin performans kalitesini zaman içinde değerlendiren bir süreçtir. Etkin bir şekilde yerine getirilmeye devam etmelerini sağlamak için normal operasyonlara yerleştirilmiş sürekli faaliyetlerden oluşur. Denetim ve diğer olağan yönetim fonksiyonları, dış taraflarla iletişimin değerlendirilmesi ile iç ve dış denetçilerin eylemleri buna örnektir.", "cmt_en": ". Monitoring is a component of the internal control. It is a process that assesses the quality of the system’s performance over time. It consists of ongoing activities built into normal operations to ensure that they continue to be performed effectively. Supervision and other ordinary management functions, consideration of communications with external parties, and the actions of internal and external auditors are examples."}, {"tr": "İç denetim fonksiyonunun beratının yönetim kurulu tarafından onaylanması.", "en": "Board approval of the charter of the internal audit function.", "cmt_tr": ". Yönetim kurulu kuruluşun yönetişim organıdır, yönetimi değil.", "cmt_en": ". The board is the entity’s governing body, not its management."}, {"tr": "Kalite güvence programının sürdürülmesi.", "en": "Maintenance of a quality assurance program.", "cmt_tr": ". Kalite güvence programı bir iç değerlendirme şeklidir. Programın yöneticisi değerlendirilen operasyonlardan bağımsız olmalıdır.", "cmt_en": ". A quality assurance program is a form of internal assessment. The manager of the program should be independent of the operations assessed."}, {"tr": "İç denetim fonksiyonunun kurulması.", "en": "Establishment of an internal audit function.", "cmt_tr": ". İç denetim fonksiyonu gözden geçirilen operasyonlardan bağımsız olmalıdır ve bir yönetsel fonksiyon değildir.", "cmt_en": ". An internal audit function should be independent of the operations reviewed and is not a managerial function."}], "answer": 0}, {"q_tr": "Uluslararası bir kuruluşun üst düzey yöneticisi, şirket bilgilerinin güvenliğinin önemini tüm ekip üyelerine göstermek istiyorsa ne yapmalıdır?", "q_en": "A senior executive of an international organization who wishes to demonstrate the importance of the security of company information to all team members should", "options": [{"tr": "Küresel bir bilgi güvenliği kampanyasına gözle görülür şekilde katılmak.", "en": "Visibly participate in a global information security campaign.", "cmt_tr": ". Yönetim sözleri ve eylemleriyle dürüstlük ve etik değerlere yönelik tutumunu iletir. Bu şekilde yönetim, üst düzeyde tonu belirler. Küresel bir bilgi güvenliği kampanyasına gözle görülür şekilde katılarak, yönetimin şirket bilgilerinin güvenliğine olan bağlılığı tüm ekip üyelerine açıkça görünür.", "cmt_en": ". Through words and actions, management communicates its attitude toward integrity and ethical values. In this way, management sets the tone at the top. By visibly participating in a global information security campaign, management’s commitment to the security of company information is evident to all team members."}, {"tr": "Dış denetim hizmetleri için ek bütçe kaynakları ayırmak.", "en": "Allocate additional budget resources for external audit services.", "cmt_tr": ". Dış denetim hizmetleri için ek kaynak ayırmak, yönetimin taahhüdünü mutlaka göstermez. Kaynakları dış bir tarafa ayırarak yönetim sorumluluktan kaçınmaya çalışıyor olabilir.", "cmt_en": ". Allocating additional resources for external audit services does not necessarily demonstrate a commitment from management. By allocating resources to an external party, management may be trying to avoid responsibility."}, {"tr": "Bilgi güvenliği risk değerlendirmelerini bir personel toplantısında gözden geçirmek ve kabul etmek.", "en": "Review and accept the information security risk assessments in a staff meeting.", "cmt_tr": ". Sunulan bilgileri sadece gözden geçirip kabul ederek yönetim, risk değerlendirme sürecinde aktif bir rol üstlenmiyor.", "cmt_en": ". By simply reviewing and accepting the information provided, management is not taking an active role in the risk assessment process."}, {"tr": "Şirket bülteninde kuruluşun ABD insan kaynakları gizlilik politikalarına atıfta bulunmak.", "en": "Refer to the organization’s U.S. human resources policies on privacy in a company newsletter.", "cmt_tr": ". Belirtilen politikalar bir başlangıç noktasıdır, ancak uygulamada gerçekte ne olduğunu kurumsal kültür belirler. Önemliliği göstermede eylemler, şirket bültenine atıfta bulunmaktan daha etkilidir.", "cmt_en": ". Stated policies are a starting point, but it is the corporate culture that determines what actually happens in practice. Actions are more effective in showing importance than referring to a company newsletter."}], "answer": 0}, {"q_tr": "ABD Menkul Kıymetler ve Borsa Komisyonu tarafından 2002 Sarbanes-Oxley Yasası gereklilikleri kapsamında iç kontrollerin tasarlanması için uygun bir model olarak kabul edilen kontrol çerçevesi hangisidir?", "q_en": "Which of the following control frameworks was acknowledged by the U.S. Securities and Exchan const SHEETS = ["SU1 - Accounting Cycles & Controls", "SU2 - Management Controls", "SU3 - Control Frameworks"];
const SHORT_NAMES = {"SU1 - Accounting Cycles & Controls": "SU1", "SU2 - Management Controls": "SU2", "SU3 - Control Frameworks": "SU3"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit9";
const HISTORY_KEY = LS_KEY + "_history";
const MAX_HISTORY = 5;

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  // Skip chapters with 0 questions (can happen in mistakes modes)
  while (ci < SHEETS.length && QUIZ[SHEETS[ci]].length === 0) { ci++; }
  if (ci >= SHEETS.length) { showOverall(); return; }
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  if (!qs || qs.length === 0 || curQ >= qs.length) { showChapterSummary(); return; }
  const q    = qs[curQ];
  if (!q) { showChapterSummary(); return; }
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  // Save history entry when quiz is fully completed
  if (!MISTAKES_MODE && !HISTORY_MISTAKES_MODE) {
    saveHistory();
  }

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function updateLangBtns(l) {
  document.querySelectorAll('#lang-group .lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
}

function setLang(l) {
  lang = l;
  updateLangBtns(l);
  if(!quizStarted) {
    const desc = document.getElementById("welcome-desc");
    if(desc && desc.dataset[l]) desc.textContent = desc.dataset[l];
    return;
  }
  updateProgress();
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}


// ── MISTAKES MODE ─────────────────────────────────────────────────────────────
const MISTAKES_MODE = new URLSearchParams(window.location.search).get('mode') === 'mistakes';

if (MISTAKES_MODE) {
  (function() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) { window.location.href = window.location.pathname; return; }
      const data = JSON.parse(raw);
      const sa = data.answered || [];
      const sc = data.correctArr || [];

      // Filter QUIZ to only incorrectly answered questions
      let offset = 0;
      let totalMistakes = 0;
      SHEETS.forEach(sname => {
        const orig = QUIZ[sname];
        const keep = [];
        for (let i = 0; i < orig.length; i++) {
          if (sa[offset + i] && !sc[offset + i]) {
            orig[i]._chosen = undefined;
            keep.push(orig[i]);
          }
        }
        offset += orig.length;
        QUIZ[sname] = keep;
        totalMistakes += keep.length;
      });

      if (totalMistakes === 0) { window.location.href = window.location.pathname; return; }

      // Don't overwrite original progress
      saveProgress = function() {};
      clearProgress = function() {};

      // Update UI for mistakes mode
      const appTitle = document.getElementById("app-title");
      if (appTitle) appTitle.textContent += " — Səhvlər";

      const welc = document.getElementById("welcome");
      if (welc) {
        const h1 = welc.querySelector("h1");
        if (h1) h1.innerHTML = `Səhv Suallar<br><span style="color:var(--gold);font-size:.65em">${appTitle ? appTitle.textContent : ''}</span>`;
        const desc = document.getElementById("welcome-desc");
        if (desc) desc.textContent = totalMistakes + (lang === "tr" ? " səhv sual — yenidən işlə" : " wrong answers — retry them");
        // Update stats
        const statsItems = welc.querySelectorAll(".ws-num");
        if (statsItems.length >= 2) {
          statsItems[0].textContent = SHEETS.filter(s => QUIZ[s].length > 0).length;
          statsItems[1].textContent = totalMistakes;
          if (statsItems[2]) statsItems[2].textContent = totalMistakes * 4;
        }
        // Change buttons
        const mainBtn = document.getElementById("btn-main-start");
        if (mainBtn) mainBtn.textContent = lang === "tr" ? "▶ Səhvləri İşlə" : "▶ Retry Mistakes";
        const freshBtn = document.getElementById("btn-fresh-start");
        if (freshBtn) freshBtn.style.display = "none";
      }

      // Override startOrResume to skip loading saved progress (we already filtered)
      const _origStartOrResume = startOrResume;
      startOrResume = function() {
        initState();
        quizStarted = true;
        document.getElementById("welcome").style.display = "none";
        document.getElementById("chapters-scroll").style.display = "";
        document.getElementById("overall-result").className = "";
        buildChapterTabs();
        goToChapter(0);
      };

      // Override goToMenu to go back without ?mode
      goToMenu = function() { window.location.href = "quiz_menu.html"; };

    } catch(e) { console.error("Mistakes mode error:", e); }
  })();
}


// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
  // Render history on welcome screen
  renderHistory();
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
// ── HISTORY SYSTEM ──────────────────────────────────────────────────────────
function saveHistory() {
  try {
    const tc = totalCorrect();
    const ta = totalAnswered();
    const tq = totalQuestions();
    const pct = tq ? Math.round(tc/tq*100) : 0;

    const chapters = SHEETS.map((sname, ci) => {
      const s = getChapterStats(ci);
      return { name: sname, correct: s.c, wrong: s.t - s.c, total: s.total };
    });

    const mistakeIndices = [];
    for (let i = 0; i < answered.length; i++) {
      if (answered[i] && !correctArr[i]) mistakeIndices.push(i);
    }

    const entry = {
      date: new Date().toISOString(),
      correct: tc,
      wrong: ta - tc,
      total: tq,
      pct: pct,
      chapters: chapters,
      mistakeIndices: mistakeIndices
    };

    let history = [];
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) history = JSON.parse(raw);
    } catch(e) {}

    history.unshift(entry);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) { console.error("saveHistory error:", e); }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function renderHistory() {
  const area = document.getElementById("history-area");
  if (!area) return;
  const history = loadHistory();
  if (history.length === 0) { area.innerHTML = ""; return; }

  const circ = 2 * Math.PI * 18;
  const titleText = lang === "tr" ? "Tarixçə" : "History";

  let html = `<div class="history-title">${titleText}</div>`;

  history.forEach((entry, idx) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(lang === "tr" ? "az-AZ" : "en-US", {
      day: "numeric", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    const fill = circ * (1 - entry.pct / 100);
    const ringColor = entry.pct >= 75 ? "var(--correct)" : entry.pct >= 50 ? "var(--gold)" : "var(--wrong)";
    const hasMistakes = entry.mistakeIndices && entry.mistakeIndices.length > 0;
    const mistakeCount = hasMistakes ? entry.mistakeIndices.length : 0;
    const retryLabel = lang === "tr"
      ? `${mistakeCount} səhv — təkrarla`
      : `${mistakeCount} wrong — retry`;

    html += `
      <div class="history-card">
        <div class="hc-ring">
          <svg viewBox="0 0 44 44">
            <circle class="hc-ring-track" cx="22" cy="22" r="18"/>
            <circle class="hc-ring-fill" cx="22" cy="22" r="18"
              stroke="${ringColor}"
              stroke-dasharray="${circ}" stroke-dashoffset="${fill}"/>
          </svg>
          <div class="hc-ring-label">${entry.pct}%</div>
        </div>
        <div class="hc-info">
          <div class="hc-date">${dateStr}</div>
          <div class="hc-stats">
            <span class="hc-correct">✓ ${entry.correct}</span> ·
            <span class="hc-wrong">✗ ${entry.wrong}</span> ·
            ${entry.total} ${lang === "tr" ? "sual" : "Q"}
          </div>
        </div>
        ${hasMistakes ? `<div class="hc-actions">
          <button class="hc-retry-btn" onclick="retryHistoryMistakes(${idx})">
            ${retryLabel}
          </button>
        </div>` : `<div class="hc-actions" style="font-size:11px;color:var(--correct);font-weight:700">✓ ${lang==="tr"?"Mükəmməl":"Perfect"}</div>`}
      </div>`;
  });

  area.innerHTML = html;
}

function retryHistoryMistakes(histIdx) {
  try {
    const history = loadHistory();
    if (!history[histIdx]) return;
    const entry = history[histIdx];
    const mistakeIndices = new Set(entry.mistakeIndices || []);
    if (mistakeIndices.size === 0) return;

    localStorage.setItem(HISTORY_KEY + "_retry", JSON.stringify(entry.mistakeIndices));
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    window.location.href = baseUrl + "?mode=history_mistakes";
  } catch(e) { console.error("retryHistoryMistakes error:", e); }
}

</script>
