cmt_tr": ". Distribution of payroll checks and approval of sales returns are independent functions. People who perform such disparate tasks are unlikely to be able to perpetrate and conceal a fraud. In fact, some organizations use personnel from an independent function to distribute payroll checks.", "cmt_en": ". Distribution of payroll checks and approval of sales returns are independent functions. People who perform such disparate tasks are unlikely to be able to perpetrate and conceal a fraud. In fact, some organizations use personnel from an independent function to distribute payroll checks."}, {"tr": "Posting of amounts from both the cash receipts journal and cash payments journal to the general ledger.", "en": "Posting of amounts from both the cash receipts journal and cash payments journal to the general ledger.", "cmt_tr": ". Posting both ledgers would cause no conflict as long as the individual involved did not have access to the actual cash. If a person has access to records but not the assets, no danger exists of embezzlement without collusion.", "cmt_en": ". Posting both ledgers would cause no conflict as long as the individual involved did not have access to the actual cash. If a person has access to records but not the assets, no danger exists of embezzlement without collusion."}, {"tr": "Recording of cash receipts and preparation of bank reconciliations.", "en": "Recording of cash receipts and preparation of bank reconciliations.", "cmt_tr": ". Recording of cash establishes accountability for assets. The bank reconciliation compares that recorded accountability with actual assets. The recording of cash receipts and preparation of bank reconciliations should therefore be performed by different individuals because the preparer of a reconciliation could conceal a cash shortage. For example, if a cashier both prepares the bank deposit and performs the reconciliation, (s)he could embezzle cash and conceal the theft by falsifying the reconciliation.", "cmt_en": ". Recording of cash establishes accountability for assets. The bank reconciliation compares that recorded accountability with actual assets. The recording of cash receipts and preparation of bank reconciliations should therefore be performed by different individuals because the preparer of a reconciliation could conceal a cash shortage. For example, if a cashier both prepares the bank deposit and performs the reconciliation, (s)he could embezzle cash and conceal the theft by falsifying the reconciliation."}], "answer": 3}, {"q_tr": "Which of the following activities represents both an appropriate human resources department function and a deterrent to payroll fraud?", "q_en": "Which of the following activities represents both an appropriate human resources department function and a deterrent to payroll fraud?", "options": [{"tr": "Distribution of paychecks.", "en": "Distribution of paychecks.", "cmt_tr": ". The chief financial officer should perform the asset custody function regarding payroll.", "cmt_en": ". The chief financial officer should perform the asset custody function regarding payroll."}, {"tr": "Authorization of overtime.", "en": "Authorization of overtime.", "cmt_tr": ". Authorizing overtime is a responsibility of operating management.", "cmt_en": ". Authorizing overtime is a responsibility of operating management."}, {"tr": "Authorization of additions and deletions from the payroll.", "en": "Authorization of additions and deletions from the payroll.", "cmt_tr": ". The payroll department is responsible for assembling payroll information (recordkeeping). The human resources department is responsible for authorizing employee transactions, such as hiring, firing, and changes in pay rates and deductions. Segregating the recording and authorization functions helps prevent fraud.", "cmt_en": ". The payroll department is responsible for assembling payroll information (recordkeeping). The human resources department is responsible for authorizing employee transactions, such as hiring, firing, and changes in pay rates and deductions. Segregating the recording and authorization functions helps prevent fraud."}, {"tr": "Collection and retention of unclaimed paychecks.", "en": "Collection and retention of unclaimed paychecks.", "cmt_tr": ". Unclaimed checks should be in the custody of the chief financial officer until they can be deposited in a special bank account.", "cmt_en": ". Unclaimed checks should be in the custody of the chief financial officer until they can be deposited in a special bank account."}], "answer": 2}, {"q_tr": "An organization has computerized sales and cash receipts journals. The computer programs for these journals have been properly debugged. The internal auditor discovered that the total of the accounts receivable subsidiary accounts differs materially from the accounts receivable control account. This discrepancy could indicate", "q_en": "An organization has computerized sales and cash receipts journals. The computer programs for these journals have been properly debugged. The internal auditor discovered that the total of the accounts receivable subsidiary accounts differs materially from the accounts receivable control account. This discrepancy could indicate", "options": [{"tr": "Credit memoranda being improperly recorded.", "en": "Credit memoranda being improperly recorded.", "cmt_tr": ". Sales returns and allowances require the crediting of accounts receivable. Thus, the recording of unauthorized credit memoranda is one explanation for the discrepancy if sales and cash receipts are properly recorded.", "cmt_en": ". Sales returns and allowances require the crediting of accounts receivable. Thus, the recording of unauthorized credit memoranda is one explanation for the discrepancy if sales and cash receipts are properly recorded."}, {"tr": "Receivables being lapped.", "en": "Receivables being lapped.", "cmt_tr": ". Lapping entails the theft of cash receipts and the use of subsequent receipts to conceal the theft. The effect is to overstate receivables, but no difference between the control total and the total of subsidiary amounts would arise.", "cmt_en": ". Lapping entails the theft of cash receipts and the use of subsequent receipts to conceal the theft. The effect is to overstate receivables, but no difference between the control total and the total of subsidiary amounts would arise."}, {"tr": "Receivables not being properly aged.", "en": "Receivables not being properly aged.", "cmt_tr": ". Aging does not involve accounting entries.", "cmt_en": ". Aging does not involve accounting entries."}, {"tr": "Statements being intercepted prior to mailing.", "en": "Statements being intercepted prior to mailing.", "cmt_tr": ". Interception of customer statements might indicate fraudulent receivables but would not cause the subsidiary ledger discrepancy.", "cmt_en": ". Interception of customer statements might indicate fraudulent receivables but would not cause the subsidiary ledger discrepancy."}], "answer": 0}, {"q_tr": "An internal auditor noted that several shipments were not billed. To prevent recurrence of such nonbilling, the organization should", "q_en": "An internal auditor noted that several shipments were not billed. To prevent recurrence of such nonbilling, the organization should", "options": [{"tr": "Numerically sequence and independently account for all controlling documents (such as packing slips and shipping orders) when sales journal entries are recorded.", "en": "Numerically sequence and independently account for all controlling documents (such as packing slips and shipping orders) when sales journal entries are recorded.", "cmt_tr": ". The sequential numbering of documents provides a standard control over transactions. The numerical sequence should be accounted for by an independent party. A major objective is to detect unrecorded and unauthorized transactions.", "cmt_en": ". The sequential numbering of documents provides a standard control over transactions. The numerical sequence should be accounted for by an independent party. A major objective is to detect unrecorded and unauthorized transactions."}, {"tr": "Undertake a validity check with customers as to orders placed.", "en": "Undertake a validity check with customers as to orders placed.", "cmt_tr": ". This check would not prevent or detect unrecorded and unauthorized transactions.", "cmt_en": ". This check would not prevent or detect unrecorded and unauthorized transactions."}, {"tr": "Release product for shipment only on the basis of credit approval by the credit manager or other authorized person.", "en": "Release product for shipment only on the basis of credit approval by the credit manager or other authorized person.", "cmt_tr": ". Credit approval does not ensure billing.", "cmt_en": ". Credit approval does not ensure billing."}, {"tr": "Undertake periodic tests of gross margin rates by product line and obtain explanations of significant departures from planned rates.", "en": "Undertake periodic tests of gross margin rates by product line and obtain explanations of significant departures from planned rates.", "cmt_tr": ". Testing gross margin rates is an analytical procedure, not a preventive control.", "cmt_en": ". Testing gross margin rates is an analytical procedure, not a preventive control."}], "answer": 0}, {"q_tr": "A preliminary survey of the purchasing function indicates that • Department managers initiate purchase requests that must be approved by the plant superintendent, • Purchase orders are typed by the purchasing department using prenumbered and controlled forms, • Buyers regularly update the official vendor listing as new sources of supply become known, • Rush orders can be placed with a vendor by telephone but must be followed by a written purchase order before delivery can be accepted, and • Vendor invoice payment requests must be accompanied by a purchase order and receiving report. One possible fault of this system is that", "q_en": "A preliminary survey of the purchasing function indicates that • Department managers initiate purchase requests that must be approved by the plant superintendent, • Purchase orders are typed by the purchasing department using prenumbered and controlled forms, • Buyers regularly update the official vendor listing as new sources of supply become known, • Rush orders can be placed with a vendor by telephone but must be followed by a written purchase order before delivery can be accepted, and • Vendor invoice payment requests must be accompanied by a purchase order and receiving report. One possible fault of this system is that", "options": [{"tr": "Purchases could be made from a vendor controlled by a buyer at prices higher than normal.", "en": "Purchases could be made from a vendor controlled by a buyer at prices higher than normal.", "cmt_tr": ". A risk exposure typical of the purchasing function is that purchases may be made from vendors with respect to whom buyers or other employees have a conflict of interest. The result may be excessive prices or amounts, or poor quality of goods and services acquired. Accordingly, additions to the vendor file should be authorized at an appropriate level and not by the buyers. Similarly, bidders’ lists should be approved by supervisory personnel.", "cmt_en": ". A risk exposure typical of the purchasing function is that purchases may be made from vendors with respect to whom buyers or other employees have a conflict of interest. The result may be excessive prices or amounts, or poor quality of goods and services acquired. Accordingly, additions to the vendor file should be authorized at an appropriate level and not by the buyers. Similarly, bidders’ lists should be approved by supervisory personnel."}, {"tr": "Unnecessary supplies can be purchased by department managers.", "en": "Unnecessary supplies can be purchased by department managers.", "cmt_tr": ". The requirement of a written purchase order approved by the plant superintendent is a satisfactory control to prevent unnecessary purchases.", "cmt_en": ". The requirement of a written purchase order approved by the plant superintendent is a satisfactory control to prevent unnecessary purchases."}, {"tr": "Payment can be made for supplies not received.", "en": "Payment can be made for supplies not received.", "cmt_tr": ". Payment is not made without a receiving report.", "cmt_en": ". Payment is not made without a receiving report."}, {"tr": "Payment can be made for supplies received but not ordered by the purchasing department.", "en": "Payment can be made for supplies received but not ordered by the purchasing department.", "cmt_tr": ". Payment requests must be supported by an approved purchase order.", "cmt_en": ". Payment requests must be supported by an approved purchase order."}], "answer": 0}, {"q_tr": "Management is concerned with the potential for unauthorized changes in the payroll. Which of the following is the proper organizational structure to prevent such unauthorized changes?", "q_en": "Management is concerned with the potential for unauthorized changes in the payroll. Which of the following is the proper organizational structure to prevent such unauthorized changes?", "options": [{"tr": "The payroll department maintains and authorizes all changes in the personnel records.", "en": "The payroll department maintains and authorizes all changes in the personnel records.", "cmt_tr": ". The personnel department should be responsible for these functions.", "cmt_en": ". The personnel department should be responsible for these functions."}, {"tr": "The payroll department is supervised by the management of the human resources division.", "en": "The payroll department is supervised by the management of the human resources division.", "cmt_tr": ". The payroll and personnel departments should be independent.", "cmt_en": ". The payroll and personnel departments should be independent."}, {"tr": "The payroll department’s functions are limited to maintaining the payroll records, distributing paychecks, and posting the payroll entries to the general ledger.", "en": "The payroll department’s functions are limited to maintaining the payroll records, distributing paychecks, and posting the payroll entries to the general ledger.", "cmt_tr": ". The payroll department should not post the payroll entries to the general ledger or distribute the paychecks. These functions are the responsibility of the accounting department and the chief financial officer’s office, respectively.", "cmt_en": ". The payroll department should not post the payroll entries to the general ledger or distribute the paychecks. These functions are the responsibility of the accounting department and the chief financial officer’s office, respectively."}, {"tr": "The personnel department authorizes the hiring and pay levels of all employees.", "en": "The personnel department authorizes the hiring and pay levels of all employees.", "cmt_tr": ". The payroll department is responsible for assembling payroll information (recordkeeping). The personnel department is responsible for authorizing and executing employee transactions such as hiring, firing, and changes in pay rates and deductions. Segregating these functions helps prevent fraud. Thus, the payroll for each period should be compared with the active employment files of the personnel department.", "cmt_en": ". The payroll department is responsible for assembling payroll information (recordkeeping). The personnel department is responsible for authorizing and executing employee transactions such as hiring, firing, and changes in pay rates and deductions. Segregating these functions helps prevent fraud. Thus, the payroll for each period should be compared with the active employment files of the personnel department."}], "answer": 3}, {"q_tr": "In a well-designed internal control structure in which the cashier receives remittances from the mail room, the cashier should not", "q_en": "In a well-designed internal control structure in which the cashier receives remittances from the mail room, the cashier should not", "options": [{"tr": "Endorse the checks.", "en": "Endorse the checks.", "cmt_tr": ". It is a part of the custodial function, which is the primary responsibility of a cashier.", "cmt_en": ". It is a part of the custodial function, which is the primary responsibility of a cashier."}, {"tr": "Prepare the bank deposit slip.", "en": "Prepare the bank deposit slip.", "cmt_tr": ". It is a part of the custodial function, which is the primary responsibility of a cashier.", "cmt_en": ". It is a part of the custodial function, which is the primary responsibility of a cashier."}, {"tr": "Deposit remittances daily at a local bank.", "en": "Deposit remittances daily at a local bank.", "cmt_tr": ". It is a part of the custodial function, which is the primary responsibility of a cashier", "cmt_en": ". It is a part of the custodial function, which is the primary responsibility of a cashier"}, {"tr": "Post the receipts to the accounts receivable subsidiary ledger cards.", "en": "Post the receipts to the accounts receivable subsidiary ledger cards.", "cmt_tr": ". The cashier is an assistant to the chief financial officer and thus performs an asset custody function. Individuals with custodial functions should not have access to the accounting records. If the cashier were allowed to post the receipts to the accounts receivable subsidiary ledger, an opportunity for embezzlement would arise that could be concealed by falsifying the books.", "cmt_en": ". The cashier is an assistant to the chief financial officer and thus performs an asset custody function. Individuals with custodial functions should not have access to the accounting records. If the cashier were allowed to post the receipts to the accounts receivable subsidiary ledger, an opportunity for embezzlement would arise that could be concealed by falsifying the books."}], "answer": 3}, {"q_tr": "Which one of the following situations represents an internal control weakness in accounts receivable?", "q_en": "Which one of the following situations represents an internal control weakness in accounts receivable?", "options": [{"tr": "Internal auditors confirm customer accounts periodically.", "en": "Internal auditors confirm customer accounts periodically.", "cmt_tr": ". Periodic confirmation of accounts receivable is an internal control strength.", "cmt_en": ". Periodic confirmation of accounts receivable is an internal control strength."}, {"tr": "Delinquent accounts are reviewed only by the sales manager.", "en": "Delinquent accounts are reviewed only by the sales manager.", "cmt_tr": ". Internal control over accounts receivable begins with a proper segregation of duties. Thus, the cashier, who performs an asset custody function, should not be involved in recordkeeping. Accounts should be periodically confirmed by an auditor, and delinquent accounts should be reviewed by the head of accounts receivable and the credit manager. Customer statements should be mailed monthly by the accounts receivable department without allowing access to the statements by employees of the cashier’s department. The sales manager should not be the only person to review delinquent accounts because (s)he may have an interest in not declaring an account uncollectible.", "cmt_en": ". Internal control over accounts receivable begins with a proper segregation of duties. Thus, the cashier, who performs an asset custody function, should not be involved in recordkeeping. Accounts should be periodically confirmed by an auditor, and delinquent accounts should be reviewed by the head of accounts receivable and the credit manager. Customer statements should be mailed monthly by the accounts receivable department without allowing access to the statements by employees of the cashier’s department. The sales manager should not be the only person to review delinquent accounts because (s)he may have an interest in not declaring an account uncollectible."}, {"tr": "The cashier is denied access to customers’ records and monthly statements.", "en": "The cashier is denied access to customers’ records and monthly statements.", "cmt_tr": ". An employee with asset-custody responsibilities should not have access to records for that asset.", "cmt_en": ". An employee with asset-custody responsibilities should not have access to records for that asset."}, {"tr": "Customers’ statements are mailed monthly by the accounts receivable department.", "en": "Customers’ statements are mailed monthly by the accounts receivable department.", "cmt_tr": ". Monthly account statements give customers an opportunity to complain about incorrect billings or missing payments.", "cmt_en": ". Monthly account statements give customers an opportunity to complain about incorrect billings or missing payments."}], "answer": 1}, {"q_tr": "Which one of the following situations represents a strength of internal control for purchasing and accounts payable?", "q_en": "Which one of the following situations represents a strength of internal control for purchasing and accounts payable?", "options": [{"tr": "Prenumbered receiving reports are issued randomly.", "en": "Prenumbered receiving reports are issued randomly.", "cmt_tr": ". Prenumbered receiving reports should be issued sequentially. A gap in the sequence may indicate an erroneous or fraudulent transaction.", "cmt_en": ". Prenumbered receiving reports should be issued sequentially. A gap in the sequence may indicate an erroneous or fraudulent transaction."}, {"tr": "After vendor invoices are approved for payment, the purchasing department issues payment vouchers.", "en": "After vendor invoices are approved for payment, the purchasing department issues payment vouchers.", "cmt_tr": ". Accounts payable matches an approved vendor invoice with supporting documents (purchase requisition, purchase order, and receiving report). After verification, accounts payable issues a payment voucher, including an unsigned check.", "cmt_en": ". Accounts payable matches an approved vendor invoice with supporting documents (purchase requisition, purchase order, and receiving report). After verification, accounts payable issues a payment voucher, including an unsigned check."}, {"tr": "Unmatched receiving reports are reviewed on an annual basis.", "en": "Unmatched receiving reports are reviewed on an annual basis.", "cmt_tr": ". Annual review of unmatched receiving reports is too infrequent. More frequent attention is necessary to remedy deficiencies in internal control.", "cmt_en": ". Annual review of unmatched receiving reports is too infrequent. More frequent attention is necessary to remedy deficiencies in internal control."}, {"tr": "Vendors’ invoices are matched against purchase orders and receiving reports before a liability is recorded.", "en": "Vendors’ invoices are matched against purchase orders and receiving reports before a liability is recorded.", "cmt_tr": ". A voucher should not be prepared for payment until the vendor’s invoice has been matched against the corresponding purchase order and receiving report. This procedure provides assurance that a valid transaction has occurred and that the parties have agreed on the terms, such as price and quantity.", "cmt_en": ". A voucher should not be prepared for payment until the vendor’s invoice has been matched against the corresponding purchase order and receiving report. This procedure provides assurance that a valid transaction has occurred and that the parties have agreed on the terms, such as price and quantity."}], "answer": 3}, {"q_tr": "To control purchasing and accounts payable, an information system must include certain source documents. For a manufacturing organization, these documents should include", "q_en": "To control purchasing and accounts payable, an information system must include certain source documents. For a manufacturing organization, these documents should include", "options": [{"tr": "Purchase orders, receiving reports, and vendor invoices.", "en": "Purchase orders, receiving reports, and vendor invoices.", "cmt_tr": ". A purchase requisition is also needed.", "cmt_en": ". A purchase requisition is also needed."}, {"tr": "Receiving reports and vendor invoices.", "en": "Receiving reports and vendor invoices.", "cmt_tr": ". A purchase order and requisition are also necessary.", "cmt_en": ". A purchase order and requisition are also necessary."}, {"tr": "Purchase requisitions, purchase orders, receiving reports, and vendor invoices.", "en": "Purchase requisitions, purchase orders, receiving reports, and vendor invoices.", "cmt_tr": ". Before ordering an item, the purchasing department should have on hand a purchase requisition reflecting an authorized request by a user department. Before a voucher is prepared for paying an invoice, the accounts payable department should have the purchase requisition, a purchase order (to be certain the items were indeed ordered), the vendor’s invoice, and a receiving report (to be certain the items were received).", "cmt_en": ". Before ordering an item, the purchasing department should have on hand a purchase requisition reflecting an authorized request by a user department. Before a voucher is prepared for paying an invoice, the accounts payable department should have the purchase requisition, a purchase order (to be certain the items were indeed ordered), the vendor’s invoice, and a receiving report (to be certain the items were received)."}, {"tr": "Purchase requisitions, purchase orders, inventory reports of goods needed, and vendor invoices.", "en": "Purchase requisitions, purchase orders, inventory reports of goods needed, and vendor invoices.", "cmt_tr": ". A receiving report is needed.", "cmt_en": ". A receiving report is needed."}], "answer": 2}, {"q_tr": "Auditors document their understanding of internal control with questionnaires, flowcharts, and narrative descriptions. A questionnaire consists of a series of questions concerning controls that auditors consider necessary to prevent or detect errors and fraud. The most appropriate question designed to contribute to the auditors’ understanding of the completeness of the expenditure (purchases-payables) cycle concerns the", "q_en": "Auditors document their understanding of internal control with questionnaires, flowcharts, and narrative descriptions. A questionnaire consists of a series of questions concerning controls that auditors consider necessary to prevent or detect errors and fraud. The most appropriate question designed to contribute to the auditors’ understanding of the completeness of the expenditure (purchases-payables) cycle concerns the", "options": [{"tr": "Internal verification of quantities, prices, and mathematical accuracy of sales invoices.", "en": "Internal verification of quantities, prices, and mathematical accuracy of sales invoices.", "cmt_tr": ". Determination of proper amounts of sales invoices concerns the valuation assertion. Also, sales invoices are part of the sales-receivables (revenue) cycle.", "cmt_en": ". Determination of proper amounts of sales invoices concerns the valuation assertion. Also, sales invoices are part of the sales-receivables (revenue) cycle."}, {"tr": "Use and accountability of prenumbered checks.", "en": "Use and accountability of prenumbered checks.", "cmt_tr": ". A completeness assertion relates to whether all transactions and accounts that should be presented in the financial statements are so presented. The exclusive use of sequentially numbered documents facilitates control over expenditures. An unexplained gap in the sequence alerts the auditor to the possibility that not all transactions have been recorded. A failure to use prenumbered checks would therefore suggest a higher assessment of control risk. If a company uses prenumbered checks, it should be easy to determine exactly which checks were used during a period.", "cmt_en": ". A completeness assertion relates to whether all transactions and accounts that should be presented in the financial statements are so presented. The exclusive use of sequentially numbered documents facilitates control over expenditures. An unexplained gap in the sequence alerts the auditor to the possibility that not all transactions have been recorded. A failure to use prenumbered checks would therefore suggest a higher assessment of control risk. If a company uses prenumbered checks, it should be easy to determine exactly which checks were used during a period."}, {"tr": "Disposition of cash receipts.", "en": "Disposition of cash receipts.", "cmt_tr": ". Cash receipts are part of the revenue cycle.", "cmt_en": ". Cash receipts are part of the revenue cycle."}, {"tr": "Qualifications of accounting personnel.", "en": "Qualifications of accounting personnel.", "cmt_tr": ". Consideration of the qualifications of accounting personnel is not a test of controls over the completeness of any cycle. This procedure is appropriate during the consideration of the control environment.", "cmt_en": ". Consideration of the qualifications of accounting personnel is not a test of controls over the completeness of any cycle. This procedure is appropriate during the consideration of the control environment."}], "answer": 1}, {"q_tr": "The initiation of the purchase of materials and supplies would be the responsibility of the", "q_en": "The initiation of the purchase of materials and supplies would be the responsibility of the", "options": [{"tr": "Purchasing department.", "en": "Purchasing department.", "cmt_tr": ". The purchasing department places orders that have been initiated and authorized by others.", "cmt_en": ". The purchasing department places orders that have been initiated and authorized by others."}, {"tr": "Stores control department.", "en": "Stores control department.", "cmt_tr": ". The stores control department has custody of materials; it does not maintain inventory records.", "cmt_en": ". The stores control department has custody of materials; it does not maintain inventory records."}, {"tr": "Inventory control department.", "en": "Inventory control department.", "cmt_tr": ". The inventory control department would be responsible for initiating a purchase. It has access to the inventory records and would therefore know when stocks were getting low.", "cmt_en": ". The inventory control department would be responsible for initiating a purchase. It has access to the inventory records and would therefore know when stocks were getting low."}, {"tr": "Production department.", "en": "Production department.", "cmt_tr": ". The production department manufactures goods and obtains materials from stores control.", "cmt_en": ". The production department manufactures goods and obtains materials from stores control."}], "answer": 2}, {"q_tr": "Multiple copies of the purchase order are prepared for recordkeeping and distribution with a copy of the purchase order sent to the vendor and one retained by the purchasing department. In addition, for proper informational flow and internal control purposes, a version of the purchase order would be distributed to the", "q_en": "Multiple copies of the purchase order are prepared for recordkeeping and distribution with a copy of the purchase order sent to the vendor and one retained by the purchasing department. In addition, for proper informational flow and internal control purposes, a version of the purchase order would be distributed to the", "options": [{"tr": "Accounts payable, receiving, and stores control departments.", "en": "Accounts payable, receiving, and stores control departments.", "cmt_tr": ". The stores control department does not need to know that a purchase has been initiated.", "cmt_en": ". The stores control department does not need to know that a purchase has been initiated."}, {"tr": "Accounts payable, receiving, and inventory control departments.", "en": "Accounts payable, receiving, and inventory control departments.", "cmt_tr": ". The accounts payable department should receive a copy of the purchase order for internal control purposes to ensure that all invoices paid are for properly authorized items. The receiving department should receive a copy (with the quantity omitted to encourage an honest count) so that its employees will know that incoming shipments were authorized and should be accepted. In addition, the department issuing the purchasing requisition (the inventory control department) should receive a copy as a notification that the order has been placed.", "cmt_en": ". The accounts payable department should receive a copy of the purchase order for internal control purposes to ensure that all invoices paid are for properly authorized items. The receiving department should receive a copy (with the quantity omitted to encourage an honest count) so that its employees will know that incoming shipments were authorized and should be accepted. In addition, the department issuing the purchasing requisition (the inventory control department) should receive a copy as a notification that the order has been placed."}, {"tr": "Accounts payable, accounts receivable, and receiving departments.", "en": "Accounts payable, accounts receivable, and receiving departments.", "cmt_tr": ". The accounts receivable department does not need a copy.", "cmt_en": ". The accounts receivable department does not need a copy."}, {"tr": "Accounts payable, receiving, and production planning departments.", "en": "Accounts payable, receiving, and production planning departments.", "cmt_tr": ". The production planning department does not need a copy.", "cmt_en": ". The production planning department does not need a copy."}], "answer": 1}, {"q_tr": "Organizational independence in the processing of payroll is achieved by segregation of functions that are built into the system. Which one of the following functional segregations is unnecessary for internal control purposes?", "q_en": "Organizational independence in the processing of payroll is achieved by segregation of functions that are built into the system. Which one of the following functional segregations is unnecessary for internal control purposes?", "options": [{"tr": "Segregation of timekeeping from payroll preparation.", "en": "Segregation of timekeeping from payroll preparation.", "cmt_tr": ". Segregating timekeeping and payroll preparation is an effective control. It prevents one person from claiming that an employee worked certain hours and then writing a check to that employee. Payment to an absent or fictitious employee therefore requires collusion between two employees.", "cmt_en": ". Segregating timekeeping and payroll preparation is an effective control. It prevents one person from claiming that an employee worked certain hours and then writing a check to that employee. Payment to an absent or fictitious employee therefore requires collusion between two employees."}, {"tr": "Segregation of personnel function from payroll preparation.", "en": "Segregation of personnel function from payroll preparation.", "cmt_tr": ". Personnel should be separate from payroll. The former authorizes the calculation of the payroll by the latter.", "cmt_en": ". Personnel should be separate from payroll. The former authorizes the calculation of the payroll by the latter."}, {"tr": "Segregation of payroll preparation and paycheck distribution.", "en": "Segregation of payroll preparation and paycheck distribution.", "cmt_tr": ". Segregating paycheck preparation from distribution makes it more difficult for checks to be made out to fictitious employees.", "cmt_en": ". Segregating paycheck preparation from distribution makes it more difficult for checks to be made out to fictitious employees."}, {"tr": "Segregation of payroll preparation and maintenance of year-to-date records.", "en": "Segregation of payroll preparation and maintenance of year-to-date records.", "cmt_tr": ". Most companies have their payrolls prepared by the same individuals who maintain the year-to- date records. This segregation of functions is unnecessary because both duties involve recordkeeping.", "cmt_en": ". Most companies have their payrolls prepared by the same individuals who maintain the year-to- date records. This segregation of functions is unnecessary because both duties involve recordkeeping."}], "answer": 3}, {"q_tr": "If employee paychecks are distributed by hand to employees, which one of the following departments should be responsible for the safekeeping of unclaimed paychecks?", "q_en": "If employee paychecks are distributed by hand to employees, which one of the following departments should be responsible for the safekeeping of unclaimed paychecks?", "options": [{"tr": "Payroll department.", "en": "Payroll department.", "cmt_tr": ". The payroll department was responsible for causing the check to be written.", "cmt_en": ". The payroll department was responsible for causing the check to be written."}, {"tr": "Timekeeping department.", "en": "Timekeeping department.", "cmt_tr": ". The timekeeping department authorized payment based on a certain number of hours worked.", "cmt_en": ". The timekeeping department authorized payment based on a certain number of hours worked."}, {"tr": "Production department in which the employee works or worked.", "en": "Production department in which the employee works or worked.", "cmt_tr": ". A production supervisor or fellow worker has an opportunity to intercept the check of a fictitious or terminated employee.", "cmt_en": ". A production supervisor or fellow worker has an opportunity to intercept the check of a fictitious or terminated employee."}, {"tr": "Cashier department.", "en": "Cashier department.", "cmt_tr": ". The responsibility for unclaimed paychecks should be given to a department that has no opportunity to authorize or write those checks. Because the treasury function (the cashier department in this case) serves only an asset custody function and thus has had no input into the paycheck process, it is the logical repository of unclaimed checks.", "cmt_en": ". The responsibility for unclaimed paychecks should be given to a department that has no opportunity to authorize or write those checks. Because the treasury function (the cashier department in this case) serves only an asset custody function and thus has had no input into the paycheck process, it is the logical repository of unclaimed checks."}], "answer": 3}, {"q_tr": "Organizational independence is required in the processing of customers’ orders in order to maintain an internal control structure. Which one of the following situations is a violation of the principle of the segregation of duties in the processing of orders from customers?", "q_en": "Organizational independence is required in the processing of customers’ orders in order to maintain an internal control structure. Which one of the following situations is a violation of the principle of the segregation of duties in the processing of orders from customers?", "options": [{"tr": "Approval by credit department of a sales order prepared by the sales department.", "en": "Approval by credit department of a sales order prepared by the sales department.", "cmt_tr": ". Ensuring that a sales order is for a legitimate, creditworthy customer is a function of the credit department.", "cmt_en": ". Ensuring that a sales order is for a legitimate, creditworthy customer is a function of the credit department."}, {"tr": "Shipping of goods by the shipping department that have been retrieved from stock by the finished goods storeroom department.", "en": "Shipping of goods by the shipping department that have been retrieved from stock by the finished goods storeroom department.", "cmt_tr": ". To maintain proper segregation of functions, goods should be pulled by the storeroom department and shipped by the shipping department.", "cmt_en": ". To maintain proper segregation of functions, goods should be pulled by the storeroom department and shipped by the shipping department."}, {"tr": "Invoice preparation by the billing department and posting to customers’ accounts by the accounts receivable department.", "en": "Invoice preparation by the billing department and posting to customers’ accounts by the accounts receivable department.", "cmt_tr": ". Invoice preparation and account updating should be performed by two different departments.", "cmt_en": ". Invoice preparation and account updating should be performed by two different departments."}, {"tr": "Approval by the sales department of a sales credit memo because of a product return with subsequent posting to the customer’s account by the accounts receivable department.", "en": "Approval by the sales department of a sales credit memo because of a product return with subsequent posting to the customer’s account by the accounts receivable department.", "cmt_tr": ". The key controls over sales returns (and allowances) include (1) approval of the return by sales, (2) preparation of a receiving report for receipt of the goods, and (3) separate independent approval of a credit memo (crediting the account of the party returning goods). Allowing a sales department employee to approve a credit memo without a receiving report is unacceptably risky. Sales personnel could overstate sales in one period and then reverse them in subsequent periods. Thus, a copy of the receiving report for returned goods should be sent to billing for preparation of a credit memo after approval by a responsible supervisor who is independent of sales.", "cmt_en": ". The key controls over sales returns (and allowances) include (1) approval of the return by sales, (2) preparation of a receiving report for receipt of the goods, and (3) separate independent approval of a credit memo (crediting the account of the party returning goods). Allowing a sales department employee to approve a credit memo without a receiving report is unacceptably risky. Sales personnel could overstate sales in one period and then reverse them in subsequent periods. Thus, a copy of the receiving report for returned goods should be sent to billing for preparation of a credit memo after approval by a responsible supervisor who is independent of sales."}], "answer": 3}, {"q_tr": "Which of the following control procedures provides the greatest assurance that all donations to a not-for-profit organization are immediately deposited in its account?", "q_en": "Which of the following control procedures provides the greatest assurance that all donations to a not-for-profit organization are immediately deposited in its account?", "options": [{"tr": "Use a lockbox to receive all donations.", "en": "Use a lockbox to receive all donations.", "cmt_tr": ". A lockbox system expedites receipt of funds and provides effective control over cash receipts. Donors send their payments to lockboxes, often in numerous locations, that are checked by a bank several times a day. Thus, payments are deposited before being processed by the organization’s accounting system.", "cmt_en": ". A lockbox system expedites receipt of funds and provides effective control over cash receipts. Donors send their payments to lockboxes, often in numerous locations, that are checked by a bank several times a day. Thus, payments are deposited before being processed by the organization’s accounting system."}, {"tr": "Perform periodic reviews of the organization’s cash receipts by tracing deposits to the original posting in the cash receipts records.", "en": "Perform periodic reviews of the organization’s cash receipts by tracing deposits to the original posting in the cash receipts records.", "cmt_tr": ". Tracing deposits to the original posting in the cash receipts records focuses only on deposits that were made. The concern is that cash receipts might not have been deposited.", "cmt_en": ". Tracing deposits to the original posting in the cash receipts records focuses only on deposits that were made. The concern is that cash receipts might not have been deposited."}, {"tr": "Require that all donations be made by check.", "en": "Require that all donations be made by check.", "cmt_tr": ". The fact that a donation is made by check does not ensure the check is accounted for as a donation rather than a debt or liability. Also, a requirement for all donations to be in the form of a check does not provide assurance that checks will be deposited immediately.", "cmt_en": ". The fact that a donation is made by check does not ensure the check is accounted for as a donation rather than a debt or liability. Also, a requirement for all donations to be in the form of a check does not provide assurance that checks will be deposited immediately."}, {"tr": "Require issuance of a confirmation receipt to all donors, with the receipt issued by the person who opens and deposits the cash receipts.", "en": "Require issuance of a confirmation receipt to all donors, with the receipt issued by the person who opens and deposits the cash receipts.", "cmt_tr": ". The same person should not be responsible for the cash receipts and the confirmations. The person could confirm receipts even if they were diverted.", "cmt_en": ". The same person should not be responsible for the cash receipts and the confirmations. The person could confirm receipts even if they were diverted."}], "answer": 0}, {"q_tr": "Reviewing an edit listing of payroll changes processed during each payroll cycle is most likely to detect", "q_en": "Reviewing an edit listing of payroll changes processed during each payroll cycle is most likely to detect", "options": [{"tr": "Labor hours charged to the wrong account in the cost reporting system.", "en": "Labor hours charged to the wrong account in the cost reporting system.", "cmt_tr": ". Charging labor hours to the wrong account does not involve a change in (edit of) payroll information.", "cmt_en": ". Charging labor hours to the wrong account does not involve a change in (edit of) payroll information."}, {"tr": "Inaccurate payroll deductions.", "en": "Inaccurate payroll deductions.", "cmt_tr": ". Inaccurate payroll deductions do not involve a change in (edit of) payroll information.", "cmt_en": ". Inaccurate payroll deductions do not involve a change in (edit of) payroll information."}, {"tr": "Undetected errors in the payroll rates of new employees.", "en": "Undetected errors in the payroll rates of new employees.", "cmt_tr": ". A category such as new employee should generate a change in payroll information and therefore should be detected.", "cmt_en": ". A category such as new employee should generate a change in payroll information and therefore should be detected."}, {"tr": "A failure to offer employees an opportunity to contribute to their pension plan.", "en": "A failure to offer employees an opportunity to contribute to their pension plan.", "cmt_tr": ". A failure to offer employees an opportunity to contribute to their pension plan does not involve a change in (edit of) payroll information.", "cmt_en": ". A failure to offer employees an opportunity to contribute to their pension plan does not involve a change in (edit of) payroll information."}], "answer": 2}, {"q_tr": "One payroll audit objective is to determine whether the employees received pay in amounts recorded in the payroll journal. To satisfy this objective, the auditor should", "q_en": "One payroll audit objective is to determine whether the employees received pay in amounts recorded in the payroll journal. To satisfy this objective, the auditor should", "options": [{"tr": "Reconcile the payroll bank account.", "en": "Reconcile the payroll bank account.", "cmt_tr": ". Reconciling the payroll bank account should be part of the audit plan for payroll, but it does not test the agreement of amounts received by employees with the payroll journal entries.", "cmt_en": ". Reconciling the payroll bank account should be part of the audit plan for payroll, but it does not test the agreement of amounts received by employees with the payroll journal entries."}, {"tr": "Request that a company official distribute all paychecks.", "en": "Request that a company official distribute all paychecks.", "cmt_tr": ". A company official should distribute all paychecks, but this procedure does not ensure the agreement of amounts received by employees with the payroll journal entries.", "cmt_en": ". A company official should distribute all paychecks, but this procedure does not ensure the agreement of amounts received by employees with the payroll journal entries."}, {"tr": "Determine whether a proper segregation of duties exists between recording payroll and reconciling the payroll bank account.", "en": "Determine whether a proper segregation of duties exists between recording payroll and reconciling the payroll bank account.", "cmt_tr": ". Determining whether a proper segregation of duties exists between recording payroll and reconciling the payroll bank account should be part of the audit plan for payroll, but it does not test the agreement of amounts received by employees with the payroll journal entries.", "cmt_en": ". Determining whether a proper segregation of duties exists between recording payroll and reconciling the payroll bank account should be part of the audit plan for payroll, but it does not test the agreement of amounts received by employees with the payroll journal entries."}, {"tr": "Compare canceled payroll checks with the payroll journal.", "en": "Compare canceled payroll checks with the payroll journal.", "cmt_tr": ". To test the accuracy of the payroll journal, the auditor should vouch a sample of the entries to supporting documents, i.e., the canceled checks, timekeeping information, and records of wage rates and authorized deductions.", "cmt_en": ". To test the accuracy of the payroll journal, the auditor should vouch a sample of the entries to supporting documents, i.e., the canceled checks, timekeeping information, and records of wage rates and authorized deductions."}], "answer": 3}, {"q_tr": "An internal control narrative indicates that an approved voucher is required to support every check request for payment of merchandise. Which of the following audit procedures provides the greatest assurance that this control is operating effectively?", "q_en": "An internal control narrative indicates that an approved voucher is required to support every check request for payment of merchandise. Which of the following audit procedures provides the greatest assurance that this control is operating effectively?", "options": [{"tr": "Select and examine vouchers and ascertain that the related canceled checks are dated no later than the vouchers.", "en": "Select and examine vouchers and ascertain that the related canceled checks are dated no later than the vouchers.", "cmt_tr": ". Tracing from vouchers to canceled checks does not give assurance that all checks are supported by approved vouchers. This test will not detect canceled checks unsupported by approved vouchers, although it will permit comparison of the dates of the respective documents.", "cmt_en": ". Tracing from vouchers to canceled checks does not give assurance that all checks are supported by approved vouchers. This test will not detect canceled checks unsupported by approved vouchers, although it will permit comparison of the dates of the respective documents."}, {"tr": "Select and examine vouchers and ascertain that the related canceled checks are dated no earlier than the vouchers.", "en": "Select and examine vouchers and ascertain that the related canceled checks are dated no earlier than the vouchers.", "cmt_tr": ". Tracing from vouchers to canceled checks does not give assurance that all checks are supported by approved vouchers. This test will not detect canceled checks unsupported by approved vouchers, although it will permit comparison of the dates of the respective documents.", "cmt_en": ". Tracing from vouchers to canceled checks does not give assurance that all checks are supported by approved vouchers. This test will not detect canceled checks unsupported by approved vouchers, although it will permit comparison of the dates of the respective documents."}, {"tr": "Select and examine canceled checks and ascertain that the related vouchers are dated no earlier than the checks.", "en": "Select and examine canceled checks and ascertain that the related vouchers are dated no earlier than the checks.", "cmt_tr": ". The checks should be dated no earlier than the vouchers. Each voucher should be dated earlier than (or have the same date as) the related check.", "cmt_en": ". The checks should be dated no earlier than the vouchers. Each voucher should be dated earlier than (or have the same date as) the related check."}, {"tr": "Select and examine canceled checks and ascertain that the related vouchers are dated no later than the checks.", "en": "Select and examine canceled checks and ascertain that the related vouchers are dated no later than the checks.", "cmt_tr": ". Payment vouchers bearing the required approvals should be supported by (1) a properly authorized purchase requisition, (2) a purchase order executing the transaction, (3) a receiving report indicating all goods ordered have been received in good condition, and (4) a vendor invoice confirming the amount owed. To determine that check requests are valid, the appropriate audit procedure is therefore to compare checks and the related vouchers. The direction of testing should be from a sample of checks to the approved vouchers. If the date of a voucher is later than the date of the related check, the check may have been issued without proper support.", "cmt_en": ". Payment vouchers bearing the required approvals should be supported by (1) a properly authorized purchase requisition, (2) a purchase order executing the transaction, (3) a receiving report indicating all goods ordered have been received in good condition, and (4) a vendor invoice confirming the amount owed. To determine that check requests are valid, the appropriate audit procedure is therefore to compare checks and the related vouchers. The direction of testing should be from a sample of checks to the approved vouchers. If the date of a voucher is later than the date of the related check, the check may have been issued without proper support."}], "answer": 3}, {"q_tr": "The internal auditor finds that one person has the ability to collect receivables, make deposits, issue credit memos, and record receipt of payments. The internal auditor suspects the individual may be stealing from cash receipts. Which of the following audit procedures will be most effective in discovering fraud in this scenario?", "q_en": "The internal auditor finds that one person has the ability to collect receivables, make deposits, issue credit memos, and record receipt of payments. The internal auditor suspects the individual may be stealing from cash receipts. Which of the following audit procedures will be most effective in discovering fraud in this scenario?", "options": [{"tr": "Send positive confirmations to a random selection of customers.", "en": "Send positive confirmations to a random selection of customers.", "cmt_tr": ". An employee who performs asset custody, authorization, and recording functions can conceal the theft by debiting customer discounts or sales returns. Customers would be unaware of the activity because their balances would reflect their expectations.", "cmt_en": ". An employee who performs asset custody, authorization, and recording functions can conceal the theft by debiting customer discounts or sales returns. Customers would be unaware of the activity because their balances would reflect their expectations."}, {"tr": "Send negative confirmations to all outstanding accounts receivable customers.", "en": "Send negative confirmations to all outstanding accounts receivable customers.", "cmt_tr": ". An employee who performs asset custody, authorization, and recording functions can conceal the theft by debiting customer discounts or sales returns. Customers would be unaware of the activity because their balances would reflect their expectations.", "cmt_en": ". An employee who performs asset custody, authorization, and recording functions can conceal the theft by debiting customer discounts or sales returns. Customers would be unaware of the activity because their balances would reflect their expectations."}, {"tr": "Perform a detailed review of debits to customer discounts, sales returns, or other debit accounts, excluding cash posted to the cash receipts journal.", "en": "Perform a detailed review of debits to customer discounts, sales returns, or other debit accounts, excluding cash posted to the cash receipts journal.", "cmt_tr": ". The most effective procedure is to perform a detailed review of debits to customer discounts, sales returns, and other debit accounts. These accounts could be used to conceal a theft of cash payments without alerting customers.", "cmt_en": ". The most effective procedure is to perform a detailed review of debits to customer discounts, sales returns, and other debit accounts. These accounts could be used to conceal a theft of cash payments without alerting customers."}, {"tr": "Take a sample of bank deposits and trace the detail in each bank deposit back to the entry in the cash receipts journal.", "en": "Take a sample of bank deposits and trace the detail in each bank deposit back to the entry in the cash receipts journal.", "cmt_tr": ". Bank deposits will agree with journal entries. The stolen amounts are never recorded.", "cmt_en": ". Bank deposits will agree with journal entries. The stolen amounts are never recorded."}], "answer": 2}, {"q_tr": "Which of the following factors affects the control risk of an organization?", "q_en": "Which of the following factors affects the control risk of an organization?", "options": [{"tr": "Potential problems like technological obsolescence.", "en": "Potential problems like technological obsolescence.", "cmt_tr": ". Only control activities affect control risk. The identification of a risk is not a control activity.", "cmt_en": ". Only control activities affect control risk. The identification of a risk is not a control activity."}, {"tr": "Unusual pressures on management.", "en": "Unusual pressures on management.", "cmt_tr": ". Although unusual pressures on management could result in management override of controls or fraud, the existence of pressures alone does not affect control risk.", "cmt_en": ". Although unusual pressures on management could result in management override of controls or fraud, the existence of pressures alone does not affect control risk."}, {"tr": "Complex accounts that require expert valuations.", "en": "Complex accounts that require expert valuations.", "cmt_tr": ". The existence of complex accounts requiring expert valuations does not affect control risk.", "cmt_en": ". The existence of complex accounts requiring expert valuations does not affect control risk."}, {"tr": "Segregation of duties.", "en": "Segregation of duties.", "cmt_tr": ". Control risk is the risk that controls fail to effectively manage controllable risks. A common control is segregation of duties. For example, it separates the responsibilities for authorization of transactions, recording of transactions, and custody of assets. Thus, segregation of duties affects the control risk of an organization.", "cmt_en": ". Control risk is the risk that controls fail to effectively manage controllable risks. A common control is segregation of duties. For example, it separates the responsibilities for authorization of transactions, recording of transactions, and custody of assets. Thus, segregation of duties affects the control risk of an organization."}], "answer": 3}, {"q_tr": "An internal auditor is assessing key risks in an organization’s inventory management system. Which control is most effective in addressing the risk of stockouts?", "q_en": "An internal auditor is assessing key risks in an organization’s inventory management system. Which control is most effective in addressing the risk of stockouts?", "options": [{"tr": "Regular inventory audits and reconciliations.", "en": "Regular inventory audits and reconciliations.", "cmt_tr": ". Audits may identify discrepancies, but they do not provide the real-time data needed to prevent stockouts.", "cmt_en": ". Audits may identify discrepancies, but they do not provide the real-time data needed to prevent stockouts."}, {"tr": "Implementation of a perpetual inventory system.", "en": "Implementation of a perpetual inventory system.", "cmt_tr": ". A perpetual inventory system provides real-time updates of inventory levels. It allows for prompt reordering before stockouts occur, thereby ensuring that stock levels are always sufficient to meet demand. This system enables better inventory management by continuously monitoring stock levels and generating automatic reorder notifications when inventory falls below a predefined threshold.", "cmt_en": ". A perpetual inventory system provides real-time updates of inventory levels. It allows for prompt reordering before stockouts occur, thereby ensuring that stock levels are always sufficient to meet demand. This system enables better inventory management by continuously monitoring stock levels and generating automatic reorder notifications when inventory falls below a predefined threshold."}, {"tr": "Conducting semi-annual training for inventory staff.", "en": "Conducting semi-annual training for inventory staff.", "cmt_tr": ". Training improves process adherence but does not directly manage inventory levels or address stockout risks.", "cmt_en": ". Training improves process adherence but does not directly manage inventory levels or address stockout risks."}, {"tr": "Reordering based on historical sales data.", "en": "Reordering based on historical sales data.", "cmt_tr": ". Relying on historical data may not consider current demand trends or seasonality. The result may be miscalculations of reordering needs.", "cmt_en": ". Relying on historical data may not consider current demand trends or seasonality. The result may be miscalculations of reordering needs."}], "answer": 1}], "SU2 - Management Controls": [{"q_tr": "Which of the following would minimize defects in finished goods caused by poor quality raw materials?", "q_en": "Which of the following would minimize defects in finished goods caused by poor quality raw materials?", "options": [{"tr": "Documented procedures for the proper handling of work-in-process inventory.", "en": "Documented procedures for the proper handling of work-in-process inventory.", "cmt_tr": ". Documented procedures for handling work-in-process inventory do not ensure that materials are of sufficient quality.", "cmt_en": ". Documented procedures for handling work-in-process inventory do not ensure that materials are of sufficient quality."}, {"tr": "Required material specifications for all purchases.", "en": "Required material specifications for all purchases.", "cmt_tr": ". A preventive control is required in this situation, i.e., one that ensures an unwanted event does not take place. The most cost-effective way of achieving the goal is to keep poor quality raw materials from entering the warehouse to begin with. Of the controls listed, only required specifications will accomplish this.", "cmt_en": ". A preventive control is required in this situation, i.e., one that ensures an unwanted event does not take place. The most cost-effective way of achieving the goal is to keep poor quality raw materials from entering the warehouse to begin with. Of the controls listed, only required specifications will accomplish this."}, {"tr": "Timely follow-up on all unfavorable usage variances.", "en": "Timely follow-up on all unfavorable usage variances.", "cmt_tr": ". Follow-up on unfavorable usage variances may lead to detection and correction of use of substandard materials but does not prevent or minimize defects in products already processed.", "cmt_en": ". Follow-up on unfavorable usage variances may lead to detection and correction of use of substandard materials but does not prevent or minimize defects in products already processed."}, {"tr": "Determination of the amount of spoilage at the end of the manufacturing process.", "en": "Determination of the amount of spoilage at the end of the manufacturing process.", "cmt_tr": ". Determination of spoilage after raw materials have been used in production is not a preventive control.", "cmt_en": ". Determination of spoilage after raw materials have been used in production is not a preventive control."}], "answer": 1}, {"q_tr": "A control likely to prevent purchasing agents from favoring specific suppliers is", "q_en": "A control likely to prevent purchasing agents from favoring specific suppliers is", "options": [{"tr": "Requiring management’s review of a monthly report of the totals spent by each buyer.", "en": "Requiring management’s review of a monthly report of the totals spent by each buyer.", "cmt_tr": ". Requiring review of a monthly report of the totals spent by each buyer does not enable the organization to detect receipt of inappropriate benefits by an agent or deter relationships that could lead to such activity.", "cmt_en": ". Requiring review of a monthly report of the totals spent by each buyer does not enable the organization to detect receipt of inappropriate benefits by an agent or deter relationships that could lead to such activity."}, {"tr": "Requiring buyers to adhere to detailed material specifications.", "en": "Requiring buyers to adhere to detailed material specifications.", "cmt_tr": ". Detailed material specifications will not prevent buyer favoritism in placing orders.", "cmt_en": ". Detailed material specifications will not prevent buyer favoritism in placing orders."}, {"tr": "Rotating buyer assignments periodically.", "en": "Rotating buyer assignments periodically.", "cmt_tr": ". The risk of favoritism is increased when buyers have long-term relationships with specific vendors. Periodic rotation of buyer assignments will limit the opportunity for any buyer to show favoritism to a particular supplier.", "cmt_en": ". The risk of favoritism is increased when buyers have long-term relationships with specific vendors. Periodic rotation of buyer assignments will limit the opportunity for any buyer to show favoritism to a particular supplier."}, {"tr": "Monitoring the number of orders placed by each buyer.", "en": "Monitoring the number of orders placed by each buyer.", "cmt_tr": ". The number of orders placed is not relevant to preventing favoritism.", "cmt_en": ". The number of orders placed is not relevant to preventing favoritism."}], "answer": 2}, {"q_tr": "A utility with a large investment in repair vehicles would most likely implement which internal control to reduce the risk of vehicle theft or loss?", "q_en": "A utility with a large investment in repair vehicles would most likely implement which internal control to reduce the risk of vehicle theft or loss?", "options": [{"tr": "Review insurance coverage for adequacy.", "en": "Review insurance coverage for adequacy.", "cmt_tr": ". Insurance provides for indemnification if loss or theft occurs. It thus reduces financial exposure but does not prevent the actual loss or theft.", "cmt_en": ". Insurance provides for indemnification if loss or theft occurs. It thus reduces financial exposure but does not prevent the actual loss or theft."}, {"tr": "Systematically account for all repair work orders.", "en": "Systematically account for all repair work orders.", "cmt_tr": ". An internal control designed to ensure control over repair work performed has no bearing on the risk of loss.", "cmt_en": ". An internal control designed to ensure control over repair work performed has no bearing on the risk of loss."}, {"tr": "Physically inventory vehicles and reconcile the results with the accounting records.", "en": "Physically inventory vehicles and reconcile the results with the accounting records.", "cmt_tr": ". Taking an inventory is a detective, not a preventive, control.", "cmt_en": ". Taking an inventory is a detective, not a preventive, control."}, {"tr": "Maintain vehicles in a secured location with release and return subject to approval by a custodian.", "en": "Maintain vehicles in a secured location with release and return subject to approval by a custodian.", "cmt_tr": ". Physical safeguarding of assets is enacted through the use of preventive controls that reduce the likelihood of theft or other loss. Keeping the vehicles at a secure location and restricting access establishes accountability by the custodian and allows for proper authorization of their use.", "cmt_en": ". Physical safeguarding of assets is enacted through the use of preventive controls that reduce the likelihood of theft or other loss. Keeping the vehicles at a secure location and restricting access establishes accountability by the custodian and allows for proper authorization of their use."}], "answer": 3}, {"q_tr": "A system of internal control includes physical controls over access to and use of assets and records. A departure from the purpose of such procedures is that", "q_en": "A system of internal control includes physical controls over access to and use of assets and records. A departure from the purpose of such procedures is that", "options": [{"tr": "Access to the safe-deposit box requires two officers.", "en": "Access to the safe-deposit box requires two officers.", "cmt_tr": ". It is appropriate for two officers to be required to open the safe-deposit box. One supervises the other.", "cmt_en": ". It is appropriate for two officers to be required to open the safe-deposit box. One supervises the other."}, {"tr": "Only storeroom personnel and line supervisors have access to the raw materials storeroom.", "en": "Only storeroom personnel and line supervisors have access to the raw materials storeroom.", "cmt_tr": ". Storeroom personnel have custody of assets, and supervisors are in charge of execution functions. To give supervisors access to the raw materials storeroom is a violation of the essential internal control principle of segregation of functions.", "cmt_en": ". Storeroom personnel have custody of assets, and supervisors are in charge of execution functions. To give supervisors access to the raw materials storeroom is a violation of the essential internal control principle of segregation of functions."}, {"tr": "The mailroom compiles a list of the checks received in the incoming mail.", "en": "The mailroom compiles a list of the checks received in the incoming mail.", "cmt_tr": ". The mailroom typically compiles a prelisting of cash. The list is sent to the accountant as a control for actual cash sent to the cashier.", "cmt_en": ". The mailroom typically compiles a prelisting of cash. The list is sent to the accountant as a control for actual cash sent to the cashier."}, {"tr": "Only salespersons and sales supervisors use sales department vehicles.", "en": "Only salespersons and sales supervisors use sales department vehicles.", "cmt_tr": ". Use of sales department vehicles by only sales personnel is appropriate.", "cmt_en": ". Use of sales department vehicles by only sales personnel is appropriate."}], "answer": 1}, {"q_tr": "Which of the following controls could be used to detect bank deposits that are recorded but never made?", "q_en": "Which of the following controls could be used to detect bank deposits that are recorded but never made?", "options": [{"tr": "Establishing accountability for receipts at the earliest possible time.", "en": "Establishing accountability for receipts at the earliest possible time.", "cmt_tr": ". Early establishment of accountability will not help detect bank deposits recorded on the books but not deposited in the bank.", "cmt_en": ". Early establishment of accountability will not help detect bank deposits recorded on the books but not deposited in the bank."}, {"tr": "Linking receipts to other internal accountabilities, for example, collections to either accounts receivable or sales.", "en": "Linking receipts to other internal accountabilities, for example, collections to either accounts receivable or sales.", "cmt_tr": ". The issue is not accountability for receipts but detection of failure to make deposits.", "cmt_en": ". The issue is not accountability for receipts but detection of failure to make deposits."}, {"tr": "Consolidating cash receiving points.", "en": "Consolidating cash receiving points.", "cmt_tr": ". The number of receiving points does not impact the failure to make recorded deposits.", "cmt_en": ". The number of receiving points does not impact the failure to make recorded deposits."}, {"tr": "Having bank reconciliations performed by a third party.", "en": "Having bank reconciliations performed by a third party.", "cmt_tr": ". Having an independent third party prepare the bank reconciliations would reveal any discrepancies between recorded deposits and the bank statements. A bank reconciliation compares the bank statement with organization records and resolves differences caused by deposits in transit, outstanding checks, NSF checks, bank charges, errors, etc.", "cmt_en": ". Having an independent third party prepare the bank reconciliations would reveal any discrepancies between recorded deposits and the bank statements. A bank reconciliation compares the bank statement with organization records and resolves differences caused by deposits in transit, outstanding checks, NSF checks, bank charges, errors, etc."}], "answer": 3}, {"q_tr": "Which of the following is a control deficiency in this situation?", "q_en": "Which of the following is a control deficiency in this situation?", "options": [{"tr": "The store manager can require items to be removed, thus affecting the potential performance evaluation of individual product managers.", "en": "The store manager can require items to be removed, thus affecting the potential performance evaluation of individual product managers.", "cmt_tr": ". Goods are seasonal, and store space is limited. This is a constraint that is consistent with maximizing revenue and profitability for the organization.", "cmt_en": ". Goods are seasonal, and store space is limited. This is a constraint that is consistent with maximizing revenue and profitability for the organization."}, {"tr": "The product manager negotiates the purchase price and sets the selling price.", "en": "The product manager negotiates the purchase price and sets the selling price.", "cmt_tr": ". The product manager is evaluated based on sales and gross profit; thus, performing both of these duties is not a conflict.", "cmt_en": ". The product manager is evaluated based on sales and gross profit; thus, performing both of these duties is not a conflict."}, {"tr": "Evaluating product managers by total gross profit generated by product line will lead to dysfunctional behavior.", "en": "Evaluating product managers by total gross profit generated by product line will lead to dysfunctional behavior.", "cmt_tr": ". Evaluating the product managers on gross profit and budgeted sales holds them accountable for profitability. This approach is consistent with their authority over ordering and pricing.", "cmt_en": ". Evaluating the product managers on gross profit and budgeted sales holds them accountable for profitability. This approach is consistent with their authority over ordering and pricing."}, {"tr": "There is no receiving function located at individual stores.", "en": "There is no receiving function located at individual stores.", "cmt_tr": ". The receiving function verifies that the goods received are those actually sent by the shipper. Without this function being performed at the store, goods could be lost, pilfered, or simply sent to the wrong store without discovery.", "cmt_en": ". The receiving function verifies that the goods received are those actually sent by the shipper. Without this function being performed at the store, goods could be lost, pilfered, or simply sent to the wrong store without discovery."}], "answer": 3}, {"q_tr": "Management can best strengthen internal control over the custody of inventory stored in an off-site warehouse by implementing", "q_en": "Management can best strengthen internal control over the custody of inventory stored in an off-site warehouse by implementing", "options": [{"tr": "Reconciliations of transfer slips to/from the warehouse with inventory records.", "en": "Reconciliations of transfer slips to/from the warehouse with inventory records.", "cmt_tr": "A control over the movement of inventory to and from the warehouse provides no assurance over the custody of the inventory while in the warehouse.", "cmt_en": "A control over the movement of inventory to and from the warehouse provides no assurance over the custody of the inventory while in the warehouse."}, {"tr": "Increases in insurance coverage.", "en": "Increases in insurance coverage.", "cmt_tr": "Increasing insurance coverage helps protect the organization against losses but does not strengthen internal control over the custody of inventory.", "cmt_en": "Increasing insurance coverage helps protect the organization against losses but does not strengthen internal control over the custody of inventory."}, {"tr": "Regular reconciliation of physical inventories to accounting records.", "en": "Regular reconciliation of physical inventories to accounting records.", "cmt_tr": "Regular reconciliation of physical inventories to accounting records strengthens internal control over the custody of inventory stored in an off-site warehouse by detecting discrepancies between recorded and actual inventory.", "cmt_en": "Regular reconciliation of physical inventories to accounting records strengthens internal control over the custody of inventory stored in an off-site warehouse by detecting discrepancies between recorded and actual inventory."}, {"tr": "Regular confirmation of the amount on hand with the custodian of the warehouse.", "en": "Regular confirmation of the amount on hand with the custodian of the warehouse.", "cmt_tr": "Confirming with the custodian the amount of inventory on hand does not verify that the inventory is actually at the warehouse.", "cmt_en": "Confirming with the custodian the amount of inventory on hand does not verify that the inventory is actually at the warehouse."}], "answer": 2}, {"q_tr": "An internal auditor notes year-to-year increases for small tool expense at a manufacturing facility that has produced the same amount of identical product for the last 3 years. Production inventory is kept in a controlled staging area adjacent to the receiving dock, but the supply of small tools is kept in an unsupervised area near the exit to the plant employees’ parking lot. After determining that all of the following alternatives are equal in cost and are also feasible for local management, the internal auditor would best address the security issue by recommending that plant management", "q_en": "An internal auditor notes year-to-year increases for small tool expense at a manufacturing facility that has produced the same amount of identical product for the last 3 years. Production inventory is kept in a controlled staging area adjacent to the receiving dock, but the supply of small tools is kept in an unsupervised area near the exit to the plant employees’ parking lot. After determining that all of the following alternatives are equal in cost and are also feasible for local management, the internal auditor would best address the security issue by recommending that plant management", "options": [{"tr": "Move the small tools inventory to the custody of the production inventory staging superintendent and implement the use of a special requisition
