<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 9</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 9</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">92 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Study Unit 9</span></h1>
    <p id="welcome-desc">3 mövzu, 92 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">3</span><span class="ws-label">Mövzu</span></div>
      <div class="ws-item"><span class="ws-num">92</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">368</span><span class="ws-label">İzah</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>

const QUIZ = {"SU1 - Accounting Cycles & Controls": [{"q_tr": "Which of the following describes the most effective preventive control to ensure proper handling of cash receipt transactions?", "q_en": "Which of the following describes the most effective preventive control to ensure proper handling of cash receipt transactions?", "options": [{"tr": "Have bank reconciliations prepared by an employee not involved with cash collections and then have them reviewed by a supervisor.", "en": "Have bank reconciliations prepared by an employee not involved with cash collections and then have them reviewed by a supervisor.", "cmt_tr": ". The bank reconciliation is a detective, not a preventive, control.", "cmt_en": ". The bank reconciliation is a detective, not a preventive, control."}, {"tr": "One employee issues a prenumbered receipt for all cash collections; another employee reconciles the daily total of prenumbered receipts to the bank deposits.", "en": "One employee issues a prenumbered receipt for all cash collections; another employee reconciles the daily total of prenumbered receipts to the bank deposits.", "cmt_tr": ". Sequentially numbered receipts should be issued to maintain accountability for cash collected. Such accountability should be established as soon as possible because cash has a high inherent risk. Daily cash receipts should be deposited intact so that receipts and bank deposits can be reconciled. The reconciliation should be performed by someone independent of the cash custody function.", "cmt_en": ". Sequentially numbered receipts should be issued to maintain accountability for cash collected. Such accountability should be established as soon as possible because cash has a high inherent risk. Daily cash receipts should be deposited intact so that receipts and bank deposits can be reconciled. The reconciliation should be performed by someone independent of the cash custody function."}, {"tr": "Use predetermined totals (hash totals) of cash receipts to control posting routines.", "en": "Use predetermined totals (hash totals) of cash receipts to control posting routines.", "cmt_tr": ". Use of hash totals is a control over the completeness of posting routines, not cash receipts.", "cmt_en": ". Use of hash totals is a control over the completeness of posting routines, not cash receipts."}, {"tr": "The employee who receives customer mail receipts prepares the daily bank deposit, which is then deposited by another employee.", "en": "The employee who receives customer mail receipts prepares the daily bank deposit, which is then deposited by another employee.", "cmt_tr": ". A cash remittance list should be prepared before a separate employee prepares the bank deposit. The list and deposit represent separate records based on independent counts made by different employees.", "cmt_en": ". A cash remittance list should be prepared before a separate employee prepares the bank deposit. The list and deposit represent separate records based on independent counts made by different employees."}], "answer": 1}, {"q_tr": "Upon receipt of purchased goods, receiving department personnel match the quantity received with the packing slip quantity and mark the retail price on the goods based on a master price list. The annotated packing slip is then forwarded to inventory control and goods are automatically moved to the retail sales area. The most significant control strength of this activity is", "q_en": "Upon receipt of purchased goods, receiving department personnel match the quantity received with the packing slip quantity and mark the retail price on the goods based on a master price list. The annotated packing slip is then forwarded to inventory control and goods are automatically moved to the retail sales area. The most significant control strength of this activity is", "options": [{"tr": "Immediately pricing goods for retail sale.", "en": "Immediately pricing goods for retail sale.", "cmt_tr": ". Timing is not as important as the accuracy of prices.", "cmt_en": ". Timing is not as important as the accuracy of prices."}, {"tr": "Matching quantity received with the packing slip.", "en": "Matching quantity received with the packing slip.", "cmt_tr": ". Matching quantity received with the packing slip does not ensure receipt of the quantity ordered.", "cmt_en": ". Matching quantity received with the packing slip does not ensure receipt of the quantity ordered."}, {"tr": "Using a master price list for marking the sale price.", "en": "Using a master price list for marking the sale price.", "cmt_tr": ". Use of the master price list ensures that the correct retail price is marked.", "cmt_en": ". Use of the master price list ensures that the correct retail price is marked."}, {"tr": "Automatically moving goods to the retail sales area.", "en": "Automatically moving goods to the retail sales area.", "cmt_tr": ". Goods may or may not be needed in retail sales.", "cmt_en": ". Goods may or may not be needed in retail sales."}], "answer": 2}, {"q_tr": "Which of the following observations made during the preliminary survey of a local department store’s disbursement cycle reflects a control strength?", "q_en": "Which of the following observations made during the preliminary survey of a local department store’s disbursement cycle reflects a control strength?", "options": [{"tr": "Individual department managers use prenumbered forms to order merchandise from vendors.", "en": "Individual department managers use prenumbered forms to order merchandise from vendors.", "cmt_tr": ". The managers should submit purchase requisitions to the purchasing department. The purchasing function should be separate from operations.", "cmt_en": ". The managers should submit purchase requisitions to the purchasing department. The purchasing function should be separate from operations."}, {"tr": "The receiving department is given a copy of the purchase order complete with a description of goods, quantity ordered, and extended price for all merchandise ordered.", "en": "The receiving department is given a copy of the purchase order complete with a description of goods, quantity ordered, and extended price for all merchandise ordered.", "cmt_tr": ". To encourage a fair count, the receiving department should receive a copy of the purchase order from which the quantity has been omitted.", "cmt_en": ". To encourage a fair count, the receiving department should receive a copy of the purchase order from which the quantity has been omitted."}, {"tr": "The chief financial officer’s office prepares checks for suppliers based on vouchers prepared by the accounts payable department.", "en": "The chief financial officer’s office prepares checks for suppliers based on vouchers prepared by the accounts payable department.", "cmt_tr": ". Accounting for payables is a recording function. The matching of the supplier’s invoice, the purchase order, and the receiving report (and usually the purchase requisition) should be the responsibility of the accounting department. These are the primary supporting documents for the payment voucher prepared by the accounts payable section that will be relied upon by the chief financial officer in making payment.", "cmt_en": ". Accounting for payables is a recording function. The matching of the supplier’s invoice, the purchase order, and the receiving report (and usually the purchase requisition) should be the responsibility of the accounting department. These are the primary supporting documents for the payment voucher prepared by the accounts payable section that will be relied upon by the chief financial officer in making payment."}, {"tr": "Individual department managers are responsible for the movement of merchandise from the receiving dock to storage or sales areas as appropriate.", "en": "Individual department managers are responsible for the movement of merchandise from the receiving dock to storage or sales areas as appropriate.", "cmt_tr": ". The receiving department should transfer goods directly to the storeroom to maintain security. A copy of the receiving report should be sent to the storeroom so that the amount stored can be co4)", "cmt_en": ". The receiving department should transfer goods directly to the storeroom to maintain security. A copy of the receiving report should be sent to the storeroom so that the amount stored can be co4)"}], "answer": 2}, {"q_tr": "Which one of the following situations represents an internal control weakness in the payroll department?", "q_en": "Which one of the following situations represents an internal control weakness in the payroll department?", "options": [{"tr": "Payroll department personnel are rotated in their duties.", "en": "Payroll department personnel are rotated in their duties.", "cmt_tr": ". Periodic rotation of payroll personnel inhibits the perpetration and concealment of fraud.", "cmt_en": ". Periodic rotation of payroll personnel inhibits the perpetration and concealment of fraud."}, {"tr": "Paychecks are distributed by the employees’ immediate supervisor.", "en": "Paychecks are distributed by the employees’ immediate supervisor.", "cmt_tr": ". Paychecks should not be distributed by supervisors because an unscrupulous person could terminate an employee and fail to report the termination. The supervisor could then clock in and out for the employee and keep the paycheck. A person unrelated to either payroll recordkeeping or the operating department should distribute checks.", "cmt_en": ". Paychecks should not be distributed by supervisors because an unscrupulous person could terminate an employee and fail to report the termination. The supervisor could then clock in and out for the employee and keep the paycheck. A person unrelated to either payroll recordkeeping or the operating department should distribute checks."}, {"tr": "Payroll records are reconciled with quarterly tax reports.", "en": "Payroll records are reconciled with quarterly tax reports.", "cmt_tr": ". This analytical procedure may detect a discrepancy.", "cmt_en": ". This analytical procedure may detect a discrepancy."}, {"tr": "The timekeeping function is independent of the payroll department.", "en": "The timekeeping function is independent of the payroll department.", "cmt_tr": ". Timekeeping should be independent of asset custody and employee records.", "cmt_en": ". Timekeeping should be independent of asset custody and employee records."}], "answer": 1}, {"q_tr": "An employee in the payroll department is contemplating a fraud involving the addition of a fictitious employee and the entry of fictitious hours worked. The paycheck would then be sent to the payroll employee’s home address. The most effective control procedure to prevent this type of fraud is to require that", "q_en": "An employee in the payroll department is contemplating a fraud involving the addition of a fictitious employee and the entry of fictitious hours worked. The paycheck would then be sent to the payroll employee’s home address. The most effective control procedure to prevent this type of fraud is to require that", "options": [{"tr": "A report of all new employees added be approved by someone outside of the payroll department. Also, a report showing all employees and hours worked should be sent to the supervisor’s department for review.", "en": "A report of all new employees added be approved by someone outside of the payroll department. Also, a report showing all employees and hours worked should be sent to the supervisor’s department for review.", "cmt_tr": ". The payroll department has a recording function. It should not authorize pay rate changes or the addition or deletion of employees from the payroll. Accordingly, authorization of such changes should be made by an individual outside the department. Verification of payroll data should also be made outside the department. Proper segregation of duties is critical in the prevention of payroll fraud.", "cmt_en": ". The payroll department has a recording function. It should not authorize pay rate changes or the addition or deletion of employees from the payroll. Accordingly, authorization of such changes should be made by an individual outside the department. Verification of payroll data should also be made outside the department. Proper segregation of duties is critical in the prevention of payroll fraud."}, {"tr": "All new employees and their hours worked be entered by the human resources department.", "en": "All new employees and their hours worked be entered by the human resources department.", "cmt_tr": ". The entry of new employees and their hours should be segregated. The human resources department should not be responsible for both activities.", "cmt_en": ". The entry of new employees and their hours should be segregated. The human resources department should not be responsible for both activities."}, {"tr": "All changes to employee records be approved by supervisors outside of both human resources and payroll.", "en": "All changes to employee records be approved by supervisors outside of both human resources and payroll.", "cmt_tr": ". Approving changes in existing employee records does not prevent the fraud of entering a fictitious employee.", "cmt_en": ". Approving changes in existing employee records does not prevent the fraud of entering a fictitious employee."}, {"tr": "The payroll department physically delivers paychecks to employees rather than mailing them.", "en": "The payroll department physically delivers paychecks to employees rather than mailing them.", "cmt_tr": ". Physical delivery of paychecks does not prevent the payroll employee from withholding the fictitious employee’s check. Moreover, a department with a recording function should not have an asset custody function.", "cmt_en": ". Physical delivery of paychecks does not prevent the payroll employee from withholding the fictitious employee’s check. Moreover, a department with a recording function should not have an asset custody function."}], "answer": 0}, {"q_tr": "Human resources and payroll are separate departments. Which of the following combinations provides the best segregation of duties?", "q_en": "Human resources and payroll are separate departments. Which of the following combinations provides the best segregation of duties?", "options": [{"tr": "Human resources adds employees, payroll processes hours, and human resources delivers the paychecks to employees.", "en": "Human resources adds employees, payroll processes hours, and human resources delivers the paychecks to employees.", "cmt_tr": ". The human resources department should not add employees and deliver paychecks. These two duties should be segregated.", "cmt_en": ". The human resources department should not add employees and deliver paychecks. These two duties should be segregated."}, {"tr": "Human resources adds employees, reviews and submits payroll hours to payroll for processing, and delivers paychecks to employees.", "en": "Human resources adds employees, reviews and submits payroll hours to payroll for processing, and delivers paychecks to employees.", "cmt_tr": ". The functions are all performed by human resources. There is no segregation of duties.", "cmt_en": ". The functions are all performed by human resources. There is no segregation of duties."}, {"tr": "Human resources adds employees, and payroll processes hours and enters employee bank account numbers. Paychecks are automatically deposited in the employee’s bank account.", "en": "Human resources adds employees, and payroll processes hours and enters employee bank account numbers. Paychecks are automatically deposited in the employee’s bank account.", "cmt_tr": ". This segregation of duties works because human resources does not have the ability to add bank account numbers, and payroll cannot add employees to payroll. Thus, to create fictitious employees and pay them, collusions would have to exist between the two departments.", "cmt_en": ". This segregation of duties works because human resources does not have the ability to add bank account numbers, and payroll cannot add employees to payroll. Thus, to create fictitious employees and pay them, collusions would have to exist between the two departments."}, {"tr": "Payroll adds employees and enters employees’ bank account numbers but processes hours only as approved by human resources. Paychecks are automatically deposited in the employee’s bank account.", "en": "Payroll adds employees and enters employees’ bank account numbers but processes hours only as approved by human resources. Paychecks are automatically deposited in the employee’s bank account.", "cmt_tr": ". Payroll is adding employees and processing hours. These two duties should be performed by different departments.", "cmt_en": ". Payroll is adding employees and processing hours. These two duties should be performed by different departments."}], "answer": 2}, {"q_tr": "One payroll engagement objective is to determine whether segregation of duties is proper. Which of the following activities is incompatible?", "q_en": "One payroll engagement objective is to determine whether segregation of duties is proper. Which of the following activities is incompatible?", "options": [{"tr": "Hiring employees and authorizing changes in pay rates.", "en": "Hiring employees and authorizing changes in pay rates.", "cmt_tr": ". Hiring employees and authorizing changes in pay rates are both personnel functions.", "cmt_en": ". Hiring employees and authorizing changes in pay rates are both personnel functions."}, {"tr": "Preparing the payroll and filing payroll tax forms.", "en": "Preparing the payroll and filing payroll tax forms.", "cmt_tr": ". Preparing the payroll and filing payroll tax forms are both functions of the payroll department.", "cmt_en": ". Preparing the payroll and filing payroll tax forms are both functions of the payroll department."}, {"tr": "Signing and distributing payroll checks.", "en": "Signing and distributing payroll checks.", "cmt_tr": ". Proper treasury functions include signing and distributing payroll checks.", "cmt_en": ". Proper treasury functions include signing and distributing payroll checks."}, {"tr": "Preparing attendance data and preparing the payroll.", "en": "Preparing attendance data and preparing the payroll.", "cmt_tr": ". Attendance data are accumulated by the timekeeping function. Preparing the payroll is a payroll department function. For control purposes, these two functions should be separated to avoid the perpetration and concealment of irregularities.", "cmt_en": ". Attendance data are accumulated by the timekeeping function. Preparing the payroll is a payroll department function. For control purposes, these two functions should be separated to avoid the perpetration and concealment of irregularities."}], "answer": 3}, {"q_tr": "An adequate system of internal controls is most likely to detect a fraud perpetrated by a", "q_en": "An adequate system of internal controls is most likely to detect a fraud perpetrated by a", "options": [{"tr": "Group of employees in collusion.", "en": "Group of employees in collusion.", "cmt_tr": ". A group has a better chance of successfully perpetrating a fraud than does an individual employee.", "cmt_en": ". A group has a better chance of successfully perpetrating a fraud than does an individual employee."}, {"tr": "Single employee.", "en": "Single employee.", "cmt_tr": ". Segregation of duties and other control processes serve to prevent or detect a fraud committed by an employee acting alone. One employee may not have the ability to engage in wrongdoing or may be subject to detection by other employees in the course of performing their assigned duties. However, collusion may circumvent controls. For example, comparison of recorded accountability for assets with the assets known to be held may fail to detect fraud if persons having custody of assets collude with recordkeepers.", "cmt_en": ". Segregation of duties and other control processes serve to prevent or detect a fraud committed by an employee acting alone. One employee may not have the ability to engage in wrongdoing or may be subject to detection by other employees in the course of performing their assigned duties. However, collusion may circumvent controls. For example, comparison of recorded accountability for assets with the assets known to be held may fail to detect fraud if persons having custody of assets collude with recordkeepers."}, {"tr": "Group of managers in collusion.", "en": "Group of managers in collusion.", "cmt_tr": ". Management can override controls.", "cmt_en": ". Management can override controls."}, {"tr": "Single manager.", "en": "Single manager.", "cmt_tr": ". Even a single manager may be able to override controls.", "cmt_en": ". Even a single manager may be able to override controls."}], "answer": 1}, {"q_tr": "Internal control should follow certain basic principles to achieve its objectives. One of these principles is the segregation of functions. Which one of the following examples is consistent with the principle of segregation of functions?", "q_en": "Internal control should follow certain basic principles to achieve its objectives. One of these principles is the segregation of functions. Which one of the following examples is consistent with the principle of segregation of functions?", "options": [{"tr": "The chief financial officer has the authority to sign checks but gives the signature block to the assistant chief financial officer to run the check-signing machine.", "en": "The chief financial officer has the authority to sign checks but gives the signature block to the assistant chief financial officer to run the check-signing machine.", "cmt_tr": ". The chief financial officer’s department should have custody of assets but should not authorize or record transactions. Because the assistant chief financial officer reports to the chief financial officer, the chief financial officer is merely delegating an assigned duty related to asset custody.", "cmt_en": ". The chief financial officer’s department should have custody of assets but should not authorize or record transactions. Because the assistant chief financial officer reports to the chief financial officer, the chief financial officer is merely delegating an assigned duty related to asset custody."}, {"tr": "The warehouse clerk, who has the custodial responsibility over inventory in the warehouse, may authorize disposal of damaged goods.", "en": "The warehouse clerk, who has the custodial responsibility over inventory in the warehouse, may authorize disposal of damaged goods.", "cmt_tr": ". Authorization to dispose of damaged goods could be used to cover thefts of inventory for which the warehouse clerk has custodial responsibility. Transaction authorization is inconsistent with asset custody.", "cmt_en": ". Authorization to dispose of damaged goods could be used to cover thefts of inventory for which the warehouse clerk has custodial responsibility. Transaction authorization is inconsistent with asset custody."}, {"tr": "The sales manager has the responsibility to approve credit and the authority to write off accounts.", "en": "The sales manager has the responsibility to approve credit and the authority to write off accounts.", "cmt_tr": ". The sales manager could approve credit to a controlled organization and then write off the account as a bad debt. The sales manager’s authorization of credit is inconsistent with his or her indirect access to assets.", "cmt_en": ". The sales manager could approve credit to a controlled organization and then write off the account as a bad debt. The sales manager’s authorization of credit is inconsistent with his or her indirect access to assets."}, {"tr": "The department time clerk is given the undistributed payroll checks to mail to absent employees.", "en": "The department time clerk is given the undistributed payroll checks to mail to absent employees.", "cmt_tr": ". The time clerk could conceal the termination of an employee and retain that employee’s paycheck. Recordkeeping is inconsistent with asset custody.", "cmt_en": ". The time clerk could conceal the termination of an employee and retain that employee’s paycheck. Recordkeeping is inconsistent with asset custody."}], "answer": 0}, {"q_tr": "Which of the following activities performed by a payroll clerk is a control weakness rather than a control strength?", "q_en": "Which of the following activities performed by a payroll clerk is a control weakness rather than a control strength?", "options": [{"tr": "Has custody of the check signature stamp machine.", "en": "Has custody of the check signature stamp machine.", "cmt_tr": ". Payroll checks should be signed by someone who is not involved in timekeeping, recordkeeping, or payroll preparation. The payroll clerk performs a recordkeeping function.", "cmt_en": ". Payroll checks should be signed by someone who is not involved in timekeeping, recordkeeping, or payroll preparation. The payroll clerk performs a recordkeeping function."}, {"tr": "Prepares the payroll register.", "en": "Prepares the payroll register.", "cmt_tr": ". Preparing the payroll register is one of the recordkeeping tasks of the payroll clerk.", "cmt_en": ". Preparing the payroll register is one of the recordkeeping tasks of the payroll clerk."}, {"tr": "Forwards the payroll register to the chief accountant for approval.", "en": "Forwards the payroll register to the chief accountant for approval.", "cmt_tr": ". The payroll register should be approved by an officer of the organization. This control is a strength.", "cmt_en": ". The payroll register should be approved by an officer of the organization. This control is a strength."}, {"tr": "Draws the paychecks on a separate payroll checking account.", "en": "Draws the paychecks on a separate payroll checking account.", "cmt_tr": ". Paychecks should be drawn on a separate payroll checking account. This control is a strength.", "cmt_en": ". Paychecks should be drawn on a separate payroll checking account. This control is a strength."}], "answer": 0}, {"q_tr": "The automated system contains a table of pay rates matched with the employee job classifications. The best control to ensure that the table is updated correctly for only valid pay changes is to", "q_en": "The automated system contains a table of pay rates matched with the employee job classifications. The best control to ensure that the table is updated correctly for only valid pay changes is to", "options": [{"tr": "Limit access to the data table to management and line supervisors who have the authority to determine pay rates.", "en": "Limit access to the data table to management and line supervisors who have the authority to determine pay rates.", "cmt_tr": ". Access to the database should be severely restricted to personnel within the human resources or payroll departments.", "cmt_en": ". Access to the database should be severely restricted to personnel within the human resources or payroll departments."}, {"tr": "Require a supervisor in the department, who does not have the ability to change the table of pay rates, to compare the changes with a signed management authorization.", "en": "Require a supervisor in the department, who does not have the ability to change the table of pay rates, to compare the changes with a signed management authorization.", "cmt_tr": ". To maintain a proper segregation of duties, changes in pay rates should be authorized by someone outside the human resources department. Furthermore, authorization should be independently verified by an individual who does not have a recording function.", "cmt_en": ". To maintain a proper segregation of duties, changes in pay rates should be authorized by someone outside the human resources department. Furthermore, authorization should be independently verified by an individual who does not have a recording function."}, {"tr": "Ensure that adequate edit and reasonableness checks are built into the automated system.", "en": "Ensure that adequate edit and reasonableness checks are built into the automated system.", "cmt_tr": ". Edit checks will not detect unauthorized changes.", "cmt_en": ". Edit checks will not detect unauthorized changes."}, {"tr": "Require that all pay changes be signed by the employee to verify that the change goes to a bona fide employee.", "en": "Require that all pay changes be signed by the employee to verify that the change goes to a bona fide employee.", "cmt_tr": ". The control must ensure that changes in the table of pay rates are properly authorized and entered into the system.", "cmt_en": ". The control must ensure that changes in the table of pay rates are properly authorized and entered into the system."}], "answer": 1}, {"q_tr": "The manager of a production line has the authority to order and receive replacement parts for all machinery that requires periodic maintenance. The internal auditor received an anonymous tip that the manager ordered substantially more parts than were necessary from a family member in the parts supply business. The unneeded parts were never delivered. Instead, the manager processed receiving documents and charged the parts to machinery maintenance accounts. The payments for the undelivered parts were sent to the supplier, and the money was divided between the manager and the family member. Which of the following internal controls would have most likely prevented this fraud from occurring?", "q_en": "The manager of a production line has the authority to order and receive replacement parts for all machinery that requires periodic maintenance. The internal auditor received an anonymous tip that the manager ordered substantially more parts than were necessary from a family member in the parts supply business. The unneeded parts were never delivered. Instead, the manager processed receiving documents and charged the parts to machinery maintenance accounts. The payments for the undelivered parts were sent to the supplier, and the money was divided between the manager and the family member. Which of the following internal controls would have most likely prevented this fraud from occurring?", "options": [{"tr": "Establishing predefined spending levels for all vendors during the bidding process.", "en": "Establishing predefined spending levels for all vendors during the bidding process.", "cmt_tr": ". Predefined spending levels would probably already include the fraudulent amounts and would only limit the size of the fraud.", "cmt_en": ". Predefined spending levels would probably already include the fraudulent amounts and would only limit the size of the fraud."}, {"tr": "Segregating the receiving function from the authorization of parts purchases.", "en": "Segregating the receiving function from the authorization of parts purchases.", "cmt_tr": ". Segregating the parts authorization and receiving functions would have improved internal control. If the parts in question had been sent to the company and a receiving report had been prepared by an employee other than the one ordering the goods, the fraud could not have occurred. Moreover, the receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items.", "cmt_en": ". Segregating the parts authorization and receiving functions would have improved internal control. If the parts in question had been sent to the company and a receiving report had been prepared by an employee other than the one ordering the goods, the fraud could not have occurred. Moreover, the receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items."}, {"tr": "Comparing the bill of lading for replacement parts to the approved purchase order.", "en": "Comparing the bill of lading for replacement parts to the approved purchase order.", "cmt_tr": ". The bill of lading would agree with the purchase order. The quantity received (verified by a third party) should be compared to both the bill of lading and the purchase order.", "cmt_en": ". The bill of lading would agree with the purchase order. The quantity received (verified by a third party) should be compared to both the bill of lading and the purchase order."}, {"tr": "Using the company’s inventory system to match quantities requested with quantities received.", "en": "Using the company’s inventory system to match quantities requested with quantities received.", "cmt_tr": ". The computer matching would only verify the fraudulent paperwork.", "cmt_en": ". The computer matching would only verify the fraudulent paperwork."}], "answer": 1}, {"q_tr": "Which one of the following is most likely to be considered an internal control weakness?", "q_en": "Which one of the following is most likely to be considered an internal control weakness?", "options": [{"tr": "The petty cash custodian has the ability to steal petty cash. Documentation for all disbursements from the fund must be submitted with the request for replenishment of the fund.", "en": "The petty cash custodian has the ability to steal petty cash. Documentation for all disbursements from the fund must be submitted with the request for replenishment of the fund.", "cmt_tr": ". The requirement for documentation will reveal a theft when the fund is reimbursed unless the documents can be falsified.", "cmt_en": ". The requirement for documentation will reveal a theft when the fund is reimbursed unless the documents can be falsified."}, {"tr": "An inventory control clerk at a manufacturing plant has the ability to steal one completed television set from inventory a year. The theft probably will never be detected.", "en": "An inventory control clerk at a manufacturing plant has the ability to steal one completed television set from inventory a year. The theft probably will never be detected.", "cmt_tr": ". The amount involved is probably not material.", "cmt_en": ". The amount involved is probably not material."}, {"tr": "An accounts receivable clerk, who approves sales returns and allowances, receives customer remittances and deposits them in the bank. Limited supervision is maintained over the employee.", "en": "An accounts receivable clerk, who approves sales returns and allowances, receives customer remittances and deposits them in the bank. Limited supervision is maintained over the employee.", "cmt_tr": ". Segregation of duties among key functions is an important control procedure. An accounts receivable clerk who is permitted to approve sales returns and allowances and also receive customer remittances could misappropriate funds received and cover the shortage by debiting sales returns and allowances. Limited supervision is insufficient to compensate for lack of segregation of duties.", "cmt_en": ". Segregation of duties among key functions is an important control procedure. An accounts receivable clerk who is permitted to approve sales returns and allowances and also receive customer remittances could misappropriate funds received and cover the shortage by debiting sales returns and allowances. Limited supervision is insufficient to compensate for lack of segregation of duties."}, {"tr": "A clerk in the invoice processing department fails to match a vendor’s invoice with its related receiving report. Checks are not signed unless all appropriate documents are attached to a voucher.", "en": "A clerk in the invoice processing department fails to match a vendor’s invoice with its related receiving report. Checks are not signed unless all appropriate documents are attached to a voucher.", "cmt_tr": ". The requirement for documentation will uncover the oversight.", "cmt_en": ". The requirement for documentation will uncover the oversight."}], "answer": 2}, {"q_tr": "One characteristic of an effective internal control structure is the proper segregation of duties. The combination of responsibilities that would be consistent with the segregation of functional responsibilities is", "q_en": "One characteristic of an effective internal control structure is the proper segregation of duties. The combination of responsibilities that would be consistent with the segregation of functional responsibilities is", "options": [{"tr": "Signing of paychecks and custody of blank payroll checks.", "en": "Signing of paychecks and custody of blank payroll checks.", "cmt_tr": ". Persons with recordkeeping but not custody of assets responsibilities should have access to blank checks, while the duty of signing checks should be assigned to persons (e.g., the chief financial officer) with no recordkeeping function.", "cmt_en": ". Persons with recordkeeping but not custody of assets responsibilities should have access to blank checks, while the duty of signing checks should be assigned to persons (e.g., the chief financial officer) with no recordkeeping function."}, {"tr": "Preparation of paychecks and check distribution.", "en": "Preparation of paychecks and check distribution.", "cmt_tr": ". Payroll preparation and payment to employees should be segregated since they are incompatible recordkeeping and custodianship functions.", "cmt_en": ". Payroll preparation and payment to employees should be segregated since they are incompatible recordkeeping and custodianship functions."}, {"tr": "Approval of time cards and preparation of paychecks.", "en": "Approval of time cards and preparation of paychecks.", "cmt_tr": ". Approval of time cards is an authorization function that is incompatible with the recordkeeping function of preparation of paychecks.", "cmt_en": ". Approval of time cards is an authorization function that is incompatible with the recordkeeping function of preparation of paychecks."}, {"tr": "Timekeeping and preparation of payroll journal entries.", "en": "Timekeeping and preparation of payroll journal entries.", "cmt_tr": ". Combining the timekeeping function and the preparation of the payroll journal entries is not improper because the employee has no access to assets or to employee records in the human resources department. Only through collusion could an embezzlement be perpetrated. Accordingly, the functions of authorization, recordkeeping, and custodianship remain separate.", "cmt_en": ". Combining the timekeeping function and the preparation of the payroll journal entries is not improper because the employee has no access to assets or to employee records in the human resources department. Only through collusion could an embezzlement be perpetrated. Accordingly, the functions of authorization, recordkeeping, and custodianship remain separate."}], "answer": 3}, {"q_tr": "An internal auditor noted that the accounts receivable department is separate from other accounting activities. Credit is approved by a separate credit department. Control accounts and subsidiary ledgers are balanced monthly. Similarly, accounts are aged monthly. The accounts receivable manager writes off delinquent accounts after 1 year, or sooner if a bankruptcy or other unusual circumstances are involved. Credit memoranda are prenumbered and must correlate with receiving reports. Which of the following areas could be viewed as an internal control weakness of the above organization?", "q_en": "An internal auditor noted that the accounts receivable department is separate from other accounting activities. Credit is approved by a separate credit department. Control accounts and subsidiary ledgers are balanced monthly. Similarly, accounts are aged monthly. The accounts receivable manager writes off delinquent accounts after 1 year, or sooner if a bankruptcy or other unusual circumstances are involved. Credit memoranda are prenumbered and must correlate with receiving reports. Which of the following areas could be viewed as an internal control weakness of the above organization?", "options": [{"tr": "Write-offs of delinquent accounts.", "en": "Write-offs of delinquent accounts.", "cmt_tr": ". The accounts receivable manager has the ability to perpetrate irregularities because (s)he performs incompatible functions. Authorization and recording of transactions should be separate. Thus, someone outside the accounts receivable department should authorize write-offs.", "cmt_en": ". The accounts receivable manager has the ability to perpetrate irregularities because (s)he performs incompatible functions. Authorization and recording of transactions should be separate. Thus, someone outside the accounts receivable department should authorize write-offs."}, {"tr": "Credit approvals.", "en": "Credit approvals.", "cmt_tr": ". Credit approval is an authorization function that is properly segregated from the recordkeeping function.", "cmt_en": ". Credit approval is an authorization function that is properly segregated from the recordkeeping function."}, {"tr": "Monthly aging of receivables.", "en": "Monthly aging of receivables.", "cmt_tr": ". Monthly aging is appropriate.", "cmt_en": ". Monthly aging is appropriate."}, {"tr": "Handling of credit memos.", "en": "Handling of credit memos.", "cmt_tr": ". The procedures regarding credit memoranda are standard controls.", "cmt_en": ". The procedures regarding credit memoranda are standard controls."}], "answer": 0}, {"q_tr": "Which of the following controls would prevent the ordering of quantities in excess of an organization’s needs?", "q_en": "Which of the following controls would prevent the ordering of quantities in excess of an organization’s needs?", "options": [{"tr": "Review of all purchase requisitions by a supervisor in the user department prior to submitting them to the purchasing department.", "en": "Review of all purchase requisitions by a supervisor in the user department prior to submitting them to the purchasing department.", "cmt_tr": ". Supervisory review at the originating department level is one means of control over the number of items ordered. This control is an example of the segregation of duties. Authorization should be separate from recordkeeping and asset custody.", "cmt_en": ". Supervisory review at the originating department level is one means of control over the number of items ordered. This control is an example of the segregation of duties. Authorization should be separate from recordkeeping and asset custody."}, {"tr": "Automatic reorder by the purchasing department when low inventory level is indicated by the system.", "en": "Automatic reorder by the purchasing department when low inventory level is indicated by the system.", "cmt_tr": ". Automatic reordering does not consider future plans, which could lead to purchases of excess material.", "cmt_en": ". Automatic reordering does not consider future plans, which could lead to purchases of excess material."}, {"tr": "A policy requiring review of the purchase order before receiving a new shipment.", "en": "A policy requiring review of the purchase order before receiving a new shipment.", "cmt_tr": ". Review of the purchase order before receiving a new shipment is a control for the risk of accepting unordered goods.", "cmt_en": ". Review of the purchase order before receiving a new shipment is a control for the risk of accepting unordered goods."}, {"tr": "A policy requiring agreement of the receiving report and packing slip before storage of new receipts.", "en": "A policy requiring agreement of the receiving report and packing slip before storage of new receipts.", "cmt_tr": ". A policy requiring agreement of the receiving report and packing slip before storage of new receipts is a control over the risk of receiving an amount other than that ordered.", "cmt_en": ". A policy requiring agreement of the receiving report and packing slip before storage of new receipts is a control over the risk of receiving an amount other than that ordered."}], "answer": 0}, {"q_tr": "Checks from customers are received in the organization’s mail room each day. What controls should be in place to safeguard them?", "q_en": "Checks from customers are received in the organization’s mail room each day. What controls should be in place to safeguard them?", "options": [{"tr": "Establishing a separate post office box for customer payments.", "en": "Establishing a separate post office box for customer payments.", "cmt_tr": ". Requiring a specific mail clerk to list and restrictively endorse each check provides more protection than establishing a separate post office box for customer payments.", "cmt_en": ". Requiring a specific mail clerk to list and restrictively endorse each check provides more protection than establishing a separate post office box for customer payments."}, {"tr": "Forwarding all checks to the cashier upon receipt.", "en": "Forwarding all checks to the cashier upon receipt.", "cmt_tr": ". The same person should not both receive and deposit checks.", "cmt_en": ". The same person should not both receive and deposit checks."}, {"tr": "Requiring a specific mail clerk to list and restrictively endorse each check.", "en": "Requiring a specific mail clerk to list and restrictively endorse each check.", "cmt_tr": ". An employee who does not have access to other records should open the mail and prepare a list of checks received. The check listing will later be reconciled with the daily bank deposit and entries to accounts receivable. A restrictive endorsement (“for deposit only”) will put transferees on notice to act accordingly (that is, deposit the check in the organization’s account).", "cmt_en": ". An employee who does not have access to other records should open the mail and prepare a list of checks received. The check listing will later be reconciled with the daily bank deposit and entries to accounts receivable. A restrictive endorsement (“for deposit only”) will put transferees on notice to act accordingly (that is, deposit the check in the organization’s account)."}, {"tr": "Providing bonding protection for mail clerks.", "en": "Providing bonding protection for mail clerks.", "cmt_tr": ". Bonding insures against, but does not directly prevent, losses.", "cmt_en": ". Bonding insures against, but does not directly prevent, losses."}], "answer": 2}, {"q_tr": "The internal auditor recognizes that certain limitations are inherent in any system of internal controls. Which one of the following scenarios is the result of an inherent limitation of internal control?", "q_en": "The internal auditor recognizes that certain limitations are inherent in any system of internal controls. Which one of the following scenarios is the result of an inherent limitation of internal control?", "options": [{"tr": "The comptroller both makes and records cash deposits.", "en": "The comptroller both makes and records cash deposits.", "cmt_tr": ". Segregating the functions of recording and asset custody is customary. That the comptroller both makes and records cash deposits is an avoidable control weakness.", "cmt_en": ". Segregating the functions of recording and asset custody is customary. That the comptroller both makes and records cash deposits is an avoidable control weakness."}, {"tr": "A security guard allows one of the warehouse employees to remove assets from the premises without authorization.", "en": "A security guard allows one of the warehouse employees to remove assets from the premises without authorization.", "cmt_tr": ". Inherent limitations in internal control arise from mistakes in judgment, misunderstandings of instructions, personnel carelessness, distraction, fatigue, collusion, perpetrations by management, changing conditions, and deterioration of degrees of compliance. Thus, a control (use of security guards) based on segregation of functions may be overcome by collusion among two or more employees.", "cmt_en": ". Inherent limitations in internal control arise from mistakes in judgment, misunderstandings of instructions, personnel carelessness, distraction, fatigue, collusion, perpetrations by management, changing conditions, and deterioration of degrees of compliance. Thus, a control (use of security guards) based on segregation of functions may be overcome by collusion among two or more employees."}, {"tr": "The organization sells to customers on account, without credit approval.", "en": "The organization sells to customers on account, without credit approval.", "cmt_tr": ". Transactions can and should be authorized before execution. The fact that the organization sells to customers on account, without credit approval, is an avoidable control weakness.", "cmt_en": ". Transactions can and should be authorized before execution. The fact that the organization sells to customers on account, without credit approval, is an avoidable control weakness."}, {"tr": "An employee who is unable to read is assigned custody of the organization’s computer tape library and run manuals that are used during the third shift.", "en": "An employee who is unable to read is assigned custody of the organization’s computer tape library and run manuals that are used during the third shift.", "cmt_tr": ". Assignment of an unqualified employee is an avoidable control weakness.", "cmt_en": ". Assignment of an unqualified employee is an avoidable control weakness."}], "answer": 1}, {"q_tr": "Which of the following controls would help prevent overpaying a vendor?", "q_en": "Which of the following controls would help prevent overpaying a vendor?", "options": [{"tr": "Reviewing and canceling supporting documents when a check is issued.", "en": "Reviewing and canceling supporting documents when a check is issued.", "cmt_tr": ". Reviewing and canceling the supporting documents prevents paying a vendor twice for the same purchase. If the person who signs the check cancels the required documents, they cannot be recycled in support of a duplicate payment voucher. Securing the paid voucher file from access by the accounts payable clerk is another effective control.", "cmt_en": ". Reviewing and canceling the supporting documents prevents paying a vendor twice for the same purchase. If the person who signs the check cancels the required documents, they cannot be recycled in support of a duplicate payment voucher. Securing the paid voucher file from access by the accounts payable clerk is another effective control."}, {"tr": "Requiring the check signer to mail the check directly to the vendor.", "en": "Requiring the check signer to mail the check directly to the vendor.", "cmt_tr": ". Requiring the check signer to mail the check directly to the vendor would prevent the check from being misappropriated.", "cmt_en": ". Requiring the check signer to mail the check directly to the vendor would prevent the check from being misappropriated."}, {"tr": "Reviewing the accounting distribution for the expenditure.", "en": "Reviewing the accounting distribution for the expenditure.", "cmt_tr": ". Reviewing the accounting distribution for the expenditure would ensure that the expenditure is debited to the proper account(s).", "cmt_en": ". Reviewing the accounting distribution for the expenditure would ensure that the expenditure is debited to the proper account(s)."}, {"tr": "Approving the purchase before ordering from the vendor.", "en": "Approving the purchase before ordering from the vendor.", "cmt_tr": ". Approving the purchase before ordering from the vendor would ensure that only authorized purchases are made.", "cmt_en": ". Approving the purchase before ordering from the vendor would ensure that only authorized purchases are made."}], "answer": 0}, {"q_tr": "A receiving department receives copies of purchase orders for use in identifying and recording inventory receipts. The purchase orders list the name of the vendor and the quantities of the materials ordered. A possible error that this system could allow is", "q_en": "A receiving department receives copies of purchase orders for use in identifying and recording inventory receipts. The purchase orders list the name of the vendor and the quantities of the materials ordered. A possible error that this system could allow is", "options": [{"tr": "Payment to unauthorized vendors.", "en": "Payment to unauthorized vendors.", "cmt_tr": ". Comparing receipts with purchase orders will help detect unauthorized vendors.", "cmt_en": ". Comparing receipts with purchase orders will help detect unauthorized vendors."}, {"tr": "Payment for unauthorized purchases.", "en": "Payment for unauthorized purchases.", "cmt_tr": ". Comparing receipts with purchase orders will help detect unauthorized purchases.", "cmt_en": ". Comparing receipts with purchase orders will help detect unauthorized purchases."}, {"tr": "Overpayment for partial deliveries.", "en": "Overpayment for partial deliveries.", "cmt_tr": ". To ensure a fair count, the copy of the purchase order sent to the receiving clerk should not include quantities. The receiving clerk should count the items in the shipment and prepare a receiving report. Copies are sent to inventory control and accounts payable.", "cmt_en": ". To ensure a fair count, the copy of the purchase order sent to the receiving clerk should not include quantities. The receiving clerk should count the items in the shipment and prepare a receiving report. Copies are sent to inventory control and accounts payable."}, {"tr": "Delay in recording purchases.", "en": "Delay in recording purchases.", "cmt_tr": ". Using purchase orders to identify receipts will not cause a delay in recording purchases.", "cmt_en": ". Using purchase orders to identify receipts will not cause a delay in recording purchases."}], "answer": 2}, {"q_tr": "Which of the following situations will cause an internal auditor to question the adequacy of controls over a purchasing function?", "q_en": "Which of the following situations will cause an internal auditor to question the adequacy of controls over a purchasing function?", "options": [{"tr": "The original and one copy of the purchase order are mailed to the vendor. The copy on which the vendor acknowledges acceptance is returned to the purchasing department.", "en": "The original and one copy of the purchase order are mailed to the vendor. The copy on which the vendor acknowledges acceptance is returned to the purchasing department.", "cmt_tr": ". This practice ensures accurate communication.", "cmt_en": ". This practice ensures accurate communication."}, {"tr": "Receiving reports are forwarded to purchasing where they are matched with purchase orders and sent to accounts payable.", "en": "Receiving reports are forwarded to purchasing where they are matched with purchase orders and sent to accounts payable.", "cmt_tr": ". Purchasing and receiving should be organizationally independent. Moreover, comparing the purchase order and the receiving report should be the responsibility of a third person. Fraud perpetrated by a purchasing department employee could be concealed if (s)he is the first to obtain the receiving report.", "cmt_en": ". Purchasing and receiving should be organizationally independent. Moreover, comparing the purchase order and the receiving report should be the responsibility of a third person. Fraud perpetrated by a purchasing department employee could be concealed if (s)he is the first to obtain the receiving report."}, {"tr": "The accounts payable section prepares documentation for payments.", "en": "The accounts payable section prepares documentation for payments.", "cmt_tr": ". Accounts payable may prepare documentation but should not sign checks.", "cmt_en": ". Accounts payable may prepare documentation but should not sign checks."}, {"tr": "Unpaid voucher files and perpetual inventory records are independently maintained.", "en": "Unpaid voucher files and perpetual inventory records are independently maintained.", "cmt_tr": ". Separately maintaining unpaid vouchers and perpetual inventory records is acceptable.", "cmt_en": ". Separately maintaining unpaid vouchers and perpetual inventory records is acceptable."}], "answer": 1}, {"q_tr": "Which of the following ensures that all inventory shipments are billed to customers?", "q_en": "Which of the following ensures that all inventory shipments are billed to customers?", "options": [{"tr": "Shipping documents are prenumbered and are independently accounted for and matched with sales invoices.", "en": "Shipping documents are prenumbered and are independently accounted for and matched with sales invoices.", "cmt_tr": ". Shipping documents are prepared at the time of shipment. They are prenumbered to facilitate detection of unrecorded shipments. A gap in the sequence of documents may indicate an irregularity. An employee outside the shipping department should account for these documents. Sales invoices are generated by the organization’s computer system at the same time as the shipping documents and should have the same numbers. Thus, every shipping document should be matched with a sales invoice to ensure proper billing.", "cmt_en": ". Shipping documents are prepared at the time of shipment. They are prenumbered to facilitate detection of unrecorded shipments. A gap in the sequence of documents may indicate an irregularity. An employee outside the shipping department should account for these documents. Sales invoices are generated by the organization’s computer system at the same time as the shipping documents and should have the same numbers. Thus, every shipping document should be matched with a sales invoice to ensure proper billing."}, {"tr": "Sales invoices are prenumbered and are independently accounted for and traced to the sales journal.", "en": "Sales invoices are prenumbered and are independently accounted for and traced to the sales journal.", "cmt_tr": ". Accounting for sales invoices alone does not prevent or detect unbilled shipments. Segregating the duties for recording sales transactions and maintaining customer accounts does not ensure that all shipments are invoiced.", "cmt_en": ". Accounting for sales invoices alone does not prevent or detect unbilled shipments. Segregating the duties for recording sales transactions and maintaining customer accounts does not ensure that all shipments are invoiced."}, {"tr": "Duties for recording sales transactions and maintaining customer account balances are separated.", "en": "Duties for recording sales transactions and maintaining customer account balances are separated.", "cmt_tr": "Segregating the duties for recording sales transactions and maintaining customer accounts does not ensure that all shipments are invoiced.", "cmt_en": "Segregating the duties for recording sales transactions and maintaining customer accounts does not ensure that all shipments are invoiced."}, {"tr": "Customer billing complaints are investigated by the controller’s office.", "en": "Customer billing complaints are investigated by the controller’s office.", "cmt_tr": ". Customers who are not billed may not notify the organization.", "cmt_en": ". Customers who are not billed may not notify the organization."}], "answer": 0}, {"q_tr": "If internal control is well designed, two tasks that should be performed by different persons are", "q_en": "If internal control is well designed, two tasks that should be performed by different persons are", "options": [{"tr": "Approval of bad debt write-offs, and reconciliation of the accounts payable subsidiary ledger and controlling account.", "en": "Approval of bad debt write-offs, and reconciliation of the accounts payable subsidiary ledger and controlling account.", "cmt_tr": ". There is no conflict between writing off bad debts (accounts receivable) and reconciling accounts payable, which are liabilities.", "cmt_en": ". There is no conflict between writing off bad debts (accounts receivable) and reconciling accounts payable, which are liabilities."}, {"tr": "Distribution of payroll checks and approval of sales returns for credit.", "en": "Distribution of payroll checks and approval of sales returns for credit.", "
