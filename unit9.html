 to issue small tools.", "en": "Move the small tools inventory to the custody of the production inventory staging superintendent and implement the use of a special requisition to issue small tools.", "cmt_tr": ". Minimizing the loss of assets requires a preventive control. Giving responsibility for custody of small tools to one individual establishes accountability. Requiring that requisitions be submitted ensures that their use is properly authorized.", "cmt_en": ". Minimizing the loss of assets requires a preventive control. Giving responsibility for custody of small tools to one individual establishes accountability. Requiring that requisitions be submitted ensures that their use is properly authorized."}, {"tr": "Initiate a full physical inventory of small tools on a monthly basis.", "en": "Initiate a full physical inventory of small tools on a monthly basis.", "cmt_tr": ". A full physical inventory of small tools on a monthly basis is a periodic, detective control that is effective only in determining the amount of losses.", "cmt_en": ". A full physical inventory of small tools on a monthly basis is a periodic, detective control that is effective only in determining the amount of losses."}, {"tr": "Place supply of small tools in a secured area, install a key-access card system for all employees, and record each key-access transaction on a report for the production superintendent.", "en": "Place supply of small tools in a secured area, install a key-access card system for all employees, and record each key-access transaction on a report for the production superintendent.", "cmt_tr": ". Placing small tools in a secured area, installing a key-access system, and recording access transactions are preventive and detective controls but do not record the amount of tools removed from the inventory.", "cmt_en": ". Placing small tools in a secured area, installing a key-access system, and recording access transactions are preventive and detective controls but do not record the amount of tools removed from the inventory."}, {"tr": "Close the exit to the employee parking lot and require all plant employees to use a doorway by the receiving dock that also provides access to the plant employees’ parking area.", "en": "Close the exit to the employee parking lot and require all plant employees to use a doorway by the receiving dock that also provides access to the plant employees’ parking area.", "cmt_tr": ". Closing the exit to the employee parking lot does not limit access to the small tools inventory.", "cmt_en": ". Closing the exit to the employee parking lot does not limit access to the small tools inventory."}], "answer": 0}, {"q_tr": "Obsolete or scrap materials are charged to a predefined project number. The materials are segregated into specified bin locations and eventually transported to a public auction for sale. To reduce the risks associated with this process, an organization should employ which of the following procedures?", "q_en": "Obsolete or scrap materials are charged to a predefined project number. The materials are segregated into specified bin locations and eventually transported to a public auction for sale. To reduce the risks associated with this process, an organization should employ which of the following procedures?", "options": [{"tr": "Permit employees to purchase obsolete or scrap materials prior to an auction.", "en": "Permit employees to purchase obsolete or scrap materials prior to an auction.", "cmt_tr": ". Permitting employees to purchase obsolete or scrap materials prior to auction provides even more incentive for misappropriation.", "cmt_en": ". Permitting employees to purchase obsolete or scrap materials prior to auction provides even more incentive for misappropriation."}, {"tr": "Require managerial approval for materials to be declared scrap or obsolete.", "en": "Require managerial approval for materials to be declared scrap or obsolete.", "cmt_tr": ". A preventive control is needed. Management approval for materials to be declared scrap or obsolete reduces the risk of misappropriation. Otherwise, materials may be more easily misclassified.", "cmt_en": ". A preventive control is needed. Management approval for materials to be declared scrap or obsolete reduces the risk of misappropriation. Otherwise, materials may be more easily misclassified."}, {"tr": "Limit obsolete or scrap material to a pre-approved buyer.", "en": "Limit obsolete or scrap material to a pre-approved buyer.", "cmt_tr": ". Limiting obsolete or scrap materials sales to a pre-approved buyer does not mitigate the risk of misappropriation before the material are sold.", "cmt_en": ". Limiting obsolete or scrap materials sales to a pre-approved buyer does not mitigate the risk of misappropriation before the material are sold."}, {"tr": "Require that the auction house not be paid a commission.", "en": "Require that the auction house not be paid a commission.", "cmt_tr": ". Specifying that a commission be paid to the auction firm creates an incentive to maximize the organization’s return.", "cmt_en": ". Specifying that a commission be paid to the auction firm creates an incentive to maximize the organization’s return."}], "answer": 1}, {"q_tr": "Requests for purchases beyond those initially budgeted must be approved by the marketing manager. This procedure", "q_en": "Requests for purchases beyond those initially budgeted must be approved by the marketing manager. This procedure", "options": [{"tr": "Should provide the most efficient allocation of scarce organizational resources.", "en": "Should provide the most efficient allocation of scarce organizational resources.", "cmt_tr": ". The organization has two scarce resources to allocate: its purchasing budget and the space available in its retail stores. The marketing manager is high enough in the organization to coordinate this allocation. Allowing individual product managers to approve their own requests to exceed budget would almost certainly result in misallocation.", "cmt_en": ". The organization has two scarce resources to allocate: its purchasing budget and the space available in its retail stores. The marketing manager is high enough in the organization to coordinate this allocation. Allowing individual product managers to approve their own requests to exceed budget would almost certainly result in misallocation."}, {"tr": "Is unnecessary because each product manager is evaluated on profit generated.", "en": "Is unnecessary because each product manager is evaluated on profit generated.", "cmt_tr": ". The gross profit evaluation is effective in evaluating product managers, but it does not necessarily restrain excess spending.", "cmt_en": ". The gross profit evaluation is effective in evaluating product managers, but it does not necessarily restrain excess spending."}, {"tr": "Is a detective control.", "en": "Is a detective control.", "cmt_tr": ". Approval by the marketing manager is a preventive control, which deters undesirable events from occurring. A detective control detects and corrects undesirable events that have occurred.", "cmt_en": ". Approval by the marketing manager is a preventive control, which deters undesirable events from occurring. A detective control detects and corrects undesirable events that have occurred."}, {"tr": "Is a corrective control.", "en": "Is a corrective control.", "cmt_tr": ". Approval by the marketing manager is a preventive control, which deters undesirable events from occurring. A corrective control corrects negative effects of unwanted events.", "cmt_en": ". Approval by the marketing manager is a preventive control, which deters undesirable events from occurring. A corrective control corrects negative effects of unwanted events."}], "answer": 0}, {"q_tr": "The internal auditor is considering making a recommendation about appropriate controls to address a potential problem of fictitious recipients. The internal auditor has identified the following control procedures as potential items to include in the recommendation. • Require that all additions to the recipient file be independently investigated and approved by a supervisor of the social workers. • Require the use of self-checking digits on the account numbers of all recipients so that any duplicates will be immediately noted by the system. • Incorporate a code into the computer program to search for duplicate names and addresses. Develop an exception report that will go to the section supervisor whenever duplicates are noted. • Require that social workers be rotated among recipients. The internal auditor’s supervisor has reviewed the identified controls and tells the auditor that one of the controls would not be effective in improving control over valid recipients. Which one of the identified controls would be ineffective?", "q_en": "The internal auditor is considering making a recommendation about appropriate controls to address a potential problem of fictitious recipients. The internal auditor has identified the following control procedures as potential items to include in the recommendation. • Require that all additions to the recipient file be independently investigated and approved by a supervisor of the social workers. • Require the use of self-checking digits on the account numbers of all recipients so that any duplicates will be immediately noted by the system. • Incorporate a code into the computer program to search for duplicate names and addresses. Develop an exception report that will go to the section supervisor whenever duplicates are noted. • Require that social workers be rotated among recipients. The internal auditor’s supervisor has reviewed the identified controls and tells the auditor that one of the controls would not be effective in improving control over valid recipients. Which one of the identified controls would be ineffective?", "options": [{"tr": "Require the use of self-checking digits on the account numbers of all recipients so that any duplicates will be immediately noted by the system.", "en": "Require the use of self-checking digits on the account numbers of all recipients so that any duplicates will be immediately noted by the system.", "cmt_tr": ". Under these facts, an effective control assists in preventing or detecting payments to fictitious recipients. Although fictitious recipients could be created by using duplicate accounts, the use of self-checking digits on the account numbers is not a control that prevents or detects duplicate accounts. Rather, self-checking digits are online input controls used to detect incorrect identification numbers. Consequently, this control is ineffective in preventing or detecting fictitious recipients.", "cmt_en": ". Under these facts, an effective control assists in preventing or detecting payments to fictitious recipients. Although fictitious recipients could be created by using duplicate accounts, the use of self-checking digits on the account numbers is not a control that prevents or detects duplicate accounts. Rather, self-checking digits are online input controls used to detect incorrect identification numbers. Consequently, this control is ineffective in preventing or detecting fictitious recipients."}, {"tr": "Require that social workers be rotated among recipients.", "en": "Require that social workers be rotated among recipients.", "cmt_tr": ". Rotating social workers among recipients is an effective control to prevent or detect fictitious recipients because each succeeding social worker will likely verify whether the new recipients under his or her direction are valid.", "cmt_en": ". Rotating social workers among recipients is an effective control to prevent or detect fictitious recipients because each succeeding social worker will likely verify whether the new recipients under his or her direction are valid."}, {"tr": "Incorporate a code into the computer program to search for duplicate names and addresses and develop an exception report that will go to the supervisor.", "en": "Incorporate a code into the computer program to search for duplicate names and addresses and develop an exception report that will go to the supervisor.", "cmt_tr": ". A programmed control that searches for and reports exceptions (e.g., duplicate names and addresses) detects payments to multiple recipients at a single or a few addresses and therefore also is an effective control.", "cmt_en": ". A programmed control that searches for and reports exceptions (e.g., duplicate names and addresses) detects payments to multiple recipients at a single or a few addresses and therefore also is an effective control."}, {"tr": "Require that all additions to the recipient file be independently investigated and approved by a supervisor of the social workers.", "en": "Require that all additions to the recipient file be independently investigated and approved by a supervisor of the social workers.", "cmt_tr": ". Under these facts, an effective control assists in preventing or detecting payments to fictitious recipients. Requiring a social worker supervisor to investigate and approve all additions to the recipient file assists in preventing a social worker from adding fictitious recipients.", "cmt_en": ". Under these facts, an effective control assists in preventing or detecting payments to fictitious recipients. Requiring a social worker supervisor to investigate and approve all additions to the recipient file assists in preventing a social worker from adding fictitious recipients."}], "answer": 0}, {"q_tr": "To minimize the risk that agents in the purchasing department will use their positions for personal gain, the organization should", "q_en": "To minimize the risk that agents in the purchasing department will use their positions for personal gain, the organization should", "options": [{"tr": "Rotate purchasing agent assignments periodically.", "en": "Rotate purchasing agent assignments periodically.", "cmt_tr": ". The risk of favoritism is increased when buyers have long-term relationships with specific vendors. Periodic rotation of buyer assignments will limit the opportunity to show favoritism. This risk is also reduced if buyers are required to take vacations.", "cmt_en": ". The risk of favoritism is increased when buyers have long-term relationships with specific vendors. Periodic rotation of buyer assignments will limit the opportunity to show favoritism. This risk is also reduced if buyers are required to take vacations."}, {"tr": "Request internal auditors to confirm selected purchases and accounts payable.", "en": "Request internal auditors to confirm selected purchases and accounts payable.", "cmt_tr": ". Confirmation does not enable internal auditors to detect inappropriate benefits received by purchasing agents or deter long-term relationships.", "cmt_en": ". Confirmation does not enable internal auditors to detect inappropriate benefits received by purchasing agents or deter long-term relationships."}, {"tr": "Specify that all items purchased must pass value-per-unit-of-cost reviews.", "en": "Specify that all items purchased must pass value-per-unit-of-cost reviews.", "cmt_tr": ". Value-per-unit-of-cost reviews could be helpful in ensuring a certain level of value received for price paid but do not directly focus on receipt of inappropriate benefits by purchasing agents.", "cmt_en": ". Value-per-unit-of-cost reviews could be helpful in ensuring a certain level of value received for price paid but do not directly focus on receipt of inappropriate benefits by purchasing agents."}, {"tr": "Direct the purchasing department to maintain records on purchase prices paid, with review of such being required each 6 months.", "en": "Direct the purchasing department to maintain records on purchase prices paid, with review of such being required each 6 months.", "cmt_tr": ". Review of records every 6 months does not enable the organization to detect receipt of inappropriate benefits by an agent or deter relationships that could lead to such activity.", "cmt_en": ". Review of records every 6 months does not enable the organization to detect receipt of inappropriate benefits by an agent or deter relationships that could lead to such activity."}], "answer": 0}, {"q_tr": "When a supplier of office products is unable to fill an order completely, it marks the out-of- stock items as back ordered on the customer’s order and enters these items in a back order file that management can view or print. Customers are becoming disgruntled with the supplier because it seems unable to keep track of and ship out-of-stock items as soon as they are available. The best approach for ensuring prompt delivery of out-of-stock items is to", "q_en": "When a supplier of office products is unable to fill an order completely, it marks the out-of- stock items as back ordered on the customer’s order and enters these items in a back order file that management can view or print. Customers are becoming disgruntled with the supplier because it seems unable to keep track of and ship out-of-stock items as soon as they are available. The best approach for ensuring prompt delivery of out-of-stock items is to", "options": [{"tr": "Match the back order file to goods received daily.", "en": "Match the back order file to goods received daily.", "cmt_tr": ". A directive control is designed to cause or encourage the occurrence of a desirable event. For example, matching the back order file with goods received daily is the surest way of facilitating prompt delivery of out-of-stock items.", "cmt_en": ". A directive control is designed to cause or encourage the occurrence of a desirable event. For example, matching the back order file with goods received daily is the surest way of facilitating prompt delivery of out-of-stock items."}, {"tr": "Increase inventory levels to minimize the number of times that out-of-stock conditions occur.", "en": "Increase inventory levels to minimize the number of times that out-of-stock conditions occur.", "cmt_tr": ". An increase in inventory minimizes out-of-stock conditions but has no effect on tracking and shipping goods as soon as they are available.", "cmt_en": ". An increase in inventory minimizes out-of-stock conditions but has no effect on tracking and shipping goods as soon as they are available."}, {"tr": "Implement electronic data interchange with supply vendors to decrease the time to replenish inventory.", "en": "Implement electronic data interchange with supply vendors to decrease the time to replenish inventory.", "cmt_tr": ". More efficient replenishment of its own inventory has no effect on tracking and shipping goods as soon as they are available.", "cmt_en": ". More efficient replenishment of its own inventory has no effect on tracking and shipping goods as soon as they are available."}, {"tr": "Reconcile the sum of filled and back orders with the total of all orders placed daily.", "en": "Reconcile the sum of filled and back orders with the total of all orders placed daily.", "cmt_tr": ". Reconciling the sum of filled and back orders with the total of all orders placed daily ensures that orders were either filled or back ordered but will not affect delivery of the items that are out of stock.", "cmt_en": ". Reconciling the sum of filled and back orders with the total of all orders placed daily ensures that orders were either filled or back ordered but will not affect delivery of the items that are out of stock."}], "answer": 0}, {"q_tr": "Which of the following observations by an auditor is most likely to indicate the existence of control weaknesses over safeguarding of assets?", "q_en": "Which of the following observations by an auditor is most likely to indicate the existence of control weaknesses over safeguarding of assets?", "options": [{"tr": "The company uses a just-in-time inventory system.", "en": "The company uses a just-in-time inventory system.", "cmt_tr": ". Using a just-in-time (JIT) inventory system does not indicate the existence of control weaknesses over safeguarding of assets.", "cmt_en": ". Using a just-in-time (JIT) inventory system does not indicate the existence of control weaknesses over safeguarding of assets."}, {"tr": "A service department’s location is not well suited to allow adequate service to other units.", "en": "A service department’s location is not well suited to allow adequate service to other units.", "cmt_tr": ". A service department’s location concerns achieving organizational objectives, not safeguarding of assets.", "cmt_en": ". A service department’s location concerns achieving organizational objectives, not safeguarding of assets."}, {"tr": "Managers do not have access to reports that profile overall performance in relation to other benchmarked organizations.", "en": "Managers do not have access to reports that profile overall performance in relation to other benchmarked organizations.", "cmt_tr": ". Managers not having access to reports profiling overall performance concerns achieving organizational objectives.", "cmt_en": ". Managers not having access to reports profiling overall performance concerns achieving organizational objectives."}, {"tr": "Employees hired for sensitive positions are not subjected to background checks.", "en": "Employees hired for sensitive positions are not subjected to background checks.", "cmt_tr": ". Internal auditors evaluate risk exposures and the adequacy and effectiveness of controls relating to, among other things, safeguarding of assets. Lack of background checks for employees hired for sensitive positions and failure to take corrective action on past engagement observations relating to safeguarding of assets are red flags signifying control weaknesses. Regular reference and background checks, integrity tests, and drug screening are hiring procedures that may be part of an effective ethical culture.", "cmt_en": ". Internal auditors evaluate risk exposures and the adequacy and effectiveness of controls relating to, among other things, safeguarding of assets. Lack of background checks for employees hired for sensitive positions and failure to take corrective action on past engagement observations relating to safeguarding of assets are red flags signifying control weaknesses. Regular reference and background checks, integrity tests, and drug screening are hiring procedures that may be part of an effective ethical culture."}], "answer": 3}, {"q_tr": "Appropriate internal control for a multinational corporation’s branch office that has a monetary transfer unit requires that", "q_en": "Appropriate internal control for a multinational corporation’s branch office that has a monetary transfer unit requires that", "options": [{"tr": "The individual who initiates wire transfers not reconcile the bank statement.", "en": "The individual who initiates wire transfers not reconcile the bank statement.", "cmt_tr": ". A control is any action taken by management to enhance the likelihood that established goals and objectives will be achieved. Controls include segregation of duties to reduce the risk that any person may be able to perpetrate and conceal errors or fraud in the normal course of his or her duties. Different persons should authorize transactions, record transactions, and maintain custody of the assets associated with the transaction. Independent reconciliation of bank accounts is necessary for good internal control.", "cmt_en": ". A control is any action taken by management to enhance the likelihood that established goals and objectives will be achieved. Controls include segregation of duties to reduce the risk that any person may be able to perpetrate and conceal errors or fraud in the normal course of his or her duties. Different persons should authorize transactions, record transactions, and maintain custody of the assets associated with the transaction. Independent reconciliation of bank accounts is necessary for good internal control."}, {"tr": "The branch manager receive all wire transfers.", "en": "The branch manager receive all wire transfers.", "cmt_tr": ". Having the branch manager receive all wire transfers is not an important internal control consideration.", "cmt_en": ". Having the branch manager receive all wire transfers is not an important internal control consideration."}, {"tr": "Foreign currency rates be computed separately by two different employees.", "en": "Foreign currency rates be computed separately by two different employees.", "cmt_tr": ". Foreign currency translation rates are verified, not computed. Having two employees in the same department perform the same task will not significantly enhance internal control.", "cmt_en": ". Foreign currency translation rates are verified, not computed. Having two employees in the same department perform the same task will not significantly enhance internal control."}, {"tr": "Corporate management approve the hiring of monetary transfer unit employees.", "en": "Corporate management approve the hiring of monetary transfer unit employees.", "cmt_tr": ". Corporate management approval of hiring monetary transfer unit employees is not an important internal control consideration.", "cmt_en": ". Corporate management approval of hiring monetary transfer unit employees is not an important internal control consideration."}], "answer": 0}, {"q_tr": "An internal auditor is assigned to perform an engagement to evaluate the organization’s insurance program, including the appropriateness of the approach to minimizing risks. The organization self-insures against large casualty losses and health benefits provided for all its employees. The organization is a large national firm with over 15,000 employees located in various parts of the country. It uses an outside claims processor to administer its healthcare program. The organization’s medical costs have been rising by approximately 8% per year for the past 5 years, and management is concerned with controlling these costs. The healthcare processor wishes to implement controls that would help prevent fraud by dentists who are submitting billings for services not provided. Assume further that all the claims are submitted electronically to the healthcare processor. Which of the following control procedures would be the most effective?", "q_en": "An internal auditor is assigned to perform an engagement to evaluate the organization’s insurance program, including the appropriateness of the approach to minimizing risks. The organization self-insures against large casualty losses and health benefits provided for all its employees. The organization is a large national firm with over 15,000 employees located in various parts of the country. It uses an outside claims processor to administer its healthcare program. The organization’s medical costs have been rising by approximately 8% per year for the past 5 years, and management is concerned with controlling these costs. The healthcare processor wishes to implement controls that would help prevent fraud by dentists who are submitting billings for services not provided. Assume further that all the claims are submitted electronically to the healthcare processor. Which of the following control procedures would be the most effective?", "options": [{"tr": "Develop a program that identifies procedures performed on an individual in excess of expectations based on the age of the employee, whether a similar procedure was performed recently, or the average cost per claim.", "en": "Develop a program that identifies procedures performed on an individual in excess of expectations based on the age of the employee, whether a similar procedure was performed recently, or the average cost per claim.", "cmt_tr": ". Under this detective control, unusual claims could be identified and followed up to determine if they are legitimate. This control is a type of IT input control known as a reasonableness test.", "cmt_en": ". Under this detective control, unusual claims could be identified and followed up to determine if they are legitimate. This control is a type of IT input control known as a reasonableness test."}, {"tr": "Require all submitted claims to be accompanied by a signed statement by the dentist testifying that the claimed procedures were performed.", "en": "Require all submitted claims to be accompanied by a signed statement by the dentist testifying that the claimed procedures were performed.", "cmt_tr": ". Requiring a signed statement does not prevent the dentist from filing a false claim.", "cmt_en": ". Requiring a signed statement does not prevent the dentist from filing a false claim."}, {"tr": "Send confirmations to the dentists requesting them to confirm the exact nature of the claims submitted to the healthcare processor.", "en": "Send confirmations to the dentists requesting them to confirm the exact nature of the claims submitted to the healthcare processor.", "cmt_tr": ". Sending confirmations to the dentists does not prevent the filing of false claims or a false response to the confirmation.", "cmt_en": ". Sending confirmations to the dentists does not prevent the filing of false claims or a false response to the confirmation."}, {"tr": "Develop an integrated test facility and submit false claims to verify that the system is detecting such claims on a consistent basis.", "en": "Develop an integrated test facility and submit false claims to verify that the system is detecting such claims on a consistent basis.", "cmt_tr": ". An integrated test facility would only provide information about the correctness of the processing of the claim or a false response to the confirmation, not on the propriety of the claim.", "cmt_en": ". An integrated test facility would only provide information about the correctness of the processing of the claim or a false response to the confirmation, not on the propriety of the claim."}], "answer": 0}, {"q_tr": "An internal auditor is reviewing the organization’s policy regarding investing in financial derivatives. Which of the following combination of policies is likely to be the most effective?", "q_en": "An internal auditor is reviewing the organization’s policy regarding investing in financial derivatives. Which of the following combination of policies is likely to be the most effective?", "options": [{"tr": "A statement indicating the purpose of the derivatives, authorization limits for the amount and types of derivatives, and specific limits for individual traders.", "en": "A statement indicating the purpose of the derivatives, authorization limits for the amount and types of derivatives, and specific limits for individual traders.", "cmt_tr": ". A policy specifying whether derivatives are to be used for hedging or speculating is a crucial directive control. Authorization limits for the amounts and types of derivatives as well as for individual traders are also appropriate and important controls.", "cmt_en": ". A policy specifying whether derivatives are to be used for hedging or speculating is a crucial directive control. Authorization limits for the amounts and types of derivatives as well as for individual traders are also appropriate and important controls."}, {"tr": "A specific authorization limit for the amount and types of derivatives and specific limits for individual traders.", "en": "A specific authorization limit for the amount and types of derivatives and specific limits for individual traders.", "cmt_tr": ". A policy specifying the authorization limits for derivatives and for individual traders are appropriate, but specifying the purpose of the derivatives (hedging or speculation) is also important.", "cmt_en": ". A policy specifying the authorization limits for derivatives and for individual traders are appropriate, but specifying the purpose of the derivatives (hedging or speculation) is also important."}, {"tr": "A specific limit on the amount authorized for any single trader and a statement requiring board review of each transaction.", "en": "A specific limit on the amount authorized for any single trader and a statement requiring board review of each transaction.", "cmt_tr": ". A policy specifying the authorization limits for derivatives is an appropriate directive control. However, a policy requiring board review of every derivatives transaction is cost ineffective.", "cmt_en": ". A policy specifying the authorization limits for derivatives is an appropriate directive control. However, a policy requiring board review of every derivatives transaction is cost ineffective."}, {"tr": "A statement requiring board review of each transaction and authorization limits for the amount and types of derivatives.", "en": "A statement requiring board review of each transaction and authorization limits for the amount and types of derivatives.", "cmt_tr": ". A policy requiring board review of every derivatives transaction is cost ineffective. Management is responsible for daily operations and is expected to conform to the policies of the board.", "cmt_en": ". A policy requiring board review of every derivatives transaction is cost ineffective. Management is responsible for daily operations and is expected to conform to the policies of the board."}], "answer": 0}, {"q_tr": "A rental car agency’s fleet maintenance division uses a different code for each type of inventory transaction. A daily summary report lists activity by part number and transaction code. The report is reconciled by the parts room supervisor to the day’s material request forms and is then forwarded to the fleet manager for approval. The reconciliation of the summary report to the day’s material request forms by the parts room supervisor", "q_en": "A rental car agency’s fleet maintenance division uses a different code for each type of inventory transaction. A daily summary report lists activity by part number and transaction code. The report is reconciled by the parts room supervisor to the day’s material request forms and is then forwarded to the fleet manager for approval. The reconciliation of the summary report to the day’s material request forms by the parts room supervisor", "options": [{"tr": "Verifies that all material request forms were approved.", "en": "Verifies that all material request forms were approved.", "cmt_tr": ". This reconciliation would not necessarily include a review of authorizations.", "cmt_en": ". This reconciliation would not necessarily include a review of authorizations."}, {"tr": "Provides documentation as to what material was available for a specific transaction.", "en": "Provides documentation as to what material was available for a specific transaction.", "cmt_tr": ". The material available for a specific transaction is not part of the reconciliation.", "cmt_en": ". The material available for a specific transaction is not part of the reconciliation."}, {"tr": "Confirms that all material request forms are entered for all parts issued.", "en": "Confirms that all material request forms are entered for all parts issued.", "cmt_tr": ". Not all request forms may have been submitted.", "cmt_en": ". Not all request forms may have been submitted."}, {"tr": "Ensures the accuracy and completeness of data input.", "en": "Ensures the accuracy and completeness of data input.", "cmt_tr": ". This reconciliation is an input control to verify that data entry is accurate and complete. The parts requested should be consistent with the parts used in the maintenance activities. Unexplained variances should be investigated.", "cmt_en": ". This reconciliation is an input control to verify that data entry is accurate and complete. The parts requested should be consistent with the parts used in the maintenance activities. Unexplained variances should be investigated."}], "answer": 3}, {"q_tr": "During an engagement involving a construction contract, the internal auditor discovered that the contractor was being paid for each ton of dirt removed. The contract called for payment based on cubic yards removed. Which internal control might have prevented this error?", "q_en": "During an engagement involving a construction contract, the internal auditor discovered that the contractor was being paid for each ton of dirt removed. The contract called for payment based on cubic yards removed. Which internal control might have prevented this error?", "options": [{"tr": "Comparison of invoices with purchase orders or contracts.", "en": "Comparison of invoices with purchase orders or contracts.", "cmt_tr": ". Comparison of invoices with purchase orders or contracts is a detective control to detect that the contractor’s invoice used a unit of measure different from that in the contract. Thus, the basis of payment was inconsistent with the unit-price contract.", "cmt_en": ". Comparison of invoices with purchase orders or contracts is a detective control to detect that the contractor’s invoice used a unit of measure different from that in the contract. Thus, the basis of payment was inconsistent with the unit-price contract."}, {"tr": "Comparison of invoices with receiving reports.", "en": "Comparison of invoices with receiving reports.", "cmt_tr": ". The dirt removed would not have been received by the organization. Hence, no receiving reports would have existed.", "cmt_en": ". The dirt removed would not have been received by the organization. Hence, no receiving reports would have existed."}, {"tr": "Comparison of actual costs with budgeted costs.", "en": "Comparison of actual costs with budgeted costs.", "cmt_tr": ". This comparison would not have detected the specific reason for a variance.", "cmt_en": ". This comparison would not have detected the specific reason for a variance."}, {"tr": "Extension checks of invoice amounts.", "en": "Extension checks of invoice amounts.", "cmt_tr": ". The problem was not a mathematical error but an erroneous basis for payment.", "cmt_en": ". The problem was not a mathematical error but an erroneous basis for payment."}], "answer": 0}, {"q_tr": "During an engagement involving a purchasing department, an internal auditor discovered that many purchases were made (at normal prices) from an office supplier whose owner was the brother of the director of purchasing. Controls were in place to restrict such purchases and no fraud appears to have been committed. In this case, the internal auditor should recommend", "q_en": "During an engagement involving a purchasing department, an internal auditor discovered that many purchases were made (at normal prices) from an office supplier whose owner was the brother of the director of purchasing. Controls were in place to restrict such purchases and no fraud appears to have been committed. In this case, the internal auditor should recommend", "options": [{"tr": "The development of an approved-vendor file initiated by the buyer and approved by the director of purchasing.", "en": "The development of an approved-vendor file initiated by the buyer and approved by the director of purchasing.", "cmt_tr": ". An approved-vendor file approved by the director would not prevent a conflict of interest.", "cmt_en": ". An approved-vendor file approved by the director would not prevent a conflict of interest."}, {"tr": "Establishment of a price policy (range) for all goods.", "en": "Establishment of a price policy (range) for all goods.", "cmt_tr": ". Price is not a factor when dealing with conflicts of interest.", "cmt_en": ". Price is not a factor when dealing with conflicts of interest."}, {"tr": "The initiation of a conflict-of-interest policy.", "en": "The initiation of a conflict-of-interest policy.", "cmt_tr": ". A policy is one means of achieving control. It is a general guide to and limit on action that should be clearly stated in writing and systematically communicated to appropriate parties. A conflict-of-interest policy should contain directives that restrict business dealings with relatives unless otherwise disclosed to and approved by senior management.", "cmt_en": ". A policy is one means of achieving control. It is a general guide to and limit on action that should be clearly stated in writing and systematically communicated to appropriate parties. A conflict-of-interest policy should contain directives that restrict business dealings with relatives unless otherwise disclosed to and approved by senior management."}, {"tr": "The inspection of all receipts by receiving inspectors.", "en": "The inspection of all receipts by receiving inspectors.", "cmt_tr": ". The inspection of all receipts by receiving inspectors is an appropriate receiving control that does not pertain to this situation.", "cmt_en": ". The inspection of all receipts by receiving inspectors is an appropriate receiving control that does not pertain to this situation."}], "answer": 2}, {"q_tr": "Which of the following policies and procedures is consistent with effective administration of the insurance function?", "q_en": "Which of the following policies and procedures is consistent with effective administration of the insurance function?", "options": [{"tr": "Billings for insurance coverage are received and payments disbursed by the insurance manager.", "en": "Billings for insurance coverage are received and payments disbursed by the insurance manager.", "cmt_tr": ". The manager has too many responsibilities; there is no separation of duties. The receipt of billings and the disbursement of payments should be done by different people.", "cmt_en": ". The manager has too many responsibilities; there is no separation of duties. The receipt of billings and the disbursement of payments should be done by different people."}, {"tr": "Policy coverages are adjusted each year by applying a price index to previous year coverages.", "en": "Policy coverages are adjusted each year by applying a price index to previous year coverages.", "cmt_tr": ". While policy coverages should be systematically evaluated each year to assure appropriate coverage, mere adjustment for inflation is not adequate to determine the degree of risk that should be insured.", "cmt_en": ". While policy coverages should be systematically evaluated each year to assure appropriate coverage, mere adjustment for inflation is not adequate to determine the degree of risk that should be insured."}, {"tr": "Final settlements are negotiated after claims are developed and submitted.", "en": "Final settlements are negotiated after claims are developed and submitted.", "cmt_tr": ". The claims handling process begins with prompt reporting by the affected operational unit of the organization of any basis for a claim. Prompt reporting is required to permit the insurer to take whatever steps it may deem necessary to reduce the ultimate compensable loss. The insurance function then cooperates with the operational unit to document and formally submit the claim to the carrier. Subsequently, the insurance function will be involved in any required review of the claim and negotiation of a settlement.", "cmt_en": ". The claims handling process begins with prompt reporting by the affected operational unit of the organization of any basis for a claim. Prompt reporting is required to permit the insurer to take whatever steps it may deem necessary to reduce the ultimate compensable loss. The insurance function then cooperates with the operational unit to document and formally submit the claim to the carrier. Subsequently, the insurance function will be involved in any required review of the claim and negotiation of a settlement."}, {"tr": "Policies are always placed with the carrier that offers the lowest rate for a specified level of coverage.", "en": "Policies are always placed with the carrier that offers the lowest rate for a specified level of coverage.", "cmt_tr": ". Prudence dictates that other factors, e.g., the financial resources of the carrier and the fairness and efficiency of claims handling, be considered in addition to rates.", "cmt_en": ". Prudence dictates that other factors, e.g., the financial resources of the carrier and the fairness and efficiency of claims handling, be considered in addition to rates."}], "answer": 2}, {"q_tr": "An employee should not be able to visit the organization’s safe deposit box containing investment securities without being accompanied by another employee. What would be a possible consequence of an employee being able to visit the safe deposit box unaccompanied?", "q_en": "An employee should not be able to visit the organization’s safe deposit box containing investment securities without being accompanied by another employee. What would be a possible consequence of an employee being able to visit the safe deposit box unaccompanied?", "options": [{"tr": "The employee could pledge organizational investments as security for a short-term personal bank loan.", "en": "The employee could pledge organizational investments as security for a short-term personal bank loan.", "cmt_tr": ". The bank should maintain a record, which can be inspected by organizational personnel, of all safe deposit box visits. Access should be limited to authorized officers. Organizations typically require the presence of two authorized persons for access to the box. This precaution provides supervisory control over, for example, the temporary removal of the securities to serve as a pledge for a loan (hypothecation of securities).", "cmt_en": ". The bank should maintain a record, which can be inspected by organizational personnel, of all safe deposit box visits. Access should be limited to authorized officers. Organizations typically require the presence of two authorized persons for access to the box. This precaution provides supervisory control over, for example, the temporary removal of the securities to serve as a pledge for a loan (hypothecation of securities)."}, {"tr": "The employee could steal securities and the theft would never be discovered.", "en": "The employee could steal securities and the theft would never be discovered.", "cmt_tr": ". An engagement involving investment securities would eventually uncover an outright theft assuming no alteration of the asset records.", "cmt_en": ". An engagement involving investment securities would eventually uncover an outright theft assuming no alteration of the asset records."}, {"tr": "It would be impossible to obtain a fidelity bond on the employee.", "en": "It would be impossible to obtain a fidelity bond on the employee.", "cmt_tr": ". Obtaining a fidelity bond is contingent upon the character of the employee, not the presence of a specific control.", "cmt_en": ". Obtaining a fidelity bond is contingent upon the character of the employee, not the presence of a specific control."}, {"tr": "There would be no record of when organizational personnel visited the safe deposit box.", "en": "There would be no record of when organizational personnel visited the safe deposit box.", "cmt_tr": ". The bank maintains a record of visits.", "cmt_en": ". The bank maintains a record of visits."}], "answer": 0}, {"q_tr": "One of two office clerks in a small organization prepares a sales invoice; however, the invoice is incorrectly entered by the bookkeeper in the general ledger and the accounts receivable subsidiary ledger for a smaller amount resulting from a transposition of digits. The customer subsequently remits the amount on the monthly statement. Assuming only three employees are in the department, the most effective control to prevent this type of error is", "q_en": "One of two office clerks in a small organization prepares a sales invoice; however, the invoice is incorrectly entered by the bookkeeper in the general ledger and the accounts receivable subsidiary ledger for a smaller amount resulting from a transposition of digits. The customer subsequently remits the amount on the monthly statement. Assuming only three employees are in the department, the most effective control to prevent this type of error is", "options": [{"tr": "Assigning the second office clerk to make an independent check of prices, discounts, extensions, footings, and invoice serial numbers.", "en": "Assigning the second office clerk to make an independent check of prices, discounts, extensions, footings, and invoice serial numbers.", "cmt_tr": ". The misposting was an error that occurred subsequent to this step.", "cmt_en": ". The misposting was an error that occurred subsequent to this step."}, {"tr": "Requiring that monthly statements be prepared by the bookkeeper and verified by one of the other office clerks prior to mailing.", "en": "Requiring that monthly statements be prepared by the bookkeeper and verified by one of the other office clerks prior to mailing.", "cmt_tr": ". These controls will not detect an initial misposting. The statements and the reconciliation are based on the misposted records.", "cmt_en": ". These controls will not detect an initial misposting. The statements and the reconciliation are based on the misposted records."}, {"tr": "Using predetermined totals to control posting routines.", "en": "Using predetermined totals to control posting routines.", "cmt_tr": ". A control total (total amount of sales invoices) should be generated for the transactions to be posted. It should then be compared with the total of items posted to the individual accounts (total of amounts posted to the general ledger and the accounts receivable subsidiary ledger).", "cmt_en": ". A control total (total amount of sales invoices) should be generated for the transactions to be posted. It should then be compared with the total of items posted to the individual accounts (total of amounts posted to the general ledger and the accounts receivable subsidiary ledger)."}, {"tr": "Requiring the bookkeeper to perform periodic reconciliations of the accounts receivable subsidiary ledger and the general ledger.", "en": "Requiring the bookkeeper to perform periodic reconciliations of the accounts receivable subsidiary ledger and the general ledger.", "cmt_tr": ". These controls will not detect an initial misposting. The statements and the reconciliation are based on the misposted records.", "cmt_en": ". These controls will not detect an initial misposting. The statements and the reconciliation are based on the misposted records."}], "answer": 2}, {"q_tr": "Which of the following aspects of the administration of a compensation program is the most important control in the long run?", "q_en": "Which of the following aspects of the administration of a compensation program is the most important control in the long run?", "options": [{"tr": "An informal wage and salary policy to be competitive with the industry average.", "en": "An informal wage and salary policy to be competitive with the industry average.", "cmt_tr": ". A vague policy would contribute little if anything to the fair administration of compensation programs.", "cmt_en": ". A vague policy would contribute little if anything to the fair administration of compensation programs."}, {"tr": "A plan of job classifications based on predefined evaluation criteria.", "en": "A plan of job classifications based on predefined evaluation criteria.", "cmt_tr": ". Job classifications and grades are established during the job analysis phase and the general level of compensation in the community and in the industry must be determined. Compensation is then fixed based on the plan of job classifications, usually within a range for each grade. A range is necessary to allow for flexibility. Compensation should be low enough to avoid excess cost and to permit competitive pricing but high enough to attract needed personnel.", "cmt_en": ". Job classifications and grades are established during the job analysis phase and the general level of compensation in the community and in the industry must be determined. Compensation is then fixed based on the plan of job classifications, usually within a range for each grade. A range is necessary to allow for flexibility. Compensation should be low enough to avoid excess cost and to permit competitive pricing but high enough to attract needed personnel."}, {"tr": "A wage and salary review plan for individual employee compensation.", "en": "A wage and salary review plan for individual employee compensation.", "cmt_tr": ". A plan for reviewing individual compensation presupposes a classification plan.", "cmt_en": ". A plan for reviewing individual compensation presupposes a classification plan."}, {"tr": "A level of general compensation that is reasonably competitive.", "en": "A level of general compensation that is reasonably competitive.", "cmt_tr": ". Reasonably competitive compensation is predicated on a classification plan.", "cmt_en": ". Reasonably competitive compensation is predicated on a classification plan."}], "answer": 1}, {"q_tr": "To minimize potential financial losses associated with physical assets, the assets should be insured in an amount that is", "q_en": "To minimize potential financial losses associated with physical assets, the assets should be insured in an amount that is", "options": [{"tr": "Supported by periodic appraisals.", "en": "Supported by periodic appraisals.", "cmt_tr": ". Based on the results of the risk assessment, the internal audit function should evaluate the adequacy and effectiveness of controls encompassing the organization’s governance, operations, and information systems. This should include, among other things, safeguarding of assets. Safeguarding assets includes insuring them. The types and amounts of insurance should be supported by periodic appraisals.", "cmt_en": ". Based on the results of the risk assessment, the internal audit function should evaluate the adequacy and effectiveness of controls encompassing the organization’s governance, operations, and information systems. This should include, among other things, safeguarding of assets. Safeguarding assets includes insuring them. The types and amounts of insurance should be supported by periodic appraisals."}, {"tr": "Determined by the board of directors.", "en": "Determined by the board of directors.", "cmt_tr": ". The determination of insurance coverage is not a function of the board of directors.", "cmt_en": ". The determination of insurance coverage is not a function of the board of directors."}, {"tr": "Automatically adjusted by an economic indicator such as the consumer price index.", "en": "Automatically adjusted by an economic indicator such as the consumer price index.", "cmt_tr": ". The consumer price index generally does not provide an appropriate adjustment factor for fixed assets.", "cmt_en": ". The consumer price index generally does not provide an appropriate adjustment factor for fixed assets."}, {"tr": "Equal to the book value of the individual assets.", "en": "Equal to the book value of the individual assets.", "cmt_tr": ". Book values may not reflect the replacement or real value of an asset.", "cmt_en": ". Book values may not reflect the replacement or real value of an asset."}], "answer": 0}, {"q_tr": "One control objective of the financing or treasury cycle is the proper authorization of transactions involving debt and equity instruments. Which of the following controls would best meet this objective?", "q_en": "One control objective of the financing or treasury cycle is the proper authorization of transactions involving debt and equity instruments. Which of the following controls would best meet this objective?", "options": [{"tr": "Segregation of responsibility for custody of funds from recording of the transaction.", "en": "Segregation of responsibility for custody of funds from recording of the transaction.", "cmt_tr": ". Segregation of responsibility for custody of funds from recording of the transaction concerns the objective of safeguarding of assets, not authorization.", "cmt_en": ". Segregation of responsibility for custody of funds from recording of the transaction concerns the objective of safeguarding of assets, not authorization."}, {"tr": "Written policies requiring review of major funding or repayment proposals by the board.", "en": "Written policies requiring review of major funding or repayment proposals by the board.", "cmt_tr": ". The control objective of authorization relates to the proper execution of transactions in accordance with management’s wishes. One means of achieving this control objective is the establishment of policies as guides to action. When a decision affects the capitalization of the entity, a policy should be in force requiring review at the highest level.", "cmt_en": ". The control objective of authorization relates to the proper execution of transactions in accordance with management’s wishes. One means of achieving this control objective is the establishment of policies as guides to action. When a decision affects the capitalization of the entity, a policy should be in force requiring review at the highest level."}, {"tr": "Use of an underwriter in all cases of new issue of debt or equity instruments.", "en": "Use of an underwriter in all cases of new issue of debt or equity instruments.", "cmt_tr": ". Use of an underwriter in all cases of new issue of debt or equity instruments does not state a control but rather a specific means of issuing securities.", "cmt_en": ". Use of an underwriter in all cases of new issue of debt or equity instruments does not state a control but rather a specific means of issuing securities."}, {"tr": "Requiring two signatures on all checks of a material amount.", "en": "Requiring two signatures on all checks of a material amount.", "cmt_tr": ". In most organizations, the authorization occurs at a managerial level above that at which transactions are executed. For example, certain employees may be authorized to make payments up to a certain amount. The second signature is by another employee who thereby confirms that the entity’s policies and procedures have been followed.", "cmt_en": ". In most organizations, the authorization occurs at a managerial level above that at which transactions are executed. For example, certain employees may be authorized to make payments up to a certain amount. The second signature is by another employee who thereby confirms that the entity’s policies and procedures have been followed."}], "answer": 1}, {"q_tr": "Which of the following describes a control weakness?", "q_en": "Which of the following describes a control weakness?", "options": [{"tr": "Purchasing procedures are well designed and are followed unless otherwise directed by the purchasing supervisor.", "en": "Purchasing procedures are well designed and are followed unless otherwise directed by the purchasing supervisor.", "cmt_tr": ". Well-designed procedures that are set aside at management’s discretion are not adequate controls. Control procedures must be followed consistently to be effective. However, the possibility of management override is an inherent limitation of internal control.", "cmt_en": ". Well-designed procedures that are set aside at management’s discretion are not adequate controls. Control procedures must be followed consistently to be effective. However, the possibility of management override is an inherent limitation of internal control."}, {"tr": "Prenumbered blank purchase orders are secured within the purchasing department.", "en": "Prenumbered blank purchase orders are secured within the purchasing department.", "cmt_tr": ". Use of prenumbered blank purchase orders secured within the purchasing department is a common control.", "cmt_en": ". Use of prenumbered blank purchase orders secured within the purchasing department is a common control."}, {"tr": "Normal operational purchases fall in the range from $500 to $1,000 with two signatures required for purchases over $1,000.", "en": "Normal operational purchases fall in the range from $500 to $1,000 with two signatures required for purchases over $1,000.", "cmt_tr": ". Requiring a more stringent authorization procedure for larger purchases is an appropriate control as long as documentation supports the purchases.", "cmt_en": ". Requiring a more stringent authorization procedure for larger purchases is an appropriate control as long as documentation supports the purchases."}, {"tr": "The purchasing agent invests in a publicly traded mutual fund that lists the stock of one of the organization’s suppliers in its portfolio.", "en": "The purchasing agent invests in a publicly traded mutual fund that lists the stock of one of the organization’s suppliers in its portfolio.", "cmt_tr": ". The purchasing agent’s mutual fund investment should not be a conflict of interest. The relationship between the return on the investment and any possible action by the agent to favor the supplier is very weak.", "cmt_en": ". The purchasing agent’s mutual fund investment should not be a conflict of interest. The relationship between the return on the investment and any possible action by the agent to favor the supplier is very weak."}], "answer": 0}, {"q_tr": "A manufacturer uses large quantities of small, inexpensive items, such as nuts, bolts, washers, and gloves, in the production process. As these goods are purchased, they are recorded in inventory in bulk amounts. Bins are located on the shop floor to provide timely access to these items. When necessary, the bins are refilled from inventory, and the cost of the items is charged to a consumable supplies account, which is part of shop overhead. Which of the following would be an appropriate improvement of controls in this environment?", "q_en": "A manufacturer uses large quantities of small, inexpensive items, such as nuts, bolts, washers, and gloves, in the production process. As these goods are purchased, they are recorded in inventory in bulk amounts. Bins are located on the shop floor to provide timely access to these items. When necessary, the bins are refilled from inventory, and the cost of the items is charged to a consumable supplies account, which is part of shop overhead. Which of the following would be an appropriate improvement of controls in this environment?", "options": [{"tr": "Relocate bins to the inventory warehouse.", "en": "Relocate bins to the inventory warehouse.", "cmt_tr": ". The bins should be on the shop floor where the nuts, bolts, etc., are needed.", "cmt_en": ". The bins should be on the shop floor where the nuts, bolts, etc., are needed."}, {"tr": "Require management review of reports on the cost of consumable items used in relation to budget.", "en": "Require management review of reports on the cost of consumable items used in relation to budget.", "cmt_tr": ". In accordance with the cost-benefit criterion, control expenditures for manufacturing supplies (nuts, bolts, etc.) should be minimal. Nevertheless, some controls should be implemented. For example, usage should be estimated and compared with stock balances and also with the number of using personnel. Moreover, variances should be calculated for the difference between costs incurred and budgeted amounts.", "cmt_en": ". In accordance with the cost-benefit criterion, control expenditures for manufacturing supplies (nuts, bolts, etc.) should be minimal. Nevertheless, some controls should be implemented. For example, usage should be estimated and compared with stock balances and also with the number of using personnel. Moreover, variances should be calculated for the difference between costs incurred and budgeted amounts."}, {"tr": "Lock the bins during normal working hours.", "en": "Lock the bins during normal working hours.", "cmt_tr": ". Locking the bins would limit the efficiency and effectiveness of shop personnel.", "cmt_en": ". Locking the bins would limit the efficiency and effectiveness of shop personnel."}, {"tr": "None of these controls are needed for items of minor cost and size.", "en": "None of these controls are needed for items of minor cost and size.", "cmt_tr": ". Controls are needed even for items of minor cost and size.", "cmt_en": ". Controls are needed even for items of minor cost and size."}], "answer": 1}, {"q_tr": "During the preliminary survey for an audit of one of an organization’s manufacturing plants, an auditor discovers that the plant experiences production problems with costs far in excess of those budgeted and with finished goods inventory levels that are clearly excessive. Which of the following management control procedures would have best brought the problems to management’s attention earlier?", "q_en": "During the preliminary survey for an audit of one of an organization’s manufacturing plants, an auditor discovers that the plant experiences production problems with costs far in excess of those budgeted and with finished goods inventory levels that are clearly excessive. Which of the following management control procedures would have best brought the problems to management’s attention earlier?", "options": [{"tr": "Implementing standard costing procedures at each plant, with a summary of variances reported to management on a weekly basis.", "en": "Implementing standard costing procedures at each plant, with a summary of variances reported to management on a weekly basis.", "cmt_tr": ". Standard costing detects unfavorable cost variances but not excess finished goods inventory.", "cmt_en": ". Standard costing detects unfavorable cost variances but not excess finished goods inventory."}, {"tr": "Establishing perpetual inventory control procedures at each plant, with a report detailing any inventory items with levels in excess of two weeks’ production provided to management on a weekly basis.", "en": "Establishing perpetual inventory control procedures at each plant, with a report detailing any inventory items with levels in excess of two weeks’ production provided to management on a weekly basis.", "cmt_tr": ". Perpetual inventory control procedures detect excess finished goods inventory but not unfavorable cost variances.", "cmt_en": ". Perpetual inventory control procedures detect excess finished goods inventory but not unfavorable cost variances."}, {"tr": "Planning monthly production based on management forecasts, with a report comparing actual production with forecasted production and actual costs with budgeted costs provided to management on a weekly basis.", "en": "Planning monthly production based on management forecasts, with a report comparing actual production with forecasted production and actual costs with budgeted costs provided to management on a weekly basis.", "cmt_tr": ". Comparing actual production with management forecasts detects whether finished goods inventory is excessive, and comparing actual costs with budgeted costs detects unfavorable cost variances.", "cmt_en": ". Comparing actual production with management forecasts detects whether finished goods inventory is excessive, and comparing actual costs with budgeted costs detects unfavorable cost variances."}, {"tr": "Comparing actual sales with forecasted sales and budgeted gross margin with actual gross margin, with a report provided to management on a weekly basis.", "en": "Comparing actual sales with forecasted sales and budgeted gross margin with actual gross margin, with a report provided to management on a weekly basis.", "cmt_tr": ". Because cost of goods sold is a component of gross margin, comparing actual and budgeted sales and actual and budgeted gross margin procedures may detect unfavorable cost variances, not excess finished goods inventory.", "cmt_en": ". Because cost of goods sold is a component of gross margin, comparing actual and budgeted sales and actual and budgeted gross margin procedures may detect unfavorable cost variances, not excess finished goods inventory."}], "answer": 2}, {"q_tr": "A firm’s inventory consisted of 1,000 different items, 20 of which accounted for 70% of the dollar value. The most recent regular quarterly manual count revealed an unnecessary 2 years’ supply of several of the more expensive items. The control that would best help to correct this oversupply problem is", "q_en": "A firm’s inventory consisted of 1,000 different items, 20 of which accounted for 70% of the dollar value. The most recent regular quarterly manual count revealed an unnecessary 2 years’ supply of several of the more expensive items. The control that would best help to correct this oversupply problem is", "options": [{"tr": "Use of a control total over the number of unique inventory items.", "en": "Use of a control total over the number of unique inventory items.", "cmt_tr": ". A control total should verify that no inventory records were lost or that no new ones were added. It does not help to solve the inventory acquisition problem.", "cmt_en": ". A control total should verify that no inventory records were lost or that no new ones were added. It does not help to solve the inventory acquisition problem."}, {"tr": "Limit check on the total dollar value of the inventory.", "en": "Limit check on the total dollar value of the inventory.", "cmt_tr": ". A limit test on the total inventory value provides information as to when the inventory dollar level reached a certain point but not on the composition of the inventory.", "cmt_en": ". A limit test on the total inventory value provides information as to when the inventory dollar level reached a certain point but not on the composition of the inventory."}, {"tr": "Use of authorizing signatures on requisitions for inventory requested by production.", "en": "Use of authorizing signatures on requisitions for inventory requested by production.", "cmt_tr": ". Use of authorizing signatures provides control over requisitions but not over the rest of the inventory acquisition process.", "cmt_en": ". Use of authorizing signatures provides control over requisitions but not over the rest of the inventory acquisition process."}, {"tr": "Perpetual inventory of the larger dollar value items in the inventory.", "en": "Perpetual inventory of the larger dollar value items in the inventory.", "cmt_tr": ". In a perpetual system, purchases (or transfers from work-in-process) are recorded directly in the inventory account when they are made. Inventory is correspondingly reduced as sales occur. Thus, a running total of inventory can be monitored throughout the period.", "cmt_en": ". In a perpetual system, purchases (or transfers from work-in-process) are recorded directly in the inventory account when they are made. Inventory is correspondingly reduced as sales occur. Thus, a running total of inventory can be monitored throughout the period."}], "answer": 3}], "SU3 - Control Frameworks": [{"q_tr": "Which of the following are the intended users of control frameworks such as COBIT?", "q_en": "Which of the following are the intended users of control frameworks such as COBIT?", "options": [{"tr": "Persons with IT control responsibilities.", "en": "Persons with IT control responsibilities.", "cmt_tr": ". Control frameworks are intended for use by anyone in the organization who has control responsibilities, not just auditors or senior management. Control frameworks also can be used to communicate with senior management and the board.", "cmt_en": ". Control frameworks are intended for use by anyone in the organization who has control responsibilities, not just auditors or senior management. Control frameworks also can be used to communicate with senior management and the board."}, {"tr": "Senior management only.", "en": "Senior management only.", "cmt_tr": ". Intended users include anyone with control responsibilities.", "cmt_en": ". Intended users include anyone with control responsibilities."}, {"tr": "Internal and external auditors only.", "en": "Internal and external auditors only.", "cmt_tr": ". Auditors are not the only persons who are intended users.", "cmt_en": ". Auditors are not the only persons who are intended users."}, {"tr": "Everyone in the organization.", "en": "Everyone in the organization.", "cmt_tr": ". Some members of the organization are
