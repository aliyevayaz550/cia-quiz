y for custody of small tools to one individual establishes accountability. Requiring that requisitions be submitted ensures that their use is properly authorized."}, {"tr": "Küçük aletlerin aylık bazda tam fiziksel sayımını başlatmak.", "en": "Initiate a full physical inventory of small tools on a monthly basis.", "cmt_tr": ". Küçük aletlerin aylık tam fiziksel sayımı, yalnızca kayıpların miktarını belirlemede etkili olan periyodik, tespit edici bir kontroldür.", "cmt_en": ". A full physical inventory of small tools on a monthly basis is a periodic, detective control that is effective only in determining the amount of losses."}, {"tr": "Küçük alet stokunu güvenli bir alana yerleştirmek, tüm çalışanlar için kartlı geçiş sistemi kurmak ve her geçiş işlemini üretim amiri için bir raporda kaydetmek.", "en": "Place supply of small tools in a secured area, install a key-access card system for all employees, and record each key-access transaction on a report for the production superintendent.", "cmt_tr": ". Küçük aletleri güvenli bir alana yerleştirmek, kartlı geçiş sistemi kurmak ve geçiş işlemlerini kaydetmek önleyici ve tespit edici kontrollerdir ancak stoktan çıkarılan alet miktarını kaydetmez.", "cmt_en": ". Placing small tools in a secured area, installing a key-access system, and recording access transactions are preventive and detective controls but do not record the amount of tools removed from the inventory."}, {"tr": "Çalışan otoparkına çıkışı kapatmak ve tüm tesis çalışanlarının, otoparka da erişim sağlayan teslim alma rampasının yanındaki kapıyı kullanmasını istemek.", "en": "Close the exit to the employee parking lot and require all plant employees to use a doorway by the receiving dock that also provides access to the plant employees’ parking area.", "cmt_tr": ". Çalışan otoparkına çıkışı kapatmak küçük alet stoğuna erişimi sınırlamaz.", "cmt_en": ". Closing the exit to the employee parking lot does not limit access to the small tools inventory."}], "answer": 0}, {"q_tr": "Kullanılmayan veya hurda malzemeler önceden belirlenmiş bir proje numarasına yüklenir. Malzemeler belirli depo yerlerine ayrılır ve sonunda satış için halka açık müzayedeye taşınır. Bu süreçle ilişkili riskleri azaltmak için kuruluş aşağıdaki prosedürlerden hangisini uygulamalıdır?", "q_en": "Obsolete or scrap materials are charged to a predefined project number. The materials are segregated into specified bin locations and eventually transported to a public auction for sale. To reduce the risks associated with this process, an organization should employ which of the following procedures?", "options": [{"tr": "Çalışanların müzayededen önce kullanılmayan veya hurda malzemeleri satın almasına izin vermek.", "en": "Permit employees to purchase obsolete or scrap materials prior to an auction.", "cmt_tr": ". Çalışanların müzayededen önce kullanılmayan veya hurda malzemeleri satın almasına izin vermek, zimmete geçirme için daha fazla teşvik sağlar.", "cmt_en": ". Permitting employees to purchase obsolete or scrap materials prior to auction provides even more incentive for misappropriation."}, {"tr": "Malzemelerin hurda veya kullanılmayan olarak ilan edilmesi için yönetim onayı istemek.", "en": "Require managerial approval for materials to be declared scrap or obsolete.", "cmt_tr": ". Önleyici bir kontrol gereklidir. Malzemelerin hurda veya kullanılmayan olarak ilan edilmesi için yönetim onayı, zimmete geçirme riskini azaltır. Aksi takdirde malzemeler daha kolay yanlış sınıflandırılabilir.", "cmt_en": ". A preventive control is needed. Management approval for materials to be declared scrap or obsolete reduces the risk of misappropriation. Otherwise, materials may be more easily misclassified."}, {"tr": "Kullanılmayan veya hurda malzemeyi önceden onaylanmış bir alıcıyla sınırlandırmak.", "en": "Limit obsolete or scrap material to a pre-approved buyer.", "cmt_tr": ". Kullanılmayan veya hurda malzeme satışlarını önceden onaylanmış bir alıcıyla sınırlandırmak, malzemeler satılmadan önceki zimmete geçirme riskini azaltmaz.", "cmt_en": ". Limiting obsolete or scrap materials sales to a pre-approved buyer does not mitigate the risk of misappropriation before the material are sold."}, {"tr": "Müzayede evine komisyon ödenmemesini istemek.", "en": "Require that the auction house not be paid a commission.", "cmt_tr": ". Müzayede firmasına komisyon ödenmesinin belirtilmesi, kuruluşun getirisini en üst düzeye çıkarmak için bir teşvik yaratır.", "cmt_en": ". Specifying that a commission be paid to the auction firm creates an incentive to maximize the organization’s return."}], "answer": 1}, {"q_tr": "Başlangıçta bütçelenenin ötesindeki satın alma talepleri pazarlama müdürü tarafından onaylanmalıdır. Bu prosedür...", "q_en": "Requests for purchases beyond those initially budgeted must be approved by the marketing manager. This procedure", "options": [{"tr": "Kıt kurumsal kaynakların en verimli tahsisini sağlamalıdır.", "en": "Should provide the most efficient allocation of scarce organizational resources.", "cmt_tr": ". Kuruluşun tahsis edeceği iki kıt kaynak vardır: satın alma bütçesi ve perakende mağazalarında mevcut alan. Pazarlama müdürü bu tahsisi koordine edecek kadar organizasyonda yüksek bir konumdadır. Bireysel ürün müdürlerinin kendi bütçe aşımı taleplerini onaylamalarına izin vermek neredeyse kesinlikle yanlış tahsisle sonuçlanacaktır.", "cmt_en": ". The organization has two scarce resources to allocate: its purchasing budget and the space available in its retail stores. The marketing manager is high enough in the organization to coordinate this allocation. Allowing individual product managers to approve their own requests to exceed budget would almost certainly result in misallocation."}, {"tr": "Her ürün müdürü elde edilen kâra göre değerlendirildiğinden gereksizdir.", "en": "Is unnecessary because each product manager is evaluated on profit generated.", "cmt_tr": ". Brüt kâr değerlendirmesi ürün müdürlerini değerlendirmede etkilidir, ancak aşırı harcamayı mutlaka kısıtlamaz.", "cmt_en": ". The gross profit evaluation is effective in evaluating product managers, but it does not necessarily restrain excess spending."}, {"tr": "Bir tespit edici kontroldür.", "en": "Is a detective control.", "cmt_tr": ". Pazarlama müdürünün onayı, istenmeyen olayların gerçekleşmesini caydıran önleyici bir kontroldür. Tespit edici kontrol, gerçekleşmiş istenmeyen olayları tespit eder ve düzeltir.", "cmt_en": ". Approval by the marketing manager is a preventive control, which deters undesirable events from occurring. A detective control detects and corrects undesirable events that have occurred."}, {"tr": "Bir düzeltici kontroldür.", "en": "Is a corrective control.", "cmt_tr": ". Pazarlama müdürünün onayı, istenmeyen olayların gerçekleşmesini caydıran önleyici bir kontroldür. Düzeltici kontrol, istenmeyen olayların olumsuz etkilerini düzeltir.", "cmt_en": ". Approval by the marketing manager is a preventive control, which deters undesirable events from occurring. A corrective control corrects negative effects of unwanted events."}], "answer": 0}, {"q_tr": "İç denetçi, hayali alıcılara yönelik potansiyel bir sorunu ele almak için uygun kontroller hakkında bir tavsiyede bulunmayı düşünmektedir. İç denetçi aşağıdaki kontrol prosedürlerini tavsiyeye dahil edilecek potansiyel kalemler olarak belirlemiştir: • Alıcı dosyasına yapılan tüm eklemelerin sosyal hizmet uzmanlarının bir amiri tarafından bağımsız olarak araştırılması ve onaylanması. • Tüm alıcıların hesap numaralarında kendi kendini kontrol eden rakamların kullanılması. • Yinelenen ad ve adresleri aramak için bilgisayar programına bir kod eklenmesi ve yinelemeler tespit edildiğinde bölüm amirine gidecek bir istisna raporu geliştirilmesi. • Sosyal hizmet uzmanlarının alıcılar arasında rotasyona tabi tutulması. Denetçinin amiri belirlenen kontrolleri gözden geçirmiş ve geçerli alıcılar üzerinde kontrolü iyileştirmede etkisiz olacak bir kontrol olduğunu belirtmiştir. Belirlenen kontrollerden hangisi etkisiz olur?", "q_en": "The internal auditor is considering making a recommendation about appropriate controls to address a potential problem of fictitious recipients. The internal auditor has identified the following control procedures as potential items to include in the recommendation. • Require that all additions to the recipient file be independently investigated and approved by a supervisor of the social workers. • Require the use of self-checking digits on the account numbers of all recipients so that any duplicates will be immediately noted by the system. • Incorporate a code into the computer program to search for duplicate names and addresses. Develop an exception report that will go to the section supervisor whenever duplicates are noted. • Require that social workers be rotated among recipients. The internal auditor’s supervisor has reviewed the identified controls and tells the auditor that one of the controls would not be effective in improving control over valid recipients. Which one of the identified controls would be ineffective?", "options": [{"tr": "Tüm alıcıların hesap numaralarında kendi kendini kontrol eden rakamların kullanılması.", "en": "Require the use of self-checking digits on the account numbers of all recipients so that any duplicates will be immediately noted by the system.", "cmt_tr": ". Bu koşullarda etkili bir kontrol, hayali alıcılara yapılan ödemeleri önlemeye veya tespit etmeye yardımcı olur. Hayali alıcılar mükerrer hesaplar kullanılarak oluşturulabilse de, hesap numaralarında kendi kendini kontrol eden rakamların kullanılması mükerrer hesapları önleyen veya tespit eden bir kontrol değildir. Daha ziyade, kendi kendini kontrol eden rakamlar hatalı kimlik numaralarını tespit etmek için kullanılan çevrimiçi giriş kontrolleridir. Sonuç olarak, bu kontrol hayali alıcıları önleme veya tespit etmede etkisizdir.", "cmt_en": ". Under these facts, an effective control assists in preventing or detecting payments to fictitious recipients. Although fictitious recipients could be created by using duplicate accounts, the use of self-checking digits on the account numbers is not a control that prevents or detects duplicate accounts. Rather, self-checking digits are online input controls used to detect incorrect identification numbers. Consequently, this control is ineffective in preventing or detecting fictitious recipients."}, {"tr": "Sosyal hizmet uzmanlarının alıcılar arasında rotasyona tabi tutulması.", "en": "Require that social workers be rotated among recipients.", "cmt_tr": ". Sosyal hizmet uzmanlarının alıcılar arasında rotasyona tabi tutulması, hayali alıcıları önlemek veya tespit etmek için etkili bir kontroldür çünkü her ardışık sosyal hizmet uzmanı yönetimi altındaki yeni alıcıların geçerli olup olmadığını muhtemelen doğrulayacaktır.", "cmt_en": ". Rotating social workers among recipients is an effective control to prevent or detect fictitious recipients because each succeeding social worker will likely verify whether the new recipients under his or her direction are valid."}, {"tr": "Yinelenen ad ve adresleri aramak için bilgisayar programına bir kod eklemek ve amire gidecek bir istisna raporu geliştirmek.", "en": "Incorporate a code into the computer program to search for duplicate names and addresses and develop an exception report that will go to the supervisor.", "cmt_tr": ". İstisnaları (örn. yinelenen ad ve adresler) arayan ve raporlayan programlanmış bir kontrol, tek bir veya birkaç adresteki birden fazla alıcıya yapılan ödemeleri tespit eder ve bu nedenle etkili bir kontroldür.", "cmt_en": ". A programmed control that searches for and reports exceptions (e.g., duplicate names and addresses) detects payments to multiple recipients at a single or a few addresses and therefore also is an effective control."}, {"tr": "Alıcı dosyasına yapılan tüm eklemelerin sosyal hizmet uzmanlarının bir amiri tarafından bağımsız olarak araştırılması ve onaylanması.", "en": "Require that all additions to the recipient file be independently investigated and approved by a supervisor of the social workers.", "cmt_tr": ". Bu koşullarda etkili bir kontrol, hayali alıcılara yapılan ödemeleri önlemeye veya tespit etmeye yardımcı olur. Sosyal hizmet uzmanı amirinin tüm eklemeleri araştırmasını ve onaylamasını istemek, bir sosyal hizmet uzmanının hayali alıcılar eklemesini önlemeye yardımcı olur.", "cmt_en": ". Under these facts, an effective control assists in preventing or detecting payments to fictitious recipients. Requiring a social worker supervisor to investigate and approve all additions to the recipient file assists in preventing a social worker from adding fictitious recipients."}], "answer": 0}, {"q_tr": "Satın alma departmanındaki ajanların pozisyonlarını kişisel kazanç için kullanma riskini en aza indirmek için kuruluş ne yapmalıdır?", "q_en": "To minimize the risk that agents in the purchasing department will use their positions for personal gain, the organization should", "options": [{"tr": "Satın alma ajanı görevlendirmelerini periyodik olarak rotasyona tabi tutmak.", "en": "Rotate purchasing agent assignments periodically.", "cmt_tr": ". Alıcıların belirli satıcılarla uzun süreli ilişkileri olduğunda kayırmacılık riski artar. Alıcı görevlendirmelerinin periyodik rotasyonu kayırmacılık gösterme fırsatını sınırlar. Bu risk, alıcıların izin kullanmalarının zorunlu kılınmasıyla da azaltılır.", "cmt_en": ". The risk of favoritism is increased when buyers have long-term relationships with specific vendors. Periodic rotation of buyer assignments will limit the opportunity to show favoritism. This risk is also reduced if buyers are required to take vacations."}, {"tr": "İç denetçilerden seçilen satın almaları ve borçlar hesabını teyit etmelerini istemek.", "en": "Request internal auditors to confirm selected purchases and accounts payable.", "cmt_tr": ". Teyit, iç denetçilerin satın alma ajanlarının uygunsuz menfaat elde etmesini tespit etmesine veya uzun süreli ilişkileri caydırmasına olanak tanımaz.", "cmt_en": ". Confirmation does not enable internal auditors to detect inappropriate benefits received by purchasing agents or deter long-term relationships."}, {"tr": "Satın alınan tüm ürünlerin birim maliyet başına değer incelemelerinden geçmesini belirtmek.", "en": "Specify that all items purchased must pass value-per-unit-of-cost reviews.", "cmt_tr": ". Birim maliyet başına değer incelemeleri, ödenen fiyat karşılığında belirli bir değer düzeyinin sağlanmasında yardımcı olabilir ancak doğrudan satın alma ajanlarının uygunsuz menfaat elde etmesine odaklanmaz.", "cmt_en": ". Value-per-unit-of-cost reviews could be helpful in ensuring a certain level of value received for price paid but do not directly focus on receipt of inappropriate benefits by purchasing agents."}, {"tr": "Satın alma departmanına ödenen satın alma fiyatlarına ilişkin kayıt tutmasını ve her 6 ayda bir gözden geçirilmesini istemek.", "en": "Direct the purchasing department to maintain records on purchase prices paid, with review of such being required each 6 months.", "cmt_tr": ". Kayıtların her 6 ayda bir gözden geçirilmesi, kuruluşun bir ajanın uygunsuz menfaat elde etmesini tespit etmesine veya bu tür faaliyetlere yol açabilecek ilişkileri caydırmasına olanak tanımaz.", "cmt_en": ". Review of records every 6 months does not enable the organization to detect receipt of inappropriate benefits by an agent or deter relationships that could lead to such activity."}], "answer": 0}, {"q_tr": "Bir ofis malzemesi tedarikçisi bir siparişi tamamen karşılayamadığında, stokta bulunmayan ürünleri müşterinin siparişinde ön sipariş olarak işaretler ve bu kalemleri yönetimin görüntüleyebileceği veya yazdırabileceği bir ön sipariş dosyasına girer. Müşteriler tedarikçiden memnun değildir çünkü tedarikçi stokta bulunmayan ürünlerin takibini yapamıyor ve ürünler temin edildiklerinde hemen sevk edemiyor gibi görünmektedir. Stokta bulunmayan ürünlerin zamanında teslimatını sağlamak için en iyi yaklaşım hangisidir?", "q_en": "When a supplier of office products is unable to fill an order completely, it marks the out-of- stock items as back ordered on the customer’s order and enters these items in a back order file that management can view or print. Customers are becoming disgruntled with the supplier because it seems unable to keep track of and ship out-of-stock items as soon as they are available. The best approach for ensuring prompt delivery of out-of-stock items is to", "options": [{"tr": "Ön sipariş dosyasını günlük olarak teslim alınan mallarla eşleştirmek.", "en": "Match the back order file to goods received daily.", "cmt_tr": ". Yönlendirici kontrol, arzu edilen bir olayın gerçekleşmesini sağlamak veya teşvik etmek için tasarlanmıştır. Örneğin, ön sipariş dosyasının günlük olarak teslim alınan mallarla eşleştirilmesi, stokta bulunmayan ürünlerin zamanında teslimatını kolaylaştırmanın en kesin yoludur.", "cmt_en": ". A directive control is designed to cause or encourage the occurrence of a desirable event. For example, matching the back order file with goods received daily is the surest way of facilitating prompt delivery of out-of-stock items."}, {"tr": "Stokta bulunmama durumlarının sayısını en aza indirmek için stok seviyelerini artırmak.", "en": "Increase inventory levels to minimize the number of times that out-of-stock conditions occur.", "cmt_tr": ". Stok artışı stokta bulunmama durumlarını en aza indirir, ancak ürünler temin edildiklerinde takip ve sevk üzerinde etkisi yoktur.", "cmt_en": ". An increase in inventory minimizes out-of-stock conditions but has no effect on tracking and shipping goods as soon as they are available."}, {"tr": "Stoku yenileme süresini kısaltmak için tedarik satıcılarıyla elektronik veri değişimi uygulamak.", "en": "Implement electronic data interchange with supply vendors to decrease the time to replenish inventory.", "cmt_tr": ". Kendi stoğunun daha verimli yenilenmesinin, ürünler temin edildiklerinde takip ve sevk üzerinde etkisi yoktur.", "cmt_en": ". More efficient replenishment of its own inventory has no effect on tracking and shipping goods as soon as they are available."}, {"tr": "Karşılanan ve ön sipariş edilen siparişlerin toplamını, günlük verilen tüm siparişlerin toplamıyla mutabık kılmak.", "en": "Reconcile the sum of filled and back orders with the total of all orders placed daily.", "cmt_tr": ". Karşılanan ve ön sipariş edilen siparişlerin toplamını günlük verilen tüm siparişlerle mutabık kılmak, siparişlerin karşılandığını veya ön sipariş edildiğini garanti eder ancak stokta bulunmayan ürünlerin teslimatını etkilemez.", "cmt_en": ". Reconciling the sum of filled and back orders with the total of all orders placed daily ensures that orders were either filled or back ordered but will not affect delivery of the items that are out of stock."}], "answer": 0}, {"q_tr": "Bir denetçi tarafından yapılan aşağıdaki gözlemlerden hangisi, varlıkların korunmasına ilişkin kontrol zayıflıklarının varlığını gösterme olasılığı en yüksektir?", "q_en": "Which of the following observations by an auditor is most likely to indicate the existence of control weaknesses over safeguarding of assets?", "options": [{"tr": "Şirket tam zamanında stok sistemini kullanır.", "en": "The company uses a just-in-time inventory system.", "cmt_tr": ". Tam zamanında (JIT) stok sistemi kullanmak, varlıkların korunmasına ilişkin kontrol zayıflıklarının varlığını göstermez.", "cmt_en": ". Using a just-in-time (JIT) inventory system does not indicate the existence of control weaknesses over safeguarding of assets."}, {"tr": "Bir hizmet departmanının konumu, diğer birimlere yeterli hizmet sağlamaya uygun değildir.", "en": "A service department’s location is not well suited to allow adequate service to other units.", "cmt_tr": ". Bir hizmet departmanının konumu, varlıkların korunması değil, kurumsal hedeflere ulaşma ile ilgilidir.", "cmt_en": ". A service department’s location concerns achieving organizational objectives, not safeguarding of assets."}, {"tr": "Yöneticilerin diğer kıyaslama kuruluşlarına göre genel performansı gösteren raporlara erişimi yoktur.", "en": "Managers do not have access to reports that profile overall performance in relation to other benchmarked organizations.", "cmt_tr": ". Yöneticilerin genel performans raporlarına erişiminin olmaması kurumsal hedeflere ulaşma ile ilgilidir.", "cmt_en": ". Managers not having access to reports profiling overall performance concerns achieving organizational objectives."}, {"tr": "Hassas pozisyonlar için işe alınan çalışanlara geçmiş araştırması yapılmaz.", "en": "Employees hired for sensitive positions are not subjected to background checks.", "cmt_tr": ". İç denetçiler, diğer şeylerin yanı sıra varlıkların korunmasına ilişkin risk maruziyetlerini ve kontrollerin yeterliliği ve etkinliğini değerlendirir. Hassas pozisyonlar için işe alınan çalışanlara geçmiş araştırması yapılmaması ve varlıkların korunmasına ilişkin önceki denetim gözlemlerine yönelik düzeltici önlem alınmaması, kontrol zayıflıklarını gösteren kırmızı bayraklardır. Düzenli referans ve geçmiş araştırması, dürüstlük testleri ve uyuşturucu taramaları, etkili bir etik kültürün parçası olabilecek işe alma prosedürleridir.", "cmt_en": ". Internal auditors evaluate risk exposures and the adequacy and effectiveness of controls relating to, among other things, safeguarding of assets. Lack of background checks for employees hired for sensitive positions and failure to take corrective action on past engagement observations relating to safeguarding of assets are red flags signifying control weaknesses. Regular reference and background checks, integrity tests, and drug screening are hiring procedures that may be part of an effective ethical culture."}], "answer": 3}, {"q_tr": "Para transfer birimi bulunan çok uluslu bir şirketin şube ofisi için uygun iç kontrol, şunları gerektirir:", "q_en": "Appropriate internal control for a multinational corporation’s branch office that has a monetary transfer unit requires that", "options": [{"tr": "Havale başlatan kişinin banka mutabakatını yapmaması.", "en": "The individual who initiates wire transfers not reconcile the bank statement.", "cmt_tr": ". Kontrol, yönetim tarafından belirlenen hedef ve amaçlara ulaşma olasılığını artırmak için alınan her türlü eylemdir. Kontroller, herhangi bir kişinin normal görevleri sırasında hata veya hile yapma ve gizleme riskini azaltmak için görev ayrılığını içerir. Farklı kişiler işlemleri yetkilendirmeli, kaydetmeli ve işlemle ilişkili varlıkların saklanmasını sağlamalıdır. Banka hesaplarının bağımsız mutabakatı iyi iç kontrol için gereklidir.", "cmt_en": ". A control is any action taken by management to enhance the likelihood that established goals and objectives will be achieved. Controls include segregation of duties to reduce the risk that any person may be able to perpetrate and conceal errors or fraud in the normal course of his or her duties. Different persons should authorize transactions, record transactions, and maintain custody of the assets associated with the transaction. Independent reconciliation of bank accounts is necessary for good internal control."}, {"tr": "Şube müdürünün tüm havaleleri alması.", "en": "The branch manager receive all wire transfers.", "cmt_tr": ". Şube müdürünün tüm havaleleri alması önemli bir iç kontrol değerlendirmesi değildir.", "cmt_en": ". Having the branch manager receive all wire transfers is not an important internal control consideration."}, {"tr": "Döviz kurlarının iki farklı çalışan tarafından ayrı ayrı hesaplanması.", "en": "Foreign currency rates be computed separately by two different employees.", "cmt_tr": ". Döviz çevirme kurları hesaplanmaz, doğrulanır. Aynı departmandaki iki çalışanın aynı görevi yapması iç kontrolü önemli ölçüde güçlendirmez.", "cmt_en": ". Foreign currency translation rates are verified, not computed. Having two employees in the same department perform the same task will not significantly enhance internal control."}, {"tr": "Para transfer birimi çalışanlarının işe alınmasının kurumsal yönetim tarafından onaylanması.", "en": "Corporate management approve the hiring of monetary transfer unit employees.", "cmt_tr": ". Para transfer birimi çalışanlarının işe alınmasının kurumsal yönetim tarafından onaylanması önemli bir iç kontrol değerlendirmesi değildir.", "cmt_en": ". Corporate management approval of hiring monetary transfer unit employees is not an important internal control consideration."}], "answer": 0}, {"q_tr": "Bir iç denetçiye kuruluşun sigorta programını, risklerin en aza indirilmesi yaklaşımının uygunluğu dahil olmak üzere değerlendirmek üzere görev verilmiştir. Kuruluş büyük kaza kayıplarına ve tüm çalışanlarına sağlanan sağlık yardımlarına karşı kendi kendini sigorta etmektedir. Kuruluş, ülkenin çeşitli bölgelerinde 15.000'den fazla çalışanı olan büyük bir ulusal firmadır. Sağlık bakım programını yönetmek için bir dış hasar işlemcisi kullanmaktadır. Kuruluşun sağlık maliyetleri son 5 yıldır yılda yaklaşık %8 artmaktadır ve yönetim bu maliyetleri kontrol etmekle ilgilenmektedir. Sağlık bakım işlemcisi, verilmemiş hizmetler için fatura gönderen diş hekimleri tarafından yapılan hileyi önlemeye yardımcı olacak kontroller uygulamak istemektedir. Tüm taleplerin sağlık bakım işlemcisine elektronik olarak sunulduğunu varsayın. Aşağıdaki kontrol prosedürlerinden hangisi en etkili olur?", "q_en": "An internal auditor is assigned to perform an engagement to evaluate the organization’s insurance program, including the appropriateness of the approach to minimizing risks. The organization self-insures against large casualty losses and health benefits provided for all its employees. The organization is a large national firm with over 15,000 employees located in various parts of the country. It uses an outside claims processor to administer its healthcare program. The organization’s medical costs have been rising by approximately 8% per year for the past 5 years, and management is concerned with controlling these costs. The healthcare processor wishes to implement controls that would help prevent fraud by dentists who are submitting billings for services not provided. Assume further that all the claims are submitted electronically to the healthcare processor. Which of the following control procedures would be the most effective?", "options": [{"tr": "Çalışanın yaşına, benzer bir işlemin yakın zamanda yapılıp yapılmadığına veya talep başına ortalama maliyete göre beklentileri aşan bireye uygulanan işlemleri tanımlayan bir program geliştirmek.", "en": "Develop a program that identifies procedures performed on an individual in excess of expectations based on the age of the employee, whether a similar procedure was performed recently, or the average cost per claim.", "cmt_tr": ". Bu tespit edici kontrol kapsamında, olağandışı talepler tanımlanabilir ve meşru olup olmadıklarını belirlemek için takip edilebilir. Bu kontrol, makullük testi olarak bilinen bir BT giriş kontrolü türüdür.", "cmt_en": ". Under this detective control, unusual claims could be identified and followed up to determine if they are legitimate. This control is a type of IT input control known as a reasonableness test."}, {"tr": "Tüm sunulan taleplere, diş hekiminin talep edilen işlemlerin yapıldığını onaylayan imzalı bir beyanın eşlik etmesini istemek.", "en": "Require all submitted claims to be accompanied by a signed statement by the dentist testifying that the claimed procedures were performed.", "cmt_tr": ". İmzalı bir beyan istemek, diş hekiminin sahte talep sunmasını önlemez.", "cmt_en": ". Requiring a signed statement does not prevent the dentist from filing a false claim."}, {"tr": "Diş hekimlerine, sağlık bakım işlemcisine sunulan taleplerin tam niteliğini teyit etmelerini isteyen teyit mektupları göndermek.", "en": "Send confirmations to the dentists requesting them to confirm the exact nature of the claims submitted to the healthcare processor.", "cmt_tr": ". Diş hekimlerine teyit mektupları göndermek sahte taleplerin sunulmasını veya teyide sahte yanıt verilmesini önlemez.", "cmt_en": ". Sending confirmations to the dentists does not prevent the filing of false claims or a false response to the confirmation."}, {"tr": "Entegre bir test tesisi geliştirmek ve sistemin bu tür talepleri tutarlı bir şekilde tespit ettiğini doğrulamak için sahte talepler sunmak.", "en": "Develop an integrated test facility and submit false claims to verify that the system is detecting such claims on a consistent basis.", "cmt_tr": ". Entegre test tesisi, talebin veya teyide verilen sahte yanıtın uygunluğu hakkında değil, yalnızca talebin işlenmesinin doğruluğu hakkında bilgi sağlar.", "cmt_en": ". An integrated test facility would only provide information about the correctness of the processing of the claim or a false response to the confirmation, not on the propriety of the claim."}], "answer": 0}, {"q_tr": "Bir iç denetçi, kuruluşun finansal türev yatırımlarına ilişkin politikasını gözden geçirmektedir. Aşağıdaki politika kombinasyonlarından hangisinin en etkili olması muhtemeldir?", "q_en": "An internal auditor is reviewing the organization’s policy regarding investing in financial derivatives. Which of the following combination of policies is likely to be the most effective?", "options": [{"tr": "Türevlerin amacını belirten bir beyan, türevlerin miktar ve türleri için yetkilendirme limitleri ve bireysel yatırımcılar için özel limitler.", "en": "A statement indicating the purpose of the derivatives, authorization limits for the amount and types of derivatives, and specific limits for individual traders.", "cmt_tr": ". Türevlerin riskten korunma veya spekülasyon amacıyla kullanılıp kullanılmayacağını belirten bir politika kritik bir yönlendirici kontroldür. Türevlerin miktarları ve türleri ile bireysel yatırımcılar için yetkilendirme limitleri de uygun ve önemli kontrollerdir.", "cmt_en": ". A policy specifying whether derivatives are to be used for hedging or speculating is a crucial directive control. Authorization limits for the amounts and types of derivatives as well as for individual traders are also appropriate and important controls."}, {"tr": "Türevlerin miktar ve türleri için özel yetkilendirme limiti ve bireysel yatırımcılar için özel limitler.", "en": "A specific authorization limit for the amount and types of derivatives and specific limits for individual traders.", "cmt_tr": ". Türevler ve bireysel yatırımcılar için yetkilendirme limitlerini belirten bir politika uygundur, ancak türevlerin amacının (riskten korunma veya spekülasyon) belirtilmesi de önemlidir.", "cmt_en": ". A policy specifying the authorization limits for derivatives and for individual traders are appropriate, but specifying the purpose of the derivatives (hedging or speculation) is also important."}, {"tr": "Herhangi bir yatırımcı için yetkilendirilen miktar üzerinde özel bir limit ve her işlemin yönetim kurulu tarafından gözden geçirilmesini gerektiren bir beyan.", "en": "A specific limit on the amount authorized for any single trader and a statement requiring board review of each transaction.", "cmt_tr": ". Türevler için yetkilendirme limitlerini belirten bir politika uygun bir yönlendirici kontroldür. Ancak her türev işleminin yönetim kurulu tarafından gözden geçirilmesini gerektiren bir politika maliyet açısından etkili değildir.", "cmt_en": ". A policy specifying the authorization limits for derivatives is an appropriate directive control. However, a policy requiring board review of every derivatives transaction is cost ineffective."}, {"tr": "Her işlemin yönetim kurulu tarafından gözden geçirilmesini gerektiren bir beyan ve türevlerin miktar ve türleri için yetkilendirme limitleri.", "en": "A statement requiring board review of each transaction and authorization limits for the amount and types of derivatives.", "cmt_tr": ". Her türev işleminin yönetim kurulu tarafından gözden geçirilmesini gerektiren bir politika maliyet açısından etkili değildir. Yönetim günlük operasyonlardan sorumludur ve yönetim kurulunun politikalarına uyması beklenir.", "cmt_en": ". A policy requiring board review of every derivatives transaction is cost ineffective. Management is responsible for daily operations and is expected to conform to the policies of the board."}], "answer": 0}, {"q_tr": "Bir araç kiralama şirketinin filo bakım bölümü, her stok işlemi türü için farklı bir kod kullanır. Günlük özet rapor, faaliyetleri parça numarası ve işlem koduna göre listeler. Rapor, parça odası amiri tarafından günün malzeme talep formlarıyla mutabık kılınır ve ardından filo müdürünün onayına sunulur. Parça odası amiri tarafından özet raporun günün malzeme talep formlarıyla mutabık kılınması...", "q_en": "A rental car agency’s fleet maintenance division uses a different code for each type of inventory transaction. A daily summary report lists activity by part number and transaction code. The report is reconciled by the parts room supervisor to the day’s material request forms and is then forwarded to the fleet manager for approval. The reconciliation of the summary report to the day’s material request forms by the parts room supervisor", "options": [{"tr": "Tüm malzeme talep formlarının onaylandığını doğrular.", "en": "Verifies that all material request forms were approved.", "cmt_tr": ". Bu mutabakat, yetkilendirmelerin gözden geçirilmesini mutlaka içermez.", "cmt_en": ". This reconciliation would not necessarily include a review of authorizations."}, {"tr": "Belirli bir işlem için hangi malzemenin mevcut olduğuna dair belge sağlar.", "en": "Provides documentation as to what material was available for a specific transaction.", "cmt_tr": ". Belirli bir işlem için mevcut malzeme, mutabakatın bir parçası değildir.", "cmt_en": ". The material available for a specific transaction is not part of the reconciliation."}, {"tr": "Tüm malzeme talep formlarının verilen tüm parçalar için girildiğini doğrular.", "en": "Confirms that all material request forms are entered for all parts issued.", "cmt_tr": ". Tüm talep formları sunulmamış olabilir.", "cmt_en": ". Not all request forms may have been submitted."}, {"tr": "Veri girişinin doğruluğunu ve eksiksizliğini sağlar.", "en": "Ensures the accuracy and completeness of data input.", "cmt_tr": ". Bu mutabakat, veri girişinin doğru ve eksiksiz olduğunu doğrulamak için bir giriş kontrolüdür. Talep edilen parçalar bakım faaliyetlerinde kullanılan parçalarla tutarlı olmalıdır. Açıklanamayan farklar araştırılmalıdır.", "cmt_en": ". This reconciliation is an input control to verify that data entry is accurate and complete. The parts requested should be consistent with the parts used in the maintenance activities. Unexplained variances should be investigated."}], "answer": 3}, {"q_tr": "Bir inşaat sözleşmesini içeren denetim sırasında, iç denetçi yükleniciye kaldırılan her ton toprak için ödeme yapıldığını keşfetti. Sözleşme, kaldırılan metreküp başına ödemeyi öngörüyordu. Hangi iç kontrol bu hatayı önleyebilirdi?", "q_en": "During an engagement involving a construction contract, the internal auditor discovered that the contractor was being paid for each ton of dirt removed. The contract called for payment based on cubic yards removed. Which internal control might have prevented this error?", "options": [{"tr": "Faturaların satın alma siparişleri veya sözleşmelerle karşılaştırılması.", "en": "Comparison of invoices with purchase orders or contracts.", "cmt_tr": ". Faturaların satın alma siparişleri veya sözleşmelerle karşılaştırılması, yüklenicinin faturasında sözleşmedekinden farklı bir ölçü birimi kullanıldığını tespit edecek tespit edici bir kontroldür. Dolayısıyla ödeme temeli, birim fiyat sözleşmesiyle tutarsızdı.", "cmt_en": ". Comparison of invoices with purchase orders or contracts is a detective control to detect that the contractor’s invoice used a unit of measure different from that in the contract. Thus, the basis of payment was inconsistent with the unit-price contract."}, {"tr": "Faturaların teslim alma raporlarıyla karşılaştırılması.", "en": "Comparison of invoices with receiving reports.", "cmt_tr": ". Kaldırılan toprak kuruluş tarafından teslim alınmayacaktır. Bu nedenle teslim alma raporları mevcut olmazdı.", "cmt_en": ". The dirt removed would not have been received by the organization. Hence, no receiving reports would have existed."}, {"tr": "Fiili maliyetlerin bütçelenmiş maliyetlerle karşılaştırılması.", "en": "Comparison of actual costs with budgeted costs.", "cmt_tr": ". Bu karşılaştırma, sapmanın belirli nedenini tespit edemezdi.", "cmt_en": ". This comparison would not have detected the specific reason for a variance."}, {"tr": "Fatura tutarlarının uzatma kontrolleri.", "en": "Extension checks of invoice amounts.", "cmt_tr": ". Sorun matematiksel bir hata değil, hatalı bir ödeme temeliydi.", "cmt_en": ". The problem was not a mathematical error but an erroneous basis for payment."}], "answer": 0}, {"q_tr": "Bir satın alma departmanını içeren denetim sırasında, iç denetçi satın alma müdürünün kardeşinin sahibi olduğu bir ofis malzemesi tedarikçisinden birçok satın alma yapıldığını (normal fiyatlarla) keşfetti. Bu tür satın almaları kısıtlayan kontroller mevcuttu ve hile yapıldığı görünmüyordu. Bu durumda iç denetçi ne tavsiye etmelidir?", "q_en": "During an engagement involving a purchasing department, an internal auditor discovered that many purchases were made (at normal prices) from an office supplier whose owner was the brother of the director of purchasing. Controls were in place to restrict such purchases and no fraud appears to have been committed. In this case, the internal auditor should recommend", "options": [{"tr": "Alıcı tarafından başlatılan ve satın alma müdürü tarafından onaylanan bir onaylı satıcı dosyasının geliştirilmesi.", "en": "The development of an approved-vendor file initiated by the buyer and approved by the director of purchasing.", "cmt_tr": ". Müdür tarafından onaylanan bir onaylı satıcı dosyası çıkar çatışmasını önlemez.", "cmt_en": ". An approved-vendor file approved by the director would not prevent a conflict of interest."}, {"tr": "Tüm mallar için bir fiyat politikası (aralığı) oluşturulması.", "en": "Establishment of a price policy (range) for all goods.", "cmt_tr": ". Çıkar çatışmalarıyla uğraşırken fiyat bir faktör değildir.", "cmt_en": ". Price is not a factor when dealing with conflicts of interest."}, {"tr": "Çıkar çatışması politikasının başlatılması.", "en": "The initiation of a conflict-of-interest policy.", "cmt_tr": ". Politika, kontrol sağlamanın bir aracıdır. Açıkça yazılı olarak belirtilmeli ve uygun taraflara sistematik olarak iletilmelidir. Çıkar çatışması politikası, aksi takdirde üst yönetime açıklanmadıkça ve onaylanmadıkça akrabalarla iş ilişkilerini kısıtlayan yönergeler içermelidir.", "cmt_en": ". A policy is one means of achieving control. It is a general guide to and limit on action that should be clearly stated in writing and systematically communicated to appropriate parties. A conflict-of-interest policy should contain directives that restrict business dealings with relatives unless otherwise disclosed to and approved by senior management."}, {"tr": "Teslim alma müfettişleri tarafından tüm teslimatların denetlenmesi.", "en": "The inspection of all receipts by receiving inspectors.", "cmt_tr": ". Teslim alma müfettişleri tarafından tüm teslimatların denetlenmesi, bu durumla ilgili olmayan uygun bir teslim alma kontrolüdür.", "cmt_en": ". The inspection of all receipts by receiving inspectors is an appropriate receiving control that does not pertain to this situation."}], "answer": 2}, {"q_tr": "Aşağıdaki politika ve prosedürlerden hangisi sigorta fonksiyonunun etkili yönetimiyle tutarlıdır?", "q_en": "Which of the following policies and procedures is consistent with effective administration of the insurance function?", "options": [{"tr": "Sigorta kapsamı faturaları sigorta müdürü tarafından alınır ve ödemeler sigorta müdürü tarafından yapılır.", "en": "Billings for insurance coverage are received and payments disbursed by the insurance manager.", "cmt_tr": ". Müdürün çok fazla sorumluluğu var; görev ayrılığı yoktur. Faturaların alınması ve ödemelerin yapılması farklı kişiler tarafından yapılmalıdır.", "cmt_en": ". The manager has too many responsibilities; there is no separation of duties. The receipt of billings and the disbursement of payments should be done by different people."}, {"tr": "Poliçe kapsamları her yıl bir fiyat endeksi uygulanarak önceki yıl kapsamlarına göre ayarlanır.", "en": "Policy coverages are adjusted each year by applying a price index to previous year coverages.", "cmt_tr": ". Poliçe kapsamları uygun kapsamı sağlamak için her yıl sistematik olarak değerlendirilmelidir, ancak sadece enflasyona göre ayarlama sigortalanması gereken risk derecesini belirlemek için yeterli değildir.", "cmt_en": ". While policy coverages should be systematically evaluated each year to assure appropriate coverage, mere adjustment for inflation is not adequate to determine the degree of risk that should be insured."}, {"tr": "Nihai uzlaşmalar, talepler geliştirildikten ve sunulduktan sonra müzakere edilir.", "en": "Final settlements are negotiated after claims are developed and submitted.", "cmt_tr": ". Hasar işleme süreci, kuruluşun etkilenen operasyonel biriminin herhangi bir talep temeli hakkında derhal bildirimde bulunmasıyla başlar. Sigortacının nihai tazmin edilebilir kaybı azaltmak için gerekli gördüğü adımları atmasına olanak tanımak için derhal bildirim gereklidir. Sigorta fonksiyonu daha sonra talebi belgelemek ve resmi olarak taşıyıcıya sunmak için operasyonel birimle işbirliği yapar. Ardından sigorta fonksiyonu, talebin gözden geçirilmesi ve bir uzlaşma müzakeresinde yer alacaktır.", "cmt_en": ". The claims handling process begins with prompt reporting by the affected operational unit of the organization of any basis for a claim. Prompt reporting is required to permit the insurer to take whatever steps it may deem necessary to reduce the ultimate compensable loss. The insurance function then cooperates with the operational unit to document and formally submit the claim to the carrier. Subsequently, the insurance function will be involved in any required review of the claim and negotiation of a settlement."}, {"tr": "Poliçeler her zaman belirli bir kapsam düzeyi için en düşük ücreti sunan taşıyıcıyla yapılır.", "en": "Policies are always placed with the carrier that offers the lowest rate for a specified level of coverage.", "cmt_tr": ". Sağduyu, ücretlere ek olarak taşıyıcının mali kaynakları ve hasar işleme adaleti ve verimliliği gibi diğer faktörlerin de dikkate alınmasını gerektirir.", "cmt_en": ". Prudence dictates that other factors, e.g., the financial resources of the carrier and the fairness and efficiency of claims handling, be considered in addition to rates."}], "answer": 2}, {"q_tr": "Bir çalışan, yatırım menkul kıymetlerini içeren kuruluşun kiralık kasasını başka bir çalışan eşliğinde olmadan ziyaret edememeli. Bir çalışanın kiralık kasayı refakatsiz ziyaret edebilmesinin olası sonucu ne olabilir?", "q_en": "An employee should not be able to visit the organization’s safe deposit box containing investment securities without being accompanied by another employee. What would be a possible consequence of an employee being able to visit the safe deposit box unaccompanied?", "options": [{"tr": "Çalışan, kurumsal yatırımları kısa vadeli kişisel banka kredisi için teminat olarak verebilir.", "en": "The employee could pledge organizational investments as security for a short-term personal bank loan.", "cmt_tr": ". Banka, kuruluş personeli tarafından incelenebilen tüm kiralık kasa ziyaretlerinin bir kaydını tutmalıdır. Erişim yetkili görevlilerle sınırlandırılmalıdır. Kuruluşlar genellikle kasaya erişim için iki yetkili kişinin bulunmasını gerektirir. Bu önlem, örneğin menkul kıymetlerin geçici olarak bir kredi teminatı olarak kullanılması (menkul kıymetlerin rehni) üzerinde denetim kontrolü sağlar.", "cmt_en": ". The bank should maintain a record, which can be inspected by organizational personnel, of all safe deposit box visits. Access should be limited to authorized officers. Organizations typically require the presence of two authorized persons for access to the box. This precaution provides supervisory control over, for example, the temporary removal of the securities to serve as a pledge for a loan (hypothecation of securities)."}, {"tr": "Çalışan menkul kıymetleri çalabilir ve hırsızlık hiçbir zaman keşfedilmez.", "en": "The employee could steal securities and the theft would never be discovered.", "cmt_tr": ". Yatırım menkul kıymetlerini içeren bir denetim, varlık kayıtlarında değişiklik yapılmadığı varsayılarak doğrudan hırsızlığı sonunda ortaya çıkaracaktır.", "cmt_en": ". An engagement involving investment securities would eventually uncover an outright theft assuming no alteration of the asset records."}, {"tr": "Çalışan için sadakat sigortası yapılması imkânsız olur.", "en": "It would be impossible to obtain a fidelity bond on the employee.", "cmt_tr": ". Sadakat sigortası yapılması, belirli bir kontrolün varlığına değil, çalışanın karakterine bağlıdır.", "cmt_en": ". Obtaining a fidelity bond is contingent upon the character of the employee, not the presence of a specific control."}, {"tr": "Kuruluş personelinin kiralık kasayı ne zaman ziyaret ettiğine dair kayıt olmazdı.", "en": "There would be no record of when organizational personnel visited the safe deposit box.", "cmt_tr": ". Banka bir ziyaret kaydı tutar.", "cmt_en": ". The bank maintains a record of visits."}], "answer": 0}, {"q_tr": "Küçük bir kuruluştaki iki ofis memurundan biri satış faturası hazırlar; ancak fatura, muhasebeci tarafından defteri kebire ve alacak hesapları yardımcı defterine rakam tersine çevirme sonucu daha küçük bir tutar olarak yanlış kaydedilir. Müşteri daha sonra aylık hesap özetindeki tutarı gönderir. Departmanda yalnızca üç çalışan olduğu varsayılırsa, bu tür bir hatayı önlemek için en etkili kontrol hangisidir?", "q_en": "One of two office clerks in a small organization prepares a sales invoice; however, the invoice is incorrectly entered by the bookkeeper in the general ledger and the accounts receivable subsidiary ledger for a smaller amount resulting from a transposition of digits. The customer subsequently remits the amount on the monthly statement. Assuming only three employees are in the department, the most effective control to prevent this type of error is", "options": [{"tr": "İkinci ofis memurunu fiyatları, iskontoları, uzatmaları, toplamları ve fatura seri numaralarını bağımsız olarak kontrol etmeye atamak.", "en": "Assigning the second office clerk to make an independent check of prices, discounts, extensions, footings, and invoice serial numbers.", "cmt_tr": ". Hatalı kayıt, bu adımdan sonra meydana gelen bir hataydı.", "cmt_en": ". The misposting was an error that occurred subsequent to this step."}, {"tr": "Aylık hesap özetlerinin muhasebeci tarafından hazırlanmasını ve postalama öncesinde diğer ofis memurundan biri tarafından doğrulanmasını istemek.", "en": "Requiring that monthly statements be prepared by the bookkeeper and verified by one of the other office clerks prior to mailing.", "cmt_tr": ". Bu kontroller ilk hatalı kaydı tespit etmez. Hesap özetleri ve mutabakat hatalı kayıtlara dayanmaktadır.", "cmt_en": ". These controls will not detect an initial misposting. The statements and the reconciliation are based on the misposted records."}, {"tr": "Kayıt süreçlerini kontrol etmek için önceden belirlenmiş toplamları kullanmak.", "en": "Using predetermined totals to control posting routines.", "cmt_tr": ". Kaydedilecek işlemler için bir kontrol toplamı (satış faturalarının toplam tutarı) oluşturulmalıdır. Bu toplam daha sonra bireysel hesaplara kaydedilen kalemlerin toplamıyla (defteri kebire ve alacak hesapları yardımcı defterine kaydedilen tutarların toplamı) karşılaştırılmalıdır.", "cmt_en": ". A control total (total amount of sales invoices) should be generated for the transactions to be posted. It should then be compared with the total of items posted to the individual accounts (total of amounts posted to the general ledger and the accounts receivable subsidiary ledger)."}, {"tr": "Muhasebeciden alacak hesapları yardımcı defteri ile defteri kebirin periyodik mutabakatını yapmasını istemek.", "en": "Requiring the bookkeeper to perform periodic reconciliations of the accounts receivable subsidiary ledger and the general ledger.", "cmt_tr": ". Bu kontroller ilk hatalı kaydı tespit etmez. Hesap özetleri ve mutabakat hatalı kayıtlara dayanmaktadır.", "cmt_en": ". These controls will not detect an initial misposting. The statements and the reconciliation are based on the misposted records."}], "answer": 2}, {"q_tr": "Bir ücretlendirme programının yönetiminin aşağıdaki yönlerinden hangisi uzun vadede en önemli kontroldür?", "q_en": "Which of the following aspects of the administration of a compensation program is the most important control in the long run?", "options": [{"tr": "Sektör ortalamasıyla rekabetçi olmak için resmi olmayan bir ücret ve maaş politikası.", "en": "An informal wage and salary policy to be competitive with the industry average.", "cmt_tr": ". Belirsiz bir politika, ücretlendirme programlarının adil yönetimine çok az katkıda bulunur veya hiç bulunmaz.", "cmt_en": ". A vague policy would contribute little if anything to the fair administration of compensation programs."}, {"tr": "Önceden belirlenmiş değerlendirme kriterlerine dayalı bir iş sınıflandırma planı.", "en": "A plan of job classifications based on predefined evaluation criteria.", "cmt_tr": ". İş sınıflandırmaları ve dereceleri iş analizi aşamasında oluşturulur ve topluluk ile sektördeki genel ücret düzeyi belirlenmelidir. Ücretlendirme daha sonra iş sınıflandırma planına göre, genellikle her derece için bir aralık dahilinde belirlenir. Esnekliğe izin vermek için bir aralık gereklidir. Ücretlendirme, aşırı maliyetten kaçınmak ve rekabetçi fiyatlandırmaya izin vermek için yeterince düşük, ancak gerekli personeli çekmek için yeterince yüksek olmalıdır.", "cmt_en": ". Job classifications and grades are established during the job analysis phase and the general level of compensation in the community and in the industry must be determined. Compensation is then fixed based on the plan of job classifications, usually within a range for each grade. A range is necessary to allow for flexibility. Compensation should be low enough to avoid excess cost and to permit competitive pricing but high enough to attract needed personnel."}, {"tr": "Bireysel çalışan ücretlendirmesi için bir ücret ve maaş gözden geçirme planı.", "en": "A wage and salary review plan for individual employee compensation.", "cmt_tr": ". Bireysel ücretlendirmenin gözden geçirilmesine yönelik bir plan, bir sınıflandırma planını ön koşul olarak gerektirir.", "cmt_en": ". A plan for reviewing individual compensation presupposes a classification plan."}, {"tr": "Makul ölçüde rekabetçi genel bir ücretlendirme düzeyi.", "en": "A level of general compensation that is reasonably competitive.", "cmt_tr": ". Makul ölçüde rekabetçi ücretlendirme bir sınıflandırma planını ön koşul olarak gerektirir.", "cmt_en": ". Reasonably competitive compensation is predicated on a classification plan."}], "answer": 1}, {"q_tr": "Fiziksel varlıklarla ilişkili potansiyel mali kayıpları en aza indirmek için varlıklar ne kadar tutarda sigortalanmalıdır?", "q_en": "To minimize potential financial losses associated with physical assets, the assets should be insured in an amount that is", "options": [{"tr": "Periyodik değerlemelerle desteklenen tutar.", "en": "Supported by periodic appraisals.", "cmt_tr": ". Risk değerlendirmesinin sonuçlarına dayanarak, iç denetim fonksiyonu kuruluşun yönetişimi, operasyonları ve bilgi sistemlerini kapsayan kontrollerin yeterliliğini ve etkinliğini değerlendirmelidir. Bu, diğer şeylerin yanı sıra varlıkların korunmasını içermelidir. Varlıkların korunması onları sigortalamayı içerir. Sigorta türleri ve tutarları periyodik değerlemelerle desteklenmelidir.", "cmt_en": ". Based on the results of the risk assessment, the internal audit function should evaluate the adequacy and effectiveness of controls encompassing the organization’s governance, operations, and information systems. This should include, among other things, safeguarding of assets. Safeguarding assets includes insuring them. The types and amounts of insurance should be supported by periodic appraisals."}, {"tr": "Yönetim kurulu tarafından belirlenen tutar.", "en": "Determined by the board of directors.", "cmt_tr": ". Sigorta kapsamının belirlenmesi yönetim kurulunun fonksiyonu değildir.", "cmt_en": ". The determination of insurance coverage is not a function of the board of directors."}, {"tr": "Tüketici fiyat endeksi gibi bir ekonomik gösterge ile otomatik olarak ayarlanan tutar.", "en": "Automatically adjusted by an economic indicator such as the consumer price index.", "cmt_tr": ". Tüketici fiyat endeksi genellikle sabit varlıklar için uygun bir düzeltme faktörü sağlamaz.", "cmt_en": ". The consumer price index generally does not provide an appropriate adjustment factor for fixed assets."}, {"tr": "Bireysel varlıkların defter değerine eşit tutar.", "en": "Equal to the book value of the individual assets.", "cmt_tr": ". Defter değerleri bir varlığın yenileme veya gerçek değerini yansıtmayabilir.", "cmt_en": ". Book values may not reflect the replacement or real value of an asset."}], "answer": 0}, {"q_tr": "Finansman veya hazine döngüsünün bir kontrol hedefi, borç ve öz sermaye araçlarını içeren işlemlerin uygun şekilde yetkilendirilmesidir. Aşağıdaki kontrollerden hangisi bu hedefe en iyi şekilde ulaşır?", "q_en": "One control objective of the financing or treasury cycle is the proper authorization of transactions involving debt and equity instruments. Which of the following controls would best meet this objective?", "options": [{"tr": "Fonların saklanması sorumluluğunun işlemin kaydedilmesinden ayrılması.", "en": "Segregation of responsibility for custody of funds from recording of the transaction.", "cmt_tr": ". Fonların saklanması sorumluluğunun işlemin kaydedilmesinden ayrılması, yetkilendirme değil, varlıkların korunması hedefiyle ilgilidir.", "cmt_en": ". Segregation of responsibility for custody of funds from recording of the transaction concerns the objective of safeguarding of assets, not authorization."}, {"tr": "Büyük finansman veya geri ödeme tekliflerinin yönetim kurulu tarafından gözden geçirilmesini gerektiren yazılı politikalar.", "en": "Written policies requiring review of major funding or repayment proposals by the board.", "cmt_tr": ". Yetkilendirme kontrol hedefi, işlemlerin yönetimin isteklerine uygun şekilde yürütülmesiyle ilgilidir. Bu kontrol hedefine ulaşmanın bir yolu politikaların eylem rehberleri olarak oluşturulmasıdır. Bir karar kuruluşun sermaye yapısını etkilediğinde, en üst düzeyde gözden geçirmeyi gerektiren bir politika yürürlükte olmalıdır.", "cmt_en": ". The control objective of authorization relates to the proper execution of transactions in accordance with management’s wishes. One means of achieving this control objective is the establishment of policies as guides to action. When a decision affects the capitalization of the entity, a policy should be in force requiring review at the highest level."}, {"tr": "Tüm yeni borç veya öz sermaye ihraçlarında bir aracı kurum kullanılması.", "en": "Use of an underwriter in all cases of new issue of debt or equity instruments.", "cmt_tr": ". Tüm yeni borç veya öz sermaye ihraçlarında bir aracı kurum kullanılması bir kontrol değil, menkul kıymet ihraç etmenin belirli bir yöntemidir.", "cmt_en": ". Use of an underwriter in all cases of new issue of debt or equity instruments does not state a control but rather a specific means of issuing securities."}, {"tr": "Önemli tutardaki tüm çekler için iki imza gerektirmek.", "en": "Requiring two signatures on all checks of a material amount.", "cmt_tr": ". Çoğu kuruluşta yetkilendirme, işlemlerin yürütüldüğü yönetim düzeyinin üstünde gerçekleşir. Örneğin, belirli çalışanlara belirli bir tutara kadar ödeme yapma yetkisi verilebilir. İkinci imza, kuruluşun politika ve prosedürlerinin uygulandığını teyit eden başka bir çalışan tarafından atılır.", "cmt_en": ". In most organizations, the authorization occurs at a managerial level above that at which transactions are executed. For example, certain employees may be authorized to make payments up to a certain amount. The second signature is by another employee who thereby confirms that the entity’s policies and procedures have been followed."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi bir kontrol zayıflığını tanımlar?", "q_en": "Which of the following describes a control weakness?", "options": [{"tr": "Satın alma prosedürleri iyi tasarlanmıştır ve satın alma amiri aksini belirtmediği sürece uygulanır.", "en": "Purchasing procedures are well designed and are followed unless otherwise directed by the purchasing supervisor.", "cmt_tr": ". Yönetimin takdirine bağlı olarak bir kenara bırakılan iyi tasarlanmış prosedürler yeterli kontrol değildir. Kontrol prosedürlerinin etkili olabilmesi için tutarlı bir şekilde uygulanması gerekir. Ancak yönetimin kontrolleri geçersiz kılma olasılığı iç kontrolün doğal bir sınırlamasıdır.", "cmt_en": ". Well-designed procedures that are set aside at management’s discretion are not adequate controls. Control procedures must be followed consistently to be effective. However, the possibility of management override is an inherent limitation of internal control."}, {"tr": "Ön numaralı boş satın alma siparişleri satın alma departmanı içinde güvence altına alınmıştır.", "en": "Prenumbered blank purchase orders are secured within the purchasing department.", "cmt_tr": ". Satın alma departmanı içinde güvence altına alınan ön numaralı boş satın alma siparişlerinin kullanılması yaygın bir kontroldür.", "cmt_en": ". Use of prenumbered blank purchase orders secured within the purchasing department is a common control."}, {"tr": "Normal operasyonel satın almalar 500 ile 1.000 arasındadır ve 1.000'in üzerindeki satın almalar için iki imza gerekir.", "en": "Normal operational purchases fall in the range from $500 to $1,000 with two signatures required for purchases over $1,000.", "cmt_tr": ". Daha büyük satın almalar için daha katı bir yetkilendirme prosedürü gerektirmek, belgelerle desteklendiği sürece uygun bir kontroldür.", "cmt_en": ". Requiring a more stringent authorization procedure for larger purchases is an appropriate control as long as documentation supports the purchases."}, {"tr": "Satın alma ajanı, kuruluşun tedarikçilerinden birinin hissesini portföyünde listeleyen halka açık bir yatırım fonuna yatırım yapar.", "en": "The purchasing agent invests in a publicly traded mutual fund that lists the stock of one of the organization’s suppliers in its portfolio.", "cmt_tr": ". Satın alma ajanının yatırım fonu yatırımı çıkar çatışması olmamalıdır. Yatırım getirisi ile ajanın tedarikçiyi kayırması arasındaki ilişki çok zayıftır.", "cmt_en": ". The purchasing agent’s mutual fund investment should not be a conflict of interest. The relationship between the return on the investment and any possible action by the agent to favor the supplier is very weak."}], "answer": 0}, {"q_tr": "Bir üretici, üretim sürecinde cıvata, somun, pul ve eldiven gibi küçük, ucuz ürünleri büyük miktarlarda kullanır. Bu mallar satın alındıklarında toplu tutarlar olarak stok kaydedilir. Bu ürünlere zamanında erişim sağlamak için atölye zemininde kutular bulunur. Gerektiğinde kutular stoktan yenilenir ve ürünlerin maliyeti atölye genel giderlerinin bir parçası olan sarf malzeme hesabına yüklenir. Bu ortamda kontrollerin uygun bir iyileştirmesi ne olabilir?", "q_en": "A manufacturer uses large quantities of small, inexpensive items, such as nuts, bolts, washers, and gloves, in the production process. As these goods are purchased, they are recorded in inventory in bulk amounts. Bins are located on the shop floor to provide timely access to these items. When necessary, the bins are refilled from inventory, and the cost of the items is charged to a consumable supplies account, which is part of shop overhead. Which of the following would be an appropriate improvement of controls in this environment?", "options": [{"tr": "Kutuları stok deposuna taşımak.", "en": "Relocate bins to the inventory warehouse.", "cmt_tr": ". Kutular, cıvata ve somunların ihtiyaç duyulduğu atölye zemininde olmalıdır.", "cmt_en": ". The bins should be on the shop floor where the nuts, bolts, etc., are needed."}, {"tr": "Yönetimin bütçeye göre kullanılan sarf malzeme maliyetine ilişkin raporları gözden geçirmesini istemek.", "en": "Require management review of reports on the cost of consumable items used in relation to budget.", "cmt_tr": ". Maliyet-fayda kriterine uygun olarak, üretim sarf malzemeleri (cıvata, somun vb.) için kontrol harcamaları asgari düzeyde olmalıdır. Yine de bazı kontroller uygulanmalıdır. Örneğin, kullanım tahmin edilmeli ve stok bakiyeleriyle ve kullanan personel sayısıyla karşılaştırılmalıdır. Ayrıca, katlanılan maliyetler ile bütçelenen tutarlar arasındaki fark için sapmalar hesaplanmalıdır.", "cmt_en": ". In accordance with the cost-benefit criterion, control expenditures for manufacturing supplies (nuts, bolts, etc.) should be minimal. Nevertheless, some controls should be implemented. For example, usage should be estimated and compared with stock balances and also with the number of using personnel. Moreover, variances should be calculated for the difference between costs incurred and budgeted amounts."}, {"tr": "Normal çalışma saatlerinde kutuları kilitlemek.", "en": "Lock the bins during normal working hours.", "cmt_tr": ". Kutuları kilitlemek atölye personelinin verimliliğini ve etkinliğini sınırlar.", "cmt_en": ". Locking the bins would limit the efficiency and effectiveness of shop personnel."}, {"tr": "Küçük maliyet ve boyuttaki ürünler için bu kontrollerin hiçbirine gerek yoktur.", "en": "None of these controls are needed for items of minor cost and size.", "cmt_tr": ". Küçük maliyet ve boyuttaki ürünler için bile kontroller gereklidir.", "cmt_en": ". Controls are needed even for items of minor cost and size."}], "answer": 1}, {"q_tr": "Bir kuruluşun üretim tesislerinden birinin denetimine yönelik ön inceleme sırasında, denetçi tesisin bütçelenenleri çok aşan maliyetlerle üretim sorunları yaşadığını ve mamul stok seviyelerinin açıkça aşırı olduğunu keşfeder. Aşağıdaki yönetim kontrol prosedürlerinden hangisi sorunları yönetimin dikkatine daha erken getirirdi?", "q_en": "During the preliminary survey for an audit of one of an organization’s manufacturing plants, an auditor discovers that the plant experiences production problems with costs far in excess of those budgeted and with finished goods inventory levels that are clearly excessive. Which of the following management control procedures would have best brought the problems to management’s attention earlier?", "options": [{"tr": "Her tesiste standart maliyet prosedürlerinin uygulanması ve sapma özetinin haftalık bazda yönetime raporlanması.", "en": "Implementing standard costing procedures at each plant, with a summary of variances reported to management on a weekly basis.", "cmt_tr": ". Standart maliyetlendirme olumsuz maliyet sapmalarını tespit eder ancak aşırı mamul stoğunu tespit etmez.", "cmt_en": ". Standard costing detects unfavorable cost variances but not excess finished goods inventory."}, {"tr": "Her tesiste sürekli stok kontrol prosedürlerinin oluşturulması ve iki haftalık üretimi aşan stok kalemlerini ayrıntılayan bir raporun haftalık bazda yönetime sunulması.", "en": "Establishing perpetual inventory control procedures at each plant, with a report detailing any inventory items with levels in excess of two weeks’ production provided to management on a weekly basis.", "cmt_tr": ". Sürekli stok kontrol prosedürleri aşırı mamul stoğunu tespit eder ancak olumsuz maliyet sapmalarını tespit etmez.", "cmt_en": ". Perpetual inventory control procedures detect excess finished goods inventory but not unfavorable cost variances."}, {"tr": "Yönetim tahminlerine dayalı aylık üretim planlaması, fiili üretimin tahmin edilen üretimle ve fiili maliyetlerin bütçelenen maliyetlerle karşılaştırıldığı bir raporun haftalık bazda yönetime sunulması.", "en": "Planning monthly production based on management forecasts, with a report comparing actual production with forecasted production and actual costs with budgeted costs provided to management on a weekly basis.", "cmt_tr": ". Fiili üretimin yönetim tahminleriyle karşılaştırılması mamul stoğunun aşırı olup olmadığını tespit eder, fiili maliyetlerin bütçelenen maliyetlerle karşılaştırılması ise olumsuz maliyet sapmalarını tespit eder.", "cmt_en": ". Comparing actual production with management forecasts detects whether finished goods inventory is excessive, and comparing actual costs with budgeted costs detects unfavorable cost variances."}, {"tr": "Fiili satışların tahmin edilen satışlarla ve bütçelenen brüt kâr marjının fiili brüt kâr marjıyla karşılaştırılması ve raporun haftalık bazda yönetime sunulması.", "en": "Comparing actual sales with forecasted sales and budgeted gross margin with actual gross margin, with a report provided to management on a weekly basis.", "cmt_tr": ". Satılan malların maliyeti brüt kâr marjının bir bileşeni olduğundan, fiili ve bütçelenen satışların ve fiili ve bütçelenen brüt kâr marjının karşılaştırılması prosedürleri olumsuz maliyet sapmalarını tespit edebilir, aşırı mamul stoğunu tespit edemez.", "cmt_en": ". Because cost of goods sold is a component of gross margin, comparing actual and budgeted sales and actual and budgeted gross margin procedures may detect unfavorable cost variances, not excess finished goods inventory."}], "answer": 2}, {"q_tr": "Bir firmanın stoğu 1.000 farklı kalemden oluşur ve bunların 20 tanesi dolar değerinin %70'ini oluşturur. En son düzenli üç aylık sayım, daha pahalı kalemlerin birçoğunun gereksiz yere 2 yıllık arz miktarında olduğunu ortaya koymuştur. Bu fazla stok sorununu düzeltmeye en iyi yardımcı olacak kontrol hangisidir?", "q_en": "A firm’s inventory consisted of 1,000 different items, 20 of which accounted for 70% of the dollar value. The most recent regular quarterly manual count revealed an unnecessary 2 years’ supply of several of the more expensive items. The control that would best help to correct this oversupply problem is", "options": [{"tr": "Benzersiz stok kalemlerinin sayısı üzerinde kontrol toplamı kullanmak.", "en": "Use of a control total over the number of unique inventory items.", "cmt_tr": ". Kontrol toplamı, hiçbir stok kaydının kaybolmadığını veya yenilerinin eklenmediğini doğrulamalıdır. Stok edinme sorununu çözmeye yardımcı olmaz.", "cmt_en": ". A control total should verify that no inventory records were lost or that no new ones were added. It does not help to solve the inventory acquisition problem."}, {"tr": "Stokun toplam dolar değeri üzerinde limit kontrolü.", "en": "Limit check on the total dollar value of the inventory.", "cmt_tr": ". Toplam stok değeri üzerinde bir limit testi, stok dolar seviyesinin belirli bir noktaya ne zaman ulaştığı hakkında bilgi sağlar, ancak stokun bileşimi hakkında bilgi vermez.", "cmt_en": ". A limit test on the total inventory value provides information as to when the inventory dollar level reached a certain point but not on the composition of the inventory."}, {"tr": "Üretim tarafından talep edilen stok için talep formlarında yetkilendirme imzalarının kullanılması.", "en": "Use of authorizing signatures on requisitions for inventory requested by production.", "cmt_tr": ". Yetkilendirme imzalarının kullanılması talepler üzerinde kontrol sağlar, ancak stok edinme sürecinin geri kalanı üzerinde kontrol sağlamaz.", "cmt_en": ". Use of authorizing signatures provides control over requisitions but not over the rest of the inventory acquisition process."}, {"tr": "Daha yüksek dolar değerli stok kalemlerinin sürekli stok kaydı.", "en": "Perpetual inventory of the larger dollar value items in the inventory.", "cmt_tr": ". Sürekli stok sisteminde satın almalar (veya yarı mamulden transferler) yapıldıklarında doğrudan stok hesabına kaydedilir. Satışlar gerçekleştikçe stok buna göre azaltılır. Böylece dönem boyunca stokun toplam miktarı izlenebilir.", "cmt_en": ". In a perpetual system, purchases (or transfers from work-in-process) are recorded directly in the inventory account when they are made. Inventory is correspondingly reduced as sales occur. Thus, a running total of inventory can be monitored throughout the period."}], "answer": 3}], "SU3 - Control Frameworks": [{"q_tr": "COBIT gibi kontrol çerçevelerinin hedeflenen kullanıcıları aşağıdakilerden hangisidir?", "q_en": "Which of the following are the intended users of control frameworks such as COBIT?", "options": [{"tr": "BT kontrol sorumluluğu olan kişiler.", "en": "Persons with IT control responsibilities.", "cmt_tr": ". Kontrol çerçeveleri, yalnızca denetçiler veya üst yönetim değil, kuruluşta kontrol sorumluluğu olan herkes tarafından kullanılmak üzere tasarlanmıştır. Kontrol çerçeveleri ayrıca üst yönetim ve yönetim kuruluyla iletişim kurmak için de kullanılabilir.", "cmt_en": ". Control frameworks are intended for use by anyone in the organization who has control responsibilities, not just auditors or senior management. Control frameworks also can be used to communicate with senior management and the board."}, {"tr": "Yalnızca üst yönetim.", "en": "Senior management only.", "cmt_tr": ". Hedeflenen kullanıcılar kontrol sorumluluğu olan herkesi kapsar.", "cmt_en": ". Intended users include anyone with control responsibilities."}, {"tr": "Yalnızca iç ve dış denetçiler.", "en": "Internal and external auditors only.", "cmt_tr": ". Denetçiler hedeflenen tek kullanıcılar değildir.", "cmt_en": ". Auditors are not the only persons who are intended users."}, {"tr": "Kuruluştaki herkes.", "en": "Everyone in the organization.", "cmt_tr": ". Kuruluşun bazı üyeleri kontrol sorumluluğuna sahip değildir.", "cmt_en": ". Some members of the organization are not responsible for control."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisinin iç kontrolün kontrol faaliyetleri bileşeninde gerçekleştirilme olasılığı en yüksektir?", "q_en": "Which of the following is most likely to be performed in the control activities component of internal control?", "options": [{"tr": "Sürekli değerlendirmeler.", "en": "Ongoing evaluations.", "cmt_tr": ". Sürekli değerlendirmeler iç kontrolün izleme bileşeninde gerçekleştirilir.", "cmt_en": ". Ongoing evaluations are performed in the monitoring component of internal control."}, {"tr": "Risk tanımlama.", "en": "Risk identification.", "cmt_tr": ". Risk tanımlama iç kontrolün risk değerlendirmesi bileşeninde gerçekleştirilir.", "cmt_en": ". Risk identification is performed in the risk assessment component of internal control."}, {"tr": "Hile risklerinin değerlendirilmesi.", "en": "Assessing fraud risks.", "cmt_tr": ". Hile riski değerlendirmesi iç kontrolün risk değerlendirmesi bileşeninde gerçekleştirilir.", "cmt_en": ". Fraud risk assessment is performed in the risk assessment component of internal control."}, {"tr": "Görevlerin ayrılığı.", "en": "Segregation of duties.", "cmt_tr": ". COSO modelinde kontrol faaliyetleri, hedeflere ulaşılması yolundaki risklerin azaltılmasını destekleyen politika ve prosedürlerdir. Kontrol faaliyetlerinin çeşitli hedefleri vardır ve çeşitli organizasyonel ve fonksiyonel düzeylerde uygulanır. Önleyici veya tespit edici, otomatik veya manuel olabilirler. Görevlerin ayrılığı genellikle mevcut olan bir kontroldür.", "cmt_en": ". In the COSO model, control activities are policies and procedures that support mitigation of risks to achievement of objectives. Control activities have various objectives and are applied at various organizational and functional levels. They may be preventive or detective and automated or manual. Segregation of duties is a control that is usually present."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi yönetim kurulu ve yönetimin kuruluş içinde kontrolün önemini yansıtan tutum ve eylemlerini temsil eden kontrol bileşenidir?", "q_en": "Which of the following is the control component that reflects the attitude and actions of the board and management regarding the significance of control within the organization?", "options": [{"tr": "Risk değerlendirmesi.", "en": "Risk assessment.", "cmt_tr": ". Risk değerlendirmesi, faaliyet düzeyinde ve kuruluş düzeyinde hedeflere ulaşılmasını tehdit eden dış veya iç riskleri tanımlar ve analiz eder.", "cmt_en": ". Risk assessment identifies and analyzes external or internal risks to achievement of the objectives at the activity level as well as the entity level."}, {"tr": "Kontrol faaliyetleri.", "en": "Control activities.", "cmt_tr": ". Kontrol faaliyetleri, hedeflere ulaşılması yolundaki risklerin azaltılmasını destekleyen politika ve prosedürlerdir.", "cmt_en": ". Control activities are the policies and procedures that support mitigation of risks to achievement of objectives."}, {"tr": "Kontrol ortamı.", "en": "Control environment.", "cmt_tr": ". COSO iç kontrol modeline göre, kontrol ortamı iç kontrolün kuruluş genelinde uygulanmasını sağlayan standartları, süreçleri ve yapıları içerir. Yönetim kurulu ve yönetimin kuruluş içinde kontrolün önemine ilişkin tutum ve eylemlerini yansıtır.", "cmt_en": ". According to the COSO model for internal control, the control environment includes the standards, processes, and structures through which internal control is exercised across the organization. It reflects the attitude and actions of the board and management regarding the significance of control within the organization."}, {"tr": "İzleme.", "en": "Monitoring.", "cmt_tr": ". İzleme, sistemin performans kalitesini zaman içinde değerlendiren bir süreçtir.", "cmt_en": ". Monitoring is a process that assesses the quality of the system’s performance over time."}], "answer": 2}, {"q_tr": "COBIT 2019 kontrol çerçevesi hangi yönetişim sistemi ilkesini içerir?", "q_en": "The COBIT 2019 control framework includes which governance system principle?", "options": [{"tr": "Belirli BT süreçleri için kontroller.", "en": "Controls for specific IT processes.", "cmt_tr": ". Orijinal versiyonunda COBIT, belirli BT süreçleri için kontrollere odaklanıyordu.", "cmt_en": ". In its original version, COBIT focused on controls for specific IT processes."}, {"tr": "Tasarım değişikliklerine dinamik yanıt.", "en": "Dynamic response to design changes.", "cmt_tr": ". COBIT 2019, altı yönetişim sistemi ilkesi ve üç yönetişim çerçevesi ilkesi içeren BT yönetişimine uygulanabilir bir yönetişim sistemidir. Bir COBIT 2019 yönetişim sistemi ilkesi, yönetişim sisteminin (1) tasarım faktörlerindeki (örn. personel, altyapı, uygulamalar vb.) değişikliklere yanıt verirken dinamik olması ve (2) sistemik etkilerinin değerlendirilmesiyle birlikte olması gerektiğidir.", "cmt_en": ". COBIT 2019 is a governance system applicable to IT governance, which includes six governance system principles and three governance framework principles. A COBIT 2019 governance system principle is that the governance system must be (1) dynamic when responding to a change in design factors (e.g., personnel, infrastructure, applications, etc.) and (2) accompanied by consideration of its systemic effects."}, {"tr": "Başlıca standartlarla uyum.", "en": "Alignment with major standards.", "cmt_tr": ". COBIT 2019 yönetişim çerçevesi başlıca standartlarla uyumludur. İlgili düzenlemeler, standartlar, çerçeveler ve en iyi uygulamalarla (örn. en son BT standartları ve uyum düzenlemeleri) uyum sağlar.", "cmt_en": ". The COBIT 2019 governance framework is aligned with major standards. It aligns with relevant regulations, standards, frameworks, and best practices (e.g., the latest IT standards and compliance regulations)."}, {"tr": "Kavramsal bir modele dayalıdır.", "en": "Based on a conceptual model.", "cmt_tr": ". COBIT 2019 yönetişim çerçevesi kavramsal bir modele dayalıdır. Bileşenleri ve ilişkilerini tanımlayarak tutarlılık ve otomasyonu sağlar.", "cmt_en": ". The COBIT 2019 governance framework is based on a conceptual model. It achieves consistency and automation by identifying components and their relationships."}], "answer": 1}, {"q_tr": "İç kontrolün hedeflere ulaşılması yolundaki riskleri azaltan bileşeni hangisidir?", "q_en": "The component of internal control that mitigates risks to achievement of objectives is", "options": [{"tr": "Risk değerlendirmesi.", "en": "Risk assessment.", "cmt_tr": ". Risk değerlendirmesi, faaliyet ve kuruluş düzeylerinde hedeflere ulaşılmasını tehdit eden dış veya iç riskleri tanımlar ve analiz eder.", "cmt_en": ". Risk assessment identifies and analyzes external or internal risks to achievement of objectives at the activity and entity levels."}, {"tr": "Kontrol ortamı.", "en": "Control environment.", "cmt_tr": ". Kontrol ortamı, yönetim kurulu ve yönetimin kuruluş içinde kontrolün önemine ilişkin tutum ve eylemlerini yansıtır.", "cmt_en": ". The control environment reflects the attitude and actions of the board and management regarding the significance of control within the organization."}, {"tr": "Kontrol faaliyetleri.", "en": "Control activities.", "cmt_tr": ". Kontrol faaliyetleri, hedeflere ulaşılması yolundaki risklerin azaltılmasını destekleyen politika ve prosedürlerdir. (1) Önleyici veya tespit edici; (2) otomatik veya manuel olabilirler; ve (3) yetkilendirme ve onaylar, doğrulamalar, mutabakatlar ve performans incelemelerine uygulanabilirler.", "cmt_en": ". Control activities are the policies and procedures that support the mitigation of risks to achievement of objectives. They may be (1) preventive or detective; (2) automated or manual; and (3) applied to authorizations and approvals, verifications, reconciliations, and performance reviews."}, {"tr": "İzleme.", "en": "Monitoring.", "cmt_tr": ". İzleme, iç kontrol bileşenlerinin mevcut olup olmadığını ve işleyip işlemediğini değerlendirir.", "cmt_en": ". Monitoring evaluates whether the internal control components are present and functioning."}], "answer": 2}, {"q_tr": "Yönetimin finansal raporlamaya yönelik agresif tutumu ve öngörülen kâr hedeflerine ulaşmaya verdiği önem, kuruluşun kontrol ortamını en büyük olasılıkla ne zaman önemli ölçüde etkiler?", "q_en": "Management’s aggressive attitude toward financial reporting and its emphasis on meeting projected profit goals most likely would significantly influence an entity’s control environment when", "options": [{"tr": "Denetim komitesi kuruluşun finansal raporlama politikalarını aktif olarak denetlediğinde.", "en": "The audit committee is active in overseeing the entity’s financial reporting policies.", "cmt_tr": ". Aktif bir denetim komitesi, belirli yönetim tutumlarıyla ilişkili riskleri azaltmaya hizmet eder.", "cmt_en": ". An active audit committee serves to mitigate the risks associated with certain management attitudes."}, {"tr": "Kuruluş dışındaki taraflarca oluşturulan dış politikalar muhasebe uygulamalarını etkilediğinde.", "en": "External policies established by parties outside the entity affect its accounting practices.", "cmt_tr": ". Dış etkiler, belirli yönetim tutumlarıyla ilişkili riskleri azaltmaya hizmet eder.", "cmt_en": ". External influences serve to mitigate the risks associated with certain management attitudes."}, {"tr": "Yönetim, a
