<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CIA Quiz – Unit 9</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-group {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.3);
  margin-left: 10px;
}
.lang-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .5px; padding: 5px 9px; cursor: pointer; border: none;
  background: rgba(255,255,255,.10); color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
}
.lang-btn + .lang-btn { border-left: 1px solid rgba(255,255,255,.15); }
.lang-btn.active { background: var(--gold) !important; color: var(--navy) !important; }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── HISTORY SECTION ─────────────────────────────────── */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 9</div>
    <div id="score-badge">0 / 0</div>
    <div id="lang-group">
      <button class="lang-btn active" onclick="setLang('tr')" data-lang="tr">TR</button>
      <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
    </div>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">92 sual</span>
    </div>
  </div>
</div>

<div id="main">

// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Accounting Cycles & Controls": [{"q_tr": "Aşağıdakilerden hangisi nakit tahsilat işlemlerinin doğru şekilde ele alınmasını sağlamak için en etkili önleyici kontrolü tanımlar?", "q_en": "Which of the following describes the most effective preventive control to ensure proper handling of cash receipt transactions?", "options": [{"tr": "Banka mutabakatlarının nakit tahsilat işlemiyle ilgilenmeyen bir çalışan tarafından hazırlanması ve ardından bir amir tarafından gözden geçirilmesi.", "en": "Have bank reconciliations prepared by an employee not involved with cash collections and then have them reviewed by a supervisor.", "cmt_tr": ". Banka mutabakatı tespit edici bir kontroldür, önleyici bir kontrol değildir.", "cmt_en": ". The bank reconciliation is a detective, not a preventive, control."}, {"tr": "Bir çalışanın tüm nakit tahsilatlar için ön numaralı makbuz düzenlemesi; başka bir çalışanın ön numaralı makbuzların günlük toplamını banka mevduatlarıyla mutabık kılması.", "en": "One employee issues a prenumbered receipt for all cash collections; another employee reconciles the daily total of prenumbered receipts to the bank deposits.", "cmt_tr": ". Nakit üzerinde hesap verebilirlik sağlamak için sıralı numaralı makbuzlar düzenlenmelidir. Nakit yüksek doğal riske sahip olduğundan, bu hesap verebilirlik mümkün olan en kısa sürede oluşturulmalıdır. Günlük nakit tahsilatlar bütün olarak yatırılmalı, böylece makbuzlar ve banka mevduatları mutabık kılınabilmelidir. Mutabakat, nakit saklama fonksiyonundan bağımsız biri tarafından yapılmalıdır.", "cmt_en": ". Sequentially numbered receipts should be issued to maintain accountability for cash collected. Such accountability should be established as soon as possible because cash has a high inherent risk. Daily cash receipts should be deposited intact so that receipts and bank deposits can be reconciled. The reconciliation should be performed by someone independent of the cash custody function."}, {"tr": "Nakit tahsilatların kayıt süreçlerini kontrol etmek için önceden belirlenmiş toplamlar (karma toplamlar) kullanılması.", "en": "Use predetermined totals (hash totals) of cash receipts to control posting routines.", "cmt_tr": ". Karma toplamların kullanımı, nakit tahsilatlar üzerinde değil, kayıt süreçlerinin eksiksizliği üzerinde bir kontroldür.", "cmt_en": ". Use of hash totals is a control over the completeness of posting routines, not cash receipts."}, {"tr": "Müşteri posta tahsilatlarını alan çalışanın günlük banka mevduatını hazırlaması ve ardından başka bir çalışanın bunu yatırması.", "en": "The employee who receives customer mail receipts prepares the daily bank deposit, which is then deposited by another employee.", "cmt_tr": ". Ayrı bir çalışan banka mevduatını hazırlamadan önce bir nakit havale listesi hazırlanmalıdır. Liste ve mevduat, farklı çalışanlar tarafından yapılan bağımsız sayımlara dayanan ayrı kayıtları temsil eder.", "cmt_en": ". A cash remittance list should be prepared before a separate employee prepares the bank deposit. The list and deposit represent separate records based on independent counts made by different employees."}], "answer": 1}, {"q_tr": "Satın alınan malların teslim alınması üzerine, teslim alma departmanı personeli teslim alınan miktarı irsaliyedeki miktarla eşleştirir ve ana fiyat listesine göre malların üzerine perakende fiyatını yazar. Açıklamalı irsaliye daha sonra stok kontrolüne iletilir ve mallar otomatik olarak perakende satış alanına taşınır. Bu faaliyetin en önemli kontrol güçlü yönü nedir?", "q_en": "Upon receipt of purchased goods, receiving department personnel match the quantity received with the packing slip quantity and mark the retail price on the goods based on a master price list. The annotated packing slip is then forwarded to inventory control and goods are automatically moved to the retail sales area. The most significant control strength of this activity is", "options": [{"tr": "Malların perakende satış için hemen fiyatlandırılması.", "en": "Immediately pricing goods for retail sale.", "cmt_tr": ". Zamanlama, fiyatların doğruluğu kadar önemli değildir.", "cmt_en": ". Timing is not as important as the accuracy of prices."}, {"tr": "Teslim alınan miktarın irsaliye ile eşleştirilmesi.", "en": "Matching quantity received with the packing slip.", "cmt_tr": ". Teslim alınan miktarın irsaliye ile eşleştirilmesi, sipariş edilen miktarın teslim alınmasını garanti etmez.", "cmt_en": ". Matching quantity received with the packing slip does not ensure receipt of the quantity ordered."}, {"tr": "Satış fiyatının işaretlenmesinde ana fiyat listesinin kullanılması.", "en": "Using a master price list for marking the sale price.", "cmt_tr": ". Ana fiyat listesinin kullanılması, doğru perakende fiyatının işaretlenmesini sağlar.", "cmt_en": ". Use of the master price list ensures that the correct retail price is marked."}, {"tr": "Malların otomatik olarak perakende satış alanına taşınması.", "en": "Automatically moving goods to the retail sales area.", "cmt_tr": ". Malların perakende satışta ihtiyaç duyulup duyulmayacağı belirsizdir.", "cmt_en": ". Goods may or may not be needed in retail sales."}], "answer": 2}, {"q_tr": "Yerel bir mağazanın ödeme döngüsünün ön incelemesi sırasında yapılan aşağıdaki gözlemlerden hangisi bir kontrol güçlü yönünü yansıtır?", "q_en": "Which of the following observations made during the preliminary survey of a local department store’s disbursement cycle reflects a control strength?", "options": [{"tr": "Bireysel departman müdürleri, satıcılardan mal sipariş etmek için ön numaralı formlar kullanır.", "en": "Individual department managers use prenumbered forms to order merchandise from vendors.", "cmt_tr": ". Müdürler satın alma departmanına satın alma talepleri sunmalıdır. Satın alma fonksiyonu operasyonlardan ayrı olmalıdır.", "cmt_en": ". The managers should submit purchase requisitions to the purchasing department. The purchasing function should be separate from operations."}, {"tr": "Teslim alma departmanına, sipariş edilen tüm mallar için mal açıklaması, sipariş miktarı ve hesaplanmış fiyatı içeren satın alma siparişinin bir kopyası verilir.", "en": "The receiving department is given a copy of the purchase order complete with a description of goods, quantity ordered, and extended price for all merchandise ordered.", "cmt_tr": ". Adil bir sayımı teşvik etmek için, teslim alma departmanına miktarın çıkarıldığı bir satın alma siparişi kopyası gönderilmelidir.", "cmt_en": ". To encourage a fair count, the receiving department should receive a copy of the purchase order from which the quantity has been omitted."}, {"tr": "Mali işler müdürünün ofisi, borçlar hesabı departmanı tarafından hazırlanan ödeme fişlerine dayanarak tedarikçilere çek hazırlar.", "en": "The chief financial officer’s office prepares checks for suppliers based on vouchers prepared by the accounts payable department.", "cmt_tr": ". Borçların muhasebeleştirilmesi bir kayıt fonksiyonudur. Tedarikçi faturasının, satın alma siparişinin ve teslim alma raporunun (ve genellikle satın alma talebinin) eşleştirilmesi muhasebe departmanının sorumluluğunda olmalıdır. Bunlar, mali işler müdürünün ödeme yaparken güveneceği borçlar hesabı bölümü tarafından hazırlanan ödeme fişinin başlıca destekleyici belgeleridir.", "cmt_en": ". Accounting for payables is a recording function. The matching of the supplier’s invoice, the purchase order, and the receiving report (and usually the purchase requisition) should be the responsibility of the accounting department. These are the primary supporting documents for the payment voucher prepared by the accounts payable section that will be relied upon by the chief financial officer in making payment."}, {"tr": "Bireysel departman müdürleri, malların teslim alma rampasından depolama veya satış alanlarına uygun şekilde taşınmasından sorumludur.", "en": "Individual department managers are responsible for the movement of merchandise from the receiving dock to storage or sales areas as appropriate.", "cmt_tr": ". Teslim alma departmanı, güvenliği sağlamak için malları doğrudan depoya transfer etmelidir. Depolanan miktarın doğrulanabilmesi için teslim alma raporunun bir kopyası depoya gönderilmelidir.", "cmt_en": ". The receiving department should transfer goods directly to the storeroom to maintain security. A copy of the receiving report should be sent to the storeroom so that the amount stored can be co4)"}], "answer": 2}, {"q_tr": "Aşağıdaki durumlardan hangisi bordro departmanındaki bir iç kontrol zayıflığını temsil eder?", "q_en": "Which one of the following situations represents an internal control weakness in the payroll department?", "options": [{"tr": "Bordro departmanı personeli görevlerinde rotasyona tabi tutulur.", "en": "Payroll department personnel are rotated in their duties.", "cmt_tr": ". Bordro personelinin periyodik rotasyonu, hilenin işlenmesini ve gizlenmesini engeller.", "cmt_en": ". Periodic rotation of payroll personnel inhibits the perpetration and concealment of fraud."}, {"tr": "Maaş çekleri çalışanların doğrudan amirleri tarafından dağıtılır.", "en": "Paychecks are distributed by the employees’ immediate supervisor.", "cmt_tr": ". Maaş çekleri amirler tarafından dağıtılmamalıdır çünkü dürüst olmayan bir kişi bir çalışanı işten çıkarabilir ve işten çıkarmayı bildirmeyebilir. Amir daha sonra çalışan adına giriş-çıkış yapabilir ve maaş çekini alabilir. Çekleri dağıtan kişi, hem bordro kayıt tutma hem de faaliyet departmanıyla ilişkisiz olmalıdır.", "cmt_en": ". Paychecks should not be distributed by supervisors because an unscrupulous person could terminate an employee and fail to report the termination. The supervisor could then clock in and out for the employee and keep the paycheck. A person unrelated to either payroll recordkeeping or the operating department should distribute checks."}, {"tr": "Bordro kayıtları üç aylık vergi raporlarıyla mutabık kılınır.", "en": "Payroll records are reconciled with quarterly tax reports.", "cmt_tr": ". Bu analitik prosedür bir tutarsızlığı tespit edebilir.", "cmt_en": ". This analytical procedure may detect a discrepancy."}, {"tr": "Zaman takibi fonksiyonu bordro departmanından bağımsızdır.", "en": "The timekeeping function is independent of the payroll department.", "cmt_tr": ". Zaman takibi, varlık saklama ve çalışan kayıtlarından bağımsız olmalıdır.", "cmt_en": ". Timekeeping should be independent of asset custody and employee records."}], "answer": 1}, {"q_tr": "Bordro departmanındaki bir çalışan, hayali bir çalışan ekleyerek ve hayali çalışma saatleri girerek bir hile yapmayı düşünmektedir. Maaş çeki daha sonra bordro çalışanının ev adresine gönderilecektir. Bu tür hileyi önlemek için en etkili kontrol prosedürü neyi gerektirmelidir?", "q_en": "An employee in the payroll department is contemplating a fraud involving the addition of a fictitious employee and the entry of fictitious hours worked. The paycheck would then be sent to the payroll employee’s home address. The most effective control procedure to prevent this type of fraud is to require that", "options": [{"tr": "Eklenen tüm yeni çalışanlara ilişkin bir raporun bordro departmanı dışından biri tarafından onaylanması. Ayrıca, tüm çalışanları ve çalışma saatlerini gösteren bir raporun gözden geçirilmek üzere amir departmanına gönderilmesi.", "en": "A report of all new employees added be approved by someone outside of the payroll department. Also, a report showing all employees and hours worked should be sent to the supervisor’s department for review.", "cmt_tr": ". Bordro departmanı bir kayıt fonksiyonuna sahiptir. Ücret oranı değişikliklerini veya bordroya çalışan ekleme ya da çıkarmayı yetkilendirmemelidir. Bu nedenle, bu tür değişikliklerin yetkilendirilmesi departman dışından bir kişi tarafından yapılmalıdır. Bordro verilerinin doğrulanması da departman dışında yapılmalıdır. Görevlerin uygun şekilde ayrılması, bordro hilesinin önlenmesinde kritik öneme sahiptir.", "cmt_en": ". The payroll department has a recording function. It should not authorize pay rate changes or the addition or deletion of employees from the payroll. Accordingly, authorization of such changes should be made by an individual outside the department. Verification of payroll data should also be made outside the department. Proper segregation of duties is critical in the prevention of payroll fraud."}, {"tr": "Tüm yeni çalışanların ve çalışma saatlerinin insan kaynakları departmanı tarafından girilmesi.", "en": "All new employees and their hours worked be entered by the human resources department.", "cmt_tr": ". Yeni çalışanların girişi ile çalışma saatlerinin girişi ayrılmalıdır. İnsan kaynakları departmanı her iki faaliyetten de sorumlu olmamalıdır.", "cmt_en": ". The entry of new employees and their hours should be segregated. The human resources department should not be responsible for both activities."}, {"tr": "Çalışan kayıtlarındaki tüm değişikliklerin hem insan kaynakları hem de bordro dışındaki amirler tarafından onaylanması.", "en": "All changes to employee records be approved by supervisors outside of both human resources and payroll.", "cmt_tr": ". Mevcut çalışan kayıtlarındaki değişikliklerin onaylanması, hayali bir çalışan girme hilesini önlemez.", "cmt_en": ". Approving changes in existing employee records does not prevent the fraud of entering a fictitious employee."}, {"tr": "Bordro departmanının maaş çeklerini postalamak yerine çalışanlara fiziksel olarak teslim etmesi.", "en": "The payroll department physically delivers paychecks to employees rather than mailing them.", "cmt_tr": ". Maaş çeklerinin fiziksel teslimi, bordro çalışanının hayali çalışanın çekini alıkoymasını engellemez. Ayrıca, kayıt fonksiyonuna sahip bir departmanın varlık saklama fonksiyonu olmamalıdır.", "cmt_en": ". Physical delivery of paychecks does not prevent the payroll employee from withholding the fictitious employee’s check. Moreover, a department with a recording function should not have an asset custody function."}], "answer": 0}, {"q_tr": "İnsan kaynakları ve bordro ayrı departmanlardır. Aşağıdaki kombinasyonlardan hangisi en iyi görev ayrılığını sağlar?", "q_en": "Human resources and payroll are separate departments. Which of the following combinations provides the best segregation of duties?", "options": [{"tr": "İnsan kaynakları çalışanları ekler, bordro saatleri işler ve insan kaynakları maaş çeklerini çalışanlara teslim eder.", "en": "Human resources adds employees, payroll processes hours, and human resources delivers the paychecks to employees.", "cmt_tr": ". İnsan kaynakları departmanı hem çalışan eklemeli hem de maaş çekleri teslim etmemelidir. Bu iki görev ayrılmalıdır.", "cmt_en": ". The human resources department should not add employees and deliver paychecks. These two duties should be segregated."}, {"tr": "İnsan kaynakları çalışanları ekler, bordro saatlerini gözden geçirip işlenmek üzere bordroya sunar ve maaş çeklerini çalışanlara teslim eder.", "en": "Human resources adds employees, reviews and submits payroll hours to payroll for processing, and delivers paychecks to employees.", "cmt_tr": ". Tüm fonksiyonlar insan kaynakları tarafından gerçekleştirilmektedir. Görev ayrılığı yoktur.", "cmt_en": ". The functions are all performed by human resources. There is no segregation of duties."}, {"tr": "İnsan kaynakları çalışanları ekler, bordro saatleri işler ve çalışanların banka hesap numaralarını girer. Maaş çekleri otomatik olarak çalışanın banka hesabına yatırılır.", "en": "Human resources adds employees, and payroll processes hours and enters employee bank account numbers. Paychecks are automatically deposited in the employee’s bank account.", "cmt_tr": ". Bu görev ayrılığı işe yarar çünkü insan kaynakları banka hesap numaraları ekleme yeteneğine sahip değildir ve bordro bordroya çalışan ekleyemez. Bu nedenle, hayali çalışanlar oluşturup onlara ödeme yapmak için iki departman arasında gizli anlaşma olması gerekir.", "cmt_en": ". This segregation of duties works because human resources does not have the ability to add bank account numbers, and payroll cannot add employees to payroll. Thus, to create fictitious employees and pay them, collusions would have to exist between the two departments."}, {"tr": "Bordro çalışanları ekler ve çalışanların banka hesap numaralarını girer ancak saatleri yalnızca insan kaynakları tarafından onaylandıktan sonra işler. Maaş çekleri otomatik olarak çalışanın banka hesabına yatırılır.", "en": "Payroll adds employees and enters employees’ bank account numbers but processes hours only as approved by human resources. Paychecks are automatically deposited in the employee’s bank account.", "cmt_tr": ". Bordro hem çalışan ekliyor hem de saatleri işliyor. Bu iki görev farklı departmanlar tarafından yapılmalıdır.", "cmt_en": ". Payroll is adding employees and processing hours. These two duties should be performed by different departments."}], "answer": 2}, {"q_tr": "Bir bordro denetim hedefi, görevlerin uygun şekilde ayrılıp ayrılmadığını belirlemektir. Aşağıdaki faaliyetlerden hangisi birbiriyle bağdaşmaz?", "q_en": "One payroll engagement objective is to determine whether segregation of duties is proper. Which of the following activities is incompatible?", "options": [{"tr": "Çalışanların işe alınması ve ücret oranı değişikliklerinin yetkilendirilmesi.", "en": "Hiring employees and authorizing changes in pay rates.", "cmt_tr": ". Çalışanların işe alınması ve ücret oranı değişikliklerinin yetkilendirilmesi her ikisi de personel fonksiyonlarıdır.", "cmt_en": ". Hiring employees and authorizing changes in pay rates are both personnel functions."}, {"tr": "Bordronun hazırlanması ve bordro vergi formlarının doldurulması.", "en": "Preparing the payroll and filing payroll tax forms.", "cmt_tr": ". Bordronun hazırlanması ve bordro vergi formlarının doldurulması her ikisi de bordro departmanının fonksiyonlarıdır.", "cmt_en": ". Preparing the payroll and filing payroll tax forms are both functions of the payroll department."}, {"tr": "Maaş çeklerinin imzalanması ve dağıtılması.", "en": "Signing and distributing payroll checks.", "cmt_tr": ". Uygun hazine fonksiyonları arasında maaş çeklerinin imzalanması ve dağıtılması yer alır.", "cmt_en": ". Proper treasury functions include signing and distributing payroll checks."}, {"tr": "Devam verilerinin hazırlanması ve bordronun hazırlanması.", "en": "Preparing attendance data and preparing the payroll.", "cmt_tr": ". Devam verileri zaman takibi fonksiyonu tarafından toplanır. Bordronun hazırlanması bordro departmanının fonksiyonudur. Kontrol amaçlarıyla, usulsüzlüklerin işlenmesini ve gizlenmesini önlemek için bu iki fonksiyon ayrılmalıdır.", "cmt_en": ". Attendance data are accumulated by the timekeeping function. Preparing the payroll is a payroll department function. For control purposes, these two functions should be separated to avoid the perpetration and concealment of irregularities."}], "answer": 3}, {"q_tr": "Yeterli bir iç kontrol sisteminin, aşağıdakilerden hangisi tarafından işlenen bir hileyi tespit etme olasılığı en yüksektir?", "q_en": "An adequate system of internal controls is most likely to detect a fraud perpetrated by a", "options": [{"tr": "Gizli anlaşma yapan bir grup çalışan.", "en": "Group of employees in collusion.", "cmt_tr": ". Bir grup, tek bir çalışana göre hileyi başarıyla gerçekleştirme şansına daha fazla sahiptir.", "cmt_en": ". A group has a better chance of successfully perpetrating a fraud than does an individual employee."}, {"tr": "Tek bir çalışan.", "en": "Single employee.", "cmt_tr": ". Görevlerin ayrılığı ve diğer kontrol süreçleri, tek başına hareket eden bir çalışan tarafından işlenen hileyi önlemeye veya tespit etmeye yarar. Bir çalışan usulsüzlük yapma imkânına sahip olmayabilir veya diğer çalışanlar tarafından görevlerini yerine getirirken tespit edilebilir. Ancak gizli anlaşma kontrolleri devre dışı bırakabilir. Örneğin, varlıkların kayıtlı sorumluluğunun elde tutulan varlıklarla karşılaştırılması, varlıkları saklayan kişiler kayıt tutanlarla gizli anlaşma yaparsa hileyi tespit edemeyebilir.", "cmt_en": ". Segregation of duties and other control processes serve to prevent or detect a fraud committed by an employee acting alone. One employee may not have the ability to engage in wrongdoing or may be subject to detection by other employees in the course of performing their assigned duties. However, collusion may circumvent controls. For example, comparison of recorded accountability for assets with the assets known to be held may fail to detect fraud if persons having custody of assets collude with recordkeepers."}, {"tr": "Gizli anlaşma yapan bir grup yönetici.", "en": "Group of managers in collusion.", "cmt_tr": ". Yönetim kontrolleri geçersiz kılabilir.", "cmt_en": ". Management can override controls."}, {"tr": "Tek bir yönetici.", "en": "Single manager.", "cmt_tr": ". Tek bir yönetici bile kontrolleri geçersiz kılabilir.", "cmt_en": ". Even a single manager may be able to override controls."}], "answer": 1}, {"q_tr": "İç kontrol, hedeflerine ulaşmak için belirli temel ilkelere uymalıdır. Bu ilkelerden biri fonksiyonların ayrılığıdır. Aşağıdaki örneklerden hangisi fonksiyonların ayrılığı ilkesiyle tutarlıdır?", "q_en": "Internal control should follow certain basic principles to achieve its objectives. One of these principles is the segregation of functions. Which one of the following examples is consistent with the principle of segregation of functions?", "options": [{"tr": "Mali işler müdürü çek imzalama yetkisine sahiptir ancak imza bloğunu çek imzalama makinesini çalıştırması için mali işler müdür yardımcısına verir.", "en": "The chief financial officer has the authority to sign checks but gives the signature block to the assistant chief financial officer to run the check-signing machine.", "cmt_tr": ". Mali işler müdürünün departmanı varlıkların saklanmasından sorumlu olmalı, ancak işlemleri yetkilendirmemeli veya kaydetmemelidir. Mali işler müdür yardımcısı mali işler müdürüne bağlı olduğundan, mali işler müdürü yalnızca varlık saklama ile ilgili atanmış bir görevi devretmektedir.", "cmt_en": ". The chief financial officer’s department should have custody of assets but should not authorize or record transactions. Because the assistant chief financial officer reports to the chief financial officer, the chief financial officer is merely delegating an assigned duty related to asset custody."}, {"tr": "Depodaki stok üzerinde saklama sorumluluğu bulunan depo görevlisi, hasarlı malların elden çıkarılmasını yetkilendirebilir.", "en": "The warehouse clerk, who has the custodial responsibility over inventory in the warehouse, may authorize disposal of damaged goods.", "cmt_tr": ". Hasarlı malların elden çıkarılması yetkisi, depo görevlisinin saklama sorumluluğundaki stok hırsızlıklarını örtmek için kullanılabilir. İşlem yetkilendirmesi varlık saklama ile bağdaşmaz.", "cmt_en": ". Authorization to dispose of damaged goods could be used to cover thefts of inventory for which the warehouse clerk has custodial responsibility. Transaction authorization is inconsistent with asset custody."}, {"tr": "Satış müdürü kredi onaylama sorumluluğuna ve hesapları silme yetkisine sahiptir.", "en": "The sales manager has the responsibility to approve credit and the authority to write off accounts.", "cmt_tr": ". Satış müdürü kontrol ettiği bir kuruluşa kredi onaylayabilir ve ardından hesabı şüpheli alacak olarak silebilir. Satış müdürünün kredi yetkilendirmesi, varlıklara dolaylı erişimiyle bağdaşmaz.", "cmt_en": ". The sales manager could approve credit to a controlled organization and then write off the account as a bad debt. The sales manager’s authorization of credit is inconsistent with his or her indirect access to assets."}, {"tr": "Departman zaman takip görevlisine, devamsız çalışanlara postalamak üzere dağıtılmamış maaş çekleri verilir.", "en": "The department time clerk is given the undistributed payroll checks to mail to absent employees.", "cmt_tr": ". Zaman takip görevlisi bir çalışanın işten ayrılmasını gizleyebilir ve o çalışanın maaş çekini alıkoyabilir. Kayıt tutma varlık saklama ile bağdaşmaz.", "cmt_en": ". The time clerk could conceal the termination of an employee and retain that employee’s paycheck. Recordkeeping is inconsistent with asset custody."}], "answer": 0}, {"q_tr": "Bir bordro memuru tarafından gerçekleştirilen aşağıdaki faaliyetlerden hangisi bir kontrol güçlü yönü değil, kontrol zayıflığıdır?", "q_en": "Which of the following activities performed by a payroll clerk is a control weakness rather than a control strength?", "options": [{"tr": "Çek imza damgası makinesinin sorumluluğunu üstlenir.", "en": "Has custody of the check signature stamp machine.", "cmt_tr": ". Maaş çekleri, zaman takibi, kayıt tutma veya bordro hazırlama ile ilgilenmeyen biri tarafından imzalanmalıdır. Bordro memuru kayıt tutma fonksiyonunu yerine getirir.", "cmt_en": ". Payroll checks should be signed by someone who is not involved in timekeeping, recordkeeping, or payroll preparation. The payroll clerk performs a recordkeeping function."}, {"tr": "Bordro defterini hazırlar.", "en": "Prepares the payroll register.", "cmt_tr": ". Bordro defterinin hazırlanması, bordro memurunun kayıt tutma görevlerinden biridir.", "cmt_en": ". Preparing the payroll register is one of the recordkeeping tasks of the payroll clerk."}, {"tr": "Bordro defterini onay için baş muhasebeciye iletir.", "en": "Forwards the payroll register to the chief accountant for approval.", "cmt_tr": ". Bordro defteri kuruluşun bir yetkilisi tarafından onaylanmalıdır. Bu kontrol bir güçlü yöndür.", "cmt_en": ". The payroll register should be approved by an officer of the organization. This control is a strength."}, {"tr": "Maaş çeklerini ayrı bir bordro çek hesabından düzenler.", "en": "Draws the paychecks on a separate payroll checking account.", "cmt_tr": ". Maaş çekleri ayrı bir bordro çek hesabından düzenlenmelidir. Bu kontrol bir güçlü yöndür.", "cmt_en": ". Paychecks should be drawn on a separate payroll checking account. This control is a strength."}], "answer": 0}, {"q_tr": "Otomatik sistem, çalışan iş sınıflandırmalarıyla eşleştirilmiş bir ücret oranları tablosu içerir. Tablonun yalnızca geçerli ücret değişiklikleri için doğru şekilde güncellenmesini sağlamak adına en iyi kontrol nedir?", "q_en": "The automated system contains a table of pay rates matched with the employee job classifications. The best control to ensure that the table is updated correctly for only valid pay changes is to", "options": [{"tr": "Veri tablosuna erişimi, ücret oranlarını belirleme yetkisine sahip yönetim ve hat amirleriyle sınırlandırmak.", "en": "Limit access to the data table to management and line supervisors who have the authority to determine pay rates.", "cmt_tr": ". Veri tabanına erişim, insan kaynakları veya bordro departmanlarındaki personelle kesinlikle sınırlandırılmalıdır.", "cmt_en": ". Access to the database should be severely restricted to personnel within the human resources or payroll departments."}, {"tr": "Departmandaki ücret oranları tablosunu değiştirme yetkisi olmayan bir amirin, değişiklikleri imzalı bir yönetim onayıyla karşılaştırmasını istemek.", "en": "Require a supervisor in the department, who does not have the ability to change the table of pay rates, to compare the changes with a signed management authorization.", "cmt_tr": ". Uygun görev ayrılığını korumak için, ücret oranı değişiklikleri insan kaynakları departmanı dışından biri tarafından yetkilendirilmelidir. Ayrıca, yetkilendirme kayıt fonksiyonuna sahip olmayan bir kişi tarafından bağımsız olarak doğrulanmalıdır.", "cmt_en": ". To maintain a proper segregation of duties, changes in pay rates should be authorized by someone outside the human resources department. Furthermore, authorization should be independently verified by an individual who does not have a recording function."}, {"tr": "Otomatik sisteme yeterli düzenleme ve makullük kontrollerinin yerleştirilmesini sağlamak.", "en": "Ensure that adequate edit and reasonableness checks are built into the automated system.", "cmt_tr": ". Düzenleme kontrolleri yetkisiz değişiklikleri tespit etmez.", "cmt_en": ". Edit checks will not detect unauthorized changes."}, {"tr": "Tüm ücret değişikliklerinin, değişikliğin gerçek bir çalışana gittiğini doğrulamak üzere çalışan tarafından imzalanmasını istemek.", "en": "Require that all pay changes be signed by the employee to verify that the change goes to a bona fide employee.", "cmt_tr": ". Kontrol, ücret oranları tablosundaki değişikliklerin uygun şekilde yetkilendirilmesini ve sisteme girilmesini sağlamalıdır.", "cmt_en": ". The control must ensure that changes in the table of pay rates are properly authorized and entered into the system."}], "answer": 1}, {"q_tr": "Bir üretim hattı müdürü, periyodik bakım gerektiren tüm makineler için yedek parça sipariş etme ve teslim alma yetkisine sahiptir. İç denetçi, müdürün yedek parça tedarik işindeki bir aile üyesinden gerekenden önemli ölçüde fazla parça sipariş ettiğine dair isimsiz bir ihbar almıştır. Gereksiz parçalar hiç teslim edilmemiştir. Bunun yerine müdür teslim alma belgelerini işlemiş ve parçaları makine bakım hesaplarına yüklemiştir. Teslim edilmeyen parçalar için ödemeler tedarikçiye gönderilmiş ve para müdür ile aile üyesi arasında bölüşülmüştür. Aşağıdaki iç kontrollerden hangisi bu hilenin gerçekleşmesini en büyük olasılıkla önlerdi?", "q_en": "The manager of a production line has the authority to order and receive replacement parts for all machinery that requires periodic maintenance. The internal auditor received an anonymous tip that the manager ordered substantially more parts than were necessary from a family member in the parts supply business. The unneeded parts were never delivered. Instead, the manager processed receiving documents and charged the parts to machinery maintenance accounts. The payments for the undelivered parts were sent to the supplier, and the money was divided between the manager and the family member. Which of the following internal controls would have most likely prevented this fraud from occurring?", "options": [{"tr": "İhale sürecinde tüm satıcılar için önceden belirlenmiş harcama limitleri oluşturmak.", "en": "Establishing predefined spending levels for all vendors during the bidding process.", "cmt_tr": ". Önceden belirlenmiş harcama limitleri muhtemelen zaten hileli tutarları içerecektir ve yalnızca hilenin boyutunu sınırlar.", "cmt_en": ". Predefined spending levels would probably already include the fraudulent amounts and would only limit the size of the fraud."}, {"tr": "Teslim alma fonksiyonunu parça satın alma yetkilendirmesinden ayırmak.", "en": "Segregating the receiving function from the authorization of parts purchases.", "cmt_tr": ". Parça yetkilendirme ve teslim alma fonksiyonlarının ayrılması iç kontrolü iyileştirirdi. Söz konusu parçalar şirkete gönderilseydi ve teslim alma raporu malları sipariş eden kişiden farklı bir çalışan tarafından hazırlansaydı, hile gerçekleşemezdi. Ayrıca, teslim alma departmanı uygun şekilde onaylanmış bir satın alma siparişinin kör kopyası olmadan malları kabul etmemelidir.", "cmt_en": ". Segregating the parts authorization and receiving functions would have improved internal control. If the parts in question had been sent to the company and a receiving report had been prepared by an employee other than the one ordering the goods, the fraud could not have occurred. Moreover, the receiving department should not accept goods unless it has a blind copy of a properly approved purchase order for the items."}, {"tr": "Yedek parçalar için konşimentoyu onaylanmış satın alma siparişiyle karşılaştırmak.", "en": "Comparing the bill of lading for replacement parts to the approved purchase order.", "cmt_tr": ". Konşimento satın alma siparişiyle uyumlu olacaktır. Teslim alınan miktar (üçüncü bir tarafça doğrulanmış) hem konşimento hem de satın alma siparişiyle karşılaştırılmalıdır.", "cmt_en": ". The bill of lading would agree with the purchase order. The quantity received (verified by a third party) should be compared to both the bill of lading and the purchase order."}, {"tr": "Talep edilen miktarları teslim alınan miktarlarla eşleştirmek için şirketin stok sistemini kullanmak.", "en": "Using the company’s inventory system to match quantities requested with quantities received.", "cmt_tr": ". Bilgisayar eşleştirmesi yalnızca hileli evrakları doğrulayacaktır.", "cmt_en": ". The computer matching would only verify the fraudulent paperwork."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisinin iç kontrol zayıflığı olarak değerlendirilme olasılığı en yüksektir?", "q_en": "Which one of the following is most likely to be considered an internal control weakness?", "options": [{"tr": "Küçük kasa sorumlusunun küçük kasayı çalma imkânı vardır. Fondan yapılan tüm ödemelerin belgeleri, fonun yenilenmesi talebiyle birlikte sunulmalıdır.", "en": "The petty cash custodian has the ability to steal petty cash. Documentation for all disbursements from the fund must be submitted with the request for replenishment of the fund.", "cmt_tr": ". Belge gerekliliği, belgeler sahte olmadıkça fon yenilendiğinde hırsızlığı ortaya çıkaracaktır.", "cmt_en": ". The requirement for documentation will reveal a theft when the fund is reimbursed unless the documents can be falsified."}, {"tr": "Bir üretim tesisindeki stok kontrol memuru, yılda stoklardan bir adet tamamlanmış televizyon seti çalma imkânına sahiptir. Hırsızlık muhtemelen hiçbir zaman tespit edilmeyecektir.", "en": "An inventory control clerk at a manufacturing plant has the ability to steal one completed television set from inventory a year. The theft probably will never be detected.", "cmt_tr": ". Söz konusu tutar muhtemelen önemli değildir.", "cmt_en": ". The amount involved is probably not material."}, {"tr": "Satış iade ve indirimlerini onaylayan bir alacak hesapları memuru, müşteri havalelerini alır ve bunları bankaya yatırır. Çalışan üzerinde sınırlı denetim uygulanır.", "en": "An accounts receivable clerk, who approves sales returns and allowances, receives customer remittances and deposits them in the bank. Limited supervision is maintained over the employee.", "cmt_tr": ". Kilit fonksiyonlar arasında görev ayrılığı önemli bir kontrol prosedürüdür. Satış iade ve indirimlerini onaylamasına ve aynı zamanda müşteri havalelerini almasına izin verilen bir alacak hesapları memuru, alınan fonları zimmete geçirebilir ve açığı satış iade ve indirimleri hesabını borçlandırarak örtebilir. Sınırlı denetim, görev ayrılığı eksikliğini telafi etmek için yetersizdir.", "cmt_en": ". Segregation of duties among key functions is an important control procedure. An accounts receivable clerk who is permitted to approve sales returns and allowances and also receive customer remittances could misappropriate funds received and cover the shortage by debiting sales returns and allowances. Limited supervision is insufficient to compensate for lack of segregation of duties."}, {"tr": "Fatura işleme departmanındaki bir memur, satıcının faturasını ilgili teslim alma raporuyla eşleştirmeyi başaramaz. Tüm uygun belgeler bir ödeme fişine eklenmediği sürece çekler imzalanmaz.", "en": "A clerk in the invoice processing department fails to match a vendor’s invoice with its related receiving report. Checks are not signed unless all appropriate documents are attached to a voucher.", "cmt_tr": ". Belge gerekliliği bu gözden kaçmayı ortaya çıkaracaktır.", "cmt_en": ". The requirement for documentation will uncover the oversight."}], "answer": 2}, {"q_tr": "Etkili bir iç kontrol yapısının özelliklerinden biri, görevlerin uygun şekilde ayrılmasıdır. Fonksiyonel sorumlulukların ayrılmasıyla tutarlı olan sorumluluk kombinasyonu hangisidir?", "q_en": "One characteristic of an effective internal control structure is the proper segregation of duties. The combination of responsibilities that would be consistent with the segregation of functional responsibilities is", "options": [{"tr": "Maaş çeklerinin imzalanması ve boş bordro çeklerinin saklanması.", "en": "Signing of paychecks and custody of blank payroll checks.", "cmt_tr": ". Varlık saklama sorumluluğu olmayan ancak kayıt tutma sorumluluğu olan kişiler boş çeklere erişime sahip olmalıdır; çek imzalama görevi ise kayıt tutma fonksiyonu olmayan kişilere (örn. mali işler müdürü) atanmalıdır.", "cmt_en": ". Persons with recordkeeping but not custody of assets responsibilities should have access to blank checks, while the duty of signing checks should be assigned to persons (e.g., the chief financial officer) with no recordkeeping function."}, {"tr": "Maaş çeklerinin hazırlanması ve çek dağıtımı.", "en": "Preparation of paychecks and check distribution.", "cmt_tr": ". Bordro hazırlama ve çalışanlara ödeme, bağdaşmayan kayıt tutma ve varlık saklama fonksiyonları olduğundan ayrılmalıdır.", "cmt_en": ". Payroll preparation and payment to employees should be segregated since they are incompatible recordkeeping and custodianship functions."}, {"tr": "Puantaj kartlarının onaylanması ve maaş çeklerinin hazırlanması.", "en": "Approval of time cards and preparation of paychecks.", "cmt_tr": ". Puantaj kartlarının onaylanması, maaş çeklerinin hazırlanması kayıt tutma fonksiyonuyla bağdaşmayan bir yetkilendirme fonksiyonudur.", "cmt_en": ". Approval of time cards is an authorization function that is incompatible with the recordkeeping function of preparation of paychecks."}, {"tr": "Zaman takibi ve bordro yevmiye kayıtlarının hazırlanması.", "en": "Timekeeping and preparation of payroll journal entries.", "cmt_tr": ". Zaman takibi fonksiyonu ile bordro yevmiye kayıtlarının hazırlanmasının birleştirilmesi uygunsuz değildir çünkü çalışanın varlıklara veya insan kaynakları departmanındaki çalışan kayıtlarına erişimi yoktur. Ancak gizli anlaşma yoluyla zimmete para geçirilebilir. Buna göre, yetkilendirme, kayıt tutma ve varlık saklama fonksiyonları ayrı kalır.", "cmt_en": ". Combining the timekeeping function and the preparation of the payroll journal entries is not improper because the employee has no access to assets or to employee records in the human resources department. Only through collusion could an embezzlement be perpetrated. Accordingly, the functions of authorization, recordkeeping, and custodianship remain separate."}], "answer": 3}, {"q_tr": "Bir iç denetçi, alacak hesapları departmanının diğer muhasebe faaliyetlerinden ayrı olduğunu belirlemiştir. Kredi, ayrı bir kredi departmanı tarafından onaylanmaktadır. Kontrol hesapları ve yardımcı defterler aylık olarak mutabık kılınmaktadır. Benzer şekilde, hesaplar aylık olarak yaşlandırılmaktadır. Alacak hesapları müdürü, iflas veya diğer olağandışı durumlar söz konusu olduğunda 1 yıl sonra veya daha erken gecikmiş hesapları silmektedir. Alacak dekontları ön numaralıdır ve teslim alma raporlarıyla örtüşmelidir. Aşağıdaki alanlardan hangisi yukarıdaki organizasyonun iç kontrol zayıflığı olarak değerlendirilebilir?", "q_en": "An internal auditor noted that the accounts receivable department is separate from other accounting activities. Credit is approved by a separate credit department. Control accounts and subsidiary ledgers are balanced monthly. Similarly, accounts are aged monthly. The accounts receivable manager writes off delinquent accounts after 1 year, or sooner if a bankruptcy or other unusual circumstances are involved. Credit memoranda are prenumbered and must correlate with receiving reports. Which of the following areas could be viewed as an internal control weakness of the above organization?", "options": [{"tr": "Gecikmiş hesapların silinmesi.", "en": "Write-offs of delinquent accounts.", "cmt_tr": ". Alacak hesapları müdürü, bağdaşmayan fonksiyonları yerine getirdiği için usulsüzlük yapma imkânına sahiptir. İşlemlerin yetkilendirilmesi ve kaydedilmesi ayrı olmalıdır. Bu nedenle, alacak hesapları departmanı dışından birisi silme işlemlerini yetkilendirmelidir.", "cmt_en": ". The accounts receivable manager has the ability to perpetrate irregularities because (s)he performs incompatible functions. Authorization and recording of transactions should be separate. Thus, someone outside the accounts receivable department should authorize write-offs."}, {"tr": "Kredi onayları.", "en": "Credit approvals.", "cmt_tr": ". Kredi onayı, kayıt tutma fonksiyonundan uygun şekilde ayrılmış bir yetkilendirme fonksiyonudur.", "cmt_en": ". Credit approval is an authorization function that is properly segregated from the recordkeeping function."}, {"tr": "Alacakların aylık yaşlandırılması.", "en": "Monthly aging of receivables.", "cmt_tr": ". Aylık yaşlandırma uygundur.", "cmt_en": ". Monthly aging is appropriate."}, {"tr": "Alacak dekontlarının işlenmesi.", "en": "Handling of credit memos.", "cmt_tr": ". Alacak dekontlarına ilişkin prosedürler standart kontrollerdir.", "cmt_en": ". The procedures regarding credit memoranda are standard controls."}], "answer": 0}, {"q_tr": "Aşağıdaki kontrollerden hangisi, kuruluşun ihtiyaçlarını aşan miktarlarda sipariş verilmesini önler?", "q_en": "Which of the following controls would prevent the ordering of quantities in excess of an organization’s needs?", "options": [{"tr": "Kullanıcı departmandaki bir amirin, satın alma departmanına sunulmadan önce tüm satın alma taleplerini gözden geçirmesi.", "en": "Review of all purchase requisitions by a supervisor in the user department prior to submitting them to the purchasing department.", "cmt_tr": ". Talep eden departman düzeyinde amir incelemesi, sipariş edilen ürün sayısı üzerinde bir kontrol aracıdır. Bu kontrol, görevlerin ayrılığının bir örneğidir. Yetkilendirme, kayıt tutma ve varlık saklamadan ayrı olmalıdır.", "cmt_en": ". Supervisory review at the originating department level is one means of control over the number of items ordered. This control is an example of the segregation of duties. Authorization should be separate from recordkeeping and asset custody."}, {"tr": "Sistem tarafından düşük stok seviyesi belirlendiğinde satın alma departmanı tarafından otomatik yeniden sipariş verilmesi.", "en": "Automatic reorder by the purchasing department when low inventory level is indicated by the system.", "cmt_tr": ". Otomatik yeniden sipariş gelecek planları dikkate almaz, bu da fazla malzeme satın alınmasına yol açabilir.", "cmt_en": ". Automatic reordering does not consider future plans, which could lead to purchases of excess material."}, {"tr": "Yeni bir sevkiyat teslim almadan önce satın alma siparişinin gözden geçirilmesini gerektiren bir politika.", "en": "A policy requiring review of the purchase order before receiving a new shipment.", "cmt_tr": ". Yeni sevkiyat teslim almadan önce satın alma siparişinin gözden geçirilmesi, sipariş edilmemiş malların kabul edilmesi riskine yönelik bir kontroldür.", "cmt_en": ". Review of the purchase order before receiving a new shipment is a control for the risk of accepting unordered goods."}, {"tr": "Yeni teslim alınan malların depolanmadan önce teslim alma raporunun irsaliye ile uyuşmasını gerektiren bir politika.", "en": "A policy requiring agreement of the receiving report and packing slip before storage of new receipts.", "cmt_tr": ". Yeni teslim alınan malların depolanmadan önce teslim alma raporunun irsaliye ile uyuşmasını gerektiren politika, sipariş edilenden farklı bir miktarın teslim alınması riskine yönelik bir kontroldür.", "cmt_en": ". A policy requiring agreement of the receiving report and packing slip before storage of new receipts is a control over the risk of receiving an amount other than that ordered."}], "answer": 0}, {"q_tr": "Müşterilerden gelen çekler her gün kuruluşun posta odasında teslim alınır. Bunları korumak için hangi kontroller mevcut olmalıdır?", "q_en": "Checks from customers are received in the organization’s mail room each day. What controls should be in place to safeguard them?", "options": [{"tr": "Müşteri ödemeleri için ayrı bir posta kutusu oluşturmak.", "en": "Establishing a separate post office box for customer payments.", "cmt_tr": ". Belirli bir posta memuruna her çeki listelemesini ve kısıtlayıcı ciro yapmasını zorunlu kılmak, müşteri ödemeleri için ayrı bir posta kutusu oluşturmaktan daha fazla koruma sağlar.", "cmt_en": ". Requiring a specific mail clerk to list and restrictively endorse each check provides more protection than establishing a separate post office box for customer payments."}, {"tr": "Tüm çekleri teslim alındıktan sonra kasiyere iletmek.", "en": "Forwarding all checks to the cashier upon receipt.", "cmt_tr": ". Aynı kişi hem çekleri teslim alıp hem de yatırmamalıdır.", "cmt_en": ". The same person should not both receive and deposit checks."}, {"tr": "Belirli bir posta memuruna her çeki listelemesini ve kısıtlayıcı ciro yapmasını zorunlu kılmak.", "en": "Requiring a specific mail clerk to list and restrictively endorse each check.", "cmt_tr": ". Diğer kayıtlara erişimi olmayan bir çalışan postayı açmalı ve teslim alınan çeklerin bir listesini hazırlamalıdır. Çek listesi daha sonra günlük banka mevduatı ve alacak hesapları kayıtlarıyla mutabık kılınacaktır. Kısıtlayıcı ciro ('yalnızca tahsil için') devralanları buna göre hareket etmeleri konusunda uyarır (yani çeki kuruluşun hesabına yatırmaları).", "cmt_en": ". An employee who does not have access to other records should open the mail and prepare a list of checks received. The check listing will later be reconciled with the daily bank deposit and entries to accounts receivable. A restrictive endorsement (“for deposit only”) will put transferees on notice to act accordingly (that is, deposit the check in the organization’s account)."}, {"tr": "Posta memurları için kefalet sigortası sağlamak.", "en": "Providing bonding protection for mail clerks.", "cmt_tr": ". Kefalet sigortası kayıplara karşı sigorta sağlar ancak doğrudan önlemez.", "cmt_en": ". Bonding insures against, but does not directly prevent, losses."}], "answer": 2}, {"q_tr": "İç denetçi, herhangi bir iç kontrol sisteminde belirli sınırlamaların doğal olarak var olduğunun farkındadır. Aşağıdaki senaryolardan hangisi iç kontrolün doğal bir sınırlamasının sonucudur?", "q_en": "The internal auditor recognizes that certain limitations are inherent in any system of internal controls. Which one of the following scenarios is the result of an inherent limitation of internal control?", "options": [{"tr": "Muhasebe müdürü hem nakit mevduatları yapar hem de kaydeder.", "en": "The comptroller both makes and records cash deposits.", "cmt_tr": ". Kayıt tutma ve varlık saklama fonksiyonlarının ayrılması alışılmış bir uygulamadır. Muhasebe müdürünün hem nakit mevduatları yapması hem de kaydetmesi önlenebilir bir kontrol zayıflığıdır.", "cmt_en": ". Segregating the functions of recording and asset custody is customary. That the comptroller both makes and records cash deposits is an avoidable control weakness."}, {"tr": "Bir güvenlik görevlisi, depo çalışanlarından birinin yetki olmadan varlıkları tesisten çıkarmasına izin verir.", "en": "A security guard allows one of the warehouse employees to remove assets from the premises without authorization.", "cmt_tr": ". İç kontrolün doğal sınırlamaları; yargılama hataları, talimatların yanlış anlaşılması, personel dikkatsizliği, dikkat dağınıklığı, yorgunluk, gizli anlaşma, yönetim tarafından yapılan usulsüzlükler, değişen koşullar ve uyum derecelerinin bozulmasından kaynaklanır. Bu nedenle, görev ayrılığına dayanan bir kontrol (güvenlik görevlilerinin kullanılması) iki veya daha fazla çalışan arasındaki gizli anlaşma ile devre dışı bırakılabilir.", "cmt_en": ". Inherent limitations in internal control arise from mistakes in judgment, misunderstandings of instructions, personnel carelessness, distraction, fatigue, collusion, perpetrations by management, changing conditions, and deterioration of degrees of compliance. Thus, a control (use of security guards) based on segregation of functions may be overcome by collusion among two or more employees."}, {"tr": "Kuruluş, kredi onayı olmadan müşterilere veresiye satış yapar.", "en": "The organization sells to customers on account, without credit approval.", "cmt_tr": ". İşlemler yürütülmeden önce yetkilendirilebilir ve yetkilendirilmelidir. Kuruluşun kredi onayı olmadan veresiye satış yapması önlenebilir bir kontrol zayıflığıdır.", "cmt_en": ". Transactions can and should be authorized before execution. The fact that the organization sells to customers on account, without credit approval, is an avoidable control weakness."}, {"tr": "Okuma yazma bilmeyen bir çalışana, üçüncü vardiyada kullanılan kuruluşun bilgisayar bant kütüphanesi ve çalıştırma kılavuzlarının sorumluluğu verilir.", "en": "An employee who is unable to read is assigned custody of the organization’s computer tape library and run manuals that are used during the third shift.", "cmt_tr": ". Niteliksiz bir çalışanın görevlendirilmesi önlenebilir bir kontrol zayıflığıdır.", "cmt_en": ". Assignment of an unqualified employee is an avoidable control weakness."}], "answer": 1}, {"q_tr": "Aşağıdaki kontrollerden hangisi bir satıcıya fazla ödeme yapılmasını önlemeye yardımcı olur?", "q_en": "Which of the following controls would help prevent overpaying a vendor?", "options": [{"tr": "Çek düzenlendiğinde destekleyici belgelerin gözden geçirilmesi ve iptal edilmesi.", "en": "Reviewing and canceling supporting documents when a check is issued.", "cmt_tr": ". Destekleyici belgelerin gözden geçirilmesi ve iptal edilmesi, aynı satın alma için satıcıya iki kez ödeme yapılmasını önler. Çeki imzalayan kişi gerekli belgeleri iptal ederse, bunlar mükerrer ödeme fişi desteğinde yeniden kullanılamaz. Ödenmiş fiş dosyasının borçlar hesabı memurunun erişimine karşı korunması da etkili bir başka kontroldür.", "cmt_en": ". Reviewing and canceling the supporting documents prevents paying a vendor twice for the same purchase. If the person who signs the check cancels the required documents, they cannot be recycled in support of a duplicate payment voucher. Securing the paid voucher file from access by the accounts payable clerk is another effective control."}, {"tr": "Çeki imzalayan kişinin çeki doğrudan satıcıya postalamasını istemek.", "en": "Requiring the check signer to mail the check directly to the vendor.", "cmt_tr": ". Çeki imzalayan kişinin çeki doğrudan satıcıya postalamasını istemek, çekin zimmete geçirilmesini önler.", "cmt_en": ". Requiring the check signer to mail the check directly to the vendor would prevent the check from being misappropriated."}, {"tr": "Harcamanın muhasebe dağılımını gözden geçirmek.", "en": "Reviewing the accounting distribution for the expenditure.", "cmt_tr": ". Harcamanın muhasebe dağılımını gözden geçirmek, harcamanın doğru hesaplara borç yazılmasını sağlar.", "cmt_en": ". Reviewing the accounting distribution for the expenditure would ensure that the expenditure is debited to the proper account(s)."}, {"tr": "Satıcıdan sipariş vermeden önce satın almanın onaylanması.", "en": "Approving the purchase before ordering from the vendor.", "cmt_tr": ". Satıcıdan sipariş vermeden önce satın almanın onaylanması, yalnızca yetkilendirilmiş satın almaların yapılmasını sağlar.", "cmt_en": ". Approving the purchase before ordering from the vendor would ensure that only authorized purchases are made."}], "answer": 0}, {"q_tr": "Bir teslim alma departmanı, stok girişlerini tanımlamak ve kaydetmek için satın alma siparişlerinin kopyalarını alır. Satın alma siparişleri satıcının adını ve sipariş edilen malzemelerin miktarlarını listeler. Bu sistemin izin verebileceği olası bir hata nedir?", "q_en": "A receiving department receives copies of purchase orders for use in identifying and recording inventory receipts. The purchase orders list the name of the vendor and the quantities of the materials ordered. A possible error that this system could allow is", "options": [{"tr": "Yetkisiz satıcılara ödeme yapılması.", "en": "Payment to unauthorized vendors.", "cmt_tr": ". Teslim alınanları satın alma siparişleriyle karşılaştırmak, yetkisiz satıcıları tespit etmeye yardımcı olur.", "cmt_en": ". Comparing receipts with purchase orders will help detect unauthorized vendors."}, {"tr": "Yetkisiz satın almalar için ödeme yapılması.", "en": "Payment for unauthorized purchases.", "cmt_tr": ". Teslim alınanları satın alma siparişleriyle karşılaştırmak, yetkisiz satın almaları tespit etmeye yardımcı olur.", "cmt_en": ". Comparing receipts with purchase orders will help detect unauthorized purchases."}, {"tr": "Kısmi teslimatlar için fazla ödeme yapılması.", "en": "Overpayment for partial deliveries.", "cmt_tr": ". Adil bir sayımı sağlamak için, teslim alma memuruna gönderilen satın alma siparişi kopyasında miktarlar yer almamalıdır. Teslim alma memuru sevkiyattaki ürünleri saymalı ve bir teslim alma raporu hazırlamalıdır. Kopyalar stok kontrolüne ve borçlar hesabına gönderilir.", "cmt_en": ". To ensure a fair count, the copy of the purchase order sent to the receiving clerk should not include quantities. The receiving clerk should count the items in the shipment and prepare a receiving report. Copies are sent to inventory control and accounts payable."}, {"tr": "Satın almaların kaydında gecikme.", "en": "Delay in recording purchases.", "cmt_tr": ". Teslim alınanları tanımlamak için satın alma siparişlerini kullanmak, satın almaların kaydında gecikmeye neden olmaz.", "cmt_en": ". Using purchase orders to identify receipts will not cause a delay in recording purchases."}], "answer": 2}, {"q_tr": "Aşağıdaki durumlardan hangisi bir iç denetçinin satın alma fonksiyonu üzerindeki kontrollerin yeterliliğini sorgulamasına neden olur?", "q_en": "Which of the following situations will cause an internal auditor to question the adequacy of controls over a purchasing function?", "options": [{"tr": "Satın alma siparişinin aslı ve bir kopyası satıcıya postalanır. Satıcının kabulü onayladığı kopya satın alma departmanına iade edilir.", "en": "The original and one copy of the purchase order are mailed to the vendor. The copy on which the vendor acknowledges acceptance is returned to the purchasing department.", "cmt_tr": ". Bu uygulama doğru iletişimi sağlar.", "cmt_en": ". This practice ensures accurate communication."}, {"tr": "Teslim alma raporları, satın alma siparişleriyle eşleştirildikleri satın alma departmanına iletilir ve borçlar hesabına gönderilir.", "en": "Receiving reports are forwarded to purchasing where they are matched with purchase orders and sent to accounts payable.", "cmt_tr": ". Satın alma ve teslim alma organizasyonel olarak bağımsız olmalıdır. Ayrıca, satın alma siparişi ile teslim alma raporunun karşılaştırılması üçüncü bir kişinin sorumluluğunda olmalıdır. Satın alma departmanı çalışanı tarafından işlenen bir hile, teslim alma raporunu ilk o elde ederse gizlenebilir.", "cmt_en": ". Purchasing and receiving should be organizationally independent. Moreover, comparing the purchase order and the receiving report should be the responsibility of a third person. Fraud perpetrated by a purchasing department employee could be concealed if (s)he is the first to obtain the receiving report."}, {"tr": "Borçlar hesabı bölümü ödemeler için belge hazırlar.", "en": "The accounts payable section prepares documentation for payments.", "cmt_tr": ". Borçlar hesabı belge hazırlayabilir ancak çek imzalamamalıdır.", "cmt_en": ". Accounts payable may prepare documentation but should not sign checks."}, {"tr": "Ödenmemiş fiş dosyaları ve sürekli stok kayıtları bağımsız olarak tutulur.", "en": "Unpaid voucher files and perpetual inventory records are independently maintained.", "cmt_tr": ". Ödenmemiş fişlerin ve sürekli stok kayıtlarının ayrı tutulması kabul edilebilir.", "cmt_en": ". Separately maintaining unpaid vouchers and perpetual inventory records is acceptable."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi tüm stok sevkiyatlarının müşterilere faturalanmasını sağlar?", "q_en": "Which of the following ensures that all inventory shipments are billed to customers?", "options": [{"tr": "Sevk belgeleri ön numaralıdır ve bağımsız olarak hesaplanır ve satış faturalarıyla eşleştirilir.", "en": "Shipping documents are prenumbered and are independently accounted for and matched with sales invoices.", "cmt_tr": ". Sevk belgeleri sevkiyat anında hazırlanır. Kaydedilmemiş sevkiyatların tespitini kolaylaştırmak için ön numaralıdır. Belge sırasındaki bir boşluk bir usulsüzlüğü gösterebilir. Sevkiyat departmanı dışındaki bir çalışan bu belgeleri hesaba katmalıdır. Satış faturaları, kuruluşun bilgisayar sistemi tarafından sevk belgeleriyle aynı anda oluşturulur ve aynı numaralara sahip olmalıdır. Bu nedenle, uygun faturalamanın sağlanması için her sevk belgesi bir satış faturasıyla eşleştirilmelidir.", "cmt_en": ". Shipping documents are prepared at the time of shipment. They are prenumbered to facilitate detection of unrecorded shipments. A gap in the sequence of documents may indicate an irregularity. An employee outside the shipping department should account for these documents. Sales invoices are generated by the organization’s computer system at the same time as the shipping documents and should have the same numbers. Thus, every shipping document should be matched with a sales invoice to ensure proper billing."}, {"tr": "Satış faturaları ön numaralıdır ve bağımsız olarak hesaplanır ve satış yevmiye defterine izlenir.", "en": "Sales invoices are prenumbered and are independently accounted for and traced to the sales journal.", "cmt_tr": ". Satış faturalarının tek başına hesaplanması faturalanmamış sevkiyatları önlemez veya tespit etmez. Satış işlemlerinin kaydedilmesi ile müşteri hesaplarının tutulması görevlerinin ayrılması tüm sevkiyatların faturalanmasını sağlamaz.", "cmt_en": ". Accounting for sales invoices alone does not prevent or detect unbilled shipments. Segregating the duties for recording sales transactions and maintaining customer accounts does not ensure that all shipments are invoiced."}, {"tr": "Satış işlemlerinin kaydedilmesi ve müşteri hesap bakiyelerinin tutulması görevleri ayrılmıştır.", "en": "Duties for recording sales transactions and maintaining customer account balances are separated.", "cmt_tr": "Satış işlemlerinin kaydedilmesi ve müşteri hesaplarının tutulması görevlerinin ayrılması, tüm sevkiyatların faturalanmasını sağlamaz.", "cmt_en": "Segregating the duties for recording sales transactions and maintaining customer accounts does not ensure that all shipments are invoiced."}, {"tr": "Müşteri fatura şikâyetleri muhasebe müdürlüğü tarafından araştırılır.", "en": "Customer billing complaints are investigated by the controller’s office.", "cmt_tr": ". Faturalanmayan müşteriler kuruluşu bilgilendirmeyebilir.", "cmt_en": ". Customers who are not billed may not notify the organization."}], "answer": 0}, {"q_tr": "İç kontrol iyi tasarlanmışsa, farklı kişiler tarafından yerine getirilmesi gereken iki görev hangisidir?", "q_en": "If internal control is well designed, two tasks that should be performed by different persons are", "options": [{"tr": "Şüpheli alacak silme işlemlerinin onaylanması ve borçlar hesabı yardımcı defteri ile kontrol hesabının mutabakatı.", "en": "Approval of bad debt write-offs, and reconciliation of the accounts payable subsidiary ledger and controlling account.", "cmt_tr": ". Şüpheli alacakların silinmesi (alacak hesapları) ile yükümlülük olan borçlar hesabının mutabakatı arasında çatışma yoktur.", "cmt_en": ". There is no conflict between writing off bad debts (accounts receivable) and reconciling accounts payable, which are liabilities."}, {"tr": "Bordro çeklerinin dağıtılması ve satış iadelerinin kredi olarak onaylanması.", "en": "Distribution of payro
