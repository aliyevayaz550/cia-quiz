onitoring is a process that assesses the quality of the system’s performance over time."}], "answer": 2}, {"q_tr": "The COBIT 2019 control framework includes which governance system principle?", "q_en": "The COBIT 2019 control framework includes which governance system principle?", "options": [{"tr": "Controls for specific IT processes.", "en": "Controls for specific IT processes.", "cmt_tr": ". In its original version, COBIT focused on controls for specific IT processes.", "cmt_en": ". In its original version, COBIT focused on controls for specific IT processes."}, {"tr": "Dynamic response to design changes.", "en": "Dynamic response to design changes.", "cmt_tr": ". COBIT 2019 is a governance system applicable to IT governance, which includes six governance system principles and three governance framework principles. A COBIT 2019 governance system principle is that the governance system must be (1) dynamic when responding to a change in design factors (e.g., personnel, infrastructure, applications, etc.) and (2) accompanied by consideration of its systemic effects.", "cmt_en": ". COBIT 2019 is a governance system applicable to IT governance, which includes six governance system principles and three governance framework principles. A COBIT 2019 governance system principle is that the governance system must be (1) dynamic when responding to a change in design factors (e.g., personnel, infrastructure, applications, etc.) and (2) accompanied by consideration of its systemic effects."}, {"tr": "Alignment with major standards.", "en": "Alignment with major standards.", "cmt_tr": ". The COBIT 2019 governance framework is aligned with major standards. It aligns with relevant regulations, standards, frameworks, and best practices (e.g., the latest IT standards and compliance regulations).", "cmt_en": ". The COBIT 2019 governance framework is aligned with major standards. It aligns with relevant regulations, standards, frameworks, and best practices (e.g., the latest IT standards and compliance regulations)."}, {"tr": "Based on a conceptual model.", "en": "Based on a conceptual model.", "cmt_tr": ". The COBIT 2019 governance framework is based on a conceptual model. It achieves consistency and automation by identifying components and their relationships.", "cmt_en": ". The COBIT 2019 governance framework is based on a conceptual model. It achieves consistency and automation by identifying components and their relationships."}], "answer": 1}, {"q_tr": "The component of internal control that mitigates risks to achievement of objectives is", "q_en": "The component of internal control that mitigates risks to achievement of objectives is", "options": [{"tr": "Risk assessment.", "en": "Risk assessment.", "cmt_tr": ". Risk assessment identifies and analyzes external or internal risks to achievement of objectives at the activity and entity levels.", "cmt_en": ". Risk assessment identifies and analyzes external or internal risks to achievement of objectives at the activity and entity levels."}, {"tr": "Control environment.", "en": "Control environment.", "cmt_tr": ". The control environment reflects the attitude and actions of the board and management regarding the significance of control within the organization.", "cmt_en": ". The control environment reflects the attitude and actions of the board and management regarding the significance of control within the organization."}, {"tr": "Control activities.", "en": "Control activities.", "cmt_tr": ". Control activities are the policies and procedures that support the mitigation of risks to achievement of objectives. They may be (1) preventive or detective; (2) automated or manual; and (3) applied to authorizations and approvals, verifications, reconciliations, and performance reviews.", "cmt_en": ". Control activities are the policies and procedures that support the mitigation of risks to achievement of objectives. They may be (1) preventive or detective; (2) automated or manual; and (3) applied to authorizations and approvals, verifications, reconciliations, and performance reviews."}, {"tr": "Monitoring.", "en": "Monitoring.", "cmt_tr": ". Monitoring evaluates whether the internal control components are present and functioning.", "cmt_en": ". Monitoring evaluates whether the internal control components are present and functioning."}], "answer": 2}, {"q_tr": "Management’s aggressive attitude toward financial reporting and its emphasis on meeting projected profit goals most likely would significantly influence an entity’s control environment when", "q_en": "Management’s aggressive attitude toward financial reporting and its emphasis on meeting projected profit goals most likely would significantly influence an entity’s control environment when", "options": [{"tr": "The audit committee is active in overseeing the entity’s financial reporting policies.", "en": "The audit committee is active in overseeing the entity’s financial reporting policies.", "cmt_tr": ". An active audit committee serves to mitigate the risks associated with certain management attitudes.", "cmt_en": ". An active audit committee serves to mitigate the risks associated with certain management attitudes."}, {"tr": "External policies established by parties outside the entity affect its accounting practices.", "en": "External policies established by parties outside the entity affect its accounting practices.", "cmt_tr": ". External influences serve to mitigate the risks associated with certain management attitudes.", "cmt_en": ". External influences serve to mitigate the risks associated with certain management attitudes."}, {"tr": "Management is dominated by one individual who is also a shareholder.", "en": "Management is dominated by one individual who is also a shareholder.", "cmt_tr": ". Management’s philosophy and operating style is one factor affecting the control environment as described in the COSO model for internal control. Such characteristics as management’s attitudes and actions toward financial reporting and its emphasis on meeting budget, profit, and other goals have a significant influence on the control environment, especially when management is dominated by one or a few individuals. When incentives or pressures are present to achieve certain performance goals, the auditor should heighten his or her concern about the possibility of fraud.", "cmt_en": ". Management’s philosophy and operating style is one factor affecting the control environment as described in the COSO model for internal control. Such characteristics as management’s attitudes and actions toward financial reporting and its emphasis on meeting budget, profit, and other goals have a significant influence on the control environment, especially when management is dominated by one or a few individuals. When incentives or pressures are present to achieve certain performance goals, the auditor should heighten his or her concern about the possibility of fraud."}, {"tr": "Internal auditors have direct access to the board of directors and entity management.", "en": "Internal auditors have direct access to the board of directors and entity management.", "cmt_tr": ". An effective internal audit function serves to mitigate the risks associated with certain management attitudes.", "cmt_en": ". An effective internal audit function serves to mitigate the risks associated with certain management attitudes."}], "answer": 2}, {"q_tr": "A restaurant chain has over 680 restaurants. All food orders for each restaurant are required to be entered into an electronic device that records all food orders by food servers and transmits the order to the kitchen for preparation. All food servers are responsible for collecting cash for all their orders and must turn in cash at the end of their shift equal to the sales value of food ordered for their I.D. number. The manager then reconciles the cash received for the day with the computerized record of food orders generated. All differences are investigated immediately by the restaurant. Organizational headquarters has established monitoring controls to determine when an individual restaurant might not be recording all its revenue and transmitting the applicable cash to the corporate headquarters. Which one of the following is the best example of a monitoring activity?", "q_en": "A restaurant chain has over 680 restaurants. All food orders for each restaurant are required to be entered into an electronic device that records all food orders by food servers and transmits the order to the kitchen for preparation. All food servers are responsible for collecting cash for all their orders and must turn in cash at the end of their shift equal to the sales value of food ordered for their I.D. number. The manager then reconciles the cash received for the day with the computerized record of food orders generated. All differences are investigated immediately by the restaurant. Organizational headquarters has established monitoring controls to determine when an individual restaurant might not be recording all its revenue and transmitting the applicable cash to the corporate headquarters. Which one of the following is the best example of a monitoring activity?", "options": [{"tr": "The restaurant manager reconciles the cash received with the food orders recorded on the computer.", "en": "The restaurant manager reconciles the cash received with the food orders recorded on the computer.", "cmt_tr": ". The manager’s activity is an example of a reconciliation control applied at the store level. Monitoring is an overall control that determines whether other controls are operating effectively.", "cmt_en": ". The manager’s activity is an example of a reconciliation control applied at the store level. Monitoring is an overall control that determines whether other controls are operating effectively."}, {"tr": "All food orders must be entered on the computer, and segregation of duties is maintained between the food servers and the cooks.", "en": "All food orders must be entered on the computer, and segregation of duties is maintained between the food servers and the cooks.", "cmt_tr": ". The division of duties is an operational control.", "cmt_en": ". The division of duties is an operational control."}, {"tr": "Management prepares a detailed analysis of gross margin per store and investigates any store that shows a significantly lower gross margin.", "en": "Management prepares a detailed analysis of gross margin per store and investigates any store that shows a significantly lower gross margin.", "cmt_tr": ". Monitoring is a process that assesses the quality of internal control over time. It involves assessment by appropriate personnel of the design and operation of controls and the taking of corrective action. Monitoring can be done through ongoing activities or separate evaluations. Ongoing monitoring procedures are built into the normal recurring activities of an entity and include regular management and supervisory activities. Thus, analysis of gross margin data and investigation of significant deviations is a monitoring process.", "cmt_en": ". Monitoring is a process that assesses the quality of internal control over time. It involves assessment by appropriate personnel of the design and operation of controls and the taking of corrective action. Monitoring can be done through ongoing activities or separate evaluations. Ongoing monitoring procedures are built into the normal recurring activities of an entity and include regular management and supervisory activities. Thus, analysis of gross margin data and investigation of significant deviations is a monitoring process."}, {"tr": "Cash is transmitted to corporate headquarters on a daily basis.", "en": "Cash is transmitted to corporate headquarters on a daily basis.", "cmt_tr": ". Daily transmission of cash is an operational control.", "cmt_en": ". Daily transmission of cash is an operational control."}], "answer": 2}, {"q_tr": "Within the COSO Internal Control – Integrated Framework, which of the following components is designed to ensure that internal controls continue to operate effectively?", "q_en": "Within the COSO Internal Control – Integrated Framework, which of the following components is designed to ensure that internal controls continue to operate effectively?", "options": [{"tr": "Control environment.", "en": "Control environment.", "cmt_tr": ". The control environment sets the tone of an organization. It is the foundation for all other components of internal control, providing discipline and structure. It does not involve monitoring the ongoing effectiveness of internal control.", "cmt_en": ". The control environment sets the tone of an organization. It is the foundation for all other components of internal control, providing discipline and structure. It does not involve monitoring the ongoing effectiveness of internal control."}, {"tr": "Risk assessment.", "en": "Risk assessment.", "cmt_tr": ". Risk assessment is the identification and analysis of relevant risks to achievement of the objectives, forming a basis for determining how the risks should be managed.", "cmt_en": ". Risk assessment is the identification and analysis of relevant risks to achievement of the objectives, forming a basis for determining how the risks should be managed."}, {"tr": "Information and communication.", "en": "Information and communication.", "cmt_tr": ". Information and communication concerns how pertinent information must be identified, captured, and communicated in a form and time frame that enable people to carry out their responsibilities.", "cmt_en": ". Information and communication concerns how pertinent information must be identified, captured, and communicated in a form and time frame that enable people to carry out their responsibilities."}, {"tr": "Monitoring.", "en": "Monitoring.", "cmt_tr": ". Monitoring is the process of assessing the quality of the system’s performance over time. It is designed to ensure that internal controls continue to operate effectively.", "cmt_en": ". Monitoring is the process of assessing the quality of the system’s performance over time. It is designed to ensure that internal controls continue to operate effectively."}], "answer": 3}, {"q_tr": "Which of the following are included in the control environment described in the COSO internal control framework?", "q_en": "Which of the following are included in the control environment described in the COSO internal control framework?", "options": [{"tr": "Organizational structure, management philosophy, and planning.", "en": "Organizational structure, management philosophy, and planning.", "cmt_tr": ". Planning is not an element of the control environment.", "cmt_en": ". Planning is not an element of the control environment."}, {"tr": "Integrity and ethical values, assignment of authority, and human resource policies.", "en": "Integrity and ethical values, assignment of authority, and human resource policies.", "cmt_tr": ". The control environment is a set of standards, processes, and structures that includes 1. Integrity and ethical values 2. Competence of personnel 3. Management’s philosophy and operating style 4. Organizational structure 5. Assignment of authority and responsibility 6. Human resource policies and practices", "cmt_en": ". The control environment is a set of standards, processes, and structures that includes 1. Integrity and ethical values 2. Competence of personnel 3. Management’s philosophy and operating style 4. Organizational structure 5. Assignment of authority and responsibility 6. Human resource policies and practices"}, {"tr": "Competence of personnel, backup facilities, laws, and regulations.", "en": "Competence of personnel, backup facilities, laws, and regulations.", "cmt_tr": ". Backup facilities, laws, and regulations are not elements of the control environment.", "cmt_en": ". Backup facilities, laws, and regulations are not elements of the control environment."}, rting • Compliance with applicable laws and regulations", "cmt_en": ". Probably the most well-known control framework in the U.S. is COSO’s Internal Control – Integrated Framework, commonly referred to as the COSO internal control framework. The framework defines internal control as A process, effected by an organization’s board of directors, management, and other personnel, designed to provide reasonable assurance regarding the achievement of objectives in the following categories: • Effectiveness and efficiency of operations • Reliability of financial reporting • Compliance with applicable laws and regulations"}], "answer": 3}, {"q_tr": "What ethical consideration should an internal auditor prioritize when discovering potentially fraudulent activity during a compliance review?", "q_en": "What ethical consideration should an internal auditor prioritize when discovering potentially fraudulent activity during a compliance review?", "options": [{"tr": "Immediately report the findings to external regulators.", "en": "Immediately report the findings to external regulators.", "cmt_tr": ". Direct reporting could compromise internal investigations or breach confidentiality.", "cmt_en": ". Direct reporting could compromise internal investigations or breach confidentiality."}, {"tr": "Consult with legal counsel for guidance on disclosure responsibilities.", "en": "Consult with legal counsel for guidance on disclosure responsibilities.", "cmt_tr": ". Consulting with legal counsel ensures that the internal auditor adheres to legal standards and organizational policies when dealing with potentially fraudulent activity, safeguarding both the auditor’s responsibilities and the organization’s legal obligations. This strategy prepares auditors to handle sensitive information correctly and effectively.", "cmt_en": ". Consulting with legal counsel ensures that the internal auditor adheres to legal standards and organizational policies when dealing with potentially fraudulent activity, safeguarding both the auditor’s responsibilities and the organization’s legal obligations. This strategy prepares auditors to handle sensitive information correctly and effectively."}, {"tr": "Publicly disclose the findings to avoid potential racketeering charges.", "en": "Publicly disclose the findings to avoid potential racketeering charges.", "cmt_tr": ". Public disclosure is generally inappropriate until full facts are confirmed legally.", "cmt_en": ". Public disclosure is generally inappropriate until full facts are confirmed legally."}, {"tr": "Seek confirmation from peers before making any decision.", "en": "Seek confirmation from peers before making any decision.", "cmt_tr": ". Peer confirmation supports validation but lacks legal guidance in potential fraud scenarios.", "cmt_en": ". Peer confirmation supports validation but lacks legal guidance in potential fraud scenarios."}], "answer": 1}, {"q_tr": "According to COSO, which of the following is a compliance objective?", "q_en": "According to COSO, which of the following is a compliance objective?", "options": [{"tr": "To maintain adequate staffing to keep overtime expense within budget.", "en": "To maintain adequate staffing to keep overtime expense within budget.", "cmt_tr": ". Operations objectives address effectiveness and efficiency.", "cmt_en": ". Operations objectives address effectiveness and efficiency."}, {"tr": "To maintain a safe level of carbon dioxide emissions during production.", "en": "To maintain a safe level of carbon dioxide emissions during production.", "cmt_tr": ". Compliance objectives relate to adherence to laws and regulations. Maintaining a safe level of carbon dioxide emissions during production is an example.", "cmt_en": ". Compliance objectives relate to adherence to laws and regulations. Maintaining a safe level of carbon dioxide emissions during production is an example."}, {"tr": "To maintain material price variances within published guidelines.", "en": "To maintain materi const SHEETS = ["SU1 - Accounting Cycles & Controls", "SU2 - Management Controls", "SU3 - Control Frameworks"];
const SHORT_NAMES = {"SU1 - Accounting Cycles & Controls": "SU1", "SU2 - Management Controls": "SU2", "SU3 - Control Frameworks": "SU3"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit9";

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  const q    = qs[curQ];
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang==="tr" ? "en" : "tr";
  document.getElementById("lang-btn").textContent = lang==="tr" ? "EN" : "TR";
  if(!quizStarted) {
    document.getElementById("welcome-desc").textContent =
      lang==="tr"
        ? "3 mövzu, 92 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar"
        : "3 topics, 92 questions — TR/EN bilingual support with explanations";
    return;
  }
  updateProgress();
  // Re-render current question without resetting state
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}

// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
</script>
