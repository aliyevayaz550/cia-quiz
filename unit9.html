ll checks and approval of sales returns for credit.", "cmt_tr": ". Bordro çeklerinin dağıtılması ve satış iadelerinin onaylanması bağımsız fonksiyonlardır. Bu kadar farklı görevleri yerine getiren kişilerin bir hile işleyip gizlemesi pek olası değildir. Aslında, bazı kuruluşlar bordro çeklerini dağıtmak için bağımsız bir fonksiyondan personel kullanır.", "cmt_en": ". Distribution of payroll checks and approval of sales returns are independent functions. People who perform such disparate tasks are unlikely to be able to perpetrate and conceal a fraud. In fact, some organizations use personnel from an independent function to distribute payroll checks."}, {"tr": "Hem nakit tahsilat yevmiye defterinden hem de nakit ödeme yevmiye defterinden tutarların defteri kebire kaydedilmesi.", "en": "Posting of amounts from both the cash receipts journal and cash payments journal to the general ledger.", "cmt_tr": ". İlgili kişinin gerçek nakde erişimi olmadığı sürece her iki defteri kaydetmek çatışmaya neden olmaz. Bir kişinin kayıtlara erişimi olup varlıklara erişimi yoksa, gizli anlaşma olmadan zimmete geçirme tehlikesi yoktur.", "cmt_en": ". Posting both ledgers would cause no conflict as long as the individual involved did not have access to the actual cash. If a person has access to records but not the assets, no danger exists of embezzlement without collusion."}, {"tr": "Nakit tahsilatların kaydedilmesi ve banka mutabakatlarının hazırlanması.", "en": "Recording of cash receipts and preparation of bank reconciliations.", "cmt_tr": ". Nakit kaydı varlıklar için hesap verebilirlik oluşturur. Banka mutabakatı, kaydedilen hesap verebilirliği gerçek varlıklarla karşılaştırır. Bu nedenle, nakit tahsilatların kaydedilmesi ve banka mutabakatlarının hazırlanması farklı kişiler tarafından yapılmalıdır çünkü mutabakatı hazırlayan kişi nakit açığını gizleyebilir. Örneğin, bir kasiyer hem banka mevduatını hazırlayıp hem de mutabakatı yaparsa, nakdi zimmete geçirebilir ve mutabakatı sahteleyerek hırsızlığı gizleyebilir.", "cmt_en": ". Recording of cash establishes accountability for assets. The bank reconciliation compares that recorded accountability with actual assets. The recording of cash receipts and preparation of bank reconciliations should therefore be performed by different individuals because the preparer of a reconciliation could conceal a cash shortage. For example, if a cashier both prepares the bank deposit and performs the reconciliation, (s)he could embezzle cash and conceal the theft by falsifying the reconciliation."}], "answer": 3}, {"q_tr": "Aşağıdaki faaliyetlerden hangisi hem uygun bir insan kaynakları departmanı fonksiyonunu hem de bordro hilesine karşı caydırıcı bir unsuru temsil eder?", "q_en": "Which of the following activities represents both an appropriate human resources department function and a deterrent to payroll fraud?", "options": [{"tr": "Maaş çeklerinin dağıtılması.", "en": "Distribution of paychecks.", "cmt_tr": ". Bordro ile ilgili varlık saklama fonksiyonunu mali işler müdürü yerine getirmelidir.", "cmt_en": ". The chief financial officer should perform the asset custody function regarding payroll."}, {"tr": "Fazla mesainin yetkilendirilmesi.", "en": "Authorization of overtime.", "cmt_tr": ". Fazla mesai yetkilendirmesi operasyonel yönetimin sorumluluğundadır.", "cmt_en": ". Authorizing overtime is a responsibility of operating management."}, {"tr": "Bordroya ekleme ve çıkarmaların yetkilendirilmesi.", "en": "Authorization of additions and deletions from the payroll.", "cmt_tr": ". Bordro departmanı bordro bilgilerini toplamaktan (kayıt tutma) sorumludur. İnsan kaynakları departmanı, işe alma, işten çıkarma ve ücret oranları ile kesinti değişiklikleri gibi çalışan işlemlerini yetkilendirmekten sorumludur. Kayıt tutma ve yetkilendirme fonksiyonlarının ayrılması hilenin önlenmesine yardımcı olur.", "cmt_en": ". The payroll department is responsible for assembling payroll information (recordkeeping). The human resources department is responsible for authorizing employee transactions, such as hiring, firing, and changes in pay rates and deductions. Segregating the recording and authorization functions helps prevent fraud."}, {"tr": "Teslim alınmamış maaş çeklerinin toplanması ve saklanması.", "en": "Collection and retention of unclaimed paychecks.", "cmt_tr": ". Teslim alınmamış çekler, özel bir banka hesabına yatırılana kadar mali işler müdürünün sorumluluğunda olmalıdır.", "cmt_en": ". Unclaimed checks should be in the custody of the chief financial officer until they can be deposited in a special bank account."}], "answer": 2}, {"q_tr": "Bir kuruluşun bilgisayarlı satış ve nakit tahsilat yevmiye defterleri vardır. Bu defterler için bilgisayar programları doğru şekilde hata ayıklanmıştır. İç denetçi, alacak hesapları yardımcı hesapları toplamının alacak hesapları kontrol hesabından önemli ölçüde farklı olduğunu keşfetmiştir. Bu tutarsızlık neyi gösterebilir?", "q_en": "An organization has computerized sales and cash receipts journals. The computer programs for these journals have been properly debugged. The internal auditor discovered that the total of the accounts receivable subsidiary accounts differs materially from the accounts receivable control account. This discrepancy could indicate", "options": [{"tr": "Alacak dekontlarının hatalı kaydedilmesi.", "en": "Credit memoranda being improperly recorded.", "cmt_tr": ". Satış iade ve indirimleri alacak hesaplarının alacaklandırılmasını gerektirir. Bu nedenle, satış ve nakit tahsilatlar doğru şekilde kaydedilmişse, yetkisiz alacak dekontlarının kaydedilmesi tutarsızlık için bir açıklamadır.", "cmt_en": ". Sales returns and allowances require the crediting of accounts receivable. Thus, the recording of unauthorized credit memoranda is one explanation for the discrepancy if sales and cash receipts are properly recorded."}, {"tr": "Alacakların ötelenmesi (lapping).", "en": "Receivables being lapped.", "cmt_tr": ". Öteleme, nakit tahsilatların çalınması ve hırsızlığı gizlemek için sonraki tahsilatların kullanılmasını içerir. Etkisi alacakları olduğundan fazla göstermektir, ancak kontrol toplamı ile yardımcı tutar toplamı arasında fark oluşmaz.", "cmt_en": ". Lapping entails the theft of cash receipts and the use of subsequent receipts to conceal the theft. The effect is to overstate receivables, but no difference between the control total and the total of subsidiary amounts would arise."}, {"tr": "Alacakların uygun şekilde yaşlandırılmaması.", "en": "Receivables not being properly aged.", "cmt_tr": ". Yaşlandırma muhasebe kayıtlarını içermez.", "cmt_en": ". Aging does not involve accounting entries."}, {"tr": "Hesap özetlerinin postalanmadan önce ele geçirilmesi.", "en": "Statements being intercepted prior to mailing.", "cmt_tr": ". Müşteri hesap özetlerinin ele geçirilmesi sahte alacakları gösterebilir ancak yardımcı defter tutarsızlığına neden olmaz.", "cmt_en": ". Interception of customer statements might indicate fraudulent receivables but would not cause the subsidiary ledger discrepancy."}], "answer": 0}, {"q_tr": "Bir iç denetçi birkaç sevkiyatın faturalanmadığını belirlemiştir. Bu tür faturalama eksikliklerinin tekrarını önlemek için kuruluş ne yapmalıdır?", "q_en": "An internal auditor noted that several shipments were not billed. To prevent recurrence of such nonbilling, the organization should", "options": [{"tr": "Satış yevmiye kayıtları yapılırken tüm kontrol belgelerini (ambalaj fişleri ve sevk emirleri gibi) numaralandırmak ve bağımsız olarak hesaba katmak.", "en": "Numerically sequence and independently account for all controlling documents (such as packing slips and shipping orders) when sales journal entries are recorded.", "cmt_tr": ". Belgelerin sıralı numaralandırılması, işlemler üzerinde standart bir kontrol sağlar. Numara sırası bağımsız bir tarafça hesaba katılmalıdır. Başlıca amaç, kaydedilmemiş ve yetkisiz işlemleri tespit etmektir.", "cmt_en": ". The sequential numbering of documents provides a standard control over transactions. The numerical sequence should be accounted for by an independent party. A major objective is to detect unrecorded and unauthorized transactions."}, {"tr": "Verilen siparişlere ilişkin müşterilerle geçerlilik kontrolü yapmak.", "en": "Undertake a validity check with customers as to orders placed.", "cmt_tr": ". Bu kontrol kaydedilmemiş ve yetkisiz işlemleri önlemez veya tespit etmez.", "cmt_en": ". This check would not prevent or detect unrecorded and unauthorized transactions."}, {"tr": "Ürünü yalnızca kredi müdürü veya yetkili başka bir kişinin kredi onayı temelinde sevkiyata çıkarmak.", "en": "Release product for shipment only on the basis of credit approval by the credit manager or other authorized person.", "cmt_tr": ". Kredi onayı faturalamayı garanti etmez.", "cmt_en": ". Credit approval does not ensure billing."}, {"tr": "Ürün hattına göre brüt kâr marjı oranlarının periyodik testlerini yapmak ve planlanan oranlardan önemli sapmaların açıklamalarını almak.", "en": "Undertake periodic tests of gross margin rates by product line and obtain explanations of significant departures from planned rates.", "cmt_tr": ". Brüt kâr marjı oranlarının test edilmesi analitik bir prosedürdür, önleyici bir kontrol değildir.", "cmt_en": ". Testing gross margin rates is an analytical procedure, not a preventive control."}], "answer": 0}, {"q_tr": "Satın alma fonksiyonunun ön incelemesi şunları göstermektedir: • Departman müdürleri satın alma taleplerini başlatır ve bunlar fabrika müdürü tarafından onaylanmalıdır, • Satın alma siparişleri satın alma departmanı tarafından ön numaralı ve kontrollü formlar kullanılarak yazılır, • Alıcılar yeni tedarik kaynakları bulundukça resmi satıcı listesini düzenli olarak günceller, • Acil siparişler telefonla satıcıya verilebilir ancak teslimat kabul edilmeden önce yazılı bir satın alma siparişi takip etmelidir, • Satıcı faturası ödeme talepleri bir satın alma siparişi ve teslim alma raporuyla desteklenmelidir. Bu sistemin olası bir kusuru nedir?", "q_en": "A preliminary survey of the purchasing function indicates that • Department managers initiate purchase requests that must be approved by the plant superintendent, • Purchase orders are typed by the purchasing department using prenumbered and controlled forms, • Buyers regularly update the official vendor listing as new sources of supply become known, • Rush orders can be placed with a vendor by telephone but must be followed by a written purchase order before delivery can be accepted, and • Vendor invoice payment requests must be accompanied by a purchase order and receiving report. One possible fault of this system is that", "options": [{"tr": "Bir alıcı tarafından kontrol edilen satıcıdan normal fiyatlardan daha yüksek fiyatlarla satın alma yapılabilir.", "en": "Purchases could be made from a vendor controlled by a buyer at prices higher than normal.", "cmt_tr": ". Satın alma fonksiyonuna özgü tipik bir risk, alıcıların veya diğer çalışanların çıkar çatışması bulunan satıcılardan satın alma yapılmasıdır. Sonuç, aşırı fiyatlar veya miktarlar ya da satın alınan mal ve hizmetlerin düşük kalitesi olabilir. Bu nedenle, satıcı dosyasına eklemeler uygun bir düzeyde yetkilendirilmeli ve alıcılar tarafından yapılmamalıdır. Benzer şekilde, teklif veren listeleri amir personel tarafından onaylanmalıdır.", "cmt_en": ". A risk exposure typical of the purchasing function is that purchases may be made from vendors with respect to whom buyers or other employees have a conflict of interest. The result may be excessive prices or amounts, or poor quality of goods and services acquired. Accordingly, additions to the vendor file should be authorized at an appropriate level and not by the buyers. Similarly, bidders’ lists should be approved by supervisory personnel."}, {"tr": "Departman müdürleri tarafından gereksiz malzemeler satın alınabilir.", "en": "Unnecessary supplies can be purchased by department managers.", "cmt_tr": ". Fabrika müdürü tarafından onaylanmış yazılı satın alma siparişi gerekliliği, gereksiz satın almaları önlemek için yeterli bir kontroldür.", "cmt_en": ". The requirement of a written purchase order approved by the plant superintendent is a satisfactory control to prevent unnecessary purchases."}, {"tr": "Teslim alınmamış malzemeler için ödeme yapılabilir.", "en": "Payment can be made for supplies not received.", "cmt_tr": ". Teslim alma raporu olmadan ödeme yapılmaz.", "cmt_en": ". Payment is not made without a receiving report."}, {"tr": "Satın alma departmanı tarafından sipariş edilmemiş ancak teslim alınmış malzemeler için ödeme yapılabilir.", "en": "Payment can be made for supplies received but not ordered by the purchasing department.", "cmt_tr": ". Ödeme talepleri onaylanmış bir satın alma siparişiyle desteklenmelidir.", "cmt_en": ". Payment requests must be supported by an approved purchase order."}], "answer": 0}, {"q_tr": "Yönetim, bordroda yetkisiz değişiklik potansiyeli konusunda endişelidir. Aşağıdakilerden hangisi bu tür yetkisiz değişiklikleri önlemek için uygun organizasyon yapısıdır?", "q_en": "Management is concerned with the potential for unauthorized changes in the payroll. Which of the following is the proper organizational structure to prevent such unauthorized changes?", "options": [{"tr": "Bordro departmanı, personel kayıtlarındaki tüm değişiklikleri tutar ve yetkilendirir.", "en": "The payroll department maintains and authorizes all changes in the personnel records.", "cmt_tr": ". Personel departmanı bu fonksiyonlardan sorumlu olmalıdır.", "cmt_en": ". The personnel department should be responsible for these functions."}, {"tr": "Bordro departmanı, insan kaynakları bölümü yönetimi tarafından denetlenir.", "en": "The payroll department is supervised by the management of the human resources division.", "cmt_tr": ". Bordro ve personel departmanları bağımsız olmalıdır.", "cmt_en": ". The payroll and personnel departments should be independent."}, {"tr": "Bordro departmanının fonksiyonları bordro kayıtlarını tutmak, maaş çeklerini dağıtmak ve bordro kayıtlarını defteri kebire aktarmakla sınırlıdır.", "en": "The payroll department’s functions are limited to maintaining the payroll records, distributing paychecks, and posting the payroll entries to the general ledger.", "cmt_tr": ". Bordro departmanı bordro kayıtlarını defteri kebire aktarmamalı veya maaş çeklerini dağıtmamalıdır. Bu fonksiyonlar sırasıyla muhasebe departmanının ve mali işler müdürlüğünün sorumluluğundadır.", "cmt_en": ". The payroll department should not post the payroll entries to the general ledger or distribute the paychecks. These functions are the responsibility of the accounting department and the chief financial officer’s office, respectively."}, {"tr": "Personel departmanı tüm çalışanların işe alınmasını ve ücret düzeylerini yetkilendirir.", "en": "The personnel department authorizes the hiring and pay levels of all employees.", "cmt_tr": ". Bordro departmanı bordro bilgilerini toplamaktan (kayıt tutma) sorumludur. Personel departmanı, işe alma, işten çıkarma ve ücret oranları ile kesinti değişiklikleri gibi çalışan işlemlerini yetkilendirmek ve yürütmekten sorumludur. Bu fonksiyonların ayrılması hilenin önlenmesine yardımcı olur. Bu nedenle, her dönemin bordrosu personel departmanının aktif istihdam dosyalarıyla karşılaştırılmalıdır.", "cmt_en": ". The payroll department is responsible for assembling payroll information (recordkeeping). The personnel department is responsible for authorizing and executing employee transactions such as hiring, firing, and changes in pay rates and deductions. Segregating these functions helps prevent fraud. Thus, the payroll for each period should be compared with the active employment files of the personnel department."}], "answer": 3}, {"q_tr": "Kasiyerin posta odasından havaleleri aldığı iyi tasarlanmış bir iç kontrol yapısında, kasiyer ne yapmamalıdır?", "q_en": "In a well-designed internal control structure in which the cashier receives remittances from the mail room, the cashier should not", "options": [{"tr": "Çekleri ciro etmek.", "en": "Endorse the checks.", "cmt_tr": ". Bu, kasiyerin birincil sorumluluğu olan saklama fonksiyonunun bir parçasıdır.", "cmt_en": ". It is a part of the custodial function, which is the primary responsibility of a cashier."}, {"tr": "Banka mevduat fişini hazırlamak.", "en": "Prepare the bank deposit slip.", "cmt_tr": ". Bu, kasiyerin birincil sorumluluğu olan saklama fonksiyonunun bir parçasıdır.", "cmt_en": ". It is a part of the custodial function, which is the primary responsibility of a cashier."}, {"tr": "Havaleleri günlük olarak yerel bankaya yatırmak.", "en": "Deposit remittances daily at a local bank.", "cmt_tr": ". Bu, kasiyerin birincil sorumluluğu olan saklama fonksiyonunun bir parçasıdır.", "cmt_en": ". It is a part of the custodial function, which is the primary responsibility of a cashier"}, {"tr": "Tahsilatları alacak hesapları yardımcı defter kartlarına kaydetmek.", "en": "Post the receipts to the accounts receivable subsidiary ledger cards.", "cmt_tr": ". Kasiyer, mali işler müdürünün yardımcısıdır ve bu nedenle varlık saklama fonksiyonunu yerine getirir. Saklama fonksiyonuna sahip kişilerin muhasebe kayıtlarına erişimi olmamalıdır. Kasiyerin tahsilatları alacak hesapları yardımcı defterine kaydetmesine izin verilseydi, defterleri sahteleyerek gizlenebilecek bir zimmete geçirme fırsatı doğardı.", "cmt_en": ". The cashier is an assistant to the chief financial officer and thus performs an asset custody function. Individuals with custodial functions should not have access to the accounting records. If the cashier were allowed to post the receipts to the accounts receivable subsidiary ledger, an opportunity for embezzlement would arise that could be concealed by falsifying the books."}], "answer": 3}, {"q_tr": "Aşağıdaki durumlardan hangisi alacak hesaplarında bir iç kontrol zayıflığını temsil eder?", "q_en": "Which one of the following situations represents an internal control weakness in accounts receivable?", "options": [{"tr": "İç denetçiler müşteri hesaplarını periyodik olarak teyit eder.", "en": "Internal auditors confirm customer accounts periodically.", "cmt_tr": ". Alacak hesaplarının periyodik teyidi bir iç kontrol güçlü yönüdür.", "cmt_en": ". Periodic confirmation of accounts receivable is an internal control strength."}, {"tr": "Gecikmiş hesaplar yalnızca satış müdürü tarafından gözden geçirilir.", "en": "Delinquent accounts are reviewed only by the sales manager.", "cmt_tr": ". Alacak hesapları üzerindeki iç kontrol, uygun görev ayrılığıyla başlar. Bu nedenle, varlık saklama fonksiyonunu yerine getiren kasiyer kayıt tutmayla ilgilenmemelidir. Hesaplar bir denetçi tarafından periyodik olarak teyit edilmeli ve gecikmiş hesaplar alacak hesapları bölüm başkanı ile kredi müdürü tarafından gözden geçirilmelidir. Müşteri hesap özetleri, kasiyer departmanı çalışanlarının erişimine izin verilmeden alacak hesapları departmanı tarafından aylık olarak postalanmalıdır. Satış müdürü gecikmiş hesapları gözden geçiren tek kişi olmamalıdır çünkü bir hesabı tahsil edilemez ilan etmemeye yönelik çıkarı olabilir.", "cmt_en": ". Internal control over accounts receivable begins with a proper segregation of duties. Thus, the cashier, who performs an asset custody function, should not be involved in recordkeeping. Accounts should be periodically confirmed by an auditor, and delinquent accounts should be reviewed by the head of accounts receivable and the credit manager. Customer statements should be mailed monthly by the accounts receivable department without allowing access to the statements by employees of the cashier’s department. The sales manager should not be the only person to review delinquent accounts because (s)he may have an interest in not declaring an account uncollectible."}, {"tr": "Kasiyerin müşteri kayıtlarına ve aylık hesap özetlerine erişimi engellenir.", "en": "The cashier is denied access to customers’ records and monthly statements.", "cmt_tr": ". Varlık saklama sorumluluğu olan bir çalışanın o varlığın kayıtlarına erişimi olmamalıdır.", "cmt_en": ". An employee with asset-custody responsibilities should not have access to records for that asset."}, {"tr": "Müşteri hesap özetleri alacak hesapları departmanı tarafından aylık olarak postalanır.", "en": "Customers’ statements are mailed monthly by the accounts receivable department.", "cmt_tr": ". Aylık hesap özetleri müşterilere hatalı faturalar veya eksik ödemeler hakkında şikâyet etme fırsatı verir.", "cmt_en": ". Monthly account statements give customers an opportunity to complain about incorrect billings or missing payments."}], "answer": 1}, {"q_tr": "Aşağıdaki durumlardan hangisi satın alma ve borçlar hesabı için iç kontrol güçlü yönünü temsil eder?", "q_en": "Which one of the following situations represents a strength of internal control for purchasing and accounts payable?", "options": [{"tr": "Ön numaralı teslim alma raporları rastgele düzenlenir.", "en": "Prenumbered receiving reports are issued randomly.", "cmt_tr": ". Ön numaralı teslim alma raporları sıralı olarak düzenlenmelidir. Sıralamada bir boşluk hatalı veya hileli bir işlemi gösterebilir.", "cmt_en": ". Prenumbered receiving reports should be issued sequentially. A gap in the sequence may indicate an erroneous or fraudulent transaction."}, {"tr": "Satıcı faturaları ödeme için onaylandıktan sonra satın alma departmanı ödeme fişleri düzenler.", "en": "After vendor invoices are approved for payment, the purchasing department issues payment vouchers.", "cmt_tr": ". Borçlar hesabı, onaylanmış bir satıcı faturasını destekleyici belgelerle (satın alma talebi, satın alma siparişi ve teslim alma raporu) eşleştirir. Doğrulamadan sonra, borçlar hesabı imzasız bir çek de dahil olmak üzere bir ödeme fişi düzenler.", "cmt_en": ". Accounts payable matches an approved vendor invoice with supporting documents (purchase requisition, purchase order, and receiving report). After verification, accounts payable issues a payment voucher, including an unsigned check."}, {"tr": "Eşleştirilmemiş teslim alma raporları yıllık bazda gözden geçirilir.", "en": "Unmatched receiving reports are reviewed on an annual basis.", "cmt_tr": ". Eşleştirilmemiş teslim alma raporlarının yıllık gözden geçirilmesi çok seyrek kalır. İç kontroldeki eksiklikleri gidermek için daha sık ilgi gereklidir.", "cmt_en": ". Annual review of unmatched receiving reports is too infrequent. More frequent attention is necessary to remedy deficiencies in internal control."}, {"tr": "Satıcı faturaları, bir yükümlülük kaydedilmeden önce satın alma siparişleri ve teslim alma raporlarıyla eşleştirilir.", "en": "Vendors’ invoices are matched against purchase orders and receiving reports before a liability is recorded.", "cmt_tr": ". Satıcının faturası ilgili satın alma siparişi ve teslim alma raporuyla eşleştirilmeden ödeme için bir fiş hazırlanmamalıdır. Bu prosedür, geçerli bir işlemin gerçekleştiğine ve tarafların fiyat ve miktar gibi koşullarda anlaştığına dair güvence sağlar.", "cmt_en": ". A voucher should not be prepared for payment until the vendor’s invoice has been matched against the corresponding purchase order and receiving report. This procedure provides assurance that a valid transaction has occurred and that the parties have agreed on the terms, such as price and quantity."}], "answer": 3}, {"q_tr": "Satın alma ve borçlar hesabını kontrol etmek için bir bilgi sistemi belirli kaynak belgeler içermelidir. Bir üretim kuruluşu için bu belgeler neleri içermelidir?", "q_en": "To control purchasing and accounts payable, an information system must include certain source documents. For a manufacturing organization, these documents should include", "options": [{"tr": "Satın alma siparişleri, teslim alma raporları ve satıcı faturaları.", "en": "Purchase orders, receiving reports, and vendor invoices.", "cmt_tr": ". Bir satın alma talebi de gereklidir.", "cmt_en": ". A purchase requisition is also needed."}, {"tr": "Teslim alma raporları ve satıcı faturaları.", "en": "Receiving reports and vendor invoices.", "cmt_tr": ". Bir satın alma siparişi ve talebi de gereklidir.", "cmt_en": ". A purchase order and requisition are also necessary."}, {"tr": "Satın alma talepleri, satın alma siparişleri, teslim alma raporları ve satıcı faturaları.", "en": "Purchase requisitions, purchase orders, receiving reports, and vendor invoices.", "cmt_tr": ". Bir ürün sipariş etmeden önce, satın alma departmanı elinde kullanıcı departman tarafından yetkilendirilmiş bir talebi yansıtan satın alma talebi bulundurmalıdır. Fatura ödemesi için bir fiş hazırlanmadan önce, borçlar hesabı departmanı elinde satın alma talebi, satın alma siparişi (ürünlerin gerçekten sipariş edildiğinden emin olmak için), satıcı faturası ve teslim alma raporu (ürünlerin teslim alındığından emin olmak için) bulundurmalıdır.", "cmt_en": ". Before ordering an item, the purchasing department should have on hand a purchase requisition reflecting an authorized request by a user department. Before a voucher is prepared for paying an invoice, the accounts payable department should have the purchase requisition, a purchase order (to be certain the items were indeed ordered), the vendor’s invoice, and a receiving report (to be certain the items were received)."}, {"tr": "Satın alma talepleri, satın alma siparişleri, ihtiyaç duyulan malların stok raporları ve satıcı faturaları.", "en": "Purchase requisitions, purchase orders, inventory reports of goods needed, and vendor invoices.", "cmt_tr": ". Bir teslim alma raporu gereklidir.", "cmt_en": ". A receiving report is needed."}], "answer": 2}, {"q_tr": "Denetçiler iç kontrol hakkındaki anlayışlarını soru formları, akış şemaları ve açıklayıcı anlatımlarla belgeler. Soru formu, denetçilerin hataları ve hileyi önlemek veya tespit etmek için gerekli gördüğü kontrollere ilişkin bir dizi sorudan oluşur. Harcama (satın alma-borçlar) döngüsünün eksiksizliğine ilişkin denetçilerin anlayışına katkıda bulunmak üzere tasarlanmış en uygun soru hangisidir?", "q_en": "Auditors document their understanding of internal control with questionnaires, flowcharts, and narrative descriptions. A questionnaire consists of a series of questions concerning controls that auditors consider necessary to prevent or detect errors and fraud. The most appropriate question designed to contribute to the auditors’ understanding of the completeness of the expenditure (purchases-payables) cycle concerns the", "options": [{"tr": "Satış faturalarının miktarlar, fiyatlar ve matematiksel doğruluk açısından iç doğrulaması.", "en": "Internal verification of quantities, prices, and mathematical accuracy of sales invoices.", "cmt_tr": ". Satış faturalarının uygun tutarlarının belirlenmesi değerleme iddiasıyla ilgilidir. Ayrıca satış faturaları satış-alacak (gelir) döngüsünün bir parçasıdır.", "cmt_en": ". Determination of proper amounts of sales invoices concerns the valuation assertion. Also, sales invoices are part of the sales-receivables (revenue) cycle."}, {"tr": "Ön numaralı çeklerin kullanımı ve hesaba katılması.", "en": "Use and accountability of prenumbered checks.", "cmt_tr": ". Eksiksizlik iddiası, mali tablolarda sunulması gereken tüm işlemlerin ve hesapların sunulup sunulmadığıyla ilgilidir. Sıralı numaralı belgelerin münhasır kullanımı harcamalar üzerinde kontrolü kolaylaştırır. Sıralamada açıklanamayan bir boşluk, denetçiyi tüm işlemlerin kaydedilmemiş olabileceği konusunda uyarır. Ön numaralı çek kullanılmaması dolayısıyla kontrol riski değerlendirmesinin yükseltilmesini önerir. Şirket ön numaralı çek kullanıyorsa, bir dönemde hangi çeklerin kullanıldığını belirlemek kolay olmalıdır.", "cmt_en": ". A completeness assertion relates to whether all transactions and accounts that should be presented in the financial statements are so presented. The exclusive use of sequentially numbered documents facilitates control over expenditures. An unexplained gap in the sequence alerts the auditor to the possibility that not all transactions have been recorded. A failure to use prenumbered checks would therefore suggest a higher assessment of control risk. If a company uses prenumbered checks, it should be easy to determine exactly which checks were used during a period."}, {"tr": "Nakit tahsilatların kullanımı.", "en": "Disposition of cash receipts.", "cmt_tr": ". Nakit tahsilatlar gelir döngüsünün bir parçasıdır.", "cmt_en": ". Cash receipts are part of the revenue cycle."}, {"tr": "Muhasebe personelinin nitelikleri.", "en": "Qualifications of accounting personnel.", "cmt_tr": ". Muhasebe personelinin niteliklerinin değerlendirilmesi, herhangi bir döngünün eksiksizliğine ilişkin bir kontrol testi değildir. Bu prosedür kontrol ortamının değerlendirilmesi sırasında uygundur.", "cmt_en": ". Consideration of the qualifications of accounting personnel is not a test of controls over the completeness of any cycle. This procedure is appropriate during the consideration of the control environment."}], "answer": 1}, {"q_tr": "Malzeme ve sarf malzemesi satın alımının başlatılması hangi departmanın sorumluluğundadır?", "q_en": "The initiation of the purchase of materials and supplies would be the responsibility of the", "options": [{"tr": "Satın alma departmanı.", "en": "Purchasing department.", "cmt_tr": ". Satın alma departmanı, başkaları tarafından başlatılan ve yetkilendirilen siparişleri verir.", "cmt_en": ". The purchasing department places orders that have been initiated and authorized by others."}, {"tr": "Depo kontrol departmanı.", "en": "Stores control department.", "cmt_tr": ". Depo kontrol departmanı malzemelerin saklanmasından sorumludur; stok kayıtlarını tutmaz.", "cmt_en": ". The stores control department has custody of materials; it does not maintain inventory records."}, {"tr": "Stok kontrol departmanı.", "en": "Inventory control department.", "cmt_tr": ". Stok kontrol departmanı bir satın alımı başlatmaktan sorumlu olacaktır. Stok kayıtlarına erişimi vardır ve bu nedenle stokların azaldığını bilir.", "cmt_en": ". The inventory control department would be responsible for initiating a purchase. It has access to the inventory records and would therefore know when stocks were getting low."}, {"tr": "Üretim departmanı.", "en": "Production department.", "cmt_tr": ". Üretim departmanı mal üretir ve malzemeleri depo kontrolünden temin eder.", "cmt_en": ". The production department manufactures goods and obtains materials from stores control."}], "answer": 2}, {"q_tr": "Satın alma siparişinin birden fazla kopyası kayıt tutma ve dağıtım amacıyla hazırlanır; bir kopyası satıcıya gönderilir, biri satın alma departmanında kalır. Ayrıca, uygun bilgi akışı ve iç kontrol amaçlarıyla satın alma siparişinin bir versiyonu hangi departmanlara dağıtılmalıdır?", "q_en": "Multiple copies of the purchase order are prepared for recordkeeping and distribution with a copy of the purchase order sent to the vendor and one retained by the purchasing department. In addition, for proper informational flow and internal control purposes, a version of the purchase order would be distributed to the", "options": [{"tr": "Borçlar hesabı, teslim alma ve depo kontrol departmanları.", "en": "Accounts payable, receiving, and stores control departments.", "cmt_tr": ". Depo kontrol departmanının bir satın alma başlatıldığını bilmesine gerek yoktur.", "cmt_en": ". The stores control department does not need to know that a purchase has been initiated."}, {"tr": "Borçlar hesabı, teslim alma ve stok kontrol departmanları.", "en": "Accounts payable, receiving, and inventory control departments.", "cmt_tr": ". Borçlar hesabı departmanı, iç kontrol amacıyla ödenen tüm faturaların uygun şekilde yetkilendirilmiş kalemler için olmasını sağlamak üzere satın alma siparişinin bir kopyasını almalıdır. Teslim alma departmanı, gelen sevkiyatların yetkilendirilmiş olduğunu ve kabul edilmesi gerektiğini bilmesi için bir kopyasını (dürüst bir sayımı teşvik etmek için miktar çıkarılmış olarak) almalıdır. Ayrıca, satın alma talebini düzenleyen departman (stok kontrol departmanı) siparişin verildiğine dair bildirim olarak bir kopya almalıdır.", "cmt_en": ". The accounts payable department should receive a copy of the purchase order for internal control purposes to ensure that all invoices paid are for properly authorized items. The receiving department should receive a copy (with the quantity omitted to encourage an honest count) so that its employees will know that incoming shipments were authorized and should be accepted. In addition, the department issuing the purchasing requisition (the inventory control department) should receive a copy as a notification that the order has been placed."}, {"tr": "Borçlar hesabı, alacak hesapları ve teslim alma departmanları.", "en": "Accounts payable, accounts receivable, and receiving departments.", "cmt_tr": ". Alacak hesapları departmanının bir kopyaya ihtiyacı yoktur.", "cmt_en": ". The accounts receivable department does not need a copy."}, {"tr": "Borçlar hesabı, teslim alma ve üretim planlama departmanları.", "en": "Accounts payable, receiving, and production planning departments.", "cmt_tr": ". Üretim planlama departmanının bir kopyaya ihtiyacı yoktur.", "cmt_en": ". The production planning department does not need a copy."}], "answer": 1}, {"q_tr": "Bordro işlemesinde organizasyonel bağımsızlık, sisteme yerleştirilmiş fonksiyon ayrılıklarıyla sağlanır. Aşağıdaki fonksiyonel ayrılıklardan hangisi iç kontrol amaçları için gereksizdir?", "q_en": "Organizational independence in the processing of payroll is achieved by segregation of functions that are built into the system. Which one of the following functional segregations is unnecessary for internal control purposes?", "options": [{"tr": "Zaman takibinin bordro hazırlığından ayrılması.", "en": "Segregation of timekeeping from payroll preparation.", "cmt_tr": ". Zaman takibi ve bordro hazırlığının ayrılması etkili bir kontroldür. Bir kişinin bir çalışanın belirli saatler çalıştığını iddia etmesini ve ardından o çalışana çek yazmasını önler. Devamsız veya hayali bir çalışana ödeme bu nedenle iki çalışan arasında gizli anlaşma gerektirir.", "cmt_en": ". Segregating timekeeping and payroll preparation is an effective control. It prevents one person from claiming that an employee worked certain hours and then writing a check to that employee. Payment to an absent or fictitious employee therefore requires collusion between two employees."}, {"tr": "Personel fonksiyonunun bordro hazırlığından ayrılması.", "en": "Segregation of personnel function from payroll preparation.", "cmt_tr": ". Personel, bordrodan ayrı olmalıdır. Personel, bordronun hesaplanmasını yetkilendirir.", "cmt_en": ". Personnel should be separate from payroll. The former authorizes the calculation of the payroll by the latter."}, {"tr": "Bordro hazırlığı ile maaş çeki dağıtımının ayrılması.", "en": "Segregation of payroll preparation and paycheck distribution.", "cmt_tr": ". Maaş çeki hazırlığının dağıtımdan ayrılması, hayali çalışanlara çek düzenlenmesini zorlaştırır.", "cmt_en": ". Segregating paycheck preparation from distribution makes it more difficult for checks to be made out to fictitious employees."}, {"tr": "Bordro hazırlığı ile yıl sonu kümülatif kayıtların tutulmasının ayrılması.", "en": "Segregation of payroll preparation and maintenance of year-to-date records.", "cmt_tr": ". Çoğu şirkette bordrolar, yıl sonu kümülatif kayıtları tutan aynı kişiler tarafından hazırlanır. Bu fonksiyon ayrılığı gereksizdir çünkü her iki görev de kayıt tutmayı içerir.", "cmt_en": ". Most companies have their payrolls prepared by the same individuals who maintain the year-to- date records. This segregation of functions is unnecessary because both duties involve recordkeeping."}], "answer": 3}, {"q_tr": "Çalışan maaş çekleri elden dağıtılıyorsa, teslim alınmamış maaş çeklerinin saklanmasından hangi departman sorumlu olmalıdır?", "q_en": "If employee paychecks are distributed by hand to employees, which one of the following departments should be responsible for the safekeeping of unclaimed paychecks?", "options": [{"tr": "Bordro departmanı.", "en": "Payroll department.", "cmt_tr": ". Bordro departmanı çekin yazılmasına neden olmuştur.", "cmt_en": ". The payroll department was responsible for causing the check to be written."}, {"tr": "Zaman takip departmanı.", "en": "Timekeeping department.", "cmt_tr": ". Zaman takip departmanı belirli sayıda çalışılan saate göre ödemeyi yetkilendirmiştir.", "cmt_en": ". The timekeeping department authorized payment based on a certain number of hours worked."}, {"tr": "Çalışanın çalıştığı veya çalışmış olduğu üretim departmanı.", "en": "Production department in which the employee works or worked.", "cmt_tr": ". Bir üretim amiri veya meslektaş, hayali veya işten ayrılmış bir çalışanın çekini ele geçirme fırsatına sahiptir.", "cmt_en": ". A production supervisor or fellow worker has an opportunity to intercept the check of a fictitious or terminated employee."}, {"tr": "Kasa departmanı.", "en": "Cashier department.", "cmt_tr": ". Teslim alınmamış maaş çeklerinin sorumluluğu, bu çekleri yetkilendirme veya yazma fırsatı olmayan bir departmana verilmelidir. Hazine fonksiyonu (bu durumda kasa departmanı) yalnızca varlık saklama fonksiyonuna hizmet ettiğinden ve dolayısıyla maaş çeki sürecine hiçbir girdisi olmadığından, teslim alınmamış çeklerin mantıksal saklama yeridir.", "cmt_en": ". The responsibility for unclaimed paychecks should be given to a department that has no opportunity to authorize or write those checks. Because the treasury function (the cashier department in this case) serves only an asset custody function and thus has had no input into the paycheck process, it is the logical repository of unclaimed checks."}], "answer": 3}, {"q_tr": "Müşteri siparişlerinin işlenmesinde iç kontrol yapısını korumak için organizasyonel bağımsızlık gereklidir. Aşağıdaki durumlardan hangisi müşteri siparişlerinin işlenmesinde görev ayrılığı ilkesinin ihlalidir?", "q_en": "Organizational independence is required in the processing of customers’ orders in order to maintain an internal control structure. Which one of the following situations is a violation of the principle of the segregation of duties in the processing of orders from customers?", "options": [{"tr": "Satış departmanı tarafından hazırlanan bir satış siparişinin kredi departmanı tarafından onaylanması.", "en": "Approval by credit department of a sales order prepared by the sales department.", "cmt_tr": ". Satış siparişinin meşru, kredi değerliliği olan bir müşteri için olmasını sağlamak kredi departmanının fonksiyonudur.", "cmt_en": ". Ensuring that a sales order is for a legitimate, creditworthy customer is a function of the credit department."}, {"tr": "Mamul stok deposu departmanı tarafından stoktan çıkarılan malların sevkiyat departmanı tarafından sevk edilmesi.", "en": "Shipping of goods by the shipping department that have been retrieved from stock by the finished goods storeroom department.", "cmt_tr": ". Uygun görev ayrılığını korumak için mallar depo departmanı tarafından hazırlanmalı ve sevkiyat departmanı tarafından sevk edilmelidir.", "cmt_en": ". To maintain proper segregation of functions, goods should be pulled by the storeroom department and shipped by the shipping department."}, {"tr": "Faturalama departmanı tarafından fatura hazırlanması ve alacak hesapları departmanı tarafından müşteri hesaplarına kayıt yapılması.", "en": "Invoice preparation by the billing department and posting to customers’ accounts by the accounts receivable department.", "cmt_tr": ". Fatura hazırlama ve hesap güncelleme iki farklı departman tarafından yapılmalıdır.", "cmt_en": ". Invoice preparation and account updating should be performed by two different departments."}, {"tr": "Ürün iadesi nedeniyle satış departmanı tarafından satış alacak dekontunun onaylanması ve ardından alacak hesapları departmanı tarafından müşteri hesabına kayıt yapılması.", "en": "Approval by the sales department of a sales credit memo because of a product return with subsequent posting to the customer’s account by the accounts receivable department.", "cmt_tr": ". Satış iadeleri (ve indirimleri) üzerindeki temel kontroller şunlardır: (1) iadenin satış tarafından onaylanması, (2) malların teslim alınması için teslim alma raporu hazırlanması ve (3) alacak dekontunun (iade yapan tarafın hesabının alacaklandırılması) ayrı ve bağımsız olarak onaylanması. Satış departmanı çalışanının teslim alma raporu olmadan alacak dekontunu onaylamasına izin vermek kabul edilemez derecede risklidir. Satış personeli bir dönemde satışları olduğundan fazla gösterebilir ve ardından sonraki dönemlerde tersine çevirebilir. Bu nedenle, iade edilen malların teslim alma raporunun bir kopyası, satıştan bağımsız sorumlu bir amirin onayından sonra alacak dekontunun hazırlanması için faturalama bölümüne gönderilmelidir.", "cmt_en": ". The key controls over sales returns (and allowances) include (1) approval of the return by sales, (2) preparation of a receiving report for receipt of the goods, and (3) separate independent approval of a credit memo (crediting the account of the party returning goods). Allowing a sales department employee to approve a credit memo without a receiving report is unacceptably risky. Sales personnel could overstate sales in one period and then reverse them in subsequent periods. Thus, a copy of the receiving report for returned goods should be sent to billing for preparation of a credit memo after approval by a responsible supervisor who is independent of sales."}], "answer": 3}, {"q_tr": "Aşağıdaki kontrol prosedürlerinden hangisi, tüm bağışların bir kâr amacı gütmeyen kuruluşun hesabına derhal yatırılmasına ilişkin en büyük güvenceyi sağlar?", "q_en": "Which of the following control procedures provides the greatest assurance that all donations to a not-for-profit organization are immediately deposited in its account?", "options": [{"tr": "Tüm bağışları almak için kilit kutu sistemi kullanmak.", "en": "Use a lockbox to receive all donations.", "cmt_tr": ". Kilit kutu sistemi fonların alınmasını hızlandırır ve nakit tahsilatlar üzerinde etkili kontrol sağlar. Bağışçılar ödemelerini, genellikle çok sayıda lokasyonda bulunan ve bir banka tarafından günde birkaç kez kontrol edilen kilit kutulara gönderir. Böylece ödemeler, kuruluşun muhasebe sistemi tarafından işlenmeden önce yatırılır.", "cmt_en": ". A lockbox system expedites receipt of funds and provides effective control over cash receipts. Donors send their payments to lockboxes, often in numerous locations, that are checked by a bank several times a day. Thus, payments are deposited before being processed by the organization’s accounting system."}, {"tr": "Kuruluşun nakit tahsilatlarını, mevduatları nakit tahsilat kayıtlarındaki orijinal kayda izleyerek periyodik olarak gözden geçirmek.", "en": "Perform periodic reviews of the organization’s cash receipts by tracing deposits to the original posting in the cash receipts records.", "cmt_tr": ". Mevduatları nakit tahsilat kayıtlarındaki orijinal kayda izlemek yalnızca yapılan mevduatlara odaklanır. Endişe, nakit tahsilatların yatırılmamış olabileceğidir.", "cmt_en": ". Tracing deposits to the original posting in the cash receipts records focuses only on deposits that were made. The concern is that cash receipts might not have been deposited."}, {"tr": "Tüm bağışların çekle yapılmasını zorunlu kılmak.", "en": "Require that all donations be made by check.", "cmt_tr": ". Bağışın çekle yapılması, çekin borç veya yükümlülük yerine bağış olarak muhasebeleştirilmesini garanti etmez. Ayrıca, tüm bağışların çek şeklinde olması gerekliliği, çeklerin derhal yatırılacağına dair güvence sağlamaz.", "cmt_en": ". The fact that a donation is made by check does not ensure the check is accounted for as a donation rather than a debt or liability. Also, a requirement for all donations to be in the form of a check does not provide assurance that checks will be deposited immediately."}, {"tr": "Tüm bağışçılara teyit makbuzu düzenlenmesini gerektirmek; makbuz, nakit tahsilatları açan ve yatıran kişi tarafından düzenlenir.", "en": "Require issuance of a confirmation receipt to all donors, with the receipt issued by the person who opens and deposits the cash receipts.", "cmt_tr": ". Aynı kişi hem nakit tahsilatlardan hem de teyitlerden sorumlu olmamalıdır. Kişi, tahsilatlar başka yöne sevk edilmiş olsa bile tahsilatları teyit edebilir.", "cmt_en": ". The same person should not be responsible for the cash receipts and the confirmations. The person could confirm receipts even if they were diverted."}], "answer": 0}, {"q_tr": "Her bordro döngüsünde işlenen bordro değişikliklerinin düzenleme listesinin gözden geçirilmesi aşağıdakilerden hangisini tespit etme olasılığı en yüksektir?", "q_en": "Reviewing an edit listing of payroll changes processed during each payroll cycle is most likely to detect", "options": [{"tr": "Maliyet raporlama sisteminde yanlış hesaba yüklenen işçilik saatleri.", "en": "Labor hours charged to the wrong account in the cost reporting system.", "cmt_tr": ". İşçilik saatlerinin yanlış hesaba yüklenmesi, bordro bilgilerinde bir değişikliği (düzenlemeyi) içermez.", "cmt_en": ". Charging labor hours to the wrong account does not involve a change in (edit of) payroll information."}, {"tr": "Hatalı bordro kesintileri.", "en": "Inaccurate payroll deductions.", "cmt_tr": ". Hatalı bordro kesintileri, bordro bilgilerinde bir değişikliği (düzenlemeyi) içermez.", "cmt_en": ". Inaccurate payroll deductions do not involve a change in (edit of) payroll information."}, {"tr": "Yeni çalışanların bordro oranlarındaki tespit edilmemiş hatalar.", "en": "Undetected errors in the payroll rates of new employees.", "cmt_tr": ". Yeni çalışan gibi bir kategori, bordro bilgilerinde bir değişiklik oluşturmalıdır ve bu nedenle tespit edilmelidir.", "cmt_en": ". A category such as new employee should generate a change in payroll information and therefore should be detected."}, {"tr": "Çalışanlara emeklilik planına katkıda bulunma fırsatı sunulmaması.", "en": "A failure to offer employees an opportunity to contribute to their pension plan.", "cmt_tr": ". Çalışanlara emeklilik planına katkıda bulunma fırsatı sunulmaması, bordro bilgilerinde bir değişikliği (düzenlemeyi) içermez.", "cmt_en": ". A failure to offer employees an opportunity to contribute to their pension plan does not involve a change in (edit of) payroll information."}], "answer": 2}, {"q_tr": "Bir bordro denetim hedefi, çalışanların bordro defterinde kaydedilen tutarlarda ücret alıp almadığını belirlemektir. Bu hedefi karşılamak için denetçi ne yapmalıdır?", "q_en": "One payroll audit objective is to determine whether the employees received pay in amounts recorded in the payroll journal. To satisfy this objective, the auditor should", "options": [{"tr": "Bordro banka hesabını mutabık kılmak.", "en": "Reconcile the payroll bank account.", "cmt_tr": ". Bordro banka hesabının mutabakatı bordro denetim planının parçası olmalıdır, ancak çalışanların aldığı tutarların bordro yevmiye kayıtlarıyla uyumunu test etmez.", "cmt_en": ". Reconciling the payroll bank account should be part of the audit plan for payroll, but it does not test the agreement of amounts received by employees with the payroll journal entries."}, {"tr": "Bir şirket yetkilisinin tüm maaş çeklerini dağıtmasını istemek.", "en": "Request that a company official distribute all paychecks.", "cmt_tr": ". Bir şirket yetkilisi tüm maaş çeklerini dağıtmalıdır, ancak bu prosedür çalışanların aldığı tutarların bordro yevmiye kayıtlarıyla uyumunu garanti etmez.", "cmt_en": ". A company official should distribute all paychecks, but this procedure does not ensure the agreement of amounts received by employees with the payroll journal entries."}, {"tr": "Bordronun kaydedilmesi ile bordro banka hesabının mutabakatı arasında uygun görev ayrılığının olup olmadığını belirlemek.", "en": "Determine whether a proper segregation of duties exists between recording payroll and reconciling the payroll bank account.", "cmt_tr": ". Bordronun kaydedilmesi ile bordro banka hesabının mutabakatı arasında uygun görev ayrılığının olup olmadığını belirlemek bordro denetim planının parçası olmalıdır, ancak çalışanların aldığı tutarların bordro yevmiye kayıtlarıyla uyumunu test etmez.", "cmt_en": ". Determining whether a proper segregation of duties exists between recording payroll and reconciling the payroll bank account should be part of the audit plan for payroll, but it does not test the agreement of amounts received by employees with the payroll journal entries."}, {"tr": "İptal edilen bordro çeklerini bordro yevmiye defteriyle karşılaştırmak.", "en": "Compare canceled payroll checks with the payroll journal.", "cmt_tr": ". Bordro yevmiye defterinin doğruluğunu test etmek için denetçi, kayıtlardan bir örneklem alıp destekleyici belgelere, yani iptal edilen çeklere, zaman takip bilgilerine ve ücret oranları ile yetkilendirilmiş kesinti kayıtlarına doğrulamalıdır.", "cmt_en": ". To test the accuracy of the payroll journal, the auditor should vouch a sample of the entries to supporting documents, i.e., the canceled checks, timekeeping information, and records of wage rates and authorized deductions."}], "answer": 3}, {"q_tr": "İç kontrol anlatımı, mal ödemesi için her çek talebini desteklemek üzere onaylanmış bir ödeme fişinin gerekli olduğunu belirtmektedir. Aşağıdaki denetim prosedürlerinden hangisi bu kontrolün etkili bir şekilde çalıştığına ilişkin en büyük güvenceyi sağlar?", "q_en": "An internal control narrative indicates that an approved voucher is required to support every check request for payment of merchandise. Which of the following audit procedures provides the greatest assurance that this control is operating effectively?", "options": [{"tr": "Ödeme fişlerini seçip incelemek ve ilgili iptal edilmiş çeklerin ödeme fişlerinden sonra tarihli olmadığını doğrulamak.", "en": "Select and examine vouchers and ascertain that the related canceled checks are dated no later than the vouchers.", "cmt_tr": ". Ödeme fişlerinden iptal edilmiş çeklere izlemek, tüm çeklerin onaylanmış ödeme fişleriyle desteklendiğine dair güvence vermez. Bu test, onaylanmış ödeme fişleriyle desteklenmeyen iptal edilmiş çekleri tespit etmez, ancak ilgili belgelerin tarihlerinin karşılaştırılmasına izin verir.", "cmt_en": ". Tracing from vouchers to canceled checks does not give assurance that all checks are supported by approved vouchers. This test will not detect canceled checks unsupported by approved vouchers, although it will permit comparison of the dates of the respective documents."}, {"tr": "Ödeme fişlerini seçip incelemek ve ilgili iptal edilmiş çeklerin ödeme fişlerinden önce tarihli olmadığını doğrulamak.", "en": "Select and examine vouchers and ascertain that the related canceled checks are dated no earlier than the vouchers.", "cmt_tr": ". Ödeme fişlerinden iptal edilmiş çeklere izlemek, tüm çeklerin onaylanmış ödeme fişleriyle desteklendiğine dair güvence vermez. Bu test, onaylanmış ödeme fişleriyle desteklenmeyen iptal edilmiş çekleri tespit etmez, ancak ilgili belgelerin tarihlerinin karşılaştırılmasına izin verir.", "cmt_en": ". Tracing from vouchers to canceled checks does not give assurance that all checks are supported by approved vouchers. This test will not detect canceled checks unsupported by approved vouchers, although it will permit comparison of the dates of the respective documents."}, {"tr": "İptal edilmiş çekleri seçip incelemek ve ilgili ödeme fişlerinin çeklerden önce tarihli olmadığını doğrulamak.", "en": "Select and examine canceled checks and ascertain that the related vouchers are dated no earlier than the checks.", "cmt_tr": ". Çekler ödeme fişlerinden önce tarihli olmamalıdır. Her ödeme fişi, ilgili çekten daha önceki bir tarihe sahip olmalıdır (veya aynı tarihe).", "cmt_en": ". The checks should be dated no earlier than the vouchers. Each voucher should be dated earlier than (or have the same date as) the related check."}, {"tr": "İptal edilmiş çekleri seçip incelemek ve ilgili ödeme fişlerinin çeklerden sonra tarihli olmadığını doğrulamak.", "en": "Select and examine canceled checks and ascertain that the related vouchers are dated no later than the checks.", "cmt_tr": ". Gerekli onayları taşıyan ödeme fişleri şunlarla desteklenmelidir: (1) uygun şekilde yetkilendirilmiş satın alma talebi, (2) işlemi gerçekleştiren satın alma siparişi, (3) sipariş edilen tüm malların iyi durumda teslim alındığını gösteren teslim alma raporu ve (4) borçlu olunan tutarı doğrulayan satıcı faturası. Çek taleplerinin geçerli olduğunu belirlemek için uygun denetim prosedürü bu nedenle çekleri ilgili ödeme fişleriyle karşılaştırmaktır. Test yönü çek örnekleminden onaylanmış ödeme fişlerine olmalıdır. Ödeme fişinin tarihi ilgili çekin tarihinden sonra ise, çek uygun destek olmadan düzenlenmiş olabilir.", "cmt_en": ". Payment vouchers bearing the required approvals should be supported by (1) a properly authorized purchase requisition, (2) a purchase order executing the transaction, (3) a receiving report indicating all goods ordered have been received in good condition, and (4) a vendor invoice confirming the amount owed. To determine that check requests are valid, the appropriate audit procedure is therefore to compare checks and the related vouchers. The direction of testing should be from a sample of checks to the approved vouchers. If the date of a voucher is later than the date of the related check, the check may have been issued without proper support."}], "answer": 3}, {"q_tr": "İç denetçi, bir kişinin alacakları tahsil etme, mevduat yapma, alacak dekontları düzenleme ve ödeme tahsilatlarını kaydetme yeteneğine sahip olduğunu tespit eder. İç denetçi, bireyin nakit tahsilatlardan çaldığından şüphelenmektedir. Aşağıdaki denetim prosedürlerinden hangisi bu senaryoda hileyi keşfetmede en etkili olacaktır?", "q_en": "The internal auditor finds that one person has the ability to collect receivables, make deposits, issue credit memos, and record receipt of payments. The internal auditor suspects the individual may be stealing from cash receipts. Which of the following audit procedures will be most effective in discovering fraud in this scenario?", "options": [{"tr": "Rastgele seçilen müşterilere olumlu teyit göndermek.", "en": "Send positive confirmations to a random selection of customers.", "cmt_tr": ". Varlık saklama, yetkilendirme ve kayıt fonksiyonlarını yerine getiren bir çalışan, müşteri iskontolarını veya satış iadelerini borçlandırarak hırsızlığı gizleyebilir. Müşteri bakiyeleri beklentilerini yansıtacağından müşteriler bu faaliyetten haberdar olmazlar.", "cmt_en": ". An employee who performs asset custody, authorization, and recording functions can conceal the theft by debiting customer discounts or sales returns. Customers would be unaware of the activity because their balances would reflect their expectations."}, {"tr": "Tüm ödenmemiş alacak hesapları müşterilerine olumsuz teyit göndermek.", "en": "Send negative confirmations to all outstanding accounts receivable customers.", "cmt_tr": ". Varlık saklama, yetkilendirme ve kayıt fonksiyonlarını yerine getiren bir çalışan, müşteri iskontolarını veya satış iadelerini borçlandırarak hırsızlığı gizleyebilir. Müşteri bakiyeleri beklentilerini yansıtacağından müşteriler bu faaliyetten haberdar olmazlar.", "cmt_en": ". An employee who performs asset custody, authorization, and recording functions can conceal the theft by debiting customer discounts or sales returns. Customers would be unaware of the activity because their balances would reflect their expectations."}, {"tr": "Nakit tahsilat yevmiye defterine kaydedilen nakit hariç olmak üzere, müşteri iskontoları, satış iadeleri veya diğer borç hesaplarına yapılan borçlandırmaların ayrıntılı incelemesini yapmak.", "en": "Perform a detailed review of debits to customer discounts, sales returns, or other debit accounts, excluding cash posted to the cash receipts journal.", "cmt_tr": ". En etkili prosedür, müşteri iskontoları, satış iadeleri ve diğer borç hesaplarına yapılan borçlandırmaların ayrıntılı incelemesidir. Bu hesaplar, müşterileri uyarmadan nakit ödeme hırsızlığını gizlemek için kullanılabilir.", "cmt_en": ". The most effective procedure is to perform a detailed review of debits to customer discounts, sales returns, and other debit accounts. These accounts could be used to conceal a theft of cash payments without alerting customers."}, {"tr": "Banka mevduatlarından bir örneklem alarak her banka mevduatındaki ayrıntıyı nakit tahsilat yevmiye defterindeki kayda izlemek.", "en": "Take a sample of bank deposits and trace the detail in each bank deposit back to the entry in the cash receipts journal.", "cmt_tr": ". Banka mevduatları yevmiye kayıtlarıyla uyumlu olacaktır. Çalınan tutarlar hiçbir zaman kaydedilmez.", "cmt_en": ". Bank deposits will agree with journal entries. The stolen amounts are never recorded."}], "answer": 2}, {"q_tr": "Aşağıdaki faktörlerden hangisi bir kuruluşun kontrol riskini etkiler?", "q_en": "Which of the following factors affects the control risk of an organization?", "options": [{"tr": "Teknolojik eskime gibi potansiyel sorunlar.", "en": "Potential problems like technological obsolescence.", "cmt_tr": ". Yalnızca kontrol faaliyetleri kontrol riskini etkiler. Bir riskin tanımlanması bir kontrol faaliyeti değildir.", "cmt_en": ". Only control activities affect control risk. The identification of a risk is not a control activity."}, {"tr": "Yönetim üzerindeki olağandışı baskılar.", "en": "Unusual pressures on management.", "cmt_tr": ". Yönetim üzerindeki olağandışı baskılar kontrollerin yönetim tarafından geçersiz kılınmasına veya hileye yol açabilse de, baskıların varlığı tek başına kontrol riskini etkilemez.", "cmt_en": ". Although unusual pressures on management could result in management override of controls or fraud, the existence of pressures alone does not affect control risk."}, {"tr": "Uzman değerlemesi gerektiren karmaşık hesaplar.", "en": "Complex accounts that require expert valuations.", "cmt_tr": ". Uzman değerlemesi gerektiren karmaşık hesapların varlığı kontrol riskini etkilemez.", "cmt_en": ". The existence of complex accounts requiring expert valuations does not affect control risk."}, {"tr": "Görevlerin ayrılığı.", "en": "Segregation of duties.", "cmt_tr": ". Kontrol riski, kontrollerin kontrol edilebilir riskleri etkili bir şekilde yönetememe riskidir. Yaygın bir kontrol görevlerin ayrılığıdır. Örneğin, işlemlerin yetkilendirilmesi, kaydedilmesi ve varlıkların saklanması sorumluluklarını ayırır. Bu nedenle, görevlerin ayrılığı bir kuruluşun kontrol riskini etkiler.", "cmt_en": ". Control risk is the risk that controls fail to effectively manage controllable risks. A common control is segregation of duties. For example, it separates the responsibilities for authorization of transactions, recording of transactions, and custody of assets. Thus, segregation of duties affects the control risk of an organization."}], "answer": 3}, {"q_tr": "Bir iç denetçi, kuruluşun stok yönetim sistemindeki temel riskleri değerlendirmektedir. Stok tükenmesi riskini ele almada en etkili kontrol hangisidir?", "q_en": "An internal auditor is assessing key risks in an organization’s inventory management system. Which control is most effective in addressing the risk of stockouts?", "options": [{"tr": "Düzenli stok denetimleri ve mutabakatlar.", "en": "Regular inventory audits and reconciliations.", "cmt_tr": ". Denetimler tutarsızlıkları tespit edebilir, ancak stok tükenmesini önlemek için gereken gerçek zamanlı verileri sağlamaz.", "cmt_en": ". Audits may identify discrepancies, but they do not provide the real-time data needed to prevent stockouts."}, {"tr": "Sürekli stok sisteminin uygulanması.", "en": "Implementation of a perpetual inventory system.", "cmt_tr": ". Sürekli stok sistemi, stok seviyelerinin gerçek zamanlı güncellemelerini sağlar. Stok tükenmesi gerçekleşmeden önce zamanında yeniden sipariş verilmesini sağlayarak stok seviyelerinin talebi karşılamak için her zaman yeterli olmasını garanti eder. Bu sistem, stok seviyelerini sürekli izleyerek ve stok önceden belirlenmiş bir eşiğin altına düştüğünde otomatik yeniden sipariş bildirimleri üreterek daha iyi stok yönetimi sağlar.", "cmt_en": ". A perpetual inventory system provides real-time updates of inventory levels. It allows for prompt reordering before stockouts occur, thereby ensuring that stock levels are always sufficient to meet demand. This system enables better inventory management by continuously monitoring stock levels and generating automatic reorder notifications when inventory falls below a predefined threshold."}, {"tr": "Stok personeli için altı ayda bir eğitim düzenlemek.", "en": "Conducting semi-annual training for inventory staff.", "cmt_tr": ". Eğitim süreçlere uyumu iyileştirir ancak stok seviyelerini doğrudan yönetmez veya stok tükenmesi risklerini ele almaz.", "cmt_en": ". Training improves process adherence but does not directly manage inventory levels or address stockout risks."}, {"tr": "Geçmiş satış verilerine göre yeniden sipariş vermek.", "en": "Reordering based on historical sales data.", "cmt_tr": ". Geçmiş verilere güvenmek, mevcut talep eğilimlerini veya mevsimselliği dikkate almayabilir. Sonuç, yeniden sipariş ihtiyaçlarının yanlış hesaplanması olabilir.", "cmt_en": ". Relying on historical data may not consider current demand trends or seasonality. The result may be miscalculations of reordering needs."}], "answer": 1}], "SU2 - Management Controls": [{"q_tr": "Aşağıdakilerden hangisi düşük kaliteli hammaddelerden kaynaklanan mamul mal kusurlarını en aza indirir?", "q_en": "Which of the following would minimize defects in finished goods caused by poor quality raw materials?", "options": [{"tr": "Yarı mamul stokunun uygun şekilde taşınmasına ilişkin belgelenmiş prosedürler.", "en": "Documented procedures for the proper handling of work-in-process inventory.", "cmt_tr": ". Yarı mamul stokunun taşınmasına ilişkin belgelenmiş prosedürler, malzemelerin yeterli kalitede olmasını sağlamaz.", "cmt_en": ". Documented procedures for handling work-in-process inventory do not ensure that materials are of sufficient quality."}, {"tr": "Tüm satın almalar için zorunlu malzeme teknik şartnameleri.", "en": "Required material specifications for all purchases.", "cmt_tr": ". Bu durumda önleyici bir kontrol gereklidir, yani istenmeyen bir olayın gerçekleşmemesini sağlayan bir kontrol. Hedefe ulaşmanın en maliyet etkin yolu, düşük kaliteli hammaddelerin depoya girmesini en baştan engellemektir. Listelenen kontrollerden yalnızca zorunlu teknik şartnameler bunu başaracaktır.", "cmt_en": ". A preventive control is required in this situation, i.e., one that ensures an unwanted event does not take place. The most cost-effective way of achieving the goal is to keep poor quality raw materials from entering the warehouse to begin with. Of the controls listed, only required specifications will accomplish this."}, {"tr": "Tüm olumsuz kullanım sapmalarının zamanında takibi.", "en": "Timely follow-up on all unfavorable usage variances.", "cmt_tr": ". Olumsuz kullanım sapmalarının takibi, standart altı malzeme kullanımının tespitine ve düzeltilmesine yol açabilir ancak halihazırda işlenmiş ürünlerdeki kusurları önlemez veya en aza indirmez.", "cmt_en": ". Follow-up on unfavorable usage variances may lead to detection and correction of use of substandard materials but does not prevent or minimize defects in products already processed."}, {"tr": "Üretim sürecinin sonunda fire miktarının belirlenmesi.", "en": "Determination of the amount of spoilage at the end of the manufacturing process.", "cmt_tr": ". Hammaddeler üretimde kullanıldıktan sonra fire belirlenmesi önleyici bir kontrol değildir.", "cmt_en": ". Determination of spoilage after raw materials have been used in production is not a preventive control."}], "answer": 1}, {"q_tr": "Satın alma ajanlarının belirli tedarikçileri kayırmasını önlemeye yönelik bir kontrol hangisidir?", "q_en": "A control likely to prevent purchasing agents from favoring specific suppliers is", "options": [{"tr": "Her alıcının harcadığı toplam tutarların aylık raporunun yönetim tarafından gözden geçirilmesini istemek.", "en": "Requiring management’s review of a monthly report of the totals spent by each buyer.", "cmt_tr": ". Her alıcının harcadığı toplam tutarların aylık raporunun gözden geçirilmesini istemek, kuruluşun bir ajan tarafından uygunsuz menfaat elde edilmesini tespit etmesine veya bu tür faaliyetlere yol açabilecek ilişkileri caydırmasına olanak tanımaz.", "cmt_en": ". Requiring review of a monthly report of the totals spent by each buyer does not enable the organization to detect receipt of inappropriate benefits by an agent or deter relationships that could lead to such activity."}, {"tr": "Alıcıların ayrıntılı malzeme teknik şartnamelerine uymasını istemek.", "en": "Requiring buyers to adhere to detailed material specifications.", "cmt_tr": ". Ayrıntılı malzeme teknik şartnameleri alıcının sipariş vermede kayırmacılığını önlemez.", "cmt_en": ". Detailed material specifications will not prevent buyer favoritism in placing orders."}, {"tr": "Alıcı görevlendirmelerini periyodik olarak rotasyona tabi tutmak.", "en": "Rotating buyer assignments periodically.", "cmt_tr": ". Alıcıların belirli satıcılarla uzun süreli ilişkileri olduğunda kayırmacılık riski artar. Alıcı görevlendirmelerinin periyodik rotasyonu, herhangi bir alıcının belirli bir tedarikçiyi kayırma fırsatını sınırlar.", "cmt_en": ". The risk of favoritism is increased when buyers have long-term relationships with specific vendors. Periodic rotation of buyer assignments will limit the opportunity for any buyer to show favoritism to a particular supplier."}, {"tr": "Her alıcı tarafından verilen sipariş sayısını izlemek.", "en": "Monitoring the number of orders placed by each buyer.", "cmt_tr": ". Verilen sipariş sayısı kayırmacılığı önlemeyle ilgili değildir.", "cmt_en": ". The number of orders placed is not relevant to preventing favoritism."}], "answer": 2}, {"q_tr": "Onarım araçlarına büyük yatırım yapan bir kamu hizmeti kuruluşu, araç hırsızlığı veya kaybı riskini azaltmak için en büyük olasılıkla hangi iç kontrolü uygular?", "q_en": "A utility with a large investment in repair vehicles would most likely implement which internal control to reduce the risk of vehicle theft or loss?", "options": [{"tr": "Sigorta kapsamını yeterlilik açısından gözden geçirmek.", "en": "Review insurance coverage for adequacy.", "cmt_tr": ". Sigorta, kayıp veya hırsızlık gerçekleştiğinde tazminat sağlar. Bu nedenle mali riski azaltır ancak gerçek kaybı veya hırsızlığı önlemez.", "cmt_en": ". Insurance provides for indemnification if loss or theft occurs. It thus reduces financial exposure but does not prevent the actual loss or theft."}, {"tr": "Tüm onarım iş emirlerini sistematik olarak hesaba katmak.", "en": "Systematically account for all repair work orders.", "cmt_tr": ". Yapılan onarım işleri üzerinde kontrol sağlamak amacıyla tasarlanmış bir iç kontrolün kayıp riskiyle ilgisi yoktur.", "cmt_en": ". An internal control designed to ensure control over repair work performed has no bearing on the risk of loss."}, {"tr": "Araçları fiziksel olarak sayarak sonuçları muhasebe kayıtlarıyla mutabık kılmak.", "en": "Physically inventory vehicles and reconcile the results with the accounting records.", "cmt_tr": ". Sayım yapmak tespit edici bir kontroldür, önleyici değil.", "cmt_en": ". Taking an inventory is a detective, not a preventive, control."}, {"tr": "Araçları güvenli bir yerde tutmak ve çıkış ile dönüşü bir sorumlu kişinin onayına tabi kılmak.", "en": "Maintain vehicles in a secured location with release and return subject to approval by a custodian.", "cmt_tr": ". Varlıkların fiziksel olarak korunması, hırsızlık veya diğer kayıp olasılığını azaltan önleyici kontroller aracılığıyla sağlanır. Araçları güvenli bir yerde tutmak ve erişimi kısıtlamak, sorumlu kişi tarafından hesap verebilirlik oluşturur ve kullanımlarının uygun şekilde yetkilendirilmesini sağlar.", "cmt_en": ". Physical safeguarding of assets is enacted through the use of preventive controls that reduce the likelihood of theft or other loss. Keeping the vehicles at a secure location and restricting access establishes accountability by the custodian and allows for proper authorization of their use."}], "answer": 3}, {"q_tr": "İç kontrol sistemi, varlıklara ve kayıtlara erişim ve kullanım üzerinde fiziksel kontroller içerir. Bu prosedürlerin amacından sapma olan durum hangisidir?", "q_en": "A system of internal control includes physical controls over access to and use of assets and records. A departure from the purpose of such procedures is that", "options": [{"tr": "Kiralık kasaya erişim için iki yetkilinin gerekmesi.", "en": "Access to the safe-deposit box requires two officers.", "cmt_tr": ". Kiralık kasanın açılması için iki yetkilinin gerekmesi uygundur. Biri diğerini denetler.", "cmt_en": ". It is appropriate for two officers to be required to open the safe-deposit box. One supervises the other."}, {"tr": "Hammadde deposuna yalnızca depo personeli ve hat amirlerinin erişimi olması.", "en": "Only storeroom personnel and line supervisors have access to the raw materials storeroom.", "cmt_tr": ". Depo personeli varlıkların saklanmasından sorumludur ve amirler yürütme fonksiyonlarından sorumludur. Amirlere hammadde deposuna erişim hakkı vermek, temel iç kontrol ilkesi olan fonksiyonların ayrılığının ihlalidir.", "cmt_en": ". Storeroom personnel have custody of assets, and supervisors are in charge of execution functions. To give supervisors access to the raw materials storeroom is a violation of the essential internal control principle of segregation of functions."}, {"tr": "Posta odasının gelen postadaki çeklerin bir listesini hazırlaması.", "en": "The mailroom compiles a list of the checks received in the incoming mail.", "cmt_tr": ". Posta odası genellikle nakit ön listesini hazırlar. Liste, kasiyere gönderilen gerçek nakitin kontrolü olarak muhasebeciye gönderilir.", "cmt_en": ". The mailroom typically compiles a prelisting of cash. The list is sent to the accountant as a control for actual cash sent to the cashier."}, {"tr": "Satış departmanı araçlarını yalnızca satış personeli ve satış amirlerinin kullanması.", "en": "Only salespersons and sales supervisors use sales department vehicles.", "cmt_tr": ". Satış departmanı araçlarının yalnızca satış personeli tarafından kullanılması uygundur.", "cmt_en": ". Use of sales department vehicles by only sales personnel is appropriate."}], "answer": 1}, {"q_tr": "Aşağıdaki kontrollerden hangisi kaydedilen ancak hiç yapılmayan banka mevduatlarını tespit etmek için kullanılabilir?", "q_en": "Which of the following controls could be used to detect bank deposits that are recorded but never made?", "options": [{"tr": "Tahsilatlar için mümkün olan en erken zamanda hesap verebilirlik oluşturmak.", "en": "Establishing accountability for receipts at the earliest possible time.", "cmt_tr": ". Erken hesap verebilirlik oluşturmak, defterlere kaydedilmiş ancak bankaya yatırılmamış mevduatları tespit etmeye yardımcı olmaz.", "cmt_en": ". Early establishment of accountability will not help detect bank deposits recorded on the books but not deposited in the bank."}, {"tr": "Tahsilatları diğer iç hesap verebilirliklerle ilişkilendirmek, örneğin tahsilatları alacak hesaplarına veya satışlara bağlamak.", "en": "Linking receipts to other internal accountabilities, for example, collections to either accounts receivable or sales.", "cmt_tr": ". Sorun tahsilatlar için hesap verebilirlik değil, mevduat yapılamamasının tespitidir.", "cmt_en": ". The issue is not accountability for receipts but detection of failure to make deposits."}, {"tr": "Nakit tahsilat noktalarını birleştirmek.", "en": "Consolidating cash receiving points.", "cmt_tr": ". Tahsilat noktalarının sayısı, kaydedilen mevduatların yapılamamasını etkilemez.", "cmt_en": ". The number of receiving points does not impact the failure to make recorded deposits."}, {"tr": "Banka mutabakatlarının üçüncü bir tarafça yapılmasını sağlamak.", "en": "Having bank reconciliations performed by a third party.", "cmt_tr": ". Bağımsız bir üçüncü tarafın banka mutabakatlarını hazırlaması, kaydedilen mevduatlar ile banka hesap özetleri arasındaki tutarsızlıkları ortaya çıkaracaktır. Banka mutabakatı, banka hesap özetini kuruluş kayıtlarıyla karşılaştırır ve transit mevduatlar, ödenmemiş çekler, karşılıksız çekler, banka masrafları, hatalar vb. nedeniyle oluşan farkları çözer.", "cmt_en": ". Having an independent third party prepare the bank reconciliations would reveal any discrepancies between recorded deposits and the bank statements. A bank reconciliation compares the bank statement with organization records and resolves differences caused by deposits in transit, outstanding checks, NSF checks, bank charges, errors, etc."}], "answer": 3}, {"q_tr": "Bu durumda aşağıdakilerden hangisi bir kontrol eksikliğidir?", "q_en": "Which of the following is a control deficiency in this situation?", "options": [{"tr": "Mağaza müdürünün ürünlerin kaldırılmasını isteyebilmesi, bu da bireysel ürün müdürlerinin potansiyel performans değerlendirmesini etkileyebilir.", "en": "The store manager can require items to be removed, thus affecting the potential performance evaluation of individual product managers.", "cmt_tr": ". Ürünler mevsimseldir ve mağaza alanı sınırlıdır. Bu, kuruluş için gelir ve kârlılığı en üst düzeye çıkarmakla tutarlı bir kısıtlamadır.", "cmt_en": ". Goods are seasonal, and store space is limited. This is a constraint that is consistent with maximizing revenue and profitability for the organization."}, {"tr": "Ürün müdürünün satın alma fiyatını müzakere etmesi ve satış fiyatını belirlemesi.", "en": "The product manager negotiates the purchase price and sets the selling price.", "cmt_tr": ". Ürün müdürü satış ve brüt kâra göre değerlendirilir; bu nedenle her iki görevi de yerine getirmesi bir çatışma değildir.", "cmt_en": ". The product manager is evaluated based on sales and gross profit; thus, performing both of these duties is not a conflict."}, {"tr": "Ürün müdürlerini ürün hattından elde edilen toplam brüt kâra göre değerlendirmek işlevsel bozulmaya yol açacaktır.", "en": "Evaluating product managers by total gross profit generated by product line will lead to dysfunctional behavior.", "cmt_tr": ". Ürün müdürlerini brüt kâr ve bütçelenmiş satışlara göre değerlendirmek onları kârlılıktan sorumlu tutar. Bu yaklaşım, sipariş verme ve fiyatlandırma üzerindeki yetkileriyle tutarlıdır.", "cmt_en": ". Evaluating the product managers on gross profit and budgeted sales holds them accountable for profitability. This approach is consistent with their authority over ordering and pricing."}, {"tr": "Bireysel mağazalarda teslim alma fonksiyonunun bulunmaması.", "en": "There is no receiving function located at individual stores.", "cmt_tr": ". Teslim alma fonksiyonu, teslim alınan malların gerçekten gönderici tarafından gönderilenlerin aynısı olduğunu doğrular. Bu fonksiyon mağazada yerine getirilmezse, mallar kaybolabilir, çalınabilir veya keşfedilmeden yanlış mağazaya gönderilebilir.", "cmt_en": ". The receiving function verifies that the goods received are those actually sent by the shipper. Without this function being performed at the store, goods could be lost, pilfered, or simply sent to the wrong store without discovery."}], "answer": 3}, {"q_tr": "Yönetim, kuruluş dışı bir depoda saklanan stokun sorumluluğu üzerindeki iç kontrolü en iyi nasıl güçlendirebilir?", "q_en": "Management can best strengthen internal control over the custody of inventory stored in an off-site warehouse by implementing", "options": [{"tr": "Depoya giden/gelen transfer fişlerinin stok kayıtlarıyla mutabakatı.", "en": "Reconciliations of transfer slips to/from the warehouse with inventory records.", "cmt_tr": "Stoğun depoya giriş ve çıkış hareketleri üzerindeki kontrol, stokun depodayken sorumluluğu hakkında güvence sağlamaz.", "cmt_en": "A control over the movement of inventory to and from the warehouse provides no assurance over the custody of the inventory while in the warehouse."}, {"tr": "Sigorta kapsamının artırılması.", "en": "Increases in insurance coverage.", "cmt_tr": "Sigorta kapsamının artırılması kuruluşu kayıplara karşı korumaya yardımcı olur ancak stokun sorumluluğu üzerindeki iç kontrolü güçlendirmez.", "cmt_en": "Increasing insurance coverage helps protect the organization against losses but does not strengthen internal control over the custody of inventory."}, {"tr": "Fiziksel stok sayımlarının muhasebe kayıtlarıyla düzenli mutabakatı.", "en": "Regular reconciliation of physical inventories to accounting records.", "cmt_tr": "Fiziksel stok sayımlarının muhasebe kayıtlarıyla düzenli mutabakatı, kayıtlı ve gerçek stok arasındaki tutarsızlıkları tespit ederek kuruluş dışı depoda saklanan stokun sorumluluğu üzerindeki iç kontrolü güçlendirir.", "cmt_en": "Regular reconciliation of physical inventories to accounting records strengthens internal control over the custody of inventory stored in an off-site warehouse by detecting discrepancies between recorded and actual inventory."}, {"tr": "Eldeki miktarın depo sorumlusuyla düzenli olarak teyit edilmesi.", "en": "Regular confirmation of the amount on hand with the custodian of the warehouse.", "cmt_tr": "Depo sorumlusuyla eldeki stok miktarını teyit etmek, stoğun gerçekten depoda olduğunu doğrulamaz.", "cmt_en": "Confirming with the custodian the amount of inventory on hand does not verify that the inventory is actually at the warehouse."}], "answer": 2}, {"q_tr": "Bir iç denetçi, son 3 yıldır aynı miktarda aynı ürünü üreten bir üretim tesisinde küçük alet giderlerinde yıldan yıla artış olduğunu fark eder. Üretim stoğu teslim alma rampasının yanındaki kontrollü bir hazırlık alanında tutulur, ancak küçük alet stoku, tesis çalışanlarının otoparkına çıkışın yakınındaki denetimsiz bir alanda tutulur. Aşağıdaki tüm alternatiflerin maliyette eşit olduğunu ve yerel yönetim için uygulanabilir olduğunu belirledikten sonra, iç denetçi güvenlik sorununu en iyi nasıl ele alır?", "q_en": "An internal auditor notes year-to-year increases for small tool expense at a manufacturing facility that has produced the same amount of identical product for the last 3 years. Production inventory is kept in a controlled staging area adjacent to the receiving dock, but the supply of small tools is kept in an unsupervised area near the exit to the plant employees’ parking lot. After determining that all of the following alternatives are equal in cost and are also feasible for local management, the internal auditor would best address the security issue by recommending that plant management", "options": [{"tr": "Küçük alet stoğunu üretim stoğu hazırlık amirinin sorumluluğuna taşımak ve küçük aletlerin verilmesi için özel talep formu kullanımını uygulamak.", "en": "Move the small tools inventory to the custody of the production inventory staging superintendent and implement the use of a special requisition to issue small tools.", "cmt_tr": ". Varlık kaybını en aza indirmek önleyici bir kontrol gerektirir. Küçük aletlerin sorumluluğunu tek bir kişiye vermek hesap verebilirlik oluşturur. Talep formlarının sunulmasını istemek, kullanımlarının uygun şekilde yetkilendirilmesini sağlar.", "cmt_en": ". Minimizing the loss of assets requires a preventive control. Giving responsibilit
