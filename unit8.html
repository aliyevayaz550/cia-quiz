ncil kontroller etkisiz olduğunda riski azaltabilir. Ancak kendi başlarına riski kabul edilebilir bir düzeye düşürmezler.", "cmt_en": "Compensatory (mitigative) controls may reduce risk when the primary controls are ineffective. However, they do not, by themselves, reduce risk to an acceptable level. An example is the lack of segregation of duties when a store clerk is the only employee present at closing."}], "answer": 2}, {"q_tr": "Çevrimiçi girdi kontrolleri büyük olasılıkla şunları kapsar:", "q_en": "Online input controls most likely include", "options": [{"tr": "Karma toplamlar.", "en": "Hash totals.", "cmt_tr": "Karma toplamlar, verilerin eksiksizliğini doğrulamak için kullanılan, tanımlı bir anlamı olmayan kontrol toplamlarıdır.", "cmt_en": "Hash totals are control totals without a defined meaning, such as the total of vendor numbers or invoice numbers, that are used to verify the completeness of the data."}, {"tr": "Kullanıcı gözden geçirmesi.", "en": "A user review.", "cmt_tr": "Çıktı kontrolleri, işleme sonuçlarının tam, doğru ve uygun şekilde dağıtılmasını sağlar. Önemli bir çıktı kontrolü kullanıcı gözden geçirmesidir.", "cmt_en": "Output controls ensure that processing results are complete, accurate, and properly distributed. An important output control is user review. Users should be able to determine when output is incomplete or not reasonable, particularly when the user prepared the input. Thus, users as well as computer personnel have a quality assurance function."}, {"tr": "Denetim izi.", "en": "An audit trail.", "cmt_tr": "Denetim (yönetim) izi, yönetimin işlemleri kaynağından çıktısına kadar izlemesini sağlayan işlem geçmişi kontrollerinden oluşur.", "cmt_en": "An audit (management) trail consists of processing history controls that enable management to track transactions from their source to their output."}, {"tr": "Geçerlilik kontrolü.", "en": "A validity check.", "cmt_tr": "Geçerlilik kontrolleri, belirli bir alana girilen verileri o alan için geçerli değerler tablosuyla karşılaştırır. Örneğin, çek kesme talebindeki satıcı numarası mevcut satıcılar tablosuyla eşleşmelidir.", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, the vendor number on a request to cut a check must match the table of current vendors, and the invoice number must match the approved invoice table."}], "answer": 3}, {"q_tr": "Toplu işleme:", "q_en": "Batch processing", "options": [{"tr": "Denetim izini azalttığı için çoğu işletme tarafından kullanılmaz.", "en": "Is not used by most businesses because it reduces the audit trail.", "cmt_tr": "Toplu işleme, herhangi bir bilgisayarlı işlem kadar denetim izi sağlar.", "cmt_en": "Batch processing provides as much of an audit trail as any computerized operation."}, {"tr": "Kullanıcıların sistemde bulunan bilgi gruplarını sorgulamasına olanak tanır.", "en": "Allows users to inquire about groups of information contained in the system.", "cmt_tr": "Toplu işleme, sorgulama değil veri girdisine atıfta bulunur.", "cmt_en": "Batch processing refers to the input of data, not inquiry."}, {"tr": "İşlem kayıtlarını gecikmeli olarak ana dosyaya göre işlenmek üzere gruplar halinde biriktirir.", "en": "Accumulates transaction records into groups for processing against the master file on a delayed basis.", "cmt_tr": "Toplu işleme, işlemlerin gecikmeli olarak işlenmek üzere biriktirilmesi ve gruplandırılmasıdır. Toplu yaklaşım, bordo, satışlar, envanter ve faturalama gibi belirli aralıklarla işlenebilen ve büyük hacimlerde benzer öğeler içeren uygulamalar için uygundur.", "cmt_en": "Batch processing is the accumulation and grouping of transactions for processing on a delayed basis. The batch approach is suitable for applications that can be processed against the master file at intervals and involve large volumes of similar items, such as payroll, sales, inventory, and billing."}, {"tr": "Yalnızca merkezi olarak gerçekleştirilebilir.", "en": "Can only be performed on a centralized basis.", "cmt_tr": "Toplu işleme ayrıca merkezi olmayan bir şekilde de gerçekleştirilebilir.", "cmt_en": "Batch processing can also be performed on a decentralized basis."}], "answer": 2}, {"q_tr": "Verilerin birden fazla konumdan bir araya getirilmesi ve kayıtların hemen güncellenmesiyle karakterize edilen bilgisayar işleme sistemi türü hangisidir?", "q_en": "What type of computer processing system is characterized by data that are assembled from more than one location and records that are updated immediately?", "options": [{"tr": "Kişisel bilgisayar sistemleri.", "en": "Personal computer systems.", "cmt_tr": "Birden fazla konumdan erişim, kişisel bilgisayar sistemlerinden çok daha büyük bilgisayar sistemlerinin tipik özelliğidir.", "cmt_en": "Access from multiple locations is more typical of larger computer systems than of personal computer systems."}, {"tr": "Veri sıkıştırma sistemleri.", "en": "Data compression systems.", "cmt_tr": "Veri sıkıştırma sistemleri, verileri daha az depolama alanı kaplaması için kodlar.", "cmt_en": "Data compression systems encode data to take up less storage space."}, {"tr": "Toplu işleme sistemleri.", "en": "Batch processing systems.", "cmt_tr": "İşlemlerin toplu olarak biriktirilmesi, verilerin tek bir yerde toplanmasını ve güncellemenin ertelenmesini gerektirir.", "cmt_en": "Batching of transactions requires assembly of data at one place and a delay in updating."}, {"tr": "Çevrimiçi, gerçek zamanlı sistemler.", "en": "Online, real-time systems.", "cmt_tr": "Gerçek zamanlı işleme, bir girdi kaydının işlenmesini ve çıktının mevcut karar alma sürecini etkileyecek kadar kısa sürede alınmasını içerir. Çevrimiçi, karar vericinin bilgisayarla doğrudan iletişimde olduğunu gösterir. Çevrimiçi, gerçek zamanlı sistemler genellikle birden fazla uzak terminalden ana bilgisayara erişime izin verir.", "cmt_en": "Real-time processing involves processing an input record and receiving the output soon enough to affect a current decision-making process. In a real-time system, the user interacts with the system to control an ongoing activity. Online indicates that the decision maker is in direct communication with the computer. Online, real-time systems usually permit access to the main computer from multiple remote terminals."}], "answer": 3}, {"q_tr": "Hatalı program veya verilerden kaynaklanan toplu bilgisayar sistemindeki hatalar hemen tespit edilemeyebilir çünkü:", "q_en": "Errors in a batch computer system caused by incorrect programs or data may not be detected immediately because", "options": [{"tr": "Bazı işlemlerdeki hatalar, toplu işteki diğer işlemlerin reddedilmesine neden olabilir.", "en": "Errors in some transactions may cause rejection of other transactions in the batch.", "cmt_tr": "Toplu işteki işlemler tipik olarak birbirine bağlı değildir.", "cmt_en": "The transactions within the batch are typically not contingent upon one another."}, {"tr": "Girdi verilerindeki hataların tespiti genellikle programın bir parçası değildir.", "en": "The identification of errors in input data typically is not part of the program.", "cmt_tr": "Düzenleme kontrolleri toplu işleme ortamlarına dahil edilebilir. Ancak düzenleme kontrolleri toplu işlerdeki işlemleri test etmek için kullanılır.", "cmt_en": "Edit checks can be incorporated into batch processing environments. However, the edit checks are used to test the transactions in batches."}, {"tr": "Toplu sistemde işlemlerin işlenmesinde zaman gecikmeleri vardır.", "en": "There are time delays in processing transactions in a batch system.", "cmt_tr": "Toplu bilgisayar sistemindeki işlemler, işlenmeden önce gruplandırılır veya toplu hale getirilir. Toplu işler günlük, haftalık ve hatta aylık olarak işlenebilir. Böylece işlemin başlatılması ile hatanın keşfi arasında önemli ölçüde zaman geçebilir.", "cmt_en": "Transactions in a batch computer system are grouped together, or batched, prior to processing. Batches may be processed either daily, weekly, or even monthly. Thus, considerable time may elapse between the initiation of the transaction and the discovery of an error."}, {"tr": "Toplu sistemdeki işlemlerin işlenmesi tek tip değildir.", "en": "The processing of transactions in a batch system is not uniform.", "cmt_tr": "Bir toplu işteki işlemler tipik olarak tek tip olarak işlenir.", "cmt_en": "A batch of transactions is typically processed uniformly."}], "answer": 2}, {"q_tr": "Aşağıdaki risklerden hangisi bilgisayarlı sistemlerde manuel sistemlere göre daha büyüktür?", "q_en": "Which of the following risks is greater in computerized systems than in manual systems?", "options": [{"tr": "Veri bütünlüğü kaybı.", "en": "Loss of data integrity.", "cmt_tr": "Veri bütünlüğü, güvenilir veridir. Doğru ve eksiksizdir. Veri bozulma riski, bilgisayarlı sistemden çok manuel sistemde daha yüksektir.", "cmt_en": "Data integrity is data that is reliable. It is accurate and complete. The risk of data corruption, the opposite of data integrity, is higher in a manual system than in a computerized system."}, {"tr": "Hatalı kaynak belge hazırlığı.", "en": "Erroneous source document preparation.", "cmt_tr": "Kaynak belge hazırlığı, bilgisayarlı sistemde işlemeden önce gerçekleşir veya tamamen ortadan kaldırılır.", "cmt_en": "Source document preparation either precedes processing or is eliminated altogether in a computerized system. Thus, the risk of erroneous source document preparation in computerized systems is the same as or less than the equivalent risk in manual systems."}, {"tr": "Hataların tekrarı.", "en": "Repetition of errors.", "cmt_tr": "Manuel sistemden farklı olarak, bilgisayar sistemi verileri işlemler için makine tarafından okunabilir biçime dönüştürür. Bu ek adım girdi hatası riskini artırır. Ayrıca programda bir hata varsa, işlemlerin işlenmesinde sistematik, tekrarlayan hatalar meydana gelir.", "cmt_en": "Unlike a manual system, a computer system converts data to machine-readable form so that transactions can be processed. This additional step increases the risk of input error. Moreover, if an error exists in the program, systematic, repetitive errors will occur in processing transactions. Finally, data are typically stored magnetically on tapes or disks. This concentration of data increases the risk of loss from natural and other disasters."}, {"tr": "Verilerin tekrarlanması.", "en": "Duplication of data", "cmt_tr": "Veri tekrarlama riski, bilgisayarlı sistemlere göre manuel sistemlerde daha yüksektir. Tekrarlamayı tespit etmek için otomatik testler uygulanabilir.", "cmt_en": "The risk of data duplication is higher in manual systems than in computerized systems. Automated tests can be implemented to identify duplication."}], "answer": 2}, {"q_tr": "Manuel sistemden bilgisayar sistemine geçildiğinde kontrollerdeki temel fark aşağıdakilerden hangisidir?", "q_en": "Which of the following is a key difference in controls when changing from a manual system to a computer system?", "options": [{"tr": "İç kontrol ilkeleri değişir.", "en": "Internal control principles change.", "cmt_tr": "Sağlam iç kontrol ilkeleri hem manuel hem de bilgisayarlı sistemlere uygulanır. Tasarım ve uygulamada farklılık göstermelerine rağmen, kontroller aynı hedeflere yöneliktir.", "cmt_en": "Sound internal control principles apply to both manual and computerized systems. Though they differ in design and implementation, the controls are geared toward the same objectives."}, {"tr": "İç kontrol hedefleri farklıdır.", "en": "Internal control objectives differ.", "cmt_tr": "Tasarım ve uygulamada farklılık göstermelerine rağmen, manuel ve bilgisayarlı sistemdeki kontroller aynı hedeflere yöneliktir.", "cmt_en": "Though they differ in design and implementation, the controls in a manual and in a computerized system are geared toward the same objectives."}, {"tr": "Kontrol hedeflerine ulaşmak daha zordur.", "en": "Control objectives are more difficult to achieve.", "cmt_tr": "İç kontrol hedeflerine ulaşmak manuel ortamda da oldukça zorlu olabilir.", "cmt_en": "Achieving internal control objectives can be quite challenging in a manual environment."}, {"tr": "Kontrollerin uygulanma yöntemleri değişir.", "en": "Methodologies for implementing controls change.", "cmt_tr": "Manuel ve bilgisayarlı sistemdeki kontroller aynı kontrol hedeflerine yöneliktir. Yalnızca tasarım ve uygulama farklıdır.", "cmt_en": "The controls in a manual and in a computerized system are geared toward the same control objectives. Only the design and implementation are different."}], "answer": 3}, {"q_tr": "Toplu işleme ile karşılaştırıldığında, gerçek zamanlı işleme aşağıdaki avantajlardan hangisine sahiptir?", "q_en": "Compared to batch processing, real-time processing has which of the following advantages?", "options": [{"tr": "Denetim kolaylığı.", "en": "Ease of auditing.", "cmt_tr": "Gerçek zamanlı işleme denetimi daha zordur. Toplu işleme, bir grup işlemin tek bir yerde ve zamanda tek tip olarak işlenmesini içerir.", "cmt_en": "Real-time processing is more difficult to audit. Batch processing involves uniform processing of a group of transactions at one place and time. Thus, it produces as much of an audit trail as any computer operation. Real-time processing permits immediate updating as transactions occur and access from multiple sites."}, {"tr": "Uygulama kolaylığı.", "en": "Ease of implementation.", "cmt_tr": "Gerçek zamanlı işleme uygulaması daha zordur. Sistemin işlemler gerçekleştikçe sorguları ele alma ve dosyaları güncelleme kapasitesine sahip olmasını gerektirir.", "cmt_en": "Real-time processing is more difficult to implement. It requires the system to have the capability to handle inquiries and update files as transactions occur."}, {"tr": "Bilginin zamanında sunulması.", "en": "Timeliness of information.", "cmt_tr": "Gerçek zamanlı işleme, bir girdi kaydının işlenmesini ve çıktının mevcut karar alma sürecini etkileyecek kadar kısa sürede alınmasını içerir. Karşılaştırıldığında, toplu yaklaşım belirli aralıklarla işlenebilen uygulamalar için uygundur.", "cmt_en": "Real-time processing involves processing an input record and receiving the output soon enough to affect a current decision-making process. Thus, the emphasis is on receiving the output in a timely fashion. In comparison, the batch approach is suitable for applications that can be processed at intervals."}, {"tr": "İşleme verimliliği.", "en": "Efficiency of processi", "cmt_tr": "Toplu işleme tipik olarak daha verimlidir.", "cmt_en": "Batch processing is typically more efficient."}], "answer": 2}, {"q_tr": "Çevrimiçi gerçek zamanlı işleme ile karşılaştırıldığında, toplu işleme aşağıdaki dezavantajlardan hangisine sahiptir?", "q_en": "Compared to online real-time processing, batch processing has which of the following disadvantages?", "options": [{"tr": "Daha yüksek düzeyde kontrol gereklidir.", "en": "A greater level of control is necessary.", "cmt_tr": "Toplu işleme, çevrimiçi gerçek zamanlı işlemeye göre daha düşük düzeyde kontrol gerektirir.", "cmt_en": "Batch processing requires a lesser degree of control than online real-time processing."}, {"tr": "Ek bilgi işlem kaynakları gereklidir.", "en": "Additional computing resources are required.", "cmt_tr": "Toplu işleme ortamında çevrimiçi gerçek zamanlı ortama göre genellikle daha az bilgi işlem kaynağı gereklidir.", "cmt_en": "Fewer computing resources are generally required in a batch processing environment over an online real-time one."}, {"tr": "Ek personel gereklidir.", "en": "Additional personnel are required.", "cmt_tr": "Toplu işleme ortamında çevrimiçi gerçek zamanlı ortama göre genellikle daha az personel gereklidir.", "cmt_en": "Often fewer personnel are required in a batch processing environment over an online real-time one."}, {"tr": "Depolanan veriler yalnızca güncelleme sürecinden sonra günceldir.", "en": "Stored data are current only after the update process.", "cmt_tr": "Toplu işlemede, işlemler iş günü boyunca toplanır ve bilgisayar kaynaklarının serbest kaldığı genellikle gece gibi bir zamana kadar çevrimdışı depolanır. Bu işlem grupları toplu olarak işlenir. İşlemlerin girişi ile toplu işin işlenmesi arasındaki sürede veritabanı güncel değildir.", "cmt_en": "In batch processing, transactions are gathered throughout the workday and stored offline until a period, often overnight, when computer resources are freed up. These collections of transactions, called “batches,” are then processed as a group. During the limbo period between entry and storage of the transactions and processing of the batch, the database is not current."}], "answer": 3}, {"q_tr": "Bordro sisteminin ana dosyası her iki haftada bir gece işlenir. Dosya bakımı nispeten azdır. Bu koşullar altında en uygun işleme yöntemi büyük olasılıkla hangisidir?", "q_en": "A payroll system’s master file is processed at night once every 2 weeks. There is relatively little file maintenance required. Which of the following is most likely to be the appropriate processing method under the circumstances?", "options": [{"tr": "Paralel.", "en": "Parallel.", "cmt_tr": "Paralel, iki veya daha fazla sürecin eş zamanlı olarak yürütülmesi anlamına gelir.", "cmt_en": "Parallel means that two or more processes are executed concurrently."}, {"tr": "Çevrimiçi, gerçek zamanlı.", "en": "Online, real-time.", "cmt_tr": "Çevrimiçi, verilerin bir terminal aracılığıyla bilgisayara girilmesini ifade eder; gerçek zamanlı ise işlemlerin yakalandığında işlenmesini ifade eder. Bordro işleminin çevrimiçi veya gerçek zamanlı olması gerekmez.", "cmt_en": "Online means simply that data entry is performed via a terminal to a computer, and real-time means that transactions are processed when captured. The payroll operation need not be online or real-time."}, {"tr": "Ağ.", "en": "Network.", "cmt_tr": "Bilgisayar ağı herhangi bir işleme modunu kullanabilir, ancak büyük olasılıkla çevrimiçi, gerçek zamanlı uygulamalar için kullanılır.", "cmt_en": "A network of computers may employ any mode of processing but is most likely to be used for online, real-time applications."}, {"tr": "Toplu.", "en": "Batch.", "cmt_tr": "Toplu işleme, işlemlerin gecikmeli olarak işlenmek üzere biriktirilmesi ve gruplandırılmasıdır. Toplu yaklaşım, bordro, satışlar, envanter ve faturalama gibi belirli aralıklarla işlenebilen ve büyük hacimlerde benzer öğeler içeren uygulamalar için uygundur.", "cmt_en": "Batch processing is the accumulation and grouping of transactions for processing on a delayed basis. The batch approach is suitable for applications that can be processed at intervals and involve large volumes of similar items, e.g., payroll, sales, inventory, and billing."}], "answer": 3}, {"q_tr": "Tam zamanında üretim gereksinimleri için yeni bir satın alma sistemi önerilmiştir. Kullanıcılar ana dosya bilgilerine her zaman erişmek istemektedir. Kullanıcı ihtiyaçlarını karşılamak için ana dosya değişiklikleri şununla uygulanmalıdır:", "q_en": "A new purchasing system for just-in-time production requirements has been proposed. Users want access to current master file information at all times. To satisfy user needs, master file changes should be implemented with", "options": [{"tr": "Periyodik giriş ve ardından toplu işleme.", "en": "Periodic entry with subsequent batch processing.", "cmt_tr": "Periyodik giriş ve toplu işleme, tam zamanında üretimin gerektirdiği anlık güncellemeye izin vermez.", "cmt_en": "Periodic entry and batch processing do not permit the immediate updating required by JIT production."}, {"tr": "Periyodik giriş ve anlık toplu işleme.", "en": "Periodic entry with immediate batch processing.", "cmt_tr": "Periyodik giriş anlık güncellemeye izin vermez ve \"anlık toplu işleme\" çelişkili bir ifadedir.", "cmt_en": "Periodic entry does not permit immediate updating, and “immediate batch processing” is a contradiction in terms."}, {"tr": "Çevrimiçi giriş ve ardından toplu işleme.", "en": "Online entry with subsequent batch processing.", "cmt_tr": "Çevrimiçi giriş ve ardından toplu işleme, tam zamanında üretimin gerektirdiği anlık güncellemeye izin vermez.", "cmt_en": "Online entry and subsequent batch processing do not permit the immediate updating required by JIT production."}, {"tr": "Çevrimiçi giriş ve anlık işleme.", "en": "Online entry with immediate processing.", "cmt_tr": "Tam zamanında üretim, teslimatları ve üretimi daha yakından koordine ederek envanteri en aza indirmeye çalışır. Bu nedenle envanter verilerinin güncel olması gerekir. Çevrimiçi giriş ve anlık (gerçek zamanlı) işleme, değişiklikler girildiği anda kullanıcılara güncel ana dosya bilgisi sağlar.", "cmt_en": "JIT production attempts to minimize inventory by more closely coordinating deliveries of needed materials and production. Thus, inventory data must be current. Online entry with immediate (real-time) processing gives users current master file information because changes are entered"}], "answer": 3}, {"q_tr": "Veri bulunabilirliğinin zamanında sunulması kavramı en çok aşağıdakilerden hangisiyle ilgilidir?", "q_en": "The concept of timeliness of data availability is most relevant to", "options": [{"tr": "Bilgisayarlı sistemler.", "en": "Computerized systems.", "cmt_tr": "Zamanlılık, bilgisayarlı sistemin mutlaka bir unsuru değildir.", "cmt_en": "Timeliness is not necessarily an element of a computerized system."}, {"tr": "Bordro sistemleri.", "en": "Payroll systems.", "cmt_tr": "Zamanlılık, bordro sisteminin mutlaka bir unsuru değildir.", "cmt_en": "Timeliness is not necessarily an element of a payroll system."}, {"tr": "Manuel sistemler.", "en": "Manual systems.", "cmt_tr": "Zamanlılık, manuel sistemin mutlaka bir unsuru değildir.", "cmt_en": "Timeliness is not necessarily an element of a manual system."}, {"tr": "Çevrimiçi sistemler.", "en": "Online systems.", "cmt_tr": "Çevrimiçi işleme sistemi, bilgisayarla doğrudan iletişim halinde olup işlemleri girildiğinde ele alma kapasitesine sahiptir. Çevrimiçi sistem, işlemler gerçekleştikçe hem anlık kayıt (güncelleme) hem de ana dosya sorgulamasına izin verir.", "cmt_en": "An online processing system is in direct communication with the computer, giving it the capability to handle transactions as they are entered. An online system permits both immediate posting (updating) and inquiry of master files as transactions occur. In an online system, data are immediately available to users upon entry."}], "answer": 3}, {"q_tr": "Çevrimiçi, gerçek zamanlı veritabanı sistemleri ile toplu işleme sistemleri arasındaki ilişki şudur:", "q_en": "The relationship between online, real-time database systems and batch processing systems is that", "options": [{"tr": "Tek bir bilgisayar her ikisini de yapamayacağı için firma yalnızca bir işleme moduna sahip olacaktır.", "en": "A firm will have only one processing mode because a single computer cannot do both.", "cmt_tr": "Bir bilgisayar her iki modda da çalışabilir.", "cmt_en": "One computer can operate in both modes."}, {"tr": "Büyük bilgisayarı olan bir firma toplu işleme kullanmayacaktır.", "en": "A firm will not use batch processing if it has a large computer.", "cmt_tr": "Büyük bilgisayarlara sahip firmalar, işlemleri gruplandırıp periyodik olarak işlemeyi hem maliyet etkin hem de verimli bulur.", "cmt_en": "Firms with large computers find it both cost effective and efficient to group transactions and process them periodically."}, {"tr": "Bir firma her iki işleme modunu da eş zamanlı olarak kullanabilir.", "en": "A firm may use both processing modes concurrently.", "cmt_tr": "Firmalar her iki işleme modunu tek bir sisteme dahil etmeyi faydalı bulabilir. Hızlı erişim gerektiren bilgiler için veritabanı oluşturulabilir. Ancak diğer işleme gereksinimleri toplu işleme sisteminin sağladığı hız ve kontrolden yararlanabilir.", "cmt_en": "Firms may find it beneficial to incorporate both processing modes into one system. A database may be established for information that must be obtained quickly, for instance, a sales processing system in which credit information must be available to sales personnel on an ongoing basis. However, other processing requirements may take advantage of the speed and control provided in a batch processing system. For example, payroll transactions may be processed quickly and efficiently in a batch mode."}, {"tr": "Toplu işleme yavaş olduğu için firma her zaman çevrimiçi, gerçek zamanlı işleme sistemini tercih edecektir.", "en": "A firm will always prefer an online, real-time processing system because batch processing is slow.", "cmt_tr": "Firma otomatik olarak çevrimiçi, gerçek zamanlı sistemi tercih etmez. İşlemler toplu olarak kolayca gruplandırılabildiğinde, işleme toplu modda son derece hızlı ve verimlidir.", "cmt_en": "A firm will not automatically prefer an online, real-time system. When transactions, e.g., payroll, can be conveniently grouped, processing is extremely fast and efficient in a batch mode."}], "answer": 2}, {"q_tr": "Yeni bir perakende satış noktası açan bir şirket için en uygun bilgisayarlı veri işleme sistemi türü hangisidir?", "q_en": "What type of computerized data processing system would be most appropriate for a company that is opening a new retail location?", "options": [{"tr": "Toplu işleme.", "en": "Batch processing.", "cmt_tr": "Toplu işleme verileri biriktirir ve toplu olarak işler. Bu nedenle veriler gerçek zamanlı işlemedeki kadar güncel değildir.", "cmt_en": "Batch processing accumulates data and processes it in batches. Thus, data are not as timely as in real-time processing."}, {"tr": "Gerçek zamanlı işleme.", "en": "Real-time processing.", "cmt_tr": "Gerçek zamanlı işleme, en güncel bilginin her zaman mevcut olmasını gerektiren sistemlerde en kullanışlıdır. Perakende ortamında böyle bir sistem, şirketin envanter, nakit, işgücü vb. değişiklikleri anlık olarak takip etmesine olanak tanır.", "cmt_en": "Real-time processing is most useful in systems that require having the latest information available at all times. In a retail environment, such a system would potentially allow the company to track inventory, cash, labor, etc., as they change."}, {"tr": "Sıralı dosya işleme.", "en": "Sequential-file processing.", "cmt_tr": "Sıralı dosya işleme, doğrusal yapıda bir dosya depolama sürecidir ve belirli veri noktalarına erişimi zahmetli hale getirir.", "cmt_en": "Sequential-file processing is a file storage process, linear in nature, that makes accessing particular data points cumbersome."}, {"tr": "Doğrudan erişimli işleme.", "en": "Direct-access processing.", "cmt_tr": "Doğrudan erişimli işleme kendi kendini güncelleyen bir sistem değil, veri dosyalama sistemidir.", "cmt_en": "Direct-access processing is not a self-updating system, but a system to file data."}], "answer": 1}, {"q_tr": "Toplu ve çevrimiçi işleme modları:", "q_en": "Batch and online processing modes", "options": [{"tr": "Birbirini dışlar.", "en": "Are mutually exclusive.", "cmt_tr": "Toplu ve çevrimiçi modlar tek bir uygulamada birleştirilebilir.", "cmt_en": "Batch and online modes can be combined in a single application."}, {"tr": "Tek bir uygulamada birleştirilerek kullanılabilir.", "en": "Can be used in combination in a single application.", "cmt_tr": "Toplu ve çevrimiçi modlar tek bir uygulamada birleştirilebilir.", "cmt_en": "Batch and online modes can be combined in a single application."}, {"tr": "Veri işlemenin modası geçmiş yollarıdır.", "en": "Are outmoded means of processing data.", "cmt_tr": "Hem toplu hem de çevrimiçi modlar şu anda kullanılmaktadır.", "cmt_en": "Both batch and online modes are currently in use."}, {"tr": "Gerçek zamanlı işleme biçimleridir.", "en": "Are forms of real-time processing.", "cmt_tr": "Gerçek zamanlı işleme, sistemin andan ana güncellenmesini tanımlar.", "cmt_en": "Real-time processing describes a system that is updated from moment to moment, such as an"}], "answer": 1}, {"q_tr": "Aşağıdaki işlem işleme modlarından hangisi karar alma için en doğru ve eksiksiz bilgiyi sağlar?", "q_en": "Which of the following transaction processing modes provides the most accurate and complete information for decision making?", "options": [{"tr": "Toplu.", "en": "Batch.", "cmt_tr": "Toplu işlemede, işlemler biriktirilir ve bilgisayara tek bir toplu olarak sunulur. Bu gecikmeli işleme yöntemi hâlâ yaygın olarak kullanılmaktadır.", "cmt_en": "In batch processing, transactions are accumulated and submitted to the computer as a single batch. This accumulation of transactions for processing on a delayed basis is still widely used."}, {"tr": "Dağıtık.", "en": "Distributed.", "cmt_tr": "Dağıtık, bir işlem işleme modu değildir.", "cmt_en": "Distributed is not a transaction processing mode."}, {"tr": "Çevrimiçi.", "en": "Online.", "cmt_tr": "Çevrimiçi işlemede, bilgisayar her işlemi kullanıcı girdiğinde ayrı ayrı işler. Kullanıcı, işlemin kabul edilip edilmediği konusunda anlık geri bildirim alır. Bu sistemlerde en güncel bilgi her zaman mevcuttur.", "cmt_en": "In online processing, the computer processes each transaction individually as the user enters it. The user gets immediate feedback on whether the transaction was accepted or not. These systems have the latest information available at all times."}, {"tr": "Uygulama.", "en": "Application.", "cmt_tr": "Uygulama, bir işlem işleme modu değildir.", "cmt_en": "Application is not a transaction processing mode."}], "answer": 2}, {"q_tr": "Mill Co., satış işlemlerini işlemek için toplu işleme yöntemi kullanmaktadır. Mill'in satış işlem dosyasındaki veriler müşteri numarasına göre sıralanır ve faturaları, satış defterlerini ve güncellenmiş müşteri hesap bakiyelerini hazırlamada programlanmış düzenleme kontrollerine tabi tutulur. Bu dosyanın oluşturulmasının doğrudan çıktılarından biri büyük olasılıkla şudur:", "q_en": "Mill Co. uses a batch processing method to process its sales transactions. Data on Mill’s sales transaction file are sorted by customer number and are subjected to programmed edit checks in preparing its invoices, sales journals, and updated customer account balances. One of the direct outputs of the creation of this file most likely would be a", "options": [{"tr": "İstisnaları ve kontrol toplamlarını gösteren rapor.", "en": "Report showing exceptions and control totals.", "cmt_tr": "Toplu işleme, büyük hacimlerde veri işlemek için kullanışlıdır. Verilerin düzenlenmesi (doğrulanması), yalnızca mevcut işleme çalışmasında bulunan hataları değil, aynı zamanda önceki çalışmalardan düzeltilmemiş hataları da kapsayan kümülatif bir otomatik hata listesi üretmelidir.", "cmt_en": "Batch processing is useful for processing large volumes of data. Editing (validation) of data should produce a cumulative automated error listing that includes not only errors found in the current processing run but also uncorrected errors from earlier runs. The creation of the file will also generate various totals that will serve as controls over the completeness and accuracy of the processing."}, {"tr": "Güncellenmiş envanter kayıtlarının çıktısı.", "en": "Printout of the updated inventory records.", "cmt_tr": "Güncel bilgi gerektiren kayıtların yazdırılması için çevrimiçi veritabanı sistemi daha uygundur.", "cmt_en": "An online database system is more appropriate for printing records that require up-to-date information."}, {"tr": "Vadesi geçmiş alacak hesaplarını gösteren rapor.", "en": "Report showing overdue accounts receivable.", "cmt_tr": "Vadesi geçmiş alacakların test edilmesi, mevcut satış siparişlerinin onaylanmasından önce yapılmalıdır.", "cmt_en": "Testing for overdue accounts receivable should be done prior to approving current sales orders."}, {"tr": "Satış fiyatı ana dosyasının çıktısı.", "en": "Printout of the sales price master file.", "cmt_tr": "Tam satış fiyat listesi, satış işlemleri dosyasında bulunmaz.", "cmt_en": "A complete listing of sales prices would not be found in a sales transactions file."}], "answer": 0}, {"q_tr": "Aşağıdaki veri kalemlerinin her birinde bir kontrol toplamı hesaplansaydı, bordro bilgisayar uygulaması için hangisi en iyi karma toplam olarak tanımlanırdı?", "q_en": "If a control total were to be computed on each of the following data items, which would best be identified as a hash total for a payroll computer application?", "options": [{"tr": "Çalışılan saatler.", "en": "Hours worked.", "cmt_tr": "Çalışılan saatler, mali toplam örneğidir. Mali toplamlar, kaynak belgelerden dolar toplamlarını hesaplar ve çıktı kayıtlarıyla mutabakat eder.", "cmt_en": "Hours worked is an example of a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records."}, {"tr": "Toplam borçlar ve toplam alacaklar.", "en": "Total debits and total credits.", "cmt_tr": "Toplam borçlar ve toplam alacaklar mali toplamdır.", "cmt_en": "Total debits and total credits is a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records."}, {"tr": "Net maaş.", "en": "Net pay.", "cmt_tr": "Net maaş mali toplamdır.", "cmt_en": "Net pay is a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records."}, {"tr": "Departman numaraları.", "en": "Department numbers.", "cmt_tr": "Üç tür kontrol toplamı: kayıt sayımları, mali toplamlar ve karma toplamlardır. Karma toplamlar, girdi belgelerinde normalde toplanmayan sayıları toplar (örn. departman numaraları) ve kontrol amacı dışında \"anlamsız\" bir toplam oluşturur.", "cmt_en": "The three types of control totals are record counts, financial totals, and hash totals. Record counts establish the number of source documents and reconcile it to the number of output records. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records. Hash totals add numbers on input documents that are not normally added (e.g., department numbers), resulting in a total that is “meaningless” for any purpose other than this control."}], "answer": 3}, {"q_tr": "Bir güncelleme işleminde hesap numarasının kontrol rakamı doğrulamasının amacı şudur:", "q_en": "The purpose of check digit verification of an account number on an update transaction is to", "options": [{"tr": "Hesap numarasının ana dosyadaki mevcut bir hesaba karşılık geldiğini doğrulamak.", "en": "Verify that the account number corresponds to an existing account in the master file.", "cmt_tr": "Hesap numarasının ana dosyadaki mevcut bir hesaba karşılık geldiğini doğrulamak, ana dosya referans kontrolüdür.", "cmt_en": "Verifying that the account number corresponds to an existing account in the master file is a master file reference check."}, {"tr": "Sisteme girilen hesap numarasındaki yer değiştirme hatasını tespit etmek.", "en": "Detect a transposition of an account number entered into the system.", "cmt_tr": "Kopyalama veya veri girişinde yapılan hatalara karşı korunmak için kullanılan başlıca kontrol, kontrol rakamıdır.", "cmt_en": "A major control used to guard against errors made in transcribing or keying data is a check digit."}, {"tr": "Güncelleme işlemi için destekleyici belgelerin mevcut olduğunu sağlamak.", "en": "Ensure that supporting documentation exists for the update transaction.", "cmt_tr": "Güncelleme işlemleri için destekleyici belgelerin mevcut olduğunu sağlamak, belge mutabakat kontrolüdür.", "cmt_en": "Ensuring that supporting documentation exists for update transactions is a document reconciliation control."}, {"tr": "Hesap numarasının diğer alanlarla doğru mantıksal ilişkiye sahip olmasını gerektirmek.", "en": "Require the account number to have the correct logical relationship with other fields.", "cmt_tr": "Bir alanın diğer alanlarla doğru mantıksal ilişkiye sahip olmasını gerektirmek, bağımlılık kontrolüdür.", "cmt_en": "Requiring a field to have the correct logical relationship with other fields is a dependency check."}], "answer": 1}, {"q_tr": "Bilgi sistemleri kontrol faaliyetlerinin iki geniş gruplaması genel kontroller ve uygulama kontrolleridir. Genel kontroller şunları kapsar:", "q_en": "The two broad groupings of information systems control activities are general controls and application controls. General controls include controls", "options": [{"tr": "Hatalı verilerin düzeltilmesi ve yeniden sunulmasına ilişkin kontroller.", "en": "Relating to the correction and resubmission of faulty data.", "cmt_tr": "Rapor dağıtımı (çıktı), girdi hatalarının düzeltilmesi ve girdinin yetkilendirilmesi üzerindeki kontroller uygulama kontrolleridir.", "cmt_en": "Control over report distribution (output), correction of input errors, and authorization of input are application controls."}, {"tr": "Bilgisayar programlarının geliştirilmesi, değiştirilmesi ve sürdürülmesine ilişkin kontroller.", "en": "For developing, modifying, and maintaining computer programs.", "cmt_tr": "Genel kontroller, birçok bilgi sistemi uygulamasıyla ilişkili olan ve uygulama kontrollerinin etkin işleyişini destekleyen politika ve prosedürlerdir. Genel kontroller; veri merkezi ve ağ operasyonları, sistem yazılımı edinme ve bakımı, erişim güvenliği ve uygulama sistemi edinme, geliştirme ve bakımı üzerindeki kontrolleri kapsar.", "cmt_en": "General controls are policies and procedures that relate to many information systems applications and support the effective functioning of application controls by helping to ensure the continued proper operation of information systems. General controls include controls over (1) data center and network operations; (2) systems software acquisition and maintenance; (3) access security; and (4) application systems acquisition, development, and maintenance."}, {"tr": "Yalnızca yetkili kullanıcıların işleme çıktısı almasını sağlamak için tasarlanmış kontroller.", "en": "Designed to ensure that only authorized users receive output from processing.", "cmt_tr": "Rapor dağıtımı (çıktı), girdi hatalarının düzeltilmesi ve girdinin yetkilendirilmesi üzerindeki kontroller uygulama kontrolleridir.", "cmt_en": "Control over report distribution (output), correction of input errors, and authorization of input are application controls."}, {"tr": "İşleme için sunulan tüm verilerin uygun şekilde yetkilendirildiğinden emin olmak için tasarlanmış kontroller.", "en": "Designed to ensure that all data submitted for processing have been properly authorized.", "cmt_tr": "Rapor dağıtımı (çıktı), girdi hatalarının düzeltilmesi ve girdinin yetkilendirilmesi üzerindeki kontroller uygulama kontrolleridir.", "cmt_en": "Control over report distribution (output), correction of input errors, and authorization of input are application controls."}], "answer": 1}, {"q_tr": "İnceleme altındaki küçük bir birim, yakın zamanda nakit ödeme sistemini bir sunucuya taşımıştır. Bir denetçi büyük olasılıkla aşağıdaki iç kontrol özelliklerinden hangisi konusunda endişe duyar?", "q_en": "A small activity under review recently put its cash disbursements system on a server. About which of the following internal control features would an auditor most likely be concerned?", "options": [{"tr": "Uygulamaların programlanması Java yerine Visual Basic'te yapılmıştır.", "en": "Programming of the applications are in Visual Basic rather than Java.", "cmt_tr": "Dil seçiminin iç kontrol üzerinde çok az etkisi olacaktır.", "cmt_en": "The choice of language would have little effect on internal control."}, {"tr": "Sunucu, nakit saklama sorumluluğu olan çalışanlar tarafından işletilmektedir.", "en": "The server is operated by employees who have cash custody responsibilities.", "cmt_tr": "Görevlerin ayrılığı, kontrol faaliyetlerinin temel bir kategorisidir. Fonksiyonlar, bir kişinin hem hile yapabilecek hem de gizleyebilecek konumda olması durumunda uyumsuzdur. Bu nedenle işlemlerin yetkilendirilmesi, kaydedilmesi ve varlıkların saklanması görevleri farklı kişilere atanmalıdır.", "cmt_en": "Segregation of duties is a basic category of control activities. Functions are incompatible if a person is in a position both to perpetrate and conceal fraud or errors. Hence, the duties of authorizing transactions, recording transactions, and custody of assets should be assigned to different people. Those employees that operate the server may be able to override the controls to change records to conceal a theft of cash."}, {"tr": "Nakit ödeme sistemine erişim için yalnızca bir çalışanın parolası vardır.", "en": "Only one employee has the password to gain access to the cash disbursement system.", "cmt_tr": "Erişim kısıtlaması bir güçlü yön olarak kabul edilir.", "cmt_en": "The limitation on access would be considered a strength."}, {"tr": "Depolanabilecek veri miktarı ve verilerin depolanma süresi üzerinde kısıtlamalar vardır.", "en": "There are restrictions on the amount of data that can be stored and on the length of time that data can be stored.", "cmt_tr": "Depolanabilecek veri miktarı ve depolama süresi kısıtlamaları bir kontrol zayıflığı oluşturmaz.", "cmt_en": "Restrictions on the amount of data that can be stored and on the length of time that data can be stored do not constitute a control weakness."}], "answer": 1}, {"q_tr": "Girdi kontrollerinin amacı şunları sağlamaktır:", "q_en": "The purpose of input controls is to ensure the", "options": [{"tr": "Veri dosyalarına erişimin yetkilendirilmesi.", "en": "Authorization of access to data files.", "cmt_tr": "Erişim kontrolleri, veri dosyalarına erişimi yetkilendirir.", "cmt_en": "Access controls authorize access to data files."}, {"tr": "Program dosyalarına erişimin yetkilendirilmesi.", "en": "Authorization of access to program files.", "cmt_tr": "Erişim kontrolleri, program dosyalarına erişimi yetkilendirir.", "cmt_en": "Access controls authorize access to program files."}, {"tr": "Güncellemenin eksiksizliği, doğruluğu ve geçerliliği.", "en": "Completeness, accuracy, and validity of updating.", "cmt_tr": "İşleme kontrolleri, güncellemenin eksiksizliğini, doğruluğunu ve geçerliliğini sağlar.", "cmt_en": "Processing controls ensure the completeness, accuracy, and validity of updating."}, {"tr": "Girdinin eksiksizliği, doğruluğu ve geçerliliği.", "en": "Completeness, accuracy, and validity of input.", "cmt_tr": "Girdi kontrolleri, bilgisayar işleme için alınan verilerin uygun şekilde yetkilendirildiğine ve işleme için uygun biçimde, yani eksiksiz, doğru ve geçerli olduğuna ilişkin makul güvence sağlar. Girdi kontrolleri ayrıca başlangıçta hatalı olan verilerin reddedilmesi, düzeltilmesi ve yeniden sunulmasıyla da ilgilidir.", "cmt_en": "Input controls provide reasonable assurance that data received for computer processing have been properly authorized and are in a form suitable for processing, i.e., complete, accurate, and valid. Input controls also relate to rejection, correction, and resubmission of data that were initially incorrect."}], "answer": 3}, {"q_tr": "Düşük maliyetli yenilik ürünlerinin posta siparişi perakendecisi, müşterilerden yanlış mal gönderilmesi konusunda artan sayıda şikayet almaktadır. Ürünlerin sipariş kodu wwxxyyzz biçimindedir. Ana kategori ww, xx alt kategori, yy ürünü ve zz kataloğu belirler. Birçok durumda yanlış mal gönderilmesinin nedeni sipariş kodundaki bitişik karakterlerin yer değiştirmesidir. Yanlış mal gönderilen sipariş sayısını azaltmak için en iyi kontrol:", "q_en": "A mail-order retailer of low-cost novelty items is receiving an increasing number of complaints from customers about the wrong merchandise being shipped. The order code for items has the format wwxxyyzz. The major category is ww, xx is the minor category, yy identifies the item, and zz identifies the catalog. In many cases, the wrong merchandise was sent because adjacent characters in the order code had been transposed. The best control for decreasing the number of orders with the wrong merchandise is to", "options": [{"tr": "Müşterilerden sipariş ettikleri her ürünün adını belirtmelerini istemek.", "en": "Require customers to specify the name for each item they order.", "cmt_tr": "Müşterilerden sipariş ettikleri her ürünün adını belirtmelerini istemek, hatalı sipariş kodları tespit edildikten sonra şirketin bunları düzeltmesine olanak tanır, ancak genel olarak hatalı kodları tespit etmez.", "cmt_en": "Having customers specify the name for each item they order would let the company correct erroneous order codes once they had been detected, but would not, in general, detect erroneous codes."}, {"tr": "Sipariş kodlarına kontrol rakamı eklemek ve her sipariş için doğrulamak.", "en": "Add check-digits to the order codes and verify them for each order.", "cmt_tr": "Kendi kendini denetleyen rakamlar, hatalı kodları tespit etmek için kullanılabilir. Rakam, koda bir algoritma uygulanarak üretilir. Giriş sürecinde, kontrol rakamı aynı algoritma fiilen girilen koda uygulanarak yeniden hesaplanır.", "cmt_en": "Self-checking digits may be used to detect incorrect codes. The digit is generated by applying an algorithm to the code. During the input process, the check digit is recomputed by applying the same algorithm to the code actually entered."}, {"tr": "Karakterlerin daha kolay okunmasını sağlamak için sipariş kodunun bölümlerini kısa çizgilerle ayırmak.", "en": "Separate the parts of the order code with hyphens to make the characters easier to read.", "cmt_tr": "Sipariş kodunun bölümlerini kısa çizgilerle ayırmak karakterlerin daha kolay okunmasını sağlar, ancak yer değiştirmiş karakter sorununu çözmez.", "cmt_en": "Separating the parts of the order code with hyphens would make the characters easier to read but would not cure the problem of transposed characters."}, {"tr": "Ürünlerin varlığını doğrulamak için tüm sipariş kodlarında ana dosya referansı kullanmak.", "en": "Use a master file reference for all order codes to verify the existence of items.", "cmt_tr": "Tüm sipariş kodlarında ana dosya referansı kullanmak ürünlerin varlığını doğrular, ancak yer değiştirmiş karakterlerin başka ürünlerle eşleştiği hatalı sipariş kodlarını tespit etmez.", "cmt_en": "Using a master file reference for all order codes would verify the existence of items but would not detect erroneous order codes in which transposed characters in an order code match other items."}], "answer": 1}, {"q_tr": "Masaüstü bilgisayarlardan sunucuya yüklenen verilerin eksiksiz olduğunu ve ek veri eklenmediğini sağlamak için en etkili bilgisayarlı kontrol prosedürü aşağıdakilerden hangisidir?", "q_en": "Which of the following computerized control procedures would be most effective in ensuring that data uploaded from desktop computers to a server are complete and that no additional data are added?", "options": [{"tr": "Yalnızca yetkili parça numaralarının veritabanına eklenmesini sağlamak için kendi kendini denetleyen rakamlar.", "en": "Self-checking digits to ensure that only authorized part numbers are added to the database.", "cmt_tr": "Kendi kendini denetleyen rakamlar hatalı kimlik numaralarını tespit eder. Ancak kontrol hedefi veri transferinin eksiksizliğini sağlamaktır.", "cmt_en": "Self-checking digits detect inaccurate identification numbers. They are an effective control to ensure that the appropriate part has been identified. However, the control objective is to ensure that data transfer is complete."}, {"tr": "Kontrol toplamları ve karma toplamlar dahil toplu kontrol toplamları.", "en": "Batch control totals, including control totals and hash totals.", "cmt_tr": "Transfer edilen veriler için toplu kontrol toplamları, mevcut dosyadaki toplu kontrol toplamlarıyla mutabakat edilebilir. Bu karşılaştırma, veri transferinin tamamlanması hakkında bilgi sağlar.", "cmt_en": "Batch control totals for the data transferred can be reconciled with the batch control totals in the existing file. This comparison provides information on the completion of the data transfer. Batch totals may include record counts, totals of certain critical amounts, or hash totals. A hash total is a control total without a defined meaning, such as the total of employee numbers or invoice numbers, that is used to verify the completeness of data. Thus, the hash total for the employee listing by the personnel department could be compared with the total generated during the payroll run."}, {"tr": "Yalnızca verileri ana bilgisayara yükleme yetkisi olanlara erişimi etkin bir şekilde sınırlayan parolalar.", "en": "Passwords that effectively limit access to only those authorized to upload the data to the mainframe computer.", "cmt_tr": "Parolalar yalnızca yetkili personelin transfer yapmasını sağlamaya yardımcı olur, veri transferinin eksiksiz olmasını sağlamaz.", "cmt_en": "Passwords help ensure that only authorized personnel make the transfer, not that data transfer is complete."}, {"tr": "Alfanümerik bütünlük için her alanı test eden alan düzeyi düzenleme kontrolleri.", "en": "Field-level edit controls that test each field for alphanumerical integrity.", "cmt_tr": "Alan kontrolleri etkili girdi kontrolleridir, ancak veri transferinin eksiksizliğini sağlamazlar.", "cmt_en": "Field checks are effective input controls, but they do not ensure completeness of data transfer."}], "answer": 1}, {"q_tr": "Omen Şirketi erkek gömleği üreticisidir. Her satış müdürüne haftalık satış raporları dağıtır. Satış müdürlerinden birinin haftalık satış raporundaki ürünlerden birinin satılan miktar sütununda 2R5 miktarı görünmüştür. Olan bitenin en olası açıklaması şudur:", "q_en": "Omen Company is a manufacturer of men’s shirts. It distributes weekly sales reports to each sales manager. The quantity 2R5 appeared in the quantity sold column for one of the items on the weekly sales report for one of the sales managers. The most likely explanation for what has occurred is that the", "options": [{"tr": "Çıktı miktarı onaltılık sayılarla ifade edilmiştir.", "en": "Output quantity has been stated in hexadecimal numbers.", "cmt_tr": "R bir onaltılık karakter değildir. Onaltılık karakterler ondalıkta 0-15'i temsil eden 0-9 ve A-F'dir.", "cmt_en": "R is not a hexadecimal character. Hexadecimal characters are 0-9 and A-F representing 0 to 15 in decimal."}, {"tr": "Bilgisayar yürütme sırasında arızalanmıştır.", "en": "Computer has malfunctioned during execution.", "cmt_tr": "Bir bilgisayar arızasının R harfinin yazdırılmasına yol açma olasılığı çok düşüktür.", "cmt_en": "The probability of a computer malfunction resulting in the printing of an R is slight."}, {"tr": "Yazıcı arızalanmıştır ve \"R\" ondalık nokta olmalıydı.", "en": "Printer has malfunctioned and the “R” should have been a decimal point.", "cmt_tr": "2,5 sayısı satılan gömlek miktarı için uygun olmaz.", "cmt_en": "The number 2.5 would not be appropriate for a quantity of shirts sold."}, {"tr": "Program, girdi verileri için veri kontrol rutini içermiyordu.", "en": "Program did not contain a data checking routine for input data.", "cmt_tr": "Rakam dışında bir karakter kullanılarak rapor edilen miktarın olası açıklaması, verilerin yanlış kodlanması ve bilgisayar programının alan kontrolü yapmamasıdır. Alan kontrolü, bir alanın alfabe, sayısal, özel veya bunların birleşimi gibi uygun karakterlerden oluşup oluşmadığını test eder.", "cmt_en": "The probable explanation for reporting a quantity using a character other than a digit is that the data were incorrectly encoded and the computer program did not perform a field check, which would have detected the error. A field check tests whether a field consists of the proper characters, whether alphabetic, numeric, special, or combinations thereof."}], "answer": 3}, {"q_tr": "Ön biçimlendirme adı verilen çevrimiçi veri giriş kontrolü şudur:", "q_en": "The online data entry control called preformatting is", "options": [{"tr": "Hataları giriş öncesinde keşfetmek ve düzeltilmesini sağlamak için normal girdiden önce başlatılan bir program.", "en": "A program initiated prior to regular input to discover errors in data before entry so that the errors can be corrected.", "cmt_tr": "Düzenleme rutini, hataları giriş öncesinde keşfetmek ve düzeltilmesini sağlamak için normal girdiden önce başlatılan bir programdır.", "cmt_en": "An edit routine is a program initiated prior to regular input to discover errors in data before entry so that the errors can be corrected."}, {"tr": "Bir işlem için tüm veri kalemlerinin veri giren kişi tarafından girilip girilmediğini belirleyen bir kontrol.", "en": "A check to determine if all data items for a transaction have been entered by the person entering the data.", "cmt_tr": "Eksiksizlik kontrolü, bir işlem için tüm veri kalemlerinin veri giren kişi tarafından girilip girilmediğini test eder.", "cmt_en": "A completeness check tests whether all data items for a transaction have been entered by the person entering the data."}, {"tr": "Gerekli girdi verileri için yapılan ve sonraki talep yapılmadan önce her talebe kabul edilebilir bir yanıt gerektiren bir dizi istek.", "en": "A series of requests for required input data that requires an acceptable response to each request before a subsequent request is made.", "cmt_tr": "Diyalog yaklaşımı, veri girişi için başka bir ekran yönlendirme yöntemidir. Bilgilerin sözlü olarak, örneğin telefonla alındığı durumlarda en uygundur.", "cmt_en": "The dialogue approach is another screen prompting method for data entry. It is most appropriate when information is received orally, e.g., by phone."}, {"tr": "Veri giren kişinin veri kalemlerini girmesi için boşluklar içeren bir belgenin ekranda gösterilmesi.", "en": "The display of a document with blanks for data items to be entered by the person entering the data.", "cmt_tr": "Çevrimiçi sistemlerde veri girişi hatalarından kaçınmak için ön biçimlendirilmiş ekran yaklaşımı kullanılabilir. Belirlenmiş veri kalemlerinin girişi için bir monitörde kutu setinin gösterilmesini içeren bir ekran yönlendirme yaklaşımıdır.", "cmt_en": "To avoid data entry errors in online systems, a preformatted screen approach may be used. It is a screen prompting approach that involves the display on a monitor of a set of boxes for entry of specified data items. The format may even be in the form of a copy of a transaction document. This technique is best suited to conversion of data from a source document."}], "answer": 3}, {"q_tr": "Denetçi, çevrimiçi bir sistemde girdi hatalarının düzeltilmesi için en ekonomik noktayı aşağıdakilerden hangisi olarak önermelidir?", "q_en": "Which of the following should the auditor recommend as the most economical point at which to correct input errors in an online system?", "options": [{"tr": "Girdi verileri bilgisayar tarafından üretilen kontrol toplamlarıyla dengelendiğinde.", "en": "Input data are balanced with computer-produced control totals.", "cmt_tr": "Girdi hatalarını düzeltmek için en ekonomik nokta, verilerin sisteme girildiği andır.", "cmt_en": "The most economical point for correcting input errors is the time at which data are entered into the system."}, {"tr": "Bir kaydın her alanına veri girişi tamamlandığında.", "en": "Entry of data into each field of a record is completed.", "cmt_tr": "Girdi hatalarını düzeltmek için en ekonomik nokta, verilerin sisteme girilmesinden sonraki en erken zamandır. En erken nokta, bir kaydın her alanına veri girişidir. Uygun bilgi zaten mevcut olduğundan hatalar kolayca düzeltilebilir.", "cmt_en": "The most economical point at which to correct input errors is at the earliest time after the data has been entered into the system. The earliest point is the entry of data into each field of a record. Errors can easily be rectified because the proper information is already available."}, {"tr": "Çıktı verileri bilgisayar tarafından üretilen kontrol toplamlarıyla dengelenip kullanıcıya teslim edildiğinde.", "en": "Output data are balanced with computer-produced control totals and delivered to the user.", "cmt_tr": "Girdi hatalarını düzeltmek için en ekonomik nokta, verilerin sisteme girildiği andır.", "cmt_en": "The most economical point for correcting input errors is the time at which data are entered into the system."}, {"tr": "Bir kayda veri girişi tamamlandığında.", "en": "Entry of data into each record is completed.", "cmt_tr": "Girdi hatalarını düzeltmek için en ekonomik nokta, verilerin sisteme girildiği andır.", "cmt_en": "The most economical point for correcting input errors is the time at which data are entered into the system."}], "answer": 1}, {"q_tr": "Kuruluşları etkileyen en yaygın bilgisayarla ilgili sorun şudur:", "q_en": "The most common computer-related problem confronting organizations is", "options": [{"tr": "Donanım arızası.", "en": "Hardware malfunction.", "cmt_tr": "Geliştirme ve test aşaması tamamlandıktan sonra donanım arızası büyük bir sorun olarak kabul edilmez.", "cmt_en": "Hardware malfunction is not considered a major problem once the development and testing phase is complete."}, {"tr": "Girdi hataları ve eksiklikleri.", "en": "Input errors and omissions.", "cmt_tr": "Bir kuruluşun bilgisayar kullanımında karşılaştığı en yaygın sorun, hatalı veya eksik girdidir. Girdi, gereken önemli insan müdahalesi nedeniyle özellikle hata ve eksikliklere açıktır.", "cmt_en": "The most common problem confronting an organization in its use of computers is erroneous or incomplete input. Input is especially susceptible to errors and omissions because of the substantial human intervention required. Comprehensive and effective input controls are necessary to ensure that data stored in files or used in processing are not contaminated."}, {"tr": "Doğal afetlerin bilgisayar işlemesini kesintiye uğratması.", "en": "Disruption to computer processing caused by natural disasters.", "cmt_tr": "İkinci en yaygın sorun, yangın veya elektrik kesintisi gibi doğal afetlerin neden olduğu işleme kesintisidir.", "cmt_en": "The second most common problem is the disruption to processing caused by natural disasters, such as fire or power failures."}, {"tr": "Hile.", "en": "Fraud.", "cmt_tr": "Üçüncü en yaygın sorun, bilgisayar suistimalidir; örneğin hile.", "cmt_en": "The third most common problem is computer abuse, e.g., fraud. Fact Pattern: Batchelder Company has the following invoices in a batch: Invoice Product Quantity Unit Number Price 201 F10 150 $5.00 202 G15 200 10.00 203 H20 250 25.00 204 K35 300 30.00"}], "answer": 1}, {"q_tr": "Batchelder aşağıdakilerden hangisini büyük olasılıkla karma toplam olarak kullanır?", "q_en": "Which of the following would Batchelder most likely use as a hash total?", "options": [{"tr": "FGHK80", "en": "FGHK80", "cmt_tr": "Karma toplam genellikle sayısal bir alanın toplamıdır.", "cmt_en": "A hash total is ordinarily the sum of a numeric field."}, {"tr": "4", "en": "4", "cmt_tr": "Bu bir kayıt sayımıdır.", "cmt_en": "It is a record count."}, {"tr": "204", "en": "204", "cmt_tr": "Bu bir fatura numarasıdır.", "cmt_en": "It is an invoice number."}, {"tr": "810", "en": "810", "cmt_tr": "Toplu bilgisayar sistemlerindeki girdi kontrolleri, toplu işe veri kaybedilmediğini veya eklenmediğini belirlemek için kullanılır. Karma toplam, verilerin eksiksizliğini doğrulamak için kullanılan, fatura numaraları toplamı gibi tanımlı bir anlamı olmayan kontrol toplamıdır. Fatura numaralarının karma toplamı 810'dur.", "cmt_en": "Input controls in batch computer systems are used to determine that no data are lost or added to the batch. Depending on the sophistication of a particular system, control may be accomplished by using record counts, batch totals, or hash totals. The hash total is a control total without a defined meaning, such as the total of employee numbers or invoice numbers, that is used to verify the completeness of data. The hash total of the invoice numbers is 810. Fact Pattern: Batchelder Company has the following invoices in a batch: Invoice Product Quantity Unit Number Price 201 F10 150 $5.00 202 G15 200 10.00 203 H20 250 25.00 204 K35 300 30.00"}], "answer": 3}, {"q_tr": "Batchelder aşağıdakilerden hangisini büyük olasılıkla kayıt sayımı olarak kullanır?", "q_en": "Which of the following would Batchelder most likely use as a record count?", "options": [{"tr": "1", "en": "1", "cmt_tr": "Toplu iş sayısı 1'dir.", "cmt_en": "The number of batches is 1."}, {"tr": "4", "en": "4", "cmt_tr": "Toplu bilgisayar sistemlerindeki girdi kontrolleri, toplu işe veri kaybedilmediğini veya eklenmediğini belirlemek için kullanılır. Kayıt sayımı, kaynak belge sayısını belirler ve çıktı kayıt sayısıyla mutabakat eder. İşlenen toplam fatura sayısı, kayıt sayımı örneğidir. Bu durumda kayıt sayımı 4'tür.", "cmt_en": "Input controls in batch computer systems are used to determine that no data are lost or added to the batch. Depending on the sophistication of a particular system, control may be accomplished by using record counts, batch totals, or hash totals. A record count establishes the number of source documents and reconciles it to the number of output records. The total number of invoices processed is an example of a record count. In this case, the record count is 4."}, {"tr": "810", "en": "810", "cmt_tr": "Fatura numaralarının karma toplamı 810'dur.", "cmt_en": "A hash total of the invoice numbers is 810."}, {"tr": "900", "en": "900", "cmt_tr": "Toplam ürün miktarı 900'dür.", "cmt_en": "The total quantity of items is 900."}], "answer": 1}, {"q_tr": "Manuel olarak hazırlanmış kaynak belgelerin anlık işleme için çevrimiçi girildiği bir sipariş giriş sisteminde, aşağıdakilerden hangisi uygun bir girdi-çıktı kontrolü örneğidir?", "q_en": "In an order-entry system in which manually-prepared source documents are entered online for immediate processing, which of the following is an example of an appropriate input-output control?", "options": [{"tr": "Parola yetkilendirme prosedürü.", "en": "Password authorization procedure.", "cmt_tr": "Parola yetkilendirmesi, sisteme veya bölümlerine erişim üzerinde genel bir kontroldür.", "cmt_en": "Password authorization is a general control over access to the system or parts of it."}, {"tr": "Kontrol rakamı doğrulama prosedürü.", "en": "Check-digit validation procedure.", "cmt_tr": "Kendi kendini denetleyen rakamlar, hatalı kimlik numaralarını tespit etmek için kullanılabilir. Rakam, kimlik numarasına bir algoritma uygulanarak üretilir.", "cmt_en": "Self-checking digits may be used to detect incorrect identification numbers. The digit is generated by applying an algorithm to the ID number. During the input process, the check digit is recomputed by applying the same algorithm to the code actually entered."}, {"tr": "Karma toplam doğrulaması.", "en": "Hash total verification.", "cmt_tr": "Karma toplamlar (kimlik numaraları toplamı gibi aksi halde anlamsız kontrol toplamları), toplu işleme için uygundur.", "cmt_en": "Hash totals (otherwise meaningless control totals, e.g., of identification numbers) are appropriate for batch processing."}, {"tr": "Yedekleme ve kurtarma prosedürleri.", "en": "Backup and recovery procedures.", "cmt_tr": "Yedekleme ve kurtarma prosedürleri genel kontrollerdir.", "cmt_en": "Backup and recovery procedures are general controls."}], "answer": 1}, {"q_tr": "Sipariş edilen miktar alanının yalnızca sayı içerip içermediğini belirlemek için kullanılan doğrulama kontrolü, şunun bir örneğidir:", "q_en": "A validation check used to determine if a quantity ordered field contains only numbers is an example of a(n)", "options": [{"tr": "Girdi kontrolü.", "en": "Input control.", "cmt_tr": "Veri girişinde miktar alanının yalnızca sayı içerdiğini doğrulayan bir doğrulama kontrolü, bir girdi değerinin doğruluğunu sağlamanın programatik bir yoludur. Dolayısıyla girdi kontrolüdür.", "cmt_en": "A validation check at data entry verifying that a quantity field contains only numbers is an example of a programmatic means of ensuring the accuracy of an input value. Thus, it is an input control."}, {"tr": "Denetim izi kontrolü.", "en": "Audit trail control.", "cmt_tr": "Denetim izi kontrolünün amacı, bir sistemdeki tüm ilgili olayların kronolojik kaydının tutulmasını sağlamaktır.", "cmt_en": "The purpose of an audit trail control is to ensure that a chronological record of all relevant events in a system has been recorded."}, {"tr": "İşleme kontrolü.", "en": "Processing control.", "cmt_tr": "İşleme kontrolü, güncelleme sırasında verilerin eksiksiz ve doğru olmasını sağlar.", "cmt_en": "A processing control ensures that data are complete and accurate during updating."}, {"tr": "Veri güvenliği kontrolü.", "en": "Data security control.", "cmt_tr": "Veri güvenliği kontrolü, yalnızca yetkili kişilerin sisteme erişmesine ve kullanmasına izin verilmesini sağlar.", "cmt_en": "A data security control ensures that only authorized individuals are permitted to access and use a system."}], "answer": 0}, {"q_tr": "Bir borçlar hesabı programı, çevrimiçi satıcı ana dosyasında bulunmayan bir satıcıya borç kaydetmiştir. Bu hatayı önleyecek kontrol şudur:", "q_en": "An accounts payable program posted a payable to a vendor not included in the online vendor master file. A control that would prevent this error is a", "options": [{"tr": "Geçerlilik kontrolü.", "en": "Validity check.", "cmt_tr": "Geçerlilik kontrolleri; kimlik numaralarının veya işlem kodlarının, doğru veya yetkilendirilmiş olduğu bilinen öğelerle karşılaştırılarak geçerliliğinin test edilmesidir.", "cmt_en": "Validity checks are tests of identification numbers or transaction codes for validity by comparison with items already known to be correct or authorized. For example, Social Security numbers on payroll input records can be compared with Social Security numbers authorized by the personnel department."}, {"tr": "Aralık kontrolü.", "en": "Range check.", "cmt_tr": "Aralık kontrolü, verilen bilgi için bilinen limitlere dayanır.", "cmt_en": "A range check is based on known limits for given information."}, {"tr": "Makullük testi.", "en": "Reasonableness test.", "cmt_tr": "Makullük testi, verilen bilgi için bilinen limitlere dayanır.", "cmt_en": "A reasonableness test is based on known limits for given information."}, {"tr": "Parite kontrolü.", "en": "Parity check.", "cmt_tr": "Parite kontrolü, bir karakter veya mesajdaki bitleri toplar ve toplamın tek mi çift mi olduğunu kontrol eder.", "cmt_en": "A parity check adds the bits in a character or message and checks the sum to determine if it is odd or even, depending on whether the computer has odd or even parity."}], "answer": 0}, {"q_tr": "Teslim alma departmanındaki bir çalışan, borçlar hesabı sistemine bir sevkiyat girerken sehven satın alma sipariş numarasını atlamıştır. Bu hatayı tespit etmek için en iyi sistem kontrolü şudur:", "q_en": "An employee in the receiving department keyed in a shipment to the accounts payable system and inadvertently omitted the purchase order number. The best systems control to detect this error is", "options": [{"tr": "Eksiksizlik testi.", "en": "Completeness test.", "cmt_tr": "Eksiksizlik testi, işlemeden önce tüm veri öğelerinin girilip girilmediğini kontrol eder. Etkileşimli bir sistem, teslim alma raporunu kabul etmeden önce kullanıcıya numarayı girmesini bildirmek üzere programlanabilir.", "cmt_en": "A completeness test checks that all data elements are entered before processing. An interactive system can be programmed to notify the user to enter the number before accepting the receiving report."}, {"tr": "Sıra kontrolü.", "en": "Sequence check.", "cmt_tr": "Sıra kontrolü, kayıtların sırasını test eder, eksikliğini değil.", "cmt_en": "A sequence check tests for the ordering, not omission, of records."}, {"tr": "Makullük testi.", "en": "Reasonableness test.", "cmt_tr": "Limit veya makullük testi, veri kalemlerinin değerlerini belirlenen limitlere göre kontrol eder.", "cmt_en": "A limit or reasonableness test checks the values of data items against established limits."}, {"tr": "Uyumluluk testi.", "en": "Compatibility test.", "cmt_tr": "Uyumluluk testi (alan kontrolü), karakterlerin bir alana uygun olup olmadığını belirler.", "cmt_en": "A compatibility test (field check) determines whether characters are appropriate to a field."}], "answer": 0}, {"q_tr": "Geçersiz veri girişini önlemek için bir banka, her hesap numarasının sonuna fazladan bir sayı eklemiş ve yeni numarayı bir algoritmaya tabi tutmuştur. Bu teknik şu şekilde bilinir:", "q_en": "To avoid invalid data input, a bank added an extra number at the end of each account number and subjected the new number to an algorithm. This technique is known as", "options": [{"tr": "Sıra kontrolü.", "en": "Sequence check.", "cmt_tr": "Sıra kontrolleri, kayıtların doğru sırada olduğunu belirler.", "cmt_en": "Sequence checks determine that records are in the proper order."}, {"tr": "Kontrol rakamı.", "en": "A check digit.", "cmt_tr": "Kendi kendini denetleyen rakamlar, hatalı kimlik numaralarını tespit etmek için kullanılabilir. Kontrol rakamı, bir kimlik kodunu takip eden ve diğer rakamlarla matematiksel ilişkisi olan fazladan bir referans numarasıdır.", "cmt_en": "Self-checking digits may be used to detect incorrect identification numbers. A check digit is an extra reference number that follows an identification code and bears a mathematical relationship to the other digits. The extra digit is input with the data. The identification code can be subjected to an algorithm and compared to the check digit."}, {"tr": "Çapraz toplam.", "en": "Cross-footing.", "cmt_tr": "Çapraz toplam, bir tutarı bileşenlerinin toplamıyla karşılaştırır.", "cmt_en": "Cross-footing compares an amount to the sum of its components."}, {"tr": "Alan kontrolü.", "en": "Field check.", "cmt_tr": "Alan kontrolleri, bir alandaki karakterlerin o alan için uygun türde (yani alfabe veya sayısal) olup olmadığını doğrulamak üzere yapılan testlerdir.", "cmt_en": "Field checks are tests of the characters in a field to verify that they are of an appropriate type for that field (i.e., alphabetic versus numeric)."}], "answer": 1}, {"q_tr": "Tamamen sayısal bir kimlik numarasına alfabe karakterlerinin girilmesini önlemek için hangi teknik kullanılabilir?", "q_en": "What technique could be used to prevent the input of alphabetic characters into an all- numeric identification number?", "options": [{"tr": "Sıra kontrolü.", "en": "A sequence check.", "cmt_tr": "Sıra kontrolü, kayıtların doğru sırada olduğunu belirler.", "cmt_en": "A sequence check determines that records are in proper order. Sequence checks are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field, called the “key,” before operations such as matching are performed. If the system discovers a record out of order, it may indicate that the files were not properly prepared for processing."}, {"tr": "Kontrol rakamı.", "en": "A check digit.", "cmt_tr": "Kontrol rakamı, hatalı bir kimlik numarasını tespit etmek için kullanılır.", "cmt_en": "A check digit is used to detect an incorrect ID number. Check digits are an extra reference number that follows an identification code and bears a mathematical relationship to the other digits. This extra digit is input with the data. The identification code can be subjected to an algorithm and compared to the check digit."}, {"tr": "Kayıt sayımı.", "en": "A record count.", "cmt_tr": "Kayıt sayımı, bir programın çalışması sırasında işlenen kayıt sayısının kontrol toplamıdır.", "cmt_en": "A record count is a control total of the number of records processed during the operation of a program."}, {"tr": "Biçim kontrolü.", "en": "A format check.", "cmt_tr": "Biçim kontrolünde bilgisayar, bireysel veri alanlarının karakter içeriği, uzunluğu veya işaretinin özelliklerini kontrol eder. Alan kontrolleri, işaret kontrolleri ve aralık kontrolleri, biçim kontrolleri örnekleridir.", "cmt_en": "With a format check, the computer checks the characteristics of the character content, length, or sign of the individual data fields. Field checks, sign checks, and range checks are examples of format checks."}], "answer": 3}, {"q_tr": "Masaüstü bilgisayardan yüklenen verilerin hatalı olabileceği endişesini en iyi ele alacak eylem aşağıdakilerden hangisidir?", "q_en": "Which of the following actions would best address a concern that data uploaded from a desktop computer may be erroneous?", "options": [{"tr": "Ana bilgisayar düzenli olarak yedeklenmelidir.", "en": "The mainframe computer should be backed up on a regular basis.", "cmt_tr": "Bu uygulama akıllıca bir kontroldür, ancak yüklenen verilerin bütünlüğü sorununu ele almaz.", "cmt_en": "This practice is a wise control, but it does not address the issue of the integrity of uploaded data. Backups cannot prevent or detect data-upload problems; they can only help correct data errors that a poor upload caused."}, {"tr": "Veri yüklenirken masaüstü bilgisayarda iki kişi bulunmalıdır.", "en": "Two persons should be present at the desktop computer when it is uploading data.", "cmt_tr": "Bu kontrol, veri yüklemelerinde hileyi önlemede bir ölçüde yardımcı olabilir, ancak hataları önlemede çok az işe yarar.", "cmt_en": "This control may be somewhat helpful in preventing fraud in data uploads, but it is of little use in preventing errors."}, {"tr": "Ana bilgisayar, verileri çevrimiçi veri girişinin gerektireceği aynı düzenleme ve doğrulama rutinlerine tabi tutmalıdır.", "en": "The mainframe computer should subject the data to the same edits and validation routines that online data entry would require.", "cmt_tr": "Çevrimiçi veri girişi için kullanılan aynı düzenleme ve doğrulama rutinleri, masaüstü bilgisayardan yüklenen verilere de uygulanmalıdır. Bu, veri hatalarını önlemeye yardımcı olabilir.", "cmt_en": "The same edits and validation routines used for online data entry should be applied to data uploaded from a desktop computer. This could help prevent data errors."}, {"tr": "Kullanıcıların işlenmiş verilerin rastgele bir örneğini gözden geçirmesi gereklidir.", "en": "Users should be required to review a random sample of processed data.", "cmt_tr": "Bu kontrol tespit edici niteliktedir, ancak hata zaten hatalı raporlara ve yönetim kararlarına neden olmuş olabilir.", "cmt_en": "This control is detective in nature, but the error could have already caused erroneous reports and management decisions. Having users try to find errors in uploaded data would be costly."}], "answer": 2}, {"q_tr": "Çevrimiçi kayıtların yetkisiz değiştirilmesi, aşağıdakilerin uygulanmasıyla önlenebilir:", "q_en": "Unauthorized alteration of online records can be prevented by employing", "options": [{"tr": "Tuş doğrulaması.", "en": "Key verification.", "cmt_tr": "Tuş doğrulaması, farklı bir kişinin seçili alanları yeniden girmesini gerektirerek doğruluğu sağlar.", "cmt_en": "Key verification ensures the accuracy of selected fields by requiring a different individual to rekey them."}, {"tr": "Bilgisayar sıra kontrolleri.", "en": "Computer sequence checks.", "cmt_tr": "Sıra kontrolleri, önceden atanmış belge seri numaralarının kullanımını kontrol ederek girdi veya güncelleme verilerinin eksiksizliğini sağlamak için kullanılır.", "cmt_en": "Sequence checks are used to ensure the completeness of input or update data by checking the use of preassigned document serial numbers."}, {"tr": "Bilgisayar eşleştirmesi.", "en": "Computer matching.", "cmt_tr": "Bilgisayar eşleştirmesi, girdi verilerinin seçili alanlarını bekleyen veya ana dosyadaki bilgilerle kontrol eder.", "cmt_en": "Computer matching entails checking selected fields of input data with information held in a suspense or master file."}, {"tr": "Veritabanı erişim kontrolleri.", "en": "Database access controls.", "cmt_tr": "Kullanıcılar veritabanlarına terminallerden yalnızca belirlenmiş tanıma ve yetkilendirme prosedürleri aracılığıyla erişebilir; böylece yetkisiz erişim önlenir.", "cmt_en": "Users can gain access to databases from terminals only through established recognition and authorization procedures; thus, unauthorized access is prevented."}], "answer": 3}, {"q_tr": "Aşağıdaki kontrollerden hangisi veri işlemenin güvenilirliğini ve doğruluğunu sağlamak için tasarlanmış bir işleme kontrolüdür?", "q_en": "Which of the following controls is a processing control designed to ensure the reliability and accuracy of data processing?", "options": [{"tr": "Limit Testi – Evet. Geçerlilik Kontrol Testi - Evet", "en": "Limit Test – Yes. Validity Check Test - Yes", "cmt_tr": "Bazı işleme kontrolleri, limit veya aralık ve geçerlilik kontrolleri gibi girdi sırasında yapılan adımları tekrarlar. Bu testler; alan kontrolleri, mali toplamlar, karma toplamlar, makullük, limit veya aralık kontrolleri, kayıt sayımları, kontrol rakamları, sıra kontrolleri, işaret kontrolleri ve geçerlilik kontrollerini kapsar.", "cmt_en": "Some processing controls repeat the steps performed during input, such as limit or range and validity checks. These tests include field checks, financial totals, hash totals, reasonableness, limit or range checks, record counts, check digits, sequence checks, sign checks, and validity checks."}, {"tr": "Limit Testi – Hayır. Geçerlilik Kontrol Testi - Hayır", "en": "Limit Test – No. Validity Check Test - No", "cmt_tr": "Limit testleri ve geçerlilik kontrolleri her ikisi de işleme kontrolleri türleridir.", "cmt_en": "Limit tests and validity checks are both types of processing controls."}, {"tr": "Limit Testi – Hayır. Geçerlilik Kontrol Testi - Evet", "en": "Limit Test – No. Validity Check Test - Yes", "cmt_tr": "Limit testleri ve geçerlilik kontrolleri her ikisi de işleme kontrolleri türleridir.", "cmt_en": "Limit tests and validity checks are both types of processing controls."}, {"tr": "Limit Testi – Evet. Geçerlilik Kontrol Testi – Hayır", "en": "Limit Test – Yes. Validity Check Test – No", "cmt_tr": "Limit testleri ve geçerlilik kontrolleri her ikisi de işleme kontrolleri türleridir.", "cmt_en": "Limit tests and validity checks are both types of processing controls."}], "answer": 0}, {"q_tr": "Bir çalışan tarih alanına sehven 31 Nisan girer. Aşağıdaki programlanmış düzenleme kontrollerinden hangisi bu hatayı tespit etmek için en iyi çözümü sunar?", "q_en": "An employee mistakenly enters April 31 in the date field. Which of the following programmed edit checks offers the best solution for detecting this error?", "options": [{"tr": "Çevrimiçi yönlendirme.", "en": "Online prompting.", "cmt_tr": "Çevrimiçi yönlendirme bu tür bir hatayı tespit etmeye yardımcı olsa da, verilen seçeneklerin en iyi kontrolü değildir.", "cmt_en": "Although online prompting may assist in detecting this type of error, it is not the best control of the given choices."}, {"tr": "Matematiksel doğruluk.", "en": "Mathematical accuracy.", "cmt_tr": "Matematiksel doğruluk, tarih alanı hatasını tespit etmekle ilgisizdir.", "cmt_en": "Mathematical accuracy would be irrelevant for detecting a date field error."}, {"tr": "Ön biçimlendirilmiş ekran.", "en": "Preformatted screen.", "cmt_tr": "Ön biçimlendirilmiş ekran, ilgili kağıt belgeye tam olarak benzer şekilde tasarlanabilir. Bu girdi kontrolü bu veri girişi hatasını tespit edebilse de daha iyi bir çözüm verilmiştir.", "cmt_en": "A preformatted screen may be designed to look exactly like the corresponding paper document. Although this input control might detect this data entry error, a better solution is given."}, {"tr": "Makullük.", "en": "Reasonableness.", "cmt_tr": "Limit (veya makullük) testleri, verilen bilgi için bilinen limitlere dayalı olarak belirli girişlerin sistem tarafından reddedilmesine olanak tanıyan düzenleme kontrolleridir. Örneğin, tarih alanında 31 Nisan girişi, Nisan ay sonu limiti 30 Nisan olarak programlanmışsa reddedilir.", "cmt_en": "Limit (or reasonableness) tests are edit checks that allow certain entries to be rejected by the system, based on known limit
