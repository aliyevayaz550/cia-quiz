<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 8</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 8</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">105 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Study Unit 8</span></h1>
    <p id="welcome-desc">2 mövzu, 137 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">2</span><span class="ws-label">Mövzu</span></div>
      <div class="ws-item"><span class="ws-num">137</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">548</span><span class="ws-label">İzah</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

duct returns, and evaluating complaints are post-action controls intended to eliminate deviations in future cycles of the process under control."}, {"tr": "Feedforward control.", "en": "Feedforward control.", "cmt_tr": "Feedforward controls anticipate problems before they occur.", "cmt_en": "Feedforward controls anticipate problems before they occur."}, {"tr": "Production control.", "en": "Production control.", "cmt_tr": "Customer complaints are not part of production control.", "cmt_en": "Customer complaints are not part of production control."}, {"tr": "Inventory control.", "en": "Inventory control.", "cmt_tr": "The three types of control are feedforward, concurrent, and feedback.", "cmt_en": "The three types of control are feedforward, concurrent, and feedback."}], "answer": 0}, {"q_tr": "The use of financial statement analysis, quality control procedures, and employee performance evaluations are all examples of", "q_en": "The use of financial statement analysis, quality control procedures, and employee performance evaluations are all examples of", "options": [{"tr": "Preliminary controls.", "en": "Preliminary controls.", "cmt_tr": "Feedforward (preliminary) controls anticipate and avoid future performance problems, e.g., budgeting.", "cmt_en": "Feedforward (preliminary) controls anticipate and avoid future performance problems, e.g., budgeting."}, {"tr": "Concurrent controls.", "en": "Concurrent controls.", "cmt_tr": "Concurrent controls are applied midstream, e.g., inspection on an assembly line.", "cmt_en": "Concurrent controls are applied midstream, e.g., inspection on an assembly line."}, {"tr": "Feedback controls.", "en": "Feedback controls.", "cmt_tr": "A feedback control operates to provide information about processes that have already occurred.", "cmt_en": "A feedback control operates to provide information about processes that have already occurred."}, {"tr": "Feedforward controls.", "en": "Feedforward controls.", "cmt_tr": "Feedforward (preliminary) controls anticipate and avoid future performance problems, e.g., budgeting.", "cmt_en": "Feedforward (preliminary) controls anticipate and avoid future performance problems, e.g., budgeting."}], "answer": 2}, {"q_tr": "The internal audit function of an organization is an integral part of the organization’s risk management, control, and governance processes because it evaluates and contributes to the improvement of those processes. Select the type of control provided when the internal audit function conducts a systems development analysis.", "q_en": "The internal audit function of an organization is an integral part of the organization’s risk management, control, and governance processes because it evaluates and contributes to the improvement of those processes. Select the type of control provided when the internal audit function conducts a systems development analysis.", "options": [{"tr": "Feedback control.", "en": "Feedback control.", "cmt_tr": "A feedback control provides information on the results of a completed activity.", "cmt_en": "A feedback control provides information on the results of a completed activity."}, {"tr": "Strategic plans.", "en": "Strategic plans.", "cmt_tr": "Strategic plans are developed by senior management to provide long-range guidance for the organization.", "cmt_en": "Strategic plans are developed by senior management to provide long-range guidance for the organization."}, {"tr": "Policies and procedures.", "en": "Policies and procedures.", "cmt_tr": "Policies and procedures are developed by management. They are the most basic control subsystem of an organization.", "cmt_en": "Policies and procedures are developed by management. They are the most basic control subsystem of an organization."}, {"tr": "Feedforward control.", "en": "Feedforward control.", "cmt_tr": "A feedforward control provides information on potential problems so that corrective action can be taken in anticipation, rather than as a result, of a problem.", "cmt_en": "A feedforward control provides information on potential problems so that corrective action can be taken in anticipation, rather than as a result, of a problem."}], "answer": 3}, {"q_tr": "Of the following, the controls that are often difficult for internal auditors to evaluate because of the lack of criteria or standards are", "q_en": "Of the following, the controls that are often difficult for internal auditors to evaluate because of the lack of criteria or standards are", "options": [{"tr": "Preventive controls.", "en": "Preventive controls.", "cmt_tr": "Preventive controls keep loss exposures from occurring. They include not only operating controls but also those for which quantifiable standards are readily determined.", "cmt_en": "Preventive controls keep loss exposures from occurring. They include not only operating controls but also those for which quantifiable standards are readily determined."}, {"tr": "Financial controls.", "en": "Financial controls.", "cmt_tr": "Financial controls, e.g., a budget, are subject to quantifiable standards that are relatively easy to measure.", "cmt_en": "Financial controls, e.g., a budget, are subject to quantifiable standards that are relatively easy to measure."}, {"tr": "Corrective controls.", "en": "Corrective controls.", "cmt_tr": "Corrective controls are post-detection or remedial controls. They may include controls for which standards are easily defined, such as financial controls.", "cmt_en": "Corrective controls are post-detection or remedial controls. They may include controls for which standards are easily defined, such as financial controls."}, {"tr": "Operating controls.", "en": "Operating controls.", "cmt_tr": "Operating controls are those used in the management processes of directing and controlling and are based on comparison of results with standards. As an activity becomes less mechanical, however, standards become more difficult to determine. Control standards for security, for example, are less easily developed than for the output per hour of a machine because the degree of security achieved is not readily measurable.", "cmt_en": "Operating controls are those used in the management processes of directing and controlling and are based on comparison of results with standards. As an activity becomes less mechanical, however, standards become more difficult to determine. Control standards for security, for example, are less easily developed than for the output per hour of a machine because the degree of security achieved is not readily measurable."}], "answer": 3}, {"q_tr": "When a copy of the sale invoice is not received by an organization’s shipping department, an employee requests the document from the proper authority. This process is a(n)", "q_en": "When a copy of the sale invoice is not received by an organization’s shipping department, an employee requests the document from the proper authority. This process is a(n)", "options": [{"tr": "Directive, detective control.", "en": "Directive, detective control.", "cmt_tr": "The control is detective, but it is not directive. A directive control causes or encourages a desirable event to occur.", "cmt_en": "The control is detective, but it is not directive. A directive control causes or encourages a desirable event to occur."}, {"tr": "Passive, mitigating control.", "en": "Passive, mitigating control.", "cmt_tr": "The control is neither passive nor mitigating. It is detected by the clerk in a conscious effort to", "cmt_en": "The control is neither passive nor mitigating. It is detected by the clerk in a conscious effort to"}, {"tr": "Active, detective control.", "en": "Active, detective control.", "cmt_tr": "When shipping documents are not received in the shipping department (such as copies of the sales invoice, customer order form, and bill of lading), the clerk should attempt to obtain the proper documentation from the originating organization. This type of control is detective because it detects and attempts to correct an undesirable event that has occurred. It is also active because it takes a conscious intervention by the clerk to ensure the documentation is received.", "cmt_en": "When shipping documents are not received in the shipping department (such as copies of the sales invoice, customer order form, and bill of lading), the clerk should attempt to obtain the proper documentation from the originating organization. This type of control is detective because it detects and attempts to correct an undesirable event that has occurred. It is also active because it takes a conscious intervention by the clerk to ensure the documentation is received."}, {"tr": "Detective, preventive control.", "en": "Detective, preventive control.", "cmt_tr": "The control is not preventive. It does not deter an undesirable event.", "cmt_en": "The control is not preventive. It does not deter an undesirable event."}], "answer": 2}, {"q_tr": "An adequate and effective system of internal control provides reasonable assurance that objectives will be achieved. Controls may be preventive, detective, or directive. Which of the following is a detective control for the procurement function?", "q_en": "An adequate and effective system of internal control provides reasonable assurance that objectives will be achieved. Controls may be preventive, detective, or directive. Which of the following is a detective control for the procurement function?", "options": [{"tr": "Goods received are counted and compared with quantities on purchase order and receiving reports.", "en": "Goods received are counted and compared with quantities on purchase order and receiving reports.", "cmt_tr": "Detective controls are designed to detect and correct undesirable events that have occurred. Accounting for all goods received and comparing quantities on purchase orders and receiving reports is an example.", "cmt_en": "Detective controls are designed to detect and correct undesirable events that have occurred. Accounting for all goods received and comparing quantities on purchase orders and receiving reports is an example."}, {"tr": "The procurement function is organizationally separate from receiving, disbursing, and accounting.", "en": "The procurement function is organizationally separate from receiving, disbursing, and accounting.", "cmt_tr": "Segregation of duties is a preventive control. Preventive controls deter undesirable events from occurring.", "cmt_en": "Segregation of duties is a preventive control. Preventive controls deter undesirable events from occurring."}, {"tr": "Review and approval of each procurement action is required prior to the final issuance of a purchase order.", "en": "Review and approval of each procurement action is required prior to the final issuance of a purchase order.", "cmt_tr": "Review and approval of each procurement action is a preventive control.", "cmt_en": "Review and approval of each procurement action is a preventive control."}, {"tr": "Prenumbered standard purchase order forms include all relevant terms required to be used in all applicable instances.", "en": "Prenumbered standard purchase order forms include all relevant terms required to be used in all applicable instances.", "cmt_tr": "Using prenumbered standard purchase order forms is a preventive control.", "cmt_en": "Using prenumbered standard purchase order forms is a preventive control."}], "answer": 0}, {"q_tr": "Which of the following would be a preventive control?", "q_en": "Which of the following would be a preventive control?", "options": [{"tr": "Approving customer credit prior to shipping merchandise.", "en": "Approving customer credit prior to shipping merchandise.", "cmt_tr": "Preventive controls deter the occurrence of unwanted events. In contrast, detective controls alert the proper people after an unwanted event. Approving customer credit prior to shipping prevents merchandise from being shipped on credit to customers who are likely to default on making future payment.", "cmt_en": "Preventive controls deter the occurrence of unwanted events. In contrast, detective controls alert the proper people after an unwanted event. Approving customer credit prior to shipping prevents merchandise from being shipped on credit to customers who are likely to default on making future payment."}, {"tr": "Reviewing the sequence of prenumbered documents.", "en": "Reviewing the sequence of prenumbered documents.", "cmt_tr": "Reviewing the sequence of prenumbered documents is a detective control designed to detect potentially fraudulent transactions.", "cmt_en": "Reviewing the sequence of prenumbered documents is a detective control designed to detect potentially fraudulent transactions."}, {"tr": "Comparing a bank deposit slip with the total cash received as noted on a prelisting sheet prepared in the mail room.", "en": "Comparing a bank deposit slip with the total cash received as noted on a prelisting sheet prepared in the mail room.", "cmt_tr": "Comparing a bank deposit slip with the total cash received as noted on a prelisting sheet prepared in the mail room is a detective control designed to detect whether less cash was deposited than received.", "cmt_en": "Comparing a bank deposit slip with the total cash received as noted on a prelisting sheet prepared in the mail room is a detective control designed to detect whether less cash was deposited than received."}, {"tr": "Scanning the general ledger for accounts with unusually high or low balances. Study Unit 8: Controls: Types | Subunit 2: Types of Controls", "en": "Scanning the general ledger for accounts with unusually high or low balances. Study Unit 8: Controls: Types | Subunit 2: Types of Controls", "cmt_tr": "Scanning the general ledger for accounts with unusually high or low balances is a detective control designed to detect accounts with inaccurate balances.", "cmt_en": "Scanning the general ledger for accounts with unusually high or low balances is a detective control designed to detect accounts with inaccurate balances."}], "answer": 0}, {"q_tr": "An auditor is planning an audit of a company’s recently implemented electronic data interchange (EDI) system for purchasing and billing. Which of the following controls over the accuracy of raw-material purchases would be least important in this environment?", "q_en": "An auditor is planning an audit of a company’s recently implemented electronic data interchange (EDI) system for purchasing and billing. Which of the following controls over the accuracy of raw-material purchases would be least important in this environment?", "options": [{"tr": "Computer system controls.", "en": "Computer system controls.", "cmt_tr": "Computer system controls (e.g., input, processing, and output controls) are important automated controls in an EDI system.", "cmt_en": "Computer system controls (e.g., input, processing, and output controls) are important automated controls in an EDI system."}, {"tr": "Controls contained within the EDI vendor software.", "en": "Controls contained within the EDI vendor software.", "cmt_tr": "At a minimum, the controls for an EDI system should include the controls contained within the EDI software.", "cmt_en": "At a minimum, the controls for an EDI system should include the controls contained within the EDI software."}, {"tr": "Adequate audit trails.", "en": "Adequate audit trails.", "cmt_tr": "An audit trail (or management trail) is a processing history control that enables management to track transactions from their source to their output. Such controls are very important in an EDI system.", "cmt_en": "An audit trail (or management trail) is a processing history control that enables management to track transactions from their source to their output. Such controls are very important in an EDI system."}, {"tr": "Management review of individual transactions.", "en": "Management review of individual transactions.", "cmt_tr": "Management review of individual transactions (a manual control) is less important in an EDI system than automated controls applicable to all transactions.", "cmt_en": "Management review of individual transactions (a manual control) is less important in an EDI system than automated controls applicable to all transactions."}], "answer": 3}, {"q_tr": "Which of the following is an example of a detective control?", "q_en": "Which of the following is an example of a detective control?", "options": [{"tr": "The accounting department has a procedure for voiding and issuing replacement checks.", "en": "The accounting department has a procedure for voiding and issuing replacement checks.", "cmt_tr": "The procedure in the accounting department for voiding and issuing replacement checks is a directive control. A directive control is designed to cause or encourage a desirable event to occur. Examples are policy and procedure manuals, laws and regulations, and employee training.", "cmt_en": "The procedure in the accounting department for voiding and issuing replacement checks is a directive control. A directive control is designed to cause or encourage a desirable event to occur. Examples are policy and procedure manuals, laws and regulations, and employee training."}, {"tr": "The manager is given a check log reconciliation at the close of each business day.", "en": "The manager is given a check log reconciliation at the close of each business day.", "cmt_tr": "Providing the manager with a check log reconciliation at the close of each business day is a detective control. A detective control uncovers an error or irregularity that has already occurred. It is designed to detect undesirable events. Examples of detective controls include physical counts, reconciliations, reviews and comparisons, exception reports, and security cameras.", "cmt_en": "Providing the manager with a check log reconciliation at the close of each business day is a detective control. A detective control uncovers an error or irregularity that has already occurred. It is designed to detect undesirable events. Examples of detective controls include physical counts, reconciliations, reviews and comparisons, exception reports, and security cameras."}, {"tr": "Checks are pre-numbered and kept in a locked cabinet.", "en": "Checks are pre-numbered and kept in a locked cabinet.", "cmt_tr": "The pre-numbering of checks and keeping checks in a locked cabinet are preventive controls. Preventive controls deter the occurrence of unwanted events and are designed to prevent errors, fraud, theft, and misstatements. Passwords, access codes, and locked doors are all examples of preventive controls.", "cmt_en": "The pre-numbering of checks and keeping checks in a locked cabinet are preventive controls. Preventive controls deter the occurrence of unwanted events and are designed to prevent errors, fraud, theft, and misstatements. Passwords, access codes, and locked doors are all examples of preventive controls."}, {"tr": "The staff accountant was warned about printing a check prior to receiving authorization.", "en": "The staff accountant was warned about printing a check prior to receiving authorization.", "cmt_tr": "Warning the staff accountant for performing an action prior to receiving authorization is a corrective control. A corrective control remedies an error or irregularity and helps mitigate damage once the problem has materialized. An example would be the enforcement of policies and procedures.", "cmt_en": "Warning the staff accountant for performing an action prior to receiving authorization is a corrective control. A corrective control remedies an error or irregularity and helps mitigate damage once the problem has materialized. An example would be the enforcement of policies and procedures."}], "answer": 1}, {"q_tr": "An employee steals money from his company’s bank deposits, then makes up for the stolen cash with cash from the next day’s deposits. If there is not enough cash the next day, the employee has to wait another day to make up for the deposit. And the cycle continues. This can go undetected for months. Which of the following controls could the organization implement as a preventive control to address this situation?", "q_en": "An employee steals money from his company’s bank deposits, then makes up for the stolen cash with cash from the next day’s deposits. If there is not enough cash the next day, the employee has to wait another day to make up for the deposit. And the cycle continues. This can go undetected for months. Which of the following controls could the organization implement as a preventive control to address this situation?", "options": [{"tr": "The accounting supervisor is notified when the checking account amount drops below a certain level.", "en": "The accounting supervisor is notified when the checking account amount drops below a certain level.", "cmt_tr": "Alerting the accounting supervisor when the bank balance drops below a preset limit is an", "cmt_en": "Alerting the accounting supervisor when the bank balance drops below a preset limit is an"}, {"tr": "Weekly, a manager at the main office checks deposit validation dates received from the bank with the sales deposit records.", "en": "Weekly, a manager at the main office checks deposit validation dates received from the bank with the sales deposit records.", "cmt_tr": "Comparing the dates of the deposits from the bank with expected dates of the sales deposits is a compensatory control. Compensatory or mitigative controls may reduce risk when the primary controls are ineffective. The red flag occurs when the bank consistently validates deposits being made several days after they should have been.", "cmt_en": "Comparing the dates of the deposits from the bank with expected dates of the sales deposits is a compensatory control. Compensatory or mitigative controls may reduce risk when the primary controls are ineffective. The red flag occurs when the bank consistently validates deposits being made several days after they should have been."}, {"tr": "Daily, the accounting staff at the organization’s main office reconcile the amount deposited with the cash register tape from the day’s sales.", "en": "Daily, the accounting staff at the organization’s main office reconcile the amount deposited with the cash register tape from the day’s sales.", "cmt_tr": "Reconciling the amount deposited with the cash register tape from the day’s sales by a person different from the one who makes the deposit is a compensatory control.", "cmt_en": "Reconciling the amount deposited with the cash register tape from the day’s sales by a person different from the one who makes the deposit is a compensatory control."}, {"tr": "Deposit slips and deposit bags have sequential numbers. The manager is required to write the deposit bag number on the deposit slip. The reason for any voided deposit slips or bags is to be documented.", "en": "Deposit slips and deposit bags have sequential numbers. The manager is required to write the deposit bag number on the deposit slip. The reason for any voided deposit slips or bags is to be documented.", "cmt_tr": "Preventive controls are actions taken prior to the occurrence of events. They are designed with the intent of stopping errors, irregularities, or undesirable events from occurring. An example of preventive control is the segregation of the duties of authorization, recordkeeping, and custody. When numbered deposit slips and deposit bags are used, any missing or voided numbers need to be explained. Additionally, recording the deposit bag number on the deposit slip deters the employee from taking cash from or changing the deposit.", "cmt_en": "Preventive controls are actions taken prior to the occurrence of events. They are designed with the intent of stopping errors, irregularities, or undesirable events from occurring. An example of preventive control is the segregation of the duties of authorization, recordkeeping, and custody. When numbered deposit slips and deposit bags are used, any missing or voided numbers need to be explained. Additionally, recording the deposit bag number on the deposit slip deters the employee from taking cash from or changing the deposit."}], "answer": 3}, {"q_tr": "Which of the following is an objective of application controls?", "q_en": "Which of the following is an objective of application controls?", "options": [{"tr": "Providing assurance that data centers and network operations are secure.", "en": "Providing assurance that data centers and network operations are secure.", "cmt_tr": "Providing assurance that data centers and network operations are secure is an IT general control.", "cmt_en": "Providing assurance that data centers and network operations are secure is an IT general control."}, {"tr": "Ensuring that computer maintenance is done on a regular basis.", "en": "Ensuring that computer maintenance is done on a regular basis.", "cmt_tr": "Ensuring that computer maintenance is done on a regular basis is associated with IT general controls.", "cmt_en": "Ensuring that computer maintenance is done on a regular basis is associated with IT general controls."}, {"tr": "Establishing logical access controls over infrastructure, applications, and data.", "en": "Establishing logical access controls over infrastructure, applications, and data.", "cmt_tr": "Establishing logical access controls over infrastructure, applications, and data is an IT general control. Application controls are those that pertain to the scope of individual business processes or application systems. The objective of application controls is to ensure that (1) input data are accurate, complete, authorized, and correct; (2) data are processed as intended in an acceptable time period; (3) data stored are accurate and complete; (4) outputs are accurate and complete; and (5) a record is maintained to track the process of data from input to storage and to the eventual output.", "cmt_en": "Establishing logical access controls over infrastructure, applications, and data is an IT general control. Application controls are those that pertain to the scope of individual business processes or application systems. The objective of application controls is to ensure that (1) input data are accurate, complete, authorized, and correct; (2) data are processed as intended in an acceptable time period; (3) data stored are accurate and complete; (4) outputs are accurate and complete; and (5) a record is maintained to track the process of data from input to storage and to the eventual output."}, {"tr": "Confirming input data are accurate, complete, authorized, and correct", "en": "Confirming input data are accurate, complete, authorized, and correct", "cmt_tr": "Confirming that input data are accurate, complete, authorized, and correct is an objective of application controls. Input controls are designed and operating effectively to ensure that (1) all", "cmt_en": "Confirming that input data are accurate, complete, authorized, and correct is an objective of application controls. Input controls are designed and operating effectively to ensure that (1) all"}], "answer": 3}, {"q_tr": "Which of the following describes a characteristic of a control matrix?", "q_en": "Which of the following describes a characteristic of a control matrix?", "options": [{"tr": "Transactions are accumulated for processing.", "en": "Transactions are accumulated for processing.", "cmt_tr": "With batch input controls, transactions are accumulated and submitted to the computer as a single batch. The user cannot influence the process once the job has begun. Batch processing is efficient for such applications as payroll because large numbers of routine transactions must be processed on a regular schedule. This is not a characteristic of a control matrix.", "cmt_en": "With batch input controls, transactions are accumulated and submitted to the computer as a single batch. The user cannot influence the process once the job has begun. Batch processing is efficient for such applications as payroll because large numbers of routine transactions must be processed on a regular schedule. This is not a characteristic of a control matrix."}, {"tr": "The data entered into an input field is compared to a table of valid values for that field.", "en": "The data entered into an input field is compared to a table of valid values for that field.", "cmt_tr": "Validity checks compare the data entered in a given field with a table of valid values for that field. Validity checks are used for controlling online input. This is not a characteristic of a control matrix.", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. Validity checks are used for controlling online input. This is not a characteristic of a control matrix."}, {"tr": "Track the number of records processed by the system.", "en": "Track the number of records processed by the system.", "cmt_tr": "Record counts is a batch input control that tracks the number of records processed by the system for comparison to the number that the user expected to be processed. This is not a characteristic of a control matrix.", "cmt_en": "Record counts is a batch input control that tracks the number of records processed by the system for comparison to the number that the user expected to be processed. This is not a characteristic of a control matrix."}, {"tr": "More than one control may be needed to adequately address a single risk.", "en": "More than one control may be needed to adequately address a single risk.", "cmt_tr": "A control matrix is useful for matching controls with risks. Controls do not necessarily match risks one-to-one. Certain controls may address more than one risk, and more than one control may be needed to address a single risk.", "cmt_en": "A control matrix is useful for matching controls with risks. Controls do not necessarily match risks one-to-one. Certain controls may address more than one risk, and more than one control may be needed to address a single risk."}], "answer": 3}, {"q_tr": "Which of the following input controls are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field?", "q_en": "Which of the following input controls are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field?", "options": [{"tr": "Sequence checks.", "en": "Sequence checks.", "cmt_tr": "Sequence checks are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field. If the system discovers a record out of order, it may indicate that the files were not properly prepared for processing.", "cmt_en": "Sequence checks are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field. If the system discovers a record out of order, it may indicate that the files were not properly prepared for processing."}, {"tr": "Validity checks.", "en": "Validity checks.", "cmt_tr": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, a customer number must already be on the list of approved customers.", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, a customer number must already be on the list of approved customers."}, {"tr": "Range checks.", "en": "Range checks.", "cmt_tr": "Range (reasonableness) checks are based on known limits for given information. Anything outside the range requires management authorization. For example, a quantity field may allow numbers from 0 to 100, with anything over 100 requiring approval.", "cmt_en": "Range (reasonableness) checks are based on known limits for given information. Anything outside the range requires management authorization. For example, a quantity field may allow numbers from 0 to 100, with anything over 100 requiring approval."}, {"tr": "Format checks.", "en": "Format checks.", "cmt_tr": "Format (field) checks are tests of the characters in a field to verify that they are of an appropriate type for that field. For example, an alphabetic character field would not allow a number to be entered.", "cmt_en": "Format (field) checks are tests of the characters in a field to verify that they are of an appropriate type for that field. For example, an alphabetic character field would not allow a number to be entered."}], "answer": 0}, {"q_tr": "An organization requires mutual respect among all employees. Making false, defamatory, or malicious statements about another employee is strictly prohibited. This policy is an example of controls at which level?", "q_en": "An organization requires mutual respect among all employees. Making false, defamatory, or malicious statements about another employee is strictly prohibited. This policy is an example of controls at which level?", "options": [{"tr": "Transaction-level controls.", "en": "Transaction-level controls.", "cmt_tr": "Transaction-level controls are designed to achieve transaction objectives and to address risks specific to transactions. Examples include application controls, exception reports, and segregation of duties. The policy described is an entity-level governance control.", "cmt_en": "Transaction-level controls are designed to achieve transaction objectives and to address risks specific to transactions. Examples include application controls, exception reports, and segregation of duties. The policy described is an entity-level governance control."}, {"tr": "Process-level controls.", "en": "Process-level controls.", "cmt_tr": "Process-level controls are built to achieve process objectives and to address process risks. Examples include physical inventory counts, performance assessment, and review of revenue center reports. The policy described is an entity-level governance control.", "cmt_en": "Process-level controls are built to achieve process objectives and to address process risks. Examples include physical inventory counts, performance assessment, and review of revenue center reports. The policy described is an entity-level governance control."}, {"tr": "Entity-level management oversight controls.", "en": "Entity-level management oversight controls.", "cmt_tr": "Entity-level management oversight controls are implemented by management at the business unit level to achieve business unit objectives and address business unit risks. Examples include IT general controls and period-end controls. The policy described is an entity-level governance control.", "cmt_en": "Entity-level management oversight controls are implemented by management at the business unit level to achieve business unit objectives and address business unit risks. Examples include IT general controls and period-end controls. The policy described is an entity-level governance control."}, {"tr": "Entity-level governance controls.", "en": "Entity-level governance controls.", "cmt_tr": "Entity-level governance controls are established by the board of directors at the highest level (governance level). They include organizational policies and procedures that define the entity’s culture and communicate its expectations. Examples include IT policies, the code of conduct, oversight of controls, and setting the risk appetite. The requirement of mutual respect among all employees is an entity-wide policy related to the organizational code of conduct. It is therefore an entity-level governance control.", "cmt_en": "Entity-level governance controls are established by the board of directors at the highest level (governance level). They include organizational policies and procedures that define the entity’s culture and communicate its expectations. Examples include IT policies, the code of conduct, oversight of controls, and setting the risk appetite. The requirement of mutual respect among all employees is an entity-wide policy related to the organizational code of conduct. It is therefore an entity-level governance control."}], "answer": 3}, {"q_tr": "One accountant is responsible for collecting cash receipts from the cashier, recording cash in the accounting system, and depositing cash in the organization’s bank account. At which level is control lacking?", "q_en": "One accountant is responsible for collecting cash receipts from the cashier, recording cash in the accounting system, and depositing cash in the organization’s bank account. At which level is control lacking?", "options": [{"tr": "Transaction-level controls.", "en": "Transaction-level controls.", "cmt_tr": "Transaction-level controls are designed to achieve transaction objectives and to address risks specific to transactions. Examples include application controls, exception reports, and segregation of duties. Because the same employee is responsible for cash custody and recordkeeping, segregation of duties does not exist. The organization therefore lacks transaction- level control.", "cmt_en": "Transaction-level controls are designed to achieve transaction objectives and to address risks specific to transactions. Examples include application controls, exception reports, and segregation of duties. Because the same employee is responsible for cash custody and recordkeeping, segregation of duties does not exist. The organization therefore lacks transaction- level control."}, {"tr": "Process-level controls.", "en": "Process-level controls.", "cmt_tr": "Process-level controls are designed to achieve process objectives and to address process risks. Examples include physical inventory counts, performance assessment, and review of revenue center reports. The control deficiency described requires transaction-level controls.", "cmt_en": "Process-level controls are designed to achieve process objectives and to address process risks. Examples include physical inventory counts, performance assessment, and review of revenue center reports. The control deficiency described requires transaction-level controls."}, {"tr": "Entity-level management oversight controls.", "en": "Entity-level management oversight controls.", "cmt_tr": "Entity-level management oversight controls are implemented by management at the business unit level to achieve business unit objectives and address business unit risks. Examples include IT general controls and period-end controls. The control deficiency described requires transaction- level controls.", "cmt_en": "Entity-level management oversight controls are implemented by management at the business unit level to achieve business unit objectives and address business unit risks. Examples include IT general controls and period-end controls. The control deficiency described requires transaction- level controls."}, {"tr": "Entity-level governance controls.", "en": "Entity-level governance controls.", "cmt_tr": "Entity-level governance controls are established by the board of directors at the highest level (governance level). They include organizational policies and procedures that define the entity’s culture and communicate its expectations. Examples include IT policies, the code of conduct, oversight of controls, and setting the risk appetite. The control deficiency described requires transaction-level controls.", "cmt_en": "Entity-level governance controls are established by the board of directors at the highest level (governance level). They include organizational policies and procedures that define the entity’s culture and communicate its expectations. Examples include IT policies, the code of conduct, oversight of controls, and setting the risk appetite. The control deficiency described requires transaction-level controls."}], "answer": 0}, {"q_tr": "Which of the following controls is preventive?", "q_en": "Which of the following controls is preventive?", "options": [{"tr": "Requiring two persons to open mail.", "en": "Requiring two persons to open mail.", "cmt_tr": "Preventive controls have the objective of preventing errors or fraud that could result in a misstatement of the financial statements. Detective controls have the objective of detecting errors and fraud that have already occurred that could misstate the financial statements. Assigning two individuals to open mail is an attempt to prevent misstatement of cash receipts.", "cmt_en": "Preventive controls have the objective of preventing errors or fraud that could result in a misstatement of the financial statements. Detective controls have the objective of detecting errors and fraud that have already occurred that could misstate the financial statements. Assigning two individuals to open mail is an attempt to prevent misstatement of cash receipts."}, {"tr": "Reconciling the accounts receivable subsidiary file with the control account.", "en": "Reconciling the accounts receivable subsidiary file with the control account.", "cmt_tr": "Reconciling the subsidiary file with the master file may detect and lead to the correction of errors, but the control does not prevent errors.", "cmt_en": "Reconciling the subsidiary file with the master file may detect and lead to the correction of errors, but the control does not prevent errors."}, {"tr": "Using batch totals.", "en": "Using batch totals.", "cmt_tr": "The use of batch totals may detect a missing or lost document but will not necessarily prevent a document from becoming lost.", "cmt_en": "The use of batch totals may detect a missing or lost document but will not necessarily prevent a document from becoming lost."}, {"tr": "Preparing bank reconciliations.", "en": "Preparing bank reconciliations.", "cmt_tr": "Bank reconciliations disclose errors in the accounts but have no preventive effect.", "cmt_en": "Bank reconciliations disclose errors in the accounts but have no preventive effect."}], "answer": 0}, {"q_tr": "Memo posting used by banks", "q_en": "Memo posting used by banks", "options": [{"tr": "Corrects negative effects of unwanted events.", "en": "Corrects negative effects of unwanted events.", "cmt_tr": "Corrective controls correct the negative effects of unwanted events. An example is a requirement that all cost variances over a certain amount be justified.", "cmt_en": "Corrective controls correct the negative effects of unwanted events. An example is a requirement that all cost variances over a certain amount be justified."}, {"tr": "Updates databases in online, real-time processing.", "en": "Updates databases in online, real-time processing.", "cmt_tr": "In an online, real-time system, the database is updated immediately upon entry of the transaction by the operator. Such systems are referred to as online transaction processing, or OLTP, systems.", "cmt_en": "In an online, real-time system, the database is updated immediately upon entry of the transaction by the operator. Such systems are referred to as online transaction processing, or OLTP, systems."}, {"tr": "Is used in batch processing.", "en": "Is used in batch processing.", "cmt_tr": "Memo posting is used by banks for financial transactions when batch processing is used. It posts temporary credit or debit transactions to an account if the complete posting to update the balance will be done as part of the end-of-day batch processing. Information can be viewed immediately after updating. Memo posting is an intermediate step between batch processing and real-time processing.", "cmt_en": "Memo posting is used by banks for financial transactions when batch processing is used. It posts temporary credit or debit transactions to an account if the complete posting to update the balance will be done as part of the end-of-day batch processing. Information can be viewed immediately after updating. Memo posting is an intermediate step between batch processing and real-time processing."}, {"tr": "Is used as a compensatory control.", "en": "Is used as a compensatory control.", "cmt_tr": "Compensatory (mitigative) controls may reduce risk when the primary controls are ineffective. However, they do not, by themselves, reduce risk to an acceptable level. An example is the lack of segregation of duties when a store clerk is the only employee present at closing.", "cmt_en": "Compensatory (mitigative) controls may reduce risk when the primary controls are ineffective. However, they do not, by themselves, reduce risk to an acceptable level. An example is the lack of segregation of duties when a store clerk is the only employee present at closing."}], "answer": 2}, {"q_tr": "Online input controls most likely include", "q_en": "Online input controls most likely include", "options": [{"tr": "Hash totals.", "en": "Hash totals.", "cmt_tr": "Hash totals are control totals without a defined meaning, such as the total of vendor numbers or invoice numbers, that are used to verify the completeness of the data.", "cmt_en": "Hash totals are control totals without a defined meaning, such as the total of vendor numbers or invoice numbers, that are used to verify the completeness of the data."}, {"tr": "A user review.", "en": "A user review.", "cmt_tr": "Output controls ensure that processing results are complete, accurate, and properly distributed. An important output control is user review. Users should be able to determine when output is incomplete or not reasonable, particularly when the user prepared the input. Thus, users as well as computer personnel have a quality assurance function.", "cmt_en": "Output controls ensure that processing results are complete, accurate, and properly distributed. An important output control is user review. Users should be able to determine when output is incomplete or not reasonable, particularly when the user prepared the input. Thus, users as well as computer personnel have a quality assurance function."}, {"tr": "An audit trail.", "en": "An audit trail.", "cmt_tr": "An audit (management) trail consists of processing history controls that enable management to track transactions from their source to their output.", "cmt_en": "An audit (management) trail consists of processing history controls that enable management to track transactions from their source to their output."}, {"tr": "A validity check. Study Unit 8: Controls: Types | Subunit 2: Types of Controls", "en": "A validity check. Study Unit 8: Controls: Types | Subunit 2: Types of Controls", "cmt_tr": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, the vendor number on a request to cut a check must match the table of current vendors, and the invoice number must match the approved invoice table.", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, the vendor number on a request to cut a check must match the table of current vendors, and the invoice number must match the approved invoice table."}], "answer": 3}, {"q_tr": "Batch processing", "q_en": "Batch processing", "options": [{"tr": "Is not used by most businesses because it reduces the audit trail.", "en": "Is not used by most businesses because it reduces the audit trail.", "cmt_tr": "Batch processing provides as much of an audit trail as any computerized operation.", "cmt_en": "Batch processing provides as much of an audit trail as any computerized operation."}, {"tr": "Allows users to inquire about groups of information contained in the system.", "en": "Allows users to inquire about groups of information contained in the system.", "cmt_tr": "Batch processing refers to the input of data, not inquiry.", "cmt_en": "Batch processing refers to the input of data, not inquiry."}, {"tr": "Accumulates transaction records into groups for processing against the master file on a delayed basis.", "en": "Accumulates transaction records into groups for processing against the master file on a delayed basis.", "cmt_tr": "Batch processing is the accumulation and grouping of transactions for processing on a delayed basis. The batch approach is suitable for applications that can be processed against the master file at intervals and involve large volumes of similar items, such as payroll, sales, inventory, and billing.", "cmt_en": "Batch processing is the accumulation and grouping of transactions for processing on a delayed basis. The batch approach is suitable for applications that can be processed against the master file at intervals and involve large volumes of similar items, such as payroll, sales, inventory, and billing."}, {"tr": "Can only be performed on a centralized basis.", "en": "Can only be performed on a centralized basis.", "cmt_tr": "Batch processing can also be performed on a decentralized basis.", "cmt_en": "Batch processing can also be performed on a decentralized basis."}], "answer": 2}, {"q_tr": "What type of computer processing system is characterized by data that are assembled from more than one location and records that are updated immediately?", "q_en": "What type of computer processing system is characterized by data that are assembled from more than one location and records that are updated immediately?", "options": [{"tr": "Personal computer systems.", "en": "Personal computer systems.", "cmt_tr": "Access from multiple locations is more typical of larger computer systems than of personal computer systems.", "cmt_en": "Access from multiple locations is more typical of larger computer systems than of personal computer systems."}, {"tr": "Data compression systems.", "en": "Data compression systems.", "cmt_tr": "Data compression systems encode data to take up less storage space.", "cmt_en": "Data compression systems encode data to take up less storage space."}, {"tr": "Batch processing systems.", "en": "Batch processing systems.", "cmt_tr": "Batching of transactions requires assembly of data at one place and a delay in updating.", "cmt_en": "Batching of transactions requires assembly of data at one place and a delay in updating."}, {"tr": "Online, real-time systems.", "en": "Online, real-time systems.", "cmt_tr": "Real-time processing involves processing an input record and receiving the output soon enough to affect a current decision-making process. In a real-time system, the user interacts with the system to control an ongoing activity. Online indicates that the decision maker is in direct communication with the computer. Online, real-time systems usually permit access to the main computer from multiple remote terminals.", "cmt_en": "Real-time processing involves processing an input record and receiving the output soon enough to affect a current decision-making process. In a real-time system, the user interacts with the system to control an ongoing activity. Online indicates that the decision maker is in direct communication with the computer. Online, real-time systems usually permit access to the main computer from multiple remote terminals."}], "answer": 3}, {"q_tr": "Errors in a batch computer system caused by incorrect programs or data may not be detected immediately because", "q_en": "Errors in a batch computer system caused by incorrect programs or data may not be detected immediately because", "options": [{"tr": "Errors in some transactions may cause rejection of other transactions in the batch.", "en": "Errors in some transactions may cause rejection of other transactions in the batch.", "cmt_tr": "The transactions within the batch are typically not contingent upon one another.", "cmt_en": "The transactions within the batch are typically not contingent upon one another."}, {"tr": "The identification of errors in input data typically is not part of the program.", "en": "The identification of errors in input data typically is not part of the program.", "cmt_tr": "Edit checks can be incorporated into batch processing environments. However, the edit checks are used to test the transactions in batches.", "cmt_en": "Edit checks can be incorporated into batch processing environments. However, the edit checks are used to test the transactions in batches."}, {"tr": "There are time delays in processing transactions in a batch system.", "en": "There are time delays in processing transactions in a batch system.", "cmt_tr": "Transactions in a batch computer system are grouped together, or batched, prior to processing. Batches may be processed either daily, weekly, or even monthly. Thus, considerable time may elapse between the initiation of the transaction and the discovery of an error.", "cmt_en": "Transactions in a batch computer system are grouped together, or batched, prior to processing. Batches may be processed either daily, weekly, or even monthly. Thus, considerable time may elapse between the initiation of the transaction and the discovery of an error."}, {"tr": "The processing of transactions in a batch system is not uniform.", "en": "The processing of transactions in a batch system is not uniform.", "cmt_tr": "A batch of transactions is typically processed uniformly.", "cmt_en": "A batch of transactions is typically processed uniformly."}], "answer": 2}, {"q_tr": "Which of the following risks is greater in computerized systems than in manual systems?", "q_en": "Which of the following risks is greater in computerized systems than in manual systems?", "options": [{"tr": "Loss of data integrity.", "en": "Loss of data integrity.", "cmt_tr": "Data integrity is data that is reliable. It is accurate and complete. The risk of data corruption, the opposite of data integrity, is higher in a manual system than in a computerized system.", "cmt_en": "Data integrity is data that is reliable. It is accurate and complete. The risk of data corruption, the opposite of data integrity, is higher in a manual system than in a computerized system."}, {"tr": "Erroneous source document preparation.", "en": "Erroneous source document preparation.", "cmt_tr": "Source document preparation either precedes processing or is eliminated altogether in a computerized system. Thus, the risk of erroneous source document preparation in computerized systems is the same as or less than the equivalent risk in manual systems.", "cmt_en": "Source document preparation either precedes processing or is eliminated altogether in a computerized system. Thus, the risk of erroneous source document preparation in computerized systems is the same as or less than the equivalent risk in manual systems."}, {"tr": "Repetition of errors.", "en": "Repetition of errors.", "cmt_tr": "Unlike a manual system, a computer system converts data to machine-readable form so that transactions can be processed. This additional step increases the risk of input error. Moreover, if an error exists in the program, systematic, repetitive errors will occur in processing transactions. Finally, data are typically stored magnetically on tapes or disks. This concentration of data increases the risk of loss from natural and other disasters.", "cmt_en": "Unlike a manual system, a computer system converts data to machine-readable form so that transactions can be processed. This additional step increases the risk of input error. Moreover, if an error exists in the program, systematic, repetitive errors will occur in processing transactions. Finally, data are typically stored magnetically on tapes or disks. This concentration of data increases the risk of loss from natural and other disasters."}, {"tr": "Duplication of data", "en": "Duplication of data", "cmt_tr": "The risk of data duplication is higher in manual systems than in computerized systems. Automated tests can be implemented to identify duplication.", "cmt_en": "The risk of data duplication is higher in manual systems than in computerized systems. Automated tests can be implemented to identify duplication."}], "answer": 2}, {"q_tr": "Which of the following is a key difference in controls when changing from a manual system to a computer system?", "q_en": "Which of the following is a key difference in controls when changing from a manual system to a computer system?", "options": [{"tr": "Internal control principles change.", "en": "Internal control principles change.", "cmt_tr": "Sound internal control principles apply to both manual and computerized systems. Though they differ in design and implementation, the controls are geared toward the same objectives.", "cmt_en": "Sound internal control principles apply to both manual and computerized systems. Though they differ in design and implementation, the controls are geared toward the same objectives."}, {"tr": "Internal control objectives differ.", "en": "Internal control objectives differ.", "cmt_tr": "Though they differ in design and implementation, the controls in a manual and in a computerized system are geared toward the same objectives.", "cmt_en": "Though they differ in design and implementation, the controls in a manual and in a computerized system are geared toward the same objectives."}, {"tr": "Control objectives are more difficult to achieve.", "en": "Control objectives are more difficult to achieve.", "cmt_tr": "Achieving internal control objectives can be quite challenging in a manual environment.", "cmt_en": "Achieving internal control objectives can be quite challenging in a manual environment."}, {"tr": "Methodologies for implementing controls change.", "en": "Methodologies for implementing controls change.", "cmt_tr": "The controls in a manual and in a computerized system are geared toward the same control objectives. Only the design and implementation are different.", "cmt_en": "The controls in a manual and in a computerized system are geared toward the same control objectives. Only the design and implementation are different."}], "answer": 3}, {"q_tr": "Compared to batch processing, real-time processing has which of the following advantages?", "q_en": "Compared to batch processing, real-time processing has which of the following advantages?", "options": [{"tr": "Ease of auditing.", "en": "Ease of auditing.", "cmt_tr": "Real-time processing is more difficult to audit. Batch processing involves uniform processing of a group of transactions at one place and time. Thus, it produces as much of an audit trail as any computer operation. Real-time processing permits immediate updating as transactions occur and access from multiple sites.", "cmt_en": "Real-time processing is more difficult to audit. Batch processing involves uniform processing of a group of transactions at one place and time. Thus, it produces as much of an audit trail as any computer operation. Real-time processing permits immediate updating as transactions occur and access from multiple sites."}, {"tr": "Ease of implementation.", "en": "Ease of implementation.", "cmt_tr": "Real-time processing is more difficult to implement. It requires the system to have the capability to handle inquiries and update files as transactions occur.", "cmt_en": "Real-time processing is more difficult to implement. It requires the system to have the capability to handle inquiries and update files as transactions occur."}, {"tr": "Timeliness of information.", "en": "Timeliness of information.", "cmt_tr": "Real-time processing involves processing an input record and receiving the output soon enough to affect a current decision-making process. Thus, the emphasis is on receiving the output in a timely fashion. In comparison, the batch approach is suitable for applications that can be processed at intervals.", "cmt_en": "Real-time processing involves processing an input record and receiving the output soon enough to affect a current decision-making process. Thus, the emphasis is on receiving the output in a timely fashion. In comparison, the batch approach is suitable for applications that can be processed at intervals."}, {"tr": "Efficiency of processi", "en": "Efficiency of processi", "cmt_tr": "Batch processing is typically more efficient.", "cmt_en": "Batch processing is typically more efficient."}], "answer": 2}, {"q_tr": "Compared to online real-time processing, batch processing has which o
