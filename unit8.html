s for given information. For example, in the date field, an entry for April 31 would be rejected if the month end limit for April was programmed to be April 30."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi bir uygulama girdi kontrolü olarak kabul edilir?", "q_en": "Which of the following is considered an application input control?", "options": [{"tr": "Çalıştırma kontrol toplamı.", "en": "Run control total.", "cmt_tr": "Çalıştırma kontrol toplamı, bir uygulama girdi kontrolü değil, çıktı kontrolüdür.", "cmt_en": "A run control total is an output control, not an application input control."}, {"tr": "Alan kontrolü.", "en": "Field check.", "cmt_tr": "Alan veya biçim kontrolü, geçersiz karakterlerin kabul edilmesini önleyen bir uygulama girdi kontrolüdür. Bazı veri öğeleri yalnızca belirli karakterler içerebilir ve geçersiz karakter kullanmaya çalışan herhangi bir işlem reddedilir.", "cmt_en": "A field or format check is an application input control that prevents invalid characters from being accepted. Some data elements can only contain certain characters, and any transaction that attempts to use an invalid character is rejected."}, {"tr": "Rapor dağıtım günlüğü.", "en": "Report distribution log.", "cmt_tr": "Rapor dağıtım günlüğü, bir uygulama girdi kontrolü değil, çıktı kontrolüdür.", "cmt_en": "A report distribution log is an output control, not an application input control."}, {"tr": "İstisna raporu.", "en": "Exception report.", "cmt_tr": "İstisna raporu, önceden tanımlanmış sınırların dışında kalan faaliyetler hakkında üretilen bir rapordur. Bir uygulama girdi kontrolü değildir.", "cmt_en": "An exception report is a report generated on activities that lie outside predefined boundaries. It is not an application input control."}], "answer": 1}, {"q_tr": "Aşağıdaki kontrol planı türlerinden hangisi, gerçekleşme zamanlamasıyla ilgili olmaktan çok belirli bir sürece veya alt sisteme özgüdür?", "q_en": "Which of the following types of control plans is particular to a specific process or subsystem, rather than related to the timing of its occurrence?", "options": [{"tr": "Önleyici.", "en": "Preventive.", "cmt_tr": "Önleyici kontroller, bir faaliyetle ilişkili sorunların gerçekleşmemesi için önceden alınan önlemlerdir. Belirli bir süreç veya alt sistemle sınırlı değildirler.", "cmt_en": "Preventive controls are advance measures taken so that problems associated with an activity will not occur. They are not limited to a specific process or subsystem."}, {"tr": "Düzeltici.", "en": "Corrective.", "cmt_tr": "Düzeltici kontroller, tespit edici kontroller tarafından belirlendikten sonra sorunları çözer. Belirli bir süreç veya alt sistemle sınırlı değildirler.", "cmt_en": "Corrective controls solve problems after they are identified by detective controls. They are not limited to a specific process or subsystem."}, {"tr": "Uygulama.", "en": "Application.", "cmt_tr": "Uygulama kontrolleri her bilgisayar uygulamasına yerleştirilmiştir. Yalnızca doğru, yetkili verilerin sisteme girmesini ve verilerin düzgün işlenmesini sağlamak üzere tasarlanmıştır.", "cmt_en": "Application controls are built into each computer application. They are designed to ensure that only correct, authorized data enter the system, and that the data are processed properly."}, {"tr": "Tespit edici.", "en": "Detective", "cmt_tr": "Tespit edici kontroller, standartlardan sapma olup olmadığına ilişkin performans sonrası geri bildirim sağlar. Belirli bir süreç veya alt sistemle sınırlı değildirler.", "cmt_en": "Detective controls provide post-performance feedback about whether deviations from standards have occurred. They are not limited to a specific process or subsystem."}], "answer": 2}, {"q_tr": "Bazı veri işleme kontrolleri tüm bilgisayar işleme faaliyetleriyle (genel kontroller), bazıları ise belirli görevlerle (uygulama kontrolleri) ilişkilidir. Genel kontroller şunları kapsar:", "q_en": "Some data processing controls relate to all computer processing activities (general controls) and some relate to specific tasks (application controls). General controls include", "options": [{"tr": "İşleme için sunulan tüm verilerin uygun şekilde yetkilendirildiğini belirlemek için tasarlanmış kontroller.", "en": "Controls designed to ascertain that all data submitted to computer processing have been properly authorized.", "cmt_tr": "İşleme için sunulan tüm verilerin uygun şekilde yetkilendirildiğini belirlemek için tasarlanmış kontroller, uygulama kontrolleri kategorisindeki girdi kontrolleridir.", "cmt_en": "Controls designed to ascertain that all data submitted have been properly authorized are input controls, a category of application controls."}, {"tr": "Hatalı verilerin düzeltilmesi ve yeniden sunulmasına ilişkin kontroller.", "en": "Controls that relate to the correction and resubmission of data that were initially incorrect.", "cmt_tr": "Hatalı verilerin düzeltilmesi ve yeniden sunulmasına ilişkin kontroller, uygulama kontrolleri kategorisindeki girdi kontrolleridir.", "cmt_en": "Controls that relate to the correction and resubmission of data that were initially incorrect are input controls, a category of application controls."}, {"tr": "Programların belgelenmesi ve onaylanmasına ve programlardaki değişikliklere ilişkin kontroller.", "en": "Controls for documenting and approving programs and changes to programs.", "cmt_tr": "Genel kontroller, kuruluşun BT ortamına bir bütün olarak ilişkilidir. Uygulama kontrollerinin düzgün işleyişini destekleyen koşulları sürdürürler. Programlar ve program değişiklikleri üzerindeki kontroller bu türdendir.", "cmt_en": "General controls relate to the organization’s IT environment as a whole. They sustain the conditions under which application controls can function properly. Controls over programs and changes to programs are of this type."}, {"tr": "İşleme sonuçlarının doğruluğunu sağlamak için tasarlanmış kontroller.", "en": "Controls designed to ensure the accuracy of the processing results.", "cmt_tr": "İşleme sonuçlarının doğruluğunu sağlamak için tasarlanmış kontroller, uygulama kontrolleri kategorisindeki çıktı kontrolleridir.", "cmt_en": "Controls designed to ensure the accuracy of processing results are output controls, another category of application controls."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi geçerlilik kontrolüdür?", "q_en": "Which of the following is a validity check?", "options": [{"tr": "Bilgisayar, bir kayıttaki sayısal tutarın önceden belirlenmiş bir tutarı aşmadığını sağlar.", "en": "The computer ensures that a numerical amount in a record does not exceed some predetermined amount.", "cmt_tr": "Limit kontrolü, sayısal bir tutarın önceden belirlenmiş bir tutarı aşıp aşmadığını belirler.", "cmt_en": "A limit check determines whether a numerical amount exceeds a predetermined amount."}, {"tr": "Bilgisayar hataları düzeltip veriler sisteme başarıyla yeniden sunulduğunda, hataların nedenleri yazdırılır.", "en": "As the computer corrects errors and data are successfully resubmitted to the system, the causes of the errors are printed out.", "cmt_tr": "Hata günlüğü veya hata listesi, daha önce tespit edilen ve ardından düzeltilen hataları belirler.", "cmt_en": "An error log or error listing identifies errors that were previously detected and subsequently corrected."}, {"tr": "Bilgisayar, kontrol alanı değerinin mevcut dosya kaydıyla eşleşmediği herhangi bir iletimi işaretler.", "en": "The computer flags any transmission for which the control field value did not match that of an existing file record.", "cmt_tr": "Geçerlilik kontrolleri; kimlik numaralarının veya işlem kodlarının, doğru veya yetkilendirilmiş olduğu bilinen öğelerle karşılaştırılarak geçerliliğinin test edilmesidir.", "cmt_en": "Validity checks test identification numbers or transaction codes for validity by comparison with items already known to be correct or authorized. For example, a validity check may identify a transmission for which the control field value did not match a pre-existing record in a file."}, {"tr": "Veriler girildikten sonra bilgisayar, orijinal olarak gönderilen verilerle karşılaştırma için terminale belirli verileri geri gönderir.", "en": "After data are entered, the computer sends certain data back to the terminal for comparison with data originally sent.", "cmt_tr": "Bu eylem, kapalı döngü doğrulaması olarak adlandırılan eski bir teknolojiyi tanımlar.", "cmt_en": "This action describes an older technology referred to as closed-loop verification."}], "answer": 2}, {"q_tr": "Bir müşterinin siparişi asla karşılanmamıştır çünkü sipariş giriş elemanı satış işlemini sisteme girerken müşteri kimlik numarasının rakamlarını yer değiştirmiştir. Yer değiştirmeyi büyük olasılıkla tespit edecek kontrol hangisidir?", "q_en": "A customer’s order was never filled because an order entry clerk transposed the customer identification number while entering the sales transaction into the system. Which of the following controls would most likely have detected the transposition?", "options": [{"tr": "Sıra testi.", "en": "Sequence test.", "cmt_tr": "Sıra testleri, kayıtların doğru sırada olup olmadığını belirler.", "cmt_en": "Sequence tests determine whether records are in proper order."}, {"tr": "Eksiksizlik testi.", "en": "Completeness test.", "cmt_tr": "Veri iletiminin eksiksizlik kontrolleri, tüm gerekli bilgilerin gönderilip gönderilmediğini belirler.", "cmt_en": "Completeness checks of transmission of data determine whether all necessary information has been sent."}, {"tr": "Geçerlilik kontrolü.", "en": "Validity check.", "cmt_tr": "Geçerlilik kontrolleri; kimlik numaralarının veya işlem kodlarının, doğru veya yetkilendirilmiş olduğu bilinen öğelerle karşılaştırılarak geçerliliğinin test edilmesidir.", "cmt_en": "Validity checks are tests of identification numbers or transaction codes for validity by comparison with items already known to be correct or authorized."}, {"tr": "Limit testi.", "en": "Limit test.", "cmt_tr": "Limit testleri, verilen bilgi için bilinen limitlere dayanır. Örneğin, haftalık çalışma saatleri 168'i aşamaz.", "cmt_en": "Limit tests are based on known limits for given information. For example, hours worked per week cannot exceed 168."}], "answer": 2}, {"q_tr": "Aşağıdaki girdi kontrollerinden hangisi, yanlış bir eyalet kısaltmasının meşru veri olarak kabul edilmesini önler?", "q_en": "Which of the following input controls would prevent an incorrect state abbreviation from being accepted as legitimate data?", "options": [{"tr": "Makullük testi.", "en": "Reasonableness test.", "cmt_tr": "Makullük (ilişki) kontrolleri, veriler arasındaki ilişkilerin mantıksal doğruluğunu değerlendirir.", "cmt_en": "Reasonableness (relationship) checks consider the logical correctness of relationships among the"}, {"tr": "Alan kontrolü.", "en": "Field check.", "cmt_tr": "Alan kontrolleri, bir alandaki karakterlerin o alan için uygun türde olup olmadığını doğrulamak üzere yapılan testlerdir.", "cmt_en": "Field checks are tests of the characters in a field to verify that they are of an appropriate type for that field. For example, the field for a Social Security number cannot contain alphabetic characters."}, {"tr": "Rakam doğrulama kontrolü.", "en": "Digit verification check.", "cmt_tr": "Kontrol rakamı doğrulaması, hatalı kimlik numaralarını tespit etmek için kullanılır.", "cmt_en": "Check digit verification is used to identify incorrect identification numbers. The digit is generated by applying an algorithm to the ID number."}, {"tr": "Geçerlilik kontrolü.", "en": "Validity check.", "cmt_tr": "Geçerlilik kontrolleri; kimlik numaralarının veya işlem kodlarının, doğru veya yetkilendirilmiş olduğu bilinen öğelerle karşılaştırılarak geçerliliğinin test edilmesidir.", "cmt_en": "Validity checks are tests of identification numbers or transaction codes for validity by comparison with items already known to be correct or authorized."}], "answer": 3}, {"q_tr": "Otomatik bordro işleme ortamında, bir departman yöneticisi işten çıkarılmış çalışanın zaman kartını hayali bir çalışanın kartıyla değiştirmiştir. Hayali çalışan, işten çıkarılmış çalışanla aynı ücret oranı ve çalışma saatlerine sahiptir. Çalışan kimlik numaralarını kullanarak bu eylemi tespit etmek için en iyi kontrol tekniği şudur:", "q_en": "In an automated payroll processing environment, a department manager substituted the time card for a terminated employee with a time card for a fictitious employee. The fictitious employee had the same pay rate and hours worked as the terminated employee. The best control technique to detect this action using employee identification numbers is a", "options": [{"tr": "Makullük testi.", "en": "Reasonableness test.", "cmt_tr": "Makullük testi, verilen bilgi için bilinen limitlere dayanır.", "cmt_en": "A reasonableness test is based on known limits for given information."}, {"tr": "Kayıt sayımı.", "en": "Record count.", "cmt_tr": "Kayıt sayımı, referans noktası olarak kullanılan bir kontrol toplamıdır.", "cmt_en": "A record count is a control total used as a point of reference. A batch is not released for processing unless the number of records in the batch, as reported by the system, matches the number calculated by the user."}, {"tr": "Karma toplam.", "en": "Hash total.", "cmt_tr": "Karma toplam, sayısal bir alanın aritmetik toplamıdır. Karma toplam kendi başına anlamlı olmasa da, işlenmesi gereken kayıtların aynısının işlendiğini doğrulamak için kullanılabilir. Personel departmanındaki çalışan listesinin karma toplamı, bordro çalışması sırasında üretilen karma toplamla karşılaştırılabilir.", "cmt_en": "A hash total is the arithmetic sum of a numeric field. While the hash total has no meaning by itself, it can serve as a check that the same records that should have been processed were processed. An example is the sum of all employee identification numbers. The hash total for the employee listing by the personnel department could be compared with the hash total generated during the payroll run to ensure the completeness and accuracy of transaction data input."}, {"tr": "Mali toplam.", "en": "Financial total.", "cmt_tr": "Mali toplamlar, bir kayıt grubundaki bir bilgi alanındaki dolar tutarlarını özetler.", "cmt_en": "Financial totals summarize dollar amounts in an information field in a group of records."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi tipik bir çıktı kontrolüdür?", "q_en": "Which of the following is a typical output control?", "options": [{"tr": "Tüm doğru bilgisayar işlerinin düzgün çalışıp çalışmadığını belirlemek için bilgisayar işleme günlüklerinin gözden geçirilmesi.", "en": "Reviewing the computer processing logs to determine that all of the correct computer jobs executed properly.", "cmt_tr": "Bilgisayar işleme günlüklerinin gözden geçirilmesi bir çıktı kontrolüdür.", "cmt_en": "Reviewing the computer processing logs is an output control."}, {"tr": "Girdi verilerinin ana dosyalardaki bilgilerle eşleştirilmesi ve eşleşmeyen öğelerin bekleme dosyasına yerleştirilmesi.", "en": "Matching input data with information on master files and placing unmatched items in a suspense file.", "cmt_tr": "Girdi verilerinin ana dosyalardaki bilgilerle eşleştirilmesi ve eşleşmeyen öğelerin bekleme dosyasına taşınması, çıktı kontrolü değil işleme kontrolüdür.", "cmt_en": "Matching input data with information on master files and moving unmatched items to a suspense file is a processing control, not an output control."}, {"tr": "Altyapı, uygulamalar ve veriler üzerinde mantıksal erişim kontrollerinin oluşturulması.", "en": "Establishing logical access controls over infrastructure, applications, and data.", "cmt_tr": "Altyapı, uygulamalar ve veriler üzerinde mantıksal erişim kontrollerinin oluşturulması BT genel kontrolüdür.", "cmt_en": "Establishing logical access controls over infrastructure, applications, and data is an IT general control."}, {"tr": "İşlemler işlenirken verilerin güvenliğinin ve bütünlüğünün sağlanması.", "en": "Ensuring the security and integrity of data while transactions are being processed.", "cmt_tr": "İşlemler işlenirken verilerin güvenliğinin ve bütünlüğünün sağlanması, bir tür girdi kontrolüdür.", "cmt_en": "Ensuring the security and integrity of data while transactions are being processed is a type of input control."}], "answer": 0}, {"q_tr": "Bir katip, gerçek tutarı 133,66 $ iken bir satış faturasını 13,66 $ olarak kaydetmiştir. Bu hatayı hangi kontrol tespit etmelidir?", "q_en": "A clerk recorded a sales invoice as $13.66 when the actual amount was $133.66. Which control should detect this error?", "options": [{"tr": "Limit kontrolü.", "en": "Limit check.", "cmt_tr": "Limit kontrolü, fazla beyan hataları için etkilidir.", "cmt_en": "A limit check is effective for overstatement errors."}, {"tr": "Toplu girdi toplamları.", "en": "Batch input totals.", "cmt_tr": "Mali tutarlar için toplu girdi kontrolleri bir toplam hesaplar. Ardından bilgisayar işlemesinden önce manuel olarak hesaplanan toplamla karşılaştırılır.", "cmt_en": "Batch input controls for financial amounts calculate a total. It is then compared with the manually calculated total before computer processing."}, {"tr": "Fazlalık karakter kontrolü.", "en": "Redundant character check.", "cmt_tr": "Fazlalık karakter kontrolü, veri iletiminde doğruluğu kontrol eden bir donanım kontrolüdür. Girdi kontrolü değildir.", "cmt_en": "A redundant character check is a hardware control that checks for accuracy in data transmission. It is not an input control."}, {"tr": "İşaret kontrolü.", "en": "Sign check.", "cmt_tr": "İşaret kontrolü, pozitif veya negatif alan kısıtlamalarını arar.", "cmt_en": "A sign check looks for positive or negative field restrictions."}], "answer": 1}, {"q_tr": "İşlenmiş ve depolanmış verilerin tutarlı ve eksiksiz olmasını sağlamak için izleyen uygulama kontrolleri hangisidir?", "q_en": "Which application controls monitor processed and stored data to ensure they are consistent and complete?", "options": [{"tr": "Bütünlük kontrolleri.", "en": "Integrity controls.", "cmt_tr": "Bütünlük kontrolleri, verileri işlenirken ve depolanırken izleyerek tutarlı ve eksiksiz kalmasını sağlar. Örneğin, tanımlanmış bir veri bloğunun başka bir değerle uyuşmaması işlemede bir hata olduğunu gösterebilir.", "cmt_en": "Integrity controls monitor data as it is processed and while it is stored to ensure that it remains consistent and complete. For example, failure of a defined data block to align with another value may indicate an error in processing."}, {"tr": "Girdi kontrolleri.", "en": "Input controls.", "cmt_tr": "Girdi kontrolleri, veriler sisteme manuel veya elektronik olarak girildiğinde hataları önlemeye yöneliktir.", "cmt_en": "Input controls are intended to prevent errors when data are entered manually or electronically into the system."}, {"tr": "Çıktı kontrolleri.", "en": "Output controls.", "cmt_tr": "Çıktı kontrolleri, işleme tamamlandıktan sonra çıktı verilerinin doğruluğunu ve makullüğünü bulan tespit edici kontrollerdir.", "cmt_en": "Output controls are detective controls that find errors and verify the accuracy and reasonableness of output data after processing is complete."}, {"tr": "İşleme kontrolleri.", "en": "Processing controls.", "cmt_tr": "İşleme kontrolleri, işleme sırasında verilerin eksiksiz ve doğru olmasını sağlar.", "cmt_en": "Processing controls ensure that data are complete and accurate during processing."}], "answer": 0}, {"q_tr": "Bir veritabanına yanlış satıcı numaralarının girilmesini önlemek için en iyi kontrol hangisidir?", "q_en": "What is the best control to prevent entry of incorrect vendor numbers into a database?", "options": [{"tr": "Hata listesi.", "en": "Error listing.", "cmt_tr": "Hata listesi bir çıktı kontrolüdür.", "cmt_en": "An error listing is an output control."}, {"tr": "İstisna raporlaması.", "en": "Exception reporting.", "cmt_tr": "İstisna raporlaması bir çıktı kontrolüdür.", "cmt_en": "Exception reporting is an output control."}, {"tr": "Biçim kontrolleri.", "en": "Format checks.", "cmt_tr": "Biçim kontrolleri, verilerin kabul edilebilir bir düzende girildiğini doğrular. Bir satıcı numarasının geçerli olup olmadığını tespit edemezler.", "cmt_en": "Format checks verify that data are entered in an acceptable layout. They cannot detect whether a vendor number is valid."}, {"tr": "Açılır menü eklenmesi.", "en": "Add a drop-down menu.", "cmt_tr": "Bir girdi kontrolü, geçersiz satıcı numaralarının girilmesini önlemelidir. Satıcılar yalnızca açılır menüdeki onaylı listeden seçilirse, bu geçerlilik kontrolü etkili olmalıdır.", "cmt_en": "An input control should prevent entry of invalid vendor numbers. If vendors are selected only from an approved list on a drop-down menu, this validity check should be effective."}], "answer": 3}, {"q_tr": "Büyük bir veri işleme merkezi, yoğun toplu işleme saatlerinde darboğaz yaşamaktadır. Merkez bazen bir sonraki iş gününün başlangıcına kadar tüm toplu işlemeleri tamamlayamamaktadır. Bu sorunu araştırırken iç denetçi başlangıçta aşağıdaki kontrollerden hangisine odaklanmalıdır?", "q_en": "A large data processing center has processing bottlenecks at peak batch processing hours. The center is sometimes unable to complete all batch processing by the start of the next business day, creating difficulties in starting online systems. When investigating this problem, the internal auditor initially should focus on controls over", "options": [{"tr": "Konsol günlükleri.", "en": "Console logs.", "cmt_tr": "Konsol günlükleri yalnızca sorunları kaydeder.", "cmt_en": "Console logs record only problems."}, {"tr": "Yedekleme ve yeniden başlatma prosedürleri.", "en": "Backup and restart procedures.", "cmt_tr": "Yedekleme ve yeniden başlatma prosedürleri yalnızca bir sorun oluştuktan sonra uygulanır.", "cmt_en": "Backup and restart procedures are applied only after a problem has occurred. They do not suggest a cause."}, {"tr": "İş zamanlaması.", "en": "Job scheduling.", "cmt_tr": "İşleme için iş zamanlaması kontrolleri, bilgisayar kaynaklarının kullanımını optimize etmek için esastır ve sorunun niteliğine ilişkin en iyi ilk göstergeyi sağlamalıdır.", "cmt_en": "Controls over job scheduling for processing are essential to optimize use of computer resources and should give the best initial indication of the nature of the problem. Backup and restart procedures apply after abnormal interruptions of processing. Console logs provide only indications of problems. They might be used later in the process. Program documentation is not the place to start. It might help determine why a given program was causing a problem."}, {"tr": "Program belgeleri.", "en": "Program documentation.", "cmt_tr": "Program belgeleri, işleme darboğazlarının neden oluştuğuna ilişkin doğrudan kanıt değildir.", "cmt_en": "Program documentation is not itself immediate evidence of why processing bottlenecks occurred."}], "answer": 2}, {"q_tr": "Bir kuruluş, veri deposu olarak veritabanı yönetim sistemi (VTYS) kullanmaktadır. VTYS, son kullanıcı tarafından geliştirilen bir dizi uygulamayı desteklemektedir. Bazı uygulamalar veritabanını günceller. Veritabanına erişim ve kullanım üzerindeki kontrol prosedürlerini değerlendirirken denetçi en çok şununla ilgilenir:", "q_en": "An organization uses a database management system (DBMS) as a repository of data. The DBMS in turn supports a number of end-user-developed applications. Some of the applications update the database. In evaluating the control procedures over access and use of the database, the auditor will be most concerned that", "options": [{"tr": "Son kullanıcıların yalnızca okuma uygulamalarının veritabanına erişmeden önce veri işleme tarafından onaylanması.", "en": "End users have their read-only applications approved by data processing before accessing the database.", "cmt_tr": "Son kullanıcı bilgi işlemi, son kullanıcıyı veri işlemeden onay alma gerekliliğinden kurtarır.", "cmt_en": "End-user computing frees the end user from the need to have requests approved by data processing, including end-user applications that use large mainframe databases."}, {"tr": "Eşzamanlılık güncelleme kontrollerinin mevcut olması.", "en": "Concurrency update controls are in place.", "cmt_tr": "Eşzamanlılık kontrolleri, iki veya daha fazla kullanıcının bir dosyaya veya veritabanına aynı anda erişmeye çalıştığı durumları yönetir. Bu şekilde, eşzamanlılık kontrollerinin amacı veri bütünlüğünü korumaktır.", "cmt_en": "Concurrency controls manage situations in which two or more users attempt to access a file or database simultaneously. As such, the purpose of concurrency controls is to protect data integrity."}, {"tr": "Son kullanıcı uygulamalarının ana bilgisayara aktarılmadan önce kişisel bilgisayarlarda geliştirilip test edilmesi.", "en": "End-user applications are developed and tested on personal computers before being ported to the mainframe.", "cmt_tr": "Ana bilgisayar ve kişisel bilgisayar arasındaki test farkı burada önemli değildir.", "cmt_en": "The distinction between testing on mainframe versus personal computers is not important here."}, {"tr": "Birden fazla kullanıcıya aynı anda hizmet verilebilmesi için ilişkisel veritabanı modelinin benimsenmesi.", "en": "A relational database model is adopted so that multiple users can be served at the same time.", "cmt_tr": "İlişkisel veri modelleri popülerdir, ancak çoklu kullanıcıları veya son kullanıcı bilgi işlemi desteklemek için gerekli değildir.", "cmt_en": "Relational data models are popular but are not needed to support multiple users or end-user computing."}], "answer": 1}, {"q_tr": "Veri girdi kontrollerinin sistem tasarımını gözden geçirirken, aşağıdakilerden hangisine en az dikkat gösterilmelidir?", "q_en": "When reviewing the system design of data input controls, which of the following should be given the least consideration?", "options": [{"tr": "Yetkilendirme.", "en": "Authorization.", "cmt_tr": "Yetkilendirme, uygulama kontrollerini gözden geçirirken birincil bir değerlendirme konusudur.", "cmt_en": "Authorization is a primary consideration when reviewing application controls."}, {"tr": "Yapılandırma.", "en": "Configuration.", "cmt_tr": "Veri girdi kontrolleri uygulama kontrolleridir. Yapılandırma, uygulama kontrolleri değil BT genel kontrolleri gözden geçirilirken bir değerlendirme konusudur. Yalnızca yetkili kişi ve uygulamaların verilere ve uygulamalara erişimini sağlayan mantıksal erişim kontrolüdür.", "cmt_en": "Data input controls are application controls. The objective of application controls is to ensure the completeness, accuracy, authorization, and validity of input data, processed data, stored data, and output data. Configuration is a consideration when reviewing IT general controls, not application controls. It is a logical access control that ensures only authorized persons and applications have access to data and applications."}, {"tr": "Doğrulama.", "en": "Validation.", "cmt_tr": "Doğrulama, uygulama kontrollerini gözden geçirirken birincil bir değerlendirme konusudur.", "cmt_en": "Validation is a primary consideration when reviewing application controls."}, {"tr": "Hata bildirimi.", "en": "Error notification.", "cmt_tr": "Hata bildirimi, uygulama kontrollerini gözden geçirirken birincil bir değerlendirme konusudur.", "cmt_en": "Error notification is a primary consideration when reviewing application controls."}], "answer": 1}, {"q_tr": "Yeni sistemler için gözden geçirme ve onay prosedürleri ne tür bir kontroldür?", "q_en": "Review and approval procedures for new systems is which type of control?", "options": [{"tr": "Uygulama kontrolü.", "en": "Application control.", "cmt_tr": "Uygulama kontrolleri, işlenen verilerin doğruluğunu, bütünlüğünü ve güvenliğini sağlamak için yazılım uygulamaları içindeki özel önlemlerdir.", "cmt_en": "Application controls are specific measures within software applications to ensure the accuracy, integrity, and security of the data being processed."}, {"tr": "Girdi kontrolü.", "en": "Input control.", "cmt_tr": "Girdi kontrolleri, işlenen verilerin doğruluğunu ve bütünlüğünü korumak için bilgisayar sistemlerinde uygulanan önlemlerdir.", "cmt_en": "Input controIs are measures implemented in computer systems to maintain the accuracy and integrity of data processed."}, {"tr": "Genel BT kontrolü.", "en": "General IT control.", "cmt_tr": "Genel BT kontrolleri; veri merkezi ve ağ operasyonları, sistem yazılımı edinme ve bakımı ve erişim güvenliği üzerindeki kontrolleri kapsar.", "cmt_en": "General IT controls include controls over data center and network operations; systems software"}, {"tr": "İşleme kontrolü.", "en": "Processing control.", "cmt_tr": "İşleme kontrolleri, güncelleme sırasında verilerin eksiksiz ve doğru olmasını sağlar.", "cmt_en": "Processing controls ensure that data are complete and accurate during updating."}], "answer": 2}, {"q_tr": "ABC formunun veri giriş sürecini kolaylaştırmak amacıyla, veri giriş ekranındaki düzen basılı ABC formunun düzenini taklit etmektedir. Bu şunun bir örneğidir:", "q_en": "To facilitate the data entry process for form ABC, the layout on the data entry screen imitates the layout of the printed form ABC. This is an example of", "options": [{"tr": "Biçim kontrolleri.", "en": "Format checks.", "cmt_tr": "Biçim kontrolleri, bir alandaki karakterlerin o alan için uygun türde olup olmadığını doğrulamak üzere yapılan testlerdir. Biçim kontrolleri çevrimiçi girdi kontrolüdür.", "cmt_en": "Format checks are tests of the characters in a field to verify that they are of an appropriate type for that field. For example, the system is programmed to reject entering alphabetic characters in a number field. Format checks are an online input control."}, {"tr": "Geçici kayıt.", "en": "Memo posting.", "cmt_tr": "Geçici kayıt, bankalar tarafından toplu işleme kullanıldığında mali işlemler için kullanılır. Toplu işleme ile gerçek zamanlı işleme arasında bir ara adımdır.", "cmt_en": "Memo posting is used by banks for financial transactions when batch processing is used. It is an intermediate step between batch processing and real-time processing."}, {"tr": "Ön biçimlendirme.", "en": "Preformatting.", "cmt_tr": "Veri giriş ekranlarının ön biçimlendirilmesi, operatörün verileri doğru alanlara girmesine yardımcı olabilir. Veri giriş ekranını basılı formu taklit edecek şekilde ayarlamak, ön biçimlendirme örneğidir. Ön biçimlendirme çevrimiçi girdi kontrolüdür.", "cmt_en": "The preformatting of data entry screens can aid the operator in keying in the data to the correct fields. Setting up the data entry screen to imitate the printed form is an example of the preformatting of data entry screens. Preformatting is an online input control."}, {"tr": "Eksiksizlik kontrolleri.", "en": "Completeness checks.", "cmt_tr": "Eksiksizlik kontrolleri, sunulan ve onaylanan tüm verilerin işlenmesini sağlayan bir işleme kontrolüdür.", "cmt_en": "Completeness checks are a processing control that ensure all data submitted and approved are processed. Therefore, any record with missing data is rejected."}], "answer": 2}, {"q_tr": "Veri giriş elemanı sipariş girerken müşterinin adını bulamadı. Bu şunun bir örneğidir:", "q_en": "The data entry clerk was unable to find the customer’s name when inputting the order. This is an example of", "options": [{"tr": "Eşzamanlılık kontrolü.", "en": "Concurrency control.", "cmt_tr": "Eşzamanlılık kontrolleri, iki veya daha fazla kullanıcının bir dosyaya veya veritabanına aynı anda erişmeye veya güncellemeye çalıştığı durumları yönetir. Eşzamanlılık kontrolleri işleme kontrolüdür.", "cmt_en": "Concurrency controls manage situations where two or more users attempt to access or update a file or database simultaneously. Concurrency controls are a processing control."}, {"tr": "Geçerlilik kontrolleri.", "en": "Validity checks.", "cmt_tr": "Geçerlilik kontrolleri, belirli bir alana girilen verileri o alan için geçerli değerler tablosuyla karşılaştırır.", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, the list of approved customers for credit purchases would be the table of valid"}, {"tr": "Aralık kontrolleri.", "en": "Range checks.", "cmt_tr": "Aralık kontrolleri, verilen bilgi için bilinen limitlere dayanır. Aralık veya limit kontrolleri çevrimiçi girdi kontrolüdür.", "cmt_en": "Range checks are based on known limits for given information. For example, hours worked per day must be between 1-18, with anything above that range requiring management authorization. Range or limit checks are an online input control."}, {"tr": "Sıra kontrolleri.", "en": "Sequence checks.", "cmt_tr": "Sıra kontrolleri, dosyalar belirlenmiş bir alana göre sıralandığında işleme verimliliğinin büyük ölçüde artacağı mantığına dayanır. Sıra kontrolleri çevrimiçi girdi kontrolüdür.", "cmt_en": "Sequence checks are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field, called the “key.” If the system discovers a record out of order, it may indicate that the files were not properly prepared for processing. Sequence checks are an online input control."}], "answer": 1}, {"q_tr": "Muhasebe müdürü günlük yevmiye kayıtlarının toplu işlerini gözden geçiriyordu. Kredi ödemesi için yevmiye kayıtlarından biri sistem tarafından reddedilmiştir. Kayıt şöyleydi: Kredi Borcu $22.000, Faiz Gideri 2.250, Çek Hesabı ($25.000). Bu işlemi hangi çevrimiçi girdi kontrolü reddetmiştir?", "q_en": "The accounting manager was reviewing batches of journal entries for the day. One of the journal entries for a loan payment was rejected by the system. The entry was as follows: Account Name Debit Credit Loan payable $22,000 Interest expense 2,250 Checking $25,000 Which online input control rejected this transaction?", "options": [{"tr": "Sıfır bakiye kontrolleri.", "en": "Zero balance checks.", "cmt_tr": "Sıfır bakiye kontrolleri, borçlar ve alacaklar toplamının sıfıra eşit olmadığı herhangi bir işlemi veya toplu işi reddeder. Verilen örnekte borçlar 24.250 $, alacaklar (25.000 $) tutarındadır. Borçlar ve alacaklar toplamı sıfıra eşit olmadığından (750 $), yevmiye kaydı sistem tarafından reddedilmiştir.", "cmt_en": "Zero balance checks reject any transaction or batch thereof in which the sum of all debits and credits does not equal zero. In the example provided, the debits equal $24,250 and the credits equal ($25,000). Because the sum of the debits and credits does not equal zero ($750), the journal entry was rejected by the system. Zero balance checks are an online input control."}, {"tr": "Aritmetik kontroller.", "en": "Arithmetic controls.", "cmt_tr": "Aritmetik kontroller işleme kontrolleridir. Çapraz toplam, bir tutarı bileşenlerinin toplamıyla karşılaştırır.", "cmt_en": "Arithmetic controls are processing controls. Cross-footing compares an amount with the sum of its components."}, {"tr": "Kontrol rakamları.", "en": "Check digits.", "cmt_tr": "Kontrol rakamları, bir kimlik kodunu takip eden fazladan bir referans numarası içeren çevrimiçi girdi kontrolüdür.", "cmt_en": "Check digits are an online input control that includes an extra reference number following an identification code. The extra digit is input with the data and bears a mathematical relationship to the other digits. The identification code can be subjected to an algorithm and compared to the check digit(s)."}, {"tr": "Anahtar bütünlüğü.", "en": "Key integrity.", "cmt_tr": "Anahtar bütünlüğü bir işleme kontrolüdür. Bir kaydın anahtarı, kaydı benzersiz olarak tanımlayan belirlenmiş alanlardaki değerler grubudur.", "cmt_en": "Key integrity is a processing control. A record’s key is the group of values in designated fields that uniquely identify the record. No application process should be able to alter the data in these key fields."}], "answer": 0}, {"q_tr": "Bilgisayarlı bilgi kontrol sisteminde kontrol riskini değerlendirmenin adımlarından biri, verilerin işleme sırasında kaybedilmesini, eklenmesini, kopyalanmasını veya değiştirilmesini önlemek için gerekli kontrollerin belirlenmesidir. Bu tür kontrolün bir örneği şudur:", "q_en": "One of the steps in assessing control risk in a computerized information control system is identifying necessary controls to prevent data from being lost, added, duplicated, or altered during processing. An example of this type of control is the", "options": [{"tr": "Kullanıcı departmanlarında verilerin yetkilendirilmesi ve onaylanması ile veri kontrol grupları tarafından verilerin taranması.", "en": "Authorization and approval of data in user departments and screening of data by data control groups.", "cmt_tr": "Kullanıcılar tarafından yetkilendirme ve onay ile kontrol grupları tarafından gözden geçirme, işleme sırasında çalışmayan kontrollerdir.", "cmt_en": "Authorization and approval by users and review by control groups are controls that do not function during processing."}, {"tr": "Veri kontrol grupları tarafından veri çıktısının gözden geçirilmesi.", "en": "Review of data output by data control groups.", "cmt_tr": "Kontrol grupları tarafından gözden geçirme, işleme sırasında çalışmayan bir kontroldür.", "cmt_en": "Review by control groups is a control that does not function during processing."}, {"tr": "Harici ve dahili dosya etiketlerinin kullanılması.", "en": "Use of external and internal file labels.", "cmt_tr": "Dahili ve harici etiketlerin kullanılması, organizasyonel bir kontroldür, işleme kontrolü değildir.", "cmt_en": "Use of internal and external labels is an organizational, not a processing, control. External labels allow the computer operator to determine whether the correct file has been selected for an application. External labels are gummed-paper labels attached to a tape reel or other storage medium that identify the file. Internal labels perform the same function through the use of machine-readable identification in the first record in a file."}, {"tr": "Kontrol toplamları, limit ve makullük kontrolleri ile sıra testlerinin kullanılması.", "en": "Use of control totals, limit and reasonableness checks, and sequence tests.", "cmt_tr": "Kontrol toplamı, işlemin farklı aşamalarında işlenen kayıt sayısının sayımından oluşabilen bir uygulama kontrolüdür. Sayımların karşılaştırılması, tüm kayıtların işlenip işlenmediğini veya bazılarının eklenip eklenmediğini gösterir.", "cmt_en": "A control total is an application control that may consist of a count of the number of records processed at different stages of the operation. Comparison of the counts indicates whether all records have been processed or some have been added. A control total might also consist of a total of one information field for all records processed, such as the total sales dollars for a batch of sales invoices. A limit or reasonableness check tests whether the value of a field falls outside a prescribed range. The range may be stated in terms of an upper limit, lower limit, or both. The loss, addition, etc., of data may result in an unreasonable value. A sequence test verifies the ordering of records and may therefore detect various anomalies."}], "answer": 3}, {"q_tr": "Bilgisayar sistemi tarafından işlenen veriler genellikle depolama için bir çıktı ortamına aktarılır. Ancak bilgisayarlı çıktının varlığı, kendi başına çıktının doğruluğunu, eksiksizliğini veya gerçekliğini garanti etmez. Bu güvence için çeşitli kontroller gereklidir. Bu alan için başlıca kontrol türleri şunlardır:", "q_en": "Data processed by a computer system are usually transferred to some form of output medium for storage. However, the presence of computerized output does not, in and of itself, ensure the output’s accuracy, completeness, or authenticity. For this assurance, various controls are needed. The major types of controls for this area include", "options": [{"tr": "Fiziksel kontroller, belgeleme kontrolleri ve yazdırma kontrolleri.", "en": "Physical controls, documentation controls, and print-out controls.", "cmt_tr": "Fiziksel belgeleme ve yazdırma kontrolleri, girdilerin doğruluğunu sağlamaz.", "cmt_en": "Physical documentation and print-out controls do not ensure accuracy of inputs."}, {"tr": "Faaliyet listeleri, yankı kontrolleri ve önceden numaralandırılmış formlar.", "en": "Activity listings, echo checks, and pre-numbered forms.", "cmt_tr": "Yankı kontrolü, iletişim hatları boyunca iletim üzerinde bir girdi kontrolüdür.", "cmt_en": "An echo check, which is an input control over transmission along communications lines, does"}, {"tr": "Disk çıktı kontrolleri ve yazdırılmış çıktı kontrolleri.", "en": "Disk output controls and printed output controls.", "cmt_tr": "Çıktı kontrolleri tek başına çıktının eksiksizliğini ve doğruluğunu sağlamak için yetersizdir. Girdi kontrolleri de gereklidir.", "cmt_en": "Output controls are insufficient to ensure completeness and accuracy of output. Input controls are also needed."}, {"tr": "Girdi kontrolleri ve çıktı kontrolleri.", "en": "Input controls and output controls.", "cmt_tr": "Girdi kontrolleri, işleme için alınan verilerin uygun şekilde yetkilendirildiğine, makine tarafından okunabilir forma dönüştürüldüğüne ve tanımlandığına ilişkin makul güvence sağlar. Çıktı kontrolleri, işleme sonucunun doğru olduğuna ve yalnızca yetkili personelin çıktıyı aldığına ilişkin güvence sağlar.", "cmt_en": "Input controls provide reasonable assurance that data received for processing have been properly authorized, converted into machine-sensible form, and identified, and that data have not been lost, suppressed, added, duplicated, or otherwise improperly changed. Input controls also relate to rejections, correction, and resubmission of data that were initially incorrect. Output controls provide assurance that the processing result is accurate and that only authorized personnel receive the output."}], "answer": 3}, {"q_tr": "Toplu işleme için veri girdi doğrulama rutinleri şunları kapsar:", "q_en": "Data input validation routines for batch processing include", "options": [{"tr": "Terminal günlükleri.", "en": "Terminal logs.", "cmt_tr": "Terminal günlükleri erişim kontrolleridir.", "cmt_en": "Terminal logs are access controls."}, {"tr": "Parolalar.", "en": "Passwords.", "cmt_tr": "Parolalar erişim kontrolleridir.", "cmt_en": "Passwords are access controls."}, {"tr": "Karma toplamlar.", "en": "Hash totals.", "cmt_tr": "Girdi kontrolleri, işleme için sunulan verilerin yetkilendirilmiş, eksiksiz ve doğru olduğuna ilişkin güvence sağlar. Karma toplam, toplu işleme için bir veri girdi doğrulama rutini örneğidir.", "cmt_en": "Input controls provide assurance that data submitted for processing are authorized, complete, and accurate. A hash total is an example of a data input validation routine for batch processing. A hash total is a control total without a defined meaning, such as the total of employee numbers or invoice numbers, that is used to verify the completeness of data. Thus, the hash total for the employee listing by the personnel department could be compared with the total generated during the processing run."}, {"tr": "Yedekleme kontrolleri.", "en": "Backup controls.", "cmt_tr": "Yedekleme kontrolleri genel kontrollerdir.", "cmt_en": "Backup controls are general controls."}], "answer": 2}, {"q_tr": "Basamaklar toplamı kontrol rakamı kullanan bir muhasebe sistemi kimlik kodu aşağıdaki hatalardan hangisini tespit eder?", "q_en": "An accounting system identification code that uses a sum-of-digits check digit will detect which of the following errors?", "options": [{"tr": "Eksiksizlik hataları.", "en": "Completeness errors.", "cmt_tr": "Eksiksizlik hataları tespit edilecektir. Bu tür hatalar meydana geldiğinde toplam farklı olacaktır.", "cmt_en": "Completeness errors will be detected. The sum will be different if such errors occur."}, {"tr": "Soldan sıfır ekleme hataları.", "en": "Left-padding with zeros errors.", "cmt_tr": "Soldan sıfır ekleme tespit edilmeyecektir. Toplam aynı olacaktır ve bu veri tutarsızlığı hatalarına neden olabilir.", "cmt_en": "Left-padding numbers with zeros will not be detected. The sum would be the same, and this could cause data inconsistency errors."}, {"tr": "Yer değiştirme hataları.", "en": "Transposition errors.", "cmt_tr": "Kontrol rakamı yalnızca bir toplam ise, yer değiştirme hataları tespit edilmeyecektir çünkü toplam etkilenmeyecektir.", "cmt_en": "Self-checking digits may be used to detect incorrect identification numbers. The digit is generated by applying an algorithm to the ID number. During the input process, the check digit is recomputed by applying the same algorithm to the code actually entered. If the check digit is merely a sum, transposition errors will not be detected because the sum will be unaffected."}, {"tr": "Birbirini dengeleyen çoklu hatalar.", "en": "Multiple offsetting errors.", "cmt_tr": "Birbirini dengeleyen çoklu hatalar mutlaka tespit edilmeyecektir. Bu tür hatalar meydana geldiğinde toplam muhtemelen aynı olacaktır.", "cmt_en": "Multiple offsetting errors will not necessarily be detected. The sum will likely be the same if such errors occur."}], "answer": 0}, {"q_tr": "Bir şirketin bilgisayarlı veritabanına yeni bir müşterinin fatura adresi girilirken, katip sehven var olmayan bir posta kodu girmiştir. Sonuç olarak, yeni müşteriye gönderilen ilk aya ait fatura şirkete iade edilmiştir. Aşağıdakilerden hangisi, büyük olasılıkla şirketin bilgisayarlı veritabanına giriş sırasında hatanın keşfedilmesine yol açardı?", "q_en": "In entering the billing address for a new client in a company’s computerized database, a clerk erroneously entered a nonexistent zip code. As a result, the first month’s bill mailed to the new client was returned to the company. Which one of the following would most likely have led to discovery of the error at the time of entry into the company’s computerized database?", "options": [{"tr": "Limit testi.", "en": "Limit test.", "cmt_tr": "Limit testi, çalışma saatlerinin haftalık 100'ü özel onay olmadan aşmasını önlemek gibi nicel verilerle ilgilenir.", "cmt_en": "A limit test deals with quantified data, such as preventing hours worked in a single week from exceeding 100 without special authorization."}, {"tr": "Geçerlilik testi.", "en": "Validity test.", "cmt_tr": "Geçerlilik testlerinde, sisteme girilen değerler geçerli veri ana dosyalarıyla karşılaştırılır. Bu durumda, ABD'de kabul edilen tüm posta kodlarının ana dosyası bellekte tutulur ve katip posta kodu alanına her veri girişinde, girilen değer geçerli değerler listesiyle karşılaştırılır.", "cmt_en": "In validity tests, values entered into the system are compared against master files of valid data. In this case, a master file of all zip codes recognized in the U.S. is held in memory and each time a clerk enters data in the zip code field, the clerk’s entry is compared to the list of valid values. If the zip code entered does not match any entry in the master file, data entry is halted and the clerk is advised to reenter the data."}, {"tr": "Parite testi.", "en": "Parity test.", "cmt_tr": "Parite testi, doğru sayıda ikili bitin iletilip iletilmediğini sağlamanın bir yoludur.", "cmt_en": "A parity test is a means of ensuring whether the correct number of binary bits has been transmitted."}, {"tr": "Kayıt sayımı testi.", "en": "Record count test.", "cmt_tr": "Kayıt sayımı testi, bir toplu işte doğru sayıda kaydın işlendiğini sağlamak için toplu düzey bir kontroldür.", "cmt_en": "A record count test is a batch-level control for ensuring that the correct number of records has been processed in a batch."}], "answer": 1}, {"q_tr": "Bir şirket, muhasebe sistemini bordro ve genel muhasebe sistemleri arasında otomatik mutabakat yapacak şekilde tasarlamıştır. Şirket ne tür bir kontrol uygulamıştır?", "q_en": "A company has designed its accounting system to have an automated reconciliation between its payroll and general ledger systems. Which type of control has the company implemented?", "options": [{"tr": "Çıktı kontrolü.", "en": "Output control.", "cmt_tr": "Çıktı kontrolleri, işlemenin eksiksiz ve doğru olduğuna ilişkin güvence sağlar.", "cmt_en": "Output controls provide assurance that processing was complete and accurate."}, {"tr": "Girdi kontrolü.", "en": "Input control.", "cmt_tr": "Girdi kontrolleri, işleme için sunulan verilerin yetkilendirilmiş, eksiksiz ve doğru olduğuna ilişkin makul güvence sağlar.", "cmt_en": "Input controls provide reasonable assurance that data submitted for processing are authorized, complete, and accurate."}, {"tr": "İşleme kontrolü.", "en": "Processing control.", "cmt_tr": "İşleme kontrolleri, işleme için sunulan tüm verilerin işlendiğine ve yalnızca onaylanan verilerin işlendiğine ilişkin makul güvence sağlar. Bu kontroller, sistem geliştirme sürecinde programcılar tarafından uygulama koduna yerleştirilir.", "cmt_en": "Processing controls provide reasonable assurance that all data submitted for processing are processed and only approved data are processed. These controls are built into application code by programmers during the systems development process."}, {"tr": "İşlem kontrolü.", "en": "Transaction control.", "cmt_tr": "İşlem kontrolleri, bordro ve genel muhasebe sistemleri arasında otomatik mutabakat yapmaz.", "cmt_en": "Transaction controls do not automatically reconcile between payroll and general ledger systems."}], "answer": 2}, {"q_tr": "Bir işleme kontrolü, aşağıdakilerden hangisine ilişkin makul güvence sağlamaya yardımcı olur?", "q_en": "A processing control helps to provide reasonable assurance that", "options": [{"tr": "Verilerin bilgisayar sistemine düzgün bir şekilde girilmesi.", "en": "Data is entered properly into a computer system.", "cmt_tr": "İşleme kontrolleri, (1) işleme için sunulan tüm verilerin işlendiğine ve (2) yalnızca onaylanan verilerin işlendiğine ilişkin makul güvence sağlar.", "cmt_en": "Processing controls provide reasonable assurance that (1) all data submitted for processing are processed and (2) only approved data are processed. These controls are built into the application code by programmers during the systems development process."}, {"tr": "Yalnızca yetkili kullanıcıların tamamlanmış veri projelerine erişmesi.", "en": "Only authorized users have access to completed data projects.", "cmt_tr": "Bu, sisteme erişimi olması gereken kişilerle sınırlayan mantıksal bir kontrolü tanımlar.", "cmt_en": "This describes a logical control, which limits system access to those persons who should have access. Logical controls have a double focus: authentication and authorization."}, {"tr": "Veri hesaplamalarını yapmak için uygun bilgisayar programlarının kullanılması.", "en": "Proper computer programs are used to make data calculations.", "cmt_tr": "Bu, bilgisayar destekli denetim tekniğini tanımlar.", "cmt_en": "This describes a computer-assisted audit technique."}, {"tr": "Tamamlanmış veri ürünlerinin planlandığı zamanda hazır olması.", "en": "Finished data products are available on schedule.", "cmt_tr": "Bu bir çıktı kontrolünü tanımlar.", "cmt_en": "This describes an output control."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi, büyük olasılıkla bir işletmenin muhasebe uygulama sistemi için işleme kontrolü olarak kabul edilir?", "q_en": "Which one of the following is most likely considered a processing control for an entity’s accounting application system?", "options": [{"tr": "Geçerlilik kontrolü.", "en": "Validity check.", "cmt_tr": "Geçerlilik kontrolleri, girilen verilerin geçerli bir yapıda olmasını sağlar. Bu bir depolama kontrolüdür.", "cmt_en": "Validity checks ensure that entered data are in a valid structure. This is a storage control."}, {"tr": "İşlem günlüğü.", "en": "Transaction log.", "cmt_tr": "İşleme kontrolleri, işleme için sunulan tüm verilerin işlendiğine ve yalnızca onaylanan verilerin işlendiğine ilişkin makul güvence sağlar. Bir işlem günlüğü, gerçekleşen tüm işlemlerin kaydını tutar ve düzgün işlendiklerinden emin olur.", "cmt_en": "Processing controls provide reasonable assurance that (1) all data submitted for processing are processed and (2) only approved data are processed. These controls are built into the application code by programmers during the systems development process. A transaction log would keep track of all transactions that occurred and make sure that they were properly processed."}, {"tr": "Tamponlama (spooling).", "en": "Spooling.", "cmt_tr": "Tamponlama, verilerin çevre birimi ihtiyaç duyduğunda erişebileceği bir ara depolama konumuna gönderilmesidir. Tamponlama bir veri depolama sürecidir, işleme kontrolü değildir.", "cmt_en": "Spooling refers to sending data to an intermediate storage location that is accessible by the peripheral device when needed. For example, print files are spooled to an intermediary storage for the printer to access when it is ready to print. Spooling is a process for storing data but not a process control."}, {"tr": "Kontrol rakamı.", "en": "Check digit.", "cmt_tr": "Kontrol rakamları, bilgilerin sisteme düzgün girilmesini sağlar. Girdi kontrolleridir.", "cmt_en": "Check digits ensure that information is entered into the system properly. They are input controls."}], "answer": 1}, {"q_tr": "Aşağıdaki hatalardan hangisi büyük olasılıkla toplu mali toplamlar tarafından tespit edilir?", "q_en": "Which of the following errors most likely would be detected by batch financial totals?", "options": [{"tr": "Haftalık bordro çalışmasında bir çalışanın maaş çekindeki yer değiştirme hatası.", "en": "A transposition error on one employee’s paycheck on a weekly payroll run.", "cmt_tr": "Toplu mali toplamlar, bireysel kalemlerin dolar tutarlarının sistem tarafından raporlanan toplamını, kullanıcı tarafından hesaplanan tutarla karşılaştırır. Bu nedenle toplu mali toplamlar, büyük olasılıkla bir çalışanın maaş çekindeki yer değiştirme hatasını tespit eder.", "cmt_en": "Batch financial totals compare the sum of the dollar amounts of the individual items as reported by the system, with the amount calculated by the user. Thus, batch financial totals would most likely detect a transposition error on an employee’s paycheck."}, {"tr": "Günlük satışların bir toplu işinde fatura numarasındaki eksik bir rakam.", "en": "A missing digit in an invoice number in a batch of daily sales.", "cmt_tr": "Toplu mali toplamlar, toplu işteki faturaların toplam dolar tutarları hakkında bilgi verir, ancak fatura numaralarındaki rakamlardaki hataları tespit etmez.", "cmt_en": "Batch financial totals give information about the total dollar amounts of the invoices within the batch but do not detect errors in the digits of the invoice numbers themselves."}, {"tr": "Sehven iki farklı toplu işe girilen bir satın alma siparişi.", "en": "A purchase order mistakenly entered into two different batches.", "cmt_tr": "Toplu mali toplamlar, iki ayrı toplu işte yapılan hataları tespit edemez.", "cmt_en": "Batch financial totals are not capable of detecting errors that are made in two separate batches."}, {"tr": "Bir alacak hesabı elemanının müşteri ödemesini cebe atması ve ilgili kayıtları değiştirmesinden kaynaklanan suistimal.", "en": "Malfeasance resulting from a receivable clerk’s pocketing of a customer’s payment and altering of the related records.", "cmt_tr": "Toplu mali toplamlar tek başına kayıt değişikliğini veya ödeme hırsızlığını tespit edemez.", "cmt_en": "Batch financial totals alone are not capable of detecting the alteration of records or the theft of payment."}], "answer": 0}, {"q_tr": "Bir şirketin satın alma departmanı, operasyonlar tarafından gönderilen elektronik taleplere dayalı satın alma siparişleri oluşturmaktadır. Bu talepler operasyonlar tarafından onaylanır ve satın alma emri vermek için başka onaya gerek yoktur. Satın alma kâtipleri, elektronik taleplere dayalı olarak satıcı adları ve fiyatlar dahil sipariş bilgilerini satın alma sistemine girer. Siparişlerin doğru girilmesini sağlamak için en iyi kontrol aşağıdakilerden hangisidir?", "q_en": "A company’s purchasing department creates purchase orders based on electronic requests sent by operations. These requests are approved by operations, and no further approvals are required to place a purchase order. Purchasing clerks key the order information, including vendor names and prices, into the purchasing system based on the electronic requests. Which of the following is the best control to ensure that orders are entered accurately?", "options": [{"tr": "Operasyonlardaki yönetimin onayları, sipariş talepleriyle birlikte kâtiplere gönderilir ve ardından yerine getirilir.", "en": "Approvals from management in operations are sent to clerks along with the order requests, which are then filled.", "cmt_tr": "Yönetim onayı, satın alma emrinin yetkilendirilmiş olmasını sağlar. Veri girişinin doğruluğunu sağlamaz.", "cmt_en": "Management approval ensures that the purchase order is authorized. It does not ensure the accuracy of data entry."}, {"tr": "Kâtipler, beklenen bilgi türünü gösteren ancak girdiyi kısıtlamayan ön biçimlendirilmiş ekranlar kullanır.", "en": "Clerks use preformatted screens, which show the clerks the type of information expected, but do not restrict input.", "cmt_tr": "Ön biçimlendirme yalnızca kabul edilemez veri türlerinin girilmesini önler. Verilerin doğruluğunu sağlamaz.", "cmt_en": "Preformatting only prevents the input of unacceptable data types, such as entering a letter instead of a number for a price. It does not ensure the accuracy of the data. For example, preformatting cannot detect wrongly entered numbers (e.g., entering $100 as $1,000)."}, {"tr": "Satın alma sistemi, kâtipler tarafından girilen satıcı bilgilerini ve fiyatları ana satıcı ve fiyat verileriyle karşılaştırır ve sapmaları reddeder.", "en": "The purchasing system compares vendor information and prices entered by the clerks to master vendor and pricing data and rejects variances.", "cmt_tr": "Girilen fiyatların ana dosyadaki fiyatlarla karşılaştırılması (geçerlilik kontrolü), yanlış fiyatların tespit edilmesini ve sisteme girilememesini sağlar.", "cmt_en": "Comparing the prices entered against the prices in the master file (validity check) ensures that incorrect prices are detected and cannot be entered into the system."}, {"tr": "Satın alma kâtipleri tarafından her gün girilen tüm kalemlerin toplam miktarının karma toplamı, operasyon personeli tarafından başlatılan tüm kalemlerin toplam miktarıyla karşılaştırılır.", "en": "A hash total of the total quantity of all items entered by purchasing clerks each day is compared to the total quantity of all the items originated by operations personnel.", "cmt_tr": "Karma toplamlar tüm kalemlerin toplamının doğru olmasını sağlar, ancak sisteme girilen bireysel fiyatların doğruluğunu sağlamaz.", "cmt_en": "Hash totals ensure the sum of all items are correct but do not ensure the accuracy of individual prices entered into the system."}], "answer": 2}, {"q_tr": "İnceleme altındaki birim, satış işlemlerini işlemek için çevrimiçi satış sipariş işleme sistemi kullanmaktadır. Birimin satış verileri elektronik olarak sıralanır ve düzenleme kontrollerine tabi tutulur. Düzenleme kontrollerinin doğrudan çıktısı büyük olasılıkla şu olacaktır:", "q_en": "The activity under review uses an online sales order processing system to process its sales transactions. The activity under review’s sales data are electronically sorted and subjected to edit checks. A direct output of the edit checks most likely would be a", "options": [{"tr": "Tüm eksik satış faturalarının raporu.", "en": "Report of all missing sales invoices.", "cmt_tr": "Eksik faturaların raporu, düzenleme kontrollerinin doğrudan çıktısı olma olasılığı düşüktür.", "cmt_en": "A report of missing invoices is unlikely to be a direct output of the edit checks."}, {"tr": "Tüm reddedilmiş satış işlemlerinin dosyası.", "en": "File of all rejected sales transactions.", "cmt_tr": "Düzenleme kontrolleri, kabul öncesinde işlemlerin eksiksizliğini, makullüğünü, geçerliliğini ve ilgili diğer konuları test etmek için uygulanır. Reddedilen işlemler değerlendirme, düzeltme ve yeniden sunulma için bir dosyaya kaydedilmelidir.", "cmt_en": "Edit checks are applied to transactions to test for completeness, reasonableness, validity, and other related issues prior to acceptance. Rejected transactions should be recorded in a file for evaluation, correction, and resubmission."}, {"tr": "Tüm kullanıcı kod numaraları ve parolaların çıktısı.", "en": "Printout of all user code numbers and passwords.", "cmt_tr": "Tüm kullanıcı kod numaraları ve parolaların çıktısı, düzenleme kontrollerinin doğrudan çıktısı olma olasılığı düşüktür.", "cmt_en": "A printout of all user code numbers and passwords is unlikely to be a direct output of the edit checks."}, {"tr": "Tüm geçersiz kılınmış sevkiyat belgelerinin listesi.", "en": "List of all voided shipping documents.", "cmt_tr": "Tüm geçersiz kılınmış sevkiyat belgelerinin listesi, düzenleme kontrollerinin doğrudan çıktısı olma olasılığı düşüktür.", "cmt_en": "A list of all voided shipping documents is unlikely to be a direct output of the edit checks."}], "answer": 1}, {"q_tr": "Bir borçlar hesabı elemanı, bir satıcıya yapılan önceki ödemelerde yetkisiz değişiklikler yapmakla suçlanmaktadır. Kanıt aşağıdaki yerlerden hangisinde ortaya çıkarılabilir?", "q_en": "An accounts payable clerk is accused of making unauthorized changes to previous payments to a vendor. Proof could be uncovered in which of the following places?", "options": [{"tr": "İşlem günlükleri.", "en": "Transaction logs.", "cmt_tr": "İşlem günlükleri, uygulamada gerçekleştirilen her eylemi raporlar. Herhangi bir kullanıcının faaliyetleri bir tarih ve saate ve muhtemelen terminal numarasına izlenebilir.", "cmt_en": "Transaction logs report every action performed in the application. Any user’s activities can be traced to a time and date and possibly terminal number."}, {"tr": "Hata raporları.", "en": "Error reports.", "cmt_tr": "Hata raporları yalnızca önceden tanımlanmış kategorilere giren hataları raporlar. Yetkisiz dosya değişikliklerini raporlayamazlar.", "cmt_en": "Error reports only report errors that fall into predefined categories. They cannot report unauthorized file changes."}, {"tr": "Hata dosyaları.", "en": "Error files.", "cmt_tr": "Hata dosyaları yalnızca önceden tanımlanmış kategorilere giren hataları içerir. Yetkisiz dosya değişikliklerini raporlayamazlar.", "cmt_en": "Error files only contain errors that fall into predefined categories. They cannot report unauthorized file changes."}, {"tr": "Doğrulanmış veri dosyası.", "en": "Validated data file.", "cmt_tr": "Doğrulanmış veri dosyası, tanımlanan parametreler dahilinde geçerli kabul edilen verileri içerir, ancak bu tüm geçerli verilerin uygun şekilde yetkilendirildiği anlamına gelmez.", "cmt_en": "A validated data file contains data considered valid within defined parameters, but that does not mean all the valid data is properly authorized."}], "answer": 0}, {"q_tr": "Küçük bir kâr amacı gütmeyen kuruluşta denetçi, bağış yönetiminde görevlerin yetersiz ayrılığı nedeniyle hile riskinin bulunduğunu tespit eder. Bu riski azaltmak için en etkili telafi edici kontrol hangisidir?", "q_en": "In a small non-profit organization, the auditor finds that fraud risk exists because of inadequate segregation of duties in managing donations. Which compensating control is most effective to mitigate this risk?", "options": [{"tr": "Bağışları ve ödemeleri denetlemek üzere bir gözden geçirme komitesi oluşturulması.", "en": "Establishing a review committee to oversee donations and disbursements.", "cmt_tr": "Gözden geçirme komitesi, bağış yönetimi için gözetim sağlayarak hiçbir bireyin tüm süreç üzerinde kontrole sahip olmamasını güvence altına alır.", "cmt_en": "A review committee provides oversight for donation management, ensuring that no individual has control over the entire process. Thi
