CEO’s requesting a check with no purchase order is possible because of an inherent limitation. It is an override of the internal control by management."}, {"tr": "Müşteri kredi kontrollerinin yapılmaması.", "en": "Customer credit checks are not performed.", "cmt_tr": "Müşteri kredi kontrolünün yapılmaması, bir kontrolün uygulanmamasıdır.", "cmt_en": "Not performing a customer credit check is a failure to implement a control."}, {"tr": "Sevkiyat belgelerinin satış faturalarıyla eşleştirilmemesi.", "en": "Shipping documents are not matched to sales invoices.", "cmt_tr": "Sevkiyat belgeleri satış faturalarıyla eşleştirilmediğinde, bir kontrol uygulanmamıştır.", "cmt_en": "When shipping documents are not matched to sales invoices, a control is not implemented."}], "answer": 1}, {"q_tr": "İç kontrol hakkında aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is correct regarding internal control?", "options": [{"tr": "İyi tasarlanmış bir iç kontrol ortamı, bir işletmenin kontrol hedeflerine ulaşılmasını garanti eder.", "en": "A well-designed internal control environment ensures the achievement of an entity’s control objectives.", "cmt_tr": "İç kontrol, bir işletmenin hedeflerine ulaşılmasına ilişkin yalnızca makul güvence sağlar.", "cmt_en": "Internal control provides only reasonable assurance of achieving an entity’s objectives."}, {"tr": "İç kontrolün doğal bir sınırlılığı, kontrollerin yönetimin geçersiz kılması yoluyla atlatılabilmesidir.", "en": "An inherent limitation of internal control is that controls can be circumvented by management override.", "cmt_tr": "Doğal sınırlılıkları nedeniyle iç kontrol yalnızca makul güvence sağlayabilir. İnsan yargısı hatalıdır, kontroller insan hatası nedeniyle başarısız olabilir, gizli anlaşma yoluyla kontroller atlatılabilir ve yönetim iç kontrolü uygunsuz şekilde geçersiz kılabilir.", "cmt_en": "Because of its inherent limitations, internal control can provide only reasonable assurance. Human judgment is faulty, controls may fail because of human error, controls can be circumvented by collusion, and management may inappropriately override internal control."}, {"tr": "İyi tasarlanmış ve işletilen bir iç kontrol ortamı gizli anlaşmayı tespit etmelidir.", "en": "A well-designed and operated internal control environment should detect collusion.", "cmt_tr": "Kontroller gizli anlaşma yoluyla atlatılabilir.", "cmt_en": "Controls can be circumvented by collusion."}, {"tr": "İç kontrol gerekli bir iş fonksiyonudur ve tüm hile ve hataları tespit etmek için tasarlanıp işletilmelidir.", "en": "Internal control is a necessary business function and should be designed and operated to detect all fraud and error.", "cmt_tr": "Tüm hile ve hataların tespiti mümkün değildir.", "cmt_en": "Detection of all fraud and error is not feasible."}], "answer": 1}, {"q_tr": "Aşağıdaki özelliklerden hangisi bilgisayar işlemeyi manuel işlemeden ayırır?", "q_en": "Which of the following characteristics distinguishes computer processing from manual processing?", "options": [{"tr": "Bilgisayar işleme, normalde manuel işlemeyle ilişkilendirilen hesaplama hatası oluşumunu fiilen ortadan kaldırır.", "en": "Computer processing virtually eliminates the occurrence of computational error normally associated with manual processing.", "cmt_tr": "Bilgisayar işleme, benzer işlemleri aynı işleme talimatlarına tek tip olarak tabi tutar. Program uygun şekilde yazılıp test edildikten sonra, görevi tekrarlayarak ve hatasız olarak yerine getirir.", "cmt_en": "Computer processing uniformly subjects like transactions to the same processing instructions. Once the program is written and tested appropriately, it will perform the task repetitively and without error."}, {"tr": "Bilgisayar işlemedeki hatalar veya hileler, meydana gelmelerinden kısa süre sonra tespit edilecektir.", "en": "Errors or fraud in computer processing will be detected soon after their occurrence.", "cmt_tr": "Girdide bir hata oluştuğunda, zamanında keşfedilemeyebilir.", "cmt_en": "When an error does occur in input, it may not be discovered on a timely basis."}, {"tr": "Sistematik hata potansiyeli genellikle manuel işlemede bilgisayarlı işlemeden daha fazladır.", "en": "The potential for systematic errors is ordinarily greater in manual processing than in computerized processing.", "cmt_tr": "Programda bir hata varsa, bilgisayarlı işlemede sistematik (tekrarlayan) hatalar meydana gelecektir.", "cmt_en": "Systematic (repetitive) errors will occur in computerized processing if an error exists in the program."}, {"tr": "Çoğu bilgisayar sistemi, denetim amacıyla yararlı işlem izlerinin var olmayacağı şekilde tasarlanmıştır.", "en": "Most computer systems are designed so that transaction trails useful for audit purposes do not exist.", "cmt_tr": "Yeterli şekilde tasarlanmış sistemler; işlem, konsol ve hata günlükleri tutarak yararlı denetim izleri oluşturur.", "cmt_en": "Adequately designed systems maintain transaction, console, and error logs that create useful audit trails."}], "answer": 0}, {"q_tr": "Bir firma yakın zamanda satın alma döngüsünü manuel bir süreçten çevrimiçi bilgisayar sistemine dönüştürmüştür. Aşağıdakilerden hangisi, yeni otomatik sisteme dönüşümle ilişkili olası bir sonuçtur?", "q_en": "A firm has recently converted its purchasing cycle from a manual process to an online computer system. Which of the following is a probable result associated with conversion to the new automatic system?", "options": [{"tr": "İşleme hataları artmıştır.", "en": "Processing errors are increased.", "cmt_tr": "Bilgisayar sistemi işleme hatalarını azaltır.", "cmt_en": "A computer system decreases processing errors."}, {"tr": "Firmanın risk maruziyetleri azalmıştır.", "en": "The firm’s risk exposures are reduced.", "cmt_tr": "Yeni bir sisteme dönüşüm risk maruziyetlerinin sayısını azaltmaz.", "cmt_en": "The conversion to a new system does not reduce the number of risk exposures."}, {"tr": "İşleme süresi artmıştır.", "en": "Processing time is increased.", "cmt_tr": "İşleme süresi azalmıştır.", "cmt_en": "Processing time is decreased."}, {"tr": "Geleneksel görevler daha az ayrılmıştır.", "en": "Traditional duties are less segregated.", "cmt_tr": "Bilgisayar ortamında görevlerin ayrılığı her zaman uygulanabilir olmayabilir. Örneğin, bir bilgisayar çekleri yazdırabilir, ödemeleri kaydedebilir ve hesap bakiyesinin mutabakatı için bilgi üretebilir.", "cmt_en": "In a computer environment, segregation of duties is not always feasible. For example, a computer may print checks, record disbursements, and generate information for reconciling the account balance."}], "answer": 3}, {"q_tr": "Küçük bir şirket, saat kartlarına çalışma süresini kaydetme sisteminden, çalışanların manyetik kartlarla giriş-çıkış zamanlarını kaydettikleri bilgisayarlı bir bordro sistemine geçiş yapmıştır. Bilgisayar sistemi tüm bordro kayıtlarını otomatik olarak günceller. Bu değişiklik nedeniyle:", "q_en": "A small company has changed from a system of recording time worked on clock cards to a computerized payroll system in which employees record time in and out with magnetic cards. The computer system automatically updates all payroll records. Because of this change,", "options": [{"tr": "Genelleştirilmiş bilgisayar denetim programı kullanılmalıdır.", "en": "A generalized computer audit program must be used.", "cmt_tr": "Genelleştirilmiş denetim yazılımının kullanımı, bilgisayar tabanlı bir sistemi denetlemenin birçok yolundan yalnızca biridir.", "cmt_en": "Use of generalized audit software is only one of many ways of auditing a computer-based system."}, {"tr": "Denetim izinin bir kısmı değişmiştir.", "en": "Part of the audit trail is altered.", "cmt_tr": "Bilgisayar sisteminde, denetim amacıyla yararlı bir işlem izi yalnızca kısa bir süre veya yalnızca bilgisayar tarafından okunabilir biçimde var olabilir.", "cmt_en": "In a computer system, a transaction trail useful for auditing purposes might exist only for a brief time or only in computer-readable form."}, {"tr": "Bordroyla ilgili hile potansiyeli azalmıştır.", "en": "The potential for payroll-related fraud is diminished.", "cmt_tr": "Bilgisayar sistemine geçiş, uyumsuz fonksiyonların ayrılığını ortadan kaldırarak hile olasılığını fiilen artırabilir.", "cmt_en": "Conversion to a computer system may actually increase the chance of fraud by eliminating segregation of incompatible functions."}, {"tr": "İşlemler toplu olarak işlenmelidir.", "en": "Transactions must be processed in batches.", "cmt_tr": "Otomatik güncelleme, işlemenin toplu modda olmadığını gösterir.", "cmt_en": "Automatic updating indicates that processing is not in batch mode."}], "answer": 1}, {"q_tr": "BT'deki hızlı değişimlerin yarattığı riskler, iç kontrolün hangi kavramlarını etkilemiştir?", "q_en": "The risks created by rapid changes in IT have affected which concepts of internal control?", "options": [{"tr": "Yalnızca maliyet-fayda analizi ve kontrol ortamı.", "en": "Cost-benefit analysis and the control environment only.", "cmt_tr": "BT kontrol süreçleri, hedeflere ulaşıldığına ilişkin makul güvence sağlamalıdır. Ayrıca, yönetim kontrolden sorumlu olmaya devam eder.", "cmt_en": "IT control processes must provide reasonable assurance that objectives are achieved. Moreover, management continues to be responsible for control."}, {"tr": "Yalnızca makul güvence ve yönetimin sorumluluğu.", "en": "Reasonable assurance and management’s responsibility only.", "cmt_tr": "Maliyet-fayda analizi önemli bir araç olmaya devam eder. Ayrıca, BT ortamındaki kontrol ortamı kuruluşun tonunu yansıtır.", "cmt_en": "Cost-benefit analysis remains an essential tool. Furthermore, the control environment in an IT setting reflects the tone of the organization."}, {"tr": "Yalnızca kontrol ortamı, makul güvence ve yönetimin sorumluluğu.", "en": "The control environment, reasonable assurance, and management’s responsibility only.", "cmt_tr": "Maliyet-fayda analizi, belirlenen riskleri kabul edilebilir maliyetle azaltan kontrolleri belirlemek için önemli bir araç olmaya devam eder.", "cmt_en": "Cost-benefit analysis remains an essential tool for determining which controls mitigate identified risks at an acceptable cost."}, {"tr": "Maliyet-fayda analizi, kontrol ortamı, makul güvence ve yönetimin sorumluluğu.", "en": "The cost-benefit analysis, the control environment, reasonable assurance, and management’s responsibility.", "cmt_tr": "Teknoloji, riskler ve kontrol yöntemleri değişse de iç kontrol hedefleri esasen aynı kalır. Birçok kontrol kavramı BT değişikliklerinden bağımsız olarak geçerlidir.", "cmt_en": "Internal control objectives remain essentially the same although technology, risks, and control methods change. Many concepts of control are relevant regardless of IT changes."}], "answer": 3}], "SU2 - Types of Controls": [{"q_tr": "Satın almaların onaylı bir tedarikçi listesindeki tedarikçilerden yapılması gerekliliği, aşağıdakilerden hangisine örnektir?", "q_en": "The requirement that purchases be made from suppliers on an approved vendor list is an example of a", "options": [{"tr": "Önleyici kontrol.", "en": "Preventive control.", "cmt_tr": "Önleyici kontroller, hataların oluşmasını engellemek amacıyla işlemlerin gerçekleşmesinden önce alınan eylemlerdir. Onaylı tedarikçi listesinin kullanılması, kabul edilemez tedarikçilerin kullanılmasını önlemeye yönelik bir kontroldür.", "cmt_en": "Preventive controls are actions taken prior to the occurrence of transactions with the intent of stopping errors from occurring. Use of an approved vendor list is a control to prevent the use of unacceptable suppliers."}, {"tr": "Tespit edici kontrol.", "en": "Detective control.", "cmt_tr": "Tespit edici kontrol, hataları meydana geldikten sonra tespit eder.", "cmt_en": "A detective control identifies errors after they have occurred."}, {"tr": "Düzeltici kontrol.", "en": "Corrective control.", "cmt_tr": "Düzeltici kontroller, tespit edici kontroller tarafından belirlenen sorunları düzeltir.", "cmt_en": "Corrective controls correct the problems identified by detective controls."}, {"tr": "İzleme kontrolü.", "en": "Monitoring control.", "cmt_tr": "İzleme kontrolleri, kontrol sisteminin performansının zaman içindeki kalitesini sağlamak üzere tasarlanmıştır.", "cmt_en": "Monitoring controls are designed to ensure the quality of the control system’s performance over time."}], "answer": 0}, {"q_tr": "Yönetsel kontrol; ileri beslemeli, eş zamanlı ve geri bildirim kontrolleri olarak ayrılabilir. Aşağıdakilerden hangisi geri bildirim kontrolüne örnektir?", "q_en": "Managerial control can be divided into feedforward, concurrent, and feedback controls. Which of the following is an example of a feedback control?", "options": [{"tr": "Kalite kontrol eğitimi.", "en": "Quality control training.", "cmt_tr": "Kalite kontrol eğitimi, ileri beslemeli veya geleceğe yönelik bir kontroldür.", "cmt_en": "Quality control training is a feedforward, or future-directed, control."}, {"tr": "Bütçeleme.", "en": "Budgeting.", "cmt_tr": "Bütçeleme, ileri beslemeli veya geleceğe yönelik bir kontroldür.", "cmt_en": "Budgeting is a feedforward, or future-directed, control."}, {"tr": "Envanter ihtiyaçlarının tahmini.", "en": "Forecasting inventory needs.", "cmt_tr": "Envanter ihtiyaçlarının tahmini, ileri beslemeli veya geleceğe yönelik bir kontroldür.", "cmt_en": "Forecasting inventory needs is a feedforward, or future-directed, control."}, {"tr": "Sapma analizi.", "en": "Variance analysis.", "cmt_tr": "Geri bildirim kontrolü, istenen gelecek duruma ulaşılmasını sağlamak için gerçekleşmiş performansı ölçer. Geçmiş hatalardan öğrenerek gelecekteki performansı iyileştirmek için kullanılır. Sapma, bir standarttan sapmadır. Dolayısıyla sapma analizi bir geri bildirim kontrolüdür.", "cmt_en": "A feedback control measures actual performance, i.e., something that has already occurred, to ensure that a desired future state is attained. It is used to evaluate past activity to improve future performance. A variance is a deviation from a standard. Thus, variance analysis is a feedback control."}], "answer": 3}, {"q_tr": "Bir şirketin operasyon müdürü, yeni ve pahalı bir makinenin satın alınacağını 60 gün önceden o kuruluşun mali işler müdürüne bildirmiştir. Bu bildirim, mali işler müdürünün şirketin yatırım portföyünün bir kısmını uygun koşullarda düzenli bir şekilde nakde çevirmesine olanak tanımıştır. Ne tür bir kontrol söz konusudur?", "q_en": "The operations manager of a company notified the chief financial officer of that organization 60 days in advance that a new, expensive piece of machinery was going to be purchased. This notification allowed the chief financial officer to make an orderly liquidation of some of the company’s investment portfolio on favorable terms. What type of control was involved?", "options": [{"tr": "Geri bildirim.", "en": "Feedback.", "cmt_tr": "Geri bildirim kontrolleri, geçmiş performans değerlendirmelerine dayalı karar alma süreçlerine uygulanır.", "cmt_en": "Feedback controls apply to decision making based on evaluations of past performance."}, {"tr": "Stratejik.", "en": "Strategic.", "cmt_tr": "Stratejik kontroller geniş kapsamlıdır ve kuruluşu uzun bir süre boyunca etkiler. Kalite ve Ar-Ge gibi uzun vadeli değişkenlere uygulanır.", "cmt_en": "Strategic controls are broad-based and affect an organization over a long period. They apply to such long-term variables as quality and R&D."}, {"tr": "Eş zamanlı.", "en": "Concurrent.", "cmt_tr": "Eş zamanlı kontroller devam eden süreçleri ayarlar.", "cmt_en": "Concurrent controls adjust ongoing processes."}, {"tr": "İleri beslemeli.", "en": "Feedforward.", "cmt_tr": "İleri beslemeli kontroller, sorunların aktif olarak öngörülmesini sağlayarak zamanında önlenmesine veya çözülmesine olanak tanır. Başka bir örnek, kusurlu bitmiş ürünlerden kaçınmak için ham maddelerin ve yarı mamullerin kalite kontrol incelemesidir.", "cmt_en": "Feedforward controls provide for the active anticipation of problems so that they can be avoided or resolved in a timely manner. Another example is the quality control inspection of raw materials and work-in-process to avoid defective finished goods."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi geri bildirim kontrolüdür?", "q_en": "Which of the following is a feedback control?", "options": [{"tr": "Önleyici bakım.", "en": "Preventive maintenance.", "cmt_tr": "Önleyici bakım, ileri beslemeli bir kontroldür. Sorunları öngörmeye ve önlemeye çalışır.", "cmt_en": "Preventive maintenance is a feedforward control. It attempts to anticipate and prevent problems."}, {"tr": "Tamamlanmış malların incelenmesi.", "en": "Inspection of completed goods.", "cmt_tr": "Geri bildirim kontrolleri, tamamlanmış faaliyetler hakkında bilgi elde eder. Geçmiş hatalardan öğrenerek gelecekteki performansın iyileştirilmesine olanak tanır. Böylece düzeltici eylem olaydan sonra gerçekleşir. Tamamlanmış malların incelenmesi, geri bildirim kontrolüne örnektir.", "cmt_en": "Feedback controls obtain information about completed activities. They permit improvement in future performance by learning from past mistakes. Thus, corrective action occurs after the fact. Inspection of completed goods is an example of a feedback control."}, {"tr": "Üretim hattı çalışanlarının yakından denetimi.", "en": "Close supervision of production-line workers.", "cmt_tr": "Üretim hattı çalışanlarının yakından denetimi, eş zamanlı bir kontroldür. Devam eden bir süreci ayarlar.", "cmt_en": "The close supervision of production-line workers is a concurrent control. It adjusts an ongoing process."}, {"tr": "Performansın bir standartla karşılaştırılarak ölçülmesi.", "en": "Measuring performance against a standard.", "cmt_tr": "Performansın bir standartla karşılaştırılarak ölçülmesi, kontrolün genel bir yönüdür.", "cmt_en": "Measuring performance against a standard is a general aspect of control."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi bir araştırma ve geliştirme departmanı için operasyonel bir kontroldür?", "q_en": "Which of the following is an operating control for a research and development department?", "options": [{"tr": "Ar-Ge personeli bordro departmanı tarafından işe alınır.", "en": "Research and development personnel are hired by the payroll department.", "cmt_tr": "Yalnızca insan kaynakları departmanı işe almadan sorumlu olmalıdır. Kayıt tutmadan sorumlu bir departman (örn. bordro) işlemleri yetkilendirmemelidir.", "cmt_en": "Only the human resources department should be responsible for hiring. A department responsible for recordkeeping (e.g., payroll) should not authorize transactions."}, {"tr": "Ar-Ge harcamaları bağımsız bir kişi tarafından gözden geçirilir.", "en": "Research and development expenditures are reviewed by an independent person.", "cmt_tr": "Parasal tutarların gözden geçirilmesi finansal bir kontroldür.", "cmt_en": "Reviewing monetary amounts is a financial control."}, {"tr": "Tüm Ar-Ge maliyetleri ilgili muhasebe ilkelerine uygun olarak giderleştirilir.", "en": "All research and development costs are charged to expense in accordance with the applicable accounting principles.", "cmt_tr": "Ar-Ge maliyetlerinin giderleştirilmesi bir kontrol olmayıp muhasebe uygulamasıdır.", "cmt_en": "Expensing R&D costs is an accounting treatment rather than a control."}, {"tr": "Ar-Ge bütçesi yeni ürünler, ürün bakımı ve maliyet azaltma programları arasında uygun şekilde dağıtılır.", "en": "The research and development budget is properly allocated between new products, product maintenance, and cost reduction programs.", "cmt_tr": "Operasyonel kontroller, üretim ve destek faaliyetlerine uygulananlardır. Yerleşik kriter veya standartlardan yoksun olabilecekleri için yönetim ilkeleri ve yöntemlerine dayanmalıdır. Ar-Ge maliyetlerinin yeni ürünler, ürün bakımı ve maliyet azaltma programlarına uygun dağıtımı buna örnektir.", "cmt_en": "Operating controls are those applicable to production and support activities. Because they may lack established criteria or standards, they should be based on management principles and methods. The appropriate allocation of R&D costs to new products, product maintenance, and cost reduction programs is an example. This is in contrast to the expensing of R&D costs, which is required by the rules of external financial reporting."}], "answer": 3}, {"q_tr": "Yönetime satışlarda belirlenmiş minimum brüt kâr marjlarının gerçekleştirilmesine ilişkin güvence sağlamak için tasarlanmış kontroller şunlardır:", "q_en": "Controls that are designed to provide management with assurance of the realization of specified minimum gross margins on sales are", "options": [{"tr": "Yönlendirici kontroller.", "en": "Directive controls.", "cmt_tr": "Yönlendirici kontrollerin amacı, arzu edilen olayların gerçekleşmesini sağlamak veya teşvik etmektir; örneğin yönetime satışlarda belirlenmiş minimum brüt kâr marjlarının gerçekleştirilmesine ilişkin güvence sağlamak.", "cmt_en": "The objective of directive controls is to cause or encourage desirable events to occur, e.g., providing management with assurance of the realization of specified minimum gross margins on sales."}, {"tr": "Önleyici kontroller.", "en": "Preventive controls.", "cmt_tr": "Önleyici kontroller, istenmeyen olayların gerçekleşmesini caydırır.", "cmt_en": "Preventive controls deter undesirable events from occurring."}, {"tr": "Tespit edici kontroller.", "en": "Detective controls.", "cmt_tr": "Tespit edici kontroller, meydana gelmiş istenmeyen olayları ortaya çıkarır ve düzeltir.", "cmt_en": "Detective controls uncover and correct undesirable events that have occurred."}, {"tr": "Çıktı kontrolleri.", "en": "Output controls.", "cmt_tr": "Çıktı kontrolleri, bir sistem tarafından işlenen bilgilerin doğruluğu ve makullüğüyle ilgilidir, operasyonel kontrollerle değil.", "cmt_en": "Output controls relate to the accuracy and reasonableness of information processed by a system, not to operating controls."}], "answer": 0}, {"q_tr": "Aşağıdaki girdi kontrollerinden veya düzenleme kontrollerinden hangisi, bir işlemin ödeme tutarı alanındaki belirli hata türlerini yakalar?", "q_en": "Which one of the following input controls or edit checks would catch certain types of errors within the payment amount field of a transaction?", "options": [{"tr": "Kayıt sayımı.", "en": "Record count.", "cmt_tr": "Kayıt sayımı, bir sürece girilen belge sayısını belirler.", "cmt_en": "A record count determines the number of documents entered into a process."}, {"tr": "Yankı kontrolü.", "en": "Echo check.", "cmt_tr": "Yankı kontrolü, bilgisayar donanımının güvenilirliğini test eder. Örneğin, CPU yazıcıya yazdırmadan hemen önce yankılanan bir sinyal gönderir. Sinyal, uygun yazdırma konumunun etkinleştirildiğini doğrular.", "cmt_en": "An echo check tests the reliability of computer hardware. For example, the CPU sends a signal to a printer that is echoed just prior to printing. The signal verifies that the proper print position has been activated."}, {"tr": "Kontrol rakamı.", "en": "Check digit.", "cmt_tr": "Bir kimlik numarasına algoritma uygulanarak kendi kendini denetleyen bir numara üretilir.", "cmt_en": "A self-checking number is generated by applying an algorithm to an identification number."}, {"tr": "Limit kontrolü.", "en": "Limit check.", "cmt_tr": "Limit, makullük veya aralık testi, bir tutarın verilen bilgi için önceden belirlenmiş bir limit dahilinde olup olmadığını belirler. Yalnızca belirli hataları (yani kabul edilebilir limiti aşanları) tespit edebilir.", "cmt_en": "A limit, reasonableness, or range test determines whether an amount is within a predetermined limit for given information. It can only detect certain errors (i.e., those that exceed the acceptable limit)."}], "answer": 3}, {"q_tr": "Gelen nakit tahsilatların ön listesinin hazırlanması ve listesinin kopyalarının kasadara ve muhasebe bölümüne gönderilmesi prosedürü, ne tür bir kontrol örneğidir?", "q_en": "The procedure requiring preparation of a prelisting of incoming cash receipts, with copies of the prelist going to the cashier and to accounting, is an example of which type of control?", "options": [{"tr": "Önleyici.", "en": "Preventive.", "cmt_tr": "Çek biçimindeki nakit tahsilatların ön listesi, önleyici bir kontroldür. İstenmeyen olayların gerçekleşmesini caydırmak amacındadır. Nakit ile ilgili usulsüzlükler büyük olasılıkla tahsilatlar kaydedilmeden önce gerçekleştiğinden, nakit için hesap verebilirliği mümkün olan en kısa sürede tesis etmek için havale dekontları veya çeklerin ön listesi posta odasında hazırlanmalıdır.", "cmt_en": "A prelisting of cash receipts in the form of checks is a preventive control. It is intended to deter undesirable events from occurring. Because irregularities involving cash most likely take place before receipts are recorded, either remittance advices or a prelisting of checks should be prepared in the mailroom so as to establish recorded accountability for cash as soon as possible. A cash register tape is a form of prelisting for cash received over the counter. One copy of a prelisting will go to accounting for posting to the cash receipts journal, and another is sent to the cashier for reconciliation with checks and currency received."}, {"tr": "Düzeltici.", "en": "Corrective.", "cmt_tr": "Düzeltici kontrol, bir hata veya usulsüzlüğü giderir.", "cmt_en": "A corrective control remedies an error or irregularity."}, {"tr": "Tespit edici.", "en": "Detective.", "cmt_tr": "Tespit edici kontrol, halihazırda meydana gelmiş bir hata veya usulsüzlüğü ortaya çıkarır.", "cmt_en": "A detective control uncovers an error or irregularity that has already occurred."}, {"tr": "Yönlendirici.", "en": "Directive.", "cmt_tr": "Yönlendirici kontrol, arzu edilen bir olayın gerçekleşmesini sağlar veya teşvik eder.", "cmt_en": "A directive control causes or encourages a desirable event."}], "answer": 0}, {"q_tr": "Kontroller, yerine getirmeleri amaçlanan fonksiyona göre sınıflandırılabilir; örneğin tespit edici, önleyici veya yönlendirici. Aşağıdakilerden hangisi yönlendirici bir kontroldür?", "q_en": "Controls may be classified according to the function they are intended to perform, for example, as detective, preventive, or directive. Which of the following is a directive control?", "options": [{"tr": "Aylık banka hesap mutabakatları.", "en": "Monthly bank statement reconciliations.", "cmt_tr": "Aylık banka hesap mutabakatı, tespit edici bir kontroldür. Denetlenen olaylar zaten meydana gelmiştir.", "cmt_en": "Monthly bank statement reconciliation is a detective control. The events audited have already occurred."}, {"tr": "Belirli bir tutarın üzerindeki tüm ödemelerde çift imza gerekliliği.", "en": "Dual signatures on all disbursements over a specific amount.", "cmt_tr": "Belirli bir tutarın üzerindeki tüm ödemelerde çift imza gerekliliği, önleyici bir kontroldür. Kontrol, istenmeyen bir olayı caydırmak için tasarlanmıştır.", "cmt_en": "Requiring dual signatures on all disbursements over a specific amount is a preventive control. The control is designed to deter an undesirable event."}, {"tr": "Her işlemin gerçekleştiği gün kaydedilmesi.", "en": "Recording every transaction on the day it occurs.", "cmt_tr": "Her işlemin gerçekleştiği gün kaydedilmesi, önleyici bir kontroldür. Kontrol, istenmeyen bir olayı caydırmak için tasarlanmıştır.", "cmt_en": "Recording every transaction on the day it occurs is a preventive control. The control is designed to deter an undesirable event."}, {"tr": "İç denetim fonksiyonunun tüm üyelerinin CIA unvanına sahip olmasının zorunlu kılınması.", "en": "Requiring all members of the internal audit function to be CIAs.", "cmt_tr": "İç denetim fonksiyonunun tüm üyelerinin CIA unvanına sahip olmasının zorunlu kılınması, yönlendirici bir kontroldür. Kontrol, arzu edilen bir olayın gerçekleşmesini sağlamak veya teşvik etmek için tasarlanmıştır. Bu gereklilik, iç denetim fonksiyonunun profesyonelliğini ve uzmanlık düzeyini artırır.", "cmt_en": "Requiring all members of the internal audit function to be CIAs is a directive control. The control is designed to cause or encourage a desirable event to occur. The requirement enhances the professionalism and level of expertise of the internal audit function."}], "answer": 3}, {"q_tr": "BT genel kontrollerinin amaçlarından biri şudur:", "q_en": "One objective of IT general controls is to", "options": [{"tr": "Kontrolleri planlama, organize etme, yönlendirme ve kontrol etme yönetim fonksiyonlarına göre tasarlamak.", "en": "Design controls based on the management functions of planning, organizing, directing, and controlling.", "cmt_tr": "Operasyonel kontroller, planlama, organize etme, yönlendirme ve kontrol etme yönetim fonksiyonlarına göre tasarlanmalıdır. Yerleşik kriter veya standartlardan yoksun oldukları için operasyonel kontroller yönetim ilkeleri ve yöntemlerine dayanmalıdır.", "cmt_en": "Operating controls should be designed with regard to the management functions of planning, organizing, directing, and controlling. Because they lack established criteria or standards, operating controls should be based on management principles and methods."}, {"tr": "İşleme sonuçlarının tam, doğru ve uygun şekilde dağıtılmasını sağlamak.", "en": "Ensure that processing results are complete, accurate, and properly distributed.", "cmt_tr": "Çıktı kontrolleri, işleme sonuçlarının tam, doğru ve uygun şekilde dağıtılmasını sağlar. Önemli bir çıktı kontrolü kullanıcı gözden geçirmesidir. Kullanıcılar, özellikle girdiyi hazırladıklarında, çıktının eksik veya makul olmadığını belirleyebilmelidir.", "cmt_en": "Output controls ensure that processing results are complete, accurate, and properly distributed. An important output control is user review. Users should be able to determine when output is incomplete or not reasonable, particularly when the user prepared the input."}, {"tr": "Program ve veri dosyalarının ile bilgisayar operasyonlarının bütünlüğünü sağlamak.", "en": "Ensure the integrity of program and data files and of computer operations.", "cmt_tr": "Bilgi ve ilişkili teknolojiler üzerindeki BT genel kontrolleri, kuruluşun BT ortamındaki tüm sistem bileşenleri, süreçleri ve verilerine ilişkin olanlardır. BT genel kontrollerinin amaçları, uygulamaların uygun şekilde geliştirilmesini ve uygulanmasını ile program ve veri dosyalarının ve bilgisayar operasyonlarının bütünlüğünü sağlamaktır.", "cmt_en": "IT general controls over information and related technologies are those that pertain to all systems components, processes, and data present in an organization’s IT environment. The objectives of IT general controls are to ensure the appropriate development and implementation of applications as well as the integrity of program and data files and of computer operations. The most common IT general controls are (1) logical access controls over infrastructure, applications, and data; (2) system development life cycle controls; (3) program change management controls;"}, {"tr": "Birincil olarak yetkilendirme, doğrulama ve hata bildirimine dikkat etmek.", "en": "Give primary consideration to authorization, validation, and error notification.", "cmt_tr": "Veri girdi kontrollerini tasarlarken birincil olarak yetkilendirme, doğrulama ve hata bildirimine dikkat edilmelidir. Bireysel iş süreçlerinin kapsamına ilişkin kontroller, uygulama kontrolleridir.", "cmt_en": "Primary consideration should be given to authorization, validation, and error notification when designing data input controls. Those controls that pertain to the scope of individual business processes are application controls. They include the data cycle process from input to storage and to the eventual output."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi belirlenmiş üç ana kontrol türünden biridir?", "q_en": "Which of the following is one of the three specified main types of control?", "options": [{"tr": "Proaktif.", "en": "Proactive.", "cmt_tr": "Proaktif, belirlenmiş bir kontrol türü değildir. Ancak kontroller, istenmeyen bir olayı önleme anlamında proaktif olabilir.", "cmt_en": "Proactive is not a specified type of control. However, controls may be proactive in the sense that they prevent an undesirable event."}, {"tr": "Reaktif.", "en": "Reactive.", "cmt_tr": "Reaktif, belirlenmiş bir kontrol türü değildir. Ancak kontroller, istenmeyen bir olayı tespit etme ve buna tepki verme veya düzeltme anlamında reaktif olabilir.", "cmt_en": "Reactive is not a specified type of control. However, controls may be reactive in the sense that they detect an undesirable event and react to it or correct it."}, {"tr": "Tespit edici.", "en": "Detective.", "cmt_tr": "Kontroller; önleyici (istenmeyen olayların gerçekleşmesini caydırmak için), tespit edici (meydana gelmiş istenmeyen olayları tespit edip düzeltmek için) veya yönlendirici (arzu edilen bir olayın gerçekleşmesini sağlamak veya teşvik etmek için) olabilir.", "cmt_en": "Controls may be preventive (to deter undesirable events from occurring), detective (to detect and correct undesirable events that have occurred), or directive (to cause or encourage a desirable event to occur)."}, {"tr": "Dışlayıcı.", "en": "Exclusionary.", "cmt_tr": "Dışlayıcı kontrol, üç ana kontrol türünden biri değildir.", "cmt_en": "Exclusionary control is not one of the three main types of controls."}], "answer": 2}, {"q_tr": "Uygulama kontrollerini değerlendirirken, aşağıdaki girdi kontrollerinden veya düzenleme kontrollerinden hangisinin müşteri hesap numarası alanındaki bir veri girdi hatasını tespit etmek için kullanılma olasılığı en yüksektir?", "q_en": "When assessing application controls, which one of the following input controls or edit checks is most likely to be used to detect a data input error in the customer account number field?", "options": [{"tr": "Limit kontrolü.", "en": "Limit check.", "cmt_tr": "Makullük, limit ve aralık kontrolleri, verilen bilgi için bilinen limitlere dayanır. Örneğin, haftalık çalışma saatleri 45'i aşma olasılığı düşüktür.", "cmt_en": "Reasonableness, limit, and range checks are based upon known limits for given information. For example, the hours worked per week is not likely to be greater than 45."}, {"tr": "Geçerlilik kontrolü.", "en": "Validity check.", "cmt_tr": "Geçerlilik kontrolleri; kimlik numaralarının veya işlem kodlarının, doğru veya yetkilendirilmiş olduğu bilinen öğelerle karşılaştırılarak geçerliliğinin test edilmesidir.", "cmt_en": "Validity checks are tests of identification numbers or transaction codes for validity by comparison with items already known to be correct or authorized. For example, Social Security"}, {"tr": "Kontrol toplamı.", "en": "Control total.", "cmt_tr": "Kayıt sayımı, bir programın çalışması sırasında işlenen kayıt sayısının kontrol toplamıdır. Mali toplamlar, bir kayıt grubundaki bir bilgi alanındaki dolar tutarlarını özetler.", "cmt_en": "A record count is a control total of the number of records processed during the operation of a program. Financial totals summarize dollar amounts in an information field in a group of records."}, {"tr": "Karma toplam.", "en": "Hash total.", "cmt_tr": "Karma toplam, bir toplu işteki her işlem için aynı alan değerinin toplanmasıyla elde edilen sayıdır. Toplamın, başka bir karma toplam ile karşılaştırma dışında anlamı veya değeri yoktur.", "cmt_en": "A hash total is the number obtained from totaling the same field value for each transaction in a batch. The total has no meaning or value other than as a comparison with another hash total."}], "answer": 1}, {"q_tr": "Bir kuruluşun politikaları ve prosedürleri, genel iç kontrol sisteminin bir parçasıdır. Politikalar ve prosedürlerin yerine getirdiği kontrol fonksiyonu şudur:", "q_en": "An organization’s policies and procedures are part of its overall system of internal controls. The control function performed by policies and procedures is", "options": [{"tr": "İleri beslemeli kontrol.", "en": "Feedforward control.", "cmt_tr": "İleri beslemeli kontroller, sorunları öngörür ve önler. Politikalar ve prosedürler, bir faaliyetin bir hedefe en iyi şekilde ulaşılmasını sağlayacak biçimde nasıl yerine getirilmesi gerektiği konusunda rehberlik sağladıkları için ileri beslemeli kontroller olarak hizmet eder.", "cmt_en": "Feedforward controls anticipate and prevent problems. Policies and procedures serve as feedforward controls because they provide guidance on how an activity should be performed to best ensure that an objective is achieved."}, {"tr": "Uygulama kontrolü.", "en": "Implementation control.", "cmt_tr": "Uygulama kontrolleri, sistem geliştirme sırasında uygulanır.", "cmt_en": "Implementation controls are applied during systems development."}, {"tr": "Geri bildirim kontrolü.", "en": "Feedback control.", "cmt_tr": "Politikalar ve prosedürler, bir görevin yerine getirilmesine ilişkin geri bildirimden ziyade, görev öncesinde ve sırasında birincil rehberlik sağlar.", "cmt_en": "Policies and procedures provide primary guidance before and during the performance of some task rather than give feedback on its accomplishment."}, {"tr": "Uygulama kontrolü.", "en": "Application control.", "cmt_tr": "Uygulama kontrolleri, bordro veya borçlar hesabı gibi belirli uygulamalara özgüdür.", "cmt_en": "Application controls apply to specific applications, e.g., payroll or accounts payable."}], "answer": 0}, {"q_tr": "Toplam kalite kontrol programının bir parçası olarak, bir firma yalnızca bitmiş malları incelemekle kalmayıp aynı zamanda ürün iadelerini ve müşteri şikayetlerini de izler. Bu çabaları en iyi tanımlayan kontrol türü hangisidir?", "q_en": "As part of a total quality control program, a firm not only inspects finished goods but also monitors product returns and customer complaints. Which type of control best describes these efforts?", "options": [{"tr": "Geri bildirim kontrolü.", "en": "Feedback control.", "cmt_tr": "Geri bildirim kontrolü, istenen gelecek duruma ulaşılmasını sağlamak için gerçekleşmiş performansı ölçer. Geçmişi değerlendirerek gelecekteki performansı iyileştirmek için kullanılır. Bitmiş malların incelenmesi, ürün iadelerinin izlenmesi ve şikayetlerin değerlendirilmesi, kontrol altındaki sürecin gelecek döngülerindeki sapmaları ortadan kaldırmaya yönelik olay sonrası kontrollerdir.", "cmt_en": "A feedback control measures actual performance, something that has already occurred, to ensure that a desired future state is attained. It is used to evaluate the past to improve future performance. Inspecting finished goods, monitoring product returns, and evaluating complaints are post-action controls intended to eliminate deviations in future cycles of the process under control."}, {"tr": "İleri beslemeli kontrol.", "en": "Feedforward control.", "cmt_tr": "İleri beslemeli kontroller, sorunları oluşmadan önce öngörür.", "cmt_en": "Feedforward controls anticipate problems before they occur."}, {"tr": "Üretim kontrolü.", "en": "Production control.", "cmt_tr": "Müşteri şikayetleri üretim kontrolünün bir parçası değildir.", "cmt_en": "Customer complaints are not part of production control."}, {"tr": "Envanter kontrolü.", "en": "Inventory control.", "cmt_tr": "Üç kontrol türü: ileri beslemeli, eş zamanlı ve geri bildirimdir.", "cmt_en": "The three types of control are feedforward, concurrent, and feedback."}], "answer": 0}, {"q_tr": "Mali tablo analizi, kalite kontrol prosedürleri ve çalışan performans değerlendirmelerinin kullanımı, tümü aşağıdakilerin örnekleridir:", "q_en": "The use of financial statement analysis, quality control procedures, and employee performance evaluations are all examples of", "options": [{"tr": "Ön kontroller.", "en": "Preliminary controls.", "cmt_tr": "İleri beslemeli (ön) kontroller, gelecekteki performans sorunlarını öngörür ve önler; örneğin bütçeleme.", "cmt_en": "Feedforward (preliminary) controls anticipate and avoid future performance problems, e.g., budgeting."}, {"tr": "Eş zamanlı kontroller.", "en": "Concurrent controls.", "cmt_tr": "Eş zamanlı kontroller süreç ortasında uygulanır; örneğin montaj hattında inceleme.", "cmt_en": "Concurrent controls are applied midstream, e.g., inspection on an assembly line."}, {"tr": "Geri bildirim kontrolleri.", "en": "Feedback controls.", "cmt_tr": "Geri bildirim kontrolü, halihazırda gerçekleşmiş süreçler hakkında bilgi sağlamak üzere çalışır.", "cmt_en": "A feedback control operates to provide information about processes that have already occurred."}, {"tr": "İleri beslemeli kontroller.", "en": "Feedforward controls.", "cmt_tr": "İleri beslemeli (ön) kontroller, gelecekteki performans sorunlarını öngörür ve önler; örneğin bütçeleme.", "cmt_en": "Feedforward (preliminary) controls anticipate and avoid future performance problems, e.g., budgeting."}], "answer": 2}, {"q_tr": "Bir kuruluşun iç denetim fonksiyonu, kuruluşun risk yönetimi, kontrol ve yönetişim süreçlerinin ayrılmaz bir parçasıdır çünkü bu süreçleri değerlendirir ve iyileştirilmesine katkıda bulunur. İç denetim fonksiyonunun bir sistem geliştirme analizi gerçekleştirdiğinde sağladığı kontrol türünü seçiniz.", "q_en": "The internal audit function of an organization is an integral part of the organization’s risk management, control, and governance processes because it evaluates and contributes to the improvement of those processes. Select the type of control provided when the internal audit function conducts a systems development analysis.", "options": [{"tr": "Geri bildirim kontrolü.", "en": "Feedback control.", "cmt_tr": "Geri bildirim kontrolü, tamamlanmış bir faaliyetin sonuçları hakkında bilgi sağlar.", "cmt_en": "A feedback control provides information on the results of a completed activity."}, {"tr": "Stratejik planlar.", "en": "Strategic plans.", "cmt_tr": "Stratejik planlar, üst yönetim tarafından kuruluşa uzun vadeli rehberlik sağlamak amacıyla geliştirilir.", "cmt_en": "Strategic plans are developed by senior management to provide long-range guidance for the organization."}, {"tr": "Politikalar ve prosedürler.", "en": "Policies and procedures.", "cmt_tr": "Politikalar ve prosedürler yönetim tarafından geliştirilir. Bunlar bir kuruluşun en temel kontrol alt sistemidir.", "cmt_en": "Policies and procedures are developed by management. They are the most basic control subsystem of an organization."}, {"tr": "İleri beslemeli kontrol.", "en": "Feedforward control.", "cmt_tr": "İleri beslemeli kontrol, bir sorunun sonucu olarak değil, öngörüsüyle düzeltici eylem alınabilmesi için potansiyel sorunlar hakkında bilgi sağlar.", "cmt_en": "A feedforward control provides information on potential problems so that corrective action can be taken in anticipation, rather than as a result, of a problem."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi, kriter veya standart eksikliği nedeniyle iç denetçilerin değerlendirmesinin genellikle zor olduğu kontrollerdir?", "q_en": "Of the following, the controls that are often difficult for internal auditors to evaluate because of the lack of criteria or standards are", "options": [{"tr": "Önleyici kontroller.", "en": "Preventive controls.", "cmt_tr": "Önleyici kontroller, kayıp maruziyetlerinin gerçekleşmesini engeller. Bunlar yalnızca operasyonel kontrolleri değil, aynı zamanda ölçülebilir standartların kolayca belirlenebildiği kontrolleri de kapsar.", "cmt_en": "Preventive controls keep loss exposures from occurring. They include not only operating controls but also those for which quantifiable standards are readily determined."}, {"tr": "Finansal kontroller.", "en": "Financial controls.", "cmt_tr": "Bütçe gibi finansal kontroller, ölçülmesi nispeten kolay olan ölçülebilir standartlara tabidir.", "cmt_en": "Financial controls, e.g., a budget, are subject to quantifiable standards that are relatively easy to measure."}, {"tr": "Düzeltici kontroller.", "en": "Corrective controls.", "cmt_tr": "Düzeltici kontroller, tespit sonrası veya iyileştirici kontrollerdir. Standartların kolayca tanımlanabildiği finansal kontroller gibi kontrolleri içerebilir.", "cmt_en": "Corrective controls are post-detection or remedial controls. They may include controls for which standards are easily defined, such as financial controls."}, {"tr": "Operasyonel kontroller.", "en": "Operating controls.", "cmt_tr": "Operasyonel kontroller, yönetim süreçlerinin yönlendirme ve kontrol aşamalarında kullanılan ve sonuçların standartlarla karşılaştırılmasına dayanan kontrollerdir. Ancak bir faaliyet ne kadar az mekanik olursa, standartları belirlemek o kadar zorlaşır. Örneğin, güvenlik için kontrol standartları, bir makinenin saat başına çıktısından daha az kolay geliştirilir.", "cmt_en": "Operating controls are those used in the management processes of directing and controlling and are based on comparison of results with standards. As an activity becomes less mechanical, however, standards become more difficult to determine. Control standards for security, for example, are less easily developed than for the output per hour of a machine because the degree of security achieved is not readily measurable."}], "answer": 3}, {"q_tr": "Bir kuruluşun sevkiyat departmanı tarafından satış faturasının bir kopyası alınmadığında, bir çalışan yetkili makamdan belgeyi talep eder. Bu süreç şudur:", "q_en": "When a copy of the sale invoice is not received by an organization’s shipping department, an employee requests the document from the proper authority. This process is a(n)", "options": [{"tr": "Yönlendirici, tespit edici kontrol.", "en": "Directive, detective control.", "cmt_tr": "Kontrol tespit edicidir, ancak yönlendirici değildir. Yönlendirici kontrol, arzu edilen bir olayın gerçekleşmesini sağlar veya teşvik eder.", "cmt_en": "The control is detective, but it is not directive. A directive control causes or encourages a desirable event to occur."}, {"tr": "Pasif, azaltıcı kontrol.", "en": "Passive, mitigating control.", "cmt_tr": "Kontrol ne pasif ne de azaltıcıdır. Katibin bilinçli bir çabasıyla tespit edilir.", "cmt_en": "The control is neither passive nor mitigating. It is detected by the clerk in a conscious effort to"}, {"tr": "Aktif, tespit edici kontrol.", "en": "Active, detective control.", "cmt_tr": "Sevkiyat departmanında sevkiyat belgeleri alınmadığında (satış faturası kopyaları, müşteri sipariş formları ve konşimento gibi), katip uygun belgeleri kaynak kuruluştan elde etmeye çalışmalıdır. Bu tür kontrol tespit edicidir çünkü meydana gelmiş istenmeyen bir olayı tespit etmeye ve düzeltmeye çalışır. Ayrıca aktiftir çünkü belgelerin alınmasını sağlamak için katibin bilinçli müdahalesi gereklidir.", "cmt_en": "When shipping documents are not received in the shipping department (such as copies of the sales invoice, customer order form, and bill of lading), the clerk should attempt to obtain the proper documentation from the originating organization. This type of control is detective because it detects and attempts to correct an undesirable event that has occurred. It is also active because it takes a conscious intervention by the clerk to ensure the documentation is received."}, {"tr": "Tespit edici, önleyici kontrol.", "en": "Detective, preventive control.", "cmt_tr": "Kontrol önleyici değildir. İstenmeyen bir olayı caydırmaz.", "cmt_en": "The control is not preventive. It does not deter an undesirable event."}], "answer": 2}, {"q_tr": "Yeterli ve etkili bir iç kontrol sistemi, hedeflere ulaşılacağına ilişkin makul güvence sağlar. Kontroller önleyici, tespit edici veya yönlendirici olabilir. Aşağıdakilerden hangisi satın alma fonksiyonu için tespit edici bir kontroldür?", "q_en": "An adequate and effective system of internal control provides reasonable assurance that objectives will be achieved. Controls may be preventive, detective, or directive. Which of the following is a detective control for the procurement function?", "options": [{"tr": "Teslim alınan mallar sayılır ve satın alma siparişi ile teslim alma raporlarındaki miktarlarla karşılaştırılır.", "en": "Goods received are counted and compared with quantities on purchase order and receiving reports.", "cmt_tr": "Tespit edici kontroller, meydana gelmiş istenmeyen olayları tespit edip düzeltmek üzere tasarlanmıştır. Teslim alınan tüm malların hesaba katılması ve satın alma siparişleri ile teslim alma raporlarındaki miktarların karşılaştırılması buna örnektir.", "cmt_en": "Detective controls are designed to detect and correct undesirable events that have occurred. Accounting for all goods received and comparing quantities on purchase orders and receiving reports is an example."}, {"tr": "Satın alma fonksiyonu, organizasyonel olarak teslim alma, ödeme ve muhasebeden ayrıdır.", "en": "The procurement function is organizationally separate from receiving, disbursing, and accounting.", "cmt_tr": "Görevlerin ayrılığı, önleyici bir kontroldür. Önleyici kontroller, istenmeyen olayların gerçekleşmesini caydırır.", "cmt_en": "Segregation of duties is a preventive control. Preventive controls deter undesirable events from occurring."}, {"tr": "Son satın alma emrinin düzenlenmesinden önce her satın alma eyleminin gözden geçirilmesi ve onaylanması gereklidir.", "en": "Review and approval of each procurement action is required prior to the final issuance of a purchase order.", "cmt_tr": "Her satın alma eyleminin gözden geçirilmesi ve onaylanması, önleyici bir kontroldür.", "cmt_en": "Review and approval of each procurement action is a preventive control."}, {"tr": "Önceden numaralandırılmış standart satın alma emri formları, tüm ilgili koşulları içerir ve uygulanabilir tüm durumlarda kullanılması gerekir.", "en": "Prenumbered standard purchase order forms include all relevant terms required to be used in all applicable instances.", "cmt_tr": "Önceden numaralandırılmış standart satın alma emri formlarının kullanılması, önleyici bir kontroldür.", "cmt_en": "Using prenumbered standard purchase order forms is a preventive control."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi önleyici bir kontrol olur?", "q_en": "Which of the following would be a preventive control?", "options": [{"tr": "Mal göndermeden önce müşteri kredisinin onaylanması.", "en": "Approving customer credit prior to shipping merchandise.", "cmt_tr": "Önleyici kontroller, istenmeyen olayların gerçekleşmesini caydırır. Buna karşılık, tespit edici kontroller uygun kişileri istenmeyen olay sonrasında uyarır. Göndermeden önce müşteri kredisinin onaylanması, ödeme temerrüdüne düşme olasılığı yüksek müşterilere kredili mal gönderilmesini önler.", "cmt_en": "Preventive controls deter the occurrence of unwanted events. In contrast, detective controls alert the proper people after an unwanted event. Approving customer credit prior to shipping prevents merchandise from being shipped on credit to customers who are likely to default on making future payment."}, {"tr": "Önceden numaralandırılmış belgelerin sırasının gözden geçirilmesi.", "en": "Reviewing the sequence of prenumbered documents.", "cmt_tr": "Önceden numaralandırılmış belgelerin sırasının gözden geçirilmesi, potansiyel olarak hileli işlemleri tespit etmek için tasarlanmış tespit edici bir kontroldür.", "cmt_en": "Reviewing the sequence of prenumbered documents is a detective control designed to detect potentially fraudulent transactions."}, {"tr": "Banka yatırma fişinin posta odasında hazırlanan ön liste formundaki toplam nakit tahsilatla karşılaştırılması.", "en": "Comparing a bank deposit slip with the total cash received as noted on a prelisting sheet prepared in the mail room.", "cmt_tr": "Banka yatırma fişinin posta odasındaki ön liste formundaki toplam nakit tahsilatla karşılaştırılması, tahsil edilenden daha az nakit yatırılıp yatırılmadığını tespit etmek için tasarlanmış tespit edici bir kontroldür.", "cmt_en": "Comparing a bank deposit slip with the total cash received as noted on a prelisting sheet prepared in the mail room is a detective control designed to detect whether less cash was deposited than received."}, {"tr": "Genel muhasebe defterinin olağandışı yüksek veya düşük bakiyeli hesaplar açısından taranması.", "en": "Scanning the general ledger for accounts with unusually high or low balances.", "cmt_tr": "Genel muhasebe defterinin olağandışı yüksek veya düşük bakiyeli hesaplar açısından taranması, hatalı bakiyelere sahip hesapları tespit etmek için tasarlanmış tespit edici bir kontroldür.", "cmt_en": "Scanning the general ledger for accounts with unusually high or low balances is a detective control designed to detect accounts with inaccurate balances."}], "answer": 0}, {"q_tr": "Bir denetçi, bir şirketin yakın zamanda uygulamaya koyduğu satın alma ve faturalandırma elektronik veri değişimi (EDI) sisteminin denetimini planlamaktadır. Aşağıdaki ham madde satın alma doğruluk kontrollerinden hangisi bu ortamda en az önemli olur?", "q_en": "An auditor is planning an audit of a company’s recently implemented electronic data interchange (EDI) system for purchasing and billing. Which of the following controls over the accuracy of raw-material purchases would be least important in this environment?", "options": [{"tr": "Bilgisayar sistem kontrolleri.", "en": "Computer system controls.", "cmt_tr": "Bilgisayar sistem kontrolleri (örn. girdi, işleme ve çıktı kontrolleri), EDI sisteminde önemli otomatik kontrollerdir.", "cmt_en": "Computer system controls (e.g., input, processing, and output controls) are important automated controls in an EDI system."}, {"tr": "EDI satıcı yazılımı içindeki kontroller.", "en": "Controls contained within the EDI vendor software.", "cmt_tr": "Bir EDI sistemi için kontroller en azından EDI yazılımı içindeki kontrolleri kapsamalıdır.", "cmt_en": "At a minimum, the controls for an EDI system should include the controls contained within the EDI software."}, {"tr": "Yeterli denetim izleri.", "en": "Adequate audit trails.", "cmt_tr": "Denetim izi (veya yönetim izi), yönetimin işlemleri kaynağından çıktısına kadar izlemesini sağlayan bir işlem geçmişi kontrolüdür. Bu tür kontroller EDI sisteminde çok önemlidir.", "cmt_en": "An audit trail (or management trail) is a processing history control that enables management to track transactions from their source to their output. Such controls are very important in an EDI system."}, {"tr": "Yönetimin bireysel işlemleri gözden geçirmesi.", "en": "Management review of individual transactions.", "cmt_tr": "Yönetimin bireysel işlemleri gözden geçirmesi (manuel bir kontrol), tüm işlemlere uygulanan otomatik kontrollerden bir EDI sisteminde daha az önemlidir.", "cmt_en": "Management review of individual transactions (a manual control) is less important in an EDI system than automated controls applicable to all transactions."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi tespit edici bir kontrol örneğidir?", "q_en": "Which of the following is an example of a detective control?", "options": [{"tr": "Muhasebe departmanının çekleri geçersiz kılma ve yenilerini düzenleme prosedürü vardır.", "en": "The accounting department has a procedure for voiding and issuing replacement checks.", "cmt_tr": "Muhasebe departmanının çekleri geçersiz kılma ve yenilerini düzenleme prosedürü, yönlendirici bir kontroldür. Yönlendirici kontrol, arzu edilen bir olayın gerçekleşmesini sağlamak veya teşvik etmek için tasarlanmıştır.", "cmt_en": "The procedure in the accounting department for voiding and issuing replacement checks is a directive control. A directive control is designed to cause or encourage a desirable event to occur. Examples are policy and procedure manuals, laws and regulations, and employee training."}, {"tr": "Yöneticiye her iş gününün sonunda çek günlüğü mutabakatı verilir.", "en": "The manager is given a check log reconciliation at the close of each business day.", "cmt_tr": "Yöneticiye her iş gününün sonunda çek günlüğü mutabakatı sağlanması, tespit edici bir kontroldür. Tespit edici kontrol, halihazırda meydana gelmiş bir hata veya usulsüzlüğü ortaya çıkarır. Fiziksel sayımlar, mutabakatlar, gözden geçirmeler ve karşılaştırmalar, istisna raporları ve güvenlik kameraları tespit edici kontrol örnekleridir.", "cmt_en": "Providing the manager with a check log reconciliation at the close of each business day is a detective control. A detective control uncovers an error or irregularity that has already occurred. It is designed to detect undesirable events. Examples of detective controls include physical counts, reconciliations, reviews and comparisons, exception reports, and security cameras."}, {"tr": "Çekler önceden numaralandırılmıştır ve kilitli bir dolabta saklanır.", "en": "Checks are pre-numbered and kept in a locked cabinet.", "cmt_tr": "Çeklerin önceden numaralandırılması ve kilitli bir dolabta saklanması, önleyici kontrollerdir. Önleyici kontroller, istenmeyen olayların gerçekleşmesini caydırır. Parolalar, erişim kodları ve kilitli kapılar, önleyici kontrol örnekleridir.", "cmt_en": "The pre-numbering of checks and keeping checks in a locked cabinet are preventive controls. Preventive controls deter the occurrence of unwanted events and are designed to prevent errors, fraud, theft, and misstatements. Passwords, access codes, and locked doors are all examples of preventive controls."}, {"tr": "Muhasebe personeli, yetkilendirme almadan önce çek yazdırmak konusunda uyarılmıştır.", "en": "The staff accountant was warned about printing a check prior to receiving authorization.", "cmt_tr": "Muhasebe personelinin yetkilendirme almadan önce bir eylem gerçekleştirmesi nedeniyle uyarılması, düzeltici bir kontroldür. Düzeltici kontrol, bir hata veya usulsüzlüğü giderir ve sorun ortaya çıktıktan sonra hasarı azaltmaya yardımcı olur.", "cmt_en": "Warning the staff accountant for performing an action prior to receiving authorization is a corrective control. A corrective control remedies an error or irregularity and helps mitigate damage once the problem has materialized. An example would be the enforcement of policies and procedures."}], "answer": 1}, {"q_tr": "Bir çalışan şirketinin banka yatırımlarından para çalar, ardından çalınan nakdi ertesi günün yatırımlarından karşılar. Ertesi gün yeterli nakit yoksa, çalışanın yatırımı karşılamak için başka bir gün beklemesi gerekir. Döngü böylece devam eder. Bu aylarca tespit edilmeyebilir. Kuruluş bu durumu ele almak için önleyici kontrol olarak aşağıdakilerden hangisini uygulayabilir?", "q_en": "An employee steals money from his company’s bank deposits, then makes up for the stolen cash with cash from the next day’s deposits. If there is not enough cash the next day, the employee has to wait another day to make up for the deposit. And the cycle continues. This can go undetected for months. Which of the following controls could the organization implement as a preventive control to address this situation?", "options": [{"tr": "Çek hesabı tutarı belirli bir seviyenin altına düştüğünde muhasebe amiri bilgilendirilir.", "en": "The accounting supervisor is notified when the checking account amount drops below a certain level.", "cmt_tr": "Banka bakiyesi önceden belirlenen bir limitin altına düştüğünde muhasebe amirinin bilgilendirilmesi bir tespit edici kontroldür.", "cmt_en": "Alerting the accounting supervisor when the bank balance drops below a preset limit is an"}, {"tr": "Haftalık olarak ana ofisteki bir yönetici, bankadan alınan yatırma doğrulama tarihlerini satış yatırma kayıtlarıyla kontrol eder.", "en": "Weekly, a manager at the main office checks deposit validation dates received from the bank with the sales deposit records.", "cmt_tr": "Bankadan alınan yatırma tarihlerinin beklenen satış yatırma tarihleriyle karşılaştırılması, telafi edici bir kontroldür. Telafi edici veya azaltıcı kontroller, birincil kontroller etkisiz olduğunda riski azaltabilir.", "cmt_en": "Comparing the dates of the deposits from the bank with expected dates of the sales deposits is a compensatory control. Compensatory or mitigative controls may reduce risk when the primary controls are ineffective. The red flag occurs when the bank consistently validates deposits being made several days after they should have been."}, {"tr": "Günlük olarak kuruluşun ana ofisindeki muhasebe personeli, yatırılan tutarı günlük satışların yazar kasa bandıyla mutabakat eder.", "en": "Daily, the accounting staff at the organization’s main office reconcile the amount deposited with the cash register tape from the day’s sales.", "cmt_tr": "Yatırılan tutarın günlük satışların yazar kasa bandıyla, yatırımı yapan kişiden farklı bir kişi tarafından mutabakatı, telafi edici bir kontroldür.", "cmt_en": "Reconciling the amount deposited with the cash register tape from the day’s sales by a person different from the one who makes the deposit is a compensatory control."}, {"tr": "Yatırma fişleri ve yatırma torbaları sıralı numaralara sahiptir. Yöneticinin yatırma fişine yatırma torbası numarasını yazması gereklidir. Geçersiz kılınan yatırma fişleri veya torbalarının nedeni belgelenmelidir.", "en": "Deposit slips and deposit bags have sequential numbers. The manager is required to write the deposit bag number on the deposit slip. The reason for any voided deposit slips or bags is to be documented.", "cmt_tr": "Önleyici kontroller, olayların gerçekleşmesinden önce alınan eylemlerdir. Hataları, usulsüzlükleri veya istenmeyen olayları önlemek amacıyla tasarlanmıştır. Numaralı yatırma fişleri ve torbaları kullanıldığında, eksik veya geçersiz kılınan numaraların açıklanması gerekir. Ayrıca yatırma fişine yatırma torbası numarasının kaydedilmesi, çalışanın yatırmadan nakit almasını veya yatırmayı değiştirmesini caydırır.", "cmt_en": "Preventive controls are actions taken prior to the occurrence of events. They are designed with the intent of stopping errors, irregularities, or undesirable events from occurring. An example of preventive control is the segregation of the duties of authorization, recordkeeping, and custody. When numbered deposit slips and deposit bags are used, any missing or voided numbers need to be explained. Additionally, recording the deposit bag number on the deposit slip deters the employee from taking cash from or changing the deposit."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi uygulama kontrollerinin bir amacıdır?", "q_en": "Which of the following is an objective of application controls?", "options": [{"tr": "Veri merkezlerinin ve ağ operasyonlarının güvenli olduğuna ilişkin güvence sağlanması.", "en": "Providing assurance that data centers and network operations are secure.", "cmt_tr": "Veri merkezlerinin ve ağ operasyonlarının güvenli olduğuna ilişkin güvence sağlanması, BT genel kontrolüdür.", "cmt_en": "Providing assurance that data centers and network operations are secure is an IT general control."}, {"tr": "Bilgisayar bakımının düzenli olarak yapılmasının sağlanması.", "en": "Ensuring that computer maintenance is done on a regular basis.", "cmt_tr": "Bilgisayar bakımının düzenli olarak yapılmasının sağlanması, BT genel kontrolleriyle ilişkilidir.", "cmt_en": "Ensuring that computer maintenance is done on a regular basis is associated with IT general controls."}, {"tr": "Altyapı, uygulamalar ve veriler üzerinde mantıksal erişim kontrollerinin oluşturulması.", "en": "Establishing logical access controls over infrastructure, applications, and data.", "cmt_tr": "Altyapı, uygulamalar ve veriler üzerinde mantıksal erişim kontrollerinin oluşturulması, BT genel kontrolüdür. Uygulama kontrolleri, bireysel iş süreçlerinin veya uygulama sistemlerinin kapsamına ilişkin olanlardır.", "cmt_en": "Establishing logical access controls over infrastructure, applications, and data is an IT general control. Application controls are those that pertain to the scope of individual business processes or application systems. The objective of application controls is to ensure that (1) input data are accurate, complete, authorized, and correct; (2) data are processed as intended in an acceptable time period; (3) data stored are accurate and complete; (4) outputs are accurate and complete; and (5) a record is maintained to track the process of data from input to storage and to the eventual output."}, {"tr": "Girdi verilerinin doğru, eksiksiz, yetkilendirilmiş ve hatasız olduğunun teyit edilmesi.", "en": "Confirming input data are accurate, complete, authorized, and correct", "cmt_tr": "Girdi verilerinin doğru, eksiksiz, yetkilendirilmiş ve hatasız olduğunun teyit edilmesi, uygulama kontrollerinin bir amacıdır.", "cmt_en": "Confirming that input data are accurate, complete, authorized, and correct is an objective of application controls. Input controls are designed and operating effectively to ensure that (1) all"}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi bir kontrol matrisinin özelliğini tanımlar?", "q_en": "Which of the following describes a characteristic of a control matrix?", "options": [{"tr": "İşlemler işlenmek üzere biriktirilir.", "en": "Transactions are accumulated for processing.", "cmt_tr": "Toplu girdi kontrollerinde, işlemler biriktirilir ve bilgisayara tek bir toplu olarak sunulur. Bu bir kontrol matrisinin özelliği değildir.", "cmt_en": "With batch input controls, transactions are accumulated and submitted to the computer as a single batch. The user cannot influence the process once the job has begun. Batch processing is efficient for such applications as payroll because large numbers of routine transactions must be processed on a regular schedule. This is not a characteristic of a control matrix."}, {"tr": "Bir girdi alanına girilen veri, o alan için geçerli değerler tablosuyla karşılaştırılır.", "en": "The data entered into an input field is compared to a table of valid values for that field.", "cmt_tr": "Geçerlilik kontrolleri, belirli bir alana girilen verileri o alan için geçerli değerler tablosuyla karşılaştırır. Bu bir kontrol matrisinin özelliği değildir.", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. Validity checks are used for controlling online input. This is not a characteristic of a control matrix."}, {"tr": "Sistem tarafından işlenen kayıt sayısını takip eder.", "en": "Track the number of records processed by the system.", "cmt_tr": "Kayıt sayımları, sistem tarafından işlenen kayıt sayısını izleyen toplu girdi kontrolüdür. Bu bir kontrol matrisinin özelliği değildir.", "cmt_en": "Record counts is a batch input control that tracks the number of records processed by the system for comparison to the number that the user expected to be processed. This is not a characteristic of a control matrix."}, {"tr": "Tek bir riski yeterli şekilde ele almak için birden fazla kontrol gerekebilir.", "en": "More than one control may be needed to adequately address a single risk.", "cmt_tr": "Kontrol matrisi, kontrolleri risklerle eşleştirmek için yararlıdır. Kontroller riskleri bire bir eşleştirmek zorunda değildir. Belirli kontroller birden fazla riski ele alabilir ve tek bir riski ele almak için birden fazla kontrol gerekebilir.", "cmt_en": "A control matrix is useful for matching controls with risks. Controls do not necessarily match risks one-to-one. Certain controls may address more than one risk, and more than one control may be needed to address a single risk."}], "answer": 3}, {"q_tr": "Aşağıdaki girdi kontrollerinden hangisi, dosyalar belirlenmiş bir alana göre sıralandığında işleme verimliliğinin büyük ölçüde artacağı mantığına dayanır?", "q_en": "Which of the following input controls are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field?", "options": [{"tr": "Sıra kontrolleri.", "en": "Sequence checks.", "cmt_tr": "Sıra kontrolleri, dosyalar belirlenmiş bir alana göre sıralandığında işleme verimliliğinin büyük ölçüde artacağı mantığına dayanır. Sistem sıra dışı bir kayıt keşfederse, dosyaların işleme için uygun şekilde hazırlanmadığını gösterebilir.", "cmt_en": "Sequence checks are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field. If the system discovers a record out of order, it may indicate that the files were not properly prepared for processing."}, {"tr": "Geçerlilik kontrolleri.", "en": "Validity checks.", "cmt_tr": "Geçerlilik kontrolleri, belirli bir alana girilen verileri o alan için geçerli değerler tablosuyla karşılaştırır.", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, a customer number must already be on the list of approved customers."}, {"tr": "Aralık kontrolleri.", "en": "Range checks.", "cmt_tr": "Aralık (makullük) kontrolleri, verilen bilgi için bilinen limitlere dayanır. Aralık dışındaki her şey yönetim onayı gerektirir.", "cmt_en": "Range (reasonableness) checks are based on known limits for given information. Anything outside the range requires management authorization. For example, a quantity field may allow numbers from 0 to 100, with anything over 100 requiring approval."}, {"tr": "Biçim kontrolleri.", "en": "Format checks.", "cmt_tr": "Biçim (alan) kontrolleri, bir alandaki karakterlerin o alan için uygun türde olup olmadığını doğrulamak üzere yapılan testlerdir.", "cmt_en": "Format (field) checks are tests of the characters in a field to verify that they are of an appropriate type for that field. For example, an alphabetic character field would not allow a number to be entered."}], "answer": 0}, {"q_tr": "Bir kuruluş tüm çalışanlar arasında karşılıklı saygıyı zorunlu kılar. Bir çalışan hakkında yanlış, karalayıcı veya kötü niyetli beyanlarda bulunmak kesinlikle yasaktır. Bu politika hangi düzeydeki kontrollere örnektir?", "q_en": "An organization requires mutual respect among all employees. Making false, defamatory, or malicious statements about another employee is strictly prohibited. This policy is an example of controls at which level?", "options": [{"tr": "İşlem düzeyi kontrolleri.", "en": "Transaction-level controls.", "cmt_tr": "İşlem düzeyi kontrolleri, işlem hedeflerini gerçekleştirmek ve işlemlere özgü riskleri ele almak için tasarlanmıştır. Uygulama kontrolleri, istisna raporları ve görevlerin ayrılığı örnekler arasındadır.", "cmt_en": "Transaction-level controls are designed to achieve transaction objectives and to address risks specific to transactions. Examples include application controls, exception reports, and segregation of duties. The policy described is an entity-level governance control."}, {"tr": "Süreç düzeyi kontrolleri.", "en": "Process-level controls.", "cmt_tr": "Süreç düzeyi kontrolleri, süreç hedeflerini gerçekleştirmek ve süreç risklerini ele almak için tasarlanmıştır. Fiziksel envanter sayımları, performans değerlendirmesi ve gelir merkezi raporlarının gözden geçirilmesi örnekler arasındadır.", "cmt_en": "Process-level controls are built to achieve process objectives and to address process risks. Examples include physical inventory counts, performance assessment, and review of revenue center reports. The policy described is an entity-level governance control."}, {"tr": "Kuruluş düzeyi yönetim gözetim kontrolleri.", "en": "Entity-level management oversight controls.", "cmt_tr": "Kuruluş düzeyi yönetim gözetim kontrolleri, iş birimi hedeflerini gerçekleştirmek ve iş birimi risklerini ele almak için yönetim tarafından iş birimi düzeyinde uygulanır.", "cmt_en": "Entity-level management oversight controls are implemented by management at the business unit level to achieve business unit objectives and address business unit risks. Examples include IT general controls and period-end controls. The policy described is an entity-level governance control."}, {"tr": "Kuruluş düzeyi yönetişim kontrolleri.", "en": "Entity-level governance controls.", "cmt_tr": "Kuruluş düzeyi yönetişim kontrolleri, yönetim kurulu tarafından en üst düzeyde (yönetişim düzeyinde) oluşturulur. Kuruluşun kültürünü tanımlayan ve beklentilerini ileten organizasyonel politikaları ve prosedürleri kapsar. Tüm çalışanlar arasında karşılıklı saygı zorunluluğu, kurumsal davranış kurallarıyla ilişkili kuruluş genelinde bir politikadır ve kuruluş düzeyi yönetişim kontrolüdür.", "cmt_en": "Entity-level governance controls are established by the board of directors at the highest level (governance level). They include organizational policies and procedures that define the entity’s culture and communicate its expectations. Examples include IT policies, the code of conduct, oversight of controls, and setting the risk appetite. The requirement of mutual respect among all employees is an entity-wide policy related to the organizational code of conduct. It is therefore an entity-level governance control."}], "answer": 3}, {"q_tr": "Bir muhasebeci; kasadan nakit tahsilatları toplamak, nakit parayı muhasebe sistemine kaydetmek ve nakdi kuruluşun banka hesabına yatırmaktan sorumludur. Hangi düzeyde kontrol eksiktir?", "q_en": "One accountant is responsible for collecting cash receipts from the cashier, recording cash in the accounting system, and depositing cash in the organization’s bank account. At which level is control lacking?", "options": [{"tr": "İşlem düzeyi kontrolleri.", "en": "Transaction-level controls.", "cmt_tr": "İşlem düzeyi kontrolleri, işlem hedeflerini gerçekleştirmek ve işlemlere özgü riskleri ele almak için tasarlanmıştır. Uygulama kontrolleri, istisna raporları ve görevlerin ayrılığı örnekler arasındadır. Aynı çalışan nakit saklama ve kayıt tutmadan sorumlu olduğundan, görevlerin ayrılığı mevcut değildir. Bu nedenle kuruluşta işlem düzeyi kontrolü eksiktir.", "cmt_en": "Transaction-level controls are designed to achieve transaction objectives and to address risks specific to transactions. Examples include application controls, exception reports, and segregation of duties. Because the same employee is responsible for cash custody and recordkeeping, segregation of duties does not exist. The organization therefore lacks transaction- level control."}, {"tr": "Süreç düzeyi kontrolleri.", "en": "Process-level controls.", "cmt_tr": "Süreç düzeyi kontrolleri, süreç hedeflerini gerçekleştirmek ve süreç risklerini ele almak için tasarlanmıştır. Tanımlanan kontrol eksikliği işlem düzeyi kontrolleri gerektirir.", "cmt_en": "Process-level controls are designed to achieve process objectives and to address process risks. Examples include physical inventory counts, performance assessment, and review of revenue center reports. The control deficiency described requires transaction-level controls."}, {"tr": "Kuruluş düzeyi yönetim gözetim kontrolleri.", "en": "Entity-level management oversight controls.", "cmt_tr": "Kuruluş düzeyi yönetim gözetim kontrolleri, iş birimi düzeyinde yönetim tarafından uygulanır. Tanımlanan kontrol eksikliği işlem düzeyi kontrolleri gerektirir.", "cmt_en": "Entity-level management oversight controls are implemented by management at the business unit level to achieve business unit objectives and address business unit risks. Examples include IT general controls and period-end controls. The control deficiency described requires transaction- level controls."}, {"tr": "Kuruluş düzeyi yönetişim kontrolleri.", "en": "Entity-level governance controls.", "cmt_tr": "Kuruluş düzeyi yönetişim kontrolleri, yönetim kurulu tarafından en üst düzeyde oluşturulur. Tanımlanan kontrol eksikliği işlem düzeyi kontrolleri gerektirir.", "cmt_en": "Entity-level governance controls are established by the board of directors at the highest level (governance level). They include organizational policies and procedures that define the entity’s culture and communicate its expectations. Examples include IT policies, the code of conduct, oversight of controls, and setting the risk appetite. The control deficiency described requires transaction-level controls."}], "answer": 0}, {"q_tr": "Aşağıdaki kontrollerden hangisi önleyicidir?", "q_en": "Which of the following controls is preventive?", "options": [{"tr": "Posta açmak için iki kişinin gerekli kılınması.", "en": "Requiring two persons to open mail.", "cmt_tr": "Önleyici kontroller, mali tabloların yanlış beyan edilmesine neden olabilecek hata veya hileyi önleme amacındadır. Tespit edici kontroller ise halihazırda meydana gelmiş hata ve hileyi tespit etme amacındadır. Posta açmak için iki kişinin atanması, nakit tahsilatların yanlış beyan edilmesini önleme girişimidir.", "cmt_en": "Preventive controls have the objective of preventing errors or fraud that could result in a misstatement of the financial statements. Detective controls have the objective of detecting errors and fraud that have already occurred that could misstate the financial statements. Assigning two individuals to open mail is an attempt to prevent misstatement of cash receipts."}, {"tr": "Alacak hesapları yardımcı defterinin kontrol hesabıyla mutabakatı.", "en": "Reconciling the accounts receivable subsidiary file with the control account.", "cmt_tr": "Yardımcı defterin ana dosyayla mutabakatı hataları tespit edip düzeltilmesine yol açabilir, ancak kontrol hataları önlemez.", "cmt_en": "Reconciling the subsidiary file with the master file may detect and lead to the correction of errors, but the control does not prevent errors."}, {"tr": "Toplu toplamların kullanılması.", "en": "Using batch totals.", "cmt_tr": "Toplu toplamların kullanılması eksik veya kayıp bir belgeyi tespit edebilir, ancak bir belgenin kaybolmasını mutlaka önlemez.", "cmt_en": "The use of batch totals may detect a missing or lost document but will not necessarily prevent a document from becoming lost."}, {"tr": "Banka mutabakatlarının hazırlanması.", "en": "Preparing bank reconciliations.", "cmt_tr": "Banka mutabakatları hesaplardaki hataları ortaya çıkarır, ancak önleyici etkisi yoktur.", "cmt_en": "Bank reconciliations disclose errors in the accounts but have no preventive effect."}], "answer": 0}, {"q_tr": "Bankalar tarafından kullanılan geçici kayıt (memo posting):", "q_en": "Memo posting used by banks", "options": [{"tr": "İstenmeyen olayların olumsuz etkilerini düzeltir.", "en": "Corrects negative effects of unwanted events.", "cmt_tr": "Düzeltici kontroller, istenmeyen olayların olumsuz etkilerini düzeltir. Belirli bir tutarın üzerindeki tüm maliyet sapmalarının gerekçelendirilmesi zorunluluğu buna örnektir.", "cmt_en": "Corrective controls correct the negative effects of unwanted events. An example is a requirement that all cost variances over a certain amount be justified."}, {"tr": "Çevrimiçi, gerçek zamanlı işlemede veritabanlarını günceller.", "en": "Updates databases in online, real-time processing.", "cmt_tr": "Çevrimiçi, gerçek zamanlı bir sistemde veritabanı, operatör tarafından işlemin girilmesiyle hemen güncellenir.", "cmt_en": "In an online, real-time system, the database is updated immediately upon entry of the transaction by the operator. Such systems are referred to as online transaction processing, or OLTP, systems."}, {"tr": "Toplu işlemede kullanılır.", "en": "Is used in batch processing.", "cmt_tr": "Geçici kayıt, bankalar tarafından toplu işleme kullanıldığında mali işlemler için kullanılır. Bakiyeyi güncellemek üzere tam kayıt gün sonu toplu işlemesinin bir parçası olarak yapılacaksa, bir hesaba geçici alacak veya borç işlemleri kaydeder. Geçici kayıt, toplu işleme ile gerçek zamanlı işleme arasında bir ara adımdır.", "cmt_en": "Memo posting is used by banks for financial transactions when batch processing is used. It posts temporary credit or debit transactions to an account if the complete posting to update the balance will be done as part of the end-of-day batch processing. Information can be viewed immediately after updating. Memo posting is an intermediate step between batch processing and real-time processing."}, {"tr": "Telafi edici kontrol olarak kullanılır.", "en": "Is used as a compensatory control.", "cmt_tr": "Telafi edici (azaltıcı) kontroller, biri
