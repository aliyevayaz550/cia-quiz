<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CIA Quiz – Unit 8</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-group {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.3);
  margin-left: 10px;
}
.lang-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .5px; padding: 5px 9px; cursor: pointer; border: none;
  background: rgba(255,255,255,.10); color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
}
.lang-btn + .lang-btn { border-left: 1px solid rgba(255,255,255,.15); }
.lang-btn.active { background: var(--gold) !important; color: var(--navy) !important; }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── HISTORY SECTION ─────────────────────────────────── */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 8</div>
    <div id="score-badge">0 / 0</div>
    <div id="lang-group">
      <button class="lang-btn active" onclick="setLang('tr')" data-lang="tr">TR</button>
      <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
    </div>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">105 sual</span>
    </div>
  </div>
</div>

<div id="main">

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Overview of Control": [{"q_tr": "IIA Standartlarına eklenen IIA Sözlüğü'ne göre, aşağıdakilerden hangisi risklerin kontrol altında tutulmasını en doğrudan sağlamak üzere tasarlanmıştır?", "q_en": "According to The IIA Glossary appended to the Standards, which of the following are most directly designed to ensure that risks are contained?", "options": [{"tr": "Risk yönetimi süreçleri.", "en": "Risk management processes.", "cmt_tr": "Risk yönetimi, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlamak amacıyla olası olay veya durumları belirleme, değerlendirme, yönetme ve kontrol etme sürecidir.", "cmt_en": "Risk management is a process to identify, assess, manage, and control potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives."}, {"tr": "İç denetim fonksiyonları.", "en": "Internal audit functions.", "cmt_tr": "İç denetim fonksiyonu; kuruluşun faaliyetlerine değer katmak ve geliştirmek amacıyla tasarlanmış bağımsız, tarafsız güvence ve danışmanlık hizmetleri sunan bir departman, bölüm, danışman ekibi veya diğer uygulayıcılardır.", "cmt_en": "An internal audit function is a department, division, team of consultants, or other practitioner(s) that provides independent, objective assurance and consulting services designed to add value and improve an organization’s operations."}, {"tr": "Kontrol süreçleri.", "en": "Control processes.", "cmt_tr": "Kontrol süreçleri; risklerin, risk yönetimi süreci tarafından belirlenen risk toleransları dahilinde tutulmasını sağlamak amacıyla tasarlanmış bir kontrol çerçevesinin parçası olan politikalar, prosedürler ve faaliyetlerdir.", "cmt_en": "Control processes are the policies, procedures, and activities that are part of a control framework, designed to ensure that risks are contained within the risk tolerances established by the risk management process."}, {"tr": "Yönetişim süreçleri.", "en": "Governance processes.", "cmt_tr": "Yönetişim; yönetim kurulu tarafından kuruluşun hedeflerine ulaşmasına yönelik faaliyetlerini bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçler ve yapıların bileşimidir.", "cmt_en": "Governance is the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives."}], "answer": 2}, {"q_tr": "İç kontrol hakkındaki aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements about internal control is true?", "options": [{"tr": "Düzgün sürdürülen iç kontrol, çalışanlar arasında gizli anlaşma meydana gelemeyeceğine ilişkin makul güvence sağlar.", "en": "Properly maintained internal control reasonably ensures that collusion among employees cannot occur.", "cmt_tr": "Gizli anlaşma, iç kontrolün doğal bir sınırlılığıdır.", "cmt_en": "Collusion is an inherent limitation of internal control."}, {"tr": "İç kontrolün kurulması ve sürdürülmesi, iç denetçinin önemli sorumluluklarıdır.", "en": "The establishment and maintenance of internal control are important responsibilities of the internal auditor.", "cmt_tr": "İç kontrolün kurulması ve sürdürülmesi, yönetimin sorumluluğudur.", "cmt_en": "Establishment and maintenance of internal control are responsibilities of management."}, {"tr": "Son derece etkili iç kontrol, kuruluşun hedeflerine ulaşması için yeterlidir.", "en": "Exceptionally effective internal control is enough for the organization to achieve objectives.", "cmt_tr": "İç kontrol mutlak güvence sağlayamaz çünkü herhangi bir iç kontrol sistemi doğal sınırlılıklara tabidir.", "cmt_en": "Internal control cannot provide absolute assurance because any system of internal control is subject to inherent limitations."}, {"tr": "İç kontrolün bir sınırlılığı, yönetimin uyguladığı kontrollerin kapsamı hakkında yargıda bulunmasıdır.", "en": "A limitation of internal control is that management makes judgments about the extent of controls it implements.", "cmt_tr": "Doğal sınırlılıklar nedeniyle, ne kadar etkili olursa olsun iç kontrol, işletmenin hedeflerine ulaşılmasına ilişkin yalnızca makul güvence sağlayabilir. Örneğin, yönetim kontrolleri tasarlayıp uygularken, uyguladığı kontrollerin niteliği ve kapsamı ile üstlendiği riskler hakkında yargılarda bulunur.", "cmt_en": "Because of inherent limitations, internal control, no matter how effective, can provide only reasonable assurance about achieving the entity’s objectives. For example, when management designs and implements controls, it makes judgments about the nature and extent of controls it implements and the risks it assumes."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi iç kontrolün doğal bir sınırlılığıdır?", "q_en": "Which of the following is an inherent limitation of internal control?", "options": [{"tr": "Yargısal örnekleme.", "en": "Judgmental sampling.", "cmt_tr": "Yargısal örnekleme, iç denetim fonksiyonu tarafından uygulanan bir denetim prosedürüdür ve kontrolün bir sınırlılığı değildir.", "cmt_en": "Judgmental sampling is an audit procedure performed by the internal audit function and is not a limitation of control."}, {"tr": "Gizli anlaşma.", "en": "Collusion.", "cmt_tr": "İki veya daha fazla kişi gizli anlaşma yapabilir ya da yönetim iç kontrolü geçersiz kılabilir.", "cmt_en": "Two or more people may collude, or management may override the internal control."}, {"tr": "Görevlerin ayrılığı.", "en": "Segregation of duties.", "cmt_tr": "Görevlerin ayrılığı, varlıkların zimmete geçirilme riskini azaltan bir kontrol olup, kontrolün bir sınırlılığı değildir.", "cmt_en": "Segregation of duties is a control that mitigates risks of misappropriation of assets and is not a limitation of control."}, {"tr": "Çalışan değerlendirmesi.", "en": "Employee evaluation.", "cmt_tr": "Çalışan değerlendirmesi bir kontroldür, kontrolün bir sınırlılığı değildir.", "cmt_en": "Employee evaluation is a control, not a limitation of control."}], "answer": 1}, {"q_tr": "Bir iç denetçi, yıllık satışları 3.000.000 $ ve brüt kâr oranı %40 olan bir ticaret bölümünde envanter kontrolünü incelemektedir. Testler, satın almaların parasal tutarının %2'sinin kırılma ve çalışan hırsızlığı nedeniyle envantere ulaşmadığını göstermektedir. Yıllık 35.000 $ maliyetinde belirli kontroller eklemek, bu kayıpları satın almaların %0,5'ine düşürebilir. Başlangıç ve bitiş envanteri eşitse, kontroller önerilmeli midir?", "q_en": "An internal auditor is examining inventory control in a merchandising division with annual sales of $3,000,000 and a 40% gross profit rate. Tests show that 2% of the monetary amount of purchases do not reach inventory because of breakage and employee theft. Adding certain controls costing $35,000 annually could reduce these losses to .5% of purchases. If beginning and ending inventory are equal, should the controls be recommended?", "options": [{"tr": "Evet, çünkü öngörülen tasarruf eklenen kontrollerin maliyetini aşmaktadır.", "en": "Yes, because the projected saving exceeds the cost of the added controls.", "cmt_tr": "Yeni envanter kontrolünün maliyeti faydalarını aşmaktadır. Maliyet 35.000 $'dır, ancak fayda yalnızca 27.000 $'dır (1.800.000 $ SMM'nin %1,5'i). Karar, yeni kontrolü uygulamamak olmalıdır.", "cmt_en": "The cost of the new inventory control exceeds the benefits. The cost is $35,000, but the benefit is only $27,000 (1.5% of $1,800,000 COGS). The decision should be to not institute the new control."}, {"tr": "Hayır, çünkü eklenen kontrollerin maliyeti öngörülen tasarrufları aşmaktadır.", "en": "No, because the cost of the added controls exceeds the projected savings.", "cmt_tr": "Maliyet-fayda kriteri, herhangi bir envanter kontrolünün değerinin maliyetini aşması gerektiğini ifade eder. SMM = 1.800.000 $. SMM'nin %1,5'inin azaltılması = 27.000 $. Kontrolün maliyeti = 35.000 $. Maliyet, faydaları aşmaktadır.", "cmt_en": "The cost-benefit criterion requires that the value of instituting any inventory control should exceed its cost. COGS = $1,800,000. Reduction of 1.5% of COGS = $27,000. Cost of control = $35,000. The cost outweighs the benefits."}, {"tr": "Evet, çünkü ideal iç kontrol sistemi en kapsamlı olanıdır.", "en": "Yes, because the ideal system of internal control is the most extensive one.", "cmt_tr": "İdeal sistem maliyet-fayda kriterine tabidir. Çoğu zaman en kapsamlı iç kontrol sistemi maliyet etkin olmayabilir.", "cmt_en": "The ideal system is subject to the cost-benefit criterion. Often, the most extensive system of internal controls may not be cost effective."}, {"tr": "Evet, çalışan hırsızlığı söz konusu olduğundan maliyet-fayda değerlendirmelerine bakılmaksızın.", "en": "Yes, regardless of cost-benefit considerations, because the situation involves employee theft.", "cmt_tr": "Çalışan hırsızlığından bağımsız olarak maliyet-fayda kriteri yine de geçerlidir.", "cmt_en": "Regardless of employee theft, the cost-benefit criterion still applies."}], "answer": 1}, {"q_tr": "Bir denetçi, iç kontrolün bir sınırlılığı olarak yönetimin kontrolleri geçersiz kılması konusunda endişelidir. Aşağıdaki testlerden hangisi denetçinin endişesinin geçerliliğini en iyi değerlendirir?", "q_en": "An auditor is concerned about management override as a limitation of internal control. Which of the following tests would best assess the validity of the auditor’s concern?", "options": [{"tr": "Satın alma siparişlerinin borç hesaplarıyla eşleştirilmesi.", "en": "Matching purchase orders to accounts payable.", "cmt_tr": "Satın alma siparişlerinin borç hesaplarıyla eşleştirilmesi, satın almaların kaydedildiğini güvence altına almaya yardımcı olur.", "cmt_en": "Matching purchase orders with accounts payable helps assure that purchases were recorded."}, {"tr": "Onaylanan harcama limitlerinin aşılmadığının doğrulanması.", "en": "Verifying that approved spending limits are not exceeded.", "cmt_tr": "Yönetimin onayları geçersiz kılıp kılmadığını belirlemek için denetçi, gerçek harcamaları bütçelenmiş tutarlarla karşılaştırmalıdır.", "cmt_en": "To determine whether management has overridden approvals, the auditor should compare actual expenditures with budgeted amounts."}, {"tr": "Satış siparişlerinin gelir hesabına izlenmesi.", "en": "Tracing sales orders to the revenue account.", "cmt_tr": "Satış siparişlerinin gelir hesabına izlenmesi, tüm satışların kaydedildiğini güvence altına almaya yardımcı olur.", "cmt_en": "Tracing sales orders to the revenue account helps assure that all sales have been recorded."}, {"tr": "Yönetim kurulu toplantı tutanaklarının incelenmesi.", "en": "Reviewing minutes of board meetings.", "cmt_tr": "Yönetim kurulu toplantı tutanaklarının incelenmesi yetkilendirmeleri belirler, ancak yetkilendirmelerin geçersiz kılınmasına ilişkin kanıt sağlamaz.", "cmt_en": "Reviewing minutes of board meetings identifies authorizations but does not provide evidence about override of the authorizations."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangileri kontrol ortamının unsurlarıdır?", "q_en": "Which of the following are elements of the control environment?", "options": [{"tr": "Yönetimin felsefesi ve faaliyet tarzı.", "en": "Management’s philosophy and operating style.", "cmt_tr": "Organizasyon yapısı ile insan kaynakları politikaları ve uygulamaları da kontrol ortamının bir parçasıdır.", "cmt_en": "Organizational structure and human resource policies and practices are also part of the control environment."}, {"tr": "Organizasyon yapısı.", "en": "Organizational structure.", "cmt_tr": "Yönetimin felsefesi ve faaliyet tarzı ile insan kaynakları politikaları ve uygulamaları da kontrol ortamının bir parçasıdır.", "cmt_en": "Management’s philosophy and operating style and human resource policies and practices are also part of the control environment."}, {"tr": "İnsan kaynakları politikaları ve uygulamaları.", "en": "Human resource policies and practices.", "cmt_tr": "Yönetimin felsefesi ve faaliyet tarzı ile organizasyon yapısı da kontrol ortamının bir parçasıdır.", "cmt_en": "Management’s philosophy and operating style and organizational structure are also part of the control environment."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "Kontrol ortamı; dürüstlük ve etik değerler, personelin yetkinliği, yönetimin felsefesi ve faaliyet tarzı, organizasyon yapısı, yetki ve sorumluluk atanması ile insan kaynakları politikaları ve uygulamalarını kapsar.", "cmt_en": "The control environment includes integrity and ethical values, competence of personnel, management’s philosophy and operating style, organizational structure, assignment of authority and responsibility, and human resource policies and practices."}], "answer": 3}, {"q_tr": "İç kontrol, kuruluşun hedeflerinin etkin ve verimli bir şekilde karşılanacağına dair yalnızca makul güvence sağlayabilir. Bu hedeflere ulaşma olasılığını sınırlayan faktörlerden biri şudur:", "q_en": "Internal control can provide only reasonable assurance that the organization’s objectives will be met efficiently and effectively. One factor limiting the likelihood of achieving those objectives is that", "options": [{"tr": "İç denetçinin birincil sorumluluğu hile tespitidir.", "en": "The internal auditor’s primary responsibility is the detection of fraud.", "cmt_tr": "İç denetim fonksiyonunun kontrollerle ilgili sorumluluğu, etkinlik ve verimliliği değerlendirmek ve sürekli iyileştirmeyi teşvik etmektir.", "cmt_en": "The internal audit function’s responsibility regarding controls is to evaluate effectiveness and efficiency and to promote continuous improvement."}, {"tr": "Yönetim kurulu aktif ve bağımsızdır.", "en": "The board is active and independent.", "cmt_tr": "Etkili bir yönetişim fonksiyonu kontrol ortamını güçlendirir.", "cmt_en": "An effective governance function strengthens the control environment."}, {"tr": "İç kontrolün maliyeti faydalarını aşmamalıdır.", "en": "The cost of internal control should not exceed its benefits.", "cmt_tr": "Sınırlayıcı bir faktör, iç kontrolün maliyetinin beklenen faydalarını aşmaması gerektiğidir. Maliyet ve faydaların kesin ölçümü genellikle mümkün değildir.", "cmt_en": "A limiting factor is that the cost of internal control should not exceed its expected benefits. The precise measurement of costs and benefits usually is not possible."}, {"tr": "Yönetim performansı izler.", "en": "Management monitors performance.", "cmt_tr": "Üst yönetimin rolü, risk yönetimi ve kontrol süreçleri sisteminin kurulmasını, yönetilmesini ve değerlendirilmesini gözetmektir.", "cmt_en": "Senior management’s role is to oversee the establishment, administration, and assessment of the system of risk management and control processes."}], "answer": 2}, {"q_tr": "Aşağıdaki durumlardan hangisi iç kontrolün bir başarısızlığı yerine bir sınırlılığını temsil eder?", "q_en": "Which of the following situations represents a limitation, rather than a failure, of internal control?", "options": [{"tr": "Bir kuyumcu mağazası çalışanı, vitrin dolabından küçük bir kolye çalar.", "en": "A jewelry store employee steals a small necklace from a display cabinet.", "cmt_tr": "Fiziksel ve diğer kontroller, tek bir çalışan tarafından yapılan hırsızlıkları önlemeli veya derhal tespit etmelidir.", "cmt_en": "Physical and other controls should prevent or promptly detect thefts by a single employee."}, {"tr": "Bir banka veznedarı, kasa çekmecesinden birkaç yüz dolar zimmetine geçirir.", "en": "A bank teller embezzles several hundred dollars from the cash drawer.", "cmt_tr": "Mutabakat ve diğer kontroller, küçük miktarda nakit hırsızlığını önlemeli veya derhal tespit etmelidir.", "cmt_en": "Reconciliation and other controls should prevent or promptly detect theft of a small amount of cash."}, {"tr": "Bir satın alma çalışanı ve bir dış tedarikçi, komisyon alma planına katılır.", "en": "A purchasing employee and an outside vendor participate in a kickback scheme.", "cmt_tr": "İç kontrolün doğal sınırlılıkları nedeniyle, manuel veya otomatik kontroller gizli anlaşma yoluyla atlatılabilir (örneğin, bir satın alma çalışanı ile bir dış tedarikçi arasındaki komisyon alma planları).", "cmt_en": "Because of the inherent limitations of internal control, manual or automated controls may be circumvented by collusion (e.g., kickbacks involving a purchasing employee and an outside vendor)."}, {"tr": "Bir sinema gişe görevlisi, tam fiyat ödeyen müşterilere indirimli bilet satıp aradaki farkı cebe atar.", "en": "A movie theater cashier sells reduced-price tickets to full-paying customers and pockets the difference.", "cmt_tr": "Uygun denetim, gişe görevlisinin tam fiyatlı müşterilere indirimli bilet satmasını tespit etmelidir.", "cmt_en": "Proper supervision should detect cashier’s sale of reduced-price tickets at full price."}], "answer": 2}, {"q_tr": "İç kontrol oluşturmanın temel amacı:", "q_en": "The primary reason to establish internal control is to", "options": [{"tr": "Kuruluşun kaynaklarını korumaktır.", "en": "Safeguard the resources of the organization.", "cmt_tr": "Kaynakların korunması, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlama genel amacına dahildir.", "cmt_en": "Safeguarding resources is included in the overall purpose of providing reasonable assurance that the entity’s objectives are achieved."}, {"tr": "Kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlamaktır.", "en": "Provide reasonable assurance that the objectives of the organization are achieved.", "cmt_tr": "İç kontrol; mali raporlamanın güvenilirliği, faaliyetlerin etkinliği ve verimliliği ile geçerli yasa ve düzenlemelere uyum dahil olmak üzere işletmenin hedeflerine ulaşılması hakkında makul güvence sağlamak üzere tasarlanmış bir süreçtir.", "cmt_en": "Internal control is a process designed to provide reasonable assurance about the achievement of the entity’s objectives including reliability of financial reporting, effectiveness and efficiency of operations, and compliance with applicable laws and regulations."}, {"tr": "Kurumsal hedeflere uyumu teşvik etmektir.", "en": "Encourage compliance with organizational objectives.", "cmt_tr": "Uyumu teşvik etmek, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlama genel amacına dahildir.", "cmt_en": "Encouraging compliance is included in the overall purpose of providing reasonable assurance that the entity’s objectives are achieved."}, {"tr": "Bilgilerin doğruluğunu, güvenilirliğini ve zamanında sunulmasını sağlamaktır.", "en": "Ensure the accuracy, reliability, and timeliness of information.", "cmt_tr": "Bilgilerin doğruluğu, güvenilirliği ve zamanında sunulmasını sağlamak, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlama genel amacına dahildir.", "cmt_en": "Ensuring accuracy, reliability, and timeliness of information is included in the overall purpose of providing reasonable assurance that the entity’s objectives are achieved."}], "answer": 1}, {"q_tr": "İç kontroller, aşağıdakilere ilişkin makul güvence sağlamak üzere tasarlanmıştır:", "q_en": "Internal controls are designed to provide reasonable assurance that", "options": [{"tr": "Önemli hata veya hilelerin, çalışanlar tarafından görevlerini yerine getirirken zamanında önleneceği veya tespit edileceği ve düzeltileceği.", "en": "Material errors or fraud will be prevented, or detected and corrected, within a timely period by employees in the course of performing their assigned duties.", "cmt_tr": "Maliyet etkin kontroller, sapmaları tolere edilebilir bir oranla sınırlamalıdır. Önemli hatalar ve uygunsuz veya yasadışı eylemler, çalışanlar tarafından normal görev süreçlerinde zamanında önlenmeli veya tespit edilip düzeltilmelidir.", "cmt_en": "Cost-effective controls should restrict deviations to a tolerable rate. Material errors and improper or illegal acts should be prevented, or detected and corrected, within a timely period by employees in the normal course of performing their assigned duties."}, {"tr": "Yönetimin planlarının çalışan gizli anlaşmasıyla devre dışı bırakılmadığı.", "en": "Management’s plans have not been circumvented by worker collusion.", "cmt_tr": "Gizli anlaşma, iç kontrolün doğal bir sınırlılığıdır.", "cmt_en": "Collusion is an inherent limitation of internal control."}, {"tr": "İç denetim departmanının yönetim performansını gözetim ve yönlendirmesinin ekonomik ve verimli bir şekilde gerçekleştirildiği.", "en": "The internal auditing department’s guidance and oversight of management’s performance is accomplished economically and efficiently.", "cmt_tr": "Yönetim kurulu veya benzeri bir organ, yönetimin gözetim ve yönlendirilmesinden sorumludur.", "cmt_en": "The board of directors or a similar body is responsible for the guidance and oversight of management."}, {"tr": "Yönetimin planlama, organize etme ve yönlendirme süreçlerinin uygun şekilde değerlendirildiği.", "en": "Management’s planning, organizing, and directing processes are properly evaluated.", "cmt_tr": "Yönetim süreçlerinin incelenmesi ve değerlendirilmesi, iç denetim departmanının bir fonksiyonudur.", "cmt_en": "The examination and evaluation of management processes is a function of the internal auditing department."}], "answer": 0}, {"q_tr": "Riski yönetmek ve belirlenen hedef ve amaçlara ulaşma olasılığını artırmak için yapılan eylemler en iyi şekilde şu şekilde tanımlanır:", "q_en": "The actions taken to manage risk and increase the likelihood that established objectives and goals will be achieved are best described as", "options": [{"tr": "Denetim.", "en": "Supervision.", "cmt_tr": "Denetim, kontrol sağlamanın yalnızca bir aracıdır.", "cmt_en": "Supervision is just one means of achieving control."}, {"tr": "Kalite güvencesi.", "en": "Quality assurance.", "cmt_tr": "Kalite güvencesi yalnızca bir hedef ve amaç grubuna ilişkindir.", "cmt_en": "Quality assurance relates to just one set of objectives and goals."}, {"tr": "Kontrol.", "en": "Control.", "cmt_tr": "Kontrol; yönetim, yönetim kurulu ve diğer taraflarca riski yönetmek ve belirlenen hedef ve amaçlara ulaşma olasılığını artırmak için gerçekleştirilen herhangi bir eylemdir (IIA Sözlüğü).", "cmt_en": "Control is any action taken by management, the board, and other parties to manage risk and increase the likelihood that established objectives and goals will be achieved (The IIA Glossary)."}, {"tr": "Uyum.", "en": "Compliance.", "cmt_tr": "Uyum; yasalara, düzenlemelere, sözleşmelere, politikalara, prosedürlere ve diğer gerekliliklere bağlılıktır (IIA Sözlüğü).", "cmt_en": "Compliance is adherence to laws, regulations, contracts, policies, procedures, and other requirements (The IIA Glossary)."}], "answer": 2}, {"q_tr": "Aşağıdaki faaliyetlerden hangisi iç denetimin kapsamı dışındadır?", "q_en": "Which of the following activities is outside the scope of internal auditing?", "options": [{"tr": "Politikalara, prosedürlere ve sözleşmelere uyuma ilişkin risk maruziyetlerinin değerlendirilmesi.", "en": "Evaluating risk exposures regarding compliance with policies, procedures, and contracts.", "cmt_tr": "İç denetçiler, kuruluşun yasa, düzenleme, politika, prosedür ve sözleşmelere uyumuna ilişkin risk maruziyetlerini değerlendirmelidir.", "cmt_en": "Internal auditors must evaluate risk exposures relating to the organization’s compliance with laws, regulations, policies, procedures, and contracts."}, {"tr": "Varlıkların korunması.", "en": "Safeguarding of assets.", "cmt_tr": "Varlıkların korunması operasyonel bir faaliyet olup iç denetim fonksiyonunun kapsamı dışındadır. Ancak iç denetim fonksiyonu, varlıkların korunmasına ilişkin kontrollerin yeterliliğini ve etkinliğini değerlendirir.", "cmt_en": "Safeguarding assets is an operational activity and is therefore beyond the scope of the internal audit function. However, the internal audit function evaluates the adequacy and effectiveness of controls related to safeguarding of assets."}, {"tr": "Yasa ve düzenlemelere uyuma ilişkin risk maruziyetlerinin değerlendirilmesi.", "en": "Evaluating risk exposures regarding compliance with laws and regulations.", "cmt_tr": "İç denetim fonksiyonu, kuruluşun yasa, düzenleme, politika, prosedür ve sözleşmelere uyumuna ilişkin risk maruziyetlerini değerlendirmelidir.", "cmt_en": "The internal audit function must evaluate risk exposures relating to the organization’s compliance with laws, regulations, policies, procedures, and contracts."}, {"tr": "Yönetimin hedeflere ulaşılıp ulaşılmadığını belirlemek için kriterler oluşturup oluşturmadığının tespit edilmesi.", "en": "Ascertaining the extent to which management has established criteria to determine whether objectives have been accomplished.", "cmt_tr": "Bu, iç denetimin kapsamı dahilindedir.", "cmt_en": "This is within the scope of internal auditing."}], "answer": 1}, {"q_tr": "Bir iç denetçi, güvence görevinde çalışan hilesini tespit edemez. Bu tespit edememe, aşağıdakilerden hangisinin sonucu olması durumunda Küresel İç Denetim Standartları'nın ihlalini en çok düşündürür?", "q_en": "An internal auditor fails to discover an employee fraud during an assurance engagement. The nondiscovery is most likely to suggest a violation of the Global Internal Audit Standards if it was the result of a", "options": [{"tr": "Alandaki tüm işlemlerin ayrıntılı olarak gözden geçirilmemesi.", "en": "Failure to perform a detailed review of all transactions in the area.", "cmt_tr": "Mesleki özen, tüm işlemlerin ayrıntılı olarak gözden geçirilmesini gerektirmez.", "cmt_en": "Due professional care does not require detailed reviews of all transactions."}, {"tr": "Alandaki olası herhangi bir hilenin önemli bir tutarı içermeyeceğinin belirlenmesi.", "en": "Determination that any possible fraud in the area would not involve a material amount.", "cmt_tr": "Güvence prosedürlerinin uygulandığı konuların göreceli karmaşıklığı, önemliliği veya anlamlılığı dikkate alınmalıdır.", "cmt_en": "The relative complexity, materiality, or significance of matters to which assurance procedures are applied should be considered."}, {"tr": "Alandaki prosedürleri genişletmenin maliyetinin potansiyel faydaları aşacağının belirlenmesi.", "en": "Determination that the cost of extending procedures in the area would exceed the potential benefits.", "cmt_tr": "İç denetçi, güvencenin maliyetini potansiyel faydalarla karşılaştırmalıdır.", "cmt_en": "The internal auditor should consider the cost of assurance in relation to potential benefits."}, {"tr": "Alandaki iç kontrollerin yeterli ve etkili olduğunun varsayılması.", "en": "Presumption that the internal controls in the area were adequate and effective.", "cmt_tr": "İç denetim fonksiyonu kontrollerin yeterliliğini ve etkinliğini değerlendirir. Bir iç denetçi, kontrollerin yeterli ve etkili olduğunu basitçe varsaymamalıdır.", "cmt_en": "The internal audit function evaluates the adequacy and effectiveness of controls. An internal auditor must not simply assume that controls are adequate and effective."}], "answer": 3}, {"q_tr": "Kontroller, aşağıdakilerden hangisinin sağlanması için tasarlanmalıdır?", "q_en": "Controls should be designed to ensure that", "options": [{"tr": "Faaliyetlerin verimli bir şekilde yürütülmesi.", "en": "Operations are performed efficiently.", "cmt_tr": "Kontrol süreçlerinin amacı, faaliyetlerin verimli bir şekilde yürütülmesi dahil olmak üzere kuruluşun risk yönetiminde ve belirlenmiş ve iletilmiş hedeflerine ulaşmasında destek sağlamaktır.", "cmt_en": "The purpose of control processes is to support the organization in the management of risks and the achievement of its established and communicated objectives, including that operations are performed efficiently."}, {"tr": "Yönetimin planlarının çalışan gizli anlaşmasıyla devre dışı bırakılmaması.", "en": "Management’s plans have not been circumvented by worker collusion.", "cmt_tr": "Gizli anlaşma, iç kontrolün doğal bir sınırlılığıdır.", "cmt_en": "Collusion is an inherent limitation of internal control."}, {"tr": "İç denetim fonksiyonunun yönetim performansını gözetim ve yönlendirmesinin ekonomik ve verimli bir şekilde gerçekleştirilmesi.", "en": "The internal audit function’s guidance and oversight of management’s performance is accomplished economically and efficiently.", "cmt_tr": "Yönetim kurulu, yönetim tarafından idare edilen risk yönetimi ve kontrol süreçlerinin gözetimini sağlar.", "cmt_en": "The board provides oversight of risk management and control processes administered by management."}, {"tr": "Yönetimin planlama, organize etme ve yönlendirme süreçlerinin uygun şekilde değerlendirilmesi.", "en": "Management’s planning, organizing, and directing processes are properly evaluated.", "cmt_tr": "Kontroller doğrudan yönetimin planlama, organize etme ve yönlendirme süreçlerini ele almaz. İç denetçiler yönetim süreçlerini değerlendirir.", "cmt_en": "Controls do not directly address management’s planning, organizing, and directing processes. Internal auditors evaluate management processes."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi kontrolün tanımını en iyi şekilde yapar?", "q_en": "Which of the following best defines control?", "options": [{"tr": "Kontrol, yönetimin uygun planlama, organize etme ve yönlendirmesinin bir sonucudur.", "en": "Control is the result of proper planning, organizing, and directing by management.", "cmt_tr": "Kontrol; yönetim, yönetim kurulu ve diğer taraflarca riski yönetmek ve belirlenen hedef ve amaçlara ulaşma olasılığını artırmak için gerçekleştirilen herhangi bir eylemdir (IIA Sözlüğü).", "cmt_en": "A control is any action taken by management, the board, and other parties to manage risk and increase the likelihood that established objectives and goals will be achieved (The IIA Glossary)."}, {"tr": "Kontroller, kuruluşun neyi başarmayı tercih ettiğinin ifadeleridir.", "en": "Controls are statements of what the organization chooses to accomplish.", "cmt_tr": "Belirlenen hedef ve amaçlar, kuruluşun neyi başarmayı tercih ettiğidir.", "cmt_en": "Established objectives and goals are what the organization chooses to accomplish."}, {"tr": "Kontrol, sapmaları tolere edilebilir bir düzeyle sınırlamak için maliyet etkin önlemler alındığında sağlanır.", "en": "Control is provided when cost-effective measures are taken to restrict deviations to a tolerable level.", "cmt_tr": "İç denetim fonksiyonu kontrollerin verimliliğini değerlendirir, ancak kontrolün tanımı hedef ve amaçlara ulaşmadaki etkinliği ele alır.", "cmt_en": "The internal audit function evaluates the efficiency of controls, but the definition of control addresses effectiveness in achieving objectives and goals."}, {"tr": "Kontrol, hedef ve amaçları doğru, zamanında ve ekonomik bir şekilde gerçekleştirir.", "en": "Control accomplishes objectives and goals in an accurate, timely, and economical fashion.", "cmt_tr": "Verimli performans, hedef ve amaçları doğru, zamanında ve ekonomik bir şekilde gerçekleştirir.", "cmt_en": "Efficient performance accomplishes objectives and goals in an accurate, timely, and economical fashion."}], "answer": 0}, {"q_tr": "İç denetçiler düzenli olarak kontrolleri değerlendirir. Aşağıdakilerden hangisi, iç denetçiler tarafından tanınan kontrol kavramını en iyi şekilde açıklar?", "q_en": "Internal auditors regularly evaluate controls. Which of the following best describes the concept of control as recognized by internal auditors?", "options": [{"tr": "Yönetim, beklentileri karşılamayan personeli düzenli olarak işten çıkarır.", "en": "Management regularly discharges personnel who do not perform up to expectations.", "cmt_tr": "Yetersiz performans gösteren çalışanların işten çıkarılması, kontrolün kapsamlı bir tanımı değildir.", "cmt_en": "Termination of employees who perform unsatisfactorily is not a comprehensive definition of control."}, {"tr": "Yönetim, belirlenen hedef ve amaçlara ulaşma olasılığını artırmak için harekete geçer.", "en": "Management takes action to enhance the likelihood that established goals and objectives will be achieved.", "cmt_tr": "Kontrol; yönetim, yönetim kurulu ve diğer taraflarca riski yönetmek ve belirlenen hedef ve amaçlara ulaşma olasılığını artırmak için gerçekleştirilen herhangi bir eylemdir.", "cmt_en": "A control is any action taken by management, the board, and other parties to manage risk and increase the likelihood that established objectives and goals will be achieved."}, {"tr": "Kontrol, muhasebecilerin ve iç denetçilerin işlem doğruluğunu sağlamak için tasarladığı özel prosedürleri temsil eder.", "en": "Control represents specific procedures that accountants and internal auditors design to ensure the correctness of processing.", "cmt_tr": "Kontrol yalnızca işlemlerle sınırlı değildir. Ayrıca, iç denetçiler tarafından değil, yönetim, yönetim kurulu ve diğerleri tarafından tasarlanmalıdır.", "cmt_en": "Control is not limited to processing. Moreover, it should be designed by management, the board, and others, not by internal auditors."}, {"tr": "Kontrol prosedürleri, ayrıntıya dikkat edilmesini sağlamak için aşağıdan yukarıya doğru tasarlanmalıdır.", "en": "Control procedures should be designed from the bottom up to ensure attention to detail.", "cmt_tr": "Kontrol kavramı, yönetim ve yönetim kurulundan kuruluş geneline aşağı doğru akar.", "cmt_en": "The concept of control flows from management and the board down through the organization."}], "answer": 1}, {"q_tr": "Standart faaliyet prosedürlerinin kontrol olarak kullanılması, aşağıdaki özelliklerden hangisine sahip bir kuruluşta en etkili olma olasılığı yüksektir?", "q_en": "Use of standard operating procedures as controls is most likely to be effective in an organization that has which of the following characteristics?", "options": [{"tr": "Riskten kaçınma eğilimi.", "en": "An aversion to risk.", "cmt_tr": "Bir kuruluş ne kadar riskten kaçınıyorsa, üyelerinin kontrollere uyma olasılığı o kadar yüksektir. Standart faaliyet prosedürleri, riskten kaçınan bir kuruluşta en etkilidir.", "cmt_en": "The more risk averse an organization, the more likely its members will comply with controls. Standard operating procedures are most effective in a risk averse organization."}, {"tr": "Girişimci odaklılık.", "en": "An entrepreneurial focus.", "cmt_tr": "Girişimci odaklı bir kuruluş genellikle yüksek risk iştahı ve risk toleransına sahiptir, bu da standart faaliyet prosedürlerini daha az etkili kılar.", "cmt_en": "An organization with an entrepreneurial focus generally has a high risk appetite and risk tolerance, making standard operating procedures less effective."}, {"tr": "Etkili liderlik.", "en": "Effective leadership.", "cmt_tr": "Etkili liderlik hem risk toleranslı hem de riskten kaçınan kuruluşlarda var olabilir.", "cmt_en": "Effective leadership can exist in both risk tolerant and risk averse organizations."}, {"tr": "Çeşitli ürün karması.", "en": "A diverse product mix.", "cmt_tr": "Kontrollerin etkinliği, ürün karmasından çok riske karşı tutumdan etkilenir.", "cmt_en": "The effectiveness of controls is less influenced by product mix than by attitude toward risk."}], "answer": 0}, {"q_tr": "İç kontrol, aşağıdaki hedeflere ilişkin makul güvence sağlamak üzere tasarlanamaz:", "q_en": "Internal control cannot be designed to provide reasonable assurance regarding the achievement of objectives concerning", "options": [{"tr": "İç denetim maliyetinin azaltılması.", "en": "Reducing the cost of an internal audit.", "cmt_tr": "Daha etkili kontrol, denetçinin daha yüksek bir tespit riski kabul etmesine ve maddi testleri azaltmasına olanak tanır.", "cmt_en": "More effective control permits the auditor to accept a higher level of detection risk and reduce substantive testing."}, {"tr": "Tüm hilelerin ortadan kaldırılması.", "en": "Elimination of all fraud.", "cmt_tr": "İç kontrol, doğal sınırlılıklar nedeniyle mutlak güvence sağlayamaz: insan yargısı hatalıdır, yönetim kontrolleri geçersiz kılabilir, gizli anlaşma kontrolleri atlatabilir ve kontrollerin maliyeti faydalarını aşmamalıdır.", "cmt_en": "Internal control cannot provide absolute assurance due to inherent limitations: human judgment is faulty, management may override controls, collusion may circumvent controls, and cost of controls must not exceed benefits."}, {"tr": "Karar alma amacıyla güvenilir verilerin bulunması ve önemli belge ile kayıtların korunması.", "en": "Availability of reliable data for decision-making purposes and protection of important documents and records.", "cmt_tr": "Daha etkili iç kontrol, yönetime karar alma için daha iyi veriler sağlar.", "cmt_en": "More effective internal control provides management with better data for decision-making."}, {"tr": "Riskin azaltılması.", "en": "Mitigation of risk.", "cmt_tr": "Daha etkili iç kontrol, kontrollerin kuruluş, faaliyet ve işlem düzeylerinde riskleri azalttığına ilişkin bir miktar güvence sağlar.", "cmt_en": "More effective internal control provides some assurance that controls mitigate risks at the entity, activity, and transaction levels."}], "answer": 1}, {"q_tr": "Etkili iç kontrol:", "q_en": "Effective internal control", "options": [{"tr": "Varlıkların korunmasına yardımcı olur.", "en": "Assists with the safeguarding of assets.", "cmt_tr": "Varlıkların korunması, kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlama genel amacına dahildir.", "cmt_en": "Safeguarding of assets is included in the overall purpose of providing reasonable assurance that an organization’s objectives are achieved."}, {"tr": "Kuruluşun risk ve potansiyel kaybını ortadan kaldırır.", "en": "Eliminates risk and potential loss to the organization.", "cmt_tr": "Bazı riskler kaçınılmazdır ve diğerleri yalnızca aşırı maliyetlerle ortadan kaldırılabilir.", "cmt_en": "Some risks are unavoidable and others can be eliminated only at excessive costs."}, {"tr": "Yönetim tarafından atlatılamaz.", "en": "Cannot be circumvented by management.", "cmt_tr": "Yönetimin kontrolleri geçersiz kılma potansiyeli, iç kontrolün temel bir sınırlılığıdır.", "cmt_en": "The potential for management override is a basic limitation of internal control."}, {"tr": "Kuruluşun karşılaştığı değişen koşullardan etkilenmez.", "en": "Is unaffected by changing circumstances and conditions encountered by the organization.", "cmt_tr": "Kontroller, koşullardaki değişikliklere uygun şekilde değiştirilmelidir.", "cmt_en": "Controls should be modified as appropriate for changes in conditions."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi, büyük olasılıkla bir işletmenin iç kontrolünün potansiyel etkinliğinin doğal bir sınırlılığı olarak kabul edilir?", "q_en": "Which of the following most likely would be considered an inherent limitation of the potential effectiveness of an entity’s internal control?", "options": [{"tr": "Uyumsuz görevler.", "en": "Incompatible duties.", "cmt_tr": "Uyumsuz görevlerin yerine getirilmesi, farklı kişilere fonksiyonların atanmamasından kaynaklanan bir başarısızlıktır, iç kontrolün kaçınılmaz bir sınırlılığı değildir.", "cmt_en": "The performance of incompatible duties is a failure to assign different people the functions, not an inevitable limitation of internal control."}, {"tr": "Yönetimin kontrolleri geçersiz kılması.", "en": "Management override.", "cmt_tr": "Yönetim iç kontrolleri kurar. Dolayısıyla, bu kontrolleri geçersiz kılabilir.", "cmt_en": "Management establishes internal controls. Thus, it can override those controls."}, {"tr": "Denetim izleri.", "en": "Audit trails.", "cmt_tr": "Denetim izi, verilerin kaynağına kadar izlenmesine yarayan bir kayıttır. Denetim izleri, iç kontrolün bir sınırlılığı değildir.", "cmt_en": "An audit trail is a record for tracing data back to its source. Audit trails are not a limitation of internal control."}, {"tr": "Uyum.", "en": "Compliance.", "cmt_tr": "Yasal gerekliliklere zamanında ve doğru uyum, güçlü iç kontrollerin bir faydasıdır.", "cmt_en": "Timely and accurate compliance with legal requirements is a benefit of strong internal controls."}], "answer": 1}, {"q_tr": "Bir işletme, kontrolün maliyetini riskle ilişkili olarak değerlendirmelidir. Aşağıdaki kontrollerden hangisi, ağır takım tezgahlarına yapılan büyük tutarlı bir yatırım için bu felsefeyi en iyi yansıtır?", "q_en": "An entity should consider the cost of a control in relationship to the risk. Which of the following controls best reflects this philosophy for a large dollar investment in heavy machine tools?", "options": [{"tr": "Haftalık fiziksel envanter sayımı yapılması.", "en": "Conducting a weekly physical inventory.", "cmt_tr": "Haftalık envanter sayımlarının maliyeti muhtemelen elde edilen faydaları aşacaktır.", "cmt_en": "The cost of weekly inventories would likely outweigh the benefits derived."}, {"tr": "Her girişe günde 24 saat güvenlik görevlisi yerleştirilmesi.", "en": "Placing security guards at every entrance 24 hours a day.", "cmt_tr": "24 saat güvenlik görevlisi bulundurmanın maliyeti muhtemelen elde edilen faydaları aşacaktır.", "cmt_en": "The cost of 24-hour guards would likely outweigh the benefits derived."}, {"tr": "Her araca kontrollü bir kimlik numarası basılması.", "en": "Imprinting a controlled identification number on each tool.", "cmt_tr": "Her araca kontrollü kimlik numarası basılması ve periyodik kontrol, makul maliyetle etkili bir kontrol sağlar.", "cmt_en": "A controlled identification number on each tool and periodic checking allow for an effective control at reasonable cost."}, {"tr": "Tüm elden çıkarmaların satış başkan yardımcısı tarafından onaylanması.", "en": "Having all dispositions approved by the vice president of sales.", "cmt_tr": "Ağır ekipmanı tanımayan satış başkan yardımcısı, yetkilendirme sağlayacak uygun yetkili olmaz.", "cmt_en": "The vice president of sales, who is not familiar with the heavy equipment, would not be the appropriate officer to provide the authorization."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, bir iç kontrol sistemindeki doğal bir sınırlılığın örneğidir?", "q_en": "Which of the following items is an example of an inherent limitation in an internal control system?", "options": [{"tr": "Çalışan görevlerinin ayrılığı.", "en": "Segregation of employee duties.", "cmt_tr": "Çalışan görevlerinin ayrılığı bir kontroldür, kontrolün doğal bir sınırlılığı değildir.", "cmt_en": "Segregation of employee duties is a control, not an inherent limitation of control."}, {"tr": "Karar almada insan hatası.", "en": "Human error in decision making.", "cmt_tr": "Doğal sınırlılıkları nedeniyle iç kontrol yalnızca makul güvence sağlayabilir. İnsan yargısı hatalıdır ve kontroller insan hatası nedeniyle başarısız olabilir.", "cmt_en": "Because of its inherent limitations, internal control can provide only reasonable assurance. Human judgment is faulty, and controls may fail because of human error."}, {"tr": "Etkisiz yönetim kurulu.", "en": "Ineffective board of directors.", "cmt_tr": "Yönetim kurulu doğası gereği etkisiz değildir, ancak herhangi bir düzeydeki insan yargısı hatalı olabilir.", "cmt_en": "A board is not inherently ineffective, but human judgment at any level may be faulty."}, {"tr": "Yetersiz personele sahip iç denetim fonksiyonları.", "en": "Understaffed internal audit functions.", "cmt_tr": "Yetersiz personele sahip iç denetim fonksiyonu, kontrolün doğal bir sınırlılığı değil, düzeltilmesi gereken tespit edilmiş bir zayıflıktır.", "cmt_en": "An understaffed internal audit function is not an inherent limitation of control, but an identified weakness that requires correction."}], "answer": 1}, {"q_tr": "Manuel kontrollerin otomatik kontrollerden daha uygun olma olasılığı en yüksek olan durum aşağıdakilerden hangisidir?", "q_en": "Manual controls would most likely be more suitable than automated controls for which of the following?", "options": [{"tr": "Büyük, olağandışı veya tekrarlanmayan işlemler.", "en": "Large, unusual, or nonrecurring transactions.", "cmt_tr": "Büyük, olağandışı veya tekrarlanmayan işlemler gibi yargı ve takdir yetkisi gerektiren durumlarda manuel kontroller daha uygun olabilir.", "cmt_en": "Manual controls may be more suitable if judgment and discretion are required, such as for large, unusual, or nonrecurring transactions."}, {"tr": "Ek hesaplamalar gerektiren yüksek hacimli işlemler.", "en": "High-volume transactions that require additional calculations.", "cmt_tr": "Otomatik kontroller, ek hesaplamalar gerektiren yüksek hacimli işlemler için uygundur.", "cmt_en": "Automated controls are suitable for high-volume transactions that require additional calculations."}, {"tr": "Tahmin edilebilir ve düzeltilebilir rutin hataların olduğu durumlar.", "en": "Situations with routine errors that can be predicted and corrected.", "cmt_tr": "Otomatik kontroller, tahmin edilebilir ve düzeltilebilir rutin hatalar için uygundur.", "cmt_en": "Automated controls are suitable for routine errors that can be predicted and corrected."}, {"tr": "Yüksek derecede doğruluk gerektiren koşullar.", "en": "Circumstances that require a high degree of accuracy.", "cmt_tr": "Otomatik kontroller, yüksek derecede doğruluk gerektiren koşullar için uygundur.", "cmt_en": "Automated controls are suitable for circumstances that require a high degree of accuracy."}], "answer": 0}, {"q_tr": "İç kontrolü kurma ve sürdürme birincil sorumluluğu kime aittir?", "q_en": "The primary responsibility for establishing and maintaining internal control rests with", "options": [{"tr": "Bağımsız denetçiler.", "en": "The external auditors.", "cmt_tr": "Bağımsız denetçilerin iç kontrolü kurma ve sürdürme birincil sorumluluğu yoktur.", "cmt_en": "The external auditors do not have primary responsibility for establishing and maintaining internal control."}, {"tr": "İç denetçiler.", "en": "The internal auditors.", "cmt_tr": "İç denetçilerin iç kontrolü kurma ve sürdürme birincil sorumluluğu yoktur.", "cmt_en": "The internal auditors do not have primary responsibility for establishing and maintaining internal control."}, {"tr": "Yönetim.", "en": "Management.", "cmt_tr": "İç kontrol; yönetişimden sorumlu olanlar, yönetim ve diğer personel tarafından gerçekleştirilen, işletmenin hedeflerine ulaşılması hakkında makul güvence sağlamak üzere tasarlanmış bir süreçtir.", "cmt_en": "Internal control is a process, effected by those charged with governance, management, and other personnel, designed to provide reasonable assurance about the achievement of the entity’s objectives."}, {"tr": "Muhasebe müdürü veya sayman.", "en": "The controller or the treasurer.", "cmt_tr": "Ne muhasebe müdürü ne de saymanın iç kontrolü kurma ve sürdürme birincil sorumluluğu vardır.", "cmt_en": "Neither the controller nor the treasurer has primary responsibility for establishing and maintaining internal control."}], "answer": 2}, {"q_tr": "Etkili iç kontroller aşağıdakilerin riskini sınırlayabilir:", "q_en": "Effective internal controls can limit the risk of", "options": [{"tr": "Makul güvenceden fazlasını sağlayamama.", "en": "The inability to provide more than reasonable assurance.", "cmt_tr": "Makul güvenceden fazlasını sağlayamama, doğal sınırlılıkların etkisidir.", "cmt_en": "The inability to provide more than reasonable assurance is the effect of inherent limitations."}, {"tr": "Aynı kişi tarafından uyumsuz fonksiyonların yerine getirilmesi.", "en": "Incompatible functions performed by the same person.", "cmt_tr": "Uyumsuz fonksiyonların yerine getirilmesi, görevlerin uygun şekilde ayrılmamasından kaynaklanan bir başarısızlıktır, kaçınılmaz bir sınırlılık değildir. Fonksiyonel sorumlulukların ayrılması, önemli bir kontrol faaliyetleri kategorisidir.", "cmt_en": "The performance of incompatible functions is a failure to separate duties properly, not an inevitable limitation. The separation of functional responsibilities is an important category of control activities."}, {"tr": "Karar almada hatalı insan yargısı.", "en": "Faulty human judgment in decision making.", "cmt_tr": "Karar almada insan yargısı hatalı olabilir ve bu nedenle iç kontrolün doğal bir sınırlılığıdır.", "cmt_en": "Human judgment in decision making can be faulty and is therefore an inherent limitation of internal control."}, {"tr": "Yönetimin kontrolleri geçersiz kılması.", "en": "Management override.", "cmt_tr": "Yönetim iç kontrolleri kurar ve dolayısıyla bu kontrolleri geçersiz kılabilir.", "cmt_en": "Management establishes internal controls and therefore can override those controls."}], "answer": 1}, {"q_tr": "Bir iç denetçinin denetim sırasında önemli bir hatayı veya hileyi tespit edememe riski aşağıdakilerden hangisiyle artırılır?", "q_en": "The risk that an internal auditor may not detect a material error or fraud during an audit is increased by", "options": [{"tr": "Değerlendirme-ödül sisteminin uygulanmamış olması.", "en": "An evaluation-reward system having not been implemented.", "cmt_tr": "Değerlendirme-ödül sisteminin yokluğu, bir iç denetçinin önemli bir hatayı veya hileyi tespit edememe riskini artırmamalıdır.", "cmt_en": "The absence of an evaluation-reward system should not increase the risk that an internal auditor may not detect a material error or fraud."}, {"tr": "Yönetimin iç kontrolü geçersiz kılması.", "en": "Management override of internal control.", "cmt_tr": "Yönetimin kontrolleri geçersiz kılması, iç kontrolün doğal bir sınırlılığıdır. Denetçi, yönetimin kontrolleri geçersiz kılmasını her zaman bir hile riski olarak belirlemelidir.", "cmt_en": "Management override is an inherent limitation of internal control. The auditor must always identify management override of controls as a fraud risk."}, {"tr": "İç denetim planının yönetişimden sorumlu olanlar tarafından gözden geçirilmesi.", "en": "Review of the internal audit plan by those charged with governance.", "cmt_tr": "İç denetim planının gözden geçirilmesi tespit edememe riskini artırmaz.", "cmt_en": "Review of the internal audit plan does not increase the risk of non-detection."}, {"tr": "Muhasebe standartlarının uygulanmasındaki temel farklılıklar.", "en": "Fundamental differences in the application of accounting standards.", "cmt_tr": "Muhasebe standartlarındaki temel farklılıklar tespit edememe riskini artırmaz.", "cmt_en": "Fundamental differences in accounting standards do not increase the risk of non-detection."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangileri kontrol ortamı faktörleri olarak kabul edilir?", "q_en": "Which of the following are considered control environment factors?", "options": [{"tr": "Tespit Riski – Evet. İnsan Kaynakları Politikaları ve Uygulamaları - Evet", "en": "Detection Risk – Yes. Human Resources Policies and Practices - Yes", "cmt_tr": "İnsan kaynakları politikaları ve uygulamaları kontrol ortamının bir parçasıdır, ancak tespit riski değildir. Tespit riski, denetim prosedürlerinin etkinliğinin bir fonksiyonudur.", "cmt_en": "Human resource policies and practices are part of the control environment, but detection risk is not. Detection risk is a function of the effectiveness of audit procedures."}, {"tr": "Tespit Riski – Evet. İnsan Kaynakları Politikaları ve Uygulamaları - Hayır", "en": "Detection Risk – Yes. Human Resources Policies and Practices - No", "cmt_tr": "İnsan kaynakları politikaları ve uygulamaları kontrol ortamının bir parçasıdır, ancak tespit riski değildir.", "cmt_en": "Human resource policies and practices are part of the control environment, but detection risk is not."}, {"tr": "Tespit Riski – Hayır. İnsan Kaynakları Politikaları ve Uygulamaları - Evet", "en": "Detection Risk – No. Human Resources Policies and Practices - Yes", "cmt_tr": "İnsan kaynakları politikaları ve uygulamaları kontrol ortamının bir parçasıdır. Bunlar işe alma, oryantasyon, eğitim, değerlendirme, danışmanlık, terfi, ücretlendirme ve düzeltici eylemlere ilişkindir.", "cmt_en": "Human resource policies and practices are part of the control environment. These relate to recruitment, orientation, training, evaluating, counseling, promoting, compensating, and remedial actions."}, {"tr": "Tespit Riski – Hayır. İnsan Kaynakları Politikaları ve Uygulamaları – Hayır", "en": "Detection Risk – No. Human Resources Policies and Practices – No", "cmt_tr": "İnsan kaynakları politikaları ve uygulamaları kontrol ortamının bir parçasıdır, ancak tespit riski değildir.", "cmt_en": "Human resource policies and practices are part of the control environment, but detection risk is not."}], "answer": 2}, {"q_tr": "İç denetim fonksiyonunun iç kontrole ilişkin görevleri şunları kapsar:", "q_en": "The internal audit function’s duties regarding internal control include", "options": [{"tr": "Kontrol sisteminin yönetilmesi.", "en": "Administering the system of controls.", "cmt_tr": "Üst yönetim, kontrol sisteminin kurulmasını, yönetilmesini ve değerlendirilmesini gözetir.", "cmt_en": "Senior management oversees the establishment, administration, and assessment of the system of controls."}, {"tr": "Sürekli iyileştirmenin teşvik edilmesi.", "en": "Promoting continuous improvement.", "cmt_tr": "İç denetim fonksiyonu, kontrollerin etkinliğini ve verimliliğini değerlendirerek ve sürekli iyileştirmeyi teşvik ederek kuruluşun etkili kontroller sürdürmesine yardımcı olmalıdır.", "cmt_en": "The internal audit function must assist the organization in maintaining effective controls by evaluating their effectiveness and efficiency and by promoting continuous improvement."}, {"tr": "Varlıkların korunması.", "en": "Safeguarding assets.", "cmt_tr": "İç denetim fonksiyonunun sorumluluğu, varlıkların korunmasına ilişkin kontrollerin yeterliliğini ve etkinliğini değerlendirmektir.", "cmt_en": "The internal audit function’s responsibility is to evaluate the adequacy and effectiveness of controls regarding the safeguarding of assets."}, {"tr": "Yasalara uyumun sağlanması.", "en": "Ensuring compliance with the law.", "cmt_tr": "İç denetim fonksiyonunun sorumluluğu, yasa, düzenleme, politika, prosedür ve sözleşmelere uyuma ilişkin kontrollerin yeterliliğini ve etkinliğini değerlendirmektir.", "cmt_en": "The internal audit function’s responsibility is to evaluate the adequacy and effectiveness of controls regarding compliance with laws, regulations, policies, procedures, and contracts."}], "answer": 1}, {"q_tr": "Kontrol hedeflerine ulaşma olasılığı, iç kontrolün hangi doğal sınırlılığından etkilenir?", "q_en": "The likelihood of achieving control objectives is affected by which limitation inherent to internal control?", "options": [{"tr": "İç denetçinin birincil sorumluluğu hile tespitidir.", "en": "The internal auditor’s primary responsibility is the detection of fraud.", "cmt_tr": "İç denetçinin sorumluluğu, kontrol hedeflerine ulaşıldığına ilişkin makul güvence elde etmektir.", "cmt_en": "The internal auditor’s responsibility is to obtain reasonable assurance that control objectives are achieved."}, {"tr": "Yönetim kontrolleri değerlendirir.", "en": "Management assesses controls.", "cmt_tr": "Yöneticiler kendi sorumluluk alanlarındaki kontrolleri değerlendirmelidir.", "cmt_en": "Managers should assess controls within their responsibilities."}, {"tr": "İç kontrolün maliyeti faydalarını aşmamalıdır.", "en": "The cost of internal control should not exceed its benefits.", "cmt_tr": "Bir işletmenin iç kontrol maliyeti, elde edilmesi beklenen faydaları aşmamalıdır. Maliyet ve faydaların kesin ölçümü genellikle mümkün değildir.", "cmt_en": "The cost of an entity’s internal control should not exceed the benefits expected to be derived. The precise measurement of costs and benefits usually is not possible."}, {"tr": "Yönetim iç kontrolü izler.", "en": "Management monitors internal control.", "cmt_tr": "İzleme iç kontrolü güçlendirir.", "cmt_en": "Monitoring strengthens internal control."}], "answer": 2}, {"q_tr": "Aşağıdaki faktörlerden hangisi, büyük olasılıkla bir işletmenin iç kontrolünün doğal bir sınırlılığı olarak kabul edilir?", "q_en": "Which of the following factors would most likely be considered an inherent limitation to an entity’s internal control?", "options": [{"tr": "Bilgi işlem sisteminin karmaşıklığı.", "en": "The complexity of the information processing system.", "cmt_tr": "Kontrol sistemlerinin bilgi işlem sisteminin karmaşıklığını telafi etme olasılığı, insan doğasını telafi etmesinden daha yüksektir.", "cmt_en": "Control systems are more likely to compensate for the complexity of the information processing system than for human nature."}, {"tr": "Karar alma sürecinde insan yargısı.", "en": "Human judgment in the decision making process.", "cmt_tr": "İnsan yargısı hatalıdır ve kontroller basit hata veya yanılma nedeniyle başarısız olabilir. Ayrıca, manuel veya otomatik kontroller gizli anlaşma yoluyla atlatılabilir ve yönetim iç kontrolü uygunsuz şekilde geçersiz kılabilir.", "cmt_en": "Human judgment is faulty, and controls may fail because of simple error or mistake. Furthermore, manual or automated controls can be circumvented by collusion, and management may inappropriately override internal control."}, {"tr": "Yönetim kurulunun etkisizliği.", "en": "The ineffectiveness of the board of directors.", "cmt_tr": "Yönetim kurulunun etkisizliği kaçınılmaz değildir.", "cmt_en": "The ineffectiveness of the board of directors is not inevitable."}, {"tr": "Yönetimin kontrol ortamını iyileştirmek için teşviklerinin olmaması.", "en": "The lack of management incentives to improve the control environment.", "cmt_tr": "Teşvikler sağlanabilir.", "cmt_en": "Incentives may be provided."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi iç kontrolün doğal bir sınırlılığıdır?", "q_en": "Which of the following is an inherent limitation in internal control?", "options": [{"tr": "Uyumsuz görevler.", "en": "Incompatible duties.", "cmt_tr": "Uyumsuz görevlerin yerine getirilmesi, farklı kişilere fonksiyonların atanmamasından kaynaklanan bir başarısızlıktır, doğal bir sınırlılık değildir.", "cmt_en": "The performance of incompatible duties is a failure to assign different people the functions, not an inherent limitation."}, {"tr": "Görevlerin ayrılığının eksikliği.", "en": "Lack of segregation of duties.", "cmt_tr": "Görevlerin ayrılığının eksikliği, tespit edilip düzeltilebilecek zayıf bir iç kontrol faaliyetidir, doğal bir sınırlılık değildir.", "cmt_en": "Lack of segregation of duties is a poor internal control activity that can be identified and corrected, not an inherent limitation."}, {"tr": "Hatalı insan yargısı.", "en": "Faulty human judgment.", "cmt_tr": "İnsan yargısı hatalıdır ve kontroller insan hatası nedeniyle başarısız olabilir.", "cmt_en": "Human judgment is faulty, and controls may fail because of human error."}, {"tr": "Denetim komitesinin yokluğu.", "en": "Lack of an audit committee.", "cmt_tr": "Denetim komitesinin yokluğu, tespit edilip düzeltilebilecek zayıf bir iç kontrol faaliyetidir, doğal bir sınırlılık değildir.", "cmt_en": "Lack of an audit committee is a poor internal control activity that can be identified and corrected, not an inherent limitation."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi iç kontrollerin doğal bir sınırlılığının bir örneğini temsil eder?", "q_en": "Which of the following represents an example of an inherent limitation of internal controls?", "options": [{"tr": "Banka mutabakatlarının zamanında yapılmaması.", "en": "Bank reconciliations are not performed on a timely basis.", "cmt_tr": "Banka mutabakatlarının zamanında yapılmaması, iç kontrolün yapısı ve uygulamasıyla ilgilidir. Doğal bir sınırlılık değildir.", "cmt_en": "Not performing bank reconciliations on a timely basis relates to the structure and implementation of internal control. It is not an inherent limitation."}, {"tr": "CEO'nun bir kontrolü geçersiz kılarak satın alma emri olmadan çek talep edebilmesi.", "en": "The CEO can override a control and request a check with no purchase order.", "cmt_tr": "CEO'nun satın alma emri olmadan çek talep etmesi, doğal bir sınırlılık nedeniyle mümkündür. Bu, yönetimin iç kontrolü geçersiz kılmasıdır.", "cmt_en": "The
