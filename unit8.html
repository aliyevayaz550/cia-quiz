f the following disadvantages?", "q_en": "Compared to online real-time processing, batch processing has which of the following disadvantages?", "options": [{"tr": "A greater level of control is necessary.", "en": "A greater level of control is necessary.", "cmt_tr": "Batch processing requires a lesser degree of control than online real-time processing.", "cmt_en": "Batch processing requires a lesser degree of control than online real-time processing."}, {"tr": "Additional computing resources are required.", "en": "Additional computing resources are required.", "cmt_tr": "Fewer computing resources are generally required in a batch processing environment over an online real-time one.", "cmt_en": "Fewer computing resources are generally required in a batch processing environment over an online real-time one."}, {"tr": "Additional personnel are required.", "en": "Additional personnel are required.", "cmt_tr": "Often fewer personnel are required in a batch processing environment over an online real-time one.", "cmt_en": "Often fewer personnel are required in a batch processing environment over an online real-time one."}, {"tr": "Stored data are current only after the update process.", "en": "Stored data are current only after the update process.", "cmt_tr": "In batch processing, transactions are gathered throughout the workday and stored offline until a period, often overnight, when computer resources are freed up. These collections of transactions, called “batches,” are then processed as a group. During the limbo period between entry and storage of the transactions and processing of the batch, the database is not current.", "cmt_en": "In batch processing, transactions are gathered throughout the workday and stored offline until a period, often overnight, when computer resources are freed up. These collections of transactions, called “batches,” are then processed as a group. During the limbo period between entry and storage of the transactions and processing of the batch, the database is not current."}], "answer": 3}, {"q_tr": "A payroll system’s master file is processed at night once every 2 weeks. There is relatively little file maintenance required. Which of the following is most likely to be the appropriate processing method under the circumstances?", "q_en": "A payroll system’s master file is processed at night once every 2 weeks. There is relatively little file maintenance required. Which of the following is most likely to be the appropriate processing method under the circumstances?", "options": [{"tr": "Parallel.", "en": "Parallel.", "cmt_tr": "Parallel means that two or more processes are executed concurrently.", "cmt_en": "Parallel means that two or more processes are executed concurrently."}, {"tr": "Online, real-time.", "en": "Online, real-time.", "cmt_tr": "Online means simply that data entry is performed via a terminal to a computer, and real-time means that transactions are processed when captured. The payroll operation need not be online or real-time.", "cmt_en": "Online means simply that data entry is performed via a terminal to a computer, and real-time means that transactions are processed when captured. The payroll operation need not be online or real-time."}, {"tr": "Network.", "en": "Network.", "cmt_tr": "A network of computers may employ any mode of processing but is most likely to be used for online, real-time applications.", "cmt_en": "A network of computers may employ any mode of processing but is most likely to be used for online, real-time applications."}, {"tr": "Batch.", "en": "Batch.", "cmt_tr": "Batch processing is the accumulation and grouping of transactions for processing on a delayed basis. The batch approach is suitable for applications that can be processed at intervals and involve large volumes of similar items, e.g., payroll, sales, inventory, and billing.", "cmt_en": "Batch processing is the accumulation and grouping of transactions for processing on a delayed basis. The batch approach is suitable for applications that can be processed at intervals and involve large volumes of similar items, e.g., payroll, sales, inventory, and billing."}], "answer": 3}, {"q_tr": "A new purchasing system for just-in-time production requirements has been proposed. Users want access to current master file information at all times. To satisfy user needs, master file changes should be implemented with", "q_en": "A new purchasing system for just-in-time production requirements has been proposed. Users want access to current master file information at all times. To satisfy user needs, master file changes should be implemented with", "options": [{"tr": "Periodic entry with subsequent batch processing.", "en": "Periodic entry with subsequent batch processing.", "cmt_tr": "Periodic entry and batch processing do not permit the immediate updating required by JIT production.", "cmt_en": "Periodic entry and batch processing do not permit the immediate updating required by JIT production."}, {"tr": "Periodic entry with immediate batch processing.", "en": "Periodic entry with immediate batch processing.", "cmt_tr": "Periodic entry does not permit immediate updating, and “immediate batch processing” is a contradiction in terms.", "cmt_en": "Periodic entry does not permit immediate updating, and “immediate batch processing” is a contradiction in terms."}, {"tr": "Online entry with subsequent batch processing.", "en": "Online entry with subsequent batch processing.", "cmt_tr": "Online entry and subsequent batch processing do not permit the immediate updating required by JIT production.", "cmt_en": "Online entry and subsequent batch processing do not permit the immediate updating required by JIT production."}, {"tr": "Online entry with immediate processing.", "en": "Online entry with immediate processing.", "cmt_tr": "JIT production attempts to minimize inventory by more closely coordinating deliveries of needed materials and production. Thus, inventory data must be current. Online entry with immediate (real-time) processing gives users current master file information because changes are entered", "cmt_en": "JIT production attempts to minimize inventory by more closely coordinating deliveries of needed materials and production. Thus, inventory data must be current. Online entry with immediate (real-time) processing gives users current master file information because changes are entered"}], "answer": 3}, {"q_tr": "The concept of timeliness of data availability is most relevant to", "q_en": "The concept of timeliness of data availability is most relevant to", "options": [{"tr": "Computerized systems.", "en": "Computerized systems.", "cmt_tr": "Timeliness is not necessarily an element of a computerized system.", "cmt_en": "Timeliness is not necessarily an element of a computerized system."}, {"tr": "Payroll systems.", "en": "Payroll systems.", "cmt_tr": "Timeliness is not necessarily an element of a payroll system.", "cmt_en": "Timeliness is not necessarily an element of a payroll system."}, {"tr": "Manual systems.", "en": "Manual systems.", "cmt_tr": "Timeliness is not necessarily an element of a manual system.", "cmt_en": "Timeliness is not necessarily an element of a manual system."}, {"tr": "Online systems.", "en": "Online systems.", "cmt_tr": "An online processing system is in direct communication with the computer, giving it the capability to handle transactions as they are entered. An online system permits both immediate posting (updating) and inquiry of master files as transactions occur. In an online system, data are immediately available to users upon entry.", "cmt_en": "An online processing system is in direct communication with the computer, giving it the capability to handle transactions as they are entered. An online system permits both immediate posting (updating) and inquiry of master files as transactions occur. In an online system, data are immediately available to users upon entry."}], "answer": 3}, {"q_tr": "The relationship between online, real-time database systems and batch processing systems is that", "q_en": "The relationship between online, real-time database systems and batch processing systems is that", "options": [{"tr": "A firm will have only one processing mode because a single computer cannot do both.", "en": "A firm will have only one processing mode because a single computer cannot do both.", "cmt_tr": "One computer can operate in both modes.", "cmt_en": "One computer can operate in both modes."}, {"tr": "A firm will not use batch processing if it has a large computer.", "en": "A firm will not use batch processing if it has a large computer.", "cmt_tr": "Firms with large computers find it both cost effective and efficient to group transactions and process them periodically.", "cmt_en": "Firms with large computers find it both cost effective and efficient to group transactions and process them periodically."}, {"tr": "A firm may use both processing modes concurrently.", "en": "A firm may use both processing modes concurrently.", "cmt_tr": "Firms may find it beneficial to incorporate both processing modes into one system. A database may be established for information that must be obtained quickly, for instance, a sales processing system in which credit information must be available to sales personnel on an ongoing basis. However, other processing requirements may take advantage of the speed and control provided in a batch processing system. For example, payroll transactions may be processed quickly and efficiently in a batch mode.", "cmt_en": "Firms may find it beneficial to incorporate both processing modes into one system. A database may be established for information that must be obtained quickly, for instance, a sales processing system in which credit information must be available to sales personnel on an ongoing basis. However, other processing requirements may take advantage of the speed and control provided in a batch processing system. For example, payroll transactions may be processed quickly and efficiently in a batch mode."}, {"tr": "A firm will always prefer an online, real-time processing system because batch processing is slow.", "en": "A firm will always prefer an online, real-time processing system because batch processing is slow.", "cmt_tr": "A firm will not automatically prefer an online, real-time system. When transactions, e.g., payroll, can be conveniently grouped, processing is extremely fast and efficient in a batch mode.", "cmt_en": "A firm will not automatically prefer an online, real-time system. When transactions, e.g., payroll, can be conveniently grouped, processing is extremely fast and efficient in a batch mode."}], "answer": 2}, {"q_tr": "What type of computerized data processing system would be most appropriate for a company that is opening a new retail location?", "q_en": "What type of computerized data processing system would be most appropriate for a company that is opening a new retail location?", "options": [{"tr": "Batch processing.", "en": "Batch processing.", "cmt_tr": "Batch processing accumulates data and processes it in batches. Thus, data are not as timely as in real-time processing.", "cmt_en": "Batch processing accumulates data and processes it in batches. Thus, data are not as timely as in real-time processing."}, {"tr": "Real-time processing.", "en": "Real-time processing.", "cmt_tr": "Real-time processing is most useful in systems that require having the latest information available at all times. In a retail environment, such a system would potentially allow the company to track inventory, cash, labor, etc., as they change.", "cmt_en": "Real-time processing is most useful in systems that require having the latest information available at all times. In a retail environment, such a system would potentially allow the company to track inventory, cash, labor, etc., as they change."}, {"tr": "Sequential-file processing.", "en": "Sequential-file processing.", "cmt_tr": "Sequential-file processing is a file storage process, linear in nature, that makes accessing particular data points cumbersome.", "cmt_en": "Sequential-file processing is a file storage process, linear in nature, that makes accessing particular data points cumbersome."}, {"tr": "Direct-access processing.", "en": "Direct-access processing.", "cmt_tr": "Direct-access processing is not a self-updating system, but a system to file data.", "cmt_en": "Direct-access processing is not a self-updating system, but a system to file data."}], "answer": 1}, {"q_tr": "Batch and online processing modes", "q_en": "Batch and online processing modes", "options": [{"tr": "Are mutually exclusive.", "en": "Are mutually exclusive.", "cmt_tr": "Batch and online modes can be combined in a single application.", "cmt_en": "Batch and online modes can be combined in a single application."}, {"tr": "Can be used in combination in a single application.", "en": "Can be used in combination in a single application.", "cmt_tr": "Batch and online modes can be combined in a single application.", "cmt_en": "Batch and online modes can be combined in a single application."}, {"tr": "Are outmoded means of processing data.", "en": "Are outmoded means of processing data.", "cmt_tr": "Both batch and online modes are currently in use.", "cmt_en": "Both batch and online modes are currently in use."}, {"tr": "Are forms of real-time processing.", "en": "Are forms of real-time processing.", "cmt_tr": "Real-time processing describes a system that is updated from moment to moment, such as an", "cmt_en": "Real-time processing describes a system that is updated from moment to moment, such as an"}], "answer": 1}, {"q_tr": "Which of the following transaction processing modes provides the most accurate and complete information for decision making?", "q_en": "Which of the following transaction processing modes provides the most accurate and complete information for decision making?", "options": [{"tr": "Batch.", "en": "Batch.", "cmt_tr": "In batch processing, transactions are accumulated and submitted to the computer as a single batch. This accumulation of transactions for processing on a delayed basis is still widely used.", "cmt_en": "In batch processing, transactions are accumulated and submitted to the computer as a single batch. This accumulation of transactions for processing on a delayed basis is still widely used."}, {"tr": "Distributed.", "en": "Distributed.", "cmt_tr": "Distributed is not a transaction processing mode.", "cmt_en": "Distributed is not a transaction processing mode."}, {"tr": "Online.", "en": "Online.", "cmt_tr": "In online processing, the computer processes each transaction individually as the user enters it. The user gets immediate feedback on whether the transaction was accepted or not. These systems have the latest information available at all times.", "cmt_en": "In online processing, the computer processes each transaction individually as the user enters it. The user gets immediate feedback on whether the transaction was accepted or not. These systems have the latest information available at all times."}, {"tr": "Application.", "en": "Application.", "cmt_tr": "Application is not a transaction processing mode.", "cmt_en": "Application is not a transaction processing mode."}], "answer": 2}, {"q_tr": "Mill Co. uses a batch processing method to process its sales transactions. Data on Mill’s sales transaction file are sorted by customer number and are subjected to programmed edit checks in preparing its invoices, sales journals, and updated customer account balances. One of the direct outputs of the creation of this file most likely would be a", "q_en": "Mill Co. uses a batch processing method to process its sales transactions. Data on Mill’s sales transaction file are sorted by customer number and are subjected to programmed edit checks in preparing its invoices, sales journals, and updated customer account balances. One of the direct outputs of the creation of this file most likely would be a", "options": [{"tr": "Report showing exceptions and control totals.", "en": "Report showing exceptions and control totals.", "cmt_tr": "Batch processing is useful for processing large volumes of data. Editing (validation) of data should produce a cumulative automated error listing that includes not only errors found in the current processing run but also uncorrected errors from earlier runs. The creation of the file will also generate various totals that will serve as controls over the completeness and accuracy of the processing.", "cmt_en": "Batch processing is useful for processing large volumes of data. Editing (validation) of data should produce a cumulative automated error listing that includes not only errors found in the current processing run but also uncorrected errors from earlier runs. The creation of the file will also generate various totals that will serve as controls over the completeness and accuracy of the processing."}, {"tr": "Printout of the updated inventory records.", "en": "Printout of the updated inventory records.", "cmt_tr": "An online database system is more appropriate for printing records that require up-to-date information.", "cmt_en": "An online database system is more appropriate for printing records that require up-to-date information."}, {"tr": "Report showing overdue accounts receivable.", "en": "Report showing overdue accounts receivable.", "cmt_tr": "Testing for overdue accounts receivable should be done prior to approving current sales orders.", "cmt_en": "Testing for overdue accounts receivable should be done prior to approving current sales orders."}, {"tr": "Printout of the sales price master file.", "en": "Printout of the sales price master file.", "cmt_tr": "A complete listing of sales prices would not be found in a sales transactions file.", "cmt_en": "A complete listing of sales prices would not be found in a sales transactions file."}], "answer": 0}, {"q_tr": "If a control total were to be computed on each of the following data items, which would best be identified as a hash total for a payroll computer application?", "q_en": "If a control total were to be computed on each of the following data items, which would best be identified as a hash total for a payroll computer application?", "options": [{"tr": "Hours worked.", "en": "Hours worked.", "cmt_tr": "Hours worked is an example of a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records.", "cmt_en": "Hours worked is an example of a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records."}, {"tr": "Total debits and total credits.", "en": "Total debits and total credits.", "cmt_tr": "Total debits and total credits is a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records.", "cmt_en": "Total debits and total credits is a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records."}, {"tr": "Net pay.", "en": "Net pay.", "cmt_tr": "Net pay is a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records.", "cmt_en": "Net pay is a financial total. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records."}, {"tr": "Department numbers.", "en": "Department numbers.", "cmt_tr": "The three types of control totals are record counts, financial totals, and hash totals. Record counts establish the number of source documents and reconcile it to the number of output records. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records. Hash totals add numbers on input documents that are not normally added (e.g., department numbers), resulting in a total that is “meaningless” for any purpose other than this control.", "cmt_en": "The three types of control totals are record counts, financial totals, and hash totals. Record counts establish the number of source documents and reconcile it to the number of output records. Financial totals compute dollar totals from source documents (e.g., the total dollar amount of invoices processed) and reconcile them with the output records. Hash totals add numbers on input documents that are not normally added (e.g., department numbers), resulting in a total that is “meaningless” for any purpose other than this control."}], "answer": 3}, {"q_tr": "The purpose of check digit verification of an account number on an update transaction is to", "q_en": "The purpose of check digit verification of an account number on an update transaction is to", "options": [{"tr": "Verify that the account number corresponds to an existing account in the master file.", "en": "Verify that the account number corresponds to an existing account in the master file.", "cmt_tr": "Verifying that the account number corresponds to an existing account in the master file is a master file reference check.", "cmt_en": "Verifying that the account number corresponds to an existing account in the master file is a master file reference check."}, {"tr": "Detect a transposition of an account number entered into the system.", "en": "Detect a transposition of an account number entered into the system.", "cmt_tr": "A major control used to guard against errors made in transcribing or keying data is a check digit.", "cmt_en": "A major control used to guard against errors made in transcribing or keying data is a check digit."}, {"tr": "Ensure that supporting documentation exists for the update transaction.", "en": "Ensure that supporting documentation exists for the update transaction.", "cmt_tr": "Ensuring that supporting documentation exists for update transactions is a document reconciliation control.", "cmt_en": "Ensuring that supporting documentation exists for update transactions is a document reconciliation control."}, {"tr": "Require the account number to have the correct logical relationship with other fields.", "en": "Require the account number to have the correct logical relationship with other fields.", "cmt_tr": "Requiring a field to have the correct logical relationship with other fields is a dependency check.", "cmt_en": "Requiring a field to have the correct logical relationship with other fields is a dependency check."}], "answer": 1}, {"q_tr": "The two broad groupings of information systems control activities are general controls and application controls. General controls include controls", "q_en": "The two broad groupings of information systems control activities are general controls and application controls. General controls include controls", "options": [{"tr": "Relating to the correction and resubmission of faulty data.", "en": "Relating to the correction and resubmission of faulty data.", "cmt_tr": "Control over report distribution (output), correction of input errors, and authorization of input are application controls.", "cmt_en": "Control over report distribution (output), correction of input errors, and authorization of input are application controls."}, {"tr": "For developing, modifying, and maintaining computer programs.", "en": "For developing, modifying, and maintaining computer programs.", "cmt_tr": "General controls are policies and procedures that relate to many information systems applications and support the effective functioning of application controls by helping to ensure the continued proper operation of information systems. General controls include controls over (1) data center and network operations; (2) systems software acquisition and maintenance; (3) access security; and (4) application systems acquisition, development, and maintenance.", "cmt_en": "General controls are policies and procedures that relate to many information systems applications and support the effective functioning of application controls by helping to ensure the continued proper operation of information systems. General controls include controls over (1) data center and network operations; (2) systems software acquisition and maintenance; (3) access security; and (4) application systems acquisition, development, and maintenance."}, {"tr": "Designed to ensure that only authorized users receive output from processing.", "en": "Designed to ensure that only authorized users receive output from processing.", "cmt_tr": "Control over report distribution (output), correction of input errors, and authorization of input are application controls.", "cmt_en": "Control over report distribution (output), correction of input errors, and authorization of input are application controls."}, {"tr": "Designed to ensure that all data submitted for processing have been properly authorized.", "en": "Designed to ensure that all data submitted for processing have been properly authorized.", "cmt_tr": "Control over report distribution (output), correction of input errors, and authorization of input are application controls.", "cmt_en": "Control over report distribution (output), correction of input errors, and authorization of input are application controls."}], "answer": 1}, {"q_tr": "A small activity under review recently put its cash disbursements system on a server. About which of the following internal control features would an auditor most likely be concerned?", "q_en": "A small activity under review recently put its cash disbursements system on a server. About which of the following internal control features would an auditor most likely be concerned?", "options": [{"tr": "Programming of the applications are in Visual Basic rather than Java.", "en": "Programming of the applications are in Visual Basic rather than Java.", "cmt_tr": "The choice of language would have little effect on internal control.", "cmt_en": "The choice of language would have little effect on internal control."}, {"tr": "The server is operated by employees who have cash custody responsibilities.", "en": "The server is operated by employees who have cash custody responsibilities.", "cmt_tr": "Segregation of duties is a basic category of control activities. Functions are incompatible if a person is in a position both to perpetrate and conceal fraud or errors. Hence, the duties of authorizing transactions, recording transactions, and custody of assets should be assigned to different people. Those employees that operate the server may be able to override the controls to change records to conceal a theft of cash.", "cmt_en": "Segregation of duties is a basic category of control activities. Functions are incompatible if a person is in a position both to perpetrate and conceal fraud or errors. Hence, the duties of authorizing transactions, recording transactions, and custody of assets should be assigned to different people. Those employees that operate the server may be able to override the controls to change records to conceal a theft of cash."}, {"tr": "Only one employee has the password to gain access to the cash disbursement system.", "en": "Only one employee has the password to gain access to the cash disbursement system.", "cmt_tr": "The limitation on access would be considered a strength.", "cmt_en": "The limitation on access would be considered a strength."}, {"tr": "There are restrictions on the amount of data that can be stored and on the length of time that data can be stored.", "en": "There are restrictions on the amount of data that can be stored and on the length of time that data can be stored.", "cmt_tr": "Restrictions on the amount of data that can be stored and on the length of time that data can be stored do not constitute a control weakness.", "cmt_en": "Restrictions on the amount of data that can be stored and on the length of time that data can be stored do not constitute a control weakness."}], "answer": 1}, {"q_tr": "The purpose of input controls is to ensure the", "q_en": "The purpose of input controls is to ensure the", "options": [{"tr": "Authorization of access to data files.", "en": "Authorization of access to data files.", "cmt_tr": "Access controls authorize access to data files.", "cmt_en": "Access controls authorize access to data files."}, {"tr": "Authorization of access to program files.", "en": "Authorization of access to program files.", "cmt_tr": "Access controls authorize access to program files.", "cmt_en": "Access controls authorize access to program files."}, {"tr": "Completeness, accuracy, and validity of updating.", "en": "Completeness, accuracy, and validity of updating.", "cmt_tr": "Processing controls ensure the completeness, accuracy, and validity of updating.", "cmt_en": "Processing controls ensure the completeness, accuracy, and validity of updating."}, {"tr": "Completeness, accuracy, and validity of input.", "en": "Completeness, accuracy, and validity of input.", "cmt_tr": "Input controls provide reasonable assurance that data received for computer processing have been properly authorized and are in a form suitable for processing, i.e., complete, accurate, and valid. Input controls also relate to rejection, correction, and resubmission of data that were initially incorrect.", "cmt_en": "Input controls provide reasonable assurance that data received for computer processing have been properly authorized and are in a form suitable for processing, i.e., complete, accurate, and valid. Input controls also relate to rejection, correction, and resubmission of data that were initially incorrect."}], "answer": 3}, {"q_tr": "A mail-order retailer of low-cost novelty items is receiving incorrect codes. The digit is generated by applying an algorithm to the code. During the input process, the check digit is recomputed by applying the same algorithm to the code actually entered."}, {"tr": "Separate the parts of the order code with hyphens to make the characters easier to read.", "en": "Separate the parts of the order code with hyphens to make the characters easier to read.", "cmt_tr": "Separating the parts of the order code with hyphens would make the characters easier to read but would not cure the problem of transposed characters.", "cmt_en": "Separating the parts of the order code with hyphens would make the characters easier to read but would not cure the problem of transposed characters."}, {"tr": "Use a master file reference for all order codes to verify the existence of items.", "en": "Use a master file reference for all order codes to verify the existence of items.", "cmt_tr": "Using a master file reference for all order codes would verify the existence of items but would not detect erroneous order codes in which transposed characters in an order code match other items.", "cmt_en": "Using a master file reference for all order codes would verify the existence of items but would not detect erroneous order codes in which transposed characters in an order code match other items."}], "answer": 1}, {"q_tr": "Which of the following computerized control procedures would be most effective in ensuring that data uploaded from desktop computers to a server are complete and that no additional data are added?", "q_en": "Which of the following computerized control procedures would be most effective in ensuring that data uploaded from desktop computers to a server are complete and that no additional data are added?", "options": [{"tr": "Self-checking digits to ensure that only authorized part numbers are added to the database.", "en": "Self-checking digits to ensure that only authorized part numbers are added to the database.", "cmt_tr": "Self-checking digits detect inaccurate identification numbers. They are an effective control to ensure that the appropriate part has been identified. However, the control objective is to ensure that data transfer is complete.", "cmt_en": "Self-checking digits detect inaccurate identification numbers. They are an effective control to ensure that the appropriate part has been identified. However, the control objective is to ensure that data transfer is complete."}, {"tr": "Batch control totals, including control totals and hash totals.", "en": "Batch control totals, including control totals and hash totals.", "cmt_tr": "Batch control totals for the data transferred can be reconciled with the batch control totals in the existing file. This comparison provides information on the completion of the data transfer. Batch totals may include record counts, totals of certain critical amounts, or hash totals. A hash total is a control total without a defined meaning, such as the total of employee numbers or invoice numbers, that is used to verify the completeness of data. Thus, the hash total for the employee listing by the personnel department could be compared with the total generated during the payroll run.", "cmt_en": "Batch control totals for the data transferred can be reconciled with the batch control totals in the existing file. This comparison provides information on the completion of the data transfer. Batch totals may include record counts, totals of certain critical amounts, or hash totals. A hash total is a control total without a defined meaning, such as the total of employee numbers or invoice numbers, that is used to verify the completeness of data. Thus, the hash total for the employee listing by the personnel department could be compared with the total generated during the payroll run."}, {"tr": "Passwords that effectively limit access to only those authorized to upload the data to the mainframe computer.", "en": "Passwords that effectively limit access to only those authorized to upload the data to the mainframe computer.", "cmt_tr": "Passwords help ensure that only authorized personnel make the transfer, not that data transfer is complete.", "cmt_en": "Passwords help ensure that only authorized personnel make the transfer, not that data transfer is complete."}, {"tr": "Field-level edit controls that test each field for alphanumerical integrity.", "en": "Field-level edit controls that test each field for alphanumerical integrity.", "cmt_tr": "Field checks are effective input controls, but they do not ensure completeness of data transfer.", "cmt_en": "Field checks are effective input controls, but they do not ensure completeness of data transfer."}], "answer": 1}, {"q_tr": "Omen Company is a manufacturer of men’s shirts. It distributes weekly sales reports to each sales manager. The quantity 2R5 appeared in the quantity sold column for one of the items on the weekly sales report for one of the sales managers. The most likely explanation for what has occurred is that the", "q_en": "Omen Company is a manufacturer of men’s shirts. It distributes weekly sales reports to each sales manager. The quantity 2R5 appeared in the quantity sold column for one of the items on the weekly sales report for one of the sales managers. The most likely explanation for what has occurred is that the", "options": [{"tr": "Output quantity has been stated in hexadecimal numbers.", "en": "Output quantity has been stated in hexadecimal numbers.", "cmt_tr": "R is not a hexadecimal character. Hexadecimal characters are 0-9 and A-F representing 0 to 15 in decimal.", "cmt_en": "R is not a hexadecimal character. Hexadecimal characters are 0-9 and A-F representing 0 to 15 in decimal."}, {"tr": "Computer has malfunctioned during execution.", "en": "Computer has malfunctioned during execution.", "cmt_tr": "The probability of a computer malfunction resulting in the printing of an R is slight.", "cmt_en": "The probability of a computer malfunction resulting in the printing of  that should have been processed were processed. An example is the sum of all employee identification numbers. The hash total for the employee listing by the personnel department could be compared with the hash total generated during the payroll run to ensure the completeness and accuracy of transaction data input."}, {"tr": "Financial total.", "en": "Financial total.", "cmt_tr": "Financial totals summarize dollar amounts in an information field in a group of records.", "cmt_en": "Financial totals summarize dollar amounts in an information field in a group of records."}], "answer": 2}, {"q_tr": "Which of the following is a typical output control?", "q_en": "Which of the following is a typical output control?", "options": [{"tr": "Reviewing the computer processing logs to determine that all of the correct computer jobs executed properly.", "en": "Reviewing the computer processing logs to determine that all of the correct computer jobs executed properly.", "cmt_tr": "Reviewing the computer processing logs is an output control.", "cmt_en": "Reviewing the computer processing logs is an output control."}, {"tr": "Matching input data with information on master files and placing unmatched items in a suspense file.", "en": "Matching input data with information on master files and placing unmatched items in a suspense file.", "cmt_tr": "Matching input data with information on master files and moving unmatched items to a suspense file is a processing control, not an output control.", "cmt_en": "Matching input data with information on master files and moving unmatched items to a suspense file is a processing control, not an output control."}, {"tr": "Establishing logical access controls over infrastructure, applications, and data.", "en": "Establishing logical access controls over infrastructure, applications, and data.", "cmt_tr": "Establishing logical access controls over infrastructure, applications, and data is an IT general control.", "cmt_en": "Establishing logical acces  is an output control."}, {"tr": "Exception reporting.", "en": "Exception reporting.", "cmt_tr": "Exception reporting is an output control.", "cmt_en": "Exception reporting is an output control."}, {"tr": "Format checks.", "en": "Format checks.", "cmt_tr": "Format checks verify that data are entered in an acceptable layout. They cannot detect whether a vendor number is valid.", "cmt_en": "Format checks verify that data are entered in an acceptable layout. They cannot detect whether a vendor number is valid."}, {"tr": "Add a drop-down menu.", "en": "Add a drop-down menu.", "cmt_tr": "An input control should prevent entry of invalid vendor numbers. If vendors are selected only from an approved list on a drop-down menu, this validity check should be effective.", "cmt_en": "An input control should prevent entry of invalid vendor numbers. If vendors are selected only from an approved list on a drop-down menu, this validity check should be effective."}], "answer": 3}, {"q_tr": "A large data processing center has processing bottlenecks at peak batch processing hours. The center is sometimes unable to complete all batch processing by the start of the next business day, creating difficulties in starting online systems. When investigating this problem, the internal auditor initially should focus on controls over", "q_en": "A large data processing center has processing bottlenecks at peak batch processing hours. The center is sometimes unable to complete all batch processing by the start of the next business day, creating difficulties in starting online systems. When investigating this problem, the internal auditor initially should focus on controls over", "options": [{"tr": "Console logs.", "en": "Console logs.", "cmt_tr": "Console logs record only problems.", "cmt_en": "Console logs record only problems."}, {"tr": "Backup and restart procedures.", "en": "Backup and restart procedures.", "cmt_tr": "Backup and restart procedures are applied only after a problem has occurred. They do not suggest a cause.", "cmt_en": "Backup and restart procedures are applied only after a problem has occurred. They do not suggest a cause."}, {"tr": "Job scheduling.", "en": "Job scheduling.", "cmt_tr": "Controls over job scheduling for processing are essential to optimize use of computer resources and should give the best initial indication of the nature of the problem. Backup and restart procedures apply after abnormal interruptions of processing. Console logs provide only indications of problems. They might be used later in the process. Program documentation is not the place to start. It might help determine why a given program was causing a problem.", "cmt_en": "Controls over job scheduling for processing are essential to optimize use of computer resources and should give the best initial indication of the nature of the problem. Backup and restart procedures apply after abnormal interruptions of processing. Console logs provide only indications of problems. They might be used later in the process. Program documentation is not the place to start. It might help determine why a given program was causing a problem."}, {"tr": "Program documentation.", "en": "Program documentation.", "cmt_tr": "Program documentation is not itself immediate evidence of why processing bottlenecks occurred.", "cmt_en": "Program documentation is not itself immediate evidence of why processing bottlenecks occurred."}], "answer": 2}, {"q_tr": "An organization uses a database management system (DBMS) as a repository of data. The DBMS in turn supports a number of end-user-developed applications. Some of the applications update the database. In evaluating the control procedures over access and use of the database, the auditor will be most concerned that", "q_en": "An organization uses a database management system (DBMS) as a repository of data. The DBMS in turn supports a number of end-user-developed applications. Some of the applications update the database. In evaluating the control a models are popular but are not needed to support multiple users or end-user computing."}], "answer": 1}, {"q_tr": "When reviewing the system design of data input controls, which of the following should be given the least consideration?", "q_en": "When reviewing the system design of data input controls, which of the following should be given the least consideration?", "options": [{"tr": "Authorization.", "en": "Authorization.", "cmt_tr": "Authorization is a primary consideration when reviewing application controls.", "cmt_en": "Authorization is a primary consideration when reviewing application controls."}, {"tr": "Configuration.", "en": "Configuration.", "cmt_tr": "Data input controls are application controls. The objective of application controls is to ensure the completeness, accuracy, authorization, and validity of input data, processed data, stored data, and output data. Configuration is a consideration when reviewing IT general controls, not application controls. It is a logical access control that ensures only authorized persons and applications have access to data and applications.", "cmt_en": "Data input controls are application controls. The objective of application controls is to ensure the completeness, accuracy, authorization, and validity of input data, processed data, stored data, and output data. Configuration is a consideration when reviewing IT general controls, not application controls. It is a logical access control that ensures only authorized persons and applications have access to data and applications."}, {"tr": "Validation.", "en": "Validation.", "cmt_tr": "Validation is a primary consideration when reviewing application controls.", "cmt_en": "Validation is a primary consideration when reviewing application controls."}, {"tr": "Error notification.", "en": "Error notification.", "cmt_tr": "Error notification is a primary consideration when reviewing application controls.", "cmt_en": "Error notification is a primary consideration when reviewi
