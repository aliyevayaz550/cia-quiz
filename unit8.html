stomer’s name when inputting the order. This is an example of", "options": [{"tr": "Concurrency control.", "en": "Concurrency control.", "cmt_tr": "Concurrency controls manage situations where two or more users attempt to access or update a file or database simultaneously. Concurrency controls are a processing control.", "cmt_en": "Concurrency controls manage situations where two or more users attempt to access or update a file or database simultaneously. Concurrency controls are a processing control."}, {"tr": "Validity checks.", "en": "Validity checks.", "cmt_tr": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, the list of approved customers for credit purchases would be the table of valid", "cmt_en": "Validity checks compare the data entered in a given field with a table of valid values for that field. For example, the list of approved customers for credit purchases would be the table of valid"}, {"tr": "Range checks.", "en": "Range checks.", "cmt_tr": "Range checks are based on known limits for given information. For example, hours worked per day must be between 1-18, with anything above that range requiring management authorization. Range or limit checks are an online input control.", "cmt_en": "Range checks are based on known limits for given information. For example, hours worked per day must be between 1-18, with anything above that range requiring management authorization. Range or limit checks are an online input control."}, {"tr": "Sequence checks.", "en": "Sequence checks.", "cmt_tr": "Sequence checks are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field, called the “key.” If the system discovers a record out of order, it may indicate that the files were not properly prepared for processing. Sequence checks are an online input control.", "cmt_en": "Sequence checks are based on the logic that processing efficiency is greatly increased when files are sorted on some designated field, called the “key.” If the system discovers a record out of order, it may indicate that the files were not properly prepared for processing. Sequence checks are an online input control."}], "answer": 1}, {"q_tr": "The accounting manager was reviewing batches of journal entries for the day. One of the journal entries for a loan payment was rejected by the system. The entry was as follows: Account Name Debit Credit Loan payable $22,000 Interest expense 2,250 Checking $25,000 Which online input control rejected this transaction?", "q_en": "The accounting manager was reviewing batches of journal entries for the day. One of the journal entries for a loan payment was rejected by the system. The entry was as follows: Account Name Debit Credit Loan payable $22,000 Interest expense 2,250 Checking $25,000 Which online input control rejected this transaction?", "options": [{"tr": "Zero balance checks.", "en": "Zero balance checks.", "cmt_tr": "Zero balance checks reject any transaction or batch thereof in which the sum of all debits and credits does not equal zero. In the example provided, the debits equal $24,250 and the credits equal ($25,000). Because the sum of the debits and credits does not equal zero ($750), the journal entry was rejected by the system. Zero balance checks are an online input control.", "cmt_en": "Zero balance checks reject any transaction or batch thereof in which the sum of all debits and credits does not equal zero. In the example provided, the debits equal $24,250 and the credits equal ($25,000). Because the sum of the debits and credits does not equal zero ($750), the journal entry was rejected by the system. Zero balance checks are an online input control."}, {"tr": "Arithmetic controls.", "en": "Arithmetic controls.", "cmt_tr": "Arithmetic controls are processing controls. Cross-footing compares an amount with the sum of its components.", "cmt_en": "Arithmetic controls are processing controls. Cross-footing compares an amount with the sum of its components."}, {"tr": "Check digits.", "en": "Check digits.", "cmt_tr": "Check digits are an online input control that includes an extra reference number following an identification code. The extra digit is input with the data and bears a mathematical relationship to the other digits. The identification code can be subjected to an algorithm and compared to the check digit(s).", "cmt_en": "Check digits are an online input control that includes an extra reference number following an identification code. The extra digit is input with the data and bears a mathematical relationship to the other digits. The identification code can be subjected to an algorithm and compared to the check digit(s)."}, {"tr": "Key integrity.", "en": "Key integrity.", "cmt_tr": "Key integrity is a processing control. A record’s key is the group of values in designated fields that uniquely identify the record. No application process should be able to alter the data in these key fields.", "cmt_en": "Key integrity is a processing control. A record’s key is the group of values in designated fields that uniquely identify the record. No application process should be able to alter the data in these key fields."}], "answer": 0}, {"q_tr": "One of the steps in assessing control risk in a computerized information control system is identifying necessary controls to prevent data from being lost, added, duplicated, or altered during processing. An example of this type of control is the", "q_en": "One of the steps in assessing control risk in a computerized information control system is identifying necessary controls to prevent data from being lost, added, duplicated, or altered during processing. An example of this type of control is the", "options": [{"tr": "Authorization and approval of data in user departments and screening of data by data control groups.", "en": "Authorization and approval of data in user departments and screening of data by data control groups.", "cmt_tr": "Authorization and approval by users and review by control groups are controls that do not function during processing.", "cmt_en": "Authorization and approval by users and review by control groups are controls that do not function during processing."}, {"tr": "Review of data output by data control groups.", "en": "Review of data output by data control groups.", "cmt_tr": "Review by control groups is a control that does not function during processing.", "cmt_en": "Review by control groups is a control that does not function during processing."}, {"tr": "Use of external and internal file labels.", "en": "Use of external and internal file labels.", "cmt_tr": "Use of internal and external labels is an organizational, not a processing, control. External labels allow the computer operator to determine whether the correct file has been selected for an application. External labels are gummed-paper labels attached to a tape reel or other storage medium that identify the file. Internal labels perform the same function through the use of machine-readable identification in the first record in a file.", "cmt_en": "Use of internal and external labels is an organizational, not a processing, control. External labels allow the computer operator to determine whether the correct file has been selected for an application. External labels are gummed-paper labels attached to a tape reel or other storage medium that identify the file. Internal labels perform the same function through the use of machine-readable identification in the first record in a file."}, {"tr": "Use of control totals, limit and reasonableness checks, and sequence tests.", "en": "Use of control totals, limit and reasonableness checks, and sequence tests.", "cmt_tr": "A control total is an application control that may consist of a count of the number of records processed at different stages of the operation. Comparison of the counts indicates whether all records have been processed or some have been added. A control total might also consist of a total of one information field for all records processed, such as the total sales dollars for a batch of sales invoices. A limit or reasonableness check tests whether the value of a field falls outside a prescribed range. The range may be stated in terms of an upper limit, lower limit, or both. The loss, addition, etc., of data may result in an unreasonable value. A sequence test verifies the ordering of records and may therefore detect various anomalies.", "cmt_en": "A control total is an application control that may consist of a count of the number of records processed at different stages of the operation. Comparison of the counts indicates whether all records have been processed or some have been added. A control total might also consist of a total of one information field for all records processed, such as the total sales dollars for a batch of sales invoices. A limit or reasonableness check tests whether the value of a field falls outside a prescribed range. The range may be stated in terms of an upper limit, lower limit, or both. The loss, addition, etc., of data may result in an unreasonable value. A sequence test verifies the ordering of records and may therefore detect various anomalies."}], "answer": 3}, {"q_tr": "Data processed by a computer system are usually transferred to some form of output medium for storage. However, the presence of computerized output does not, in and of itself, ensure the output’s accuracy, completeness, or authenticity. For this assurance, various controls are needed. The major types of controls for this area include", "q_en": "Data processed by a computer system are usually transferred to some form of output medium for storage. However, the presence of computerized output does not, in and of itself, ensure the output’s accuracy, completeness, or authenticity. For this assurance, various controls are needed. The major types of controls for this area include", "options": [{"tr": "Physical controls, documentation controls, and print-out controls.", "en": "Physical controls, documentation controls, and print-out controls.", "cmt_tr": "Physical documentation and print-out controls do not ensure accuracy of inputs.", "cmt_en": "Physical documentation and print-out controls do not ensure accuracy of inputs."}, {"tr": "Activity listings, echo checks, and pre-numbered forms.", "en": "Activity listings, echo checks, and pre-numbered forms.", "cmt_tr": "An echo check, which is an input control over transmission along communications lines, does", "cmt_en": "An echo check, which is an input control over transmission along communications lines, does"}, {"tr": "Disk output controls and printed output controls.", "en": "Disk output controls and printed output controls.", "cmt_tr": "Output controls are insufficient to ensure completeness and accuracy of output. Input controls are also needed.", "cmt_en": "Output controls are insufficient to ensure completeness and accuracy of output. Input controls are also needed."}, {"tr": "Input controls and output controls.", "en": "Input controls and output controls.", "cmt_tr": "Input controls provide reasonable assurance that data received for processing have been properly authorized, converted into machine-sensible form, and identified, and that data have not been lost, suppressed, added, duplicated, or otherwise improperly changed. Input controls also relate to rejections, correction, and resubmission of data that were initially incorrect. Output controls provide assurance that the processing result is accurate and that only authorized personnel receive the output.", "cmt_en": "Input controls provide reasonable assurance that data received for processing have been properly authorized, converted into machine-sensible form, and identified, and that data have not been lost, suppressed, added, duplicated, or otherwise improperly changed. Input controls also relate to rejections, correction, and resubmission of data that were initially incorrect. Output controls provide assurance that the processing result is accurate and that only authorized personnel receive the output."}], "answer": 3}, {"q_tr": "Data input validation routines for batch processing include", "q_en": "Data input validation routines for batch processing include", "options": [{"tr": "Terminal logs.", "en": "Terminal logs.", "cmt_tr": "Terminal logs are access controls.", "cmt_en": "Terminal logs are access controls."}, {"tr": "Passwords.", "en": "Passwords.", "cmt_tr": "Passwords are access controls.", "cmt_en": "Passwords are access controls."}, {"tr": "Hash totals.", "en": "Hash totals.", "cmt_tr": "Input controls provide assurance that data submitted for processing are authorized, complete, and accurate. A hash total is an example of a data input validation routine for batch processing. A hash total is a control total without a defined meaning, such as the total of employee numbers or invoice numbers, that is used to verify the completeness of data. Thus, the hash total for the employee listing by the personnel department could be compared with the total generated during the processing run.", "cmt_en": "Input controls provide assurance that data submitted for processing are authorized, complete, and accurate. A hash total is an example of a data input validation routine for batch processing. A hash total is a control total without a defined meaning, such as the total of employee numbers or invoice numbers, that is used to verify the completeness of data. Thus, the hash total for the employee listing by the personnel department could be compared with the total generated during the processing run."}, {"tr": "Backup controls.", "en": "Backup controls.", "cmt_tr": "Backup controls are general controls.", "cmt_en": "Backup controls are general controls."}], "answer": 2}, {"q_tr": "An accounting system identification code that uses a sum-of-digits check digit will detect which of the following errors?", "q_en": "An accounting system identification code that uses a sum-of-digits check digit will detect which of the following errors?", "options": [{"tr": "Completeness errors.", "en": "Completeness errors.", "cmt_tr": "Completeness errors will be detected. The sum will be different if such errors occur.", "cmt_en": "Completeness errors will be detected. The sum will be different if such errors occur."}, {"tr": "Left-padding with zeros errors.", "en": "Left-padding with zeros errors.", "cmt_tr": "Left-padding numbers with zeros will not be detected. The sum would be the same, and this could cause data inconsistency errors.", "cmt_en": "Left-padding numbers with zeros will not be detected. The sum would be the same, and this could cause data inconsistency errors."}, {"tr": "Transposition errors.", "en": "Transposition errors.", "cmt_tr": "Self-checking digits may be used to detect incorrect identification numbers. The digit is generated by applying an algorithm to the ID number. During the input process, the check digit is recomputed by applying the same algorithm to the code actually entered. If the check digit is merely a sum, transposition errors will not be detected because the sum will be unaffected.", "cmt_en": "Self-checking digits may be used to detect incorrect identification numbers. The digit is generated by applying an algorithm to the ID number. During the input process, the check digit is recomputed by applying the same algorithm to the code actually entered. If the check digit is merely a sum, transposition errors will not be detected because the sum will be unaffected."}, {"tr": "Multiple offsetting errors.", "en": "Multiple offsetting errors.", "cmt_tr": "Multiple offsetting errors will not necessarily be detected. The sum will likely be the same if such errors occur.", "cmt_en": "Multiple offsetting errors will not necessarily be detected. The sum will likely be the same if such errors occur."}], "answer": 0}, {"q_tr": "In entering the billing address for a new client in a company’s computerized database, a clerk erroneously entered a nonexistent zip code. As a result, the first month’s bill mailed to the new client was returned to the company. Which one of the following would most likely have led to discovery of the error at the time of entry into the company’s computerized database?", "q_en": "In entering the billing address for a new client in a company’s computerized database, a clerk erroneously entered a nonexistent zip code. As a result, the first month’s bill mailed to the new client was returned to the company. Which one of the following would most likely have led to discovery of the error at the time of entry into the company’s computerized database?", "options": [{"tr": "Limit test.", "en": "Limit test.", "cmt_tr": "A limit test deals with quantified data, such as preventing hours worked in a single week from exceeding 100 without special authorization.", "cmt_en": "A limit test deals with quantified data, such as preventing hours worked in a single week from exceeding 100 without special authorization."}, {"tr": "Validity test.", "en": "Validity test.", "cmt_tr": "In validity tests, values entered into the system are compared against master files of valid data. In this case, a master file of all zip codes recognized in the U.S. is held in memory and each time a clerk enters data in the zip code field, the clerk’s entry is compared to the list of valid values. If the zip code entered does not match any entry in the master file, data entry is halted and the clerk is advised to reenter the data.", "cmt_en": "In validity tests, values entered into the system are compared against master files of valid data. In this case, a master file of all zip codes recognized in the U.S. is held in memory and each time a clerk enters data in the zip code field, the clerk’s entry is compared to the list of valid values. If the zip code entered does not match any entry in the master file, data entry is halted and the clerk is advised to reenter the data."}, {"tr": "Parity test.", "en": "Parity test.", "cmt_tr": "A parity test is a means of ensuring whether the correct number of binary bits has been transmitted.", "cmt_en": "A parity test is a means of ensuring whether the correct number of binary bits has been transmitted."}, {"tr": "Record count test.", "en": "Record count test.", "cmt_tr": "A record count test is a batch-level control for ensuring that the correct number of records has been processed in a batch.", "cmt_en": "A record count test is a batch-level control for ensuring that the correct number of records has been processed in a batch."}], "answer": 1}, {"q_tr": "A company has designed its accounting system to have an automated reconciliation between its payroll and general ledger systems. Which type of control has the company implemented?", "q_en": "A company has designed its accounting system to have an automated reconciliation between its payroll and general ledger systems. Which type of control has the company implemented?", "options": [{"tr": "Output control.", "en": "Output control.", "cmt_tr": "Output controls provide assurance that processing was complete and accurate.", "cmt_en": "Output controls provide assurance that processing was complete and accurate."}, {"tr": "Input control.", "en": "Input control.", "cmt_tr": "Input controls provide reasonable assurance that data submitted for processing are authorized, complete, and accurate.", "cmt_en": "Input controls provide reasonable assurance that data submitted for processing are authorized, complete, and accurate."}, {"tr": "Processing control.", "en": "Processing control.", "cmt_tr": "Processing controls provide reasonable assurance that all data submitted for processing are processed and only approved data are processed. These controls are built into application code by programmers during the systems development process.", "cmt_en": "Processing controls provide reasonable assurance that all data submitted for processing are processed and only approved data are processed. These controls are built into application code by programmers during the systems development process."}, {"tr": "Transaction control.", "en": "Transaction control.", "cmt_tr": "Transaction controls do not automatically reconcile between payroll and general ledger systems.", "cmt_en": "Transaction controls do not automatically reconcile between payroll and general ledger systems."}], "answer": 2}, {"q_tr": "A processing control helps to provide reasonable assurance that", "q_en": "A processing control helps to provide reasonable assurance that", "options": [{"tr": "Data is entered properly into a computer system.", "en": "Data is entered properly into a computer system.", "cmt_tr": "Processing controls provide reasonable assurance that (1) all data submitted for processing are processed and (2) only approved data are processed. These controls are built into the application code by programmers during the systems development process.", "cmt_en": "Processing controls provide reasonable assurance that (1) all data submitted for processing are processed and (2) only approved data are processed. These controls are built into the application code by programmers during the systems development process."}, {"tr": "Only authorized users have access to completed data projects.", "en": "Only authorized users have access to completed data projects.", "cmt_tr": "This describes a logical control, which limits system access to those persons who should have access. Logical controls have a double focus: authentication and authorization.", "cmt_en": "This describes a logical control, which limits system access to those persons who should have access. Logical controls have a double focus: authentication and authorization."}, {"tr": "Proper computer programs are used to make data calculations.", "en": "Proper computer programs are used to make data calculations.", "cmt_tr": "This describes a computer-assisted audit technique.", "cmt_en": "This describes a computer-assisted audit technique."}, {"tr": "Finished data products are available on schedule.", "en": "Finished data products are available on schedule.", "cmt_tr": "This describes an output control.", "cmt_en": "This describes an output control."}], "answer": 0}, {"q_tr": "Which one of the following is most likely considered a processing control for an entity’s accounting application system?", "q_en": "Which one of the following is most likely considered a processing control for an entity’s accounting application system?", "options": [{"tr": "Validity check.", "en": "Validity check.", "cmt_tr": "Validity checks ensure that entered data are in a valid structure. This is a storage control.", "cmt_en": "Validity checks ensure that entered data are in a valid structure. This is a storage control."}, {"tr": "Transaction log.", "en": "Transaction log.", "cmt_tr": "Processing controls provide reasonable assurance that (1) all data submitted for processing are processed and (2) only approved data are processed. These controls are built into the application code by programmers during the systems development process. A transaction log would keep track of all transactions that occurred and make sure that they were properly processed.", "cmt_en": "Processing controls provide reasonable assurance that (1) all data submitted for processing are processed and (2) only approved data are processed. These controls are built into the application code by programmers during the systems development process. A transaction log would keep track of all transactions that occurred and make sure that they were properly processed."}, {"tr": "Spooling.", "en": "Spooling.", "cmt_tr": "Spooling refers to sending data to an intermediate storage location that is accessible by the peripheral device when needed. For example, print files are spooled to an intermediary storage for the printer to access when it is ready to print. Spooling is a process for storing data but not a process control.", "cmt_en": "Spooling refers to sending data to an intermediate storage location that is accessible by the peripheral device when needed. For example, print files are spooled to an intermediary storage for the printer to access when it is ready to print. Spooling is a process for storing data but not a process control."}, {"tr": "Check digit.", "en": "Check digit.", "cmt_tr": "Check digits ensure that information is entered into the system properly. They are input controls.", "cmt_en": "Check digits ensure that information is entered into the system properly. They are input controls."}], "answer": 1}, {"q_tr": "Which of the following errors most likely would be detected by batch financial totals?", "q_en": "Which of the following errors most likely would be detected by batch financial totals?", "options": [{"tr": "A transposition error on one employee’s paycheck on a weekly payroll run.", "en": "A transposition error on one employee’s paycheck on a weekly payroll run.", "cmt_tr": "Batch financial totals compare the sum of the dollar amounts of the individual items as reported by the system, with the amount calculated by the user. Thus, batch financial totals would most likely detect a transposition error on an employee’s paycheck.", "cmt_en": "Batch financial totals compare the sum of the dollar amounts of the individual items as reported by the system, with the amount calculated by the user. Thus, batch financial totals would most likely detect a transposition error on an employee’s paycheck."}, {"tr": "A missing digit in an invoice number in a batch of daily sales.", "en": "A missing digit in an invoice number in a batch of daily sales.", "cmt_tr": "Batch financial totals give information about the total dollar amounts of the invoices within the batch but do not detect errors in the digits of the invoice numbers themselves.", "cmt_en": "Batch financial totals give information about the total dollar amounts of the invoices within the batch but do not detect errors in the digits of the invoice numbers themselves."}, {"tr": "A purchase order mistakenly entered into two different batches.", "en": "A purchase order mistakenly entered into two different batches.", "cmt_tr": "Batch financial totals are not capable of detecting errors that are made in two separate batches.", "cmt_en": "Batch financial totals are not capable of detecting errors that are made in two separate batches."}, {"tr": "Malfeasance resulting from a receivable clerk’s pocketing of a customer’s payment and altering of the related records.", "en": "Malfeasance resulting from a receivable clerk’s pocketing of a customer’s payment and altering of the related records.", "cmt_tr": "Batch financial totals alone are not capable of detecting the alteration of records or the theft of payment.", "cmt_en": "Batch financial totals alone are not capable of detecting the alteration of records or the theft of payment."}], "answer": 0}, {"q_tr": "A company’s purchasing department creates purchase orders based on electronic requests sent by operations. These requests are approved by operations, and no further approvals are required to place a purchase order. Purchasing clerks key the order information, including vendor names and prices, into the purchasing system based on the electronic requests. Which of the following is the best control to ensure that orders are entered accurately?", "q_en": "A company’s purchasing department creates purchase orders based on electronic requests sent by operations. These requests are approved by operations, and no further approvals are required to place a purchase order. Purchasing clerks key the order information, including vendor names and prices, into the purchasing system based on the electronic requests. Which of the following is the best control to ensure that orders are entered accurately?", "options": [{"tr": "Approvals from management in operations are sent to clerks along with the order requests, which are then filled.", "en": "Approvals from management in operations are sent to clerks along with the order requests, which are then filled.", "cmt_tr": "Management approval ensures that the purchase order is authorized. It does not ensure the accuracy of data entry.", "cmt_en": "Management approval ensures that the purchase order is authorized. It does not ensure the accuracy of data entry."}, {"tr": "Clerks use preformatted screens, which show the clerks the type of information expected, but do not restrict input.", "en": "Clerks use preformatted screens, which show the clerks the type of information expected, but do not restrict input.", "cmt_tr": "Preformatting only prevents the input of unacceptable data types, such as entering a letter instead of a number for a price. It does not ensure the accuracy of the data. For example, preformatting cannot detect wrongly entered numbers (e.g., entering $100 as $1,000).", "cmt_en": "Preformatting only prevents the input of unacceptable data types, such as entering a letter instead of a number for a price. It does not ensure the accuracy of the data. For example, preformatting cannot detect wrongly entered numbers (e.g., entering $100 as $1,000)."}, {"tr": "The purchasing system compares vendor information and prices entered by the clerks to master vendor and pricing data and rejects variances.", "en": "The purchasing system compares vendor information and prices entered by the clerks to master vendor and pricing data and rejects variances.", "cmt_tr": "Comparing the prices entered against the prices in the master file (validity check) ensures that incorrect prices are detected and cannot be entered into the system.", "cmt_en": "Comparing the prices entered against the prices in the master file (validity check) ensures that incorrect prices are detected and cannot be entered into the system."}, {"tr": "A hash total of the total quantity of all items entered by purchasing clerks each day is compared to the total quantity of all the items originated by operations personnel.", "en": "A hash total of the total quantity of all items entered by purchasing clerks each day is compared to the total quantity of all the items originated by operations personnel.", "cmt_tr": "Hash totals ensure the sum of all items are correct but do not ensure the accuracy of individual prices entered into the system.", "cmt_en": "Hash totals ensure the sum of all items are correct but do not ensure the accuracy of individual prices entered into the system."}], "answer": 2}, {"q_tr": "The activity under review uses an online sales order processing system to process its sales transactions. The activity under review’s sales data are electronically sorted and subjected to edit checks. A direct output of the edit checks most likely would be a", "q_en": "The activity under review uses an online sales order processing system to process its sales transactions. The activity under review’s sales data are electronically sorted and subjected to edit checks. A direct output of the edit checks most likely would be a", "options": [{"tr": "Report of all missing sales invoices.", "en": "Report of all missing sales invoices.", "cmt_tr": "A report of missing invoices is unlikely to be a direct output of the edit checks.", "cmt_en": "A report of missing invoices is unlikely to be a direct output of the edit checks."}, {"tr": "File of all rejected sales transactions.", "en": "File of all rejected sales transactions.", "cmt_tr": "Edit checks are applied to transactions to test for completeness, reasonableness, validity, and other related issues prior to acceptance. Rejected transactions should be recorded in a file for evaluation, correction, and resubmission.", "cmt_en": "Edit checks are applied to transactions to test for completeness, reasonableness, validity, and other related issues prior to acceptance. Rejected transactions should be recorded in a file for evaluation, correction, and resubmission."}, {"tr": "Printout of all user code numbers and passwords.", "en": "Printout of all user code numbers and passwords.", "cmt_tr": "A printout of all user code numbers and passwords is unlikely to be a direct output of the edit checks.", "cmt_en": "A printout of all user code numbers and passwords is unlikely to be a direct output of the edit checks."}, {"tr": "List of all voided shipping documents.", "en": "List of all voided shipping documents.", "cmt_tr": "A list of all voided shipping documents is unlikely to be a direct output of the edit checks.", "cmt_en": "A list of all voided shipping documents is unlikely to be a direct output of the edit checks."}], "answer": 1}, {"q_tr": "An accounts payable clerk is accused of making unauthorized changes to previous payments to a vendor. Proof could be uncovered in which of the following places?", "q_en": "An accounts payable clerk is accused of making unauthorized changes to previous payments to a vendor. Proof could be uncovered in which of the following places?", "options": [{"tr": "Transaction logs.", "en": "Transaction logs.", "cmt_tr": "Transaction logs report every action performed in the application. Any user’s activities can be traced to a time and date and possibly terminal number.", "cmt_en": "Transaction logs report every action performed in the application. Any user’s activities can be traced to a time and date and possibly terminal number."}, {"tr": "Error reports.", "en": "Error reports.", "cmt_tr": "Error reports only report errors that fall into predefined categories. They cannot report unauthorized file changes.", "cmt_en": "Error reports only report errors that fall into predefined categories. They cannot report unauthorized file changes."}, {"tr": "Error files.", "en": "Error files.", "cmt_tr": "Error files only contain errors that fall into predefined categories. They cannot report unauthorized file changes.", "cmt_en": "Error files only contain errors that fall into predefined categories. They cannot report unauthorized file changes."}, {"tr": "Validated data file.", "en": "Validated data file.", "cmt_tr": "A validated data file contains data considered valid within defined parameters, but that does not mean all the valid data is properly authorized.", "cmt_en": "A validated data file contains data considered valid within defined parameters, but that does not mean all the valid data is properly authorized."}], "answer": 0}, {"q_tr": "In a small non-profit organization, the auditor finds that fraud risk exists because of inadequate segregation of duties in managing donations. Which compensating control is most effective to mitigate this risk?", "q_en": "In a small non-profit organization, the auditor finds that fraud risk exists because of inadequate segregation of duties in managing donations. Which compensating control is most effective to mitigate this risk?", "options": [{"tr": "Establishing a review committee to oversee donations and disbursements.", "en": "Establishing a review committee to oversee donations and disbursements.", "cmt_tr": "A review committee provides oversight for donation management, ensuring that no individual has control over the entire process. This committee functions as an internal control mechanism to", "cmt_en": "A review committee provides oversight for donation management, ensuring that no individual has control over the entire process. This committee functions as an internal control mechanism to"}, {"tr": "Training all staff in financial integrity and transparency expectations.", "en": "Training all staff in financial integrity and transparency expectations.", "cmt_tr": "Training fosters integrity but does not replace the need for direct oversight, which is essential for fraud prevention.", "cmt_en": "Training fosters integrity but does not replace the need for direct oversight, which is essential for fraud prevention."}, {"tr": "Ensuring that one individual is specifically accountable for all donation records.", "en": "Ensuring that one individual is specifically accountable for all donation records.", "cmt_tr": "Assigning one individual increases risk by consolidating control, thereby reducing checks and balances.", "cmt_en": "Assigning one individual increases risk by consolidating control, thereby reducing checks and balances."}, {"tr": "Implementing an anonymous tip line for reporting suspected fraud.", "en": "Implementing an anonymous tip line for reporting suspected fraud.", "cmt_tr": "A tip line is a reactive measure, not a proactive internal control to prevent fraud.", "cmt_en": "A tip line is a reactive measure, not a proactive internal control to prevent fraud."}], "answer": 0}]};

function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit8";

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  const q    = qs[curQ];
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang==="tr" ? "en" : "tr";
  document.getElementById("lang-btn").textContent = lang==="tr" ? "EN" : "TR";
  if(!quizStarted) {
    document.getElementById("welcome-desc").textContent =
      lang==="tr"
        ? "2 mövzu, 137 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar"
        : "2 topics, 137 questions — TR/EN bilingual support with explanations";
    return;
  }
  updateProgress();
  // Re-render current question without resetting state
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}

// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
