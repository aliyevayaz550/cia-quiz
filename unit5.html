t_tr": "Persons transferred to, or temporarily engaged by, the internal audit function should not be assigned to audit those activities they previously performed until at least 1 year has elapsed.", "cmt_en": "Persons transferred to, or temporarily engaged by, the internal audit function should not be assigned to audit those activities they previously performed until at least 1 year has elapsed."}, {"tr": "Reliance on an outside service provider when appropriate.", "en": "Reliance on an outside service provider when appropriate.", "cmt_tr": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). Consulting an outside service provider is therefore appropriate in these circumstances.", "cmt_en": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). Consulting an outside service provider is therefore appropriate in these circumstances."}], "answer": 3}, {"q_tr": "During a review of compliance with regulatory standards, an internal auditor discovers a potential conflict of interest involving a senior executive. What should be the auditor’s immediate course of action?", "q_en": "During a review of compliance with regulatory standards, an internal auditor discovers a potential conflict of interest involving a senior executive. What should be the auditor’s immediate course of action?", "options": [{"tr": "Ignore the conflict because it involves a senior executive.", "en": "Ignore the conflict because it involves a senior executive.", "cmt_tr": "Ignoring the conflict undermines ethical standards and control integrity.", "cmt_en": "Ignoring the conflict undermines ethical standards and control integrity."}, {"tr": "Document the conflict and immediately report it to the audit committee.", "en": "Document the conflict and immediately report it to the audit committee.", "cmt_tr": "Effective handling of conflicts (problem solving) supports a robust control environment. Reporting the conflict to the audit committee ensures transparency and adherence to ethical standards, allowing for appropriate actions to be taken to maintain the integrity of the control environment. This process supports the organization’s governance and ethical compliance frameworks.", "cmt_en": "Effective handling of conflicts (problem solving) supports a robust control environment. Reporting the conflict to the audit committee ensures transparency and adherence to ethical standards, allowing for appropriate actions to be taken to maintain the integrity of the control environment. This process supports the organization’s governance and ethical compliance frameworks."}, {"tr": "Discuss the conflict privately with the executive involved to seek clarification.", "en": "Discuss the conflict privately with the executive involved to seek clarification.", "cmt_tr": "Private discussions may not resolve the issue and could compromise the auditor’s objectivity.", "cmt_en": "Private discussions may not resolve the issue and could compromise the auditor’s objectivity."}, {"tr": "Recommend the implementation of stricter policies without addressing the specific conflict.", "en": "Recommend the implementation of stricter policies without addressing the specific conflict.", "cmt_tr": "Implementing stricter policies without addressing the issue does not resolve the specific conflict and may allow unethical behavior to persist.", "cmt_en": "Implementing stricter policies without addressing the issue does not resolve the specific conflict and may allow unethical behavior to persist."}], "answer": 1}], "SU3 - Competency": [{"q_tr": "Internal auditors must possess the knowledge, skills, and other competencies essential to performing their individual responsibilities. Thus, all internal auditors should be competent with regard to", "q_en": "Internal auditors must possess the knowledge, skills, and other competencies essential to performing their individual responsibilities. Thus, all internal auditors should be competent with regard to", "options": [{"tr": "Operating within the organization’s framework for governance, risk management, and control.", "en": "Operating within the organization’s framework for governance, risk management, and control.", "cmt_tr": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1). Operating within the organization’s framework for governance, risk management, and control is a detailed competency supporting the core competency of governance, risk, and control. This detailed competency is recommended for each broad job level (staff, manager, or CAE) of the internal audit function.", "cmt_en": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1). Operating within the organization’s framework for governance, risk management, and control is a detailed competency supporting the core competency of governance, risk, and control. This detailed competency is recommended for each broad job level (staff, manager, or CAE) of the internal audit function."}, {"tr": "Evaluating investments in securities.", "en": "Evaluating investments in securities.", "cmt_tr": "The Standards do not specifically address evaluating investments in securities.", "cmt_en": "The Standards do not specifically address evaluating investments in securities."}, {"tr": "Applying management principles at the operational level.", "en": "Applying management principles at the operational level.", "cmt_tr": "The Standards do not specifically address applying management principles at the operational level.", "cmt_en": "The Standards do not specifically address applying management principles at the operational level."}, {"tr": "Performing structured systems analysis.", "en": "Performing structured systems analysis.", "cmt_tr": "The Standards do not specifically address performing structured systems analysis.", "cmt_en": "The Standards do not specifically address performing structured systems analysis."}], "answer": 0}, {"q_tr": "Internal auditors are responsible for continuing their education to maintain proficiency. Which of the following is true for practicing internal auditors regarding continuing education requirements?", "q_en": "Internal auditors are responsible for continuing their education to maintain proficiency. Which of the following is true for practicing internal auditors regarding continuing education requirements?", "options": [{"tr": "Practicing certified internal auditors must obtain 40 hours of continuing professional education every 2 years.", "en": "Practicing certified internal auditors must obtain 40 hours of continuing professional education every 2 years.", "cmt_tr": "Practicing certified internal auditors are required to obtain 40 hours of CPE annually.", "cmt_en": "Practicing certified internal auditors are required to obtain 40 hours of CPE annually."}, {"tr": "CIAs have formal requirements that must be met to continue as CIAs.", "en": "CIAs have formal requirements that must be met to continue as CIAs.", "cmt_tr": "Internal auditors must enhance their knowledge, skills, and other competencies through continuing professional development (Standard 3.2). To maintain the CIA designation, the CIA must commit to a formal program of continuing professional development and report to the Certification Department of The IIA. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "Internal auditors must enhance their knowledge, skills, and other competencies through continuing professional development (Standard 3.2). To maintain the CIA designation, the CIA must commit to a formal program of continuing professional development and report to the Certification Department of The IIA. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}, {"tr": "Attendance, as an officer or committee member, at formal IIA meetings does not meet the criteria of continuing professional development.", "en": "Attendance, as an officer or committee member, at formal IIA meetings does not meet the criteria of continuing professional development.", "cmt_tr": "Continuing education may be obtained by participation in professional organizations.", "cmt_en": "Continuing education may be obtained by participation in professional organizations."}, {"tr": "In-house programs meet continuing professional education requirements only if they are preapproved by The IIA.", "en": "In-house programs meet continuing professional education requirements only if they are preapproved by The IIA.", "cmt_tr": "Prior approval by The IIA is not necessary for CPE courses.", "cmt_en": "Prior approval by The IIA is not necessary for CPE courses."}], "answer": 1}, {"q_tr": "Which of the following most likely constitutes a violation of The IIA’s Standards of Ethics and Professionalism?", "q_en": "Which of the following most likely constitutes a violation of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Auditor A accepted an assignment to perform an engagement at the electronics manufacturing division. Auditor A recently joined the internal audit function. But Auditor A was senior auditor for the external audit of that division and has audited many electronics organizations during the past 2 years.", "en": "Auditor A accepted an assignment to perform an engagement at the electronics manufacturing division. Auditor A recently joined the internal audit function. But Auditor A was senior auditor for the external audit of that division and has audited many electronics organizations during the past 2 years.", "cmt_tr": "No professional conflict of interest exists per se, especially given that the internal auditor was previously in public accounting. However, the internal auditor should be aware of potential conflicts.", "cmt_en": "No professional conflict of interest exists per se, especially given that the internal auditor was previously in public accounting. However, the internal auditor should be aware of potential conflicts."}, {"tr": "Auditor B has been assigned to perform an engagement at the warehousing function 6 months from now. Auditor B has no expertise in that area but accepted the assignment anyway. Auditor B has signed up for continuing professional education courses in warehousing that will be completed before the assignment begins.", "en": "Auditor B has been assigned to perform an engagement at the warehousing function 6 months from now. Auditor B has no expertise in that area but accepted the assignment anyway. Auditor B has signed up for continuing professional education courses in warehousing that will be completed before the assignment begins.", "cmt_tr": "An internal auditor must possess the necessary knowledge, skills, and competencies at the time an engagement is conducted, not the time it is accepted.", "cmt_en": "An internal auditor must possess the necessary knowledge, skills, and competencies at the time an engagement is conducted, not the time it is accepted."}, {"tr": "Auditor C is content as an internal auditor and has come to look at it as a regular 9-to-5 job. Auditor C has not engaged in continuing professional education or other activities to improve effectiveness during the last 3 years. However, Auditor C feels performance of quality work is the same as before.", "en": "Auditor C is content as an internal auditor and has come to look at it as a regular 9-to-5 job. Auditor C has not engaged in continuing professional education or other activities to improve effectiveness during the last 3 years. However, Auditor C feels performance of quality work is the same as before.", "cmt_tr": "Standard 3.1 Competency states, “Internal auditors must possess or obtain the competencies to perform their responsibilities successfully.” In addition, “Internal auditors must engage only in those services for which they have or can attain the necessary competencies. Each internal auditor is responsible for continually developing and applying the competencies necessary to fulfill their professional responsibilities.”", "cmt_en": "Standard 3.1 Competency states, “Internal auditors must possess or obtain the competencies to perform their responsibilities successfully.” In addition, “Internal auditors must engage only in those services for which they have or can attain the necessary competencies. Each internal auditor is responsible for continually developing and applying the competencies necessary to fulfill their professional responsibilities.”"}, {"tr": "Auditor D discovered an internal financial fraud during the year. The books were adjusted to properly reflect the loss associated with the fraud. Auditor D discussed the fraud with the external auditor when the external auditor reviewed working papers detailing the incident.", "en": "Auditor D discovered an internal financial fraud during the year. The books were adjusted to properly reflect the loss associated with the fraud. Auditor D discussed the fraud with the external auditor when the external auditor reviewed working papers detailing the incident.", "cmt_tr": "The information was disclosed as part of the normal process of cooperation between the internal and external auditor. Because the books were adjusted, the external auditor was expected to inquire as to the nature of the adjustment. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "The information was disclosed as part of the normal process of cooperation between the internal and external auditor. Because the books were adjusted, the external auditor was expected to inquire as to the nature of the adjustment. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 2}, {"q_tr": "According to the competency principle in The IIA’s Standards of Ethics and Professionalism, internal auditors must", "q_en": "According to the competency principle in The IIA’s Standards of Ethics and Professionalism, internal auditors must", "options": [{"tr": "Perform their work with honesty and diligence.", "en": "Perform their work with honesty and diligence.", "cmt_tr": "The integrity principle states that internal auditors must perform their work with honesty and professional courage.", "cmt_en": "The integrity principle states that internal auditors must perform their work with honesty and professional courage."}, {"tr": "Demonstrate quality and productivity.", "en": "Demonstrate quality and productivity.", "cmt_tr": "This is not a requirement under the competency principle.", "cmt_en": "This is not a requirement under the competency principle."}, {"tr": "Continually improve their proficiency.", "en": "Continually improve their proficiency.", "cmt_tr": "According to the competency principle, internal auditors must apply the knowledge, skills, and experience needed in the performance of internal audit services. Internal auditors must continually improve their proficiency and the effectiveness and quality of their services.", "cmt_en": "According to the competency principle, internal auditors must apply the knowledge, skills, and experience needed in the performance of internal audit services. Internal auditors must continually improve their proficiency and the effectiveness and quality of their services."}, {"tr": "Communicate effectively.", "en": "Communicate effectively.", "cmt_tr": "This is not a requirement under the competency principle.", "cmt_en": "This is not a requirement under the competency principle."}], "answer": 2}, {"q_tr": "The chief audit executive (CAE) most likely promotes a culture of competency by", "q_en": "The chief audit executive (CAE) most likely promotes a culture of competency by", "options": [{"tr": "Establishing policies to guide internal auditors to show diligence.", "en": "Establishing policies to guide internal auditors to show diligence.", "cmt_tr": "The CAE’s responsibility for implementing integrity includes establishing policies and procedures to guide the internal audit function to show diligence and responsibility (Integrity).", "cmt_en": "The CAE’s responsibility for implementing integrity includes establishing policies and procedures to guide the internal audit function to show diligence and responsibility (Integrity)."}, {"tr": "Implementing training programs that demonstrate ethical principles in action.", "en": "Implementing training programs that demonstrate ethical principles in action.", "cmt_tr": "The CAE may emphasize integrity by providing training that demonstrates integrity and other ethics principles in action (Integrity).", "cmt_en": "The CAE may emphasize integrity by providing training that demonstrates integrity and other ethics principles in action (Integrity)."}, {"tr": "Providing evidence of an active quality assurance program.", "en": "Providing evidence of an active quality assurance program.", "cmt_tr": "The CAE may demonstrate a culture supportive of competency and the continual improvement of proficiency, effectiveness, and quality through evidence that a quality assurance and improvement program is active (Competency).", "cmt_en": "The CAE may demonstrate a culture supportive of competency and the continual improvement of proficiency, effectiveness, and quality through evidence that a quality assurance and improvement program is active (Competency)."}, {"tr": "Requiring disclosure of all material facts in internal audit reports.", "en": "Requiring disclosure of all material facts in internal audit reports.", "cmt_tr": "Internal auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review (Objectivity). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "Internal auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review (Objectivity). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 2}, {"q_tr": "Which principles of The IIA’s Standards of Ethics and Professionalism require or recommend that internal auditors perform services in accordance with the Global Internal Audit Standards (Standards).", "q_en": "Which principles of The IIA’s Standards of Ethics and Professionalism require or recommend that internal auditors perform services in accordance with the Global Internal Audit Standards (Standards).", "options": [{"tr": "Integrity and objectivity.", "en": "Integrity and objectivity.", "cmt_tr": "The guidance related to objectivity does not address adherence to the Standards.", "cmt_en": "The guidance related to objectivity does not address adherence to the Standards."}, {"tr": "Competency and confidentiality.", "en": "Competency and confidentiality.", "cmt_tr": "The guidance related to confidentiality does not address adherence to the Standards.", "cmt_en": "The guidance related to confidentiality does not address adherence to the Standards."}, {"tr": "Objectivity and confidentiality.", "en": "Objectivity and confidentiality.", "cmt_tr": "No guidance related to objectivity and confidentiality addresses adherence to the Standards.", "cmt_en": "No guidance related to objectivity and confidentiality addresses adherence to the Standards."}, {"tr": "Integrity and competency.", "en": "Integrity and competency.", "cmt_tr": "The competency principle states that internal auditors must perform services in accordance with the Standards. The integrity principle states that noncompliance with the Standards may be discreditable. Standard 1.3 prohibits acts discreditable to the profession or the organization.", "cmt_en": "The competency principle states that internal auditors must perform services in accordance with the Standards. The integrity principle states that noncompliance with the Standards may be discreditable. Standard 1.3 prohibits acts discreditable to the profession or the organization."}], "answer": 3}, {"q_tr": "Internal auditors’ conformance with the competency principle most likely is demonstrated by", "q_en": "Internal auditors’ conformance with the competency principle most likely is demonstrated by", "options": [{"tr": "Proper resourcing of engagements.", "en": "Proper resourcing of engagements.", "cmt_tr": "The CAE may demonstrate a culture supportive of competency and the continual improvement of proficiency, effectiveness, and quality through evidence that engagements have been properly resourced and supervised (Competency).", "cmt_en": "The CAE may demonstrate a culture supportive of competency and the continual improvement of proficiency, effectiveness, and quality through evidence that engagements have been properly resourced and supervised (Competency)."}, {"tr": "Documenting disclosures approved by legal counsel.", "en": "Documenting disclosures approved by legal counsel.", "cmt_tr": "The CAE demonstrates conformance with the confidentiality principle by documenting and retaining records of disclosures approved by legal counsel, if applicable, and by senior management and the board (Confidentiality).", "cmt_en": "The CAE demonstrates conformance with the confidentiality principle by documenting and retaining records of disclosures approved by legal counsel, if applicable, and by senior management and the board (Confidentiality)."}, {"tr": "Retaining authorizations of all disclosures.", "en": "Retaining authorizations of all disclosures.", "cmt_tr": "Internal auditors demonstrate conformance with engagement record confidentiality by documenting distribution restrictions in engagement workpapers and reports and by retaining authorizations of all disclosures and approved distribution lists (Confidentiality).", "cmt_en": "Internal auditors demonstrate conformance with engagement record confidentiality by documenting distribution restrictions in engagement workpapers and reports and by retaining authorizations of all disclosures and approved distribution lists (Confidentiality)."}, {"tr": "Prudence in using and protecting information.", "en": "Prudence in using and protecting information.", "cmt_tr": "Internal auditors must be prudent in the use and protection of information acquired in the course of their duties (Confidentiality). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "Internal auditors must be prudent in the use and protection of information acquired in the course of their duties (Confidentiality). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 0}, {"q_tr": "The internal audit function collectively must possess or obtain certain competencies. Internal audit staff should be competent in", "q_en": "The internal audit function collectively must possess or obtain certain competencies. Internal audit staff should be competent in", "options": [{"tr": "The use of the Global Internal Audit Standards.", "en": "The use of the Global Internal Audit Standards.", "cmt_tr": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1). The emphasis of internal auditors’ technical expertise is on (1) the Global Internal Audit Standards; (2) governance, risk, and control; and (3) business acumen.", "cmt_en": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1). The emphasis of internal auditors’ technical expertise is on (1) the Global Internal Audit Standards; (2) governance, risk, and control; and (3) business acumen."}, {"tr": "Finance.", "en": "Finance.", "cmt_tr": "The Standards do not specifically address the use of finance.", "cmt_en": "The Standards do not specifically address the use of finance."}, {"tr": "General management principles.", "en": "General management principles.", "cmt_tr": "Internal audit staff should have certain competencies regarding internal audit management (e.g., maintaining up-to-date competencies), not general management principles.", "cmt_en": "Internal audit staff should have certain competencies regarding internal audit management (e.g., maintaining up-to-date competencies), not general management principles."}, {"tr": "Marketing.", "en": "Marketing.", "cmt_tr": "Internal auditors ordinarily need not be competent in marketing.", "cmt_en": "Internal auditors ordinarily need not be competent in marketing."}], "answer": 0}, {"q_tr": "The internal audit function collectively must possess or obtain certain competency in", "q_en": "The internal audit function collectively must possess or obtain certain competency in", "options": [{"tr": "Contract law.", "en": "Contract law.", "cmt_tr": "The Standards do not specifically address contract law.", "cmt_en": "The Standards do not specifically address contract law."}, {"tr": "Information technology controls.", "en": "Information technology controls.", "cmt_tr": "Internal auditors must have sufficient knowledge of (1) key information technology risks and controls and (2) available technology-based audit techniques to perform their assigned work. But not all internal auditors are expected to have the expertise of an internal auditor whose primary responsibility is information technology auditing (Standard 3.2).", "cmt_en": "Internal auditors must have sufficient knowledge of (1) key information technology risks and controls and (2) available technology-based audit techniques to perform their assigned work. But not all internal auditors are expected to have the expertise of an internal auditor whose primary responsibility is information technology auditing (Standard 3.2)."}, {"tr": "Management principles.", "en": "Management principles.", "cmt_tr": "The Standards do not specifically address management principles.", "cmt_en": "The Standards do not specifically address management principles."}, {"tr": "Marketing.", "en": "Marketing.", "cmt_tr": "The Standards do not specifically address marketing. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "The Standards do not specifically address marketing. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 1}, {"q_tr": "What is the most appropriate preventive measure for staff communication problems with engagement clients?", "q_en": "What is the most appropriate preventive measure for staff communication problems with engagement clients?", "options": [{"tr": "Provide staff with sufficient training to enhance communication skills.", "en": "Provide staff with sufficient training to enhance communication skills.", "cmt_tr": "The internal audit function can obtain and maintain the proficiency required by the Standards if it effectively applies the competency principle standards. One of the knowledge areas of the principle is communication. Accordingly, the internal audit staff should be provided with sufficient training to enhance communication skills.", "cmt_en": "The internal audit function can obtain and maintain the proficiency required by the Standards if it effectively applies the competency principle standards. One of the knowledge areas of the principle is communication. Accordingly, the internal audit staff should be provided with sufficient training to enhance communication skills."}, {"tr": "Avoid unnecessary communication with engagement clients.", "en": "Avoid unnecessary communication with engagement clients.", "cmt_tr": "The issue is the quality rather than the quantity of communication.", "cmt_en": "The issue is the quality rather than the quantity of communication."}, {"tr": "Discuss communication problems with staff auditors.", "en": "Discuss communication problems with staff auditors.", "cmt_tr": "Communication problems should be resolved through effective training.", "cmt_en": "Communication problems should be resolved through effective training."}, {"tr": "Meet with engagement clients to resolve communication problems.", "en": "Meet with engagement clients to resolve communication problems.", "cmt_tr": "Meeting with engagement clients will not resolve problems caused by poor staff communication skills.", "cmt_en": "Meeting with engagement clients will not resolve problems caused by poor staff communication skills."}], "answer": 0}, {"q_tr": "Given that internal audit engagements must be performed with proficiency and due professional care, which of the following is true?", "q_en": "Given that internal audit engagements must be performed with proficiency and due professional care, which of the following is true?", "options": [{"tr": "All internal auditors must be proficient in all necessary competencies.", "en": "All internal auditors must be proficient in all necessary competencies.", "cmt_tr": "The internal audit function as a whole, not each auditor individually, must be proficient in all necessary competencies.", "cmt_en": "The internal audit function as a whole, not each auditor individually, must be proficient in all necessary competencies."}, {"tr": "The internal audit function need not decline an engagement because it currently lacks the needed competencies.", "en": "The internal audit function need not decline an engagement because it currently lacks the needed competencies.", "cmt_tr": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1).", "cmt_en": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1)."}, {"tr": "An internal auditor should have the expertise of a specialist in IT auditing.", arking the organization’s healthcare program costs against industry standards using data analytics.", "en": "Benchmarking the organization’s healthcare program costs against industry standards using data analytics.", "cmt_tr": "Use of external service providers with expertise in healthcare benefits is also appropriate when evaluating the estimated liability for postretirement benefits and training staff to conduct healthcare audits.", "cmt_en": "Use of external service providers with expertise in healthcare benefits is also appropriate when evaluating the estimated liability for postretirement benefits and training staff to conduct healthcare audits."}, {"tr": "Training its staff to conduct an audit of healthcare costs in a major division of the organization.", "en": "Training its staff to conduct an audit of healthcare costs in a major division of the organization.", "cmt_tr": "Use of external service providers with expertise in healthcare benefits is also appropriate when benchmarking healthcare costs against industry standards and evaluating the estimated liability for postretirement benefits.", "cmt_en": "Use of external service providers with expertise in healthcare benefits is also appropriate when benchmarking healthcare costs against industry standards and evaluating the estimated liability for postretirement benefits."}, {"tr": "All of the answers are correct.", "en": "All of the answers are correct.", "cmt_tr": "If the internal auditors lack the necessary expertise, external service providers should be employed who can provide the requisite knowledge, skills, and other competencies. Thus, external service providers may provide assistance in (1) estimating the liability for postretirement benefits, (2) benchmarking healthcare costs, and (3) training the staff to audit healthcare costs.", "cmt_en": "If the internal auditors lack the necessary expertise, external service providers should be employed who can provide the requisite knowledge, skills, and other competencies. Thus, external service providers may provide assistance in (1) estimating the liability for postretirement benefits, (2) benchmarking healthcare costs, and (3) training the staff to audit healthcare costs."}], "answer": 3}, {"q_tr": "When the internal audit function lacks the expertise to perform a specific engagement, the chief audit executive (CAE) should do which of the following?", "q_en": "When the internal audit function lacks the expertise to perform a specific engagement, the chief audit executive (CAE) should do which of the following?", "options": [{"tr": "Negotiate with management to remove from the scope any portion of the audit that the staff is unable to perform.", "en": "Negotiate with management to remove from the scope any portion of the audit that the staff is unable to perform.", "cmt_tr": "The CAE must obtain competent advice and assistance, not negotiate with management to reduce the scope of the engagement. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "The CAE must obtain competent advice and assistance, not negotiate with management to reduce the scope of the engagement. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}, {"tr": "Use external resources with sufficient expertise to accomplish the engagement.", "en": "Use external resources with sufficient expertise to accomplish the engagement.", "cmt_tr": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1).", "cmt_en": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1)."}, {"tr": "Postpone the engagement until the CAE can hire a new internal auditor with the relevant skills.", "en": "Postpone the engagement until the CAE can hire a new internal auditor with the relevant skills.", "cmt_tr": "The CAE must use available external resources, not postpone the engagement until a competent internal auditor is hired.", "cmt_en": "The CAE must use available external resources, not postpone the engagement until a competent internal auditor is hired."}, {"tr": "Continue with the engagement but rely on management’s self-assessment in the areas where the audit staff lacks expertise", "en": "Continue with the engagement but rely on management’s self-assessment in the areas where the audit staff lacks expertise", "cmt_tr": "The CAE must not continue the engagement until (s)he obtains the competent advice and assistance necessary to perform the engagement.", "cmt_en": "The CAE must not continue the engagement until (s)he obtains the competent advice and assistance necessary to perform the engagement."}], "answer": 1}, {"q_tr": "Who is responsible for the sufficiency of the internal audit function’s human resources?", "q_en": "Who is responsible for the sufficiency of the internal audit function’s human resources?", "options": [{"tr": "Audit committee.", "en": "Audit committee.", "cmt_tr": "The audit committee, the full board, or senior management ultimately must ensure the sufficiency of resources.", "cmt_en": "The audit committee, the full board, or senior management ultimately must ensure the sufficiency of resources."}, {"tr": "Human resources director.", "en": "Human resources director.", "cmt_tr": "The CAE is unlikely to report to the human resources director.", "cmt_en": "The CAE is unlikely to report to the human resources director."}, {"tr": "Chief audit executive (CAE).", "en": "Chief audit executive (CAE).", "cmt_tr": "The CAE must ensure that the internal audit function is able to fulfill its responsibilities. Identifying the available knowledge, skills, and competencies within the internal audit function helps the CAE determine whether the current staff is sufficient to satisfy those responsibilities.", "cmt_en": "The CAE mus
