const QUIZ = {"SU1 - Integrity": [{"q_tr": "In their reporting, internal auditors are required by The IIA’s Standards of Ethics and Professionalism to", "q_en": "In their reporting, internal auditors are required by The IIA’s Standards of Ethics and Professionalism to", "options": [{"tr": "Present sufficient factual information without revealing confidential matters that could be detrimental to the organization.", "en": "Present sufficient factual information without revealing confidential matters that could be detrimental to the organization.", "cmt_tr": "The Standards require only that internal auditors be prudent in the use and protection of information.", "cmt_en": "The Standards require only that internal auditors be prudent in the use and protection of information."}, {"tr": "Disclose all material information obtained by the auditor as of the date of the final engagement communication.", "en": "Disclose all material information obtained by the auditor as of the date of the final engagement communication.", "cmt_tr": "The Standards do not address disclosure this specifically.", "cmt_en": "The Standards do not address disclosure this specifically."}, {"tr": "Obtain factual information within the established time and budget parameters.", "en": "Obtain factual information within the established time and budget parameters.", "cmt_tr": "Time and budget parameters are not addressed in the Standards.", "cmt_en": "Time and budget parameters are not addressed in the Standards."}, {"tr": "Disclose material facts known to the internal auditor that could distort the final engagement communication if not revealed.", "en": "Disclose material facts known to the internal auditor that could distort the final engagement communication if not revealed.", "cmt_tr": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”", "cmt_en": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”"}], "answer": 3}, {"q_tr": "According to The IIA Standards of Ethics and Professionalism, the principle of integrity requires internal auditors to do which of the following?", "q_en": "According to The IIA Standards of Ethics and Professionalism, the principle of integrity requires internal auditors to do which of the following?", "options": [{"tr": "Continually improve their proficiency, effectiveness, and quality of services.", "en": "Continually improve their proficiency, effectiveness, and quality of services.", "cmt_tr": "Standard 3.2 under the competency principle states, “Internal auditors shall continually improve their proficiency and the effectiveness and quality of their services.”", "cmt_en": "Standard 3.2 under the competency principle states, “Internal auditors shall continually improve their proficiency and the effectiveness and quality of their services.”"}, {"tr": "Be prudent in the use and protection of the information acquired in the course of their duties.", "en": "Be prudent in the use and protection of the information acquired in the course of their duties.", "cmt_tr": "Standard 5.2 under the confidentiality principle states, “Internal auditors must be aware of their responsibilities for protecting information and demonstrate respect for the confidentiality, privacy, and ownership of information acquired when performing internal audit services or as the result of professional relationships.”", "cmt_en": "Standard 5.2 under the confidentiality principle states, “Internal auditors must be aware of their responsibilities for protecting information and demonstrate respect for the confidentiality, privacy, and ownership of information acquired when performing internal audit services or as the result of professional relationships.”"}, {"tr": "Not accept anything that may impair or be presumed to impair their professional judgment.", "en": "Not accept anything that may impair or be presumed to impair their professional judgment.", "cmt_tr": "Standard 2.2 under the objectivity principle states, “Internal auditors must not accept any tangible or intangible item, such as a gift, reward, or favor, that may impair or be presumed to impair objectivity.” Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Standard 2.2 under the objectivity principle states, “Internal auditors must not accept any tangible or intangible item, such as a gift, reward, or favor, that may impair or be presumed to impair objectivity.” Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Respect and contribute to the legitimate and ethical objectives of the organization.", "en": "Respect and contribute to the legitimate and ethical objectives of the organization.", "cmt_tr": "Standard 1.2 under the integrity principle states, “Internal auditors shall respect and contribute to the legitimate and ethical objectives of the organization.”", "cmt_en": "Standard 1.2 under the integrity principle states, “Internal auditors shall respect and contribute to the legitimate and ethical objectives of the organization.”"}], "answer": 3}, {"q_tr": "Today’s internal auditor will often encounter a wide range of potential ethical dilemmas, not all of which are explicitly addressed by The IIA’s Standards of Ethics and Professionalism. If the internal auditor encounters such a dilemma, the internal auditor should always", "q_en": "Today’s internal auditor will often encounter a wide range of potential ethical dilemmas, not all of which are explicitly addressed by The IIA’s Standards of Ethics and Professionalism. If the internal auditor encounters such a dilemma, the internal auditor should always", "options": [{"tr": "Seek counsel from an independent attorney to determine the personal consequences of potential actions.", "en": "Seek counsel from an independent attorney to determine the personal consequences of potential actions.", "cmt_tr": "Seeking the advice of legal counsel on all ethical decisions is impracticable.", "cmt_en": "Seeking the advice of legal counsel on all ethical decisions is impracticable."}, {"tr": "Apply and uphold the principles embodied in The IIA’s Standards of Ethics and Professionalism.", "en": "Apply and uphold the principles embodied in The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "Internal auditors are expected to apply and uphold the principles in the Standards of Ethics and Professionalism. Furthermore, that a particular conduct is not mentioned in the Standards does not prevent it from being unacceptable or discreditable.", "cmt_en": "Internal auditors are expected to apply and uphold the principles in the Standards of Ethics and Professionalism. Furthermore, that a particular conduct is not mentioned in the Standards does not prevent it from being unacceptable or discreditable."}, {"tr": "Seek the counsel of the board before deciding on an action.", "en": "Seek the counsel of the board before deciding on an action.", "cmt_tr": "Seeking the advice of the board on all ethical decisions is impracticable. Furthermore, the advice might not be consistent with the profession’s standards.", "cmt_en": "Seeking the advice of the board on all ethical decisions is impracticable. Furthermore, the advice might not be consistent with the profession’s standards."}, {"tr": "Act consistently with the code of ethics adopted by the organization even if such action is not consistent with The IIA’s Standards of Ethics and Professionalism.", "en": "Act consistently with the code of ethics adopted by the organization even if such action is not consistent with The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "If the organization’s standards are not consistent with, or as high as, the profession’s standards, the internal auditor is held to the standards of the profession.", "cmt_en": "If the organization’s standards are not consistent with, or as high as, the profession’s standards, the internal auditor is held to the standards of the profession."}], "answer": 1}, {"q_tr": "Which of the following situations is a violation of The IIA’s Standards of Ethics and Professionalism?", "q_en": "Which of the following situations is a violation of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "An internal auditor, with the knowledge and consent of management, accepted a token gift from a customer of the organization that was not presumed to impair and did not impair judgment.", "en": "An internal auditor, with the knowledge and consent of management, accepted a token gift from a customer of the organization that was not presumed to impair and did not impair judgment.", "cmt_tr": "Acceptance of a gift from a customer is prohibited but only if it would impair or be presumed to impair professional judgment.", "cmt_en": "Acceptance of a gift from a customer is prohibited but only if it would impair or be presumed to impair professional judgment."}, {"tr": "Knowing that management was aware of the situation, an internal auditor purposely left a description of an unlawful practice out of the final engagement communication.", "en": "Knowing that management was aware of the situation, an internal auditor purposely left a description of an unlawful practice out of the final engagement communication.", "cmt_tr": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” Standard 1.3 Legal and Ethical Behavior cites overlooking illegal activities as a discreditable act and internal auditors must not be involved in any activity that is illegal or discreditable to the organization.", "cmt_en": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” Standard 1.3 Legal and Ethical Behavior cites overlooking illegal activities as a discreditable act and internal auditors must not be involved in any activity that is illegal or discreditable to the organization."}, {"tr": "An internal auditor shared techniques with internal auditors from another organization.", "en": "An internal auditor shared techniques with internal auditors from another organization.", "cmt_tr": "The competency principle requires internal auditors to continually improve their proficiency and the effectiveness and quality of their services.", "cmt_en": "The competency principle requires internal auditors to continually improve their proficiency and the effectiveness and quality of their services."}, {"tr": "Based upon knowledge of the probable success of the employer’s business, an internal auditor invested in a mutual fund that specialized in the same industry. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "en": "Based upon knowledge of the probable success of the employer’s business, an internal auditor invested in a mutual fund that specialized in the same industry. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_tr": "Although an internal auditor is prohibited from using confidential information for personal gain, and an investment in the organization’s stock would be questionable, an investment in a mutual fund is acceptable.", "cmt_en": "Although an internal auditor is prohibited from using confidential information for personal gain, and an investment in the organization’s stock would be questionable, an investment in a mutual fund is acceptable."}], "answer": 1}, {"q_tr": "In complying with The IIA’s Standards of Ethics and Professionalism, an internal auditor should", "q_en": "In complying with The IIA’s Standards of Ethics and Professionalism, an internal auditor should", "options": [{"tr": "Use individual judgment in the application of the principles set forth in the Standards.", "en": "Use individual judgment in the application of the principles set forth in the Standards.", "cmt_tr": "The IIA’s Standards of Ethics and Professionalism include principles that internal auditors are expected to apply and uphold. That a particular conduct is not mentioned does not prevent it from being unacceptable or discreditable. Thus, a reasonable inference is that individual judgment is necessary in the application of the principles.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism include principles that internal auditors are expected to apply and uphold. That a particular conduct is not mentioned does not prevent it from being unacceptable or discreditable. Thus, a reasonable inference is that individual judgment is necessary in the application of the principles."}, {"tr": "Respect and contribute to the objectives of the organization even if it is engaged in illegal activities.", "en": "Respect and contribute to the objectives of the organization even if it is engaged in illegal activities.", "cmt_tr": "An internal auditor “must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession.” Furthermore, an internal auditor is bound to respect and contribute only to the legitimate and ethical objectives of the organization. (Standard 1.3)", "cmt_en": "An internal auditor “must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession.” Furthermore, an internal auditor is bound to respect and contribute only to the legitimate and ethical objectives of the organization. (Standard 1.3)"}, {"tr": "Go beyond the limitation of personal technical skills to advance the interest of the organization.", "en": "Go beyond the limitation of personal technical skills to advance the interest of the organization.", "cmt_tr": "Internal auditors “must engage only in those services for which they have or can attain the necessary competencies” (Standard 3.1).", "cmt_en": "Internal auditors “must engage only in those services for which they have or can attain the necessary competencies” (Standard 3.1)."}, {"tr": "Primarily apply the competency principle in establishing trust.", "en": "Primarily apply the competency principle in establishing trust.", "cmt_tr": "Applying and upholding the integrity principle is the means by which an internal auditor establishes trust as a basis for reliance on his or her judgment. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Applying and upholding the integrity principle is the means by which an internal auditor establishes trust as a basis for reliance on his or her judgment. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}], "answer": 0}, {"q_tr": "An internal auditor who encounters an ethical dilemma not explicitly addressed by The IIA’s Standards of Ethics and Professionalism should always", "q_en": "An internal auditor who encounters an ethical dilemma not explicitly addressed by The IIA’s Standards of Ethics and Professionalism should always", "options": [{"tr": "Seek counsel from an independent attorney to determine the personal consequences of potential actions.", "en": "Seek counsel from an independent attorney to determine the personal consequences of potential actions.", "cmt_tr": "The auditor must act consistently with the spirit of The IIA’s Standards of Ethics and Professionalism. It is not practical to seek the advice of legal counsel for all ethical decisions. Moreover, unethical behavior may not be illegal.", "cmt_en": "The auditor must act consistently with the spirit of The IIA’s Standards of Ethics and Professionalism. It is not practical to seek the advice of legal counsel for all ethical decisions. Moreover, unethical behavior may not be illegal."}, {"tr": "Take action consistent with the principles embodied in The IIA’s Standards of Ethics and Professionalism.", "en": "Take action consistent with the principles embodied in The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "The IIA’s Standards of Ethics and Professionalism are based on principles relevant to the profession and practice of internal auditing that internal auditors are expected to apply and uphold: integrity, objectivity, competency, due professional care, and confidentiality. Furthermore, the Standards state that particular conduct may be unacceptable or discreditable even if it is not mentioned in the Standards.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism are based on principles relevant to the profession and practice of internal auditing that internal auditors are expected to apply and uphold: integrity, objectivity, competency, due professional care, and confidentiality. Furthermore, the Standards state that particular conduct may be unacceptable or discreditable even if it is not mentioned in the Standards."}, {"tr": "Seek the counsel of the audit committee before deciding on an action.", "en": "Seek the counsel of the audit committee before deciding on an action.", "cmt_tr": "It is not feasible to seek the audit committee’s advice for all potential dilemmas. Furthermore, the advice might not be consistent with the profession’s standards.", "cmt_en": "It is not feasible to seek the audit committee’s advice for all potential dilemmas. Furthermore, the advice might not be consistent with the profession’s standards."}, {"tr": "Act consistently with the employing organization’s code of ethics even if such action would not be consistent with The IIA’s Standards of Ethics and Professionalism.", "en": "Act consistently with the employing organization’s code of ethics even if such action would not be consistent with The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "If the organization’s standards are not consistent with, or as high as, the profession’s standards, the internal auditor should abide by the latter.", "cmt_en": "If the organization’s standards are not consistent with, or as high as, the profession’s standards, the internal auditor should abide by the latter."}], "answer": 1}, {"q_tr": "Internal auditors have discovered mathematical errors in their workpapers. Reporting the errors would require an extensive amount of rework. They decide to say nothing and not correct the errors. The internal auditors' actions violate The IIA's Standards of Ethics and Professionalism. What did they fail to do?", "q_en": "Internal auditors have discovered mathematical errors in their workpapers. Reporting the errors would require an extensive amount of rework. They decide to say nothing and not correct the errors. The internal auditors' actions violate The IIA's Standards of Ethics and Professionalism. What did they fail to do?", "options": [{"tr": "Observe the law and report the disclosures expected by the law and the profession.", "en": "Observe the law and report the disclosures expected by the law and the profession.", "cmt_tr": "Failure to report errors in the internal auditors' workpapers is not a failure to observe the law.", "cmt_en": "Failure to report errors in the internal auditors' workpapers is not a failure to observe the law."}, {"tr": "Protect the information acquired in the course of their duties.", "en": "Protect the information acquired in the course of their duties.", "cmt_tr": "Nothing indicates that information the auditors acquired while performing their duties was not protected.", "cmt_en": "Nothing indicates that information the auditors acquired while performing their duties was not protected."}, {"tr": "Perform the work with honesty and professional courage.", "en": "Perform the work with honesty and professional courage.", "cmt_tr": "Standard 1.1 Honesty and Professional Courage requires internal auditors to be truthful, accurate, clear, open, and respectful. By deciding to not correct the errors, the auditors failed to perform their work with honesty and professional courage.", "cmt_en": "Standard 1.1 Honesty and Professional Courage requires internal auditors to be truthful, accurate, clear, open, and respectful. By deciding to not correct the errors, the auditors failed to perform their work with honesty and professional courage."}, {"tr": "Engage in services for which they have sufficient knowledge and experience.", "en": "Engage in services for which they have sufficient knowledge and experience.", "cmt_tr": "An error in the workpapers is not an indication of the internal auditors' competency, although their judgment is questionable.", "cmt_en": "An error in the workpapers is not an indication of the internal auditors' competency, although their judgment is questionable."}], "answer": 2}, {"q_tr": "A newly hired CAE discovered the CFO is paying personal expenses through the organization. Upon further investigation, the CAE found that the CFO is submitting these expenses as research and development costs. The CFO has worked for the organization for 15 years. The CAE immediately notified the audit committee. The CAE", "q_en": "A newly hired CAE discovered the CFO is paying personal expenses through the organization. Upon further investigation, the CAE found that the CFO is submitting these expenses as research and development costs. The CFO has worked for the organization for 15 years. The CAE immediately notified the audit committee. The CAE", "options": [{"tr": "Violated the Standards principle of confidentiality.", "en": "Violated the Standards principle of confidentiality.", "cmt_tr": "The principle of confidentiality was not violated by the CAE reporting these discoveries to the audit committee. The communication was to those charged with governance of fraud and noncompliance with laws and regulations.", "cmt_en": "The principle of confidentiality was not violated by the CAE reporting these discoveries to the audit committee. The communication was to those charged with governance of fraud and noncompliance with laws and regulations."}, {"tr": "Violated the Standards principle of integrity.", "en": "Violated the Standards principle of integrity.", "cmt_tr": "Reporting without delay possible fraud is not a violation of the integrity principle.", "cmt_en": "Reporting without delay possible fraud is not a violation of the integrity principle."}, {"tr": "Violated the Standards principle of objectivity.", "en": "Violated the Standards principle of objectivity.", "cmt_tr": "The principle of objectivity is a commitment to providing stakeholders with unbiased information and a commitment to independence from conflicts of interest. Reporting an issue of possible fraud upheld the principle of objectivity.", "cmt_en": "The principle of objectivity is a commitment to providing stakeholders with unbiased information and a commitment to independence from conflicts of interest. Reporting an issue of possible fraud upheld the principle of objectivity."}, {"tr": "Upheld the Standards principle of integrity.", "en": "Upheld the Standards principle of integrity.", "cmt_tr": "According to Standard 1.2 Organization’s Ethical Expectations, if an internal auditor determines that a member of senior management has behaved in a manner inconsistent with the organization’s ethical expectations, the CAE should report the violation to the board. The CAE upheld the principle of integrity by timely notifying the audit committee.", "cmt_en": "According to Standard 1.2 Organization’s Ethical Expectations, if an internal auditor determines that a member of senior management has behaved in a manner inconsistent with the organization’s ethical expectations, the CAE should report the violation to the board. The CAE upheld the principle of integrity by timely notifying the audit committee."}], "answer": 3}, {"q_tr": "An auditor who observes the law and makes disclosures expected by the law is following The IIA’s Standards principle of", "q_en": "An auditor who observes the law and makes disclosures expected by the law is following The IIA’s Standards principle of", "options": [{"tr": "Responsibility.", "en": "Responsibility.", "cmt_tr": "Responsibility is not a principle of The IIA’s Standards. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Responsibility is not a principle of The IIA’s Standards. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Integrity.", "en": "Integrity.", "cmt_tr": "The integrity of internal auditors establishes trust and thus provides the basis for reliance on their judgment. Standard 1.3 under the integrity principle states, “Internal auditors must understand and abide by the laws and/or regulations relevant to the industry and jurisdictions in which the organization operates, including making disclosures as required.”", "cmt_en": "The integrity of internal auditors establishes trust and thus provides the basis for reliance on their judgment. Standard 1.3 under the integrity principle states, “Internal auditors must understand and abide by the laws and/or regulations relevant to the industry and jurisdictions in which the organization operates, including making disclosures as required.”"}, {"tr": "Competency.", "en": "Competency.", "cmt_tr": "Competency is a principle of The IIA’s Standards. Competency refers to the knowledge, skills, and experience needed by the internal auditor in the performance of internal audit services.", "cmt_en": "Competency is a principle of The IIA’s Standards. Competency refers to the knowledge, skills, and experience needed by the internal auditor in the performance of internal audit services."}, {"tr": "Objectivity.", "en": "Objectivity.", "cmt_tr": "Objectivity is a principle of The IIA’s Standards. However, objectivity relates to the internal auditor’s commitment to make a balanced assessment of all the relevant circumstances and not be unduly influenced by self-interest or others in forming judgments. Objectivity does not include observation of required laws and disclosures.", "cmt_en": "Objectivity is a principle of The IIA’s Standards. However, objectivity relates to the internal auditor’s commitment to make a balanced assessment of all the relevant circumstances and not be unduly influenced by self-interest or others in forming judgments. Objectivity does not include observation of required laws and disclosures."}], "answer": 1}, {"q_tr": "Which workplace situation presented below most likely violates The IIA’s principle of integrity?", "q_en": "Which workplace situation presented below most likely violates The IIA’s principle of integrity?", "options": [{"tr": "An employee, hired to work full-time, has had to reduce work hours to help care for her elderly mother. The employee has kept her supervisor and human resources informed, is productive when in the office, and always punches out when not at work.", "en": "An employee, hired to work full-time, has had to reduce work hours to help care for her elderly mother. The employee has kept her supervisor and human resources informed, is productive when in the office, and always punches out when not at work.", "cmt_tr": "The employee has exhibited professionalism and has not violated the principle of integrity.", "cmt_en": "The employee has exhibited professionalism and has not violated the principle of integrity."}, {"tr": "The director of internal auditing is quick to take responsibility for the department when his team fails to perform. The director also is quick to recognize and praise his team when the job is done well.", "en": "The director of internal auditing is quick to take responsibility for the department when his team fails to perform. The director also is quick to recognize and praise his team when the job is done well.", "cmt_tr": "The director understands the importance of teamwork and has not violated the principle of integrity.", "cmt_en": "The director understands the importance of teamwork and has not violated the principle of integrity."}, {"tr": "The internal audit manager is required to file work performance reports every morning. The manager continually comes in late and leaves work early. One of the employees directly supervised by the manager stays late every night to complete the performance reports on behalf of the manager.", "en": "The internal audit manager is required to file work performance reports every morning. The manager continually comes in late and leaves work early. One of the employees directly supervised by the manager stays late every night to complete the performance reports on behalf of the manager.", "cmt_tr": "The IIA’s Standard 1.2 under the integrity principle states, “Internal auditors must understand, respect, meet, and contribute to the legitimate and ethical expectations of the organization and must be able to recognize conduct that is contrary to those expectations.” The internal audit manager is not diligent and is not fulfilling his or her responsibilities. The manager has violated the principle of integrity. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "The IIA’s Standard 1.2 under the integrity principle states, “Internal auditors must understand, respect, meet, and contribute to the legitimate and ethical expectations of the organization and must be able to recognize conduct that is contrary to those expectations.” The internal audit manager is not diligent and is not fulfilling his or her responsibilities. The manager has violated the principle of integrity. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "A first-year internal auditor was having difficulty completing assignments on time. The employee’s supervisor arranged for the employee to have more training. Additionally, the supervisor developed a more structured work schedule with intermediary deadlines for the employee.", "en": "A first-year internal auditor was having difficulty completing assignments on time. The employee’s supervisor arranged for the employee to have more training. Additionally, the supervisor developed a more structured work schedule with intermediary deadlines for the employee.", "cmt_tr": "The supervisor, recognizing the employee’s shortcomings, adapted their management style and is setting the employee up for success. Neither the supervisor nor the employee has violated the principle of integrity.", "cmt_en": "The supervisor, recognizing the employee’s shortcomings, adapted their management style and is setting the employee up for success. Neither the supervisor nor the employee has violated the principle of integrity."}], "answer": 2}, {"q_tr": "An internal auditor most directly violates The IIA’s integrity principle by", "q_en": "An internal auditor most directly violates The IIA’s integrity principle by", "options": [{"tr": "Engaging in a legal act discreditable to the organization.", "en": "Engaging in a legal act discreditable to the organization.", "cmt_tr": "Under the integrity principle, an internal auditor must not knowingly be a party to an illegal activity or engage in acts discreditable to the profession of internal auditing or to the organization.", "cmt_en": "Under the integrity principle, an internal auditor must not knowingly be a party to an illegal activity or engage in acts discreditable to the profession of internal auditing or to the organization."}, {"tr": "Using the organization’s proprietary information to purchase the organization’s stock.", "en": "Using the organization’s proprietary information to purchase the organization’s stock.", "cmt_tr": "Using insider information to purchase the organization’s stock violates the confidentiality principle, which prohibits using any information (e.g., insider information) for personal gain.", "cmt_en": "Using insider information to purchase the organization’s stock violates the confidentiality principle, which prohibits using any information (e.g., insider information) for personal gain."}, {"tr": "Interrogating an employee of the organization suspected of fraud despite lacking the necessary expertise.", "en": "Interrogating an employee of the organization suspected of fraud despite lacking the necessary expertise.", "cmt_tr": "Interrogating an employee of the organization suspected of fraud despite lacking the necessary expertise violates the competency principle, which requires internal auditors to have the necessary knowledge, skills, and experience.", "cmt_en": "Interrogating an employee of the organization suspected of fraud despite lacking the necessary expertise violates the competency principle, which requires internal auditors to have the necessary knowledge, skills, and experience."}, {"tr": "Selling products to the organization.", "en": "Selling products to the organization.", "cmt_tr": "Selling products to the organization violates the objectivity principle, which prohibits activities conflicting with the interests of the organization.", "cmt_en": "Selling products to the organization violates the objectivity principle, which prohibits activities conflicting with the interests of the organization."}], "answer": 0}, {"q_tr": "An internal auditor who uses the CIA designation after it has expired most likely is engaging in an act discreditable under which principle of The IIA’s Standards of Ethics and Professionalism?", "q_en": "An internal auditor who uses the CIA designation after it has expired most likely is engaging in an act discreditable under which principle of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Confidentiality.", "en": "Confidentiality.", "cmt_tr": "The confidentiality principle states that internal auditors do not disclose information without appropriate authority.", "cmt_en": "The confidentiality principle states that internal auditors do not disclose information without appropriate authority."}, {"tr": "Competency.", "en": "Competency.", "cmt_tr": "The competency principle requires internal auditors to have the necessary knowledge, skills, and experience to perform services. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "The competency principle requires internal auditors to have the necessary knowledge, skills, and experience to perform services. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Integrity.", "en": "Integrity.", "cmt_tr": "Certain behaviors may be discreditable to the internal auditing profession under the integrity principle. They include the use of the CIA designation or other credentials after they have expired or been revoked.", "cmt_en": "Certain behaviors may be discreditable to the internal auditing profession under the integrity principle. They include the use of the CIA designation or other credentials after they have expired or been revoked."}, {"tr": "Objectivity.", "en": "Objectivity.", "cmt_tr": "The objectivity principle requires auditors to make balanced assessments and not be unduly influenced by their own interests or by others.", "cmt_en": "The objectivity principle requires auditors to make balanced assessments and not be unduly influenced by their own interests or by others."}], "answer": 2}, {"q_tr": "In their communication of results, internal auditors are required by The IIA’s Standards of Ethics and Professionalism to", "q_en": "In their communication of results, internal auditors are required by The IIA’s Standards of Ethics and Professionalism to", "options": [{"tr": "Obtain factual information within the established time and budget parameters.", "en": "Obtain factual information within the established time and budget parameters.", "cmt_tr": "Obtaining information pertains to performing the engagement, not communicating results.", "cmt_en": "Obtaining information pertains to performing the engagement, not communicating results."}, {"tr": "Reveal material facts that could distort communications if not revealed.", "en": "Reveal material facts that could distort communications if not revealed.", "cmt_tr": "Internal auditors should disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review.", "cmt_en": "Internal auditors should disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review."}, {"tr": "Present sufficient factual information without revealing confidential information that could be detrimental to the organization.", "en": "Present sufficient factual information without revealing confidential information that could be detrimental to the organization.", "cmt_tr": "The Standards do not prohibit communicating confidential information to appropriate parties within the organization, e.g., senior management and the board.", "cmt_en": "The Standards do not prohibit communicating confidential information to appropriate parties within the organization, e.g., senior management and the board."}, {"tr": "Disclose all material information obtained as of the date of the final engagement communication.", "en": "Disclose all material information obtained as of the date of the final engagement communication.", "cmt_tr": "Disclosures by the internal auditors are not limited to information obtained as of the date of the final engagement communication.", "cmt_en": "Disclosures by the internal auditors are not limited to information obtained as of the date of the final engagement communication."}], "answer": 1}, {"q_tr": "During an examination of grants awarded by a not-for-profit organization, an internal auditor discovered a number of grants made without the approval of the grant authorization committee (which includes outside representatives), as required by the organization’s charter. All the grants, however, were approved and documented by the president. The chair of the grant authorization committee, who is also a member of the board of directors, proposes that the committee meet and retroactively approve all the grants before the engagement communication is issued, thereby overriding controls. If the committee meets and approves the grants before such issuance, the internal auditor should", "q_en": "During an examination of grants awarded by a not-for-profit organization, an internal auditor discovered a number of grants made without the approval of the grant authorization committee (which includes outside representatives), as required by the organization’s charter. All the grants, however, were approved and documented by the president. The chair of the grant authorization committee, who is also a member of the board of directors, proposes that the committee meet and retroactively approve all the grants before the engagement communication is issued, thereby overriding controls. If the committee meets and approves the grants before such issuance, the internal auditor should", "options": [{"tr": "Not report the grants in question because they were approved before the issuance of the engagement communication.", "en": "Not report the grants in question because they were approved before the issuance of the engagement communication.", "cmt_tr": "The control override should be reported.", "cmt_en": "The control override should be reported."}, {"tr": "Discuss the matter with the chair of the grant committee to determine the rationale for not approving the grants earlier. If the grants are routine, discussion of the grant committee’s inaction should be omitted from the engagement communication. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "en": "Discuss the matter with the chair of the grant committee to determine the rationale for not approving the grants earlier. If the grants are routine, discussion of the grant committee’s inaction should be omitted from the engagement communication. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_tr": "The routine nature of the grants is irrelevant to the issue of the violation of the charter.", "cmt_en": "The routine nature of the grants is irrelevant to the issue of the violation of the charter."}, {"tr": "Include the items in the communication as an override of the organization’s controls. Details about each grant should be reported, and the internal auditor should investigate further for fraud.", "en": "Include the items in the communication as an override of the organization’s controls. Details about each grant should be reported, and the internal auditor should investigate further for fraud.", "cmt_tr": "Details about each grant need not be included unless the internal auditor believes that fraud may have occurred. Moreover, the appropriate organizational authorities should be informed if wrongdoing is suspected.", "cmt_en": "Details about each grant need not be included unless the internal auditor believes that fraud may have occurred. Moreover, the appropriate organizational authorities should be informed if wrongdoing is suspected."}, {"tr": "Report the override of control to the board.", "en": "Report the override of control to the board.", "cmt_tr": "Standard 1.1 Honesty and Professional Courage states, “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”", "cmt_en": "Standard 1.1 Honesty and Professional Courage states, “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”"}], "answer": 3}, {"q_tr": "An engagement at a foreign subsidiary disclosed payments by the sales department to local government officials in return for orders. What action does The IIA’s Standards of Ethics and Professionalism suggest for an internal auditor in such a case?", "q_en": "An engagement at a foreign subsidiary disclosed payments by the sales department to local government officials in return for orders. What action does The IIA’s Standards of Ethics and Professionalism suggest for an internal auditor in such a case?", "options": [{"tr": "Refrain from any action that might be detrimental to the organization.", "en": "Refrain from any action that might be detrimental to the organization.", "cmt_tr": "Informing organizational officials is not detrimental to the organization.", "cmt_en": "Informing organizational officials is not detrimental to the organization."}, {"tr": "Report the incident to appropriate regulatory authorities.", "en": "Report the incident to appropriate regulatory authorities.", "cmt_tr": "The Standards do not require that the incident be reported to regulatory authorities.", "cmt_en": "The Standards do not require that the incident be reported to regulatory authorities."}, {"tr": "Inform appropriate organizational officials.", "en": "Inform appropriate organizational officials.", "cmt_tr": "Such payments may be illegal. Standard 1.3 Legal and Ethical Behavior states, “Internal auditors must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession of internal auditing or that may harm the organization or its employees.” Also, Standard 1.1 Honesty and Professional Courage states, “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”", "cmt_en": "Such payments may be illegal. Standard 1.3 Legal and Ethical Behavior states, “Internal auditors must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession of internal auditing or that may harm the organization or its employees.” Also, Standard 1.1 Honesty and Professional Courage states, “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”"}, {"tr": "Report the practice to the board of The Institute of Internal Auditors.", "en": "Report the practice to the board of The Institute of Internal Auditors.", "cmt_tr": "The Standards of Ethics and Professionalism do not require reporting for these types of activities to The IIA. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "The Standards of Ethics and Professionalism do not require reporting for these types of activities to The IIA. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}], "answer": 2}, {"q_tr": "The chief audit executive is aware of a material inventory shortage caused by internal control deficiencies at one manufacturing plant. The shortage and related causes are of sufficient magnitude to affect the external auditor’s report. Based on The IIA’s Standards of Ethics and Professionalism, what is the CAE’s most appropriate course of action?", "q_en": "The chief audit executive is aware of a material inventory shortage caused by internal control deficiencies at one manufacturing plant. The shortage and related causes are of sufficient magnitude to affect the external auditor’s report. Based on The IIA’s Standards of Ethics and Professionalism, what is the CAE’s most appropriate course of action?", "options": [{"tr": "Say nothing; guard against interfering with the independence of the external auditors.", "en": "Say nothing; guard against interfering with the independence of the external auditors.", "cmt_tr": "The shortage is a material fact that could distort a report of activities under review if not revealed.", "cmt_en": "The shortage is a material fact that could distort a report of activities under review if not revealed."}, {"tr": "Discuss the issue with management and take appropriate action to ensure that the external auditors are informed.", "en": "Discuss the issue with management and take appropriate action to ensure that the external auditors are informed.", "cmt_tr": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” The CAE should share information and coordinate activities with other internal and external providers of relevant assurance and consulting services.", "cmt_en": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” The CAE should share information and coordinate activities with other internal and external providers of relevant assurance and consulting services."}, {"tr": "Inform the external auditors of the possibility of a shortage but allow them to make an independent assessment of the amount.", "en": "Inform the external auditors of the possibility of a shortage but allow them to make an independent assessment of the amount.", "cmt_tr": "The condition is known and the external auditors should be told more than that a possibility of a shortage exists.", "cmt_en": "The condition is known and the external auditors should be told more than that a possibility of a shortage exists."}, {"tr": "Communicate the shortages to the board and allow them to communicate it to the external auditor.", "en": "Communicate the shortages to the board and allow them to communicate it to the external auditor.", "cmt_tr": "Information should be shared and activities coordinated with the external auditor.", "cmt_en": "Information should be shared and activities coordinated with the external auditor."}], "answer": 1}, {"q_tr": "During an engagement, an internal auditor learned that certain individuals in the organization were involved in industrial espionage for the benefit of the organization. According to The IIA’s Standards of Ethics and Professionalism, what is the internal auditor’s proper course of action?", "q_en": "During an engagement, an internal auditor learned that certain individuals in the organization were involved in industrial espionage for the benefit of the organization. According to The IIA’s Standards of Ethics and Professionalism, what is the internal auditor’s proper course of action?", "options": [{"tr": "Report the facts to the appropriate individuals within the organization.", "en": "Report the facts to the appropriate individuals within the organization.", "cmt_tr": "Standard 1.1 Honesty and Professional Courage states, “internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” Standard 1.3 Legal and Ethical Behavior states, “internal auditors must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession of internal auditing or that may harm the organization or its employees.” Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Standard 1.1 Honesty and Professional Courage states, “internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” Standard 1.3 Legal and Ethical Behavior states, “internal auditors must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession of internal auditing or that may harm the organization or its employees.” Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "No action is required because this condition is not detrimental to the organization.", "en": "No action is required because this condition is not detrimental to the organization.", "cmt_tr": "Internal auditors must report material facts that, if not disclosed, could distort the reporting of activities. They also may not knowingly be a party to an illegal activity.", "cmt_en": "Internal auditors must report material facts that, if not disclosed, could distort the reporting of activities. They also may not knowingly be a party to an illegal activity."}, {"tr": "Note the condition in the working papers but refrain from reporting it because it benefits the organization.", "en": "Note the condition in the working papers but refrain from reporting it because it benefits the organization.", "cmt_tr": "Internal auditors may not knowingly be a party to an illegal activity.", "cmt_en": "Internal auditors may not knowingly be a party to an illegal activity."}, {"tr": "Report the condition to the appropriate governmental regulatory agency.", "en": "Report the condition to the appropriate governmental regulatory agency.", "cmt_tr": "Internal auditors ordinarily are not required to disclose voluntarily any illegal or improper acts to outside individuals or organizations. They should try to work within their organizations. However, they should make any disclosures expected by the law or by the profession.", "cmt_en": "Internal auditors ordinarily are not required to disclose voluntarily any illegal or improper acts to outside individuals or organizations. They should try to work within their organizations. However, they should make any disclosures expected by the law or by the profession."}], "answer": 0}, {"q_tr": "Which of the following items is a violation by an internal auditor of The IIA’s Standards of Ethics and Professionalism?", "q_en": "Which of the following items is a violation by an internal auditor of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Certain facts recorded in the internal auditor’s working papers that helped to support the basic allegations made by the internal auditor regarding a case of fraud were not included in the final engagement communication.", "en": "Certain facts recorded in the internal auditor’s working papers that helped to support the basic allegations made by the internal auditor regarding a case of fraud were not included in the final engagement communication.", "cmt_tr": "Immaterial facts need not be included.", "cmt_en": "Immaterial facts need not be included."}, {"tr": "Information in the internal auditor’s working papers that proved a criminal act was included in the internal auditor’s draft communication. The comments were later removed by internal audit management.", "en": "Information in the internal auditor’s working papers that proved a criminal act was included in the internal auditor’s draft communication. The comments were later removed by internal audit management.", "cmt_tr": "The ethical transgression, if any, was not made by the internal auditor but by internal audit management.", "cmt_en": "The ethical transgression, if any, was not made by the internal auditor but by internal audit management."}, {"tr": "To keep the engagement effort within the budgeted time, the internal auditor was directed to and did curtail testing in an area that looked suspicious and later was proved to contain massive irregularities.", "en": "To keep the engagement effort within the budgeted time, the internal auditor was directed to and did curtail testing in an area that looked suspicious and later was proved to contain massive irregularities.", "cmt_tr": "The ethical transgression, if any, was not made by the internal auditor but by internal audit management.", "cmt_en": "The ethical transgression, if any, was not made by the internal auditor but by internal audit management."}, {"tr": "A control system that had been recommended by the internal audit staff during the previous engagement was found to be defective. The internal auditor reported the defective function as an engagement client failure.", "en": "A control system that had been recommended by the internal audit staff during the previous engagement was found to be defective. The internal auditor reported the defective function as an engagement client failure.", "cmt_tr": "An internal auditor is ethically obligated to disclose all material facts known to him or her. In this case, the internal auditor knew that the internal audit staff had recommended a control system that was defective. The internal auditor also reported this defect as the client’s failure. By not reporting that the internal audit staff had recommended the system, the internal auditor violated Standard 1.1. It requires an internal auditor to report all material facts known to him or her that if not disclosed may distort the report of activities under review. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity Fact Pattern: The chief audit executive (CAE) of a mid-sized internal audit function was concerned that management might outsource the internal auditing function. Thus, the CAE adopted a very aggressive program to promote the internal audit function within the organization. The CAE planned to present the results to senior management and the board and recommend modification of the internal audit function’s charter after using the new program. The following lists six actions the CAE took to promote a positive image within the organization: 1. Engagement assignments concentrated on efficiency. The engagements focused solely on cost savings, and each engagement communication highlighted potential costs to be saved. Negative findings were omitted. The focus on efficiency was new, but the management of the activities under review seemed very happy. 2. Drafts of all engagement communications were carefully reviewed with the management of the activities under review to get their input. Their comments were carefully considered when developing the final engagement communication. 3. The information technology internal auditor participated as part of a development team to review the control procedures to be incorporated into a major computer application under development. 4. Given limited resources, the engagement supervisor performed a risk assessment to establish engagement work schedule priorities. This was a marked departure from the previous approach of ensuring that all operations are evaluated on at least a 3-year interval. 5. To save time, the CAE no longer required that a standard internal control questionnaire be completed for each engagement. 6. When the internal auditors found that the management of the activity under review had not developed specific criteria or data to evaluate operations, the internal auditors were instructed to perform research, develop specific criteria, review the criteria with the management of the activity, and, if acceptable, use them to evaluate the activity’s operations. If the management disagreed with the criteria, a negotiation took place until acceptable criteria could be agreed upon. The engagement communication commented on the activity’s operations in conjunction with the agreed-upon criteria.", "cmt_en": "An internal auditor is ethically obligated to disclose all material facts known to him or her. In this case, the internal auditor knew that the internal audit staff had recommended a control system that was defective. The internal auditor also reported this defect as the client’s failure. By not reporting that the internal audit staff had recommended the system, the internal auditor violated Standard 1.1. It requires an internal auditor to report all material facts known to him or her that if not disclosed may distort the report of activities under review. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity Fact Pattern: The chief audit executive (CAE) of a mid-sized internal audit function was concerned that management might outsource the internal auditing function. Thus, the CAE adopted a very aggressive program to promote the internal audit function within the organization. The CAE planned to present the results to senior management and the board and recommend modification of the internal audit function’s charter after using the new program. The following lists six actions the CAE took to promote a positive image within the organization: 1. Engagement assignments concentrated on efficiency. The engagements focused solely on cost savings, and each engagement communication highlighted potential costs to be saved. Negative findings were omitted. The focus on efficiency was new, but the management of the activities under review seemed very happy. 2. Drafts of all engagement communications were carefully reviewed with the management of the activities under review to get their input. Their comments were carefully considered when developing the final engagement communication. 3. The information technology internal auditor participated as part of a development team to review the control procedures to be incorporated into a major computer application under development. 4. Given limited resources, the engagement supervisor performed a risk assessment to establish engagement work schedule priorities. This was a marked departure from the previous approach of ensuring that all operations are evaluated on at least a 3-year interval. 5. To save time, the CAE no longer required that a standard internal control questionnaire be completed for each engagement. 6. When the internal auditors found that the management of the activity under review had not developed specific criteria or data to evaluate operations, the internal auditors were instructed to perform research, develop specific criteria, review the criteria with the management of the activity, and, if acceptable, use them to evaluate the activity’s operations. If the management disagreed with the criteria, a negotiation took place until acceptable criteria could be agreed upon. The engagement communication commented on the activity’s operations in conjunction with the agreed-upon criteria."}], "answer": 3}, {"q_tr": "Which of the following elements of Action 1 taken by the CAE would be considered inappropriate? 1. The type of engagement was changed before modifying the internal audit function’s charter and going to the audit committee. 2. Negative findings were omitted from the engagement communications. 3. Cost savings and recommendations were highlighted in the engagement communication.", "q_en": "Which of the following elements of Action 1 taken by the CAE would be considered inappropriate? 1. The type of engagement was changed before modifying the internal audit function’s charter and going to the audit committee. 2. Negative findings were omitted from the engagement communications. 3. Cost savings and recommendations were highlighted in the engagement communication.", "options": [{"tr": "1 and 2.", "en": "1 and 2.", "cmt_tr": "The CAE dramatically changed internal audit’s scope of work without consulting the board. A second violation is the omission of negative findings. Under The IIA’s Standards of Ethics and Professionalism, the auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review.", "cmt_en": "The CAE dramatically changed internal audit’s scope of work without consulting the board. A second violation is the omission of negative findings. Under The IIA’s Standards of Ethics and Professionalism, the auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review."}, {"tr": "1 and 3.", "en": "1 and 3.", "cmt_tr": "Highlighting potential cost savings is appropriate for an engagement communication, and material negative findings must not be omitted.", "cmt_en": "Highlighting potential cost savings is appropriate for an engagement communication, and material negative findings must not be omitted."}, {"tr": "1 only.", "en": "1 only.", "cmt_tr": "Omitting negative findings is also a violation.", "cmt_en": "Omitting negative findings is also a violation."}, {"tr": "2 and 3. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "en": "2 and 3. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_tr": "The CAE dramatically changed internal audit’s scope of work without consulting with the board. Moreover, highlighting potential cost savings is appropriate for an engagement communication.", "cmt_en": "The CAE dramatically changed internal audit’s scope of work without consulting with the board. Moreover, highlighting potential cost savings is appropriate for an engagement communication."}], "answer": 0}, {"q_tr": "As part of a compliance audit in a financial services firm, an internal auditor encounters a situation where senior management is exerting pressure to downplay certain risk findings to align with their strategic objectives. How should the auditor address this ethical dilemma while maintaining professional integrity?", "q_en": "As part of a compliance audit in a financial services firm, an internal auditor encounters a situation where senior management is exerting pressure to downplay certain risk findings to align with their strategic objectives. How should the auditor address this ethical dilemma while maintaining professional integrity?", "options": [{"tr": "Comply with management’s request to preserve the firm’s strategic interests.", "en": "Comply with management’s request to preserve the firm’s strategic interests.", "cmt_tr": "Complying with management’s request compromises the auditor’s independence and integrity.", "cmt_en": "Complying with management’s request compromises the auditor’s independence and integrity."}, {"tr": "Report the pressure to downplay findings to the audit committee and ensure transparency.", "en": "Report the pressure to downplay findings to the audit committee and ensure transparency.", "cmt_tr": "Feedback from audit findings and organizational changes refines evaluation and prioritization criteria. Auditors must uphold integrity and objectivity, ensuring that all findings are reported accurately. Reporting the pressure to the audit committee ensures transparency and maintains the auditor’s professional integrity while addressing the ethical dilemma. This approach supports a culture of honesty and accountability.", "cmt_en": "Feedback from audit findings and organizational changes refines evaluation and prioritization criteria. Auditors must uphold integrity and objectivity, ensuring that all findings are reported accurately. Reporting the pressure to the audit committee ensures transparency and maintains the auditor’s professional integrity while addressing the ethical dilemma. This approach supports a culture of honesty and accountability."}, {"tr": "Alter the findings slightly to satisfy management and maintain a good working relationship.", "en": "Alter the findings slightly to satisfy management and maintain a good working relationship.", "cmt_tr": "Altering findings undermines the auditor’s credibility and violates ethical standards.", "cmt_en": "Altering findings undermines the auditor’s credibility and violates ethical standards."}, {"tr": "Do not report the pressure and proceed with the audit.", "en": "Do not report the pressure and proceed with the audit.", "cmt_tr": "Ignoring the pressure does not resolve the ethical issue and fails to communicate important findings.", "cmt_en": "Ignoring the pressure does not resolve the ethical issue and fails to communicate important findings."}], "answer": 1}], "SU2 - Objectivity": [{"q_tr": "Maintaining individual objectivity is most dependent on", "q_en": "Maintaining individual objectivity is most dependent on", "options": [{"tr": "Clearly informing auditee departments and functions of The IIA definition of conflict of interest.", "en": "Clearly informing auditee departments and functions of The IIA definition of conflict of interest.", "cmt_tr": "The responsibility rests with the CAE and with internal auditors themselves to maintain a sense of objectivity.", "cmt_en": "The responsibility rests with the CAE and with internal auditors themselves to maintain a sense of objectivity."}, {"tr": "An annual evaluation by the board.", "en": " ) and electronic funds transfer (EFT) transactions. Before transfer of data to the VAN, the organization performs online preprocessing of the transactions. The internal auditor is responsible for assessing preprocessing controls. In addition, the agreement between the organization and the VAN states that the internal auditor is allowed to examine and report on the controls in place at the VAN on an annual basis. The contract specifies that access to the VAN can occur on a surprise basis during the second or third quarter of the fiscal year. This period was chosen so it would not interfere with processing during the VAN’s peak transaction periods. This provision was not reviewed with internal auditing. The annual engagement work schedule approved by the board of directors specifies that a full review would be done during the current year. When the internal auditor called to arrange the annual control review during the third quarter, the VAN stated that it could not accommodate the internal auditor because the peak processing period started earlier than normal this year and all VAN personnel were occupied. This scope limitation, along with its potential effect, must be communicated to which one of the following?", "q_en": "A multinational organization has an agreement with a value-added network (VAN) that provides the encoding and communications transfer for the organization’s electronic data interchange (EDI) and electronic funds transfer (EFT) transactions. Before transfer of data to the VAN, the organization performs online preprocessing of the transactions. The internal auditor is responsible for assessing preprocessing controls. In addition, the agreement between the organization and the VAN states that the internal auditor is allowed to examine and report on the controls in place at the VAN on an annual basis. The contract specifies that access to the VAN can occur on a surprise basis during the second or third quarter of the fiscal year. This period was chosen the major reason for the internal auditor’s involvement in information systems development.", "cmt_en": "Gaining familiarity with systems for use in subsequent reviews is not the major reason for the internal auditor’s involvement in information systems development."}, {"tr": "Help assure that systems have adequate control procedures.", "en": "Help assure that systems have adequate control procedures.", "cmt_tr": "The internal audit function evaluates and improves risk management, control, and governance processes. The internal auditor’s objectivity is not impaired when the auditor recommends standards of control for systems or reviews procedures before they are implemented. The auditor’s objectivity is considered to be impaired if the auditor designs, installs, or drafts procedures for such systems. Such services may create a conflict of interest, a situation in which internal auditors have a competing professional or personal interest. This may create an appearance of impropriety that undermines confidence in the internal audit function (Standard 2.2).", "cmt_en": "The internal audit function evaluates and improves risk management, control, and governance processes. The internal auditor’s objectivity is not impaired when the auditor recommends standards of control for systems or reviews procedures before they are implemented. The auditor’s objectivity is considered to be impaired if the auditor designs, installs, or drafts procedures for such systems. Such services may create a conflict of interest, a situation in which internal auditors have a competing professional or personal interest. This may create an appearance of impropriety that undermines confidence in the internal audit function (Standard 2.2)."}, {"tr": "Help minimize the cost and development time for new systems.", "en": "Help minimize the cost and development time for new systems.", "cmt_tr": "Minimizing the cost and development time for new systems is not the major reason for the internal auditor’s
