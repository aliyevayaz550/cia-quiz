<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CIA Quiz – Unit 5</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-group {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.3);
  margin-left: 10px;
}
.lang-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .5px; padding: 5px 9px; cursor: pointer; border: none;
  background: rgba(255,255,255,.10); color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
}
.lang-btn + .lang-btn { border-left: 1px solid rgba(255,255,255,.15); }
.lang-btn.active { background: var(--gold) !important; color: var(--navy) !important; }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── HISTORY SECTION ─────────────────────────────────── */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 5</div>
    <div id="score-badge">0 / 0</div>
    <div id="lang-group">
      <button class="lang-btn active" onclick="setLang('tr')" data-lang="tr">TR</button>
      <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
    </div>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">105 sual</span>
    </div>
  </div>
</div>

<div id="main">

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Integrity": [{"q_tr": "İç denetçiler, raporlamalarında IIA Etik ve Profesyonellik Standartları gereği ne yapmalıdır?", "q_en": "In their reporting, internal auditors are required by The IIA’s Standards of Ethics and Professionalism to", "options": [{"tr": "Kuruluşa zarar verebilecek gizli bilgileri açıklamadan yeterli olgusal bilgi sunmak.", "en": "Present sufficient factual information without revealing confidential matters that could be detrimental to the organization.", "cmt_tr": "Standartlar yalnızca iç denetçilerin bilgilerin kullanımı ve korunmasında tedbirli olmasını gerektirir.", "cmt_en": "The Standards require only that internal auditors be prudent in the use and protection of information."}, {"tr": "Son denetim raporunun tarihi itibarıyla denetçi tarafından elde edilen tüm önemli bilgilerin açıklanması.", "en": "Disclose all material information obtained by the auditor as of the date of the final engagement communication.", "cmt_tr": "Standartlar açıklamayı bu kadar ayrıntılı ele almaz.", "cmt_en": "The Standards do not address disclosure this specifically."}, {"tr": "Belirlenen zaman ve bütçe parametreleri dahilinde olgusal bilgi elde etmek.", "en": "Obtain factual information within the established time and budget parameters.", "cmt_tr": "Zaman ve bütçe parametreleri Standartlarda ele alınmaz.", "cmt_en": "Time and budget parameters are not addressed in the Standards."}, {"tr": "Son denetim raporunu bozabilecek olan ve iç denetçi tarafından bilinen önemli olguların açıklanması.", "en": "Disclose material facts known to the internal auditor that could distort the final engagement communication if not revealed.", "cmt_tr": "Standart 1.1 Dürüstlük ve Mesleki Cesaret, \"İç denetçiler, açıklanmaması halinde kuruluşun bilinçli kararlar almasını engelleyebilecek tüm önemli olguları açıklamalıdır\" ifadesini içerir.", "cmt_en": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”"}], "answer": 3}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarına göre, dürüstlük ilkesi iç denetçilerden aşağıdakilerden hangisini yapmasını gerektirir?", "q_en": "According to The IIA Standards of Ethics and Professionalism, the principle of integrity requires internal auditors to do which of the following?", "options": [{"tr": "Yeterliliklerini, etkinliklerini ve hizmet kalitelerini sürekli olarak geliştirmek.", "en": "Continually improve their proficiency, effectiveness, and quality of services.", "cmt_tr": "Yetkinlik ilkesi kapsamındaki Standart 3.2, \"İç denetçiler yeterliliklerini ve hizmetlerinin etkinliğini ve kalitesini sürekli olarak geliştirmelidir\" ifadesini içerir.", "cmt_en": "Standard 3.2 under the competency principle states, “Internal auditors shall continually improve their proficiency and the effectiveness and quality of their services.”"}, {"tr": "Görevleri sırasında elde edilen bilgilerin kullanımı ve korunmasında tedbirli olmak.", "en": "Be prudent in the use and protection of the information acquired in the course of their duties.", "cmt_tr": "Gizlilik ilkesi kapsamındaki Standart 5.2, \"İç denetçiler, bilgilerin korunmasına ilişkin sorumluluklarının farkında olmalı ve iç denetim hizmetleri sırasında veya mesleki ilişkiler sonucunda elde edilen bilgilerin gizliliğine, mahremiyetine ve mülkiyetine saygı göstermelidir\" ifadesini içerir.", "cmt_en": "Standard 5.2 under the confidentiality principle states, “Internal auditors must be aware of their responsibilities for protecting information and demonstrate respect for the confidentiality, privacy, and ownership of information acquired when performing internal audit services or as the result of professional relationships.”"}, {"tr": "Mesleki yargılarını bozabilecek veya bozduğu varsayılabilecek hiçbir şeyi kabul etmemek.", "en": "Not accept anything that may impair or be presumed to impair their professional judgment.", "cmt_tr": "Nesnellik ilkesi kapsamındaki Standart 2.2, \"İç denetçiler, nesnelliği bozabilecek veya bozduğu varsayılabilecek hediye, ödül veya iyilik gibi maddi veya manevi hiçbir şeyi kabul etmemelidir\" ifadesini içerir. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Standard 2.2 under the objectivity principle states, “Internal auditors must not accept any tangible or intangible item, such as a gift, reward, or favor, that may impair or be presumed to impair objectivity.” Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Kuruluşun meşru ve etik amaçlarına saygı göstermek ve katkıda bulunmak.", "en": "Respect and contribute to the legitimate and ethical objectives of the organization.", "cmt_tr": "Dürüstlük ilkesi kapsamındaki Standart 1.2, \"İç denetçiler kuruluşun meşru ve etik amaçlarına saygı göstermeli ve katkıda bulunmalıdır\" ifadesini içerir.", "cmt_en": "Standard 1.2 under the integrity principle states, “Internal auditors shall respect and contribute to the legitimate and ethical objectives of the organization.”"}], "answer": 3}, {"q_tr": "Günümüz iç denetçisi, hepsi IIA Etik ve Profesyonellik Standartlarında açıkça ele alınmayan geniş bir yelpazede potansiyel etik ikilemlerle karşılaşabilir. İç denetçi böyle bir ikilemle karşılaştığında her zaman ne yapmalıdır?", "q_en": "Today’s internal auditor will often encounter a wide range of potential ethical dilemmas, not all of which are explicitly addressed by The IIA’s Standards of Ethics and Professionalism. If the internal auditor encounters such a dilemma, the internal auditor should always", "options": [{"tr": "Potansiyel eylemlerin kişisel sonuçlarını belirlemek için bağımsız bir avukattan danışmanlık almak.", "en": "Seek counsel from an independent attorney to determine the personal consequences of potential actions.", "cmt_tr": "Tüm etik kararlar için hukuk danışmanından görüş almak pratik değildir.", "cmt_en": "Seeking the advice of legal counsel on all ethical decisions is impracticable."}, {"tr": "IIA Etik ve Profesyonellik Standartlarında yer alan ilkeleri uygulamak ve desteklemek.", "en": "Apply and uphold the principles embodied in The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "İç denetçilerin Etik ve Profesyonellik Standartlarındaki ilkeleri uygulaması ve desteklemesi beklenir. Ayrıca, belirli bir davranışın Standartlarda belirtilmemiş olması, onun kabul edilemez veya saygınlığı zedeleyici olmasını engellemez.", "cmt_en": "Internal auditors are expected to apply and uphold the principles in the Standards of Ethics and Professionalism. Furthermore, that a particular conduct is not mentioned in the Standards does not prevent it from being unacceptable or discreditable."}, {"tr": "Bir eylem kararı vermeden önce yönetim kurulundan danışmanlık almak.", "en": "Seek the counsel of the board before deciding on an action.", "cmt_tr": "Tüm etik kararlar için yönetim kurulundan görüş almak pratik değildir. Ayrıca, verilen tavsiye mesleğin standartlarıyla tutarsız olabilir.", "cmt_en": "Seeking the advice of the board on all ethical decisions is impracticable. Furthermore, the advice might not be consistent with the profession’s standards."}, {"tr": "IIA Etik ve Profesyonellik Standartlarıyla tutarsız olsa bile kuruluşun benimsediği etik kurallarına uygun hareket etmek.", "en": "Act consistently with the code of ethics adopted by the organization even if such action is not consistent with The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "Kuruluşun standartları mesleğin standartlarıyla tutarsız veya onlar kadar yüksek değilse, iç denetçi mesleğin standartlarına bağlıdır.", "cmt_en": "If the organization’s standards are not consistent with, or as high as, the profession’s standards, the internal auditor is held to the standards of the profession."}], "answer": 1}, {"q_tr": "Aşağıdaki durumlardan hangisi IIA Etik ve Profesyonellik Standartlarının ihlalidir?", "q_en": "Which of the following situations is a violation of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Bir iç denetçi, yönetimin bilgisi ve onayıyla, mesleki yargıyı bozmayan ve bozduğu varsayılmayan sembolik bir hediyeyi kuruluşun müşterisinden kabul etmiştir.", "en": "An internal auditor, with the knowledge and consent of management, accepted a token gift from a customer of the organization that was not presumed to impair and did not impair judgment.", "cmt_tr": "Müşteriden hediye kabulü, yalnızca mesleki yargıyı bozması veya bozduğu varsayılması halinde yasaklanır.", "cmt_en": "Acceptance of a gift from a customer is prohibited but only if it would impair or be presumed to impair professional judgment."}, {"tr": "Yönetimin durumun farkında olduğunu bilerek, bir iç denetçi kasıtlı olarak yasadışı bir uygulamanın açıklamasını son denetim raporunun dışında bırakmıştır.", "en": "Knowing that management was aware of the situation, an internal auditor purposely left a description of an unlawful practice out of the final engagement communication.", "cmt_tr": "Standart 1.1 Dürüstlük ve Mesleki Cesaret, \"İç denetçiler, açıklanmaması halinde kuruluşun bilinçli kararlar almasını engelleyebilecek tüm önemli olguları açıklamalıdır\" ifadesini içerir. Standart 1.3 Yasal ve Etik Davranış, yasadışı faaliyetlerin göz ardı edilmesini saygınlığı zedeleyici bir eylem olarak nitelendirir ve iç denetçiler yasa dışı veya kuruluşun saygınlığını zedeleyici hiçbir faaliyete dahil olmamalıdır.", "cmt_en": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” Standard 1.3 Legal and Ethical Behavior cites overlooking illegal activities as a discreditable act and internal auditors must not be involved in any activity that is illegal or discreditable to the organization."}, {"tr": "Bir iç denetçi, başka bir kuruluşun iç denetçileriyle teknikler paylaşmıştır.", "en": "An internal auditor shared techniques with internal auditors from another organization.", "cmt_tr": "Yetkinlik ilkesi, iç denetçilerin yeterliliklerini ve hizmetlerinin etkinliğini ve kalitesini sürekli geliştirmesini gerektirir.", "cmt_en": "The competency principle requires internal auditors to continually improve their proficiency and the effectiveness and quality of their services."}, {"tr": "İşverenin işinin muhtemel başarısına ilişkin bilgiye dayanarak, bir iç denetçi aynı sektörde uzmanlaşmış bir yatırım fonuna yatırım yapmıştır. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "en": "Based upon knowledge of the probable success of the employer’s business, an internal auditor invested in a mutual fund that specialized in the same industry. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_tr": "İç denetçinin gizli bilgileri kişisel kazanç için kullanması yasaklanmış olsa ve kuruluşun hisse senedine yatırım sorgulanabilir olsa da, bir yatırım fonuna yatırım kabul edilebilir.", "cmt_en": "Although an internal auditor is prohibited from using confidential information for personal gain, and an investment in the organization’s stock would be questionable, an investment in a mutual fund is acceptable."}], "answer": 1}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarına uyum sağlarken, bir iç denetçi ne yapmalıdır?", "q_en": "In complying with The IIA’s Standards of Ethics and Professionalism, an internal auditor should", "options": [{"tr": "Standartlarda belirtilen ilkelerin uygulanmasında bireysel yargı kullanmak.", "en": "Use individual judgment in the application of the principles set forth in the Standards.", "cmt_tr": "IIA Etik ve Profesyonellik Standartları, iç denetçilerin uygulaması ve desteklemesi beklenen ilkeleri içerir. Belirli bir davranışın belirtilmemiş olması, onun kabul edilemez veya saygınlığı zedeleyici olmasını engellemez. Bu nedenle, ilkelerin uygulanmasında bireysel yargının gerekli olduğu makul bir çıkarımdır.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism include principles that internal auditors are expected to apply and uphold. That a particular conduct is not mentioned does not prevent it from being unacceptable or discreditable. Thus, a reasonable inference is that individual judgment is necessary in the application of the principles."}, {"tr": "Yasadışı faaliyetlerde bulunsa bile kuruluşun amaçlarına saygı göstermek ve katkıda bulunmak.", "en": "Respect and contribute to the objectives of the organization even if it is engaged in illegal activities.", "cmt_tr": "İç denetçi \"yasadışı veya kuruluş ya da meslek için saygınlığı zedeleyici olan hiçbir faaliyete katılmamalı veya taraf olmamalıdır.\" Ayrıca, iç denetçi yalnızca kuruluşun meşru ve etik amaçlarına saygı göstermek ve katkıda bulunmakla yükümlüdür. (Standart 1.3)", "cmt_en": "An internal auditor “must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession.” Furthermore, an internal auditor is bound to respect and contribute only to the legitimate and ethical objectives of the organization. (Standard 1.3)"}, {"tr": "Kuruluşun çıkarlarını ilerletmek için kişisel teknik beceri sınırlamalarının ötesine geçmek.", "en": "Go beyond the limitation of personal technical skills to advance the interest of the organization.", "cmt_tr": "İç denetçiler \"yalnızca gerekli yetkinliklere sahip oldukları veya sahip olabilecekleri hizmetlerde bulunmalıdır\" (Standart 3.1).", "cmt_en": "Internal auditors “must engage only in those services for which they have or can attain the necessary competencies” (Standard 3.1)."}, {"tr": "Güven oluşturmada öncelikli olarak yetkinlik ilkesini uygulamak.", "en": "Primarily apply the competency principle in establishing trust.", "cmt_tr": "Dürüstlük ilkesinin uygulanması ve desteklenmesi, iç denetçinin yargısına güvenmenin temelini oluşturur. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Applying and upholding the integrity principle is the means by which an internal auditor establishes trust as a basis for reliance on his or her judgment. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}], "answer": 0}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarında açıkça ele alınmayan bir etik ikilemle karşılaşan bir iç denetçi her zaman ne yapmalıdır?", "q_en": "An internal auditor who encounters an ethical dilemma not explicitly addressed by The IIA’s Standards of Ethics and Professionalism should always", "options": [{"tr": "Potansiyel eylemlerin kişisel sonuçlarını belirlemek için bağımsız bir avukattan danışmanlık almak.", "en": "Seek counsel from an independent attorney to determine the personal consequences of potential actions.", "cmt_tr": "Denetçi, IIA Etik ve Profesyonellik Standartlarının ruhuyla tutarlı hareket etmelidir. Tüm etik kararlar için hukuk danışmanından görüş almak pratik değildir. Dahası, etik olmayan davranış yasadışı olmayabilir.", "cmt_en": "The auditor must act consistently with the spirit of The IIA’s Standards of Ethics and Professionalism. It is not practical to seek the advice of legal counsel for all ethical decisions. Moreover, unethical behavior may not be illegal."}, {"tr": "IIA Etik ve Profesyonellik Standartlarında yer alan ilkelerle tutarlı hareket etmek.", "en": "Take action consistent with the principles embodied in The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "IIA Etik ve Profesyonellik Standartları, iç denetim mesleği ve uygulamasıyla ilgili olup iç denetçilerin uygulaması ve desteklemesi beklenen ilkelere dayanır: dürüstlük, nesnellik, yetkinlik, mesleki özen ve gizlilik. Ayrıca Standartlar, belirli bir davranışın Standartlarda belirtilmemiş olmasının onun kabul edilemez veya saygınlığı zedeleyici olmasını engellemeyeceğini ifade eder.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism are based on principles relevant to the profession and practice of internal auditing that internal auditors are expected to apply and uphold: integrity, objectivity, competency, due professional care, and confidentiality. Furthermore, the Standards state that particular conduct may be unacceptable or discreditable even if it is not mentioned in the Standards."}, {"tr": "Bir eylem kararı vermeden önce denetim komitesinden danışmanlık almak.", "en": "Seek the counsel of the audit committee before deciding on an action.", "cmt_tr": "Tüm potansiyel ikilemler için denetim komitesinin tavsiyesini almak uygulanabilir değildir. Ayrıca, verilen tavsiye mesleğin standartlarıyla tutarsız olabilir.", "cmt_en": "It is not feasible to seek the audit committee’s advice for all potential dilemmas. Furthermore, the advice might not be consistent with the profession’s standards."}, {"tr": "IIA Etik ve Profesyonellik Standartlarıyla tutarsız olsa bile istihdam eden kuruluşun etik kurallarına uygun hareket etmek.", "en": "Act consistently with the employing organization’s code of ethics even if such action would not be consistent with The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "Kuruluşun standartları mesleğin standartlarıyla tutarsız veya onlar kadar yüksek değilse, iç denetçi mesleğin standartlarına uymalıdır.", "cmt_en": "If the organization’s standards are not consistent with, or as high as, the profession’s standards, the internal auditor should abide by the latter."}], "answer": 1}, {"q_tr": "İç denetçiler çalışma kağıtlarında matematik hataları keşfetmiştir. Hataların raporlanması kapsamlı bir yeniden çalışma gerektirecektir. Hiçbir şey söylemememeye ve hataları düzeltmemeye karar verirler. İç denetçilerin eylemleri IIA Etik ve Profesyonellik Standartlarını ihlal etmektedir. Ne yapmakta başarısız oldular?", "q_en": "Internal auditors have discovered mathematical errors in their workpapers. Reporting the errors would require an extensive amount of rework. They decide to say nothing and not correct the errors. The internal auditors' actions violate The IIA's Standards of Ethics and Professionalism. What did they fail to do?", "options": [{"tr": "Yasaya uymak ve yasa ve meslek tarafından beklenen açıklamaları yapmak.", "en": "Observe the law and report the disclosures expected by the law and the profession.", "cmt_tr": "İç denetçilerin çalışma kağıtlarındaki hataları raporlamaması, yasaya uymama anlamına gelmez.", "cmt_en": "Failure to report errors in the internal auditors' workpapers is not a failure to observe the law."}, {"tr": "Görevleri sırasında elde edilen bilgileri korumak.", "en": "Protect the information acquired in the course of their duties.", "cmt_tr": "Denetçilerin görevleri sırasında elde ettikleri bilgilerin korunmadığına dair bir belirti yoktur.", "cmt_en": "Nothing indicates that information the auditors acquired while performing their duties was not protected."}, {"tr": "İşi dürüstlük ve mesleki cesaretle yerine getirmek.", "en": "Perform the work with honesty and professional courage.", "cmt_tr": "Standart 1.1 Dürüstlük ve Mesleki Cesaret, iç denetçilerin doğru, dürüst, açık ve saygılı olmasını gerektirir. Hataları düzeltmemeye karar vererek, denetçiler işlerini dürüstlük ve mesleki cesaretle yerine getirmekte başarısız olmuşlardır.", "cmt_en": "Standard 1.1 Honesty and Professional Courage requires internal auditors to be truthful, accurate, clear, open, and respectful. By deciding to not correct the errors, the auditors failed to perform their work with honesty and professional courage."}, {"tr": "Yeterli bilgi ve deneyime sahip oldukları hizmetlerde bulunmak.", "en": "Engage in services for which they have sufficient knowledge and experience.", "cmt_tr": "Çalışma kağıtlarındaki bir hata, iç denetçilerin yetkinliğinin göstergesi değildir, ancak yargıları sorgulanabilir.", "cmt_en": "An error in the workpapers is not an indication of the internal auditors' competency, although their judgment is questionable."}], "answer": 2}, {"q_tr": "Yeni işe alınan bir İDY, CFO'nun kişisel harcamalarını kuruluş üzerinden ödediğini keşfetmiştir. Daha ileri araştırma sonucu, CFO'nun bu harcamaları araştırma ve geliştirme maliyetleri olarak sunduğunu tespit etmiştir. CFO 15 yıldır kuruluşta çalışmaktadır. İDY durumu derhal denetim komitesine bildirmiştir. İDY:", "q_en": "A newly hired CAE discovered the CFO is paying personal expenses through the organization. Upon further investigation, the CAE found that the CFO is submitting these expenses as research and development costs. The CFO has worked for the organization for 15 years. The CAE immediately notified the audit committee. The CAE", "options": [{"tr": "Standartların gizlilik ilkesini ihlal etmiştir.", "en": "Violated the Standards principle of confidentiality.", "cmt_tr": "İDY'nin bu keşifleri denetim komitesine raporlamasıyla gizlilik ilkesi ihlal edilmemiştir. Bildirim, hile ve yasa/düzenleme uyumsuzluğu konusunda yönetişimden sorumlu olanlara yapılmıştır.", "cmt_en": "The principle of confidentiality was not violated by the CAE reporting these discoveries to the audit committee. The communication was to those charged with governance of fraud and noncompliance with laws and regulations."}, {"tr": "Standartların dürüstlük ilkesini ihlal etmiştir.", "en": "Violated the Standards principle of integrity.", "cmt_tr": "Olası hileyi gecikmeksizin raporlamak, dürüstlük ilkesinin ihlali değildir.", "cmt_en": "Reporting without delay possible fraud is not a violation of the integrity principle."}, {"tr": "Standartların nesnellik ilkesini ihlal etmiştir.", "en": "Violated the Standards principle of objectivity.", "cmt_tr": "Nesnellik ilkesi, paydaşlara tarafsız bilgi sunma ve çıkar çatışmalarından bağımsız olma taahhüdüdür. Olası bir hile konusunu raporlamak, nesnellik ilkesini desteklemiştir.", "cmt_en": "The principle of objectivity is a commitment to providing stakeholders with unbiased information and a commitment to independence from conflicts of interest. Reporting an issue of possible fraud upheld the principle of objectivity."}, {"tr": "Standartların dürüstlük ilkesini desteklemiştir.", "en": "Upheld the Standards principle of integrity.", "cmt_tr": "Standart 1.2 Kuruluşun Etik Beklentilerine göre, bir iç denetçi üst yönetimin bir üyesinin kuruluşun etik beklentileriyle tutarsız davrandığını tespit ederse, İDY ihlali yönetim kuruluna raporlamalıdır. İDY, durumu zamanında denetim komitesine bildirerek dürüstlük ilkesini desteklemiştir.", "cmt_en": "According to Standard 1.2 Organization’s Ethical Expectations, if an internal auditor determines that a member of senior management has behaved in a manner inconsistent with the organization’s ethical expectations, the CAE should report the violation to the board. The CAE upheld the principle of integrity by timely notifying the audit committee."}], "answer": 3}, {"q_tr": "Yasaya uyan ve yasa tarafından beklenen açıklamaları yapan bir denetçi, IIA Standartlarının hangi ilkesini takip etmektedir?", "q_en": "An auditor who observes the law and makes disclosures expected by the law is following The IIA’s Standards principle of", "options": [{"tr": "Sorumluluk.", "en": "Responsibility.", "cmt_tr": "Sorumluluk, IIA Standartlarının bir ilkesi değildir. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Responsibility is not a principle of The IIA’s Standards. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Dürüstlük.", "en": "Integrity.", "cmt_tr": "İç denetçilerin dürüstlüğü güven tesis eder ve böylece yargılarına güvenmenin temelini oluşturur. Dürüstlük ilkesi kapsamındaki Standart 1.3, \"İç denetçiler, kuruluşun faaliyet gösterdiği sektör ve yargı alanlarıyla ilgili yasa ve/veya düzenlemeleri anlamalı ve bunlara uymalıdır; gerektiğinde açıklamalar yapmalıdır\" ifadesini içerir.", "cmt_en": "The integrity of internal auditors establishes trust and thus provides the basis for reliance on their judgment. Standard 1.3 under the integrity principle states, “Internal auditors must understand and abide by the laws and/or regulations relevant to the industry and jurisdictions in which the organization operates, including making disclosures as required.”"}, {"tr": "Yetkinlik.", "en": "Competency.", "cmt_tr": "Yetkinlik, IIA Standartlarının bir ilkesidir. Yetkinlik, iç denetçinin iç denetim hizmetlerinin ifasında ihtiyaç duyduğu bilgi, beceri ve deneyimi ifade eder.", "cmt_en": "Competency is a principle of The IIA’s Standards. Competency refers to the knowledge, skills, and experience needed by the internal auditor in the performance of internal audit services."}, {"tr": "Nesnellik.", "en": "Objectivity.", "cmt_tr": "Nesnellik, IIA Standartlarının bir ilkesidir. Ancak nesnellik, iç denetçinin tüm ilgili koşulların dengeli bir değerlendirmesini yapma ve yargı oluştururken kişisel çıkar veya başkaları tarafından aşırı etkilenmeme taahhüdüyle ilgilidir. Nesnellik, yasal gerekliliklere ve açıklamalara uymayı kapsamaz.", "cmt_en": "Objectivity is a principle of The IIA’s Standards. However, objectivity relates to the internal auditor’s commitment to make a balanced assessment of all the relevant circumstances and not be unduly influenced by self-interest or others in forming judgments. Objectivity does not include observation of required laws and disclosures."}], "answer": 1}, {"q_tr": "Aşağıdaki iş yeri durumlarından hangisi IIA dürüstlük ilkesini en çok ihlal eder?", "q_en": "Which workplace situation presented below most likely violates The IIA’s principle of integrity?", "options": [{"tr": "Tam zamanlı çalışmak üzere işe alınan bir çalışan, yaşlı annesine bakmak için çalışma saatlerini azaltmak zorunda kalmıştır. Çalışan, amirine ve insan kaynaklarına bilgi vermiş, ofiste olduğunda verimli çalışmış ve işte olmadığında her zaman çıkış yapmıştır.", "en": "An employee, hired to work full-time, has had to reduce work hours to help care for her elderly mother. The employee has kept her supervisor and human resources informed, is productive when in the office, and always punches out when not at work.", "cmt_tr": "Çalışan profesyonellik sergilemiş ve dürüstlük ilkesini ihlal etmemiştir.", "cmt_en": "The employee has exhibited professionalism and has not violated the principle of integrity."}, {"tr": "İç denetim müdürü, ekibi başarısız olduğunda departman için hızla sorumluluk almaktadır. Müdür ayrıca iş iyi yapıldığında ekibini hızla tanır ve över.", "en": "The director of internal auditing is quick to take responsibility for the department when his team fails to perform. The director also is quick to recognize and praise his team when the job is done well.", "cmt_tr": "Müdür, ekip çalışmasının önemini anlamaktadır ve dürüstlük ilkesini ihlal etmemiştir.", "cmt_en": "The director understands the importance of teamwork and has not violated the principle of integrity."}, {"tr": "İç denetim yöneticisinin her sabah iş performans raporlarını dosyalaması gerekmektedir. Yönetici sürekli geç gelmekte ve işten erken ayrılmaktadır. Yöneticinin doğrudan denetlediği çalışanlardan biri, performans raporlarını yönetici adına tamamlamak için her gece geç saatlere kadar kalmaktadır.", "en": "The internal audit manager is required to file work performance reports every morning. The manager continually comes in late and leaves work early. One of the employees directly supervised by the manager stays late every night to complete the performance reports on behalf of the manager.", "cmt_tr": "Dürüstlük ilkesi kapsamındaki IIA Standart 1.2, \"İç denetçiler, kuruluşun meşru ve etik beklentilerini anlamalı, saygı göstermeli, karşılamalı ve bunlara katkıda bulunmalı; bu beklentilere aykırı davranışları tanıyabilmelidir\" ifadesini içerir. İç denetim yöneticisi özverili değildir ve sorumluluklarını yerine getirmemektedir. Yönetici, dürüstlük ilkesini ihlal etmiştir. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "The IIA’s Standard 1.2 under the integrity principle states, “Internal auditors must understand, respect, meet, and contribute to the legitimate and ethical expectations of the organization and must be able to recognize conduct that is contrary to those expectations.” The internal audit manager is not diligent and is not fulfilling his or her responsibilities. The manager has violated the principle of integrity. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Birinci yıl iç denetçisi görevleri zamanında tamamlamakta zorlanmıştır. Çalışanın amiri, çalışanın daha fazla eğitim almasını sağlamıştır. Ayrıca, amir çalışan için ara teslim tarihleriyle daha yapılandırılmış bir çalışma programı geliştirmiştir.", "en": "A first-year internal auditor was having difficulty completing assignments on time. The employee’s supervisor arranged for the employee to have more training. Additionally, the supervisor developed a more structured work schedule with intermediary deadlines for the employee.", "cmt_tr": "Amir, çalışanın eksikliklerini fark ederek yönetim tarzını uyarlamış ve çalışanı başarıya hazırlamaktadır. Ne amir ne de çalışan dürüstlük ilkesini ihlal etmiştir.", "cmt_en": "The supervisor, recognizing the employee’s shortcomings, adapted their management style and is setting the employee up for success. Neither the supervisor nor the employee has violated the principle of integrity."}], "answer": 2}, {"q_tr": "Bir iç denetçi, IIA dürüstlük ilkesini en doğrudan aşağıdakilerden hangisiyle ihlal eder?", "q_en": "An internal auditor most directly violates The IIA’s integrity principle by", "options": [{"tr": "Kuruluşun saygınlığını zedeleyici yasal bir eyleme katılmak.", "en": "Engaging in a legal act discreditable to the organization.", "cmt_tr": "Dürüstlük ilkesi kapsamında, bir iç denetçi bilerek yasadışı bir faaliyete taraf olmamalı veya iç denetim mesleğine ya da kuruluşa saygınlığı zedeleyici eylemlere katılmamalıdır.", "cmt_en": "Under the integrity principle, an internal auditor must not knowingly be a party to an illegal activity or engage in acts discreditable to the profession of internal auditing or to the organization."}, {"tr": "Kuruluşun tescilli bilgilerini kullanarak kuruluşun hisselerini satın almak.", "en": "Using the organization’s proprietary information to purchase the organization’s stock.", "cmt_tr": "Kuruluşun hisselerini satın almak için içeriden bilgi kullanmak, kişisel kazanç için bilgi kullanımını yasaklayan gizlilik ilkesini ihlal eder.", "cmt_en": "Using insider information to purchase the organization’s stock violates the confidentiality principle, which prohibits using any information (e.g., insider information) for personal gain."}, {"tr": "Gerekli uzmanlığa sahip olmadan hile şüphesiyle bir kuruluş çalışanını sorgulamak.", "en": "Interrogating an employee of the organization suspected of fraud despite lacking the necessary expertise.", "cmt_tr": "Gerekli uzmanlığa sahip olmadan hile şüphesiyle bir çalışanı sorgulamak, iç denetçilerin gerekli bilgi, beceri ve deneyime sahip olmasını gerektiren yetkinlik ilkesini ihlal eder.", "cmt_en": "Interrogating an employee of the organization suspected of fraud despite lacking the necessary expertise violates the competency principle, which requires internal auditors to have the necessary knowledge, skills, and experience."}, {"tr": "Kuruluşa ürün satmak.", "en": "Selling products to the organization.", "cmt_tr": "Kuruluşa ürün satmak, kuruluşun çıkarlarıyla çatışan faaliyetleri yasaklayan nesnellik ilkesini ihlal eder.", "cmt_en": "Selling products to the organization violates the objectivity principle, which prohibits activities conflicting with the interests of the organization."}], "answer": 0}, {"q_tr": "Süresi dolmuş CIA unvanını kullanan bir iç denetçi, IIA Etik ve Profesyonellik Standartlarının hangi ilkesi kapsamında büyük olasılıkla saygınlığı zedeleyici bir eylemde bulunmaktadır?", "q_en": "An internal auditor who uses the CIA designation after it has expired most likely is engaging in an act discreditable under which principle of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Gizlilik.", "en": "Confidentiality.", "cmt_tr": "Gizlilik ilkesi, iç denetçilerin uygun yetki olmaksızın bilgi açıklamamasını ifade eder.", "cmt_en": "The confidentiality principle states that internal auditors do not disclose information without appropriate authority."}, {"tr": "Yetkinlik.", "en": "Competency.", "cmt_tr": "Yetkinlik ilkesi, iç denetçilerin hizmetlerini yerine getirmek için gerekli bilgi, beceri ve deneyime sahip olmasını gerektirir. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "The competency principle requires internal auditors to have the necessary knowledge, skills, and experience to perform services. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Dürüstlük.", "en": "Integrity.", "cmt_tr": "Belirli davranışlar dürüstlük ilkesi kapsamında iç denetim mesleğinin saygınlığını zedeleyici olabilir. Bunlar arasında süresi dolmuş veya iptal edilmiş CIA unvanı veya diğer belgelerin kullanımı yer alır.", "cmt_en": "Certain behaviors may be discreditable to the internal auditing profession under the integrity principle. They include the use of the CIA designation or other credentials after they have expired or been revoked."}, {"tr": "Nesnellik.", "en": "Objectivity.", "cmt_tr": "Nesnellik ilkesi, denetçilerin dengeli değerlendirmeler yapmasını ve kendi çıkarları veya başkaları tarafından aşırı etkilenmemesini gerektirir.", "cmt_en": "The objectivity principle requires auditors to make balanced assessments and not be unduly influenced by their own interests or by others."}], "answer": 2}, {"q_tr": "İç denetçiler, sonuçların raporlanmasında IIA Etik ve Profesyonellik Standartları gereği ne yapmalıdır?", "q_en": "In their communication of results, internal auditors are required by The IIA’s Standards of Ethics and Professionalism to", "options": [{"tr": "Belirlenen zaman ve bütçe parametreleri dahilinde olgusal bilgi elde etmek.", "en": "Obtain factual information within the established time and budget parameters.", "cmt_tr": "Bilgi elde etmek, sonuçların raporlanmasıyla değil, görevin yürütülmesiyle ilgilidir.", "cmt_en": "Obtaining information pertains to performing the engagement, not communicating results."}, {"tr": "Açıklanmaması halinde raporlamayı bozabilecek önemli olguları ortaya koymak.", "en": "Reveal material facts that could distort communications if not revealed.", "cmt_tr": "İç denetçiler, açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları açıklamalıdır.", "cmt_en": "Internal auditors should disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review."}, {"tr": "Kuruluşa zarar verebilecek gizli bilgileri açıklamadan yeterli olgusal bilgi sunmak.", "en": "Present sufficient factual information without revealing confidential information that could be detrimental to the organization.", "cmt_tr": "Standartlar, gizli bilgilerin kuruluş içindeki uygun taraflara (üst yönetim ve yönetim kurulu gibi) iletilmesini yasaklamaz.", "cmt_en": "The Standards do not prohibit communicating confidential information to appropriate parties within the organization, e.g., senior management and the board."}, {"tr": "Son denetim raporunun tarihi itibarıyla elde edilen tüm önemli bilgileri açıklamak.", "en": "Disclose all material information obtained as of the date of the final engagement communication.", "cmt_tr": "İç denetçilerin açıklamaları, son denetim raporunun tarihi itibarıyla elde edilen bilgilerle sınırlı değildir.", "cmt_en": "Disclosures by the internal auditors are not limited to information obtained as of the date of the final engagement communication."}], "answer": 1}, {"q_tr": "Kar amacı gütmeyen bir kuruluşta verilen hibelerin incelenmesi sırasında, bir iç denetçi kuruluşun tüzüğünde öngörüldüğü gibi hibe yetkilendirme komitesi (dış temsilcileri de içeren) onayı alınmadan çok sayıda hibe verildiğini keşfetmiştir. Ancak tüm hibeler başkan tarafından onaylanmış ve belgelenmiştir. Aynı zamanda yönetim kurulu üyesi olan hibe yetkilendirme komitesi başkanı, komitenin toplanarak denetim raporu yayımlanmadan önce tüm hibeleri geriye dönük olarak onaylamasını ve böylece kontrolleri geçersiz kılmasını önermiştir. Komite toplanır ve rapor yayımlanmadan önce hibeleri onaylarsa, iç denetçi ne yapmalıdır?", "q_en": "During an examination of grants awarded by a not-for-profit organization, an internal auditor discovered a number of grants made without the approval of the grant authorization committee (which includes outside representatives), as required by the organization’s charter. All the grants, however, were approved and documented by the president. The chair of the grant authorization committee, who is also a member of the board of directors, proposes that the committee meet and retroactively approve all the grants before the engagement communication is issued, thereby overriding controls. If the committee meets and approves the grants before such issuance, the internal auditor should", "options": [{"tr": "Söz konusu hibeleri, denetim raporu yayımlanmadan önce onaylandıkları için raporlamamak.", "en": "Not report the grants in question because they were approved before the issuance of the engagement communication.", "cmt_tr": "Kontrol geçersiz kılma işlemi raporlanmalıdır.", "cmt_en": "The control override should be reported."}, {"tr": "Hibelerin daha önce onaylanmamasının gerekçesini belirlemek için hibe komitesi başkanıyla konuyu görüşmek. Hibeler rutin ise, hibe komitesinin eylemsizliğinin tartışılması denetim raporundan çıkarılmalıdır. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "en": "Discuss the matter with the chair of the grant committee to determine the rationale for not approving the grants earlier. If the grants are routine, discussion of the grant committee’s inaction should be omitted from the engagement communication. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_tr": "Hibelerin rutin olması, tüzük ihlali konusuyla ilgisizdir.", "cmt_en": "The routine nature of the grants is irrelevant to the issue of the violation of the charter."}, {"tr": "Konuları, kuruluşun kontrollerinin geçersiz kılınması olarak rapora dahil etmek. Her hibe hakkında ayrıntılar raporlanmalı ve iç denetçi hile açısından daha fazla araştırma yapmalıdır.", "en": "Include the items in the communication as an override of the organization’s controls. Details about each grant should be reported, and the internal auditor should investigate further for fraud.", "cmt_tr": "İç denetçi hile yapıldığına inanmadıkça her hibenin ayrıntılarının dahil edilmesine gerek yoktur. Ayrıca, suistimal şüphesi varsa uygun kuruluş yetkilileri bilgilendirilmelidir.", "cmt_en": "Details about each grant need not be included unless the internal auditor believes that fraud may have occurred. Moreover, the appropriate organizational authorities should be informed if wrongdoing is suspected."}, {"tr": "Kontrol geçersiz kılma işlemini yönetim kuruluna raporlamak.", "en": "Report the override of control to the board.", "cmt_tr": "Standart 1.1 Dürüstlük ve Mesleki Cesaret, \"İç denetçiler, açıklanmaması halinde kuruluşun bilinçli kararlar almasını engelleyebilecek tüm önemli olguları açıklamalıdır\" ifadesini içerir.", "cmt_en": "Standard 1.1 Honesty and Professional Courage states, “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”"}], "answer": 3}, {"q_tr": "Yabancı bir yan kuruluştaki bir denetim görevi, satış departmanının siparişler karşılığında yerel hükümet yetkililerine ödemeler yaptığını ortaya çıkarmıştır. IIA Etik ve Profesyonellik Standartları, böyle bir durumda iç denetçiye ne önermektedir?", "q_en": "An engagement at a foreign subsidiary disclosed payments by the sales department to local government officials in return for orders. What action does The IIA’s Standards of Ethics and Professionalism suggest for an internal auditor in such a case?", "options": [{"tr": "Kuruluşa zarar verebilecek herhangi bir eylemden kaçınmak.", "en": "Refrain from any action that might be detrimental to the organization.", "cmt_tr": "Kuruluş yetkililerini bilgilendirmek kuruluşa zarar vermez.", "cmt_en": "Informing organizational officials is not detrimental to the organization."}, {"tr": "Olayı ilgili düzenleyici otoritelere bildirmek.", "en": "Report the incident to appropriate regulatory authorities.", "cmt_tr": "Standartlar olayın düzenleyici otoritelere bildirilmesini gerektirmez.", "cmt_en": "The Standards do not require that the incident be reported to regulatory authorities."}, {"tr": "Uygun kuruluş yetkililerini bilgilendirmek.", "en": "Inform appropriate organizational officials.", "cmt_tr": "Bu tür ödemeler yasadışı olabilir. Standart 1.3 Yasal ve Etik Davranış, \"İç denetçiler, kuruluşa veya çalışanlarına zarar verebilecek yasadışı veya saygınlığı zedeleyici herhangi bir faaliyete katılmamalı veya taraf olmamalıdır\" ifadesini içerir. Ayrıca, Standart 1.1 Dürüstlük ve Mesleki Cesaret, \"İç denetçiler, açıklanmaması halinde kuruluşun bilinçli kararlar almasını engelleyebilecek tüm önemli olguları açıklamalıdır\" ifadesini içerir.", "cmt_en": "Such payments may be illegal. Standard 1.3 Legal and Ethical Behavior states, “Internal auditors must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession of internal auditing or that may harm the organization or its employees.” Also, Standard 1.1 Honesty and Professional Courage states, “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.”"}, {"tr": "Uygulamayı Uluslararası İç Denetçiler Enstitüsü'nün yönetim kuruluna bildirmek.", "en": "Report the practice to the board of The Institute of Internal Auditors.", "cmt_tr": "Etik ve Profesyonellik Standartları bu tür faaliyetlerin IIA'ya raporlanmasını gerektirmez. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "The Standards of Ethics and Professionalism do not require reporting for these types of activities to The IIA. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}], "answer": 2}, {"q_tr": "İç Denetim Yöneticisi (İDY), bir üretim tesisindeki iç kontrol eksikliklerinin neden olduğu önemli bir stok eksiği farkındadır. Eksiklik ve ilgili nedenler dış denetçinin raporunu etkileyecek büyüklüktedir. IIA Etik ve Profesyonellik Standartlarına göre İDY'nin en uygun hareket tarzı nedir?", "q_en": "The chief audit executive is aware of a material inventory shortage caused by internal control deficiencies at one manufacturing plant. The shortage and related causes are of sufficient magnitude to affect the external auditor’s report. Based on The IIA’s Standards of Ethics and Professionalism, what is the CAE’s most appropriate course of action?", "options": [{"tr": "Hiçbir şey söylememek; dış denetçilerin bağımsızlığına müdahale etmekten kaçınmak.", "en": "Say nothing; guard against interfering with the independence of the external auditors.", "cmt_tr": "Eksiklik, açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek önemli bir olgudur.", "cmt_en": "The shortage is a material fact that could distort a report of activities under review if not revealed."}, {"tr": "Konuyu yönetimle görüşmek ve dış denetçilerin bilgilendirilmesini sağlamak için uygun önlemleri almak.", "en": "Discuss the issue with management and take appropriate action to ensure that the external auditors are informed.", "cmt_tr": "Standart 1.1 Dürüstlük ve Mesleki Cesaret, \"İç denetçiler, açıklanmaması halinde kuruluşun bilinçli kararlar almasını engelleyebilecek tüm önemli olguları açıklamalıdır\" ifadesini içerir. İDY, uygun güvence ve danışmanlık kapsamının sağlanması için diğer iç ve dış hizmet sağlayıcılarla bilgi paylaşmalı ve faaliyetleri koordine etmelidir.", "cmt_en": "Standard 1.1 Honesty and Professional Courage states that “Internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” The CAE should share information and coordinate activities with other internal and external providers of relevant assurance and consulting services."}, {"tr": "Dış denetçileri eksiklik olasılığı hakkında bilgilendirmek ancak tutarın bağımsız değerlendirmesini yapmalarına izin vermek.", "en": "Inform the external auditors of the possibility of a shortage but allow them to make an independent assessment of the amount.", "cmt_tr": "Durum bilinmektedir ve dış denetçilere yalnızca eksiklik olasılığından daha fazlası söylenmelidir.", "cmt_en": "The condition is known and the external auditors should be told more than that a possibility of a shortage exists."}, {"tr": "Eksiklikleri yönetim kuruluna bildirmek ve iletişimi dış denetçiye onların yapmasına izin vermek.", "en": "Communicate the shortages to the board and allow them to communicate it to the external auditor.", "cmt_tr": "Bilgi, dış denetçiyle paylaşılmalı ve faaliyetler koordine edilmelidir.", "cmt_en": "Information should be shared and activities coordinated with the external auditor."}], "answer": 1}, {"q_tr": "Bir denetim görevi sırasında, bir iç denetçi kuruluştaki belirli kişilerin kuruluş yararına endüstriyel casusluk yaptığını öğrenmiştir. IIA Etik ve Profesyonellik Standartlarına göre iç denetçinin uygun hareket tarzı nedir?", "q_en": "During an engagement, an internal auditor learned that certain individuals in the organization were involved in industrial espionage for the benefit of the organization. According to The IIA’s Standards of Ethics and Professionalism, what is the internal auditor’s proper course of action?", "options": [{"tr": "Olguları kuruluş içindeki uygun kişilere raporlamak.", "en": "Report the facts to the appropriate individuals within the organization.", "cmt_tr": "Standart 1.1 Dürüstlük ve Mesleki Cesaret, \"iç denetçiler, açıklanmaması halinde kuruluşun bilinçli kararlar almasını engelleyebilecek tüm önemli olguları açıklamalıdır\" ifadesini içerir. Standart 1.3 Yasal ve Etik Davranış, \"iç denetçiler, kuruluşa veya çalışanlarına zarar verebilecek yasadışı veya saygınlığı zedeleyici herhangi bir faaliyete katılmamalı veya taraf olmamalıdır\" ifadesini içerir. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_en": "Standard 1.1 Honesty and Professional Courage states, “internal auditors must disclose all material facts known to them that, if not disclosed, could affect the organization’s ability to make well-informed decisions.” Standard 1.3 Legal and Ethical Behavior states, “internal auditors must not engage in or be a party to any activity that is illegal or discreditable to the organization or the profession of internal auditing or that may harm the organization or its employees.” Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity"}, {"tr": "Bu durum kuruluş için zararlı olmadığından herhangi bir işlem gerekmez.", "en": "No action is required because this condition is not detrimental to the organization.", "cmt_tr": "İç denetçiler, açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek önemli olguları raporlamalıdır. Ayrıca bilerek yasadışı bir faaliyete taraf olamazlar.", "cmt_en": "Internal auditors must report material facts that, if not disclosed, could distort the reporting of activities. They also may not knowingly be a party to an illegal activity."}, {"tr": "Durumu çalışma kağıtlarına kaydetmek ancak kuruluş yararına olduğu için raporlamaktan kaçınmak.", "en": "Note the condition in the working papers but refrain from reporting it because it benefits the organization.", "cmt_tr": "İç denetçiler bilerek yasadışı bir faaliyete taraf olamazlar.", "cmt_en": "Internal auditors may not knowingly be a party to an illegal activity."}, {"tr": "Durumu uygun hükümet düzenleme kurumuna raporlamak.", "en": "Report the condition to the appropriate governmental regulatory agency.", "cmt_tr": "İç denetçilerin genellikle yasadışı veya uygunsuz eylemleri gönüllü olarak dış kuruluşlara veya bireylere açıklamaları gerekmez. Kuruluşları içinde çalışmaya çalışmalıdırlar. Ancak, yasa veya meslek tarafından beklenen tüm açıklamaları yapmalıdırlar.", "cmt_en": "Internal auditors ordinarily are not required to disclose voluntarily any illegal or improper acts to outside individuals or organizations. They should try to work within their organizations. However, they should make any disclosures expected by the law or by the profession."}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi bir iç denetçi tarafından IIA Etik ve Profesyonellik Standartlarının ihlalidir?", "q_en": "Which of the following items is a violation by an internal auditor of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "İç denetçinin çalışma kağıtlarında kayıtlı olan ve denetçinin bir hile vakasıyla ilgili temel iddialarını destekleyen bazı olgular, son denetim raporuna dahil edilmemiştir.", "en": "Certain facts recorded in the internal auditor’s working papers that helped to support the basic allegations made by the internal auditor regarding a case of fraud were not included in the final engagement communication.", "cmt_tr": "Önemsiz olguların dahil edilmesi gerekmez.", "cmt_en": "Immaterial facts need not be included."}, {"tr": "İç denetçinin çalışma kağıtlarında suç eylemini kanıtlayan bilgiler, denetçinin taslak raporuna dahil edilmiştir. Yorumlar daha sonra iç denetim yönetimi tarafından çıkarılmıştır.", "en": "Information in the internal auditor’s working papers that proved a criminal act was included in the internal auditor’s draft communication. The comments were later removed by internal audit management.", "cmt_tr": "Varsa etik ihlal, iç denetçi tarafından değil, iç denetim yönetimi tarafından yapılmıştır.", "cmt_en": "The ethical transgression, if any, was not made by the internal auditor but by internal audit management."}, {"tr": "Denetim çalışmasını bütçelenmiş süre içinde tutmak için iç denetçi, şüpheli görünen bir alanda testi kısmaya yönlendirilmiş ve bunu yapmıştır; bu alan daha sonra büyük usulsüzlükler içerdiği kanıtlanmıştır.", "en": "To keep the engagement effort within the budgeted time, the internal auditor was directed to and did curtail testing in an area that looked suspicious and later was proved to contain massive irregularities.", "cmt_tr": "Varsa etik ihlal, iç denetçi tarafından değil, iç denetim yönetimi tarafından yapılmıştır.", "cmt_en": "The ethical transgression, if any, was not made by the internal auditor but by internal audit management."}, {"tr": "Önceki denetim görevinde iç denetim personeli tarafından önerilen bir kontrol sistemi kusurlu bulunmuştur. İç denetçi, kusurlu işlevi denetim müşterisinin hatası olarak raporlamıştır.", "en": "A control system that had been recommended by the internal audit staff during the previous engagement was found to be defective. The internal auditor reported the defective function as an engagement client failure.", "cmt_tr": "Bir iç denetçi, etik olarak bildiği tüm önemli olguları açıklamakla yükümlüdür. Bu durumda, iç denetçi, iç denetim personelinin kusurlu bir kontrol sistemi önerdiğini biliyordu. İç denetçi ayrıca bu kusuru müşterinin hatası olarak raporlamıştır. İç denetim personelinin sistemi önerdiğini raporlamamakla, iç denetçi Standart 1.1'i ihlal etmiştir. Bu standart, iç denetçinin açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları raporlamasını gerektirir. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity Fact Pattern: The chief audit executive (CAE) of a mid-sized internal audit function was concerned that management might outsource the internal auditing function. Thus, the CAE adopted a very aggressive program to promote the internal audit function within the organization. The CAE planned to present the results to senior management and the board and recommend modification of the internal audit function's charter after using the new program. The following lists six actions the CAE took to promote a positive image within the organization: 1. Engagement assignments concentrated on efficiency. The engagements focused solely on cost savings, and each engagement communication highlighted potential costs to be saved. Negative findings were omitted. The focus on efficiency was new, but the management of the activities under review seemed very happy. 2. Drafts of all engagement communications were carefully reviewed with the management of the activities under review to get their input. Their comments were carefully considered when developing the final engagement communication. 3. The information technology internal auditor participated as part of a development team to review the control procedures to be incorporated into a major computer application under development. 4. Given limited resources, the engagement supervisor performed a risk assessment to establish engagement work schedule priorities. This was a marked departure from the previous approach of ensuring that all operations are evaluated on at least a 3-year interval. 5. To save time, the CAE no longer required that a standard internal control questionnaire be completed for each engagement. 6. When the internal auditors found that the management of the activity under review had not developed specific criteria or data to evaluate operations, the internal auditors were instructed to perform research, develop specific criteria, review the criteria with the management of the activity, and, if acceptable, use them to evaluate the activity's operations. If the management disagreed with the criteria, a negotiation took place until acceptable criteria could be agreed upon. The engagement communication commented on the activity's operations in conjunction with the agreed-upon criteria.", "cmt_en": "An internal auditor is ethically obligated to disclose all material facts known to him or her. In this case, the internal auditor knew that the internal audit staff had recommended a control system that was defective. The internal auditor also reported this defect as the client’s failure. By not reporting that the internal audit staff had recommended the system, the internal auditor violated Standard 1.1. It requires an internal auditor to report all material facts known to him or her that if not disclosed may distort the report of activities under review. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity Fact Pattern: The chief audit executive (CAE) of a mid-sized internal audit function was concerned that management might outsource the internal auditing function. Thus, the CAE adopted a very aggressive program to promote the internal audit function within the organization. The CAE planned to present the results to senior management and the board and recommend modification of the internal audit function’s charter after using the new program. The following lists six actions the CAE took to promote a positive image within the organization: 1. Engagement assignments concentrated on efficiency. The engagements focused solely on cost savings, and each engagement communication highlighted potential costs to be saved. Negative findings were omitted. The focus on efficiency was new, but the management of the activities under review seemed very happy. 2. Drafts of all engagement communications were carefully reviewed with the management of the activities under review to get their input. Their comments were carefully considered when developing the final engagement communication. 3. The information technology internal auditor participated as part of a development team to review the control procedures to be incorporated into a major computer application under development. 4. Given limited resources, the engagement supervisor performed a risk assessment to establish engagement work schedule priorities. This was a marked departure from the previous approach of ensuring that all operations are evaluated on at least a 3-year interval. 5. To save time, the CAE no longer required that a standard internal control questionnaire be completed for each engagement. 6. When the internal auditors found that the management of the activity under review had not developed specific criteria or data to evaluate operations, the internal auditors were instructed to perform research, develop specific criteria, review the criteria with the management of the activity, and, if acceptable, use them to evaluate the activity’s operations. If the management disagreed with the criteria, a negotiation took place until acceptable criteria could be agreed upon. The engagement communication commented on the activity’s operations in conjunction with the agreed-upon criteria."}], "answer": 3}, {"q_tr": "İDY'nin Eylem 1'in aşağıdaki unsurlarından hangisi uygunsuz kabul edilir? 1. İç denetim fonksiyonunun tüzüğü değiştirilmeden ve denetim komitesine sunulmadan denetim türü değiştirilmiştir. 2. Olumsuz bulgular denetim raporlarından çıkarılmıştır. 3. Maliyet tasarrufları ve öneriler denetim raporunda vurgulanmıştır.", "q_en": "Which of the following elements of Action 1 taken by the CAE would be considered inappropriate? 1. The type of engagement was changed before modifying the internal audit function’s charter and going to the audit committee. 2. Negative findings were omitted from the engagement communications. 3. Cost savings and recommendations were highlighted in the engagement communication.", "options": [{"tr": "1 ve 2.", "en": "1 and 2.", "cmt_tr": "İDY, yönetim kuruluna danışmadan iç denetimin çalışma kapsamını önemli ölçüde değiştirmiştir. İkinci ihlal, olumsuz bulguların çıkarılmasıdır. IIA Etik ve Profesyonellik Standartlarına göre, denetçiler açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları açıklamalıdır.", "cmt_en": "The CAE dramatically changed internal audit’s scope of work without consulting the board. A second violation is the omission of negative findings. Under The IIA’s Standards of Ethics and Professionalism, the auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review."}, {"tr": "1 ve 3.", "en": "1 and 3.", "cmt_tr": "Potansiyel maliyet tasarruflarının vurgulanması denetim raporu için uygundur ve önemli olumsuz bulgular çıkarılmamalıdır.", "cmt_en": "Highlighting potential cost savings is appropriate for an engagement communication, and material negative findings must not be omitted."}, {"tr": "Yalnızca 1.", "en": "1 only.", "cmt_tr": "Olumsuz bulguların çıkarılması da bir ihlaldir.", "cmt_en": "Omitting negative findings is also a violation."}, {"tr": "2 ve 3. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "en": "2 and 3. Study Unit 5: Ethics and Professionalism | Subunit 1: Integrity", "cmt_tr": "İDY, yönetim kuruluna danışmadan iç denetimin çalışma kapsamını önemli ölçüde değiştirmiştir. Ayrıca, potansiyel maliyet tasarruflarının vurgulanması denetim raporu için uygundur.", "cmt_en": "The CAE dramatically changed internal audit’s scope of work without consulting with the board. Moreover, highlighting potential cost savings is appropriate for an engagement communication."}], "answer": 0}, {"q_tr": "Bir finansal hizmetler firmasında uyum denetimi kapsamında, bir iç denetçi üst yönetimin belirli risk bulgularını stratejik hedefleriyle uyumlu hale getirmek için küçümsemesi yönünde baskı uyguladığı bir durumla karşılaşmıştır. Denetçi, mesleki dürüstlüğünü koruyarak bu etik ikilemi nasıl ele almalıdır?", "q_en": "As part of a compli
