ance audit in a financial services firm, an internal auditor encounters a situation where senior management is exerting pressure to downplay certain risk findings to align with their strategic objectives. How should the auditor address this ethical dilemma while maintaining professional integrity?", "options": [{"tr": "Firmanın stratejik çıkarlarını korumak için yönetimin talebine uymak.", "en": "Comply with management’s request to preserve the firm’s strategic interests.", "cmt_tr": "Yönetimin talebine uymak, denetçinin bağımsızlığını ve dürüstlüğünü tehlikeye atar.", "cmt_en": "Complying with management’s request compromises the auditor’s independence and integrity."}, {"tr": "Bulguları küçümseme baskısını denetim komitesine raporlamak ve şeffaflığı sağlamak.", "en": "Report the pressure to downplay findings to the audit committee and ensure transparency.", "cmt_tr": "Denetim bulgularından ve organizasyonel değişikliklerden gelen geri bildirimler, değerlendirme ve önceliklendirme kriterlerini iyileştirir. Denetçiler, tüm bulguların doğru bir şekilde raporlanmasını sağlayarak dürüstlük ve nesnelliği korumalıdır. Baskıyı denetim komitesine raporlamak, şeffaflığı sağlar ve etik ikilemi ele alırken denetçinin mesleki dürüstlüğünü korur. Bu yaklaşım, dürüstlük ve hesap verebilirlik kültürünü destekler.", "cmt_en": "Feedback from audit findings and organizational changes refines evaluation and prioritization criteria. Auditors must uphold integrity and objectivity, ensuring that all findings are reported accurately. Reporting the pressure to the audit committee ensures transparency and maintains the auditor’s professional integrity while addressing the ethical dilemma. This approach supports a culture of honesty and accountability."}, {"tr": "Yönetimi memnun etmek ve iyi bir çalışma ilişkisi sürdürmek için bulguları biraz değiştirmek.", "en": "Alter the findings slightly to satisfy management and maintain a good working relationship.", "cmt_tr": "Bulguları değiştirmek, denetçinin güvenilirliğini zedeler ve etik standartları ihlal eder.", "cmt_en": "Altering findings undermines the auditor’s credibility and violates ethical standards."}, {"tr": "Baskıyı raporlamamak ve denetime devam etmek.", "en": "Do not report the pressure and proceed with the audit.", "cmt_tr": "Baskıyı görmezden gelmek etik sorunu çözmez ve önemli bulguların iletilmesinde başarısızlığa yol açar.", "cmt_en": "Ignoring the pressure does not resolve the ethical issue and fails to communicate important findings."}], "answer": 1}], "SU2 - Objectivity": [{"q_tr": "Bireysel nesnelliğin korunması en çok neye bağlıdır?", "q_en": "Maintaining individual objectivity is most dependent on", "options": [{"tr": "Denetlenen departman ve fonksiyonlara IIA'nın çıkar çatışması tanımının açıkça bildirilmesi.", "en": "Clearly informing auditee departments and functions of The IIA definition of conflict of interest.", "cmt_tr": "Nesnellik duygusunu koruma sorumluluğu İDY'ye ve iç denetçilerin kendilerine aittir.", "cmt_en": "The responsibility rests with the CAE and with internal auditors themselves to maintain a sense of objectivity."}, {"tr": "Yönetim kurulu tarafından yıllık bir değerlendirme.", "en": "An annual evaluation by the board.", "cmt_tr": "Nesnellik duygusunu koruma sorumluluğu İDY'ye ve iç denetçilerin kendilerine aittir.", "cmt_en": "The responsibility rests with the CAE and with internal auditors themselves to maintain a sense of objectivity."}, {"tr": "Harici bir değerlendirme ekibi tarafından yıllık bir değerlendirme.", "en": "An annual evaluation by an external assessment team.", "cmt_tr": "Nesnellik duygusunu koruma sorumluluğu İDY'ye ve iç denetçilerin kendilerine aittir.", "cmt_en": "The responsibility rests with the CAE and with internal auditors themselves to maintain a sense of objectivity."}, {"tr": "İç denetçilerin çıkar çatışmalarından kaçınması.", "en": "Internal auditors avoiding conflicts of interest.", "cmt_tr": "İç denetçiler, kişisel koşullardaki değişiklikler veya atanabilecekleri belirli denetlenen birimler nedeniyle ortaya çıkabilecek yeni çıkar çatışmalarının olasılığının farkında olmalıdır.", "cmt_en": "Internal auditors should be aware of the possibility of new conflicts of interest that may arise owing to changes in personal circumstances or the particular auditees to which an auditor may be assigned."}], "answer": 3}, {"q_tr": "Aşağıdaki eş zamanlı mesleklerden hangisi bir iç denetçinin etik davranışını zedeliyor gibi görünebilir?", "q_en": "Which of the following concurrent occupations could appear to subvert the ethical behavior of an internal auditor?", "options": [{"tr": "İç denetçi ve tanınmış bir hayır kuruluşunun yerel kurum içi başkanı.", "en": "Internal auditor and a well-known charitable organization’s local in-house chairperson.", "cmt_tr": "Bir hayır kuruluşunun faaliyetlerinin kuruluşun çıkarlarına aykırı olması olası değildir.", "cmt_en": "The activities of a charity are unlikely to be contrary to the interests of the organization."}, {"tr": "İç denetçi ve yarı zamanlı ticari sigorta komisyoncusu.", "en": "Internal auditor and part-time business insurance broker.", "cmt_tr": "Nesnellik ilkesi, iç denetçilerin tarafsız değerlendirmelerini bozabilecek veya bozduğu varsayılabilecek hiçbir faaliyete veya ilişkiye katılmamasını gerektirir. Bu katılım, kuruluşun çıkarlarıyla çatışabilecek faaliyetleri veya ilişkileri içerir. Ticari sigorta komisyoncusu olarak, iç denetçi işverenin sigorta kapsamındaki bir değişiklikten fayda sağlayabileceği için nesnelliğini kaybedebilir.", "cmt_en": "The objectivity principle states that internal auditors must not participate in any activity or relationship that may impair or be presumed to impair their unbiased assessment. This participation includes those activities or relationships that may be in conflict with the interests of the organization. As a business insurance broker, the internal auditor may lose his or her objectivity because (s)he might benefit from a change in the employer’s insurance coverage."}, {"tr": "İç denetçi ve potansiyel çalışanları yetiştiren yerel bir işletme okulunda ders veren öğretim üyesi.", "en": "Internal auditor and adjunct faculty member of a local business college that educates potential employees.", "cmt_tr": "Ders vermek iç denetimle uyumludur. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "Teaching is compatible with internal auditing. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}, {"tr": "İç denetçi ve yerel topluluk gazetesinde aylık kira ücretlerini listeleyen ilan veren çoklu konut sahibi.", "en": "Internal auditor and landlord of multiple housing that publicly advertises for tenants in a local community newspaper listing monthly rental fees.", "cmt_tr": "Ticari mülk işlemleri çıkar çatışması içerebilir, ancak konut birimlerinin kiralanması büyük olasılıkla içermez.", "cmt_en": "Whereas dealing in commercial properties might involve a conflict, renting residential units most likely does not."}], "answer": 1}, {"q_tr": "Aşağıdaki iç denetçi faaliyetlerinden hangisinin IIA Etik ve Profesyonellik Standartları kapsamında kabul edilme olasılığı en yüksektir?", "q_en": "Which of the following activities of an internal auditor is most likely to be acceptable under The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Kuruluşta yaygın bir uygulama olduğu için işe geç gelmek ve erken ayrılmak.", "en": "Late arrivals and early departures from work because this practice is common in the organization.", "cmt_tr": "İç denetçiler görevlerini yerine getirirken özen göstermelidir.", "cmt_en": "Internal auditors should exercise diligence in performing their duties."}, {"tr": "Üst yönetimin onayı olmadan kuruluşun büyük tedarikçileriyle sık sık yemek yemek ve sosyalleşmek.", "en": "Frequent luncheons and other socializing with major suppliers of the organization without the consent of senior management.", "cmt_tr": "Nesnellik ilkesi, iç denetçilerin tarafsız değerlendirmelerini bozabilecek veya bozduğu varsayılabilecek hiçbir faaliyete veya ilişkiye katılmamasını gerektirir. Bu katılım, kuruluşun çıkarlarıyla çatışabilecek faaliyetleri veya ilişkileri içerir.", "cmt_en": "The objectivity principle states that internal auditors must not participate in any activity or relationship that may impair or be presumed to impair their unbiased assessment. This participation includes those activities or relationships that may be in conflict with the interests of the organization."}, {"tr": "Mesai saatleri dışında ilgisiz bir iş yürütmek.", "en": "Conducting an unrelated business outside of office hours.", "cmt_tr": "IIA Etik ve Profesyonellik Standartlarında, normal mesai saatleri dışında ilgisiz bir iş yürütmeyi yasaklayan hiçbir şey yoktur. Bu faaliyet tek başına (1) çıkar çatışması, (2) kişisel kazanç için bilgi kullanımı veya (3) iç denetçinin tarafsız değerlendirmesinin bozulması değildir.", "cmt_en": "Nothing in The IIA’s Standards of Ethics and Professionalism prohibits operating an unrelated business outside of regular office hours. The activity is not, in itself, (1) a conflict of interest, (2) a use of information for personal gain, or (3) an impairment of the internal auditor’s unbiased assessment."}, {"tr": "Bir tedarikçiden önemli bir hediye kabul etmek.", "en": "Acceptance of a material gift from a supplier.", "cmt_tr": "Nesnellik ilkesi, iç denetçilerin mesleki yargılarını bozabilecek veya bozduğu varsayılabilecek hiçbir şeyi kabul etmemesini gerektirir.", "cmt_en": "The objectivity principle states that internal auditors must not accept anything that may impair or be presumed to impair their professional judgment."}], "answer": 2}, {"q_tr": "İç denetçilerin bireysel nesnelliğini değerlendirmek kimin sorumluluğundadır?", "q_en": "Assessing individual objectivity of internal auditors is the responsibility of", "options": [{"tr": "Genel müdür.", "en": "The chief executive officer.", "cmt_tr": "İç denetçilerin bireysel nesnelliğini değerlendirmek İç Denetim Yöneticisinin sorumluluğundadır.", "cmt_en": "Assessing individual objectivity of internal auditors is the responsibility of the chief audit executive."}, {"tr": "Yönetim kurulu.", "en": "The board.", "cmt_tr": "İç denetçilerin bireysel nesnelliğini değerlendirmek İç Denetim Yöneticisinin sorumluluğundadır. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "Assessing individual objectivity of internal auditors is the responsibility of the chief audit executive. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}, {"tr": "Denetim komitesi.", "en": "The audit committee.", "cmt_tr": "İç denetçilerin bireysel nesnelliğini değerlendirmek İç Denetim Yöneticisinin sorumluluğundadır.", "cmt_en": "Assessing individual objectivity of internal auditors is the responsibility of the chief audit executive."}, {"tr": "İç Denetim Yöneticisi (İDY).", "en": "The chief audit executive.", "cmt_tr": "İDY, bireysel iç denetçilerin nesnelliğini değerlendirmek için politika ve prosedürler oluşturmalıdır.", "cmt_en": "The CAE must establish policies and procedures to assess the objectivity of individual internal auditors."}], "answer": 3}, {"q_tr": "Bir üreticinin çıkar çatışması politikasına dahil edilmesi aşağıdaki ifadelerden hangisi uygun değildir? Bir çalışan...", "q_en": "Which of the following statements is not appropriate to include in a manufacturer’s conflict of interest policy? An employee shall not", "options": [{"tr": "Bir müşteriden para, hediye veya hizmet kabul etmeyecektir.", "en": "Accept money, gifts, or services from a customer.", "cmt_tr": "Çıkar çatışması politikası, çalışan ile kuruluşun iş yaptığı taraflar arasındaki çıkar transferlerini yasaklamalıdır.", "cmt_en": "A conflict of interest policy should prohibit the transfer of benefits between an employee and those with whom the organization deals."}, {"tr": "Doğrudan veya dolaylı olarak bir kamu kurumunun yönetimine katılmayacaktır.", "en": "Participate (directly or indirectly) in the management of a public agency.", "cmt_tr": "Kamu hizmetine yönelik bir yasak genellikle uygun değildir. Kamu hizmeti, hakkı olmasa bile tüm vatandaşların bir görevidir.", "cmt_en": "A prohibition on public service is ordinarily inappropriate. Public service is a right, if not a duty, of all citizens."}, {"tr": "Satıcılardan borç almayacak veya onlara borç vermeyecektir.", "en": "Borrow from or lend money to vendors.", "cmt_tr": "Çıkar çatışması politikası, çalışan ile kuruluşun iş yaptığı taraflar arasındaki mali işlemleri yasaklamalıdır.", "cmt_en": "A conflict of interest policy should prohibit financial dealings between an employee and those with whom the organization deals."}, {"tr": "Kuruluş bilgilerini özel amaçlar için kullanmayacaktır.", "en": "Use organizational information for private purposes.", "cmt_tr": "Çıkar çatışması politikası, kuruluş bilgilerinin özel kazanç için kullanımını yasaklamalıdır.", "cmt_en": "A conflict of interest policy should prohibit the use of organization information for private gain."}], "answer": 1}, {"q_tr": "İç Denetim Yöneticisi (İDY), dış denetçilerin atanmasını değerlendirmek üzere bir komiteye atanmıştır. Dış muhasebe firmasının görev ortağı, İDY'nin özel dağ evinde bir haftalık kayak tatili için kendisine katılmasını istemektedir. İDY ne yapmalıdır?", "q_en": "The chief audit executive (CAE) has been appointed to a committee to evaluate the appointment of the external auditors. The engagement partner for the external accounting firm wants the CAE to join her for a week of skiing at her private lodge. The CAE should", "options": [{"tr": "Programları uyuyorsa kabul etmek.", "en": "Accept, assuming both their schedules allow it.", "cmt_tr": "Denetçi kabul etmemelidir.", "cmt_en": "The auditor should not accept."}, {"tr": "Çıkar çatışması gerekçesiyle reddetmek.", "en": "Refuse on the grounds of conflict of interest.", "cmt_tr": "Standart 2.2 Nesnelliğin Korunması, iç denetçilerin nesnelliği bozabilecek veya bozduğu varsayılabilecek hediye, ödül veya iyilik gibi maddi veya manevi hiçbir şeyi kabul etmemesi gerektiğini belirtir. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "Standard 2.2 Safeguarding Objectivity states that internal auditors must not accept any tangible or intangible item, such as a gift, reward, or favor, that may impair or be presumed to impair objectivity. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}, {"tr": "İşveren süresine yansıtılmadığı sürece kabul etmek.", "en": "Accept as long as it is not charged to employer time.", "cmt_tr": "Süreyi şirkete yansıtmamak, çıkar çatışması endişelerini ortadan kaldırmak için yeterli değildir.", "cmt_en": "Not charging the time to the company is not sufficient to eliminate conflict-of-interest concerns."}, {"tr": "Daveti kabul etmenin kuruluşun etik kurallarının ihlali olup olmadığını saymandan sormak.", "en": "Ask the comptroller whether accepting the invitation is a violation of the organization’s code of ethics.", "cmt_tr": "Denetçi, davetin kabul edilmesinin çıkar çatışması sorunları yarattığını bilmelidir.", "cmt_en": "The auditor should know that accepting the invitation raises conflict of interest issues."}], "answer": 1}, {"q_tr": "İç denetçiler, işverenleri dışındaki kişi ve kuruluşlarla ilişkilerinde tedbirli olmalıdır. Aşağıdaki faaliyetlerden hangisi büyük olasılıkla iç denetçilerin etik davranışını olumsuz etkilemez?", "q_en": "Internal auditors should be prudent in their relationships with persons and organizations external to their employers. Which of the following activities will most likely not adversely affect internal auditors’ ethical behavior?", "options": [{"tr": "Meslek kuruluşlarından danışmanlık işi için ücret almak.", "en": "Accepting compensation from professional organizations for consulting work.", "cmt_tr": "Meslek kuruluşlarının kuruluşun çalışanları, müşterileri, tedarikçileri veya iş ortakları olması olası değildir. Bu nedenle, danışmanlık ücretlerinin iç denetçilerin mesleki yargısını bozması veya bozduğu varsayılması olası değildir. Ayrıca, meslek kuruluşlarıyla ilişkiler çıkar çatışması yaratma veya iç denetçilerin tarafsız yargısını bozma olasılığı düşüktür. Danışmanlık görevi, bilgilerin uygunsuz kullanımıyla sonuçlanmamalıdır.", "cmt_en": "Professional organizations are unlikely to be employees, clients, customers, suppliers, or business associates of the organization. Thus, the consulting fees are not likely to impair or be presumed to impair the internal auditors’ professional judgment. Moreover, relationships with professional organizations are not likely to create a conflict of interest or impair or be presumed to impair internal auditors’ unbiased judgment. Also, the consulting engagement should not result in the improper use of information."}, {"tr": "Rakip kuruluşlara danışmanlık yapmak.", "en": "Serving as consultants to competitor organizations.", "cmt_tr": "Rakiplere danışmanlık yapmak çıkar çatışması yaratabilir.", "cmt_en": "Serving as a consultant to competitors might create a conflict of interest."}, {"tr": "Tedarikçilere danışmanlık yapmak.", "en": "Serving as consultants to suppliers.", "cmt_tr": "Tedarikçilere danışmanlık yapmak çıkar çatışması yaratabilir.", "cmt_en": "Serving as a consultant to suppliers might create a conflict of interest."}, {"tr": "Denetim planlarını veya sonuçlarını dış taraflarla görüşmek.", "en": "Discussing engagement plans or results with external parties.", "cmt_tr": "İlke 5 Gizliliğin Korunması, iç denetçilerin bilgileri uygun şekilde kullanması ve korumasını belirtir. İç denetçiler, görevleri sırasında elde edilen bilgilerin kullanımı ve korunmasında tedbirli olmalıdır. Ayrıca, bu tür görüşmeler kuruluşun meşru ve etik amaçlarına zarar verebilir.", "cmt_en": "Principle 5 Maintain Confidentiality states that internal auditors use and protect information appropriately. Internal auditors should be prudent in the use and protection of information acquired in the course of their duties. Furthermore, such discussion might be detrimental to the legitimate and ethical objectives of the organization."}], "answer": 0}, {"q_tr": "Kredi departmanında gerçekleştirilen bir denetim görevi aracılığıyla İç Denetim Yöneticisi (İDY), yıl sonu alacaklar hesabı bakiyesindeki önemli bir yanlış ifadenin farkına varmıştır. Dış denetçiler, bu yanlış ifadeyi tespit etmeden denetimlerini tamamlamıştır. İDY bu durumda ne yapmalıdır?", "q_en": "Through an engagement performed at the credit department, the chief audit executive (CAE) became aware of a material misstatement of the year-end accounts receivable balance. The external auditors have completed their engagement without detecting the misstatement. What should the CAE do in this situation?", "options": [{"tr": "Dış denetçileri yanlış ifade hakkında bilgilendirmek.", "en": "Inform the external auditors of the misstatement.", "cmt_tr": "Nesnellik ilkesi, iç denetçilerin açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları açıklamasını gerektirir. Ayrıca İDY, dış denetçilerle bilgi paylaşmalı ve faaliyetleri koordine etmelidir.", "cmt_en": "The objectivity principle states that internal auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review. Additionally, the CAE should share information and coordinate activities with the external auditors."}, {"tr": "Dış denetçiler rapor sunduğunda yöneetime yanlış ifadeyi raporlamak.", "en": "Report the misstatement to management when the external auditors present a report.", "cmt_tr": "İDY, dış denetçilerle bilgi paylaşmalı ve faaliyetleri koordine etmelidir.", "cmt_en": "The CAE should share information and coordinate activities with the external auditors."}, {"tr": "Dış denetçiler finansal tablolar hakkında görüş bildirmekle sorumlu olduğu için yanlış ifadeyi son denetim raporundan çıkarmak.", "en": "Exclude the misstatement from the final engagement communication because the external auditors are responsible for expressing an opinion on the financial statements.", "cmt_tr": "İç denetim fonksiyonunun ana odağı risk yönetimi, kontrol ve yönetişim süreçleri olsa da, önemli bir yanlış ifade bildirilmelidir.", "cmt_en": "Although the internal audit function’s main focus may be on risk management, control, and governance processes, a material misstatement must be communicated."}, {"tr": "Dış denetçilerin yararına alacaklar hesabı bakiyeleri üzerinde ek denetim prosedürleri uygulamak. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "en": "Perform additional engagement procedures on accounts receivable balances to benefit the external auditors. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_tr": "Denetim gerçekleştirirken, dış denetçiler iç denetçi tarafından hangi çalışmanın yapılması gerektiğini belirlemelidir.", "cmt_en": "When performing an audit, the external auditors should determine what work should be performed by the internal auditor."}], "answer": 0}, {"q_tr": "Aşağıdaki iç denetçi eylemlerinden hangisi IIA Etik ve Profesyonellik Standartlarının ihlali olma olasılığı en yüksektir?", "q_en": "Which of the following actions by an internal auditor is most likely a violation of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Yerel bir üniversitede denetim dersi vermek için ödeme kabul etmek.", "en": "Accepting payment for teaching auditing at a local university.", "cmt_tr": "Ders vermek iç denetimle uyumludur.", "cmt_en": "Teaching is compatible with internal auditing."}, {"tr": "Bir rakipte önemli bir mülkiyet payına sahip olmak.", "en": "Having a material ownership interest in a competitor.", "cmt_tr": "Bir rakipte önemli mülkiyet payına sahip olmak, bir iç denetçiden çok bir yönetici veya memur için çıkar çatışması yaratma olasılığı daha yüksektir. Bir iç denetçinin istihdamı sırasında mülkiyet payının değerini artıracak bir eylemde bulunması nadiren mümkündür.", "cmt_en": "Having a material ownership interest in a competitor is more likely to cause a conflict for a director or officer than an internal auditor. An internal auditor would seldom be able during the course of his or her employment to take action that would enhance the value of the ownership interest."}, {"tr": "Kuruluşunun bir müşterisinden makul bir hediye kabul etmek.", "en": "Accepting a moderate gift from a customer of his or her organization.", "cmt_tr": "Nesnellik ilkesi, iç denetçilerin mesleki yargılarını bozabilecek veya bozduğu varsayılabilecek hiçbir şeyi kabul etmemesini gerektirir.", "cmt_en": "The objectivity principle states that internal auditors must not accept anything that may impair or be presumed to impair their professional judgment."}, {"tr": "İstihdamıyla ilgili olmayan bir bağlamda Sertifikalı İç Denetçi unvanının kullanımına izin vermek.", "en": "Allowing use of the Certified Internal Auditor designation in a context not involving his or her employment.", "cmt_tr": "IIA Etik ve Profesyonellik Standartları CIA unvanının kullanımını özellikle belirtmez. Mesleğe veya kuruluşa saygınlığı zedeleyici eylemler yasaklanmıştır, ancak CIA unvanının istihdam bağlamı dışında kullanımı kendiliğinden saygınlığı zedeleyici değildir.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism do not specifically mention use of the CIA designation. Acts discreditable to the profession or the organization are prohibited, but use of the CIA designation outside the employment context is not per se discreditable."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, Etik ve Profesyonellik Standartları tarafından yorumlanan nesnellik ilkesiyle en çok tutarsızdır?", "q_en": "Which of the following most likely is inconsistent with the objectivity principle as interpreted by the Standards of Ethics and Professionalism?", "options": [{"tr": "Kuruluşla iş yapan tedarikçilere danışmanlık yapmak.", "en": "Consulting for suppliers that do business with the organization.", "cmt_tr": "Nesnellik ilkesi, iç denetçilerin tarafsız değerlendirmelerini bozabilecek veya bozduğu varsayılabilecek hiçbir faaliyete veya ilişkiye katılmamasını gerektirir. Bu katılım, kuruluşun çıkarlarıyla çatışabilecek faaliyetleri veya ilişkileri içerir. Bir örnek, kuruluşun iş yaptığı üçüncü taraflara (satıcılar, tedarikçiler vb.) danışmanlık yapmaktır.", "cmt_en": "The objectivity principle states that internal auditors must not participate in any activity or relationship that may impair or be presumed to impair their unbiased assessment. This participation includes those activities or relationships that may be in conflict with the interests of the organization. An example is serving as a consultant to third parties (vendors, suppliers, etc.) with which the organization conducts business."}, {"tr": "Başkalarının yanlış raporlar yayınlamasına izin vermek.", "en": "Permitting others to issue false reports.", "cmt_tr": "Yanlış rapor yayınlamak veya başkalarının bunu yapmasına izin vermek, dürüstlük ilkesi kapsamında saygınlığı zedeleyici bir eylem olabilir.", "cmt_en": "Issuing false reports or permitting others to do so may be an act discreditable under the integrity principle."}, {"tr": "Kişinin yetkinliği hakkında yanlış iddialar ileri sürmek.", "en": "Making false claims about one’s competency.", "cmt_tr": "Yetkinlik hakkında yanıltıcı, yanlış veya aldatıcı iddialar ileri sürmek, dürüstlük ilkesi kapsamında saygınlığı zedeleyici bir eylem olabilir.", "cmt_en": "Making claims about one’s competency in a manner that is deceptive, false, or misleading may be an an act discreditable under the integrity principle."}, {"tr": "Bağımsız olmadığı halde iç denetim hizmetleri sunmak. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "en": "Performing internal audit services when not independent. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_tr": "Bağımsız olmadığı halde iç denetim hizmetleri sunmak, dürüstlük ilkesi kapsamında saygınlığı zedeleyici bir eylem olabilir.", "cmt_en": "Performing internal audit services when not independent may be an act discreditable under the integrity principle."}], "answer": 0}, {"q_tr": "Nesnellik ilkesine uyum en çok aşağıdakilerden hangisiyle gösterilir?", "q_en": "Conformance with the objectivity principle most likely is demonstrated by", "options": [{"tr": "Açıklamaların hukuk danışmanı tarafından onaylanmasını aramak.", "en": "Seeking approval of disclosures from legal counsel.", "cmt_tr": "Denetim sonuçlarının, raporlarının veya ilgili bilgilerin yayınlanması konusunda İDY, hukuk danışmanı, varsa, üst yönetim ve yönetim kurulu tarafından onaylanan açıklamaların kayıtlarını tutarak gizlilik ilkesine uyumu gösterir.", "cmt_en": "Regarding the release of engagement results, reports, or related information, the CAE demonstrates conformance with the confidentiality principle by documenting and retaining records of disclosures approved by legal counsel, if applicable, and by senior management and the board."}, {"tr": "Mentorluk fırsatları sağlamak.", "en": "Providing opportunities for mentoring.", "cmt_tr": "Yetkinliği destekleyen bir kültür; mentorluk, eğitim ve mesleki eğitim fırsatlarının sağlanmasıyla kanıtlanır.", "cmt_en": "A culture supportive of competency is evidenced by providing opportunities for mentoring, training, and professional education."}, {"tr": "Kalite güvence ve iyileştirme programı.", "en": "A quality assurance and improvement program.", "cmt_tr": "Yetkinlik ilkesine uyum, İç Denetim Yöneticisi tarafından sürdürülen kalite güvence ve iyileştirme programıyla gösterilir.", "cmt_en": "Conformity with the competency principle is demonstrated by a quality assurance and improvement program maintained by the chief audit executive."}, {"tr": "Dengeli bir değerlendirme yapıldığını gösteren, İç Denetim Yöneticisi tarafından onaylanan denetim çalışma kağıtları.", "en": "Approval of engagement workpapers by the chief audit executive indicating a balanced assessment.", "cmt_tr": "Nesnellik ilkesine uyum, İDY veya görevlendirilen denetim süpervizörü tarafından onaylanan denetim çalışma kağıtlarıyla gösterilir. Bunlar, iç denetçilerin dengeli bir değerlendirme yaptığının kanıtı olabilir. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "Conformance with the objectivity principle is demonstrated by engagement workpapers that have been approved by the CAE or a designated engagement supervisor. They may be evidence that internal auditors have conducted a balanced assessment. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}], "answer": 3}, {"q_tr": "İDY aşağıdakilerden hangisini yapma sorumluluğunu taşır?", "q_en": "The CAE bears the responsibility to do which of the following?", "options": [{"tr": "Yönetim kurulunun bağımsızlık düzeyini değerlendirmek.", "en": "Assess the level of independence of the board.", "cmt_tr": "Bağımsızlık, yönetim kurulunun değil, iç denetim fonksiyonunun bir niteliğidir.", "cmt_en": "Independence is a quality of the internal audit function, not the board."}, {"tr": "Mali işler müdürünün bilgi, beceri ve yetkinlik düzeyini değerlendirmek.", "en": "Assess the level of knowledge, skills, and competencies of the chief financial officer.", "cmt_tr": "Bilgi, beceri ve yetkinlik kavramı bireysel iç denetçilere uygulanır.", "cmt_en": "The concept of knowledge, skills, and competencies applies to individual internal auditors."}, {"tr": "Kolektif nesnelliği teşvik etmek.", "en": "Foster collective objectivity.", "cmt_tr": "Nesnellik, kolektif değil bireysel bir niteliktir.", "cmt_en": "Objectivity is an individual, not a collective, quality."}, {"tr": "Bireysel nesnelliği teşvik etmek.", "en": "Foster individual objectivity.", "cmt_tr": "İDY, bireysel iç denetçilerin nesnelliğini değerlendirmek için politika ve prosedürler oluşturmalıdır.", "cmt_en": "The CAE must establish policies and procedures to assess the objectivity of individual internal auditors."}], "answer": 3}, {"q_tr": "İç denetçilerin nesnelliği konusunda İDY'den aşağıdaki eylemlerden hangisi beklenir?", "q_en": "Which of the following actions is required of the CAE in regard to the objectivity of internal auditors?", "options": [{"tr": "Maksimize etmek.", "en": "Maximize.", "cmt_tr": "İDY'nin iç denetçilerin nesnelliğiyle ilgili sorumluluğu değerlendirmek ve sürdürmektir.", "cmt_en": "The CAE’s responsibility with regard to the objectivity of internal auditors is to assess and maintain."}, {"tr": "Önceliklendirmek.", "en": "Prioritize.", "cmt_tr": "İDY'nin iç denetçilerin nesnelliğiyle ilgili sorumluluğu değerlendirmek ve sürdürmektir.", "cmt_en": "The CAE’s responsibility with regard to the objectivity of internal auditors is to assess and maintain."}, {"tr": "Minimize etmek.", "en": "Minimize.", "cmt_tr": "İDY'nin iç denetçilerin nesnelliğiyle ilgili sorumluluğu değerlendirmek ve sürdürmektir.", "cmt_en": "The CAE’s responsibility with regard to the objectivity of internal auditors is to assess and maintain."}, {"tr": "Değerlendirmek.", "en": "Assess.", "cmt_tr": "İDY, bireysel iç denetçilerin nesnelliğini değerlendirmek için politika ve prosedürler oluşturmalıdır. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "The CAE must establish policies and procedures to assess the objectivity of individual internal auditors. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}], "answer": 3}, {"q_tr": "İç denetçiler nesnel olmalıdır. Nesnellik:", "q_en": "Internal auditors should be objective. Objectivity", "options": [{"tr": "İç denetçilerin denetim konularındaki yargılarını başkalarının yargısına tabi kılmamasını gerektirir.", "en": "Requires internal auditors not to subordinate their judgment on audit matters to that of others.", "cmt_tr": "Standartlar, nesnelliği \"iç denetçilerin mesleki yargılarını oluşturmasına, sorumluluklarını yerine getirmesine ve İç Denetimin Amacını taviz vermeden gerçekleştirmesine olanak tanıyan tarafsız bir zihinsel tutum\" olarak tanımlar.", "cmt_en": "The Standards define objectivity as “[a]n unbiased mental attitude that allows internal auditors to make professional judgments, fulfill their responsibilities, and achieve the Purpose of Internal Auditing without compromise.”"}, {"tr": "Yalnızca güvence görevlerinde gereklidir.", "en": "Is required only in assurance engagements.", "cmt_tr": "Nesnellik, danışmanlık görevlerinde de gereklidir.", "cmt_en": "Objectivity also is required in a consulting engagement."}, {"tr": "Denetim çalışmasını tarafsız olarak yerine getirme yeteneğine yönelik tehditlerden bağımsızlıktır.", "en": "Is freedom from threats to the ability to perform audit work without bias.", "cmt_tr": "Bağımsızlık, denetim çalışmasını tarafsız olarak yerine getirme yeteneğine yönelik tehditlerden bağımsızlıktır.", "cmt_en": "Independence is freedom from threats to the ability to perform audit work without bias."}, {"tr": "İç denetçilerin daha önce sorumluluk üstlendikleri faaliyetlerle ilgili danışmanlık hizmetleri sunmasını yasaklar.", "en": "Prohibits internal auditors from providing consulting services relating to operations for which they had previous responsibility.", "cmt_tr": "İç denetçiler, daha önce sorumluluk üstlendikleri faaliyetlerle ilgili danışmanlık hizmetleri sunabilir.", "cmt_en": "Internal auditors may provide consulting services relating to operations for which they had previous responsibility."}], "answer": 0}, {"q_tr": "Nesnellik ve bağımsızlık, iç denetim mesleği için önemlidir. IIA Standartlarına göre:", "q_en": "Objectivity and independence are important to the professional practice of internal auditing. According to The IIA’s Standards,", "options": [{"tr": "İç denetçiler nesnel ve bağımsız olmalıdır.", "en": "Internal auditors must be objective and independent.", "cmt_tr": "Standart 7.1'e göre, iç denetim fonksiyonu bağımsız olmalı ve iç denetçiler çalışmalarını yürütürken nesnel olmalıdır.", "cmt_en": "According to Standard 7.1, the internal audit function must be independent, and internal auditors must be objective in performing their work."}, {"tr": "İç denetim fonksiyonu nesnel ve bağımsız olmalıdır.", "en": "The internal audit function must be objective and independent.", "cmt_tr": "İç denetim fonksiyonu organizasyonel olarak bağımsız olmalıdır, ancak yalnızca bireysel denetçiler nesneldir.", "cmt_en": "The internal audit function must be organizationally independent, but only individual auditors are objective."}, {"tr": "İç denetçiler herhangi bir çıkar çatışmasından kaçınmalıdır.", "en": "Internal auditors must avoid any conflicts of interest.", "cmt_tr": "İç denetçiler tarafsız, yansız bir tutuma sahip olmalı ve herhangi bir çıkar çatışmasından kaçınmalıdır. IIA Sözlüğü çıkar çatışmasını, \"bir iç denetçinin nesnel mesleki yargılarda bulunma veya sorumlulukları nesnel olarak yerine getirme yeteneğini etkileyebilecek veya etkiliyormuş gibi görünebilecek bir durum, faaliyet veya ilişki\" olarak tanımlar. Çıkar çatışması, bireyin görev ve sorumluluklarını nesnel olarak yerine getirme yeteneğine zarar verir.", "cmt_en": "Internal auditors must have an impartial, unbiased attitude and avoid any conflict of interest. The IIA Glossary defines conflict of interest as “a situation, activity, or relationship that may influence, or appear to influence, an internal auditor’s ability to make objective professional judgments or perform responsibilities objectively.” A conflict of interest would prejudice an individual’s ability to perform his or her duties and responsibilities objectively."}, {"tr": "İç denetim fonksiyonu tarafsız ve yansız bir zihniyete sahip olmalıdır.", "en": "The internal audit function must have an impartial and unbiased mindset.", "cmt_tr": "İç denetçiler tarafsız ve yansız bir zihniyete sahip olmalıdır. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "Internal auditors must have an impartial and unbiased mindset. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}], "answer": 2}, {"q_tr": "İç denetçi nesnelliğinin unsurları nelerdir?", "q_en": "The elements of internal auditor objectivity are", "options": [{"tr": "Tarafsız Tutum – Evet. Çıkar Çatışmasından Kaçınma – Evet. Yeterlilik – Hayır", "en": "Unbiased Attitude – Yes. Avoidance of Conflict of Interest – Yes. Proficiency - No", "cmt_tr": "Standart 7.1 ve 7.2'ye göre iç denetçiler tarafsız, yansız bir tutuma sahip olmalı ve herhangi bir çıkar çatışmasından kaçınmalıdır. Yeterlilik, nesnellikten ziyade IIA'nın kaliteyi artırma ilkesi kapsamındadır. Bu nedenle yeterlilik, nesnelliğin bir gerekliliği değildir.", "cmt_en": "According to Standards 7.1 and 7.2, internal auditors must have an impartial, unbiased attitude and avoid any conflict of interest. Proficiency is covered under the IIA’s principle of enhancing quality, rather than objectivity. Thus, proficiency is not a requirement of objectivity."}, {"tr": "Tarafsız Tutum – Hayır. Çıkar Çatışmasından Kaçınma – Evet. Yeterlilik – Hayır", "en": "Unbiased Attitude – No. Avoidance of Conflict of Interest – Yes. Proficiency - No", "cmt_tr": "İç denetçi nesnelliğinin unsurları tarafsız bir tutumu da içerir.", "cmt_en": "The elements of internal auditor objectivity also include an unbiased attitude."}, {"tr": "Tarafsız Tutum – Evet. Çıkar Çatışmasından Kaçınma – Hayır. Yeterlilik – Evet", "en": "Unbiased Attitude – Yes. Avoidance of Conflict of Interest – No. Proficiency - Yes", "cmt_tr": "İç denetçi nesnelliğinin unsurları çıkar çatışmasından kaçınmayı da içerir, ancak yeterliliği içermez.", "cmt_en": "The elements of internal auditor objectivity also include an avoidance of conflict of interest, but not proficiency."}, {"tr": "Tarafsız Tutum – Hayır. Çıkar Çatışmasından Kaçınma – Hayır. Yeterlilik – Evet", "en": "Unbiased Attitude – No. Avoidance of Conflict of Interest – No. Proficiency – Yes", "cmt_tr": "İç denetçi nesnelliğinin unsurları tarafsız bir tutumu ve çıkar çatışmasından kaçınmayı içerir, ancak yeterliliği içermez.", "cmt_en": "The elements of internal auditor objectivity include an unbiased attitude and avoidance of conflict of interest, but not proficiency."}], "answer": 0}, {"q_tr": "Geçen ay aynı kuruluşun hazine departmanından iç denetim fonksiyonuna transfer olan bir çalışan bulunmaktadır. Kuruluşun mali işler müdürü, çalışanın bu alandaki önemli bilgisi nedeniyle hazine departmanını değerlendiren bir denetim görevine hemen başlamasının iyi bir fikir olacağını önermiştir. Bu durumda çalışan ne yapmalıdır?", "q_en": "A treasury department employee transferred to the internal audit function of the same organization last month. The chief financial officer of the organization has suggested that, because of the employee’s significant knowledge in this area, it would be a good idea for the employee to immediately begin an engagement to evaluate the treasury department. In this circumstance, the employee should", "options": [{"tr": "Görevi kabul etmek ve hemen çalışmaya başlamak.", "en": "Accept the engagement and begin work immediately.", "cmt_tr": "Önerilen görev, nesnelliği bozduğu varsayılır.", "cmt_en": "The proposed engagement is presumed to impair objectivity."}, {"tr": "Böyle bir görevin gerekliliğini eski amiri olan mali işler müdürüyle görüşmek.", "en": "Discuss the need for such an engagement with the employee’s former superior, the CFO.", "cmt_tr": "İç denetçiler, denetim konularındaki yargılarını başkalarının yargısına tabi kılmamalıdır.", "cmt_en": "Internal auditors are not to subordinate their judgment on engagement matters to that of others."}, {"tr": "Görevin iç denetim personelinin başka bir üyesi tarafından yapılmasını önermek.", "en": "Suggest that the engagement be performed by another member of the internal audit staff.", "cmt_tr": "Başka bir iç denetçi atanmalıdır. İç denetim fonksiyonuna transfer olan veya geçici olarak görevlendirilen kişiler, en az 1 yıl geçmeden daha önce yürüttükleri faaliyetleri denetlemek üzere atanmamalıdır. Bu tür atamalar nesnelliği bozduğu varsayılır ve denetim çalışmasının denetimi ile sonuçların raporlanmasında ek dikkat gösterilmelidir.", "cmt_en": "Another internal auditor should be assigned. Persons transferred to or temporarily engaged by the internal audit function should not be assigned to audit those activities they previously performed until at least 1 year has elapsed. Such assignments are presumed to impair objectivity, and additional consideration should be exercised when supervising the engagement work and communicating engagement results."}, {"tr": "Denetim çalışma programını hazırlamayı teklif etmek ancak eski iş arkadaşlarıyla görüşmelerin iç denetim personelinin diğer üyeleri tarafından yapılmasını önermek.", "en": "Offer to prepare an engagement work program but suggest that interviews with the employee’s former co-workers be conducted by other members of the internal audit staff.", "cmt_tr": "Denetim çalışma programının hazırlanması, önyargı için önemli fırsatlar sunar. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "The preparation of the engagement work program offers significant opportunities for bias. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}], "answer": 2}, {"q_tr": "Çok uluslu bir kuruluşun, kuruluşun elektronik veri değişimi (EDI) ve elektronik fon transferi (EFT) işlemleri için kodlama ve iletişim transferini sağlayan bir katma değerli ağ (KDA) ile anlaşması vardır. KDA'ya veri aktarılmadan önce kuruluş, işlemlerin çevrimiçi ön işlemesini yapar. İç denetçi, ön işleme kontrollerinin değerlendirilmesinden sorumludur. Ayrıca, kuruluş ve KDA arasındaki anlaşma, iç denetçinin yıllık bazda KDA'daki kontrolleri incelemesine ve raporlamasına izin verildiğini belirtir. Sözleşme, KDA'ya erişimin mali yılın ikinci veya üçüncü çeyreğinde habersiz olarak gerçekleşebileceğini belirtir. Bu dönem, KDA'nın yoğun işlem dönemlerinde işlemeyi aksatmamak için seçilmiştir. Bu hüküm iç denetimle gözden geçirilmemiştir. Yönetim kurulu tarafından onaylanan yıllık denetim çalışma programı, cari yılda tam bir incelemenin yapılacağını belirtmektedir. İç denetçi üçüncü çeyrekte yıllık kontrol incelemesini ayarlamak için aradığında, KDA yoğun işlem döneminin bu yıl normalden erken başladığını ve tüm KDA personelinin meşgul olduğunu belirterek iç denetçiyi ağırlayamayacağını ifade etmiştir. Bu kapsam sınırlaması ve potansiyel etkisi aşağıdakilerden hangisine bildirilmelidir?", "q_en": "A multinational organization has an agreement with a value-added network (VAN) that provides the encoding and communications transfer for the organization’s electronic data interchange (EDI) and electronic funds transfer (EFT) transactions. Before transfer of data to the VAN, the organization performs online preprocessing of the transactions. The internal auditor is responsible for assessing preprocessing controls. In addition, the agreement between the organization and the VAN states that the internal auditor is allowed to examine and report on the controls in place at the VAN on an annual basis. The contract specifies that access to the VAN can occur on a surprise basis during the second or third quarter of the fiscal year. This period was chosen so it would not interfere with processing during the VAN’s peak transaction periods. This provision was not reviewed with internal auditing. The annual engagement work schedule approved by the board of directors specifies that a full review would be done during the current year. When the internal auditor called to arrange the annual control review during the third quarter, the VAN stated that it could not accommodate the internal auditor because the peak processing period started earlier than normal this year and all VAN personnel were occupied. This scope limitation, along with its potential effect, must be communicated to which one of the following?", "options": [{"tr": "Kuruluşun yönetim kuruluna.", "en": "The organization’s board of directors.", "cmt_tr": "Kapsam sınırlaması ve potansiyel etkisi yönetim kuruluna bildirilmelidir. Ancak İDY, daha önce yönetim kuruluna bildirilen ve kabul edilen kapsam sınırlamalarını tekrar bildirmenin uygun olup olmadığını değerlendirmelidir.", "cmt_en": "The scope limitation and its potential effect should be communicated to the board. However, the chief audit executive needs to consider whether it is appropriate to inform the board regarding scope limitations that were previously communicated to and accepted by the board."}, {"tr": "KDA'nın yönetim kuruluna.", "en": "The board of directors of the VAN.", "cmt_tr": "İç denetçi, KDA'nın yönetim kuruluyla doğrudan iletişim kurmamalıdır.", "cmt_en": "The internal auditor should not communicate directly with the board of the VAN."}, {"tr": "Hem kuruluşun hem de KDA'nın yönetim kuruluna.", "en": "The board of directors of both the organization and the VAN.", "cmt_tr": "İç denetçi, KDA'nın yönetim kuruluyla doğrudan iletişim kurmamalıdır.", "cmt_en": "The internal auditor should not communicate directly with the board of the VAN."}, {"tr": "Sınırlamanın yönetim kurulu düzeyinde bildirilmesine gerek yoktur.", "en": "The limitation does not need to be communicated at the board of directors level.", "cmt_tr": "Kapsam sınırlaması yönetim kuruluna bildirilmelidir.", "cmt_en": "A scope limitation must be communicated to the board."}], "answer": 0}, {"q_tr": "Bir satıcının ürün kalite standartlarına uyumunu denetlemek üzere görevlendirilen bir iç denetçi, satıcının mali kontrol müdürünün kardeşidir. Denetçi ne yapmalıdır?", "q_en": "An internal auditor assigned to audit a vendor’s compliance with product quality standards is the brother of the vendor’s controller. The auditor should", "options": [{"tr": "Görevi kabul etmek ancak saha çalışması sırasında kontrol müdürüyle temastan kaçınmak.", "en": "Accept the assignment but avoid contact with the controller during fieldwork.", "cmt_tr": "Denetlenen tarafla aile bağı göz önüne alındığında, denetçi kontrol müdürüyle temastan kaçınsa bile, çıkar çatışması görüntüsü mevcuttur.", "cmt_en": "Given a family connection with the auditee, even if the auditor avoids contact with the controller, the appearance of a conflict of interest exists."}, {"tr": "Görevi kabul etmek ancak ilişkiyi son denetim raporunda açıklamak.", "en": "Accept the assignment but disclose the relationship in the engagement final communication.", "cmt_tr": "Potansiyel çıkar çatışması veya önyargı durumlarından kaçınılmalı, yalnızca açıklanmamalıdır. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "Situations of potential conflict of interest or bias should be avoided, not merely disclosed. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}, {"tr": "Satıcıyı potansiyel çıkar çatışması hakkında bilgilendirmek.", "en": "Notify the vendor of the potential conflict of interest.", "cmt_tr": "Çıkar çatışmaları satıcıya veya denetim müşterisine değil, İç Denetim Yöneticisine bildirilmelidir.", "cmt_en": "Conflicts of interest are to be reported to the chief audit executive, not the vendor or engagement client."}, {"tr": "İç Denetim Yöneticisini potansiyel çıkar çatışması hakkında bilgilendirmek.", "en": "Notify the chief audit executive of the potential conflict of interest.", "cmt_tr": "İç denetçiler, bağımsızlığa veya nesnelliğe fiili veya potansiyel bir bozulmanın makul olarak çıkarılabileceği durumları veya bir durumun nesnelliğe veya bağımsızlığa bozulma oluşturup oluşturmadığı konusunda soruları olan durumlarda İDY'ye bildirmelidir.", "cmt_en": "Internal auditors are to report to the chief audit executive (CAE) any situations in which an actual or potential impairment to independence or objectivity may reasonably be inferred, or if they have questions about whether a situation constitutes an impairment to objectivity or independence."}], "answer": 3}, {"q_tr": "İç denetim fonksiyonu, idari amirine de raporlayan herhangi bir faaliyeti, denetim planı için uygun gördüğü takdirde denetlemeli ve raporlamalıdır. Bu faaliyetlerin kapsamında veya sonuçların raporlanmasında herhangi bir sınırlama aşağıdakilerden hangisinin dikkatine sunulmalıdır?", "q_en": "The internal audit function should be free to audit and report on any activity that also reports to its administrative head if it considers such coverage to be appropriate for its audit plan. Any limitation in scope or reporting of results of these activities should be brought to the attention of the", "options": [{"tr": "Genel müdür.", "en": "Chief executive officer.", "cmt_tr": "Genel müdür üst yönetimin bir parçası ve idari raporlama hattındaki en kıdemli kişi olsa da, bağımsızlık ve nesnelliğin bozulması yönetim kuruluna da bildirilmelidir.", "cmt_en": "Although the CEO is a part of senior management and is the senior person in the administrative reporting line, impairments of independence and objectivity also should be communicated to the board."}, {"tr": "Mali işler müdürü.", "en": "Chief financial officer.", "cmt_tr": "Mali işler müdürü aynı zamanda kuruluşun muhasebe fonksiyonlarından da sorumludur. Bu nedenle, kapsam veya raporlama sınırlaması olduğunda, mali işler müdürü bundan sorumlu olabilir.", "cmt_en": "The CFO is also responsible for the organization’s accounting functions. Thus, when a scope or reporting limitation exists, the CFO may be responsible for it."}, {"tr": "Dış denetçi.", "en": "External auditor.", "cmt_tr": "Yönetim kurulu gerekli görmediği sürece dış denetçi bilgilendirilmemelidir.", "cmt_en": "The external auditor should not be notified unless the board believes it is necessary."}, {"tr": "Yönetim kurulu ve üst yönetim.", "en": "Board and senior management.", "cmt_tr": "İç denetim fonksiyonunun bağımsızlığının ve nesnelliğinin bozulması yönetim kuruluna ve üst yönetime bildirilmelidir.", "cmt_en": "Impairments of the internal audit function’s independence and objectivity should be communicated to the board and senior management."}], "answer": 3}, {"q_tr": "Bir iç denetçi yakın zamanda pazarlama departmanı müdüründen sahil kenarındaki yazlık evinin bir hafta sonu ücretsiz kullanımı teklifi almıştır. Pazarlama departmanında şu anda bir denetim yürütülmemekte ve planlanmamaktadır. İç denetçi:", "q_en": "An internal auditor has recently received an offer from the manager of the marketing department of a weekend’s free use of his beachfront condominium. No engagement is currently being conducted in the marketing department, and none is scheduled. The internal auditor", "options": [{"tr": "Teklifi reddetmeli ve uygun amirine raporlamalıdır.", "en": "Should reject the offer and report it to the appropriate supervisor.", "cmt_tr": "İç denetçi, bir çalışan, müşteri, tedarikçi veya iş ortağından ücret, hediye veya eğlence kabul etmemelidir. Ücret veya hediye kabulü, denetçinin nesnelliğinin bozulduğunu ima edebilir. O sırada ilgili alanda denetim yürütülmüyor olsa bile, gelecekteki bir denetim nesnelliğin bozulma görüntüsüyle sonuçlanabilir. Bu nedenle, ücret veya hediye almak için denetim durumuna herhangi bir değer verilmemelidir. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity Bağımsızlığın veya nesnelliğin fiilen veya görünüşte bozulması uygun taraflara açıklanmalıdır.", "cmt_en": "An internal auditor is not to accept fees, gifts, or entertainment from an employee, client, customer, supplier, or business associate. Accepting a fee or gift may imply that the auditor’s objectivity has been impaired. Even though an engagement is not being conducted in the applicable area at that time, a future engagement may result in the appearance of impairment of objectivity. Thus, no consideration should be given to the engagement status as justification for Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity receiving fees or gifts. The receipt of promotional items (such as pens, calendars, or samples) that are available to the general public and have minimal value do not hinder internal auditors’ professional judgments. Impairment of independence or objectivity, in fact or appearance, must be disclosed to appropriate parties."}, {"tr": "Değeri önemsiz olduğu için teklifi kabul edebilir.", "en": "May accept the offer because its value is immaterial.", "cmt_tr": "Bir hafta sonu tatilinin değeri önemsiz değildir.", "cmt_en": "The value of a weekend vacation is not immaterial."}, {"tr": "Hiçbir denetim yürütülmediği veya planlanmadığı için teklifi kabul edebilir.", "en": "May accept the offer because no engagement is being conducted or planned.", "cmt_tr": "Denetim durumu, ücret veya hediye almak için bir gerekçe değildir.", "cmt_en": "The status of engagements is not a justification for receiving fees or gifts."}, {"tr": "Uygun amir tarafından onaylanırsa teklifi kabul edebilir.", "en": "May accept the offer if approved by the appropriate supervisor.", "cmt_tr": "Bir amir etik dışı davranışı onaylayamaz.", "cmt_en": "A supervisor may not approve unethical behavior."}], "answer": 0}, {"q_tr": "Nesnellik, en çok aşağıdakilerden hangisiyle bozulur?", "q_en": "Objectivity is most likely impaired by an internal auditor’s", "options": [{"tr": "Yakında terfi sonucu sorumlu olacağı bir bölümde denetim görevini sürdürmesi.", "en": "Continuation on an engagement at a division for which (s)he will soon be responsible as the result of a promotion.", "cmt_tr": "İç denetçiler tarafsız, yansız bir tutuma sahip olmalı ve herhangi bir çıkar çatışmasından kaçınmalıdır (Standart 2.2). Çıkar çatışması, güven pozisyonundaki bir iç denetçinin rekabet eden mesleki veya kişisel bir çıkara sahip olduğu durumdur (Standart 2.2). İç denetçinin terfisi bir önyargı yaratabilir.", "cmt_en": "Internal auditors must have an impartial, unbiased attitude and avoid any conflict of interest (Standard 2.2). Conflict of interest is a situation in which an internal auditor, who is in a position of trust, has a competing professional or personal interest (Standard 2.2). The internal auditor’s promotion may create a bias."}, {"tr": "Bütçe kısıtlamaları nedeniyle bir denetim görevinin kapsamının daraltılması.", "en": "Reduction of the scope of an engagement due to budget restrictions.", "cmt_tr": "Bütçe kısıtlamaları bağımsızlık ve nesnelliğin bozulmasını oluşturabilse de, bir iç denetçinin yakında sorumlu olacağı bölümde denetim görevini sürdürmesi durumunda nesnelliğin bozulması daha olasıdır.", "cmt_en": "Although budget restrictions may constitute an impairment of independence and objectivity, objectivity is more likely to be impaired when an internal auditor continues on an engagement at a division for which (s)he will soon be responsible."}, {"tr": "Yeni bir dağıtım sistemi için kontrol standartları öneren bir görev gücüne katılması.", "en": "Participation on a task force that recommends standards for control of a new distribution system.", "cmt_tr": "İç denetçi kontrol standartlarını önerebilir ancak uygulayamaz ve nesnelliğini koruyabilir.", "cmt_en": "An internal auditor may recommend, but not implement, standards of control and still maintain objectivity."}, {"tr": "Bir satın alma görevlisinin sözleşme taslağlarını icra edilmeden önce incelemesi.", "en": "Review of a purchasing agent’s contract drafts prior to their execution.", "cmt_tr": "İç denetçi, sözleşmeleri icra edilmeden önce inceleyebilir.", "cmt_en": "An internal auditor may review contracts prior to their execution."}], "answer": 0}, {"q_tr": "Bir iç denetçinin, aşağıdaki durumlardan hangisinde güvence hizmeti sağlaması çıkar çatışması yaratma olasılığı en yüksektir?", "q_en": "An internal auditor most likely will have a conflict of interest by providing an assurance service with regard to a", "options": [{"tr": "5 yıl önce kilit çalışan olduğu bir mali faaliyet.", "en": "Financial activity in which the internal auditor had been a key employee 5 years previously.", "cmt_tr": "İç denetçinin önceki yıl içinde sorumluluk üstlendiği bir faaliyet için güvence hizmeti sunması, nesnelliği bozduğu varsayılır. Bu nedenle, 5 yıl çıkar çatışması suçlamasından korunmak için makul bir süredir.", "cmt_en": "Objectivity is presumed to be impaired if an internal auditor provides assurance services for an activity for which the internal auditor had responsibility within the previous year. Thus, 5 years is a reasonable lapse of time to safeguard the employee from a charge of conflict of interest."}, {"tr": "İç denetçinin kayınbiraderi tarafından sahip olunan büyük bir tedarikçinin olduğu bir satın alma faaliyeti.", "en": "Purchasing activity if a major supplier is owned by the internal auditor’s sister-in-law.", "cmt_tr": "İDY, potansiyel ve fiili çıkar çatışmaları ve önyargıdan kaçınmak için personel atamalarını yapar. Yakın bir akrabanın bir denetim müşterisinin tedarikçisiyle ilişkisi, belirgin bir çıkar çatışmasıdır.", "cmt_en": "The CAE makes staff assignments so that potential and actual conflicts of interest and bias are avoided. A close relative’s involvement with a supplier of an engagement client is an apparent conflict of interest."}, {"tr": "İç denetçinin daha önce üç kez hizmet sunduğu bir veri işleme merkezi.", "en": "Data processing center for which the internal auditor had performed the service three times previously.", "cmt_tr": "Görev rotasyonu tercih edilse de, aynı faaliyet için tekrar tekrar güvence hizmeti sunmak çıkar çatışması oluşturmaz.", "cmt_en": "Although rotation of assignments is preferable, no conflict of interest is involved in performing an assurance service for the same activity repeatedly."}, {"tr": "İç denetçinin iç denetim fonksiyonunun tasarım ekibindeki temsilcisi olduğu bir bilgisayar sistemi. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "en": "Computer system for which the internal auditor had been the internal audit function’s representative on the design team. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_tr": "İç denetçinin sorumluluğu sistemler için kontrol standartları önerme veya uygulama öncesinde prosedürleri inceleme ile sınırlıysa nesnellik bozulmaz.", "cmt_en": "Objectivity is not impaired if the internal auditor’s responsibility was limited to recommending standards of control for systems or reviewing procedures before implementation."}], "answer": 1}, {"q_tr": "İç denetim fonksiyonu tarafından uygun şekilde gerçekleştirilen bir faaliyet aşağıdakilerden hangisidir?", "q_en": "An activity appropriately performed by the internal audit function is", "options": [{"tr": "Kontrol sistemleri tasarlamak.", "en": "Designing systems of control.", "cmt_tr": "Sistem tasarlamak, olası mesleki çıkar çatışması nedeniyle nesnelliği bozduğu varsayılır.", "cmt_en": "Designing systems is presumed to impair objectivity because of the possible conflict of professional interests."}, {"tr": "Kontrol sistemleri için prosedürler hazırlamak.", "en": "Drafting procedures for systems of control.", "cmt_tr": "Sistemler için prosedür hazırlamak, olası mesleki çıkar çatışması nedeniyle nesnelliği bozduğu varsayılır.", "cmt_en": "Drafting procedures for systems is presumed to impair objectivity because of the possible conflict of professional interests."}, {"tr": "Kontrol sistemlerini uygulama öncesinde incelemek.", "en": "Reviewing systems of control before implementation.", "cmt_tr": "Denetçi, sistemler için kontrol standartları önerdiğinde veya prosedürleri uygulama öncesinde incelediğinde nesnellik bozulmaz.", "cmt_en": "The internal auditor’s objectivity is not impaired when the auditor recommends standards of control for systems or reviews procedures before they are implemented."}, {"tr": "Kontrol sistemleri kurmak.", "en": "Installing systems of control.", "cmt_tr": "Kontrol sistemleri kurmak, olası mesleki çıkar çatışması nedeniyle nesnelliği bozduğu varsayılır.", "cmt_en": "Installing systems of control is presumed to impair objectivity because of the possible conflict of professional interests."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi iç denetim fonksiyonuna olan güveni en ciddi şekilde tehlikeye atar?", "q_en": "Which of the following most seriously compromises confidence in the internal audit function?", "options": [{"tr": "İç denetçiler, bir denetim raporunda eleştirilen departmanlar için sıklıkla revize prosedürler hazırlamaktadır.", "en": "Internal auditors frequently draft revised procedures for departments whose procedures have been criticized in an engagement communication.", "cmt_tr": "İç denetim fonksiyonuna olan güven, bağımsızlıktan (iç denetim fonksiyonunun bir bütün olarak niteliği) ve nesnellikten (bireysel iç denetçilerin niteliği) kaynaklanır. Bilgi sistemleri için prosedür tasarlamak, kurmak veya hazırlamak iç denetçilerin nesnelliğini bozar. Bu tür hizmetler çıkar çatışması yaratabilir; iç denetçilerin rekabet eden mesleki veya kişisel çıkara sahip olduğu bir durum. Bu, iç denetim fonksiyonuna olan güveni zedeleyen bir uygunsuzluk görüntüsü yaratabilir (Standart 2.2).", "cmt_en": "Confidence in the internal audit function derives from independence (an attribute of the internal audit function as a whole), and objectivity (an attribute of individual internal auditors). Designing, installing, or drafting procedures for information systems impairs the objectivity of internal auditors. Such services may create a conflict of interest, a situation in which internal auditors have a competing professional or personal interest. This may create an appearance of impropriety that undermines confidence in the internal audit function (Standard 2.2)."}, {"tr": "İç Denetim Yöneticisi, kuruluşun genel müdürüne ve yönetim kuruluna çift raporlama sorumluluğuna sahiptir. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "en": "The chief audit executive has dual reporting responsibility to the organization’s chief executive officer and the board of directors. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_tr": "Genel müdüre ve yönetim kuruluna çift raporlama idealdir.", "cmt_en": "Dual reporting to the CEO and the board of directors is ideal."}, {"tr": "İç denetim fonksiyonu ve kuruluşun dış denetçileri, birbirlerinin çalışmalarını tekrarlamamak için toplam denetim kapsamının ortak planlamasına katılmaktadır.", "en": "The internal audit function and the organization’s external auditors engage in joint planning of total engagement coverage to avoid duplicating each other’s work.", "cmt_tr": "İDY, uygun kapsamı sağlamak ve çabaların tekrarını en aza indirmek için diğer iç ve dış hizmet sağlayıcılarla bilgi paylaşmalı ve faaliyetleri koordine etmelidir.", "cmt_en": "The CAE should share information and coordinate activities with other internal and external providers to ensure proper coverage and minimize duplication of efforts."}, {"tr": "İç denetim fonksiyonu, kuruluşun diğer kuruluşlarla yapacağı sözleşmelerin inceleme sürecine dahildir.", "en": "The internal audit function is included in the review cycle of the organization’s contracts with other organizations before the contracts are executed.", "cmt_tr": "İç denetim fonksiyonunun kuruluşun sözleşmelerinin inceleme sürecine dahil edilmesi uygundur.", "cmt_en": "Including the internal audit function in the review cycle of the organization’s contracts is appropriate."}], "answer": 0}, {"q_tr": "Bir kuruluş, üretim yan kuruluşlarından birinde yeni bir bilgisayarlı satın alma sipariş sistemi geliştirip uygulamayı planlamaktadır. Üretim başkan yardımcısı, iç denetçilerin finans, üretim, satın alma ve pazarlamadan temsilcilerden oluşan bir ekibe katılmasını talep etmiştir. Bu ekip uygulama çalışmasından sorumlu olacaktır. İDY, bu yüksek profilli projeyi üstlenmek isteyen kıdemli bir iç denetçiyi \"gerektiğinde\" yardım etmek üzere projeye atamıştır. Kıdemli iç denetçinin aşağıdaki faaliyetlerin tümünü gerçekleştirdiği varsayıldığında, iç denetçiden satın alma sipariş sistemini görev sonrası bazda incelemesi istendiğinde hangisi nesnelliği bozar?", "q_en": "An organization is planning to develop and implement a new computerized purchase order system in one of its manufacturing subsidiaries. The vice president of manufacturing has requested that internal auditors participate on a team consisting of representatives from finance, manufacturing, purchasing, and marketing. This team will be responsible for the implementation effort. Eager to take on this high profile project, the chief audit executive assigns a senior internal auditor to the project to assist “as needed.” Assuming the senior internal auditor performed all of the following activities, which one will impair objectivity if the internal auditor is asked to review the purchase order system on a post-engagement basis?", "options": [{"tr": "Kontrol hedeflerinin belirlenmesine ve tanımlanmasına yardımcı olmak.", "en": "Helping to identify and define control objectives.", "cmt_tr": "Kontrol hedeflerinin belirlenmesine ve tanımlanmasına yardımcı olmak uygun bir iç denetim fonksiyonudur.", "cmt_en": "Helping to identify and define control objectives is an appropriate internal audit function."}, {"tr": "Sistem geliştirme standartlarına uyumu test etmek.", "en": "Testing for compliance with system development standards.", "cmt_tr": "İç denetçiler, yasa, düzenleme ve sözleşmelere uyumla ilgili risk maruziyetlerini ve kontrolleri değerlendirmelidir.", "cmt_en": "Internal auditors should evaluate risk exposures and the controls relating to compliance with laws, regulations, and contracts."}, {"tr": "Sistem ve programlama standartlarının risk maruziyetlerini değerlendirmek.", "en": "Evaluate risk exposures of systems and programming standards.", "cmt_tr": "İç denetçiler bilgi sistemlerinin risk maruziyetlerini değerlendirir. Ayrıca kontrol standartları önerebilir veya prosedürleri uygulama öncesinde inceleyebilir ve nesnelliklerini bozmazlar. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_en": "Internal auditors evaluate risk exposures of information systems. They may also recommend standards of control or review procedures before implementation without impairing their objectivity. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity"}, {"tr": "Yeni sistem için işletme prosedürleri hazırlamak.", "en": "Drafting operating procedures for the new system.", "cmt_tr": "Denetçi, sistemler için kontrol standartları önerdiğinde veya prosedürleri uygulama öncesinde incelediğinde nesnellik bozulmaz. Ancak bilgi sistemleri için prosedür tasarlamak, kurmak veya hazırlamak iç denetçinin nesnelliğini bozduğu varsayılır. Bu tür hizmetler çıkar çatışması yaratabilir; iç denetçilerin rekabet eden mesleki veya kişisel çıkara sahip olduğu bir durum. Bu, iç denetim fonksiyonuna olan güveni zedeleyen bir uygunsuzluk görüntüsü yaratabilir (Standart 2.2).", "cmt_en": "An internal auditor’s objectivity is not impaired when the auditor recommends standards of control for systems or reviews procedures before they are implemented. Designing, installing, or drafting procedures for information systems, however, are presumed to impair the internal auditor’s objectivity. Such services may create a conflict of interest, a situation in which internal auditors have a competing professional or personal interest. This may create an appearance of impropriety that undermines confidence in the internal audit function (Standard 2.2)."}], "answer": 3}, {"q_tr": "İç denetçinin bilgi sistemleri geliştirmeye katılımının başlıca nedeni aşağıdakilerden hangisidir?", "q_en": "The major reason for the internal auditor’s involvement in information systems development is for the internal auditor to", "options": [{"tr": "Sonraki incelemelerde kullanmak üzere sistemlere aşinalık kazanmak.", "en": "Gain familiarity with systems for use in subsequent reviews.", "cmt_tr": "Sonraki incelemelerde kullanmak üzere sistemlere aşinalık kazanmak, iç denetçinin bilgi sistemleri geliştirmeye katılımının başlıca nedeni değildir.", "cmt_en": "Gaining familiarity with systems for use in subsequent reviews is not the major reason for the internal auditor’s involvement in information systems development."}, {"tr": "Sistemlerin yeterli kontrol prosedürlerine sahip olmasını sağlamaya yardımcı olmak.", "en": "Help assure that systems have adequate control procedures.", "cmt_tr": "İç denetim fonksiyonu, risk yönetimi, kontrol ve yönetişim süreçlerini değerlendirir ve iyileştirir. Denetçi, sistemler için kontrol standartları önerdiğinde veya prosedürleri uygulama öncesinde incelediğinde nesnellik bozulmaz. Denetçi, bu tür sistemler için prosedür tasarlarsa, kurarsa veya hazırlarsa nesnelliğin bozulduğu kabul edilir. Bu tür hizmetler çıkar çatışması yaratabilir; iç denetçilerin rekabet eden mesleki veya kişisel çıkara sahip olduğu bir durum. Bu, iç denetim fonksiyonuna olan güveni zedeleyen bir uygunsuzluk görüntüsü yaratabilir (Standart 2.2).", "cmt_en": "The internal audit function evaluates and improves risk management, control, and governance processes. The internal auditor’s objectivity is not impaired when the auditor recommends standards of control for systems or reviews procedures before they are implemented. The auditor’s objectivity is considered to be impaired if the auditor designs, installs, or drafts procedures for such systems. Such services may create a conflict of interest, a situation in which internal auditors have a competing professional or personal interest. This may create an appearance of impropriety that undermines confidence in the internal audit function (Standard 2.2)."}, {"tr": "Yeni sistemlerin maliyet ve geliştirme süresini en aza indirmeye yardımcı olmak.", "en": "Help minimize the cost and development time for new systems.", "cmt_tr": "Yeni sistemlerin maliyet ve geliştirme süresini en aza indirmek, iç denetçinin bilgi sistemleri geliştirmeye katılımının başlıca nedeni değildir.", "cmt_en": "Minimizing the cost and development time for new systems is not the major reason for the internal auditor’s involvement in information systems development."}, {"tr": "Sonraki geliştirme ve uygulama için iyileştirmeler önermek.", "en": "Propose enhancements for subsequent development and implementation.", "cmt_tr": "Sonraki geliştirme ve uygulama için iyileştirmeler önermek, iç denetim değil, yönetim fonksiyonudur.", "cmt_en": "Proposing enhancements for subsequent development and implementation is a managerial, not an internal auditing, function."}], "answer": 1}, {"q_tr": "Aşağıdaki durumların haricindekilerin tümünde iç denetçinin nesnelliği tehlikeye girebilir:", "q_en": "An internal auditor’s objectivity could be compromised in all of the following situations except", "options": [{"tr": "Çıkar çatışması.", "en": "A conflict of interest.", "cmt_tr": "Tanımı gereği, çıkar çatışması iç denetçinin nesnelliğini tehlikeye atabilir.", "cmt_en": "By definition, a conflict of interest can compromise an internal auditor’s objectivity."}, {"tr": "Görev rotasyonunun olmaması nedeniyle denetim müşterisinin iç denetçiye aşinalığı.", "en": "An engagement client’s familiarity with the internal auditor due to lack of rotation in assignments.", "cmt_tr": "İDY, uygulanabilir olduğunda iç denetim personelinin görev atamalarını periyodik olarak döndürerek potansiyel ve fiili çıkar çatışmalarını önleyebilir.", "cmt_en": "The CAE can prevent potential and actual conflicts of interest by, when practicable, rotating internal audit staff assignments periodically."}, {"tr": "İç denetçinin geçici olarak operasyonel görevler üstlenmesi. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "en": "The internal auditor’s assumption of operational duties on a temporary basis. Study Unit 5: Ethics and Professionalism | Subunit 2: Objectivity", "cmt_tr": "İç denetim fonksiyonuna transfer olan veya geçici olarak görevlendirilen kişiler, en az 1 yıl geçmeden daha önce yürüttükleri faaliyetleri denetlemek üzere atanmamalıdır.", "cmt_en": "Persons transferred to, or temporarily engaged by, the internal audit function should not be assigned to audit those activities they previously performed until at least 1 year has elapsed."}, {"tr": "Uygun olduğunda dış hizmet sağlayıcıya güvenmek.", "en": "Reliance on an outside service provider when appropriate.", "cmt_tr": "İDY, iç denetçilerin görevin tamamını veya bir bölümünü yerine getirmek için gereken bilgi, beceri veya diğer yetkinliklere sahip olmaması durumunda yetkin danışmanlık ve yardım almalıdır (Standart 3.1). Bu nedenle, bu durumlarda dış hizmet sağlayıcıya başvurmak uygundur.", "cmt_en": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). Consulting an outside service provider is therefore appropriate in these circumstances."}], "answer": 3}, {"q_tr": "Düzenleyici standartlara uyumun gözden geçirilmesi sırasında, bir iç denetçi üst düzey bir yöneticiyi içeren potansiyel bir çıkar çatışması keşfeder. Denetçinin acil hareket tarzı ne olmalıdır?", "q_en": "During a review of compliance with regulatory standards, an internal auditor discovers a potential conflict of interest involving a senior executive. What should be the auditor’s immediate course of action?", "options": [{"tr": "Üst düzey bir yöneticiyi ilgilendirdiği için çatışmayı görmezden gelmek.", "en": "Ignore the conflict because it involves a senior executive.", "cmt_tr": "Çatışmayı görmezden gelmek etik standartları ve kontrol bütünlüğünü zedeler.", "cmt_en": "Ignoring the conflict undermines ethical standards and control integrity."}, {"tr": "Çatışmayı belgelemek ve derhal denetim komitesine raporlamak.", "en": "Document the conflict and immediately report it to the audit committee.", "cmt_tr": "Çatışmaların etkin yönetimi (problem çözme), güçlü bir kontrol ortamını destekler. Çatışmayı denetim komitesine raporlamak, şeffaflığı ve etik standartlara uyumu sağlayarak kontrol ortamının bütünlüğünü korumak için uygun önlemlerin alınmasına olanak tanır. Bu süreç, kuruluşun yönetişim ve etik uyum çerçevelerini destekler.", "cmt_en": "Effective handling of conflicts (problem solving) supports a robust control environment. Reporting the conflict to the audit committee ensures transparency and adherence to ethical standards, allowing for appropriate actions to be taken to maintain the integrity of the control environment. This process supports the organization’s governance and ethical compliance frameworks."}, {"tr": "Açıklama almak için ilgili yöneticiyle çatışmayı özel olarak görüşmek.", "en": "Discuss the conflict privately with the executive involved to seek clarification.", "cmt_tr": "Özel görüşmeler sorunu çözmeyebilir ve denetçinin nesnelliğini tehlikeye atabilir.", "cmt_en": "Private discussions may not resolve the issue and could compromise the auditor’s objectivity."}, {"tr": "Belirli çatışmayı ele almadan daha sıkı politikaların uygulanmasını önermek.", "en": "Recommend the implementation of stricter policies without addressing the specific conflict.", "cmt_tr": "Sorunu ele almadan daha sıkı politikalar uygulamak, belirli çatışmayı çözmez ve etik dışı davranışın sürmesine izin verebilir.", "cmt_en": "Implementing stricter policies without addressing the issue does not resolve the specific conflict and may allow unethical behavior to persist."}], "answer": 1}], "SU3 - Competency": [{"q_tr": "İç denetçiler, bireysel sorumluluklarını yerine getirmek için gerekli bilgi, beceri ve diğer yetkinliklere sahip olmalıdır. Bu nedenle tüm iç denetçiler aşağıdaki konularda yetkin olmalıdır:", "q_en": "Internal auditors must possess the knowledge, skills, and other competencies essential to performing their individual responsibilities. Thus, all internal auditors should be competent with regard to", "options": [{"tr": "Kuruluşun yönetişim, risk yönetimi ve kontrol çerçevesi içinde faaliyet göstermek.", "en": "Operating within the organization’s framework for governance, risk management, and control.", "cmt_tr": "İç denetim fonksiyonu toplu olarak sorumluluklarını yerine getirmek için gereken bilgi, beceri ve diğer yetkinliklere sahip olmalı veya bunları edinmelidir (Standart 3.1). Kuruluşun yönetişim, risk yönetimi ve kontrol çerçevesi içinde faaliyet göstermek, yönetişim, risk ve kontrol temel yetkinliğini destekleyen ayrıntılı bir yetkinliktir. Bu ayrıntılı yetkinlik, iç denetim fonksiyonunun her geniş iş düzeyi (personel, yönetici veya İDY) için önerilmektedir.", "cmt_en": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1). Operating within the organization’s framework for governance, risk management, and control is a detailed competency supporting the core competency of governance, risk, and control. This detailed competency is recommended for each broad job level (staff, manager, or CAE) of the internal audit function."}, {"tr": "Menkul kıymet yatırımlarını değerlendirmek.", "en": "Evaluating investments in securities.", "cmt_tr": "Standartlar, menkul kıymet yatırımlarının değerlendirilmesini özellikle ele almaz.", "cmt_en": "The Standards do not specifically address evaluating investments in securities."}, {"tr": "Yönetim ilkelerini operasyonel düzeyde uygulamak.", "en": "Applying management principles at the operational level.", "cmt_tr": "Standartlar, yönetim ilkelerinin operasyonel düzeyde uygulanmasını özellikle ele almaz.", "cmt_en": "The Standards do not specifically address applying management principles at the operational level."}, {"tr": "Yapılandırılmış sistem analizi yapmak.", "en": "Performing structured systems analysis.", "cmt_tr": "Standartlar, yapılandırılmış sistem analizi yapılmasını özellikle ele almaz.", "cmt_en": "The Standards do not specifically address performing structured systems analysis."}], "answer": 0}, {"q_tr": "İç denetçiler yeterliliklerini sürdürmek için eğitimlerine devam etmekle sorumludur. Uygulayıcı iç denetçiler için sürekli eğitim gereklilikleri hakkında aşağıdakilerden hangisi doğrudur?", "q_en": "Internal auditors are responsible for continuing their education to maintain proficiency. Which of the following is true for practicing internal auditors regarding continuing education requirements?", "options": [{"tr": "Uygulayıcı sertifikalı iç denetçiler her 2 yılda 40 saat sürekli mesleki eğitim almalıdır.", "en": "Practicing certified internal auditors must obtain 40 hours of continuing professional education every 2 years.", "cmt_tr": "Uygulayıcı sertifikalı iç denetçilerin yıllık 40 saat SME almaları gerekmektedir.", "cmt_en": "Practicing certified internal auditors are required to obtain 40 hours of CPE annually."}, {"tr": "CIA'ların, CIA olarak devam etmek için karşılaması gereken resmi gereklilikleri vardır.", "en": "CIAs have formal requirements that must be met to continue as CIAs.", "cmt_tr": "İç denetçiler, sürekli mesleki gelişim yoluyla bilgi, beceri ve diğer yetkinliklerini artırmalıdır (Standart 3.2). CIA unvanını sürdürmek için CIA, resmi bir sürekli mesleki gelişim programına bağlı kalmalı ve IIA'nın Sertifikasyon Departmanına raporlamalıdır. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "Internal auditors must enhance their knowledge, skills, and other competencies through continuing professional development (Standard 3.2). To maintain the CIA designation, the CIA must commit to a formal program of continuing professional development and report to the Certification Department of The IIA. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}, {"tr": "IIA resmi toplantılarına görevli veya komite üyesi olarak katılım, sürekli mesleki gelişim kriterlerini karşılamaz.", "en": "Attendance, as an off
