or a quantitatively material item if adverse effects are very unlikely to occur, for example, a material contingent liability that is unlikely to require recognition.", "cmt_en": "Internal auditors must exercise due professional care by considering the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.2). Materiality judgments are made based on all the circumstances and involve qualitative as well as quantitative considerations. Moreover, internal auditors also must consider the interplay of risk with materiality. Consequently, engagement effort may be reduced for a quantitatively material item if adverse effects are very unlikely to occur, for example, a material contingent liability that is unlikely to require recognition."}, {"tr": "Related information is unreliable.", "en": "Related information is unreliable.", "cmt_tr": "Additional engagement procedures might be needed if related information is unreliable.", "cmt_en": "Additional engagement procedures might be needed if related information is unreliable."}, {"tr": "Recurring income is involved.", "en": "Recurring income is involved.", "cmt_tr": "Recurring income is likely to be material.", "cmt_en": "Recurring income is likely to be material."}], "answer": 1}, {"q_tr": "The IIA’s due professional care standard requires internal auditors to", "q_en": "The IIA’s due professional care standard requires internal auditors to", "options": [{"tr": "Consider the adequacy of risk management and control but not board-level governance processes.", "en": "Consider the adequacy of risk management and control but not board-level governance processes.", "cmt_tr": "Internal auditors must exercise due professional care by considering the adequacy and effectiveness of governance, risk management, and control processes.", "cmt_en": "Internal auditors must exercise due professional care by considering the adequacy and effectiveness of governance, risk management, and control processes."}, {"tr": "Ignore the relative costs of assurances regarding material matters.", "en": "Ignore the relative costs of assurances regarding material matters.", "cmt_tr": "Internal auditors must exercise due professional care by considering the cost of assurance in relation to potential benefits.", "cmt_en": "Internal auditors must exercise due professional care by considering the cost of assurance in relation to potential benefits."}, {"tr": "Conduct examinations as would a reasonably prudent and competent auditor.", "en": "Conduct examinations as would a reasonably prudent and competent auditor.", "cmt_tr": "Internal auditors are expected to conduct examinations and verifications to the same extent as would a reasonably prudent and competent internal auditor in the same or similar circumstances.", "cmt_en": "Internal auditors are expected to conduct examinations and verifications to the same extent as would a reasonably prudent and competent internal auditor in the same or similar circumstances."}, {"tr": "Address fraud and errors rather than noncompliance with regulations. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "Address fraud and errors rather than noncompliance with regulations. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "Internal auditors must exercise due professional care by considering the probability of significant errors, fraud, or noncompliance.", "cmt_en": "Internal auditors must exercise due professional care by considering the probability of significant errors, fraud, or noncompliance."}], "answer": 2}, {"q_tr": "For internal auditors, due professional care most likely requires conformance with", "q_en": "For internal auditors, due professional care most likely requires conformance with", "options": [{"tr": "The organization’s code of conduct.", "en": "The organization’s code of conduct.", "cmt_tr": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. It may require conformance with the organization’s code of conduct.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. It may require conformance with the organization’s code of conduct."}, {"tr": "The IIA’s Global Internal Audit Standards.", "en": "The IIA’s Global Internal Audit Standards.", "cmt_tr": "For internal auditors, due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and any additional codes of conduct relevant to other professional designations attained. The internal audit function may have a formal process that requires internal auditors to sign an annual declaration related to The IIA’s Standards or the organization’s code of conduct.", "cmt_en": "For internal auditors, due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and any additional codes of conduct relevant to other professional designations attained. The internal audit function may have a formal process that requires internal auditors to sign an annual declaration related to The IIA’s Standards or the organization’s code of conduct."}, {"tr": "Additional codes of conduct that are relevant to the other designations attained.", "en": "Additional codes of conduct that are relevant to the other designations attained.", "cmt_tr": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. It may entail conformance with additional codes of conduct that are relevant to other designations attained.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. It may entail conformance with additional codes of conduct that are relevant to other designations attained."}, {"tr": "Any codes of conduct adopted by regulatory bodies", "en": "Any codes of conduct adopted by regulatory bodies", "cmt_tr": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. Any codes of conduct adopted by regulatory bodies are relevant only if they are in regulations that apply to the organization.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. Any codes of conduct adopted by regulatory bodies are relevant only if they are in regulations that apply to the organization."}], "answer": 1}, {"q_tr": "Internal auditors must apply due professional care in performing their work. They most likely apply due professional care by", "q_en": "Internal auditors must apply due professional care in performing their work. They most likely apply due professional care by", "options": [{"tr": "Conforming with relevant codes of conduct.", "en": "Conforming with relevant codes of conduct.", "cmt_tr": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and other codes of conduct.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and other codes of conduct."}, {"tr": "Applying The IIA’s mandatory internal auditing guidance.", "en": "Applying The IIA’s mandatory internal auditing guidance.", "cmt_tr": "Adherence to the mandatory guidance in The IIA’s Global Internal Audit Standards is necessary to performing duties with due professional care.", "cmt_en": "Adherence to the mandatory guidance in The IIA’s Global Internal Audit Standards is necessary to performing duties with due professional care."}, {"tr": "Following the policies and procedures of the internal audit function. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "Following the policies and procedures of the internal audit function. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "The internal audit function’s policies and procedures provide a systematic and disciplined approach to planning, executing, and documenting internal audit work. By following this approach, internal auditors essentially apply due professional care.", "cmt_en": "The internal audit function’s policies and procedures provide a systematic and disciplined approach to planning, executing, and documenting internal audit work. By following this approach, internal auditors essentially apply due professional care."}, {"tr": "All of the above.", "en": "All of the above.", "cmt_tr": "Performing internal audit duties with due professional care begins with appropriate education, experience, certifications, and training. Moreover, adherence to the mandatory guidance in The IIA’s Global Internal Audit Standards is necessary to performing duties with due professional care. Along with the Global Internal Audit Standards, the internal audit function’s policies and procedures provide a systematic and disciplined approach to planning, executing, and documenting internal audit work. By following this approach, internal auditors essentially apply due professional care. But due professional care depends in part on the engagement’s complexity. Furthermore, due professional care may entail conformance with the organization’s code of conduct and other codes of conduct relevant to other certifications attained.", "cmt_en": "Performing internal audit duties with due professional care begins with appropriate education, experience, certifications, and training. Moreover, adherence to the mandatory guidance in The IIA’s Global Internal Audit Standards is necessary to performing duties with due professional care. Along with the Global Internal Audit Standards, the internal audit function’s policies and procedures provide a systematic and disciplined approach to planning, executing, and documenting internal audit work. By following this approach, internal auditors essentially apply due professional care. But due professional care depends in part on the engagement’s complexity. Furthermore, due professional care may entail conformance with the organization’s code of conduct and other codes of conduct relevant to other certifications attained."}], "answer": 3}, {"q_tr": "In an assurance engagement performed with due professional care, internal auditors must", "q_en": "In an assurance engagement performed with due professional care, internal auditors must", "options": [{"tr": "Not guarantee that all significant risks are identified.", "en": "Not guarantee that all significant risks are identified.", "cmt_tr": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.2).", "cmt_en": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.2)."}, {"tr": "Consider the cost and benefits of the consultation.", "en": "Consider the cost and benefits of the consultation.", "cmt_tr": "An assurance engagement is not a consulting engagement. But cost and benefits must be considered in both.", "cmt_en": "An assurance engagement is not a consulting engagement. But cost and benefits must be considered in both."}, {"tr": "Use technology-based data analysis.", "en": "Use technology-based data analysis.", "cmt_tr": "In exercising due professional care, internal auditors must consider the use of technology-based audit and other data analysis techniques (Standard 4.2).", "cmt_en": "In exercising due professional care, internal auditors must consider the use of technology-based audit and other data analysis techniques (Standard 4.2)."}, {"tr": "Apply care and skill beyond mere competence and reasonable prudence.", "en": "Apply care and skill beyond mere competence and reasonable prudence.", "cmt_tr": "Internal auditors must apply the care and skill expected of a reasonably prudent and competent internal auditor. Due professional care does not imply infallibility (Standard 4.3). Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "Internal auditors must apply the care and skill expected of a reasonably prudent and competent internal auditor. Due professional care does not imply infallibility (Standard 4.3). Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 0}, {"q_tr": "The IIA’s Standards of Ethics and Professionalism apply to", "q_en": "The IIA’s Standards of Ethics and Professionalism apply to", "options": [{"tr": "IIA members but not candidates for certifications.", "en": "IIA members but not candidates for certifications.", "cmt_tr": "The Standards of Ethics and Professionalism apply to all internal auditors, not just IIA members.", "cmt_en": "The Standards of Ethics and Professionalism apply to all internal auditors, not just IIA members."}, {"tr": "Recipients of IIA certifications only.", "en": "Recipients of IIA certifications only.", "cmt_tr": "Internal auditors include candidates for certifications, holders of IIA certifications, IIA members, and practitioners of internal auditing.", "cmt_en": "Internal auditors include candidates for certifications, holders of IIA certifications, IIA members, and practitioners of internal auditing."}, {"tr": "All internal auditors.", "en": "All internal auditors.", "cmt_tr": "The IIA’s Standards of Ethics and Professionalism describe behavior norms for internal auditors. “Internal auditors” refers to anyone who performs independent and objective assurance and advisory services within an organization.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism describe behavior norms for internal auditors. “Internal auditors” refers to anyone who performs independent and objective assurance and advisory services within an organization."}, {"tr": "IIA members and certified internal auditors only.", "en": "IIA members and certified internal auditors only.", "cmt_tr": "Internal auditors also include candidates for certifications and anyone performing services as internal auditors.", "cmt_en": "Internal auditors also include candidates for certifications and anyone performing services as internal auditors."}], "answer": 2}], "SU5 - Confidentiality": [{"q_tr": "An internal auditor was reviewing filed payroll tax reports with payroll records. Two months later, the auditor shared salaries of certain employees with the organization’s Logistics Manager. Which principle of The IIA’s Standards of Ethics and Professionalism was violated?", "q_en": "An internal auditor was reviewing filed payroll tax reports with payroll records. Two months later, the auditor shared salaries of certain employees with the organization’s Logistics Manager. Which principle of The IIA’s Standards of Ethics and Professionalism was violated?", "options": [{"tr": "Objectivity.", "en": "Objectivity.", "cmt_tr": "The principle of objectivity states that internal auditors exhibit the highest level of professional objectivity in gathering, evaluating, and communicating information about the activity or process being examined. It does not address disclosure of confidential information.", "cmt_en": "The principle of objectivity states that internal auditors exhibit the highest level of professional objectivity in gathering, evaluating, and communicating information about the activity or process being examined. It does not address disclosure of confidential information."}, {"tr": "Confidentiality.", "en": "Confidentiality.", "cmt_tr": "According to the confidentiality principle of The IIA’s Standards of Ethics and Professionalism, internal auditors respect the value and ownership of information they receive and do not disclose information without appropriate authority unless there is a legal or professional obligation to do so. The auditor violated the principle of confidentiality by disclosing employees’ salaries to a co- worker.", "cmt_en": "According to the confidentiality principle of The IIA’s Standards of Ethics and Professionalism, internal auditors respect the value and ownership of information they receive and do not disclose information without appropriate authority unless there is a legal or professional obligation to do so. The auditor violated the principle of confidentiality by disclosing employees’ salaries to a co- worker."}, {"tr": "Authority.", "en": "Authority.", "cmt_tr": "Authority is defined as the right to govern or rule. Authority is not one of the principles of The IIA’s Standards of Ethics and Professionalism.", "cmt_en": "Authority is defined as the right to govern or rule. Authority is not one of the principles of The IIA’s Standards of Ethics and Professionalism."}, {"tr": "Competency.", "en": "Competency.", "cmt_tr": "The principle of competency requires internal auditors to apply the knowledge, skills, and experience needed in the performance of internal audit services. Confidential information is not included under the principle of competency.", "cmt_en": "The principle of competency requires internal auditors to apply the knowledge, skills, and experience needed in the performance of internal audit services. Confidential information is not included under the principle of competency."}], "answer": 1}, {"q_tr": "An internal auditor is performing services in a division in which the chief financial officer is a close personal friend, and the internal auditor learns that the friend is to be replaced after a series of critical labor negotiations. The internal auditor relays this information to the friend. Has a violation of The IIA’s Standards of Ethics and Professionalism occurred?", "q_en": "An internal auditor is performing services in a division in which the chief financial officer is a close personal friend, and the internal auditor learns that the friend is to be replaced after a series of critical labor negotiations. The internal auditor relays this information to the friend. Has a violation of The IIA’s Standards of Ethics and Professionalism occurred?", "options": [{"tr": "No. The use of the confidential information resulted in no personal gain to the internal auditor.", "en": "No. The use of the confidential information resulted in no personal gain to the internal auditor.", "cmt_tr": "The Standards specifically prohibit using information in a manner that would be detrimental to the legitimate and ethical objectives of the organization. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "The Standards specifically prohibit using information in a manner that would be detrimental to the legitimate and ethical objectives of the organization. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}, {"tr": "No. The internal auditor was just being honest with his or her friend.", "en": "No. The internal auditor was just being honest with his or her friend.", "cmt_tr": "The Standards specifically prohibit using information in a manner that would be detrimental to the legitimate and ethical objectives of the organization.", "cmt_en": "The Standards specifically prohibit using information in a manner that would be detrimental to the legitimate and ethical objectives of the organization."}, {"tr": "Yes. The internal auditor had a conflict of interest with the organization.", "en": "Yes. The internal auditor had a conflict of interest with the organization.", "cmt_tr": "The facts do not suggest that a conflict of interest with the organization existed. However, such a conflict would be present, for example, if the internal auditor used confidential information to seize a business opportunity that rightfully belonged to the organization. Furthermore, the internal auditor’s objectivity was impaired by auditing a division in which a relative or close personal friend was employed. The impairment, whether in fact or appearance, requires disclosure of the details to appropriate parties.", "cmt_en": "The facts do not suggest that a conflict of interest with the organization existed. However, such a conflict would be present, for example, if the internal auditor used confidential information to seize a business opportunity that rightfully belonged to the organization. Furthermore, the internal auditor’s objectivity was impaired by auditing a division in which a relative or close personal friend was employed. The impairment, whether in fact or appearance, requires disclosure of the details to appropriate parties."}, {"tr": "Yes. The internal auditor was not prudent in the use of information acquired in the course of his or her duties.", "en": "Yes. The internal auditor was not prudent in the use of information acquired in the course of his or her duties.", "cmt_tr": "The confidentiality principle states that internal auditors must be prudent in the use and protection of information acquired in the course of their duties. In this case, the decision whether to notify the financial officer of his or her replacement was properly the organization’s. Accordingly, the internal auditor was bound not to tell his or her friend.", "cmt_en": "The confidentiality principle states that internal auditors must be prudent in the use and protection of information acquired in the course of their duties. In this case, the decision whether to notify the financial officer of his or her replacement was properly the organization’s. Accordingly, the internal auditor was bound not to tell his or her friend."}], "answer": 3}, {"q_tr": "Which of the following most likely constitutes a violation of The IIA’s Standards of Ethics and Professionalism by an internal auditor?", "q_en": "Which of the following most likely constitutes a violation of The IIA’s Standards of Ethics and Professionalism by an internal auditor?", "options": [{"tr": "Discussing at a trade convention the organization’s controls over its computer networks.", "en": "Discussing at a trade convention the organization’s controls over its computer networks.", "cmt_tr": "Disclosure of information technology controls is not detrimental to the objectives of the organization. They are not likely to be trade secrets.", "cmt_en": "Disclosure of information technology controls is not detrimental to the objectives of the organization. They are not likely to be trade secrets."}, {"tr": "Purchasing stock in a target entity after overhearing an executive’s discussion of a possible acquisition.", "en": "Purchasing stock in a target entity after overhearing an executive’s discussion of a possible acquisition.", "cmt_tr": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization.", "cmt_en": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization."}, {"tr": "Deleting sensitive information from a final engagement communication at the request of senior management.", "en": "Deleting sensitive information from a final engagement communication at the request of senior management.", "cmt_tr": "If senior management permits the omission, the internal auditor is not guilty of failing to disclose material facts.", "cmt_en": "If senior management permits the omission, the internal auditor is not guilty of failing to disclose material facts."}, {"tr": "Investigating executive expense reports based completely on rumors of padding.", "en": "Investigating executive expense reports based completely on rumors of padding.", "cmt_tr": "An investigation of expense accounts is within the internal auditor’s normal responsibilities, but further investigation of fraud should ordinarily be made by investigative specialists.", "cmt_en": "An investigation of expense accounts is within the internal auditor’s normal responsibilities, but further investigation of fraud should ordinarily be made by investigative specialists."}], "answer": 1}, {"q_tr": "Which of the following actions taken by a chief audit executive (CAE) could be considered professionally ethical under The IIA’s Standards of Ethics and Professionalism?", "q_en": "Which of the following actions taken by a chief audit executive (CAE) could be considered professionally ethical under The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "The CAE decides to delay an engagement at a branch so that his nephew, the branch manager, will have time to “clean things up.” Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "en": "The CAE decides to delay an engagement at a branch so that his nephew, the branch manager, will have time to “clean things up.” Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_tr": "Internal auditors must perform their work with honesty, diligence, and responsibility.", "cmt_en": "Internal auditors must perform their work with honesty, diligence, and responsibility."}, {"tr": "To save organizational resources, the CAE cancels all staff training for the next 2 years on the basis that all staff are too new to benefit from training.", "en": "To save organizational resources, the CAE cancels all staff training for the next 2 years on the basis that all staff are too new to benefit from training.", "cmt_tr": "Internal auditors must continually improve their proficiency and the effectiveness and quality of their services.", "cmt_en": "Internal auditors must continually improve their proficiency and the effectiveness and quality of their services."}, {"tr": "To save organizational resources, the CAE limits procedures at foreign branches to confirmations from branch managers that no major personnel changes have occurred.", "en": "To save organizational resources, the CAE limits procedures at foreign branches to confirmations from branch managers that no major personnel changes have occurred.", "cmt_tr": "The Standards require supporting information to be sufficient, reliable, relevant, and useful.", "cmt_en": "The Standards require supporting information to be sufficient, reliable, relevant, and useful."}, {"tr": "The CAE refuses to provide information about organizational operations to his father, who is a part owner.", "en": "The CAE refuses to provide information about organizational operations to his father, who is a part owner.", "cmt_tr": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization. Thus, such use of information by the CAE might be illegal under insider trading rules.", "cmt_en": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization. Thus, such use of information by the CAE might be illegal under insider trading rules."}], "answer": 3}, {"q_tr": "Which of the following is permissible under The IIA’s Standards of Ethics and Professionalism?", "q_en": "Which of the following is permissible under The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Disclosing confidential, engagement-related information that is potentially damaging to the organization in response to a court order.", "en": "Disclosing confidential, engagement-related information that is potentially damaging to the organization in response to a court order.", "cmt_tr": "The principle of confidentiality permits the disclosure of confidential information if there is a legal or professional obligation to do so.", "cmt_en": "The principle of confidentiality permits the disclosure of confidential information if there is a legal or professional obligation to do so."}, {"tr": "Using engagement-related information in a decision to buy an ownership interest in the employer organization.", "en": "Using engagement-related information in a decision to buy an ownership interest in the employer organization.", "cmt_tr": "Standard 5.1 prohibits internal auditors from using information for personal gain.", "cmt_en": "Standard 5.1 prohibits internal auditors from using information for personal gain."}, {"tr": "Accepting an unexpected gift from an employee whom the internal auditor has praised in a recent engagement communication.", "en": "Accepting an unexpected gift from an employee whom the internal auditor has praised in a recent engagement communication.", "cmt_tr": "Standard 2.2 prohibits internal auditors from accepting anything that may impair, or be presumed to impair, their professional judgment.", "cmt_en": "Standard 2.2 prohibits internal auditors from accepting anything that may impair, or be presumed to impair, their professional judgment."}, {"tr": "Not reporting significant observations and recommendations about illegal activity to the board because management has indicated it will address the issue.", "en": "Not reporting significant observations and recommendations about illegal activity to the board because management has indicated it will address the issue.", "cmt_tr": "Standard 1.1 under the objectivity principle requires internal auditors to disclose all material facts known to them that, if not disclosed, might distort the reporting of activities under review. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "Standard 1.1 under the objectivity principle requires internal auditors to disclose all material facts known to them that, if not disclosed, might distort the reporting of activities under review. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}], "answer": 0}, {"q_tr": "Which situation most likely violates The IIA’s Standards of Ethics and Professionalism?", "q_en": "Which situation most likely violates The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "The chief audit executive (CAE) disagrees with the engagement client about the observations and recommendations in a sensitive area. The CAE discusses the detail of the observations and the proposed recommendations with a fellow CAE from another organization.", "en": "The chief audit executive (CAE) disagrees with the engagement client about the observations and recommendations in a sensitive area. The CAE discusses the detail of the observations and the proposed recommendations with a fellow CAE from another organization.", "cmt_tr": "The confidentiality principle states that internal auditors must be prudent in the use and protection of information acquired in the course of their duties. Discussion of sensitive matters with an unauthorized party is the situation most likely to be considered a violation.", "cmt_en": "The confidentiality principle states that internal auditors must be prudent in the use and protection of information acquired in the course of their duties. Discussion of sensitive matters with an unauthorized party is the situation most likely to be considered a violation."}, {"tr": "An organization’s charter for the internal audit function requires the chief audit executive (CAE) to present the yearly engagement work schedule to the board for its approval and suggestions.", "en": "An organization’s charter for the internal audit function requires the chief audit executive (CAE) to present the yearly engagement work schedule to the board for its approval and suggestions.", "cmt_tr": "Approval of the engagement work schedule by the board and senior management is required.", "cmt_en": "Approval of the engagement work schedule by the board and senior management is required."}, {"tr": "The engagement manager has removed the most significant observations and recommendations from the final engagement communication. The in-charge internal auditor opposed the removal, explaining that (s)he knows the reported conditions exist. The in-charge internal auditor agrees that, technically, information is not sufficient to support the observations, but management cannot explain the conditions, and the observations are the only reasonable conclusions.", "en": "The engagement manager has removed the most significant observations and recommendations from the final engagement communication. The in-charge internal auditor opposed the removal, explaining that (s)he knows the reported conditions exist. The in-charge internal auditor agrees that, technically, information is not sufficient to support the observations, but management cannot explain the conditions, and the observations are the only reasonable conclusions.", "cmt_tr": "Information must be sufficient to achieve engagement objectives.", "cmt_en": "Information must be sufficient to achieve engagement objectives."}, {"tr": "Because the internal audit function lacks skill and knowledge in a specialty area, the chief audit executive (CAE) has hired an expert. The engagement manager has been asked to review the expert’s approach to the assignment. Although knowledgeable about the area under review, the manager is hesitant to accept the assignment because of lack of expertise.", "en": "Because the internal audit function lacks skill and knowledge in a specialty area, the chief audit executive (CAE) has hired an expert. The engagement manager has been asked to review the expert’s approach to the assignment. Although knowledgeable about the area under review, the manager is hesitant to accept the assignment because of lack of expertise.", "cmt_tr": "The Standards allow use of experts when needed.", "cmt_en": "The Standards allow use of experts when needed."}], "answer": 0}, {"q_tr": "Which of the following situations is a violation of The IIA’s Standards of Ethics and Professionalism?", "q_en": "Which of the following situations is a violation of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "An internal auditor was ordered to testify in a court case in which a merger partner claimed to have been defrauded by the internal auditor’s organization. The internal auditor divulged confidential information to the court.", "en": "An internal auditor was ordered to testify in a court case in which a merger partner claimed to have been defrauded by the internal auditor’s organization. The internal auditor divulged confidential information to the court.", "cmt_tr": "The principle of confidentiality permits the disclosure of confidential information if there is a legal or professional obligation to do so.", "cmt_en": "The principle of confidentiality permits the disclosure of confidential information if there is a legal or professional obligation to do so."}, {"tr": "An internal auditor for a manufacturer of office products recently completed an engagement to evaluate the marketing function. Based on this experience, the internal auditor spent several hours one Saturday working as a paid consultant to a hospital in the local area that intended to conduct an engagement to evaluate its marketing function. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "en": "An internal auditor for a manufacturer of office products recently completed an engagement to evaluate the marketing function. Based on this experience, the internal auditor spent several hours one Saturday working as a paid consultant to a hospital in the local area that intended to c const SHEETS = ["SU1 - Integrity", "SU2 - Objectivity", "SU3 - Competency", "SU4 - Due Professional Care", "SU5 - Confidentiality"];
const SHORT_NAMES = {"SU1 - Integrity": "SU1", "SU2 - Objectivity": "SU2", "SU3 - Competency": "SU3", "SU4 - Due Professional Care": "SU4", "SU5 - Confidentiality": "SU5"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit5";
const HISTORY_KEY = LS_KEY + "_history";
const MAX_HISTORY = 5;

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  // Skip chapters with 0 questions (can happen in mistakes modes)
  while (ci < SHEETS.length && QUIZ[SHEETS[ci]].length === 0) { ci++; }
  if (ci >= SHEETS.length) { showOverall(); return; }
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  if (!qs || qs.length === 0 || curQ >= qs.length) { showChapterSummary(); return; }
  const q    = qs[curQ];
  if (!q) { showChapterSummary(); return; }
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  // Save history entry when quiz is fully completed
  if (!MISTAKES_MODE && !HISTORY_MISTAKES_MODE) {
    saveHistory();
  }

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function updateLangBtns(l) {
  document.querySelectorAll('#lang-group .lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
}

function setLang(l) {
  lang = l;
  updateLangBtns(l);
  if(!quizStarted) {
    const desc = document.getElementById("welcome-desc");
    if(desc && desc.dataset[l]) desc.textContent = desc.dataset[l];
    return;
  }
  updateProgress();
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}


// ── MISTAKES MODE ─────────────────────────────────────────────────────────────
const MISTAKES_MODE = new URLSearchParams(window.location.search).get('mode') === 'mistakes';

if (MISTAKES_MODE) {
  (function() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) { window.location.href = window.location.pathname; return; }
      const data = JSON.parse(raw);
      const sa = data.answered || [];
      const sc = data.correctArr || [];

      // Filter QUIZ to only incorrectly answered questions
      let offset = 0;
      let totalMistakes = 0;
      SHEETS.forEach(sname => {
        const orig = QUIZ[sname];
        const keep = [];
        for (let i = 0; i < orig.length; i++) {
          if (sa[offset + i] && !sc[offset + i]) {
            orig[i]._chosen = undefined;
            keep.push(orig[i]);
          }
        }
        offset += orig.length;
        QUIZ[sname] = keep;
        totalMistakes += keep.length;
      });

      if (totalMistakes === 0) { window.location.href = window.location.pathname; return; }

      // Don't overwrite original progress
      saveProgress = function() {};
      clearProgress = function() {};

      // Update UI for mistakes mode
      const appTitle = document.getElementById("app-title");
      if (appTitle) appTitle.textContent += " — Səhvlər";

      const welc = document.getElementById("welcome");
      if (welc) {
        const h1 = welc.querySelector("h1");
        if (h1) h1.innerHTML = `Səhv Suallar<br><span style="color:var(--gold);font-size:.65em">${appTitle ? appTitle.textContent : ''}</span>`;
        const desc = document.getElementById("welcome-desc");
        if (desc) desc.textContent = totalMistakes + (lang === "tr" ? " səhv sual — yenidən işlə" : " wrong answers — retry them");
        // Update stats
        const statsItems = welc.querySelectorAll(".ws-num");
        if (statsItems.length >= 2) {
          statsItems[0].textContent = SHEETS.filter(s => QUIZ[s].length > 0).length;
          statsItems[1].textContent = totalMistakes;
          if (statsItems[2]) statsItems[2].textContent = totalMistakes * 4;
        }
        // Change buttons
        const mainBtn = document.getElementById("btn-main-start");
        if (mainBtn) mainBtn.textContent = lang === "tr" ? "▶ Səhvləri İşlə" : "▶ Retry Mistakes";
        const freshBtn = document.getElementById("btn-fresh-start");
        if (freshBtn) freshBtn.style.display = "none";
      }

      // Override startOrResume to skip loading saved progress (we already filtered)
      const _origStartOrResume = startOrResume;
      startOrResume = function() {
        initState();
        quizStarted = true;
        document.getElementById("welcome").style.display = "none";
        document.getElementById("chapters-scroll").style.display = "";
        document.getElementById("overall-result").className = "";
        buildChapterTabs();
        goToChapter(0);
      };

      // Override goToMenu to go back without ?mode
      goToMenu = function() { window.location.href = "quiz_menu.html"; };

    } catch(e) { console.error("Mistakes mode error:", e); }
  })();
}


// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
  // Render history on welcome screen
  renderHistory();
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
// ── HISTORY SYSTEM ──────────────────────────────────────────────────────────
function saveHistory() {
  try {
    const tc = totalCorrect();
    const ta = totalAnswered();
    const tq = totalQuestions();
    const pct = tq ? Math.round(tc/tq*100) : 0;

    const chapters = SHEETS.map((sname, ci) => {
      const s = getChapterStats(ci);
      return { name: sname, correct: s.c, wrong: s.t - s.c, total: s.total };
    });

    const mistakeIndices = [];
    for (let i = 0; i < answered.length; i++) {
      if (answered[i] && !correctArr[i]) mistakeIndices.push(i);
    }

    const entry = {
      date: new Date().toISOString(),
      correct: tc,
      wrong: ta - tc,
      total: tq,
      pct: pct,
      chapters: chapters,
      mistakeIndices: mistakeIndices
    };

    let history = [];
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) history = JSON.parse(raw);
    } catch(e) {}

    history.unshift(entry);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) { console.error("saveHistory error:", e); }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function renderHistory() {
  const area = document.getElementById("history-area");
  if (!area) return;
  const history = loadHistory();
  if (history.length === 0) { area.innerHTML = ""; return; }

  const circ = 2 * Math.PI * 18;
  const titleText = lang === "tr" ? "Tarixçə" : "History";

  let html = `<div class="history-title">${titleText}</div>`;

  history.forEach((entry, idx) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(lang === "tr" ? "az-AZ" : "en-US", {
      day: "numeric", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    const fill = circ * (1 - entry.pct / 100);
    const ringColor = entry.pct >= 75 ? "var(--correct)" : entry.pct >= 50 ? "var(--gold)" : "var(--wrong)";
    const hasMistakes = entry.mistakeIndices && entry.mistakeIndices.length > 0;
    const mistakeCount = hasMistakes ? entry.mistakeIndices.length : 0;
    const retryLabel = lang === "tr"
      ? `${mistakeCount} səhv — təkrarla`
      : `${mistakeCount} wrong — retry`;

    html += `
      <div class="history-card">
        <div class="hc-ring">
          <svg viewBox="0 0 44 44">
            <circle class="hc-ring-track" cx="22" cy="22" r="18"/>
            <circle class="hc-ring-fill" cx="22" cy="22" r="18"
              stroke="${ringColor}"
              stroke-dasharray="${circ}" stroke-dashoffset="${fill}"/>
          </svg>
          <div class="hc-ring-label">${entry.pct}%</div>
        </div>
        <div class="hc-info">
          <div class="hc-date">${dateStr}</div>
          <div class="hc-stats">
            <span class="hc-correct">✓ ${entry.correct}</span> ·
            <span class="hc-wrong">✗ ${entry.wrong}</span> ·
            ${entry.total} ${lang === "tr" ? "sual" : "Q"}
          </div>
        </div>
        ${hasMistakes ? `<div class="hc-actions">
          <button class="hc-retry-btn" onclick="retryHistoryMistakes(${idx})">
            ${retryLabel}
          </button>
        </div>` : `<div class="hc-actions" style="font-size:11px;color:var(--correct);font-weight:700">✓ ${lang==="tr"?"Mükəmməl":"Perfect"}</div>`}
      </div>`;
  });

  area.innerHTML = html;
}

function retryHistoryMistakes(histIdx) {
  try {
    const history = loadHistory();
    if (!history[histIdx]) return;
    const entry = history[histIdx];
    const mistakeIndices = new Set(entry.mistakeIndices || []);
    if (mistakeIndices.size === 0) return;

    localStorage.setItem(HISTORY_KEY + "_retry", JSON.stringify(entry.mistakeIndices));
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    window.location.href = baseUrl + "?mode=history_mistakes";
  } catch(e) { console.error("retryHistoryMistakes error:", e); }
}
