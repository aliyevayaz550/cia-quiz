icer or committee member, at formal IIA meetings does not meet the criteria of continuing professional development.", "cmt_tr": "Sürekli eğitim, meslek kuruluşlarına katılım yoluyla elde edilebilir.", "cmt_en": "Continuing education may be obtained by participation in professional organizations."}, {"tr": "Kurum içi programlar, sürekli mesleki eğitim gerekliliklerini yalnızca IIA tarafından önceden onaylanmışsa karşılar.", "en": "In-house programs meet continuing professional education requirements only if they are preapproved by The IIA.", "cmt_tr": "SME dersleri için IIA'nın önceden onayı gerekli değildir.", "cmt_en": "Prior approval by The IIA is not necessary for CPE courses."}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi IIA Etik ve Profesyonellik Standartlarının ihlalini en çok oluşturur?", "q_en": "Which of the following most likely constitutes a violation of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Denetçi A, elektronik üretim bölümünde denetim görevi yapmak üzere atanmıştır. Denetçi A yakın zamanda iç denetim fonksiyonuna katılmıştır. Ancak Denetçi A, o bölümün dış denetiminde kıdemli denetçi olarak çalışmış ve son 2 yılda birçok elektronik kuruluşunu denetlemiştir.", "en": "Auditor A accepted an assignment to perform an engagement at the electronics manufacturing division. Auditor A recently joined the internal audit function. But Auditor A was senior auditor for the external audit of that division and has audited many electronics organizations during the past 2 years.", "cmt_tr": "Özellikle iç denetçinin daha önce kamu denetiminde çalıştığı göz önüne alındığında, tek başına bir mesleki çıkar çatışması yoktur. Ancak iç denetçi potansiyel çatışmaların farkında olmalıdır.", "cmt_en": "No professional conflict of interest exists per se, especially given that the internal auditor was previously in public accounting. However, the internal auditor should be aware of potential conflicts."}, {"tr": "Denetçi B, 6 ay sonra depolama fonksiyonunda denetim görevi yapmak üzere atanmıştır. Denetçi B bu alanda uzmanlığa sahip değildir ancak görevi yine de kabul etmiştir. Denetçi B, görev başlamadan önce tamamlanacak olan depolama konusunda sürekli mesleki eğitim kurslarına kaydolmuştur.", "en": "Auditor B has been assigned to perform an engagement at the warehousing function 6 months from now. Auditor B has no expertise in that area but accepted the assignment anyway. Auditor B has signed up for continuing professional education courses in warehousing that will be completed before the assignment begins.", "cmt_tr": "İç denetçi, gerekli bilgi, beceri ve yetkinliklere görevin kabul edildiği anda değil, yürütüldüğü anda sahip olmalıdır.", "cmt_en": "An internal auditor must possess the necessary knowledge, skills, and competencies at the time an engagement is conducted, not the time it is accepted."}, {"tr": "Denetçi C, iç denetçi olarak memnundur ve bunu normal bir 9-5 iş olarak görmeye başlamıştır. Denetçi C, son 3 yılda etkinliğini artırmak için sürekli mesleki eğitime veya diğer faaliyetlere katılmamıştır. Ancak Denetçi C, kaliteli iş performansının eskisi kadar iyi olduğunu düşünmektedir.", "en": "Auditor C is content as an internal auditor and has come to look at it as a regular 9-to-5 job. Auditor C has not engaged in continuing professional education or other activities to improve effectiveness during the last 3 years. However, Auditor C feels performance of quality work is the same as before.", "cmt_tr": "Standart 3.1 Yetkinlik, \"İç denetçiler, sorumluluklarını başarıyla yerine getirmek için gereken yetkinliklere sahip olmalı veya bunları edinmelidir\" ifadesini içerir. Ayrıca, \"İç denetçiler yalnızca gerekli yetkinliklere sahip oldukları veya sahip olabilecekleri hizmetlerde bulunmalıdır. Her iç denetçi, mesleki sorumluluklarını yerine getirmek için gereken yetkinlikleri sürekli olarak geliştirmek ve uygulamaktan sorumludur.\"", "cmt_en": "Standard 3.1 Competency states, “Internal auditors must possess or obtain the competencies to perform their responsibilities successfully.” In addition, “Internal auditors must engage only in those services for which they have or can attain the necessary competencies. Each internal auditor is responsible for continually developing and applying the competencies necessary to fulfill their professional responsibilities.”"}, {"tr": "Denetçi D, yıl içinde dahili bir mali hile keşfetmiştir. Defterler, hileyle ilişkili kaybı düzgün bir şekilde yansıtmak üzere düzeltilmiştir. Denetçi D, dış denetçi olayı detaylandıran çalışma kağıtlarını incelediğinde hileyi dış denetçiyle görüşmüştür.", "en": "Auditor D discovered an internal financial fraud during the year. The books were adjusted to properly reflect the loss associated with the fraud. Auditor D discussed the fraud with the external auditor when the external auditor reviewed working papers detailing the incident.", "cmt_tr": "Bilgi, iç ve dış denetçi arasındaki normal iş birliği sürecinin bir parçası olarak açıklanmıştır. Defterler düzeltildiği için, dış denetçinin düzeltmenin niteliğini sorgulaması bekleniyordu. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "The information was disclosed as part of the normal process of cooperation between the internal and external auditor. Because the books were adjusted, the external auditor was expected to inquire as to the nature of the adjustment. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 2}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarındaki yetkinlik ilkesine göre, iç denetçiler şunları yapmalıdır:", "q_en": "According to the competency principle in The IIA’s Standards of Ethics and Professionalism, internal auditors must", "options": [{"tr": "İşlerini dürüstlük ve özenle yerine getirmek.", "en": "Perform their work with honesty and diligence.", "cmt_tr": "Dürüstlük ilkesi, iç denetçilerin işlerini dürüstlük ve mesleki cesaretle yerine getirmesini gerektirir.", "cmt_en": "The integrity principle states that internal auditors must perform their work with honesty and professional courage."}, {"tr": "Kalite ve verimlilik göstermek.", "en": "Demonstrate quality and productivity.", "cmt_tr": "Bu, yetkinlik ilkesi kapsamında bir gereklilik değildir.", "cmt_en": "This is not a requirement under the competency principle."}, {"tr": "Yeterliliklerini sürekli olarak geliştirmek.", "en": "Continually improve their proficiency.", "cmt_tr": "Yetkinlik ilkesine göre, iç denetçiler iç denetim hizmetlerinin ifasında gereken bilgi, beceri ve deneyimi uygulamalıdır. İç denetçiler yeterliliklerini ve hizmetlerinin etkinliğini ve kalitesini sürekli olarak geliştirmelidir.", "cmt_en": "According to the competency principle, internal auditors must apply the knowledge, skills, and experience needed in the performance of internal audit services. Internal auditors must continually improve their proficiency and the effectiveness and quality of their services."}, {"tr": "Etkili iletişim kurmak.", "en": "Communicate effectively.", "cmt_tr": "Bu, yetkinlik ilkesi kapsamında bir gereklilik değildir.", "cmt_en": "This is not a requirement under the competency principle."}], "answer": 2}, {"q_tr": "İç Denetim Yöneticisi (İDY) en çok aşağıdakilerden hangisiyle yetkinlik kültürünü teşvik eder?", "q_en": "The chief audit executive (CAE) most likely promotes a culture of competency by", "options": [{"tr": "İç denetçileri özen göstermeye yönlendiren politika ve prosedürler oluşturmak.", "en": "Establishing policies to guide internal auditors to show diligence.", "cmt_tr": "İDY'nin dürüstlüğü uygulama sorumluluğu, iç denetim fonksiyonunu özen ve sorumluluk göstermeye yönlendiren politika ve prosedürler oluşturmayı içerir (Dürüstlük).", "cmt_en": "The CAE’s responsibility for implementing integrity includes establishing policies and procedures to guide the internal audit function to show diligence and responsibility (Integrity)."}, {"tr": "Etik ilkeleri uygulamada gösteren eğitim programları uygulamak.", "en": "Implementing training programs that demonstrate ethical principles in action.", "cmt_tr": "İDY, dürüstlüğü ve diğer etik ilkeleri uygulamada gösteren eğitimler sağlayarak dürüstlüğü vurgulayabilir (Dürüstlük).", "cmt_en": "The CAE may emphasize integrity by providing training that demonstrates integrity and other ethics principles in action (Integrity)."}, {"tr": "Aktif bir kalite güvence programının kanıtını sağlamak.", "en": "Providing evidence of an active quality assurance program.", "cmt_tr": "İDY, kalite güvence ve iyileştirme programının aktif olduğuna dair kanıtlar yoluyla yetkinliği ve yeterliliğin, etkinliğin ve kalitenin sürekli iyileştirilmesini destekleyen bir kültür gösterebilir (Yetkinlik).", "cmt_en": "The CAE may demonstrate a culture supportive of competency and the continual improvement of proficiency, effectiveness, and quality through evidence that a quality assurance and improvement program is active (Competency)."}, {"tr": "İç denetim raporlarında tüm önemli olguların açıklanmasını zorunlu kılmak.", "en": "Requiring disclosure of all material facts in internal audit reports.", "cmt_tr": "İç denetçiler, açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları açıklamalıdır (Nesnellik). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "Internal auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review (Objectivity). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 2}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarının hangi ilkeleri, iç denetçilerin hizmetlerini Küresel İç Denetim Standartlarına uygun olarak yerine getirmesini gerektirir veya önerir?", "q_en": "Which principles of The IIA’s Standards of Ethics and Professionalism require or recommend that internal auditors perform services in accordance with the Global Internal Audit Standards (Standards).", "options": [{"tr": "Dürüstlük ve nesnellik.", "en": "Integrity and objectivity.", "cmt_tr": "Nesnellikle ilgili rehberlik, Standartlara uyumu ele almaz.", "cmt_en": "The guidance related to objectivity does not address adherence to the Standards."}, {"tr": "Yetkinlik ve gizlilik.", "en": "Competency and confidentiality.", "cmt_tr": "Gizlilikle ilgili rehberlik, Standartlara uyumu ele almaz.", "cmt_en": "The guidance related to confidentiality does not address adherence to the Standards."}, {"tr": "Nesnellik ve gizlilik.", "en": "Objectivity and confidentiality.", "cmt_tr": "Nesnellik ve gizlilikle ilgili hiçbir rehberlik Standartlara uyumu ele almaz.", "cmt_en": "No guidance related to objectivity and confidentiality addresses adherence to the Standards."}, {"tr": "Dürüstlük ve yetkinlik.", "en": "Integrity and competency.", "cmt_tr": "Yetkinlik ilkesi, iç denetçilerin hizmetlerini Standartlara uygun olarak yerine getirmesini gerektirir. Dürüstlük ilkesi, Standartlara uyumsuzluğun saygınlığı zedeleyici olabileceğini belirtir. Standart 1.3, mesleğe veya kuruluşa saygınlığı zedeleyici eylemleri yasaklar.", "cmt_en": "The competency principle states that internal auditors must perform services in accordance with the Standards. The integrity principle states that noncompliance with the Standards may be discreditable. Standard 1.3 prohibits acts discreditable to the profession or the organization."}], "answer": 3}, {"q_tr": "İç denetçilerin yetkinlik ilkesine uyumu en çok aşağıdakilerden hangisiyle gösterilir?", "q_en": "Internal auditors’ conformance with the competency principle most likely is demonstrated by", "options": [{"tr": "Görevlerin uygun şekilde kaynaklandırılması.", "en": "Proper resourcing of engagements.", "cmt_tr": "İDY, görevlerin uygun şekilde kaynaklandırıldığı ve denetlendiğine dair kanıtlar yoluyla yetkinliği ve yeterliliğin, etkinliğin ve kalitenin sürekli iyileştirilmesini destekleyen bir kültür gösterebilir (Yetkinlik).", "cmt_en": "The CAE may demonstrate a culture supportive of competency and the continual improvement of proficiency, effectiveness, and quality through evidence that engagements have been properly resourced and supervised (Competency)."}, {"tr": "Hukuk danışmanı tarafından onaylanan açıklamaların belgelenmesi.", "en": "Documenting disclosures approved by legal counsel.", "cmt_tr": "İDY, varsa hukuk danışmanı, üst yönetim ve yönetim kurulu tarafından onaylanan açıklamaların kayıtlarını belgeleyerek ve saklayarak gizlilik ilkesine uyumu gösterir (Gizlilik).", "cmt_en": "The CAE demonstrates conformance with the confidentiality principle by documenting and retaining records of disclosures approved by legal counsel, if applicable, and by senior management and the board (Confidentiality)."}, {"tr": "Tüm açıklamaların yetkilerinin saklanması.", "en": "Retaining authorizations of all disclosures.", "cmt_tr": "İç denetçiler, denetim çalışma kağıtlarında ve raporlarında dağıtım kısıtlamalarını belgeleyerek ve tüm açıklamaların yetkilerini ve onaylı dağıtım listelerini saklayarak denetim kayıtlarının gizliliğine uyumu gösterir (Gizlilik).", "cmt_en": "Internal auditors demonstrate conformance with engagement record confidentiality by documenting distribution restrictions in engagement workpapers and reports and by retaining authorizations of all disclosures and approved distribution lists (Confidentiality)."}, {"tr": "Bilgilerin kullanımı ve korunmasında tedbirlilik.", "en": "Prudence in using and protecting information.", "cmt_tr": "İç denetçiler, görevleri sırasında elde edilen bilgilerin kullanımı ve korunmasında tedbirli olmalıdır (Gizlilik). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "Internal auditors must be prudent in the use and protection of information acquired in the course of their duties (Confidentiality). Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 0}, {"q_tr": "İç denetim fonksiyonunun toplu olarak belirli yetkinliklere sahip olması veya edinmesi gerekir. İç denetim personeli aşağıdaki konularda yetkin olmalıdır:", "q_en": "The internal audit function collectively must possess or obtain certain competencies. Internal audit staff should be competent in", "options": [{"tr": "Küresel İç Denetim Standartlarının kullanımı.", "en": "The use of the Global Internal Audit Standards.", "cmt_tr": "İç denetim fonksiyonu toplu olarak sorumluluklarını yerine getirmek için gereken bilgi, beceri ve diğer yetkinliklere sahip olmalı veya bunları edinmelidir (Standart 3.1). İç denetçilerin teknik uzmanlığının vurgusu şunlara yöneliktir: (1) Küresel İç Denetim Standartları; (2) yönetişim, risk ve kontrol; ve (3) iş bilgisi.", "cmt_en": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1). The emphasis of internal auditors’ technical expertise is on (1) the Global Internal Audit Standards; (2) governance, risk, and control; and (3) business acumen."}, {"tr": "Finans.", "en": "Finance.", "cmt_tr": "Standartlar finans kullanımını özellikle ele almaz.", "cmt_en": "The Standards do not specifically address the use of finance."}, {"tr": "Genel yönetim ilkeleri.", "en": "General management principles.", "cmt_tr": "İç denetim personeli, genel yönetim ilkeleri değil, iç denetim yönetimi konusunda belirli yetkinliklere sahip olmalıdır (örneğin, güncel yetkinliklerin sürdürülmesi).", "cmt_en": "Internal audit staff should have certain competencies regarding internal audit management (e.g., maintaining up-to-date competencies), not general management principles."}, {"tr": "Pazarlama.", "en": "Marketing.", "cmt_tr": "İç denetçilerin genellikle pazarlama konusunda yetkin olması gerekmez.", "cmt_en": "Internal auditors ordinarily need not be competent in marketing."}], "answer": 0}, {"q_tr": "İç denetim fonksiyonu toplu olarak aşağıdaki konularda belirli yetkinliklere sahip olmalı veya edinmelidir:", "q_en": "The internal audit function collectively must possess or obtain certain competency in", "options": [{"tr": "Sözleşme hukuku.", "en": "Contract law.", "cmt_tr": "Standartlar sözleşme hukukunu özellikle ele almaz.", "cmt_en": "The Standards do not specifically address contract law."}, {"tr": "Bilgi teknolojisi kontrolleri.", "en": "Information technology controls.", "cmt_tr": "İç denetçiler, (1) temel bilgi teknolojisi riskleri ve kontrolleri ve (2) mevcut teknoloji tabanlı denetim teknikleri hakkında yeterli bilgiye sahip olmalıdır. Ancak tüm iç denetçilerin, asıl sorumluluğu bilgi teknolojisi denetimi olan bir iç denetçinin uzmanlığına sahip olması beklenmez (Standart 3.2).", "cmt_en": "Internal auditors must have sufficient knowledge of (1) key information technology risks and controls and (2) available technology-based audit techniques to perform their assigned work. But not all internal auditors are expected to have the expertise of an internal auditor whose primary responsibility is information technology auditing (Standard 3.2)."}, {"tr": "Yönetim ilkeleri.", "en": "Management principles.", "cmt_tr": "Standartlar yönetim ilkelerini özellikle ele almaz.", "cmt_en": "The Standards do not specifically address management principles."}, {"tr": "Pazarlama.", "en": "Marketing.", "cmt_tr": "Standartlar pazarlamayı özellikle ele almaz. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "The Standards do not specifically address marketing. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 1}, {"q_tr": "Denetim müşterileriyle personel iletişim sorunları için en uygun önleyici tedbir nedir?", "q_en": "What is the most appropriate preventive measure for staff communication problems with engagement clients?", "options": [{"tr": "İletişim becerilerini geliştirmek için personele yeterli eğitim sağlamak.", "en": "Provide staff with sufficient training to enhance communication skills.", "cmt_tr": "İç denetim fonksiyonu, yetkinlik ilkesi standartlarını etkin bir şekilde uyguladığında Standartların gerektirdiği yeterliliği elde edebilir ve sürdürebilir. İlkenin bilgi alanlarından biri iletişimdir. Buna göre, iç denetim personeline iletişim becerilerini geliştirmek için yeterli eğitim sağlanmalıdır.", "cmt_en": "The internal audit function can obtain and maintain the proficiency required by the Standards if it effectively applies the competency principle standards. One of the knowledge areas of the principle is communication. Accordingly, the internal audit staff should be provided with sufficient training to enhance communication skills."}, {"tr": "Denetim müşterileriyle gereksiz iletişimden kaçınmak.", "en": "Avoid unnecessary communication with engagement clients.", "cmt_tr": "Sorun iletişimin niceliğinden çok niteliğiyle ilgilidir.", "cmt_en": "The issue is the quality rather than the quantity of communication."}, {"tr": "Personel denetçileriyle iletişim sorunlarını görüşmek.", "en": "Discuss communication problems with staff auditors.", "cmt_tr": "İletişim sorunları etkili eğitim yoluyla çözülmelidir.", "cmt_en": "Communication problems should be resolved through effective training."}, {"tr": "İletişim sorunlarını çözmek için denetim müşterileriyle görüşmek.", "en": "Meet with engagement clients to resolve communication problems.", "cmt_tr": "Denetim müşterileriyle görüşmek, zayıf personel iletişim becerilerinin neden olduğu sorunları çözmez.", "cmt_en": "Meeting with engagement clients will not resolve problems caused by poor staff communication skills."}], "answer": 0}, {"q_tr": "İç denetim görevlerinin yeterlilik ve mesleki özenle yerine getirilmesi gerektiği göz önüne alındığında, aşağıdakilerden hangisi doğrudur?", "q_en": "Given that internal audit engagements must be performed with proficiency and due professional care, which of the following is true?", "options": [{"tr": "Tüm iç denetçiler gerekli tüm yetkinliklerde yetkin olmalıdır.", "en": "All internal auditors must be proficient in all necessary competencies.", "cmt_tr": "Her denetçi bireysel olarak değil, iç denetim fonksiyonu bir bütün olarak gerekli tüm yetkinliklerde yetkin olmalıdır.", "cmt_en": "The internal audit function as a whole, not each auditor individually, must be proficient in all necessary competencies."}, {"tr": "İç denetim fonksiyonu, gerekli yetkinliklere şu anda sahip olmadığı için bir görevi reddetmek zorunda değildir.", "en": "The internal audit function need not decline an engagement because it currently lacks the needed competencies.", "cmt_tr": "İç denetim fonksiyonu toplu olarak sorumluluklarını yerine getirmek için gereken bilgi, beceri ve diğer yetkinliklere sahip olmalı veya bunları edinmelidir (Standart 3.1).", "cmt_en": "The internal audit function collectively must possess or obtain the knowledge, skills, and other competencies needed to perform its responsibilities (Standard 3.1)."}, {"tr": "İç denetçi, BT denetimi konusunda uzman düzeyinde bilgiye sahip olmalıdır.", "en": "An internal auditor should have the expertise of a specialist in IT auditing.", "cmt_tr": "Tüm iç denetçilerin, asıl sorumluluğu BT denetimi olan bir denetçinin uzmanlığına sahip olması beklenmez.", "cmt_en": "Not all internal auditors are expected to have the expertise of an internal auditor whose primary responsibility is in IT auditing."}, {"tr": "İç denetçi, hile tespiti konusunda uzman düzeyinde bilgiye sahip olmalıdır.", "en": "An internal auditor should have the expertise of a specialist in fraud detection.", "cmt_tr": "Tüm iç denetçilerin, asıl sorumluluğu hile tespiti ve soruşturması olan bir kişinin uzmanlığına sahip olması beklenmez. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "Not all internal auditors are expected to have the expertise of a person whose primary responsibility is detecting and investigating fraud. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}], "answer": 1}, {"q_tr": "Sağlık hizmetleri faydaları konusunda uzmanlığa sahip dış hizmet sağlayıcılarının kullanımı, iç denetim fonksiyonu aşağıdakilerden hangisini yaparken uygundur?", "q_en": "Use of external service providers with expertise in healthcare benefits is appropriate when the internal audit function is", "options": [{"tr": "Kuruluşun sağlık hizmetlerini içeren emeklilik sonrası faydalar yükümlülüğü tahminini değerlendirirken.", "en": "Evaluating the organization’s estimate of its liability for postretirement benefits, which include healthcare benefits.", "cmt_tr": "Sağlık hizmetleri faydaları konusunda uzmanlığa sahip dış hizmet sağlayıcılarının kullanımı, sağlık maliyetlerini sektör standartlarıyla karşılaştırırken ve personeli sağlık denetimleri yapmak üzere eğitirken de uygundur.", "cmt_en": "Use of external service providers with expertise in healthcare benefits is also appropriate when benchmarking healthcare costs against industry standards and training staff to conduct healthcare audits."}, {"tr": "Kuruluşun sağlık programı maliyetlerini veri analitiği kullanarak sektör standartlarıyla karşılaştırırken.", "en": "Benchmarking the organization’s healthcare program costs against industry standards using data analytics.", "cmt_tr": "Sağlık hizmetleri faydaları konusunda uzmanlığa sahip dış hizmet sağlayıcılarının kullanımı, emeklilik sonrası faydalar tahmini yükümlülüğünü değerlendirirken ve personeli sağlık denetimleri yapmak üzere eğitirken de uygundur.", "cmt_en": "Use of external service providers with expertise in healthcare benefits is also appropriate when evaluating the estimated liability for postretirement benefits and training staff to conduct healthcare audits."}, {"tr": "Personelini kuruluşun büyük bir bölümünde sağlık maliyetleri denetimi yapmak üzere eğitirken.", "en": "Training its staff to conduct an audit of healthcare costs in a major division of the organization.", "cmt_tr": "Sağlık hizmetleri faydaları konusunda uzmanlığa sahip dış hizmet sağlayıcılarının kullanımı, sağlık maliyetlerini sektör standartlarıyla karşılaştırırken ve emeklilik sonrası faydalar tahmini yükümlülüğünü değerlendirirken de uygundur.", "cmt_en": "Use of external service providers with expertise in healthcare benefits is also appropriate when benchmarking healthcare costs against industry standards and evaluating the estimated liability for postretirement benefits."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "İç denetçilerin gerekli uzmanlığa sahip olmaması durumunda, gerekli bilgi, beceri ve diğer yetkinlikleri sağlayabilecek dış hizmet sağlayıcılar kullanılmalıdır. Bu nedenle, dış hizmet sağlayıcılar (1) emeklilik sonrası faydalar yükümlülüğünün tahmin edilmesinde, (2) sağlık maliyetlerinin karşılaştırılmasında ve (3) personelin sağlık maliyetleri denetimi yapmak üzere eğitilmesinde yardım sağlayabilir.", "cmt_en": "If the internal auditors lack the necessary expertise, external service providers should be employed who can provide the requisite knowledge, skills, and other competencies. Thus, external service providers may provide assistance in (1) estimating the liability for postretirement benefits, (2) benchmarking healthcare costs, and (3) training the staff to audit healthcare costs."}], "answer": 3}, {"q_tr": "İç denetim fonksiyonu belirli bir denetim görevini yerine getirmek için gerekli uzmanlığa sahip olmadığında, İDY aşağıdakilerden hangisini yapmalıdır?", "q_en": "When the internal audit function lacks the expertise to perform a specific engagement, the chief audit executive (CAE) should do which of the following?", "options": [{"tr": "Personelin yerine getirmesi mümkün olmayan kapsamın denetimden çıkarılması için yönetimle müzakere etmek.", "en": "Negotiate with management to remove from the scope any portion of the audit that the staff is unable to perform.", "cmt_tr": "İDY, görevin kapsamını daraltmak için yönetimle müzakere etmek yerine yetkin danışmanlık ve yardım almalıdır. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "The CAE must obtain competent advice and assistance, not negotiate with management to reduce the scope of the engagement. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}, {"tr": "Görevi başarmak için yeterli uzmanlığa sahip dış kaynaklar kullanmak.", "en": "Use external resources with sufficient expertise to accomplish the engagement.", "cmt_tr": "İDY, iç denetçilerin görevin tamamını veya bir bölümünü yerine getirmek için gereken bilgi, beceri veya diğer yetkinliklere sahip olmaması durumunda yetkin danışmanlık ve yardım almalıdır (Standart 3.1).", "cmt_en": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1)."}, {"tr": "İlgili becerilere sahip yeni bir iç denetçi işe alana kadar görevi ertelemek.", "en": "Postpone the engagement until the CAE can hire a new internal auditor with the relevant skills.", "cmt_tr": "İDY, yetkin bir iç denetçi işe alınana kadar görevi ertelemek yerine mevcut dış kaynakları kullanmalıdır.", "cmt_en": "The CAE must use available external resources, not postpone the engagement until a competent internal auditor is hired."}, {"tr": "Denetim personelinin uzmanlık eksikliği olan alanlarda yönetimin öz değerlendirmesine güvenerek göreve devam etmek.", "en": "Continue with the engagement but rely on management’s self-assessment in the areas where the audit staff lacks expertise", "cmt_tr": "İDY, görevi yerine getirmek için gerekli yetkin danışmanlık ve yardımı elde edene kadar göreve devam etmemelidir.", "cmt_en": "The CAE must not continue the engagement until (s)he obtains the competent advice and assistance necessary to perform the engagement."}], "answer": 1}, {"q_tr": "İç denetim fonksiyonunun insan kaynaklarının yeterliliğinden kim sorumludur?", "q_en": "Who is responsible for the sufficiency of the internal audit function’s human resources?", "options": [{"tr": "Denetim komitesi.", "en": "Audit committee.", "cmt_tr": "Denetim komitesi, tam yönetim kurulu veya üst yönetim nihayetinde kaynakların yeterliliğini sağlamalıdır.", "cmt_en": "The audit committee, the full board, or senior management ultimately must ensure the sufficiency of resources."}, {"tr": "İnsan kaynakları müdürü.", "en": "Human resources director.", "cmt_tr": "İDY'nin insan kaynakları müdürüne raporlaması olası değildir.", "cmt_en": "The CAE is unlikely to report to the human resources director."}, {"tr": "İç Denetim Yöneticisi (İDY).", "en": "Chief audit executive (CAE).", "cmt_tr": "İDY, iç denetim fonksiyonunun sorumluluklarını yerine getirebilmesini sağlamalıdır. İç denetim fonksiyonu içindeki mevcut bilgi, beceri ve yetkinliklerin belirlenmesi, İDY'nin mevcut personelin bu sorumlulukları karşılamak için yeterli olup olmadığını belirlemesine yardımcı olur.", "cmt_en": "The CAE must ensure that the internal audit function is able to fulfill its responsibilities. Identifying the available knowledge, skills, and competencies within the internal audit function helps the CAE determine whether the current staff is sufficient to satisfy those responsibilities."}, {"tr": "İç denetim fonksiyonunun raporladığı üst yönetici.", "en": "Senior manager to whom the internal audit function reports.", "cmt_tr": "İDY, kaynakların yeterliliğinden ve yönetiminden birincil olarak sorumludur. Ancak iç denetim fonksiyonunun raporladığı üst yönetici, İDY'nin ihtiyaç duyduğu kaynakları uygulamaktan sorumlu olabilir.", "cmt_en": "The CAE is primarily responsible for the sufficiency and management of resources. But the senior manager to whom the internal audit function reports may be responsible for applying resources needed by the CAE."}], "answer": 2}, {"q_tr": "İç denetim fonksiyonunun en çok bir dış hizmet sağlayıcının (DHS) bilgi, beceri veya diğer yetkinliklerine ihtiyaç duyması olası olan durum hangisidir?", "q_en": "The internal audit function most likely may need the knowledge, skills, or other competencies of an external service provider (ESP)", "options": [{"tr": "Denetim müşterisiyle ilişkili olan.", "en": "Associated with the engagement client.", "cmt_tr": "Denetim müşterisiyle ilişkili bir DHS, bağımsız veya nesnel olmayacağı için kabul edilemez. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "An ESP associated with the engagement client is unacceptable because the person would not be independent or objective. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}, {"tr": "Uzak bir lokasyonda yardım için.", "en": "For assistance in a distant location.", "cmt_tr": "İDY, iç denetçilerin görevin tamamını veya bir bölümünü yerine getirmek için gereken bilgi, beceri veya diğer yetkinliklere sahip olmaması durumunda yetkin danışmanlık ve yardım almalıdır (Standart 3.1). Örneğin, DHS'ler uzak lokasyonlardaki görev gereksinimlerini daha kolay karşılayabilir.", "cmt_en": "The chief audit executive must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). For example, ESPs may more easily accommodate engagement requirements in distant locations."}, {"tr": "Başka bir iç denetim fonksiyonundan işe alınan.", "en": "Recruited from another internal audit function.", "cmt_tr": "Nitelikli DHS'ler, diğer iç denetim fonksiyonları dışında dış denetim firması, dış danışmanlık firması veya üniversite gibi birçok kaynaktan temin edilebilir.", "cmt_en": "Qualified ESPs may be recruited from many sources, other than other internal audit functions, such as the external audit firm, an external consulting firm, or a university."}, {"tr": "Daha önce iç denetim fonksiyonunda çalışmış olan.", "en": "Previously employed by the internal audit function.", "cmt_tr": "İşe alım birçok kaynaktan yapılabilir. Ayrıca, eski çalışanlar uygun veya mevcut olmayabilir.", "cmt_en": "Recruitment may be from many sources. Moreover, former employees may be unsuitable or unavailable."}], "answer": 1}, {"q_tr": "İç denetim fonksiyonu bazı fonksiyonlarını bir dış hizmet sağlayıcıya (DHS) dışarıdan temin ettiğinde:", "q_en": "When the internal audit function outsources some of its functions to an external service provider (ESP),", "options": [{"tr": "İç denetim fonksiyonunun gözetimi dışarıdan temin edilebilir.", "en": "Oversight of the internal audit function may be outsourced.", "cmt_tr": "Bir kuruluş iç denetim fonksiyonunun hiçbirini, tamamını veya bir kısmını dışarıdan temin edebilir. Ancak, iç denetim fonksiyonunun gözetimi ve sorumluluğu dışarıdan temin edilmemelidir.", "cmt_en": "An organization may outsource none, all, or some of the functions of the internal audit function. However, oversight of and responsibility for the internal audit function must not be outsourced."}, {"tr": "İlgili rehberliğe uyulması halinde denetim müşterisiyle ilişkili bir DHS uygundur.", "en": "An ESP associated with the client is appropriate if the relevant guidance is followed.", "cmt_tr": "Denetim müşterisiyle ilişkili bir DHS, bağımsız veya nesnel olmayacağı için kabul edilemez.", "cmt_en": "An ESP associated with the engagement client is unacceptable because the person would not be independent or objective."}, {"tr": "İç denetim fonksiyonunun sorumluluğu dışarıdan temin edilebilir.", "en": "Responsibility for the internal audit function may be outsourced.", "cmt_tr": "İç denetim fonksiyonu için organizasyonel sorumluluklar, fonksiyonlarının bir kısmının veya tamamının dışarıdan temin edilmesiyle değişmez.", "cmt_en": "Organizational responsibilities for the internal audit function are unchanged by outsourcing some or all of its functions."}, {"tr": "DHS, IIA Standartlarına uymalıdır.", "en": "The IIA’s Standards must be followed by the ESP.", "cmt_tr": "Dışarıdan temin derecesine bakılmaksızın, hizmetler hâlâ Standartlara uygun olarak yerine getirilmeli ve dış hizmet sağlayıcı edinme rehberliğine uyulmalıdır.", "cmt_en": "Regardless of the degree of outsourcing, services still must be performed in accordance with the Standards, and the guidance for obtaining external service providers should be followed."}], "answer": 3}, {"q_tr": "Küçük bir iç denetim fonksiyonu güvence görevi yürütmektedir ancak belirli muhasebe tahminlerini değerlendirmek için uzmanlığa sahip değildir. Bu nedenle İDY, gerekli bilgi, beceri ve diğer yetkinlikleri bir dış hizmet sağlayıcıdan (DHS) edinmelidir. Bu kararın en temel nedeni büyük olasılıkla nedir?", "q_en": "A small internal audit function is performing an assurance engagement but lacks the expertise to evaluate certain accounting estimates. Thus, the chief audit executive (CAE) must obtain the necessary knowledge, skills, and other competencies from an external service provider (ESP). The fundamental reason for this decision most likely is that", "options": [{"tr": "İç denetim fonksiyonunun her üyesinin tüm disiplinlerde nitelikli olması gerekmez.", "en": "Each member of the internal audit function is not required to be qualified in all disciplines.", "cmt_tr": "İDY, iç denetçilerin görevin tamamını veya bir bölümünü yerine getirmek için gereken bilgi, beceri veya diğer yetkinliklere sahip olmaması durumunda yetkin danışmanlık ve yardım almalıdır (Standart 3.1). İç denetim fonksiyonunun her üyesinin tüm disiplinlerde nitelikli olması gerekmez. Gerekli olduğunda, İDY dış hizmet sağlayıcılardan gerekli bilgi, beceri ve yetkinlikleri edinebilir.", "cmt_en": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). Each member of the internal audit function need not be qualified in all disciplines. When necessary, the CAE can obtain necessary knowledge, skills, and competencies from external service providers."}, {"tr": "Kalite güvence ve iyileştirme programının (KGİP) iç denetim fonksiyonunun uzmanlık eksikliğini raporlamaması.", "en": "The quality assurance and improvement program (QAIP) failed to report the internal audit function’s lack of expertise.", "cmt_tr": "İç denetim fonksiyonu dışarıdan temin edilse bile bir KGİP sürdürülmelidir (muhtemelen DHS tarafından). Ancak, küçük bir iç denetim fonksiyonunun dış kaynak ihtiyacı, büyük olasılıkla KGİP'in bir başarısızlığı nedeniyle değildir.", "cmt_en": "A QAIP should be maintained (possibly by the ESP) even if the internal audit function is outsourced. However, the need for outsourcing by a small internal audit function is most likely not because of a failure by the QAIP."}, {"tr": "DHS'nin İDY rolünü üstlenmesi gerektiği.", "en": "The ESP was needed to assume the role of CAE.", "cmt_tr": "DHS yalnızca muhasebe tahminleri konusundaki uzmanlığı için işe alınmıştır.", "cmt_en": "The ESP was hired only for expertise regarding accounting estimates."}, {"tr": "İDY'nin yeterince nitelikli personel işe almaması. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "en": "The CAE did not hire sufficiently qualified staff. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_tr": "İDY'nin yükümlülüğü yalnızca gerekli bilgi, beceri ve diğer yetkinlikleri edinmektir.", "cmt_en": "The CAE’s obligation is only to obtain the necessary knowledge, skills, and other competencies."}], "answer": 0}, {"q_tr": "İç denetçilerin sürekli mesleki gelişimi ile ilgili aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following statements with regard to continuing professional development of internal auditors is false?", "options": [{"tr": "Uygulayıcı ve uygulayıcı olmayan CIA'lar yıllık en az 2 saat etik eğitimi dahil 40 saat sürekli mesleki eğitimi (SME) tamamlamalıdır.", "en": "Practicing and nonpracticing CIAs must complete 40 hours of continuing professional education (CPE) annually, including at least 2 hours of ethics training.", "cmt_tr": "CIA'lar, sürekli mesleki gelişimlerini SME saatlerini tamamlayarak gösterir. Uygulayıcı ve uygulayıcı olmayan CIA'lar sırasıyla yıllık en az 2 saat etik eğitimi dahil 40 saat ve 20 saat SME tamamlamalıdır.", "cmt_en": "CIAs demonstrate their continuing professional development by completing continuing professional education (CPE). Practicing and nonpracticing CIAs must complete 40 hours and 20 hours, respectively, of CPE annually, including at least 2 hours of ethics training."}, {"tr": "İç denetçilerin kariyerleri boyunca bilgi ve yeteneklerini genişletmeye devam etmeleri gerekmektedir.", "en": "Internal auditors are required to continue expanding their knowledge and abilities throughout their careers.", "cmt_tr": "İç denetçiler, sürekli mesleki gelişim yoluyla bilgi, beceri ve diğer yetkinliklerini artırmalıdır (Standart 3.2).", "cmt_en": "Internal auditors must enhance their knowledge, skills, and other competencies through continuing professional development (Standard 3.2)."}, {"tr": "Konferanslara, seminerlere, eğitim programlarına, çevrimiçi ve sınıf içi kurslara ve web seminerlerine katılmak sürekli mesleki gelişime katkıda bulunur.", "en": "Participating in conferences, seminars, training programs, online and classroom courses, and webinars contribute to continuing professional development.", "cmt_tr": "Mesleki gelişim fırsatları arasında konferanslara, seminerlere, eğitim programlarına, çevrimiçi kurslar ve web seminerlerine, kendi kendine çalışma programlarına veya sınıf içi kurslara katılmak; araştırma projeleri yürütmek; meslek kuruluşlarında gönüllü olmak; ve mesleki sertifikalar almak yer alır.", "cmt_en": "Opportunities for professional development include participating in conferences, seminars, training programs, online courses and webinars, self-study programs, or classroom courses; conducting research projects; volunteering with professional organizations; and pursuing professional certifications."}, {"tr": "CIA'lar, yayınları çevirerek, yazarak veya katkıda bulunarak SME saatleri kazanabilir.", "en": "CIAs may earn CPE hours by translating, authoring, or contributing to publications.", "cmt_tr": "Nitelendirici SME faaliyetleri, iç denetim yetkinliklerine katkıda bulunan faaliyetlerdir. Bunlar arasında eğitim programları, sınav geçme, yayın çevirisi, yayın yazma veya katkıda bulunma, Study Unit 5: Ethics and Professionalism | Subunit 3: Competency sözlü sunumlar yapma, konu uzmanı gönüllüsü olarak katılma ve dış kalite değerlendirmesi yapma yer alır.", "cmt_en": "Qualifying CPE activities are those that contribute to internal audit competencies. They include educational programs, passing examinations, translating publications, authoring or contributing Study Unit 5: Ethics and Professionalism | Subunit 3: Competency to publications, delivering oral presentations, participating as a subject matter expert volunteer, and performing external quality assessment."}], "answer": 0}, {"q_tr": "IIA'ya göre, CIA'lar için sürekli mesleki gelişim (SMG) faaliyetleri aşağıdakilerden hangisini içerebilir?", "q_en": "According to The IIA, continuing professional development (CPD) activities for CIAs may include", "options": [{"tr": "Uygulayıcı olmayanlar tarafından yıllık en az 40 saat sürekli mesleki eğitimin (SME) tamamlanması.", "en": "Completion of at least 40 hours of continuing professional education (CPE) annually by nonpractitioners.", "cmt_tr": "CIA'lar SMG'lerini SME saatlerini tamamlayarak gösterir. Uygulayıcı ve uygulayıcı olmayan CIA'lar sırasıyla yıllık en az 2 saat etik eğitimi dahil 40 saat ve 20 saat SME tamamlamalıdır.", "cmt_en": "CIAs demonstrate their CPD by completing CPE hours. Practicing and nonpracticing CIAs must complete 40 hours and 20 hours, respectively, of CPE annually, including at least 2 hours of ethics training."}, {"tr": "Uygulayıcı olmayan CIA'lar için 4 saati zorunlu olan 8 saate kadar etik eğitimi.", "en": "Up to 8 hours of ethics training of which 4 hours are mandatory for nonpracticing CIAs.", "cmt_tr": "Uygulayıcı ve uygulayıcı olmayan CIA'lar en az 2 saat etik eğitimi tamamlamalıdır.", "cmt_en": "Practicing and nonpracticing CIAs must complete at least 2 hours of ethics training."}, {"tr": "Konferanslara, çevrimiçi ve sınıf içi kurslara ve web seminerlerine katılmak.", "en": "Participating in conferences, online and classroom courses, and webinars.", "cmt_tr": "SMG fırsatları arasında (1) konferanslara, seminerlere, eğitim programlarına, çevrimiçi kurslar ve web seminerlerine, kendi kendine çalışma programlarına veya sınıf içi kurslara katılmak; (2) araştırma projeleri yürütmek; (3) meslek kuruluşlarında gönüllü olmak; ve (4) mesleki sertifikalar almak yer alır.", "cmt_en": "Opportunities for CPD include (1) participating in conferences, seminars, training programs, online courses and webinars, self-study programs, or classroom courses; (2) conducting research projects; (3) volunteering with professional organizations; and (4) pursuing professional certifications."}, {"tr": "Herhangi bir alanda ileri derece almak.", "en": "Earning an advanced degree in any field.", "cmt_tr": "Nitelendirici SME faaliyetleri, iç denetim yetkinliklerine katkıda bulunan faaliyetlerdir. Bunlar arasında eğitim programları, sınav geçme, yayın çevirisi, yayın yazma veya katkıda bulunma, sözlü sunumlar yapma, konu uzmanı gönüllüsü olarak katılma ve dış kalite değerlendirmesi yapma yer alır.", "cmt_en": "Qualifying CPE activities are those that contribute to internal audit competencies. They include educational programs, passing examinations, translating publications, authoring or contributing to publications, delivering oral presentations, participating as a subject matter expert volunteer, and performing external quality assessment."}], "answer": 2}, {"q_tr": "Yeni bir personel iç denetçiye aşina olmadığı bir alanda denetim görevi yapması söylenmiştir. Zaman kısıtlamaları nedeniyle denetim yapılmamıştır. Görev iyi bir öğrenme deneyimi olmuştur, ancak alan açıkça iç denetçinin yetkinliğinin ötesindedir. Buna rağmen, iç denetçi kapsamlı çalışma kağıtları hazırlamış ve sonuçları yönetime bildirmiştir. Bu durumda:", "q_en": "A new staff internal auditor was told to perform an engagement in an area with which the internal auditor was not familiar. Because of time constraints, no supervision was provided. The assignment represented a good learning experience, but the area was clearly beyond the internal auditor’s competence. Nonetheless, the internal auditor prepared comprehensive workpapers and communicated the results to management. In this situation,", "options": [{"tr": "İç denetim fonksiyonu, o alanda yeterliliği olmayan bir iç denetçi işe alarak Standartları ihlal etmiştir.", "en": "The internal audit function violated the Standards by hiring an internal auditor without proficiency in the area.", "cmt_tr": "Tüm iç denetçilerin her alanda yetkin olması gerekmez. İç denetim fonksiyonu bir bütün olarak uygun beceri karışımına sahip olmalıdır. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "All internal auditors need not be proficient in all areas. The internal audit function as a whole should have an appropriate mix of skills. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}, {"tr": "İç denetim fonksiyonu, yeterli denetim sağlamayarak Standartları ihlal etmiştir.", "en": "The internal audit function violated the Standards by not providing adequate supervision.", "cmt_tr": "Yetkinlik ilkesi, iç denetim hizmetlerinin yeterlilik ve mesleki özenle yerine getirilmesini gerektirir. Ayrıca, hedeflerin gerçekleştirilmesini, kalitenin sağlanmasını ve personelin geliştirilmesini güvence altına almak için uygun şekilde denetlenmelidir.", "cmt_en": "The competency principle requires internal auditing services to be performed with proficiency and due professional care. They also should be properly supervised to ensure that objectives are achieved, quality is assured, and staff is developed."}, {"tr": "İDY, denetimi ele almadığı için IIA Standartlarını ihlal etmemiştir.", "en": "The chief audit executive has not violated The IIA’s Standards because it does not address supervision.", "cmt_tr": "Standartlar, uygun denetimi zorunlu kılar.", "cmt_en": "The Standards require proper supervision."}, {"tr": "Standartlara iç denetim fonksiyonu tarafından uyulmuştur.", "en": "The Standards were followed by the internal audit function.ng external quality assessment.", "cmt_tr": "Standartlara uyulmamıştır.", "cmt_en": "The Standards were not followed."}], "answer": 1}], "SU4 - Due Professional Care": [{"q_tr": "IIA Etik ve Profesyonellik Standartlarının beş ilkesi vardır. Hangi ilke işin özenle yerine getirilmesini ele alır?", "q_en": "The IIA’s Standards of Ethics and Professionalism have five principles. Which principle addresses performance of work with diligence?", "options": [{"tr": "Yetkinlik.", "en": "Competency.", "cmt_tr": "Yetkinlik ilkesi, iç denetçilerin hizmetlerini yerine getirmek için gerekli bilgi, beceri ve deneyime sahip olmasını gerektirir.", "cmt_en": "The competency principle requires internal auditors to have the necessary knowledge, skills, and experience to perform services."}, {"tr": "Nesnellik.", "en": "Objectivity.", "cmt_tr": "Nesnellik ilkesi, denetçilerin dengeli değerlendirmeler yapmasını ve kendi çıkarları veya başkaları tarafından aşırı etkilenmemesini gerektirir.", "cmt_en": "The objectivity principle requires auditors to make balanced assessments and not be unduly influenced by their own interests or by others."}, {"tr": "Mesleki özen.", "en": "Due professional care.", "cmt_tr": "Mesleki özen ilkesi, \"Mesleki özen, iç denetim hizmetlerinin tedbirli ve yetkin iç denetçilerin sahip olduğu özen, yargı ve şüphecilikle planlanmasını ve yerine getirilmesini gerektirir\" ifadesini içerir.", "cmt_en": "The due professional care principle states, “Due professional care requires planning and performing internal audit services with the diligence, judgment, and skepticism possessed by prudent and competent internal auditors.”"}, {"tr": "Gizlilik.", "en": "Confidentiality.", "cmt_tr": "Gizlilik ilkesi, iç denetçilerin uygun yetki olmaksızın bilgi açıklamamasını belirtir.", "cmt_en": "The confidentiality principle states that internal auditors do not disclose information without appropriate authority."}], "answer": 2}, {"q_tr": "Sertifikalı bir iç denetçi, bir mağazanın nakit fonksiyonunu incelemek üzere bir güvence görevi yürütmüştür. Aşağıdaki eylemlerden hangisi mesleki özen eksikliği olarak değerlendirilecektir?", "q_en": "A certified internal auditor performed an assurance engagement to review a department store’s cash function. Which of the following actions will be deemed lacking in due professional care?", "options": [{"tr": "Nakit tahsilat ve ödemelerle ilgilenen tüm çalışanların kefalet kapsamında olup olmadığını belirlemek için kuruluş kayıtları incelenmiştir.", "en": "Organizational records were reviewed to determine whether all employees who handle cash receipts and disbursements were bonded.", "cmt_tr": "Nakit tahsilat ve ödemelerle ilgilenen tüm çalışanların kefalet kapsamında olup olmadığını belirlemek için kayıtların incelenmesi standart bir prosedürdür.", "cmt_en": "Reviewing records to determine whether all employees who handle cash receipts and disbursements were bonded is a standard procedure."}, {"tr": "Tüm nakit fonksiyonunun akış şeması geliştirilmiş, ancak yalnızca bir işlem örneklemi test edilmiştir.", "en": "A flowchart of the entire cash function was developed, but only a sample of transactions was tested.", "cmt_tr": "Örnekleme kabul edilebilir bir uygulamadır. Tüm işlemlerin ayrıntılı incelemesi genellikle gerekli veya uygulanabilir değildir.", "cmt_en": "Sampling is permissible. Detailed reviews of all transactions are often not required or feasible."}, {"tr": "Son denetim raporu, moralin olumsuz etkileneceği bilinmesine rağmen personel azaltılması için iyi desteklenmiş bir öneri içermiştir.", "en": "The final engagement communication included a well-supported recommendation for the reduction in staff, although it was known that such a reduction would adversely affect morale.", "cmt_tr": "Mesleki özen uygularken, iç denetçiler verimsizliğe karşı dikkatli olmalıdır.", "cmt_en": "In exercising due professional care, internal auditors should be alert to inefficiency."}, {"tr": "Nakit fonksiyonu üzerindeki iç kontrol sistemi son derece gelişmiş olduğundan, son denetim raporu üst yönetime hiçbir usulsüzlüğün bulunmadığını güvence altına almıştır.", "en": "Because of a highly developed system of internal control over the cash function, the final engagement communication assured senior management that no irregularities existed.", "cmt_tr": "İç denetçiler, uyumsuzluk veya usulsüzlüklerin mevcut olmadığına dair mutlak güvence veremez. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "Internal auditors cannot give absolute assurance that noncompliance or irregularities do not exist. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 3}, {"q_tr": "İç denetçiler, makul ölçüde tedbirli ve yetkin bir iç denetçinin göstereceği özen ve beceriyi uygulamalıdır. Örneğin, bir güvence görevinde iç denetçi şunları yapmalıdır:", "q_en": "Internal auditors must apply the care and skill of a reasonably prudent and competent internal auditor. For example, in an assurance engagement, an internal auditor must", "options": [{"tr": "Tüm önemli riskleri belirleyen güvence prosedürleri uygulamak.", "en": "Perform assurance procedures that identify all significant risks.", "cmt_tr": "İç denetçiler, amaçları, faaliyetleri veya kaynakları etkileyebilecek önemli risklere karşı dikkatli olmalıdır. Ancak, mesleki özenle uygulanan güvence prosedürleri bile tüm önemli risklerin belirleneceğini garanti etmez (Standart 4.2).", "cmt_en": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.2)."}, {"tr": "Teknoloji tabanlı analiz kullanımını değerlendirmek.", "en": "Consider the use of technology-based analysis.", "cmt_tr": "İç denetçiler, makul ölçüde tedbirli ve yetkin bir iç denetçinin göstereceği özen ve beceriyi uygulamalıdır. Mesleki özen kusursuzluk anlamına gelmez (Standart 4.2). Mesleki özen uygularken, iç denetçiler teknoloji tabanlı denetim ve diğer veri analizi yöntemlerinin kullanımını değerlendirmelidir (Standart 4.2).", "cmt_en": "Internal auditors must apply the care and skill expected of a reasonably prudent and competent internal auditor. Due professional care does not imply infallibility (Standard 4.2). In exercising due professional care, internal auditors must consider the use of technology-based audit and other data analysis methods (Standard 4.2)."}, {"tr": "Mesleki özen uygularken maliyeti dikkate almamak.", "en": "Not consider cost when exercising due professional care.", "cmt_tr": "İç denetçiler, diğer hususların yanı sıra güvence maliyetinin potansiyel faydalara oranını değerlendirerek mesleki özen göstermelidir.", "cmt_en": "Internal auditors must exercise due professional care by considering, among other things, the cost of assurance in relation to potential benefits."}, {"tr": "Danışmanlığı müşterilerin beklentilerine uygun şekilde bildirmek.", "en": "Communicate advice in accordance with the expectations of clients.", "cmt_tr": "Güvence hizmeti, bağımsız bir değerlendirme sağlayan kanıtların nesnel bir incelemesidir. Niteliği ve kapsamı iç denetçi tarafından belirlenir. Danışmanlık hizmeti ise müşterinin talep ettiği tavsiyeyle sonuçlanır.", "cmt_en": "An assurance service is an objective examination of evidence to provide an independent assessment resulting in an opinion or conclusion. Its nature and scope are determined by the internal auditor. A consulting service results in advice requested by the client. An assurance service involves three parties: (1) the auditor, (2) the process owner, and (3) the user (person or group) using the assessment."}], "answer": 1}, {"q_tr": "Mesleki özen aşağıdakilerden hangisini gerektirir?", "q_en": "Due professional care calls for", "options": [{"tr": "Belirli bir fonksiyonla ilgili tüm işlemlerin ayrıntılı incelenmesi.", "en": "Detailed reviews of all transactions related to a particular function.", "cmt_tr": "Tüm işlemlerin ayrıntılı incelenmesi gerekmez.", "cmt_en": "Detailed reviews of all transactions are not required."}, {"tr": "İç kontrol sisteminin zayıf olduğu bilindiğinde kusursuzluk ve olağanüstü performans.", "en": "Infallibility and extraordinary performance when the system of internal control is known to be weak.", "cmt_tr": "Kusursuzluk veya olağanüstü performans değil, makul özen ve beceri gereklidir.", "cmt_en": "Reasonable care and skill, not infallibility or extraordinary performance, are necessary."}, {"tr": "Her denetim görevinde önemli usulsüzlüklerin olasılığının değerlendirilmesi.", "en": "Consideration of the possibility of material irregularities during every engagement.", "cmt_tr": "Mesleki özen, kusursuzluk değil makul tedbirlilik ve yetkinlik anlamına gelir. Makul ölçüde inceleme ve doğrulama yapılmasını gerektirir, ancak tüm işlemlerin ayrıntılı incelemesini gerektirmez. Buna göre, iç denetçiler uyumsuzluk veya usulsüzlüklerin mevcut olmadığına dair mutlak güvence veremez. Buna rağmen, bir iç denetçi her denetim görevini üstlendiğinde Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care önemli usulsüzlüklerin veya uyumsuzlukların olasılığı dikkate alınmalıdır.", "cmt_en": "Due care implies reasonable prudence and competence, not infallibility. It requires the internal auditor to conduct examinations and verifications to a reasonable extent, but does not require detailed reviews of all transactions. Accordingly, internal auditors cannot give absolute assurance that noncompliance or irregularities do not exist. Nevertheless, the possibility of Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care material irregularities or noncompliance should be considered whenever an internal auditor undertakes an internal auditing assignment."}, {"tr": "Uyumsuzluğun mevcut olmadığına dair mutlak güvence sağlayacak ayrıntıda test yapma.", "en": "Testing in sufficient detail to give absolute assurance that noncompliance does not exist.", "cmt_tr": "Mutlak değil, yalnızca makul güvence verilebilir.", "cmt_en": "Only reasonable, not absolute, assurance can be given."}], "answer": 2}, {"q_tr": "İç denetçi nesnelliğinin etkili yönetimi en çok aşağıdakilerden hangisinden kaynaklanır?", "q_en": "Effective management of internal auditor objectivity most likely results from", "options": [{"tr": "İç denetçi öz değerlendirmeleri.", "en": "Internal auditor self-assessments.", "cmt_tr": "İç denetçi öz değerlendirmeleri önyargılı olabilir. Bu nedenle, İDY bireysel iç denetçilerin nesnelliğini değerlendirmek için politika ve prosedürler oluşturmalıdır. Bunlar, çıkar çatışmalarının periyodik incelemeleri veya her görevin personel gereksinimleri aşamasında yapılan ihtiyaca göre değerlendirmeler şeklinde olabilir.", "cmt_en": "Internal auditor self-assessments may be biased. Thus, the chief audit executive must establish policies and procedures to assess the objectivity of individual internal auditors. These can take the form of periodic reviews of conflicts of interest or as-needed assessments during the staffing requirements phase of each engagement."}, {"tr": "Denetlenecek alanın geçmiş deneyime dayanarak kabul edilebilir olduğunun belirlenmesi.", "en": "Determining that an area to be audited is acceptable given past experience.", "cmt_tr": "Nesnelliği zedeleyebilecek durumlar arasında bir aile üyesini veya yakın arkadaşı denetlemek ya da denetlenen alanın (kanıt olmadan) yalnızca önceki deneyime dayanarak kabul edilebilir olduğunu varsaymak yer alır.", "cmt_en": "Situations that could undermine objectivity include auditing a family member or a close friend or assuming (without evidence) that an area under audit is acceptable based solely on prior experience."}, {"tr": "Denetçilerin daha önce çalıştığı alanlara aşinalığa dayalı atamalar.", "en": "Assignments based on familiarity with areas where auditors previously worked.", "cmt_tr": "İDY, iç denetçileri belirli görevlere atarken potansiyel nesnellik bozulmalarını dikkate almalı ve örneğin önceki istihdam nedeniyle çatışması olabilecek ekip üyelerini atamaktan kaçınmalıdır.", "cmt_en": "When assigning internal auditors to specific engagements, the chief audit executive should consider potential objectivity impairments and avoid assigning team members who may have a conflict, e.g., because of prior employment."}, {"tr": "Mesleki şüpheciliği güçlendiren eğitim.", "en": "Training that reinforces professional skepticism.", "cmt_tr": "Birçok İDY, nesnelliğin temel kavramları hakkında rutin çalıştaylar veya eğitimler düzenler. Örneğin, kıdemli denetçiler ve yöneticiler nesnelliğe yönelik tehditlerle ilgili kişisel deneyimlerini paylaşabilir veya çatışma oluşturan bir ilişkiyi ya da deneyimi açıklayabilir. Yaygın bir ilgili eğitim konusu da mesleki şüpheciliktir. Bu tür eğitimler, şüpheciliğin doğasını ve önyargıdan kaçınmanın ve açık, meraklı bir zihniyeti korumanın kritik önemini güçlendirir.", "cmt_en": "Many chief audit executives hold routine workshops or training on fundamental concepts of objectivity. For example, senior auditors and managers may share personal experiences regarding threats to objectivity or self-disclose a relationship or experience that was a conflict. Another common related training topic is professional skepticism. Such training reinforces the nature of skepticism and the criticality of avoiding bias and maintaining an open and curious mindset."}], "answer": 3}, {"q_tr": "Bir kuruluş yakın zamanda eski bir operasyon yöneticisini İDY pozisyonuna yerleştirmiştir. Yeni İDY, IIA üyesi değildir ve CIA değildir. Bundan böyle iç denetim fonksiyonu, IIA'nın değil yalnızca İDY'nin standartlarına göre yönetilecektir. Dört personel iç denetçinin tamamı IIA üyesidir ancak CIA değildir. IIA Etik ve Profesyonellik Standartlarına göre, personel iç denetçiler için en iyi hareket tarzı nedir?", "q_en": "An organization has recently placed a former operating manager in the position of chief audit executive (CAE). The new CAE is not a member of The IIA and is not a CIA. Henceforth, the internal audit function will be run strictly by the CAE’s standards, not The IIA’s. All four staff internal auditors are members of The IIA, but they are not CIAs. According to The IIA’s Standards of Ethics and Professionalism, what is the best course of action for the staff internal auditors?", "options": [{"tr": "CIA olmadıkları için Standartlar uygulanmaz.", "en": "The Standards do not apply because they are not CIAs.", "cmt_tr": "IIA Etik ve Profesyonellik Standartları, IIA üyelerine ve IIA mesleki sertifikalarının sahiplerine veya adaylarına karşı uygulanabilir.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism may be enforced against IIA members and recipients of, or candidates for, IIA professional certifications."}, {"tr": "Küresel İç Denetim Standartlarına uymalıdırlar. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "They should comply with the Global Internal Audit Standards. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "Mesleki özen ilkesi, iç denetçilerin iç denetim hizmetlerini planlarken, yürütürken ve sonuçları bildirirken Standartlara ve iç denetim fonksiyonunun metodolojilerine uyması gerektiğini belirtir. İç denetçiler Enstitü üyeleri olduğundan, CIA olmasalar bile IIA Standartları onlara karşı uygulanabilir.", "cmt_en": "The due professional care principle states that internal auditors must follow the Standards and the internal audit function’s methodologies when planning and performing internal audit services and communicating results. Because the internal auditors are members of The Institute, The IIA’s Standards are enforceable against them even though they are not CIAs."}, {"tr": "Kuruluşun meşru ve etik amaçlarına saygı göstermeli ve Standartları göz ardı etmelidir.", "en": "They must respect the legitimate and ethical objectives of the organization and ignore the Standards.", "cmt_tr": "İç denetçiler kuruluşun meşru ve etik amaçlarına saygı göstermeli ve katkıda bulunmalıdır, ancak bir IIA üyesi, IIA mesleki sertifikası sahibi veya sertifika adayı, Standartlara uyulmaması nedeniyle disiplin cezasıyla karşılaşabilir.", "cmt_en": "Internal auditors should respect and contribute to the legitimate and ethical objectives of the organization, but an IIA member, a holder of an IIA professional certification, or a candidate for certification may be liable for disciplinary action for failure to adhere to the Standards."}, {"tr": "Uygunsuz faaliyetlerden kaçınmak için işlerinden istifa etmelidirler.", "en": "They must resign their jobs to avoid improper activities.", "cmt_tr": "IIA Etik ve Profesyonellik Standartları, uygunsuz faaliyetlerden kaçınmak için istifa konusunda hiçbir şey söylemez.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism says nothing about resignation to avoid improper activities."}], "answer": 1}, {"q_tr": "Bir iç denetçi, bir güvence görevi planlarken bir kalemi önemsiz olarak değerlendirmiştir. Ancak, sonradan aşağıdakilerden hangisinin belirlendiği durumda güvence görevi bu kalemi yine de kapsayabilir?", "q_en": "An internal auditor judged an item to be immaterial when planning an assurance engagement. However, the assurance engagement may still include the item if it is subsequently determined that", "options": [{"tr": "Yeterli personel mevcuttur.", "en": "Sufficient staff is available.", "cmt_tr": "Diğer hususlar olmaksızın, önemsiz bir kaleme ek denetim çabası ayırmak verimsizdir.", "cmt_en": "In the absence of other considerations, devoting additional engagement effort to an immaterial item is inefficient."}, {"tr": "Kalemle ilgili olumsuz etkilerin gerçekleşmesi muhtemeldir.", "en": "Adverse effects related to the item are likely to occur.", "cmt_tr": "İç denetçiler, güvence prosedürlerinin uygulandığı konuların göreli karmaşıklığını, önemliliğini veya anlamlılığını değerlendirerek mesleki özen göstermelidir (Standart 4.2). Önemlilik yargıları, nitel ve nicel değerlendirmeleri içerir ve tüm koşullar ışığında yapılır. Ayrıca, iç denetçiler riskin önemlilikle etkileşimini de dikkate almalıdır. Sonuç olarak, olumsuz etkiler gerçekleşmesi muhtemel ise nicel olarak önemsiz bir kalem için denetim çabası gerekebilir; örneğin, aksi takdirde önemsiz olan yasadışı bir ödemeden kaynaklanan önemli bir koşullu yükümlülük.", "cmt_en": "Internal auditors must exercise due professional care by considering the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.2). Materiality judgments are made in the light of all the circumstances and involve qualitative as well as quantitative considerations. Moreover, internal auditors also must consider the interplay of risk with materiality. Consequently, engagement effort may be required for a quantitatively immaterial item if adverse effects are likely to occur, for example, a material contingent liability arising from an illegal payment that is otherwise immaterial."}, {"tr": "İlgili bilgiler güvenilirdir.", "en": "Related information is reliable.", "cmt_tr": "İlgili bilgiler güvenilir ise ek denetim prosedürlerine gerek olmayabilir.", "cmt_en": "Additional engagement procedures might not be needed if related information is reliable."}, {"tr": "Çeşitli gelirler etkilenmektedir.", "en": "Miscellaneous income is affected.", "cmt_tr": "Kalem, çeşitli gelir kalemlerini değil, tekrar eden gelir kalemlerini etkiliyorsa dahil edilme olasılığı daha yüksektir. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "The item is more likely to be included if it affects recurring income items rather than miscellaneous income. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 1}, {"q_tr": "Mesleki özen ile ilgili aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is true with respect to due professional care?", "options": [{"tr": "İç denetçi, sonuçları bildirmeden önce tüm işlemlerin ayrıntılı testlerini yapmalıdır.", "en": "An internal auditor should perform detailed tests of all transactions before communicating results.", "cmt_tr": "İç denetçi, makul inceleme ve doğrulamalar yapmalıdır, ancak tüm işlemlerin ayrıntılı testleri gerekmez.", "cmt_en": "An internal auditor must conduct reasonable examinations and verifications, but detailed tests of all transactions are not required."}, {"tr": "İç denetçi bir kalemden kesinlikle emin olmadıkça, denetim raporunda bahsedilmemelidir.", "en": "An item should not be mentioned in an engagement communication unless the internal auditor is absolutely certain of the item.", "cmt_tr": "Mutlak güvence verilmesine gerek yoktur ve verilemez.", "cmt_en": "Absolute assurance need not, and cannot, be given."}, {"tr": "Bir denetim raporu, bir konu hakkında asla yanılmaz bir gerçek sunuyor olarak görülmemelidir.", "en": "An engagement communication should never be viewed as providing an infallible truth about a subject.", "cmt_tr": "Mesleki özen, kusursuzluk değil makul tedbirlilik ve yetkinlik anlamına gelir. Bu nedenle, iç denetçilerin uyumsuzluk ve usulsüzlüklerin mevcut olmadığına dair mutlak güvence vermesi beklenmez.", "cmt_en": "Due professional care implies reasonable prudence and competence, not infallibility. Thus, internal auditors are not expected to give absolute assurance that noncompliance and irregularities do not exist."}, {"tr": "İç denetçinin iyileştirme önerme sorumluluğu yoktur.", "en": "An internal auditor has no responsibility to recommend improvements.", "cmt_tr": "İç denetçi, kabul edilebilir prosedür ve uygulamalara uyumu teşvik etmek için iyileştirmeler önermelidir.", "cmt_en": "An internal auditor must recommend improvements to promote conformance with acceptable procedures and practices."}], "answer": 2}, {"q_tr": "Mesleki özen, kusursuzluk veya olağanüstü performans değil, makul özen ve yetkinlik anlamına gelir. Bu nedenle, aşağıdakilerden hangisi gereksizdir?", "q_en": "Due professional care implies reasonable care and competence, not infallibility or extraordinary performance. Thus, which of the following is unnecessary?", "options": [{"tr": "Makul ölçüde inceleme ve doğrulamaların yapılması.", "en": "The conduct of examinations and verifications to a reasonable extent.", "cmt_tr": "İnceleme ve doğrulama yalnızca makul ölçüde yapılmalıdır.", "cmt_en": "Examination and verification need only be undertaken to a reasonable extent."}, {"tr": "Kapsamlı incelemelerin yapılması.", "en": "The conduct of extensive examinations.", "cmt_tr": "Mesleki özen, kusursuzluk değil makul tedbirlilik ve yetkinlik anlamına gelir. İç denetçiler, önemli hata, hile veya uyumsuzluk olasılığını dikkate almalıdır. Benzer koşullarda makul ölçüde tedbirli ve yetkin bir denetçinin yapacağı ölçüde inceleme ve doğrulama yapmaları beklenir. Bu tür görevler kapsamlı inceleme gerektirmeyebilir.", "cmt_en": "Due professional care implies reasonable prudence and competence, not infallibility. Internal auditors must consider the probability of significant errors, fraud, or noncompliance. They are expected to conduct examinations and verifications to the same extent as a reasonably prudent and competent auditor in similar circumstances. Such engagements may not entail extensive examination."}, {"tr": "Uyumun mevcut olduğuna dair makul güvence sağlanması.", "en": "The reasonable assurance that compliance does exist.", "cmt_tr": "Makul güvence sağlamak, makul özen göstermeyle tutarlıdır.", "cmt_en": "Providing reasonable assurance is consistent with exercising reasonable care."}, {"tr": "Önemli usulsüzlüklerin olasılığının değerlendirilmesi.", "en": "The consideration of the possibility of material irregularities.", "cmt_tr": "Önemli usulsüzlüklerin olasılığı dikkate alınmalıdır. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "The possibility of material irregularities must be considered. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 1}, {"q_tr": "Güvence görevleri yeterlilik ve mesleki özenle yerine getirilmelidir. Buna göre, Standartlar iç denetçilerden şunları gerektirir: 1. Önemli uyumsuzluk olasılığını dikkate almak 2. Tüm önemli risklerin belirlendiği güvence prosedürlerini mesleki özenle uygulamak 3. Güvence maliyetini faydalarla karşılaştırmak", "q_en": "Assurance engagements must be performed with proficiency and due professional care. Accordingly, the Standards require internal auditors to 1. Consider the probability of significant noncompliance 2. Perform assurance procedures with due professional care so that all significant risks are identified 3. Weigh the cost of assurance against the benefits", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "Mesleki özenle uygulanan güvence prosedürleri bile tüm önemli risklerin belirleneceğini garanti etmez. Ayrıca, iç denetçiler güvence maliyetini faydalarla karşılaştırmalıdır.", "cmt_en": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified. Moreover, internal auditors must weigh the cost of assurance against the benefits."}, {"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "İç denetçiler mesleki özeni şunları dikkate alarak göstermelidir: • Görev hedeflerine ulaşmak için gereken çalışma kapsamı • Güvence prosedürlerinin uygulandığı konuların göreli karmaşıklığı, önemliliği veya anlamlılığı • Yönetişim, risk yönetimi ve kontrol süreçlerinin yeterliliği ve etkinliği • Önemli hata, hile veya uyumsuzluk olasılığı • Güvence maliyetinin potansiyel faydalara oranı (Standart 4.2). Mesleki özenle uygulanan güvence prosedürleri bile tüm önemli risklerin belirleneceğini garanti etmez (Standart 4.3).", "cmt_en": "Internal auditors must exercise due professional care by considering the • Extent of work needed to achieve the engagement’s objectives • Relative complexity, materiality, or significance of matters to which assurance procedures are applied • Adequacy and effectiveness of governance, risk management, and control processes • Probability of significant errors, fraud, or noncompliance • Cost of assurance in relation to potential benefits (Standard 4.2) Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.3)."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "Mesleki özenle uygulanan güvence prosedürleri bile tüm önemli risklerin belirleneceğini garanti etmez. Ayrıca, iç denetçiler önemli uyumsuzluk olasılığını dikkate almalıdır.", "cmt_en": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified. Furthermore, internal auditors must consider the probability of significant noncompliance."}, {"tr": "1, 2 ve 3.", "en": "1, 2, and 3.", "cmt_tr": "Mesleki özenle uygulanan güvence prosedürleri bile tüm önemli risklerin belirleneceğini garanti etmez.", "cmt_en": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified."}], "answer": 1}, {"q_tr": "Hazine işlemlerinin güvence görevinde, bir iç denetçinin aşağıdaki konuların tümünü haricindekileri dikkate alması gerekir:", "q_en": "In an assurance engagement of treasury operations, an internal auditor is required to consider all of the following issues except", "options": [{"tr": "Denetim komitesi, hazine departmanının finansal araçların kullanımına ilişkin yeni bir politikaya uyumu konusunda güvence istemiştir. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "The audit committee has requested assurance on the treasury department’s compliance with a new policy on use of financial instruments. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "Denetçi, görev hedeflerine ulaşmak için gereken çalışma kapsamını dikkate almalıdır (Standart 4.2). Yeni politikaya uyum konusunda güvence, belirli bir görev hedefidir.", "cmt_en": "The auditor should consider the extent of work needed to achieve the engagement’s objectives (Standard 4.2). Assurance on compliance with a new policy is a specific engagement objective."}, {"tr": "Hazine yönetimi herhangi bir risk yönetimi politikası oluşturmamıştır.", "en": "Treasury management has not instituted any risk management policies.", "cmt_tr": "Denetçi, risk yönetimi, kontrol ve yönetişim süreçlerinin yeterliliğini ve etkinliğini dikkate almalıdır (Standart 4.2).", "cmt_en": "The auditor should consider the adequacy and effectiveness of risk management, control, and governance processes (Standard 4.2)."}, {"tr": "Bir bölümün son satışı nedeniyle, hazine departmanı tarafından yönetilen nakit ve menkul kıymet miktarı %350 artmıştır.", "en": "Due to the recent sale of a division, the amount of cash and marketable securities managed by the treasury department has increased by 350%.", "cmt_tr": "Denetçi, güvence prosedürlerinin uygulandığı konuların göreli karmaşıklığını, önemliliğini veya anlamlılığını dikkate almalıdır (Standart 4.3). Hazine departmanının yönettiği nakit ve menkul kıymet miktarındaki artış önemlidir.", "cmt_en": "The auditor should consider the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.3). The increase in the amount of cash and marketable securities the treasury department manages is significant."}, {"tr": "Dış denetçiler, hesap teyitlerinin alınmasında bazı güçlükler olduğunu belirtmiştir.", "en": "The external auditors have indicated some difficulties in obtaining account confirmations.", "cmt_tr": "Hesap teyitlerinin alınması dış denetçilerin sorumluluğundadır. İç denetçinin endişelerini değiştirmemelidir.", "cmt_en": "Obtaining account confirmations is the responsibility of the external auditors. It should not change the internal auditor’s concerns."}], "answer": 3}, {"q_tr": "İç denetçiler bir güvence görevi yerine getirirken şunları dikkate alır:", "q_en": "When internal auditors perform an assurance engagement, they consider", "options": [{"tr": "Güvence prosedürlerinin tüm önemli riskleri nasıl kesinlikle belirleyeceği.", "en": "How the assurance procedures can be certain to identify all significant risks.", "cmt_tr": "İç denetçiler, amaçları, faaliyetleri veya kaynakları etkileyebilecek önemli risklere karşı dikkatli olmalıdır. Ancak, mesleki özenle uygulanan güvence prosedürleri bile tüm önemli risklerin belirleneceğini garanti etmez.", "cmt_en": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified."}, {"tr": "IIA Etik ve Profesyonellik Standartları yerine kuruluşun davranış kurallarına uyum.", "en": "Conformance with the organization’s code of conduct rather than The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "Mesleki özen, IIA Küresel İç Denetim Standartlarına uyum gerektirir ve kuruluşun davranış kurallarına ve diğer mesleki unvanlarla ilgili ek davranış kurallarına uyumu gerektirebilir.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and any additional codes of conduct relevant to other professional designations attained."}, {"tr": "Güvence maliyetinin elde edilecek potansiyel faydalara oranı.", "en": "The cost of assurance in relation to the potential benefits to be obtained.", "cmt_tr": "Standart 4.2'ye göre, iç denetçiler mesleki özeni şunları dikkate alarak göstermelidir: • Kuruluşun stratejisi ve hedefleri • İç denetim hizmetlerinin sunulduğu tarafların ve diğer paydaşların çıkarları • Yönetişim, risk yönetimi ve kontrol süreçlerinin yeterliliği ve etkinliği Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care • Yapılacak iç denetim hizmetlerinin potansiyel faydalarına göre maliyeti • Görev hedeflerine ulaşmak için gereken çalışmanın kapsamı ve zamanlaması • İncelenen faaliyetle ilgili risklerin göreli karmaşıklığı, önemliliği veya anlamlılığı • Amaçları, faaliyetleri veya kaynakları etkileyebilecek önemli hata, hile, uyumsuzluk ve diğer risklerin olasılığı • Uygun teknik, araç ve teknolojinin kullanımı", "cmt_en": "According to Standard 4.2, internal auditors must exercise due professional care by considering the following: • The organization’s strategy and objectives • The interests of those for whom internal audit services are provided and the interests of other stakeholders • Adequacy and effectiveness of governance, risk management, and control processes Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care • Cost relative to potential benefits of the internal audit services to be performed • Extent and timeliness of work needed to achieve the engagement’s objectives • Relative complexity, materiality, or significance of risks to the activity under review • Probability of significant errors, fraud, noncompliance, and other risks that might affect objective
