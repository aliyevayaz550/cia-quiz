s, operations, or resources • Use of appropriate techniques, tools, and technology"}, {"tr": "Hedeflere ulaşılmasını sağlamak için görevin denetlenmesinin gerekip gerekmediği.", "en": "Whether the engagement needs to be supervised to ensure achievement of objectives.", "cmt_tr": "Görevler, hedeflere ulaşılmasını, kalitenin güvence altına alınmasını ve personelin geliştirilmesini sağlamak için uygun şekilde denetlenmelidir (Standart 1.3).", "cmt_en": "Engagements must be properly supervised to ensure objectives are achieved, quality is assured, and staff is developed (Standard 1.3)."}], "answer": 2}, {"q_tr": "Bir iç denetçi, yeni bir alacaklar memurinin muhasebe kayıtlarına erişiminin olduğunu gözlemler. Buna göre, denetçi denetim çalışma kağıtlarına tahsilat üzerindeki kontrollerin yetersiz olduğunu kaydeder. Denetçi mesleki özen göstermiş midir?", "q_en": "An internal auditor observes that a new receivables clerk has access to accounting records. Accordingly, the auditor notes in the engagement working papers that controls over receipts are inadequate. Has the auditor exercised due professional care?", "options": [{"tr": "Hayır, makul özen gösterilmemiştir.", "en": "No, reasonable care was not taken.", "cmt_tr": "İç denetçiler, önemli hata, hile veya uyumsuzluk olasılığını dikkate almalıdır. Bu nedenle, iç denetçi mesleki özen göstermemiştir. Yeni alacaklar memurunun kayıt tutma fonksiyonlarına erişimi, özellikle memurun nakde erişimi yoksa tek başına bir usulsüzlük değildir. Ayrıca, olgular iç denetçinin çalışma kapsamının görevin hedeflerine ulaşmak için yeterli olduğunu göstermemektedir.", "cmt_en": "Internal auditors must consider the probability of significant errors, fraud, or noncompliance. Thus, the internal auditor did not exercise due professional care. Access to the recordkeeping functions by the new receivables clerk is not in itself an irregularity, especially if the clerk has no access to cash. Moreover, the facts do not indicate that the extent of the internal auditor’s work sufficed to achieve the engagement’s objectives."}, {"tr": "Evet, usulsüzlükler kaydedilmiştir.", "en": "Yes, irregularities were noted.", "cmt_tr": "Usulsüzlüklerin gerçekleştiğine dair bir belirti yoktur.", "cmt_en": "No indication is given that irregularities have occurred."}, {"tr": "Evet, usulsüzlükleri en çok gösteren koşullara karşı dikkatli olunduğu gösterilmiştir.", "en": "Yes, alertness to conditions most likely indicative of irregularities was shown.", "cmt_tr": "Denetimin kapsamı usulsüzlüklere karşı dikkatli olunduğunu göstermemiştir.", "cmt_en": "The extent of the audit did not demonstrate alertness to irregularities."}, {"tr": "Evet, denetim çalışma kağıtlarına not düşülmüştür.", "en": "Yes, the engagement working papers were annotated.", "cmt_tr": "Çalışma kağıtlarına not düşmek, denetçinin mesleki özen gösterdiğini belirtmez.", "cmt_en": "Annotating the working papers does not indicate that the auditor exercised due professional care."}], "answer": 0}, {"q_tr": "Mesleki özen standardı, iç denetçiden şunları gerektirir:", "q_en": "The due professional care standard requires an internal auditor to", "options": [{"tr": "Hedeflere ulaşmak için gereken kapsamda inceleme ve doğrulamalar yapmak.", "en": "Conduct examinations and verifications to the extent needed to achieve objectives.", "cmt_tr": "İç denetçiler mesleki özeni şunları dikkate alarak göstermelidir: (1) görev hedeflerine ulaşmak için gereken çalışma kapsamı; (2) güvence prosedürlerinin uygulandığı konuların göreli karmaşıklığı, önemliliği veya Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care anlamlılığı; (3) yönetişim, risk yönetimi ve kontrol süreçlerinin yeterliliği ve etkinliği; (4) önemli hata, hile veya uyumsuzluk olasılığı; ve (5) güvence maliyetinin potansiyel faydalara oranı (Standart 4.2).", "cmt_en": "Internal auditors must exercise due professional care by considering the (1) extent of work needed to achieve the engagement’s objectives; (2) relative complexity, materiality, or Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care significance of matters to which assurance procedures are applied; (3) adequacy and effectiveness of governance, risk management, and control processes; (4) probability of significant errors, fraud, or noncompliance; and (5) cost of assurance in relation to potential benefits (Standard 4.2)."}, {"tr": "Tüm iç denetimlerde kapsamlı incelemeler yapmak.", "en": "Perform extensive examinations in all internal audits.", "cmt_tr": "İnceleme ve doğrulama yalnızca makul ölçüde yapılmalıdır.", "cmt_en": "Examination and verification need only be undertaken to a reasonable extent."}, {"tr": "Uyumun mevcut olduğundan emin olmak.", "en": "Be certain that compliance exists.", "cmt_tr": "Uyuma ilişkin makul güvence sağlamak, makul özen göstermeyle tutarlıdır.", "cmt_en": "Providing reasonable assurance of compliance is consistent with exercising reasonable care."}, {"tr": "Önemli olsun olmasın usulsüzlükleri dikkate almak.", "en": "Consider irregularities whether or not material.", "cmt_tr": "Önemli usulsüzlüklerin olasılığı dikkate alınmalıdır.", "cmt_en": "The possibility of material irregularities must be considered."}], "answer": 0}, {"q_tr": "Bir iç denetçi, bir güvence görevi planlarken bir kalemi önemli olarak değerlendirmiştir. Ancak, sonradan aşağıdakilerden hangisinin belirlendiği durumda güvence görevi bu kalemi dışarıda bırakabilir?", "q_en": "An internal auditor judged an item to be material when planning an assurance engagement. However, the assurance engagement may exclude the item if it is subsequently determined that", "options": [{"tr": "Yeterli personel mevcut değildir.", "en": "Sufficient staff is not available.", "cmt_tr": "Yetersiz personel, önemli denetim kanıtlarını göz ardı etmek için bir gerekçe değildir.", "cmt_en": "Inadequate staffing is not a basis for ignoring material audit evidence."}, {"tr": "Kalemle ilgili olumsuz etkilerin gerçekleşmesi çok düşük bir olasılıktır.", "en": "Adverse effects related to the item are very unlikely to occur.", "cmt_tr": "İç denetçiler, güvence prosedürlerinin uygulandığı konuların göreli karmaşıklığını, önemliliğini veya anlamlılığını değerlendirerek mesleki özen göstermelidir (Standart 4.2). Önemlilik yargıları tüm koşullar temelinde yapılır ve nitel ile nicel değerlendirmeleri içerir. Ayrıca, iç denetçiler riskin önemlilikle etkileşimini de dikkate almalıdır. Sonuç olarak, olumsuz etkilerin gerçekleşmesi çok düşük bir olasılık ise nicel olarak önemli bir kalem için denetim çabası azaltılabilir; örneğin, tahakkuku muhtemel olmayan önemli bir koşullu yükümlülük.", "cmt_en": "Internal auditors must exercise due professional care by considering the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.2). Materiality judgments are made based on all the circumstances and involve qualitative as well as quantitative considerations. Moreover, internal auditors also must consider the interplay of risk with materiality. Consequently, engagement effort may be reduced for a quantitatively material item if adverse effects are very unlikely to occur, for example, a material contingent liability that is unlikely to require recognition."}, {"tr": "İlgili bilgiler güvenilir değildir.", "en": "Related information is unreliable.", "cmt_tr": "İlgili bilgiler güvenilir değilse ek denetim prosedürlerine gerek olabilir.", "cmt_en": "Additional engagement procedures might be needed if related information is unreliable."}, {"tr": "Tekrar eden gelirler söz konusudur.", "en": "Recurring income is involved.", "cmt_tr": "Tekrar eden gelirin önemli olması muhtemeldir.", "cmt_en": "Recurring income is likely to be material."}], "answer": 1}, {"q_tr": "IIA mesleki özen standardı, iç denetçilerden şunları gerektirir:", "q_en": "The IIA’s due professional care standard requires internal auditors to", "options": [{"tr": "Risk yönetimi ve kontrolün yeterliliğini değerlendirmek ancak yönetim kurulu düzeyinde yönetişim süreçlerini değerlendirmemek.", "en": "Consider the adequacy of risk management and control but not board-level governance processes.", "cmt_tr": "İç denetçiler, yönetişim, risk yönetimi ve kontrol süreçlerinin yeterliliğini ve etkinliğini değerlendirerek mesleki özen göstermelidir.", "cmt_en": "Internal auditors must exercise due professional care by considering the adequacy and effectiveness of governance, risk management, and control processes."}, {"tr": "Önemli konulara ilişkin güvence maliyetlerini göz ardı etmek.", "en": "Ignore the relative costs of assurances regarding material matters.", "cmt_tr": "İç denetçiler, güvence maliyetinin potansiyel faydalara oranını değerlendirerek mesleki özen göstermelidir.", "cmt_en": "Internal auditors must exercise due professional care by considering the cost of assurance in relation to potential benefits."}, {"tr": "Makul ölçüde tedbirli ve yetkin bir denetçinin yapacağı şekilde inceleme yapmak.", "en": "Conduct examinations as would a reasonably prudent and competent auditor.", "cmt_tr": "İç denetçilerden, benzer koşullarda makul ölçüde tedbirli ve yetkin bir iç denetçinin yapacağı ölçüde inceleme ve doğrulama yapmaları beklenir.", "cmt_en": "Internal auditors are expected to conduct examinations and verifications to the same extent as would a reasonably prudent and competent internal auditor in the same or similar circumstances."}, {"tr": "Düzenlemelere uyumsuzluk yerine hile ve hataları ele almak. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "Address fraud and errors rather than noncompliance with regulations. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "İç denetçiler, önemli hata, hile veya uyumsuzluk olasılığını değerlendirerek mesleki özen göstermelidir.", "cmt_en": "Internal auditors must exercise due professional care by considering the probability of significant errors, fraud, or noncompliance."}], "answer": 2}, {"q_tr": "İç denetçiler için mesleki özen en çok aşağıdakilerden hangisine uyum gerektirir?", "q_en": "For internal auditors, due professional care most likely requires conformance with", "options": [{"tr": "Kuruluşun davranış kuralları.", "en": "The organization’s code of conduct.", "cmt_tr": "Mesleki özen, IIA Küresel İç Denetim Standartlarına uyum gerektirir. Kuruluşun davranış kurallarına uyum gerektirebilir.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. It may require conformance with the organization’s code of conduct."}, {"tr": "IIA Küresel İç Denetim Standartları.", "en": "The IIA’s Global Internal Audit Standards.", "cmt_tr": "İç denetçiler için mesleki özen, IIA Küresel İç Denetim Standartlarına uyum gerektirir ve kuruluşun davranış kurallarına ve sahip olunan diğer mesleki unvanlarla ilgili ek davranış kurallarına uyumu gerektirebilir. İç denetim fonksiyonunun, iç denetçilerin IIA Standartlarına veya kuruluşun davranış kurallarına ilişkin yıllık bir beyanda bulunmasını gerektiren resmi bir süreci olabilir.", "cmt_en": "For internal auditors, due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and any additional codes of conduct relevant to other professional designations attained. The internal audit function may have a formal process that requires internal auditors to sign an annual declaration related to The IIA’s Standards or the organization’s code of conduct."}, {"tr": "Sahip olunan diğer unvanlarla ilgili ek davranış kuralları.", "en": "Additional codes of conduct that are relevant to the other designations attained.", "cmt_tr": "Mesleki özen, IIA Küresel İç Denetim Standartlarına uyum gerektirir. Sahip olunan diğer unvanlarla ilgili ek davranış kurallarına uyumu gerektirebilir.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. It may entail conformance with additional codes of conduct that are relevant to other designations attained."}, {"tr": "Düzenleyici kurumlar tarafından benimsenen tüm davranış kuralları.", "en": "Any codes of conduct adopted by regulatory bodies", "cmt_tr": "Mesleki özen, IIA Küresel İç Denetim Standartlarına uyum gerektirir. Düzenleyici kurumlar tarafından benimsenen davranış kuralları yalnızca kuruluşa uygulanan düzenlemeler kapsamındaysa geçerlidir.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards. Any codes of conduct adopted by regulatory bodies are relevant only if they are in regulations that apply to the organization."}], "answer": 1}, {"q_tr": "İç denetçiler, çalışmalarında mesleki özen göstermelidir. Mesleki özeni en çok aşağıdakilerden hangisiyle gösterirler?", "q_en": "Internal auditors must apply due professional care in performing their work. They most likely apply due professional care by", "options": [{"tr": "İlgili davranış kurallarına uymak.", "en": "Conforming with relevant codes of conduct.", "cmt_tr": "Mesleki özen, IIA Küresel İç Denetim Standartlarına uyum gerektirir ve kuruluşun davranış kurallarına ve diğer davranış kurallarına uyumu gerektirebilir.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and other codes of conduct."}, {"tr": "IIA'nın zorunlu iç denetim rehberliğini uygulamak.", "en": "Applying The IIA’s mandatory internal auditing guidance.", "cmt_tr": "IIA Küresel İç Denetim Standartlarındaki zorunlu rehberliğe uyum, görevlerin mesleki özenle yerine getirilmesi için gereklidir.", "cmt_en": "Adherence to the mandatory guidance in The IIA’s Global Internal Audit Standards is necessary to performing duties with due professional care."}, {"tr": "İç denetim fonksiyonunun politika ve prosedürlerine uymak. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "Following the policies and procedures of the internal audit function. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "İç denetim fonksiyonunun politika ve prosedürleri, iç denetim çalışmasının planlanması, yürütülmesi ve belgelenmesine sistematik ve disiplinli bir yaklaşım sağlar. Bu yaklaşımı takip ederek, iç denetçiler esasen mesleki özen uygular.", "cmt_en": "The internal audit function’s policies and procedures provide a systematic and disciplined approach to planning, executing, and documenting internal audit work. By following this approach, internal auditors essentially apply due professional care."}, {"tr": "Yukarıdakilerin tümü.", "en": "All of the above.", "cmt_tr": "İç denetim görevlerinin mesleki özenle yerine getirilmesi, uygun eğitim, deneyim, sertifikalar ve eğitimle başlar. Ayrıca, IIA Küresel İç Denetim Standartlarındaki zorunlu rehberliğe uyum, görevlerin mesleki özenle yerine getirilmesi için gereklidir. Küresel İç Denetim Standartlarıyla birlikte, iç denetim fonksiyonunun politika ve prosedürleri sistematik ve disiplinli bir yaklaşım sağlar. Bu yaklaşımı takip ederek, iç denetçiler esasen mesleki özen uygular. Ancak mesleki özen kısmen görevin karmaşıklığına bağlıdır. Ayrıca, mesleki özen kuruluşun davranış kurallarına ve sahip olunan diğer sertifikalarla ilgili davranış kurallarına uyumu gerektirebilir.", "cmt_en": "Performing internal audit duties with due professional care begins with appropriate education, experience, certifications, and training. Moreover, adherence to the mandatory guidance in The IIA’s Global Internal Audit Standards is necessary to performing duties with due professional care. Along with the Global Internal Audit Standards, the internal audit function’s policies and procedures provide a systematic and disciplined approach to planning, executing, and documenting internal audit work. By following this approach, internal auditors essentially apply due professional care. But due professional care depends in part on the engagement’s complexity. Furthermore, due professional care may entail conformance with the organization’s code of conduct and other codes of conduct relevant to other certifications attained."}], "answer": 3}, {"q_tr": "Mesleki özenle yerine getirilen bir güvence görevinde iç denetçiler şunları yapmalıdır:", "q_en": "In an assurance engagement performed with due professional care, internal auditors must", "options": [{"tr": "Tüm önemli risklerin belirlendiğini garanti etmemek.", "en": "Not guarantee that all significant risks are identified.", "cmt_tr": "İç denetçiler, amaçları, faaliyetleri veya kaynakları etkileyebilecek önemli risklere karşı dikkatli olmalıdır. Ancak, mesleki özenle uygulanan güvence prosedürleri bile tüm önemli risklerin belirleneceğini garanti etmez (Standart 4.2).", "cmt_en": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.2)."}, {"tr": "Danışmanlığın maliyet ve faydalarını dikkate almak.", "en": "Consider the cost and benefits of the consultation.", "cmt_tr": "Güvence görevi danışmanlık görevi değildir. Ancak her ikisinde de maliyet ve faydalar dikkate alınmalıdır.", "cmt_en": "An assurance engagement is not a consulting engagement. But cost and benefits must be considered in both."}, {"tr": "Teknoloji tabanlı veri analizi kullanmak.", "en": "Use technology-based data analysis.", "cmt_tr": "Mesleki özen uygularken, iç denetçiler teknoloji tabanlı denetim ve diğer veri analizi tekniklerinin kullanımını değerlendirmelidir (Standart 4.2).", "cmt_en": "In exercising due professional care, internal auditors must consider the use of technology-based audit and other data analysis techniques (Standard 4.2)."}, {"tr": "Salt yetkinlik ve makul tedbirliliğin ötesinde özen ve beceri uygulamak.", "en": "Apply care and skill beyond mere competence and reasonable prudence.", "cmt_tr": "İç denetçiler, makul ölçüde tedbirli ve yetkin bir iç denetçinin göstereceği özen ve beceriyi uygulamalıdır. Mesleki özen kusursuzluk anlamına gelmez (Standart 4.3). Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "Internal auditors must apply the care and skill expected of a reasonably prudent and competent internal auditor. Due professional care does not imply infallibility (Standard 4.3). Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 0}, {"q_tr": "IIA Etik ve Profesyonellik Standartları kime uygulanır?", "q_en": "The IIA’s Standards of Ethics and Professionalism apply to", "options": [{"tr": "IIA üyelerine ancak sertifika adaylarına uygulanmaz.", "en": "IIA members but not candidates for certifications.", "cmt_tr": "Etik ve Profesyonellik Standartları, yalnızca IIA üyelerine değil, tüm iç denetçilere uygulanır.", "cmt_en": "The Standards of Ethics and Professionalism apply to all internal auditors, not just IIA members."}, {"tr": "Yalnızca IIA sertifika sahiplerine.", "en": "Recipients of IIA certifications only.", "cmt_tr": "İç denetçiler, sertifika adaylarını, IIA sertifika sahiplerini, IIA üyelerini ve iç denetim uygulayıcılarını kapsar.", "cmt_en": "Internal auditors include candidates for certifications, holders of IIA certifications, IIA members, and practitioners of internal auditing."}, {"tr": "Tüm iç denetçilere.", "en": "All internal auditors.", "cmt_tr": "IIA Etik ve Profesyonellik Standartları, iç denetçiler için davranış normlarını tanımlar. \"İç denetçiler\" bir kuruluş içinde bağımsız, nesnel güvence ve danışmanlık hizmetleri sunan herkesi ifade eder.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism describe behavior norms for internal auditors. “Internal auditors” refers to anyone who performs independent and objective assurance and advisory services within an organization."}, {"tr": "Yalnızca IIA üyelerine ve sertifikalı iç denetçilere.", "en": "IIA members and certified internal auditors only.", "cmt_tr": "İç denetçiler ayrıca sertifika adaylarını ve iç denetçi olarak hizmet sunan herkesi kapsar.", "cmt_en": "Internal auditors also include candidates for certifications and anyone performing services as internal auditors."}], "answer": 2}], "SU5 - Confidentiality": [{"q_tr": "Bir iç denetçi, dosyalanmış bordro vergi raporlarını bordro kayıtlarıyla gözden geçiriyordu. İki ay sonra, denetçi belirli çalışanların maaşlarını kuruluşun Lojistik Müdürüyle paylaşmıştır. IIA Etik ve Profesyonellik Standartlarının hangi ilkesi ihlal edilmiştir?", "q_en": "An internal auditor was reviewing filed payroll tax reports with payroll records. Two months later, the auditor shared salaries of certain employees with the organization’s Logistics Manager. Which principle of The IIA’s Standards of Ethics and Professionalism was violated?", "options": [{"tr": "Nesnellik.", "en": "Objectivity.", "cmt_tr": "Nesnellik ilkesi, iç denetçilerin incelenen faaliyet veya süreç hakkında bilgi toplarken, değerlendirirken ve bildirirken en üst düzeyde mesleki nesnellik göstermesini gerektirir. Gizli bilgilerin açıklanmasını ele almaz.", "cmt_en": "The principle of objectivity states that internal auditors exhibit the highest level of professional objectivity in gathering, evaluating, and communicating information about the activity or process being examined. It does not address disclosure of confidential information."}, {"tr": "Gizlilik.", "en": "Confidentiality.", "cmt_tr": "IIA Etik ve Profesyonellik Standartlarının gizlilik ilkesine göre, iç denetçiler aldıkları bilgilerin değerine ve mülkiyetine saygı gösterir ve yasal veya mesleki bir yükümlülük olmadıkça uygun yetki olmaksızın bilgi açıklamaz. Denetçi, çalışanların maaşlarını bir iş arkadaşına açıklayarak gizlilik ilkesini ihlal etmiştir.", "cmt_en": "According to the confidentiality principle of The IIA’s Standards of Ethics and Professionalism, internal auditors respect the value and ownership of information they receive and do not disclose information without appropriate authority unless there is a legal or professional obligation to do so. The auditor violated the principle of confidentiality by disclosing employees’ salaries to a co- worker."}, {"tr": "Yetki.", "en": "Authority.", "cmt_tr": "Yetki, yönetme veya hükmetme hakkı olarak tanımlanır. Yetki, IIA Etik ve Profesyonellik Standartlarının ilkelerinden biri değildir.", "cmt_en": "Authority is defined as the right to govern or rule. Authority is not one of the principles of The IIA’s Standards of Ethics and Professionalism."}, {"tr": "Yetkinlik.", "en": "Competency.", "cmt_tr": "Yetkinlik ilkesi, iç denetçilerin iç denetim hizmetlerinin ifasında gereken bilgi, beceri ve deneyimi uygulamasını gerektirir. Gizli bilgiler yetkinlik ilkesi kapsamında yer almaz.", "cmt_en": "The principle of competency requires internal auditors to apply the knowledge, skills, and experience needed in the performance of internal audit services. Confidential information is not included under the principle of competency."}], "answer": 1}, {"q_tr": "Bir iç denetçi, mali kontrol müdürünün yakın kişisel arkadaşı olduğu bir bölümde hizmet sunmaktadır ve arkadaşının kritik bir dizi işçi müzakeresinden sonra değiştirileceğini öğrenir. İç denetçi bu bilgiyi arkadaşına iletir. IIA Etik ve Profesyonellik Standartlarının ihlali gerçekleşmiş midir?", "q_en": "An internal auditor is performing services in a division in which the chief financial officer is a close personal friend, and the internal auditor learns that the friend is to be replaced after a series of critical labor negotiations. The internal auditor relays this information to the friend. Has a violation of The IIA’s Standards of Ethics and Professionalism occurred?", "options": [{"tr": "Hayır. Gizli bilgilerin kullanımı iç denetçiye kişisel kazanç sağlamamıştır.", "en": "No. The use of the confidential information resulted in no personal gain to the internal auditor.", "cmt_tr": "Standartlar, bilgilerin kuruluşun meşru ve etik amaçlarına zarar verecek şekilde kullanılmasını özellikle yasaklar. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "The Standards specifically prohibit using information in a manner that would be detrimental to the legitimate and ethical objectives of the organization. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}, {"tr": "Hayır. İç denetçi sadece arkadaşına karşı dürüst davranıyordu.", "en": "No. The internal auditor was just being honest with his or her friend.", "cmt_tr": "Standartlar, bilgilerin kuruluşun meşru ve etik amaçlarına zarar verecek şekilde kullanılmasını özellikle yasaklar.", "cmt_en": "The Standards specifically prohibit using information in a manner that would be detrimental to the legitimate and ethical objectives of the organization."}, {"tr": "Evet. İç denetçinin kuruluşla çıkar çatışması vardı.", "en": "Yes. The internal auditor had a conflict of interest with the organization.", "cmt_tr": "Olgular, kuruluşla bir çıkar çatışmasının varlığını göstermez. Ancak böyle bir çatışma, iç denetçinin gizli bilgileri kuruluşa ait bir iş fırsatını ele geçirmek için kullanması durumunda mevcut olurdu. Ayrıca, iç denetçinin nesnelliği, bir akraba veya yakın kişisel arkadaşın çalıştığı bölümün denetlenmesi nedeniyle bozulmuştur. Fiili veya görünür bozulma, ayrıntıların uygun taraflara açıklanmasını gerektirir.", "cmt_en": "The facts do not suggest that a conflict of interest with the organization existed. However, such a conflict would be present, for example, if the internal auditor used confidential information to seize a business opportunity that rightfully belonged to the organization. Furthermore, the internal auditor’s objectivity was impaired by auditing a division in which a relative or close personal friend was employed. The impairment, whether in fact or appearance, requires disclosure of the details to appropriate parties."}, {"tr": "Evet. İç denetçi, görevleri sırasında elde edilen bilgilerin kullanımında tedbirli davranmamıştır.", "en": "Yes. The internal auditor was not prudent in the use of information acquired in the course of his or her duties.", "cmt_tr": "Gizlilik ilkesi, iç denetçilerin görevleri sırasında elde edilen bilgilerin kullanımı ve korunmasında tedbirli olmasını gerektirir. Bu durumda, mali kontrol müdürünün değiştirilme kararı kuruluşa aitti. Buna göre, iç denetçi arkadaşına söylememekle yükümlüydü.", "cmt_en": "The confidentiality principle states that internal auditors must be prudent in the use and protection of information acquired in the course of their duties. In this case, the decision whether to notify the financial officer of his or her replacement was properly the organization’s. Accordingly, the internal auditor was bound not to tell his or her friend."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi bir iç denetçi tarafından IIA Etik ve Profesyonellik Standartlarının ihlalini en çok oluşturur?", "q_en": "Which of the following most likely constitutes a violation of The IIA’s Standards of Ethics and Professionalism by an internal auditor?", "options": [{"tr": "Bir ticaret fuarında kuruluşun bilgisayar ağları üzerindeki kontrollerini tartışmak.", "en": "Discussing at a trade convention the organization’s controls over its computer networks.", "cmt_tr": "Bilgi teknolojisi kontrollerinin açıklanması kuruluşun amaçlarına zarar vermez. Ticari sır olma olasılıkları düşüktür.", "cmt_en": "Disclosure of information technology controls is not detrimental to the objectives of the organization. They are not likely to be trade secrets."}, {"tr": "Bir yöneticinin olası bir satın alma tartışmasını duyarak hedef şirketin hisselerini satın almak.", "en": "Purchasing stock in a target entity after overhearing an executive’s discussion of a possible acquisition.", "cmt_tr": "Gizlilik ilkesi kapsamındaki Standart 5.1, iç denetçilerin bilgileri herhangi bir kişisel kazanç için veya yasaya aykırı ya da kuruluşun meşru ve etik amaçlarına zarar verecek şekilde kullanmamasını gerektirir.", "cmt_en": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization."}, {"tr": "Üst yönetimin talebi üzerine hassas bilgileri son denetim raporundan çıkarmak.", "en": "Deleting sensitive information from a final engagement communication at the request of senior management.", "cmt_tr": "Üst yönetim çıkarılmaya izin verirse, iç denetçi önemli olguları açıklamama suçundan sorumlu değildir.", "cmt_en": "If senior management permits the omission, the internal auditor is not guilty of failing to disclose material facts."}, {"tr": "Tamamen söylentilere dayanarak yönetici harcama raporlarını araştırmak.", "en": "Investigating executive expense reports based completely on rumors of padding.", "cmt_tr": "Harcama hesaplarının incelenmesi iç denetçinin normal sorumlulukları dahilindedir, ancak hilenin daha ileri araştırılması genellikle soruşturma uzmanları tarafından yapılmalıdır.", "cmt_en": "An investigation of expense accounts is within the internal auditor’s normal responsibilities, but further investigation of fraud should ordinarily be made by investigative specialists."}], "answer": 1}, {"q_tr": "Bir İç Denetim Yöneticisi (İDY) tarafından gerçekleştirilen aşağıdaki eylemlerden hangisi IIA Etik ve Profesyonellik Standartları kapsamında mesleki açıdan etik kabul edilebilir?", "q_en": "Which of the following actions taken by a chief audit executive (CAE) could be considered professionally ethical under The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "İDY, yeğeni olan şube müdürünün \"işleri düzeltmesi\" için zaman tanımak amacıyla bir şubedeki denetim görevini ertelememeye karar verir. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "en": "The CAE decides to delay an engagement at a branch so that his nephew, the branch manager, will have time to “clean things up.” Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_tr": "İç denetçiler, işlerini dürüstlük, özen ve sorumlulukla yerine getirmelidir.", "cmt_en": "Internal auditors must perform their work with honesty, diligence, and responsibility."}, {"tr": "Kurumsal kaynakları korumak için İDY, tüm personelin eğitimden yararlanamayacak kadar yeni olması gerekçesiyle gelecek 2 yıl için tüm personel eğitimlerini iptal eder.", "en": "To save organizational resources, the CAE cancels all staff training for the next 2 years on the basis that all staff are too new to benefit from training.", "cmt_tr": "İç denetçiler yeterliliklerini ve hizmetlerinin etkinliğini ve kalitesini sürekli geliştirmelidir.", "cmt_en": "Internal auditors must continually improve their proficiency and the effectiveness and quality of their services."}, {"tr": "Kurumsal kaynakları korumak için İDY, yabancı şubelerdeki prosedürleri şube müdürlerinden önemli personel değişikliğinin olmadığına dair teyitlerle sınırlar.", "en": "To save organizational resources, the CAE limits procedures at foreign branches to confirmations from branch managers that no major personnel changes have occurred.", "cmt_tr": "Standartlar, destekleyici bilgilerin yeterli, güvenilir, ilgili ve faydalı olmasını gerektirir.", "cmt_en": "The Standards require supporting information to be sufficient, reliable, relevant, and useful."}, {"tr": "İDY, ortak sahip olan babası hakkında kuruluş faaliyetleri hakkında bilgi vermeyi reddeder.", "en": "The CAE refuses to provide information about organizational operations to his father, who is a part owner.", "cmt_tr": "Gizlilik ilkesi kapsamındaki Standart 5.1, iç denetçilerin bilgileri herhangi bir kişisel kazanç için veya yasaya aykırı ya da kuruluşun meşru ve etik amaçlarına zarar verecek şekilde kullanmamasını gerektirir. Bu nedenle, İDY'nin böyle bir bilgi kullanımı içeriden öğrenenlerin ticareti kuralları kapsamında yasadışı olabilir.", "cmt_en": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization. Thus, such use of information by the CAE might be illegal under insider trading rules."}], "answer": 3}, {"q_tr": "IIA Etik ve Profesyonellik Standartları kapsamında aşağıdakilerden hangisi izin verilen bir durumdur?", "q_en": "Which of the following is permissible under The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Mahkeme emrine yanıt olarak kuruluşa potansiyel zarar verebilecek gizli, görevle ilgili bilgilerin açıklanması.", "en": "Disclosing confidential, engagement-related information that is potentially damaging to the organization in response to a court order.", "cmt_tr": "Gizlilik ilkesi, yasal veya mesleki bir yükümlülük olması halinde gizli bilgilerin açıklanmasına izin verir.", "cmt_en": "The principle of confidentiality permits the disclosure of confidential information if there is a legal or professional obligation to do so."}, {"tr": "İşveren kuruluşta mülkiyet payı satın alma kararında görevle ilgili bilgilerin kullanılması.", "en": "Using engagement-related information in a decision to buy an ownership interest in the employer organization.", "cmt_tr": "Standart 5.1, iç denetçilerin bilgileri kişisel kazanç için kullanmasını yasaklar.", "cmt_en": "Standard 5.1 prohibits internal auditors from using information for personal gain."}, {"tr": "Yakın zamanda bir denetim raporunda övgüyle bahsedilen bir çalışandan beklenmeyen bir hediye kabulü.", "en": "Accepting an unexpected gift from an employee whom the internal auditor has praised in a recent engagement communication.", "cmt_tr": "Standart 2.2, iç denetçilerin mesleki yargılarını bozabilecek veya bozduğu varsayılabilecek hiçbir şeyi kabul etmemesini gerektirir.", "cmt_en": "Standard 2.2 prohibits internal auditors from accepting anything that may impair, or be presumed to impair, their professional judgment."}, {"tr": "Yönetim konuyu ele alacağını belirttiği için yasadışı faaliyetlerle ilgili önemli gözlem ve önerilerin yönetim kuruluna raporlanmaması.", "en": "Not reporting significant observations and recommendations about illegal activity to the board because management has indicated it will address the issue.", "cmt_tr": "Nesnellik ilkesi kapsamındaki Standart 1.1, iç denetçilerin açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları açıklamasını gerektirir. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "Standard 1.1 under the objectivity principle requires internal auditors to disclose all material facts known to them that, if not disclosed, might distort the reporting of activities under review. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}], "answer": 0}, {"q_tr": "Hangi durum IIA Etik ve Profesyonellik Standartlarını ihlal etme olasılığı en yüksektir?", "q_en": "Which situation most likely violates The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "İç Denetim Yöneticisi (İDY), hassas bir alanda gözlem ve öneriler konusunda denetim müşterisiyle anlaşamamaktadır. İDY, gözlemlerin ayrıntılarını ve önerilen tavsiyeleri başka bir kuruluştan meslektaşı olan bir İDY ile görüşür.", "en": "The chief audit executive (CAE) disagrees with the engagement client about the observations and recommendations in a sensitive area. The CAE discusses the detail of the observations and the proposed recommendations with a fellow CAE from another organization.", "cmt_tr": "Gizlilik ilkesi, iç denetçilerin görevleri sırasında elde edilen bilgilerin kullanımı ve korunmasında tedbirli olmasını gerektirir. Hassas konuların yetkisiz bir tarafla tartışılması, ihlal olarak değerlendirilme olasılığı en yüksek olan durumdur.", "cmt_en": "The confidentiality principle states that internal auditors must be prudent in the use and protection of information acquired in the course of their duties. Discussion of sensitive matters with an unauthorized party is the situation most likely to be considered a violation."}, {"tr": "Bir kuruluşun iç denetim fonksiyonu tüzüğü, İDY'nin yıllık denetim çalışma programını yönetim kuruluna onay ve önerileri için sunmasını gerektirir.", "en": "An organization’s charter for the internal audit function requires the chief audit executive (CAE) to present the yearly engagement work schedule to the board for its approval and suggestions.", "cmt_tr": "Denetim çalışma programının yönetim kurulu ve üst yönetim tarafından onaylanması gereklidir.", "cmt_en": "Approval of the engagement work schedule by the board and senior management is required."}, {"tr": "Denetim yöneticisi, son denetim raporundan en önemli gözlemleri ve önerileri çıkarmıştır. Sorumlu iç denetçi çıkarmaya karşı çıkmış ve raporlanan koşulların mevcut olduğunu bildiğini açıklamıştır. Sorumlu iç denetçi, teknik olarak bilgilerin gözlemleri desteklemek için yeterli olmadığını kabul eder, ancak yönetim koşulları açıklayamaz ve gözlemler tek makul sonuçlardır.", "en": "The engagement manager has removed the most significant observations and recommendations from the final engagement communication. The in-charge internal auditor opposed the removal, explaining that (s)he knows the reported conditions exist. The in-charge internal auditor agrees that, technically, information is not sufficient to support the observations, but management cannot explain the conditions, and the observations are the only reasonable conclusions.", "cmt_tr": "Bilgiler, görev hedeflerine ulaşmak için yeterli olmalıdır.", "cmt_en": "Information must be sufficient to achieve engagement objectives."}, {"tr": "İç denetim fonksiyonu bir uzmanlık alanında beceri ve bilgiden yoksun olduğu için İDY bir uzman işe almıştır. Denetim yöneticisinden uzmanın göreve yaklaşımını incelemesi istenmiştir. İncelenen alan hakkında bilgili olmasına rağmen, yönetici uzmanlık eksikliği nedeniyle görevi kabul etme konusunda isteksizdir.", "en": "Because the internal audit function lacks skill and knowledge in a specialty area, the chief audit executive (CAE) has hired an expert. The engagement manager has been asked to review the expert’s approach to the assignment. Although knowledgeable about the area under review, the manager is hesitant to accept the assignment because of lack of expertise.", "cmt_tr": "Standartlar, gerektiğinde uzmanların kullanılmasına izin verir.", "cmt_en": "The Standards allow use of experts when needed."}], "answer": 0}, {"q_tr": "Aşağıdaki durumlardan hangisi IIA Etik ve Profesyonellik Standartlarının ihlalidir?", "q_en": "Which of the following situations is a violation of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Bir iç denetçiye, bir birleşme ortağının kuruluş tarafından dolandırıldığını iddia ettiği bir davada tanıklık emri verilmiştir. İç denetçi mahkemeye gizli bilgiler açıklamıştır.", "en": "An internal auditor was ordered to testify in a court case in which a merger partner claimed to have been defrauded by the internal auditor’s organization. The internal auditor divulged confidential information to the court.", "cmt_tr": "Gizlilik ilkesi, yasal veya mesleki bir yükümlülük olması halinde gizli bilgilerin açıklanmasına izin verir.", "cmt_en": "The principle of confidentiality permits the disclosure of confidential information if there is a legal or professional obligation to do so."}, {"tr": "Bir ofis ürünleri üreticisinin iç denetçisi yakın zamanda pazarlama fonksiyonunu değerlendirmek üzere bir denetim görevi tamamlamıştır. Bu deneyime dayanarak, iç denetçi bir Cumartesi günü birkaç saat, kendi pazarlama fonksiyonunu denetlemeyi amaçlayan yerel bir hastaneye ücretli danışman olarak çalışmıştır. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "en": "An internal auditor for a manufacturer of office products recently completed an engagement to evaluate the marketing function. Based on this experience, the internal auditor spent several hours one Saturday working as a paid consultant to a hospital in the local area that intended to conduct an engagement to evaluate its marketing function. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_tr": "Hastane, iç denetçinin işvereninin rakibi veya tedarikçisi değildir. Bu nedenle çıkar çatışması söz konusu değildir.", "cmt_en": "The hospital is not a competitor or supplier of the internal auditor’s employer. Thus, no conflict of interest is involved."}, {"tr": "Bir iç denetçi, yerel bir IIA şube toplantısında elektronik veri değişimi (EDI) bağlantılarıyla ilgili denetimler için geliştirdiği bir programın içeriğini anlatan bir konuşma yapmıştır. İzleyiciler arasında büyük rakiplerden birkaç iç denetçi bulunmaktadır.", "en": "An internal auditor gave a speech at a local IIA chapter meeting outlining the contents of a program the internal auditor had developed for engagements relating to electronic data interchange (EDI) connections. Several internal auditors from major competitors were in the audience.", "cmt_tr": "Konuşma yapmak, IIA Etik ve Profesyonellik Standartlarının ihlali değildir. Aslında IIA paylaşımı teşvik eder.", "cmt_en": "Giving a speech is not a violation of The IIA’s Standards of Ethics and Professionalism. In fact, the IIA encourages sharing."}, {"tr": "Bir denetim görevi sırasında, bir iç denetçi kuruluşun sektörde devrim yaratacak yeni bir ürün çıkaracağını öğrenmiştir. Yeni ürünün muhtemel başarısı nedeniyle, ürün müdürü iç denetçiye kuruluşta ek bir pay satın almasını önermiş ve iç denetçi bunu yapmıştır.", "en": "During an engagement, an internal auditor learned that the organization was about to introduce a new product that would revolutionize the industry. Because of the probable success of the new product, the product manager suggested that the internal auditor buy an additional interest in the organization, which the internal auditor did.", "cmt_tr": "Gizlilik ilkesi kapsamındaki Standart 5.1, iç denetçilerin bilgileri herhangi bir kişisel kazanç için veya yasaya aykırı ya da kuruluşun meşru ve etik amaçlarına zarar verecek şekilde kullanmamasını gerektirir.", "cmt_en": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi IIA Etik ve Profesyonellik Standartlarının gizlilik ilkesinin ihlalidir?", "q_en": "Which of the following is a violation of The IIA’s Standards of Ethics and Professionalism principle of confidentiality?", "options": [{"tr": "Kuruluşun gizli bilgileri, kuruluşun aldığı bir mahkeme emrine yanıt olarak açıklanmıştır.", "en": "Confidential information of the organization was released in response to a court order received by the organization.", "cmt_tr": "Gizlilik ilkesi, yasal veya mesleki bir yükümlülük olması halinde gizli bilgilerin açıklanmasına izin verir.", "cmt_en": "The principle of confidentiality permits the disclosure of confidential information given a legal or professional obligation to do so."}, {"tr": "Bir denetim görevi sırasında denetim süpervizörü, yönetimin geçersiz kılmasından kaynaklanan bir kontrol eksikliğinin önemli risklere maruz bıraktığını tespit etmiştir. Konuyu denetim komitesine raporlamıştır.", "en": "During an engagement, the audit supervisor found that a control deficiency caused by management override created exposure to material risks. He reported the matter to the audit committee.", "cmt_tr": "Nesnellik ilkesi kapsamındaki Standart 1.1, denetçilerin açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları açıklamasını gerektirir. Bu nedenle, denetim süpervizörü nesnellik ilkesine uymuş ve gizlilik ilkesini ihlal etmemiştir. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "Standard 1.1 under the objectivity principle requires auditors to disclose all material facts known to them that, if not disclosed, may distort the reporting of activities under review. Thus, the audit supervisor abided by the objectivity principle and did not violate the confidentiality principle. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}, {"tr": "Kuruluşun ticari sırlarının bir aile üyesine açıklanması. Bilgilerin açıklanması iç denetçiye veya aile üyesine kişisel kazanç sağlamamıştır.", "en": "Disclosure of the organization’s trade secrets to a family member. The disclosure of the information resulted in no personal gain to the internal auditor or the family member.", "cmt_tr": "Kuruluşun ticari sırlarının açıklanması, gizlilik ilkesi kapsamındaki Standart 5.1'i ihlal eder. Bu standart, iç denetçilerin bilgileri herhangi bir kişisel kazanç için veya yasaya aykırı ya da kuruluşun meşru ve etik amaçlarına zarar verecek şekilde kullanmamasını gerektirir. İç denetçiye veya aile üyesine kişisel kazanç sağlanmamış olsa da, iç denetçi yine de gizlilik ilkesini ihlal etmiştir.", "cmt_en": "Disclosure of the organization’s trade secrets violates Standard 5.1 under the confidentiality principle, which states that internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization. Although there was no personal gain for the internal auditor or the family member, the internal auditor still violated the confidentiality principle."}, {"tr": "Yerel bankadaki bir kredi memuru son 2 yılın mali tablolarını talep etmiştir. CFO talebi onaylamıştır.", "en": "A loan officer at the local bank requested financial statements for the past 2 years. The CFO approved the request.", "cmt_tr": "Gizlilik ilkesi, uygun yetki verildiğinde kuruluş bilgilerinin açıklanmasına izin verir ve gizlilik ilkesini ihlal etmez.", "cmt_en": "The principle of confidentiality permits the disclosure of the organization’s information when given the appropriate authority and does not violate the principle of confidentiality."}], "answer": 2}, {"q_tr": "İç denetçilerin görevleri sırasında elde edilen bilgilerin kullanımı ve korunmasında tedbirli olması kavramı, IIA Etik ve Profesyonellik Standartlarının hangi ilkesi kapsamında yer alır?", "q_en": "The concept that internal auditors must be prudent in the use and protection of information acquired in the course of their duties is covered under which principle of The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Açıklama.", "en": "Disclosure.", "cmt_tr": "Açıklama, IIA Standartlarının bir ilkesi değildir.", "cmt_en": "Disclosure is not a principle of The IIA’s Standards."}, {"tr": "Yetkinlik.", "en": "Competency.", "cmt_tr": "Yetkinlik, IIA Standartlarının bir ilkesidir ancak belirtilen kavramı kapsayan ilke değildir. Yetkinlik, uygun düzeyde bilgi ve beceri edinme ve sürdürme taahhüdüdür.", "cmt_en": "Competency is a principle of The IIA’s Standards, but it is not the principle that covers the stated concept. Competency is a commitment to acquiring and maintaining an appropriate level of knowledge and skill."}, {"tr": "Gizlilik.", "en": "Confidentiality.", "cmt_tr": "Gizlilik ilkesi kapsamındaki Standart 5.1 ve 5.2, bilgilerin kullanımını ve korunmasını düzenler.", "cmt_en": "Standards 5.1 and 5.2 under the confidentiality principle govern the use and protection of information."}, {"tr": "Risk tabanlı güvence.", "en": "Risk-based assurance.", "cmt_tr": "Risk tabanlı güvence, IIA Standartlarının bir ilkesi değildir. Standartlardaki ilkeler dürüstlük, nesnellik, gizlilik, mesleki özen ve yetkinliktir.", "cmt_en": "Risk-based assurance is not a principle of The IIA’s Standards. The principles in the Standards are integrity, objectivity, confidentiality, due professional care, and competency."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi IIA Etik ve Profesyonellik Standartlarının gizlilik ilkesini ihlal eder?", "q_en": "Which of the following violates The IIA’s Standards of Ethics and Professionalism principle of confidentiality?", "options": [{"tr": "İç denetçi, üç aylık mali tabloların taslağını gördükten sonra şirket hissesi satın almıştır.", "en": "The internal auditor purchased stock in the company after seeing a draft of the quarterly financial statements.", "cmt_tr": "Gizlilik ilkesi kapsamındaki Standart 5.1, iç denetçilerin bilgileri herhangi bir kişisel kazanç için kullanmamasını gerektirir. Hisse senedi alımı IIA Standartlarının ihlalidir ve içeriden öğrenenlerin ticaretidir. Yasadışı içeriden öğrenenlerin ticareti, henüz kamuya açıklanmamış gizli bilgilere erişerek kişisel kazanç için hisse senedi alım satımı yapmaktır.", "cmt_en": "Standard 5.1 under the confidentiality principle states that internal auditors must not use information for any personal gain. The stock purchase is a violation of The IIA’s Standards and is insider trading. Illegal insider trading is the trading of stock for personal gain by having access to confidential information that has not yet been made public."}, {"tr": "Birinci yıl iç denetçi, aynı görevdeki üçüncü yıl iç denetçiden çalışma kağıtları hazırlamada yardım istemiştir.", "en": "A first-year internal auditor sought help preparing workpapers from a third-year internal auditor on the same engagement.", "cmt_tr": "Aynı görevdeki başka bir ekip üyesiyle çalışma kağıtlarını tartışmak gizlilik ilkesinin ihlali değildir.", "cmt_en": "Discussing workpapers with another team member on the same engagement is not a violation of the confidentiality principle."}, {"tr": "Şirketin iç denetim tüzüğü, \"Bağımsızlık fiilen veya görünüşte bozulmuşsa, bozulmanın ayrıntıları uygun taraflara açıklanmalıdır\" ifadesini içermektedir. Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "en": "The company’s internal audit charter states, “If independence is impaired in fact or appearance, the details of the impairment must be disclosed to appropriate parties.” Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_tr": "İç denetim tüzüğü resmi bir belgedir. Bağımsızlık bozulmuşsa, bu nesnellik ilkesinin ihlalidir.", "cmt_en": "The internal audit charter is a formal document. If independence is impaired, it is a violation of the principle of objectivity."}, {"tr": "İDY, satış personelinin seyahat masraflarını şişirdiğini duyarak sunulan seyahat gider raporları hakkında soruşturma başlatmıştır.", "en": "The CAE began an investigation on submitted travel expense reports after hearing sales personnel were inflating their travel expenses.", "cmt_tr": "Olası hileyi soruşturmak, iç denetim tüzüğünün sorumlulukları kapsamındadır. Gizlilik ilkesinin ihlali değildir.", "cmt_en": "Investigating potential fraud is within the scope of the responsibilities of the internal audit charter. It is not a violation of the principle of confidentiality."}], "answer": 0}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarındaki gizlilik ilkesi aşağıdakilerden hangisiyle ihlal edilir?", "q_en": "The confidentiality principle in The IIA’s Standards of Ethics and Professionalism is violated by", "options": [{"tr": "Mesleki yargıyı bozabilecek herhangi bir şeyin kabulü.", "en": "Accepting anything that may impair professional judgment.", "cmt_tr": "İç denetçiler, mesleki yargılarını bozabilecek veya bozduğu varsayılabilecek hiçbir şeyi kabul etmemelidir (Standart 5.1).", "cmt_en": "Internal auditors must not accept anything that may impair or be presumed to impair their professional judgment (Standard 5.1)."}, {"tr": "İşin özenle yerine getirilmemesi.", "en": "Failing to perform work diligently.", "cmt_tr": "İç denetçiler, işlerini dürüstlük, özen ve sorumlulukla yerine getirmelidir (Standart 4.2).", "cmt_en": "Internal auditors must perform their work with honesty, diligence, and responsibility (Standard 4.2)."}, {"tr": "Denetçinin deneyiminin olmadığı alanlarda iş yapması.", "en": "Performing work for which an auditor lacks experience.", "cmt_tr": "İç denetçiler yalnızca gerekli bilgi, beceri ve deneyime sahip oldukları hizmetlerde bulunmalıdır (Standart 3.1).", "cmt_en": "Internal auditors must engage only in those services for which they have the necessary knowledge, skills, and experience (Standard 3.1)."}, {"tr": "Kuruluşun tescilli bilgilerinin yasadışı kullanımı.", "en": "Using the organization’s proprietary information illegally.", "cmt_tr": "İç denetçiler, bilgileri herhangi bir kişisel kazanç için veya yasaya aykırı ya da kuruluşun meşru ve etik amaçlarına zarar verecek şekilde kullanmamalıdır. Örneğin, iç denetçiler içeriden mali, stratejik veya operasyonel bilgileri kullanarak kuruluşun hisselerini alıp satarak kişisel mali kazanç elde etmemelidir (Standart 5.1). Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "Internal auditors must not use information for any personal gain or in any manner that would be contrary to the law or detrimental to the legitimate and ethical objectives of the organization. For example, internal auditors should not use insider financial, strategic, or operational knowledge to bring about personal financial gain by purchasing or selling shares in the organization (Standard 5.1). Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}], "answer": 3}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarındaki gizlilik ilkesi aşağıdakilerden hangisiyle ihlal edilir?", "q_en": "The confidentiality principle in The IIA’s Standards of Ethics and Professionalism is violated by", "options": [{"tr": "Kuruluşun çıkarlarıyla çatışan bir faaliyete katılmak.", "en": "Participating in an activity that conflicts with the organization’s interests.", "cmt_tr": "İç denetçiler, tarafsız değerlendirmelerini bozabilecek veya bozduğu varsayılabilecek hiçbir faaliyete veya ilişkiye katılmamalıdır. Bu katılım, kuruluşun çıkarlarıyla çatışabilecek faaliyetleri veya ilişkileri içerir (Nesnellik).", "cmt_en": "Internal auditors must not participate in any activity or relationship that may impair or be presumed to impair their unbiased assessment. This participation includes those activities or relationships that may be in conflict with the interests of the organization (Objectivity)."}, {"tr": "Beceri öz değerlendirmelerinin belgelenmesini sürdürmek.", "en": "Maintaining documentation of skills self-assessments.", "cmt_tr": "İç denetçiler, beceri öz değerlendirmesi, mesleki gelişim planı ve sürekli mesleki eğitim veya gelişim kursları ya da eğitimlerinin tamamlanmasına ilişkin belgeleri sürdürebilir (Yetkinlik).", "cmt_en": "Internal auditors may maintain documentation of a skills self-assessment, a plan for professional development, and the completion of continuing professional education or development courses or trainings (Competency)."}, {"tr": "Görev için gerekli olanın ötesinde kurum içi kullanım için veri toplamak.", "en": "Collecting data for internal use beyond that needed for the engagement.", "cmt_tr": "Tescilli bilgileri korumak için politika ve prosedürler, iç denetçilerin bilgileri kurum içinde ele alırken bile önlem almasını gerektirebilir. Bir örnek, (1) yalnızca atanan görevi yerine getirmek için gereken verileri toplamak ve (2) bu bilgileri yalnızca görevin amaçlanan amaçları doğrultusunda kullanmaktır (Gizlilik).", "cmt_en": "To protect proprietary information, policies and procedures may require internal auditors to take precautions even when handling information internally. An example is (1) collecting only the data required to perform the assigned engagement and (2) using this information only for the engagement’s intended purposes (Confidentiality)."}, {"tr": "Aktif bir kalite güvence programı oluşturmamak.", "en": "Failing to establish an active quality assurance program.", "cmt_tr": "İDY, örneğin kalite güvence ve iyileştirme programının aktif olduğuna dair kanıtlar yoluyla yetkinliği ve yeterliliğin, etkinliğin ve kalitenin sürekli iyileştirilmesini destekleyen bir kültür gösterebilir (Yetkinlik).", "cmt_en": "The CAE may demonstrate a culture supportive of competency and the continual improvement of proficiency, effectiveness, and quality through evidence that, for example, a quality assurance and improvement program is active (Competency)."}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi IIA Etik ve Profesyonellik Standartlarındaki gizlilik ilkesini ihlal eder?", "q_en": "Which of the following violates the confidentiality principle in The IIA’s Standards of Ethics and Professionalism?", "options": [{"tr": "Yalnızca kuruluş tarafından izin verilen açıklamaların yapılması.", "en": "Making only those disclosures permitted by the organization.", "cmt_tr": "İç denetçiler yasaya uymalı ve yasa ve meslek tarafından beklenen açıklamaları yapmalıdır (Standart 1.3).", "cmt_en": "Internal auditors must observe the law and make disclosures expected by the law and the profession (Standard 1.3)."}, {"tr": "Belirlenen kişilerin incelemesi olmadan bilgilerin dışarıya yayınlanması.", "en": "Releasing information externally without review by designated persons.", "cmt_tr": "Yasal ve düzenleyici gerekliliklerin ve korumaların etkilerini daha iyi anlamak için İDY hukuk danışmanına danışmalıdır. Kuruluşun politika ve prosedürleri, iş bilgilerinin dışarıya yayınlanmadan önce belirli yetkililerin incelemesini ve onaylamasını gerektirebilir (Gizlilik). Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "To better understand the effects of legal and regulatory requirements and protections, the chief audit executive (CAE) should consult with legal counsel. The organization’s policies and procedures may require that specific authorities review and approve business information before external release (Confidentiality). Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}, {"tr": "İç denetim planını değil, iç denetim fonksiyonuna kaynak tahsisinin gerekçesini belgelemek.", "en": "Documenting the rationale for allocating resources to the internal audit function but not the internal audit plan.", "cmt_tr": "Nesnellik ilkesine uyum, potansiyel bozulmaların dikkate alınması dahil olmak üzere iç denetim planına kaynak tahsisinin gerekçesinin belgelenmesiyle gösterilir.", "cmt_en": "Conformance with the objectivity principle is demonstrated by the documentation of the rationale for allocating resources to the internal audit plan, including consideration of potential impairments."}, {"tr": "Kalite güvence ve iyileştirme planının değerlendirilmesi.", "en": "Assessing the quality assurance and improvement plan.", "cmt_tr": "İç denetim fonksiyonunun kalite güvence ve iyileştirme programı kapsamında yapılan değerlendirmeler, iç denetim sonuç ve görüşlerine ulaşırken uygun nesnelliğin kullanıldığı iddiasını destekler.", "cmt_en": "Assessments as part of the internal audit function’s quality assurance and improvement program support the assertion that appropriate objectivity was used in arriving at internal audit conclusions and opinions."}], "answer": 1}, {"q_tr": "IIA Etik ve Profesyonellik Standartlarındaki gizlilik ilkesine uymak için iç denetçiler şunları yapmalıdır:", "q_en": "To comply with the confidentiality principle in The IIA’s Standards of Ethics and Professionalism, internal auditors should", "options": [{"tr": "Veri şifreleme kullanmak ve e-posta dağıtımını kısıtlamak.", "en": "Use data encryption and restrict email distribution.", "cmt_tr": "Bilgi güvenliği politikaları, iç denetçilerin bilgileri kasıtlı veya kasıtsız açıklamadan korumak için veri şifreleme, e-posta dağıtım kısıtlamaları ve bilgiye fiziksel erişimin kısıtlanması gibi kontroller kullanmasını gerektirebilir (Gizlilik).", "cmt_en": "Information security policies may require internal auditors to protect information from intentional or unintentional disclosure through the use of controls such as data encryption, email distribution restrictions, and restriction of physical access to the information (Confidentiality)."}, {"tr": "Diğer denetçilerin yanlış rapor yayınlamasına izin vermemek.", "en": "Not permit other auditors to issue false reports.", "cmt_tr": "Dürüstlük ilkesi kapsamında saygınlığı zedeleyici eylemler arasında yanlış rapor yayınlamak veya başkalarının bunu yapmasına izin vermek yer alır.", "cmt_en": "Acts discreditable under the integrity principle include issuing false reports or allowing others to do so."}, {"tr": "İç denetim paydaşlarından geri bildirim almak.", "en": "Solicit feedback from internal audit stakeholders.", "cmt_tr": "İDY, diğer hususların yanı sıra yeterince dikkate alınan geri bildirimleri talep ederek yetkinliği destekleyen bir kültür gösterir.", "cmt_en": "The CAE demonstrates a culture supportive of competency by, among other things, soliciting feedback that is sufficiently considered."}, {"tr": "Gözlemleri denetim raporlarından çıkarmak.", "en": "Omit observations from engagement reports.", "cmt_tr": "Saygınlığı zedeleyici eylemler arasında gözlemleri veya tatmin edici olmayan sonuçları ve derecelendirmeleri denetim raporlarından veya genel değerlendirmelerden küçümsemek, gizlemek veya çıkarmak yer alabilir (Dürüstlük).", "cmt_en": "Acts discreditable may include minimizing, concealing, or omitting observations or unsatisfactory conclusions and ratings from engagement reports or overall assessments (Integrity)."}], "answer": 0}, {"q_tr": "İç denetçiler, gizlilik ilkesine uyumu özellikle aşağıdakilerden hangisiyle gösterir?", "q_en": "Internal auditors specifically demonstrate conformance with the confidentiality principle by", "options": [{"tr": "Yeni sertifikalar ve sürekli mesleki eğitim elde etmek.", "en": "Obtaining new certifications and continuing professional education.", "cmt_tr": "Yeni sertifikalar veya sürekli mesleki eğitim olsun, mesleki eğitimin sürdürülmesi ve tamamlanması, yeterliliği sürekli iyileştirme taahhüdünün kanıtıdır (Yetkinlik). Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality", "cmt_en": "Pursuing and completing professional education, whether new certifications or continuing professional education, evidences commitment to continually improving proficiency (Competency). Study Unit 5: Ethics and Professionalism | Subunit 5: Confidentiality"}, {"tr": "Raporlamanın bozulmasını önlemek için tüm önemli olguları açıklamak.", "en": "Disclosing all material facts to avoid distortion of reporting.", "cmt_tr": "İç denetçiler, açıklanmaması halinde incelenen faaliyetlerin raporlanmasını bozabilecek tüm önemli olguları açıklamalıdır (Nesnellik).", "cmt_en": "Internal auditors must disclose all material facts known to them that, if not disclosed, may distort the reporting activities under review (Objectivity)."}, {"tr": "Denetim kayıtlarındaki dağıtım kısıtlamalarını belgelemek.", "en": "Documenting distribution restrictions on engagement records.", "cmt_tr": "İç denetçiler, çalışma kağıtlarında ve raporlarda dağıtım kısıtlamalarını belgeleyerek ve tüm açıklamaların yetkilerini ve onaylı dağıtım listelerini saklayarak denetim kayıtlarının gizliliğine uyumu gösterir (Gizlilik).", "cmt_en": "Internal auditors conform with engagement record confidentiality by documenting distribution restrictions in workpapers and reports and by retaining authorizations of all disclosures and approved distribution lists (Confidentiality)."}, {"tr": "İç denetim incelemelerini Standartlara uygun olarak yerine getirmek.", "en": "Performing internal audit reviews in accordance with the Standards.", "cmt_tr": "İç denetçiler, iç denetim hizmetlerini Küresel İç Denetim Standartlarına uygun olarak yerine getirmelidir (Yetkinlik).", "cmt_en": "Internal auditors must perform internal audit services in accordance with the Global Internal Audit Standards (Competency)."}], "answer": 2}]};
const SHEETS = ["SU1 - Integrity", "SU2 - Objectivity", "SU3 - Competency", "SU4 - Due Professional Care", "SU5 - Confidentiality"];
const SHORT_NAMES = {"SU1 - Integrity": "SU1", "SU2 - Objectivity": "SU2", "SU3 - Competency": "SU3", "SU4 - Due Professional Care": "SU4", "SU5 - Confidentiality": "SU5"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit5";
const HISTORY_KEY = LS_KEY + "_history";
const MAX_HISTORY = 5;

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  // Skip chapters with 0 questions (can happen in mistakes modes)
  while (ci < SHEETS.length && QUIZ[SHEETS[ci]].length === 0) { ci++; }
  if (ci >= SHEETS.length) { showOverall(); return; }
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  if (!qs || qs.length === 0 || curQ >= qs.length) { showChapterSummary(); return; }
  const q    = qs[curQ];
  if (!q) { showChapterSummary(); return; }
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "Türkçe metin / English text" formatını ayır
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}
