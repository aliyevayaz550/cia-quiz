, ESPs may more easily accommodate engagement requirements in distant locations.", "cmt_en": "The chief audit executive must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). For example, ESPs may more easily accommodate engagement requirements in distant locations."}, {"tr": "Recruited from another internal audit function.", "en": "Recruited from another internal audit function.", "cmt_tr": "Qualified ESPs may be recruited from many sources, other than other internal audit functions, such as the external audit firm, an external consulting firm, or a university.", "cmt_en": "Qualified ESPs may be recruited from many sources, other than other internal audit functions, such as the external audit firm, an external consulting firm, or a university."}, {"tr": "Previously employed by the internal audit function.", "en": "Previously employed by the internal audit function.", "cmt_tr": "Recruitment may be from many sources. Moreover, former employees may be unsuitable or unavailable.", "cmt_en": "Recruitment may be from many sources. Moreover, former employees may be unsuitable or unavailable."}], "answer": 1}, {"q_tr": "When the internal audit function outsources some of its functions to an external service provider (ESP),", "q_en": "When the internal audit function outsources some of its functions to an external service provider (ESP),", "options": [{"tr": "Oversight of the internal audit function may be outsourced.", "en": "Oversight of the internal audit function may be outsourced.", "cmt_tr": "An organization may outsource none, all, or some of the functions of the internal audit function. However, oversight of and responsibility for the internal audit function must not be outsourced.", "cmt_en": "An organization may outsource none, all, or some of the functions of the internal audit function. However, oversight of and responsibility for the internal audit function must not be outsourced."}, {"tr": "An ESP associated with the client is appropriate if the relevant guidance is followed.", "en": "An ESP associated with the client is appropriate if the relevant guidance is followed.", "cmt_tr": "An ESP associated with the engagement client is unacceptable because the person would not be independent or objective.", "cmt_en": "An ESP associated with the engagement client is unacceptable because the person would not be independent or objective."}, {"tr": "Responsibility for the internal audit function may be outsourced.", "en": "Responsibility for the internal audit function may be outsourced.", "cmt_tr": "Organizational responsibilities for the internal audit function are unchanged by outsourcing some or all of its functions.", "cmt_en": "Organizational responsibilities for the internal audit function are unchanged by outsourcing some or all of its functions."}, {"tr": "The IIA’s Standards must be followed by the ESP.", "en": "The IIA’s Standards must be followed by the ESP.", "cmt_tr": "Regardless of the degree of outsourcing, services still must be performed in accordance with the Standards, and the guidance for obtaining external service providers should be followed.", "cmt_en": "Regardless of the degree of outsourcing, services still must be performed in accordance with the Standards, and the guidance for obtaining external service providers should be followed."}], "answer": 3}, {"q_tr": "A small internal audit function is performing an assurance engagement but lacks the expertise to evaluate certain accounting estimates. Thus, the chief audit executive (CAE) must obtain the necessary knowledge, skills, and other competencies from an external service provider (ESP). The fundamental reason for this decision most likely is that", "q_en": "A small internal audit function is performing an assurance engagement but lacks the expertise to evaluate certain accounting estimates. Thus, the chief audit executive (CAE) must obtain the necessary knowledge, skills, and other competencies from an external service provider (ESP). The fundamental reason for this decision most likely is that", "options": [{"tr": "Each member of the internal audit function is not required to be qualified in all disciplines.", "en": "Each member of the internal audit function is not required to be qualified in all disciplines.", "cmt_tr": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). Each member of the internal audit function need not be qualified in all disciplines. When necessary, the CAE can obtain necessary knowledge, skills, and competencies from external service providers.", "cmt_en": "The CAE must obtain competent advice and assistance if the internal auditors lack the knowledge, skills, or other competencies needed to perform all or part of the engagement (Standard 3.1). Each member of the internal audit function need not be qualified in all disciplines. When necessary, the CAE can obtain necessary knowledge, skills, and competencies from external service providers."}, {"tr": "The quality assurance and improvement program (QAIP) failed to report the internal audit function’s lack of expertise.", "en": "The quality assurance and improvement program (QAIP) failed to report the internal audit function’s lack of expertise.", "cmt_tr": "A QAIP should be maintained (possibly by the ESP) even if the internal audit function is outsourced. However, the need for outsourcing by a small internal audit function is most likely not because of a failure by the QAIP.", "cmt_en": "A QAIP should be maintained (possibly by the ESP) even if the internal audit function is outsourced. However, the need for outsourcing by a small internal audit function is most likely not because of a failure by the QAIP."}, {"tr": "The ESP was needed to assume the role of CAE.", "en": "The ESP was needed to assume the role of CAE.", "cmt_tr": "The ESP was hired only for expertise regarding accounting estimates.", "cmt_en": "The ESP was hired only for expertise regarding accounting estimates."}, {"tr": "The CAE did not hire sufficiently qualified staff. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "en": "The CAE did not hire sufficiently qualified staff. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_tr": "The CAE’s obligation is only to obtain the necessary knowledge, skills, and other competencies.", "cmt_en": "The CAE’s obligation is only to obtain the necessary knowledge, skills, and other competencies."}], "answer": 0}, {"q_tr": "Which of the following statements with regard to continuing professional development of internal auditors is false?", "q_en": "Which of the following statements with regard to continuing professional development of internal auditors is false?", "options": [{"tr": "Practicing and nonpracticing CIAs must complete 40 hours of continuing professional education (CPE) annually, including at least 2 hours of ethics training.", "en": "Practicing and nonpracticing CIAs must complete 40 hours of continuing professional education (CPE) annually, including at least 2 hours of ethics training.", "cmt_tr": "CIAs demonstrate their continuing professional development by completing continuing professional education (CPE). Practicing and nonpracticing CIAs must complete 40 hours and 20 hours, respectively, of CPE annually, including at least 2 hours of ethics training.", "cmt_en": "CIAs demonstrate their continuing professional development by completing continuing professional education (CPE). Practicing and nonpracticing CIAs must complete 40 hours and 20 hours, respectively, of CPE annually, including at least 2 hours of ethics training."}, {"tr": "Internal auditors are required to continue expanding their knowledge and abilities throughout their careers.", "en": "Internal auditors are required to continue expanding their knowledge and abilities throughout their careers.", "cmt_tr": "Internal auditors must enhance their knowledge, skills, and other competencies through continuing professional development (Standard 3.2).", "cmt_en": "Internal auditors must enhance their knowledge, skills, and other competencies through continuing professional development (Standard 3.2)."}, {"tr": "Participating in conferences, seminars, training programs, online and classroom courses, and webinars contribute to continuing professional development.", "en": "Participating in conferences, seminars, training programs, online and classroom courses, and webinars contribute to continuing professional development.", "cmt_tr": "Opportunities for professional development include participating in conferences, seminars, training programs, online courses and webinars, self-study programs, or classroom courses; conducting research projects; volunteering with professional organizations; and pursuing professional certifications.", "cmt_en": "Opportunities for professional development include participating in conferences, seminars, training programs, online courses and webinars, self-study programs, or classroom courses; conducting research projects; volunteering with professional organizations; and pursuing professional certifications."}, {"tr": "CIAs may earn CPE hours by translating, authoring, or contributing to publications.", "en": "CIAs may earn CPE hours by translating, authoring, or contributing to publications.", "cmt_tr": "Qualifying CPE activities are those that contribute to internal audit competencies. They include educational programs, passing examinations, translating publications, authoring or contributing Study Unit 5: Ethics and Professionalism | Subunit 3: Competency to publications, delivering oral presentations, participating as a subject matter expert volunteer, and performing external quality assessment.", "cmt_en": "Qualifying CPE activities are those that contribute to internal audit competencies. They include educational programs, passing examinations, translating publications, authoring or contributing Study Unit 5: Ethics and Professionalism | Subunit 3: Competency to publications, delivering oral presentations, participating as a subject matter expert volunteer, and performing external quality assessment."}], "answer": 0}, {"q_tr": "According to The IIA, continuing professional development (CPD) activities for CIAs may include", "q_en": "According to The IIA, continuing professional development (CPD) activities for CIAs may include", "options": [{"tr": "Completion of at least 40 hours of continuing professional education (CPE) annually by nonpractitioners.", "en": "Completion of at least 40 hours of continuing professional education (CPE) annually by nonpractitioners.", "cmt_tr": "CIAs demonstrate their CPD by completing CPE hours. Practicing and nonpracticing CIAs must complete 40 hours and 20 hours, respectively, of CPE annually, including at least 2 hours of ethics training.", "cmt_en": "CIAs demonstrate their CPD by completing CPE hours. Practicing and nonpracticing CIAs must complete 40 hours and 20 hours, respectively, of CPE annually, including at least 2 hours of ethics training."}, {"tr": "Up to 8 hours of ethics training of which 4 hours are mandatory for nonpracticing CIAs.", "en": "Up to 8 hours of ethics training of which 4 hours are mandatory for nonpracticing CIAs.", "cmt_tr": "Practicing and nonpracticing CIAs must complete at least 2 hours of ethics training.", "cmt_en": "Practicing and nonpracticing CIAs must complete at least 2 hours of ethics training."}, {"tr": "Participating in conferences, online and classroom courses, and webinars.", "en": "Participating in conferences, online and classroom courses, and webinars.", "cmt_tr": "Opportunities for CPD include (1) participating in conferences, seminars, training programs, online courses and webinars, self-study programs, or classroom courses; (2) conducting research projects; (3) volunteering with professional organizations; and (4) pursuing professional certifications.", "cmt_en": "Opportunities for CPD include (1) participating in conferences, seminars, training programs, online courses and webinars, self-study programs, or classroom courses; (2) conducting research projects; (3) volunteering with professional organizations; and (4) pursuing professional certifications."}, {"tr": "Earning an advanced degree in any field.", "en": "Earning an advanced degree in any field.", "cmt_tr": "Qualifying CPE activities are those that contribute to internal audit competencies. They include educational programs, passing examinations, translating publications, authoring or contributing to publications, delivering oral presentations, participating as a subject matter expert volunteer, and performing external quality assessment.", "cmt_en": "Qualifying CPE activities are those that contribute to internal audit competencies. They include educational programs, passing examinations, translating publications, authoring or contributing to publications, delivering oral presentations, participating as a subject matter expert volunteer, and performing external quality assessment."}], "answer": 2}, {"q_tr": "A new staff internal auditor was told to perform an engagement in an area with which the internal auditor was not familiar. Because of time constraints, no supervision was provided. The assignment represented a good learning experience, but the area was clearly beyond the internal auditor’s competence. Nonetheless, the internal auditor prepared comprehensive workpapers and communicated the results to management. In this situation,", "q_en": "A new staff internal auditor was told to perform an engagement in an area with which the internal auditor was not familiar. Because of time constraints, no supervision was provided. The assignment represented a good learning experience, but the area was clearly beyond the internal auditor’s competence. Nonetheless, the internal auditor prepared comprehensive workpapers and communicated the results to management. In this situation,", "options": [{"tr": "The internal audit function violated the Standards by hiring an internal auditor without proficiency in the area.", "en": "The internal audit function violated the Standards by hiring an internal auditor without proficiency in the area.", "cmt_tr": "All internal auditors need not be proficient in all areas. The internal audit function as a whole should have an appropriate mix of skills. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency", "cmt_en": "All internal auditors need not be proficient in all areas. The internal audit function as a whole should have an appropriate mix of skills. Study Unit 5: Ethics and Professionalism | Subunit 3: Competency"}, {"tr": "The internal audit function violated the Standards by not providing adequate supervision.", "en": "The internal audit function violated the Standards by not providing adequate supervision.", "cmt_tr": "The competency principle requires internal auditing services to be performed with proficiency and due professional care. They also should be properly supervised to ensure that objectives are achieved, quality is assured, and staff is developed.", "cmt_en": "The competency principle requires internal auditing services to be performed with proficiency and due professional care. They also should be properly supervised to ensure that objectives are achieved, quality is assured, and staff is developed."}, {"tr": "The chief audit executive has not violated The IIA’s Standards because it does not address supervision.", "en": "The chief audit executive has not violated The IIA’s Standards because it does not address supervision.", "cmt_tr": "The Standards require proper supervision.", "cmt_en": "The Standards require proper supervision."}, {"tr": "The Standards were followed by the internal audit function.ng external quality assessment.", "en": "The Standards were followed by the internal audit function.ng external quality assessment.", "cmt_tr": "The Standards were not followed.", "cmt_en": "The Standards were not followed."}], "answer": 1}], "SU4 - Due Professional Care": [{"q_tr": "The IIA’s Standards of Ethics and Professionalism have five principles. Which principle addresses performance of work with diligence?", "q_en": "The IIA’s Standards of Ethics and Professionalism have five principles. Which principle addresses performance of work with diligence?", "options": [{"tr": "Competency.", "en": "Competency.", "cmt_tr": "The competency principle requires internal auditors to have the necessary knowledge, skills, and experience to perform services.", "cmt_en": "The competency principle requires internal auditors to have the necessary knowledge, skills, and experience to perform services."}, {"tr": "Objectivity.", "en": "Objectivity.", "cmt_tr": "The objectivity principle requires auditors to make balanced assessments and not be unduly influenced by their own interests or by others.", "cmt_en": "The objectivity principle requires auditors to make balanced assessments and not be unduly influenced by their own interests or by others."}, {"tr": "Due professional care.", "en": "Due professional care.", "cmt_tr": "The due professional care principle states, “Due professional care requires planning and performing internal audit services with the diligence, judgment, and skepticism possessed by prudent and competent internal auditors.”", "cmt_en": "The due professional care principle states, “Due professional care requires planning and performing internal audit services with the diligence, judgment, and skepticism possessed by prudent and competent internal auditors.”"}, {"tr": "Confidentiality.", "en": "Confidentiality.", "cmt_tr": "The confidentiality principle states that internal auditors do not disclose information without appropriate authority.", "cmt_en": "The confidentiality principle states that internal auditors do not disclose information without appropriate authority."}], "answer": 2}, {"q_tr": "A certified internal auditor performed an assurance engagement to review a department store’s cash function. Which of the following actions will be deemed lacking in due professional care?", "q_en": "A certified internal auditor performed an assurance engagement to review a department store’s cash function. Which of the following actions will be deemed lacking in due professional care?", "options": [{"tr": "Organizational records were reviewed to determine whether all employees who handle cash receipts and disbursements were bonded.", "en": "Organizational records were reviewed to determine whether all employees who handle cash receipts and disbursements were bonded.", "cmt_tr": "Reviewing records to determine whether all employees who handle cash receipts and disbursements were bonded is a standard procedure.", "cmt_en": "Reviewing records to determine whether all employees who handle cash receipts and disbursements were bonded is a standard procedure."}, {"tr": "A flowchart of the entire cash function was developed, but only a sample of transactions was tested.", "en": "A flowchart of the entire cash function was developed, but only a sample of transactions was tested.", "cmt_tr": "Sampling is permissible. Detailed reviews of all transactions are often not required or feasible.", "cmt_en": "Sampling is permissible. Detailed reviews of all transactions are often not required or feasible."}, {"tr": "The final engagement communication included a well-supported recommendation for the reduction in staff, although it was known that such a reduction would adversely affect morale.", "en": "The final engagement communication included a well-supported recommendation for the reduction in staff, although it was known that such a reduction would adversely affect morale.", "cmt_tr": "In exercising due professional care, internal auditors should be alert to inefficiency.", "cmt_en": "In exercising due professional care, internal auditors should be alert to inefficiency."}, {"tr": "Because of a highly developed system of internal control over the cash function, the final engagement communication assured senior management that no irregularities existed.", "en": "Because of a highly developed system of internal control over the cash function, the final engagement communication assured senior management that no irregularities existed.", "cmt_tr": "Internal auditors cannot give absolute assurance that noncompliance or irregularities do not exist. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "Internal auditors cannot give absolute assurance that noncompliance or irregularities do not exist. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 3}, {"q_tr": "Internal auditors must apply the care and skill of a reasonably prudent and competent internal auditor. For example, in an assurance engagement, an internal auditor must", "q_en": "Internal auditors must apply the care and skill of a reasonably prudent and competent internal auditor. For example, in an assurance engagement, an internal auditor must", "options": [{"tr": "Perform assurance procedures that identify all significant risks.", "en": "Perform assurance procedures that identify all significant risks.", "cmt_tr": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.2).", "cmt_en": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.2)."}, {"tr": "Consider the use of technology-based analysis.", "en": "Consider the use of technology-based analysis.", "cmt_tr": "Internal auditors must apply the care and skill expected of a reasonably prudent and competent internal auditor. Due professional care does not imply infallibility (Standard 4.2). In exercising due professional care, internal auditors must consider the use of technology-based audit and other data analysis methods (Standard 4.2).", "cmt_en": "Internal auditors must apply the care and skill expected of a reasonably prudent and competent internal auditor. Due professional care does not imply infallibility (Standard 4.2). In exercising due professional care, internal auditors must consider the use of technology-based audit and other data analysis methods (Standard 4.2)."}, {"tr": "Not consider cost when exercising due professional care.", "en": "Not consider cost when exercising due professional care.", "cmt_tr": "Internal auditors must exercise due professional care by considering, among other things, the cost of assurance in relation to potential benefits.", "cmt_en": "Internal auditors must exercise due professional care by considering, among other things, the cost of assurance in relation to potential benefits."}, {"tr": "Communicate advice in accordance with the expectations of clients.", "en": "Communicate advice in accordance with the expectations of clients.", "cmt_tr": "An assurance service is an objective examination of evidence to provide an independent assessment resulting in an opinion or conclusion. Its nature and scope are determined by the internal auditor. A consulting service results in advice requested by the client. An assurance service involves three parties: (1) the auditor, (2) the process owner, and (3) the user (person or group) using the assessment.", "cmt_en": "An assurance service is an objective examination of evidence to provide an independent assessment resulting in an opinion or conclusion. Its nature and scope are determined by the internal auditor. A consulting service results in advice requested by the client. An assurance service involves three parties: (1) the auditor, (2) the process owner, and (3) the user (person or group) using the assessment."}], "answer": 1}, {"q_tr": "Due professional care calls for", "q_en": "Due professional care calls for", "options": [{"tr": "Detailed reviews of all transactions related to a particular function.", "en": "Detailed reviews of all transactions related to a particular function.", "cmt_tr": "Detailed reviews of all transactions are not required.", "cmt_en": "Detailed reviews of all transactions are not required."}, {"tr": "Infallibility and extraordinary performance when the system of internal control is known to be weak.", "en": "Infallibility and extraordinary performance when the system of internal control is known to be weak.", "cmt_tr": "Reasonable care and skill, not infallibility or extraordinary performance, are necessary.", "cmt_en": "Reasonable care and skill, not infallibility or extraordinary performance, are necessary."}, {"tr": "Consideration of the possibility of material irregularities during every engagement.", "en": "Consideration of the possibility of material irregularities during every engagement.", "cmt_tr": "Due care implies reasonable prudence and competence, not infallibility. It requires the internal auditor to conduct examinations and verifications to a reasonable extent, but does not require detailed reviews of all transactions. Accordingly, internal auditors cannot give absolute assurance that noncompliance or irregularities do not exist. Nevertheless, the possibility of Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care material irregularities or noncompliance should be considered whenever an internal auditor undertakes an internal auditing assignment.", "cmt_en": "Due care implies reasonable prudence and competence, not infallibility. It requires the internal auditor to conduct examinations and verifications to a reasonable extent, but does not require detailed reviews of all transactions. Accordingly, internal auditors cannot give absolute assurance that noncompliance or irregularities do not exist. Nevertheless, the possibility of Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care material irregularities or noncompliance should be considered whenever an internal auditor undertakes an internal auditing assignment."}, {"tr": "Testing in sufficient detail to give absolute assurance that noncompliance does not exist.", "en": "Testing in sufficient detail to give absolute assurance that noncompliance does not exist.", "cmt_tr": "Only reasonable, not absolute, assurance can be given.", "cmt_en": "Only reasonable, not absolute, assurance can be given."}], "answer": 2}, {"q_tr": "Effective management of internal auditor objectivity most likely results from", "q_en": "Effective management of internal auditor objectivity most likely results from", "options": [{"tr": "Internal auditor self-assessments.", "en": "Internal auditor self-assessments.", "cmt_tr": "Internal auditor self-assessments may be biased. Thus, the chief audit executive must establish policies and procedures to assess the objectivity of individual internal auditors. These can take the form of periodic reviews of conflicts of interest or as-needed assessments during the staffing requirements phase of each engagement.", "cmt_en": "Internal auditor self-assessments may be biased. Thus, the chief audit executive must establish policies and procedures to assess the objectivity of individual internal auditors. These can take the form of periodic reviews of conflicts of interest or as-needed assessments during the staffing requirements phase of each engagement."}, {"tr": "Determining that an area to be audited is acceptable given past experience.", "en": "Determining that an area to be audited is acceptable given past experience.", "cmt_tr": "Situations that could undermine objectivity include auditing a family member or a close friend or assuming (without evidence) that an area under audit is acceptable based solely on prior experience.", "cmt_en": "Situations that could undermine objectivity include auditing a family member or a close friend or assuming (without evidence) that an area under audit is acceptable based solely on prior experience."}, {"tr": "Assignments based on familiarity with areas where auditors previously worked.", "en": "Assignments based on familiarity with areas where auditors previously worked.", "cmt_tr": "When assigning internal auditors to specific engagements, the chief audit executive should consider potential objectivity impairments and avoid assigning team members who may have a conflict, e.g., because of prior employment.", "cmt_en": "When assigning internal auditors to specific engagements, the chief audit executive should consider potential objectivity impairments and avoid assigning team members who may have a conflict, e.g., because of prior employment."}, {"tr": "Training that reinforces professional skepticism.", "en": "Training that reinforces professional skepticism.", "cmt_tr": "Many chief audit executives hold routine workshops or training on fundamental concepts of objectivity. For example, senior auditors and managers may share personal experiences regarding threats to objectivity or self-disclose a relationship or experience that was a conflict. Another common related training topic is professional skepticism. Such training reinforces the nature of skepticism and the criticality of avoiding bias and maintaining an open and curious mindset.", "cmt_en": "Many chief audit executives hold routine workshops or training on fundamental concepts of objectivity. For example, senior auditors and managers may share personal experiences regarding threats to objectivity or self-disclose a relationship or experience that was a conflict. Another common related training topic is professional skepticism. Such training reinforces the nature of skepticism and the criticality of avoiding bias and maintaining an open and curious mindset."}], "answer": 3}, {"q_tr": "An organization has recently placed a former operating manager in the position of chief audit executive (CAE). The new CAE is not a member of The IIA and is not a CIA. Henceforth, the internal audit function will be run strictly by the CAE’s standards, not The IIA’s. All four staff internal auditors are members of The IIA, but they are not CIAs. According to The IIA’s Standards of Ethics and Professionalism, what is the best course of action for the staff internal auditors?", "q_en": "An organization has recently placed a former operating manager in the position of chief audit executive (CAE). The new CAE is not a member of The IIA and is not a CIA. Henceforth, the internal audit function will be run strictly by the CAE’s standards, not The IIA’s. All four staff internal auditors are members of The IIA, but they are not CIAs. According to The IIA’s Standards of Ethics and Professionalism, what is the best course of action for the staff internal auditors?", "options": [{"tr": "The Standards do not apply because they are not CIAs.", "en": "The Standards do not apply because they are not CIAs.", "cmt_tr": "The IIA’s Standards of Ethics and Professionalism may be enforced against IIA members and recipients of, or candidates for, IIA professional certifications.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism may be enforced against IIA members and recipients of, or candidates for, IIA professional certifications."}, {"tr": "They should comply with the Global Internal Audit Standards. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "They should comply with the Global Internal Audit Standards. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "The due professional care principle states that internal auditors must follow the Standards and the internal audit function’s methodologies when planning and performing internal audit services and communicating results. Because the internal auditors are members of The Institute, The IIA’s Standards are enforceable against them even though they are not CIAs.", "cmt_en": "The due professional care principle states that internal auditors must follow the Standards and the internal audit function’s methodologies when planning and performing internal audit services and communicating results. Because the internal auditors are members of The Institute, The IIA’s Standards are enforceable against them even though they are not CIAs."}, {"tr": "They must respect the legitimate and ethical objectives of the organization and ignore the Standards.", "en": "They must respect the legitimate and ethical objectives of the organization and ignore the Standards.", "cmt_tr": "Internal auditors should respect and contribute to the legitimate and ethical objectives of the organization, but an IIA member, a holder of an IIA professional certification, or a candidate for certification may be liable for disciplinary action for failure to adhere to the Standards.", "cmt_en": "Internal auditors should respect and contribute to the legitimate and ethical objectives of the organization, but an IIA member, a holder of an IIA professional certification, or a candidate for certification may be liable for disciplinary action for failure to adhere to the Standards."}, {"tr": "They must resign their jobs to avoid improper activities.", "en": "They must resign their jobs to avoid improper activities.", "cmt_tr": "The IIA’s Standards of Ethics and Professionalism says nothing about resignation to avoid improper activities.", "cmt_en": "The IIA’s Standards of Ethics and Professionalism says nothing about resignation to avoid improper activities."}], "answer": 1}, {"q_tr": "An internal auditor judged an item to be immaterial when planning an assurance engagement. However, the assurance engagement may still include the item if it is subsequently determined that", "q_en": "An internal auditor judged an item to be immaterial when planning an assurance engagement. However, the assurance engagement may still include the item if it is subsequently determined that", "options": [{"tr": "Sufficient staff is available.", "en": "Sufficient staff is available.", "cmt_tr": "In the absence of other considerations, devoting additional engagement effort to an immaterial item is inefficient.", "cmt_en": "In the absence of other considerations, devoting additional engagement effort to an immaterial item is inefficient."}, {"tr": "Adverse effects related to the item are likely to occur.", "en": "Adverse effects related to the item are likely to occur.", "cmt_tr": "Internal auditors must exercise due professional care by considering the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.2). Materiality judgments are made in the light of all the circumstances and involve qualitative as well as quantitative considerations. Moreover, internal auditors also must consider the interplay of risk with materiality. Consequently, engagement effort may be required for a quantitatively immaterial item if adverse effects are likely to occur, for example, a material contingent liability arising from an illegal payment that is otherwise immaterial.", "cmt_en": "Internal auditors must exercise due professional care by considering the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.2). Materiality judgments are made in the light of all the circumstances and involve qualitative as well as quantitative considerations. Moreover, internal auditors also must consider the interplay of risk with materiality. Consequently, engagement effort may be required for a quantitatively immaterial item if adverse effects are likely to occur, for example, a material contingent liability arising from an illegal payment that is otherwise immaterial."}, {"tr": "Related information is reliable.", "en": "Related information is reliable.", "cmt_tr": "Additional engagement procedures might not be needed if related information is reliable.", "cmt_en": "Additional engagement procedures might not be needed if related information is reliable."}, {"tr": "Miscellaneous income is affected.", "en": "Miscellaneous income is affected.", "cmt_tr": "The item is more likely to be included if it affects recurring income items rather than miscellaneous income. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "The item is more likely to be included if it affects recurring income items rather than miscellaneous income. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 1}, {"q_tr": "Which of the following statements is true with respect to due professional care?", "q_en": "Which of the following statements is true with respect to due professional care?", "options": [{"tr": "An internal auditor should perform detailed tests of all transactions before communicating results.", "en": "An internal auditor should perform detailed tests of all transactions before communicating results.", "cmt_tr": "An internal auditor must conduct reasonable examinations and verifications, but detailed tests of all transactions are not required.", "cmt_en": "An internal auditor must conduct reasonable examinations and verifications, but detailed tests of all transactions are not required."}, {"tr": "An item should not be mentioned in an engagement communication unless the internal auditor is absolutely certain of the item.", "en": "An item should not be mentioned in an engagement communication unless the internal auditor is absolutely certain of the item.", "cmt_tr": "Absolute assurance need not, and cannot, be given.", "cmt_en": "Absolute assurance need not, and cannot, be given."}, {"tr": "An engagement communication should never be viewed as providing an infallible truth about a subject.", "en": "An engagement communication should never be viewed as providing an infallible truth about a subject.", "cmt_tr": "Due professional care implies reasonable prudence and competence, not infallibility. Thus, internal auditors are not expected to give absolute assurance that noncompliance and irregularities do not exist.", "cmt_en": "Due professional care implies reasonable prudence and competence, not infallibility. Thus, internal auditors are not expected to give absolute assurance that noncompliance and irregularities do not exist."}, {"tr": "An internal auditor has no responsibility to recommend improvements.", "en": "An internal auditor has no responsibility to recommend improvements.", "cmt_tr": "An internal auditor must recommend improvements to promote conformance with acceptable procedures and practices.", "cmt_en": "An internal auditor must recommend improvements to promote conformance with acceptable procedures and practices."}], "answer": 2}, {"q_tr": "Due professional care implies reasonable care and competence, not infallibility or extraordinary performance. Thus, which of the following is unnecessary?", "q_en": "Due professional care implies reasonable care and competence, not infallibility or extraordinary performance. Thus, which of the following is unnecessary?", "options": [{"tr": "The conduct of examinations and verifications to a reasonable extent.", "en": "The conduct of examinations and verifications to a reasonable extent.", "cmt_tr": "Examination and verification need only be undertaken to a reasonable extent.", "cmt_en": "Examination and verification need only be undertaken to a reasonable extent."}, {"tr": "The conduct of extensive examinations.", "en": "The conduct of extensive examinations.", "cmt_tr": "Due professional care implies reasonable prudence and competence, not infallibility. Internal auditors must consider the probability of significant errors, fraud, or noncompliance. They are expected to conduct examinations and verifications to the same extent as a reasonably prudent and competent auditor in similar circumstances. Such engagements may not entail extensive examination.", "cmt_en": "Due professional care implies reasonable prudence and competence, not infallibility. Internal auditors must consider the probability of significant errors, fraud, or noncompliance. They are expected to conduct examinations and verifications to the same extent as a reasonably prudent and competent auditor in similar circumstances. Such engagements may not entail extensive examination."}, {"tr": "The reasonable assurance that compliance does exist.", "en": "The reasonable assurance that compliance does exist.", "cmt_tr": "Providing reasonable assurance is consistent with exercising reasonable care.", "cmt_en": "Providing reasonable assurance is consistent with exercising reasonable care."}, {"tr": "The consideration of the possibility of material irregularities.", "en": "The consideration of the possibility of material irregularities.", "cmt_tr": "The possibility of material irregularities must be considered. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_en": "The possibility of material irregularities must be considered. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care"}], "answer": 1}, {"q_tr": "Assurance engagements must be performed with proficiency and due professional care. Accordingly, the Standards require internal auditors to 1. Consider the probability of significant noncompliance 2. Perform assurance procedures with due professional care so that all significant risks are identified 3. Weigh the cost of assurance against the benefits", "q_en": "Assurance engagements must be performed with proficiency and due professional care. Accordingly, the Standards require internal auditors to 1. Consider the probability of significant noncompliance 2. Perform assurance procedures with due professional care so that all significant risks are identified 3. Weigh the cost of assurance against the benefits", "options": [{"tr": "1 and 2 only.", "en": "1 and 2 only.", "cmt_tr": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified. Moreover, internal auditors must weigh the cost of assurance against the benefits.", "cmt_en": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified. Moreover, internal auditors must weigh the cost of assurance against the benefits."}, {"tr": "1 and 3 only.", "en": "1 and 3 only.", "cmt_tr": "Internal auditors must exercise due professional care by considering the • Extent of work needed to achieve the engagement’s objectives • Relative complexity, materiality, or significance of matters to which assurance procedures are applied • Adequacy and effectiveness of governance, risk management, and control processes • Probability of significant errors, fraud, or noncompliance • Cost of assurance in relation to potential benefits (Standard 4.2) Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.3).", "cmt_en": "Internal auditors must exercise due professional care by considering the • Extent of work needed to achieve the engagement’s objectives • Relative complexity, materiality, or significance of matters to which assurance procedures are applied • Adequacy and effectiveness of governance, risk management, and control processes • Probability of significant errors, fraud, or noncompliance • Cost of assurance in relation to potential benefits (Standard 4.2) Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified (Standard 4.3)."}, {"tr": "2 and 3 only.", "en": "2 and 3 only.", "cmt_tr": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified. Furthermore, internal auditors must consider the probability of significant noncompliance.", "cmt_en": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified. Furthermore, internal auditors must consider the probability of significant noncompliance."}, {"tr": "1, 2, and 3.", "en": "1, 2, and 3.", "cmt_tr": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified.", "cmt_en": "Assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified."}], "answer": 1}, {"q_tr": "In an assurance engagement of treasury operations, an internal auditor is required to consider all of the following issues except", "q_en": "In an assurance engagement of treasury operations, an internal auditor is required to consider all of the following issues except", "options": [{"tr": "The audit committee has requested assurance on the treasury department’s compliance with a new policy on use of financial instruments. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "en": "The audit committee has requested assurance on the treasury department’s compliance with a new policy on use of financial instruments. Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care", "cmt_tr": "The auditor should consider the extent of work needed to achieve the engagement’s objectives (Standard 4.2). Assurance on compliance with a new policy is a specific engagement objective.", "cmt_en": "The auditor should consider the extent of work needed to achieve the engagement’s objectives (Standard 4.2). Assurance on compliance with a new policy is a specific engagement objective."}, {"tr": "Treasury management has not instituted any risk management policies.", "en": "Treasury management has not instituted any risk management policies.", "cmt_tr": "The auditor should consider the adequacy and effectiveness of risk management, control, and governance processes (Standard 4.2).", "cmt_en": "The auditor should consider the adequacy and effectiveness of risk management, control, and governance processes (Standard 4.2)."}, {"tr": "Due to the recent sale of a division, the amount of cash and marketable securities managed by the treasury department has increased by 350%.", "en": "Due to the recent sale of a division, the amount of cash and marketable securities managed by the treasury department has increased by 350%.", "cmt_tr": "The auditor should consider the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.3). The increase in the amount of cash and marketable securities the treasury department manages is significant.", "cmt_en": "The auditor should consider the relative complexity, materiality, or significance of matters to which assurance procedures are applied (Standard 4.3). The increase in the amount of cash and marketable securities the treasury department manages is significant."}, {"tr": "The external auditors have indicated some difficulties in obtaining account confirmations.", "en": "The external auditors have indicated some difficulties in obtaining account confirmations.", "cmt_tr": "Obtaining account confirmations is the responsibility of the external auditors. It should not change the internal auditor’s concerns.", "cmt_en": "Obtaining account confirmations is the responsibility of the external auditors. It should not change the internal auditor’s concerns."}], "answer": 3}, {"q_tr": "When internal auditors perform an assurance engagement, they consider", "q_en": "When internal auditors perform an assurance engagement, they consider", "options": [{"tr": "How the assurance procedures can be certain to identify all significant risks.", "en": "How the assurance procedures can be certain to identify all significant risks.", "cmt_tr": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified.", "cmt_en": "Internal auditors must be alert to the significant risks that might affect objectives, operations, or resources. However, assurance procedures alone, even when performed with due professional care, do not guarantee that all significant risks will be identified."}, {"tr": "Conformance with the organization’s code of conduct rather than The IIA’s Standards of Ethics and Professionalism.", "en": "Conformance with the organization’s code of conduct rather than The IIA’s Standards of Ethics and Professionalism.", "cmt_tr": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and any additional codes of conduct relevant to other professional designations attained.", "cmt_en": "Due professional care requires conformance with The IIA’s Global Internal Audit Standards and may entail conformance with the organization’s code of conduct and any additional codes of conduct relevant to other professional designations attained."}, {"tr": "The cost of assurance in relation to the potential benefits to be obtained.", "en": "The cost of assurance in relation to the potential benefits to be obtained.", "cmt_tr": "According to Standard 4.2, internal auditors must exercise due professional care by considering the following: • The organization’s strategy and objectives • The interests of those for whom internal audit services are provided and the interests of other stakeholders • Adequacy and effectiveness of governance, risk management, and control processes Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care • Cost relative to potential benefits of the internal audit services to be performed • Extent and timeliness of work needed to achieve the engagement’s objectives • Relative complexity, materiality, or significance of risks to the activity under review • Probability of significant errors, fraud, noncompliance, and other risks that might affect objectives, operations, or resources • Use of appropriate techniques, tools, and technology", "cmt_en": "According to Standard 4.2, internal auditors must exercise due professional care by considering the following: • The organization’s strategy and objectives • The interests of those for whom internal audit services are provided and the interests of other stakeholders • Adequacy and effectiveness of governance, risk management, and control processes Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care • Cost relative to potential benefits of the internal audit services to be performed • Extent and timeliness of work needed to achieve the engagement’s objectives • Relative complexity, materiality, or significance of risks to the activity under review • Probability of significant errors, fraud, noncompliance, and other risks that might affect objectives, operations, or resources • Use of appropriate techniques, tools, and technology"}, {"tr": "Whether the engagement needs to be supervised to ensure achievement of objectives.", "en": "Whether the engagement needs to be supervised to ensure achievement of objectives.", "cmt_tr": "Engagements must be properly supervised to ensure objectives are achieved, quality is assured, and staff is developed (Standard 1.3).", "cmt_en": "Engagements must be properly supervised to ensure objectives are achieved, quality is assured, and staff is developed (Standard 1.3)."}], "answer": 2}, {"q_tr": "An internal auditor observes that a new receivables clerk has access to accounting records. Accordingly, the auditor notes in the engagement working papers that controls over receipts are inadequate. Has the auditor exercised due professional care?", "q_en": "An internal auditor observes that a new receivables clerk has access to accounting records. Accordingly, the auditor notes in the engagement working papers that controls over receipts are inadequate. Has the auditor exercised due professional care?", "options": [{"tr": "No, reasonable care was not taken.", "en": "No, reasonable care was not taken.", "cmt_tr": "Internal auditors must consider the probability of significant errors, fraud, or noncompliance. Thus, the internal auditor did not exercise due professional care. Access to the recordkeeping functions by the new receivables clerk is not in itself an irregularity, especially if the clerk has no access to cash. Moreover, the facts do not indicate that the extent of the internal auditor’s work sufficed to achieve the engagement’s objectives.", "cmt_en": "Internal auditors must consider the probability of significant errors, fraud, or noncompliance. Thus, the internal auditor did not exercise due professional care. Access to the recordkeeping functions by the new receivables clerk is not in itself an irregularity, especially if the clerk has no access to cash. Moreover, the facts do not indicate that the extent of the internal auditor’s work sufficed to achieve the engagement’s objectives."}, {"tr": "Yes, irregularities were noted.", "en": "Yes, irregularities were noted.", "cmt_tr": "No indication is given that irregularities have occurred.", "cmt_en": "No indication is given that irregularities have occurred."}, {"tr": "Yes, alertness to conditions most likely indicative of irregularities was shown.", "en": "Yes, alertness to conditions most likely indicative of irregularities was shown.", "cmt_tr": "The extent of the audit did not demonstrate alertness to irregularities.", "cmt_en": "The extent of the audit did not demonstrate alertness to irregularities."}, {"tr": "Yes, the engagement working papers were annotated.", "en": "Yes, the engagement working papers were annotated.", "cmt_tr": "Annotating the working papers does not indicate that the auditor exercised due professional care.", "cmt_en": "Annotating the working papers does not indicate that the auditor exercised due professional care."}], "answer": 0}, {"q_tr": "The due professional care standard requires an internal auditor to", "q_en": "The due professional care standard requires an internal auditor to", "options": [{"tr": "Conduct examinations and verifications to the extent needed to achieve objectives.", "en": "Conduct examinations and verifications to the extent needed to achieve objectives.", "cmt_tr": "Internal auditors must exercise due professional care by considering the (1) extent of work needed to achieve the engagement’s objectives; (2) relative complexity, materiality, or Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care significance of matters to which assurance procedures are applied; (3) adequacy and effectiveness of governance, risk management, and control processes; (4) probability of significant errors, fraud, or noncompliance; and (5) cost of assurance in relation to potential benefits (Standard 4.2).", "cmt_en": "Internal auditors must exercise due professional care by considering the (1) extent of work needed to achieve the engagement’s objectives; (2) relative complexity, materiality, or Study Unit 5: Ethics and Professionalism | Subunit 4: Due Professional Care significance of matters to which assurance procedures are applied; (3) adequacy and effectiveness of governance, risk management, and control processes; (4) probability of significant errors, fraud, or noncompliance; and (5) cost of assurance in relation to potential benefits (Standard 4.2)."}, {"tr": "Perform extensive examinations in all internal audits.", "en": "Perform extensive examinations in all internal audits.", "cmt_tr": "Examination and verificatio
