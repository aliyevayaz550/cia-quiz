olitikaları, etik dışı veya yasadışı davranış için çalışanları disipline etme yetkisini sınırlamamalıdır. Code of conduct policies should not limit an organization's power to discipline employees for unethical or illegal behavior.", "cmt_en": ""}, {"tr": "Belirli çalışan ihlallerini bir devlet kuruluşuna bildirme gerekliliği.", "en": "A requirement to report certain employee violations to a governmental entity.", "cmt_tr": "Belirli ihlalleri bildirme zorunluluğu, işverenin çalışanları disipline etme yetkisini sınırlayan bir durum değildir. A governmental requirement to report certain employee violations is not itself a limitation on the employer's power to discipline employees.", "cmt_en": ""}, {"tr": "Kayırmacılık.", "en": "Nepotism.", "cmt_tr": "Aile üyelerine tercihli muamele gösterilmesi (kayırmacılık), bir şirketin disiplin amacıyla çalışanları işten çıkarma yetkisini sınırlamamalıdır. Giving preferential treatment to family members (nepotism) should not limit a company's power to terminate employees for disciplinary reasons.", "cmt_en": ""}, {"tr": "İstihdamın isteğe bağlılığı ilkesine ilişkin istisnalar.", "en": "Exceptions to the employee-at-will doctrine.", "cmt_tr": "Çalışan disiplini; ihbarcı yasaları, istihdamın isteğe bağlılığı ilkesine ilişkin istisnalar, çalışan sözleşmeleri ve işverenin iyi niyet yükümlülükleri tarafından sınırlandırılabilir. Employee discipline may be limited by whistleblower laws, exceptions to the employee-at-will doctrine, employee contracts, and employer responsibilities to act in good faith.", "cmt_en": ""}]}, {"q_tr": "İç denetçiler, uygulanabilir yasa ve yönetmelikleri öğrenmek için en etkili yol hangisidir?", "q_en": "Which procedure is most effective in learning about the applicable laws and regulations for a compliance audit?", "answer": 1, "options": [{"tr": "Hibe ajansının uygun yasa ve yönetmelikleri takip edip etmediğini belirlemek.", "en": "Determine that the granting agency followed the appropriate laws and regulations.", "cmt_tr": "Hibe ajansının uygunluğunu belirlemek için, iç denetçinin önce uygulanabilir yasa ve yönetmelikleri öğrenmesi gerekir. To determine whether the granting agency followed appropriate laws and regulations, the internal auditor must first determine what those laws and regulations are.", "cmt_en": ""}, {"tr": "Önceki yılın çalışma kağıtlarını incelemek ve değişiklikler konusunda yetkililerle görüşmek.", "en": "Review prior-year working papers and inquire of officials as to changes.", "cmt_tr": "Önceki yılın çalışma kağıtlarının incelenmesi, uygulanabilir yasa ve yönetmelikleri öğrenmek için etkili bir yoldur. Reviewing prior-year working papers is an effective way to learn about the applicable laws and regulations.", "cmt_en": ""}, {"tr": "Bu spesifik hibeyle ilgili önceki yılın denetim prosedürlerini takip etmek.", "en": "Follow the procedures for the prior year's engagements related to this specific grant.", "cmt_tr": "Uygulanabilir yasa ve yönetmelikler önceki yıldan bu yana değişmiş olabilir. The applicable laws and regulations may have changed since the prior year engagements.", "cmt_en": ""}, {"tr": "Konuyu yönetim kuruluyla görüşmek ve gerekliliklerin niteliği ile kurul amaçları hakkında soru sormak.", "en": "Discuss the matter with the board and make inquiries as to the nature of the requirements and the board's objectives.", "cmt_tr": "Yönetim kuruluyla görüşmek yardımcı olmaz. Üyeler muhtemelen uygulanabilir yasa ve yönetmelikleri bilmez. Discussing the matter with the board is not helpful. Board members are not likely to know the applicable laws and regulations.", "cmt_en": ""}]}, {"q_tr": "Yasadışı faaliyetlere eğilimli kişileri tespit etmek için hangi adım atılabilir?", "q_en": "To detect individuals with a propensity to engage in illegal activities, which step can an organization take?", "answer": 2, "options": [{"tr": "Yalan makinesi testi uygulamak.", "en": "Administer a lie detector test.", "cmt_tr": "Yalan makinesi testlerinin uygulanması, ABD'de ve pek çok ülkede genellikle yasadışıdır; aynı zamanda güvensizlik ortamı yaratır. Administering lie detector tests is generally illegal in the U.S. as well as other countries and creates an environment of mistrust.", "cmt_en": ""}, {"tr": "Çalışanların veya adayların kredi raporlarını izin almaksızın kontrol etmek.", "en": "Performing background checks without permission on employees' or applicants' credit reports.", "cmt_tr": "Çalışanların veya adayların kredi raporunu izinsiz kontrol etmek, gizlilik haklarını ihlal eder ve yasa dışıdır. Performing checks on credit reports without permission infringes upon privacy rights and is considered illegal.", "cmt_en": ""}, {"tr": "Tüm seviyelerdeki iş başvurucularını geçmişteki suistimaller açısından taramak.", "en": "Screening of applicants for employment at all levels for evidence of past wrongdoing.", "cmt_tr": "Kuruluşlar, kendilerini yasadışı faaliyetlere eğilimli kişilerden korumak için tüm seviyelerdeki iş başvurucularını geçmişteki suistimaller açısından tarayabilir; ancak gizlilik haklarına dikkat edilmelidir. Organizations may screen applicants at all levels for evidence of past wrongdoing, taking care not to infringe upon privacy rights.", "cmt_en": ""}, {"tr": "Çalışanların kişisel telefonlarındaki mesajları izlemek.", "en": "Monitor employee text messages on their personal phones.", "cmt_tr": "Kişisel mesajların izlenmesi, kurumsal telefon veya çalışanın izni olmadıkça genellikle yasadışıdır. Monitoring personal text messages is generally illegal unless it is a corporate-owned phone or the employee gives permission.", "cmt_en": ""}]}, {"q_tr": "Bir ombudsman ne zaman en etkilidir?", "q_en": "An ombudsperson is most effective when the individual?", "answer": 1, "options": [{"tr": "Kuruluşun genel hukuk müşavirine rapor verir.", "en": "Reports to the organization's general counsel.", "cmt_tr": "Çalışanlar, bir şirket avukatına değil, ombudsmana güvenerek sırlarını paylaşmaktan daha rahat hisseder. Employees tend to feel more comfortable confiding in an ombudsperson rather than a company attorney.", "cmt_en": ""}, {"tr": "Doğrudan baş uyum yetkilisine veya yönetim kuruluna rapor verir.", "en": "Reports directly to the chief compliance office or the board of directors.", "cmt_tr": "Ombudsman, doğrudan baş uyum yetkilisine veya yönetim kuruluna rapor verirse, ihbarcıların isimlerini gizli tutar, rehberlik sağlar ve misilleme olmadığından emin olmak için takip değerlendirmesi yaparsa daha etkili olur. Use of an ombudsperson is more effective if the person reports directly to the chief compliance officer or the board, keeps whistleblowers' names secret, and undertakes follow-up review.", "cmt_en": ""}, {"tr": "Hiç kimseye rapor vermez, bu sayede ihbarcı gizliliğini güvence altına alır.", "en": "Reports to no one, thus ensuring a whistleblower's secrecy.", "cmt_tr": "Ombudsman, organizasyon politikalarını değiştirebilecek yüksek kademeli birine rapor vermelidir. Hiç kimseye rapor vermemek kabul edilebilir bir seçenek değildir. An ombudsperson must report to someone at a high level who can initiate change. Reporting to no one is not an option.", "cmt_en": ""}, {"tr": "Baş denetim yöneticisine (CAE) rapor verir.", "en": "Reports to the chief audit executive (CAE).", "cmt_tr": "Ombudsman, baş uyum yetkilisine veya yönetim kuruluna rapor verdiğinde en etkili olur. The ombudsman is most effective when reporting to either the chief compliance officer or the board.", "cmt_en": ""}]}, {"q_tr": "İç denetim planı, kuruluşun uyum programını ve prosedürlerini incelemeyi içermelidir. Hangisi bu incelemelerin dışındadır?", "q_en": "An internal audit plan should include a review of the organization's compliance program. Which of the following is NOT included?", "answer": 3, "options": [{"tr": "Yazılı materyallerin etkinliği.", "en": "The effectiveness of written materials.", "cmt_tr": "Bu, iç denetim planına dahil edilen bir inceleme türüdür. This is a review that is included in an internal audit plan.", "cmt_en": ""}, {"tr": "İletişimlerin çalışanlar tarafından alınması.", "en": "The receipt of communications by employees.", "cmt_tr": "Bu, iç denetim planına dahil edilen bir inceleme türüdür. This is a review that is included in an internal audit plan.", "cmt_en": ""}, {"tr": "Tespit edilen ihlallerin uygun şekilde ele alınması.", "en": "The appropriate handling of detected violations.", "cmt_tr": "Bu, iç denetim planına dahil edilen bir inceleme türüdür. This is a review that is included in an internal audit plan.", "cmt_en": ""}, {"tr": "Çalışanlar ve yeni işe alınanlar üzerinde tam geçmiş araştırması yapılması.", "en": "The performance of full background checks on employees and new hires.", "cmt_tr": "Tam geçmiş araştırması yapılmasının incelenmesi, kuruluşun uyum programına ilişkin bir denetim planının parçası değildir. A review of the performance of full background checks is not included in an audit plan as part of reviewing an organization's compliance program.", "cmt_en": ""}]}, {"q_tr": "Etkili bir düzenleyici uyum programına sahip kuruluşun karakteristiği hangisidir?", "q_en": "An organization with an effective regulatory compliance program displays which characteristic?", "answer": 3, "options": [{"tr": "Kıdeme göre etik dışı veya yasadışı faaliyeti cezalandırır.", "en": "It punishes unethical or illegal activity based on seniority.", "cmt_tr": "Program kapsamındaki disiplin adil olmalıdır. Özellikle üst yönetim veya büyük üreticilerle ilgili ihlaller görmezden gelinirse program başarısız olur. Discipline under the program must be fair. If unethical or illegal activity goes unpunished, especially by senior management, it encourages wrongful behavior in the workforce.", "cmt_en": ""}, {"tr": "Suistimalden haberdar olanları disipline eder, ancak haberdar olması gerekenlerden haberi olmayanları cezalandırmaz.", "en": "It disciplines those who knew of the misconduct and did not report it, but not those who should have known but did not know.", "cmt_tr": "Program, suistimalden haberdar olan veya haberdar olması gereken ancak bildirmeyen yöneticiler ve sorumlu kişiler için disiplin uygulamalıdır. The program should provide for the discipline of managers who knew or should have known of misconduct and did not report it.", "cmt_en": ""}, {"tr": "Bir ihlal tespit edildikten sonra, programını değiştirmeksizin daha fazla benzer ihlali önlemek için gerekli adımları atar.", "en": "After an offense is detected, it takes necessary steps, short of modifying its program, to prevent further similar offenses.", "cmt_tr": "Bir ihlal tespit edildikten sonra, kuruluş ihlalleri önlemek ve tespit etmek için programda gerekli değişiklikleri de dahil olmak üzere tüm makul adımları atmalıdır. After an offense is detected, the organization should take all reasonable steps, including modifying its program, to prevent further violations.", "cmt_en": ""}, {"tr": "Çalışan disiplinini kapsamlı biçimde belgelemektedir.", "en": "It thoroughly documents employee discipline.", "cmt_tr": "Kuruluşlar, çalışan disiplinini kapsamlı biçimde belgelemeli ve herhangi bir olaya ilişkin bilgi toplamak için elinden geleni yaptığını kanıtlayabilmelidir. Organizations should be thorough in documenting employee discipline and be able to prove they made their best efforts to collect information and took appropriate action.", "cmt_en": ""}]}, {"q_tr": "Kuruluşun uyum programı tarafından tespit edilen bir ihlale uygun yanıt hangisidir?", "q_en": "Which of the following is an appropriate response to an offense detected by an organization's compliance program?", "answer": 3, "options": [{"tr": "İhlali sorumlu çalışanın sicil dosyasına kaydetmek ancak başka herhangi bir adım atmamak.", "en": "Documenting the offense in the responsible employee's record but not taking any further action.", "cmt_tr": "Yanıtın belgelenmesi uygun olmakla birlikte, spesifik ihlale bağlı olarak daha ileri adımlar atılmalıdır. Documenting the response is appropriate, but further action should be taken depending on the specific offense.", "cmt_en": ""}, {"tr": "İhlali takip planı olmaksızın CEO'ya bildirmek.", "en": "Reporting the offense to the CEO without a plan to follow up.", "cmt_tr": "CEO'ya bildirmek uygun olabilir; ancak ne tür bir eylem alındığını görmek için takip yapmak da gereklidir. Reporting to the CEO may be appropriate, but it may also be appropriate to follow up to see what action, if any, was taken.", "cmt_en": ""}, {"tr": "Sorumluluğu eski çalışanlara yüklemek.", "en": "Attributing responsibility to former employees.", "cmt_tr": "Sorumluluğun kabul edilmesi daha uygun bir yaklaşımdır; mevcut yönetim ekibi hesap verebilir olmalıdır. Accepting responsibility is more appropriate because the current management team is accountable.", "cmt_en": ""}, {"tr": "İhlali hükümete kendiliğinden bildirmek.", "en": "Self-reporting the violation to the government.", "cmt_tr": "Bazı durumlarda uygun bir yanıt, ihlali hükümete kendiliğinden bildirmek, devlet soruşturmalarıyla iş birliği yapmak ve ihlal sorumluluğunu kabul etmek olabilir. In some circumstances, an appropriate response could require self-reporting the violation to the government, cooperation with investigations, and acceptance of responsibility.", "cmt_en": ""}]}, {"q_tr": "Bir havayolu, hükümet tarafından zorunlu kılınan güvenlik değişikliklerinin yapılıp yapılmadığını ve belgelenip belgelenmediğini denetlemek için CAE'yi görevlendirdi. Denetçiler hangi denetimi gerçekleştirmektedir?", "q_en": "An airline's CAE was asked to audit whether required safety modifications have been made on aircraft. The auditors will be performing a(n)?", "answer": 3, "options": [{"tr": "Operasyonel denetim.", "en": "Operational audit.", "cmt_tr": "Operasyonel denetimde iç denetçiler, fonksiyonların verimliliğini ve etkinliğini değerlendirmek için kapsamlı bir inceleme yapar. Bu denetim ise yalnızca bir alanı kapsar. An operational audit is a comprehensive review of various functions. This audit focuses on only one area of the organization.", "cmt_en": ""}, {"tr": "Finansal denetim.", "en": "Financial audit.", "cmt_tr": "Finansal denetim, finansal bilgilerin doğru kaydedilip kaydedilmediğini ve yeterince desteklenip desteklenmediğini belirlemek için muhasebe ve finansal işlemleri inceler. A financial audit reviews accounting and financial transactions to determine whether financial information was properly recorded.", "cmt_en": ""}, {"tr": "Durum tespiti denetimi.", "en": "Due diligence audit.", "cmt_tr": "Durum tespiti denetimi, bir işletme birleşmesi gibi büyük bir işlem için iş gerekçesini belirlemek amacıyla yapılır. Bu tür bir denetim, havayolu başka bir havayoluyla birleşmeyi düşünüyor olsaydı yapılırdı. A due diligence audit determines the business justification for a major transaction. This would be performed if the airline were considering a merger.", "cmt_en": ""}, {"tr": "Uyum denetimi.", "en": "Compliance audit.", "cmt_tr": "İç denetçilerden uçaklarda zorunlu değişikliklerin yapılıp yapılmadığını ve belgelenip belgelenmediğini denetleme görevi verildi; bu, yasalara ve yönetmeliklere uyumu kontrol etmektir. The internal auditors have been asked to audit whether required modifications have been made and properly documented; this is checking compliance with laws and regulations applying to aircraft modifications.", "cmt_en": ""}]}, {"q_tr": "Hükümet hibeleriyle ilgili uyum denetimlerinde denetçi hangi standartları izlemelidir?", "q_en": "In performing governmental grant compliance audits, the auditor should?", "answer": 3, "options": [{"tr": "Yalnızca devlet standartlarına göre hareket etmelidir.", "en": "Be guided only by the governmental standards.", "cmt_tr": "İç denetçi yalnızca devlet standartlarını izlememelidir. The internal auditor should not only follow the governmental standards.", "cmt_en": ""}, {"tr": "Yalnızca IIA Standartlarına göre hareket etmelidir çünkü bunlar daha kapsamlıdır.", "en": "Be guided only by The IIA Standards because they are more encompassing.", "cmt_tr": "Bir iç denetçi, devlet hibeleriyle ilgili uyum denetimlerini yaparken devlet standartlarına yasal olarak uymak zorundadır. An internal auditor is legally obligated to adhere to governmental standards when performing governmental grant compliance audits.", "cmt_en": ""}, {"tr": "Kamu muhasebe mesleği tarafından yayımlanan daha genel standartlara göre hareket etmelidir.", "en": "Be guided by the more general standards that have been issued by the public accounting profession.", "cmt_tr": "İç denetçi, bu tür denetimler için belirlenen standartları izlemelidir. The internal auditor should follow the standards established for those types of audits.", "cmt_en": ""}, {"tr": "Hem IIA Standartlarını hem de ek devlet standartlarını izlemelidir.", "en": "Follow both The IIA Standards and any additional governmental standards.", "cmt_tr": "İç denetçiler Küresel İç Denetim Standartlarına uygun hareket etmeli ve devlet standartlarına yasal olarak uymalıdır. Internal auditors must perform services in accordance with the Global Internal Audit Standards and are legally obligated to adhere to governmental standards when applicable.", "cmt_en": ""}]}, {"q_tr": "Uyum denetiminde iç denetçilerin rolü nedir?", "q_en": "The role of internal auditors in compliance auditing is to?", "answer": 2, "options": [{"tr": "Finansal tablo incelemeleri gerçekleştirmek.", "en": "Perform financial statement reviews.", "cmt_tr": "Finansal tablo incelemeleri, uyum denetimlerinin değil, finansal denetimlerin kapsamındadır. Financial audits, not compliance audits, perform financial statement reviews.", "cmt_en": ""}, {"tr": "Kuruluşun iç kontrollerinin işlev gördüğünden emin olmak.", "en": "Ensure the organization's internal controls are functioning.", "cmt_tr": "Uyum denetiminin amacı yasal standartlara uyumdur; yalnızca kontrol etkinliği değil. The goal of a compliance audit is adherence to legal standards, not only control effectiveness.", "cmt_en": ""}, {"tr": "Politikalara, yasalara ve yönetmeliklere uyumu doğrulamak.", "en": "Verify adherence to policies, laws, and regulations.", "cmt_tr": "Uyum denetimi, bir kuruluşun belirlenen yasa, politika ve sözleşmelere uyup uymadığını doğrulamayı içerir. Compliance auditing involves verifying whether an organization adheres to established laws, policies, and contracts.", "cmt_en": ""}, {"tr": "Kuruluşun uyum programlarını yönetmek.", "en": "Manage the organization's compliance programs.", "cmt_tr": "İç denetçiler uyum programlarını değerlendirir, yönetmez. Internal auditors evaluate, not manage, compliance programs.", "cmt_en": ""}]}, {"q_tr": "Uyum denetiminin temel odak noktası nedir?", "q_en": "The primary focus of a compliance audit is to?", "answer": 1, "options": [{"tr": "İş süreçlerinin verimlilik oranını artırmak.", "en": "Improve the productivity ratio of business processes.", "cmt_tr": "Operasyonel denetimler, iş süreçlerinin verimlilik oranını artırmayı amaçlar. Operational audits seek to improve the productivity ratio of business processes.", "cmt_en": ""}, {"tr": "Kuruluşun politikalara, yasalara ve sözleşmelere uyduğundan emin olmak.", "en": "Ensure the organization is adhering to policies, laws, and contracts.", "cmt_tr": "Uyum denetiminin temel odak noktası, bir kuruluşun yasal düzenlemeler, politikalar ve sözleşmeler de dahil olmak üzere belirlenen standart ve gerekliliklere uymasını sağlamaktır. The primary focus of a compliance audit is to ensure that an organization is adhering to established standards and requirements, including legal regulations, policies, and contracts.", "cmt_en": ""}, {"tr": "Kuruluşun finansal tablo beyanlarını incelemek.", "en": "Review the organization's financial statement assertions.", "cmt_tr": "Finansal denetimler, kuruluşun finansal tablo beyanlarını inceler. Financial audits review the organization's financial statement assertions.", "cmt_en": ""}, {"tr": "Yönetimin karar alma için raporlama mekanizmalarını değerlendirmek.", "en": "Assess management's reporting mechanisms for decision making.", "cmt_tr": "Yönetim raporlaması, yönetimin karar alma için raporlama mekanizmalarını değerlendirir. Management reporting assesses management's reporting mechanisms for decision making.", "cmt_en": ""}]}, {"q_tr": "Uyum programları bağlamında üst yönetimin kritik rolü nedir?", "q_en": "In the context of compliance programs, what is a critical role for senior management?", "answer": 2, "options": [{"tr": "Uyum görevlilerine teknik eğitim sağlamak.", "en": "Providing technical training to compliance officers.", "cmt_tr": "Teknik eğitim genellikle uzmanlar veya İK tarafından sağlanır. Technical training is typically provided by specialists or HR.", "cmt_en": ""}, {"tr": "Tüm çalışan faaliyetlerini doğrudan izlemek.", "en": "Directly monitoring all employee activities.", "cmt_tr": "Tüm faaliyetlerin doğrudan izlenmesi uygulanamaz ve bir yönetim rolü değildir. Direct monitoring of all activities is impractical and not a management role.", "cmt_en": ""}, {"tr": "Uyumu uygun disiplin yoluyla sağlamak.", "en": "Enforcing compliance through appropriate discipline.", "cmt_tr": "Üst yönetim, kuruluşun standartlara ve değerlere uymasını sağlamak için yeterli ve adil disiplin yoluyla uyumu zorunlu kılar. Senior management enforces compliance through adequate and fair discipline to ensure organizational adherence to standards and values.", "cmt_en": ""}, {"tr": "Uyum çabaları için ayrıntılı departman planları tasarlamak.", "en": "Designing detailed departmental plans for compliance efforts.", "cmt_tr": "Ayrıntılı planların tasarlanması, üst yönetimin uyum disiplini sorumluluğundan değil, operasyonel yönetimin bir parçasıdır. Designing detailed plans is a part of operational management, not a senior management responsibility for compliance discipline.", "cmt_en": ""}]}, {"q_tr": "Uyum programlarında etik davranışı sağlamak için çalışan katılımının hangi boyutu vurgulanmaktadır?", "q_en": "What aspect of employee participation is emphasized in compliance programs to ensure ethical behavior?", "answer": 2, "options": [{"tr": "Sık mali teşvikler.", "en": "Frequent financial incentives.", "cmt_tr": "Teşvikler kullanılsa da hizalanmış olmaları ve sık kullanılmamaları gerekir. Although incentives are used, they need to be aligned and not frequent.", "cmt_en": ""}, {"tr": "Bağlama özgü eğitim.", "en": "Context-specific training.", "cmt_tr": "Eğitim önemli olmakla birlikte, raporlamada anonimlik spesifik bir vurgudur. Training is important, but anonymity in reporting is a specific emphasis.", "cmt_en": ""}, {"tr": "Anonim raporlama sistemleri.", "en": "Anonymous reporting systems.", "cmt_tr": "Uyum programları, ihbar hatları gibi anonim raporlama sistemlerinin kullanımını vurgular; bunlar, misilleme korkusu olmadan etik dışı davranışların bildirilmesini kolaylaştırır. Compliance programs emphasize the use of anonymous reporting systems, such as hotlines, which facilitate reporting of unethical behavior without fear of retaliation.", "cmt_en": ""}, {"tr": "Düzenli performans değerlendirmeleri.", "en": "Regular performance appraisals.", "cmt_tr": "Düzenli değerlendirmeler uyum için özellikle vurgulanmaz. Regular appraisals are not specifically highlighted for compliance.", "cmt_en": ""}]}, {"q_tr": "Uyum denetiminin amacını en iyi tanımlayan hangisidir?", "q_en": "Which of the following best describes the purpose of a compliance audit?", "answer": 2, "options": [{"tr": "İç finansal kontrolleri değerlendirmek.", "en": "Evaluating internal financial controls.", "cmt_tr": "İç finansal kontrollerin değerlendirilmesi, finansal denetimin bir parçasıdır. Evaluating internal financial controls is part of a financial audit.", "cmt_en": ""}, {"tr": "Çalışan memnuniyetini izlemek.", "en": "Monitoring employee satisfaction.", "cmt_tr": "Çalışan memnuniyetini izlemek, kültür ve İK ile ilgilidir; uyum değil. Monitoring employee satisfaction is related to culture and HR, not compliance.", "cmt_en": ""}, {"tr": "Dış ve iç standartlara uyumu doğrulamak.", "en": "Verifying adherence to external and internal standards.", "cmt_tr": "Uyum denetimleri, bir kuruluşun politikalar, yasalar ve sözleşmeler gibi belirli standartlara uyup uymadığını sağlar. Compliance audits ensure that an organization adheres to certain standards such as policies, laws, and contracts.", "cmt_en": ""}, {"tr": "Pazar rekabetini değerlendirmek.", "en": "Assessing market competitiveness.", "cmt_tr": "Pazar rekabetini değerlendirmek, stratejik ve pazar analiziyle daha çok ilgilidir. Assessing market competitiveness relates more to strategic and market analysis.", "cmt_en": ""}]}, {"q_tr": "Etkili uyum programlarının temel bileşeni nedir?", "q_en": "What is a key component of effective compliance programs?", "answer": 3, "options": [{"tr": "Karmaşık bir organizasyonel hiyerarşi.", "en": "A complex organizational hierarchy.", "cmt_tr": "Karmaşık hiyerarşi uyum etkinliğini engeller. A complex hierarchy hinders compliance effectiveness.", "cmt_en": ""}, {"tr": "Küçük ihlaller için önemli cezalar.", "en": "Substantial penalties for minor infractions.", "cmt_tr": "Küçük ihlaller için aşırı cezalar, düşmanca bir çalışma ortamı yaratabilir. Excessive penalties for minor infractions may create a hostile work environment.", "cmt_en": ""}, {"tr": "Suistimalle uyumlu mali teşvikler.", "en": "Financial incentives aligning with misconduct.", "cmt_tr": "Teşvikler suistimali teşvik etmemeli; aksine caydırmalıdır. Incentives should discourage, not encourage, misconduct.", "cmt_en": ""}, {"tr": "Kullanıcı dostu bir iş davranış kuralları.", "en": "A user-friendly business code of conduct.", "cmt_tr": "Kullanıcı dostu bir iş davranış kuralları, çalışanlara etik davranış konusunda net rehberlik sağlar; etkili uyum programlarının temel bir yönüdür. A user-friendly business code of conduct provides clear guidance to employees on ethical behavior and is an essential aspect of effective compliance programs.", "cmt_en": ""}]}], "SU3 - Financial Audits": [{"q_tr": "Finansal raporlama süreci hangi adımları kapsar?", "q_en": "The financial reporting process encompasses the steps to?", "answer": 1, "options": [{"tr": "Kuruluş genelinde gerçekleşen tüm hileleri tespit etmek.", "en": "Detect all fraud that is occurring throughout the organization.", "cmt_tr": "Denetçinin yalnızca hile tespiti konusunda makul güvence sağlaması gerekir; tüm hile tespit edilmek zorunda değildir. An auditor only needs to provide reasonable assurance about detecting fraud. All fraud does not have to be detected.", "cmt_en": ""}, {"tr": "Finansal tabloların ve ilgili notların hazırlanmasına yardımcı olacak bilgileri oluşturmak.", "en": "Create information to help prepare the financial statements and related notes.", "cmt_tr": "Finansal raporlama süreci, bilgilerin oluşturulması ve finansal tabloların, ilgili notların ve diğer açıklamaların hazırlanması adımlarını kapsar. The financial reporting process encompasses the steps to create information and prepare financial statements, related notes, and other disclosures.", "cmt_en": ""}, {"tr": "Tüm personele maaş artışları ve terfilerle ilgili bilgi sağlamak.", "en": "Provide all staff with information regarding raises and promotions.", "cmt_tr": "Maaş artışları ve terfiler, finansal raporlama sürecinin bir parçası değildir. Raises and promotions are not part of the financial reporting process.", "cmt_en": ""}, {"tr": "İç kontrollerin AICPA spesifikasyonlarıyla uyumlu olduğundan emin olmak.", "en": "Make sure the internal control matches up with the specifications from the AICPA.", "cmt_tr": "Denetçinin iç kontrolleri eşleştirmesi için takip etmesi gereken kılavuzlar yoktur. AICPA'nın tüm şirketlerin uyması gereken bir iç kontrol listesi bulunmamaktadır. There are no guidelines that the auditor needs to match up internal controls with. The AICPA does not have an internal control checklist that all companies must follow.", "cmt_en": ""}]}, {"q_tr": "Alacaklar yardımcı hesaplar toplamının kontrol hesabından önemli ölçüde farklı olduğu tespit edildi. Bu durum neyi gösterebilir?", "q_en": "The total of accounts receivable subsidiary accounts differs materially from the control account. This discrepancy could indicate?", "answer": 0, "options": [{"tr": "Kredi dekontlarının hatalı kaydedilmesi.", "en": "Credit memoranda being improperly recorded.", "cmt_tr": "Satış iadeleri ve indirimleri, alacak hesaplarının alacaklandırılmasını gerektirir. Yetkisiz kredi dekontlarının kaydedilmesi, satışlar ve nakit tahsilatlar doğru kaydedilirse bu tutarsızlığı açıklayabilir. Sales returns and allowances require crediting accounts receivable. The recording of unauthorized credit memoranda explains the discrepancy if sales and cash receipts are properly recorded.", "cmt_en": ""}, {"tr": "Alacak havuzlaması.", "en": "Lapping of receivables.", "cmt_tr": "Havuzlama, nakit tahsilatların çalınması ve ardından bu hırsızlığı gizlemek için sonraki tahsilatların kullanılmasını içerir. Kontrol toplamı ile yardımcı hesaplar arasında bir fark oluşturmaz. Lapping entails the theft of cash receipts and use of subsequent receipts to conceal the theft. No difference between the control total and total of subsidiary accounts would arise.", "cmt_en": ""}, {"tr": "Alacakların uygun şekilde yaşlandırılmaması.", "en": "Receivables not being properly aged.", "cmt_tr": "Yaşlandırma, muhasebe kayıtlarını içermez; bu nedenle bir tutarsızlığa yol açmaz. Aging does not involve accounting entries and would not cause the subsidiary ledger discrepancy.", "cmt_en": ""}, {"tr": "Müşteri ekstreleri gönderilmeden önce ele geçirilmesi.", "en": "Statements being intercepted prior to mailing.", "cmt_tr": "Müşteri ekstrelerinin ele geçirilmesi, sahte alacakları gösterebilir; ancak yardımcı defterde bir tutarsızlığa yol açmaz. Interception of customer statements might indicate fraudulent receivables but would not cause the subsidiary ledger discrepancy.", "cmt_en": ""}]}, {"q_tr": "Geçici finansal tabloları incelerken iç denetçilerin odaklanması en muhtemel olan husus nedir?", "q_en": "In their work on this year's interim financial statements, internal auditors are likely to focus on which of the following?", "answer": 1, "options": [{"tr": "Borçların dönem sonunda uygun şekilde tahakkuk ettirilip ettirilmediği.", "en": "Whether payables have been accrued properly at the end of the interim period.", "cmt_tr": "Borçların eksik gösterilmesi, yalnızca giderler borçlandırılmış olsaydı kazançları etkiler. Understating payables affects earnings only if expenses would have been debited.", "cmt_en": ""}, {"tr": "Hasılat tahakkukunun zamanlaması ve stok değerlemesi.", "en": "The timing of revenue recognition and the valuation of inventories.", "cmt_tr": "Hasılatın erken muhasebeleştirilmesi net karı abartır. Bitiş stoku değerinin aşırı gösterilmesi de satışların maliyetini eksik göstererek net karı abartır. Premature revenue recognition overstates net profit. Overstating ending inventories understates cost of sales, also overstating net profit.", "cmt_en": ""}, {"tr": "Muhasebe tahminlerinin geçmiş gerçek sonuçlara göre makul olup olmadığı.", "en": "Whether accounting estimates are reasonable given past actual results.", "cmt_tr": "Geçici finansal tablolarda kullanılan tahminler genellikle yaklaşık değerlerdir ve finansal tabloları önemli ölçüde bozmazlar. Estimates used in interim financial statements are often approximate and usually would not materially distort the financial statements.", "cmt_en": ""}, {"tr": "Finansal tabloları önemli ölçüde etkileyen muhasebe ilkelerinde değişiklik olup olmadığı.", "en": "Whether there have been changes in accounting principles that materially affect the financial statements.", "cmt_tr": "Bu tür değişiklikler genellikle üst yönetimin onayını gerektirir ve genellikle sürprizlere yol açmaz. Such changes usually must be approved by executive management and normally do not lead to surprises.", "cmt_en": ""}]}, {"q_tr": "Finansal denetimde iç ve dış denetçiler arasındaki ilişki nedir?", "q_en": "In a financial audit, the relationship between internal auditors and external auditors is that internal auditors?", "answer": 2, "options": [{"tr": "Dış denetçilerin çalışmalarını kopyalar.", "en": "Replicate external auditors' work.", "cmt_tr": "İç denetçiler dış denetçilerin görevlerini çoğaltmaz. Internal auditors do not duplicate external auditors' tasks.", "cmt_en": ""}, {"tr": "Münhasıran dış denetimleri doğrular.", "en": "Exclusively verify external audits.", "cmt_tr": "İç denetimin çalışma kapsamı, dış denetim sonuçlarının doğrulanmasından çok daha geniş ve çeşitlidir. Internal audit's scope of work is far broader and diverse than verifying the results of external audits.", "cmt_en": ""}, {"tr": "Dış denetimlerden önce zayıflıkları tespit ederek yardım eder.", "en": "Assist by identifying weaknesses prior to external audits.", "cmt_tr": "İç denetçiler, dış denetçilerin tam finansal denetimi yapmadan önce iç kontrollerdeki zayıflıkları tespit ederek ve azaltarak dış denetim sürecine yardımcı olur. Internal auditors aid the external audit process by identifying and mitigating weaknesses in internal controls before external auditors conduct the full financial audit.", "cmt_en": ""}, {"tr": "Aynı sorumluluklara sahiptir.", "en": "Have the same responsibilities.", "cmt_tr": "Dış denetim görevlerini yerine getirmek, iç denetçilerin çalışma kapsamının dışındadır. Performing external audit duties is beyond the scope of work of internal auditors.", "cmt_en": ""}]}, {"q_tr": "Operasyonel ve finansal denetimler arasındaki temel fark nedir? Finansal denetimlerde iç denetçiler...", "q_en": "The primary difference between operational and financial engagements is that, in the latter, internal auditors?", "answer": 3, "options": [{"tr": "Müşteri kuruluşun finansal muhasebe standartlarına uygun bilgi üretip üretmediğiyle ilgilenmezler.", "en": "Are not concerned with whether the client entity is generating information in compliance with financial accounting standards.", "cmt_tr": "Finansal bilginin güvenilirliği ve bütünlüğü finansal denetimlerde önemlidir. Bilgi sistemleri karar verme, kontrol ve uyum için veri sağlar. The reliability and integrity of financial information are important in financial engagements. Information systems provide data for decision making, control, and compliance.", "cmt_en": ""}, {"tr": "Yönetimin kaynakları mümkün olan en etkili şekilde kullanmasına yardımcı olmaya çalışırlar.", "en": "Are seeking to help management use resources in the most effective manner possible.", "cmt_tr": "Operasyonel denetimler, belirlenen hedeflerin gerçekleştirilmesini ve kaynakların ekonomik ve verimli kullanımını değerlendirir. Finansal denetimler ise öncelikle finansal tabloların adilliği hakkında görüş bildirmekle ilgilenir. Operational engagements evaluate accomplishment of objectives and economical use of resources. Financial engagements are primarily concerned with forming an opinion on the fairness of financial statements.", "cmt_en": ""}, {"tr": "Finansal denetimlerde gerekli olmayan analitik beceri ve araçları kullanabilirler.", "en": "Can use analytical skills and tools that are not necessary in financial engagements.", "cmt_tr": "Analitik beceriler her tür denetimde gereklidir. Analytical skills are necessary in all types of engagements.", "cmt_en": ""}, {"tr": "Müşteri kuruluşun finansal tablolarından başlayarak temel süreçlere doğru geriye doğru çalışırlar.", "en": "Start with the financial statements of the client entity and work backward to the basic processes.", "cmt_tr": "Finansal denetim, finansal bilgilerin doğru kaydedilip kaydedilmediğini ve yeterince desteklenip desteklenmediğini belirlemek için finansal tablolardan başlar. A financial engagement starts with financial statements to determine whether financial information was properly recorded and adequately supported.", "cmt_en": ""}]}, {"q_tr": "Üretim fonksiyonuyla ilgili finansal denetimde, kayıtlı maliyetleri fiili maliyetlerle karşılaştırma prosedürünün amacı nedir?", "q_en": "A financial engagement relating to the production function includes a procedure to compare recorded costs with actual costs. The purpose is to?", "answer": 0, "options": [{"tr": "Fiili maliyetlerin kaydedildiği sistemin doğruluğunu belirlemek.", "en": "Determine the accuracy of the system used to record actual costs.", "cmt_tr": "Finansal denetim prosedürü, kayıtlı maliyetlerin fiili maliyetlere eşit olup olmadığını, yani finansal raporlama üzerindeki iç kontrollerin etkinliğini belirler. A financial engagement procedure determines whether recorded costs equal actual costs, focusing on the effectiveness of internal controls over financial reporting.", "cmt_en": ""}, {"tr": "Standart maliyet sisteminin etkinliğini ölçmek.", "en": "Measure the effectiveness of the standard cost system.", "cmt_tr": "Bu karşılaştırma, standart maliyet sisteminin etkinliğini belirlemez. The comparison will not determine the effectiveness of the standard cost system.", "cmt_en": ""}, {"tr": "Fiili maliyetlerin makullüğünü değerlendirmek.", "en": "Assess the reasonableness of actual costs.", "cmt_tr": "Karşılaştırma, fiili maliyetlerin değil, kayıtlı maliyetlerin makullüğünü belirler. The comparison will determine the reasonableness of recorded costs, not actual costs.", "cmt_en": ""}, {"tr": "Yönetimin etkinlik ve verimlilik değerlendirmesine yardımcı olmak.", "en": "Assist management in its evaluation of effectiveness and efficiency.", "cmt_tr": "Fiili ve standart maliyetlerin karşılaştırılması, verimlilik ve ekonomi konularını ele alır; bu, finansal değil operasyonel denetim amacıdır. A comparison of actual and standard costs addresses efficiency and economy issues, which is an objective of operational, not financial audits.", "cmt_en": ""}]}, {"q_tr": "Finansal tablo denetimi sırasında hata bulan bir iç denetçinin ilk sorumluluğu nedir?", "q_en": "Which describes an internal auditor's initial responsibility regarding errors uncovered during a financial statement audit?", "answer": 1, "options": [{"tr": "Önemli hataları raporlamak.", "en": "Report the material errors.", "cmt_tr": "Önemli hatalar, uygun şekilde değerlendirildikten sonra raporlanır. Material errors are reported after they have been properly assessed.", "cmt_en": ""}, {"tr": "Yanlış beyan riskini değerlendirmek.", "en": "Assess the risk of misrepresentation.", "cmt_tr": "İç denetçinin bulduğu hatalar karşısındaki ilk sorumluluğu, yanlış beyan riskini değerlendirmektir. Yalnızca finansal tablolar üzerinde önemli etkisi olan hatalar müşteriye ve denetim komitesine raporlanmalıdır. The internal auditor's initial responsibility when discovering errors is to assess the risk of misrepresentation. Only errors having a material effect must be reported.", "cmt_en": ""}, {"tr": "Durumu denetim müşterisiyle görüşmek.", "en": "Discuss the situation with the engagement client.", "cmt_tr": "İç denetçi, önce yanlış beyan riskini değerlendirmeli, ardından hataları denetim müşterisiyle görüşmelidir. The internal auditor first must assess the risk of misrepresentation before discussing the errors with the engagement client.", "cmt_en": ""}, {"tr": "Denetim komitesini bilgilendirmek.", "en": "Inform the audit committee.", "cmt_tr": "İç denetçi, yalnızca hatalar finansal tablolar üzerinde önemli bir etkiye sahipse denetim komitesini bilgilendirmelidir; bu ancak risk değerlendirmesinden sonra belirlenebilir. The internal auditor should only inform the audit committee if the errors have a material effect, which cannot be determined until after a risk assessment.", "cmt_en": ""}]}, {"q_tr": "Personel departmanı, her bordro döngüsünde işlenen bordro değişikliklerinin düzenleme listesini alır. Bu değişiklikleri doğrulamazsa ne olabilir?", "q_en": "The personnel department receives an edit listing of payroll changes at every payroll cycle. If it does not verify the changes processed, the result could be?", "answer": 0, "options": [{"tr": "Yeni çalışanlar için bordro oranlarında tespit edilemeyen hatalar.", "en": "Undetected errors in payroll rates for new employees.", "cmt_tr": "Personel departmanı, bordro işlemleri için yetkilendirme ve yürütmeden sorumludur. Değişiklikler listesinin doğrulanması, bordro işlemleri üzerindeki önemli bir kontroldür. The personnel department is responsible for authorization and execution of payroll transactions. Verification of the payroll changes listing is an important control over payroll processing.", "cmt_en": ""}, {"tr": "Yanlış bordro kesintileri.", "en": "Inaccurate payroll deductions.", "cmt_tr": "Yanlış bordro kesintileri, bordro oranlarındaki hatalardan kaynaklanabilir. Inaccurate payroll deductions could be caused by errors in payroll rates.", "cmt_en": ""}, {"tr": "Maliyet raporlama sisteminde yanlış hesaba yüklenen iş gücü saatleri.", "en": "Labor hours charged to the wrong account in the cost reporting system.", "cmt_tr": "İş gücü saatleri, bordro değişiklikleri listesinden değil, zaman raporlama sisteminden (mesai kartı) gelir. Labor hours should come from the time reporting system, not the list of payroll changes.", "cmt_en": ""}, {"tr": "Çalışanlara şirket emeklilik planına katkıda bulunmak isteyip istemediklerinin sorulmaması.", "en": "Employees not being asked if they want to contribute to the company pension plan.", "cmt_tr": "Bordro değişiklikleri listesinin incelenmesi, uygun çalışanların katkılarının yapılıp yapılmadığını gösterir; ancak çalışanlara sorulup sorulmadığını değil. Inspection of the listing would indicate whether contributions have begun to be deducted, not whether employees have been asked about contributing.", "cmt_en": ""}]}, {"q_tr": "Önceki yılın denetlenen finansal tablolarında beklenenin üzerinde borç/özkaynak oranı vardı. Bu yılın çalışmasında iç denetçilerin vurgulaması gereken husus nedir?", "q_en": "The previous year's audited financial statements had higher debt-to-equity than was expected. In their work on this year's interim financial statements, auditors are most likely to emphasize?", "answer": 0, "options": [{"tr": "Borçların dönem sonunda uygun şekilde tahakkuk ettirilip ettirilmediği.", "en": "Whether payables were accrued properly at the end of the interim period.", "cmt_tr": "Borçların yanlış gösterilmesi doğrudan borç/özkaynak oranını etkiler; yatırım kararlarında kullanılır. Yükümlülüklerin eksik gösterilmesi oranı düşürür. Misstating payables directly affects the debt-to-equity ratio used by creditors and shareholders. Understating liabilities understates the ratio.", "cmt_en": ""}, {"tr": "Hasılat tahakkukunun zamanlaması ve stok değerlemesi.", "en": "The timing of revenue recognition and the measurement of inventories.", "cmt_tr": "Hasılatlar ve stoklarla ilgili manipülasyonlar, kazanç performansını etkiler; borç/özkaynak oranını değil. Manipulations involving revenues and inventories affect earnings performance, not the debt-to-equity ratio.", "cmt_en": ""}, {"tr": "Muhasebe tahminlerinin geçmiş gerçek sonuçlara göre makul olup olmadığı.", "en": "Whether accounting estimates are reasonable given past actual results.", "cmt_tr": "Geçici finansal tablolarda kullanılan tahminler genellikle yaklaşık değerlerdir ve önemli yanlış tablolara yol açmaz. Estimates used in interim financial statements often are approximate and usually do not materially misstate the financial statements.", "cmt_en": ""}, {"tr": "Finansal tabloları önemli ölçüde etkileyen muhasebe ilkelerinde değişiklik olup olmadığı.", "en": "Whether changes in accounting principles have occurred that materially affect the financial statements.", "cmt_tr": "Muhasebe ilkelerindeki değişiklikler genellikle üst yönetimin onayını gerektirir ve genellikle sürprizlere yol açmaz. Changes in accounting principles usually must be approved by executive management and normally do not lead to surprises.", "cmt_en": ""}]}, {"q_tr": "Bir şirketin harcama döngüsüne ilişkin denetimin spesifik amacı, ödenen tüm malların doğru hesaba yüklenip yüklenmediğini belirlemektir. Bu, Standartlar'da yer alan birincil amaçların hangisini karşılar?", "q_en": "A specific objective of an audit of a company's expenditure cycle is to determine whether all goods paid for have been charged to the correct account. Which primary objective does this address?", "answer": 1, "options": [{"tr": "Yasa, yönetmelik, prosedür ve sözleşmelere uyum.", "en": "Compliance with laws, regulations, procedures, and contracts.", "cmt_tr": "Bu spesifik denetim amacı, uyumu ele almaz. The specific engagement objective does not address compliance.", "cmt_en": ""}, {"tr": "Finansal ve operasyonel bilgilerin güvenilirliği ve bütünlüğü.", "en": "Reliability and integrity of financial and operational information.", "cmt_tr": "Doğru hesapların yüklenip yüklenmediğini belirlemek, finansal bilgilerin güvenilirliğini ve bütünlüğünü ele alır. Determining whether the correct accounts have been charged addresses the reliability and integrity of financial information.", "cmt_en": ""}, {"tr": "Varlıkların korunması.", "en": "Safeguarding of assets.", "cmt_tr": "Bu spesifik denetim amacı, varlıkların korunmasını ele almaz. The specific engagement objective does not address the safeguarding of assets.", "cmt_en": ""}, {"tr": "Operasyon ve programların etkinliği ve verimliliği.", "en": "Effectiveness and efficiency of operations and programs.", "cmt_tr": "Bu spesifik denetim amacı, operasyonların etkinliğini ele alabilir; ancak verimliliği değil. The specific engagement objective may address effectiveness of operations but does not address efficiency.", "cmt_en": ""}]}, {"q_tr": "Baş denetim yöneticisi risk maruziyetleri nedeniyle ek denetimlerin önerildiği raporları inceliyor. En büyük riski temsil eden ve bir sonraki görev olması gereken hangisidir?", "q_en": "The CAE was reviewing reports that recommended additional engagements because of risk exposures. Which represents the greatest risk and should be the next assignment?", "answer": 2, "options": [{"tr": "Üç adet önceden numaralandırılmış teslim alım raporu eksik.", "en": "Three prenumbered receiving reports were missing.", "cmt_tr": "Teslim alım raporunun veya satın alma talebinin olmaması, ödemeler uygun şekilde kontrol ediliyorsa ödemeyi önleyecektir. The absence of a receiving report or purchase requisition will prevent payment if disbursements are properly controlled.", "cmt_en": ""}, {"tr": "Birkaç satın alma emri, satın alma talebi olmaksızın düzenlenmiş.", "en": "There were several purchase orders issued without purchase requisitions.", "cmt_tr": "Belirli rutin satın alımlar için talep gerekmeyebilir. Certain routine purchases may not require requisitions.", "cmt_en": ""}, {"tr": "Rutin stok kalemleri için satın alma emri veya teslim alım raporu olmaksızın ödeme yapılmış.", "en": "Payment had been made for routine inventory items without a purchase order or receiving report.", "cmt_tr": "Mal ödemeleri için; onaylı satın alma talebi, satın alma emri, teslim alım raporu ve satıcı faturası gibi belgeler gerekmektedir. Bu desteğin olmaması yüksek hile riski anlamına gelir. Payment vouchers for merchandise should be supported by a requisition, purchase order, receiving report, and vendor invoice. Lack of such support suggests a high risk of fraud.", "cmt_en": ""}, {"tr": "Nakit tahsilatlar birçok kez yatırılmadan önce fazladan bir gün bekletilmiş.", "en": "Several times cash receipts had been held over an extra day before depositing.", "cmt_tr": "Diğer kontroller yerindeyse, riskin boyutu 1 günlük tahsilat kaybıdır. Assuming other controls are in place, the extent of the risk is the loss of 1 day's receipts.", "cmt_en": ""}]}, {"q_tr": "Finansal tablo denetiminde bir hata bulan iç denetçinin ilk sorumluluğu nedir?", "q_en": "The initial responsibility of the internal auditor who finds an error during a financial statement audit is to?", "answer": 0, "options": [{"tr": "Yalnızca finansal tablolar üzerinde önemli etkisi olan hatalar raporlanacağından, yanlış beyan riskini değerlendirmek.", "en": "Assess the risk of misrepresentation because only errors having a material effect must be reported.", "cmt_tr": "İç denetçiler buldukları her hatayı derhal raporlamamalıdır. Önce hatanın önemliliğini değerlendirmeli ve benzer hataların olup olmadığını belirlemelidir. Internal auditors should not report every error immediately. They must first assess the materiality of the error and evaluate whether there is a pattern of similar errors.", "cmt_en": ""}, {"tr": "Finansal sonuçların yanlış gösterilme riski nedeniyle hatayı derhal yönetim kuruluna bildirmek.", "en": "Report the error to the board immediately because of the risk of misrepresenting financial results.", "cmt_tr": "İç denetçi hatayı yönetim kuruluna derhal bildirmemelidir; çünkü önemsiz olabilir. Eğer önemli değilse, durumu önce CAE ile görüşebilir. The internal auditor should not report the error immediately to the board because it may be immaterial. The auditor should discuss it with the CAE if unsure.", "cmt_en": ""}, {"tr": "Hatayı düzeltmek ve düzeltilmiş finansal tabloları muhasebe departmanına göndermek.", "en": "Correct the error and submit the corrected financial statements to the accounting department.", "cmt_tr": "İç denetçiler, finansal tabloları hazırlamak veya düzeltmekten sorumlu değildir. Internal auditors are not responsible for preparing or correcting the financial statements.", "cmt_en": ""}, {"tr": "Finansal tablo hazırlama süreci üzerindeki iç kontrolleri daha fazla test etmek.", "en": "Further test the internal controls over the process of preparing financial statements.", "cmt_tr": "İç denetçi önce hatanın önemliliğini değerlendirmeli, ardından iç kontrollerdeki herhangi bir zayıflığın bu hataya neden olup olamayacağına karar vermelidir. The internal auditor should first evaluate the materiality of the error and then decide whether any weakness in internal controls could have caused it.", "cmt_en": ""}]}, {"q_tr": "İç denetçilerin değerlendirmesi gereken finansal sermaye ve ödeme döngüsündeki kalıtsal risk nedir?", "q_en": "What is an inherent risk in the financial capital and payment cycle that internal auditors should consider?", "answer": 2, "options": [{"tr": "Harcamaların uygun şekilde aktifleştirilememesi.", "en": "Failure to capitalize expenditures properly.", "cmt_tr": "Harcamaların uygun şekilde aktifleştirilememesi, üretim döngüsündeki aktifleştirilen maliyetlerle ilgilidir. Failure to capitalize expenditures properly relates to capitalized costs in the production cycle.", "cmt_en": ""}, {"tr": "Stok zimmete geçirilmesi.", "en": "Misappropriation of inventory.", "cmt_tr": "Stokun zimmete geçirilmesi, stok döngüsüyle ilgilidir. Misappropriation of inventory pertains to the inventory cycle.", "cmt_en": ""}, {"tr": "Alınan faiz ve kâr paylarının hatalı kaydedilmesi.", "en": "Inaccurate recording of interest and dividends received.", "cmt_tr": "Finansal sermaye ve ödeme döngüsünde, denetçiler finansal işlemlerin doğru kaydedilmesiyle ilgili kalıtsal risklerin farkında olmalıdır; faiz ve kâr payları bunların örnekleridir. In the financial capital and payment cycle, auditors should be aware of inherent risks related to accurate recording of financial transactions like interest and dividends received.", "cmt_en": ""}, {"tr": "İş gücü yasalarının hatalı uygulanması.", "en": "Misapplication of labor laws.", "cmt_tr": "İş gücü yasalarının hatalı uygulanması, finansal sermaye denetimlerine özgü olmayan bir uyum sorunudur. Misapplication of labor laws is a compliance issue not specific to financial capital audits.", "cmt_en": ""}]}, {"q_tr": "Finansal denetim sırasında bir iç denetçi öncelikle neye odaklanmalıdır?", "q_en": "During a financial audit, an internal auditor primarily should focus on?", "answer": 2, "options": [{"tr": "Çalışan iş memnuniyetini araştırmak.", "en": "Surveying employee job satisfaction.", "cmt_tr": "İş memnuniyetini araştırmak, finansal denetimler değil, organizasyonel kültürle ilgilidir. Surveying job satisfaction pertains to organizational culture, not financial audits.", "cmt_en": ""}, {"tr": "Çevre yasalarına uyumu değerlendirmek.", "en": "Assessing compliance with environmental laws.", "cmt_tr": "Çevre yasalarına uyum, finansal denetimde değil, uyum denetiminde ele alınır. Compliance with environmental laws is an issue in a compliance audit.", "cmt_en": ""}, {"tr": "Finansal raporlama üzerindeki iç kontrol etkinliğini değerlendirmek.", "en": "Evaluating internal control effectiveness over financial reporting.", "cmt_tr": "Finansal denetimler, finansal raporlamanın doğruluğuna ve bütünlüğüne odaklanır. İç denetçiler, doğru finansal raporlamayı sağlamak ve hata veya hile riskini azaltmak için iç kontrollerin etkinliğini değerlendirir. Financial audits focus on accuracy and integrity of financial reporting. Internal auditors assess the effectiveness of internal controls to ensure accurate reporting and mitigate risks.", "cmt_en": ""}, {"tr": "Pazarlama stratejilerini geliştirmek.", "en": "Enhancing marketing strategies.", "cmt_tr": "Pazarlama stratejisinin geliştirilmesi, finansal raporlama amacıyla denetlenmez. Marketing strategy enhancement is not audited for financial reporting purposes.", "cmt_en": ""}]}, {"q_tr": "Finansal tabloları değerlendirirken denetim planlama aşamasında iç denetçilerin sağlaması gereken temel amaç nedir?", "q_en": "Which fundamental objective is crucial for internal auditors to ensure during the engagement planning phase when evaluating financial statements?", "answer": 3, "options": [{"tr": "Operasyonel maliyetlerin azaltılmasını sağlamak.", "en": "Ensuring the reduction of operational costs.", "cmt_tr": "Operasyonel maliyetlerin azaltılması bir kuruluşa fayda sağlasa da, finansal tablolarla ilgili denetim planlamasında birincil odak noktası değildir. Although reducing operational costs can benefit an organization, it is not the primary focus during engagement planning related to financial statements.", "cmt_en": ""}, {"tr": "Çalışan verimliliğini artırmak.", "en": "Improving employee productivity.", "cmt_tr": "Çalışan verimliliğinin artırılması yararlı olmakla birlikte, finansal tabloların değerlendirilmesiyle doğrudan ilgili değildir. Improving employee productivity, although beneficial, is not directly related to evaluating financial statements.", "cmt_en": ""}, {"tr": "Hissedar değerini maksimize etmek.", "en": "Maximizing shareholder value.", "cmt_tr": "Hissedar değerini maksimize etmek, kuruluşun daha geniş bir hedefi olabilir; ancak denetimde planlama aşamasına özgü değildir. Maximizing shareholder value may be a broader organizational goal but is not specific to engagement planning in auditing.", "cmt_en": ""}, {"tr": "Temel riskleri ve kontrolleri değerlendirmek.", "en": "Assessing key risks and controls.", "cmt_tr": "Denetim planlama aşamasındaki temel amaç, temel riskleri ve kontrolleri değerlendirmektir. Bu, finansal tabloların kuruluşun ekonomik gerçeğini doğru yansıtmasını sağlamak için kritik öneme sahiptir. The fundamental objective during the engagement planning phase is to assess key risks and controls, crucial to ensure that financial statements accurately reflect the organization's economic reality.", "cmt_en": ""}]}], "SU4 - Management Reporting": [{"q_tr": "CEO, yönetim raporlarının denetimini gerçekleştirmesini istedi. Bu tür güvence denetimi neleri içerir?", "q_en": "The CEO has asked the CAE to perform an audit of the company's management reports. This type of assurance engagement would include?", "answer": 3, "options": [{"tr": "Düzenleyici kurumlara uyum kapsamında raporlanan sonuçların doğruluğunu ve zamanındalığını değerlendirmek.", "en": "Assessing the accuracy and timeliness of the reported results in compliance with regulatory agencies.", "cmt_tr": "Düzenleyici kurumlara uyum kapsamında raporların doğruluğunu ve zamanındalığını değerlendirmek bu denetimin bir parçası olmaz. Assessing the accuracy and timeliness of the reports in compliance with regulatory agencies would not be part of this engagement.", "cmt_en": ""}, {"tr": "Raporların dış paydaşlar için faydalı olup olmadığını belirlemek.", "en": "Determining whether the reports are useful to external stakeholders.", "cmt_tr": "Raporların iç karar alıcılara (dış paydaşlara değil) faydalı olup olmadığını belirlemek bu denetimin bir parçası olacaktır. Determining whether the reports are useful to internal decision makers (not external stakeholders) would be part of this engagement.", "cmt_en": ""}, {"tr": "Raporların ABD GAAP ile uyumlu olduğundan emin olmak.", "en": "Ensuring that the reports conform with U.S. GAAP.", "cmt_tr": "Yönetim raporlarına dahil edilen bilgiler ABD GAAP, IFRS veya başka bir muhasebe raporlama sistemine dayanmaz. The information included in management reports is not based on U.S. GAAP, IFRS, or any other accounting reporting system.", "cmt_en": ""}, {"tr": "Her raporun kuruluşun yönetişim sürecine katkısını değerlendirmek.", "en": "Assessing the value of each report to the organization's governance process.", "cmt_tr": "Yönetim raporları yalnızca dahili kullanım içindir. Yöneticiler ve kıdemli yöneticiler bu raporları iş kararları almak ve ilerlemeyi izlemek için kullanır. Management reports are for internal use only. Assessing the value of each report to the organization's governance process would be part of this engagement.", "cmt_en": ""}]}, {"q_tr": "Bir şirket iç raporlama sistemini 1 yıl önce revize etti. Mali Planlama Direktörü, yeni sistemin daha doğru olduğunu belirtiyor. Bu iddiayı test edecek güvence denetimi hangisidir?", "q_en": "A company revised its internal reporting system 1 year ago. The Director of Financial Planning states the revised system is more accurate. Which assurance engagement would test this assertion?", "answer": 1, "options": [{"tr": "Kalite denetimi.", "en": "Quality audit.", "cmt_tr": "Kalite denetimi, kalite süreçlerinin kalite standartlarını karşılayacak şekilde işlediğine güvence sağlar. A quality audit provides assurance that quality processes are operating so that quality standards are met.", "cmt_en": ""}, {"tr": "Yönetim raporlama denetimi.", "en": "Management reporting audit.", "cmt_tr": "İç denetçiler tarafından yapılan yönetim raporlama sürecinin denetimi, raporların doğruluk, zamanındalık, alaka ve amaçları karşılama etkinliği açısından etkinliğini değerlendirir. An audit of the management reporting process assesses the effectiveness of the reports in terms of accuracy, timeliness, relevance, and effectiveness in meeting objectives.", "cmt_en": ""}, {"tr": "Performans denetimi.", "en": "Performance audit.", "cmt_tr": "Performans denetimi, kuruluşun temel performans göstergelerini karşılamadaki ilerlemi hakkında güvence sağlar. A performance audit provides assurance about the organization's progress in meeting its key performance indicators (KPIs).", "cmt_en": ""}, {"tr": "Operasyonel denetim.", "en": "Operational audit.", "cmt_tr": "Operasyonel denetim, bir kuruluşun operasyonlarının verimliliğini ve etkinliğini değerlendirir. An operational audit assesses the efficiency and effectiveness of an organization's operations.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi bir yönetim raporunu temsil eder?", "q_en": "Which of the following is representative of a management report?", "answer": 3, "options": [{"tr": "Menkul Kıymetler ve Borsa Komisyonu'na bildirilen finansal tablolar.", "en": "Financial statements reported to the Securities and Exchange Commission.", "cmt_tr": "SEC'e gönderilen raporlar, yönetim raporlarına örnek değildir. Reports issued to the SEC are not an example of management reports.", "cmt_en": ""}, {"tr": "Yasal uyum hedeflerini karşılayamama tehlikesindeki temel performans göstergelerini tanımlayan uyarı sinyalleri.", "en": "Advanced warning signals identifying key performance indicators in danger of not meeting regulatory compliance targets.", "cmt_tr": "Yasal uyum hedeflerini karşılayamama tehlikesindeki KPI'ları tanımlayan uyarı sinyali, yönetim raporuna örnek değildir. An advanced warning signal identifying KPIs in danger of not meeting regulatory compliance targets is not an example of a management report.", "cmt_en": ""}, {"tr": "Kamuya açık hedeflere ulaşmak için nelerin değişmesi gerektiğine ilişkin grafik görüntüler.", "en": "Graphical depictions of insights into what should change in order to achieve publicly monitored goals.", "cmt_tr": "Kamuya açık hedeflere ulaşmak için nelerin değişmesi gerektiğine ilişkin grafik görüntü, yönetim raporuna örnek değildir. A graphical depiction of insights into what should change to achieve publicly monitored goals is not an example of a management report.", "cmt_en": ""}, {"tr": "Kuruluşun performansının veri tabanlı gösterge paneli değerlendirmeleri.", "en": "Data-based dashboard evaluations of an organization's performance.", "cmt_tr": "Yönetim raporları yalnızca dahili kullanım içindir. Yöneticiler ve kıdemli yöneticiler bu raporları iş kararları almak için kullanır. Performansı izleyen veri tabanlı bir gösterge paneli, yönetim raporuna örnektir. Management reports are for internal use only. A data-based dashboard monitoring an organization's performance is an example of a management report.", "cmt_en": ""}]}, {"q_tr": "Bir muhasebeci, yılsonunda bütçeyle karşılaştırılan fiili finansal sonuçların varyans analizini hazırladı. Bu rapor türüne örnek nedir?", "q_en": "At year-end, an accountant prepared a variance analysis of actual financial results compared to the budget. This type of report is an example of a?", "answer": 1, "options": [{"tr": "Kalite kontrol raporu.", "en": "Quality control report.", "cmt_tr": "Kalite kontrol raporu, bir şirketin kalite standartlarını nasıl karşıladığını belgeler. A quality control report documents how a company has met quality standards.", "cmt_en": ""}, {"tr": "Yönetim raporu.", "en": "Management report.", "cmt_tr": "Yönetim raporları, kuruluşun faaliyetleri hakkında paydaşları bilgilendiren dahili raporlardır. Varyans analizi, sonuçları izleyen ve yalnızca dahili kullanıma yönelik bir rapor örneğidir. Management reports are internal reports that help stakeholders about activities. A variance analysis is an example of a report that monitors results and is for internal use only.", "cmt_en": ""}, {"tr": "ABD Menkul Kıymetler ve Borsa Komisyonu tarafından gerekli tutulan finansal rapor.", "en": "Financial report required by the U.S. Securities and Exchange Commission.", "cmt_tr": "Bütçeyle karşılaştırılan sonuçların varyans analizi, SEC tarafından zorunlu tutulan harici bir rapor değil, dahili bir rapordur. A variance analysis of results compared to budget is an internal report, not an external report required by the SEC.", "cmt_en": ""}, {"tr": "Harici ABD GAAP finansal tablolarına destekleyici çizelge.", "en": "Supporting schedule for the U.S. GAAP external financial statements.", "cmt_tr": "Bütçeyle karşılaştırılan sonuçların varyans analizi, harici ABD GAAP finansal tablolarına dahil edilmez. A variance analysis of results compared to budget would not be included in external U.S. GAAP financial statements.", "cmt_en": ""}]}, {"q_tr": "Yönetim raporunun birincil amacı nedir?", "q_en": "The primary purpose of a management report is to?", "answer": 2, "options": [{"tr": "Dış paydaşların şirketin performansı hakkında bilgilendirilmesini sağlamak.", "en": "Ensure external stakeholders are informed of the company's performance.", "cmt_tr": "Yönetim raporları dahili kullanım içindir. Management reports are for internal use.", "cmt_en": ""}, {"tr": "Yasal gerekliliklere uygun finansal güvence sağlamak.", "en": "Provide financial assurance in accordance with legal requirements.", "cmt_tr": "Finansal denetimler ve düzenleyici raporlama, yasal gerekliliklere uygun finansal güvence sağlar. Financial audits and regulatory reporting provide financial assurance in accordance with legal requirements.", "cmt_en": ""}, {"tr": "Stratejik karar almayı kolaylaştırmak ve departmanlardaki ilerlemeyi izlemek.", "en": "Facilitate strategic decision making and monitor departmental progress.", "cmt_tr": "Yönetim raporları, stratejik yönetim için temel araçlardır. Yöneticilere ilerlemeyi izlemeleri ve bilinçli kararlar almaları için ilgili veriler sağlayarak stratejik karar almayı destekler. Management reports are integral to strategic management. They support strategic decision making by providing managers with relevant data to monitor progress and make informed decisions.", "cmt_en": ""}, {"tr": "İç kontrollerin etkinliğini değerlendirmek.", "en": "Evaluate the effectiveness of internal controls.", "cmt_tr": "İç kontroller yönetim raporunda ele alınabilse de, birincil amaç stratejik karar almaktır. Although internal controls may be addressed in the management report, its primary purpose is strategic decision making.", "cmt_en": ""}]}, {"q_tr": "Yönetim raporlaması bağlamında birincil amaç nedir?", "q_en": "In the context of management reporting, a primary goal is to?", "answer": 1, "options": [{"tr": "Tüm raporların GAAP ile uyumlu olmasını sağlamak.", "en": "Ensure all reports conform to GAAP.", "cmt_tr": "Yönetim raporları GAAP ile uyumlu olmak zorunda değildir; çünkü kullanımları paydaşlarla sınırlıdır. Management reports do not have to conform to GAAP because their use is limited to stakeholders.", "cmt_en": ""}, {"tr": "Paydaşlar arasındaki iletişimi güçlendirmek.", "en": "Enhance communication among stakeholders.", "cmt_tr": "Yönetim raporları, bilinçli dahili karar alma için araçlardır. Paydaşlar arasındaki iletişimi güçlendirir ve bilinçli karar alma ile denetimi mümkün kılar. Management reports are tools for informed internal decision making. They facilitate better communication among stakeholders, allowing informed decision making and oversight.", "cmt_en": ""}, {"tr": "Olumsuz bilgileri bastırmak.", "en": "Suppress unfavorable information.", "cmt_tr": "Bilgileri bastırmak, yönetim raporlamasının şeffaflık amacıyla çelişir. Suppressing information is contrary to the transparency objective of management reporting.", "cmt_en": ""}, {"tr": "Düzenleyici uyumu artırmak.", "en": "Increase regulatory compliance.", "cmt_tr": "Düzenleyici uyum, yönetim raporlarının değil, uyum denetimlerinin amacıdır. Regulatory compliance is an objective of compliance audits, not management reports.", "cmt_en": ""}]}, {"q_tr": "Yönetim muhasebesi ile finansal muhasebe arasındaki fark nedir? Finansal muhasebe...", "q_en": "Management accounting differs from financial accounting in that financial accounting is?", "answer": 1, "options": [{"tr": "Geleceğe daha fazla yönelik.", "en": "More oriented toward the future.", "cmt_tr": "Yönetim muhasebesi geleceğe yöneliktir; finansal muhasebe değil. Management accounting is future oriented.", "cmt_en": ""}, {"tr": "Öncelikle harici finansal raporlamayla ilgili.", "en": "Primarily concerned with external financial reporting.", "cmt_tr": "Finansal muhasebe öncelikle tarihsel muhasebe ve alacaklılar ile hissedarlara yönelik harici finansal raporlamayla ilgilenir. Financial accounting is primarily concerned with historical accounting and external financial reporting to creditors and shareholders.", "cmt_en": ""}, {"tr": "Öncelikle niceliksel olmayan bilgilerle ilgili.", "en": "Primarily concerned with nonquantitative information.", "cmt_tr": "Finansal muhasebe öncelikle niceliksel bilgilerle ilgilenir. Financial accounting is primarily concerned with quantitative information.", "cmt_en": ""}, {"tr": "Karar analizi ve kararların uygulanmasıyla yoğun biçimde ilgili.", "en": "Heavily involved with decision analysis and implementation of decisions.", "cmt_tr": "Karar analizi ve uygulama, yönetim muhasebesinin özellikleridir. Decision analysis and implementation are characteristics of management accounting.", "cmt_en": ""}]}, {"q_tr": "Finansal ve yönetim muhasebesi arasında bir ayrım yapılırsa, yönetim muhasebesi daha çok neye yöneliktir?", "q_en": "If a distinction is made between financial and managerial accounting, managerial accounting is more oriented toward?", "answer": 3, "options": [{"tr": "Stok değerlemesi.", "en": "Measurement of inventory.", "cmt_tr": "Finansal muhasebe, stok değerlemesine yöneliktir. Financial accounting is oriented toward measurement of inventory.", "cmt_en": ""}, {"tr": "Varyans analizi.", "en": "Analysis of variances.", "cmt_tr": "Finansal muhasebe, varyans analizine yöneliktir. Financial accounting is oriented toward analysis of variances.", "cmt_en": ""}, {"tr": "Üçüncü taraflara maliyet raporlaması.", "en": "Cost reporting to third parties.", "cmt_tr": "Finansal muhasebe, üçüncü taraflara finansal bilgilerin raporlanmasını içerir. Financial accounting involves the reporting of financial information to third parties.", "cmt_en": ""}, {"tr": "Yönetim sürecinin planlama ve kontrol boyutları.", "en": "The planning and controlling aspects of the management process.", "cmt_tr": "Yönetim muhasebesi; öncelikle organizasyonel operasyonların planlanması ve kontrolüne uygulanır, niceliksel olmayan bilgileri dikkate alır ve genellikle finansal muhasebeden daha az kesindir. Managerial accounting primarily applies to the planning and control of organizational operations, considers nonquantitative information, and is usually less precise than financial accounting.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi yönetim muhasebesinden çok finansal muhasebeyi tanımlar?", "q_en": "Which of the following more closely describes financial accounting than managerial?", "answer": 0, "options": [{"tr": "Stok değerlemesi.", "en": "Inventory measurement.", "cmt_tr": "Yönetim muhasebesi; öncelikle operasyonların planlanması ve kontrolüne uygulanır, niceliksel olmayan bilgileri dikkate alır ve genellikle maliyet muhasebesinden daha az kesindir. Stok değerlemesi, finansal muhasebeyle en çok ilgili maliyet/yönetim muhasebesi konusudur. Managerial accounting applies primarily to planning and control operations and is usually less precise than cost or financial accounting. Inventory measurement is the cost/managerial topic most related to financial accounting.", "cmt_en": ""}, {"tr": "Devam eden operasyonların planlanması ve kontrolü.", "en": "Planning and controlling ongoing operations.", "cmt_tr": "Finansal muhasebe öncelikle tarihsel muhasebe ve alacaklılar ile hissedarlara yönelik harici finansal raporlamayla ilgilenir. Financial accounting primarily involves historical accounting and external financial reporting to creditors and shareholders.", "cmt_en": ""}, {"tr": "Uzun vadeli planlama ve rutin olmayan kararlar.", "en": "Long-range planning and nonroutine decisions.", "cmt_tr": "Finansal muhasebe öncelikle tarihsel muhasebe ve harici finansal raporlamayla ilgilenir; uzun vadeli planlama değil. Financial accounting primarily involves historical accounting and external financial reporting.", "cmt_en": ""}, {"tr": "Niceliksel yöntemler, yani organizasyonel modeller.", "en": "Quantitative methods, i.e., organizational models.", "cmt_tr": "Finansal muhasebe öncelikle tarihsel muhasebe ve harici finansal raporlamayla ilgilenir; niceliksel organizasyonel modeller değil. Financial accounting primarily involves historical accounting and external financial reporting.", "cmt_en": ""}]}, {"q_tr": "Geniş anlamda yönetim muhasebesi nedir?", "q_en": "In a broad sense, managerial accounting is?", "answer": 3, "options": [{"tr": "Rutin olmayan kararların harici raporlanması.", "en": "External reporting of nonroutine decisions.", "cmt_tr": "Yönetim muhasebesi, rutin olmayan kararlar almada ve planlar ve politikalar geliştirmede kullanılabilecek dahili ve harici raporlamayı destekler. Managerial accounting supports internal and external reporting that may be used in making nonroutine decisions and developing plans and policies.", "cmt_en": ""}, {"tr": "Hükümete harici raporlama.", "en": "External reporting to the government.", "cmt_tr": "Finansal muhasebe, hükümete, çeşitli dış taraflara ve hissedarlara harici raporlamayı destekler. Financial accounting supports external reporting to the government, various outside parties, and shareholders.", "cmt_en": ""}, {"tr": "Yalnızca dahili raporlama.", "en": "Internal reporting only.", "cmt_tr": "Yönetim muhasebesi, dahili ve harici raporlamayı destekler. Managerial accounting supports internal and external reporting.", "cmt_en": ""}, {"tr": "Rutin operasyonların planlanmasında kullanılmak üzere dahili raporlama.", "en": "Internal reporting for use in planning routine operations.", "cmt_tr": "Yönetim muhasebesi, rutin operasyonların planlanması ve kontrolü için dahili raporlamayı destekler ve ayrıca yönetim rolü dışındaki paydaşları da destekler. Managerial accounting supports internal reporting for use in planning and controlling routine operations and also supports stakeholders and others not in management roles.", "cmt_en": ""}]}], "SU5 - Organizational Culture": [{"q_tr": "CEO 2 yılı aşkın süredir inovasyonun şirketin birincil hedefi olduğunu belirtiyor, ancak çok az yenilikçi fikir paylaşılıyor. İç denetim fonksiyonu inovasyonun önündeki engelleri belirlemek için hangi denetimi yapmalıdır?", "q_en": "The CEO has stated that innovation is the company's primary goal for over 2 years, but very few innovative ideas have been shared. Which engagement would help determine barriers to innovation?", "answer": 2, "options": [{"tr": "Operasyonel denetim.", "en": "Operational audit.", "cmt_tr": "Operasyonel denetim, operasyonların verimliliğini ve etkinliğini değerlendirir ve inovasyonun önündeki engelleri mutlaka tespit etmez. An operational audit assesses efficiency and effectiveness and would not necessarily identify barriers to innovation.", "cmt_en": ""}, {"tr": "Uyum denetimi.", "en": "Compliance audit.", "cmt_tr": "Uyum denetimi, ilgili yasa, yönetmelik ve prosedürlere uyumu test eder; yenilikçi fikirler üretme konusunda zorunlu tutmak muhtemelen ters etki yapar. A compliance audit tests whether the company is meeting requirements of relevant laws, regulations, and procedures. Forcing compliance with an imperative to generate innovative ideas would likely be counterproductive.", "cmt_en": ""}, {"tr": "Kültür denetimi.", "en": "Culture audit.", "cmt_tr": "Kültür denetimi, bir kuruluşun davranışlarının ve uygulamalarının beyan edilen değerleri ve inançlarıyla uyumunu değerlendiren kapsamlı bir değerlendirmedir. Başarıya yönelik kültürel engelleri tanımlayabilir. A culture audit is a comprehensive evaluation of how an organization's behaviors and practices align with its stated values and beliefs. It can identify cultural barriers to success.", "cmt_en": ""}, {"tr": "Performans denetimi.", "en": "Performance audit.", "cmt_tr": "Performans denetimi, KPI'ları karşılamadaki ilerleme hakkında güvence sağlar. Az sayıda fikir, engellerin olabileceğini gösterir; ancak engellerin ne olduğunu tespit etmez. A performance audit provides assurance about progress in meeting KPIs. A small number indicates there may be barriers, but it does not identify what those barriers are.", "cmt_en": ""}]}, {"q_tr": "Kültür denetiminin en iyi tanımı hangisidir?", "q_en": "Which one of the following is the best description of a culture audit?", "answer": 0, "options": [{"tr": "Bir kuruluşun davranışlarının ve uygulamalarının beyan edilen değerleri ve inançlarıyla nasıl uyum sağladığının kapsamlı bir değerlendirmesi.", "en": "A comprehensive evaluation of how an organization's behaviors and practices align with its stated values and beliefs.", "cmt_tr": "Kültür denetimi, bir kuruluşun davranışlarının ve uygulamalarının beyan edilen değerleri ve inançlarıyla uyumunu ve organizasyonel başarı üzerindeki etkisini değerlendiren kapsamlı bir değerlendirmedir. A culture audit is a comprehensive evaluation of how an organization's behaviors and practices align with its stated values and beliefs and the effect on organizational success.", "cmt_en": ""}, {"tr": "Bir kuruluşun davranış kurallarında özetlenen raporlama prosedürleriyle tutarlılığının testi.", "en": "A test of an organization's consistency in meeting the requirements of the reporting procedures outlined in the code of conduct.", "cmt_tr": "Davranış kurallarıyla uyumun test edilmesi, kültür denetiminin yalnızca bir parçasıdır. A test of compliance with the code of conduct is only one part of a culture audit.", "cmt_en": ""}, {"tr": "Bir kuruluşun yönetişim yapısının verimliliğinin ve etkinliğinin değerlendirmesi.", "en": "An assessment of the efficiency and effectiveness of an organization's governance structure.", "cmt_tr": "Yönetişimin ve kültür üzerindeki etkisinin değerlendirilmesi, kültür denetiminin yalnızca bir bileşenidir. An assessment of governance and how it impacts culture is only one component of a culture audit.", "cmt_en": ""}, {"tr": "Kuruluşun risk yönetimi ve kontrol süreçlerinin etkinliğinin denetimi.", "en": "An audit of the effectiveness of the organization's risk management and control processes.", "cmt_tr": "Risk yönetimi ve kontrol süreçlerinin etkinliğinin denetimi, kapsamlı bir kültür denetimi değildir. Kültür, iç kontrol ortamını etkilediğinden bu yalnızca bir boyuttur. An audit of risk management and control processes is not a comprehensive culture audit. This is only one aspect of the organizational culture audit.", "cmt_en": ""}]}, {"q_tr": "Olumlu bir organizasyonel kültür kuruluşa nasıl fayda sağlar?", "q_en": "A positive organizational culture benefits an organization by?", "answer": 1, "options": [{"tr": "Düzenleyici uyumu sağlamak.", "en": "Ensuring regulatory compliance.", "cmt_tr": "Organizasyonel kültür, uyumu yalnızca dolaylı olarak destekler. Organizational culture supports compliance only indirectly.", "cmt_en": ""}, {"tr": "Verimliliği artırmak ve nitelikli çalışanları çekmek.", "en": "Increasing productivity and attracting well-qualified employees.", "cmt_tr": "Organizasyonel kültür, çalışan bağlılığını önemli ölçüde etkiler. Olumlu bir kültür, destekleyici bir çalışma ortamı oluşturarak çalışan motivasyonunu ve verimliliğini artırır; yetenekli bireyleri çeker ve elde tutar. Organizational culture significantly influences employee engagement. A positive culture fosters a supportive work environment that enhances motivation and productivity, attracting and retaining talented individuals.", "cmt_en": ""}, {"tr": "Finansal denetim sonuçlarını doğrudan iyileştirmek.", "en": "Directly improving financial audit results.", "cmt_tr": "Organizasyonel kültür, finansal denetim sonuçlarını doğrudan etkilemez. The organizational culture does not directly affect financial audit results.", "cmt_en": ""}, {"tr": "Günlük operasyonlarda yönetimin müdahale ihtiyacını azaltmak.", "en": "Reducing the need for management intervention in daily operations.", "cmt_tr": "Organizasyonel kültür, genel etkinliğe yardımcı olur; ancak yönetim ihtiyacını ortadan kaldırmaz. The organizational culture aids in overall effectiveness but does not eliminate management needs.", "cmt_en": ""}]}, {"q_tr": "Güçlü bir organizasyonel kültürü en iyi yansıtan özellik hangisidir?", "q_en": "Which characteristic best reflects a strong organizational culture?", "answer": 2, "options": [{"tr": "Esneklik olmaksızın prosedürlere katı bağlılık.", "en": "Rigid adherence to procedures without flexibility.", "cmt_tr": "Katı prosedürler inovasyonu engelleyebilir ve güçlü bir kültürün göstergesi değildir. Rigid procedures may stifle innovation and are not indicative of a strong culture.", "cmt_en": ""}, {"tr": "Yüksek çalışan devir hızı.", "en": "High employee turnover.", "cmt_tr": "Yüksek devir hızı, dikkat gerektiren olası kültürel sorunları gösterir. High turnover suggests possible cultural issues needing attention.", "cmt_en": ""}, {"tr": "Temel değerlerle uyumlu teşvikler.", "en": "Incentives aligned with core values.", "cmt_tr": "Kültür, çalışan memnuniyetini ve organizasyonel etkinliği etkiler. Teşviklerin temel değerlerle uyumlu hale getirilmesi, çalış
