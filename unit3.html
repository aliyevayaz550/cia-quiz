an çabalarının paylaşılan organizasyonel değerlere yönlendirilmesini sağlar. A positive culture aligns actions and rewards with organizational values. Aligning incentives with core values supports a positive culture by ensuring employee efforts are directed toward shared values.", "cmt_en": ""}, {"tr": "Kısa vadeli karlara güçlü odaklanma.", "en": "Strong focus on short-term profits.", "cmt_tr": "Kısa vadeli karlara güçlü odaklanma, organizasyonel kültür ve uzun vadeli karlar için hayati sürdürülebilir uygulamaları göz ardı edebilir. A strong focus on short-term profits may ignore sustainable practices vital to the organizational culture and long-term profits.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi organizasyonel kültür risk faktörüne en iyi örnek teşkil eder?", "q_en": "Which of the following is the best example of an organizational culture risk factor?", "answer": 0, "options": [{"tr": "Mantıksız beklentiler.", "en": "Unreasonable expectations.", "cmt_tr": "Mantıksız beklentiler, çalışanlar üzerinde ne pahasına olursa olsun hedeflere ulaşmaları için aşırı baskıya yol açabilir ve bu çalışan moralini olumsuz etkiler. Unreasonable expectations can lead to excessive pressure on employees to reach goals no matter what the cost, negatively impacting employee morale.", "cmt_en": ""}, {"tr": "Cömert prim planları.", "en": "Generous bonus plans.", "cmt_tr": "Prim planlarına sahip olmak, planın hedefleri makul değilse bir kültür riski faktörü değildir. Prim planları şirketin temel değerleriyle uyumluysa olumlu bir kültürü destekleyebilir. Having bonus plans is not a culture risk factor unless the goals of the plan are unreasonable. If aligned with core values, they can support a positive culture.", "cmt_en": ""}, {"tr": "Çalışanlara karşı olumlu tutum sergileyen deneyimli yönetim hiyerarşisi.", "en": "An experienced management hierarchy that is favorable to employees.", "cmt_tr": "Çalışanlara karşı olumlu tutum sergileyen deneyimli bir yönetim hiyerarşisi, bir organizasyonel kültür risk faktörü olmak zorunda değildir. An experienced management hierarchy that is favorable to employees does not necessarily represent an organizational culture risk factor.", "cmt_en": ""}, {"tr": "Üstten gelen olumlu ton.", "en": "A positive tone at the top.", "cmt_tr": "Üstten gelen olumlu ton, sağlıklı bir organizasyonun ve olumlu bir kültürün özelliklerinden biridir; risk faktörü değildir. A positive tone at the top is a characteristic of a healthy organization with a positive culture, not a risk factor.", "cmt_en": ""}]}, {"q_tr": "Kültürün bir kuruluş üzerindeki etkisine ilişkin doğru olan ifade hangisidir?", "q_en": "Which of the following statements in regard to the effect culture can have on an organization is correct?", "answer": 3, "options": [{"tr": "Güçlü değerlere dayalı kültüre sahip kuruluşlar, hedeflerine ulaşma olasılığı daha yüksektir.", "en": "Organizations with a culture based on strong values are more likely to reach their objectives.", "cmt_tr": "Güçlü değerlere dayalı bir kuruluşun genellikle daha fazla motive edilmiş bir iş gücü vardır ve bu iş gücü hedeflerine ulaşma olasılığı daha yüksektir. An organization based on strong values will generally have a more motivated workforce that will likely reach their objectives.", "cmt_en": ""}, {"tr": "Olumlu bir kültür, morali ve takım ruhunu iyileştirdiğinden riskleri azaltır ve verimliliği artırır.", "en": "A positive culture reduces risks and increases productivity because it improves morale and team spirit.", "cmt_tr": "Olumlu bir kültür, daha fazla yüksek performanslı çalışan ve daha az hoşnutsuz çalışan olduğundan riski azaltır. A positive culture reduces risk because there are likely more high-performing employees and fewer disgruntled employees.", "cmt_en": ""}, {"tr": "Zayıf bir kültür iç kontrolleri zayıflatabildiğinden finansal zarara yol açabilir.", "en": "A poor culture may cause financial harm because it can undermine internal controls.", "cmt_tr": "Kötü bir kültür, işlevsiz takım dinamiklerine ve daha yüksek risk profiline yol açabilir, bu da hile gibi finansal zararlarla sonuçlanabilir. A poor culture can lead to dysfunctional team dynamics and a higher risk profile, resulting in financial harm such as fraud.", "cmt_en": ""}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "Kültür, bir kuruluşun başarısında önemli bir faktördür. Güçlü değerlere dayalı kuruluşlar hedeflerine daha çok ulaşır; olumlu kültür verimliliği artırır; zayıf kültür finansal zarara yol açabilir. Culture is a significant factor in organizational success. Organizations with strong values are more likely to reach objectives; positive culture increases productivity; poor culture can cause financial harm.", "cmt_en": ""}]}, {"q_tr": "Organizasyonel kültürün en iyi tanımı hangisidir?", "q_en": "Which one of the following statements is the best description of organizational culture?", "answer": 1, "options": [{"tr": "Bireylerin eylemler, davranışlar ve kararlar aracılığıyla organizasyonel değerlerin somut tezahürü.", "en": "The tangible manifestation of organizational values through the actions, behaviors, and decisions of individuals.", "cmt_tr": "IIA, davranışı kültürün bireyler aracılığıyla eylemler, davranışlar ve kararlar yoluyla somut tezahürü olarak tanımlar. The IIA defines conduct as the tangible manifestation of culture through the actions, behaviors, and decisions of individuals.", "cmt_en": ""}, {"tr": "Bir organizasyondaki bireylerin görünmez inanç sistemleri, değerleri, normları ve tercihleri.", "en": "The invisible belief systems, values, norms, and preferences of individuals in an organization.", "cmt_tr": "IIA, kültürü bir organizasyondaki bireylerin görünmez inanç sistemleri, değerleri, normları ve tercihleri olarak tanımlar. Kültür, organizasyonel riski ve stratejik hedeflerin gerçekleştirilmesini etkiler. The IIA defines culture as the invisible belief systems, values, norms, and preferences of individuals in an organization. Culture affects organizational risk and achievement of strategic objectives.", "cmt_en": ""}, {"tr": "Organizasyon içindeki çalışan davranışını yönlendiren ahlaki ilkeler ve davranış kuralları.", "en": "The moral principles and code of conduct that guide employee behavior within an organization.", "cmt_tr": "Organizasyonel etik, çalışanları yönlendiren ahlaki ilkeleri ve davranış kurallarını ifade eder. Organizational ethics refers to the moral principles and codes of conduct that guide employees.", "cmt_en": ""}, {"tr": "Bir kuruluş için çalışan personelin gelenekleri ve coğrafi geçmişi.", "en": "The customs and geographical background of employees working for an organization.", "cmt_tr": "Kuruluşun insan kaynağının gelenekleri ve coğrafi yapısı kültürü etkiler, ancak organizasyonel kültür değildir. Organizasyonel kültür, daha kapsamlı bir terimdir. The customs and geographic makeup of an organization's human resources affect the culture but are not the organizational culture. Organizational culture is a more encompassing term.", "cmt_en": ""}]}, {"q_tr": "Kuruluşun kültür denetiminde iç denetçilerin işlevi nedir?", "q_en": "What is the function of internal auditors in an organization's culture audit?", "answer": 2, "options": [{"tr": "Kuruluşun kültürünü tanımlamak.", "en": "Defining the organization's culture.", "cmt_tr": "Organizasyonel kültürü tanımlamak, yönetimin sorumluluğudur. Defining the organizational culture is a management responsibility.", "cmt_en": ""}, {"tr": "Günlük kültürel düzenlemeleri yönetmek.", "en": "Managing day-to-day cultural adjustments.", "cmt_tr": "Günlük kültürel değişiklikleri yönetmek, insan kaynakları veya yönetimin yetki alanındadır. Managing day-to-day cultural changes is within the authority of human resources or management.", "cmt_en": ""}, {"tr": "Kültürün organizasyonel değerlerle nasıl uyum sağladığını değerlendirmek.", "en": "Evaluating how culture aligns with organizational values.", "cmt_tr": "Kültür denetimleri, uygulamanın beyan edilen ideallerden saptığı alanları belirler. İç denetçiler, gerçek organizasyonel kültürün beyan edilen değerleri ve standartlarıyla tutarlı olup olmadığını değerlendirir. Culture audits determine areas where practice deviates from stated ideals. Internal auditors evaluate whether the actual organizational culture is consistent with its declared values and standards.", "cmt_en": ""}, {"tr": "Kültürel politikaları uygulamak.", "en": "Enforcing cultural policies.", "cmt_tr": "Politikaları uygulamak genellikle yönetimin yetki alanındadır. Enforcing policies is typically within the purview of management.", "cmt_en": ""}]}, {"q_tr": "Organizasyonel kültür denetiminde yüksek devir ve devamsızlık oranları neden gösterge niteliği taşır?", "q_en": "High turnover and absence rates may be indicators in an organizational culture audit because they?", "answer": 2, "options": [{"tr": "Güçlü çalışan bağlılığını ima eder.", "en": "Imply strong employee engagement.", "cmt_tr": "Yüksek oranlar genellikle bağlılık değil, bağlılığın eksikliğine işaret eder. High rates generally indicate disengagement, not engagement.", "cmt_en": ""}, {"tr": "Olumlu bir organizasyonel ortamı düşündürür.", "en": "Suggest a positive organizational environment.", "cmt_tr": "Bu tür oranlar genellikle olumlu değil, kırmızı bayrak niteliği taşır. Such rates are usually red flags, not positives.", "cmt_en": ""}, {"tr": "Altta yatan bir kültürel sorunun göstergesi olabilir.", "en": "May indicate an underlying cultural problem.", "cmt_tr": "İK verilerindeki olumsuz eğilimler genellikle kültürel eksiklikleri yansıtır. Yüksek devir ve devamsızlık oranları, soruşturma gerektiren organizasyonel kültür içindeki olası sorunlara işaret edebilir. Negative trends in HR data often reflect cultural deficiencies. High turnover and absence rates typically signal potential issues within the organizational culture.", "cmt_en": ""}, {"tr": "Uyum standartlarına bağlılığı doğrular.", "en": "Confirm adherence to compliance standards.", "cmt_tr": "Devir ve devamsızlık oranları, uyum standartlarına bağlılıkla doğrudan ilişkili değildir. Turnover and absences do not directly relate to compliance standard adherence.", "cmt_en": ""}]}, {"q_tr": "Organizasyonel kültürü etkili biçimde denetlemek için hangi özellik gereklidir?", "q_en": "What characteristic is essential for effectively auditing the organizational culture?", "answer": 2, "options": [{"tr": "Kuruluşun finansal tablolarına aşinalık.", "en": "Familiarity with the organization's financial statements.", "cmt_tr": "Finansal konulara aşinalık yardımcı olsa da, organizasyonel kültür denetimleri için gerekli değildir. Although helpful, financial familiarity is not essential for audits of the organizational culture.", "cmt_en": ""}, {"tr": "Finansal denetimlerde güçlü teknik denetim becerileri.", "en": "Strong technical auditing skills in financial audits.", "cmt_tr": "Finansal denetimlerle ilgili teknik beceriler, organizasyonel kültürün değerlendirilmesi için doğrudan gerekmez. Technical skills related to financial audits are not directly needed for assessment of the organizational culture.", "cmt_en": ""}, {"tr": "Kültürel verileri ve uygulamaları değerlendirmede nesnellik.", "en": "Objectivity in evaluating cultural data and practices.", "cmt_tr": "Nesnellik, önyargıları önlemek ve kültürel değerlendirmelerin doğru ve gerçeği yansıtır olmasını sağlamak için organizasyonel kültürü denetlerken kritik öneme sahiptir. Objectivity is crucial when auditing organizational culture to prevent biases and ensure that cultural evaluations are accurate and reflective of reality.", "cmt_en": ""}, {"tr": "Düzenleyici uyum standartları hakkında derinlemesine bilgi.", "en": "In-depth knowledge of regulatory compliance standards.", "cmt_tr": "Düzenleyici bilgi, uyum denetimleriyle daha alakalıdır. Regulatory knowledge is more relevant to compliance audits.", "cmt_en": ""}]}]};
const SHEETS = ["SU1 - Operational Auditing", "SU2 - Compliance Auditing", "SU3 - Financial Audits", "SU4 - Management Reporting", "SU5 - Organizational Culture"];
const SHORT_NAMES = {"SU1 - Operational Auditing": "SU1", "SU2 - Compliance Auditing": "SU2", "SU3 - Financial Audits": "SU3", "SU4 - Management Reporting": "SU4", "SU5 - Organizational Culture": "SU5"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit3";

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "index.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  const q    = qs[curQ];
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const txt = lang==="tr" ? (opt.tr||opt.en) : (opt.en||opt.tr);
    // strip "X / Y" pattern if in EN mode — just use after " / " if present
    const display = (lang==="en" && txt.includes(" / ")) ? txt.split(" / ").pop().trim() : txt;
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang==="tr" ? "en" : "tr";
  document.getElementById("lang-btn").textContent = lang==="tr" ? "EN" : "TR";
  if(!quizStarted) {
    document.getElementById("welcome-desc").textContent =
      lang==="tr"
        ? "6 mövzu, 105 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar"
        : "6 topics, 105 questions — TR/EN bilingual support with explanations";
    return;
  }
  updateProgress();
  // Re-render current question without resetting state
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}

// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
</script>
