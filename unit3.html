<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 3</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 3</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">83 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Unit 3 · Denetim Türleri</span></h1>
    <p id="welcome-desc">5 mövzu, 83 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">5</span><span class="ws-label">Mövzu</span></div>
      <div class="ws-item"><span class="ws-num">83</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">332</span><span class="ws-label">İzah</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Operational Auditing": [{"q_tr": "CEO, satın alma fonksiyonunun görevini yerine getirip getirmediğini öğrenmek istiyor. Bu talebi karşılayan denetim türü hangisidir?", "q_en": "The CEO wants to know whether the purchasing function is properly meeting its charge. Which type of engagement addresses this request?", "answer": 1, "options": [{"tr": "Satın alma departmanıyla ilgili finansal denetim.", "en": "A financial engagement relating to the purchasing department.", "cmt_tr": "Finansal denetim, ekonomik faaliyeti muhasebe yöntemleriyle ölçer ve raporlar; satın alma fonksiyonunun etkinliğini değerlendirmez. A financial engagement analyzes economic activity as measured by accounting methods; it does not assess the effectiveness of the purchasing function.", "cmt_en": ""}, {"tr": "Satın alma fonksiyonuyla ilgili operasyonel denetim.", "en": "An operational engagement relating to the purchasing function.", "cmt_tr": "Operasyonel denetim, bir kuruluşun operasyonlarının verimliliğini ve etkinliğini değerlendirir; satın alma fonksiyonunun görevini yerine getirip getirmediğini belirler. An operational engagement assesses the efficiency and effectiveness of an organization's operations, determining whether the purchasing function meets its charge.", "cmt_en": ""}, {"tr": "Satın alma fonksiyonuyla ilgili uyum denetimi.", "en": "A compliance engagement relating to the purchasing function.", "cmt_tr": "Uyum denetimi, yönetimin politikalarına, prosedürlerine ve planlarına uyumu değerlendirir; fonksiyonun etkinliğini ölçmez. A compliance engagement assesses conformance with established standards, not the effectiveness of the function in meeting its charge.", "cmt_en": ""}, {"tr": "Üretim operasyonuyla ilgili tam kapsamlı denetim.", "en": "A full-scope engagement relating to the manufacturing operation.", "cmt_tr": "Tam kapsamlı denetim finansal, uyum ve operasyonel boyutları içerir ve CEO'nun talebinin kapsamını aşar. A full-scale engagement has financial, compliance, and operational aspects and exceeds the CEO's specific request.", "cmt_en": ""}]}, {"q_tr": "Maliyet tasarrufunun belirlenmesi en çok hangi denetimin amacıdır?", "q_en": "A determination of cost savings is most likely to be an objective of a(n)?", "answer": 3, "options": [{"tr": "Program sonuçları denetimi.", "en": "Program-results engagement.", "cmt_tr": "Program sonuçları denetimi, programın amaçlarının gerçekleştirilmesini ele alır; maliyetlerin en aza indirilip indirilmediğini değerlendirmez. A program-results engagement addresses accomplishment of program objectives, not necessarily whether costs were minimized.", "cmt_en": ""}, {"tr": "Finansal denetim.", "en": "Financial engagement.", "cmt_tr": "Finansal denetim, varlıkların korunması ve bilgilerin güvenilirliği ile bütünlüğüyle ilgilidir; maliyet tasarrufu odaklı değildir. A financial engagement relates to the safeguarding of assets and the reliability and integrity of information.", "cmt_en": ""}, {"tr": "Uyum denetimi.", "en": "Compliance engagement.", "cmt_tr": "Uyum denetimi, yasal, düzenleyici ve prosedürel gerekliliklere uyumla ilgilidir; maliyet tasarrufu hedeflemez. A compliance engagement relates to compliance with legal, regulatory, procedural, and other requirements.", "cmt_en": ""}, {"tr": "Operasyonel denetim.", "en": "Operational engagement.", "cmt_tr": "Operasyonel denetim, kuruluşun operasyonlarının verimliliğini ve etkinliğini değerlendirir. Satın alma gibi süreç denetimlerinde maliyet tasarrufu tipik bir amaçtır. An operational engagement assesses efficiency and effectiveness. For process engagements like purchasing, cost savings is a typical objective.", "cmt_en": ""}]}, {"q_tr": "Hangi denetim türü operasyonlara ve etkilenen örgütsel birimlerin ne kadar etkili iş birliği yapacağına odaklanır?", "q_en": "Which type of engagement focuses on operations and how effectively and efficiently the organizational units affected will cooperate?", "answer": 1, "options": [{"tr": "Program sonuçları denetimi.", "en": "Program-results engagement.", "cmt_tr": "Program sonuçları denetimi, bir programın maliyetleri, çıktıları, faydaları ve etkileri hakkında bilgi edinir. A program-results engagement obtains information about the costs, outputs, benefits, and effects of a program.", "cmt_en": ""}, {"tr": "Süreç denetimi.", "en": "Process engagement.", "cmt_tr": "Süreç denetimleri, kapsamları ve çatışan hedefleri olabilecek alt birimlerle başa çıkma ihtiyacı nedeniyle zorlayıcı olabilir. Process engagements tend to be challenging because of their scope and the need to deal with subunits that may have conflicting objectives.", "cmt_en": ""}, {"tr": "Gizlilik denetimi.", "en": "Privacy engagement.", "cmt_tr": "Gizlilik denetimleri, kişisel bilgilerin güvenliğini ele alır; organizasyonel iş birliğini değil. Privacy engagements address the security of personal information, not organizational cooperation.", "cmt_en": ""}, {"tr": "Uyum denetimi.", "en": "Compliance engagement.", "cmt_tr": "Uyum denetimleri, tüm yasa ve yönetmeliklere uyumu ele alır; operasyonel iş birliğini değil. Compliance engagements address compliance with all laws and regulations.", "cmt_en": ""}]}, {"q_tr": "Bir nakliye departmanı değerlendirmesinde 'acele sevkiyat' taleplerinin analizi yapılmaktadır. Bu durumda denetim amacı nedir?", "q_en": "An engagement to evaluate a transportation department includes an analysis of 'rush shipment' requests. What is the engagement objective?", "answer": 2, "options": [{"tr": "Acele sevkiyatın finansal tasfiyesi.", "en": "Financial settlement of the rush shipment.", "cmt_tr": "Bir hizmet talebinin analizinde vurgu, hizmetin nasıl ödeneceği değil, ihtiyaç üzerinedir. The emphasis in analyzing service requests is on need, not how the service will be paid for.", "cmt_en": ""}, {"tr": "Acele sevkiyat için kullanılacak nakliye düzenlemeleri.", "en": "Transportation arrangements to be used for rush shipments.", "cmt_tr": "Denetim amacı, taleplerin nasıl karşılandığını değil, taleplerin nasıl oluştuğunu incelemektir. The engagement objective is to examine the generation of requests, not the methods by which they are granted.", "cmt_en": ""}, {"tr": "Acele sevkiyat hizmetlerine olan ihtiyacın belirlenmesi.", "en": "Determination of the need for rush shipment services.", "cmt_tr": "Acele sevkiyat yöntemleri alternatiflerden daha pahalı olduğundan, iç denetçi yetkilendirme prosedürlerini ve bu ihtiyacı azaltma olasılıklarını incelemelidir. Since rush shipment methods tend to be more expensive, the internal auditor should examine authorization procedures and possibilities for reducing the need.", "cmt_en": ""}, {"tr": "Teslim edilmeyen acele sevkiyat malları için taleplerin işlenmesi.", "en": "Handling of claims for undelivered rush shipment goods.", "cmt_tr": "Sevkiyat ajanslarına karşı taleplerin analizi, acele sevkiyat taleplerinin nedenlerini ortaya çıkarmaz. Analysis of claims against shipment agencies does not shed light on the reasons for rush shipment requests.", "cmt_en": ""}]}, {"q_tr": "Operasyonel ve finansal denetimler arasındaki temel fark nedir? Operasyonel denetimlerde iç denetçiler...", "q_en": "The primary difference between operational and financial engagements is that, in the former, internal auditors...", "answer": 1, "options": [{"tr": "Müşteri kuruluşun finansal muhasebe standartlarına uygun bilgi üretip üretmediğiyle ilgilenmezler.", "en": "Are not concerned with whether the client entity is generating information in compliance with financial accounting standards.", "cmt_tr": "Finansal bilginin güvenilirliği ve bütünlüğü operasyonel denetimlerde de önemlidir. Bilgi sistemleri karar verme, kontrol ve dış gerekliliklerle uyum için veri sağlar. The reliability and integrity of financial information are important in operational engagements. Information systems provide data for decision making and compliance.", "cmt_en": ""}, {"tr": "Yönetimin kaynakları mümkün olan en etkili şekilde kullanmasına yardımcı olmaya çalışırlar.", "en": "Are seeking to help management use resources in the most effective manner possible.", "cmt_tr": "Operasyonel denetimin temel amacı, belirlenen hedeflerin ve amaçların gerçekleştirilmesini ve kaynakların ekonomik ve verimli kullanımını değerlendirmektir. The primary objective of operational engagements is to evaluate accomplishment of established objectives and economical and efficient use of resources.", "cmt_en": ""}, {"tr": "Finansal tablolardan başlayarak temel süreçlere doğru geriye doğru çalışırlar.", "en": "Start with the financial statements of the client entity and work backward to the basic processes.", "cmt_tr": "Finansal denetimler, finansal tablolardan başlar. Operasyonel denetimler ise bir süreci organizasyonel sınırlar boyunca takip eder. Financial, not operational, engagements start with financial statements. Operational engagements follow a process across organizational lines.", "cmt_en": ""}, {"tr": "Finansal denetimlerde gerekli olmayan analitik beceri ve araçları kullanabilirler.", "en": "Can use analytical skills and tools that are not necessary in financial engagements.", "cmt_tr": "Analitik beceriler her tür denetimde gereklidir; bu nedenle bu ifade doğru değildir. Analytical skills are necessary in all types of engagements.", "cmt_en": ""}]}, {"q_tr": "Operasyonel denetim sırasında iç denetçiler bir departmanın mevcut kadrosunu endüstri standartlarıyla karşılaştırır. Bu işlemin amacı nedir?", "q_en": "During an operational engagement, internal auditors compare current staffing with industry standards. What is the purpose?", "answer": 1, "options": [{"tr": "Departmanın bordrosundaki sahte çalışanları tespit etmek.", "en": "Identify bogus employees on the department's payroll.", "cmt_tr": "Bu tür testlerde iç denetçiler bordro işlemleriyle ilgilenmez. Internal auditors would not be concerned with payroll processing during this type of testing and evaluation.", "cmt_en": ""}, {"tr": "Departmanın mevcut performansını değerlendirmek ve uygun iyileştirme önerileri sunmak.", "en": "Assess the current performance of the department and make appropriate recommendations for improvement.", "cmt_tr": "Operasyonel denetim, bir kuruluşun operasyonlarının verimliliğini ve etkinliğini değerlendirir. Kadro karşılaştırması bu amaca hizmet eder. An operational engagement assesses the efficiency and effectiveness of an organization's operations.", "cmt_en": ""}, {"tr": "Departman için oluşturulan iç kontrollerin yeterliliğini değerlendirmek.", "en": "Evaluate the adequacy of established internal controls for the department.", "cmt_tr": "Kadro seviyelerinin endüstri standartlarıyla karşılaştırılması iç kontrolleri test etmez. Comparison of staffing levels with industry standards will not test the adequacy of internal controls.", "cmt_en": ""}, {"tr": "Departmanın personeline ilişkin tüm yasa ve yönetmeliklere uyup uymadığını belirlemek.", "en": "Determine whether the department has complied with all laws and regulations governing its personnel.", "cmt_tr": "İç denetçiler yasal gerekliliklerle bir uyum denetimi sırasında daha çok ilgilenir. Internal auditors would be more concerned with legal requirements during a compliance engagement.", "cmt_en": ""}]}, {"q_tr": "Üretim fonksiyonuna ilişkin operasyonel denetimde fiili maliyetleri standart maliyetlerle karşılaştırma prosedürünün amacı nedir?", "q_en": "An operational engagement relating to production includes a procedure to compare actual costs with standard costs. What is the purpose?", "answer": 3, "options": [{"tr": "Fiili maliyetlerin kaydedildiği sistemin doğruluğunu belirlemek.", "en": "Determine the accuracy of the system used to record actual costs.", "cmt_tr": "Bu karşılaştırma fiili maliyetlerin doğruluğunu belirlemez. The comparison will not determine the accuracy of actual costs.", "cmt_en": ""}, {"tr": "Standart maliyet sisteminin etkinliğini ölçmek.", "en": "Measure the effectiveness of the standard cost system.", "cmt_tr": "Bu karşılaştırma standart maliyet sisteminin etkinliğini belirlemez. The comparison will not determine the effectiveness of the standard cost system.", "cmt_en": ""}, {"tr": "Standart maliyetlerin makullüğünü değerlendirmek.", "en": "Assess the reasonableness of standard costs.", "cmt_tr": "Bu karşılaştırma standart maliyetlerin makullüğünü belirlemez. The comparison will not determine the reasonableness of standard costs.", "cmt_en": ""}, {"tr": "Yönetimin etkinlik ve verimlilik değerlendirmesine yardımcı olmak.", "en": "Assist management in its evaluation of effectiveness and efficiency.", "cmt_tr": "Operasyonel denetim, operasyonların verimliliğini ve etkinliğini değerlendirir. Fiili ve standart maliyetlerin karşılaştırılması bu konuları ele alır. An operational engagement assesses efficiency and effectiveness. Comparing actual and standard costs directly addresses these issues.", "cmt_en": ""}]}, {"q_tr": "Büyük bir üreticinin trafik departmanı operasyonlarının etkinlik ve verimliliğini inceleyen denetimde en değerli prosedür hangisidir?", "q_en": "Which procedure is most valuable in an engagement involving efficiency and effectiveness of traffic department operations?", "answer": 1, "options": [{"tr": "Kullanılan tüm taşıyıcıların uygun şekilde lisanslandığını ve güvence altına alındığını düzenleyici kurumlardan yazılı olarak teyit etmek.", "en": "Obtain written confirmation from regulatory agencies that all carriers used are properly licensed and bonded.", "cmt_tr": "Bu bilgi başka kaynaklardan da edinilebilir ve teyit yöntemi gereksizdir. This information is available from other sources, and the confirmation approach is unnecessary.", "cmt_en": ""}, {"tr": "Güzergah ve taşıyıcı seçimi prosedürlerini incelemek.", "en": "Review procedures for selection of routes and carriers.", "cmt_tr": "Güzergah ve taşıyıcı seçimi departmanın temel fonksiyonudur; kötü uygulama önemli aşırı nakliye maliyetlerine veya ciddi gecikmelere yol açabilir. Route and carrier selection is the chief function of the department. Poor practice may lead to materially excessive shipping costs or serious delays.", "cmt_en": ""}, {"tr": "Haftalık demürraj raporundaki seçili kalemleri destekleyici belgelere kadar izlemek.", "en": "Trace selected items from the weekly demurrage report to supporting documentation.", "cmt_tr": "Demürraj ayrıntıları, güzergah ve taşıyıcı seçimi kadar departman operasyonları açısından önemli değildir. The details of demurrage are not as significant to the operations of the department as route and carrier selection.", "cmt_en": ""}, {"tr": "Tüm konşimento belgelerinin önceden numaralandırıldığını doğrulamak.", "en": "Verify that all bills of lading are prenumbered.", "cmt_tr": "Belgelerin önceden numaralandırılması önemli bir iç kontrol meselesidir, ancak departman amaçlarının merkezinde değildir. Prenumbering of bills of lading is an internal control matter but not central to department objectives.", "cmt_en": ""}]}, {"q_tr": "Operasyonel güvence denetimi aşağıdakilerden hangisinin değerlendirmesini içerebilir?", "q_en": "An operational assurance engagement may include an assessment of which of the following?", "answer": 1, "options": [{"tr": "Finansal raporlamanın doğruluğu.", "en": "Accuracy of financial reporting.", "cmt_tr": "Finansal raporlamanın doğruluğunun değerlendirilmesi finansal güvence denetimi sırasında yapılır. An evaluation of the accuracy of financial reporting is performed during a financial assurance engagement.", "cmt_en": ""}, {"tr": "Bütçeleme sürecinin geliştirilmesi ve etkinliği.", "en": "Development and effectiveness of the budgeting process.", "cmt_tr": "Bütçeleme süreci, organizasyonel sınırları aşan bir süreç denetimidir ve operasyonel denetim kapsamındadır. An assessment of the budgeting process is a process engagement that crosses organizational lines, which is an operational audit engagement.", "cmt_en": ""}, {"tr": "Düzenleyici ihlallerin tespiti.", "en": "Detection of regulatory violations.", "cmt_tr": "Düzenleyici ihlallerin tespiti uyum güvence denetimi sırasında yapılır. Detection of regulatory violations is performed during a compliance assurance engagement.", "cmt_en": ""}, {"tr": "Yönetim raporlarının doğruluğu ve etkinliği.", "en": "Accuracy and effectiveness of management reports.", "cmt_tr": "Yönetim raporlarının doğruluğunu ve etkinliğini değerlendirmek, yönetim raporlama güvence denetimi sırasında yapılır. Evaluating the accuracy and effectiveness of management reports is performed during a management reporting assurance engagement.", "cmt_en": ""}]}, {"q_tr": "Üreticideki hurda bertaraf fonksiyonuna ilişkin operasyonel denetim raporu neyi ele almalıdır?", "q_en": "An operational engagement communication concerning the scrap disposal function in a manufacturer should address what?", "answer": 0, "options": [{"tr": "Hurda bertaraf fonksiyonunun verimliliği ve etkinliği ile düzeltici eylem gerektiren gözlemler.", "en": "The efficiency and effectiveness of the scrap disposal function and observations requiring corrective action.", "cmt_tr": "Operasyonel denetim raporu, verilen operasyonların verimliliği ve etkinliği hakkında yönetimi bilgilendirmeli ve düzeltici eylem gerektiren gözlemleri tartışmalıdır. An operational engagement communication should inform management about efficiency and effectiveness and discuss observations requiring corrective action.", "cmt_en": ""}, {"tr": "Hurda malzeme stokunun dönen varlık olarak raporlanıp raporlanmadığı.", "en": "Whether the scrap material inventory is reported as a current asset.", "cmt_tr": "Denetim raporu, finansal tablolardaki raporlamayı değil, fonksiyonun verimliliğini ve etkinliğini ele almalıdır. An engagement communication should address efficiency and effectiveness, not reporting in the financial statements.", "cmt_en": ""}, {"tr": "Hurda malzeme stokuyla ilgili fiziksel sayımın kayıtlı miktarla eşleşip eşleşmediği.", "en": "Whether the physical inventory count of the scrap material equals the recorded amount.", "cmt_tr": "Kayıtlar ile değerlendirilen kalemler arasındaki uyum finansal denetimde birincil bir endişedir. Agreement between the records and the items being evaluated is a primary concern in a financial audit.", "cmt_en": ""}, {"tr": "Hurda malzeme stokunun maliyet veya piyasa değerinin düşüğü ile değerlenip değerlenmediği.", "en": "Whether the scrap material inventory is valued at the lower of cost or market.", "cmt_tr": "Değerleme finansal denetimde bir konudur; operasyonel denetim raporunda değil. Valuation is an issue in a financial audit, not in an operational engagement communication.", "cmt_en": ""}]}, {"q_tr": "Girişimin başarımını ve göreli başarısını ölçmeye çalışan denetim türü hangisidir?", "q_en": "Which type of engagement attempts to measure the accomplishment and relative success of the undertaking?", "answer": 0, "options": [{"tr": "Program sonuçları denetimi.", "en": "Program-results engagement.", "cmt_tr": "Program sonuçları denetimi, bir programın maliyetleri, çıktıları, faydaları ve etkileri hakkında bilgi edinmeye çalışır ve girişimin başarısını ölçer. A program-results engagement obtains information about costs, outputs, benefits, and effects of a program and attempts to measure accomplishment and relative success.", "cmt_en": ""}, {"tr": "Gizlilik denetimi.", "en": "Privacy engagement.", "cmt_tr": "Gizlilik denetimleri, kişisel bilgilerin güvenliğini ele alır. Privacy engagements address the security of personal information.", "cmt_en": ""}, {"tr": "Süreç denetimi.", "en": "Process engagement.", "cmt_tr": "Süreç denetimi, operasyonel birimlerin ne kadar etkili ve verimli iş birliği yaptığını ele alır. A process engagement addresses how effectively and efficiently operating units cooperate.", "cmt_en": ""}, {"tr": "Uyum denetimi.", "en": "Compliance engagement.", "cmt_tr": "Uyum denetimi, ilgili yasa ve yönetmeliklere uyumu ele alır. A compliance engagement addresses compliance with related laws and regulations.", "cmt_en": ""}]}, {"q_tr": "Program sonuçları denetimi hakkında doğru olan ifade hangisidir?", "q_en": "Which statement is correct about a program-results engagement?", "answer": 3, "options": [{"tr": "Programın maliyetleri hakkında bilgi edinir.", "en": "Obtains information about the costs of the program.", "cmt_tr": "Bu doğru olsa da, program sonuçları denetimi aynı zamanda programın başarısını ölçmeye çalışır ve etkinliği ölçme yeteneği konusundaki endişeleri de içerir. This is correct, but a program-results engagement also attempts to measure accomplishment and concerns the ability to measure effectiveness.", "cmt_en": ""}, {"tr": "Programın başarımını ve başarısını ölçmeye çalışır.", "en": "Attempts to measure the accomplishment and success of the program.", "cmt_tr": "Bu doğru olsa da, program sonuçları denetimi aynı zamanda programın maliyetleri hakkında bilgi edinir ve etkinliği ölçme yeteneğiyle de ilgilenir. This is correct, but a program-results engagement also obtains cost information and concerns the ability to measure effectiveness.", "cmt_en": ""}, {"tr": "Programın etkinliğini ölçme yeteneği konusundaki endişeleri içerir.", "en": "Concerns the ability to measure the effectiveness of the program.", "cmt_tr": "Bu doğru olsa da, program sonuçları denetimi aynı zamanda maliyetler hakkında bilgi edinir ve başarımı ölçmeye çalışır. This is correct, but a program-results engagement also obtains cost information and attempts to measure accomplishment and success.", "cmt_en": ""}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "Program sonuçları denetimi, maliyetler, çıktılar, faydalar ve etkiler hakkında bilgi edinmeyi, girişimin başarımını ve göreli başarısını ölçmeyi ve etkinliği ölçme yeteneğini içerir. A program-results engagement obtains information about costs, outputs, benefits, and effects; measures accomplishment and relative success; and concerns the ability to measure effectiveness.", "cmt_en": ""}]}, {"q_tr": "Operasyonel denetim sırasında denetçi yerüstü depolama kapları ve yüksek emisyonlar gözlemliyor. Kuruluşun bir çevre güvenliği departmanı var. En iyi eylem planı nedir?", "q_en": "During an operational engagement, an auditor observes above-ground storage containers and black emissions from a smokestack. The organization has an environmental safety department. What is the best course of action?", "answer": 2, "options": [{"tr": "Çevre risk endişelerini gelecek yılın denetim planında değerlendirmek üzere not almak, ancak mevcut denetimin kapsamını genişletmemek.", "en": "Make a note to consider environmental risk concerns next year, but do not expand the scope of the existing engagement.", "cmt_tr": "İç denetçi, potansiyel olarak büyük risk taşıyan bilgileri görmezden gelemez. The internal auditor cannot ignore information about a potentially large risk.", "cmt_en": ""}, {"tr": "Gözlemleri denetim komitesine bildirmek ve denetimin genişletilip genişletilmeyeceği konusunda tavsiye almak.", "en": "Report the observations to the audit committee and seek their advice on whether the engagement should be expanded.", "cmt_tr": "Denetim komitesine bildirmeden önce daha fazla bilgiye ihtiyaç vardır. İç denetçi önce çevre güvenliği departmanıyla iletişime geçmelidir. More information is needed before reporting to the audit committee. The internal auditor should first contact the environmental safety department.", "cmt_en": ""}, {"tr": "Gözlemleri belgelemek ve çevre güvenliği departmanına bildirmek, yanıtlarının zamanında olup olmayacağını belirlemek ve takip etmek.", "en": "Document the observations and report them to the environmental safety department. Determine if their response will be timely, and follow up.", "cmt_tr": "Çevre sorunları pek çok kuruluş için potansiyel olarak büyük riskler barındırdığından, iç denetçi çevre güvenliği departmanının durumdan haberdar olduğundan ve durumu aktif olarak izlediğinden emin olmalıdır. Because environmental issues have potentially large risks, the auditor should ensure the environmental safety department is aware and actively monitoring the situation, with follow-up.", "cmt_en": ""}, {"tr": "Depolama tanklarının kullanımı hakkında yerel yönetimle görüşmek, ancak çevre konularında eylem almamak çünkü iç denetçi bu alanda eğitim almamıştır.", "en": "Inquire of local management as to the use of the storage tanks. Do not take action on environmental issues because the auditor is untrained in the area.", "cmt_tr": "İç denetçi çevre güvenliği departmanıyla iletişime geçmeli ve eylemlerini takip etmelidir. Toplanan bilgileri görmezden gelemez. The internal auditor should contact the environmental safety department and follow up. Gathered information cannot be ignored.", "cmt_en": ""}]}, {"q_tr": "Bir satış departmanı yeni ürün satışlarını teşvik etmek için pahalı ürünler dağıtıyor. Yönetim maliyetin çok yüksek olabileceğini düşünüyor. Promosyonun etkinliğini belirlemek için en yararlı prosedür hangisidir?", "q_en": "A sales department is giving away expensive items to stimulate demand. Management believes the cost may be too high. Which procedure is most useful to determine the effectiveness of the promotion?", "answer": 2, "options": [{"tr": "Promosyon dönemi ürün satışlarını benzer promosyon olmayan dönemle karşılaştırmak.", "en": "Comparing product sales during the promotion period with sales during a similar non-promotion period.", "cmt_tr": "Bu yaklaşım, promosyonun gelir artırma etkinliğini ele alır; ancak pahalı hediyelerin maliyetini hesaba katmadığından promosyonun kârlılığını değerlendirmez. This addresses effectiveness in increasing revenues but does not address profitability because the cost of giveaways is not taken into account.", "cmt_en": ""}, {"tr": "Promosyon öncesi ve sırasında satılan ürünlerin birim maliyetini karşılaştırmak.", "en": "Comparing the unit cost of the products sold before and during the promotion period.", "cmt_tr": "Satılan ürünlerin maliyetinin değiştiğine dair bir gösterge yoktur. Bu prosedür promosyonun gelir etkilerini de değerlendirmez. There is no indication that product costs changed. This procedure does not consider the revenue effects of the promotion either.", "cmt_en": ""}, {"tr": "Promosyon dönemi için marjinal gelir ve marjinal maliyet analizi yapmak.", "en": "Performing an analysis of marginal revenue and marginal cost for the promotion period, compared with the period before the promotion.", "cmt_tr": "Temel analiz, kuruluşun katkı payı üzerindeki etkiyi (Gelirler – Değişken maliyetler) belirlemektir. Bu, hem gelir hem de maliyet etkilerini kapsar. The key analysis is to determine the effect on the organization's contribution margin (Revenues – Variable costs), capturing both revenue and cost effects.", "cmt_en": ""}, {"tr": "Satış yöneticilerinin prim ödemelerini promosyon döneminde ve olmayan dönemde karşılaştırmak.", "en": "Comparing sales managers' bonus payments during the promotion period with a similar non-promotion period.", "cmt_tr": "Satış yöneticilerinin primlerini karşılaştırmak satış faaliyetini gösterebilir, ancak promosyonun kârlılığını ölçmez. Comparing bonus payments may indicate sales activity but would not measure the profitability of the promotion.", "cmt_en": ""}]}, {"q_tr": "Bir şehir, iş yeniden eğitim programına katılanların ne kadarının iş bulduğunu belirlemek için katılımcıları rastgele seçiyor. Bu denetim türü nedir?", "q_en": "A city randomly selects participants in a job retraining program to determine how many have retained a job. This type of engagement relates to?", "answer": 3, "options": [{"tr": "Uyum.", "en": "Compliance.", "cmt_tr": "Uyum denetimi, yasa, yönetmelik ve sözleşmelere uyumu ele alır; program çıktılarını ölçmez. A compliance audit addresses compliance with laws, regulations, and contracts.", "cmt_en": ""}, {"tr": "Operasyonel etkinlik.", "en": "Operational effectiveness.", "cmt_tr": "Operasyonel etkinlik denetimi, iş yeniden eğitim programının genel kapsamlı bir değerlendirmesinden oluşur. An operational effectiveness engagement consists of a comprehensive review of the overall job retraining program.", "cmt_en": ""}, {"tr": "Ekonomi ve verimlilik.", "en": "Economy and efficiency.", "cmt_tr": "Ekonomi ve verimlilik denetimi, programın maliyetini elde edilen hedeflerle karşılaştırır; başarı ölçümünü değil. An economy and efficiency engagement considers the cost of the program compared with objectives achieved.", "cmt_en": ""}, {"tr": "Program sonuçları.", "en": "Program results.", "cmt_tr": "Program sonuçları denetimi, programın başarımlarını ve göreli başarısını ölçmeye çalışır. İş bulma oranının belirlenmesi bu denetim türüne örnektir. A program-results engagement attempts to measure accomplishments and relative success of the program. Determining job retention rates is an example.", "cmt_en": ""}]}, {"q_tr": "Toplam personel içindeki doğrudan personel yüzdesi hangi verimlilik ölçüm türüne örnek teşkil eder?", "q_en": "Direct staff as a percentage of total staff is an example of which type of efficiency measure?", "answer": 2, "options": [{"tr": "Verimlilik oranı.", "en": "Productivity ratio.", "cmt_tr": "Verimlilik oranı, çıktıyı girdi ile oranlar; personel yüzdesi bu ölçüme karşılık gelmez. The productivity ratio measures output relative to input.", "cmt_en": ""}, {"tr": "Verimlilik endeksi.", "en": "Productivity index.", "cmt_tr": "Verimlilik endeksi, üretim potansiyelini ölçer. The productivity index measures production potential.", "cmt_en": ""}, {"tr": "İşletme oranı.", "en": "Operating ratio.", "cmt_tr": "İşletme oranı, bir kuruluşun operasyonel verimliliğini ölçer. Personel, operasyonların bir bileşenidir ve toplam personel içindeki doğrudan personel yüzdesi bir işletme oranı örneğidir. The operating ratio measures operational efficiency. Staffing is a component of operations, and direct staff as a percentage of total staff is an example of an operating ratio.", "cmt_en": ""}, {"tr": "Kaynak kullanım oranı.", "en": "Resource utilization rate.", "cmt_tr": "Kaynak kullanım oranı, kaynak kullanımını mevcut kaynaklara göre ölçer. The resource usage rate measures resource use relative to available resources.", "cmt_en": ""}]}, {"q_tr": "Çevre koruma ve alarm cihazlarına ilişkin denetimde en önemli amaç nedir?", "q_en": "An internal auditor is conducting an audit of environmental protection and alarm devices. What is the most significant objective?", "answer": 0, "options": [{"tr": "Cihazların kurulu ve doğru çalışır durumda olup olmadığını belirlemek.", "en": "The devices are installed and operating properly.", "cmt_tr": "Amaç, cihazların etkin biçimde çalışıp çalışmadığını belirlemektir. Bunun için iç denetçinin gerçek bir işlem testini gözlemlemesi gerekir. The objective should be to determine whether the devices are operating effectively. The internal auditor must observe an actual test of the operation.", "cmt_en": ""}, {"tr": "Cihazların maliyetlerinin doğru kayıt altına alınıp alınmadığını belirlemek.", "en": "The costs of the devices were properly recorded.", "cmt_tr": "Bu tür cihazlarda kayıt tutma, etkinlik kadar önemli değildir. Recordkeeping is not as important as the effectiveness of such devices.", "cmt_en": ""}, {"tr": "Cihaz şartname belgelerinin eksiksiz olup olmadığını belirlemek.", "en": "The device specification documents are complete.", "cmt_tr": "Şartname belgeleri yalnızca onarım gerektiğinde önem kazanır. Specification documents become important only when repairs are needed.", "cmt_en": ""}, {"tr": "Satın alma ve elden çıkarma işlemlerinin uygun şekilde yetkilendirilip yetkilendirilmediğini belirlemek.", "en": "Acquisitions and disposals are properly authorized.", "cmt_tr": "Yetkilendirme, etkinlikten daha az önemlidir. Authorization is less important than effectiveness.", "cmt_en": ""}]}, {"q_tr": "Program sonuçları denetiminin en çok uygulanması gereken alan hangisidir?", "q_en": "A program-results engagement is most likely to be performed on?", "answer": 0, "options": [{"tr": "Normal operasyonların bir parçası olmayan bir faaliyet.", "en": "An activity not part of normal operations.", "cmt_tr": "Program, bir genişleme veya yeni bir bilgi sistemi gibi, kuruluşun normal süregelen operasyonlarının bir parçası olmayan finanse edilmiş bir faaliyettir. A program is a funded activity not part of the normal, continuing operations of the organization, such as an expansion or a new information system.", "cmt_en": ""}, {"tr": "Satın alma ve teslim alma departmanları.", "en": "The purchasing and receiving departments.", "cmt_tr": "Satın alma ve teslim alma departmanları, süreç (fonksiyonel) denetiminin tipik konularıdır. The purchasing and receiving departments are typical processes (functions) that are typical subjects of a process (functional) engagement.", "cmt_en": ""}, {"tr": "Güvenlik uygulamaları ve hurda işleme.", "en": "Safety practices and scrap handling.", "cmt_tr": "Güvenlik uygulamaları ve hurda işleme tipik süreçlerdir, programlar değil. Safety practices and scrap handling are typical processes (functions), not programs.", "cmt_en": ""}, {"tr": "Hizmet ve malzemelerin dağıtımı.", "en": "Distribution of services and materials.", "cmt_tr": "Kuruluşta hizmet, malzeme ve sarf malzemelerinin kullanıcılara dağıtımı tipik süreçlerdir. Distribution of services, materials, and supplies to users in the organization are typical processes (functions).", "cmt_en": ""}]}, {"q_tr": "Hangi iç denetim türü, organizasyonel birimlerin çatışan hedefleri nedeniyle zor olabilir?", "q_en": "Which type of internal audit engagement most likely may be difficult because of the conflicting objectives of organizational units?", "answer": 3, "options": [{"tr": "Performans denetimi.", "en": "Performance audit.", "cmt_tr": "Performans denetimi, kuruluşun hedeflerinin gerçekleştirilmesi hakkında güvence sağlayabilir. Buna karşın, süreç denetimi bir sürecin verimliliğini ve etkinliğini değerlendirir. A performance audit may provide assurance about achievement of objectives. In contrast, a process engagement assesses the efficiency and effectiveness of a process.", "cmt_en": ""}, {"tr": "Program sonuçları denetimi.", "en": "Program-results engagement.", "cmt_tr": "Program sonuçları denetimleri, bir programın maliyetleri, çıktıları ve etkileri hakkında bilgi edinmeye çalışır ve organizasyonel sınırları aşan bir sürece uygulanmaz. Program-results engagements obtain information about program costs, outputs, benefits, and effects. They do not apply to a process that crosses organizational lines.", "cmt_en": ""}, {"tr": "Uyum denetimi.", "en": "Compliance audit.", "cmt_tr": "Uyum denetimi, yasa ve yönetmeliklere uyumu ele alır. A compliance audit addresses compliance with laws and regulations.", "cmt_en": ""}, {"tr": "Süreç denetimi.", "en": "Process engagement.", "cmt_tr": "Bu denetimler, kapsamları ve çatışan hedefleri olabilecek organizasyonel birimlerle başa çıkma ihtiyacı nedeniyle zorlayıcı olabilir. These engagements tend to be challenging because of their scope and the need to deal with organizational units that may have conflicting objectives.", "cmt_en": ""}]}, {"q_tr": "Etkinliği ölçme yeteneği hangi denetimde özel bir endişedir?", "q_en": "The ability to measure effectiveness is a special concern in a?", "answer": 1, "options": [{"tr": "Süreç denetimi.", "en": "Process engagement.", "cmt_tr": "Süreç denetimindeki özel endişe, bir sürecin organizasyonel sınırları, hizmet birimlerini ve coğrafi konumları aşmasıdır. The special concern in a process engagement is that a process crosses organizational lines, service units, and geographic locations.", "cmt_en": ""}, {"tr": "Program sonuçları denetimi.", "en": "Program-results engagement.", "cmt_tr": "Faydalar çoğu zaman finansal terimlerle ifade edilemediğinden, etkinliği ölçme yeteneği özel bir endişedir. Bu nedenle hedeflerin ve standartların açık tanımları başlangıçta sağlanmalıdır. Because benefits often cannot be quantified in financial terms, the ability to measure effectiveness is a special concern. Clear definitions of objectives and standards should be provided at the outset.", "cmt_en": ""}, {"tr": "Fonksiyonel denetim.", "en": "Functional engagement.", "cmt_tr": "Fonksiyonel denetim, süreç denetiminin eş anlamlısıdır. A functional engagement is a synonym for a process engagement.", "cmt_en": ""}, {"tr": "Uyum denetimi.", "en": "Compliance audit.", "cmt_tr": "Uyum denetimi, yasa ve yönetmeliklere uyumu ele alır. A compliance audit addresses compliance with laws and regulations.", "cmt_en": ""}]}, {"q_tr": "Program sonuçları operasyonel denetimi ile süreç operasyonel denetimi arasındaki fark nedir?", "q_en": "A program-results audit is different from a process audit because?", "answer": 3, "options": [{"tr": "Program sonuçları denetiminde faydalar ölçülemez; bu nedenle odak, fiili maliyetleri bütçelenen maliyetlerle karşılaştırmaktır.", "en": "Benefits cannot be quantified in a program-results audit; therefore, the focus is comparing actual costs to budgeted costs.", "cmt_tr": "Program faydalarını ölçmek zor olabilir, ancak genellikle ölçülebilirler. The benefits of programs can be difficult to measure, but they generally can be measured.", "cmt_en": ""}, {"tr": "Süreç denetimi belirli organizasyonel departmanları değerlendirirken, program sonuçları denetimi çapraz fonksiyonlu süreçleri değerlendirir.", "en": "A process audit evaluates specific organizational departments, while a program-results audit evaluates cross-functional processes.", "cmt_tr": "Süreç denetimi çapraz fonksiyonludur; program sonuçları denetimi ise süreçlere değil program sonuçlarına odaklanır. A process audit is cross-functional, and a program-results audit is focused on the results of a program, not specifically on processes.", "cmt_en": ""}, {"tr": "Süreç denetiminin odağı verimlilik, program sonuçları denetiminin odağı ise etkinliktir.", "en": "The focus of a process audit is efficiency, while the focus of a program-results audit is effectiveness.", "cmt_tr": "Hem süreç denetimleri hem de program sonuçları denetimleri etkinlik ve verimliliğe odaklanır. Both process audits and program-results audits are focused on effectiveness and efficiency.", "cmt_en": ""}, {"tr": "Program sonuçları denetimi, kuruluşun süregelen operasyonlarının bir parçası olmayan finanse edilmiş bir faaliyetin denetimidir.", "en": "A program-results audit is an audit of a funded activity that is not part of an organization's continuing operations.", "cmt_tr": "Program sonuçları denetimi, bir genişleme veya maliyet kesintisi girişimi gibi kuruluşun süregelen operasyonlarının bir parçası olmayan finanse edilmiş bir faaliyetin denetimidir. A program-results audit is an audit of a funded activity not part of an organization's continuing operations, such as an expansion or a cost-cutting initiative.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi bir programa örnek teşkil eder?", "q_en": "Which one of the following is an example of a program?", "answer": 2, "options": [{"tr": "Bütçe hazırlama adımları.", "en": "The steps in preparing budgets.", "cmt_tr": "Bütçe hazırlama adımları bir süreçtir ve süregelen operasyonların parçasıdır. The steps in preparing a budget are a process and part of continuing operations.", "cmt_en": ""}, {"tr": "Fabrika güvenlik uygulaması.", "en": "A factory safety practice.", "cmt_tr": "Güvenlik uygulamaları bir süreçtir ve süregelen operasyonların parçasıdır. Safety practices are a process and part of continuing operations.", "cmt_en": ""}, {"tr": "Maliyet kesintisi girişimi.", "en": "A cost-cutting initiative.", "cmt_tr": "Program, bir genişleme, yeni bir bilgi sistemi veya maliyet kesintisi girişimi gibi kuruluşun süregelen operasyonlarının bir parçası olmayan finanse edilmiş bir faaliyettir. A program is a funded activity not part of the continuing operations of the organization, such as an expansion, a new information system, or a cost-cutting initiative.", "cmt_en": ""}, {"tr": "Ürün değiştirme prosedürleri.", "en": "Product modification procedures.", "cmt_tr": "Ürün değiştirme prosedürleri süregelen operasyonların bir parçasıdır ve belgelenmiş bir süreçtir. Product modification procedures are part of continuing operations and a documented process.", "cmt_en": ""}]}, {"q_tr": "Bir iç denetçi, şirketin üretim tesislerinin verimliliğini belirlemek için işletme oranını hesaplamak istiyor. İşletme oranını doğru tanımlayan hangisidir?", "q_en": "An internal auditor wants to calculate the company's operating ratio. Which statement correctly describes the operating ratio?", "answer": 1, "options": [{"tr": "Toplam üretim çıktısını toplam girdinin yüzdesi olarak hesaplar.", "en": "It calculates total production output as a percentage of the total input.", "cmt_tr": "Girdi yüzdesi olarak çıktı, verimlilik oranıdır; işletme oranı değil. Output as a percentage of input is the productivity ratio, not the operating ratio.", "cmt_en": ""}, {"tr": "Toplam işletme giderlerini net satışlarla karşılaştırır.", "en": "It compares total operating expenses to net sales.", "cmt_tr": "İşletme oranı, bir şirketin operasyonel verimliliğinin ölçüsüdür. Toplam işletme giderlerinin net satışlara bölünmesiyle hesaplanır. The operating ratio is a measure of a company's operating efficiency. It equals total operating expenses divided by net sales.", "cmt_en": ""}, {"tr": "Kaynak kullanımını mevcut toplam kaynaklarla karşılaştırır.", "en": "It compares resource usage to the total resources available.", "cmt_tr": "Mevcut kaynaklara kıyasla kaynak kullanımı, kaynak kullanım oranıdır. Resource usage compared to total available resources is the resource usage rate.", "cmt_en": ""}, {"tr": "Toplam üretim çıktısını toplam üretim potansiyelinin yüzdesi olarak hesaplar.", "en": "It calculates total production output as a percentage of total production potential.", "cmt_tr": "Üretim potansiyelinin yüzdesi olarak üretim çıktısı, verimlilik endeksidir. Production output as a percentage of production potential is the productivity index.", "cmt_en": ""}]}, {"q_tr": "Operasyonel denetimin birincil amacı nedir?", "q_en": "The primary goal of an operational audit is to?", "answer": 1, "options": [{"tr": "İşlemlerin finansal doğruluğunu değerlendirmek.", "en": "Assess the financial correctness of transactions.", "cmt_tr": "Finansal denetimler işlemlerin doğruluğuna odaklanır; operasyonel denetimler değil. Financial audits focus on transaction correctness.", "cmt_en": ""}, {"tr": "Operasyonların verimliliğini ve etkinliğini değerlendirmek.", "en": "Evaluate the efficiency and effectiveness of operations.", "cmt_tr": "Operasyonel denetimler, bir kuruluşun ne kadar etkin ve verimli çalıştığını değerlendirir; süreçleri, hizmet birimlerini ve birimler arası iş birliğini inceler. Operational audits assess how effectively and efficiently an organization operates, evaluating processes, service units, and the cooperation among units.", "cmt_en": ""}, {"tr": "Finansal tablolardaki hileli işlemleri tespit etmek.", "en": "Detect fraud within financial statements.", "cmt_tr": "Operasyonel denetimler dolaylı olarak hileyi tespit edebilir, ancak birincil amaçları operasyonları değerlendirmektir. Operational audits may indirectly detect fraud, but their primary objective is to evaluate operations.", "cmt_en": ""}, {"tr": "Yasa ve yönetmeliklere uyumu sağlamak.", "en": "Ensure compliance with laws and regulations.", "cmt_tr": "Uyum denetimi, yasal ve düzenleyici gerekliliklere bağlılığı değerlendirir. Compliance auditing evaluates adherence to legal and regulatory requirements.", "cmt_en": ""}]}, {"q_tr": "Operasyonel denetimlerin temel amacı nedir?", "q_en": "A key objective of operational audits is to?", "answer": 1, "options": [{"tr": "Finansal tabloların GAAP standartlarına uygunluğunu sağlamak.", "en": "Ensure financial statements comply with GAAP standards.", "cmt_tr": "Finansal tabloların GAAP'e uygunluğunun sağlanması, finansal tabloların doğruluğunu belirleyen finansal denetimlerle ilgilidir. Ensuring financial statements comply with GAAP relates to financial audits, which determine the accuracy of financial statements.", "cmt_en": ""}, {"tr": "Bir kuruluşun operasyonlarının verimliliğini ve etkinliğini değerlendirmek.", "en": "Assess the efficiency and effectiveness of an organization's operations.", "cmt_tr": "Operasyonel denetimler, bir kuruluşun operasyonlarının verimliliğini ve etkinliğini değerlendirir; süreçleri ve organizasyonel birimlerin ne kadar etkili iş birliği yaptığını değerlendirir. Operational audits assess the efficiency and effectiveness of an organization's operations, evaluating processes and organizational unit collaboration.", "cmt_en": ""}, {"tr": "Düzenleyici uyum gerekliliklerine bağlılığı doğrulamak.", "en": "Verify adherence to regulatory compliance requirements.", "cmt_tr": "Uyum denetimleri, kural ve yönetmeliklere bağlılığı belirler. Compliance audits determine adherence to rules and regulations.", "cmt_en": ""}, {"tr": "Organizasyonel kültürün performans üzerindeki etkilerini değerlendirmek.", "en": "Evaluate the effects of organizational culture on performance.", "cmt_tr": "Organizasyonel kültürün etkilerinin değerlendirilmesi, organizasyonel kültür denetiminin bir parçasıdır. Evaluating the effects of organizational culture is part of an organizational culture audit.", "cmt_en": ""}]}, {"q_tr": "Operasyonel denetimde program sonuçları denetimine örnek olan hangisidir?", "q_en": "Which of the following is an example of a program-results engagement in operational auditing?", "answer": 2, "options": [{"tr": "Çevre mevzuatına uyumun değerlendirilmesi.", "en": "Evaluating compliance with environmental regulations.", "cmt_tr": "Uyum denetimi, çevre mevzuatına uyumun değerlendirilmesini içerebilir. A compliance audit may include evaluating compliance with environmental regulations.", "cmt_en": ""}, {"tr": "Devam eden üretim hattı için yeni ekipman alımının değerlendirilmesi.", "en": "Assessing the acquisition of new equipment for an ongoing production line.", "cmt_tr": "Devam eden bir operasyonel faaliyet, belirli bir program değil. An ongoing operational activity, not a specific program.", "cmt_en": ""}, {"tr": "Yeni uygulanan müşteri elde tutma programının sonuçlarının ölçülmesi.", "en": "Measuring the outcomes of a newly implemented customer retention program.", "cmt_tr": "Program sonuçları denetimleri, yeni bir müşteri elde tutma programı gibi kuruluşun normal operasyonlarının parçası olmayan programların başarısını ölçer. Program-results engagements measure the success of programs not part of regular operations, such as a new customer retention program.", "cmt_en": ""}, {"tr": "Önemli yanlış beyanlar için finansal raporların incelenmesi.", "en": "Reviewing the financial reports for material misstatements.", "cmt_tr": "Finansal denetimler, finansal tabloları değerlendirir. Financial audits evaluate financial statements.", "cmt_en": ""}]}, {"q_tr": "Operasyonel denetimin etkinliğini değerlendirmek için kullanılmayan ölçüt hangisidir?", "q_en": "Which of the following is NOT a measure used to assess the effectiveness of an operational audit?", "answer": 2, "options": [{"tr": "Verimlilik oranı.", "en": "Productivity ratio.", "cmt_tr": "Verimlilik oranı, operasyonel denetimlerde etkinliği değerlendirmek için kullanılır. The productivity ratio is used in operational audits to assess effectiveness.", "cmt_en": ""}, {"tr": "Kaynak kullanım oranı.", "en": "Resource usage rate.", "cmt_tr": "Kaynak kullanım oranı, operasyonel verimliliği değerlendirmeye yardımcı olur. The resource usage rate helps assess operational efficiency.", "cmt_en": ""}, {"tr": "Özkaynak karlılığı.", "en": "Return on equity.", "cmt_tr": "Özkaynak karlılığı (ROE), operasyonel verimlilik veya etkinliğe özgü değil, hissedar getirileriyle ilgili genel bir finansal performans ölçüsüdür. Return on equity (ROE) is a general financial performance measure relating to shareholder returns, not specifically applicable to operational efficiency or effectiveness.", "cmt_en": ""}, {"tr": "İşletme oranı.", "en": "Operating ratio.", "cmt_tr": "İşletme oranı, kaynaklara göre operasyonel verimliliği yansıtır. The operating ratio reflects operational efficiency in respect to resources.", "cmt_en": ""}]}, {"q_tr": "Operasyonel denetimin birincil amacı nedir?", "q_en": "The primary objective of an operational audit is to?", "answer": 2, "options": [{"tr": "Finansal tablo doğruluğunu doğrulamak.", "en": "Verify financial statement accuracy.", "cmt_tr": "Finansal tablo doğruluğunu doğrulamak, finansal denetimlerin amacıdır. Verifying financial statement accuracy is the purpose of financial audits.", "cmt_en": ""}, {"tr": "Yasa ve yönetmeliklere uyumu değerlendirmek.", "en": "Assess compliance with laws and regulations.", "cmt_tr": "Uyum denetimleri, yasal ve düzenleyici gerekliliklere bağlılığı değerlendirir; operasyonel verimliliği değil. Compliance audits assess adherence to laws and regulations, not operational efficiency.", "cmt_en": ""}, {"tr": "Operasyonların verimliliğini ve etkinliğini değerlendirmek.", "en": "Evaluate the efficiency and effectiveness of operations.", "cmt_tr": "Operasyonel denetim, bir kuruluşun operasyonlarının verimliliğini ve etkinliğini değerlendirir. Vurgu, organizasyonel birimlerin nasıl iş birliği yaptığı ve hedeflere nasıl ulaştığı üzerinedir. An operational audit assesses the efficiency and effectiveness of an organization's operations, focusing on how organizational units cooperate and achieve their objectives.", "cmt_en": ""}, {"tr": "İç politikalara uyumu sağlamak.", "en": "Ensure adherence to internal policies.", "cmt_tr": "İç politikalara uyumu sağlamak, uyum denetiminin bir amacıdır. Ensuring adherence to internal policies is an objective of compliance auditing.", "cmt_en": ""}]}], "SU2 - Compliance Auditing": [{"q_tr": "Çalışanlar hangi tarafından izlenen bir ihbar hattına en çok güven duyar?", "q_en": "Employees have the most confidence in a hotline monitored by which of the following?", "answer": 2, "options": [{"tr": "İntikam almama politikasıyla desteklenen hukuk departmanından bir uzman.", "en": "An expert from the legal department, backed by a nonretaliation policy.", "cmt_tr": "Çalışanlar, hukuk departmanı tarafından yanıtlanan ihbar hatlarına çok az güven duyar. Employees have little confidence in hotlines answered by the legal department.", "cmt_en": ""}, {"tr": "İntikam alma politikasıyla desteklenen kurum içi temsilci.", "en": "An in-house representative, backed by a retaliation policy.", "cmt_tr": "İntikam alma politikası, olası misilleme endişesiyle ihbarcıların ortaya çıkmasını engelleyecektir. A retaliation policy would dissuade whistleblowers from coming forth due to concern over possible backlash.", "cmt_en": ""}, {"tr": "İntikam almama politikasıyla desteklenen kurum içi temsilci.", "en": "An in-house representative, backed by a nonretaliation policy.", "cmt_tr": "Çalışanlar, ihbar hatlarını kurum içi temsilcinin yanıtlaması ve bunun intikam almama politikasıyla desteklenmesi durumunda güvenmektedir. Employees may have confidence in hotlines answered by an in-house representative backed by a nonretaliation policy.", "cmt_en": ""}, {"tr": "Avukat-müvekkil gizliliğini daha iyi koruyabilecek harici bir avukat.", "en": "An off-site attorney who can better protect attorney-client privilege.", "cmt_tr": "Çalışanlar, hukuk departmanı veya harici bir hizmet sağlayıcı tarafından izlenen ihbar hatlarına çok az güven duyar. Employees have little confidence in hotlines monitored by the legal department or by an external service provider.", "cmt_en": ""}]}, {"q_tr": "Uyum standartları ve prosedürleri ile yazılı iş davranış kuralları hakkında doğru olan hangisidir?", "q_en": "An organization establishes compliance standards and a written business code of conduct. Which statement is true?", "answer": 0, "options": [{"tr": "Uyum standartları basit ve suç davranışı olasılığını makul ölçüde azaltabilecek nitelikte olmalıdır.", "en": "Compliance standards should be straightforward and reasonably capable of reducing the prospect of criminal conduct.", "cmt_tr": "Davranış kuralları, yasaklanan faaliyetleri açıkça belirtmeli ve uyum standartları kasıtlı ihlalleri caydıracak biçimde basit olmalıdır. The code of conduct should clearly identify prohibited activities, and compliance standards should be straightforward to discourage intentional violations.", "cmt_en": ""}, {"tr": "Uyum standartları denetim komitesinin tüzüğüne kodlanmalıdır.", "en": "The compliance standards should be codified in the charter of the audit committee.", "cmt_tr": "Denetim komitesi tüzüğünün uyum standartlarını fiilen kodlaması uygun değildir; tüzük yalnızca uyumun izlenmesi sürecini ele almalıdır. Actually codifying the compliance standards in the audit committee's charter is inappropriate; the charter should address reviewing the process for monitoring compliance.", "cmt_en": ""}, {"tr": "Uluslararası operasyonlara sahip şirketler, seçici coğrafi konumlara dayalı çeşitli uyum programları oluşturmalıdır.", "en": "Companies with international operations should institute various compliance programs based on selective geographic locations.", "cmt_tr": "Uluslararası operasyonlara sahip şirketler, seçici coğrafi konumlar için değil, küresel bazda bir uyum programı oluşturmalıdır. Companies with international operations should institute a compliance program on a global basis, not just for selective geographic locations.", "cmt_en": ""}, {"tr": "Gelecekteki hukuki yükümlülükleri önlemek için kural, hukuki terim ve tanımlardan oluşmalıdır.", "en": "In order to prevent future legal liability, the code should consist of legal terms and definitions.", "cmt_tr": "Kural, tüm çalışanların anlayabileceği bir dilde yazılmalı; hukuk dili kullanılmamalıdır. The code should be written in a language that all employees can understand, avoiding legalese.", "cmt_en": ""}]}, {"q_tr": "Bir kuruluşta etik dışı veya yasadışı faaliyeti ortaya çıkarmak için etkili bir araç hangisidir?", "q_en": "Which of the following is an effective tool for uncovering unethical or illegal activity in an organization?", "answer": 3, "options": [{"tr": "Adayların taranması.", "en": "The screening of applicants.", "cmt_tr": "Adayların işe alım için taranması, geçmişteki suç faaliyetini tespit etmenin bir yoludur; devam eden yasadışı faaliyeti ortaya çıkarmaz. Screening applicants is a way to detect past criminal activity; it does not uncover ongoing unethical or illegal activity.", "cmt_en": ""}, {"tr": "Etik görüşmesi.", "en": "The ethics interview.", "cmt_tr": "Etik görüşmesi, bir çalışanda rahatsızlığa neden olabilir; çalışan, görüşmenin etik anketi kadar gizli olduğuna inanmayabilir. An ethics interview may cause discomfort, and an employee may not believe the interview is as confidential as an ethics questionnaire.", "cmt_en": ""}, {"tr": "Geçmiş araştırması.", "en": "The background check.", "cmt_tr": "Geçmiş araştırması, geçmişteki suistimalleri tespit etmenin bir yoludur; devam eden yasadışı faaliyetleri değil. The background check is a way to detect past wrongdoing, not ongoing unethical or illegal activities.", "cmt_en": ""}, {"tr": "Etik anketi.", "en": "The ethics questionnaire.", "cmt_tr": "Etik dışı veya yasadışı faaliyeti ortaya çıkarmak için etkili bir araç, etik anketidir. Kuruluşun her çalışanı, rüşvet, ödül veya diğer suistimallerden haberdar olup olmadığını soran bir anket almalıdır. The ethics questionnaire is effective for uncovering unethical or illegal activity. Each employee should receive a questionnaire asking whether they are aware of kickbacks, bribes, or other wrongdoing.", "cmt_en": ""}]}, {"q_tr": "Kıdemli yönetim, çalışan sosyal hakları paketinin uyum denetimini talep etti. Her iki tarafın da birincil denetim amacı nedir?", "q_en": "Senior management requested a compliance audit of the organization's employee benefits package. What is the primary engagement objective for both the CAE and senior management?", "answer": 1, "options": [{"tr": "Organizasyonun katkı düzeyi programın taleplerini karşılamak için yeterlidir.", "en": "The level of organizational contributions is adequate to meet the program's demands.", "cmt_tr": "Katkılar, uyum ile yasalar, yönetmelikler ve sözleşmelerle birincil amaca tabi spesifik denetim hedefleriyle ilgilidir. Contributions relate to specific engagement objectives subordinate to the primary objective of compliance with laws, regulations, and contracts.", "cmt_en": ""}, {"tr": "Bireysel programlar, sözleşme gereklilikleri ve devlet düzenlemeleri doğrultusunda işletilmektedir.", "en": "Individual programs are operating in accordance with contractual requirements and government regulations.", "cmt_tr": "Sözleşme ve düzenlemelere uyum, programların en temel yönleriyle ilgili olduğundan diğer tüm hedeflere önceliklidir. Operation in accordance with contracts and regulations takes precedence over all other objectives because it relates to the most basic aspects of the programs.", "cmt_en": ""}, {"tr": "Katılım düzeyleri bireysel programların devamını desteklemektedir.", "en": "Participation levels support continuation of individual programs.", "cmt_tr": "Katılım düzeyleri, uyum ile yasalar, yönetmelikler ve sözleşmelerle birincil amaca tabi spesifik denetim hedefleriyle ilgilidir. Participation levels relate to specific engagement objectives subordinate to the primary objective of compliance with laws, regulations, and contracts.", "cmt_en": ""}, {"tr": "Haklar ödemeleri, uygun olduğunda, doğru ve zamanındadır.", "en": "Benefit payments, when appropriate, are accurate and timely.", "cmt_tr": "Haklar ödemeleri, uyum ile yasalar, yönetmelikler ve sözleşmelerle birincil amaca tabi spesifik denetim hedefleriyle ilgilidir. Benefit payments relate to specific engagement objectives subordinate to the primary objective of compliance with laws, regulations, and contracts.", "cmt_en": ""}]}, {"q_tr": "Uyum programları kuruluşlara en doğrudan nasıl yardımcı olur?", "q_en": "Compliance programs most directly assist organizations by doing which of the following?", "answer": 1, "options": [{"tr": "İş sürekliliği yönetimi için bir plan geliştirmek.", "en": "Developing a plan for business continuity management.", "cmt_tr": "İş sürekliliği yönetimi için bir plan geliştirmek, uyum programının değil, operasyonel bir faaliyettir. Developing a plan for business continuity management is an operational activity, not part of a compliance program.", "cmt_en": ""}, {"tr": "Yönetici ve yetkili sorumluluğunu belirlemek.", "en": "Determining director and officer liability.", "cmt_tr": "Uyum programları, yönetici ve yetkili sorumluluğunu belirlemeye yardımcı olur; ayrıca kasıtsız ihlalleri, yasadışı faaliyetleri caydırır ve sigortacılık taleplerinin kanıtlanmasına yardımcı olabilir. Compliance programs assist organizations in determining director and officer liability, preventing inadvertent violations, and proving insurance claims.", "cmt_en": ""}, {"tr": "Kalite süreçlerinin planlandığı gibi işlediğini güvence altına almak.", "en": "Assuring that quality processes are operating as planned.", "cmt_tr": "Kalite süreçlerinin güvence altına alınması, uyum denetiminin değil, kalite denetiminin amacıdır. Assuring quality processes are operating is an objective of a quality audit, not a compliance program.", "cmt_en": ""}, {"tr": "Felaket kurtarma planlaması yapmak.", "en": "Planning for disaster recovery.", "cmt_tr": "Felaket kurtarma planlaması, uyum programının değil, operasyonel bir faaliyettir. Planning for disaster recovery is an operational activity, not part of a compliance program.", "cmt_en": ""}]}, {"q_tr": "Çalışanların disiplin süreçleri hangi durumlarda sınırlandırılabilir?", "q_en": "Discipline of employees may be limited by which of the following?", "answer": 3, "options": [{"tr": "Kuruluşun davranış kuralları politikaları.", "en": "The organization's code of conduct policies.", "cmt_tr": "Davranış kuralları p
