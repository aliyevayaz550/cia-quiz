ri sunabilir.", "cmt_en": "🇬🇧 Objectivity is presumed impaired if an internal auditor provides assurance services for an activity for which the auditor had responsibility within the previous year. George providing assurance services for payroll impairs his objectivity. However, advisory services relating to previous responsibilities are permitted."}, {"tr": "Güvence veya danışmanlık hizmetleri", "en": "Assurance or advisory services", "cmt_tr": "🇹🇷 Yalnızca güvence hizmetleri sunmak George'un bağımsızlığını veya nesnelliğini zedeler; danışmanlık hizmetleri değil.", "cmt_en": "🇬🇧 Only providing assurance services regarding payroll impairs George's independence or objectivity, not advisory services."}, {"tr": "Ne güvence ne de danışmanlık hizmetleri", "en": "Neither assurance nor advisory services", "cmt_tr": "🇹🇷 Bordroyla ilgili güvence hizmetleri sunmak nesnelliği zedeler. Yalnızca danışmanlık hizmetleri sunmak nesnelliği etkilemez.", "cmt_en": "🇬🇧 Providing assurance services regarding payroll does impair objectivity. Only advisory services do not impair objectivity."}]}, {"q_tr": "Danışmanlık görevi başlamadan önce veya görev sırasında bağımsızlık veya nesnellik zedelenmeleri ortaya çıkarsa ne yapılmalıdır?", "q_en": "If impairments of independence or objectivity exist prior to or develop during an advisory engagement, what action should be taken?", "answer": 0, "options": [{"tr": "Açıklama derhal görev müşterisine yapılmalıdır", "en": "Disclosure should be made immediately to the engagement client", "cmt_tr": "🇹🇷 İç denetçilerin önerilen danışmanlık hizmetleriyle ilgili olası bağımsızlık veya nesnellik zedelenmeleri varsa görevi kabul etmeden önce görev müşterisine açıklama yapılmalıdır.", "cmt_en": "🇬🇧 If internal auditors have potential impairments relating to proposed advisory services, disclosure must be made to the engagement client prior to accepting the engagement."}, {"tr": "Açıklama derhal yönetim kuruluna yapılmalıdır", "en": "Disclosure should be made immediately to the board", "cmt_tr": "🇹🇷 Açıklama danışmanlık hizmetlerinden faydalanan taraf olduğundan yönetim kuruluna değil görev müşterisine yapılmalıdır.", "cmt_en": "🇬🇧 Disclosure should be made to the engagement client, as it is the party benefiting from the advisory services, not to the board."}, {"tr": "Açıklama derhal dış denetçilere yapılmalıdır", "en": "Disclosure should be made immediately to the external auditors", "cmt_tr": "🇹🇷 Dış denetçilere herhangi bir açıklama yapılmasına gerek yoktur.", "cmt_en": "🇬🇧 No disclosure need be made to the external auditors."}, {"tr": "İç denetçi görevden çekilmelidir", "en": "The internal auditor should withdraw from the engagement", "cmt_tr": "🇹🇷 Bilgilendirilmiş bir görev müşterisi, bağımsızlık veya nesnellik zedelenmesine itiraz etmeyebilir.", "cmt_en": "🇬🇧 An informed engagement client may not object to an impairment of independence or objectivity, so withdrawal is not necessarily required."}]}, {"q_tr": "İç denetim, yeni bir bilgi sistemi için resmi bir danışmanlık görevi yürüttü. YDY altı ay sonra bu sistem için güvence hizmetleri sunması istendi. Uygun bir sonraki adım hangisidir?", "q_en": "Internal audit performed a formal advisory engagement for a new information system. Six months later, the CAE was asked to provide assurance services. What is the appropriate next step?", "answer": 1, "options": [{"tr": "Çıkar çatışması olduğundan görevi derhal reddetmek", "en": "Immediately refuse the engagement because it is a conflict of interest", "cmt_tr": "🇹🇷 Zedelenmenin etkisini azaltmak için adımlar atılabilir.", "cmt_en": "🇬🇧 Steps may be taken to mitigate the impairment; immediate refusal is not required."}, {"tr": "Yönetime ve yönetim kuruluna bağımsızlık ve nesnelliğin zarar görmüş olabileceğini bildirmek; ancak riski azaltmak için adımlar atılabileceğini açıklamak", "en": "Inform management and board that independence and objectivity may be impaired, but steps can be taken to minimize this risk", "cmt_tr": "🇹🇷 Bağımsızlık ve nesnellik, resmi bir danışmanlık görevinden sonraki 1 yıl içinde güvence hizmetleri sunulursa zarar görmüş sayılabilir. Zararın etkisi; farklı denetçiler atamak, bağımsız yönetim oluşturmak, ayrı sorumluluk tanımlamak ve tahmini zararı açıklamak yoluyla azaltılabilir.", "cmt_en": "🇬🇧 Independence and objectivity may be impaired if assurance services are provided within 1 year after a formal advisory engagement. The effects may be minimized by assigning different auditors, establishing independent management, defining separate accountability, and disclosing the presumed impairment."}, {"tr": "Denetimi gerçekleştirmek üzere bir dış denetçi işe alma sürecini başlatmak", "en": "Begin the process of hiring an external auditor to perform the audit", "cmt_tr": "🇹🇷 Zedelenmenin etkisini azaltmak için adımlar atılabilir; dış denetçi tutmak zorunlu değildir.", "cmt_en": "🇬🇧 Steps may be taken to mitigate the impairment; hiring an external auditor is not mandatory."}, {"tr": "Yönetime ve yönetim kuruluna danışmanlık görevinden en az 1 yıl beklenmesi gerektiğini bildirmek", "en": "Inform management and board that waiting at least 1 year after the advisory engagement is necessary", "cmt_tr": "🇹🇷 Zedelenmenin etkisini azaltmak için adımlar atılabilir; 1 yıl bekleme zorunlu değildir.", "cmt_en": "🇬🇧 Steps may be taken to mitigate the impairment; waiting exactly 1 year is not the only option."}]}, {"q_tr": "İncelenen bir süreçte küçük bir iç kontrol zayıflığı tespit eden iç denetçi bu gözlemi kime bildirmelidir?", "q_en": "An internal auditor observed a minor internal control weakness during an advisory engagement. The auditor should communicate this observation to", "answer": 3, "options": [{"tr": "Yönetim kurulu", "en": "The board", "cmt_tr": "🇹🇷 Gözlemlenen iç kontrol zayıflıkları yalnızca önemli ve maddi nitelikte ise yönetim kuruluna iletilmelidir.", "cmt_en": "🇬🇧 Observed internal control weaknesses should only be communicated to the board if the weakness is significant and material in nature."}, {"tr": "Üst yönetim", "en": "Senior management", "cmt_tr": "🇹🇷 Gözlemlenen iç kontrol zayıflıkları yalnızca önemli ve maddi nitelikte ise üst yönetime iletilmelidir.", "cmt_en": "🇬🇧 Observed internal control weaknesses should only be communicated to senior management if the weakness is significant and material in nature."}, {"tr": "Denetim komitesi", "en": "The audit committee", "cmt_tr": "🇹🇷 Gözlemlenen iç kontrol zayıflıkları yalnızca önemli ve maddi nitelikte ise denetim komitesine iletilmelidir.", "cmt_en": "🇬🇧 Observed internal control weaknesses should only be communicated to the audit committee if the weakness is significant and material in nature."}, {"tr": "Yönetim", "en": "Management", "cmt_tr": "🇹🇷 İç denetçiler danışmanlık görevleri sırasında iç kontrol süreçlerinin etkinliğine karşı uyanık olmalıdır. Önemli maddi kontrol zayıflıkları yönetime bildirilir. Bu durumda kontrol zayıflığı küçük niteliktedir; bu nedenle yönetimi bilgilendirmek uygun eylemdir.", "cmt_en": "🇬🇧 Internal auditors should be aware of internal control process effectiveness during advisory engagements. Substantial material control weaknesses are reported to management. In this situation, the weakness is minor; therefore informing management is the appropriate action."}]}, {"q_tr": "Danışmanlık ve güvence görevleri için hedefler nasıl belirlenir?", "q_en": "Which statement describes how objectives are set for advisory and assurance engagements?", "answer": 0, "options": [{"tr": "Danışmanlık görevinde hedefler ve kapsam genellikle iç denetçiler ve incelenen faaliyetin yönetimi tarafından ortaklaşa belirlenir", "en": "In an advisory engagement, objectives and scope are ordinarily set jointly by internal auditors and management of the reviewed activity", "cmt_tr": "🇹🇷 Danışmanlık görevinde hedefler ve kapsam genellikle iç denetçiler ve incelenen faaliyetin yönetimi tarafından ortaklaşa belirlenir.", "cmt_en": "🇬🇧 In an advisory engagement, the objectives and scope are ordinarily set jointly by the internal auditors and management of the reviewed activity."}, {"tr": "Güvence görevinde hedefler öncelikle incelenen faaliyetin yönetimi tarafından belirlenir", "en": "In an assurance engagement, objectives are primarily set by management of the reviewed activity", "cmt_tr": "🇹🇷 Güvence görevinde hedefler öncelikle iç denetçiler tarafından belirlenir; yönetim tarafından değil.", "cmt_en": "🇬🇧 In an assurance engagement, the objectives are primarily set by the internal auditors, not management of the reviewed activity."}, {"tr": "Danışmanlık görevinde hedefler öncelikle iç denetçiler tarafından belirlenir", "en": "In an advisory engagement, objectives are set primarily by the internal auditors", "cmt_tr": "🇹🇷 Güvence görevinde hedefler öncelikle iç denetçiler tarafından belirlenir; danışmanlık görevinde ise ortaklaşa belirlenir.", "cmt_en": "🇬🇧 In an assurance engagement (not advisory), the objectives are primarily set by the internal auditors. Advisory engagement objectives are set jointly."}, {"tr": "Güvence görevinde hedefler iç denetçiler ve yönetim tarafından ortaklaşa belirlenir", "en": "In an assurance engagement, objectives are set jointly by the internal auditors and management", "cmt_tr": "🇹🇷 Güvence görevinde hedefler öncelikle iç denetçiler tarafından belirlenir; ortaklaşa değil.", "cmt_en": "🇬🇧 In an assurance engagement, the objectives are primarily set by the internal auditors, not set jointly with management."}]}, {"q_tr": "Bir iç denetçinin danışmanlık görevinde gereken özeni göstermesinin bir yolu nedir?", "q_en": "One of the ways that an internal auditor exercises due professional care in conducting an advisory engagement is by", "answer": 3, "options": [{"tr": "Yönetim yetkililerinin tam olarak istediğini ve ihtiyaç duyduğunu sağlamak", "en": "Providing exactly what management officials want and need", "cmt_tr": "🇹🇷 İç denetçiler yönetimin isteklerini ve ihtiyaçlarını anlamalıdır; ancak bunların tamamını sağlayamayabilirler. Örneğin görev, süreçlerdeki beklenmedik eksiklikleri ortaya çıkarabilir.", "cmt_en": "🇬🇧 Internal auditors should understand what management wants and needs, but cannot necessarily provide that; e.g., the engagement may uncover unexpected deficiencies."}, {"tr": "Yıllık denetim planı tamamlandıktan sonra istenen danışmanlık görevlerini derhal dış kaynaklara devretmek", "en": "Immediately outsourcing advisory engagements requested after the annual audit plan has been finalized", "cmt_tr": "🇹🇷 YDY, dış kaynak kullanmayı düşünmeden önce istenen danışmanlık görevlerinin görece değerini belirlemelidir.", "cmt_en": "🇬🇧 The CAE should determine the relative value of requested advisory engagements and prioritize accordingly before considering outsourcing."}, {"tr": "Görevden kesinlikle elde edilecek faydaları gösteren ayrıntılı bir iş gerekçesi talep etmek", "en": "Requesting a detailed business case showing the benefits that will definitely accrue", "cmt_tr": "🇹🇷 Ayrıntılı bir iş gerekçesi gerekli olmayabilir ve kesin faydaları önceden tahmin etmek mümkün değildir.", "cmt_en": "🇬🇧 A detailed business case may not be necessary, and it is impossible to predict definitive benefits in advance."}, {"tr": "Hizmet talep edenlerin olası motivasyonlarını anlamak", "en": "Understanding the possible motivations of those requesting the service", "cmt_tr": "🇹🇷 Danışmanlık fonksiyonu gerekli özeni şu şekilde gösterir: (1) yönetim yetkililerinin ihtiyaçlarını, (2) hizmet talep edenlerin olası motivasyonlarını, (3) hedeflere ulaşmak için gereken çalışma kapsamını, (4) gerekli becerileri ve kaynakları, (5) denetim planı üzerindeki etkiyi, (6) gelecekteki görevler üzerindeki olası etkileri ve (7) olası organizasyonel faydaları anlamak.", "cmt_en": "🇬🇧 Due professional care includes understanding: (1) needs of management officials, (2) possible motivations of those requesting the service, (3) extent of work needed, (4) skills and resources needed, (5) effect on approved audit plan, (6) potential effects on future assignments, and (7) potential organizational benefits."}]}, {"q_tr": "İç denetçiler danışmanlık hizmetlerini sunarken neden bağımsızlık ve nesnelliği korumalıdır?", "q_en": "Internal auditors must maintain independence and objectivity when performing advisory services to", "answer": 1, "options": [{"tr": "Yönetimin iş stratejilerinin başarısını sağlamak", "en": "Ensure the success of management's business strategies", "cmt_tr": "🇹🇷 Yönetimi desteklemek faydalı olmakla birlikte, bağımsızlık ve nesnelliği korumanın temel amacı güvenilirliği sürdürmektir; stratejik başarıyı değil.", "cmt_en": "🇬🇧 Supporting management is beneficial, but the primary purpose of maintaining independence and objectivity is to maintain credibility, not ensure strategic success."}, {"tr": "Çıkar çatışmalarını önlemek ve mesleki güvenilirliği korumak", "en": "Prevent conflicts of interest and maintain professional credibility", "cmt_tr": "🇹🇷 İç denetçiler; yönetim kurulu onayını almak, tüzüğü güncellemek ve açık politikalar oluşturmak suretiyle bağımsızlık ve nesnelliklerini korur. Çıkar çatışmalarından kaçınarak rehberlik sağlarken güvenilirliklerini de muhafaza eder.", "cmt_en": "🇬🇧 Internal auditors maintain independence and objectivity by ensuring board approval, amending the charter, and establishing clear policies. They avoid conflicts of interest while preserving their credibility by adhering to these practices."}, {"tr": "Organizasyonun kârlılığını artırmak", "en": "Enhance the profitability of the organization", "cmt_tr": "🇹🇷 Bağımsızlık ve nesnellik dolaylı olarak kârlılığa katkıda bulunsa da bu özellikler kârlılıktan bağımsız olarak zorunludur.", "cmt_en": "🇬🇧 Although indirectly contributing to profitability, independence and objectivity are required regardless of profitability levels."}, {"tr": "Ayrıntılı finansal analiz ve tahmin sunmak", "en": "Provide detailed financial analysis and forecasting", "cmt_tr": "🇹🇷 İç denetçiler genellikle finansal analizden sorumlu değildir. Bağımsızlıkları, organizasyonel konularda tarafsız rehberlik sağlamalarını güvence altına alır.", "cmt_en": "🇬🇧 Internal auditors are not typically responsible for financial analysis. Their independence ensures unbiased guidance on organizational issues."}]}], "Subunit 3 - Benchmarking": [{"q_tr": "Dahili finansal olmayan kıyaslamaya örnek nedir?", "q_en": "An example of an internal nonfinancial benchmark is", "answer": 3, "options": [{"tr": "Büyük bir rakibin tesisindeki benzer nitelikli çalışanların ücret oranı", "en": "The labor rate of comparably skilled employees at a major competitor's plant", "cmt_tr": "🇹🇷 Rakibin tesisindeki ücret oranı finansal bir ölçümdür; finansal olmayan bir kıyaslama değil.", "cmt_en": "🇬🇧 The labor rate at a competitor's plant is a financial measure, not a nonfinancial benchmark."}, {"tr": "Şirketin en verimli tesisindeki belirli bir ürünün birim başına ortalama fiili maliyeti", "en": "The average actual cost per pound of a specific product at the company's most efficient plant", "cmt_tr": "🇹🇷 Birim başına ortalama fiili maliyet finansal bir ölçümdür.", "cmt_en": "🇬🇧 The average actual cost per pound is a financial measure, not a nonfinancial benchmark."}, {"tr": "Her tesiste çalışan eğitim programları maliyetine getirilen 50.000 dolar sınırı", "en": "A $50,000 limit on the cost of employee training programs at each plant", "cmt_tr": "🇹🇷 50.000 dolar eğitim maliyeti sınırı finansal bir ölçümdür.", "cmt_en": "🇬🇧 A $50,000 limit on training costs is a financial measure, not a nonfinancial benchmark."}, {"tr": "Şirketin en verimli tesisinde zamanında teslim edilen müşteri siparişlerinin yüzdesi", "en": "The percentage of customer orders delivered on time at the company's most efficient plant", "cmt_tr": "🇹🇷 Kıyaslama; en iyi sınıftaki organizasyonların uygulamalarının sürekli değerlendirilmesidir. Zamanında teslim edilen sipariş yüzdesi dahili, finansal olmayan bir kıyaslama örneğidir.", "cmt_en": "🇬🇧 Benchmarking involves continuous evaluation of best-in-class organizations. The percentage of orders delivered on time is an example of an internal nonfinancial benchmark."}]}, {"q_tr": "Şube mağaza finansal raporlamasının doğruluğunu değerlendirmek için bir mağazayı kıyaslayan şirket, aşağıdaki finansal kıyaslama ölçütlerinden hangisini kullanmalıdır?", "q_en": "A company benchmarking a store for accuracy of branch financial reporting. Which is most likely to be included in a financial benchmark?", "answer": 2, "options": [{"tr": "Yüksek çalışan devir hızı", "en": "High turnover of employees", "cmt_tr": "🇹🇷 Çalışan devir hızı finansal bir kıyaslama değildir.", "cmt_en": "🇬🇧 Turnover of employees is not a financial benchmark."}, {"tr": "Çalışanların bütçe belirlemeye yüksek katılımı", "en": "High level of employee participation in setting budgets", "cmt_tr": "🇹🇷 Bütçe belirlemeye çalışan katılımı finansal bir kıyaslama değildir.", "cmt_en": "🇬🇧 Employee participation in setting budgets is not a financial benchmark."}, {"tr": "Yüksek miktarda şüpheli alacak silmesi", "en": "High amount of bad debt write-offs", "cmt_tr": "🇹🇷 Tahsil edilemeyen alacak olarak silinen borçların düzeyi finansal bir kıyaslamadır. Kıyaslama sınırını aşan bir düzey, finansal raporların doğruluğunu etkileyen sahtekârlığa işaret edebilir.", "cmt_en": "🇬🇧 The level of bad debts written off is a benchmark in financial terms. A level exceeding the benchmark could indicate fraud, compromising financial reporting accuracy."}, {"tr": "Yüksek sayıda tedarikçi", "en": "High number of suppliers", "cmt_tr": "🇹🇷 Tedarikçi sayısı finansal bir kıyaslama değildir.", "cmt_en": "🇬🇧 The number of suppliers is not a financial benchmark."}]}, {"q_tr": "Aşağıdakilerden hangisi genel kıyaslamayı en iyi tanımlar?", "q_en": "Which of the following best describes generic benchmarking?", "answer": 2, "options": [{"tr": "Aynı sektördeki bir organizasyonun incelenmesi", "en": "Studying an organization in the same industry", "cmt_tr": "🇹🇷 Aynı sektördeki bir organizasyonun incelenmesi rekabetçi kıyaslamadır; genel kıyaslama değil.", "cmt_en": "🇬🇧 Studying an organization in the same industry is competitive benchmarking, not generic benchmarking."}, {"tr": "Organizasyonun bir süreci nasıl gerçekleştirdiğini optimize etmenin yollarını belirleme", "en": "Identifying ways to optimize how the organization performs a process", "cmt_tr": "🇹🇷 Organizasyonun süreci nasıl gerçekleştirdiğini optimize etme süreç veya fonksiyonel kıyaslamadır; genel kıyaslama değil.", "cmt_en": "🇬🇧 Identifying ways to optimize how the organization performs a process is process or functional benchmarking, not generic."}, {"tr": "Sektörden bağımsız olarak benzer süreçlere sahip organizasyonların operasyonlarını inceleme", "en": "Studying operations of organizations with similar processes regardless of industry", "cmt_tr": "🇹🇷 Genel kıyaslama; sektörden bağımsız olarak benzer süreçlere sahip organizasyonların operasyonlarını inceler. Bu nedenle kıyaslama organizasyonu rakip veya benzer bir kuruluş olmak zorunda değildir.", "cmt_en": "🇬🇧 Generic benchmarking studies the operations of organizations with similar processes regardless of industry. The benchmark need not be a competitor or similar organization."}, {"tr": "Organizasyonun bir bölümündeki en iyi uygulamaları diğer bölümlerine aktarma", "en": "Applying best practices in one part of the organization to its other parts", "cmt_tr": "🇹🇷 Organizasyonun bir bölümündeki en iyi uygulamaları diğer bölümlerine aktarmak dahili kıyaslamadır; genel kıyaslama değil.", "cmt_en": "🇬🇧 Applying best practices in one part of the organization to its other parts is internal benchmarking, not generic."}]}, {"q_tr": "İç denetim, bir mağaza zincirinin sevkiyat ve teslimat departmanını denetlemektedir. En uygun araç hangisidir?", "q_en": "The internal audit function undertakes an audit of the shipping and receiving department of a department store chain. The best engagement tool is", "answer": 3, "options": [{"tr": "Rekabetçi kıyaslama", "en": "Competitive benchmarking", "cmt_tr": "🇹🇷 Rekabetçi kıyaslama aynı sektördeki kuruluşlarla sınırlıdır.", "cmt_en": "🇬🇧 Competitive benchmarking is restricted to entities in the same industry."}, {"tr": "Stratejik kıyaslama", "en": "Strategic benchmarking", "cmt_tr": "🇹🇷 Stratejik kıyaslama, başarılı rekabet stratejilerini aramadır.", "cmt_en": "🇬🇧 Strategic benchmarking is a search for successful competitive strategies."}, {"tr": "Dahili kıyaslama", "en": "Internal benchmarking", "cmt_tr": "🇹🇷 Merkezi bir sevkiyat ve teslimat departmanı için en iyi uygulamalar büyük olasılıkla şirket içindeki başka bir yerde bulunmaz.", "cmt_en": "🇬🇧 Best practices for a centralized shipping and receiving department are not likely to be found elsewhere within the same entity."}, {"tr": "Süreç kıyaslaması", "en": "Process benchmarking", "cmt_tr": "🇹🇷 Süreç kıyaslaması; sektörden bağımsız olarak benzer süreçlere sahip organizasyonların operasyonlarını inceler. Sevkiyat ve teslimat işlevleri için en iyi uygulamalar aynı sektörde bulunamayabilir; bu nedenle süreç kıyaslaması en uygun araçtır.", "cmt_en": "🇬🇧 Process benchmarking studies operations of organizations with similar processes regardless of industry. Best practices for shipping and receiving may not be found in the same industry, making process benchmarking the best tool."}]}, {"q_tr": "Kıyaslama, mevcut operasyon performansını rakip organizasyonlarla ilgili hangi faktörle karşılaştırır?", "q_en": "Benchmarking compares the current performance of operations to which factor related to competing organizations?", "answer": 1, "options": [{"tr": "Performans ölçütleri geliştirmenin standart maliyeti", "en": "Standard cost of developing performance measures", "cmt_tr": "🇹🇷 Kıyaslama sürekli bir süreçtir. Operasyon performansı, performans ölçütleri geliştirmenin standart maliyetiyle değil; rakip organizasyonların performansıyla karşılaştırılmalıdır.", "cmt_en": "🇬🇧 Benchmarking is an ongoing process. Operations performance should be compared with competing organizations' performance, not the standard cost of developing performance measures."}, {"tr": "Mevcut performans ölçütleri", "en": "Current performance measures", "cmt_tr": "🇹🇷 Kıyaslama, anahtar çıktıların en iyi organizasyonlara göre analiz ve ölçümünü içerir. Rekabetçi kıyaslama, aynı sektördeki bir organizasyonu inceler. Bu nedenle mevcut operasyon performansını rakiplerin mevcut performansıyla karşılaştırmak en uygun kıyaslama biçimidir.", "cmt_en": "🇬🇧 Benchmarking involves analysis and measurement of key outputs against best organizations. Competitive benchmarking studies organizations in the same industry. Comparing current performance with competing organizations' current performance is the most appropriate form."}, {"tr": "Önceki performans ölçütleri", "en": "Prior performance measures", "cmt_tr": "🇹🇷 Rakip organizasyonların önceki performans ölçütleri güncel olmayabilir ve mevcut operasyon performansı için doğru bir kıyaslama sağlamayabilir.", "cmt_en": "🇬🇧 Prior performance measures of competing organizations are likely outdated and not an accurate benchmark for current operations performance."}, {"tr": "Beklenen gelecekteki performans ölçütleri", "en": "Anticipated future performance measures", "cmt_tr": "🇹🇷 Beklenen gelecek performans ölçütleri gelecekteki performansa odaklanır. Gelecek performansı mevcut operasyon performansıyla karşılaştırmak uygun değildir.", "cmt_en": "🇬🇧 Anticipated future performance measures focus on future performance. It is inappropriate to compare future performance with current operations performance."}]}, {"q_tr": "Kıyaslama sürecinde ekibin önerilerini gerekçelendirmesi gereken aşama hangisidir?", "q_en": "The phase of the benchmarking process in which the team must be able to justify its recommendations is the", "answer": 1, "options": [{"tr": "Kıyaslama projelerini önceliklendirme aşaması", "en": "Prioritize benchmarking projects phase", "cmt_tr": "🇹🇷 Kıyaslama projelerinin önceliklendirildiği aşama, işletmelerin temel iş süreçlerini ve itici güçlerini anlamasının gerektiği aşamadır.", "cmt_en": "🇬🇧 The phase in which benchmarking projects are prioritized is when businesses must understand key business processes and drivers."}, {"tr": "Uygulama aşaması", "en": "Implementation phase", "cmt_tr": "🇹🇷 Kıyaslama sürecinin uygulama aşamasında liderlik en önemli faktördür; çünkü ekip önerilerini gerekçelendirmelidir. Ayrıca süreç iyileştirme ekipleri onaylanan değişikliklerin uygulanmasını yönetmelidir.", "cmt_en": "🇬🇧 Leadership is most important in the implementation phase because the team must be able to justify its recommendations. Process improvement teams must also manage the implementation of approved changes."}, {"tr": "Veri analizi aşaması", "en": "Data analysis phase", "cmt_tr": "🇹🇷 Veri analizi aşamasında performans boşlukları belirlenir ve bu boşlukların nedenlerini anlamak için çalışılır.", "cmt_en": "🇬🇧 The data analysis phase entails identifying performance gaps and understanding the reasons they exist."}, {"tr": "Sınıfının en iyisi performansı araştırma ve belirleme aşaması", "en": "Researching and identifying best in class performance phase", "cmt_tr": "🇹🇷 Sınıfının en iyisi performansı araştırma ve belirleme aşamasında veri tabanları oluşturulur ve bilgi toplama yöntemleri kurulur.", "cmt_en": "🇬🇧 Researching and identifying best in class performance involves setting up databases and information-gathering methods."}]}, {"q_tr": "Benzer süreçlere sahip kuruluşların operasyonlarını inceleyerek organizasyonun işlevlerini optimize etmenin yollarını belirleyen yönteme ne denir?", "q_en": "A method that identifies ways to optimize functions by studying operations of entities with similar processes is called", "answer": 3, "options": [{"tr": "Süreç haritalama", "en": "Process mapping", "cmt_tr": "🇹🇷 Süreç haritalama; bir iş sürecindeki çeşitli adımları görselleştirmek ve analiz etmek için kullanılan bir yöntemdir. Kıyaslama ile aynı şey değildir.", "cmt_en": "🇬🇧 Process mapping is a method used to visualize and analyze steps in a business process. It is not the same as benchmarking."}, {"tr": "Yeniden yapılanma", "en": "Reengineering", "cmt_tr": "🇹🇷 Yeniden yapılanma, süreç inovasyonu ve çekirdek süreç yeniden tasarımını içerir. Mevcut prosedürleri geliştirmek yerine işleri yapmanın yeni yollarını bulur.", "cmt_en": "🇬🇧 Reengineering involves process innovation and core process redesign. It finds new ways of doing things instead of improving existing procedures."}, {"tr": "En iyi uygulama analizi", "en": "Best-practice analysis", "cmt_tr": "🇹🇷 En iyi uygulama analizi kıyaslamayla yakından ilgilidir. Kıyaslama, organizasyonun kendi süreçlerini diğer organizasyonların süreçleriyle de karşılaştırır.", "cmt_en": "🇬🇧 Best-practice analysis is closely related to benchmarking. Benchmarking compares an organization's processes with other organizations' processes as well as industry best practices."}, {"tr": "Kıyaslama", "en": "Benchmarking", "cmt_tr": "🇹🇷 Kıyaslama; bir faaliyetin şirket performansı ile sınıfının en iyi organizasyonunun performansı arasındaki farkın nicel ve nitel ölçümünü içeren süregelen bir süreçtir. Kıyaslama organizasyonunun doğrudan rakip olması gerekmez.", "cmt_en": "🇬🇧 Benchmarking is an ongoing process that entails quantitative and qualitative measurement of the difference between the company's performance and the best-in-class organization's performance. The benchmarking organization need not be a direct competitor."}]}, {"q_tr": "Kıyaslama hakkında hangisi doğrudur?", "q_en": "Which of the following is true of benchmarking?", "answer": 3, "options": [{"tr": "Kıyaslama genellikle bir organizasyonun en yakın rakipleriyle performansını karşılaştırarak gerçekleştirilir", "en": "Benchmarking is typically accomplished by comparing performance with the closest competitors", "cmt_tr": "🇹🇷 Kıyaslama, sektör liderleri veya dünya çapında üstün performans gösterenlerle karşılaştırmayı içerir; yalnızca en yakın rakiplerle değil.", "cmt_en": "🇬🇧 Benchmarking involves comparison with industry leaders or world-class operations, not just the closest competitors."}, {"tr": "Kıyaslama yalnızca nitel karşılaştırmalar kullanılarak yapılabilir", "en": "Benchmarking can be performed by using only qualitative comparisons", "cmt_tr": "🇹🇷 Kıyaslama hem nitel hem de nicel karşılaştırmalar kullanılarak yapılabilir; yalnızca birini seçmek gerekmez.", "cmt_en": "🇬🇧 Benchmarking may be performed using both qualitative and quantitative comparisons; a company need not choose just one."}, {"tr": "Kıyaslama normalde yalnızca üretim operasyonları ve üretim süreçleriyle sınırlıdır", "en": "Benchmarking is normally limited to manufacturing operations and production processes", "cmt_tr": "🇹🇷 Kıyaslama, bir organizasyonun tüm fonksiyonel alanlarına uygulanabilir. Üretim dışı fonksiyonlar genellikle küresel liderlerden öğrenerek daha büyük iyileştirme fırsatları sunar.", "cmt_en": "🇬🇧 Benchmarking may be applied to all functional areas. Nonmanufacturing functions often provide greater opportunity to improve by learning from global leaders."}, {"tr": "Kıyaslama, bir organizasyonun performansını en iyi performans gösteren organizasyonlarla karşılaştırarak yapılır", "en": "Benchmarking is accomplished by comparing performance with the best-performing organizations", "cmt_tr": "🇹🇷 Kıyaslama; toplam kalite yönetimi yaklaşımında kullanılan temel araçlardan biridir. En iyi sınıftaki organizasyonların uygulamalarının sürekli değerlendirilmesini ve bu uygulamaları yansıtacak süreçlerin uyarlanmasını gerektirir. Kıyaslama organizasyonunun rakip olması gerekmez.", "cmt_en": "🇬🇧 Benchmarking is a primary TQM tool. It is a continuous evaluation of best-in-class organizations' practices and adaptation of processes to reflect those practices. The benchmark organization need not be a competitor."}]}, {"q_tr": "Yeni bir iş kolu için performans ölçütlerini iyileştirmek isteyen bir organizasyon hangi kıyaslama türünü kullanmalıdır?", "q_en": "An organization wanting to improve performance measures for a new business line. Which type of benchmarking is most likely to provide useful information?", "answer": 0, "options": [{"tr": "Fonksiyonel", "en": "Functional", "cmt_tr": "🇹🇷 Fonksiyonel kıyaslama, yeni bir iş kolu için performans ölçütlerini iyileştirmeye en çok yardımcı olur. Aynı teknoloji alanında benzer işlevleri gerçekleştiren organizasyonlarla karşılaştırma, yeni iş kolunda neler elde edildiğine dair bilgi sağlar.", "cmt_en": "🇬🇧 Functional benchmarking is most likely to help improve performance measures for a new business line. Comparison with organizations performing related functions within the same technological area provides information about what is being achieved in the new business line."}, {"tr": "Rekabetçi", "en": "Competitive", "cmt_tr": "🇹🇷 Rekabetçi kıyaslama aynı sektördeki organizasyonları inceler. En iyi rakiplerle karşılaştırma yeni iş kolyuyla ilgisi olmayan bazı faaliyetleri de içerebilir.", "cmt_en": "🇬🇧 Competitive benchmarking studies organizations in the same industry. Comparison with best competitors focuses on related organizations as a whole and may include activities unrelated to the new business line."}, {"tr": "Genel", "en": "Generic", "cmt_tr": "🇹🇷 Genel kıyaslama, farklı bir sektördeki benzer karakteristiklere sahip süreçleri karşılaştırır. İşlev bakımından benzer süreçlerle karşılaştırmak kadar yardımcı olmaz.", "cmt_en": "🇬🇧 Generic benchmarking compares processes with similar characteristics in different industries. It is not as helpful as comparing functionally similar processes in the new business line."}, {"tr": "Dahili", "en": "Internal", "cmt_tr": "🇹🇷 Dahili kıyaslama, organizasyonun bir bölümündeki en iyi uygulamaların diğer bölümlerine uygulanmasıdır. Yeni iş kolunda organizasyon dışında neler başarıldığı hakkında bilgi sağlamaz.", "cmt_en": "🇬🇧 Internal benchmarking applies best practices in one part of the organization to others. It does not provide information about what is being accomplished outside the organization in the new business line."}]}, {"q_tr": "Bir üretici, hesap ödenebilir uygulamalarını bir yatırım bankasının uygulamalarıyla karşılaştırıyor. Bu karşılaştırma hangi kıyaslama türüne örnektir?", "q_en": "A manufacturer compares its accounts payable practices with those of an investment bank. This is an example of", "answer": 0, "options": [{"tr": "Genel kıyaslama", "en": "Generic benchmarking", "cmt_tr": "🇹🇷 Genel kıyaslama, bir operasyondaki süreci inceler ve farklı bir sektördeki benzer süreçle karşılaştırır. Üretici ile yatırım bankası farklı sektörlerdedir.", "cmt_en": "🇬🇧 Generic benchmarking observes a process in one operation and compares it with a similar process in a different industry. The manufacturer and investment bank are in different industries."}, {"tr": "Stratejik kıyaslama", "en": "Strategic benchmarking", "cmt_tr": "🇹🇷 Stratejik kıyaslama başarılı rekabet stratejilerinin aranmasıdır.", "cmt_en": "🇬🇧 Strategic benchmarking is a search for successful competitive strategies."}, {"tr": "Rekabetçi kıyaslama", "en": "Competitive benchmarking", "cmt_tr": "🇹🇷 Rekabetçi kıyaslama aynı sektördeki organizasyonları inceler; farklı sektörlerdeki organizasyonları değil.", "cmt_en": "🇬🇧 Competitive benchmarking studies organizations in the same industry, not in different industries."}, {"tr": "Dahili kıyaslama", "en": "Internal benchmarking", "cmt_tr": "🇹🇷 Dahili kıyaslama, organizasyonun bir bölümündeki en iyi uygulamaların diğer bölümlerine uygulanmasıdır.", "cmt_en": "🇬🇧 Internal benchmarking is the application of best practices in one part of the organization to its other parts."}]}, {"q_tr": "Rekabetçi finansal kıyaslama örneği hangisidir?", "q_en": "An example of a competitive financial benchmark is", "answer": 0, "options": [{"tr": "Büyük bir rakibin tesisindeki benzer nitelikli çalışanların ücret oranı", "en": "The labor rate of comparably skilled employees at a major competitor's plant", "cmt_tr": "🇹🇷 Büyük bir rakibin tesisindeki ücret oranı; finansal ölçüm biçiminde bir rekabetçi kıyaslama örneğidir. Rekabetçi kıyaslama, rakip bir organizasyonu inceler.", "cmt_en": "🇬🇧 The labor rate at a major competitor's plant is an example of a competitive benchmark in financial form. Competitive benchmarking studies a competitor organization."}, {"tr": "Organizasyonun en verimli tesisinde belirli bir ürünün birim başına ortalama fiili maliyeti", "en": "The average actual cost per pound of a specific product at the organization's most efficient plant", "cmt_tr": "🇹🇷 Bu dahili bir finansal ölçümdür; rekabetçi finansal kıyaslama değil.", "cmt_en": "🇬🇧 This is an internal financial measure, not a competitive financial benchmark."}, {"tr": "Her tesiste bilgi teknolojisi departmanına veri sınırı", "en": "A data cap on the information technology department at each plant", "cmt_tr": "🇹🇷 Her tesisteki bilgi teknolojisi departmanına veri sınırı, bir kıyaslama değil dahili bir kontrol mekanizmasıdır.", "cmt_en": "🇬🇧 A data cap on the IT department is an internal control rather than a benchmark."}, {"tr": "Farklı bir sektördeki organizasyonun benzer sürecinin müşteri memnuniyet puanı", "en": "Customer satisfaction rating of a similar process from an organization in a different industry", "cmt_tr": "🇹🇷 Farklı sektördeki organizasyonun müşteri memnuniyet puanı, finansal olmayan bir süreç kıyaslamasıdır; rekabetçi finansal kıyaslama değil.", "cmt_en": "🇬🇧 The customer satisfaction rating of a similar process from an organization in a different industry is a nonfinancial process benchmark, not a competitive financial benchmark."}]}, {"q_tr": "Bir şirketin yönetimi, optimal tutarları yansıtan yayınlanmış bilgilerle kendi finansal bilgilerini karşılaştırmak için ne yapmalıdır?", "q_en": "The management of a company would do which of the following to compare financial information to published information reflecting optimal amounts?", "answer": 2, "options": [{"tr": "Bütçe", "en": "Budget", "cmt_tr": "🇹🇷 Bütçe geleceğe yönelik bir plandır; kıyaslama değil.", "cmt_en": "🇬🇧 A budget is a plan for the future, not a benchmarking tool."}, {"tr": "Tahmin", "en": "Forecast", "cmt_tr": "🇹🇷 Tahmin, gelecekteki olaylar ve koşullar hakkında bir öngörüdür; kıyaslama değil.", "cmt_en": "🇬🇧 A forecast is a prediction about future events and circumstances, not benchmarking."}, {"tr": "Kıyaslama", "en": "Benchmark", "cmt_tr": "🇹🇷 Kıyaslama; bir faaliyetin performansı ile kıyaslama referans noktasının performansı arasındaki farkın nicel ve nitel ölçümünü gerektiren süregelen bir süreçtir.", "cmt_en": "🇬🇧 Benchmarking is an ongoing process that requires quantitative and qualitative measurement of the difference between the performance of an activity and the performance by the benchmark."}, {"tr": "En iyi uygulamaları kullanmak", "en": "Utilize best practices", "cmt_tr": "🇹🇷 En iyi uygulamalar, alanındaki otoriteler ve müşteriler tarafından üstün sonuçlar ürettiği için tanınan uygulamalardır; ancak bu doğrudan kıyaslama ile aynı şey değildir.", "cmt_en": "🇬🇧 Best practices are recognized for generating outstanding results, but this is not the same as directly benchmarking against published financial information."}]}, {"q_tr": "Hangi yöntem, iyileştirilmesi gereken dahili süreçleri sınıfının en iyisi olarak tanımlanan harici şirketlerle karşılaştırır?", "q_en": "Which method involves comparing internal processes that need to be improved to external companies identified as best in class?", "answer": 1, "options": [{"tr": "Dengeli puan kartı", "en": "Balanced scorecard", "cmt_tr": "🇹🇷 Dengeli puan kartı; yöneticileri finansal ve finansal olmayan faktörler konusunda bilgilendiren bir hedef uyum aracıdır.", "cmt_en": "🇬🇧 The balanced scorecard is a goal congruence tool that informs managers about financial and nonfinancial factors important to upper management."}, {"tr": "Kıyaslama", "en": "Benchmarking", "cmt_tr": "🇹🇷 Kıyaslama, anahtar çıktıların en iyi organizasyonlara göre analiz ve ölçümünü içerir. Bu prosedür aynı zamanda performans farkına katkıda bulunan temel eylemleri ve nedenleri de belirler.", "cmt_en": "🇬🇧 Benchmarking involves analysis and measurement of key outputs against the best organizations. This procedure also identifies the underlying key actions and causes that contribute to the performance difference."}, {"tr": "Ekonomik katma değer", "en": "Economic value added", "cmt_tr": "🇹🇷 Ekonomik katma değer; sermaye maliyetinin fırsat maliyeti için düzeltilmiş vergi sonrası faaliyet kârları formülüdür.", "cmt_en": "🇬🇧 Economic value added is the formula for after-tax operating profits adjusted for the opportunity cost of capital."}, {"tr": "Performans ölçümü", "en": "Performance measurement", "cmt_tr": "🇹🇷 Performans ölçümü; bir şirketin kendisini diğer şirketlerle veya önceki dönemlerle karşılaştırdığı birçok yöntemi kapsayan geniş bir terimdir.", "cmt_en": "🇬🇧 Performance measurement is a broad term describing the many ways companies compare themselves with others or with prior periods."}]}, {"q_tr": "Bir işletmenin ürün ve hizmetlerinin mümkün olan en iyi performans düzeyine göre ölçüldüğü ve değerlendirildiği süreç nedir?", "q_en": "What is the process by which products and services are measured and evaluated relative to the best possible levels of performance?", "answer": 2, "options": [{"tr": "Performans boşluğunu ölçme", "en": "Measuring the performance gap", "cmt_tr": "🇹🇷 Performans boşluğu iki kuruluş arasındaki performans farkını ölçer; ancak mutlaka en iyi olası performans düzeyiyle karşılaştırmayı ifade etmez.", "cmt_en": "🇬🇧 The performance gap measures the difference in performance between two entities but does not necessarily imply comparison with the best possible levels of performance."}, {"tr": "Standart ölçüm", "en": "Standard measurement", "cmt_tr": "🇹🇷 Standart ölçüm, ürünleri en iyi performans düzeyleriyle karşılaştırmak için kullanılan bir terim değildir.", "cmt_en": "🇬🇧 Standard measurement is not a term used to compare products with best performance levels."}, {"tr": "Kıyaslama", "en": "Benchmarking", "cmt_tr": "🇹🇷 Kıyaslama, anahtar çıktıların en iyi organizasyonlara göre analiz ve ölçümünü içerir. Aynı zamanda performans farkına katkıda bulunan temel eylemleri ve nedenleri belirler.", "cmt_en": "🇬🇧 Benchmarking involves analysis and measurement of key outputs against the best organizations. It also identifies the underlying key actions and causes that contribute to the performance difference."}, {"tr": "Varyans yönetimi", "en": "Variance management", "cmt_tr": "🇹🇷 Varyans yönetimi veya varyans analizi; bir operasyon döneminde oluşan olumlu ve olumsuz varyansları değerlendirme sürecidir.", "cmt_en": "🇬🇧 Variance management is the process of evaluating favorable and unfavorable variances in a period, not comparing with best possible performance levels."}]}, {"q_tr": "Bir üretici, hazırlama sürecini iyileştirmek istiyor ve prosedürlerini büyük bir havayolunun giriş süreci ile karşılaştırıyor. Üretici hangi aracı kullanıyor?", "q_en": "A manufacturer wanting to improve its staging process compares its procedures against the check-in process for a major airline. Which tool is the manufacturer using?", "answer": 3, "options": [{"tr": "Toplam kalite yönetimi", "en": "Total quality management", "cmt_tr": "🇹🇷 Toplam kalite yönetimi; ilk seferinde doğru yapmak, çalışan eğitimi ve yetkilendirme, ekip çalışması, süreç iyileştirme gibi ilkeleri içerir. Farklı sektörlerdeki iki şirketin süreçlerini karşılaştırmada doğrudan yardımcı olmaz.", "cmt_en": "🇬🇧 TQM involves doing it right the first time, employee training, teamwork, and process improvement. It is not directly helpful in comparing processes of two companies in different industries."}, {"tr": "İstatistiksel süreç kontrolü", "en": "Statistical process control", "cmt_tr": "🇹🇷 İstatistiksel süreç kontrolü üretim sürecini gerçek zamanlı izlemek için kullanılır; farklı sektörlerdeki şirket süreçlerini karşılaştırmada yardımcı olmaz.", "cmt_en": "🇬🇧 Statistical process control is used to monitor manufacturing processes in real time; not helpful in comparing processes of companies in different industries."}, {"tr": "Ekonomik katma değer", "en": "Economic value added", "cmt_tr": "🇹🇷 Ekonomik katma değer parasal tutarlar kullanılarak hesaplanır ve finansal bir performans ölçümüdür. Hazırlama sürecini iyileştirmede yardımcı bir araç değildir.", "cmt_en": "🇬🇧 Economic value added is calculated using monetary amounts and is a financial performance measure. It is not helpful in improving a staging process."}, {"tr": "Kıyaslama", "en": "Benchmarking", "cmt_tr": "🇹🇷 Kıyaslama, kalite yönetiminde kullanılan temel araçlardan biridir. Süreç kıyaslaması; sektörden bağımsız olarak benzer süreçlere sahip organizasyonların operasyonlarını inceler. Büyük bir havayolunun giriş süreciyle karşılaştırma kıyaslamaya örnektir.", "cmt_en": "🇬🇧 Benchmarking is a primary quality management tool. Process benchmarking studies operations of organizations with similar processes regardless of industry. Comparing with a major airline's check-in process is an example of benchmarking."}]}, {"q_tr": "İç denetçi, bilgi güvenliği sisteminin devlet kurumunun ihtiyaçlarını aşıp aşmadığını değerlendirirken hangi bilgi kaynağı en uygun olacaktır?", "q_en": "Which source of information will be most relevant to the internal auditor's assessment of whether the government unit is being charged for computer security that exceeds its needs?", "answer": 1, "options": [{"tr": "Yüklenicinin dahili yönetim raporlarının incelenmesi", "en": "Review of the contractor's internal management reports", "cmt_tr": "🇹🇷 Yüklenicinin dahili yönetim raporları yüklenici yönetimine gizlidir.", "cmt_en": "🇬🇧 The internal management reports of the contractor are confidential to the management of the contractor."}, {"tr": "Güvenlik sisteminin benzer sistemler için uygulanan en iyi uygulamalarla ve son teknoloji yayınlarla karşılaştırılması", "en": "Comparison of the security system with best practices for similar systems and reviewing publications of state-of-the-art systems", "cmt_tr": "🇹🇷 Güvenlik sistemini benzer sistemler için uygulanan en iyi uygulamalarla ve son yayınlarla karşılaştırmak en iyi yaklaşımdır. Geliştirilmekte olan sistemi son teknoloji sistemlerle karşılaştırarak iç denetçiye yüklenicinin iddiasını ele almak için bir temel sağlar.", "cmt_en": "🇬🇧 Comparison of the security system with best practices for similar systems and recent publications is the best approach. It provides the internal auditor with a basis to address the outsourcer's claim that the system is the minimum necessary."}, {"tr": "Güvenlik sisteminin işlevselliğinin test edilmesi", "en": "Tests of the functionality of the security system", "cmt_tr": "🇹🇷 Sistemin işlevselliğini test etmek, sistemin çalışıp çalışmadığı hakkında bilgi sağlar; ancak kurumun ihtiyaçları için uygun olup olmadığını değil.", "cmt_en": "🇬🇧 Testing the functionality provides information on whether the system works, not whether it is appropriate for the entity's needs."}, {"tr": "Yüklenicinin finansal tablolarının analizi", "en": "Analysis of the contractor's financial statements", "cmt_tr": "🇹🇷 Yüklenicinin halka açık finansal tablolarını analiz etmek iyi bir fikir olmakla birlikte, iç denetçinin kurumun ihtiyaç duymadığı bir güvenlik sistemi için ücretlendirilip ücretlendirilmediğini değerlendirmesine yardımcı olmayabilir.", "cmt_en": "🇬🇧 Analyzing the contractor's public financial statements is a good idea, but unlikely to help assess whether the government is being charged for a security system it does not need."}]}, {"q_tr": "İç denetçiler kıyaslama sürecine nasıl katılabilir?", "q_en": "Internal auditors may participate in the benchmarking process by", "answer": 2, "options": [{"tr": "Temel kıyaslamaları yönetimden bağımsız olarak seçerek", "en": "Selecting key benchmarks independently of management", "cmt_tr": "🇹🇷 Kıyaslama seçimi genellikle çeşitli paydaşları içeren işbirlikçi bir süreçtir.", "cmt_en": "🇬🇧 Benchmark selection is typically a collaborative process involving various stakeholders, not done independently by auditors."}, {"tr": "Kıyaslama faaliyetleri için finansal kaynaklar sağlayarak", "en": "Providing financial resources for benchmarking activities", "cmt_tr": "🇹🇷 Finansal kaynak yönetimi denetçinin kıyaslamadaki rolü değildir.", "cmt_en": "🇬🇧 Financial resources management is not the auditor's role in benchmarking."}, {"tr": "Uygun kıyaslamaların belirlenmesini ve değerlendirilmesini kolaylaştırarak", "en": "Facilitating the identification and evaluation of appropriate benchmarks", "cmt_tr": "🇹🇷 İç denetçiler, kıyaslamaları belirlemeye ve değerlendirmeye yardımcı olarak kıyaslamayı kolaylaştırır. Bu süreçte süreçler ve performans ölçütleri konusundaki içgörülerini kullanır.", "cmt_en": "🇬🇧 Internal auditors often facilitate benchmarking by helping identify and evaluate benchmarks, leveraging their insights to assist management in understanding processes and performance metrics."}, {"tr": "Kıyaslama sonuçlarına göre organizasyonel strateji belirleyerek", "en": "Setting organizational strategy based on benchmarking outcomes", "cmt_tr": "🇹🇷 Denetçiler içgörüler sağlasa da strateji belirleme yönetimin sorumluluğundadır.", "cmt_en": "🇬🇧 While auditors provide insights, setting strategy is a management responsibility."}]}, {"q_tr": "İç denetçiler danışmanlık hizmeti sunarken kıyaslamayı nasıl kullanabilir?", "q_en": "Internal auditors may use benchmarking when performing an advisory service by", "answer": 1, "options": [{"tr": "Yalnızca bir sektör içindeki finansal tabloları karşılaştırarak", "en": "Solely comparing financial statements within an industry", "cmt_tr": "🇹🇷 Kıyaslama aynı zamanda süreç iyileştirme içgörülerini de kapsar; yalnızca finansal tablo karşılaştırmasıyla sınırlı değildir.", "cmt_en": "🇬🇧 Benchmarking also incorporates process improvement insights, not limited to solely comparing financial statements within an industry."}, {"tr": "Organizasyonel performansı artırabilecek en iyi uygulamaları belirleyerek", "en": "Identifying best practices that may improve organizational performance", "cmt_tr": "🇹🇷 Kıyaslama, performansı karşılaştırmak ve iyileştirme alanlarını belirlemek için kullanılır. İç denetçiler, en iyi uygulamaları belirlemeye ve değerlendirmeye yardımcı olarak kıyaslamaya katkı sağlar.", "cmt_en": "🇬🇧 Benchmarking is used to compare performance and identify improvement areas. Internal auditors assist in benchmarking by helping identify and evaluate best practices, facilitating performance improvements."}, {"tr": "Kıyaslama sonuçlarına göre değişiklikler zorunlu kılarak", "en": "Mandating changes based on benchmarking results", "cmt_tr": "🇹🇷 İç denetçiler içgörüler sağlar; ancak yönetimsel kararları veya değişiklikleri zorunlu kılamazlar.", "cmt_en": "🇬🇧 Internal auditors provide insights but cannot mandate managerial decisions or changes."}, {"tr": "Mevzuat uyumluluk yönergeleri oluşturarak", "en": "Creating regulatory compliance guidelines", "cmt_tr": "🇹🇷 Mevzuat uyumluluk yönergeleri oluşturmak genellikle kıyaslama çalışmalarında yapılmaz.", "cmt_en": "🇬🇧 Creating regulatory compliance guidelines is not typically done in benchmarking exercises."}]}, {"q_tr": "CFO, aylık finansal raporların hazırlanma süresini kısaltmak istedi. Muhasebe müdürü diğer sektör şirketlerinin sistemi kapatma ve aylık finansal rapor hazırlama sürelerini araştırıyor. Bu neyin örneğidir?", "q_en": "The CFO asked the controller to shorten monthly financial reporting time. The controller researches how long other industry companies take to close and prepare monthly reports. This is an example of", "answer": 0, "options": [{"tr": "Kıyaslama", "en": "Benchmarking", "cmt_tr": "🇹🇷 Kıyaslama; mevcut performansı diğer uygun organizasyonlardaki performansla karşılaştırmak için referans noktaları kullanmaktır. Karşılaştırma genellikle aynı sektördeki organizasyonlarla yapılır. Amaç iyileştirmeyi sağlamak için eylemleri belirlemek ve uygulamaktır.", "cmt_en": "🇬🇧 Benchmarking is the use of reference points to compare current performance with appropriate organizations. The comparison is typically with organizations in the same industry. The objective is to identify and implement actions to achieve improvement."}, {"tr": "En iyi uygulama analizi", "en": "Best-practice analysis", "cmt_tr": "🇹🇷 En iyi uygulama analizi kıyaslamaya benzer ancak daha geniş kapsamlıdır. Muhasebe müdürünün yapacağı kıyaslama, sektördeki diğer şirketlerin metriklerini belirleyecektir; bunların tümü mutlaka en iyi uygulamaları kullanmıyor olabilir.", "cmt_en": "🇬🇧 Best-practice analysis is similar but broader in scope. The controller's benchmarking will identify metrics of other industry companies; not all of which are necessarily utilizing best practices."}, {"tr": "Yeniden yapılanma", "en": "Reengineering", "cmt_tr": "🇹🇷 Yeniden yapılanma, müşterilere değer sunmak için iş işlevlerinin tamamen yeniden düşünülmesidir. Küçük iyileştirmeler yerine radikal bir inovasyondur.", "cmt_en": "🇬🇧 Reengineering is the complete rethinking of how business functions are performed. It is a radical innovation instead of a minor improvement."}, {"tr": "Sürekli iyileştirme", "en": "Continuous improvement", "cmt_tr": "🇹🇷 Sürekli iyileştirme; süreçleri analiz etme ve bu süreçlerde kademeli iyileştirmeler yapma sürecidir.", "cmt_en": "🇬🇧 Continuous improvement is an ongoing process of analyzing processes and making incremental improvements to those processes."}]}], "Subunit 4 - Other Advisory": [{"q_tr": "Aşağıdakilerden hangisi iş süreci yeniden yapılanmasına örnektir?", "q_en": "Which of the following is an example of business process reengineering?", "answer": 1, "options": [{"tr": "Üretimi hızlandırmak için mevcut üretim hattına yeni bir makine eklemek", "en": "Adding a new machine to the existing production line to speed up production", "cmt_tr": "🇹🇷 Yeniden yapılanma işleri yapmanın yeni yollarını bulur. Yeni bir makine eklemek mevcut prosedürleri iyileştirme örneğidir.", "cmt_en": "🇬🇧 Reengineering finds new ways of doing things. Adding a new machine is an example of improving existing procedures, not reengineering."}, {"tr": "Üretimi hızlandırmak için üretim hattını yeniden tasarlamak", "en": "Redesigning the production line to speed up production", "cmt_tr": "🇹🇷 Yeniden yapılanma, süreç inovasyonu ve çekirdek süreç yeniden tasarımını içerir. Mevcut prosedürleri iyileştirmek yerine işleri yapmanın yeni yollarını bulur. Üretim hattını yeniden tasarlamak buna örnektir.", "cmt_en": "🇬🇧 Reengineering involves process innovation and core process redesign. Instead of improving existing procedures, it finds new ways of doing things. Redesigning the production line is an example."}, {"tr": "Üretimi hızlandırmak için süreç hattındaki bir makineyi onarmak", "en": "Repairing a machine on the process line to speed up production", "cmt_tr": "🇹🇷 Bir makineyi onarmak mevcut prosedürleri iyileştirme örneğidir; yeniden yapılanma değil.", "cmt_en": "🇬🇧 Repairing a machine is an example of improving existing procedures, not reengineering."}, {"tr": "Üretimi hızlandırmak için üretim hattındaki bilgisayar sistemlerini güncellemek", "en": "Updating computer systems on the production line to speed up production", "cmt_tr": "🇹🇷 Bilgisayar sistemlerini güncellemek mevcut prosedürleri iyileştirme örneğidir; yeniden yapılanma değil.", "cmt_en": "🇬🇧 Updating the computer systems is an example of improving existing procedures, not reengineering."}]}, {"q_tr": "Durum tespiti denetimini en iyi tanımlayan seçenek hangisidir?", "q_en": "Which of the following best describes due diligence auditing?", "answer": 1, "options": [{"tr": "Tehlikeli atık üzerindeki kontrollerin yeterliliğini ve etkinliğini inceleme", "en": "Reviewing the adequacy and effectiveness of the controls over hazardous waste", "cmt_tr": "🇹🇷 Çevre denetimleri, tehlikeli atık üzerindeki kontrollerin yeterliliğini ve etkinliğini inceler; durum tespiti denetimi değil.", "cmt_en": "🇬🇧 Environmental audits review the adequacy and effectiveness of the controls over hazardous waste, not due diligence auditing."}, {"tr": "Büyük bir işlemin iş gerekçesinin geçerliliğini belirleme", "en": "Determining whether the business justification for a major transaction is valid", "cmt_tr": "🇹🇷 Durum tespiti denetimleri; bir iş birleşmesi, elden çıkarma veya ortak girişim gibi büyük bir işlemin iş gerekçesinin geçerli olup olmadığını belirler.", "cmt_en": "🇬🇧 Due diligence audits determine whether the business justification for a major transaction (e.g., business combination, divestiture, or joint venture) is valid."}, {"tr": "Özellikle bilgisayarlı sistemlerde saklanan kişisel bilgilerin güvenliğini ele alma", "en": "Addressing the security of personal information, especially in computerized systems", "cmt_tr": "🇹🇷 Gizlilik denetimleri kişisel bilgilerin güvenliğini ele alır; durum tespiti denetimi değil.", "cmt_en": "🇬🇧 Privacy audits address the security of personal information, not due diligence audits."}, {"tr": "Önemli inşaat sözleşmelerini izleme ve değerlendirme", "en": "Monitoring and evaluating significant construction contracts", "cmt_tr": "🇹🇷 Sözleşme denetimleri önemli inşaat sözleşmelerini ve hizmet sağlamayı içeren faaliyet sözleşmelerini izler ve değerlendirir.", "cmt_en": "🇬🇧 Contract audits monitor and evaluate significant construction contracts and operating contracts involving services."}]}, {"q_tr": "Bir kuruluşun hazine birimi tahvil ihracı için dış danışmanlar tuttu. İç denetçi danışmanların hükümet düzenlemelerine uyup uymadığını değerlendirdi. Denetçi hangi tür görevi gerçekleştirdi?", "q_en": "The treasury function hired consultants for a bond offering. The internal auditor performs an engagement to determine whether consultants followed governmental regulations. What type of engagement?", "answer": 1, "options": [{"tr": "Kıyaslama", "en": "Benchmarking", "cmt_tr": "🇹🇷 Kıyaslama, devlet düzenlemeleri tarafından zorunlu kılınan performansı optimize etmeye odaklanır; uyumu değerlendirmeye değil.", "cmt_en": "🇬🇧 Benchmarking focuses on optimizing performance, which is not mandated by government regulations."}, {"tr": "Uyumluluk", "en": "Compliance", "cmt_tr": "🇹🇷 Uyumluluk; politikalara, planlara, prosedürlere veya diğer gerekliliklere bağlılıktır. İç denetçiler, organizasyonel yönetişimin bir parçası olarak belirli alanlardaki uyumluluğu değerlendirir.", "cmt_en": "🇬🇧 Compliance is adherence to policies, plans, procedures, or other requirements. Internal auditors assess compliance in specific areas as part of organizational governance."}, {"tr": "İş sürekliliği", "en": "Business continuity", "cmt_tr": "🇹🇷 İş sürekliliği denetimi, kuruluşun çeşitli iş süreçleri kesintilerine yeterince hazırlıklı olup olmadığını belirler.", "cmt_en": "🇬🇧 Business continuity auditing determines whether the entity is sufficiently prepared for various types of interruptions of normal business processing."}, {"tr": "Finansal denetim", "en": "Financial audit", "cmt_tr": "🇹🇷 Finansal denetim, finansal bilgilerin doğru raporlanıp raporlanmadığını ve yeterince desteklenip desteklenmediğini belirler.", "cmt_en": "🇬🇧 A financial audit involves determining whether financial information was properly reported and adequately supported."}]}, {"q_tr": "İç denetim fonksiyonu, önerilen bir iş birleşmesinin geçerliliğini doğrulamak için avukat ve M&A uzmanıyla birlikte çalışıyor. Bu neyin örneğidir?", "q_en": "The internal auditing function works with an attorney and financial M&A expert to verify validity of a proposed business combination. This is an example of a(n)", "answer": 3, "options": [{"tr": "Uyumluluk görevi", "en": "Compliance engagement", "cmt_tr": "🇹🇷 Uyumluluk denetimi görevi, şirketin ilgili yasa, yönetmelik, sözleşme ve prosedürlerin gerekliliklerini karşılayıp karşılamadığını test eder.", "cmt_en": "🇬🇧 A compliance audit engagement tests if the company is meeting the requirements of relevant laws, regulations, contracts, and procedures."}, {"tr": "Performans denetimi", "en": "Performance audit", "cmt_tr": "🇹🇷 Performans denetimi, organizasyonun temel performans göstergelerindeki ilerlemesine ilişkin güvence sağlar.", "cmt_en": "🇬🇧 A performance audit provides assurance about the organization's progress in meeting its key performance indicators."}, {"tr": "Operasyonel denetim", "en": "Operational audit", "cmt_tr": "🇹🇷 Operasyonel denetim, organizasyonun operasyonlarının verimliliğini ve etkinliğini değerlendirir.", "cmt_en": "🇬🇧 An operational audit assesses the efficiency and effectiveness of an organization's operations."}, {"tr": "Durum tespiti görevi", "en": "Due diligence engagement", "cmt_tr": "🇹🇷 Durum tespiti görevi; iç denetçilerin ve diğerlerinin büyük bir işlemin iş gerekçesinin geçerliliğini doğruladığı bir hizmettir. İç denetçi yalnızca danışmanlık sağlıyorsa bu danışmanlık görevidir.", "cmt_en": "🇬🇧 A due diligence engagement is a service in which internal auditors and others verify the validity of the business justification for a major transaction. If the internal auditor merely provides counsel and advice, it is an advisory engagement."}]}, {"q_tr": "İç denetçilerin temel performans göstergelerine ulaşmak için organizasyonun ne kadar iyi ilerlediğini ölçmek amacıyla performans denetimleri yürüttüğü görev türü hangisidir?", "q_en": "Which type of engagement involves internal auditors conducting performance audits to measure how well an organization is achieving targets for its KPIs?", "answer": 0, "options": [{"tr": "Performans güvence görevi", "en": "Performance assurance engagement", "cmt_tr": "🇹🇷 Güvence görevinde iç denetçiler, organizasyonun temel performans göstergelerindeki hedeflere ne kadar iyi ulaştığını ölçmek için performans denetimleri yürütür.", "cmt_en": "🇬🇧 In an assurance engagement, internal auditors conduct performance audits to measure how well an organization is achieving the targets for its key performance indicators."}, {"tr": "Performans danışmanlık görevi", "en": "Performance advisory engagement", "cmt_tr": "🇹🇷 Danışmanlık görevinde iç denetçiler performansı ölçmek yerine müşterilerle birlikte performansı iyileştirmek için çalışır.", "cmt_en": "🇬🇧 In an advisory engagement, internal auditors work with clients to improve performance instead of measuring it."}, {"tr": "Operasyonel denetim", "en": "Operational audit", "cmt_tr": "🇹🇷 Operasyonel denetim organizasyon operasyonlarının verimliliğini ve etkinliğini değerlendirir; ancak KPI hedeflerine ulaşmayı ölçmek odak noktası değildir.", "cmt_en": "🇬🇧 Operational audits assess efficiency and effectiveness of operations, but measuring achievement of KPI targets is not the specific focus described here."}, {"tr": "Finansal denetim", "en": "Financial audit", "cmt_tr": "🇹🇷 İç denetçiler, finansal tablolar için temel olan raporların doğruluğunu güvence altına almak amacıyla finansal tabloları oluşturan sistemleri ve kontrolleri değerlendirir.", "cmt_en": "🇬🇧 Internal auditors assess systems and controls responsible for generating financial statements to ensure accuracy of the reports that are the basis for those statements."}]}, {"q_tr": "Yeniden yapılanma projesinin tamamlanmasının ardından yönetim, iç denetim fonksiyonundan yeniden tasarlanan sürecin uygulanmasını yönetmesini istedi. Bu iç denetçiler için uygun bir görev midir?", "q_en": "Upon completion of a reengineering project, management asked internal audit to direct the implementation of the redesigned process. Is this appropriate?", "answer": 1, "options": [{"tr": "Evet, çünkü yeniden tasarlanan süreçleri uygulamak genellikle iç denetim tüzüğüne dahildir", "en": "Yes, because implementing redesigned processes is generally included in the internal audit charter", "cmt_tr": "🇹🇷 İç denetçiler sürecin üst yönetimin desteğine sahip olup olmadığını belirleyebilir; ancak yeni sürecin uygulanmasından sorumlu değillerdir.", "cmt_en": "🇬🇧 Internal auditors may determine if the process has senior management's support, but they are not responsible for implementing the new process."}, {"tr": "Evet, yeniden yapılanma yetkilerinin bir parçası olarak iç denetçiler uygulamayı da yönlendirebilir", "en": "Yes, as part of their mandate to redesign processes internal auditors may also direct the implementation", "cmt_tr": "🇹🇷 İç denetçiler; sürecin üst yönetim desteğine sahip olup olmadığını belirleyebilir, dikkate alınacak alanları önerebilir ve yeni sistem için denetim planları geliştirebilir. Öneride bulunabilirler; ancak zorunlu kılamazlar.", "cmt_en": "🇬🇧 Internal auditors may determine whether the process has senior management's support, recommend areas for consideration, and develop audit plans for the new system. They can recommend but cannot mandate."}, {"tr": "Hayır, çünkü iç denetçiler bir yeniden yapılanma projesine katılmamalıdır; bu çıkar çatışmasıdır", "en": "No, because internal auditors should not participate in a reengineering project because it is a conflict of interest", "cmt_tr": "🇹🇷 İç denetçiler, öneri sunarak ve yeniden yapılanma projesi ekibinin önerdiği yeni sisteme yönelik denetim planları geliştirerek katılabilir; ancak kontrolleri yetkilendiremezler.", "cmt_en": "🇬🇧 Internal auditors may recommend new internal controls or improvements and develop audit plans for a recommended new system, but they cannot authorize controls; management is responsible for that."}, {"tr": "Hayır, iç denetçiler yeniden tasarım sürecinin uygulanmasına doğrudan dahil olmamalıdır", "en": "No, internal auditors should not become directly involved in the implementation of the redesigned process", "cmt_tr": "🇹🇷 İç denetçiler yeniden tasarım sürecinin uygulanmasına doğrudan dahil olmamalıdır; çünkü bu profesyonel çıkarların olası çatışması nedeniyle bağımsızlıklarını ve nesnelliklerini zedeler.", "cmt_en": "🇬🇧 Internal auditors should not become directly involved in the implementation of the redesign process because this involvement impairs their independence and objectivity due to possible conflict of professional interests."}]}, {"q_tr": "İç denetçiler genellikle durum tespiti incelemesi yapmak veya dış denetçilere bu süreçte yardımcı olmak üzere çağrılır. Durum tespiti incelemesi aşağıdakilerden hangisi olabilir?", "q_en": "Internal auditors are often called upon to perform or assist in a due diligence review. A due diligence review may be a(n)", "answer": 3, "options": [{"tr": "Bir yüklenicinin yönlendirmesiyle yapılan ara dönem finansal tablolarının incelenmesi", "en": "Review of interim financial statements as directed by an underwriting firm", "cmt_tr": "🇹🇷 İnceleme yüklenici tarafından kullanılabilse de yüklenici tarafından yönlendirilmez.", "cmt_en": "🇬🇧 Although the review may be used by the underwriter, it is not directed by the underwriter."}, {"tr": "Bölüm yönetiminin yasa ve yönetmeliklere uyup uymadığını belirlemek için bir organizasyonun bölümünün operasyonel denetimi", "en": "Operational audit of a division to determine if divisional management complies with laws and regulations", "cmt_tr": "🇹🇷 Durum tespiti incelemesi dahili bir operasyonel denetim değildir.", "cmt_en": "🇬🇧 The due diligence review is not an internal operational audit."}, {"tr": "Denetim komitesi politikalarına uyumu belirlemek için denetim komitesi tarafından talep edilen operasyon incelemesi", "en": "Review of operations requested by audit committee to determine compliance with audit committee policies", "cmt_tr": "🇹🇷 Durum tespiti incelemesi organizasyonel politikalara uyumluluk için dahili bir inceleme değildir.", "cmt_en": "🇬🇧 The due diligence review is not an internal review for compliance with organizational policies."}, {"tr": "Potansiyel bir satın alma işlemiyle bağlantılı olarak finansal tablolar ve ilgili açıklamaların incelenmesi", "en": "Review of financial statements and related disclosures in conjunction with a potential acquisition", "cmt_tr": "🇹🇷 Durum tespiti görevi, iş birleşmesi gibi büyük bir işlemin iş gerekçesini belirlemeye yöneliktir. İç denetçiler ve diğerleri, hedef şirketin operasyonlarını, kontrollerini, finansmanını veya finansal bilgilerin açıklamalarını inceleyen bir ekibin parçası olabilir.", "cmt_en": "🇬🇧 A due diligence engagement is a service to determine the business justification for a major transaction. Internal auditors may be part of a team that reviews the acquiree's operations, controls, financing, or disclosures of financial information."}]}, {"q_tr": "İç denetim ekibi potansiyel bir birleşme veya satın alma planlarını değerlendirmek için durum tespiti denetimi yapıyor. Bir şirketin başka bir şirketle birleşmesi veya onu satın alması için geçerli bir nedenler hangisi?", "q_en": "An internal audit team is performing a due diligence audit to assess plans for a potential merger or acquisition. Which is a valid reason for a company to merge with or acquire another company?", "answer": 0, "options": [{"tr": "Riski çeşitlendirmek", "en": "To diversify risk", "cmt_tr": "🇹🇷 Birleşme için olağan gerekçe, faaliyet gösterilen iş kollarını çeşitlendirerek risk yönetimidir.", "cmt_en": "🇬🇧 The usual justification for a combination is risk management through diversifying the businesses in which the organization is engaged."}, {"tr": "Rekabeti ortadan kaldırmak", "en": "To eliminate competition", "cmt_tr": "🇹🇷 Rekabet düzeyini azaltmak geçerli bir iş gerekçesi olsa da rekabeti tamamen ortadan kaldırmak, uzun vadede şirkete zarar verecek bir antitröst soruşturmasına yol açabilir.", "cmt_en": "🇬🇧 Reducing competition is a valid business reason, but eliminating competition could attract an antitrust investigation that would be costly and hurt the company in the long run."}, {"tr": "Yapay zekaya yapılan tek seferlik yatırımla süregelen tüm işgücü maliyetlerini ortadan kaldırmak", "en": "To eliminate all ongoing labor costs with a one-time investment in AI", "cmt_tr": "🇹🇷 İşgücü maliyetlerini azaltmak geçerli bir nedendir; ancak tüm işgücü maliyetlerini yapay zeka ile ortadan kaldırmak büyük olasılıkla pratik değildir.", "cmt_en": "🇬🇧 A reduction in labor costs is a valid reason, but to eliminate all labor costs by implementing AI is likely not practical."}, {"tr": "Hisse senedi fiyatlarını artırmak", "en": "To increase stock prices", "cmt_tr": "🇹🇷 Durum tespiti görevi, büyük bir işlemin iş gerekçesinin geçerliliğini belirlemeye yöneliktir. Hisse senedi fiyatlarını artırmak genellikle birleşme veya satın alma için geçerli bir neden değildir.", "cmt_en": "🇬🇧 A due diligence engagement determines if the business justification is valid. Increasing stock prices is not often a valid reason for a merger or acquisition; other methods can achieve this more directly."}]}, {"q_tr": "Organizasyon küçük bir toksik atık işleme işletmesi satın almayı düşünüyor. İç denetçiler durum tespiti ekibinin parçası. Çalışmaları büyük olasılıkla neyi kapsamayacaktır?", "q_en": "Organization considering purchasing a toxic waste disposal business. Internal auditors are part of the due diligence team. The scope will most likely NOT include", "answer": 0, "options": [{"tr": "Hedef şirkete karşı açılan davaların esasının değerlendirilmesi", "en": "Evaluation of the merit of lawsuits currently filed against the acquiree", "cmt_tr": "🇹🇷 Davaların esasının değerlendirilmesi hukuki uzmanlık gerektirir; iç denetim kapsamında değil.", "cmt_en": "🇬🇧 Evaluation of the merit of lawsuits requires legal expertise, which is outside the scope of internal auditing."}, {"tr": "Hedef şirketin atık kabul prosedürlerinin incelenmesi ve yasal gerekliliklerle karşılaştırılması", "en": "Review of acquiree's procedures for acceptance of waste material and comparison with legal requirements", "cmt_tr": "🇹🇷 Yasa, yönetmelik ve sözleşmelere uyumluluk iç denetimin kapsamı dahilindedir.", "cmt_en": "🇬🇧 Compliance with laws, regulations, and contracts is within the scope of internal auditing."}, {"tr": "Hedef şirketin kredi sözleşmelerine uyumu ve açıklamalarının analizi", "en": "Analysis of acquiree's compliance with and disclosure of loan covenants", "cmt_tr": "🇹🇷 Yasa, yönetmelik ve sözleşmelere uyumluluk iç denetimin kapsamı dahilindedir.", "cmt_en": "🇬🇧 Compliance with laws, regulations, and contracts is within the scope of internal auditing."}, {"tr": "Hedef şirketin operasyonlarının verimliliğinin değerlendirilmesi", "en": "Assessment of the efficiency of the operations of the acquiree", "cmt_tr": "🇹🇷 İç denetçiler, operasyonların etkinliği ve verimliliği üzerindeki kontroller dahil olmak üzere kontrolleri değerlendirir.", "cmt_en": "🇬🇧 Internal auditors evaluate controls, including those over effectiveness and efficiency of operations."}]}, {"q_tr": "İç denetçiler bir atık işleme işletmesinin satın alınması için durum tespiti incelemesi yapıyor. Çalışmaları büyük olasılıkla neyi kapsamayacaktır?", "q_en": "Internal auditors performing a due diligence review for purchase of a waste disposal business. The scope will most likely NOT include", "answer": 0, "options": [{"tr": "Hedef şirketin sahip olduğu yatırımların değerinin takdir edilmesi", "en": "An appraisal of the value of investments owned by the acquiree", "cmt_tr": "🇹🇷 Değerleme konusundaki takdir hizmeti durum tespiti incelemesinin kapsamı dışındadır; uzmanlık gerektiren ayrı bir hizmettir.", "cmt_en": "🇬🇧 An appraisal service regarding valuation is outside the scope of a due diligence review; it requires separate specialized expertise."}, {"tr": "Hedef şirketin atık kabul prosedürlerinin incelenmesi ve yasal gerekliliklerle karşılaştırılması", "en": "Review of acquiree's procedures for acceptance of waste material and comparison with legal requirements", "cmt_tr": "🇹🇷 Yasa, yönetmelik ve sözleşmelere uyumluluk iç denetimin kapsamı dahilindedir.", "cmt_en": "🇬🇧 Compliance with laws, regulations, and contracts is within the scope of internal auditing."}, {"tr": "Hedef şirketin istihdam yasalarına uyumunun analizi", "en": "Analysis of the acquiree's compliance with employment laws", "cmt_tr": "🇹🇷 Yasa, yönetmelik ve sözleşmelere uyumluluk iç denetimin kapsamı dahilindedir.", "cmt_en": "🇬🇧 Compliance with laws, regulations, and contracts is within the scope of internal auditing."}, {"tr": "Hedef şirketi satın alanla entegre etmenin faydasının değerlendirilmesi", "en": "Assessment of the benefit of integrating the acquiree with the acquirer's business", "cmt_tr": "🇹🇷 Durum tespiti süreci, işlemin beklenen faydalarının (daha geniş pazarlar, daha yetenekli çalışanlar, fikri mülkiyet erişimi, operasyonel sinerji vb.) gerçekleşip gerçekleşmeyeceğini belirler.", "cmt_en": "🇬🇧 The due diligence process establishes whether the expected benefits of the transaction (wider markets, more skilled employees, access to intellectual property, operating synergies, etc.) are likely to be realized."}]}, {"q_tr": "İş süreci yeniden yapılanmasının bir özelliği hangisidir?", "q_en": "Which of the following is a characteristic of business process reengineering?", "answer": 3, "options": [{"tr": "Mevcut prosedürlerin kademeli ve aşamalı olarak düzenlenmesi", "en": "Gradual, incremental streamlining of existing procedures", "cmt_tr": "🇹🇷 Mevcut prosedürlerin kademeli ve aşamalı olarak düzenlenmesi (kaizen), iş süreci yeniden yapılanması tarafından özellikle reddedilen bir yaklaşımdır.", "cmt_en": "🇬🇧 Gradual, incremental streamlining of existing procedures (kaizen) is specifically rejected by business process reengineering."}, {"tr": "Manuel süreçlerin bilgisayara taşınması", "en": "The movement of manual processes to computers", "cmt_tr": "🇹🇷 Manuel süreçlerin yalnızca bilgisayara taşınması (otomasyon) iş süreci mühendisliğinin bir özelliği değildir.", "cmt_en": "🇬🇧 Simply moving manual processes to computers (automation) is not a characteristic of business process reengineering."}, {"tr": "İşin niteliğinin kendisinde bir değişiklik", "en": "A change in the nature of the business itself", "cmt_tr": "🇹🇷 İşin niteliğinin kendisinde bir değişiklik (paradigma değişimi) iş süreci yeniden yapılanmasının bir özelliği değildir.", "cmt_en": "🇬🇧 A change in the nature of the business itself (paradigm shift) is not a characteristic of business process reengineering."}, {"tr": "Organizasyonun belirli bir iş sürecini yürütme biçiminin aşağıdan yukarıya yeniden gözden geçirilmesi", "en": "The bottom-up revision of the way the organization carries out a particular business process", "cmt_tr": "🇹🇷 İş süreci yeniden yapılanması; organizasyonun belirli bir iş işlevini mevcut durumdan bağımsız olarak nasıl yürütmesi gerektiğini tamamen yeniden düşünen kapsamlı bir aşağıdan yukarıya revizyondur.", "cmt_en": "🇬🇧 Business process reengineering is the complete, bottom-up revision of the way an organization carries out a particular business process. Organizations totally rethink how a particular business function should be carried out, without regard to how it is currently performed."}]}, {"q_tr": "Organizasyon, iş işlevi ortadan kaldırmaya ve küçülmeye yol açabilecek bir iş süreci yeniden yapılanması girişimi yürütüyor. İç denetim fonksiyonunun uygun rolü hangisidir?", "q_en": "An organization is undergoing a business process reengineering initiative that may lead to job function elimination. What would be an appropriate role for internal audit?", "answer": 1, "options": [{"tr": "Süreçleri analiz etmek ve ardından süreç değişikliklerini uygulamak", "en": "Analyzing the processes and then implementing the process changes", "cmt_tr": "🇹🇷 İç denetçiler yeni süreçlerin uygulanmasına doğrudan dahil olmamalıdır; bu durum bağımsızlıklarını ve nesnelliklerini zedeler.", "cmt_en": "🇬🇧 Internal auditors should not become directly involved in the implementation of the new processes; this involvement would impair their independence and objectivity."}, {"tr": "Yeniden yapılanma için değerlendirilecek işlevleri önermek", "en": "Recommending functions to consider for reengineering", "cmt_tr": "🇹🇷 İş süreci yeniden yapılanması; süreç inovasyonu ve yeniden tasarımı içerir. İç denetçiler, yeniden yapılanma için değerlendirilecek işlevleri önerebilir ve yeni sistem için denetim planları geliştirebilir.", "cmt_en": "🇬🇧 Business process reengineering involves process innovation and redesign. Internal auditors may perform the role of recommending functions to consider for reengineering and developing audit plans for the new system."}, {"tr": "Yeniden yapılanma girişimini ve önerileri onaylamak", "en": "Approving the reengineering initiative and recommendations", "cmt_tr": "🇹🇷 Girişimi ve süreç değişikliği önerilerini onaylamaya üst yönetim ve yönetim kurulu dahil olur; YDY değil.", "cmt_en": "🇬🇧 Senior management and the board, not the CAE, would be involved in approving the initiative and process change recommendations."}, {"tr": "Çalışanları pozisyonlarının yeniden yapılanma nedeniyle ortadan kaldırıldığını bildiren toplantılara katılmak", "en": "Participating in meetings informing employees their positions have been eliminated", "cmt_tr": "🇹🇷 Çalışana pozisyonunun ortadan kaldırıldığını bildirmek insan kaynakları fonksiyonunun ve/veya çalışanın yöneticisinin sorumluluğundadır.", "cmt_en": "🇬🇧 Informing an employee that his or her position has been eliminated is the responsibility of the human resources function and/or the employee's manager."}]}, {"q_tr": "İç denetçiler iş süreci yeniden yapılanmasıyla ilgili danışmanlık hizmetleri sunarken ne göz önünde bulundurulmalıdır?", "q_en": "What should be considered when internal auditors perform advisory services related to business process reengineering?", "answer": 1, "options": [{"tr": "Süreç tasarımı ve uygulama üzerinde tam özerklik", "en": "Complete autonomy over the process design and implementation", "cmt_tr": "🇹🇷 Tam özerklik uygun değildir; çünkü çıkar çatışmasına yol açabilir.", "cmt_en": "🇬🇧 Total autonomy is inappropriate because it may result in a conflict of interest."}, {"tr": "Süreç uygulamasına çok fazla dahil olmamayı sağlamak", "en": "Ensuring they do not become too involved in process implementation", "cmt_tr": "🇹🇷 İç denetçiler; süreci uygulayan taraf olmak yerine danışmanlık girdisi sağlayarak bağımsızlıklarını korumalıdır. Süreç yeniden yapılanmasındaki danışmanlık rolü, doğrudan uygulama yapmaksızın tasarıma katkı sağlar.", "cmt_en": "🇬🇧 Internal auditors must maintain independence by providing advisory input without becoming involved in implementing the process. The advisory role in process reengineering contributes to design without direct implementation."}, {"tr": "Kontrolü korumak için tüm değişiklikleri denetlemek", "en": "Overseeing all changes to maintain control of the project", "cmt_tr": "🇹🇷 Denetim (oversight), danışmanlık konumunu korumakla çelişen bir kontrol anlamı taşır.", "cmt_en": "🇬🇧 Oversight implies control, which conflicts with maintaining an advisory position."}, {"tr": "Yalnızca verimliliği artırmak için işgücünü azaltmaya odaklanmak", "en": "Solely focusing on reducing headcount to improve efficiency", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri daha geniş verimlilik stratejileri arar; yalnızca işgücü azaltmaya odaklanmaz.", "cmt_en": "🇬🇧 Advisory services seek broader efficiency strategies, not just headcount reduction."}]}]};
const SHEETS = ["Subunit 1 - Overview", "Subunit 2 - IA Responsibilities", "Subunit 3 - Benchmarking", "Subunit 4 - Other Advisory"];
const SHORT_NAMES = {"Subunit 1 - Overview": "SU1", "Subunit 2 - IA Responsibilities": "SU2", "Subunit 3 - Benchmarking": "SU3", "Subunit 4 - Other Advisory": "SU4"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
