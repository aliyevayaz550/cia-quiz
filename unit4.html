<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CIA Quiz – Unit 4</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-group {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.3);
  margin-left: 10px;
}
.lang-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .5px; padding: 5px 9px; cursor: pointer; border: none;
  background: rgba(255,255,255,.10); color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
}
.lang-btn + .lang-btn { border-left: 1px solid rgba(255,255,255,.15); }
.lang-btn.active { background: var(--gold) !important; color: var(--navy) !important; }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── HISTORY SECTION ─────────────────────────────────── */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 4</div>
    <div id="score-badge">0 / 0</div>
    <div id="lang-group">
      <button class="lang-btn active" onclick="setLang('tr')" data-lang="tr">TR</button>
      <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
    </div>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">68 sual</span>
    </div>
  </div>
</div>

<div id="main">

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"Subunit 1 - Overview": [{"q_tr": "Kapsamı müşteriyle mutabık kılınan müşteri hizmet faaliyetleri en iyi nasıl tanımlanır?", "q_en": "Client service activities, the nature and scope of which are agreed upon with the client, are best described as", "answer": 2, "options": [{"tr": "İç denetim hizmetleri", "en": "Internal audit services", "cmt_tr": "🇹🇷 İç denetim; bağımsız, nesnel bir güvence ve danışmanlık hizmetidir. Yönetişim, risk yönetimi ve kontrol süreçlerini değerlendirerek organizasyona değer katar.", "cmt_en": "🇬🇧 Internal auditing is an independent, objective assurance and advisory service designed to add value and improve operations. It evaluates governance, risk management, and control processes."}, {"tr": "Güvence hizmetleri", "en": "Assurance services", "cmt_tr": "🇹🇷 Güvence hizmetleri; iç denetçilerin nesnel değerlendirmeler yaparak güvence sağladığı hizmetlerdir. Uyumluluk, finansal, operasyonel ve teknoloji denetimlerini kapsar.", "cmt_en": "🇬🇧 Assurance services involve objective assessments to provide assurance. They include compliance, financial, operational/performance, and technology engagements."}, {"tr": "Danışmanlık hizmetleri", "en": "Advisory services", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri; iç denetçilerin yönetim sorumluluğu üstlenmeksizin paydaşlara tavsiye verdiği hizmetlerdir. Kapsam ve nitelik ilgili paydaşlarla mutabık kılınır.", "cmt_en": "🇬🇧 Advisory services are those through which internal auditors provide advice to stakeholders without assuming management responsibilities. Nature and scope are agreed with stakeholders."}, {"tr": "Dış güvence hizmetleri", "en": "External assurance services", "cmt_tr": "🇹🇷 Dış güvence hizmetleri, bağımsız CPA firmaları gibi harici hizmet sağlayıcılar tarafından yürütülür; iç denetçiler tarafından değil.", "cmt_en": "🇬🇧 External assurance services are performed by external service providers such as independent CPA firms, not internal auditors."}]}, {"q_tr": "İç denetçilerin sunduğu danışmanlık hizmetleri güvence hizmetlerinden nasıl ayrılır?", "q_en": "Advisory services provided by internal auditors differ from assurance services because they", "answer": 2, "options": [{"tr": "Resmi değerlendirmeler içerir", "en": "Involve providing formal evaluations", "cmt_tr": "🇹🇷 Resmi değerlendirmeler, danışmanlık değil güvence hizmetlerinin bir parçasıdır.", "cmt_en": "🇬🇧 Formal evaluations are part of assurance services, not advisory services."}, {"tr": "Yönetim sorumluluğu üstlenmeyi içerir", "en": "Include assuming management responsibilities", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri, nesnelliği korumak amacıyla yönetim rollerini özellikle dışlar.", "cmt_en": "🇬🇧 Advisory services specifically avoid management roles to maintain objectivity."}, {"tr": "Resmi güvence olmaksızın operasyonları iyileştirir", "en": "Improve operations without formal assurance", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri; paydaşlara rehberlik ve önerilerle operasyonları iyileştirmeye yardımcı olur. Güvence hizmetlerinin aksine resmi değerlendirme içermez.", "cmt_en": "🇬🇧 Advisory services help stakeholders improve operations through guidance and recommendations without providing formal evaluations, unlike assurance services."}, {"tr": "Denetçilerin finansal tablolar hakkında görüş vermesini gerektirir", "en": "Require auditors to issue opinions on financial statements", "cmt_tr": "🇹🇷 Finansal tablolar hakkında görüş içeren geleneksel denetimler güvence hizmetleridir.", "cmt_en": "🇬🇧 Traditional audits involving financial statement opinions are assurance services, not advisory."}]}, {"q_tr": "İç denetçiler danışmanlık hizmetleri sunabilir. Bu hizmetlerin yapılması", "q_en": "Internal auditors may provide advisory services. The performance of these services", "answer": 2, "options": [{"tr": "Aynı müşteriyle yapılacak güvence hizmetinde nesnelliği zedeler", "en": "Impairs internal auditors' objectivity with respect to an assurance service for the same client", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri nesnelliği mutlaka zedelemez. Önerilerin uygulanması yönetimin kararıdır; bu durum iç denetçinin nesnelliğini bozmaz.", "cmt_en": "🇬🇧 Advisory services do not necessarily impair objectivity. Implementation decisions are made by management, which does not impair the internal auditors' objectivity."}, {"tr": "Danışmanlık görevinden güvence üretilmesini engeller", "en": "Precludes generation of assurance from an advisory engagement", "cmt_tr": "🇹🇷 Güvence ve danışmanlık hizmetleri birbirini dışlamaz. YDY, görevlerin sınıflandırılma yöntemini belirler; karma görevler uygun olabilir.", "cmt_en": "🇬🇧 Assurance and advisory services are not mutually exclusive. The CAE determines classification methods; blended engagements may be appropriate."}, {"tr": "İç denetim fonksiyonunun tüzükteki yetki kapsamıyla tutarlı olmalıdır", "en": "Should be consistent with the internal audit function's empowerment reflected in the charter", "cmt_tr": "🇹🇷 Danışmanlık hizmetlerinin niteliği tüzükte tanımlanır. Yönetim kurulu, çıkar çatışması veya yükümlülük ihlali yoksa iç denetim fonksiyonunu ek hizmetler için yetkilendirebilir.", "cmt_en": "🇬🇧 The nature of advisory services is defined in the charter. The board empowers the internal audit function for additional services if no conflicts of interest or obligation impairments exist."}, {"tr": "Müşteri dışında bilgi paylaşma sorumluluğu doğurmaz", "en": "Imposes no responsibility to communicate information other than to the engagement client", "cmt_tr": "🇹🇷 İç denetimin temel değerlerinden biri üst yönetim ve yönetim kuruluna güvence sunmaktır. Danışmanlık görevleri, YDY'nin yöneticilere ve yönetim kuruluna sunulması gerektiğini düşündüğü bilgileri kısıtlayan biçimde yürütülemez.", "cmt_en": "🇬🇧 A primary internal audit value is providing assurance to senior management and the board. Advisory engagements cannot restrict information that the CAE judges should be presented to executives and board members."}]}, {"q_tr": "İç denetçilerin yürüttüğü danışmanlık hizmetleri büyük olasılıkla organizasyona nasıl yarar sağlar?", "q_en": "Advisory services performed by internal auditors most likely benefit the organization because", "answer": 2, "options": [{"tr": "İç denetim tüzüğünde tanımlanmaları gerekmez", "en": "They need not be defined in the internal audit charter", "cmt_tr": "🇹🇷 Danışmanlık hizmetlerinin niteliği iç denetim tüzüğünde mutlaka tanımlanmalıdır.", "cmt_en": "🇬🇧 The nature of advisory services must be defined in the internal audit charter."}, {"tr": "Değer önerisi yalnızca güvence hizmetleri için geçerlidir", "en": "The value proposition applies only to assurance services", "cmt_tr": "🇹🇷 Değer önerisi hem güvence hem de danışmanlık hizmetlerini kapsar; yönetişim, risk yönetimi ve kontrolleri değerlendirerek organizasyona değer katar.", "cmt_en": "🇬🇧 The value proposition includes both assurance and advisory services designed to add value by evaluating and improving governance, risk management, and control."}, {"tr": "Organizasyonun kontrollerini iyileştirmeye yöneliktirler", "en": "They are intended to improve the organization's controls", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri; yönetim sorumluluğu üstlenmeksizin yeni politika, süreç, sistem ve ürünlerin tasarımında tavsiye, eğitim ve risk/kontrol tartışmaları gibi yollarla kontrolleri iyileştirmeye yönelik tavsiyeler içerir.", "cmt_en": "🇬🇧 Advisory services provide advice to improve controls through advising on design of new policies, processes, systems and products; providing forensic services; training; and facilitating risk and control discussions."}, {"tr": "IIA Global İç Denetim Standartları'nın kısıtlamaları uygulanmaz", "en": "The constraints of The IIA Global Internal Audit Standards do not apply", "cmt_tr": "🇹🇷 İç denetçiler tüm hizmetlerde Standartlara uymak zorundadır.", "cmt_en": "🇬🇧 In the performance of all services, internal auditors must adhere to the Standards."}]}, {"q_tr": "Üst yönetim, iç denetim fonksiyonundan manuel envanter sisteminden otomatik sisteme geçişte yardım istedi. Bu hizmet en uygun biçimde nasıl yürütülmelidir?", "q_en": "Senior management requested that internal audit assist switching from manual to automated inventory system. This service is best performed in a(n)", "answer": 2, "options": [{"tr": "Resmi danışmanlık görev sözleşmesi", "en": "Formal advisory engagement agreement", "cmt_tr": "🇹🇷 Resmi danışmanlık görev sözleşmesi planlanmış ve sürekli düzenlemeler için uygundur; tek seferlik özel düzenlemeler için değil.", "cmt_en": "🇬🇧 A formal advisory engagement agreement applies to planned and continuous arrangements, not one-time special arrangements."}, {"tr": "Gayri resmi danışmanlık görev sözleşmesi", "en": "Informal advisory engagement agreement", "cmt_tr": "🇹🇷 Gayri resmi danışmanlık görev sözleşmesi rutin görevler için uygundur.", "cmt_en": "🇬🇧 An informal advisory engagement agreement applies to routine tasks."}, {"tr": "Özel danışmanlık görev sözleşmesi", "en": "Special advisory engagement agreement", "cmt_tr": "🇹🇷 Özel danışmanlık görev sözleşmesi, ara sıra gerçekleşen tek seferlik özel düzenlemeler için uygundur. Manuel sistemden otomatik sisteme geçiş bu kapsamdadır.", "cmt_en": "🇬🇧 A special advisory engagement agreement applies to occasional, one-time special arrangements. Transitioning from a manual to automated system falls under this category."}, {"tr": "Acil danışmanlık görev sözleşmesi", "en": "Emergency advisory engagement agreement", "cmt_tr": "🇹🇷 Acil danışmanlık görev sözleşmesi planlanmamış görevler için uygundur.", "cmt_en": "🇬🇧 An emergency advisory engagement agreement applies to unplanned engagements."}]}, {"q_tr": "İç denetçiler yeni bilgi sistemi geliştirmede kontrolleri analiz eden bir danışmanlık görevi yürüttü ve çeşitli kontrol sorunları tespit etti. Bu görevin sonucu büyük olasılıkla ne olacaktır?", "q_en": "Internal auditors conducted an advisory engagement analyzing controls in development of a new information system and noted control issues. The result would most likely be", "answer": 1, "options": [{"tr": "İç denetçilerin yeni, daha güçlü kontroller uygulaması", "en": "Implementation of new, stronger internal controls by the internal auditors", "cmt_tr": "🇹🇷 İç denetim bir yönetim karar alma birimi değildir. Önerilerin uygulanması yönetimin sorumluluğundadır.", "cmt_en": "🇬🇧 Internal auditing is not a management decision-making function; implementation of recommendations is management's responsibility."}, {"tr": "Sorunları belgeleyen ve kontrolleri iyileştirmeye yönelik öneriler içeren bir rapor", "en": "A report documenting the issues and providing recommendations on how to improve controls", "cmt_tr": "🇹🇷 İç denetim danışmanlık hizmetleri; sorunları belgeleyerek ve daha güçlü kontrollerin nasıl uygulanacağına dair öneriler sunarak organizasyona değer katar. Denetçiler rehberlik sağlar; resmi değerlendirme yapmaz veya yönetim rolü üstlenmez.", "cmt_en": "🇬🇧 Internal audit advisory services add value by documenting issues and recommending stronger controls. Auditors offer guidance without providing formal evaluations or assuming management roles."}, {"tr": "Yönetimin zayıf iç kontrollerini eleştiren ve doğrudan yönetim kuruluna gönderilen bir rapor", "en": "A report criticizing weak controls sent directly to the board", "cmt_tr": "🇹🇷 Kontrol sorunları, yönetim kuruluna iletilmeden önce yönetime bildirilmeli; denetçi aynı zamanda bu sorunların nasıl giderileceğini de önermelidir.", "cmt_en": "🇬🇧 Management should be informed of control issues before the board, and the auditor should also recommend how to mitigate those issues."}, {"tr": "İç denetimden üyeler içeren geçici çapraz fonksiyonlu bir ekibin oluşturulması", "en": "Formation of a temporary cross-functional team including internal audit members to implement controls", "cmt_tr": "🇹🇷 İç denetçiler yeni kontroller uygulayan bir ekibin parçası olmamalıdır; bağımsız ve nesnel tavsiye sunarlar.", "cmt_en": "🇬🇧 Internal auditors should not be members of a team implementing new controls; they provide independent, objective advice."}]}, {"q_tr": "Aşağıdakilerden hangisi danışmanlık görevine örnektir?", "q_en": "Which of the following is an example of an advisory engagement?", "answer": 1, "options": [{"tr": "İç denetimin organizasyonun politika gerekliliklerine uyup uymadığını doğrulaması", "en": "Internal audit asked to verify the organization is adhering to policy requirements", "cmt_tr": "🇹🇷 Organizasyonun politika gerekliliklerine uyup uymadığını doğrulamak uyumluluk denetimine örnektir.", "cmt_en": "🇬🇧 Verifying that the organization is adhering to policy requirements is an example of a compliance audit, not advisory."}, {"tr": "Nakit kontrollerinin yeterliliğini inceleme ve iyileştirme önerileri sunma", "en": "Review and recommend improvements for adequacy of cash controls at an offsite location", "cmt_tr": "🇹🇷 Nakit kontrollerinin yeterliliğini inceleyerek iyileştirme önerileri sunmak danışmanlık hizmetidir; güvence sağlamaz veya yönetim sorumluluğu üstlenmez.", "cmt_en": "🇬🇧 Reviewing and recommending improvements for cash controls adequacy is an advisory service because it does not provide assurance or assume management responsibilities."}, {"tr": "Yönetimin kârlılık iddiasına ilişkin görüş sunma", "en": "Provide an opinion on management's claim that the segment was profitable in the first quarter", "cmt_tr": "🇹🇷 Yönetimin kârlılık iddiasına ilişkin görüş sunmak finansal göreve örnektir ve güvence hizmetleri kapsamındadır.", "cmt_en": "🇬🇧 Providing an opinion on management's profitability claim is an example of a financial engagement within assurance services."}, {"tr": "Organizasyonun operasyon etkinliğini değerlendirme", "en": "Evaluate the effectiveness of the organization's operations", "cmt_tr": "🇹🇷 Organizasyon operasyonlarının etkinliğini değerlendirmek operasyonel denetime örnektir.", "cmt_en": "🇬🇧 Evaluating the effectiveness of operations is an example of an operational audit, not advisory."}]}, {"q_tr": "Bir yönetici finansal verinin manipüle edilmesini önerdiğinde iç denetçi etik standartları korumak için nasıl davranmalıdır?", "q_en": "A manager suggests manipulating financial data for favorable reporting. How should the auditor respond to maintain ethical standards?", "answer": 1, "options": [{"tr": "Çatışmayı önlemek için yöneticinin isteğine uymak", "en": "Comply with the manager's request to avoid conflict", "cmt_tr": "🇹🇷 Yöneticinin isteğine uymak etik dışı davranışa katılmak anlamına gelir ve mesleki standartları ihlal eder.", "cmt_en": "🇬🇧 Complying with the manager's request violates ethical standards by participating in unethical behavior."}, {"tr": "Öneriyi derhal etik komiteye veya üst makama bildirmek", "en": "Report the suggestion to the ethics committee or a superior immediately", "cmt_tr": "🇹🇷 Etik dışı davranışı bildirmek, bütünlük ve mesleki standartlara uyum için zorunludur. Etik komite veya üst makamı bilgilendirmek; şeffaflık ve hesap verebilirlik ilkelerini destekler.", "cmt_en": "🇬🇧 Reporting unethical behavior is crucial for maintaining integrity and compliance. Informing the ethics committee or superior upholds transparency and accountability principles."}, {"tr": "Manipülasyonun potansiyel fayda ve zararlarını yöneticiyle tartışmak", "en": "Discuss the potential benefits versus drawbacks of the manipulation with the manager", "cmt_tr": "🇹🇷 Bu tür bir tartışma, manipülasyon fikrini değerlendirerek suça ortaklık anlamı taşır.", "cmt_en": "🇬🇧 Such a discussion suggests complicity by entertaining the idea of manipulation."}, {"tr": "Öneriyi şaka saydığını düşünerek görmezden gelmek", "en": "Ignore the suggestion, assuming it was a joke", "cmt_tr": "🇹🇷 Öneriyi görmezden gelmek, konunun ciddiyetini ele almayı başaramaz ve etik standartları koruma fırsatını kaçırır.", "cmt_en": "🇬🇧 Ignoring the suggestion fails to address the seriousness of the issue and misses an opportunity to uphold ethical standards."}]}, {"q_tr": "Üst yönetim, tüm yönetici personel için sürekli iç kontrol eğitimi talep etti. Bu talep en uygun biçimde nasıl karşılanmalıdır?", "q_en": "Senior management requested ongoing internal control training for all managerial personnel. This request most likely should be addressed by a(n)", "answer": 0, "options": [{"tr": "Resmi danışmanlık görevi", "en": "Formal advisory engagement", "cmt_tr": "🇹🇷 Eğitim danışmanlık hizmetlerinin bir örneğidir. Bu tür sürekli eğitim planlanmalı ve yazılı bir anlaşmaya tabi olmalıdır; bu da resmi danışmanlık görevini uygun kılar.", "cmt_en": "🇬🇧 Training is an example of advisory services. Such continuous training should be planned and subject to written agreement, making a formal advisory engagement appropriate."}, {"tr": "Gayri resmi danışmanlık görevi", "en": "Informal advisory engagement", "cmt_tr": "🇹🇷 Gayri resmi danışmanlık görevi rutin görevler için uygundur; planlanmış sürekli eğitim programları için değil.", "cmt_en": "🇬🇧 An informal advisory engagement applies to routine tasks, not planned continuous training programs."}, {"tr": "Özel danışmanlık görevi", "en": "Special advisory engagement", "cmt_tr": "🇹🇷 Özel danışmanlık görevi, birleşme veya sistem dönüşümü gibi tek seferlik özel düzenlemeler için uygundur.", "cmt_en": "🇬🇧 A special advisory engagement applies to occasional, one-time special arrangements like mergers or system conversions."}, {"tr": "Acil danışmanlık görevi", "en": "Emergency advisory engagement", "cmt_tr": "🇹🇷 Acil danışmanlık görevi, felaket sonrası operasyonların yeniden kurulması gibi planlanmamış görevler için uygundur.", "cmt_en": "🇬🇧 An emergency advisory engagement applies to unplanned engagements, e.g., recovery of operations after a disaster."}]}, {"q_tr": "Her iç denetçinin çatışmaları çözmenin doğru yolu nedir?", "q_en": "The proper way for every internal auditor to resolve conflict is by following the", "answer": 3, "options": [{"tr": "Organizasyonun davranış kurallarındaki yönergeler", "en": "Guidelines set out in the organization's code of conduct", "cmt_tr": "🇹🇷 İç denetçi organizasyonel olarak bir davranış kuralına uymak zorunda olabilir; ancak her iç denetçi Standartlara uymak zorundadır.", "cmt_en": "🇬🇧 An internal auditor may be organizationally required to follow a code of conduct, but every internal auditor must comply with the Standards."}, {"tr": "YDY tarafından belirlenen prosedürler", "en": "Procedures designated by the CAE", "cmt_tr": "🇹🇷 İç denetçi YDY tarafından belirlenen prosedürlere uymak zorunda olabilir; ancak her iç denetçi Standartlara uymak zorundadır.", "cmt_en": "🇬🇧 An internal auditor may be required to follow CAE procedures, but every internal auditor must comply with the Standards."}, {"tr": "AICPA Mesleki Davranış Kuralları", "en": "AICPA Code of Professional Conduct", "cmt_tr": "🇹🇷 AICPA Mesleki Davranış Kuralları, dış denetim yapan CPA'lar için geçerlidir. İç denetçiler için IIA'nın Global İç Denetim Standartları uygulanır.", "cmt_en": "🇬🇧 The AICPA Code of Professional Conduct applies to CPAs performing external audits. For internal auditors, The IIA's Global Internal Audit Standards apply."}, {"tr": "IIA'nın Global İç Denetim Standartları'ndaki yönergeler", "en": "Guidelines set out in The IIA's Global Internal Audit Standards", "cmt_tr": "🇹🇷 Tüm hizmetlerin sunumunda iç denetçi IIA'nın Global İç Denetim Standartları tarafından yönlendirilir. Bu rehberlik iç denetim hizmetleri sunan herkes için zorunludur.", "cmt_en": "🇬🇧 In the performance of all services, the internal auditor is guided by The IIA's Global Internal Audit Standards. Their guidance is mandatory for all those who perform internal audit services."}]}, {"q_tr": "İç denetim danışmanlık hizmetleri", "q_en": "Internal audit advisory services", "answer": 1, "options": [{"tr": "Risklerin yönetilmesinde belirli yönetim sorumluluklarının üstlenilmesini içerir", "en": "Involve assuming certain responsibilities for managing risks", "cmt_tr": "🇹🇷 Risk yönetimi süreçlerinin oluşturulmasına veya iyileştirilmesine yardımcı olurken iç denetçiler riskleri fiilen yöneterek yönetim sorumluluğu üstlenmekten kaçınmalıdır.", "cmt_en": "🇬🇧 When assisting management with risk management processes, internal auditors must refrain from assuming any management responsibility by actually managing risks."}, {"tr": "Eğitimi kapsar", "en": "Include training", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri; yeni politika, süreç, sistem ve ürünlerin tasarımında tavsiye, adli hizmetler, eğitim ve risk/kontrol tartışmalarını kolaylaştırmayı kapsar.", "cmt_en": "🇬🇧 Advisory services include advising on new policies, processes, systems and products; providing forensic services; providing training; and facilitating discussions about risks and controls."}, {"tr": "Soruşturmaları ve denetim dışı rolleri dışlar", "en": "Exclude investigations and nonaudit roles", "cmt_tr": "🇹🇷 Güvence ve danışmanlık hizmetleri birbirini dışlamaz ve soruşturmalar ile denetim dışı roller gibi diğer iç denetim hizmetlerini de engellemez.", "cmt_en": "🇬🇧 Assurance and advisory services are not mutually exclusive and do not preclude other internal audit services such as investigations and nonaudit roles."}, {"tr": "İç denetim tanımıyla mutlaka tutarlı olmayan biçimlerde değer katar", "en": "Add value in ways not necessarily consistent with the definition of internal auditing", "cmt_tr": "🇹🇷 İç denetim, değer katan ve operasyonları geliştiren bir güvence ve danışmanlık hizmetidir. Sunulan hizmetler iç denetimin geniş tanımıyla tutarlı olmalıdır.", "cmt_en": "🇬🇧 Internal auditing is an assurance and advisory service designed to add value. Services performed must be consistent with the broad definition of internal auditing."}]}, {"q_tr": "Aşağıdakilerden hangisi kolaylaştırıcı danışmanlık görevini tanımlar?", "q_en": "Which of the following statements describes a facilitative advisory engagement?", "answer": 2, "options": [{"tr": "Özel bir talebi karşılamak için geçici bir ekipte yer almayı içerir", "en": "Participation in a team assembled to supply temporary help for a special request", "cmt_tr": "🇹🇷 Özel bir talebi karşılamak için geçici bir ekipte yer almak acil bir görevdir; kolaylaştırıcı danışmanlık görevi değil.", "cmt_en": "🇬🇧 Participating in a team to supply temporary help for a special request is an emergency engagement, not a facilitative advisory engagement."}, {"tr": "Devamlı komitelere katılım gibi rutin faaliyetleri içerir", "en": "Routine activities such as participation in standing committees", "cmt_tr": "🇹🇷 Devamlı komitelere katılım gibi rutin faaliyetler gayri resmi danışmanlık görevidir; kolaylaştırıcı danışmanlık değil.", "cmt_en": "🇬🇧 Routine activities such as participation in standing committees represent an informal advisory engagement, not facilitative."}, {"tr": "İç denetçinin uzmanlığını kullanarak yönetimin sorunları ve çözümleri değerlendirmesine yardımcı olmak", "en": "Using internal auditor expertise to assist management in assessing issues and solutions in their areas of responsibility", "cmt_tr": "🇹🇷 Kolaylaştırıcı danışmanlık görevi; iç denetçi uzmanlığını kullanarak yönetim ve personelin kendi sorumluluk alanlarındaki sorunları ve çözümleri değerlendirmesine yardımcı olur.", "cmt_en": "🇬🇧 A facilitative advisory engagement uses internal auditor expertise to assist management and staff in assessing issues and solutions related to their areas of responsibility."}, {"tr": "İç denetçilerin özel bilgilerini ilgili alanlardaki personelle paylaşması", "en": "Imparting specialized knowledge that internal auditors have to staff working in those areas", "cmt_tr": "🇹🇷 İç denetçilerin özel bilgilerini ilgili alanlardaki personelle paylaşması eğitici danışmanlık görevidir; kolaylaştırıcı değil.", "cmt_en": "🇬🇧 Imparting specialized knowledge to staff in specific areas is an educational advisory engagement, not facilitative."}]}, {"q_tr": "Aşağıdakilerden hangisi iç denetçiler tarafından sunulan bir danışmanlık görev türüdür?", "q_en": "Which of the following is a type of advisory engagement provided by internal auditors?", "answer": 0, "options": [{"tr": "Eğitici", "en": "Educational", "cmt_tr": "🇹🇷 Eğitici görevler, eğitim ve özel bilginin aktarılmasını içerir; danışmanlık hizmetlerinin açık bir örneğidir.", "cmt_en": "🇬🇧 Educational engagements involve training and imparting specialized knowledge; they are a clear example of advisory services."}, {"tr": "Güvence", "en": "Assurance", "cmt_tr": "🇹🇷 Güvence görevleri; iç denetçilerin resmi değerlendirmeler ve görüşler sunduğu ayrı bir hizmet kategorisidir. Resmi güvence içermediğinden danışmanlık hizmetlerinden farklıdır.", "cmt_en": "🇬🇧 Assurance engagements are a separate service category where formal evaluations and opinions are provided. They are distinct from advisory services, which do not include formal assurances."}, {"tr": "Finansal görüş", "en": "Financial opinion", "cmt_tr": "🇹🇷 Finansal görüş, bir güvence görevi olan finansal denetimin sonunda verilir.", "cmt_en": "🇬🇧 A financial opinion is issued at the conclusion of a financial audit, which is an assurance engagement, not advisory."}, {"tr": "Sistem uygulaması", "en": "System implementation", "cmt_tr": "🇹🇷 Sistemlerin uygulanması yönetimin sorumluluğundadır; iç denetçilerin değil.", "cmt_en": "🇬🇧 Implementing systems is the responsibility of management, not internal auditors."}]}, {"q_tr": "Danışmanlık hizmetleri organizasyona nasıl değer katar?", "q_en": "Advisory services add value to an organization by", "answer": 2, "options": [{"tr": "Yönetimin karar alma sorumluluklarını üstlenerek", "en": "Assuming management's decision-making responsibilities", "cmt_tr": "🇹🇷 İç denetçiler yönetim rolü üstlenmez; bunun yerine içgörüler sunar.", "cmt_en": "🇬🇧 Internal auditors do not assume a management role; instead they provide insights and guidance."}, {"tr": "Resmi finansal tablo ve denetim görüşleri sunarak", "en": "Providing formal financial statements and audit opinions", "cmt_tr": "🇹🇷 Resmi finansal tablo ve görüşler danışmanlık değil güvence hizmetleri tarafından sağlanır.", "cmt_en": "🇬🇧 Formal financial statements and opinions are provided by assurance, not advisory, services."}, {"tr": "Bağımsız, risk temelli ve ileriye dönük tavsiyeler sunarak", "en": "Supplying independent, risk-based, and forward-looking advice", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri; nesnel, riske dayalı içgörüler sunarak karar almayı geliştirir ve stratejik/operasyonel süreçlere yardımcı olarak önemli değer katar.", "cmt_en": "🇬🇧 Advisory services apply internal auditors' expertise to provide objective, risk-informed insights that enhance decision-making, adding significant value to the organization."}, {"tr": "Tüm iç politika ve prosedürlere uyumu zorunlu kılarak", "en": "Enforcing compliance with all internal policies and procedures", "cmt_tr": "🇹🇷 Uyumluluk önemli olmakla birlikte danışmanlık hizmetleri, zorunlu kılmak yerine rehberlik ve risk temelli stratejileri ön plana çıkarır.", "cmt_en": "🇬🇧 Compliance is important, but advisory services emphasize guidance and risk-based strategies rather than enforcement."}]}, {"q_tr": "Danışmanlık hizmetleri iç denetim nesnelliğini olumsuz etkileyebilir; bu durum ne zaman söz konusu olur?", "q_en": "Advisory services might negatively affect internal audit objectivity when", "answer": 1, "options": [{"tr": "Denetçiler kontrol süreçleri hakkında rutin geri bildirim verdiğinde", "en": "Auditors provide routine feedback on control processes", "cmt_tr": "🇹🇷 Rutin geri bildirim danışmanlık hizmetlerinin tipik bir parçasıdır ve uygun biçimde yönetildiğinde nesnelliği etkilememelidir.", "cmt_en": "🇬🇧 Routine feedback is a typical part of advisory services and should not affect objectivity if appropriately managed."}, {"tr": "Denetçiler yönetim kontrollerini tasarlayıp uygulattığında", "en": "Auditors design and implement management controls", "cmt_tr": "🇹🇷 Kontrolleri tasarlayıp uygulamak nesnelliği tehlikeye atabilir. Bu faaliyetler denetçileri yönetim işlevlerine dahil ederek çıkar çatışmasına yol açabilir. Nesnel danışmanlık hizmetleri yönetim rolü üstlenmekten kaçınmalıdır.", "cmt_en": "🇬🇧 Designing and implementing controls could compromise objectivity. These activities involve auditors in management functions, potentially creating conflicts of interest. Objective advisory services must avoid assuming management roles."}, {"tr": "Denetim sonuçlarının gayri resmi olarak iletildiğinde", "en": "An informal communication of audit results is made", "cmt_tr": "🇹🇷 Gayri resmi iletişim yönergeler çerçevesinde gerçekleşebilir ve nesnelliği koruyabilir.", "cmt_en": "🇬🇧 Informal communication can occur within guidelines and maintain objectivity."}, {"tr": "Risk yönetimi stratejilerinin geliştirilmesine katıldığında", "en": "Participating in developing risk management strategies", "cmt_tr": "🇹🇷 Strateji geliştirme doğası gereği danışmanlık niteliğindedir ve önlemler alındığında nesnelliği doğrudan tehlikeye atmaz.", "cmt_en": "🇬🇧 Developing strategies is advisory by nature and does not inherently compromise objectivity if appropriate safeguards are in place."}]}, {"q_tr": "İç denetim personelini risk değerlendirme ve yönetimi konusunda eğitmek için hangi danışmanlık görevi türü uygundur?", "q_en": "Which type of advisory engagement is appropriate for training internal audit staff in assessing and managing risks?", "answer": 1, "options": [{"tr": "Acil danışmanlık", "en": "Emergency advisory", "cmt_tr": "🇹🇷 Acil görevler; felaket kurtarma veya olağandışı son tarihleri karşılamak için geçici yardım gibi acil durumları kapsar.", "cmt_en": "🇬🇧 Emergency engagements address urgent situations such as disaster recovery or temporary help to meet an unusual deadline."}, {"tr": "Eğitici", "en": "Educational", "cmt_tr": "🇹🇷 Eğitici görevler; risk yönetimi eğitimi gibi bilgi aktarmak için özel olarak tasarlanmıştır. İç denetçilerin özel bilgileri ilgili alanlardaki personelin kapasitesini artırır.", "cmt_en": "🇬🇧 Educational engagements are specifically intended to impart knowledge, such as risk management training. Internal auditors' specialized knowledge enhances staff capabilities."}, {"tr": "Özel danışmanlık", "en": "Special advisory", "cmt_tr": "🇹🇷 Özel görevler genellikle birleşme veya sistem dönüşümü gibi durumları kapsar.", "cmt_en": "🇬🇧 Special engagements typically involve situations like mergers or system conversions, not training."}, {"tr": "Gayri resmi danışmanlık", "en": "Informal advisory", "cmt_tr": "🇹🇷 Gayri resmi görevler; devamlı komitelere katılım, sınırlı süreli projeler, geçici toplantılar ve rutin bilgi alışverişi gibi rutin faaliyetleri kapsar.", "cmt_en": "🇬🇧 Informal engagements involve routine activities such as participation on standing committees, limited-life projects, ad-hoc meetings, and routine information exchange."}]}], "Subunit 2 - IA Responsibilities": [{"q_tr": "Danışmanlık görevlerinde elde edilen ve yönetim kuruluna ve üst yönetime iletilen bilgileri kim belirler?", "q_en": "Who is responsible for determining information obtained in advisory engagements that is communicated to the board and senior management?", "answer": 0, "options": [{"tr": "Yönetim denetim yöneticisi (YDY)", "en": "The chief audit executive", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri iç denetim fonksiyonuna önemli bir kapsam tanısa da temel rol üst yönetime ve yönetim kuruluna tavsiye sunmaktır. YDY, danışmanlık görevlerinden yöneticilere ve yönetim kuruluna iletilmesi gereken bilgileri belirler.", "cmt_en": "🇬🇧 Although advisory services allow significant scope, the primary role is to provide advice to senior management and the board. The CAE determines what information from advisory engagements should be communicated to executives and board members."}, {"tr": "Yönetim", "en": "Management", "cmt_tr": "🇹🇷 Bu bilgileri belirlemekten sorumlu olan yönetim değil, YDY'dir.", "cmt_en": "🇬🇧 It is the CAE, not management, who should determine the information from advisory engagements communicated to the board and senior management."}, {"tr": "Yönetim kurulu", "en": "The board", "cmt_tr": "🇹🇷 Bu bilgileri belirlemekten sorumlu olan yönetim kurulu değil, YDY'dir.", "cmt_en": "🇬🇧 It is the CAE, not the board, who should determine the information from advisory engagements communicated to the board and senior management."}, {"tr": "Denetim komitesi", "en": "The audit committee", "cmt_tr": "🇹🇷 Bu bilgileri belirlemekten sorumlu olan denetim komitesi değil, YDY'dir.", "cmt_en": "🇬🇧 It is the CAE, not the audit committee, who should determine the information from advisory engagements communicated to the board and senior management."}]}, {"q_tr": "İç denetçiler bir danışmanlık görevi gerçekleştirirken risk konusundaki sorumlulukları için en iyi ifade hangisidir?", "q_en": "When internal auditors perform an advisory engagement, what is the best statement of their responsibility regarding risk?", "answer": 2, "options": [{"tr": "Önemli risklerin varlığına karşı uyanık olmak", "en": "Be alert to the existence of significant risks", "cmt_tr": "🇹🇷 İç denetçiler ayrıca görev hedefleriyle tutarlı riskleri de ele almalıdır; yalnızca önemli risklere karşı uyanık olmak yeterli değildir.", "cmt_en": "🇬🇧 Internal auditors must also address risk consistent with engagement objectives, not only be alert to significant risks."}, {"tr": "Yalnızca görev hedefleriyle tutarlı riskleri dikkate almak", "en": "Consider only the risk consistent with engagement objectives", "cmt_tr": "🇹🇷 İç denetçiler ayrıca diğer önemli risklerin varlığına karşı da uyanık olmalıdır.", "cmt_en": "🇬🇧 Internal auditors must also be alert to the existence of other significant risks beyond the engagement objectives."}, {"tr": "Görev hedefleriyle tutarlı riskleri ele almak ve belirli diğer risklere karşı uyanık olmak", "en": "Address risk consistent with engagement objectives and be alert to certain other risks", "cmt_tr": "🇹🇷 Danışmanlık görevlerinde iç denetçiler; hem görev hedefleriyle tutarlı riskleri ele almalı hem de diğer önemli risklerin varlığına karşı uyanık olmalı. Ayrıca danışmanlık görevlerinden edinilen risk bilgisini organizasyonun risk yönetimi süreçlerini değerlendirmeye dahil etmelidir.", "cmt_en": "🇬🇧 During advisory engagements, internal auditors must address risk consistent with objectives and be alert to other significant risks. They must also incorporate knowledge of risks from advisory engagements into evaluation of organizational risk management processes."}, {"tr": "Riskleri yönetme sorumluluğunu üstlenmek", "en": "Assume responsibility for managing risks", "cmt_tr": "🇹🇷 Danışmanlık görevi, risk yönetimi süreçlerinin oluşturulmasına veya iyileştirilmesine yardımı kapsayabilir; ancak iç denetçiler riskleri fiilen yöneterek yönetim sorumluluğu üstlenmemelidir.", "cmt_en": "🇬🇧 An advisory engagement may involve assisting with risk management processes, but internal auditors must not assume any management responsibility by actually managing risks."}]}, {"q_tr": "Bir iç denetçi 1 Haziran Yıl 1'de XYZ Şirketi için resmi bir danışmanlık görevi gerçekleştirdi. Denetçinin bağımsız ve nesnel sayılmak için XYZ'ye güvence hizmetleri sunabileceği en erken tarih hangisidir?", "q_en": "An internal auditor performed a formal advisory engagement for XYZ Corporation on June 1, Year 1. When is the earliest time the auditor can perform assurance services for XYZ and be considered independent?", "answer": 1, "options": [{"tr": "1 Ocak Yıl 2", "en": "January 1, Year 2", "cmt_tr": "🇹🇷 Resmi bir danışmanlık görevinden sonraki 1 yıl içinde güvence hizmetleri sunulursa bağımsızlık ve nesnellik zarar görmüş sayılabilir. 1 Ocak Yıl 2 henüz 1 yıl dolmadan önceki bir tarihtir.", "cmt_en": "🇬🇧 Independence and objectivity may be impaired if assurance services are provided within 1 year after a formal advisory engagement. January 1, Year 2 is before the 1-year period expires."}, {"tr": "1 Haziran Yıl 2", "en": "June 1, Year 2", "cmt_tr": "🇹🇷 Bağımsızlık ve nesnellik, resmi bir danışmanlık görevinden sonraki 1 yıl içinde güvence hizmetleri sunulursa zarar görmüş sayılabilir. Zararın etkisi; farklı denetçiler atamak, bağımsız yönetim ve denetim oluşturmak, ayrı sorumluluk tanımlamak ve tahmini zararı açıklamak yoluyla azaltılabilir.", "cmt_en": "🇬🇧 Independence and objectivity may be impaired if assurance services are provided within 1 year after a formal advisory engagement. Effects of impairment may be mitigated by assigning different auditors, establishing independent management, defining separate accountability, and disclosing the presumed impairment."}, {"tr": "1 Temmuz Yıl 1", "en": "July 1, Year 1", "cmt_tr": "🇹🇷 Resmi bir danışmanlık görevinden sonraki 1 yıl içinde güvence hizmetleri sunulursa bağımsızlık ve nesnellik zarar görmüş sayılabilir.", "cmt_en": "🇬🇧 Independence and objectivity may be impaired if assurance services are provided within 1 year after a formal advisory engagement."}, {"tr": "2 Haziran Yıl 1", "en": "June 2, Year 1", "cmt_tr": "🇹🇷 Resmi bir danışmanlık görevinden sonraki 1 yıl içinde güvence hizmetleri sunulursa bağımsızlık ve nesnellik zarar görmüş sayılabilir.", "cmt_en": "🇬🇧 Independence and objectivity may be impaired if assurance services are provided within 1 year after a formal advisory engagement."}]}, {"q_tr": "YDY danışmanlık hizmetleri sunmak için yönetim kurulundan onay aldıktan sonra ne yapılmalıdır?", "q_en": "After the chief audit executive receives approval from the board to offer advisory services, what should be done?", "answer": 2, "options": [{"tr": "YDY danışmanlık hizmetleri sunmaya başlamalıdır", "en": "The CAE should begin performing advisory services", "cmt_tr": "🇹🇷 YDY yönetim kurulu onayını aldıktan sonra iç denetim tüzüğü değiştirilmeli ve YDY politika ve prosedürleri oluşturmalıdır.", "cmt_en": "🇬🇧 After CAE receives board approval, the internal audit charter must be amended and the CAE must establish policies and procedures before performing services."}, {"tr": "YDY iç denetçilerden onay almalıdır", "en": "The CAE should get approval from the internal auditors", "cmt_tr": "🇹🇷 YDY'nin iç denetçilerden ek onay almasına gerek yoktur; yalnızca yönetim kurulu onayı yeterlidir.", "cmt_en": "🇬🇧 The CAE does not need to obtain additional approval from internal auditors. Only board approval is required."}, {"tr": "İç denetim tüzüğü değiştirilmelidir", "en": "The internal audit charter should be amended", "cmt_tr": "🇹🇷 İç denetim fonksiyonunun amacı, yetkisi ve sorumluluğu iç denetim tüzüğünde resmi olarak tanımlanmalıdır. Danışmanlık hizmetlerinin niteliği de tüzükte yer almalıdır.", "cmt_en": "🇬🇧 The purpose, authority, and responsibility of the internal audit function must be formally defined in the internal audit charter. The nature of advisory services must be defined in the charter."}, {"tr": "Yönetim kurulu bu tür görevlerin yürütülmesi için uygun politika ve prosedürler geliştirmelidir", "en": "The board should develop appropriate policies and procedures for conducting such engagements", "cmt_tr": "🇹🇷 Politika ve prosedürleri geliştirmek yönetim kurulunun değil YDY'nin sorumluluğundadır.", "cmt_en": "🇬🇧 The CAE, not the board, must establish policies and procedures to guide the internal audit function."}]}, {"q_tr": "Önerilen bir danışmanlık göreviyle ilgili olası bir bağımsızlık veya nesnellik zedelenmesi olduğunda ne yapılmalıdır?", "q_en": "When an internal auditor has a potential impairment of independence or objectivity relating to a proposed advisory engagement, what action must be taken?", "answer": 3, "options": [{"tr": "İç denetçi danışmanlık görevini derhal reddetmelidir", "en": "The internal auditor must immediately refuse the advisory engagement", "cmt_tr": "🇹🇷 İç denetçinin görevi reddetmesine gerek yoktur; ancak müşteriye olası zedelenmeyi uygun biçimde açıklamalıdır.", "cmt_en": "🇬🇧 The internal auditor does not need to refuse the engagement but must properly disclose the potential impairment to the client."}, {"tr": "İç denetçi olası zedelenmeyi YDY'ye açıklamamalıdır", "en": "The internal auditor must not disclose the potential impairment to the chief audit executive", "cmt_tr": "🇹🇷 Danışmanlık görevinde iç denetçi olası zedelenmeyi görev müşterisine açıklamalıdır. Uygun taraflara hangi bilgilerin açıklanacağı, YDY'nin tüzükte tanımlanan sorumlulukları çerçevesinde belirlenir.", "cmt_en": "🇬🇧 For an advisory engagement, the internal auditor must disclose the potential impairment to the engagement client. Details depend on the CAE's responsibilities to senior management and the board as described in the charter."}, {"tr": "İç denetçi zedelenmeyi açıklamadan görevi kabul edebilir", "en": "The internal auditor need not disclose the potential impairment and may accept the engagement", "cmt_tr": "🇹🇷 İç denetçi görevi kabul etmeden önce olası zedelenmeyi görev müşterisine uygun biçimde açıklamalıdır.", "cmt_en": "🇬🇧 The internal auditor must properly disclose the potential impairment to the engagement client before accepting the engagement."}, {"tr": "İç denetçi görevi kabul etmeden önce olası zedelenmeyi görev müşterisine açıklamalıdır", "en": "The internal auditor must disclose the potential impairment to the engagement client prior to accepting", "cmt_tr": "🇹🇷 Önerilen bir danışmanlık hizmetiyle ilgili bağımsızlık veya nesnellik zedelenmesi olasılığı varsa görevi kabul etmeden önce görev müşterisine açıklanmalıdır.", "cmt_en": "🇬🇧 If independence or objectivity is potentially impaired in relation to a proposed advisory service, disclosure must be made to the engagement client prior to accepting the engagement."}]}, {"q_tr": "İç denetçilerin danışmanlık hizmetleri sunmaya başlamadan önce gerçekleştirilmesi gereken olayların doğru sırası hangisidir? (1. Tüzük değişikliği, 2. YDY onayı, 3. Politika geliştirme)", "q_en": "What is the correct order for: 1. Charter amended, 2. Board approves advisory services, 3. Policies and procedures developed?", "answer": 2, "options": [{"tr": "1, 2, 3", "en": "1, 2, 3", "cmt_tr": "🇹🇷 Bu sıra yanlıştır. Önce yönetim kurulu onayı, sonra tüzük değişikliği, ardından politika geliştirme yapılmalıdır.", "cmt_en": "🇬🇧 This order is incorrect. Board approval must come first, then charter amendment, then policy development."}, {"tr": "2, 3, 1", "en": "2, 3, 1", "cmt_tr": "🇹🇷 Bu sıra yanlıştır. Politika geliştirme tüzük değişikliğinden önce yapılamaz.", "cmt_en": "🇬🇧 This order is incorrect. Policy development cannot precede charter amendment."}, {"tr": "2, 1, 3", "en": "2, 1, 3", "cmt_tr": "🇹🇷 Doğru sıra şöyledir: Önce YDY yönetim kurulunun danışmanlık hizmetleri konseptini onayladığını doğrular. Onayın ardından iç denetim tüzüğü danışmanlık faaliyetleri için yetki ve sorumlulukları içerecek biçimde değiştirilir. Ardından iç denetim fonksiyonu bu tür görevleri yürütmek için uygun politika ve prosedürler geliştirir.", "cmt_en": "🇬🇧 The correct order is: First, the CAE confirms board approval. Then the charter is amended to include authority for advisory activities. Finally, the internal audit function develops appropriate policies and procedures for conducting such engagements."}, {"tr": "3, 2, 1", "en": "3, 2, 1", "cmt_tr": "🇹🇷 Bu sıra yanlıştır. Politikalar yönetim kurulu onayı ve tüzük değişikliğinden önce geliştirilemez.", "cmt_en": "🇬🇧 This order is incorrect. Policies cannot be developed before board approval and charter amendment."}]}, {"q_tr": "Danışmanlık görevleri sırasında iç denetçiler", "q_en": "During advisory engagements, internal auditors", "answer": 3, "options": [{"tr": "Organizasyonel risk yönetimini değerlendirmeye dahil edilmesi gereken risk bilgisi edinebilir", "en": "May gain knowledge of risks that should be included in evaluating organizational risk management", "cmt_tr": "🇹🇷 Bu doğrudur, ancak tek başına yeterli değil; iç denetçiler ayrıca kontrol bilgisi ve danışmanlık hedefleriyle tutarlı olmayan önemli riskler konusunda da sorumludur.", "cmt_en": "🇬🇧 This is correct but incomplete; internal auditors also have responsibilities for control knowledge and significant risks beyond advisory engagement objectives."}, {"tr": "Hedeflerle tutarlı olmayan önemli risklerden sorumludur", "en": "Are responsible for significant risks not consistent with the objectives", "cmt_tr": "🇹🇷 Bu doğrudur, ancak tek başına yeterli değil; iç denetçiler ayrıca risk ve kontrol bilgisi edinme konusunda da sorumludur.", "cmt_en": "🇬🇧 This is correct but incomplete; internal auditors also have responsibilities for risk and control knowledge gained during advisory engagements."}, {"tr": "Organizasyonel kontrollerin değerlendirilmesine dahil edilmesi gereken kontrol bilgisi edinebilir", "en": "May gain knowledge of controls that should be included in evaluating organizational controls", "cmt_tr": "🇹🇷 Bu doğrudur, ancak tek başına yeterli değil; iç denetçiler ayrıca hedeflerle tutarlı olmayan önemli riskler konusunda da sorumludur.", "cmt_en": "🇬🇧 This is correct but incomplete; internal auditors are also responsible for significant risks not consistent with advisory engagement objectives."}, {"tr": "Yukarıdakilerin hepsi doğrudur", "en": "All of the answers are correct", "cmt_tr": "🇹🇷 İç denetçiler danışmanlık görevlerinden edinilen risk bilgisini organizasyonun risk yönetimi değerlendirmesine dahil etmelidir. Ayrıca görev hedefleriyle tutarlı riskleri ele almalı, diğer önemli risklere karşı uyanık olmalı ve kontrol bilgisini organizasyonun kontrol süreçleri değerlendirmesine dahil etmelidir.", "cmt_en": "🇬🇧 Internal auditors must incorporate knowledge of risks from advisory engagements into evaluation of organizational risk management. They must address risk consistent with objectives, be alert to other significant risks, and incorporate control knowledge into evaluation of organizational control processes."}]}, {"q_tr": "Danışmanlık görevinde iç denetçi yönetimin savunucusu olarak hareket eder. Bu durum ne anlama gelir?", "q_en": "During an advisory engagement, the internal auditor is acting as an advocate for management. This implies that", "answer": 0, "options": [{"tr": "Bağımsızlık gerekli değildir", "en": "Independence is not required", "cmt_tr": "🇹🇷 İç denetçilerin hizmet alanlarla görevin hedefleri ve kapsamı konusunda mutabık kalmaları gerekir. Danışmanlık görevinde iç denetçi yönetimin savunucusu olarak hareket eder ve bağımsızlık zorunlu değildir.", "cmt_en": "🇬🇧 Internal auditors need to reach an understanding of the objectives and scope of the advisory engagement. During an advisory engagement, the internal auditor acts as an advocate for management, and independence is not required."}, {"tr": "Nesnellik gerekli değildir", "en": "Objectivity is not required", "cmt_tr": "🇹🇷 İç denetçiler profesyonellik, bütünlük ve güvenilirliği sağlamak için görev kapsamını tasarlamalı; adil ve tarafsız bir zihinsel tutum korumalı ve yönetim sorumluluğu üstlenmemelidir. Nesnellik zorunludur.", "cmt_en": "🇬🇧 Internal auditors should ensure professionalism, integrity, and credibility are maintained. They must maintain a fair and impartial mindset. Objectivity is required."}, {"tr": "Mesleki şüphecilik gerekli değildir", "en": "Professional skepticism is not required", "cmt_tr": "🇹🇷 İç denetçiler hem güvence hem de danışmanlık görevlerinde mesleki şüphecilik tutumunu korumalıdır. Aksi hâlde yönetimin raporladığı her şeyi doğrulamadan kabul ederek yanıltıcı bulgulara ve hatalı tavsiyelere yol açabilirler.", "cmt_en": "🇬🇧 Internal auditors should maintain an attitude of professional skepticism in both assurance and advisory engagements; otherwise they would accept everything management reports without confirming assertions."}, {"tr": "Gizlilik gerekli değildir", "en": "Confidentiality is not required", "cmt_tr": "🇹🇷 İç denetçiler gizliliği korumalıdır. Danışmanlık görevi kapsamında bazıları yönetim ekibinin belirli üyelerine bile gizli olan bilgilere erişeceklerdir.", "cmt_en": "🇬🇧 Internal auditors must maintain confidentiality. They will have access to confidential information, some of which is confidential even to certain management team members."}]}, {"q_tr": "İç denetçi, yönetimin istediği hedeflerin ötesine geçilmesi gerektiğine inanıyorsa ne yapmalıdır?", "q_en": "The internal auditor believes objectives should go beyond those requested by management. What should the internal auditor do?", "answer": 3, "options": [{"tr": "Yönetimi ek hedefleri eklemeye ikna edemezse görevi reddetmek", "en": "Refuse to accept the engagement unless management can be persuaded to include additional objectives", "cmt_tr": "🇹🇷 İç denetçinin danışmanlık görevini reddetmek için bir nedeni yoktur.", "cmt_en": "🇬🇧 The internal auditor has no reason not to accept the advisory engagement."}, {"tr": "Gerekli hedefleri mevcut göreve dahil etmek ve son iletişimde yönetime bildirmek", "en": "Include necessary objectives in the current engagement and inform management in final communication", "cmt_tr": "🇹🇷 İç denetçi, yönetimle mutabık kalınan kapsam veya hedeflerin ötesine geçen hiçbir hizmet sunmamalıdır.", "cmt_en": "🇬🇧 The internal auditor must not perform any services beyond the scope or objectives agreed upon with management."}, {"tr": "Hedeflerin izlenmediğini belgeleyerek denetim komitesine resmi rapor vermek", "en": "Document that objectives were not pursued and disclose to the audit committee in a formal report", "cmt_tr": "🇹🇷 İç denetçi danışmanlık görevinde yalnızca hizmet alanlara, yani yönetime rapor verir.", "cmt_en": "🇬🇧 The internal auditor is only reporting to those receiving the services during an advisory engagement, i.e., management."}, {"tr": "Yönetimi ek hedefleri danışmanlık görevine eklemeye ikna etmeye çalışmak", "en": "Try to persuade management to include the additional objectives in the advisory engagement", "cmt_tr": "🇹🇷 Resmi danışmanlık görevlerini planlarken iç denetçiler yönetim yetkililerine uygun hedefler tasarlar. Özel yönetim taleplerinde iç denetçi: (1) yönetimi ek hedefleri eklemeye ikna etmeye çalışabilir veya (2) hedeflerin izlenmediğini belgeleyerek son iletişimde açıklayabilir ve sonraki ayrı bir güvence görevine dahil edebilir.", "cmt_en": "🇬🇧 In planning formal advisory engagements, internal auditors design objectives to meet appropriate management needs. For special requests, the auditor may persuade management to include additional objectives or document and disclose that objectives were not pursued in final communication, including them in a subsequent assurance engagement."}]}, {"q_tr": "Resmi bir danışmanlık görevi sırasında tespit edilen önemli risk maruziyetleri veya maddi kontrol zayıflıkları yönetimin dikkatine sunulur. Bazı durumlarda iç denetçinin endişeleri ayrıca kime iletilmelidir?", "q_en": "Substantial risk exposures or material control weaknesses discovered during a formal advisory engagement are brought to management's attention. In some situations, concerns are also communicated to", "answer": 3, "options": [{"tr": "Üst yönetim", "en": "Executive management", "cmt_tr": "🇹🇷 Bu doğrudur, ancak endişeler üst yönetim, denetim komitesi ve yönetim kuruluna da iletilebilir.", "cmt_en": "🇬🇧 This is correct, but concerns may also be communicated to the audit committee and board of directors."}, {"tr": "Denetim komitesi", "en": "Audit committee", "cmt_tr": "🇹🇷 Bu doğrudur, ancak endişeler üst yönetim, denetim komitesi ve yönetim kuruluna da iletilebilir.", "cmt_en": "🇬🇧 This is correct, but concerns may also be communicated to executive management and board of directors."}, {"tr": "Yönetim kurulu", "en": "Board of directors", "cmt_tr": "🇹🇷 Bu doğrudur, ancak endişeler üst yönetim, denetim komitesi ve yönetim kuruluna da iletilebilir.", "cmt_en": "🇬🇧 This is correct, but concerns may also be communicated to executive management and the audit committee."}, {"tr": "Yukarıdakilerin hepsi doğrudur", "en": "All of the answers are correct", "cmt_tr": "🇹🇷 İç denetçilerin resmi danışmanlık görevleri sırasında risk yönetimi ve kontrol süreçlerinin etkinliğine karşı uyanık olmaları gerekir. Önemli risk maruziyetleri veya maddi kontrol zayıflıkları yönetime iletilir. Bazı durumlarda denetçinin endişeleri üst yönetime veya yönetim kuruluna da iletilmelidir.", "cmt_en": "🇬🇧 Internal auditors must be observant of risk management and control process effectiveness during formal advisory engagements. Substantial risk exposures or material control weaknesses are brought to management's attention. In some situations, concerns should also be communicated to senior management or the board."}]}, {"q_tr": "İç denetçi danışmanlık görevinin sonuçlarını daha geniş bir kesime iletmesi gerektiği sonucuna varırsa adımların sırası nasıl olmalıdır? (1. Gönüllü iletişimi genişletme, 2. Davranış kuralları rehberliği, 3. Görev sözleşmesindeki yönlendirme)", "q_en": "In what order should steps be performed when auditor wants to expand communication beyond engagement recipients? (1. Persuade to expand voluntarily, 2. Code of conduct guidance, 3. Agreement direction)", "answer": 2, "options": [{"tr": "2, 1, 3", "en": "2, 1, 3", "cmt_tr": "🇹🇷 Bu sıra yanlıştır. İlk adım görev sözleşmesindeki yönlendirmeyi belirlemektir.", "cmt_en": "🇬🇧 This order is incorrect. The first step is to determine what direction is provided in the engagement agreement."}, {"tr": "1, 2, 3", "en": "1, 2, 3", "cmt_tr": "🇹🇷 Bu sıra yanlıştır. İlk adım görev sözleşmesindeki yönlendirmeyi belirlemektir.", "cmt_en": "🇬🇧 This order is incorrect. The first step is to determine what direction is provided in the engagement agreement."}, {"tr": "3, 1, 2", "en": "3, 1, 2", "cmt_tr": "🇹🇷 Doğru sıra: (1) Danışmanlık görevi sözleşmesinde yönlendirmeyi belirle, (2) İletişimi uygun taraflara gönüllü olarak genişletmeleri için ikna etmeye çalış, (3) Organizasyonun davranış kuralları, etik kuralları ve diğer ilgili politikalarındaki rehberliği belirle.", "cmt_en": "🇬🇧 Correct order: (1) Determine direction in the engagement agreement, (2) Attempt to persuade to expand communication voluntarily, (3) Determine guidance in organization's code of conduct, code of ethics, and other relevant policies and procedures."}, {"tr": "1, 3, 2", "en": "1, 3, 2", "cmt_tr": "🇹🇷 Bu sıra yanlıştır. İlk adım görev sözleşmesindeki yönlendirmeyi belirlemektir.", "cmt_en": "🇬🇧 This order is incorrect. The first step is to determine what direction is provided in the engagement agreement."}]}, {"q_tr": "Danışmanlık görevleri hakkında hangisi doğrudur?", "q_en": "Which statement about advisory engagements is true?", "answer": 2, "options": [{"tr": "Güvence görevlerine uygulanan belgeleme gereklilikleri danışmanlık görevlerine de uygulanır", "en": "Documentation requirements for assurance engagements apply to advisory engagements", "cmt_tr": "🇹🇷 Güvence görevlerine uygulanan belgeleme gereklilikleri danışmanlık görevlerine mutlaka uygulanmaz.", "cmt_en": "🇬🇧 Documentation requirements applicable to assurance engagements do not necessarily apply to advisory engagements."}, {"tr": "İç denetim fonksiyonu müşteriyle mutabık kalınan ölçüde yönetim sorumluluğu üstlenebilir", "en": "The internal audit function may assume management responsibility to the extent agreed with the client", "cmt_tr": "🇹🇷 Danışmanlık hizmetleri, iç denetçinin yönetim sorumluluğu üstlenmeksizin yönetişim, risk yönetimi ve kontrol süreçlerini iyileştirmeyi amaçlar.", "cmt_en": "🇬🇧 Advisory services are intended to improve governance, risk management, and control processes without the internal auditor assuming management responsibilities."}, {"tr": "İç denetçiler üst yönetimi ve yönetim kurulunu denetim kaynaklarının nasıl kullanıldığı konusunda bilgili tutar", "en": "Internal auditors keep senior management and the board informed about how audit resources are being deployed", "cmt_tr": "🇹🇷 İç denetçiler, resmi danışmanlık görevlerinin niteliğini, kapsamını ve genel sonuçlarını üst yönetim ve yönetim kuruluna açıklar. Ayrıntılı raporların veya spesifik sonuç ve önerilerin iletilmesi zorunlu değildir.", "cmt_en": "🇬🇧 Internal auditors disclose the nature, extent, and overall results of formal advisory engagements to management and the board. Neither detailed reports nor specific results and recommendations are required to be communicated."}, {"tr": "Resmi danışmanlık görevleri için iş programları danışmanlık kayıt sahipliğiyle ilgili politika ve konuları ele alır", "en": "Work programs for formal advisory engagements address policies related to ownership of advisory engagement records", "cmt_tr": "🇹🇷 YDY danışmanlık görev kayıtlarının saklanması ve tutulmasına ilişkin politikalar geliştirmelidir. Denetçiler uygun kayıt saklama politikaları benimser ve kayıtların sahipliği gibi konuları ele alır.", "cmt_en": "🇬🇧 The CAE must develop policies governing custody and retention of advisory engagement records. Auditors adopt appropriate record retention policies and address related issues such as ownership of engagement records."}]}, {"q_tr": "İç denetçi hangi tür danışmanlık görevini reddetmelidir?", "q_en": "The internal auditor should decline to perform which of the following types of advisory engagements?", "answer": 1, "options": [{"tr": "İç denetim fonksiyonunun politika ve prosedürleriyle çelişmeyen görevler", "en": "Engagements that have no conflict with the policies and procedures of the internal audit function", "cmt_tr": "🇹🇷 İç denetim fonksiyonunun politika ve prosedürleriyle çelişmeyen görevler kabul edilebilir.", "cmt_en": "🇬🇧 Engagements that have no conflict with the policies and procedures of the internal audit function are permissible."}, {"tr": "İç denetim personelinin görevin bir bölümünü gerçekleştirmek için gerekli bilgiye sahip olmadığı görevler", "en": "Engagements in which the internal audit staff lacks the knowledge needed to perform part of the engagement", "cmt_tr": "🇹🇷 İç denetçi; iç denetim tüzüğünce yasaklanan, iç denetim fonksiyonunun politika ve prosedürleriyle çelişen veya organizasyona değer katmayan ve en iyi çıkarları desteklemeyen danışmanlık görevlerini reddetmelidir.", "cmt_en": "🇬🇧 The internal auditor should decline advisory engagements that are prohibited by the charter, conflict with internal audit policies and procedures, or do not add value and promote the best interests of the organization."}, {"tr": "İç denetim tüzüğünün şartlarına göre izin verilen görevler", "en": "Engagements that are allowed by the terms of the internal audit charter", "cmt_tr": "🇹🇷 İç denetim tüzüğünce izin verilen görevler kabul edilebilir.", "cmt_en": "🇬🇧 Engagements that are allowed by the terms of the internal audit charter are permissible."}, {"tr": "Organizasyonun en iyi çıkarlarını destekleyen ve değer katan görevler", "en": "Engagements that add value and promote the best interests of the organization", "cmt_tr": "🇹🇷 Organizasyona değer katan ve en iyi çıkarları destekleyen görevler kabul edilebilir.", "cmt_en": "🇬🇧 Engagements that add value and promote the best interests of the organization are permissible."}]}, {"q_tr": "George, 10 ay önce XYZ Şirketi'nde bordrodan sorumluydu. Bordroyla ilgili hangi hizmetleri sunması bağımsızlık veya nesnellik zedelenmesi olarak değerlendirilir?", "q_en": "George was in charge of payroll for XYZ just 10 months ago. Performing what services regarding payroll is considered an impairment?", "answer": 1, "options": [{"tr": "Danışmanlık hizmetleri", "en": "Advisory services", "cmt_tr": "🇹🇷 İç denetçiler daha önce sorumlu oldukları operasyonlara ilişkin danışmanlık hizmetleri sunabilir.", "cmt_en": "🇬🇧 Internal auditors may provide advisory services relating to operations for which they had previous responsibilities."}, {"tr": "Güvence hizmetleri", "en": "Assurance services", "cmt_tr": "🇹🇷 Bir iç denetçi önceki yıl içinde sorumluluk üstlendiği bir faaliyet için güvence hizmetleri sunarsa nesnelliği zedelenmiş sayılır. George bordro için güvence hizmetleri sunarsa nesnelliği zedelenmiş olur. Ancak daha önce sorumluluk üstlendiği operasyonlara ilişkin danışmanlık hizmetle
