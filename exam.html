gement process were conducted, but the results were never integrated.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Yönetimin temel amacı, risk yönetimi sürecinin yapısında ve işleyişinde meydana gelebilecek değişiklikleri en aza indirmektir.", "en": "Management's primary objective is minimizing changes to the structure and operation of the risk management process.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İlgili kurumsal risk yönetimi programının birçok yönü gayri resmi ve belgelenmemiş durumdadır.", "en": "Many aspects of the related enterprise risk management program are informal and undocumented.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdaki durumlardan hangisinde nihai denetim raporunda Standartlara uygunsuzluğun belirtilmesi gerekir?", "q_en": "Under which of the following circumstances should the final audit report include a disclosure of nonconformance with the Standards?", "options": [{"tr": "İç denetim faaliyetinin dış kalite değerlendirmesi yalnızca beş yılda bir yapılır.", "en": "An external quality assessment of the internal audit activity is performed only once every five years.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, herhangi bir usulsüzlük kanıtı bulamadığı için olumsuz güvence verdi.", "en": "The internal auditor provided negative assurance, because he found no evidence of misconduct.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yıllık iç denetim planı, kuruluş için risklerden ziyade fırsatlara dayalı bazı danışmanlık hizmetlerini içermektedir.", "en": "The annual internal audit plan includes some consulting engagements that are based on opportunities rather than risks to the organization.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yeni bir iç denetçi, bordro departmanından iç denetim birimine geçti ve hemen bordro denetimine atandı.", "en": "A new internal auditor moved into the internal audit activity from the payroll department and was immediately assigned to the payroll audit.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "İç denetim biriminden, önerilen yeni envanter yönetim sisteminin uygulanmasına ilişkin riskler konusunda danışmanlık hizmeti vermesi istenmektedir. İç denetim biriminin bu görevi kabul etmesinde aşağıdakilerden hangisi dikkate alacağı önemli bir husustur?", "q_en": "The internal audit activity is asked to provide consulting services regarding the risks related to implementing a proposed new Inventory management system. Which of the following would be a key consideration of the internal audit activity in accepting this engagement?", "options": [{"tr": "Envanter yöneticisinden, planlanan işin danışmanlık hizmeti hedeflerini karşılamak için yeterli olup olmadığını belirlemesini isteyin.", "en": "Ask the inventory manager to determine whether the work planned would be sufficient to meet the consulting engagement objectives.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Danışmanlık hizmetinin sonuçlarının iletilmesinde kullanılan yöntemin, yönetim kurulunun tercih ettiği yöntemle tutarlı olduğundan emin olun.", "en": "Ensure that the method used to communicate the results of the consulting engagement is consistent with the board's preferred method.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Talep edilen değerlendirmeden elde edilecek faydaların, danışmanlık hizmetinin maliyetini aşıp aşmayacağını belirleyin.", "en": "Determine whether the benefits to be derived from the requested assessment would exceed the cost of providing the consulting service.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çalışmanın sonuçlarını iletmek için e-posta ve telefon görüşmelerini kullanın; bunlar iletişim için en verimli yöntemler olabilir.", "en": "Use email and telephone conversations to convey the results of the engagement, as these may prove to be the most efficient methods for communicating.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bir kuruluşun ödeme departmanında yapılan iç denetim, departman çalışanlarına ait sahte banka bilgilerini kullanarak meşru tedarikçilere birden fazla ödeme yapıldığını ortaya çıkardı. Bu tedarikçiler başlangıçta doğru banka bilgileriyle oluşturulmuştu, ancak daha sonra tedarikçi yönetim sistemine erişimi olan ödeme yetkilileri tarafından değiştirilmişti. Aşağıdaki kontrollerden hangisi, tedarikçilerin bankacılık bilgilerinin hileli bir şekilde değiştirilmesini muhtemelen önleyebilirdi?", "q_en": "An internal audit of an organization's disbursement department revealed that multiple payments were made to legitimate vendors bearing fraudulent banking information belonging to employees in the department. These vendors were initially set up with accurate banking information but were subsequently modified by disbursement officers with access to the vendor management system. Which of the following controls would have likely prevented the fraudulent modification of vendors' banking information?", "options": [{"tr": "Yönetim, tedarikçi ana kaydındaki bilgileri periyodik olarak gözden geçirir ve doğrular.", "en": "Management periodically reviews and verifies the information in the vendor master Tile.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Tedarikçilerin banka bilgilerinin güncellenmesi için yönetimin onayı gereklidir.", "en": "Management's approval is required for update to vendors' banking information.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Yönetim, tedarikçilerin banka bilgilerinin doğruluğunu teyit etmek için ödemelerin rastgele bir örneğini denetler.", "en": "Management randomly audits a sample of payments to verify the accuracy of vendors' banking information.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Ödemelerin işleme alınabilmesi için yönetimin onayı gereklidir.", "en": "Management's approval is required before payments can be processed.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Bir iç denetim birimi, personel arasında mesleki gelişimi teşvik etmek için adımlar atmakta ve bir mentorluk programı uygulama sürecindedir. Aşağıdakilerden hangisi başarılı bir mentorluk programı için önemlidir?", "q_en": "An internal audit activity is taking steps to promote professional development among the staff, and is in the process of implementing a mentorship program. Which of the following is important for a successful mentorship program?", "options": [{"tr": "Mentorün baş denetim yöneticisi olması en iyisidir.", "en": "It is best if the mentor is the chief audit executive.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Mentor görüşmelerine ait belgeler personel dosyalarında saklanmalıdır.", "en": "Mentor meeting documentation should be retained in personnel files.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Hem yeni işe alınanları hem de son derece deneyimli personeli hedeflemelidir.", "en": "It should target both new hires and highly experienced staff.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Mentorlarla yapılan görüşmeler resmi ve planlı olmalıdır.", "en": "Meetings with mentors should be formal and scheduled.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Satın alma departmanının denetimi sırasında, iç denetçi kuruluşun finansal raporlamasını etkileyebilecek önemli sorunlar tespit eder. Yönetim denetim sonuçlarına katılmıyor. Aşağıdaki yanıtlardan hangisi iç denetçinin mesleki yargı ve çatışma yönetimi ile ilgili gerekli yetkinliklere sahip olduğunu en iyi şekilde gösterir?", "q_en": "During an audit of the purchasing department, an internal auditor identifies significant issues that could affect the organization's financial reporting. Management disagrees with the audit results. Which of the following responses best demonstrates the internal auditor has the necessary competencies related to professional Judgment and conflict management?", "options": [{"tr": "Denetçi, yönetim kurulunun sonuçlarla ilgili endişelerine rağmen, kanaatlerini koruyor ve inceleme sürecine devam ediyor.", "en": "The auditor maintains his convictions and continues to proceed with the review process despite management's concerns related to the results.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi yönetimi atlayarak, sonuçları yönetim kuruluyla görüşür ve tavsiyelerin en iyi nasıl ele alınabileceği konusunda yönetim kurulunun görüşünü alır.", "en": "The auditor bypasses management, discusses the results with the board, and seeks the board's input on how best to address the recommendations.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, denetim ekibinin diğer üyeleriyle istişarede bulunur ve birlikte yönetimin kabul etme olasılığının daha yüksek olduğu alternatif öneriler geliştirirler.", "en": "The auditor consults with other members of the audit team, and together they develop alternative recommendations that management may be more likely to accept.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, sonuçları görüşmek ve belirli endişeleri daha iyi anlamak için yönetimle bir araya gelir.", "en": "The auditor meets with management to discuss the results and obtain a better understanding of the specific concerns.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdaki senaryolardan hangisi son derece etkili bir etik kültüre sahip bir organizasyonun özelliğidir?", "q_en": "Which of the following scenarios is a characterize of an organization with a highly effective ethical culture?", "options": [{"tr": "Bir kuruluş, açık ve anlaşılır bir şekilde, resmi ve kapsamlı bir davranış kuralları kodu uygular ve bunu çalışanlarına iletir.", "en": "An organization implements and communicates to staff a formal and comprehensive code of conduct, which is clear and understandable.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Bir kuruluş, potansiyel çalışanların gizlilik haklarını ihlal etmemek amacıyla, belirli hassas pozisyonlar için işe alım yaparken referans ve geçmiş kontrolünden vazgeçiyor.", "en": "An organization waives reference and background checks when hiring for certain sensitive positions in order to not violate potential employees' rights to privacy.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bir kuruluş, etik ihlalleri için üst düzey yöneticileri, alt düzey çalışanlara göre daha sert bir şekilde cezalandırarak, kuruluş genelinde bir mesaj vermek istiyor.", "en": "An organization punishes senior management more harshly for ethics violations than it would for lower-level staff to send a message throughout the organization.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bir kuruluş, kurum içindeki etik iklimin durumunu belirlemek amacıyla beş yılda bir çalışanları, tedarikçileri ve müşterileri arasında anketler düzenler.", "en": "An organization conducts surveys of employees, suppliers, and customers once every five years to determine the slate of the ethical climate in the organization.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "\"En dezavantajlı insanlara herhangi bir şekilde zarar verebilecek hiçbir eylemde bulunulmamalıdır\" ilkesi, aşağıdaki daha genel etik ilkelerden hangisinin bir ifadesidir?", "q_en": "The principle that \"no action should be taken that may harm in some way the least fortunate people\" is an expression of which of the following more general ethical principles?", "options": [{"tr": "Faydacı avantajlar.", "en": "Utilitarian benefits.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Kişisel erdemler.", "en": "Personal virtues.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dini emirler.", "en": "Religious injunctions.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dağıtımcı adalet.", "en": "Distributive justice.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bir kuruluş sürekli izleme yapmaktadır ve risk yönetimi sürecinin devam eden etkinliğini değerlendirmek için periyodik değerlendirmeler uygulamayı düşünmektedir. Bu tür periyodik değerlendirmelerle ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "An organization employs ongoing monitoring and is considering implementing periodic evaluations to assess the continuing effectiveness of its risk management process. Which of the following statements Is true with regard to such periodic evaluations?", "options": [{"tr": "Periyodik değerlendirmelerin, sürekli izlemeye göre daha az objektif olduğu düşünülmektedir.", "en": "Periodic evaluations are considered to be less objective than ongoing monitoring.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Periyodik değerlendirmeler, sürekli izlemeden daha etkili olabilir.", "en": "Periodic evaluations can be more effective than ongoing monitoring.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Periyodik değerlendirme sıklığı, devam eden izlemenin sonuçlarına bağlı olabilir.", "en": "Periodic evaluation frequency may depend on the results of ongoing monitoring.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Periyodik değerlendirmeler, sürekli izlemeye kıyasla sorunları genellikle daha hızlı tespit eder.", "en": "Periodic evaluations frequently identify problems more quickly than ongoing monitoring.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Baş denetim yöneticisi (CAE), hemen satın alma fonksiyonu denetimine atanan yeni bir iç denetçi işe aldı. Yeni denetçinin adı satın alma müdürünün adına benzediği için, bazı personel ikisi arasında bir ilişki olmamasına rağmen, aralarında bir bağlantı olduğunu düşünüyor. CAE'nin alması gereken en uygun eylem aşağıdakilerden hangisidir?", "q_en": "The chief audit executive (CAE) has hired a new internal auditor who was immediately assigned to a procurement function audit. Because the new auditor's name is similar to that of the procurement manager, some staff members think the two are related, although they are not. Which of the following actions is most appropriate for the CAE to take?", "options": [{"tr": "Bağımsızlığa herhangi bir engel olmadığı için hiçbir işlem yapmayın.", "en": "Take no action, as there is no impairment to independence.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Yeni iç denetçiyi denetim ekibinden çıkarın.", "en": "Remove the new internal auditor from the engagement team.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Konuyu ilgili personelle görüşerek endişeleri giderin.", "en": "Discuss the matter with the appropriate personnel to alleviate concerns.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yeni denetçiyi yakından denetleyin ve çalışmalarını dikkatlice inceleyin.", "en": "Closely supervise the new auditor and carefully review his work.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bir baş denetim yöneticisinin objektifliği teşvik etmek amacıyla iç denetim politika kılavuzuna eklemesi gereken en uygun ifade aşağıdakilerden hangisidir?", "q_en": "Which of the following statements is the most appropriate for a chief audit executive to include in the internal audit policy manual in order to promote objectivity?", "options": [{"tr": "İç denetçiler, bir iş biriminden ayrıldıktan sonra o birimde herhangi bir zamanda finansal etkinlik denetimi gerçekleştirebilirler.", "en": "Internal auditors may conduct a financial effectiveness engagement in a business unit at any point after being transferred from that area.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, bir işletme biriminin mevcut kontrol ortamının yeterli ve etkili olduğu sonucuna, önceki yıla ait çalışma belgelerinin ve denetim raporunun incelenmesinin bu sonucu desteklemesi halinde varabilirler.", "en": "Internal auditors may conclude that a business unit's current control environment is adequate and effective if the review of the prior year's workpapers and audit report supports that conclusion.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, ilgili alanda bir eğitim çalıştayı verdikten sonra herhangi bir aşamada bir işletme biriminde denetim gerçekleştirebilirler.", "en": "Internal auditors may conduct an engagement in a business unit at any point after providing a training workshop in that area.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, objektifliklerinde potansiyel bir bozulma olduğunun farkına vardıklarında, bu bozulmanın denetim sonuçları üzerindeki olası etkisini azaltmak için denetimin kapsamını sınırlandırmalıdırlar.", "en": "Internal auditors should limit the scope of an engagement if they become aware of a potential impairment of their objectivity in order to reduce the potential impact of the impairment on the engagement results.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi bir kuruluşun etik programının henüz yeterince gelişmemiş olduğunun bir göstergesi olarak kabul edilir?", "q_en": "Which of the following would be considered an indicator that an organization's ethics program is not yet well developed?", "options": [{"tr": "Etik kurallara uyum ihlallerine ilişkin disiplin işlemleri, tutarlılık açısından iç denetim birimi tarafından incelenir.", "en": "Disciplinary actions for ethics compliance violations are reviewed by the internal audit activity for consistency.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Etik kurallara uyum beklentilerinin iletilmesi, çalışanların doğrudan yöneticilerinin sorumluluğundadır.", "en": "Communication of ethics compliance expectations is the responsibility of employees' direct managers.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Kuruluşun etik kuralları ve ilgili uyumluluk politikası, olası güncellemeler için yıllık olarak gözden geçirilmektedir.", "en": "The organization's code of ethics and related compliance policy are reviewed annually for potential updates.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönetim kurulu, etik denetim ölçütlerini ihlaller ve uyumluluk açısından inceler.", "en": "The board of directors reviews ethics oversight metrics for violations and compliance.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Baş denetim sorumlusu (CAE), yıllık iç denetim planını hazırlamakta ve planı yönetim kuruluna onay için sunmadan önce üst yönetimden ve dış denetçiden görüş almaktadır. Bu senaryo ile ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "The chief audit executive (CAE) is drafting the annual internal audit plan and seeks input from senior management and the external auditor prior to submitting it for approval to the board. Which of the following statements is true regarding this scenario?", "options": [{"tr": "CAE'nin eylemleri, iç denetim faaliyetinin bağımsızlığını zedeleyebilir.", "en": "The CAE's actions are likely to impair the Independence of the internal audit activity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç Denetim Başkanı uygun şekilde hareket etmiş ve iç denetim faaliyetinin bağımsızlığı zedelenmemiştir.", "en": "The CAE acted appropriately, and the independence of the internal audit activity was not impaired.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetimden sorumlu başkan, objektifliği korumak için denetim planını dış etkilerden bağımsız olarak geliştirmiş olmalıydı.", "en": "The CAE should have developed the audit plan without outside influence to maintain objectivity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş Denetim Sorumlusu (CAE) uygun şekilde hareket etmiştir, zira denetim planını kimin inceleyip onaylayacağına karar verme yetkisine sahiptir.", "en": "The CAE acted appropriately, as he has authority to determine who reviews and approves the audit plan.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "İç denetim biriminden, hazine departmanında olası dolandırıcılık vakalarına ilişkin bir soruşturma yürütmesi istendi ve bunun üzerine bu görev için ekibe bir adli muhasebeci dahil edildi. Bu soruşturma sonucunda tespit edilen dolandırıcılık olaylarının çözümü konusunda birincil sorumluluk aşağıdakilerden hangisine aittir?", "q_en": "The internal audit activity was asked to conduct an investigation for potential fraud in the treasury department and subsequently contracted with a forensic accountant to join the team for the engagement. Which of the following parties has the primary responsibility for resolving any fraud incidents found as a result of this investigation?", "options": [{"tr": "Baş denetim yöneticisi.", "en": "Chief audit executive.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Üst yönetim.", "en": "Senior management.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Adli muhasebeci.", "en": "The forensic accountant.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Hukuk departmanı.", "en": "The legal department.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Şirket giderlerinin denetimi sırasında, iç denetçi veri analizi kullanarak bir test gerçekleştirdi ve şirketin gider politikasına aykırı bir durum tespit etti. Sorunu bulan denetçi, bunu potansiyel bir dolandırıcılık işlemi olarak değerlendirdi ve mali işler müdürünü (CFO) bilgilendirdi. CFO, gerçekleştirilen veri analizi testini anlamadığı ve işlemin düşük değerli olduğu gerekçesiyle endişeyi dikkate almadı. Bu durumda, iç denetçinin hangi becerilerini veya yetkinliklerini geliştirmesi gerekir?", "q_en": "During an audit of company expenses, the internal auditor performed a test using data analytics and identified a violation of the company's expenses policy. The auditor who discovered the issue considered it a potential fraudulent transaction and informed the chief financial officer (CFO). The CFO dismissed the concern because he did not understand the data analytics test that was performed and the transaction was of a low value. Given this situation, which skills or competencies should this internal auditor seek to improve?", "options": [{"tr": "Dolandırıcılık riskini değerlendirme becerisi.", "en": "Skills in evaluating the risk of fraud.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Önemli BT riskleri ve kontrolleri hakkında bilgi sahibi olmak.", "en": "Knowledge of key IT risks and controls", "cmt_tr": "", "cmt_en": ""}, {"tr": "İletişim ve müzakere gibi sosyal beceriler.", "en": "Soft skills such as communication and negotiation.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Şirketin gider politikası hakkında bilgi ve anlayışa sahip olmak.", "en": "Knowledge and understanding of the company's expenses policy", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdaki senaryolardan hangisi, bir kuruluşun risk yönetimi sürecinde iç denetim faaliyetinin üstlenmesi gereken uygun rolü göstermektedir?", "q_en": "Which of the following scenarios depicts an appropriate role for the internal audit activity to take regarding an organization's risk management process?", "options": [{"tr": "İç denetim, risk yönetimine yardımcı olmak amacıyla kuruluşun kontrollerini tasarlar ve uygular.", "en": "Internal audit designs and implements the organization's controls to help manage risk.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim, kuruluşun risk toleransını belirler ve kuruluş genelinde farkındalığı artırır.", "en": "Internal audit sets the organization's risk tolerance and promotes awareness throughout the organization.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim, kuruluşun risk yönetimi süreçlerinin etkili olup olmadığını değerlendirir.", "en": "Internal audit assesses whether the organization's risk management processes are effective.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim, kuruluşun varlıklarını korumak ve kayıpların oluşmasını önlemekle sorumludur.", "en": "Internal audit is responsible for safeguarding the organization's assets and preventing loss from occurring.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Bir kuruluş, oluşturduğu kurumsal yönetim çerçevesinin doğru bir şekilde uygulandığı sonucuna ne zaman varabilir?", "q_en": "At what point in time can an organization conclude that the established organizational governance framework was correctly implemented?", "options": [{"tr": "İç denetçi gözlem ve saha çalışması yaptığında.", "en": "When the internal auditor conducts observations and fieldwork.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Yönetim risk değerlendirmesini tamamladığında.", "en": "When management completes the risk assessment.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi değerlendirmesinin doğruluğunu gösterdiği zaman.", "en": "When the internal auditor evaluation shows its soundness.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Organizasyonun amaç ve hedeflerine ulaşıldığında.", "en": "When the organization's goals and objectives are met.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "İç Denetimin Misyonu'nda aşağıdaki kavramlardan hangisi vurgulanmaktadır?", "q_en": "Which of the following concepts is emphasized in the Mission of Internal Audit?", "options": [{"tr": "İyi yönetişim ve denetimlerin desteklenmesi.", "en": "Support of good governance and controls.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kurumsal değerin artırılması.", "en": "Enhancement of organizational value.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Maddi ve maddi olmayan varlıkların korunması.", "en": "Protection of tangible and intangible assets.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Profesyonel danışmanlık ve güvence hizmetlerinin sağlanması.", "en": "Provision of professional advisory and assurance services.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Bir adli denetçinin, bir çalışanın ve tedarikçinin kuruluşu dolandırmak amacıyla iş birliği yaptığı durumları tespit etmesine hangi belgeler yardımcı olur?", "q_en": "Which documents would help a forensic auditor identify instances of collusion between an employee and vendor to defraud the organization?", "options": [{"tr": "E-posta yazışmaları.", "en": "Email correspondence.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Ödeme talep formları.", "en": "Payment request forms.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Tedarikçi faturaları.", "en": "Vendor invoices.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Banka hesap özetleri.", "en": "Bank statements.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Kuruluşun baş denetim yöneticisi (CAE), çeşitli ürün geri çağırmalarının ardından acil bir güvence denetimi planlıyor. Ancak, iç denetim personeli, ilgili tüm süreç ve prosedürleri yeterince değerlendirmek için gerekli bilgi ve deneyime sahip değil. Bu koşullar altında CAE'nin aşağıdaki eylemlerden hangisini yapması gerekir?", "q_en": "The organization's chief audit executive (CAE) is planning an immediate assurance engagement following several product recalls. However, the internal audit staff does not have the required Knowledge and experience to adequately assess all the relevant processes and procedures. Which of the following actions should the CAE take under these circumstances?", "options": [{"tr": "İncelemeyi gerçekleştirmek için mevcut kaynakları kullanın ve şu anda yapılamayan işlemleri kapsam dışında bırakın.", "en": "Use the current available resources to conduct the review and exclude those procedures that can't currently be performed.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetim personeline denetim çalışmasını yürütmek için gerekli beceri ve bilgileri kazandırmak amacıyla hızlandırılmış bir eğitim planı uygulayın.", "en": "Implement an accelerated training plan to provide the audit staff with the necessary skills and knowledge to conduct the engagement.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyeti ilgili alanı yeterince inceleyene kadar yönetimi değerlendirilen riski kabul etmeye teşvik edin.", "en": "Encourage management to accept the assessed risk until the internal audit activity is able to adequately review the area.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetim ekibine, ilgili alanda gerekli uzmanlığa sahip diğer kurum içi güvence sağlayıcılarından destek alınmasını sağlayın.", "en": "Obtain assistance for the audit team from other internal assurance providers who possess the requisite expertise in the area.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir kuruluş yeni bir siber güvenlik politikası uygulamaya koyuyor ve kuruluşun altyapı, ağ ve güvenlik ekipleri genelinde paydaş uyumunu sağlamak için bir komite kurdu. Komite başkanı, baş denetim yöneticisine iç denetim faaliyetinin bu çalışmalarda rol oynayıp oynayamayacağını sormuştur. Aşağıdakilerden hangisi en uygun yanıttır?", "q_en": "An organization is implementing a new cybersecurity policy and has established a committee to ensure stakeholder alignment across the organization's infrastructure, network, and security teams. The head of the committee has asked the chief audit executive if the internal audit activity could play a role in these efforts. Which of the following is the most appropriate response?", "options": [{"tr": "İç denetim faaliyetinin bağımsızlığının korunması gerektiğinden, bu faaliyette rol oynaması uygun değildir.", "en": "It is not appropriate for the internal audit activity to play a role because its independence must be protected.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kurum içinde BT denetçisi bulunmadığı için iç denetim faaliyetine katılım sağlanmamalıdır.", "en": "The internal audit activity should not participate because there are no IT auditors on staff.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim birimi risk konusunda bilgi sahibidir ve bu nedenle komite için kuruluşun risklere karşı yanıtlarını ve kontrol faaliyetlerini önceliklendirmelidir.", "en": "The internal audit activity is knowledgeable about risk and therefore should prioritize the organization's responses and control activities for the committee.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyeti, komiteye yardımcı olabilir ve kuruluşun yanıtları ve kontrol faaliyetleri konusunda yönetimle istişarede bulunabilir.", "en": "The internal audit activity may assist the committee and consult with management on the organization's responses and control activities.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir kurumda dolandırıcılık o d determine whether the organization's objectives, significant risks, and risk appetite are articulated sufficiently.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçiler, üst yönetim, dış denetçiler ve diğer kaynaklar tarafından yayınlanan, yakın zamanda tamamlanmış risk değerlendirmelerini ve ilgili raporları inceler.", "en": "The internal auditors review recently completed risk assessments and related reports issued by senior management, external auditors, and other sources.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, dış denetçilerin iç denetim faaliyetinin gerçekleştirdiği çalışmalara güvenip güvenemeyeceklerine karar verirken kullandıkları temel belirleyici faktörlerden biridir?", "q_en": "Which of the following is a key determinant used by external auditors to decide whether they can rely on work performed by the internal audit activity?", "options": [{"tr": "Denetçilerin bağımsızlığı.", "en": "The auditors' independence.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçilerin objektifliği.", "en": "The auditors' objectivity.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetçilerin dürüstlüğü.", "en": "The auditors' integrity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçilerin gizliliği.", "en": "The auditors' confidentiality.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Denetim sonuçlarının kritik bulguları ortaya koyması nedeniyle, incelenen alanın yönetimi agresif, öfkeli ve kuruluşun iç denetçilerinin bilgi ve deneyimini sorguluyor. İç denetim faaliyeti ile yönetim arasındaki ilişki giderek kötüleşiyor; zira önceki denetim raporları da çok sayıda sorun ortaya koymuştu. Mevcut denetim sonuçlarıyla başa çıkarken aynı zamanda yönetimle olan ilişkiyi onarmaya çalışmak için en iyi strateji ne olurdu?", "q_en": "Management of an area under review is aggressive, upset, and questioning the knowledge and experience of the organization's internal auditors, as the audit results highlight critical findings. The relationship between the internal audit activity and management has continued to degenerate. as previous audit reports also showed a large number of issues. What would be the best strategy for working through the current audit results while also attempting to repair the relationship with management?", "options": [{"tr": "Uzlaşmacı bir yaklaşım sergileyin ve denetim raporunun genel değerlendirmesini değiştirin.", "en": "Take an accommodating approach and change the overall rating of the audit report.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Raporun üslubunu değiştirerek uzlaşmacı bir yaklaşım benimseyin, ancak kritik bulguları koruyun.", "en": "Take a compromising approach by modifying the tone of the report, while maintaining the critical findings.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönetmeni ikna etme çabalarınızda kararlı ve ısrarcı olun.", "en": "Take an assertive approach and be persistent in attempting to convince the director.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Destekleyici bir yaklaşım benimseyin ve eylem planlarının uygulanmasına yardımcı olmayı teklif edin.", "en": "Take an assisting approach and offer to assist with the implementation of action plans.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}], "General (3)": [{"q_tr": "Tedarik fonksiyonunun incelenmesi sırasında, bir iç denetçi, tedarikçi sözleşme sistemine yeni tedarikçilerin eklenmesi için mevcut bir kontrol tespit etti. Aşağıdakilerden hangisi, denetçinin kontrolün tasarımının yeterliliğini belirlemesine en iyi şekilde yardımcı olur?", "q_en": "During a review of the procurement function, an internal auditor identified an existing control for adding new vendors into the vendor contract system. Which of the following would best help the auditor determine the adequacy of the control's design?", "options": [{"tr": "Tedarikçi ekleme sürecinin akış şeması.", "en": "Flowchart of the vendor addition process.", "cmt_tr": "Düzgün cavab _en": ""}, {"tr": "İç kontrol sistemleri üzerine bir seminer verin ve katılımcılara çok sayıda örnek sunun.", "en": "Lead a seminar on internal controls and provide numerous examples to the audience.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Hammadde deposunda sürpriz bir envanter sayımı gerçekleştirin.", "en": "Conduct a surprise inventory count at the raw materials warehouse.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi bir kuruluşun benimsemesi için en uygun iç kontrol çerçevesi olurdu?", "q_en": "Which of the following would be the most suitable internal control framework for an organization to adopt?", "options": [{"tr": "Bir kuruluşun değerlendirme ve kıyaslama yapması için ortak en iyi uygulamaları belirleyen bir çerçeve.", "en": "A framework that specifies common best practices for an organization to evaluate and benchmark.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Doğru ve yanlış iş yöntemlerini belirleyen bir çerçeve.", "en": "A framework that specifies correct and incorrect business methodologies.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kontrollerin ve süreçlerin nasıl uygulanması gerektiğine dair kesin özellikler içeren bir çerçeve.", "en": "A framework with precise specifications for how controls and processes should be employed.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Her türden kuruluş için adım adım düzeltici eylem kılavuzu sunan bir çerçeve.", "en": "A framework that offers step-by-step guidance for remedial action for all organization types.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdaki senaryolardan hangisi \"algılanan fırsat\" olarak bilinen Dolandırıcılık Üçgeni bileşenini en iyi şekilde örneklendirmektedir?", "q_en": "Which of the following scenarios best illustrates the Fraud Triangle component known as \"perceived opportunity\"?", "options": [{"tr": "Finansal hedeflere ulaşılması durumunda önemli miktarda prim ödenir.", "en": "Substantial bonuses are awarded if financial targets are met.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Görevler düzgün bir şekilde ayrıştırılmamış.", "en": "Duties are not properly segregated.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Çalışanlar kayırmacılık olduğunu düşünebilir, göz ardı edildiklerini hissedebilir ve kırgınlık duyabilirler.", "en": "Employees may perceive favoritism and feel overlooked and resentful.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bu yıl ikramiyeler ödenmeyebilir.", "en": "Bonuses may not be paid this year.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Standartlara uygunluk veya uygunsuzluğun açıklanmasıyla ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is correct regarding disclosure of conformance or nonconformance with the Standards?", "options": [{"tr": "Beş yıldan daha kısa süredir faaliyette olan bir iç denetim faaliyeti, henüz harici bir değerlendirmeden geçmediği için Standartlara uygun olarak faaliyet gösterdiğini gösteremez.", "en": "An internal audit activity that has been in existence fewer than five years cannot Indicate that it is operating in conformance with the Standards because it has not yet undergone an external assessment.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dış değerlendirme standartlara uygunluğu doğruladıktan sonra, iç denetim faaliyeti bir sonraki dış değerlendirmeye kadar bu ifadeyi kullanmaya devam edebilir.", "en": "Once an external assessment validates conformance with the Standards, the internal audit activity may continue to use the statement until the next external assessment.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Son dış değerlendirmenin üzerinden beş yıldan fazla süre geçmişse, iç denetim faaliyeti, Standartlara uygun olarak yürütüldüğünü göstererek sona ermelidir.", "en": "If it has been more than five years since the last external assessment was conducted, the Internal audit activity must cease indicating that it operates in conformance with the Standards.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim yöneticisi, Etik Kurallarına veya Standartlara uyulmamasının her örneğini açıklamak zorundadır.", "en": "The chief audit executive must disclose every instance of noncompliance with the Code of Ethics or the Standards.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bordro departmanı müdürü, bordro sürecinin gözden geçirilmesini talep etti, ancak bu incelemenin yalnızca çalışılan sürelerin onaylanmasıyla ilgili süreçleri kapsamasını istiyor. Bu ne tür bir faaliyettir?", "q_en": "The manager of the payroll department requested a review of the payroll process, but only wants the engagement to include processes related to approval of time worked. What type of activity is this?", "options": [{"tr": "Finansal güvence hizmeti.", "en": "Financial assurance engagement.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Operasyonel danışmanlık hizmeti.", "en": "Operational consulting engagement.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Uyumluluk güvence hizmeti.", "en": "Compliance assurance engagement.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Risk yönetimi danışmanlığı hizmeti.", "en": "Risk management consulting engagement.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Kuruluşun yönetim organı, kuruluş kültürünün en etkili şekilde yönetilmesini sağlamak için aşağıdaki eylemlerden hangisini gerçekleştirmelidir?", "q_en": "Which of the following actions should the organization's governing body perform to provide the most effective governance over the organization's culture?", "options": [{"tr": "Kontrol faaliyetlerini koordine edin.", "en": "Coordinate control activities.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönlendirme sağlayın.", "en": "Provide direction.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Temel kontrolleri tasarlayın.", "en": "Design key controls.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Güvence sunun.", "en": "Deliver assurance.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Bir otomobil üretim şirketinin denetim planını hazırlarken, baş denetim yöneticisi (CAE), şirketin mühendislik departmanının yüksek risk derecesine sahip olduğunu fark etti. Ancak, iç denetim faaliyeti yetersiz personel ile yürütülüyor ve mevcut personel, mühendislik departmanının etkinliğini yeterince değerlendirmek için gerekli becerilere sahip değil. Baş denetim yöneticisinin izlemesi gereken en uygun yol nedir?", "q_en": "While preparing the audit plan for an automobile manufacturing company, the chief audit executive (CAE) noted that the company's engineering department received a high risk ranking. However, the internal audit activity is understaffed, and current staff do not possess the necessary skills to adequately assess the effectiveness of the engineering department. What is the most appropriate course of action for the CAE to take?", "options": [{"tr": "Denetim planına mühendislik departmanını dahil edin, incelemeyi gerçekleştirmek için mevcut iç denetim kaynaklarını kullanın ve yeterince değerlendirilemeyen prosedürleri kapsam dışında bırakın.", "en": "Include the engineering department on the audit plan, use the available internal audit resources to conduct the review, and exclude procedures that cannot be adequately assessed.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler ilgili alanı yeterince inceleyene kadar, yönetime değerlendirilen riski kabul etmelerini tavsiye edin.", "en": "Advise management to accept the assessed risk until the internal auditors are able to review the area adequately.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Gerekli yetkinliklere sahip iç denetçileri işe alın ve bu denetimi iç denetim planına dahil etmeden önce işe başlamalarını bekleyin.", "en": "Recruit internal auditors with the required competencies and wait until they are employed before including this audit on the internal audit plan.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Mühendislik departmanının incelemesine devam edin, ancak iç denetim ekibini, gerekli becerilere sahip olan ve denetim konusunda yardımcı olabilecek harici bir mühendislik şirketinden denetçi olmayan uzmanlarla destekleyin.", "en": "Proceed with a review of the engineering department but supplement the internal audit team with nonauditors from an external engineering company who have the required skills to assist", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdaki süreç zayıflıklarından hangisi, iç denetçinin sahtekarlık riski konusunda en çok endişe duymasına neden olur?", "q_en": "Which of the following process weaknesses is most likely to cause an internal auditor the most concern about fraud risk?", "options": [{"tr": "Son çalışan maaş listesi, ödeme işlemleri için gecikmeli olarak bankaya gönderildi.", "en": "Final employee payroll list is belatedly sent to the bank for payment processing.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çalışan maaşı, ek bir doğrulama yapılmadan bordro sistemi tarafından hesaplanır.", "en": "Employee salary is calculated by the payroll system without further verification.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çalışanların daimi dosyasındaki kişisel kayıtları zamanında güncellenmiyor.", "en": "Employee personal records in the permanent file are not updated in a timely manner", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bordro sistemindeki çalışan kişisel bilgileri, onay alınmadan güncellenebilir.", "en": "Employee personal information in the payroll system could be updated without approval.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Yoğun bir iç denetim faaliyetinde çalışan bir iç denetçi, yıl sonuna doğru sürekli mesleki gelişim kayıtlarını inceler ve sınırlı sayıda eğitim ve resmi mesleki gelişim faaliyetine katıldığını fark ederek endişelenir. Aşağıdakilerden hangisi onun için en uygun eylemdir?", "q_en": "An internal auditor in a busy internal audit activity reviews her continuing professional development records toward the end of the year and is concerned to find she has undertaken limited training and formal professional development. Which of the following actions is the most appropriate for her to take?", "options": [{"tr": "Baş denetim yöneticisine (CAE), onun sürekli mesleki gelişiminden sorumlu olduğunu ve bu konuyu ele alması gerektiğini hatırlatın.", "en": "Remind the chief audit executive (CAE) that he is responsible for her continuing professional development and needs to address the issue", "cmt_tr": "", "cmt_en": ""}, {"tr": "Meslek örgütüyle iletişime geçin ve denetim görevleri üstlenerek yeterince geliştiği için resmi mesleki gelişim eğitimine ihtiyacı olmadığını açıklayın.", "en": "Contact her professional organization and explain that she does not need formal professional development, as she is being developed sufficiently through undertaking audit engagements.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Mesleki gelişim gereksinimlerini karşılamasının pek mümkün olmadığını kabul edin, ancak müsait olan ilk fırsatta eğitim kurslarına katılmaya çalışın.", "en": "Accept that she is unlikely to meet continuing professional development requirements but look to attend training courses at the next available time.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Mesleki gelişimine kendisinin devam etmesinden sorumlu olduğunu kabul etmeli, bir mesleki plan geliştirmeli ve bunu Baş Mesleki Gelişim Sorumlusu (CAE) ile görüşmelidir.", "en": "Accept that she is responsible for her own continuing professional development, develop a professional plan, and discuss it with the CAE.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdaki hizmetlerden hangisi uygun bir danışmanlık hizmeti olarak değerlendirilebilir?", "q_en": "Which of the following engagements would be considered an appropriate consulting service?", "options": [{"tr": "Ticari bir bankanın iç denetim birimi, düzenlemelere uyumluluğu sağlamak amacıyla düzenli olarak şube denetimleri gerçekleştirir.", "en": "The internal audit activity of a commercial bank routinely performs branch audits for compliance with regulations.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim birimi, bilgi sistemleri güvenliğini test etmek amacıyla bir BT denetim firmasıyla ortak kaynak kullanımı anlaşması kapsamında faaliyet göstermektedir.", "en": "The internal audit activity participates in a cosourcing arrangement with an IT audit firm to test information systems security.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyeti, risk yönetim ekibinin risk tanımlama metodolojileri konusunda altı ayda bir eğitim almasını kolaylaştırır.", "en": "The internal audit activity facilitates biannual training of the risk management team in risk identification methodologies.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim birimi, dış denetim sürecinin bir parçası olarak gerekli olan saha çalışmalarını tamamlamak üzere her yıl dış denetçilerle iş birliği yapmaktadır.", "en": "The internal audit activity partners with external auditors annually to complete fieldwork required as a part of the external audit exercise.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Bir kuruluş içinde yönetişim, risk yönetimi ve uyumluluk çerçevesi uygulamanın başlıca faydalarından hangisi doğrudur?", "q_en": "Which of the following is a primary benefit of implementing a governance risk management and compliance framework within an organization?", "options": [{"tr": "Daha az iç denetim", "en": "Fewer internal audits", "cmt_tr": "", "cmt_en": ""}, {"tr": "Daha etkili görüşmeler", "en": "More effective interviews", "cmt_tr": "", "cmt_en": ""}, {"tr": "Otomatikleştirilmiş risk yönetimi stratejisi araçları", "en": "Automated risk management strategy tools", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sigorta maliyetlerinde azalma", "en": "Reduced assurance costs", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdaki ifadelerden hangisi, baş denetim yöneticisinin (CAE) iç denetim faaliyetinin öz değerlendirmesini yapma sorumluluğuyla ilgili olarak doğrudur? 1. İç Denetim Başkanı (CAE), öz değerlendirmenin sonuçlarını doğrulamak için yeterli testleri gerçekleştirmek üzere bağımsız bir değerlendirici veya değerlendirme ekibi seçmelidir. 2. CAE, değerlendirme için yapılan tüm testleri yeniden gerçekleştirmek üzere kuruluş dışındaki ayrı bir iç denetim biriminden deneyimli denetim uzmanlarını görevlendirerek sonuçları doğrulamalıdır. 3. CAE, öz değerlendirmenin gerçekleştirilmesine yardımcı olmak üzere kuruluş ve faaliyet gösterdiği sektör hakkında bilgi sahibi bağımsız, denetim dışı profesyoneller seçmelidir. 4. CAE, tam bir dış değerlendirme yapmak yerine, bağımsız dış doğrulama ile öz değerlendirme yapmayı düşünebilir.", "q_en": "Which of the following statements is true with regard to the chief audit executive's (CAE's) responsibility for conducting a self-assessment of the internal audit activity? 1 The CAE should select an independent reviewer or review team to perform sufficient tests of the self-assessment to validate the results 2 The CAE should validate results by engaging experienced audit professionals from a separate internal audit activity outside of the organization to reperform all of the tests conducted for the assessment 3. The CAE should select independent, nonaudit professionals who are knowledgeable about the organization and the industry in which it operates to assist with performing the self-assessment 4. The CAE may consider performing a self-assessment with independent external validation in Iieu of performing a full external assessment", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yalnızca 1 ve 4", "en": "1 and 4 only", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "1, 2 ve 3", "en": "1, 2, and 3", "cmt_tr": "", "cmt_en": ""}, {"tr": "3 ve 4", "en": "3 and 4", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Bir kuruluşun yönetim kurulu, iç denetim faaliyetinin güvence çalışmalarını etkin bir şekilde gerçekleştirebilmesi için kuruluşun farklı bölümlerine daha fazla erişime sahip olması gerektiğine karar vermiştir. Yönetim kurulu bu değişiklikle aşağıdaki alanlardan hangisini iyileştirmeyi amaçlamaktadır?", "q_en": "An organization's board of directors has decided that the internal audit activity must have greater access to different part of the organization in order to perform their assurance work effectively Which of the following areas is the board seeking to improve by making this change?", "options": [{"tr": "İç denetim otoritesi.", "en": "Internal audit authority.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim raporlama yapısı.", "en": "Internal audit reporting structure.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetimin bağımsızlığı ve objektifliği.", "en": "Internal audit independence and objectivity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetimin yönetim kuruluyla etkileşimi", "en": "Internal audit interaction with the board", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bir elektrikçi, işin kapsamını değerlendirmek için bir müşteriyi ziyaret eder. Ziyaretten sonra, satış ofisi elektrikçinin tahminine ve onaylanmış fiyat listesine dayanarak bir teklif hazırlar ve müşteriye gönderir. İç denetçi, son altı ayda iptal edilen teklif sayısının önemli ölçüde arttığını fark eder. Bu durumda denetçinin dikkate alması gereken dolandırıcılık riski senaryolarından hangisi aşağıdakilerden biridir?", "q_en": "An electrician visits a client to assess the scope of work. After the visit, the sales office compiles and sends the client a proposal based on the electrician's estimation and approved price list. The internal auditor notices that in the last six months, the number of cancelled proposals has increased substantially. Which of the following is a fraud risk scenario that t source planning system to determine whether project objectives were met and to identify opportunities to maximize potential benefits", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdaki becerilerden hangisi öz değerlendirme yoluyla kurumsal sosyal sorumluluğun değerlendirilmesi için kritik öneme sahiptir?", "q_en": "Which of the following skills is critical for assessing corporate social responsibility through a self-assessment?", "options": [{"tr": "Değerlendirmeyetenekler", "en": "Assessment skills", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Güvence becerileri", "en": "Assurance skills", "cmt_tr": "", "cmt_en": ""}, {"tr": "Mülakat becerileri", "en": "Interviewing skills", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kolaylaştırma becerileri", "en": "Facilitation skills", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Baş denetim yöneticisi (CAE), bağımsız doğrulama ile öz değerlendirme yapmaya karar verdi. CAE'nin bu eylem biçimini seçmesinin en olası nedeni aşağıdakilerden hangisidir?", "q_en": "The chief audit executive (CAE) decided to conduct a self-assessment with independent validation. Which of the following is the most likely reason the CAE selected this course of action?", "options": [{"tr": "Denetim komitesi, kalite güvencesi amacıyla öz değerlendirme yapılmasını talep etti.", "en": "The audit committee requested the self-assessment for quality assurance purposes", "cmt_tr": "", "cmt_en": ""}, {"tr": "Personel denetçileri, incelemeyi gerçekleştirmek için gerekli bilgi ve deneyime sahiptir.", "en": "The staff auditors have the necessary knowledge and experience to conduct the review", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim faaliyeti nispeten küçük ölçeklidir ve dış değerlendirmeye tabi tutulması gerekmektedir.", "en": "The internal audit activity is relatively small in size and is due for an external assessment", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin öz değerle tory counts are conducted on Mondays only and that all documentation is on paper as there are no computers in the underground warehouses. Also she notices that the person responsible for receiving the goods is the same one who distributes materials and spare parts Finally, she sees that spare parts are written off and taken by the heads of mining units to different underground locations to wait for their turn to be installed. Which of the described findings requires more consideration from a fraud risk perspective?", "options": [{"tr": "Depo çalışanının iş sorumlulukları, görev ayrımını içerir.", "en": "The job responsibilities of the warehouse employee compromise segregation of duties", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yedek parçalar, gerçek kullanım ve montajlarından önce hurdaya ayrılır.", "en": "Spare parts are written off before their actual usage and installation", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Depo yönetimi kağıt üzerinde yürütülüyor ve daha detaylı inceleme gerektiriyor.", "en": "Warehouse management is conducted on paper and requires further investigation", "cmt_tr": "", "cmt_en": ""}, {"tr": "Envanter sayımları, görünürde hiçbir sebep olmaksızın haftanın belirli günlerinde gerçekleştiriliyor.", "en": "The inventory counts take place on specific days of the week for no apparent reason", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Yeni bir iç denetim birimi, risk ve kontrol çerçevesinin benimsenmesini değerlendiriyor. Bu süreçte aşağıdakilerden hangisi en uygun husustur?", "q_en": "A new internal audit activity is considering the adoption of a risk and control framework. Which of the following is the most appropriate consideration during this process?", "options": [{"tr": "Bu çerçeve, iç denetim faaliyeti tarafından geliştirilmemelidir.", "en": "The framework should not be developed by the internal audit activity", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bu çerçeve, kuruluşun tamamı yerine bireysel projelere uygu
