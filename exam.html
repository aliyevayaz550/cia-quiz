<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Part 1 – Real Exam</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Real Exam</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">478 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>Real İmtahan<br><span style="color:var(--gold);font-size:.75em">CIA Part 1</span></h1>
    <p id="welcome-desc">14 kateqoriya, 478 sual (475 TR+EN ikidilli) v2</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">14</span><span class="ws-label">Kateqoriya</span></div>
      <div class="ws-item"><span class="ws-num">478</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">🎯</span><span class="ws-label">Real</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

ated by which type of controls?", "options": [{"tr": "Varlık düzeyinde", "en": "Entity-level", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Aktivite düzeyi", "en": "Activity-level", "cmt_tr": "", "cmt_en": ""}, {"tr": "İşlem düzeyinde", "en": "Transaction-level", "cmt_tr": "", "cmt_en": ""}, {"tr": "Süreç düzeyinde", "en": "Process-level", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Üst yönetim, yakın zamanda yapılan bir iç denetim raporuna göre tehlikeli maddelerin bulunduğu ve patlama riskinin yüksek olduğu bir alana giriş sağlayan kapının üzerine güvenlik kameraları satın alıp monte etti. Bu durumda hangi tür kontrol önlemi uygulandı?", "q_en": "Senior management purchased surveillance cameras and installed them over a door that provides entry to an area where according to a recent internal audit report, hazardous materials exist and there is a high risk of explosion. Which type of control was implemented in this situation?", "options": [{"tr": "Düzeltici kontrol", "en": "A corrective control", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bir dedektif kontrolü", "en": "A detective control", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Önleyici kontrol", "en": "A preventive control", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönlendirmeli kontrol", "en": "A directive control", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Büyük bir toptancı firmanın denetçisi, kredi satışlarının onaylanması ve denetimine ilişkin kontrolleri değerlendiriyor. Aşağıdaki prosedürlerden hangisi bir kontrol zayıflığı olurdu?", "q_en": "An auditor for a large wholesaler is evaluating the controls over the approval and oversight of credit sales. Which of the following procedures would be a control weakness?", "options": [{"tr": "Kredi departmanı, tüm müşterilere yapılacak sevkiyatların onaylanmasından sorumludur.", "en": "The credit department is responsible for approving shipments to all customers", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönetim ate that the internal audit activity operates in partial conformance with the Standards t as the internal audit activity has a quality assurance and improvement program in place to address deficiencies and has met the requirement for conducting an external assessment.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Önceki denetim raporlarını güncelleyip yeniden yayınlayın, iç denetim faaliyetinin Standartlara uygun olarak yürütüldüğü iddiasını kaldırın ve orijinal raporları alan tüm taraflara dağıtın.", "en": "Update and reissue previous audit reports, removing the assertion that the internal audit activity operates in conformance with the Standards, and distribute them to all parties who received the original reports.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Büyük bir kuruluşun yönetim kuruluna kalite güvence ve iyileştirme programının sonuçlarını iletirken, baş denetim yöneticisi hangi gerekliliği dikkate almalıdır?", "q_en": "Which requirement should the chief audit executive consider when communicating results of the quality assurance and improvement program to the board of a large organization?", "options": [{"tr": "İç değerlendirme sonuçları beş yılda bir görüşülmelidir.", "en": "The internal assessment results should be discussed once every five years", "cmt_tr": "", "cmt_en": ""}, {"tr": "Değerlendirme sonuçları ve dış değerlendirmenin sonuçlarının etkileri açıklanmalıdır.", "en": "The rating conclusions and the impact from results of the external assessment should be explained", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dış değerlendirmenin sonuçları yedi yılda bir görüşülmelidir.", "en": "The results of the external assessment should be discussed every seven years", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç değerlendirme ekibinin nitelikleri ve bağımsızlığı ele alınmalıdır.", "en": "The qualifications and independence of the internal assessment team should be discussed", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağı d improvement program. Which of the following observations must be addressed in order for the internal audit activity to achieve conformance with the Standards?", "options": [{"tr": "İç denetim tüzüğünde hangi denetim hizmetlerinin dış kaynaklı olarak sağlandığı belirtilmemektedir.", "en": "The internal audit charter does not identify which audit services are outsourced", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim tüzüğü hukuk departmanı tarafından incelenmemiştir.", "en": "The internal audit charter has not been reviewed by the legal department", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim şartnamesi, geçtiğimiz yıl içinde yönetim kurulu tarafından onaylanmadı.", "en": "The internal audit charter has not been approved by the board within the past year", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim tüzüğü, iç denetim faaliyetinin yetkisini tanımlamamaktadır.", "en": "The internal audit charter does not describe the authority of the internal audit activity", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Kalite güvence ve iyileştirme programının sonuçlarını üst yönetime ve yönetim kuruluna iletirken, baş denetim yöneticisinin (CAE) aşağıdakilerden hangisini açıklaması gerekir?", "q_en": "Which of the following disclosures must the chief audit executive (CAE) include when communicating the results of the quality assurance and improvement program to senior management and the board?", "options": [{"tr": "İç denetim faaliyetinin yetki ve sorumlulukları", "en": "Authority and responsibility of the internal audit activity", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sürekli mesleki eğitim saatleri ve kaynakları", "en": "Hours and sources of continuing professional education", "cmt_tr": "", "cmt_en": ""}, {"tr": "Hem iç hem de dış değerlendirmelerin kapsamı ve sıklığı", "en": "Scope and frequency of both the internal and external assessments", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "CAE'nin bağımsızlık ve nes team", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Bir sonraki dış değerlendirmenin zaman çizelgesi ve programı", "en": "The timetable and schedule of the next external assessment", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi bir iç denetim faaliyetinin kalite güvence ve iyileştirme programı (KGİP) için geçerli bir gerekliliktir?", "q_en": "Which of the following is a legitimate requirement for an internal audit activity’s quality assurance and improvement program (QAIP)?", "options": [{"tr": "Kalite değerlendirmeleri, iç denetim uygulamaları konusunda yeterli bilgiye sahip kişiler tarafından yapılmalıdır.", "en": "Quality assessments should be performed by individuals with sufficient knowledge of the internal audit practices", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dış kalite değerlendirmeleri yedi yılda bir yapılmalıdır.", "en": "External quality assessments should be conducted every seven years", "cmt_tr": "", "cmt_en": ""}, {"tr": "Tüm kalite değerlendirmeleri bağımsız bir değerlendirme ekibi tarafından yapılmalı veya doğrulanmalıdır.", "en": "All quality assessments should be either conducted or validated by an independent assessment team", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kalite güvence programının sonuçları hissedarlara yıllık olarak bildirilmelidir.", "en": "The results of the QAIP should be communicated to shareholders annually", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bir iç denetim birimi, yıllık öz değerlendirmeleri de içeren bir kalite güvence ve iyileştirme programı yürütmektedir. İç denetim birimi, her denetim raporuna, denetimin Uluslararası İç Denetim Mesleki Uygulama Standartlarına (Standartlar) uygun olarak yürütüldüğünü belirten bir madde eklemektedir. Aşağıdakilerden hangisi bu maddenin raporlara dahil edilmesini haklı çıkarır?", "q_en": "An internal audit activity maintains a quality assurance and improvement program that includes annual self-assessments. The internal audit activity includes in each engagement report a clause that the engagement is conducted in conformance with the International Standards for the Professional Practice of Internal Auditing (Standards). Which of the following justifies inclusion of this clause in the reports?", "options": [{"tr": "İç denetim faaliyet politikaları ve denetim kayıtları, söz konusu ifadenin doğru olduğuna dair ilgili, yeterli ve yetkin kanıtlar sunmaktadır.", "en": "Internal audit activity policies and engagement records provide relevant, sufficient, and competent evidence that the statement is correct", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetim komitesi yıllık öz değerlendirme sonuçlarını incelemiş ve ilgili maddenin kullanımını onaylamıştır.", "en": "The audit committee has reviewed the annual self-assessment results and approved the use of the clause", "cmt_tr": "", "cmt_en": ""}, {"tr": "Öz değerlendirme sonuçları, üç yıl öncesinden yetkili bir dış inceleme ekibi tarafından doğrulanmıştır.", "en": "The self-assessment results were validated by a qualified external review team three years’ prior", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetim komitesi tarafından onaylanan iç denetim tüzüğü, Standartlara uygunluğu gerektirir.", "en": "The internal audit charter, approved by the audit committee requires conformance with the Standards", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdaki senaryolardan hangisinde baş denetim yöneticisinin (CAE) iç denetim faaliyetinin Standartlara uygun olduğunu bildirmesi uygun olur?", "q_en": "In which of the following scenarios would it be appropriate for the chief audit executive (CAE) to report that the internal audit activity conforms with the Standards?", "options": [{"tr": "Dört yıl önce yeni bir iç denetim birimi oluşturuldu. Hiçbir zaman dış değerlendirme yapılmadı, ancak ardı ardına iç değerlendirmeler yapıldı ve bu değerlendirmeler, iç denetim biriminin Standartlara uygun olduğu sonucunu destekliyor.", "en": "A new internal audit activity was formed four years ago. An external assessment was never performed, but successive internal assessments were performed and support the conclusion that the internal audit activity conforms with the Standards", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dün tamamlanan iç öz değerlendirme, iç denetim faaliyetinin çalışmalarını yürütürken Standartlara uygun olmadığını ortaya koymuştur. Bununla birlikte, daha önceki bağımsız dış değerlendirme, iç denetim faaliyetinin Standartlara uygun olduğu sonucunu desteklemektedir.", "en": "An internal self-assessment completed yesterday found that the internal audit activity did not conform with the Standards when carrying out its work. However, the preceding independent external assessment supports the conclusion that the internal audit activity conforms with the Standards.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Maliyetleri düşürmek amacıyla, CAE son yedi yıldır iç denetim faaliyetinin kalite güvence ve iyileştirme programından harici değerlendiricilerin kullanımını hariç tutmuştur. Bununla birlikte, CAE, söz konusu dönem boyunca yapılan tüm iç değerlendirmelerin bu sonucu desteklediği gerekçesiyle, iç denetim faaliyetinin Standartlara uygun olduğu sonucuna varmıştır.", "en": "To reduce costs, the CAE excluded the use of external assessors from the internal audit activity's quality assurance and improvement program for the past seven years. However, the CAE concluded that the internal audit activity conforms with the Standards because all internal assessments over the period have supported this conclusion.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yaklaşık beş yıl önce gerçekleştirilen son dış denetim değerlendirmesinin sonuçları, iç denetim faaliyetinin Standartlara uygun olduğunu göstermiştir. Son bir yıl içinde gerçekleştirilen en yeni iç değerlendirme de uygunluğu doğrulamaktadır.", "en": "The results of the last external assessment of the internal audit activity, performed a little over five years ago, indicated that the internal audit activity conforms with the Standards. The most recent internal assessment performed within the past year also indicates conformance.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Kalite güvence ve iyileştirme programının sonuçlarının açıklanmasıyla ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is true regarding the disclosure of results of the quality assurance and improvement program?", "options": [{"tr": "Hem iç hem de dış değerlendirmelerin sonuçları Standartlara uygunluğu destekliyorsa, iç denetim birimi bunu yönetim kuruluna ve üst yönetime yazılı olarak bildirmelidir.", "en": "If the results of both internal and external assessments support conformance with the Standards, the internal audit activity must communicate this to the board and senior management in writing.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Eğer kuruluş tarihi beş yıldan az ise ve belgelenmiş bir dış değerlendirmesi yoksa, iç denetim faaliyeti, kuruluşun Standartlara uygun olarak faaliyet gösterdiğini göstermeyebilir.", "en": "If it has been in existence fewer than five years and has no documented external assessment, the internal audit activity may not indicate that it is operating in conformance with the Standards.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Uygunsuzluk, kuruluşun mesleki sorumluluklarını yerine getirme veya paydaş beklentilerini karşılama yeteneğini etkiliyorsa, iç denetim faaliyeti uygunsuzluğu ve etkisini de açıklamalıdır.", "en": "If nonconformance affects its ability to fulfill its professional responsibilities or stakeholder expectations, the internal audit activity should disclose nonconformance as well as its impact.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dış değerlendirme genel olarak uygunsuzluk sonucunu yansıtıyorsa, iç denetim faaliyeti, iyileştirme planını ve ardından yapılacak doğrulamayı içeren bir zaman çizelgesini açıklaması koşuluyla, Standartlara uygun olduğunu bildirmeye devam edebilir.", "en": "If an external assessment reflects an overall conclusion of nonconformance, the internal audit activity may continue to communicate that it conforms with the Standards if it discloses a remediation plan, including timeline with subsequent validation.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Standartlara uygunluğu sağlamak için, baş denetim yöneticisi kalite güvence ve iyileştirme programına (KGİİ) aşağıdaki faaliyetlerden hangisini dahil etmelidir?", "q_en": "To achieve conformance with the Standards, the chief audit executive must include which of the following activities in the quality assurance and improvement program (QAIP)?", "options": [{"tr": "Kalite güvence planının yönetim kurulu tarafından denetlenmesi gerekmektedir.", "en": "Require board oversight of the QAIP.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Her bir proje için standartlara uygunluğu değerlendirin.", "en": "Assess Standards conformance for each individual engagement.", "cmt_tr": "", "cmt_en": ""}, {"tr": "En az beş yılda bir öz değerlendirme yapın.", "en": "Conduct a self-assessment at least once every five years.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kalite güvence iyileştirme programının sonuçlarını üst yönetime bildirin.", "en": "Report the results of the QAIP to senior management", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi, baş denetim yöneticisinin iç denetim faaliyetinin kalite güvence ve iyileştirme programını ne sıklıkla gözden geçirmesi gerektiğini en iyi şekilde açıklamaktadır?", "q_en": "Which of the following best describes how often the chief audit executive should review the quality assurance and improvement program of the internal audit activity?", "options": [{"tr": "Organizasyonun iş hedefleri her değiştiğinde", "en": "Whenever the business objectives of the organization change", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin dış değerlendirmesinden hemen önce", "en": "Just prior to an external assessment of the internal audit activity", "cmt_tr": "", "cmt_en": ""}, {"tr": "Her bir görevin tamamlanmasının ardından.", "en": "At the completion of each engagement.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Gün geçtikçe kademeli olarak", "en": "Progressively on a day-to-day basis", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Kalite güvence ve iyileştirme programı (GAIP) ile ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is true with regard to the quality assurance and improvement program (GAIP)?", "options": [{"tr": "Kuruluşun başı olarak CEO, OAIP incelemelerini gerçekleştirecek harici kalite değerlendirme ekibini seçer ve atar.", "en": "As the head of the organization, the CEO selects and appoints the external quality assessment team to perform the OAIP reviews.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim yöneticisi, yıllık iç denetim planına uygun olarak, kaynakların mevcudiyetine ve kapasitesine bağlı olarak hem iç hem de dış kalite değerlendirmelerinin kapsamını ve sıklığını belirler.", "en": "The chief audit executive determines the scope and frequency of both internal and external quality assessments based on the availability and capacity of resources in accordance with the annual internal audit plan.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Üst yönetim ve yönetim kurulu ile yapılan ve iç ve dış değerlendirmelerin kapsamı ve sıklığının görüşüldüğü toplantıların tutanakları, OAIP raporlama gerekliliğini desteklemektedir.", "en": "Minutes of meetings held with senior management and the board to discuss the scope and frequency of internal and external assessments support the OAIP reporting requirement.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim faaliyeti, yıllık iç denetim planındaki her bir denetim faaliyetinin Standartlara uygun olarak yürütülüp yürütülmediğini değerlendirmelidir.", "en": "The internal audit activity needs to assess whether each engagement on the annual internal audit plan is conducted in conformance with the Standards.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, baş denetim yöneticisinin kalite güvence ve iyileştirme programının sonuçlarını üst yönetime ve yönetim kuruluna doğru bir şekilde raporladığını en iyi şekilde göstermektedir?", "q_en": "Which of the following best demonstrates that the chief audit executive is properly reporting the results of the quality assurance and improvement program lo senior management and the board?", "options": [{"tr": "Hem üst yönetime hem de yönetim kuruluna yazılı bir uygunluk bildirimi sunmak.", "en": "Providing a written conformance statement to both senior management and the board.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Hem dış hem de iç değerlendirmelerin kopyalarını yönetim kuruluna vermek.", "en": "Giving copies of both external and internal assessments to the board.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Devam eden dış değerlendirme izleme raporlarının dosyalarının saklanması.", "en": "Keeping files of reports of ongoing external assessment monitoring", "cmt_tr": "", "cmt_en": ""}, {"tr": "Değerlendirmelerle ilgili görüşmelerin yapıldığını gösteren yönetim kurulu toplantı tutanaklarının kopyalarını saklamak.", "en": "Retaining copies of board meeting minutes showing that discussions of assessments took place.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "İç denetim faaliyetinin kalite güvence ve iyileştirme programı (KGİP) ile ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is true regarding the internal audit activity's quality assurance and improvement program (QAIP)?", "options": [{"tr": "İç değerlendirmeler, baş denetim yöneticisi tarafından yapılmalıdır.", "en": "Internal assessments must be performed by the chief audit executive.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç değerlendirme en az beş yılda bir yapılmalıdır.", "en": "An internal assessment must be performed at least once every five years.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kalite güvence iyileştirme programının sonuçlarının kuruluşun dış denetçileriyle paylaşılmasına izin verilir.", "en": "It is permissible to share the results of the QAIP with the organization's external auditors.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Devam eden izleme çalışmalarının sonuçları, bağımsız bir dış değerlendirici tarafından yıllık olarak doğrulanmalıdır.", "en": "Results of ongoing monitoring must be validated annually by an independent external assessor.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Beş yıllık varlığı boyunca, bir iç denetim birimi, kalite güvence ve iyileştirme programının (KGİİ) yalnızca bir iç değerlendirmesini gerçekleştirmiştir. Bu değerlendirmenin sonuçları, iç denetim biriminin Standartlara uygun olmadığını göstermiştir. Bundan önce, iç denetim biriminin KGİİ'sine ilişkin bir dış değerlendirme yapılmış ve bu değerlendirme, iç denetim biriminin Standartlara uygun olduğunu bildirmiştir. İki değerlendirmeyi göz önünde bulundurarak, iç denetim biriminin Standartlara uygunluk açısından mevcut durumu ne olurdu?", "q_en": "In its five years of existence, an internal audit activity conducted a single internal assessment of its quality assurance and improvement program (QAIP). The results of that assessment showed that the internal audit activity did not conform with the Standards. Prior to this, an external assessment of the internal audit activity's QAIP was conducted, which reported that the internal audit activity was in conformance with the Standards. Considering the two assessments, what would be the internal audit activity's current state of conformance with the Standards?", "options": [{"tr": "Standartlara uygunluk.", "en": "Conformance with the Standards.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Standartlara Uygunsuzluk", "en": "Nonconformance with the Standards", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Standartlara uygunluk tespit edilemedi.", "en": "Unable to determine conformance with the Standards.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Standartlara kısmi uygunluk", "en": "Partial conformance with the Standards", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "İç denetim faaliyetinin kalite güvence ve iyileştirme programı (KGİP) ile ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is true regarding the internal audit activity's quality assurance and improvement program (QAIP)?", "options": [{"tr": "İç değerlendirmeler, yalnızca tamamlanmış denetim çalışmalarının gösterilen performans açısından incelenmesine dayanır.", "en": "Internal assessments rely solely on the review of completed audit engagements for demonstrated performance", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim yöneticisi, harici bir denetçinin uygunluğunu ve yetkinliğini değerlendirmekten sorumludur.", "en": "The chief audit executive is responsible for assessing the suitability and competence of an external assessor.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Kalite güvence programı (QAIP) sonuçları öncelikle yönetim kurulu ile görüşülmeli ve üst yönetime dağıtılması için onay alınmalıdır.", "en": "QAIP results must first be discussed with the board and approval obtained for distribution to senior management", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönetim kurulunun takdirine bağlı olarak, dış değerlendirmelerin sıklığı beş yıllık kılavuzu aşabilir.", "en": "At the board's discretion, the frequency of external assessments can exceed the five-year guideline", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "İç denetim faaliyetinin kalite güvence ve iyileştirme programındaki hangi değerlendirme türleri, iç denetim f r": 0}], "Due Professional Care": [{"q_tr": "İç denetim birimi, çift faturalama olaylarını belirlemek için örnek işlemlerin analizini tamamladı. Aşağıdakilerden hangisi, iç denetçilerin inceleme sırasında gerekli mesleki özeni gösterdiğini en iyi şekilde ortaya koymaktadır?", "q_en": "The internal audit activity completed its analysis of sample transactions to determine occurrences of double billings. Which of the following best demonstrates that internal auditors exercised due professional care during the review?", "options": [{"tr": "İç denetçiler, çift faturalama vakasına rastlamamış ve bu alanda önemli bir risk bulunmadığı sonucuna varmıştır.", "en": "Internal auditors found no instances of double billing and concluded there were no significant risks in this area.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, veri testinin kapsamını ve metodolojisini belgelediler.", "en": "Internal auditors documented the scope and methodology of the data testing.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçiler, yönetimle verilerin nasıl korunduğu konusunda görüşmelerde bulundu.", "en": "Internal auditors discussed with management how data is safeguarded.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, denetim sorumlusundan resmi performans geri bildirimi aldılar.", "en": "Internal auditors received formal performance feedback from the engagement supervisor.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Which of the following statements best demonstrates application of due professional care during an assurance engagement?", "q_en": "Which of the following statements best demonstrates application of due professional care during an assurance engagement?", "options": [{"tr": "The engagement detected irregularities and noncompliance instances.", "en": "The engagement detected irregularities and noncompliance instances.", "cmt_tr": "", "cmt_en": ""}, {"tr": "The engagement supervisor had no significant comments in the supervisory review.", "en": "The engagement supervisor had no significant comments in the supervisory review.", "cmt_tr": "", "cmt_en": ""}, {"tr": "The audit procedures were systematically planned, executed, and documented.", "en": "The audit procedures were systematically planned, executed, and documented.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "The engagement objectives were designed to assist the engagement client.", "en": "The engagement objectives were designed to assist the engagement client.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdaki belgelerden hangisini iç denetçilerden mesleki özeni gösterme amacıyla imzalamaları en muhtemeldir? Görev sorumluluklarının açıklaması,", "q_en": "Which of the following documents are internal auditors most likely to be asked to sign as a demonstration of due professional care? A description of their job responsibilities,", "options": [{"tr": "Gizlilik sözleşmesi.", "en": "A non-disclosure agreement.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yıllık bir bağlılık bildirgesi", "en": "An annual declaration of commitment to", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "IIA'nın Etik Kuralları.", "en": "The IIA s Code of Ethics.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim tüzüğü.", "en": "The internal audit charter.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi, satın alma departmanının denetimi sırasında gerekli mesleki özenin gösterilmesine en iyi örnektir?", "q_en": "Which of the following best illustrates the application of due professional care during an audit of the procurement department?", "options": [{"tr": "İç denetçi, satın alma taleplerinin uygun yetkilendirmelere sahip olup olmadığını kontrol etmeye başladı. Bir uyumsuzluk örneği tespit edince durdu ve kontrollerin etkisiz olduğu sonucuna vardı.", "en": "The internal auditor began checking purchase requisitions for proper authorizations. He stopped when he discovered an instance of noncompliance and he concluded the controls were ineffective.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, yönetimin standart ihale süreçlerine uymadığı bir durum tespit etti. Denetçi, yönetimin standart uygulamadan sapma gerekçelerinin ve destekleyici belgelerin geçerliliğini değerlendirdi ve sapmanın kabul edilebilir olduğuna karar verdi.", "en": "The internal auditor discovered an instance where management did not follow the standard bidding processes. The auditor assessed the validity of management’s reasons for deviating from standard practice and the supporting documentation, and determined that the deviation was acceptable.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, kuruluşun ihale sürecini zorunlu kıldığı eşik olan 5.000$'dan yüksek tutardaki satın alma siparişlerinden bir örneklem seçti. Denetçi, örneklemdeki her bir satın alma siparişi için ihale sürecine ilişkin belgeleri temin etti.", "en": "The internal auditor selected a sample of purchase orders with amounts greater than S5.000, the threshold at which the organization requires a bidding process. The auditor obtained documentation of the bidding process for each purchase order in the sample.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçi, yönetim tarafından sağlanan ihale belgelerini analiz etti. Yönetim, belgelerin tek tedarikçi firmaya verilen satın alma siparişleri olduğunu belirtti. Analiz ve yönetimin beyanına dayanarak, iç denetçi tedarik sürecinin etkili olduğuna karar verdi.", "en": "The internal auditor analyzed bidding documents provided by management. Management indicated that the documents were purchase orders issued to a sole-source vendor Based on the analysis and management's declaration, the internal auditor determined that the procurement process was effective.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Baş denetim yöneticisinin aşağıdaki eylemlerinden hangisi, iç denetçilerin gerekli mesleki özeni göstermelerini en iyi şekilde sağlar?", "q_en": "Which of the following actions by the chief audit executive would best ensure that internal auditors demonstrate due professional care?", "options": [{"tr": "İç denetim faaliyetine yönelik politika ve prosedürlerin geliştirilmesi.", "en": "Developing policies and procedures for the internal audit activity.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetim çalışmaları sırasında iç denetim faaliyetinin hatalı bulunmamasını sağlamak.", "en": "Ensuring the internal audit activity is not found fallible during audit engagements.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönetimin iç denetim faaliyetinden talep ettiği tüm görevleri yerine getirmek.", "en": "Undertaking all engagements that management requests of the internal audit activity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin yönetim kuruluna işlevsel olarak raporlanmasını sağlamak.", "en": "Ensuring the internal audit activity reports functionally to the board of directors.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bir iç denetçi, dolandırıcılık risk değerlendirmesinin ardından ödeme denetimi için test kapsamını genişletti. Ek denetim kaynaklarına yapılan yatırıma rağmen, önemli bir sorun bulunamadı. Ne yazık ki, birkaç ay sonra büyük bir ödeme dolandırıcılığı ortaya çıktı. IIA kılavuzuna göre, iç denetçinin gerekli mesleki özeni göstermesiyle ilgili olarak aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "An internal auditor extended the scope of testing for a disbursements engagement following a fraud risk assessment. Despite the investment of additional audit resources, no significant issues were found. Unfortunately, a major payment fraud was discovered several months later. According to IIA guidance which of the following statements is true regarding the internal auditor's application of due professional care?", "options": [{"tr": "Gerekli mesleki özen gösterilmemiştir çünkü sahtekarlığa dair somut bir kanıt olmadığı sürece ek bir çalışma yapılmamalıydı.", "en": "Due professional care was not applied because no additional work should have been performed unless there was actual evidence of fraud", "cmt_tr": "", "cmt_en": ""}, {"tr": "Genişletilmiş kapsam nedeniyle hiçbir sorun tespit edilemediği, ancak dolandırıcılığın gerçekte var olduğu için gerekli mesleki özen gösterilmemiştir.", "en": "Due professional care was not applied because the extended scope resulted in no issues being identified, while fraud actually existed", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, ek kaynak maliyetine rağmen, makul değerlendirmeye dayanarak kapsamı değiştirirken gerekli mesleki özeni göstermiştir.", "en": "Due professional care was applied as the internal auditor modified the scope based on reasonable judgment, despite the additional cost of resources", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetim kaynaklarının maliyeti, gerçekleştirilen testlerin derecesinde belirleyici bir faktör olmamalı olduğundan, gerekli mesleki özen gösterilmiştir.", "en": "Due professional care was applied as the cost of audit resources should not be a determining factor in the degree of testing undertaken", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, iç denetçinin mesleki özen yükümlülüğünü göstermesinin en iyi yoludur?", "q_en": "Which of the following is the best way for an internal auditor to demonstrate due professional care?", "options": [{"tr": "Denetimi, benzer koşullar altında başka bir basiretli denetçinin yapacağı ölçüde gerçekleştirin.", "en": "Conduct an audit to the same extent that another prudent auditor would under similar circumstances", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Proje süresince proje yöneticisinden geri bildirim alın.", "en": "Seek feedback from the engagement supervisor during the engagement", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim çalışmalarını, uyumluluğun mutlak güvencesini sağlayacak şekilde yürütün.", "en": "Execute internal audit work in such a manner as to provide absolute assurance of compliance", "cmt_tr": "", "cmt_en": ""}, {"tr": "Proje süresince müşteri geri bildirim anketleri talep edin ve alın.", "en": "Request and receive client feedback surveys during the engagement", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi, bir baş denetim yöneticisinin büyük bir dolandırıcılık soruşturmasında yardım almak için bir dolandırıcılık uzmanının hizmetlerinden yararlanmasının nedenini en iyi şekilde açıklar?", "q_en": "Which of the following best describes why a chief audit executive might obtain the services of a fraud specialist to assist in a major fraud investigation?", "options": [{"tr": "Dolandırıcılık uzmanları, bilgisayar destekli denetim tekniklerini kullanmada daha iyidir.", "en": "Fraud specialists are better at using computer-assisted audit techniques", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dolandırıcılık konusunda uzmanlaşmış kişiler, mahkemede bilirkişi olarak görev yapmaya daha donanımlıdır.", "en": "Fraud specialists are better equipped to act as an expert witness in court", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dolandırıcılık uzmanları, gereken mesleki özeni daha iyi uygulayabilirler.", "en": "Fraud specialists are better able to properly apply due professional care", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dolandırıcılık uzmanları, olay yeri inceleme tekniklerini kullanmada daha iyidir.", "en": "Fraud specialists are better at using crime scene investigation techniques", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi baş denetim yöneticisinin gerekli mesleki özenin gösterildiğinden nasıl emin olabileceğini en iyi şekilde göstermektedir?", "q_en": "Which of the following best demonstrates how the chief audit executive may ensure that due professional care is applied?", "options": [{"tr": "Katılım süreciyle ilgili politikalar ve prosedürler oluşturun.", "en": "Establish policies and procedures concerning the engagement process", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Personel alımı, görevlendirme ve eğitimine yönelik bir strateji geliştirin.", "en": "Develop a strategy for recruiting assigning, and training staff", "cmt_tr": "", "cmt_en": ""}, {"tr": "Karmaşık projeleri harici bir hizmet sağlayıcıya devredin.", "en": "Outsource complex engagements to an external service provider", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi değerlendirme sürecini gözlem sayısına dayandırın.", "en": "Base the auditor evaluation process on the number of observations", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdaki eylemlerden hangisi, iç denetim biriminin kuruluşun varlıklarını incelerken gerekli mesleki özeni gösterdiğini en iyi şekilde ortaya koymaktadır?", "q_en": "Which of the following actions best demonstrates that due professional care has been considered by the internal audit activity when conducting a review of an organization's assets?", "options": [{"tr": "Üst düzey yöneticilerin mal veya fonları zimmete geçirme fırsatının olup olmadığını belirlemek.", "en": "Determining whether any opportunity exists for senior executives to misappropriate property or funds", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Tüm önemli riskleri belirlemek için saha çalışmalarını eksiksiz ve zamanında planlamak ve yürütmek.", "en": "Planning and executing fieldwork in a complete and timely manner to identify all significant risks", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönetim kurulunun etkili iç kontrol mekanizmalarını uygulamaya koyup koymadığını doğrulamak.", "en": "Verifying whether the board of directors has implemented effective internal controls", "cmt_tr": "", "cmt_en": ""}, {"tr": "Üst yönetimin, planlanan iş miktarının katılım hedeflerini karşılamak için yeterli olup olmadığına karar vermesi.", "en": "Having senior management determine whether the degree of work planned is sufficient to meet engagement objectives", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdaki senaryolardan hangisi gerekli mesleki özeni en iyi şekilde göstermektedir?", "q_en": "Which of the following scenarios best illustrates due professional care?", "options": [{"tr": "Son bir yıl içinde bordro departmanında çalışmış olan bir iç denetçi, baş denetim yöneticisi tarafından bordro denetimine atanan denetim ekibinden kasten dışlandı.", "en": "An internal auditor who previously worked in the payroll department within the last year was intentionally excluded by the chief audit executive from the audit team assigned to a payroll audit", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bir bordro denetimi sırasında, denetçi bir yöneticiye yapılan önemli ödemeler konusunda şüphe duymaya başladı. Denetçi, bu ödemelerin makul olup olmadığını belirlemek için kuruluşun farklı bir departmanındaki bir yöneticiyle görüşme yaptı.", "en": "While performing a payroll audit an auditor became skeptical about significant payments made to a manager. The auditor sought to determine whether these payments were reasonable through discussion with a manager in a different department in the organization", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetlenen bordro departmanının başkanı, denetim sorumlusunun iş ortağıdır. Denetim sırasında, denetim sorumlusu saha çalışmasına katılmayarak objektifliğini korumaya çalışmıştır.", "en": "The head of the payroll department being audited is a business partner of the engagement supervisor During the audit the engagement supervisor sought to maintain his objectivity by not participating in fieldwork", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bir bordro denetimi için görevlendirilen denetçi, az sayıda çalışan için bazı karmaşık bordro hesaplamalarını yeniden gerçekleştiremedi. Bu ödemelerin toplamı, belirtilen önemlilik eşiklerinin altında kaldığı için denetçi daha fazla test yapmadı.", "en": "An auditor assigned to a payroll audit was unable to reperform some complex payroll computations for a small number of employees The sum of these payments was below the materiality thresholds provided so the auditor did not perform further tests", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi, bir iç denetçinin güvence denetimi planlaması yaparken gerekli mesleki özeni gösterdiğini en iyi şekilde ortaya koymaktadır?", "q_en": "Which of the following best demonstrates that an internal auditor is applying due professional care when planning an assurance engagement?", "options": [{"tr": "Kanun ve yönetmeliklere uyulmaması riskinin değerlendirilmesi", "en": "Assessing the risk of noncompliance with laws and regulations", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim kılavuzunda belirtilen politikalara uyulmaktadır.", "en": "Following the policies as prescribed by the internal audit manual.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İnceleme altındaki alanın yönetimine, iç kontrol risklerini nasıl azaltacakları konusunda tavsiyelerde bulunmak.", "en": "Advising management of the area under review on how to mitigate internal control risks.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetimi, sahtekarlığın var olduğu varsayımıyla yürütmek.", "en": "Conducting the engagement on the presupposition that fraud exists.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir iç denetçinin denetim çalışması sırasında gerçekleştirdiği aşağıdaki eylemlerden hangisi, mesleki özen yükümlülüğünün en iyi göstergesidir?", "q_en": "Which of the following actions taken during an audit engagement is the best demonstration of an internal auditor's due professional care?", "options": [{"tr": "Denetim planına, denetim faaliyetine ilişkin tüm finansal bilgilerin dahil edildiğinden ve usulsüzlükler açısından incelendiğinden emin olun.", "en": "Ensure that all financial information related to the engagement is included in the audit plan and examined for irregularities.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Tüm denetim testlerini eksiksiz olarak belgeleyin.", "en": "Document all audit tests completely.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Proje süresince her zaman uyumsuzluk veya usulsüzlük olasılığını göz önünde bulundurun.", "en": "Consider the possibility of noncompliance or irregularities at all times during an engagement.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetim sırasında tespit edilen herhangi bir uyumsuzluk veya usulsüzlüğü denetim komitesine bildirin.", "en": "Notify the audit committee of any noncompliance or irregularity discovered during an engagement", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "İç denetçi, bazı hileli işlemlerin gerçekleştiğinden şüphelendiği hesaplara ilişkin büyük miktarda işlem geçmişi verisi elde etti. Aşağıdaki eylemlerden hangisi iç denetçinin gerekli mesleki özeni gösterdiğini en iyi şekilde ortaya koymaktadır?", "q_en": "The internal auditor obtained large volumes of transaction history data for accounts on which he suspected that some fraudulent transactions occurred. Which of the following actions best demonstrates due professional care by the internal auditor?", "options": [{"tr": "İç denetçi, tüm usulsüzlüklerin tespit edildiğinden emin olmak için her işlemi manuel olarak inceleyerek verileri dikkatlice inceledi.", "en": "The internal auditor carefully scrutinized the data by manually reviewing each transaction to ensure that all irregularities were identified.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, verilerdeki anormallikleri sıralamak, analiz etmek ve tespit etmek için veri analizi araçlarından yararlandı.", "en": "The internal auditor employed the use of data analytics tools to sort, analyze, and detect anomalies in the data.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçi, daha fazla test yapmak üzere rastgele bir işlem örneği seçerek veri analiz sürecine başladı.", "en": "The internal auditor started the data analysis process by selecting a random sample of transactions on which to perform further tests.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, denetlenen hesaplara en aşina kişi olduğu için şube müdüründen sahte işlemlerin tespitinde yardımcı olmasını istedi.", "en": "The internal auditor requested that the branch supervisor assist in identifying fraudulent transactions, as he was most familiar with the accounts being audited.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Bir iç denetçi risk değerlendirmesi yaptı ve banka hesabına erişim ayrıcalıkları üzerindeki kontrollerin uygun olduğu sonucuna vardı. Daha sonra denetçi, bir yüklenicinin hesabın yetkili bir kullanıcısı tarafından sağlanan ortak bir şifre kullandığını öğrendi. Aşağıdaki ifadelerden hangisi denetçinin gerekli mesleki özeni göstermesini en iyi şekilde tanımlar?", "q_en": "An internal auditor performed a risk assessment and concluded that the controls over access privileges to a bank account were appropriate. Later, the auditor learned that a contractor was using a shared password provided by an authorized user of the account. Which of the following statements best describes the auditor's application of due professional care?", "options": [{"tr": "Denetçinin önemli riski tespit edememesine rağmen, gerekli mesleki özen gösterilmiştir.", "en": "Due professional care was exercised, despite the auditor’s failure to identify the significant risk.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, risk değerlendirmesi sırasında tüm önemli riskleri tespit edemediği için gerekli mesleki özeni göstermemiştir.", "en": "Due professional care was not exercised because the auditor failed to identify all the significant risks during the risk assessment.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yetkili kullanıcıların şifrelerini paylaşma olasılığından kaynaklanan risk dikkate alınmadığı için gerekli profesyonel özen gösterilmemiştir.", "en": "Due professional care was not exercised because the residual risk from the possibility of authorized users sharing their passwords was not considered.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetçi, olası şifre paylaşımına dair tanıklık niteliğinde kanıt elde etmek için görüşmeler yapmadığı için gerekli mesleki özeni göstermemiştir.", "en": "Due professional care was not exercised because the auditor failed to conduct interviews to obtain testimonial evidence of possible password sharing", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Bir iç denetçi, denetim çalışması sırasında dolandırıcılıkla ilgili bir dizi şüpheli durum tespit ettiğinde, aşağıdaki eylemlerden hangisi mesleki özeni en iyi şekilde gösterir?", "q_en": "Which of the following actions best demonstrates due professional care by an internal auditor when she discovers a number of fraud-related red flags during an audit engagement?", "options": [{"tr": "Denetimi sonlandırın ve yönetimi dolandırıcılık olayının gerçekleştiği konusunda bilgilendirin.", "en": "Conclude the engagement and inform management that fraud has occurred", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sahtekarlığın varlığını doğrulamak için ek testler gerçekleştirin.", "en": "Perform further testing to verify the existence of fraud.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İş birliğini askıya alın ve resmi bir dolandırıcılık soruşturması başlatın.", "en": "Suspend the engagement and undertake a formal fraud investigation.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Olası dolandırıcılık durumunu derhal yönetim kuruluna bildirin.", "en": "Notify the board of the possible fraud immediately", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdaki senaryolardan hangisi mesleki özen yükümlülüğü kavramını en iyi şekilde örneklendirmektedir?", "q_en": "Which of the following scenarios best illustrates the concept of due professional care?", "options": [{"tr": "Denetim hedeflerini belirledikten ve süreci gözden geçirdikten sonra, iç denetçi, tüm önemli risk olaylarının sistematik ve disiplinli bir yaklaşımla belirlenip test edildiği konusunda süreç sahiplerine güvence verdi.", "en": "After establishing engagement objectives and reviewing a process, the internal auditor assured process owners that all significant risk events were identified and tested using a systematic, disciplined approach.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Önceden belirlenmiş kapsam ve hedeflere dayalı bir denetim gerçekleştirdikten sonra, iç denetçi, denetlenen alandaki iç kontrol sisteminin etkin bir şekilde çalıştığını yönetime garanti etmiştir.", "en": "After conducting an audit based upon a predefined scope and objective, the internal auditor guaranteed management that the system of internal controls in an audited area operates effectively.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin başı olarak, baş denetim yöneticisi işlevsel olarak kuruluşun yönetim kuruluna, idari olarak ise üst yönetime rapor veriyordu.", "en": "As head of the internal audit activity, the chief audit executive reported functionally to the organization's board and administratively to senior management.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin başı olarak, baş denetim yöneticisi, denetim sorumlularının denetim sonrası personel toplantılarını gerçekleştirmesini sağlar.", "en": "As head of the internal audit activity, the chief audit executive ensures that engagement supervisors conduct post-engagement staff meetings.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdaki yazılı belgelerden hangisi, iç denetçilerin Standartlara uygun olarak gerekli mesleki özeni gösterdiğine dair en iyi kanıtı sunar?", "q_en": "Which of the following written documents typically offers the best evidence that internal auditors exercise due professional care in conformance with the Standards?", "options": [{"tr": "İç denetim tüzüğü.", "en": "Internal audit charter.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çalışma belgesi.", "en": "Workpaper.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetim raporu.", "en": "Audit report.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Etik kurallar.", "en": "Code of ethics.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdaki eylemlerden hangisi bir iç denetçinin gerekli mesleki özeni gösterdiğini en iyi şekilde örneklendirir?", "q_en": "Which of the following actions best demonstrates an internal auditor exercising due professional care?", "options": [{"tr": "Örneklem yeterli olsa bile, tüm popülasyonu test etmek", "en": "Testing an entire population, even when a sample would suffice", "cmt_tr": "", "cmt_en": ""}, {"tr": "Verimlilik için teknoloji ve veri analizi tekniklerinin kullanımı", "en": "Using technology and data analysis techniques for efficiency", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Mesleki gelişim yoluyla bilgi, beceri ve diğer yetkinliklerin geliştirilmesi", "en": "Enhancing knowledge, skills, and other competencies through professional development", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetim hedeflerinin belirlenmesi, denetim testlerinin yapılması ve eksik kontrollerin uygulanması", "en": "Establishing audit objectives, performing audit tests, and implementing missing controls", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi baş denetim yöneticisinin (CAE) gerekli mesleki özeni göstermesine bir örnektir?", "q_en": "Which of the following is an example of the chief audit executive (CAE) demonstrating due professional care?", "options": [{"tr": "Baş Denetim Mühendisi (CAE), iç denetim faaliyetlerinde gerekli mesleki özenin nasıl gösterilmesi gerektiğini anlamak için diğer kuruluşlardaki Baş Denetim Mühendislerine güvenmektedir.", "en": "The CAE relies on CAEs in other organizations to understand how due professional care should be executed in her internal audit activity", "cmt_tr": "", "cmt_en": ""}, {"tr": "CAE, durum güncellemesi sunmak üzere üç ayda bir yönetim kuruluyla bir araya gelir.", "en": "The CAE meets with the board of directors on a quarterly basis to provide a status update.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç Denetim Başkanı (CAE), iç denetim planını yerine getirmek için ek kaynaklara ihtiyaç olup olmadığını belirlemek amacıyla denetim personelinin bilgi ve becerilerini yıllık olarak değerlendirir.", "en": "The CAE assesses the audit staff's knowledge and skills annually to determine whether additional resources are needed to fulfill the internal audit plan.", "cmt_tr": "", "cmt_en": ""}, {"tr": "CAE, her dış denetim sürecinde hat yöneticilerine mutlak güvence sağlar.", "en": "The CAE provides absolute assurance to line management during each eternal audit engagement", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi iç denetim faaliyetinin gerekli mesleki özeni gösterdiğini kanıtlamaktadır?", "q_en": "Which of the following demonstrates that the internal audit activity exercises due professional care?", "options": [{"tr": "Denetleyiciler, çalışma belgeleri incelendikten sonra iç denetçilere geri bildirimde bulunurlar.", "en": "Supervisors provide feedback to internal auditors after workpapers are reviewed", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Kalite güvence ve iyileştirme programı kapsamında her beş yılda bir öz değerlendirme yapılır.", "en": "A self-assessment is conducted through the quality assurance and improvement program every five years", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçilerin mevzuata uygunluk konusunda mutlak güvence vermeleri gerekmektedir.", "en": "Internal auditors are required to give absolute assurance of regulatory compliance", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim yöneticisi, işlevsel olarak yönetim kuruluna bağlıdır.", "en": "The chief audit executive reports functionally to the board", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "İç denetçilerden mesleki özen yükümlülüğü açısından neler beklenmektedir?", "q_en": "What is expected of internal auditors in regards to due professional care?", "options": [{"tr": "Denetçiler, maliyeti dikkate almadan güvence hizmetleri sunarlar.", "en": "Auditors perform assurance services without regard to cost", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçiler, tüm riskleri belirlemek için güvence hizmetlerini etkin bir şekilde yerine getirirler.", "en": "Auditors perform assurance services effectively to identify all risks", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçiler, denetim görevinin hedeflerine ulaşılması için gerekli olan güvence hizmetlerini yerine getirirler.", "en": "Auditors perform assurance services needed to achieve the engagement's objectives", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetçiler, tüm önemli risklerin ele alınacağını garanti altına almak için güvence hizmetleri sunarlar.", "en": "Auditors perform assurance services to guarantee all significant risks will be addressed", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Denetim planlaması sırasında, bir iç denetçi belirli bir testin maliyetinin, sonuçlarından beklenen faydadan daha fazla olduğunu belirler. Bu testin denetim çalışma programından çıkarılabileceğine karar verir. Aşağıdakilerden hangisi iç denetçinin en iyi şekilde gösterdiği durumdur?", "q_en": "During engagement planning, an internal auditor determines that the cost of a certain test outweighs the benefit that can be expected from the results. He determines that this test can be removed from the audit work program. Which of the following did the internal auditor best demonstrate?", "options": [{"tr": "Gerekli profesyonel bakım", "en": "Due professional care", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Bireysel nesnellik", "en": "Individual objectivity", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yeterlilik", "en": "Proficiency", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç değerlendirme", "en": "Internal assessment", "cmt_tr": "", "cmt_en": ""}], "answer": 0}], "Code of Ethics": [{"q_tr": "IIA Etik Kurallarına göre, sonuçların iletilmesiyle ilgili olarak aşağıdakilerden hangisi gereklidir?", "q_en": "According to the IIA Code of Ethics, which of the following is required with regard to communicating results?", "options": [{"tr": "İç denetçi, kuruluş için zararlı olabilecek gizli konuları ifşa etmeden, önemli bilgileri kuruluş içindeki ilgili personele sunmalıdır.", "en": "The internal auditor should present material information to appropriate personnel within the organization without revealing confidential matters that could be detrimental to the organization.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, nihai denetim raporunun yayınlandığı tarihe kadar elde ettiği tüm önemli bilgileri açıklamalıdır.", "en": "The internal auditor should disclose all material information obtained by the date of the final engagement communication.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, belirlenen zaman ve bütçe sınırları içinde tüm önemli bilgileri edinmelidir.", "en": "The internal auditor should obtain all material information within the established time and budget parameters.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçi, incelenen faaliyetlere ilişkin raporlamayı potansiyel olarak çarpıtabilecek önemli gerçekleri ortaya çıkarmalıdır.", "en": "The internal auditor should reveal material facts that could potentially distort the reporting of activities under review.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir maaş denetimi sırasında, iç denetçi, kendisiyle aynı pozisyon sınıflandırmasına sahip birkaç kişinin önemli ölçüde daha yüksek maaş aldığını keşfetti. Denetçi, her birinin adını ve maaş miktarını not aldı ve bu bilgilere dayanarak baş denetim yöneticisine maaş artışı talebinde bulunmayı planladı. Bu senaryoda aşağıdaki IIA Etik Kuralları ilkelerinden hangisi ihlal edilmiştir?", "q_en": "During a payroll audit, the internal auditor discovered that several individuals who have the same position classification as he, are earning a significantly higher salary. The auditor noted the names and amounts of each, and he planned to prepare a request to the chief audit executive for a salary increase based on this information. Which of the following IIA Code of Ethics principles was violated in this scenario?", "options": [{"tr": "Yeterlilik.", "en": "Competency.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Nesnellik,", "en": "Objectivity,", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bütünlük.", "en": "Integrity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Gizlilik", "en": "Confidentiality", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdaki durumlardan hangisi, IIA Etik Kuralları'nın gizlilik ilkesini ihlal etmiş olabilecek bir iç denetçiyi en iyi şekilde tanımlar?", "q_en": "Which of the following situations best describes an internal auditor who may have violated the IIA Code of Ethics principle of confidentiality?", "options": [{"tr": "Denetçi, önceki işinden dolandırıcılık iddiaları nedeniyle kovulduğunu özgeçmişinden kasten gizlemiştir.", "en": "The auditor intentionally omitted from his resume that he was fired from his previous job for fraud allegations,", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, değerlendirmesi beklenen projenin sorumlusunun kayınbiraderi olduğunu amirine bildirmemeye karar verdi.", "en": "The auditor decided not to notify her supervisor that her brother-in-law was responsible for the project the auditor was expected to evaluate.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, daha hızlı ve daha uygun olduğu gerekçesiyle, denetlenen müşteriden istenen dosyaları kişisel şifrelenmemiş USB belleğine kopyalamasını istedi.", "en": "The auditor asked the audit client to copy requested files to her personal unencrypted memory stick because it was faster and more convenient.", "cmt_tr": "", "cmt_en": ""}, {"tr": "De
