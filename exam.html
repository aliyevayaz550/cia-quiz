ack of the requisite skills.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Satış sürecini denetlemekle görevlendirilen bir iç denetim müdürü, sürecin sahibinin bir akrabası olduğunu ortaya çıkarmayı başaramadı.", "en": "An internal audit manager assigned to audit a sales process failed to reveal that the process owner is a relative", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "İç denetim faaliyetinin Etik Kurallara veya Standartlara aykırı olduğunun tespit edilmesi durumunda baş denetim yöneticisi ne yapmalıdır?", "q_en": "What should the chief audit executive do when the internal audit activity is found to be in nonconformance with the Code of Ethics or the Standards?", "options": [{"tr": "Denetim altındaki alana, uygunsuzlukları gidermek için yetkin personel görevlendirin.", "en": "Assign competent staff to the area under audit to remediate the nonconformance.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Söz konusu sapmanın iç denetim faaliyetinin genel kapsamını nasıl etkilediğini belirleyin.", "en": "Determine how the deviation impacted the overall scope of the internal audit activity.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Yönetim kurulunun beklentilerini anlamak için yönetim kuruluyla bir araya gelin.", "en": "Meet with the board to gam an understanding of the board's expectations.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Konuyu bir sonraki dış değerlendirme sırasında yönetim kuruluna iletin.", "en": "Communicate the matter to the board at the time of the next external assessment.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "IIA Etik Kuralları'nın hangi ilkesi sürekli eğitim ve mesleki gelişime odaklanmaktadır?", "q_en": "Which principle of the IIA Code of Ethics focuses on continuing education and professional development?", "options": [{"tr": "Gerekli profesyonel bakım", "en": "Due professional care", "cmt_tr": "", "cmt_en": ""}, {"tr": "Profesyonellik", "en": "Professionalism", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yeterlilik", "en": "Proficiency", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yeterlilik", "en": "Competency", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Yeni işe alınan bir iç denetçi, sahip olmadığı önemli BT uzmanlığı gerektiren bir görevi yerine getirmektedir. Denetçi, uzmanlık eksikliği konusunda baş denetim yöneticisini bilgilendirmez ve görevi yine de yerine getirmeye karar verirse, IIA'nın Etik Kuralları'nın hangi ilkesini ihlal etmiş olur?", "q_en": "A newly hired internal auditor is performing an engagement that requires significant IT expertise that he does not possess. If the auditor does not alert the chief audit executive about his lack of expertise and decides to perform the engagement anyhow, which principle of the IIA's Code of Ethics would he violate?", "options": [{"tr": "Gerekli profesyonel özen.", "en": "Due professional care.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yeterlilik.", "en": "Competency.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Etkili iletişim", "en": "Effective communication", "cmt_tr": "", "cmt_en": ""}, {"tr": "Profesyonellik", "en": "Professionalism", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdaki seçeneklerden hangisi, iç denetçilerin IIA Etik Kurallarına uymasının zorunlu olmasının nedenini açıklamaktadır?", "q_en": "Which of the following options describes the reason that conformance with The IIA's Code of Ethics is mandatory for internal auditors?", "options": [{"tr": "Etik uyumluluk, paydaşların iç denetim faaliyetinin ve profesyonel iç denetçilerin yetkinliğine olan güveninin temelini oluşturur.", "en": "Ethical compliance provides the basis for stakeholder confidence in the competence of the internal audit activity and of professional internal auditors.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Etik uyumluluk, iç denetçilerin ve iç denetim faaliyetinin, kuruluşun risk yönetimi konusunda mutlak güvence sağlama sorumluluğunu üstlenmesi için gereklidir.", "en": "Eth rtunity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Akılcılaştırma.", "en": "Rationalization.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Bağlılık.", "en": "Commitment.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdaki dolandırıcılık nedenlerinden hangisi bir kuruluş tarafından doğrudan kontrol edilebilir?", "q_en": "Which of the following drivers of fraud is directly controllable by an organization?", "options": [{"tr": "Basınç", "en": "Pressure", "cmt_tr": "", "cmt_en": ""}, {"tr": "Rasyonelleştirme", "en": "Rationalization", "cmt_tr": "", "cmt_en": ""}, {"tr": "Fırsat", "en": "Opportunity", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Teşvik", "en": "Incentive", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi sahtekarlığı tespit etmede en etkili yöntem olurdu?", "q_en": "Which of the following would be the most effective in helping to detect fraud?", "options": [{"tr": "Davranış kodu.", "en": "Code of conduct.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İşten ayrılma görüşmeleri.", "en": "Exit interviews.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dolandırıcılık farkındalık eğitimi.", "en": "Fraud awareness training.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çalışan terfi politikası.", "en": "Employee promotion policy.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Dolandırıcılıkların ortak özelliklerinden hangisini kuruluş en çok etkileyebilir?", "q_en": "Of all the common characteristics of frauds, which of the following can the organization influence the most?", "options": [{"tr": "Baskı mı yoksa teşvik mi?", "en": "Pressure or incentive.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Rasyonelleştirme", "en": "Rationalization", "cmt_tr": "", "cmt_en": ""}, {"tr": "Fırsat", "en": "Opportunity", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Bağlılık.", "en": "Commitment.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Bir iç denetçi, belirli bir şube lokasyonu için dolandırıcılık risklerini değerlendiriyor ve bir dolandırıcılık risk matrisi oluşturuyor. Aşağıdakilerden hangisinin matrise dahil edilmesi en olasıdır?", "q_en": "An internal auditor is assessing fraud risks and creating a fraud risk matrix for a particular branch location. Which of the following is most likely to be included in the matrix?", "options": [{"tr": "Riskler ve ilgili risk azaltıcı önlemler.", "en": "Risks and relevant mitigating controls.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İş süreçleri ve ilgili dolandırıcılık riskleri.", "en": "Business processes and relevant fraud risks.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dolandırıcılık senaryoları ve ilgili riskler.", "en": "Fraud scenarios and relevant risks.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Fırsat, gerekçelendirme ve dolandırıcılık yapmaya yönelik baskı.", "en": "Opportunity, rationalization, and pressure to commit fraud.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Bir iç denetçinin, kuruluşun bu tür riskleri nasıl yönettiğini değerlendirmek için atacağı uygun ilk adım nedir?", "q_en": "What is an appropriate first step in an internal auditor’s fraud risk assessment to evaluate how the organization manages such risk?", "options": [{"tr": "Önleyici ve tespit edici kontroller geliştirin.", "en": "Develop preventive and detective controls", "cmt_tr": "", "cmt_en": ""}, {"tr": "Potansiyel dolandırıcılık senaryolarını belirleyin.", "en": "Identify potential fraud scenarios", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dolandırıcılık risklerinin etkisini ve olasılığını değerlendirin.", "en": "Assess the impact and likelihood of fraud risks", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dolandırıcılık riskine yönelik yanıtları belirleyin.", "en": "Determine fraud risk responses", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdaki senaryolardan hangisi olası dolandırıcılığın en endişe verici işareti veya göstergesidir?", "q_en": "Which of the following scenarios provides the most concerning red flag or indicator of possible fraud?", "options": [{"tr": "Çalışan, kusursuz devamlılık için prim alıyor.", "en": "An employee receives a bonus for perfect attendance", "cmt_tr": "", "cmt_en": ""}, {"tr": "Son 18 ay içinde, bu göreve terfi ettikten sonra üç mali işler müdürü kuruluştan ayrıldı.", "en": "During the past 18 months three chief financial officers have left the organization after having been promoted to the position", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Kuruluş, üçüncü taraf hizmet sağlayıcıları üzerinde herhangi bir durum tespiti araştırması yapmamaktadır.", "en": "The organization does not perform any due diligence research on third party service providers", "cmt_tr": "", "cmt_en": ""}, {"tr": "Üç rakip oldukça karlı, ancak aynı büyüklükteki dördüncü bir şirket iflas sınırına yaklaşıyor.", "en": "Three competitors are highly profitable but a fourth equal in size is approaching bankruptcy limits", "cmt_tr": "", "cmt_en": ""}], "answer": 1}], "Audit Charter": [{"q_tr": "Yeni bir iç denetim biriminin baş denetim yöneticisi (CAE), bir iç denetim tüzüğü oluşturuyor. Aşağıdaki terimlerden hangisinin tüzüğe dahil edilmesi en olasıdır?", "q_en": "The chief audit executive (CAE) of a new internal audit activity is creating an internal audit charter. Which of the following terms is most likely to be included in the charter?", "options": [{"tr": "CEA'nın yönetim kuruluyla etkileşimde bulunduğu her an üst düzey yöneticiler de hazır bulunacak ve böylece üç taraf arasında etkili iletişim sağlanacaktır.", "en": "Senior management will be present whenever the CAE interacts with the board, to ensure effective communication among all three parties.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, kuruluşun gerekli uzmanlığa sahip olmadığı herhangi bir alanda kontrol politikalarının ve prosedürlerinin tasarlanması konusunda tavsiyelerde bulunacaklardır.", "en": "Internal auditors will advise on the design of control policies and procedures in any area where the organization does not possess the requisite expertise.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, bir profesyonelden beklenen yetkinliği, özeni ve özveriyi sergileyeceklerdir.", "en": "Internal auditors will demonstrate competence, concern, and the dedication expected of a professional.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçiler, belirlenen sayıdan fazla gözlem bildirmeleri durumunda prim de dahil olmak üzere performansa dayalı ücretlendirme alacaklardır.", "en": "Internal auditors will receive performance-based compensation, including bonuses for reporting more than a stipulated number of observations.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, çokuluslu bir kuruluşta risk yönetimi ve soruşturmadan iç denetim biriminin sorumlu olması yönündeki CEO'nun kararını en uygun şekilde gerekçelendirir?", "q_en": "Which of the following most appropriately justifies the CEO’s decision that the internal audit activity shall be responsible for risk management and investigation at a multinational organization?", "options": [{"tr": "Ana şirketin dış denetçilerinin tavsiyesi.", "en": "The recommendation of the parent office external auditors.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim tüzüğünün hükümleri", "en": "The provisions of the internal audit charter", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "CEO'nun yetkisi.", "en": "The authority of the CEO.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim yöneticisinin yetkinlik düzeyi", "en": "The level of proficiency of the chief audit executive", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi iç denetim faaliyetinin amacı, yetkisi ve sorumluluğu ile ilgili Standartlara uygunluğu en iyi şekilde göstermektedir?", "q_en": "Which of the following best demonstrates conformance with the Standards regarding the internal audit activity's purpose authority, and responsibility?", "options": [{"tr": "İç denetim şartnamesinin yönetim kuruluna görüşülmesi ve resmi olarak sunulması", "en": "Discussion and formal presentation of the internal audit charter to the board of directors", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Dış denetçiler tarafından iç denetim faaliyetinin amacı, yetkisi ve sorumluluğu konusunda verilen sertifika.", "en": "Certification by external auditors on the purpose, authority and responsibility of the internal audit activity", "cmt_tr": "", "cmt_en": ""}, {"tr": "Üst yönetimin, iç denetim faaliyetinin başlangıçta tasarlandığı gibi işlediğine dair onayı.", "en": "Approval of senior management that the internal audit activity is functioning as originally designed", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim yöneticisi tarafından tamamlanan iç denetim faaliyetinin öz değerlendirmesi", "en": "Self-assessment of the internal audit activity completed by the chief audit executive", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi iç denetim şartnamesinin zorunlu bir unsurudur?", "q_en": "Which of the following is a required aspect of an internal audit charter?", "options": [{"tr": "Yönetim onayı", "en": "Management approval", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bağımsız inceleme", "en": "Independent review", "cmt_tr": "", "cmt_en": ""}, {"tr": "Raporlama ilişkileri", "en": "Reporting relationships", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Üç aylık değerlendirme", "en": "Quarterly assessment", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdaki ifadelerden hangisi tipik olarak iç denetim tüzüğünün sorumluluklar bölümüne dahil edilir?", "q_en": "Which of the following statements would typically be included in the responsibility section of the internal audit charter?", "options": [{"tr": "İç denetim birimi, genel müdür, denetim komitesi ve yönetim kurulu başkanına serbest ve kısıtlama olmaksızın erişim hakkına sahip olacaktır.", "en": "The internal audit activity will have free and unrestricted access to the chief executive officer, audit committee, and chairman of the board of directors.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim birimi, en az yılda bir kez gerçekleştirilen risk değerlendirmesine dayanarak ve yönetim tarafından belirlenen riskleri veya kontrol endişelerini dikkate alarak esnek bir denetim planı geliştirecek ve bu planı onay için yönetim kuruluna sunacaktır.", "en": "The internal audit activity shall develop a flexible audit plan, based on a risk assessment conducted at least annually and taking into consideration the risks or control concerns identified by management, and shall submit the plan to the board for approval.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Baş denetim yöneticisi, denetimlerin yapıldığı alanlardaki personelin yanı sıra, kuruluş içinden veya dışından uzmanlık hizmetleri de dahil olmak üzere gerekli desteği sağlayacaktır.", "en": "The chief audit executive shall obtain the necessary assistance of personnel in areas where audits are performed, as well as specialized services within or outside of the organization.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyeti, iç denetçilerin yargılarını etkileyebilecek kontrolleri uygulamayacak, prosedürler geliştirmeyecek, sistemler kurmayacak, kayıtlar hazırlamayacak veya bu tür faaliyetlerde bulunmayacaktır.", "en": "The internal audit activity will not implement controls, develop procedures, install systems, prepare records, or engage in activities that may impair internal auditors’ judgments.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdakilerden hangisi iç denetim şartnamesinde resmi olarak belgelendirilmelidir?", "q_en": "Which of the following should be formally documented in the internal audit charter?", "options": [{"tr": "İç denetim faaliyetinin risk yönetimi süreçlerini uygulama sorumluluğu.", "en": "The internal audit activity's responsibility for imposing risk management processes.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin sorumluluğu, kuruluşun yönetim çerçevesinden sorumludur.", "en": "The internal audit activity's responsibility for the organization's governance framework.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyeti tarafından sağlanan danışmanlık hizmetlerinin niteliği.", "en": "The nature of consulting services provided by the internal audit activity.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim faaliyetine yönelik bütçeleme süreci.", "en": "The budgeting process for the internal audit activity.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi baş denetim yöneticisinin iç denetim şartnamesini üst yönetim ve yönetim kuruluyla görüşmesinin başlıca nedenidir?", "q_en": "Which of the following is the primary reason the chief audit executive discusses the internal audit charter with senior management and the board?", "options": [{"tr": "Çeşitli paydaşların beklentilerine uygun olarak iç denetim faaliyetinin yönetimi konusunda rehberlik sağlamak ve geri bildirim almak.", "en": "To provide guidance and solicit feedback on managing the internal audit activity as expected by various stakeholders.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç Denetimin Misyonu ve IIA'nın zorunlu rehberlik unsurları hakkında bilgi sağlamak.", "en": "To provide an understanding of the Mission of Internal Audit and The IIA's mandatory guidance elements.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim faaliyetinin denetim kalitesine ilişkin güncel bilgileri sunmak.", "en": "To provide an update on the internal audit activity's quality of engagement supervision.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Mevcut iç denetim planlaması, iç denetim planındaki değişiklikler ve değişikliklerin gerekçeleri hakkında bilgi sağlamak.", "en": "To provide information on existing internal audit planning, changes to the internal audit plan, and the rationale for the changes", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Bir kuruluşun yönetim kurulu, iç denetim tüzüğüne baş denetim yöneticisinin işe alınması ve ücretlendirilmesi ile iç denetim bütçesinin onaylanmasına ilişkin şartlar ekleyerek tüzüğü revize etmeyi önermektedir. Yönetim kurulunun tüzükte en büyük olasılıkla tanımladığı husus aşağıdakilerden hangisidir?", "q_en": "An organization's board recommends revising the internal audit charter by adding requirements regarding the hiring and compensation of the chief audit executive as well as information on approving the internal audit budget. Which of the following is the board most likely defining in the charter?", "options": [{"tr": "İç denetim faaliyetinin işlevsel ve idari sorumlulukları.", "en": "Functional and administrative responsibilities of internal audit activity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin yetkisi ve nesnelliği.", "en": "Authority and objectivity of internal audit activity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin bağımsızlığı ve nesnelliği.", "en": "Independence and objectivity of internal audit activity.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetim faaliyetinin güvence altına alınması ve iyileştirilmesi.", "en": "Assurance and improvement of internal audit activity.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi, iç denetim faaliyetinin yetkisini belirlemeye yardımcı olmak için iç denetim tüzüğüne dahil edilir?", "q_en": "Which of the following would be included in an internal audit charter to help establish the authority of the internal audit activity?", "options": [{"tr": "İç denetim faaliyetinin tüm yönlerine ilişkin sonuçların iletilmesine dair beklentileri özetleyin.", "en": "Outline expectations for communicating the results of all aspects of the internal audit activity.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin varlıkların ve gizliliğin korunmasından sorumlu olduğunu beyan edin.", "en": "Declare the internal audit activity’s accountability for safeguarding assets and confidentiality.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim yöneticisinin (CAE) raporlama hattını belgeleyin.", "en": "Document the chief audit executive’s (CAE's) reporting line", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "CAE ile CAE'nin rapor verdiği kişi arasında yapılan belge anlaşması", "en": "Document agreement between the CAE and the individual to whom the CAE reports", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisi iç denetim birimine üçüncü taraf hizmet sağlayıcısının faturalarına ilişkin destekleyici belgeler talep etme yetkisi verir?", "q_en": "Which of the following gives the internal audit activity the authority to request supporting documentation for the invoices of a third-party service provider?", "options": [{"tr": "İç denetim politikası kılavuzu.", "en": "The internal audit policy manual.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim tüzüğü.", "en": "The internal audit charter.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Yönetim kurulu.", "en": "The board of directors.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kalite güvence ve iyileştirme programı.", "en": "The quality assurance and improvement program.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Bir iç denetim tüzüğünde, baş denetim yöneticisi (CAE) ile ilgili aşağıdaki ifadelerden hangisi iç denetim faaliyetinin sorumluluklarını tanımlamakla en doğrudan ilgili olur?", "q_en": "In an internal audit charter, which of the following statements regarding the chief audit executive (CAE) would be most directly related to describing the responsibilities of the internal audit activity?", "options": [{"tr": "Baş Denetim Sorumlusu (CAE), işlevsel olarak yönetim kuruluna, partment head’s travel reports showed minor travel expenses, and there were no charges for hotels, meals, or transportation. However, the auditor knew that the department head frequently traveled worldwide to meet with suppliers and visit their production sites. Which of the following would be the most appropriate next step for the auditor?", "options": [{"tr": "Denetçi, çalışanların seyahat giderleri denetlenirken bu konuyu takip etmek üzere not almalıdır.", "en": "The auditor should make a note of the issue for follow-up when employee travel expenses are audited.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, kuruluşun tedarikçileri arasında son birkaç yılda görülen eğilimleri ve değişiklikleri analiz etmelidir.", "en": "The auditor should analyze trends and changes among the organization’s suppliers over the past few years.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, üst düzey yöneticilerin seyahatleriyle ilgili herhangi bir özel düzenleme olup olmadığını araştırmalıdır.", "en": "The auditor should investigate whether there are any special arrangements regarding senior management travel.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetçi, bölüm başkanının ziyaret ettiği yerlerin listesini analiz ederek tipik maliyetleri tahmin etmelidir.", "en": "The auditor should analyze the list of destinations the department head visited to estimate typical costs.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdakilerden hangisini genel bir iç denetçi BT ile ilgili risk olarak nitelendirebilir?", "q_en": "Which of the following should a general internal auditor be able to characterize as an IT-related risk?", "options": [{"tr": "Bilgisayar sunucuları tüm çalışanların erişebileceği bir odada bulunmaktadır.", "en": "Computer servers are in a room that is accessible to all employees,", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bir BT mimarı, tatile çıkmaktan ve iş yükünü iş arkadaşlarıyla paylaşmaktan kaçınır.", "en": "An IT architect avoids ent to developing professional competencies?", "options": [{"tr": "Yıllık denetim planındaki tüm çalışmalara dahil olmayı talep ediyorum.", "en": "Requesting to be part of all engagements on the annual audit plan.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yerel olarak sunulan bir dizi eğitim kursuna katılmak.", "en": "Attending a series of locally offered training courses.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Hedeflenen eğitim ihtiyaçlarına yönelik beceri değerlendirmesi ve geliştirme planının tamamlanması.", "en": "Completing a skills assessment and development plan for targeted training needs.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Veri analitiğinin nasıl kullanılacağına dair bir web seminerine katılmak.", "en": "Attending a webinar on how to use data analytics", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Baş denetim yöneticisi (CAE), yaklaşan bir denetim görevi için bir iç denetçi görevlendirdi. Aşağıdaki şartlardan hangisi, iç denetçinin bir güvence denetimi görevine atandığını en büyük olasılıkla gösterir?", "q_en": "The chief audit executive (CAE) has assigned an internal auditor to an upcoming engagement. Which of the following requirements would most likely indicate that the internal auditor was assigned to an assurance engagement?", "options": [{"tr": "Görevlendirilen iç denetçi, denetim çalışmasının amaçlarını, kapsamını ve tekniklerini belirlemelidir.", "en": "The assigned internal auditor must determine the objectives, scope, and techniques of the engagement.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçinin sahip olmadığı beceriler, bilgi veya diğer yetkinlikleri Baş Denetim Sorumlusu (CAE) bizzat kendisi edinmelidir.", "en": "The CAE must personally obtain the needed skills, knowledge, or other competencies if the internal auditor does not have them.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Görevlendirilen iç denetçi, denetim çalışması sırasında yönetim sorumluluklarını üstlenmemelidir. ncies needed to perform all or part of the engagement", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi, yönetimin etkin kontrolleri sürdürmesine yardımcı olma konusunda iç denetim faaliyetinin temel sorumluluklarından birini tanımlar?", "q_en": "Which of the following describes a primary responsibility for the internal audit activity in helping management maintain effective controls?", "options": [{"tr": "Sürekli değerlendirmeyi teşvik etmek", "en": "Promoting continuous evaluation", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Sürekli izlemeyi teşvik etmek", "en": "Promoting continuous monitoring", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sürekli iyileştirmeyi teşvik etmek", "en": "Promoting continuous improvement", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sürekli raporlamayı teşvik etmek", "en": "Promoting continuous reporting", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi bir kuruluşun finans alanıyla ilgili kurum düzeyinde bir kontrol örneğidir?", "q_en": "Which of the following is an example of an entity-level control pertaining to the finance area of an organization?", "options": [{"tr": "Banka mutabakatı gibi temel hesap mutabakatı", "en": "Key account reconciliation such as bank reconciliation", "cmt_tr": "", "cmt_en": ""}, {"tr": "Muhasebe kayıtlarının girilmesi ve incelenmesi arasındaki görev ayrımı", "en": "Segregation of duties between posting and reviewing journal entries", "cmt_tr": "", "cmt_en": ""}, {"tr": "Harcama onayları için imza yetkisi matrisi", "en": "A signing authority matrix for spending approvals", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bir finans ve denetim komitesinin kurulması", "en": "The establishment of a finance and audit committee", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir kuruluş, ortaya çıkabilecek olası dolandırıcılık riskini tespit etmek için aşağıdaki eylemlerden hangisini gerçekleş t_en": ""}, {"tr": "Baş denetim yöneticisi öz değerlendirme planlar ve yönetim kurulu sonuçları onaylar.", "en": "The chief audit executive schedules a self-assessment and the board approves the results", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdaki faaliyetlerden hangisi IIA'nın İç Denetim Mesleki Uygulamasına İlişkin Temel İlkeleriyle uyumludur?", "q_en": "Which of the following activities aligns with The IIA's Core Principles for the Professional Practice of Internal Auditing?", "options": [{"tr": "Baş denetim yöneticisi, ücretlendirme kararları ve denetim sonuçlarının yönetim kuruluna iletilmesi konularında üst yönetime rapor verir.", "en": "The chief audit executive reports to senior management for compensation decisions and communications of audit results to the board", "cmt_tr": "", "cmt_en": ""}, {"tr": "Danışmanlık hizmetlerine ilişkin nihai raporlar, bulguların özetini göstermekte olup, iç denetçinin tavsiyeleri yönetimin kararlarından açıkça ayrı ve bağımsızdır.", "en": "Final reports from consulting engagements show the summary of findings, and the internal auditor’s advice is clearly distinct and separate from management's decisions", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçiler, operasyon ve yönetim pozisyonlarında rotasyon yaparak görev alırlar ve daha sonra bu alanlarda denetim çalışmaları gerçekleştirerek bilgilerinin zamanında uygulanmasını sağlarlar.", "en": "Internal auditors rotate through operations and management positions then perform audit engagements on these areas to ensure timely application of their knowledge", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sınırlı kaynaklar nedeniyle, iç denetçiler öncelikle iç kontroller ve risk yönetimine ilişkin güvence çalışmalarına öncelik verir ve temel sorumluluklarının dışında kalan yönetişim süreçlerinin değerlendirilmesini kapsam dışında bırakırlar.", "en": "Due to limited resources, internal auditors prioritize assurance on internal controls and risk ", "cmt_tr": "", "cmt_en": ""}, {"tr": "Kurum içi denetim faaliyetinin gerçekleştireceği özel görevler", "en": "The specific engagements that the internal audit activity will perform for the organization", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yönetim kurulunun iç denetim faaliyetine ilişkin gözetim rolü ve sorumlulukları", "en": "The board’s oversight role and responsibilities pertaining to the internal audit activity", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin mevzuata uygunluk değerlendirmelerine rehberlik edecek ilgili düzenlemeler", "en": "The relevant regulations that will guide the internal audit activity's regulatory compliance assessments", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir iç denetçi güvence denetimini tamamladı. Denetimle ilgili olarak aşağıdakilerden hangisinin doğru olma olasılığı en yüksektir?", "q_en": "An internal auditor has completed an assurance engagement. Which of the following is most likely true regarding the engagement?", "options": [{"tr": "Denetim planlaması sırasında, denetçi müşteriye denetim kapsamını onay için sundu.", "en": "During audit planning, the auditor provided the client with the scope of the engagement for their agreement", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çalışmanın sonuçları, çalışmayı talep eden müşteriye sunulan yazılı bir raporda yer almıştır.", "en": "The results of the engagement were included in a written report that was issued to the client who requested the engagement", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetim planlaması sırasında, denetçi denetim kapsamının bordro kayıtlarının güvenliği ve gizliliğinin incelenmesini de içereceğine karar vermiştir.", "en": "During audit planning, the auditor determined that the engagement scope would include a review of the security and privacy of payroll records", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Müşteri, sistemin güvenliğini artırmak amacıyla yeni bir bordro sisteminin ince ıkların kötüye kullanımı5", "en": "Asset misappropriation5", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sıyırma", "en": "Skimming", "cmt_tr": "", "cmt_en": ""}, {"tr": "Ödeme dolandırıcılığı", "en": "Disbursement fraud", "cmt_tr": "", "cmt_en": ""}, {"tr": "Bilgi yanlış beyanı", "en": "Information misrepresentation", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir çalışanın iç denetim birimine transfer edilmesinden altı ay sonra, eski operasyon müdürü, kuruluşun çevrimiçi sipariş sistemi için yeni bir fiyatlandırma modülünün değerlendirilmesinde proje ekibine yardımcı olması için geri dönmesini istedi. IIA kılavuzuna göre aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Six months after an employee was transferred to the internal audit activity his former operating manager requested that he return to assist a project team with the evaluation of a new pricing module for the organization’s online ordering system According to IIA guidance which of the following statements is true?", "options": [{"tr": "Denetçi bu projeye atanamaz, çünkü o departmandan transfer edilmesinin üzerinden 12 aydan az süre geçti.", "en": "The auditor cannot be assigned to this project, as it has been fewer than 12 months since he was transferred from that department.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim faaliyetinin bağımsızlığını korumak için, denetim sürecine başka bir iç denetçi daha atanmalıdır.", "en": "Another internal auditor should be appointed to the engagement to preserve the independence of the internal audit activity", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, görüş bildirmek objektifliğini zedeleyeceği için göreve katılamaz.", "en": "The auditor cannot participate in the assignment, as providing an opinion would impair his objectivity", "cmt_tr": "", "cmt_en": ""}, {"tr": "Denetçi, görevin niteliği danışmanlık olduğu için projeye katılabilir.", "en": "The auditor may participate on the project, as the nature of the assignment is consulting", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Bir iç denetim ekibi, denetim sonrası anket yoluyla operasyonel yönetimden şu geri bildirimi aldı: \"Yönetim, denetim bulgularının tamamına katılıyor. Ancak denetim ekibi, sorunları çözmenin en iyi yolu hakkındaki görüşlerimizi dikkate almadı.\" Bu geri bildirim, iç denetim faaliyetinin aşağıdaki kişilerarası becerilerden hangisini geliştirmesi gerektiğine işaret etmektedir?", "q_en": "An internal audit team received the following feedback from operational management via a post engagement survey \"Management agrees with all audit findings. However, the audit team did not consider our input on the best way to resolve the issues”. This feedback is an indication that the internal audit activity may need to improve which of the following interpersonal skills?", "options": [{"tr": "Liderlik", "en": "Leadership", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çatışma yönetimi", "en": "Conflict management", "cmt_tr": "", "cmt_en": ""}, {"tr": "İletişim", "en": "Communication", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Etkilemek", "en": "Influence", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Kurum içi denetçi, kuruluşun bilgisayar sisteminde bazı hayali tedarikçilerin oluşturulduğundan şüpheleniyor. Bu sahtekarlığı tespit etmek için aşağıdakilerden hangisi en iyi yöntem olurdu?", "q_en": "An internal auditor has suspicions that some fictitious vendors have been created in the organization's computer system. Which of the following would be the best technique to detect this fraud?", "options": [{"tr": "Faturalarda yinelenen numaralar, tarihler ve tutarlar olup olmadığını kontrol edin.", "en": "Review for duplicate invoice numbers, duplicate dates, and duplicate amounts", "cmt_tr": "", "cmt_en": ""}, {"tr": "Tedarikçi ve çalışan adresleri arasında eşleşme bulmak için kontroller yapın.", "en": "Run checks to find matches between vendor and employee addresses", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Faturaların iki kez ödendiği durumlarda tekrarlanan para iade taleplerini kontrol edin.", "en": "Check for recurring requests for refunds where invoices are paid twice", "cmt_tr": "", "cmt_en": ""}, {"tr": "Stoklardaki açıklanamayan artışların incelenmesi", "en": "Review for unexplained increases in inventory", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Büyük bir ulusal perakende şirketinin baş denetim yöneticisi, kuruluşun iç denetim faaliyetinin amacını ve hedeflerini gözden geçiriyor. Aşağıdaki hedeflerden hangisi IIA'nın İç Denetim Misyonu ile en iyi şekilde uyumludur?", "q_en": "The chief audit executive of a large national retailer is reviewing the purpose and objectives of the organization's internal audit activity. Which of the following objectives is best aligned with The IIA's Mission of Internal Audit?", "options": [{"tr": "Kalite güvence ve iyileştirme programını uygulamak", "en": "To implement a quality assurance and improvement program", "cmt_tr": "", "cmt_en": ""}, {"tr": "Organizasyonel varlıklar üzerindeki iç kontrollerin etkinliğini değerlendirmek", "en": "To assess the effectiveness of internal controls over organizational assets", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçilerin sorumluluklarını yerine getirmek için gerekli yetkinliklere sahip olmalarını sağlamak.", "en": "To ensure internal auditors possess the competencies needed to perform their responsibilities", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Yönetim kurulu tarafından belirlenen bütçe dahilinde faaliyet göstermek.", "en": "To operate within the budget established by the board of directors", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Yakın zamanda bir kuruluşun iç denetim faaliyetleri, ödeme alan hayalet çalışanları ortaya çıkardı. Üst yönetim, bu durumu ele almak için iç kontrol önlemlerini güçlendirmeye karar verdi. Aşağıdakilerden hangisi hayalet çalışanlara yapılan ödemeleri azaltmak için etkili bir kontrol olarak kabul edilir?", "q_en": "Recently an organization’s internal audit activity discovered ghost employees who receive payments Senior management decides to strengthen the internal control measures to address this Which of the following is considered an effective control to mitigate payments to ghost employees?", "options": [{"tr": "Personel transferleri, işe alım müdürü tarafından incelenir ve insan kaynakları müdürü tarafından onaylanır.", "en": "Staff transfers are reviewed by the recruiting manager and approved by the head of human resources", "cmt_tr": "", "cmt_en": ""}, {"tr": "Yeni personel talep formları, operasyonel yönetim tarafından onaylanır ve insan kaynakları müdürü tarafından tasdik edilir.", "en": "New staff requisition forms are authorized by operational management and acknowledged by the head of human resources", "cmt_tr": "", "cmt_en": ""}, {"tr": "Personel maaş ödemeleri ve muhasebe kayıtları, muhasebe müdürü tarafından onaylanır ve insan kaynakları müdürü tarafından tasdik edilir.", "en": "Staff salary payments and accounting records are approved by the head of accounting and acknowledged by the head of human resources", "cmt_tr": "", "cmt_en": ""}, {"tr": "Personel maaş ödeme listesi, bordro sorumlusu tarafından incelenir ve insan kaynakları sorumlusu tarafından onaylanır.", "en": "The staff salary payment list is reviewed by the head of payroll and endorsed by the head of human resources", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdakilerden hangisi 'uyarlanabilirlik kültürü' olarak bilinen örgütsel kültür türünü en iyi şekilde tanımlar?", "q_en": "Which of the following best describes the type of organizational culture known as adaptability culture'?", "options": [{"tr": "Rekabetçiliği ve kişisel girişimciliği önemseyen, sonuç odaklı bir kültür.", "en": "A results-oriented culture that values competitiveness and personal initiative", "cmt_tr": "", "cmt_en": ""}, {"tr": "Hızlı tepki gerektiren ve yüksek riskli karar alma ortamlarında ortaya çıkan bir kültür.", "en": "A culture that emerges in quick-response and high-risk decision-making environments", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Çevre ve sağlık sorunlarına düşük düzeyde ilgiyle karakterize edilen bir kültür.", "en": "A culture that is characterized by low involvement with environmental and health issues", "cmt_tr": "", "cmt_en": ""}, {"tr": "Çalışanların katılımına ve ihtiyaçlarının karşılanmasına büyük önem veren bir kültür.", "en": "A culture that places high value on participation and meeting the needs of employees.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Aşağıdaki senaryolardan hangisi iç denetim yeterliliğinin uygulanmasını en iyi şekilde göstermektedir?", "q_en": "Which of the following scenarios best demonstrates the application of internal audit proficiency?", "options": [{"tr": "Yönetim, iç denetim biriminden birleşmeye yönelik stratejik planlarını gözden geçirmesini ve geri bildirim sağlamasını talep eder, ancak baş denetim yöneticisi (CAE), ekibin birleşmeler konusunda deneyimsiz olması nedeniyle bu görevi reddeder.", "en": "Management requests that the internal audit activity review and provide feedback on its strategic plans for a merger, but the chief audit executive (CAE) declines the engagement due to the team's lack of experience with mergers.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Bir İç Denetim Amiri (CAE), diğer denetimlerden denetçileri görevlendirerek, dış denetçiler tarafından belirtilen önem düzeyinin altındaki tutarlar da dahil olmak üzere, belirli bir dönemdeki tüm sabit varlık eklemeleri üzerinde testler yapılmasını sağlar.", "en": "A CAE reassigns auditors from other audits to perform testing on all of the fixed asset additions for a period, including amounts below the materiality level stated by external auditors.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Banka şubesi denetimlerinin rutin ve tekrarlayan niteliği nedeniyle, denetim yöneticisi genellikle denetimin başında ayrıntılı planlamayı atlayarak doğrudan saha çalışmasına başlar.", "en": "Due to the routine and recurring nature of bank branch audits, an audit manager often excludes detailed planning at the beginning of the audit and immediately performs fieldwork.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Saha çalışması sırasında, bir denetçi nakit yönetimi konusunda görev ayrımının yetersiz olduğunu gözlemledi. Denetçi bu gözlemini amirine bildirdi ve amir, bu alanın sonraki bir denetimde incelenmesi gerektiğine karar verdi.", "en": "During fieldwork, an auditor observed a lack of segregation of duties over cash management. The auditor reported this observation to his supervisor, who decided that the area should be examined in a subsequent audit.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Tedarikçi ana dosyasına erişimi olan bir muhasebe memuru, ödemeyi kurumun kasiyerinden geçirmeden önce meşru bir tedarikçinin ödeme bilgilerini bir arkadaşının bilgileriyle değiştirdi. Hemen ardından orijinal tedarikçi bilgilerini geri yükledi. Aşağıdaki kontrollerden hangisi bu dolandırıcılığı önleyebilirdi?", "q_en": "An accounts payable clerk who has access to the vendor master file replaced the payment details of a legitimate vendor with those of a friend before processing the payment through the organization's cashier. Immediately afterward, he restored the original vendor information. Which of the following controls could have prevented this fraud?", "options": [{"tr": "Muhasebe sorumlusu tarafından ana dosya değişiklik taleplerinin onaylanması", "en": "Approval of master file change requests by the accounts payable supervisor", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Çek defterinin orijinal faturalarla karşılaştırılması.", "en": "Comparison of the check register to original invoices.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Muhasebe sorumlusu ve veznedar arasında görev ayrımı.", "en": "Segregation of duties between accounts payable and the cashier.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Tedarikçilere sık sık hesap özetleri gönderilmesi.", "en": "Frequent issuance of account statements sent to the vendors.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi iç denetçilerin sürekli mesleki gelişim gereksinimlerini karşılamaları için en iyi desteği sağlar?", "q_en": "Which of the following would provide the best support for internal auditors to meet their continuing professional development requirements?", "options": [{"tr": "Çevrimiçi iç denetim ve işletme becerileri kurslarına erişim.", "en": "Access to online internal audit and business skills courses.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim personeli tarafından tamamlanan öz değerlendirme raporlarının kayıtları.", "en": "Records of self-assessment reports completed by the internal audit staff.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Belirli projeler için dış tedarikçilerle yapılan ortak kaynak kullanımı anlaşmaları.", "en": "Cosourcing arrangements with external providers on specific engagements.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçilerin başarılarını belirlenen hedeflerle karşılaştıran performans değerlendirmeleri.", "en": "Performance reviews comparing internal auditors' achievements against specified goals.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Aşağıdaki senaryolardan hangisinde baş denetim yöneticisinin (CAE) görevi reddetmesi gerekecektir?", "q_en": "In which of the following scenarios would the chief audit executive (CAE) be required to decline the assignment?", "options": [{"tr": "CAE'nin iç denetim güvence programını yürütmek için dış hizmetlerden yararlanması gerekecektir.", "en": "The CAE would need to procure external services to deliver the internal audit assurance program.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim ekibinde sahtekarlığı tespit etme ve soruşturma konusunda uzmanlık bulunmamaktadır.", "en": "There is no expertise within the internal audit team for detecting and investigating fraud.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim ekibinde BT projelerinin denetimi konusunda uzmanlık bulunmamaktadır.", "en": "There is no expertise within the internal audit team for auditing an IT engagement.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetim ekibinde danışmanlık hizmeti verebilecek uzmanlık bulunmamaktadır.", "en": "There is no available expertise on the internal audit team to perform a consulting engagement", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Kurum içi denetim birimi, kuruluşun risk yönetimi fonksiyonunu birden fazla kez denetlemiş ve yapılan öneriler risk yönetimi sorumlusu tarafından henüz ele alınmamıştır. Aşağıdakilerden hangisi kurum içi denetim biriminin bir sonraki adımı olmalıdır?", "q_en": "The internal audit activity audited an organization's risk management function multiple times, and the recommendations that were made remain unaddressed by the head of risk management. Which of the following would be the next step for the internal audit activity?", "options": [{"tr": "İç denetim faaliyeti, yönetim adına önerileri uygulayarak değer katmalıdır.", "en": "The internal audit activity should add value by implementing the recommendations on management's behalf.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Baş denetim sorumlusu (CAE) bu konuyu üst yönetim ve yönetim kurulu ile görüşmelidir.", "en": "The chief audit executive (CAE) must discuss this matter with senior management and the board", "cmt_tr": "", "cmt_en": ""}, {"tr": "CAE, ilgili risklerin ciddiyetine bağlı olarak hangi önerilerin uygulanacağına karar vermelidir.", "en": "The CAE should determine which recommendations to implement based on the severity of the associated risks.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Baş Denetim Sorumlusu (CAE) liderliğin ivity has been in existence for two years and has documented only an internal assessment.", "cmt_tr": "", "cmt_en": ""}], "answer": 0}, {"q_tr": "Aşağıdakilerden hangisi iç denetçiler ve dış denetçiler arasındaki farkları en iyi şekilde açıklar?", "q_en": "Which of the following best describes the differences between internal auditors and external auditors?", "options": [{"tr": "Dış denetçiler kuruluşun mali tablolarındaki yanlışlıklarla ilgilenirken, iç denetçiler kuruluşun mali tablolarını etkileyebilecek hileli faaliyetlerle ilgilenirler.", "en": "External auditors are concerned about misstatements in the organization's financial statements, while internal auditors are concerned about fraudulent activities that could impact the organization’s financial statements", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dış denetçilerin muhasebe alanında uzmanlık belgesine sahip olmaları ve eğitimlerine devam etme sorumluluğu bulunurken, iç denetçilerin ise iç denetim alanında uzmanlık belgesine sahip olmaları gerekmektedir.", "en": "External auditors are required to hold an accounting designation and are responsible for continuing their education, while internal auditors are required to hold an internal audit designation.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dış denetçiler finansal tabloların doğruluğuna ve anlaşılabilirliğine odaklanırken, iç denetçiler ise kontrol sürecinin etkinliğini değerlendirerek ve iyileştirerek kuruluşun hedeflerine ulaşmasına yardımcı olur.", "en": "External auditors focus on the accuracy and understandability of financial statements, while internal auditors help the organization accomplish its objectives by evaluating and improving the effectiveness of the control process.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Dış denetçiler kuruluşun çalışanı değildir, oysa iç denetçiler işletme hakkında derinlemesine bilgiye sahip çalışanlardır; bu da onların görüşlerini yönetim kurulu ve üst yönetim için daha güvenilir kılar.", "en": "External auditors are not emp dit executive that this situation may impair her objectivity.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "Denetçi yalnızca danışmanlık hizmeti verebilir, güvence hizmeti veremez.", "en": "The auditor can provide only consulting services, not assurance.", "cmt_tr": "", "cmt_en": ""}], "answer": 2}, {"q_tr": "Aşağıdaki ifadelerden hangisi iç denetçilerin dolandırıcılık tespitindeki rolünü en iyi şekilde tanımlar?", "q_en": "Which of the following statements best describes internal auditors' role in fraud detection?", "options": [{"tr": "İç denetçilerin rolleri, kayıp önleme yöneticileri veya dolandırıcılık soruşturmacılarının rollerine benzer.", "en": "Internal auditors' roles are similar to those performed by loss prevention managers or fraud investigators.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçilerin denetim süreci boyunca yeterli mesleki şüphecilik sergilemesi son derece önemlidir.", "en": "Internal auditors' demonstration of adequate professional skepticism during an audit engagement is of paramount importance.", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}, {"tr": "İç denetçiler her görevde sahtekarlık risklerini göz önünde bulundurmalı ve sahtekarlık örneklerini tespit ederek gerekli özeni göstermelidir.", "en": "Internal auditors should consider fraud risks in every assignment and demonstrate due care by detecting fraud instances.", "cmt_tr": "", "cmt_en": ""}, {"tr": "İç denetçiler, önleyici ve tespit edici tedbirleri uygulayabilmelerini sağlayacak, dolandırıcılıkla ilgili bilgi birikimine sahip olmalıdır.", "en": "Internal auditors should possess a fraud-related body of knowledge, enabling them to carry out preventative and detective measures.", "cmt_tr": "", "cmt_en": ""}], "answer": 1}, {"q_tr": "Baş denetim yöneticisi (CAE), iç denetçilerin bir otomobil üretim tesisinde yerinde incelemeler yapmalarına yardımcı olmak için yüz yüze bir grup eğitimi planlamıştı. Bu eğitim, denetçilerin kuruluşun otomobil üretimini daha iyi anlamalarını sağlayacaktı. Ancak, küresel bir sağlık krizi, tesiste yüz yüze teması yasaklayarak eğitimi etkiledi. CAE, denetçilere kuruluşun üretim sürecini daha iyi anlamaları için aşağıdakilerden hangisini kullanabilir?", "q_en": "The chief audit executive (CAE) planned an in-person group training to help internal auditors perform onsite inspections of an automobile manufacturing facility. The training would have allowed the auditors to better understand the production of the organization's automobiles. However, a global health crisis has impacted the training by prohibiting in-person contact at the facility. Which of the following could the CAE use to provide auditors with a better understanding of the organization s production process?", "options": [{"tr": "Üretim süreçlerinin denetimine yönelik genel, web tabanlı bir eğitim.", "en": "A general web-based training on auditing manufacturing processes.", "cmt_tr": "", "cmt_en": ""}, {"tr": "Sektörün üretim uygulamalarına yönelik kendi kendine öğrenme kursları", "en": "Self-study courses on the industry's production practices", "cmt_tr": "", "cmt_en": ""}, {"tr": "Üretim yöntemlerini ele alan sektör yayınları.", "en": "Industry publications that discuss production methods", "cmt_tr": "", "cmt_en": ""}, {"tr": "Otomobil üretimini açıklayan yönetimle yapılan sanal bir toplantı.", "en": "A virtual meeting with management that explains the production of automobiles", "cmt_tr": "Düzgün cavab.", "cmt_en": "Correct answer."}], "answer": 3}, {"q_tr": "Standartlara göre, aşağıdakilerden hangisi bir iç denetçinin yetkinliğini gösterir?", "q_en": "According to the Standards, which of the following demonstrates the proficiency of an internal auditor?", "options": [{"tr": "Her iç denetçinin, sahtekarlık alanında bir veya daha fazla sertifikaya sahip olması ve sahtekarlık tespiti ve soruşturmasıyla ilgili sürekli mesleki gelişim faaliyetlerine katılması gerekmektedir.", "en": "Each internal auditor must hold one or more
