"cmt_en": ""}, {"tr": "Ulaştırma departmanının bütçesi, organizasyonun toplam bütçesi açısından önemsizdir.", "en": "The transportation department's budget is immaterial to the organization's total budget.", "cmt_tr": "İç denetim görevleri; parasal önemlilik dahil çeşitli risk değerlendirme unsurlarına dayanarak planlanır. Internal audit engagements are scheduled based on a risk assessment, of which monetary materiality is only one element.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi iç denetim tüzüğüne dahil edilmesi uygun değildir?", "q_en": "Which of the following is not appropriate for inclusion in the internal audit charter?", "answer": 3, "options": [{"tr": "Baş denetim yöneticisinin yönetim kuruluyla fonksiyonel raporlama ilişkisinin niteliği.", "en": "The nature of the chief audit executive's functional reporting relationship with the board.", "cmt_tr": "CAE'nin yönetim kuruluyla fonksiyonel raporlama ilişkisinin niteliği tüzüğe dahil edilmesi gereken unsurlardan biridir. The nature of the CAE's functional reporting relationship with the board is one of the elements to be included in the charter.", "cmt_en": ""}, {"tr": "İç denetimin kayıtlara, personele ve fiziksel mülklere erişiminin yetkilendirilmesi.", "en": "Authorization of internal audit access to records, personnel, and physical properties.", "cmt_tr": "İç denetimin kayıtlara, personele ve fiziksel mülklere erişiminin yetkilendirilmesi tüzüğe dahil edilmesi gereken unsurlardan biridir. Authorization of internal audit access to records, personnel, and physical properties is one of the elements to be included.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonlarının kapsamının tanımlanması.", "en": "Definition of the scope of internal audit functions.", "cmt_tr": "İç denetim fonksiyonlarının kapsamının tanımlanması tüzüğe dahil edilmesi gereken unsurlardan biridir. Definition of the scope of internal audit functions is one of the elements to be included.", "cmt_en": ""}, {"tr": "Yönetim kurulunun tüzüğü onaylamak için yetkilendirilmesi.", "en": "Authorization of the board to approve the charter.", "cmt_tr": "Tüzüğü onaylama yetkisi yönetim kuruluna doğal olarak aittir; bu yetkinin tüzükte yetkilendirilmesine gerek yoktur. The board has the power to approve the charter inherently; it does not need to be authorized in the charter itself.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi iç denetim fonksiyonunun tüzüğüne dahil edilmesi gereken bir yetki unsurudur?", "q_en": "Which of the following is an element of authority that should be included in the internal audit function's charter?", "answer": 3, "options": [{"tr": "Bağımsız denetçilerin görev kayıtlarına erişim.", "en": "Access to the external auditors' engagement records.", "cmt_tr": "Tüzüğe yalnızca organizasyonun iç kayıtlarına erişim dahildir; bağımsız denetçilerin kayıtlarına değil. Only access to the organization's internal records is included in the charter; not access to external auditors' records.", "cmt_en": ""}, {"tr": "Denetim komitesine yapılması gereken açıklama türlerinin örnekleri.", "en": "Samples of the types of disclosures that should be made to the audit committee.", "cmt_tr": "Denetim komitesine yapılması gereken açıklama türlerinin örnekleri, tüzüğe dahil edilecek bir yetki unsuru değildir. Samples of the types of disclosures to be made to the audit committee are not an element of authority to be included in the charter.", "cmt_en": ""}, {"tr": "Görevlerin yürütüleceği organizasyonel birimlerin tanımlanması.", "en": "Identification of the organizational units in which engagements are to be performed.", "cmt_tr": "İç denetim tüzüğü, denetime tabi organizasyonel birimleri tanımlamaz. The internal audit charter does not identify the organizational units subject to audit.", "cmt_en": ""}, {"tr": "Görevlerin yürütülmesiyle ilgili kayıtlara, personele ve fiziksel mülklere erişim.", "en": "Access to records, personnel, and physical properties relevant to the performance of engagements.", "cmt_tr": "Görevlerin yürütülmesiyle ilgili verilere, kayıtlara, bilgilere, personele ve fiziksel mülklere sınırsız erişim tüzüğe dahil edilmelidir. Unrestricted access to data, records, information, personnel, and physical properties necessary to fulfill the mandate should be included in the charter.", "cmt_en": ""}]}, {"q_tr": "Yanlış anlaşılmaları önlemek için, görev müşterileri şunları yapmalıdır:", "q_en": "To prevent misunderstandings, engagement clients must", "answer": 2, "options": [{"tr": "Her görev için iç denetçilerin ihtiyaç duyduğu yetki düzeyini tanımlamak.", "en": "Define the level of authority required by internal auditors for each engagement.", "cmt_tr": "Her görev için gereken yetki düzeyi, CAE, üst yönetim ve yönetim kurulu tarafından karşılıklı olarak kararlaştırılır ve tüzükte tanımlanır; görev müşterisi tarafından değil. The level of authority for each engagement is mutually agreed upon by the CAE, senior management, and the board; it is not defined by the engagement client.", "cmt_en": ""}, {"tr": "Görevle ilgili kayıtlara, personele ve fiziksel mülklere erişimi yetkilendirmek.", "en": "Authorize access to records, personnel, and physical properties relevant to the engagement.", "cmt_tr": "Görev müşterileri iç denetçinin faaliyetini yetkilendirmez; yönetim kurulu erişimi tüzük aracılığıyla yetkilendirir. Engagement clients do not authorize the internal auditor's activity; the board authorizes access through the charter.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun amacı, yetkisi ve sorumluluğu hakkında bilgilendirilmek.", "en": "Be informed of the internal audit function's purpose, authority, and responsibility.", "cmt_tr": "Yanlış anlaşılmaları önlemek için görev müşterileri, iç denetim fonksiyonunun amacı, yetkisi ve sorumluluğu hakkında bilgilendirilmelidir. To prevent misunderstandings, engagement clients must be informed of the internal audit function's purpose, authority, and responsibility.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun organizasyon içindeki konumunu belirlemek.", "en": "Establish the internal audit function's position within the organization.", "cmt_tr": "İç denetim tüzüğü, organizasyon içindeki konumunu belirler; görev müşterisi değil. The internal audit charter, not the engagement client, establishes the internal audit function's position within the organization.", "cmt_en": ""}]}, {"q_tr": "İç denetim tüzüğü aşağıdakilerin hepsini içerir, ancak şunu içermez:", "q_en": "The internal audit charter includes all of the following except", "answer": 1, "options": [{"tr": "İç denetim fonksiyonunun amacının, yetkisinin ve sorumluluğunun resmi tanımı.", "en": "A formal definition of the purpose, authority, and responsibility of the internal audit function.", "cmt_tr": "Tüzük, iç denetim fonksiyonunun amacının, yetkisinin ve sorumluluğunun resmi tanımını içerir. The internal audit charter includes a formal definition of the purpose, authority, and responsibility of the internal audit function.", "cmt_en": ""}, {"tr": "Organizasyonun temel değerleri, misyon ve vizyon beyanları.", "en": "The organization's core values, mission, and vision statements.", "cmt_tr": "Organizasyonun temel değerleri, misyon ve vizyon beyanları tüzüğe dahil edilmez. The organization's core values, mission, and vision statements are not included in the internal audit charter.", "cmt_en": ""}, {"tr": "Baş denetim yöneticisinin yönetim kuruluyla ilişkisinin niteliği.", "en": "The nature of the chief audit executive's relationship with the board.", "cmt_tr": "CAE'nin yönetim kuruluyla fonksiyonel raporlama ilişkisinin niteliği tüzükte tanımlanır. The nature of the CAE's functional reporting relationship with the board is defined in the charter.", "cmt_en": ""}, {"tr": "İç denetçinin güvence ve danışmanlık hizmetleri sağlama sorumluluğu.", "en": "The internal auditor's responsibility to provide assurance and advisory services.", "cmt_tr": "İç denetim fonksiyonunun güvence ve danışmanlık hizmetleri sağlama sorumluluğu tüzükte tanımlanır. The internal audit function's responsibility to provide assurance and advisory services is defined in the charter.", "cmt_en": ""}]}, {"q_tr": "Yönetim kurulu tarafından onaylanan ve iç denetim fonksiyonunun amacını, yetkisini ve sorumluluğunu tanımlayan resmi bir belge (tüzük), fonksiyonun şunu güçlendirir:", "q_en": "A formal document (charter) approved by the board that defines the internal audit function's purpose, authority, and responsibility enhances its", "answer": 3, "options": [{"tr": "Mesleki özen göstermesi.", "en": "Exercise of due professional care.", "cmt_tr": "Mesleki özen, gerçekleştirilen çalışmanın bir özelliğidir; tüzüğün güçlendirdiği bir unsur değildir. Due professional care is an attribute of work performed, not something enhanced by the charter.", "cmt_en": ""}, {"tr": "Yetkinlik.", "en": "Proficiency.", "cmt_tr": "Yetkinlik; bilgi, beceri ve diğer yeterliliklere sahip olmaktan kaynaklanır; tüzükten değil. Proficiency results from possessing the knowledge, skills, and other competencies; not from the charter.", "cmt_en": ""}, {"tr": "Yönetimle ilişki.", "en": "Relationship with management.", "cmt_tr": "İç denetim fonksiyonunun yönetimle ilişkisi profesyonelliğin bir işlevidir; tüzük çalışma ilişkisini değil, bağımsızlığı güçlendirir. The relationship with management is a function of professionalism; the charter enhances independence, not a working relationship.", "cmt_en": ""}, {"tr": "Bağımsızlık.", "en": "Independence.", "cmt_tr": "Tüzük, CAE'nin yönetim kuruluna doğrudan ve sınırsız erişimini güvence altına alarak iç denetim fonksiyonunun bağımsızlığını güçlendirir. The charter enhances the independence of the internal audit function by securing the CAE's direct and unrestricted access to senior management and the board.", "cmt_en": ""}]}], "SU3 - Independence": [{"q_tr": "CAE'nin en uygun idari raporlama hattı şuradır:", "q_en": "The optimal administrative reporting line of the CAE is to", "answer": 3, "options": [{"tr": "Denetim komitesi.", "en": "The audit committee.", "cmt_tr": "Fonksiyonel raporlama yönetim kuruluna yapılır; denetim komitesine değil (denetim komitesi yönetim kurulunun bir alt kümesidir). Functional reporting is to the board; the audit committee is a subset of the board.", "cmt_en": ""}, {"tr": "Hat yönetimi.", "en": "Line management.", "cmt_tr": "İdari raporlama tercihen CEO'ya yapılır; hat yönetimine değil. Administrative reporting is preferably to the CEO, not to line management.", "cmt_en": ""}, {"tr": "Yönetim kurulu.", "en": "Board of directors.", "cmt_tr": "Yönetim kuruluna doğrudan iletişim ve etkileşim sağlanmalıdır; fonksiyonel raporlama yönetim kuruluna yapılır. Direct communication and interaction with the board must be maintained; functional reporting is to the board.", "cmt_en": ""}, {"tr": "CEO veya eşdeğeri.", "en": "CEO or equivalent.", "cmt_tr": "CAE'nin açıkça kıdemli bir konumda olması ve görevlerini engelsiz yürütebilmesi için idari raporlama CEO'ya veya eşdeğerine yapılmalıdır. To be clearly in a senior position and perform duties unimpeded, administrative reporting should be to the CEO or equivalent.", "cmt_en": ""}]}, {"q_tr": "İç denetçilerin tarafsız çalışma yapabilme yeteneğini tehdit eden koşullardan özgür olmak şudur:", "q_en": "Freedom from conditions that threaten internal auditors' ability to do unbiased work is", "answer": 2, "options": [{"tr": "Kontrol.", "en": "Control.", "cmt_tr": "Kontrol; yönetim, yönetim kurulu veya diğer tarafların riski yönetmek için aldığı herhangi bir eylemdir. Control is any action taken by management, the board, or other parties to manage risk.", "cmt_en": ""}, {"tr": "Uyum.", "en": "Compliance.", "cmt_tr": "Uyum; yasa, yönetmelik, sözleşme, politika ve prosedürlere bağlılıktır. Compliance is adherence to laws, regulations, contracts, policies, procedures, and other requirements.", "cmt_en": ""}, {"tr": "Bağımsızlık.", "en": "Independence.", "cmt_tr": "Bağımsızlık; iç denetim sorumluluklarını tarafsız bir şekilde yerine getirme yeteneğini tehdit eden koşullardan özgür olmaktır. Independence is the freedom from conditions that may impair the ability to carry out internal audit responsibilities in an unbiased manner.", "cmt_en": ""}, {"tr": "Çıkar çatışmalarından kaçınma.", "en": "Avoidance of conflicts of interest.", "cmt_tr": "Çıkar çatışmaları dışında da önyargı veya önyargı görüntüsü yaratan koşullar mevcut olabilir. Conditions other than conflicts of interest may also create bias or the appearance of bias.", "cmt_en": ""}]}, {"q_tr": "Bağımsızlık, iç denetçilerin tarafsız ve önyargısız kararlar vermesini sağlar. Bağımsızlığı sağlamanın en iyi yolu şudur:", "q_en": "Independence permits internal auditors to render impartial and unbiased judgments. The best way to achieve independence is through", "answer": 1, "options": [{"tr": "Bireysel bilgi ve beceriler.", "en": "Individual knowledge and skills.", "cmt_tr": "Bireysel bilgi ve beceriler, bireysel denetçilerin mesleki yetkinliğe ulaşmasını sağlar; bağımsızlık değil. Individual knowledge and skills allow individual auditors to achieve professional proficiency, not independence.", "cmt_en": ""}, {"tr": "Çift raporlama ilişkisi.", "en": "A dual-reporting relationship.", "cmt_tr": "Çift raporlama ilişkisi; CAE'nin hem üst yönetime hem de yönetim kuruluna doğrudan ve sınırsız erişim sağlamasına olanak tanır. Bağımsızlığı sağlamanın en iyi yoludur. A dual-reporting relationship allows the CAE direct and unrestricted access to both senior management and the board. It is the best way to achieve independence.", "cmt_en": ""}, {"tr": "Organizasyon içinde denetim.", "en": "Supervision within the organization.", "cmt_tr": "Denetim; görev hedeflerine ulaşılmasını, kalitenin güvence altına alınmasını ve personelin geliştirilmesini sağlar; bağımsızlık değil. Supervision ensures engagement objectives are achieved, quality is assured, and staff is developed; not independence.", "cmt_en": ""}, {"tr": "Organizasyonel bilgi ve beceriler.", "en": "Organizational knowledge and skills.", "cmt_tr": "Organizasyonel bilgi ve beceriler, iç denetim fonksiyonunun kolektif olarak mesleki yetkinliğe ulaşmasını sağlar; bağımsızlık değil. Organizational knowledge and skills allow the internal audit function collectively to achieve professional proficiency, not independence.", "cmt_en": ""}]}, {"q_tr": "Gerekli bağımsızlığı sağlamak için CAE fonksiyonel olarak kime raporlamalıdır?", "q_en": "To achieve necessary independence, the CAE should report functionally to whom?", "answer": 3, "options": [{"tr": "Üst yönetim.", "en": "Senior management.", "cmt_tr": "Organizasyonel bağımsızlık; CAE'nin fonksiyonel olarak yönetim kuruluna, idari olarak CEO'ya raporlamasıyla kolaylaştırılır. Organizational independence is facilitated when the CAE reports functionally to the board and administratively to the CEO.", "cmt_en": ""}, {"tr": "Hissedarlar.", "en": "Shareholders.", "cmt_tr": "CAE, yönetim kuruluna (denetim komitesine) raporlamalıdır; hissedarlara değil. The CAE should report to the audit committee (i.e., the board), not to shareholders.", "cmt_en": ""}, {"tr": "Genel müdür.", "en": "Chief executive officer.", "cmt_tr": "CAE, idari amaçlar için CEO'ya raporlamalıdır; fonksiyonel olarak değil. The CAE should report to the CEO for administrative purposes, not functionally.", "cmt_en": ""}, {"tr": "Yönetim kurulu.", "en": "The board.", "cmt_tr": "Organizasyonel bağımsızlık, CAE'nin fonksiyonel olarak yönetim kuruluna raporlamasıyla etkin şekilde sağlanır. Organizational independence is effectively achieved when the CAE reports functionally to the board.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun etkin organizasyonel bağımsızlığını sağlamak için CAE büyük ihtimalle şunu yapmalıdır:", "q_en": "To achieve the effective organizational independence of the internal audit function, the CAE most likely should", "answer": 1, "options": [{"tr": "İç denetim bütçesini üst düzey bir yöneticiye sunmak.", "en": "Submit the internal audit budget to a senior manager.", "cmt_tr": "Etkin organizasyonel bağımsızlık için iç denetim bütçesini yönetim kurulu onaylamalıdır; üst düzey bir yönetici değil. For effective organizational independence, the board should approve the internal audit budget and resource plan, not a senior manager.", "cmt_en": ""}, {"tr": "Yönetim kuruluyla iç denetim fonksiyonunun performansı hakkında iletişim kurmak.", "en": "Communicate with the board about the internal audit function's performance.", "cmt_tr": "Yönetim kuruluna fonksiyonel raporlamanın bir örneği olarak CAE, iç denetim fonksiyonunun performansı hakkında yönetim kuruluyla iletişim kurar. As an example of functional reporting to the board, the CAE communicates with the board about the internal audit function's performance.", "cmt_en": ""}, {"tr": "Kaynak kısıtlamaları hakkında yönetim kurulunu sorgulamak.", "en": "Inquire of the board about resource limitations.", "cmt_tr": "Uygunsuz kaynak kısıtlamaları hakkında yönetimi ve CAE'yi yönetim kurulu sorgular; CAE yönetim kurulunu sorgulamaz. The board should inquire of management and the CAE about inappropriate resource limitations, not the other way around.", "cmt_en": ""}, {"tr": "CEO tarafından atanmak veya görevden alınmak.", "en": "Be appointed or removed by the CEO.", "cmt_tr": "CAE'nin atanması veya görevden alınmasına ilişkin kararları yönetim kurulu onaylamalıdır; CEO değil. The board should approve decisions about the appointment or removal of the CAE, not the CEO.", "cmt_en": ""}]}, {"q_tr": "Aşağıda listelenen kişilerden veya kişi kombinasyonlarından hangisinin desteği, iç denetim fonksiyonunun başarısı için en önemlidir?", "q_en": "Support from which persons or combination of persons listed below is most important to the success of the internal audit function?", "answer": 2, "options": [{"tr": "Genel müdür ve mali işler direktörü.", "en": "The chief executive officer and chief financial officer.", "cmt_tr": "Hem CEO hem CFO'nun değil; yönetimin ve yönetim kurulunun desteği çatışmalar ortaya çıktığında kritik öneme sahiptir. Not just the CEO and CFO, but the support of management and the board is crucial when conflicts arise.", "cmt_en": ""}, {"tr": "Genel müdür.", "en": "The chief executive officer.", "cmt_tr": "Yalnızca CEO'nun değil; yönetimin ve yönetim kurulunun desteği çatışmalar ortaya çıktığında kritik öneme sahiptir. Not just the CEO, but the support of management and the board is crucial when conflicts arise.", "cmt_en": ""}, {"tr": "Yönetim ve yönetim kurulu.", "en": "Management and the board.", "cmt_tr": "Yönetim ve yönetim kurulunun desteği, iç denetim fonksiyonu ile denetlenen departman arasında kaçınılmaz çatışmalar ortaya çıktığında kritik öneme sahiptir. The support of management and the board is crucial when inevitable conflicts arise between the internal audit function and the department or function under review.", "cmt_en": ""}, {"tr": "Denetim komitesi.", "en": "The audit committee.", "cmt_tr": "Yalnızca denetim komitesinin değil; yönetimin ve yönetim kurulunun desteği çatışmalar ortaya çıktığında kritik öneme sahiptir. Not just the audit committee, but the support of management and the board is crucial when conflicts arise.", "cmt_en": ""}]}, {"q_tr": "İç denetimin organizasyonel yerleşimini belirlemek için CAE şunlarla çalışır:", "q_en": "To determine the organizational placement of internal audit, the CAE works with:", "answer": 2, "options": [{"tr": "Yalnızca yönetim kurulu.", "en": "The board only.", "cmt_tr": "CAE aynı zamanda üst yönetimle de çalışmalıdır; yalnızca yönetim kuruluyla değil. The CAE must also work with senior management, not only with the board.", "cmt_en": ""}, {"tr": "Yalnızca üst yönetim.", "en": "Senior management only.", "cmt_tr": "CAE aynı zamanda yönetim kuruluyla da çalışmalıdır; yalnızca üst yönetimle değil. The CAE must also work with the board, not only with senior management.", "cmt_en": ""}, {"tr": "Yönetim kurulu ve üst yönetim.", "en": "The board and senior management.", "cmt_tr": "CAE, iç denetimin organizasyonel yerleşimini belirlemek için yönetim kurulu ve üst yönetimle birlikte çalışır. The CAE works with the board and senior management to determine the organizational placement of internal audit.", "cmt_en": ""}, {"tr": "Yerleşimi bağımsız olarak belirleme tam takdir yetkisine sahiptir.", "en": "Has full discretion to independently determine placement.", "cmt_tr": "CAE, organizasyonel bağımsızlığı ve yerleşimi tek başına belirleyemez. The CAE does not have discretion to independently determine the organizational placement of the internal audit function.", "cmt_en": ""}]}, {"q_tr": "Yönetim kurulunun fonksiyonel raporlama sorumlulukları şunları içerir:", "q_en": "The board's functional reporting responsibilities include:", "answer": 1, "options": [{"tr": "Yalnızca iç iletişim ve bilgi akışları.", "en": "Internal communication and information flows only.", "cmt_tr": "İç iletişim ve bilgi akışları idari raporlama konularıdır; fonksiyonel raporlama değil. Internal communication and information flows are administrative reporting items, not functional reporting.", "cmt_en": ""}, {"tr": "İç denetim risk değerlendirmesinin onaylanması ve CAE atama/görevden almanın yetkilendirilmesi.", "en": "Approval of the internal audit risk assessment and authorizing CAE appointment/removal.", "cmt_tr": "Yönetim kurulu; iç denetim risk değerlendirmesinin ve ilgili denetim planının onaylanması ile CAE'nin atanması ve görevden alınmasının yetkilendirilmesinden sorumludur. The board is responsible for approving the internal audit risk assessment and plan, and authorizing the appointment and removal of the CAE.", "cmt_en": ""}, {"tr": "İç iletişim, bilgi akışları ve yalnızca CAE atamasının yetkilendirilmesi.", "en": "Internal communication, information flows, and authorizing CAE appointment only.", "cmt_tr": "İç iletişim ve bilgi akışları idari raporlama konularıdır. Fonksiyonel raporlama ayrıca CAE'nin atanması ve görevden alınmasının onaylanmasını da içerir. Internal communication and information flows are administrative. Functional reporting also involves approving appointment and removal of the CAE.", "cmt_en": ""}, {"tr": "İç iletişim akışları dahil yukarıdakilerin tümü.", "en": "All of the above including internal communication flows.", "cmt_tr": "İç iletişim ve bilgi akışları idari raporlama konularıdır. Internal communication and information flows are administrative reporting items.", "cmt_en": ""}]}, {"q_tr": "Aşağıdaki olgulardan hangisi tek başına iç denetim fonksiyonunun bağımsızlık eksikliğine katkıda bulunabilir? (1) CEO, yeni denetçiyi organizasyonun çıkarları doğrultusunda hareket etmemekle suçladı. (2) Denetim komitesi üyelerinin çoğunluğu organizasyon içinden geliyor. (3) Tüzük yönetim kurulu tarafından onaylanmadı.", "q_en": "Which of the following facts, by themselves, could contribute to a lack of independence of the internal audit function? (1) CEO accused new auditor of not operating in best interests. (2) Majority of audit committee members come from within the organization. (3) Charter has not been approved by the board.", "answer": 3, "options": [{"tr": "Yalnızca 1.", "en": "1 only.", "cmt_tr": "CEO'nun tutumu, çoğunluk iç üyeler ve onaylanmamış tüzük bağımsızlık eksikliğine katkıda bulunabilir. All three — CEO's accusation, majority inside members, and unapproved charter — can contribute to lack of independence.", "cmt_en": ""}, {"tr": "Yalnızca 2.", "en": "2 only.", "cmt_tr": "Denetim komitesinin çoğunlukla iç üyelerden oluşması ve tüzüğün onaylanmaması da bağımsızlık eksikliğine katkıda bulunabilir. The majority of inside audit committee members and the unapproved charter can also contribute to lack of independence.", "cmt_en": ""}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "CEO'nun desteğinin olmaması da iç denetim fonksiyonunun konumunu zayıflatır. Lack of CEO support also weakens the internal audit function's position.", "cmt_en": ""}, {"tr": "1, 2 ve 3'ün tümü.", "en": "1, 2, and 3.", "cmt_tr": "Üç faktörün tümü — CEO'nun tutumu, çoğunluk iç üyeler ve onaylanmamış tüzük — bağımsızlık eksikliğine katkıda bulunabilir. All three factors can contribute to a lack of independence of the internal audit function.", "cmt_en": ""}]}, {"q_tr": "Üst yönetim ile yönetim kurulu arasındaki çatışmanın görünür nedeni olmaktan kaçınmak için CAE şunu yapmalıdır:", "q_en": "To avoid being the apparent cause of conflict between senior management and the board, the CAE should", "answer": 3, "options": [{"tr": "Tüm görev sonuçlarını hem üst yönetime hem de yönetim kuruluna bildirmek.", "en": "Communicate all engagement results to both senior management and the board.", "cmt_tr": "Tüm görev sonuçlarının hem üst yönetime hem de yönetim kuruluna iletilmesi gereksizdir ve verimsizdir. Receipt of all engagement results by both senior management and the board is unnecessary and inefficient.", "cmt_en": ""}, {"tr": "Bağımsızlığı organizasyonel konum aracılığıyla güçlendirmek.", "en": "Strengthen the independence through organizational position.", "cmt_tr": "Organizasyonel konum bağımsızlığa yardımcı olur ancak tek başına çatışmayı önlemek için yeterli değildir. Organizational position helps achieve independence but is not, by itself, enough to avoid conflict.", "cmt_en": ""}, {"tr": "Üst yönetime verilen tüm raporları önce yönetim kuruluyla görüşmek.", "en": "Discuss all reports to senior management with the board first.", "cmt_tr": "Yönetim kurulunun temelden operasyonel değil, denetim rolü vardır. The board essentially has an oversight rather than an operational role.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun yönetim kuruluyla ilişkilerini içeren politikalar için yönetim kurulunun onayını talep etmek.", "en": "Request board approval of policies that include internal audit function relationships with the board.", "cmt_tr": "Gerekli bağımsızlık derecesini sağlamak için CAE'nin üst yönetime ve yönetim kuruluna doğrudan ve sınırsız erişimi olmalıdır; bu çift raporlama ilişkisiyle sağlanabilir. To achieve the necessary degree of independence, the CAE must have direct and unrestricted access to senior management and the board; this can be achieved through a dual-reporting relationship.", "cmt_en": ""}]}, {"q_tr": "Muhasebe müdürü, CAE'nin bağımsız denetçilere raporlayacağını, ancak önemli herhangi bir şeyi bildirmek için muhasebe müdürüne serbest erişimi olacağını söyledi. İç denetim fonksiyonu şu olacaktır:", "q_en": "The controller advised applicants that the CAE will be reporting to the external auditors, but have free access to the controller to report anything important. The internal audit function will", "answer": 1, "options": [{"tr": "CAE'nin yönetim kuruluna doğrudan erişimi olduğu için bağımsız olacaktır.", "en": "Be independent because the CAE has direct access to the board.", "cmt_tr": "Bu düzenlemede iç denetim fonksiyonunun yönetim kuruluna doğrudan erişimi yoktur; erişim muhasebe müdürü aracılığıyla dolaylıdır. Under this arrangement, internal audit does not have direct access to the board; access is indirect via the controller.", "cmt_en": ""}, {"tr": "CAE bağımsız denetçilere raporladığı için bağımsız olmayacaktır.", "en": "Not be independent because the CAE reports to the external auditors.", "cmt_tr": "CAE'nin üst yönetime ve yönetim kuruluna doğrudan ve sınırsız erişimi olmalıdır. CAE'nin bağımsız denetçilere raporlaması bu bağımsızlığı zedeler. The CAE must have direct and unrestricted access to senior management and the board. Reporting to external auditors impairs this independence.", "cmt_en": ""}, {"tr": "Muhasebe müdürünün iç denetçilerle deneyimi olmadığı için bağımsız olmayacaktır.", "en": "Not be independent because the controller has no experience with internal auditors.", "cmt_tr": "Muhasebe müdürünün iç denetçilerle deneyimi olup olmaması iç denetim fonksiyonunun bağımsızlığını etkilemez. Whether the controller has experience with internal auditors does not affect the internal audit function's independence.", "cmt_en": ""}, {"tr": "Organizasyon başvuranların sertifikalı iç denetçi olması gerektiğini belirtmediği için bağımsız olmayacaktır.", "en": "Not be independent because the organization did not specify that applicants must be certified internal auditors.", "cmt_tr": "CIA unvanı arzu edilmekle birlikte, bir kişinin iç denetçi olması için zorunlu değildir. Although the CIA designation is desirable, it is not mandatory for a person to become an internal auditor.", "cmt_en": ""}]}, {"q_tr": "CAE'nin doğrudan denetim komitesine raporlayacağı durumda, tartışılan unsurlardan hangisi yeni CAE'nin bağımsızlığına en çok katkıda bulunur?", "q_en": "Which of the items discussed will contribute the most to the new CAE's independence when the CAE will report directly to the audit committee?", "answer": 2, "options": [{"tr": "İç denetim fonksiyonunun kurulması ana sözleşmede belgelenmiştir.", "en": "The establishment of the internal audit function is documented in the bylaws.", "cmt_tr": "Ana sözleşmede belgeleme bağımsızlığı teşvik etmek için çok az şey yapar. Documentation in the bylaws does little to promote independence.", "cmt_en": ""}, {"tr": "X Ülkesi iç denetim gerekliliklerini yasalaştırmıştır.", "en": "Country X has legislated internal auditing requirements.", "cmt_tr": "X Ülkesi'ndeki yasal iç denetim gereksinimleri bağımsızlığı teşvik etmez. Legislated internal audit requirements in Country X do not promote independence.", "cmt_en": ""}, {"tr": "CAE denetim komitesine raporlayacaktır.", "en": "The CAE will report to the audit committee.", "cmt_tr": "CAE'nin fonksiyonel olarak yönetim kuruluna raporlamasıyla bağımsızlık etkin şekilde sağlanır. Denetim komitesi yönetim kurulunun bir alt kümesidir. Independence is effectively achieved when the CAE reports functionally to the board. The audit committee is a subset of the board.", "cmt_en": ""}, {"tr": "CAE sertifikalı bir iç denetçi olacaktır.", "en": "The CAE is to be a certified internal auditor.", "cmt_tr": "Bağımsızlık; üst yönetim ve yönetim kurulunun desteğini gerektirir; yalnızca sertifika yeterli değildir. Independence requires support from senior management and the board; certification alone is not sufficient.", "cmt_en": ""}]}, {"q_tr": "Hangi raporlama sorumluluğunun iç denetim fonksiyonunun bağımsızlığını tehdit etme ihtimali en yüksektir? Şuna raporlamak:", "q_en": "Which reporting responsibility is most likely to threaten the internal audit function's independence? Reporting to the", "answer": 1, "options": [{"tr": "Başkan.", "en": "President.", "cmt_tr": "Başkana raporlamak, organizasyondaki konumu güçlendirerek iç denetim fonksiyonunun bağımsızlığını korumaya yardımcı olur. Being responsible to the president helps preserve the internal audit function's independence by enhancing its position.", "cmt_en": ""}, {"tr": "İcra başkan yardımcısı.", "en": "Executive vice president.", "cmt_tr": "İcra başkan yardımcısına raporlamak, iç denetim fonksiyonunun etkisini ve bağımsızlığını sınırlandırır; daha yüksek bir seviyeye raporlamak bağımsızlığı artırır. Reporting to the executive vice president limits the influence and independence; reporting to a higher level enhances independence.", "cmt_en": ""}, {"tr": "Genel müdür.", "en": "Chief Executive Officer.", "cmt_tr": "CEO, CFO'dan daha yüksek bir rütbeye sahiptir; daha yüksek seviyeye raporlamak bağımsızlığı artırır. The CEO is higher ranking than the CFO; reporting to a higher level enhances independence.", "cmt_en": ""}, {"tr": "Denetim komitesi.", "en": "Audit committee.", "cmt_tr": "Denetim komitesi yönetim kurulunun bir alt kümesi olduğu için, iç denetim fonksiyonunun denetim komitesine raporlaması bağımsızlığı güçlendirir. Because the audit committee is a subset of the board, reporting to the audit committee enhances independence.", "cmt_en": ""}]}, {"q_tr": "Bağımsızlığı değerlendirirken, hangi faktörün etkisi en azdır?", "q_en": "When evaluating independence, which factor has the least amount of influence?", "answer": 1, "options": [{"tr": "İç denetçi görevlendirmelerinde kullanılan kriterler.", "en": "Criteria used in making internal auditors' assignments.", "cmt_tr": "Bireysel iç denetçilerin nasıl görevlendirildiği bağımsızlıkla ilgilidir; kişisel ilişkiler ve deneyim bağımsızlığı etkiler. How individual auditors are assigned relates to independence; personal relationships and work experience affect independence.", "cmt_en": ""}, {"tr": "İç denetçinin iletişim becerileri konusundaki eğitiminin kapsamı.", "en": "The extent of internal auditor training in communications skills.", "cmt_tr": "İletişim becerileri eğitimi, görevleri yürütmek için gereken bilgi ve becerilerle ilgilidir; bağımsızlıkla değil. Training in communication relates to knowledge, skills, and competencies needed to perform engagements, not to independence.", "cmt_en": ""}, {"tr": "Görev kayıtları ile görev iletişimleri arasındaki ilişki.", "en": "Relationship between engagement records and engagement communications.", "cmt_tr": "Görev kayıtlarında bulunan ancak görev iletişimlerinde yer almayan önemli gözlemler bağımsızlık sorununa yol açar. Significant observations found in engagement records but omitted from communications create an independence issue.", "cmt_en": ""}, {"tr": "Tarafsız ve önyargısız kararlar.", "en": "Impartial and unbiased judgments.", "cmt_tr": "Tarafsız ve önyargısız karar verme, bağımsızlığın bir yönüdür. Unbiased judgment is an aspect of independence.", "cmt_en": ""}]}, {"q_tr": "Hangi eylem fonksiyonel raporlamayla tutarsızdır?", "q_en": "Which action is not consistent with functional reporting?", "answer": 1, "options": [{"tr": "CAE fonksiyonel olarak yönetim kuruluna raporladığında organizasyonel bağımsızlık etkin şekilde sağlanır.", "en": "Organizational independence is effectively achieved when the CAE reports functionally to the board.", "cmt_tr": "CAE'nin fonksiyonel olarak yönetim kuruluna raporlaması, iç denetim fonksiyonunun bağımsızlığını kolaylaştırır. Functional reporting to the board facilitates the independence of the internal audit function.", "cmt_en": ""}, {"tr": "CAE, iç denetim fonksiyonunun bağımsızlığını pekiştirmek için yönetimin de katıldığı yönetim kurulu toplantısına katılmalıdır.", "en": "The CAE should meet with the board, with management present, to reinforce the independence of the internal audit function.", "cmt_tr": "CAE ile yönetim kurulu arasındaki özel toplantılar (yönetim olmaksızın) fonksiyonel raporlama ilişkisinin temel bir parçasıdır. Yönetimin katıldığı toplantılar bu ilişkiyle tutarsızdır. Private meetings between the CAE and the board without management are essential. Meetings with management present are inconsistent with this relationship.", "cmt_en": ""}, {"tr": "Yönetim kurulu, iç denetim risk değerlendirmesini onaylamak için nihai yetkiye sahip olmalıdır.", "en": "The board should have the final authority to approve the internal audit risk assessment.", "cmt_tr": "Yönetim kurulu, iç denetim risk değerlendirmesini ve ilgili denetim planını onaylar. The board approves the internal audit risk assessment and the related audit plan.", "cmt_en": ""}, {"tr": "Yönetim kurulu, CAE'nin atanması veya görevden alınmasını onaylamalıdır.", "en": "The board should approve the CAE's appointment or removal.", "cmt_tr": "Yönetim kurulu, CAE'nin atanması veya görevden alınmasına ilişkin tüm kararları onaylar. The board approves all decisions regarding the appointment or removal of the CAE.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun sorumluluklarını yerine getirmesine en büyük olasılıkla olanak tanıyacak raporlama yapısı şudur: İdari olarak şuna raporlamak:", "q_en": "The reporting structure that is most likely to allow the internal audit function to accomplish its responsibilities is to report administratively to the", "answer": 2, "options": [{"tr": "Yönetim kuruluna ve fonksiyonel olarak genel müdüre.", "en": "Board and functionally to the chief executive officer.", "cmt_tr": "Ters düzenleme uygundur; yönetim kurulu firmanın rutin yönetimiyle ilgilenmez. The reverse arrangement is appropriate; the board is not involved in the routine management of the firm.", "cmt_en": ""}, {"tr": "Muhasebe müdürüne ve fonksiyonel olarak mali işler direktörüne.", "en": "Controller and functionally to the chief financial officer.", "cmt_tr": "Muhasebe müdürüne idari, CFO'ya fonksiyonel raporlama, iç denetim için yetersiz organizasyonel statüye yol açar. Reporting administratively to the controller and functionally to the CFO would result in insufficient organizational status for internal auditing.", "cmt_en": ""}, {"tr": "Genel müdüre ve fonksiyonel olarak yönetim kuruluna.", "en": "Chief executive officer and functionally to the board of directors.", "cmt_tr": "Yönetim kuruluna fonksiyonel, CEO'ya idari raporlama organizasyonel bağımsızlığı kolaylaştırır. Reporting functionally to the board and administratively to the CEO facilitates organizational independence.", "cmt_en": ""}, {"tr": "Genel müdüre ve fonksiyonel olarak bağımsız denetçiye.", "en": "Chief executive officer and functionally to the external auditor.", "cmt_tr": "Bağımsız denetçi organizasyonel hiyerarşinin bir parçası değildir. The external auditor is not part of the organizational hierarchy.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun raporladığı organizasyonel düzey", "q_en": "The organizational level to which the internal audit function reports", "answer": 0, "options": [{"tr": "Fonksiyonun sorumluluklarının yerine getirilmesine izin verecek kadar yeterli olmalıdır.", "en": "Must be sufficient to permit the accomplishment of the function's responsibilities.", "cmt_tr": "CAE'nin sorumluluklarını yerine getirmesine olanak tanıyacak bir seviyeye raporlama yapılmalıdır. The CAE must report to a level that allows the internal audit function to fulfill its responsibilities.", "cmt_en": ""}, {"tr": "Raporlama yalnızca yönetim kuruluna yapıldığında en iyisidir.", "en": "Is best when reporting is only made to the board of directors.", "cmt_tr": "En iyi raporlama ilişkisi çift raporlama ilişkisidir; yalnızca yönetim kuruluna raporlama değil. The best reporting relationship is a dual-reporting relationship, not reporting only to the board.", "cmt_en": ""}, {"tr": "Yalnızca yönetim kurulunun görev çalışma programının, kadro planının ve finansal bütçenin yıllık onayını gerektirir.", "en": "Requires only the board's annual approval of the engagement work schedule, staffing plan, and financial budget.", "cmt_tr": "Bağımsızlık, yalnızca idari konuları değil; çok daha fazlasını kapsayan bir seviyede raporlamayı gerektirir. Independence requires reporting to a level that deals with much more than simple administrative concerns.", "cmt_en": ""}, {"tr": "Tüzük fonksiyonun bağımsızlığını özellikle tanımladığında garantidir.", "en": "Is guaranteed when the charter specifically defines the function's independence.", "cmt_tr": "Tüzükteki bir ifade tek başına bağımsızlığı garanti etmez. A statement in the charter alone does not guarantee independence.", "cmt_en": ""}]}, {"q_tr": "Yönetim kurulunun onaylamaya katılma ihtimali en yüksek olan şey şudur:", "q_en": "The board is most likely to participate in approving", "answer": 3, "options": [{"tr": "Personel terfisi ve maaş artışları.", "en": "Staff promotions and salary increases.", "cmt_tr": "Personel terfisinden organizasyonun CAE'si sorumludur. The organization's CAE is responsible for staff promotions.", "cmt_en": ""}, {"tr": "Görev iletişimi gözlemleri, sonuçları ve önerileri.", "en": "Engagement communication observations, conclusions, and recommendations.", "cmt_tr": "Görev iletişimi gözlemlerini, sonuçlarını ve önerilerini onaylamaktan organizasyonun CAE'si sorumludur. The organization's CAE is responsible for approving engagement communication observations, conclusions, and recommendations.", "cmt_en": ""}, {"tr": "Görev çalışma programları.", "en": "Engagement work programs.", "cmt_tr": "Uygun görev denetimini sağlamak, görev programlarını onaylamak dahil, CAE veya yetkili kişinin sorumluluğundadır. Providing appropriate engagement supervision, including approving engagement programs, is the CAE's or designee's responsibility.", "cmt_en": ""}, {"tr": "Baş denetim yöneticisinin atanması.", "en": "Appointment of the chief audit executive.", "cmt_tr": "Yönetim kuruluna fonksiyonel raporlamanın bir örneği olarak yönetim kurulu, CAE'nin atanmasını ve görevden alınmasını onaylar. As an example of functional reporting, the board approves decisions regarding the appointment and removal of the CAE.", "cmt_en": ""}]}, {"q_tr": "Önemli organizasyonel değişikliklerin ardından en iyi raporlama ilişkisi ne olur? (Daha önce COO'ya raporlanıyordu)", "q_en": "What would be the best reporting relationship following significant organizational changes? (Previously reported to COO)", "answer": 1, "options": [{"tr": "İdari ve fonksiyonel olarak başkana.", "en": "Administratively and functionally to the president.", "cmt_tr": "Organizasyonel bağımsızlık, CAE'nin fonksiyonel olarak yönetim kuruluna raporlamasıyla etkin şekilde sağlanır. Organizational independence is effectively achieved when the CAE reports functionally to the board.", "cmt_en": ""}, {"tr": "İdari olarak başkana ve fonksiyonel olarak yönetim kuruluna.", "en": "Administratively to the president and functionally to the board.", "cmt_tr": "CAE'nin fonksiyonel olarak yönetim kuruluna, idari olarak başkana (CEO'ya eşdeğer) raporlaması organizasyonel bağımsızlığı kolaylaştırır. The CAE reporting functionally to the board and administratively to the president (CEO equivalent) facilitates organizational independence.", "cmt_en": ""}, {"tr": "İdari olarak CFO'ya ve fonksiyonel olarak başkana.", "en": "Administratively to the CFO and functionally to the president.", "cmt_tr": "CAE'nin fonksiyonel olarak yönetim kuruluna raporlaması organizasyonel bağımsızlığı kolaylaştırır. The CAE reporting functionally to the board and administratively to the CEO facilitates organizational independence.", "cmt_en": ""}, {"tr": "İdari ve fonksiyonel olarak COO'ya.", "en": "Administratively and functionally to the COO.", "cmt_tr": "En iyi raporlama ilişkisi idari olarak başkana, fonksiyonel olarak yönetim kuruluna raporlamaktır. The best reporting relationship is administratively to the president, functionally to the board.", "cmt_en": ""}]}, {"q_tr": "Yeni bir iç denetim fonksiyonu tüzüğünde CAE için uygun bir organizasyonel konumu hangisi tanımlar?", "q_en": "Which describes an appropriate organizational position for the CAE in a new internal audit function charter?", "answer": 0, "options": [{"tr": "CAE, CEO'ya raporlar ancak yönetim kuruluna erişimi vardır.", "en": "The CAE reports to the CEO but has access to the board.", "cmt_tr": "CAE'nin CEO'ya raporlaması ancak yönetim kuruluna erişimi olması, fonksiyonel olarak yönetim kuruluna raporlamayı ve doğrudan etkileşimi kolaylaştırır. The CAE reporting to the CEO but having access to the board facilitates functional reporting to the board and direct interaction.", "cmt_en": ""}, {"tr": "CAE, yönetim kurulunun bir üyesidir.", "en": "The CAE is a member of the board.", "cmt_tr": "CAE'yi yönetim kurulu üyesi yapmak nesnelliğini zedeler. Placing the CAE in a governance position impairs objectivity.", "cmt_en": ""}, {"tr": "CAE, CFO'ya raporlayan bir kadro yetkilisidir.", "en": "The CAE is a staff officer reporting to the CFO.", "cmt_tr": "CFO'ya raporlayan bir kadro yetkilisi olarak görev yapmak, iç denetim fonksiyonunun etkisini ve bağımsızlığını sınırlandırır. Serving as a staff officer reporting to the CFO limits the influence and independence of the internal audit function.", "cmt_en": ""}, {"tr": "CAE, idari bir genel müdür yardımcısına raporlar.", "en": "The CAE reports to an administrative vice president.", "cmt_tr": "İdari bir genel müdür yardımcısına raporlamak, iç denetim fonksiyonunun etkisini ve bağımsızlığını sınırlandırır. Reporting to an administrative vice president limits the influence and independence of the internal audit function.", "cmt_en": ""}]}, {"q_tr": "Küresel İç Denetim Standartlarına göre, iç denetim fonksiyonunun bağımsızlığı şu yolla sağlanır:", "q_en": "According to the Global Internal Audit Standards, the independence of the internal audit function is achieved through", "answer": 3, "options": [{"tr": "Kadrolama ve denetim.", "en": "Staffing and supervision.", "cmt_tr": "Kadrolama ve denetim, yetkinlikle ilgilidir; bağımsızlıkla değil. Staffing and supervision relate to proficiency, not independence.", "cmt_en": ""}, {"tr": "Sürekli mesleki gelişim ve gerekli mesleki özen.", "en": "Continuing professional development and due professional care.", "cmt_tr": "Sürekli mesleki gelişim ve mesleki özen, yetkinlikle ilgilidir; bağımsızlıkla değil. Continuing professional development and due professional care relate to proficiency, not independence.", "cmt_en": ""}, {"tr": "İnsan ilişkileri ve iletişim.", "en": "Human relations and communications.", "cmt_tr": "İnsan ilişkileri ve iletişim, yetkinlikle ilgilidir; bağımsızlıkla değil. Human relations and communications relate to proficiency, not independence.", "cmt_en": ""}, {"tr": "Organizasyonel statü ve nesnellik.", "en": "Organizational status and objectivity.", "cmt_tr": "Bağımsızlık için en uygun organizasyonel statü çift raporlama ilişkisidir. Nesnellik, bireysel denetçilerin kararlarını başkalarına tabi kılmamasını gerektirir. The organizational status most conducive to independence is a dual-reporting relationship. Objectivity requires that internal auditors do not subordinate their judgment to others.", "cmt_en": ""}]}, {"q_tr": "Bir satın alma görevi sırasında, baş satın alma yetkilisi iç denetçinin neden belirli belgeleri talep ettiğini sorar. İç denetçinin uygun yanıtı şudur:", "q_en": "During a purchasing engagement, the chief purchasing agent asks why the internal auditor requested certain documents. The internal auditor's proper response is to", "answer": 3, "options": [{"tr": "Soruşturmayı kapsam sınırlaması olarak değerlendirmek.", "en": "Treat the inquiry as a scope limitation.", "cmt_tr": "Kapsam sınırlaması; iç denetim fonksiyonunun amaçlarına ve planlarına ulaşmasını engelleyen bir kısıtlamadır; bu durum bunun karşılığı değildir. A scope limitation is a restriction that precludes the function from accomplishing its objectives and plans; this situation is not that.", "cmt_en": ""}, {"tr": "İşbirliğini teşvik etmek için bilgi talebinin nedenlerini açıklamak.", "en": "Explain the reasons for the information request to promote cooperation.", "cmt_tr": "CAE, bilgi talebinin nedenlerini açıklamadan önce spesifik koşulları değerlendirmelidir; her zaman açıklamak gerekli değildir. The CAE should consider specific circumstances before deciding whether to disclose reasons; it is not always necessary to explain.", "cmt_en": ""}, {"tr": "Görev sürecinin bütünlüğünü korumak için bilgi talebini açıklamayı reddetmek.", "en": "Refuse to explain the information request to preserve the integrity of the engagement process.", "cmt_tr": "Bilgi talebini açıklamayı her zaman reddetmek gerekli veya arzu edilir değildir. It is not always necessary or desirable to refuse to explain an information request.", "cmt_en": ""}, {"tr": "Nedenleri açıklamaya karar vermeden önce spesifik koşulları değerlendirmek.", "en": "Consider the specific circumstances before deciding whether to disclose the reasons.", "cmt_tr": "İç denetçi, belgelerin neden talep edildiğini açıklamadan önce koşulları değerlendirmelidir. Önemli düzensizlikler, kapalı bir ortam gerektirebilir; bu CAE'nin takdirindedir. The internal auditor should consider circumstances before deciding whether to disclose reasons. Significant irregularities may require a less open environment; this is at the CAE's discretion.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun bağımsızlığı büyük ihtimalle şu yolla güçlendirilir:", "q_en": "The independence of the internal audit function is most likely enhanced by", "answer": 2, "options": [{"tr": "Bağımsızlığını yıllık olarak CEO'ya teyit etmek.", "en": "Annually confirming its independence to the CEO.", "cmt_tr": "Bağımsızlık, yıllık olarak CEO'ya değil; tercihen yönetim kuruluna doğrulanmalıdır. Independence should preferably be confirmed annually to the board, not the CEO.", "cmt_en": ""}, {"tr": "Tüzüğünün üst düzey bir yönetici tarafından onaylanması.", "en": "Approval of its charter by a senior manager.", "cmt_tr": "Fonksiyonel raporlama; tüzüğün yönetim kurulu tarafından onaylanmasını içermelidir; üst düzey bir yönetici tarafından değil. Functional reporting should include approval of the charter by the board, not by a senior manager.", "cmt_en": ""}, {"tr": "Fonksiyonel olarak yönetim kuruluna raporlamak.", "en": "Reporting functionally to the board.", "cmt_tr": "CAE, yönetim kuruluna doğrudan bir fonksiyonel raporlama hattına sahip olmalıdır. Fonksiyonel olarak yönetim kuruluna raporlamak bağımsızlığı en çok güçlendirir. The CAE should have a direct functional reporting line to the board. Reporting functionally to the board most enhances independence.", "cmt_en": ""}, {"tr": "Bireysel denetçilerin bağımsızlığı.", "en": "The independence of individual auditors.", "cmt_tr": "İç denetçiler organizasyondan bağımsız olamaz; ancak nesnel olmalıdır. Internal auditors cannot be independent of the organization but must be objective.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun organizasyonel bağımsızlığı en etkin şekilde şu durumda sağlanır:", "q_en": "The organizational independence of the internal audit function is most effectively achieved when", "answer": 1, "options": [{"tr": "CAE fonksiyonel olarak CEO'ya raporlar.", "en": "The CAE reports functionally to the CEO.", "cmt_tr": "CAE idari olarak üst yönetime raporlamalıdır; fonksiyonel olarak CEO'ya değil. The CAE should report administratively to senior management, not functionally to the CEO.", "cmt_en": ""}, {"tr": "Yönetim kurulu, iç denetim fonksiyonunun uygunsuz kaynak kısıtlamalarına maruz kalıp kalmadığını araştırır.", "en": "The board inquires about whether the internal audit function is subject to inappropriate resource limitations.", "cmt_tr": "Yönetim kurulunun uygunsuz kapsam veya kaynak kısıtlamaları olup olmadığını araştırması, fonksiyonel raporlamanın bir örneğidir ve organizasyonel bağımsızlığı destekler. The board inquiring about inappropriate scope or resource limitations is an example of functional reporting and supports organizational independence.", "cmt_en": ""}, {"tr": "Üst yönetimden bir üye CAE'nin atanmasını onaylar.", "en": "A member of senior management approves the appointment of the CAE.", "cmt_tr": "CAE'nin atanmasının onaylanması, fonksiyonel raporlamanın bir unsuru olarak yönetim kuruluna aittir; üst yönetim üyesine değil. Approving CAE appointment is a functional reporting element belonging to the board, not a senior management member.", "cmt_en": ""}, {"tr": "CAE idari olarak denetim komitesine raporlar.", "en": "The CAE reports administratively to the audit committee.", "cmt_tr": "CAE, fonksiyonel olarak değil; idari olarak yönetim kuruluna raporlamamalıdır. İdari raporlama üst yönetime, tercihen CEO'ya yapılmalıdır. The CAE should report functionally, not administratively, to the board. Administrative reporting should be to senior management.", "cmt_en": ""}]}, {"q_tr": "Organizasyonel bağımsızlığın desteklenmesi en olası şu durumda gerçekleşir: Yönetim kurulu: (1) İç iletişimi yönetir (2) İç denetim planını onaylar (3) CAE'nin yıllık ücretini onaylar", "q_en": "The organizational independence is most likely to be promoted when the board: (1) Manages internal communication (2) Approves the internal audit plan (3) Approves annual compensation of the CAE", "answer": 1, "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "İç iletişim ve bilgi akışları idari raporlama konularıdır; fonksiyonel raporlama değil. Internal communication and information flows are administrative reporting items, not functional reporting.", "cmt_en": ""}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "Yönetim kurulunun iç denetim planını onaylaması ve CAE'nin yıllık ücretini onaylaması fonksiyonel raporlamanın örnekleridir. The board's approval of the internal audit plan and annual compensation of the CAE are examples of functional reporting.", "cmt_en": ""}, {"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "İç iletişim ve bilgi akışları idari raporlama konularıdır. Fonksiyonel raporlama aynı zamanda riske dayalı iç denetim planının onaylanmasını da içerir. Internal communication and information flows are administrative. Functional reporting also involves approving the risk-based internal audit plan.", "cmt_en": ""}, {"tr": "1, 2 ve 3'ün tümü.", "en": "1, 2, and 3.", "cmt_tr": "İç iletişim ve bilgi akışları idari raporlama konularıdır. Internal communication and information flows are administrative reporting items.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonu, iç denetimin kapsamını belirlerken müdahaleden arınmış olmalıdır. Sonuç olarak, CAE büyük ihtimalle şunu yapmalıdır:", "q_en": "The internal audit function must be free from interference in determining the scope of internal auditing. Consequently, the CAE most likely should", "answer": 0, "options": [{"tr": "En az yıllık olarak yönetim kuruluyla özel bir toplantı yapmak.", "en": "Have a private meeting with the board at least annually.", "cmt_tr": "Fonksiyonel raporlama ilişkisinde CAE, en az yıllık olarak yönetim kurulu veya denetim komitesiyle özel toplantı yapar (üst yönetim olmaksızın). In a functional reporting relationship, the CAE holds private meetings with the board or audit committee at least annually (without senior management).", "cmt_en": ""}, {"tr": "İç denetim tüzüğü için üst yönetimden onay almak.", "en": "Seek approval from senior management of the internal audit charter.", "cmt_tr": "CAE fonksiyonel olarak yönetim kuruluna raporluyorsa, tüzük yönetim kurulu tarafından onaylanır; üst yönetim tarafından değil. If the CAE reports functionally to the board, the charter is approved by the board, not senior management.", "cmt_en": ""}, {"tr": "Hassas konuları iletmek için belirlenmiş bir üst yöneticiyle iletişim kurma yeteneğine sahip olmak.", "en": "Have the ability to contact a designated senior manager to communicate sensitive matters.", "cmt_tr": "Fonksiyonel raporlama ilişkisinde CAE, yönetim kurulunun herhangi bir üyesiyle iletişim kurabilir; yalnızca belirlenmiş bir üst yöneticiyle değil. In a functional reporting relationship, the CAE can contact any member of the board; not only a designated senior manager.", "cmt_en": ""}, {"tr": "Yönetim kurulunun veya üst düzey yöneticinin üyesi olmak.", "en": "Become a member of the board or a senior manager.", "cmt_tr": "Organizasyonel bağımsızlık, CAE'nin yönetim kurulu veya üst yönetim üyesi olmasını gerektirmez. Organizational independence does not require the CAE to become a board member or senior manager.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun etkin organizasyonel bağımsızlığı büyük ihtimalle şu şekilde kanıtlanır:", "q_en": "The effective organizational independence of the internal audit function is most likely evidenced by", "answer": 3, "options": [{"tr": "Üst yönetimden bir üyeyle doğrudan iletişim.", "en": "Direct communication with a member of senior management.", "cmt_tr": "CAE, yönetim kurulu ile doğrudan iletişim kurmalıdır; üst yönetimden bir üyeyle değil. The CAE must communicate and interact directly with the board, not with a member of senior management.", "cmt_en": ""}, {"tr": "Denetleyici üst yöneticiyle yıllık resmi toplantı.", "en": "An annual formal meeting with a supervising senior manager.", "cmt_tr": "Üst yönetimle yıllık resmi toplantı değil; yönetim kurulu veya denetim komitesiyle yıllık özel toplantı tercih edilen fonksiyonel raporlama ilişkisinin göstergesidir. An annual meeting with the board or audit committee (not senior management) is more indicative of the functional reporting relationship.", "cmt_en": ""}, {"tr": "CAE'nin ücretinin CEO tarafından onaylanması.", "en": "Approval of the CAE's compensation by the CEO.", "cmt_tr": "CAE'nin ücretinin yönetim kurulu tarafından onaylanması, CAE'nin yönetim kuruluna raporladığı optimal fonksiyonel ilişkinin bir örneğidir. Approval of the CAE's compensation by the board is an example of the optimal functional relationship where the CAE reports to the board.", "cmt_en": ""}, {"tr": "Uygunsuz kapsam kısıtlamaları hakkında yönetim kurulunun soruşturması.", "en": "Board inquiries about inappropriate scope limitations.", "cmt_tr": "Yönetim kurulunun uygunsuz kapsam kısıtlamaları hakkında araştırma yapması, fonksiyonel raporlamanın ve organizasyonel bağımsızlığın etkin şekilde sağlandığının bir göstergesidir. Board inquiries about inappropriate scope limitations indicate functional reporting and effectively achieved organizational independence.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun etkin organizasyonel bağımsızlığının özellikleri şunları içerir:", "q_en": "The characteristics of the effective organizational independence of the internal audit function include", "answer": 1, "options": [{"tr": "Üst yönetimle doğrudan fonksiyonel ilişki.", "en": "A direct functional relationship with senior management.", "cmt_tr": "İç denetim fonksiyonu, yönetim kuruluyla doğrudan fonksiyonel ilişkiye sahip olmalıdır; üst yönetimle değil. The internal audit function should have a direct functional relationship with the board, not with senior management.", "cmt_en": ""}, {"tr": "İç denetimin kapsamını belirlemede müdahaleden özgürlük.", "en": "Freedom from interference with determining internal audit's scope.", "cmt_tr": "İç denetim fonksiyonu, iç denetimin kapsamını belirlerken, çalışma yürütürken ve sonuçları iletirken müdahaleden arınmış olmalıdır. The internal audit function must be free from interference in determining scope, performing work, and communicating results.", "cmt_en": ""}, {"tr": "Üst yönetimle doğrudan idari ilişki.", "en": "A direct administrative relationship with senior management.", "cmt_tr": "İç denetim fonksiyonu yönetim kuruluyla doğrudan fonksiyonel ilişkiye, üst yönetimle (tercihen CEO) idari ilişkiye sahip olmalıdır. The function should have a direct functional relationship with the board and an administrative relationship with senior management (preferably the CEO).", "cmt_en": ""}, {"tr": "İç denetçilerin ücretlerinin üst yönetim tarafından onaylanması.", "en": "Approval of internal auditors' remuneration by senior management.", "cmt_tr": "CAE'nin ücretini yönetim kurulu onaylamalıdır; üst yönetim değil. The board, not senior management, should approve the remuneration of the CAE.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi iç denetim fonksiyonunun organizasyonel olarak bağımsız olup olmadığını büyük ihtimalle gösterir?", "q_en": "Which of the following most likely indicates whether the internal audit function is organizationally independent?", "answer": 2, "options": [{"tr": "Üst yönetim tarafından verilen güvenceler.", "en": "Assurances by senior management.", "cmt_tr": "Üst yönetimin güvenceleri, yönetim kuruluyla doğrudan etkileşime ilişkin belgelerden daha az ikna edicidir. Assurances by senior management are less persuasive than documentation of direct interaction with the board.", "cmt_en": ""}, {"tr": "Riske dayalı iç denetim planının CEO tarafından onaylanması.", "en": "Approval by the CEO of the risk-based internal audit plan.", "cmt_tr": "İç denetim fonksiyonu etkin olarak organizasyonel bağımsız olduğunda riske dayalı iç denetim planı yönetim kurulu tarafından onaylanır. The function is effectively organizationally independent when the risk-based internal audit plan is approved by the board.", "cmt_en": ""}, {"tr": "Yönetim kurulu toplantı gündemleri ve tutanakları.", "en": "Board meeting agendas and minutes.", "cmt_tr": "Yönetim kurulu toplantı gündemleri ve tutanakları, CAE'nin yönetim kuruluyla doğrudan iletişim ve etkileşimini belgeler; bu organizasyonel bağımsızlığın kanıtıdır. Board meeting agendas and minutes document the CAE's direct communication and interaction with the board, evidencing organizational independence.", "cmt_en": ""}, {"tr": "CAE en az yıllık olarak CEO ile özel olarak görüşür.", "en": "The CAE meets privately with the CEO at least annually.", "cmt_tr": "Fonksiyonel raporlama ilişkisinde CAE, en az yıllık olarak yönetim kurulu veya denetim komitesiyle özel toplantı yapar (yönetim olmaksızın). Under a functional reporting relationship, the CAE holds private meetings with the board or audit committee at least annually (without management present).", "cmt_en": ""}]}, {"q_tr": "Bir risk yönetimi sürecinin ilk kurulumuna katılan bir iç denetçinin bağımsızlığını aşağıdakilerden hangisi tehdit eder?", "q_en": "Which of the following threatens the independence of an internal auditor who had participated in the initial establishment of a risk management process?", "answer": 1, "options": [{"tr": "Risk yönetimi süreci hakkında değerlendirmeler ve raporlar geliştirmek.", "en": "Developing assessments and reports on the risk management process.", "cmt_tr": "Organizasyonun risk yönetimi süreçlerine ilişkin değerlendirmeler ve raporlar geliştirmek yalnızca bir iç denetim rolü değil; aynı zamanda yüksek öncelikli bir denetim konusudur. Developing assessments and reports on risk management processes is not only an internal audit role but also a high audit priority.", "cmt_en": ""}, {"tr": "Tanımlanan riskleri yönetmek.", "en": "Managing the identified risks.", "cmt_tr": "Risk yönetimi süreci için yönetimin sorumluluğunu üstlenmek, iç denetim fonksiyonunun bağımsızlığı için potansiyel bir tehdit oluşturur. Assuming management's responsibility for the risk management process is a potential threat to the independence of the internal audit function.", "cmt_en": ""}, {"tr": "Yönetimin risk süreçlerinin yeterliliğini ve etkinliğini değerlendirmek.", "en": "Evaluating the adequacy and effectiveness of management's risk processes.", "cmt_tr": "İç denetçiler, risk yönetimi süreçlerinin yeterliliğini ve etkinliğini inceleme, değerlendirme, raporlama ve iyileştirme önerilerinde bulunma konusunda hem yönetime hem de yönetim kuruluna yardımcı olur. Internal auditors assist both management and the board by examining, evaluating, reporting, and recommending improvements on the adequacy and effectiveness of risk management processes.", "cmt_en": ""}, {"tr": "Tanımlanan riskleri gidermek için kontroller önermek.", "en": "Recommending controls to address the risks identified.", "cmt_tr": "İç denetçiler kontroller önerebilir; bu bağımsızlığı zedelemez. Internal auditors may recommend controls; this does not impair independence.", "cmt_en": ""}]}, {"q_tr": "Hangi politika bağımsızlığı en iyi destekler?", "q_en": "Which policy best promotes independence?", "answer": 0, "options": [{"tr": "İç denetçilerin herhangi bir çıkar çatışması veya önyargıyı CAE'ye bildirmesini zorunlu kılmak.", "en": "Requiring internal auditors to report to the CAE any conflicts of interest or bias.", "cmt_tr": "İç denetçiler, bağımsızlık veya nesnelliklerinin gerçek veya potansiyel zedelenmelerini CAE'ye bildirmelidir. Bu politika bağımsızlığı en iyi destekler. Internal auditors must report to the CAE any actual or potential impairments of independence or objectivity. This policy best promotes independence.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun değerlendirdiği sistemler için kontrol standartları önermesini engellemek.", "en": "Preventing the internal audit function from recommending standards of control for systems that it evaluates.", "cmt_tr": "İç denetim, değerlendirdiği sistemler için kontrol standartları önerebilir; bu bağımsızlığı zedelemez. Internal auditing may recommend standards of control for systems that it evaluates; this does not impair independence.", "cmt_en": ""}, {"tr": "Hassas operasyonlara ilişkin görevlerin dış kaynak kullanılmasına izin vermek.", "en": "Allowing engagements concerning sensitive operations to be outsourced.", "cmt_tr": "Belirli görevlerin dış kaynak kullanılması, iç denetim fonksiyonunun bağımsızlığını teşvik etmez. Outsourcing certain engagements does not promote the independence of the internal audit function.", "cmt_en": ""}, {"tr": "Operasyonel faaliyetlerden iç denetim fonksiyonuna personel transferini engellemek.", "en": "Preventing personnel transfers from operating activities to the internal audit function.", "cmt_tr": "Operasyonel faaliyetlerden iç denetim fonksiyonuna transferlere genellikle izin verilir; ancak transferlerin, en az 1 yıl geçmeden önce önceden gerçekleştirdikleri faaliyetlere ilişkin görevlere atanmaması gerekir. Transfers from operating activities to internal audit are generally permitted, but transferees should not be assigned to engagements concerning activities they previously performed until at least 1 year has elapsed.", "cmt_en": ""}]}, {"q_tr": "Bir iç denetçi tarafından yürütülen aşağıdaki faaliyetlerden hangisi bağımsızlık standardıyla çelişebilir?", "q_en": "Which of the following activities undertaken by the internal auditor might be in conflict with the standard of independence?", "answer": 1, "options": [{"tr": "Risk yönetimi danışmanı.", "en": "Risk management consultant.", "cmt_tr": "Risk yönetimi danışmanı olarak görev yapmak iç denetim fonksiyonunun bağımsızlığını zedelemez. Acting as a risk management consultant does not impair the independence of the internal audit function.", "cmt_en": ""}, {"tr": "Ürün geliştirme ekip lideri.", "en": "Product development team leader.", "cmt_tr": "Bağımsızlık, iç denetçilerin yönetim rolleri üstlenmesini engeller. Ürün geliştirme ekip liderliği bir yönetim rolüdür. Independence precludes internal auditors from assuming management roles. Product development team leadership is a management role.", "cmt_en": ""}, {"tr": "Etik savunucusu.", "en": "Ethics advocate.", "cmt_tr": "Etik savunuculuğu rolü üstlenmek iç denetçinin bağımsızlığını zedelemez. Assuming the role of ethics advocate does not impair the internal auditor's independence.", "cmt_en": ""}, {"tr": "Bağımsız denetim irtibat görevlisi.", "en": "External audit liaison.", "cmt_tr": "İç ve dış denetim fonksiyonları, yönetimin etkisi dışında bilgi paylaşır ve işbirliği yapar; bu bağımsızlıkla çelişmez. The internal and external audit functions share information and work collaboratively outside management's influence; this does not conflict with independence.", "cmt_en": ""}]}, {"q_tr": "CAE'nin sorumlulukları hakkında aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is true regarding the responsibilities of the CAE?", "answer": 0, "options": [{"tr": "Güvenceler mevcut olmak koşuluyla, CAE risk yönetiminde sorumluluk üstlenebilir.", "en": "The CAE may assume responsibilities in risk management, provided that safeguards are in place.", "cmt_tr": "CAE, uygun güvenceler mevcut olmak koşuluyla risk yönetiminde sorumluluk üstlenebilir. The CAE may assume responsibilities in risk management, provided that appropriate safeguards are in place.", "cmt_en": ""}, {"tr": "CAE'nin amirinin iç denetim dışında fonksiyonel sorumlulukları varsa ve CAE amirinin fonksiyonel sorumluluğu kapsamında bir denetim gerçekleştirirse bağımsızlık güvence altına alınır.", "en": "Independence is safeguarded if the CAE's supervisor has functional responsibilities other than internal audit and the CAE performs an audit within the supervisor's functional responsibility.", "cmt_tr": "CAE'nin amirinin iç denetim dışında fonksiyonel sorumlulukları varsa ve CAE bu sorumluluk kapsamında denetim yaparsa organizasyonel bağımsızlık muhtemelen zedelenir. If the CAE's supervisor has responsibilities outside internal audit and the CAE performs an audit within that scope, organizational independence is likely impaired.", "cmt_en": ""}, {"tr": "Olası zedelenmeler nedeniyle CAE'nin iç denetim dışında sorumlulukları olmamalıdır.", "en": "The CAE should not have responsibilities outside of internal auditing because of potential impairments.", "cmt_tr": "CAE, güvenceler mevcut olmak koşuluyla iç denetim kapsamı dışında sorumluluklar üstlenebilir. The CAE may be assigned responsibility for functions outside internal auditing if safeguards exist.", "cmt_en": ""}, {"tr": "CAE uyumluluk fonksiyonunun sorumluluğunu üstlenir ve o alan için denetim gerçekleştirirse, zedelenmiş bağımsızlık olasılığı azalır.", "en": "If the CAE assumes responsibility for compliance and performs an audit for that area, the likelihood of impaired independence is reduced.", "cmt_tr": "Güvenceler olmaksızın zedelenmiş organizasyonel bağımsızlık olasılığı azalmaz; artar. Without safeguards, the likelihood of impaired organizational independence increases, not decreases.", "cmt_en": ""}]}, {"q_tr": "CAE'nin uyumluluk departmanında büyük sorumluluklar üstlenmesi durumunda bağımsızlığın olası zedelenmelerinin risklerini en büyük ihtimalle ne giderir?", "q_en": "What is most likely to address the risks of potential impairments of independence when the CAE undertakes major responsibilities in the compliance department?", "answer": 1, "options": [{"tr": "Uyumluluk departmanı CAE'ye eğitim sağlar.", "en": "The compliance department provides training to the CAE.", "cmt_tr": "CAE'ye eğitim vermek, bağımsızlık veya nesnellik zedelenmesi risklerini gidermek için bir denetim faaliyeti değildir. Training the CAE is not an oversight activity to address the risks of impairment of independence or objectivity.", "cmt_en": ""}, {"tr": "CAE, fonksiyonel olarak yönetim kuruluna raporlamak için onay alır.", "en": "The CAE seeks approval to report functionally to the board.", "cmt_tr": "Yönetim kuruluna fonksiyonel raporlama onayı; CAE'nin işe alımı, ücretinin, tüzüğün, denetim planının, bütçenin ve kaynakların onaylanmasıyla organizasyonel bağımsızlığı güvence altına alır. Functional reporting approval to the board, with its approval of CAE hiring, compensation, charter, audit plan, budget, and resources, safeguards organizational independence.", "cmt_en": ""}, {"tr": "CAE, uyumluluk fonksiyonu üzerinde gerçekleştirilen güvence görevlerini denetler.", "en": "The CAE oversees the assurance engagements performed on the compliance function.", "cmt_tr": "Uyumluluk fonksiyonu üzerindeki güvence görevleri, iç denetim fonksiyonu dışındaki bir tarafça denetlenmelidir. Assurance engagements for the compliance function must be overseen by a party outside the internal audit function.", "cmt_en": ""}, {"tr": "CAE, raporlama hatlarının değerlendirilmesini sağlamak için idari olarak yönetim kuruluna raporlar.", "en": "The CAE reports administratively to the board to ensure reporting lines are evaluated.", "cmt_tr": "CAE'nin yönetim kuruluna fonksiyonel olarak değil; idari olarak raporlaması organizasyonel bağımsızlığı sağlamaz. The CAE reporting administratively, not functionally, to the board does not ensure organizational independence.", "cmt_en": ""}]}, {"q_tr": "Yeni bir yönetmelik, bir organizasyonun politikalar ve risk yönetimi faaliyetleri geliştirmesini gerektiriyor. Yönetim kurulu CAE'yi bu faaliyetleri yürütmekle yetkilendiriyor. Hangisi bağımsızlığın olası zedelenmesine karşı en az olası güvencedir?", "q_en": "A new regulation requires an organization to develop policies and risk management activities. The board authorizes the CAE to perform these activities. Which is least likely to be a safeguard against potential impairment of independence?", "answer": 3, "options": [{"tr": "CAE'nin yeni görevlerinin denetimi için bağımsız bir güvence hizmetleri sağlayıcısına dış kaynak kullanmak.", "en": "Outsourcing to an independent assurance services provider for oversight of CAE's new duties.", "cmt_tr": "Bağımsız güvence hizmetleri sağlayıcısına dış kaynak kullanmak, ek sorumluluk alanlarına ilişkin güvence elde etmek için alternatif bir süreçtir. Outsourcing to an independent assurance services provider is an alternative process to obtain assurance related to areas of additional responsibility.", "cmt_en": ""}, {"tr": "Yönetim kurulunun CAE tarafından üstlenilen rol ve sorumlulukları değerlendirmesi.", "en": "The board evaluates roles and responsibilities undertaken by the CAE.", "cmt_tr": "Yönetim kurulunun CAE tarafından üstlenilen rol ve sorumlulukları ve bu üstlenmeyle ilgili riskleri gidermek için mevcut kontrolleri periyodik olarak değerlendirmesi bir güvencedir. The board periodically evaluating roles, responsibilities, and controls in place is a safeguard.", "cmt_en": ""}, {"tr": "CAE'nin olası zedelenmeleri yönetim kuruluyla görüşmesi ve fonksiyonel olarak raporlamak için onay alması.", "en": "The CAE discusses the potential impairments with the board and seeks approval to report functionally.", "cmt_tr": "CAE'nin olası zedelenmeleri yönetim kuruluyla görüşmesi ve fonksiyonel raporlama onayı alması bir güvencedir. The CAE discussing potential impairments with the board and seeking functional reporting approval is a safeguard.", "cmt_en": ""}, {"tr": "CAE'nin iç denetim sorumluluklarını yerine getirebilmesi için iç denetim fonksiyonunun bütçesini artırmak.", "en": "Increasing the budget for the internal audit function so the CAE can fulfill its internal auditing responsibilities.", "cmt_tr": "Potansiyel zedelenmeler; CAE'nin iç denetim dışına taşan sorumluluklar üstlenmesinden kaynaklanır. Bu nedenle iç denetim bütçesini artırmak gerekli güvenceleri sağlayamaz. Potential impairments arise because the CAE takes on responsibilities outside internal auditing. Therefore, increasing the internal audit budget cannot provide the necessary safeguards.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun bağımsızlığını güçlendirmek için CAE'nin en uygun raporlama hattını hangisi tanımlar?", "q_en": "Which describes the CAE's optimal reporting line to enhance the independence of the internal audit function?", "answer": 3, "options": [{"tr": "Başkana fonksiyonel ve idari raporlama.", "en": "Functional and administrative reporting to the president.", "cmt_tr": "İç denetim fonksiyonu, fonksiyonel olarak yönetim kuruluna raporlamalıdır; başkana değil. The internal audit function should report functionally to the board, not to the president.", "cmt_en": ""}, {"tr": "Yönetim kuruluna idari raporlama.", "en": "Administrative reporting to the board.", "cmt_tr": "İç denetim fonksiyonu idari olarak üst yönetime raporlamalıdır; yönetim kuruluna değil. The internal audit function should report administratively to senior management, not to the board.", "cmt_en": ""}, {"tr": "CFO'ya idari raporlama.", "en": "Administrative reporting to the CFO.", "cmt_tr": "İç denetim fonksiyonu CFO'ya değil; CEO'ya idari raporlama yapmalıdır. CEO'ya raporlamak bağımsızlığı en iyi şekilde güçlendirir. The function should report administratively to the CEO, not CFO. Reporting to the CEO best enhances independence.", "cmt_en": ""}, {"tr": "Denetim komitesine fonksiyonel raporlama.", "en": "Functional reporting to the audit committee.", "cmt_tr": "Denetim komitesine fonksiyonel raporlama, bağımsızlığı güçlendirmek için en uygun raporlama hattıdır. Standartlarda 'yönetim kurulu' denetim komitesini de kapsayabilir. Functional reporting to the audit committee is the optimal reporting line. In the Standards, 'board' may refer to the audit committee.", "cmt_en": ""}]}, {"q_tr": "Hangisi bir iç denetçinin rolünün iç denetim fonksiyonunun bağımsızlık niteliğiyle çeliştiği bir durumdur?", "q_en": "Which is a situation in which an internal auditor's role conflicts with the independence attribute of the internal audit function?", "answer": 1, "options": [{"tr": "İç denetim fonksiyonu yeni bir ihbarcı programı öneriyor.", "en": "The internal audit function recommends a new whistleblower program.", "cmt_tr": "Yeni bir ihbarcı programı önermek bağımsızlıkla çelişmez; ancak tasarım ve uygulama yönetim fonksiyonlarıdır. Recommending a new whistleblower program does not conflict with independence; but design and implementation are management functions.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonu yönetim kurulunu organizasyon genelinde bir çalışan etik programı uyguladığı konusunda bilgilendiriyor.", "en": "The internal audit function informs the board that it has implemented an organization-wide employee ethics program.", "cmt_tr": "Organizasyon genelinde bir çalışan etik programının tasarımı ve uygulanması yönetim fonksiyonlarıdır; iç denetim uygulama yapamaz, aksi takdirde bağımsızlığı zedelenir. Designing and implementing an organization-wide employee ethics program are management functions; internal audit cannot implement, as it would impair independence.", "cmt_en": ""}, {"tr": "Yönetim kurulu, iç denetçilerden organizasyonun davranış kurallarına uyup uymadığını değerlendirmelerini talep ediyor.", "en": "The board requests that the internal auditors assess whether the organization is complying with the code of conduct.", "cmt_tr": "İç denetim fonksiyonu yönetişim süreçlerini değerlendirebilir. The internal audit function may assess governance processes.", "cmt_en": ""}, {"tr": "CEO, yönetim kurulunu iç denetim fonksiyonunun önerileri hakkında bilgilendiriyor.", "en": "The CEO informs the board of recommendations made by the internal audit function.", "cmt_tr": "İç denetim fonksiyonu yönetişim süreçlerindeki iyileştirmeleri önerebilir. The internal audit function may recommend improvements in governance processes.", "cmt_en": ""}]}, {"q_tr": "Bir iç denetçinin baş etik yetkilisi rolünün bağımsızlık niteliğiyle çeliştiği durum hangisidir?", "q_en": "Which is a situation in which an internal auditor's role of chief ethics officer conflicts with the independence attribute?", "answer": 2, "options": [{"tr": "Baş etik yetkilisi, denetçilerden organizasyonun davranış kurallarına uymadığını değerlendirmelerini talep eder.", "en": "The chief ethics officer requests that auditors assess whether the organization is not complying with the code of conduct.", "cmt_tr": "Baş etik yetkilisinin iç denetçilerden davranış kurallarına uyumu değerlendirmelerini istemesi bağımsızlığı zedelemez. The chief ethics officer requesting internal auditors to assess compliance with the code of conduct does not impair independence.", "cmt_en": ""}, {"tr": "Baş etik yetkilisi, yönetim kurulunu iç denetim fonksiyonunun önerileri hakkında bilgilendirir.", "en": "The chief ethics officer informs the board of recommendations made by the internal audit function.", "cmt_tr": "Baş etik yetkilisinin yönetim kurulunu öneriler hakkında bilgilendirmesi bağımsızlığı zedelemez. The chief ethics officer informing the board of recommendations does not impair independence.", "cmt_en": ""}, {"tr": "Baş etik yetkilisi yeni bir ihbarcı programı önerir ve uygular.", "en": "The chief ethics officer proposes and implements a new whistleblower program.", "cmt_tr": "Yeni bir ihbarcı programını önermek ve uygulamak bağımsızlıkla çelişir. Uygulama bir yönetim fonksiyonudur ve organizasyonel bağımsızlıkla tutarsızdır. Proposing and implementing a new whistleblower program conflicts with independence. Implementation is a management function and inconsistent with organizational independence.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonu, baş etik yetkilisini organizasyonun tüm yasalara uyduğu konusunda bilgilendirir.", "en": "The internal audit function informs the chief ethics officer that the organization is in compliance with all laws.", "cmt_tr": "İç denetim fonksiyonunun tüm yasalara uyum konusunda baş etik yetkilisini bilgilendirmesi bağımsızlığı zedelemez. The internal audit function informing the chief ethics officer of compliance with all laws does not impair independence.", "cmt_en": ""}]}], "SU4 - Risk Mgmt": [{"q_tr": "IIA'nın Üç Savunma Hattı Modeline göre,", "q_en": "According to The IIA's Three L
