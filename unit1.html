<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 1</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 1</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">107 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Unit 1 · İç Denetim Fonksiyonu</span></h1>
    <p id="welcome-desc">4 mövzu, 107 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">4</span><span class="ws-label">Mövzu</span></div>
      <div class="ws-item"><span class="ws-num">107</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">428</span><span class="ws-label">İzah</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Purpose": [{"q_tr": "İç denetim fonksiyonunun amacı en iyi şekilde şöyle tanımlanabilir:", "q_en": "The purpose of the internal audit function can be best described as", "answer": 0, "options": [{"tr": "Organizasyona değer katmak.", "en": "Adding value to the organization.", "cmt_tr": "İç denetim, organizasyona bağımsız, nesnel güvence ve danışmanlık hizmetleri sunarak değer katar. Bu nedenle bu seçenek doğrudur. Internal auditing adds value by providing independent, objective assurance and advisory services. This is the correct answer.", "cmt_en": ""}, {"tr": "Finansal tabloların adil sunumuna ilişkin ek güvence sağlamak.", "en": "Providing additional assurance regarding fair presentation of financial statements.", "cmt_tr": "Finansal tabloların adil sunumuna ek güvence sağlamak olası görevlerden biridir; ancak birincil amaç değildir. Providing additional assurance on fair presentation of financial statements is one possible task, but not the primary purpose.", "cmt_en": ""}, {"tr": "İç kontrolün yeterli tasarımı ve işleyişi hakkında görüş bildirmek.", "en": "Expressing an opinion on the adequate design and functioning of internal control.", "cmt_tr": "İç kontrolün tasarımı ve işleyişi hakkında görüş bildirmek olası görevlerden biridir; ancak birincil amaç değildir. Expressing an opinion on internal control design and functioning is one possible task, but not the primary purpose.", "cmt_en": ""}, {"tr": "Finansal tabloları önemli ölçüde etkileyen sahtekarlığın olmadığını güvence altına almak.", "en": "Assuring the absence of any fraud that would materially affect the financial statements.", "cmt_tr": "Sahtekarlığın tespiti olası görevlerden biridir; ancak birincil amaç değildir. Detecting fraud is one possible task, but not the primary purpose.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun amacı, yetkisi ve sorumluluğu resmi olarak şurada tanımlanır:", "q_en": "The purpose, authority, and responsibility of the internal audit function are formally defined in", "answer": 3, "options": [{"tr": "Yönetim kurulu toplantı tutanakları.", "en": "The records of the proceedings of the board of directors.", "cmt_tr": "Yönetim kurulu toplantı tutanakları, tüzükle ilgili tartışmaları yansıtır, ancak resmi bir tüzüğün yerini alamaz. Board meeting records may reflect charter discussions but are no substitute for a formal charter.", "cmt_en": ""}, {"tr": "Şirket ana sözleşmesi.", "en": "The corporate bylaws.", "cmt_tr": "Şirket ana sözleşmesi, iç denetim fonksiyonunun amacını, yetkisini ve sorumluluğunu tanımlamak için uygun yer değildir. Corporate bylaws are not the appropriate place to define the internal audit function's purpose, authority, and responsibility.", "cmt_en": ""}, {"tr": "Mutabakat muhtırası.", "en": "The memorandum of understanding.", "cmt_tr": "Mutabakat muhtırası, taraflar arasındaki ortak iradeyi ifade eder; ancak bir sözleşmenin tüm unsurlarını içermeyebilir. A memorandum of understanding expresses common will but does not necessarily contain all elements of a contract.", "cmt_en": ""}, {"tr": "Resmi, yazılı bir tüzük (charter).", "en": "A formal, written charter.", "cmt_tr": "Standartlara uygun olarak, iç denetim fonksiyonunun amacı, yetkisi ve sorumluluğu yazılı bir tüzükte resmi olarak tanımlanmalıdır. Consistent with the Standards, the purpose, authority, and responsibility must be formally defined in a written charter.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun bir organizasyon için değer yaratma ve sürdürme yollarından biri şudur:", "q_en": "One way the internal auditing function creates and sustains value for an organization is by", "answer": 3, "options": [{"tr": "Yönetişim ve risk yönetimi süreçlerini denetlemek.", "en": "Overseeing governance and risk management processes.", "cmt_tr": "İç denetim, yönetişim ve risk yönetimi süreçlerini denetlemez; aksine bu süreçleri güçlendirir. Internal audit does not oversee governance and risk management processes; rather, it enhances them.", "cmt_en": ""}, {"tr": "Karar alma ve gözetim iş yükünü azaltmak.", "en": "Decreasing the decision-making and oversight workload.", "cmt_tr": "İç denetim fonksiyonu karar alma ve gözetim iş yükünü azaltmaz; aksine güçlendirir. The internal audit function does not decrease decision-making and oversight workload; it strengthens them.", "cmt_en": ""}, {"tr": "Paydaşlarla itibarı izlemek.", "en": "Monitoring the reputation with stakeholders.", "cmt_tr": "Paydaşlarla itibarı izlemek iyileştirme fırsatlarını ortaya koyabilir, ancak itibarı doğrudan güçlendirmez. Monitoring reputation with stakeholders may identify improvement opportunities but does not directly enhance reputation.", "cmt_en": ""}, {"tr": "İç kontrol süreçlerini güçlendirmek.", "en": "Enhancing the internal control processes.", "cmt_tr": "İç denetim; yönetişim, risk yönetimi, kontrol süreçleri, karar alma ve paydaşlarla itibar dahil pek çok alanda değer yaratır. İç kontrol süreçlerini güçlendirmek bu değer yaratma yollarından biridir. Internal auditing creates value in many areas including governance, risk management, control processes, decision making, and reputation. Enhancing internal control processes is one of these ways.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonu, aşağıdaki koşullardan hangisi mevcut olduğunda amacını gerçekleştirmede en etkin olur?", "q_en": "The internal auditing function is most effective in achieving its purpose when which of the following conditions exists?", "answer": 1, "options": [{"tr": "Güvence görevlerini bağımsız denetçiler gerçekleştirir.", "en": "External auditors perform the assurance engagements.", "cmt_tr": "Güvence görevlerini bağımsız denetçilerin yapması, iç denetimin değer yaratma misyonunu yerine getirmesini sağlamaz. Having external auditors perform assurance engagements does not fulfill internal audit's value-creating mission.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonu doğrudan yönetim kuruluna karşı sorumludur.", "en": "The internal auditing function is directly accountable to the board.", "cmt_tr": "Doğrudan yönetim kuruluna hesap verebilir olmak, iç denetimin bağımsız ve nesnel kalmasını sağlar. Bu seçenek doğrudur. Being directly accountable to the board ensures internal audit remains independent and objective. This is the correct answer.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonu doğrudan CEO'ya raporlar.", "en": "The internal auditing function reports directly to the CEO.", "cmt_tr": "Bağımsızlığı korumak için iç denetim CEO'ya değil, yönetim kuruluna raporlamalıdır. To maintain independence, internal audit should report to the board, not the CEO.", "cmt_en": ""}, {"tr": "BAŞDENETÇİ (CAE) iç kontrollerin uygulanmasından sorumludur.", "en": "The CAE is responsible for implementing internal controls.", "cmt_tr": "İç kontrolleri uygulamak veya yönetmek organizasyonun sorumluluğundadır, CAE'nin değil. Implementing or managing internal controls is the organization's responsibility, not the CAE's.", "cmt_en": ""}]}, {"q_tr": "Yeni kurulmuş bir şirket için iç denetim yetkisini aşağıdakilerden hangisi oluşturur ve onaylar?", "q_en": "Which of the following would establish and approve the internal audit mandate for a newly formed corporation?", "answer": 1, "options": [{"tr": "Genel müdür (CEO).", "en": "The chief executive officer (CEO).", "cmt_tr": "CEO, iç denetim yetkisini destekler; oluşturmaz ve onaylamaz. The CEO supports, but does not establish and approve, the internal audit mandate.", "cmt_en": ""}, {"tr": "Yönetim kurulu.", "en": "The board of directors.", "cmt_tr": "Prensip 6'ya göre, yönetim kurulu iç denetim fonksiyonunun yetkisini oluşturur, onaylar ve destekler. According to Principle 6, the board establishes, approves, and supports the internal audit function's mandate.", "cmt_en": ""}, {"tr": "Baş denetim yöneticisi (CAE).", "en": "The chief audit executive (CAE).", "cmt_tr": "CAE, yönetim kuruluna yetkiyi oluşturmak için gerekli bilgileri sağlar; yetkiyi kendisi oluşturmaz. The CAE provides the board with information to establish the mandate; the CAE does not establish it.", "cmt_en": ""}, {"tr": "Mali işler direktörü (CFO).", "en": "The chief financial officer (CFO).", "cmt_tr": "CFO, iç denetim yetkisini destekler; oluşturmaz ve onaylamaz. The CFO supports, but does not establish and approve, the internal audit mandate.", "cmt_en": ""}]}, {"q_tr": "Aşağıdaki ifadelerden hangisi iç denetim yetkisini doğru şekilde tanımlar?", "q_en": "Which of the following statements correctly describes an internal audit mandate?", "answer": 3, "options": [{"tr": "İç denetim fonksiyonunun yetkisini, organizasyonel konumunu, raporlama ilişkilerini, çalışma kapsamını, hizmet türlerini ve diğer özellikleri içeren resmi belge.", "en": "A formal document that includes the internal audit function's authority, organizational position, reporting relationships, scope of work, types of services, and other specifications.", "cmt_tr": "Tanımlanan belge iç denetim tüzüğüdür. İç denetim yetkisi tüzükte belgelenir, ancak tüzüğün kendisi değildir. The document described is the internal audit charter. The mandate is documented in the charter, but is not the charter itself.", "cmt_en": ""}, {"tr": "CAE'nin iç denetim fonksiyonunu oluşturmak, onaylamak ve desteklemek için verdiği yön.", "en": "The direction the chief audit executive provides to establish, approve, and support the internal audit function.", "cmt_tr": "Yönetim kurulu, iç denetim fonksiyonunun yetkisini oluşturur, onaylar ve destekler; CAE değil. The board establishes, approves, and supports the internal audit function's mandate, not the CAE.", "cmt_en": ""}, {"tr": "Belirli bir dönemde sunulacak görevleri ve diğer iç denetim hizmetlerini tanımlayan belge.", "en": "A document that identifies the engagements and other internal audit services to be provided during a given period.", "cmt_tr": "Belirli bir dönemde sunulacak görevleri tanımlayan belge iç denetim planıdır, yetki değil. The document identifying engagements planned for a given period is the internal audit plan, not the mandate.", "cmt_en": ""}, {"tr": "Yönetim kurulu ve/veya yasa ve yönetmelikler tarafından verilen iç denetim fonksiyonunun yetkisi, rolü ve sorumlulukları.", "en": "The internal audit function's authority, role, and responsibilities, which are granted by the board and/or laws and regulations.", "cmt_tr": "İç denetim yetkisi, yönetim kurulu ve/veya yasa ve yönetmelikler tarafından verilen iç denetim fonksiyonunun yetkisini, rolünü ve sorumluluklarını tanımlar. The internal audit mandate defines the function's authority, role, and responsibilities granted by the board and/or laws and regulations.", "cmt_en": ""}]}, {"q_tr": "Baş denetim yöneticisi (CAE) en iyi şekilde şöyle tanımlanır:", "q_en": "The chief audit executive (CAE) is best defined as the", "answer": 1, "options": [{"tr": "Genel müfettiş.", "en": "Inspector general.", "cmt_tr": "CAE'nin özel iş unvanı organizasyondan organizasyona değişebilir; 'genel müfettiş' zorunlu unvan değildir. The specific job title of the CAE may vary across organizations; 'inspector general' is not a required title.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonundan sorumlu kişi.", "en": "Person responsible for the internal audit function.", "cmt_tr": "CAE, iç denetim tüzüğüne ve Standartlara uygun olarak iç denetim fonksiyonunu etkin şekilde yönetmekten sorumlu kıdemli kişidir. The CAE is a senior person responsible for effectively managing the internal audit function in accordance with the charter and the Standards.", "cmt_en": ""}, {"tr": "İç denetim hizmetlerinin dış sağlayıcısı.", "en": "Outside provider of internal audit services.", "cmt_tr": "İç denetim fonksiyonu içeriden (insourced) da sağlanabilir; her zaman dış kaynak kullanılmaz. The internal audit function may be insourced; it is not always outsourced.", "cmt_en": ""}, {"tr": "Dış iç denetim hizmet sağlayıcısıyla sözleşmeyi denetlemekten sorumlu kişi.", "en": "Person responsible for overseeing the contract with the outside provider of internal audit services.", "cmt_tr": "CAE tanımı geniş tutulmuştur çünkü iç denetim içeriden veya dışarıdan sağlanabilir ve pratikte farklı unvanlar kullanılır. The CAE is broadly defined because internal audit may be insourced or outsourced and different titles are used in practice.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi iç denetimi en iyi tanımlar?", "q_en": "Which of the following best defines internal auditing?", "answer": 3, "options": [{"tr": "Risklerin organizasyonun kabul etmeye razı olduğu düzeyde tutulmasını sağlamak için tasarlanan ve işletilen politikalar, prosedürler ve faaliyetler.", "en": "The policies, procedures, and activities designed and operated to ensure that risks are contained within the level that an organization is willing to accept.", "cmt_tr": "Bu tanım IIA Sözlüğü'nde 'kontrol süreçleri' için verilmektedir; iç denetimin tanımı değildir. This definition is given in the IIA Glossary for 'control processes,' not for internal auditing.", "cmt_en": ""}, {"tr": "Yönetişim, risk yönetimi ve kontrol süreçlerinin etkinliğini değerlendirmek ve geliştirmek için sistematik, disiplinli bir yaklaşım.", "en": "A systematic, disciplined approach to evaluate and improve the effectiveness of governance, risk management, and control processes.", "cmt_tr": "Bu ifade IIA'nın iç denetim tanımının bir parçasıdır, ancak tam tanım değildir. This statement is part of The IIA's definition of internal auditing, but it is not the complete definition.", "cmt_en": ""}, {"tr": "Organizasyon için yönetişim, risk yönetimi ve kontrol süreçlerine ilişkin bağımsız bir değerlendirme sağlamak amacıyla kanıtların nesnel olarak incelenmesi.", "en": "The objective examination of evidence for the purpose of providing an independent assessment on governance, risk management, and control processes for the organization.", "cmt_tr": "Bu ifade IIA Sözlüğü'nde 'güvence hizmetleri' için verilmektedir; iç denetimin tam tanımı değildir. This definition is given in the IIA Glossary for 'assurance services,' not the complete definition of internal auditing.", "cmt_en": ""}, {"tr": "Bir organizasyonun yönetişim, risk yönetimi ve kontrol süreçlerine değer katmak ve bunları geliştirmek için tasarlanan faaliyetler.", "en": "Activities intended to add value and improve an organization's governance, risk management, and control processes.", "cmt_tr": "IIA'nın tam tanımına göre iç denetim, bir organizasyonun operasyonlarına değer katmak ve bunları geliştirmek için tasarlanmış bağımsız, nesnel bir güvence ve danışmanlık hizmetidir. According to The IIA's complete definition, internal auditing is an independent, objective assurance and advisory service designed to add value and improve an organization's operations.", "cmt_en": ""}]}, {"q_tr": "İç denetimin uygun organizasyonel rolü şudur:", "q_en": "The proper organizational role of internal auditing is to", "answer": 3, "options": [{"tr": "Dış denetim ücretlerini azaltmak için bağımsız denetçiye yardımcı olmak.", "en": "Assist the external auditor to reduce external audit fees.", "cmt_tr": "Dış denetim ücretlerini azaltmak iç denetim çalışmalarının dolaylı bir sonucu olabilir, ancak iç denetim fonksiyonu kurmanın nedeni değildir. Reducing external audit fees may be a direct result of internal audit work, but it is not a reason for staffing an internal audit function.", "cmt_en": ""}, {"tr": "Daha verimli operasyonların elde edilmesine yardımcı olmak için çalışmalar yapmak.", "en": "Perform studies to assist in the attainment of more efficient operations.", "cmt_tr": "Operasyonların verimliliğini değerlendirmek iç denetimin birincil rolüne dahildir, ancak onunla sınırlı değildir. Assessing the efficiency of operations is included in, but not limited to, the primary role of internal auditing.", "cmt_en": ""}, {"tr": "Yönetim kurulunun soruşturma kolu olarak görev yapmak.", "en": "Serve as the investigative arm of the board.", "cmt_tr": "İç denetçiler yönetim kurulunun yanı sıra yönetime de hizmet eder; yalnızca yönetim kurulunun soruşturma kolu değildir. Internal auditors serve management as well as the board; they are not solely the investigative arm of the board.", "cmt_en": ""}, {"tr": "Operasyonlara değer katan bağımsız, nesnel bir güvence ve danışmanlık faaliyeti olarak hizmet vermek.", "en": "Serve as an independent, objective assurance and advisory activity that adds value to operations.", "cmt_tr": "İç denetim, bağımsız, nesnel güvence ve danışmanlık hizmetleri sunarak organizasyonun operasyonlarına değer katar ve bunları geliştirir. Internal auditing adds value and improves an organization's operations by providing independent, objective assurance and advisory services.", "cmt_en": ""}]}, {"q_tr": "Bir iç denetim fonksiyonu kurmanın başlıca nedeni şudur:", "q_en": "A major reason for establishing an internal audit function is to", "answer": 3, "options": [{"tr": "Aşırı yüklü yönetimi etkili kontroller oluşturma sorumluluğundan kurtarmak.", "en": "Relieve overburdened management of the responsibility for establishing effective controls.", "cmt_tr": "Yönetim, iç kontrolün oluşturulmasından sorumludur; iç denetim bu sorumluluğu üstlenemez. Management is responsible for establishing internal control; internal audit cannot assume this responsibility.", "cmt_en": ""}, {"tr": "Organizasyona emanet edilen kaynakları korumak.", "en": "Safeguard resources entrusted to the organization.", "cmt_tr": "Organizasyonun kaynaklarını korumak, yönetişim, risk yönetimi ve kontrol süreçlerinin nihai amacıdır; iç denetimin doğrudan rolü değildir. Safeguarding the organization's resources is the ultimate goal of governance, risk management, and control processes, not a direct role of internal audit.", "cmt_en": ""}, {"tr": "Finansal ve operasyonel bilgilerin güvenilirliğini ve bütünlüğünü sağlamak.", "en": "Ensure the reliability and integrity of financial and operational information.", "cmt_tr": "Finansal ve operasyonel bilgilerin güvenilirliğini sağlamak yönetimin sorumluluğundadır. Ensuring the reliability and integrity of financial and operational information is a management responsibility.", "cmt_en": ""}, {"tr": "Kontrol süreçlerinin etkinliğini değerlendirmek ve geliştirmek.", "en": "Evaluate and improve the effectiveness of control processes.", "cmt_tr": "İç denetim fonksiyonu, sistematik ve disiplinli bir yaklaşımla risk yönetimi, kontrol ve yönetişim süreçlerinin etkinliğini değerlendirerek ve geliştirerek organizasyona yardımcı olur. The internal audit function helps an organization by evaluating and improving the effectiveness of risk management, control, and governance processes through a systematic, disciplined approach.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi iç denetim fonksiyonunun amacını en iyi açıklar?", "q_en": "Which of the following best describes the purpose of the internal audit function?", "answer": 0, "options": [{"tr": "Bir organizasyonun operasyonlarına değer katmak ve bunları geliştirmek.", "en": "To add value and improve an organization's operations.", "cmt_tr": "İç denetim, bağımsız, riske dayalı ve nesnel güvence ve tavsiye sunarak organizasyona değer katmasına yardımcı olur. Internal auditing helps an organization create value by providing independent, risk-based, and objective assurance and advice.", "cmt_en": ""}, {"tr": "Yönetime risk yönetimi ve kontrol sistemlerinin tasarımı ve uygulanmasında yardımcı olmak.", "en": "To assist management with the design and implementation of risk management and control systems.", "cmt_tr": "Risk yönetimi ve kontrol sistemlerinin tasarımı ve uygulanması iç denetçilerin nesnelliğini zedeler. İç denetçi bu sistemleri uygulayan kişiyi denetleyemez. Performing design and implementation of risk management and control systems would impair the objectivity of internal auditors.", "cmt_en": ""}, {"tr": "Yönetime hizmet olarak bir organizasyonun muhasebe sistemini incelemek ve değerlendirmek.", "en": "To examine and evaluate an organization's accounting system as a service to management.", "cmt_tr": "İç denetim, muhasebe sisteminin incelenmesinden çok daha geniş bir kapsama sahiptir. Internal auditing is much broader than examining and evaluating an organization's accounting system.", "cmt_en": ""}, {"tr": "Bağımsız denetçiler için organizasyonun iç kontrol sistemini izlemek.", "en": "To monitor the organization's internal control system for the external auditors.", "cmt_tr": "İç denetim organizasyona hizmet eder; bağımsız denetçilere değil. Internal auditing serves the organization, not the external auditors.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun sorumluluk kapsamı şunları içerir:", "q_en": "The internal audit function's scope of responsibilities includes", "answer": 2, "options": [{"tr": "Riski ortadan kaldırmak.", "en": "Eliminating risk.", "cmt_tr": "Riski ortadan kaldırmak yönetimin sorumluluğundadır; iç denetimin değil. Eliminating risk is a responsibility of management, not the internal audit function.", "cmt_en": ""}, {"tr": "Riski yönetmek.", "en": "Managing risk.", "cmt_tr": "Riski yönetmek yönetimin sorumluluğundadır; iç denetimin değil. Managing risk is a responsibility of management, not the internal audit function.", "cmt_en": ""}, {"tr": "Riski değerlendirmek.", "en": "Evaluating risk.", "cmt_tr": "İç denetim fonksiyonu yönetişim, risk yönetimi ve kontrol süreçlerini değerlendirmek ve geliştirmekten sorumludur. Riski değerlendirmek bu kapsamdadır. The internal audit function is responsible for evaluating and improving governance, risk management, and control processes. Evaluating risk falls within this scope.", "cmt_en": ""}, {"tr": "Riski kontrol etmek.", "en": "Controlling risk.", "cmt_tr": "Riski kontrol etmek yönetimin sorumluluğundadır; iç denetimin değil. Controlling risk is a responsibility of management, not the internal audit function.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonu tarafından sağlanan hizmet türleri en iyi şekilde şöyle tanımlanabilir:", "q_en": "The types of services provided by the internal audit function can best be described as", "answer": 2, "options": [{"tr": "Denetim ve görev.", "en": "Auditing and engagement.", "cmt_tr": "'Görev' bir hizmet türü değil; iç denetim çalışmasının genel adıdır. 'Engagement' is the general name for internal audit work, not a type of service.", "cmt_en": ""}, {"tr": "Denetim ve danışmanlık.", "en": "Auditing and advisory.", "cmt_tr": "IIA Sözlüğü, iç denetim hizmet türlerini denetim ve danışmanlık olarak değil; güvence ve danışmanlık olarak tanımlar. The IIA Glossary defines service types as assurance and advisory, not auditing and advisory.", "cmt_en": ""}, {"tr": "Güvence ve danışmanlık.", "en": "Assurance and advisory.", "cmt_tr": "İç denetim fonksiyonu bağımsız ve nesnel güvence ile danışmanlık hizmetleri sunar. Bu seçenek doğrudur. The internal audit function provides independent and objective assurance and advisory services. This is the correct answer.", "cmt_en": ""}, {"tr": "Denetim ve güvence.", "en": "Auditing and assurance.", "cmt_tr": "IIA Sözlüğü, iç denetim hizmet türlerini denetim ve güvence olarak değil; güvence ve danışmanlık olarak tanımlar. The IIA Glossary defines service types as assurance and advisory, not auditing and assurance.", "cmt_en": ""}]}, {"q_tr": "Bazı kültür ve organizasyonlarda yöneticiler, organizasyonun operasyonlarının eleştirel bir değerlendirmesini sağlamak için iç denetim fonksiyonuna gerek olmadığını savunur. Bu tür bir yönetim tutumunun iç denetim fonksiyonu üzerinde en muhtemel olumsuz etkisi şuna olacaktır:", "q_en": "In some cultures and organizations, managers insist that an internal audit function is not needed to provide a critical assessment of the organization's operations. This kind of management attitude will most probably have an adverse effect on the internal audit function's", "answer": 1, "options": [{"tr": "Operasyonel bütçe sapması.", "en": "Operating budget variance.", "cmt_tr": "Bütçe sapma raporu bir kontrol aracıdır. Yönetimin işbirliği eksikliği olumsuz sapmalara yol açabilir, ancak bu birincil etki değildir. A budget variance report is a control device. Lack of management cooperation could cause unfavorable variances, but this is not the primary impact.", "cmt_en": ""}, {"tr": "Etkinlik.", "en": "Effectiveness.", "cmt_tr": "Yönetim bu tutumla iç denetime karşı çıktığı için iç denetim sorumluluklarını yerine getiremez ve önerileri dikkate alınmaz. Etkinlik en çok bu durumdan etkilenir. With this attitude management resists internal audit, so it cannot fulfill its responsibilities and recommendations are ignored. Effectiveness is most adversely affected.", "cmt_en": ""}, {"tr": "Performans değerlendirmeleri.", "en": "Performance appraisals.", "cmt_tr": "İç denetim personelinin değerlendirmesi, yönetimin işbirliği eksikliğinden etkilenmemelidir. Evaluation of the internal auditing staff should not be affected by lack of management cooperation.", "cmt_en": ""}, {"tr": "Politikalar ve prosedürler.", "en": "Policies and procedures.", "cmt_tr": "İç denetim fonksiyonunun politika ve prosedürleri iç denetim tarafından geliştirilir; yönetimin tutumundan etkilenmemelidir. Policies and procedures of the internal audit function are developed by internal audit and should not be affected by management's attitude.", "cmt_en": ""}]}, {"q_tr": "Fizibilite çalışmasında uygun bir iç denetim rolü şudur:", "q_en": "An appropriate internal auditing role in a feasibility study is to", "answer": 1, "options": [{"tr": "Ön araştırma için görev gücünde yer almak.", "en": "Serve on the task force for the preliminary survey.", "cmt_tr": "Ön araştırma için görev gücünde yer almak, kullanıcılar ve operasyonel yönetim için uygundur; iç denetim için değil. Serving on the task force for the preliminary survey is appropriate for users and functional management, not internal audit.", "cmt_en": ""}, {"tr": "Fizibilite çalışmasının maliyet-fayda ilişkilerini ele alıp almadığını belirlemek.", "en": "Ascertain if the feasibility study addresses cost-benefit relationships.", "cmt_tr": "Bir fizibilite çalışmasının yeterliliğini değerlendirmek, iç denetimin hizmet kapsamı dahilindedir. İç denetim, maliyet-fayda ilişkilerinin ele alınıp alınmadığını belirleyebilir. Assessing the adequacy of a feasibility study is within the scope of internal audit services. Internal audit can ascertain if cost-benefit relationships are addressed.", "cmt_en": ""}, {"tr": "Bir özellikler kılavuzu hazırlamak için gereksinimleri belirlemek.", "en": "Determine the requirements for preparing a manual of specifications.", "cmt_tr": "Özellikler kılavuzu hazırlama gereksinimlerini belirlemek, kullanıcılar ve operasyonel yönetim için uygundur. Determining requirements for preparing a manual of specifications is appropriate for users and functional management.", "cmt_en": ""}, {"tr": "Bilgisayar edinimi ve uygulaması için önerilerin taslağını hazırlamaya katılmak.", "en": "Participate in the drafting of recommendations for the computer acquisition and implementation.", "cmt_tr": "Bilgisayar edinimi ve uygulaması için önerilerin taslağını hazırlamak, bilgisayar uzmanları ve yönetim için uygundur; iç denetim için değil. Drafting recommendations for computer acquisition and implementation is appropriate for computer experts and management, not internal audit.", "cmt_en": ""}]}, {"q_tr": "Aşağıdaki ifadelerden hangisi iç denetim fonksiyonunun amacını en iyi açıklar?", "q_en": "Which of the following statements best describes the purpose of the internal audit function?", "answer": 2, "options": [{"tr": "İç denetçilerin iç denetimin değerini anlamalarına yardımcı olur.", "en": "It helps internal auditors understand the value of internal auditing.", "cmt_tr": "Amaç beyanı yalnızca iç denetçilere değil; hem iç denetçilere hem de paydaşlara yardımcı olur. The purpose statement helps not only internal auditors but also stakeholders.", "cmt_en": ""}, {"tr": "İç denetçilerin iç denetimin değerini ifade etmelerine yardımcı olur.", "en": "It helps internal auditors articulate the value of internal auditing.", "cmt_tr": "Amaç beyanı yalnızca iç denetçilere değil; hem iç denetçilere hem de paydaşlara yardımcı olur. The purpose statement helps not only internal auditors but also stakeholders.", "cmt_en": ""}, {"tr": "İç denetçilerin ve paydaşların iç denetimin değerini anlamalarına ve ifade etmelerine yardımcı olur.", "en": "It helps internal auditors and stakeholders understand and articulate the value of internal auditing.", "cmt_tr": "Amaç beyanı, hem iç denetçilerin hem de paydaşların iç denetimin değerini anlamalarına ve ifade etmelerine yardımcı olur. Bu seçenek doğrudur. The purpose statement helps both internal auditors and stakeholders understand and articulate the value of internal auditing. This is the correct answer.", "cmt_en": ""}, {"tr": "Paydaşların iç denetimin değerini anlamalarına ve ifade etmelerine yardımcı olur.", "en": "It helps stakeholders understand and articulate the value of internal auditing.", "cmt_tr": "Amaç beyanı yalnızca paydaşlara değil; hem iç denetçilere hem de paydaşlara yardımcı olur. The purpose statement helps not only stakeholders but also internal auditors.", "cmt_en": ""}]}, {"q_tr": "Şirketin yeni CEO'su şirketi yeniden yapılandırmaktadır. CFO büyük ihtimalle şunu açıklar:", "q_en": "A company's new CEO is restructuring the company. The CFO would most likely explain that", "answer": 1, "options": [{"tr": "Şirket iç denetimi dış kaynak olarak alabilir ve tüm sorumluluğu o firmaya devredebilir.", "en": "The company could outsource internal auditing and delegate all responsibility to that firm.", "cmt_tr": "Dış kaynak kullanılsa dahi, şirket iç denetimden sorumlu olmaya devam eder ve doğrudan yönetim kuruluna hesap verir. Even if outsourced, the company remains responsible for internal auditing and directly accountable to the board.", "cmt_en": ""}, {"tr": "Kalite güvence fonksiyonundan farklı olarak, iç denetim fonksiyonu bağımsızdır ve doğrudan yönetim kuruluna karşı sorumludur.", "en": "Unlike the quality assurance function, the internal audit function is independent with direct accountability to the board.", "cmt_tr": "Kalite güvence fonksiyonundan farklı olarak iç denetim bağımsızdır ve doğrudan yönetim kuruluna hesap verir; bu da nesnel güvence ve tavsiye sağlamasını mümkün kılar. Unlike quality assurance, internal audit is independent with direct accountability to the board, enabling objective assurance and advice free of undue influence.", "cmt_en": ""}, {"tr": "Kalite güvence fonksiyonunun aksine, iç denetim fonksiyonu karar almayı geliştirmez.", "en": "The internal audit function does not enhance decision making, unlike the quality assurance function.", "cmt_tr": "İç denetim fonksiyonu aynı zamanda karar alma ve gözetimi de güçlendirir. The internal audit function also enhances decision making and oversight.", "cmt_en": ""}, {"tr": "İki bölüm verimliliği artırmak için CEO'ya raporlayan tek bir departmanda birleştirilebilir.", "en": "The two departments could be combined reporting to the CEO to maximize efficiency.", "cmt_tr": "İki departmanı CEO'ya doğrudan raporlayan tek bir birimde birleştirmek, iç denetim fonksiyonunun bağımsızlığını zedeler. Combining the two departments reporting directly to the CEO would impair the independence of the internal audit function.", "cmt_en": ""}]}, {"q_tr": "CAE, iç denetim yetkisinde değişiklik yapmayı ne sıklıkta düşünmelidir?", "q_en": "How frequently should the CAE consider making changes to the internal audit mandate?", "answer": 1, "options": [{"tr": "Her 5 yılda bir.", "en": "Every 5 years.", "cmt_tr": "CAE, değişiklikleri en az yılda bir değerlendirmelidir; 5 yıl çok uzun bir süreçtir. The CAE should consider changes at least annually; 5 years is too long a period.", "cmt_en": ""}, {"tr": "En az yılda bir.", "en": "At least annually.", "cmt_tr": "Küresel Standartlardaki önemli değişiklikler, önemli satın almalar, yönetim kurulundaki değişiklikler veya yeni yasa ve yönetmelikler gibi koşullar en az yılda bir değerlendirilmelidir. Circumstances such as notable changes in the Global Standards, significant acquisitions, changes in board or management, or new laws should be considered at least annually.", "cmt_en": ""}, {"tr": "Aylık bazda.", "en": "On a monthly basis.", "cmt_tr": "Her ay değişiklik değerlendirmek ve yapmak genellikle çok sık olur; iç denetim fonksiyonu tutarlı bir yön izleyemez. Evaluating and making changes monthly is generally too frequent; the internal audit function would not have consistent direction.", "cmt_en": ""}, {"tr": "Yalnızca yeniden yapılanma olduğunda.", "en": "Only when there is a reorganization.", "cmt_tr": "Yeniden yapılanma dışında da değişiklik gerektiren koşullar olabilir. Other changes in circumstances besides reorganization may warrant consideration.", "cmt_en": ""}]}, {"q_tr": "Operasyonel amaç ve hedefler açısından bir iç denetçinin rolü şunları içerir:", "q_en": "An internal auditor's role with respect to operating objectives and goals includes", "answer": 1, "options": [{"tr": "Gerçekleştirilecek operasyonel amaç veya hedefleri onaylamak.", "en": "Approving the operating objectives or goals to be met.", "cmt_tr": "Operasyonel amaç veya hedefleri onaylamak, yönetimin sorumluluğundadır. Approving operating objectives or goals is a management responsibility.", "cmt_en": ""}, {"tr": "Bunların organizasyonun amaçlarıyla uyumlu olduğunu belirlemek.", "en": "Determining that they conform with those of the organization.", "cmt_tr": "İç denetçiler, operasyonel ve program amaç ve hedeflerinin belirlenip belirlenmediğini ve organizasyonun amaçlarıyla uyumlu olup olmadığını belirlemelidir. Internal auditors should ascertain whether operating and program goals and objectives have been established and conform with those of the organization.", "cmt_en": ""}, {"tr": "Kontrol prosedürleri geliştirmek ve uygulamak.", "en": "Developing and implementing control procedures.", "cmt_tr": "Kontrol prosedürleri geliştirmek ve uygulamak yönetimin sorumluluğundadır. Developing and implementing control procedures is a management responsibility.", "cmt_en": ""}, {"tr": "İstenilen operasyonel program sonuçlarını elde etmek.", "en": "Accomplishing desired operating program results.", "cmt_tr": "İstenen operasyonel program sonuçlarını elde etmek yönetimin sorumluluğundadır. Accomplishing desired operating program results is a management responsibility.", "cmt_en": ""}]}, {"q_tr": "IIA'nın iç denetim tanımındaki değer önerisi hakkında aşağıdakilerden hangisi doğrudur?", "q_en": "Which of the following is true about the value proposition in The IIA's definition of internal auditing?", "answer": 2, "options": [{"tr": "İç denetim fonksiyonu organizasyona değer katmaz.", "en": "The internal audit function does not add value to an organization.", "cmt_tr": "İç denetimin amacı, organizasyonun değer yaratma, koruma ve sürdürme yeteneğini güçlendirmektir. The purpose of internal auditing is to strengthen the organization's ability to create, protect, and sustain value.", "cmt_en": ""}, {"tr": "Yalnızca iç denetim fonksiyonunun danışmanlık hizmetleri değer sağlar.", "en": "Only the advisory services of the internal audit function provide value.", "cmt_tr": "Güvence hizmetleri de değer katar; yalnızca danışmanlık hizmetleri değil. Assurance services also add value; not only advisory services.", "cmt_en": ""}, {"tr": "Güvence ve danışmanlık hizmetleri organizasyona değer katar.", "en": "Assurance and advisory services add value to the organization.", "cmt_tr": "Hem güvence hem de danışmanlık hizmetleri organizasyona değer katar. Bu seçenek doğrudur. Both assurance and advisory services add value to the organization. This is the correct answer.", "cmt_en": ""}, {"tr": "Yalnızca iç denetim fonksiyonunun güvence hizmetleri organizasyona değer katar.", "en": "Only the assurance services of the internal audit function add value to the organization.", "cmt_tr": "Danışmanlık hizmetleri de değer katar; yalnızca güvence hizmetleri değil. Advisory services also add value; not only assurance services.", "cmt_en": ""}]}], "SU2 - Charter": [{"q_tr": "Aşağıdakilerden hangisi iç denetim tüzüğüne mutlaka dahil edilmelidir?", "q_en": "Which one of the following must be included in the internal audit charter?", "answer": 1, "options": [{"tr": "İç denetim nesnelliği.", "en": "Internal audit objectivity.", "cmt_tr": "Nesnellik, bireysel denetçilerin bir özelliğidir ve iç denetim tüzüğüne dahil edilmez. Objectivity is an attribute of individual auditors and is not included in the internal audit charter.", "cmt_en": ""}, {"tr": "İç denetimin amacı.", "en": "Internal audit purpose.", "cmt_tr": "İç denetim tüzüğü; amacı, Standartlara bağlılığı, yetkiyi, kapsamı ve hizmet türlerini belirtir. Amaç mutlaka dahil edilmelidir. The internal audit charter specifies the purpose, adherence to the Standards, mandate, scope, and services. Purpose must be included.", "cmt_en": ""}, {"tr": "Baş denetim yöneticisinin ücret planı.", "en": "Chief audit executive's compensation plan.", "cmt_tr": "CAE'nin ücret planı tüzüğe dahil edilmesi uygun bir konu değildir. The CAE's compensation plan is not an appropriate matter to include in the internal audit charter.", "cmt_en": ""}, {"tr": "Gerekli asgari tam zamanlı iç denetim personeli sayısı.", "en": "Number of full-time internal audit employees deemed to be the necessary minimum.", "cmt_tr": "Personel sayısı CAE ve yönetim kurulu tarafından belirlenir; tüzüğe dahil edilmesi uygun değildir. The staffing number is determined by the CAE and board; it is not appropriate to include in the charter.", "cmt_en": ""}]}, {"q_tr": "Bir CAE'nin iç denetim fonksiyonunun sorumluluklarını yerine getirmesine olanak tanıyan bir raporlama ilişkisine sahip olması gerekir. Böyle bir raporlama ilişkisinin kanıtı şudur:", "q_en": "A CAE must have a reporting relationship that allows the internal audit function to fulfill its responsibilities. Evidence of such a reporting relationship is", "answer": 0, "options": [{"tr": "İç denetim fonksiyonunun raporlama ilişkilerini belgeleyen iç denetim tüzüğü.", "en": "The internal audit charter, which documents the internal audit function's reporting relationships.", "cmt_tr": "İç denetim tüzüğü, fonksiyonun raporlama ilişkilerini belgeler; özellikle yönetim kuruluna fonksiyonel raporlamayı. Bu seçenek doğrudur. The internal audit charter documents the function's reporting relationships, specifically functional reporting to the board.", "cmt_en": ""}, {"tr": "Riske dayalı iç denetim planının yönetim tarafından onaylanması.", "en": "Approval of the risk-based internal audit plan by management.", "cmt_tr": "Riske dayalı iç denetim planı yönetim kurulu tarafından onaylanmalıdır; yönetim tarafından değil. The risk-based internal audit plan must be approved by the board, not management.", "cmt_en": ""}, {"tr": "Kapsam ve kaynak kısıtlamalarına ilişkin yönetim sorularına verilen yanıt.", "en": "A response to inquiries of management about scope and resource limitations.", "cmt_tr": "Yönetim kurulu, uygunsuz kapsam ve kaynak kısıtlamaları hakkında CAE'yi sorgulamalıdır; yönetimi değil. The board should inquire of the CAE about inappropriate scope and resource limitations, not of management.", "cmt_en": ""}, {"tr": "Yönetimin iç denetim ekibiyle doğrudan bağlantı kurduğu bir durumu belgeleyen toplantı tutanakları.", "en": "Meeting minutes that document a circumstance in which management created a direct connection between management and the internal audit team.", "cmt_tr": "CAE ile iç denetim ekibi arasında doğrudan bir bağlantı oluşturmak yönetim kurulunun görevidir, yönetimin değil. It is the board, not management, that must create a direct connection between the CAE and the internal audit team.", "cmt_en": ""}]}, {"q_tr": "CAE, yönetim kurulundan danışmanlık hizmetleri sunma onayını aldıktan sonra ne yapılmalıdır?", "q_en": "After the CAE receives approval from the board to offer advisory services, what should be done?", "answer": 2, "options": [{"tr": "CAE danışmanlık hizmetleri sunmaya başlamalıdır.", "en": "The CAE should begin performing advisory services.", "cmt_tr": "Yönetim kurulu onayının ardından iç denetim tüzüğü değiştirilmeli ve CAE politika ve prosedürler oluşturmalıdır; hemen başlanamaz. After board approval, the internal audit charter must be amended and the CAE must establish policies and procedures before beginning.", "cmt_en": ""}, {"tr": "CAE, iç denetçilerden onay almalıdır.", "en": "The CAE should get approval from the internal auditors.", "cmt_tr": "CAE yalnızca yönetim kurulunun onayına ihtiyaç duyar; iç denetçilerden ek onay gerekmez. The CAE needs only board approval; additional approval from internal auditors is not required.", "cmt_en": ""}, {"tr": "İç denetim tüzüğü değiştirilmelidir.", "en": "The internal audit charter should be amended.", "cmt_tr": "İç denetim hizmetlerinin niteliği tüzükte tanımlanmalıdır. Danışmanlık hizmetleri eklenecekse tüzük değiştirilmelidir. The nature of advisory services must be defined in the charter. If advisory services are added, the charter must be amended.", "cmt_en": ""}, {"tr": "Yönetim kurulu bu tür görevlerin yürütülmesi için uygun politika ve prosedürler geliştirmelidir.", "en": "The board should develop appropriate policies and procedures for conducting such engagements.", "cmt_tr": "Politika ve prosedürleri yönetim kurulu değil, CAE oluşturur. The CAE, not the board, must establish policies and procedures to guide the internal audit function.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun yetkisi şu tarafından verilen yetkiyle sınırlıdır:", "q_en": "The authority of the internal audit function is limited to that granted by", "answer": 2, "options": [{"tr": "Yönetim kurulu ve muhasebe müdürü.", "en": "The board and the controller.", "cmt_tr": "Muhasebe müdürü tüm yönetimi temsil etmez; yetki kaynağı yalnızca muhasebe müdürü olamaz. The controller does not represent all of management; authority cannot come from the controller alone.", "cmt_en": ""}, {"tr": "Üst yönetim ve Standartlar.", "en": "Senior management and the Standards.", "cmt_tr": "Standartlar, bir iç denetim fonksiyonuna gerçek yetki sağlayamaz. The Standards cannot provide actual authority to an internal audit function.", "cmt_en": ""}, {"tr": "Üst yönetim ve yönetim kurulu.", "en": "Senior management and the board.", "cmt_tr": "Tüzük, üst yönetim ve yönetim kurulu tarafından onaylanmalıdır; yetki bu iki kaynaktan gelir. The charter must be approved by senior management and the board; authority comes from both sources.", "cmt_en": ""}, {"tr": "Yönetim kurulu ve mali işler direktörü.", "en": "The board and the chief financial officer.", "cmt_tr": "Yetki belirli bir yöneticiden değil; yönetim ve yönetim kurulundan gelir. Authority comes from management and the board, not from a particular manager.", "cmt_en": ""}]}, {"q_tr": "Borç hesaplarını değerlendirmeye yönelik bir görev sırasında, bir iç denetçi bakiyeleri tedarikçilerle teyit etmeyi planlar. Organizasyon dışındaki birimlerle bu tür temaslar için yetki kaynağı nedir?", "q_en": "During an engagement to evaluate accounts payable, an internal auditor plans to confirm balances with suppliers. What is the source of authority for such contacts with units outside the organization?", "answer": 3, "options": [{"tr": "İç denetim fonksiyonu politika ve prosedürleri.", "en": "Internal audit function policies and procedures.", "cmt_tr": "Politika ve prosedürler, iç denetçilere tutarlı performans standartlarına uymada rehberlik eder; dış birimlerle temas için yetki kaynağı değildir. Policies and procedures guide internal auditors in consistent compliance with performance standards; they are not the source of authority for external contacts.", "cmt_en": ""}, {"tr": "Standartlar.", "en": "The Standards.", "cmt_tr": "İç denetim fonksiyonunun yetkisi, yönetim kurulu tarafından onaylanan tüzükte tanımlanır; Standartlarda değil. The internal audit function's authority is defined in a charter approved by the board, not in the Standards.", "cmt_en": ""}, {"tr": "Küresel Uygulama Kılavuzları.", "en": "Global Practice Guides.", "cmt_tr": "Küresel Uygulama Kılavuzları, görev yürütme için kapsamlı rehberlik sunar; ancak yetki kaynağı değildir. Global Practice Guides offer comprehensive guidance for executing tasks; they are not the source of authority.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun tüzüğü.", "en": "The internal audit function's charter.", "cmt_tr": "Tüzük, organizasyon içi ve dışı ilişkileri tanımlar; dış birimlerle temas için yetki kaynağıdır. The charter defines relationships inside and outside the organization; it is the source of authority for external contacts.", "cmt_en": ""}]}, {"q_tr": "Yönetim kurulu CAE'yi tüzük geliştirmekle görevlendirdi. Amaçlar beyanında hangi madde yer almalıdır?", "q_en": "The board has charged the CAE with developing a charter. What item should be included in the statement of objectives?", "answer": 2, "options": [{"tr": "Tüm görev sonuçlarını her çeyrek yönetim kuruluna bildirmek.", "en": "Report all engagement results to the board every quarter.", "cmt_tr": "Yalnızca önemli görev sonuçları yönetim kuruluyla paylaşılır; tümü değil. Only significant engagement results are discussed with the board, not all of them.", "cmt_en": ""}, {"tr": "Organizasyon yönetiminin etik dışı iş uygulamaları konusunda devlet düzenleyici kurumlarını bilgilendirmek.", "en": "Notify governmental regulatory agencies of unethical business practices by organization management.", "cmt_tr": "İç denetçiler, düzenleyici ihlalleri ilgili kurumlara bildirmekle genellikle yükümlü değildir; ancak yasaya uymak zorundadır. Internal auditors are generally not required to report regulatory compliance deficiencies to agencies; however, they must observe the law.", "cmt_en": ""}, {"tr": "Organizasyonun kontrollerinin yeterliliğini ve etkinliğini değerlendirmek.", "en": "Evaluate the adequacy and effectiveness of the organization's controls.", "cmt_tr": "İç denetim, risk yönetimi ve kontrol süreçlerini değerlendirme ve geliştirmeye yönelik sistematik bir yaklaşım benimser. Kontrollerin yeterliliğini değerlendirmek tüzüğe dahil edilmelidir. Internal auditing evaluates and improves risk management and control processes. Evaluating the adequacy of controls should be included in the charter.", "cmt_en": ""}, {"tr": "Her ay yönetime bütçe sapma raporları sunmak.", "en": "Submit budget variance reports to management every month.", "cmt_tr": "Bütçe sapma raporları sunmak iç denetimin birincil amacı değildir; bu yönetimin periyodik olarak talep edebileceği idari bir kontroldür. Submitting budget variance reports is not a primary objective of internal auditing; it is an administrative control management may require periodically.", "cmt_en": ""}]}, {"q_tr": "Tüzük, iç denetim fonksiyonunun bağımsızlığını olumlu etkileyen önemli faktörlerden biridir. Aşağıdakilerden hangisinin tüzüğün bir parçası olma ihtimali en düşüktür?", "q_en": "A charter is one of the more important factors positively affecting the internal audit function's independence. Which of the following is least likely to be part of the charter?", "answer": 2, "options": [{"tr": "Organizasyon içindeki kayıtlara erişim.", "en": "Access to records within the organization.", "cmt_tr": "Tüzük, organizasyon içindeki kayıtlara erişimi açıkça yetkilendirir. The charter authorizes access to records within the organization.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonlarının kapsamı.", "en": "The scope of internal audit functions.", "cmt_tr": "Tüzük, iç denetim fonksiyonunun kapsamını tanımlar. The charter defines the scope of internal audit functions.", "cmt_en": ""}, {"tr": "Baş denetim yöneticisinin görev süresi.", "en": "The length of tenure of the chief audit executive.", "cmt_tr": "CAE'nin görev süresinin uzunluğu tüzükte yer almamalıdır; bu yönetim kurulunun süregelen takdirine bırakılmış bir konudur. The length of the CAE's tenure should not be codified in the charter; it is a matter of ongoing judgment for the board.", "cmt_en": ""}, {"tr": "Organizasyon içindeki personele erişim.", "en": "Access to personnel within the organization.", "cmt_tr": "Tüzük, organizasyon içindeki personele erişimi açıkça yetkilendirir. The charter authorizes access to personnel within the organization.", "cmt_en": ""}]}, {"q_tr": "Kalite güvence departmanı, etkinliğini değerlendirmeye yönelik bir görevin iç denetim fonksiyonunun kapsamı dahilinde olmadığını savunur. En uygun yanıt nedir?", "q_en": "The quality assurance department argues that an engagement to evaluate its effectiveness is not within the scope of the internal audit function. What is the most appropriate response?", "answer": 0, "options": [{"tr": "Mevcut dönemde değerlendirme için belirlenen faaliyeti içeren iç denetim fonksiyonunun tüzüğüne ve onaylanan görev planına başvurmak.", "en": "Refer to the internal audit function's charter and the approved engagement plan that includes the activity designated for evaluation in the current time period.", "cmt_tr": "Yönetim kurulu tarafından onaylanan yazılı tüzük, iç denetim faaliyetlerinin kapsamını tanımlar. Bu seçenek doğrudur. The written charter, approved by the board, defines the scope of internal audit activities. This is the correct answer.", "cmt_en": ""}, {"tr": "Görevin kapsamını belirlemek için arabulucu olarak üst yönetimin onayını almak.", "en": "Seek the approval of senior management as a mediator to set the scope of the engagement.", "cmt_tr": "Departman, assurance görevinin kapsamını belirleyemez. Departman tarafından dayatılan kapsam sınırlaması iç denetimin amaçlarına ulaşmasını engelleyebilir. The department does not determine the scope of this type of assurance engagement. A scope limitation imposed by the department might prevent internal audit from achieving its objectives.", "cmt_en": ""}, {"tr": "Görevin departmanı yalnızca kalite güvence departmanının belirlediği standartlara göre değerlendireceğini belirtmek.", "en": "Indicate that the engagement will evaluate the department only in accordance with the standards set by the quality assurance department.", "cmt_tr": "Diğer hedefler üst yönetim ve iç denetçiler tarafından belirlenebilir; görev yalnızca kalite güvence departmanının standartlarıyla sınırlı değildir. Other objectives may be established by senior management and internal auditors; the engagement is not limited to the quality assurance department's specific standards.", "cmt_en": ""}, {"tr": "Departmanın işbirliği olmadan verimli olmayacağı için görevi sonlandırmak.", "en": "Terminate the engagement because it will not be productive without the department's cooperation.", "cmt_tr": "İç denetçiler görevi yürütmeli ve kapsam sınırlamalarını üst yönetime ve yönetim kuruluna bildirmelidir. Internal auditors must conduct the engagement and communicate any scope limitations to senior management and the board.", "cmt_en": ""}]}, {"q_tr": "CAE, bir denetçiyi bordro kayıtlarını değerlendirmekle görevlendirdi. Denetçi gerekli belgelere erişimi reddedildi. Bu sorunun önüne geçmek için,", "q_en": "The CAE has assigned an auditor to evaluate payroll records. The auditor has been refused access to necessary documents. To avoid this problem,", "answer": 0, "options": [{"tr": "Görevlerin yürütülmesiyle ilgili kayıtlara erişim iç denetim fonksiyonunun tüzüğünde belirtilmelidir.", "en": "Access to records relevant to performance of engagements should be specified in the internal audit function's charter.", "cmt_tr": "İç denetim tüzüğünde, görevlerin yürütülmesiyle ilgili kayıtlara erişim yetkisi açıkça belirtilmelidir. Bu seçenek doğrudur. Access to records relevant to performance of engagements should be specified in the internal audit function's charter. This is the correct answer.", "cmt_en": ""}, {"tr": "İç denetim, organizasyonun CEO'suna raporlamakla yükümlü kılınmalıdır.", "en": "Internal auditing should be required to report to the CEO of the organization.", "cmt_tr": "İç denetim fonksiyonu belirli bir kişiye raporlamak zorunda değildir; ancak idari olarak CEO'ya raporlamak tercih edilir. The internal audit function need not report to a specific individual, although reporting administratively to the CEO is desirable.", "cmt_en": ""}, {"tr": "Uzun vadeli planlama sürecine uyularak tüm ilgili kayıtlara erişim garanti edilmelidir.", "en": "By following the long-range planning process, access to all relevant records should be guaranteed.", "cmt_tr": "Uzun vadeli planlama süreci, tüm ilgili kayıtlara erişimi garanti etmez. Following the long-range planning process provides no guarantee of access to all relevant records.", "cmt_en": ""}, {"tr": "Tüm kapsam sınırlamaları için yönetim kurulu onayı şart koşulmalıdır.", "en": "Board approval should be required for all scope limitations.", "cmt_tr": "İç denetim fonksiyonu yönetim kuruluna kapsam sınırlamalarını bildirmek zorundadır; ancak yönetim kurulunun onayı şart değildir. The internal audit function must inform the board of any scope limitations, but the board's approval is not required.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun organizasyonel konumunun yönetimin sorumsuz politika değişikliklerinden etkilenmemesini sağlamanın en etkili yolu şudur:", "q_en": "The most effective way to ensure that the organizational position of the internal audit function is free from the effects of irresponsible policy changes by management is to", "answer": 0, "options": [{"tr": "İç denetim tüzüğünü yönetim kurulu tarafından onaylatmak.", "en": "Have the internal audit charter approved by the board.", "cmt_tr": "İç denetim tüzüğü, amacı, yetkiyi ve sorumluluğu tanımlayan resmi bir belgedir ve nihai onayı yönetim kuruluna aittir. Bu seçenek doğrudur. The internal audit charter is a formal document defining purpose, authority, and responsibility, with final approval residing with the board.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun işleyişi için politikalar benimsemek.", "en": "Adopt policies for the functioning of the internal audit function.", "cmt_tr": "İç denetim fonksiyonu için politika benimsemek, organizasyonel konumunu korumaz. Adoption of policies for the internal audit function does not protect its organizational position.", "cmt_en": ""}, {"tr": "Yönetim kurulu bünyesinde bir denetim komitesi kurmak.", "en": "Establish an audit committee within the board.", "cmt_tr": "Denetim komitesi kurulması tek başına iç denetim fonksiyonunun statüsünü güvence altına almaz. Establishment of an audit committee alone does not ensure the status of the internal audit function.", "cmt_en": ""}, {"tr": "Performans standartları olarak hizmet edecek yazılı politika ve prosedürler geliştirmek.", "en": "Develop written policies and procedures to serve as standards of performance.", "cmt_tr": "Yazılı politika ve prosedürler iç denetçiye rehberlik eder; ancak yönetim üzerinde çok az etkisi vardır. Written policies and procedures guide the internal auditor but have little effect on management.", "cmt_en": ""}]}, {"q_tr": "İç denetim tüzüğüne ilişkin aşağıdakilerden hangisi doğru değildir?", "q_en": "Which of the following is not true with regard to the internal audit charter?", "answer": 1, "options": [{"tr": "İç denetim fonksiyonu için yetki ve sorumlulukları tanımlar.", "en": "It defines the authorities and responsibilities for the internal audit function.", "cmt_tr": "Tüzük, iç denetim fonksiyonu için amaç, yetki ve sorumlulukları resmi olarak tanımlar. The charter formally defines the purpose, authority, and responsibilities for the internal audit function.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonu için gereken minimum kaynakları belirtir.", "en": "It specifies the minimum resources needed for the internal audit function.", "cmt_tr": "Kaynak gereksinimleri, organizasyonel hedeflerle tutarlı riske dayalı planlara dayanır; tüzüğe kodifiye edilmesi uygun değildir. Resource requirements are based on risk-based plans consistent with organizational objectives; they are not an appropriate topic to codify in the charter.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun değerlendirilmesi için bir temel sağlar.", "en": "It provides a basis for evaluating the internal audit function.", "cmt_tr": "Yönetim kurulu, yazılı tüzüğü iç denetim fonksiyonunu değerlendirmek için temel olarak kullanabilir. The board can use the written charter as a basis for evaluating the internal audit function.", "cmt_en": ""}, {"tr": "Yönetim kurulu tarafından onaylanmalıdır.", "en": "It should be approved by the board.", "cmt_tr": "İç denetim tüzüğünün nihai onayı yönetim kuruluna aittir. Final approval of the internal audit charter resides with the board.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi iç denetim tüzüğüne dahil edilmez?", "q_en": "Which one of the following is not included in the internal audit charter?", "answer": 0, "options": [{"tr": "İç denetim fonksiyonunun risk değerlendirmesi.", "en": "Risk assessment of the internal audit function.", "cmt_tr": "Risk değerlendirmesi, iç denetim tüzüğüne dahil edilmesi uygun değildir. A risk assessment is not appropriate for inclusion in the internal audit charter.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun sorumluluğu.", "en": "Responsibility of the internal audit function.", "cmt_tr": "İç denetim tüzüğünün uygun içeriği; amaç, yetki ve sorumluluktur. The appropriate contents of the internal audit charter are the purpose, authority, and responsibility.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun amacı.", "en": "Purpose of the internal audit function.", "cmt_tr": "İç denetim tüzüğünün uygun içeriği; amaç, yetki ve sorumluluktur. The appropriate contents of the internal audit charter are the purpose, authority, and responsibility.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun yetkisi.", "en": "Authority of the internal audit function.", "cmt_tr": "İç denetim tüzüğünün uygun içeriği; amaç, yetki ve sorumluluktur. The appropriate contents of the internal audit charter are the purpose, authority, and responsibility.", "cmt_en": ""}]}, {"q_tr": "Ulaştırma departmanı, önerilen yeni bir depo için tasarım özelliklerini incelemesi amacıyla iç denetim fonksiyonundan talepte bulundu. İç denetim fonksiyonunun talebi reddetmesinin en iyi nedeni şudur:", "q_en": "The transportation department has asked the internal audit function to review design specifications for a proposed new warehouse. The best reason for the internal audit function to decline the request is", "answer": 0, "options": [{"tr": "Böyle bir inceleme, iç denetim tüzüğünde verilen yetki kapsamına girmemektedir.", "en": "Such a review does not fall within the authority granted in the internal audit charter.", "cmt_tr": "İç denetim fonksiyonunun amacı, yetkisi ve sorumluluğu, yönetim kurulu tarafından onaylanan yazılı tüzükle özel olarak verilir. Bu seçenek doğrudur. The internal audit function's purpose, authority, and responsibility are specifically granted in the form of a written charter approved by the board.", "cmt_en": ""}, {"tr": "CEO ve ulaştırma departmanı başkanı komşudur ve aynı sosyal kulüplere aittir.", "en": "The CEO and the head of the transportation department are neighbors and belong to the same social clubs.", "cmt_tr": "Bağımsızlık tutumu, denetlenenler ve yönetim için değil; iç denetçiler için gereklidir. An attitude of independence is required for internal auditors, not for auditees and management.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonu önceki yıl ulaştırma departmanının kapsamlı bir incelemesini gerçekleştirdi.", "en": "The internal audit function performed a thorough review of the transportation department the previous year.", "cmt_tr": "İç denetim görevleri; geçen süreden bağımsız olarak risk değerlendirmesine dayalı olarak planlanır. Internal audit engagements are scheduled based on a risk assessment, not simply time elapsed since the last engagement.",
