ines Model,", "answer": 1, "options": [{"tr": "Yalnızca yönetim organının birinci hat rolleri vardır.", "en": "Only the governing body has first line roles.", "cmt_tr": "Yönetim birinci (ve ikinci) hat rollerine sahiptir. Yönetim organını 'bir hatta' olarak tanımlamak mantıklı olsa da IIA bu sözleşmeyi karışıklığı önlemek için kullanmamayı tercih etmiştir. Management has first (and second) line roles. Describing the governing body as on a 'line' is logical, but The IIA elected not to use this to avoid confusion.", "cmt_en": ""}, {"tr": "Birinci hat rolleri destek fonksiyonlarını içerir.", "en": "First line roles include support functions.", "cmt_tr": "Birinci hat rolleri; hem ön hem de arka ofis operasyonlarında temel destek fonksiyonları dahil, hem operasyonel hem de entegre danışmanlık faaliyetleri yürüten yönetim fonksiyonlarından oluşur. First line roles comprise management functions that drive both operational and integrated advisory activities, including essential support functions across front and back office operations.", "cmt_en": ""}, {"tr": "İkinci hat rolleri müşterilere ürün teslimatını içerir.", "en": "Second line roles involve delivery of products to clients.", "cmt_tr": "İkinci hat rolleri, risk konularını vurgulayan tamamlayıcı faaliyetlerdir; ürün teslimatını değil. Second line roles are complementary activities emphasizing risk-related matters, not product delivery.", "cmt_en": ""}, {"tr": "Üçüncü hat rolleri ağırlıklı olarak bağımsız denetçiler tarafından yerine getirilir.", "en": "Third line roles are performed primarily by external auditors.", "cmt_tr": "Üçüncü hat rolleri, yönetişim ve risk yönetimi süreçleri hakkında güvence ve tavsiye sağlamak için iç denetçiler tarafından yürütülür; öncelikli olarak bağımsız denetçiler tarafından değil. Third line roles are performed by internal auditors to provide assurance and advice on governance and risk management, not primarily by external auditors.", "cmt_en": ""}]}, {"q_tr": "Etkin bir iç denetim stratejisi ve iç denetim planı, CAE'nin şunu yapmasını gerektirir:", "q_en": "An effective internal audit strategy and internal audit plan requires the CAE to", "answer": 0, "options": [{"tr": "Risk yönetimini anlamak.", "en": "Understand risk management.", "cmt_tr": "Etkin bir iç denetim stratejisi ve planı, CAE'nin risk yönetimini anlamasını gerektirir. An effective internal audit strategy and plan requires the CAE to understand risk management.", "cmt_en": ""}, {"tr": "Bir iç kontrol çerçevesi oluşturmak.", "en": "Create an internal controls framework.", "cmt_tr": "Etkin bir strateji ve plan, iç kontrol çerçevesi oluşturmayı gerektirmez. An effective strategy and plan do not require creating an internal controls framework.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonu kaynak ihtiyaçlarının 5 yıllık tahminini hazırlamak.", "en": "Prepare a 5-year forecast of internal audit function resource needs.", "cmt_tr": "5 yıllık tahmin özellikle gerekli değildir; ancak plan kaynak ihtiyacı tahminini içerebilir. A 5-year forecast is not specifically required; the plan may include resource forecast but not necessarily for 5 years.", "cmt_en": ""}, {"tr": "Bağımsızlık endişelerini CEO ile iletişim kurmak.", "en": "Communicate independence concerns with the CEO.", "cmt_tr": "Bağımsızlık endişeleri CEO ile değil; yönetim kuruluyla paylaşılmalıdır. Independence concerns should be communicated with the board, not the CEO.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modeline göre, birinci hattın birincil rolü nedir?", "q_en": "According to the Three Lines Model, what is the primary role of the first line?", "answer": 1, "options": [{"tr": "Risk yönetimi süreçleri için denetim ve rehberlik.", "en": "Oversight and guidance for risk management processes.", "cmt_tr": "Denetim ve rehberlik, ikinci hat savunmasıyla ilgili rollerdir. Oversight and guidance are roles associated with the second line of defense.", "cmt_en": ""}, {"tr": "Risklerin günlük yönetimi ve organizasyonel hedeflerin gerçekleştirilmesi.", "en": "Day-to-day management of risks and achievement of organizational objectives.", "cmt_tr": "Üç Savunma Hattı Modeli'nde birinci hat; günlük operasyonları yürüten ve organizasyonel hedeflere ulaşmaktan sorumlu yönetim ve personeldir. The first line involves management and staff directly responsible for risk management and achieving organizational objectives through daily operations.", "cmt_en": ""}, {"tr": "Yönetişim süreçlerinin etkinliği hakkında bağımsız güvence sağlamak.", "en": "Providing independent assurance on the effectiveness of governance processes.", "cmt_tr": "Bağımsız güvence, üçüncü hat olan iç denetimin sorumluluğundadır. Independent assurance is the responsibility of the third line, internal audit.", "cmt_en": ""}, {"tr": "Risk yönetimi çerçeveleri ve araçları geliştirmek.", "en": "Developing risk management frameworks and tools.", "cmt_tr": "Risk yönetimi çerçeveleri geliştirmek, genellikle birinci hattı desteklemek için ikinci hattın bir fonksiyonudur. Developing risk management frameworks is typically a function of the second line to support the first line.", "cmt_en": ""}]}, {"q_tr": "Yeni bir CAE, organizasyonun risk yönetimi sürecini anlamaya çalışmaktadır. CAE'nin anlaması gereken risk yönetiminin bir yönünü hangisi en iyi açıklar?", "q_en": "A new CAE is developing an understanding of the organization's risk management process. Which best describes an aspect of risk management that the CAE is required to understand?", "answer": 1, "options": [{"tr": "Hazine departmanının yatırım portföyünü yönetmek için türev araçları nasıl kullandığının ayrıntıları.", "en": "The details of how the treasury department uses derivatives to manage the investment portfolio.", "cmt_tr": "Türev araçların teknik ayrıntılarını anlamak CAE'den beklenmez; ancak portföy riskini yönetme sürecine genel bir anlayış gereklidir. Understanding the technical details of derivatives is not expected of the CAE; however, understanding the overall process of managing portfolio risk is necessary.", "cmt_en": ""}, {"tr": "Muhasebe departmanının finansal ve operasyonel bilgilerin bütünlüğünü nasıl yönettiği.", "en": "How the accounting department manages the integrity of financial and operational information.", "cmt_tr": "CAE, organizasyonun finansal ve operasyonel bilgilerin bütünlüğünü nasıl yönettiğini anlamalıdır; bu risk yönetiminin temel bir yönüdür. The CAE must understand how the organization manages the integrity of financial and operational information; this is a key aspect of risk management.", "cmt_en": ""}, {"tr": "İnsan kaynakları departmanının çalışan yan hak iletişimlerini nasıl yönettiği.", "en": "How the human resource department manages employee benefit communications.", "cmt_tr": "İnsan kaynakları departmanının çalışan yan hak iletişimlerini yönetmesi, süreç çalışan devir hızına yol açacak kadar işlevsiz olmadıkça risk yönetiminin zorunlu bir yönü değildir. How HR manages employee benefit communications is not necessarily a risk management aspect unless the process is so dysfunctional it leads to employee turnover.", "cmt_en": ""}, {"tr": "Yönetim kurulu ve CEO arasındaki gizli görüşmelerin ayrıntıları.", "en": "The details of confidential discussions between the board and the CEO.", "cmt_tr": "Yönetim kurulu ve CEO arasındaki gizli görüşmelerin ayrıntıları CAE'nin değerlendirmesi için mevcut olmayabilir. The details of confidential discussions between the board and CEO would not necessarily be available for the CAE to evaluate.", "cmt_en": ""}]}, {"q_tr": "CAE, iç denetim planı geliştirirken organizasyonel risk yönetiminin hangi yönünü anlamalıdır?", "q_en": "What aspect of organizational risk management should the CAE understand when developing an internal audit plan?", "answer": 2, "options": [{"tr": "Uyumsuzluk için yasal cezalar.", "en": "Legal penalties for noncompliance.", "cmt_tr": "Yasal cezalar önemli olmakla birlikte, iç denetim planını doğrudan etkilemez. Although important, legal penalties do not directly affect the internal audit plan.", "cmt_en": ""}, {"tr": "Bağımsız denetçilerin itibarı.", "en": "Reputation of external auditors.", "cmt_tr": "Bağımsız denetçilerin itibarı, iç denetim planlamasıyla doğrudan ilgili değildir. The reputation of external auditors is not directly relevant to internal audit planning.", "cmt_en": ""}, {"tr": "Risk iştahı ve olgunluk.", "en": "Risk appetite and maturity.", "cmt_tr": "Organizasyonun risk iştahını ve risk yönetimi süreçlerinin olgunluğunu anlamak, CAE'nin organizasyonel hedeflerle uyumlu etkin bir iç denetim stratejisi geliştirmesi için esastır. Understanding the organization's risk appetite and risk management maturity is essential for the CAE to develop an effective internal audit strategy aligned with organizational objectives.", "cmt_en": ""}, {"tr": "Tarihsel performans verileri.", "en": "Historical performance data.", "cmt_tr": "Tarihsel veriler faydalıdır; ancak mevcut risk yönetimi olgunluğu ve iştahından daha az önemlidir. Historical data are useful but less pertinent than current risk management maturity and appetite.", "cmt_en": ""}]}, {"q_tr": "IIA'nın Üç Savunma Hattı Modeli, bir organizasyonun yönetim organının rollerinin büyük ihtimalle şunları içerdiğini belirtir:", "q_en": "The IIA's Three Lines Model states that the roles of an organization's governing body most likely include", "answer": 2, "options": [{"tr": "Risk yönetimine yardımcı olmak.", "en": "Assisting with risk management.", "cmt_tr": "Risk yönetimine yardımcı olmak ikinci hat rolleridir; bunlar yönetim tarafından gerçekleştirilir veya uzmanlara atanır. Assisting with risk management are second-line roles; they are performed by management or assigned to specialists.", "cmt_en": ""}, {"tr": "Müşterilere ürün teslim etmek.", "en": "Delivering products to clients.", "cmt_tr": "Müşterilere ürün veya hizmet teslim etmek, yönetim tarafından gerçekleştirilen birinci hat rollerdir. Delivering products or services to clients are first-line roles performed by management.", "cmt_en": ""}, {"tr": "Organizasyonel hedeflerin paydaş çıkarlarıyla uyumunu sağlamak.", "en": "Ensuring that organizational objectives align with stakeholders' interests.", "cmt_tr": "Yönetim organı rolleri şunları içerir: etkin yönetişim için yapı ve süreçlerin mevcut olduğunu sağlamak, hedeflerin ve faaliyetlerin paydaş çıkarlarıyla uyumunu sağlamak. Governing body roles include ensuring structures and processes exist for effective governance and ensuring objectives and activities align with stakeholder interests.", "cmt_en": ""}, {"tr": "Güven ve netlik aşılayan güvence ve tavsiye sağlamak.", "en": "Providing assurance and advice that instills confidence and clarity.", "cmt_tr": "Yetkin, nesnel ve bağımsız bir iç denetim fonksiyonu tarafından güvence ve tavsiye sağlanmasına imkân vermek yönetim organının rolüdür; ancak bu güvenceyi sağlamak iç denetimin görevidir. Enabling assurance and advice by a competent, objective, and independent internal audit function is the governing body's role; providing that assurance is internal audit's task.", "cmt_en": ""}]}, {"q_tr": "IIA'nın Üç Savunma Hattı Modelinde, aşağıdakilerden hangisi bir birinci hat rolünü tanımlar?", "q_en": "In The IIA's Three Lines Model, which one of the following describes a first line role?", "answer": 2, "options": [{"tr": "Yönetişim yapıları ve iç kontrollerin yeterliliği hakkında tavsiye sağlamak.", "en": "Providing advice on the adequacy of governance structures and internal controls.", "cmt_tr": "Yönetişim yapıları ve iç kontrollerin yeterliliği hakkında tavsiye sağlamak, üçüncü hat olan iç denetçilerin rolüdür. Providing advice on the adequacy of governance structures and internal controls is a third line role of internal auditors.", "cmt_en": ""}, {"tr": "Uzmanlık, destek ve izleme sağlayarak risk yönetimine yardımcı olmak.", "en": "Assisting with risk management by providing expertise, support, and monitoring.", "cmt_tr": "Uzmanlık, destek ve izleme sağlayarak risk yönetimine yardımcı olmak, yönetimin ikinci hat rolüdür. Assisting with risk management by providing expertise, support, and monitoring is a second line role of management.", "cmt_en": ""}, {"tr": "Müşterilere ürün veya hizmet teslimatı, destek fonksiyonları ve risk yönetimi.", "en": "Delivery of products or services to clients, support functions, and risk management.", "cmt_tr": "Yönetim, ürün ve hizmet teslimi, destek fonksiyonları ve risk yönetiminden oluşan birinci hat rolüne sahiptir. Birinci hat rolleri; günlük operasyonları yürüten yönetim ve personeli kapsar. Management has the first line role of delivering products and services, providing support functions, and managing risk. First line roles involve management and staff doing day-to-day operations.", "cmt_en": ""}, {"tr": "Hedeflerin ve faaliyetlerin paydaş çıkarlarıyla uyumunu sağlamak.", "en": "Ensuring objectives and activities align with stakeholder interests.", "cmt_tr": "Hedeflerin ve faaliyetlerin paydaş çıkarlarıyla uyumunu sağlamak, yönetim organının rolüdür. Ensuring objectives and activities align with stakeholder interests is a governing body role.", "cmt_en": ""}]}, {"q_tr": "Aşağıdakilerden hangisi IIA'nın Üç Savunma Hattı Modelinin en iyi açıklamasıdır?", "q_en": "Which of the following is the best description of The IIA's Three Lines Model?", "answer": 1, "options": [{"tr": "Büyük organizasyonlarda yönetim hiyerarşisini tanımlayan bir model.", "en": "A model that describes the management hierarchy in large organizations.", "cmt_tr": "Üç Savunma Hattı Modeli, büyük organizasyonlardaki yönetim hiyerarşisini tanımlamaz. The Three Lines Model does not describe the management hierarchy in large organizations.", "cmt_en": ""}, {"tr": "Hedeflere ulaşılmasını ve güçlü yönetişim ve risk yönetiminin teşvik edilmesini en etkin şekilde destekleyen yapıları ve süreçleri belirlemeye yardımcı olan bir model.", "en": "A model that helps identify structures and processes that most effectively support attainment of objectives and promotion of strong governance and risk management.", "cmt_tr": "Üç Savunma Hattı Modeli; yönetim organı, yönetim ve iç denetim fonksiyonunun rolleri açısından hedeflere ulaşılmasını ve güçlü yönetişim ile risk yönetimini destekleyen yapı ve süreçleri belirlemeye yardımcı olur. The Three Lines Model helps identify structures and processes that most effectively support attainment of objectives and promotion of strong governance and risk management.", "cmt_en": ""}, {"tr": "Risk tanımlama, önceliklendirme ve azaltma sürecini açıklayan risk yönetimi modeli.", "en": "A model that explains the risk management process of risk identification, prioritization, and mitigation.", "cmt_tr": "Üç Savunma Hattı Modeli, risk yönetimi sürecini açıklamaz. The Three Lines Model does not explain the risk management process.", "cmt_en": ""}, {"tr": "İç denetim fonksiyonunun üç rolünü tanımlayan bir model.", "en": "A model that defines the three roles of the internal auditing function.", "cmt_tr": "Üç Savunma Hattı Modeli, iç denetim fonksiyonunun rollerini operasyonları optimize etmek, riskleri yönetmek ve varlıkları korumak olarak tanımlamaz. The Three Lines Model does not define internal auditing's roles as optimizing operations, managing risks, and protecting assets.", "cmt_en": ""}]}, {"q_tr": "IIA'nın Üç Savunma Hattı Modelinde, aşağıdakilerden hangisi bir ikinci hat rolüdür?", "q_en": "In The IIA's Three Lines Model, which one of the following is a second line role?", "answer": 0, "options": [{"tr": "Uzmanlık, destek ve izleme sağlayarak risk yönetimine yardımcı olmak.", "en": "Assisting with risk management by providing expertise, support, and monitoring.", "cmt_tr": "İkinci hat rolleri; uyumluluk, sürdürülebilirlik, etik, iç kontrol, BT, kalite veya ERM gibi hedeflere ilişkin uzmanlık, destek ve izleme sağlayarak risk yönetimine yardımcı olan yönetim rolleridir. Second line roles are management roles that assist with risk management by providing expertise, support, and monitoring regarding objectives such as compliance, sustainability, ethics, internal control, IT, quality, or ERM.", "cmt_en": ""}, {"tr": "Müşterilere ürün ve hizmet teslim etmek.", "en": "Delivering products and services to customers.", "cmt_tr": "Ürün ve hizmet teslim etmek birinci hat rolüdür; günlük operasyonları yürüten yönetim ve personeli kapsar. Delivering products and services is a first line role involving management and staff doing day-to-day operations.", "cmt_en": ""}, {"tr": "Risk yönetimi ve kontrolün yeterliliği hakkında güvence sağlamak.", "en": "Providing assurance on the adequacy of risk management and control.", "cmt_tr": "Risk yönetimi ve kontrol yeterliliği hakkında güvence sağlamak, iç denetçilerin üçüncü hat rolüdür. Providing assurance on the adequacy of risk management and control is a third line role of internal auditors.", "cmt_en": ""}, {"tr": "Etkin yönetişim için yapıların ve süreçlerin mevcut olduğunu sağlamak.", "en": "Ensuring that structures and processes exist for effective governance.", "cmt_tr": "Etkin yönetişim için yapıların ve süreçlerin mevcut olduğunu sağlamak yönetim organının (yönetim kurulu) rolüdür. Ensuring structures and processes are in place for effective governance is a governing body role.", "cmt_en": ""}]}, {"q_tr": "IIA'ya göre, iç denetimin organizasyonun risk yönetimi sürecindeki rolü şudur:", "q_en": "According to The IIA, the role of internal audit in the organization's risk management process is to", "answer": 1, "options": [{"tr": "Risk yönetimi çerçeveleri oluşturmak.", "en": "Establish risk management frameworks.", "cmt_tr": "Risk yönetimi çerçeveleri oluşturmak iç denetimin değil; yönetimin rolüdür. Establishing risk management frameworks is management's role, not internal audit's.", "cmt_en": ""}, {"tr": "Risk yönetimi süreçlerinin etkin olduğuna dair güvence sağlamak.", "en": "Provide assurance that risk management processes are effective.", "cmt_tr": "İç denetimin rolü, risk yönetimi süreçlerinin etkinliği hakkında bağımsız güvence sağlamaktır. Internal audit's role is to provide independent assurance regarding the effectiveness of risk management processes.", "cmt_en": ""}, {"tr": "Tüm organizasyonel riskleri azaltmak.", "en": "Mitigate all organizational risks.", "cmt_tr": "İç denetim, riskleri doğrudan azaltmaz; risk yönetimini inceler. Internal audit reviews risk management, but does not mitigate risks directly.", "cmt_en": ""}, {"tr": "Tüm risk değerlendirme faaliyetlerine liderlik etmek.", "en": "Lead all risk assessment activities.", "cmt_tr": "Risk değerlendirmesine liderlik etmek genellikle yönetimin sorumluluğundadır; iç denetim süreci değerlendirir ve güvence sağlar. Leading risk assessment is usually a management responsibility; internal audit evaluates and provides assurance on the process.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modelinin hangi ilkesi iç denetim fonksiyonunun bağımsızlığını vurgular?", "q_en": "Which principle of the Three Lines Model emphasizes the independence of the internal audit function?", "answer": 2, "options": [{"tr": "İlke 1: Yönetişim.", "en": "Principle 1: Governance.", "cmt_tr": "Yönetişim, hedeflerle uyumu ve denetimi sağlayan yapı ve süreçlerle ilgilidir. Governance relates to structures and processes that ensure oversight and alignment with objectives.", "cmt_en": ""}, {"tr": "İlke 3: Yönetim - Birinci ve ikinci hat rolleri.", "en": "Principle 3: Management - First and second line roles.", "cmt_tr": "Yönetimin birinci ve ikinci hat rolleri; destek fonksiyonlarını ve risk yönetimi sorumluluğunu içerir. Management's first and second line roles include support functions and responsibility for risk management.", "cmt_en": ""}, {"tr": "İlke 5: Üçüncü hat bağımsızlığı.", "en": "Principle 5: Third line independence.", "cmt_tr": "Üç Savunma Hattı Modelinin 5. İlkesi; iç denetimin yönetim organına hesap verebilirlik, kaynaklara ve verilere engelsiz erişim ve önyargı ile müdahaleden özgürlük aracılığıyla bağımsızlığını korumasını sağlar. Principle 5 ensures internal audit maintains independence through accountability to the governing body, unaffected access to resources and data, and freedom from bias and interference.", "cmt_en": ""}, {"tr": "İlke 6: Değer yaratma ve koruma.", "en": "Principle 6: Creating and protecting value.", "cmt_tr": "Değer yaratma ve koruma; değer yaratma ve korumayla kolektif olarak uyumlu faaliyetlerin rollerini ifade eder. Creating and protecting value aligns activities of roles collectively to create and protect value.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modeline göre, hangi rol öncelikli olarak riskleri doğrudan yönetmekten sorumludur?", "q_en": "According to the Three Lines Model, which role is primarily responsible for directly managing risks?", "answer": 3, "options": [{"tr": "Yönetim kurulu.", "en": "The board of directors.", "cmt_tr": "Yönetim organı; yönetişim için hesap verebilir olup dürüstlük, liderlik ve şeffaflığı teşvik eder. The governing body is accountable to stakeholders for oversight and promotes integrity, leadership, and transparency.", "cmt_en": ""}, {"tr": "Uyumluluk gibi ikinci hat fonksiyonları.", "en": "Second line functions such as compliance.", "cmt_tr": "İkinci hat fonksiyonları, risk konularında uzmanlık, destek, izleme ve meydan okuma sağlar; birincil sorumluluk taşımaz. Second line functions provide expertise, support, monitoring, and challenge on risk-related matters; they do not have primary responsibility.", "cmt_en": ""}, {"tr": "İç denetim.", "en": "Internal audit.", "cmt_tr": "İç denetim; tüm hedeflere ulaşılmasıyla ilgili her konuda bağımsız ve nesnel güvence ve tavsiye sağlamak için üçüncü hat rollerine sahiptir. Ancak riskleri doğrudan yönetmez. Internal audit has third line roles to provide independent and objective assurance and advice on all matters related to achievement of objectives. But it does not manage risks directly.", "cmt_en": ""}, {"tr": "Operasyonel yönetim ve personel.", "en": "Operational management and staff.", "cmt_tr": "Üç Savunma Hattı Modeli'nde birinci hat yönetim rolleri; operasyonel yönetim ve personel tarafından gerçekleştirilen risklerin doğrudan yönetimini ve organizasyonun ürün ya da hizmetlerinin teslimatını kapsar. Management's first line roles consist of direct management of risks and delivery of products or services by operational management and staff.", "cmt_en": ""}]}, {"q_tr": "IIA'ya göre risk şudur:", "q_en": "According to The IIA, risk is the", "answer": 2, "options": [{"tr": "Bir olayın gerçekleşme olasılığı.", "en": "Probability that an event will occur.", "cmt_tr": "Olasılık ilgili bir kavram olmakla birlikte riskin daha geniş boyutunu kapsamaz. Although probability is a related concept, it does not encompass the broader dimension of risk.", "cmt_en": ""}, {"tr": "Finansal kayıp olasılığı.", "en": "Possibility of financial loss.", "cmt_tr": "Finansal kayıp yalnızca olası sonuçlardan biridir; riskin tam kapsamını yansıtmaz. Financial loss is just one potential outcome, not the full scope of risk.", "cmt_en": ""}, {"tr": "Belirsizliğin hedefler üzerindeki olumlu veya olumsuz etkisi.", "en": "Positive or negative effect of uncertainty on objectives.", "cmt_tr": "IIA'ya göre risk; belirsizliğin hedeflerin gerçekleştirilmesi üzerindeki olumlu veya olumsuz etkisidir. Bu geniş tanım, riskin hem fırsat hem de tehdit sunabileceğini vurgular. Risk is defined by The IIA as the positive or negative effect of uncertainty on the achievement of objectives. This broad definition emphasizes that risk can present opportunities as well as threats.", "cmt_en": ""}, {"tr": "Düzenleyici uyumsuzluk olasılığı.", "en": "Likelihood of regulatory noncompliance.", "cmt_tr": "Düzenleyici uyumsuzluk spesifik bir risktir; ancak riski genel olarak tanımlamaz. Regulatory noncompliance is a specific risk but does not define risk overall.", "cmt_en": ""}]}, {"q_tr": "CAE, iç denetimin rolünü risk yönetimiyle entegre etmek için hangi stratejiyi kullanır?", "q_en": "What strategy does the CAE use to integrate internal audit's role with risk management?", "answer": 2, "options": [{"tr": "İç denetim için ayrı bir risk yönetimi çerçevesi geliştirmek.", "en": "Develop a separate risk management framework for internal audit.", "cmt_tr": "Risk yönetimi, denetim çerçevelerinden ayrı olmamalı; entegre edilmelidir. Risk management should be integrated, not separate from audit frameworks.", "cmt_en": ""}, {"tr": "Organizasyonel operasyonlardan bağımsız risk değerlendirmeleri yürütmek.", "en": "Conduct risk assessments independent of organizational operations.", "cmt_tr": "Risk değerlendirmeleri; organizasyonel süreçleri tamamlamalı, onlardan izole edilmemelidir. Risk assessments should complement, not isolate, organizational processes.", "cmt_en": ""}, {"tr": "Organizasyonun risk yönetimi sürecini anlayarak stratejik planlamaya katılmak.", "en": "Engage in strategic planning with an understanding of the organization's risk management process.", "cmt_tr": "Organizasyonun risk yönetimi süreçlerine ilişkin içgörülerle stratejik planlama yapmak; CAE'nin iç denetim fonksiyonunu organizasyonel risk ve stratejiyle etkin şekilde uyumlu hale getirmesini sağlar. Strategic planning with insights into the organization's risk management processes allows the CAE to align internal audit functions effectively with organizational risk and strategy.", "cmt_en": ""}, {"tr": "İç denetimin katılımını yalnızca denetim rolleriyle sınırlamak.", "en": "Limit internal audit's involvement to oversight roles only.", "cmt_tr": "Yalnızca denetim rolleriyle sınırlamak, risk yönetimi entegrasyonu için gereken bütünsel yaklaşımı kaçırır. Limiting to oversight roles misses the holistic approach needed for risk management integration.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modeli, organizasyonlarda risk yönetimini şu şekilde güçlendirir:", "q_en": "The Three Lines Model enhances risk management within organizations by", "answer": 1, "options": [{"tr": "Risk yönetimi kontrollerini yönetici düzeyinde merkezileştirmek.", "en": "Centralizing risk management controls at the executive level.", "cmt_tr": "Merkezileştirme, modelin dağıtılmış rol yapısıyla uyuşmaz. Centralization does not align with the distributed role structure of the model.", "cmt_en": ""}, {"tr": "Organizasyonel düzeylerde rolleri açıklığa kavuşturmak ve koordine etmek.", "en": "Clarifying and coordinating roles across organizational levels.", "cmt_tr": "Üç Savunma Hattı Modeli; birinci, ikinci ve üçüncü hatlar arasında net rol ve sorumluluklar tanımlayarak organizasyon genelinde risk yönetimine yönelik koordineli çabayı destekler. The Three Lines Model defines clear roles and responsibilities among the first, second, and third lines, supporting coordinated efforts toward risk management across the organization.", "cmt_en": ""}, {"tr": "Bağımsız denetimlere olan ihtiyacı ortadan kaldırmak.", "en": "Eliminating the need for external audits.", "cmt_tr": "Model, bağımsız denetimlerin yerini almak yerine onları tamamlar. The model complements external audits rather than replacing them.", "cmt_en": ""}, {"tr": "Finansal riskleri operasyonel risklerin önünde önceliklendirmek.", "en": "Prioritizing financial risks over operational risks.", "cmt_tr": "Model, yalnızca finansal risklere değil; kapsamlı risk yönetimine vurgu yapar. The model emphasizes comprehensive risk management rather than focusing only on financial risks.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modeli, risk yönetiminde neyi vurgular?", "q_en": "What does the Three Lines Model emphasize in risk management?", "answer": 1, "options": [{"tr": "Tüm risk fonksiyonlarını yönetim kurulu altında merkezileştirmek.", "en": "Centralizing all risk functions under the board.", "cmt_tr": "Merkezi odak, yönetim kurulu altında değil; rollerin ve işbirliğinin tanımlanmasındadır. The emphasis is not on centralizing under the board; it is on defining roles and collaboration.", "cmt_en": ""}, {"tr": "Üç düzeyde rol ve sorumlulukları açıkça tanımlamak.", "en": "Clearly defining roles and responsibilities across three levels.", "cmt_tr": "Üç Savunma Hattı Modeli, organizasyon genelinde rol ve sorumlulukları açıkça özetleyerek etkin risk yönetimini desteklemek için tasarlanmıştır. The Three Lines Model is designed to support effective risk management by clearly outlining roles and responsibilities across the organization.", "cmt_en": ""}, {"tr": "Risk yönetimini dış danışmanlara dış kaynak olarak vermek.", "en": "Outsourcing risk management to external consultants.", "cmt_tr": "Dış danışmanlar içgörü sağlayabilir; ancak model organizasyonel roller hakkındadır. External consultants may provide insights, but the model is about organizational roles.", "cmt_en": ""}, {"tr": "Finansal riskleri diğerlerinin üzerinde önceliklendirmek.", "en": "Prioritizing financial risks above all others.", "cmt_tr": "Model tüm riskleri kapsar; yalnızca finansal olanları değil; bunları organizasyonel hedeflerle uyumlu hale getirir. The model encompasses all risks, not just financial, aligning them with organizational objectives.", "cmt_en": ""}]}, {"q_tr": "IIA'ya göre CAE'nin iç denetim planındaki rolünü hangisi en iyi açıklar?", "q_en": "Which best describes the CAE's role in the internal audit plan according to The IIA?", "answer": 1, "options": [{"tr": "Planlanan tüm denetimleri kişisel olarak yürütmek.", "en": "Execute all scheduled audits personally.", "cmt_tr": "CAE, denetimleri denetlese de yürütme genellikle denetim ekibine devredilir. While the CAE oversees audits, execution is often delegated to the audit team.", "cmt_en": ""}, {"tr": "Riske dayalı bir iç denetim planı geliştirmek ve sürdürmek.", "en": "Develop and maintain a risk-based internal audit plan.", "cmt_tr": "Standart 9.1, CAE'nin organizasyonun risk yönetimi süreçlerini anlayarak en önemli riskleri ele alan ve organizasyonel hedeflerle uyumlu etkin bir iç denetim stratejisi ve planı geliştirmesini gerektirir. Standard 9.1 requires the CAE to understand the organization's risk management processes to develop an effective internal audit strategy and plan that addresses the most significant risks.", "cmt_en": ""}, {"tr": "Yalnızca finansal denetim sonuçlarını incelemek.", "en": "Review only financial audit results.", "cmt_tr": "İç denetimin katılımı, finansal sonuçlarla sınırlı değildir; birçok riski kapsar. Internal audit involvement is not limited to financial results but covers many risks.", "cmt_en": ""}, {"tr": "Tüm departmanlar için işe alımı denetlemek.", "en": "Oversee hiring for all departments.", "cmt_tr": "Tüm departmanlar için işe alım, CAE'nin yetki alanı dışındadır; odak, denetim fonksiyonlarındadır. Hiring for all departments is outside the CAE's jurisdiction; the focus is on auditing functions.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modeline göre, üçüncü hattın birincil rolü nedir?", "q_en": "According to the Three Lines Model, what is the primary role of the third line?", "answer": 2, "options": [{"tr": "Operasyonları ve risk yönetimini doğrudan yürütmek.", "en": "Direct operations and management of risk.", "cmt_tr": "Operasyonların ve risk yönetiminin doğrudan yürütülmesi birinci hattın sorumluluğundadır. Direct operations and management of risk are the responsibility of the first line.", "cmt_en": ""}, {"tr": "İkinci hatta denetim ve destek sağlamak.", "en": "Provide oversight and support to the second line.", "cmt_tr": "İkinci hat denetim ve destek sağlar; birincil bağımsız güvence sağlayıcı değildir. The second line provides oversight and support, not primary independent assurance.", "cmt_en": ""}, {"tr": "Yönetişim ve risk yönetimi hakkında bağımsız güvence sunmak.", "en": "Offer independent assurance on governance and risk management.", "cmt_tr": "Üçüncü hat olan iç denetim; yönetişim, risk yönetimi ve kontrol süreçlerinin yeterliliği ve etkinliği hakkında bağımsız güvence sağlar. Bağımsız değerlendirmeler yoluyla değer katar. The third line, internal audit, provides independent assurance regarding governance, risk management, and control processes. It adds value through unbiased evaluations.", "cmt_en": ""}, {"tr": "Prosedürler ve kontroller geliştirmek ve uygulatmak.", "en": "Develop and enforce procedures and controls.", "cmt_tr": "Prosedürlerin geliştirilmesi genellikle ikinci hattın fonksiyonudur. Developing procedures is typically a function of the second line.", "cmt_en": ""}]}, {"q_tr": "Risk yönetiminde, Üç Savunma Hattı Modeline göre iç denetim fonksiyonunun rolü nedir?", "q_en": "In risk management, what is the role of the internal audit function according to the Three Lines Model?", "answer": 1, "options": [{"tr": "Günlük operasyonların yönetimi.", "en": "Management of day-to-day operations.", "cmt_tr": "Günlük operasyonların yönetimi birinci hattın sorumluluğundadır; iç denetimin değil. Daily operations are managed by the first line, not internal audit.", "cmt_en": ""}, {"tr": "Bağımsız güvence sağlanması.", "en": "Provision of independent assurance.", "cmt_tr": "Üç Savunma Hattı Modeli'nde iç denetim fonksiyonu üçüncü hattır ve yönetişim, risk yönetimi ve kontrol süreçlerinin etkinliği hakkında bağımsız güvence sağlar. In the Three Lines Model, internal audit is the third line, providing independent assurance on the effectiveness of governance, risk management, and control processes.", "cmt_en": ""}, {"tr": "Operasyonel politikalar oluşturmak.", "en": "Creating operational policies.", "cmt_tr": "Politika oluşturma genellikle ikinci hattaki yönetim görevlerinin bir parçasıdır. Policy creation is typically part of management duties in the second line.", "cmt_en": ""}, {"tr": "Organizasyonel hedefler belirlemek.", "en": "Setting organizational objectives.", "cmt_tr": "Hedef belirleme; üst yönetim ve yönetim kurulunu içeren bir yönetişim fonksiyonudur. Setting objectives is a governance function that involves senior management and the board.", "cmt_en": ""}]}, {"q_tr": "İç denetim, bir organizasyonun risk yönetimi sürecine şu şekilde katkıda bulunur:", "q_en": "Internal auditing contributes to an organization's risk management process by", "answer": 1, "options": [{"tr": "Tüm risk yönetimi faaliyetlerinin sahipliğini üstlenmek.", "en": "Assuming ownership of all risk management activities.", "cmt_tr": "İç denetim, risk yönetimi faaliyetlerinin sahipliğini üstlenmez; bu bağımsızlığını zedeler. Internal auditing does not own or direct risk management activities, which would compromise its independence.", "cmt_en": ""}, {"tr": "Risk yönetimi etkinliği hakkında bağımsız güvence sağlamak.", "en": "Providing independent assurance on risk management effectiveness.", "cmt_tr": "İç denetim, risk yönetimi etkinliği hakkında bağımsız güvence sunarak yönetişim çerçevesini destekler. Internal auditing enhances risk management by offering independent assurance on its effectiveness, supporting the governance framework.", "cmt_en": ""}, {"tr": "Risk yönetimi politika ve prosedürlerini dikte etmek.", "en": "Dictating risk management policies and procedures.", "cmt_tr": "Politika dikte etmek, denetimin kapsamının ötesinde bir yönetim fonksiyonudur. Dictating policies is a management function beyond the scope of auditing.", "cmt_en": ""}, {"tr": "Yalnızca finansal risk yönetimine odaklanmak.", "en": "Exclusively focusing on financial risks management.", "cmt_tr": "Finansal riskler kapsamın bir parçası olabilir; ancak denetim, finansal risklerin ötesinde daha geniş bir bakış açısını kapsar. Although financial risks may be part of the scope, auditing encompasses a broader view beyond financial risks.", "cmt_en": ""}]}, {"q_tr": "IIA'nın Üç Savunma Hattı Modelinde hangi hat doğrudan risk yönetiminden sorumludur?", "q_en": "Which line in The IIA's Three Lines Model is directly responsible for risk management?", "answer": 0, "options": [{"tr": "Birinci hat.", "en": "First line.", "cmt_tr": "Üç Savunma Hattı Modeli'nde birinci hat; riskleri yönetmek ve organizasyonel hedeflere ulaşmaktan doğrudan sorumlu yönetim ve personeli kapsar. Günlük operasyonlardan sorumludurlar. The first line involves management and staff directly responsible for managing risks and achieving organizational objectives. They are responsible for daily operations.", "cmt_en": ""}, {"tr": "İkinci hat.", "en": "Second line.", "cmt_tr": "İkinci hat destek ve denetim sağlar; risk yönetimi için doğrudan sorumluluk taşımaz. The second line provides support and oversight, not direct responsibility for risk management.", "cmt_en": ""}, {"tr": "Üçüncü hat.", "en": "Third line.", "cmt_tr": "Üçüncü hat olan iç denetim, risk yönetimi hakkında bağımsız güvence sunar; doğrudan yönetmez. The third line, internal audit, offers independent assurance on risk management; it does not manage directly.", "cmt_en": ""}, {"tr": "Üst yönetim.", "en": "Senior management.", "cmt_tr": "Üst yönetim denetim sağlasa da birinci hat rolleri riski doğrudan yönetir. Although senior management provides oversight, first line roles directly manage risk.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modeline göre iç denetim fonksiyonunun birincil özelliği şudur:", "q_en": "A primary characteristic of the internal audit function according to the Three Lines Model is that it", "answer": 2, "options": [{"tr": "Risk yönetimi süreçlerini doğrudan denetler.", "en": "Directly oversees risk management processes.", "cmt_tr": "Risk yönetimi süreçlerinin denetimi öncelikli olarak ikinci hat fonksiyonudur. Oversight of risk management processes is primarily a second line function.", "cmt_en": ""}, {"tr": "Politika formülasyonu konusunda rehberlik sağlar.", "en": "Provides guidance on policy formulation.", "cmt_tr": "İç denetim tavsiyede bulunabilir; ancak genellikle politika formülasyonuna yön vermez. Internal audit may advise, but it does not typically direct policy formulation.", "cmt_en": ""}, {"tr": "Müdahale olmadan bağımsız güvence sunar.", "en": "Offers independent assurance without interference.", "cmt_tr": "Üçüncü hat savunması olan iç denetim fonksiyonu; nesnelliğini ve güvenilirliğini korumak için müdahaleden arınmış bağımsız güvence sağlar. The internal audit function as the third line provides independent assurance free from interference, crucial for maintaining objectivity and reliability.", "cmt_en": ""}, {"tr": "Organizasyonel operasyonları doğrudan yönetmeyi içerir.", "en": "Involves directly managing organizational operations.", "cmt_tr": "Operasyonların doğrudan yönetimi bağımsızlığı zedeler ve iç denetimin rolü değildir. Direct management of operations compromises independence and is not a role of internal audit.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonu, bir organizasyonun risk yönetimi sürecine şu şekilde katkıda bulunur: (Strateji)", "q_en": "The internal audit function contributes to an organization's risk management process by", "answer": 1, "options": [{"tr": "Organizasyon için risk iştahı belirlemek.", "en": "Setting risk appetite for the organization.", "cmt_tr": "Risk iştahını yönetim kurulu ve üst yönetim belirler; iç denetim değil. The board and senior management, not internal audit, set risk appetite.", "cmt_en": ""}, {"tr": "Risk yönetiminin etkinliğini bağımsız olarak değerlendirmek.", "en": "Independently assessing the effectiveness of risk management.", "cmt_tr": "İç denetim fonksiyonu, organizasyonların risk maruziyetlerini ve kontrol ortamlarını anlamalarına yardımcı olmak için risk yönetimi stratejilerinin etkinliği ve yeterliliğine ilişkin bağımsız değerlendirmeler sağlar. The internal audit function provides independent assessments of the effectiveness and adequacy of risk management strategies to help organizations understand their risk exposure.", "cmt_en": ""}, {"tr": "Risk yönetimi stratejilerini doğrudan uygulamak.", "en": "Directly executing risk management strategies.", "cmt_tr": "İç denetim, risk yönetimini yürütmek yerine değerlendirir. Internal audit assesses rather than executes risk management.", "cmt_en": ""}, {"tr": "Risk yanıt stratejilerini belirlemek.", "en": "Determining risk response strategies.", "cmt_tr": "Risk yanıt stratejisi ve kararları yönetimin sorumluluğundadır. Risk response strategy and decisions are management's responsibilities.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonu, bir organizasyonun risk yönetimi sürecine şu şekilde katkıda bulunur: (güvence odağı)", "q_en": "The internal audit function contributes to an organization's risk management process by (assurance focus)", "answer": 1, "options": [{"tr": "Risk yönetimi stratejileri geliştirmek ve uygulamak.", "en": "Developing and implementing risk management strategies.", "cmt_tr": "Strateji geliştirmek ve uygulamak yönetimin rolüdür; değerlendirme ve güvenceye odaklanan iç denetimin değil. Developing and implementing strategies is management's role, not that of internal audit, which focuses on assessment and assurance.", "cmt_en": ""}, {"tr": "Risk yönetimi süreçlerinin etkinliği hakkında güvence sağlamak.", "en": "Providing assurance on the effectiveness of risk management processes.", "cmt_tr": "İç denetim, organizasyonun risk yönetimi süreçlerinin yeterli tasarlandığını ve etkin şekilde işlediğini gösteren bağımsız güvence sağlayarak katkıda bulunur. Internal audit contributes by providing independent assurance that the organization's risk management processes are adequately designed and operating effectively.", "cmt_en": ""}, {"tr": "Yalnızca finansal riske odaklanmak.", "en": "Solely focusing on financial risk.", "cmt_tr": "İç denetim yalnızca finansal risklerle değil; geniş bir risk yelpazesiyle ilgilenir. Internal audit considers a wide array of risks, not just financial.", "cmt_en": ""}, {"tr": "Yönetime risk tolerans düzeylerini dikte etmek.", "en": "Dictating risk tolerance levels to management.", "cmt_tr": "Risk tolerans düzeyleri yönetim ve yönetim kurulu tarafından belirlenir; iç denetim tarafından değil. Risk tolerance levels are set by management and the board, not by internal audit.", "cmt_en": ""}]}, {"q_tr": "İç denetim fonksiyonunun stratejik planlamasında kilit faktör nedir?", "q_en": "What is a key factor in the strategic planning of the internal audit function?", "answer": 1, "options": [{"tr": "Satış departmanı hedefleriyle uyum sağlamak.", "en": "Aligning with sales department targets.", "cmt_tr": "Belirli departman hedefleriyle uyum, iç denetimin uygun yetki alanını (yönetişim, risk yönetimi ve kontrol süreçleri) sınırlandırır. Alignment with specific department targets limits internal audit's appropriate jurisdiction.", "cmt_en": ""}, {"tr": "Yönetişim, risk yönetimi ve kontrol süreçlerini anlamak.", "en": "Understanding governance, risk management, and control processes.", "cmt_tr": "İç denetim için stratejik planlama, organizasyonun yönetişim, risk yönetimi ve kontrol süreçlerinin kapsamlı bir şekilde anlaşılmasını gerektirir. Strategic planning for internal audit requires a comprehensive understanding of the organization's governance, risk management, and control processes.", "cmt_en": ""}, {"tr": "Tüm bölümler için sabit denetim prosedürleri oluşturmak.", "en": "Establishing fixed audit procedures for all divisions.", "cmt_tr": "Sabit denetim prosedürleri, gelişen risklere uyum sağlayamayabilir. Fixed audit procedures may not accommodate evolving risks.", "cmt_en": ""}, {"tr": "İç denetimin rolünü yalnızca finansal denetimlerle sınırlamak.", "en": "Limiting the role of the internal audit to financial audits only.", "cmt_tr": "Yalnızca finansal denetimler, iç denetimin kapsamını sınırlandırır. Financial audits alone limit the breadth of internal audit.", "cmt_en": ""}]}, {"q_tr": "Üç Savunma Hattı Modelinde hangi rol öncelikli olarak yönetişim, risk yönetimi ve kontrol süreçleri hakkında bağımsız güvence sağlamaktan sorumludur?", "q_en": "Which role in the Three Lines Model is primarily responsible for providing independent assurance on governance, risk management, and control processes?", "answer": 2, "options": [{"tr agement, and control processes.", "cmt_en": ""}, {"tr": "Bağımsız denetim hizmetleri sunan dördüncü hat.", "en": "Fourth line, offering external audit services.", "cmt_tr": "Bağımsız denetim, harici bir güvence sağlayıcısıdır; Üç Savunma Hattı Modeli'nin bir parçası değildir. External audit is an external assurance provider, not part of the Three Lines Model.", "cmt_en": ""}]}, {"q_tr": "IIA'nın Üç Savunma Hattı Modeli bağlamında, iç denetim fonksiyonunun yerine getirdiği birincil rol şudur:", "q_en": "In the context of The IIA's Three Lines Model, the primary role fulfilled by the internal audit function is to", "answer": 2, "options": [{"tr": "Günlük operasyonel ve risk yönetimi faaliyetlerini yürütmek.", "en": "Execute daily operational and risk management activities.", "cmt_tr": "Birinci hat, günlük operasyonel ve risk yönetimi faaliyetlerini yürütür. The first line executes daily operational and risk management activities.", "cmt_en": ""}, {"tr": "Risk yönetimi için denetim ve teknik destek sağlamak.", "en": "Provide oversight and technical support for risk management.", "cmt_tr": "İkinci hat; destek ve denetim sağlayan risk yönetimi fonksiyonlarını kapsar. The second line includes risk management functions that provide support and oversight.", "cmt_en": ""}, {"tr": "Yönetişim, risk yönetimi ve kontrol süreçlerinin etkinliği hakkında bağımsız güvence sunmak.", "en": "Offer independent assurance on the effectiveness of governance, risk management, and control processes.", "cmt_tr": "Üç Savunma Hattı Modeli'nde iç denetim fonksiyonu üçüncü hat olarak görev yapar ve yönetişim, risk yönetimi ve kontrol süreçlerinin etkinliği hakkında bağımsız güvence sunar. Within the Three Lines Model, the internal audit function serves as the third line and provides independent assurance on governance, risk management, and control processes.", "cmt_en": ""}, {"tr": "Ek harici doğrulama için bağımsız denetim prosedürleri yürütmek.", "en": "Carry out external audit procedures for additional external validation.", "cmt_tr": "Bağımsız denetim prosedürleri, iç denetim fonksiyonu tarafından değil; bağımsız denetçiler tarafından yürütülür. External audit procedures are performed by external auditors, not the internal audit function.", "cmt_en": ""}]}, {"q_tr": "Küresel İç Denetim Standartlarının 9. İlkesine göre CAE, risk yönetimini şu şekilde destekler:", "q_en": "According to Principle 9 of the Global Internal Audit Standards, the CAE supports risk management by", "answer": 1, "options": [{"tr": "Denetim kaynaklarını kesinlikle finansal denetimlerle uyumlu hale getirmek.", "en": "Aligning audit resources strictly with financial audits.", "cmt_tr": "Denetimleri yalnızca finansal alanlarla sınırlamak, daha geniş risk yönetimi süreçlerini göz ardı eder. Limiting audits to financial areas neglects broader risk management processes.", "cmt_en": ""}, {"tr": "Organizasyonel risk yönetimi süreçlerini anlamak için stratejik olarak planlamak.", "en": "Strategically planning to understand organizational risk management processes.", "cmt_tr": "CAE, organizasyonun yönetişim, risk yönetimi ve kontrol süreçlerini anlamak için stratejik olarak planlayarak etkin bir iç denetim stratejisini kolaylaştırır. The CAE supports risk management by strategically planning to understand the organization's governance, risk management, and control processes, facilitating an effective internal audit strategy.", "cmt_en": ""}, {"tr": "Yalnızca uyumluluk denetimlerine odaklanmak.", "en": "Focusing exclusively on compliance audits.", "cmt_tr": "Yalnızca uyum odağı, etkin stratejik risk yönetimi için çok dardır. A focus on compliance alone is too narrow for effective strategic risk management.", "cmt_en": ""}, {"tr": "Tüm risk yönetimi faaliyetlerini kişisel olarak yürütmek.", "en": "Executing all risk management activities personally.", "cmt_tr": "Kişisel yürütme mümkün değildir ve tipik CAE sorumluluklarının dışındadır; bunlar denetim ve stratejik uyum içerir. Personal execution is not feasible and outside typical CAE responsibilities, which include oversight and strategic alignment.", "cmt_en": ""}]}]};
const SHEETS = ["SU1 - Purpose", "SU2 - Charter", "SU3 - Independence", "SU4 - Risk Mgmt"];
const SHORT_NAMES = {"SU1 - Purpose": "SU1", "SU2 - Charter": "SU2", "SU3 - Independence": "SU3", "SU4 - Risk Mgmt": "SU4"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = "tr";         // "tr" | "en"
let curChapter = 0;
let curQ = 0;            // index within chapter
let answered = [];       // per-question answered flag
let correctArr = [];     // per-question correct flag
let chapterScore = [];   // [{correct,total}] per chapter
let quizStarted = false;
let visitedQ = {};       // {ci: Set of visited qi}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ── LOCALSTORAGE KEY ─────────────────────────────────────────────────────────
const LS_KEY = "cia_quiz_unit1";

// ── INIT ──────────────────────────────────────────────────────────────────────
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets — convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "index.html";
}

// ── CHAPTER TABS ──────────────────────────────────────────────────────────────
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goToChapter(ci) {
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ↺ ${lang==="tr" ? "Bu unitı sıfırla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" üçün bütün cavablar silinəcək. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  const q    = qs[curQ];
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
                  : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const txt = lang==="tr" ? (opt.tr||opt.en) : (opt.en||opt.tr);
    // strip "X / Y" pattern if in EN mode — just use after " / " if present
    const display = (lang==="en" && txt.includes(" / ")) ? txt.split(" / ").pop().trim() : txt;
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"Türkçe Açıklama":"TR Açıklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "İzahı göster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;·&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "✓";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "✗";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "Nəticələrə bax →" : "See Results →")
          : (lang==="tr" ? "Növbəti Mövzu →" : "Next Chapter →"))
      : (lang==="tr" ? "Növbəti Sual →" : "Next Question →");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ── EXPLANATION TOGGLE ────────────────────────────────────────────────────────
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"İzahı göster":"Show explanation")
           : (lang==="tr"?"İzahı gizlə":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ── PROGRESS & SCORE ─────────────────────────────────────────────────────────
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandı` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ── CHAPTER SUMMARY ───────────────────────────────────────────────────────────
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "Bütün Nəticələr" : "Növbəti Mövzu →")
                                : (isLast ? "All Results" : "Next Chapter →");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"Bölüm Tamamlandı":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"doğru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Doğru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Səhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ↺ ${lang==="tr"?"Yenidən":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ── OVERALL RESULTS ───────────────────────────────────────────────────────────
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>🎓 ${lang==="tr"?"Ümumi Nəticə":"Overall Results"}</h2>
      <p>${tc} / ${ta} · ${pct}% ${lang==="tr"?"doğru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ↺ ${lang==="tr"?"Yenidən Başla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ── LANGUAGE TOGGLE ──────────────────────────────────────────────────────────
function toggleLang() {
  lang = lang==="tr" ? "en" : "tr";
  document.getElementById("lang-btn").textContent = lang==="tr" ? "EN" : "TR";
  if(!quizStarted) {
    document.getElementById("welcome-desc").textContent =
      lang==="tr"
        ? "6 mövzu, 105 sual — Türkcə / İngiliscə dil dəstəyi, izahlı cavablar"
        : "6 topics, 105 questions — TR/EN bilingual support with explanations";
    return;
  }
  updateProgress();
  // Re-render current question without resetting state
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}

// ── PAGE LOAD ────────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;
        const total = data.answered.length;
        document.getElementById("btn-main-start").textContent =
          `▶ Davam et (${done}/${total}) / Resume`;
        document.getElementById("btn-fresh-start").style.display = "";
      }
    }
  } catch(e) {}
})();

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
</script>
