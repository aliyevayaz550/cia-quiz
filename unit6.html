<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CIA Quiz ‚Äď Unit 6</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ‚ĒÄ‚ĒÄ BACK TO MENU BUTTON ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ‚ĒÄ‚ĒÄ TOP BAR ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-group {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.3);
  margin-left: 10px;
}
.lang-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .5px; padding: 5px 9px; cursor: pointer; border: none;
  background: rgba(255,255,255,.10); color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
}
.lang-btn + .lang-btn { border-left: 1px solid rgba(255,255,255,.15); }
.lang-btn.active { background: var(--gold) !important; color: var(--navy) !important; }

/* ‚ĒÄ‚ĒÄ PROGRESS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ‚ĒÄ‚ĒÄ MAIN CONTAINER ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ‚ĒÄ‚ĒÄ CHAPTER TABS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ‚ĒÄ‚ĒÄ QUESTION CARD ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ‚ĒÄ‚ĒÄ CHAPTER SUMMARY CARD ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ‚ĒÄ‚ĒÄ WELCOME SCREEN ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ‚ĒÄ‚ĒÄ HISTORY SECTION ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ‚ĒÄ‚ĒÄ OVERALL RESULTS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}

d regulatory jurisdiction. The design and practice of effective governance vary with the size and complexity of the organizations, along with the legal and regulatory requirements of the jurisdiction."}, {"tr": "Y√∂netiŇüim t…ôŇükilatńĪn r…ôhb…ôrliyi, idar…ô hey…ôti, s…ôhmdarlarńĪ v…ô dig…ôr maraqlńĪ t…ôr…ôfl…ôri arasńĪnda m√ľnasib…ôtl…ôr toplusunu …ôhat…ô edir.", "en": "Governance involves a set of relationships between an organization‚Äôs management, board, shareholders, and other stakeholders.", "cmt_tr": "ńįqtisadi ∆Źm…ôkdaŇülńĪq v…ô ńįnkiŇüaf T…ôŇükilatńĪ (OECD) t…ôr…ôfind…ôn veril…ôn qlobal q…ôbul edilmiŇü kurumsal y√∂netiŇüim t…ôrifi bildirir: \"Kurumsal y√∂netiŇüim Ňüirk…ôtin r…ôhb…ôrliyi, idar…ô hey…ôti, s…ôhmdarlarńĪ v…ô dig…ôr maraqlńĪ t…ôr…ôfl…ôri arasńĪnda m√ľnasib…ôtl…ôr toplusunu …ôhat…ô edir. Kurumsal y√∂netiŇüim h…ôm√ßinin Ňüirk…ôtin h…ôd…ôfl…ôrinin m√ľ…ôyy…ôn edildiyi v…ô bu h…ôd…ôfl…ôr…ô √ßatma vasit…ôl…ôri v…ô performansńĪn monitorinqinin m√ľ…ôyy…ôn edildiyi strukturu t…ômin edir.\"", "cmt_en": "The globally accepted definition of corporate governance given by the Organization for Economic Co-operation and Development (OECD) states, ‚ÄúCorporate governance involves a set of relationships between a company‚Äôs management, its board, its shareholders, and other stakeholders. Corporate governance also provides the structure through which the objectives of the company are set, and the means of attaining those objectives and monitoring performance are determined.‚ÄĚ"}, {"tr": "Y√∂netiŇüim t…ôŇükilati m…ôd…ôniyy…ôtd…ôn m√ľst…ôqildir.", "en": "Governance is independent of organizational culture.", "cmt_tr": "Y√∂netiŇüim t…ôcr√ľb…ôl…ôri t…ôŇükilatńĪn unikal m…ôd…ôniyy…ôtini …ôks etdirir v…ô effektivlik √ľ√ß√ľn …ôsas…ôn ona bańülńĪdńĪr.", "cmt_en": "Governance practices reflect the organization‚Äôs unique culture and largely depend on it for effectiveness."}, {"tr": "Y√∂netiŇüim risk idar…ôetm…ôsi v…ô n…ôzar…ôtd…ôn ayrńĪ, f…ôrqli bir proses v…ô struktur kimi m√∂vcuddur.", "en": "Governance exists as a distinct process and structure separate from risk management and control.", "cmt_tr": "Y√∂netiŇüim risk idar…ôetm…ôsi v…ô n…ôzar…ôtd…ôn m√ľst…ôqil m√∂vcud deyil. ∆Źksin…ô, y√∂netiŇüim, risk idar…ôetm…ôsi v…ô n…ôzar…ôt bir-biril…ô sńĪx …ôlaq…ôlidir. Effektiv y√∂netiŇüim strategiya m√ľ…ôyy…ôn ed…ôrk…ôn riski n…ôz…ôr…ô alńĪr v…ô risk idar…ôetm…ôsi effektiv y√∂netiŇüim…ô arxalanńĪr.", "cmt_en": "Governance does not exist independently of risk management and control. Rather, governance, risk management, and control are closely related. Effective governance considers risk when setting strategy, and risk management relies on effective governance. Additionally, effective governance relies on controls and communication to the board on their effectiveness. Control and risk are also related as controls manage risks. Study Unit 6: Governance | Subunit 1: Governance Principles"}], "answer": 1}, {"q_tr": "Y√∂netiŇüimin …ôn az ehtimal olunan m…ôqs…ôdi hansńĪdńĪr?", "q_en": "Which of the following is the least likely purpose of governance?", "options": [{"tr": "D√∂vl…ôt t…ônziml…ôyicil…ôrin…ô t…ôsir g√∂st…ôrm…ôk.", "en": "Influence government regulators.", "cmt_tr": "Y√∂netiŇüim t…ôŇükilatńĪn h…ôd…ôfl…ôrin…ô √ßatmaq √ľ√ß√ľn t…ôŇükilati f…ôaliyy…ôtl…ôri optimallaŇüdńĪrmaqla m…ôŇüńüuldur. D√∂vl…ôt t…ônziml…ôyicil…ôri y√∂netiŇüim…ô t…ôsir g√∂st…ôrs…ô d…ô, bel…ô t…ôsir…ô qarŇüńĪlńĪq verm…ôk y√∂netiŇüimin …ôsas m…ôqs…ôdi deyildir.", "cmt_en": "Governance is concerned with optimizing organizational activities to achieve the organization‚Äôs objectives. Thus, its primary purposes are to inform, direct, manage, and monitor ‚Äúinternal‚ÄĚ activities. Although government regulators influence governance, reciprocating such influence is not a primary purpose of governance."}, {"tr": "M√ľvafiq strukturlar qurmaq.", "en": "Establish appropriate structures.", "cmt_tr": "Y√∂netiŇüimin m…ôqs…ôdi t…ôŇükilati h…ôd…ôfl…ôr…ô √ßatmaq √ľ√ß√ľn z…ôruri strukt and practices. The internal audit function is not responsible for the initiation of fundamental changes for the organization."}, {"tr": "Direktorlar ŇüurasńĪ.", "en": "Board of directors.", "cmt_tr": "Direktorlar ŇüurasńĪ r…ôhb…ôrliy…ô √ľmumi istiqam…ôt v…ô s…ôlahiyy…ôtin m…ônb…ôyidir v…ô n…ôzar…ôt √ľ√ß√ľn son m…ôsuliyy…ôt daŇüńĪyńĪr. ńįdar…ô hey…ôtinin v…ôzif…ôl…ôrin…ô (1) zabitl…ôrin se√ßilm…ôsi v…ô k…ônarlaŇüdńĪrńĪlmasńĪ; (2) kapital strukturu haqqńĪnda q…ôrarlar; (3) daxili qaydalarńĪn …ôlav…ô edilm…ôsi, d…ôyiŇüdirilm…ôsi v…ô ya l…ôńüv edilm…ôsi; (4) …ôsaslńĪ d…ôyiŇüiklikl…ôrin baŇüladńĪlmasńĪ; (5) dividendl…ôrin elan edilm…ôsi; (6) r…ôhb…ôrlik kompensasiyasńĪnńĪn m√ľ…ôyy…ôn edilm…ôsi; (7) audit f…ôaliyy…ôtl…ôrinin koordinasiyasńĪ; v…ô (8) riskin qiym…ôtl…ôndirilm…ôsi v…ô idar…ô edilm…ôsi daxildir.", "cmt_en": "The board of directors is the source of overall direction to, and the authority of, management and has the ultimate responsibility for oversight. The board has the following duties: (1) selection and removal of officers; (2) decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiation of fundamental changes; (5) decisions to declare and distribute dividends; (6) setting of management compensation; (7) coordinating audit activities; and (8) evaluating and managing risk. Initiation of fundamental changes for the organization includes mergers and acquisitions."}], "answer": 3}, {"q_tr": "Kurumsal y√∂netiŇüim…ô …ôn √ßox t…ôsir g√∂st…ôrm…ô ehtimalńĪ olan n…ôdir?", "q_en": "Corporate governance is most likely to be influenced by", "options": [{"tr": "ńį√ß denetim funksiyasńĪ.", "en": "The internal audit function.", "cmt_tr": "Kurumsal y√∂netiŇüim…ô daxili v…ô ya xarici mexanizml…ôrl…ô t…ôsir g√∂st…ôril…ô bil…ôr. Daxili mexanizml…ôr…ô t…ôŇükilatńĪn h…ôd…ôfl…ôrin…ô √ßatmasńĪnńĪ t…ômin ed…ôn prosesl…ôri v…ô strukturlarńĪ qiym…ôtl…ôndir…ôr…ôk v…ô t…ôkmill…ôŇüdir…ôr…ôk kurumsal y√∂netiŇüim…ô t…ôsir g√∂st…ôr…ôn i√ß denetim funksiyalarń .", "cmt_tr": "R…ôqibl…ôr √ľmumiyy…ôtl…ô t…ôŇükilatńĪn f…ôaliyy…ôtl…ôrind…ôn iŇü√ßil…ôr…ô nisb…ôt…ôn daha az t…ôsirl…ônir.", "cmt_en": "Competitors generally are less affected by the organization‚Äôs actions than employees."}, {"tr": "ńįŇü√ßil…ôr.", "en": "Employees.", "cmt_tr": "MaraqlńĪ t…ôr…ôfl…ôr m√ľ…ôssis…ônin f…ôaliyy…ôtl…ôrind…ôn t…ôsirl…ôn…ôn Ňü…ôxsl…ôr v…ô ya qurumlardńĪr. Dig…ôrl…ôri arasńĪnda bunlara (1) s…ôhmdarlar, (2) iŇü√ßil…ôr, (3) t…ôchizat√ßńĪlar, (4) m√ľŇüt…ôril…ôr, (5) m√ľ…ôssis…ônin obyektl…ôrinin qonŇüularńĪ v…ô (6) d√∂vl…ôt t…ônziml…ôyicil…ôri daxildir.", "cmt_en": "Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity‚Äôs facilities, and (6) government regulators."}, {"tr": "Ňěirk…ôt nizamnam…ôl…ôri v…ô daxili qaydalar.", "en": "Corporate charters and bylaws.", "cmt_tr": "Y√∂netiŇüim…ô t…ôsir g√∂st…ôr…ôn daxili mexanizml…ôr…ô Ňüirk…ôt nizamnam…ôl…ôri v…ô daxili qaydalar daxildir. Lakin y√∂netiŇüim m√ľnasib…ôtl…ôri t…ôŇükilatńĪn f…ôaliyy…ôtl…ôrind…ôn t…ôsirl…ôn…ôn Ňü…ôxsl…ôr v…ô qurumlarla (maraqlńĪ t…ôr…ôfl…ôrl…ô) qurulur.", "cmt_en": "Internal mechanisms that influence governance include corporate charters and bylaws. But governance relationships are with individuals and entities (stakeholders) who are affected by the organization‚Äôs actions."}], "answer": 2}, {"q_tr": "Qlobal q…ôbul edilmiŇü t…ôrif…ô g√∂r…ô, y√∂netiŇüim", "q_en": "According to a globally accepted definition, governance", "options": [{"tr": "T…ôŇükilatńĪn m…ôd…ôniyy…ôti il…ô sinonimdir.", "en": "Is synonymous with the organization‚Äôs culture.", "cmt_tr": "Y√∂netiŇüim t…ôcr√ľb…ôl…ôri t…ôŇükilatńĪn unikal m…ôd…ôniyy…ôtini …ôks etdirir v…ô effektivlik √ľ√ß√ľn …ôsas…ôn ona bańülńĪdńĪr. Lakin t…ôŇükilatńĪn b√ľt√ľn f…ôaliyy…ôtl…ôri h…ôd…ôfl…ôrin…ô √ßatmaq √ľ√ß√ľn m…ôlumatlandńĪrńĪlmalńĪ, istiqam…ôtl…ôndirilm…ôli, idar…ô olunmalńĪ flect the mission, vision, and core values of the organization. Study Unit 6: Governance | Subunit 2: Organizational Culture"}], "answer": 3}, {"q_tr": "T…ôŇükilati m…ôd…ôniyy…ôt aŇüańüńĪdakńĪlardan hansńĪnda …ôks olunur? I. PerformansńĪn √∂l√ß√ľlm…ôsi II. HesabatlńĪlńĪńüńĪn m√ľ…ôyy…ôn edilm…ôsi III. Korporativ sosial m…ôsuliyy…ôtl…ôr…ô uyńüunluq", "q_en": "Organizational culture is reflected in which of the following? I. Measuring performance II. Specifying accountability III. Complying with corporate social responsibilities", "options": [{"tr": "YalnńĪz I.", "en": "I only.", "cmt_tr": "T…ôŇükilati m…ôd…ôniyy…ôt h…ôm√ßinin hesabatlńĪlńĪńüńĪn m√ľ…ôyy…ôn edilm…ôsi v…ô korporativ sosial m…ôsuliyy…ôtl…ôr…ô uyńüunluqda …ôks olunur.", "cmt_en": "Organizational culture also is reflected in specifying accountability and complying with corporate social responsibilities."}, {"tr": "YalnńĪz I v…ô II.", "en": "I and II only.", "cmt_tr": "T…ôŇükilati m…ôd…ôniyy…ôt h…ôm√ßinin korporativ sosial m…ôsuliyy…ôtl…ôr…ô uyńüunluqda …ôks olunur.", "cmt_en": "Organizational culture also is reflected in complying with corporate social responsibilities."}, {"tr": "YalnńĪz II v…ô III.", "en": "II and III only.", "cmt_tr": "T…ôŇükilati m…ôd…ôniyy…ôt h…ôm√ßinin performansńĪn √∂l√ß√ľlm…ôsind…ô …ôks olunur.", "cmt_en": "Organizational culture also is reflected in measuring performance."}, {"tr": "I, II v…ô III.", "en": "I, II, and III.", "cmt_tr": "T…ôŇükilati m…ôd…ôniyy…ôt performansńĪn √∂l√ß√ľlm…ôsi, hesabatlńĪlńĪńüńĪn m√ľ…ôyy…ôn edilm…ôsi v…ô korporativ sosial m…ôsuliyy…ôtl…ôr…ô uyńüunluqda …ôks olunur.", "cmt_en": "Organizational culture is reflected in measuring performance, specifying accountability and complying with corporate social responsibilities."}], "answer": 3}, {"q_tr": "ńį√ß denetim funksiyasńĪnńĪn baŇü audit icra√ßńĪsńĪ (BAńį) t…ôŇükilatńĪn baŇü etika zabiti v…ôzif…ôsini yerin…ô yetirir. Bu funksiyanńĪn yerin…ô yetirilm…ôsinin m…ônfi c…ôh…ôti n…ôdir?", "q_en": "The chief audit e ilati m√ľst…ôqilliyi z…ôruridir, √ß√ľnki o daxili g√ľvenc…ô xidm…ôtl…ôri g√∂st…ôrir. Xarici g√ľvenc…ô xarici auditorlar, m…ôsl…ôh…ôt√ßil…ôr, s…ônaye qruplarńĪ v…ô ya t…ônziml…ôyicil…ôr t…ôr…ôfind…ôn t…ômin oluna bil…ôr.", "cmt_en": "In some circumstances, the role of chief ethics officer may conflict with the independence attribute of the internal audit function. The organizational independence of the internal audit function is necessary because it performs internal assurance services. External assurance may be provided by external auditors, consultants, industry groups, or regulators. Study Unit 6: Governance | Subunit 2: Organizational Culture"}], "answer": 3}, {"q_tr": "ńį√ß denetim funksiyasńĪ t…ôŇükilatńĪn etik m√ľhitini qiym…ôtl…ôndirir. Buna g√∂r…ô daxili auditorlar …ôn √ßox n…ôyi qiym…ôtl…ôndirir?", "q_en": "The internal audit function assesses the organization‚Äôs ethical climate. Accordingly, internal auditors most likely evaluate", "options": [{"tr": "ńįŇü√ßil…ôrin iddia edil…ôn qanun pozuntularńĪndan d…ôrhal x…ôb…ôrdar edilib-edilm…ôdiyini.", "en": "Whether employees have been promptly notified of alleged misconduct.", "cmt_tr": "ńįddia edil…ôn qanun pozuntularńĪnńĪn bildirilm…ôsi gizli olmalńĪdńĪr.", "cmt_en": "Reporting of alleged misconduct should be confidential."}, {"tr": "SaxtakarlńĪq v…ô korrupsiya il…ô bańülńĪ prosedurlarńĪ.", "en": "Procedures covering fraud and corruption.", "cmt_tr": "ńį√ß denetim funksiyasńĪ t…ôŇükilatńĪn etik m√ľhitinin elementl…ôrini v…ô h√ľquqi v…ô etik uyńüunluńüun …ôld…ô edilm…ôsind…ô effektivliyini vaxtaŇüńĪrńĪ qiym…ôtl…ôndirir. Daxili auditorlar buna g√∂r…ô d…ô formal davranńĪŇü kodeksinin v…ô …ôlaq…ôli b…ôyanat v…ô siyas…ôtl…ôrin (saxtakarlńĪq v…ô korrupsiya il…ô bańülńĪ prosedurlar daxil olmaqla) effektivliyini qiym…ôtl…ôndirir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption)."}, {"tr": "√úst r…ôhb…ôrliyin araŇüdńĪrma xidm…ôtl…ôri g√∂st…ôrm…ôk m…ôsuliyy…ôtini √∂z √ľz…ôrin…ô g√∂t√ľrm…ôsini.", "en": "The assumption of responsibility by senior management for providing investigative services.", "cmt_tr": "Daxili auditorlar m…ôsl…ôh…ôt, araŇüdńĪrma v…ô hesabat verm…ô √ľ√ß√ľn m…ôsuliyy…ôtl…ôrin aydńĪn h…ôval…ô edilm…ôsinin effektivliyini qiym…ôtl…ôndirir.", "cmt_en": "Internal auditors evaluate the effectiveness of the clear delegation of responsibilities for providing counsel, investigation, and reporting."}, {"tr": "Etik m√ľhitin v…ôziyy…ôtini m√ľ…ôyy…ôn etm…ôk √ľ√ß√ľn r…ôhb…ôrl…ôrin m√ľnt…ôz…ôm sorńüularńĪnńĪ.", "en": "Regular surveys of managers to determine the state of the ethical climate.", "cmt_tr": "Daxili auditorlar etik m√ľhitin v…ôziyy…ôtini m√ľ…ôyy…ôn etm…ôk √ľ√ß√ľn iŇü√ßil…ôrin, t…ôchizat√ßńĪlarńĪn v…ô m√ľŇüt…ôril…ôrin m√ľnt…ôz…ôm sorńüularńĪnńĪn effektivliyini qiym…ôtl…ôndirir. Bu proses yalnńĪz r…ôhb…ôrl…ôrl…ô m…ôhdudlaŇümńĪr.", "cmt_en": "Internal auditors evaluate the effectiveness of regular surveys of employees, suppliers, and customers to determine the state of the ethical climate. This process is not limited to managers."}], "answer": 1}], "SU3 - Roles of Internal Auditors": [{"q_tr": "Y√∂netiŇüimin …ôsas prinsipi n…ôdir?", "q_en": "A basic principle of governance is", "options": [{"tr": "M√ľst…ôqil i√ß denetim funksiyasńĪ t…ôr…ôfind…ôn y√∂netiŇüim prosesinin qiym…ôtl…ôndirilm…ôsi.", "en": "Assessment of the governance process by an independent internal audit function.", "cmt_tr": "ńį√ß denetim funksiyasńĪ y√∂netiŇüim prosesini qiym…ôtl…ôndirm…ôli v…ô t…ôkmill…ôŇüdirm…ôk √ľ√ß√ľn m√ľvafiq t√∂vsiy…ôl…ôr verm…ôlidir.", "cmt_en": "The internal audit function must assess and make appropriate recommendations for improving the governance process."}, {"tr": "ńįdar…ô hey…ôti, √ľst r…ôhb…ôrlik v…ô i√ß denetim funksiyasńĪnńĪn effektivliy…ô g√∂r…ô m…ôsul tutulmasńĪ.", "en": "Holding the board, senior management, and the internal audit function accountable for its effectiveness.", "cmt_tr": "ńį√ß denetim funksiyasńĪ y√∂netiŇüim prosesinin qiym…ôtl…ôndiricisidir. O, bu proses…ô g√∂r…ô m…ôsul deyildir.", "cmt_en": "The internal audit function is an assessor of the governance process. It is not accountable for that process."}, {"tr": "Y√∂netiŇüim prosesi haqqńĪnda g√ľvenc…ô t…ômin etm…ôk √ľ√ß√ľn yalnńĪz xarici auditorlardan istifad…ô.", "en": "Exclusive use of external auditors to provide assurance about the governance process.", "cmt_tr": "Xarici t…ôr…ôfl…ôr v…ô daxili auditorlar y√∂netiŇüim prosesi haqqńĪnda g√ľvenc…ô t…ômin ed…ô bil…ôr.", "cmt_en": "External parties and internal auditors may provide assurance about the governance process."}, {"tr": "Y√∂netiŇüim prosesinin t…ôŇükilatda etik m…ôd…ôniyy…ôtin t…ôŇüviq edilm…ôsind…ôn ayrńĪlmasńĪ.", "en": "Separation of the governance process from promoting an ethical culture in the organization.", "cmt_tr": "ńį√ß denetim funksiyasńĪ t…ôŇükilatda m√ľvafiq etika v…ô d…ôy…ôrl…ôrin t…ôŇüviq edilm…ôsind…ô y√∂netiŇüim prosesini qiym…ôtl…ôndirm…ôli v…ô t…ôkmill…ôŇüdirm…ôk √ľ√ß√ľn m√ľvafiq t√∂vsiy…ôl…ôr verm…ôlidir.", "cmt_en": "The internal audit function must assess and make appropriate recommendations for improving the governance process in its promotion of appropriate ethics and values within the organization."}], "answer": 0}, {"q_tr": "Y√∂netiŇüimin qiym…ôtl…ôndirilm…ôsi √ľ√ß√ľn i√ß denetim funksiyasńĪnńĪn planlamasńĪnda …ôn √ßox n…ô n…ôz…ôr…ô alńĪnmalńĪdńĪr?", "q_en": "Which of the following most likely should be considered in the internal audit function‚Äôs planning for the assessment of governance?", "options": [{"tr": "B√ľt√ľn …ôh…ômiyy…ôtli q…ôrarlarńĪn idar…ô hey…ôti t…ôr…ôfind…ôn icaz…ô verilir-verilm…ôdiyini.", "en": "Whether all material decisions have been authorized by the board.", "cmt_tr": "R…ôhb…ôrlik g√ľnd…ôlik y√∂netiŇüim funksiyalarńĪnńĪ yerin…ô yetirir. √úst r…ôhb…ôrlik riskl…ôrin harada idar…ô olunacańüńĪnńĪ, risk sahibl…ôrinin kim olacańüńĪnńĪ v…ô riskl…ôrin nec…ô idar…ô olunacańüńĪnńĪ m√ľ…ôyy…ôn edir. ńįdar…ô hey…ôti n…ôzar…ôt √ľ√ß√ľn son m…ôsuliyy…ôt daŇüńĪyńĪr.", "cmt_en": "Management performs day-to-day governance functions. For example, senior management determines (1) where risks are managed, (2) who will be risk owners, and (3) how risks will be managed. The board has the ultimate responsibility for oversight. Its duties also include decisions about capital structure, dividends, mergers and acquisitions, coordinating audits, etc."}, {"tr": "Dig…ôr auditl…ôrd…ô daxili n…ôzar…ôtin qiym…ôtl…ôndirilm…ôsin…ô g√ľv…ônm…ôk.", "en": "Relying on the assessment of internal control in other audits.", "cmt_tr": "BaŇü audit icra√ßńĪsńĪ y√∂netiŇüimin qiym…ôtl…ôndirilm…ôsinin planlamasńĪnda aŇüańüńĪdakńĪlarńĪ n…ôz…ôr…ô almalńĪdńĪr: ‚ÄĘ Audit t…ôŇükilata m…ônfi t…ôsir g√∂st…ôr…ô bil…ôc…ôk hadis…ôl…ôrin qarŇüńĪsńĪnńĪ almaq v…ô ya aŇükar etm…ôk √ľ√ß√ľn hazńĪrlanmńĪŇü y√∂netiŇüim prosesl…ôrind…ôki n…ôzar…ôtl…ôri …ôhat…ô etm…ôlidir; ‚ÄĘ Y√∂netiŇüim prosesl…ôrind…ôki n…ôzar…ôtl…ôr √ßox vaxt √ßoxsaylńĪ riskl…ôrin idar…ô edilm…ôsind…ô …ôh…ômiyy…ôtlidir; v…ô ‚ÄĘ Dig…ôr auditl…ôr y√∂netiŇüim prosesl…ôrind…ôki n…ôzar…ôtl…ôri qiym…ôtl…ôndirirs…ô, auditor onlarńĪn n…ôtic…ôl…ôrin…ô g√ľv…ônm…ôyi d√ľŇü√ľnm…ôlidir.", "cmt_en": "The chief audit executive should consider the following in planning assessments of governance: ‚ÄĘ An audit should address controls in governance processes that are designed to prevent or detect events that could have a negative effect on the organization; ‚ÄĘ Controls within governance processes often are significant in managing multiple risks; and, ‚ÄĘ If other audits assess controls in governance processes, the auditor should consider relying on their results. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"}, {"tr": "T…ôŇükilatńĪn i√ß denetim funksiyasńĪnńĪn y√∂netiŇüim t…ôrifin…ô uyńüunluńüu.", "en": "The compliance of the organization with the internal audit function‚Äôs definition of governance.", "cmt_tr": "ńį√ß denetim funksiyasńĪ idar…ô hey…ôti v…ô √ľst r…ôhb…ôrlikl…ô y√∂netiŇüimin t…ôrifi √ľz…ôrind…ô razńĪlaŇümalńĪdńĪr. IIA y√∂netiŇüimi t…ôyin edib. Lakin t…ôŇükilatńĪn t…ôrifi f…ôrqlidirs…ô, BAńį h…ômin t…ôrifd…ôn istifad…ô ed…ô bil…ôr.", "cmt_en": "The internal audit function should agree upon the definition of governance with the board and senior management. The IIA has defined governance. But if the organization‚Äôs definition differs, the CAE may use that definition."}, {"tr": "N…ôzar…ôt v…ô riskin …ôlaq…ôsiz olduńüu yollar.", "en": "The ways in which control and risk are unrelated.", "cmt_tr": "N…ôzar…ôtl…ôr riskl…ôri …ôhat…ô edir. Bel…ôlikl…ô, onlar …ôlaq…ôlidir.", "cmt_en": "Controls address risks. Thus, they are related."}], "answer": 1}, {"q_tr": "Daha az strukturlaŇüdńĪrńĪlmńĪŇü y√∂netiŇüim prosesind…ô i√ß denetim funksiyasńĪnńĪn rolu …ôn √ßox n…ôdir?", "q_en": "Which of the following is most likely an internal audit function‚Äôs role in a less structured governance process?", "options": [{"tr": "N…ôzar…ôtd…ôn f…ôrqli olan x√ľsusi y√∂netiŇüim prosesl…ôrinin effektivliyinin qiym…ôtl…ôndirilm…ôsi.", "en": "Evaluating the effectiveness of specific governance processes that are distinct from control.", "cmt_tr": "X√ľsusi y√∂netiŇüim prosesl…ôrinin effektivliyinin qiym…ôtl…ôndirilm…ôsi daha strukturlaŇüdńĪrńĪlmńĪŇü i√ß denetim y√∂netiŇüim yetkinlik modelin…ô xasdńĪr. Bundan …ôlav…ô, y√∂netiŇüim n…ôzar…ôt v…ô risk idar…ôetm…ôsind…ôn f…ôrqli prosesl…ôr kimi m√∂vcud deyil.", "cmt_en": "Evaluating the effectiveness of specific governance processes is typical of a more structured internal auditing governance maturity model. Moreover, governance does not exist as processes distinct from control and risk management."}, {"tr": "Prosedurlar, siyas…ôtl…ôr v…ô planlara uyńüunluq.", "en": "Compliance with procedures, policies, and plans.", "cmt_tr": "Daha az yetkin y√∂netiŇüim sistemi siyas…ôtl…ôr…ô, prosedurlara, planlara, qanunlara, t…ônziml…ôm…ôl…ôr…ô v…ô m√ľqavil…ôl…ôr…ô uyńüunluq t…ôl…ôbl…ôrini vurńüulayńĪr. H…ôm√ßinin t…ôŇükilatńĪn …ôsas riskl…ôrini …ôhat…ô edir. Bel…ôlikl…ô, i√ß denetim funksiyasńĪ bu m…ôs…ôl…ôl…ôr haqqńĪnda m…ôsl…ôh…ôt verir.", "cmt_en": "A less mature governance system emphasizes the requirements for compliance with policies, procedures, plans, laws, regulations, and contracts. It also addresses the basic risks to the organization. Thus, the internal audit function provides advice about such matters. As the governance process becomes more structured, the internal audit function‚Äôs emphasis will shift to optimizing the governance structure and practices."}, {"tr": "Y√∂netiŇüim t…ôcr√ľb…ôl…ôrinin optimallaŇüdńĪrńĪlmasńĪnda m…ôsl…ôh…ôt√ßi rolu oynamaq.", "en": "Acting as a consultant in optimizing governance practices.", "cmt_tr": "Y√∂netiŇüim t…ôcr√ľb…ôl…ôrinin v…ô strukturunun optimallaŇüdńĪrńĪlmasńĪnda m…ôsl…ôh…ôt√ßi rolu oynamaq daha strukturlaŇüdńĪrńĪlmńĪŇü i√ß denetim y√∂netiŇüim yetkinlik modelin…ô xasdńĪr.", "cmt_en": "Playing a consulting role in optimizing governance practices and structure is typical of a more structured internal auditing governance maturity model. The emphasis shifts to considering best practices and adapting them to the specific organization."}, {"tr": "∆Źsas riskl…ôri …ôhat…ô ed…ôn prosesl…ôrin hazńĪrlanmasńĪ.", "en": "Designing processes to address basic risks.", "cmt_tr": "Daxili auditorlar prosesl…ôr hazńĪrlayaraq obyektivlikl…ôrini z…ôd…ôl…ôyirl…ôr. Lakin x√ľsusi prosesl…ôrin dizaynńĪnńĪn v…ô effektivliyinin qiym…ôtl…ôndirilm…ôsi tipik i√ß denetim roludur.", "cmt_en": "Internal auditors impair their objectivity by designing processes. However, evaluating the design and effectiveness of specific processes is a typical internal audit role."}], "answer": 1}, {"q_tr": "Y√∂netiŇüim prosesl…ôrinin dizaynńĪ v…ô t…ôtbiqi kimin m…ôsuliyy…ôtidir?", "q_en": "The design and implementation n of governance processes are the responsibility of", "options": [{"tr": "ńįdar…ô hey…ôti ‚Äď B…ôli. R…ôhb…ôrlik - B…ôli", "en": "The Board ‚Äď Yes. Management - Yes", "cmt_tr": "Y√∂netiŇüim IIA t…ôr…ôfind…ôn m√ľ…ôyy…ôn edilmiŇü √ľ√ß …ôsas prosesd…ôn biridir. Y√∂netiŇüim prosesl…ôrinin dizaynńĪ v…ô t…ôtbiqi idar…ô hey…ôti v…ô r…ôhb…ôrliyin m…ôsuliyy…ôtidir.", "cmt_en": "Governance is one of the three basic processes identified by The IIA. The design and implementation of governance processes are the responsibility of the board and management."}, {"tr": "ńįdar…ô hey…ôti ‚Äď B…ôli. R…ôhb…ôrlik - Xeyr", "en": "The Board ‚Äď Yes. Management - No", "cmt_tr": "R…ôhb…ôrlik d…ô y√∂netiŇüim prosesl…ôrinin dizaynńĪ v…ô t…ôtbiqin…ô m…ôsuldur.", "cmt_en": "Management is also responsible for the design and implementation of governance processes."}, {"tr": "ńįdar…ô hey…ôti ‚Äď Xeyr. R…ôhb…ôrlik - B…ôli", "en": "The Board ‚Äď No. Management - Yes", "cmt_tr": "ńįdar…ô hey…ôti d…ô y√∂netiŇüim prosesl…ôrinin dizaynńĪ v…ô t…ôtbiqin…ô m…ôsuldur.", "cmt_en": "The board is also responsible for the design and implementation of governance processes."}, {"tr": "ńįdar…ô hey…ôti ‚Äď Xeyr. R…ôhb…ôrlik - Xeyr", "en": "The Board ‚Äď No. Management ‚Äď No Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "cmt_tr": "H…ôm r…ôhb…ôrlik, h…ôm d…ô idar…ô hey…ôti y√∂netiŇüim prosesl…ôrinin dizaynńĪ v…ô t…ôtbiqin…ô m…ôsuldur.", "cmt_en": "Both management and the board are responsible for the design and implementation of governance processes."}], "answer": 0}, {"q_tr": "ńį√ß denetim funksiyasńĪnńĪn t…ôŇükilatńĪn y√∂netiŇüim prosesin…ô birbaŇüa t√∂hf…ôsini …ôn yaxŇüńĪ t…ôsvir ed…ôn hansńĪdńĪr?", "q_en": "Which one of the following is the best description of how the internal audit function directly contributes to an organization‚Äôs governance process?", "option // ‚ĒÄ‚ĒÄ STATE ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

let answered = [];       // per-question answered flag

// ‚ĒÄ‚ĒÄ HELPERS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function totalCorrect() { return correctArr.filter(Boolean).length; }
function totalAnswered() { return answered.filter(Boolean).length; }
function totalQuestions() { return SHEETS.reduce((s,k)=>s+QUIZ[k].length,0); }

function optLetter(i) { return ["A","B","C","D"][i]; }

function getChapterStats(ci) {
  const qs = QUIZ[SHEETS[ci]];
  const offset = SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0);
  let c=0, t=0;
  for(let i=0;i<qs.length;i++){
    if(answered[offset+i]){ t++; if(correctArr[offset+i]) c++; }
  }
  return {c,t,total:qs.length};
}

function globalIndex(ci, qi) {
  return SHEETS.slice(0,ci).reduce((s,k)=>s+QUIZ[k].length,0) + qi;
}

// ‚ĒÄ‚ĒÄ LOCALSTORAGE KEY ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
const LS_KEY = "cia_quiz_unit6";
const HISTORY_KEY = LS_KEY + "_history";
const MAX_HISTORY = 5;

// ‚ĒÄ‚ĒÄ INIT ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function initState() {
  const total = totalQuestions();
  answered   = new Array(total).fill(false);
  correctArr = new Array(total).fill(false);
  visitedQ   = {};
  QUIZ[SHEETS.forEach ? SHEETS[0] : Object.keys(QUIZ)[0]];
  SHEETS.forEach((_,ci) => { QUIZ[SHEETS[ci]].forEach(q => { q._chosen = undefined; }); });
}

function saveProgress() {
  const data = {
    answered, correctArr, curChapter, curQ, visitedQ: {},
    chosen: SHEETS.map((s,ci) => QUIZ[s].map(q => q._chosen ?? null))
  };
  // visitedQ has Sets ‚ÄĒ convert to arrays
  Object.keys(visitedQ).forEach(k => { data.visitedQ[k] = [...visitedQ[k]]; });
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    answered   = data.answered   || [];
    correctArr = data.correctArr || [];
    curChapter = data.curChapter || 0;
    curQ       = data.curQ       || 0;
    visitedQ   = {};
    Object.keys(data.visitedQ||{}).forEach(k => { visitedQ[k] = new Set(data.visitedQ[k]); });
    // Restore _chosen
    (data.chosen||[]).forEach((arr,ci) => {
      arr.forEach((ch,qi) => { if(ch !== null) QUIZ[SHEETS[ci]][qi]._chosen = ch; });
    });
    return true;
  } catch(e) { return false; }
}

function clearProgress() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function startOrResume() {
  const hasSave = loadProgress();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  if(hasSave && answered.some(Boolean)) {
    updateScore();
    updateProgress();
    goToChapter(curChapter);
  } else {
    initState();
    goToChapter(0);
  }
}

function startQuiz() {
  clearProgress();
  initState();
  quizStarted = true;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("chapters-scroll").style.display = "";
  document.getElementById("overall-result").className = "";
  buildChapterTabs();
  goToChapter(0);
}

function goToMenu() {
  saveProgress();
  window.location.href = "quiz_menu.html";
}

// ‚ĒÄ‚ĒÄ CHAPTER TABS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function buildChapterTabs() {
  const inner = document.getElementById("chapters-inner");
  inner.innerHTML = "";
  SHEETS.forEach((sname, ci) => {
    const btn = document.createElement("button");
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    btn.id = "ch-btn-"+ci;
    btn.innerHTML = `<span class="ch-dot"></span>${SHORT_NAMES[sname]||sname}`;
    btn.onclick = () => goToChapter(ci);
    inner.appendChild(btn);
  });
}

function updateChapterTabs() {
  SHEETS.forEach((sname,ci) => {
    const btn = document.getElementById("ch-btn-"+ci);
    if(!btn) return;
    btn.className = "ch-btn" + (ci===curChapter?" active":"");
    const stats = getChapterStats(ci);
    if(stats.t === stats.total) btn.classList.add("ch-done");
  });
}

// ‚ĒÄ‚ĒÄ NAVIGATION ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function goToChapter(ci) {
  // Skip chapters with 0 questions (can happen in mistakes modes)
  while (ci < SHEETS.length && QUIZ[SHEETS[ci]].length === 0) { ci++; }
  if (ci >= SHEETS.length) { showOverall(); return; }
  curChapter = ci;
  curQ = 0;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  updateChapterTabs();
  renderQuestion();
  renderQuestionGrid();
  scrollTo(0,0);
}

function nextQuestion() {
  const qs = QUIZ[SHEETS[curChapter]];
  curQ++;
  if(curQ >= qs.length) {
    showChapterSummary();
  } else {
    renderQuestion();
    renderQuestionGrid();
    const qa = document.getElementById("question-area");
    qa.scrollIntoView({behavior:"smooth", block:"start"});
  }
  updateProgress();
}

function jumpToQuestion(qi) {
  curQ = qi;
  document.getElementById("summary-card").className = "";
  document.getElementById("summary-card").innerHTML = "";
  document.getElementById("overall-result").className = "";
  renderQuestion();
  renderQuestionGrid();
  updateProgress();
  const qa = document.getElementById("question-area");
  qa.scrollIntoView({behavior:"smooth", block:"start"});
}

function renderQuestionGrid() {
  const qs     = QUIZ[SHEETS[curChapter]];
  const offset = globalIndex(curChapter, 0);
  const area   = document.getElementById("q-grid-area");
  if(!area) return;

  const visited = visitedQ[curChapter] || new Set();

  let btns = qs.map((q, qi) => {
    const gi = offset + qi;
    let cls = "q-num-btn ";
    if(answered[gi]) {
      cls += correctArr[gi] ? "qst-correct" : "qst-wrong";
    } else if(visited.has(qi)) {
      cls += "qst-visited";
    } else {
      cls += "qst-unseen";
    }
    if(qi === curQ) cls += " qst-current";
    return `<button class="${cls}" onclick="jumpToQuestion(${qi})" title="Sual ${qi+1}">${qi+1}</button>`;
  }).join("");

  area.innerHTML = `
    <div class="q-grid-wrap">
      <div class="q-grid-label">${lang==="tr" ? "Suallar" : "Questions"}</div>
      <div class="q-grid">${btns}</div>
    </div>
    <button class="reset-unit-btn" onclick="confirmResetUnit()">
      ‚Üļ ${lang==="tr" ? "Bu unitńĪ sńĪfńĪrla" : "Reset this unit"}
    </button>`;
}

function confirmResetUnit() {
  const name = SHORT_NAMES[SHEETS[curChapter]] || SHEETS[curChapter];
  const msg  = lang==="tr"
    ? `"${name}" √ľ√ß√ľn b√ľt√ľn cavablar silin…ôc…ôk. Davam edirsiniz?`
    : `Reset all answers for "${name}"? This cannot be undone.`;
  if(!confirm(msg)) return;
  retryChapter(curChapter);
  renderQuestionGrid();
}

// ‚ĒÄ‚ĒÄ RENDER QUESTION ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function renderQuestion() {
  const qs   = QUIZ[SHEETS[curChapter]];
  if (!qs || qs.length === 0 || curQ >= qs.length) { showChapterSummary(); return; }
  const q    = qs[curQ];
  if (!q) { showChapterSummary(); return; }
  const gi   = globalIndex(curChapter, curQ);
  const done = answered[gi];

  // Track visited
  if(!visitedQ[curChapter]) visitedQ[curChapter] = new Set();
  visitedQ[curChapter].add(curQ);

  const area = document.getElementById("question-area");
  const card = document.createElement("div");
  card.className = "q-wrap";
  card.innerHTML = buildQuestionHTML(q, curQ, qs.length, gi, done);
  area.innerHTML = "";
  area.appendChild(card);

  // Restore state if already answered
  if(done) {
    const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
    const chosenIdx  = q._chosen !== undefined ? q._chosen : correctIdx;
    markAnswer(gi, chosenIdx, correctIdx, false);
  }

  // Show next button if already answered
  if(done) {
    const qs2 = QUIZ[SHEETS[curChapter]];
    const isLastQ  = (curQ === qs2.length - 1);
    const isLastCh = (curChapter === SHEETS.length - 1);
    const nextLabel = isLastQ
      ? (isLastCh ? (lang==="tr" ? "N…ôtic…ôl…ôr…ô bax ‚Üí" : "See Results ‚Üí")
                  : (lang==="tr" ? "N√∂vb…ôti M√∂vzu ‚Üí" : "Next Chapter ‚Üí"))
      : (lang==="tr" ? "N√∂vb…ôti Sual ‚Üí" : "Next Question ‚Üí");
    const nextAction = isLastQ ? "showChapterSummary()" : "nextQuestion()";
    const cardEl = document.getElementById(`card-${gi}`);
    if(cardEl && !cardEl.querySelector(".next-btn-wrap")) {
      const wrap = document.createElement("div");
      wrap.className = "next-btn-wrap visible";
      wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
      cardEl.appendChild(wrap);
    }
  }

  renderQuestionGrid();
}

function buildQuestionHTML(q, qi, total, gi, done) {
  const qText = lang==="tr" ? q.q_tr : q.q_en;
  const num   = qi+1;
  const opts  = q.options.map((opt,i) => {
    const rawTr = (opt.tr||opt.en);
    const rawEn = (opt.en||opt.tr);
    // "T√ľrk√ße metin / English text" formatńĪnńĪ ayńĪr
    const display = lang==="tr"
      ? (rawTr.includes(" / ") ? rawTr.split(" / ")[0].trim() : rawTr)
      : (rawEn.includes(" / ") ? rawEn.split(" / ").pop().trim() : rawEn);
    return `
    <button class="opt-btn" id="opt-${gi}-${i}" onclick="choose(${gi},${i})">
      <span class="opt-label">${optLetter(i)}</span>
      <span class="opt-text">${escHtml(display)}</span>
      <span class="opt-icon" id="icon-${gi}-${i}"></span>
    </button>
    <div class="explanation" id="expl-${gi}-${i}">
      <div class="expl-lang">${lang==="tr"?"T√ľrk√ße A√ßńĪklama":"TR A√ßńĪklama"}</div>
      <div class="expl-text">${escHtml(opt.cmt_tr)}</div>
      <div class="expl-divider"></div>
      <div class="expl-lang">English Explanation</div>
      <div class="expl-text">${escHtml(opt.cmt_en)}</div>
    </div>
    <button class="expl-toggle" id="toggle-${gi}-${i}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${lang==="tr" ? "ńįzahńĪ g√∂ster" : "Show explanation"}
    </button>`;
  }).join("");

  return `
  <div class="q-card" id="card-${gi}">
    <div class="q-header">
      <div class="q-number">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:7px">${SHORT_NAMES[SHEETS[curChapter]]||SHEETS[curChapter]} &nbsp;¬∑&nbsp; ${num} / ${total}</div>
        <div class="q-text">${escHtml(qText)}</div>
      </div>
    </div>
    <div class="q-options">${opts}</div>
  </div>`;
}

// ‚ĒÄ‚ĒÄ ANSWER LOGIC ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function choose(gi, chosen) {
  const ci = getCIFromGI(gi);
  const qi = gi - globalIndex(ci, 0);
  const q  = QUIZ[SHEETS[ci]][qi];
  if(answered[gi]) return;

  const correctIdx = (q.answer !== undefined) ? q.answer : ["A","B","C","D"].indexOf(q.correct);
  q._chosen = chosen;
  answered[gi]   = true;
  correctArr[gi] = (chosen === correctIdx);

  markAnswer(gi, chosen, correctIdx, true);
  updateScore();
  updateProgress();
  saveProgress();
}

function markAnswer(gi, chosen, correctIdx, animate) {
  const labels = ["A","B","C","D"];

  for(let i=0;i<4;i++) {
    const btn    = document.getElementById(`opt-${gi}-${i}`);
    const icon   = document.getElementById(`icon-${gi}-${i}`);
    const toggle = document.getElementById(`toggle-${gi}-${i}`);
    if(!btn) continue;
    btn.disabled = true;

    if(i === correctIdx) {
      btn.classList.add("correct");
      icon.textContent = "‚úď";
      if(toggle) toggle.classList.add("visible");
    } else if(i === chosen && chosen !== correctIdx) {
      btn.classList.add("wrong");
      icon.textContent = "‚úó";
      if(toggle) toggle.classList.add("visible");
    }
  }
  // Auto-open correct explanation
  const expl = document.getElementById(`expl-${gi}-${correctIdx}`);
  const tog  = document.getElementById(`toggle-${gi}-${correctIdx}`);
  if(expl && animate) {
    setTimeout(() => {
      openExpl(gi, correctIdx);
    }, 400);
  }

  // Show "Next question" button after answering
  if(animate) {
    const ci  = getCIFromGI(gi);
    const qi  = gi - globalIndex(ci, 0);
    const qs  = QUIZ[SHEETS[ci]];
    const isLastQ = (qi === qs.length - 1);
    const isLastCh = (ci === SHEETS.length - 1);

    const nextLabel = isLastQ
      ? (isLastCh
          ? (lang==="tr" ? "N…ôtic…ôl…ôr…ô bax ‚Üí" : "See Results ‚Üí")
          : (lang==="tr" ? "N√∂vb…ôti M√∂vzu ‚Üí" : "Next Chapter ‚Üí"))
      : (lang==="tr" ? "N√∂vb…ôti Sual ‚Üí" : "Next Question ‚Üí");

    const nextAction = isLastQ
      ? (isLastCh ? "showChapterSummary()" : "showChapterSummary()")
      : "nextQuestion()";

    const card = document.getElementById(`card-${gi}`);
    if(card) {
      const existing = card.querySelector(".next-btn-wrap");
      if(!existing) {
        const wrap = document.createElement("div");
        wrap.className = "next-btn-wrap";
        wrap.innerHTML = `<button class="btn-next-q" onclick="${nextAction}">${nextLabel}</button>`;
        card.appendChild(wrap);
        setTimeout(() => wrap.classList.add("visible"), 600);
      }
    }
  }
  // Refresh grid to show new answer state
  if(animate) {
    setTimeout(() => renderQuestionGrid(), 50);
  }
}

// ‚ĒÄ‚ĒÄ EXPLANATION TOGGLE ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function openExpl(gi, i) {
  const expl = document.getElementById(`expl-${gi}-${i}`);
  const tog  = document.getElementById(`toggle-${gi}-${i}`);
  if(!expl || !tog) return;
  const isOpen = expl.classList.contains("open");
  expl.classList.toggle("open", !isOpen);
  tog.classList.toggle("open", !isOpen);
  tog.querySelector("span") && (tog.querySelector("span").textContent =
    isOpen ? (lang==="tr"?"ńįzahńĪ g√∂ster":"Show explanation")
           : (lang==="tr"?"ńįzahńĪ gizl…ô":"Hide explanation"));
}

// Make toggle buttons call openExpl
document.addEventListener("click", e => {
  const tog = e.target.closest(".expl-toggle");
  if(!tog) return;
  const [,gi,i] = tog.id.split("-");
  openExpl(Number(gi), Number(i));
});

// ‚ĒÄ‚ĒÄ PROGRESS & SCORE ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function updateScore() {
  const c = totalCorrect();
  const a = totalAnswered();
  document.getElementById("score-badge").textContent = `${c} / ${a}`;
}

function updateProgress() {
  const a = totalAnswered();
  const t = totalQuestions();
  const pct = t ? (a/t*100).toFixed(1) : 0;
  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("prog-left").textContent =
    lang==="tr" ? `${a} cavablandńĪ` : `${a} answered`;
  document.getElementById("prog-right").textContent =
    lang==="tr" ? `${t} sual` : `${t} questions`;
}

// ‚ĒÄ‚ĒÄ CHAPTER SUMMARY ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function showChapterSummary() {
  const stats = getChapterStats(curChapter);
  const pct   = stats.total ? Math.round(stats.c/stats.total*100) : 0;
  const circ  = 2*Math.PI*46;
  const fill  = circ*(1 - pct/100);

  const isLast = curChapter === SHEETS.length-1;
  const nextLabel = lang==="tr" ? (isLast ? "B√ľt√ľn N…ôtic…ôl…ôr" : "N√∂vb…ôti M√∂vzu ‚Üí")
                                : (isLast ? "All Results" : "Next Chapter ‚Üí");

  const summaryDiv = document.getElementById("summary-card");
  summaryDiv.innerHTML = `
    <div class="summary-header">
      <h2>${lang==="tr"?"B√∂l√ľm TamamlandńĪ":"Chapter Complete"}</h2>
      <p>${SHEETS[curChapter]}</p>
    </div>
    <div class="summary-score-ring">
      <div class="ring-wrap">
        <svg viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"/>
          <circle class="ring-fill" cx="55" cy="55" r="46"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
            id="ring-fill-anim"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct">${pct}%</span>
          <span class="ring-sub">${lang==="tr"?"dońüru":"correct"}</span>
        </div>
      </div>
    </div>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-num" style="color:var(--correct)">${stats.c}</span>
        <span class="stat-label">${lang==="tr"?"Dońüru":"Correct"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" style="color:var(--wrong)">${stats.t-stats.c}</span>
        <span class="stat-label">${lang==="tr"?"S…ôhv":"Wrong"}</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">${stats.total}</span>
        <span class="stat-label">${lang==="tr"?"Sual":"Questions"}</span>
      </div>
    </div>
    <div class="summary-actions">
      <button class="btn-retry" onclick="retryChapter(${curChapter})">
        ‚Üļ ${lang==="tr"?"Yenid…ôn":"Retry"}
      </button>
      <button class="btn-next" onclick="${isLast?"showOverall()":"goToChapter("+(curChapter+1)+")"}">
        ${nextLabel}
      </button>
    </div>
  `;
  summaryDiv.classList.add("visible");
  document.getElementById("question-area").innerHTML = "";
  document.getElementById("q-grid-area").innerHTML = "";

  // Animate ring
  setTimeout(() => {
    const ring = document.getElementById("ring-fill-anim");
    if(ring) ring.style.strokeDashoffset = fill;
  }, 100);

  updateChapterTabs();
}

function retryChapter(ci) {
  const qs     = QUIZ[SHEETS[ci]];
  const offset = globalIndex(ci, 0);
  for(let i=0;i<qs.length;i++){
    answered[offset+i]   = false;
    correctArr[offset+i] = false;
    qs[i]._chosen        = undefined;
  }
  visitedQ[ci] = new Set();
  goToChapter(ci);
  updateScore();
  updateProgress();
  saveProgress();
}

// ‚ĒÄ‚ĒÄ OVERALL RESULTS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function showOverall() {
  document.getElementById("summary-card").className = "";
  const tc = totalCorrect();
  const ta = totalQuestions();
  const pct = ta ? Math.round(tc/ta*100) : 0;

  // Save history entry when quiz is fully completed
  if (!MISTAKES_MODE && !HISTORY_MISTAKES_MODE) {
    saveHistory();
  }

  const rows = SHEETS.map((sname, ci) => {
    const s = getChapterStats(ci);
    const p = s.total ? Math.round(s.c/s.total*100) : 0;
    return `<div class="cr-row">
      <div class="cr-name">${SHORT_NAMES[sname]||sname}</div>
      <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:0%" data-w="${p}%"></div></div>
      <div class="cr-score">${s.c}/${s.total}</div>
    </div>`;
  }).join("");

  const el = document.getElementById("overall-result");
  el.innerHTML = `
    <div class="overall-header">
      <h2>ūüéď ${lang==="tr"?"√úmumi N…ôtic…ô":"Overall Results"}</h2>
      <p>${tc} / ${ta} ¬∑ ${pct}% ${lang==="tr"?"dońüru":"correct"}</p>
    </div>
    <div class="chapter-results">${rows}</div>
    <button class="btn-restart" onclick="restartAll()">
      ‚Üļ ${lang==="tr"?"Yenid…ôn BaŇüla":"Restart All"}
    </button>
  `;
  el.classList.add("visible");
  updateChapterTabs();

  setTimeout(() => {
    el.querySelectorAll(".cr-bar-fill").forEach(b => {
      b.style.transition = "width 1s ease";
      b.style.width = b.dataset.w;
    });
  }, 100);
}

function restartAll() {
  clearProgress();
  initState();
  updateScore();
  updateProgress();
  buildChapterTabs();
  document.getElementById("overall-result").className = "";
  document.getElementById("summary-card").className = "";
  document.getElementById("question-area").innerHTML = "";
  goToChapter(0);
}

// ‚ĒÄ‚ĒÄ LANGUAGE TOGGLE ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function updateLangBtns(l) {
  document.querySelectorAll('#lang-group .lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
}

function setLang(l) {
  lang = l;
  updateLangBtns(l);
  if(!quizStarted) {
    const desc = document.getElementById("welcome-desc");
    if(desc && desc.dataset[l]) desc.textContent = desc.dataset[l];
    return;
  }
  updateProgress();
  if(document.getElementById("question-area").innerHTML !== "") {
    renderQuestion();
    renderQuestionGrid();
  }
}


// ‚ĒÄ‚ĒÄ MISTAKES MODE ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
const MISTAKES_MODE = new URLSearchParams(window.location.search).get('mode') === 'mistakes';

if (MISTAKES_MODE) {
  (function() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) { window.location.href = window.location.pathname; return; }
      const data = JSON.parse(raw);
      const sa = data.answered || [];
      const sc = data.correctArr || [];

      // Filter QUIZ to only incorrectly answered questions
      let offset = 0;
      let totalMistakes = 0;
      SHEETS.forEach(sname => {
        const orig = QUIZ[sname];
        const keep = [];
        for (let i = 0; i < orig.length; i++) {
          if (sa[offset + i] && !sc[offset + i]) {
            orig[i]._chosen = undefined;
            keep.push(orig[i]);
          }
        }
        offset += orig.length;
        QUIZ[sname] = keep;
        totalMistakes += keep.length;
      });

      if (totalMistakes === 0) { window.location.href = window.location.pathname; return; }

      // Don't overwrite original progress
      saveProgress = function() {};
      clearProgress = function() {};

      // Update UI for mistakes mode
      const appTitle = document.getElementById("app-title");
      if (appTitle) appTitle.textContent += " ‚ÄĒ S…ôhvl…ôr";

      const welc = document.getElementById("welcome");
      if (welc) {
        const h1 = welc.querySelector("h1");
        if (h1) h1.innerHTML = `S…ôhv Suallar<br><span style="color:var(--gold);font-size:.65em">${appTitle ? appTitle.textContent : ''}</span>`;
        const desc = document.getElementById("welcome-desc");
        if (desc) desc.textContent = totalMistakes + (lang === "tr" ? " s…ôhv sual ‚ÄĒ yenid…ôn iŇül…ô" : " wrong answers ‚ÄĒ retry them");
        // Update stats
        const statsItems = welc.querySelectorAll(".ws-num");
        if (statsItems.length >= 2) {
          statsItems[0].textContent = SHEETS.filter(s => QUIZ[s].length > 0).length;
          statsItems[1].textContent = totalMistakes;
          if (statsItems[2]) statsItems[2].textContent = totalMistakes * 4;
        }
        // Change buttons
        const mainBtn = document.getElementById("btn-main-start");
        if (mainBtn) mainBtn.textContent = lang === "tr" ? "‚Ė∂ S…ôhvl…ôri ńįŇül…ô" : "‚Ė∂ Retry Mistakes";
        const freshBtn = document.getElementById("btn-fresh-start");
        if (freshBtn) freshBtn.style.display = "none";
      }

      // Override startOrResume to skip loading saved progress (we already filtered)
      const _origStartOrResume = startOrResume;
      startOrResume = function() {
        initState();
        quizStarted = true;
        document.getElementById("welcome").style.display = "none";
        document.getElementById("chapters-scroll").style.display = "";
        document.getElementById("overall-result").className = "";
        buildChapterTabs();
        goToChapter(0);
      };

      // Override goToMenu to go back without ?mode
      goToMenu = function() { window.location.href = "quiz_menu.html"; };

    } catch(e) { console.error("Mistakes mode error:", e); }
  })();
}


// ‚ĒÄ‚ĒÄ PAGE LOAD ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
(function() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(raw) {
      const data = JSON.parse(raw);
      if(data.answered && data.answered.some(Boolean)) {
        const done = data.answered.filter(Boolean).length;

          `‚Ė∂ Davam et (${done}/${total}) / Resume`;

// ‚ĒÄ‚ĒÄ UTILS ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function escHtml(s) {
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function getCIFromGI(gi) {
  let acc=0;
  for(let ci=0;ci<SHEETS.length;ci++){
    acc += QUIZ[SHEETS[ci]].length;
    if(gi < acc) return ci;
  }
  return SHEETS.length-1;
}
// ‚ĒÄ‚ĒÄ HISTORY SYSTEM ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
function saveHistory() {
  try {
    const tc = totalCorrect();
    const ta = totalAnswered();
    const tq = totalQuestions();
    const pct = tq ? Math.round(tc/tq*100) : 0;

    const chapters = SHEETS.map((sname, ci) => {
      const s = getChapterStats(ci);
      return { name: sname, correct: s.c, wrong: s.t - s.c, total: s.total };
    });

    const mistakeIndices = [];
    for (let i = 0; i < answered.length; i++) {
      if (answered[i] && !correctArr[i]) mistakeIndices.push(i);
    }

    const entry = {
      date: new Date().toISOString(),
      correct: tc,
      wrong: ta - tc,
      total: tq,
      pct: pct,
      chapters: chapters,
      mistakeIndices: mistakeIndices
    };

    let history = [];
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) history = JSON.parse(raw);
    } catch(e) {}

    history.unshift(entry);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) { console.error("saveHistory error:", e); }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function renderHistory() {
  const area = document.getElementById("history-area");
  if (!area) return;
  const history = loadHistory();
  if (history.length === 0) { area.innerHTML = ""; return; }

  const circ = 2 * Math.PI * 18;
  const titleText = lang === "tr" ? "Tarix√ß…ô" : "History";

  let html = `<div class="history-title">${titleText}</div>`;

  history.forEach((entry, idx) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(lang === "tr" ? "az-AZ" : "en-US", {
      day: "numeric", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    const fill = circ * (1 - entry.pct / 100);
    const ringColor = entry.pct >= 75 ? "var(--correct)" : entry.pct >= 50 ? "var(--gold)" : "var(--wrong)";
    const hasMistakes = entry.mistakeIndices && entry.mistakeIndices.length > 0;
    const mistakeCount = hasMistakes ? entry.mistakeIndices.length : 0;
    const retryLabel = lang === "tr"
      ? `${mistakeCount} s…ôhv ‚ÄĒ t…ôkrarla`
      : `${mistakeCount} wrong ‚ÄĒ retry`;

    html += `
      <div class="history-card">
        <div class="hc-ring">
          <svg viewBox="0 0 44 44">
            <circle class="hc-ring-track" cx="22" cy="22" r="18"/>
            <circle class="hc-ring-fill" cx="22" cy="22" r="18"
              stroke="${ringColor}"
              stroke-dasharray="${circ}" stroke-dashoffset="${fill}"/>
          </svg>
          <div class="hc-ring-label">${entry.pct}%</div>
        </div>
        <div class="hc-info">
          <div class="hc-date">${dateStr}</div>
          <div class="hc-stats">
            <span class="hc-correct">‚úď ${entry.correct}</span> ¬∑
            <span class="hc-wrong">‚úó ${entry.wrong}</span> ¬∑
            ${entry.total} ${lang === "tr" ? "sual" : "Q"}
          </div>
        </div>
        ${hasMistakes ? `<div class="hc-actions">
          <button class="hc-retry-btn" onclick="retryHistoryMistakes(${idx})">
            ${retryLabel}
          </button>
        </div>` : `<div class="hc-actions" style="font-size:11px;color:var(--correct);font-weight:700">‚úď ${lang==="tr"?"M√ľk…ômm…ôl":"Perfect"}</div>`}
      </div>`;
  });

  area.innerHTML = html;
}

function retryHistoryMistakes(histIdx) {
  try {
    const history = loadHistory();
    if (!history[histIdx]) return;
    const entry = history[histIdx];
    const mistakeIndices = new Set(entry.mistakeIndices || []);
    if (mistakeIndices.size === 0) return;

    localStorage.setItem(HISTORY_KEY + "_retry", JSON.stringify(entry.mistakeIndices));
    const baseUrl = window.location.href.split('?')[0].split('#')[0];
    window.location.href = baseUrl + "?mode=history_mistakes";
  } catch(e) { console.error("retryHistoryMistakes error:", e); }
}
