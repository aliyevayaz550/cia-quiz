ble for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information.","cmt_en":"Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information."},{"tr":"Establish a system of risk management.","en":"Establish a system of risk management.","cmt_tr":"Senior management’s role is to oversee the establishment, administration, and assessment of the system of risk management and control processes. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Senior management’s role is to oversee the establishment, administration, and assessment of the system of risk management and control processes. Study Unit 6: Governance | Subunit 1: Governance Principles"},{"tr":"Implement and monitor controls designed.","en":"Implement and monitor controls designed.","cmt_tr":"The board has oversight responsibilities but ordinarily does not become involved in the details of operations.","cmt_en":"The board has oversight responsibilities but ordinarily does not become involved in the details of operations."}],"answer":0},{"q_tr":"Which of the following is least likely to influence corporate governance?","q_en":"Which of the following is least likely to influence corporate governance?","options":[{"tr":"Government regulators.","en":"Government regulators.","cmt_tr":"Corporate governance can be influenced by internal or external mechanisms. External mechanisms include government regulators who influence corporate governance by enforcing laws and regulations.","cmt_en":"Corporate governance can be influenced by internal or external mechanisms. External mechanisms include government regulators who influence corporate governance by enforcing laws and regulations."},{"tr":"Internal audit functions.","en":"Internal audit functions.","cmt_tr":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include internal audit functions, which influence corporate governance by evaluating and improving the processes and structures that enable an organization to achieve its objectives.","cmt_en":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include internal audit functions, which influence corporate governance by evaluating and improving the processes and structures that enable an organization to achieve its objectives."},{"tr":"External service providers.","en":"External service providers.","cmt_tr":"Corporate governance can be influenced by internal mechanisms (e.g., corporate charters and bylaws, boards of directors, and internal audit functions) and by external mechanisms (e.g., laws, regulations, and the government regulators who enforce them). As defined by The IIA Glossary, an external service provider is a person or firm outside of the organization that has special knowledge, skill, and experience in a particular discipline. Though external, an external service provider is least likely to influence corporate governance. Instead, they are relied upon to supplement the internal audit function when internal audit staff lack necessary knowledge, skill, or experience.","cmt_en":"Corporate governance can be influenced by internal mechanisms (e.g., corporate charters and bylaws, boards of directors, and internal audit functions) and by external mechanisms (e.g., laws, regulations, and the government regulators who enforce them). As defined by The IIA Glossary, an external service provider is a person or firm outside of the organization that has special knowledge, skill, and experience in a particular discipline. Though external, an external service provider is least likely to influence corporate governance. Instead, they are relied upon to supplement the internal audit function when internal audit staff lack necessary knowledge, skill, or experience."},{"tr":"Corporate charters and bylaws.","en":"Corporate charters and bylaws.","cmt_tr":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include corporate charters and bylaws, which influence corporate governance by establishing structures and policies.","cmt_en":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include corporate charters and bylaws, which influence corporate governance by establishing structures and policies."}],"answer":2},{"q_tr":"According to the Standards, governance is","q_en":"According to the Standards, governance is","options":[{"tr":"A process to identify, assess, manage, and control potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives.","en":"A process to identify, assess, manage, and control potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives.","cmt_tr":"This statement defines risk management according to The IIA Glossary.","cmt_en":"This statement defines risk management according to The IIA Glossary."},{"tr":"The combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.","en":"The combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.","cmt_tr":"Governance is defined in The IIA Glossary as the “combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.”","cmt_en":"Governance is defined in The IIA Glossary as the “combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.”"},{"tr":"The leadership, organizational structures, and processes that ensure the organization’s information technology supports its strategies and objectives. Study Unit 6: Governance | Subunit 1: Governance Principles","en":"The leadership, organizational structures, and processes that ensure the organization’s information technology supports its strategies and objectives. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_tr":"This statement specifically describes IT governance.","cmt_en":"This statement specifically describes IT governance."},{"tr":"The highest level body charged with governance, to direct and or oversee the organization’s activities and hold senior management accountable.","en":"The highest level body charged with governance, to direct and or oversee the organization’s activities and hold senior management accountable.","cmt_tr":"The statement defines, in part, board according to The IIA Glossary.","cmt_en":"The statement defines, in part, board according to The IIA Glossary."}],"answer":1},{"q_tr":"Which of the following statements is correct regarding governance?","q_en":"Which of the following statements is correct regarding governance?","options":[{"tr":"Governance models are most effective when the framework is modeled after publicly traded companies’ processes or systems.","en":"Governance models are most effective when the framework is modeled after publicly traded companies’ processes or systems.","cmt_tr":"Governance requirements vary by entity type and regulatory jurisdiction. The design and practice of effective governance vary with the size and complexity of the organizations, along with the legal and regulatory requirements of the jurisdiction.","cmt_en":"Governance requirements vary by entity type and regulatory jurisdiction. The design and practice of effective governance vary with the size and complexity of the organizations, along with the legal and regulatory requirements of the jurisdiction."},{"tr":"Governance involves a set of relationships between an organization’s management, board, shareholders, and other stakeholders.","en":"Governance involves a set of relationships between an organization’s management, board, shareholders, and other stakeholders.","cmt_tr":"The globally accepted definition of corporate governance given by the Organization for Economic Co-operation and Development (OECD) states, “Corporate governance involves a set of relationships between a company’s management, its board, its shareholders, and other stakeholders. Corporate governance also provides the structure through which the objectives of the company are set, and the means of attaining those objectives and monitoring performance are determined.”","cmt_en":"The globally accepted definition of corporate governance given by the Organization for Economic Co-operation and Development (OECD) states, “Corporate governance involves a set of relationships between a company’s management, its board, its shareholders, and other stakeholders. Corporate governance also provides the structure through which the objectives of the company are set, and the means of attaining those objectives and monitoring performance are determined.”"},{"tr":"Governance is independent of organizational culture.","en":"Governance is independent of organizational culture.","cmt_tr":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness.","cmt_en":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness."},{"tr":"Governance exists as a distinct process and structure separate from risk management and control.","en":"Governance exists as a distinct process and structure separate from risk management and control.","cmt_tr":"Governance does not exist independently of risk management and control. Rather, governance, risk management, and control are closely related. Effective governance considers risk when setting strategy, and risk management relies on effective governance. Additionally, effective governance relies on controls and communication to the board on their effectiveness. Control and risk are also related as controls manage risks. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Governance does not exist independently of risk management and control. Rather, governance, risk management, and control are closely related. Effective governance considers risk when setting strategy, and risk management relies on effective governance. Additionally, effective governance relies on controls and communication to the board on their effectiveness. Control and risk are also related as controls manage risks. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":1},{"q_tr":"Which of the following is the least likely purpose of governance?","q_en":"Which of the following is the least likely purpose of governance?","options":[{"tr":"Influence government regulators.","en":"Influence government regulators.","cmt_tr":"Governance is concerned with optimizing organizational activities to achieve the organization’s objectives. Thus, its primary purposes are to inform, direct, manage, and monitor “internal” activities. Although government regulators influence governance, reciprocating such influence is not a primary purpose of governance.","cmt_en":"Governance is concerned with optimizing organizational activities to achieve the organization’s objectives. Thus, its primary purposes are to inform, direct, manage, and monitor “internal” activities. Although government regulators influence governance, reciprocating such influence is not a primary purpose of governance."},{"tr":"Establish appropriate structures.","en":"Establish appropriate structures.","cmt_tr":"A purpose of governance is to establish necessary structures to achieve organizational objectives.","cmt_en":"A purpose of governance is to establish necessary structures to achieve organizational objectives."},{"tr":"Provide direction to the organization.","en":"Provide direction to the organization.","cmt_tr":"Governance informs, directs, manages, and monitors the activities of the organization toward the achievement of its objectives.","cmt_en":"Governance informs, directs, manages, and monitors the activities of the organization toward the achievement of its objectives."},{"tr":"Establish appropriate processes.","en":"Establish appropriate processes.","cmt_tr":"A purpose of governance is to establish necessary processes to achieve organizational objectives.","cmt_en":"A purpose of governance is to establish necessary processes to achieve organizational objectives."}],"answer":0},{"q_tr":"Risk owners are responsible for which of the following? I. Evaluating the organization’s ability to carry out risk management activities as designed. II. Determining the expectations of stakeholders and the outcomes that are unacceptable. III. Establishing monitoring activities. IV. Ensuring that information to be reported is accurate, timely, and available.","q_en":"Risk owners are responsible for which of the following? I. Evaluating the organization’s ability to carry out risk management activities as designed. II. Determining the expectations of stakeholders and the outcomes that are unacceptable. III. Establishing monitoring activities. IV. Ensuring that information to be reported is accurate, timely, and available.","options":[{"tr":"I and II only.","en":"I and II only.","cmt_tr":"The board determines the expectations of stakeholders and the outcomes that are unacceptable.","cmt_en":"The board determines the expectations of stakeholders and the outcomes that are unacceptable."},{"tr":"I and III only.","en":"I and III only.","cmt_tr":"Risk owners also are responsible for ensuring that information to be reported to senior management and the board is accurate, timely, and available.","cmt_en":"Risk owners also are responsible for ensuring that information to be reported to senior management and the board is accurate, timely, and available."},{"tr":"I, III, and IV only.","en":"I, III, and IV only.","cmt_tr":"Risk owners are responsible for (1) evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed; (2) determining whether risk management activities are operating as designed; (3) establishing monitoring activities; and (4) ensuring that information to be reported to senior management and the board is accurate, timely, and available. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Risk owners are responsible for (1) evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed; (2) determining whether risk management activities are operating as designed; (3) establishing monitoring activities; and (4) ensuring that information to be reported to senior management and the board is accurate, timely, and available. Study Unit 6: Governance | Subunit 1: Governance Principles"},{"tr":"III and IV only.","en":"III and IV only.","cmt_tr":"Risk owners also are responsible for evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed.","cmt_en":"Risk owners also are responsible for evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed."}],"answer":2},{"q_tr":"Which group is responsible for the initiation of fundamental changes for the organization?","q_en":"Which group is responsible for the initiation of fundamental changes for the organization?","options":[{"tr":"Senior management.","en":"Senior management.","cmt_tr":"Senior management performs day-to-day governance functions and carries out the board’s directives to achieve the organization’s objectives. Senior management is not responsible for the initiation of fundamental changes for the organization.","cmt_en":"Senior management performs day-to-day governance functions and carries out the board’s directives to achieve the organization’s objectives. Senior management is not responsible for the initiation of fundamental changes for the organization."},{"tr":"Risk committee.","en":"Risk committee.","cmt_tr":"A risk committee may be created by the board to identify key risks and to consider whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite.","cmt_en":"A risk committee may be created by the board to identify key risks and to consider whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite."},{"tr":"Internal audit function.","en":"Internal audit function.","cmt_tr":"The role of the internal audit function depends on the maturity of the governance system. In a less mature system, the internal audit function emphasizes compliance with policies, procedures, and laws. In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices. The internal audit function is not responsible for the initiation of fundamental changes for the organization.","cmt_en":"The role of the internal audit function depends on the maturity of the governance system. In a less mature system, the internal audit function emphasizes compliance with policies, procedures, and laws. In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices. The internal audit function is not responsible for the initiation of fundamental changes for the organization."},{"tr":"Board of directors.","en":"Board of directors.","cmt_tr":"The board of directors is the source of overall direction to, and the authority of, management and has the ultimate responsibility for oversight. The board has the following duties: (1) selection and removal of officers; (2) decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiation of fundamental changes; (5) decisions to declare and distribute dividends; (6) setting of management compensation; (7) coordinating audit activities; and (8) evaluating and managing risk. Initiation of fundamental changes for the organization includes mergers and acquisitions.","cmt_en":"The board of directors is the source of overall direction to, and the authority of, management and has the ultimate responsibility for oversight. The board has the following duties: (1) selection and removal of officers; (2) decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiation of fundamental changes; (5) decisions to declare and distribute dividends; (6) setting of management compensation; (7) coordinating audit activities; and (8) evaluating and managing risk. Initiation of fundamental changes for the organization includes mergers and acquisitions."}],"answer":3},{"q_tr":"Corporate governance is most likely to be influenced by","q_en":"Corporate governance is most likely to be influenced by","options":[{"tr":"The internal audit function.","en":"The internal audit function.","cmt_tr":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include internal audit functions, which influence corporate governance by evaluating and improving the processes and structures that enable an organization to achieve its objectives. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include internal audit functions, which influence corporate governance by evaluating and improving the processes and structures that enable an organization to achieve its objectives. Study Unit 6: Governance | Subunit 1: Governance Principles"},{"tr":"External service providers.","en":"External service providers.","cmt_tr":"External service providers are relied upon to supplement the internal audit function when internal audit staff lack necessary knowledge, skill, or experience.","cmt_en":"External service providers are relied upon to supplement the internal audit function when internal audit staff lack necessary knowledge, skill, or experience."},{"tr":"Competitors.","en":"Competitors.","cmt_tr":"Competitors influence an organization’s actions but are less likely to influence its governance processes and structures.","cmt_en":"Competitors influence an organization’s actions but are less likely to influence its governance processes and structures."},{"tr":"Customers.","en":"Customers.","cmt_tr":"Customers are among an organization’s stakeholders but are unlikely to influence its governance processes and structures.","cmt_en":"Customers are among an organization’s stakeholders but are unlikely to influence its governance processes and structures."}],"answer":0},{"q_tr":"Corporate governance most likely involves relationships with","q_en":"Corporate governance most likely involves relationships with","options":[{"tr":"External but not internal stakeholders.","en":"External but not internal stakeholders.","cmt_tr":"Internal stakeholders include shareholders and employees.","cmt_en":"Internal stakeholders include shareholders and employees."},{"tr":"Competitors.","en":"Competitors.","cmt_tr":"Competitors generally are less affected by the organization’s actions than employees.","cmt_en":"Competitors generally are less affected by the organization’s actions than employees."},{"tr":"Employees.","en":"Employees.","cmt_tr":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators.","cmt_en":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators."},{"tr":"Corporate charters and bylaws.","en":"Corporate charters and bylaws.","cmt_tr":"Internal mechanisms that influence governance include corporate charters and bylaws. But governance relationships are with individuals and entities (stakeholders) who are affected by the organization’s actions.","cmt_en":"Internal mechanisms that influence governance include corporate charters and bylaws. But governance relationships are with individuals and entities (stakeholders) who are affected by the organization’s actions."}],"answer":2},{"q_tr":"According to a globally accepted definition, governance","q_en":"According to a globally accepted definition, governance","options":[{"tr":"Is synonymous with the organization’s culture.","en":"Is synonymous with the organization’s culture.","cmt_tr":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. However, all activities of the organization must be informed, directed, managed, and monitored to achieve its objectives.","cmt_en":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. However, all activities of the organization must be informed, directed, managed, and monitored to achieve its objectives."},{"tr":"Provides a structure for achieving the organization’s objectives.","en":"Provides a structure for achieving the organization’s objectives.","cmt_tr":"The globally accepted definition of corporate governance given by the Organization for Economic Co-operation and Development (OECD) states, “Corporate governance involves a set Study Unit 6: Governance | Subunit 1: Governance Principles of relationships between a company’s management, its board, its shareholders, and other stakeholders. Corporate governance also provides the structure through which the objectives of the company are set, and the means of attaining those objectives and monitoring performance are determined.”","cmt_en":"The globally accepted definition of corporate governance given by the Organization for Economic Co-operation and Development (OECD) states, “Corporate governance involves a set Study Unit 6: Governance | Subunit 1: Governance Principles of relationships between a company’s management, its board, its shareholders, and other stakeholders. Corporate governance also provides the structure through which the objectives of the company are set, and the means of attaining those objectives and monitoring performance are determined.”"},{"tr":"Primarily involves risk management.","en":"Primarily involves risk management.","cmt_tr":"Risk management is a necessary element of governance, which encompasses many other relationships and structures.","cmt_en":"Risk management is a necessary element of governance, which encompasses many other relationships and structures."},{"tr":"Consists of the entity’s oversight methods.","en":"Consists of the entity’s oversight methods.","cmt_tr":"Governance has two major components: strategic direction and oversight. Strategic direction determines (1) the business model, (2) overall objectives, (3) the approach to risk taking, and (4) the limits of organizational conduct. Oversight is the component to which risk management and control activities are most likely to be applied.","cmt_en":"Governance has two major components: strategic direction and oversight. Strategic direction determines (1) the business model, (2) overall objectives, (3) the approach to risk taking, and (4) the limits of organizational conduct. Oversight is the component to which risk management and control activities are most likely to be applied."}],"answer":1},{"q_tr":"Which of the following is an element of the oversight component of governance?","q_en":"Which of the following is an element of the oversight component of governance?","options":[{"tr":"Determination of the organization’s risk appetite.","en":"Determination of the organization’s risk appetite.","cmt_tr":"The strategic direction component determines the approach to risk (including the risk appetite).","cmt_en":"The strategic direction component determines the approach to risk (including the risk appetite)."},{"tr":"The board’s understanding of structures that impede transparency.","en":"The board’s understanding of structures that impede transparency.","cmt_tr":"An understanding by senior management and the board of the operating structure, including structures that impede transparency, is a governance principle.","cmt_en":"An understanding by senior management and the board of the operating structure, including structures that impede transparency, is a governance principle."},{"tr":"Existence of a governing policy for the operation of key activities.","en":"Existence of a governing policy for the operation of key activities.","cmt_tr":"A governing policy for the operation of key activities is a governance principle.","cmt_en":"A governing policy for the operation of key activities is a governance principle."},{"tr":"Risk management performed by risk owners.","en":"Risk management performed by risk owners.","cmt_tr":"Oversight is the component to which risk management and control activities are most likely to be applied. The elements of oversight are (1) risk management activities performed by senior management and risk owners and (2) internal and external assurance activities.","cmt_en":"Oversight is the component to which risk management and control activities are most likely to be applied. The elements of oversight are (1) risk management activities performed by senior management and risk owners and (2) internal and external assurance activities."}],"answer":3},{"q_tr":"Which of the following is best defined as a governance principle?","q_en":"Which of the following is best defined as a governance principle?","options":[{"tr":"Developing a business model.","en":"Developing a business model.","cmt_tr":"Developing a business model is best described as an element of strategic direction.","cmt_en":"Developing a business model is best described as an element of strategic direction."},{"tr":"Drafting compensation policies to encourage appropriate behavior.","en":"Drafting compensation policies to encourage appropriate behavior.","cmt_tr":"According to The IIA, establishment of compensation policies, especially for senior Study Unit 6: Governance | Subunit 1: Governance Principles management, that encourage appropriate behavior consistent with the organization’s values, objectives, strategy, and internal control is a governance principle.","cmt_en":"According to The IIA, establishment of compensation policies, especially for senior Study Unit 6: Governance | Subunit 1: Governance Principles management, that encourage appropriate behavior consistent with the organization’s values, objectives, strategy, and internal control is a governance principle."},{"tr":"Creating corporate charters and bylaws.","en":"Creating corporate charters and bylaws.","cmt_tr":"Corporate charters and bylaws are internal mechanisms that influence corporate governance.","cmt_en":"Corporate charters and bylaws are internal mechanisms that influence corporate governance."},{"tr":"Appointing a risk committee.","en":"Appointing a risk committee.","cmt_tr":"The board and its extensions, e.g., the audit committee and the risk committee, are internal mechanisms that influence corporate governance.","cmt_en":"The board and its extensions, e.g., the audit committee and the risk committee, are internal mechanisms that influence corporate governance."}],"answer":1},{"q_tr":"In the governance process, setting the limits of organizational conduct is most accurately characterized as an","q_en":"In the governance process, setting the limits of organizational conduct is most accurately characterized as an","options":[{"tr":"Element of the risk management component.","en":"Element of the risk management component.","cmt_tr":"Risk management and control activities are most likely to be applied to the oversight component of governance.","cmt_en":"Risk management and control activities are most likely to be applied to the oversight component of governance."},{"tr":"Internal mechanism of corporate governance.","en":"Internal mechanism of corporate governance.","cmt_tr":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include corporate charters and bylaws, boards of directors, and internal audit functions.","cmt_en":"Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include corporate charters and bylaws, boards of directors, and internal audit functions."},{"tr":"Element of strategic direction.","en":"Element of strategic direction.","cmt_tr":"Strategic direction determines (1) the business model, (2) overall objectives, (3) the approach to risk taking, and (4) the limits of organizational conduct.","cmt_en":"Strategic direction determines (1) the business model, (2) overall objectives, (3) the approach to risk taking, and (4) the limits of organizational conduct."},{"tr":"External mechanism of corporate governance.","en":"External mechanism of corporate governance.","cmt_tr":"External mechanisms include laws, regulations, and the government regulators who enforce them.","cmt_en":"External mechanisms include laws, regulations, and the government regulators who enforce them."}],"answer":2},{"q_tr":"Risk committees may be part of the governance process. A risk committee is most likely to","q_en":"Risk committees may be part of the governance process. A risk committee is most likely to","options":[{"tr":"Consider whether risk tolerance and risk appetite are consistent.","en":"Consider whether risk tolerance and risk appetite are consistent.","cmt_tr":"A risk committee may be created that (1) identifies key risks, (2) connects them with risk management processes, (3) delegates them to risk owners, and (4) considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"A risk committee may be created that (1) identifies key risks, (2) connects them with risk management processes, (3) delegates them to risk owners, and (4) considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite. Study Unit 6: Governance | Subunit 1: Governance Principles"},{"tr":"Be responsible for determining whether risk management activities are functioning as designed.","en":"Be responsible for determining whether risk management activities are functioning as designed.","cmt_tr":"Risk owners are responsible for determining whether risk management activities are operating as designed.","cmt_en":"Risk owners are responsible for determining whether risk management activities are operating as designed."},{"tr":"Assess and improve governance processes.","en":"Assess and improve governance processes.","cmt_tr":"The internal audit function is responsible for assessing and improving governance processes.","cmt_en":"The internal audit function is responsible for assessing and improving governance processes."},{"tr":"Evaluate the effectiveness of the organization’s code of conduct.","en":"Evaluate the effectiveness of the organization’s code of conduct.","cmt_tr":"Internal auditors evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption).","cmt_en":"Internal auditors evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption)."}],"answer":0},{"q_tr":"The highest level governing body in an organization is most likely to","q_en":"The highest level governing body in an organization is most likely to","options":[{"tr":"Identify risk owners.","en":"Identify risk owners.","cmt_tr":"Senior management is most likely to identify risk owners (managers responsible for specific day- to-day tasks).","cmt_en":"Senior management is most likely to identify risk owners (managers responsible for specific day- to-day tasks)."},{"tr":"Establish and maintain an organizational culture.","en":"Establish and maintain an organizational culture.","cmt_tr":"Senior management is primarily responsible for establishing and maintaining an organizational culture.","cmt_en":"Senior management is primarily responsible for establishing and maintaining an organizational culture."},{"tr":"Set the example of ethical behavior.","en":"Set the example of ethical behavior.","cmt_tr":"Senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., setting the tone at the top).","cmt_en":"Senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., setting the tone at the top)."},{"tr":"Identify who has influence over the business.","en":"Identify who has influence over the business.","cmt_tr":"The board is defined by The IIA as the highest level body charged with governance, such as a board of directors, an audit committee, a board of governors or trustees, etc. It also has the ultimate responsibility for oversight. Another responsibility is to identify stakeholders, whether (1) directly involved with the business (employees, customers, and suppliers), (2) indirectly involved (investors), or (3) having influence over the business (regulators and competitors).","cmt_en":"The board is defined by The IIA as the highest level body charged with governance, such as a board of directors, an audit committee, a board of governors or trustees, etc. It also has the ultimate responsibility for oversight. Another responsibility is to identify stakeholders, whether (1) directly involved with the business (employees, customers, and suppliers), (2) indirectly involved (investors), or (3) having influence over the business (regulators and competitors)."}],"answer":3},{"q_tr":"A board of directors is most likely to be responsible for","q_en":"A board of directors is most likely to be responsible for","options":[{"tr":"Setting management compensation.","en":"Setting management compensation.","cmt_tr":"The board’s duties include setting management compensation. In some cases, a subcommittee of the board (a compensation committee) is delegated this responsibility. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"The board’s duties include setting management compensation. In some cases, a subcommittee of the board (a compensation committee) is delegated this responsibility. Study Unit 6: Governance | Subunit 1: Governance Principles"},{"tr":"Determining how specific risks are managed.","en":"Determining how specific risks are managed.","cmt_tr":"Determining how specific risks are managed is a responsibility of senior management.","cmt_en":"Determining how specific risks are managed is a responsibility of senior management."},{"tr":"Establishing reporting requirements for risk owners.","en":"Establishing reporting requirements for risk owners.","cmt_tr":"Establishing reporting requirements for risk owners related to their risk management activities is a responsibility of senior management.","cmt_en":"Establishing reporting requirements for risk owners related to their risk management activities is a responsibility of senior management."},{"tr":"Evaluating the design of risk management activities.","en":"Evaluating the design of risk management activities.","cmt_tr":"Evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed is a responsibility of risk owners.","cmt_en":"Evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed is a responsibility of risk owners."}],"answer":0},{"q_tr":"Governance roles are performed by the board, senior management, and risk owners. The roles of risk owners include","q_en":"Governance roles are performed by the board, senior management, and risk owners. The roles of risk owners include","options":[{"tr":"Determining whether risk management activities are operating as designed.","en":"Determining whether risk management activities are operating as designed.","cmt_tr":"Risk owners are responsible for (1) evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed; (2) determining whether risk management activities are operating as designed; (3) establishing monitoring activities; and (4) ensuring that information to be reported to senior management and the board is accurate, timely, and available.","cmt_en":"Risk owners are responsible for (1) evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed; (2) determining whether risk management activities are operating as designed; (3) establishing monitoring activities; and (4) ensuring that information to be reported to senior management and the board is accurate, timely, and available."},{"tr":"Establishing reporting requirements for risk management activities.","en":"Establishing reporting requirements for risk management activities.","cmt_tr":"Senior management establishes reporting requirements for risk owners related to their risk management activities.","cmt_en":"Senior management establishes reporting requirements for risk owners related to their risk management activities."},{"tr":"Determining where and how specific risks are managed.","en":"Determining where and how specific risks are managed.","cmt_tr":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for day-to-day risks), and (3) how specific risks will be managed.","cmt_en":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for day-to-day risks), and (3) how specific risks will be managed."},{"tr":"Considering whether tolerance levels are consistent with the organization’s risk appetite.","en":"Considering whether tolerance levels are consistent with the organization’s risk appetite.","cmt_tr":"A risk committee of the board may be created that (1) identifies key risks, (2) assigns them to risk management processes, (3) delegates them to risk owners, and (4) considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite. Risk appetite consists of the amount and types of risks the entity is willing to accept in pursuit of value.","cmt_en":"A risk committee of the board may be created that (1) identifies key risks, (2) assigns them to risk management processes, (3) delegates them to risk owners, and (4) considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite. Risk appetite consists of the amount and types of risks the entity is willing to accept in pursuit of value."}],"answer":0},{"q_tr":"The highest level governing body in a corporate organization is most likely to","q_en":"The highest level governing body in a corporate organization is most likely to","options":[{"tr":"Assess governance processes.","en":"Assess governance processes.","cmt_tr":"The internal audit function is responsible for assessing and improving governance proce","cmt_en":"The internal audit function is responsible for assessing and improving governance proce"},{"tr":"Be responsible for setting the tone at the top.","en":"Be responsible for setting the tone at the top.","cmt_tr":"The board oversees the organization’s ethical climate, but senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., the tone at the top). Senior management is also responsible for establishing and maintaining sound ethics-related objectives and programs.","cmt_en":"The board oversees the organization’s ethical climate, but senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., the tone at the top). Senior management is also responsible for establishing and maintaining sound ethics-related objectives and programs."},{"tr":"Evaluate the design of risk management activities.","en":"Evaluate the design of risk management activities.","cmt_tr":"Risk owners (managers responsible for day-to-day risks) evaluate the design of risk management activities and the organization’s ability to perform them as designed.","cmt_en":"Risk owners (managers responsible for day-to-day risks) evaluate the design of risk management activities and the organization’s ability to perform them as designed."},{"tr":"Coordinate audit activities. Study Unit 6: Governance | Subunit 1: Governance Principles","en":"Coordinate audit activities. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_tr":"The board is defined by The IIA as the highest level governing body (e.g., a board of directors, a supervisory board, or a board of governors or trustees) charged with direction or oversight of the organization’s activities and holding senior management accountable. The board’s duties include coordinating audit activities (most often performed by a subcommittee called the audit committee).","cmt_en":"The board is defined by The IIA as the highest level governing body (e.g., a board of directors, a supervisory board, or a board of governors or trustees) charged with direction or oversight of the organization’s activities and holding senior management accountable. The board’s duties include coordinating audit activities (most often performed by a subcommittee called the audit committee)."}],"answer":3},{"q_tr":"The board of directors of a corporation is most likely responsible for","q_en":"The board of directors of a corporation is most likely responsible for","options":[{"tr":"Selecting officers.","en":"Selecting officers.","cmt_tr":"Among other things, the board of directors is responsible for (1) selecting and removing officers; (2) making decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiating fundamental changes; (5) declaring and distributing dividends; (6) setting management compensation; (7) coordinating audit activities; and (8) evaluating management risk.","cmt_en":"Among other things, the board of directors is responsible for (1) selecting and removing officers; (2) making decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiating fundamental changes; (5) declaring and distributing dividends; (6) setting management compensation; (7) coordinating audit activities; and (8) evaluating management risk."},{"tr":"Day-to-day governance functions.","en":"Day-to-day governance functions.","cmt_tr":"Management performs day-to-day governance functions. Senior management carries out board directives (within specified tolerances for unacceptable outcomes) to achieve objectives.","cmt_en":"Management performs day-to-day governance functions. Senior management carries out board directives (within specified tolerances for unacceptable outcomes) to achieve objectives."},{"tr":"Removing directors.","en":"Removing directors.","cmt_tr":"Shareholders can elect or remove directors at the annual meeting.","cmt_en":"Shareholders can elect or remove directors at the annual meeting."},{"tr":"Establishing monitoring activities.","en":"Establishing monitoring activities.","cmt_tr":"Risk owners determined by senior management establish monitoring activities.","cmt_en":"Risk owners determined by senior management establish monitoring activities."}],"answer":0}],"SU2 - Organizational Culture":[{"q_tr":"Who in a corporate organization is primarily responsible for the organizational culture?","q_en":"Who in a corporate organization is primarily responsible for the organizational culture?","options":[{"tr":"The board.","en":"The board.","cmt_tr":"The board is defined by The IIA as the highest level governing body (e.g., a board of directors, a supervisory board, or a board of governors or trustees) charged with direction or oversight of the organization’s activities and holding senior management accountable. But senior management is primarily responsible for the culture.","cmt_en":"The board is defined by The IIA as the highest level governing body (e.g., a board of directors, a supervisory board, or a board of governors or trustees) charged with direction or oversight of the organization’s activities and holding senior management accountable. But senior management is primarily responsible for the culture."},{"tr":"Stakeholders, including employees.","en":"Stakeholders, including employees.","cmt_tr":"Nonmanagerial employees, shareholders, customers, suppliers, regulators, and other stakeholders (those affected by the activities of the entity) have no responsibility for direction or oversight of the organization’s activities.","cmt_en":"Nonmanagerial employees, shareholders, customers, suppliers, regulators, and other stakeholders (those affected by the activities of the entity) have no responsibility for direction or oversight of the organization’s activities."},{"tr":"Senior management.","en":"Senior management.","cmt_tr":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. Organizational culture is reflected in (1) setting values, objectives, and strategies; (2) defining roles and behaviors; (3) measuring performance; (4) specifying accountability; and (5) complying with corporate social responsibilities. Senior management is primarily responsible for establishing and maintaining an organizational culture.","cmt_en":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. Organizational culture is reflected in (1) setting values, objectives, and strategies; (2) defining roles and behaviors; (3) measuring performance; (4) specifying accountability; and (5) complying with corporate social responsibilities. Senior management is primarily responsible for establishing and maintaining an organizational culture."},{"tr":"The internal audit function.","en":"The internal audit function.","cmt_tr":"The internal audit function is responsible for assessing and improving governance processes.","cmt_en":"The internal audit function is responsible for assessing and improving governance processes."}],"answer":2},{"q_tr":"Which of the following most likely should be stated in an entity’s vision statement?","q_en":"Which of the following most likely should be stated in an entity’s vision statement?","options":[{"tr":"Personnel policies.","en":"Personnel policies.","cmt_tr":"Personnel policies are operating matters not appropriate for a vision statement.","cmt_en":"Personnel policies are operating matters not appropriate for a vision statement."},{"tr":"The strategic plan.","en":"The strategic plan.","cmt_tr":"The strategic plan is developed after a vision (mission) statement is drafted.","cmt_en":"The strategic plan is developed after a vision (mission) statement is drafted."},{"tr":"The strategy for maintaining a culture consistent with legal responsibilities.","en":"The strategy for maintaining a culture consistent with legal responsibilities.","cmt_tr":"Codes of conduct and vision statements are issued to state • The organization’s values and objectives; • The behavior expected; and • The strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities.","cmt_en":"Codes of conduct and vision statements are issued to state • The organization’s values and objectives; • The behavior expected; and • The strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities."},{"tr":"Principles of internal control.","en":"Principles of internal control.","cmt_tr":"A vision statement is a broad description of an entity’s mission, not a list of control principles. Study Unit 6: Governance | Subunit 2: Organizational Culture","cmt_en":"A vision statement is a broad description of an entity’s mission, not a list of control principles. Study Unit 6: Governance | Subunit 2: Organizational Culture"}],"answer":2},{"q_tr":"Organizational culture that is risk averse likely has which of the following effects on the assessment of the importance of control and engagement risks?","q_en":"Organizational culture that is risk averse likely has which of the following effects on the assessment of the importance of control and engagement risks?","options":[{"tr":"Importance of control within the organization – High. Engagement risks are assessed high - Less likely.","en":"Importance of control within the organization – High. Engagement risks are assessed high - Less likely.","cmt_tr":"Although the importance of control within the organization is likely to be high when organizational culture is risk averse, engagement risks are more likely to be assessed high.","cmt_en":"Although the importance of control within the organization is likely to be high when organizational culture is risk averse, engagement risks are more likely to be assessed high."},{"tr":"Importance of control within the organization – High. Engagement risks are assessed high - More likely.","en":"Importance of control within the organization – High. Engagement risks are assessed high - More likely.","cmt_tr":"Organizational culture that is risk averse is more likely to regard the importance of control within the organization as high. Consequently, engagement risks are more likely to be assessed high.","cmt_en":"Organizational culture that is risk averse is more likely to regard the importance of control within the organization as high. Consequently, engagement risks are more likely to be assessed high."},{"tr":"Importance of control within the organization – Low. Engagement risks are assessed high - More likely","en":"Importance of control within the organization – Low. Engagement risks are assessed high - More likely","cmt_tr":"An organizational culture that is risk aggressive is more likely to regard the importance of control within the organization as low. Consequently, engagement risks are less likely to be assessed high.","cmt_en":"An organizational culture that is risk aggressive is more likely to regard the importance of control within the organization as low. Consequently, engagement risks are less likely to be assessed high."},{"tr":"Importance of control within the organization – Low. Engagement risks are assessed high - Less likely.","en":"Importance of control within the organization – Low. Engagement risks are assessed high - Less likely.","cmt_tr":"Although engagement risks are less likely to be assessed high when organizational culture is risk averse, the importance of control within the organization is more likely to be high.","cmt_en":"Although engagement risks are less likely to be assessed high when organizational culture is risk averse, the importance of control within the organization is more likely to be high."}],"answer":1},{"q_tr":"A goal of governance practices is","q_en":"A goal of governance practices is","options":[{"tr":"Increasing compensation of senior managers and directors.","en":"Increasing compensation of senior managers and directors.","cmt_tr":"Increasing compensation of senior managers and directors may conflict with the interests of other stakeholders.","cmt_en":"Increasing compensation of senior managers and directors may conflict with the interests of other stakeholders."},{"tr":"Satisfying generally accepted business norms.","en":"Satisfying generally accepted business norms.","cmt_tr":"Governance practices ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short-term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances. Study Unit 6: Governance | Subunit 2: Organizational Culture","cmt_en":"Governance practices ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short-term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances. Study Unit 6: Governance | Subunit 2: Organizational Culture"},{"tr":"Reporting fully to stakeholders unless the result is impairment of organizational interests.","en":"Reporting fully to stakeholders unless the result is impairment of organizational interests.","cmt_tr":"Accountability requires full, truthful reporting to stakeholders.","cmt_en":"Accountability requires full, truthful reporting to stakeholders."},{"tr":"Creating an effective control environment to manage risk.","en":"Creating an effective control environment to manage risk.","cmt_tr":"An effective control environment is a structure used to achieve the goals of governance.","cmt_en":"An effective control environment is a structure used to achieve the goals of governance."}],"answer":1},{"q_tr":"An organization’s code of conduct should","q_en":"An organization’s code of conduct should","options":[{"tr":"Establish monitoring activities.","en":"Establish monitoring activities.","cmt_tr":"A code of conduct does not establish monitoring activities. Answer (B) is correct. Codes of conduct and vision statements are issued to state the organization’s values and objectives; the behavior expected; and the strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities.","cmt_en":"A code of conduct does not establish monitoring activities. Answer (B) is correct. Codes of conduct and vision statements are issued to state the organization’s values and objectives; the behavior expected; and the strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities."},{"tr":"Address expected behavior and societal responsibilities.","en":"Address expected behavior and societal responsibilities.","cmt_tr":"","cmt_en":""},{"tr":"Specify key risks.","en":"Specify key risks.","cmt_tr":"Management identifies the key risks within the organization. The internal auditor reviews these decisions to evaluate risk management within the organization.","cmt_en":"Management identifies the key risks within the organization. The internal auditor reviews these decisions to evaluate risk management within the organization."},{"tr":"Measure performance.","en":"Measure performance.","cmt_tr":"A code of conduct states (1) values and objectives, (2) expected behavior, and (3) strategies for maintaining an ethical culture.","cmt_en":"A code of conduct states (1) values and objectives, (2) expected behavior, and (3) strategies for maintaining an ethical culture."}],"answer":1},{"q_tr":"The role of the internal audit function in the ethical culture of an organization is to","q_en":"The role of the internal audit function in the ethical culture of an organization is to","options":[{"tr":"","en":"","cmt_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of, among other things, a formal code of conduct and related statements and policies.","cmt_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of, among other things, a formal code of conduct and related statements and policies."},{"tr":"","en":"","cmt_tr":"Internal auditors must be active ethics advocates. However, assuming the role of, for example, chief ethics officer may, in some circumstances, impair individual objectivity and the internal audit function’s independence.","cmt_en":"Internal auditors must be active ethics advocates. However, assuming the role of, for example, chief ethics officer may, in some circumstances, impair individual objectivity and the internal audit function’s independence."},{"tr":"","en":"","cmt_tr":"The internal auditor’s basic role is to be the assessor of the ethical culture. However, an internal auditor may become chief ethics officer or a member of an ethics council, although the first role Study Unit 6: Governance | Subunit 2: Organizational Culture may, in some circumstances, impair individual objectivity and the internal audit function’s independence.","cmt_en":"The internal auditor’s basic role is to be the assessor of the ethical culture. However, an internal auditor may become chief ethics officer or a member of an ethics council, although the first role Study Unit 6: Governance | Subunit 2: Organizational Culture may, in some circumstances, impair individual objectivity and the internal audit function’s independence."},{"tr":"","en":"","cmt_tr":"The organization’s board and its senior management are responsible for the effectiveness of the governance process.","cmt_en":"The organization’s board and its senior management are responsible for the effectiveness of the governance process."}],"answer":0},{"q_tr":"Which of the following is a false statement about the role of internal auditors in an organization’s ethical culture?","q_en":"Which of the following is a false statement about the role of internal auditors in an organization’s ethical culture?","options":[{"tr":"Roles may include chief ethics officer.","en":"Roles may include chief ethics officer.","cmt_tr":"Internal auditors’ roles may include chief ethics officer.","cmt_en":"Internal auditors’ roles may include chief ethics officer."},{"tr":"The role of chief ethics officer sometimes conflicts with the independence of the internal audit function.","en":"The role of chief ethics officer sometimes conflicts with the independence of the internal audit function.","cmt_tr":"In some circumstances, the role of chief ethics officer may conflict with the independence attribute of the internal audit function.","cmt_en":"In some circumstances, the role of chief ethics officer may conflict with the independence attribute of the internal audit function."},{"tr":"In a more mature system, the internal audit function emphasizes compliance.","en":"In a more mature system, the internal audit function emphasizes compliance.","cmt_tr":"The role of the internal audit function depends on the maturity of the governance system. In a less mature system, the internal audit function emphasizes compliance with policies, procedures, laws, etc. It also addresses the basic risks to the organization.","cmt_en":"The role of the internal audit function depends on the maturity of the governance system. In a less mature system, the internal audit function emphasizes compliance with policies, procedures, laws, etc. It also addresses the basic risks to the organization."},{"tr":"In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices.","en":"In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices.","cmt_tr":"In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices.","cmt_en":"In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices."}],"answer":2},{"q_tr":"Which of the following should be stated in an organization’s code of conduct and vision statement? 1. The organization’s values and objectives 2. The behavior expected 3. The strategies for maintaining a culture inconsistent with legal, ethical, and societal responsibilities","q_en":"Which of the following should be stated in an organization’s code of conduct and vision statement? 1. The organization’s values and objectives 2. The behavior expected 3. The strategies for maintaining a culture inconsistent with legal, ethical, and societal responsibilities","options":[{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"Codes of conduct and vision statements are issued to state • The organization’s values and objectives; • The behavior expected; and • The strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities.","cmt_en":"Codes of conduct and vision statements are issued to state • The organization’s values and objectives; • The behavior expected; and • The strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities."},{"tr":"1 and 3 only.","en":"1 and 3 only.","cmt_tr":"The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities. Additionally, the behavior expected should be stated.","cmt_en":"The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities. Additionally, the behavior expected should be stated."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities. Additionally, the organization’s values and objectives should be stated.","cmt_en":"The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities. Additionally, the organization’s values and objectives should be stated."},{"tr":"1, 2, and 3. Study Unit 6: Governance | Subunit 2: Organizational Culture","en":"1, 2, and 3. Study Unit 6: Governance | Subunit 2: Organizational Culture","cmt_tr":"The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities.","cmt_en":"The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities."}],"answer":0},{"q_tr":"The role of the internal audit function in the ethical culture of an organization is to","q_en":"The role of the internal audit function in the ethical culture of an organization is to","options":[{"tr":"Avoid active support of the ethical culture because of possible loss of independence.","en":"Avoid active support of the ethical culture because of possible loss of independence.","cmt_tr":"Internal auditors must be active ethics advocates. However, assuming the role of, for example, chief ethics officer, may, in some circumstances, impair individual objectivity and the internal audit function’s independence.","cmt_en":"Internal auditors must be active ethics advocates. However, assuming the role of, for example, chief ethics officer, may, in some circumstances, impair individual objectivity and the internal audit function’s independence."},{"tr":"Evaluate the effectiveness of the organization’s formal code of conduct.","en":"Evaluate the effectiveness of the organization’s formal code of conduct.","cmt_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of, among other things, a formal code of conduct and related statements and policies.","cmt_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of, among other things, a formal code of conduct and related statements and policies."},{"tr":"Assume accountability for the effectiveness of the governance process.","en":"Assume accountability for the effectiveness of the governance process.","cmt_tr":"The organization’s board and its senior management are responsible for the effectiveness of the governance process.","cmt_en":"The organization’s board and its senior management are responsible for the effectiveness of the governance process."},{"tr":"Become the chief ethics officer.","en":"Become the chief ethics officer.","cmt_tr":"The internal auditor’s basic role is assess the ethical culture. An internal auditor may become chief ethics officer or a member of an ethics council, but the first role may, in some circumstances, impair individual objectivity and the internal audit function’s independence. Study Unit 6: Governance | Subunit 2: Organizational Culture","cmt_en":"The internal auditor’s basic role is assess the ethical culture. An internal auditor may become chief ethics officer or a member of an ethics council, but the first role may, in some circumstances, impair individual objectivity and the internal audit function’s independence. Study Unit 6: Governance | Subunit 2: Organizational Culture"}],"answer":1},{"q_tr":"A corporation’s results met the expectations of the market, but many people in the organization noticed that they were overly optimistic. Moreover, no one suggested that the results be changed. Who, whether officially or informally, should have been an ethics advocate regarding the results? 1. Senior management 2. Internal auditors 3. Employees in the accounting department","q_en":"A corporation’s results met the expectations of the market, but many people in the organization noticed that they were overly optimistic. Moreover, no one suggested that the results be changed. Who, whether officially or informally, should have been an ethics advocate regarding the results? 1. Senior management 2. Internal auditors 3. Employees in the accounting department","options":[{"tr":"1 only.","en":"1 only.","cmt_tr":"The internal auditors and employees in the accounting department also should have been ethics advocates.","cmt_en":"The internal auditors and employees in the accounting department also should have been ethics advocates."},{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"The employees in the accounting department also should have suggested that the results might not be accurate","cmt_en":"The employees in the accounting department also should have suggested that the results might not be accurate"},{"tr":"1 and 3 only.","en":"1 and 3 only.","cmt_tr":"The internal auditors also should have suggested that the results might not be accurate.","cmt_en":"The internal auditors also should have suggested that the results might not be accurate."},{"tr":"1, 2, and 3.","en":"1, 2, and 3.","cmt_tr":"Because decision making in most organizations is complex and dispersed, each individual should be an ethics advocate, whether officially or informally. Thus, it is the responsibility of senior management, the internal auditors, and the employees in the accounting department to be ethics advocates and suggest that the results might not be accurate.","cmt_en":"Because decision making in most organizations is complex and dispersed, each individual should be an ethics advocate, whether officially or informally. Thus, it is the responsibility of senior management, the internal auditors, and the employees in the accounting department to be ethics advocates and suggest that the results might not be accurate."}],"answer":3},{"q_tr":"Which of the following statements about organizational culture is false?","q_en":"Which of the following statements about organizational culture is false?","options":[{"tr":"The organizational culture sets the values, objectives, and strategies of the organization.","en":"The organizational culture sets the values, objectives, and strategies of the organization.","cmt_tr":"The organizational culture does set the values, objectives, and strategies of the organization.","cmt_en":"The organizational culture does set the values, objectives, and strategies of the organization."},{"tr":"Governance does not largely depend on organizational culture for effectiveness.","en":"Governance does not largely depend on organizational culture for effectiveness.","cmt_tr":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness.","cmt_en":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness."},{"tr":"Organizational culture defines roles and behaviors.","en":"Organizational culture defines roles and behaviors.","cmt_tr":"The organizational culture does define roles and behaviors.","cmt_en":"The organizational culture does define roles and behaviors."},{"tr":"The culture influences compliance with corporate social responsibilities.","en":"The culture influences compliance with corporate social responsibilities.","cmt_tr":"Organizational culture is reflected in complying with corporate social responsibilities. Study Unit 6: Governance | Subunit 2: Organizational Culture","cmt_en":"Organizational culture is reflected in complying with corporate social responsibilities. Study Unit 6: Governance | Subunit 2: Organizational Culture"}],"answer":1},{"q_tr":"An organization’s code of conduct should address","q_en":"An organization’s code of conduct should address","options":[{"tr":"The organization’s values, objectives, and adherence to legal responsibilities.","en":"The organization’s values, objectives, and adherence to legal responsibilities.","cmt_tr":"When evaluating a code of conduct, an internal auditor should consider (1) comprehensiveness and (2) compliance. The code should address the ethical issues that employees are expected to encounter and provide suitable guidance.","cmt_en":"When evaluating a code of conduct, an internal auditor should consider (1) comprehensiveness and (2) compliance. The code should address the ethical issues that employees are expected to encounter and provide suitable guidance."},{"tr":"Internal controls and proper reporting guidelines.","en":"Internal controls and proper reporting guidelines.","cmt_tr":"A code of conduct does not establish internal control principles and standards.","cmt_en":"A code of conduct does not establish internal control principles and standards."},{"tr":"The complexity of the organization and approach to risk-taking.","en":"The complexity of the organization and approach to risk-taking.","cmt_tr":"The governance bodies in an organization determine the overall approach to risk-taking.","cmt_en":"The governance bodies in an organization determine the overall approach to risk-taking."},{"tr":"Areas of significant risk within the organization","en":"Areas of significant risk within the organization","cmt_tr":"Management identifies the key risk areas within the organization. The internal auditor reviews these decisions to evaluate risk management within the organization.","cmt_en":"Management identifies the key risk areas within the organization. The internal auditor reviews these decisions to evaluate risk management within the organization."}],"answer":0},{"q_tr":"An organization’s culture is","q_en":"An organization’s culture is","options":[{"tr":"The behavior expected within the organization.","en":"The behavior expected within the organization.","cmt_tr":"Codes of conduct and vision statements are issued to state the behavior expected within the organization.","cmt_en":"Codes of conduct and vision statements are issued to state the behavior expected within the organization."},{"tr":"The attitude and actions of the board and management regarding the importance of control within the organization.","en":"The attitude and actions of the board and management regarding the importance of control within the organization.","cmt_tr":"The control environment reflects the attitude and actions of the board and management regarding the importance of control within the organization.","cmt_en":"The control environment reflects the attitude and actions of the board and management regarding the importance of control within the organization."},{"tr":"The combination of processes and structures within the organization.","en":"The combination of processes and structures within the organization.","cmt_tr":"Governance is the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.","cmt_en":"Governance is the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives."},{"tr":"A reflection of the organization’s mission and vision and consists of the attitudes, behaviors, and understanding about risk.","en":"A reflection of the organization’s mission and vision and consists of the attitudes, behaviors, and understanding about risk.","cmt_tr":"An organization’s culture consists of the attitudes, behaviors, and understanding about risk, both positive and negative, that influence the decisions of management and personnel and reflect the mission, vision, and core values of the organization. Study Unit 6: Governance | Subunit 2: Organizational Culture","cmt_en":"An organization’s culture consists of the attitudes, behaviors, and understanding about risk, both positive and negative, that influence the decisions of management and personnel and reflect the mission, vision, and core values of the organization. Study Unit 6: Governance | Subunit 2: Organizational Culture"}],"answer":3},{"q_tr":"Organizational culture is reflected in which of the following? I. Measuring performance II. Specifying accountability III. Complying with corporate social responsibilities","q_en":"Organizational culture is reflected in which of the following? I. Measuring performance II. Specifying accountability III. Complying with corporate social responsibilities","options":[{"tr":"I only.","en":"I only.","cmt_tr":"Organizational culture also is reflected in specifying accountability and complying with corporate social responsibilities.","cmt_en":"Organizational culture also is reflected in specifying accountability and complying with corporate social responsibilities."},{"tr":"I and II only.","en":"I and II only.","cmt_tr":"Organizational culture also is reflected in complying with corporate social responsibilities.","cmt_en":"Organizational culture also is reflected in complying with corporate social responsibilities."},{"tr":"II and III only.","en":"II and III only.","cmt_tr":"Organizational culture also is reflected in measuring performance.","cmt_en":"Organizational culture also is reflected in measuring performance."},{"tr":"I, II, and III.","en":"I, II, and III.","cmt_tr":"Organizational culture is reflected in measuring performance, specifying accountability and complying with corporate social responsibilities.","cmt_en":"Organizational culture is reflected in measuring performance, specifying accountability and complying with corporate social responsibilities."}],"answer":3},{"q_tr":"The chief audit executive (CAE) of the internal audit function serves as the organization’s chief ethics officer. A drawback of performing this function is that","q_en":"The chief audit executive (CAE) of the internal audit function serves as the organization’s chief ethics officer. A drawback of performing this function is that","options":[{"tr":"The internal audit function must evaluate ethics-related activities.","en":"The internal audit function must evaluate ethics-related activities.","cmt_tr":"In an assurance engagement, the internal audit function must evaluate the design, implementation, and effectiveness of the organization’s ethics-related objectives, programs, and activities whether or not the CAE serves as chief ethics officer.","cmt_en":"In an assurance engagement, the internal audit function must evaluate the design, implementation, and effectiveness of the organization’s ethics-related objectives, programs, and activities whether or not the CAE serves as chief ethics officer."},{"tr":"The CAE must implement ethics-related programs.","en":"The CAE must implement ethics-related programs.","cmt_tr":"The internal audit function must evaluate the implementation of ethics-related programs.","cmt_en":"The internal audit function must evaluate the implementation of ethics-related programs."},{"tr":"An ethical culture is crucial to the effectiveness of governance.","en":"An ethical culture is crucial to the effectiveness of governance.","cmt_tr":"The importance of the organization’s ethical culture is a reason for internal auditors to have an active role.","cmt_en":"The importance of the organization’s ethical culture is a reason for internal auditors to have an active role."},{"tr":"It may conflict with the independence of the internal audit function.","en":"It may conflict with the independence of the internal audit function.","cmt_tr":"In some circumstances, the role of chief ethics officer may conflict with the independence attribute of the internal audit function. The organizational independence of the internal audit function is necessary because it performs internal assurance services. External assurance may be provided by external auditors, consultants, industry groups, or regulators. Stud
