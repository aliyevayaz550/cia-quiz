y Unit 6: Governance | Subunit 2: Organizational Culture","cmt_en":"In some circumstances, the role of chief ethics officer may conflict with the independence attribute of the internal audit function. The organizational independence of the internal audit function is necessary because it performs internal assurance services. External assurance may be provided by external auditors, consultants, industry groups, or regulators. Study Unit 6: Governance | Subunit 2: Organizational Culture"}],"answer":3},{"q_tr":"The internal audit function assesses the organization’s ethical climate. Accordingly, internal auditors most likely evaluate","q_en":"The internal audit function assesses the organization’s ethical climate. Accordingly, internal auditors most likely evaluate","options":[{"tr":"Whether employees have been promptly notified of alleged misconduct.","en":"Whether employees have been promptly notified of alleged misconduct.","cmt_tr":"Reporting of alleged misconduct should be confidential.","cmt_en":"Reporting of alleged misconduct should be confidential."},{"tr":"Procedures covering fraud and corruption.","en":"Procedures covering fraud and corruption.","cmt_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption).","cmt_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption)."},{"tr":"The assumption of responsibility by senior management for providing investigative services.","en":"The assumption of responsibility by senior management for providing investigative services.","cmt_tr":"Internal auditors evaluate the effectiveness of the clear delegation of responsibilities for providing counsel, investigation, and reporting.","cmt_en":"Internal auditors evaluate the effectiveness of the clear delegation of responsibilities for providing counsel, investigation, and reporting."},{"tr":"Regular surveys of managers to determine the state of the ethical climate.","en":"Regular surveys of managers to determine the state of the ethical climate.","cmt_tr":"Internal auditors evaluate the effectiveness of regular surveys of employees, suppliers, and customers to determine the state of the ethical climate. This process is not limited to managers.","cmt_en":"Internal auditors evaluate the effectiveness of regular surveys of employees, suppliers, and customers to determine the state of the ethical climate. This process is not limited to managers."}],"answer":1}],"SU3 - Roles of Internal Auditors":[{"q_tr":"A basic principle of governance is","q_en":"A basic principle of governance is","options":[{"tr":"Assessment of the governance process by an independent internal audit function.","en":"Assessment of the governance process by an independent internal audit function.","cmt_tr":"The internal audit function must assess and make appropriate recommendations for improving the governance process.","cmt_en":"The internal audit function must assess and make appropriate recommendations for improving the governance process."},{"tr":"Holding the board, senior management, and the internal audit function accountable for its effectiveness.","en":"Holding the board, senior management, and the internal audit function accountable for its effectiveness.","cmt_tr":"The internal audit function is an assessor of the governance process. It is not accountable for that process.","cmt_en":"The internal audit function is an assessor of the governance process. It is not accountable for that process."},{"tr":"Exclusive use of external auditors to provide assurance about the governance process.","en":"Exclusive use of external auditors to provide assurance about the governance process.","cmt_tr":"External parties and internal auditors may provide assurance about the governance process.","cmt_en":"External parties and internal auditors may provide assurance about the governance process."},{"tr":"Separation of the governance process from promoting an ethical culture in the organization.","en":"Separation of the governance process from promoting an ethical culture in the organization.","cmt_tr":"The internal audit function must assess and make appropriate recommendations for improving the governance process in its promotion of appropriate ethics and values within the organization.","cmt_en":"The internal audit function must assess and make appropriate recommendations for improving the governance process in its promotion of appropriate ethics and values within the organization."}],"answer":0},{"q_tr":"Which of the following most likely should be considered in the internal audit function’s planning for the assessment of governance?","q_en":"Which of the following most likely should be considered in the internal audit function’s planning for the assessment of governance?","options":[{"tr":"Whether all material decisions have been authorized by the board.","en":"Whether all material decisions have been authorized by the board.","cmt_tr":"Management performs day-to-day governance functions. For example, senior management determines (1) where risks are managed, (2) who will be risk owners, and (3) how risks will be managed. The board has the ultimate responsibility for oversight. Its duties also include decisions about capital structure, dividends, mergers and acquisitions, coordinating audits, etc.","cmt_en":"Management performs day-to-day governance functions. For example, senior management determines (1) where risks are managed, (2) who will be risk owners, and (3) how risks will be managed. The board has the ultimate responsibility for oversight. Its duties also include decisions about capital structure, dividends, mergers and acquisitions, coordinating audits, etc."},{"tr":"Relying on the assessment of internal control in other audits.","en":"Relying on the assessment of internal control in other audits.","cmt_tr":"The chief audit executive should consider the following in planning assessments of governance: • An audit should address controls in governance processes that are designed to prevent or detect events that could have a negative effect on the organization; • Controls within governance processes often are significant in managing multiple risks; and, • If other audits assess controls in governance processes, the auditor should consider relying on their results. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_en":"The chief audit executive should consider the following in planning assessments of governance: • An audit should address controls in governance processes that are designed to prevent or detect events that could have a negative effect on the organization; • Controls within governance processes often are significant in managing multiple risks; and, • If other audits assess controls in governance processes, the auditor should consider relying on their results. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"},{"tr":"The compliance of the organization with the internal audit function’s definition of governance.","en":"The compliance of the organization with the internal audit function’s definition of governance.","cmt_tr":"The internal audit function should agree upon the definition of governance with the board and senior management. The IIA has defined governance. But if the organization’s definition differs, the CAE may use that definition.","cmt_en":"The internal audit function should agree upon the definition of governance with the board and senior management. The IIA has defined governance. But if the organization’s definition differs, the CAE may use that definition."},{"tr":"The ways in which control and risk are unrelated.","en":"The ways in which control and risk are unrelated.","cmt_tr":"Controls address risks. Thus, they are related.","cmt_en":"Controls address risks. Thus, they are related."}],"answer":1},{"q_tr":"Which of the following is most likely an internal audit function’s role in a less structured governance process?","q_en":"Which of the following is most likely an internal audit function’s role in a less structured governance process?","options":[{"tr":"Evaluating the effectiveness of specific governance processes that are distinct from control.","en":"Evaluating the effectiveness of specific governance processes that are distinct from control.","cmt_tr":"Evaluating the effectiveness of specific governance processes is typical of a more structured internal auditing governance maturity model. Moreover, governance does not exist as processes distinct from control and risk management.","cmt_en":"Evaluating the effectiveness of specific governance processes is typical of a more structured internal auditing governance maturity model. Moreover, governance does not exist as processes distinct from control and risk management."},{"tr":"Compliance with procedures, policies, and plans.","en":"Compliance with procedures, policies, and plans.","cmt_tr":"A less mature governance system emphasizes the requirements for compliance with policies, procedures, plans, laws, regulations, and contracts. It also addresses the basic risks to the organization. Thus, the internal audit function provides advice about such matters. As the governance process becomes more structured, the internal audit function’s emphasis will shift to optimizing the governance structure and practices.","cmt_en":"A less mature governance system emphasizes the requirements for compliance with policies, procedures, plans, laws, regulations, and contracts. It also addresses the basic risks to the organization. Thus, the internal audit function provides advice about such matters. As the governance process becomes more structured, the internal audit function’s emphasis will shift to optimizing the governance structure and practices."},{"tr":"Acting as a consultant in optimizing governance practices.","en":"Acting as a consultant in optimizing governance practices.","cmt_tr":"Playing a consulting role in optimizing governance practices and structure is typical of a more structured internal auditing governance maturity model. The emphasis shifts to considering best practices and adapting them to the specific organization.","cmt_en":"Playing a consulting role in optimizing governance practices and structure is typical of a more structured internal auditing governance maturity model. The emphasis shifts to considering best practices and adapting them to the specific organization."},{"tr":"Designing processes to address basic risks.","en":"Designing processes to address basic risks.","cmt_tr":"Internal auditors impair their objectivity by designing processes. However, evaluating the design and effectiveness of specific processes is a typical internal audit role.","cmt_en":"Internal auditors impair their objectivity by designing processes. However, evaluating the design and effectiveness of specific processes is a typical internal audit role."}],"answer":1},{"q_tr":"The design and implementation n of governance processes are the responsibility of","q_en":"The design and implementation n of governance processes are the responsibility of","options":[{"tr":"The Board – Yes. Management - Yes","en":"The Board – Yes. Management - Yes","cmt_tr":"Governance is one of the three basic processes identified by The IIA. The design and implementation of governance processes are the responsibility of the board and management.","cmt_en":"Governance is one of the three basic processes identified by The IIA. The design and implementation of governance processes are the responsibility of the board and management."},{"tr":"The Board – Yes. Management - No","en":"The Board – Yes. Management - No","cmt_tr":"Management is also responsible for the design and implementation of governance processes.","cmt_en":"Management is also responsible for the design and implementation of governance processes."},{"tr":"The Board – No. Management - Yes","en":"The Board – No. Management - Yes","cmt_tr":"The board is also responsible for the design and implementation of governance processes.","cmt_en":"The board is also responsible for the design and implementation of governance processes."},{"tr":"The Board – No. Management – No Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","en":"The Board – No. Management – No Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_tr":"Both management and the board are responsible for the design and implementation of governance processes.","cmt_en":"Both management and the board are responsible for the design and implementation of governance processes."}],"answer":0},{"q_tr":"Which one of the following is the best description of how the internal audit function directly contributes to an organization’s governance process?","q_en":"Which one of the following is the best description of how the internal audit function directly contributes to an organization’s governance process?","options":[{"tr":"Identifying significant exposures to risk.","en":"Identifying significant exposures to risk.","cmt_tr":"Identifying significant exposures to risk most directly relates to risk management rather than to governance.","cmt_en":"Identifying significant exposures to risk most directly relates to risk management rather than to governance."},{"tr":"Evaluating the effectiveness of internal control over financial reporting.","en":"Evaluating the effectiveness of internal control over financial reporting.","cmt_tr":"Evaluating the effectiveness of internal control over financial reporting more directly relates to risk management rather than to governance.","cmt_en":"Evaluating the effectiveness of internal control over financial reporting more directly relates to risk management rather than to governance."},{"tr":"Promoting continuous improvement of controls.","en":"Promoting continuous improvement of controls.","cmt_tr":"Promoting continuous improvement of controls relates to control processes rather than to governance.","cmt_en":"Promoting continuous improvement of controls relates to control processes rather than to governance."},{"tr":"Assessing and improving how objectives are established and decisions are made.","en":"Assessing and improving how objectives are established and decisions are made.","cmt_tr":"The internal audit function evaluates governance processes such as how the organization (1) establishes strategic objectives and makes strategic and operational decisions; (2) oversees risk management and control; (3) promotes an ethical culture; (4) delivers effective performance management and accountability; (5) structures its management and operating functions; (6) communicates risk and control information throughout the organization; and (7) coordinates activities and communications among the board, internal and external providers of assurance services, and management. The internal audit function improves governance by providing objective assurance and insight on the effectiveness and efficiency of governance processes. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_en":"The internal audit function evaluates governance processes such as how the organization (1) establishes strategic objectives and makes strategic and operational decisions; (2) oversees risk management and control; (3) promotes an ethical culture; (4) delivers effective performance management and accountability; (5) structures its management and operating functions; (6) communicates risk and control information throughout the organization; and (7) coordinates activities and communications among the board, internal and external providers of assurance services, and management. The internal audit function improves governance by providing objective assurance and insight on the effectiveness and efficiency of governance processes. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"}],"answer":3},{"q_tr":"Which of the following statements regarding governance is false?","q_en":"Which of the following statements regarding governance is false?","options":[{"tr":"Governance has a range of definitions depending on the circumstances.","en":"Governance has a range of definitions depending on the circumstances.","cmt_tr":"Governance does have a range of definitions depending on the circumstances. The chief audit executive may use a different definition when the organization uses a different model.","cmt_en":"Governance does have a range of definitions depending on the circumstances. The chief audit executive may use a different definition when the organization uses a different model."},{"tr":"Governance models generally treat governance as a process or a system that is static.","en":"Governance models generally treat governance as a process or a system that is static.","cmt_tr":"Governance models generally treat governance as a process or a system that is not static. The approach in the Standards emphasizes the board and its governance activities.","cmt_en":"Governance models generally treat governance as a process or a system that is not static. The approach in the Standards emphasizes the board and its governance activities."},{"tr":"Governance requirements vary by entity type and regulatory jurisdiction.","en":"Governance requirements vary by entity type and regulatory jurisdiction.","cmt_tr":"Governance requirements do vary by entity type and regulatory jurisdiction. Examples include publicly traded companies, not-for-profits, governments, private companies, and stock exchanges.","cmt_en":"Governance requirements do vary by entity type and regulatory jurisdiction. Examples include publicly traded companies, not-for-profits, governments, private companies, and stock exchanges."},{"tr":"Governance does not exist as distinct processes and control structures.","en":"Governance does not exist as distinct processes and control structures.","cmt_tr":"Governance does not exist as distinct processes and control structures but instead as relationships with risk management and control.","cmt_en":"Governance does not exist as distinct processes and control structures but instead as relationships with risk management and control."}],"answer":1},{"q_tr":"The highest level governing body in an organization is least likely to have a duty to","q_en":"The highest level governing body in an organization is least likely to have a duty to","options":[{"tr":"Declare dividends.","en":"Declare dividends.","cmt_tr":"The highest level governing body in an organization makes decisions to declare and distribute dividends.","cmt_en":"The highest level governing body in an organization makes decisions to declare and distribute dividends."},{"tr":"Repeal bylaws.","en":"Repeal bylaws.","cmt_tr":"The highest level governing body in an organization makes decisions about adding, amending, or repealing bylaws (unless this authority is reserved to the shareholders).","cmt_en":"The highest level governing body in an organization makes decisions about adding, amending, or repealing bylaws (unless this authority is reserved to the shareholders)."},{"tr":"Periodically assess the ethical climate.","en":"Periodically assess the ethical climate.","cmt_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance.","cmt_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance."},{"tr":"Manage risk through a subcommittee.","en":"Manage risk through a subcommittee.","cmt_tr":"The highest level governing body in an organization evaluates and manages risk (sometimes performed by a subcommittee called the risk committee). Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_en":"The highest level governing body in an organization evaluates and manages risk (sometimes performed by a subcommittee called the risk committee). Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"}],"answer":2},{"q_tr":"Which of the following statements about governance is true?","q_en":"Which of the following statements about governance is true?","options":[{"tr":"Governance exists as distinct processes and controls.","en":"Governance exists as distinct processes and controls.","cmt_tr":"Governance does not exist as distinct processes and structures but as relationships with risk management and control.","cmt_en":"Governance does not exist as distinct processes and structures but as relationships with risk management and control."},{"tr":"The chief audit executive is likely to use consultants to assess governance when the organization’s process is mature.","en":"The chief audit executive is likely to use consultants to assess governance when the organization’s process is mature.","cmt_tr":"The chief audit executive is likely to use consultants to assess governance when the organization’s process is (1) not mature, or (2) control issues are known.","cmt_en":"The chief audit executive is likely to use consultants to assess governance when the organization’s process is (1) not mature, or (2) control issues are known."},{"tr":"Governance is essentially a static process.","en":"Governance is essentially a static process.","cmt_tr":"Governance models generally treat governance as a process or a system that is not static. The approach in the Standards emphasizes the board and its governance activities.","cmt_en":"Governance models generally treat governance as a process or a system that is not static. The approach in the Standards emphasizes the board and its governance activities."},{"tr":"Governance has a range of definitions depending on the circumstances.","en":"Governance has a range of definitions depending on the circumstances.","cmt_tr":"Governance has a range of definitions depending on the circumstances. The chief audit executive should work with the board and senior management, as appropriate, to determine how governance should be defined for internal audit purposes.","cmt_en":"Governance has a range of definitions depending on the circumstances. The chief audit executive should work with the board and senior management, as appropriate, to determine how governance should be defined for internal audit purposes."}],"answer":3},{"q_tr":"Which of the following are roles of the internal audit function in best practice governance activities? 1. Report significant audit issues 2. Support the board in enterprise-wide risk assessment 3. Conduct follow-up and report on management’s response to external audit 4. Act as custodian of corporate assets in the pursuit of positive outcomes for stakeholders","q_en":"Which of the following are roles of the internal audit function in best practice governance activities? 1. Report significant audit issues 2. Support the board in enterprise-wide risk assessment 3. Conduct follow-up and report on management’s response to external audit 4. Act as custodian of corporate assets in the pursuit of positive outcomes for stakeholders","options":[{"tr":"1 and 3 only.","en":"1 and 3 only.","cmt_tr":"The internal audit function also supports the board in enterprise-wide risk assessment.","cmt_en":"The internal audit function also supports the board in enterprise-wide risk assessment."},{"tr":"2 and 4 only.","en":"2 and 4 only.","cmt_tr":"The internal audit function also reports significant audit issues and conducts follow-up and reports on management’s response to external audits but does not act as custodian of corporate assets in pursuit of positive outcomes for stakeholders.","cmt_en":"The internal audit function also reports significant audit issues and conducts follow-up and reports on management’s response to external audits but does not act as custodian of corporate assets in pursuit of positive outcomes for stakeholders."},{"tr":"1, 2, and 3 only.","en":"1, 2, and 3 only.","cmt_tr":"The internal audit function reports significant audit issues, supports the board in enterprise-wide Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance risk assessment, and conducts follow-up and reports on management’s response to external audits as part of its best practice governance activities.","cmt_en":"The internal audit function reports significant audit issues, supports the board in enterprise-wide Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance risk assessment, and conducts follow-up and reports on management’s response to external audits as part of its best practice governance activities."},{"tr":"1, 2, 3, and 4.","en":"1, 2, 3, and 4.","cmt_tr":"The board and senior management, not the internal audit function, act as custodians of corporate assets in the pursuit of positive outcomes for stakeholders.","cmt_en":"The board and senior management, not the internal audit function, act as custodians of corporate assets in the pursuit of positive outcomes for stakeholders."}],"answer":2},{"q_tr":"The internal audit function assesses the coordination of the activities of the board, management, and auditors. This assessment most directly relates to the function of","q_en":"The internal audit function assesses the coordination of the activities of the board, management, and auditors. This assessment most directly relates to the function of","options":[{"tr":"Quality assurance.","en":"Quality assurance.","cmt_tr":"A quality assurance program normally is implemented for an organizational unit, e.g., the internal audit function.","cmt_en":"A quality assurance program normally is implemented for an organizational unit, e.g., the internal audit function."},{"tr":"Risk management.","en":"Risk management.","cmt_tr":"Governance (not risk management) is directly responsible for coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management","cmt_en":"Governance (not risk management) is directly responsible for coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management"},{"tr":"Governance.","en":"Governance.","cmt_tr":"The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for: • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; • Ensuring effective organizational performance management and accountability; • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management.","cmt_en":"The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for: • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; • Ensuring effective organizational performance management and accountability; • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management."},{"tr":"The control environment.","en":"The control environment.","cmt_tr":"Governance (not control) is directly responsible for coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_en":"Governance (not control) is directly responsible for coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"}],"answer":2},{"q_tr":"The internal audit function’s evaluation of the ethical climate of the organization extends to 1. Evaluating the effectiveness of background checks 2. Defining roles and specifying accountability 3. Evaluating the effectiveness of declarations by suppliers about the requirements of ethical behavior","q_en":"The internal audit function’s evaluation of the ethical climate of the organization extends to 1. Evaluating the effectiveness of background checks 2. Defining roles and specifying accountability 3. Evaluating the effectiveness of declarations by suppliers about the requirements of ethical behavior","options":[{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"The internal audit staff also evaluates the effectiveness of declarations by suppliers about required behavior. Additionally, the internal auditors do not have the authority to define roles and specify accountability.","cmt_en":"The internal audit staff also evaluates the effectiveness of declarations by suppliers about required behavior. Additionally, the internal auditors do not have the authority to define roles and specify accountability."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"The internal auditors also evaluate the effectiveness of background checks. Additionally, the internal auditors do not have the authority to define roles and specify accountability.","cmt_en":"The internal auditors also evaluate the effectiveness of background checks. Additionally, the internal auditors do not have the authority to define roles and specify accountability."},{"tr":"1 and 3 only.","en":"1 and 3 only.","cmt_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. As part of this assessment, the internal audit function evaluates the effectiveness of background checks and of declarations by suppliers about the requirements of ethical behavior. However, defining roles and specifying accountability are management functions.","cmt_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. As part of this assessment, the internal audit function evaluates the effectiveness of background checks and of declarations by suppliers about the requirements of ethical behavior. However, defining roles and specifying accountability are management functions."},{"tr":"1, 2, and 3.","en":"1, 2, and 3.","cmt_tr":"The internal auditors do not have the authority to define roles and specify accountability.","cmt_en":"The internal auditors do not have the authority to define roles and specify accountability."}],"answer":2},{"q_tr":"In an assurance engagement, what is the internal auditor’s responsibility for evaluating ethics-related activities?","q_en":"In an assurance engagement, what is the internal auditor’s responsibility for evaluating ethics-related activities?","options":[{"tr":"Evaluate their design, implementation, and effectiveness.","en":"Evaluate their design, implementation, and effectiveness.","cmt_tr":"The internal audit function must evaluate the design, implementation, and effectiveness of the organizations ethics-related objectives, programs, and activities.","cmt_en":"The internal audit function must evaluate the design, implementation, and effectiveness of the organizations ethics-related objectives, programs, and activities."},{"tr":"Evaluate only the design of ethics-related activities.","en":"Evaluate only the design of ethics-related activities.","cmt_tr":"Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs.","cmt_en":"Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs."},{"tr":"Review employee activities for compliance with provisions of the code.","en":"Review employee activities for compliance with provisions of the code.","cmt_tr":"Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs.","cmt_en":"Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs."},{"tr":"Perform tests on various employee transactions.","en":"Perform tests on various employee transactions.","cmt_tr":"Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_en":"Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"}],"answer":0},{"q_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of which of the following? 1. Regular reviews of the processes that undermine the ethical culture 2. Confidential reporting of alleged misconduct 3. Personnel practices that encourage contributions by employee","q_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of which of the following? 1. Regular reviews of the processes that undermine the ethical culture 2. Confidential reporting of alleged misconduct 3. Personnel practices that encourage contributions by employee","options":[{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"The internal audit staff also evaluates the effectiveness of personnel practices that encourage contributions by employees.","cmt_en":"The internal audit staff also evaluates the effectiveness of personnel practices that encourage contributions by employees."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"The internal auditors also evaluate the effectiveness of regular reviews of the processes that undermine the ethical culture.","cmt_en":"The internal auditors also evaluate the effectiveness of regular reviews of the processes that undermine the ethical culture."},{"tr":"1 and 3 only.","en":"1 and 3 only.","cmt_tr":"The internal auditors also evaluate the effectiveness of confidential reporting of alleged misconduct.","cmt_en":"The internal auditors also evaluate the effectiveness of confidential reporting of alleged misconduct."},{"tr":"1, 2, and 3.","en":"1, 2, and 3.","cmt_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of regular reviews of the processes that undermine the ethical culture, confidential reporting of alleged misconduct, and personnel practices that encourage contributions by employees.","cmt_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of regular reviews of the processes that undermine the ethical culture, confidential reporting of alleged misconduct, and personnel practices that encourage contributions by employees."}],"answer":3},{"q_tr":"Which of the following is a responsibility of the internal audit function in organizational governance?","q_en":"Which of the following is a responsibility of the internal audit function in organizational governance?","options":[{"tr":"Carrying out board directives to achieve organizational objectives.","en":"Carrying out board directives to achieve organizational objectives.","cmt_tr":"Management is responsible for carrying out board directives to achieve organizational objectives.","cmt_en":"Management is responsible for carrying out board directives to achieve organizational objectives."},{"tr":"Ensuring the timely implementation of audit recommendations.","en":"Ensuring the timely implementation of audit recommendations.","cmt_tr":"Management has the responsibility of ensuring the timely implementation of the audit recommendations. The internal audit function is responsible for the development of a timely procedure to monitor the disposition of the audit recommendations.","cmt_en":"Management has the responsibility of ensuring the timely implementation of the audit recommendations. The internal audit function is responsible for the development of a timely procedure to monitor the disposition of the audit recommendations."},{"tr":"Monitoring compliance with the code of conduct.","en":"Monitoring compliance with the code of conduct.","cmt_tr":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance therefore evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption).","cmt_en":"The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance therefore evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption)."},{"tr":"Establishing the definition of governance.","en":"Establishing the definition of governance.","cmt_tr":"The internal audit function is responsible for working with the board and senior management to determine the definition of governance.","cmt_en":"The internal audit function is responsible for working with the board and senior management to determine the definition of governance."}],"answer":2},{"q_tr":"Which of the following is most likely an internal audit role in a less structured governance process?","q_en":"Which of the following is most likely an internal audit role in a less structured governance process?","options":[{"tr":"Designing specific governance processes.","en":"Designing specific governance processes.","cmt_tr":"Internal auditors impair their objectivity by designing processes. However, evaluating the design and effectiveness of specific processes is a typical internal audit role.","cmt_en":"Internal auditors impair their objectivity by designing processes. However, evaluating the design and effectiveness of specific processes is a typical internal audit role."},{"tr":"Playing a consulting role in optimizing governance practices and structure.","en":"Playing a consulting role in optimizing governance practices and structure.","cmt_tr":"Playing a consulting role in optimizing governance practices and structure is typical of a more structured internal auditing governance maturity model. The emphasis shifts to considering best practices and adapting them to the specific organization.","cmt_en":"Playing a consulting role in optimizing governance practices and structure is typical of a more structured internal auditing governance maturity model. The emphasis shifts to considering best practices and adapting them to the specific organization."},{"tr":"Providing advice about basic risks to the organization.","en":"Providing advice about basic risks to the organization.","cmt_tr":"A less mature governance system will emphasize the requirements for compliance with policies, procedures, plans, laws, regulations, and contracts. It will also address the basic risks to the organization. Thus, the internal audit function will provide advice about such matters. As the governance process becomes more structured, the internal audit function’s emphasis will shift to optimizing the governance structure and practices.","cmt_en":"A less mature governance system will emphasize the requirements for compliance with policies, procedures, plans, laws, regulations, and contracts. It will also address the basic risks to the organization. Thus, the internal audit function will provide advice about such matters. As the governance process becomes more structured, the internal audit function’s emphasis will shift to optimizing the governance structure and practices."},{"tr":"Evaluating the effectiveness of specific governance processes.","en":"Evaluating the effectiveness of specific governance processes.","cmt_tr":"Evaluating the effectiveness of specific governance processes is typical of a more structured internal auditing governance maturity model.","cmt_en":"Evaluating the effectiveness of specific governance processes is typical of a more structured internal auditing governance maturity model."}],"answer":2},{"q_tr":"Which of the following should an internal auditor consider when assessing governance? 1. Audits of specific processes 2. Governance issues arising from audits not focused on governance 3. The results of other assurance providers’ work 4. Information such as adverse incidents indicating an opportunity to improve governance","q_en":"Which of the following should an internal auditor consider when assessing governance? 1. Audits of specific processes 2. Governance issues arising from audits not focused on governance 3. The results of other assurance providers’ work 4. Information such as adverse incidents indicating an opportunity to improve governance","options":[{"tr":"1 and 3 only.","en":"1 and 3 only.","cmt_tr":"Internal auditors should also consider governance issues arising from audits not focused on governance and other information such as adverse incidents indicating an opportunity to improve governance.","cmt_en":"Internal auditors should also consider governance issues arising from audits not focused on governance and other information such as adverse incidents indicating an opportunity to improve governance."},{"tr":"2 and 4 only.","en":"2 and 4 only.","cmt_tr":"Internal auditors should also consider audits of specific processes and the results of other assurance providers’ work.","cmt_en":"Internal auditors should also consider audits of specific processes and the results of other assurance providers’ work."},{"tr":"1, 2, and 3 only.","en":"1, 2, and 3 only.","cmt_tr":"Internal auditors should also consider other information such as adverse incidents indicating an opportunity to improve governance.","cmt_en":"Internal auditors should also consider other information such as adverse incidents indicating an opportunity to improve governance."},{"tr":"1, 2, 3, and 4. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","en":"1, 2, 3, and 4. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_tr":"Assessments of governance are likely to be based on numerous audits. The internal auditor should consider • Audits of specific processes, • Governance issues arising from audits not focused on governance, • The results of other assurance providers’ work, and • Other information such as adverse incidents indicating an opportunity to improve governance.","cmt_en":"Assessments of governance are likely to be based on numerous audits. The internal auditor should consider • Audits of specific processes, • Governance issues arising from audits not focused on governance, • The results of other assurance providers’ work, and • Other information such as adverse incidents indicating an opportunity to improve governance."}],"answer":3},{"q_tr":"In the governance process, the internal audit function most likely should","q_en":"In the governance process, the internal audit function most likely should","options":[{"tr":"Coordinate the activities of the external and internal auditors and management.","en":"Coordinate the activities of the external and internal auditors and management.","cmt_tr":"The internal audit function evaluates the processes by which activities of the external and internal auditors and management are coordinated.","cmt_en":"The internal audit function evaluates the processes by which activities of the external and internal auditors and management are coordinated."},{"tr":"Communicate risk and control information.","en":"Communicate risk and control information.","cmt_tr":"The internal audit function evaluates the processes by which risk and control information is communicated.","cmt_en":"The internal audit function evaluates the processes by which risk and control information is communicated."},{"tr":"Evaluate the process for performance management.","en":"Evaluate the process for performance management.","cmt_tr":"The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; • Ensuring effective organizational performance management and accountability; Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management.","cmt_en":"The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; • Ensuring effective organizational performance management and accountability; Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management."},{"tr":"Promote ethics and values.","en":"Promote ethics and values.","cmt_tr":"The internal audit function evaluates the processes by which ethics and values are promoted.","cmt_en":"The internal audit function evaluates the processes by which ethics and values are promoted."}],"answer":2},{"q_tr":"The responsibility of the internal audit function in an assurance engagement for ethics- related matters is to","q_en":"The responsibility of the internal audit function in an assurance engagement for ethics- related matters is to","options":[{"tr":"Evaluate the design and effectiveness of the organization’s ethics-related activities.","en":"Evaluate the design and effectiveness of the organization’s ethics-related activities.","cmt_tr":"The internal audit function must evaluate the design, implementation, and effectiveness of the organization’s ethics-related objectives, programs, and activities. The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance.","cmt_en":"The internal audit function must evaluate the design, implementation, and effectiveness of the organization’s ethics-related objectives, programs, and activities. The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance."},{"tr":"Promote and set the example of ethical behavior.","en":"Promote and set the example of ethical behavior.","cmt_tr":"Senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., setting the tone at the top).","cmt_en":"Senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., setting the tone at the top)."},{"tr":"Establish and maintain sound ethics-related objectives and programs.","en":"Establish and maintain sound ethics-related objectives and programs.","cmt_tr":"Senior management is responsible for establishing and maintaining sound ethics-related objectives and programs.","cmt_en":"Senior management is responsible for establishing and maintaining sound ethics-related objectives and programs."},{"tr":"Oversee the organization’s ethical climate.","en":"Oversee the organization’s ethical climate.","cmt_tr":"The board oversees the organization’s ethical climate.","cmt_en":"The board oversees the organization’s ethical climate."}],"answer":0},{"q_tr":"A code of conduct was developed several years ago and distributed by a large financial institution to all its officers and employees. What is the internal auditor’s best approach to providing the board with the highest level of comfort about the code of conduct?","q_en":"A code of conduct was developed several years ago and distributed by a large financial institution to all its officers and employees. What is the internal auditor’s best approach to providing the board with the highest level of comfort about the code of conduct?","options":[{"tr":"Fully evaluate the comprehensiveness of the code and compliance with it and report the results to the board.","en":"Fully evaluate the comprehensiveness of the code and compliance with it and report the results to the board.","cmt_tr":"When evaluating a code of conduct, it is important to consider two items: comprehensiveness Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance and compliance. The code should address the ethical issues that the employees are expected to encounter and provide suitable guidance. The internal auditor also must consider the extent to which employees are complying with the standards established.","cmt_en":"When evaluating a code of conduct, it is important to consider two items: comprehensiveness Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance and compliance. The code should address the ethical issues that the employees are expected to encounter and provide suitable guidance. The internal auditor also must consider the extent to which employees are complying with the standards established."},{"tr":"Fully evaluate organizational practices for compliance with the code and report to the board.","en":"Fully evaluate organizational practices for compliance with the code and report to the board.","cmt_tr":"Evaluating practices and reporting to the board is not the best approach.","cmt_en":"Evaluating practices and reporting to the board is not the best approach."},{"tr":"Review employee activities for compliance with provisions of the code and report to the board.","en":"Review employee activities for compliance with provisions of the code and report to the board.","cmt_tr":"Reviewing employee activities does not provide as much comfort about the code of conduct as evaluation of comprehensiveness.","cmt_en":"Reviewing employee activities does not provide as much comfort about the code of conduct as evaluation of comprehensiveness."},{"tr":"Perform tests on various employee transactions to detect potential violations of the code of conduct.","en":"Perform tests on various employee transactions to detect potential violations of the code of conduct.","cmt_tr":"Performing tests on employee transactions is not the best approach.","cmt_en":"Performing tests on employee transactions is not the best approach."}],"answer":0},{"q_tr":"The internal audit function should contribute to the organization’s governance process by evaluating the processes through which 1. Ethics and values are promoted. 2. Effective organizational performance management and accountability are ensured. 3. Risk and control information is communicated. 4. Activities of the external and internal auditors and management are coordinated.","q_en":"The internal audit function should contribute to the organization’s governance process by evaluating the processes through which 1. Ethics and values are promoted. 2. Effective organizational performance management and accountability are ensured. 3. Risk and control information is communicated. 4. Activities of the external and internal auditors and management are coordinated.","options":[{"tr":"1 only.","en":"1 only.","cmt_tr":"The internal audit function also evaluates the processes through which effective organizational performance management and accountability are ensured, risk and control information is communicated, and activities of the external and internal auditors and management are coordinated.","cmt_en":"The internal audit function also evaluates the processes through which effective organizational performance management and accountability are ensured, risk and control information is communicated, and activities of the external and internal auditors and management are coordinated."},{"tr":"4 only.","en":"4 only.","cmt_tr":"The internal audit function also evaluates the processes through which ethics and values are promoted, effective organizational performance management and accountability are ensured, and risk and control information is communicated.","cmt_en":"The internal audit function also evaluates the processes through which ethics and values are promoted, effective organizational performance management and accountability are ensured, and risk and control information is communicated."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"The internal audit function also evaluates the processes through which ethics and values are promoted and activities of the external and internal auditors and management are coordinated.","cmt_en":"The internal audit function also evaluates the processes through which ethics and values are promoted and activities of the external and internal auditors and management are coordinated."},{"tr":"1, 2, 3, and 4.","en":"1, 2, 3, and 4.","cmt_tr":"The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for: • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance • Ensuring effective organizational performance management and accountability; • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management.","cmt_en":"The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for: • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance • Ensuring effective organizational performance management and accountability; • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management."}],"answer":3},{"q_tr":"Which of the following is not a role of the internal audit function in best practice governance activities?","q_en":"Which of the following is not a role of the internal audit function in best practice governance activities?","options":[{"tr":"Support the board in enterprise-wide risk assessment.","en":"Support the board in enterprise-wide risk assessment.","cmt_tr":"One internal audit function role is to support the board in enterprise-wide risk assessment. The board and management are responsible for the identification of an appropriate risk model and methodology.","cmt_en":"One internal audit function role is to support the board in enterprise-wide risk assessment. The board and management are responsible for the identification of an appropriate risk model and methodology."},{"tr":"Ensure the timely implementation of audit recommendations.","en":"Ensure the timely implementation of audit recommendations.","cmt_tr":"Management has the responsibility of ensuring the timely implementation of the audit recommendations. The internal audit function is responsible for the development of a timely procedure to monitor the disposition of the audit recommendations. It works with senior management and the board to ensure that audit recommendations receive appropriate attention.","cmt_en":"Management has the responsibility of ensuring the timely implementation of the audit recommendations. The internal audit function is responsible for the development of a timely procedure to monitor the disposition of the audit recommendations. It works with senior management and the board to ensure that audit recommendations receive appropriate attention."},{"tr":"Monitor compliance with the corporate code of conduct.","en":"Monitor compliance with the corporate code of conduct.","cmt_tr":"The internal audit function should monitor compliance with the corporate code of conduct set by the board and management.","cmt_en":"The internal audit function should monitor compliance with the corporate code of conduct set by the board and management."},{"tr":"Discuss areas of significant risks.","en":"Discuss areas of significant risks.","cmt_tr":"The internal audit function is responsible for discussing significant financial, technical, and operational risks and exposures as well as the plans to minimize such risks.","cmt_en":"The internal audit function is responsible for discussing significant financial, technical, and operational risks and exposures as well as the plans to minimize such risks."}],"answer":1},{"q_tr":"Craig is the chief audit executive (CAE) of Marlin, Inc., and is in the process of planning an assessment of governance at Marlin. Which of the following should Craig consider in planning the assessment of governance?","q_en":"Craig is the chief audit executive (CAE) of Marlin, Inc., and is in the process of planning an assessment of governance at Marlin. Which of the following should Craig consider in planning the assessment of governance?","options":[{"tr":"Whether all major decisions have been authorized by senior management.","en":"Whether all major decisions have been authorized by senior management.","cmt_tr":"Craig also should determine whether he can rely on the assessment of internal control performed by external auditors and whether the organization promotes an ethical culture. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_en":"Craig also should determine whether he can rely on the assessment of internal control performed by external auditors and whether the organization promotes an ethical culture. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"},{"tr":"Whether he can rely on the assessment of internal control performed by external auditors.","en":"Whether he can rely on the assessment of internal control performed by external auditors.","cmt_tr":"Craig also should verify that all major decisions have been authorized by senior management and determine whether the organization promotes an ethical culture.","cmt_en":"Craig also should verify that all major decisions have been authorized by senior management and determine whether the organization promotes an ethical culture."},{"tr":"Whether the organization promotes an ethical culture.","en":"Whether the organization promotes an ethical culture.","cmt_tr":"Craig also should verify that all major decisions have been authorized by senior management and determine whether he can rely on the assessment of internal control performed by external auditors.","cmt_en":"Craig also should verify that all major decisions have been authorized by senior management and determine whether he can rely on the assessment of internal control performed by external auditors."},{"tr":"All of the answers are correct.","en":"All of the answers are correct.","cmt_tr":"The CAE should consider the following in planning assessments of governance: • An audit should address controls in governance processes that are designed to prevent or detect events that could have a negative effect on the organization; • Controls within governance processes often are significant in managing multiple risks; and, • If other audits assess controls in governance processes, the auditor should consider relying on their results. Thus, Craig should consider all of the answer choices when planning the assessment of governance.","cmt_en":"The CAE should consider the following in planning assessments of governance: • An audit should address controls in governance processes that are designed to prevent or detect events that could have a negative effect on the organization; • Controls within governance processes often are significant in managing multiple risks; and, • If other audits assess controls in governance processes, the auditor should consider relying on their results. Thus, Craig should consider all of the answer choices when planning the assessment of governance."}],"answer":3},{"q_tr":"Which of the following should be defined in the internal audit plan for an assessment of governance? 1. The nature of the work 2. The governance process 3. The nature of the assessments","q_en":"Which of the following should be defined in the internal audit plan for an assessment of governance? 1. The nature of the work 2. The governance process 3. The nature of the assessments","options":[{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"The nature of the assessments also should be defined in the audit plan.","cmt_en":"The nature of the assessments also should be defined in the audit plan."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"The nature of the work also should be defined in the audit plan.","cmt_en":"The nature of the work also should be defined in the audit plan."},{"tr":"1 and 3 only.","en":"1 and 3 only.","cmt_tr":"The governance process also should be defined in the audit plan.","cmt_en":"The governance process also should be defined in the audit plan."},{"tr":"1, 2, and 3.","en":"1, 2, and 3.","cmt_tr":"The audit plan should include higher-risk governance processes. It should define (1) the nature of the work; (2) the governance processes; and (3) the nature of the assessments, e.g., consideration of specific risks, processes, or activities. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance","cmt_en":"The audit plan should include higher-risk governance processes. It should define (1) the nature of the work; (2) the governance processes; and (3) the nature of the assessments, e.g., consideration of specific risks, processes, or activities. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance"}],"answer":3},{"q_tr":"A role of the internal audit function in organizational governance is","q_en":"A role of the internal audit function in organizational governance is","options":[{"tr":"Approval of the internal audit charter.","en":"Approval of the internal audit charter.","cmt_tr":"The internal audit function obtains the board’s approval of the internal audit charter.","cmt_en":"The internal audit function obtains the board’s approval of the internal audit charter."},{"tr":"Assessment of information technology governance.","en":"Assessment of information technology governance.","cmt_tr":"The internal audit function must assess whether the information technology governance of the organization supports the organization’s strategies and objectives.","cmt_en":"The internal audit function must assess whether the information technology governance of the organization supports the organization’s strategies and objectives."},{"tr":"Enterprise-wide risk assessment.","en":"Enterprise-wide risk assessment.","cmt_tr":"The internal audit function supports the board in enterprise-wide risk assessment.","cmt_en":"The internal audit function supports the board in enterprise-wide risk assessment."},{"tr":"Responding to reviews by regulators.","en":"Responding to reviews by regulators.","cmt_tr":"The internal audit function follows up and reports on management’s response to regulatory body reviews.","cmt_en":"The internal audit function follows up and reports on management’s response to regulatory body reviews."}],"answer":1},{"q_tr":"An organization has a mature governance system. The most likely role of the internal audit function in support of the ethical culture is an emphasis on","q_en":"An organization has a mature governance system. The most likely role of the internal audit function in support of the ethical culture is an emphasis on","options":[{"tr":"Compliance with policies.","en":"Compliance with policies.","cmt_tr":"Complianc
