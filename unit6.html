 "cmt_en": "Evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed is a responsibility of risk owners.", "az": "Risk idarəetmə fəaliyyətlərinin dizaynının qiymətləndirilməsi.", "cmt_az": "Risk idarəetmə fəaliyyətlərinin dizaynının adekvatlığının və təşkilatın onları planlaşdırıldığı kimi həyata keçirmə qabiliyyətinin qiymətləndirilməsi risk sahiblərinin məsuliyyətidir."}], "answer": 0, "q_az": "Direktorlar şurası ən çox nədən məsuldur?"}, {"q_tr": "Yönetişim rolleri yönetim kurulu, üst yönetim ve risk sahipleri tarafından yerine getirilir. Risk sahiplerinin rolleri arasında şunlar yer alır:", "q_en": "Governance roles are performed by the board, senior management, and risk owners. The roles of risk owners include", "options": [{"tr": "Risk yönetimi faaliyetlerinin tasarlandığı şekilde işleyip işlemediğinin belirlenmesi.", "en": "Determining whether risk management activities are operating as designed.", "cmt_tr": "Risk sahipleri (1) risk yönetimi faaliyetlerinin tasarımının yeterliliğini ve kuruluşun bunları tasarlandığı şekilde yürütme kapasitesini değerlendirmekten; (2) risk yönetimi faaliyetlerinin tasarlandığı şekilde işleyip işlemediğini belirlemekten; (3) izleme faaliyetleri oluşturmaktan; ve (4) üst yönetime ve yönetim kuruluna raporlanacak bilgilerin doğru, zamanında ve erişilebilir olmasını sağlamaktan sorumludur.", "cmt_en": "Risk owners are responsible for (1) evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed; (2) determining whether risk management activities are operating as designed; (3) establishing monitoring activities; and (4) ensuring that information to be reported to senior management and the board is accurate, timely, and available.", "az": "Risk idarəetmə fəaliyyətlərinin planlaşdırıldığı kimi işləyib-işləmədiyinin müəyyən edilməsi.", "cmt_az": "Risk sahibləri (1) risk idarəetmə fəaliyyətlərinin dizaynının adekvatlığını və təşkilatın onları planlaşdırıldığı kimi həyata keçirmə qabiliyyətini qiymətləndirməyə; (2) risk idarəetmə fəaliyyətlərinin planlaşdırıldığı kimi işləyib-işləmədiyini müəyyən etməyə; (3) monitorinq fəaliyyətləri qurmağa; və (4) üst rəhbərliyə və idarə heyətinə hesabat veriləcək məlumatların dəqiq, vaxtında və əlçatan olmasını təmin etməyə məsuldurlar."}, {"tr": "Risk yönetimi faaliyetleri için raporlama gereksinimlerinin belirlenmesi.", "en": "Establishing reporting requirements for risk management activities.", "cmt_tr": "Üst yönetim risk sahipleri için risk yönetimi faaliyetleriyle ilgili raporlama gereksinimlerini belirler.", "cmt_en": "Senior management establishes reporting requirements for risk owners related to their risk management activities.", "az": "Risk idarəetmə fəaliyyətləri üçün hesabat tələblərinin müəyyən edilməsi.", "cmt_az": "Üst rəhbərlik risk sahibləri üçün risk idarəetmə fəaliyyətləri ilə bağlı hesabat tələblərini müəyyən edir."}, {"tr": "Belirli risklerin nerede ve nasıl yönetileceğinin belirlenmesi.", "en": "Determining where and how specific risks are managed.", "cmt_tr": "Üst yönetim (1) belirli risklerin nerede yönetileceğini, (2) risk sahiplerinin kim olacağını ve (3) belirli risklerin nasıl yönetileceğini belirler.", "cmt_en": "Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for day-to-day risks), and (3) how specific risks will be managed.", "az": "Xüsusi risklərin harada və necə idarə olunacağının müəyyən edilməsi.", "cmt_az": "Üst rəhbərlik (1) xüsusi risklərin harada idarə olunacağını, (2) risk sahiblərinin kim olacağını və (3) xüsusi risklərin necə idarə olunacağını müəyyən edir."}, {"tr": "Tolerans düzeylerinin kuruluşun risk iştahıyla tutarlı olup olmadığının değerlendirilmesi.", "en": "Considering whether tolerance levels are consistent with the organization’s risk appetite.", "cmt_tr": "Yönetim kurulunun risk komitesi oluşturulabilir: (1) temel riskleri belirler, (2) onları risk yönetimi süreçlerine bağlar, (3) onları risk sahiplerine devreder ve (4) risk sahiplerine devredilen tolerans düzeylerinin kuruluşun risk iştahıyla tutarlı olup olmadığını değerlendirir.", "cmt_en": "A risk committee of the board may be created that (1) identifies key risks, (2) assigns them to risk management processes, (3) delegates them to risk owners, and (4) considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite. Risk appetite consists of the amount and types of risks the entity is willing to accept in pursuit of value.", "az": "Tolerans səviyyələrinin təşkilatın risk iştahası ilə uyğun olub-olmadığının nəzərdən keçirilməsi.", "cmt_az": "İdarə heyətinin risk komitəsi yaradıla bilər ki, (1) əsas riskləri müəyyən etsin, (2) onları risk idarəetmə proseslərinə bağlasın, (3) onları risk sahiblərinə həvalə etsin və (4) risk sahiblərinə həvalə edilmiş tolerans səviyyələrinin təşkilatın risk iştahası ilə uyğun olub-olmadığını nəzərdən keçirsin."}], "answer": 0, "q_az": "Yönetişim rolları idarə heyəti, üst rəhbərlik və risk sahibləri tərəfindən həyata keçirilir. Risk sahiblərinin rollarına aşağıdakılar daxildir:"}, {"q_tr": "Kurumsal bir organizasyondaki en üst düzey yönetim organı en çok ne yapacaktır?", "q_en": "The highest level governing body in a corporate organization is most likely to", "options": [{"tr": "Yönetişim süreçlerini değerlendirmek.", "en": "Assess governance processes.", "cmt_tr": "İç denetim fonksiyonu yönetişim süreçlerini değerlendirmek ve iyileştirmekten sorumludur.", "cmt_en": "The internal audit function is responsible for assessing and improving governance proce", "az": "Yönetişim proseslərini qiymətləndirmək.", "cmt_az": "İç denetim funksiyası yönetişim proseslərini qiymətləndirmək və təkmilləşdirməyə məsuldur."}, {"tr": "Üstten ton belirlemeye sorumlu olmak.", "en": "Be responsible for setting the tone at the top.", "cmt_tr": "Yönetim kurulu kuruluşun etik iklimini denetler ancak üst yönetim etik davranışı teşvik etme ve örnek olma (yani üstten ton belirleme) konusunda nihai sorumluluğa sahiptir.", "cmt_en": "The board oversees the organization’s ethical climate, but senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., the tone at the top). Senior management is also responsible for establishing and maintaining sound ethics-related objectives and programs.", "az": "Yuxarıdan ton müəyyən etməyə məsul olmaq.", "cmt_az": "İdarə heyəti təşkilatın etik mühitinə nəzarət edir, lakin üst rəhbərlik etik davranışın təşviq edilməsi və nümunə göstərilməsi (yəni, yuxarıdan ton müəyyən etmə) üçün son məsuliyyət daşıyır."}, {"tr": "Risk yönetimi faaliyetlerinin tasarımını değerlendirmek.", "en": "Evaluate the design of risk management activities.", "cmt_tr": "Risk sahipleri (günlük risklerden sorumlu yöneticiler) risk yönetimi faaliyetlerinin tasarımını ve kuruluşun bunları tasarlandığı şekilde yürütme kapasitesini değerlendirir.", "cmt_en": "Risk owners (managers responsible for day-to-day risks) evaluate the design of risk management activities and the organization’s ability to perform them as designed.", "az": "Risk idarəetmə fəaliyyətlərinin dizaynını qiymətləndirmək.", "cmt_az": "Risk sahibləri (gündəlik risklərə məsul menecerlər) risk idarəetmə fəaliyyətlərinin dizaynını və təşkilatın onları planlaşdırıldığı kimi həyata keçirmə qabiliyyətini qiymətləndirir."}, {"tr": "Denetim faaliyetlerini koordine etmek.", "en": "Coordinate audit activities. Study Unit 6: Governance | Subunit 1: Governance Principles", "cmt_tr": "Yönetim kurulu IIA tarafından yönetişimle görevlendirilen en üst düzey yönetim organı (örn. yönetim kurulu, denetim kurulu veya mütevelli heyeti) olarak tanımlanır. Yönetim kurulunun görevleri arasında denetim faaliyetlerinin koordinasyonu yer alır (çoğunlukla denetim komitesi adlı alt komite tarafından gerçekleştirilir).", "cmt_en": "The board is defined by The IIA as the highest level governing body (e.g., a board of directors, a supervisory board, or a board of governors or trustees) charged with direction or oversight of the organization’s activities and holding senior management accountable. The board’s duties include coordinating audit activities (most often performed by a subcommittee called the audit committee).", "az": "Audit fəaliyyətlərini koordinasiya etmək.", "cmt_az": "İdarə heyəti IIA tərəfindən yönetişimlə vəzifələndirilmiş ən yüksək səviyyəli idarəetmə orqanı (məsələn, direktorlar şurası, nəzarət şurası və ya qəyyumlar şurası) kimi təyin edilir. İdarə heyətinin vəzifələrinə audit fəaliyyətlərinin koordinasiyası daxildir (əksər hallarda audit komitəsi adlanan alt komitə tərəfindən həyata keçirilir)."}], "answer": 3, "q_az": "Korporativ təşkilatda ən yüksək səviyyəli idarəetmə orqanı ən çox nə edəcək?"}, {"q_tr": "Bir şirketin yönetim kurulu en çok neden sorumludur?", "q_en": "The board of directors of a corporation is most likely responsible for", "options": [{"tr": "Üst düzey yöneticilerin seçilmesi.", "en": "Selecting officers.", "cmt_tr": "Diğer görevlerin yanı sıra yönetim kurulu (1) üst düzey yöneticilerin seçilmesi ve görevden alınması; (2) sermaye yapısı kararları; (3) iç tüzüğün eklenmesi, değiştirilmesi veya yürürlükten kaldırılması; (4) köklü değişikliklerin başlatılması; (5) temettülerin ilan edilmesi ve dağıtılması; (6) yönetim ücretinin belirlenmesi; (7) denetim faaliyetlerinin koordinasyonu ve (8) yönetim riskinin değerlendirilmesinden sorumludur.", "cmt_en": "Among other things, the board of directors is responsible for (1) selecting and removing officers; (2) making decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiating fundamental changes; (5) declaring and distributing dividends; (6) setting management compensation; (7) coordinating audit activities; and (8) evaluating management risk.", "az": "Zabitlərin seçilməsi.", "cmt_az": "Digərləri arasında direktorlar şurası (1) zabitlərin seçilməsi və kənarlaşdırılması; (2) kapital strukturu haqqında qərarlar; (3) daxili qaydaların əlavə edilməsi, dəyişdirilməsi və ya ləğv edilməsi; (4) əsaslı dəyişikliklərin başladılması; (5) dividendlərin elan edilməsi və paylanması; (6) rəhbərlik kompensasiyasının müəyyən edilməsi; (7) audit fəaliyyətlərinin koordinasiyası; və (8) idarəetmə riskinin qiymətləndirilməsinə məsuldur."}, {"tr": "Günlük yönetişim işlevleri.", "en": "Day-to-day governance functions.", "cmt_tr": "Yönetim günlük yönetişim işlevlerini yerine getirir. Üst yönetim hedeflere ulaşmak için yönetim kurulu direktiflerini (kabul edilemez sonuçlar için belirlenen toleranslar dahilinde) uygular.", "cmt_en": "Management performs day-to-day governance functions. Senior management carries out board directives (within specified tolerances for unacceptable outcomes) to achieve objectives.", "az": "Gündəlik yönetişim funksiyaları.", "cmt_az": "Rəhbərlik gündəlik yönetişim funksiyalarını yerinə yetirir. Üst rəhbərlik hədəflərə çatmaq üçün idarə heyətinin direktivlərini (qəbuledilməz nəticələr üçün müəyyən edilmiş toleranslar daxilində) yerinə yetirir."}, {"tr": "Yönetim kurulu üyelerinin görevden alınması.", "en": "Removing directors.", "cmt_tr": "Hissedarlar yıllık toplantıda yönetim kurulu üyelerini seçebilir veya görevden alabilir.", "cmt_en": "Shareholders can elect or remove directors at the annual meeting.", "az": "Direktorların kənarlaşdırılması.", "cmt_az": "Səhmdarlar illik iclasda direktorları seçə və ya kənarlaşdıra bilərlər."}, {"tr": "İzleme faaliyetlerinin oluşturulması.", "en": "Establishing monitoring activities.", "cmt_tr": "Üst yönetim tarafından belirlenen risk sahipleri izleme faaliyetlerini oluşturur.", "cmt_en": "Risk owners determined by senior management establish monitoring activities.", "az": "Monitorinq fəaliyyətlərinin qurulması.", "cmt_az": "Üst rəhbərlik tərəfindən müəyyən edilmiş risk sahibləri monitorinq fəaliyyətlərini qurur."}], "answer": 0, "q_az": "Korporasiyanın direktorlar şurası ən çox nədən məsuldur?"}], "SU2 - Organizational Culture": [{"q_tr": "Kurumsal bir organizasyonda kurumsal kültürden öncelikli olarak kim sorumludur?", "q_en": "Who in a corporate organization is primarily responsible for the organizational culture?", "options": [{"tr": "Yönetim kurulu.", "en": "The board.", "cmt_tr": "Yönetim kurulu IIA tarafından yönetişimle görevlendirilen en üst düzey yönetim organı olarak tanımlanır. Ancak kurumsal kültürden öncelikli olarak üst yönetim sorumludur.", "cmt_en": "The board is defined by The IIA as the highest level governing body (e.g., a board of directors, a supervisory board, or a board of governors or trustees) charged with direction or oversight of the organization’s activities and holding senior management accountable. But senior management is primarily responsible for the culture.", "az": "İdarə heyəti.", "cmt_az": "İdarə heyəti IIA tərəfindən yönetişimlə vəzifələndirilmiş ən yüksək səviyyəli idarəetmə orqanı kimi təyin edilir. Lakin təşkilati mədəniyyətə əsasən üst rəhbərlik məsuldur."}, {"tr": "Çalışanlar dahil paydaşlar.", "en": "Stakeholders, including employees.", "cmt_tr": "Yönetici olmayan çalışanlar, hissedarlar, müşteriler, tedarikçiler, düzenleyiciler ve diğer paydaşların kuruluşun faaliyetlerinin yönlendirilmesi veya denetlenmesi için herhangi bir sorumluluğu yoktur.", "cmt_en": "Nonmanagerial employees, shareholders, customers, suppliers, regulators, and other stakeholders (those affected by the activities of the entity) have no responsibility for direction or oversight of the organization’s activities.", "az": "İşçilər daxil olmaqla maraqlı tərəflər.", "cmt_az": "Qeyri-idarəetmə işçiləri, səhmdarlar, müştərilər, təchizatçılar, tənzimləyicilər və digər maraqlı tərəflərin (müəssisənin fəaliyyətlərindən təsirlənənlər) təşkilatın fəaliyyətlərinin istiqamətləndirilməsi və ya nəzarəti üçün heç bir məsuliyyəti yoxdur."}, {"tr": "Üst yönetim.", "en": "Senior management.", "cmt_tr": "Yönetişim uygulamaları kuruluşun benzersiz kültürünü yansıtır ve etkinlik için büyük ölçüde ona bağlıdır. Kurumsal kültür (1) değerlerin, hedeflerin ve stratejilerin belirlenmesinde; (2) rollerin ve davranışların tanımlanmasında; (3) performansın ölçülmesinde; (4) hesap verebilirliğin belirlenmesinde; ve (5) kurumsal sosyal sorumlulukların yerine getirilmesinde yansıtılır. Üst yönetim öncelikli olarak kurumsal kültürün oluşturulması ve sürdürülmesinden sorumludur.", "cmt_en": "Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. Organizational culture is reflected in (1) setting values, objectives, and strategies; (2) defining roles and behaviors; (3) measuring performance; (4) specifying accountability; and (5) complying with corporate social responsibilities. Senior management is primarily responsible for establishing and maintaining an organizational culture.", "az": "Üst rəhbərlik.", "cmt_az": "Yönetişim təcrübələri təşkilatın unikal mədəniyyətini əks etdirir və effektivlik üçün əsasən ona bağlıdır. Təşkilati mədəniyyət (1) dəyərlərin, hədəflərin və strategiyaların müəyyən edilməsində; (2) rolların və davranışların təyin edilməsində; (3) performansın ölçülməsində; (4) hesabatlılığın müəyyən edilməsində; və (5) korporativ sosial məsuliyyətlərə uyğunluqda əks olunur. Üst rəhbərlik əsasən təşkilati mədəniyyətin yaradılmasına və qorunmasına məsuldur."}, {"tr": "İç denetim fonksiyonu.", "en": "The internal audit function.", "cmt_tr": "İç denetim fonksiyonu yönetişim süreçlerini değerlendirmek ve iyileştirmekten sorumludur.", "cmt_en": "The internal audit function is responsible for assessing and improving governance processes.", "az": "İç denetim funksiyası.", "cmt_az": "İç denetim funksiyası yönetişim proseslərini qiymətləndirmək və təkmilləşdirməyə məsuldur."}], "answer": 2, "q_az": "Korporativ təşkilatda təşkilati mədəniyyətə əsasən kim məsuldur?"}, {"q_tr": "Aşağıdakilerden hangisinin kuruluşun vizyon bildirisinde belirtilme olasılığı en yüksektir?", "q_en": "Which of the following most likely should be stated in an entity’s vision statement?", "options": [{"tr": "Personel politikaları.", "en": "Personnel policies.", "cmt_tr": "Personel politikaları vizyon bildirisi için uygun olmayan operasyonel konulardır.", "cmt_en": "Personnel policies are operating matters not appropriate for a vision statement.", "az": "Kadr siyasətləri.", "cmt_az": "Kadr siyasətləri vizyon bəyanatı üçün uyğun olmayan əməliyyat məsələləridir."}, {"tr": "Stratejik plan.", "en": "The strategic plan.", "cmt_tr": "Stratejik plan vizyon (misyon) bildirisi hazırlandıktan sonra geliştirilir.", "cmt_en": "The strategic plan is developed after a vision (mission) statement is drafted.", "az": "Strateji plan.", "cmt_az": "Strateji plan vizyon (missiya) bəyanatı hazırlandıqdan sonra inkişaf etdirilir."}, {"tr": "Yasal sorumluluklarla tutarlı kültürün sürdürülmesi stratejisi.", "en": "The strategy for maintaining a culture consistent with legal responsibilities.", "cmt_tr": "Davranış kuralları ve vizyon bildirileri • Kuruluşun değerlerini ve hedeflerini; • Beklenen davranışı; ve • Yasal, etik ve toplumsal sorumluluklarla tutarlı kültürün sürdürülmesi stratejilerini belirtmek için yayımlanır.", "cmt_en": "Codes of conduct and vision statements are issued to state • The organization’s values and objectives; • The behavior expected; and • The strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities.", "az": "Hüquqi məsuliyyətlərlə uyğun mədəniyyətin qorunması strategiyası.", "cmt_az": "Davranış kodeksləri və vizyon bəyanatları • Təşkilatın dəyərlərini və hədəflərini; • Gözlənilən davranışı; və • Hüquqi, etik və sosial məsuliyyətlərlə uyğun mədəniyyətin qorunması strategiyalarını ifadə etmək üçün nəşr olunur."}, {"tr": "İç kontrol ilkeleri.", "en": "Principles of internal control.", "cmt_tr": "Vizyon bildirisi kuruluşun misyonunun geniş bir tanımıdır, kontrol ilkeleri listesi değildir.", "cmt_en": "A vision statement is a broad description of an entity’s mission, not a list of control principles. Study Unit 6: Governance | Subunit 2: Organizational Culture", "az": "Daxili nəzarət prinsipləri.", "cmt_az": "Vizyon bəyanatı müəssisənin missiyasının geniş təsviridir, nəzarət prinsipləri siyahısı deyil."}], "answer": 2, "q_az": "Aşağıdakılardan hansı müəssisənin vizyon bəyanatında ən çox ifadə olunmalıdır?"}, {"q_tr": "Riskten kaçınan kurumsal kültürün kontrol ve görev riskleri değerlendirmesine muhtemel etkisi nedir?", "q_en": "Organizational culture that is risk averse likely has which of the following effects on the assessment of the importance of control and engagement risks?", "options": [{"tr": "Kuruluş içinde kontrolün önemi – Yüksek. Görev risklerinin yüksek değerlendirilmesi - Daha az olası.", "en": "Importance of control within the organization – High. Engagement risks are assessed high - Less likely.", "cmt_tr": "Riskten kaçınan kurumsal kültürde kuruluş içinde kontrolün önemi yüksek olma olasılığı fazla olsa da görev riskleri daha çok yüksek değerlendirilebilir.", "cmt_en": "Although the importance of control within the organization is likely to be high when organizational culture is risk averse, engagement risks are more likely to be assessed high.", "az": "Təşkilat daxilində nəzarətin əhəmiyyəti – Yüksək. Tapşırıq risklərinin yüksək qiymətləndirilməsi - Daha az ehtimal.", "cmt_az": "Riskə qarşı ehtiyatlı olan təşkilati mədəniyyətdə təşkilat daxilində nəzarətin əhəmiyyəti yüksək olma ehtimalı çox olsa da, tapşırıq riskləri daha çox yüksək qiymətləndirilə bilər."}, {"tr": "Kuruluş içinde kontrolün önemi – Yüksek. Görev risklerinin yüksek değerlendirilmesi - Daha olası.", "en": "Importance of control within the organization – High. Engagement risks are assessed high - More likely.", "cmt_tr": "Riskten kaçınan kurumsal kültür kuruluş içinde kontrolün önemini yüksek olarak değerlendirme olasılığı daha fazladır. Sonuç olarak görev risklerinin yüksek değerlendirilme olasılığı daha fazladır.", "cmt_en": "Organizational culture that is risk averse is more likely to regard the importance of control within the organization as high. Consequently, engagement risks are more likely to be assessed high.", "az": "Təşkilat daxilində nəzarətin əhəmiyyəti – Yüksək. Tapşırıq risklərinin yüksək qiymətləndirilməsi - Daha çox ehtimal.", "cmt_az": "Riskə qarşı ehtiyatlı olan təşkilati mədəniyyət təşkilat daxilində nəzarətin əhəmiyyətini yüksək hesab etmə ehtimalı daha çoxdur. Nəticədə, tapşırıq risklərinin yüksək qiymətləndirilmə ehtimalı daha çoxdur."}, {"tr": "Kuruluş içinde kontrolün önemi – Düşük. Görev risklerinin yüksek değerlendirilmesi - Daha olası.", "en": "Importance of control within the organization – Low. Engagement risks are assessed high - More likely", "cmt_tr": "Risk almaya eğilimli kurumsal kültür kuruluş içinde kontrolün önemini düşük olarak değerlendirme olasılığı daha fazladır. Sonuç olarak görev risklerinin yüksek değerlendirilme olasılığı daha azdır.", "cmt_en": "An organizational culture that is risk aggressive is more likely to regard the importance of control within the organization as low. Consequently, engagement risks are less likely to be assessed high.", "az": "Təşkilat daxilində nəzarətin əhəmiyyəti – Aşağı. Tapşırıq risklərinin yüksək qiymətləndirilməsi - Daha çox ehtimal.", "cmt_az": "Riskə qarşı aqressiv olan təşkilati mədəniyyət təşkilat daxilində nəzarətin əhəmiyyətini aşağı hesab etmə ehtimalı daha çoxdur. Nəticədə, tapşırıq risklərinin yüksək qiymətləndirilmə ehtimalı daha azdır."}, {"tr": "Kuruluş içinde kontrolün önemi – Düşük. Görev risklerinin yüksek değerlendirilmesi - Daha az olası.", "en": "Importance of control within the organization – Low. Engagement risks are assessed high - Less likely.", "cmt_tr": "Riskten kaçınan kurumsal kültürde görev risklerinin yüksek değerlendirilme olasılığı daha az olsa da kuruluş içinde kontrolün önemi yüksek olma olasılığı daha fazladır.", "cmt_en": "Although engagement risks are less likely to be assessed high when organizational culture is risk averse, the importance of control within the organization is more likely to be high.", "az": "Təşkilat daxilində nəzarətin əhəmiyyəti – Aşağı. Tapşırıq risklərinin yüksək qiymətləndirilməsi - Daha az ehtimal.", "cmt_az": "Riskə qarşı ehtiyatlı olan təşkilati mədəniyyətdə tapşırıq risklərinin yüksək qiymətləndirilmə ehtimalı daha az olsa da, təşkilat daxilində nəzarətin əhəmiyyəti yüksək olma ehtimalı daha çoxdur."}], "answer": 1, "q_az": "Riskə qarşı ehtiyatlı olan təşkilati mədəniyyətin nəzarət və tapşırıq risklərinin əhəmiyyətinin qiymətləndirilməsinə hansı təsiri var?"}, {"q_tr": "Yönetişim uygulamalarının amacı nedir?", "q_en": "A goal of governance practices is", "options": [{"tr": "Üst yöneticilerin ve yönetim kurulu üyelerinin ücretlerinin artırılması.", "en": "Increasing compensation of senior managers and directors.", "cmt_tr": "Üst yöneticilerin ve yönetim kurulu üyelerinin ücretlerinin artırılması diğer paydaşların çıkarlarıyla çelişebilir.", "cmt_en": "Increasing compensation of senior managers and directors may conflict with the interests of other stakeholders.", "az": "Üst rəhbərlərin və direktorların kompensasiyasının artırılması.", "cmt_az": "Üst rəhbərlərin və direktorların kompensasiyasının artırılması digər maraqlı tərəflərin maraqları ilə ziddiyyət təşkil edə bilər."}, {"tr": "Genel kabul görmüş iş normlarının karşılanması.", "en": "Satisfying generally accepted business norms.", "cmt_tr": "Yönetişim uygulamaları kuruluşun (1) yasal ve düzenleyici kurallara uyumunu; (2) genel kabul görmüş iş normları, etik ilkeleri ve toplumsal beklentileri karşılamasını; (3) topluma genel fayda sağlamasını; ve (4) paydaşlarına eksiksiz ve doğru raporlama yapmasını sağlar.", "cmt_en": "Governance practices ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short-term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances. Study Unit 6: Governance | Subunit 2: Organizational Culture", "az": "Ümumi qəbul edilmiş biznes normalarının qarşılanması.", "cmt_az": "Yönetişim təcrübələri təşkilatın (1) cəmiyyətin hüquqi və tənzimləyici qaydalarına uyğunluğunu; (2) ümumi qəbul edilmiş biznes normaları, etik prinsipləri və sosial gözləntiləri qarşılamasını; (3) cəmiyyətə ümumi fayda təmin etməsini; və (4) maraqlı tərəflərinə tam və doğru hesabat verməsini təmin edir."}, {"tr": "Kurumsal çıkarların zedelenmemesi durumunda paydaşlara eksiksiz raporlama yapmak.", "en": "Reporting fully to stakeholders unless the result is impairment of organizational interests.", "cmt_tr": "Hesap verebilirlik paydaşlara eksiksiz, doğru raporlama yapılmasını gerektirir.", "cmt_en": "Accountability requires full, truthful reporting to stakeholders.", "az": "Təşkilati maraqların zədələnməsinə səbəb olmadıqda maraqlı tərəflərə tam hesabat vermək.", "cmt_az": "Hesabatlılıq maraqlı tərəflərə tam, doğru hesabat verilməsini tələb edir."}, {"tr": "Riski yönetmek için etkin bir kontrol ortamı oluşturmak.", "en": "Creating an effective control environment to manage risk.", "cmt_tr": "Etkin kontrol ortamı yönetişimin hedeflerine ulaşmak için kullanılan yapıdır.", "cmt_en": "An effective control environment is a structure used to achieve the goals of governance.", "az": "Riski idarə etmək üçün effektiv nəzarət mühiti yaratmaq.", "cmt_az": "Effektiv nəzarət mühiti yönetişimin məqsədlərinə çatmaq üçün istifadə olunan strukturdur."}], "answer": 1, "q_az": "Yönetişim təcrübələrinin məqsədi nədir?"}, {"q_tr": "Kuruluşun davranış kuralları neyi kapsamalıdır?", "q_en": "An organization’s code of conduct should", "options": [{"tr": "İzleme faaliyetlerini oluşturmak.", "en": "Establish monitoring activities.", "cmt_tr": "Davranış kuralları izleme faaliyetleri oluşturmaz. (B) cevabı doğrudur. Davranış kuralları ve vizyon bildirileri kuruluşun değerlerini ve hedeflerini; beklenen davranışı; ve yasal, etik ve toplumsal sorumluluklarla tutarlı kültürün sürdürülmesi stratejilerini belirtmek için yayımlanır.", "cmt_en": "A code of conduct does not establish monitoring activities. Answer (B) is correct. Codes of conduct and vision statements are issued to state the organization’s values and objectives; the behavior expected; and the strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities.", "az": "Monitorinq fəaliyyətlərini qurmaq.", "cmt_az": "Davranış kodeksi monitorinq fəaliyyətlərini qurmur. (B) cavabı doğrudur. Davranış kodeksləri və vizyon bəyanatları təşkilatın dəyərlərini və hədəflərini; gözlənilən davranışı; və hüquqi, etik və sosial məsuliyyətlərlə uyğun mədəniyyətin qorunması strategiyalarını ifadə etmək üçün nəşr olunur."}, {"tr": "Beklenen davranışı ve toplumsal sorumlulukları ele almak.", "en": "Address expected behavior and societal responsibilities.", "cmt_tr": "", "cmt_en": "", "az": "Gözlənilən davranışı və sosial məsuliyyətləri əhatə etmək.", "cmt_az": ""}, {"tr": "Temel riskleri belirlemek.", "en": "Specify key risks.", "cmt_tr": "Yönetim kuruluş içindeki temel riskleri belirler. İç denetçi risk yönetimini değerlendirmek için bu kararları gözden geçirir.", "cmt_en": "Management identifies the key risks within the organization. The internal auditor reviews these decisions to evaluate risk management within the organization.", "az": "Əsas riskləri müəyyən etmək.", "cmt_az": "Rəhbərlik təşkilat daxilində əsas riskləri müəyyən edir. Daxili auditor risk idarəetməsini qiymətləndirmək üçün bu qərarları nəzərdən keçirir."}, {"tr": "Performansı ölçmek.", "en": "Measure performance.", "cmt_tr": "Davranış kuralları (1) değerleri ve hedefleri, (2) beklenen davranışı ve (3) etik kültürün sürdürülmesi stratejilerini belirtir.", "cmt_en": "A code of conduct states (1) values and objectives, (2) expected behavior, and (3) strategies for maintaining an ethical culture.", "az": "Performansı ölçmək.", "cmt_az": "Davranış kodeksi (1) dəyərləri və hədəfləri, (2) gözlənilən davranışı və (3) etik mədəniyyətin qorunması strategiyalarını ifadə edir."}], "answer": 1, "q_az": "Təşkilatın davranış kodeksi nəyi əhatə etməlidir?"}, {"q_tr": "Kuruluşun etik kültüründe iç denetim fonksiyonunun rolü nedir?", "q_en": "The role of the internal audit function in the ethical culture of an organization is to", "options": [{"tr": "Resmi davranış kurallarının etkinliğini değerlendirmek.", "en": "", "cmt_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını ve yasal ve etik uyumun sağlanmasındaki etkinliğini periyodik olarak değerlendirir. İç denetçiler bu nedenle resmi davranış kurallarının ve ilgili beyan ve politikaların etkinliğini değerlendirir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of, among other things, a formal code of conduct and related statements and policies.", "az": "Formal davranış kodeksinin effektivliyini qiymətləndirmək.", "cmt_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir. Daxili auditorlar buna görə də formal davranış kodeksinin və əlaqəli bəyanat və siyasətlərin effektivliyini qiymətləndirir."}, {"tr": "Bağımsızlık kaybı olasılığı nedeniyle etik kültürün aktif desteklenmesinden kaçınmak.", "en": "", "cmt_tr": "İç denetçiler aktif etik savunucuları olmalıdır. Ancak örneğin baş etik sorumlusu rolünü üstlenmek bazı durumlarda bireysel objektifliği ve iç denetim fonksiyonunun bağımsızlığını zedeleyebilir.", "cmt_en": "Internal auditors must be active ethics advocates. However, assuming the role of, for example, chief ethics officer may, in some circumstances, impair individual objectivity and the internal audit function’s independence.", "az": "Müstəqilliyin itirilməsi ehtimalına görə etik mədəniyyətin aktiv dəstəklənməsindən qaçınmaq.", "cmt_az": "Daxili auditorlar aktiv etika müdafiəçiləri olmalıdırlar. Lakin baş etika zabiti kimi rolu üzərinə götürmək bəzi hallarda fərdi obyektivliyi və iç denetim funksiyasının müstəqilliyini zədələyə bilər."}, {"tr": "Etik kültürün değerlendiricisi olarak görev yapmak.", "en": "", "cmt_tr": "İç denetçinin temel rolü etik kültürün değerlendiricisidir. Ancak iç denetçi baş etik sorumlusu veya etik konseyi üyesi olabilir; birinci rol bazı durumlarda bireysel objektifliği ve iç denetim fonksiyonunun bağımsızlığını zedeleyebilir.", "cmt_en": "The internal auditor’s basic role is to be the assessor of the ethical culture. However, an internal auditor may become chief ethics officer or a member of an ethics council, although the first role Study Unit 6: Governance | Subunit 2: Organizational Culture may, in some circumstances, impair individual objectivity and the internal audit function’s independence.", "az": "Etik mədəniyyətin qiymətləndiricisi kimi fəaliyyət göstərmək.", "cmt_az": "Daxili auditorun əsas rolu etik mədəniyyətin qiymətləndiricisindir. Lakin daxili auditor baş etika zabiti və ya etika şurasının üzvü ola bilər, baxmayaraq ki, birinci rol bəzi hallarda fərdi obyektivliyi və iç denetim funksiyasının müstəqilliyini zədələyə bilər."}, {"tr": "Yönetişim sürecinin etkinliğinden sorumluluk taşımak.", "en": "", "cmt_tr": "Kuruluşun yönetim kurulu ve üst yönetimi yönetişim sürecinin etkinliğinden sorumludur.", "cmt_en": "The organization’s board and its senior management are responsible for the effectiveness of the governance process.", "az": "Yönetişim prosesinin effektivliyinə görə məsuliyyət daşımaq.", "cmt_az": "Təşkilatın idarə heyəti və üst rəhbərliyi yönetişim prosesinin effektivliyinə məsuldur."}], "answer": 0, "q_az": "Təşkilatın etik mədəniyyətində iç denetim funksiyasının rolu nədir?"}, {"q_tr": "İç denetçilerin kuruluşun etik kültüründeki rolü hakkında aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following is a false statement about the role of internal auditors in an organization’s ethical culture?", "options": [{"tr": "Roller baş etik sorumlusunu içerebilir.", "en": "Roles may include chief ethics officer.", "cmt_tr": "İç denetçilerin rolleri baş etik sorumlusunu içerebilir.", "cmt_en": "Internal auditors’ roles may include chief ethics officer.", "az": "Rollara baş etika zabiti daxil ola bilər.", "cmt_az": "Daxili auditorların rollarına baş etika zabiti daxil ola bilər."}, {"tr": "Baş etik sorumlusu rolü bazen iç denetim fonksiyonunun bağımsızlığıyla çelişir.", "en": "The role of chief ethics officer sometimes conflicts with the independence of the internal audit function.", "cmt_tr": "Bazı durumlarda baş etik sorumlusu rolü iç denetim fonksiyonunun bağımsızlık niteliğiyle çelişebilir.", "cmt_en": "In some circumstances, the role of chief ethics officer may conflict with the independence attribute of the internal audit function.", "az": "Baş etika zabiti rolu bəzən iç denetim funksiyasının müstəqilliyi ilə ziddiyyət təşkil edir.", "cmt_az": "Bəzi hallarda baş etika zabiti rolu iç denetim funksiyasının müstəqillik atributu ilə ziddiyyət təşkil edə bilər."}, {"tr": "Daha olgun bir sistemde iç denetim fonksiyonu uyumu vurgular.", "en": "In a more mature system, the internal audit function emphasizes compliance.", "cmt_tr": "İç denetim fonksiyonunun rolü yönetişim sisteminin olgunluğuna bağlıdır. Daha az olgun bir sistemde iç denetim fonksiyonu politikalara, prosedürlere, yasalara vb. uyumu vurgular. Ayrıca kuruluşun temel risklerini ele alır.", "cmt_en": "The role of the internal audit function depends on the maturity of the governance system. In a less mature system, the internal audit function emphasizes compliance with policies, procedures, laws, etc. It also addresses the basic risks to the organization.", "az": "Daha yetkin sistemdə iç denetim funksiyası uyğunluğu vurğulayır.", "cmt_az": "İç denetim funksiyasının rolu yönetişim sisteminin yetkinliyindən asılıdır. Daha az yetkin sistemdə iç denetim funksiyası siyasətlərə, prosedurlara, qanunlara və s. uyğunluğu vurğulayır. Həmçinin təşkilatın əsas risklərini əhatə edir."}, {"tr": "Daha olgun bir yönetişim sisteminde iç denetim fonksiyonunun vurgusu yapı ve uygulamaları optimize etmektir.", "en": "In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices.", "cmt_tr": "Daha olgun bir yönetişim sisteminde iç denetim fonksiyonunun vurgusu yapı ve uygulamaları optimize etmektir.", "cmt_en": "In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices.", "az": "Daha yetkin yönetişim sistemində iç denetim funksiyasının vurğusu struktur və təcrübələri optimallaşdırmaqdır.", "cmt_az": "Daha yetkin yönetişim sistemində iç denetim funksiyasının vurğusu struktur və təcrübələri optimallaşdırmaqdır."}], "answer": 2, "q_az": "Daxili auditorların təşkilatın etik mədəniyyətindəki rolu haqqında aşağıdakı ifadələrdən hansı yalandır?"}, {"q_tr": "Kuruluşun davranış kuralları ve vizyon bildirisinde aşağıdakilerden hangisi belirtilmelidir? 1. Kuruluşun değerleri ve hedefleri 2. Beklenen davranış 3. Yasal, etik ve toplumsal sorumluluklarla tutarsız kültürün sürdürülmesi stratejileri", "q_en": "Which of the following should be stated in an organization’s code of conduct and vision statement? 1. The organization’s values and objectives 2. The behavior expected 3. The strategies for maintaining a culture inconsistent with legal, ethical, and societal responsibilities", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "Davranış kuralları ve vizyon bildirileri • Kuruluşun değerlerini ve hedeflerini; • Beklenen davranışı; ve • Yasal, etik ve toplumsal sorumluluklarla tutarlı kültürün sürdürülmesi stratejilerini belirtmek için yayımlanır.", "cmt_en": "Codes of conduct and vision statements are issued to state • The organization’s values and objectives; • The behavior expected; and • The strategies for maintaining a culture consistent with legal, ethical, and societal responsibilities.", "az": "Yalnız 1 və 2.", "cmt_az": "Davranış kodeksləri və vizyon bəyanatları • Təşkilatın dəyərlərini və hədəflərini; • Gözlənilən davranışı; və • Hüquqi, etik və sosial məsuliyyətlərlə uyğun mədəniyyətin qorunması strategiyalarını ifadə etmək üçün nəşr olunur."}, {"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "Davranış kuralları ve vizyon bildirileri yasal, etik ve toplumsal sorumluluklarla tutarsız değil, tutarlı kültürün sürdürülmesi stratejilerini belirtmelidir. Ayrıca beklenen davranış belirtilmelidir.", "cmt_en": "The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities. Additionally, the behavior expected should be stated.", "az": "Yalnız 1 və 3.", "cmt_az": "Davranış kodeksi və vizyon bəyanatları hüquqi, etik və sosial məsuliyyətlərlə uyğunsuz deyil, uyğun mədəniyyətin qorunması strategiyalarını ifadə etməlidir. Həmçinin gözlənilən davranış ifadə olunmalıdır."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "Davranış kuralları ve vizyon bildirileri yasal, etik ve toplumsal sorumluluklarla tutarsız değil, tutarlı kültürün sürdürülmesi stratejilerini belirtmelidir. Ayrıca kuruluşun değerleri ve hedefleri belirtilmelidir.", "cmt_en": "The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities. Additionally, the organization’s values and objectives should be stated.", "az": "Yalnız 2 və 3.", "cmt_az": "Davranış kodeksi və vizyon bəyanatları hüquqi, etik və sosial məsuliyyətlərlə uyğunsuz deyil, uyğun mədəniyyətin qorunması strategiyalarını ifadə etməlidir. Həmçinin təşkilatın dəyərləri və hədəfləri ifadə olunmalıdır."}, {"tr": "1, 2 ve 3.", "en": "1, 2, and 3. Study Unit 6: Governance | Subunit 2: Organizational Culture", "cmt_tr": "Davranış kuralları ve vizyon bildirileri yasal, etik ve toplumsal sorumluluklarla tutarsız değil, tutarlı kültürün sürdürülmesi stratejilerini belirtmelidir.", "cmt_en": "The code of conduct and vision statements should state the strategies for maintaining a culture consistent, not inconsistent, with legal, ethical, and societal responsibilities.", "az": "1, 2 və 3.", "cmt_az": "Davranış kodeksi və vizyon bəyanatları hüquqi, etik və sosial məsuliyyətlərlə uyğunsuz deyil, uyğun mədəniyyətin qorunması strategiyalarını ifadə etməlidir."}], "answer": 0, "q_az": "Təşkilatın davranış kodeksi və vizyon bəyanatında aşağıdakılardan hansı ifadə olunmalıdır? 1. Təşkilatın dəyərləri və hədəfləri 2. Gözlənilən davranış 3. Hüquqi, etik və sosial məsuliyyətlərlə uyğunsuz mədəniyyətin qorunması strategiyaları"}, {"q_tr": "Kuruluşun etik kültüründe iç denetim fonksiyonunun rolü nedir?", "q_en": "The role of the internal audit function in the ethical culture of an organization is to", "options": [{"tr": "Bağımsızlık kaybı olasılığı nedeniyle etik kültürün aktif desteklenmesinden kaçınmak.", "en": "Avoid active support of the ethical culture because of possible loss of independence.", "cmt_tr": "İç denetçiler aktif etik savunucuları olmalıdır. Ancak baş etik sorumlusu rolünü üstlenmek bazı durumlarda bireysel objektifliği ve iç denetim fonksiyonunun bağımsızlığını zedeleyebilir.", "cmt_en": "Internal auditors must be active ethics advocates. However, assuming the role of, for example, chief ethics officer, may, in some circumstances, impair individual objectivity and the internal audit function’s independence.", "az": "Müstəqilliyin itirilməsi ehtimalına görə etik mədəniyyətin aktiv dəstəklənməsindən qaçınmaq.", "cmt_az": "Daxili auditorlar aktiv etika müdafiəçiləri olmalıdırlar. Lakin baş etika zabiti kimi rolu üzərinə götürmək bəzi hallarda fərdi obyektivliyi və iç denetim funksiyasının müstəqilliyini zədələyə bilər."}, {"tr": "Kuruluşun resmi davranış kurallarının etkinliğini değerlendirmek.", "en": "Evaluate the effectiveness of the organization’s formal code of conduct.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını ve yasal ve etik uyumun sağlanmasındaki etkinliğini periyodik olarak değerlendirir. İç denetçiler bu nedenle resmi davranış kurallarının ve ilgili beyan ve politikaların etkinliğini değerlendirir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of, among other things, a formal code of conduct and related statements and policies.", "az": "Təşkilatın formal davranış kodeksinin effektivliyini qiymətləndirmək.", "cmt_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir. Daxili auditorlar buna görə də formal davranış kodeksinin və əlaqəli bəyanat və siyasətlərin effektivliyini qiymətləndirir."}, {"tr": "Yönetişim sürecinin etkinliğinden sorumluluk taşımak.", "en": "Assume accountability for the effectiveness of the governance process.", "cmt_tr": "Kuruluşun yönetim kurulu ve üst yönetimi yönetişim sürecinin etkinliğinden sorumludur.", "cmt_en": "The organization’s board and its senior management are responsible for the effectiveness of the governance process.", "az": "Yönetişim prosesinin effektivliyinə görə məsuliyyət daşımaq.", "cmt_az": "Təşkilatın idarə heyəti və üst rəhbərliyi yönetişim prosesinin effektivliyinə məsuldur."}, {"tr": "Baş etik sorumlusu olmak.", "en": "Become the chief ethics officer.", "cmt_tr": "İç denetçinin temel rolü etik kültürü değerlendirmektir. İç denetçi baş etik sorumlusu veya etik konseyi üyesi olabilir ancak birinci rol bazı durumlarda bireysel objektifliği ve iç denetim fonksiyonunun bağımsızlığını zedeleyebilir.", "cmt_en": "The internal auditor’s basic role is assess the ethical culture. An internal auditor may become chief ethics officer or a member of an ethics council, but the first role may, in some circumstances, impair individual objectivity and the internal audit function’s independence. Study Unit 6: Governance | Subunit 2: Organizational Culture", "az": "Baş etika zabiti olmaq.", "cmt_az": "Daxili auditorun əsas rolu etik mədəniyyəti qiymətləndirməkdir. Daxili auditor baş etika zabiti və ya etika şurasının üzvü ola bilər, lakin birinci rol bəzi hallarda fərdi obyektivliyi və iç denetim funksiyasının müstəqilliyini zədələyə bilər."}], "answer": 1, "q_az": "Təşkilatın etik mədəniyyətində iç denetim funksiyasının rolu nədir?"}, {"q_tr": "Bir şirketin sonuçları piyasanın beklentilerini karşıladı ancak kuruluştaki birçok kişi sonuçların aşırı iyimser olduğunu fark etti. Üstelik hiç kimse sonuçların değiştirilmesini önermedi. Resmi veya gayri resmi olarak sonuçlarla ilgili kim etik savunucusu olmalıydı? 1. Üst yönetim 2. İç denetçiler 3. Muhasebe departmanı çalışanları", "q_en": "A corporation’s results met the expectations of the market, but many people in the organization noticed that they were overly optimistic. Moreover, no one suggested that the results be changed. Who, whether officially or informally, should have been an ethics advocate regarding the results? 1. Senior management 2. Internal auditors 3. Employees in the accounting department", "options": [{"tr": "Yalnızca 1.", "en": "1 only.", "cmt_tr": "İç denetçiler ve muhasebe departmanı çalışanları da etik savunucuları olmalıydı.", "cmt_en": "The internal auditors and employees in the accounting department also should have been ethics advocates.", "az": "Yalnız 1.", "cmt_az": "Daxili auditorlar və mühasibat şöbəsinin işçiləri də etika müdafiəçiləri olmalı idi."}, {"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "Muhasebe departmanı çalışanları da sonuçların doğru olmayabileceğini önermeli idi.", "cmt_en": "The employees in the accounting department also should have suggested that the results might not be accurate", "az": "Yalnız 1 və 2.", "cmt_az": "Mühasibat şöbəsinin işçiləri də nəticələrin dəqiq olmaya biləcəyini təklif etməli idi."}, {"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "İç denetçiler de sonuçların doğru olmayabileceğini önermeli idi.", "cmt_en": "The internal auditors also should have suggested that the results might not be accurate.", "az": "Yalnız 1 və 3.", "cmt_az": "Daxili auditorlar da nəticələrin dəqiq olmaya biləcəyini təklif etməli idi."}, {"tr": "1, 2 ve 3.", "en": "1, 2, and 3.", "cmt_tr": "Çoğu kuruluşta karar alma süreci karmaşık ve dağınık olduğundan her birey resmi veya gayri resmi olarak etik savunucusu olmalıdır. Dolayısıyla üst yönetimin, iç denetçilerin ve muhasebe departmanı çalışanlarının hepsinin etik savunucusu olması ve sonuçların doğru olmayabileceğini önermeleri sorumluluklarıdır.", "cmt_en": "Because decision making in most organizations is complex and dispersed, each individual should be an ethics advocate, whether officially or informally. Thus, it is the responsibility of senior management, the internal auditors, and the employees in the accounting department to be ethics advocates and suggest that the results might not be accurate.", "az": "1, 2 və 3.", "cmt_az": "Əksər təşkilatlarda qərar qəbulu mürəkkəb və paylanmış olduğundan, hər bir fərd rəsmi və ya qeyri-rəsmi olaraq etika müdafiəçisi olmalıdır. Beləliklə, üst rəhbərliyin, daxili auditorların və mühasibat şöbəsinin işçilərinin hamısının etika müdafiəçisi olması və nəticələrin dəqiq olmaya biləcəyini təklif etmələri məsuliyyətidir."}], "answer": 3, "q_az": "Bir korporasiyanın nəticələri bazarın gözləntilərinə cavab verdi, lakin təşkilatda çox adam nəticələrin həddindən artıq nikbin olduğunu müşahidə etdi. Bundan əlavə, heç kim nəticələrin dəyişdirilməsini təklif etmədi. Rəsmi və ya qeyri-rəsmi olaraq nəticələrlə bağlı kim etika müdafiəçisi olmalı idi? 1. Üst rəhbərlik 2. Daxili auditorlar 3. Mühasibat şöbəsinin işçiləri"}, {"q_tr": "Kurumsal kültür hakkında aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following statements about organizational culture is false?", "options": [{"tr": "Kurumsal kültür kuruluşun değerlerini, hedeflerini ve stratejilerini belirler.", "en": "The organizational culture sets the values, objectives, and strategies of the organization.", "cmt_tr": "Kurumsal kültür kuruluşun değerlerini, hedeflerini ve stratejilerini belirler.", "cmt_en": "The organizational culture does set the values, objectives, and strategies of the organization.", "az": "Təşkilati mədəniyyət təşkilatın dəyərlərini, hədəflərini və strategiyalarını müəyyən edir.", "cmt_az": "Təşkilati mədəniyyət təşkilatın dəyərlərini, hədəflərini və strategiyalarını müəyyən edir."}, {"tr": "Yönetişim etkinlik için büyük ölçüde kurumsal kültüre bağlı değildir.", "en": "Governance does not largely depend on organizational culture for effectiveness.", "cmt_tr": "Yönetişim uygulamaları kuruluşun benzersiz kültürünü yansıtır ve etkinlik için büyük ölçüde ona bağlıdır.", "cmt_en": "Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness.", "az": "Yönetişim effektivlik üçün əsasən təşkilati mədəniyyətə bağlı deyil.", "cmt_az": "Yönetişim təcrübələri təşkilatın unikal mədəniyyətini əks etdirir və effektivlik üçün əsasən ona bağlıdır."}, {"tr": "Kurumsal kültür rolleri ve davranışları tanımlar.", "en": "Organizational culture defines roles and behaviors.", "cmt_tr": "Kurumsal kültür rolleri ve davranışları tanımlar.", "cmt_en": "The organizational culture does define roles and behaviors.", "az": "Təşkilati mədəniyyət rolları və davranışları təyin edir.", "cmt_az": "Təşkilati mədəniyyət rolları və davranışları təyin edir."}, {"tr": "Kültür kurumsal sosyal sorumlulukların yerine getirilmesini etkiler.", "en": "The culture influences compliance with corporate social responsibilities.", "cmt_tr": "Kurumsal kültür kurumsal sosyal sorumlulukların yerine getirilmesinde yansıtılır.", "cmt_en": "Organizational culture is reflected in complying with corporate social responsibilities. Study Unit 6: Governance | Subunit 2: Organizational Culture", "az": "Mədəniyyət korporativ sosial məsuliyyətlərə uyğunluğa təsir göstərir.", "cmt_az": "Təşkilati mədəniyyət korporativ sosial məsuliyyətlərə uyğunluqda əks olunur."}], "answer": 1, "q_az": "Təşkilati mədəniyyət haqqında aşağıdakı ifadələrdən hansı yalandır?"}, {"q_tr": "Kuruluşun davranış kuralları neyi ele almalıdır?", "q_en": "An organization’s code of conduct should address", "options": [{"tr": "Kuruluşun değerlerini, hedeflerini ve yasal sorumlulukların yerine getirilmesini.", "en": "The organization’s values, objectives, and adherence to legal responsibilities.", "cmt_tr": "Davranış kurallarını değerlendirirken iç denetçi (1) kapsamlılığı ve (2) uyumu dikkate almalıdır. Kurallar çalışanların karşılaşması beklenen etik sorunları ele almalı ve uygun rehberlik sağlamalıdır.", "cmt_en": "When evaluating a code of conduct, an internal auditor should consider (1) comprehensiveness and (2) compliance. The code should address the ethical issues that employees are expected to encounter and provide suitable guidance.", "az": "Təşkilatın dəyərlərini, hədəflərini və hüquqi məsuliyyətlərə uyğunluğunu.", "cmt_az": "Davranış kodeksini qiymətləndirərkən daxili auditor (1) əhatəliliyi və (2) uyğunluğu nəzərə almalıdır. Kodeks işçilərin qarşılaşacağı gözlənilən etik məsələləri əhatə etməli və müvafiq təlimat verməlidir."}, {"tr": "İç kontrolleri ve uygun raporlama yönergelerini.", "en": "Internal controls and proper reporting guidelines.", "cmt_tr": "Davranış kuralları iç kontrol ilkeleri ve standartları belirlemez.", "cmt_en": "A code of conduct does not establish internal control principles and standards.", "az": "Daxili nəzarətləri və müvafiq hesabat təlimatlarını.", "cmt_az": "Davranış kodeksi daxili nəzarət prinsipləri və standartları müəyyən etmir."}, {"tr": "Kuruluşun karmaşıklığını ve risk alma yaklaşımını.", "en": "The complexity of the organization and approach to risk-taking.", "cmt_tr": "Kuruluştaki yönetişim organları genel risk alma yaklaşımını belirler.", "cmt_en": "The governance bodies in an organization determine the overall approach to risk-taking.", "az": "Təşkilatın mürəkkəbliyini və riskə yanaşma tərzini.", "cmt_az": "Təşkilatda yönetişim orqanları ümumi riskə yanaşma tərzini müəyyən edir."}, {"tr": "Kuruluş içindeki önemli risk alanlarını.", "en": "Areas of significant risk within the organization", "cmt_tr": "Yönetim kuruluş içindeki temel risk alanlarını belirler. İç denetçi risk yönetimini değerlendirmek için bu kararları gözden geçirir.", "cmt_en": "Management identifies the key risk areas within the organization. The internal auditor reviews these decisions to evaluate risk management within the organization.", "az": "Təşkilat daxilində əhəmiyyətli risk sahələrini.", "cmt_az": "Rəhbərlik təşkilat daxilində əsas risk sahələrini müəyyən edir. Daxili auditor risk idarəetməsini qiymətləndirmək üçün bu qərarları nəzərdən keçirir."}], "answer": 0, "q_az": "Təşkilatın davranış kodeksi nəyi əhatə etməlidir?"}, {"q_tr": "Kuruluşun kültürü nedir?", "q_en": "An organization’s culture is", "options": [{"tr": "Kuruluş içinde beklenen davranış.", "en": "The behavior expected within the organization.", "cmt_tr": "Davranış kuralları ve vizyon bildirileri kuruluş içinde beklenen davranışı belirtmek için yayımlanır.", "cmt_en": "Codes of conduct and vision statements are issued to state the behavior expected within the organization.", "az": "Təşkilat daxilində gözlənilən davranış.", "cmt_az": "Davranış kodeksləri və vizyon bəyanatları təşkilat daxilində gözlənilən davranışı ifadə etmək üçün nəşr olunur."}, {"tr": "Yönetim kurulu ve yönetimin kuruluş içinde kontrolün önemine ilişkin tutum ve eylemleri.", "en": "The attitude and actions of the board and management regarding the importance of control within the organization.", "cmt_tr": "Kontrol ortamı yönetim kurulu ve yönetimin kuruluş içinde kontrolün önemine ilişkin tutum ve eylemlerini yansıtır.", "cmt_en": "The control environment reflects the attitude and actions of the board and management regarding the importance of control within the organization.", "az": "İdarə heyəti və rəhbərliyin təşkilat daxilində nəzarətin əhəmiyyətinə dair münasibəti və hərəkətləri.", "cmt_az": "Nəzarət mühiti idarə heyəti və rəhbərliyin təşkilat daxilində nəzarətin əhəmiyyətinə dair münasibəti və hərəkətlərini əks etdirir."}, {"tr": "Yönetim kurulu tarafından uygulanan süreçlerin ve yapıların birleşimi.", "en": "The combination of processes and structures within the organization.", "cmt_tr": "Yönetişim, yönetim kurulu tarafından kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçlerin ve yapıların birleşimidir.", "cmt_en": "Governance is the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.", "az": "İdarə heyəti tərəfindən tətbiq olunan proseslərin və strukturların birləşməsi.", "cmt_az": "Yönetişim idarə heyəti tərəfindən təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırmaq, istiqamətləndirmək, idarə etmək və nəzarət etmək üçün tətbiq olunan proseslərin və strukturların birləşməsidir."}, {"tr": "Kuruluşun misyon ve vizyonunun yansıması olup risk hakkında tutum, davranış ve anlayışlardan oluşur.", "en": "A reflection of the organization’s mission and vision and consists of the attitudes, behaviors, and understanding about risk.", "cmt_tr": "Kuruluşun kültürü, yönetim ve personelin kararlarını etkileyen ve kuruluşun misyonunu, vizyonunu ve temel değerlerini yansıtan olumlu ve olumsuz risk hakkında tutumlar, davranışlar ve anlayışlardan oluşur.", "cmt_en": "An organization’s culture consists of the attitudes, behaviors, and understanding about risk, both positive and negative, that influence the decisions of management and personnel and reflect the mission, vision, and core values of the organization. Study Unit 6: Governance | Subunit 2: Organizational Culture", "az": "Təşkilatın missiyası və vizyonunun əks olunması və risk haqqında münasibət, davranış və anlayışlardan ibarətdir.", "cmt_az": "Təşkilatın mədəniyyəti rəhbərliyin və heyətin qərarlarına təsir edən və təşkilatın missiyasını, vizyonunu və əsas dəyərlərini əks etdirən müsbət və mənfi olmaqla risk haqqında münasibətlər, davranışlar və anlayışlardan ibarətdir."}], "answer": 3, "q_az": "Təşkilatın mədəniyyəti nədir?"}, {"q_tr": "Kurumsal kültür aşağıdakilerden hangisinde yansıtılır? I. Performansın ölçülmesi II. Hesap verebilirliğin belirlenmesi III. Kurumsal sosyal sorumlulukların yerine getirilmesi", "q_en": "Organizational culture is reflected in which of the following? I. Measuring performance II. Specifying accountability III. Complying with corporate social responsibilities", "options": [{"tr": "Yalnızca I.", "en": "I only.", "cmt_tr": "Kurumsal kültür ayrıca hesap verebilirliğin belirlenmesi ve kurumsal sosyal sorumlulukların yerine getirilmesinde yansıtılır.", "cmt_en": "Organizational culture also is reflected in specifying accountability and complying with corporate social responsibilities.", "az": "Yalnız I.", "cmt_az": "Təşkilati mədəniyyət həmçinin hesabatlılığın müəyyən edilməsi və korporativ sosial məsuliyyətlərə uyğunluqda əks olunur."}, {"tr": "Yalnızca I ve II.", "en": "I and II only.", "cmt_tr": "Kurumsal kültür ayrıca kurumsal sosyal sorumlulukların yerine getirilmesinde yansıtılır.", "cmt_en": "Organizational culture also is reflected in complying with corporate social responsibilities.", "az": "Yalnız I və II.", "cmt_az": "Təşkilati mədəniyyət həmçinin korporativ sosial məsuliyyətlərə uyğunluqda əks olunur."}, {"tr": "Yalnızca II ve III.", "en": "II and III only.", "cmt_tr": "Kurumsal kültür ayrıca performansın ölçülmesinde yansıtılır.", "cmt_en": "Organizational culture also is reflected in measuring performance.", "az": "Yalnız II və III.", "cmt_az": "Təşkilati mədəniyyət həmçinin performansın ölçülməsində əks olunur."}, {"tr": "I, II ve III.", "en": "I, II, and III.", "cmt_tr": "Kurumsal kültür performansın ölçülmesi, hesap verebilirliğin belirlenmesi ve kurumsal sosyal sorumlulukların yerine getirilmesinde yansıtılır.", "cmt_en": "Organizational culture is reflected in measuring performance, specifying accountability and complying with corporate social responsibilities.", "az": "I, II və III.", "cmt_az": "Təşkilati mədəniyyət performansın ölçülməsi, hesabatlılığın müəyyən edilməsi və korporativ sosial məsuliyyətlərə uyğunluqda əks olunur."}], "answer": 3, "q_az": "Təşkilati mədəniyyət aşağıdakılardan hansında əks olunur? I. Performansın ölçülməsi II. Hesabatlılığın müəyyən edilməsi III. Korporativ sosial məsuliyyətlərə uyğunluq"}, {"q_tr": "İç denetim fonksiyonunun baş denetim yöneticisi (BDY) kuruluşun baş etik sorumlusu görevini yürütmektedir. Bu işlevin yerine getirilmesinin olumsuz yönü nedir?", "q_en": "The chief audit executive (CAE) of the internal audit function serves as the organization’s chief ethics officer. A drawback of performing this function is that", "options": [{"tr": "İç denetim fonksiyonu etikle ilgili faaliyetleri değerlendirmelidir.", "en": "The internal audit function must evaluate ethics-related activities.", "cmt_tr": "Güvence görevinde, iç denetim fonksiyonu BDY baş etik sorumlusu olarak görev yapıp yapmadığından bağımsız olarak kuruluşun etikle ilgili hedeflerinin, programlarının ve faaliyetlerinin tasarımını, uygulamasını ve etkinliğini değerlendirmelidir.", "cmt_en": "In an assurance engagement, the internal audit function must evaluate the design, implementation, and effectiveness of the organization’s ethics-related objectives, programs, and activities whether or not the CAE serves as chief ethics officer.", "az": "İç denetim funksiyası etika ilə bağlı fəaliyyətləri qiymətləndirməlidir.", "cmt_az": "Güvencə tapşırığında, iç denetim funksiyası BAİ baş etika zabiti kimi fəaliyyət göstərib-göstərməməsindən asılı olmayaraq, təşkilatın etika ilə bağlı hədəflərinin, proqramlarının və fəaliyyətlərinin dizaynını, tətbiqini və effektivliyini qiymətləndirməlidir."}, {"tr": "BDY etikle ilgili programları uygulamalıdır.", "en": "The CAE must implement ethics-related programs.", "cmt_tr": "İç denetim fonksiyonu etikle ilgili programların uygulamasını değerlendirmelidir.", "cmt_en": "The internal audit function must evaluate the implementation of ethics-related programs.", "az": "BAİ etika ilə bağlı proqramları tətbiq etməlidir.", "cmt_az": "İç denetim funksiyası etika ilə bağlı proqramların tətbiqini qiymətləndirməlidir."}, {"tr": "Etik kültür yönetişimin etkinliği için belirleyicidir.", "en": "An ethical culture is crucial to the effectiveness of governance.", "cmt_tr": "Kuruluşun etik kültürünün önemi iç denetçilerin aktif rol oynaması için bir nedendir.", "cmt_en": "The importance of the organization’s ethical culture is a reason for internal auditors to have an active role.", "az": "Etik mədəniyyət yönetişimin effektivliyi üçün həlledicidir.", "cmt_az": "Təşkilatın etik mədəniyyətinin əhəmiyyəti daxili auditorların aktiv rol oynaması üçün bir səbəbdir."}, {"tr": "Bu, iç denetim fonksiyonunun bağımsızlığıyla çelişebilir.", "en": "It may conflict with the independence of the internal audit function.", "cmt_tr": "Bazı durumlarda baş etik sorumlusu rolü iç denetim fonksiyonunun bağımsızlık niteliğiyle çelişebilir. İç denetim fonksiyonunun kurumsal bağımsızlığı gereklidir çünkü iç güvence hizmetleri sağlar. Dış güvence dış denetçiler, danışmanlar, sektör grupları veya düzenleyiciler tarafından sağlanabilir.", "cmt_en": "In some circumstances, the role of chief ethics officer may conflict with the independence attribute of the internal audit function. The organizational independence of the internal audit function is necessary because it performs internal assurance services. External assurance may be provided by external auditors, consultants, industry groups, or regulators. Study Unit 6: Governance | Subunit 2: Organizational Culture", "az": "Bu, iç denetim funksiyasının müstəqilliyi ilə ziddiyyət təşkil edə bilər.", "cmt_az": "Bəzi hallarda baş etika zabiti rolu iç denetim funksiyasının müstəqillik atributu ilə ziddiyyət təşkil edə bilər. İç denetim funksiyasının təşkilati müstəqilliyi zəruridir, çünki o daxili güvencə xidmətləri göstərir. Xarici güvencə xarici auditorlar, məsləhətçilər, sənaye qrupları və ya tənzimləyicilər tərəfindən təmin oluna bilər."}], "answer": 3, "q_az": "İç denetim funksiyasının baş audit icraçısı (BAİ) təşkilatın baş etika zabiti vəzifəsini yerinə yetirir. Bu funksiyanın yerinə yetirilməsinin mənfi cəhəti nədir?"}, {"q_tr": "İç denetim fonksiyonu kuruluşun etik iklimini değerlendirir. Buna göre iç denetçiler en çok neyi değerlendirir?", "q_en": "The internal audit function assesses the organization’s ethical climate. Accordingly, internal auditors most likely evaluate", "options": [{"tr": "Çalışanların iddia edilen suistimallerden derhal haberdar edilip edilmediğini.", "en": "Whether employees have been promptly notified of alleged misconduct.", "cmt_tr": "İddia edilen suistimallerin bildirilmesi gizli olmalıdır.", "cmt_en": "Reporting of alleged misconduct should be confidential.", "az": "İşçilərin iddia edilən qanun pozuntularından dərhal xəbərdar edilib-edilmədiyini.", "cmt_az": "İddia edilən qanun pozuntularının bildirilməsi gizli olmalıdır."}, {"tr": "Dolandırıcılık ve yolsuzlukla ilgili prosedürleri.", "en": "Procedures covering fraud and corruption.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını ve yasal ve etik uyumun sağlanmasındaki etkinliğini periyodik olarak değerlendirir. İç denetçiler bu nedenle resmi davranış kurallarının ve ilgili beyan ve politikaların (dolandırıcılık ve yolsuzlukla ilgili prosedürler dahil) etkinliğini değerlendirir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption).", "az": "Saxtakarlıq və korrupsiya ilə bağlı prosedurları.", "cmt_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir. Daxili auditorlar buna görə də formal davranış kodeksinin və əlaqəli bəyanat və siyasətlərin (saxtakarlıq və korrupsiya ilə bağlı prosedurlar daxil olmaqla) effektivliyini qiymətləndirir."}, {"tr": "Üst yönetimin soruşturma hizmetleri sağlama sorumluluğunu üstlenmesini.", "en": "The assumption of responsibility by senior management for providing investigative services.", "cmt_tr": "İç denetçiler danışmanlık, soruşturma ve raporlama sorumluluklarının açık şekilde devredilmesinin etkinliğini değerlendirir.", "cmt_en": "Internal auditors evaluate the effectiveness of the clear delegation of responsibilities for providing counsel, investigation, and reporting.", "az": "Üst rəhbərliyin araşdırma xidmətləri göstərmək məsuliyyətini öz üzərinə götürməsini.", "cmt_az": "Daxili auditorlar məsləhət, araşdırma və hesabat vermə üçün məsuliyyətlərin aydın həvalə edilməsinin effektivliyini qiymətləndirir."}, {"tr": "Etik iklimin durumunu belirlemek için yöneticilerin düzenli anketlerini.", "en": "Regular surveys of managers to determine the state of the ethical climate.", "cmt_tr": "İç denetçiler etik iklimin durumunu belirlemek için çalışanların, tedarikçilerin ve müşterilerin düzenli anketlerinin etkinliğini değerlendirir. Bu süreç yalnızca yöneticilerle sınırlı değildir.", "cmt_en": "Internal auditors evaluate the effectiveness of regular surveys of employees, suppliers, and customers to determine the state of the ethical climate. This process is not limited to managers.", "az": "Etik mühitin vəziyyətini müəyyən etmək üçün rəhbərlərin müntəzəm sorğularını.", "cmt_az": "Daxili auditorlar etik mühitin vəziyyətini müəyyən etmək üçün işçilərin, təchizatçıların və müştərilərin müntəzəm sorğularının effektivliyini qiymətləndirir. Bu proses yalnız rəhbərlərlə məhdudlaşmır."}], "answer": 1, "q_az": "İç denetim funksiyası təşkilatın etik mühitini qiymətləndirir. Buna görə daxili auditorlar ən çox nəyi qiymətləndirir?"}], "SU3 - Roles of Internal Auditors": [{"q_tr": "Yönetişimin temel ilkesi nedir?", "q_en": "A basic principle of governance is", "options": [{"tr": "Bağımsız iç denetim fonksiyonu tarafından yönetişim sürecinin değerlendirilmesi.", "en": "Assessment of the governance process by an independent internal audit function.", "cmt_tr": "İç denetim fonksiyonu yönetişim sürecini değerlendirmeli ve iyileştirme için uygun önerilerde bulunmalıdır.", "cmt_en": "The internal audit function must assess and make appropriate recommendations for improving the governance process.", "az": "Müstəqil iç denetim funksiyası tərəfindən yönetişim prosesinin qiymətləndirilməsi.", "cmt_az": "İç denetim funksiyası yönetişim prosesini qiymətləndirməli və təkmilləşdirmək üçün müvafiq tövsiyələr verməlidir."}, {"tr": "Yönetim kurulu, üst yönetim ve iç denetim fonksiyonunun etkinlikten sorumlu tutulması.", "en": "Holding the board, senior management, and the internal audit function accountable for its effectiveness.", "cmt_tr": "İç denetim fonksiyonu yönetişim sürecinin değerlendiricisidir. Bu süreçten sorumlu değildir.", "cmt_en": "The internal audit function is an assessor of the governance process. It is not accountable for that process.", "az": "İdarə heyəti, üst rəhbərlik və iç denetim funksiyasının effektivliyə görə məsul tutulması.", "cmt_az": "İç denetim funksiyası yönetişim prosesinin qiymətləndiricisidir. O, bu prosesə görə məsul deyildir."}, {"tr": "Yönetişim süreci hakkında güvence sağlamak için yalnızca dış denetçilerin kullanılması.", "en": "Exclusive use of external auditors to provide assurance about the governance process.", "cmt_tr": "Dış taraflar ve iç denetçiler yönetişim süreci hakkında güvence sağlayabilir.", "cmt_en": "External parties and internal auditors may provide assurance about the governance process.", "az": "Yönetişim prosesi haqqında güvencə təmin etmək üçün yalnız xarici auditorlardan istifadə.", "cmt_az": "Xarici tərəflər və daxili auditorlar yönetişim prosesi haqqında güvencə təmin edə bilər."}, {"tr": "Yönetişim sürecinin kuruluşta etik kültürün teşvik edilmesinden ayrılması.", "en": "Separation of the governance process from promoting an ethical culture in the organization.", "cmt_tr": "İç denetim fonksiyonu kuruluşta uygun etik ve değerlerin teşvik edilmesinde yönetişim sürecini değerlendirmeli ve iyileştirme için uygun önerilerde bulunmalıdır.", "cmt_en": "The internal audit function must assess and make appropriate recommendations for improving the governance process in its promotion of appropriate ethics and values within the organization.", "az": "Yönetişim prosesinin təşkilatda etik mədəniyyətin təşviq edilməsindən ayrılması.", "cmt_az": "İç denetim funksiyası təşkilatda müvafiq etika və dəyərlərin təşviq edilməsində yönetişim prosesini qiymətləndirməli və təkmilləşdirmək üçün müvafiq tövsiyələr verməlidir."}], "answer": 0, "q_az": "Yönetişimin əsas prinsipi nədir?"}, {"q_tr": "Yönetişimin değerlendirilmesi için iç denetim fonksiyonunun planlamasında en çok ne dikkate alınmalıdır?", "q_en": "Which of the following most likely should be considered in the internal audit function’s planning for the assessment of governance?", "options": [{"tr": "Tüm önemli kararların yönetim kurulu tarafından onaylanıp onaylanmadığı.", "en": "Whether all material decisions have been authorized by the board.", "cmt_tr": "Yönetim günlük yönetişim işlevlerini yerine getirir. Üst yönetim risklerin nerede yönetileceğini, risk sahiplerinin kim olacağını ve risklerin nasıl yönetileceğini belirler. Yönetim kurulu gözetim için nihai sorumluluğu taşır.", "cmt_en": "Management performs day-to-day governance functions. For example, senior management determines (1) where risks are managed, (2) who will be risk owners, and (3) how risks will be managed. The board has the ultimate responsibility for oversight. Its duties also include decisions about capital structure, dividends, mergers and acquisitions, coordinating audits, etc.", "az": "Bütün əhəmiyyətli qərarların idarə heyəti tərəfindən icazə verilir-verilmədiyini.", "cmt_az": "Rəhbərlik gündəlik yönetişim funksiyalarını yerinə yetirir. Üst rəhbərlik risklərin harada idarə olunacağını, risk sahiblərinin kim olacağını və risklərin necə idarə olunacağını müəyyən edir. İdarə heyəti nəzarət üçün son məsuliyyət daşıyır."}, {"tr": "Diğer denetimlerde iç kontrolün değerlendirilmesine güvenmek.", "en": "Relying on the assessment of internal control in other audits.", "cmt_tr": "Baş denetim yöneticisi yönetişim değerlendirmesinin planlamasında şunları dikkate almalıdır: • Denetim kuruluşu olumsuz etkileyebilecek olayları önlemek veya tespit etmek için tasarlanan yönetişim süreçlerindeki kontrolleri ele almalıdır; • Yönetişim süreçlerindeki kontroller genellikle çok sayıda riskin yönetilmesinde önemlidir; ve • Diğer denetimler yönetişim süreçlerindeki kontrolleri değerlendiriyorsa denetçi sonuçlarına güvenmeyi düşünmelidir.", "cmt_en": "The chief audit executive should consider the following in planning assessments of governance: • An audit should address controls in governance processes that are designed to prevent or detect events that could have a negative effect on the organization; • Controls within governance processes often are significant in managing multiple risks; and, • If other audits assess controls in governance processes, the auditor should consider relying on their results. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "az": "Digər auditlərdə daxili nəzarətin qiymətləndirilməsinə güvənmək.", "cmt_az": "Baş audit icraçısı yönetişimin qiymətləndirilməsinin planlamasında aşağıdakıları nəzərə almalıdır: • Audit təşkilata mənfi təsir göstərə biləcək hadisələrin qarşısını almaq və ya aşkar etmək üçün hazırlanmış yönetişim proseslərindəki nəzarətləri əhatə etməlidir; • Yönetişim proseslərindəki nəzarətlər çox vaxt çoxsaylı risklərin idarə edilməsində əhəmiyyətlidir; və • Digər auditlər yönetişim proseslərindəki nəzarətləri qiymətləndirirsə, auditor onların nəticələrinə güvənməyi düşünməlidir."}, {"tr": "Kuruluşun iç denetim fonksiyonunun yönetişim tanımına uyumu.", "en": "The compliance of the organization with the internal audit function’s definition of governance.", "cmt_tr": "İç denetim fonksiyonu yönetim kurulu ve üst yönetimle yönetişimin tanımı üzerinde anlaşmalıdır. IIA yönetişimi tanımlamıştır. Ancak kuruluşun tanımı farklıysa BDY o tanımı kullanabilir.", "cmt_en": "The internal audit function should agree upon the definition of governance with the board and senior management. The IIA has defined governance. But if the organization’s definition differs, the CAE may use that definition.", "az": "Təşkilatın iç denetim funksiyasının yönetişim tərifinə uyğunluğu.", "cmt_az": "İç denetim funksiyası idarə heyəti və üst rəhbərliklə yönetişimin tərifi üzərində razılaşmalıdır. IIA yönetişimi təyin edib. Lakin təşkilatın tərifi fərqlidirsə, BAİ həmin tərifdən istifadə edə bilər."}, {"tr": "Kontrol ve riskin ilişkisiz olduğu yollar.", "en": "The ways in which control and risk are unrelated.", "cmt_tr": "Kontroller riskleri ele alır. Dolayısıyla ilişkilidirler.", "cmt_en": "Controls address risks. Thus, they are related.", "az": "Nəzarət və riskin əlaqəsiz olduğu yollar.", "cmt_az": "Nəzarətlər riskləri əhatə edir. Beləliklə, onlar əlaqəlidir."}], "answer": 1, "q_az": "Yönetişimin qiymətləndirilməsi üçün iç denetim funksiyasının planlamasında ən çox nə nəzərə alınmalıdır?"}, {"q_tr": "Daha az yapılandırılmış bir yönetişim sürecinde iç denetim fonksiyonunun rolü en çok nedir?", "q_en": "Which of the following is most likely an internal audit function’s role in a less structured governance process?", "options": [{"tr": "Kontrolden farklı olan belirli yönetişim süreçlerinin etkinliğinin değerlendirilmesi.", "en": "Evaluating the effectiveness of specific governance processes that are distinct from control.", "cmt_tr": "Belirli yönetişim süreçlerinin etkinliğinin değerlendirilmesi daha yapılandırılmış iç denetim yönetişim olgunluk modeline özgüdür. Ayrıca yönetişim kontrol ve risk yönetiminden farklı süreçler olarak mevcut değildir.", "cmt_en": "Evaluating the effectiveness of specific governance processes is typical of a more structured internal auditing governance maturity model. Moreover, governance does not exist as processes distinct from control and risk management.", "az": "Nəzarətdən fərqli olan xüsusi yönetişim proseslərinin effektivliyinin qiymətləndirilməsi.", "cmt_az": "Xüsusi yönetişim proseslərinin effektivliyinin qiymətləndirilməsi daha strukturlaşdırılmış iç denetim yönetişim yetkinlik modelinə xasdır. Bundan əlavə, yönetişim nəzarət və risk idarəetməsindən fərqli proseslər kimi mövcud deyil."}, {"tr": "Prosedürlere, politikalara ve planlara uyum.", "en": "Compliance with procedures, policies, and plans.", "cmt_tr": "Daha az olgun yönetişim sistemi politikalara, prosedürlere, planlara, yasalara, düzenlemelere ve sözleşmelere uyum gereksinimlerini vurgular. Ayrıca kuruluşun temel risklerini ele alır. Dolayısıyla iç denetim fonksiyonu bu konularda tavsiye verir.", "cmt_en": "A less mature governance system emphasizes the requirements for compliance with policies, procedures, plans, laws, regulations, and contracts. It also addresses the basic risks to the organization. Thus, the internal audit function provides advice about such matters. As the governance process becomes more structured, the internal audit function’s emphasis will shift to optimizing the governance structure and practices.", "az": "Prosedurlar, siyasətlər və planlara uyğunluq.", "cmt_az": "Daha az yetkin yönetişim sistemi siyasətlərə, prosedurlara, planlara, qanunlara, tənzimləmələrə və müqavilələrə uyğunluq tələblərini vurğulayır. Həmçinin təşkilatın əsas risklərini əhatə edir. Beləliklə, iç denetim funksiyası bu məsələlər haqqında məsləhət verir."}, {"tr": "Yönetişim uygulamalarının optimize edilmesinde danışmanlık rolü oynamak.", "en": "Acting as a consultant in optimizing governance practices.", "cmt_tr": "Yönetişim uygulamalarının ve yapısının optimize edilmesinde danışmanlık rolü oynamak daha yapılandırılmış iç denetim yönetişim olgunluk modeline özgüdür.", "cmt_en": "Playing a consulting role in optimizing governance practices and structure is typical of a more structured internal auditing governance maturity model. The emphasis shifts to considering best practices and adapting them to the specific organization.", "az": "Yönetişim təcrübələrinin optimallaşdırılmasında məsləhətçi rolu oynamaq.", "cmt_az": "Yönetişim təcrübələrinin və strukturunun optimallaşdırılmasında məsləhətçi rolu oynamaq daha strukturlaşdırılmış iç denetim yönetişim yetkinlik modelinə xasdır."}, {"tr": "Temel riskleri ele alan süreçlerin tasarlanması.", "en": "Designing processes to address basic risks.", "cmt_tr": "İç denetçiler süreçler tasarlayarak objektifliklerini zedeler. Ancak belirli süreçlerin tasarımının ve etkinliğinin değerlendirilmesi tipik bir iç denetim rolüdür.", "cmt_en": "Internal auditors impair their objectivity by designing processes. However, evaluating the design and effectiveness of specific processes is a typical internal audit role.", "az": "Əsas riskləri əhatə edən proseslərin hazırlanması.", "cmt_az": "Daxili auditorlar proseslər hazırlayaraq obyektivliklərini zədələyirlər. Lakin xüsusi proseslərin dizaynının və effektivliyinin qiymətləndirilməsi tipik iç denetim roludur."}], "answer": 1, "q_az": "Daha az strukturlaşdırılmış yönetişim prosesində iç denetim funksiyasının rolu ən çox nədir?"}, {"q_tr": "Yönetişim süreçlerinin tasarımı ve uygulaması kimin sorumluluğundadır?", "q_en": "The design and implementation n of governance processes are the responsibility of", "options": [{"tr": "Yönetim Kurulu – Evet. Yönetim - Evet", "en": "The Board – Yes. Management - Yes", "cmt_tr": "Yönetişim IIA tarafından belirlenen üç temel süreçten biridir. Yönetişim süreçlerinin tasarımı ve uygulaması yönetim kurulu ve yönetimin sorumluluğundadır.", "cmt_en": "Governance is one of the three basic processes identified by The IIA. The design and implementation of governance processes are the responsibility of the board and management.", "az": "İdarə heyəti – Bəli. Rəhbərlik - Bəli", "cmt_az": "Yönetişim IIA tərəfindən müəyyən edilmiş üç əsas prosesdən biridir. Yönetişim proseslərinin dizaynı və tətbiqi idarə heyəti və rəhbərliyin məsuliyyətidir."}, {"tr": "Yönetim Kurulu – Evet. Yönetim - Hayır", "en": "The Board – Yes. Management - No", "cmt_tr": "Yönetim de yönetişim süreçlerinin tasarımı ve uygulamasından sorumludur.", "cmt_en": "Management is also responsible for the design and implementation of governance processes.", "az": "İdarə heyəti – Bəli. Rəhbərlik - Xeyr", "cmt_az": "Rəhbərlik də yönetişim proseslərinin dizaynı və tətbiqinə məsuldur."}, {"tr": "Yönetim Kurulu – Hayır. Yönetim - Evet", "en": "The Board – No. Management - Yes", "cmt_tr": "Yönetim kurulu da yönetişim süreçlerinin tasarımı ve uygulamasından sorumludur.", "cmt_en": "The board is also responsible for the design and implementation of governance processes.", "az": "İdarə heyəti – Xeyr. Rəhbərlik - Bəli", "cmt_az": "İdarə heyəti də yönetişim proseslərinin dizaynı və tətbiqinə məsuldur."}, {"tr": "Yönetim Kurulu – Hayır. Yönetim - Hayır", "en": "The Board – No. Management – No Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "cmt_tr": "Hem yönetim hem de yönetim kurulu yönetişim süreçlerinin tasarımı ve uygulamasından sorumludur.", "cmt_en": "Both management and the board are responsible for the design and implementation of governance processes.", "az": "İdarə heyəti – Xeyr. Rəhbərlik - Xeyr", "cmt_az": "Həm rəhbərlik, həm də idarə heyəti yönetişim proseslərinin dizaynı və tətbiqinə məsuldur."}], "answer": 0, "q_az": "Yönetişim proseslərinin dizaynı və tətbiqi kimin məsuliyyətidir?"}, {"q_tr": "İç denetim fonksiyonunun kuruluşun yönetişim sürecine doğrudan katkısını en iyi tanımlayan hangisidir?", "q_en": "Which one of the following is the best description of how the internal audit function directly contributes to an organization’s governance process?", "options": [{"tr": "Önemli risk maruziyetlerinin belirlenmesi.", "en": "Identifying significant exposures to risk.", "cmt_tr": "Önemli risk maruziyetlerinin belirlenmesi yönetişimden çok risk yönetimiyle doğrudan ilişkilidir.", "cmt_en": "Identifying significant exposures to risk most directly relates to risk management rather than to governance.", "az": "Əhəmiyyətli risk məruzlərinin müəyyən edilməsi.", "cmt_az": "Əhəmiyyətli risk məruzlərinin müəyyən edilməsi yönetişimdən çox risk idarəetməsi ilə birbaşa əlaqəlidir."}, {"tr": "Finansal raporlama üzerindeki iç kontrolün etkinliğinin değerlendirilmesi.", "en": "Evaluating the effectiveness of internal control over financial reporting.", "cmt_tr": "Finansal raporlama üzerindeki iç kontrolün etkinliğinin değerlendirilmesi yönetişimden çok risk yönetimiyle doğrudan ilişkilidir.", "cmt_en": "Evaluating the effectiveness of internal control over financial
