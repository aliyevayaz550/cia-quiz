<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CIA Quiz – Unit 6</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-group {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(255,255,255,.3);
  margin-left: 10px;
}
.lang-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: .5px; padding: 5px 9px; cursor: pointer; border: none;
  background: rgba(255,255,255,.10); color: rgba(255,255,255,.7);
  transition: background .15s, color .15s;
}
.lang-btn + .lang-btn { border-left: 1px solid rgba(255,255,255,.15); }
.lang-btn.active { background: var(--gold) !important; color: var(--navy) !important; }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── HISTORY SECTION ─────────────────────────────────── */
#history-area {
  max-width: 440px; margin: 24px auto 0; text-align: left;
}
.history-title {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: #999; margin-bottom: 8px; padding-left: 4px;
}
.history-card {
  background: #fff; border: 1px solid #e8e2d8;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.05);
  display: flex; align-items: center; gap: 12px;
}
.hc-ring {
  position: relative; width: 48px; height: 48px; flex-shrink: 0;
}
.hc-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.hc-ring-track { fill: none; stroke: #e8e2d8; stroke-width: 4; }
.hc-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; }
.hc-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-family: var(--font-head); font-size: 13px; font-weight: 700;
  color: var(--navy);
}
.hc-info { flex: 1; min-width: 0; }
.hc-date {
  font-family: var(--font-ui); font-size: 12px; color: #999;
  margin-bottom: 2px;
}
.hc-stats {
  font-family: var(--font-ui); font-size: 13px; color: var(--ink);
  font-weight: 600;
}
.hc-stats .hc-correct { color: var(--correct); }
.hc-stats .hc-wrong { color: var(--wrong); }
.hc-actions { flex-shrink: 0; }
.hc-retry-btn {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  background: #fef3f0; color: var(--wrong);
  border: 1px solid #f0d0c8; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  transition: background .2s;
}
.hc-retry-btn:hover { background: #fde0d8; }
.hc-retry-btn:disabled { opacity: .4; cursor: default; }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 6</div>
    <div id="score-badge">0 / 0</div>
    <div id="lang-group">
      <button class="lang-btn active" onclick="setLang('az')" data-lang="az">AZ</button>
      <button class="lang-btn" onclick="setLang('tr')" data-lang="tr">TR</button>
      <button class="lang-btn" onclick="setLang('en')" data-lang="en">EN</button>
    </div>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">90 sual</span>
    </div>
  </div>
</div>

// ── DATA ──────────────────────────────────────────────────────────────────────
const QUIZ = {"SU1 - Governance Principles": [{"q_tr": "Aşağıdakilerden hangisi yönetişim işlevlerini iç veya dış olarak doğru sınıflandırmaktadır?", "q_en": "Which of the following correctly classifies governance functions as internal or external?", "options": [{"tr": "İç - İç denetim fonksiyonu. Dış - Devlet düzenlemesi", "en": "Internal - Internal audit function. External - Government regulation", "cmt_tr": "İç denetim fonksiyonu iç kurumsal yönetişime örnektir; yasalar, düzenlemeler ve bunları uygulayan devlet düzenleyicileri ise dış yönetişim örnekleridir.", "cmt_en": "The internal audit function is an example of internal corporate governance, and laws, regulations, and the government regulators who enforce them are examples of external governance.", "az": "Daxili - İç denetim funksiyası. Xarici - Dövlət tənzimləməsi", "cmt_az": "İç denetim funksiyası daxili kurumsal yönetişimə nümunədir, qanunlar, tənzimləmələr və onları tətbiq edən dövlət tənzimləyiciləri isə xarici yönetişim nümunələridir."}, {"tr": "İç - Üst yönetim. Dış - Şirket ana sözleşmesi", "en": "Internal - Senior management. External - Corporate charter", "cmt_tr": "Şirket ana sözleşmesi iç kurumsal yönetişim örneğidir.", "cmt_en": "A corporate charter is an example of internal corporate governance.", "az": "Daxili - Üst rəhbərlik. Xarici - Şirkət nizamnaməsi", "cmt_az": "Şirkət nizamnaməsi daxili kurumsal yönetişim nümunəsidir."}, {"tr": "İç - Gizlilik yasaları. Dış - Dış denetçiler", "en": "Internal - Privacy laws. External - External auditors", "cmt_tr": "Yasalar dış kurumsal yönetişim sağlar.", "cmt_en": "Laws provide external corporate governance.", "az": "Daxili - Məxfilik qanunları. Xarici - Xarici auditorlar", "cmt_az": "Qanunlar xarici kurumsal yönetişim təmin edir."}, {"tr": "İç - Şirket ana sözleşmesi. Dış - Etik kültür", "en": "Internal - Corporate charter. External - Ethical culture", "cmt_tr": "Etik kültür iç kurumsal yönetişim örneğidir.", "cmt_en": "An ethical culture is an example of internal corporate governance.", "az": "Daxili - Şirkət nizamnaməsi. Xarici - Etik mədəniyyət", "cmt_az": "Etik mədəniyyət daxili kurumsal yönetişim nümunəsidir."}], "answer": 0, "q_az": "Aşağıdakılardan hansı yönetişim funksiyalarını daxili və ya xarici olaraq düzgün təsnifləşdirir?"}, {"q_tr": "Üst yönetim öncelikli olarak neden sorumludur?", "q_en": "Senior management is primarily responsible for", "options": [{"tr": "Yönetim kurulu tarafından tasarlanan kontrollerin uygulanması ve izlenmesi.", "en": "Implementing and monitoring controls designed by the board of directors.", "cmt_tr": "Yönetim kurulunun gözetim sorumlulukları vardır, ancak genellikle operasyonların ayrıntılarına karışmaz.", "cmt_en": "The board has oversight responsibilities but ordinarily does not become involved in the details of operations.", "az": "İdarə heyəti tərəfindən hazırlanmış nəzarətlərin tətbiqi və monitorinqi.", "cmt_az": "İdarə heyətinin nəzarət öhdəlikləri var, lakin adətən əməliyyatların detallarına qarışmır."}, {"tr": "Dış denetçilerin risk yönetimi ve kontrol süreçlerini denetlemesinin sağlanması.", "en": "Ensuring that external auditors oversee risk management and control processes.", "cmt_tr": "Yönetim, sağlam risk yönetimi süreçlerinin mevcut olmasını ve yeterli ve etkin olmasını sağlar.", "cmt_en": "Management ensures that sound risk management processes are in place and are adequate and effective.", "az": "Xarici auditorların risk idarəetməsi və nəzarət proseslərini nəzarətdə saxlamasının təmin edilməsi.", "cmt_az": "Rəhbərlik sağlam risk idarəetmə proseslərinin mövcud olmasını və adekvat və effektiv olmasını təmin edir."}, {"tr": "Finansal ve operasyonel bilgilerin güvenilirliği ve bütünlüğü üzerindeki kontrollerin değerlendirilmesi.", "en": "Evaluating the controls over the reliability and integrity of financial and operational information.", "cmt_tr": "İç denetçiler, finansal ve operasyonel bilgilerin güvenilirliği ve bütünlüğüne ilişkin kontroller dahil olmak üzere kontrollerin yeterliliğini ve etkinliğini değerlendirmekten sorumludur.", "cmt_en": "Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information.", "az": "Maliyyə və əməliyyat məlumatlarının etibarlılığı və bütövlüyü üzərindəki nəzarətlərin qiymətləndirilməsi.", "cmt_az": "Daxili auditorlar maliyyə və əməliyyat məlumatlarının etibarlılığı və bütövlüyü ilə bağlı nəzarətlər daxil olmaqla, nəzarətlərin adekvatlığını və effektivliyini qiymətləndirməyə məsuldurlar."}, {"tr": "Risk sahiplerinin kim olacağının belirlenmesi.", "en": "Determining who will be risk owners.", "cmt_tr": "Üst yönetim (1) belirli risklerin nerede yönetileceğini, (2) risk sahiplerinin (günlük risklerden sorumlu yöneticilerin) kim olacağını ve (3) belirli risklerin nasıl yönetileceğini belirler.", "cmt_en": "Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for specific day-to-day risks), and (3) how specific risks will be managed. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Risk sahiblərinin kim olacağının müəyyən edilməsi.", "cmt_az": "Üst rəhbərlik (1) xüsusi risklərin harada idarə olunacağını, (2) risk sahiblərinin (gündəlik risklərə məsul menecerlərin) kim olacağını və (3) xüsusi risklərin necə idarə olunacağını müəyyən edir."}], "answer": 3, "q_az": "Üst rəhbərlik əsasən nədən məsuldur?"}, {"q_tr": "Yönetişim yapısında risk sahipleri", "q_en": "In the governance structure, risk owners", "options": [{"tr": "Üst yöneticilerdir.", "en": "Are senior managers.", "cmt_tr": "Üst yöneticiler risk sahiplerinin kim olacağını belirler.", "cmt_en": "Senior managers determine who will be risk owners.", "az": "Üst rəhbərlərdir.", "cmt_az": "Üst rəhbərlər risk sahiblərinin kim olacağını müəyyən edir."}, {"tr": "Günlük operasyonlardan sorumludur.", "en": "Are responsible for day-to-day operations.", "cmt_tr": "Risk sahipleri belirli günlük operasyonlardan sorumlu yöneticilerdir. Üst yöneticiler risk sahiplerinin kim olacağını belirler.", "cmt_en": "Risk owners are managers responsible for specific day-to-day operations. Senior managers determine who will be risk owners.", "az": "Gündəlik əməliyyatlara məsuldurlar.", "cmt_az": "Risk sahibləri xüsusi gündəlik əməliyyatlara məsul olan menecerlərdir. Üst rəhbərlər risk sahiblərinin kim olacağını müəyyən edir."}, {"tr": "Paydaşları ve kabul edilemez sonuçları belirler.", "en": "Identify stakeholders and unacceptable outcomes.", "cmt_tr": "Yönetim kurulu üyeleri paydaşları ve kabul edilemez sonuçları belirler.", "cmt_en": "Directors identify stakeholders and unacceptable outcomes.", "az": "Maraqlı tərəfləri və qəbuledilməz nəticələri müəyyən edirlər.", "cmt_az": "Direktorlar maraqlı tərəfləri və qəbuledilməz nəticələri müəyyən edir."}, {"tr": "Yönetim kurulu direktiflerini yerine getirir.", "en": "Carry out board directives.", "cmt_tr": "Üst yöneticiler yönetim kurulu direktiflerini yerine getirir.", "cmt_en": "Senior managers carry out board directives.", "az": "İdarə heyətinin direktivlərini yerinə yetirirlər.", "cmt_az": "Üst rəhbərlər idarə heyətinin direktivlərini yerinə yetirir."}], "answer": 1, "q_az": "Yönetişim strukturunda risk sahibləri"}, {"q_tr": "Etkin kurumsal performans yönetimi ve hesap verebilirliğin sağlanması en doğrudan hangi işlevin görevidir?", "q_en": "Ensuring effective organizational performance management and accountability is most directly the proper function of", "options": [{"tr": "Kontrol.", "en": "Control.", "cmt_tr": "Yönetişim (kontrol değil) etkin kurumsal performans yönetimi ve hesap verebilirliğin sağlanmasından doğrudan sorumludur.", "cmt_en": "Governance (not control) is directly responsible for ensuring effective organizational performance management and accountability.", "az": "Nəzarət.", "cmt_az": "Yönetişim (nəzarət deyil) effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edilməsinə birbaşa məsuldur."}, {"tr": "Yönetişim.", "en": "Governance.", "cmt_tr": "Kurumsal performans hedeflere ulaşılarak ölçülür. IIA Sözlüğü yönetişimi \"yönetim kurulu tarafından kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçlerin ve yapıların birleşimi\" olarak tanımlar.", "cmt_en": "Organizational performance is measured by achieving objectives. The IIA Glossary defines governance as “[t]he combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.” Thus, ensuring effective organizational performance management and accountability is most directly the proper function of governance.", "az": "Yönetişim.", "cmt_az": "Təşkilati performans hədəflərə çatmaqla ölçülür. IIA Lüğəti yönetişimi \"idarə heyəti tərəfindən təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırmaq, istiqamətləndirmək, idarə etmək və nəzarət etmək üçün tətbiq olunan proseslərin və strukturların birləşməsi\" kimi təyin edir."}, {"tr": "Risk yönetimi.", "en": "Risk management.", "cmt_tr": "Yönetişim (risk yönetimi değil) etkin kurumsal performans yönetimi ve hesap verebilirliğin sağlanmasından doğrudan sorumludur.", "cmt_en": "Governance (not risk management) is directly responsible for ensuring effective organizational performance management and accountability.", "az": "Risk idarəetməsi.", "cmt_az": "Yönetişim (risk idarəetməsi deyil) effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edilməsinə birbaşa məsuldur."}, {"tr": "Kalite güvence programı.", "en": "A quality assurance program.", "cmt_tr": "Kalite güvence programı genellikle bir kurumsal birim için, örneğin iç denetim fonksiyonu için uygulanır.", "cmt_en": "A quality assurance program normally is implemented for an organizational unit, e.g., the internal audit function. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Keyfiyyət təminatı proqramı.", "cmt_az": "Keyfiyyət təminatı proqramı adətən bir təşkilati vahid üçün, məsələn, iç denetim funksiyası üçün tətbiq olunur."}], "answer": 1, "q_az": "Effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edilməsi ən birbaşa hansı funksiyanın vəzifəsidir?"}, {"q_tr": "Yönetişimin en muhtemel amacı nedir?", "q_en": "The most likely purpose of governance is", "options": [{"tr": "Dış denetçilerin bağımsızlığının sağlanması.", "en": "Ensuring the independence of external auditors.", "cmt_tr": "Yönetişimin amaçları dış denetçilerin bağımsızlığını sağlamaktan çok daha kapsamlıdır. İç yönetişim mekanizmaları, örneğin denetim komitesi, dış denetçileri işe alır ve performanslarını denetler.", "cmt_en": "The purposes of governance are much broader than ensuring the independence of external auditors. Internal mechanisms of governance, e.g., an audit committee, hire and oversee the performance of external auditors.", "az": "Xarici auditorların müstəqilliyinin təmin edilməsi.", "cmt_az": "Yönetişimin məqsədləri xarici auditorların müstəqilliyini təmin etməkdən çox daha genişdir. Daxili yönetişim mexanizmləri, məsələn, audit komitəsi xarici auditorları işə götürür və onların fəaliyyətinə nəzarət edir."}, {"tr": "Kurumsal kültürün oluşturulması.", "en": "Establishment of an organizational culture.", "cmt_tr": "Yönetişim uygulamaları kuruluşun benzersiz kültürünü yansıtır ve etkinlik için büyük ölçüde ona bağlıdır. Ancak kuruluşun tüm faaliyetleri hedeflerine ulaşmak için bilgilendirilmeli, yönlendirilmeli, yönetilmeli ve izlenmelidir.", "cmt_en": "Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. However, all activities of the organization must be informed, directed, managed, and monitored to achieve its objectives.", "az": "Təşkilati mədəniyyətin yaradılması.", "cmt_az": "Yönetişim təcrübələri təşkilatın unikal mədəniyyətini əks etdirir və effektivlik üçün əsasən ona bağlıdır. Lakin təşkilatın bütün fəaliyyətləri hədəflərinə çatmaq üçün məlumatlandırılmalı, istiqamətləndirilməli, idarə olunmalı və nəzarət edilməlidir."}, {"tr": "Devlet gözetimine etki etmek.", "en": "Influencing governmental oversight.", "cmt_tr": "Devlet düzenleyicileri yönetişimi etkilese de, bu etkiye karşılık vermek yönetişimin temel amacı değildir.", "cmt_en": "Although government regulators influence governance, reciprocating such influence is not a primary purpose of governance", "az": "Dövlət nəzarətinə təsir göstərmək.", "cmt_az": "Dövlət tənzimləyiciləri yönetişimə təsir göstərsə də, belə təsirə qarşılıq vermək yönetişimin əsas məqsədi deyildir."}, {"tr": "Kuruluşun faaliyetlerinin izlenmesi.", "en": "Monitoring the activities of the organization.", "cmt_tr": "Yönetişim, IIA Standartları sözlüğünde \"yönetim kurulu tarafından kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçlerin ve yapıların birleşimi\" olarak tanımlanır.", "cmt_en": "Governance is defined in the glossary of The IIA’s Standards as “[t]he combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.”", "az": "Təşkilatın fəaliyyətlərinin monitorinqi.", "cmt_az": "Yönetişim IIA Standartlarının lüğətində \"idarə heyəti tərəfindən təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırmaq, istiqamətləndirmək, idarə etmək və nəzarət etmək üçün tətbiq olunan proseslərin və strukturların birləşməsi\" kimi təyin edilir."}], "answer": 3, "q_az": "Yönetişimin ən ehtimal olunan məqsədi nədir?"}, {"q_tr": "Kurumsal bir organizasyonda günlük risklerden kimin sorumlu olacağını kim belirler?", "q_en": "Who in a corporate organization determines who will be responsible for day-to-day risks?", "options": [{"tr": "İç denetim fonksiyonu.", "en": "Internal audit function.", "cmt_tr": "İç denetim fonksiyonu yönetişim süreçlerini değerlendirmek ve iyileştirmekten sorumludur.", "cmt_en": "The internal audit function is responsible for assessing and improving governance processes.", "az": "İç denetim funksiyası.", "cmt_az": "İç denetim funksiyası yönetişim proseslərini qiymətləndirmək və təkmilləşdirməyə məsuldur."}, {"tr": "Üst yönetim.", "en": "Senior management.", "cmt_tr": "Üst yönetim (1) belirli risklerin nerede yönetileceğini, (2) risk sahiplerinin (günlük risklerden sorumlu yöneticilerin) kim olacağını ve (3) belirli risklerin nasıl yönetileceğini belirler.", "cmt_en": "Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for day-to-day risks), and (3) how specific risks will be managed.", "az": "Üst rəhbərlik.", "cmt_az": "Üst rəhbərlik (1) xüsusi risklərin harada idarə olunacağını, (2) risk sahiblərinin (gündəlik risklərə məsul menecerlərin) kim olacağını və (3) xüsusi risklərin necə idarə olunacağını müəyyən edir."}, {"tr": "Yönetim kurulu üyeleri.", "en": "Directors.", "cmt_tr": "Yönetim kurulu üyeleri riski değerlendirir ve yönetir (bazen yönetim kurulunun risk komitesi aracılığıyla) ve gözetim için nihai yetkiye sahiptir. Ancak günlük risklerden kimin sorumlu olacağını üst yönetim belirler.", "cmt_en": "The directors evaluate and manage risk (sometimes through a risk committee of the board) and have the ultimate authority for oversight. But senior management determines who will be responsible for day-to-day risks.", "az": "Direktorlar.", "cmt_az": "Direktorlar riski qiymətləndirir və idarə edir (bəzən idarə heyətinin risk komitəsi vasitəsilə) və nəzarət üçün son səlahiyyətə malikdirlər. Lakin gündəlik risklərə kimin məsul olacağını üst rəhbərlik müəyyən edir."}, {"tr": "Hissedarlar.", "en": "Shareholders.", "cmt_tr": "Hissedarlar şirketin operasyonel kontrolüne sahip olmayan temel paydaşlardır.", "cmt_en": "Shareholders are key stakeholders who do not have operational control of the corporation. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Səhmdarlar.", "cmt_az": "Səhmdarlar korporasiyanın əməliyyat nəzarətinə malik olmayan əsas maraqlı tərəflərdir."}], "answer": 1, "q_az": "Korporativ təşkilatda gündəlik risklərə kimin məsul olacağını kim müəyyən edir?"}, {"q_tr": "Üst yöneticilerin en çok neyi belirlemesi muhtemeldir?", "q_en": "Senior managers are most likely to determine", "options": [{"tr": "Kuruluşun sermaye yapısını.", "en": "The organization’s capital structure.", "cmt_tr": "Yönetim kurulu sermaye yapısını (borç ve özsermaye karışımını, hisseler için alınacak bedeli vb.) belirler.", "cmt_en": "The board determines capital structure (mix of debt and equity, consideration to be received for shares, etc.).", "az": "Təşkilatın kapital strukturunu.", "cmt_az": "İdarə heyəti kapital strukturunu (borc və kapitalın qarışığını, səhmlər üçün alınacaq əvəzi və s.) müəyyən edir."}, {"tr": "Belirli risklerin nerede yönetileceğini.", "en": "Where specific risks are managed.", "cmt_tr": "Üst yönetim (1) belirli risklerin nerede yönetileceğini, (2) risk sahiplerinin (belirli günlük risklerden sorumlu yöneticilerin) kim olacağını ve (3) belirli risklerin nasıl yönetileceğini belirler.", "cmt_en": "Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for specific day-to-day risks), and (3) how specific risks will be managed.", "az": "Xüsusi risklərin harada idarə olunacağını.", "cmt_az": "Üst rəhbərlik (1) xüsusi risklərin harada idarə olunacağını, (2) risk sahiblərinin (xüsusi gündəlik risklərə məsul menecerlərin) kim olacağını və (3) xüsusi risklərin necə idarə olunacağını müəyyən edir."}, {"tr": "Birleşmenin ne zaman başlatılacağını.", "en": "When to initiate a merger.", "cmt_tr": "Yönetim kurulu köklü değişiklikleri (birleşme, satın alma vb.) başlatır. (D) cevabı yanlıştır. Yönetim kurulu denetim faaliyetlerini koordine eder (çoğunlukla denetim komitesi adlı alt komite tarafından gerçekleştirilir).", "cmt_en": "The board initiates fundamental changes (mergers, acquisitions, etc.).Answer (D) is incorrect. The board coordinates audit activities (most often performed by a subcommittee called the audit committee).", "az": "Birləşmənin nə vaxt başladılacağını.", "cmt_az": "İdarə heyəti əsaslı dəyişiklikləri (birləşmə, satınalma və s.) başladır. (D) cavabı səhvdir. İdarə heyəti audit fəaliyyətlərini koordinasiya edir (əksər hallarda audit komitəsi adlanan alt komitə tərəfindən həyata keçirilir)."}, {"tr": "Denetim komitesinin üyelerini.", "en": "The members of the audit committee.", "cmt_tr": "", "cmt_en": "", "az": "Audit komitəsinin üzvlərini.", "cmt_az": ""}], "answer": 1, "q_az": "Üst rəhbərlər ən çox nəyi müəyyən edir?"}, {"q_tr": "Yönetim kurulu aşağıdaki niteliklerden hangisine sahip olmalıdır?", "q_en": "Which of the following qualities should be possessed by a board of directors?", "options": [{"tr": "Yönetim kurulunun çoğunluğu bağımsız üyelerden oluşmalıdır.", "en": "A majority of the board should be outside directors.", "cmt_tr": "Yönetim kurulu üyeleri ayrıca sektörde yıllarca deneyime sahip olmalı ve yönetimin kararlarına itiraz etmeye istekli olmalıdır.", "cmt_en": "Directors should also have years of experience in the industry and be willing to challenge management’s decisions.", "az": "İdarə heyətinin əksəriyyəti kənar direktorlardan ibarət olmalıdır.", "cmt_az": "Direktorlar həmçinin sənayedə illərlə təcrübəyə malik olmalı və rəhbərliyin qərarlarına etiraz etməyə hazır olmalıdırlar."}, {"tr": "Yönetim kurulu üyeleri genellikle sektörde yıllarca deneyime sahip olmalıdır.", "en": "Directors generally should have years of experience in the industry.", "cmt_tr": "Yönetim kurulunun çoğunluğu bağımsız üyelerden oluşmalıdır ve üyeler yönetimin tercihlerine itiraz etmeye istekli olmalıdır.", "cmt_en": "A majority of the board should be outside directors, and directors must be willing to challenge management’s choices.", "az": "Direktorlar ümumiyyətlə sənayedə illərlə təcrübəyə malik olmalıdırlar.", "cmt_az": "İdarə heyətinin əksəriyyəti kənar direktorlardan ibarət olmalıdır və direktorlar rəhbərliyin seçimlərinə etiraz etməyə hazır olmalıdırlar."}, {"tr": "Yönetim kurulu üyeleri yönetimin tercihlerine itiraz etmeye istekli olmalıdır.", "en": "Directors must be willing to challenge management’s choices.", "cmt_tr": "Yönetim kurulunun çoğunluğu bağımsız üyelerden oluşmalı ve üyeler sektörde yıllarca deneyime sahip olmalıdır. (D) cevabı doğrudur. Yönetim kurulu üyelerinin etkin olabilmesi için belirli niteliklere sahip olması gerekir. • Çoğunluk bağımsız üyelerden oluşmalıdır. • Üyeler genellikle sektörde veya kurumsal yönetişimde yıllarca deneyime sahip olmalıdır. • Üyeler yönetimin tercihlerine itiraz etmeye istekli olmalıdır. Pasif yönetim kurulu üyeleri olumsuz sonuçların olasılığını artırır.", "cmt_en": "A majority of the board should be outside directors, and directors should also have years of experience in the industry.Answer (D) is correct. Directors must have certain qualities to be effective. • A majority of the board should be outside directors. • Directors generally should have years of experience either in the industry or in corporate governance. • Directors must be willing to challenge management’s choices. Complacent directors increase the chances of adverse consequences. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Direktorlar rəhbərliyin seçimlərinə etiraz etməyə hazır olmalıdırlar.", "cmt_az": "İdarə heyətinin əksəriyyəti kənar direktorlardan ibarət olmalı, direktorlar sənayedə illərlə təcrübəyə malik olmalıdırlar. (D) cavabı doğrudur. Direktorlar effektiv olmaq üçün müəyyən keyfiyyətlərə malik olmalıdırlar. • İdarə heyətinin əksəriyyəti kənar direktorlardan ibarət olmalıdır. • Direktorlar ümumiyyətlə sənayedə və ya kurumsal yönetişimdə illərlə təcrübəyə malik olmalıdırlar. • Direktorlar rəhbərliyin seçimlərinə etiraz etməyə hazır olmalıdırlar. Passiv direktorlar mənfi nəticələrin ehtimalını artırır."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "", "cmt_en": "", "az": "Bütün cavablar doğrudur.", "cmt_az": ""}], "answer": 3, "q_az": "İdarə heyəti aşağıdakı keyfiyyətlərdən hansına malik olmalıdır?"}, {"q_tr": "Aşağıdakilerden hangisi kurumsal yönetişim işlevlerini iç veya dış olarak doğru sınıflandırmaktadır?", "q_en": "Which of the following correctly classifies the corporate governance functions as internal or external?", "options": [{"tr": "İç - Şirket ana sözleşmesi. Dış - İç tüzük", "en": "Internal - Corporate charter. External - Bylaws", "cmt_tr": "İç tüzük iç kurumsal yönetişim örneğidir.", "cmt_en": "Bylaws are an example of internal corporate governance.", "az": "Daxili - Şirkət nizamnaməsi. Xarici - Daxili qaydalar", "cmt_az": "Daxili qaydalar daxili kurumsal yönetişim nümunəsidir."}, {"tr": "İç - Yasalar. Dış - Yönetim kurulu", "en": "Internal – Laws. External - Board of directors", "cmt_tr": "Yasalar dış kurumsal yönetişim sağlar.", "cmt_en": "Laws provide external corporate governance.", "az": "Daxili - Qanunlar. Xarici - İdarə heyəti", "cmt_az": "Qanunlar xarici kurumsal yönetişim təmin edir."}, {"tr": "İç - İç denetim fonksiyonu. Dış - Şirket ana sözleşmesi", "en": "Internal - Internal audit function. External - Corporate charter", "cmt_tr": "Şirket ana sözleşmesi iç kurumsal yönetişim örneğidir.", "cmt_en": "A corporate charter is an example of internal corporate governance.", "az": "Daxili - İç denetim funksiyası. Xarici - Şirkət nizamnaməsi", "cmt_az": "Şirkət nizamnaməsi daxili kurumsal yönetişim nümunəsidir."}, {"tr": "İç - İç tüzük. Dış - Devlet düzenlemesi", "en": "Internal – Bylaws. External - Government regulation", "cmt_tr": "İç tüzük iç kurumsal yönetişim örneğidir; yasalar, düzenlemeler ve bunları uygulayan devlet düzenleyicileri ise dış yönetişim örnekleridir.", "cmt_en": "Bylaws are an example of internal corporate governance, and laws, regulations, and the government regulators who enforce them are examples of external governance.", "az": "Daxili - Daxili qaydalar. Xarici - Dövlət tənzimləməsi", "cmt_az": "Daxili qaydalar daxili kurumsal yönetişim nümunəsidir, qanunlar, tənzimləmələr və onları tətbiq edən dövlət tənzimləyiciləri isə xarici yönetişim nümunələridir."}], "answer": 3, "q_az": "Aşağıdakılardan hansı kurumsal yönetişim funksiyalarını daxili və ya xarici olaraq düzgün təsnifləşdirir?"}, {"q_tr": "Aşağıdakilerden hangisi kurumsal yönetişimin amacı değildir?", "q_en": "Which of the following is not a goal of corporate governance?", "options": [{"tr": "Toplumun yasal ve düzenleyici kurallarına uyum.", "en": "Complying with society’s legal and regulatory rules.", "cmt_tr": "Toplumun yasal ve düzenleyici kurallarına uyumun sağlanması kurumsal yönetişimin amacıdır.", "cmt_en": "Ensuring compliance with society’s legal and regulatory rules is a goal of corporate governance.", "az": "Cəmiyyətin hüquqi və tənzimləyici qaydalarına uyğunluq.", "cmt_az": "Cəmiyyətin hüquqi və tənzimləyici qaydalarına uyğunluğun təmin edilməsi kurumsal yönetişimin məqsədidir."}, {"tr": "Topluma genel fayda sağlamak.", "en": "Providing an overall benefit to society.", "cmt_tr": "Topluma genel fayda sağlamak kurumsal yönetişimin amacıdır.", "cmt_en": "Proving an overall benefit to society is a goal of corporate governance.", "az": "Cəmiyyətə ümumi fayda təmin etmək.", "cmt_az": "Cəmiyyətə ümumi fayda təmin etmək kurumsal yönetişimin məqsədidir."}, {"tr": "Paydaşlara eksiksiz ve doğru şekilde raporlama yapmak.", "en": "Reporting fully and truthfully to stakeholders.", "cmt_tr": "Paydaşlara eksiksiz ve doğru şekilde raporlama yapmak kurumsal yönetişimin amacıdır.", "cmt_en": "Reporting fully and truthfully to stakeholders is a goal of corporate governance.", "az": "Maraqlı tərəflərə tam və doğru hesabat vermək.", "cmt_az": "Maraqlı tərəflərə tam və doğru hesabat vermək kurumsal yönetişimin məqsədidir."}, {"tr": "Yönetici ücretlerinin maksimize edilmesi.", "en": "Maximizing executive compensation.", "cmt_tr": "Yönetişim uygulamaları çeşitli hukuki formlar, yapılar, stratejiler ve prosedürler kullanabilir. Kuruluşun (1) yasal ve düzenleyici kurallara uyumunu; (2) genel kabul görmüş iş normlarını, etik ilkeleri ve toplumsal beklentileri karşılamasını; (3) topluma genel fayda sağlamasını ve paydaşların çıkarlarını artırmasını; ve (4) paydaşlarına eksiksiz ve doğru raporlama yapmasını sağlar. Ancak yönetici ücretlerinin maksimize edilmesi kurumsal yönetişimin amacı değildir.", "cmt_en": "Governance practices may use various legal forms, structures, strategies, and procedures. They ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short-term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances. But maximizing executive compensation is not a goal of corporate governance. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "İcraçı kompensasiyanın maksimuma çatdırılması.", "cmt_az": "Yönetişim təcrübələri müxtəlif hüquqi formalar, strukturlar, strategiyalar və prosedurlardan istifadə edə bilər. Onlar təşkilatın (1) cəmiyyətin hüquqi və tənzimləyici qaydalarına uyğunluğunu; (2) ümumi qəbul edilmiş biznes normaları, etik prinsipləri və sosial gözləntiləri qarşılamasını; (3) cəmiyyətə ümumi fayda təmin etməsini və maraqlı tərəflərin maraqlarını artırmasını; və (4) maraqlı tərəflərinə tam və doğru hesabat verməsini təmin edir. Lakin icraçı kompensasiyanın maksimuma çatdırılması kurumsal yönetişimin məqsədi deyil."}], "answer": 3, "q_az": "Aşağıdakılardan hansı kurumsal yönetişimin məqsədi deyil?"}, {"q_tr": "İç ve dış denetçiler bağımsız yönetim kurulu üyelerinden oluşan bir denetim komitesine doğrudan rapor verir. Bu uygulama aşağıdaki yönetişim ilkelerinden hangisiyle doğrudan ilişkilidir? 1. İç ve dış denetçilerin etkin kullanımı. 2. Yönetim kurulu, yönetim ve güvence sağlayıcıları arasında etkin etkileşim. 3. Stratejik hedeflerin gerçekleştirilmesini destekleyen kurumsal yapı. 4. Kurumsal ve bireysel performansı ölçmek için kullanılan kurumsal yapı.", "q_en": "The internal and external auditors report directly to an audit committee composed of independent directors. This practice is directly related to which of the following governance principles? 1. Effective use of internal and external auditors. 2. Effective interaction among the board, management, and assurance providers. 3. An organizational structure that supports accomplishing strategic objectives. 4. An organizational structure used to measure organizational and individual performance.", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "İç ve dış denetçiler (1) bağımsızlıklarını, (2) kaynaklarının ve faaliyet alanlarının yeterliliğini ve (3) operasyonların etkinliğini sağlamak için etkin bir şekilde kullanılmalıdır. Ayrıca, kuruluş bağımsız soruşturmalar yürütmek için yeterli uzmanlık, deneyim, yetki ve kaynağa sahip bağımsız ve objektif bir yönetim kuruluna sahip olmalıdır.", "cmt_en": "Internal and external auditors should be used effectively to ensure (1) their independence, (2) the adequacy of their resources and the scope of their activities, and (3) the effectiveness of operations. Moreover, an entity should have an independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries.", "az": "Yalnız 1 və 2.", "cmt_az": "Daxili və xarici auditorlardan (1) müstəqilliklərini, (2) resurslarının və fəaliyyət sahələrinin adekvatlığını və (3) əməliyyatların effektivliyini təmin etmək üçün effektiv istifadə olunmalıdır. Bundan əlavə, müəssisə müstəqil sorğular aparmaq üçün kifayət qədər təcrübə, bacarıq, səlahiyyət və resurslara malik müstəqil və obyektiv idarə heyətinə malik olmalıdır."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "Stratejik hedeflerin gerçekleştirilmesini destekleyen kurumsal yapı doğrudan ilişkili değildir.", "cmt_en": "An organizational structure that supports accomplishing strategic objectives is not directly related.", "az": "Yalnız 2 və 3.", "cmt_az": "Strateji hədəflərin həyata keçirilməsini dəstəkləyən təşkilati struktur birbaşa əlaqəli deyil."}, {"tr": "Yalnızca 3 ve 4.", "en": "3 and 4 only.", "cmt_tr": "Stratejik hedeflerin gerçekleştirilmesini destekleyen kurumsal yapı ve kurumsal ve bireysel performansı ölçmek için kullanılan kurumsal yapı doğrudan ilişkili değildir.", "cmt_en": "An organizational structure that supports accomplishing strategic objectives and an organizational structure used to measure organizational and individual performance are not directly related.", "az": "Yalnız 3 və 4.", "cmt_az": "Strateji hədəflərin həyata keçirilməsini dəstəkləyən təşkilati struktur və təşkilati və fərdi performansı ölçmək üçün istifadə olunan təşkilati struktur birbaşa əlaqəli deyil."}, {"tr": "1, 2, 3 ve 4.", "en": "1, 2, 3, and 4.", "cmt_tr": "Stratejik hedeflerin gerçekleştirilmesini destekleyen kurumsal yapı ve kurumsal ve bireysel performansı ölçmek için kullanılan kurumsal yapı doğrudan ilişkili değildir.", "cmt_en": "An organizational structure that supports accomplishing strategic objectives and an organizational structure used to measure organizational and individual performance are not directly related.", "az": "1, 2, 3 və 4.", "cmt_az": "Strateji hədəflərin həyata keçirilməsini dəstəkləyən təşkilati struktur və təşkilati və fərdi performansı ölçmək üçün istifadə olunan təşkilati struktur birbaşa əlaqəli deyil."}], "answer": 0, "q_az": "Daxili və xarici auditorlar müstəqil direktorlardan ibarət audit komitəsinə birbaşa hesabat verir. Bu təcrübə aşağıdakı yönetişim prinsiplərindən hansı ilə birbaşa əlaqəlidir? 1. Daxili və xarici auditorlardan effektiv istifadə. 2. İdarə heyəti, rəhbərlik və güvencə təminatçıları arasında effektiv qarşılıqlı əlaqə. 3. Strateji hədəflərin həyata keçirilməsini dəstəkləyən təşkilati struktur. 4. Təşkilati və fərdi performansı ölçmək üçün istifadə olunan təşkilati struktur."}, {"q_tr": "Yönetişim, kuruluşun paydaşlarının hedeflerinin karşılanmasını sağlamaya yardımcı olmalıdır. Paydaşlar arasında şunlar yer alır: 1. Çalışanlar 2. Düzenleyiciler 3. Tedarikçiler 4. Müşteriler", "q_en": "Governance should help ensure that the objectives of an entity’s stakeholders are met. Stakeholders include 1. Employees 2. Regulators 3. Suppliers 4. Customers", "options": [{"tr": "Yalnızca 1 ve 4.", "en": "1 and 4 only.", "cmt_tr": "Düzenleyiciler ve tedarikçiler de paydaşlardır.", "cmt_en": "Regulators and suppliers are stakeholders.", "az": "Yalnız 1 və 4.", "cmt_az": "Tənzimləyicilər və təchizatçılar da maraqlı tərəflərdir."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "Çalışanlar ve müşteriler de paydaşlardır.", "cmt_en": "Employees and customers are stakeholders.", "az": "Yalnız 2 və 3.", "cmt_az": "İşçilər və müştərilər də maraqlı tərəflərdir."}, {"tr": "Yalnızca 2, 3 ve 4.", "en": "2, 3, and 4 only.", "cmt_tr": "Çalışanlar da paydaşlardır.", "cmt_en": "Employees are stakeholders.", "az": "Yalnız 2, 3 və 4.", "cmt_az": "İşçilər də maraqlı tərəflərdir."}, {"tr": "1, 2, 3 ve 4.", "en": "1, 2, 3, and 4. Study Unit 6: Governance | Subunit 1: Governance Principles", "cmt_tr": "Paydaşlar, kuruluşun faaliyetlerinden etkilenen kişi veya kuruluşlardır. Bunlar arasında (1) hissedarlar, (2) çalışanlar, (3) tedarikçiler, (4) müşteriler, (5) kuruluşun tesislerinin komşuları ve (6) devlet düzenleyicileri bulunur.", "cmt_en": "Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators.", "az": "1, 2, 3 və 4.", "cmt_az": "Maraqlı tərəflər müəssisənin fəaliyyətlərindən təsirlənən şəxslər və ya qurumlardır. Digərləri arasında bunlara (1) səhmdarlar, (2) işçilər, (3) təchizatçılar, (4) müştərilər, (5) müəssisənin obyektlərinin qonşuları və (6) dövlət tənzimləyiciləri daxildir."}], "answer": 3, "q_az": "Yönetişim müəssisənin maraqlı tərəflərinin hədəflərinin qarşılanmasını təmin etməyə kömək etməlidir. Maraqlı tərəflərə aşağıdakılar daxildir: 1. İşçilər 2. Tənzimləyicilər 3. Təchizatçılar 4. Müştərilər"}, {"q_tr": "Yönetim kurulu üyeleri, yönetim, dış denetçiler ve iç denetçilerin hepsi uygun kontrol süreçlerinin oluşturulmasında önemli roller oynar. Üst yönetim öncelikli olarak neden sorumludur?", "q_en": "Directors, management, external auditors, and internal auditors all play important roles in creating proper control processes. Senior management is primarily responsible for", "options": [{"tr": "Kurumsal kültürün oluşturulması ve sürdürülmesi.", "en": "Establishing and maintaining an organizational culture.", "cmt_tr": "Yönetim, hedeflere ve amaçlara ulaşılacağına dair makul güvence sağlamak için yeterli eylemleri planlar, organize eder ve yönetir. Yönetim, iç ve dış koşullardaki değişikliklere uyum sağlamak için hedeflerini ve amaçlarını periyodik olarak gözden geçirir. Yönetim ayrıca kontrolü teşvik eden etik iklim dahil olmak üzere kurumsal kültürü oluşturur ve sürdürür.", "cmt_en": "Management plans, organizes, and directs the performance of sufficient actions to provide reasonable assurance that goals and objectives will be achieved. Management periodically reviews its objectives and goals and modifies its processes to accommodate changes in internal and external conditions. Management also establishes and maintains an organizational culture, including an ethical climate that fosters control.", "az": "Təşkilati mədəniyyətin yaradılması və qorunması.", "cmt_az": "Rəhbərlik hədəf və məqsədlərə çatılacağına dair ağlabatan güvencə təmin etmək üçün kifayət qədər tədbirlər planlaşdırır, təşkil edir və idarə edir. Rəhbərlik daxili və xarici şərtlərdəki dəyişikliklərə uyğunlaşmaq üçün hədəf və məqsədlərini vaxtaşırı nəzərdən keçirir. Rəhbərlik həmçinin nəzarəti təşviq edən etik mühit daxil olmaqla təşkilati mədəniyyəti yaradır və qoruyur."}, {"tr": "Finansal ve operasyonel bilgilerin güvenilirliğinin ve bütünlüğünün gözden geçirilmesi.", "en": "Reviewing the reliability and integrity of financial and operational information.", "cmt_tr": "İç denetçiler, finansal ve operasyonel bilgilerin güvenilirliği ve bütünlüğüne ilişkin kontroller dahil olmak üzere kontrollerin yeterliliğini ve etkinliğini değerlendirmekten sorumludur.", "cmt_en": "Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information.", "az": "Maliyyə və əməliyyat məlumatlarının etibarlılığının və bütövlüyünün nəzərdən keçirilməsi.", "cmt_az": "Daxili auditorlar maliyyə və əməliyyat məlumatlarının etibarlılığı və bütövlüyü ilə bağlı nəzarətlər daxil olmaqla, nəzarətlərin adekvatlığını və effektivliyini qiymətləndirməyə məsuldurlar."}, {"tr": "Dış ve iç denetçilerin risk yönetimi ve kontrol süreçleri sisteminin yönetimini denetlemesinin sağlanması.", "en": "Ensuring that external and internal auditors oversee the administration of the system of risk management and control processes.", "cmt_tr": "Üst yönetimin rolü risk yönetimi ve kontrol süreçleri sisteminin kurulmasını, yönetilmesini ve değerlendirilmesini denetlemektir.", "cmt_en": "Senior management’s role is to oversee the establishment, administration, and assessment of the system of risk management and control processes.", "az": "Xarici və daxili auditorların risk idarəetməsi və nəzarət prosesləri sisteminin idarə edilməsinə nəzarət etməsinin təmin edilməsi.", "cmt_az": "Üst rəhbərliyin rolu risk idarəetməsi və nəzarət prosesləri sisteminin qurulmasına, idarə edilməsinə və qiymətləndirilməsinə nəzarət etməkdir."}, {"tr": "Yönetim kurulu tarafından tasarlanan kontrollerin uygulanması ve izlenmesi.", "en": "Implementing and monitoring controls designed by the board of directors.", "cmt_tr": "Yönetim kurulunun gözetim sorumlulukları vardır ancak genellikle operasyonların ayrıntılarına karışmaz.", "cmt_en": "The board has oversight responsibilities but ordinarily does not become involved in the details of operations.", "az": "İdarə heyəti tərəfindən hazırlanmış nəzarətlərin tətbiqi və monitorinqi.", "cmt_az": "İdarə heyətinin nəzarət öhdəlikləri var, lakin adətən əməliyyatların detallarına qarışmır."}], "answer": 0, "q_az": "Direktorlar, rəhbərlik, xarici auditorlar və daxili auditorların hamısı düzgün nəzarət proseslərinin yaradılmasında mühüm rol oynayır. Üst rəhbərlik əsasən nədən məsuldur?"}, {"q_tr": "Kurumsal yönetişim hakkında aşağıdaki ifadelerden hangisi doğru değildir?", "q_en": "Which of the following statements regarding corporate governance is not correct?", "options": [{"tr": "Kurumsal kontrol mekanizmaları iç ve dış mekanizmaları kapsar.", "en": "Corporate control mechanisms include internal and external mechanisms.", "cmt_tr": "Kurumsal kontrol mekanizmaları hem iç (örn. iç denetim) hem de dış (örn. dış denetim) mekanizmaları kapsar.", "cmt_en": "Corporate control mechanisms include both internal (e.g., internal auditing) and external (e.g., external auditing) mechanisms.", "az": "Kurumsal nəzarət mexanizmləri daxili və xarici mexanizmləri əhatə edir.", "cmt_az": "Kurumsal nəzarət mexanizmləri həm daxili (məsələn, iç denetim), həm də xarici (məsələn, xarici audit) mexanizmləri əhatə edir."}, {"tr": "Yönetimin ücret planı kurumsal kontrol mekanizmalarının bir parçasıdır.", "en": "The compensation scheme for management is part of the corporate control mechanisms.", "cmt_tr": "Yönetimin ücret planı kontrol ortamının, özellikle insan kaynakları unsurunun bir parçasıdır.", "cmt_en": "Management’s compensation scheme is part of the control environment, specifically, the human resource element.", "az": "Rəhbərliyin kompensasiya sxemi kurumsal nəzarət mexanizmlərinin bir hissəsidir.", "cmt_az": "Rəhbərliyin kompensasiya sxemi nəzarət mühitinin, xüsusən insan resursu elementinin bir hissəsidir."}, {"tr": "Çalışan hisse senedi opsiyonları veya hisse senedi ikramiyelerinden kaynaklanan hissedar servetinin seyrelmesi bir yönetişim sorunu değil, muhasebe sorunudur.", "en": "The dilution of shareholders’ wealth resulting from employee stock options or employee stock bonuses is an accounting issue rather than a corporate governance issue.", "cmt_tr": "Çalışan hisse senedi opsiyonları veya ikramiyelerden kaynaklanan hissedar servetinin seyrelmesi bir muhasebe sorunudur. Yönetişim \"yönetim kurulu tarafından kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçlerin ve yapıların birleşimidir\" (IIA Sözlüğü).", "cmt_en": "The dilution of shareholders’ wealth resulting from employee stock options or employee stock bonuses is an accounting issue. Governance is “the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives” (The IIA Glossary).", "az": "İşçi səhm opsionları və ya səhm bonuslarından yaranan səhmdarların sərvətinin seyrəlməsi yönetişim məsələsi deyil, mühasibat məsələsidir.", "cmt_az": "İşçi səhm opsionları və ya səhm bonuslarından yaranan səhmdarların sərvətinin seyrəlməsi mühasibat məsələsidir. Yönetişim \"idarə heyəti tərəfindən təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırmaq, istiqamətləndirmək, idarə etmək və nəzarət etmək üçün tətbiq olunan proseslərin və strukturların birləşməsidir\" (IIA Lüğəti)."}, {"tr": "Şirketin iç denetçisi, kurumsal yönetişim konusunda yönetim kurulundan daha fazla sorumluluk taşır.", "en": "The internal auditor of a company has more responsibility than the board for the company’s corporate governance. Study Unit 6: Governance | Subunit 1: Governance Principles", "cmt_tr": "Yönetişim, yönetim kurulunun sorumluluğundadır. İç denetimin görevi yönetişim süreçlerini değerlendirmek ve iyileştirme için uygun önerilerde bulunmaktır.", "cmt_en": "Governance is the responsibility of the board. Internal audit’s responsibility is to assess governance processes and make appropriate recommendations for improvement.", "az": "Şirkətin daxili auditoru kurumsal yönetişim üçün idarə heyətindən daha çox məsuliyyət daşıyır.", "cmt_az": "Yönetişim idarə heyətinin məsuliyyətidir. İç denetimin öhdəliyi yönetişim proseslərini qiymətləndirmək və təkmilləşdirmə üçün müvafiq tövsiyələr verməkdir."}], "answer": 3, "q_az": "Kurumsal yönetişim haqqında aşağıdakı ifadələrdən hansı doğru deyil?"}, {"q_tr": "Kurumsal yönetişim hakkında aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements about organizational governance is true?", "options": [{"tr": "İç denetçi, kurumsal yönetişim için yönetim kurulundan daha fazla sorumluluk taşır.", "en": "The internal auditor has more responsibility than the board for organizational governance.", "cmt_tr": "Yönetişim yönetim kurulunun sorumluluğundadır. İç denetimin görevi yönetişim süreçlerini değerlendirmek ve iyileştirme için uygun önerilerde bulunmaktır.", "cmt_en": "Governance is the responsibility of the board. Internal audit’s responsibility is to assess governance processes and make appropriate recommendations for improvement.", "az": "Daxili auditor təşkilati yönetişim üçün idarə heyətindən daha çox məsuliyyət daşıyır.", "cmt_az": "Yönetişim idarə heyətinin məsuliyyətidir. İç denetimin öhdəliyi yönetişim proseslərini qiymətləndirmək və təkmilləşdirmə üçün müvafiq tövsiyələr verməkdir."}, {"tr": "Yönetişim işlevleri iç kaynaklıdır ancak dış kaynaklı değildir.", "en": "Governance functions are internal but not external.", "cmt_tr": "Yönetişim işlevleri iç (örn. iç denetim) ve dış (örn. dış denetim) kaynaklıdır.", "cmt_en": "Governance functions are internal (e.g., internal auditing) and external (e.g., external auditing).", "az": "Yönetişim funksiyaları daxilidir, lakin xarici deyil.", "cmt_az": "Yönetişim funksiyaları daxili (məsələn, iç denetim) və xaricidir (məsələn, xarici audit)."}, {"tr": "Yönetimin ücreti bir yönetişim sürecidir.", "en": "The compensation of management is a governance process.", "cmt_tr": "Yönetimin ücreti kontrol ortamının, özellikle insan kaynakları unsurunun bir parçasıdır. Yönetişim, risk yönetimi ve kontrol dahil olmak üzere tüm kurumsal faaliyetlere uygulanır.", "cmt_en": "Management’s compensation is part of the control environment, specifically, the human resource element. Governance applies to all organizational activities, including risk management and control.", "az": "Rəhbərliyin kompensasiyası yönetişim prosesidir.", "cmt_az": "Rəhbərliyin kompensasiyası nəzarət mühitinin, xüsusən insan resursu elementinin bir hissəsidir. Yönetişim risk idarəetməsi və nəzarət daxil olmaqla bütün təşkilati fəaliyyətlərə şamil olunur."}, {"tr": "Hisse senedi opsiyonları veya ikramiyelerden kaynaklanan hissedar servetinin seyrelmesi bir yönetişim sorunudur.", "en": "The dilution of shareholders wealth from stock options or bonuses is a governance issue.", "cmt_tr": "Hisse senedi opsiyonları veya ikramiyelerden kaynaklanan hissedar servetinin seyrelmesi bir muhasebe sorunudur. Yönetişim \"yönetim kurulu tarafından kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçlerin ve yapıların birleşimidir\" (IIA Sözlüğü).", "cmt_en": "The dilution of shareholders’ wealth resulting from stock options or bonuses is an accounting issue. Governance is “the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives” (The IIA Glossary).", "az": "Səhm opsionları və ya bonuslardan yaranan səhmdarların sərvətinin seyrəlməsi yönetişim məsələsidir.", "cmt_az": "Səhm opsionları və ya bonuslardan yaranan səhmdarların sərvətinin seyrəlməsi mühasibat məsələsidir. Yönetişim \"idarə heyəti tərəfindən təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırmaq, istiqamətləndirmək, idarə etmək və nəzarət etmək üçün tətbiq olunan proseslərin və strukturların birləşməsidir\" (IIA Lüğəti)."}], "answer": 2, "q_az": "Təşkilati yönetişim haqqında aşağıdakı ifadələrdən hansı doğrudur?"}, {"q_tr": "Yönetişimin temel bileşenleri nelerdir? 1. Stratejik yön 2. Gözetim 3. Düzenlemeler 4. Etik", "q_en": "What are the major components of governance? 1. Strategic direction 2. Oversight 3. Regulations 4. Ethics Study Unit 6: Governance | Subunit 1: Governance Principles", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "Yönetişimin temel bileşenleri stratejik yön ve gözetimdir. Stratejik yön (1) iş modelini, (2) genel hedefleri, (3) risk iştahını ve (4) kurumsal davranışın sınırlarını belirler. Gözetimin unsurları (1) üst yönetim ve yönetim kurulunun risk yönetimi faaliyetleri ve (2) iç ve dış güvence faaliyetleridir. Gözetim, risk yönetimi ve kontrollerin en çok uygulandığı bileşendir. Bu nedenle iç denetimin en çok ilgilendiği bileşendir.", "cmt_en": "The major components of governance are strategic direction and oversight. Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities. Oversight is the component to which risk management and controls are most likely to be applied. It is therefore the component with which internal auditing is most concerned.", "az": "Yalnız 1 və 2.", "cmt_az": "Yönetişimin əsas komponentləri strateji istiqamət və nəzarətdir. Strateji istiqamət (1) biznes modelini, (2) ümumi hədəfləri, (3) risk iştahasını və (4) təşkilati davranışın hədlərini müəyyən edir. Nəzarətin elementləri (1) üst rəhbərlik və idarə heyətinin risk idarəetmə fəaliyyətləri və (2) daxili və xarici güvencə fəaliyyətləridir. Nəzarət risk idarəetməsi və nəzarətlərin ən çox tətbiq olunduğu komponentdir. Buna görə də iç denetimin ən çox maraqlandığı komponentdir."}, {"tr": "Yalnızca 1, 2 ve 4.", "en": "1, 2, and 4 only.", "cmt_tr": "Etik, yönetişimin temel bileşeni değildir.", "cmt_en": "Ethics is not a major component of governance.", "az": "Yalnız 1, 2 və 4.", "cmt_az": "Etika yönetişimin əsas komponenti deyil."}, {"tr": "Yalnızca 3 ve 4.", "en": "3 and 4 only.", "cmt_tr": "Düzenlemeler ve etik yönetişimin temel bileşenleri değildir.", "cmt_en": "Regulations and ethics are not major components of governance.", "az": "Yalnız 3 və 4.", "cmt_az": "Tənzimləmələr və etika yönetişimin əsas komponentləri deyil."}, {"tr": "Yalnızca 2 ve 4.", "en": "2 and 4 only.", "cmt_tr": "Etik yönetişimin temel bileşeni değildir; stratejik yön ise temel bileşendir.", "cmt_en": "Ethics is not, and strategic direction is, a major component of governance.", "az": "Yalnız 2 və 4.", "cmt_az": "Etika yönetişimin əsas komponenti deyil, strateji istiqamət isə əsas komponentdir."}], "answer": 0, "q_az": "Yönetişimin əsas komponentləri hansılardır? 1. Strateji istiqamət 2. Nəzarət 3. Tənzimləmələr 4. Etika"}, {"q_tr": "Yönetişimin gözetim bileşeninin unsurları nelerdir? 1. İş modeli 2. Kurumsal davranışın sınırları 3. Dış güvence 4. İç denetim", "q_en": "What are the elements of the oversight component of governance? 1. The business model 2. Limits of organizational conduct 3. External assurance 4. Internal auditing", "options": [{"tr": "Yalnızca 2 ve 4.", "en": "2 and 4 only.", "cmt_tr": "Stratejik yön kurumsal davranışın sınırlarını belirler.", "cmt_en": "Strategic direction determines the limits of organizational conduct.", "az": "Yalnız 2 və 4.", "cmt_az": "Strateji istiqamət təşkilati davranışın hədlərini müəyyən edir."}, {"tr": "Yalnızca 3 ve 4.", "en": "3 and 4 only.", "cmt_tr": "Stratejik yön (1) iş modelini, (2) genel hedefleri, (3) risk iştahını ve (4) kurumsal davranışın sınırlarını belirler. Gözetimin unsurları (1) üst yönetim ve yönetim kurulunun risk yönetimi faaliyetleri ve (2) iç ve dış güvence faaliyetleridir.", "cmt_en": "Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities.", "az": "Yalnız 3 və 4.", "cmt_az": "Strateji istiqamət (1) biznes modelini, (2) ümumi hədəfləri, (3) risk iştahasını və (4) təşkilati davranışın hədlərini müəyyən edir. Nəzarətin elementləri (1) üst rəhbərlik və idarə heyətinin risk idarəetmə fəaliyyətləri və (2) daxili və xarici güvencə fəaliyyətləridir."}, {"tr": "Yalnızca 1, 2 ve 4.", "en": "1, 2, and 4 only.", "cmt_tr": "Stratejik yön iş modelini ve kurumsal davranışın sınırlarını belirler.", "cmt_en": "Strategic direction determines the business model and limits of organizational conduct.", "az": "Yalnız 1, 2 və 4.", "cmt_az": "Strateji istiqamət biznes modelini və təşkilati davranışın hədlərini müəyyən edir."}, {"tr": "1, 2, 3 ve 4.", "en": "1, 2, 3, and 4.", "cmt_tr": "Gözetimin unsurları dış güvence ve iç denetimdir.", "cmt_en": "The elements of oversight are external assurance and internal auditing. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "1, 2, 3 və 4.", "cmt_az": "Nəzarətin elementləri xarici güvencə və iç denetimdir."}], "answer": 1, "q_az": "Yönetişimin nəzarət komponentinin elementləri hansılardır? 1. Biznes modeli 2. Təşkilati davranışın hədləri 3. Xarici güvencə 4. İç denetim"}, {"q_tr": "Aşağıdakilerden hangisi yönetişim uygulamalarının amacıdır?", "q_en": "Which of the following is a purpose of governance practices?", "options": [{"tr": "Belirli paydaşların çıkarlarının yalnızca kısa vadede artırılması.", "en": "Enhancing the interests of specific stakeholders only in the short term.", "cmt_tr": "Belirli paydaşların çıkarları uzun vadede de artırılmalıdır.", "cmt_en": "The interests of specific stakeholders also should be enhanced in the long term.", "az": "Xüsusi maraqlı tərəflərin maraqlarının yalnız qısa müddətdə artırılması.", "cmt_az": "Xüsusi maraqlı tərəflərin maraqları uzun müddətdə də artırılmalıdır."}, {"tr": "Etik ilkelerin karşılanması ancak toplumun beklentilerinin değil.", "en": "Satisfying ethical principles but not society’s expectations.", "cmt_tr": "Toplumun sosyal beklentileri karşılanmalıdır.", "cmt_en": "The social expectations of society should be satisfied.", "az": "Etik prinsiplərin qarşılanması, lakin cəmiyyətin gözləntilərinin deyil.", "cmt_az": "Cəmiyyətin sosial gözləntiləri qarşılanmalıdır."}, {"tr": "Kurumsal gözetimin iç denetim fonksiyonuna devredilmesi.", "en": "Delegating organizational oversight to the internal audit function.", "cmt_tr": "Yönetim kurulu kuruluşun faaliyetlerini denetlemekten sorumludur ve bu sorumluluğu devredemez.", "cmt_en": "The board is responsible for overseeing the organization’s activities and cannot delegate this responsibility.", "az": "Təşkilati nəzarətin iç denetim funksiyasına həvalə edilməsi.", "cmt_az": "İdarə heyəti təşkilatın fəaliyyətlərinə nəzarətə məsuldur və bu məsuliyyəti həvalə edə bilməz."}, {"tr": "Kamuoyuna eksiksiz ve doğru şekilde raporlama yapmak.", "en": "Reporting fully and truthfully to the public.", "cmt_tr": "Yönetişim uygulamaları çeşitli hukuki formlar, yapılar, stratejiler ve prosedürler kullanabilir. Kuruluşun (1) yasal ve düzenleyici kurallara uyumunu; (2) genel kabul görmüş iş normlarını karşılamasını; (3) topluma genel fayda sağlamasını; ve (4) paydaşlarına eksiksiz ve doğru raporlama yapmasını sağlar.", "cmt_en": "Governance practices may use various legal forms, structures, strategies, and procedures. They ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances.", "az": "İctimaiyyətə tam və doğru hesabat vermək.", "cmt_az": "Yönetişim təcrübələri müxtəlif hüquqi formalar, strukturlar, strategiyalar və prosedurlardan istifadə edə bilər. Onlar təşkilatın (1) hüquqi və tənzimləyici qaydalara uyğunluğunu; (2) ümumi qəbul edilmiş biznes normalarını qarşılamasını; (3) cəmiyyətə ümumi fayda təmin etməsini; və (4) maraqlı tərəflərinə, o cümlədən ictimaiyyətə tam və doğru hesabat verməsini təmin edir."}], "answer": 3, "q_az": "Aşağıdakılardan hansı yönetişim təcrübələrinin məqsədidir?"}, {"q_tr": "Careful Corp. her zaman iç denetçilerine Careful Corp. ile bağlı ortaklığı Risky Corp. arasındaki işlemleri, işlemlerin adil ve şeffaf bir şekilde yürütülmesini sağlamak amacıyla inceletir. Bu uygulama aşağıdaki yönetişim ilkelerinden hangisiyle en yakından ilişkilidir?", "q_en": "Careful Corp. always has its internal auditors review transactions between Careful Corp. and its subsidiary, Risky Corp., to ensure that the transactions are carried out in a fair and transparent manner. This practice is most closely related to which of the following governance principles?", "options": [{"tr": "İlişkili taraf işlemleri ve çıkar çatışmalarının gözetimi.", "en": "Oversight of related party transactions and conflicts of interest.", "cmt_tr": "Careful Corp. ve Risky Corp. ilişkili taraflardır (ana şirket ve bağlı ortaklık). İç denetçilere aralarındaki işlemleri inceletmek, ilişkili taraf işlemleri ve çıkar çatışmalarının gözetimi yönetişim ilkesiyle en yakından ilişkilidir.", "cmt_en": "Careful Corp. and Risky Corp. are related (a parent and its subsidiary). Accordingly, having the internal auditors review transactions between Careful and Risky is most closely related to the governance principle of oversight of related party transactions and conflicts of interest.", "az": "Əlaqəli tərəf əməliyyatları və maraqların toqquşmasına nəzarət.", "cmt_az": "Careful Corp. və Risky Corp. əlaqəli tərəflərdir (ana şirkət və törəmə şirkət). Daxili auditorlara onlar arasındakı əməliyyatları nəzərdən keçirtmək əlaqəli tərəf əməliyyatları və maraqların toqquşmasına nəzarət yönetişim prinsipi ilə ən yaxından əlaqəlidir."}, {"tr": "Yönetim kurulu, yönetim ve güvence sağlayıcıları arasında etkin etkileşim.", "en": "Effective interaction among the board, management, and assurance providers.", "cmt_tr": "Bu uygulama yönetim kurulu, yönetim ve güvence sağlayıcıları arasında etkin etkileşimi içerse de başka bir yönetişim ilkesiyle en yakından ilişkilidir.", "cmt_en": "Although this practice would involve effective interaction among the board, management, and assurance providers, this practice is most closely related to another governance principle.", "az": "İdarə heyəti, rəhbərlik və güvencə təminatçıları arasında effektiv qarşılıqlı əlaqə.", "cmt_az": "Bu təcrübə idarə heyəti, rəhbərlik və güvencə təminatçıları arasında effektiv qarşılıqlı əlaqəni əhatə etsə də, başqa bir yönetişim prinsipi ilə ən yaxından əlaqəlidir."}, {"tr": "Stratejik hedeflerin gerçekleştirilmesini destekleyen kurumsal yapı.", "en": "An organizational structure that supports accomplishing strategic objectives.", "cmt_tr": "Bu uygulama kuruluşu stratejik hedeflerin gerçekleştirilmesinde mutlaka desteklemeyecektir.", "cmt_en": "This practice will not necessarily support the organization in accomplishing strategic objectives.", "az": "Strateji hədəflərin həyata keçirilməsini dəstəkləyən təşkilati struktur.", "cmt_az": "Bu təcrübə mütləq təşkilatı strateji hədəflərin həyata keçirilməsində dəstəkləməyəcək."}, {"tr": "Kurumsal ve bireysel performansı ölçmek için kullanılan kurumsal yapı.", "en": "An organizational structure used to measure organizational and individual performance.", "cmt_tr": "Bu uygulama kurumsal ve bireysel performansı ölçmeye yardımcı olmayacaktır.", "cmt_en": "This practice will not help measure organizational and individual performance. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Təşkilati və fərdi performansı ölçmək üçün istifadə olunan təşkilati struktur.", "cmt_az": "Bu təcrübə təşkilati və fərdi performansı ölçməyə kömək etməyəcək."}], "answer": 0, "q_az": "Careful Corp. həmişə daxili auditorlarına Careful Corp. ilə törəmə şirkəti Risky Corp. arasındakı əməliyyatları nəzərdən keçirtdirir ki, əməliyyatların ədalətli və şəffaf şəkildə aparıldığını təmin etsin. Bu təcrübə aşağıdakı yönetişim prinsiplərindən hansı ilə ən yaxından əlaqəlidir?"}, {"q_tr": "Aşağıdakilerden hangisi bir yönetişim ilkesiyle tutarlıdır?", "q_en": "Which of the following is consistent with a governance principle?", "options": [{"tr": "Denetim komitesi üyeleri kuruluşun yöneticileridir.", "en": "Members of the audit committee are executives of the entity.", "cmt_tr": "Yönetim kurulu bağımsız ve objektif olmalıdır.", "cmt_en": "The board should be independent and objective.", "az": "Audit komitəsinin üzvləri müəssisənin icraçılarıdır.", "cmt_az": "İdarə heyəti müstəqil və obyektiv olmalıdır."}, {"tr": "İç denetim fonksiyonu kurumsal olarak bağımsızdır.", "en": "The internal audit function is organizationally independent.", "cmt_tr": "İç ve dış denetçiler (1) bağımsızlıklarını, (2) kaynaklarının ve faaliyet alanlarının yeterliliğini ve (3) operasyonların etkinliğini sağlamak için etkin bir şekilde kullanılmalıdır.", "cmt_en": "Internal and exter
