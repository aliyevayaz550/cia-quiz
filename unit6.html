nal auditors should be used effectively to ensure (1) their independence, (2) the adequacy of their resources and the scope of their activities, and (3) the effectiveness of operations.", "az": "İç denetim funksiyası təşkilati cəhətdən müstəqildir.", "cmt_az": "Daxili və xarici auditorlardan (1) müstəqilliklərini, (2) resurslarının və fəaliyyət sahələrinin adekvatlığını və (3) əməliyyatların effektivliyini təmin etmək üçün effektiv istifadə olunmalıdır."}, {"tr": "Kuruluş açıklanmamış ilişkili taraf işlemleri yapmaktadır.", "en": "The entity engages in undisclosed related party transactions.", "cmt_tr": "Kuruluş ilişkili taraf işlemlerini denetlemelidir.", "cmt_en": "The entity should oversee related party transactions.", "az": "Müəssisə açıqlanmamış əlaqəli tərəf əməliyyatları aparır.", "cmt_az": "Müəssisə əlaqəli tərəf əməliyyatlarına nəzarət etməlidir."}, {"tr": "Muhasebe politikalarını etkileyebilen üst düzey bir yönetici kazanç hedefleri karşılandığında hisse senedi opsiyonları almaktadır.", "en": "A senior executive who can influence accounting policies receives stock options if earnings targets are met.", "cmt_tr": "Ücret politikaları kuruluşun değerleriyle tutarlı uygun davranışı teşvik etmelidir.", "cmt_en": "Compensation policies should encourage appropriate behavior consistent with the entity’s values.", "az": "Mühasibat siyasətlərinə təsir edə bilən yüksək səviyyəli icraçı qazanc hədəfləri qarşılandıqda səhm opsionları alır.", "cmt_az": "Kompensasiya siyasətləri təşkilatın dəyərləri ilə uyğun olan müvafiq davranışı təşviq etməlidir."}], "answer": 1, "q_az": "Aşağıdakılardan hansı yönetişim prinsipi ilə uyğundur?"}, {"q_tr": "Yönetişimin bir bileşeni olarak gözetim hakkında aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following statements regarding oversight as a component of governance is false?", "options": [{"tr": "Risk yönetimi faaliyetleri üst yönetim ve risk sahipleri tarafından gerçekleştirilir.", "en": "Risk management activities are performed by senior management and risk owners.", "cmt_tr": "Üst yönetim ve risk sahipleri tarafından risk yönetimi faaliyetlerinin gerçekleştirilmesi gözetimin bir unsurudur.", "cmt_en": "The performance of risk management activities by senior management and risk owners is an element of oversight.", "az": "Risk idarəetmə fəaliyyətləri üst rəhbərlik və risk sahibləri tərəfindən həyata keçirilir.", "cmt_az": "Üst rəhbərlik və risk sahibləri tərəfindən risk idarəetmə fəaliyyətlərinin həyata keçirilməsi nəzarətin elementidir."}, {"tr": "Gözetim iç ve dış güvence faaliyetlerini kapsar.", "en": "Oversight includes internal and external assurance activities.", "cmt_tr": "İç ve dış güvence faaliyetleri gözetimin unsurlarıdır.", "cmt_en": "Internal and external assurance activities are elements of oversight.", "az": "Nəzarət daxili və xarici güvencə fəaliyyətlərini əhatə edir.", "cmt_az": "Daxili və xarici güvencə fəaliyyətləri nəzarətin elementləridir."}, {"tr": "Gözetim iç denetimin en çok ilgilendiği yönetişim bileşenidir.", "en": "Oversight is the governance component with which internal auditing is most concerned.", "cmt_tr": "Gözetim iç denetimin en çok ilgilendiği yönetişim bileşenidir. Ayrıca risk yönetimi ve kontrol faaliyetlerinin en çok uygulandığı bileşendir.", "cmt_en": "Oversight is the governance component with which internal auditing is most concerned. It is also the component to which risk management and control activities are most likely to be applied.", "az": "Nəzarət iç denetimin ən çox maraqlandığı yönetişim komponentidir.", "cmt_az": "Nəzarət iç denetimin ən çox maraqlandığı yönetişim komponentidir. Həmçinin risk idarəetməsi və nəzarət fəaliyyətlərinin ən çox tətbiq olunduğu komponentdir."}, {"tr": "Gözetim genel hedefleri belirler.", "en": "Oversight determines the overall objectives.", "cmt_tr": "Gözetimin unsurları (1) üst yönetim ve yönetim kurulunun risk yönetimi faaliyetleri ve (2) iç ve dış güvence faaliyetleridir. Stratejik yön (1) iş modelini, (2) genel hedefleri, (3) risk iştahını ve (4) kurumsal davranışın sınırlarını belirler. Gözetim değil, stratejik yön genel hedefleri belirler.", "cmt_en": "The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities. Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. Strategic direction, not oversight, determines overall objectives. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Nəzarət ümumi hədəfləri müəyyən edir.", "cmt_az": "Nəzarətin elementləri (1) üst rəhbərlik və idarə heyətinin risk idarəetmə fəaliyyətləri və (2) daxili və xarici güvencə fəaliyyətləridir. Strateji istiqamət (1) biznes modelini, (2) ümumi hədəfləri, (3) risk iştahasını və (4) təşkilati davranışın hədlərini müəyyən edir. Nəzarət deyil, strateji istiqamət ümumi hədəfləri müəyyən edir."}], "answer": 3, "q_az": "Yönetişimin komponenti olan nəzarət haqqında aşağıdakı ifadələrdən hansı yalandır?"}, {"q_tr": "Stratejik yön neyi kapsar?", "q_en": "Strategic direction includes", "options": [{"tr": "Risk sahipleri tarafından gerçekleştirilen risk yönetimi faaliyetlerini.", "en": "Risk management activities performed by risk owners.", "cmt_tr": "Üst yönetim ve risk sahipleri tarafından risk yönetimi faaliyetlerinin gerçekleştirilmesi gözetimin bir unsurudur.", "cmt_en": "The performance of risk management activities by senior management and risk owners is an element of oversight.", "az": "Risk sahibləri tərəfindən həyata keçirilən risk idarəetmə fəaliyyətlərini.", "cmt_az": "Üst rəhbərlik və risk sahibləri tərəfindən risk idarəetmə fəaliyyətlərinin həyata keçirilməsi nəzarətin elementidir."}, {"tr": "Dış güvence faaliyetlerini.", "en": "External assurance activities.", "cmt_tr": "İç ve dış güvence faaliyetleri gözetimin unsurlarıdır.", "cmt_en": "Internal and external assurance activities are elements of oversight.", "az": "Xarici güvencə fəaliyyətlərini.", "cmt_az": "Daxili və xarici güvencə fəaliyyətləri nəzarətin elementləridir."}, {"tr": "İç denetimin en çok ilgilendiği yönetişim bileşenini.", "en": "The governance component with which internal auditing is most concerned.", "cmt_tr": "Gözetim iç denetimin en çok ilgilendiği yönetişim bileşenidir. Ayrıca risk yönetimi ve kontrol faaliyetlerinin en çok uygulandığı bileşendir.", "cmt_en": "Oversight is the governance component with which internal auditing is most concerned. It is also the component to which risk management and control activities are most likely to be applied.", "az": "İç denetimin ən çox maraqlandığı yönetişim komponentini.", "cmt_az": "Nəzarət iç denetimin ən çox maraqlandığı yönetişim komponentidir. Həmçinin risk idarəetməsi və nəzarət fəaliyyətlərinin ən çox tətbiq olunduğu komponentdir."}, {"tr": "Kuruluşun risk iştahını.", "en": "The organization’s risk appetite.", "cmt_tr": "Stratejik yön (1) iş modelini, (2) genel hedefleri, (3) risk iştahını ve (4) kurumsal davranışın sınırlarını belirler. Gözetimin unsurları (1) üst yönetim ve yönetim kurulunun risk yönetimi faaliyetleri ve (2) iç ve dış güvence faaliyetleridir.", "cmt_en": "Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities.", "az": "Təşkilatın risk iştahasını.", "cmt_az": "Strateji istiqamət (1) biznes modelini, (2) ümumi hədəfləri, (3) risk iştahasını və (4) təşkilati davranışın hədlərini müəyyən edir. Nəzarətin elementləri (1) üst rəhbərlik və idarə heyətinin risk idarəetmə fəaliyyətləri və (2) daxili və xarici güvencə fəaliyyətləridir."}], "answer": 3, "q_az": "Strateji istiqamət nəyi əhatə edir?"}, {"q_tr": "Aşağıdakilerden hangileri risk komitelerinin görevleridir? 1. Temel risklerin belirlenmesi 2. Risklerin risk yönetimi süreçlerine bağlanması 3. Risklerin risk sahiplerine devredilmesi", "q_en": "Which of the following are duties of risk committees? 1. Identifying key risks 2. Connecting risks to risk management processes 3. Delegating risks to risk owners", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "Risk komiteleri ayrıca riskleri risk sahiplerine devreder.", "cmt_en": "Risk committees also delegate risks to risk owners.", "az": "Yalnız 1 və 2.", "cmt_az": "Risk komitələri həmçinin riskləri risk sahiblərinə həvalə edir."}, {"tr": "Yalnızca 1.", "en": "1 only.", "cmt_tr": "Risk komiteleri ayrıca riskleri risk yönetimi süreçlerine bağlar ve risk sahiplerine devreder.", "cmt_en": "Risk committees also connect risks to risk management processes and delegate risks to risk owners.", "az": "Yalnız 1.", "cmt_az": "Risk komitələri həmçinin riskləri risk idarəetmə proseslərinə bağlayır və risk sahiblərinə həvalə edir."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "Risk komiteleri ayrıca temel riskleri belirler.", "cmt_en": "Risk committees also identify key risks.", "az": "Yalnız 2 və 3.", "cmt_az": "Risk komitələri həmçinin əsas riskləri müəyyən edir."}, {"tr": "1, 2 ve 3.", "en": "1, 2, and 3.", "cmt_tr": "Risk komitesi oluşturulabilir: • Temel riskleri belirler, • Onları risk yönetimi süreçlerine bağlar, • Onları risk sahiplerine devreder ve • Risk sahiplerine devredilen tolerans düzeylerinin kuruluşun risk iştahıyla tutarlı olup olmadığını değerlendirir.", "cmt_en": "A risk committee may be created that • Identifies key risks, • Connects them to risk management processes, Study Unit 6: Governance | Subunit 1: Governance Principles • Delegates them to risk owners, and • Considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite.", "az": "1, 2 və 3.", "cmt_az": "Risk komitəsi yaradıla bilər ki, • Əsas riskləri müəyyən etsin, • Onları risk idarəetmə proseslərinə bağlasın, • Onları risk sahiblərinə həvalə etsin, və • Risk sahiblərinə həvalə edilmiş tolerans səviyyələrinin təşkilatın risk iştahası ilə uyğun olub-olmadığını nəzərdən keçirsin."}], "answer": 3, "q_az": "Aşağıdakılardan hansı risk komitələrinin vəzifələridir? 1. Əsas risklərin müəyyən edilməsi 2. Risklərin risk idarəetmə proseslərinə bağlanması 3. Risklərin risk sahiblərinə həvalə edilməsi"}, {"q_tr": "Aşağıdakilerden hangisi kuruluşun potansiyel paydaşı olarak kabul edilir?", "q_en": "Which of the following is considered a potential stakeholder of an entity?", "options": [{"tr": "Hissedarlar.", "en": "Shareholders.", "cmt_tr": "Çalışanlar ve tedarikçiler de paydaşlardır.", "cmt_en": "Employees and suppliers are also stakeholders.", "az": "Səhmdarlar.", "cmt_az": "İşçilər və təchizatçılar da maraqlı tərəflərdir."}, {"tr": "Çalışanlar.", "en": "Employees.", "cmt_tr": "Hissedarlar ve tedarikçiler de paydaşlardır.", "cmt_en": "Shareholders and suppliers are also stakeholders.", "az": "İşçilər.", "cmt_az": "Səhmdarlar və təchizatçılar da maraqlı tərəflərdir."}, {"tr": "Tedarikçiler.", "en": "Suppliers.", "cmt_tr": "Hissedarlar ve çalışanlar da paydaşlardır.", "cmt_en": "Shareholders and employees are also stakeholders.", "az": "Təchizatçılar.", "cmt_az": "Səhmdarlar və işçilər də maraqlı tərəflərdir."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "Paydaşlar, kuruluşun faaliyetlerinden etkilenen kişi veya kuruluşlardır. Bunlar arasında hissedarlar, çalışanlar, tedarikçiler, müşteriler, kuruluşun tesislerinin komşuları ve devlet düzenleyicileri bulunur.", "cmt_en": "Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include shareholders, employees, suppliers, customers, neighbors of the entity’s facilities, and government regulators.", "az": "Bütün cavablar doğrudur.", "cmt_az": "Maraqlı tərəflər müəssisənin fəaliyyətlərindən təsirlənən şəxslər və ya qurumlardır. Digərləri arasında bunlara səhmdarlar, işçilər, təchizatçılar, müştərilər, müəssisənin obyektlərinin qonşuları və dövlət tənzimləyiciləri daxildir."}], "answer": 3, "q_az": "Aşağıdakılardan hansı müəssisənin potensial maraqlı tərəfi hesab olunur?"}, {"q_tr": "Aşağıdakilerden hangisinin kuruluşun potansiyel paydaşı olarak kabul edilme olasılığı en yüksektir?", "q_en": "Which of the following most likely are considered potential stakeholders of an entity?", "options": [{"tr": "Yakın rakipler.", "en": "Close competitors.", "cmt_tr": "Yakın rakiplerin kuruluşun tesislerinin komşularına kıyasla paydaş olma olasılığı düşüktür.", "cmt_en": "Close competitors are less likely than neighbors of an entity’s facilities to be stakeholders.", "az": "Yaxın rəqiblər.", "cmt_az": "Yaxın rəqiblərin müəssisənin obyektlərinin qonşularına nisbətən maraqlı tərəf olma ehtimalı azdır."}, {"tr": "Vergi makamları.", "en": "Tax authorities.", "cmt_tr": "Vergi makamlarının kuruluşun tesislerinin komşularına kıyasla paydaş olma olasılığı düşüktür.", "cmt_en": "Tax authorities are less likely than neighbors of an entity’s facilities to be stakeholders.", "az": "Vergi orqanları.", "cmt_az": "Vergi orqanlarının müəssisənin obyektlərinin qonşularına nisbətən maraqlı tərəf olma ehtimalı azdır."}, {"tr": "Çalışanların alacaklıları.", "en": "Creditors of employees.", "cmt_tr": "Çalışanların alacaklılarının kuruluşun tesislerinin komşularına kıyasla paydaş olma olasılığı düşüktür.", "cmt_en": "Creditors of employees are less likely than neighbors of an entity’s facilities to be stakeholders.", "az": "İşçilərin kreditorları.", "cmt_az": "İşçilərin kreditorlarının müəssisənin obyektlərinin qonşularına nisbətən maraqlı tərəf olma ehtimalı azdır."}, {"tr": "Tesislerinin komşuları.", "en": "Neighbors of its facilities.", "cmt_tr": "Paydaşlar, kuruluşun faaliyetlerinden etkilenen kişi veya kuruluşlardır. Bunlar arasında (1) hissedarlar, (2) çalışanlar, (3) tedarikçiler, (4) müşteriler, (5) kuruluşun tesislerinin komşuları ve (6) devlet düzenleyicileri bulunur.", "cmt_en": "Stakeholders are persons or entities who are affected by the activities of the entity. Among others, they include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Obyektlərinin qonşuları.", "cmt_az": "Maraqlı tərəflər müəssisənin fəaliyyətlərindən təsirlənən şəxslər və ya qurumlardır. Digərləri arasında bunlara (1) səhmdarlar, (2) işçilər, (3) təchizatçılar, (4) müştərilər, (5) müəssisənin obyektlərinin qonşuları və (6) dövlət tənzimləyiciləri daxildir."}], "answer": 3, "q_az": "Aşağıdakılardan hansının müəssisənin potensial maraqlı tərəfi hesab olunma ehtimalı ən yüksəkdir?"}, {"q_tr": "Attentive, Inc. şirketinin üç yöneticisi vardır: Albert, Bradley ve Chris. • Albert muhasebe departmanına başkanlık eder. Görevleri günlük denetimi ve yıl sonu mali tabloların hazırlanmasını kapsar. • Bradley üretimden sorumludur. Görevleri üretimin programa uygun ilerlemesini ve israfın en aza indirilmesini sağlamaktır. • Chris destek personelinden sorumludur. Görevleri işyerinin temiz kalmasını sağlamaktır. Bu uygulama aşağıdaki yönetişim ilkelerinden hangisiyle en yakından ilişkilidir?", "q_en": "Attentive, Inc., has three managers: Albert, Bradley, and Chris. • Albert is in charge of the accounting department. His duties involve the daily audit and producing the year-end financial statements. • Bradley is in charge of production. His duties involve ensuring that production stays on schedule and that waste is minimized. • Chris is in charge of support staff. His duties include ensuring that the workplace remains clean. This practice is most closely related to which of the following governance principles?", "options": [{"tr": "Açık, uygulanan sorumluluk ve hesap verebilirlik hatları.", "en": "Clear, enforced lines of responsibility and accountability.", "cmt_tr": "Albert, Bradley ve Chris farklı departmanlardan sorumludur. Bu uygulama dolayısıyla açık, uygulanan sorumluluk hatları yönetişim ilkesiyle en yakından ilişkilidir.", "cmt_en": "Albert, Bradley, and Chris are responsible for different departments. This practice is therefore most closely related to the governance principle of clear, enforced lines of responsibility.", "az": "Aydın, tətbiq olunan məsuliyyət və hesabatlılıq xətləri.", "cmt_az": "Albert, Bradley və Chris müxtəlif şöbələrə məsuldurlar. Bu təcrübə buna görə də aydın, tətbiq olunan məsuliyyət xətləri yönetişim prinsipi ilə ən yaxından əlaqəlidir."}, {"tr": "Bağımsız soruşturmalar yürütmek için yeterli uzmanlık, deneyim, yetki ve kaynağa sahip bağımsız ve objektif yönetim kurulu.", "en": "An independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries.", "cmt_tr": "Bu uygulama bağımsız soruşturmalar yürütmek için yeterli uzmanlık, deneyim, yetki ve kaynağa sahip bağımsız ve objektif bir yönetim kurulunun varlığını göstermemektedir.", "cmt_en": "This practice does not demonstrate that there is an independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries.", "az": "Müstəqil sorğular aparmaq üçün kifayət qədər təcrübə, bacarıq, səlahiyyət və resurslara malik müstəqil və obyektiv idarə heyəti.", "cmt_az": "Bu təcrübə müstəqil sorğular aparmaq üçün kifayət qədər təcrübə, bacarıq, səlahiyyət və resurslara malik müstəqil və obyektiv idarə heyətinin mövcudluğunu nümayiş etdirmir."}, {"tr": "Misilleme korkusu olmadan çalışan geri bildirimi dahil etik kültürün güçlendirilmesi.", "en": "Reinforcement of an ethical culture, including employee feedback without fear of retaliation.", "cmt_tr": "Bu uygulama misilleme korkusu olmadan çalışan geri bildirimi dahil etik kültürü güçlendirmektedir.", "cmt_en": "This practice does not reinforce an ethical culture, including employee feedback without fear of retaliation.", "az": "Qisas qorxusu olmadan işçi rəyi daxil olmaqla etik mədəniyyətin gücləndirilməsi.", "cmt_az": "Bu təcrübə qisas qorxusu olmadan işçi rəyi daxil olmaqla etik mədəniyyəti gücləndirir."}, {"tr": "Risk yönetimi politikalarının ve süreçlerinin açık tanımlanması ve uygulanması.", "en": "Clear definition and implementation of risk management policies and processes.", "cmt_tr": "Bu uygulama risk yönetimi politikalarının ve süreçlerinin açık tanımlanmasını ve uygulanmasını kolaylaştırmamaktadır.", "cmt_en": "This practice does not facilitate a clear definition and implementation of risk management policies and processes.", "az": "Risk idarəetmə siyasətlərinin və proseslərinin aydın təyini və tətbiqi.", "cmt_az": "Bu təcrübə risk idarəetmə siyasətlərinin və proseslərinin aydın təyinini və tətbiqini asanlaşdırmır."}], "answer": 0, "q_az": "Attentive, Inc. şirkətinin üç meneceri var: Albert, Bradley və Chris. • Albert mühasibat şöbəsinə rəhbərlik edir. Vəzifələri gündəlik audit və illik maliyyə hesabatlarının hazırlanmasını əhatə edir. • Bradley istehsala rəhbərlik edir. Vəzifələri istehsalın qrafikə uyğun getməsini və tullantıların minimuma endirilməsini təmin etməkdir. • Chris yardımçı heyətə rəhbərlik edir. Vəzifələri iş yerinin təmiz qalmasını təmin etməkdir. Bu təcrübə aşağıdakı yönetişim prinsiplərindən hansı ilə ən yaxından əlaqəlidir?"}, {"q_tr": "IIA tarafından tanımlandığı şekliyle yönetim kurulu", "q_en": "The board as defined by The IIA", "options": [{"tr": "Genellikle üst yöneticiler tarafından atanan bir denetim grubudur.", "en": "Ordinarily is a supervisory group appointed by senior managers.", "cmt_tr": "Yönetim kurulu genellikle bağımsız üyeler grubunu içerir.", "cmt_en": "The board ordinarily includes an independent group of directors.", "az": "Adətən üst rəhbərlər tərəfindən təyin edilən nəzarət qrupudur.", "cmt_az": "İdarə heyəti adətən müstəqil direktorlar qrupunu əhatə edir."}, {"tr": "Kuruluşun başkanı olabilir.", "en": "May be the head of the organization.", "cmt_tr": "Yönetim kurulu IIA tarafından yönetişimle görevlendirilen en üst düzey organ olarak tanımlanır; örneğin yönetim kurulu, denetim komitesi, mütevelli heyeti vb. Böyle bir grup mevcut değilse yönetim kurulu kuruluşun başkanı olabilir. Dolayısıyla yönetim kurulu yönetime genel yön ve yetkinin kaynağıdır. Ayrıca gözetim için nihai sorumluluğu taşır.", "cmt_en": "The board is defined by The IIA as the highest level body charged with governance, such as a board of directors, an audit committee, a board of governors or trustees, etc. If such a group does not exist, the board may be the head of the organization. Thus, the board is the source of overall Study Unit 6: Governance | Subunit 1: Governance Principles direction to, and the authority of, management. It also has the ultimate responsibility for oversight.", "az": "Təşkilatın rəhbəri ola bilər.", "cmt_az": "İdarə heyəti IIA tərəfindən yönetişimlə vəzifələndirilmiş ən yüksək səviyyəli orqan kimi təyin edilir, məsələn, direktorlar şurası, audit komitəsi, qəyyumlar şurası və s. Əgər belə bir qrup mövcud deyilsə, idarə heyəti təşkilatın rəhbəri ola bilər. Beləliklə, idarə heyəti rəhbərliyə ümumi istiqamət və səlahiyyətin mənbəyidir. Həmçinin nəzarət üçün son məsuliyyət daşıyır."}, {"tr": "Günlük yönetişim işlevlerini yerine getirir.", "en": "Performs day-to-day governance functions.", "cmt_tr": "Yönetim günlük yönetişim işlevlerini yerine getirir.", "cmt_en": "Management performs day-to-day governance functions.", "az": "Gündəlik yönetişim funksiyalarını yerinə yetirir.", "cmt_az": "Rəhbərlik gündəlik yönetişim funksiyalarını yerinə yetirir."}, {"tr": "Risk sahipleri için raporlama gereksinimlerini belirler.", "en": "Establishes reporting requirements for risk owners.", "cmt_tr": "Üst yönetim risk sahipleri için risk yönetimi faaliyetleriyle ilgili raporlama gereksinimlerini belirler.", "cmt_en": "Senior management establishes reporting requirements for risk owners related to their risk management activities.", "az": "Risk sahibləri üçün hesabat tələblərini müəyyən edir.", "cmt_az": "Üst rəhbərlik risk sahibləri üçün risk idarəetmə fəaliyyətləri ilə bağlı hesabat tələblərini müəyyən edir."}], "answer": 1, "q_az": "IIA tərəfindən təyin olunduğu kimi idarə heyəti"}, {"q_tr": "Bir şirketin yönetim kurulu neden sorumlu değildir?", "q_en": "The board of directors of a corporation is not responsible for", "options": [{"tr": "Yönetim kurulu üyelerinin seçilmesi veya görevden alınması.", "en": "Electing or removing directors.", "cmt_tr": "Yönetim kurulu (1) üst düzey yöneticilerin seçilmesi ve görevden alınması; (2) sermaye yapısı kararları; (3) iç tüzüğün eklenmesi, değiştirilmesi veya yürürlükten kaldırılması; (4) köklü değişikliklerin başlatılması; (5) temettülerin ilan edilmesi ve dağıtılması; (6) yönetim ücretinin belirlenmesi; (7) denetim faaliyetlerinin koordinasyonu ve (8) riskin değerlendirilmesi ve yönetilmesinden sorumludur. Ancak hissedarlar yıllık toplantıda yönetim kurulu üyelerini seçebilir veya görevden alabilir.", "cmt_en": "The board of directors is responsible for (1) selecting and removing officers; (2) making decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiating fundamental changes; (5) declaring and distributing dividends; (6) setting management compensation; (7) coordinating audit activities; and (8) evaluating and managing risk. But shareholders can elect or remove directors at the annual meeting.", "az": "Direktorların seçilməsi və ya kənarlaşdırılması.", "cmt_az": "İdarə heyəti (1) zabitlərin seçilməsi və kənarlaşdırılması; (2) kapital strukturu haqqında qərarlar; (3) daxili qaydaların əlavə edilməsi, dəyişdirilməsi və ya ləğv edilməsi; (4) əsaslı dəyişikliklərin başladılması; (5) dividendlərin elan edilməsi və paylanması; (6) rəhbərlik kompensasiyasının müəyyən edilməsi; (7) audit fəaliyyətlərinin koordinasiyası; və (8) riskin qiymətləndirilməsi və idarə edilməsinə məsuldur. Lakin səhmdarlar illik iclasda direktorları seçə və ya kənarlaşdıra bilərlər."}, {"tr": "Üst düzey yöneticilerin seçilmesi ve görevden alınması.", "en": "Selecting and removing officers.", "cmt_tr": "Yönetim kurulu üst düzey yöneticilerin seçilmesi ve görevden alınmasından sorumludur.", "cmt_en": "The board is responsible for selecting and removing officers.", "az": "Zabitlərin seçilməsi və kənarlaşdırılması.", "cmt_az": "İdarə heyəti zabitlərin seçilməsi və kənarlaşdırılmasına məsuldur."}, {"tr": "Denetim faaliyetlerinin koordinasyonu.", "en": "Coordinating audit activities.", "cmt_tr": "Yönetim kurulu denetim faaliyetlerinin koordinasyonundan sorumludur.", "cmt_en": "The board is responsible for coordinating audit activities.", "az": "Audit fəaliyyətlərinin koordinasiyası.", "cmt_az": "İdarə heyəti audit fəaliyyətlərinin koordinasiyasına məsuldur."}, {"tr": "Yönetim ücretinin belirlenmesi.", "en": "Setting management compensation.", "cmt_tr": "Yönetim kurulu yönetim ücretinin belirlenmesinden sorumludur.", "cmt_en": "The board is responsible for setting management compensation.", "az": "Rəhbərlik kompensasiyasının müəyyən edilməsi.", "cmt_az": "İdarə heyəti rəhbərlik kompensasiyasının müəyyən edilməsinə məsuldur."}], "answer": 0, "q_az": "Korporasiyanın idarə heyəti nədən məsul deyil?"}, {"q_tr": "Yönetim kurulunun iç kontrolle ilgili temel sorumluluğu nedir?", "q_en": "The board of director’s primary responsibility regarding internal control is to", "options": [{"tr": "Paydaşları ve kabul edilemez sonuçları belirlemek.", "en": "Identify stakeholders and the outcomes that are unacceptable.", "cmt_tr": "Yönetim kurulu kuruluşun paydaşları adına hareket eder. Genellikle yönetim kurulu yıllık hissedarlar toplantısında yıllık performansı ve beklenen sonuçları tartışır.", "cmt_en": "The board acts on behalf of the entity’s stakeholders. Typically, the board discusses yearly performance and expected outcomes at an annual shareholders’ meeting.", "az": "Maraqlı tərəfləri və qəbuledilməz nəticələri müəyyən etmək.", "cmt_az": "İdarə heyəti müəssisənin maraqlı tərəfləri adından fəaliyyət göstərir. Adətən, idarə heyəti illik səhmdarlar iclasında illik performansı və gözlənilən nəticələri müzakirə edir."}, {"tr": "Finansal ve operasyonel bilgilerin güvenilirliğini ve bütünlüğünü gözden geçirmek.", "en": "Review the reliability and integrity of financial and operational information.", "cmt_tr": "İç denetçiler, finansal ve operasyonel bilgilerin güvenilirliği ve bütünlüğüne ilişkin kontroller dahil kontrollerin yeterliliğini ve etkinliğini değerlendirmekten sorumludur.", "cmt_en": "Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information.", "az": "Maliyyə və əməliyyat məlumatlarının etibarlılığını və bütövlüyünü nəzərdən keçirmək.", "cmt_az": "Daxili auditorlar maliyyə və əməliyyat məlumatlarının etibarlılığı və bütövlüyü ilə bağlı nəzarətlər daxil olmaqla, nəzarətlərin adekvatlığını və effektivliyini qiymətləndirməyə məsuldurlar."}, {"tr": "Risk yönetimi sistemi kurmak.", "en": "Establish a system of risk management.", "cmt_tr": "Üst yönetimin rolü risk yönetimi ve kontrol süreçleri sisteminin kurulmasını, yönetilmesini ve değerlendirilmesini denetlemektir.", "cmt_en": "Senior management’s role is to oversee the establishment, administration, and assessment of the system of risk management and control processes. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Risk idarəetmə sistemi qurmaq.", "cmt_az": "Üst rəhbərliyin rolu risk idarəetməsi və nəzarət prosesləri sisteminin qurulmasına, idarə edilməsinə və qiymətləndirilməsinə nəzarət etməkdir."}, {"tr": "Tasarlanan kontrollerin uygulanması ve izlenmesi.", "en": "Implement and monitor controls designed.", "cmt_tr": "Yönetim kurulunun gözetim sorumlulukları vardır ancak genellikle operasyonların ayrıntılarına karışmaz.", "cmt_en": "The board has oversight responsibilities but ordinarily does not become involved in the details of operations.", "az": "Hazırlanmış nəzarətlərin tətbiqi və monitorinqi.", "cmt_az": "İdarə heyətinin nəzarət öhdəlikləri var, lakin adətən əməliyyatların detallarına qarışmır."}], "answer": 0, "q_az": "İdarə heyətinin daxili nəzarətlə bağlı əsas məsuliyyəti nədir?"}, {"q_tr": "Aşağıdakilerden hangisinin kurumsal yönetişimi etkileme olasılığı en düşüktür?", "q_en": "Which of the following is least likely to influence corporate governance?", "options": [{"tr": "Devlet düzenleyicileri.", "en": "Government regulators.", "cmt_tr": "Kurumsal yönetişim iç veya dış mekanizmalarla etkilenebilir. Dış mekanizmalar arasında yasaları ve düzenlemeleri uygulayarak yönetişimi etkileyen devlet düzenleyicileri yer alır.", "cmt_en": "Corporate governance can be influenced by internal or external mechanisms. External mechanisms include government regulators who influence corporate governance by enforcing laws and regulations.", "az": "Dövlət tənzimləyiciləri.", "cmt_az": "Kurumsal yönetişimə daxili və ya xarici mexanizmlərlə təsir göstərilə bilər. Xarici mexanizmlərə qanun və tənzimləmələri tətbiq edərək kurumsal yönetişimə təsir göstərən dövlət tənzimləyiciləri daxildir."}, {"tr": "İç denetim fonksiyonları.", "en": "Internal audit functions.", "cmt_tr": "Kurumsal yönetişim iç veya dış mekanizmalarla etkilenebilir. İç mekanizmalar arasında kuruluşun hedeflerine ulaşmasını sağlayan süreçleri ve yapıları değerlendirerek ve iyileştirerek yönetişimi etkileyen iç denetim fonksiyonları yer alır.", "cmt_en": "Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include internal audit functions, which influence corporate governance by evaluating and improving the processes and structures that enable an organization to achieve its objectives.", "az": "İç denetim funksiyaları.", "cmt_az": "Kurumsal yönetişimə daxili və ya xarici mexanizmlərlə təsir göstərilə bilər. Daxili mexanizmlərə təşkilatın hədəflərinə çatmasını təmin edən prosesləri və strukturları qiymətləndirərək və təkmilləşdirərək kurumsal yönetişimə təsir göstərən iç denetim funksiyaları daxildir."}, {"tr": "Dış hizmet sağlayıcıları.", "en": "External service providers.", "cmt_tr": "Kurumsal yönetişim iç mekanizmalarla (örn. şirket ana sözleşmeleri ve iç tüzükler, yönetim kurulları ve iç denetim fonksiyonları) ve dış mekanizmalarla (örn. yasalar, düzenlemeler ve devlet düzenleyicileri) etkilenebilir. IIA Sözlüğüne göre dış hizmet sağlayıcısı, belirli bir alanda özel bilgi, beceri ve deneyime sahip kuruluş dışından bir kişi veya firmadır. Dış olmasına rağmen dış hizmet sağlayıcısının kurumsal yönetişimi etkileme olasılığı en düşüktür.", "cmt_en": "Corporate governance can be influenced by internal mechanisms (e.g., corporate charters and bylaws, boards of directors, and internal audit functions) and by external mechanisms (e.g., laws, regulations, and the government regulators who enforce them). As defined by The IIA Glossary, an external service provider is a person or firm outside of the organization that has special knowledge, skill, and experience in a particular discipline. Though external, an external service provider is least likely to influence corporate governance. Instead, they are relied upon to supplement the internal audit function when internal audit staff lack necessary knowledge, skill, or experience.", "az": "Xarici xidmət təminatçıları.", "cmt_az": "Kurumsal yönetişimə daxili mexanizmlərlə (məsələn, şirkət nizamnamələri və daxili qaydalar, direktorlar şurası və iç denetim funksiyaları) və xarici mexanizmlərlə (məsələn, qanunlar, tənzimləmələr və dövlət tənzimləyiciləri) təsir göstərilə bilər. IIA Lüğətinə görə, xarici xidmət təminatçısı müəyyən bir sahədə xüsusi bilik, bacarıq və təcrübəyə malik olan təşkilatdan kənar şəxs və ya firmadır. Xarici olsa da, xarici xidmət təminatçısının kurumsal yönetişimə təsir göstərmə ehtimalı ən azdır."}, {"tr": "Şirket ana sözleşmeleri ve iç tüzükler.", "en": "Corporate charters and bylaws.", "cmt_tr": "Kurumsal yönetişim iç veya dış mekanizmalarla etkilenebilir. İç mekanizmalar arasında yapılar ve politikalar oluşturarak yönetişimi etkileyen şirket ana sözleşmeleri ve iç tüzükler yer alır.", "cmt_en": "Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include corporate charters and bylaws, which influence corporate governance by establishing structures and policies.", "az": "Şirkət nizamnamələri və daxili qaydalar.", "cmt_az": "Kurumsal yönetişimə daxili və ya xarici mexanizmlərlə təsir göstərilə bilər. Daxili mexanizmlərə strukturlar və siyasətlər quraraq kurumsal yönetişimə təsir göstərən şirkət nizamnamələri və daxili qaydalar daxildir."}], "answer": 2, "q_az": "Aşağıdakılardan hansının kurumsal yönetişimə təsir göstərmə ehtimalı ən azdır?"}, {"q_tr": "Standartlara göre yönetişim", "q_en": "According to the Standards, governance is", "options": [{"tr": "Kuruluşun hedeflerine ulaşılmasına ilişkin makul güvence sağlamak için potansiyel olay veya durumları belirleme, değerlendirme, yönetme ve kontrol etme sürecidir.", "en": "A process to identify, assess, manage, and control potential events or situations to provide reasonable assurance regarding the achievement of the organization’s objectives.", "cmt_tr": "Bu ifade IIA Sözlüğüne göre risk yönetimini tanımlar.", "cmt_en": "This statement defines risk management according to The IIA Glossary.", "az": "Təşkilatın hədəflərinə çatılmasına dair ağlabatan güvencə təmin etmək üçün potensial hadisə və ya vəziyyətləri müəyyən etmək, qiymətləndirmək, idarə etmək və nəzarət etmək prosesidir.", "cmt_az": "Bu ifadə IIA Lüğətinə görə risk idarəetməsini təyin edir."}, {"tr": "Yönetim kurulu tarafından kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçlerin ve yapıların birleşimidir.", "en": "The combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.", "cmt_tr": "Yönetişim IIA Sözlüğünde \"yönetim kurulu tarafından kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirmek, yönlendirmek, yönetmek ve izlemek için uygulanan süreçlerin ve yapıların birleşimi\" olarak tanımlanır.", "cmt_en": "Governance is defined in The IIA Glossary as the “combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.”", "az": "İdarə heyəti tərəfindən təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırmaq, istiqamətləndirmək, idarə etmək və nəzarət etmək üçün tətbiq olunan proseslərin və strukturların birləşməsidir.", "cmt_az": "Yönetişim IIA Lüğətində \"idarə heyəti tərəfindən təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırmaq, istiqamətləndirmək, idarə etmək və nəzarət etmək üçün tətbiq olunan proseslərin və strukturların birləşməsi\" kimi təyin edilir."}, {"tr": "Kuruluşun bilgi teknolojisinin stratejilerini ve hedeflerini desteklemesini sağlayan liderlik, kurumsal yapılar ve süreçlerdir.", "en": "The leadership, organizational structures, and processes that ensure the organization’s information technology supports its strategies and objectives. Study Unit 6: Governance | Subunit 1: Governance Principles", "cmt_tr": "Bu ifade özellikle BT yönetişimini tanımlar.", "cmt_en": "This statement specifically describes IT governance.", "az": "Təşkilatın informasiya texnologiyasının strategiya və hədəflərini dəstəkləməsini təmin edən liderlik, təşkilati strukturlar və proseslərdir.", "cmt_az": "Bu ifadə xüsusi olaraq İT yönetişimini təsvir edir."}, {"tr": "Yönetişimle görevlendirilen, kuruluşun faaliyetlerini yönlendirmek ve/veya denetlemek ve üst yönetimi sorumlu tutmak için en üst düzey organdır.", "en": "The highest level body charged with governance, to direct and or oversee the organization’s activities and hold senior management accountable.", "cmt_tr": "Bu ifade kısmen IIA Sözlüğüne göre yönetim kurulunu tanımlar.", "cmt_en": "The statement defines, in part, board according to The IIA Glossary.", "az": "Yönetişimlə vəzifələndirilmiş, təşkilatın fəaliyyətlərini istiqamətləndirmək və/və ya nəzarət etmək və üst rəhbərliyi məsul tutmaq üçün ən yüksək səviyyəli orqandır.", "cmt_az": "Bu ifadə qismən IIA Lüğətinə görə idarə heyətini təyin edir."}], "answer": 1, "q_az": "Standartlara görə, yönetişim"}, {"q_tr": "Yönetişim hakkında aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements is correct regarding governance?", "options": [{"tr": "Yönetişim modelleri çerçeve halka açık şirketlerin süreçlerine veya sistemlerine göre modellendiğinde en etkindir.", "en": "Governance models are most effective when the framework is modeled after publicly traded companies’ processes or systems.", "cmt_tr": "Yönetişim gereksinimleri kuruluş türüne ve düzenleyici yetki alanına göre değişir. Etkin yönetişimin tasarımı ve uygulaması kuruluşların büyüklüğü ve karmaşıklığı ile yetki alanlarının yasal ve düzenleyici gereksinimleriyle değişir.", "cmt_en": "Governance requirements vary by entity type and regulatory jurisdiction. The design and practice of effective governance vary with the size and complexity of the organizations, along with the legal and regulatory requirements of the jurisdiction.", "az": "Yönetişim modelləri çərçivə açıq ticarət olunan şirkətlərin prosesləri və ya sistemlərinə uyğunlaşdırıldıqda ən effektivdir.", "cmt_az": "Yönetişim tələbləri müəssisə növü və tənzimləyici yurisdiksiyaya görə dəyişir. Effektiv yönetişimin dizaynı və tətbiqi təşkilatların ölçüsü və mürəkkəbliyi, həmçinin yurisdiksiyaların hüquqi və tənzimləyici tələbləri ilə dəyişir."}, {"tr": "Yönetişim, kuruluşun yönetimi, yönetim kurulu, hissedarları ve diğer paydaşları arasında bir dizi ilişkiyi kapsar.", "en": "Governance involves a set of relationships between an organization’s management, board, shareholders, and other stakeholders.", "cmt_tr": "Ekonomik İşbirliği ve Kalkınma Örgütü (OECD) tarafından verilen küresel olarak kabul gören kurumsal yönetişim tanımı şöyle belirtir: \"Kurumsal yönetişim, bir şirketin yönetimi, yönetim kurulu, hissedarları ve diğer paydaşları arasında bir dizi ilişkiyi kapsar. Kurumsal yönetişim ayrıca şirketin hedeflerinin belirlendiği ve bu hedeflere ulaşma araçları ile performans izlemenin belirlendiği yapıyı sağlar.\"", "cmt_en": "The globally accepted definition of corporate governance given by the Organization for Economic Co-operation and Development (OECD) states, “Corporate governance involves a set of relationships between a company’s management, its board, its shareholders, and other stakeholders. Corporate governance also provides the structure through which the objectives of the company are set, and the means of attaining those objectives and monitoring performance are determined.”", "az": "Yönetişim təşkilatın rəhbərliyi, idarə heyəti, səhmdarları və digər maraqlı tərəfləri arasında münasibətlər toplusunu əhatə edir.", "cmt_az": "İqtisadi Əməkdaşlıq və İnkişaf Təşkilatı (OECD) tərəfindən verilən qlobal qəbul edilmiş kurumsal yönetişim tərifi bildirir: \"Kurumsal yönetişim şirkətin rəhbərliyi, idarə heyəti, səhmdarları və digər maraqlı tərəfləri arasında münasibətlər toplusunu əhatə edir. Kurumsal yönetişim həmçinin şirkətin hədəflərinin müəyyən edildiyi və bu hədəflərə çatma vasitələri və performansın monitorinqinin müəyyən edildiyi strukturu təmin edir.\""}, {"tr": "Yönetişim kurumsal kültürden bağımsızdır.", "en": "Governance is independent of organizational culture.", "cmt_tr": "Yönetişim uygulamaları kuruluşun benzersiz kültürünü yansıtır ve etkinlik için büyük ölçüde ona bağlıdır.", "cmt_en": "Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness.", "az": "Yönetişim təşkilati mədəniyyətdən müstəqildir.", "cmt_az": "Yönetişim təcrübələri təşkilatın unikal mədəniyyətini əks etdirir və effektivlik üçün əsasən ona bağlıdır."}, {"tr": "Yönetişim, risk yönetimi ve kontrolden ayrı, farklı bir süreç ve yapı olarak mevcuttur.", "en": "Governance exists as a distinct process and structure separate from risk management and control.", "cmt_tr": "Yönetişim risk yönetimi ve kontrolden bağımsız olarak mevcut değildir. Aksine yönetişim, risk yönetimi ve kontrol birbiriyle yakından ilişkilidir. Etkin yönetişim strateji belirlerken riski göz önünde bulundurur ve risk yönetimi etkin yönetişime dayanır.", "cmt_en": "Governance does not exist independently of risk management and control. Rather, governance, risk management, and control are closely related. Effective governance considers risk when setting strategy, and risk management relies on effective governance. Additionally, effective governance relies on controls and communication to the board on their effectiveness. Control and risk are also related as controls manage risks. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Yönetişim risk idarəetməsi və nəzarətdən ayrı, fərqli bir proses və struktur kimi mövcuddur.", "cmt_az": "Yönetişim risk idarəetməsi və nəzarətdən müstəqil mövcud deyil. Əksinə, yönetişim, risk idarəetməsi və nəzarət bir-birilə sıx əlaqəlidir. Effektiv yönetişim strategiya müəyyən edərkən riski nəzərə alır və risk idarəetməsi effektiv yönetişimə arxalanır."}], "answer": 1, "q_az": "Yönetişim haqqında aşağıdakı ifadələrdən hansı doğrudur?"}, {"q_tr": "Yönetişimin en az muhtemel amacı hangisidir?", "q_en": "Which of the following is the least likely purpose of governance?", "options": [{"tr": "Devlet düzenleyicilerini etkilemek.", "en": "Influence government regulators.", "cmt_tr": "Yönetişim, kuruluşun hedeflerine ulaşmak için kurumsal faaliyetleri optimize etmekle ilgilenir. Devlet düzenleyicileri yönetişimi etkilese de bu etkiye karşılık vermek yönetişimin temel amacı değildir.", "cmt_en": "Governance is concerned with optimizing organizational activities to achieve the organization’s objectives. Thus, its primary purposes are to inform, direct, manage, and monitor “internal” activities. Although government regulators influence governance, reciprocating such influence is not a primary purpose of governance.", "az": "Dövlət tənzimləyicilərinə təsir göstərmək.", "cmt_az": "Yönetişim təşkilatın hədəflərinə çatmaq üçün təşkilati fəaliyyətləri optimallaşdırmaqla məşğuldur. Dövlət tənzimləyiciləri yönetişimə təsir göstərsə də, belə təsirə qarşılıq vermək yönetişimin əsas məqsədi deyildir."}, {"tr": "Uygun yapılar oluşturmak.", "en": "Establish appropriate structures.", "cmt_tr": "Yönetişimin amacı kurumsal hedeflere ulaşmak için gerekli yapıları oluşturmaktır.", "cmt_en": "A purpose of governance is to establish necessary structures to achieve organizational objectives.", "az": "Müvafiq strukturlar qurmaq.", "cmt_az": "Yönetişimin məqsədi təşkilati hədəflərə çatmaq üçün zəruri strukturlar qurmaqdır."}, {"tr": "Kuruluşa yön vermek.", "en": "Provide direction to the organization.", "cmt_tr": "Yönetişim kuruluşun faaliyetlerini hedeflerine ulaşma yönünde bilgilendirir, yönlendirir, yönetir ve izler.", "cmt_en": "Governance informs, directs, manages, and monitors the activities of the organization toward the achievement of its objectives.", "az": "Təşkilata istiqamət vermək.", "cmt_az": "Yönetişim təşkilatın fəaliyyətlərini hədəflərinə çatmaq istiqamətində məlumatlandırır, istiqamətləndirir, idarə edir və nəzarət edir."}, {"tr": "Uygun süreçler oluşturmak.", "en": "Establish appropriate processes.", "cmt_tr": "Yönetişimin amacı kurumsal hedeflere ulaşmak için gerekli süreçleri oluşturmaktır.", "cmt_en": "A purpose of governance is to establish necessary processes to achieve organizational objectives.", "az": "Müvafiq proseslər qurmaq.", "cmt_az": "Yönetişimin məqsədi təşkilati hədəflərə çatmaq üçün zəruri proseslər qurmaqdır."}], "answer": 0, "q_az": "Yönetişimin ən az ehtimal olunan məqsədi hansıdır?"}, {"q_tr": "Risk sahipleri aşağıdakilerden hangisinden sorumludur? I. Kuruluşun risk yönetimi faaliyetlerini tasarlandığı şekilde yürütme kapasitesinin değerlendirilmesi. II. Paydaşların beklentileri ve kabul edilemez sonuçların belirlenmesi. III. İzleme faaliyetlerinin oluşturulması. IV. Raporlanacak bilgilerin doğru, zamanında ve erişilebilir olmasının sağlanması.", "q_en": "Risk owners are responsible for which of the following? I. Evaluating the organization’s ability to carry out risk management activities as designed. II. Determining the expectations of stakeholders and the outcomes that are unacceptable. III. Establishing monitoring activities. IV. Ensuring that information to be reported is accurate, timely, and available.", "options": [{"tr": "Yalnızca I ve II.", "en": "I and II only.", "cmt_tr": "Yönetim kurulu paydaşların beklentilerini ve kabul edilemez sonuçları belirler.", "cmt_en": "The board determines the expectations of stakeholders and the outcomes that are unacceptable.", "az": "Yalnız I və II.", "cmt_az": "İdarə heyəti maraqlı tərəflərin gözləntilərini və qəbuledilməz nəticələri müəyyən edir."}, {"tr": "Yalnızca I ve III.", "en": "I and III only.", "cmt_tr": "Risk sahipleri ayrıca üst yönetime ve yönetim kuruluna raporlanacak bilgilerin doğru, zamanında ve erişilebilir olmasını sağlamaktan sorumludur.", "cmt_en": "Risk owners also are responsible for ensuring that information to be reported to senior management and the board is accurate, timely, and available.", "az": "Yalnız I və III.", "cmt_az": "Risk sahibləri həmçinin üst rəhbərliyə və idarə heyətinə hesabat veriləcək məlumatların dəqiq, vaxtında və əlçatan olmasını təmin etməyə məsuldurlar."}, {"tr": "Yalnızca I, III ve IV.", "en": "I, III, and IV only.", "cmt_tr": "Risk sahipleri (1) risk yönetimi faaliyetlerinin tasarımının yeterliliğini ve kuruluşun bunları tasarlandığı şekilde yürütme kapasitesini değerlendirmekten; (2) risk yönetimi faaliyetlerinin tasarlandığı şekilde işleyip işlemediğini belirlemekten; (3) izleme faaliyetleri oluşturmaktan; ve (4) üst yönetime ve yönetim kuruluna raporlanacak bilgilerin doğru, zamanında ve erişilebilir olmasını sağlamaktan sorumludur.", "cmt_en": "Risk owners are responsible for (1) evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed; (2) determining whether risk management activities are operating as designed; (3) establishing monitoring activities; and (4) ensuring that information to be reported to senior management and the board is accurate, timely, and available. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Yalnız I, III və IV.", "cmt_az": "Risk sahibləri (1) risk idarəetmə fəaliyyətlərinin dizaynının adekvatlığını və təşkilatın onları planlaşdırıldığı kimi həyata keçirmə qabiliyyətini qiymətləndirməyə; (2) risk idarəetmə fəaliyyətlərinin planlaşdırıldığı kimi işləyib-işləmədiyini müəyyən etməyə; (3) monitorinq fəaliyyətləri qurmağa; və (4) üst rəhbərliyə və idarə heyətinə hesabat veriləcək məlumatların dəqiq, vaxtında və əlçatan olmasını təmin etməyə məsuldurlar."}, {"tr": "Yalnızca III ve IV.", "en": "III and IV only.", "cmt_tr": "Risk sahipleri ayrıca risk yönetimi faaliyetlerinin tasarımının yeterliliğini ve kuruluşun bunları tasarlandığı şekilde yürütme kapasitesini değerlendirmekten sorumludur.", "cmt_en": "Risk owners also are responsible for evaluating the adequacy of the design of risk management activities and the organization’s ability to carry them out as designed.", "az": "Yalnız III və IV.", "cmt_az": "Risk sahibləri həmçinin risk idarəetmə fəaliyyətlərinin dizaynının adekvatlığını və təşkilatın onları planlaşdırıldığı kimi həyata keçirmə qabiliyyətini qiymətləndirməyə məsuldurlar."}], "answer": 2, "q_az": "Risk sahibləri aşağıdakılardan hansına məsuldurlar? I. Təşkilatın risk idarəetmə fəaliyyətlərini planlaşdırıldığı kimi həyata keçirmə qabiliyyətinin qiymətləndirilməsi. II. Maraqlı tərəflərin gözləntiləri və qəbuledilməz nəticələrin müəyyən edilməsi. III. Monitorinq fəaliyyətlərinin qurulması. IV. Hesabat veriləcək məlumatların dəqiq, vaxtında və əlçatan olmasının təmin edilməsi."}, {"q_tr": "Kuruluş için köklü değişikliklerin başlatılmasından hangi grup sorumludur?", "q_en": "Which group is responsible for the initiation of fundamental changes for the organization?", "options": [{"tr": "Üst yönetim.", "en": "Senior management.", "cmt_tr": "Üst yönetim günlük yönetişim işlevlerini yerine getirir ve kuruluşun hedeflerine ulaşmak için yönetim kurulu direktiflerini uygular. Üst yönetim köklü değişikliklerin başlatılmasından sorumlu değildir.", "cmt_en": "Senior management performs day-to-day governance functions and carries out the board’s directives to achieve the organization’s objectives. Senior management is not responsible for the initiation of fundamental changes for the organization.", "az": "Üst rəhbərlik.", "cmt_az": "Üst rəhbərlik gündəlik yönetişim funksiyalarını yerinə yetirir və təşkilatın hədəflərinə çatmaq üçün idarə heyətinin direktivlərini yerinə yetirir. Üst rəhbərlik təşkilat üçün əsaslı dəyişikliklərin başladılmasına məsul deyil."}, {"tr": "Risk komitesi.", "en": "Risk committee.", "cmt_tr": "Risk komitesi temel riskleri belirlemek ve risk sahiplerine devredilen tolerans düzeylerinin kuruluşun risk iştahıyla tutarlı olup olmadığını değerlendirmek üzere yönetim kurulu tarafından oluşturulabilir.", "cmt_en": "A risk committee may be created by the board to identify key risks and to consider whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite.", "az": "Risk komitəsi.", "cmt_az": "Risk komitəsi əsas riskləri müəyyən etmək və risk sahiblərinə həvalə edilmiş tolerans səviyyələrinin təşkilatın risk iştahası ilə uyğun olub-olmadığını nəzərdən keçirmək üçün idarə heyəti tərəfindən yaradıla bilər."}, {"tr": "İç denetim fonksiyonu.", "en": "Internal audit function.", "cmt_tr": "İç denetim fonksiyonunun rolü yönetişim sisteminin olgunluğuna bağlıdır. Daha az olgun bir sistemde iç denetim fonksiyonu politikalara, prosedürlere ve yasalara uyumu vurgular. Daha olgun bir yönetişim sisteminde iç denetim fonksiyonunun vurgusu yapı ve uygulamaları optimize etmektir.", "cmt_en": "The role of the internal audit function depends on the maturity of the governance system. In a less mature system, the internal audit function emphasizes compliance with policies, procedures, and laws. In a more mature governance system, the internal audit function’s emphasis is on optimizing structure and practices. The internal audit function is not responsible for the initiation of fundamental changes for the organization.", "az": "İç denetim funksiyası.", "cmt_az": "İç denetim funksiyasının rolu yönetişim sisteminin yetkinliyindən asılıdır. Daha az yetkin sistemdə iç denetim funksiyası siyasətlərə, prosedurlara və qanunlara uyğunluğu vurğulayır. Daha yetkin yönetişim sistemində iç denetim funksiyasının vurğusu struktur və təcrübələri optimallaşdırmaqdır."}, {"tr": "Yönetim kurulu.", "en": "Board of directors.", "cmt_tr": "Yönetim kurulu yönetime genel yön ve yetkinin kaynağıdır ve gözetim için nihai sorumluluğu taşır. Yönetim kurulunun görevleri arasında (1) üst düzey yöneticilerin seçilmesi ve görevden alınması; (2) sermaye yapısı kararları; (3) iç tüzüğün değiştirilmesi; (4) köklü değişikliklerin başlatılması; (5) temettülerin ilan edilmesi; (6) yönetim ücretinin belirlenmesi; (7) denetim faaliyetlerinin koordinasyonu ve (8) riskin değerlendirilmesi ve yönetilmesi yer alır.", "cmt_en": "The board of directors is the source of overall direction to, and the authority of, management and has the ultimate responsibility for oversight. The board has the following duties: (1) selection and removal of officers; (2) decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiation of fundamental changes; (5) decisions to declare and distribute dividends; (6) setting of management compensation; (7) coordinating audit activities; and (8) evaluating and managing risk. Initiation of fundamental changes for the organization includes mergers and acquisitions.", "az": "Direktorlar şurası.", "cmt_az": "Direktorlar şurası rəhbərliyə ümumi istiqamət və səlahiyyətin mənbəyidir və nəzarət üçün son məsuliyyət daşıyır. İdarə heyətinin vəzifələrinə (1) zabitlərin seçilməsi və kənarlaşdırılması; (2) kapital strukturu haqqında qərarlar; (3) daxili qaydaların əlavə edilməsi, dəyişdirilməsi və ya ləğv edilməsi; (4) əsaslı dəyişikliklərin başladılması; (5) dividendlərin elan edilməsi; (6) rəhbərlik kompensasiyasının müəyyən edilməsi; (7) audit fəaliyyətlərinin koordinasiyası; və (8) riskin qiymətləndirilməsi və idarə edilməsi daxildir."}], "answer": 3, "q_az": "Təşkilat üçün əsaslı dəyişikliklərin başladılmasına hansı qrup məsuldur?"}, {"q_tr": "Kurumsal yönetişimi en çok etkileme olasılığı olan nedir?", "q_en": "Corporate governance is most likely to be influenced by", "options": [{"tr": "İç denetim fonksiyonu.", "en": "The internal audit function.", "cmt_tr": "Kurumsal yönetişim iç veya dış mekanizmalarla etkilenebilir. İç mekanizmalar arasında kuruluşun hedeflerine ulaşmasını sağlayan süreçleri ve yapıları değerlendirerek ve iyileştirerek yönetişimi etkileyen iç denetim fonksiyonları yer alır.", "cmt_en": "Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include internal audit functions, which influence corporate governance by evaluating and improving the processes and structures that enable an organization to achieve its objectives. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "İç denetim funksiyası.", "cmt_az": "Kurumsal yönetişimə daxili və ya xarici mexanizmlərlə təsir göstərilə bilər. Daxili mexanizmlərə təşkilatın hədəflərinə çatmasını təmin edən prosesləri və strukturları qiymətləndirərək və təkmilləşdirərək kurumsal yönetişimə təsir göstərən iç denetim funksiyaları daxildir."}, {"tr": "Dış hizmet sağlayıcıları.", "en": "External service providers.", "cmt_tr": "Dış hizmet sağlayıcıları, iç denetim personeli gerekli bilgi, beceri veya deneyimden yoksun olduğunda iç denetim fonksiyonunu desteklemek için kullanılır.", "cmt_en": "External service providers are relied upon to supplement the internal audit function when internal audit staff lack necessary knowledge, skill, or experience.", "az": "Xarici xidmət təminatçıları.", "cmt_az": "Xarici xidmət təminatçıları daxili audit heyəti zəruri bilik, bacarıq və ya təcrübədən məhrum olduqda iç denetim funksiyasını tamamlamaq üçün istifadə olunur."}, {"tr": "Rakipler.", "en": "Competitors.", "cmt_tr": "Rakipler kuruluşun faaliyetlerini etkiler ancak yönetişim süreçlerini ve yapılarını etkileme olasılığı düşüktür.", "cmt_en": "Competitors influence an organization’s actions but are less likely to influence its governance processes and structures.", "az": "Rəqiblər.", "cmt_az": "Rəqiblər təşkilatın fəaliyyətlərinə təsir göstərir, lakin onun yönetişim prosesləri və strukturlarına təsir göstərmə ehtimalı azdır."}, {"tr": "Müşteriler.", "en": "Customers.", "cmt_tr": "Müşteriler kuruluşun paydaşları arasındadır ancak yönetişim süreçlerini ve yapılarını etkileme olasılığı düşüktür.", "cmt_en": "Customers are among an organization’s stakeholders but are unlikely to influence its governance processes and structures.", "az": "Müştərilər.", "cmt_az": "Müştərilər təşkilatın maraqlı tərəfləri arasındadır, lakin onun yönetişim prosesləri və strukturlarına təsir göstərmə ehtimalı azdır."}], "answer": 0, "q_az": "Kurumsal yönetişimə ən çox təsir göstərmə ehtimalı olan nədir?"}, {"q_tr": "Kurumsal yönetişim en çok kiminle ilişkileri kapsar?", "q_en": "Corporate governance most likely involves relationships with", "options": [{"tr": "Dış paydaşlar ancak iç paydaşlar değil.", "en": "External but not internal stakeholders.", "cmt_tr": "İç paydaşlar arasında hissedarlar ve çalışanlar yer alır.", "cmt_en": "Internal stakeholders include shareholders and employees.", "az": "Xarici, lakin daxili maraqlı tərəflər deyil.", "cmt_az": "Daxili maraqlı tərəflərə səhmdarlar və işçilər daxildir."}, {"tr": "Rakipler.", "en": "Competitors.", "cmt_tr": "Rakipler genellikle kuruluşun faaliyetlerinden çalışanlara kıyasla daha az etkilenir.", "cmt_en": "Competitors generally are less affected by the organization’s actions than employees.", "az": "Rəqiblər.", "cmt_az": "Rəqiblər ümumiyyətlə təşkilatın fəaliyyətlərindən işçilərə nisbətən daha az təsirlənir."}, {"tr": "Çalışanlar.", "en": "Employees.", "cmt_tr": "Paydaşlar, kuruluşun faaliyetlerinden etkilenen kişi veya kuruluşlardır. Bunlar arasında (1) hissedarlar, (2) çalışanlar, (3) tedarikçiler, (4) müşteriler, (5) kuruluşun tesislerinin komşuları ve (6) devlet düzenleyicileri yer alır.", "cmt_en": "Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators.", "az": "İşçilər.", "cmt_az": "Maraqlı tərəflər müəssisənin fəaliyyətlərindən təsirlənən şəxslər və ya qurumlardır. Digərləri arasında bunlara (1) səhmdarlar, (2) işçilər, (3) təchizatçılar, (4) müştərilər, (5) müəssisənin obyektlərinin qonşuları və (6) dövlət tənzimləyiciləri daxildir."}, {"tr": "Şirket ana sözleşmeleri ve iç tüzükler.", "en": "Corporate charters and bylaws.", "cmt_tr": "Yönetişimi etkileyen iç mekanizmalar arasında şirket ana sözleşmeleri ve iç tüzükler yer alır. Ancak yönetişim ilişkileri kuruluşun faaliyetlerinden etkilenen kişi ve kuruluşlarla (paydaşlarla) kurulur.", "cmt_en": "Internal mechanisms that influence governance include corporate charters and bylaws. But governance relationships are with individuals and entities (stakeholders) who are affected by the organization’s actions.", "az": "Şirkət nizamnamələri və daxili qaydalar.", "cmt_az": "Yönetişimə təsir göstərən daxili mexanizmlərə şirkət nizamnamələri və daxili qaydalar daxildir. Lakin yönetişim münasibətləri təşkilatın fəaliyyətlərindən təsirlənən şəxslər və qurumlarla (maraqlı tərəflərlə) qurulur."}], "answer": 2, "q_az": "Kurumsal yönetişim ən çox kiminlə münasibətləri əhatə edir?"}, {"q_tr": "Küresel olarak kabul gören tanıma göre yönetişim", "q_en": "According to a globally accepted definition, governance", "options": [{"tr": "Kuruluşun kültürüyle eş anlamlıdır.", "en": "Is synonymous with the organization’s culture.", "cmt_tr": "Yönetişim uygulamaları kuruluşun benzersiz kültürünü yansıtır ve etkinlik için büyük ölçüde ona bağlıdır. Ancak kuruluşun tüm faaliyetleri hedeflerine ulaşmak için bilgilendirilmeli, yönlendirilmeli, yönetilmeli ve izlenmelidir.", "cmt_en": "Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. However, all activities of the organization must be informed, directed, managed, and monitored to achieve its objectives.", "az": "Təşkilatın mədəniyyəti ilə sinonimdir.", "cmt_az": "Yönetişim təcrübələri təşkilatın unikal mədəniyyətini əks etdirir və effektivlik üçün əsasən ona bağlıdır. Lakin təşkilatın bütün fəaliyyətləri hədəflərinə çatmaq üçün məlumatlandırılmalı, istiqamətləndirilməli, idarə olunmalı və nəzarət edilməlidir."}, {"tr": "Kuruluşun hedeflerine ulaşması için yapı sağlar.", "en": "Provides a structure for achieving the organization’s objectives.", "cmt_tr": "OECD tarafından verilen küresel kabul gören tanım şöyle belirtir: \"Kurumsal yönetişim, bir şirketin yönetimi, yönetim kurulu, hissedarları ve diğer paydaşları arasında bir dizi ilişkiyi kapsar. Kurumsal yönetişim ayrıca şirketin hedeflerinin belirlendiği ve bu hedeflere ulaşma araçları ile performans izlemenin belirlendiği yapıyı sağlar.\"", "cmt_en": "The globally accepted definition of corporate governance given by the Organization for Economic Co-operation and Development (OECD) states, “Corporate governance involves a set Study Unit 6: Governance | Subunit 1: Governance Principles of relationships between a company’s management, its board, its shareholders, and other stakeholders. Corporate governance also provides the structure through which the objectives of the company are set, and the means of attaining those objectives and monitoring performance are determined.”", "az": "Təşkilatın hədəflərinə çatmaq üçün struktur təmin edir.", "cmt_az": "İqtisadi Əməkdaşlıq və İnkişaf Təşkilatı (OECD) tərəfindən verilən qlobal qəbul edilmiş kurumsal yönetişim tərifi bildirir: \"Kurumsal yönetişim şirkətin rəhbərliyi, idarə heyəti, səhmdarları və digər maraqlı tərəfləri arasında münasibətlər toplusunu əhatə edir. Kurumsal yönetişim həmçinin şirkətin hədəflərinin müəyyən edildiyi və bu hədəflərə çatma vasitələri və performansın monitorinqinin müəyyən edildiyi strukturu təmin edir.\""}, {"tr": "Öncelikle risk yönetimini kapsar.", "en": "Primarily involves risk management.", "cmt_tr": "Risk yönetimi yönetişimin gerekli bir unsurudur ancak yönetişim birçok başka ilişki ve yapıyı kapsar.", "cmt_en": "Risk management is a necessary element of governance, which encompasses many other relationships and structures.", "az": "Əsasən risk idarəetməsini əhatə edir.", "cmt_az": "Risk idarəetməsi yönetişimin zəruri elementidir, lakin yönetişim bir çox digər münasibətlər və strukturları əhatə edir."}, {"tr": "Kuruluşun gözetim yöntemlerinden oluşur.", "en": "Consists of the entity’s oversight methods.", "cmt_tr": "Yönetişimin iki temel bileşeni vardır: stratejik yön ve gözetim. Stratejik yön (1) iş modelini, (2) genel hedefleri, (3) riske yaklaşımı ve (4) kurumsal davranışın sınırlarını belirler. Gözetim, risk yönetimi ve kontrol faaliyetlerinin en çok uygulandığı bileşendir.", "cmt_en": "Governance has two major components: strategic direction and oversight. Strategic direction determines (1) the business model, (2) overall objectives, (3) the approach to risk taking, and (4) the limits of organizational conduct. Oversight is the component to which risk management and control activities are most likely to be applied.", "az": "Müəssisənin nəzarət metodlarından ibarətdir.", "cmt_az": "Yönetişimin iki əsas komponenti var: strateji istiqamət və nəzarət. Strateji istiqamət (1) biznes modelini, (2) ümumi hədəfləri, (3) riskə yanaşmanı və (4) təşkilati davranışın hədlərini müəyyən edir. Nəzarət risk idarəetməsi və nəzarət fəaliyyətlərinin ən çox tətbiq olunduğu komponentdir."}], "answer": 1, "q_az": "Qlobal qəbul edilmiş tərifə görə, yönetişim"}, {"q_tr": "Aşağıdakilerden hangisi yönetişimin gözetim bileşeninin bir unsurudur?", "q_en": "Which of the following is an element of the oversight component of governance?", "options": [{"tr": "Kuruluşun risk iştahının belirlenmesi.", "en": "Determination of the organization’s risk appetite.", "cmt_tr": "Stratejik yön bileşeni riske yaklaşımı (risk iştahı dahil) belirler.", "cmt_en": "The strategic direction component determines the approach to risk (including the risk appetite).", "az": "Təşkilatın risk iştahasının müəyyən edilməsi.", "cmt_az": "Strateji istiqamət komponenti riskə yanaşmanı (risk iştahası daxil) müəyyən edir."}, {"tr": "Yönetim kurulunun şeffaflığı engelleyen yapıları anlaması.", "en": "The board’s understanding of structures that impede transparency.", "cmt_tr": "Üst yönetim ve yönetim kurulu tarafından şeffaflığı engelleyen yapılar dahil operasyonel yapının anlaşılması bir yönetişim ilkesidir.", "cmt_en": "An understanding by senior management and the board of the operating structure, including structures that impede transparency, is a governance principle.", "az": "İdarə heyətinin şəffaflığa mane olan strukturları anlaması.", "cmt_az": "Üst rəhbərlik və idarə heyəti tərəfindən şəffaflığa mane olan strukturlar daxil olmaqla əməliyyat strukturunun anlaşılması yönetişim prinsipidir."}, {"tr": "Kilit faaliyetlerin yürütülmesi için yönetim politikasının mevcudiyeti.", "en": "Existence of a governing policy for the operation of key activities.", "cmt_tr": "Kilit faaliyetlerin yürütülmesi için yönetim politikası bir yönetişim ilkesidir.", "cmt_en": "A governing policy for the operation of key activities is a governance principle.", "az": "Əsas fəaliyyətlərin idarə olunması üçün idarəetmə siyasətinin mövcudluğu.", "cmt_az": "Əsas fəaliyyətlərin idarə olunması üçün idarəetmə siyasəti yönetişim prinsipidir."}, {"tr": "Risk sahipleri tarafından gerçekleştirilen risk yönetimi.", "en": "Risk management performed by risk owners.", "cmt_tr": "Gözetim, risk yönetimi ve kontrol faaliyetlerinin en çok uygulandığı bileşendir. Gözetimin unsurları (1) üst yönetim ve risk sahipleri tarafından gerçekleştirilen risk yönetimi faaliyetleri ve (2) iç ve dış güvence faaliyetleridir.", "cmt_en": "Oversight is the component to which risk management and control activities are most likely to be applied. The elements of oversight are (1) risk management activities performed by senior management and risk owners and (2) internal and external assurance activities.", "az": "Risk sahibləri tərəfindən həyata keçirilən risk idarəetməsi.", "cmt_az": "Nəzarət risk idarəetməsi və nəzarət fəaliyyətlərinin ən çox tətbiq olunduğu komponentdir. Nəzarətin elementləri (1) üst rəhbərlik və risk sahibləri tərəfindən həyata keçirilən risk idarəetmə fəaliyyətləri və (2) daxili və xarici güvencə fəaliyyətləridir."}], "answer": 3, "q_az": "Aşağıdakılardan hansı yönetişimin nəzarət komponentinin elementidir?"}, {"q_tr": "Aşağıdakilerden hangisi en iyi şekilde bir yönetişim ilkesi olarak tanımlanır?", "q_en": "Which of the following is best defined as a governance principle?", "options": [{"tr": "İş modeli geliştirmek.", "en": "Developing a business model.", "cmt_tr": "İş modeli geliştirmek en iyi şekilde stratejik yönün bir unsuru olarak tanımlanır.", "cmt_en": "Developing a business model is best described as an element of strategic direction.", "az": "Biznes modelinin hazırlanması.", "cmt_az": "Biznes modelinin hazırlanması ən yaxşı şəkildə strateji istiqamətin elementi kimi təsvir olunur."}, {"tr": "Uygun davranışı teşvik eden ücret politikalarının hazırlanması.", "en": "Drafting compensation policies to encourage appropriate behavior.", "cmt_tr": "IIA'ya göre, özellikle üst yönetim için kuruluşun değerleri, hedefleri, stratejisi ve iç kontrolüyle tutarlı uygun davranışı teşvik eden ücret politikalarının belirlenmesi bir yönetişim ilkesidir.", "cmt_en": "According to The IIA, establishment of compensation policies, especially for senior Study Unit 6: Governance | Subunit 1: Governance Principles management, that encourage appropriate behavior consistent with the organization’s values, objectives, strategy, and internal control is a governance principle.", "az": "Müvafiq davranışı təşviq edən kompensasiya siyasətlərinin hazırlanması.", "cmt_az": "IIA-ya görə, xüsusən üst rəhbərlik üçün təşkilatın dəyərləri, hədəfləri, strategiyası və daxili nəzarəti ilə uyğun olan müvafiq davranışı təşviq edən kompensasiya siyasətlərinin müəyyən edilməsi yönetişim prinsipidir."}, {"tr": "Şirket ana sözleşmeleri ve iç tüzüklerin oluşturulması.", "en": "Creating corporate charters and bylaws.", "cmt_tr": "Şirket ana sözleşmeleri ve iç tüzükler kurumsal yönetişimi etkileyen iç mekanizmalardır.", "cmt_en": "Corporate charters and bylaws are internal mechanisms that influence corporate governance.", "az": "Şirkət nizamnamələri və daxili qaydaların yaradılması.", "cmt_az": "Şirkət nizamnamələri və daxili qaydalar kurumsal yönetişimə təsir göstərən daxili mexanizmlərdir."}, {"tr": "Risk komitesinin atanması.", "en": "Appointing a risk committee.", "cmt_tr": "Yönetim kurulu ve uzantıları (örn. denetim komitesi ve risk komitesi) kurumsal yönetişimi etkileyen iç mekanizmalardır.", "cmt_en": "The board and its extensions, e.g., the audit committee and the risk committee, are internal mechanisms that influence corporate governance.", "az": "Risk komitəsinin təyin edilməsi.", "cmt_az": "İdarə heyəti və onun genişlənmələri, məsələn, audit komitəsi və risk komitəsi kurumsal yönetişimə təsir göstərən daxili mexanizmlərdir."}], "answer": 1, "q_az": "Aşağıdakılardan hansı ən yaxşı şəkildə yönetişim prinsipi kimi təyin olunur?"}, {"q_tr": "Yönetişim sürecinde kurumsal davranışın sınırlarının belirlenmesi en doğru şekilde ne olarak nitelendirilir?", "q_en": "In the governance process, setting the limits of organizational conduct is most accurately characterized as an", "options": [{"tr": "Risk yönetimi bileşeninin unsuru.", "en": "Element of the risk management component.", "cmt_tr": "Risk yönetimi ve kontrol faaliyetleri en çok yönetişimin gözetim bileşenine uygulanır.", "cmt_en": "Risk management and control activities are most likely to be applied to the oversight component of governance.", "az": "Risk idarəetməsi komponentinin elementi.", "cmt_az": "Risk idarəetməsi və nəzarət fəaliyyətləri ən çox yönetişimin nəzarət komponentinə tətbiq olunur."}, {"tr": "Kurumsal yönetişimin iç mekanizması.", "en": "Internal mechanism of corporate governance.", "cmt_tr": "Kurumsal yönetişim iç veya dış mekanizmalarla etkilenebilir. İç mekanizmalar arasında şirket ana sözleşmeleri ve iç tüzükler, yönetim kurulları ve iç denetim fonksiyonları yer alır.", "cmt_en": "Corporate governance can be influenced by internal or external mechanisms. Internal mechanisms include corporate charters and bylaws, boards of directors, and internal audit functions.", "az": "Kurumsal yönetişimin daxili mexanizmi.", "cmt_az": "Kurumsal yönetişimə daxili və ya xarici mexanizmlərlə təsir göstərilə bilər. Daxili mexanizmlərə şirkət nizamnamələri və daxili qaydalar, direktorlar şurası və iç denetim funksiyaları daxildir."}, {"tr": "Stratejik yönün unsuru.", "en": "Element of strategic direction.", "cmt_tr": "Stratejik yön (1) iş modelini, (2) genel hedefleri, (3) riske yaklaşımı ve (4) kurumsal davranışın sınırlarını belirler.", "cmt_en": "Strategic direction determines (1) the business model, (2) overall objectives, (3) the approach to risk taking, and (4) the limits of organizational conduct.", "az": "Strateji istiqamətin elementi.", "cmt_az": "Strateji istiqamət (1) biznes modelini, (2) ümumi hədəfləri, (3) riskə yanaşmanı və (4) təşkilati davranışın hədlərini müəyyən edir."}, {"tr": "Kurumsal yönetişimin dış mekanizması.", "en": "External mechanism of corporate governance.", "cmt_tr": "Dış mekanizmalar arasında yasalar, düzenlemeler ve bunları uygulayan devlet düzenleyicileri yer alır.", "cmt_en": "External mechanisms include laws, regulations, and the government regulators who enforce them.", "az": "Kurumsal yönetişimin xarici mexanizmi.", "cmt_az": "Xarici mexanizmlərə qanunlar, tənzimləmələr və onları tətbiq edən dövlət tənzimləyiciləri daxildir."}], "answer": 2, "q_az": "Yönetişim prosesində təşkilati davranışın hədlərinin müəyyən edilməsi ən dəqiq olaraq nə kimi xarakterizə olunur?"}, {"q_tr": "Risk komiteleri yönetişim sürecinin bir parçası olabilir. Bir risk komitesinin en çok ne yapma olasılığı vardır?", "q_en": "Risk committees may be part of the governance process. A risk committee is most likely to", "options": [{"tr": "Risk toleransı ve risk iştahının tutarlı olup olmadığını değerlendirmek.", "en": "Consider whether risk tolerance and risk appetite are consistent.", "cmt_tr": "Risk komitesi oluşturulabilir: (1) temel riskleri belirler, (2) onları risk yönetimi süreçlerine bağlar, (3) onları risk sahiplerine devreder ve (4) risk sahiplerine devredilen tolerans düzeylerinin kuruluşun risk iştahıyla tutarlı olup olmadığını değerlendirir.", "cmt_en": "A risk committee may be created that (1) identifies key risks, (2) connects them with risk management processes, (3) delegates them to risk owners, and (4) considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Risk toleransı və risk iştahasının uyğun olub-olmadığını nəzərdən keçirmək.", "cmt_az": "Risk komitəsi yaradıla bilər ki, (1) əsas riskləri müəyyən etsin, (2) onları risk idarəetmə proseslərinə bağlasın, (3) onları risk sahiblərinə həvalə etsin və (4) risk sahiblərinə həvalə edilmiş tolerans səviyyələrinin təşkilatın risk iştahası ilə uyğun olub-olmadığını nəzərdən keçirsin."}, {"tr": "Risk yönetimi faaliyetlerinin tasarlandığı şekilde işleyip işlemediğini belirlemek.", "en": "Be responsible for determining whether risk management activities are functioning as designed.", "cmt_tr": "Risk sahipleri risk yönetimi faaliyetlerinin tasarlandığı şekilde işleyip işlemediğini belirlemekten sorumludur.", "cmt_en": "Risk owners are responsible for determining whether risk management activities are operating as designed.", "az": "Risk idarəetmə fəaliyyətlərinin planlaşdırıldığı kimi işləyib-işləmədiyini müəyyən etmək.", "cmt_az": "Risk sahibləri risk idarəetmə fəaliyyətlərinin planlaşdırıldığı kimi işləyib-işləmədiyini müəyyən etməyə məsuldurlar."}, {"tr": "Yönetişim süreçlerini değerlendirmek ve iyileştirmek.", "en": "Assess and improve governance processes.", "cmt_tr": "İç denetim fonksiyonu yönetişim süreçlerini değerlendirmek ve iyileştirmekten sorumludur.", "cmt_en": "The internal audit function is responsible for assessing and improving governance processes.", "az": "Yönetişim proseslərini qiymətləndirmək və təkmilləşdirmək.", "cmt_az": "İç denetim funksiyası yönetişim proseslərini qiymətləndirmək və təkmilləşdirməyə məsuldur."}, {"tr": "Kuruluşun davranış kurallarının etkinliğini değerlendirmek.", "en": "Evaluate the effectiveness of the organization’s code of conduct.", "cmt_tr": "İç denetçiler resmi davranış kurallarının ve ilgili beyan ve politikaların (dolandırıcılık ve yolsuzlukla ilgili prosedürler dahil) etkinliğini değerlendirir.", "cmt_en": "Internal auditors evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption).", "az": "Təşkilatın davranış kodeksinin effektivliyini qiymətləndirmək.", "cmt_az": "Daxili auditorlar formal davranış kodeksinin və əlaqəli bəyanat və siyasətlərin (saxtakarlıq və korrupsiya ilə bağlı prosedurlar daxil olmaqla) effektivliyini qiymətləndirir."}], "answer": 0, "q_az": "Risk komitələri yönetişim prosesinin bir hissəsi ola bilər. Risk komitəsinin ən çox nə etmə ehtimalı var?"}, {"q_tr": "Bir kuruluştaki en üst düzey yönetim organı en çok ne yapacaktır?", "q_en": "The highest level governing body in an organization is most likely to", "options": [{"tr": "Risk sahiplerini belirlemek.", "en": "Identify risk owners.", "cmt_tr": "Üst yönetim risk sahiplerini (belirli günlük görevlerden sorumlu yöneticileri) belirleme olasılığı en yüksektir.", "cmt_en": "Senior management is most likely to identify risk owners (managers responsible for specific day- to-day tasks).", "az": "Risk sahiblərini müəyyən etmək.", "cmt_az": "Üst rəhbərlik risk sahiblərini (xüsusi gündəlik vəzifələrə məsul menecerləri) müəyyən edəcək."}, {"tr": "Kurumsal kültür oluşturmak ve sürdürmek.", "en": "Establish and maintain an organizational culture.", "cmt_tr": "Üst yönetim öncelikli olarak kurumsal kültür oluşturmak ve sürdürmekten sorumludur.", "cmt_en": "Senior management is primarily responsible for establishing and maintaining an organizational culture.", "az": "Təşkilati mədəniyyət yaratmaq və qorumaq.", "cmt_az": "Üst rəhbərlik əsasən təşkilati mədəniyyət yaratmaq və qorumaqdanməsuldur."}, {"tr": "Etik davranış örneği sergilemek.", "en": "Set the example of ethical behavior.", "cmt_tr": "Üst yönetim etik davranışı teşvik etme ve örnek olma (yani üstten ton belirleme) konusunda nihai sorumluluğa sahiptir.", "cmt_en": "Senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., setting the tone at the top).", "az": "Etik davranış nümunəsi göstərmək.", "cmt_az": "Üst rəhbərlik etik davranışın təşviq edilməsi və nümunə göstərilməsi (yəni, yuxarıdan ton müəyyən etmə) üçün son məsuliyyət daşıyır."}, {"tr": "İşletme üzerinde kimin etkisi olduğunu belirlemek.", "en": "Identify who has influence over the business.", "cmt_tr": "Yönetim kurulu IIA tarafından yönetişimle görevlendirilen en üst düzey organ olarak tanımlanır. Gözetim için nihai sorumluluğu taşır. Diğer bir sorumluluğu paydaşları belirlemektir: (1) işletmeye doğrudan dahil olanlar (çalışanlar, müşteriler ve tedarikçiler), (2) dolaylı olarak dahil olanlar (yatırımcılar) veya (3) etkisi olanlar (düzenleyiciler ve rakipler).", "cmt_en": "The board is defined by The IIA as the highest level body charged with governance, such as a board of directors, an audit committee, a board of governors or trustees, etc. It also has the ultimate responsibility for oversight. Another responsibility is to identify stakeholders, whether (1) directly involved with the business (employees, customers, and suppliers), (2) indirectly involved (investors), or (3) having influence over the business (regulators and competitors).", "az": "Biznesə kimin təsir göstərdiyini müəyyən etmək.", "cmt_az": "İdarə heyəti IIA tərəfindən yönetişimlə vəzifələndirilmiş ən yüksək səviyyəli orqan kimi təyin edilir. Nəzarət üçün son məsuliyyət daşıyır. Digər öhdəliyi maraqlı tərəfləri müəyyən etməkdir – biznesə (1) birbaşa cəlb olanlar (işçilər, müştərilər və təchizatçılar), (2) dolayı cəlb olanlar (investorlar), və ya (3) təsir göstərənlər (tənzimləyicilər və rəqiblər)."}], "answer": 3, "q_az": "Təşkilatda ən yüksək səviyyəli idarəetmə orqanı ən çox nə edəcək?"}, {"q_tr": "Yönetim kurulunun en çok neden sorumlu olması muhtemeldir?", "q_en": "A board of directors is most likely to be responsible for", "options": [{"tr": "Yönetim ücretinin belirlenmesi.", "en": "Setting management compensation.", "cmt_tr": "Yönetim kurulunun görevleri arasında yönetim ücretinin belirlenmesi yer alır. Bazı durumlarda yönetim kurulunun bir alt komitesine (ücret komitesine) bu sorumluluk devredilir.", "cmt_en": "The board’s duties include setting management compensation. In some cases, a subcommittee of the board (a compensation committee) is delegated this responsibility. Study Unit 6: Governance | Subunit 1: Governance Principles", "az": "Rəhbərlik kompensasiyasının müəyyən edilməsi.", "cmt_az": "İdarə heyətinin vəzifələrinə rəhbərlik kompensasiyasının müəyyən edilməsi daxildir. Bəzi hallarda idarə heyətinin alt komitəsinə (kompensasiya komitəsinə) bu məsuliyyət həvalə edilir."}, {"tr": "Belirli risklerin nasıl yönetileceğinin belirlenmesi.", "en": "Determining how specific risks are managed.", "cmt_tr": "Belirli risklerin nasıl yönetileceğinin belirlenmesi üst yönetimin sorumluluğundadır.", "cmt_en": "Determining how specific risks are managed is a responsibility of senior management.", "az": "Xüsusi risklərin necə idarə olunacağının müəyyən edilməsi.", "cmt_az": "Xüsusi risklərin necə idarə olunacağının müəyyən edilməsi üst rəhbərliyin məsuliyyətidir."}, {"tr": "Risk sahipleri için raporlama gereksinimlerinin belirlenmesi.", "en": "Establishing reporting requirements for risk owners.", "cmt_tr": "Risk sahipleri için risk yönetimi faaliyetleriyle ilgili raporlama gereksinimlerinin belirlenmesi üst yönetimin sorumluluğundadır.", "cmt_en": "Establishing reporting requirements for risk owners related to their risk management activities is a responsibility of senior management.", "az": "Risk sahibləri üçün hesabat tələblərinin müəyyən edilməsi.", "cmt_az": "Risk sahibləri üçün risk idarəetmə fəaliyyətləri ilə bağlı hesabat tələblərinin müəyyən edilməsi üst rəhbərliyin məsuliyyətidir."}, {"tr": "Risk yönetimi faaliyetlerinin tasarımının değerlendirilmesi.", "en": "Evaluating the design of risk management activities.", "cmt_tr": "Risk yönetimi faaliyetlerinin tasarımının yeterliliğinin ve kuruluşun bunları tasarlandığı şekilde yürütme kapasitesinin değerlendirilmesi risk sahiplerinin sorumluluğundadır.",
