<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CIA Quiz">
<meta name="theme-color" content="#1a2e4a">
<title>CIA Quiz – Unit 6</title>
<style>
:root {
  --ink:       #0f1923;
  --paper:     #f8f5ef;
  --cream:     #ede8df;
  --gold:      #c9a84c;
  --gold-dim:  #8a6d2e;
  --navy:      #1a2e4a;
  --navy-mid:  #2e4d72;
  --correct:   #1a6b3c;
  --correct-bg:#d4edda;
  --wrong:     #8b1a1a;
  --wrong-bg:  #f8d7da;
  --explain-bg:#fffbf0;
  --r: 12px;
  --shadow: 0 2px 16px rgba(15,25,35,.10);
  --shadow-lg: 0 8px 32px rgba(15,25,35,.16);
  --font-head: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-ui:   -apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}


/* ── BACK TO MENU BUTTON ─────────────────────────────── */
#back-btn {
  background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.25);
  color: #fff; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-right: 8px; white-space: nowrap;
  transition: background .2s;
}
#back-btn:hover { background: rgba(255,255,255,.22); }

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
#topbar-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; max-width: 720px; margin: 0 auto;
}
#app-title {
  font-family: var(--font-head);
  font-size: 16px; font-weight: normal; letter-spacing: .4px;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#score-badge {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700; letter-spacing: .5px;
  background: var(--gold); color: var(--navy);
  border-radius: 20px; padding: 4px 12px;
  white-space: nowrap; margin-left: 12px;
}
#lang-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: rgba(255,255,255,.12); color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 6px; padding: 5px 10px; cursor: pointer;
  margin-left: 10px; transition: background .2s;
}
#lang-btn:hover { background: rgba(255,255,255,.22); }

/* ── PROGRESS ─────────────────────────────────────────── */
#progress-wrap {
  background: var(--navy); padding: 0 16px 10px;
}
#progress-inner {
  max-width: 720px; margin: 0 auto;
}
#progress-bar-bg {
  height: 4px; background: rgba(255,255,255,.18); border-radius: 4px; overflow: hidden;
}
#progress-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 4px; transition: width .4s ease;
  width: 0%;
}
#progress-label {
  font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,.55);
  margin-top: 5px; display: flex; justify-content: space-between;
}

/* ── MAIN CONTAINER ───────────────────────────────────── */
#main {
  max-width: 720px; margin: 0 auto;
  padding: 0 0 80px;
}

/* ── CHAPTER TABS ─────────────────────────────────────── */
#chapters-scroll {
  padding: 14px 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#chapters-scroll::-webkit-scrollbar { display: none; }
#chapters-inner {
  display: flex; gap: 8px;
  width: max-content;
}
.ch-btn {
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  letter-spacing: .3px;
  background: var(--cream); color: var(--navy-mid);
  border: 1.5px solid #d4cfc5;
  border-radius: 20px; padding: 6px 14px;
  cursor: pointer; white-space: nowrap;
  transition: all .2s;
  position: relative;
}
.ch-btn:hover { background: #e2dcd0; }
.ch-btn.active {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}
.ch-btn .ch-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
  background: rgba(255,255,255,.4);
}
.ch-btn.active .ch-dot { background: var(--gold); }
.ch-btn:not(.active) .ch-dot { background: #b0a890; }
.ch-done .ch-dot { background: var(--correct) !important; }

/* ── QUESTION CARD ────────────────────────────────────── */
.q-wrap {
  padding: 14px 16px 0;
}
.q-card {
  background: #fff;
  border-radius: var(--r);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #e8e2d8;
}

/* Card header: question number + text */
.q-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 18px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.q-number {
  font-family: var(--font-ui); font-size: 17px; font-weight: 800;
  color: var(--navy);
  background: var(--gold);
  border-radius: 10px;
  min-width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 0;
  letter-spacing: -.3px;
}
.q-text {
  font-family: var(--font-body); font-size: 18px; line-height: 1.5;
  color: #fff; font-weight: 600; flex: 1;
}

/* Options */
.q-options { padding: 10px 12px; display: flex; flex-direction: column; gap: 7px; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--cream); border: 1.5px solid #e0dbd2;
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left;
  transition: all .18s; position: relative;
  outline: none; -webkit-tap-highlight-color: transparent;
}
.opt-btn:hover:not(:disabled) {
  background: #e8e3d7; border-color: #c0b898;
  transform: translateX(2px);
}
.opt-label {
  font-family: var(--font-ui); font-size: 13px; font-weight: 800;
  letter-spacing: .8px; color: var(--navy-mid);
  background: rgba(46,77,114,.1);
  border-radius: 5px; padding: 3px 8px;
  min-width: 28px; text-align: center; margin-top: 2px;
  flex-shrink: 0;
}
.opt-text {
  font-family: var(--font-body); font-size: 16px; line-height: 1.45;
  color: var(--ink); flex: 1;
}
.opt-icon {
  font-size: 20px; line-height: 1; flex-shrink: 0; margin-top: 2px;
  opacity: 0; transition: opacity .2s;
}

/* States */
.opt-btn.correct {
  background: var(--correct-bg) !important;
  border-color: var(--correct) !important;
}
.opt-btn.correct .opt-label { background: var(--correct); color: #fff; }
.opt-btn.correct .opt-icon { opacity: 1; }
.opt-btn.correct .opt-text { color: var(--correct); font-weight: 600; }

.opt-btn.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong) !important;
}
.opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
.opt-btn.wrong .opt-icon { opacity: 1; }
.opt-btn.wrong .opt-text { color: var(--wrong); }

.opt-btn:disabled { cursor: default; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity: .55; }


/* Explanation accordion */
.explanation {
  background: var(--explain-bg);
  border-top: 1px solid #e8e0cc;
  padding: 0 14px;
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
}
.explanation.open {
  max-height: 300px;
  padding: 12px 14px;
}
.expl-lang {
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 5px;
}
.expl-text {
  font-family: var(--font-body); font-size: 14.5px; line-height: 1.55;
  color: #444;
}
.expl-divider {
  height: 1px; background: #e0d8c8; margin: 9px 0;
}

/* Explanation toggle arrow */
.expl-toggle {
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; cursor: pointer;
  padding: 0;
  max-height: 0; overflow: hidden;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  color: var(--gold-dim); letter-spacing: .3px;
  border-top: none;
  width: 100%;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, max-height .2s, padding .2s;
}
.expl-toggle.visible {
  opacity: 1; pointer-events: auto;
  max-height: 40px;
  padding: 10px 14px 8px;
  border-top: 1px solid #ece6da;
}
.expl-toggle svg {
  transition: transform .3s; flex-shrink: 0;
}
.expl-toggle.open svg { transform: rotate(180deg); }

/* ── CHAPTER SUMMARY CARD ─────────────────────────────── */
#summary-card {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg);
  overflow: hidden; border: 1px solid #e8e2d8;
}
#summary-card.visible { display: block; }
.summary-header {
  background: linear-gradient(135deg, #1a4a2e 0%, #2e7a50 100%);
  padding: 20px 20px;
  text-align: center;
}
.summary-header h2 {
  font-family: var(--font-head); font-size: 20px; color: #fff;
  font-weight: normal; margin-bottom: 4px;
}
.summary-header p {
  font-family: var(--font-ui); font-size: 13px;
  color: rgba(255,255,255,.7);
}
.summary-score-ring {
  display: flex; align-items: center; justify-content: center;
  margin: 20px 0 10px;
}
.ring-wrap {
  position: relative; width: 110px; height: 110px;
}
.ring-wrap svg { width: 110px; height: 110px; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: #e0d8c8; stroke-width: 8; }
.ring-fill {
  fill: none; stroke: var(--gold); stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center;
}
.ring-pct {
  font-family: var(--font-head); font-size: 26px; font-weight: bold;
  color: var(--navy); display: block; line-height: 1;
}
.ring-sub {
  font-family: var(--font-ui); font-size: 11px; color: #888; margin-top: 2px;
}
.summary-stats {
  display: flex; justify-content: space-around; padding: 0 20px 16px;
  border-bottom: 1px solid #ece6da;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-head); font-size: 24px;
  color: var(--navy); display: block;
}
.stat-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.summary-actions {
  padding: 16px 20px;
  display: flex; gap: 10px;
}
.btn-retry, .btn-next {
  flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .3px; border-radius: 9px; padding: 13px 10px;
  border: none; cursor: pointer; transition: all .2s;
}
.btn-retry {
  background: var(--cream); color: var(--navy);
  border: 1.5px solid #c8c0b0;
}
.btn-retry:hover { background: #e0d8c8; }
.btn-next {
  background: var(--navy); color: #fff;
}
.btn-next:hover { background: var(--navy-mid); }

/* ── WELCOME SCREEN ───────────────────────────────────── */
#welcome {
  padding: 40px 24px 20px;
  text-align: center;
}
#welcome h1 {
  font-family: var(--font-head); font-size: 26px; font-weight: normal;
  color: var(--navy); line-height: 1.25; margin-bottom: 10px;
}
#welcome p {
  font-family: var(--font-ui); font-size: 14px; color: #666;
  line-height: 1.55; max-width: 400px; margin: 0 auto 24px;
}
.welcome-stats {
  display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.ws-item {
  background: #fff; border: 1px solid #e0d8cc;
  border-radius: 10px; padding: 12px 18px; min-width: 90px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.ws-num {
  font-family: var(--font-head); font-size: 28px; color: var(--navy);
  display: block;
}
.ws-label {
  font-family: var(--font-ui); font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: .8px;
}
.btn-start {
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 15px; font-weight: 700;
  letter-spacing: .5px; border: none; border-radius: 10px;
  padding: 15px 40px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,46,74,.3);
  transition: all .2s;
}
.btn-start:hover { background: var(--navy-mid); transform: translateY(-1px); }

/* ── OVERALL RESULTS ──────────────────────────────────── */
#overall-result {
  display: none;
  margin: 20px 16px 0;
  background: #fff; border-radius: var(--r);
  box-shadow: var(--shadow-lg); border: 1px solid #e8e2d8;
  overflow: hidden;
}
#overall-result.visible { display: block; }
.overall-header {
  background: linear-gradient(135deg, var(--navy) 0%, #c9a84c 200%);
  padding: 24px 20px; text-align: center;
}
.overall-header h2 {
  font-family: var(--font-head); font-size: 22px; color: #fff;
  font-weight: normal;
}
.overall-header p {
  font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,.7);
  margin-top: 4px;
}
.chapter-results { padding: 16px 20px; }
.cr-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid #ece6da;
}
.cr-row:last-child { border-bottom: none; }
.cr-name {
  font-family: var(--font-ui); font-size: 13px; color: var(--navy);
  font-weight: 600; flex: 1;
}
.cr-score {
  font-family: var(--font-ui); font-size: 12px; color: #666;
  min-width: 60px; text-align: right;
}
.cr-bar-bg {
  flex: 2; height: 7px; background: var(--cream);
  border-radius: 4px; overflow: hidden;
}
.cr-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--correct), #2ea862);
  transition: width 1s ease;
}
.btn-restart {
  display: block; margin: 16px 20px 20px;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  border: none; border-radius: 9px; padding: 13px; cursor: pointer;
  width: calc(100% - 40px); text-align: center;
  transition: background .2s;
}
.btn-restart:hover { background: var(--navy-mid); }


/* ── QUESTION GRID (number nav) ──────────────────────────────────────── */
.q-grid-wrap {
  padding: 14px 14px 6px;
  border-top: 1px solid #ece6da;
}
.q-grid-label {
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase;
  color: #999; margin-bottom: 8px;
}
.q-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
}
.q-num-btn {
  width: 30px; height: 30px; border-radius: 6px; border: none;
  font-family: var(--font-ui); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: transform .1s, opacity .15s;
  display: flex; align-items: center; justify-content: center;
}
.q-num-btn:active { transform: scale(.92); }
.q-num-btn.qst-unseen  { background: #d0d0d0; color: #555; }
.q-num-btn.qst-current { background: var(--gold); color: #333; box-shadow: 0 0 0 2px var(--navy); }
.q-num-btn.qst-visited { background: #ffe082; color: #7a5c00; }
.q-num-btn.qst-correct { background: #4caf50; color: #fff; }
.q-num-btn.qst-wrong   { background: #e53935; color: #fff; }

/* ── RESET BUTTON ─────────────────────────────────────────────────────── */
.reset-unit-btn {
  display: block; width: calc(100% - 28px);
  margin: 8px 14px 14px;
  background: transparent; border: 1.5px solid #c0b090; border-radius: 9px;
  font-family: var(--font-ui); font-size: 13px; font-weight: 600;
  color: #8a6a30; padding: 10px; cursor: pointer;
  transition: background .2s, color .2s;
}
.reset-unit-btn:hover { background: #fff3cd; color: #5a3e10; }

/* ── NEXT QUESTION BUTTON ─────────────────────────────── */
.next-btn-wrap {
  padding: 12px 14px 14px;
  border-top: 1px solid #ece6da;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s ease, transform .3s ease;
}
.next-btn-wrap.visible {
  opacity: 1; transform: translateY(0);
}
.btn-next-q {
  width: 100%;
  background: var(--navy); color: #fff;
  font-family: var(--font-ui); font-size: 14px; font-weight: 700;
  letter-spacing: .4px; border: none; border-radius: 9px;
  padding: 13px; cursor: pointer;
  transition: background .2s, transform .15s;
}
.btn-next-q:hover { background: var(--navy-mid); transform: translateY(-1px); }
.btn-next-q:active { transform: translateY(0); }

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes slideIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.04); }
  100% { transform: scale(1); }
}
.q-card { animation: slideIn .3s ease; }
.opt-btn.correct { animation: pop .4s ease; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 400px) {
  .q-text { font-size: 16px; }
  .opt-text { font-size: 15px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-inner">
    <button id="back-btn" onclick="goToMenu()">← Menyu</button>
    <div id="app-title">Unit 6</div>
    <div id="score-badge">0 / 0</div>
    <button id="lang-btn" onclick="toggleLang()">EN</button>
  </div>
</div>
<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-inner">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-label">
      <span id="prog-left">Başlangıç</span>
      <span id="prog-right">90 sual</span>
    </div>
  </div>
</div>

<div id="main">

  <!-- WELCOME -->
  <div id="welcome">
    <h1>CIA Sınav Quiz<br><span style="color:var(--gold);font-size:.75em">Study Unit 6</span></h1>
    <p id="welcome-desc">3 mövzu, 90 sual — İngiliscə dil dəstəyi, izahlı cavablar</p>
    <div class="welcome-stats">
      <div class="ws-item"><span class="ws-num">3</span><span class="ws-label">Mövzu</span></div>
      <div class="ws-item"><span class="ws-num">90</span><span class="ws-label">Sual</span></div>
      <div class="ws-item"><span class="ws-num">360</span><span class="ws-label">İzah</span></div>
    </div>
    <button class="btn-start" onclick="startOrResume()" id="btn-main-start">Başla / Start</button>
    <button class="btn-start" id="btn-fresh-start"
      style="display:none;margin-top:8px;background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:13px;padding:10px"
      onclick="startQuiz()">↺ Yenidən başla / Restart</button>
  </div>

  <!-- CHAPTER TABS (hidden until started) -->
  <div id="chapters-scroll" style="display:none">
    <div id="chapters-inner"></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="question-area"></div>

  <!-- QUESTION NUMBER GRID -->
  <div id="q-grid-area"></div>

  <!-- CHAPTER SUMMARY -->
  <div id="summary-card"></div>

  <!-- OVERALL RESULTS -->
  <div id="overall-result"></div>

</div>

<script>

const QUIZ = {"SU1 - Governance Principles":[{"q_tr":"Which of the following correctly classifies governance functions as internal or external?","q_en":"Which of the following correctly classifies governance functions as internal or external?","options":[{"tr":"Internal - Internal audit function. External - Government regulation","en":"Internal - Internal audit function. External - Government regulation","cmt_tr":"The internal audit function is an example of internal corporate governance, and laws, regulations, and the government regulators who enforce them are examples of external governance.","cmt_en":"The internal audit function is an example of internal corporate governance, and laws, regulations, and the government regulators who enforce them are examples of external governance."},{"tr":"Internal - Senior management. External - Corporate charter","en":"Internal - Senior management. External - Corporate charter","cmt_tr":"A corporate charter is an example of internal corporate governance.","cmt_en":"A corporate charter is an example of internal corporate governance."},{"tr":"Internal - Privacy laws. External - External auditors","en":"Internal - Privacy laws. External - External auditors","cmt_tr":"Laws provide external corporate governance.","cmt_en":"Laws provide external corporate governance."},{"tr":"Internal - Corporate charter. External - Ethical culture","en":"Internal - Corporate charter. External - Ethical culture","cmt_tr":"An ethical culture is an example of internal corporate governance.","cmt_en":"An ethical culture is an example of internal corporate governance."}],"answer":0},{"q_tr":"Senior management is primarily responsible for","q_en":"Senior management is primarily responsible for","options":[{"tr":"Implementing and monitoring controls designed by the board of directors.","en":"Implementing and monitoring controls designed by the board of directors.","cmt_tr":"The board has oversight responsibilities but ordinarily does not become involved in the details of operations.","cmt_en":"The board has oversight responsibilities but ordinarily does not become involved in the details of operations."},{"tr":"Ensuring that external auditors oversee risk management and control processes.","en":"Ensuring that external auditors oversee risk management and control processes.","cmt_tr":"Management ensures that sound risk management processes are in place and are adequate and effective.","cmt_en":"Management ensures that sound risk management processes are in place and are adequate and effective."},{"tr":"Evaluating the controls over the reliability and integrity of financial and operational information.","en":"Evaluating the controls over the reliability and integrity of financial and operational information.","cmt_tr":"Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information.","cmt_en":"Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information."},{"tr":"Determining who will be risk owners.","en":"Determining who will be risk owners.","cmt_tr":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for specific day-to-day risks), and (3) how specific risks will be managed. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for specific day-to-day risks), and (3) how specific risks will be managed. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":3},{"q_tr":"In the governance structure, risk owners","q_en":"In the governance structure, risk owners","options":[{"tr":"Are senior managers.","en":"Are senior managers.","cmt_tr":"Senior managers determine who will be risk owners.","cmt_en":"Senior managers determine who will be risk owners."},{"tr":"Are responsible for day-to-day operations.","en":"Are responsible for day-to-day operations.","cmt_tr":"Risk owners are managers responsible for specific day-to-day operations. Senior managers determine who will be risk owners.","cmt_en":"Risk owners are managers responsible for specific day-to-day operations. Senior managers determine who will be risk owners."},{"tr":"Identify stakeholders and unacceptable outcomes.","en":"Identify stakeholders and unacceptable outcomes.","cmt_tr":"Directors identify stakeholders and unacceptable outcomes.","cmt_en":"Directors identify stakeholders and unacceptable outcomes."},{"tr":"Carry out board directives.","en":"Carry out board directives.","cmt_tr":"Senior managers carry out board directives.","cmt_en":"Senior managers carry out board directives."}],"answer":1},{"q_tr":"Ensuring effective organizational performance management and accountability is most directly the proper function of","q_en":"Ensuring effective organizational performance management and accountability is most directly the proper function of","options":[{"tr":"Control.","en":"Control.","cmt_tr":"Governance (not control) is directly responsible for ensuring effective organizational performance management and accountability.","cmt_en":"Governance (not control) is directly responsible for ensuring effective organizational performance management and accountability."},{"tr":"Governance.","en":"Governance.","cmt_tr":"Organizational performance is measured by achieving objectives. The IIA Glossary defines governance as “[t]he combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.” Thus, ensuring effective organizational performance management and accountability is most directly the proper function of governance.","cmt_en":"Organizational performance is measured by achieving objectives. The IIA Glossary defines governance as “[t]he combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.” Thus, ensuring effective organizational performance management and accountability is most directly the proper function of governance."},{"tr":"Risk management.","en":"Risk management.","cmt_tr":"Governance (not risk management) is directly responsible for ensuring effective organizational performance management and accountability.","cmt_en":"Governance (not risk management) is directly responsible for ensuring effective organizational performance management and accountability."},{"tr":"A quality assurance program.","en":"A quality assurance program.","cmt_tr":"A quality assurance program normally is implemented for an organizational unit, e.g., the internal audit function. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"A quality assurance program normally is implemented for an organizational unit, e.g., the internal audit function. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":1},{"q_tr":"The most likely purpose of governance is","q_en":"The most likely purpose of governance is","options":[{"tr":"Ensuring the independence of external auditors.","en":"Ensuring the independence of external auditors.","cmt_tr":"The purposes of governance are much broader than ensuring the independence of external auditors. Internal mechanisms of governance, e.g., an audit committee, hire and oversee the performance of external auditors.","cmt_en":"The purposes of governance are much broader than ensuring the independence of external auditors. Internal mechanisms of governance, e.g., an audit committee, hire and oversee the performance of external auditors."},{"tr":"Establishment of an organizational culture.","en":"Establishment of an organizational culture.","cmt_tr":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. However, all activities of the organization must be informed, directed, managed, and monitored to achieve its objectives.","cmt_en":"Governance practices reflect the organization’s unique culture and largely depend on it for effectiveness. However, all activities of the organization must be informed, directed, managed, and monitored to achieve its objectives."},{"tr":"Influencing governmental oversight.","en":"Influencing governmental oversight.","cmt_tr":"Although government regulators influence governance, reciprocating such influence is not a primary purpose of governance","cmt_en":"Although government regulators influence governance, reciprocating such influence is not a primary purpose of governance"},{"tr":"Monitoring the activities of the organization.","en":"Monitoring the activities of the organization.","cmt_tr":"Governance is defined in the glossary of The IIA’s Standards as “[t]he combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.”","cmt_en":"Governance is defined in the glossary of The IIA’s Standards as “[t]he combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives.”"}],"answer":3},{"q_tr":"Who in a corporate organization determines who will be responsible for day-to-day risks?","q_en":"Who in a corporate organization determines who will be responsible for day-to-day risks?","options":[{"tr":"Internal audit function.","en":"Internal audit function.","cmt_tr":"The internal audit function is responsible for assessing and improving governance processes.","cmt_en":"The internal audit function is responsible for assessing and improving governance processes."},{"tr":"Senior management.","en":"Senior management.","cmt_tr":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for day-to-day risks), and (3) how specific risks will be managed.","cmt_en":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for day-to-day risks), and (3) how specific risks will be managed."},{"tr":"Directors.","en":"Directors.","cmt_tr":"The directors evaluate and manage risk (sometimes through a risk committee of the board) and have the ultimate authority for oversight. But senior management determines who will be responsible for day-to-day risks.","cmt_en":"The directors evaluate and manage risk (sometimes through a risk committee of the board) and have the ultimate authority for oversight. But senior management determines who will be responsible for day-to-day risks."},{"tr":"Shareholders.","en":"Shareholders.","cmt_tr":"Shareholders are key stakeholders who do not have operational control of the corporation. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Shareholders are key stakeholders who do not have operational control of the corporation. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":1},{"q_tr":"Senior managers are most likely to determine","q_en":"Senior managers are most likely to determine","options":[{"tr":"The organization’s capital structure.","en":"The organization’s capital structure.","cmt_tr":"The board determines capital structure (mix of debt and equity, consideration to be received for shares, etc.).","cmt_en":"The board determines capital structure (mix of debt and equity, consideration to be received for shares, etc.)."},{"tr":"Where specific risks are managed.","en":"Where specific risks are managed.","cmt_tr":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for specific day-to-day risks), and (3) how specific risks will be managed.","cmt_en":"Senior management determines (1) where specific risks are to be managed, (2) who will be risk owners (managers responsible for specific day-to-day risks), and (3) how specific risks will be managed."},{"tr":"When to initiate a merger.","en":"When to initiate a merger.","cmt_tr":"The board initiates fundamental changes (mergers, acquisitions, etc.).Answer (D) is incorrect. The board coordinates audit activities (most often performed by a subcommittee called the audit committee).","cmt_en":"The board initiates fundamental changes (mergers, acquisitions, etc.).Answer (D) is incorrect. The board coordinates audit activities (most often performed by a subcommittee called the audit committee)."},{"tr":"The members of the audit committee.","en":"The members of the audit committee.","cmt_tr":"","cmt_en":""}],"answer":1},{"q_tr":"Which of the following qualities should be possessed by a board of directors?","q_en":"Which of the following qualities should be possessed by a board of directors?","options":[{"tr":"A majority of the board should be outside directors.","en":"A majority of the board should be outside directors.","cmt_tr":"Directors should also have years of experience in the industry and be willing to challenge management’s decisions.","cmt_en":"Directors should also have years of experience in the industry and be willing to challenge management’s decisions."},{"tr":"Directors generally should have years of experience in the industry.","en":"Directors generally should have years of experience in the industry.","cmt_tr":"A majority of the board should be outside directors, and directors must be willing to challenge management’s choices.","cmt_en":"A majority of the board should be outside directors, and directors must be willing to challenge management’s choices."},{"tr":"Directors must be willing to challenge management’s choices.","en":"Directors must be willing to challenge management’s choices.","cmt_tr":"A majority of the board should be outside directors, and directors should also have years of experience in the industry.Answer (D) is correct. Directors must have certain qualities to be effective. • A majority of the board should be outside directors. • Directors generally should have years of experience either in the industry or in corporate governance. • Directors must be willing to challenge management’s choices. Complacent directors increase the chances of adverse consequences. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"A majority of the board should be outside directors, and directors should also have years of experience in the industry.Answer (D) is correct. Directors must have certain qualities to be effective. • A majority of the board should be outside directors. • Directors generally should have years of experience either in the industry or in corporate governance. • Directors must be willing to challenge management’s choices. Complacent directors increase the chances of adverse consequences. Study Unit 6: Governance | Subunit 1: Governance Principles"},{"tr":"All of the answers are correct.","en":"All of the answers are correct.","cmt_tr":"","cmt_en":""}],"answer":3},{"q_tr":"Which of the following correctly classifies the corporate governance functions as internal or external?","q_en":"Which of the following correctly classifies the corporate governance functions as internal or external?","options":[{"tr":"Internal - Corporate charter. External - Bylaws","en":"Internal - Corporate charter. External - Bylaws","cmt_tr":"Bylaws are an example of internal corporate governance.","cmt_en":"Bylaws are an example of internal corporate governance."},{"tr":"Internal – Laws. External - Board of directors","en":"Internal – Laws. External - Board of directors","cmt_tr":"Laws provide external corporate governance.","cmt_en":"Laws provide external corporate governance."},{"tr":"Internal - Internal audit function. External - Corporate charter","en":"Internal - Internal audit function. External - Corporate charter","cmt_tr":"A corporate charter is an example of internal corporate governance.","cmt_en":"A corporate charter is an example of internal corporate governance."},{"tr":"Internal – Bylaws. External - Government regulation","en":"Internal – Bylaws. External - Government regulation","cmt_tr":"Bylaws are an example of internal corporate governance, and laws, regulations, and the government regulators who enforce them are examples of external governance.","cmt_en":"Bylaws are an example of internal corporate governance, and laws, regulations, and the government regulators who enforce them are examples of external governance."}],"answer":3},{"q_tr":"Which of the following is not a goal of corporate governance?","q_en":"Which of the following is not a goal of corporate governance?","options":[{"tr":"Complying with society’s legal and regulatory rules.","en":"Complying with society’s legal and regulatory rules.","cmt_tr":"Ensuring compliance with society’s legal and regulatory rules is a goal of corporate governance.","cmt_en":"Ensuring compliance with society’s legal and regulatory rules is a goal of corporate governance."},{"tr":"Providing an overall benefit to society.","en":"Providing an overall benefit to society.","cmt_tr":"Proving an overall benefit to society is a goal of corporate governance.","cmt_en":"Proving an overall benefit to society is a goal of corporate governance."},{"tr":"Reporting fully and truthfully to stakeholders.","en":"Reporting fully and truthfully to stakeholders.","cmt_tr":"Reporting fully and truthfully to stakeholders is a goal of corporate governance.","cmt_en":"Reporting fully and truthfully to stakeholders is a goal of corporate governance."},{"tr":"Maximizing executive compensation.","en":"Maximizing executive compensation.","cmt_tr":"Governance practices may use various legal forms, structures, strategies, and procedures. They ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short-term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances. But maximizing executive compensation is not a goal of corporate governance. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Governance practices may use various legal forms, structures, strategies, and procedures. They ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short-term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances. But maximizing executive compensation is not a goal of corporate governance. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":3},{"q_tr":"The internal and external auditors report directly to an audit committee composed of independent directors. This practice is directly related to which of the following governance principles? 1. Effective use of internal and external auditors. 2. Effective interaction among the board, management, and assurance providers. 3. An organizational structure that supports accomplishing strategic objectives. 4. An organizational structure used to measure organizational and individual performance.","q_en":"The internal and external auditors report directly to an audit committee composed of independent directors. This practice is directly related to which of the following governance principles? 1. Effective use of internal and external auditors. 2. Effective interaction among the board, management, and assurance providers. 3. An organizational structure that supports accomplishing strategic objectives. 4. An organizational structure used to measure organizational and individual performance.","options":[{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"Internal and external auditors should be used effectively to ensure (1) their independence, (2) the adequacy of their resources and the scope of their activities, and (3) the effectiveness of operations. Moreover, an entity should have an independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries.","cmt_en":"Internal and external auditors should be used effectively to ensure (1) their independence, (2) the adequacy of their resources and the scope of their activities, and (3) the effectiveness of operations. Moreover, an entity should have an independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"An organizational structure that supports accomplishing strategic objectives is not directly related.","cmt_en":"An organizational structure that supports accomplishing strategic objectives is not directly related."},{"tr":"3 and 4 only.","en":"3 and 4 only.","cmt_tr":"An organizational structure that supports accomplishing strategic objectives and an organizational structure used to measure organizational and individual performance are not directly related.","cmt_en":"An organizational structure that supports accomplishing strategic objectives and an organizational structure used to measure organizational and individual performance are not directly related."},{"tr":"1, 2, 3, and 4.","en":"1, 2, 3, and 4.","cmt_tr":"An organizational structure that supports accomplishing strategic objectives and an organizational structure used to measure organizational and individual performance are not directly related.","cmt_en":"An organizational structure that supports accomplishing strategic objectives and an organizational structure used to measure organizational and individual performance are not directly related."}],"answer":0},{"q_tr":"Governance should help ensure that the objectives of an entity’s stakeholders are met. Stakeholders include 1. Employees 2. Regulators 3. Suppliers 4. Customers","q_en":"Governance should help ensure that the objectives of an entity’s stakeholders are met. Stakeholders include 1. Employees 2. Regulators 3. Suppliers 4. Customers","options":[{"tr":"1 and 4 only.","en":"1 and 4 only.","cmt_tr":"Regulators and suppliers are stakeholders.","cmt_en":"Regulators and suppliers are stakeholders."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"Employees and customers are stakeholders.","cmt_en":"Employees and customers are stakeholders."},{"tr":"2, 3, and 4 only.","en":"2, 3, and 4 only.","cmt_tr":"Employees are stakeholders.","cmt_en":"Employees are stakeholders."},{"tr":"1, 2, 3, and 4. Study Unit 6: Governance | Subunit 1: Governance Principles","en":"1, 2, 3, and 4. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_tr":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators.","cmt_en":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators."}],"answer":3},{"q_tr":"Directors, management, external auditors, and internal auditors all play important roles in creating proper control processes. Senior management is primarily responsible for","q_en":"Directors, management, external auditors, and internal auditors all play important roles in creating proper control processes. Senior management is primarily responsible for","options":[{"tr":"Establishing and maintaining an organizational culture.","en":"Establishing and maintaining an organizational culture.","cmt_tr":"Management plans, organizes, and directs the performance of sufficient actions to provide reasonable assurance that goals and objectives will be achieved. Management periodically reviews its objectives and goals and modifies its processes to accommodate changes in internal and external conditions. Management also establishes and maintains an organizational culture, including an ethical climate that fosters control.","cmt_en":"Management plans, organizes, and directs the performance of sufficient actions to provide reasonable assurance that goals and objectives will be achieved. Management periodically reviews its objectives and goals and modifies its processes to accommodate changes in internal and external conditions. Management also establishes and maintains an organizational culture, including an ethical climate that fosters control."},{"tr":"Reviewing the reliability and integrity of financial and operational information.","en":"Reviewing the reliability and integrity of financial and operational information.","cmt_tr":"Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information.","cmt_en":"Internal auditors are responsible for evaluating the adequacy and effectiveness of controls, including those relating to the reliability and integrity of financial and operational information."},{"tr":"Ensuring that external and internal auditors oversee the administration of the system of risk management and control processes.","en":"Ensuring that external and internal auditors oversee the administration of the system of risk management and control processes.","cmt_tr":"Senior management’s role is to oversee the establishment, administration, and assessment of the system of risk management and control processes.","cmt_en":"Senior management’s role is to oversee the establishment, administration, and assessment of the system of risk management and control processes."},{"tr":"Implementing and monitoring controls designed by the board of directors.","en":"Implementing and monitoring controls designed by the board of directors.","cmt_tr":"The board has oversight responsibilities but ordinarily does not become involved in the details of operations.","cmt_en":"The board has oversight responsibilities but ordinarily does not become involved in the details of operations."}],"answer":0},{"q_tr":"Which of the following statements regarding corporate governance is not correct?","q_en":"Which of the following statements regarding corporate governance is not correct?","options":[{"tr":"Corporate control mechanisms include internal and external mechanisms.","en":"Corporate control mechanisms include internal and external mechanisms.","cmt_tr":"Corporate control mechanisms include both internal (e.g., internal auditing) and external (e.g., external auditing) mechanisms.","cmt_en":"Corporate control mechanisms include both internal (e.g., internal auditing) and external (e.g., external auditing) mechanisms."},{"tr":"The compensation scheme for management is part of the corporate control mechanisms.","en":"The compensation scheme for management is part of the corporate control mechanisms.","cmt_tr":"Management’s compensation scheme is part of the control environment, specifically, the human resource element.","cmt_en":"Management’s compensation scheme is part of the control environment, specifically, the human resource element."},{"tr":"The dilution of shareholders’ wealth resulting from employee stock options or employee stock bonuses is an accounting issue rather than a corporate governance issue.","en":"The dilution of shareholders’ wealth resulting from employee stock options or employee stock bonuses is an accounting issue rather than a corporate governance issue.","cmt_tr":"The dilution of shareholders’ wealth resulting from employee stock options or employee stock bonuses is an accounting issue. Governance is “the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives” (The IIA Glossary).","cmt_en":"The dilution of shareholders’ wealth resulting from employee stock options or employee stock bonuses is an accounting issue. Governance is “the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives” (The IIA Glossary)."},{"tr":"The internal auditor of a company has more responsibility than the board for the company’s corporate governance. Study Unit 6: Governance | Subunit 1: Governance Principles","en":"The internal auditor of a company has more responsibility than the board for the company’s corporate governance. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_tr":"Governance is the responsibility of the board. Internal audit’s responsibility is to assess governance processes and make appropriate recommendations for improvement.","cmt_en":"Governance is the responsibility of the board. Internal audit’s responsibility is to assess governance processes and make appropriate recommendations for improvement."}],"answer":3},{"q_tr":"Which of the following statements about organizational governance is true?","q_en":"Which of the following statements about organizational governance is true?","options":[{"tr":"The internal auditor has more responsibility than the board for organizational governance.","en":"The internal auditor has more responsibility than the board for organizational governance.","cmt_tr":"Governance is the responsibility of the board. Internal audit’s responsibility is to assess governance processes and make appropriate recommendations for improvement.","cmt_en":"Governance is the responsibility of the board. Internal audit’s responsibility is to assess governance processes and make appropriate recommendations for improvement."},{"tr":"Governance functions are internal but not external.","en":"Governance functions are internal but not external.","cmt_tr":"Governance functions are internal (e.g., internal auditing) and external (e.g., external auditing).","cmt_en":"Governance functions are internal (e.g., internal auditing) and external (e.g., external auditing)."},{"tr":"The compensation of management is a governance process.","en":"The compensation of management is a governance process.","cmt_tr":"Management’s compensation is part of the control environment, specifically, the human resource element. Governance applies to all organizational activities, including risk management and control.","cmt_en":"Management’s compensation is part of the control environment, specifically, the human resource element. Governance applies to all organizational activities, including risk management and control."},{"tr":"The dilution of shareholders wealth from stock options or bonuses is a governance issue.","en":"The dilution of shareholders wealth from stock options or bonuses is a governance issue.","cmt_tr":"The dilution of shareholders’ wealth resulting from stock options or bonuses is an accounting issue. Governance is “the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives” (The IIA Glossary).","cmt_en":"The dilution of shareholders’ wealth resulting from stock options or bonuses is an accounting issue. Governance is “the combination of processes and structures implemented by the board to inform, direct, manage, and monitor the activities of the organization toward the achievement of its objectives” (The IIA Glossary)."}],"answer":2},{"q_tr":"What are the major components of governance? 1. Strategic direction 2. Oversight 3. Regulations 4. Ethics Study Unit 6: Governance | Subunit 1: Governance Principles","q_en":"What are the major components of governance? 1. Strategic direction 2. Oversight 3. Regulations 4. Ethics Study Unit 6: Governance | Subunit 1: Governance Principles","options":[{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"The major components of governance are strategic direction and oversight. Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities. Oversight is the component to which risk management and controls are most likely to be applied. It is therefore the component with which internal auditing is most concerned.","cmt_en":"The major components of governance are strategic direction and oversight. Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities. Oversight is the component to which risk management and controls are most likely to be applied. It is therefore the component with which internal auditing is most concerned."},{"tr":"1, 2, and 4 only.","en":"1, 2, and 4 only.","cmt_tr":"Ethics is not a major component of governance.","cmt_en":"Ethics is not a major component of governance."},{"tr":"3 and 4 only.","en":"3 and 4 only.","cmt_tr":"Regulations and ethics are not major components of governance.","cmt_en":"Regulations and ethics are not major components of governance."},{"tr":"2 and 4 only.","en":"2 and 4 only.","cmt_tr":"Ethics is not, and strategic direction is, a major component of governance.","cmt_en":"Ethics is not, and strategic direction is, a major component of governance."}],"answer":0},{"q_tr":"What are the elements of the oversight component of governance? 1. The business model 2. Limits of organizational conduct 3. External assurance 4. Internal auditing","q_en":"What are the elements of the oversight component of governance? 1. The business model 2. Limits of organizational conduct 3. External assurance 4. Internal auditing","options":[{"tr":"2 and 4 only.","en":"2 and 4 only.","cmt_tr":"Strategic direction determines the limits of organizational conduct.","cmt_en":"Strategic direction determines the limits of organizational conduct."},{"tr":"3 and 4 only.","en":"3 and 4 only.","cmt_tr":"Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities.","cmt_en":"Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities."},{"tr":"1, 2, and 4 only.","en":"1, 2, and 4 only.","cmt_tr":"Strategic direction determines the business model and limits of organizational conduct.","cmt_en":"Strategic direction determines the business model and limits of organizational conduct."},{"tr":"1, 2, 3, and 4.","en":"1, 2, 3, and 4.","cmt_tr":"The elements of oversight are external assurance and internal auditing. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"The elements of oversight are external assurance and internal auditing. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":1},{"q_tr":"Which of the following is a purpose of governance practices?","q_en":"Which of the following is a purpose of governance practices?","options":[{"tr":"Enhancing the interests of specific stakeholders only in the short term.","en":"Enhancing the interests of specific stakeholders only in the short term.","cmt_tr":"The interests of specific stakeholders also should be enhanced in the long term.","cmt_en":"The interests of specific stakeholders also should be enhanced in the long term."},{"tr":"Satisfying ethical principles but not society’s expectations.","en":"Satisfying ethical principles but not society’s expectations.","cmt_tr":"The social expectations of society should be satisfied.","cmt_en":"The social expectations of society should be satisfied."},{"tr":"Delegating organizational oversight to the internal audit function.","en":"Delegating organizational oversight to the internal audit function.","cmt_tr":"The board is responsible for overseeing the organization’s activities and cannot delegate this responsibility.","cmt_en":"The board is responsible for overseeing the organization’s activities and cannot delegate this responsibility."},{"tr":"Reporting fully and truthfully to the public.","en":"Reporting fully and truthfully to the public.","cmt_tr":"Governance practices may use various legal forms, structures, strategies, and procedures. They ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances.","cmt_en":"Governance practices may use various legal forms, structures, strategies, and procedures. They ensure that the organization (1) complies with society’s legal and regulatory rules; (2) satisfies the generally accepted business norms, ethical principles, and social expectations of society; (3) provides overall benefit to society and enhances the interests of the specific stakeholders in both the long- and short term; and (4) reports fully and truthfully to its stakeholders, including the public, to ensure accountability for its decisions, actions, and performances."}],"answer":3},{"q_tr":"Careful Corp. always has its internal auditors review transactions between Careful Corp. and its subsidiary, Risky Corp., to ensure that the transactions are carried out in a fair and transparent manner. This practice is most closely related to which of the following governance principles?","q_en":"Careful Corp. always has its internal auditors review transactions between Careful Corp. and its subsidiary, Risky Corp., to ensure that the transactions are carried out in a fair and transparent manner. This practice is most closely related to which of the following governance principles?","options":[{"tr":"Oversight of related party transactions and conflicts of interest.","en":"Oversight of related party transactions and conflicts of interest.","cmt_tr":"Careful Corp. and Risky Corp. are related (a parent and its subsidiary). Accordingly, having the internal auditors review transactions between Careful and Risky is most closely related to the governance principle of oversight of related party transactions and conflicts of interest.","cmt_en":"Careful Corp. and Risky Corp. are related (a parent and its subsidiary). Accordingly, having the internal auditors review transactions between Careful and Risky is most closely related to the governance principle of oversight of related party transactions and conflicts of interest."},{"tr":"Effective interaction among the board, management, and assurance providers.","en":"Effective interaction among the board, management, and assurance providers.","cmt_tr":"Although this practice would involve effective interaction among the board, management, and assurance providers, this practice is most closely related to another governance principle.","cmt_en":"Although this practice would involve effective interaction among the board, management, and assurance providers, this practice is most closely related to another governance principle."},{"tr":"An organizational structure that supports accomplishing strategic objectives.","en":"An organizational structure that supports accomplishing strategic objectives.","cmt_tr":"This practice will not necessarily support the organization in accomplishing strategic objectives.","cmt_en":"This practice will not necessarily support the organization in accomplishing strategic objectives."},{"tr":"An organizational structure used to measure organizational and individual performance.","en":"An organizational structure used to measure organizational and individual performance.","cmt_tr":"This practice will not help measure organizational and individual performance. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"This practice will not help measure organizational and individual performance. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":0},{"q_tr":"Which of the following is consistent with a governance principle?","q_en":"Which of the following is consistent with a governance principle?","options":[{"tr":"Members of the audit committee are executives of the entity.","en":"Members of the audit committee are executives of the entity.","cmt_tr":"The board should be independent and objective.","cmt_en":"The board should be independent and objective."},{"tr":"The internal audit function is organizationally independent.","en":"The internal audit function is organizationally independent.","cmt_tr":"Internal and external auditors should be used effectively to ensure (1) their independence, (2) the adequacy of their resources and the scope of their activities, and (3) the effectiveness of operations.","cmt_en":"Internal and external auditors should be used effectively to ensure (1) their independence, (2) the adequacy of their resources and the scope of their activities, and (3) the effectiveness of operations."},{"tr":"The entity engages in undisclosed related party transactions.","en":"The entity engages in undisclosed related party transactions.","cmt_tr":"The entity should oversee related party transactions.","cmt_en":"The entity should oversee related party transactions."},{"tr":"A senior executive who can influence accounting policies receives stock options if earnings targets are met.","en":"A senior executive who can influence accounting policies receives stock options if earnings targets are met.","cmt_tr":"Compensation policies should encourage appropriate behavior consistent with the entity’s values.","cmt_en":"Compensation policies should encourage appropriate behavior consistent with the entity’s values."}],"answer":1},{"q_tr":"Which of the following statements regarding oversight as a component of governance is false?","q_en":"Which of the following statements regarding oversight as a component of governance is false?","options":[{"tr":"Risk management activities are performed by senior management and risk owners.","en":"Risk management activities are performed by senior management and risk owners.","cmt_tr":"The performance of risk management activities by senior management and risk owners is an element of oversight.","cmt_en":"The performance of risk management activities by senior management and risk owners is an element of oversight."},{"tr":"Oversight includes internal and external assurance activities.","en":"Oversight includes internal and external assurance activities.","cmt_tr":"Internal and external assurance activities are elements of oversight.","cmt_en":"Internal and external assurance activities are elements of oversight."},{"tr":"Oversight is the governance component with which internal auditing is most concerned.","en":"Oversight is the governance component with which internal auditing is most concerned.","cmt_tr":"Oversight is the governance component with which internal auditing is most concerned. It is also the component to which risk management and control activities are most likely to be applied.","cmt_en":"Oversight is the governance component with which internal auditing is most concerned. It is also the component to which risk management and control activities are most likely to be applied."},{"tr":"Oversight determines the overall objectives.","en":"Oversight determines the overall objectives.","cmt_tr":"The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities. Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. Strategic direction, not oversight, determines overall objectives. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities. Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. Strategic direction, not oversight, determines overall objectives. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":3},{"q_tr":"Strategic direction includes","q_en":"Strategic direction includes","options":[{"tr":"Risk management activities performed by risk owners.","en":"Risk management activities performed by risk owners.","cmt_tr":"The performance of risk management activities by senior management and risk owners is an element of oversight.","cmt_en":"The performance of risk management activities by senior management and risk owners is an element of oversight."},{"tr":"External assurance activities.","en":"External assurance activities.","cmt_tr":"Internal and external assurance activities are elements of oversight.","cmt_en":"Internal and external assurance activities are elements of oversight."},{"tr":"The governance component with which internal auditing is most concerned.","en":"The governance component with which internal auditing is most concerned.","cmt_tr":"Oversight is the governance component with which internal auditing is most concerned. It is also the component to which risk management and control activities are most likely to be applied.","cmt_en":"Oversight is the governance component with which internal auditing is most concerned. It is also the component to which risk management and control activities are most likely to be applied."},{"tr":"The organization’s risk appetite.","en":"The organization’s risk appetite.","cmt_tr":"Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities.","cmt_en":"Strategic direction determines (1) the business model, (2) overall objectives, (3) the risk appetite, and (4) the limits of organizational conduct. The elements of oversight are (1) the risk management activities of senior management and the board and (2) internal and external assurance activities."}],"answer":3},{"q_tr":"Which of the following are duties of risk committees? 1. Identifying key risks 2. Connecting risks to risk management processes 3. Delegating risks to risk owners","q_en":"Which of the following are duties of risk committees? 1. Identifying key risks 2. Connecting risks to risk management processes 3. Delegating risks to risk owners","options":[{"tr":"1 and 2 only.","en":"1 and 2 only.","cmt_tr":"Risk committees also delegate risks to risk owners.","cmt_en":"Risk committees also delegate risks to risk owners."},{"tr":"1 only.","en":"1 only.","cmt_tr":"Risk committees also connect risks to risk management processes and delegate risks to risk owners.","cmt_en":"Risk committees also connect risks to risk management processes and delegate risks to risk owners."},{"tr":"2 and 3 only.","en":"2 and 3 only.","cmt_tr":"Risk committees also identify key risks.","cmt_en":"Risk committees also identify key risks."},{"tr":"1, 2, and 3.","en":"1, 2, and 3.","cmt_tr":"A risk committee may be created that • Identifies key risks, • Connects them to risk management processes, Study Unit 6: Governance | Subunit 1: Governance Principles • Delegates them to risk owners, and • Considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite.","cmt_en":"A risk committee may be created that • Identifies key risks, • Connects them to risk management processes, Study Unit 6: Governance | Subunit 1: Governance Principles • Delegates them to risk owners, and • Considers whether tolerance levels delegated to risk owners are consistent with the organization’s risk appetite."}],"answer":3},{"q_tr":"Which of the following is considered a potential stakeholder of an entity?","q_en":"Which of the following is considered a potential stakeholder of an entity?","options":[{"tr":"Shareholders.","en":"Shareholders.","cmt_tr":"Employees and suppliers are also stakeholders.","cmt_en":"Employees and suppliers are also stakeholders."},{"tr":"Employees.","en":"Employees.","cmt_tr":"Shareholders and suppliers are also stakeholders.","cmt_en":"Shareholders and suppliers are also stakeholders."},{"tr":"Suppliers.","en":"Suppliers.","cmt_tr":"Shareholders and employees are also stakeholders.","cmt_en":"Shareholders and employees are also stakeholders."},{"tr":"All of the answers are correct.","en":"All of the answers are correct.","cmt_tr":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include shareholders, employees, suppliers, customers, neighbors of the entity’s facilities, and government regulators.","cmt_en":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, these include shareholders, employees, suppliers, customers, neighbors of the entity’s facilities, and government regulators."}],"answer":3},{"q_tr":"Which of the following most likely are considered potential stakeholders of an entity?","q_en":"Which of the following most likely are considered potential stakeholders of an entity?","options":[{"tr":"Close competitors.","en":"Close competitors.","cmt_tr":"Close competitors are less likely than neighbors of an entity’s facilities to be stakeholders.","cmt_en":"Close competitors are less likely than neighbors of an entity’s facilities to be stakeholders."},{"tr":"Tax authorities.","en":"Tax authorities.","cmt_tr":"Tax authorities are less likely than neighbors of an entity’s facilities to be stakeholders.","cmt_en":"Tax authorities are less likely than neighbors of an entity’s facilities to be stakeholders."},{"tr":"Creditors of employees.","en":"Creditors of employees.","cmt_tr":"Creditors of employees are less likely than neighbors of an entity’s facilities to be stakeholders.","cmt_en":"Creditors of employees are less likely than neighbors of an entity’s facilities to be stakeholders."},{"tr":"Neighbors of its facilities.","en":"Neighbors of its facilities.","cmt_tr":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, they include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators. Study Unit 6: Governance | Subunit 1: Governance Principles","cmt_en":"Stakeholders are persons or entities who are affected by the activities of the entity. Among others, they include (1) shareholders, (2) employees, (3) suppliers, (4) customers, (5) neighbors of the entity’s facilities, and (6) government regulators. Study Unit 6: Governance | Subunit 1: Governance Principles"}],"answer":3},{"q_tr":"Attentive, Inc., has three managers: Albert, Bradley, and Chris. • Albert is in charge of the accounting department. His duties involve the daily audit and producing the year-end financial statements. • Bradley is in charge of production. His duties involve ensuring that production stays on schedule and that waste is minimized. • Chris is in charge of support staff. His duties include ensuring that the workplace remains clean. This practice is most closely related to which of the following governance principles?","q_en":"Attentive, Inc., has three managers: Albert, Bradley, and Chris. • Albert is in charge of the accounting department. His duties involve the daily audit and producing the year-end financial statements. • Bradley is in charge of production. His duties involve ensuring that production stays on schedule and that waste is minimized. • Chris is in charge of support staff. His duties include ensuring that the workplace remains clean. This practice is most closely related to which of the following governance principles?","options":[{"tr":"Clear, enforced lines of responsibility and accountability.","en":"Clear, enforced lines of responsibility and accountability.","cmt_tr":"Albert, Bradley, and Chris are responsible for different departments. This practice is therefore most closely related to the governance principle of clear, enforced lines of responsibility.","cmt_en":"Albert, Bradley, and Chris are responsible for different departments. This practice is therefore most closely related to the governance principle of clear, enforced lines of responsibility."},{"tr":"An independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries.","en":"An independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries.","cmt_tr":"This practice does not demonstrate that there is an independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries.","cmt_en":"This practice does not demonstrate that there is an independent and objective board with sufficient expertise, experience, authority, and resources to conduct independent inquiries."},{"tr":"Reinforcement of an ethical culture, including employee feedback without fear of retaliation.","en":"Reinforcement of an ethical culture, including employee feedback without fear of retaliation.","cmt_tr":"This practice does not reinforce an ethical culture, including employee feedback without fear of retaliation.","cmt_en":"This practice does not reinforce an ethical culture, including employee feedback without fear of retaliation."},{"tr":"Clear definition and implementation of risk management policies and processes.","en":"Clear definition and implementation of risk management policies and processes.","cmt_tr":"This practice does not facilitate a clear definition and implementation of risk management policies and processes.","cmt_en":"This practice does not facilitate a clear definition and implementation of risk management policies and processes."}],"answer":0},{"q_tr":"The board as defined by The IIA","q_en":"The board as defined by The IIA","options":[{"tr":"Ordinarily is a supervisory group appointed by senior managers.","en":"Ordinarily is a supervisory group appointed by senior managers.","cmt_tr":"The board ordinarily includes an independent group of directors.","cmt_en":"The board ordinarily includes an independent group of directors."},{"tr":"May be the head of the organization.","en":"May be the head of the organization.","cmt_tr":"The board is defined by The IIA as the highest level body charged with governance, such as a board of directors, an audit committee, a board of governors or trustees, etc. If such a group does not exist, the board may be the head of the organization. Thus, the board is the source of overall Study Unit 6: Governance | Subunit 1: Governance Principles direction to, and the authority of, management. It also has the ultimate responsibility for oversight.","cmt_en":"The board is defined by The IIA as the highest level body charged with governance, such as a board of directors, an audit committee, a board of governors or trustees, etc. If such a group does not exist, the board may be the head of the organization. Thus, the board is the source of overall Study Unit 6: Governance | Subunit 1: Governance Principles direction to, and the authority of, management. It also has the ultimate responsibility for oversight."},{"tr":"Performs day-to-day governance functions.","en":"Performs day-to-day governance functions.","cmt_tr":"Management performs day-to-day governance functions.","cmt_en":"Management performs day-to-day governance functions."},{"tr":"Establishes reporting requirements for risk owners.","en":"Establishes reporting requirements for risk owners.","cmt_tr":"Senior management establishes reporting requirements for risk owners related to their risk management activities.","cmt_en":"Senior management establishes reporting requirements for risk owners related to their risk management activities."}],"answer":1},{"q_tr":"The board of directors of a corporation is not responsible for","q_en":"The board of directors of a corporation is not responsible for","options":[{"tr":"Electing or removing directors.","en":"Electing or removing directors.","cmt_tr":"The board of directors is responsible for (1) selecting and removing officers; (2) making decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiating fundamental changes; (5) declaring and distributing dividends; (6) setting management compensation; (7) coordinating audit activities; and (8) evaluating and managing risk. But shareholders can elect or remove directors at the annual meeting.","cmt_en":"The board of directors is responsible for (1) selecting and removing officers; (2) making decisions about capital structure; (3) adding, amending, or repealing bylaws; (4) initiating fundamental changes; (5) declaring and distributing dividends; (6) setting management compensation; (7) coordinating audit activities; and (8) evaluating and managing risk. But shareholders can elect or remove directors at the annual meeting."},{"tr":"Selecting and removing officers.","en":"Selecting and removing officers.","cmt_tr":"The board is responsible for selecting and removing officers.","cmt_en":"The board is responsible for selecting and removing officers."},{"tr":"Coordinating audit activities.","en":"Coordinating audit activities.","cmt_tr":"The board is responsible for coordinating audit activities.","cmt_en":"The board is responsible for coordinating audit activities."},{"tr":"Setting management compensation.","en":"Setting management compensation.","cmt_tr":"The board is responsible for setting management compensation.","cmt_en":"The board is responsible for setting management compensation."}],"answer":0},{"q_tr":"The board of director’s primary responsibility regarding internal control is to","q_en":"The board of director’s primary responsibility regarding internal control is to","options":[{"tr":"Identify stakeholders and the outcomes that are unacceptable.","en":"Identify stakeholders and the outcomes that are unacceptable.","cmt_tr":"The board acts on behalf of the entity’s stakeholders. Typically, the board discusses yearly performance and expected outcomes at an annual shareholders’ meeting.","cmt_en":"The board acts on behalf of the entity’s stakeholders. Typically, the board discusses yearly performance and expected outcomes at an annual shareholders’ meeting."},{"tr":"Review the reliability and integrity of financial and operational information.","en":"Review the reliability and integrity of financial and operational information.","cmt_tr":"Internal auditors are responsi
