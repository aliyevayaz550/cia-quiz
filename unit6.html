 reporting more directly relates to risk management rather than to governance.", "az": "Maliyyə hesabatları üzrə daxili nəzarətin effektivliyinin qiymətləndirilməsi.", "cmt_az": "Maliyyə hesabatları üzrə daxili nəzarətin effektivliyinin qiymətləndirilməsi yönetişimdən çox risk idarəetməsi ilə birbaşa əlaqəlidir."}, {"tr": "Kontrollerin sürekli iyileştirilmesinin teşvik edilmesi.", "en": "Promoting continuous improvement of controls.", "cmt_tr": "Kontrollerin sürekli iyileştirilmesinin teşvik edilmesi yönetişimden çok kontrol süreçleriyle ilişkilidir.", "cmt_en": "Promoting continuous improvement of controls relates to control processes rather than to governance.", "az": "Nəzarətlərin davamlı təkmilləşdirilməsinin təşviq edilməsi.", "cmt_az": "Nəzarətlərin davamlı təkmilləşdirilməsinin təşviq edilməsi yönetişimdən çox nəzarət prosesləri ilə əlaqəlidir."}, {"tr": "Hedeflerin nasıl belirlendiğinin ve kararların nasıl alındığının değerlendirilmesi ve iyileştirilmesi.", "en": "Assessing and improving how objectives are established and decisions are made.", "cmt_tr": "İç denetim fonksiyonu kuruluşun (1) stratejik hedeflerini nasıl belirlediğini ve stratejik ve operasyonel kararları nasıl aldığını; (2) risk yönetimini ve kontrolü nasıl denetlediğini; (3) etik kültürü nasıl teşvik ettiğini; (4) etkin performans yönetimini ve hesap verebilirliği nasıl sağladığını; (5) yönetim ve operasyon işlevlerini nasıl yapılandırdığını; (6) risk ve kontrol bilgilerini kuruluş genelinde nasıl ilettiğini; ve (7) yönetim kurulu, iç ve dış güvence hizmet sağlayıcıları ile yönetim arasındaki faaliyetleri ve iletişimi nasıl koordine ettiğini değerlendirir.", "cmt_en": "The internal audit function evaluates governance processes such as how the organization (1) establishes strategic objectives and makes strategic and operational decisions; (2) oversees risk management and control; (3) promotes an ethical culture; (4) delivers effective performance management and accountability; (5) structures its management and operating functions; (6) communicates risk and control information throughout the organization; and (7) coordinates activities and communications among the board, internal and external providers of assurance services, and management. The internal audit function improves governance by providing objective assurance and insight on the effectiveness and efficiency of governance processes. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "az": "Hədəflərin necə müəyyən edildiyinin və qərarların necə qəbul edildiyinin qiymətləndirilməsi və təkmilləşdirilməsi.", "cmt_az": "İç denetim funksiyası təşkilatın (1) strateji hədəfləri necə müəyyən etdiyini və strateji və əməliyyat qərarlarını necə qəbul etdiyini; (2) risk idarəetməsinə və nəzarətə necə nəzarət etdiyini; (3) etik mədəniyyəti necə təşviq etdiyini; (4) effektiv performans idarəetməsini və hesabatlılığı necə təmin etdiyini; (5) idarəetmə və əməliyyat funksiyalarını necə strukturlaşdırdığını; (6) risk və nəzarət məlumatlarını təşkilat daxilində necə çatdırdığını; və (7) idarə heyəti, daxili və xarici güvencə xidmət təminatçıları və rəhbərlik arasında fəaliyyətləri və kommunikasiyaları necə koordinasiya etdiyini qiymətləndirir."}], "answer": 3, "q_az": "İç denetim funksiyasının təşkilatın yönetişim prosesinə birbaşa töhfəsini ən yaxşı təsvir edən hansıdır?"}, {"q_tr": "Yönetişim hakkında aşağıdaki ifadelerden hangisi yanlıştır?", "q_en": "Which of the following statements regarding governance is false?", "options": [{"tr": "Yönetişimin koşullara bağlı olarak çeşitli tanımları vardır.", "en": "Governance has a range of definitions depending on the circumstances.", "cmt_tr": "Yönetişimin koşullara bağlı olarak çeşitli tanımları vardır. Baş denetim yöneticisi kuruluş farklı bir model kullandığında farklı bir tanım kullanabilir.", "cmt_en": "Governance does have a range of definitions depending on the circumstances. The chief audit executive may use a different definition when the organization uses a different model.", "az": "Yönetişimin şərtlərdən asılı olaraq müxtəlif tərifləri var.", "cmt_az": "Yönetişimin şərtlərdən asılı olaraq müxtəlif tərifləri var. Baş audit icraçısı təşkilat fərqli bir model istifadə etdikdə fərqli bir tərifdən istifadə edə bilər."}, {"tr": "Yönetişim modelleri genellikle yönetişimi statik olan bir süreç veya sistem olarak ele alır.", "en": "Governance models generally treat governance as a process or a system that is static.", "cmt_tr": "Yönetişim modelleri genellikle yönetişimi statik olmayan bir süreç veya sistem olarak ele alır. Standartlardaki yaklaşım yönetim kurulunu ve yönetişim faaliyetlerini vurgular.", "cmt_en": "Governance models generally treat governance as a process or a system that is not static. The approach in the Standards emphasizes the board and its governance activities.", "az": "Yönetişim modelləri ümumiyyətlə yönetişimi statik olan proses və ya sistem kimi qəbul edir.", "cmt_az": "Yönetişim modelləri ümumiyyətlə yönetişimi statik olmayan proses və ya sistem kimi qəbul edir. Standartlardakı yanaşma idarə heyətini və onun yönetişim fəaliyyətlərini vurğulayır."}, {"tr": "Yönetişim gereksinimleri kuruluş türüne ve düzenleyici yetki alanına göre değişir.", "en": "Governance requirements vary by entity type and regulatory jurisdiction.", "cmt_tr": "Yönetişim gereksinimleri kuruluş türüne ve düzenleyici yetki alanına göre değişir. Örnekler arasında halka açık şirketler, kar amacı gütmeyen kuruluşlar, devlet kurumları, özel şirketler ve borsalar yer alır.", "cmt_en": "Governance requirements do vary by entity type and regulatory jurisdiction. Examples include publicly traded companies, not-for-profits, governments, private companies, and stock exchanges.", "az": "Yönetişim tələbləri müəssisə növü və tənzimləyici yurisdiksiyaya görə dəyişir.", "cmt_az": "Yönetişim tələbləri müəssisə növü və tənzimləyici yurisdiksiyaya görə dəyişir. Nümunələrə açıq ticarət olunan şirkətlər, qeyri-kommersiya təşkilatları, dövlət qurumları, xüsusi şirkətlər və fond birjaları daxildir."}, {"tr": "Yönetişim farklı süreçler ve kontrol yapıları olarak mevcut değildir.", "en": "Governance does not exist as distinct processes and control structures.", "cmt_tr": "Yönetişim farklı süreçler ve kontrol yapıları olarak değil, risk yönetimi ve kontrolle ilişkiler olarak mevcuttur.", "cmt_en": "Governance does not exist as distinct processes and control structures but instead as relationships with risk management and control.", "az": "Yönetişim fərqli proseslər və nəzarət strukturları kimi mövcud deyil.", "cmt_az": "Yönetişim fərqli proseslər və nəzarət strukturları kimi deyil, risk idarəetməsi və nəzarətlə münasibətlər kimi mövcuddur."}], "answer": 1, "q_az": "Yönetişim haqqında aşağıdakı ifadələrdən hansı yalandır?"}, {"q_tr": "Bir kuruluştaki en üst düzey yönetim organının görevi olmama olasılığı en yüksek olan hangisidir?", "q_en": "The highest level governing body in an organization is least likely to have a duty to", "options": [{"tr": "Temettü ilan etmek.", "en": "Declare dividends.", "cmt_tr": "Bir kuruluştaki en üst düzey yönetim organı temettülerin ilan edilmesi ve dağıtılması hakkında kararlar alır.", "cmt_en": "The highest level governing body in an organization makes decisions to declare and distribute dividends.", "az": "Dividentlər elan etmək.", "cmt_az": "Təşkilatda ən yüksək səviyyəli idarəetmə orqanı dividentlərin elan edilməsi və paylanması haqqında qərarlar qəbul edir."}, {"tr": "İç tüzüğü yürürlükten kaldırmak.", "en": "Repeal bylaws.", "cmt_tr": "En üst düzey yönetim organı iç tüzüğün eklenmesi, değiştirilmesi veya yürürlükten kaldırılması (bu yetki hissedarlara ayrılmadıkça) hakkında kararlar alır.", "cmt_en": "The highest level governing body in an organization makes decisions about adding, amending, or repealing bylaws (unless this authority is reserved to the shareholders).", "az": "Daxili qaydaları ləğv etmək.", "cmt_az": "Təşkilatda ən yüksək səviyyəli idarəetmə orqanı daxili qaydaların əlavə edilməsi, dəyişdirilməsi və ya ləğv edilməsi (bu səlahiyyət səhmdarlara ehtiyat edilmədikdə) haqqında qərarlar qəbul edir."}, {"tr": "Etik iklimi periyodik olarak değerlendirmek.", "en": "Periodically assess the ethical climate.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını ve yasal ve etik uyumun sağlanmasındaki etkinliğini periyodik olarak değerlendirir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance.", "az": "Etik mühiti vaxtaşırı qiymətləndirmək.", "cmt_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir."}, {"tr": "Bir alt komite aracılığıyla riski yönetmek.", "en": "Manage risk through a subcommittee.", "cmt_tr": "En üst düzey yönetim organı riski değerlendirir ve yönetir (bazen risk komitesi adlı alt komite tarafından gerçekleştirilir).", "cmt_en": "The highest level governing body in an organization evaluates and manages risk (sometimes performed by a subcommittee called the risk committee). Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "az": "Alt komitə vasitəsilə riski idarə etmək.", "cmt_az": "Təşkilatda ən yüksək səviyyəli idarəetmə orqanı riski qiymətləndirir və idarə edir (bəzən risk komitəsi adlanan alt komitə tərəfindən həyata keçirilir)."}], "answer": 2, "q_az": "Təşkilatda ən yüksək səviyyəli idarəetmə orqanının vəzifəsi olmama ehtimalı ən yüksək olan hansıdır?"}, {"q_tr": "Yönetişim hakkında aşağıdaki ifadelerden hangisi doğrudur?", "q_en": "Which of the following statements about governance is true?", "options": [{"tr": "Yönetişim farklı süreçler ve kontroller olarak mevcuttur.", "en": "Governance exists as distinct processes and controls.", "cmt_tr": "Yönetişim farklı süreçler ve yapılar olarak değil, risk yönetimi ve kontrolle ilişkiler olarak mevcuttur.", "cmt_en": "Governance does not exist as distinct processes and structures but as relationships with risk management and control.", "az": "Yönetişim fərqli proseslər və nəzarətlər kimi mövcuddur.", "cmt_az": "Yönetişim fərqli proseslər və strukturlar kimi deyil, risk idarəetməsi və nəzarətlə münasibətlər kimi mövcuddur."}, {"tr": "Baş denetim yöneticisi kuruluşun süreci olgun olduğunda yönetişimi değerlendirmek için danışmanlardan yararlanır.", "en": "The chief audit executive is likely to use consultants to assess governance when the organization’s process is mature.", "cmt_tr": "Baş denetim yöneticisi kuruluşun süreci (1) olgun olmadığında veya (2) kontrol sorunları bilindiğinde yönetişimi değerlendirmek için danışmanlardan yararlanır.", "cmt_en": "The chief audit executive is likely to use consultants to assess governance when the organization’s process is (1) not mature, or (2) control issues are known.", "az": "Baş audit icraçısı təşkilatın prosesi yetkin olduqda yönetişimi qiymətləndirmək üçün məsləhətçilərdən istifadə edəcək.", "cmt_az": "Baş audit icraçısı təşkilatın prosesi (1) yetkin olmadıqda və ya (2) nəzarət problemləri bilindiqdə yönetişimi qiymətləndirmək üçün məsləhətçilərdən istifadə edəcək."}, {"tr": "Yönetişim esasen statik bir süreçtir.", "en": "Governance is essentially a static process.", "cmt_tr": "Yönetişim modelleri genellikle yönetişimi statik olmayan bir süreç veya sistem olarak ele alır. Standartlardaki yaklaşım yönetim kurulunu ve yönetişim faaliyetlerini vurgular.", "cmt_en": "Governance models generally treat governance as a process or a system that is not static. The approach in the Standards emphasizes the board and its governance activities.", "az": "Yönetişim əsasən statik prosesdir.", "cmt_az": "Yönetişim modelləri ümumiyyətlə yönetişimi statik olmayan proses və ya sistem kimi qəbul edir. Standartlardakı yanaşma idarə heyətini və onun yönetişim fəaliyyətlərini vurğulayır."}, {"tr": "Yönetişimin koşullara bağlı olarak çeşitli tanımları vardır.", "en": "Governance has a range of definitions depending on the circumstances.", "cmt_tr": "Yönetişimin koşullara bağlı olarak çeşitli tanımları vardır. Baş denetim yöneticisi yönetişimin iç denetim amaçları için nasıl tanımlanacağını belirlemek üzere yönetim kurulu ve üst yönetimle birlikte çalışmalıdır.", "cmt_en": "Governance has a range of definitions depending on the circumstances. The chief audit executive should work with the board and senior management, as appropriate, to determine how governance should be defined for internal audit purposes.", "az": "Yönetişimin şərtlərdən asılı olaraq müxtəlif tərifləri var.", "cmt_az": "Yönetişimin şərtlərdən asılı olaraq müxtəlif tərifləri var. Baş audit icraçısı yönetişimin daxili audit məqsədləri üçün necə təyin olunacağını müəyyən etmək üçün idarə heyəti və üst rəhbərliklə birlikdə işləməlidir."}], "answer": 3, "q_az": "Yönetişim haqqında aşağıdakı ifadələrdən hansı doğrudur?"}, {"q_tr": "En iyi uygulama yönetişim faaliyetlerinde iç denetim fonksiyonunun rolleri hangileridir? 1. Önemli denetim konularını raporlamak 2. Yönetim kurulunu kuruluş genelinde risk değerlendirmesinde desteklemek 3. Dış denetime yönetimin yanıtını takip etmek ve raporlamak 4. Paydaşlar için olumlu sonuçlar elde etmek amacıyla kurumsal varlıkların koruyucusu olarak görev yapmak", "q_en": "Which of the following are roles of the internal audit function in best practice governance activities? 1. Report significant audit issues 2. Support the board in enterprise-wide risk assessment 3. Conduct follow-up and report on management’s response to external audit 4. Act as custodian of corporate assets in the pursuit of positive outcomes for stakeholders", "options": [{"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "İç denetim fonksiyonu ayrıca yönetim kurulunu kuruluş genelinde risk değerlendirmesinde destekler.", "cmt_en": "The internal audit function also supports the board in enterprise-wide risk assessment.", "az": "Yalnız 1 və 3.", "cmt_az": "İç denetim funksiyası həmçinin idarə heyətini müəssisə miqyasında risk qiymətləndirməsində dəstəkləyir."}, {"tr": "Yalnızca 2 ve 4.", "en": "2 and 4 only.", "cmt_tr": "İç denetim fonksiyonu ayrıca önemli denetim konularını raporlar ve dış denetime yönetimin yanıtını takip eder ve raporlar ancak kurumsal varlıkların koruyucusu olarak görev yapmaz.", "cmt_en": "The internal audit function also reports significant audit issues and conducts follow-up and reports on management’s response to external audits but does not act as custodian of corporate assets in pursuit of positive outcomes for stakeholders.", "az": "Yalnız 2 və 4.", "cmt_az": "İç denetim funksiyası həmçinin əhəmiyyətli audit məsələlərini bildirir və xarici auditorun rəhbərliyin cavabı üzərində təqib aparır və hesabat verir, lakin maraqlı tərəflər üçün müsbət nəticələr əldə etmək məqsədilə korporativ aktivlərin əmanətçisi kimi fəaliyyət göstərmir."}, {"tr": "Yalnızca 1, 2 ve 3.", "en": "1, 2, and 3 only.", "cmt_tr": "İç denetim fonksiyonu önemli denetim konularını raporlar, yönetim kurulunu kuruluş genelinde risk değerlendirmesinde destekler ve dış denetime yönetimin yanıtını takip eder ve raporlar.", "cmt_en": "The internal audit function reports significant audit issues, supports the board in enterprise-wide Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance risk assessment, and conducts follow-up and reports on management’s response to external audits as part of its best practice governance activities.", "az": "Yalnız 1, 2 və 3.", "cmt_az": "İç denetim funksiyası əhəmiyyətli audit məsələlərini bildirir, idarə heyətini müəssisə miqyasında risk qiymətləndirməsində dəstəkləyir və xarici auditorun rəhbərliyin cavabı üzərində təqib aparır və hesabat verir."}, {"tr": "1, 2, 3 ve 4.", "en": "1, 2, 3, and 4.", "cmt_tr": "Yönetim kurulu ve üst yönetim, iç denetim fonksiyonu değil, paydaşlar için olumlu sonuçlar elde etmek amacıyla kurumsal varlıkların koruyucusu olarak görev yapar.", "cmt_en": "The board and senior management, not the internal audit function, act as custodians of corporate assets in the pursuit of positive outcomes for stakeholders.", "az": "1, 2, 3 və 4.", "cmt_az": "İdarə heyəti və üst rəhbərlik, iç denetim funksiyası deyil, maraqlı tərəflər üçün müsbət nəticələr əldə etmək məqsədilə korporativ aktivlərin əmanətçisi kimi fəaliyyət göstərir."}], "answer": 2, "q_az": "Ən yaxşı təcrübə yönetişim fəaliyyətlərində iç denetim funksiyasının rolları hansılardır? 1. Əhəmiyyətli audit məsələlərini bildirmək 2. İdarə heyətini müəssisə miqyasında risk qiymətləndirməsində dəstəkləmək 3. Xarici auditorun rəhbərliyin cavabı üzərində təqib aparmaq və hesabat vermək 4. Maraqlı tərəflər üçün müsbət nəticələr əldə etmək məqsədilə korporativ aktivlərin əmanətçisi kimi fəaliyyət göstərmək"}, {"q_tr": "İç denetim fonksiyonu yönetim kurulu, yönetim ve denetçilerin faaliyetlerinin koordinasyonunu değerlendirir. Bu değerlendirme en doğrudan hangi işlevle ilişkilidir?", "q_en": "The internal audit function assesses the coordination of the activities of the board, management, and auditors. This assessment most directly relates to the function of", "options": [{"tr": "Kalite güvencesi.", "en": "Quality assurance.", "cmt_tr": "Kalite güvence programı genellikle bir kurumsal birim için, örneğin iç denetim fonksiyonu için uygulanır.", "cmt_en": "A quality assurance program normally is implemented for an organizational unit, e.g., the internal audit function.", "az": "Keyfiyyət təminatı.", "cmt_az": "Keyfiyyət təminatı proqramı adətən bir təşkilati vahid üçün, məsələn, iç denetim funksiyası üçün tətbiq olunur."}, {"tr": "Risk yönetimi.", "en": "Risk management.", "cmt_tr": "Yönetişim (risk yönetimi değil) yönetim kurulu, dış ve iç denetçiler, diğer güvence sağlayıcıları ve yönetim arasında faaliyetlerin koordinasyonu ve bilgilerin iletilmesinden doğrudan sorumludur.", "cmt_en": "Governance (not risk management) is directly responsible for coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management", "az": "Risk idarəetməsi.", "cmt_az": "Yönetişim (risk idarəetməsi deyil) idarə heyəti, xarici və daxili auditorlar, digər güvencə təminatçıları və rəhbərlik arasında fəaliyyətlərin koordinasiyası və məlumatların çatdırılmasına birbaşa məsuldur."}, {"tr": "Yönetişim.", "en": "Governance.", "cmt_tr": "İç denetim fonksiyonu kuruluşun yönetişim süreçlerini iyileştirmek için değerlendirmeli ve uygun önerilerde bulunmalıdır: • Stratejik ve operasyonel kararların alınması; • Risk yönetimi ve kontrolün denetlenmesi; • Kuruluşta uygun etik ve değerlerin teşvik edilmesi; • Etkin kurumsal performans yönetimi ve hesap verebilirliğin sağlanması; • Risk ve kontrol bilgilerinin iletilmesi; ve • Faaliyetlerin koordinasyonu.", "cmt_en": "The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for: • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; • Ensuring effective organizational performance management and accountability; • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management.", "az": "Yönetişim.", "cmt_az": "İç denetim funksiyası təşkilatın yönetişim proseslərini təkmilləşdirmək üçün qiymətləndirməli və müvafiq tövsiyələr verməlidir: • Strateji və əməliyyat qərarlarının qəbul edilməsi; • Risk idarəetməsinə və nəzarətə nəzarət; • Təşkilatda müvafiq etika və dəyərlərin təşviq edilməsi; • Effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edilməsi; • Risk və nəzarət məlumatlarının təşkilatın müvafiq sahələrinə çatdırılması; və • İdarə heyəti, xarici və daxili auditorlar, digər güvencə təminatçıları və rəhbərlik arasında fəaliyyətlərin koordinasiyası və məlumatların çatdırılması."}, {"tr": "Kontrol ortamı.", "en": "The control environment.", "cmt_tr": "Yönetişim (kontrol değil) yönetim kurulu, dış ve iç denetçiler, diğer güvence sağlayıcıları ve yönetim arasında faaliyetlerin koordinasyonu ve bilgilerin iletilmesinden doğrudan sorumludur.", "cmt_en": "Governance (not control) is directly responsible for coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "az": "Nəzarət mühiti.", "cmt_az": "Yönetişim (nəzarət deyil) idarə heyəti, xarici və daxili auditorlar, digər güvencə təminatçıları və rəhbərlik arasında fəaliyyətlərin koordinasiyası və məlumatların çatdırılmasına birbaşa məsuldur."}], "answer": 2, "q_az": "İç denetim funksiyası idarə heyəti, rəhbərlik və auditorların fəaliyyətlərinin koordinasiyasını qiymətləndirir. Bu qiymətləndirmə ən birbaşa hansı funksiya ilə əlaqəlidir?"}, {"q_tr": "İç denetim fonksiyonunun kuruluşun etik ikliminin değerlendirilmesi şunlara kadar uzanır: 1. Özgeçmiş kontrollerinin etkinliğinin değerlendirilmesi 2. Rollerin tanımlanması ve hesap verebilirliğin belirlenmesi 3. Tedarikçilerin etik davranış gereksinimleri hakkında beyanlarının etkinliğinin değerlendirilmesi", "q_en": "The internal audit function’s evaluation of the ethical climate of the organization extends to 1. Evaluating the effectiveness of background checks 2. Defining roles and specifying accountability 3. Evaluating the effectiveness of declarations by suppliers about the requirements of ethical behavior", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "İç denetim personeli ayrıca tedarikçilerin gerekli davranış hakkında beyanlarının etkinliğini değerlendirir. Ayrıca iç denetçilerin rolleri tanımlama ve hesap verebilirliği belirleme yetkisi yoktur.", "cmt_en": "The internal audit staff also evaluates the effectiveness of declarations by suppliers about required behavior. Additionally, the internal auditors do not have the authority to define roles and specify accountability.", "az": "Yalnız 1 və 2.", "cmt_az": "Daxili audit heyəti həmçinin təchizatçıların tələb olunan davranış haqqında bəyanatlarının effektivliyini qiymətləndirir. Bundan əlavə, daxili auditorların rolları təyin etmək və hesabatlılığı müəyyən etmək səlahiyyəti yoxdur."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "İç denetçiler ayrıca özgeçmiş kontrollerinin etkinliğini değerlendirir. Ayrıca iç denetçilerin rolleri tanımlama ve hesap verebilirliği belirleme yetkisi yoktur.", "cmt_en": "The internal auditors also evaluate the effectiveness of background checks. Additionally, the internal auditors do not have the authority to define roles and specify accountability.", "az": "Yalnız 2 və 3.", "cmt_az": "Daxili auditorlar həmçinin arxaplan yoxlamalarının effektivliyini qiymətləndirir. Bundan əlavə, daxili auditorların rolları təyin etmək və hesabatlılığı müəyyən etmək səlahiyyəti yoxdur."}, {"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını periyodik olarak değerlendirir. Bu değerlendirmenin bir parçası olarak iç denetim fonksiyonu özgeçmiş kontrollerinin ve tedarikçilerin etik davranış gereksinimleri hakkında beyanlarının etkinliğini değerlendirir. Ancak rollerin tanımlanması ve hesap verebilirliğin belirlenmesi yönetim işlevleridir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. As part of this assessment, the internal audit function evaluates the effectiveness of background checks and of declarations by suppliers about the requirements of ethical behavior. However, defining roles and specifying accountability are management functions.", "az": "Yalnız 1 və 3.", "cmt_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir. Bu qiymətləndirmənin bir hissəsi olaraq, iç denetim funksiyası arxaplan yoxlamalarının və təchizatçıların etik davranış tələbləri haqqında bəyanatlarının effektivliyini qiymətləndirir. Lakin rolların təyin edilməsi və hesabatlılığın müəyyən edilməsi rəhbərlik funksiyalarıdır."}, {"tr": "1, 2 ve 3.", "en": "1, 2, and 3.", "cmt_tr": "İç denetçilerin rolleri tanımlama ve hesap verebilirliği belirleme yetkisi yoktur.", "cmt_en": "The internal auditors do not have the authority to define roles and specify accountability.", "az": "1, 2 və 3.", "cmt_az": "Daxili auditorların rolları təyin etmək və hesabatlılığı müəyyən etmək səlahiyyəti yoxdur."}], "answer": 2, "q_az": "İç denetim funksiyasının təşkilatın etik mühitinin qiymətləndirilməsi aşağıdakılara qədər uzanır: 1. Arxaplan yoxlamalarının effektivliyinin qiymətləndirilməsi 2. Rolların təyin edilməsi və hesabatlılığın müəyyən edilməsi 3. Təchizatçıların etik davranış tələbləri haqqında bəyanatlarının effektivliyinin qiymətləndirilməsi"}, {"q_tr": "Güvence görevinde iç denetçinin etikle ilgili faaliyetleri değerlendirme sorumluluğu nedir?", "q_en": "In an assurance engagement, what is the internal auditor’s responsibility for evaluating ethics-related activities?", "options": [{"tr": "Tasarımlarını, uygulamalarını ve etkinliklerini değerlendirmek.", "en": "Evaluate their design, implementation, and effectiveness.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etikle ilgili hedeflerinin, programlarının ve faaliyetlerinin tasarımını, uygulamasını ve etkinliğini değerlendirmelidir.", "cmt_en": "The internal audit function must evaluate the design, implementation, and effectiveness of the organizations ethics-related objectives, programs, and activities.", "az": "Onların dizaynını, tətbiqini və effektivliyini qiymətləndirmək.", "cmt_az": "İç denetim funksiyası təşkilatın etika ilə bağlı hədəflərinin, proqramlarının və fəaliyyətlərinin dizaynını, tətbiqini və effektivliyini qiymətləndirməlidir."}, {"tr": "Yalnızca etikle ilgili faaliyetlerin tasarımını değerlendirmek.", "en": "Evaluate only the design of ethics-related activities.", "cmt_tr": "İç denetçiler etikle ilgili faaliyetlerin, hedeflerin ve programların tasarımını, uygulamasını ve etkinliğini değerlendirmelidir.", "cmt_en": "Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs.", "az": "Yalnız etika ilə bağlı fəaliyyətlərin dizaynını qiymətləndirmək.", "cmt_az": "Daxili auditorlar etika ilə bağlı fəaliyyətlərin, hədəflərin və proqramların dizaynını, tətbiqini və effektivliyini qiymətləndirməlidirlər."}, {"tr": "Çalışan faaliyetlerini kuralların hükümlerine uyum açısından gözden geçirmek.", "en": "Review employee activities for compliance with provisions of the code.", "cmt_tr": "İç denetçiler etikle ilgili faaliyetlerin, hedeflerin ve programların tasarımını, uygulamasını ve etkinliğini değerlendirmelidir.", "cmt_en": "Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs.", "az": "İşçi fəaliyyətlərini kodeksin müddəalarına uyğunluq baxımından nəzərdən keçirmək.", "cmt_az": "Daxili auditorlar etika ilə bağlı fəaliyyətlərin, hədəflərin və proqramların dizaynını, tətbiqini və effektivliyini qiymətləndirməlidirlər."}, {"tr": "Çeşitli çalışan işlemleri üzerinde testler yapmak.", "en": "Perform tests on various employee transactions.", "cmt_tr": "İç denetçiler etikle ilgili faaliyetlerin, hedeflerin ve programların tasarımını, uygulamasını ve etkinliğini değerlendirmelidir.", "cmt_en": "Internal auditors must evaluate the design, implementation, and effectiveness of ethics-related activities, objectives, and programs. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "az": "Müxtəlif işçi əməliyyatları üzrə testlər aparmaq.", "cmt_az": "Daxili auditorlar etika ilə bağlı fəaliyyətlərin, hədəflərin və proqramların dizaynını, tətbiqini və effektivliyini qiymətləndirməlidirlər."}], "answer": 0, "q_az": "Güvencə tapşırığında daxili auditorun etika ilə bağlı fəaliyyətləri qiymətləndirmək məsuliyyəti nədir?"}, {"q_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını ve yasal ve etik uyumun sağlanmasındaki etkinliğini periyodik olarak değerlendirir. İç denetçiler bu nedenle aşağıdakilerden hangisinin etkinliğini değerlendirir? 1. Etik kültürü zayıflatan süreçlerin düzenli gözden geçirilmesi 2. İddia edilen suistimallerin gizli bildirilmesi 3. Çalışanların katkılarını teşvik eden personel uygulamaları", "q_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of which of the following? 1. Regular reviews of the processes that undermine the ethical culture 2. Confidential reporting of alleged misconduct 3. Personnel practices that encourage contributions by employee", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "İç denetim personeli ayrıca çalışanların katkılarını teşvik eden personel uygulamalarının etkinliğini değerlendirir.", "cmt_en": "The internal audit staff also evaluates the effectiveness of personnel practices that encourage contributions by employees.", "az": "Yalnız 1 və 2.", "cmt_az": "Daxili audit heyəti həmçinin işçilərin töhfələrini təşviq edən kadr təcrübələrinin effektivliyini qiymətləndirir."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "İç denetçiler ayrıca etik kültürü zayıflatan süreçlerin düzenli gözden geçirilmesinin etkinliğini değerlendirir.", "cmt_en": "The internal auditors also evaluate the effectiveness of regular reviews of the processes that undermine the ethical culture.", "az": "Yalnız 2 və 3.", "cmt_az": "Daxili auditorlar həmçinin etik mədəniyyəti zəiflədən proseslərin müntəzəm nəzərdən keçirilməsinin effektivliyini qiymətləndirir."}, {"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "İç denetçiler ayrıca iddia edilen suistimallerin gizli bildirilmesinin etkinliğini değerlendirir.", "cmt_en": "The internal auditors also evaluate the effectiveness of confidential reporting of alleged misconduct.", "az": "Yalnız 1 və 3.", "cmt_az": "Daxili auditorlar həmçinin iddia edilən qanun pozuntularının gizli bildirilməsinin effektivliyini qiymətləndirir."}, {"tr": "1, 2 ve 3.", "en": "1, 2, and 3.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını periyodik olarak değerlendirir. İç denetçiler bu nedenle etik kültürü zayıflatan süreçlerin düzenli gözden geçirilmesinin, iddia edilen suistimallerin gizli bildirilmesinin ve çalışanların katkılarını teşvik eden personel uygulamalarının etkinliğini değerlendirir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors therefore evaluate the effectiveness of regular reviews of the processes that undermine the ethical culture, confidential reporting of alleged misconduct, and personnel practices that encourage contributions by employees.", "az": "1, 2 və 3.", "cmt_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir. Daxili auditorlar buna görə etik mədəniyyəti zəiflədən proseslərin müntəzəm nəzərdən keçirilməsinin, iddia edilən qanun pozuntularının gizli bildirilməsinin və işçilərin töhfələrini təşviq edən kadr təcrübələrinin effektivliyini qiymətləndirir."}], "answer": 3, "q_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir. Daxili auditorlar buna görə aşağıdakılardan hansının effektivliyini qiymətləndirir? 1. Etik mədəniyyəti zəiflədən proseslərin müntəzəm nəzərdən keçirilməsi 2. İddia edilən qanun pozuntularının gizli bildirilməsi 3. İşçilərin töhfələrini təşviq edən kadr təcrübələri"}, {"q_tr": "Kurumsal yönetişimde iç denetim fonksiyonunun sorumluluğu nedir?", "q_en": "Which of the following is a responsibility of the internal audit function in organizational governance?", "options": [{"tr": "Kurumsal hedeflere ulaşmak için yönetim kurulu direktiflerini yerine getirmek.", "en": "Carrying out board directives to achieve organizational objectives.", "cmt_tr": "Yönetim kurumsal hedeflere ulaşmak için yönetim kurulu direktiflerini yerine getirmekten sorumludur.", "cmt_en": "Management is responsible for carrying out board directives to achieve organizational objectives.", "az": "Təşkilati hədəflərə çatmaq üçün idarə heyətinin direktivlərini yerinə yetirmək.", "cmt_az": "Rəhbərlik təşkilati hədəflərə çatmaq üçün idarə heyətinin direktivlərini yerinə yetirməyə məsuldur."}, {"tr": "Denetim önerilerinin zamanında uygulanmasının sağlanması.", "en": "Ensuring the timely implementation of audit recommendations.", "cmt_tr": "Yönetim denetim önerilerinin zamanında uygulanmasını sağlama sorumluluğunu taşır. İç denetim fonksiyonu denetim önerilerinin durumunun izlenmesi için zamanında prosedür geliştirmekten sorumludur.", "cmt_en": "Management has the responsibility of ensuring the timely implementation of the audit recommendations. The internal audit function is responsible for the development of a timely procedure to monitor the disposition of the audit recommendations.", "az": "Audit tövsiyələrinin vaxtında tətbiqinin təmin edilməsi.", "cmt_az": "Rəhbərlik audit tövsiyələrinin vaxtında tətbiqini təmin etmək məsuliyyəti daşıyır. İç denetim funksiyası audit tövsiyələrinin vəziyyətinin monitorinqi üçün vaxtında prosedur hazırlamağa məsuldur."}, {"tr": "Davranış kurallarına uyumun izlenmesi.", "en": "Monitoring compliance with the code of conduct.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını ve yasal ve etik uyumun sağlanmasındaki etkinliğini periyodik olarak değerlendirir. İç denetçiler bu nedenle resmi davranış kurallarının ve ilgili beyan ve politikaların (dolandırıcılık ve yolsuzlukla ilgili prosedürler dahil) etkinliğini değerlendirir.", "cmt_en": "The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance. Internal auditors Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance therefore evaluate the effectiveness of a formal code of conduct and related statements and policies (including procedures covering fraud and corruption).", "az": "Davranış kodeksinə uyğunluğun monitorinqi.", "cmt_az": "İç denetim funksiyası təşkilatın etik mühitinin elementlərini və hüquqi və etik uyğunluğun əldə edilməsində effektivliyini vaxtaşırı qiymətləndirir. Daxili auditorlar buna görə formal davranış kodeksinin və əlaqəli bəyanat və siyasətlərin (saxtakarlıq və korrupsiya ilə bağlı prosedurlar daxil olmaqla) effektivliyini qiymətləndirir."}, {"tr": "Yönetişimin tanımının belirlenmesi.", "en": "Establishing the definition of governance.", "cmt_tr": "İç denetim fonksiyonu yönetişimin tanımını belirlemek için yönetim kurulu ve üst yönetimle birlikte çalışmak sorumluluğunu taşır.", "cmt_en": "The internal audit function is responsible for working with the board and senior management to determine the definition of governance.", "az": "Yönetişimin tərifinin müəyyən edilməsi.", "cmt_az": "İç denetim funksiyası yönetişimin tərifini müəyyən etmək üçün idarə heyəti və üst rəhbərliklə birlikdə işləmək məsuliyyəti daşıyır."}], "answer": 2, "q_az": "Təşkilati yönetişimdə iç denetim funksiyasının məsuliyyəti nədir?"}, {"q_tr": "Daha az yapılandırılmış bir yönetişim sürecinde iç denetim rolü en çok nedir?", "q_en": "Which of the following is most likely an internal audit role in a less structured governance process?", "options": [{"tr": "Belirli yönetişim süreçlerinin tasarlanması.", "en": "Designing specific governance processes.", "cmt_tr": "İç denetçiler süreçler tasarlayarak objektifliklerini zedeler. Ancak belirli süreçlerin tasarımının ve etkinliğinin değerlendirilmesi tipik bir iç denetim rolüdür.", "cmt_en": "Internal auditors impair their objectivity by designing processes. However, evaluating the design and effectiveness of specific processes is a typical internal audit role.", "az": "Xüsusi yönetişim proseslərinin hazırlanması.", "cmt_az": "Daxili auditorlar proseslər hazırlayaraq obyektivliklərini zədələyirlər. Lakin xüsusi proseslərin dizaynının və effektivliyinin qiymətləndirilməsi tipik iç denetim roludur."}, {"tr": "Yönetişim uygulamalarının ve yapısının optimize edilmesinde danışmanlık rolü oynamak.", "en": "Playing a consulting role in optimizing governance practices and structure.", "cmt_tr": "Yönetişim uygulamalarının ve yapısının optimize edilmesinde danışmanlık rolü oynamak daha yapılandırılmış iç denetim yönetişim olgunluk modeline özgüdür.", "cmt_en": "Playing a consulting role in optimizing governance practices and structure is typical of a more structured internal auditing governance maturity model. The emphasis shifts to considering best practices and adapting them to the specific organization.", "az": "Yönetişim təcrübələrinin və strukturunun optimallaşdırılmasında məsləhətçi rolu oynamaq.", "cmt_az": "Yönetişim təcrübələrinin və strukturunun optimallaşdırılmasında məsləhətçi rolu oynamaq daha strukturlaşdırılmış iç denetim yönetişim yetkinlik modelinə xasdır."}, {"tr": "Kuruluşun temel riskleri hakkında tavsiye vermek.", "en": "Providing advice about basic risks to the organization.", "cmt_tr": "Daha az olgun yönetişim sistemi politikalara, prosedürlere, planlara, yasalara, düzenlemelere ve sözleşmelere uyum gereksinimlerini vurgulayacaktır. Ayrıca kuruluşun temel risklerini ele alacaktır. Dolayısıyla iç denetim fonksiyonu bu konularda tavsiye verecektir.", "cmt_en": "A less mature governance system will emphasize the requirements for compliance with policies, procedures, plans, laws, regulations, and contracts. It will also address the basic risks to the organization. Thus, the internal audit function will provide advice about such matters. As the governance process becomes more structured, the internal audit function’s emphasis will shift to optimizing the governance structure and practices.", "az": "Təşkilatın əsas riskləri haqqında məsləhət vermək.", "cmt_az": "Daha az yetkin yönetişim sistemi siyasətlərə, prosedurlara, planlara, qanunlara, tənzimləmələrə və müqavilələrə uyğunluq tələblərini vurğulayacaq. Həmçinin təşkilatın əsas risklərini əhatə edəcək. Beləliklə, iç denetim funksiyası bu məsələlər haqqında məsləhət verəcək."}, {"tr": "Belirli yönetişim süreçlerinin etkinliğinin değerlendirilmesi.", "en": "Evaluating the effectiveness of specific governance processes.", "cmt_tr": "Belirli yönetişim süreçlerinin etkinliğinin değerlendirilmesi daha yapılandırılmış iç denetim yönetişim olgunluk modeline özgüdür.", "cmt_en": "Evaluating the effectiveness of specific governance processes is typical of a more structured internal auditing governance maturity model.", "az": "Xüsusi yönetişim proseslərinin effektivliyinin qiymətləndirilməsi.", "cmt_az": "Xüsusi yönetişim proseslərinin effektivliyinin qiymətləndirilməsi daha strukturlaşdırılmış iç denetim yönetişim yetkinlik modelinə xasdır."}], "answer": 2, "q_az": "Daha az strukturlaşdırılmış yönetişim prosesində iç denetim rolu ən çox nədir?"}, {"q_tr": "Yönetişimi değerlendirirken iç denetçi neyi dikkate almalıdır? 1. Belirli süreçlerin denetimleri 2. Yönetişime odaklanmayan denetimlerden kaynaklanan yönetişim konuları 3. Diğer güvence sağlayıcılarının çalışmalarının sonuçları 4. Yönetişimi iyileştirme fırsatını gösteren olumsuz olaylar gibi bilgiler", "q_en": "Which of the following should an internal auditor consider when assessing governance? 1. Audits of specific processes 2. Governance issues arising from audits not focused on governance 3. The results of other assurance providers’ work 4. Information such as adverse incidents indicating an opportunity to improve governance", "options": [{"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "İç denetçiler ayrıca yönetişime odaklanmayan denetimlerden kaynaklanan yönetişim konularını ve yönetişimi iyileştirme fırsatını gösteren olumsuz olaylar gibi diğer bilgileri dikkate almalıdır.", "cmt_en": "Internal auditors should also consider governance issues arising from audits not focused on governance and other information such as adverse incidents indicating an opportunity to improve governance.", "az": "Yalnız 1 və 3.", "cmt_az": "Daxili auditorlar həmçinin yönetişimə yönəlməyən auditlərdən yaranan yönetişim məsələlərini və yönetişimi təkmilləşdirmək üçün fürsəti göstərən mənfi hadisələr kimi digər məlumatları nəzərə almalıdır."}, {"tr": "Yalnızca 2 ve 4.", "en": "2 and 4 only.", "cmt_tr": "İç denetçiler ayrıca belirli süreçlerin denetimlerini ve diğer güvence sağlayıcılarının çalışmalarının sonuçlarını dikkate almalıdır.", "cmt_en": "Internal auditors should also consider audits of specific processes and the results of other assurance providers’ work.", "az": "Yalnız 2 və 4.", "cmt_az": "Daxili auditorlar həmçinin xüsusi proseslərin auditlərini və digər güvencə təminatçılarının işlərinin nəticələrini nəzərə almalıdır."}, {"tr": "Yalnızca 1, 2 ve 3.", "en": "1, 2, and 3 only.", "cmt_tr": "İç denetçiler ayrıca yönetişimi iyileştirme fırsatını gösteren olumsuz olaylar gibi diğer bilgileri dikkate almalıdır.", "cmt_en": "Internal auditors should also consider other information such as adverse incidents indicating an opportunity to improve governance.", "az": "Yalnız 1, 2 və 3.", "cmt_az": "Daxili auditorlar həmçinin yönetişimi təkmilləşdirmək üçün fürsəti göstərən mənfi hadisələr kimi digər məlumatları nəzərə almalıdır."}, {"tr": "1, 2, 3 ve 4.", "en": "1, 2, 3, and 4. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "cmt_tr": "Yönetişim değerlendirmesi çok sayıda denetime dayanma olasılığı yüksektir. İç denetçi • Belirli süreçlerin denetimlerini, • Yönetişime odaklanmayan denetimlerden kaynaklanan yönetişim konularını, • Diğer güvence sağlayıcılarının çalışmalarının sonuçlarını ve • Yönetişimi iyileştirme fırsatını gösteren olumsuz olaylar gibi diğer bilgileri dikkate almalıdır.", "cmt_en": "Assessments of governance are likely to be based on numerous audits. The internal auditor should consider • Audits of specific processes, • Governance issues arising from audits not focused on governance, • The results of other assurance providers’ work, and • Other information such as adverse incidents indicating an opportunity to improve governance.", "az": "1, 2, 3 və 4.", "cmt_az": "Yönetişimin qiymətləndirilməsi çox sayda auditlerə əsaslanma ehtimalı yüksəkdir. Daxili auditor • Xüsusi proseslərin auditlərini, • Yönetişimə yönəlməyən auditlərdən yaranan yönetişim məsələlərini, • Digər güvencə təminatçılarının işlərinin nəticələrini, və • Yönetişimi təkmilləşdirmək üçün fürsəti göstərən mənfi hadisələr kimi digər məlumatları nəzərə almalıdır."}], "answer": 3, "q_az": "Yönetişimi qiymətləndirərkən daxili auditor nəyi nəzərə almalıdır? 1. Xüsusi proseslərin auditləri 2. Yönetişimə yönəlməyən auditlərdən yaranan yönetişim məsələləri 3. Digər güvencə təminatçılarının işlərinin nəticələri 4. Yönetişimi təkmilləşdirmək üçün fürsəti göstərən mənfi hadisələr kimi məlumatlar"}, {"q_tr": "Yönetişim sürecinde iç denetim fonksiyonu en çok ne yapmalıdır?", "q_en": "In the governance process, the internal audit function most likely should", "options": [{"tr": "Dış ve iç denetçilerin ve yönetimin faaliyetlerini koordine etmek.", "en": "Coordinate the activities of the external and internal auditors and management.", "cmt_tr": "İç denetim fonksiyonu dış ve iç denetçilerin ve yönetimin faaliyetlerinin koordinasyon süreçlerini değerlendirir.", "cmt_en": "The internal audit function evaluates the processes by which activities of the external and internal auditors and management are coordinated.", "az": "Xarici və daxili auditorların və rəhbərliyin fəaliyyətlərini koordinasiya etmək.", "cmt_az": "İç denetim funksiyası xarici və daxili auditorların və rəhbərliyin fəaliyyətlərinin koordinasiya proseslərini qiymətləndirir."}, {"tr": "Risk ve kontrol bilgilerini iletmek.", "en": "Communicate risk and control information.", "cmt_tr": "İç denetim fonksiyonu risk ve kontrol bilgilerinin iletilme süreçlerini değerlendirir.", "cmt_en": "The internal audit function evaluates the processes by which risk and control information is communicated.", "az": "Risk və nəzarət məlumatlarını çatdırmaq.", "cmt_az": "İç denetim funksiyası risk və nəzarət məlumatlarının çatdırılma proseslərini qiymətləndirir."}, {"tr": "Performans yönetimi sürecini değerlendirmek.", "en": "Evaluate the process for performance management.", "cmt_tr": "İç denetim fonksiyonu kuruluşun yönetişim süreçlerini iyileştirmek için değerlendirmeli ve uygun önerilerde bulunmalıdır: • Stratejik ve operasyonel kararların alınması; • Risk yönetimi ve kontrolün denetlenmesi; • Uygun etik ve değerlerin teşvik edilmesi; • Etkin performans yönetimi ve hesap verebilirliğin sağlanması; • Risk ve kontrol bilgilerinin iletilmesi; ve • Faaliyetlerin koordinasyonu.", "cmt_en": "The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; • Ensuring effective organizational performance management and accountability; Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management.", "az": "Performans idarəetmə prosesini qiymətləndirmək.", "cmt_az": "İç denetim funksiyası təşkilatın yönetişim proseslərini təkmilləşdirmək üçün qiymətləndirməli və müvafiq tövsiyələr verməlidir: • Strateji və əməliyyat qərarlarının qəbul edilməsi; • Risk idarəetməsinə və nəzarətə nəzarət; • Təşkilatda müvafiq etika və dəyərlərin təşviq edilməsi; • Effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edilməsi; • Risk və nəzarət məlumatlarının çatdırılması; və • Fəaliyyətlərin koordinasiyası."}, {"tr": "Etik ve değerleri teşvik etmek.", "en": "Promote ethics and values.", "cmt_tr": "İç denetim fonksiyonu etik ve değerlerin teşvik süreçlerini değerlendirir.", "cmt_en": "The internal audit function evaluates the processes by which ethics and values are promoted.", "az": "Etika və dəyərləri təşviq etmək.", "cmt_az": "İç denetim funksiyası etika və dəyərlərin təşviq proseslərini qiymətləndirir."}], "answer": 2, "q_az": "Yönetişim prosesində iç denetim funksiyası ən çox nə etməlidir?"}, {"q_tr": "Etikle ilgili konularda güvence görevinde iç denetim fonksiyonunun sorumluluğu nedir?", "q_en": "The responsibility of the internal audit function in an assurance engagement for ethics- related matters is to", "options": [{"tr": "Kuruluşun etikle ilgili faaliyetlerinin tasarımını ve etkinliğini değerlendirmek.", "en": "Evaluate the design and effectiveness of the organization’s ethics-related activities.", "cmt_tr": "İç denetim fonksiyonu kuruluşun etikle ilgili hedeflerinin, programlarının ve faaliyetlerinin tasarımını, uygulamasını ve etkinliğini değerlendirmelidir. İç denetim fonksiyonu kuruluşun etik ikliminin unsurlarını periyodik olarak değerlendirir.", "cmt_en": "The internal audit function must evaluate the design, implementation, and effectiveness of the organization’s ethics-related objectives, programs, and activities. The internal audit function periodically assesses the elements of the ethical climate of the organization and its effectiveness in achieving legal and ethical compliance.", "az": "Təşkilatın etika ilə bağlı fəaliyyətlərinin dizaynını və effektivliyini qiymətləndirmək.", "cmt_az": "İç denetim funksiyası təşkilatın etika ilə bağlı hədəflərinin, proqramlarının və fəaliyyətlərinin dizaynını, tətbiqini və effektivliyini qiymətləndirməlidir. İç denetim funksiyası təşkilatın etik mühitinin elementlərini vaxtaşırı qiymətləndirir."}, {"tr": "Etik davranışı teşvik etmek ve örnek olmak.", "en": "Promote and set the example of ethical behavior.", "cmt_tr": "Üst yönetim etik davranışı teşvik etme ve örnek olma (yani üstten ton belirleme) konusunda nihai sorumluluğa sahiptir.", "cmt_en": "Senior management has ultimate responsibility for promoting and setting the example of ethical behavior (i.e., setting the tone at the top).", "az": "Etik davranışı təşviq etmək və nümunə göstərmək.", "cmt_az": "Üst rəhbərlik etik davranışın təşviq edilməsi və nümunə göstərilməsi (yəni, yuxarıdan ton müəyyən etmə) üçün son məsuliyyət daşıyır."}, {"tr": "Etikle ilgili sağlam hedefler ve programlar oluşturmak ve sürdürmek.", "en": "Establish and maintain sound ethics-related objectives and programs.", "cmt_tr": "Üst yönetim etikle ilgili sağlam hedefler ve programlar oluşturmak ve sürdürmekten sorumludur.", "cmt_en": "Senior management is responsible for establishing and maintaining sound ethics-related objectives and programs.", "az": "Etika ilə bağlı sağlam hədəfləri və proqramları qurmaq və qorumaq.", "cmt_az": "Üst rəhbərlik etika ilə bağlı sağlam hədəfləri və proqramları qurmaq və qorumaqdanməsuldur."}, {"tr": "Kuruluşun etik iklimini denetlemek.", "en": "Oversee the organization’s ethical climate.", "cmt_tr": "Yönetim kurulu kuruluşun etik iklimini denetler.", "cmt_en": "The board oversees the organization’s ethical climate.", "az": "Təşkilatın etik mühitinə nəzarət etmək.", "cmt_az": "İdarə heyəti təşkilatın etik mühitinə nəzarət edir."}], "answer": 0, "q_az": "Etika ilə bağlı məsələlərdə güvencə tapşırığında iç denetim funksiyasının məsuliyyəti nədir?"}, {"q_tr": "Birkaç yıl önce büyük bir finans kuruluşu tarafından davranış kuralları geliştirilmiş ve tüm yöneticilere ve çalışanlara dağıtılmıştır. İç denetçinin davranış kuralları hakkında yönetim kuruluna en yüksek düzeyde rahatlık sağlamak için en iyi yaklaşımı nedir?", "q_en": "A code of conduct was developed several years ago and distributed by a large financial institution to all its officers and employees. What is the internal auditor’s best approach to providing the board with the highest level of comfort about the code of conduct?", "options": [{"tr": "Kuralların kapsamlılığını ve bunlara uyumu tam olarak değerlendirmek ve sonuçları yönetim kuruluna raporlamak.", "en": "Fully evaluate the comprehensiveness of the code and compliance with it and report the results to the board.", "cmt_tr": "Davranış kurallarını değerlendirirken iki unsuru dikkate almak önemlidir: kapsamlılık ve uyum. Kurallar çalışanların karşılaşması beklenen etik sorunları ele almalı ve uygun rehberlik sağlamalıdır. İç denetçi ayrıca çalışanların belirlenen standartlara ne ölçüde uyduğunu dikkate almalıdır.", "cmt_en": "When evaluating a code of conduct, it is important to consider two items: comprehensiveness Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance and compliance. The code should address the ethical issues that the employees are expected to encounter and provide suitable guidance. The internal auditor also must consider the extent to which employees are complying with the standards established.", "az": "Kodeksin əhatəliliyini və ona uyğunluğu tam qiymətləndirmək və nəticələri idarə heyətinə bildirmək.", "cmt_az": "Davranış kodeksini qiymətləndirərkən iki elementi nəzərə almaq vacibdir: əhatəlilik və uyğunluq. Kodeks işçilərin qarşılaşacağı gözlənilən etik məsələləri əhatə etməli və müvafiq təlimat verməlidir. Daxili auditor həmçinin işçilərin müəyyən edilmiş standartlara nə dərəcədə uyğun gəldiyini nəzərə almalıdır."}, {"tr": "Kurallara uyum açısından kurumsal uygulamaları tam olarak değerlendirmek ve yönetim kuruluna raporlamak.", "en": "Fully evaluate organizational practices for compliance with the code and report to the board.", "cmt_tr": "Uygulamaları değerlendirmek ve yönetim kuruluna raporlamak en iyi yaklaşım değildir.", "cmt_en": "Evaluating practices and reporting to the board is not the best approach.", "az": "Kodeksə uyğunluq baxımından təşkilati təcrübələri tam qiymətləndirmək və idarə heyətinə bildirmək.", "cmt_az": "Təcrübələri qiymətləndirmək və idarə heyətinə bildirmək ən yaxşı yanaşma deyil."}, {"tr": "Çalışan faaliyetlerini kuralların hükümlerine uyum açısından gözden geçirmek ve yönetim kuruluna raporlamak.", "en": "Review employee activities for compliance with provisions of the code and report to the board.", "cmt_tr": "Çalışan faaliyetlerinin gözden geçirilmesi kapsamlılığın değerlendirilmesi kadar davranış kuralları hakkında rahatlık sağlamaz.", "cmt_en": "Reviewing employee activities does not provide as much comfort about the code of conduct as evaluation of comprehensiveness.", "az": "İşçi fəaliyyətlərini kodeksin müddəalarına uyğunluq baxımından nəzərdən keçirmək və idarə heyətinə bildirmək.", "cmt_az": "İşçi fəaliyyətlərinin nəzərdən keçirilməsi əhatəliliyin qiymətləndirilməsi qədər davranış kodeksi haqqında rahatlıq təmin etmir."}, {"tr": "Davranış kurallarının potansiyel ihlallerini tespit etmek için çeşitli çalışan işlemleri üzerinde testler yapmak.", "en": "Perform tests on various employee transactions to detect potential violations of the code of conduct.", "cmt_tr": "Çalışan işlemleri üzerinde testler yapmak en iyi yaklaşım değildir.", "cmt_en": "Performing tests on employee transactions is not the best approach.", "az": "Davranış kodeksinin potensial pozuntularını aşkar etmək üçün müxtəlif işçi əməliyyatları üzrə testlər aparmaq.", "cmt_az": "İşçi əməliyyatları üzrə testlərin aparılması ən yaxşı yanaşma deyil."}], "answer": 0, "q_az": "Bir neçə il əvvəl böyük bir maliyyə qurumu tərəfindən davranış kodeksi hazırlanıb və bütün zabit və işçilərə paylanıb. Daxili auditorun davranış kodeksi haqqında idarə heyətinə ən yüksək səviyyədə rahatlıq təmin etmək üçün ən yaxşı yanaşması nədir?"}, {"q_tr": "İç denetim fonksiyonu aşağıdaki süreçleri değerlendirerek kuruluşun yönetişim sürecine katkıda bulunmalıdır: 1. Etik ve değerlerin teşvik edilmesi. 2. Etkin kurumsal performans yönetimi ve hesap verebilirliğin sağlanması. 3. Risk ve kontrol bilgilerinin iletilmesi. 4. Dış ve iç denetçilerin ve yönetimin faaliyetlerinin koordinasyonu.", "q_en": "The internal audit function should contribute to the organization’s governance process by evaluating the processes through which 1. Ethics and values are promoted. 2. Effective organizational performance management and accountability are ensured. 3. Risk and control information is communicated. 4. Activities of the external and internal auditors and management are coordinated.", "options": [{"tr": "Yalnızca 1.", "en": "1 only.", "cmt_tr": "İç denetim fonksiyonu ayrıca etkin performans yönetimi ve hesap verebilirliğin sağlandığı, risk ve kontrol bilgilerinin iletildiği ve faaliyetlerin koordine edildiği süreçleri değerlendirir.", "cmt_en": "The internal audit function also evaluates the processes through which effective organizational performance management and accountability are ensured, risk and control information is communicated, and activities of the external and internal auditors and management are coordinated.", "az": "Yalnız 1.", "cmt_az": "İç denetim funksiyası həmçinin effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edildiyi, risk və nəzarət məlumatlarının çatdırıldığı və xarici və daxili auditorların və rəhbərliyin fəaliyyətlərinin koordinasiya edildiyi prosesləri qiymətləndirir."}, {"tr": "Yalnızca 4.", "en": "4 only.", "cmt_tr": "İç denetim fonksiyonu ayrıca etik ve değerlerin teşvik edildiği, etkin performans yönetimi ve hesap verebilirliğin sağlandığı ve risk ve kontrol bilgilerinin iletildiği süreçleri değerlendirir.", "cmt_en": "The internal audit function also evaluates the processes through which ethics and values are promoted, effective organizational performance management and accountability are ensured, and risk and control information is communicated.", "az": "Yalnız 4.", "cmt_az": "İç denetim funksiyası həmçinin etika və dəyərlərin təşviq edildiyi, effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edildiyi və risk və nəzarət məlumatlarının çatdırıldığı prosesləri qiymətləndirir."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "İç denetim fonksiyonu ayrıca etik ve değerlerin teşvik edildiği ve faaliyetlerin koordine edildiği süreçleri değerlendirir.", "cmt_en": "The internal audit function also evaluates the processes through which ethics and values are promoted and activities of the external and internal auditors and management are coordinated.", "az": "Yalnız 2 və 3.", "cmt_az": "İç denetim funksiyası həmçinin etika və dəyərlərin təşviq edildiyi və xarici və daxili auditorların və rəhbərliyin fəaliyyətlərinin koordinasiya edildiyi prosesləri qiymətləndirir."}, {"tr": "1, 2, 3 ve 4.", "en": "1, 2, 3, and 4.", "cmt_tr": "İç denetim fonksiyonu kuruluşun yönetişim süreçlerini iyileştirmek için değerlendirmeli ve uygun önerilerde bulunmalıdır: • Stratejik ve operasyonel kararların alınması; • Risk yönetimi ve kontrolün denetlenmesi; • Uygun etik ve değerlerin teşvik edilmesi; • Etkin performans yönetimi ve hesap verebilirliğin sağlanması; • Bilgilerin iletilmesi; ve • Faaliyetlerin koordinasyonu.", "cmt_en": "The internal audit function must assess and make appropriate recommendations to improve the organization’s governance processes for: • Making strategic and operational decisions; • Overseeing risk management and control; • Promoting appropriate ethics and values within the organization; Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance • Ensuring effective organizational performance management and accountability; • Communicating risk and control information to appropriate areas of the organization; and • Coordinating the activities of, and communicating information among, the board, external and internal auditors, other assurance providers, and management.", "az": "1, 2, 3 və 4.", "cmt_az": "İç denetim funksiyası təşkilatın yönetişim proseslərini təkmilləşdirmək üçün qiymətləndirməli və müvafiq tövsiyələr verməlidir: • Strateji və əməliyyat qərarlarının qəbul edilməsi; • Risk idarəetməsinə və nəzarətə nəzarət; • Təşkilatda müvafiq etika və dəyərlərin təşviq edilməsi; • Effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edilməsi; • Risk və nəzarət məlumatlarının çatdırılması; və • Fəaliyyətlərin koordinasiyası."}], "answer": 3, "q_az": "İç denetim funksiyası aşağıdakı prosesləri qiymətləndirərək təşkilatın yönetişim prosesinə töhfə verməlidir: 1. Etika və dəyərlərin təşviq edilməsi. 2. Effektiv təşkilati performans idarəetməsi və hesabatlılığın təmin edilməsi. 3. Risk və nəzarət məlumatlarının çatdırılması. 4. Xarici və daxili auditorların və rəhbərliyin fəaliyyətlərinin koordinasiyası."}, {"q_tr": "En iyi uygulama yönetişim faaliyetlerinde iç denetim fonksiyonunun rolü olmayan hangisidir?", "q_en": "Which of the following is not a role of the internal audit function in best practice governance activities?", "options": [{"tr": "Yönetim kurulunu kuruluş genelinde risk değerlendirmesinde desteklemek.", "en": "Support the board in enterprise-wide risk assessment.", "cmt_tr": "İç denetim fonksiyonunun rollerinden biri yönetim kurulunu kuruluş genelinde risk değerlendirmesinde desteklemektir. Yönetim kurulu ve yönetim uygun risk modeli ve metodolojisinin belirlenmesinden sorumludur.", "cmt_en": "One internal audit function role is to support the board in enterprise-wide risk assessment. The board and management are responsible for the identification of an appropriate risk model and methodology.", "az": "İdarə heyətini müəssisə miqyasında risk qiymətləndirməsində dəstəkləmək.", "cmt_az": "İç denetim funksiyasının rollarından biri idarə heyətini müəssisə miqyasında risk qiymətləndirməsində dəstəkləməkdir. İdarə heyəti və rəhbərlik müvafiq risk modeli və metodologiyasının müəyyən edilməsinə məsuldur."}, {"tr": "Denetim önerilerinin zamanında uygulanmasını sağlamak.", "en": "Ensure the timely implementation of audit recommendations.", "cmt_tr": "Yönetim denetim önerilerinin zamanında uygulanmasını sağlama sorumluluğunu taşır. İç denetim fonksiyonu denetim önerilerinin durumunun izlenmesi için zamanında prosedür geliştirmekten sorumludur. Denetim önerilerinin uygun ilgiyi görmesini sağlamak için üst yönetim ve yönetim kuruluyla birlikte çalışır.", "cmt_en": "Management has the responsibility of ensuring the timely implementation of the audit recommendations. The internal audit function is responsible for the development of a timely procedure to monitor the disposition of the audit recommendations. It works with senior management and the board to ensure that audit recommendations receive appropriate attention.", "az": "Audit tövsiyələrinin vaxtında tətbiqini təmin etmək.", "cmt_az": "Rəhbərlik audit tövsiyələrinin vaxtında tətbiqini təmin etmək məsuliyyəti daşıyır. İç denetim funksiyası audit tövsiyələrinin vəziyyətinin monitorinqi üçün vaxtında prosedur hazırlamaq məsuliyyəti daşıyır. Audit tövsiyələrinin müvafiq diqqət almasını təmin etmək üçün üst rəhbərlik və idarə heyəti ilə birlikdə işləyir."}, {"tr": "Kurumsal davranış kurallarına uyumun izlenmesi.", "en": "Monitor compliance with the corporate code of conduct.", "cmt_tr": "İç denetim fonksiyonu yönetim kurulu ve yönetim tarafından belirlenen kurumsal davranış kurallarına uyumu izlemelidir.", "cmt_en": "The internal audit function should monitor compliance with the corporate code of conduct set by the board and management.", "az": "Korporativ davranış kodeksinə uyğunluğun monitorinqi.", "cmt_az": "İç denetim funksiyası idarə heyəti və rəhbərlik tərəfindən müəyyən edilmiş korporativ davranış kodeksinə uyğunluğu izləməlidir."}, {"tr": "Önemli risk alanlarını tartışmak.", "en": "Discuss areas of significant risks.", "cmt_tr": "İç denetim fonksiyonu önemli finansal, teknik ve operasyonel riskleri ve maruziyetleri ile bu riskleri en aza indirme planlarını tartışmak sorumluluğunu taşır.", "cmt_en": "The internal audit function is responsible for discussing significant financial, technical, and operational risks and exposures as well as the plans to minimize such risks.", "az": "Əhəmiyyətli risk sahələrini müzakirə etmək.", "cmt_az": "İç denetim funksiyası əhəmiyyətli maliyyə, texniki və əməliyyat risklərini və məruzlərini, həmçinin bu riskləri minimuma endirmək planlarını müzakirə etmək məsuliyyəti daşıyır."}], "answer": 1, "q_az": "Ən yaxşı təcrübə yönetişim fəaliyyətlərində iç denetim funksiyasının rolu olmayan hansıdır?"}, {"q_tr": "Craig, Marlin, Inc. şirketinin baş denetim yöneticisidir (BDY) ve Marlin'de yönetişim değerlendirmesini planlamaktadır. Craig yönetişim değerlendirmesinin planlamasında aşağıdakilerden hangisini dikkate almalıdır?", "q_en": "Craig is the chief audit executive (CAE) of Marlin, Inc., and is in the process of planning an assessment of governance at Marlin. Which of the following should Craig consider in planning the assessment of governance?", "options": [{"tr": "Tüm önemli kararların üst yönetim tarafından onaylanıp onaylanmadığını.", "en": "Whether all major decisions have been authorized by senior management.", "cmt_tr": "Craig ayrıca dış denetçiler tarafından yapılan iç kontrol değerlendirmesine güvenip güvenemeyeceğini ve kuruluşun etik kültürü teşvik edip etmediğini belirlemelidir.", "cmt_en": "Craig also should determine whether he can rely on the assessment of internal control performed by external auditors and whether the organization promotes an ethical culture. Study Unit 6: Governance | Subunit 3: Roles of Internal Auditors in Governance", "az": "Bütün əsas qərarların üst rəhbərlik tərəfindən icazə verilir-verilmədiyini.", "cmt_az": "Craig həmçinin xarici auditorlar tərəfindən aparılmış daxili nəzarətin qiymətləndirilməsinə güvənib-güvənə bilmədiyini və təşkilatın etik mədəniyyəti təşviq edib-etmədiyini müəyyən etməlidir."}, {"tr": "Dış denetçiler tarafından yapılan iç kontrol değerlendirmesine güvenip güvenemeyeceğini.", "en": "Whether he can rely on the assessment of internal control performed by external auditors.", "cmt_tr": "Craig ayrıca tüm önemli kararların üst yönetim tarafından onaylandığını doğrulamalı ve kuruluşun etik kültürü teşvik edip etmediğini belirlemelidir.", "cmt_en": "Craig also should verify that all major decisions have been authorized by senior management and determine whether the organization promotes an ethical culture.", "az": "Xarici auditorlar tərəfindən aparılmış daxili nəzarətin qiymətləndirilməsinə güvənib-güvənə bilmədiyini.", "cmt_az": "Craig həmçinin bütün əsas qərarların üst rəhbərlik tərəfindən icazə verildiyini yoxlamalı və təşkilatın etik mədəniyyəti təşviq edib-etmədiyini müəyyən etməlidir."}, {"tr": "Kuruluşun etik kültürü teşvik edip etmediğini.", "en": "Whether the organization promotes an ethical culture.", "cmt_tr": "Craig ayrıca tüm önemli kararların üst yönetim tarafından onaylandığını doğrulamalı ve dış denetçiler tarafından yapılan iç kontrol değerlendirmesine güvenip güvenemeyeceğini belirlemelidir.", "cmt_en": "Craig also should verify that all major decisions have been authorized by senior management and determine whether he can rely on the assessment of internal control performed by external auditors.", "az": "Təşkilatın etik mədəniyyəti təşviq edib-etmədiyini.", "cmt_az": "Craig həmçinin bütün əsas qərarların üst rəhbərlik tərəfindən icazə verildiyini yoxlamalı və xarici auditorlar tərəfindən aparılmış daxili nəzarətin qiymətləndirilməsinə güvənib-güvənə bilmədiyini müəyyən etməlidir."}, {"tr": "Tüm cevaplar doğrudur.", "en": "All of the answers are correct.", "cmt_tr": "BDY yönetişim değerlendirmesinin planlamasında şunları dikkate almalıdır: • Denetim kuruluşu olumsuz etkileyebilecek olayları önlemek için tasarlanan kontrolleri ele almalıdır; • Yönetişim süreçlerindeki kontroller genellikle çok sayıda riskin yönetilmesinde önemlidir; ve • Diğer denetimler yönetişim süreçlerindeki kontrolleri değerlendiriyorsa denetçi sonuçlarına güvenmeyi düşünmelidir. Craig bu nedenle tüm cevap seçeneklerini dikkate almalıdır.", "cmt_en": "The CAE should consider the following in planning assessments of governance: • An audit should address controls in governance processes that are designed to prevent or detect events that could have a negative effect on the organization; • Controls within governance processes often are significant in managing multiple risks; and, • If other audits assess controls in governance processes, the auditor should consider relying on their results. Thus, Craig should consider all of the answer choices when planning the assessment of governance.", "az": "Bütün cavablar doğrudur.", "cmt_az": "BAİ yönetişimin qiymətləndirilməsinin planlamasında aşağıdakıları nəzərə almalıdır: • Audit təşkilata mənfi təsir göstərə biləcək hadisələrin qarşısını almaq üçün hazırlanmış nəzarətləri əhatə etməlidir; • Yönetişim proseslərindəki nəzarətlər çox vaxt çoxsaylı risklərin idarə edilməsində əhəmiyyətlidir; və • Digər auditlər yönetişim proseslərindəki nəzarətləri qiymətləndirirsə, auditor onların nəticələrinə güvənməyi düşünməlidir. Beləliklə, Craig yönetişimin qiymətləndirilməsini planlaşdırarkən bütün cavab seçimlərini nəzərə almalıdır."}], "answer": 3, "q_az": "Craig Marlin, Inc. şirkətinin baş audit icraçısıdır (BAİ) və Marlin-də yönetişimin qiymətləndirilməsini planlaşdırır. Craig yönetişimin qiymətləndirilməsinin planlamasında aşağıdakılardan hansını nəzərə almalıdır?"}, {"q_tr": "Yönetişim değerlendirmesi için iç denetim planında aşağıdakilerden hangisi tanımlanmalıdır? 1. İşin niteliği 2. Yönetişim süreci 3. Değerlendirmelerin niteliği", "q_en": "Which of the following should be defined in the internal audit plan for an assessment of governance? 1. The nature of the work 2. The governance process 3. The nature of the assessments", "options": [{"tr": "Yalnızca 1 ve 2.", "en": "1 and 2 only.", "cmt_tr": "Değerlendirmelerin niteliği de denetim planında tanımlanmalıdır.", "cmt_en": "The nature of the assessments also should be defined in the audit plan.", "az": "Yalnız 1 və 2.", "cmt_az": "Qiymətləndirmələrin mahiyyəti də audit planında müəyyən olunmalıdır."}, {"tr": "Yalnızca 2 ve 3.", "en": "2 and 3 only.", "cmt_tr": "İşin niteliği de denetim planında tanımlanmalıdır.", "cmt_en": "The nature of the work also should be defined in the audit plan.", "az": "Yalnız 2 və 3.", "cmt_az": "İşin mahiyyəti də audit planında müəyyən olunmalıdır."}, {"tr": "Yalnızca 1 ve 3.", "en": "1 and 3 only.", "cmt_tr": "Yönetişim süreci de denetim planında tanımlanmalıdır.", "cmt_en": "The governance process also should be defined in the audit plan.", "az": "Yalnız 1 və 3.", "cmt_az": "Yönetişim prosesi də audit planında müəyyən olunmalıdır."}, {"tr": "1, 2 ve 3.", "en": "1, 2, and 3.", "cmt_tr": "Denetim planı daha yüksek riskli yönetişim süreçlerini kapsamalıdır. (1) İşin niteliğini; (2) yönetişim süreçlerini; ve (3) değerlendirmelerin niteliğini, örneğin belirli risklerin, süreçlerin veya faaliyetlerin dikkate alınmasını tanımlamalıdır.", "cmt_en": "The audit plan should include higher-risk governance processes. It should define (1) the nature of the work; (2) the governance processes; and (3) the nature of the assessments, e.g., consideration of specific risks, processes, or activities. Study Unit 6:
